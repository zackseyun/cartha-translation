id: PRO.30.11
reference: Proverbs 30:11
source:
  edition: WLC
  text: דּ֭וֹר אָבִ֣י/ו יְקַלֵּ֑ל וְ/אֶת אִ֝מּ֗/וֹ לֹ֣א יְבָרֵֽךְ־׃
translation:
  text: There is a generation that curses its father and does not bless its mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his father ... his mother.' The Hebrew uses singular pronominal suffixes;
      the English 'its' follows the collective noun 'generation.'
    reason: lexical_alternative
  - marker: b
    text: '''Does not bless'' can also carry the sense ''does not speak well of''
      or ''does not honor'' in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  chosen: generation
  alternatives:
  - kind
  - people
  lexicon: HALOT
  rationale: דּוֹר commonly denotes a generation or class of people characterized
    by a shared quality. In this proverb sequence (30:11–14), the repeated pattern
    points to a type of generation, so 'generation' preserves both the lexical sense
    and the literary refrain.
- source_word: אָבִיו
  chosen: its father
  alternatives:
  - his father
  lexicon: HALOT
  rationale: The suffix is 3ms singular ('his father'), but in English the antecedent
    'generation' is a collective noun. 'Its father' matches the grammatical antecedent
    naturally in modern English while preserving the singular relationship expressed
    in Hebrew.
- source_word: יְקַלֵּל
  chosen: curses
  alternatives:
  - reviles
  - treats with contempt
  lexicon: HALOT
  rationale: Piel of קלל here means to curse or speak contemptuously against. 'Curses'
    is the most direct and idiomatic rendering in a parental-honor context and preserves
    the severity of the offense.
- source_word: וְאֶת
  chosen: and
  alternatives:
  - and ... [direct object marker left untranslated]
  lexicon: Hebrew grammar
  rationale: אֶת marks the definite direct object and is not translated directly into
    English. The conjunction וְ is carried by 'and,' while the object relation is
    expressed by English word order.
- source_word: אִמּוֹ
  chosen: its mother
  alternatives:
  - his mother
  lexicon: HALOT
  rationale: As with 'father,' the 3ms suffix is rendered in agreement with the collective
    antecedent 'generation.' 'Its mother' is idiomatic with a collective subject in
    English.
- source_word: לֹא יְבָרֵךְ
  chosen: does not bless
  alternatives:
  - does not honor
  - will not bless
  lexicon: HALOT
  rationale: ברך in the Piel ordinarily means 'bless.' In this context it implies
    speaking well of or honoring one's mother, but 'bless' should be retained in the
    main text because it is the direct lexical equivalent and keeps the parallel with
    'curses.' The English present 'does not bless' fits proverbial style better than
    a future.
