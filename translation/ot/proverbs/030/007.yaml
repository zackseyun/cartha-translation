id: PRO.30.7
reference: Proverbs 30:7
source:
  edition: WLC
  text: שְׁ֭תַּיִם שָׁאַ֣לְתִּי מֵ/אִתָּ֑/ךְ אַל תִּמְנַ֥ע מִ֝מֶּ֗/נִּי בְּ/טֶ֣רֶם
    אָמֽוּת־׃
translation:
  text: 'Two things I have asked of you; do not withhold them from me before I die:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Two [things] I have asked of you.'' The word ''things'' is implied
      by the context and supplied in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתַּיִם
  chosen: Two things
  alternatives:
  - Two
  lexicon: HALOT
  rationale: The Hebrew feminine numeral 'two' stands elliptically for two requests/items.
    Supplying 'things' makes natural English while preserving the sense that two petitions
    are in view, which the following verse specifies.
- source_word: שָׁאַלְתִּי
  chosen: I have asked
  alternatives:
  - I asked
  - I request
  lexicon: HALOT
  rationale: 'Qal perfect 1cs of שאל can be rendered as simple past, but English present
    perfect fits the prayer context well: the speaker has made these requests and
    they remain in force. ''Asked'' is preferable to ''request'' because the Hebrew
    verb is completed-form and not an imperative or participle.'
- source_word: מֵאִתָּךְ
  chosen: of you
  alternatives:
  - from you
  lexicon: HALOT
  rationale: The prepositional phrase marks the addressee/source of the request. 'Asked
    of you' is idiomatic English in prayer language; 'from you' would also be possible
    but is slightly less natural here.
- source_word: אַל
  chosen: do not
  alternatives:
  - may you not
  lexicon: HALOT
  rationale: Standard negative particle used with a jussive/imperfect for prohibition
    or plea. 'Do not' best captures the direct petition.
- source_word: תִּמְנַע
  chosen: withhold
  alternatives:
  - deny
  - hold back
  lexicon: HALOT
  rationale: מנע commonly means to withhold or keep back. 'Withhold' preserves the
    concrete sense of refusing to grant what was requested.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: 'The preposition מן with the verb ''withhold'' is naturally rendered
    ''from me'' in English: ''do not withhold [them] from me.'''
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - ere
  - prior to the time that
  lexicon: HALOT
  rationale: Temporal particle meaning 'before' or 'before not yet.' 'Before' is the
    clear modern English equivalent.
- source_word: אָמֽוּת
  chosen: I die
  alternatives:
  - I die away
  lexicon: HALOT
  rationale: Qal imperfect 1cs of מות, straightforwardly 'I die.' In context it marks
    the time limit for the requested gifts.
