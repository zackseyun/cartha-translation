id: PRO.30.31
reference: Proverbs 30:31
source:
  edition: WLC
  text: זַרְזִ֣יר מָתְנַ֣יִם אוֹ תָ֑יִשׁ וּ֝/מֶ֗לֶךְ אַלְק֥וּם עִמּֽ/וֹ־׃
translation:
  text: a strutting rooster, a he-goat, and a king whose army is with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a king against whom there is no rising up.' The Hebrew expression is
      difficult and admits more than one plausible interpretation.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term rendered 'strutting rooster' is rare and uncertain; other
      renderings include 'greyhound' or 'war-horse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַרְזִיר
  chosen: strutting rooster
  alternatives:
  - greyhound
  - war-horse
  - well-girded one
  lexicon: HALOT, BDB
  rationale: The noun is rare and uncertain. Traditional English often has 'greyhound,'
    but the immediate context lists impressive creatures in stately movement, and
    the collocation with 'loins' favors an animal marked by taut, proud bearing. 'Rooster'
    is a widely accepted modern rendering in this verse; 'strutting' brings out the
    stately gait implied by the context.
- source_word: מָתְנַיִם
  chosen: strutting
  alternatives:
  - of loins
  - well-girded in the loins
  lexicon: HALOT, BDB
  rationale: Literally 'loins.' In English, 'rooster of loins' is opaque, so the phrase
    is rendered idiomatically to express the sense of being sleek, taut, or well-set
    in the body, hence 'strutting' in context.
- source_word: תָּיִשׁ
  chosen: he-goat
  alternatives:
  - goat
  lexicon: HALOT, BDB
  rationale: The Hebrew specifically denotes a male goat. 'He-goat' preserves the
    lexical specificity and the masculine force of the image.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT, BDB
  rationale: Straightforward rendering of the common noun for a ruler.
- source_word: אַלְקוּם עִמּוֹ
  chosen: whose army is with him
  alternatives:
  - against whom there is no rising up
  - with whom is El/God
  - who rises up with him
  lexicon: HALOT, BDB
  rationale: This expression is notoriously difficult. The consonantal form has yielded
    several interpretations. In context, the line describes majestic bearing, so 'a
    king whose army is with him' best fits the sequence of imposing figures advancing
    confidently. The alternative 'against whom there is no rising up' is also ancient
    and plausible, so it is preserved in a footnote.
