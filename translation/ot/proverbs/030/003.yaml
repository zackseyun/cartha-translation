theological_decisions:
- issue: Whether קְדֹשִׁים refers to God singularly or to holy beings/persons plurally
  chosen_reading: 'singular reference to God: ''the Holy One'''
  alternative_readings:
  - 'plural: ''holy ones'''
  rationale: The plural form is syntactically and semantically ambiguous. In Proverbs,
    closely related language in 9:10 strongly supports a divine reference ('knowledge
    of the Holy One'). Rendering it singular preserves the likely wisdom-literature
    idiom without forcing a doctrinally loaded interpretation beyond the context.
    Because the Hebrew surface form is plural, the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
