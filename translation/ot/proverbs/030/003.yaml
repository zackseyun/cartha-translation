id: PRO.30.3
reference: Proverbs 30:3
source:
  edition: WLC
  text: וְ/לֹֽא לָמַ֥דְתִּי חָכְמָ֑ה וְ/דַ֖עַת קְדֹשִׁ֣ים אֵדָֽע־׃
translation:
  text: And I have not learned wisdom, nor do I know the knowledge of the Holy One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the knowledge of holy ones.' The Hebrew form is plural, but in Proverbs
      it can refer to God as 'the Holy One.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָמַדְתִּי
  chosen: have not learned
  alternatives:
  - did not learn
  lexicon: HALOT
  rationale: The perfect 1cs states the speaker's lack of acquired instruction. English
    present perfect ('have not learned') fits the confessional, present-result sense
    in context, though simple past is possible.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in Proverbs for practical and moral wisdom; no contextual
    reason to vary.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: The noun commonly denotes knowledge. 'Understanding' is possible in some
    contexts, but 'knowledge' better matches the lexical pairing with ידע in the following
    verb.
- source_word: קְדֹשִׁים
  chosen: the Holy One
  alternatives:
  - holy ones
  lexicon: HALOT
  rationale: 'Although morphologically plural, this form can function as an intensive/plural
    of majesty referring to God in wisdom literature (compare Prov 9:10). In this
    context, singular ''the Holy One'' yields the most natural sense: knowledge belonging
    to or concerning God. The plural alternative is preserved in a footnote because
    the Hebrew form is genuinely ambiguous.'
- source_word: אֵדָע
  chosen: do I know
  alternatives:
  - I know
  - would I know
  lexicon: HALOT
  rationale: 'The imperfect 1cs here is best taken as a present statement coordinated
    with the previous clause: ''nor do I know.'' This gives clear English parallelism
    with ''I have not learned.'''
