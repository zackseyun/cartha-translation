id: PRO.30.33
reference: Proverbs 30:33
source:
  edition: WLC
  text: כִּ֤י מִ֪יץ חָלָ֡ב י֘וֹצִ֤יא חֶמְאָ֗ה וּֽ/מִיץ אַ֭ף י֣וֹצִיא דָ֑ם וּ/מִ֥יץ
    אַ֝פַּ֗יִם י֣וֹצִיא רִֽיב־׃פ
translation:
  text: For churning milk produces butter, and pressing the nose produces blood, and
    pressing anger produces strife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curds' for 'butter'; the Hebrew term refers broadly to a milk product
      produced by churning or curdling.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew uses a wordplay: ''pressing the nose'' and ''pressing anger'' both
      use forms of אַף, which can mean ''nose'' or, idiomatically, ''anger.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding admonition; 'for'
    best preserves the causal connection in natural English.
- source_word: מִיץ
  chosen: churning / pressing
  alternatives:
  - squeezing
  - wringing
  lexicon: HALOT
  rationale: The noun denotes pressing or squeezing, used three times in a wordplay.
    In the first clause, 'churning' fits the milk context idiomatically; in the second
    and third clauses, 'pressing' preserves the concrete metaphor and verbal parallelism.
- source_word: חָלָב
  chosen: milk
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: יוֹצִיא
  chosen: produces
  alternatives:
  - brings forth
  - causes to come out
  lexicon: HALOT
  rationale: The Hiphil of יצא here expresses causation/result. 'Produces' is concise
    and idiomatic across all three clauses.
- source_word: חֶמְאָה
  chosen: butter
  alternatives:
  - curds
  - cream
  lexicon: HALOT
  rationale: The term can denote curdled milk products broadly. 'Butter' is the traditional
    and contextually apt rendering in the proverb's analogy, though 'curds' is lexically
    possible.
- source_word: אַף
  chosen: the nose
  alternatives:
  - nose
  - nostril
  lexicon: HALOT
  rationale: Here the concrete physical sense is required by the parallel with blood.
    Including the article in English makes the clause idiomatic.
- source_word: דָם
  chosen: blood
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: אַפַּיִם
  chosen: anger
  alternatives:
  - wrath
  - nostrils
  lexicon: HALOT
  rationale: Though literally 'nostrils,' the dual form is a common idiom for anger.
    Rendering it as 'anger' preserves the proverb's intended sense while maintaining
    the wordplay with the previous clause through 'pressing.'
- source_word: רִיב
  chosen: strife
  alternatives:
  - quarrel
  - contention
  lexicon: HALOT
  rationale: Denotes dispute or contention. 'Strife' is concise and proverbially fitting.
