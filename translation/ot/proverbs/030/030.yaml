id: PRO.30.30
reference: Proverbs 30:30
source:
  edition: WLC
  text: לַ֭יִשׁ גִּבּ֣וֹר בַּ/בְּהֵמָ֑ה וְ/לֹא יָ֝שׁ֗וּב מִ/פְּנֵי כֹֽל־־׃
translation:
  text: the lion, mighty among beasts, and does not turn back before any.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a lion, mighty among animals.” The Hebrew uses a poetic word for lion
      and a broad term for animal life.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיִשׁ
  chosen: the lion
  alternatives:
  - a lion
  lexicon: HALOT
  rationale: לַיִשׁ is a poetic Hebrew term for 'lion.' The definite article is not
    explicit in Hebrew, but English poetry/proverb style naturally uses 'the lion'
    for the species exemplar in this list. 'A lion' is possible, but 'the lion' better
    fits the generic, emblematic force.
- source_word: גִּבּוֹר
  chosen: mighty
  alternatives:
  - strong
  - valiant
  lexicon: HALOT
  rationale: גִּבּוֹר denotes strength, might, or prowess. 'Mighty' is concise and
    idiomatic in English, preserving the elevated proverbial tone without overinterpreting
    toward military valor.
- source_word: בַּבְּהֵמָה
  chosen: among beasts
  alternatives:
  - among animals
  - among the beasts
  lexicon: HALOT
  rationale: 'ב + בְּהֵמָה here expresses relation within the animal realm rather
    than a single domestic beast. ''Among beasts'' is idiomatic and suits the comparative
    sense: the lion is mighty in relation to the animals. ''Animals'' is possible
    but flatter; ''beasts'' better preserves the register.'
- source_word: וְלֹא יָשׁוּב
  chosen: and does not turn back
  alternatives:
  - and does not retreat
  - and does not turn away
  lexicon: HALOT
  rationale: שׁוּב literally means 'turn back/return.' In context it describes fearless
    refusal to withdraw. 'Does not turn back' keeps the Hebrew image while remaining
    natural English; 'retreat' is interpretive and slightly more military.
- source_word: מִפְּנֵי כֹל
  chosen: before any
  alternatives:
  - before anyone
  - from before all
  - before anything
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי means 'before' in the sense of in the presence of
    or in confrontation with, often with the nuance of shrinking back from. כֹל is
    broad ('any/all'). Because the verse concerns the lion among beasts, 'before any'
    preserves the concise, sweeping force without narrowing the object unnecessarily.
