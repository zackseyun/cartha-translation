id: PRO.30.6
reference: Proverbs 30:6
source:
  edition: WLC
  text: אַל תּ֥וֹסְףְּ עַל דְּבָרָ֑י/ו פֶּן יוֹכִ֖יחַ בְּ/ךָ֣ וְ/נִכְזָֽבְתָּ־־־׃פ
translation:
  text: Do not add to his words, lest he rebuke you and you be proved a liar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you be found a liar' / 'and you be shown false.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: HALOT
  rationale: אַל with the imperfect forms a standard negative prohibition. 'Do not'
    is the natural concise English equivalent.
- source_word: תּוֹסְףְּ
  chosen: add
  alternatives:
  - add anything
  - increase
  lexicon: HALOT
  rationale: From יסף in Hiphil, 'to add/increase.' In this context with עַל דְּבָרָיו,
    'add' best captures the warning against supplementing someone's words.
- source_word: עַל
  chosen: to
  alternatives:
  - onto
  - upon
  lexicon: HALOT
  rationale: With יסף and an object of speech, עַל is idiomatically rendered in English
    as 'to' ('add to his words'), not the more literal but less idiomatic 'upon.'
- source_word: דְּבָרָיו
  chosen: his words
  alternatives:
  - his sayings
  - his speech
  lexicon: HALOT
  rationale: דבר commonly means 'word(s),' 'matter,' or 'speech.' In the immediate
    context of v.5 speaking of God's utterance, 'his words' is the most direct and
    coherent rendering.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a negative consequence to be avoided. 'Lest' is concise
    and preserves the warning force; though slightly elevated, it remains clear in
    modern English.
- source_word: יוֹכִיחַ
  chosen: he rebuke
  alternatives:
  - he reprove
  - he correct
  - he expose
  lexicon: HALOT
  rationale: יכח in Hiphil can mean rebuke, reprove, or prove wrong. Here the sense
    is a direct divine reproof in response to adding to his words. 'Rebuke' is clear
    and forceful.
- source_word: בְּךָ
  chosen: you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition ב with יכח can indicate the person addressed or acted
    against. English idiom prefers simply 'rebuke you,' though 'against you' is a
    possible nuance.
- source_word: וְנִכְזָבְתָּ
  chosen: and you be proved a liar
  alternatives:
  - and you be found a liar
  - and you be shown false
  - and you be exposed as a liar
  lexicon: HALOT
  rationale: From כזב in Niphal, the sense is being shown false/deceptive. 'Be proved
    a liar' preserves both the passive/resultative force and the moral charge implied
    in context.
