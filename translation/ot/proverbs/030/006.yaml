theological_decisions:
- issue: Referent of 'his' in 'his words'
  chosen_reading: The pronoun refers to God, continuing the thought of v.5.
  alternative_readings:
  - The pronoun could be taken more generally as referring to a speaker's words in
    wisdom instruction.
  rationale: The immediate context in Proverbs 30:5 speaks of every word of God being
    refined/tested, so v.6 naturally warns against adding to God's words. The translation
    keeps the pronoun 'his' rather than substituting 'God's' in order to reflect the
    Hebrew while preserving the contextual linkage.
