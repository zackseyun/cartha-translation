theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of ותפשתי שם אלהי
  chosen_reading: profane the name of my God
  alternative_readings:
  - misuse the name of my God
  - take hold of the name of my God
  rationale: The Hebrew expression is idiomatic and contextually tied to theft causing dishonor to God. The translation avoids narrowing it to verbal misuse alone while still expressing the theological gravity of bringing contempt on God's name.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
