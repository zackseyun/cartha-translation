id: PRO.30.9
reference: Proverbs 30:9
source:
  edition: WLC
  text: פֶּ֥ן אֶשְׂבַּ֨ע וְ/כִחַשְׁתִּי֮ וְ/אָמַ֗רְתִּי מִ֥י יְה֫וָ֥ה וּ/פֶֽן אִוָּרֵ֥שׁ וְ/גָנַ֑בְתִּי וְ֝/תָפַ֗שְׂתִּי שֵׁ֣ם אֱלֹהָֽ/י׀־׃פ
translation:
  text: lest I become full and deny you and say, “Who is Yahweh?” or lest I become poor and steal and profane the name of my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Who is Yahweh?'' The main text follows the project''s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'misuse the name of my God.' The Hebrew literally reads 'seize/grasp the name of my God,' likely an idiom for dishonoring or profaning God's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Introduces a feared negative consequence in a prayer. 'Lest' is concise and preserves the warning nuance better than a looser paraphrase.
- source_word: אֶשְׂבַּע
  chosen: I become full
  alternatives:
  - I am satisfied
  - I have plenty
  lexicon: HALOT
  rationale: From שבע in the sense of being sated or filled. 'Become full' fits the prospective force after פֶּן and keeps the concrete image of abundance.
- source_word: כִחַשְׁתִּי
  chosen: deny you
  alternatives:
  - disown
  - deal falsely
  lexicon: HALOT
  rationale: In context the object is God, implied by the following 'Who is the LORD?' 'Deny you' best captures repudiation of God rather than mere deception.
- source_word: מִי יְהוָה
  chosen: Who is the LORD?
  alternatives:
  - Who is Yahweh?
  - What is the LORD to me?
  lexicon: HALOT
  rationale: A rhetorical expression of arrogant disregard for God. Per doctrine, יְהוָה is rendered 'the LORD' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אִוָּרֵשׁ
  chosen: I become poor
  alternatives:
  - I am dispossessed
  - I come to poverty
  lexicon: HALOT
  rationale: From ירשׁ in the Niphal, here with the sense of being impoverished or reduced to want. 'Become poor' is idiomatic and fits the parallel with becoming full.
- source_word: גָנַבְתִּי
  chosen: steal
  alternatives:
  - commit theft
  lexicon: HALOT
  rationale: Simple, direct rendering of the verb in sequence with the feared consequence of poverty.
- source_word: תָפַשְׂתִּי שֵׁם אֱלֹהָי
  chosen: profane the name of my God
  alternatives:
  - lay hold of the name of my God improperly
  - misuse the name of my God
  lexicon: HALOT
  rationale: The idiom is difficult literally ('seize/carry the name'). In context of theft bringing reproach on God, 'profane the name of my God' best conveys dishonoring God's name. 'Misuse' is possible, but 'profane' more clearly expresses desecration by conduct rather than merely speech.
- source_word: אֱלֹהָי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward first-person singular possessive; retained as a personal covenantal expression.
