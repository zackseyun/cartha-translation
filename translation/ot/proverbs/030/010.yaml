id: PRO.30.10
reference: Proverbs 30:10
source:
  edition: WLC
  text: אַל תַּלְשֵׁ֣ן עֶ֭בֶד אֶל אדנ/ו פֶּֽן יְקַלֶּלְ/ךָ֥ וְ/אָשָֽׁמְתָּ־־־׃
translation:
  text: Do not slander a slave to his master, lest he curse you and you become guilty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (Hebrew עֶבֶד); 'slave' is used here to reflect
      the bonded social status implied by the term in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּלְשֵׁן
  chosen: slander
  alternatives:
  - malign
  - accuse
  - inform against
  lexicon: HALOT
  rationale: The verb from לשׁן refers to using the tongue against someone, often
    in the sense of slander or malicious accusation. 'Slander' best captures the prohibitive
    force and moral wrong implied in wisdom literature, more precisely than the broader
    'speak against' or the potentially neutral 'report.'
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: The noun commonly denotes a bonded subordinate. Following the project's
    guidance, 'slave' is preferred where the bonded nature is salient. In this proverb
    the social vulnerability of the person in view is important, so 'slave' is stronger
    and more transparent than 'servant.'
- source_word: אֶל אדניו
  chosen: to his master
  alternatives:
  - to his lord
  lexicon: HALOT
  rationale: The preposition plus אֲדוֹן with 3ms suffix naturally means bringing
    the accusation to the slave's owner/master. 'Master' is the idiomatic social relation
    in English here; 'lord' would sound overly elevated and potentially theological
    in this context.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a warning about undesirable consequence. 'Lest' is concise
    and preserves the proverbial style better than more expanded alternatives.
- source_word: יְקַלֶּלְךָ
  chosen: he curse you
  alternatives:
  - he revile you
  lexicon: HALOT
  rationale: The piel of קלל here means to curse, not merely insult. 'Curse' preserves
    the seriousness of invoking harm and fits the wisdom warning that follows.
- source_word: וְאָשָׁמְתָּ
  chosen: and you become guilty
  alternatives:
  - and you bear guilt
  - and you are held guilty
  lexicon: HALOT
  rationale: From אשם, the sense is incurring guilt or liability. 'Become guilty'
    is clear modern English and reflects the consequential force after the slave's
    curse. 'Bear guilt' is possible but less idiomatic for contemporary readers.
