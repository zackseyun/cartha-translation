id: PRO.30.20
reference: Proverbs 30:20
source:
  edition: WLC
  text: כֵּ֤ן דֶּ֥רֶךְ אִשָּׁ֗ה מְנָ֫אָ֥פֶת אָ֭כְלָה וּ/מָ֣חֲתָה פִ֑י/הָ וְ֝/אָמְרָ֗ה
    לֹֽא פָעַ֥לְתִּי אָֽוֶן׀־׃פ
translation:
  text: 'So is the way of an adulterous woman: she eats and wipes her mouth and says,
    “I have done no wrong.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have done no wickedness.'
    reason: lexical_alternative
  - marker: b
    text: The imagery of eating and wiping the mouth portrays casual concealment,
      as though the act left no moral trace.
    reason: cultural_note
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: Introduces a comparison/conclusion from the preceding saying. 'So' is
    concise and natural in English while preserving the demonstrative force.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - conduct
  lexicon: HALOT
  rationale: Here 'way' idiomatically denotes manner or pattern of behavior, a common
    wisdom usage. It preserves the metaphor without over-interpreting as merely 'conduct'.
- source_word: אִשָּׁה מְנָאָפֶת
  chosen: an adulterous woman
  alternatives:
  - a woman committing adultery
  - an adulteress
  lexicon: HALOT
  rationale: The participle מְנָאָפֶת describes a woman engaged in adultery. 'An adulterous
    woman' is clear modern English and avoids the slightly more label-like or archaic
    feel of 'adulteress,' while retaining the moral sense.
- source_word: אָכְלָה
  chosen: she eats
  alternatives:
  - she has eaten
  lexicon: HALOT
  rationale: In this proverb the perfects function as vivid, characteristic actions.
    Present tense in English better conveys habitual behavior in a wisdom saying.
- source_word: וּמָחֲתָה פִיהָ
  chosen: and wipes her mouth
  alternatives:
  - and wipes her lips
  - and cleans her mouth
  lexicon: HALOT
  rationale: The Hebrew literally says 'wipes her mouth.' This likely evokes the image
    of someone finishing a meal and removing evidence. 'Mouth' is retained as the
    more literal and idiomatic rendering.
- source_word: וְאָמְרָה
  chosen: and says
  alternatives:
  - and she says
  lexicon: HALOT
  rationale: Rendered as present tense for the same proverbial-habitual force as the
    preceding verbs.
- source_word: לֹא פָעַלְתִּי אָוֶן
  chosen: I have done no wrong
  alternatives:
  - I have done no wickedness
  - I have done no evil
  - I have done nothing wrong
  lexicon: HALOT
  rationale: אָוֶן can denote wrongdoing, wickedness, or iniquity. 'No wrong' is natural
    modern English and fits the woman's self-justifying denial without sounding overly
    formal. 'Have done' preserves the completed-action sense of פָעַלְתִּי.
