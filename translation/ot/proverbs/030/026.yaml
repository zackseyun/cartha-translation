id: PRO.30.26
reference: Proverbs 30:26
source:
  edition: WLC
  text: שְׁ֭פַנִּים עַ֣ם לֹא עָצ֑וּם וַ/יָּשִׂ֖ימוּ בַ/סֶּ֣לַע בֵּיתָֽ/ם־׃
translation:
  text: Rock badgers are a people not mighty, yet they make their home in the crag.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “hyraxes”; traditionally “coneys.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפַנִּים
  chosen: rock badgers
  alternatives:
  - hyraxes
  - coneys
  lexicon: HALOT
  rationale: The animal traditionally rendered 'coneys' is best identified as the
    hyrax/rock badger in modern English. 'Rock badgers' is more accessible than 'hyraxes'
    while still reflecting the likely referent and the verse's rocky habitat context.
- source_word: עַם
  chosen: a people
  alternatives:
  - a folk
  - a nation
  lexicon: HALOT
  rationale: The noun literally means 'people.' Here it is used of an animal group
    in a figurative/classifying way, so 'a people' preserves the Hebrew expression
    without over-paraphrasing.
- source_word: לֹא עָצוּם
  chosen: not mighty
  alternatives:
  - not strong
  - not powerful
  lexicon: HALOT
  rationale: The phrase describes lack of strength or power. 'Not mighty' is concise
    and suitably proverbial, preserving the contrast with their wise behavior in the
    second colon.
- source_word: וַיָּשִׂימוּ
  chosen: they make
  alternatives:
  - they set
  - they place
  - they have made
  lexicon: HALOT
  rationale: The verb is literally 'they set/place,' but with 'house/home' in English
    the idiomatic sense is 'make.' Present tense is used to match the proverb's gnomic
    character.
- source_word: בַסֶּלַע
  chosen: in the crag
  alternatives:
  - in the rock
  - among the rocks
  lexicon: HALOT
  rationale: סֶלַע denotes rock, cliff, or crag. 'In the crag' captures the specific
    rocky refuge setting more vividly than the flatter 'in the rock' while remaining
    faithful to the singular noun.
- source_word: בֵּיתָם
  chosen: their home
  alternatives:
  - their house
  - their dwelling
  lexicon: HALOT
  rationale: Although literally 'their house,' 'home' is more natural English for
    an animal habitat and fits optimal equivalence without losing meaning.
