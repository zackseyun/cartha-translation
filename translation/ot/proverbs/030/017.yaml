id: PRO.30.17
reference: Proverbs 30:17
source:
  edition: WLC
  text: עַ֤יִן תִּֽלְעַ֣ג לְ/אָב֮ וְ/תָב֪וּז לִֽ/יקֲּהַ֫ת אֵ֥ם יִקְּר֥וּ/הָ עֹרְבֵי
    נַ֑חַל וְֽ/יֹאכְל֥וּ/הָ בְנֵי נָֽשֶׁר׀־־־׃פ
translation:
  text: The eye that mocks a father and despises obedience to a mother—ravens of the
    valley will peck it out, and the young of the eagle will eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a mother's command/instruction'; the rare Hebrew term likely refers
      to the obedience or heed owed to one's mother.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'ravens of the valley'; 'valley' may also be understood as 'wadi'
      or 'brook-bed.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew nesher can refer to an eagle or a vulture; traditionally rendered
      'eagle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַיִן
  chosen: The eye
  alternatives:
  - An eye
  lexicon: HALOT
  rationale: 'Singular noun meaning ''eye.'' Rendered with the definite article in
    English to introduce the proverbial subject naturally: ''The eye that…''.'
- source_word: תִּלְעַג
  chosen: mocks
  alternatives:
  - scorns
  - derides
  lexicon: HALOT
  rationale: לעג denotes mocking or derisive speech/attitude. 'Mocks' is concise,
    natural English and preserves the contemptuous sense.
- source_word: לְאָב
  chosen: a father
  alternatives:
  - his father
  - father
  lexicon: HALOT
  rationale: The Hebrew has no explicit possessive suffix. 'A father' keeps the generic
    proverbial force rather than specifying 'his father' beyond the text.
- source_word: וְתָבוּז
  chosen: and despises
  alternatives:
  - and scorns
  - and holds in contempt
  lexicon: HALOT
  rationale: בוז expresses contempt or disdain. 'Despises' fits idiomatic English
    and matches the moral weight of the proverb.
- source_word: לִיקֲּהַת אֵם
  chosen: obedience to a mother
  alternatives:
  - a mother's command
  - a mother's instruction
  - a mother's authority
  lexicon: HALOT
  rationale: The noun יקהת is rare and debated, but in context it refers to the filial
    response owed to a mother, commonly understood as obedience or heedfulness. 'Obedience
    to a mother' makes the sense clear in modern English while staying close to the
    proverb's concern.
- source_word: יִקְּרוּהָ
  chosen: will peck it out
  alternatives:
  - will gouge it out
  - will pick it out
  lexicon: HALOT
  rationale: The verb נקר in this context refers to birds picking out the eye. 'Peck
    it out' is vivid, idiomatic, and contextually appropriate with ravens as subject.
- source_word: עֹרְבֵי נַחַל
  chosen: ravens of the valley
  alternatives:
  - ravens of the wadi
  - ravens of the brook
  lexicon: HALOT
  rationale: נחל can mean valley, wadi, or torrent-bed. 'Valley' is the most accessible
    natural English here; 'wadi' is more precise geographically but less readable.
    The image is of carrion birds in a ravine/valley setting.
- source_word: וְיֹאכְלוּהָ
  chosen: will eat it
  alternatives:
  - will devour it
  lexicon: HALOT
  rationale: אכל is the ordinary verb 'eat.' 'Will eat it' preserves the starkness
    without over-intensifying.
- source_word: בְנֵי נָשֶׁר
  chosen: the young of the eagle
  alternatives:
  - eaglets
  - the young of the vulture
  lexicon: HALOT
  rationale: נשר can denote eagle or vulture in biblical usage. Traditional and common
    English rendering is 'eagle,' but the underlying bird may overlap with large carrion
    birds. 'The young of the eagle' keeps the familiar image while remaining literal
    to the construct phrase 'sons/young of.'
