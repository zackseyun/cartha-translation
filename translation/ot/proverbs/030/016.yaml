id: PRO.30.16
reference: Proverbs 30:16
source:
  edition: WLC
  text: שְׁאוֹל֮ וְ/עֹ֪צֶ֫ר רָ֥חַם אֶ֭רֶץ לֹא שָׂ֣בְעָה מַּ֑יִם וְ֝/אֵ֗שׁ לֹא אָ֥מְרָה
    הֽוֹן־־׃
translation:
  text: Sheol, and a barren womb; earth, never satisfied with water; and fire, which
    never says, “Enough.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the restraint/closure of the womb,' that is, a womb that does
      not bear children.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression at the end is difficult; many understand it as 'Enough!'
      Others have proposed a sense related to 'wealth' or 'substance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Kept as 'Sheol' rather than flattening to 'grave' because the Hebrew
    term denotes the underworld/realm of the dead more specifically than a burial
    place. Transliteration preserves the Hebrew concept in wisdom-poetry context.
- source_word: עֹצֶר רָחַם
  chosen: a barren womb
  alternatives:
  - the restraint of the womb
  - a closed womb
  lexicon: HALOT
  rationale: The construct literally refers to the womb's being restrained/closed,
    an idiom for barrenness. 'A barren womb' gives the idiomatic sense in natural
    English without over-paraphrasing.
- source_word: אֶרֶץ
  chosen: earth
  alternatives:
  - land
  lexicon: HALOT
  rationale: In this list of insatiable things, the reference is broad and elemental
    rather than to a specific territory, so 'earth' fits better than 'land'.
- source_word: לֹא שָׂבְעָה מַּיִם
  chosen: never satisfied with water
  alternatives:
  - not sated with water
  - does not have enough water
  lexicon: HALOT
  rationale: The verb means 'to be satisfied/sated.' 'Never satisfied with water'
    is idiomatic English and preserves the ongoing proverbial force.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: לֹא אָמְרָה הוֹן
  chosen: which never says, “Enough.”
  alternatives:
  - does not say, 'Wealth'
  - does not say, 'Ho!'
  - never says, 'It is enough'
  lexicon: HALOT
  rationale: The final word is an interjection meaning 'enough!' or 'ah, wealth/substance'
    in some proposals. In this proverb's pattern of insatiability, the sense 'Enough'
    best fits the parallelism and traditional understanding. The relative 'which'
    smooths the English while preserving the feminine singular reference to fire.
