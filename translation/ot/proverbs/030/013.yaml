id: PRO.30.13
reference: Proverbs 30:13
source:
  edition: WLC
  text: דּ֭וֹר מָה רָמ֣וּ עֵינָ֑י/ו וְ֝/עַפְעַפָּ֗י/ו יִנָּשֵֽׂאוּ־׃
translation:
  text: There is a generation—how lofty its eyes, and its eyelids are raised high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A generation—how high its eyes are, and its eyelids are lifted up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  chosen: There is a generation
  alternatives:
  - A generation
  - A kind of generation
  lexicon: HALOT
  rationale: דּוֹר denotes a generation or class of people. In this section of Proverbs
    30, the noun functions as an exclamatory introduction to a type of people being
    described. Rendering with existential 'There is' brings out the idiomatic force
    in English without over-paraphrasing.
- source_word: מָה
  chosen: how
  alternatives:
  - what
  lexicon: HALOT
  rationale: 'Here מָה is exclamatory rather than interrogative, introducing the degree
    of the description: ''how lofty...'' This is the most natural English equivalent
    in context.'
- source_word: רָמוּ
  chosen: lofty
  alternatives:
  - high
  - haughty
  - raised
  lexicon: HALOT
  rationale: From רום, 'to be high/exalted.' Because the verse describes arrogant
    demeanor through the eyes, 'lofty' preserves both the vertical imagery and the
    moral connotation of pride better than the flatter 'high.' 'Haughty' is possible
    but would interpret the metaphor more explicitly than the Hebrew requires.
- source_word: עֵינָיו
  chosen: its eyes
  alternatives:
  - his eyes
  - their eyes
  lexicon: HALOT
  rationale: The suffix is 3ms singular, agreeing with the collective noun דּוֹר.
    English can represent this collective with singular 'its' to preserve the Hebrew
    grammar while still referring to the class as a whole. 'Their' would smooth the
    sense but lose the singular collective effect.
- source_word: וְעַפְעַפָּיו
  chosen: and its eyelids
  alternatives:
  - and its glance
  - and its eyelids
  lexicon: HALOT
  rationale: עַפְעַף literally refers to eyelids. Keeping the concrete body-part imagery
    preserves the poetic vividness; the elevated eyelids symbolize arrogance.
- source_word: יִנָּשֵׂאוּ
  chosen: are raised high
  alternatives:
  - are lifted up
  - are exalted
  lexicon: HALOT
  rationale: 'Nifal of נשׂא here is passive/reflexive in sense: ''are lifted/raised.''
    ''Are raised high'' reads naturally in English and echoes the imagery of pride
    without sounding overly wooden. ''Exalted'' would be too abstract for the bodily
    image.'
