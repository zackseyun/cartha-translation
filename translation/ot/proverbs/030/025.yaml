id: PRO.30.25
reference: Proverbs 30:25
source:
  edition: WLC
  text: הַ֭/נְּמָלִים עַ֣ם לֹא עָ֑ז וַ/יָּכִ֖ינוּ בַ/קַּ֣יִץ לַחְמָֽ/ם־׃
translation:
  text: The ants are a people not strong, yet they prepare their food in the summer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their bread'; here 'bread' carries the broader sense of 'food' or
      'provisions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּמָלִים
  chosen: the ants
  alternatives:
  - ants
  lexicon: HALOT
  rationale: 'Definite plural noun referring to the animal as a class. English naturally
    renders with the article here: ''the ants.'''
- source_word: עַם
  chosen: a people
  alternatives:
  - a folk
  - a nation
  lexicon: HALOT
  rationale: Though often used for a human people-group, here it is applied figuratively
    to ants in a wisdom saying. 'A people' preserves the metaphor and the formal force
    better than flattening it to merely 'creatures.'
- source_word: לֹא עָז
  chosen: not strong
  alternatives:
  - without strength
  - not mighty
  - weak
  lexicon: HALOT
  rationale: The phrase literally negates the adjective 'strong/mighty.' 'Not strong'
    keeps the Hebrew structure and avoids overinterpreting with the more evaluative
    'weak.'
- source_word: וַיָּכִינוּ
  chosen: they prepare
  alternatives:
  - they make ready
  - they establish
  - they store up
  lexicon: HALOT
  rationale: From כון in the Hiphil, here meaning to make ready or prepare. 'Prepare'
    fits the context of prudent provisioning. 'Store up' is interpretive and goes
    beyond the verb's basic sense.
- source_word: בַקַּיִץ
  chosen: in the summer
  alternatives:
  - in summer
  lexicon: HALOT
  rationale: The preposition with article points to the season as the time of preparation.
    'In the summer' is idiomatic and preserves the temporal setting.
- source_word: לַחְמָם
  chosen: their food
  alternatives:
  - their bread
  - their provisions
  lexicon: HALOT
  rationale: Though לֶחֶם often literally means 'bread,' in Hebrew it can broadly
    denote food. Since ants do not literally bake bread, 'their food' best conveys
    the sense in natural English while remaining faithful to the semantic range.
