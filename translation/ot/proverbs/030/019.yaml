id: PRO.30.19
reference: Proverbs 30:19
source:
  edition: WLC
  text: דֶּ֤רֶךְ הַ/נֶּ֨שֶׁר בַּ/שָּׁמַיִם֮ דֶּ֥רֶךְ נָחָ֗שׁ עֲלֵ֫י צ֥וּר דֶּֽרֶךְ
    אֳנִיָּ֥ה בְ/לֶב יָ֑ם וְ/דֶ֖רֶךְ גֶּ֣בֶר בְּ/עַלְמָֽה׀־־׃
translation:
  text: the way of an eagle in the sky, the way of a snake on a rock, the way of a
    ship in the heart of the sea, and the way of a man with a young woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the way of a man with a virgin.' The Hebrew עלמה more broadly means
      'young woman' and does not itself require the more specific sense 'virgin.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the heart of the sea,' an idiom for the midst of the sea.
    reason: cultural_note
  - marker: c
    text: The Hebrew term translated 'eagle' can also refer more broadly to a large
      bird of prey.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: Repeated four times as the organizing noun of the proverb. 'Way' is the
    most natural and sufficiently broad English equivalent, covering movement, manner,
    or course without over-specifying.
- source_word: הַנֶּשֶׁר
  chosen: eagle
  alternatives:
  - vulture
  - great bird of prey
  lexicon: HALOT
  rationale: Traditional and common rendering is 'eagle.' The Hebrew term can denote
    a large raptor more broadly, but 'eagle' fits idiomatic English and the proverb's
    imagery.
- source_word: בַּשָּׁמַיִם
  chosen: in the sky
  alternatives:
  - in the heavens
  lexicon: HALOT
  rationale: Here the reference is the visible expanse where a bird flies, so 'sky'
    communicates the concrete sense better than the more elevated 'heavens.'
- source_word: נָחָשׁ
  chosen: snake
  alternatives:
  - serpent
  lexicon: HALOT
  rationale: '''Snake'' is clear modern English. ''Serpent'' is possible but sounds
    more literary and may import associations not required by this wisdom context.'
- source_word: עֲלֵי צּוּר
  chosen: on a rock
  alternatives:
  - upon a rock
  - over a rock face
  lexicon: HALOT
  rationale: The phrase depicts the snake's movement across rocky terrain. 'On a rock'
    is simple and idiomatic.
- source_word: אֳנִיָּה
  chosen: ship
  alternatives:
  - boat
  - vessel
  lexicon: HALOT
  rationale: A seagoing craft is in view, and 'ship' best matches the scale implied
    by travel in the sea.
- source_word: בְלֶב יָם
  chosen: in the heart of the sea
  alternatives:
  - in the midst of the sea
  - on the high seas
  lexicon: HALOT
  rationale: The Hebrew is literally 'in the heart of the sea.' This idiom is vivid
    and understandable in English, so it is preserved rather than flattened.
- source_word: גֶּבֶר
  chosen: man
  alternatives:
  - male
  - strong man
  lexicon: HALOT
  rationale: The noun denotes an adult male. Per the translation philosophy, gender-accurate
    language is preferred where the source is specifically masculine.
- source_word: בְּעַלְמָה
  chosen: with a young woman
  alternatives:
  - with a maiden
  - with a virgin
  lexicon: HALOT
  rationale: עַלְמָה denotes a young woman of marriageable age without explicitly
    stating virginity. 'Young woman' best reflects the lexical sense; 'virgin' is
    too specific here, though it is a historically noted alternative in some contexts.
