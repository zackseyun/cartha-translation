id: PRO.30.29
reference: Proverbs 30:29
source:
  edition: WLC
  text: שְׁלֹשָׁ֣ה הֵ֭מָּה מֵיטִ֣יבֵי צָ֑עַד וְ֝/אַרְבָּעָ֗ה מֵיטִ֥בֵי לָֽכֶת׃
translation:
  text: 'There are three that are stately in stride, even four that are stately in
    walking:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'good in gait' / 'excellent in walking.' The Hebrew idiom speaks of creatures
      whose manner of movement is notably impressive.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשָׁה
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number introducing the numerical saying formula common in wisdom
    literature.
- source_word: הֵמָּה
  chosen: there are
  alternatives:
  - they
  lexicon: HALOT
  rationale: 'The independent pronoun functions idiomatically with the number to introduce
    the set: ''there are three...'' rather than the stiffer ''three—they...''.'
- source_word: מֵיטִיבֵי
  chosen: stately
  alternatives:
  - good
  - well-favored
  - excellent
  lexicon: HALOT
  rationale: From יטב in a participial form meaning those that do something well.
    In context of gait, the sense is not moral goodness but impressive or fine bearing;
    'stately' captures dignified movement in natural English.
- source_word: צָעַד
  chosen: stride
  alternatives:
  - step
  - gait
  lexicon: HALOT
  rationale: Refers to stepping or marching movement. 'Stride' is vivid and idiomatic
    in English while preserving the focus on manner of movement.
- source_word: וְאַרְבָּעָה
  chosen: even four
  alternatives:
  - and four
  lexicon: HALOT
  rationale: The waw in this numerical proverb formula is often rendered 'even' in
    English to reflect the climactic progression from three to four.
- source_word: מֵיטִבֵי
  chosen: stately
  alternatives:
  - good
  - excellent
  lexicon: HALOT
  rationale: Repeated term kept consistent with the first colon for poetic parallelism.
- source_word: לָכֶת
  chosen: walking
  alternatives:
  - going
  - movement
  lexicon: HALOT
  rationale: Infinitive of הלך, here parallel to צעד. 'Walking' is the most natural
    English equivalent and preserves the concrete imagery.
