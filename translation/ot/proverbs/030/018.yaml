id: PRO.30.18
reference: Proverbs 30:18
source:
  edition: WLC
  text: שְׁלֹשָׁ֣ה הֵ֭מָּה נִפְלְא֣וּ מִמֶּ֑/נִּי ו/ארבע לֹ֣א יְדַעְתִּֽי/ם׃
translation:
  text: 'Three things are too wonderful for me; four I do not understand:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Three are too wonderful for me, and four I do not know.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשָׁה
  chosen: Three things
  alternatives:
  - Three
  lexicon: HALOT
  rationale: The masculine cardinal introduces the numerical saying formula. English
    idiom normally supplies 'things,' which is implied by the construction and clarified
    by the following plural references.
- source_word: הֵמָּה
  chosen: are
  alternatives:
  - they are
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis ('they'). In smooth English numerical
    sayings, the emphasis is adequately conveyed without an explicit 'they,' so it
    is absorbed into the verbal clause.
- source_word: נִפְלְאוּ
  chosen: too wonderful
  alternatives:
  - wonderful
  - marvelous
  - beyond me
  lexicon: HALOT
  rationale: From פלא, expressing something extraordinary or incomprehensible. 'Too
    wonderful' captures both the sense of marvel and the implied surpassing of the
    speaker's grasp, especially in combination with מִמֶּנִּי.
- source_word: מִמֶּנִּי
  chosen: for me
  alternatives:
  - beyond me
  - than I can grasp
  lexicon: HALOT
  rationale: Literally 'from me' or 'beyond me.' With נִפְלְאוּ it idiomatically means
    the matters exceed the speaker's comprehension. 'For me' preserves the familiar
    English structure 'too wonderful for me' while staying close to the Hebrew.
- source_word: וְאַרְבַּע
  chosen: four
  alternatives:
  - and four
  lexicon: HALOT
  rationale: This is the standard x/x+1 numerical parallelism in Hebrew wisdom literature.
    English can retain the force without overemphasizing the conjunction; however,
    the semicolon preserves the stepped structure. The conjunction is conceptually
    represented in the progression from 'Three things' to 'four.'
- source_word: לֹא יְדַעְתִּים
  chosen: I do not understand
  alternatives:
  - I do not know them
  - I have not known them
  lexicon: HALOT
  rationale: Though the verb is formally 'I have not known them,' in context ידע denotes
    understanding/comprehension rather than mere acquaintance. 'I do not understand'
    communicates the epistemic sense naturally in English. The object suffix '-them'
    is represented by the implied object carried over from 'four'.
