theological_decisions:
- issue: Referent of the second colon pronouns
  chosen_reading: 'The pronouns refer to God: ''he is a shield to those who take refuge
    in him.'''
  alternative_readings:
  - The shield/refuge language could be taken as referring back to God's word in a
    more abstract sense.
  rationale: Syntactically, the masculine singular pronouns can refer to either the
    immediately preceding predicate or the earlier divine subject, but the proverb's
    sense and common biblical idiom strongly favor God as the personal protector.
    This avoids depersonalizing the refuge motif while not importing extra doctrine
    beyond the text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it without documentation)
