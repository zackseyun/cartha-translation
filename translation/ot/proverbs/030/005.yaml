id: PRO.30.5
reference: Proverbs 30:5
source:
  edition: WLC
  text: כָּל אִמְרַ֣ת אֱל֣וֹהַּ צְרוּפָ֑ה מָגֵ֥ן ה֝֗וּא לַֽ/חֹסִ֥ים בּֽ/וֹ־׃
translation:
  text: Every word of God is proven; he is a shield to those who take refuge in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every utterance of God is refined' or 'pure.' The Hebrew term evokes
      metal tested in the fire and shown genuine.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'Distributive sense fits the singular collective that follows: each individual
    utterance/word of God is in view. ''All'' would also be possible, but ''Every''
    better matches the proverb''s emphasis.'
- source_word: אִמְרַת
  chosen: word
  alternatives:
  - utterance
  - saying
  lexicon: HALOT
  rationale: אִמְרָה commonly denotes an utterance, saying, or word. 'Word' is the
    most natural modern English rendering here and preserves the broad scope of divine
    speech without sounding overly technical.
- source_word: אֱלוֹהַּ
  chosen: God
  alternatives:
  - God Most High
  lexicon: HALOT
  rationale: The singular divine title here refers to God generically rather than
    the covenant name YHWH, so 'God' is the straightforward rendering. No doctrinally
    loaded expansion is warranted.
- source_word: צְרוּפָה
  chosen: proven
  alternatives:
  - refined
  - tested
  - pure
  lexicon: HALOT
  rationale: The verb/root carries the sense of being smelted/refined and thus tested
    and shown genuine. 'Proven' communicates the result in clear modern English. 'Refined'
    is more literal-metallurgical, and 'pure' reflects the implication, but 'proven'
    best fits the proverb's claim about reliability.
- source_word: מָגֵן
  chosen: shield
  alternatives:
  - protector
  - defense
  lexicon: HALOT
  rationale: The noun is literally 'shield.' Retaining the concrete image preserves
    the poetic metaphor and biblical resonance.
- source_word: הוּא
  chosen: he is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The pronoun refers back to God, not to 'word.' English naturally supplies
    'he is' to make the verbless clause explicit. This preserves the personal subject
    of the second colon.
- source_word: לַחֹסִים
  chosen: to those who take refuge
  alternatives:
  - for those who seek refuge
  - to those who trust
  lexicon: HALOT
  rationale: The participle from חסה means to seek or take refuge. 'Take refuge' preserves
    the protective imagery better than the more abstract 'trust.'
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers to God in parallel with 'he
    is a shield.' 'In him' preserves the personal object of refuge; 'in it' would
    awkwardly shift the reference to the word.
