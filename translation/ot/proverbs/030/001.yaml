id: PRO.30.1
reference: Proverbs 30:1
source:
  edition: WLC
  text: דִּבְרֵ֤י אָג֥וּר בִּן יָקֶ֗ה הַ/מַּ֫שָּׂ֥א נְאֻ֣ם הַ֭/גֶּבֶר לְ/אִֽיתִיאֵ֑ל
    לְ/אִ֖יתִיאֵ֣ל וְ/אֻכָֽל׀־׃
translation:
  text: 'The words of Agur son of Jakeh, the oracle: the declaration of the man to
    Ithiel, to Ithiel and Ucal:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, possibly, “The words of Agur son of Jakeh of Massa,” taking הַמַּשָּׂא
      as a place or tribal name rather than “the oracle.”
    reason: alternative_reading
  - marker: b
    text: Or, possibly, “I am weary, O God; I am weary, O God, and worn out,” if the
      final words are repointed as a verbal clause rather than read as the names Ithiel
      and Ucal.
    reason: alternative_reading
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The sayings of
  lexicon: HALOT
  rationale: Construct plural of דבר introducing a collection or utterance. 'Words
    of' is the most direct and flexible heading formula in Proverbs, while 'sayings
    of' is possible but slightly more interpretive.
- source_word: אָגוּר
  chosen: Agur
  rationale: Personal name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: בִּן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: Standard genealogical marker. 'Son of' is the natural English equivalent.
- source_word: יָקֶה
  chosen: Jakeh
  rationale: Personal name, transliterated.
- source_word: הַמַּשָּׂא
  chosen: the oracle
  alternatives:
  - the burden
  - Massa
  lexicon: HALOT
  rationale: מַשָּׂא can denote an 'oracle' or prophetic utterance, and this sense
    fits the superscriptional style. Some take it as the proper name 'Massa' ('Agur
    son of Jakeh the Massaite' or similar), but the article favors the common noun
    reading here. The alternative is preserved in a footnote because the phrase is
    genuinely disputed.
- source_word: נְאֻם
  chosen: the declaration of
  alternatives:
  - the utterance of
  - the saying of
  lexicon: HALOT
  rationale: Formulaic noun used for a solemn pronouncement. 'Declaration' preserves
    the elevated, formal force without sounding archaic.
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  lexicon: HALOT
  rationale: גבר commonly denotes a man, sometimes with nuance of strength or vigor.
    Here 'the man' best matches the heading formula and avoids overreading the nuance.
- source_word: לְאִיתִיאֵל
  chosen: to Ithiel
  alternatives:
  - concerning Ithiel
  lexicon: HALOT
  rationale: The preposition ל most naturally means 'to' in this heading-like line,
    introducing the addressee. Because the syntax is difficult, a broader relational
    sense is possible, but 'to' is the least interpretive.
- source_word: לְאִיתִיאֵל
  chosen: to Ithiel
  alternatives:
  - concerning Ithiel
  lexicon: HALOT
  rationale: The repetition is retained as in the Hebrew rather than harmonized away,
    since it may be emphatic or part of the formal superscription.
- source_word: וְאֻכָל
  chosen: and Ucal
  alternatives:
  - and I am weary
  - and consumed
  lexicon: HALOT
  rationale: 'Pointed in the Masoretic Text as a proper name, which yields a coherent
    sequence of addressees: ''to Ithiel, to Ithiel and Ucal.'' Many interpreters instead
    repoint the consonants as a verbal clause (''I am weary''), but the MT proper-name
    reading is preserved in the main text and the alternative is footnoted due to
    the well-known difficulty.'
