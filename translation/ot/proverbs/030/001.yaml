theological_decisions:
- issue: Interpretation of the superscriptional phrase הַמַּשָּׂא
  chosen_reading: Read as common noun, 'the oracle,' not as the place-name/title 'Massa.'
  alternative_readings:
  - Read as proper name 'Massa' (e.g., 'Agur son of Jakeh of Massa' or 'the Massaite')
  rationale: This is primarily a lexical-syntactic decision rather than a doctrinal
    one. The presence of the article supports the common noun reading, and 'oracle'
    fits wisdom-superscription style. Because the alternative is longstanding and
    plausible, it is preserved in a footnote rather than suppressed.
  doctrine_reference: 'Translation philosophy §3: preserve theological/interpreive
    tension rather than resolve it without note.'
- issue: Interpretation of וְאֻכָל
  chosen_reading: Treat as the proper name 'Ucal' in line with the Masoretic pointing.
  alternative_readings:
  - Repoint as a verbal clause such as 'I am weary'
  rationale: The MT presents a name, and the translation follows the received Hebrew
    text in the main line. Since the alternative produces a very different sense and
    is widely discussed, it is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy §3: preserve genuine ambiguity with
    a footnote.'
