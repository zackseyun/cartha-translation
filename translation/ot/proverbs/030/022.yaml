id: PRO.30.22
reference: Proverbs 30:22
source:
  edition: WLC
  text: תַּֽחַת עֶ֭בֶד כִּ֣י יִמְל֑וֹךְ וְ֝/נָבָ֗ל כִּ֣י יִֽשְׂבַּֽע לָֽחֶם־־׃
translation:
  text: under a slave when he becomes king, and a fool when he is filled with bread,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "when he reigns" for "when he becomes king."
    reason: lexical_alternative
  - marker: b
    text: '"Bread" may also stand more broadly for "food."'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: under
  alternatives:
  - because of
  - beneath
  lexicon: HALOT
  rationale: In the larger saying (vv. 21–23), תַּחַת introduces the conditions under
    which the earth trembles. Rendering it as "under" preserves the idiom compactly
    in English and matches the repeated structure of the list.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: The Hebrew denotes a bonded servant/slave. Following the translation
    philosophy, "slave" is preferred where the bonded status is salient. In this proverb,
    the social inversion is the point, so "slave" is stronger and more precise than
    "servant."
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance in which the unsettling condition
    occurs. "When" is the most natural English rendering in this construction.
- source_word: יִמְלֹךְ
  chosen: he becomes king
  alternatives:
  - he reigns
  - he rules
  lexicon: HALOT
  rationale: The verb means "to reign, become king." "Becomes king" makes the social
    reversal vivid and idiomatic in English, fitting the proverb's focus on an unexpected
    rise to royal power.
- source_word: נָבָל
  chosen: fool
  alternatives:
  - senseless man
  - base man
  lexicon: HALOT
  rationale: נָבָל in wisdom literature commonly denotes a morally and socially foolish
    person, not merely someone unintelligent. "Fool" is the standard concise rendering
    and fits Proverbs usage.
- source_word: יִשְׂבַּע
  chosen: he is filled
  alternatives:
  - he is satisfied
  - he has his fill
  lexicon: HALOT
  rationale: The verb means to be sated or filled. "Is filled" preserves the concrete
    image and avoids overinterpreting whether the emphasis is satisfaction or excess.
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The Hebrew literally says "bread." Although it can stand metonymically
    for food, "bread" preserves the source image and remains natural in English.
