id: PRO.30.27
reference: Proverbs 30:27
source:
  edition: WLC
  text: מֶ֭לֶךְ אֵ֣ין לָ/אַרְבֶּ֑ה וַ/יֵּצֵ֖א חֹצֵ֣ץ כֻּלּֽ/וֹ׃
translation:
  text: The locusts have no king, yet all of them march out in ranks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they go out divided,' that is, arranged in bands or divisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: The noun plainly denotes a monarch or king. 'King' is the most direct
    and natural English equivalent in this proverb's animal comparison.
- source_word: אֵין
  chosen: have no
  alternatives:
  - there is no
  lexicon: HALOT
  rationale: 'With לָ/אַרְבֶּה, the construction expresses possession/existence: ''there
    is no king for the locust'' idiomatically becomes ''the locusts have no king''
    in English.'
- source_word: אַרְבֶּה
  chosen: the locusts
  alternatives:
  - the locust
  lexicon: HALOT
  rationale: 'Although morphologically singular, the noun is collective here, as shown
    by כֻּלּוֹ (''all of it/them'') and the proverb''s generic description of the
    species. English naturally renders the collective as plural: ''the locusts.'''
- source_word: וַיֵּצֵא
  chosen: yet all of them march out
  alternatives:
  - and it goes out
  - and they go out
  lexicon: HALOT
  rationale: 'The singular verb likely agrees with the collective singular אַרְבֶּה,
    but the sense is distributive/collective. ''March out'' captures the movement
    in a proverb about ordered swarming, and ''yet'' brings out the concessive force
    in context: despite having no king, they still proceed in order.'
- source_word: חֹצֵץ
  chosen: in ranks
  alternatives:
  - divided
  - in divisions
  - in bands
  lexicon: HALOT
  rationale: The participle conveys division/arrangement into sections. In context
    of locust movement, 'in ranks' is idiomatic English that preserves the image of
    ordered formation without overstating military precision.
- source_word: כֻּלּוֹ
  chosen: all of them
  alternatives:
  - all of it
  - the whole of it
  lexicon: HALOT
  rationale: Because אַרְבֶּה is a collective noun, the pronominal suffix can be rendered
    according to sense rather than strict form. 'All of them' communicates the collective
    totality of the swarm in natural English.
