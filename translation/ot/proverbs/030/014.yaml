- issue: Rendering of אָדָם in a generic-human context
  chosen_reading: mankind
  alternative_readings:
  - man
  - humanity
  rationale: The Hebrew is singular generic and refers to humankind rather than a
    specific male. 'Mankind' preserves the source's generic human reference while
    remaining gender-accurate per project policy. 'Humanity' is possible but slightly
    less formally aligned with the Hebrew singular.
