id: PRO.30.14
reference: Proverbs 30:14
source:
  edition: WLC
  text: דּ֤וֹר חֲרָב֣וֹת שִׁנָּי/ו֮ וּֽ/מַאֲכָל֪וֹת מְֽתַלְּעֹ֫תָ֥י/ו לֶ/אֱכֹ֣ל עֲנִיִּ֣ים
    מֵ/אֶ֑רֶץ וְ֝/אֶבְיוֹנִ֗ים מֵ/אָדָֽם׀׃פ
translation:
  text: a generation whose teeth are swords, and whose fangs are knives, to devour
    the poor from the earth and the needy from among mankind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the land' for 'from the earth.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from man'; here אָדָם is used generically for humankind.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  chosen: a generation
  alternatives:
  - there is a generation
  - a kind of people
  lexicon: HALOT
  rationale: דּוֹר commonly denotes a generation or class of people. In this proverb's
    series, the noun functions as an exclamatory identification of a type, so 'a generation'
    preserves the Hebrew terseness without adding more than necessary.
- source_word: חֲרָבוֹת
  chosen: swords
  alternatives:
  - daggers
  - blades
  lexicon: HALOT
  rationale: The plural of חֶרֶב normally means 'swords.' This keeps the violent metaphor
    vivid and concrete.
- source_word: שִׁנָּיו
  chosen: whose teeth
  alternatives:
  - its teeth
  - his teeth
  lexicon: HALOT
  rationale: The 3ms suffix refers back collectively to דּוֹר as a singular collective.
    English idiom prefers 'whose teeth' for a collective class of people.
- source_word: מַאֲכָלוֹת
  chosen: knives
  alternatives:
  - eating knives
  - cleavers
  lexicon: HALOT
  rationale: Though related to the root 'eat,' in context with teeth and devouring
    it denotes cutting implements. 'Knives' is the most natural English equivalent
    and preserves the parallel with 'swords.'
- source_word: מְתַלְּעֹתָיו
  chosen: whose fangs
  alternatives:
  - his jaw-teeth
  - its molars
  lexicon: HALOT
  rationale: The noun refers to jaw-teeth or fangs. 'Fangs' best conveys the predatory
    imagery in contemporary English and matches the violent metaphor.
- source_word: לֶאֱכֹל
  chosen: to devour
  alternatives:
  - to eat up
  - to consume
  lexicon: HALOT
  rationale: While the verb is literally 'to eat,' the context is metaphorical oppression
    of the vulnerable. 'Devour' communicates the predatory force without over-paraphrasing.
- source_word: עֲנִיִּים
  chosen: the poor
  alternatives:
  - the afflicted
  - the oppressed
  lexicon: HALOT
  rationale: עָנִי commonly denotes the poor or afflicted. Here socioeconomic vulnerability
    is foregrounded, so 'the poor' is the clearest rendering.
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In parallel with 'from among mankind,'
    the broader sense 'earth' fits the universalizing scope better than a specific
    territory.
- source_word: אֶבְיוֹנִים
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: To preserve the distinction from עֲנִיִּים, 'the needy' reflects אֶבְיוֹן
    well and maintains the Hebrew parallelism with slight semantic variation.
- source_word: מֵאָדָם
  chosen: from among mankind
  alternatives:
  - from man
  - from humanity
  lexicon: HALOT
  rationale: אָדָם here refers to humankind generally, not an individual male. Per
    the project's gender-accurate policy, 'mankind' preserves the generic human sense
    and the Hebrew's anthropological scope.
