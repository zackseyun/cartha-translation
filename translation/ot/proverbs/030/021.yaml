id: PRO.30.21
reference: Proverbs 30:21
source:
  edition: WLC
  text: תַּ֣חַת שָׁ֭לוֹשׁ רָ֣גְזָה אֶ֑רֶץ וְ/תַ֥חַת אַ֝רְבַּ֗ע לֹא תוּכַ֥ל שְׂאֵֽת־׃
translation:
  text: 'Under three things the earth trembles, and under four it cannot bear up:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cannot endure' / 'cannot bear it.' The Hebrew infinitive from נָשָׂא
      can express bearing, carrying, or enduring.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: under
  alternatives:
  - because of
  - beneath
  lexicon: HALOT
  rationale: In the numerical saying formula, תַּחַת introduces the circumstances
    or items under which something occurs. 'Under' preserves the Hebrew idiom while
    remaining natural in English.
- source_word: שָׁלוֹשׁ
  chosen: three things
  alternatives:
  - three
  lexicon: HALOT
  rationale: The Hebrew simply says 'three,' but English idiom benefits from supplying
    'things' in this proverb formula to make the count explicit.
- source_word: רָגְזָה
  chosen: trembles
  alternatives:
  - quakes
  - is agitated
  - shudders
  lexicon: HALOT
  rationale: The verb from רָגַז conveys shaking, trembling, or agitation. 'Trembles'
    is vivid and idiomatic here, matching the personified 'earth' without overstating
    into a literal earthquake.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the proverb personifies the earth in
    a broad, cosmic sense. 'The earth' best fits the saying's scope and traditional
    wisdom style.
- source_word: וְתַחַת
  chosen: and under
  alternatives:
  - even under
  - and because of
  lexicon: HALOT
  rationale: The conjunction plus repeated preposition continues the numerical parallelism.
    'And under' preserves the structure cleanly.
- source_word: אַרְבַּע
  chosen: four
  alternatives:
  - four things
  lexicon: HALOT
  rationale: The second number completes the standard 'three... four' numerical pattern
    in Hebrew wisdom literature. 'Four' is sufficient because 'things' is implied
    from the first colon.
- source_word: לֹא תוּכַל
  chosen: it cannot
  alternatives:
  - it is not able to
  - it cannot endure
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'earth.' 'It cannot' is the most
    natural English rendering of the modal construction.
- source_word: שְׂאֵת
  chosen: bear up
  alternatives:
  - endure
  - bear
  - carry
  lexicon: HALOT
  rationale: From נָשָׂא, the infinitive here expresses bearing or enduring. 'Bear
    up' captures the sense of sustaining a burden and fits the personified image of
    the earth unable to carry the weight of these situations.
