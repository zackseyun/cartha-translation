id: PRO.30.28
reference: Proverbs 30:28
source:
  edition: WLC
  text: שְׂ֭מָמִית בְּ/יָדַ֣יִם תְּתַפֵּ֑שׂ וְ֝/הִ֗יא בְּ/הֵ֣יכְלֵי מֶֽלֶךְ׃פ
translation:
  text: A lizard you can catch with your hands, yet it is in kings’ palaces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spider.' The Hebrew שְׂמָמִית is rare and uncertain; many traditional
      translations render it 'spider,' while others understand a kind of lizard or
      gecko.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂמָמִית
  chosen: lizard
  alternatives:
  - spider
  - gecko
  lexicon: HALOT
  rationale: The Hebrew term is rare and traditionally disputed. In this context among
    small creatures noted for surprising wisdom or success, a small wall-climbing
    reptile fits the image well, especially given its presence in palaces. 'Spider'
    is a long-standing traditional rendering, but the following clause about being
    caught with the hands and yet being found in royal palaces is more naturally associated
    with a lizard/gecko. 'Lizard' is the clearest general English rendering; 'gecko'
    is possible but more specific than the Hebrew warrants.
- source_word: בְּיָדַיִם
  chosen: with your hands
  alternatives:
  - by the hands
  - with hands
  lexicon: HALOT
  rationale: The preposition ב with 'hands' here expresses means or instrument. 'With
    your hands' is idiomatic modern English and preserves the concrete image.
- source_word: תְּתַפֵּשׂ
  chosen: you can catch
  alternatives:
  - you seize
  - it can be caught
  lexicon: HALOT
  rationale: 'The verb means to seize or grasp. Because the form is second masculine
    singular, the line addresses a generic observer: ''you can catch.'' This is more
    natural in English than a wooden ''you seize'' and preserves the proverb''s vivid
    directness.'
- source_word: וְהִיא
  chosen: yet it is
  alternatives:
  - and it is
  - but it is
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks a contrast between the creature's
    apparent insignificance and its presence in royal palaces. 'Yet it is' brings
    out the adversative sense naturally in English.
- source_word: בְּהֵיכְלֵי מֶלֶךְ
  chosen: in kings’ palaces
  alternatives:
  - in a king's palaces
  - in royal palaces
  - in the palaces of a king
  lexicon: HALOT
  rationale: The plural construct 'palaces of a king' is best rendered idiomatically
    as 'kings’ palaces,' expressing royal residences generally rather than one specific
    monarch. This keeps the proverb gnomic in force.
