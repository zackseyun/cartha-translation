id: PRO.30.15
reference: Proverbs 30:15
source:
  edition: WLC
  text: לַֽ/עֲלוּקָ֨ה שְׁתֵּ֥י בָנוֹת֮ הַ֤ב הַ֥ב שָׁל֣וֹשׁ הֵ֭נָּה לֹ֣א תִשְׂבַּ֑עְנָה
    אַ֝רְבַּ֗ע לֹא אָ֥מְרוּ הֽוֹן׀׀־׃
translation:
  text: 'The leech has two daughters: “Give, give.” Three things are never satisfied;
    four never say, “Enough”:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “For the leech there are two daughters.” The Hebrew opens with a topic-marking
      construction that can be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: “Give, give” may represent the daughters’ cry for more; some take it more
      interpretively as “More, more.”
    reason: lexical_alternative
  - marker: c
    text: Or, “four do not say, ‘It is enough.’” The final word is understood here
      as an idiom of sufficiency rather than the more common noun sense “wealth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲלוּקָה
  chosen: The leech
  alternatives:
  - For the leech
  - The bloodsucker
  lexicon: HALOT
  rationale: עֲלוּקָה denotes a leech. The prefixed ל is best taken here as introducing
    the topic ('as for the leech' / 'the leech has'), which idiomatic English renders
    simply as 'The leech.' 'Bloodsucker' is possible by sense but too interpretive
    for the main text.
- source_word: שְׁתֵּי בָנוֹת
  chosen: has two daughters
  alternatives:
  - two daughters belong to
  - two daughters
  lexicon: HALOT
  rationale: The Hebrew is verbless ('two daughters'), so English supplies 'has' for
    natural syntax. 'Daughters' is retained literally rather than paraphrased as 'offspring'
    or 'cries,' preserving the proverb's imagery.
- source_word: הַב הַב
  chosen: Give, give
  alternatives:
  - Give! Give!
  - More, more
  lexicon: HALOT
  rationale: From יהב/הבב as an imperative-like cry, the repeated form conveys insistent
    demand. 'Give, give' preserves the terseness and sound of the Hebrew better than
    the interpretive 'More, more.'
- source_word: שָׁלֹשׁ הֵנָּה לֹא תִשְׂבַּעְנָה
  chosen: Three things are never satisfied
  alternatives:
  - There are three that are not satisfied
  - Three of them are not satisfied
  lexicon: HALOT
  rationale: This is the standard numerical saying formula in Proverbs. Supplying
    'things' is idiomatic in English and prepares for the list in the following verse,
    while preserving the sense of the feminine plural pronoun and verb.
- source_word: אַרְבַּע לֹא אָמְרוּ הוֹן
  chosen: four never say, “Enough”
  alternatives:
  - four do not say, 'Wealth'
  - four do not say, 'Ho!'
  - four do not say, 'It is enough'
  lexicon: HALOT
  rationale: הוֹן here is best understood idiomatically as an exclamation meaning
    sufficiency/abundance ('enough'), not the common noun 'wealth.' The sense is that
    these four are insatiable. 'Enough' is the clearest modern English rendering;
    'It is enough' is slightly more formal but less concise.
