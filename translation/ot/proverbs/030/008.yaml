theological_decisions:
- issue: Interpretation of the prayer for provision in לֶחֶם חֻקִּי
  chosen_reading: a request for one's allotted or fitting portion of food, avoiding
    both deprivation and excess
  alternative_readings:
  - my daily bread
  rationale: The verse asks for measured provision between poverty and riches. Rendering
    חֻקִּי as 'allotted to me' preserves the wisdom theme of contentment with one's
    proper portion without importing later liturgical associations.
  doctrine_reference: Translation philosophy §1, §3, §6
