id: PRO.30.8
reference: Proverbs 30:8
source:
  edition: WLC
  text: שָׁ֤וְא וּֽ/דְבַר כָּזָ֡ב הַרְחֵ֬ק מִמֶּ֗/נִּי רֵ֣אשׁ וָ֭/עֹשֶׁר אַל תִּֽתֶּן
    לִ֑/י הַ֝טְרִיפֵ֗/נִי לֶ֣חֶם חֻקִּֽ/י׀־־־׃
translation:
  text: Keep falsehood and lying words far from me; give me neither poverty nor riches;
    feed me with the bread allotted to me,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deceitful speech' for 'lying words.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the bread of my portion'; alternatively, 'my portion of bread'
      or 'my daily bread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁוְא
  chosen: falsehood
  alternatives:
  - vanity
  - worthlessness
  - deceit
  lexicon: HALOT
  rationale: In parallel with 'lying words,' the term here most naturally denotes
    what is false or empty in a moral/verbal sense rather than mere 'vanity.' 'Falsehood'
    preserves the ethical force and fits the prayer context.
- source_word: דְבַר כָּזָב
  chosen: lying words
  alternatives:
  - a lying word
  - deceitful speech
  - false speech
  lexicon: HALOT
  rationale: The construct phrase is literally 'word of lie/falsehood.' The plural
    'lying words' is idiomatic in English and matches the broad category of deceptive
    speech being rejected, while preserving the Hebrew sense.
- source_word: הַרְחֵק מִמֶּנִּי
  chosen: Keep ... far from me
  alternatives:
  - put ... far from me
  - remove ... far from me
  lexicon: HALOT
  rationale: 'The Hiphil imperative of רחק is causative: ''make distant/remove.''
    ''Keep ... far from me'' is natural English in a prayer and captures the ongoing
    protective sense.'
- source_word: רֵאשׁ
  chosen: poverty
  alternatives:
  - destitution
  - need
  lexicon: HALOT
  rationale: The noun denotes poverty or impoverishment. 'Poverty' is the standard,
    clear rendering and pairs well with 'riches' in the balanced petition.
- source_word: עֹשֶׁר
  chosen: riches
  alternatives:
  - wealth
  lexicon: HALOT
  rationale: '''Riches'' preserves the concrete economic contrast with ''poverty''
    and reflects the traditional pairing without sounding archaic in this context.'
- source_word: אַל תִּתֶּן לִי
  chosen: give me neither
  alternatives:
  - do not give me
  lexicon: HALOT
  rationale: Because the negated verb governs the pair 'poverty and riches,' English
    idiom is best expressed as 'give me neither ... nor ...' rather than repeating
    the negation awkwardly.
- source_word: הַטְרִיפֵנִי
  chosen: feed me
  alternatives:
  - provide for me
  - give me to eat
  lexicon: HALOT
  rationale: From טרף in the Hiphil, the sense here is to supply food/provision. 'Feed
    me' is concise and idiomatic, fitting the prayer for daily provision.
- source_word: לֶחֶם חֻקִּי
  chosen: the bread allotted to me
  alternatives:
  - my portion of bread
  - the food appointed for me
  - my daily bread
  lexicon: HALOT
  rationale: Literally 'bread of my portion/allotment.' 'The bread allotted to me'
    preserves the metaphor of bread while conveying the idea of an assigned portion.
    'My daily bread' is possible but imports familiar NT phrasing not explicit here.
