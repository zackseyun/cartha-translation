id: PRO.1.17
reference: Proverbs 1:17
source:
  edition: WLC
  text: כִּֽי חִ֭נָּם מְזֹרָ֣ה הָ/רָ֑שֶׁת בְּ֝/עֵינֵ֗י כָל בַּ֥עַל כָּנָֽף־־׃
translation:
  text: For the net is spread in vain in the sight of any bird.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'any possessor of wing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the rationale for the preceding warning, so 'For'
    best captures its explanatory force in context.
- source_word: חִנָּם
  chosen: in vain
  alternatives:
  - for nothing
  - gratuitously
  - without cause
  lexicon: HALOT
  rationale: The adverb denotes uselessness or futility here. 'In vain' is idiomatic
    English and fits the proverb's image of a pointless act.
- source_word: מְזֹרָה
  chosen: is spread
  alternatives:
  - is scattered
  - is winnowed/spread out
  lexicon: HALOT
  rationale: From זרה in the passive participial form, the sense in context is of
    a net being spread out. 'Is spread' is the natural English rendering for a net.
- source_word: הָרָשֶׁת
  chosen: the net
  alternatives:
  - the mesh
  - the trap-net
  lexicon: HALOT
  rationale: רֶשֶׁת refers specifically to a net. 'The net' is the standard and clearest
    rendering in this hunting metaphor.
- source_word: בְּעֵינֵי
  chosen: in the sight of
  alternatives:
  - before the eyes of
  - in the eyes of
  lexicon: HALOT
  rationale: The idiom literally means 'in the eyes of,' but in English 'in the sight
    of' better conveys visible presence without implying evaluation.
- source_word: כָל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: With the singular collective expression that follows, 'any bird' is idiomatic
    English and conveys the generic force of the Hebrew.
- source_word: בַּעַל כָּנָף
  chosen: bird
  alternatives:
  - winged creature
  - owner of a wing
  lexicon: HALOT
  rationale: Literally 'possessor of wing,' an idiom for a bird or winged creature.
    'Bird' is the natural equivalent in this proverb and preserves the intended image
    succinctly.
