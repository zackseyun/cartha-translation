id: PRO.1.10
reference: Proverbs 1:10
source:
  edition: WLC
  text: בְּנִ֡/י אִם יְפַתּ֥וּ/ךָ חַ֝טָּאִ֗ים אַל תֹּבֵֽא־־׃
translation:
  text: My son, if sinners entice you, do not consent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not yield' / 'do not be willing.' The Hebrew verb means to be willing
      or to consent.
    reason: lexical_alternative
  - marker: b
    text: '''My son'' preserves the masculine singular form of the Hebrew; the address
      is a fatherly wisdom appeal.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - My child
  lexicon: HALOT
  rationale: Vocative address from a father/teacher to a male son. Following the gender-accurate
    principle, the masculine singular is preserved as 'son' rather than neutralizing
    to 'child,' though 'child' is a possible contextual alternative in wisdom literature.
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Standard conditional particle introducing a hypothetical situation.
- source_word: יְפַתּוּךָ
  chosen: entice you
  alternatives:
  - persuade you
  - seduce you
  lexicon: HALOT
  rationale: Piel of פתה commonly conveys enticement or persuasion toward a course
    of action, often with a negative moral sense. 'Entice' best captures the warning
    context and the manipulative force without oversexualizing the verb.
- source_word: חַטָּאִים
  chosen: sinners
  alternatives:
  - sinful men
  lexicon: HALOT
  rationale: Substantival plural meaning those characterized by sin. 'Sinners' is
    the most natural and direct English equivalent.
- source_word: אַל
  chosen: do not
  lexicon: HALOT
  rationale: Negative particle used with the following jussive/imperfect to express
    prohibition.
- source_word: תֹּבֵא
  chosen: consent
  alternatives:
  - yield
  - be willing
  lexicon: HALOT
  rationale: From אבה, 'to be willing, consent.' In this context the warning is not
    merely against hearing them but against inward agreement or yielding to their
    invitation. 'Consent' is the established and semantically precise rendering.
