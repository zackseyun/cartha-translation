theological_decisions:
- issue: Personification of Wisdom
  chosen_reading: Retain Wisdom as a feminine singular personification without converting
    the line into a generic abstraction.
  alternative_readings:
  - Translate more abstractly as 'wisdom calls' without emphasizing personification
  rationale: The feminine singular verbal forms and pronominal suffix present Wisdom
    as a literary figure speaking publicly. Preserving this personification is important
    for the rhetoric of Proverbs and does not require importing later doctrinal identifications
    beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
