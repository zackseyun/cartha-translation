id: PRO.1.20
reference: Proverbs 1:20
source:
  edition: WLC
  text: חָ֭כְמוֹת בַּ/ח֣וּץ תָּרֹ֑נָּה בָּ֝/רְחֹב֗וֹת תִּתֵּ֥ן קוֹלָֽ/הּ׃
translation:
  text: Wisdom cries aloud in the street; in the squares she gives her voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'Wisdom calls out in the street; in the squares she
      raises her voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמוֹת
  chosen: Wisdom
  alternatives:
  - wisdoms
  lexicon: HALOT
  rationale: Although morphologically plural, the noun functions here as a personified
    singular/abstract, as shown by the following feminine singular verbs. Rendering
    it as singular 'Wisdom' preserves the literary personification central to Proverbs
    1.
- source_word: בַּחוּץ
  chosen: in the street
  alternatives:
  - outside
  - in the open
  lexicon: HALOT
  rationale: The term denotes the outside/public space in contrast to private interiors.
    'In the street' gives a natural English expression that fits the parallel with
    'in the squares' and preserves the public setting.
- source_word: תָּרֹנָּה
  chosen: cries aloud
  alternatives:
  - calls out
  - shouts
  - sings out
  lexicon: HALOT
  rationale: From רנן, which can denote ringing out, crying aloud, or jubilant vocalization
    depending on context. Here the public summons of personified Wisdom favors 'cries
    aloud' over the more celebratory 'sings out,' while retaining vividness stronger
    than a flat 'calls'.
- source_word: בָּרְחֹבוֹת
  chosen: in the squares
  alternatives:
  - in the open plazas
  - in the broad places
  - in the streets
  lexicon: HALOT
  rationale: The noun refers to broad public places or plazas within a town. 'Squares'
    is concise, idiomatic modern English and preserves the parallelism with the previous
    public locale.
- source_word: תִּתֵּן קוֹלָהּ
  chosen: she gives her voice
  alternatives:
  - she raises her voice
  - she lifts up her voice
  - she makes her voice heard
  lexicon: HALOT
  rationale: Literally 'she gives her voice.' The chosen rendering keeps the Hebrew
    idiom relatively transparent while remaining understandable in English. A more
    idiomatic alternative is worth preserving in a footnote because many English readers
    will expect 'raises/lifts her voice.'
