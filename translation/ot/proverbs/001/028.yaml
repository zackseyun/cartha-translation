id: PRO.1.28
reference: Proverbs 1:28
source:
  edition: WLC
  text: אָ֣ז יִ֭קְרָאֻ/נְנִי וְ/לֹ֣א אֶֽעֱנֶ֑ה יְ֝שַׁחֲרֻ֗/נְנִי וְ/לֹ֣א יִמְצָאֻֽ/נְנִי׃
translation:
  text: Then they will call on me, but I will not answer; they will seek me diligently,
    but they will not find me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will seek me early' or 'they will seek me earnestly.' The Hebrew
      verb can carry the idea of early, eager seeking.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequence that follows the prior warning.
    'Then' is concise and natural in English while preserving the sequence.
- source_word: יִקְרָאֻנְנִי
  chosen: they will call on me
  alternatives:
  - they will call to me
  - they will invoke me
  lexicon: HALOT
  rationale: From קרא, here in the sense of calling out to someone for response or
    help. 'Call on me' fits idiomatic English and the context of urgent appeal better
    than the more wooden 'call to me.'
- source_word: וְלֹא אֶעֱנֶה
  chosen: but I will not answer
  alternatives:
  - and I will not answer
  lexicon: HALOT
  rationale: The conjunction plus negation introduces a stark contrast between their
    calling and Wisdom's refusal. English 'but' brings out the adversative force naturally,
    though the Hebrew conjunction is formally 'and.'
- source_word: יְשַׁחֲרֻנְנִי
  chosen: they will seek me diligently
  alternatives:
  - they will seek me early
  - they will seek me earnestly
  lexicon: HALOT
  rationale: From שׁחר in the Piel, often conveying earnest or early seeking. In this
    wisdom context the emphasis is intensity and eagerness rather than time of day
    alone, so 'seek me diligently' best captures the sense for modern readers.
- source_word: וְלֹא יִמְצָאֻנְנִי
  chosen: but they will not find me
  alternatives:
  - and they will not find me
  lexicon: HALOT
  rationale: From מצא, straightforwardly 'find.' As in the previous clause, 'but'
    communicates the contrastive result in idiomatic English.
