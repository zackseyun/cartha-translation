theological_decisions:
- issue: Speaker reference in context
  chosen_reading: Retain first-person speech as Wisdom speaking metaphorically/personally
    within Proverbs, without importing later christological identification into the
    translation.
  alternative_readings:
  - Read the speaker typologically as divine Wisdom pointing beyond the immediate
    literary figure
  rationale: The verse itself is part of Wisdom's speech in Proverbs 1. The translation
    should preserve the literary voice of the Hebrew text and not resolve broader
    theological interpretations in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
