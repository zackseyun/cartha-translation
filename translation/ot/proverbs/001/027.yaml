id: PRO.1.27
reference: Proverbs 1:27
source:
  edition: WLC
  text: בְּ/בֹ֤א כ/שאוה פַּחְדְּ/כֶ֗ם וְֽ֭/אֵידְ/כֶם כְּ/סוּפָ֣ה יֶאֱתֶ֑ה בְּ/בֹ֥א
    עֲ֝לֵי/כֶ֗ם צָרָ֥ה וְ/צוּקָֽה׀׃
translation:
  text: when your dread comes like a storm, and your calamity arrives like a whirlwind,
    when distress and anguish come upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like devastation' for 'like a storm'; the Hebrew term can emphasize
      destructive ruin as well as the crashing force of a storm.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבֹא
  chosen: when ... comes
  alternatives:
  - at the coming of
  - as ... comes
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of בוא introduces a temporal
    clause. 'When ... comes' is idiomatic modern English and preserves the temporal
    force without awkward literalism.
- source_word: כְּשָׁאוָה
  chosen: like a storm
  alternatives:
  - like devastation
  - like ruin
  lexicon: HALOT
  rationale: The noun denotes destructive crashing or devastation. In parallel with
    'whirlwind' and the imagery of sudden disaster, 'storm' best captures the vivid
    metaphor in readable English. The comparative כ is preserved with 'like'.
- source_word: פַּחְדְּכֶם
  chosen: your dread
  alternatives:
  - your fear
  - the thing you dread
  lexicon: HALOT
  rationale: The noun פחד can denote fear or dread. 'Your dread' fits the context
    of impending judgment and avoids ambiguity between the emotion and its object
    while staying close to the Hebrew.
- source_word: וְאֵידְכֶם
  chosen: and your calamity
  alternatives:
  - and your disaster
  - and your ruin
  lexicon: HALOT
  rationale: איד commonly refers to disaster or calamity. 'Calamity' is a natural
    English equivalent and matches the elevated but accessible tone of wisdom literature.
- source_word: כְּסוּפָה
  chosen: like a whirlwind
  alternatives:
  - like a stormwind
  - like a tempest
  lexicon: HALOT
  rationale: סוּפָה refers to a violent windstorm or whirlwind. 'Whirlwind' preserves
    the force and poetic parallelism with the previous storm image.
- source_word: יֶאֱתֶה
  chosen: arrives
  alternatives:
  - comes
  - sweeps in
  lexicon: HALOT
  rationale: The verb denotes coming or arriving. 'Arrives' provides slight variation
    in English while preserving the sense of sudden onset in parallel with the first
    colon.
- source_word: עֲלֵיכֶם
  chosen: upon you
  alternatives:
  - on you
  - against you
  lexicon: HALOT
  rationale: The preposition על in this context marks adversity coming upon someone.
    'Upon you' is idiomatic and preserves the elevated poetic register.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - trouble
  - affliction
  lexicon: HALOT
  rationale: צָרָה often denotes trouble or distress. 'Distress' fits the parallelism
    with צוּקָה and maintains the emotional pressure conveyed by the pair.
- source_word: וְצוּקָה
  chosen: and anguish
  alternatives:
  - and distress
  - and adversity
  lexicon: HALOT
  rationale: צוּקָה conveys straits, pressure, or anguish. 'Anguish' differentiates
    it from צָרָה while preserving the semantic overlap typical of Hebrew poetic parallelism.
