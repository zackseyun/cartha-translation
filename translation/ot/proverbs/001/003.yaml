id: PRO.1.3
reference: Proverbs 1:3
source:
  edition: WLC
  text: לָ֭/קַחַת מוּסַ֣ר הַשְׂכֵּ֑ל צֶ֥דֶק וּ֝/מִשְׁפָּ֗ט וּ/מֵישָׁרִֽים׃
translation:
  text: to receive instruction in wise dealing, righteousness, justice, and equity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to take discipline in prudence'; the Hebrew allows 'receive' or more
      literally 'take,' and מוסר may also be rendered 'discipline.'
    reason: lexical_alternative
  - marker: b
    text: '''Wise dealing'' translates a term for practical prudence or skill in living,
      not merely intellectual understanding.'
    reason: lexical_alternative
  - marker: c
    text: Or 'uprightness' for 'equity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקַחַת
  chosen: to receive
  alternatives:
  - to take
  lexicon: HALOT
  rationale: The infinitive construct expresses purpose in the series begun in Proverbs
    1:2–3. Although the verb basically means 'to take,' in wisdom contexts with מוסר
    the idiomatic sense is 'to receive' or 'accept,' which is more natural in English
    and fits the pedagogical context.
- source_word: מוּסַר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסַר can denote discipline, correction, or instruction. Here, in the
    programmatic opening of Proverbs and paired with השׂכל, it refers to formative
    moral training. 'Instruction' best captures the broad educational sense while
    avoiding an overly punitive nuance; 'discipline' remains a viable alternative.
- source_word: הַשְׂכֵּל
  chosen: wise dealing
  alternatives:
  - prudence
  - insight
  - understanding
  lexicon: HALOT
  rationale: This noun denotes prudence or skill in acting wisely, not merely abstract
    cognition. 'Wise dealing' preserves the practical, behavioral dimension and matches
    wisdom-literature usage better than the more static 'understanding.'
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צדק commonly denotes righteousness or what is right. In this triad with
    משפט and מישרים, rendering it as 'righteousness' preserves distinction from 'justice'
    for משפט while retaining the ethical sense.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: משפט here refers to just judgment or justice as a social-legal norm.
    'Justice' is the clearest modern English rendering in this ethical list.
- source_word: מֵישָׁרִים
  chosen: equity
  alternatives:
  - uprightness
  - what is fair
  - straightforwardness
  lexicon: HALOT
  rationale: The plural noun conveys straightness/uprightness in an ethical sense.
    'Equity' works well in English alongside 'righteousness' and 'justice,' preserving
    the triadic moral vocabulary without redundancy.
