id: PRO.1.33
reference: Proverbs 1:33
source:
  edition: WLC
  text: וְ/שֹׁמֵ֣עַֽ לִ֭/י יִשְׁכָּן בֶּ֑טַח וְ֝/שַׁאֲנַ֗ן מִ/פַּ֥חַד רָעָֽה־׃פ
translation:
  text: But whoever listens to me will dwell securely and be at ease, without fear
    of disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the one who hears me will dwell in safety and be undisturbed by
      the dread of calamity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֹׁמֵעַ
  chosen: But whoever listens
  alternatives:
  - And the one who hears
  - But he who listens
  lexicon: HALOT
  rationale: The participle of שׁמע denotes ongoing responsiveness, not mere auditory
    perception. 'Listens' better captures heedful hearing in wisdom literature. The
    prefixed conjunction is rendered adversatively as 'But' because the verse contrasts
    with the fate of those who refuse wisdom in the preceding context.
- source_word: לִי
  chosen: to me
  alternatives:
  - me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix is naturally expressed in English
    as 'to me' after 'listens.' The speaker is personified Wisdom.
- source_word: יִשְׁכָּן
  chosen: will dwell
  alternatives:
  - will live
  - will abide
  lexicon: HALOT
  rationale: שׁכן commonly means 'dwell' or 'settle down.' 'Dwell' preserves the habitation/rest
    nuance better than the broader 'live.'
- source_word: בֶּטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: בטח conveys security, safety, and confidence. 'Securely' works idiomatically
    with 'dwell' in modern English while preserving the sense of safety.
- source_word: וְשַׁאֲנַן
  chosen: and be at ease
  alternatives:
  - and be undisturbed
  - and be quiet
  - and be complacent
  lexicon: HALOT
  rationale: The verb/adjectival form from שׁאנ conveys quiet ease or undisturbed
    tranquility here. 'Be at ease' fits the positive promise context better than 'complacent,'
    which would import a negative sense not warranted in this verse.
- source_word: מִפַּחַד
  chosen: without fear of
  alternatives:
  - from the dread of
  - away from fear of
  lexicon: HALOT
  rationale: The preposition מן with פחד can denote separation from or freedom from
    fear/dread. In idiomatic English, 'without fear of' clearly expresses the promised
    freedom from dread.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  - harm
  lexicon: HALOT
  rationale: In this wisdom context, רעה refers to harmful calamity or disaster rather
    than moral evil. 'Disaster' communicates the concrete threatening event feared
    by the hearer.
