theological_decisions:
- issue: Gender representation in the participial subject
  chosen_reading: whoever listens
  alternative_readings:
  - he who listens
  - the one who listens
  rationale: Although the Hebrew participle is grammatically masculine singular, it
    functions generically in wisdom instruction. Rendering it as 'whoever listens'
    preserves the representative force without implying male-only application, consistent
    with the translation philosophy's gender-accurate principle.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Personified Wisdom as speaker
  chosen_reading: Retain first-person speech without interpretive expansion
  alternative_readings:
  - to wisdom
  - to me, Wisdom
  rationale: The verse continues Wisdom's direct speech from the surrounding context.
    The translation preserves the first-person pronoun rather than inserting an explanatory
    gloss into the main text, avoiding interpretive expansion beyond the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
