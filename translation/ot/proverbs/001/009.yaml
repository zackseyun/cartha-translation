id: PRO.1.9
reference: Proverbs 1:9
source:
  edition: WLC
  text: כִּ֤י לִוְיַ֤ת חֵ֓ן הֵ֬ם לְ/רֹאשֶׁ֑/ךָ וַ֝/עֲנָקִ֗ים לְ/גַרְגְּרֹתֶֽי/ךָ׀׃
translation:
  text: for they are a graceful wreath for your head and necklaces for your neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a garland of favor' for your head.
    reason: lexical_alternative
  - marker: b
    text: Or 'chains' for your neck.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding exhortation in vv. 8–9. 'For'
    is the most natural English connective here.
- source_word: לִוְיַת
  chosen: wreath
  alternatives:
  - garland
  - wreathing
  lexicon: HALOT
  rationale: The noun denotes something wound around or entwined. In context with
    'head,' 'wreath' communicates an ornamental circlet better than the more abstract
    'wreathing.' 'Garland' is possible, but 'wreath' is slightly more direct and idiomatic
    with 'for your head.'
- source_word: חֵן
  chosen: graceful
  alternatives:
  - grace
  - favor
  - beauty
  lexicon: HALOT
  rationale: Here חֵן qualifies the ornament as attractive or lovely. Rendering adjectivally
    as 'graceful' produces natural English with 'wreath' while preserving the sense
    of charm/beauty rather than theological 'grace' in a doctrinal sense.
- source_word: הֵם
  chosen: they are
  alternatives:
  - they
  lexicon: HALOT
  rationale: 'Refers back to the father''s instruction and mother''s teaching in the
    previous verse. English requires the copula for a smooth nominal clause: ''they
    are.'''
- source_word: לְרֹאשֶׁךָ
  chosen: for your head
  alternatives:
  - on your head
  - for your head
  lexicon: HALOT
  rationale: The preposition ל here marks relation or adornment. 'For your head' is
    a close rendering and idiomatic with 'wreath'; 'on your head' is also possible
    but slightly more interpretive.
- source_word: וַעֲנָקִים
  chosen: and necklaces
  alternatives:
  - and a necklace
  - and chains
  - and pendants
  lexicon: HALOT
  rationale: The plural form is best represented as 'necklaces.' Some English versions
    use singular for a collective sense, but the Hebrew plural should be preserved
    unless English demands otherwise. 'Chains' is possible, but 'necklaces' better
    conveys ornamental adornment in parallel with 'wreath.'
- source_word: לְגַרְגְּרֹתֶיךָ
  chosen: for your neck
  alternatives:
  - for your throat
  - around your neck
  lexicon: HALOT
  rationale: Though the Hebrew term can refer more literally to the throat/neck area,
    'neck' is the natural English term in the context of jewelry. 'Throat' would sound
    awkward and overly literal here.
