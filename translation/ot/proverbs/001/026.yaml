id: PRO.1.26
reference: Proverbs 1:26
source:
  edition: WLC
  text: גַּם אֲ֭נִי בְּ/אֵידְ/כֶ֣ם אֶשְׂחָ֑ק אֶ֝לְעַ֗ג בְּ/בֹ֣א פַחְדְּ/כֶֽם־׃
translation:
  text: I also will laugh at your calamity; I will mock when your dread comes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your terror' or 'what you dread comes.' The Hebrew term can refer either
      to fear/terror itself or to the dreaded event that arrives.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: 'Marks addition/emphasis: wisdom''s response corresponds to the hearers''
    prior refusal. ''Also'' is natural English and preserves the adversative-retaliatory
    force without overtranslating.'
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit pronoun is retained for emphasis in Hebrew; English naturally
    includes 'I' with the verb.
- source_word: בְּאֵידְכֶם
  chosen: at your calamity
  alternatives:
  - in your disaster
  - at your ruin
  lexicon: HALOT
  rationale: אֵיד denotes disaster, calamity, or ruin. 'Calamity' is idiomatic with
    'laugh at' in English and preserves the severity without sounding overly wooden.
    The preposition ב here is rendered idiomatically as 'at' with the verb 'laugh.'
- source_word: אֶשְׂחָק
  chosen: will laugh
  alternatives:
  - will laugh aloud
  lexicon: HALOT
  rationale: Basic sense of שׂחק in Qal is 'laugh.' Future sense is conveyed with
    'will laugh.' No need to intensify beyond the source.
- source_word: אֶלְעַג
  chosen: will mock
  alternatives:
  - will deride
  - will scoff
  lexicon: HALOT
  rationale: לעג carries the sense of mocking or deriding. 'Mock' is clear modern
    English and pairs well with 'laugh' while preserving the parallelism.
- source_word: בְּבֹא
  chosen: when ... comes
  alternatives:
  - at the coming of
  - as ... comes
  lexicon: HALOT
  rationale: 'The infinitive construct of בוא with prefixed ב is temporal: ''when/at
    the coming of.'' ''When ... comes'' is the most natural English rendering.'
- source_word: פַחְדְּכֶם
  chosen: your dread
  alternatives:
  - your terror
  - what you dread
  - your fear
  lexicon: HALOT
  rationale: פחד can denote fear, terror, or the object/event causing dread. Here,
    in parallel with 'calamity' and followed by 'comes,' it likely refers to the dreaded
    event or terror arriving. 'Your dread' preserves the ambiguity better than 'your
    fear' and is more natural than 'what you dread' in the main text.
