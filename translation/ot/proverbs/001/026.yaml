theological_decisions:
- issue: Tone of personified Wisdom's response to the foolish
  chosen_reading: Render the verbs straightforwardly as 'laugh' and 'mock' without
    softening them into mere irony or satisfaction.
  alternative_readings:
  - I will smile at your calamity
  - I will rejoice over your disaster
  rationale: The Hebrew uses strong verbs of laughter and mockery in judicial wisdom
    context. Softening would understate the warning; intensifying to 'rejoice over'
    would go beyond the lexical data. The verse presents personified Wisdom's retributive
    response, and the translation should preserve that tension without doctrinal smoothing.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
