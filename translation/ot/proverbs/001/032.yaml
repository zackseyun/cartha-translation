id: PRO.1.32
reference: Proverbs 1:32
source:
  edition: WLC
  text: כִּ֤י מְשׁוּבַ֣ת פְּתָיִ֣ם תַּֽהַרְגֵ֑/ם וְ/שַׁלְוַ֖ת כְּסִילִ֣ים תְּאַבְּדֵֽ/ם׃
translation:
  text: For the turning away of the simple will kill them, and the complacency of
    fools will destroy them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because the waywardness of the simple will kill them, and the ease/security
      of fools will destroy them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding warning. 'For' preserves
    the proverb's connective, explanatory force in concise English.
- source_word: מְשׁוּבַת
  chosen: turning away
  alternatives:
  - apostasy
  - backsliding
  - waywardness
  lexicon: HALOT
  rationale: The noun denotes turning back/defection. 'Turning away' is clear modern
    English and preserves the active sense of deviating from wisdom without importing
    later doctrinal overtones that 'apostasy' might suggest. 'Backsliding' is traditional
    but more ecclesiastical.
- source_word: פְּתָיִם
  chosen: the simple
  alternatives:
  - the naive
  - the inexperienced
  lexicon: HALOT
  rationale: In Proverbs this term refers to the gullible or morally unformed. 'The
    simple' is a standard wisdom-term in English and preserves the category without
    overstating intellectual deficiency.
- source_word: תַּהַרְגֵם
  chosen: will kill them
  alternatives:
  - will slay them
  lexicon: HALOT
  rationale: From הרג, a straightforward verb of killing. 'Will kill them' is natural
    modern English and keeps the stark consequence expressed by the Hebrew.
- source_word: וְשַׁלְוַת
  chosen: and the complacency of
  alternatives:
  - and the ease of
  - and the security of
  - and the prosperity of
  lexicon: HALOT
  rationale: שַׁלְוָה can denote ease, quiet security, or complacent ease. In this
    context of fools ignoring wisdom, 'complacency' best captures the morally dangerous
    sense of self-satisfied security.
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - stupid ones
  lexicon: HALOT
  rationale: Standard wisdom-literature term for the morally obstinate and dull, not
    merely intellectually deficient. 'Fools' is the established and accurate rendering.
- source_word: תְּאַבְּדֵם
  chosen: will destroy them
  alternatives:
  - will ruin them
  - will cause them to perish
  lexicon: HALOT
  rationale: From אבד in the Piel, expressing causing destruction/ruin. 'Will destroy
    them' matches the severity and parallels 'will kill them' in the first colon.
