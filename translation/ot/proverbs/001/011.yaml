theological_decisions:
- issue: Moral characterization of the victim in wisdom instruction
  chosen_reading: the innocent
  alternative_readings:
  - the blameless
  - an innocent person
  rationale: The verse condemns unjust violence by explicitly identifying the target
    as innocent. The translation preserves this ethical force without importing additional
    doctrinal claims.
  doctrine_reference: 'Translation philosophy: preserve the source''s plain sense;
    do not import doctrinal claims the text does not make.'
