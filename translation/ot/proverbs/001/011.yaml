id: PRO.1.11
reference: Proverbs 1:11
source:
  edition: WLC
  text: אִם יֹאמְרוּ֮ לְכָ֪/ה אִ֫תָּ֥/נוּ נֶאֶרְבָ֥ה לְ/דָ֑ם נִצְפְּנָ֖ה לְ/נָקִ֣י
    חִנָּֽם־׃
translation:
  text: If they say, “Come with us, let us lie in wait for blood; let us ambush the
    innocent without cause,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “let us hide ourselves for the innocent without cause.” The Hebrew verb
      can more literally mean “hide ourselves,” but in this context it carries the
      sense of lying concealed in order to ambush.
    reason: lexical_alternative
  - marker: b
    text: “For blood” is a terse Hebrew expression for violent bloodshed or murder.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional scenario in the father's warning. 'If' best
    preserves the straightforward conditional force here.
- source_word: יֹאמְרוּ
  chosen: they say
  alternatives:
  - they say to you
  - they tell
  lexicon: HALOT
  rationale: Qal imperfect 3mp of אמר, introducing the speech of the sinners. English
    present 'say' works naturally after conditional 'If' in instructional discourse.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Go
  - Come along
  lexicon: HALOT
  rationale: Idiomatic imperative inviting the son to join them. 'Come' is the standard
    and concise rendering; the following 'with us' supplies the full sense.
- source_word: אִתָּנוּ
  chosen: with us
  alternatives:
  - along with us
  lexicon: HALOT
  rationale: Explicitly marks participation with the group; retained for clarity and
    fidelity.
- source_word: נֶאֶרְבָה
  chosen: let us lie in wait
  alternatives:
  - let us lurk
  - let us set an ambush
  lexicon: HALOT
  rationale: From ארב, the standard idiom for ambush or lying in wait. 'Lie in wait'
    preserves the predatory, premeditated sense and matches wisdom-literature diction.
- source_word: לְדָם
  chosen: for blood
  alternatives:
  - for bloodshed
  - to shed blood
  lexicon: HALOT
  rationale: Literally 'for blood.' In context it implies murderous violence, but
    'for blood' preserves the Hebrew terseness and menace without over-paraphrasing.
    The sense is not merely injury but lethal intent.
- source_word: נִצְפְּנָה
  chosen: let us ambush
  alternatives:
  - let us hide ourselves
  - let us lie concealed
  lexicon: HALOT
  rationale: From צפן in this context of concealed attack. Although the root can mean
    'hide' or 'store up,' here the object and parallelism with 'lie in wait' support
    an ambush sense rather than simple concealment.
- source_word: לְנָקִי
  chosen: the innocent
  alternatives:
  - the blameless
  - an innocent person
  lexicon: HALOT
  rationale: Adjective functioning substantivally. 'The innocent' is natural English
    and preserves the moral characterization of the intended victim.
- source_word: חִנָּם
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  - without reason
  lexicon: HALOT
  rationale: Adverb indicating lack of justification. 'Without cause' is idiomatic
    modern English and clearly conveys the moral perversity of attacking one who has
    done nothing to deserve it.
