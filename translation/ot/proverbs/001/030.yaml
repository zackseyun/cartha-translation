id: PRO.1.30
reference: Proverbs 1:30
source:
  edition: WLC
  text: לֹא אָב֥וּ לַ/עֲצָתִ֑/י נָ֝אֲצ֗וּ כָּל תּוֹכַחְתִּֽ/י־־׃
translation:
  text: They were unwilling to accept my counsel; they despised all my reproof.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They would not accept my counsel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they spurned all my correction' or 'all my rebuke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: were unwilling ... not
  alternatives:
  - did not
  - would not
  lexicon: HALOT
  rationale: Standard negation. In English it is expressed with the following verb
    phrase rather than as a standalone word.
- source_word: אָבוּ
  chosen: were unwilling
  alternatives:
  - would not
  - refused
  lexicon: HALOT
  rationale: From אבה, expressing unwillingness or refusal. 'Were unwilling' preserves
    the volitional nuance clearly; 'refused' is possible but slightly more active
    than the Hebrew requires.
- source_word: לַעֲצָתִי
  chosen: to accept my counsel
  alternatives:
  - for my counsel
  - to my counsel
  - my advice
  lexicon: HALOT
  rationale: עֵצָה means counsel/advice. Because English idiom requires a complement
    after 'were unwilling,' 'to accept my counsel' makes explicit the implied response
    to the counsel without adding substantial content. 'Counsel' is preferred over
    'advice' because it better fits Wisdom's solemn speech.
- source_word: נָאֲצוּ
  chosen: despised
  alternatives:
  - spurned
  - rejected
  - treated with contempt
  lexicon: HALOT
  rationale: The verb carries the sense of contemptuous rejection. 'Despised' is concise,
    natural, and preserves the strong evaluative force.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Straightforward quantifier; 'all' is the most natural rendering before
    a singular collective noun in English.
- source_word: תּוֹכַחְתִּי
  chosen: my reproof
  alternatives:
  - my correction
  - my rebuke
  - my warning
  lexicon: HALOT
  rationale: תּוֹכַחַת denotes reproof/rebuke/correction. 'Reproof' best matches the
    wisdom-literature register and keeps the disciplinary verbal force without becoming
    overly colloquial.
