id: PRO.1.2
reference: Proverbs 1:2
source:
  edition: WLC
  text: לָ/דַ֣עַת חָכְמָ֣ה וּ/מוּסָ֑ר לְ֝/הָבִ֗ין אִמְרֵ֥י בִינָֽה׃
translation:
  text: to know wisdom and instruction, to understand words of insight,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discipline' for 'instruction' (מוּסָר), emphasizing corrective training
      as well as teaching.
    reason: lexical_alternative
  - marker: b
    text: Or 'sayings of understanding' / 'sayings of discernment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָדַעַת
  chosen: to know
  alternatives:
  - for knowing
  lexicon: HALOT
  rationale: The prefixed ל with infinitive construct expresses purpose in the prologue
    sequence (vv. 2–6). 'To know' is idiomatic and preserves the infinitival purpose
    sense without over-paraphrasing.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Proverbs, denoting practical and moral
    wisdom rather than mere intelligence.
- source_word: מוּסָר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסָר can denote discipline or corrective training, but in this programmatic
    statement for the book, 'instruction' best captures the broad pedagogical sense
    in readable modern English. The disciplinary nuance remains a viable alternative.
- source_word: לְהָבִין
  chosen: to understand
  alternatives:
  - to discern
  lexicon: HALOT
  rationale: Another purpose infinitive parallel to לָדַעַת. 'To understand' is the
    most natural English equivalent and fits the wisdom context.
- source_word: אִמְרֵי
  chosen: words of
  alternatives:
  - sayings of
  lexicon: HALOT
  rationale: Construct plural of אִמְרָה/אֵמֶר, referring to spoken expressions or
    utterances. 'Words of' is slightly broader and more natural in English here, while
    still preserving the construct relationship.
- source_word: בִינָה
  chosen: insight
  alternatives:
  - understanding
  - discernment
  lexicon: HALOT
  rationale: בִינָה overlaps with understanding/discernment. 'Insight' avoids awkward
    repetition with the preceding verb 'to understand' while preserving the semantic
    field of perceptive understanding.
