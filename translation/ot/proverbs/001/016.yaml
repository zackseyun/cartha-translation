id: PRO.1.16
reference: Proverbs 1:16
source:
  edition: WLC
  text: כִּ֣י רַ֭גְלֵי/הֶם לָ/רַ֣ע יָר֑וּצוּ וִֽ֝/ימַהֲר֗וּ לִ/שְׁפָּךְ דָּֽם־׃
translation:
  text: For their feet run to evil, and they hurry to shed blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because their feet run to evil.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to evil'; this may also be understood as 'to do evil' or 'toward
      evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding warning; 'for' is natural and
    preserves the explanatory force in context.
- source_word: רַגְלֵיהֶם
  chosen: their feet
  lexicon: HALOT
  rationale: Literal rendering of the plural construct with pronominal suffix. Keeping
    the body-part imagery preserves the Hebrew metaphor of eagerness expressed through
    movement.
- source_word: לָרַע
  chosen: to evil
  alternatives:
  - to do evil
  - toward evil
  lexicon: HALOT
  rationale: The preposition plus noun is concise in Hebrew. 'To evil' is idiomatic
    enough in English here and preserves the terseness; 'to do evil' is interpretive
    and slightly expands the text.
- source_word: יָרוּצוּ
  chosen: run
  alternatives:
  - rush
  lexicon: HALOT
  rationale: Basic sense is physical running; in context it conveys haste and eagerness.
    'Run' keeps the metaphor vivid and pairs well with the parallel verb that follows.
- source_word: וִימַהֲרוּ
  chosen: and they hurry
  alternatives:
  - and they hasten
  - and they are quick
  lexicon: HALOT
  rationale: Captures the piel/imperfect sense of making haste. 'Hurry' is readable
    modern English and preserves the parallel intensification with 'run'.
- source_word: לִשְׁפָּךְ
  chosen: to shed
  alternatives:
  - to pour out
  lexicon: HALOT
  rationale: In collocation with 'blood,' the idiomatic sense is 'shed blood.' 'Pour
    out blood' would be overly literal and less natural in English.
- source_word: דָּם
  chosen: blood
  lexicon: HALOT
  rationale: Standard rendering. In this context it denotes violent bloodshed, but
    the simple noun 'blood' best preserves the Hebrew expression.
