id: PRO.1.19
reference: Proverbs 1:19
source:
  edition: WLC
  text: כֵּ֗ן אָ֭רְחוֹת כָּל בֹּ֣צֵֽעַ בָּ֑צַע אֶת נֶ֖פֶשׁ בְּעָלָ֣י/ו יִקָּֽח־־׃פ
translation:
  text: Such are the paths of everyone who gains unjust profit; it takes away the
    life of its possessors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Such are the ways of everyone who is greedy for gain; it takes away
      the life of those who possess it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: Such are
  alternatives:
  - So are
  - Thus are
  lexicon: HALOT
  rationale: Introduces a summarizing comparison from the preceding warning. 'Such
    are' is idiomatic in English and preserves the demonstrative force.
- source_word: אָרְחוֹת
  chosen: the paths
  alternatives:
  - the ways
  - the tracks
  lexicon: HALOT
  rationale: Plural of 'path/way'; 'paths' preserves the concrete metaphor common
    in wisdom literature.
- source_word: כָּל
  chosen: everyone who
  alternatives:
  - all who
  - every one of
  lexicon: HALOT
  rationale: With the following participle, the sense is distributive and personal.
    'Everyone who' reads naturally in English while preserving the universal scope.
- source_word: בֹּצֵעַ בָּצַע
  chosen: gains unjust profit
  alternatives:
  - is greedy for gain
  - plunders for profit
  - cuts off gain for himself
  lexicon: HALOT
  rationale: The participle plus cognate noun intensifies the idea of acquisitive
    greed, often dishonest or violent. 'Gains unjust profit' captures both the profit
    motive and its morally tainted character in this context of ambush and bloodshed.
- source_word: נֶפֶשׁ
  chosen: the life
  alternatives:
  - the soul
  - the life-breath
  - the person
  lexicon: HALOT
  rationale: In Proverbs, נֶפֶשׁ here most naturally refers to life itself rather
    than an immaterial soul. 'Life' best fits the warning that greed destroys the
    greedy.
- source_word: בְּעָלָיו
  chosen: its possessors
  alternatives:
  - its owners
  - those who possess it
  - its masters
  lexicon: HALOT
  rationale: 'The suffix most naturally refers back to unjust profit/gain as the antecedent:
    the gain takes the life of those who possess it. ''Its possessors'' keeps the
    syntax compact and the referent clear.'
- source_word: יִקָּח
  chosen: it takes away
  alternatives:
  - it takes
  - it seizes
  - he takes away
  lexicon: HALOT
  rationale: Although singular masculine, the verb can take 'unjust profit' as its
    subject in a gnomic statement. 'Takes away' makes explicit the destructive sense
    in context. A more literal 'takes' is possible but less clear in English.
