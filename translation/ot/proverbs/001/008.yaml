theological_decisions:
- issue: Gendered filial address in wisdom literature
  chosen_reading: my son
  alternative_readings:
  - my child
  rationale: The Hebrew address is grammatically and rhetorically masculine singular.
    Following the stated gender-accurate policy, the translation preserves 'my son'
    rather than neutralizing it. In Proverbs this direct father-to-son framing is
    part of the literary form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering תּוֹרָה in a non-Mosaic domestic context
  chosen_reading: teaching
  alternative_readings:
  - law
  - instruction
  rationale: The term does not here denote the Mosaic Torah as a formal legal corpus
    but a mother's authoritative instruction. Rendering it 'teaching' preserves the
    semantic range without importing a narrower legal sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
