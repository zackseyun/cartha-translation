id: PRO.1.8
reference: Proverbs 1:8
source:
  edition: WLC
  text: שְׁמַ֣ע בְּ֭נִ/י מוּסַ֣ר אָבִ֑י/ךָ וְ/אַל תִּ֝טֹּ֗שׁ תּוֹרַ֥ת אִמֶּֽ/ךָ־׃
translation:
  text: Hear, my son, your father's instruction, and do not forsake your mother's
    teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discipline' for 'instruction' (מוּסָר), emphasizing corrective training
      as well as teaching.
    reason: lexical_alternative
  - marker: b
    text: Or 'law' for 'teaching' (תּוֹרָה); here the sense is a mother's authoritative
      instruction rather than a formal legal code.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen to
  - Obey
  lexicon: HALOT
  rationale: The imperative of שׁמע commonly means 'hear/listen,' and in wisdom literature
    carries the sense of attentive reception that may imply obedience. 'Hear' preserves
    the directness and traditional wisdom-register without over-specifying obedience
    in the main text.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - son of mine
  - child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular with 1cs suffix, so 'my son'
    is the gender-accurate rendering required by the translation philosophy. 'Child'
    would flatten the marked father-to-son address of Proverbs.
- source_word: מוּסַר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, correction, or instruction formed through
    discipline. In this parental wisdom context, 'instruction' reads naturally in
    English while still covering formative training. 'Discipline' is possible, but
    in modern English it can sound narrowly punitive.
- source_word: אָבִיךָ
  chosen: your father's
  alternatives:
  - of your father
  lexicon: HALOT
  rationale: 'The construct phrase is most naturally rendered possessively in English:
    ''your father''s instruction.'''
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - but do not
  - nor
  lexicon: HALOT
  rationale: The conjunction plus negative particle introduces the second imperative
    in straightforward coordination. 'And do not' best reflects the Hebrew flow.
- source_word: תִּטֹּשׁ
  chosen: forsake
  alternatives:
  - abandon
  - reject
  - neglect
  lexicon: HALOT
  rationale: The verb carries the sense of leaving behind or abandoning. 'Forsake'
    preserves the moral and covenantal weight often associated with the term and fits
    wisdom style better than the flatter 'neglect.'
- source_word: תּוֹרַת
  chosen: teaching
  alternatives:
  - instruction
  - law
  lexicon: HALOT
  rationale: Though תּוֹרָה can mean 'law,' here in a domestic wisdom setting it refers
    to a mother's instruction or teaching, not legal code. 'Teaching' avoids misleading
    readers into hearing formal legislation while preserving the sense of authoritative
    guidance.
- source_word: אִמֶּךָ
  chosen: your mother's
  alternatives:
  - of your mother
  lexicon: HALOT
  rationale: The possessive rendering is idiomatic English and matches the parallel
    structure with 'your father's instruction.'
