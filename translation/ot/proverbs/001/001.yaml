id: PRO.1.1
reference: Proverbs 1:1
source:
  edition: WLC
  text: מִ֭שְׁלֵי שְׁלֹמֹ֣ה בֶן דָּוִ֑ד מֶ֝֗לֶךְ יִשְׂרָאֵֽל־׃
translation:
  text: 'The proverbs of Solomon son of David, king of Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sayings' or 'proverbial sayings.' The Hebrew מָשָׁל can denote a proverb,
      maxim, or wisdom saying; 'proverbs' best fits the book title and heading here.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁלֵי
  chosen: proverbs
  alternatives:
  - sayings
  - proverbial sayings
  lexicon: HALOT
  rationale: Construct plural of מָשָׁל introducing the collection. 'Proverbs' is
    the natural English title and fits both the lexical sense and the book-heading
    function better than the more expansive 'sayings.'
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name; per translation philosophy, names are transliterated by
    standard English convention.
- source_word: בֶן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct relation most directly means 'son of.' While Hebrew בן
    can sometimes denote broader descent, here the straightforward filial sense is
    appropriate in the royal superscription.
- source_word: דָּוִד
  chosen: David
  rationale: Personal name transliterated by standard English convention.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Common noun in apposition to Solomon. English omits the article naturally
    in a superscription: ''king of Israel.'''
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name for the nation/kingdom, transliterated in standard English
    form.
