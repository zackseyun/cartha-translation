id: PRO.1.4
reference: Proverbs 1:4
source:
  edition: WLC
  text: לָ/תֵ֣ת לִ/פְתָאיִ֣ם עָרְמָ֑ה לְ֝/נַ֗עַר דַּ֣עַת וּ/מְזִמָּֽה׃
translation:
  text: to give prudence to the simple, knowledge and discretion to the young man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the youth' or 'to a young person.' The Hebrew is masculine singular
      ('young man') and may function representatively in wisdom instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - for giving
  lexicon: HALOT
  rationale: Infinitive construct of נתן with prefixed ל, continuing the purpose statement
    from the previous verse. 'To give' is the most natural English infinitive and
    preserves the instructional purpose.
- source_word: לִפְתָאיִם
  chosen: to the simple
  alternatives:
  - to the naive
  - to the inexperienced
  lexicon: HALOT
  rationale: פְּתָאִים refers to the gullible or inexperienced who are easily led,
    not the intellectually disabled. 'The simple' is the established wisdom-literature
    term and fits the moral-educational context.
- source_word: עָרְמָה
  chosen: prudence
  alternatives:
  - shrewdness
  - craftiness
  lexicon: HALOT
  rationale: In Proverbs this term often has a positive sense of sensible caution
    or practical wisdom, though elsewhere it can shade toward cunning. 'Prudence'
    best captures the commendable quality intended here without the negative overtones
    of 'craftiness.'
- source_word: לְנַעַר
  chosen: to the young man
  alternatives:
  - to the youth
  - to a young person
  lexicon: HALOT
  rationale: נַעַר is grammatically masculine singular and commonly means a boy, youth,
    or young man. Following the gender-accurate policy, 'young man' preserves the
    masculine singular form. 'Youth' is possible but less precise to the source form.
- source_word: דַּעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דַּעַת straightforwardly denotes knowledge in wisdom contexts. 'Knowledge'
    maintains the lexical link with the surrounding wisdom vocabulary.
- source_word: וּמְזִמָּה
  chosen: and discretion
  alternatives:
  - and sound judgment
  - and purpose
  lexicon: HALOT
  rationale: מְזִמָּה can denote planning, discretion, or thoughtful judgment; in
    Proverbs it is often positive when paired with wisdom terms. 'Discretion' is idiomatic
    and matches the educational aim of the verse.
