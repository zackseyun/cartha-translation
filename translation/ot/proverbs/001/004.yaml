theological_decisions:
- issue: Gendered singular in wisdom instruction
  chosen_reading: young man
  alternative_readings:
  - youth
  - young person
  rationale: The Hebrew uses the masculine singular נַעַר. Per the translation philosophy's
    gender-accurate principle, the main text preserves that form rather than neutralizing
    it. Because English readers may take it as representative, an alternative is worth
    preserving in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
