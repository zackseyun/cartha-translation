id: PRO.1.24
reference: Proverbs 1:24
source:
  edition: WLC
  text: יַ֣עַן קָ֭רָאתִי וַ/תְּמָאֵ֑נוּ נָטִ֥יתִי יָ֝דִ֗/י וְ/אֵ֣ין מַקְשִֽׁיב׃
translation:
  text: Because I called and you refused, I stretched out my hand and no one paid
    attention,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listened' or 'was listening.' The Hebrew participle emphasizes attentive
      listening.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the following judgment speech. 'Because'
    is natural modern English and preserves the causal force.
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I cried out
  - I proclaimed
  lexicon: HALOT
  rationale: Qal perfect 1cs of קרא here denotes Wisdom's act of calling out or summoning.
    'I called' is the most direct and contextually fitting rendering.
- source_word: וַתְּמָאֵנוּ
  chosen: and you refused
  alternatives:
  - but you refused
  - and you were unwilling
  lexicon: HALOT
  rationale: From מאן, 'to refuse.' The conjunction is simple waw; English may imply
    contrast from context, but 'and you refused' stays closer to the Hebrew while
    remaining clear.
- source_word: נָטִיתִי
  chosen: I stretched out
  alternatives:
  - I extended
  - I held out
  lexicon: HALOT
  rationale: From נטה, literally 'to stretch out/extend.' 'I stretched out' preserves
    the concrete gesture imagery.
- source_word: יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Literal object of the gesture. Retaining 'hand' preserves the embodied
    image of appeal or warning.
- source_word: וְאֵין
  chosen: and no one
  alternatives:
  - but there was no one
  - and there was none
  lexicon: HALOT
  rationale: The existential negative with following participle yields the sense that
    nobody responded. 'And no one' is concise and idiomatic in English.
- source_word: מַקְשִׁיב
  chosen: paid attention
  alternatives:
  - listened
  - was listening
  - heeded
  lexicon: HALOT
  rationale: קשב in the Hiphil means to pay attention, listen attentively. 'Paid attention'
    communicates the active sense well in contemporary English; 'heeded' would add
    an obedience nuance stronger than the immediate lexical sense.
