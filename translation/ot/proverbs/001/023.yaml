theological_decisions:
- issue: Meaning of 'my spirit' in Wisdom's speech
  chosen_reading: lowercase 'my spirit' referring to personified Wisdom's own spirit/disposition
  alternative_readings:
  - an anticipation or figure of God's Spirit/Holy Spirit
  rationale: The immediate literary speaker is personified Wisdom in Proverbs 1. The
    Hebrew does not explicitly identify this as the Spirit of God. Lowercase preserves
    the text's literary sense and avoids importing a stronger doctrinal identification
    than the verse itself states, while leaving canonical/theological connections
    available to readers.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
