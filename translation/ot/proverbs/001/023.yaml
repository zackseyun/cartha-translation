id: PRO.1.23
reference: Proverbs 1:23
source:
  edition: WLC
  text: תָּשׁ֗וּבוּ לְֽ/ת֫וֹכַחְתִּ֥/י הִנֵּ֤ה אַבִּ֣יעָה לָ/כֶ֣ם רוּחִ֑/י אוֹדִ֖יעָה
    דְבָרַ֣/י אֶתְ/כֶֽם׃
translation:
  text: Turn at my rebuke; behold, I will pour out my spirit to you; I will make my
    words known to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Return to my reproof' or 'Repent at my rebuke.'
    reason: lexical_alternative
  - marker: b
    text: '''My spirit'' may also be understood as ''my mind'' or ''my inner thought'';
      some readers see a broader canonical resonance with God''s Spirit, though the
      verse itself presents personified Wisdom speaking.'
    reason: alternative_reading
lexical_decisions:
- source_word: תָּשׁוּבוּ
  chosen: Turn
  alternatives:
  - Return
  - Repent
  lexicon: HALOT
  rationale: From שוב, here an imperative/jussive-like call to change course in response
    to Wisdom's correction. 'Turn' preserves the concrete metaphor and moral force
    without importing the fuller theological freight of 'repent' beyond what the Hebrew
    itself explicitly states.
- source_word: לְתוֹכַחְתִּי
  chosen: at my rebuke
  alternatives:
  - to my reproof
  - to my correction
  lexicon: HALOT
  rationale: תּוֹכַחַת denotes reproof/rebuke/correction. With ל after שוב, the sense
    is turning in response to or at the occasion of the rebuke. 'At my rebuke' is
    idiomatic English and preserves the responsive nuance.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: A discourse particle drawing attention to what follows. 'Behold' retains
    the elevated, attention-marking force suitable to wisdom literature.
- source_word: אַבִּיעָה
  chosen: I will pour out
  alternatives:
  - I will utter
  - I will gush forth
  lexicon: HALOT
  rationale: From נבע, literally to bubble up or pour forth. In context with 'my spirit,'
    'pour out' best captures the image of abundant outflow and is natural English.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my breath
  - my mind
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, breath. In this personified-speech context,
    'my spirit' best conveys Wisdom's inner animating disposition being disclosed.
    Lowercase 'spirit' avoids overidentifying this directly with the Holy Spirit,
    since the speaker in context is personified Wisdom.
- source_word: אוֹדִיעָה
  chosen: I will make known
  alternatives:
  - I will declare
  - I will teach
  lexicon: HALOT
  rationale: From ידע in the causative stem, 'cause to know' or 'make known.' This
    is the most direct and transparent rendering.
- source_word: דְבָרַי
  chosen: my words
  alternatives:
  - my sayings
  - my message
  lexicon: HALOT
  rationale: דבר is broadly 'word, matter, saying.' In Proverbs, 'words' preserves
    the verbal and instructional character of Wisdom's speech.
- source_word: לָכֶם ... אֶתְכֶם
  chosen: to you ... to you
  alternatives:
  - for you ... to you
  lexicon: HALOT
  rationale: The verse uses two second-person plural pronominal expressions with the
    two verbs. Rendering both as 'to you' is idiomatic in English and preserves the
    direct address to the hearers.
