id: PRO.1.25
reference: Proverbs 1:25
source:
  edition: WLC
  text: וַ/תִּפְרְע֥וּ כָל עֲצָתִ֑/י וְ֝/תוֹכַחְתִּ֗/י לֹ֣א אֲבִיתֶֽם־׃
translation:
  text: and you ignored all my counsel, and you were unwilling to accept my reproof—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you neglected all my counsel' or 'you cast aside all my counsel.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''you refused my reproof.'' The Hebrew more literally emphasizes unwillingness:
      ''you were not willing for my reproof.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְרְעוּ
  chosen: you ignored
  alternatives:
  - you neglected
  - you let go of
  - you cast aside
  - you rejected
  lexicon: HALOT
  rationale: The verb from פרע in this context conveys letting something go or disregarding
    it rather than a violent act. In parallel with refusing reproof, 'ignored' gives
    clear modern English that captures deliberate disregard. 'Rejected' is possible
    but slightly stronger than the likely nuance; 'neglected' is weaker and can sound
    merely careless.
- source_word: כָל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard quantifier meaning 'all/every.' 'All' fits naturally with the
    singular collective noun 'counsel.'
- source_word: עֲצָתִי
  chosen: my counsel
  alternatives:
  - my advice
  - my plan
  - my purpose
  lexicon: HALOT
  rationale: עֵצָה commonly means counsel or advice, and in Wisdom literature it often
    carries the sense of wise guidance. 'Counsel' preserves the elevated but still
    readable tone better than 'advice,' while avoiding the more determinate senses
    'plan' or 'purpose' here.
- source_word: וְתוֹכַחְתִּי
  chosen: my reproof
  alternatives:
  - my correction
  - my rebuke
  - my warning
  lexicon: HALOT
  rationale: תוֹכַחַת in Proverbs regularly denotes corrective rebuke or reproof.
    'Reproof' preserves the wisdom-literature register and the disciplinary nuance.
    'Correction' is possible but softer; 'rebuke' is somewhat sharper and more confrontational.
- source_word: לֹא אֲבִיתֶם
  chosen: you were unwilling to accept
  alternatives:
  - you would not consent to
  - you refused
  - you were not willing
  lexicon: HALOT
  rationale: אָבָה means to be willing, consent, or be disposed toward. With negation,
    it expresses unwillingness/refusal. 'You were unwilling to accept' brings out
    both the volitional nuance of the verb and the implied object relation to 'my
    reproof.' 'Refused' is concise but slightly more interpretive; this rendering
    preserves the internal disposition emphasized by the Hebrew.
