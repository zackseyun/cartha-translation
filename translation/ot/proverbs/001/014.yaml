id: PRO.1.14
reference: Proverbs 1:14
source:
  edition: WLC
  text: גּ֭וֹרָ֣לְ/ךָ תַּפִּ֣יל בְּ/תוֹכֵ֑/נוּ כִּ֥יס אֶ֝חָ֗ד יִהְיֶ֥ה לְ/כֻלָּֽ/נוּ׃
translation:
  text: Throw in your lot among us; we will all have one purse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cast your lot among us.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one moneybag will belong to us all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גּוֹרָלְךָ
  chosen: your lot
  alternatives:
  - your share
  - your portion
  lexicon: HALOT
  rationale: גוֹרָל literally denotes a lot, often in the sense of a portion assigned
    by lot. In this invitation from violent companions, the idiom 'throw in your lot'
    is natural English and preserves the metaphor of joining one's fate/share with
    the group better than the flatter 'share' or 'portion' alone.
- source_word: תַּפִּיל
  chosen: Throw in
  alternatives:
  - cast
  - cause to fall
  lexicon: HALOT
  rationale: The Hiphil of נפל is literally 'cause to fall,' but with גּוֹרָל it forms
    the idiom of casting or throwing one's lot. 'Throw in' fits the English idiom
    'throw in your lot' and communicates voluntary joining without woodenly preserving
    the underlying verb.
- source_word: בְּתוֹכֵנוּ
  chosen: among us
  alternatives:
  - in our midst
  - into our company
  lexicon: HALOT
  rationale: The prepositional phrase means 'in the midst of us.' 'Among us' is the
    most natural modern English equivalent in this social invitation context.
- source_word: כִּיס
  chosen: purse
  alternatives:
  - bag
  - moneybag
  lexicon: HALOT
  rationale: כִּיס refers to a pouch or purse for money. 'Purse' best captures a shared
    money pouch in concise English; 'bag' is too generic, while 'moneybag' is possible
    but less idiomatic here.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - single
  - the same
  lexicon: HALOT
  rationale: אֶחָד straightforwardly means 'one.' Retaining 'one' preserves the emphasis
    on a single common purse shared by the group.
- source_word: יִהְיֶה לְכֻלָּנוּ
  chosen: we will all have
  alternatives:
  - shall belong to us all
  - will be for all of us
  lexicon: HALOT
  rationale: Literally, 'will be for all of us.' Rendering it as 'we will all have'
    produces clear English while preserving the sense of common possession. The clause
    is not merely existential but distributive/shared.
