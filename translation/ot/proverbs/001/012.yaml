theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - death
  rationale: No doctrinally contested term table entry governs שְׁאוֹל, but preserving
    'Sheol' maintains the Hebrew imagery and avoids prematurely resolving the concept
    into a narrower English equivalent.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition
- issue: Sense of תְמִימִים in context
  chosen_reading: whole
  alternative_readings:
  - blameless
  - sound
  - intact
  rationale: The immediate context is violent ambush imagery, not moral evaluation.
    Rendering it 'whole' preserves the poetic picture of victims being swallowed completely,
    rather than implying a statement about their innocence in this clause.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation
    tradition
