id: PRO.1.12
reference: Proverbs 1:12
source:
  edition: WLC
  text: נִ֭בְלָעֵ/ם כִּ/שְׁא֣וֹל חַיִּ֑ים וּ֝/תְמִימִ֗ים כְּ/י֣וֹרְדֵי בֽוֹר׃
translation:
  text: Let us swallow them alive like Sheol, and whole like those who go down to
    the pit;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the grave'; 'Sheol' refers to the realm of the dead in Hebrew thought.
    reason: lexical_alternative
  - marker: b
    text: Or 'and intact' or 'and sound'; the Hebrew can denote completeness or wholeness
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְלָעֵם
  chosen: Let us swallow them
  alternatives:
  - Let us swallow them up
  - Let us engulf them
  lexicon: HALOT
  rationale: Qal cohortative 1cp with 3mp suffix from בלע expresses the speakers'
    exhortation/intention. 'Let us swallow them' preserves the vivid predatory metaphor
    without over-paraphrasing; 'up' is possible in English but not required.
- source_word: כִּשְׁאוֹל
  chosen: like Sheol
  alternatives:
  - like the grave
  - like death
  lexicon: HALOT
  rationale: שְׁאוֹל is best retained as 'Sheol' to preserve the Hebrew concept rather
    than flattening it to 'grave' or 'death.' The comparison is to Sheol's consuming
    character.
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: 'Adverbial/predicative use after the swallowing metaphor: the victims
    are consumed while still alive. ''Alive'' is the most natural English rendering
    here.'
- source_word: וּתְמִימִים
  chosen: whole
  alternatives:
  - sound
  - blameless
  - intact
  lexicon: HALOT
  rationale: Though תמים can mean 'blameless' in moral contexts, here the parallel
    with being swallowed and with those descending to the pit favors the physical
    sense 'whole, intact'—i.e., swallowed in one piece.
- source_word: כְּיֹרְדֵי בוֹר
  chosen: like those who go down to the pit
  alternatives:
  - like those who descend to the grave
  - like those going down to the pit
  lexicon: HALOT
  rationale: The participial phrase denotes people descending to the realm of death.
    'The pit' preserves the concrete Hebrew image of בוֹר and its poetic association
    with death.
