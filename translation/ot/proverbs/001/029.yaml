  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of יִרְאַת יְהוָה
  chosen_reading: the fear of Yahweh
  alternative_readings:
  - reverence for the LORD
  rationale: The Hebrew phrase is a foundational theological term in wisdom literature. 'Fear' should be preserved rather than reduced to 'reverence,' since the text intentionally carries both awe and moral seriousness.
