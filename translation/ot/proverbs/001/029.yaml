id: PRO.1.29
reference: Proverbs 1:29
source:
  edition: WLC
  text: תַּ֭חַת כִּי שָׂ֣נְאוּ דָ֑עַת וְ/יִרְאַ֥ת יְ֝הֹוָ֗ה לֹ֣א בָחָֽרוּ־׃
translation:
  text: Because they hated knowledge and did not choose the fear of Yahweh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fear of Yahweh.' The Hebrew uses the divine name יְהוָה.
    reason: alternative_reading
  - marker: b
    text: '''The fear of the LORD'' is a key wisdom expression that includes reverent awe, not mere terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת כִּי
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  - For the reason that
  lexicon: HALOT
  rationale: The collocation introduces the ground or reason for the judgment described in the surrounding context. In English, 'Because' most naturally conveys this causal force without awkward literalism.
- source_word: שָׂנְאוּ
  chosen: they hated
  alternatives:
  - they despised
  - they rejected
  lexicon: HALOT
  rationale: The verb שׂנא ordinarily means 'hate.' 'Despised' or 'rejected' are interpretive softenings; 'hated' preserves the strong moral aversion expressed in the Hebrew.
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  - discernment
  lexicon: HALOT
  rationale: דעת in Proverbs commonly denotes knowledge in the wisdom sense, especially knowledge tied to moral and covenantal instruction. 'Knowledge' is the most direct and consistent rendering here.
- source_word: יִרְאַת יְהוָה
  chosen: the fear of the LORD
  alternatives:
  - the fear of Yahweh
  - reverence for the LORD
  lexicon: HALOT
  rationale: This is a key wisdom expression in Proverbs and should be preserved consistently. 'Fear of the LORD' retains the theological tension of reverent awe and proper dread before God better than the flatter 'reverence.' Per doctrine, יְהוָה is rendered 'the LORD' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא בָחָרוּ
  chosen: did not choose
  alternatives:
  - refused
  - would not choose
  - did not accept
  lexicon: HALOT
  rationale: בחר means 'choose.' The plain verbal idea should be retained rather than expanded to 'refused,' though refusal is implied. 'Did not choose' preserves the volitional emphasis of the Hebrew.
