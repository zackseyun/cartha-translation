id: PRO.1.31
reference: Proverbs 1:31
source:
  edition: WLC
  text: וְֽ֭/יֹאכְלוּ מִ/פְּרִ֣י דַרְכָּ֑/ם וּֽ/מִ/מֹּעֲצֹ֖תֵי/הֶ֣ם יִשְׂבָּֽעוּ׃
translation:
  text: So they will eat from the fruit of their way, and be filled with their own
    schemes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they will eat from the fruit of their way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'be satisfied with their own counsels' or 'have their fill of their own
      plans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹאכְלוּ
  chosen: So they will eat
  alternatives:
  - and they will eat
  - therefore they will eat
  lexicon: HALOT
  rationale: The conjunction links this verse as the consequence of the prior refusal
    of wisdom; 'So' brings out the inferential force in natural English while preserving
    the future verbal sense of יאכלו.
- source_word: מִפְּרִי
  chosen: from the fruit
  alternatives:
  - of the fruit
  - the fruit of
  lexicon: HALOT
  rationale: The preposition מִן is retained with 'from,' preserving the metaphor
    of deriving consequences from what one has produced.
- source_word: דַרְכָּם
  chosen: their way
  alternatives:
  - their path
  - their conduct
  lexicon: HALOT
  rationale: '''Way'' is the standard wisdom-literature metaphor for one''s course
    of life and moral conduct. It is more idiomatic and thematically consistent in
    Proverbs than the more interpretive ''conduct.'''
- source_word: וּמִמֹּעֲצֹתֵיהֶם
  chosen: with their own schemes
  alternatives:
  - from their counsels
  - with their own plans
  lexicon: HALOT
  rationale: מוֹעֵצוֹת can denote counsels, plans, or devices. In this judgment context,
    'schemes' captures the self-generated and morally charged sense of their deliberations,
    while 'their own' makes explicit the possessive suffix.
- source_word: יִשְׂבָּעוּ
  chosen: be filled
  alternatives:
  - be satisfied
  - have their fill
  lexicon: HALOT
  rationale: 'The verb means to be sated or filled. ''Be filled'' preserves the metaphor
    and leaves room for the ironic sense: they are filled not with blessing but with
    the consequences of their own counsel.'
