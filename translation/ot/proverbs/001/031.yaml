theological_decisions:
- issue: Moral consequence imagery in wisdom judgment
  chosen_reading: 'The verse is rendered as a statement of fitting consequence: people
    experience the outcome of their own chosen course.'
  alternative_readings:
  - A more wooden rendering that leaves the consequence relation implicit
  rationale: The Hebrew imagery of eating fruit and being filled communicates retributive
    moral consequence without importing later doctrinal categories. The translation
    preserves that wisdom-theme plainly and avoids over-theologizing the verse.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
