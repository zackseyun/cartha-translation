id: PRO.1.15
reference: Proverbs 1:15
source:
  edition: WLC
  text: בְּנִ֗/י אַל תֵּלֵ֣ךְ בְּ/דֶ֣רֶךְ אִתָּ֑/ם מְנַ֥ע רַ֝גְלְ/ךָ֗ מִ/נְּתִיבָתָֽ/ם־׃
translation:
  text: My son, do not walk in the way with them; keep your foot from their path.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not go on the road with them.' The Hebrew uses 'way' language common
      in wisdom literature for a course of life, not only a literal road.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  chosen: My son
  alternatives:
  - Son of mine
  - My child
  lexicon: HALOT
  rationale: Vocative of address from בן with 1cs suffix. 'My son' is the natural
    English equivalent and preserves the masculine singular form, fitting the father-to-son
    instructional frame in Proverbs. 'My child' would broaden the gender beyond the
    source and is therefore not preferred in the main text.
- source_word: אַל
  chosen: do not
  alternatives:
  - must not
  lexicon: HALOT
  rationale: Negative particle used with the following jussive/imperfect to express
    prohibition. 'Do not' is the standard and idiomatic English rendering.
- source_word: תֵּלֵךְ
  chosen: walk
  alternatives:
  - go
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' In wisdom literature, 'walk' naturally
    carries both literal and metaphorical force for conduct, which suits the context
    of moral warning.
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - on the road
  - in the path
  lexicon: HALOT
  rationale: דרך can denote a literal road or a figurative course of life. 'In the
    way' preserves the Hebrew idiom and the wisdom-literature metaphor of manner of
    life.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - alongside them
  lexicon: HALOT
  rationale: Straightforward preposition plus 3mp suffix. 'With them' is concise and
    idiomatic.
- source_word: מְנַע
  chosen: keep
  alternatives:
  - hold back
  - restrain
  - withhold
  lexicon: HALOT
  rationale: Imperative of מנע, calling for active restraint. 'Keep' in the construction
    'keep your foot from...' is idiomatic English and preserves the force of deliberate
    avoidance.
- source_word: רַגְלְךָ
  chosen: your foot
  alternatives:
  - your feet
  lexicon: HALOT
  rationale: Singular noun with 2ms suffix. English can use singular 'foot' idiomatically
    in moral exhortation; this also matches the Hebrew number.
- source_word: מִנְּתִיבָתָם
  chosen: from their path
  alternatives:
  - from their track
  - from their way
  lexicon: HALOT
  rationale: נתיבה denotes a path or track. Rendering it as 'path' gives natural English
    variation alongside the earlier דרך ('way') while preserving the parallelism.
    The preposition מן is expressed by 'from.'
