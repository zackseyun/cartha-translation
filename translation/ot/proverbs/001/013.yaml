id: PRO.1.13
reference: Proverbs 1:13
source:
  edition: WLC
  text: כָּל ה֣וֹן יָקָ֣ר נִמְצָ֑א נְמַלֵּ֖א בָתֵּ֣י/נוּ שָׁלָֽל־׃
translation:
  text: We will find all precious wealth; we will fill our houses with plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'valuable wealth' or 'costly riches.'
    reason: lexical_alternative
  - marker: b
    text: Or 'spoil'; Hebrew שָׁלָל refers to goods taken as plunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retained the comprehensive sense of the quantifier. 'All' fits the boastful,
    sweeping claim in context better than the distributive-sounding 'every.'
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - substance
  - riches
  - goods
  lexicon: HALOT
  rationale: Rendered as 'wealth' to convey material possessions broadly. 'Riches'
    is possible, but 'wealth' reads more naturally in modern English while preserving
    the economic sense.
- source_word: יָקָר
  chosen: precious
  alternatives:
  - valuable
  - costly
  lexicon: HALOT
  rationale: '''Precious'' preserves the sense of high value and matches the collocation
    with material wealth. ''Valuable'' is possible but flatter stylistically.'
- source_word: נִמְצָא
  chosen: we will find
  alternatives:
  - we will obtain
  - we will come upon
  lexicon: HALOT
  rationale: Although the morphology table labels first common plural, the form in
    context functions as a cohortative-like first person plural in the sinners' speech.
    'Find' is the plain lexical sense of מצא and suits the promise of gaining loot.
- source_word: נְמַלֵּא
  chosen: we will fill
  alternatives:
  - let us fill
  lexicon: HALOT
  rationale: Rendered as future-like 'we will fill' to match the sequence of confident
    promises in the invitation speech. The cohortative nuance is carried by the broader
    context without needing an English hortatory form here.
- source_word: בָתֵּינוּ
  chosen: our houses
  alternatives:
  - our homes
  lexicon: HALOT
  rationale: '''Houses'' is the more literal rendering of בית and fits the image of
    storing stolen goods. ''Homes'' would be more idiomatic but slightly less concrete.'
- source_word: שָׁלָל
  chosen: plunder
  alternatives:
  - spoil
  - booty
  - loot
  lexicon: HALOT
  rationale: '''Plunder'' is clear modern English for goods taken by violence or robbery
    and fits the criminal context. ''Spoil'' is archaic in this sense; ''loot'' is
    possible but more colloquial.'
