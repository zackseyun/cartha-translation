theological_decisions:
- issue: Personification of Wisdom as female speaker
  chosen_reading: Retain feminine personal language ('she') for Wisdom
  alternative_readings:
  - Use impersonal wording such as 'it calls out'
  rationale: The Hebrew verbs and suffixes are feminine singular, continuing the personified
    portrayal of Wisdom in the context. Preserving 'she' reflects the source text
    accurately without importing further theological claims.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
