id: PRO.1.21
reference: Proverbs 1:21
source:
  edition: WLC
  text: בְּ/רֹ֥אשׁ הֹמִיּ֗וֹת תִּ֫קְרָ֥א בְּ/פִתְחֵ֖י שְׁעָרִ֥ים בָּ/עִ֗יר אֲמָרֶ֥י/הָ
    תֹאמֵֽר׃
translation:
  text: 'At the head of the noisy streets she cries out; at the entrances of the gates
    in the city she speaks her words:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At the top of the tumultuous places she calls out.' The Hebrew expression
      may emphasize either the most prominent location or an elevated/foremost point
      within the public commotion.
    reason: lexical_alternative
  - marker: b
    text: City gates were the main public gathering places, where commerce, legal
      matters, and civic life were conducted.
    reason: cultural_note
  - marker: c
    text: Or 'she says her sayings.' The Hebrew is literally 'she says her words,'
      an idiom for public speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רֹאשׁ
  chosen: At the head of
  alternatives:
  - On the top of
  - At the foremost part of
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head' and in spatial expressions often denotes
    the top, beginning, or foremost place. Here, with urban locations following, it
    most naturally indicates the prominent/front part of the bustling public area
    rather than a literal elevated summit.
- source_word: הֹמִיּוֹת
  chosen: the noisy streets
  alternatives:
  - the tumultuous places
  - the crowds
  - the commotion
  lexicon: HALOT
  rationale: From a root meaning to roar or be in tumult, the form denotes places
    characterized by noise/tumult. Rendering it as 'noisy streets' makes the urban-public
    sense clear in natural English while preserving the idea of bustle.
- source_word: תִּקְרָא
  chosen: she cries out
  alternatives:
  - she calls
  - she proclaims
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' In Wisdom's public address, the
    louder and more urgent 'cries out' best fits the context and parallels the following
    speech verb.
- source_word: בְּ/פִתְחֵי
  chosen: at the entrances of
  alternatives:
  - at the openings of
  - in the doorways of
  lexicon: HALOT
  rationale: פֶּתַח refers to an opening or entrance. 'Entrances' is idiomatic with
    city gates and preserves the locative force of the preposition.
- source_word: שְׁעָרִים
  chosen: the gates
  alternatives:
  - the gate complexes
  lexicon: HALOT
  rationale: שְׁעָרִים are city gates, the recognized public places of gathering and
    judgment. 'Gates' is the standard and sufficient rendering.
- source_word: בָּ/עִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: The phrase locates the gates as belonging to the city sphere. Keeping
    'in the city' reflects the Hebrew straightforwardly and reads naturally in English.
- source_word: אֲמָרֶי/הָ
  chosen: her words
  alternatives:
  - her sayings
  - what she says
  lexicon: HALOT
  rationale: The plural construct of אמר with suffix means 'her words/sayings.' 'Her
    words' is simple, direct, and preserves the lexical connection to speech.
- source_word: תֹאמֵר
  chosen: she speaks
  alternatives:
  - she says
  - she declares
  lexicon: HALOT
  rationale: אמר is the common verb 'to say.' Because 'says her words' is awkward
    in English, 'she speaks her words' preserves both the verbal action and the explicit
    object without over-paraphrasing.
