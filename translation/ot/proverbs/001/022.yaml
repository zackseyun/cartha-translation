id: PRO.1.22
reference: Proverbs 1:22
source:
  edition: WLC
  text: עַד מָתַ֣י פְּתָיִם֮ תְּֽאֵהֲב֫וּ פֶ֥תִי וְ/לֵצִ֗ים לָ֭צוֹן חָמְד֣וּ לָ/הֶ֑ם
    וּ֝/כְסִילִ֗ים יִשְׂנְאוּ דָֽעַת־׀־׃
translation:
  text: How long, O simple ones, will you love simplicity? And scoffers delight in
    scoffing for themselves, and fools hate knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mockers delight in mockery.'
    reason: lexical_alternative
  - marker: b
    text: Or 'how long will the simple love being simple?' The Hebrew uses a wordplay
      between 'simple ones' and 'simplicity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתָיִם
  chosen: simple ones
  alternatives:
  - naive ones
  - inexperienced ones
  lexicon: HALOT
  rationale: The plural noun refers to the gullible or morally unformed, not merely
    intellectually limited people. 'Simple ones' preserves the wisdom-literature category
    and matches the vocative force.
- source_word: תְּאֵהֲבוּ
  chosen: will you love
  alternatives:
  - do you love
  lexicon: HALOT
  rationale: 'The imperfect in this rebuking question naturally carries future-like
    force in English: ''How long will you love...?'' This is idiomatic and preserves
    the ongoing disposition being challenged.'
- source_word: פֶתִי
  chosen: simplicity
  alternatives:
  - naivety
  - simple-mindedness
  lexicon: HALOT
  rationale: Using the cognate abstract noun 'simplicity' preserves the wordplay with
    פְּתָיִם / פֶתִי ('simple ones' / 'simplicity'). 'Naivety' is possible but weakens
    the lexical echo.
- source_word: לֵצִים
  chosen: scoffers
  alternatives:
  - mockers
  lexicon: HALOT
  rationale: In Proverbs this term denotes those who arrogantly deride wisdom and
    correction. 'Scoffers' is the standard wisdom-category term and is slightly weightier
    than 'mockers.'
- source_word: לָצוֹן
  chosen: scoffing
  alternatives:
  - mockery
  lexicon: HALOT
  rationale: The noun is rendered with the cognate 'scoffing' to preserve the lexical
    connection with 'scoffers.'
- source_word: חָמְדוּ
  chosen: delight in
  alternatives:
  - desire
  - take pleasure in
  - covet
  lexicon: HALOT
  rationale: Although the verb often means 'desire' or 'covet,' here with לָצוֹן it
    expresses taking pleasure in scornful behavior. 'Delight in' communicates volitional
    enjoyment in natural English.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - to themselves
  lexicon: HALOT
  rationale: The dative pronoun is somewhat idiomatic. 'For themselves' brings out
    that scoffers prize scoffing as their own pleasure or possession, without overinterpreting.
- source_word: כְסִילִים
  chosen: fools
  alternatives:
  - stupid ones
  lexicon: HALOT
  rationale: In wisdom literature this is a moral-spiritual category, not merely low
    intelligence. 'Fools' is the established and accurate rendering.
- source_word: יִשְׂנְאוּ
  chosen: hate
  alternatives:
  - reject
  lexicon: HALOT
  rationale: The verb is strong and should remain strong. 'Hate' preserves the moral
    aversion expressed in the Hebrew.
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: The noun commonly denotes knowledge in Proverbs, especially knowledge
    aligned with wisdom and the fear of the LORD. 'Knowledge' is the most direct rendering
    here.
