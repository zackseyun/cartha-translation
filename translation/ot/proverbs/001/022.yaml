theological_decisions:
- issue: Wisdom-category terminology in Proverbs
  chosen_reading: Retain the traditional moral categories 'simple ones,' 'scoffers,'
    and 'fools' rather than flattening them into generic psychological descriptions.
  alternative_readings:
  - naive people, mockers, and the foolish
  rationale: The verse is not making a technical doctrinal claim, but Proverbs uses
    these as recurring ethical-spiritual types. Preserving the categories supports
    consistency and avoids reducing the text to mere temperament labels.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
