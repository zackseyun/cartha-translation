id: PRO.1.7
reference: Proverbs 1:7
source:
  edition: WLC
  text: יִרְאַ֣ת יְ֭הוָה רֵאשִׁ֣ית דָּ֑עַת חָכְמָ֥ה וּ֝/מוּסָ֗ר אֱוִילִ֥ים בָּֽזוּ׃פ
translation:
  text: The fear of Yahweh is the beginning of knowledge; fools despise wisdom and discipline.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reverence for the LORD' or 'awe of the LORD.' The Hebrew phrase includes reverence, awe, and submissive fear before God.
    reason: lexical_alternative
  - marker: b
    text: Or 'instruction' or 'correction.' The Hebrew term includes training that can involve correction.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  chosen: fear of
  alternatives:
  - reverence for
  - awe of
  lexicon: HALOT
  rationale: Construct form with the divine name; 'fear of' is the standard and weightiest rendering in wisdom literature, preserving the covenantal and moral sense without reducing it to mere emotion. Alternatives like 'reverence' or 'awe' capture part of the sense but can soften the ethical force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רֵאשִׁית
  chosen: beginning
  alternatives:
  - first principle
  - chief part
  lexicon: HALOT
  rationale: '''Beginning'' best fits the proverb''s concise formulation and preserves the possibility of both starting point and foundational principle. ''First principle'' is interpretive; ''chief part'' overstates a possible nuance.'
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: The noun commonly denotes knowledge in wisdom contexts. 'Understanding' overlaps semantically but is better reserved for other Hebrew wisdom terms when possible.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in Proverbs; broad enough to include skill for godly living without paraphrase.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: HALOT
  rationale: In Proverbs, מוסר often includes formative correction and training, not mere information. 'Discipline' captures the pedagogical and corrective force better than 'instruction' alone, while remaining natural English.
- source_word: אֱוִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Conventional and concise rendering for the plural noun in wisdom literature. It preserves the moral category intended in Proverbs, not merely intellectual deficiency.
- source_word: בָּזוּ
  chosen: despise
  alternatives:
  - scorn
  - treat with contempt
  lexicon: HALOT
  rationale: A strong verb of rejection and contempt. 'Despise' is idiomatic and appropriately forceful in English.
