theological_decisions:
- issue: Meaning of 'fear of the LORD' in wisdom theology
  chosen_reading: Retain the literal phrase 'fear of the LORD' in the main text.
  alternative_readings:
  - reverence for the LORD
  - awe of the LORD
  rationale: The Hebrew expression is programmatic in Proverbs and carries both reverential and moral-submissive dimensions. Rendering it more interpretively would narrow or soften the theological tension the source preserves.
  doctrine_reference: 'Translation philosophy §3; Contested terms: יְהוָה YHWH → the LORD'
- issue: Relation of רֵאשִׁית to knowledge
  chosen_reading: '''the beginning of knowledge'''
  alternative_readings:
  - '''the chief part of knowledge'''
  - '''the first principle of knowledge'''
  rationale: The proverb can imply both starting point and foundational principle. 'Beginning' preserves that breadth without over-interpreting the theology of wisdom.
  doctrine_reference: Translation philosophy §3
