id: PRO.6.16
reference: Proverbs 6:16
source:
  edition: WLC
  text: שֶׁשׁ הֵ֭נָּה שָׂנֵ֣א יְהוָ֑ה וְ֝/שֶׁ֗בַע תועבות נַפְשֽׁ/וֹ־׃
translation:
  text: 'There are six things that Yahweh hates, seven that are an abomination to him:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'seven abominations to his soul,' that is, seven things abhorrent to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁשׁ
  chosen: six
  alternatives:
  - There are six
  lexicon: HALOT
  rationale: Cardinal number introducing the numerical saying. English requires a fuller clause, so the verse begins idiomatically with 'There are six things' while preserving the Hebrew count.
- source_word: הֵנָּה
  chosen: There are
  alternatives:
  - these
  - they
  lexicon: HALOT
  rationale: The pronoun points to the items to be listed. In English numerical sayings, an existential rendering ('There are') is the most natural way to convey the Hebrew construction with the following number and predicate.
- source_word: שָׂנֵא
  chosen: hates
  alternatives:
  - detests
  lexicon: HALOT
  rationale: The verb denotes hatred or strong aversion. 'Hates' is the direct and standard rendering, preserving the force without softening it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְשֶׁבַע
  chosen: seven
  alternatives:
  - indeed seven
  lexicon: HALOT
  rationale: This is the second element in the Hebrew x/x+1 numerical formula ('six... and seven'), a poetic intensification rather than a contradiction. The simple 'seven' preserves the form.
- source_word: תועבות
  chosen: an abomination
  alternatives:
  - abominations
  - detestable things
  lexicon: HALOT
  rationale: The plural noun refers to things that are abhorrent. Because English idiom after 'seven' often prefers an implied singular class expression ('seven that are an abomination to him'), this rendering is natural while retaining the strong moral-religious force. The plural sense is preserved by the relative clause.
- source_word: נַפְשׁוֹ
  chosen: to him
  alternatives:
  - to his soul
  - to his very being
  lexicon: HALOT
  rationale: Literally 'his soul/self.' In Hebrew this often functions idiomatically for the person himself. 'To him' gives clear modern English without importing a body-soul anthropology foreign to the idiom; the more literal alternative is worth preserving in a footnote.
