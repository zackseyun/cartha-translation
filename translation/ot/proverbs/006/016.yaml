  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropomorphic expression 'abominations of his soul'
  chosen_reading: seven that are an abomination to him
  alternative_readings:
  - seven abominations to his soul
  - seven that his soul detests
  rationale: The Hebrew uses נֶפֶשׁ idiomatically for the person/self. Rendering it as 'to him' preserves the meaning in readable English while avoiding an overly wooden expression. The stronger literal phrasing is preserved in a footnote for auditability.
