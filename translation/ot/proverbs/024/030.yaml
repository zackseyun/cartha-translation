id: PRO.24.30
reference: Proverbs 24:30
source:
  edition: WLC
  text: עַל שְׂדֵ֣ה אִישׁ עָצֵ֣ל עָבַ֑רְתִּי וְ/עַל כֶּ֝֗רֶם אָדָ֥ם חֲסַר לֵֽב־־־־׃
translation:
  text: I passed by the field of a sluggard, and by the vineyard of a man lacking
    sense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without understanding'; literally, 'lacking heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: by
  alternatives:
  - over
  - upon
  - past
  lexicon: HALOT
  rationale: With עברתי ('I passed'), the preposition is best rendered idiomatically
    in English as 'by,' expressing movement past a location rather than physical position
    'upon/over'.
- source_word: שְׂדֵה
  chosen: field
  alternatives:
  - land
  - open country
  lexicon: HALOT
  rationale: The construct with איש עצל refers to cultivated property; 'field' is
    the natural English equivalent in this wisdom context.
- source_word: אִישׁ
  chosen: a
  alternatives:
  - a man
  - the man of
  lexicon: HALOT
  rationale: In English, the possession relation is conveyed sufficiently by 'the
    field of a sluggard.' Rendering איש separately as 'man' would be wooden and redundant
    here.
- source_word: עָצֵל
  chosen: sluggard
  alternatives:
  - lazy man
  - lazy person
  - slacker
  lexicon: HALOT
  rationale: '''Sluggard'' is a standard wisdom-term rendering in Proverbs for עצל,
    preserving the moral characterization more precisely than the flatter ''lazy man.'''
- source_word: עָבַרְתִּי
  chosen: I passed by
  alternatives:
  - I went past
  - I passed
  lexicon: HALOT
  rationale: The Qal perfect 1cs narrates the speaker's observation. 'I passed by'
    is idiomatic and matches the scene-setting function.
- source_word: כֶּרֶם
  chosen: vineyard
  alternatives:
  - vine-garden
  lexicon: HALOT
  rationale: The standard sense is a cultivated vineyard; this pairs naturally with
    'field' in the parallel line.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - someone
  - a human
  lexicon: HALOT
  rationale: Here אדם refers to an individual male in parallel with איש. Per the project's
    gender-accurate policy, 'a man' is preferable to a gender-neutral substitute.
- source_word: חֲסַר לֵב
  chosen: lacking sense
  alternatives:
  - without sense
  - lacking heart
  - without understanding
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'lacking heart,' but in Proverbs it
    denotes deficiency in judgment or understanding. 'Lacking sense' communicates
    the idiomatic meaning in readable modern English while preserving the moral-intellectual
    force.
