theological_decisions:
- issue: Gendered anthropological language in אדם
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The Hebrew is grammatically masculine and refers to a representative
    individual in parallel with איש. Following the doctrine's gender-accurate policy,
    the masculine form is retained rather than neutralized.
