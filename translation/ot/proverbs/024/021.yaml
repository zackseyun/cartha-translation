id: PRO.24.21
reference: Proverbs 24:21
source:
  edition: WLC
  text: יְרָֽא אֶת יְהוָ֣ה בְּנִ֣/י וָ/מֶ֑לֶךְ עִם שׁ֝וֹנִ֗ים אַל תִּתְעָרָֽב־־־־׃
translation:
  text: Fear Yahweh, my son, and the king; do not associate with those who are given to change.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not mix with rebels'; the Hebrew literally refers to 'those who change,' likely people inclined toward upheaval or disloyal change.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרָא
  chosen: Fear
  alternatives:
  - Revere
  lexicon: HALOT
  rationale: Imperative of ירא in wisdom literature commonly calls for reverent fear expressed in loyal obedience. 'Fear' preserves the covenantal and wisdom nuance better than the softer 'revere,' while remaining standard English Bible diction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular with the 1cs suffix. In Proverbs this paternal address is a marked literary feature, so 'my son' should be retained rather than neutralized.
- source_word: וָמֶלֶךְ
  chosen: and the king
  alternatives:
  - and a king
  lexicon: HALOT
  rationale: 'The conjunction joins a second object of the imperative: the son is to fear both the LORD and the king. ''The king'' is the natural rendering for the singular noun in this wisdom-political context.'
- source_word: עִם
  chosen: with / associate with
  alternatives:
  - among
  - together with
  lexicon: HALOT
  rationale: Though literally 'with,' in combination with התערב it yields the idiomatic sense of mixing or associating with certain people. The preposition's force is carried idiomatically in the English clause 'associate with.'
- source_word: שׁוֹנִים
  chosen: those who are given to change
  alternatives:
  - rebels
  - the unstable
  - those who are for change
  lexicon: HALOT
  rationale: From שנה/שׁנה 'to change,' the participle most naturally denotes people inclined toward change or upheaval. In context with fearing the LORD and the king, it likely refers to politically or socially subversive persons. 'Those who are given to change' preserves the lexical idea without over-interpreting it as outright 'rebels' in the main text.
- source_word: אַל תִּתְעָרָב
  chosen: do not associate
  alternatives:
  - do not mix with
  - do not join
  - do not meddle with
  lexicon: HALOT
  rationale: The hitpael of ערב here conveys becoming involved with or mixing oneself among such people. 'Do not associate' is idiomatic modern English and fits the warning context.
