theological_decisions:
- issue: Relationship between fearing the LORD and fearing the king
  chosen_reading: Render both objects under the single imperative without implying equal theological status.
  alternative_readings:
  - Translate more dynamically as 'Honor the LORD and the king'
  - Interpret 'fear' toward the king as merely political respect
  rationale: The Hebrew syntax places both 'the LORD' and 'the king' as objects of ירא. The translation preserves that structure while allowing context to distinguish the LORD's ultimate authority from the king's derivative authority, rather than flattening the wording or importing a doctrinal hierarchy not explicitly stated in the verse.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
