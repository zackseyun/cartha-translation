id: PRO.24.15
reference: Proverbs 24:15
source:
  edition: WLC
  text: אַל תֶּאֱרֹ֣ב רָ֭שָׁע לִ/נְוֵ֣ה צַדִּ֑יק אַֽל תְּשַׁדֵּ֥ד רִבְצ/וֹ־־׃
translation:
  text: Do not lie in wait, wicked man, against the dwelling of the righteous; do
    not devastate his resting place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not ambush the home of the righteous.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his lying-down place' or 'his place of repose.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  - never
  lexicon: HALOT
  rationale: Standard prohibitive particle introducing a direct negative command;
    'Do not' is clear modern English and preserves imperative force.
- source_word: תֶּאֱרֹב
  chosen: lie in wait
  alternatives:
  - ambush
  - set an ambush
  lexicon: HALOT
  rationale: From ארב, denoting lurking or lying in ambush. 'Lie in wait' preserves
    the predatory nuance without over-specifying a military ambush.
- source_word: רָשָׁע
  chosen: wicked man
  alternatives:
  - wicked one
  - evil man
  lexicon: HALOT
  rationale: A masculine singular vocative/addressee in context. 'Wicked man' keeps
    the gender-accurate singular force and the moral characterization. This is direct
    address to the kind of person being warned.
- source_word: לִנְוֵה
  chosen: against the dwelling
  alternatives:
  - at the home
  - toward the abode
  lexicon: HALOT
  rationale: נוה commonly denotes abode, habitation, or dwelling place. With ל here,
    the sense is hostile direction toward the righteous person's habitation; 'against
    the dwelling' makes the adversarial force explicit in idiomatic English.
- source_word: צַדִּיק
  chosen: of the righteous
  alternatives:
  - of the righteous man
  - of the just
  lexicon: HALOT
  rationale: Refers to the righteous person whose home is targeted. 'The righteous'
    is idiomatic singular class language in English and preserves the ethical category
    without sounding wooden.
- source_word: תְּשַׁדֵּד
  chosen: devastate
  alternatives:
  - plunder
  - destroy
  - ravage
  lexicon: HALOT
  rationale: From שדד, involving violent despoiling or ruining. 'Devastate' fits the
    parallel with attacking a home/resting place and avoids implying theft alone,
    which 'plunder' might overemphasize.
- source_word: רִבְצוֹ
  chosen: his resting place
  alternatives:
  - his lair
  - his resting place where he lies down
  lexicon: HALOT
  rationale: From רבץ, a lying-down place, often of animals but also figuratively
    of settled repose. 'Resting place' is natural English and preserves the image
    of a secure place of repose; 'lair' would sound too animalistic in English for
    this context.
