theological_decisions:
- issue: Ethical force of the proverb regarding personal retaliation
  chosen_reading: The verse prohibits vengeful self-talk and personal repayment in
    kind, without expanding beyond the text into a full doctrine of civil justice.
  alternative_readings:
  - A blanket prohibition of all forms of retributive justice
  - A merely pragmatic warning against speaking rashly
  rationale: The wording directly forbids saying one will do back to another what
    was done and repay according to his deed. The focus is personal vengeance and
    retaliatory intent. The translation should preserve that moral force without importing
    broader claims not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
