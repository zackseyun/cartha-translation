id: PRO.24.29
reference: Proverbs 24:29
source:
  edition: WLC
  text: אַל תֹּאמַ֗ר כַּ/אֲשֶׁ֣ר עָֽשָׂה לִ֭/י כֵּ֤ן אֶֽעֱשֶׂה לּ֑/וֹ אָשִׁ֖יב לָ/אִ֣ישׁ
    כְּ/פָעֳלֽ/וֹ־־־׃
translation:
  text: Do not say, “As he has done to me, so I will do to him; I will repay the man
    according to his work.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will pay him back according to what he has done.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Negative particle used with the imperfect to express prohibition. 'Do
    not' is the natural modern English equivalent.
- source_word: תֹּאמַר
  chosen: say
  alternatives:
  - declare
  - think
  lexicon: HALOT
  rationale: אָמַר commonly means 'say.' Here it introduces quoted speech, so 'say'
    is the most direct rendering.
- source_word: כַּאֲשֶׁר
  chosen: As
  alternatives:
  - Just as
  - According as
  lexicon: HALOT
  rationale: Comparative conjunction introducing the standard of retaliation. 'As'
    is concise and idiomatic in English.
- source_word: עָשָׂה לִי
  chosen: he has done to me
  alternatives:
  - he did to me
  - he has acted toward me
  lexicon: HALOT
  rationale: עשה is broad ('do, make, act'). With the prepositional phrase 'to me,'
    the sense is personal action against the speaker. Present perfect English captures
    the completed prior action with present relevance.
- source_word: כֵּן אֶעֱשֶׂה לּוֹ
  chosen: so I will do to him
  alternatives:
  - so I will do the same to him
  - thus I will act toward him
  lexicon: HALOT
  rationale: The correlative כַּאֲשֶׁר ... כֵּן marks direct reciprocity. 'So I will
    do to him' preserves the retaliatory symmetry without over-paraphrase.
- source_word: אָשִׁיב
  chosen: I will repay
  alternatives:
  - I will return
  - I will pay back
  - I will requite
  lexicon: HALOT
  rationale: Hiphil of שוב can mean 'cause to return' and idiomatically 'repay, pay
    back.' In this context of vengeance, 'repay' best conveys retaliatory recompense.
- source_word: לָאִישׁ
  chosen: the man
  alternatives:
  - the person
  - him
  lexicon: HALOT
  rationale: אִישׁ is grammatically masculine singular and refers to the offending
    individual. Per gender-accurate policy, 'the man' preserves the source form better
    than the more generic 'person.'
- source_word: כְּפָעֳלוֹ
  chosen: according to his work
  alternatives:
  - according to what he has done
  - according to his deed
  lexicon: HALOT
  rationale: פֹּעַל denotes deed, work, or action. 'According to his work' is formally
    close and preserves the measured recompense idea; 'what he has done' is a viable
    dynamic alternative but less lexically transparent.
