id: PRO.24.14
reference: Proverbs 24:14
source:
  edition: WLC
  text: כֵּ֤ן דְּעֶ֥/ה חָכְמָ֗ה לְ/נַ֫פְשֶׁ֥/ךָ אִם מָ֭צָאתָ וְ/יֵ֣שׁ אַחֲרִ֑ית וְ֝/תִקְוָתְ/ךָ֗
    לֹ֣א תִכָּרֵֽת׀־׃פ
translation:
  text: 'Know that wisdom is thus for your soul: if you find it, then there is a future,
    and your hope will not be cut off.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is an outcome' or 'there is an end'; the Hebrew אַחֲרִית can denote
      one's latter end, outcome, or future prospect.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for your soul'; נֶפֶשׁ can also mean 'self' or 'life' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: thus
  alternatives:
  - so
  - in this way
  - likewise
  lexicon: HALOT
  rationale: 'כֵּן links this verse analogically to the preceding comparison with
    honey (v. 13): as honey is good, so wisdom is good. ''Thus'' preserves the comparative
    force without over-paraphrasing.'
- source_word: דְּעֶה
  chosen: Know
  alternatives:
  - know well
  - understand
  - realize
  lexicon: HALOT
  rationale: Imperative of ידע addressed to a singular male addressee. 'Know' is the
    most direct and natural English imperative.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חָכְמָה in Proverbs; preserves the book's key
    theme and lexical consistency.
- source_word: לְנַפְשֶׁךָ
  chosen: for your soul
  alternatives:
  - for yourself
  - for your life
  - for your inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, self, or life. Here the sense is personal benefit
    to the inner life. 'For your soul' preserves the Hebrew imagery and gravity better
    than the flatter 'for yourself.'
- source_word: אִם מָצָאתָ
  chosen: if you find it
  alternatives:
  - when you find it
  - if you have found it
  lexicon: HALOT
  rationale: The conditional particle אִם with perfect verb can be rendered 'if you
    find/have found.' 'If you find it' reads naturally in English and preserves the
    conditional structure.
- source_word: וְיֵשׁ אַחֲרִית
  chosen: then there is a future
  alternatives:
  - surely there is an outcome
  - there is an end
  - there is a latter end
  lexicon: HALOT
  rationale: אַחֲרִית often means end, outcome, or future. In wisdom literature it
    commonly points to one's future prospect rather than mere termination. 'There
    is a future' best fits the encouragement parallel to hope in the next clause.
- source_word: וְתִקְוָתְךָ
  chosen: and your hope
  alternatives:
  - and your expectation
  lexicon: HALOT
  rationale: תִּקְוָה is commonly 'hope.' This pairs naturally with אַחֲרִית and is
    idiomatic in English.
- source_word: לֹא תִכָּרֵת
  chosen: will not be cut off
  alternatives:
  - will not perish
  - will not be cut down
  - will not be destroyed
  lexicon: HALOT
  rationale: Niphal of כרת literally means 'be cut off.' Retaining the metaphor preserves
    the Hebrew expression and its force, while remaining understandable in English.
