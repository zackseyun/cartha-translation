id: PRO.24.3
reference: Proverbs 24:3
source:
  edition: WLC
  text: בְּ֭/חָכְמָה יִבָּ֣נֶה בָּ֑יִת וּ֝/בִ/תְבוּנָ֗ה יִתְכּוֹנָֽן׃
translation:
  text: By wisdom a house is built, and by understanding it is established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a household'; 'house' may refer both to a physical dwelling and, by
      extension, to a family or household.
    reason: lexical_alternative
  - marker: b
    text: Or 'is made secure' / 'is set firm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחָכְמָה
  chosen: By wisdom
  alternatives:
  - With wisdom
  - Through wisdom
  lexicon: HALOT
  rationale: The preposition ב marks means or instrument here. 'By wisdom' is concise,
    natural English and preserves the proverbial sense that wisdom is the means by
    which the result is achieved.
- source_word: יִבָּנֶה
  chosen: is built
  alternatives:
  - is being built
  - will be built
  - builds
  lexicon: HALOT
  rationale: 'Nifal imperfect of בנה is rendered as a passive/generic present in proverbial
    style. English present tense best captures the gnomic force: this is a general
    truth, not merely a future event.'
- source_word: בָּיִת
  chosen: a house
  alternatives:
  - a household
  - a home
  lexicon: HALOT
  rationale: בַּיִת can denote a physical house or a household/dynasty. In this wisdom
    context, the literal image of a house is primary while still allowing metaphorical
    extension. 'House' preserves that breadth better than 'home' or 'household' in
    the main text.
- source_word: וּבִתְבוּנָה
  chosen: and by understanding
  alternatives:
  - and with understanding
  - and by discernment
  lexicon: HALOT
  rationale: תְּבוּנָה commonly denotes understanding or discernment. 'Understanding'
    pairs well with 'wisdom' and matches standard wisdom vocabulary without over-interpreting.
- source_word: יִתְכּוֹנָן
  chosen: it is established
  alternatives:
  - it is made secure
  - it is set firm
  lexicon: HALOT
  rationale: Hitpolel/reflexive form from כון conveys being established, set in order,
    or made firm. 'It is established' is idiomatic, preserves the passive/resultative
    sense, and fits the parallelism with 'is built'.
