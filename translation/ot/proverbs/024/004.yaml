id: PRO.24.4
reference: Proverbs 24:4
source:
  edition: WLC
  text: וּ֭/בְ/דַעַת חֲדָרִ֣ים יִמָּלְא֑וּ כָּל ה֖וֹן יָקָ֣ר וְ/נָעִֽים־׃
translation:
  text: and by knowledge rooms are filled with every precious and pleasant kind of
    wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chambers' for 'rooms.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be filled'; the Hebrew imperfect may be read futurally, though
      the proverb is rendered here as a general present truth.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'all wealth, precious and pleasant'; the translation smooths the
      phrase as 'every precious and pleasant kind of wealth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְדַעַת
  chosen: and by knowledge
  alternatives:
  - and through knowledge
  - and with knowledge
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are both represented. דַּעַת
    denotes knowledge/understanding gained or possessed; 'by knowledge' fits the instrumental
    sense in this wisdom parallelism with the preceding verse.
- source_word: חֲדָרִים
  chosen: rooms
  alternatives:
  - chambers
  - inner rooms
  lexicon: HALOT
  rationale: The noun refers to rooms or chambers within a house. 'Rooms' is natural
    modern English; 'chambers' is possible but more archaic/literary.
- source_word: יִמָּלְאוּ
  chosen: are filled
  alternatives:
  - will be filled
  - fill up
  lexicon: HALOT
  rationale: Nifal imperfect of מלא can be rendered as a passive/resultative present
    in proverbial discourse. English present better matches the gnomic character of
    Proverbs, though a future sense is also possible.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a singular collective noun following, 'every ... kind of' communicates
    the distributive force idiomatically in English.
- source_word: הוֹן
  chosen: kind of wealth
  alternatives:
  - wealth
  - treasure
  - riches
  lexicon: HALOT
  rationale: הוֹן denotes wealth, substance, riches. Because it is modified by two
    adjectives and preceded by כָּל, 'every ... kind of wealth' yields smoother English
    while preserving the sense of varied valuable possessions.
- source_word: יָקָר
  chosen: precious
  alternatives:
  - costly
  - valuable
  lexicon: HALOT
  rationale: The adjective describes something valuable or precious. 'Precious' pairs
    well with the following adjective and preserves the elevated wisdom tone.
- source_word: וְנָעִים
  chosen: pleasant
  alternatives:
  - delightful
  - lovely
  lexicon: HALOT
  rationale: נָעִים conveys pleasantness or delightfulness. 'Pleasant' is straightforward
    and keeps the semantic contrast from being overstated; the verse speaks not only
    of monetary value but of desirability.
