id: PRO.24.26
reference: Proverbs 24:26
source:
  edition: WLC
  text: שְׂפָתַ֥יִם יִשָּׁ֑ק מֵ֝שִׁ֗יב דְּבָרִ֥ים נְכֹחִֽים׃
translation:
  text: He kisses the lips who gives upright words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'An honest answer is like a kiss on the lips.' The Hebrew verb is active
      ('he kisses'), but the proverb may function idiomatically to compare a fitting
      answer to the intimacy or sincerity of a kiss.
    reason: alternative_reading
  - marker: b
    text: '''Upright words'' may also be rendered ''right words,'' ''straightforward
      words,'' or ''honest words.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂפָתַיִם
  chosen: the lips
  alternatives:
  - lips
  lexicon: HALOT
  rationale: Dual form of שָׂפָה used idiomatically for 'lips.' Retained concretely
    rather than paraphrasing to preserve the proverb's imagery of a kiss.
- source_word: יִשָּׁק
  chosen: he kisses
  alternatives:
  - kisses
  - will kiss
  - is kissed
  lexicon: HALOT
  rationale: Qal imperfect 3ms of נשׁק normally means 'to kiss.' The form is active;
    although some translations take the line as passive in sense ('an honest answer
    is like a kiss on the lips'), the Hebrew verbal form straightforwardly supports
    active 'he kisses.' English keeps the gnomic present appropriate to proverbial
    style.
- source_word: מֵשִׁיב
  chosen: who gives
  alternatives:
  - who answers
  - one answering
  - who responds with
  lexicon: HALOT
  rationale: Hiphil participle of שוב can mean 'to return, answer, respond.' In context
    with 'words' it denotes giving or returning an answer. 'Who gives' is smoother
    modern English while still reflecting the responsive sense.
- source_word: דְּבָרִים
  chosen: words
  alternatives:
  - an answer
  - things said
  - speech
  lexicon: HALOT
  rationale: Plural 'words' is explicit in the Hebrew and should be preserved rather
    than collapsed into singular 'answer,' though the responsive context is acknowledged.
- source_word: נְכֹחִים
  chosen: upright
  alternatives:
  - right
  - straightforward
  - honest
  lexicon: HALOT
  rationale: Adjective conveys what is straight, right, or fitting. 'Upright' preserves
    the moral nuance without over-paraphrasing; 'honest' is a viable interpretive
    alternative but slightly narrower.
