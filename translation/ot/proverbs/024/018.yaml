theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Per DOCTRINE.md, the
    default rendering is 'the LORD,' not a transliteration of the Tetragrammaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
