id: PRO.24.25
reference: Proverbs 24:25
source:
  edition: WLC
  text: וְ/לַ/מּוֹכִיחִ֥ים יִנְעָ֑ם וַֽ֝/עֲלֵי/הֶ֗ם תָּב֥וֹא בִרְכַּת טֽוֹב־׃
translation:
  text: But for those who rebuke, it will be pleasant, and a good blessing will come
    upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who reprove' or 'those who correct.' The Hebrew participle refers
      to people who give needed rebuke or correction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blessing of good,' that is, a beneficial or favorable blessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַמּוֹכִיחִים
  chosen: But for those who rebuke
  alternatives:
  - But to those who reprove
  - But for those who correct
  lexicon: HALOT
  rationale: The participle from יכח refers to those who give reproof or correction.
    'Those who rebuke' is concise, natural English and fits the wisdom context of
    moral/judicial correction. The prefixed conjunction is rendered adversatively
    as 'But' in contrast to the previous verse.
- source_word: יִנְעָם
  chosen: it will be pleasant
  alternatives:
  - there will be delight
  - it will go well
  - it will be sweet
  lexicon: HALOT
  rationale: From נעם, expressing pleasantness or delight. The verb is impersonal
    here; 'it will be pleasant' preserves the terseness of the Hebrew without over-specifying
    the subject. The sense is that a favorable outcome attends those who rebuke rightly.
- source_word: וַעֲלֵיהֶם
  chosen: and ... upon them
  alternatives:
  - and on them
  - and over them
  lexicon: HALOT
  rationale: The prepositional phrase marks the recipients of what follows. 'Upon
    them' is idiomatic with 'come' and preserves the imagery of blessing descending
    on them.
- source_word: תָּבֹוא
  chosen: will come
  alternatives:
  - shall come
  - will arrive
  lexicon: HALOT
  rationale: Simple future of בוא. 'Will come' is the most natural and direct rendering
    in English.
- source_word: בִרְכַּת טוֹב
  chosen: a good blessing
  alternatives:
  - the blessing of good
  - a blessing of good things
  - a rich blessing
  lexicon: HALOT
  rationale: The construct phrase literally reads 'blessing of good.' 'A good blessing'
    keeps the Hebrew compactness and avoids over-interpretation, while still sounding
    acceptable in English. The phrase denotes a beneficial or favorable blessing.
