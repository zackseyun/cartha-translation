id: PRO.24.22
reference: Proverbs 24:22
source:
  edition: WLC
  text: כִּֽי פִ֭תְאֹם יָק֣וּם אֵידָ֑/ם וּ/פִ֥יד שְׁ֝נֵי/הֶ֗ם מִ֣י יוֹדֵֽעַ־׃ס
translation:
  text: for their disaster will rise suddenly, and who knows the ruin of them both?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their calamity will arise suddenly.'
    reason: lexical_alternative
  - marker: b
    text: '''Them both'' likely refers to the LORD and the king mentioned in the previous
      verse; alternatively, some understand it more generally or as referring to other
      implied parties in the context.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding exhortation in v.21; 'for' is
    the most natural causal connector in English here.
- source_word: פִתְאֹם
  chosen: suddenly
  alternatives:
  - in an instant
  - unexpectedly
  lexicon: HALOT
  rationale: Adverbial term indicating abruptness; 'suddenly' is clear, idiomatic,
    and preserves the warning tone.
- source_word: יָקוּם
  chosen: will rise
  alternatives:
  - will arise
  - will come
  lexicon: HALOT
  rationale: Qal imperfect of קום, literally 'rise/arise.' 'Will rise' keeps the vivid
    Hebrew imagery rather than flattening to merely 'come.'
- source_word: אֵידָם
  chosen: their disaster
  alternatives:
  - their calamity
  - their ruin
  lexicon: HALOT
  rationale: אֵיד denotes calamity/disaster. The suffix is 3mp, referring back to
    the king and those given to change/rebellion in the previous verse. 'Disaster'
    is natural modern English and suitably weighty.
- source_word: וּפִיד
  chosen: and ... the ruin
  alternatives:
  - and ... destruction
  - and ... calamity
  lexicon: HALOT
  rationale: פִיד is a near-synonym for destructive ruin or calamity. Rendering it
    as 'ruin' preserves the poetic parallelism while avoiding exact repetition of
    'disaster.'
- source_word: שְׁנֵיהֶם
  chosen: of them both
  alternatives:
  - from both of them
  - belonging to both
  lexicon: HALOT
  rationale: 'The dual/plural form with suffix most naturally means ''the two of them/both
    of them.'' In context it likely refers to the two parties just mentioned in v.21:
    the LORD and the king, whose jointly sourced judgment is beyond human foresight.'
- source_word: מִי יוֹדֵעַ
  chosen: who knows
  alternatives:
  - who can know
  - who understands
  lexicon: HALOT
  rationale: A rhetorical question expressing human inability to foresee or comprehend.
    'Who knows' is concise and idiomatic.
