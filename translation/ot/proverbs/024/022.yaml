theological_decisions:
- issue: Referent of 'them both' (שְׁנֵיהֶם)
  chosen_reading: Refers to the two authorities in the previous verse, the LORD and
    the king, whose disaster/ruin they bring upon rebels is unpredictable.
  alternative_readings:
  - Refers to the rebellious people and the king
  - Refers more generally to any two previously implied parties
  rationale: 'The immediate context of v.21 names ''the LORD'' and ''the king'' and
    warns against associating with rebels. The most coherent reading is that v.22
    gives the reason: their calamity comes suddenly, and no one knows the ruin that
    those two authorities can bring. The English keeps the ambiguity of the Hebrew
    expression by rendering ''of them both'' rather than over-specifying the subject
    in the main text.'
  doctrine_reference: 'Translation philosophy #3: preserve theological/interpre­tive
    tension rather than resolve it'
