id: PRO.24.33
reference: Proverbs 24:33
source:
  edition: WLC
  text: מְעַ֣ט שֵׁ֭נוֹת מְעַ֣ט תְּנוּמ֑וֹת מְעַ֓ט חִבֻּ֖ק יָדַ֣יִם לִ/שְׁכָּֽב׀׃
translation:
  text: A little sleep, a little slumber, a little folding of the hands to lie down—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a little folding of the hands to rest.' The Hebrew infinitive can denote
      lying down generally, with rest or sleep as the implied result.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  chosen: a little
  alternatives:
  - a bit
  - a few
  lexicon: HALOT
  rationale: Repeated three times for rhetorical effect; 'a little' preserves the
    measured, incremental sense and the parallelism.
- source_word: שֵׁנוֹת
  chosen: sleep
  alternatives:
  - sleeps
  lexicon: HALOT
  rationale: Though formally plural, the English singular 'sleep' is the natural mass-noun
    equivalent and preserves the proverbial cadence.
- source_word: תְּנוּמוֹת
  chosen: slumber
  alternatives:
  - dozing
  - drowsing
  lexicon: HALOT
  rationale: '''Slumber'' keeps the near-synonymous poetic parallel with ''sleep''
    while sounding suitably proverbial and slightly more marked than ordinary ''sleep''.'
- source_word: חִבֻּק יָדַיִם
  chosen: folding of the hands
  alternatives:
  - embracing the hands
  - folding the hands
  lexicon: HALOT
  rationale: Idiomatic expression for inactivity or idleness. 'Folding of the hands'
    closely reflects the Hebrew construct phrase while remaining natural English.
- source_word: לִשְׁכָּב
  chosen: to lie down
  alternatives:
  - to rest
  - to sleep
  lexicon: HALOT
  rationale: The infinitive denotes the purpose/result of the folded hands. 'To lie
    down' is the most direct rendering and avoids overinterpreting it as specifically
    'to sleep' when the Hebrew is broader.
