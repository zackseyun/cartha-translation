id: PRO.24.5
reference: Proverbs 24:5
source:
  edition: WLC
  text: גֶּֽבֶר חָכָ֥ם בַּ/ע֑וֹז וְ/אִֽישׁ דַּ֝֗עַת מְאַמֶּץ כֹּֽחַ־־־׃
translation:
  text: A wise man is strong, and a man of knowledge strengthens his power.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wise strong man' / 'A wise man is in strength.' The Hebrew construction
      with בַּעֹז is compact and may be taken either attributively or predicatively;
      the main text adopts the predicative sense for clearer English.
    reason: lexical_alternative
  - marker: b
    text: Or 'a man of knowledge increases strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  chosen: man
  alternatives:
  - strong man
  - mighty man
  lexicon: HALOT
  rationale: Although גבר can emphasize a strong or vigorous male, here the following
    adjective חכם defines the figure by wisdom rather than physical prowess. 'Man'
    preserves the masculine singular form and representative proverb style without
    overloading the noun with 'strong' before the contrastive point is made by בעוז.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  lexicon: HALOT
  rationale: In Proverbs, חכם regularly denotes wisdom in the moral-practical sense.
    'Wise' is the standard and contextually appropriate rendering.
- source_word: בַּעֹז
  chosen: is strong
  alternatives:
  - in strength
  - with strength
  lexicon: HALOT
  rationale: The preposition ב plus עז is compressed idiomatically. A wooden rendering
    'in strength' is possible, but English reads more naturally with the predicative
    sense 'is strong,' which captures the proverb's assertion that wisdom confers
    strength.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - one
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine and proverbial. Per translation
    philosophy, gender-accurate language is preferred where the source uses masculine
    representative forms.
- source_word: דַּעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דעת in wisdom literature commonly refers to knowledge or discernment.
    'Knowledge' is the most direct and consistent gloss here.
- source_word: מְאַמֶּץ
  chosen: strengthens
  alternatives:
  - increases
  - makes firm
  lexicon: HALOT
  rationale: The participle from אמץ conveys making strong or strengthening. 'Strengthens'
    best matches the verbal force and parallels the first colon.
- source_word: כֹּחַ
  chosen: his power
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: כח overlaps with 'strength' and 'power.' 'His power' avoids repeating
    'strong/strengthens' too mechanically while preserving the sense of personal capacity
    being reinforced by knowledge. The pronominal sense is implicit in English from
    the generic singular subject.
