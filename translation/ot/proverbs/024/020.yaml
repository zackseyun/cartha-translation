id: PRO.24.20
reference: Proverbs 24:20
source:
  edition: WLC
  text: כִּ֤י לֹֽא תִהְיֶ֣ה אַחֲרִ֣ית לָ/רָ֑ע נֵ֖ר רְשָׁעִ֣ים יִדְעָֽךְ׀־׃
translation:
  text: For there will be no future for the evil man; the lamp of the wicked will
    be put out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'end' or 'outcome' for 'future.' The Hebrew אַחֲרִית can refer to a person's
      latter end, outcome, or future prospect.
    reason: lexical_alternative
  - marker: b
    text: Or 'the lamp of the wicked will go out.' The image of the lamp signifies
      the extinguishing of life, prosperity, or enduring standing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding admonition in
    context; 'For' is a natural English connective that preserves the causal force.
- source_word: לֹא תִהְיֶה
  chosen: there will be no
  alternatives:
  - will not be
  - shall not be
  lexicon: HALOT
  rationale: The existential construction is best rendered idiomatically in English
    as 'there will be no,' preserving the simple negated future sense.
- source_word: אַחֲרִית
  chosen: future
  alternatives:
  - end
  - outcome
  - posterity
  lexicon: HALOT
  rationale: In wisdom literature אַחֲרִית often denotes one's future or final outcome.
    Here 'future' fits the parallel with the extinguished lamp and communicates the
    loss of any enduring prospect. 'End' could be misunderstood as mere termination
    rather than destiny/outcome.
- source_word: לָרָע
  chosen: for the evil man
  alternatives:
  - for the evil one
  - for the wicked
  - for evil
  lexicon: HALOT
  rationale: The form is singular with the article and refers to an evil person, not
    abstract evil. 'Evil man' keeps the singular and personal reference. Because English
    can hear 'man' generically or specifically, this rendering remains close to the
    Hebrew while matching the masculine singular form.
- source_word: נֵר
  chosen: lamp
  alternatives:
  - light
  lexicon: HALOT
  rationale: The literal image is a lamp, a common biblical metaphor for life, prosperity,
    or continuance. 'Lamp' preserves the concrete metaphor better than the more abstract
    'light'.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evil people
  lexicon: HALOT
  rationale: A plural substantive adjective meaning wicked persons. 'The wicked' is
    idiomatic, concise, and preserves the class reference without unnecessary expansion.
- source_word: יִדְעָךְ
  chosen: will be put out
  alternatives:
  - will go out
  - will be extinguished
  - will grow dim
  lexicon: HALOT
  rationale: The verb means to be extinguished or go out, especially of a lamp. 'Will
    be put out' communicates the extinguishing clearly in contemporary English while
    fitting the lamp metaphor. 'Will go out' is also possible but slightly less vivid.
