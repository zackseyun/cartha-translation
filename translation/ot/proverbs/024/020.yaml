theological_decisions:
- issue: Rendering of singular רָע versus plural רְשָׁעִים
  chosen_reading: Translate the first colon with singular 'the evil man' and the second
    with collective plural 'the wicked.'
  alternative_readings:
  - Translate both generically as 'the wicked' for smoother English
  - Translate singular as 'the evil one'
  rationale: The Hebrew intentionally shifts from singular to plural. Preserving that
    distinction maintains the source texture without importing a theological referent
    such as Satan for 'the evil one.'
  doctrine_reference: 'Translation philosophy #1, #4, #5'
- issue: Meaning of אַחֲרִית
  chosen_reading: Render as 'future' rather than 'posterity.'
  alternative_readings:
  - end
  - outcome
  - posterity
  rationale: In this wisdom context the point is that the wicked have no enduring
    prospect or favorable outcome, matching the extinguished lamp image. 'Posterity'
    is too narrow and would over-specify descendants where the Hebrew more broadly
    concerns one's future.
  doctrine_reference: 'Translation philosophy #1, #6'
