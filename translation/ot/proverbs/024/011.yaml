id: PRO.24.11
reference: Proverbs 24:11
source:
  edition: WLC
  text: הַ֭צֵּל לְקֻחִ֣ים לַ/מָּ֑וֶת וּ/מָטִ֥ים לַ֝/הֶ֗רֶג אִם תַּחְשֽׂוֹךְ־׃
translation:
  text: Rescue those being taken away to death, and hold back those staggering to
    the slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and those staggering to the slaughter, if you hold back'' (or
      ''do not hold back''). The final words are syntactically difficult and may be
      taken with the next verse; the main text renders the likely sense in context.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַצֵּל
  chosen: Rescue
  alternatives:
  - Deliver
  - Save
  lexicon: HALOT
  rationale: Imperative of נצל calling for urgent intervention. 'Rescue' is natural
    modern English and preserves the concrete sense of snatching from danger better
    than the more formal 'deliver'.
- source_word: לְקֻחִים
  chosen: those being taken away
  alternatives:
  - those taken
  - captives
  lexicon: HALOT
  rationale: Passive participle of לקח, 'taken/seized.' The progressive English 'being
    taken away' captures the participial sense and the ongoing movement toward death.
    'Captives' is possible but too specific for the Hebrew here.
- source_word: לַמָּוֶת
  chosen: to death
  alternatives:
  - for death
  - toward death
  lexicon: HALOT
  rationale: The lamed marks destination/result. 'To death' is idiomatic and fits
    the image of persons being led toward execution or mortal danger.
- source_word: וּמָטִים
  chosen: those staggering
  alternatives:
  - those tottering
  - those slipping
  lexicon: HALOT
  rationale: Participle from מוט/מטה in the sense of wavering, tottering, or being
    on the verge of collapse. 'Staggering' vividly conveys instability and imminent
    peril in readable English.
- source_word: לַהֶרֶג
  chosen: to the slaughter
  alternatives:
  - to slaughter
  - to killing
  lexicon: HALOT
  rationale: הרג denotes killing/slaughter. 'To the slaughter' is the most idiomatic
    English expression for being led to violent death and preserves the severity of
    the Hebrew.
- source_word: אִם תַּחְשׂוֹךְ
  chosen: and hold back
  alternatives:
  - if you hold back
  - do not hold back
  lexicon: HALOT
  rationale: 'The Masoretic wording is syntactically difficult if rendered woodenly
    as ''if you hold back.'' In context, the verse is an exhortation parallel to the
    first colon. Many translations understand the sense as a further imperative: intervene
    rather than refrain. Rendering ''and hold back'' expresses the likely exhortational
    force in smooth English while staying close to the parallel structure.'
