theological_decisions:
- issue: Elliptical superscription force of לַחֲכָמִים
  chosen_reading: 'Treat as a heading introducing additional wise sayings: ''These
    also are sayings of the wise.'''
  alternative_readings:
  - '''These also belong to the wise'''
  - '''These also are for the wise'''
  rationale: The verse begins a subsection, and the terse Hebrew likely functions
    as a superscription rather than a direct statement about an audience. Rendering
    it as 'sayings of the wise' makes the discourse function explicit in English while
    remaining close to the Hebrew sense.
