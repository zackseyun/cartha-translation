id: PRO.24.23
reference: Proverbs 24:23
source:
  edition: WLC
  text: גַּם אֵ֥לֶּה לַֽ/חֲכָמִ֑ים הַֽכֵּר פָּנִ֖ים בְּ/מִשְׁפָּ֣ט בַּל טֽוֹב־־־׃
translation:
  text: 'These also are sayings of the wise: to show partiality in judgment is not
    good.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'These also, to/for the wise.' The sense is likely, 'These
      also are sayings of the wise.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'to recognize faces in judgment,' an idiom meaning to
      show favoritism or partiality.
    reason: cultural_note
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - further
  lexicon: HALOT
  rationale: 'Signals addition or continuation from the preceding collection: ''also''
    is natural English and preserves the connective force.'
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Demonstrative pointing to the following sayings or section heading; 'these'
    is concise and idiomatic.
- source_word: לַחֲכָמִים
  chosen: are sayings of the wise
  alternatives:
  - belong to the wise
  - for the wise
  - to the wise
  lexicon: HALOT
  rationale: The Hebrew literally reads 'to/for the wise,' likely an elliptical superscription
    meaning these sayings belong to or come from the wise. English requires supplementation
    for sense; 'are sayings of' best captures the heading-like function without over-paraphrase.
- source_word: הַכֵּר פָּנִים
  chosen: to show partiality
  alternatives:
  - to recognize faces
  - to be partial
  - to show favoritism
  lexicon: HALOT
  rationale: This idiom literally means 'to recognize faces' and refers to biased
    favor toward persons. 'Show partiality' is clear modern English and fits judicial
    context well.
- source_word: בְּמִשְׁפָּט
  chosen: in judgment
  alternatives:
  - in justice
  - in a legal decision
  - when judging
  lexicon: HALOT
  rationale: Here mishpat refers to judicial decision-making or legal judgment rather
    than abstract justice. 'In judgment' preserves the forensic setting and keeps
    the line compact.
- source_word: בַּל
  chosen: is not
  alternatives:
  - not
  - never
  lexicon: HALOT
  rationale: Negative particle in a verbless clause; English idiom requires supplying
    'is' for a natural predicate statement.
- source_word: טוֹב
  chosen: good
  alternatives:
  - right
  - fitting
  lexicon: HALOT
  rationale: The common evaluative adjective is broad; 'good' keeps the Hebrew's moral
    valuation without narrowing it to only legality or propriety.
