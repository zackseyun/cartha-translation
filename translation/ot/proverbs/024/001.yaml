id: PRO.24.1
reference: Proverbs 24:1
source:
  edition: WLC
  text: אַל תְּ֭קַנֵּא בְּ/אַנְשֵׁ֣י רָעָ֑ה וְ/אַל תתאו לִ/הְי֥וֹת אִתָּֽ/ם־־׃
translation:
  text: Do not envy evil men, and do not desire to be with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'men of evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not desire to be in their company.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  - do not ever
  lexicon: HALOT
  rationale: Standard negative particle used with the imperfect/jussive for prohibition;
    concise English imperative best matches the force.
- source_word: תְּקַנֵּא
  chosen: envy
  alternatives:
  - be jealous of
  - be envious of
  lexicon: HALOT
  rationale: קנא in this context denotes envious desire toward the apparent prosperity
    or status of the wicked, not zeal in a positive sense. 'Envy' is the most natural
    and precise English equivalent here.
- source_word: בְּאַנְשֵׁי רָעָה
  chosen: evil men
  alternatives:
  - men of evil
  - wicked men
  - evil people
  lexicon: HALOT
  rationale: אַנְשֵׁי is grammatically masculine plural construct, literally 'men
    of'; רָעָה characterizes them by evil. Per gender-accurate philosophy, 'men' is
    retained rather than neutralizing to 'people,' since the Hebrew is explicitly
    masculine and there is no clear signal that the masculine should be flattened
    here. 'Evil men' is idiomatic English.
- source_word: וְאַל
  chosen: and do not
  alternatives:
  - and do not ever
  - nor
  lexicon: HALOT
  rationale: The conjunction links a second prohibition. 'And do not' preserves the
    parallel structure cleanly.
- source_word: תתאו
  chosen: desire
  alternatives:
  - long
  - crave
  lexicon: HALOT
  rationale: From אוה, expressing desire or inclination. 'Desire' is broad enough
    to cover the warning against wanting their company or way of life without overstating
    the emotional intensity.
- source_word: לִהְיוֹת
  chosen: to be
  alternatives:
  - to become
  - to associate
  lexicon: HALOT
  rationale: Infinitive of היה, here governing the phrase 'with them.' The plain sense
    is relational presence/association; 'to be' keeps the Hebrew structure.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - among them
  - in their company
  lexicon: HALOT
  rationale: Preposition with pronominal suffix indicating companionship or association.
    'With them' is straightforward; the nuance of companionship is already conveyed
    by the preceding 'desire to be.'
