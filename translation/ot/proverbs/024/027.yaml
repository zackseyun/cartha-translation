id: PRO.24.27
reference: Proverbs 24:27
source:
  edition: WLC
  text: הָ֘כֵ֤ן בַּ/ח֨וּץ מְלַאכְתֶּ֗/ךָ וְ/עַתְּדָ֣/הּ בַּ/שָּׂדֶ֣ה לָ֑/ךְ אַ֝חַ֗ר
    וּ/בָנִ֥יתָ בֵיתֶֽ/ךָ׀׃פ
translation:
  text: Prepare your work outside; get it ready for yourself in the field; afterward,
    build your house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Establish your work outside; make it ready for yourself in the field;
      afterward build your house.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' may carry a broader sense of home or household in wisdom literature,
      but the immediate contrast with ''outside'' and ''field'' supports the concrete
      sense here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכֵן
  chosen: Prepare
  alternatives:
  - Establish
  - Set in order
  - Make ready
  lexicon: HALOT
  rationale: The imperative from כון here calls for making something ready or properly
    arranged. 'Prepare' is natural modern English and fits the proverb's sequence
    of priorities.
- source_word: בַּחוּץ
  chosen: outside
  alternatives:
  - outdoors
  - in the open
  lexicon: HALOT
  rationale: The term denotes the outside/open area, contrasted with the house later
    in the verse. 'Outside' preserves the spatial contrast clearly.
- source_word: מְלַאכְתֶּךָ
  chosen: your work
  alternatives:
  - your task
  - your labor
  lexicon: HALOT
  rationale: מְלָאכָה is broad for work/labor/task. 'Your work' is the most straightforward
    and idiomatic here, likely referring to productive labor rather than a single
    chore.
- source_word: וְעַתְּדָהּ
  chosen: get it ready
  alternatives:
  - make it ready
  - prepare it
  - set it in order
  lexicon: HALOT
  rationale: The verb עתד in the Piel conveys making something ready or prepared.
    The 3fs suffix most naturally refers back to 'your work' as a feminine noun. 'Get
    it ready' is idiomatic and keeps the preparatory sense.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - on the farmland
  lexicon: HALOT
  rationale: The field is the place where agricultural work is made ready. 'In the
    field' is the plain and concrete rendering.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun marks personal interest or benefit. 'For yourself'
    brings out the reflexive-benefactive nuance in natural English.
- source_word: אַחַר
  chosen: afterward
  alternatives:
  - after that
  - then
  lexicon: HALOT
  rationale: 'The adverb marks sequence: first prepare productive work, then build
    the house. ''Afterward'' preserves the temporal ordering central to the proverb.'
- source_word: וּבָנִיתָ בֵיתֶךָ
  chosen: build your house
  alternatives:
  - build your household
  - build your home
  lexicon: HALOT
  rationale: The literal sense is 'build your house.' While 'house' can sometimes
    extend to household/family, the immediate contrast with outside/field favors the
    concrete dwelling, with possible broader application left to interpretation rather
    than imported into the translation.
