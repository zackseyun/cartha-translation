id: PRO.24.34
reference: Proverbs 24:34
source:
  edition: WLC
  text: וּ/בָֽא מִתְהַלֵּ֥ךְ רֵישֶׁ֑/ךָ וּ֝/מַחְסֹרֶ֗י/ךָ כְּ/אִ֣ישׁ מָגֵֽן־׃פ
translation:
  text: and your poverty will come stalking, and your need like an armed man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "like a man with a shield."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: and ... will come
  alternatives:
  - so ... comes
  - then ... will come
  lexicon: HALOT
  rationale: 'Qal perfect of בוא with prefixed conjunction continues the consequence
    from the previous verse; in English a future sense fits the proverbial warning:
    poverty ''will come.'''
- source_word: מִתְהַלֵּךְ
  chosen: stalking
  alternatives:
  - walking about
  - prowling
  - roaming
  lexicon: HALOT
  rationale: Hitpael participle of הלך conveys movement about or to-and-fro. In this
    context it modifies the manner of poverty's arrival as gradual but threatening.
    'Stalking' preserves the vivid, menacing nuance better than the flatter 'walking
    about.'
- source_word: רֵישֶׁךָ
  chosen: your poverty
  alternatives:
  - your poverty/penury
  - your destitution
  lexicon: HALOT
  rationale: The noun denotes poverty or impoverishment. 'Poverty' is the most natural
    modern English equivalent and matches the warning context.
- source_word: וּמַחְסֹרֶיךָ
  chosen: and your need
  alternatives:
  - and your lack
  - and your want
  lexicon: HALOT
  rationale: The noun מחסור denotes lack or need. Singular 'need' is idiomatic in
    English even though the Hebrew form is plural/collective with suffix; it parallels
    'poverty' smoothly without sounding wooden.
- source_word: כְּאִישׁ
  chosen: like a man
  alternatives:
  - as a man
  - like someone
  lexicon: HALOT
  rationale: The comparative כ plus איש is straightforward. Because the following
    noun specifies the kind of man, the full phrase is rendered together as 'like
    an armed man.'
- source_word: מָגֵן
  chosen: armed
  alternatives:
  - with a shield
  - shield-bearing
  lexicon: HALOT
  rationale: Literally 'shield.' In the idiom איש מגן, the sense is a man equipped
    for attack or confrontation. 'Armed man' communicates the force of the image in
    clear modern English; the more literal 'man with a shield' is possible and preserved
    in a footnote.
