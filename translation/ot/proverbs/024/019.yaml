id: PRO.24.19
reference: Proverbs 24:19
source:
  edition: WLC
  text: אַל תִּתְחַ֥ר בַּ/מְּרֵעִ֑ים אַל תְּ֝קַנֵּ֗א בָּ/רְשָׁעִֽים־־׃
translation:
  text: Do not be agitated because of evildoers; do not envy the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not fret because of evildoers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְחַר
  chosen: be agitated
  alternatives:
  - fret
  - be incensed
  - be vexed
  lexicon: HALOT
  rationale: The hitpael of חרה here denotes becoming heated or stirred up emotionally.
    'Be agitated' captures the internal disturbance without importing specifically
    anger alone. Traditional 'fret' is possible, but is less natural for modern readers
    and can sound weaker or archaic.
- source_word: בַּמְּרֵעִים
  chosen: because of evildoers
  alternatives:
  - among evildoers
  - at evildoers
  - over evildoers
  lexicon: HALOT
  rationale: 'The preposition ב with this verb is idiomatically causal/object-related
    in this context: the warning is not to become emotionally stirred on account of
    evildoers. ''Evildoers'' reflects the participial form מְרֵעִים, those doing evil.'
- source_word: תְּקַנֵּא
  chosen: envy
  alternatives:
  - be jealous of
  - be zealous against
  lexicon: HALOT
  rationale: In wisdom literature קנא with ב commonly means to be envious or jealous
    of someone. 'Envy' is the clearest idiomatic English here, especially in parallel
    with the first colon's prohibition.
- source_word: בָּרְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: רְשָׁעִים is the standard wisdom-category term for morally guilty or
    wicked persons. 'The wicked' preserves the concise proverbial register and the
    category contrast common in Proverbs.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect/jussive gives a straightforward prohibition. 'Do
    not' is the most natural and accurate English imperative equivalent.
