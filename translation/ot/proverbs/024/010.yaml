id: PRO.24.10
reference: Proverbs 24:10
source:
  edition: WLC
  text: הִ֭תְרַפִּיתָ בְּ/י֥וֹם צָרָ֗ה צַ֣ר כֹּחֶֽ/כָה׃
translation:
  text: If you falter in a day of distress, your strength is small.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you show yourself weak in a day of trouble, your strength is limited.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְרַפִּיתָ
  chosen: you falter
  alternatives:
  - you slack off
  - you show yourself weak
  - you become discouraged
  - you are lax
  lexicon: HALOT
  rationale: The hitpael/perfect of רפה conveys becoming slack, weak, or losing resolve.
    'You falter' captures both the conditional sense in context and the moral/volitional
    nuance without over-paraphrasing. It is more idiomatic than 'you have shown yourself
    weak' while preserving the proverb's evaluative force.
- source_word: בְּיוֹם
  chosen: in a day of
  alternatives:
  - on the day of
  - when
  lexicon: HALOT
  rationale: The preposition ב plus 'day' is naturally temporal. In English proverb
    style, 'in a day of' is smooth and sufficiently formal; the initial 'If' in English
    carries the conditional force of the clause.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - trouble
  - adversity
  - calamity
  lexicon: HALOT
  rationale: צָרָה denotes trouble, distress, or adversity. 'Distress' fits the compressed
    style of the proverb and pairs well with the following assessment of strength.
    'Adversity' is possible, but 'distress' better reflects the experiential pressure
    implied by the Hebrew.
- source_word: צַר
  chosen: is small
  alternatives:
  - is narrow
  - is limited
  - is scant
  lexicon: HALOT
  rationale: The adjective literally means narrow/tight and idiomatically conveys
    restricted or insufficient measure. With 'strength' as subject, 'is small' is
    a natural English rendering that preserves the metaphor of insufficiency without
    sounding wooden.
- source_word: כֹּחֶךָ
  chosen: your strength
  alternatives:
  - your power
  - your capacity
  - your vigor
  lexicon: HALOT
  rationale: כֹּחַ commonly means strength, power, or capacity. 'Your strength' is
    the most direct and idiomatic choice in wisdom literature, matching the proverb's
    concern with inner resilience under pressure.
