id: PRO.24.28
reference: Proverbs 24:28
source:
  edition: WLC
  text: אַל תְּהִ֣י עֵד חִנָּ֣ם בְּ/רֵעֶ֑/ךָ וַ֝/הֲ/פִתִּ֗יתָ בִּ/שְׂפָתֶֽי/ךָ־־׃
translation:
  text: Do not be a witness against your neighbor without cause, or deceive with your
    lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and deceive with your lips.' The Hebrew conjunction can be read simply
      as 'and'; 'or' is used in the main text to express the paired prohibitions more
      naturally in English.
    reason: lexical_alternative
  - marker: b
    text: '''Without cause'' may also be rendered ''for nothing'' or ''without reason.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  lexicon: HALOT
  rationale: Standard negative prohibition particle introducing a direct prohibition.
- source_word: תְּהִי
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: 'Qal imperfect/jussive of היה after אַל functions as a prohibition: ''do
    not be.'''
- source_word: עֵד
  chosen: a witness
  alternatives:
  - a testimony-bearer
  lexicon: HALOT
  rationale: The noun denotes a witness, especially in a legal or quasi-legal setting;
    'witness' is the natural English equivalent.
- source_word: חִנָּם
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  - without reason
  lexicon: HALOT
  rationale: Here the adverb modifies the witnessing as groundless or unjustified.
    'Without cause' communicates the ethical/legal sense better than the more wooden
    'for nothing.'
- source_word: בְּרֵעֶךָ
  chosen: against your neighbor
  alternatives:
  - concerning your neighbor
  - with respect to your neighbor
  lexicon: HALOT
  rationale: Although ב can be rendered broadly, with 'witness' in legal context English
    idiom is 'bear/be a witness against' someone. 'Neighbor' preserves the covenantal-social
    sense of רֵעַ.
- source_word: וַהֲפִתִּיתָ
  chosen: or deceive
  alternatives:
  - and deceive
  - and mislead
  - and entice
  lexicon: HALOT
  rationale: 'From פתה, ''to deceive/mislead/entice.'' In this context of false or
    baseless testimony, ''deceive'' best fits the misuse of speech. The conjunction
    is rendered ''or'' to reflect the likely rhetorical force in English: a second
    prohibited action closely linked to the first, rather than simple narrative sequence.'
- source_word: בִּשְׂפָתֶיךָ
  chosen: with your lips
  alternatives:
  - by your speech
  - with your words
  lexicon: HALOT
  rationale: A concrete Hebrew idiom for speech. 'With your lips' preserves the imagery
    while remaining clear in English.
