theological_decisions:
- issue: Generic אדם rendering
  chosen_reading: to man
  alternative_readings:
  - to humankind
  - to people
  rationale: The Hebrew uses singular generic אדם. Following the stated gender-accurate
    philosophy, the main text keeps the representative singular rather than flattening
    it to a plural or fully gender-neutral expression, while preserving the inclusive
    sense in a footnote.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy 4; Contested terms: אָדָם
    adam'
