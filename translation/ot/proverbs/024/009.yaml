id: PRO.24.9
reference: Proverbs 24:9
source:
  edition: WLC
  text: זִמַּ֣ת אִוֶּ֣לֶת חַטָּ֑את וְ/תוֹעֲבַ֖ת לְ/אָדָ֣ם לֵֽץ׃
translation:
  text: The scheme of folly is sin, and a scoffer is an abomination to man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to humankind' / 'to people'; Hebrew 'to man' uses אדם generically for
      humanity.
    reason: lexical_alternative
  - marker: b
    text: Or 'a mocker' for 'a scoffer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִמַּת
  chosen: scheme
  alternatives:
  - plan
  - device
  - plot
  - thought
  lexicon: HALOT
  rationale: The noun from זמם denotes a plan or devised intention. 'Scheme' preserves
    the deliberative sense and can carry the negative coloring fitting the proverb,
    without overcommitting to 'plot' if the term is more general.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: This abstract noun denotes folly/foolishness rather than a concrete 'fool.'
    'Folly' is concise and idiomatic in Proverbs, matching wisdom-literature style.
- source_word: חַטָּאת
  chosen: sin
  alternatives:
  - sinful
  - offense
  lexicon: HALOT
  rationale: 'Here the noun functions predicatively: the scheme of folly ''is sin.''
    The simple noun ''sin'' best matches the Hebrew and avoids paraphrase.'
- source_word: תוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a disgust
  lexicon: HALOT
  rationale: The construct with לְאָדָם expresses that the scoffer is something detestable
    to people. 'An abomination' preserves the strong moral revulsion of תועבה and
    is standard biblical English.
- source_word: לְאָדָם
  chosen: to man
  alternatives:
  - to humankind
  - to people
  lexicon: HALOT
  rationale: אָדָם here has generic force. Per doctrine, gender-accurate rendering
    is preferred where representative/generic force is present. 'To man' preserves
    the singular generic form of the Hebrew; an inclusive alternative is worth noting
    in a footnote.
- source_word: לֵץ
  chosen: a scoffer
  alternatives:
  - a mocker
  lexicon: HALOT
  rationale: לץ in Proverbs denotes one who arrogantly mocks and rejects correction.
    'Scoffer' captures both the verbal mockery and the moral posture, though 'mocker'
    is a viable alternative.
