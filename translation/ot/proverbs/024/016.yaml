id: PRO.24.16
reference: Proverbs 24:16
source:
  edition: WLC
  text: כִּ֤י שֶׁ֨בַע יִפּ֣וֹל צַדִּ֣יק וָ/קָ֑ם וּ֝/רְשָׁעִ֗ים יִכָּשְׁל֥וּ בְ/רָעָֽה׀׃
translation:
  text: For the righteous man falls seven times and rises again, but the wicked stumble
    in calamity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the righteous' or 'a righteous person'; Hebrew has a masculine singular
      form used representatively in a proverb.
    reason: lexical_alternative
  - marker: b
    text: '''Seven'' is likely idiomatic for repeated occurrence or fullness: the
      righteous may fall many times, yet rise again.'
    reason: cultural_note
  - marker: c
    text: Or 'stumble in disaster' or 'are overthrown by calamity.' The Hebrew term
      can denote adversity or disaster rather than moral evil in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or ground for the preceding admonition,
    so 'For' best preserves the logical connection in natural English.
- source_word: שֶׁבַע
  chosen: seven times
  alternatives:
  - seven
  - repeatedly
  lexicon: HALOT
  rationale: The numeral 'seven' is idiomatic for completeness or repeated occurrence.
    'Seven times' preserves the Hebrew image while making clear it modifies the repeated
    falling.
- source_word: יִפּוֹל
  chosen: falls
  alternatives:
  - may fall
  - falls down
  lexicon: HALOT
  rationale: The imperfect here expresses a general truth/proverbial action. Simple
    present 'falls' fits English proverbial style without adding modal nuance.
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The righteous man'
    preserves the masculine singular form in line with the gender-accurate policy
    while still conveying a representative type rather than one individual.
- source_word: וָקָם
  chosen: and rises again
  alternatives:
  - and gets up
  - yet rises
  lexicon: HALOT
  rationale: The verb means 'arises/gets up.' 'Rises again' communicates recovery
    after falling and reads naturally in English, making explicit the iterative sense
    implied by the proverb.
- source_word: וּרְשָׁעִים
  chosen: but the wicked
  alternatives:
  - and the wicked
  - but wicked people
  lexicon: HALOT
  rationale: The conjunction is adversative in context, contrasting the righteous
    with the wicked. 'The wicked' is a standard substantive rendering of the plural
    adjective.
- source_word: יִכָּשְׁלוּ
  chosen: stumble
  alternatives:
  - are overthrown
  - fall
  lexicon: HALOT
  rationale: The Niphal of כשל conveys stumbling or being made to totter. 'Stumble'
    preserves the lexical image and sets up the contrast with the righteous person's
    recovery.
- source_word: בְרָעָה
  chosen: in calamity
  alternatives:
  - by evil
  - in trouble
  - in disaster
  lexicon: HALOT
  rationale: Here רָעָה most naturally denotes adversity/disaster rather than moral
    evil. 'In calamity' captures the sense that when disaster comes, the wicked collapse.
