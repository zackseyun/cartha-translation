theological_decisions:
- issue: Representative masculine singular in צַדִּיק
  chosen_reading: the righteous man
  alternative_readings:
  - the righteous
  - a righteous person
  rationale: The Hebrew is grammatically masculine singular used generically in a
    proverb. Per doctrine, gender-accurate rendering is preferred over flattening
    to a neutral form, while the representative force can be noted.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of the proverb
  chosen_reading: moral resilience of the righteous versus collapse of the wicked
    in adversity
  alternative_readings:
  - sinning seven times and repenting
  - physical falling and standing
  rationale: The immediate lexical contrast and the use of רָעָה favor adversity/calamity
    rather than specifically repeated moral failure. The translation avoids importing
    a doctrinalized reading about sin that the Hebrew does not explicitly state.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
