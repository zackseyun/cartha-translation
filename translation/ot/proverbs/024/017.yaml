id: PRO.24.17
reference: Proverbs 24:17
source:
  edition: WLC
  text: בִּ/נְפֹ֣ל אויבי/ך אַל תִּשְׂמָ֑ח וּ֝/בִ/כָּשְׁל֗/וֹ אַל יָגֵ֥ל לִבֶּֽ/ךָ־־׃
translation:
  text: Do not rejoice when your enemy falls, and do not let your heart exult when
    he stumbles,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Do not be glad when your enemy falls, and do not let your heart rejoice
      when he stumbles.'' The Hebrew uses two related but distinct joy terms: שמח
      (''rejoice/be glad'') and גיל (''exult'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּנְפֹל
  chosen: when ... falls
  alternatives:
  - at the falling of
  - in falling
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct of נפל functions temporally
    here: ''when [your enemy] falls.'' English temporal ''when'' best captures the
    idiom naturally without losing the event sense.'
- source_word: אֹיְבֶיךָ
  chosen: your enemy
  alternatives:
  - your foe
  - your enemies
  lexicon: HALOT
  rationale: Although the form can appear plural in spelling, the paired singular
    suffix in the following clause ('when he stumbles') supports a singular collective/individual
    sense here. 'Enemy' is the most straightforward gloss for איב.
- source_word: אַל
  chosen: Do not
  alternatives:
  - must not
  - never
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition. 'Do not' is the standard
    and natural English rendering.
- source_word: תִּשְׂמָח
  chosen: rejoice
  alternatives:
  - be glad
  - take joy
  lexicon: HALOT
  rationale: שמח denotes joy/gladness. 'Rejoice' fits wisdom-style exhortation and
    pairs well with the second colon's stronger emotional term.
- source_word: וּבִכָּשְׁלוֹ
  chosen: when he stumbles
  alternatives:
  - at his stumbling
  - when he falls
  lexicon: HALOT
  rationale: 'The conjunction plus ב with infinitive construct/suffixed form of כשל
    is again temporal: ''when he stumbles.'' Using ''stumbles'' preserves the lexical
    distinction from נפל (''falls'') in the first colon.'
- source_word: יָגֵל
  chosen: exult
  alternatives:
  - rejoice
  - be glad
  lexicon: HALOT
  rationale: גיל often conveys exuberant joy. 'Exult' preserves the heightened nuance
    and avoids flattening it into the same English verb used for שמח.
- source_word: לִבֶּךָ
  chosen: your heart
  alternatives:
  - your inner self
  lexicon: HALOT
  rationale: לב in wisdom literature commonly denotes the inner person, including
    thought and emotion. 'Your heart' is the natural English equivalent and preserves
    the Hebrew anthropological idiom.
