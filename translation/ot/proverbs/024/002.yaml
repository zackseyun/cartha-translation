id: PRO.24.2
reference: Proverbs 24:2
source:
  edition: WLC
  text: כִּי שֹׁ֭ד יֶהְגֶּ֣ה לִבָּ֑/ם וְ֝/עָמָ֗ל שִׂפְתֵי/הֶ֥ם תְּדַבֵּֽרְנָה־׃
translation:
  text: For their heart meditates on violence, and their lips speak trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'destruction' / 'devastation' for 'violence' (שֹׁד), emphasizing the
      ruin they contemplate.
    reason: lexical_alternative
  - marker: b
    text: Or 'mischief' for 'trouble' (עָמָל), highlighting harmful intent rather
      than general distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding prohibition in v.1; 'for' is
    natural English and preserves the explanatory force.
- source_word: שֹׁד
  chosen: violence
  alternatives:
  - destruction
  - devastation
  - plunder
  lexicon: HALOT
  rationale: In wisdom context describing the inward intent of wicked men, the noun
    denotes violent ruin or destructive wrongdoing. 'Violence' best captures the moral
    character of what they scheme, while remaining concise and idiomatic.
- source_word: יֶהְגֶּה
  chosen: meditates on
  alternatives:
  - murmurs
  - plots
  - devises
  lexicon: HALOT
  rationale: The verb הגה can denote low utterance, musing, or meditation. With 'heart'
    as subject, it refers to inward pondering. 'Meditates on' preserves the internal,
    sustained reflection without over-paraphrasing to 'plots,' though the context
    implies hostile intent.
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their mind
  - their inner being
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner thought-life and will. Singular
    collective 'their heart' reflects the Hebrew form and is acceptable in English.
- source_word: וְעָמָל
  chosen: trouble
  alternatives:
  - mischief
  - toil
  - harm
  lexicon: HALOT
  rationale: While עמל can mean labor/toil, in wisdom literature it often denotes
    trouble, mischief, or harmful wrongdoing. Here, parallel to violent inward meditation
    and linked with what their lips speak, 'trouble' communicates injurious speech
    without sounding archaic.
- source_word: שִׂפְתֵיהֶם
  chosen: their lips
  alternatives:
  - their mouth
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew poetic image and the contrast
    between inner heart and outward speech.
- source_word: תְּדַבֵּרְנָה
  chosen: speak
  alternatives:
  - utter
  - declare
  lexicon: HALOT
  rationale: Simple present 'speak' fits the proverbial style and naturally renders
    the imperfect in this gnomic context.
