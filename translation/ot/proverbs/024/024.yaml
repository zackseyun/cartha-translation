id: PRO.24.24
reference: Proverbs 24:24
source:
  edition: WLC
  text: אֹ֤מֵ֨ר לְ/רָשָׁע֮ צַדִּ֪יק אָ֥תָּה יִקְּבֻ֥/הוּ עַמִּ֑ים יִזְעָמ֥וּ/הוּ לְאֻמִּֽים׀׃
translation:
  text: Whoever says to the wicked, “You are righteous,” peoples will curse him; nations
    will denounce him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He who says to the wicked, ‘You are in the right,’ peoples will curse
      him; nations will be indignant at him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמֵר
  chosen: Whoever says
  alternatives:
  - He who says
  - One who says
  lexicon: HALOT
  rationale: The masculine singular participle functions generically/proverbially.
    'Whoever says' gives natural modern English while preserving the indefinite subject
    force better than a wooden 'he who says.'
- source_word: לְרָשָׁע
  chosen: to the wicked
  alternatives:
  - to a wicked man
  - to the guilty
  lexicon: HALOT
  rationale: רָשָׁע denotes a wicked person, not merely someone legally guilty in
    this context. 'The wicked' is a natural generic singular in English and preserves
    the moral category.
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - in the right
  - just
  lexicon: HALOT
  rationale: In wisdom literature צַדִּיק commonly denotes moral rightness. 'Righteous'
    best preserves the ethical contrast with רָשָׁע. 'In the right' would tilt more
    forensic; 'just' is possible but less idiomatic here.
- source_word: אָתָּה
  chosen: You are
  alternatives:
  - you are indeed
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew and naturally represented in the direct
    quotation as 'You are righteous.' No extra emphasis beyond normal English is required.
- source_word: יִקְּבֻהוּ
  chosen: will curse him
  alternatives:
  - will execrate him
  - will condemn him
  lexicon: HALOT
  rationale: From נקב in the sense of cursing/uttering a curse against. 'Curse' is
    the clearest contemporary English equivalent; 'execrate' is too elevated, and
    'condemn' weakens the imprecatory force.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - people groups
  - nations
  lexicon: HALOT
  rationale: The plural עַמִּים is best kept distinct from לְאֻמִּים in the next colon.
    'Peoples' preserves the plural collective sense without collapsing the parallelism.
- source_word: יִזְעָמֻהוּ
  chosen: will denounce him
  alternatives:
  - will be indignant at him
  - will curse him
  - will abhor him
  lexicon: HALOT
  rationale: The verb conveys indignation or denunciatory anger. Since the previous
    colon already uses 'curse,' varying the English here preserves the poetic parallelism
    without flattening both verbs into the same gloss. 'Denounce' captures public
    hostile repudiation well in context.
- source_word: לְאֻמִּים
  chosen: nations
  alternatives:
  - peoples
  - communities
  lexicon: HALOT
  rationale: As the paired term with עַמִּים, לְאֻמִּים is suitably rendered 'nations.'
    This maintains the synonymous parallelism while preserving lexical distinction
    between the cola.
