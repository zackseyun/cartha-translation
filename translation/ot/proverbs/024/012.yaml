theological_decisions:
- issue: Anthropological nuance of נֶפֶשׁ
  chosen_reading: your soul
  alternative_readings:
  - your life
  - yourself
  rationale: The verse speaks of God's intimate knowledge and guardianship. Rendering
    נֶפֶשׁ as 'soul' preserves the Hebrew term's depth and avoids reducing it to mere
    physical life, while not making a technical claim about later systematic anthropology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Generic singular אָדָם
  chosen_reading: a man
  alternative_readings:
  - a person
  rationale: The Hebrew is singular and representative. Following the gender-accurate
    principle, the translation keeps 'man' rather than neutralizing the form, while
    the sense remains generic.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
