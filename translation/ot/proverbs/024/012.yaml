id: PRO.24.12
reference: Proverbs 24:12
source:
  edition: WLC
  text: כִּֽי תֹאמַ֗ר הֵן֮ לֹא יָדַ֪עְנ֫וּ זֶ֥ה הֲֽ/לֹא תֹ֘כֵ֤ן לִבּ֨וֹת הֽוּא יָבִ֗ין
    וְ/נֹצֵ֣ר נַ֭פְשְׁ/ךָ ה֣וּא יֵדָ֑ע וְ/הֵשִׁ֖יב לְ/אָדָ֣ם כְּ/פָעֳלֽ/וֹ־־־׀־׃
translation:
  text: If you say, “Look, we did not know this,” does not he who weighs hearts understand,
    and he who keeps your soul know, and will he not repay a man according to his
    work?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we knew nothing of this.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “he who weighs hearts,” an image of God examining inner motives.
    reason: cultural_note
  - marker: c
    text: Or “he who guards your life.” Hebrew nephesh can mean “soul,” “life,” or
      “self,” depending on context.
    reason: lexical_alternative
  - marker: d
    text: Hebrew “a man,” used here in a generic sense for a human being.
    reason: lexical_alternative
  - marker: e
    text: Or “according to what he has done.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional scenario ('if you say') rather than
    a causal statement. English 'If' best fits the syntax with the following imperfect.
- source_word: תֹאמַר
  chosen: you say
  alternatives:
  - you were to say
  lexicon: HALOT
  rationale: Second masculine singular imperfect in a conditional clause; simple present
    in English idiomatically conveys the hypothetical.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection marking the quoted excuse. 'Look' is natural modern
    English while preserving the demonstrative force.
- source_word: לֹא יָדַעְנוּ זֶה
  chosen: we did not know this
  alternatives:
  - we knew nothing of this
  - we were unaware of this
  lexicon: HALOT
  rationale: Retains the first person plural and the object 'this.' The wording reflects
    an excuse of ignorance without over-paraphrase.
- source_word: הֲלֹא
  chosen: does not ... ?
  alternatives:
  - will not ... ?
  - surely ...
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. English
    auxiliary inversion captures the force.
- source_word: תֹכֵן לִבּוֹת
  chosen: he who weighs hearts
  alternatives:
  - he who examines hearts
  - he who measures hearts
  lexicon: HALOT
  rationale: The participle from תכן conveys weighing/measuring, metaphorically evaluating.
    'Weighs hearts' preserves the imagery and moral assessment.
- source_word: לִבּוֹת
  chosen: hearts
  alternatives:
  - minds
  lexicon: HALOT
  rationale: Hebrew 'hearts' is the natural anthropological term and should be preserved
    rather than interpreted away as 'minds.'
- source_word: יָבִין
  chosen: understand
  alternatives:
  - discern
  - perceive
  lexicon: HALOT
  rationale: Pairs well with the metaphor of weighing hearts; 'understand' is broad
    and natural while preserving cognitive discernment.
- source_word: וְנֹצֵר נַפְשְׁךָ
  chosen: and he who keeps your soul
  alternatives:
  - and he who guards your life
  - and the keeper of your soul
  lexicon: HALOT
  rationale: נצר means keep/guard/watch over. נֶפֶשׁ can mean soul, life, self. 'Keeps
    your soul' preserves the Hebrew expression and its theological depth; alternatives
    are viable but more interpretive.
- source_word: נַפְשְׁךָ
  chosen: your soul
  alternatives:
  - your life
  - you
  lexicon: HALOT
  rationale: The Hebrew term is broader than immaterial 'soul,' but in this wisdom
    context 'soul' preserves the source expression without flattening it to mere biological
    life.
- source_word: יֵדָע
  chosen: know
  alternatives:
  - take notice
  - be aware
  lexicon: HALOT
  rationale: Simple and direct rendering of ידע, parallel to the claimed ignorance
    in the quotation.
- source_word: וְהֵשִׁיב
  chosen: and will he not repay
  alternatives:
  - and will he not return
  - and will he not recompense
  lexicon: HALOT
  rationale: In context of divine moral response, שוב in Hiphil means repay/recompense.
    'Repay' is idiomatic and preserves judicial force.
- source_word: לְאָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: אָדָם here is singular generic. Per doctrine, gender-accurate rendering
    is preferred where representative force is present; 'a man' preserves the singular
    generic form. Inclusive alternatives are possible but less source-near.
- source_word: כְּפָעֳלוֹ
  chosen: according to his work
  alternatives:
  - according to what he has done
  - according to his deed
  lexicon: HALOT
  rationale: Keeps the singular noun and the proportional sense of כְּ. 'Work' here
    means one's action/deed in moral context.
