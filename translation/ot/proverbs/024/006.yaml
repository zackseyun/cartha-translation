id: PRO.24.6
reference: Proverbs 24:6
source:
  edition: WLC
  text: כִּ֣י בְ֭/תַחְבֻּלוֹת תַּעֲשֶׂה לְּ/ךָ֣ מִלְחָמָ֑ה וּ֝/תְשׁוּעָ֗ה בְּ/רֹ֣ב
    יוֹעֵֽץ־׃
translation:
  text: For by wise guidance you will wage your war, and victory is in an abundance
    of counselors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with strategy' or 'with wise counsel'; the Hebrew term refers to skillful
      guidance or tactical planning.
    reason: lexical_alternative
  - marker: b
    text: Or 'deliverance'; in this battle context, the Hebrew more specifically points
      to 'victory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding admonition. 'For'
    fits the proverbial logic naturally in English.
- source_word: בְתַחְבֻּלוֹת
  chosen: by wise guidance
  alternatives:
  - with strategy
  - with sound guidance
  - with wise counsel
  lexicon: HALOT
  rationale: תַּחְבֻּלוֹת denotes steering, tactics, or strategic guidance, often
    in contexts of prudent planning. 'By wise guidance' preserves the instrumental
    ב and communicates the sense of skillful strategy without sounding overly technical.
- source_word: תַּעֲשֶׂה לְּךָ מִלְחָמָה
  chosen: you will wage your war
  alternatives:
  - you will make war for yourself
  - you will conduct war
  - you will carry on war
  lexicon: HALOT
  rationale: The idiom עשה מלחמה means 'to wage/make war.' Rendering לְךָ with 'your'
    reflects the dative nuance in idiomatic English without woodenly preserving 'for
    yourself.'
- source_word: וּתְשׁוּעָה
  chosen: and victory
  alternatives:
  - and deliverance
  - and salvation
  lexicon: HALOT
  rationale: In this military-proverbial context, תְּשׁוּעָה refers to successful
    outcome in battle. 'Victory' is the most contextually precise English rendering,
    while 'deliverance' and 'salvation' are broader possibilities.
- source_word: בְּרֹב
  chosen: is in an abundance of
  alternatives:
  - comes through many
  - is with many
  - is in the multitude of
  lexicon: HALOT
  rationale: The phrase marks the sphere or means by which victory is found. 'In an
    abundance of' is natural English and preserves the sense of multiplicity.
- source_word: יוֹעֵץ
  chosen: counselors
  alternatives:
  - advisers
  - one who gives counsel
  lexicon: HALOT
  rationale: 'Although morphologically singular in form, the phrase רֹב יוֹעֵץ is
    a collective expression best rendered in English as plural: ''counselors.'' This
    matches the proverb''s emphasis on numerous advisers.'
