id: PRO.24.8
reference: Proverbs 24:8
source:
  edition: WLC
  text: מְחַשֵּׁ֥ב לְ/הָרֵ֑עַ ל֝֗/וֹ בַּֽעַל מְזִמּ֥וֹת יִקְרָֽאוּ־׃
translation:
  text: Whoever plans to do evil—to him they will call, “master of schemes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Whoever devises evil will be called a schemer.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחַשֵּׁב
  chosen: plans
  alternatives:
  - devises
  - plots
  - calculates
  lexicon: HALOT
  rationale: The participle from חשׁב denotes thinking, devising, or planning. In
    this wisdom context, 'plans' gives natural English while preserving intentionality.
    'Plots' is possible but slightly more loaded; the object already supplies the
    evil intent.
- source_word: לְהָרֵעַ
  chosen: to do evil
  alternatives:
  - to do harm
  - for evil
  - to act wickedly
  lexicon: HALOT
  rationale: The infinitive with רעע here expresses the purpose or content of the
    planning. 'To do evil' is broad and idiomatic, preserving both moral and harmful
    dimensions without narrowing it merely to personal injury.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - him
  - such a one
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix marks the person being designated
    by the following predicate. Rendering it explicitly as 'to him' preserves the
    Hebrew construction before the naming formula.
- source_word: בַּעַל
  chosen: master of
  alternatives:
  - owner of
  - man of
  - one characterized by
  lexicon: HALOT
  rationale: בעל in construct often denotes one characterized by or possessing something.
    'Master of' is concise and idiomatic in English for a person marked by a trait,
    without implying literal ownership.
- source_word: מְזִמּוֹת
  chosen: schemes
  alternatives:
  - devices
  - plans
  - wicked plans
  lexicon: HALOT
  rationale: מזמות can denote plans or devices, often with a negative nuance in wisdom
    literature. 'Schemes' captures the crafty and morally suspect sense here better
    than the neutral 'plans.'
- source_word: יִקְרָאוּ
  chosen: they will call
  alternatives:
  - one will call
  - he will be called
  lexicon: HALOT
  rationale: The Hebrew has a 3mp active form, literally 'they will call.' English
    can use this indefinite plural naturally. A passive, 'he will be called,' is possible
    but less formally aligned with the source.
