id: PRO.19.1
reference: Proverbs 19:1
source:
  edition: WLC
  text: טֽוֹב רָ֭שׁ הוֹלֵ֣ךְ בְּ/תֻמּ֑/וֹ מֵ/עִקֵּ֥שׁ שְׂ֝פָתָ֗י/ו וְ/ה֣וּא כְסִֽיל־׃
translation:
  text: Better is a poor man who walks in his integrity than one who is crooked in
    his lips and is a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'than a fool who is crooked in speech.' The Hebrew syntax allows the
      final phrase 'and he is a fool' to identify the contrasted person more compactly.
    reason: alternative_reading
  - marker: b
    text: Literally, 'walks in his integrity.' 'Walk' is a Hebrew metaphor for one's
      manner of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - is better
  - better
  lexicon: HALOT
  rationale: 'Used in the comparative proverb formula to introduce the value judgment:
    one condition is preferable to another.'
- source_word: רָשׁ
  chosen: a poor man
  alternatives:
  - a poor person
  - the poor man
  lexicon: HALOT
  rationale: The Hebrew adjective/noun denotes a poor person. Because the form is
    masculine singular and the proverb contrasts one man with another, 'a poor man'
    best matches the source while remaining natural English.
- source_word: הוֹלֵךְ
  chosen: who walks
  alternatives:
  - walking
  - who lives
  lexicon: HALOT
  rationale: '''Walks'' preserves the common Hebrew ethical metaphor of conduct or
    manner of life, rather than flattening it to ''lives''.'
- source_word: בְּתֻמּוֹ
  chosen: in his integrity
  alternatives:
  - in his blamelessness
  - in his innocence
  lexicon: HALOT
  rationale: תֹּם/תֻּם in wisdom literature often denotes integrity or wholeness of
    character. 'Integrity' is idiomatic and captures moral uprightness without overstating
    sinlessness.
- source_word: מֵעִקֵּשׁ
  chosen: than one who is crooked
  alternatives:
  - than the one who is perverse
  - than one who is twisted
  lexicon: HALOT
  rationale: The comparative מִן after 'better' introduces the contrasted person.
    עִקֵּשׁ conveys moral crookedness/perversity; 'crooked' is vivid and natural in
    English wisdom style.
- source_word: שְׂפָתָיו
  chosen: in his lips
  alternatives:
  - with his lips
  - in speech
  - of lips
  lexicon: HALOT
  rationale: Literally 'his lips.' Rendered as 'in his lips' to preserve the Hebrew
    image while making clear that the crookedness is expressed in speech.
- source_word: וְהוּא כְסִיל
  chosen: and is a fool
  alternatives:
  - and he is a fool
  - yet is a fool
  lexicon: HALOT
  rationale: The clause identifies the crooked speaker as a fool. 'And is a fool'
    keeps the straightforward coordination of the Hebrew and avoids adding interpretive
    contrast beyond the text.
