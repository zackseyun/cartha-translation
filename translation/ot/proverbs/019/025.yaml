id: PRO.19.25
reference: Proverbs 19:25
source:
  edition: WLC
  text: לֵ֣ץ תַּ֭כֶּה וּ/פֶ֣תִי יַעְרִ֑ם וְ/הוֹכִ֥יחַ לְ֝/נָב֗וֹן יָבִ֥ין דָּֽעַת׃
translation:
  text: Strike a scoffer, and the simple will become shrewd; rebuke one who has understanding,
    and he will gain knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mocker' for 'scoffer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the simple will learn prudence.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a discerning man'; rendered 'one who has understanding' to preserve
      the singular personal sense in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵץ
  chosen: scoffer
  alternatives:
  - mocker
  lexicon: HALOT
  rationale: לֵץ in Proverbs denotes a contemptuous, derisive person, not merely someone
    playful or skeptical. 'Scoffer' preserves the moral and wisdom-literature nuance
    better than the broader 'mocker.'
- source_word: תַּכֶּה
  chosen: Strike
  alternatives:
  - beat
  - smite
  lexicon: HALOT
  rationale: The Hifil/imperfect of נכה here expresses administering a punitive blow
    or corporal punishment. 'Strike' is natural modern English and avoids the archaic
    tone of 'smite' and the potentially excessive force implied by 'beat.'
- source_word: פֶתִי
  chosen: the simple
  alternatives:
  - the naive
  - the inexperienced
  lexicon: HALOT
  rationale: פֶתִי is a stock wisdom term for the gullible or unformed person. 'The
    simple' is the standard wisdom-category rendering and preserves the proverbial
    register.
- source_word: יַעְרִם
  chosen: will become shrewd
  alternatives:
  - will become prudent
  - will learn prudence
  lexicon: HALOT
  rationale: From ערם, in wisdom contexts this means becoming prudent/shrewd. 'Will
    become shrewd' best reflects the intransitive sense here and matches the contrast
    with the simple person gaining practical discernment.
- source_word: וְהוֹכִיחַ
  chosen: rebuke
  alternatives:
  - reprove
  - correct
  lexicon: HALOT
  rationale: The infinitive/verb from יכח here refers to verbal correction or reproof.
    'Rebuke' is concise and idiomatic; 'reprove' is more formal/archaic, while 'correct'
    can sound too mild.
- source_word: לְנָבוֹן
  chosen: one who has understanding
  alternatives:
  - the discerning
  - a man of understanding
  lexicon: HALOT
  rationale: נָבוֹן denotes a person characterized by discernment. 'One who has understanding'
    preserves the sense without unnecessarily specifying gender, while still reflecting
    the singular personal referent.
- source_word: יָבִין
  chosen: he will gain
  alternatives:
  - he will understand
  - he will discern
  lexicon: HALOT
  rationale: Though בין often means 'understand,' with דַּעַת as object in this instructional
    context it can denote coming to grasp or acquire knowledge. 'Gain' avoids awkward
    repetition with 'understanding' in the prior phrase and captures the resultative
    sense.
- source_word: דָּעַת
  chosen: knowledge
  alternatives:
  - instruction
  - discernment
  lexicon: HALOT
  rationale: דָּעַת is the standard wisdom term 'knowledge.' This keeps the conceptual
    distinction between existing understanding (נבון) and the further acquisition
    of knowledge.
