id: PRO.19.28
reference: Proverbs 19:28
source:
  edition: WLC
  text: עֵ֣ד בְּ֭לִיַּעַל יָלִ֣יץ מִשְׁפָּ֑ט וּ/פִ֥י רְ֝שָׁעִ֗ים יְבַלַּע אָֽוֶן־׃
translation:
  text: A worthless witness mocks justice, and the mouth of the wicked swallows iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A witness of Belial mocks justice.' Here beliyya'al is taken as a common
      noun/adjective meaning 'worthlessness' rather than the later proper name 'Belial.'
    reason: lexical_alternative
  - marker: b
    text: Or 'scoffs at judgment' or 'derides justice.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the mouth of the wicked gulps down evil' or 'falsehood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד
  chosen: witness
  alternatives:
  - testifier
  lexicon: HALOT
  rationale: The noun denotes one who gives testimony. 'Witness' is the natural legal-context
    English equivalent and fits the parallel with justice/judgment.
- source_word: בְּלִיַּעַל
  chosen: worthless
  alternatives:
  - base
  - wicked
  - scoundrelly
  - Belial
  lexicon: HALOT
  rationale: Here the term functions adjectivally with 'witness' and describes moral
    worthlessness rather than serving as a proper name. 'Worthless' preserves the
    Hebrew sense without importing later personified 'Belial' usage.
- source_word: יָלִיץ
  chosen: mocks
  alternatives:
  - scoffs at
  - derides
  - makes a mockery of
  lexicon: HALOT
  rationale: In context the Hiphil conveys scornful treatment rather than simple speech
    or mediation. 'Mocks' is concise, idiomatic, and matches the proverb's moral force.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - legal case
  lexicon: HALOT
  rationale: The term can mean judgment, justice, or legal decision. Here the proverb
    concerns contempt for what is right in judicial context; 'justice' best captures
    the broader ethical-legal sense in readable English.
- source_word: פִי
  chosen: the mouth of
  alternatives:
  - the speech of
  lexicon: HALOT
  rationale: The Hebrew literally says 'mouth of.' Retaining the bodily metaphor preserves
    the vivid parallelism and avoids over-interpretation.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: The plural adjective/substantive refers to wicked persons generally.
    'The wicked' is concise and idiomatic in proverbial style.
- source_word: יְבַלַּע
  chosen: swallows
  alternatives:
  - gulps down
  - devours
  lexicon: HALOT
  rationale: The verb literally means 'swallow' or 'devour.' 'Swallows' preserves
    the metaphor and pairs well with 'mouth.'
- source_word: אָוֶן
  chosen: iniquity
  alternatives:
  - evil
  - trouble
  - falsehood
  lexicon: HALOT
  rationale: The noun can denote wickedness, trouble, or harmful deceit. In this moral
    parallel with a corrupt witness, 'iniquity' best conveys morally perverse speech
    or consumption of evil, while preserving the proverb's ethical emphasis.
