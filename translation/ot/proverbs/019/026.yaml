id: PRO.19.26
reference: Proverbs 19:26
source:
  edition: WLC
  text: מְֽשַׁדֶּד אָ֭ב יַבְרִ֣יחַ אֵ֑ם בֵּ֝֗ן מֵבִ֥ישׁ וּ/מַחְפִּֽיר־׃
translation:
  text: He who devastates his father and drives away his mother is a son who brings
    shame and disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He who plunders his father and chases away his mother is a son who causes
      shame and reproach.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׁדֶּד
  chosen: devastates
  alternatives:
  - plunders
  - despoils
  - ruins
  lexicon: HALOT
  rationale: The participle from שׁדד denotes violent despoiling or ruining. In this
    proverb, the object is 'father,' so a literal 'plunders' is possible, but 'devastates'
    better captures severe destructive mistreatment in idiomatic English without narrowing
    the action to theft alone.
- source_word: אָב
  chosen: his father
  alternatives:
  - father
  lexicon: HALOT
  rationale: Simple rendering of the noun with possessive sense supplied naturally
    in English from the relational context of the proverb.
- source_word: יַבְרִיחַ
  chosen: drives away
  alternatives:
  - chases away
  - puts to flight
  - banishes
  lexicon: HALOT
  rationale: The Hiphil of ברח here conveys causing the mother to flee or be sent
    away. 'Drives away' is natural modern English and preserves the causative force.
- source_word: אֵם
  chosen: his mother
  alternatives:
  - mother
  lexicon: HALOT
  rationale: Straightforward rendering, with possessive sense made explicit in English
    parallel to 'his father.'
- source_word: בֵּן
  chosen: a son
  alternatives:
  - the son
  - such a son
  lexicon: HALOT
  rationale: The noun functions predicatively/appositionally, characterizing the person
    described. 'A son' preserves the proverbial, classifying force.
- source_word: מֵבִישׁ
  chosen: who brings shame
  alternatives:
  - shameful
  - causing shame
  - who shames
  lexicon: HALOT
  rationale: The participle from בוש in Hiphil means causing shame. 'Who brings shame'
    is idiomatic and preserves the active causative sense.
- source_word: וּמַחְפִּיר
  chosen: and disgrace
  alternatives:
  - and reproach
  - and dishonor
  - and humiliation
  lexicon: HALOT
  rationale: From חפר in a causative/shaming sense, parallel to מֵבִישׁ. Rendering
    the pair as 'shame and disgrace' preserves the intensifying parallelism in concise
    English. Although the Hebrew form is participial, English idiom often compresses
    the second term into a coordinated noun after 'brings.'
