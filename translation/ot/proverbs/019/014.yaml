theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding the proverb's contrast
  chosen_reading: Material inheritance may come through human lineage, but a prudent wife is presented as a gift/source from the LORD.
  alternative_readings:
  - A prudent woman is from the LORD
  rationale: The Hebrew contrasts inherited property with a spouse whose origin is attributed to divine providence. 'Wife' is preferred contextually, but the broader lexical possibility 'woman' is preserved in a footnote as a lexical alternative rather than a doctrinal issue.
