id: PRO.19.14
reference: Proverbs 19:14
source:
  edition: WLC
  text: בַּ֣יִת וָ֭/הוֹן נַחֲלַ֣ת אָב֑וֹת וּ֝/מֵ/יְהוָ֗ה אִשָּׁ֥ה מַשְׂכָּֽלֶת׃
translation:
  text: A house and wealth are an inheritance from fathers, but a prudent wife is from Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a discerning woman.' The Hebrew אִשָּׁה can mean 'woman' or 'wife'; in this context 'wife' best fits the proverb's contrast with inherited property.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיִת
  chosen: house
  alternatives:
  - home
  - household
  lexicon: HALOT
  rationale: The noun denotes a house/property in parallel with wealth as inherited assets. 'House' preserves the concrete sense better than the more relational 'home' or broader 'household'.
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - substance
  lexicon: HALOT
  rationale: In wisdom literature this commonly refers to material possessions or wealth. 'Wealth' is clear modern English and fits the inheritance context.
- source_word: נַחֲלַת
  chosen: an inheritance
  alternatives:
  - inheritance
  - heritage
  lexicon: HALOT
  rationale: The construct phrase means 'inheritance of/from fathers.' Rendering with the English article smooths the verbless clause while preserving the nominal sense.
- source_word: אָבוֹת
  chosen: fathers
  alternatives:
  - ancestors
  - parents
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural. 'Fathers' is gender-accurate and suits the patriarchal inheritance setting; 'ancestors' or 'parents' would broaden the source wording.
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' The preposition מִן indicates source/origin: the prudent wife comes from the LORD.'
- source_word: אִשָּׁה
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: In this proverb's contrast with inherited property, the sense is marital rather than generic female person. 'Wife' best fits the wisdom context and common idiom.
- source_word: מַשְׂכָּלֶת
  chosen: prudent
  alternatives:
  - discerning
  - wise
  - sensible
  lexicon: HALOT
  rationale: From שכל, indicating insight or good sense. 'Prudent' captures practical wisdom in conduct and decision-making, fitting Proverbs' ethical register.
