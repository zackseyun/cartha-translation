id: PRO.19.12
reference: Proverbs 19:12
source:
  edition: WLC
  text: נַ֣הַם כַּ֭/כְּפִיר זַ֣עַף מֶ֑לֶךְ וּ/כְ/טַ֖ל עַל עֵ֣שֶׂב רְצוֹנֽ/וֹ־׃
translation:
  text: A king’s wrath is like the growling of a young lion, but his favor is like
    dew on the grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'roaring of a young lion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his goodwill' or 'his pleasure' is like dew on the grass.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַהַם
  chosen: growling
  alternatives:
  - roaring
  - growl
  lexicon: HALOT
  rationale: The noun denotes a growling/roaring sound. 'Growling' fits well with
    the simile of a young lion and sounds natural in English; 'roaring' is possible,
    but 'growling' better matches the terser nominal style here.
- source_word: כְּפִיר
  chosen: young lion
  alternatives:
  - lion cub
  - fierce lion
  lexicon: HALOT
  rationale: The term commonly refers to a young lion, often one vigorous and dangerous
    enough to hunt. 'Young lion' is the standard, clear rendering.
- source_word: זַעַף
  chosen: wrath
  alternatives:
  - rage
  - anger
  lexicon: HALOT
  rationale: The noun conveys strong anger or indignation. 'Wrath' preserves the elevated
    force of the proverb better than the flatter 'anger,' while remaining readable.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Straightforward rendering of the noun in a wisdom context about royal
    power.
- source_word: וּכְטַל
  chosen: but his favor is like dew
  alternatives:
  - and like dew is his favor
  - and his favor is like dew
  lexicon: HALOT
  rationale: The conjunction plus comparative introduces the balancing second colon.
    English idiom benefits from making the contrast explicit with 'but,' though Hebrew
    waw can simply coordinate. 'Dew' is retained literally as the image of refreshing
    beneficence.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple preposition; 'on' is natural modern English.
- source_word: עֵשֶׂב
  chosen: grass
  alternatives:
  - vegetation
  - herbage
  lexicon: HALOT
  rationale: In this poetic image, 'grass' is the most natural and vivid English equivalent.
- source_word: רְצוֹנוֹ
  chosen: his favor
  alternatives:
  - his goodwill
  - his acceptance
  - his pleasure
  lexicon: HALOT
  rationale: The noun can denote favor, goodwill, or pleasure. In parallel with a
    king's wrath, 'favor' is the most idiomatic and contextually apt opposite, especially
    in royal/wisdom literature.
