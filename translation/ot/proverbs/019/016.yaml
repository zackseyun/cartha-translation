theological_decisions:
- issue: Referent of 'his ways' in the second colon
  chosen_reading: refers to the subject's own ways/conduct
  alternative_readings:
  - refers to God's ways
  - refers more generally to the way of commandment
  rationale: The Hebrew suffix most naturally points to the nearest singular subject,
    and the proverb's parallelism supports a contrast between keeping commandment
    and contempt for one's own conduct. Because the object is not explicitly 'the
    LORD' or 'God,' the translation avoids adding a theological referent not stated
    in the text, while preserving the ambiguity in a footnote.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of נֶפֶשׁ
  chosen_reading: life
  alternative_readings:
  - soul
  - self
  rationale: To avoid importing later doctrinal anthropology into a wisdom proverb,
    the term is rendered according to contextual sense. The life/death parallel strongly
    favors 'life.'
  doctrine_reference: Translation philosophy §1
