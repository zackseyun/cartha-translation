id: PRO.19.16
reference: Proverbs 19:16
source:
  edition: WLC
  text: שֹׁמֵ֣ר מִ֭צְוָה שֹׁמֵ֣ר נַפְשׁ֑/וֹ בּוֹזֵ֖ה דְרָכָ֣י/ו יומת׃
translation:
  text: Whoever keeps the commandment keeps his life; he who despises his ways will
    be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he who despises his own conduct'; alternatively, some understand 'his
      ways' as 'God's ways.'
    reason: alternative_reading
  - marker: b
    text: Hebrew nephesh; often 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמֵר
  chosen: keeps
  alternatives:
  - guards
  - observes
  lexicon: HALOT
  rationale: The participle denotes guarding/keeping in an ongoing sense. 'Keeps'
    is idiomatic in English for obeying a commandment while still preserving the sense
    of careful observance.
- source_word: מִצְוָה
  chosen: the commandment
  alternatives:
  - a commandment
  - command
  lexicon: HALOT
  rationale: 'The singular noun is rendered with the English definite article for
    a proverbial generic sense: keeping commandment/what is commanded. ''The commandment''
    preserves the weight of the Hebrew singular better than the more abstract ''command''.'
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: In Proverbs, נֶפֶשׁ often refers to one's life or self rather than the
    immaterial soul in a later technical sense. 'His life' best fits the wisdom contrast
    with death in the second colon.
- source_word: בּוֹזֵה
  chosen: despises
  alternatives:
  - scorns
  - shows contempt for
  lexicon: HALOT
  rationale: '''Despises'' clearly conveys contempt and matches the moral force of
    the participle in wisdom literature.'
- source_word: דְרָכָיו
  chosen: his ways
  alternatives:
  - his conduct
  - his path
  lexicon: HALOT
  rationale: The plural 'ways' is the most direct rendering. The suffix is third masculine
    singular; in context it most naturally refers back to the subject ('his own ways'),
    i.e., one who treats his conduct with contempt. This avoids importing an explicit
    divine object not stated in the Hebrew.
- source_word: יומת
  chosen: will be put to death
  alternatives:
  - will die
  - will be killed
  lexicon: HALOT
  rationale: The Hophal form is passive/causative-passive, so 'will be put to death'
    preserves the verbal form more closely than the simple intransitive 'will die.'
    In proverbial style this may express the certainty of a death-bringing outcome
    without specifying the agent.
