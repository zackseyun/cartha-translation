id: PRO.19.22
reference: Proverbs 19:22
source:
  edition: WLC
  text: תַּאֲוַ֣ת אָדָ֣ם חַסְדּ֑/וֹ וְ/טֽוֹב רָ֝שׁ מֵ/אִ֥ישׁ כָּזָֽב־׃
translation:
  text: What is desired in a man is his steadfast love, and a poor man is better than
    a liar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A man's desire is his steadfast love'; the Hebrew of the first line
      is terse and may be read either as describing what is desirable in a person
      or as identifying a person's desire with his kindness/loyalty.
    reason: alternative_reading
  - marker: b
    text: '''Steadfast love'' translates חֶסֶד, a rich term that can also mean kindness,
      loyalty, or faithful love depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּאֲוַת
  chosen: What is desired
  alternatives:
  - the desire of
  - a man's desire
  lexicon: HALOT
  rationale: 'The noun means ''desire'' or ''that which is desired.'' In this proverb
    the construct chain with אָדָם and the following חַסְדּוֹ is terse and somewhat
    ambiguous. Rendering it as ''What is desired'' brings out the likely predicative
    sense: the desirable thing in a person is the quality named next.'
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם refers to an individual human in a wisdom saying, not humanity
    collectively. Per the gender-accurate policy, 'man' is retained for the representative
    singular, while the sense is generic.
- source_word: חַסְדּוֹ
  chosen: his steadfast love
  alternatives:
  - his kindness
  - his loyalty
  - his covenant faithfulness
  lexicon: HALOT
  rationale: חֶסֶד commonly denotes loyal love, kindness, or steadfast love. In this
    human-to-human proverb, 'steadfast love' preserves the moral weight and relational
    constancy better than the thinner 'kindness,' while avoiding over-specifying covenantal
    theology.
- source_word: וְטוֹב
  chosen: and ... is better
  alternatives:
  - but better is
  - and better is
  lexicon: HALOT
  rationale: The conjunction plus adjective introduces the comparative second line.
    English idiom requires supplying 'is better' to make the proverb readable while
    preserving the contrastive/comparative force.
- source_word: רָשׁ
  chosen: a poor man
  alternatives:
  - the poor
  - a poor person
  lexicon: HALOT
  rationale: The adjective/substantive denotes a poor person. Because the proverb
    uses representative masculine singular terms on both sides, 'a poor man' matches
    the source's form and parallelism.
- source_word: מֵאִישׁ
  chosen: than
  alternatives:
  - than a man
  - more than a man
  lexicon: HALOT
  rationale: The preposition מִן marks comparison, and with אִישׁ introduces the standard
    of comparison. In English the noun is naturally carried into the following phrase,
    yielding 'than a liar' or more explicitly 'than a lying man.'
- source_word: כָּזָב
  chosen: a liar
  alternatives:
  - a lying man
  - falsehood
  - one who is false
  lexicon: HALOT
  rationale: 'As a noun, כָּזָב denotes falsehood or deceit; in this construction
    after אִישׁ it is best understood as characterizing the person: ''a liar'' or
    ''a false man.'' ''A liar'' is concise and idiomatic.'
