id: PRO.19.24
reference: Proverbs 19:24
source:
  edition: WLC
  text: טָ֘מַ֤ן עָצֵ֣ל יָ֭ד/וֹ בַּ/צַּלָּ֑חַת גַּם אֶל פִּ֝֗י/הוּ לֹ֣א יְשִׁיבֶֽ/נָּה־־׃
translation:
  text: The sluggard buries his hand in the dish; he will not even bring it back to
    his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hides his hand in the dish.' The Hebrew verb can mean 'hide' or 'bury';
      'buries' was chosen to preserve the proverb's exaggerated imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the bowl' or 'in the platter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָמַן
  chosen: buries
  alternatives:
  - hides
  - plunges
  lexicon: HALOT
  rationale: The verb literally means to hide, conceal, or bury. In this proverb's
    hyperbolic image, 'buries' preserves the vividness and absurdity better than the
    flatter 'puts' or the more interpretive 'plunges.'
- source_word: עָצֵל
  chosen: sluggard
  alternatives:
  - lazy man
  - lazy one
  lexicon: HALOT
  rationale: A stock wisdom-term for a habitually lazy person. 'Sluggard' is concise
    and preserves the proverbial register better than 'lazy man,' while still being
    understandable in modern English.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Straightforward possessive construction; singular is retained as in the
    Hebrew.
- source_word: בַּצַּלָּחַת
  chosen: in the dish
  alternatives:
  - in the bowl
  - in the platter
  lexicon: HALOT
  rationale: The noun denotes a dish or bowl used for food. 'Dish' is natural English
    and fits the eating context without over-specifying vessel shape.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'Here the particle intensifies the absurdity: not merely ''also'' but
    ''even'' he will not do the minimal next action.'
- source_word: אֶל־פִּיהוּ
  chosen: to his mouth
  alternatives:
  - to his face
  lexicon: HALOT
  rationale: Though the Hebrew uses 'mouth' literally, some English idiom might broaden
    it. 'To his mouth' keeps the concrete image and matches the eating scenario.
- source_word: לֹא יְשִׁיבֶנָּה
  chosen: he will not even bring it back
  alternatives:
  - he does not return it
  - he will not bring it back
  lexicon: HALOT
  rationale: The Hiphil of שוב means to cause to return/bring back. The feminine suffix
    refers back to 'hand.' 'Bring it back' is idiomatic in English and preserves the
    sense that he cannot be bothered to complete the motion from dish to mouth.
