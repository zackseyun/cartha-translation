id: PRO.19.6
reference: Proverbs 19:6
source:
  edition: WLC
  text: רַ֭בִּים יְחַלּ֣וּ פְנֵֽי נָדִ֑יב וְ/כָל הָ֝/רֵ֗עַ לְ/אִ֣ישׁ מַתָּֽן־־׃
translation:
  text: Many seek the favor of a generous man, and everyone is a friend to a man who
    gives gifts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many entreat the face of a nobleman.' The Hebrew נָדִיב can mean 'nobleman'
      or 'prince,' but here 'generous man' fits the proverb's focus on gift-giving
      and social favor.
    reason: lexical_alternative
  - marker: b
    text: Literally 'everyone is a friend to a man of gifts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Many people
  lexicon: HALOT
  rationale: Quantifier meaning 'many'; simple plural subject in proverbial style
    is best rendered concisely as 'Many'.
- source_word: יְחַלּוּ
  chosen: seek the favor of
  alternatives:
  - entreat
  - appease
  - court
  lexicon: HALOT
  rationale: Piel of חלה with פְּנֵי commonly means to appease, entreat, or seek favor
    from someone. In idiomatic modern English, 'seek the favor of' captures both the
    relational and petitionary sense without sounding archaic.
- source_word: פְנֵי
  chosen: the favor of
  alternatives:
  - the face of
  - the presence of
  lexicon: HALOT
  rationale: Literally 'face of,' but in the idiom חלה פני it refers to seeking someone's
    favor. Rendering the idiomatic sense is preferable in English.
- source_word: נָדִיב
  chosen: a generous man
  alternatives:
  - a nobleman
  - a prince
  - a noble
  lexicon: HALOT
  rationale: נָדִיב can denote a noble or princely person, but in wisdom literature
    it often carries the sense of one who is generous or magnanimous. The parallel
    with 'a man who gives gifts' favors the semantic nuance of generosity rather than
    social rank alone.
- source_word: וְכָל
  chosen: and everyone
  alternatives:
  - and all
  - and every person
  lexicon: HALOT
  rationale: The conjunction plus כָּל introduces the second cola broadly. 'Everyone'
    gives natural English while preserving the universal sense.
- source_word: הָרֵעַ
  chosen: is a friend
  alternatives:
  - is friendly
  - becomes a companion
  lexicon: HALOT
  rationale: From רעע/רֵעַ in the sense of friend/companion. Predicate-like use here
    is well represented by 'is a friend,' expressing social attachment rather than
    mere friendliness.
- source_word: לְאִישׁ
  chosen: to a man
  alternatives:
  - to the man
  - to one
  lexicon: HALOT
  rationale: אִישׁ is singular 'man.' Per gender-accurate policy, masculine singular
    is retained. Here it refers generically to a person characterized by giving gifts,
    but the Hebrew form is masculine singular.
- source_word: מַתָּן
  chosen: who gives gifts
  alternatives:
  - of gifts
  - who has a gift
  - gift-giver
  lexicon: HALOT
  rationale: Literally 'gift' or 'present,' but the construction אִישׁ מַתָּן is idiomatically
    'a gift-giving man' or 'a man of gifts.' In smooth English, 'a man who gives gifts'
    best conveys the sense.
