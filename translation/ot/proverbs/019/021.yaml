id: PRO.19.21
reference: Proverbs 19:21
source:
  edition: WLC
  text: רַבּ֣וֹת מַחֲשָׁב֣וֹת בְּ/לֶב אִ֑ישׁ וַ/עֲצַ֥ת יְ֝הוָ֗ה הִ֣יא תָקֽוּם־׃
translation:
  text: Many are the plans in a man's heart, but the counsel of the LORD—it will stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thoughts' or 'intentions' for 'plans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת
  chosen: Many are
  alternatives:
  - numerous
  - many
  lexicon: HALOT
  rationale: Predicate adjective opening the proverb; fronting 'Many are' preserves
    the Hebrew emphasis and proverbial style better than a flatter 'There are many.'
- source_word: מַחֲשָׁבוֹת
  chosen: plans
  alternatives:
  - thoughts
  - intentions
  - devices
  lexicon: HALOT
  rationale: In wisdom context this noun commonly refers not merely to internal thoughts
    but to devised intentions or plans. 'Plans' best fits the contrast with the LORD's
    'counsel.'
- source_word: בְּלֶב אִישׁ
  chosen: in a man's heart
  alternatives:
  - in the heart of a man
  - in a person's heart
  lexicon: HALOT
  rationale: לב in Hebrew anthropology is the inner seat of thinking and willing,
    conventionally rendered 'heart.' אִישׁ is singular masculine with representative
    force; per gender-accurate policy, 'a man's' is retained rather than neutralizing
    to 'person's.'
- source_word: וַעֲצַת
  chosen: but the counsel of
  alternatives:
  - and the counsel of
  - but the plan of
  lexicon: HALOT
  rationale: Though waw is formally 'and,' the sense in this antithetical proverb
    is contrastive, so 'but' communicates the relationship naturally in English. עֵצָה
    here is best rendered 'counsel,' denoting purpose or settled design.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference in standard English Bible style.
- source_word: הִיא
  chosen: it
  alternatives:
  - she
  - that
  lexicon: HALOT
  rationale: 'The feminine pronoun agrees with the feminine noun ''counsel''; idiomatic
    English uses the neuter pronoun ''it.'' The pronoun is retained for emphasis:
    ''it will stand.'''
- source_word: תָקוּם
  chosen: will stand
  alternatives:
  - will arise
  - will endure
  - will be established
  lexicon: HALOT
  rationale: קום in this context conveys standing firm or being established. 'Will
    stand' is concise, idiomatic, and preserves the image of enduring validity over
    against human plans.
