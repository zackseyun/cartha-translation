id: PRO.19.8
reference: Proverbs 19:8
source:
  edition: WLC
  text: קֹֽנֶה לֵּ֭ב אֹהֵ֣ב נַפְשׁ֑/וֹ שֹׁמֵ֥ר תְּ֝בוּנָ֗ה לִ/מְצֹא טֽוֹב־־׃
translation:
  text: Whoever gains sense loves his own life; whoever keeps understanding will find
    good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'acquires heart.' In Hebrew wisdom literature, 'heart' often
      refers to the mind or the capacity for discernment.
    reason: lexical_alternative
  - marker: b
    text: Or 'loves himself' or 'loves his soul/life.' The Hebrew noun can denote
      the self or life, not only the soul in a narrow sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹנֶה
  chosen: gains
  alternatives:
  - acquires
  - gets
  - buys
  lexicon: HALOT
  rationale: Qal participle of קנה broadly means acquire/get; here 'gains' is idiomatic
    in English and fits the abstract object 'heart/sense' better than the more literal
    'buys.'
- source_word: לֵּב
  chosen: sense
  alternatives:
  - heart
  - understanding
  - mind
  lexicon: HALOT
  rationale: Although literally 'heart,' in Hebrew wisdom literature לֵב often denotes
    the inner faculty of thought and discernment. Rendering it as 'sense' conveys
    the proverb's practical wisdom meaning in natural English while preserving the
    cognitive nuance.
- source_word: אֹהֵב נַפְשׁוֹ
  chosen: loves his own life
  alternatives:
  - loves himself
  - loves his soul
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to one's life/self, not specifically the immaterial
    soul. 'Loves his own life' avoids importing later dualistic connotations and suits
    wisdom-style self-interest language.
- source_word: שֹׁמֵר
  chosen: keeps
  alternatives:
  - guards
  - preserves
  - watches over
  lexicon: HALOT
  rationale: The participle conveys attentive preservation. 'Keeps' is concise and
    idiomatic with an abstract object in English ('keeps understanding').
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: A standard wisdom term for discernment or understanding. 'Understanding'
    is transparent and pairs well with 'sense' without sounding overly technical.
- source_word: לִמְצֹא טוֹב
  chosen: will find good
  alternatives:
  - finds good
  - will attain good
  - comes to what is good
  lexicon: HALOT
  rationale: Infinitive construct with ל plus the proverb's participial style can
    express result or outcome. 'Will find good' communicates the forward-looking consequence
    naturally in English.
