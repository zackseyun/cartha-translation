theological_decisions:
- issue: Metaphorical relation between generosity to the poor and God
  chosen_reading: The proverb states that showing grace to the poor is treated by God as lending to the LORD, and that the LORD himself repays the giver.
  alternative_readings:
  - A more paraphrastic reading that God merely notices and rewards generosity
  rationale: The Hebrew explicitly uses the loan metaphor with YHWH as the one lent to; this should be preserved because it intensifies divine identification with the poor without importing further doctrinal claims.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
