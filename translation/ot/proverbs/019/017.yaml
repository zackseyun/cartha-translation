id: PRO.19.17
reference: Proverbs 19:17
source:
  edition: WLC
  text: מַלְוֵ֣ה יְ֭הוָה ח֣וֹנֵֽן דָּ֑ל וּ֝/גְמֻל֗/וֹ יְשַׁלֶּם לֽ/וֹ־׃
translation:
  text: Whoever is gracious to the poor lends to Yahweh, and he will repay him for his deed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and his recompense he will repay to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְוֵה
  chosen: lends
  alternatives:
  - makes a loan to
  - is lending to
  lexicon: HALOT
  rationale: The Hiphil participle of לוה means to lend or make a loan. In this proverb the metaphor is striking and should be preserved rather than paraphrased away as merely 'gives to.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֹנֵן
  chosen: is gracious to
  alternatives:
  - shows favor to
  - is kind to
  - has pity on
  lexicon: HALOT
  rationale: The Qal participle of חנן conveys showing favor or grace. 'Is gracious to' preserves the lexical connection to grace/favor better than the flatter 'is kind to.'
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דָּל commonly denotes one who is poor, lowly, or weak. In wisdom literature this often has socioeconomic force; 'the poor' is the clearest natural English rendering here.
- source_word: וּגְמֻלוֹ
  chosen: for what he has done
  alternatives:
  - his recompense
  - his deed
  - his benefit
  lexicon: HALOT
  rationale: גְּמוּל can mean dealing, recompense, or benefit/deed. With the following verb 'will repay,' the sense is that the LORD repays the benefactor in return for his act. Rendering it idiomatically as 'for what he has done' avoids awkward repetition while preserving the meaning.
- source_word: יְשַׁלֶּם
  chosen: will repay
  alternatives:
  - will pay back
  - will recompense
  lexicon: HALOT
  rationale: The Piel of שלם here means to repay or recompense. 'Will repay' is natural English and fits the loan metaphor established by 'lends.'
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The pronominal suffix refers most naturally to the gracious giver to the poor. English can express this smoothly as the direct object 'him' after 'repay,' though the underlying Hebrew is 'to him.'
