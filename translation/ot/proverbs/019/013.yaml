id: PRO.19.13
reference: Proverbs 19:13
source:
  edition: WLC
  text: הַוֺּ֣ת לְ֭/אָבִי/ו בֵּ֣ן כְּסִ֑יל וְ/דֶ֥לֶף טֹ֝רֵ֗ד מִדְיְנֵ֥י אִשָּֽׁה׃
translation:
  text: A foolish son is ruin to his father, and a wife’s quarrels are a continual
    dripping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A foolish son is calamity to his father, and a wife's contentions are
      a constant dripping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַוּוֹת
  chosen: ruin
  alternatives:
  - destruction
  - calamities
  - disaster
  lexicon: HALOT
  rationale: The plural form is often used abstractly/intensively for destructive
    ruin or calamity. 'Ruin' gives natural English while preserving the proverb's
    force better than the more wooden 'destructions.'
- source_word: לְאָבִיו
  chosen: to his father
  alternatives:
  - for his father
  lexicon: HALOT
  rationale: The lamed marks relation/impact; in English 'to his father' idiomatically
    conveys that the son brings ruin upon him.
- source_word: בֵּן כְּסִיל
  chosen: a foolish son
  alternatives:
  - a stupid son
  - a dull son
  lexicon: HALOT
  rationale: כְּסִיל in Proverbs denotes a moral-spiritual fool, not merely low intelligence.
    'Foolish' best captures the ethical sense in readable English.
- source_word: דֶּלֶף
  chosen: dripping
  alternatives:
  - leak
  - drip
  lexicon: HALOT
  rationale: The noun refers to dripping water from a leak, a common wisdom-image
    for domestic irritation. 'Dripping' works well with the participle that follows.
- source_word: טֹרֵד
  chosen: continual
  alternatives:
  - unceasing
  - constant
  - dripping down
  lexicon: HALOT
  rationale: The participle modifies the dripping as ongoing and persistent. Rendering
    the phrase as 'a continual dripping' is idiomatic English and reflects the sustained
    nuisance implied by the Hebrew.
- source_word: מִדְיְנֵי
  chosen: quarrels
  alternatives:
  - contentions
  - bickerings
  - strifes
  lexicon: HALOT
  rationale: The plural construct from מדון denotes contentious disputes. 'Quarrels'
    is natural modern English and fits the domestic setting.
- source_word: אִשָּׁה
  chosen: a wife’s
  alternatives:
  - a woman's
  lexicon: HALOT
  rationale: In this household proverb, 'wife' is contextually more specific and idiomatic
    than the broader 'woman,' especially in parallel with 'his father' and domestic
    imagery.
