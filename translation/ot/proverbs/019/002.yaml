id: PRO.19.2
reference: Proverbs 19:2
source:
  edition: WLC
  text: גַּ֤ם בְּ/לֹא דַ֣עַת נֶ֣פֶשׁ לֹא ט֑וֹב וְ/אָ֖ץ בְּ/רַגְלַ֣יִם חוֹטֵֽא־־׃
translation:
  text: Also, desire without knowledge is not good, and whoever hurries with his feet
    sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A person without knowledge is not good'; the Hebrew phrase with נֶפֶשׁ
      can be understood in more than one way, but here it is taken idiomatically as
      'desire' or 'appetite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Even
  - Moreover
  lexicon: HALOT
  rationale: Introduces an additional proverb or supporting observation. 'Also' is
    natural modern English and preserves the additive force without overemphasis.
- source_word: בְּלֹא דַעַת
  chosen: without knowledge
  alternatives:
  - without understanding
  - without discernment
  lexicon: HALOT
  rationale: The preposition plus negation and noun yields 'without knowledge.' 'Knowledge'
    is the most direct rendering of דַעַת and fits wisdom-literature usage, while
    allowing the moral-intellectual sense to remain broad.
- source_word: נֶפֶשׁ
  chosen: desire
  alternatives:
  - soul
  - appetite
  - person
  lexicon: HALOT
  rationale: Here נֶפֶשׁ functions idiomatically rather than as a technical term for
    the immaterial soul. In context, 'desire' best captures the sense of an inner
    drive or appetite acting without knowledge. 'Soul' would be overly literal and
    obscure in English; 'person' is possible syntactically but weaker in the proverb's
    warning about impulsive inner longing.
- source_word: לֹא טוֹב
  chosen: is not good
  alternatives:
  - is no good
  - is not beneficial
  lexicon: HALOT
  rationale: A straightforward rendering of the predicate. 'Is not good' preserves
    the Hebrew's simplicity and proverbial tone.
- source_word: וְאָץ
  chosen: whoever hurries
  alternatives:
  - and he who is hasty
  - and one who rushes
  lexicon: HALOT
  rationale: The participle denotes a habitual or characteristic action. 'Whoever
    hurries' renders the generic force idiomatically in English while preserving the
    warning against haste.
- source_word: בְּרַגְלַיִם
  chosen: with his feet
  alternatives:
  - with the feet
  - in his steps
  lexicon: HALOT
  rationale: A concrete Hebrew expression for rushing headlong. 'With his feet' keeps
    the bodily imagery rather than abstracting it away.
- source_word: חוֹטֵא
  chosen: sins
  alternatives:
  - misses the way
  - acts wrongly
  lexicon: HALOT
  rationale: The participle from חטא is most naturally rendered 'sins.' In Proverbs
    it can include practical wrongdoing as well as moral failure; 'sins' preserves
    that moral weight without paraphrase.
