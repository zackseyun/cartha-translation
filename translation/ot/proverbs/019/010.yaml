id: PRO.19.10
reference: Proverbs 19:10
source:
  edition: WLC
  text: לֹֽא נָאוֶ֣ה לִ/כְסִ֣יל תַּעֲנ֑וּג אַ֝֗ף כִּֽי לְ/עֶ֤בֶד מְשֹׁ֬ל בְּ/שָׂרִֽים־־׀׃
translation:
  text: Luxury is not fitting for a fool, much less for a slave to rule over princes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pleasure' or 'delight' for 'luxury.' The Hebrew term can denote enjoyment
      generally, but here likely refers to affluent ease or indulgence.
    reason: lexical_alternative
  - marker: b
    text: Or 'servant' instead of 'slave.' The Hebrew עֶבֶד can cover a range of servile
      statuses; 'slave' is used here because the proverb's force depends on the sharp
      social reversal.
    reason: lexical_alternative
  - marker: c
    text: Or 'nobles' or 'officials' for 'princes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָאוֶה
  chosen: is fitting
  alternatives:
  - is becoming
  - is suitable
  - is proper
  lexicon: HALOT
  rationale: The adjective conveys what is appropriate, becoming, or suitable. 'Is
    fitting' is natural modern English and preserves the proverb's evaluative sense
    without sounding archaic.
- source_word: כְסִיל
  chosen: fool
  alternatives:
  - stupid person
  - dullard
  lexicon: HALOT
  rationale: In Proverbs, כְסִיל is a moral-spiritual category, not merely low intelligence.
    'Fool' is the standard wisdom-literature rendering and best preserves the canonical
    resonance.
- source_word: תַּעֲנוּג
  chosen: luxury
  alternatives:
  - pleasure
  - delight
  - self-indulgence
  lexicon: HALOT
  rationale: The noun can denote delight or luxurious enjoyment. In this social-ethical
    proverb, the sense is not generic pleasure but affluent ease or indulgent living;
    'luxury' captures that more precisely than the broader 'pleasure'.
- source_word: אַף כִּי
  chosen: much less
  alternatives:
  - how much more
  - indeed that
  - certainly
  lexicon: HALOT
  rationale: Here the idiom intensifies from the first statement to a stronger, more
    objectionable case. In English proverbial style, 'much less' clearly signals the
    a fortiori progression.
- source_word: עֶבֶד
  chosen: slave
  alternatives:
  - servant
  lexicon: HALOT
  rationale: The term ordinarily denotes a person in servile status. In this context
    the social inversion is central to the proverb's force, so 'slave' better preserves
    the bonded and low-status sense than the softer 'servant,' in line with the project's
    guidance to use 'slave' where bonded status is salient.
- source_word: מְשֹׁל
  chosen: to rule
  alternatives:
  - to govern
  - to have dominion over
  lexicon: HALOT
  rationale: The infinitive expresses exercising authority. 'To rule' is concise,
    idiomatic, and matches the social hierarchy under discussion.
- source_word: שָׂרִים
  chosen: princes
  alternatives:
  - officials
  - nobles
  - rulers
  lexicon: HALOT
  rationale: The word refers to high-ranking leaders or nobles. 'Princes' preserves
    the elevated social rank and traditional proverbial contrast, though 'officials'
    or 'nobles' are possible in broader contexts.
