id: PRO.19.15
reference: Proverbs 19:15
source:
  edition: WLC
  text: עַ֭צְלָה תַּפִּ֣יל תַּרְדֵּמָ֑ה וְ/נֶ֖פֶשׁ רְמִיָּ֣ה תִרְעָֽב׃
translation:
  text: Laziness brings on deep sleep, and a slack person will go hungry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a lazy soul will hunger.'' Hebrew: ''soul'' (נֶפֶשׁ) can mean the
      person or self in context.'
    reason: lexical_alternative
  - marker: b
    text: '''Slack person'' renders Hebrew רְמִיָּה here in the sense of negligence
      or slackness; elsewhere the word can carry the sense ''deceitful.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַצְלָה
  chosen: laziness
  alternatives:
  - sloth
  - idleness
  lexicon: HALOT
  rationale: The noun denotes sloth/laziness. 'Laziness' is clear modern English and
    avoids the archaic feel of 'sloth' while preserving the moral force of the proverb.
- source_word: תַּפִּיל
  chosen: brings on
  alternatives:
  - casts into
  - causes
  lexicon: HALOT
  rationale: 'Hiphil of נפל is causative: ''causes to fall'' or ''casts.'' In English,
    with ''deep sleep'' as object, ''brings on'' expresses the causative sense naturally
    without over-literal awkwardness.'
- source_word: תַּרְדֵּמָה
  chosen: deep sleep
  alternatives:
  - drowsiness
  - sleep
  lexicon: HALOT
  rationale: The noun commonly refers to a heavy or deep sleep, not merely ordinary
    sleepiness. 'Deep sleep' best preserves the intensity.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  - appetite
  lexicon: HALOT
  rationale: Although literally 'soul,' in wisdom literature נֶפֶשׁ often stands for
    the person/self. 'Person' communicates the sense idiomatically in English here.
    'Soul' would sound misleadingly metaphysical in this context.
- source_word: רְמִיָּה
  chosen: slack
  alternatives:
  - lazy
  - deceitful
  - slack-handed
  lexicon: HALOT
  rationale: In Proverbs this term can denote slackness/remissness rather than deception
    in certain contexts. Here, paired with laziness and hunger, the sense is negligent/slack.
    'Slack person' preserves the adjectival force and avoids flattening it into a
    mere repetition of 'lazy,' while still matching the context.
- source_word: תִרְעָב
  chosen: will go hungry
  alternatives:
  - will hunger
  - will be hungry
  - will starve
  lexicon: HALOT
  rationale: Qal of רעב means 'be hungry' or 'suffer hunger.' 'Will go hungry' is
    idiomatic modern English and conveys the resulting condition without overstating
    it as 'starve.'
