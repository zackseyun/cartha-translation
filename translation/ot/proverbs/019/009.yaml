id: PRO.19.9
reference: Proverbs 19:9
source:
  edition: WLC
  text: עֵ֣ד שְׁ֭קָרִים לֹ֣א יִנָּקֶ֑ה וְ/יָפִ֖יחַ כְּזָבִ֣ים יֹאבֵֽד׃פ
translation:
  text: A false witness will not go unpunished, and one who breathes out lies will
    perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be acquitted' / 'will not be held innocent.' The Hebrew verb
      can emphasize either lack of acquittal or the certainty of punishment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'breathes out lies.' The expression pictures lies flowing out
      as readily as breath.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד
  chosen: witness
  alternatives:
  - testifier
  lexicon: HALOT
  rationale: The noun denotes a legal or testimonial witness. 'Witness' is the natural
    modern English equivalent and preserves the forensic sense.
- source_word: שְׁקָרִים
  chosen: 'false'
  alternatives:
  - lies
  - deceitful
  lexicon: HALOT
  rationale: 'In construct with עֵד, the plural abstract noun functions adjectivally:
    ''a witness of falsehoods'' = ''a false witness.'' This is idiomatic English and
    preserves the sense.'
- source_word: לֹא יִנָּקֶה
  chosen: will not go unpunished
  alternatives:
  - will not be acquitted
  - will not be held innocent
  lexicon: HALOT
  rationale: The Niphal of נקה can mean 'be clean, be free, be acquitted.' In wisdom
    context the point is that such a person will not escape penalty. 'Will not go
    unpunished' is idiomatic and captures the judicial consequence.
- source_word: וְיָפִיחַ
  chosen: and one who breathes out
  alternatives:
  - and he who utters
  - and one who pours out
  lexicon: HALOT
  rationale: The Hiphil of פוח conveys breathing or uttering forth. Here it describes
    the ready production of falsehood. 'Breathes out' preserves the vivid metaphor
    while remaining readable.
- source_word: כְּזָבִים
  chosen: lies
  alternatives:
  - falsehoods
  - deceptions
  lexicon: HALOT
  rationale: The plural noun means lies/falsehoods. 'Lies' is the clearest and most
    natural English rendering in this proverb.
- source_word: יֹאבֵד
  chosen: will perish
  alternatives:
  - will be destroyed
  - will come to ruin
  lexicon: HALOT
  rationale: The Qal of אבד commonly means perish/be destroyed. 'Will perish' is concise,
    traditional enough for wisdom literature, and fits the parallel warning.
