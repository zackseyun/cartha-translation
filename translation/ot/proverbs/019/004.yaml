id: PRO.19.4
reference: Proverbs 19:4
source:
  edition: WLC
  text: ה֗וֹן יֹ֭סִיף רֵעִ֣ים רַבִּ֑ים וְ֝/דָ֗ל מֵרֵ֥ע/הוּ יִפָּרֵֽד׃
translation:
  text: Wealth adds many friends, but a poor man is separated from his friend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is deserted by his friend.' The Hebrew verb can describe separation
      without specifying whether the poor man withdraws or is abandoned; the context
      strongly suggests social abandonment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - money
  lexicon: HALOT
  rationale: הוֹן denotes material wealth or possessions. 'Wealth' is natural modern
    English and broad enough to include more than cash alone.
- source_word: יֹסִיף
  chosen: adds
  alternatives:
  - increases
  - brings
  lexicon: HALOT
  rationale: Hiphil of יסף commonly means 'to add' or 'increase.' Here it expresses
    that wealth causes an increase in companions; 'adds' is concise and idiomatic.
- source_word: רֵעִים רַבִּים
  chosen: many friends
  alternatives:
  - many companions
  - many associates
  lexicon: HALOT
  rationale: רֵעִים refers to friends/companions/neighbors depending on context. In
    this proverb, social attachment is in view, so 'friends' best captures the relational
    sense; רַבִּים intensifies the number.
- source_word: דָל
  chosen: a poor man
  alternatives:
  - the poor man
  - one who is poor
  lexicon: HALOT
  rationale: דָל denotes one who is poor, weak, or of low status. Because the proverb
    contrasts a wealthy person with an individual sufferer, 'a poor man' preserves
    the singular masculine form and proverbial style.
- source_word: מֵרֵעֵהוּ
  chosen: from his friend
  alternatives:
  - from his companion
  - by his friend
  lexicon: HALOT
  rationale: 'The preposition מִן with רֵעַ plus suffix naturally yields ''from his
    friend/companion.'' The singular is retained, likely functioning generically:
    even his own friend withdraws.'
- source_word: יִפָּרֵד
  chosen: is separated
  alternatives:
  - separates himself
  - is estranged
  - is deserted
  lexicon: HALOT
  rationale: Niphal of פרד can be intransitive/passive, 'be separated' or 'be divided.'
    Given the social contrast, the sense is that the poor man ends up cut off from
    his friend. 'Is separated' preserves the Hebrew's ambiguity better than making
    the friend explicitly the subject of desertion.
