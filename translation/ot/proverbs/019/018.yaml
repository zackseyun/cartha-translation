theological_decisions:
- issue: Interpretation of the warning in the second colon
  chosen_reading: 'The verse forbids excessive or destructive parental severity: the
    parent must discipline the son, but must not desire or pursue a course that results
    in his death.'
  alternative_readings:
  - Do not become agitated to the point of his death
  - Do not spare discipline lest he die
  rationale: 'The Hebrew most naturally reads as a prohibition against directing one''s
    desire toward the son''s death. This fits the contrast: discipline is hopeful
    correction, not lethal severity. Some traditional renderings smooth the line toward
    ''do not be a willing party to his death'' or connect it to withholding discipline,
    but those are more interpretive than the Hebrew wording itself.'
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
