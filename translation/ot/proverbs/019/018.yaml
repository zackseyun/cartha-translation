id: PRO.19.18
reference: Proverbs 19:18
source:
  edition: WLC
  text: יַסֵּ֣ר בִּ֭נְ/ךָ כִּי יֵ֣שׁ תִּקְוָ֑ה וְ/אֶל הֲ֝מִית֗/וֹ אַל תִּשָּׂ֥א נַפְשֶֽׁ/ךָ־־־׃
translation:
  text: Discipline your son, for there is hope; do not set your heart on putting him
    to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''while there is hope.'' The Hebrew clause can be understood causally
      (''for there is hope'') or temporally (''while there is hope'').'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not lift up your soul to put him to death'—a Hebrew idiom
      meaning not to direct your desire or resolve toward a deadly outcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסֵּר
  chosen: Discipline
  alternatives:
  - Correct
  - Chasten
  - Train
  lexicon: HALOT
  rationale: The piel imperative of יסר denotes corrective discipline or chastening.
    'Discipline' best captures intentional parental correction in modern English without
    sounding archaic like 'chasten' or too narrow like 'correct'.
- source_word: בִּנְךָ
  chosen: your son
  alternatives:
  - your child
  lexicon: HALOT
  rationale: The Hebrew is specifically 'your son,' not a gender-neutral term for
    child. Per the translation philosophy, gender-accurate rendering is preferred.
- source_word: כִּי יֵשׁ תִּקְוָה
  chosen: for there is hope
  alternatives:
  - while there is hope
  - because there is hope
  lexicon: HALOT
  rationale: This clause gives the reason for the imperative. 'For there is hope'
    is natural and preserves the causal force. 'While there is hope' is interpretive
    and slightly more dynamic, though contextually plausible.
- source_word: וְאֶל
  chosen: do not set ... on
  alternatives:
  - but toward
  - and toward
  lexicon: HALOT
  rationale: The preposition אֶל with the following idiom is not naturally rendered
    woodenly in English. It introduces the object/goal of the inner desire expressed
    by 'lift the soul'; the idiomatic English expression is captured in 'set your
    heart on'.
- source_word: הֲמִיתוֹ
  chosen: putting him to death
  alternatives:
  - his death
  - killing him
  lexicon: HALOT
  rationale: The infinitive construct of מות in the causative stem means 'causing
    him to die,' hence 'putting him to death.' This is more precise than the bare
    noun-like 'his death' and more formal than 'killing him.'
- source_word: אַל תִּשָּׂא נַפְשֶׁךָ
  chosen: do not set your heart on
  alternatives:
  - do not lift up your soul to
  - do not desire
  - do not be eager for
  lexicon: HALOT
  rationale: Literally, 'do not lift your soul' is a Hebrew idiom for directing one's
    desire or inner inclination toward something. 'Set your heart on' preserves the
    volitional sense in readable English. 'Do not desire' is possible but flatter
    and less idiomatic.
