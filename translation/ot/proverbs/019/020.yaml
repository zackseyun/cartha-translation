id: PRO.19.20
reference: Proverbs 19:20
source:
  edition: WLC
  text: שְׁמַ֣ע עֵ֭צָה וְ/קַבֵּ֣ל מוּסָ֑ר לְ֝מַ֗עַן תֶּחְכַּ֥ם בְּ/אַחֲרִיתֶֽ/ךָ׃
translation:
  text: Listen to counsel and accept discipline, so that you may become wise in your
    latter days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for your future” or “in the end.” The Hebrew אַחֲרִית can refer to one’s
      latter end, outcome, or future.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative 2ms of שׁמע. 'Listen' communicates not mere auditory reception
    but attentive heed, which fits wisdom-instruction context better than the more
    formal 'hear' in contemporary English.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - advice
  - guidance
  lexicon: HALOT
  rationale: עֵצָה in Proverbs commonly denotes considered guidance or counsel rather
    than casual advice. 'Counsel' preserves the weight and wisdom setting.
- source_word: וְקַבֵּל
  chosen: accept
  alternatives:
  - receive
  lexicon: HALOT
  rationale: Imperative of קבל. 'Accept' naturally conveys willing reception of instruction
    in English; 'receive' is possible but slightly less idiomatic here.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: HALOT
  rationale: מוּסָר in Proverbs often includes corrective training, not mere information.
    'Discipline' best captures the formative and corrective sense, while remaining
    readable.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Purpose particle introducing the intended result. 'So that' is natural
    modern English and preserves the purposive force.
- source_word: תֶּחְכַּם
  chosen: you may become wise
  alternatives:
  - you may be wise
  - you may grow wise
  lexicon: HALOT
  rationale: Imperfect of חכם here is best understood as entering or attaining wisdom
    as the result of heeding counsel. 'Become wise' expresses that developmental nuance
    better than the stative-sounding 'be wise'.
- source_word: בְּאַחֲרִיתֶךָ
  chosen: in your latter days
  alternatives:
  - in your end
  - at the end of your life
  - for your future
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, outcome, or future. In this proverb, the phrase
    points to the later stage or eventual outcome of life. 'In your latter days' preserves
    temporal force and avoids flattening it to a vague 'future,' while remaining more
    idiomatic than 'in your end'.
