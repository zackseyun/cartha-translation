theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.' This verse does not require deviation from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Generic masculine אדם in wisdom literature
  chosen_reading: a man's
  alternative_readings:
  - a person's
  - humankind's
  rationale: The proverb speaks of a representative individual in singular form. Following
    the project's gender-accurate principle, 'a man's' best matches the source form
    and proverbial style, while the generic force can be noted in a footnote for modern
    readers.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
