id: PRO.19.3
reference: Proverbs 19:3
source:
  edition: WLC
  text: אִוֶּ֣לֶת אָ֭דָם תְּסַלֵּ֣ף דַּרְכּ֑/וֹ וְ/עַל יְ֝הוָ֗ה יִזְעַ֥ף לִבּֽ/וֹ־׃
translation:
  text: A man's folly ruins his way, and his heart rages against the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a man's' uses a singular generic form, referring to a person in
      general.
    reason: cultural_note
  - marker: b
    text: Or 'perverts his way' or 'makes his path crooked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  - senselessness
  lexicon: HALOT
  rationale: Denotes the quality or state of being foolish. 'Folly' is concise, idiomatic
    in Proverbs, and preserves the wisdom-literature contrast with wisdom without
    sounding overly abstract.
- source_word: אָדָם
  chosen: a man's
  alternatives:
  - a person's
  - humankind's
  lexicon: HALOT
  rationale: Here the singular noun functions generically with an individualizing
    sense in a proverb. Per doctrine, gender-accurate rendering is preferred where
    the source uses masculine/generic אדם. 'A man's' fits the singular proverb style
    better than the more abstract 'humankind's'.
- source_word: תְּסַלֵּף
  chosen: ruins
  alternatives:
  - perverts
  - twists
  - makes crooked
  lexicon: HALOT
  rationale: The Piel of סלף conveys making crooked, distorting, or overturning. In
    context of one's course of life, 'ruins' communicates the practical result in
    natural English, while still reflecting the destructive distortion implied by
    the Hebrew. 'Perverts' is more formal but less natural here and can mislead modern
    readers.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: '''Way'' is the standard wisdom-literature metaphor for one''s manner
    and course of life. It preserves intertextual resonance across Proverbs better
    than the more interpretive ''course''.'
- source_word: וְעַל
  chosen: and ... against
  alternatives:
  - but ... against
  - while ... at
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the second clause and the
    object of hostility. 'And ... against' preserves the Hebrew coordination while
    making the English relation clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the doctrine guidelines.
- source_word: יִזְעַף
  chosen: rages
  alternatives:
  - is angry
  - frets
  - storms
  lexicon: HALOT
  rationale: 'The verb denotes being enraged or indignant. ''Rages'' captures the
    intensity of the reaction and fits the proverb''s moral irony: a person destroys
    his own way, then violently resents God.'
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - he
  - his mind
  lexicon: HALOT
  rationale: Hebrew 'heart' is the seat of inner thought and emotion. Retaining 'heart'
    preserves the anthropological idiom rather than flattening it to a mere pronoun.
