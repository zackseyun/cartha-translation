id: PRO.19.27
reference: Proverbs 19:27
source:
  edition: WLC
  text: חַֽדַל בְּ֭נִ/י לִ/שְׁמֹ֣עַ מוּסָ֑ר לִ֝/שְׁג֗וֹת מֵֽ/אִמְרֵי דָֽעַת־־׃
translation:
  text: Cease, my son, to hear instruction that leads you astray from the words of
    knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Cease, my son, to hear instruction, and you will stray from the words
      of knowledge.' The Hebrew syntax is compressed, and interpreters differ on whether
      the verse warns against listening to deceptive instruction or ironically rebukes
      one who stops listening to sound instruction.
    reason: alternative_reading
lexical_decisions:
- source_word: חַדַל
  chosen: Cease
  alternatives:
  - Stop
  - Desist
  lexicon: HALOT
  rationale: Imperative 2ms from חדל, a direct command to stop or desist. 'Cease'
    preserves the proverbial, admonitory tone better than the more colloquial 'stop.'
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: Vocative address in wisdom literature regularly uses 'my son.' Per gender-accurate
    policy, the masculine singular is retained rather than neutralized.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: HALOT
  rationale: The infinitive of שמע commonly means 'to hear' or 'to listen.' 'Hear'
    is concise and idiomatic in wisdom contexts, while still allowing the sense of
    attentive reception.
- source_word: מוּסָר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, correction, or instruction. Here 'instruction'
    fits the collocation with 'hear' and the contrast with 'the words of knowledge,'
    while still carrying the pedagogical sense of wisdom training.
- source_word: לִשְׁגּוֹת
  chosen: that leads you astray
  alternatives:
  - to stray
  - to err
  - so as to go astray
  lexicon: HALOT
  rationale: 'The infinitive from שגה expresses straying or erring. Because the syntax
    is compressed and somewhat difficult, this is rendered as a result/purpose nuance:
    instruction of the sort that causes deviation from true knowledge. The expanded
    English makes the relation intelligible without over-paraphrasing.'
- source_word: מֵאִמְרֵי
  chosen: from the words of
  alternatives:
  - away from the sayings of
  - from the utterances of
  lexicon: HALOT
  rationale: 'The preposition מן with אמרים marks separation: straying away from the
    content that follows. ''Words of'' is natural English and preserves the construct
    relation.'
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דעת in Proverbs commonly denotes knowledge in the wisdom sense. 'Knowledge'
    is the most direct and consistent rendering here.
