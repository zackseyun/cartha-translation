id: PRO.19.5
reference: Proverbs 19:5
source:
  edition: WLC
  text: עֵ֣ד שְׁ֭קָרִים לֹ֣א יִנָּקֶ֑ה וְ/יָפִ֥יחַ כְּ֝זָבִ֗ים לֹ֣א יִמָּלֵֽט׃
translation:
  text: A false witness will not go unpunished, and one who breathes out lies will
    not escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be acquitted' / 'will not be held innocent.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'breathes out lies,' an image for speaking lies continually or freely;
      alternatively, 'utters lies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד שְׁקָרִים
  chosen: a false witness
  alternatives:
  - a witness of lies
  - a lying witness
  lexicon: HALOT
  rationale: Construct phrase meaning a witness characterized by falsehood. 'False
    witness' is idiomatic modern English and preserves the legal/testimonial sense
    better than the more wooden 'witness of lies.'
- source_word: יִנָּקֶה
  chosen: will not go unpunished
  alternatives:
  - will not be acquitted
  - will not be held innocent
  lexicon: HALOT
  rationale: From נקה in the Niphal, often meaning to be free from punishment or declared
    innocent. In this proverb's judicial-moral context, 'go unpunished' communicates
    the consequence clearly in natural English. 'Be acquitted' is possible but sounds
    narrower and more technical.
- source_word: וְיָפִיחַ כְּזָבִים
  chosen: and one who breathes out lies
  alternatives:
  - and he who utters lies
  - and one who pours out lies
  lexicon: HALOT
  rationale: The Hiphil of פוח conveys breathing/blowing out, used figuratively for
    uttering speech. 'Breathes out lies' preserves the vivid Hebrew image while remaining
    understandable. The supplied subject in English ('one who') avoids awkward repetition
    while matching the participial-like sense in context.
- source_word: כְּזָבִים
  chosen: lies
  alternatives:
  - falsehoods
  - deceptions
  lexicon: HALOT
  rationale: Plural noun for false statements. 'Lies' is the most direct and idiomatic
    rendering in parallel with 'false witness.'
- source_word: יִמָּלֵט
  chosen: will not escape
  alternatives:
  - will not get away
  - will not be delivered
  lexicon: HALOT
  rationale: From מלט in the Niphal, meaning to escape or be delivered. In parallel
    with 'will not go unpunished,' 'will not escape' is the clearest and most natural
    expression of unavoidable judgment.
