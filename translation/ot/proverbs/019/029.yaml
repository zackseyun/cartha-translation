id: PRO.19.29
reference: Proverbs 19:29
source:
  edition: WLC
  text: נָכ֣וֹנוּ לַ/לֵּצִ֣ים שְׁפָטִ֑ים וּ֝/מַהֲלֻמ֗וֹת לְ/גֵ֣ו כְּסִילִֽים׃
translation:
  text: Judgments are prepared for scoffers, and beatings for the backs of fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judgments are ready for scoffers, and blows for the back of fools.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָכ֣וֹנוּ
  chosen: are prepared
  alternatives:
  - are ready
  - are established
  - are appointed
  lexicon: HALOT
  rationale: From כון in the Niphal/perfect plural, conveying something made ready,
    established, or set in place. 'Are prepared' fits the proverbial sense that such
    punishments stand ready for their proper targets.
- source_word: לַ/לֵּצִים
  chosen: for scoffers
  alternatives:
  - for mockers
  - for scorners
  lexicon: HALOT
  rationale: לץ denotes those who deride or mock with arrogant contempt. 'Scoffers'
    preserves the moral and rhetorical force common in Proverbs better than the milder
    'mockers.'
- source_word: שְׁפָטִים
  chosen: judgments
  alternatives:
  - punishments
  - sentences
  lexicon: HALOT
  rationale: Though משפט can denote legal judgments broadly, here in parallel with
    physical blows it refers to punitive judgments. 'Judgments' keeps the formal lexical
    link while allowing the punitive sense to be heard from context.
- source_word: וּ֝/מַהֲלֻמ֗וֹת
  chosen: beatings
  alternatives:
  - blows
  - stripes
  - lashes
  lexicon: HALOT
  rationale: The noun refers to striking or blows. 'Beatings' communicates repeated
    corporal punishment in natural modern English and matches the plural force.
- source_word: לְ/גֵ֣ו
  chosen: for the backs of
  alternatives:
  - for the body of
  - for the back of
  lexicon: HALOT
  rationale: גֵּו commonly refers to the back or body/trunk. In context of blows,
    'backs of' is the most idiomatic and concrete English rendering.
- source_word: כְּסִילִֽים
  chosen: fools
  alternatives:
  - stupid people
  - dullards
  lexicon: HALOT
  rationale: כסיל in Proverbs is a stock wisdom term for the morally obstinate fool,
    not merely someone unintelligent. 'Fools' preserves the established wisdom-category
    sense.
