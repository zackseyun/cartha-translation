id: PRO.19.7
reference: Proverbs 19:7
source:
  edition: WLC
  text: כָּ֥ל אֲחֵי רָ֨שׁ שְֽׂנֵאֻ֗/הוּ אַ֤ף כִּ֣י מְ֭רֵעֵ/הוּ רָחֲק֣וּ מִמֶּ֑/נּוּ
    מְרַדֵּ֖ף אֲמָרִ֣ים לא הֵֽמָּה־׀־׃
translation:
  text: All the brothers of a poor man hate him; how much more do his friends keep
    far from him! He pursues words, but they are not there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He pursues words that are nothing,' or 'He pursues promises, but they
      are not there.' The final clause is textually and syntactically difficult in
      Hebrew.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'brothers' is grammatically masculine; here it refers to family members
      in the proverb's social setting.
    reason: cultural_note
lexical_decisions:
- source_word: רָשׁ
  chosen: a poor man
  alternatives:
  - the poor
  - a poor person
  lexicon: HALOT
  rationale: רָשׁ denotes one who is poor or impoverished. Because the Hebrew is singular
    masculine and paired with masculine pronominal suffixes, 'a poor man' best reflects
    the source while remaining natural English.
- source_word: אֲחֵי
  chosen: brothers
  alternatives:
  - kinsmen
  - relatives
  lexicon: HALOT
  rationale: The construct phrase כָּל אֲחֵי רָשׁ is literally 'all the brothers of
    a poor man.' 'Brothers' preserves the familial force more directly than broader
    terms like 'relatives.'
- source_word: שְׂנֵאֻהוּ
  chosen: hate him
  alternatives:
  - despise him
  - are hateful toward him
  lexicon: HALOT
  rationale: From שׂנא, the normal sense is 'hate.' A softer rendering such as 'despise'
    would undertranslate the verb's force.
- source_word: אַף כִּי
  chosen: how much more
  alternatives:
  - even more
  - indeed
  lexicon: HALOT
  rationale: 'This idiom introduces an a fortiori statement: if even brothers hate
    him, then friends withdraw all the more. ''How much more'' captures the proverb''s
    logic clearly.'
- source_word: מְרֵעֵהוּ
  chosen: his friends
  alternatives:
  - his companions
  - his associates
  lexicon: HALOT
  rationale: The noun from רעה/רע commonly refers to companions or friends. 'Friends'
    is the most idiomatic and contextually fitting rendering in contrast with 'brothers.'
- source_word: רָחֲקוּ מִמֶּנּוּ
  chosen: keep far from him
  alternatives:
  - have gone far from him
  - distance themselves from him
  lexicon: HALOT
  rationale: The verb means 'be far' or 'be distant.' 'Keep far from him' preserves
    the relational distancing and reads naturally in English.
- source_word: מְרַדֵּף
  chosen: He pursues
  alternatives:
  - pursuing
  - one pursuing
  lexicon: HALOT
  rationale: 'The participle is difficult syntactically, but in context it most plausibly
    continues the description of the poor man: he chases after something. Rendering
    it verbally as ''He pursues'' gives a coherent English clause while respecting
    the participial force.'
- source_word: אֲמָרִים
  chosen: words
  alternatives:
  - promises
  - pleas
  - talk
  lexicon: HALOT
  rationale: The noun literally means 'words' or 'sayings.' In context it likely refers
    to empty words or assurances from absent friends, but the main text keeps the
    more literal 'words' and leaves the interpretive nuance to a footnote.
- source_word: לֹא הֵמָּה
  chosen: they are not there
  alternatives:
  - they are nothing
  - there is nothing
  - they do not exist
  lexicon: HALOT
  rationale: This closing expression is notoriously terse and difficult. The sense
    in context is that what he pursues proves absent or unreal. 'They are not there'
    communicates the likely meaning in idiomatic English without overexpanding the
    Hebrew.
