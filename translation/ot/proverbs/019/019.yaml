id: PRO.19.19
reference: Proverbs 19:19
source:
  edition: WLC
  text: גרל חֵ֭מָה נֹ֣שֵׂא עֹ֑נֶשׁ כִּ֥י אִם תַּ֝צִּ֗יל וְ/ע֣וֹד תּוֹסִֽף־־׃
translation:
  text: A hot-tempered man bears the penalty, for if you rescue him, you will only
    have to do it again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a possessor of wrath bears a penalty'; the Hebrew is
      compact and idiomatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: גרל
  chosen: A ... man
  alternatives:
  - one of great
  - a possessor of
  lexicon: HALOT
  rationale: 'The construct noun denotes one characterized by what follows (''possessor
    of'' or ''one of''). In idiomatic English, this is best represented by supplying
    ''man'' and expressing the characterization adjectivally: ''a hot-tempered man.''
    This avoids a wooden ''one of wrath'' while preserving the personal reference
    implied by the masculine singular form.'
- source_word: חֵמָה
  chosen: hot-tempered
  alternatives:
  - wrath
  - rage
  - heat
  lexicon: HALOT
  rationale: The noun literally denotes heat, wrath, or rage. In construct with גרל
    it describes a person marked by anger. 'Hot-tempered' captures both the metaphor
    of heat and the idiomatic sense in natural English.
- source_word: נֹשֵׂא
  chosen: bears
  alternatives:
  - carries
  - must bear
  - will bear
  lexicon: HALOT
  rationale: The participle of נשׂא commonly means 'carry' or 'bear.' 'Bears' is concise
    and preserves the proverbial, gnomic present sense.
- source_word: עֹנֶשׁ
  chosen: the penalty
  alternatives:
  - punishment
  - fine
  - consequence
  lexicon: HALOT
  rationale: The noun refers to a penalty or punishment incurred. 'Penalty' fits the
    legal/practical sense without over-specifying the form of punishment.
- source_word: כִּי אִם
  chosen: for if
  alternatives:
  - because if
  - indeed if
  - for though
  lexicon: HALOT
  rationale: The combination introduces the reason for the first clause and a conditional
    explanation. 'For if' preserves the causal link and the conditional force in straightforward
    English.
- source_word: תַּצִּיל
  chosen: you rescue him
  alternatives:
  - you deliver him
  - you save him
  lexicon: HALOT
  rationale: The Hiphil of נצל means to deliver or rescue. English requires an object,
    supplied from context as the hot-tempered man. 'Rescue' is idiomatic and fits
    the practical warning of the proverb.
- source_word: וְעוֹד
  chosen: again
  alternatives:
  - still more
  - yet again
  - further
  lexicon: HALOT
  rationale: 'The adverb means ''again, still, further.'' In this context it points
    to repetition: intervening once will lead to repeated intervention. ''Again''
    captures the sense cleanly.'
- source_word: תּוֹסִף
  chosen: you will only have to do it
  alternatives:
  - you will add
  - you will continue
  - you will have to add to it
  lexicon: HALOT
  rationale: The Hiphil of יסף means to add, continue, or do further. In context,
    the implied object is another rescue or intervention. Rendering the idiom as 'you
    will only have to do it' makes the elliptical Hebrew intelligible in natural English
    while preserving the warning of repeated action.
