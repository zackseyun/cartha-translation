id: PRO.19.11
reference: Proverbs 19:11
source:
  edition: WLC
  text: שֵׂ֣כֶל אָ֭דָם הֶאֱרִ֣יךְ אַפּ֑/וֹ וְ֝/תִפאַרְתּ֗/וֹ עֲבֹ֣ר עַל פָּֽשַׁע־׃
translation:
  text: A man's insight makes him slow to anger, and it is his glory to overlook an
    offense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A person's prudence makes him slow to anger.' The Hebrew literally says
      'A man's insight lengthens his nose,' an idiom for patience.
    reason: lexical_alternative
  - marker: b
    text: Or 'to pass over a transgression.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׂכֶל
  chosen: insight
  alternatives:
  - prudence
  - good sense
  - understanding
  lexicon: HALOT
  rationale: שֵׂכֶל denotes practical intelligence or sound judgment. 'Insight' preserves
    the idea of perceptive good sense without sounding overly abstract. It fits the
    proverb's wisdom context and explains the resulting restraint.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם refers to an individual human in a generic sense, not humanity
    collectively. Per the gender-accurate guideline, 'man' is retained in the main
    text as representative/generic rather than neutralized to 'person'.
- source_word: הֶאֱרִיךְ אַפּוֹ
  chosen: makes him slow to anger
  alternatives:
  - lengthens his nose
  - prolongs his anger
  - makes his anger long
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of 'lengthening the nose,' a standard
    expression for patience or delayed anger. 'Makes him slow to anger' communicates
    the idiomatic sense in clear modern English while preserving the causal relation
    from wisdom to restraint.
- source_word: וְתִפְאַרְתּוֹ
  chosen: and it is his glory
  alternatives:
  - and his beauty
  - and his honor
  - and his splendor
  lexicon: HALOT
  rationale: תִפְאֶרֶת can denote beauty, honor, or glory. In wisdom literature, 'glory'
    naturally conveys what is honorable or commendable about a person. The supplied
    'it is' makes the verbless clause idiomatic in English.
- source_word: עֲבֹר עַל
  chosen: to overlook
  alternatives:
  - to pass over
  - to pass by
  - to forgive
  lexicon: HALOT
  rationale: The construction means to pass over or ignore an offense. 'Overlook'
    best captures the sense of not retaliating or dwelling on the wrong. 'Forgive'
    is related but slightly more interpretive and potentially stronger than the Hebrew
    expression requires.
- source_word: פָּשַׁע
  chosen: an offense
  alternatives:
  - transgression
  - rebellion
  - wrongdoing
  lexicon: HALOT
  rationale: פֶּשַׁע often denotes transgression or rebellion, but in this interpersonal
    proverb 'offense' is the most natural English equivalent. It preserves the seriousness
    of a wrong without importing a more technical theological register than the context
    demands.
