id: PRO.19.23
reference: Proverbs 19:23
source:
  edition: WLC
  text: יִרְאַ֣ת יְהוָ֣ה לְ/חַיִּ֑ים וְ/שָׂבֵ֥עַ יָ֝לִ֗ין בַּל יִפָּ֥קֶד רָֽע־׃
translation:
  text: The fear of Yahweh leads to life, and whoever has it will rest satisfied; he will not be visited by harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is for life'; the Hebrew expression is very concise and may be rendered more literally.
    reason: lexical_alternative
  - marker: b
    text: Or 'will spend the night satisfied' or 'will sleep satisfied.'
    reason: lexical_alternative
  - marker: c
    text: Or 'no evil/disaster will visit him.' Here 'evil' refers to calamity or harm, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  chosen: fear
  alternatives:
  - reverence
  - fear of
  lexicon: HALOT
  rationale: Construct form with יְהוָה, denoting reverent fear/awe toward God. 'Fear' preserves the Hebrew term's full weight better than the weaker 'reverence,' while English context with 'of the LORD' naturally carries covenantal piety rather than mere terror.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְחַיִּים
  chosen: leads to life
  alternatives:
  - for life
  - to life
  lexicon: HALOT
  rationale: The preposition ל with 'life' after a nominal clause is idiomatically rendered as result or direction. 'Leads to life' makes the sense natural in English while preserving the proverb's causal/resultative force.
- source_word: וְשָׂבֵעַ
  chosen: satisfied
  alternatives:
  - full
  - sated
  lexicon: HALOT
  rationale: Adjectival predicate meaning 'satisfied/full.' 'Satisfied' is more idiomatic in English in collocation with resting or sleeping and conveys contentment, not merely physical fullness.
- source_word: יָלִין
  chosen: will rest
  alternatives:
  - will lodge
  - will spend the night
  - will sleep
  lexicon: HALOT
  rationale: The verb literally refers to spending the night or lodging. In this proverb, the sense is secure repose. 'Will rest' captures the idiomatic force in contemporary English without over-specifying sleeping, while preserving the image of settled overnight security.
- source_word: בַּל
  chosen: not
  alternatives:
  - never
  lexicon: HALOT
  rationale: Poetic negative particle. 'Not' is the straightforward equivalent; 'never' would add emphasis not strictly required by the form.
- source_word: יִפָּקֶד
  chosen: be visited
  alternatives:
  - be punished
  - be afflicted
  - be encountered
  lexicon: HALOT
  rationale: Niphal of פקד can mean 'be attended to/visited,' including in contexts of adverse visitation. With רָע the idiom is that harm does not come upon or visit the person. 'Be visited' preserves the metaphor and allows the object 'by harm' to carry the adversity.
- source_word: רָע
  chosen: harm
  alternatives:
  - evil
  - disaster
  - trouble
  lexicon: HALOT
  rationale: Here the term denotes adverse circumstance rather than moral evil. 'Harm' best fits the passive idiom 'be visited by harm' and avoids implying absolute immunity from all trouble in every sense.
