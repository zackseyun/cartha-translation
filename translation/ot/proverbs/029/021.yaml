id: PRO.29.21
reference: Proverbs 29:21
source:
  edition: WLC
  text: מְפַנֵּ֣ק מִ/נֹּ֣עַר עַבְדּ֑/וֹ וְ֝/אַחֲרִית֗/וֹ יִהְיֶ֥ה מָנֽוֹן׃
translation:
  text: Whoever pampers his slave from youth, in the end will have grief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew מָנוֹן is uncertain. It has also been understood as 'a son' or 'one
      acting like a son,' yielding the sense that an indulged slave may presume on
      filial status; others take it more generally as 'trouble' or 'insubordination.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְפַנֵּק
  chosen: pampers
  alternatives:
  - indulges
  - spoils
  - coddles
  lexicon: HALOT
  rationale: The Piel participle of פנק conveys treating delicately or indulgently.
    'Pampers' is concise, natural English and preserves the negative sense implied
    by the proverb better than the more neutral 'treats delicately.'
- source_word: מִנֹּעַר
  chosen: from youth
  alternatives:
  - from childhood
  - from his youth
  lexicon: HALOT
  rationale: The phrase marks the time from an early stage. 'From youth' is idiomatic
    and sufficiently literal; the possessive 'his' is not explicit in Hebrew and is
    unnecessary in English.
- source_word: עַבְדּוֹ
  chosen: his slave
  alternatives:
  - his servant
  lexicon: HALOT
  rationale: עבד commonly denotes a servant or slave. In keeping with the project's
    guidance, 'slave' is preferred where bonded status is salient; here the household
    subordinate is clearly under the master's authority, so 'slave' best reflects
    the social reality.
- source_word: וְאַחֲרִיתוֹ
  chosen: in the end
  alternatives:
  - afterward
  - at the end
  lexicon: HALOT
  rationale: אַחֲרִית denotes the latter end or outcome. 'In the end' communicates
    the proverb's focus on eventual result in readable modern English.
- source_word: יִהְיֶה
  chosen: will have
  alternatives:
  - will become
  - will be
  lexicon: HALOT
  rationale: The copula links the subject to the difficult predicate מָנוֹן. Because
    the predicate is best taken as the resulting condition experienced by the master,
    'will have' yields idiomatic English with the chosen sense 'grief.'
- source_word: מָנוֹן
  chosen: grief
  alternatives:
  - a son
  - one who acts like a son
  - insubordination
  - trouble
  lexicon: HALOT
  rationale: מָנוֹן is rare and difficult. Traditional Jewish and many modern interpreters
    understand it negatively as a troublesome or insolent outcome rather than literally
    'son.' Given the proverb's warning context, 'grief' captures the adverse result
    in clear English without over-specifying a debated nuance.
