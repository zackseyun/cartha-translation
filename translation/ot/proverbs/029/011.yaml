id: PRO.29.11
reference: Proverbs 29:11
source:
  edition: WLC
  text: כָּל ר֭וּח/וֹ יוֹצִ֣יא כְסִ֑יל וְ֝/חָכָ֗ם בְּ/אָח֥וֹר יְשַׁבְּחֶֽ/נָּה־׃
translation:
  text: A fool lets out all his spirit, but a wise man holds it back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A fool vents all his temper/spirit, but a wise man quiets it and keeps
      it back.' The Hebrew terms for 'spirit' and the final verb can also suggest
      temper or calming, not only restraint.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  - every
  lexicon: HALOT
  rationale: Quantifier modifying 'his spirit'; here it emphasizes total lack of restraint,
    so 'all' is the most natural concise rendering.
- source_word: רוּחוֹ
  chosen: his spirit
  alternatives:
  - his temper
  - his feelings
  - his mind
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, breath, wind, disposition, or temper. In this
    proverb about self-control, it refers to one's inner impulse or emotional/spiritual
    outflow. 'Spirit' preserves the Hebrew image while allowing the idiomatic sense
    to be understood from context; 'temper' is interpretive and too narrow for the
    main text.
- source_word: יוֹצִיא
  chosen: lets out
  alternatives:
  - brings out
  - utters
  - vents
  lexicon: HALOT
  rationale: Hiphil of יצא means to cause to go out, bring out. In context with 'all
    his spirit,' the sense is releasing or venting what is within. 'Lets out' is idiomatic
    English that stays close to the image without over-paraphrasing.
- source_word: כְסִיל
  chosen: a fool
  alternatives:
  - the fool
  - a dullard
  lexicon: HALOT
  rationale: Standard wisdom-literature term for a morally and practically foolish
    person. 'A fool' is the clearest and most established English equivalent.
- source_word: חָכָם
  chosen: a wise man
  alternatives:
  - the wise man
  - a wise person
  lexicon: HALOT
  rationale: Masculine singular adjective/substantive used generically in proverb
    form. Per gender-accurate policy, 'wise man' matches the source form and representative
    force better than the neutral 'wise person'.
- source_word: בְּאָחוֹר
  chosen: holds it back
  alternatives:
  - keeps it behind
  - restrains it until later
  - calms it
  lexicon: HALOT
  rationale: Literally 'in/at the back, behind.' In this idiom it contrasts with the
    fool's immediate outpouring and conveys restraint or keeping something back. 'Holds
    it back' gives the proverb's force in natural English while reflecting the underlying
    spatial metaphor.
- source_word: יְשַׁבְּחֶנָּה
  chosen: holds it back
  alternatives:
  - quiets it
  - stills it
  - appeases it
  lexicon: HALOT
  rationale: This verb is difficult and has been understood in relation to calming,
    quieting, or restraining the previously mentioned 'spirit' (feminine suffix).
    In combination with בְּאָחוֹר, the clause contrasts delayed restraint with immediate
    venting. 'Holds it back' captures that contrast best in context, though a calming
    nuance is possible.
