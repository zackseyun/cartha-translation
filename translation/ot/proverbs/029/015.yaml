id: PRO.29.15
reference: Proverbs 29:15
source:
  edition: WLC
  text: שֵׁ֣בֶט וְ֭/תוֹכַחַת יִתֵּ֣ן חָכְמָ֑ה וְ/נַ֥עַר מְ֝שֻׁלָּ֗ח מֵבִ֥ישׁ אִמּֽ/וֹ׃
translation:
  text: A rod and reproof give wisdom, but a boy left to himself brings shame to his
    mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'left unchecked' or 'left undisciplined.' The Hebrew literally has the
      sense of a boy who is 'let go' or 'left alone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁבֶט
  chosen: rod
  alternatives:
  - staff
  - disciplining rod
  lexicon: HALOT
  rationale: שֵׁבֶט commonly denotes a rod, staff, or scepter. In wisdom literature
    and disciplinary contexts, 'rod' is the most natural English rendering and preserves
    the concrete image without over-paraphrasing it as 'punishment.'
- source_word: וְתוֹכַחַת
  chosen: and reproof
  alternatives:
  - and correction
  - and rebuke
  lexicon: HALOT
  rationale: תוֹכַחַת refers to verbal correction, rebuke, or reproof. 'Reproof' pairs
    well with 'rod' by preserving the proverb's combination of physical discipline
    and verbal correction. 'Correction' is possible but slightly broader and less
    verbally pointed.
- source_word: יִתֵּן חָכְמָה
  chosen: give wisdom
  alternatives:
  - impart wisdom
  - produce wisdom
  lexicon: HALOT
  rationale: The verb נתן with חָכְמָה is straightforwardly 'give wisdom.' Retaining
    the simple verbal form preserves the Hebrew idiom and proverbial terseness.
- source_word: נַעַר
  chosen: boy
  alternatives:
  - child
  - youth
  - young man
  lexicon: HALOT
  rationale: נַעַר can range from child to young man depending on context. Here the
    disciplinary setting and maternal shame suggest a dependent son still under parental
    formation. 'Boy' best captures that stage without flattening the masculine singular
    reference.
- source_word: מְשֻׁלָּח
  chosen: left to himself
  alternatives:
  - left unchecked
  - left undisciplined
  - let loose
  lexicon: HALOT
  rationale: The passive participle from שלח literally means 'sent away' or 'let go.'
    In this context it idiomatically refers to a child allowed to go unchecked or
    unrestrained. 'Left to himself' is a natural English equivalent that preserves
    the sense of parental non-restraint without adding interpretive excess.
- source_word: מֵבִישׁ
  chosen: brings shame to
  alternatives:
  - shames
  - causes disgrace to
  lexicon: HALOT
  rationale: The Hiphil participle of בוש conveys causing shame or disgrace. 'Brings
    shame to' is idiomatic English and preserves the causative force.
- source_word: אִמּוֹ
  chosen: his mother
  lexicon: HALOT
  rationale: The suffix is third masculine singular, referring back to the boy. 'His
    mother' is the direct and gender-accurate rendering.
