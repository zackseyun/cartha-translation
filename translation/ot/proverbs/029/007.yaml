id: PRO.29.7
reference: Proverbs 29:7
source:
  edition: WLC
  text: יֹדֵ֣עַ צַ֭דִּיק דִּ֣ין דַּלִּ֑ים רָ֝שָׁ֗ע לֹא יָבִ֥ין דָּֽעַת־׃
translation:
  text: A righteous man knows the case of the poor; a wicked man does not understand
    such knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A righteous man knows the rights/justice of the poor.' The Hebrew דִּין
      can mean 'case,' 'cause,' or 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew simply 'does not understand knowledge'; the translation 'such knowledge'
      makes explicit the implied connection to the previous clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹדֵעַ
  chosen: knows
  alternatives:
  - understands
  - is concerned with
  lexicon: HALOT
  rationale: The participle from ידע denotes knowing or recognizing. 'Knows' preserves
    the straightforward verbal sense and pairs naturally with the object 'the case
    of the poor.' More interpretive renderings like 'is concerned with' capture an
    implication but go beyond the lexical core.
- source_word: צַדִּיק
  chosen: righteous man
  alternatives:
  - the righteous
  - a righteous person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'A righteous man' preserves
    the masculine singular form in keeping with the gender-accurate policy and reflects
    the proverb's representative individual type. 'The righteous' is possible but
    less individualized.
- source_word: דִּין
  chosen: case
  alternatives:
  - justice
  - cause
  - legal claim
  lexicon: HALOT
  rationale: דין can denote a legal case, cause, or justice. Here, with 'the poor'
    as the dependent noun, 'case' best captures concrete concern for their legal or
    social cause without overabstracting to 'justice' alone.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: The plural adjective/noun refers to those who are poor, weak, or lowly.
    'The poor' is the most natural and common rendering in wisdom literature, while
    still encompassing social vulnerability.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a guilty man
  lexicon: HALOT
  rationale: Like צדיק, this adjective is substantival and singular. 'A wicked man'
    preserves the representative contrast in the proverb and matches the masculine
    singular form.
- source_word: יָבִין
  chosen: understand
  alternatives:
  - discern
  - comprehend
  lexicon: HALOT
  rationale: בין commonly means to understand or discern. 'Understand' is clear modern
    English and fits the contrast with the righteous man's knowing.
- source_word: דָּעַת
  chosen: such knowledge
  alternatives:
  - knowledge
  - understanding
  - the matter
  lexicon: HALOT
  rationale: The bare noun 'knowledge' is somewhat abrupt in English at the end of
    the clause. 'Such knowledge' makes explicit that the wicked man lacks understanding
    of the kind of knowledge just described, while staying close to the Hebrew sense.
    Some take the noun more concretely ('the matter'), but the abstract sense better
    fits the lexical form.
