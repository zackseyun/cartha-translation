id: PRO.29.25
reference: Proverbs 29:25
source:
  edition: WLC
  text: חֶרְדַּ֣ת אָ֭דָם יִתֵּ֣ן מוֹקֵ֑שׁ וּ/בוֹטֵ֖חַ בַּ/יהוָ֣ה יְשֻׂגָּֽב׃
translation:
  text: The fear of man lays a snare, but whoever trusts in Yahweh will be set on high.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The fear of man gives a snare.'' The expression means that fearing people becomes a trap.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be safe' or 'will be protected'; Hebrew literally 'will be set on high.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרְדַּת
  chosen: fear of
  alternatives:
  - dread of
  - trembling before
  lexicon: HALOT
  rationale: Construct form meaning fear, trembling, or dread. 'Fear of' is the most natural English rendering in this proverb and preserves the broad sense of anxious human fear rather than a narrower physical trembling.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Here the noun refers generically to human beings in the sense of fearing other people. Per doctrine, gender-accurate rendering is preferred where the source uses masculine generic language. 'Fear of man' is also an established and clear English idiom in wisdom literature.
- source_word: יִתֵּן
  chosen: lays
  alternatives:
  - gives
  - brings
  - sets
  lexicon: HALOT
  rationale: Literally 'gives,' but in idiomatic English with 'snare' the sense is that such fear places or lays a trap. 'Lays' communicates the proverb's imagery more naturally while staying close to the Hebrew sense.
- source_word: מוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  lexicon: HALOT
  rationale: A common wisdom image for something that ensnares or traps a person. 'Snare' preserves the metaphorical and literary force better than the flatter 'trap.'
- source_word: וּבוֹטֵחַ
  chosen: but whoever trusts
  alternatives:
  - but the one trusting
  - but he who trusts
  lexicon: HALOT
  rationale: The participle functions substantivally and generically. 'Whoever trusts' renders the ongoing/generic force in natural modern English without restricting the saying to a male individual.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The divine name is YHWH. Per doctrine, the default rendering is 'the LORD' rather than a transliteration such as 'Yahweh.'
- source_word: יְשֻׂגָּב
  chosen: will be set on high
  alternatives:
  - will be safe
  - will be protected
  - will be exalted
  lexicon: HALOT
  rationale: The verb conveys being set inaccessibly high, and thus secure. 'Will be set on high' preserves the metaphor of elevated safety more directly than interpretive renderings like 'will be safe,' while still being understandable in English.
