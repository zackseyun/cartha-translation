theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic force of אָדָם and the participle בוֹטֵחַ
  chosen_reading: Retain 'man' in the first clause and use 'whoever trusts' in the second
  alternative_readings:
  - humankind
  - people
  - he who trusts
  rationale: The proverb contrasts fearing human beings with trusting YHWH. 'Man' reflects the Hebrew generic singular and matches the doctrine's gender-accurate principle, while 'whoever trusts' is natural English for the substantival participle and preserves the generic scope.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
