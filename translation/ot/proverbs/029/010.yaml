id: PRO.29.10
reference: Proverbs 29:10
source:
  edition: WLC
  text: אַנְשֵׁ֣י דָ֭מִים יִשְׂנְאוּ תָ֑ם וִֽ֝/ישָׁרִ֗ים יְבַקְשׁ֥וּ נַפְשֽׁ/וֹ־׃
translation:
  text: Men of blood hate the blameless, but the upright seek his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the upright care for his life' or 'seek to protect him.' The Hebrew
      can be understood positively here.
    reason: alternative_reading
lexical_decisions:
- source_word: אַנְשֵׁי דָמִים
  chosen: Men of blood
  alternatives:
  - bloodthirsty men
  - murderous men
  - men of violence
  lexicon: HALOT
  rationale: Literally 'men of bloods/bloodshed.' 'Men of blood' preserves the Hebrew
    idiom and its moral force, while remaining intelligible in English. Alternatives
    smooth the idiom but are more interpretive.
- source_word: יִשְׂנְאוּ
  chosen: hate
  alternatives:
  - detest
  lexicon: HALOT
  rationale: Standard rendering of the verb 'to hate.' 'Hate' is direct and idiomatic
    here.
- source_word: תָם
  chosen: the blameless
  alternatives:
  - the innocent
  - the upright
  - the man of integrity
  lexicon: HALOT
  rationale: The adjective denotes one who is complete, innocent, or blameless in
    conduct. 'The blameless' fits wisdom-literature usage and avoids collapsing it
    into the later 'upright' in the second colon.
- source_word: וישרים
  chosen: the upright
  alternatives:
  - upright people
  - the just
  lexicon: HALOT
  rationale: A common wisdom term for morally straight/upright persons. 'The upright'
    preserves the plural sense as a class and pairs naturally with 'the blameless'
    without making the two cola identical.
- source_word: יְבַקְשׁוּ
  chosen: seek
  alternatives:
  - seek after
  - care for
  - protect
  lexicon: HALOT
  rationale: The verb basically means 'seek.' In this construction it can mean either
    seeking someone's life to destroy it or seeking the person himself for his good.
    Because the object is 'his life,' the Hebrew ambiguity is significant and should
    be preserved in documentation and footnote.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - him
  lexicon: HALOT
  rationale: נפש often means 'life,' 'self,' or 'person.' 'His life' is the most literal
    and preserves the ambiguity of whether the upright seek to preserve him or whether
    others seek his life in a hostile sense.
