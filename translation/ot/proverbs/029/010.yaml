theological_decisions:
- issue: 'Ambiguity of the second colon (whether the upright seek to preserve the
    blameless person''s life, or whether the sense is hostile: ''seek his life'').'
  chosen_reading: seek his life
  alternative_readings:
  - seek his soul
  - care for his life
  - seek to protect him
  rationale: The Hebrew phrase יְבַקְשׁוּ נַפְשׁוֹ is formally 'seek his life/self'
    and can be heard ambiguously in English as well. Rendering it as 'seek his life'
    preserves the source-text tension rather than resolving it. A footnote preserves
    the benevolent interpretive option reflected in many translations and commentators.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
