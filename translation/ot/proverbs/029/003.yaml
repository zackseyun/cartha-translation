id: PRO.29.3
reference: Proverbs 29:3
source:
  edition: WLC
  text: אִֽישׁ אֹהֵ֣ב חָ֭כְמָה יְשַׂמַּ֣ח אָבִ֑י/ו וְ/רֹעֶ֥ה ז֝וֹנ֗וֹת יְאַבֶּד הֽוֹן־־׃
translation:
  text: A man who loves wisdom makes his father glad, but one who keeps company with
    prostitutes destroys wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'one who shepherds/feeds with prostitutes'; the Hebrew idiom
      means associating with or frequenting them.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: A man
  alternatives:
  - A person
  - Whoever
  lexicon: HALOT
  rationale: The Hebrew noun is singular masculine and introduces a representative
    individual in a proverb. Per the gender-accurate policy, 'man' best matches the
    source form and proverbial style, while still functioning generically.
- source_word: אֹהֵב חָכְמָה
  chosen: who loves wisdom
  alternatives:
  - loving wisdom
  - who loves wise instruction
  lexicon: HALOT
  rationale: 'The participle plus object expresses an ongoing characteristic: a man
    characterized by loving wisdom. ''Wisdom'' is the plain sense of חָכְמָה and should
    not be narrowed to ''instruction'' here.'
- source_word: יְשַׂמַּח
  chosen: makes ... glad
  alternatives:
  - gladdens
  - brings joy to
  lexicon: HALOT
  rationale: 'The Piel form is causative/intensive: he causes his father to rejoice.
    ''Makes ... glad'' is natural modern English and preserves the causative sense.'
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his parent
  lexicon: HALOT
  rationale: The noun with 3ms suffix specifically means 'his father'; there is no
    warrant to generalize to 'parent'.
- source_word: וְרֹעֶה
  chosen: one who keeps company with
  alternatives:
  - but a companion of
  - but one who associates with
  - but one who shepherds/feeds on
  lexicon: HALOT
  rationale: Although the participle of רעה literally means 'shepherding' or 'pasturing,'
    in this idiom with זֹנוֹת it denotes associating with or frequenting prostitutes.
    'Keeps company with' conveys the idiomatic sense in readable English without wooden
    literalism.
- source_word: זֹנוֹת
  chosen: prostitutes
  alternatives:
  - whores
  - harlots
  lexicon: HALOT
  rationale: The feminine plural participle/noun refers to women engaged in prostitution.
    'Prostitutes' is accurate and contemporary; archaic or pejorative alternatives
    are avoided.
- source_word: יְאַבֶּד
  chosen: destroys
  alternatives:
  - squanders
  - ruins
  - causes to perish
  lexicon: HALOT
  rationale: The Piel commonly means to destroy or ruin. In context of wealth, the
    effect is ruinous loss; 'destroys' preserves the stronger verbal force, while
    English naturally understands the object as one's wealth.
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - substance
  - property
  lexicon: HALOT
  rationale: The noun denotes wealth or possessions. 'Wealth' is concise, natural,
    and fits the proverbial contrast.
