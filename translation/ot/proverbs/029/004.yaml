id: PRO.29.4
reference: Proverbs 29:4
source:
  edition: WLC
  text: מֶ֗לֶךְ בְּ֭/מִשְׁפָּט יַעֲמִ֣יד אָ֑רֶץ וְ/אִ֖ישׁ תְּרוּמ֣וֹת יֶֽהֶרְסֶֽ/נָּה׃
translation:
  text: By justice a king establishes a land, but a man of bribes tears it down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a man of contributions/gifts'; the Hebrew term can denote offerings
      or levies, but in this context it likely refers to corrupt payments, hence 'bribes.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man,' used here in a representative or generic sense.
    reason: cultural_note
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Indefinite/generic sense fits proverbial style: the saying describes
    what characterizes kingship generally, not a specific king.'
- source_word: בְּמִשְׁפָּט
  chosen: by justice
  alternatives:
  - by justice/judgment
  - with justice
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, judgment, or legal order. 'By justice'
    is concise and idiomatic in English, capturing rule exercised according to just
    judgment.
- source_word: יַעֲמִיד
  chosen: establishes
  alternatives:
  - makes stand
  - upholds
  - sets up
  lexicon: HALOT
  rationale: Hiphil of עמד here conveys causing stability or firmness. 'Establishes'
    best expresses the causative sense in governance context.
- source_word: אָרֶץ
  chosen: a land
  alternatives:
  - the land
  - a country
  - the earth
  lexicon: HALOT
  rationale: In wisdom literature this commonly refers to a realm or country under
    rule rather than the whole earth. 'A land' preserves the generic proverbial force.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - one
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in a representative
    sense. Per translation philosophy, gender-accurate wording is retained.
- source_word: תְּרוּמוֹת
  chosen: of bribes
  alternatives:
  - of gifts
  - of contributions
  - of exactions
  lexicon: HALOT
  rationale: Though תְּרוּמָה often means contribution/offering, in this proverb the
    plural in parallel with corrupt rule points to illicit gifts or bribes. 'A man
    of bribes' is a compact way to express a ruler characterized by taking such payments.
- source_word: יֶהֶרְסֶנָּה
  chosen: tears it down
  alternatives:
  - overthrows it
  - ruins it
  - destroys it
  lexicon: HALOT
  rationale: The verb הרס means tear down/demolish. The feminine suffix refers back
    to אֶרֶץ. 'Tears it down' preserves the concrete destructive imagery while sounding
    natural in English.
