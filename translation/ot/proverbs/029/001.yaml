id: PRO.29.1
reference: Proverbs 29:1
source:
  edition: WLC
  text: אִ֣ישׁ תּ֭וֹכָחוֹת מַקְשֶׁה עֹ֑רֶף פֶּ֥תַע יִ֝שָּׁבֵ֗ר וְ/אֵ֣ין מַרְפֵּֽא־׃
translation:
  text: A man often reproved, yet stiffening his neck, will suddenly be broken beyond
    healing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A man of many reproofs, hardening his neck, will suddenly be broken,
      and there will be no remedy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - one
  lexicon: HALOT
  rationale: The Hebrew noun is singular masculine and here introduces a representative
    individual in a wisdom saying. Per the project's gender-accurate policy, 'a man'
    best matches the source form and proverbial style, while still functioning generically.
- source_word: תּוֹכָחוֹת
  chosen: often reproved
  alternatives:
  - of reproofs
  - reproofs
  - corrections
  lexicon: HALOT
  rationale: The plural noun denotes repeated instances of rebuke/reproof. In English,
    a literal 'a man of reproofs' is awkward; 'often reproved' captures the idiomatic
    force of one who has received many rebukes.
- source_word: מַקְשֶׁה עֹרֶף
  chosen: yet stiffening his neck
  alternatives:
  - hardening his neck
  - being stiff-necked
  - stubbornly resisting
  lexicon: HALOT
  rationale: The Hiphil participle of קשׁה with 'neck' forms a Hebrew idiom for obstinate
    resistance. 'Stiffening his neck' preserves the bodily metaphor more transparently
    than the adjectival 'stiff-necked,' while remaining natural English. 'Yet' brings
    out the concessive sense implied by the juxtaposition with repeated reproof.
- source_word: פֶּתַע
  chosen: suddenly
  alternatives:
  - in an instant
  - all at once
  lexicon: HALOT
  rationale: The adverb marks abruptness of the coming judgment or collapse. 'Suddenly'
    is the standard concise rendering.
- source_word: יִשָּׁבֵר
  chosen: will be broken
  alternatives:
  - will be shattered
  - will be destroyed
  lexicon: HALOT
  rationale: The Niphal of שׁבר is passive/reflexive, 'be broken.' 'Will be broken'
    preserves the metaphor and avoids overinterpreting whether the breaking is physical,
    social, or moral.
- source_word: וְאֵין מַרְפֵּא
  chosen: beyond healing
  alternatives:
  - and there is no remedy
  - with no healing
  - and without cure
  lexicon: HALOT
  rationale: The phrase literally means 'and there is no healing/remedy.' 'Beyond
    healing' is idiomatic modern English that preserves the finality of the Hebrew
    while reading smoothly after 'will be broken.'
