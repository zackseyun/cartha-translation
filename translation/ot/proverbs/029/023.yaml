id: PRO.29.23
reference: Proverbs 29:23
source:
  edition: WLC
  text: גַּאֲוַ֣ת אָ֭דָם תַּשְׁפִּילֶ֑/נּוּ וּ/שְׁפַל ר֝֗וּחַ יִתְמֹ֥ךְ כָּבֽוֹד־׃
translation:
  text: A man's pride will bring him low, but one who is lowly in spirit will obtain
    honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will hold fast to honor' or 'will attain honor.' The Hebrew verb can
      carry the sense of grasping, holding, or obtaining.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּאֲוַת
  chosen: pride
  alternatives:
  - haughtiness
  - arrogance
  lexicon: HALOT
  rationale: The noun denotes exalted self-regard or arrogance. 'Pride' is the most
    natural English equivalent in a wisdom context and fits the antithesis with humility/lowliness.
- source_word: אָדָם
  chosen: a man's
  alternatives:
  - a person's
  - humankind's
  lexicon: HALOT
  rationale: Here the singular noun refers to a representative individual rather than
    humanity collectively. Per the gender-accurate philosophy, 'a man's' preserves
    the singular generic force better than a pluralized or abstract rendering.
- source_word: תַּשְׁפִּילֶנּוּ
  chosen: will bring him low
  alternatives:
  - will humble him
  - will abase him
  lexicon: HALOT
  rationale: The Hiphil of שׁפל means to make low, humble, or abase. 'Will bring him
    low' preserves the causative sense and echoes the proverb's contrast with honor.
- source_word: וּשְׁפַל רוּחַ
  chosen: but one who is lowly in spirit
  alternatives:
  - but the lowly in spirit
  - but a humble person
  lexicon: HALOT
  rationale: The phrase literally means 'and lowly of spirit.' 'Lowly in spirit' is
    a clear, idiomatic rendering that preserves the metaphor of inward disposition
    without over-paraphrasing to merely 'humble person.'
- source_word: יִתְמֹךְ
  chosen: will obtain
  alternatives:
  - will grasp
  - will hold fast to
  - will attain
  lexicon: HALOT
  rationale: The verb תמך commonly means support, hold, grasp, or sustain. In this
    construction with 'honor' as object, the sense is best conveyed as coming into
    possession of or receiving honor. 'Will obtain' communicates the result naturally
    in English while respecting the Hebrew idiom.
- source_word: כָּבוֹד
  chosen: honor
  alternatives:
  - glory
  - esteem
  lexicon: HALOT
  rationale: In Proverbs, כבוד often refers to social honor or esteem rather than
    overtly theological 'glory.' 'Honor' best fits the wisdom setting and the contrast
    with being brought low.
