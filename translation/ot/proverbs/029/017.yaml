id: PRO.29.17
reference: Proverbs 29:17
source:
  edition: WLC
  text: יַסֵּ֣ר בִּ֭נְ/ךָ וִֽ/ינִיחֶ֑/ךָ וְ/יִתֵּ֖ן מַעֲדַנִּ֣ים לְ/נַפְשֶֽׁ/ךָ׃פ
translation:
  text: Discipline your son, and he will give you rest; he will give delights to your
    soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pleasant things' or 'joys' for 'delights.' The Hebrew term can denote
      things that are pleasing or delightful.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to your soul'; the phrase can also mean 'to your life' or 'to your
      inner self.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסֵּר
  chosen: Discipline
  alternatives:
  - Correct
  - Chasten
  - Train through correction
  lexicon: HALOT
  rationale: The piel imperative of יסר calls for active corrective instruction or
    chastening. 'Discipline' best captures both correction and formative training
    in clear modern English without sounding archaic like 'chasten.'
- source_word: בִּנְךָ
  chosen: your son
  alternatives:
  - your child
  lexicon: HALOT
  rationale: The Hebrew is specifically 'your son,' singular masculine, not a gender-neutral
    term. Per the translation philosophy, the gendered form is retained rather than
    generalized to 'child.'
- source_word: וִינִיחֶךָ
  chosen: he will give you rest
  alternatives:
  - he will ease you
  - he will bring you relief
  lexicon: HALOT
  rationale: 'From נוח in the hiphil, the sense is causative: the son, once disciplined,
    will cause the parent to rest or be at ease. ''Give you rest'' is idiomatic English
    and preserves the causative nuance better than the less specific ''comfort you.'''
- source_word: וְיִתֵּן
  chosen: he will give
  alternatives:
  - and he will bring
  - and he will provide
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' Retaining 'give' keeps the parallelism
    with the previous clause and avoids over-interpretation.
- source_word: מַעֲדַנִּים
  chosen: delights
  alternatives:
  - pleasant things
  - delicacies
  - joys
  lexicon: HALOT
  rationale: The noun denotes delights or pleasant things. 'Delights' is concise,
    natural, and fits the poetic parallelism. 'Delicacies' would sound overly concrete
    in English, while 'joys' is more interpretive.
- source_word: לְנַפְשֶׁךָ
  chosen: to your soul
  alternatives:
  - to your life
  - to your inner self
  lexicon: HALOT
  rationale: נפש often refers to the self, life, or inner being. In wisdom literature,
    'soul' remains understandable and preserves the anthropological depth of the Hebrew.
    The phrase communicates inward satisfaction, not merely physical benefit.
