id: PRO.29.5
reference: Proverbs 29:5
source:
  edition: WLC
  text: גֶּ֭בֶר מַחֲלִ֣יק עַל רֵעֵ֑/הוּ רֶ֝֗שֶׁת פּוֹרֵ֥שׂ עַל פְּעָמָֽי/ו־־׃
translation:
  text: A man who flatters his neighbor spreads a net for his steps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friend.' The Hebrew רֵעַ can denote a neighbor, friend, or companion.
    reason: lexical_alternative
  - marker: b
    text: Literally 'for his steps' or 'for his feet,' an image of setting a trap
      in someone's path.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּבֶר
  chosen: A man
  alternatives:
  - A person
  - Whoever
  lexicon: HALOT
  rationale: The noun is grammatically masculine singular and commonly denotes a man/male
    person. In proverbial style it can have representative force, but per the translation
    philosophy, gender-accurate rendering is preferred over neutralizing. 'A man'
    preserves both the form and the generic proverbial sense.
- source_word: מַחֲלִיק
  chosen: who flatters
  alternatives:
  - who speaks smoothly to
  - who smooth-talks
  lexicon: HALOT
  rationale: From חלק in the Hiphil participial form, here idiomatically referring
    to making speech smooth, i.e., flattering. 'Flatters' is the most natural concise
    English equivalent and fits the ethical warning of the proverb better than a more
    wooden 'speaks smoothly.'
- source_word: עַל רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - against his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In wisdom literature it
    often denotes a social peer/fellow person. 'Neighbor' preserves the broader ethical
    sense better than 'friend.' The preposition עַל with חלק can idiomatically mean
    flattering someone ('about/over/toward'), so English omits a literal preposition
    and renders the sense directly.
- source_word: רֶשֶׁת
  chosen: a net
  alternatives:
  - a snare
  lexicon: HALOT
  rationale: The noun denotes a net used for trapping. 'Net' is the primary concrete
    image; 'snare' is possible but slightly more interpretive.
- source_word: פּוֹרֵשׂ
  chosen: spreads
  alternatives:
  - lays out
  - stretches out
  lexicon: HALOT
  rationale: The participle from פרש means to spread out. 'Spreads' is idiomatic with
    'net' in English and preserves the metaphor clearly.
- source_word: עַל פְּעָמָיו
  chosen: for his steps
  alternatives:
  - before his feet
  - for his feet
  - in his path
  lexicon: HALOT
  rationale: פְּעָמִים literally means steps/footsteps. With עַל in this trapping
    context, the sense is that the net is spread so as to catch his steps. 'For his
    steps' is a natural English rendering that stays close to the Hebrew image without
    over-paraphrasing to 'in his path.' The suffix most naturally refers back to the
    neighbor being flattered, not the flatterer.
