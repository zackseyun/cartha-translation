theological_decisions:
- issue: Meaning of חָזוֹן in relation to divine revelation
  chosen_reading: '''vision'' refers to revelatory/prophetic vision from God, not
    merely human ambition or strategic planning.'
  alternative_readings:
  - '''vision'' as general social direction or leadership agenda'
  rationale: In biblical Hebrew, חָזוֹן ordinarily denotes revelation received by
    prophets or seers. The proverb therefore concerns the absence of divine revelation
    and its social effects, not a generic principle about organizational goal-setting.
    The main text keeps 'vision' for readability and tradition, while a footnote clarifies
    the revelatory sense.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of masculine singular אַשְׁרֵהוּ
  chosen_reading: Retain gender-accurate singular with 'happy is he.'
  alternative_readings:
  - happy is the one
  - blessed are those who
  rationale: The Hebrew is singular masculine with representative force. Per the doctrine's
    gender-accurate principle, the translation preserves the singular masculine rather
    than neutralizing it in the main text.
  doctrine_reference: Translation philosophy §4
