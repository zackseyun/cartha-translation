id: PRO.29.18
reference: Proverbs 29:18
source:
  edition: WLC
  text: בְּ/אֵ֣ין חָ֭זוֹן יִפָּ֣רַֽע עָ֑ם וְ/שֹׁמֵ֖ר תּוֹרָ֣ה אַשְׁרֵֽ/הוּ׃
translation:
  text: Where there is no vision, a people cast off restraint; but the one who keeps
    the law—happy is he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revelation' or 'prophetic vision.' The Hebrew refers to divine revelation,
      not merely human plans or ambition.
    reason: lexical_alternative
  - marker: b
    text: Or 'runs wild' / 'is unrestrained.'
    reason: lexical_alternative
  - marker: c
    text: Or 'instruction.'
    reason: lexical_alternative
  - marker: d
    text: Or 'blessed is he.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵין
  chosen: Where there is no
  alternatives:
  - In the absence of
  - Without
  lexicon: HALOT
  rationale: The preposition ב with אֵין forms a circumstantial expression meaning
    'where/when there is no' or 'in the absence of.' 'Where there is no' is idiomatic
    English and fits the proverb's general condition-consequence structure.
- source_word: חָזוֹן
  chosen: vision
  alternatives:
  - revelation
  - prophetic vision
  lexicon: HALOT
  rationale: חָזוֹן commonly denotes revelatory or prophetic vision, not mere human
    planning. 'Vision' preserves the familiar wording while remaining broad enough;
    the more explicit sense is preserved in a footnote so readers do not mistake it
    for modern motivational 'vision.'
- source_word: יִפָּרַע
  chosen: cast off restraint
  alternatives:
  - runs wild
  - is let loose
  - becomes ungoverned
  lexicon: HALOT
  rationale: From פרע in the Niphal, the sense is to let oneself go, be unrestrained,
    or be left unchecked. 'Cast off restraint' best captures the reflexive/social
    sense and is a well-established English equivalent. 'Perish' is not supported
    here.
- source_word: עָם
  chosen: a people
  alternatives:
  - the people
  - people
  lexicon: HALOT
  rationale: עָם is singular collective. 'A people' preserves the collective-singular
    force and keeps the proverb generic rather than limiting it to a specific nation
    in the main text.
- source_word: וְשֹׁמֵר
  chosen: but the one who keeps
  alternatives:
  - and whoever keeps
  - but whoever guards/observes
  lexicon: HALOT
  rationale: The participle marks a characteristic person. 'The one who keeps' is
    natural English and preserves the singular individual contrast with the collective
    first colon. The conjunction is rendered adversatively ('but') because the proverb
    contrasts two outcomes.
- source_word: תּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly, but in wisdom literature it often
    carries covenantal and moral weight. 'The law' preserves that weight and matches
    the likely sense here, while 'instruction' is preserved as an alternative in a
    footnote.
- source_word: אַשְׁרֵהוּ
  chosen: happy is he
  alternatives:
  - blessed is he
  - how happy he is
  lexicon: HALOT
  rationale: From אשר in the beatitude sense ('happy/blessed'). 'Happy is he' preserves
    the singular masculine form and proverbial beatitude style. 'Blessed' is possible,
    but 'happy' better reflects the wisdom-register idiom without importing extra
    liturgical overtones.
