theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Generic masculine אִישׁ
  chosen_reading: a man's
  alternative_readings:
  - a person's
  - of a man
  rationale: The Hebrew uses a grammatically masculine singular with representative
    force. Per translation philosophy, the rendering remains gender-accurate rather
    than neutralized, while a footnote can clarify the generic sense if needed.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
