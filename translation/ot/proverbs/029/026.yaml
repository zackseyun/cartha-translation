id: PRO.29.26
reference: Proverbs 29:26
source:
  edition: WLC
  text: רַ֭בִּים מְבַקְשִׁ֣ים פְּנֵי מוֹשֵׁ֑ל וּ֝/מֵ/יְהוָ֗ה מִשְׁפַּט אִֽישׁ־־׃
translation:
  text: Many seek the face of a ruler, but from Yahweh comes justice for a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many seek the favor of a ruler.' Literally, 'the face of a ruler.'
    reason: lexical_alternative
  - marker: b
    text: '''A man''s'' is a generic singular in Hebrew, referring to any person in general.'
    reason: cultural_note
  - marker: c
    text: Or 'judgment' or 'legal decision.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבִּים
  chosen: Many
  alternatives:
  - Many people
  - Many men
  lexicon: HALOT
  rationale: Quantifier meaning 'many' or 'numerous.' Simple English 'Many' preserves the proverb's concise style.
- source_word: מְבַקְשִׁים
  chosen: seek
  alternatives:
  - are seeking
  - look for
  lexicon: HALOT
  rationale: From בקשׁ, 'to seek.' Present-tense English proverb style fits the Hebrew participle used generically.
- source_word: פְּנֵי
  chosen: the face of
  alternatives:
  - the favor of
  - the presence of
  lexicon: HALOT
  rationale: Literally 'face of.' In context it idiomatically refers to seeking access to or favor from a ruler. The main text keeps the Hebrew image; an idiomatic alternative is preserved in a footnote.
- source_word: מוֹשֵׁל
  chosen: a ruler
  alternatives:
  - one who rules
  - a governor
  lexicon: HALOT
  rationale: Participle/noun from משל meaning one who rules. 'Ruler' is natural and broad enough for the proverb's general statement.
- source_word: וּמֵיְהוָה
  chosen: but from the LORD
  alternatives:
  - and from the LORD
  - yet from the LORD
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the contrastive second colon. English 'but' best conveys the proverb's adversative sense. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מִשְׁפַּט
  chosen: justice
  alternatives:
  - judgment
  - legal decision
  - vindication
  lexicon: HALOT
  rationale: In this context the sense is the just decision or justice a person ultimately receives. 'Justice' is clear modern English and captures the proverb's point that true adjudication comes from the LORD.
- source_word: אִישׁ
  chosen: a man's
  alternatives:
  - a person's
  - of a man
  lexicon: HALOT
  rationale: Hebrew singular masculine generic. Per doctrine, gender-accurate rendering is preferred where representative force is present. 'A man's justice' preserves the form and proverbial generality.
