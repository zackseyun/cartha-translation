theological_decisions:
- issue: Force of לָעַד in wisdom literature
  chosen_reading: Rendered as 'forever' as a conventional expression of enduring royal
    stability, without importing an absolute metaphysical guarantee.
  alternative_readings:
  - Rendered more weakly as 'for a long time'
  rationale: In Proverbs, such language often expresses durable, divinely favored
    stability rather than a technical claim of endless duration in every instance.
    'Forever' best matches the Hebrew while allowing the proverb's genre to supply
    the nuance.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
