id: PRO.29.14
reference: Proverbs 29:14
source:
  edition: WLC
  text: מֶ֤לֶךְ שׁוֹפֵ֣ט בֶּֽ/אֱמֶ֣ת דַּלִּ֑ים כִּ֝סְא֗/וֹ לָ/עַ֥ד יִכּֽוֹן׃
translation:
  text: A king who judges the poor with truth—his throne will be established forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judges the poor faithfully,' or 'judges the poor justly.' The Hebrew
      phrase 'with truth' can carry the sense of truthfulness, faithfulness, or justice
      in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  chosen: A king
  alternatives:
  - The king
  - A ruler
  lexicon: HALOT
  rationale: Rendered as the indefinite/generic 'A king' because the proverb states
    a general principle rather than referring to a specific monarch. 'King' preserves
    the concrete royal setting better than the broader 'ruler'.
- source_word: שׁוֹפֵט
  chosen: who judges
  alternatives:
  - judging
  - who governs
  lexicon: HALOT
  rationale: The participle functions attributively with מֶלֶךְ, describing the kind
    of king in view. 'Who judges' is natural English and preserves the judicial sense
    more precisely than the broader 'governs'.
- source_word: בֶּאֱמֶת
  chosen: with truth
  alternatives:
  - faithfully
  - justly
  - in truth
  lexicon: HALOT
  rationale: אֱמֶת commonly denotes truth, faithfulness, or reliability. 'With truth'
    keeps the lexical connection to 'truth' while still reading naturally in English.
    'Justly' captures an implication but narrows the term; 'faithfully' is possible
    but less direct in a judicial context.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the needy
  lexicon: HALOT
  rationale: דַּל refers to those who are lowly, poor, or weak. 'The poor' is the
    most standard and contextually fitting rendering in a proverb about royal justice,
    while 'weak' and 'needy' remain plausible nuances.
- source_word: כִּסְאוֹ
  chosen: his throne
  alternatives:
  - his seat of rule
  - his royal throne
  lexicon: HALOT
  rationale: The noun refers concretely to the throne and metonymically to royal rule.
    'His throne' preserves the Hebrew image and the political-theological force of
    stable kingship.
- source_word: לָעַד
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - enduringly
  lexicon: HALOT
  rationale: The phrase denotes lasting duration. 'Forever' is idiomatic modern English
    and suits proverbial hyperbolic permanence or enduring stability.
- source_word: יִכּוֹן
  chosen: will be established
  alternatives:
  - will stand firm
  - will be secure
  lexicon: HALOT
  rationale: From כון in the Niphal, the sense is to be established, fixed, or made
    secure. 'Will be established' preserves the passive/resultative nuance and fits
    the throne imagery well.
