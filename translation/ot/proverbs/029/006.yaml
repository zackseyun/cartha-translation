id: PRO.29.6
reference: Proverbs 29:6
source:
  edition: WLC
  text: בְּ/פֶ֤שַֽׁע אִ֣ישׁ רָ֣ע מוֹקֵ֑שׁ וְ֝/צַדִּ֗יק יָר֥וּן וְ/שָׂמֵֽחַ׃
translation:
  text: In the transgression of an evil man there is a snare, but the righteous sings
    out and rejoices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the transgression of an evil man, there is a snare'; the Hebrew can
      be taken to emphasize either that the snare lies within his transgression or
      that his transgression brings it about.
    reason: alternative_reading
  - marker: b
    text: Or 'shouts for joy and is glad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפֶשַׁע
  chosen: In the transgression
  alternatives:
  - By transgression
  - In transgression
  lexicon: HALOT
  rationale: The preposition ב plus פשע is rendered locatively/instrumentally. 'In
    the transgression' preserves the Hebrew compactness and the proverb's sense that
    the snare is bound up with the evil man's wrongdoing itself.
- source_word: אִישׁ רָע
  chosen: an evil man
  alternatives:
  - a wicked man
  - an evil person
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the masculine singular Hebrew. 'Evil'
    is chosen over 'wicked' for readable modern English while retaining moral force.
- source_word: מוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a trap
  lexicon: HALOT
  rationale: '''Snare'' is the standard wisdom-literature image and fits the terse
    proverbial style. It can imply either the trap itself or entanglement resulting
    from sin.'
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the righteous person
  lexicon: HALOT
  rationale: Substantival adjective rendered as a representative class term. 'The
    righteous' is idiomatic in English wisdom literature and preserves the contrast
    with the evil man.
- source_word: יָרוּן
  chosen: sings out
  alternatives:
  - shouts for joy
  - cries aloud
  - rejoices
  lexicon: HALOT
  rationale: The verb likely denotes a ringing cry of joy rather than mere internal
    gladness. 'Sings out' captures the vocal, exuberant sense and pairs naturally
    with the following participle.
- source_word: וְשָׂמֵחַ
  chosen: and rejoices
  alternatives:
  - and is glad
  - and is joyful
  lexicon: HALOT
  rationale: The participle adds a second expression of joy. 'Rejoices' is natural
    English and preserves the parallelism without flattening it into a single idea.
