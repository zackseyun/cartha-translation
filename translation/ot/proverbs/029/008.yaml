id: PRO.29.8
reference: Proverbs 29:8
source:
  edition: WLC
  text: אַנְשֵׁ֣י לָ֭צוֹן יָפִ֣יחוּ קִרְיָ֑ה וַ֝/חֲכָמִ֗ים יָשִׁ֥יבוּ אָֽף׃
translation:
  text: Mockers inflame a city, but wise men turn away anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mockers set a city ablaze'; the Hebrew verb is metaphorical and can
      evoke kindling or stirring up civic turmoil.
    reason: lexical_alternative
  - marker: b
    text: Or 'the wise' instead of 'wise men'; the Hebrew is masculine plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי לָצוֹן
  chosen: Mockers
  alternatives:
  - men of scoffing
  - scornful men
  - scoffers
  lexicon: HALOT
  rationale: The construct phrase literally means 'men of scoffing/mockery.' English
    compresses this naturally to 'mockers' or 'scoffers.' 'Mockers' is concise, idiomatic,
    and preserves the character type in Proverbs without unnecessary literalism.
- source_word: יָפִיחוּ
  chosen: inflame
  alternatives:
  - set ablaze
  - blow up
  - stir up
  lexicon: HALOT
  rationale: The Hiphil of פוח here is metaphorical, conveying causing something to
    flare up or be kindled. 'Inflame' captures the figurative sense of provoking civic
    unrest better than a wooden 'blow' and is more natural in English than 'set ablaze'
    in this context.
- source_word: קִרְיָה
  chosen: a city
  alternatives:
  - a town
  lexicon: HALOT
  rationale: קִרְיָה denotes a city/town. 'City' is the standard and weightier English
    equivalent in wisdom literature, fitting the social scale implied by public disorder.
- source_word: חֲכָמִים
  chosen: wise men
  alternatives:
  - the wise
  - wise people
  lexicon: HALOT
  rationale: The Hebrew masculine plural is generic but explicitly masculine in form.
    Per the project's gender-accurate policy, 'wise men' best matches the source form
    while remaining natural. 'The wise' is possible but less parallel to 'mockers'
    as a personal subject.
- source_word: יָשִׁיבוּ
  chosen: turn away
  alternatives:
  - cause to turn back
  - avert
  - calm
  lexicon: HALOT
  rationale: The Hiphil of שוב commonly means 'turn back/restore.' With אָף as its
    object, the sense is to turn back or avert anger. 'Turn away' preserves the verbal
    imagery and remains idiomatic.
- source_word: אָף
  chosen: anger
  alternatives:
  - wrath
  - rage
  lexicon: HALOT
  rationale: Though literally 'nose,' אָף commonly means anger/wrath. 'Anger' is the
    clearest modern English rendering here; 'wrath' sounds more elevated than the
    proverb requires.
