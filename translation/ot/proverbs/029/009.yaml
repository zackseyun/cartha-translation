id: PRO.29.9
reference: Proverbs 29:9
source:
  edition: WLC
  text: אִֽישׁ חָכָ֗ם נִ֭שְׁפָּט אֶת אִ֣ישׁ אֱוִ֑יל וְ/רָגַ֥ז וְ֝/שָׂחַ֗ק וְ/אֵ֣ין
    נָֽחַת־־׃
translation:
  text: If a wise man has a dispute with a foolish man, whether he rages or laughs,
    there is no rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If a wise man contends with a fool, the fool may rage or laugh, but
      there is no rest.' The Hebrew does not explicitly identify whether the one raging/laughing
      is the wise man or the fool; context favors the fool for many interpreters.
    reason: alternative_reading
  - marker: b
    text: '''Laughs'' may carry the sense of derisive laughter or scoffing in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ חָכָם
  chosen: a wise man
  alternatives:
  - a wise person
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the masculine singular איש with adjective
    חכם. In Proverbs this singular often has representative force, but the source
    is explicitly masculine; 'man' best matches the form and idiom.
- source_word: נִשְׁפָּט
  chosen: has a dispute
  alternatives:
  - contends
  - goes to court
  - judges
  lexicon: HALOT
  rationale: The Niphal of שפט here most naturally conveys entering into litigation
    or contention with someone, not acting as judge over him. 'Has a dispute' is idiomatic
    modern English and preserves the adversarial sense without over-specifying a courtroom
    setting.
- source_word: אֶת אִישׁ אֱוִיל
  chosen: with a foolish man
  alternatives:
  - against a fool
  - with a fool
  lexicon: HALOT
  rationale: The object marker plus איש אֱוִיל identifies the counterpart in the dispute.
    'Foolish man' preserves the parallel with 'wise man'; 'with' fits English after
    'has a dispute.'
- source_word: וְרָגַז
  chosen: he rages
  alternatives:
  - he is angry
  - he storms
  lexicon: HALOT
  rationale: רגז denotes agitation, anger, or raging. The subject is ambiguous in
    Hebrew; the clause is rendered generically as 'he rages' to preserve that ambiguity
    rather than assigning it explicitly to the wise man or the fool.
- source_word: וְשָׂחַק
  chosen: or laughs
  alternatives:
  - or mocks
  - or scoffs
  lexicon: HALOT
  rationale: שׂחק commonly means 'laugh.' In context it may imply derisive laughter,
    but the base sense should be retained in the main text; mocking nuance can be
    preserved as an alternative.
- source_word: וְאֵין נָחַת
  chosen: there is no rest
  alternatives:
  - there is no peace
  - there is no quiet
  - there is no settling
  lexicon: HALOT
  rationale: נחת denotes quietness, rest, or calm. 'There is no rest' is concise and
    natural, expressing the lack of resolution or calm that results from such an encounter.
