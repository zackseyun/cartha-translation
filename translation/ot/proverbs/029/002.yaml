id: PRO.29.2
reference: Proverbs 29:2
source:
  edition: WLC
  text: בִּ/רְב֣וֹת צַ֭דִּיקִים יִשְׂמַ֣ח הָ/עָ֑ם וּ/בִ/מְשֹׁ֥ל רָ֝שָׁ֗ע יֵאָ֥נַֽח
    עָֽם׃
translation:
  text: When the righteous increase, the people rejoice; but when a wicked man rules,
    the people groan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When the righteous are many, the people rejoice.' The Hebrew infinitive
      construction can emphasize either increase or multiplicity.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְבוֹת
  chosen: when ... increase
  alternatives:
  - in the multiplying of
  - when there are many
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive construct of רבה functions temporally
    here: ''when increasing'' or ''when they increase.'' ''When ... increase'' gives
    clear English while preserving the temporal sense better than a more wooden ''in
    the multiplying of.'''
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - just men
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is concise, natural,
    and preserves the class/category sense without over-specifying gender.
- source_word: יִשְׂמַח
  chosen: rejoice
  alternatives:
  - is glad
  - celebrates
  lexicon: HALOT
  rationale: The verb שמח denotes joy/gladness. 'Rejoice' fits the proverbial register
    and pairs well antithetically with 'groan' in the second colon.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the populace collectively. 'The people' is the most
    natural and contextually appropriate rendering.
- source_word: וּבִמְשֹׁל
  chosen: but when ... rules
  alternatives:
  - and when ... rules
  - in the ruling of
  lexicon: HALOT
  rationale: The conjunction plus ב with infinitive construct of משל again gives a
    temporal clause. In English, 'but when' best conveys the antithetical parallelism
    between the two cola, even though the Hebrew conjunction is formally 'and.'
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a wicked person
  lexicon: HALOT
  rationale: Singular adjective used substantivally, contrasted with plural 'the righteous.'
    Because the verb 'rules' points to an individual ruler, 'a wicked man' makes the
    singular personal reference explicit. 'Man' is retained as gender-accurate because
    the proverb speaks of a ruler in masculine singular form.
- source_word: יֵאָנַח
  chosen: groan
  alternatives:
  - sigh
  - lament
  lexicon: HALOT
  rationale: The Niphal of אנח conveys groaning or sighing in distress. 'Groan' is
    stronger and better matches the social suffering implied by wicked rule.
- source_word: עָם
  chosen: the people
  alternatives:
  - people
  - the populace
  lexicon: HALOT
  rationale: Though anarthrous in the second colon, English idiom favors repeating
    'the people' for the same collective group as in the first colon, and this preserves
    the balanced parallelism.
