id: PRO.29.12
reference: Proverbs 29:12
source:
  edition: WLC
  text: מֹ֭שֵׁל מַקְשִׁ֣יב עַל דְּבַר שָׁ֑קֶר כָּֽל מְשָׁרְתָ֥י/ו רְשָׁעִֽים־־־׃
translation:
  text: If a ruler listens to a lying word, all his servants become wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If a ruler pays attention to falsehood, all his attendants are wicked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹשֵׁל
  chosen: ruler
  alternatives:
  - one who rules
  - governor
  lexicon: HALOT
  rationale: The participial noun denotes one exercising authority. 'Ruler' is natural
    modern English and broad enough for the proverb's general application, without
    narrowing it to a specific office.
- source_word: מַקְשִׁיב
  chosen: listens
  alternatives:
  - pays attention
  - gives heed
  lexicon: HALOT
  rationale: The Hiphil participle of קשׁב conveys attentive listening. 'Listens'
    is concise and idiomatic; in context it implies receptive attention, not mere
    hearing.
- source_word: עַל
  chosen: to
  alternatives:
  - to a report of
  - unto
  lexicon: HALOT
  rationale: With קשׁב, the preposition marks the object attended to. English idiom
    prefers 'listen to' rather than a more literal retention of 'upon/to'.
- source_word: דְּבַר שָׁקֶר
  chosen: a lying word
  alternatives:
  - falsehood
  - a false report
  - lies
  lexicon: HALOT
  rationale: Literally 'a word of falsehood/lie.' 'A lying word' preserves the singular
    and the concrete Hebrew expression while remaining understandable. 'False report'
    is possible, but the Hebrew is broader than a formal report.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The quantifier is comprehensive. 'All' fits the collective sense with
    the following plural noun.
- source_word: מְשָׁרְתָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his ministers
  - those who serve him
  lexicon: HALOT
  rationale: The noun refers to those serving the ruler. 'Servants' is the most direct
    rendering and suits the court/governmental setting without implying modern cabinet
    'ministers' too strongly.
- source_word: רְשָׁעִים
  chosen: wicked
  alternatives:
  - evil
  - corrupt
  lexicon: HALOT
  rationale: The adjective denotes moral wickedness. 'Wicked' preserves the ethical
    force of the Hebrew better than the more administrative 'corrupt,' though corruption
    is an implication in context.
- source_word: clause relation (implied by Hebrew verbless/resultative structure)
  chosen: become
  alternatives:
  - are
  - will be
  rationale: 'The Hebrew second colon is verbless: ''all his servants wicked.'' English
    normally requires a copular or resultative verb. ''Become'' brings out the proverb''s
    causal/resultative sense: a ruler''s receptivity to lies shapes the character
    of his servants.'
