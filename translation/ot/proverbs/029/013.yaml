theological_decisions:
- issue: Meaning of the proverb's second colon
  chosen_reading: The LORD is the one who gives life/light/sight equally to both the poor and the oppressor.
  alternative_readings:
  - The LORD enlightens both morally or spiritually.
  - The LORD simply observes both alike.
  rationale: The Hebrew explicitly says the LORD 'gives light to the eyes of both of them.' In Hebrew idiom this can denote giving sight, life, or enlivening awareness. The translation preserves the image without over-resolving whether the emphasis is physical life, providential sustenance, or moral illumination.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
