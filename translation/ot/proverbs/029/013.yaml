id: PRO.29.13
reference: Proverbs 29:13
source:
  edition: WLC
  text: רָ֤שׁ וְ/אִ֣ישׁ תְּכָכִ֣ים נִפְגָּ֑שׁוּ מֵ֤אִיר עֵינֵ֖י שְׁנֵי/הֶ֣ם יְהוָֽה־׃
translation:
  text: A poor man and an oppressor meet together; Yahweh gives light to the eyes of both of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a man of oppressions'; the Hebrew expression may refer to an exploitative or oppressive person, and has also been understood as 'a deceitful man' or 'a usurer.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'gives light to the eyes' can mean gives sight, gives life, or sustains and enlightens.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשׁ
  chosen: poor man
  alternatives:
  - poor person
  - the poor
  lexicon: HALOT
  rationale: The noun denotes a poor or needy person. Because the Hebrew is singular masculine and paired with אִישׁ, 'poor man' preserves the gendered, proverbial parallelism better than a neutral plural.
- source_word: אִישׁ תְּכָכִים
  chosen: an oppressor
  alternatives:
  - a man of oppressions
  - a deceitful man
  - a usurer
  lexicon: HALOT
  rationale: The phrase is difficult, but in context and common usage תְּכָכִים refers to oppressive exactions or exploitative dealings. 'An oppressor' gives the likely sense in idiomatic English while avoiding an overly literal but opaque 'man of oppressions.'
- source_word: נִפְגָּשׁוּ
  chosen: meet together
  alternatives:
  - meet
  - have this in common
  - encounter one another
  lexicon: HALOT
  rationale: The Niphal of פגשׁ commonly means 'meet' or 'encounter.' In this proverb it likely introduces a shared condition or commonality between social opposites. 'Meet together' preserves the concrete verbal image while allowing the following clause to explain their common ground.
- source_word: מֵאִיר
  chosen: gives light
  alternatives:
  - illumines
  - lights up
  - gives sight
  lexicon: HALOT
  rationale: The Hiphil participle of אור means 'causing to shine/give light.' With 'eyes' as object, the idiom can imply giving life, sight, or sustaining awareness. 'Gives light' is a transparent rendering that preserves the metaphor.
- source_word: עֵינֵי שְׁנֵיהֶם
  chosen: the eyes of both of them
  alternatives:
  - both their eyes
  - the eyes of both
  lexicon: HALOT
  rationale: This is a straightforward construct phrase. The fuller English wording preserves the emphasis that both parties alike depend on the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
