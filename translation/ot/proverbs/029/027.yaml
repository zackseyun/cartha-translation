id: PRO.29.27
reference: Proverbs 29:27
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת צַ֭דִּיקִים אִ֣ישׁ עָ֑וֶל וְ/תוֹעֲבַ֖ת רָשָׁ֣ע יְשַׁר דָּֽרֶךְ־׃פ
translation:
  text: An unjust man is an abomination to the righteous, and one whose way is upright
    is an abomination to the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'detestable to' / 'abhorrent to' for 'an abomination to.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'upright of way,' that is, one whose conduct is upright.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination to
  alternatives:
  - detestable to
  - abhorrent to
  lexicon: HALOT
  rationale: The construct noun denotes something abhorrent or detestable. 'Abomination'
    preserves the strong moral revulsion of the Hebrew and matches common biblical
    usage without paraphrase.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is a natural English
    equivalent and preserves the moral category rather than reducing it to a generic
    social label.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular. In the phrase אִישׁ עָוֶל,
    'man' is retained in keeping with the project's gender-accurate policy, though
    the sense is representative rather than limited to males.
- source_word: עָוֶל
  chosen: unjust
  alternatives:
  - wicked
  - wrongdoing
  - iniquity
  lexicon: HALOT
  rationale: Here עָוֶל functions attributively with אִישׁ, describing a person characterized
    by injustice or wrongdoing. 'Unjust' fits the adjectival force in English better
    than the more abstract 'iniquity'.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked person
  - the guilty
  lexicon: HALOT
  rationale: Singular adjective used substantivally. Because the clause is generic,
    'the wicked' reads idiomatically in English and balances 'the righteous' in the
    first colon.
- source_word: יְשַׁר דָּרֶךְ
  chosen: one whose way is upright
  alternatives:
  - the upright in way
  - an upright man
  - one upright in conduct
  lexicon: HALOT
  rationale: The Hebrew literally combines 'upright' with 'way,' an idiom for moral
    conduct. 'One whose way is upright' preserves the imagery of 'way' while remaining
    readable modern English.
- source_word: דָּרֶךְ
  chosen: way
  alternatives:
  - path
  - conduct
  lexicon: HALOT
  rationale: '''Way'' is the standard wisdom-literature metaphor for manner of life.
    It is retained rather than flattened to ''conduct,'' though the phrase makes the
    ethical sense clear.'
