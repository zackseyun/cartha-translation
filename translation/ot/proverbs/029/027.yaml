theological_decisions:
- issue: Gendered representative language in אִישׁ עָוֶל
  chosen_reading: Rendered generically in sense within the clause as 'An unjust man'
    while preserving masculine form from the Hebrew.
  alternative_readings:
  - An unjust person
  - The unjust
  rationale: The source uses masculine singular representative language. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral smoothing unless context
    demands otherwise. The second colon is rendered with 'one whose way is upright'
    for idiomatic English, but the representative force remains generic.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
