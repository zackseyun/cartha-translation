id: PRO.29.24
reference: Proverbs 29:24
source:
  edition: WLC
  text: חוֹלֵ֣ק עִם גַּ֭נָּב שׂוֹנֵ֣א נַפְשׁ֑/וֹ אָלָ֥ה יִ֝שְׁמַ֗ע וְ/לֹ֣א יַגִּֽיד־׃
translation:
  text: Whoever shares with a thief hates his own life; he hears an oath and does
    not report it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hears a curse' or 'hears an adjuration.' The Hebrew term can refer to
      an oath that invokes a curse, likely in a legal setting where a witness is bound
      to speak.
    reason: lexical_alternative
  - marker: b
    text: That is, one who is complicit with a thief harms himself by refusing to
      disclose what he knows.
    reason: cultural_note
lexical_decisions:
- source_word: חוֹלֵק
  chosen: shares
  alternatives:
  - is a partner with
  - divides with
  - has a share with
  lexicon: HALOT
  rationale: The participle denotes sharing/participating with someone. In context
    with עִם גַּנָּב, it refers to complicity or partnership with a thief. 'Shares
    with' is concise and natural, while preserving the idea of participation in stolen
    gain or criminal enterprise.
- source_word: עִם גַּנָּב
  chosen: with a thief
  alternatives:
  - with the thief
  - in partnership with a thief
  lexicon: HALOT
  rationale: The preposition plus noun marks association. The indefinite 'a thief'
    fits proverbial style in English better than 'the thief' and preserves the generic
    force.
- source_word: שׂוֹנֵא נַפְשׁוֹ
  chosen: hates his own life
  alternatives:
  - hates himself
  - hates his own soul
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul depending on context. Here the proverb
    concerns self-destructive conduct, so 'life' best communicates the practical sense
    without importing a more dualistic 'soul' reading. 'His own' makes the reflexive
    force explicit.
- source_word: אָלָה
  chosen: an oath
  alternatives:
  - a curse
  - an adjuration
  lexicon: HALOT
  rationale: The noun can denote an oath, often one involving a curse or adjuration.
    In this legal setting—hearing a formal charge or oath and failing to testify—'oath'
    is the clearest main-text rendering. The curse/adjuration nuance is worth preserving
    in a footnote.
- source_word: יִשְׁמַע
  chosen: he hears
  alternatives:
  - he hears the call
  - he is put under oath
  lexicon: HALOT
  rationale: The verb is simply 'hear.' In context it likely refers to hearing a public
    oath/adjuration in a judicial setting, but the Hebrew wording itself is not more
    specific than 'he hears.'
- source_word: וְלֹא יַגִּיד
  chosen: and does not report it
  alternatives:
  - and does not tell
  - and does not testify
  - and does not disclose it
  lexicon: HALOT
  rationale: The Hiphil of נגד means to tell, declare, or report. Given the probable
    legal context, 'report it' communicates the failure to disclose what one knows
    without over-specifying courtroom testimony in the main text.
