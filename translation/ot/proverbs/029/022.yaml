id: PRO.29.22
reference: Proverbs 29:22
source:
  edition: WLC
  text: אִֽישׁ אַ֭ף יְגָרֶ֣ה מָד֑וֹן וּ/בַ֖עַל חֵמָ֣ה רַב פָּֽשַׁע־־׃
translation:
  text: An angry man stirs up strife, and a hot-tempered man abounds in transgression.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a man of anger ... and a master of wrath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'multiplies transgression.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אַף
  chosen: an angry man
  alternatives:
  - a man of anger
  - an angered man
  lexicon: HALOT
  rationale: The construct-like pairing literally means 'a man of anger,' an idiom
    for a person characterized by anger. 'Angry man' is natural modern English and
    preserves the masculine singular form of the Hebrew.
- source_word: יְגָרֶה
  chosen: stirs up
  alternatives:
  - provokes
  - incites
  lexicon: HALOT
  rationale: The verb means to provoke or stir up. 'Stirs up' fits the proverb's imagery
    and collocates well with 'strife' in English.
- source_word: מָדוֹן
  chosen: strife
  alternatives:
  - contention
  - quarreling
  lexicon: HALOT
  rationale: The noun denotes contention or discord. 'Strife' is concise, idiomatic,
    and suitably weighty for wisdom literature.
- source_word: בַעַל חֵמָה
  chosen: a hot-tempered man
  alternatives:
  - a man of wrath
  - a furious man
  lexicon: HALOT
  rationale: Literally 'owner/master of wrath,' a Hebrew idiom for one characterized
    by heated anger. 'Hot-tempered man' communicates enduring disposition rather than
    a momentary outburst.
- source_word: רַב
  chosen: abounds in
  alternatives:
  - has much
  - multiplies
  lexicon: HALOT
  rationale: Here the adjective functions predicatively with the following noun, expressing
    abundance. 'Abounds in' is idiomatic English and captures the sense of being marked
    by much transgression.
- source_word: פָּשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - offense
  - sin
  lexicon: HALOT
  rationale: The noun often carries the sense of transgression or rebellion, not merely
    generic wrongdoing. 'Transgression' preserves the moral seriousness without overinterpreting
    toward political rebellion.
