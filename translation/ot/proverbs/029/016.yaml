id: PRO.29.16
reference: Proverbs 29:16
source:
  edition: WLC
  text: בִּ/רְב֣וֹת רְ֭שָׁעִים יִרְבֶּה פָּ֑שַׁע וְ֝/צַדִּיקִ֗ים בְּֽ/מַפַּלְתָּ֥/ם
    יִרְאֽוּ־׃
translation:
  text: When the wicked increase, transgression increases; but the righteous will
    look upon their downfall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will see their fall.' The Hebrew verb is simply 'see,' and the noun
      can be rendered 'fall' or 'downfall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְבוֹת
  chosen: When ... increase
  alternatives:
  - In the multiplying of
  - As ... become many
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of רבה introduces a temporal/circumstantial
    clause. 'When ... increase' is idiomatic English that preserves the sense of a
    condition marked by growth in number.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - evildoers
  lexicon: HALOT
  rationale: A substantival adjective/plural referring to morally guilty people. 'The
    wicked' is concise, natural, and standard in wisdom literature.
- source_word: יִרְבֶּה
  chosen: increases
  alternatives:
  - multiplies
  - becomes great
  lexicon: HALOT
  rationale: Qal imperfect of רבה parallels the opening infinitive and describes the
    resulting increase. 'Increases' preserves the verbal repetition with readable
    English.
- source_word: פָּשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - crime
  - sin
  lexicon: HALOT
  rationale: פשע often denotes rebellion or transgression, not merely generic wrongdoing.
    'Transgression' fits wisdom style and preserves the sense of violation/rebellion
    better than the broader 'sin.'
- source_word: וְצַדִּיקִים
  chosen: but the righteous
  alternatives:
  - and the righteous
  - the just
  lexicon: HALOT
  rationale: The conjunction here marks contrast with the first colon in context,
    so 'but' brings out the adversative force naturally. 'The righteous' is the standard
    rendering of the substantival adjective.
- source_word: בְּמַפַּלְתָּם
  chosen: upon their downfall
  alternatives:
  - their fall
  - when they fall
  - at their collapse
  lexicon: HALOT
  rationale: 'The noun מַפָּלָה means downfall/fall, with 3mp suffix referring most
    naturally to the wicked. The preposition ב here is best rendered in a way that
    fits the idiom with ראה: the righteous will see/look upon the wicked''s downfall.'
- source_word: יִרְאוּ
  chosen: will look upon
  alternatives:
  - will see
  - will witness
  lexicon: HALOT
  rationale: ראה commonly means 'see,' but 'look upon' in English better conveys the
    object construction with 'their downfall' and the contemplative/resultative sense
    in wisdom literature without adding triumphalism.
