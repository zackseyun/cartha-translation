theological_decisions:
- issue: Referent of the suffix in 'their downfall'
  chosen_reading: The suffix refers to the wicked of the first colon.
  alternative_readings:
  - The suffix could theoretically refer more generally to those who fall.
  rationale: The nearest and most coherent antecedent is 'the wicked.' The proverb
    contrasts the multiplication of the wicked and transgression with the righteous
    witnessing the wicked's eventual downfall. This is an interpretive decision driven
    by syntax and parallelism, not by a doctrinal dispute.
