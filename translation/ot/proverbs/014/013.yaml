id: PRO.14.13
reference: Proverbs 14:13
source:
  edition: WLC
  text: גַּם בִּ/שְׂח֥וֹק יִכְאַב לֵ֑ב וְ/אַחֲרִיתָ֖/הּ שִׂמְחָ֣ה תוּגָֽה־־׃
translation:
  text: Even in laughter the heart may ache, and the end of joy is grief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Even in laughter the heart aches'; the Hebrew imperfect can be rendered
      as a general present in proverbial speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'the outcome of joy is grief' or 'after joy comes grief.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Here גַּם adds emphasis rather than simple addition; ''Even'' best conveys
    the concessive force: despite laughter, pain can still be present.'
- source_word: בִּשְׂחוֹק
  chosen: in laughter
  alternatives:
  - while laughing
  - in merriment
  lexicon: HALOT
  rationale: The preposition ב plus שְׂחוֹק is most naturally rendered 'in laughter.'
    'Laughter' preserves the concrete image and fits English idiom.
- source_word: יִכְאַב
  chosen: may ache
  alternatives:
  - aches
  - is in pain
  - suffers pain
  lexicon: HALOT
  rationale: The imperfect can express a general truth or potential occurrence in
    proverbial style. 'May ache' captures the gnomic sense in natural English without
    overcommitting to a strictly present habitual form.
- source_word: לֵב
  chosen: the heart
  alternatives:
  - the mind
  - the inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard and sufficiently transparent rendering for
    לֵב in wisdom literature, denoting the inner person or seat of feeling.'
- source_word: וְאַחֲרִיתָהּ
  chosen: and the end of
  alternatives:
  - and afterward
  - and its outcome
  - and its latter end
  lexicon: HALOT
  rationale: אַחֲרִית commonly denotes end, outcome, or latter result. With the 3fs
    suffix referring back to 'joy,' 'the end of' is concise and idiomatic while preserving
    the metaphor of final result.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - mirth
  lexicon: HALOT
  rationale: '''Joy'' is the most natural modern English equivalent and pairs well
    with the contrast to grief. ''Mirth'' would sound too narrow or archaic.'
- source_word: תוּגָה
  chosen: grief
  alternatives:
  - sorrow
  - heaviness
  lexicon: HALOT
  rationale: תוּגָה denotes sorrow or grief. 'Grief' gives a strong, clear contrast
    with 'joy' and suits the proverb's sober conclusion.
