id: PRO.14.19
reference: Proverbs 14:19
source:
  edition: WLC
  text: שַׁח֣וּ רָ֭עִים לִ/פְנֵ֣י טוֹבִ֑ים וּ֝/רְשָׁעִ֗ים עַֽל שַׁעֲרֵ֥י צַדִּֽיק־׃
translation:
  text: The evil bow down before the good, and the wicked at the gates of the righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrate themselves before the good.' The Hebrew verb can denote a
      deeper act of bowing low.
    reason: lexical_alternative
  - marker: b
    text: '''At the gates of the righteous'' may imply coming in dependence, supplication,
      or acknowledgment of the righteous person''s standing.'
    reason: cultural_note
lexical_decisions:
- source_word: שַׁחוּ
  chosen: bow down
  alternatives:
  - are bowed down
  - prostrate themselves
  lexicon: HALOT
  rationale: The verb from שׁחה denotes bowing low or prostration. 'Bow down' is clear
    modern English and preserves the image of humbled submission without over-specifying
    whether the action is voluntary or compelled.
- source_word: רָעִים
  chosen: the evil
  alternatives:
  - evil people
  - bad people
  lexicon: HALOT
  rationale: The adjective is substantival plural, referring to evil persons. 'The
    evil' is concise and proverbial in tone, matching the Hebrew's generic class reference.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: The preposition means 'before/in front of/in the presence of.' 'Before'
    is the most natural English equivalent here and fits the scene of bowing.
- source_word: טוֹבִים
  chosen: the good
  alternatives:
  - good people
  - the upright
  lexicon: HALOT
  rationale: Like רָעִים, this is a substantival plural adjective. 'The good' preserves
    the antithetical parallel with 'the evil' and keeps the proverb compact.
- source_word: וּרְשָׁעִים
  chosen: and the wicked
  alternatives:
  - and wicked people
  lexicon: HALOT
  rationale: רְשָׁעִים commonly denotes the wicked in wisdom literature. 'The wicked'
    is the standard concise rendering and maintains the parallelism with the first
    colon.
- source_word: עַל
  chosen: at
  alternatives:
  - upon
  - over
  - by
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with 'gates' in this context it idiomatically
    indicates location at or by the gates. 'At' gives the natural English sense of
    appearing in a posture of dependence or supplication at the righteous person's
    gate.
- source_word: שַׁעֲרֵי
  chosen: the gates of
  alternatives:
  - the gate of
  - the doorway of
  lexicon: HALOT
  rationale: The plural construct literally means 'gates of.' In Hebrew, 'gate(s)'
    can denote the entrance area and public place associated with a household or city.
    The plural is retained as the formal shape of the Hebrew.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous person
  - the just
  lexicon: HALOT
  rationale: The singular adjective is substantival. 'The righteous' is idiomatic
    English for a representative righteous person and preserves the wisdom-literature
    category. 'The just' is possible but less natural in contemporary English.
