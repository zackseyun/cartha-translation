id: PRO.14.18
reference: Proverbs 14:18
source:
  edition: WLC
  text: נָחֲל֣וּ פְתָאיִ֣ם אִוֶּ֑לֶת וַֽ֝/עֲרוּמִ֗ים יַכְתִּ֥רוּ דָֽעַת׃
translation:
  text: The simple inherit folly, but the prudent are crowned with knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The prudent crown themselves with knowledge.' The Hebrew verb may be
      understood actively ('crown') or as describing being adorned/crowned with knowledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחֲלוּ
  chosen: inherit
  alternatives:
  - come into possession of
  - receive as a possession
  lexicon: HALOT
  rationale: Qal perfect of נחל commonly denotes receiving an inheritance or coming
    into possession. 'Inherit' preserves the proverb's metaphor of folly as what the
    simple end up possessing.
- source_word: פְתָאיִם
  chosen: the simple
  alternatives:
  - the naive
  - the gullible
  lexicon: HALOT
  rationale: In Proverbs, פתי refers to the inexperienced/open-minded person who is
    easily led. 'The simple' is the established wisdom-term in clear modern English
    and fits the moral-intellectual category here better than the more colloquial
    'gullible.'
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  - senselessness
  lexicon: HALOT
  rationale: A standard wisdom-term for moral and practical foolishness. 'Folly' is
    concise and idiomatic in Proverbs.
- source_word: עֲרוּמִים
  chosen: the prudent
  alternatives:
  - the shrewd
  - the sensible
  lexicon: HALOT
  rationale: In Proverbs this term often has a positive sense of prudence or sound
    discernment, though elsewhere it can shade toward shrewdness. Here the contrast
    with the simple favors the positive rendering 'the prudent.'
- source_word: יַכְתִּרוּ
  chosen: are crowned with
  alternatives:
  - crown themselves with
  - encircle with
  - adorn with
  lexicon: HALOT
  rationale: Hiphil of כתר can mean to surround or crown. In this proverb, the object
    'knowledge' works naturally as that with which the prudent are adorned. Rendering
    it passively in English ('are crowned with') communicates the resultant state
    idiomatically without overstating agency.
- source_word: דָעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דעת is a central wisdom term for knowledge grounded in discernment. 'Knowledge'
    is the most direct and consistent gloss here.
