id: PRO.14.11
reference: Proverbs 14:11
source:
  edition: WLC
  text: בֵּ֣ית רְ֭שָׁעִים יִשָּׁמֵ֑ד וְ/אֹ֖הֶל יְשָׁרִ֣ים יַפְרִֽיחַ׃
translation:
  text: The house of the wicked will be destroyed, but the tent of the upright will
    flourish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will blossom' or 'will sprout'; the Hebrew verb evokes the imagery of
      budding growth.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית
  chosen: house of
  alternatives:
  - house
  lexicon: HALOT
  rationale: Construct form with the following plural noun; rendered 'house of' to
    preserve the Hebrew genitival relationship and the contrast with 'tent.' It can
    denote household as well as physical house, but here the paired imagery with 'tent'
    favors a concrete dwelling image that also implies the household.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Common adjectival/substantival use for morally wicked persons. 'The wicked'
    is concise, idiomatic, and preserves the proverb's moral contrast.
- source_word: יִשָּׁמֵד
  chosen: will be destroyed
  alternatives:
  - will be annihilated
  - will be laid waste
  lexicon: HALOT
  rationale: Niphal imperfect of שׁמד conveys being destroyed or wiped out. 'Will
    be destroyed' is natural English and fits proverbial warning without overstating
    into total annihilation beyond what the context requires.
- source_word: אֹהֶל
  chosen: tent
  alternatives:
  - dwelling
  - household
  lexicon: HALOT
  rationale: 'Literally ''tent.'' Retained rather than flattening to ''house'' so
    the Hebrew contrast is visible: even a modest tent belonging to the upright prospers,
    while the house of the wicked falls.'
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  - the righteous
  lexicon: HALOT
  rationale: Refers to those who are morally straight/upright. 'The upright' is the
    most direct and idiomatic rendering, preserving the ethical nuance distinct from
    other Hebrew terms for 'righteous.'
- source_word: יַפְרִיחַ
  chosen: will flourish
  alternatives:
  - will sprout
  - will blossom
  - will thrive
  lexicon: HALOT
  rationale: Hiphil of פרח literally evokes budding/blossoming. In this proverb, 'will
    flourish' best communicates the metaphorical sense of prospering and thriving
    while still echoing the imagery of growth.
