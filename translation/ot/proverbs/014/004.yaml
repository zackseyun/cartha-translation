id: PRO.14.4
reference: Proverbs 14:4
source:
  edition: WLC
  text: בְּ/אֵ֣ין אֲ֭לָפִים אֵב֣וּס בָּ֑ר וְ/רָב תְּ֝בוּא֗וֹת בְּ/כֹ֣חַ שֽׁוֹר־׃
translation:
  text: Where there are no oxen, the manger is clean, but abundant crops come by the
    strength of an ox.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'feeding trough' for 'manger.'
    reason: lexical_alternative
  - marker: b
    text: Or 'produce,' 'harvests,' or 'yield' for 'crops.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵין
  chosen: Where there are no
  alternatives:
  - Without
  - In the absence of
  lexicon: HALOT
  rationale: 'The preposition ב plus אֵין introduces a circumstance/condition: ''where
    there is not'' or ''in the absence of.'' ''Where there are no'' gives natural
    English for the proverb''s situational contrast.'
- source_word: אֲלָפִים
  chosen: oxen
  alternatives:
  - cattle
  - ox
  lexicon: HALOT
  rationale: Though the plural can denote cattle broadly, in wisdom literature and
    in parallel with שׁוֹר it naturally refers to bovines used for farm labor. 'Oxen'
    best fits the agricultural setting and preserves the connection to draft animals.
- source_word: אֵבוּס
  chosen: manger
  alternatives:
  - feeding trough
  - stall
  lexicon: HALOT
  rationale: The noun denotes a feeding place/trough for animals. 'Manger' is concise
    and idiomatic, though not restricted to nativity usage. 'Feeding trough' is possible
    but less proverbial in English; 'stall' is less precise.
- source_word: בָּר
  chosen: clean
  alternatives:
  - pure
  - empty of grain/cleaned out
  lexicon: HALOT
  rationale: Here בָּר describes the manger as free from the mess associated with
    keeping oxen. 'Clean' captures the practical sense in context better than the
    more abstract 'pure.'
- source_word: וְרָב
  chosen: but abundant
  alternatives:
  - and much
  - and great
  lexicon: HALOT
  rationale: The conjunction marks the proverb's contrast, which English expresses
    naturally with 'but.' רָב means 'much/many, abundant.' 'Abundant' fits the plural
    noun 'crops' and the maxim's contrast between tidiness and productivity.
- source_word: תְּבוּאוֹת
  chosen: crops
  alternatives:
  - produce
  - harvests
  - yield
  lexicon: HALOT
  rationale: The noun refers to agricultural produce/yield. 'Crops' is clear modern
    English and suits the farming image. 'Produce' is possible but slightly less concrete;
    'yield' would shift the image toward abstraction.
- source_word: בְּכֹחַ
  chosen: by the strength of
  alternatives:
  - through the strength of
  - by the power of
  lexicon: HALOT
  rationale: The preposition ב marks means or instrumentality. 'By the strength of'
    preserves the causal/instrumental sense and keeps the proverb grounded in the
    ox's labor capacity.
- source_word: שׁוֹר
  chosen: an ox
  alternatives:
  - the ox
  - a bull
  lexicon: HALOT
  rationale: The singular functions generically. 'An ox' is natural English for a
    representative draft animal. 'Bull' is less suitable because the emphasis is agricultural
    labor, not sex or breeding.
