theological_decisions:
- issue: Sense of the predicate after 'steadfast love and faithfulness'
  chosen_reading: Rendered as 'belong to those who devise good'
  alternative_readings:
  - '''meet those who devise good'''
  - '''are for those who devise good'''
  rationale: The Hebrew omits an explicit verb, requiring English supplementation.
    'Belong to' naturally conveys that steadfast love and faithfulness characterize
    or come to those who plan good, without over-specifying whether these qualities
    are shown by them or shown to them. This preserves the proverb's compactness while
    remaining readable.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity
    where the source is compact or open-ended.'
