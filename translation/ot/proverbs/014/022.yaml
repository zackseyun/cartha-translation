id: PRO.14.22
reference: Proverbs 14:22
source:
  edition: WLC
  text: הֲֽ/לוֹא יִ֭תְעוּ חֹ֣רְשֵׁי רָ֑ע וְ/חֶ֥סֶד וֶ֝/אֱמֶ֗ת חֹ֣רְשֵׁי טֽוֹב־׃
translation:
  text: Will not those who devise evil go astray? But steadfast love and faithfulness
    belong to those who devise good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kindness and truth,' or 'mercy and faithfulness.' The Hebrew pair often
      denotes loyal love together with reliability or truthfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Will not
  alternatives:
  - Do not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Will
    not' preserves the interrogative force in natural English.
- source_word: יִתְעוּ
  chosen: go astray
  alternatives:
  - err
  - wander
  lexicon: HALOT
  rationale: The verb conveys straying or erring from the right path. 'Go astray'
    is idiomatic and preserves the moral sense common in wisdom literature.
- source_word: חֹרְשֵׁי רָע
  chosen: those who devise evil
  alternatives:
  - those who plot evil
  - workers of evil
  lexicon: HALOT
  rationale: The participle from חרשׁ literally suggests planning or crafting; in
    this context it refers to intentional scheming. 'Devise evil' captures deliberate
    moral intent better than a merely general 'do evil.'
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - wrong
  lexicon: HALOT
  rationale: In this antithetical proverb, רָע stands opposite טוֹב in a moral sense.
    'Evil' best preserves that ethical contrast.
- source_word: וְחֶסֶד
  chosen: steadfast love
  alternatives:
  - kindness
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד often denotes loyal, covenantal love or faithful kindness. 'Steadfast
    love' preserves its depth better than the flatter 'kindness.'
- source_word: וֶאֱמֶת
  chosen: faithfulness
  alternatives:
  - truth
  - reliability
  lexicon: HALOT
  rationale: In the common pairing חֶסֶד וֶאֱמֶת, the second term often carries the
    sense of faithfulness or reliability rather than abstract truth. 'Faithfulness'
    matches the relational sense of the pair.
- source_word: חֹרְשֵׁי טוֹב
  chosen: those who devise good
  alternatives:
  - those who plan good
  - those who plot good
  lexicon: HALOT
  rationale: Repeating 'devise' mirrors the same Hebrew participle used earlier and
    preserves the proverb's deliberate contrast between planning evil and planning
    good.
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  - benefit
  lexicon: HALOT
  rationale: The adjective functions substantivally here in ethical contrast to רָע.
    'Good' is concise and preserves the symmetry of the proverb.
