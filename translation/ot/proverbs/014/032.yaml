theological_decisions:
- issue: Whether the verse teaches confidence beyond death or merely security at the
    time of death
  chosen_reading: The main text preserves the ambiguity with 'finds refuge in his
    death' rather than resolving it into an explicit statement about afterlife hope.
  alternative_readings:
  - the righteous has hope at his death
  - the righteous is secure when he dies
  rationale: The Hebrew does not explicitly state 'hope' or define the nature of the
    refuge. A translation that inserts 'hope' interprets the proverb more strongly
    than the wording warrants. The chosen rendering keeps the contrast intact while
    preserving theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
