id: PRO.14.32
reference: Proverbs 14:32
source:
  edition: WLC
  text: בְּֽ֭/רָעָת/וֹ יִדָּחֶ֣ה רָשָׁ֑ע וְ/חֹסֶ֖ה בְ/מוֹת֣/וֹ צַדִּֽיק׃
translation:
  text: By his evil the wicked man is driven away, but the righteous finds refuge
    in his death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In his calamity the wicked man is driven away.' The Hebrew רָעָה can
      mean either 'evil' or 'calamity/disaster' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'takes refuge' for 'finds refuge.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in his death'; alternatively, 'at his death' or 'when he dies.'
      Some translations interpret more explicitly, 'has hope at his death,' but the
      Hebrew does not state 'hope' directly.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרָעָתוֹ
  chosen: By his evil
  alternatives:
  - In his calamity
  - By his trouble
  - When disaster comes upon him
  lexicon: HALOT
  rationale: 'רָעָה can denote either moral evil or calamity/disaster depending on
    context. Here, paired with רָשָׁע (''wicked man'') and contrasted with the righteous,
    the moral sense fits the proverb''s ethical polarity well: the wicked is undone
    by his own evil. The preposition בְּ is rendered instrumentally as ''by'' rather
    than merely locatively ''in'' to express the likely sense that his evil is the
    means/cause of his downfall. Because ''calamity'' is a viable contextual alternative
    in wisdom literature, it is preserved in a footnote.'
- source_word: יִדָּחֶה
  chosen: is driven away
  alternatives:
  - is thrust down
  - is overthrown
  - is cast down
  lexicon: HALOT
  rationale: The Niphal of נדח/דחה carries the sense of being driven away, thrust
    aside, or overthrown. 'Is driven away' preserves the passive nuance and reads
    naturally in English without overinterpreting the exact mode of downfall.
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'The wicked man' preserves
    the masculine singular form in keeping with the gender-accurate policy, while
    still representing a proverbial type rather than one individual.
- source_word: וְחֹסֶה
  chosen: finds refuge
  alternatives:
  - takes refuge
  - has refuge
  - is secure
  lexicon: HALOT
  rationale: חסה commonly means to seek or find refuge. Because the form is a participle
    used proverbially and contrasted with the wicked man's ruin, 'finds refuge' communicates
    the settled result in idiomatic English. 'Takes refuge' is also possible, but
    may sound overly volitional in a context where the exact object of trust is not
    explicit.
- source_word: בְּמוֹתוֹ
  chosen: in his death
  alternatives:
  - at his death
  - when he dies
  lexicon: HALOT
  rationale: The phrase is formally 'in his death.' English idiom could use 'at his
    death' or 'when he dies,' but 'in his death' better preserves the Hebrew's compact
    expression while remaining understandable. Because this clause is interpretively
    difficult, the temporal alternatives are preserved in a footnote.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous man
  - a righteous man
  lexicon: HALOT
  rationale: The substantival adjective refers to the righteous person as a proverbial
    class. 'The righteous' is natural English and preserves the contrast with 'the
    wicked man.'
