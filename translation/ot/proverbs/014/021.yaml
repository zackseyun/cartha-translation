id: PRO.14.21
reference: Proverbs 14:21
source:
  edition: WLC
  text: בָּז לְ/רֵעֵ֥/הוּ חוֹטֵ֑א וּ/מְחוֹנֵ֖ן עניים אַשְׁרָֽי/ו־׃
translation:
  text: Whoever despises his neighbor sins, but blessed is he who is gracious to the
    poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'happy is he who is gracious to the poor.' The Hebrew term expresses
      a state of flourishing or blessedness, not merely an emotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּז
  chosen: despises
  alternatives:
  - shows contempt for
  - scorns
  lexicon: HALOT
  rationale: The participle denotes treating someone with contempt. 'Despises' is
    concise, natural English and preserves the moral force better than the more formal
    'scorns' or the more explanatory 'shows contempt for'.
- source_word: לְרֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his fellow
  lexicon: HALOT
  rationale: רֵעַ commonly refers to another person in one's social sphere; 'neighbor'
    is the most idiomatic and biblically recognizable rendering in wisdom literature.
    The 3ms suffix is preserved with 'his.'
- source_word: חוֹטֵא
  chosen: sins
  alternatives:
  - is sinning
  - does wrong
  lexicon: HALOT
  rationale: 'The participle functions predicatively: the one who despises his neighbor
    is characterized as sinning. ''Sins'' is the clearest and most direct rendering,
    preserving the explicit moral/theological category rather than weakening it to
    ''does wrong.'''
- source_word: וּמְחוֹנֵן
  chosen: is gracious to
  alternatives:
  - shows favor to
  - has mercy on
  lexicon: HALOT
  rationale: From חנן, the sense is to show favor or grace. 'Is gracious to' preserves
    the lexical connection to grace/favor while remaining readable. 'Has mercy on'
    is possible but shifts the nuance toward רחם-style compassion rather than gracious
    beneficence.
- source_word: עניים
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: עניים commonly denotes poor or afflicted people. In this proverb's ethical
    contrast, socioeconomic vulnerability is prominent, so 'the poor' is the most
    straightforward rendering. 'The needy' is possible but less concrete.
- source_word: אַשְׁרָיו
  chosen: blessed is he
  alternatives:
  - happy is he
  - how blessed he is
  lexicon: HALOT
  rationale: The noun אֶשֶׁר/אַשְׁרֵי expresses a state of blessedness or flourishing.
    Here with suffix, it predicates blessedness of the gracious person. 'Blessed is
    he' preserves the wisdom-literature register and avoids reducing the term to mere
    emotion, as 'happy' might. The masculine singular is retained per gender-accurate
    policy, with representative force.
