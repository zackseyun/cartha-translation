- issue: Rendering of wisdom-term אַשְׁרָיו
  chosen_reading: blessed is he
  alternative_readings:
  - happy is he
  rationale: The proverb pronounces an objective state of favor/flourishing, not merely
    subjective happiness. 'Blessed' better preserves the theological and ethical weight
    of the Hebrew wisdom formula.
