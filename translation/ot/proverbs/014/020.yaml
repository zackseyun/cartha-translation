id: PRO.14.20
reference: Proverbs 14:20
source:
  edition: WLC
  text: גַּם לְ֭/רֵעֵ/הוּ יִשָּׂ֣נֵא רָ֑שׁ וְ/אֹהֲבֵ֖י עָשִׁ֣יר רַבִּֽים־׃
translation:
  text: Even his neighbor hates a poor man, but the lovers of a rich man are many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Even his friend hates a poor man.' The Hebrew רֵעַ can mean 'friend,'
      'companion,' or 'neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and the lovers of a rich man are many,' meaning many people
      attach themselves to the rich.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'Here גַּם intensifies the statement rather than merely adding another
    item. ''Even'' captures the surprising force: not only others, but even the poor
    man''s own associate/neighbor rejects him.'
- source_word: לְרֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor/associate. In this proverb
    the point is social proximity rather than covenantal friendship, so 'neighbor'
    best conveys someone close to him who would be expected not to reject him. The
    possessive suffix is preserved with 'his.'
- source_word: יִשָּׂנֵא
  chosen: hates
  alternatives:
  - is hated by
  - despises
  lexicon: HALOT
  rationale: 'The Niphal form here is best taken with passive/reflexive nuance in
    a stative-like sense, but English idiom works naturally by making the nearby relational
    subject explicit: ''his neighbor hates.'' This preserves the proverb''s force
    better than the awkward ''is hated by his neighbor.'' ''Despises'' is possible
    interpretively, but ''hates'' is the more direct lexical equivalent.'
- source_word: רָשׁ
  chosen: a poor man
  alternatives:
  - the poor
  - a poor person
  lexicon: HALOT
  rationale: רָשׁ denotes a poor or needy person. Because the Hebrew adjective functions
    substantivally in the singular, 'a poor man' preserves the singular proverbial
    individual. This also follows the gender-accurate principle, since the Hebrew
    form is masculine singular and representative.
- source_word: וְאֹהֲבֵי
  chosen: the lovers of
  alternatives:
  - those who love
  - the friends of
  lexicon: HALOT
  rationale: The participial plural literally means 'lovers of' or 'those loving.'
    'The lovers of' keeps the compact proverbial parallel with the first colon and
    reflects the participial form. It refers to people attached to the rich man, not
    necessarily to romantic love.
- source_word: עָשִׁיר
  chosen: a rich man
  alternatives:
  - the rich
  - a wealthy man
  lexicon: HALOT
  rationale: עָשִׁיר means rich/wealthy person. The singular substantive is preserved
    with 'a rich man' to match the singular poor man in the first colon and maintain
    the proverb's antithetical parallelism.
- source_word: רַבִּים
  chosen: are many
  alternatives:
  - are numerous
  lexicon: HALOT
  rationale: רַבִּים predicates abundance. 'Are many' is the most natural and direct
    English rendering in proverbial style.
