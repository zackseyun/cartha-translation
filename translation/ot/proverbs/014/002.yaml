id: PRO.14.2
reference: Proverbs 14:2
source:
  edition: WLC
  text: הוֹלֵ֣ךְ בְּ֭/יָשְׁר/וֹ יְרֵ֣א יְהוָ֑ה וּ/נְל֖וֹז דְּרָכָ֣י/ו בּוֹזֵֽ/הוּ׃
translation:
  text: Whoever walks in his uprightness fears the LORD, but the one whose ways are
    crooked despises him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but he who is devious in his ways'; the Hebrew describes a person twisted
      or crooked in conduct.
    reason: lexical_alternative
  - marker: b
    text: The pronoun in 'despises him' most naturally refers to the LORD; alternatively,
      some take it more generally.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹלֵךְ
  chosen: walks
  alternatives:
  - goes
  - lives
  lexicon: HALOT
  rationale: הלך in wisdom literature commonly functions metaphorically for one's
    manner of life or conduct. 'Walks' preserves the Hebrew idiom while remaining
    natural English.
- source_word: בְּיָשְׁרוֹ
  chosen: in his uprightness
  alternatives:
  - with integrity
  - in his straightness
  lexicon: HALOT
  rationale: יֹשֶׁר/יָשְׁרָה language denotes straightness, uprightness, moral integrity.
    'In his uprightness' keeps the concrete Hebrew image and the possessive suffix.
- source_word: יְרֵא יְהוָה
  chosen: fears the LORD
  alternatives:
  - reveres the LORD
  lexicon: HALOT
  rationale: ירא with YHWH in Proverbs is the standard covenant-wisdom expression
    'fear the LORD.' 'Fears' preserves the established theological idiom and the text's
    moral seriousness better than the softer 'reveres.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: וּנְלוֹז
  chosen: but the one ... is crooked
  alternatives:
  - but he who is devious
  - but the perverse one
  lexicon: HALOT
  rationale: נלוז denotes being twisted, crooked, or perverse. Because it is followed
    by 'his ways,' English reads more naturally by expressing the crookedness predicatively
    with reference to the ways rather than as a bare substantive.
- source_word: דְּרָכָיו
  chosen: whose ways are crooked
  alternatives:
  - crooked in his ways
  - devious in his paths
  lexicon: HALOT
  rationale: דֶּרֶךְ in plural often refers to patterns of conduct. 'Ways' is the
    standard and transparent rendering in Proverbs.
- source_word: בּוֹזֵהוּ
  chosen: despises him
  alternatives:
  - scorns him
  - despises Him
  lexicon: HALOT
  rationale: 'בזה means to despise or hold in contempt. The 3ms suffix most naturally
    refers back to the immediately preceding ''the LORD'' in the antithetical parallelism:
    fearing the LORD versus despising him. Lowercase ''him'' follows normal English
    style, though the referent is God.'
