theological_decisions:
- issue: Referent of the pronominal suffix in בּוֹזֵהוּ
  chosen_reading: 'The suffix refers to the LORD: ''despises him.'''
  alternative_readings:
  - The suffix refers more generally to the upright person or to wisdom's moral order.
  rationale: 'The proverb is structured as a clear antithesis: one who walks uprightly
    fears the LORD, whereas the crooked person despises him. The nearest and most
    coherent antecedent is יְהוָה, and this yields the strongest parallelism without
    importing extra concepts.'
  doctrine_reference: Preserve theological tension rather than resolve it; where ambiguity
    exists, choose the most contextually grounded reading and preserve alternatives
    in a footnote.
