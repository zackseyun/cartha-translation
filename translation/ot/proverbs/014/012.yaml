theological_decisions:
- issue: Generic masculine אִישׁ
  chosen_reading: a man
  alternative_readings:
  - someone
  - a person
  rationale: The Hebrew uses grammatically masculine singular with representative
    force. Per doctrine, gender-accurate rendering is preferred over gender-neutral
    smoothing unless context demands otherwise. Here 'a man' preserves the source
    form while still functioning proverbially.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nature of 'death' in wisdom context
  chosen_reading: death
  alternative_readings:
  - destruction
  - ruin
  rationale: The proverb warns of a course that appears correct but ends in death.
    The text itself says 'death,' and the translation should not narrow or expand
    this into merely physical death or generalized ruin without textual warrant.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
