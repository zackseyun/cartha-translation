id: PRO.14.12
reference: Proverbs 14:12
source:
  edition: WLC
  text: יֵ֤שׁ דֶּ֣רֶךְ יָ֭שָׁר לִ/פְנֵי אִ֑ישׁ וְ֝/אַחֲרִיתָ֗/הּ דַּרְכֵי מָֽוֶת־־׃
translation:
  text: There is a way that seems right before a man, but its end is the ways of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is a way that seems right to a man.' The Hebrew literally says
      'before a man,' an idiom for what appears right in one's own view.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - There exists
  lexicon: HALOT
  rationale: Existential particle introducing a general truth; 'There is' is natural
    modern English and preserves the proverbial assertion.
- source_word: דֶּרֶךְ
  chosen: a way
  alternatives:
  - a path
  - a road
  lexicon: HALOT
  rationale: Common metaphor in wisdom literature for a course of life or conduct.
    'Way' preserves both literal and figurative resonance and matches the repeated
    root later in the verse.
- source_word: יָשָׁר
  chosen: right
  alternatives:
  - straight
  - upright
  lexicon: HALOT
  rationale: In this context the sense is evaluative as perceived by the person, not
    merely geometric. 'Right' best conveys what appears correct or proper to him.
- source_word: לִפְנֵי אִישׁ
  chosen: before a man
  alternatives:
  - to a man
  - in the sight of a man
  - before someone
  lexicon: HALOT
  rationale: Literally 'before a man.' Retained as 'before a man' to preserve the
    Hebrew idiom of what appears so in a person's own view, while keeping the masculine
    singular in line with the gender-accurate policy for generic איש.
- source_word: וְאַחֲרִיתָהּ
  chosen: but its end
  alternatives:
  - and its end
  - yet its outcome
  - but its outcome
  lexicon: HALOT
  rationale: The conjunction marks contrast in sense, so 'but' is preferable in English.
    אַחֲרִית denotes end, latter end, or outcome; 'end' is concise and proverbially
    forceful.
- source_word: דַּרְכֵי
  chosen: the ways of
  alternatives:
  - paths of
  - roads to
  lexicon: HALOT
  rationale: Plural construct is best preserved. The plural likely intensifies or
    comprehensively describes death-bound outcomes; 'ways of' keeps the lexical link
    with דֶּרֶךְ earlier in the verse.
- source_word: מָוֶת
  chosen: death
  alternatives:
  - deadly ruin
  lexicon: HALOT
  rationale: Standard rendering of מָוֶת. 'Death' preserves the stark wisdom contrast
    without interpretive expansion.
