id: PRO.14.23
reference: Proverbs 14:23
source:
  edition: WLC
  text: בְּ/כָל עֶ֭צֶב יִהְיֶ֣ה מוֹתָ֑ר וּ/דְבַר שְׂ֝פָתַ֗יִם אַךְ לְ/מַחְסֽוֹר־־־׃
translation:
  text: In all labor there is profit, but mere talk leads only to lack.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to poverty.' The Hebrew מַחְסוֹר can denote lack, want, or poverty.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל
  chosen: In all
  alternatives:
  - With every
  - In every
  lexicon: HALOT
  rationale: The preposition ב with כָּל is best rendered idiomatically as 'in all'
    here, introducing a general principle rather than a strictly locative sense.
- source_word: עֶצֶב
  chosen: labor
  alternatives:
  - toil
  - pain
  - hard work
  lexicon: HALOT
  rationale: עֶצֶב can denote painful toil, labor, or hardship. In this proverb contrasting
    productive effort with mere speech, 'labor' best captures work involving exertion
    without overemphasizing emotional sorrow. 'Toil' is possible, but 'labor' is more
    natural modern English.
- source_word: יִהְיֶה
  chosen: there is
  alternatives:
  - there will be
  - comes
  lexicon: HALOT
  rationale: The imperfect of היה in proverbial discourse expresses a general truth.
    English present tense ('there is') communicates the gnomic force more naturally
    than a future.
- source_word: מוֹתָר
  chosen: profit
  alternatives:
  - advantage
  - gain
  - surplus
  lexicon: HALOT
  rationale: מוֹתָר denotes what remains over, hence surplus, advantage, or profit.
    In the wisdom context of work yielding beneficial result, 'profit' is concise
    and idiomatic.
- source_word: וּ/דְבַר
  chosen: but mere talk
  alternatives:
  - but the word
  - but talk
  - but speech
  lexicon: HALOT
  rationale: Though singular ('word/matter of'), the construct with 'lips' forms an
    idiom meaning speech or talk. Rendering the conjunction contrastively as 'but'
    fits the proverb's antithesis. 'Mere talk' brings out the dismissive force in
    context without adding content beyond the contrast with labor.
- source_word: שְׂפָתַיִם
  chosen: talk
  alternatives:
  - lips
  - speech of the lips
  lexicon: HALOT
  rationale: Literally 'lips,' but in English the idiom is better represented by 'talk'
    or 'speech.' This avoids awkward literalism while preserving the sense of spoken
    words.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - merely
  - nothing but
  lexicon: HALOT
  rationale: 'אַךְ here restricts the result: lip-talk leads ''only'' to lack. ''Only''
    preserves the exclusivity and sharpness of the warning.'
- source_word: לְ/מַחְסוֹר
  chosen: to lack
  alternatives:
  - to poverty
  - to want
  - to need
  lexicon: HALOT
  rationale: מַחְסוֹר denotes lack, want, or poverty. 'Lack' is broad enough to preserve
    the Hebrew's semantic range, while fitting the parallel with 'profit.' 'Poverty'
    is a plausible stronger alternative and is worth preserving in a footnote.
