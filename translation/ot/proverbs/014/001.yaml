id: PRO.14.1
reference: Proverbs 14:1
source:
  edition: WLC
  text: חַכְמ֣וֹת נָ֭שִׁים בָּנְתָ֣ה בֵיתָ֑/הּ וְ֝/אִוֶּ֗לֶת בְּ/יָדֶ֥י/הָ תֶהֶרְסֶֽ/נּוּ׃
translation:
  text: The wisest of women builds her house, but a foolish woman tears it down with
    her own hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every wise woman builds her house.' The Hebrew opening may be understood
      generically as a class statement rather than as a superlative expression.
    reason: lexical_alternative
  - marker: b
    text: '''House'' may also include the sense of ''household'' or ''family establishment,''
      not only the physical dwelling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַכְמוֹת נָשִׁים
  chosen: the wisest of women
  alternatives:
  - wise women
  - women's wisdom
  - every wise woman
  lexicon: HALOT
  rationale: The plural חַכְמוֹת with נָשִׁים is an idiomatic/superlative construction
    in Hebrew wisdom style, not most naturally a simple plural subject in English.
    Rendering it as 'the wisest of women' captures the singular feminine verb בָּנְתָה
    and the proverb's contrast with singular 'a foolish woman.' 'Every wise woman'
    is possible as a generic singular sense, but the superlative nuance better explains
    the form and parallelism.
- source_word: בָּנְתָה
  chosen: builds
  alternatives:
  - has built
  - built
  lexicon: HALOT
  rationale: Though morphologically perfect, Hebrew proverbs commonly use the perfect
    for gnomic/general truth. Present tense in English best conveys proverbial force.
- source_word: בֵיתָהּ
  chosen: her house
  alternatives:
  - her household
  - her home
  lexicon: HALOT
  rationale: בַּיִת can denote either the physical house or the household/family establishment.
    'House' preserves the Hebrew image and allows the proverb's metaphorical breadth;
    'household' is interpretive and narrower.
- source_word: אִוֶּלֶת
  chosen: a foolish woman
  alternatives:
  - folly
  - a fool
  lexicon: HALOT
  rationale: Given the feminine singular verb and the contrast with the first colon,
    the noun is best rendered personally as 'a foolish woman' rather than abstract
    'folly.' This makes the parallelism explicit in natural English.
- source_word: בְּיָדֶיהָ
  chosen: with her own hands
  alternatives:
  - with her hands
  - by her hands
  lexicon: HALOT
  rationale: The phrase is instrumental and emphasizes personal agency. 'With her
    own hands' brings out the emphatic sense naturally in English without adding foreign
    content.
- source_word: תֶהֶרְסֶנּוּ
  chosen: tears it down
  alternatives:
  - destroys it
  - pulls it down
  - overthrows it
  lexicon: HALOT
  rationale: The verb הרס means to tear down/demolish. 'Tears it down' matches the
    building/demolishing contrast with 'builds' and keeps the concrete metaphor vivid.
    The pronominal suffix refers back to 'house'.
