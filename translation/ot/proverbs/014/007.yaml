id: PRO.14.7
reference: Proverbs 14:7
source:
  edition: WLC
  text: לֵ֣ךְ מִ֭/נֶּגֶד לְ/אִ֣ישׁ כְּסִ֑יל וּ/בַל יָ֝דַ֗עְתָּ שִׂפְתֵי דָֽעַת־־׃
translation:
  text: Go from the presence of a foolish man, for you do not perceive lips of knowledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go away from a foolish man, for you will not find words of knowledge
      there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Leave
  - Walk away
  lexicon: HALOT
  rationale: Imperative 2ms of הלך, giving direct exhortation. 'Go' is the most straightforward
    English imperative and fits the proverb's concise style.
- source_word: מִנֶּגֶד
  chosen: from the presence of
  alternatives:
  - away from
  - from before
  lexicon: HALOT
  rationale: The prepositional expression literally conveys being in front of or before
    someone; in context it idiomatically means to remove oneself from before a person.
    'From the presence of' preserves the spatial nuance better than the more interpretive
    'away from'.
- source_word: לְאִישׁ כְּסִיל
  chosen: a foolish man
  alternatives:
  - a fool
  - a stupid man
  lexicon: HALOT
  rationale: אִישׁ is 'man' and כְּסִיל is the stock wisdom term 'fool/foolish one.'
    Following the project's gender-accurate principle, 'man' is retained rather than
    neutralizing to 'person.' 'Foolish man' preserves both components of the Hebrew
    phrase.
- source_word: וּבַל
  chosen: for
  alternatives:
  - and not
  - since not
  lexicon: HALOT
  rationale: בַּל is a poetic negative particle, here linked with the following perfect
    to explain the command. Rendering the clause causally as 'for you do not...' gives
    natural English while preserving the proverb's logic. A more wooden 'and not'
    is less idiomatic in English.
- source_word: יָדַעְתָּ
  chosen: you do not perceive
  alternatives:
  - you have not known
  - you do not know
  - you will not know
  lexicon: HALOT
  rationale: The perfect can express a general-result sense in proverbial discourse.
    In context the point is not mere possession of information but failure to encounter
    or recognize anything wise in the fool's speech. 'Perceive' captures that experiential
    nuance.
- source_word: שִׂפְתֵי דָעַת
  chosen: lips of knowledge
  alternatives:
  - words of knowledge
  - knowledgeable speech
  lexicon: HALOT
  rationale: Literally 'lips of knowledge.' Retaining 'lips' preserves the Hebrew
    imagery for speech, while 'of knowledge' reflects the genitive. More dynamic alternatives
    were possible, but the literal image is clear enough in English and suits wisdom
    literature.
