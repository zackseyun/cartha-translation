theological_decisions:
- issue: Representative masculine in wisdom literature
  chosen_reading: to a discerning man
  alternative_readings:
  - to the discerning
  - to a discerning person
  rationale: The Hebrew uses a grammatically masculine singular participial form in
    a representative sense. Per translation policy, the masculine form is retained
    where it matches the source intent rather than neutralizing it in the main text.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
