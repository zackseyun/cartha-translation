id: PRO.14.6
reference: Proverbs 14:6
source:
  edition: WLC
  text: בִּקֶּשׁ לֵ֣ץ חָכְמָ֣ה וָ/אָ֑יִן וְ/דַ֖עַת לְ/נָב֣וֹן נָקָֽל־׃
translation:
  text: A scoffer seeks wisdom and there is none, but knowledge comes easily to a
    discerning man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but finds none.' The Hebrew reads literally, 'and there is none.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to a discerning man'; the expression is grammatically masculine
      singular but functions proverbially for a person characterized by discernment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּקֶּשׁ
  chosen: seeks
  alternatives:
  - sought
  - searches for
  lexicon: HALOT
  rationale: The qatal form in Proverbs often expresses a general truth in gnomic
    style; present-tense English fits the proverb genre better than a simple past.
    'Seeks' preserves the active sense of attempting to obtain.
- source_word: לֵץ
  chosen: scoffer
  alternatives:
  - mocker
  - scorner
  lexicon: HALOT
  rationale: לֵץ denotes a person characterized by arrogant derision, especially toward
    wisdom and correction. 'Scoffer' is natural modern English and preserves the moral
    tone better than the more archaic 'scorner.'
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering in Proverbs; it refers not merely to intelligence
    but to skillful, morally grounded understanding.
- source_word: וָאָיִן
  chosen: and there is none
  alternatives:
  - but finds none
  - and it is not there
  lexicon: HALOT
  rationale: 'The Hebrew is literally existential: ''and there is not/none.'' This
    keeps close to the source while conveying the failure of the scoffer''s search.
    ''Finds none'' is interpretive and therefore kept as an alternative rather than
    the main text.'
- source_word: וְדַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דַּעַת is best rendered 'knowledge' here, paired with wisdom language
    in Proverbs. It denotes grasped insight rather than mere data.
- source_word: לְנָבוֹן
  chosen: to a discerning man
  alternatives:
  - for the discerning
  - to one who understands
  lexicon: HALOT
  rationale: נָבוֹן describes a person of discernment or understanding. The masculine
    singular is retained as 'man' in keeping with the gender-accurate policy for representative
    masculine forms, though the sense is generic.
- source_word: נָקָל
  chosen: comes easily
  alternatives:
  - is easy
  - is readily obtained
  lexicon: HALOT
  rationale: The adjective/participle conveys ease or readiness. 'Comes easily' makes
    good English with the dative phrase 'to a discerning man' and expresses the contrast
    with the scoffer's fruitless search.
