id: PRO.14.5
reference: Proverbs 14:5
source:
  edition: WLC
  text: עֵ֣ד אֱ֭מוּנִים לֹ֣א יְכַזֵּ֑ב וְ/יָפִ֥יחַ כְּ֝זָבִ֗ים עֵ֣ד שָֽׁקֶר׃
translation:
  text: A faithful witness does not lie, but a false witness breathes out lies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utters falsehoods' for 'breathes out lies.' The Hebrew verb pictures
      false testimony as something exhaled or poured out.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד
  chosen: witness
  alternatives:
  - testifier
  lexicon: HALOT
  rationale: The noun denotes one who gives testimony. 'Witness' is the natural legal
    and moral term in English and fits both cola.
- source_word: אֱמוּנִים
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: HALOT
  rationale: The plural abstract/intensive form modifies 'witness' with the sense
    of reliability or faithfulness. 'Faithful' is concise and preserves the moral
    quality emphasized in Proverbs.
- source_word: לֹא יְכַזֵּב
  chosen: does not lie
  alternatives:
  - does not deceive
  - does not prove false
  lexicon: HALOT
  rationale: The Piel of כזב here refers to speaking falsely. 'Does not lie' is the
    clearest idiomatic English rendering in the witness/testimony context.
- source_word: וְיָפִיחַ
  chosen: but ... breathes out
  alternatives:
  - and ... utters
  - and ... pours out
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively ('but') because the second
    colon contrasts with the first, a common feature in Hebrew poetry. The Hiphil
    of פוח conveys exhaling or pouring forth speech; 'breathes out' preserves the
    vivid metaphor.
- source_word: כְּזָבִים
  chosen: lies
  alternatives:
  - falsehoods
  - deceptions
  lexicon: HALOT
  rationale: Plural 'lies' matches the Hebrew plural and works naturally with 'breathes
    out,' suggesting repeated false statements.
- source_word: עֵד שָׁקֶר
  chosen: a false witness
  alternatives:
  - a lying witness
  lexicon: HALOT
  rationale: This construct phrase is a standard expression for one whose testimony
    is false. 'False witness' is both idiomatic and intertextually familiar in biblical
    English.
