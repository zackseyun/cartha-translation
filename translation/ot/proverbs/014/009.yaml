theological_decisions:
- issue: Sense of אָשָׁם in a non-cultic wisdom context
  chosen_reading: abstract 'guilt' rather than cultic 'guilt offering'
  alternative_readings:
  - guilt offering
  rationale: The proverb contrasts fools with the upright in ethical terms, not sacrificial
    procedure. Rendering אָשָׁם as 'guilt' best fits the moral point and parallelism,
    while preserving the cultic alternative in a footnote for auditability.
- issue: Referent of רָצוֹן
  chosen_reading: left broad as 'favor'
  alternative_readings:
  - God's favor
  - human goodwill
  - acceptance
  rationale: The Hebrew does not explicitly specify whose favor is in view. To preserve
    theological and interpretive openness, the translation keeps the more general
    'favor' rather than narrowing the referent.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
