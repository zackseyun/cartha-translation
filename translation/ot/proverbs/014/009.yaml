id: PRO.14.9
reference: Proverbs 14:9
source:
  edition: WLC
  text: אֱ֭וִלִים יָלִ֣יץ אָשָׁ֑ם וּ/בֵ֖ין יְשָׁרִ֣ים רָצֽוֹן׃
translation:
  text: Fools mock guilt, but among the upright there is favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fools mock the guilt offering.' The Hebrew אָשָׁם can mean either 'guilt'
      or, in sacrificial contexts, 'guilt offering.'
    reason: alternative_reading
  - marker: b
    text: Or 'acceptance' or 'goodwill' among the upright; the Hebrew does not specify
      whose favor is meant.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִלִים
  chosen: Fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Plural noun denoting morally foolish people. 'Fools' is the natural concise
    English equivalent in Proverbs and preserves the wisdom-literature category.
- source_word: יָלִיץ
  chosen: mock
  alternatives:
  - scoff at
  - make light of
  lexicon: HALOT
  rationale: The Hifil of לוץ commonly carries the sense of scoffing or mocking. 'Mock'
    is idiomatic and fits the proverb's moral contrast.
- source_word: אָשָׁם
  chosen: guilt
  alternatives:
  - guilt offering
  - offense
  - reparation
  lexicon: HALOT
  rationale: Although אָשָׁם can denote a guilt offering in cultic contexts, here
    the wisdom setting and terse antithesis favor the abstract sense 'guilt' or culpability.
    This yields the sense that fools trivialize wrongdoing and its liability.
- source_word: וּבֵין
  chosen: but among
  alternatives:
  - and among
  - while among
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the contrasting second colon.
    In English, 'but among' best conveys the adversative parallelism.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - upright people
  - the straight
  lexicon: HALOT
  rationale: Standard wisdom term for morally straight or upright persons. 'The upright'
    is established, clear English.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - acceptance
  - goodwill
  lexicon: HALOT
  rationale: רָצוֹן often denotes favor, acceptance, or goodwill. 'Favor' is concise
    and preserves the ambiguity of whether the favor is divine, interpersonal, or
    both.
