id: PRO.14.35
reference: Proverbs 14:35
source:
  edition: WLC
  text: רְֽצוֹן מֶ֭לֶךְ לְ/עֶ֣בֶד מַשְׂכִּ֑יל וְ֝/עֶבְרָת֗/וֹ תִּהְיֶ֥ה מֵבִֽישׁ־׃
translation:
  text: A king’s favor is for a servant who acts wisely, but his wrath will be against
    one who brings shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward a servant who is prudent' or 'for a skillful servant.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his wrath will be [for/against] one who brings shame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצוֹן
  chosen: favor
  alternatives:
  - delight
  - goodwill
  - acceptance
  lexicon: HALOT
  rationale: In wisdom literature רָצוֹן commonly denotes favorable disposition or
    pleasure. 'Favor' is idiomatic in English and fits the courtly context with 'king.'
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Straightforward rendering of the common noun for a male monarch.
- source_word: לְעֶבֶד
  chosen: for a servant
  alternatives:
  - toward a servant
  - for a slave
  lexicon: HALOT
  rationale: The preposition ל marks the object toward whom the king's favor is directed.
    'Servant' is preferred here over 'slave' because the proverb emphasizes court
    service and competence rather than bonded status; the bonded nature is not theologically
    salient in this context.
- source_word: מַשְׂכִּיל
  chosen: who acts wisely
  alternatives:
  - prudent
  - skillful
  - having insight
  lexicon: HALOT
  rationale: The Hiphil participle from שׂכל can denote acting with insight, prudence,
    or success. 'Who acts wisely' captures the verbal force and the practical wisdom
    emphasized in Proverbs.
- source_word: וְעֶבְרָתוֹ
  chosen: but his wrath
  alternatives:
  - but his fury
  - but his anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing anger or wrath. 'Wrath' preserves the stronger
    force of the term better than the milder 'anger.' The conjunction is rendered
    adversatively as 'but' to reflect the proverb's contrast.
- source_word: תִּהְיֶה
  chosen: will be
  alternatives:
  - comes
  - falls
  lexicon: HALOT
  rationale: The verb היה simply states existence or occurrence. 'Will be' is the
    most direct rendering and allows the implied relation to be supplied naturally
    in English.
- source_word: מֵבִישׁ
  chosen: one who brings shame
  alternatives:
  - the shameful one
  - one who acts shamefully
  - one who causes disgrace
  lexicon: HALOT
  rationale: 'The Hiphil participle of בוש here is best taken causatively: one who
    causes shame/disgrace. ''One who brings shame'' is natural English and preserves
    the participial sense.'
