id: PRO.14.10
reference: Proverbs 14:10
source:
  edition: WLC
  text: לֵ֗ב י֭וֹדֵעַ מָרַּ֣ת נַפְשׁ֑/וֹ וּ֝/בְ/שִׂמְחָת֗/וֹ לֹא יִתְעָ֥רַב זָֽר־׃
translation:
  text: The heart knows the bitterness of its soul, and no stranger shares in its
    joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and no outsider mingles with its joy' or 'participates in its joy.'
      The Hebrew verb can denote becoming involved with or sharing in something.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the bitterness of its soul.' 'Soul' here refers to the inner self
      or life, not necessarily a technical statement about human constitution.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Proverbs, לֵב commonly denotes the inner person as the seat of thought
    and feeling. 'Heart' is the natural English equivalent and preserves the anthropological
    imagery of the Hebrew.
- source_word: יֹדֵעַ
  chosen: knows
  alternatives:
  - understands
  - is acquainted with
  lexicon: HALOT
  rationale: ידע here expresses personal inward knowledge or awareness. 'Knows' is
    both direct and idiomatic in English.
- source_word: מָרַת
  chosen: bitterness
  alternatives:
  - grief
  - sorrow
  lexicon: HALOT
  rationale: The noun from מרר denotes bitterness, whether emotional or experiential.
    'Bitterness' preserves the metaphor and matches the Hebrew more closely than the
    more interpretive 'grief'.
- source_word: נַפְשׁוֹ
  chosen: its soul
  alternatives:
  - his soul
  - its life
  - its inner self
  lexicon: HALOT
  rationale: נפש can mean soul, life, or self. Here it refers to the person's inner
    being in parallel with 'heart.' Because לֵב is grammatically masculine but non-personal
    in English, 'its soul' keeps the proverb's focus on the heart as subject without
    importing a male-specific referent.
- source_word: וּבְשִׂמְחָתוֹ
  chosen: and ... its joy
  alternatives:
  - and in its gladness
  - and with its joy
  lexicon: HALOT
  rationale: שִׂמְחָה denotes joy or gladness. 'Joy' is concise and idiomatic. The
    prefixed ב is best represented by the English idiom 'share in' with the following
    verb rather than translated woodenly as 'in'.
- source_word: יִתְעָרַב
  chosen: shares in
  alternatives:
  - mingles with
  - participates in
  - intermeddles with
  lexicon: HALOT
  rationale: The hitpael of ערב here conveys becoming involved with or sharing in
    something. In context, the sense is that an outsider cannot participate in another
    person's inward joy. 'Shares in' communicates the meaning clearly in modern English.
- source_word: זָר
  chosen: stranger
  alternatives:
  - outsider
  - foreigner
  lexicon: HALOT
  rationale: זָר here refers not primarily to an ethnic foreigner but to one who is
    outside another's inner experience. 'Stranger' is the standard rendering and fits
    the proverb's contrast with the person's own heart.
