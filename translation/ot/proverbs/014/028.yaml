id: PRO.14.28
reference: Proverbs 14:28
source:
  edition: WLC
  text: בְּ/רָב עָ֥ם הַדְרַת מֶ֑לֶךְ וּ/בְ/אֶ֥פֶס לְ֝אֹ֗ם מְחִתַּ֥ת רָזֽוֹן־־׃
translation:
  text: In a multitude of people is a king’s splendor, but without a nation, a ruler’s
    ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terror' or 'dismay' for 'ruin'; the Hebrew term can denote either dread
      or destructive collapse. The main text chooses 'ruin' because the proverb contrasts
      the strength a populous nation gives a king with the downfall of a ruler who
      lacks such a people.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרָב
  chosen: In a multitude of
  alternatives:
  - With many
  - In the abundance of
  lexicon: HALOT
  rationale: 'The preposition ב plus רָב expresses circumstance/location: ''in/with
    abundance.'' ''In a multitude of'' preserves the proverb''s compact parallelism
    and the sense of numerical abundance.'
- source_word: עָם
  chosen: people
  alternatives:
  - folk
  - subjects
  lexicon: HALOT
  rationale: עָם commonly means 'people' as a populace. 'Subjects' would narrow the
    sense interpretively; 'people' keeps the broader political-social sense suitable
    to a king.
- source_word: הַדְרַת
  chosen: splendor
  alternatives:
  - glory
  - majesty
  - honor
  lexicon: HALOT
  rationale: The noun denotes adornment, honor, or majesty. 'Splendor' communicates
    visible royal magnificence produced by a large populace, while remaining natural
    English.
- source_word: מֶלֶךְ
  chosen: king’s
  alternatives:
  - of a king
  lexicon: HALOT
  rationale: 'Construct relationship with הַדְרַת is best rendered possessively in
    English: the splendor belongs to the king.'
- source_word: וּבְאֶפֶס
  chosen: but without
  alternatives:
  - and in the absence of
  - but in the lack of
  lexicon: HALOT
  rationale: אֶפֶס here conveys nonexistence/lack. 'But without' captures the adversative
    parallel and reads idiomatically in English.
- source_word: לְאֹם
  chosen: a nation
  alternatives:
  - a people
  - a populace
  lexicon: HALOT
  rationale: לְאֹם is a people-group or nation. To avoid repeating 'people' from עָם
    while preserving the collective-political sense, 'nation' is suitable.
- source_word: מְחִתַּת
  chosen: ruin
  alternatives:
  - terror
  - dismay
  - destruction
  lexicon: HALOT
  rationale: The noun can denote dread or downfall. In this political proverb, the
    point is not merely emotional fear but the collapse/disaster that comes to a ruler
    lacking a people. 'Ruin' best fits the antithesis to royal splendor.
- source_word: רָזוֹן
  chosen: a ruler’s
  alternatives:
  - of a prince
  - of a noble
  lexicon: HALOT
  rationale: The term refers to one in authority, often a ruler or prince. 'Ruler'
    is broad and natural, and it pairs well with 'king' in the first colon without
    forcing a strict distinction the Hebrew may not intend.
