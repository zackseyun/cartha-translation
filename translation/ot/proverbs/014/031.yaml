theological_decisions:
- issue: Referent of the suffix in וּמְכַבְּדוֹ
  chosen_reading: The pronoun refers to God ('his Maker'), so the second colon means
    that honoring God is shown by being gracious to the needy.
  alternative_readings:
  - The pronoun refers to the poor person, yielding 'whoever honors the poor is gracious
    to the needy'
  rationale: 'The antithetical parallelism favors a movement from insulting the poor
    person''s Maker to honoring that Maker by generosity toward the needy. This reading
    is widely reflected in major translations and best preserves the theological logic
    of the proverb: treatment of the vulnerable reflects one''s posture toward God.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it without documentation)
