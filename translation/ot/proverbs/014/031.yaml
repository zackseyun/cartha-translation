id: PRO.14.31
reference: Proverbs 14:31
source:
  edition: WLC
  text: עֹ֣שֵֽׁק דָּ֭ל חֵרֵ֣ף עֹשֵׂ֑/הוּ וּ֝/מְכַבְּד֗/וֹ חֹנֵ֥ן אֶבְיֽוֹן׃
translation:
  text: Whoever oppresses the poor insults his Maker, but whoever honors him is gracious
    to the needy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but whoever honors the poor is gracious to the needy.' The Hebrew pronoun
      in 'honors him' can be read as referring either to the poor person or to his
      Maker; the main text takes it as referring to God because of the parallelism.
    reason: alternative_reading
lexical_decisions:
- source_word: עֹשֵׁק
  chosen: Whoever oppresses
  alternatives:
  - He who oppresses
  - One who exploits
  lexicon: HALOT
  rationale: Qal participle functioning substantivally; English indefinite relative
    clause gives natural proverbial force. 'Oppresses' fits the semantic range of
    unjust pressure/exploitation better than the broader 'wrongs.'
- source_word: דָּל
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דָּל denotes one who is poor, weak, or socially powerless. In this wisdom
    context 'the poor' is the clearest and most idiomatic rendering, while still implying
    vulnerability.
- source_word: חֵרֵף
  chosen: insults
  alternatives:
  - reproaches
  - taunts
  - blasphemes
  lexicon: HALOT
  rationale: The verb means to reproach, scorn, or treat with contempt. 'Insults'
    communicates the affront to God implied by mistreating the poor without sounding
    archaic like 'reproaches.'
- source_word: עֹשֵׂהוּ
  chosen: his Maker
  alternatives:
  - his Creator
  - the one who made him
  lexicon: HALOT
  rationale: 'The suffix most naturally refers back to the poor person: the oppressor
    insults the poor man''s Maker. ''Maker'' is concise, idiomatic in wisdom literature,
    and preserves the theological point that the poor bear God''s creaturely dignity.'
- source_word: וּמְכַבְּדוֹ
  chosen: but whoever honors him
  alternatives:
  - but he who honors him
  - but whoever honors Him
  lexicon: HALOT
  rationale: 'The pronominal suffix is ambiguous in isolation, but the parallel with
    ''his Maker'' strongly supports God as the referent here: honoring God is expressed
    by treatment of the needy. Lowercase ''him'' is used because Hebrew does not mark
    divine pronouns orthographically in the consonantal text, but the referent is
    documented and footnoted.'
- source_word: חֹנֵן
  chosen: is gracious to
  alternatives:
  - shows favor to
  - has mercy on
  - is kind to
  lexicon: HALOT
  rationale: The participle conveys showing favor or grace. 'Is gracious to' preserves
    the lexical connection to grace/favor more closely than the flatter 'is kind to.'
- source_word: אֶבְיוֹן
  chosen: the needy
  alternatives:
  - the poor
  - the destitute
  lexicon: HALOT
  rationale: אֶבְיוֹן often emphasizes neediness or destitution. Rendering it as 'the
    needy' preserves a distinction from דָּל earlier in the verse and reflects the
    semantic nuance.
