id: PRO.14.15
reference: Proverbs 14:15
source:
  edition: WLC
  text: פֶּ֭תִי יַאֲמִ֣ין לְ/כָל דָּבָ֑ר וְ֝/עָר֗וּם יָבִ֥ין לַ/אֲשֻׁרֽ/וֹ־׃
translation:
  text: A simple man believes every word, but a prudent man considers his steps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'believes everything' or 'believes every matter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּתִי
  chosen: a simple man
  alternatives:
  - the naive man
  - a gullible man
  - the simple
  lexicon: HALOT
  rationale: פֶּתִי in Proverbs denotes the inexperienced, easily led person rather
    than merely someone of low intelligence. 'Simple man' preserves the wisdom-literature
    category and the masculine singular form. 'Naive' is possible, but 'simple' better
    matches the established proverbial contrast with the prudent.
- source_word: יַאֲמִין
  chosen: believes
  alternatives:
  - trusts
  - is credulous toward
  lexicon: HALOT
  rationale: Hiphil of אמן here carries the sense of accepting as true or trustworthy.
    'Believes' is the most natural English equivalent in this context and fits the
    object 'every word/thing.'
- source_word: לְכָל דָּבָר
  chosen: every word
  alternatives:
  - everything
  - every matter
  - every thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this proverb, the sense
    is broad credulity toward whatever is said or presented. 'Every word' preserves
    the Hebrew noun more formally while still communicating indiscriminate belief.
    The broader alternative 'everything' is viable and worth preserving in a footnote.
- source_word: עָרוּם
  chosen: a prudent man
  alternatives:
  - the shrewd man
  - a sensible man
  - the crafty man
  lexicon: HALOT
  rationale: In Proverbs, עָרוּם is often positive in wisdom contexts, referring to
    prudence or shrewd discernment, not deceit. 'Prudent man' captures the commendatory
    sense and contrasts well with פֶּתִי.
- source_word: יָבִין
  chosen: considers
  alternatives:
  - understands
  - gives thought to
  - discerns
  lexicon: HALOT
  rationale: בין commonly denotes discernment or understanding. With the following
    phrase about one's course, the sense is practical reflection. 'Considers' expresses
    active, careful thought in idiomatic English.
- source_word: לַאֲשֻׁרוֹ
  chosen: his steps
  alternatives:
  - his path
  - his way
  - his course
  lexicon: HALOT
  rationale: The noun refers to step, gait, or course of movement. In context it is
    metaphorical for one's conduct or course of life. 'His steps' keeps the concrete
    Hebrew image while remaining natural in English.
