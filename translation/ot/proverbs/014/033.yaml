id: PRO.14.33
reference: Proverbs 14:33
source:
  edition: WLC
  text: בְּ/לֵ֣ב נָ֭בוֹן תָּנ֣וּחַ חָכְמָ֑ה וּ/בְ/קֶ֥רֶב כְּ֝סִילִ֗ים תִּוָּדֵֽעַ׃
translation:
  text: Wisdom rests in the heart of a discerning man, but in the midst of fools it
    makes itself known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Wisdom rests in the heart of one who has understanding, but among fools
      it becomes known.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֵב
  chosen: in the heart of
  alternatives:
  - within the heart of
  - in the mind of
  lexicon: HALOT
  rationale: לֵב literally means 'heart,' but in Hebrew anthropology it includes the
    inner mind/will. 'In the heart of' preserves the concrete Hebrew image while remaining
    natural English.
- source_word: נָבוֹן
  chosen: a discerning man
  alternatives:
  - one who has understanding
  - an understanding man
  - a prudent man
  lexicon: HALOT
  rationale: נָבוֹן denotes a person of understanding/discernment. Because the Hebrew
    adjective is grammatically masculine singular and refers to a representative individual,
    'a discerning man' follows the project's gender-accurate policy while conveying
    wisdom-literature style.
- source_word: תָּנוּחַ
  chosen: rests
  alternatives:
  - settles
  - reposes
  - abides
  lexicon: HALOT
  rationale: From נוח, the verb conveys coming to rest or settling. 'Rests' is concise,
    idiomatic, and preserves the proverb's image of wisdom dwelling calmly in the
    discerning person.
- source_word: חָכְמָה
  chosen: Wisdom
  alternatives:
  - wisdom
  lexicon: HALOT
  rationale: The noun is the subject of the first clause. Capitalization is stylistic
    here to reflect the abstract quality prominently placed in the clause, not to
    personify beyond the text's warrant.
- source_word: וּבְקֶרֶב
  chosen: but in the midst of
  alternatives:
  - and within
  - and among
  - but among
  lexicon: HALOT
  rationale: The conjunction marks contrast with the first clause in context, so 'but'
    brings out the adversative sense. קֶרֶב means 'midst/inner part'; 'in the midst
    of' preserves the spatial metaphor.
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - the foolish
  - stupid people
  lexicon: HALOT
  rationale: כְּסִילִים is the standard wisdom-literature term for morally and intellectually
    dull people. 'Fools' is the established and accurate English equivalent.
- source_word: תִּוָּדֵעַ
  chosen: it makes itself known
  alternatives:
  - it is made known
  - it becomes known
  - it is known
  lexicon: HALOT
  rationale: The Niphal of ידע can be passive ('is known') or reflexive/inchoative
    ('makes itself known,' 'becomes known'). Here the sense is that wisdom, unlike
    its quiet resting in the discerning heart, becomes outwardly evident among fools.
    'It makes itself known' best captures that contrast.
