id: PRO.14.8
reference: Proverbs 14:8
source:
  edition: WLC
  text: חָכְמַ֣ת עָ֭רוּם הָבִ֣ין דַּרְכּ֑/וֹ וְ/אִוֶּ֖לֶת כְּסִילִ֣ים מִרְמָֽה׃
translation:
  text: The wisdom of the prudent is to understand his way, but the folly of fools
    is deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The wisdom of the shrewd is to discern his path.'
    reason: lexical_alternative
  - marker: b
    text: '''Deceit'' may refer either to deceptive behavior or to self-deception
      as the defining mark of fools'' folly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמַת
  chosen: wisdom of
  alternatives:
  - wisdom
  lexicon: HALOT
  rationale: 'Construct form of חָכְמָה, introducing a genitival relationship with
    עָרוּם: ''the wisdom of the prudent.'' Retaining the construct is more natural
    in English than a more wooden ''wisdom belongs to.'''
- source_word: עָרוּם
  chosen: the prudent
  alternatives:
  - the shrewd
  - the sensible
  - the crafty
  lexicon: HALOT
  rationale: In Proverbs עָרוּם often has a positive sense of prudence or shrewd discernment
    rather than negative craftiness. 'Prudent' fits the wisdom context and avoids
    importing a sinister nuance that the contrast with fools does not require.
- source_word: הָבִין
  chosen: is to understand
  alternatives:
  - understands
  - gives understanding to
  - discerns
  lexicon: HALOT
  rationale: The infinitive/verb form here functions predicatively after 'wisdom of
    the prudent,' expressing what that wisdom consists in. 'Is to understand' preserves
    the proverbial definition-like force better than a simple finite 'understands.'
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes one's way, path, or manner of life. 'His way'
    is idiomatic in English and preserves the moral/life-course sense common in Proverbs.
    The 3ms suffix is retained as 'his' in keeping with the gender-accurate policy
    for representative masculine forms.
- source_word: וְאִוֶּלֶת
  chosen: but the folly
  alternatives:
  - and the folly
  - while the folly
  lexicon: HALOT
  rationale: The conjunction marks contrast in this antithetical proverb. English
    'but' best conveys the adversative relationship between the two cola.
- source_word: כְּסִילִים
  chosen: of fools
  alternatives:
  - of the foolish
  lexicon: HALOT
  rationale: Plural noun in construct/genitival relation with 'folly.' 'Fools' is
    the standard wisdom-literature term and preserves the concrete personal contrast
    with 'the prudent.'
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - deception
  - treachery
  lexicon: HALOT
  rationale: מִרְמָה denotes deceit or deception. 'Deceit' is concise and proverbial
    in tone. The clause likely means that what characterizes or constitutes the fools'
    folly is deceit, whether self-deception or deceptive conduct.
