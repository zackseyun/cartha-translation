theological_decisions:
- issue: Representative masculine suffix in דַּרְכּוֹ
  chosen_reading: Rendered as 'his way'
  alternative_readings:
  - their way
  - one's way
  rationale: The Hebrew has a singular masculine suffix functioning generically for
    the prudent person. Per translation philosophy, gender-accurate rendering is preferred
    over flattening to gender-neutral language unless context demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Moral nuance of עָרוּם
  chosen_reading: Positive 'prudent' rather than negative 'crafty'
  alternative_readings:
  - crafty
  - cunning
  rationale: The verse contrasts wisdom with folly, indicating a commendatory sense.
    Rendering the term negatively would distort the proverb's ethical polarity.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
