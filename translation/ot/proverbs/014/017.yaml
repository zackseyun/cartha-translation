id: PRO.14.17
reference: Proverbs 14:17
source:
  edition: WLC
  text: קְֽצַר אַ֭פַּיִם יַעֲשֶׂ֣ה אִוֶּ֑לֶת וְ/אִ֥ישׁ מְ֝זִמּ֗וֹת יִשָּׂנֵֽא־׃
translation:
  text: A short-tempered man acts foolishly, and a man of schemes is hated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'quick-tempered' for 'short-tempered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a man of evil schemes'; the Hebrew 'schemes/plans' can carry a negative
      sense in wisdom literature.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְצַר אַפַּיִם
  chosen: short-tempered
  alternatives:
  - quick-tempered
  - short of temper
  - impatient
  lexicon: HALOT
  rationale: Literally 'short of nostrils/anger,' a Hebrew idiom for being quick to
    anger. 'Short-tempered' is natural modern English and preserves the idiomatic
    sense without over-paraphrase.
- source_word: יַעֲשֶׂה
  chosen: acts
  alternatives:
  - does
  - commits
  lexicon: HALOT
  rationale: The verb is the common 'do/make.' In English, 'acts foolishly' is more
    idiomatic with the following abstract noun than 'does folly,' while still closely
    reflecting the Hebrew.
- source_word: אִוֶּלֶת
  chosen: foolishly
  alternatives:
  - folly
  - a foolish thing
  lexicon: HALOT
  rationale: The noun denotes folly/foolishness. Rendering it adverbially with 'acts'
    produces clear English while preserving the sense of behaving in a foolish way.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in Proverbs often
    presents a representative type. Per the translation philosophy, a gender-accurate
    rendering is preferred over a gender-neutral one.
- source_word: מְזִמּוֹת
  chosen: schemes
  alternatives:
  - plans
  - devices
  - evil plans
  lexicon: HALOT
  rationale: The noun can denote plans or devices, often with a negative nuance in
    wisdom literature. 'Schemes' captures the likely pejorative force here without
    making the evil explicit beyond what the context suggests.
- source_word: יִשָּׂנֵא
  chosen: is hated
  alternatives:
  - will be hated
  - makes himself hated
  lexicon: HALOT
  rationale: The Niphal is naturally rendered as passive, 'is hated.' English present
    tense suits the proverb's gnomic force. 'Makes himself hated' is interpretive
    and less direct than the Hebrew form.
