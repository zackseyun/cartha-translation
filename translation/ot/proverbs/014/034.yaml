id: PRO.14.34
reference: Proverbs 14:34
source:
  edition: WLC
  text: צְדָקָ֥ה תְרֽוֹמֵֽם גּ֑וֹי וְ/חֶ֖סֶד לְאֻמִּ֣ים חַטָּֽאת־׃
translation:
  text: Righteousness exalts a nation, but sin is a disgrace to peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew of the second line is difficult. Traditionally understood to mean
      that sin brings reproach or disgrace on peoples; alternatively, the word translated
      'sin' may be rendered 'disgrace,' and the word behind 'sin' in the clause has
      also been taken in the rare sense 'reproach.'
    reason: alternative_reading
lexical_decisions:
- source_word: צְדָקָה
  chosen: Righteousness
  alternatives:
  - justice
  - right conduct
  lexicon: HALOT
  rationale: The noun denotes what is right or just in moral/social terms. 'Righteousness'
    best preserves the broad ethical sense in wisdom literature and aligns with the
    project's default rendering for cognate theological vocabulary, while 'justice'
    is a viable contextual alternative preserved here.
- source_word: תְרוֹמֵם
  chosen: exalts
  alternatives:
  - lifts up
  - raises high
  lexicon: HALOT
  rationale: From רום, 'to raise/highly elevate.' 'Exalts' is idiomatic and fitting
    for a proverb about the public standing of a nation, preserving both literal elevation
    imagery and figurative honor.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  - gentile nation
  lexicon: HALOT
  rationale: Here the term refers generically to a political/ethnic collective, not
    specifically to non-Israelite nations in contrast with Israel. 'Nation' is the
    most natural English equivalent in this proverb.
- source_word: חֶסֶד
  chosen: sin
  alternatives:
  - disgrace
  - shameful thing
  - loyalty/kindness (if repointed or interpreted differently)
  lexicon: HALOT
  rationale: 'Although the consonantal text reads חֶסֶד, in this context the traditional
    and contextually compelling sense is pejorative, yielding the proverb''s antithetical
    parallelism with ''righteousness'' and ''sin''/''disgrace.'' Many interpreters
    understand the term here in the rare sense of ''reproach/disgrace'' or relate
    the clause closely to the following חַטָּאת. The main translation follows the
    widely accepted sense of the whole clause: national sin brings shame.'
- source_word: לְאֻמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: Plural of a people-group term. 'Peoples' preserves the plural and avoids
    flattening the poetic parallel with singular 'nation' in the first colon.
- source_word: חַטָּאת
  chosen: a disgrace
  alternatives:
  - sin
  - an offense
  lexicon: HALOT
  rationale: 'The noun can mean ''sin'' or, by extension in context, the shame/reproach
    associated with sin. Rendering it as ''a disgrace'' produces a clear and natural
    English antithesis: righteousness exalts, sin disgraces. This also reflects the
    probable force of the second colon as a statement of public shame.'
