theological_decisions:
- issue: Interpretation of the second colon וְחֶסֶד לְאֻמִּים חַטָּאת
  chosen_reading: Render the clause as 'but sin is a disgrace to peoples'
  alternative_readings:
  - '''but loyalty/kindness to peoples is sin'''
  - '''but disgrace is for peoples a sin'''
  rationale: The Hebrew of the second colon is notoriously difficult, especially because
    חֶסֶד usually carries a positive sense ('steadfast love,' 'kindness,' 'loyalty').
    In this proverb, however, the broader poetic parallel strongly favors a negative
    counterpart to 'righteousness exalts a nation.' The traditional understanding,
    reflected in many major translations, is that national sin brings reproach/shame.
    This preserves the antithetical structure and yields coherent wisdom-style sense
    without importing a sectarian doctrinal reading.
  doctrine_reference: Translation philosophy §3 (preserve genuine ambiguity where
    contested)
