id: PRO.14.25
reference: Proverbs 14:25
source:
  edition: WLC
  text: מַצִּ֣יל נְ֭פָשׁוֹת עֵ֣ד אֱמֶ֑ת וְ/יָפִ֖חַ כְּזָבִ֣ים מִרְמָֽה׃
translation:
  text: A truthful witness rescues lives, but one who breathes out lies is deceitful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A true witness delivers souls/persons.' Here 'lives' reflects Hebrew
      nephashot in the sense of persons or lives preserved, not specifically immaterial
      souls.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'breathes out lies.' The Hebrew uses vivid speech imagery for
      uttering falsehood.
    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be rendered more literally, 'and one who breathes
      out lies is deceit,' or understood adverbially, 'breathes out lies deceitfully.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַצִּיל
  chosen: rescues
  alternatives:
  - delivers
  - saves
  lexicon: HALOT
  rationale: The Hiphil participle of נצל denotes causing deliverance or rescue. 'Rescues'
    is natural modern English and fits the proverb's practical setting without importing
    overtly soteriological overtones that 'saves' might suggest.
- source_word: נְפָשׁוֹת
  chosen: lives
  alternatives:
  - souls
  - persons
  lexicon: HALOT
  rationale: In wisdom literature נֶפֶשׁ often refers to the life or person rather
    than an immaterial soul. 'Lives' best fits the context of a witness preserving
    people from harm or death; 'souls' would sound misleadingly dualistic in English.
- source_word: עֵד אֱמֶת
  chosen: a truthful witness
  alternatives:
  - a true witness
  - an honest witness
  lexicon: HALOT
  rationale: The construct phrase means a witness characterized by truth. 'Truthful
    witness' is idiomatic and preserves the moral quality of reliability better than
    the slightly more ambiguous 'true witness.'
- source_word: וְיָפִחַ
  chosen: but one who breathes out
  alternatives:
  - but he who utters
  - but he who speaks forth
  lexicon: HALOT
  rationale: The verb פוח literally evokes breathing or puffing out, used figuratively
    for uttering speech. Retaining 'breathes out' preserves the vivid Hebrew imagery
    while remaining understandable in English.
- source_word: כְּזָבִים
  chosen: lies
  alternatives:
  - falsehoods
  - deceptions
  lexicon: HALOT
  rationale: The plural noun denotes false statements. 'Lies' is the clearest and
    most natural rendering in contemporary English.
- source_word: מִרְמָה
  chosen: is deceitful
  alternatives:
  - is deceit
  - is treachery
  - deceit
  lexicon: HALOT
  rationale: The final noun stands tersely as the predicate/complement after the verbal
    clause. Rendering it as 'is deceitful' gives idiomatic English while preserving
    the characterization of the lying witness as marked by deceit. A more literal
    'deceit' is possible but awkward in English without supplying a copula and article.
