theological_decisions:
- issue: Meaning of 'fear of the LORD' in wisdom literature
  chosen_reading: Retain 'fear' rather than interpretively reducing it to 'reverence'
    or 'worship.'
  alternative_readings:
  - The reverence of the LORD is a fountain of life
  - Reverence for the LORD is a fountain of life
  rationale: The Hebrew expression is a key theological motif in Proverbs, encompassing
    awe, reverence, and obedient posture before God. Rendering it as 'fear' preserves
    the canonical tension rather than resolving it into a softer term.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
- issue: Force of the infinitive לָסוּר
  chosen_reading: 'Express the clause as result/purpose: the fear of the LORD turns
    a person away from death''s snares.'
  alternative_readings:
  - The fear of the LORD is a fountain of life, to turn away from the snares of death
  - The fear of the LORD is a fountain of life for turning away from the snares of
    death
  rationale: The Hebrew infinitive with ל can be rendered woodenly as 'to turn away,'
    but in English a participial/result expression better communicates the proverb's
    sense without adding doctrinal content.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
