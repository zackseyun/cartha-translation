id: PRO.14.27
reference: Proverbs 14:27
source:
  edition: WLC
  text: יִרְאַ֣ת יְ֭הוָה מְק֣וֹר חַיִּ֑ים לָ֝/ס֗וּר מִ/מֹּ֥קְשֵׁי מָֽוֶת׃
translation:
  text: The fear of the LORD is a fountain of life, turning one away from the snares
    of death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spring of life.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to turn away from the snares of death.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאַת
  chosen: fear of
  alternatives:
  - reverence for
  - fear
  lexicon: HALOT
  rationale: 'Construct form with YHWH: denotes reverent fear/awe directed toward
    the LORD. ''Fear of'' preserves the established wisdom-theme expression without
    flattening it to mere respect.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration.
- source_word: מְקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: The noun denotes a spring/fountain as a life-giving source. 'Fountain'
    is idiomatic in English wisdom literature and preserves the metaphor vividly.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, the Hebrew commonly functions as the abstract
    singular 'life' in English.
- source_word: לָסוּר
  chosen: turning one away
  alternatives:
  - to turn away
  - for turning away
  - so as to turn away
  lexicon: HALOT
  rationale: 'The prefixed infinitive expresses result/purpose: the fear of the LORD
    functions to turn a person away. ''Turning one away'' reads naturally while preserving
    the infinitival sense.'
- source_word: מִמֹּקְשֵׁי
  chosen: from the snares of
  alternatives:
  - from the traps of
  - from the nets of
  lexicon: HALOT
  rationale: The noun refers to snares/traps. 'Snares' fits proverbial style and the
    metaphor of hidden deadly entanglements.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Straightforward rendering of the noun; in Proverbs it can carry both
    literal and moral-spiritual ruin, but the English should preserve that breadth
    without over-specification.
