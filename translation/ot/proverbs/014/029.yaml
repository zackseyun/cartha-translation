id: PRO.14.29
reference: Proverbs 14:29
source:
  edition: WLC
  text: אֶ֣רֶךְ אַ֭פַּיִם רַב תְּבוּנָ֑ה וּ/קְצַר ר֝֗וּחַ מֵרִ֥ים אִוֶּֽלֶת־־׃
translation:
  text: One who is slow to anger has great understanding, but one who is short of
    spirit exalts folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'short of spirit'; that is, impatient or short-tempered.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶךְ אַפַּיִם
  chosen: one who is slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'long of nostrils/faces' and denotes
    patience or slowness to anger. 'Slow to anger' is a clear modern English equivalent
    that preserves the idiomatic sense without wooden literalism.
- source_word: רַב
  chosen: has great
  alternatives:
  - is abundant in
  - is great in
  lexicon: HALOT
  rationale: Here רַב functions predicatively with תבונה, expressing abundance or
    greatness. 'Has great' yields natural English while preserving the sense of possessing
    much understanding.
- source_word: תְּבוּנָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: תבונה commonly denotes understanding, discernment, or insight. 'Understanding'
    is the most straightforward and idiomatic rendering in wisdom literature.
- source_word: קְצַר רוּחַ
  chosen: one who is short of spirit
  alternatives:
  - impatient
  - short-tempered
  lexicon: HALOT
  rationale: The phrase literally means 'short of spirit' and contrasts with 'slow
    to anger.' It can denote impatience or a quick temper. I retained the more literal
    expression in the main text to preserve the Hebrew imagery and the anthropological
    term 'spirit,' while the more idiomatic alternatives are preserved in a footnote.
- source_word: מֵרִים
  chosen: exalts
  alternatives:
  - raises high
  - displays
  lexicon: HALOT
  rationale: The Hiphil participle of רום means 'to raise' or 'to exalt.' In context,
    the quick-tempered person elevates or makes folly conspicuous. 'Exalts' preserves
    the metaphor of lifting up.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: In Proverbs this noun regularly denotes folly or foolishness as a moral-intellectual
    category. 'Folly' is concise and idiomatic in wisdom literature.
