id: PRO.14.30
reference: Proverbs 14:30
source:
  edition: WLC
  text: חַיֵּ֣י בְ֭שָׂרִים לֵ֣ב מַרְפֵּ֑א וּ/רְקַ֖ב עֲצָמ֣וֹת קִנְאָֽה׃
translation:
  text: A tranquil heart is life to the body, but jealousy is rottenness to the bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A healing heart is life to the flesh/body.' The Hebrew term rendered
      'tranquil' is more literally related to healing or health.
    reason: lexical_alternative
  - marker: b
    text: Or 'envy' for 'jealousy.' The Hebrew word can denote jealousy, envy, or
      zeal depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיֵּי
  chosen: life
  alternatives:
  - life of
  - living
  lexicon: HALOT
  rationale: Construct plural of חַיִּים used idiomatically for 'life.' In this verbless
    proverb, rendering as the predicate noun 'life' gives natural English while preserving
    the Hebrew sense.
- source_word: בְשָׂרִים
  chosen: the body
  alternatives:
  - flesh
  - the flesh
  lexicon: HALOT
  rationale: Though literally 'flesh,' in this wisdom context it refers to the physical
    body as a whole. 'Body' communicates the idiomatic sense in contemporary English
    better than the more wooden 'flesh,' which could mislead readers toward Pauline
    theological associations not present here.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Standard rendering for the Hebrew anthropological term. Here it denotes
    the inner disposition or emotional center; 'heart' preserves the metaphor and
    is idiomatic in English wisdom literature.
- source_word: מַרְפֵּא
  chosen: tranquil
  alternatives:
  - healing
  - healthy
  - calm
  - sound
  lexicon: HALOT
  rationale: The noun basically denotes healing, health, or remedy. In construct-like
    apposition with 'heart,' the sense is a heart characterized by calmness/wholesomeness
    that gives life. English 'a healing heart' is possible but awkward and potentially
    ambiguous; 'tranquil heart' captures the resultant state implied by the noun in
    context. The more literal lexical value is preserved in a footnote.
- source_word: וּרְקַב
  chosen: but ... is rottenness
  alternatives:
  - and ... is decay
  - and ... is rotting
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively ('but') because the proverb
    contrasts two conditions. רֶקֶב denotes decay/rottenness; 'rottenness' is vivid
    and idiomatic here.
- source_word: עֲצָמוֹת
  chosen: the bones
  alternatives:
  - bones
  lexicon: HALOT
  rationale: Literal rendering retained. In Hebrew anthropology, 'bones' can represent
    the deep physical frame or inner vitality; the concrete image should be preserved.
- source_word: קִנְאָה
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: HALOT
  rationale: The noun can denote zeal, jealousy, or envy depending on context. Here
    the negative parallel with 'rottenness to the bones' favors the sense of resentful
    jealousy/envy. 'Jealousy' is chosen as a broad English term, with 'envy' preserved
    as an alternative in a footnote because many English versions take it that way.
