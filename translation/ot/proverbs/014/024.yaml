id: PRO.14.24
reference: Proverbs 14:24
source:
  edition: WLC
  text: עֲטֶ֣רֶת חֲכָמִ֣ים עָשְׁרָ֑/ם אִוֶּ֖לֶת כְּסִילִ֣ים אִוֶּֽלֶת׃
translation:
  text: The crown of the wise is their wealth, but the folly of fools is folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following some ancient versions and interpreters, 'the wealth of fools
      is folly.' The Masoretic Text reads literally, 'the folly of fools is folly.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - ornament
  - wreath
  lexicon: HALOT
  rationale: The noun denotes a crown or wreath as a symbol of honor. 'Crown' is the
    most natural English rendering and preserves the metaphor of visible distinction
    or honor.
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise men
  lexicon: HALOT
  rationale: The plural adjective/noun refers to wise people generally. 'The wise'
    is idiomatic English and avoids adding 'men' where the Hebrew here is not specifically
    male-individualized in sense.
- source_word: עָשְׁרָם
  chosen: their wealth
  alternatives:
  - their riches
  - their abundance
  lexicon: HALOT
  rationale: The noun עֹשֶׁר means wealth or riches, with 3mp suffix 'their.' 'Wealth'
    is clear modern English and fits the proverb's contrast.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  - senselessness
  lexicon: HALOT
  rationale: The term denotes folly or foolishness as a characteristic quality. 'Folly'
    is concise and proverbially natural in English.
- source_word: כְּסִילִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: 'The noun refers to fools in the wisdom-literature sense: morally and
    intellectually dull people. ''Fools'' is the standard and clearest rendering.'
- source_word: אִוֶּלֶת כְּסִילִים אִוֶּלֶת
  chosen: the folly of fools is folly
  alternatives:
  - the wealth of fools is folly
  - the correction of fools is folly
  lexicon: HALOT
  rationale: 'The Hebrew as pointed in the MT repeats אִוֶּלֶת, yielding an emphatic
    tautological contrast: fools'' distinguishing mark is simply folly. This is likely
    intentional wordplay in Proverbs. Some ancient versions and interpreters reflect
    a different Vorlage or interpretive smoothing (''wealth of fools is folly''),
    but the MT''s repetition is best preserved in the main text.'
