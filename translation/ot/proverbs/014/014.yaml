id: PRO.14.14
reference: Proverbs 14:14
source:
  edition: WLC
  text: מִ/דְּרָכָ֣י/ו יִ֭שְׂבַּע ס֣וּג לֵ֑ב וּ֝/מֵ/עָלָ֗י/ו אִ֣ישׁ טֽוֹב׃
translation:
  text: The backslider in heart will be filled with the fruit of his ways, and a good
    man with what comes from himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The one who turns away in heart will be filled from his own ways, and
      a good man from his own deeds.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the second line is difficult; the sense is likely that the
      good man is satisfied from what proceeds from his own conduct, in contrast to
      the inwardly wayward person.
    reason: alternative_reading
lexical_decisions:
- source_word: מִדְּרָכָיו
  chosen: with the fruit of his ways
  alternatives:
  - from his ways
  - by his ways
  lexicon: HALOT
  rationale: 'The preposition מִן with ''his ways'' marks source: he is satisfied
    from what his conduct produces. In English, ''filled with the fruit of his ways''
    makes the causal/resultative sense clear and idiomatic while preserving the metaphor
    of being filled from one''s conduct.'
- source_word: יִשְׂבַּע
  chosen: will be filled
  alternatives:
  - will be satisfied
  - will have his fill
  lexicon: HALOT
  rationale: The verb commonly means 'be sated/satisfied/full.' 'Will be filled' preserves
    the concrete metaphor and works for both cola.
- source_word: סוּג לֵב
  chosen: the backslider in heart
  alternatives:
  - the one who turns away in heart
  - the faithless in heart
  - the apostate in heart
  lexicon: HALOT
  rationale: סוּג denotes turning back/away. In Proverbs this describes moral defection
    rather than mere emotional instability. 'Backslider in heart' is concise and traditional,
    but still understandable; 'in heart' preserves the inward moral orientation indicated
    by לֵב.
- source_word: וּמֵעָלָיו
  chosen: and ... with what comes from himself
  alternatives:
  - and from above him
  - and from upon him
  - and beyond him
  lexicon: HALOT
  rationale: 'The phrase is difficult and elliptical. In parallel with ''from his
    ways,'' it most naturally indicates source with reference to the good man himself:
    he is satisfied from what proceeds from him, i.e., from his own conduct/character.
    Rendering the sense rather than the opaque literal prepositional phrase best reflects
    optimal equivalence while preserving the parallelism.'
- source_word: אִישׁ טוֹב
  chosen: a good man
  alternatives:
  - a good person
  - a good one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and representative. Per
    translation philosophy, gender-accurate rendering is preferred where generic force
    is present. 'A good man' matches the source form and proverbial style.
