id: PRO.14.3
reference: Proverbs 14:3
source:
  edition: WLC
  text: בְּֽ/פִי אֱ֭וִיל חֹ֣טֶר גַּאֲוָ֑ה וְ/שִׂפְתֵ֥י חֲ֝כָמִ֗ים תִּשְׁמוּרֵֽ/ם־׃
translation:
  text: In the mouth of a fool is a rod of pride, but the lips of the wise will guard
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a shoot of pride.' The Hebrew word translated 'rod' can also mean 'shoot'
      or 'branch,' but in this context the image of a rod better fits the proverb's
      warning about proud speech.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' likely refers to the wise, that is, the lips of the wise
      protect their owners.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפִי
  chosen: In the mouth of
  alternatives:
  - By the mouth of
  - From the mouth of
  lexicon: HALOT
  rationale: The preposition ב plus פֶּה here is best rendered locatively, introducing
    what is found in or proceeds from the fool's speech. 'In the mouth of' preserves
    the Hebrew image and proverb style better than a more interpretive paraphrase.
- source_word: אֱוִיל
  chosen: a fool
  alternatives:
  - the fool
  - a foolish person
  lexicon: HALOT
  rationale: אֱוִיל is the standard wisdom-term for a morally dull or obstinate fool,
    not merely someone unintelligent. 'A fool' is the natural English equivalent in
    Proverbs and preserves the representative singular.
- source_word: חֹטֶר
  chosen: a rod
  alternatives:
  - a shoot
  - a staff
  - a scepter
  lexicon: HALOT
  rationale: Though חֹטֶר can denote a shoot/branch in some contexts, in this proverb
    the metaphor works better as 'rod,' an instrument associated with striking or
    authority. In context with 'pride,' it likely depicts arrogant speech as something
    that brings punishment or functions as a proud weapon. 'Rod' best preserves the
    compact metaphor without overexplaining it.
- source_word: גַּאֲוָה
  chosen: of pride
  alternatives:
  - of arrogance
  - of haughtiness
  lexicon: HALOT
  rationale: גַּאֲוָה denotes pride, exaltation, or arrogance. 'Pride' is the most
    direct and idiomatic rendering here; 'arrogance' is possible but slightly more
    interpretive. The genitive construction is retained as 'rod of pride' to preserve
    the Hebrew terseness.
- source_word: וְשִׂפְתֵי
  chosen: but the lips of
  alternatives:
  - and the lips of
  lexicon: HALOT
  rationale: While ו can be simply 'and,' English proverb style often uses adversative
    'but' where the second colon contrasts with the first. 'Lips' is retained rather
    than paraphrasing as 'words' or 'speech,' preserving the Hebrew poetic parallel
    with 'mouth.'
- source_word: חֲכָמִים
  chosen: the wise
  alternatives:
  - wise people
  - the wise ones
  lexicon: HALOT
  rationale: The masculine plural adjective functions substantivally. 'The wise' is
    idiomatic in English wisdom literature and preserves the representative class
    sense without unnecessary expansion.
- source_word: תִּשְׁמוּרֵם
  chosen: will guard them
  alternatives:
  - will preserve them
  - will protect them
  - will guard themselves
  lexicon: HALOT
  rationale: From שׁמר, the verb commonly means guard/keep/protect. The suffix is
    3mp ('them'). The feminine singular verb agrees with the subject 'lips.' 'Will
    guard them' is the most straightforward rendering, though the antecedent of 'them'
    is implicit and somewhat ambiguous. It likely refers to the wise themselves by
    sense, but the Hebrew leaves it compressed; the English keeps the pronoun rather
    than resolving the ambiguity too strongly.
