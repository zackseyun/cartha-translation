theological_decisions:
- issue: Relationship between צְדָקָה and מִשְׁפָּט
  chosen_reading: Render them distinctly as 'righteousness' and 'justice'
  alternative_readings:
  - Render both with overlapping terms such as 'right'/'justice' or 'integrity'/'fairness'
  rationale: The proverb intentionally contrasts modest possessions marked by moral
    uprightness with abundant returns gained apart from justice. Distinguishing the
    two terms preserves the Hebrew ethical nuance rather than flattening them into
    near-synonyms.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
