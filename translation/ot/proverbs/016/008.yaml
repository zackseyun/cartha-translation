id: PRO.16.8
reference: Proverbs 16:8
source:
  edition: WLC
  text: טוֹב מְ֭עַט בִּ/צְדָקָ֑ה מֵ/רֹ֥ב תְּ֝בוּא֗וֹת בְּ/לֹ֣א מִשְׁפָּֽט־׃
translation:
  text: Better a little with righteousness than great income without justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'produce,' 'revenue,' or 'harvests' for 'income.' The Hebrew term can
      refer to agricultural yield or material returns more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better
  alternatives:
  - Good
  - Better is
  lexicon: HALOT
  rationale: In proverb form, טוֹב commonly functions comparatively ('better ... than
    ...') rather than as a simple predicate 'good.' English idiom favors the elliptical
    comparative 'Better ... than ...'.
- source_word: מְעַט
  chosen: a little
  alternatives:
  - little
  - a small amount
  lexicon: HALOT
  rationale: Refers to a small quantity or modest possession. 'A little' is natural
    English in a wisdom comparison and preserves the concise force.
- source_word: בִּצְדָקָה
  chosen: with righteousness
  alternatives:
  - in righteousness
  - with justice
  - rightly
  lexicon: HALOT
  rationale: 'The preposition ב plus צְדָקָה here expresses accompanying manner or
    quality: possessing little characterized by righteousness. ''Righteousness'' is
    preferred over ''justice'' because in Hebrew wisdom literature צדקה often denotes
    uprightness/integrity more broadly, while the second colon uses משפט, making a
    distinction worth preserving.'
- source_word: מֵרֹב
  chosen: than great
  alternatives:
  - than abundance of
  - than much
  lexicon: HALOT
  rationale: Introduces the comparative second term. Because it modifies the following
    plural noun, idiomatic English compresses the phrase to 'than great ...' rather
    than the more wooden 'than abundance of ...'.
- source_word: תְּבוּאוֹת
  chosen: income
  alternatives:
  - produce
  - revenue
  - harvests
  - gain
  lexicon: HALOT
  rationale: The noun can denote produce, yield, or revenue. In this proverb's economic-ethical
    contrast, 'income' communicates the broader sense of material returns, not only
    agricultural harvest, while remaining concrete and readable.
- source_word: בְּלֹא
  chosen: without
  alternatives:
  - with no
  - lacking
  lexicon: HALOT
  rationale: Standard privative sense of the preposition plus negation; 'without'
    is the most natural English rendering.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  - fairness
  lexicon: HALOT
  rationale: In wisdom literature משפט commonly denotes justice, right order, or fair
    judgment. 'Justice' best captures the ethical-social dimension in contrast with
    righteousness in the first colon.
