id: PRO.16.29
reference: Proverbs 16:29
source:
  edition: WLC
  text: אִ֣ישׁ חָ֭מָס יְפַתֶּ֣ה רֵעֵ֑/הוּ וְ֝/הוֹלִיכ֗/וֹ בְּ/דֶ֣רֶךְ לֹא טֽוֹב־׃
translation:
  text: A violent man entices his neighbor and leads him in a way that is not good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friend' or 'his companion' for 'his neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in a way not good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: Rendered as 'man' because the Hebrew is grammatically masculine singular
    and the proverb presents a representative male figure. This follows the gender-accurate
    principle rather than neutralizing to 'person'.
- source_word: חָמָס
  chosen: violent
  alternatives:
  - violence
  - wrongdoing
  - oppression
  lexicon: HALOT
  rationale: In construct with אִישׁ, the sense is a man characterized by violence
    or brutality. 'Violent' is the most natural adjectival rendering in English and
    preserves the moral force of the Hebrew.
- source_word: יְפַתֶּה
  chosen: entices
  alternatives:
  - persuades
  - seduces
  - deceives
  lexicon: HALOT
  rationale: The Piel of פתה commonly carries the sense of enticing, persuading, or
    luring. 'Entices' best fits the wisdom context of morally drawing someone into
    wrongdoing without overstating the element of falsehood implied by 'deceives'
    or the sexual nuance often carried by 'seduces'.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. 'Neighbor' preserves the
    broader interpersonal sense common in biblical usage and avoids implying mutual
    affection that 'friend' may suggest.
- source_word: וְהוֹלִיכוֹ
  chosen: and leads him
  alternatives:
  - and causes him to go
  - and guides him
  lexicon: HALOT
  rationale: 'The Hiphil of הלך is causative: ''cause to go'' or ''lead.'' ''Leads
    him'' is idiomatic English and preserves the causative force.'
- source_word: בְּדֶרֶךְ
  chosen: in a way
  alternatives:
  - on a path
  - into a course
  lexicon: HALOT
  rationale: דֶּרֶךְ is literally 'way/path,' often metaphorical in Proverbs for a
    manner or course of life. 'In a way' keeps the metaphor while reading naturally
    in English.
- source_word: לֹא טוֹב
  chosen: that is not good
  alternatives:
  - that is evil
  - that is bad
  lexicon: HALOT
  rationale: The Hebrew is literally 'not good.' Retaining this phrasing preserves
    the source wording and wisdom-style moral evaluation without sharpening it to
    'evil,' which would be more interpretive.
