theological_decisions:
- issue: Interpretive force of the second colon
  chosen_reading: The verse states a general wisdom principle that gray hair is an
    honorable adornment when associated with a life of righteousness, not an unconditional
    claim that every elderly person is righteous or that the righteous always reach
    old age.
  alternative_readings:
  - A simple descriptive statement that old age itself is honorable
  - A prosperity-like promise that righteousness guarantees longevity
  rationale: Hebrew wisdom literature often states general truths rather than absolute
    promises. Rendering the second colon as 'it is found in the way of righteousness'
    preserves that proverbial nuance without overstating a mechanistic guarantee.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
