id: PRO.16.31
reference: Proverbs 16:31
source:
  edition: WLC
  text: עֲטֶ֣רֶת תִּפְאֶ֣רֶת שֵׂיבָ֑ה בְּ/דֶ֥רֶךְ צְ֝דָקָ֗ה תִּמָּצֵֽא׃
translation:
  text: Gray hair is a crown of glory; it is found in the way of righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the path of righteousness.' The Hebrew idiom speaks of a course of
      life marked by righteousness.
    reason: lexical_alternative
  - marker: b
    text: That is, gray hair is honorable when it accompanies a righteous life; the
      proverb expresses a general wisdom principle, not an absolute promise of long
      life to every righteous person.
    reason: cultural_note
lexical_decisions:
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - wreath
  lexicon: HALOT
  rationale: The noun denotes a crown or encircling ornament. 'Crown' is the natural
    English equivalent in wisdom literature and fits the metaphor of honor.
- source_word: תִּפְאֶרֶת
  chosen: glory
  alternatives:
  - beauty
  - splendor
  - honor
  lexicon: HALOT
  rationale: The term can denote beauty, splendor, or glory. 'Glory' best captures
    the elevated honorific sense in the construct phrase 'a crown of glory,' a familiar
    and accurate wisdom expression.
- source_word: שֵׂיבָה
  chosen: gray hair
  alternatives:
  - old age
  - hoary head
  lexicon: HALOT
  rationale: The noun refers concretely to gray hair and by extension old age. 'Gray
    hair' preserves the vivid image of the Hebrew while remaining natural modern English.
    'Hoary head' is archaic; 'old age' loses the metaphorical concreteness.
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - on the path
  - along the course
  lexicon: HALOT
  rationale: The preposition plus 'way/path' is a common Hebrew idiom for manner of
    life or course of conduct. 'In the way' preserves the metaphor while remaining
    understandable in English.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - right conduct
  lexicon: HALOT
  rationale: Although the noun can overlap with 'justice,' in Proverbs this phrase
    most naturally refers to a morally upright life. 'Righteousness' matches the Hebrew
    ethical sense and aligns with the project's default rendering for cognate terms
    where applicable.
- source_word: תִּמָּצֵא
  chosen: it is found
  alternatives:
  - it is obtained
  - it is attained
  lexicon: HALOT
  rationale: 'The Niphal form of מצא is passive/reflexive: ''is found.'' This can
    imply being encountered or attained, but ''is found'' stays closest to the Hebrew
    and preserves the proverb''s ambiguity: gray hair is encountered in, or characteristically
    belongs to, a righteous life-path.'
