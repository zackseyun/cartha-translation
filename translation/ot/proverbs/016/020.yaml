id: PRO.16.20
reference: Proverbs 16:20
source:
  edition: WLC
  text: מַשְׂכִּ֣יל עַל דָּ֭בָר יִמְצָא ט֑וֹב וּ/בוֹטֵ֖חַ בַּ/יהוָ֣ה אַשְׁרָֽי/ו־־׃
translation:
  text: Whoever gives careful attention to a matter will find good, and blessed is
    he who trusts in the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'acts wisely concerning a matter' or 'whoever is prudent in a matter.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blessed is he'; the masculine singular is generic, referring to
      any person who trusts in the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׂכִּיל
  chosen: gives careful attention
  alternatives:
  - acts wisely
  - prospers by insight
  - considers wisely
  lexicon: HALOT
  rationale: The Hiphil participle of שׂכל can denote acting with insight, giving
    prudent attention, or prospering through wisdom. In this proverb, followed by
    עַל דָּבָר ('to/over a matter'), the sense is best captured as attentive, prudent
    consideration rather than mere intellectual possession of wisdom. 'Gives careful
    attention' expresses the active, practical nuance in readable English.
- source_word: עַל דָּבָר
  chosen: to a matter
  alternatives:
  - in a matter
  - concerning a matter
  - to the word
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here the proverb concerns
    prudent handling of affairs, so 'a matter' fits better than 'a word.' The preposition
    עַל with שׂכל likely conveys attentive regard toward or concerning something;
    idiomatic English prefers 'to a matter' with the chosen verbal rendering.
- source_word: יִמְצָא טוֹב
  chosen: will find good
  alternatives:
  - will find prosperity
  - will obtain good
  - finds what is good
  lexicon: HALOT
  rationale: 'The verb מצא normally means ''find,'' and טוֹב here is broad: good,
    benefit, well-being. ''Will find good'' preserves the concise Hebrew and leaves
    the blessing general rather than narrowing it to material prosperity alone.'
- source_word: וּבוֹטֵחַ
  chosen: and ... who trusts
  alternatives:
  - and the one trusting
  - and whoever trusts
  lexicon: HALOT
  rationale: The Qal participle functions generically, parallel to the first clause.
    Rendering it as a relative clause in English preserves the proverbial style and
    smooths the transition to the beatitude statement.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
    'Trusts in the LORD' is the standard and natural English equivalent for בטח ב.
- source_word: אַשְׁרָיו
  chosen: blessed is he
  alternatives:
  - happy is he
  - how fortunate is he
  - blessed is the one
  lexicon: HALOT
  rationale: אַשְׁרֵי language denotes a state of blessedness or flourishing, not
    merely subjective happiness. 'Blessed is he' preserves the beatitude force. The
    masculine singular is retained as gender-accurate generic per doctrine; it refers
    representatively, not exclusively.
