id: PRO.16.10
reference: Proverbs 16:10
source:
  edition: WLC
  text: קֶ֤סֶם עַֽל שִׂפְתֵי מֶ֑לֶךְ בְּ֝/מִשְׁפָּ֗ט לֹ֣א יִמְעַל פִּֽי/ו׀־־־׃
translation:
  text: A divine verdict is on the lips of a king; his mouth does not betray justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew qesem often means ''divination''; here it is rendered ''a divine
      verdict'' because the context is judicial speech. Possible alternatives: ''divination''
      or ''oracle.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'in judgment' or 'when judging' for 'justice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶסֶם
  chosen: a divine verdict
  alternatives:
  - divination
  - oracle
  lexicon: HALOT
  rationale: The noun commonly denotes divination/oracular utterance. In this proverb,
    attached to the king's lips, a strictly negative sense ('divination') would mislead,
    since the parallel colon concerns right judgment. 'A divine verdict' preserves
    the elevated, quasi-oracular force while fitting the judicial context. Alternatives
    are preserved because the Hebrew term often carries the sense 'divination' elsewhere.
- source_word: עַל
  chosen: is on
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: 'Rendered idiomatically with the verbless clause in English: ''is on
    the lips of.'' This preserves the locative image without awkwardness.'
- source_word: שִׂפְתֵי מֶלֶךְ
  chosen: the lips of a king
  alternatives:
  - a king's lips
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'A king' rather than 'the king' keeps
    the proverb's generalizing force.
- source_word: בְּמִשְׁפָּט
  chosen: justice
  alternatives:
  - in judgment
  - when judging
  lexicon: HALOT
  rationale: The phrase denotes the sphere or act of judicial decision. 'Justice'
    reads naturally in English and matches the legal context, while still reflecting
    mishpat's judicial sense. Alternatives are viable and noted.
- source_word: לֹא יִמְעַל
  chosen: does not betray
  alternatives:
  - does not transgress
  - does not act treacherously
  - does not offend
  lexicon: HALOT
  rationale: The verb מעל often conveys acting unfaithfully or treacherously. In relation
    to judicial speech, 'betray' captures violating or being unfaithful to justice
    more idiomatically than 'transgress.'
- source_word: פִּיו
  chosen: his mouth
  alternatives:
  - his lips
  - his speech
  lexicon: HALOT
  rationale: Retained distinctly from the first colon's 'lips' to mirror the Hebrew
    variation and to keep the focus on utterance.
