theological_decisions:
- issue: Whether קֶסֶם should be rendered with its usual negative sense ('divination')
    or with a contextualized positive/judicial sense
  chosen_reading: Rendered positively as 'a divine verdict' in light of the parallel
    judicial clause and proverbial description of ideal royal judgment.
  alternative_readings:
  - divination is on the lips of a king
  - an oracle is on the lips of a king
  rationale: The verse is descriptive of proper royal speech in judgment, not an endorsement
    of occult practice. A positive rendering best fits the immediate context while
    acknowledging the term's broader semantic range.
