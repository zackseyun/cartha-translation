theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of the proverb's claim about weights and measures
  chosen_reading: The verse affirms that honest standards of measurement are under the LORD's authority and ordering.
  alternative_readings:
  - The verse states only that God created physical weights.
  - The verse means that God approves any existing market standard without moral qualification.
  rationale: The immediate lexical field of weighing instruments plus מִשְׁפָּט ('justice') indicates a moral claim about fair commerce. 'Are his work' is therefore understood as grounding just measures in the LORD's order, without overextending into a broader doctrinal claim not explicit in the text.
