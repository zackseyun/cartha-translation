id: PRO.16.11
reference: Proverbs 16:11
source:
  edition: WLC
  text: פֶּ֤לֶס וּ/מֹאזְנֵ֣י מִ֭שְׁפָּט לַֽ/יהוָ֑ה מַ֝עֲשֵׂ֗/הוּ כָּל אַבְנֵי כִֽיס׀־־׃
translation:
  text: A just balance and scales belong to Yahweh; all the weights in the bag are his work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'all the stones of the bag.' In context this refers to stone weights used for measuring.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּלֶס
  chosen: balance
  alternatives:
  - scale
  - balancing instrument
  lexicon: HALOT
  rationale: Refers to a weighing device or balance. 'Balance' fits natural English in parallel with 'scales' and preserves the commercial-justice imagery.
- source_word: וּמֹאזְנֵי
  chosen: and scales
  alternatives:
  - and balances
  lexicon: HALOT
  rationale: The plural construct with מִשְׁפָּט denotes weighing scales. Rendering with 'scales' distinguishes it from פֶּלֶס while keeping the parallelism.
- source_word: מִשְׁפָּט
  chosen: just
  alternatives:
  - justice
  - judgment
  - fair
  lexicon: HALOT
  rationale: 'Here the noun functions attributively with the weighing instruments, describing them as conforming to justice. ''Just'' is concise and idiomatic in English: ''a just balance and scales.'''
- source_word: לַיהוָה
  chosen: belong to the LORD
  alternatives:
  - are the LORD's
  - are for the LORD
  lexicon: HALOT
  rationale: The prefixed ל marks possession or belonging in this proverb. 'Belong to the LORD' makes the sense explicit in clear modern English. Per doctrine, יהוה is rendered 'the LORD'.
- source_word: מַעֲשֵׂהוּ
  chosen: are his work
  alternatives:
  - are his doing
  - are his workmanship
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix refers to something made or done by him. In context it predicates of the bag-weights as belonging to God's ordering or standard. 'Are his work' is natural and preserves the Hebrew's broad sense.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Straightforward universal quantifier; 'all' works smoothly with the plural 'weights.'
- source_word: אַבְנֵי
  chosen: weights
  alternatives:
  - stones
  lexicon: HALOT
  rationale: Literally 'stones,' but in commercial contexts these are stone weights used on scales. 'Weights' communicates the intended referent rather than the material.
- source_word: כִיס
  chosen: bag
  alternatives:
  - pouch
  - purse
  lexicon: HALOT
  rationale: Refers to the container holding the merchant's weights. 'Bag' is the most natural modern equivalent in this context.
