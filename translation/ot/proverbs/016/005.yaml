id: PRO.16.5
reference: Proverbs 16:5
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת יְ֭הוָה כָּל גְּבַהּ לֵ֑ב יָ֥ד לְ֝/יָ֗ד לֹ֣א יִנָּקֶֽה־־׃
translation:
  text: Everyone who is proud in heart is an abomination to the LORD; hand to hand,
    he will certainly not go unpunished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'hand to hand,' an idiom that may mean 'surely/be assured,' or possibly
      'though they join hands' (that is, even in alliance).
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a detestable thing
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable, often in covenantal/moral
    contexts. 'Abomination' preserves the strong moral-religious force common in Proverbs
    and in English Bible usage.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering for the divine name is
    'the LORD,' following established reverential convention and matching the stated
    policy for יְהוָה.
- source_word: כָּל
  chosen: Everyone who
  alternatives:
  - every
  - all who
  lexicon: HALOT
  rationale: Although literally 'all/every,' in English the construction 'Everyone
    who is proud in heart' reads naturally and accurately conveys the distributive
    force of the Hebrew.
- source_word: גְּבַהּ לֵב
  chosen: proud in heart
  alternatives:
  - haughty of heart
  - arrogant in heart
  lexicon: HALOT
  rationale: The phrase literally refers to one high/exalted in heart, an idiom for
    inward pride or arrogance. 'Proud in heart' is clear modern English while preserving
    the internal, dispositional emphasis of לֵב.
- source_word: יָד לְיָד
  chosen: hand to hand
  alternatives:
  - surely
  - be assured
  - though they join hands
  lexicon: HALOT
  rationale: The Hebrew idiom is difficult. A formally transparent rendering 'hand
    to hand' best preserves the source expression in the main text. Because interpreters
    understand it either as an asseveration ('surely') or as a picture of joined hands/alliances,
    the alternatives are preserved in a footnote rather than resolved away.
- source_word: לֹא יִנָּקֶה
  chosen: he will certainly not go unpunished
  alternatives:
  - he will not be acquitted
  - he will not be left unpunished
  lexicon: HALOT
  rationale: The Niphal of נקה here carries the sense of escaping punishment or being
    held guiltless. 'Will certainly not go unpunished' communicates the judicial force
    clearly in contemporary English; 'certainly' reflects the emphatic force of the
    preceding idiom in context.
