theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    doctrine and contested-terms table, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of יָד לְיָד
  chosen_reading: Retain the idiom 'hand to hand' in the main text and reflect its
    emphatic sense in the clause 'he will certainly not go unpunished.'
  alternative_readings:
  - Render idiomatically as 'be assured' or 'surely'
  - Interpret as 'though they join hands' / 'hand in hand'
  rationale: The phrase is genuinely ambiguous and not doctrinally loaded, but the
    translation philosophy prefers preserving tension where the source is ambiguous.
    Keeping 'hand to hand' in the main text maintains auditability, while a footnote
    preserves the main interpretive alternatives.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
