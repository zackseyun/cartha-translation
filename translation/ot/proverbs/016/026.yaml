id: PRO.16.26
reference: Proverbs 16:26
source:
  edition: WLC
  text: נֶ֣פֶשׁ עָ֭מֵל עָ֣מְלָה לּ֑/וֹ כִּֽי אָכַ֖ף עָלָ֣י/ו פִּֽי/הוּ־׃
translation:
  text: The appetite of a laborer labors for him, for his mouth presses him on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The soul/desire of the laborer labors for him.' Hebrew nephesh can mean
      'soul,' 'life,' or 'appetite'; here the context of 'his mouth' favors 'appetite.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for himself.' The Hebrew says 'for him,' but some understand the sense
      reflexively.
    reason: alternative_reading
  - marker: c
    text: Or 'his mouth urges him,' 'drives him,' or 'compels him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: appetite
  alternatives:
  - soul
  - life
  - desire
  lexicon: HALOT
  rationale: In wisdom literature נֶפֶשׁ often refers not to the immaterial soul in
    a theological sense but to the person's appetite or animating desire. Here the
    parallel with 'his mouth' makes 'appetite' the most natural English rendering.
- source_word: עָמֵל
  chosen: laborer
  alternatives:
  - worker
  - toiler
  - one who labors
  lexicon: HALOT
  rationale: The adjective/noun denotes one who labors or toils. 'Laborer' is concise
    and idiomatic, preserving the connection with the following verb from the same
    root.
- source_word: עָמְלָה
  chosen: labors
  alternatives:
  - works
  - toils
  lexicon: HALOT
  rationale: Using 'labors' preserves the Hebrew wordplay between עָמֵל and עָמְלָה.
    'Toils' is possible, but 'labors' better matches the noun 'laborer' in English.
- source_word: לּוֹ
  chosen: for him
  alternatives:
  - for himself
  - on his behalf
  lexicon: HALOT
  rationale: The preposition with pronominal suffix most straightforwardly means 'for
    him.' Some interpreters understand a reflexive sense ('for himself'), but the
    Hebrew form itself is simply third masculine singular, so the main text keeps
    the more direct rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the laborer works. 'For' is concise and
    proverbially natural in English.
- source_word: אָכַף
  chosen: presses him on
  alternatives:
  - urges him
  - drives him
  - compels him
  lexicon: HALOT
  rationale: The verb conveys coercion or pressure. 'Presses him on' captures the
    image of hunger or need driving a person to work, while remaining readable modern
    English.
- source_word: עָלָיו
  chosen: him
  alternatives:
  - against him
  - upon him
  lexicon: HALOT
  rationale: With אָכַף the preposition contributes to the sense of pressure exerted
    on the person. In idiomatic English this is best absorbed into 'presses him on'
    rather than translated woodenly as 'upon him.'
- source_word: פִּיהוּ
  chosen: his mouth
  alternatives:
  - his hunger
  - his appetite
  lexicon: HALOT
  rationale: The Hebrew literally says 'his mouth.' Since the proverb personifies
    the mouth as the force that drives labor, the literal image should be retained
    in the main text rather than interpreted away.
