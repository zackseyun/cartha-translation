theological_decisions:
- issue: Meaning of נֶפֶשׁ in wisdom context
  chosen_reading: life/self rather than 'soul' as a technical anthropological term
  alternative_readings:
  - soul
  rationale: The proverb concerns practical moral conduct and self-preservation. Rendering
    נֶפֶשׁ as 'life' avoids suggesting a later body-soul dichotomy not required by
    the Hebrew, while still conveying the person's whole life.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text says without importing doctrinal claims.'
