id: PRO.16.17
reference: Proverbs 16:17
source:
  edition: WLC
  text: מְסִלַּ֣ת יְ֭שָׁרִים ס֣וּר מֵ/רָ֑ע שֹׁמֵ֥ר נַ֝פְשׁ֗/וֹ נֹצֵ֥ר דַּרְכּֽ/וֹ׃
translation:
  text: The highway of the upright is to turn away from evil; he who guards his life
    watches over his way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The road of the upright is departure from evil.' The Hebrew can be rendered
      more formally with a nominal expression.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his soul'; here נֶפֶשׁ likely means 'his life' or 'himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְסִלַּת
  chosen: highway
  alternatives:
  - way
  - road
  lexicon: HALOT
  rationale: מְסִלָּה commonly denotes a raised road or highway rather than a generic
    path. 'Highway' preserves the more marked image and fits wisdom imagery of a defined
    course of life.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the righteous
  lexicon: HALOT
  rationale: The adjective refers to morally straight/upright people. 'The upright'
    is idiomatic English and preserves the ethical sense without over-specifying as
    'righteous,' which could blur distinction from other Hebrew righteousness terms.
- source_word: סוּר מֵרָע
  chosen: to turn away from evil
  alternatives:
  - departure from evil
  - avoiding evil
  lexicon: HALOT
  rationale: The infinitive construct functions predicatively/appositionally, describing
    what the highway of the upright consists in. 'To turn away from evil' captures
    the verbal force better than a static noun phrase.
- source_word: רָע
  chosen: evil
  alternatives:
  - harm
  - what is bad
  lexicon: HALOT
  rationale: In Proverbs this term often carries moral force in contrast with upright
    conduct. 'Evil' best fits the ethical context.
- source_word: שֹׁמֵר נַפְשׁוֹ
  chosen: he who guards his life
  alternatives:
  - he who keeps his soul
  - one who preserves himself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to one's life/self rather than an abstract immaterial
    'soul.' 'Guards his life' is natural English and avoids importing later anthropological
    distinctions.
- source_word: נֹצֵר דַּרְכּוֹ
  chosen: watches over his way
  alternatives:
  - guards his path
  - keeps his course
  lexicon: HALOT
  rationale: נצר overlaps with guarding/keeping attentively. 'Watches over his way'
    gives a slightly distinct nuance from שׁמר in the previous colon while preserving
    the parallelism. 'Way' is the standard wisdom metaphor for one's conduct.
