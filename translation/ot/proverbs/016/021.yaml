id: PRO.16.21
reference: Proverbs 16:21
source:
  edition: WLC
  text: לַ/חֲכַם לֵ֭ב יִקָּרֵ֣א נָב֑וֹן וּ/מֶ֥תֶק שְׂ֝פָתַ֗יִם יֹסִ֥יף לֶֽקַח־׃
translation:
  text: The wise of heart is called discerning, and sweetness of lips increases learning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adds persuasiveness' or 'adds instruction' for 'increases learning.'
      The Hebrew term can denote learning received, instruction, or the effect of
      persuasive teaching.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֲכַם לֵב
  chosen: The wise of heart
  alternatives:
  - The wise-hearted man
  - A wise-hearted person
  - The wise in heart
  lexicon: HALOT
  rationale: חכם with לב forms an idiomatic expression for inward wisdom or prudence.
    'The wise of heart' preserves the Hebrew imagery while remaining understandable
    in English. A more idiomatic expansion like 'wise-hearted person' is possible,
    but the construct-like phrasing better reflects the source.
- source_word: יִקָּרֵא
  chosen: is called
  alternatives:
  - will be called
  - is proclaimed
  lexicon: HALOT
  rationale: Niphal of קרא here is best rendered as a passive/resultative, 'is called'
    or 'is regarded as.' English present tense fits proverbial style better than a
    strict future.
- source_word: נָבוֹן
  chosen: discerning
  alternatives:
  - understanding
  - prudent
  - intelligent
  lexicon: HALOT
  rationale: נבון denotes one who has understanding or discernment. 'Discerning' fits
    the wisdom context and reads naturally after 'is called.' 'Understanding' would
    be more wooden in English when used predicatively of a person.
- source_word: וּמֶתֶק שְׂפָתַיִם
  chosen: and sweetness of lips
  alternatives:
  - and pleasant speech
  - and sweetness of speech
  - and gracious lips
  lexicon: HALOT
  rationale: מתק literally denotes sweetness, and שפתים literally 'lips' often stands
    metonymically for speech. Retaining 'sweetness of lips' preserves the poetic metaphor;
    smoother alternatives are possible but less transparent to the Hebrew imagery.
- source_word: יֹסִיף
  chosen: increases
  alternatives:
  - adds
  - augments
  lexicon: HALOT
  rationale: Hiphil of יסף means to add or increase. 'Increases' works well with the
    object לקח in a proverbial statement and avoids awkwardness of 'adds learning'
    in some English registers.
- source_word: לֶקַח
  chosen: learning
  alternatives:
  - persuasion
  - instruction
  - insight
  lexicon: HALOT
  rationale: לקח can mean instruction received, learning, or teaching. In this context,
    where pleasant speech enhances receptivity and effectiveness, 'learning' is a
    strong fit. 'Persuasion' is a plausible contextual alternative and worth preserving
    in a footnote because some interpreters understand the line as effective speech
    increasing persuasiveness rather than knowledge strictly speaking.
