theological_decisions:
- issue: Anthropological sense of רוּחוֹת
  chosen_reading: human inner spirits/dispositions that the LORD assesses
  alternative_readings:
  - motives
  - winds/breaths
  rationale: In wisdom literature and in this contrast with human self-perception, רוּחוֹת most naturally refers to the inner spirit or disposition of people. 'Motives' captures part of the sense but is more interpretive; 'winds/breaths' is lexically possible in other contexts but not suitable here.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence with documented lexical choice.
- issue: Representative masculine אִישׁ
  chosen_reading: a man's ways
  alternative_readings:
  - a person's ways
  - human ways
  rationale: The Hebrew is grammatically masculine singular used generically. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral language, while the proverb's applicability remains universal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral).
