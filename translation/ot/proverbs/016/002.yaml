id: PRO.16.2
reference: Proverbs 16:2
source:
  edition: WLC
  text: כָּֽל דַּרְכֵי אִ֭ישׁ זַ֣ךְ בְּ/עֵינָ֑י/ו וְ/תֹכֵ֖ן רוּח֣וֹת יְהוָֽה־־׃
translation:
  text: All a man's ways are pure in his own eyes, but Yahweh weighs the spirits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All the ways of a man are clean in his own eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD examines the spirits' or 'the LORD evaluates motives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier covering the totality of what follows. 'All' is idiomatic with the plural noun phrase 'ways.'
- source_word: דַּרְכֵי אִישׁ
  chosen: a man's ways
  alternatives:
  - the ways of a man
  - a person's ways
  lexicon: HALOT
  rationale: דֶּרֶךְ in wisdom literature commonly denotes one's course of life, conduct, or patterns of action, not merely literal roads. אִישׁ is singular masculine with representative force; per doctrine, gender-accurate rendering is preferred, so 'a man's ways' is retained rather than a gender-neutral substitute.
- source_word: זַךְ
  chosen: pure
  alternatives:
  - clean
  - innocent
  lexicon: HALOT
  rationale: זַךְ denotes cleanness/purity. 'Pure' best captures the moral self-assessment in context. 'Innocent' would overstate juridical blamelessness, while 'clean' is less natural in English here.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - to himself
  lexicon: HALOT
  rationale: The idiom means according to one's own evaluation or perspective. Adding 'own' makes the reflexive sense explicit and natural in English.
- source_word: וְתֹכֵן
  chosen: weighs
  alternatives:
  - examines
  - evaluates
  - measures
  lexicon: HALOT
  rationale: The verb תכן can denote measuring or weighing. In this antithetical proverb, 'weighs' vividly conveys the LORD's accurate assessment over against human self-estimation. It also preserves the metaphor better than the more interpretive 'examines.'
- source_word: רוּחוֹת
  chosen: the spirits
  alternatives:
  - the motives
  - the inner dispositions
  - spirits
  lexicon: HALOT
  rationale: רוּחַ here likely refers to the inner spirit/disposition of human beings in the plural, corresponding to the general statement about mankind. 'The spirits' keeps the Hebrew image and preserves the anthropological breadth; more interpretive options like 'motives' are possible but narrower.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
