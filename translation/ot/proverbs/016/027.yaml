id: PRO.16.27
reference: Proverbs 16:27
source:
  edition: WLC
  text: אִ֣ישׁ בְּ֭לִיַּעַל כֹּרֶ֣ה רָעָ֑ה וְ/עַל שפתי/ו כְּ/אֵ֣שׁ צָרָֽבֶת־׃
translation:
  text: A worthless man digs up evil, and on his lips it is like a scorching fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A wicked man digs up harm'; the Hebrew terms can emphasize either moral
      evil or the destructive trouble a person causes.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and on his lips [is] like a scorching fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The noun is singular masculine ('man'). In Proverbs this often presents
    a representative type. Per the project's gender-accurate policy, 'man' is retained
    rather than neutralizing to 'person'.
- source_word: בְּלִיַּעַל
  chosen: worthless
  alternatives:
  - base
  - wicked
  - scoundrel-like
  lexicon: HALOT
  rationale: 'In this wisdom context the term characterizes moral worthlessness or
    depravity rather than functioning as a proper name. ''Worthless'' is concise and
    idiomatic in English: ''a worthless man.'''
- source_word: כֹּרֶה
  chosen: digs up
  alternatives:
  - digs
  - excavates
  - plots
  lexicon: HALOT
  rationale: The participle from כרה literally means 'to dig.' Here it is metaphorical
    for bringing forth or uncovering evil. 'Digs up' preserves the imagery and reads
    naturally with 'evil' as the object.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - mischief
  - trouble
  lexicon: HALOT
  rationale: The noun can denote evil, harm, or trouble. In this proverb, moral and
    destructive force are both present; 'evil' best preserves the broader sense without
    narrowing it merely to inconvenience or injury.
- source_word: שפתיו
  chosen: his lips
  alternatives:
  - his speech
  - his mouth
  lexicon: HALOT
  rationale: The Hebrew is literally 'his lips.' Retaining the body-part image matches
    the poetic style and prepares for the fire metaphor.
- source_word: כְּאֵשׁ
  chosen: like a scorching fire
  alternatives:
  - like fire
  lexicon: HALOT
  rationale: The preposition כ plus 'fire' introduces the simile. In English, combining
    it with the following adjective yields a smoother and more natural phrase while
    preserving the image.
- source_word: צָרָבֶת
  chosen: scorching
  alternatives:
  - burning
  - searing
  - kindling
  lexicon: HALOT
  rationale: This rare adjective/noun conveys burning heat or something that scorches.
    'Scorching' best captures the destructive intensity of the speech imagery.
- source_word: וְעַל
  chosen: and on
  alternatives:
  - and upon
  - while on
  lexicon: HALOT
  rationale: The conjunction plus preposition is rendered straightforwardly. 'On his
    lips' is idiomatic and preserves the Hebrew structure better than recasting the
    clause more dynamically.
