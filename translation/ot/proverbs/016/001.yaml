theological_decisions:
- issue: Human intention and divine sovereignty in the proverb's parallelism
  chosen_reading: The verse affirms that human beings make inward plans, while the
    decisive spoken answer ultimately comes from the LORD.
  alternative_readings:
  - The verse contrasts human planning with God's control over outcomes more broadly.
  - The verse emphasizes that even a person's own speech is governed by the LORD.
  rationale: The Hebrew juxtaposes human 'plans of the heart' with the 'answer of
    the tongue' being 'from the LORD.' The translation preserves this tension without
    flattening it into a deterministic system or reducing it to mere general providence.
    'But' signals the contrast while leaving the proverb's theological depth intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
