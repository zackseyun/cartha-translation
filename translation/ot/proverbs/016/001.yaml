id: PRO.16.1
reference: Proverbs 16:1
source:
  edition: WLC
  text: לְ/אָדָ֥ם מַֽעַרְכֵי לֵ֑ב וּ֝/מֵ/יְהוָ֗ה מַעֲנֵ֥ה לָשֽׁוֹן־׃
translation:
  text: The plans of the heart belong to man, but the answer of the tongue is from
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The arrangements/preparations of the heart are for man, but the answer
      of the tongue is from the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'man' (אָדָם) is a representative singular for a human being generally.
    reason: cultural_note
lexical_decisions:
- source_word: לְאָדָם
  chosen: belong to man
  alternatives:
  - are for man
  - to man
  - belong to humankind
  lexicon: HALOT
  rationale: 'The prefixed ל marks possession or relation here: the first colon states
    what pertains to man. ''Man'' follows the doctrine''s gender-accurate policy for
    אָדָם, since the proverb speaks generically of the human person in representative
    singular form. ''Belong to man'' makes the verbless clause natural in English
    while preserving the contrast with what comes ''from the LORD'' in the second
    colon.'
- source_word: מַעַרְכֵי
  chosen: plans
  alternatives:
  - arrangements
  - preparations
  - dispositions
  lexicon: HALOT
  rationale: The noun from ערך can denote arrangement or ordering. In wisdom context
    with 'heart,' it refers to a person's internal ordering or planning. 'Plans' is
    idiomatic and captures intentional mental arrangement without over-paraphrasing.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner person, including thought and intention.
    'Heart' preserves the Hebrew image and is standard in wisdom literature, while
    English readers can still understand it as the seat of intention here.
- source_word: וּמֵיְהוָה
  chosen: but ... is from the LORD
  alternatives:
  - and ... is from the LORD
  lexicon: HALOT
  rationale: 'The conjunction ו can be rendered simply ''and,'' but the proverb''s
    parallelism is adversative in sense: human planning is set over against the LORD''s
    decisive role in speech. ''But'' brings out the contrast naturally in English.
    יְהוָה is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the doctrine's contested-terms table, יְהוָה is rendered 'the LORD.'
    This follows established reverential convention and preserves continuity with
    the covenant name's traditional English representation.
- source_word: מַעֲנֵה
  chosen: answer
  alternatives:
  - reply
  - response
  lexicon: HALOT
  rationale: The noun denotes an answer or response. 'Answer' is the most direct and
    traditional rendering, fitting the proverb's concise style.
- source_word: לָשׁוֹן
  chosen: the tongue
  alternatives:
  - the speech
  - the mouth
  lexicon: HALOT
  rationale: '''Tongue'' is the literal term and a common Hebrew metonym for speech.
    Retaining it preserves the poetic concreteness of the proverb. The phrase ''answer
    of the tongue'' thus means the spoken response.'
