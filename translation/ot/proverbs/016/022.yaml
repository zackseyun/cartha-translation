id: PRO.16.22
reference: Proverbs 16:22
source:
  edition: WLC
  text: מְק֣וֹר חַ֭יִּים שֵׂ֣כֶל בְּעָלָ֑י/ו וּ/מוּסַ֖ר אֱוִלִ֣ים אִוֶּֽלֶת׃
translation:
  text: Understanding is a fountain of life to its possessor, but the discipline of
    fools is folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Understanding is a spring of life for the one who has it.'
    reason: lexical_alternative
  - marker: b
    text: '''Discipline'' may also be rendered ''instruction'' or ''correction'';
      the line likely means that what serves as correction for fools is nothing but
      folly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: The noun denotes a spring, fountain, or source. 'Fountain' preserves
    the concrete metaphor in idiomatic English and fits the wisdom imagery of life-giving
    refreshment.
- source_word: חַיִּים
  chosen: life
  alternatives:
  - lives
  - living
  lexicon: HALOT
  rationale: Though morphologically plural, the Hebrew commonly functions as the abstract
    noun 'life.' Singular English best conveys the sense in this metaphorical construction.
- source_word: שֵׂכֶל
  chosen: understanding
  alternatives:
  - prudence
  - insight
  - good sense
  lexicon: HALOT
  rationale: In Proverbs this term often refers to practical intelligence or sound
    understanding. 'Understanding' is clear modern English and suits the parallel
    with the fools' folly.
- source_word: בְּעָלָיו
  chosen: its possessor
  alternatives:
  - its owner
  - the one who has it
  - those who possess it
  lexicon: HALOT
  rationale: The noun בעל with 3ms suffix literally means 'its owner/possessor.' Because
    the antecedent is the masculine singular noun 'understanding,' 'its possessor'
    is the most precise rendering. This preserves the singular relation without awkwardly
    personifying understanding too strongly.
- source_word: מוּסַר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  - chastening
  lexicon: HALOT
  rationale: The term can mean instruction through correction or discipline. Here,
    in contrast with life-giving understanding and followed by 'folly,' 'discipline'
    captures the ironic sense that what fools receive or produce as correction amounts
    only to folly.
- source_word: אֱוִלִים
  chosen: fools
  alternatives:
  - the foolish
  lexicon: HALOT
  rationale: Standard rendering in Proverbs for the morally dull and obstinate. 'Fools'
    is concise and preserves the proverbial category.
- source_word: אִוֶּלֶת
  chosen: folly
  alternatives:
  - foolishness
  lexicon: HALOT
  rationale: This abstract noun names the characteristic quality of fools. 'Folly'
    is idiomatic in English wisdom literature and creates a sharp epigrammatic ending.
