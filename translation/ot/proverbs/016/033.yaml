id: PRO.16.33
reference: Proverbs 16:33
source:
  edition: WLC
  text: בַּ֭/חֵיק יוּטַ֣ל אֶת הַ/גּוֹרָ֑ל וּ֝/מֵ/יְהוָ֗ה כָּל מִשְׁפָּטֽ/וֹ־־׃
translation:
  text: The lot is cast into the lap, but its every decision is from the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its every verdict' or 'its every judgment.' The Hebrew term can carry
      a judicial nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֵיק
  chosen: into the lap
  alternatives:
  - in the lap
  - into the fold
  lexicon: HALOT
  rationale: חֵיק literally denotes the bosom, lap, or fold of a garment. In this
    proverb it refers to the place into which lots were cast. 'Into the lap' is idiomatic,
    concrete, and preserves the imagery better than a more interpretive rendering.
- source_word: יוּטַל
  chosen: is cast
  alternatives:
  - is thrown
  - is put
  lexicon: HALOT
  rationale: The Hophal imperfect/passive conveys that the lot is caused to be thrown/cast.
    'Is cast' is the standard concise English equivalent and fits the context of lot-casting.
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the casting lot
  - the die
  lexicon: HALOT
  rationale: גוֹרָל refers to a lot used for decision-making or allotment. 'The lot'
    is the most direct and contextually accurate rendering; 'die' would narrow the
    ancient practice too much.
- source_word: וּמֵיְהוָה
  chosen: but ... is from the LORD
  alternatives:
  - and ... is from the LORD
  - yet ... is from the LORD
  lexicon: HALOT
  rationale: 'The conjunction ו can be rendered simply ''and,'' but in English the
    proverb''s contrast is clearer with ''but'': human casting occurs, yet the outcome
    comes from YHWH. יְהוָה follows the doctrinal default ''the LORD'' rather than
    ''Yahweh'' or ''Jehovah''.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, the default rendering of יְהוָה is 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  - the whole
  lexicon: HALOT
  rationale: כָּל with a singular noun here has a distributive sense. 'Every' brings
    out that each individual outcome or verdict of the lot is in view.
- source_word: מִשְׁפָּטוֹ
  chosen: its decision
  alternatives:
  - its judgment
  - its verdict
  - its determination
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or ordinance. In
    the context of lot-casting, the sense is the resulting decision/verdict. 'Its
    decision' is natural modern English and avoids sounding overly judicial while
    preserving the idea of an outcome determined by adjudication.
