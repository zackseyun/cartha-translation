theological_decisions:
- issue: Divine sovereignty in relation to apparently random events
  chosen_reading: The proverb states that although humans cast the lot, the outcome/decision
    belongs to the LORD.
  alternative_readings:
  - The verse refers only to sacred lot-casting, not all seemingly random events.
  - The verse is a general statement about providence over outcomes.
  rationale: The Hebrew explicitly contrasts the human act of casting with the LORD
    as the source of the lot's מִשְׁפָּט ('decision/verdict'). The translation preserves
    this tension without expanding it into a broader systematic claim beyond the proverb's
    wording.
  doctrine_reference: Preserve theological tension rather than resolve it; YHWH rendered
    as 'the LORD' per contested terms.
