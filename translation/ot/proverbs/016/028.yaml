id: PRO.16.28
reference: Proverbs 16:28
source:
  edition: WLC
  text: אִ֣ישׁ תַּ֭הְפֻּכוֹת יְשַׁלַּ֣ח מָד֑וֹן וְ֝/נִרְגָּ֗ מַפְרִ֥יד אַלּֽוּף׃
translation:
  text: A man of perversions stirs up strife, and a whisperer separates close friends.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A perverse man sends out contention.' The Hebrew verb is literally 'sends
      out,' and תַּהְפֻּכוֹת may be rendered 'perversity' or 'crookedness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a gossip' or 'a slanderer.' The Hebrew נִרְגָּן refers to one who speaks
      covertly in a way that damages relationships.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'an intimate friend' or 'a close companion'; the English plural 'close
      friends' expresses the proverb's general force.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  lexicon: HALOT
  rationale: Rendered with gender-accurate 'man' in keeping with the Hebrew singular
    masculine and the project's stated philosophy. In Proverbs this often has representative
    force, but the source form is masculine singular.
- source_word: תַּהְפֻּכוֹת
  chosen: perversions
  alternatives:
  - crookedness
  - deceit
  - perversity
  lexicon: HALOT
  rationale: The plural abstract noun denotes twisted or perverse ways/speech. 'Perversions'
    preserves the concrete force of the plural better than the smoother singular 'perversity,'
    while avoiding overinterpretation toward merely sexual connotations by context.
- source_word: יְשַׁלַּח
  chosen: stirs up
  alternatives:
  - sends out
  - lets loose
  lexicon: HALOT
  rationale: Literally 'sends out,' but in this idiom with 'strife' the sense is to
    set it in motion or unleash it. 'Stirs up' is idiomatic modern English that captures
    the causative effect without excessive paraphrase.
- source_word: מָדוֹן
  chosen: strife
  alternatives:
  - contention
  - discord
  lexicon: HALOT
  rationale: A standard wisdom-term for quarrelsome conflict. 'Strife' is concise,
    natural, and semantically broad enough for interpersonal contention.
- source_word: נִרְגָּן
  chosen: a whisperer
  alternatives:
  - a slanderer
  - a grumbler
  - a gossip
  lexicon: HALOT
  rationale: The term refers to one who murmurs or speaks in a low, backbiting way.
    In Proverbs 18:8 and 26:20, 22 it overlaps with tale-bearing/gossip. 'Whisperer'
    preserves the image of covert speech and fits the parallelism with sowing conflict.
- source_word: מַפְרִיד
  chosen: separates
  alternatives:
  - divides
  - alienates
  lexicon: HALOT
  rationale: The participle expresses characteristic action. 'Separates' is a direct
    rendering and matches the social rupture described.
- source_word: אַלּוּף
  chosen: close friends
  alternatives:
  - an intimate friend
  - companions
  - a close companion
  lexicon: HALOT
  rationale: In this context the noun denotes a close associate or intimate companion
    rather than a military 'chief.' The singular may function collectively or generically
    in English; 'close friends' communicates the relational sense naturally and reflects
    the proverb's general truth.
