theological_decisions:
- issue: Moral characterization of גָּאוֹן and גֹּבַהּ רוּחַ
  chosen_reading: Both expressions are rendered negatively as pride/arrogance rather
    than neutral majesty or elevated disposition.
  alternative_readings:
  - '''majesty'' for גָּאוֹן in other contexts'
  - '''lofty spirit'' as a more literal but less explicit rendering'
  rationale: The proverb's synonymous parallelism links these traits with destruction
    and falling, making the negative ethical sense contextually certain. This is a
    lexical-contextual decision, not an imported doctrinal judgment.
  doctrine_reference: Translation philosophy §1, §3
