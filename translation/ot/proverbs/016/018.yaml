id: PRO.16.18
reference: Proverbs 16:18
source:
  edition: WLC
  text: לִ/פְנֵי שֶׁ֥בֶר גָּא֑וֹן וְ/לִ/פְנֵ֥י כִ֝שָּׁל֗וֹן גֹּ֣בַהּ רֽוּחַ־׃
translation:
  text: Pride comes before destruction, and a haughty spirit before a fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Before destruction is pride, and before stumbling, loftiness
      of spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - ahead of
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means 'before' in a temporal
    sense here, introducing what precedes the stated outcome in a proverb.
- source_word: שֶׁבֶר
  chosen: destruction
  alternatives:
  - breaking
  - ruin
  - crash
  lexicon: HALOT
  rationale: In wisdom literature this noun commonly denotes ruin or collapse rather
    than a literal fracture. 'Destruction' is idiomatic and fits the parallel with
    'fall'.
- source_word: גָּאוֹן
  chosen: pride
  alternatives:
  - arrogance
  - majesty
  - exaltation
  lexicon: HALOT
  rationale: Although the noun can denote majesty in some contexts, here the negative
    parallelism with downfall requires the unfavorable sense 'pride' or 'arrogance.'
    'Pride' is the most natural concise English rendering.
- source_word: וְלִפְנֵי
  chosen: and before
  alternatives:
  - and ahead of
  lexicon: HALOT
  rationale: The conjunction plus repeated preposition preserves the proverb's balanced
    parallel structure.
- source_word: כִּשָּׁלוֹן
  chosen: a fall
  alternatives:
  - stumbling
  - collapse
  lexicon: HALOT
  rationale: The noun refers to stumbling or downfall. 'A fall' is idiomatic in English
    and pairs well with 'destruction' without over-translating.
- source_word: גֹּבַהּ רוּחַ
  chosen: a haughty spirit
  alternatives:
  - loftiness of spirit
  - an exalted spirit
  - a proud spirit
  lexicon: HALOT
  rationale: This construct phrase literally means 'height of spirit.' In English,
    'haughty spirit' captures the metaphor of inner loftiness as arrogance and preserves
    the anthropological term 'spirit' rather than reducing it to attitude alone.
