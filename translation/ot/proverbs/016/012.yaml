theological_decisions:
- issue: Rendering of צדקה in a royal-wisdom context
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine excerpt lists 'righteousness' as the default rendering for
    cognate terms, with 'justice' preserved in footnotes where relevant. In Proverbs
    16:12 the term includes the idea of just rule, but 'righteousness' better preserves
    the broader moral quality grounding legitimate kingship. The alternative 'justice'
    is worth preserving because the immediate context concerns royal conduct and governance.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — δικαιοσύνη/righteousness
    vs. justice; principle of preserving alternatives in footnotes where context makes
    them relevant.'
