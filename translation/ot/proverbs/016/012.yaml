id: PRO.16.12
reference: Proverbs 16:12
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת מְ֭לָכִים עֲשׂ֣וֹת רֶ֑שַׁע כִּ֥י בִ֝/צְדָקָ֗ה יִכּ֥וֹן כִּסֵּֽא׃
translation:
  text: It is an abomination for kings to do wickedness, for a throne is established
    by righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "for a throne is established by justice."'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a disgusting thing
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable. 'Abomination' preserves
    the moral weight and proverbial terseness better than a flatter term like 'detestable
    thing.' The construct with 'kings' is rendered idiomatically in English as 'It
    is an abomination for kings...'.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: The plain sense is plural 'kings.' This fits the proverb's instruction
    about rulers generally. No broader paraphrase is needed.
- source_word: עֲשׂוֹת
  chosen: to do
  alternatives:
  - to commit
  - doing
  lexicon: HALOT
  rationale: The infinitive construct of עשה is straightforwardly rendered 'to do.'
    Although 'commit' can collocate well with evil, 'do' stays closer to the Hebrew
    and keeps the line concise.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - wrongdoing
  lexicon: HALOT
  rationale: The noun refers to wickedness or criminal wrong. 'Wickedness' best captures
    the moral dimension in wisdom literature. 'Evil' is possible but broader; 'wrongdoing'
    is somewhat weaker.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the first clause. 'For' is natural
    in English proverbial style and preserves the explanatory force.
- source_word: בְּצְדָקָה
  chosen: by righteousness
  alternatives:
  - through righteousness
  - by justice
  lexicon: HALOT
  rationale: 'The preposition ב marks means or basis: the throne is established by
    means of or on the basis of righteousness. ''Righteousness'' is chosen as the
    default rendering for צדקה in line with the doctrine guidance, while ''justice''
    is preserved as a lexical alternative because in royal contexts the term can overlap
    with just rule.'
- source_word: יִכּוֹן
  chosen: is established
  alternatives:
  - is made firm
  - is secured
  lexicon: HALOT
  rationale: The Niphal of כון conveys being established, set firm, or made secure.
    'Is established' is idiomatic and suits the political image of a stable throne.
- source_word: כִּסֵּא
  chosen: a throne
  alternatives:
  - the throne
  - royal throne
  lexicon: HALOT
  rationale: 'The singular noun is generic in proverbial usage. English idiom prefers
    the indefinite article here: ''a throne is established...'' rather than the more
    specific ''the throne,'' which could imply a particular monarchy.'
