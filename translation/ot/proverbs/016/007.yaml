theological_decisions:
- issue: Rendering the generic masculine אִישׁ
  chosen_reading: a man's ways
  alternative_readings:
  - a person's ways
  - one's ways
  rationale: The Hebrew uses a grammatically masculine singular noun with representative
    force. Per doctrine, gender-accurate renderings are preferred over flattening
    to gender-neutral language unless context requires otherwise. A footnote preserves
    the inclusive sense for modern readers.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for יְהוָה.
  doctrine_reference: 'DOCTRINE.md § Contested terms: יְהוָה YHWH'
