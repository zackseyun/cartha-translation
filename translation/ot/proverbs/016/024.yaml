id: PRO.16.24
reference: Proverbs 16:24
source:
  edition: WLC
  text: צוּף דְּ֭בַשׁ אִמְרֵי נֹ֑עַם מָת֥וֹק לַ֝/נֶּפֶשׁ וּ/מַרְפֵּ֥א לָ/עָֽצֶם־־׃
translation:
  text: Pleasant words are a honeycomb, sweet to the soul and healing to the bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Pleasant sayings are comb-honey'; the Hebrew image is literally 'honeycomb'
      or 'comb-honey.'
    reason: lexical_alternative
  - marker: b
    text: '''Soul'' here can also mean ''life,'' ''self,'' or ''inner being.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: צוּף דְּבַשׁ
  chosen: a honeycomb
  alternatives:
  - dripping honey
  - honey of the comb
  lexicon: HALOT
  rationale: The construct phrase literally denotes comb-honey/honeycomb. In English,
    'a honeycomb' is the most natural equivalent and preserves the concrete image
    better than the less idiomatic 'dripping honey.'
- source_word: אִמְרֵי
  chosen: words
  alternatives:
  - sayings
  - utterances
  lexicon: HALOT
  rationale: The plural construct means spoken words or utterances. 'Words' is the
    clearest modern English rendering in this proverb.
- source_word: נֹעַם
  chosen: pleasant
  alternatives:
  - gracious
  - delightful
  - pleasantness
  lexicon: HALOT
  rationale: The noun denotes pleasantness, delight, or agreeableness. In construct
    with 'words,' 'pleasant words' is idiomatic and fits the wisdom context without
    overinterpreting as specifically 'gracious' or morally loaded speech.
- source_word: מָתוֹק
  chosen: sweet
  alternatives:
  - pleasant
  - delightful
  lexicon: HALOT
  rationale: The adjective straightforwardly means 'sweet.' Retaining the sensory
    metaphor matches the honeycomb image and the parallelism.
- source_word: לַנֶּפֶשׁ
  chosen: to the soul
  alternatives:
  - to the life
  - to the person
  - to the inner being
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or inner being. Here, in poetic parallel
    with 'bones,' 'soul' best preserves the anthropological imagery and the proverb's
    inner/outer parallel without flattening it to mere emotion.
- source_word: וּמַרְפֵּא
  chosen: and healing
  alternatives:
  - and health
  - and medicine
  - and a remedy
  lexicon: HALOT
  rationale: The noun denotes healing or remedy. 'Healing' is the most natural abstract
    noun in English and fits the parallel with 'sweet to the soul.'
- source_word: לָעָצֶם
  chosen: to the bones
  alternatives:
  - to the body
  - to the bone frame
  lexicon: HALOT
  rationale: Though singular in Hebrew can function collectively, English idiom prefers
    the plural 'bones' in this expression. It preserves the bodily metaphor and the
    inner/outer parallel with 'soul'.
