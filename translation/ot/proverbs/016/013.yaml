id: PRO.16.13
reference: Proverbs 16:13
source:
  edition: WLC
  text: רְצ֣וֹן מְ֭לָכִים שִׂפְתֵי צֶ֑דֶק וְ/דֹבֵ֖ר יְשָׁרִ֣ים יֶאֱהָֽב־׃
translation:
  text: Righteous lips are the delight of kings, and he loves one who speaks what
    is upright.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Just lips are the favor of kings.' The Hebrew רְצוֹן can mean 'favor,'
      'pleasure,' or 'delight,' and צֶדֶק may be rendered 'justice' or 'righteousness'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'he loves one who speaks what is right.' The phrase 'what is upright'
      renders a plural form used substantivally in Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצוֹן
  chosen: delight
  alternatives:
  - favor
  - pleasure
  - acceptance
  lexicon: HALOT
  rationale: 'The noun denotes pleasure, favor, or what is acceptable. In this proverb
    it functions predicatively with ''kings'': righteous speech is what kings take
    pleasure in. ''Delight'' is idiomatic modern English and preserves the evaluative
    sense better than the more ambiguous ''will''.'
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal rulers
  lexicon: HALOT
  rationale: Straightforward plural of 'king.' 'Kings' preserves the concrete social
    setting of royal authority in wisdom literature.
- source_word: שִׂפְתֵי צֶדֶק
  chosen: Righteous lips
  alternatives:
  - just lips
  - honest speech
  - lips of righteousness
  lexicon: HALOT
  rationale: The construct phrase is literally 'lips of righteousness/justice.' In
    English, 'righteous lips' is concise and natural, referring metonymically to speech
    characterized by moral rightness. 'Just lips' is possible but sounds less idiomatic
    here.
- source_word: צֶדֶק
  chosen: righteous
  alternatives:
  - just
  - right
  lexicon: HALOT
  rationale: In this wisdom context the term describes morally right speech rather
    than a formal judicial verdict alone. 'Righteous' best captures the ethical dimension,
    while 'just' remains a viable alternative.
- source_word: וְדֹבֵר
  chosen: and he loves one who speaks
  alternatives:
  - and a speaker of
  - and whoever speaks
  - and he loves him who speaks
  lexicon: HALOT
  rationale: The participle 'speaker/speaking' is used substantivally. Rendering it
    as 'one who speaks' gives clear English while preserving the generic singular
    force. The subject of 'loves' is best understood from the prior colon as a king
    in the generic singular.
- source_word: יְשָׁרִים
  chosen: what is upright
  alternatives:
  - upright things
  - straightforwardly
  - what is right
  lexicon: HALOT
  rationale: The plural adjective functions substantivally, referring to upright or
    straight things, i.e., honest/right speech. 'What is upright' is idiomatic and
    preserves the moral nuance without awkward literalism.
- source_word: יֶאֱהָב
  chosen: he loves
  alternatives:
  - he will love
  - one loves
  lexicon: HALOT
  rationale: The imperfect can express habitual/generic action in proverbs. 'He loves'
    communicates the gnomic present sense in English better than a simple future.
