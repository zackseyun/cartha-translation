id: PRO.16.30
reference: Proverbs 16:30
source:
  edition: WLC
  text: עֹצֶ֣ה עֵ֭ינָי/ו לַ/חְשֹׁ֣ב תַּהְפֻּכ֑וֹת קֹרֵ֥ץ שְׂ֝פָתָ֗י/ו כִּלָּ֥ה רָעָֽה׃
translation:
  text: He who shuts his eyes to devise perverse things, who purses his lips, has
    brought evil to completion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who compresses his lips.' Some translations render the gesture more
      loosely; the Hebrew specifically refers to the lips, not the eyes.
    reason: lexical_alternative
  - marker: b
    text: Or 'has completed evil' / 'has accomplished evil.' The Hebrew verb emphasizes
      bringing an evil scheme to its full end.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹצֶה
  chosen: shuts
  alternatives:
  - closes
  - squeezes shut
  lexicon: HALOT
  rationale: The participle from עצה/עצם here refers to closing or shutting the eyes.
    'Shuts' is idiomatic and fits the scheming context better than a more wooden 'closes.'
- source_word: עֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with 3ms suffix.
- source_word: לַחְשֹׁב
  chosen: to devise
  alternatives:
  - to think up
  - to plan
  lexicon: HALOT
  rationale: חשב can mean think, plan, reckon. In wisdom literature with an object
    like 'perverse things,' it carries intentional plotting; 'devise' captures that
    nuance.
- source_word: תַּהְפֻּכוֹת
  chosen: perverse things
  alternatives:
  - devious things
  - twisted things
  - perversities
  lexicon: HALOT
  rationale: The plural denotes acts or schemes characterized by crookedness or perversity.
    'Perverse things' preserves the moral quality without over-paraphrasing.
- source_word: קֹרֵץ
  chosen: purses
  alternatives:
  - compresses
  - pinches
  - winks
  lexicon: HALOT
  rationale: Though קרץ can elsewhere refer to winking, here the direct object is
    'his lips,' not 'his eyes.' Therefore the sense is a tightening/pursing of the
    lips as a gesture accompanying malicious intent.
- source_word: שְׂפָתָיו
  chosen: his lips
  lexicon: HALOT
  rationale: Direct object of the participle; literal rendering is best.
- source_word: כִּלָּה
  chosen: has brought ... to completion
  alternatives:
  - has completed
  - has accomplished
  - consummates
  lexicon: HALOT
  rationale: 'כלה in the Piel commonly means complete, finish, bring to an end. Here
    it likely expresses the result of the schemer''s gestures: he has carried evil
    through to completion. This avoids the less natural English ''has completed evil''
    while preserving the verbal force.'
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - wickedness
  lexicon: HALOT
  rationale: The noun can denote moral evil or harmful wrongdoing. In this proverb's
    ethical context, 'evil' best preserves both the moral and practical sense.
