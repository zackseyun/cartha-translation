id: PRO.16.23
reference: Proverbs 16:23
source:
  edition: WLC
  text: לֵ֣ב חָ֭כָם יַשְׂכִּ֣יל פִּ֑י/הוּ וְ/עַל שְׂ֝פָתָ֗י/ו יֹסִ֥יף לֶֽקַח־׃
translation:
  text: The heart of a wise man gives insight to his mouth, and adds learning to his
    lips.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The heart of a wise man makes his mouth prudent.' The Hebrew verb can
      carry the sense of causing prudence or insight.
    reason: lexical_alternative
  - marker: b
    text: Or 'adds persuasiveness to his lips.' The Hebrew לֶקַח can denote instruction/learning
      and, by extension in context, speech that is instructive or persuasive.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner person, including thought and judgment,
    not merely emotion. 'Heart' preserves the Hebrew anthropological image and is
    standard English Bible diction; 'mind' is too interpretive here.
- source_word: חָכָם
  chosen: wise man
  alternatives:
  - wise person
  - wise one
  lexicon: HALOT
  rationale: The adjective is grammatically masculine singular and functions substantivally.
    Per the translation philosophy's gender-accurate principle, 'wise man' best matches
    the source form and representative sense; more inclusive alternatives are possible
    but less formally aligned.
- source_word: יַשְׂכִּיל
  chosen: gives insight
  alternatives:
  - makes prudent
  - instructs wisely
  - makes wise
  lexicon: HALOT
  rationale: Hiphil of שׂכל carries the sense of causing prudence/understanding or
    acting with insight. In this context, with 'his mouth' as object, the sense is
    that the wise inner life makes his speech discerning. 'Gives insight' communicates
    the causative nuance in natural English better than the more wooden 'makes prudent
    his mouth.'
- source_word: פִּיהוּ
  chosen: his mouth
  lexicon: HALOT
  rationale: A straightforward rendering of the noun with 3ms suffix. 'Mouth' is retained
    rather than paraphrased as 'speech' to preserve the concrete Hebrew expression,
    while the verbal choice already conveys the functional sense.
- source_word: וְעַל
  chosen: and
  alternatives:
  - and upon
  - and over
  lexicon: HALOT
  rationale: Although עַל normally means 'upon/on,' in this idiom introducing the
    second colon it functions loosely in parallel with the first line. Rendering simply
    'and' yields clear English while preserving the poetic coordination; a more literal
    'upon' would sound awkward and obscure the sense.
- source_word: שְׂפָתָיו
  chosen: his lips
  alternatives:
  - his speech
  lexicon: HALOT
  rationale: The concrete image 'lips' is preserved as a poetic parallel to 'mouth.'
    'Speech' would flatten the Hebrew parallelism.
- source_word: יֹסִיף
  chosen: adds
  alternatives:
  - increases
  - augments
  lexicon: HALOT
  rationale: The verb means to add or increase. 'Adds' is the most natural English
    choice and fits the proverb's concise style.
- source_word: לֶקַח
  chosen: learning
  alternatives:
  - persuasiveness
  - instruction
  - teaching
  lexicon: HALOT
  rationale: לֶקַח can denote instruction received or teaching. In wisdom literature
    it often refers to instructive content. Here 'learning' fits the idea that wise
    speech becomes more instructive. 'Persuasiveness' is possible in context but is
    less lexically direct and more interpretive.
