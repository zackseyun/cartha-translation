id: PRO.16.9
reference: Proverbs 16:9
source:
  edition: WLC
  text: לֵ֣ב אָ֭דָם יְחַשֵּׁ֣ב דַּרְכּ֑/וֹ וַֽ֝/יהוָ֗ה יָכִ֥ין צַעֲדֽ/וֹ׃
translation:
  text: A man's heart plans his way, but Yahweh establishes his steps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'directs his steps.' The Hebrew verb can mean 'makes firm,' 'establishes,' or in context 'directs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew anthropology לֵב commonly denotes the inner person as the seat of thought and intention, not merely emotion. 'Heart' preserves the Hebrew image while remaining natural English.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - humankind
  lexicon: HALOT
  rationale: Here the singular generic refers to an individual human being in representative sense. Per doctrine, gender-accurate rendering is preferred over gender-neutral where the source is grammatically masculine and representative. 'A man's heart' is idiomatic and matches the proverb's generic singular.
- source_word: יְחַשֵּׁב
  chosen: plans
  alternatives:
  - thinks through
  - devises
  - calculates
  lexicon: HALOT
  rationale: The piel of חשׁב here conveys intentional planning or devising. 'Plans' is concise, idiomatic, and fits proverbial style better than the more mechanical 'calculates' or the broader 'thinks'.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: דֶּרֶךְ often carries both literal and figurative senses of way of life or course. 'Way' preserves the Hebrew metaphor and pairs well with 'steps' in the second colon.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָכִין
  chosen: establishes
  alternatives:
  - directs
  - makes firm
  - sets in place
  lexicon: HALOT
  rationale: The hiphil of כון means to make firm, establish, or set securely. 'Establishes' best reflects the causative nuance without over-interpreting toward guidance alone. 'Directs' is a common traditional rendering but narrows the sense.
- source_word: צַעֲדוֹ
  chosen: his steps
  alternatives:
  - his step
  - his goings
  lexicon: HALOT
  rationale: Though singular in form with suffix, the noun often functions collectively for one's steps or movements. 'His steps' is idiomatic English and preserves the concrete metaphor for the course of life.
