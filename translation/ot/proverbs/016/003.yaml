id: PRO.16.3
reference: Proverbs 16:3
source:
  edition: WLC
  text: גֹּ֣ל אֶל יְהוָ֣ה מַעֲשֶׂ֑י/ךָ וְ֝/יִכֹּ֗נוּ מַחְשְׁבֹתֶֽי/ךָ־׃
translation:
  text: Commit your works to Yahweh, and your plans will be established.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Roll your works onto the LORD'; the idiom means to entrust or commit them to him.
    reason: lexical_alternative
  - marker: b
    text: Or 'your thoughts' or 'your purposes' for 'your plans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּל
  chosen: Commit
  alternatives:
  - Roll
  - Entrust
  lexicon: HALOT
  rationale: The imperative of גלל literally evokes 'rolling' something onto another, but in this idiom with אֶל יְהוָה it means to place one's affairs upon the LORD. 'Commit' is clear modern English and preserves the sense of entrusting one's undertakings to God without woodenly retaining the metaphor. 'Entrust' is also possible; 'roll' is more formal/literal but less natural here.
- source_word: אֶל
  chosen: to
  alternatives:
  - onto
  lexicon: HALOT
  rationale: The preposition marks direction toward the LORD. In English, 'commit ... to the LORD' is the most natural idiomatic equivalent. 'Onto' would preserve the underlying rolling imagery more explicitly but sounds awkward in the full clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַעֲשֶׂיךָ
  chosen: your works
  alternatives:
  - your deeds
  - what you do
  lexicon: HALOT
  rationale: The noun refers broadly to actions, deeds, or undertakings. 'Works' preserves the lexical connection to מעשה and fits wisdom-style exhortation. 'Deeds' is possible but can sound morally narrowed; 'what you do' is more dynamic.
- source_word: וְיִכֹּנוּ
  chosen: will be established
  alternatives:
  - will stand firm
  - will be made secure
  lexicon: HALOT
  rationale: From כון in the Niphal, the sense is to be established, set firm, or made secure. 'Will be established' best captures the passive/resultative nuance and is standard, clear English in wisdom literature.
- source_word: מַחְשְׁבֹתֶיךָ
  chosen: your plans
  alternatives:
  - your thoughts
  - your purposes
  lexicon: HALOT
  rationale: The noun can mean thoughts, plans, or intentions. In parallel with 'your works,' the practical sense 'plans' best fits the proverb's movement from action entrusted to God to intentions being firmly set. 'Thoughts' is more literal but less contextually precise in English.
