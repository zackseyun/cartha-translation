theological_decisions:
- issue: Whether כפר should be rendered with cultic 'make atonement' language or non-cultic
    'appease/pacify' language
  chosen_reading: 'Non-cultic: ''will appease it'''
  alternative_readings:
  - will make atonement for it
  - will pacify it
  rationale: The immediate context is royal anger, not sacrificial ritual. Rendering
    the verb as 'appease' preserves the semantic core of turning away wrath without
    importing temple or sacrificial theology that the proverb itself does not state.
    The lexical connection to atonement language is worth preserving in a footnote
    because the Hebrew verb is the same root often used in cultic contexts.
  doctrine_reference: Translation philosophy §3, §6
