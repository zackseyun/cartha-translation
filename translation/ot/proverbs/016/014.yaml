id: PRO.16.14
reference: Proverbs 16:14
source:
  edition: WLC
  text: חֲמַת מֶ֥לֶךְ מַלְאֲכֵי מָ֑וֶת וְ/אִ֖ישׁ חָכָ֣ם יְכַפְּרֶֽ/נָּה־־׃
translation:
  text: The wrath of a king is messengers of death, but a wise man will appease it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'messengers of death'; the term for 'messengers' can also mean 'angels,'
      but here it most likely refers to agents sent out by the king.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb is from the same root often rendered 'make atonement.' In
      this context it means to appease or turn away the king's wrath.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת
  chosen: wrath
  alternatives:
  - rage
  - fury
  - anger
  lexicon: HALOT
  rationale: The noun denotes burning anger or wrath. 'Wrath' preserves the proverb's
    elevated and weighty tone better than the flatter 'anger,' while fitting the danger
    implied by the parallel with death.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: The straightforward sense is a monarch or king. 'King' matches the concrete
    political setting of Proverbs and preserves the singular image.
- source_word: מַלְאֲכֵי
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: The Hebrew term can mean either human messengers or angels depending
    on context. Here, in royal court imagery, 'messengers' best fits the sense of
    agents sent out by the king's wrath, while avoiding importing supernatural beings
    into a wisdom saying about political danger.
- source_word: מָוֶת
  chosen: death
  alternatives:
  - deadly doom
  lexicon: HALOT
  rationale: The noun plainly means 'death.' The construct phrase is rendered literally
    as 'messengers of death' to preserve the vivid metaphor.
- source_word: וְאִישׁ חָכָם
  chosen: but a wise man
  alternatives:
  - and a wise man
  - but a wise person
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in English because the second
    colon contrasts the danger of royal wrath with the response of wisdom. 'Man' is
    retained in keeping with the masculine singular Hebrew and the project's gender-accurate
    policy; the phrase functions proverbially for a representative person.
- source_word: יְכַפְּרֶנָּה
  chosen: will appease it
  alternatives:
  - will pacify it
  - will make atonement for it
  - will cover it
  lexicon: HALOT
  rationale: From כפר in the piel, the verb can denote making atonement, expiation,
    or appeasement/pacification depending on context. In this courtly proverb, the
    object is the king's wrath (feminine suffix), so 'will appease it' best conveys
    turning away anger rather than cultic atonement. The pronominal suffix is represented
    by 'it,' referring back to the king's wrath.
