id: PRO.16.15
reference: Proverbs 16:15
source:
  edition: WLC
  text: בְּ/אוֹר פְּנֵי מֶ֥לֶךְ חַיִּ֑ים וּ֝/רְצוֹנ֗/וֹ כְּ/עָ֣ב מַלְקֽוֹשׁ־־׃
translation:
  text: In the light of a king’s face there is life, and his favor is like a cloud
    of spring rain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'his favor is like a cloud of the latter rain.'
    reason: lexical_alternative
  - marker: b
    text: The image is of the king’s favorable expression and goodwill bringing life
      and blessing, like the beneficial late-season rain for crops.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/אוֹר
  chosen: In the light of
  alternatives:
  - By the light of
  - In the brightness of
  lexicon: HALOT
  rationale: The preposition ב plus אוֹר is best rendered idiomatically as a locative/instrumental
    phrase. 'In the light of' preserves the Hebrew image while reading naturally in
    English.
- source_word: פְּנֵי
  chosen: face
  alternatives:
  - presence
  - countenance
  lexicon: HALOT
  rationale: Literally 'face.' In context it refers to the king’s facial expression
    or presence as the visible sign of favor. 'Face' keeps the concrete Hebrew imagery;
    'presence' is interpretive and 'countenance' is more archaic.
- source_word: מֶלֶךְ
  chosen: king
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: חַיִּים
  chosen: there is life
  alternatives:
  - is life
  - is living
  lexicon: HALOT
  rationale: The plural noun 'life/lives' functions idiomatically. Supplying 'there
    is' makes the verbless clause natural in English without adding interpretive content.
- source_word: וּ/רְצוֹנ/וֹ
  chosen: and his favor
  alternatives:
  - and his goodwill
  - and his acceptance
  lexicon: HALOT
  rationale: רָצוֹן commonly denotes favor, goodwill, or acceptance. 'Favor' best
    fits royal context and parallels the first colon’s image of life-giving royal
    approval.
- source_word: כְּ/עָב
  chosen: is like a cloud of
  alternatives:
  - is like the cloud of
  - is as a cloud of
  lexicon: HALOT
  rationale: The comparative כ plus עָב introduces a simile. 'A cloud of' is the most
    natural English expression.
- source_word: מַלְקוֹשׁ
  chosen: spring rain
  alternatives:
  - latter rain
  - late rain
  lexicon: HALOT
  rationale: מַלְקוֹשׁ refers to the late seasonal rain, especially in spring, crucial
    for crops. 'Spring rain' communicates the agricultural sense clearly for modern
    readers; the more formal 'latter rain' is preserved in a footnote.
