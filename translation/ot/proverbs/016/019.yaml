id: PRO.16.19
reference: Proverbs 16:19
source:
  edition: WLC
  text: ט֣וֹב שְׁפַל ר֭וּחַ אֶת עניים מֵֽ/חַלֵּ֥ק שָׁ֝לָ֗ל אֶת גֵּאִֽים־־־׃
translation:
  text: Better to be lowly in spirit with the poor than to divide plunder with the
    proud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humble in spirit with the poor' or 'with the afflicted.' The Hebrew
      עניים can refer to the poor, afflicted, or humble, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better
  alternatives:
  - It is better
  lexicon: HALOT
  rationale: Introduces the proverb's comparative evaluation. English 'Better' preserves
    the concise proverbial style more naturally than a fuller clause.
- source_word: שְׁפַל רוּחַ
  chosen: to be lowly in spirit
  alternatives:
  - humble in spirit
  - of a lowly spirit
  lexicon: HALOT
  rationale: The construct-like pairing expresses a disposition of humility/lowliness.
    'Lowly in spirit' is natural English and preserves the inward posture indicated
    by רוּחַ without over-psychologizing it.
- source_word: אֶת עניים
  chosen: with the poor
  alternatives:
  - among the poor
  - with the afflicted
  lexicon: HALOT
  rationale: Here אֶת is best taken in an associative sense ('with'), contrasting
    social alignment with the poor against sharing spoils with the proud. עניים can
    denote poor, afflicted, or humble; 'poor' fits the antithetical parallelism and
    common proverbial social sense.
- source_word: מֵחַלֵּק
  chosen: than to divide
  alternatives:
  - than dividing
  - than to share
  lexicon: HALOT
  rationale: The prefixed מִן marks comparison after טוֹב ('better than'). The infinitive/participle
    idea is well represented by 'than to divide,' matching the first colon's infinitival
    sense in English.
- source_word: שָׁלָל
  chosen: plunder
  alternatives:
  - spoil
  - booty
  lexicon: HALOT
  rationale: Refers to goods taken as spoil. 'Plunder' is clear modern English; 'spoil'
    is possible but less idiomatic today, and 'booty' is misleading in contemporary
    usage.
- source_word: אֶת גֵּאִים
  chosen: with the proud
  alternatives:
  - with the arrogant
  lexicon: HALOT
  rationale: Again אֶת is associative. גֵּאִים denotes the proud/arrogant; 'proud'
    is the more straightforward counterpart to 'lowly in spirit' in the first colon.
