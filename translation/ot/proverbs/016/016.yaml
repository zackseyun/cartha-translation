id: PRO.16.16
reference: Proverbs 16:16
source:
  edition: WLC
  text: קְֽנֹה חָכְמָ֗ה מַה טּ֥וֹב מֵ/חָר֑וּץ וּ/קְנ֥וֹת בִּ֝ינָ֗ה נִבְחָ֥ר מִ/כָּֽסֶף־־׃
translation:
  text: To acquire wisdom—how much better than gold! And to acquire understanding
    is to be chosen over silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fine gold' for 'gold' (חָרוּץ), emphasizing especially precious or refined
      gold.
    reason: lexical_alternative
  - marker: b
    text: Or 'understanding is preferable to silver.' The Hebrew participle can be
      rendered more idiomatically as a statement of preference.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְנֹה
  chosen: to acquire
  alternatives:
  - get
  - buy
  - possess
  lexicon: HALOT
  rationale: The verb קנה can mean acquire, get, buy, or possess depending on context.
    Here, in wisdom literature contrasting wisdom with precious metals, 'acquire'
    best preserves the intentional pursuit implied by the imperative-like form while
    sounding natural in English.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering for חכמה in Proverbs; it denotes practical and moral
    wisdom, not merely intelligence.
- source_word: מַה טּוֹב
  chosen: how much better
  alternatives:
  - how good
  - what is better
  lexicon: HALOT
  rationale: This idiom expresses exclamatory comparison. 'How much better' captures
    the comparative force naturally in English.
- source_word: חָרוּץ
  chosen: gold
  alternatives:
  - fine gold
  - precious gold
  lexicon: HALOT
  rationale: In Proverbs this noun commonly refers to gold, often refined or precious
    gold. 'Gold' is clear and idiomatic in the comparison; the nuance 'fine' is possible
    but not necessary in the main text.
- source_word: וּקְנוֹת
  chosen: and to acquire
  alternatives:
  - and acquiring
  - and the acquiring of
  lexicon: HALOT
  rationale: The infinitive construct parallels the first clause. Rendering it verbally
    as 'and to acquire' preserves the poetic balance and keeps the line readable.
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: בינה in Proverbs often denotes discernment or understanding. 'Understanding'
    is the most straightforward and pairs well with 'wisdom' in English.
- source_word: נִבְחָר
  chosen: is to be chosen over
  alternatives:
  - is preferable to
  - is more choice than
  - is chosen rather than
  lexicon: HALOT
  rationale: The passive participial form conveys that understanding is the thing
    to be preferred. 'Is to be chosen over' preserves that passive-preferential sense
    more closely than the smoother but more interpretive 'is preferable to.'
- source_word: כָּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The immediate parallel with gold favors the literal 'silver' rather than
    the broader economic sense 'money'.
