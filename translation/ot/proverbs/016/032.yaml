id: PRO.16.32
reference: Proverbs 16:32
source:
  edition: WLC
  text: ט֤וֹב אֶ֣רֶךְ אַ֭פַּיִם מִ/גִּבּ֑וֹר וּ/מֹשֵׁ֥ל בְּ֝/רוּח֗/וֹ מִ/לֹּכֵ֥ד עִֽיר׃
translation:
  text: Better is one who is slow to anger than a mighty man, and one who rules his
    spirit than one who captures a city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'patient'; literally 'long of nostrils,' a Hebrew idiom for being slow
      to anger.
    reason: lexical_alternative
  - marker: b
    text: Or 'his temper' or 'himself' for 'his spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: Better is
  alternatives:
  - is better than
  - better
  lexicon: HALOT
  rationale: In Hebrew wisdom comparisons, טוֹב commonly introduces a comparative
    proverb ('better ... than ...'). Rendering it as 'Better is' preserves the proverbial
    form and the explicit comparison with מִן.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: one who is slow to anger
  alternatives:
  - patient
  - long of nostrils
  - long-tempered
  lexicon: HALOT
  rationale: The idiom literally means 'long of nostrils/faces' and denotes patience
    or slowness to anger. 'Slow to anger' is clear modern English and preserves the
    idiomatic sense more precisely than the broader 'patient.'
- source_word: מִגִּבּוֹר
  chosen: than a mighty man
  alternatives:
  - than a warrior
  - than a strong man
  - than the mighty
  lexicon: HALOT
  rationale: גִּבּוֹר denotes a strong, mighty, or valiant man, often with martial
    connotations. 'Mighty man' keeps the singular masculine form and broad force without
    over-specifying warfare, though martial strength remains implicit in the comparison.
- source_word: וּמֹשֵׁל
  chosen: and one who rules
  alternatives:
  - and he who governs
  - and one who has dominion
  lexicon: HALOT
  rationale: The participle expresses an ongoing characteristic. 'One who rules' is
    natural English and parallels 'one who is slow to anger' as a character description.
- source_word: בְּרוּחוֹ
  chosen: his spirit
  alternatives:
  - himself
  - his temper
  - his inner self
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, wind, breath, or disposition. Here it refers to
    a person's inner impulse or temper under self-control. 'His spirit' stays close
    to the Hebrew while allowing the moral sense to be heard; alternatives like 'himself'
    are interpretive and broader.
- source_word: מִלֹּכֵד עִיר
  chosen: than one who captures a city
  alternatives:
  - than one who takes a city
  - than a conqueror of a city
  lexicon: HALOT
  rationale: לכד means to capture or seize, often in military contexts. 'Captures
    a city' is vivid, idiomatic, and preserves the martial comparison with external
    conquest versus self-mastery.
