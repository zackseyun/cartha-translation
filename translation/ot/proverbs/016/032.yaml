theological_decisions:
- issue: Anthropological sense of רוּחַ in wisdom context
  chosen_reading: '''his spirit'' referring to a person''s inner disposition or impulses
    under self-control'
  alternative_readings:
  - '''himself'' as a broader paraphrase'
  - '''his temper'' as a narrower interpretive gloss'
  rationale: The proverb contrasts mastery over the inner life with military conquest.
    Rendering רוּחַ as 'spirit' preserves the Hebrew term's breadth and avoids collapsing
    it either into mere emotion ('temper') or a totalizing paraphrase ('himself').
  doctrine_reference: Translation philosophy §§3, 5
