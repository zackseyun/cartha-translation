theological_decisions:
- issue: Whether the first colon teaches human merit as the cause of forgiveness
  chosen_reading: 'Rendered the Hebrew as a general proverb: steadfast love and faithfulness
    are the means/context in which iniquity is atoned for, without specifying the
    human or divine agent beyond the passive verb.'
  alternative_readings:
  - Atonement is effected by God's steadfast love and faithfulness
  - Human covenant loyalty obtains forgiveness
  rationale: The Hebrew passive יְכֻפַּר leaves the agent unstated. The translation
    preserves that ambiguity rather than resolving it toward either a purely divine-action
    reading or a human-merit reading. This follows the instruction to preserve theological
    tension where the source is genuinely ambiguous.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's contested-terms table for the Tetragrammaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
