id: PRO.16.6
reference: Proverbs 16:6
source:
  edition: WLC
  text: בְּ/חֶ֣סֶד וֶ֭/אֱמֶת יְכֻפַּ֣ר עָוֺ֑ן וּ/בְ/יִרְאַ֥ת יְ֝הוָ֗ה ס֣וּר מֵ/רָֽע׃
translation:
  text: By steadfast love and faithfulness iniquity is atoned for, and by the fear
    of the LORD one turns away from evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By steadfast love and truth iniquity is atoned for.' The Hebrew pair
      often carries the sense of loyal love and faithfulness, but 'truth' is also
      a possible rendering of אֱמֶת.
    reason: lexical_alternative
  - marker: b
    text: The verb 'is atoned for' leaves the agent unstated in Hebrew; the proverb
      does not explicitly say whether the focus is on God's action, the role of covenant
      virtues, or both.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּחֶסֶד
  chosen: by steadfast love
  alternatives:
  - through mercy
  - by covenant love
  - by loyal love
  lexicon: HALOT
  rationale: חֶסֶד carries a broad range including covenant loyalty, kindness, and
    steadfast love. 'Steadfast love' preserves the relational and durable sense better
    than the thinner 'kindness' or potentially misleading 'mercy' in this wisdom context.
    The prefixed ב is rendered instrumentally as 'by'.
- source_word: וֶאֱמֶת
  chosen: and faithfulness
  alternatives:
  - and truth
  - and reliability
  lexicon: HALOT
  rationale: אֱמֶת can mean 'truth' or 'faithfulness/reliability.' In the collocation
    חֶסֶד וֶאֱמֶת, the paired sense often denotes covenantal loyalty and dependability
    rather than abstract propositional truth, so 'faithfulness' best fits the proverb's
    ethical emphasis.
- source_word: יְכֻפַּר
  chosen: is atoned for
  alternatives:
  - is covered
  - is expiated
  - is purged
  lexicon: HALOT
  rationale: The Pual of כפר denotes the making of atonement/expiation. 'Is atoned
    for' is the most transparent English rendering and avoids flattening the term
    to merely 'covered.' The passive sense is preserved.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity, guilt, or the punishment/consequence of guilt
    depending on context. Here 'iniquity' preserves the moral crookedness in view
    while remaining broad enough to include culpability. 'Sin' is possible but less
    specific; 'guilt' narrows the sense.
- source_word: וּבְיִרְאַת יְהוָה
  chosen: and by the fear of the LORD
  alternatives:
  - and through the fear of the LORD
  - and in the fear of the LORD
  lexicon: HALOT
  rationale: יִרְאָה in wisdom literature commonly denotes reverent fear toward God.
    'Fear of the LORD' is the established and accurate rendering. Per doctrine, יְהוָה
    is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD,'
    following Jewish reverence tradition and the Septuagintal pattern.
- source_word: סוּר
  chosen: one turns away
  alternatives:
  - there is turning away
  - to turn away
  - one departs
  lexicon: HALOT
  rationale: The form is best taken as an impersonal/generic verbal expression in
    proverbial style. Rendering it as 'one turns away' gives natural English while
    preserving the general truth claim. 'Turns aside' is possible but less idiomatic
    here.
- source_word: מֵרָע
  chosen: from evil
  alternatives:
  - from harm
  - from what is evil
  lexicon: HALOT
  rationale: רָע here is moral evil rather than mere calamity, especially in parallel
    with fear of the LORD in wisdom literature. 'From evil' is concise and accurate.
