theological_decisions:
- issue: Gendered generic in אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The Hebrew uses masculine singular generically. Following the stated
    gender-accurate policy, the main text keeps 'man' rather than neutralizing it,
    since the proverb speaks representatively of human perception in general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Apparent-rightness idiom
  chosen_reading: seems right before a man
  alternative_readings:
  - is right in a man's eyes
  - seems right to a person
  rationale: The Hebrew does not explicitly include a verb of seeming, but the idiom
    communicates subjective appearance rather than objective moral correctness. 'Seems
    right' makes that force clear in idiomatic English without over-paraphrasing.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
