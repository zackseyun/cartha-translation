id: PRO.26.1
reference: Proverbs 26:1
source:
  edition: WLC
  text: כַּ/שֶּׁ֤לֶג בַּ/קַּ֗יִץ וְ/כַ/מָּטָ֥ר בַּ/קָּצִ֑יר כֵּ֤ן לֹא נָאוֶ֖ה לִ/כְסִ֣יל
    כָּבֽוֹד׀־׃
translation:
  text: Like snow in summer and like rain at harvest, so honor is not fitting for
    a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As snow in summer and rain at harvest, so honor does not befit a fool.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּשֶּׁלֶג
  chosen: Like snow
  alternatives:
  - As snow
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like snow' is natural modern English
    and preserves the simile.
- source_word: בַּקַּיִץ
  chosen: in summer
  alternatives:
  - in the summer
  lexicon: HALOT
  rationale: Refers to the hot dry season; 'in summer' is idiomatic and concise.
- source_word: וְכַמָּטָר
  chosen: and like rain
  alternatives:
  - and as rain
  lexicon: HALOT
  rationale: Second comparative image parallel to the first; 'and like rain' preserves
    the proverb's balanced structure.
- source_word: בַּקָּצִיר
  chosen: at harvest
  alternatives:
  - in harvest time
  - during harvest
  lexicon: HALOT
  rationale: קָצִיר denotes harvest; 'at harvest' is idiomatic and captures the seasonal
    setting relevant to the proverb's sense of impropriety.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Introduces the comparison's conclusion. 'So' is the most natural English
    equivalent in proverbial style.
- source_word: לֹא נָאוֶה
  chosen: is not fitting
  alternatives:
  - is not proper
  - does not befit
  - is not seemly
  lexicon: HALOT
  rationale: נָאוֶה conveys what is suitable, becoming, or appropriate. 'Is not fitting'
    communicates impropriety without sounding archaic.
- source_word: לִכְסִיל
  chosen: for a fool
  alternatives:
  - to a fool
  lexicon: HALOT
  rationale: 'The ל preposition here is best expressed in English as ''for'' with
    the predicate adjective: honor is not fitting for such a person. ''Fool'' is the
    standard wisdom-literature term and should be retained.'
- source_word: כָּבוֹד
  chosen: honor
  alternatives:
  - glory
  - esteem
  lexicon: HALOT
  rationale: In this wisdom context, כָּבוֹד refers to social honor or esteem rather
    than divine glory. 'Honor' best fits the proverb's concern with what is appropriate
    to bestow on a fool.
