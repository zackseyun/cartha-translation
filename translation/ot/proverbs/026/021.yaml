id: PRO.26.21
reference: Proverbs 26:21
source:
  edition: WLC
  text: פֶּחָ֣ם לְ֭/גֶחָלִים וְ/עֵצִ֣ים לְ/אֵ֑שׁ וְ/אִ֥ישׁ מדונים לְ/חַרְחַר רִֽיב־׃פ
translation:
  text: Charcoal for embers, and wood for fire, and a quarrelsome man for kindling
    strife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for stirring up strife' or 'for inflaming a quarrel.' The Hebrew verb
      carries the sense of causing contention to flare up, and the main text preserves
      the proverb's fire metaphor with 'kindling.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'a man of quarrels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּחָם
  chosen: charcoal
  alternatives:
  - coals
  lexicon: HALOT
  rationale: פֶּחָם denotes charcoal rather than burning coals in general. 'Charcoal'
    preserves the image of fuel added to existing heat, matching the proverb's comparison
    structure.
- source_word: גֶחָלִים
  chosen: embers
  alternatives:
  - coals
  - glowing coals
  lexicon: HALOT
  rationale: The plural refers to burning coals/embers. 'Embers' reads naturally in
    English and distinguishes this term from פֶּחָם, preserving the progression of
    fuel to flame.
- source_word: עֵצִים
  chosen: wood
  alternatives:
  - firewood
  - sticks
  lexicon: HALOT
  rationale: A common collective noun for wood. 'Wood' is concise and idiomatic in
    the parallelism; 'firewood' is possible but slightly more interpretive.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for fire.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular. Per translation philosophy,
    gender-accurate rendering is preferred where the source uses masculine representative
    language. 'Man' also fits proverbial style.
- source_word: מדונים
  chosen: quarrelsome
  alternatives:
  - contentious
  - given to strife
  - of quarrels
  lexicon: HALOT
  rationale: 'The noun form is used attributively: literally ''a man of quarrels/contentions.''
    ''Quarrelsome'' gives natural English while preserving the habitual character
    in view.'
- source_word: חַרְחַר
  chosen: kindling
  alternatives:
  - stirring up
  - inflaming
  lexicon: HALOT
  rationale: The infinitive conveys causing something to burn or flare up. In context
    of fire imagery and social conflict, 'kindling' preserves the metaphor tightly
    and links the two halves of the proverb.
- source_word: רִיב
  chosen: strife
  alternatives:
  - contention
  - quarrel
  - dispute
  lexicon: HALOT
  rationale: A broad term for contention or dispute. 'Strife' fits proverbial diction
    and pairs well with 'quarrelsome man' without sounding redundant.
