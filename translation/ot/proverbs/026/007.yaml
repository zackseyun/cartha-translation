id: PRO.26.7
reference: Proverbs 26:7
source:
  edition: WLC
  text: דַּלְי֣וּ שֹׁ֭קַיִם מִ/פִּסֵּ֑חַ וּ֝/מָשָׁ֗ל בְּ/פִ֣י כְסִילִֽים׃
translation:
  text: Like the legs that hang limp from a lame man, so is a proverb in the mouth
    of fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The legs of a lame man dangle; so does a proverb in the mouth of fools.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּלְיוּ
  chosen: hang limp
  alternatives:
  - are weak
  - dangle
  - are useless
  lexicon: HALOT
  rationale: The verb conveys drooping or hanging down slack rather than simple weakness.
    'Hang limp' captures the vivid image and fits the proverb's comparison.
- source_word: שֹׁקַיִם
  chosen: legs
  alternatives:
  - thighs
  - shanks
  lexicon: HALOT
  rationale: Although the Hebrew term can refer more specifically to lower limbs or
    thighs, 'legs' is the most natural and sufficiently precise English in this simile.
- source_word: מִפִּסֵּחַ
  chosen: from a lame man
  alternatives:
  - of a lame man
  - for a lame man
  lexicon: HALOT
  rationale: 'The preposition with the adjective/noun indicates source or association:
    the legs belong to or hang from a lame person. ''From a lame man'' preserves the
    Hebrew image most directly in English.'
- source_word: וּמָשָׁל
  chosen: so is a proverb
  alternatives:
  - and a proverb
  - so also a proverb
  - likewise a proverb
  lexicon: HALOT
  rationale: The conjunction introduces the second half of the comparison. English
    idiom requires making the comparative force explicit; 'so is a proverb' brings
    out the parallelism cleanly.
- source_word: מָשָׁל
  chosen: proverb
  alternatives:
  - parable
  - saying
  - maxim
  lexicon: HALOT
  rationale: In Proverbs, מָשָׁל most naturally refers to a proverb or wise saying.
    'Proverb' best matches the genre and immediate context.
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - on the lips of
  - in the speech of
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression for what someone says or carries
    in speech. 'In the mouth of' preserves the concrete metaphor.
- source_word: כְסִילִים
  chosen: fools
  alternatives:
  - the foolish
  - stupid people
  lexicon: HALOT
  rationale: '''Fools'' is the standard wisdom-literature rendering for כְּסִילִים
    and preserves the moral-intellectual category of Proverbs better than flatter
    modern substitutes.'
