id: PRO.26.20
reference: Proverbs 26:20
source:
  edition: WLC
  text: בְּ/אֶ֣פֶס עֵ֭צִים תִּכְבֶּה אֵ֑שׁ וּ/בְ/אֵ֥ין נִ֝רְגָּ֗ן יִשְׁתֹּ֥ק מָדֽוֹן־׃
translation:
  text: For lack of wood, the fire goes out, and where there is no whisperer, strife
    grows quiet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gossip' for 'whisperer.' The Hebrew term refers to a person who spreads
      damaging talk, often secretly or in a murmuring way.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֶפֶס
  chosen: for lack of
  alternatives:
  - in the absence of
  - without
  lexicon: HALOT
  rationale: The preposition ב plus אֶפֶס expresses absence/lack. 'For lack of' is
    idiomatic English and preserves the causal sense in the proverb.
- source_word: עֵצִים
  chosen: wood
  alternatives:
  - firewood
  - sticks
  lexicon: HALOT
  rationale: Plural 'woods/trees' here refers to fuel for a fire. 'Wood' is the most
    natural English collective term; 'firewood' is possible but slightly more interpretive.
- source_word: תִּכְבֶּה
  chosen: goes out
  alternatives:
  - is extinguished
  - dies out
  lexicon: HALOT
  rationale: From כבה, 'to be quenched/go out.' 'Goes out' is natural modern English
    for a fire and matches the intransitive Hebrew form.
- source_word: אֵשׁ
  chosen: the fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: 'English idiom prefers the definite form in this proverbial comparison:
    ''the fire goes out.'''
- source_word: וּבְאֵין
  chosen: and where there is no
  alternatives:
  - and without
  - and in the absence of
  lexicon: HALOT
  rationale: 'This construction parallels the first colon but is best rendered idiomatically
    as a locative/general condition: ''where there is no...''.'
- source_word: נִרְגָּן
  chosen: whisperer
  alternatives:
  - gossip
  - talebearer
  - slanderer
  lexicon: HALOT
  rationale: נרגן denotes one who murmurs, whispers, or spreads damaging talk. 'Whisperer'
    preserves the imagery and avoids over-specifying one subtype of harmful speech.
    Because 'gossip' is a common contextual rendering, it is preserved in a footnote.
- source_word: יִשְׁתֹּק
  chosen: grows quiet
  alternatives:
  - becomes silent
  - is quiet
  - ceases
  lexicon: HALOT
  rationale: From שתק, 'to be silent/be quiet.' Applied to strife, 'grows quiet' is
    idiomatic and preserves the image of contention subsiding rather than necessarily
    ending absolutely.
- source_word: מָדוֹן
  chosen: strife
  alternatives:
  - quarreling
  - contention
  - discord
  lexicon: HALOT
  rationale: מָדוֹן commonly denotes contention or strife. 'Strife' is concise, natural,
    and fits proverbial style.
