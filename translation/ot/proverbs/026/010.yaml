id: PRO.26.10
reference: Proverbs 26:10
source:
  edition: WLC
  text: רַ֥ב מְחֽוֹלֵֽל כֹּ֑ל וְ/שֹׂכֵ֥ר כְּ֝סִ֗יל וְ/שֹׂכֵ֥ר עֹבְרִֽים־׃
translation:
  text: Like an archer who wounds everyone is one who hires a fool or hires passersby.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is notoriously difficult. 'Like an archer who wounds everyone'
      follows a long-standing interpretation. Other renderings take the opening more
      literally, such as 'A great man brings forth all things' or similar, but these
      are less coherent in context.
    reason: alternative_reading
  - marker: b
    text: Or 'hires a fool and hires any passerby.' The point is indiscriminate hiring
      that causes harm.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב
  chosen: like an archer
  alternatives:
  - a great man
  - a master
  - many
  lexicon: HALOT
  rationale: The consonantal text is difficult, but in this proverb the traditional
    and contextually coherent sense takes רַב in the sense of an archer/shooter, likely
    reflecting an old lexical development or textual understanding preserved in major
    translations. This yields a balanced proverb matching the following participles
    about hiring indiscriminately. The more common sense 'great' or 'many' produces
    a much less intelligible line.
- source_word: מְחֹולֵל
  chosen: who wounds
  alternatives:
  - who brings forth
  - who pierces
  - who causes pain
  lexicon: HALOT
  rationale: From חול/חלל in a participial form, the context favors an injurious action
    done by the archer. 'Wounds' is idiomatic and fits the proverb's image of indiscriminate
    harm.
- source_word: כֹּל
  chosen: everyone
  alternatives:
  - all
  - everything
  lexicon: HALOT
  rationale: In context with an archer harming persons, the object is best rendered
    personally as 'everyone' rather than the less natural 'everything.'
- source_word: וְשֹׂכֵר
  chosen: is one who hires
  alternatives:
  - and hires
  - so is he who hires
  lexicon: HALOT
  rationale: 'The waw links the comparison to its application. English requires an
    explicit predicative sense: ''is one who hires.'' This preserves the proverb''s
    simile structure.'
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - a dullard
  - a stupid person
  lexicon: HALOT
  rationale: '''Fool'' is the standard wisdom-literature rendering for כסיל and preserves
    the moral-intellectual nuance of Proverbs.'
- source_word: וְשֹׂכֵר
  chosen: or hires
  alternatives:
  - and hires
  lexicon: HALOT
  rationale: The repeated participle likely presents a second object of the same reckless
    hiring pattern. 'Or hires' reads naturally in English and conveys the alternative
    but equally foolish action.
- source_word: עֹבְרִים
  chosen: passersby
  alternatives:
  - those passing by
  - transients
  - wanderers
  lexicon: HALOT
  rationale: From עבר, 'those passing by' or 'passersby' fits the image of hiring
    random, unqualified people encountered in passing. 'Passersby' is concise and
    natural.
