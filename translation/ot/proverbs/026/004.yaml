id: PRO.26.4
reference: Proverbs 26:4
source:
  edition: WLC
  text: אַל תַּ֣עַן כְּ֭סִיל כְּ/אִוַּלְתּ֑/וֹ פֶּֽן תִּשְׁוֶה לּ֥/וֹ גַם אָֽתָּה־־־־׃
translation:
  text: Do not answer a fool according to his folly, lest you also become like him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in a foolish manner.' The Hebrew phrase 'according to his folly' can
      refer to answering in a way that mirrors the fool's own foolishness.
    reason: lexical_alternative
  - marker: b
    text: Proverbs 26:5 gives the complementary instruction, 'Answer a fool according
      to his folly.' The two sayings together teach situational wisdom, not contradiction.
    reason: cross_reference
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect expresses a prohibition. 'Do not' is the natural
    modern English equivalent without adding emphasis not explicit in the Hebrew.
- source_word: תַּעַן
  chosen: answer
  alternatives:
  - respond to
  - reply to
  lexicon: HALOT
  rationale: ענה in this context means to answer or reply. 'Answer' is the most direct
    and idiomatic rendering and preserves the verbal link with the following verse.
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - the fool
  - a dullard
  lexicon: HALOT
  rationale: כְּסִיל is the standard wisdom-term for a morally and intellectually
    obstinate fool, not merely someone lacking intelligence. 'A fool' is the established
    and accurate English equivalent.
- source_word: כְאִוַּלְתּוֹ
  chosen: according to his folly
  alternatives:
  - in line with his folly
  - as his folly deserves
  - with his foolishness
  lexicon: HALOT
  rationale: 'The prefixed כ marks correspondence: answering in a manner that matches
    or mirrors the fool''s folly. ''According to his folly'' preserves the ambiguity
    of whether the warning is against matching his foolish mode rather than giving
    a fitting rebuttal; this also sets up the tension with v.5.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that you do not
  lexicon: HALOT
  rationale: פֶּן introduces a negative consequence to be avoided. 'Lest' is concise
    and precise here, and remains readable in modern English.
- source_word: תִּשְׁוֶה
  chosen: you become like
  alternatives:
  - you be equal to
  - you resemble
  lexicon: HALOT
  rationale: The verb from שוה here conveys becoming equal or like someone. In idiomatic
    English, 'become like' best expresses the warning of moral resemblance resulting
    from answering in the fool's manner.
- source_word: לּוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: With שוה the preposition marks the one to whom comparison is made. English
    expresses this naturally as 'like him' rather than the more literal but awkward
    'equal to him.'
- source_word: גַם אָתָּה
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: HALOT
  rationale: The phrase adds emphasis that the addressee may join the fool in likeness.
    'You also' is clear and fits the warning structure.
