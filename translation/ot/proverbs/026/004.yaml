theological_decisions:
- issue: Interpretive tension with the immediately following proverb (Prov 26:5)
  chosen_reading: Retain the literal tension by rendering 'according to his folly'
    without interpretive smoothing.
  alternative_readings:
  - Do not answer a fool as his folly deserves
  - Do not answer a fool in a foolish manner
  rationale: The paired proverbs intentionally preserve situational wisdom rather
    than offering a simplistic rule. The translation should not resolve the tension
    by narrowing the phrase to either deservedness or manner alone. Keeping 'according
    to his folly' allows the reader to feel the proverb's deliberate paradox with
    v.5.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
