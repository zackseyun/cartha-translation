id: PRO.26.11
reference: Proverbs 26:11
source:
  edition: WLC
  text: כְּ֭/כֶלֶב שָׁ֣ב עַל קֵא֑/וֹ כְּ֝סִ֗יל שׁוֹנֶ֥ה בְ/אִוַּלְתּֽ/וֹ־׃
translation:
  text: Like a dog returning to its vomit, so a fool repeats his folly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'As a dog returns to its vomit, so a fool returns to
      his folly.' The Hebrew uses participles in both halves, giving a vivid picture
      of habitual action.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֶלֶב
  chosen: Like a dog
  alternatives:
  - As a dog
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like a dog' is idiomatic modern English
    and preserves the simile clearly.
- source_word: שָׁב
  chosen: returning
  alternatives:
  - returns
  - turns back
  lexicon: HALOT
  rationale: The participial form presents the action in a vivid, characteristic way.
    'Returning' works naturally in English within the proverb's comparative structure;
    'returns' would also be possible.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - onto
  lexicon: HALOT
  rationale: Although the preposition is literally 'upon/on,' with the verb 'return'
    and the object 'vomit' English idiom prefers 'to its vomit.' This is an optimal-equivalence
    adjustment for naturalness without loss of sense.
- source_word: קֵאוֹ
  chosen: its vomit
  alternatives:
  - what it has vomited
  lexicon: HALOT
  rationale: The noun means 'vomit' with a 3ms suffix referring back to the dog. 'Its
    vomit' is the most direct and standard rendering.
- source_word: כְּסִיל
  chosen: a fool
  alternatives:
  - the fool
  - a dullard
  lexicon: HALOT
  rationale: כְּסִיל in Proverbs denotes a morally and intellectually obstinate fool,
    not merely someone lacking intelligence. 'A fool' is the established and accurate
    English equivalent.
- source_word: שׁוֹנֶה
  chosen: repeats
  alternatives:
  - returns to
  - does again
  lexicon: HALOT
  rationale: Here the verb conveys repetition. 'Repeats' captures the sense succinctly
    and fits the proverb's point that the fool goes back to the same behavior.
- source_word: בְאִוַּלְתּוֹ
  chosen: his folly
  alternatives:
  - in his folly
  - his foolishness
  lexicon: HALOT
  rationale: 'The noun means folly/foolishness with a 3ms suffix. Rendering the preposition
    idiomatically as a direct object after ''repeats'' produces natural English while
    preserving the meaning: he repeats the same folly that belongs to him.'
