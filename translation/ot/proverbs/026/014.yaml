id: PRO.26.14
reference: Proverbs 26:14
source:
  edition: WLC
  text: הַ֭/דֶּלֶת תִּסּ֣וֹב עַל צִירָ֑/הּ וְ֝/עָצֵ֗ל עַל מִטָּתֽ/וֹ־־׃
translation:
  text: A door turns on its hinge, and a sluggard on his bed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The door turns on its hinge, and the sluggard on his bed.' The Hebrew
      uses the article in both nouns, but English proverb style may render them generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדֶּלֶת
  chosen: a door
  alternatives:
  - the door
  lexicon: HALOT
  rationale: The noun means 'door.' Although the Hebrew has the article, English proverb
    style often uses the indefinite for a general comparison; this better conveys
    the generic force of the saying without losing meaning.
- source_word: תִּסּוֹב
  chosen: turns
  alternatives:
  - swings
  - goes around
  lexicon: HALOT
  rationale: From סבב, here describing the repeated motion of a door on its hinge.
    'Turns' is simple and natural, while remaining close to the Hebrew image.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates position or movement relative
    to the hinge/bed. 'On' is the natural modern English equivalent in both clauses.
- source_word: צִירָהּ
  chosen: its hinge
  alternatives:
  - its pivot
  lexicon: HALOT
  rationale: The noun refers to the door's hinge or pivot. 'Hinge' is the clearest
    idiomatic English term for the image.
- source_word: וְעָצֵל
  chosen: and a sluggard
  alternatives:
  - and a lazy man
  - and the sluggard
  lexicon: HALOT
  rationale: עָצֵל is the stock wisdom term for a habitually lazy person. 'Sluggard'
    preserves the proverbial and moral force better than the flatter 'lazy man.' The
    indefinite article matches the generic comparison.
- source_word: מִטָּתוֹ
  chosen: his bed
  alternatives:
  - his couch
  lexicon: HALOT
  rationale: The noun denotes a bed or sleeping place. 'Bed' is the most direct and
    natural rendering in this context.
