id: PRO.26.16
reference: Proverbs 26:16
source:
  edition: WLC
  text: חָכָ֣ם עָצֵ֣ל בְּ/עֵינָ֑י/ו מִ֝/שִּׁבְעָ֗ה מְשִׁ֣יבֵי טָֽעַם׃
translation:
  text: A sluggard is wiser in his own eyes than seven who answer with discernment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than seven who can give a sensible answer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכָם
  chosen: wiser
  alternatives:
  - wise
  lexicon: HALOT
  rationale: 'Predicate adjective ''wise'' is rendered comparatively in English because
    it is governed by the comparative construction with מִן (''than''). This yields
    natural English: ''is wiser ... than.'''
- source_word: עָצֵל
  chosen: sluggard
  alternatives:
  - lazy man
  - lazy person
  lexicon: HALOT
  rationale: A standard wisdom-literature term for a habitually lazy person. 'Sluggard'
    preserves the proverbial register and matches the semantic force better than the
    flatter 'lazy person.'
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  lexicon: HALOT
  rationale: Idiomatic Hebrew for self-perception or self-estimation. 'His own eyes'
    brings out the reflexive sense clearly in English.
- source_word: מִשִּׁבְעָה
  chosen: than seven
  alternatives:
  - more than seven
  lexicon: HALOT
  rationale: 'The preposition מִן marks comparison: the sluggard considers himself
    wiser than seven others. ''Than seven'' is the most direct rendering in context.'
- source_word: מְשִׁיבֵי
  chosen: who answer
  alternatives:
  - who respond
  - who reply
  lexicon: HALOT
  rationale: Participle from שוב in the causative/idiomatic sense of giving an answer
    or response. 'Who answer' is concise and fits the proverb's contrast between self-assessment
    and sound reply.
- source_word: טָעַם
  chosen: discernment
  alternatives:
  - good sense
  - judgment
  - understanding
  lexicon: HALOT
  rationale: Here טעם denotes judgment, sense, or discernment rather than literal
    taste. 'Discernment' best captures the wisdom context and the quality of a thoughtful
    answer.
