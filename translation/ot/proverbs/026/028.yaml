id: PRO.26.28
reference: Proverbs 26:28
source:
  edition: WLC
  text: לְֽשׁוֹן שֶׁ֭קֶר יִשְׂנָ֣א דַכָּ֑י/ו וּ/פֶ֥ה חָ֝לָ֗ק יַעֲשֶׂ֥ה מִדְחֶֽה־׃
translation:
  text: A lying tongue hates those it crushes, and a flattering mouth causes ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those wounded by it' or 'its crushed ones.' The Hebrew points to victims
      who have been crushed or oppressed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a smooth mouth'; that is, speech marked by flattery or deceitful
      smoothness.
    reason: lexical_alternative
  - marker: c
    text: Or 'causes downfall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשׁוֹן שֶׁקֶר
  chosen: a lying tongue
  alternatives:
  - a false tongue
  lexicon: HALOT
  rationale: The construct phrase literally means 'tongue of falsehood.' 'Lying tongue'
    is idiomatic modern English and preserves the personifying metaphor of speech
    as the agent.
- source_word: יִשְׂנָא
  chosen: hates
  alternatives:
  - will hate
  lexicon: HALOT
  rationale: The yiqtol here expresses a general truth/proverbial present rather than
    future time, so present-tense 'hates' best fits English proverbial style.
- source_word: דַכָּיו
  chosen: those it crushes
  alternatives:
  - its crushed ones
  - the oppressed by it
  - those wounded by it
  lexicon: HALOT
  rationale: The form refers to those who are crushed/oppressed. Rendering it as 'those
    it crushes' makes explicit the implied relation to the lying tongue and yields
    natural English while preserving the violent nuance of the Hebrew root.
- source_word: וּפֶה חָלָק
  chosen: and a flattering mouth
  alternatives:
  - and a smooth mouth
  - and a slick mouth
  lexicon: HALOT
  rationale: '''Smooth mouth'' is literal, but in Hebrew ''smooth'' speech commonly
    denotes flattery or deceitful smoothness. ''Flattering mouth'' communicates the
    idiom clearly in contemporary English.'
- source_word: יַעֲשֶׂה
  chosen: causes
  alternatives:
  - makes
  - works
  lexicon: HALOT
  rationale: The verb 'do/make' with the object 'ruin' is idiomatically rendered in
    English as 'causes' or 'brings about.' 'Causes' is concise and natural.
- source_word: מִדְחֶה
  chosen: ruin
  alternatives:
  - downfall
  - destruction
  - stumbling
  lexicon: HALOT
  rationale: The noun denotes a fall, overthrow, or ruin. 'Ruin' fits the wisdom context
    and pairs well with the destructive effect of flattering speech. 'Downfall' is
    a viable alternative and is preserved in a footnote.
