id: PRO.26.2
reference: Proverbs 26:2
source:
  edition: WLC
  text: כַּ/צִּפּ֣וֹר לָ֭/נוּד כַּ/דְּר֣וֹר לָ/ע֑וּף כֵּ֥ן קִֽלְלַ֥ת חִ֝נָּ֗ם לא תָבֹֽא׃
translation:
  text: Like a sparrow in its wandering, like a swallow in its flying, so an undeserved
    curse does not come to rest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a swift' for the second bird term.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a curse without cause'; that is, a baseless or undeserved curse.
    reason: lexical_alternative
  - marker: c
    text: Literally 'does not come.' The imagery suggests it does not land or take
      effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּצִּפּוֹר
  chosen: Like a sparrow
  alternatives:
  - Like a bird
  lexicon: HALOT
  rationale: 'צִפּוֹר can denote a small bird generally, but in wisdom literature
    ''sparrow'' is a natural and established specific rendering that fits the parallel
    with דְּרוֹר. The prefixed כ marks comparison: ''like.'''
- source_word: לָנוּד
  chosen: in its wandering
  alternatives:
  - to wander
  - flitting about
  - restlessly wandering
  lexicon: HALOT
  rationale: נוּד conveys wandering, fluttering, or aimless movement. Rendering it
    as a verbal noun phrase after 'like a sparrow' preserves the poetic simile and
    the sense of unsettled motion.
- source_word: כַּדְּרוֹר
  chosen: like a swallow
  alternatives:
  - like a swift
  lexicon: HALOT
  rationale: דְּרוֹר is traditionally rendered 'swallow,' though some identify it
    as 'swift.' 'Swallow' remains the most recognizable English equivalent and suits
    the proverb's imagery; the zoological alternative is preserved in a footnote.
- source_word: לָעוּף
  chosen: in its flying
  alternatives:
  - to fly
  - in flight
  lexicon: HALOT
  rationale: עוּף denotes flying. 'In its flying' mirrors the structure of the first
    colon and keeps the image vivid and parallel.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: כֵּן introduces the comparison's conclusion. 'So' is concise, natural,
    and preserves the proverbial structure.
- source_word: קִלְלַת
  chosen: curse
  alternatives:
  - a curse
  lexicon: HALOT
  rationale: 'Construct form with חִנָּם: ''curse of/for nothing,'' idiomatically
    ''undeserved curse.'' English requires an article in context, but the core lexical
    value is ''curse.'''
- source_word: חִנָּם
  chosen: undeserved
  alternatives:
  - without cause
  - for nothing
  - groundless
  lexicon: HALOT
  rationale: חִנָּם commonly means 'without cause' or 'gratuitously.' 'Undeserved'
    communicates the moral sense in clear modern English and fits the proverb's point
    that a baseless curse finds no landing place.
- source_word: לֹא תָבֹא
  chosen: does not come to rest
  alternatives:
  - does not come
  - will not come
  - does not alight
  lexicon: HALOT
  rationale: בוא literally means 'come,' but in this simile of birds in motion the
    sense is that the curse does not arrive upon or settle on its target. 'Come to
    rest' makes the implied image explicit without over-paraphrasing; 'alight' is
    possible but less natural for modern readers.
