theological_decisions:
- issue: Interpretive tension with Proverbs 26:4
  chosen_reading: Retain the literal phrasing 'according to his folly' without resolving
    the apparent paradox in translation.
  alternative_readings:
  - Answer him as his folly deserves
  - Answer him in a way fitted to his folly
  rationale: 'The adjacent proverbs intentionally preserve wisdom''s situational tension:
    one must not answer in a way that makes oneself like the fool (v. 4), yet one
    must answer in a way appropriate to exposing the fool''s folly when needed (v.
    5). The translation should preserve that tension rather than flatten it.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
