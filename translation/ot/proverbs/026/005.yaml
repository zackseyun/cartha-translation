id: PRO.26.5
reference: Proverbs 26:5
source:
  edition: WLC
  text: עֲנֵ֣ה כְ֭סִיל כְּ/אִוַּלְתּ֑/וֹ פֶּן יִהְיֶ֖ה חָכָ֣ם בְּ/עֵינָֽי/ו־׃
translation:
  text: Answer a fool according to his folly, lest he be wise in his own eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Answer a fool as his folly deserves.' The Hebrew means to answer in
      a way fitting to his folly, not to imitate his foolishness.
    reason: lexical_alternative
  - marker: b
    text: This saying intentionally stands in tension with Proverbs 26:4; wisdom discerns
      when silence and when rebuttal are appropriate.
    reason: cross_reference
lexical_decisions:
- source_word: עֲנֵה
  chosen: Answer
  alternatives:
  - Respond to
  lexicon: HALOT
  rationale: Imperative of ענה in this context calls for giving a reply. 'Answer'
    is the most natural and concise English imperative and matches the proverb's parallel
    with the previous verse.
- source_word: כְסִיל
  chosen: a fool
  alternatives:
  - a dullard
  - a stupid person
  lexicon: HALOT
  rationale: כְסִיל is the standard wisdom-term for a morally and intellectually obstinate
    fool. 'A fool' preserves the established wisdom-category without unnecessary paraphrase.
- source_word: כְאִוַּלְתּוֹ
  chosen: according to his folly
  alternatives:
  - as his folly deserves
  - in keeping with his foolishness
  lexicon: HALOT
  rationale: 'The prefixed כ marks correspondence: the answer is to be given in relation
    to, or in keeping with, the fool''s folly. ''According to his folly'' preserves
    the Hebrew wording and the deliberate tension with v. 4. It does not mean to imitate
    the fool''s folly, but to answer in a way suited to exposing it.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that he may not
  lexicon: HALOT
  rationale: פֶּן introduces a negative purpose or prevention clause. 'Lest' is concise
    and accurate in proverbial style, though slightly elevated; it remains readily
    understandable in modern English.
- source_word: יִהְיֶה חָכָם
  chosen: he be wise
  alternatives:
  - he become wise
  - he seem wise
  lexicon: HALOT
  rationale: The clause is not saying the fool truly becomes wise, but that he comes
    to regard himself as wise. 'He be wise' works idiomatically with the following
    phrase 'in his own eyes' and preserves the Hebrew construction.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his own sight
  lexicon: HALOT
  rationale: This Hebrew idiom means in one's own estimation or self-perception. 'In
    his own eyes' is the standard English equivalent and preserves the metaphor.
