id: PRO.26.22
reference: Proverbs 26:22
source:
  edition: WLC
  text: דִּבְרֵ֣י נִ֭רְגָּן כְּ/מִֽתְלַהֲמִ֑ים וְ֝/הֵ֗ם יָרְד֥וּ חַדְרֵי בָֽטֶן־׃
translation:
  text: The words of a whisperer are like delicious morsels, and they go down into
    the inner chambers of the belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like dainty bits' / 'like things greedily swallowed.' The Hebrew term
      is rare and debated; older tradition rendered it 'like wounds.'
    reason: lexical_alternative
  - marker: b
    text: '''The inner chambers of the belly'' is a Hebrew image for the deepest inward
      parts of a person.'
    reason: cultural_note
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The sayings of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר; 'words of' is the most natural and sufficiently
    formal rendering in English.
- source_word: נִרְגָּן
  chosen: a whisperer
  alternatives:
  - a gossip
  - a grumbler
  - a slanderer
  lexicon: HALOT
  rationale: In Proverbs this noun denotes one who spreads murmured, divisive talk.
    'Whisperer' preserves the image of secretive speech better than the broader 'gossip.'
    'Grumbler' fits some contexts lexically but is less suitable here because the
    following line concerns the seductive effect of tale-bearing speech.
- source_word: כְּמִתְלַהֲמִים
  chosen: like delicious morsels
  alternatives:
  - like dainty bits
  - like wounds
  - like things greedily swallowed
  lexicon: HALOT
  rationale: This rare form is debated. In Proverbs 18:8, the same expression is commonly
    understood as enticing or tasty morsels, fitting the parallel idea that such words
    are eagerly received and internalized. The alternative 'wounds' likely reflects
    an older traditional rendering but fits the immediate imagery less well here.
- source_word: וְהֵם
  chosen: and they
  lexicon: HALOT
  rationale: Explicit pronoun retained for clarity and to mirror the Hebrew emphasis
    on the words themselves.
- source_word: יָרְדוּ
  chosen: go down
  alternatives:
  - descend
  - sink down
  lexicon: HALOT
  rationale: Common verb ירד; present English 'go down' fits proverbial style better
    than a simple past in this gnomic statement.
- source_word: חַדְרֵי בָטֶן
  chosen: the inner chambers of the belly
  alternatives:
  - the innermost parts
  - the depths of one's being
  - the chambers of the stomach
  lexicon: HALOT
  rationale: Literally 'rooms/chambers of the belly.' Retaining the concrete metaphor
    preserves the Hebrew imagery of speech penetrating to a person's inmost interior.
    'Belly' is more literal than the interpretive 'being,' though the latter sense
    is worth preserving in a footnote.
