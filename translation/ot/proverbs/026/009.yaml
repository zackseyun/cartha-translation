id: PRO.26.9
reference: Proverbs 26:9
source:
  edition: WLC
  text: ח֭וֹחַ עָלָ֣ה בְ/יַד שִׁכּ֑וֹר וּ֝/מָשָׁ֗ל בְּ/פִ֣י כְסִילִֽים־׃
translation:
  text: Like a thorn that comes up in the hand of a drunkard, so is a proverb in the
    mouth of fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like a thornbush in the hand of a drunkard, so is a proverb in the mouth
      of fools.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb literally means 'goes up' or 'ascends'; the image may be
      of a thorn being lifted, brandished, or coming up into the drunkard's hand in
      a dangerous, uncontrolled way.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹחַ
  chosen: thorn
  alternatives:
  - brier
  - thornbush
  lexicon: HALOT
  rationale: The noun denotes a thorny plant or thorn. In this proverb the image is
    of something sharp and harmful, and 'thorn' is the most natural concise English
    equivalent.
- source_word: עָלָה
  chosen: comes up
  alternatives:
  - goes up
  - is lifted up
  - springs up
  lexicon: HALOT
  rationale: The verb literally means 'goes up/ascends.' In this context, with 'in
    the hand of a drunkard,' it likely describes a thorn being brandished or coming
    up into use in an uncontrolled way. 'Comes up' preserves the Hebrew image without
    over-interpreting it as deliberate wielding.
- source_word: בְּיַד
  chosen: in the hand of
  alternatives:
  - in the grasp of
  - by the hand of
  lexicon: HALOT
  rationale: The preposition with 'hand' is rendered straightforwardly. 'In the hand
    of' keeps the concrete imagery and avoids adding interpretive nuance.
- source_word: שִׁכּוֹר
  chosen: drunkard
  alternatives:
  - drunken man
  - one who is drunk
  lexicon: HALOT
  rationale: The adjective/substantive refers to a drunken person. 'Drunkard' is idiomatic
    in English proverbial style and conveys a person characterized by drunkenness.
- source_word: מָשָׁל
  chosen: proverb
  alternatives:
  - parable
  - wise saying
  - maxim
  lexicon: HALOT
  rationale: In Proverbs, מָשָׁל commonly denotes a proverb or aphoristic saying.
    'Proverb' best fits both the book's genre and the immediate comparison.
- source_word: בְּפִי
  chosen: in the mouth of
  alternatives:
  - on the lips of
  lexicon: HALOT
  rationale: A literal rendering preserves the parallel with 'in the hand of' and
    keeps the embodied imagery of speech.
- source_word: כְסִילִים
  chosen: fools
  alternatives:
  - stupid people
  lexicon: HALOT
  rationale: The plural of כְּסִיל is the standard wisdom-literature term for morally
    dull or obstinate fools, not merely unintelligent persons. 'Fools' is the established
    and accurate rendering.
