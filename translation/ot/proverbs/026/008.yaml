id: PRO.26.8
reference: Proverbs 26:8
source:
  edition: WLC
  text: כִּ/צְר֣וֹר אֶ֭בֶן בְּ/מַרְגֵּמָ֑ה כֵּן נוֹתֵ֖ן לִ/כְסִ֣יל כָּבֽוֹד־׃
translation:
  text: Like tying a stone in a sling, so is one who gives honor to a fool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Like placing a stone in a heap of stones, so is one who gives
      honor to a fool.' The Hebrew term translated 'sling' is lexically uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּ/צְר֣וֹר
  chosen: Like tying
  alternatives:
  - Like binding
  - Like fastening
  lexicon: HALOT
  rationale: The form is best taken from the verb צרר, 'to bind/tie up.' Rendering
    it verbally preserves the proverb's simile structure. 'Tying' is idiomatic modern
    English and fits the concrete image better than the more formal 'binding.'
- source_word: אֶבֶן
  chosen: a stone
  alternatives:
  - a rock
  lexicon: HALOT
  rationale: אֶבֶן commonly means 'stone.' 'Stone' fits the likely sling imagery and
    is the standard, unmarked rendering.
- source_word: בְּ/מַרְגֵּמָה
  chosen: in a sling
  alternatives:
  - in a stone-heap
  - in a heap of stones
  lexicon: HALOT
  rationale: 'The noun is difficult and has been understood either as ''sling'' or
    as something like a ''heap of stones.'' In context, ''sling'' yields a coherent
    proverb: tying a stone into a sling makes it useless or dangerous, paralleling
    giving honor to a fool. This is the most widely adopted contextual sense in modern
    translations, while the alternative is preserved in a footnote because the lexical
    sense is debated.'
- source_word: כֵּן
  chosen: so is
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: כֵּן marks the comparison between image and application. 'So is' makes
    the English proverb read naturally while preserving the explicit analogy.
- source_word: נוֹתֵן
  chosen: one who gives
  alternatives:
  - he who gives
  - giving
  lexicon: HALOT
  rationale: The participle denotes a general person characterized by the action.
    'One who gives' preserves the generic force in natural English without over-specifying
    gender.
- source_word: לִ/כְסִ֣יל
  chosen: to a fool
  alternatives:
  - to the fool
  lexicon: HALOT
  rationale: כְסִיל in Proverbs denotes the morally dull, obstinate fool. The indefinite
    'a fool' suits the generic proverbial statement.
- source_word: כָּבֽוֹד
  chosen: honor
  alternatives:
  - glory
  - weight
  lexicon: HALOT
  rationale: In wisdom literature this noun commonly refers to social honor or esteem.
    'Honor' is the clearest contextual rendering; 'glory' would sound too elevated
    here, and 'weight' is too literal for the proverb's sense.
