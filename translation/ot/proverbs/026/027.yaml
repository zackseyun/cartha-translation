id: PRO.26.27
reference: Proverbs 26:27
source:
  edition: WLC
  text: כֹּֽרֶה שַּׁ֭חַת בָּ֣/הּ יִפֹּ֑ל וְ/גֹ֥לֵ֥ל אֶ֝בֶן אֵלָ֥י/ו תָּשֽׁוּב־׃
translation:
  text: Whoever digs a pit will fall into it, and whoever rolls a stone—it will come
    back on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he who rolls a stone, it will return to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּרֶה
  chosen: Whoever digs
  alternatives:
  - He who digs
  - One who digs
  lexicon: HALOT
  rationale: Qal participle used substantivally for a general person; 'whoever digs'
    gives the proverb's generic force in natural modern English.
- source_word: שַּׁחַת
  chosen: a pit
  alternatives:
  - a ditch
  - a trap-pit
  lexicon: HALOT
  rationale: Common wisdom-literature image of a pit dug for another that ensnares
    the digger. 'Pit' is the most idiomatic and broadly accurate rendering.
- source_word: בָּהּ
  chosen: into it
  alternatives:
  - in it
  lexicon: HALOT
  rationale: Refers back to the feminine noun 'pit.' English idiom with 'fall' prefers
    'fall into it' rather than simply 'fall in it' in this proverbial context.
- source_word: יִפֹּל
  chosen: will fall
  alternatives:
  - falls
  lexicon: HALOT
  rationale: Imperfect here expresses the predictable consequence in a proverb. English
    future best captures the gnomic cause-and-effect sense.
- source_word: וְגֹלֵל
  chosen: and whoever rolls
  alternatives:
  - and he who rolls
  - and one rolling
  lexicon: HALOT
  rationale: Like the first colon, the participle is substantival and generic. Repeating
    'whoever' preserves the parallelism and clarity in English.
- source_word: אֶבֶן
  chosen: a stone
  alternatives:
  - a rock
  lexicon: HALOT
  rationale: '''Stone'' is the standard and sufficiently broad rendering for אֶבֶן
    here, matching the proverb''s imagery.'
- source_word: אֵלָיו
  chosen: on him
  alternatives:
  - back to him
  - against him
  lexicon: HALOT
  rationale: With שוב, the sense is that the stone returns upon the one who set it
    in motion. 'On him' conveys the harmful recoil succinctly; the fuller idea 'come
    back on him' is expressed in the clause.
- source_word: תָּשׁוּב
  chosen: it will come back
  alternatives:
  - it will return
  - it turns back
  lexicon: HALOT
  rationale: The feminine verb agrees with 'stone.' 'Come back' is idiomatic English
    for the boomerang-like reversal intended by the proverb; 'return' is possible
    but slightly stiffer.
