id: PRO.26.18
reference: Proverbs 26:18
source:
  edition: WLC
  text: כְּֽ֭/מִתְלַהְלֵהַּ הַ/יֹּרֶ֥ה זִקִּ֗ים חִצִּ֥ים וָ/מָֽוֶת׃
translation:
  text: Like a madman who shoots firebrands, arrows, and death,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like one who acts insanely' or 'Like a delirious person.'
    reason: lexical_alternative
  - marker: b
    text: '''Firebrands'' may also be rendered ''burning missiles'' or ''flaming darts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמִתְלַהְלֵהַּ
  chosen: Like a madman
  alternatives:
  - Like one who acts insanely
  - Like a delirious person
  - Like a reckless man
  lexicon: HALOT
  rationale: The prefixed כ introduces comparison, 'like/as.' The participial form
    from הלל in the hitpael here carries the sense of behaving irrationally or wildly,
    not praise/boasting. 'Madman' is concise, idiomatic, and fits the proverb's vivid
    simile. 'Reckless man' is too weak; the image is of deranged, dangerous behavior.
- source_word: הַיֹּרֶה
  chosen: who shoots
  alternatives:
  - who throws
  - who hurls
  lexicon: HALOT
  rationale: From ירה, commonly 'to shoot' in contexts of arrows/projectiles. Because
    the following objects include arrows and likely incendiary missiles, 'shoots'
    best preserves the projectile imagery. 'Throws' is possible for firebrands but
    less fitting with arrows.
- source_word: זִקִּים
  chosen: firebrands
  alternatives:
  - sparks
  - flaming darts
  - burning missiles
  lexicon: HALOT
  rationale: The noun denotes fiery missiles or burning brands. 'Firebrands' is the
    most established and still understandable English rendering, preserving the image
    of dangerous incendiary projectiles. 'Sparks' is too small-scale; 'flaming darts'
    is interpretive.
- source_word: חִצִּים
  chosen: arrows
  lexicon: HALOT
  rationale: Standard meaning of the noun; no contextual reason to depart from the
    ordinary gloss.
- source_word: וָמָוֶת
  chosen: and death
  alternatives:
  - and deadly blows
  - and killing
  lexicon: HALOT
  rationale: The Hebrew literally reads 'and death.' Retaining the stark abstract
    noun preserves the proverb's climactic force and avoids over-interpreting whether
    death is a final projectile, the result of the projectiles, or a poetic summary
    of lethal harm.
