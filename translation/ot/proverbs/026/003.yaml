id: PRO.26.3
reference: Proverbs 26:3
source:
  edition: WLC
  text: שׁ֣וֹט לַ֭/סּוּס מֶ֣תֶג לַ/חֲמ֑וֹר וְ֝/שֵׁ֗בֶט לְ/גֵ֣ו כְּסִילִֽים׃
translation:
  text: A whip for the horse, a bridle for the donkey, and a rod for the back of fools.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lash' for שׁוֹט.
    reason: lexical_alternative
  - marker: b
    text: מֶתֶג can also be rendered 'bit,' though 'bridle' better reflects the controlling
      gear as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹט
  chosen: whip
  alternatives:
  - lash
  lexicon: HALOT
  rationale: Refers to an instrument used to drive or discipline an animal. 'Whip'
    is the most natural modern English equivalent and fits the parallel with horse
    and donkey.
- source_word: לַסּוּס
  chosen: for the horse
  alternatives:
  - for a horse
  lexicon: HALOT
  rationale: 'The preposition ל marks suitability or assignment: the whip is for the
    horse. Definite ''the horse'' works proverbially in English, matching the Hebrew
    article.'
- source_word: מֶתֶג
  chosen: bridle
  alternatives:
  - bit
  - reins
  lexicon: HALOT
  rationale: The term denotes a bridle or controlling harness for an animal. 'Bridle'
    best captures the full controlling device, whereas 'bit' is narrower and 'reins'
    are only one part.
- source_word: לַחֲמוֹר
  chosen: for the donkey
  alternatives:
  - for the ass
  lexicon: HALOT
  rationale: '''Donkey'' is standard readable modern English. ''Ass'' is traditional
    but now potentially distracting or misunderstood.'
- source_word: וְשֵׁבֶט
  chosen: and a rod
  alternatives:
  - and a staff
  - and a stick
  lexicon: HALOT
  rationale: In wisdom literature שֵׁבֶט commonly denotes a rod used for discipline
    or striking. 'Rod' preserves that disciplinary nuance better than the broader
    'staff' or 'stick'.
- source_word: לְגֵו
  chosen: for the back
  alternatives:
  - for the body
  - for the backside
  lexicon: HALOT
  rationale: The noun refers to the back or body, especially the back as the place
    struck. 'Back' is the clearest idiomatic rendering in this disciplinary context.
- source_word: כְּסִילִים
  chosen: of fools
  alternatives:
  - for fools
  lexicon: HALOT
  rationale: The plural noun means 'fools' in the moral-wisdom sense characteristic
    of Proverbs. Rendering the phrase as 'the back of fools' follows the Hebrew construction
    more closely than restructuring to 'for fools.'
