id: PRO.26.13
reference: Proverbs 26:13
source:
  edition: WLC
  text: אָמַ֣ר עָ֭צֵל שַׁ֣חַל בַּ/דָּ֑רֶךְ אֲ֝רִ֗י בֵּ֣ין הָ/רְחֹבֽוֹת׃
translation:
  text: The sluggard says, “There is a lion in the road! A lion in the public squares!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the streets.” The Hebrew refers more specifically to broad public
      places or squares within a town.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָצֵל
  chosen: sluggard
  alternatives:
  - lazy man
  - lazy person
  lexicon: HALOT
  rationale: The noun denotes a habitually lazy person, especially in Proverbs. 'Sluggard'
    preserves the proverbial, character-type force better than the flatter 'lazy man/person,'
    while remaining standard English in wisdom literature.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although formally qatal, in proverb style it functions generically/habitually.
    Present tense in English better conveys the gnomic force: this is what the sluggard
    characteristically says.'
- source_word: שַׁחַל
  chosen: lion
  alternatives:
  - young lion
  - fierce lion
  lexicon: HALOT
  rationale: The term refers to a lion, often with emphasis on strength or fierceness.
    Since the parallel term אֲרִי also means 'lion,' rendering both simply as 'lion'
    preserves the rhetorical repetition without over-specifying distinctions the proverb
    does not develop.
- source_word: בַּדָּרֶךְ
  chosen: in the road
  alternatives:
  - on the road
  - in the way
  lexicon: HALOT
  rationale: The phrase indicates location in a traveled path. 'In the road' is idiomatic
    and concrete in English; 'in the way' could be misunderstood as merely obstructive
    rather than locative.
- source_word: אֲרִי
  chosen: lion
  alternatives:
  - great lion
  lexicon: HALOT
  rationale: A common Hebrew word for lion. Keeping the same English gloss as שַׁחַל
    reflects the synonymous parallelism and the exaggerated repetition of the sluggard's
    excuse.
- source_word: בֵּין הָרְחֹבוֹת
  chosen: in the public squares
  alternatives:
  - in the streets
  - among the plazas
  - between the broad places
  lexicon: HALOT
  rationale: רְחֹבוֹת refers to broad open places in a town, such as plazas or squares,
    not narrow streets in general. 'Public squares' communicates the urban open-space
    setting naturally in modern English. The preposition בֵּין can idiomatically indicate
    being amid such spaces; a wooden 'between the squares' would sound unnatural and
    obscure the sense.
