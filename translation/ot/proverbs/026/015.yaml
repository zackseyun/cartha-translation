id: PRO.26.15
reference: Proverbs 26:15
source:
  edition: WLC
  text: טָ֘מַ֤ן עָצֵ֣ל יָ֭ד/וֹ בַּ/צַּלָּ֑חַת נִ֝לְאָ֗ה לַֽ/הֲשִׁיבָ֥/הּ אֶל פִּֽי/ו־׃
translation:
  text: A sluggard buries his hand in the dish; he is too weary to bring it back to
    his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hides his hand in the dish.' The Hebrew verb can mean 'hide' or 'bury';
      'buries' was chosen to preserve the proverb's exaggerated imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the bowl' or 'in the platter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָמַן
  chosen: buries
  alternatives:
  - hides
  - plunges
  - puts
  lexicon: HALOT
  rationale: The verb commonly means to hide, conceal, or bury. In this proverb's
    hyperbolic image, 'buries' preserves the vividness and absurdity better than the
    flatter 'puts' or the less concrete 'hides.'
- source_word: עָצֵל
  chosen: sluggard
  alternatives:
  - lazy man
  - lazy person
  lexicon: HALOT
  rationale: In Proverbs this term is a stock character type, and 'sluggard' is a
    concise English equivalent that preserves the proverbial, characterological force
    better than the more generic 'lazy person.'
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: A straightforward possessive rendering of the singular noun with 3ms
    suffix.
- source_word: בַּצַּלָּחַת
  chosen: in the dish
  alternatives:
  - in the bowl
  - in the platter
  lexicon: HALOT
  rationale: The noun denotes a dish or bowl used for food. 'Dish' is natural modern
    English and fits the eating context without over-specifying vessel shape.
- source_word: נִלְאָה
  chosen: is too weary
  alternatives:
  - is weary
  - wearies himself
  lexicon: HALOT
  rationale: The Niphal form conveys becoming weary or exhausted. In context, the
    sense is that the sluggard is so lazy that even lifting food to his mouth feels
    exhausting; 'is too weary' brings out the implied result in idiomatic English.
- source_word: לַהֲשִׁיבָהּ
  chosen: to bring it back
  alternatives:
  - to return it
  - to bring it
  lexicon: HALOT
  rationale: The Hiphil of שוב means to cause to return or bring back. Since the hand
    has gone into the dish, 'bring it back' captures the motion back from the dish
    toward the mouth.
- source_word: אֶל פִּיו
  chosen: to his mouth
  alternatives:
  - to his own mouth
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the prepositional phrase; 'mouth' is
    literal and preserves the proverb's comic image.
