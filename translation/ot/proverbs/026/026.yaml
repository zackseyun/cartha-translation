id: PRO.26.26
reference: Proverbs 26:26
source:
  edition: WLC
  text: תִּכַּסֶּ֣ה שִׂ֭נְאָה בְּ/מַשָּׁא֑וֹן תִּגָּלֶ֖ה רָעָת֣/וֹ בְ/קָהָֽל׃
translation:
  text: Though hatred is covered with deceit, his evil will be exposed in the assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with guile' or 'by deception' for 'with deceit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the congregation.' The Hebrew refers to a gathered community or assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּכַּסֶּה
  chosen: is covered
  alternatives:
  - covers itself
  - may be covered
  - is concealed
  lexicon: HALOT
  rationale: Nifal imperfect 3fs of כסה, here functioning passively/reflexively with
    שִׂנְאָה as the feminine subject. English passive 'is covered' best captures the
    sense in a proverb stating a general truth.
- source_word: שִׂנְאָה
  chosen: hatred
  alternatives:
  - hate
  lexicon: HALOT
  rationale: The noun denotes hatred/hostility. 'Hatred' is the more natural abstract
    noun in English and fits the proverbial style.
- source_word: בְּמַשָּׁאוֹן
  chosen: with deceit
  alternatives:
  - by deception
  - in guile
  - with guile
  lexicon: HALOT
  rationale: The noun מַשָּׁאוֹן here denotes deceptive conduct or guile rather than
    a physical object. The prefixed ב marks means/instrument, so 'with deceit' communicates
    the manner by which hatred is concealed. 'Deceit' is clearer in modern English
    than 'guile.'
- source_word: תִּגָּלֶה
  chosen: will be exposed
  alternatives:
  - will be revealed
  - is uncovered
  lexicon: HALOT
  rationale: Nifal imperfect 3fs of גלה with רָעָתוֹ as subject. Future 'will be exposed'
    fits the antithetical parallelism and the proverb's expectation that concealed
    evil eventually becomes public.
- source_word: רָעָתוֹ
  chosen: his evil
  alternatives:
  - his wickedness
  - his malice
  lexicon: HALOT
  rationale: The noun רָעָה can denote evil, wickedness, or harmful intent. 'His evil'
    is broad enough to include both moral badness and malicious conduct, preserving
    the Hebrew's scope.
- source_word: בְקָהָל
  chosen: in the assembly
  alternatives:
  - in the congregation
  - before the community
  - publicly
  lexicon: HALOT
  rationale: קָהָל denotes an assembled group or congregation. 'In the assembly' preserves
    the concrete communal setting better than the more interpretive 'publicly.'
