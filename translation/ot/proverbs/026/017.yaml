id: PRO.26.17
reference: Proverbs 26:17
source:
  edition: WLC
  text: מַחֲזִ֥יק בְּ/אָזְנֵי כָ֑לֶב עֹבֵ֥ר מִ֝תְעַבֵּ֗ר עַל רִ֥יב לֹּֽא לֽ/וֹ־־־׃
translation:
  text: Like one who grabs a dog by the ears is a passerby who gets involved in a
    quarrel not his own.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who meddles in a quarrel not his own.' The Hebrew verb can carry the
      sense of involving oneself in another person's dispute.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲזִיק
  chosen: one who grabs
  alternatives:
  - one who seizes
  - one who takes hold of
  lexicon: HALOT
  rationale: The Hiphil participle of חזק here denotes taking hold firmly. 'Grabs'
    is vivid, natural English and fits the proverb's concrete image of rashly taking
    hold of something dangerous.
- source_word: בְּאָזְנֵי
  chosen: by the ears
  alternatives:
  - on the ears
  - of the ears
  lexicon: HALOT
  rationale: The preposition with 'ears' idiomatically expresses the point of seizure.
    English 'by the ears' best conveys the physical action.
- source_word: כָלֶב
  chosen: a dog
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the singular is retained for the proverb's
    illustrative comparison.
- source_word: עֹבֵר
  chosen: a passerby
  alternatives:
  - one passing by
  - someone passing through
  lexicon: HALOT
  rationale: The Qal participle functions substantivally for a person merely passing
    along. 'Passerby' is concise and idiomatic.
- source_word: מִתְעַבֵּר
  chosen: gets involved
  alternatives:
  - interferes
  - becomes enraged
  - meddles
  lexicon: HALOT
  rationale: The Hitpael of עבר in this context is difficult, but in parallel with
    'over a quarrel not his own' it most naturally means to involve oneself or meddle
    in a dispute. 'Gets involved' is clear modern English; 'meddles' is possible but
    slightly more interpretive in tone.
- source_word: עַל
  chosen: in
  alternatives:
  - over
  - against
  - concerning
  lexicon: HALOT
  rationale: Although literally 'over/upon,' English idiom prefers 'in a quarrel'
    after 'gets involved.' The underlying relation to a dispute is preserved.
- source_word: רִיב
  chosen: a quarrel
  alternatives:
  - a dispute
  - a strife
  lexicon: HALOT
  rationale: '''Quarrel'' fits the proverb''s everyday wisdom setting and matches
    the interpersonal conflict in view.'
- source_word: לֹא לוֹ
  chosen: not his own
  alternatives:
  - that does not belong to him
  - not belonging to him
  lexicon: HALOT
  rationale: This compact English phrase preserves the possessive sense and the proverb's
    warning against entering another person's conflict.
