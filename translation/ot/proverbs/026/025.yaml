id: PRO.26.25
reference: Proverbs 26:25
source:
  edition: WLC
  text: כִּֽי יְחַנֵּ֣ן ק֭וֹל/וֹ אַל תַּֽאֲמֶן בּ֑/וֹ כִּ֤י שֶׁ֖בַע תּוֹעֵב֣וֹת בְּ/לִבּֽ/וֹ־־־׃
translation:
  text: When he makes his voice gracious, do not trust him, for seven abominations
    are in his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When he speaks graciously' or 'When he makes himself sound gracious.'
      The Hebrew literally says 'when he makes his voice gracious.'
    reason: lexical_alternative
  - marker: b
    text: '''Seven'' likely conveys fullness or completeness in wisdom style, but
      the number is retained in the main text.'
    reason: cultural_note
lexical_decisions:
- source_word: יְחַנֵּן
  chosen: makes ... gracious
  alternatives:
  - speaks graciously
  - makes himself gracious
  - shows favor
  lexicon: HALOT
  rationale: Piel of חנן can denote showing favor or making something/someone gracious.
    With 'his voice' as object, the sense is that he makes his speech sound gracious
    or charming. 'Makes his voice gracious' preserves the Hebrew image more closely
    than a fully idiomatic paraphrase, while still being understandable.
- source_word: קוֹלוֹ
  chosen: his voice
  alternatives:
  - his speech
  - what he says
  lexicon: HALOT
  rationale: The Hebrew literally says 'his voice.' In context this refers to the
    manner of his speech. Retaining 'voice' preserves the concrete Hebrew wording
    and poetic texture.
- source_word: אַל תַּאֲמֶן בּוֹ
  chosen: do not trust him
  alternatives:
  - do not believe him
  - do not put faith in him
  lexicon: HALOT
  rationale: The verb אמן in Hiphil commonly means to trust or believe. Because the
    preposition is 'in him' rather than a direct object of speech, 'do not trust him'
    fits the syntax and context better than 'do not believe him.'
- source_word: שֶׁבַע
  chosen: seven
  alternatives:
  - many
  - completeness of
  lexicon: HALOT
  rationale: The text explicitly says 'seven.' In wisdom literature seven can carry
    a sense of fullness or completeness, but the number itself should be preserved
    in translation rather than interpreted away.
- source_word: תּוֹעֵבוֹת
  chosen: abominations
  alternatives:
  - detestable things
  - abhorrent things
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong term for something detestable or abhorrent, often
    with moral weight. 'Abominations' preserves that intensity and matches common
    biblical usage.
- source_word: בְּלִבּוֹ
  chosen: in his heart
  alternatives:
  - within him
  - in his inner being
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical idiom for the inner person, including
    thought and intent. Keeping ''heart'' preserves the Hebrew anthropology and the
    proverb''s moral emphasis.'
