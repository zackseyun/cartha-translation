id: PRO.26.12
reference: Proverbs 26:12
source:
  edition: WLC
  text: רָאִ֗יתָ אִ֭ישׁ חָכָ֣ם בְּ/עֵינָ֑י/ו תִּקְוָ֖ה לִ/כְסִ֣יל מִמֶּֽ/נּוּ׃
translation:
  text: Do you see a man wise in his own eyes? There is more hope for a fool than
    for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Have you seen a man wise in his own eyes?' The Hebrew perfect can be
      rendered as a rhetorical observation or question.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתָ
  chosen: Do you see
  alternatives:
  - Have you seen
  - You have seen
  lexicon: HALOT
  rationale: Qal perfect 2ms of ראה can function rhetorically as an exclamatory or
    interrogative observation in wisdom literature. English idiom is best captured
    with a present rhetorical question, introducing the proverb's scenario naturally.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and refers to an individual exemplar.
    Per gender-accurate philosophy, 'man' is retained rather than neutralizing to
    'person'.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - wise man
  - skillful
  lexicon: HALOT
  rationale: Predicate adjective modifying אִישׁ. 'Wise' is the standard wisdom-literature
    rendering and fits the ironic contrast with כְסִיל.
- source_word: בְּעֵינָיו
  chosen: in his own eyes
  alternatives:
  - in his eyes
  - in his own estimation
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for self-assessment. 'In his own eyes' preserves
    the idiom; adding 'own' makes the reflexive sense explicit in natural English.
- source_word: תִּקְוָה
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: The noun denotes hope/prospect. 'Hope' is the most natural English rendering
    in proverbial contrast.
- source_word: לִכְסִיל
  chosen: for a fool
  alternatives:
  - for the fool
  - for a dullard
  lexicon: HALOT
  rationale: כְסִיל is the standard Proverbs term for a morally and intellectually
    obstinate fool. 'Fool' preserves the established wisdom-category without over-paraphrase.
- source_word: מִמֶּנּוּ
  chosen: than for him
  alternatives:
  - than for that man
  - than for such a one
  lexicon: HALOT
  rationale: Comparative מן after תקוה indicates greater hope for the fool in comparison
    with the self-wise man. 'Than for him' is concise and clear.
