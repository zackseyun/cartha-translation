id: PRO.26.19
reference: Proverbs 26:19
source:
  edition: WLC
  text: כֵּֽן אִ֭ישׁ רִמָּ֣ה אֶת רֵעֵ֑/הוּ וְ֝/אָמַ֗ר הֲֽ/לֹא מְשַׂחֵ֥ק אָֽנִי־־־׃
translation:
  text: So is the man who deceives his neighbor and says, “Am I not only joking?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his friend” or “his companion.” The Hebrew רֵעַ can refer to a neighbor,
      friend, or associate depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “Am I not playing?” / “Am I not jesting?” The Hebrew participle can denote
      play or jest; here it functions as a dismissive excuse for harmful deception.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So is
  alternatives:
  - Thus is
  - So too is
  - Like this is
  lexicon: HALOT
  rationale: Introduces the comparison with the previous verse. 'So is' is idiomatic
    English that preserves the analogical force without over-literal awkwardness.
- source_word: אִישׁ
  chosen: the man
  alternatives:
  - a man
  - the person
  lexicon: HALOT
  rationale: The Hebrew singular masculine noun is retained as 'the man' in keeping
    with the gender-accurate policy and the representative singular sense in wisdom
    literature. The definite article is not explicit in Hebrew, but English idiom
    in this comparative construction naturally uses 'the man who...'.
- source_word: רִמָּה
  chosen: deceives
  alternatives:
  - tricks
  - betrays
  - misleads
  lexicon: HALOT
  rationale: The verb denotes deceptive action against another. 'Deceives' best matches
    the moral force here and fits the context of harmful conduct later dismissed as
    play.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. 'Neighbor' preserves the
    broader ethical sense common in biblical usage and avoids implying intimacy that
    the context does not require.
- source_word: וְאָמַר
  chosen: and says
  alternatives:
  - and then says
  - and said
  lexicon: HALOT
  rationale: 'The waw + qatal here functions naturally in the proverb as part of the
    characterization. Present tense in English suits proverbial discourse: the kind
    of man who does this and says this.'
- source_word: הֲלֹא
  chosen: Am I not
  alternatives:
  - Was I not
  - Is it not that I was
  lexicon: HALOT
  rationale: Rendered as a rhetorical question marker expecting affirmation. 'Am I
    not' captures the self-justifying tone.
- source_word: מְשַׂחֵק
  chosen: only joking
  alternatives:
  - playing
  - jesting
  - making sport
  lexicon: HALOT
  rationale: The participle from שׂחק can denote play or jest. In this context the
    speaker minimizes harmful deception as harmless fun; 'joking' communicates that
    pragmatic sense in natural modern English. 'Only' is supplied to reflect the dismissive
    force implied by the rhetorical question.
- source_word: אָֽנִי
  chosen: I
  lexicon: HALOT
  rationale: Explicit pronoun retained in the English question for clarity and emphasis.
