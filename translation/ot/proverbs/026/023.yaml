id: PRO.26.23
reference: Proverbs 26:23
source:
  edition: WLC
  text: כֶּ֣סֶף סִ֭יגִים מְצֻפֶּ֣ה עַל חָ֑רֶשׂ שְׂפָתַ֖יִם דֹּלְקִ֣ים וְ/לֶב רָֽע־־׃
translation:
  text: Like silver dross overlaid on earthenware are fervent lips with an evil heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning lips'; the Hebrew participle literally evokes heat or burning,
      here describing speech that sounds intensely warm or eager.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף סִיגִים
  chosen: silver dross
  alternatives:
  - glaze of silver dross
  - silver slag
  lexicon: HALOT
  rationale: The construct phrase denotes not pure silver but the refuse/impure residue
    associated with silver. 'Silver dross' preserves the image of something superficially
    metallic yet worthless, fitting the proverb's comparison.
- source_word: מְצֻפֶּה
  chosen: overlaid
  alternatives:
  - coated
  - plated
  lexicon: HALOT
  rationale: The passive participle from צפה refers to being covered or plated. 'Overlaid'
    is natural English and keeps the image of a thin external covering without implying
    solid composition.
- source_word: עַל חָרֶשׂ
  chosen: on earthenware
  alternatives:
  - on a clay vessel
  - on pottery
  lexicon: HALOT
  rationale: חָרֶשׂ refers to earthenware/pottery. 'Earthenware' best matches the
    material sense and suits the proverb's contrast between cheap clay and a shiny
    coating.
- source_word: שְׂפָתַיִם
  chosen: lips
  alternatives:
  - speech
  lexicon: HALOT
  rationale: Literally 'lips.' Retaining the body-part metaphor is idiomatic in English
    and preserves the Hebrew's focus on spoken expression rather than abstract speech.
- source_word: דֹּלְקִים
  chosen: fervent
  alternatives:
  - burning
  - ardent
  - flattering
  lexicon: HALOT
  rationale: The participle literally suggests burning or blazing. In context it describes
    speech that sounds warm, eager, or intense. 'Fervent' preserves the metaphorical
    heat without overcommitting to a specific moral nuance such as 'flattering,' which
    is interpretive.
- source_word: וְלֶב רָע
  chosen: with an evil heart
  alternatives:
  - but an evil heart
  - and an evil heart
  lexicon: HALOT
  rationale: 'The conjunction links the outward speech with the inward reality. English
    ''with'' expresses the combination naturally: fervent lips accompanied by an evil
    heart. ''Evil heart'' preserves the moral category of רָע without softening it.'
