id: PRO.26.24
reference: Proverbs 26:24
source:
  edition: WLC
  text: ב/שפת/ו יִנָּכֵ֣ר שׂוֹנֵ֑א וּ֝/בְ/קִרְבּ֗/וֹ יָשִׁ֥ית מִרְמָֽה׃
translation:
  text: A hater disguises himself with his lips, but within himself he sets deceit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A hater pretends with his lips.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in his inward part' or 'within him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשְׂפָתוֹ
  chosen: with his lips
  alternatives:
  - by his lips
  - with his speech
  lexicon: HALOT
  rationale: The preposition ב with 'lips' is instrumental here, indicating the means
    by which the action is carried out. 'With his lips' is idiomatic and preserves
    the concrete Hebrew image better than the more abstract 'with his speech.'
- source_word: יִנָּכֵר
  chosen: disguises himself
  alternatives:
  - makes himself unrecognizable
  - pretends
  - feigns
  lexicon: HALOT
  rationale: The Niphal of נכר here carries the sense of making oneself appear other
    than one is, i.e., dissembling or disguising oneself. 'Disguises himself' captures
    the reflexive nuance and fits the contrast with inward deceit in the second colon.
- source_word: שׂוֹנֵא
  chosen: a hater
  alternatives:
  - one who hates
  - an enemy
  lexicon: HALOT
  rationale: The participle functions substantivally. 'A hater' is concise and preserves
    the personal characterization. 'Enemy' is possible in context but is less direct
    than the lexical sense of one who hates.
- source_word: וּבְקִרְבּוֹ
  chosen: within himself
  alternatives:
  - in his heart
  - inside him
  - within
  lexicon: HALOT
  rationale: קֶרֶב denotes the inner part or inward midst. 'Within himself' preserves
    the anthropological contrast with outward lips without over-interpreting it specifically
    as 'heart,' which the Hebrew does not state.
- source_word: יָשִׁית
  chosen: he sets
  alternatives:
  - he places
  - he lays
  lexicon: HALOT
  rationale: The verb שׁית commonly means to set or place. 'Sets' is natural English
    and retains the deliberate sense of placing deceit internally.
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - treachery
  - deception
  lexicon: HALOT
  rationale: מִרְמָה denotes deceit or treachery. 'Deceit' is the clearest and most
    broadly fitting choice in this wisdom context.
