id: PRO.25.8
reference: Proverbs 25:8
source:
  edition: WLC
  text: אַל תֵּצֵ֥א לָ/רִ֗ב מַ֫הֵ֥ר פֶּ֣ן מַה תַּ֭עֲשֶׂה בְּ/אַחֲרִיתָ֑/הּ בְּ/הַכְלִ֖ים
    אֹתְ/ךָ֣ רֵעֶֽ/ךָ־־׃
translation:
  text: Do not go out hastily to a dispute, lest in the end—when your neighbor puts
    you to shame—you not know what to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is elliptical: literally, ''lest what will you do in its end, when
      your neighbor puts you to shame?'' The translation makes explicit the implied
      sense, ''you not know what to do.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not go out quickly to quarrel' or, with a more legal nuance, 'Do
      not go out hastily to court.'
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּצֵא
  chosen: go out
  alternatives:
  - go forth
  - enter into
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out.' In this idiom with לָרִיב it conveys
    setting out or launching oneself into a legal/personal dispute. 'Go out' preserves
    the Hebrew image better than the more interpretive 'enter into,' while remaining
    natural in English when paired with 'to a dispute.'
- source_word: לָרִיב
  chosen: to a dispute
  alternatives:
  - to court
  - to litigation
  - to quarrel
  lexicon: HALOT
  rationale: רִיב can denote strife, quarrel, or legal contention. Here the proverb
    warns against initiating contention broadly, with possible forensic overtones.
    'Dispute' preserves that breadth better than the narrower 'court' or the more
    informal 'quarrel.'
- source_word: מַהֵר
  chosen: hastily
  alternatives:
  - quickly
  - in haste
  lexicon: HALOT
  rationale: The adverbial sense modifies the warning against rushing into conflict.
    'Hastily' captures both speed and imprudence, which suits proverbial instruction.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a warning about an undesirable outcome. 'Lest' is concise
    and idiomatic in wisdom literature, preserving the cautionary force.
- source_word: בְּאַחֲרִיתָהּ
  chosen: in the end
  alternatives:
  - afterward
  - at its end
  lexicon: HALOT
  rationale: אַחֲרִית refers to the latter end or outcome. The 3fs suffix most naturally
    points to the dispute/case as an implicit feminine referent. 'In the end' communicates
    the eventual outcome without awkwardly specifying the antecedent.
- source_word: בְּהַכְלִים
  chosen: when ... puts you to shame
  alternatives:
  - when ... humiliates you
  - when ... disgraces you
  lexicon: HALOT
  rationale: 'The infinitive construct of כלם with prefixed ב conveys a temporal circumstance:
    ''when/at the time of shaming.'' ''Puts you to shame'' is a natural English rendering
    that preserves the honor-shame dimension.'
- source_word: רֵעֶךָ
  chosen: your neighbor
  alternatives:
  - your companion
  - your friend
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In wisdom and legal contexts
    'neighbor' best preserves the broader social relation and avoids implying intimacy
    that the Hebrew does not require.
- source_word: מַה תַּעֲשֶׂה
  chosen: you not know what to do
  alternatives:
  - what will you do
  - what can you do
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally, ''lest what will you do in its
    end, when your neighbor shames you?'' Many interpreters understand an implied
    ''you will not know'' or take it as a rhetorical question. English requires smoothing
    the ellipsis. ''You not know what to do'' best conveys the practical force of
    the warning while staying close to the sense of the Hebrew construction.'
