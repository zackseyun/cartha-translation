id: PRO.25.13
reference: Proverbs 25:13
source:
  edition: WLC
  text: כְּ/צִנַּת שֶׁ֨לֶג בְּ/י֬וֹם קָצִ֗יר צִ֣יר נֶ֭אֱמָן לְ/שֹׁלְחָ֑י/ו וְ/נֶ֖פֶשׁ
    אֲדֹנָ֣י/ו יָשִֽׁיב־׀׃פ
translation:
  text: Like the coolness of snow on a harvest day is a faithful messenger to those
    who send him, and he refreshes the life of his masters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like the cold of snow in harvest time.' The Hebrew image likely refers
      to refreshing coolness associated with snow, not snowfall damaging the harvest.
    reason: lexical_alternative
  - marker: b
    text: Or 'he restores the soul of his masters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצִנַּת
  chosen: Like the coolness of
  alternatives:
  - Like the cold of
  - Like the chill of
  lexicon: HALOT
  rationale: The noun צִנָּה denotes coldness/coolness. In English, 'coolness' better
    fits the simile's positive sense here than the harsher 'cold,' especially in connection
    with relief during harvest.
- source_word: שֶׁלֶג
  chosen: snow
  lexicon: HALOT
  rationale: Straightforward lexical rendering of שֶׁלֶג as 'snow.'
- source_word: בְּיוֹם קָצִיר
  chosen: on a harvest day
  alternatives:
  - in harvest time
  - during harvest
  lexicon: HALOT
  rationale: A natural English rendering of the temporal phrase. 'On a harvest day'
    preserves the concrete imagery of a hot day in harvest season when cooling refreshment
    is especially welcome.
- source_word: צִיר
  chosen: messenger
  alternatives:
  - envoy
  - courier
  lexicon: HALOT
  rationale: צִיר in wisdom literature commonly refers to one sent with a message.
    'Messenger' is the clearest modern English equivalent; 'envoy' may sound too diplomatic
    and formal for general readers.
- source_word: נֶאֱמָן
  chosen: faithful
  alternatives:
  - reliable
  - trustworthy
  lexicon: HALOT
  rationale: '''Faithful'' preserves the covenantal and moral nuance of reliability
    better than the flatter ''reliable,'' while remaining natural in English.'
- source_word: לְשֹׁלְחָיו
  chosen: to those who send him
  alternatives:
  - to his sender
  - for those who send him
  lexicon: HALOT
  rationale: The form is plural with 3ms suffix, literally 'to his senders.' English
    idiom prefers 'to those who send him,' which preserves the plural sense without
    awkwardness.
- source_word: וְנֶפֶשׁ
  chosen: and ... the life
  alternatives:
  - and ... the soul
  - and ... the appetite
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, self, or inner being. Here the sense is the
    vitality or inner life of the masters being restored, so 'life' communicates the
    idiom naturally without importing later dualistic connotations.
- source_word: אֲדֹנָיו
  chosen: his masters
  alternatives:
  - his lord
  - his owners
  lexicon: HALOT
  rationale: The plural form is best represented as 'his masters' rather than singular
    'lord.' 'Owners' would over-specify a slavery context not explicit in this proverb.
- source_word: יָשִׁיב
  chosen: he refreshes
  alternatives:
  - he restores
  - he revives
  lexicon: HALOT
  rationale: The Hiphil of שוב means to cause to return/restore. In this simile, the
    idiomatic sense is that the faithful messenger restores or refreshes his masters'
    vitality. 'Refreshes' best matches the cooling imagery established in the first
    colon.
