id: PRO.25.7
reference: Proverbs 25:7
source:
  edition: WLC
  text: כִּ֤י ט֥וֹב אֲמָר לְ/ךָ֗ עֲֽלֵ֫ה הֵ֥נָּה מֵֽ֭/הַשְׁפִּ֣ילְ/ךָ לִ/פְנֵ֣י נָדִ֑יב
    אֲשֶׁ֖ר רָא֣וּ עֵינֶֽי/ךָ־׃
translation:
  text: For it is better that it be said to you, “Come up here,” than that you be
    humiliated before a nobleman whom your eyes have seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “than your being made low.” The Hebrew verb can emphasize
      being lowered in rank or place, with the social shame implied by the setting.
    reason: lexical_alternative
  - marker: b
    text: “Whom your eyes have seen” is a vivid Hebrew expression; some translations
      simplify it to “whom you have seen.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding admonition; 'for' fits the
    explanatory force in context.
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  lexicon: HALOT
  rationale: 'In the comparative construction with מִן, the sense is comparative:
    ''better ... than ...,'' not merely ''good.'''
- source_word: אֲמָר
  chosen: that it be said
  alternatives:
  - to be told
  - for one to say
  lexicon: HALOT
  rationale: The infinitive/impersonal verbal sense is best represented by an English
    passive clause, preserving the unspecified speaker.
- source_word: לְךָ
  chosen: to you
  lexicon: HALOT
  rationale: Straightforward indirect object of the speech.
- source_word: עֲלֵה הֵנָּה
  chosen: Come up here
  alternatives:
  - Go up here
  - Step up here
  lexicon: HALOT
  rationale: Imperative plus deictic adverb invites advancement to a higher place.
    'Come up here' is idiomatic English and preserves the upward/social movement.
- source_word: מֵהַשְׁפִּילְךָ
  chosen: than that you be humiliated
  alternatives:
  - than to be put lower
  - than your being abased
  - than to be humbled
  lexicon: HALOT
  rationale: The Hiphil of שׁפל here denotes being made low or publicly lowered in
    status. 'Humiliated' captures the social shame implied by the courtly setting
    better than a merely spatial 'put lower,' while still reflecting the causative
    lowering.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Marks public setting and audience; 'before' is concise and natural.
- source_word: נָדִיב
  chosen: a nobleman
  alternatives:
  - a prince
  - a noble
  - a ruler
  lexicon: HALOT
  rationale: נָדִיב denotes a noble or high-ranking person. 'Nobleman' fits the social
    context without overstating formal kingship.
- source_word: אֲשֶׁר רָאוּ עֵינֶיךָ
  chosen: whom your eyes have seen
  alternatives:
  - whom you have seen
  lexicon: HALOT
  rationale: Retains the Hebrew vividness and emphasis of the idiom while remaining
    intelligible in English. The fuller expression may point to a specific dignitary
    already visible to the addressee.
