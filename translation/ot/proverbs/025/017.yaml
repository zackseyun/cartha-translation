id: PRO.25.17
reference: Proverbs 25:17
source:
  edition: WLC
  text: הֹקַ֣ר רַ֭גְלְ/ךָ מִ/בֵּ֣ית רֵעֶ֑/ךָ פֶּן יִ֝שְׂבָּעֲ/ךָ֗ וּ/שְׂנֵאֶֽ/ךָ־׃
translation:
  text: Let your foot be seldom in your neighbor’s house, lest he have his fill of
    you and hate you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Make your foot rare from your neighbor’s house.' The
      expression means to visit infrequently.
    reason: lexical_alternative
  - marker: b
    text: Or 'your friend’s house'; the Hebrew word can mean 'neighbor,' 'friend,'
      or 'companion.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֹקַר
  chosen: Let ... be seldom
  alternatives:
  - make rare
  - restrain
  - honor
  lexicon: HALOT
  rationale: 'The Hiphil imperative of יקר here is idiomatic in context: not ''honor
    your foot'' literally, but ''make your foot rare'' in someone else''s house, i.e.,
    visit infrequently. ''Let ... be seldom'' gives clear modern English while preserving
    the imperative force.'
- source_word: רַגְלְךָ
  chosen: your foot
  alternatives:
  - your feet
  - your steps
  lexicon: HALOT
  rationale: Singular 'foot' matches the Hebrew singular and preserves the concrete
    idiom. In English this naturally represents one's coming/going or visits.
- source_word: מִבֵּית
  chosen: in ... house
  alternatives:
  - from the house of
  - at the house of
  lexicon: HALOT
  rationale: Although the preposition is literally 'from,' the idiom with 'make your
    foot rare from the house of' is best expressed in English as being seldom 'in'
    or 'at' the house. 'In ... house' communicates presence there rather than departure
    from it.
- source_word: רֵעֶךָ
  chosen: your neighbor
  alternatives:
  - your friend
  - your companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. 'Neighbor' fits wisdom
    literature's broader social sense and avoids implying unusual intimacy; it also
    matches common biblical usage.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning of undesirable result. 'Lest' is concise and natural
    in proverb style.
- source_word: יִשְׂבָּעֲךָ
  chosen: he have his fill of you
  alternatives:
  - he become weary of you
  - he be sated with you
  - he be full of you
  lexicon: HALOT
  rationale: From שבע, 'to be satisfied/full.' In context it means becoming overfilled
    with someone's presence. 'Have his fill of you' is idiomatic English that preserves
    the metaphor of satiety better than the flatter 'be weary of you.'
- source_word: וּשְׂנֵאֶךָ
  chosen: and hate you
  alternatives:
  - and come to hate you
  - and despise you
  lexicon: HALOT
  rationale: The Qal perfect with vav after פֶּן expresses the feared consequence.
    'And hate you' is the plain lexical sense and should not be softened.
