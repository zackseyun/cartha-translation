id: PRO.25.10
reference: Proverbs 25:10
source:
  edition: WLC
  text: פֶּֽן יְחַסֶּדְ/ךָ֥ שֹׁמֵ֑עַ וְ֝/דִבָּתְ/ךָ֗ לֹ֣א תָשֽׁוּב־׃
translation:
  text: lest one who hears it disgrace you, and your bad reputation not turn back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shame you' or 'reproach you' for יְחַסֶּדְךָ; the Hebrew verb here is
      rare and contextually difficult.
    reason: lexical_alternative
  - marker: b
    text: Or 'your evil report will not return.' The Hebrew may refer either to a
      bad report about you that continues to circulate, or to the disgrace itself
      as irreversible.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Introduces a warning of undesirable consequence. 'Lest' is concise and
    fits proverbial style better than the more colloquial 'otherwise' or 'or else.'
- source_word: יְחַסֶּדְךָ
  chosen: disgrace you
  alternatives:
  - shame you
  - reproach you
  - treat you with contempt
  lexicon: HALOT
  rationale: The Piel of חסד here is difficult and contextually appears to carry a
    negative sense in parallel with the following clause about one's bad report. 'Disgrace
    you' best captures public humiliation resulting from overheard disclosure. 'Shame
    you' is possible, but 'disgrace' better matches the social/public force of the
    proverb.
- source_word: שֹׁמֵעַ
  chosen: one who hears it
  alternatives:
  - a hearer
  - someone listening
  lexicon: HALOT
  rationale: The participle functions substantivally for an indefinite person. 'One
    who hears it' is natural English and makes explicit that the warning concerns
    an overhearing person.
- source_word: דִבָּתְךָ
  chosen: your bad reputation
  alternatives:
  - your evil report
  - the report about you
  - your slander
  lexicon: HALOT
  rationale: דִבָּה often denotes an unfavorable report, rumor, or defaming talk.
    In this context, after exposing a private matter, the result is that a negative
    report about the addressee spreads. 'Your bad reputation' communicates the resulting
    social effect in idiomatic English. 'Your slander' could imply the addressee is
    slandering, while 'evil report' is more literal but less natural.
- source_word: לֹא תָשׁוּב
  chosen: not turn back
  alternatives:
  - not return
  - not be recalled
  - not go away
  lexicon: HALOT
  rationale: The verb שוב with the feminine subject 'report/reputation' indicates
    that once the damaging report goes out, it does not come back or reverse. 'Not
    turn back' preserves the metaphor and proverbial terseness.
