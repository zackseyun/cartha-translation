id: PRO.25.11
reference: Proverbs 25:11
source:
  edition: WLC
  text: תַּפּוּחֵ֣י זָ֭הָב בְּ/מַשְׂכִּיּ֥וֹת כָּ֑סֶף דָּ֝בָ֗ר דָּבֻ֥ר עַל אָפְנָֽי/ו־׃
translation:
  text: A word spoken at the right time is like apples of gold in settings of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fitly spoken'; literally, 'spoken upon its wheels,' an idiom for speech
      given in a fitting or timely way.
    reason: lexical_alternative
  - marker: b
    text: The precise fruit denoted by the Hebrew may not correspond exactly to the
      modern apple.
    reason: cultural_note
  - marker: c
    text: Or 'in carvings of silver' or 'in filigree of silver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּפּוּחֵי
  chosen: apples
  alternatives:
  - ornaments
  - apricots
  - citrons
  lexicon: HALOT, BDB
  rationale: The noun תַּפּוּחַ commonly denotes 'apple' in traditional English Bible
    rendering, though the precise ancient fruit is uncertain. 'Apples' remains the
    most recognizable and idiomatic choice in English while preserving the proverb's
    imagery; alternatives are possible but less established.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT, BDB
  rationale: Straightforward material term meaning 'gold.'
- source_word: בְּ/מַשְׂכִּיּוֹת
  chosen: in settings of
  alternatives:
  - in carvings of
  - in filigree of
  - in engraved work of
  lexicon: HALOT, BDB
  rationale: מַשְׂכִּיּוֹת refers to crafted ornamental work or figured settings.
    'Settings' best fits the image of gold fruit artistically placed within silver
    workmanship and reads naturally in English. The prefixed ב is rendered instrumentally/locatively
    as 'in.'
- source_word: כָּסֶף
  chosen: silver
  lexicon: HALOT, BDB
  rationale: Straightforward material term meaning 'silver.'
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a matter
  - a saying
  lexicon: HALOT, BDB
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this proverb about speech,
    'word' best matches the verbal context and the comparison to something beautifully
    fitting.
- source_word: דָּבֻר
  chosen: spoken
  alternatives:
  - said
  lexicon: HALOT, BDB
  rationale: Passive participial form from דבר, naturally rendered 'spoken.' This
    keeps the concise proverbial style.
- source_word: עַל אָפְנָיו
  chosen: at the right time
  alternatives:
  - fitly
  - appropriately
  - upon its wheels
  lexicon: HALOT, BDB
  rationale: The idiom is difficult. Traditional 'fitly spoken' reflects the sense
    of aptness; the literal expression likely conveys something set in its proper
    circumstance or order. 'At the right time' communicates the proverb's point in
    clear modern English without over-literal obscurity, while preserving the idea
    of appropriateness.
