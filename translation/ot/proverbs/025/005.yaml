id: PRO.25.5
reference: Proverbs 25:5
source:
  edition: WLC
  text: הָג֣וֹ רָ֭שָׁע לִ/פְנֵי מֶ֑לֶךְ וְ/יִכּ֖וֹן בַּ/צֶּ֣דֶק כִּסְאֽ/וֹ־׃
translation:
  text: Remove the wicked man from before the king, and his throne will be established
    in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Take away the wicked from before the king.' The imperative likely has
      the sense of removing corrupt influence from the royal court.
    reason: lexical_alternative
  - marker: b
    text: '''In righteousness'' could also be rendered ''in justice'' or ''by righteousness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָגוֹ
  chosen: Remove
  alternatives:
  - Take away
  - Drive away
  - Clear away
  lexicon: HALOT
  rationale: Qal imperative of הגה/הגו in this proverb pair (cf. v. 4) carries the
    sense of removing or clearing away. 'Remove' is concise, natural English and preserves
    the imperative force without over-specifying the method.
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - a wicked man
  - an evil person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for an individual wicked
    person. 'The wicked man' preserves the masculine singular form in line with the
    gender-accurate policy, while still representing a type rather than a named individual.
- source_word: לִפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - from before the face of
  - away from
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically means removal from someone's
    presence. 'From before' is slightly formal but accurately reflects the Hebrew
    court-setting idiom.
- source_word: מֶלֶךְ
  chosen: the king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: The proverb speaks generically of royal rule, but English idiom favors
    'the king' in wisdom sayings of this sort.
- source_word: וְיִכּוֹן
  chosen: will be established
  alternatives:
  - shall be established
  - will be made firm
  - will stand firm
  lexicon: HALOT
  rationale: Niphal imperfect of כון expresses being established or made secure. 'Will
    be established' best matches the passive/resultative sense and fits the royal-throne
    context.
- source_word: בַּצֶּדֶק
  chosen: in righteousness
  alternatives:
  - by righteousness
  - through righteousness
  - in justice
  lexicon: HALOT
  rationale: The beth can be understood as sphere or means; 'in righteousness' is
    the most natural English rendering and preserves the moral-judicial sense of צֶדֶק.
    'Justice' is possible, but 'righteousness' better reflects the broader Hebrew
    term while retaining royal/judicial overtones.
- source_word: כִּסְאוֹ
  chosen: his throne
  alternatives:
  - the throne
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to the king. 'His throne' makes
    the referent explicit and preserves the possessive suffix.
