id: PRO.25.9
reference: Proverbs 25:9
source:
  edition: WLC
  text: רִֽ֭יבְ/ךָ רִ֣יב אֶת רֵעֶ֑/ךָ וְ/ס֖וֹד אַחֵ֣ר אַל תְּגָֽל־־׃
translation:
  text: Argue your case with your neighbor himself, and do not reveal another person's
    secret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Plead your case with your neighbor' or 'Settle your dispute with your
      neighbor directly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the secret of another'; that is, confidential information belonging
      to someone else.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיבְךָ
  chosen: your case
  alternatives:
  - your dispute
  - your complaint
  - your quarrel
  lexicon: HALOT
  rationale: 'The noun רִיב can denote a dispute, contention, or legal case. In this
    proverb, paired with the imperative רִיב, it is best taken as the matter in dispute:
    ''your case.'' This preserves the concrete sense without overcommitting to either
    strictly legal or merely emotional conflict.'
- source_word: רִיב
  chosen: argue
  alternatives:
  - plead
  - contend
  - conduct your dispute
  lexicon: HALOT
  rationale: The imperative from ריב calls for taking up or conducting the dispute.
    'Argue' is natural modern English and fits the wisdom context; 'plead' would sound
    too juridical, while 'contend' is less idiomatic.
- source_word: אֶת רֵעֶךָ
  chosen: with your neighbor
  alternatives:
  - with your friend
  - against your neighbor
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or friend. 'Neighbor' is broad
    and fits wisdom usage. The preposition-like marker אֶת after ריב can indicate
    the party with whom one disputes; 'with' is more idiomatic here than 'against,'
    since the proverb stresses direct handling of the matter rather than hostility.
- source_word: וְסוֹד
  chosen: and ... secret
  alternatives:
  - and ... confidential matter
  - and ... counsel
  lexicon: HALOT
  rationale: סוֹד can mean confidential talk, secret, or intimate counsel. In this
    context of not exposing what belongs to another, 'secret' best captures the sense
    for modern readers.
- source_word: אַחֵר
  chosen: another person's
  alternatives:
  - someone else's
  - of another
  lexicon: HALOT
  rationale: אַחֵר here qualifies the secret as belonging to another person, not to
    oneself. 'Another person's' makes the possessive relationship explicit in natural
    English.
- source_word: אַל תְּגָל
  chosen: do not reveal
  alternatives:
  - do not uncover
  - do not disclose
  lexicon: HALOT
  rationale: The verb גלה in the piel/jussive context means to uncover or disclose.
    'Reveal' is clear, idiomatic, and preserves the prohibition against exposing confidential
    information.
- source_word: implicit subject relation in רִיב ... אֶת רֵעֶךָ
  chosen: your neighbor himself
  alternatives:
  - with your neighbor alone
  - directly with your neighbor
  lexicon: HALOT
  rationale: The Hebrew does not explicitly include 'himself,' but the proverb's contrast
    with exposing another's secret implies direct, personal handling of the dispute.
    Adding 'himself' brings out the contrast in idiomatic English without substantial
    paraphrase.
