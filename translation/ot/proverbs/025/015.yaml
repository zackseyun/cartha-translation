id: PRO.25.15
reference: Proverbs 25:15
source:
  edition: WLC
  text: בְּ/אֹ֣רֶךְ אַ֭פַּיִם יְפֻתֶּ֣ה קָצִ֑ין וְ/לָשׁ֥וֹן רַ֝כָּ֗ה תִּשְׁבָּר גָּֽרֶם־׃
translation:
  text: By patience a ruler may be persuaded, and a gentle tongue breaks a bone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By long-suffering a ruler is won over.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'a soft tongue breaks a bone'—a metaphor for the power of gentle
      speech to overcome hardness or resistance.
    reason: cultural_note
lexical_decisions:
- source_word: בְּאֹרֶךְ אַפַּיִם
  chosen: By patience
  alternatives:
  - With long patience
  - By forbearance
  - By long-suffering
  lexicon: HALOT
  rationale: Literally 'by length of nostrils/anger,' a Hebrew idiom for slowness
    to anger, patience, or forbearance. 'By patience' is concise, natural English
    and fits the proverb's emphasis on restrained persistence rather than mere delay.
- source_word: יְפֻתֶּה
  chosen: may be persuaded
  alternatives:
  - is persuaded
  - is won over
  - is enticed
  lexicon: HALOT
  rationale: From פתה in the Pual, conveying being induced or won over. 'May be persuaded'
    captures the passive/result sense in idiomatic English without implying deception
    too strongly, which would be misleading in this wisdom context.
- source_word: קָצִין
  chosen: a ruler
  alternatives:
  - an official
  - a prince
  - a leader
  lexicon: HALOT
  rationale: The term denotes a person in authority, such as a ruler or official.
    'Ruler' is broad, clear, and suits the proverb's general application better than
    the more archaic 'prince' or narrower 'official'.
- source_word: לָשׁוֹן רַכָּה
  chosen: a gentle tongue
  alternatives:
  - a soft tongue
  - a tender tongue
  lexicon: HALOT
  rationale: The phrase is metaphorical for gentle speech. 'Gentle tongue' preserves
    the image while communicating the intended sense naturally. 'Soft tongue' is more
    literal and is preserved as an alternative.
- source_word: תִּשְׁבָּר גָּרֶם
  chosen: breaks a bone
  alternatives:
  - can break a bone
  - crushes bone
  lexicon: HALOT
  rationale: 'A vivid metaphor: gentle speech has surprising power, even to overcome
    what seems hard or resistant. ''Breaks a bone'' preserves the concrete imagery
    and proverbial force. English singular ''a bone'' is idiomatic for the Hebrew
    singular collective image.'
