id: PRO.25.16
reference: Proverbs 25:16
source:
  edition: WLC
  text: דְּבַ֣שׁ מָ֭צָאתָ אֱכֹ֣ל דַּיֶּ֑/ךָּ פֶּן תִּ֝שְׂבָּעֶ֗/נּוּ וַ/הֲקֵֽאתֽ/וֹ־׃
translation:
  text: If you find honey, eat only enough for you, lest you become full of it and
    vomit it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eat as much as is sufficient for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַשׁ
  chosen: honey
  lexicon: HALOT
  rationale: The noun straightforwardly denotes honey. No broader metaphor is explicit
    in the wording, so the concrete image is retained.
- source_word: מָצָאתָ
  chosen: you find
  alternatives:
  - you have found
  lexicon: HALOT
  rationale: Although formally perfect 2ms, in this conditional wisdom setting English
    present 'if you find' is the most natural equivalent, expressing a general case
    rather than a single past event.
- source_word: אֱכֹל
  chosen: eat
  alternatives:
  - eat it
  lexicon: HALOT
  rationale: Imperative 2ms. English omits the object because it is understood from
    'honey' and the Hebrew likewise leaves it implicit here.
- source_word: דַּיֶּךָ
  chosen: only enough for you
  alternatives:
  - your sufficiency
  - what is sufficient for you
  - as much as you need
  lexicon: HALOT
  rationale: The noun means sufficiency or enough, with 2ms suffix. 'Only enough for
    you' captures both the quantitative limit and the admonitory force in idiomatic
    English.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: This conjunction introduces a negative consequence to be avoided. 'Lest'
    is concise and preserves the warning relationship.
- source_word: תִּשְׂבָּעֶנּוּ
  chosen: you become full of it
  alternatives:
  - you are sated with it
  - you have your fill of it
  lexicon: HALOT
  rationale: From שבע 'to be sated, satisfied,' with 3ms suffix referring to honey.
    'Become full of it' is natural modern English and keeps the physical image of
    overconsumption.
- source_word: וַהֲקֵאתוֹ
  chosen: and vomit it
  alternatives:
  - and spit it out
  lexicon: HALOT
  rationale: The hiphil form from קוא/קיא means to vomit. 'Vomit it' is the plain,
    forceful sense and should not be softened.
