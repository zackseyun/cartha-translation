id: PRO.25.21
reference: Proverbs 25:21
source:
  edition: WLC
  text: אִם רָעֵ֣ב שֹׂ֭נַאֲ/ךָ הַאֲכִלֵ֣/הוּ לָ֑חֶם וְ/אִם צָ֝מֵ֗א הַשְׁקֵ֥/הוּ מָֽיִם־־׃
translation:
  text: If your enemy is hungry, feed him bread, and if he is thirsty, give him water
    to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the one who hates you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' is the most direct rendering; 'when'
    would make the condition more expected, but the Hebrew conditional particle itself
    is straightforwardly 'if' here.
- source_word: רָעֵב
  chosen: is hungry
  alternatives:
  - is famished
  - hungry
  lexicon: HALOT
  rationale: Predicate adjective describing the enemy's condition. Rendering with
    the English copula plus adjective is natural and accurate. 'Famished' is too strong
    for the plain sense.
- source_word: שֹׂנַאֲךָ
  chosen: your enemy
  alternatives:
  - the one who hates you
  - your hater
  lexicon: HALOT
  rationale: From the participial form of 'to hate' with 2ms suffix, literally 'your
    hater.' In idiomatic English, 'your enemy' best conveys the relational force without
    awkwardness, while preserving the adversarial sense.
- source_word: הַאֲכִלֵהוּ
  chosen: feed him
  alternatives:
  - cause him to eat
  - give him food
  lexicon: HALOT
  rationale: 'Hiphil imperative with 3ms suffix: causative ''make him eat/feed him.''
    ''Feed him'' is the natural and sufficiently formal equivalent.'
- source_word: לָחֶם
  chosen: bread
  alternatives:
  - food
  lexicon: HALOT
  rationale: The Hebrew specifically says 'bread.' While it can sometimes stand more
    broadly for food, retaining 'bread' preserves the concrete imagery and matches
    the source text closely.
- source_word: וְאִם
  chosen: and if
  alternatives:
  - and when
  lexicon: HALOT
  rationale: Coordinates the second conditional clause. 'And if' mirrors the Hebrew
    structure and keeps the parallelism.
- source_word: צָמֵא
  chosen: he is thirsty
  alternatives:
  - is thirsty
  lexicon: HALOT
  rationale: Predicate adjective parallel to 'is hungry.' English naturally supplies
    the pronoun and copula in the second clause.
- source_word: הַשְׁקֵהוּ
  chosen: give him water to drink
  alternatives:
  - give him a drink
  - make him drink
  - let him drink
  lexicon: HALOT
  rationale: Hiphil imperative with 3ms suffix from 'to give drink.' 'Give him water
    to drink' expresses the causative sense clearly and reads naturally in English.
    It also preserves the explicit object 'water' from the Hebrew.
- source_word: מָיִם
  chosen: water
  lexicon: HALOT
  rationale: Direct object of the second imperative. The plain sense is literal 'water,'
    and no broader rendering is warranted.
