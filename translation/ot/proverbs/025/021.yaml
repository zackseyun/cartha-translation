theological_decisions:
- issue: Gendered singular pronouns in a proverb with representative force
  chosen_reading: 'Retain singular masculine forms: ''your enemy ... feed him ...
    if he is thirsty, give him water to drink.'''
  alternative_readings:
  - your enemy ... feed them ... if they are thirsty, give them water to drink
  rationale: The Hebrew uses singular masculine forms in a representative/generic
    proverb. Per translation philosophy, gender-accurate rendering is preferred over
    gender-neutral smoothing. In English, singular 'him/he' preserves the source form
    and the individualized moral force of the saying.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
