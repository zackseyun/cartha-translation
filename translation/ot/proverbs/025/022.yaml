theological_decisions:
- issue: Meaning of the 'burning coals on his head' idiom
  chosen_reading: Preserve the metaphor in the main text without resolving whether
    it signifies shame leading to repentance, intensified judgment, or both.
  alternative_readings:
  - an image of shaming an enemy into repentance
  - an image of divine judgment intensified by the enemy's response
  rationale: The Hebrew text states the metaphor but does not explicitly explain its
    effect. In keeping with the translation philosophy, the rendering preserves the
    theological and interpretive tension rather than selecting one explanatory tradition.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
