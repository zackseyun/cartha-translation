id: PRO.25.22
reference: Proverbs 25:22
source:
  edition: WLC
  text: כִּ֤י גֶֽחָלִ֗ים אַ֭תָּה חֹתֶ֣ה עַל רֹאשׁ֑/וֹ וַֽ֝/יהוָ֗ה יְשַׁלֶּם לָֽ/ךְ־־׃
translation:
  text: for you will heap burning coals on his head, and the LORD will repay you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for you will gather/rake coals on his head.' The Hebrew idiom is preserved;
      interpreters differ on whether it implies shaming an enemy into repentance or
      increasing his judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the LORD will reward you.' The Hebrew verb can denote repayment or
      recompense, here in a favorable sense toward the righteous person.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding exhortation in the prior verse;
    'for' preserves the explanatory connection more naturally than 'because' in English
    verse flow.
- source_word: גֶחָלִים
  chosen: burning coals
  alternatives:
  - coals
  - embers
  lexicon: HALOT
  rationale: Refers to live coals/fire coals. 'Burning coals' makes explicit the active
    image without over-paraphrasing.
- source_word: חֹתֶה
  chosen: heap
  alternatives:
  - gather
  - rake
  - carry away
  lexicon: HALOT
  rationale: The verb literally involves taking up or raking coals; in this idiom
    with 'on his head,' English 'heap' best conveys the resulting piling up and matches
    the metaphorical force recognized in context.
- source_word: עַל רֹאשׁוֹ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: A direct, formal rendering of the prepositional phrase; the idiom should
    be preserved rather than interpreted away in the main text.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name יְהוָה as
    'the LORD' per DOCTRINE.md.
- source_word: יְשַׁלֶּם לָךְ
  chosen: will repay you
  alternatives:
  - will reward you
  - will recompense you
  lexicon: HALOT
  rationale: The piel of שלם here conveys repayment/recompense. 'Repay you' is broad
    enough to include positive recompense in context, while staying close to the lexical
    sense. 'Reward you' is possible but slightly more interpretive.
