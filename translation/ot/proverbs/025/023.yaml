id: PRO.25.23
reference: Proverbs 25:23
source:
  edition: WLC
  text: ר֣וּחַ צָ֭פוֹן תְּח֣וֹלֵֽל גָּ֑שֶׁם וּ/פָנִ֥ים נִ֝זְעָמִ֗ים לְשׁ֣וֹן סָֽתֶר׃
translation:
  text: The north wind brings forth rain, and an angry face, a slanderous tongue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The north wind drives away rain, and a backbiting tongue [brings] an
      angry face.' The Hebrew verb can be understood differently, and some interpreters
      take the proverb to mean that the north wind dispels rain rather than produces
      it.
    reason: alternative_reading
  - marker: b
    text: Literally 'a tongue of secrecy' or 'a hidden tongue,' that is, covert speech
      such as backbiting or slander.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּחַ צָ֭פוֹן
  chosen: the north wind
  alternatives:
  - a north wind
  - the wind from the north
  lexicon: HALOT
  rationale: Construct phrase meaning the wind characterized by or coming from the
    north. English idiom favors 'the north wind.'
- source_word: תְּח֣וֹלֵֽל
  chosen: brings forth
  alternatives:
  - produces
  - whirls up
  - begets
  lexicon: HALOT
  rationale: 'The verb from חול can denote bringing forth or causing. In this proverb''s
    parallelism, the sense is causative: the north wind causes rain, just as a hidden/slanderous
    tongue causes an angry face. ''Brings forth'' preserves the vivid metaphor without
    overcommitting to a meteorological nuance.'
- source_word: גָּ֑שֶׁם
  chosen: rain
  alternatives:
  - rainstorm
  - shower
  lexicon: HALOT
  rationale: Standard term for rain/downpour; 'rain' is the natural English rendering
    here.
- source_word: וּ/פָנִ֥ים נִ֝זְעָמִ֗ים
  chosen: and an angry face
  alternatives:
  - and angry faces
  - and an indignant face
  lexicon: HALOT
  rationale: Though 'faces' is morphologically plural, Hebrew often uses פנים idiomatically
    for a singular 'face/countenance.' The participle conveys anger or indignation.
    Singular English fits the proverb's generic parallelism better.
- source_word: לְשׁ֣וֹן
  chosen: a tongue
  alternatives:
  - the tongue
  - speech
  lexicon: HALOT
  rationale: Concrete 'tongue' is retained rather than abstract 'speech' to preserve
    the Hebrew imagery.
- source_word: סָֽתֶר
  chosen: slanderous
  alternatives:
  - secret
  - backbiting
  - hidden
  lexicon: HALOT
  rationale: Literally 'secret/hidden,' but in combination with 'tongue' the sense
    is covert, behind-the-back speech. 'Slanderous' communicates the likely force
    in natural English while preserving the moral sting of the proverb.
