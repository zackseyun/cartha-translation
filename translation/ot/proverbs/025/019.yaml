theological_decisions:
- issue: Generic masculine in בּוֹגֵד
  chosen_reading: Rendered as 'treacherous man'
  alternative_readings:
  - treacherous person
  - the treacherous
  rationale: Following the stated gender-accurate philosophy, the grammatically masculine
    singular is retained in English where it carries representative force. The proverb
    speaks generically, but the source form is masculine singular.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
