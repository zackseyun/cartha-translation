id: PRO.25.19
reference: Proverbs 25:19
source:
  edition: WLC
  text: שֵׁ֣ן רֹ֭עָה וְ/רֶ֣גֶל מוּעָ֑דֶת מִבְטָ֥ח בּ֝וֹגֵ֗ד בְּ/י֣וֹם צָרָֽה׃
translation:
  text: Confidence in a treacherous man in a day of trouble is like a bad tooth and
    a slipping foot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trust in a faithless person.'
    reason: lexical_alternative
  - marker: b
    text: The image of 'a slipping foot' may also be understood as an unsteady or
      tottering foot.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁן
  chosen: tooth
  alternatives:
  - toothache
  lexicon: HALOT
  rationale: The noun plainly denotes a tooth. English idiom prefers the concrete
    image 'bad tooth' rather than abstracting to 'toothache,' preserving the proverb's
    comparison.
- source_word: רֹעָה
  chosen: bad
  alternatives:
  - evil
  - rotten
  - decayed
  - injured
  lexicon: HALOT
  rationale: From רעע, describing something unsound or harmful. 'Bad' is natural modern
    English and fits the image of a tooth that cannot be relied on.
- source_word: רֶגֶל
  chosen: foot
  alternatives:
  - leg
  lexicon: HALOT
  rationale: The normal sense is 'foot'; 'leg' is less precise here and weakens the
    proverb's imagery.
- source_word: מוּעָדֶת
  chosen: slipping
  alternatives:
  - unsteady
  - tottering
  - out of joint
  lexicon: HALOT
  rationale: From a root associated with slipping or tottering. 'Slipping' best conveys
    instability in idiomatic English while preserving the concrete bodily image.
- source_word: מִבְטָח
  chosen: confidence
  alternatives:
  - trust
  - reliance
  lexicon: HALOT
  rationale: The noun denotes trust or confidence. 'Confidence' works well as the
    subject of the comparison in English; 'trust' is possible but slightly less idiomatic
    in this construction.
- source_word: בּוֹגֵד
  chosen: treacherous man
  alternatives:
  - faithless man
  - traitor
  - one who acts treacherously
  lexicon: HALOT
  rationale: The participle denotes one who deals treacherously or acts faithlessly.
    'Treacherous man' is concise, vivid, and fits the generic masculine singular of
    the Hebrew.
- source_word: בְּיוֹם
  chosen: in a day of
  alternatives:
  - on the day of
  - in the time of
  lexicon: HALOT
  rationale: The preposition with 'day' is temporal. 'In a day of' is idiomatic in
    English proverbial style and preserves the Hebrew construction.
- source_word: צָרָה
  chosen: trouble
  alternatives:
  - distress
  - adversity
  - calamity
  lexicon: HALOT
  rationale: The noun refers to distress or trouble. 'Trouble' is accessible modern
    English and suits the proverb's practical tone.
