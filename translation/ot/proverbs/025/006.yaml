id: PRO.25.6
reference: Proverbs 25:6
source:
  edition: WLC
  text: אַל תִּתְהַדַּ֥ר לִ/פְנֵי מֶ֑לֶךְ וּ/בִ/מְק֥וֹם גְּ֝דֹלִ֗ים אַֽל תַּעֲמֹֽד־־־׃
translation:
  text: Do not exalt yourself before a king, and do not stand in the place of great
    men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the place of the great' or 'among important people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְהַדַּר
  chosen: exalt yourself
  alternatives:
  - honor yourself
  - display your splendor
  - put yourself forward
  lexicon: HALOT
  rationale: The hitpael of הדר here carries the reflexive sense of making oneself
    appear honored or glorious. 'Exalt yourself' captures the warning against self-promotion
    in a royal setting more naturally than the more wooden 'honor yourself.'
- source_word: לִפְנֵי מֶלֶךְ
  chosen: before a king
  alternatives:
  - in the presence of a king
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' or 'in the presence of.' 'Before a king'
    is concise, idiomatic, and preserves the courtly setting.
- source_word: בִּמְקוֹם גְּדֹלִים
  chosen: in the place of great men
  alternatives:
  - in the place of the great
  - where great men stand
  - in the place of nobles
  lexicon: HALOT
  rationale: מָקוֹם is literally 'place,' and גְּדֹלִים refers to socially prominent
    or important persons. 'Great men' preserves the masculine plural form and the
    social-status sense without over-specifying a formal title like 'nobles.'
- source_word: תַּעֲמֹד
  chosen: stand
  alternatives:
  - take your stand
  - station yourself
  lexicon: HALOT
  rationale: The verb עמד is straightforwardly 'stand.' In context it refers to taking
    a position or place among the prominent, so the simple gloss is retained for readability
    and formal fidelity.
