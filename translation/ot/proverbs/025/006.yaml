theological_decisions:
- issue: Gendered rendering of גְּדֹלִים
  chosen_reading: great men
  alternative_readings:
  - great ones
  - the great
  - important people
  rationale: The Hebrew form is grammatically masculine plural and refers to socially
    elevated persons. Following the translation philosophy's gender-accurate principle,
    the main text keeps 'men' rather than neutralizing the expression. Because the
    proverb's force is social rather than specifically male-exclusive, a more inclusive
    alternative is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
