id: PRO.25.2
reference: Proverbs 25:2
source:
  edition: WLC
  text: כְּבֹ֣ד אֱ֭לֹהִים הַסְתֵּ֣ר דָּבָ֑ר וּ/כְבֹ֥ד מְ֝לָכִ֗ים חֲקֹ֣ר דָּבָֽר׃
translation:
  text: It is the glory of God to conceal a matter, and the glory of kings to search
    out a matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'honor' for 'glory' in both lines.
    reason: lexical_alternative
  - marker: b
    text: Or 'hide a matter' and 'investigate a matter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: In this proverb, כבוד denotes weighty honor or splendor attached to a
    person or office. 'Glory' preserves the elevated parallelism between God and kings
    better than the flatter 'honor'.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the one true God in Israel's wisdom tradition.
    Singular English 'God' reflects the sense in context.
- source_word: הַסְתֵּר
  chosen: to conceal
  alternatives:
  - to hide
  lexicon: HALOT
  rationale: The infinitive construct expresses the action associated with God's glory.
    'Conceal' fits wisdom-style diction and suggests purposeful hiddenness more aptly
    than the simpler 'hide'.
- source_word: דָּבָר
  chosen: a matter
  alternatives:
  - a thing
  - a word
  lexicon: HALOT
  rationale: In Proverbs, דָּבָר often means a matter, issue, or affair under consideration,
    not merely a spoken word. 'A matter' fits both cola and the investigative sense
    of the second line.
- source_word: וּ/כְבֹד
  chosen: and the glory
  alternatives:
  - but the glory
  lexicon: HALOT
  rationale: The conjunction joins the parallel cola. 'And' preserves the Hebrew coordination
    without forcing an adversative contrast, while English readers can still perceive
    the comparison.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - rulers
  lexicon: HALOT
  rationale: The Hebrew specifically names kings, and retaining the concrete term
    preserves the royal parallel to God without broadening the reference.
- source_word: חֲקֹר
  chosen: to search out
  alternatives:
  - to investigate
  - to examine
  lexicon: HALOT
  rationale: The verb denotes probing or investigating. 'Search out' is natural English
    and keeps the sense of diligent inquiry appropriate to royal discernment.
- source_word: דָּבָר
  chosen: a matter
  alternatives:
  - a thing
  - a word
  lexicon: HALOT
  rationale: Repeated with the same English gloss for consistency and to preserve
    the proverb's formal parallelism.
