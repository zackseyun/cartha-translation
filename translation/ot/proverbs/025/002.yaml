theological_decisions:
- issue: Nature of the contrast/parallel between God's hiddenness and kings' inquiry
  chosen_reading: Render both cola straightforwardly without implying moral opposition
    or exhaustive theological explanation.
  alternative_readings:
  - Interpret as a contrast between divine mystery and human governance
  - Interpret as mutual participation in wisdom, with kings uncovering what God has
    concealed
  rationale: 'The proverb states a poetic parallel about respective glory: God in
    concealing, kings in investigating. The translation should preserve the tension
    without importing a more developed doctrine of revelation or politics than the
    Hebrew itself states.'
  doctrine_reference: Preserve theological tension rather than resolve it.
