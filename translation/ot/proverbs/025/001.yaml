theological_decisions:
- issue: Gendered expression אַנְשֵׁי חִזְקִיָּה
  chosen_reading: the men of Hezekiah
  alternative_readings:
  - Hezekiah's officials
  - Hezekiah's servants
  rationale: The Hebrew is explicitly masculine plural and denotes persons attached
    to Hezekiah's court. Following the gender-accurate policy, the main text preserves
    'men' rather than adopting a gender-neutral institutional term, while recognizing
    that the phrase likely refers functionally to royal officials or scribes.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
