id: PRO.25.1
reference: Proverbs 25:1
source:
  edition: WLC
  text: גַּם אֵ֭לֶּה מִשְׁלֵ֣י שְׁלֹמֹ֑ה אֲשֶׁ֥ר הֶ֝עְתִּ֗יקוּ אַנְשֵׁ֤י חִזְקִיָּ֬ה
    מֶֽלֶךְ יְהוּדָֽה־׀־׃
translation:
  text: These also are proverbs of Solomon, which the men of Hezekiah king of Judah
    copied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'transcribed' or 'compiled.' The Hebrew verb likely refers to copying
      these proverbs into a collected form.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the men of Hezekiah,' likely referring to members of Hezekiah's
      court or scribal officials.
    reason: cultural_note
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - further
  lexicon: HALOT
  rationale: Marks addition/continuation from the preceding collection; 'also' is
    natural English and preserves the connective force.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Demonstrative referring to the following section of sayings; 'these'
    is the straightforward referent in English.
- source_word: מִשְׁלֵי
  chosen: proverbs
  alternatives:
  - sayings
  - maxims
  lexicon: HALOT
  rationale: Standard rendering of מָשָׁל in the book title/context; 'proverbs' best
    fits both genre and established English usage without distortion.
- source_word: שְׁלֹמֹה
  chosen: Solomon
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause describing the proverbs; 'which' reads
    smoothly in formal modern English.
- source_word: הֶעְתִּיקוּ
  chosen: copied
  alternatives:
  - transcribed
  - compiled
  - transferred
  lexicon: HALOT
  rationale: The Hiphil of עתק here most naturally refers to copying/transcribing
    these proverbs into a collected form. 'Copied' is clear, idiomatic, and avoids
    over-interpreting the exact editorial process, while preserving the sense better
    than the vaguer 'compiled'.
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the servants of
  - the officials of
  lexicon: HALOT
  rationale: Literally 'men of.' In context it denotes those belonging to or serving
    under Hezekiah. Per gender-accurate policy, 'men' is retained rather than neutralizing
    the expression.
- source_word: חִזְקִיָּה
  chosen: Hezekiah
  rationale: Personal name transliterated by standard convention.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: Construct chain identifying Hezekiah's royal office; 'king of Judah'
    is the natural and precise English rendering.
