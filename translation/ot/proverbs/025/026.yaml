  chosen_reading: a righteous man
  alternative_readings:
  - a righteous person
  rationale: The Hebrew is grammatically masculine singular and functions proverbially.
    Per translation philosophy, the rendering remains gender-accurate rather than
    neutralized, while still allowing representative force.
