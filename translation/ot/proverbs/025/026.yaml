id: PRO.25.26
reference: Proverbs 25:26
source:
  edition: WLC
  text: מַעְיָ֣ן נִ֭רְפָּשׂ וּ/מָק֣וֹר מָשְׁחָ֑ת צַ֝דִּ֗יק מָ֣ט לִ/פְנֵֽי רָשָֽׁע־׃
translation:
  text: Like a muddied spring and a polluted fountain is a righteous man who gives
    way before the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like a spring trampled muddy and a corrupted fountain is a righteous
      man who totters before the wicked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעְיָן
  chosen: spring
  alternatives:
  - wellspring
  - fountain
  lexicon: HALOT
  rationale: Refers to a natural source of water. 'Spring' fits modern English and
    pairs well with מָקוֹר as a near-synonymous second term in the proverb's parallelism.
- source_word: נִרְפָּשׂ
  chosen: muddied
  alternatives:
  - troubled
  - trampled
  - fouled
  lexicon: HALOT
  rationale: The passive participial form conveys a spring made turbid or disturbed,
    likely by being stirred up or trampled. 'Muddied' captures the image clearly in
    contemporary English.
- source_word: מָקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: Used in parallel with מַעְיָן. 'Fountain' preserves the poetic distinction
    in English without implying an artificial structure too strongly in this context.
- source_word: מָשְׁחָת
  chosen: polluted
  alternatives:
  - corrupted
  - ruined
  - spoiled
  lexicon: HALOT
  rationale: The noun denotes corruption or spoilage. With a water source, 'polluted'
    best conveys contamination and matches the proverb's imagery.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous man
  - a righteous person
  lexicon: HALOT
  rationale: Singular masculine adjective used substantivally. Following the project's
    gender-accurate policy, 'man' is retained rather than neutralized, while the proverb
    clearly speaks representatively.
- source_word: מָט
  chosen: gives way
  alternatives:
  - totters
  - falls
  - wavers
  - yields
  lexicon: HALOT
  rationale: The verb can denote slipping, tottering, or being shaken. In context
    with לִפְנֵי רָשָׁע, the sense is moral or social capitulation before the wicked
    rather than merely physical stumbling. 'Gives way' communicates that forcefully
    and idiomatically.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: Standard preposition meaning 'before' or 'in the presence of.' Here it
    marks the righteous man's yielding in relation to the wicked.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - a wicked man
  - the wicked man
  lexicon: HALOT
  rationale: The singular adjective is often used substantivally in a representative
    sense. 'The wicked' works naturally in English as a class-representative singular.
