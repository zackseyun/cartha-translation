id: PRO.25.24
reference: Proverbs 25:24
source:
  edition: WLC
  text: ט֗וֹב שֶׁ֥בֶת עַל פִּנַּת גָּ֑ג מֵ/אֵ֥שֶׁת מדונים וּ/בֵ֥ית חָֽבֶר־־׃
translation:
  text: It is better to live on a corner of the roof than with a quarrelsome wife
    in a shared house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a contentious wife and a house in common.' The final phrase is
      terse in Hebrew and may emphasize sharing the same household rather than the
      pleasantness of companionship.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: It is better
  alternatives:
  - Better
  lexicon: HALOT
  rationale: Predicate adjective used idiomatically in comparative wisdom sayings;
    English supplies 'it is' for natural sense.
- source_word: שֶׁבֶת
  chosen: to live
  alternatives:
  - to sit
  - to dwell
  lexicon: HALOT
  rationale: Though literally 'to sit,' in context with location it carries the sense
    of residing/dwelling. 'Live' is idiomatic modern English and fits the proverb's
    point.
- source_word: עַל פִּנַּת גָּג
  chosen: on a corner of the roof
  alternatives:
  - on the corner of a roof
  - in a corner on the roof
  lexicon: HALOT
  rationale: The phrase denotes a cramped, exposed spot on a flat roof. 'On a corner
    of the roof' preserves the concrete image without overexplaining.
- source_word: מֵאֵשֶׁת
  chosen: than with a ... wife
  alternatives:
  - than from a ... wife
  lexicon: HALOT
  rationale: The prefixed מ expresses comparison after טוֹב ('better than'). English
    requires restructuring to 'than with a wife' to make the comparison natural.
- source_word: מִדְיָנִים
  chosen: quarrelsome
  alternatives:
  - contentious
  - given to strife
  - brawling
  lexicon: HALOT
  rationale: Plural abstract noun 'strifes/contentions' used attributively with 'wife.'
    'Quarrelsome' is clear modern English and captures habitual contentiousness.
- source_word: וּבֵית חָבֶר
  chosen: in a shared house
  alternatives:
  - and a house in common
  - in the house of companionship
  - in a companioned house
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat idiomatic. חָבֶר conveys association/sharing/companionship;
    in this proverb the contrast is between an uncomfortable but solitary roof-corner
    and cohabitation in a common household. 'Shared house' best captures the practical
    sense in readable English.
