id: PRO.25.14
reference: Proverbs 25:14
source:
  edition: WLC
  text: נְשִׂיאִ֣ים וְ֭/רוּחַ וְ/גֶ֣שֶׁם אָ֑יִן אִ֥ישׁ מִ֝תְהַלֵּ֗ל בְּ/מַתַּת שָֽׁקֶר־׃
translation:
  text: Like clouds and wind without rain is a man who boasts of a false gift.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like clouds and wind but no rain, so is a man who boasts about a gift
      not given.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְשִׂיאִים
  chosen: clouds
  alternatives:
  - vapors
  - mists
  lexicon: HALOT
  rationale: In this proverb the noun refers to sky-borne formations associated with
    promised rain; 'clouds' is the most natural English equivalent in context. 'Vapors'
    is possible lexically but less idiomatic here.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: Given the weather imagery with clouds and rain, the meteorological sense
    'wind' is clearly intended, not 'spirit' or 'breath'.
- source_word: גֶשֶׁם
  chosen: rain
  lexicon: HALOT
  rationale: Standard contextual meaning in the weather simile.
- source_word: אָיִן
  chosen: without
  alternatives:
  - there is no
  - lacking
  lexicon: HALOT
  rationale: Rendered idiomatically in English as 'without rain' rather than the more
    wooden 'and rain there is none.' This preserves the proverb's compact simile.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Following the gender-accurate philosophy, the masculine singular is retained
    as 'a man' in a representative sense. The proverb speaks generically through masculine
    form.
- source_word: מִתְהַלֵּל
  chosen: boasts
  alternatives:
  - glories
  - brags
  lexicon: HALOT
  rationale: The Hitpael of הלל here conveys self-exaltation or boasting. 'Boasts'
    is natural modern English and fits wisdom-literature style better than the more
    colloquial 'brags'.
- source_word: בְּמַתַּת
  chosen: of a gift
  alternatives:
  - about a gift
  - concerning a gift
  lexicon: HALOT
  rationale: 'The preposition with the noun is best expressed in English as the object/content
    of boasting: ''boasts of a gift.'''
- source_word: שָׁקֶר
  chosen: 'false'
  alternatives:
  - deceptive
  - lying
  - that is not given
  lexicon: HALOT
  rationale: The sense is that the promised gift is empty or fraudulent. 'False gift'
    preserves the terseness of the Hebrew while allowing the implied idea of an undelivered
    promise. An expanded rendering like 'a gift he does not give' is interpretive
    and less formally tied to the source.
