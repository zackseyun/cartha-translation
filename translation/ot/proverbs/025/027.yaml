id: PRO.25.27
reference: Proverbs 25:27
source:
  edition: WLC
  text: אָ֘כֹ֤ל דְּבַ֣שׁ הַרְבּ֣וֹת לֹא ט֑וֹב וְ/חֵ֖קֶר כְּבֹדָ֣/ם כָּבֽוֹד־׃
translation:
  text: To eat much honey is not good, and searching out their glory is glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and searching out their glory is glory.'' The second line is
      difficult. It may mean that seeking honor for oneself is not honorable, or that
      investigating weighty matters is honorable. The Masoretic Text is rendered closely
      here.'
    reason: alternative_reading
lexical_decisions:
- source_word: אָכֹל
  chosen: To eat
  alternatives:
  - Eating
  lexicon: HALOT
  rationale: The infinitive construct functions substantivally/proverbially here,
    introducing the subject of the clause. 'To eat' preserves the gnomic force in
    natural English.
- source_word: דבשׁ
  chosen: honey
  lexicon: HALOT
  rationale: Straightforward lexical sense; retained literally as the image in the
    proverb.
- source_word: הרבות
  chosen: much
  alternatives:
  - in excess
  - too much
  - abundantly
  lexicon: HALOT
  rationale: This infinitive/adverbial form modifies the eating of honey and denotes
    excess. 'Much' is concise and idiomatic with 'eat.'
- source_word: לא טוב
  chosen: is not good
  alternatives:
  - is not טובה/good for one
  - is unhealthy
  lexicon: HALOT
  rationale: A standard evaluative expression. 'Is not good' preserves the Hebrew's
    moral/practical brevity without over-specifying physical harm.
- source_word: וחקר
  chosen: and searching out
  alternatives:
  - and to search out
  - but searching out
  - and investigation of
  lexicon: HALOT
  rationale: The noun 'searching/investigation' is rendered verbally in English for
    readability while preserving the parallel structure with the first colon.
- source_word: כבודם
  chosen: their glory
  alternatives:
  - one's own glory
  - honor of such men
  - the glory of others
  lexicon: HALOT
  rationale: The MT has a 3mp suffix, most naturally 'their glory.' Though the line
    is notoriously difficult, this preserves the received consonantal text without
    importing a smoother interpretation.
- source_word: כבוד
  chosen: is glory
  alternatives:
  - is honorable
  - is weighty/honor
  - brings glory
  lexicon: HALOT
  rationale: Retaining the nominal predicate reflects the terseness and wordplay of
    the Hebrew. The repetition of k-b-d is best preserved rather than paraphrased
    away.
