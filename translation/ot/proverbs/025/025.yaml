id: PRO.25.25
reference: Proverbs 25:25
source:
  edition: WLC
  text: מַ֣יִם קָ֭רִים עַל נֶ֣פֶשׁ עֲיֵפָ֑ה וּ/שְׁמוּעָ֥ה ט֝וֹבָ֗ה מֵ/אֶ֥רֶץ מֶרְחָֽק־׃
translation:
  text: Like cold water to a weary soul, so is good news from a distant land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a good report from a distant land.' The Hebrew שְׁמוּעָה can mean 'news,'
      'report,' or 'tidings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  chosen: water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Though morphologically plural, the Hebrew noun commonly functions as
    a mass noun. English singular 'water' is the natural equivalent in this simile.
- source_word: קָרִים
  chosen: cold
  alternatives:
  - cool
  lexicon: HALOT
  rationale: The adjective denotes actual coldness. 'Cold' preserves the vivid refreshment
    image better than the softer 'cool.'
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - for
  lexicon: HALOT
  rationale: In this idiom, a highly literal 'upon a weary soul' is awkward in English.
    'To a weary soul' conveys the relational sense in readable modern English while
    preserving the comparison.
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - person
  - life
  - throat
  lexicon: HALOT
  rationale: Hebrew nephesh can denote the inner self, life, or even throat/appetite
    depending on context. Here 'soul' best fits the poetic register and the sense
    of an exhausted inner being; 'throat' would be overly concrete, and 'person' too
    flat.
- source_word: עֲיֵפָה
  chosen: weary
  alternatives:
  - faint
  - exhausted
  lexicon: HALOT
  rationale: '''Weary'' matches the poetic tone and common English idiom. ''Exhausted''
    is possible but slightly more clinical; ''faint'' may overstate physical collapse.'
- source_word: וּשְׁמוּעָה
  chosen: good news
  alternatives:
  - a good report
  - good tidings
  lexicon: HALOT
  rationale: The noun means a report, message, or news. In context, 'good news' is
    the most natural modern English rendering and matches the emotional parallel with
    refreshing water.
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - pleasant
  - favorable
  lexicon: HALOT
  rationale: The adjective straightforwardly qualifies the report/news as beneficial
    or welcome. 'Good' is the simplest and most faithful rendering.
- source_word: מֵאֶרֶץ מֶרְחָק
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a distant country
  - from a far land
  lexicon: HALOT
  rationale: The phrase literally denotes 'from a land of distance' or 'from a distant
    land.' 'Distant land' is idiomatic modern English and preserves the geographic-remoteness
    sense.
