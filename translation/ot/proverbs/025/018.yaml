id: PRO.25.18
reference: Proverbs 25:18
source:
  edition: WLC
  text: מֵפִ֣יץ וְ֭/חֶרֶב וְ/חֵ֣ץ שָׁנ֑וּן אִ֥ישׁ עֹנֶ֥ה בְ֝/רֵעֵ֗/הוּ עֵ֣ד שָֽׁקֶר׃
translation:
  text: A club, a sword, and a sharp arrow—such is a man who answers against his neighbor
    with false testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A maul, a sword, and a sharp arrow is a man who bears false witness
      against his neighbor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵפִיץ
  chosen: club
  alternatives:
  - maul
  - war club
  - hammer
  lexicon: HALOT
  rationale: The noun denotes a smashing weapon. 'Club' is clear modern English and
    fits the proverb's sequence of weapons. 'Maul' is possible and traditional, but
    less immediately accessible for modern readers.
- source_word: חֶרֶב
  chosen: sword
  lexicon: HALOT
  rationale: Standard rendering for the common Hebrew term for a sword; no contextual
    reason to vary.
- source_word: חֵץ שָׁנוּן
  chosen: sharp arrow
  alternatives:
  - pointed arrow
  lexicon: HALOT
  rationale: The adjective שָׁנוּן means sharpened/sharp. 'Sharp arrow' preserves
    the concrete image and the escalating triad of weapons.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions proverbially
    for a representative individual. Per translation philosophy, gender-accurate language
    is preferred where it matches the source's intent.
- source_word: עֹנֶה
  chosen: answers
  alternatives:
  - testifies
  - responds
  lexicon: HALOT
  rationale: The participle literally means 'answering/responding.' In legal contexts
    it can shade toward giving testimony. 'Answers' preserves the Hebrew wording while
    allowing the following phrase 'with false testimony' to specify the forensic sense.
- source_word: בְּרֵעֵהוּ
  chosen: against his neighbor
  alternatives:
  - against his friend
  - concerning his neighbor
  lexicon: HALOT
  rationale: 'With ענה plus witness language, the preposition is best taken adversatively
    in context: giving testimony against another person. ''Neighbor'' is the standard
    rendering of רֵעַ and preserves the ethical resonance.'
- source_word: עֵד שָׁקֶר
  chosen: false testimony
  alternatives:
  - a false witness
  - lying witness
  lexicon: HALOT
  rationale: The Hebrew construction is literally 'witness of falsehood/false witness.'
    Rendering it as 'false testimony' fits smoothly with 'answers' and makes the legal
    sense explicit in idiomatic English without changing the meaning.
