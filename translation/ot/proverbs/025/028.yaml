theological_decisions:
- issue: Gendered representative language in wisdom saying
  chosen_reading: a man
  alternative_readings:
  - a person
  - one
  rationale: The proverb uses masculine singular אִישׁ in a representative sense.
    Following the stated doctrine of gender-accurate over gender-neutral, the translation
    keeps 'a man' rather than neutralizing the expression.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
