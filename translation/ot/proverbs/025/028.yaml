id: PRO.25.28
reference: Proverbs 25:28
source:
  edition: WLC
  text: עִ֣יר פְּ֭רוּצָה אֵ֣ין חוֹמָ֑ה אִ֝֗ישׁ אֲשֶׁ֤ר אֵ֖ין מַעְצָ֣ר לְ/רוּחֽ/וֹ׃
translation:
  text: A man who has no restraint over his spirit is like a city broken into, without
    a wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A person who has no control over his temper' or '...over himself.' The
      Hebrew says 'his spirit,' which can refer to one's inner disposition or temper.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: The basic sense is an inhabited urban settlement. 'City' is the standard
    and most natural equivalent in this proverb's simile.
- source_word: פְּרוּצָה
  chosen: broken into
  alternatives:
  - breached
  - broken down
  lexicon: HALOT
  rationale: From the verb פרץ, indicating a breaking through or breach. Here it describes
    a city whose defenses have been penetrated. 'Broken into' communicates the result
    vividly in modern English; 'breached' is possible but less natural for general
    readers.
- source_word: אֵין חוֹמָה
  chosen: without a wall
  alternatives:
  - having no wall
  - with no wall
  lexicon: HALOT
  rationale: The phrase literally states the absence of a wall. 'Without a wall' is
    concise, idiomatic, and preserves the image of defenselessness.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions proverbially.
    Per doctrine, gender-accurate rendering is preferred over gender-neutral when
    representative force is present. 'A man' preserves the source form while still
    functioning generically in wisdom literature.
- source_word: מַעְצָר
  chosen: restraint
  alternatives:
  - control
  - self-control
  lexicon: HALOT
  rationale: The noun denotes restraint or control. 'Restraint' is the most direct
    lexical equivalent. 'Self-control' captures the sense interpretively, but the
    Hebrew does not explicitly include the reflexive element in the noun itself, so
    'restraint' is preferred in the main text.
- source_word: לְרוּחוֹ
  chosen: over his spirit
  alternatives:
  - over his temper
  - over himself
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, wind, breath, or disposition/temper. In this
    wisdom context it refers to the inner impulse or temper that should be governed.
    'Spirit' preserves the Hebrew term and its broader anthropological range; more
    interpretive options like 'temper' are suitable as footnoted alternatives.
