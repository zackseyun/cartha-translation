id: PRO.25.20
reference: Proverbs 25:20
source:
  edition: WLC
  text: מַ֥עֲדֶה בֶּ֨גֶד בְּ/י֣וֹם קָ֭רָה חֹ֣מֶץ עַל נָ֑תֶר וְ/שָׁ֥ר בַּ֝/שִּׁרִ֗ים
    עַ֣ל לֶב רָֽע׀־־׃פ
translation:
  text: Like one who takes off a garment on a cold day, or vinegar on soda, is one
    who sings songs to a troubled heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vinegar on natron'—that is, on a mineral alkali. The image is of an
      irritating or disruptive reaction.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to/over a bad heart'; here 'bad' refers to a distressed or sorrowful
      inner condition, not necessarily moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲדֶה
  chosen: one who takes off
  alternatives:
  - one who removes
  - one who loosens
  lexicon: HALOT
  rationale: The form is best taken from עדה in the sense of removing or taking off
    clothing. In context with 'garment' and 'cold day,' the image is of stripping
    away needed warmth, an aggravating act. 'Takes off' is idiomatic modern English
    and preserves the concrete comparison.
- source_word: בֶּגֶד
  chosen: a garment
  alternatives:
  - clothing
  - a coat
  lexicon: HALOT
  rationale: A general term for clothing. 'Garment' keeps the proverb's concise, proverbial
    tone without over-specifying the item.
- source_word: בְּיוֹם קָרָה
  chosen: on a cold day
  alternatives:
  - in a day of cold
  - when it is cold
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'On a cold day' is natural English
    and preserves the situational force.
- source_word: חֹמֶץ
  chosen: vinegar
  lexicon: HALOT
  rationale: Standard lexical sense; no need to expand.
- source_word: נָתֶר
  chosen: soda
  alternatives:
  - alkali
  - natron
  lexicon: HALOT
  rationale: The substance is a mineral alkali (natron), not modern baking soda specifically,
    but 'soda' is a readable English equivalent that preserves the proverb's image
    of a reactive, unsuitable combination. 'Natron' is more technical and less accessible;
    preserved in a footnote.
- source_word: וְשָׁר בַּשִּׁרִים
  chosen: one who sings songs
  alternatives:
  - one who sings a song
  - a singer of songs
  lexicon: HALOT
  rationale: The participle plus plural noun expresses the act/habit of singing songs.
    The plural is retained to reflect the Hebrew form and the generalized action.
- source_word: עַל לֶב רָע
  chosen: to a troubled heart
  alternatives:
  - to a sad heart
  - over an afflicted heart
  - to an unhappy heart
  lexicon: HALOT
  rationale: Literally 'upon an evil/bad heart,' but in wisdom usage the phrase refers
    to an inwardly distressed, sorrowful condition rather than moral evil. 'Troubled
    heart' communicates the emotional state in clear modern English without implying
    wickedness.
