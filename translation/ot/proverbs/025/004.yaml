id: PRO.25.4
reference: Proverbs 25:4
source:
  edition: WLC
  text: הָג֣וֹ סִיגִ֣ים מִ/כָּ֑סֶף וַ/יֵּצֵ֖א לַ/צֹּרֵ֣ף כֶּֽלִי׃
translation:
  text: Remove the dross from the silver, and a vessel comes out for the refiner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the silversmith.' The Hebrew term can refer more broadly to a metalworker,
      but 'refiner' best fits the immediate context of removing dross from silver.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָגוֹ
  chosen: Remove
  alternatives:
  - Take away
  - Skim off
  lexicon: HALOT
  rationale: Imperative plural from הגה/נגה in this context means to remove or clear
    away. 'Remove' is natural modern English and fits the proverb's instructional
    tone without over-paraphrasing.
- source_word: סִיגִים
  chosen: the dross
  alternatives:
  - impurities
  - slag
  lexicon: HALOT
  rationale: Refers to the waste or impurities separated from metal in refining. 'Dross'
    is the standard and precise metallurgical term in biblical English, still understandable
    in context.
- source_word: מִכָּסֶף
  chosen: from the silver
  alternatives:
  - from silver
  lexicon: HALOT
  rationale: The preposition marks separation. Including 'the' gives idiomatic English
    for a specific refining scenario while preserving the concrete image.
- source_word: וַיֵּצֵא
  chosen: comes out
  alternatives:
  - will come out
  - there comes out
  - emerges
  lexicon: HALOT
  rationale: Wayyiqtol here expresses the resulting outcome in proverbial sequence.
    Present-tense English ('comes out') communicates the general truth of the proverb
    more naturally than a simple past.
- source_word: לַצֹּרֵף
  chosen: for the refiner
  alternatives:
  - for the silversmith
  - for the metalworker
  lexicon: HALOT
  rationale: צֹרֵף is one who refines or smelts metal. 'Refiner' best matches the
    immediate imagery of removing dross from silver; 'silversmith' is possible but
    slightly shifts focus from refining to crafting.
- source_word: כֶּלִי
  chosen: a vessel
  alternatives:
  - an object
  - a utensil
  - a container
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article or vessel. 'Vessel' preserves the
    concise, somewhat open-ended sense appropriate to the proverb's imagery.
