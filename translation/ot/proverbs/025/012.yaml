id: PRO.25.12
reference: Proverbs 25:12
source:
  edition: WLC
  text: נֶ֣זֶם זָ֭הָב וַ/חֲלִי כָ֑תֶם מוֹכִ֥יחַ חָ֝כָ֗ם עַל אֹ֥זֶן שֹׁמָֽעַת־־׃
translation:
  text: Like a gold ring and an ornament of fine gold is a wise reprover to a listening
    ear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like a gold nose ring and jewelry of fine gold is a wise reprover to
      an ear that hears.' The Hebrew terms for the ornaments are somewhat general,
      and the final phrase emphasizes receptive hearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶזֶם
  chosen: ring
  alternatives:
  - nose ring
  - earring
  lexicon: HALOT
  rationale: נֶזֶם denotes a ring-shaped ornament, often for the nose or ear. In this
    proverb the exact placement is not explicit, so the broader 'ring' preserves the
    image without over-specifying.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material term modifying נֶזֶם.
- source_word: וַחֲלִי
  chosen: and an ornament
  alternatives:
  - and jewelry
  - and a necklace
  lexicon: HALOT
  rationale: חֲלִי refers broadly to an ornament or piece of jewelry. 'Ornament' keeps
    the parallel with נֶזֶם while avoiding an overly narrow identification.
- source_word: כָּתֶם
  chosen: fine gold
  alternatives:
  - pure gold
  - choice gold
  lexicon: HALOT
  rationale: כָּתֶם commonly denotes refined or high-quality gold. 'Fine gold' is
    idiomatic and preserves the elevated value of the comparison.
- source_word: מוֹכִיחַ
  chosen: reprover
  alternatives:
  - one who rebukes
  - corrector
  lexicon: HALOT
  rationale: The participle from יכח here denotes one who gives corrective reproof.
    'Reprover' is concise and preserves the proverbial nominal style; the sense is
    constructive correction, not mere accusation.
- source_word: חָכָם
  chosen: wise
  alternatives:
  - skillful
  - sage
  lexicon: HALOT
  rationale: Adjectival modifier of the reprover. 'Wise' is the standard rendering
    in Proverbs and fits the moral-intellectual sense.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - for
  lexicon: HALOT
  rationale: Although literally 'upon/on,' in this comparative saying עַל marks the
    relation of the reprover to the recipient. 'To a listening ear' is natural English
    and conveys the intended direction.
- source_word: אֹזֶן שֹׁמָעַת
  chosen: a listening ear
  alternatives:
  - an ear that hears
  - a hearing ear
  lexicon: HALOT
  rationale: This idiom refers not merely to physical hearing but to receptive attentiveness.
    'Listening ear' is idiomatic English that preserves the metaphor and the moral
    responsiveness implied in context.
