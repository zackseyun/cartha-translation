id: PRO.25.3
reference: Proverbs 25:3
source:
  edition: WLC
  text: שָׁמַ֣יִם לָ֭/רוּם וָ/אָ֣רֶץ לָ/עֹ֑מֶק וְ/לֵ֥ב מְ֝לָכִ֗ים אֵ֣ין חֵֽקֶר׃
translation:
  text: The heavens for height, and the earth for depth, and the heart of kings—there
    is no searching out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is unsearchable' or 'there is no fathoming.' The Hebrew literally says
      'there is no searching/finding out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: Plural form commonly denotes the heavens/sky. 'The heavens' fits English
    biblical style and preserves the elevated comparison with earth and kings' hearts.
- source_word: לָרוּם
  chosen: for height
  alternatives:
  - in height
  - as to height
  - for exaltation
  lexicon: HALOT
  rationale: 'The prefixed ל marks respect/reference (''as for, with regard to'').
    ''For height'' concisely conveys the comparative dimension: the heavens in respect
    to height.'
- source_word: וָאָרֶץ
  chosen: and the earth
  alternatives:
  - and earth
  - and the land
  lexicon: HALOT
  rationale: In parallel with 'the heavens,' אֶרֶץ here is cosmic 'earth,' not localized
    'land.' The conjunction is retained.
- source_word: לָעֹמֶק
  chosen: for depth
  alternatives:
  - in depth
  - as to depth
  lexicon: HALOT
  rationale: Parallel to לָרוּם. 'For depth' preserves the terse Hebrew structure
    and the comparison of immeasurable dimensions.
- source_word: לֵב
  chosen: the heart
  alternatives:
  - the mind
  - the inner being
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering and in Hebrew includes thought,
    intention, and inner disposition. It best preserves the metaphor without over-interpreting.'
- source_word: מְלָכִים
  chosen: of kings
  alternatives:
  - of rulers
  lexicon: HALOT
  rationale: The noun specifically means 'kings,' not the broader 'rulers.' Retaining
    'kings' preserves the proverb's royal setting.
- source_word: אֵין חֵקֶר
  chosen: there is no searching out
  alternatives:
  - is unsearchable
  - there is no fathoming
  - there is no understanding
  lexicon: HALOT
  rationale: The phrase literally expresses non-existence of searching/fathoming.
    'There is no searching out' preserves the nominal construction and the sense of
    something beyond human probing. It applies most directly to 'the heart of kings'
    in the final clause while echoing the immeasurability of heaven and earth in the
    comparisons.
