theological_decisions:
- issue: Referent of קְדֹשִׁים
  chosen_reading: 'A singular divine referent: ''the Holy One'''
  alternative_readings:
  - 'a plural referent: ''holy ones'''
  rationale: 'The verse is structured as synonymous parallelism: ''the fear of the
    LORD'' corresponds to ''the knowledge of the Holy One.'' This strongly favors
    a divine referent in the second colon rather than knowledge of holy people or
    angels. Because the Hebrew form is plural, the alternative should be preserved
    in a footnote rather than erased.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
