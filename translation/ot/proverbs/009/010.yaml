id: PRO.9.10
reference: Proverbs 9:10
source:
  edition: WLC
  text: תְּחִלַּ֣ת חָ֭כְמָה יִרְאַ֣ת יְהוָ֑ה וְ/דַ֖עַת קְדֹשִׁ֣ים בִּינָֽה׃
translation:
  text: The beginning of wisdom is the fear of the LORD, and the knowledge of the
    Holy One is understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''holy ones.'' The plural form is often understood here as referring
      to God, hence ''the Holy One.'''
    reason: alternative_reading
lexical_decisions:
- source_word: תְּחִלַּת
  chosen: beginning of
  alternatives:
  - start of
  - first part of
  - chief part of
  lexicon: HALOT
  rationale: Construct form of תְּחִלָּה here most naturally denotes the beginning
    or starting point. In wisdom literature this can imply foundational principle,
    but 'beginning of' preserves the Hebrew wording without over-interpreting.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - wise living
  lexicon: HALOT
  rationale: Standard rendering in Proverbs for the broad moral and practical wisdom
    theme. Alternatives are too interpretive for the main text here.
- source_word: יִרְאַת
  chosen: fear of
  alternatives:
  - reverence for
  - awe of
  lexicon: HALOT
  rationale: The construct phrase יִרְאַת יְהוָה is a key wisdom expression. 'Fear
    of' best preserves the theological tension of reverent awe and proper dread before
    God; 'reverence' or 'awe' narrow the sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: וְדַעַת
  chosen: and the knowledge of
  alternatives:
  - and knowledge of
  lexicon: HALOT
  rationale: The conjunction links the second colon, and the construct noun דַּעַת
    takes the following noun as its object. 'The knowledge of' reads naturally in
    English and matches the nominal parallelism.
- source_word: קְדֹשִׁים
  chosen: the Holy One
  alternatives:
  - holy ones
  - the holy
  - the Most Holy
  lexicon: HALOT
  rationale: Although morphologically plural, in this wisdom context the plural is
    commonly understood as a plural of majesty/intensity referring to God, especially
    in parallel with 'the LORD' in the first colon. Rendering it 'the Holy One' gives
    the most coherent sense in English. The literal plural alternative is preserved
    in a footnote because the form is genuinely notable.
- source_word: בִּינָה
  chosen: is understanding
  alternatives:
  - is insight
  - is discernment
  lexicon: HALOT
  rationale: בִּינָה in Proverbs denotes understanding or discernment. 'Understanding'
    best matches the parallel with wisdom and knowledge and preserves the nominal
    equation of the Hebrew.
