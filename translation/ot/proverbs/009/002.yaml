theological_decisions:
- issue: Personified feminine subject in the Wisdom poem
  chosen_reading: Render the feminine singular subject straightforwardly as 'She'
    without capitalizing or adding interpretive identifiers in the verse text.
  alternative_readings:
  - Wisdom has slaughtered her meat; she has mixed her wine; she has also set her
    table.
  rationale: The Hebrew verbs are feminine singular, and the immediate literary context
    identifies the speaker as personified Wisdom. Using 'She' preserves the poetic
    personification while avoiding importing an explanatory gloss into the main text.
    The referent is clear from context.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
