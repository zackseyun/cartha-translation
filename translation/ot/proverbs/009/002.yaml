id: PRO.9.2
reference: Proverbs 9:2
source:
  edition: WLC
  text: טָבְחָ֣ה טִ֭בְחָ/הּ מָסְכָ֣ה יֵינָ֑/הּ אַ֝֗ף עָֽרְכָ֥ה שֻׁלְחָנָֽ/הּ׃
translation:
  text: She has slaughtered her meat; she has mixed her wine; she has also set her
    table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her slaughtered animals'; the Hebrew noun refers to butchered meat prepared
      for the banquet.
    reason: lexical_alternative
  - marker: b
    text: That is, she has prepared the wine by mixing it, likely as part of banquet
      custom.
    reason: cultural_note
lexical_decisions:
- source_word: טָבְחָה
  chosen: has slaughtered
  alternatives:
  - has butchered
  - has prepared
  lexicon: HALOT
  rationale: Qal perfect 3fs from טבח, denoting slaughtering/butchering an animal
    for a meal. 'Has slaughtered' preserves the concrete preparatory action better
    than the more general 'has prepared.'
- source_word: טִבְחָהּ
  chosen: her meat
  alternatives:
  - her slaughtered animals
  - her feast
  lexicon: HALOT
  rationale: The noun refers to slaughtered meat/provisions. 'Her meat' is idiomatic
    and concise in English, while still reflecting the concrete food prepared for
    the banquet. 'Her feast' is too broad and interpretive.
- source_word: מָסְכָה
  chosen: has mixed
  alternatives:
  - has poured
  - has prepared
  lexicon: HALOT
  rationale: From מסך in the sense of mixing wine, likely with spices and/or water
    in banquet preparation. 'Has mixed' is the standard and most textually grounded
    rendering.
- source_word: יֵינָהּ
  chosen: her wine
  lexicon: HALOT
  rationale: 'Straightforward possessive noun: the wine she has prepared for the banquet.'
- source_word: אַף
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: Here אַף adds another completed preparatory action in sequence. 'Also'
    fits the cumulative sense naturally in English.
- source_word: עָרְכָה
  chosen: has set
  alternatives:
  - has arranged
  - has prepared
  lexicon: HALOT
  rationale: From ערך, 'to arrange/set in order.' In context of a table, 'has set'
    is the most natural English equivalent.
- source_word: שֻׁלְחָנָהּ
  chosen: her table
  lexicon: HALOT
  rationale: Literal reference to the banquet table. Retaining the concrete image
    suits the personified Wisdom context without over-allegorizing.
