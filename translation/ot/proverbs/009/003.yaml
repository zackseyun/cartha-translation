id: PRO.9.3
reference: Proverbs 9:3
source:
  edition: WLC
  text: שָֽׁלְחָ֣ה נַעֲרֹתֶ֣י/הָ תִקְרָ֑א עַל גַּ֝פֵּ֗י מְרֹ֣מֵי קָֽרֶת־׃
translation:
  text: 'She has sent out her young women; she calls from the heights of the city:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her maidens.' The Hebrew may refer to young female attendants or servant-girls;
      'young women' preserves the age/gender sense without overstating social rank.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the heights of the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלְחָה
  chosen: has sent out
  alternatives:
  - has sent
  - sent forth
  lexicon: HALOT
  rationale: Qal perfect 3fs of שלח with feminine subject (Wisdom, personified). English
    present perfect works naturally in context, presenting the action as accomplished
    in preparation for the invitation that follows.
- source_word: נַעֲרֹתֶיהָ
  chosen: her young women
  alternatives:
  - her maidens
  - her servant-girls
  - her attendants
  lexicon: HALOT
  rationale: The noun נערות commonly denotes young women/girls. 'Young women' is clear
    modern English and avoids importing servant-status more strongly than the Hebrew
    requires, though the context may imply attendants.
- source_word: תִקְרָא
  chosen: she calls
  alternatives:
  - she cries out
  - she proclaims
  lexicon: HALOT
  rationale: Qal imperfect 3fs of קרא here denotes calling out publicly. 'She calls'
    is the most direct rendering; stronger options like 'cries out' are possible but
    not demanded by the verb alone.
- source_word: עַל
  chosen: from
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: Though literally 'upon/on,' in idiomatic English with a verb of calling
    and a location, 'from' best conveys the sense of calling from an elevated place.
- source_word: גַּפֵּי
  chosen: the heights
  alternatives:
  - the tops
  - the ridges
  - the eminences
  lexicon: HALOT
  rationale: This plural construct refers to elevated extremities/summits. 'Heights'
    is natural English and fits the public, prominent setting of Wisdom's call.
- source_word: מְרֹמֵי
  chosen: the heights of
  alternatives:
  - the high places of
  - the elevated places of
  lexicon: HALOT
  rationale: From מרום, 'height/elevation.' In construct with קָרֶת it specifies the
    elevated parts belonging to the city. Rendering together with גַּפֵּי as 'the
    heights of the city' avoids awkward literalism while preserving the image.
- source_word: קָרֶת
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: A poetic form for 'city.' 'City' preserves the urban setting and matches
    standard English usage in wisdom literature.
