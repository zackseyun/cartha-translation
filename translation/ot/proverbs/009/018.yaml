id: PRO.9.18
reference: Proverbs 9:18
source:
  edition: WLC
  text: וְֽ/לֹא יָ֭דַע כִּֽי רְפָאִ֣ים שָׁ֑ם בְּ/עִמְקֵ֖י שְׁא֣וֹל קְרֻאֶֽי/הָ־־׃פ
translation:
  text: But he does not know that the dead are there, that her guests are in the depths
    of Sheol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shades are there.' The Hebrew רְפָאִים refers to the dead, the departed
      in Sheol.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Yet ... not
  lexicon: HALOT
  rationale: The conjunction plus negation introduces a stark contrast with the seduced
    man's perception in the preceding verse. 'But' brings out the adversative force
    naturally in English.
- source_word: יָדַע
  chosen: he does not know
  alternatives:
  - he has not known
  - he is unaware
  lexicon: HALOT
  rationale: The qatal here functions as a present-state description in context. 'He
    does not know' is idiomatic and preserves the sense of ignorance.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what he does not know. English 'that' best
    fits both clauses.
- source_word: רְפָאִים
  chosen: the dead
  alternatives:
  - shades
  - departed spirits
  - Rephaim
  lexicon: HALOT
  rationale: In wisdom literature this term refers to the dead in Sheol, not the ethnic
    Rephaim. 'The dead' is the clearest modern English rendering; 'shades' is possible
    but less accessible and more interpretive in contemporary English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb referring to the woman's house in its true spiritual
    destination.
- source_word: בְּעִמְקֵי
  chosen: in the depths of
  alternatives:
  - in the deep places of
  - in the recesses of
  lexicon: HALOT
  rationale: The construct denotes deep places or depths. 'In the depths of' is natural
    English and preserves the imagery of descending into the underworld.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: HALOT
  rationale: Following the project's contested-terms guidance, the Hebrew term is
    preserved as 'Sheol' rather than flattened to 'grave' or the more theologically
    loaded 'hell.'
- source_word: קְרֻאֶיהָ
  chosen: her guests
  alternatives:
  - her invited ones
  - those called by her
  lexicon: HALOT
  rationale: From קרא in the passive participial form with 3fs suffix, referring to
    those invited by the woman. 'Guests' is concise, idiomatic, and contextually accurate,
    while still reflecting the invitation motif.
