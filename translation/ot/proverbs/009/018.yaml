theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  - hell
  rationale: The Hebrew term denotes the underworld / abode of the dead. Retaining
    'Sheol' avoids importing later doctrinal specificity into a wisdom-text image
    while preserving the text's theological gravity.
  doctrine_reference: 'Contested terms: יְהוָה entry demonstrates preference for preserving
    significant Hebrew theological terms where translation tradition may flatten nuance;
    translation philosophy emphasizes original-language primacy and preserving theological
    tension.'
