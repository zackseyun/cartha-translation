id: PRO.9.13
reference: Proverbs 9:13
source:
  edition: WLC
  text: אֵ֣שֶׁת כְּ֭סִילוּת הֹֽמִיָּ֑ה פְּ֝תַיּ֗וּת וּ/בַל יָ֥דְעָה מָּֽה־׃
translation:
  text: The woman Folly is loud; she is simple and knows nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew more literally, 'and does not know what.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת כְּסִילוּת
  chosen: The woman Folly
  alternatives:
  - Woman Folly
  - The woman of folly
  - Lady Folly
  lexicon: HALOT
  rationale: Construct phrase literally 'woman of folly.' In Proverbs 9, folly is
    personified as a woman in parallel with Woman Wisdom, so 'the woman Folly' preserves
    both the feminine personification and the appositional force without over-idiomatizing.
    'Lady Folly' is possible but adds a polished title not explicit in the Hebrew.
- source_word: הֹמִיָּה
  chosen: is loud
  alternatives:
  - is boisterous
  - is clamorous
  - is tumultuous
  lexicon: HALOT
  rationale: The adjective/participle conveys noisiness, turbulence, or boisterousness.
    'Is loud' is natural modern English and fits the characterization of Folly's public,
    noisy appeal. 'Boisterous' is slightly more interpretive; 'clamorous' is traditional
    but less current.
- source_word: פְּתַיּוּת
  chosen: simple
  alternatives:
  - naive
  - simpleminded
  - sheer simplicity
  lexicon: HALOT
  rationale: The noun denotes simplicity/naivety. Because the clause is verbless and
    predicates a quality of the woman, English supplies 'she is' and uses the adjective
    'simple' for readable sense. This keeps the semantic link with the 'simple' elsewhere
    in Proverbs while avoiding a wooden abstract noun.
- source_word: וּבַל
  chosen: and
  alternatives:
  - but
  - yet
  lexicon: HALOT
  rationale: 'The conjunction with negative particle introduces the next predicate:
    ''and not...'' In English, ''and'' best reflects the additive structure; stronger
    adversatives like ''but'' or ''yet'' are possible but not required by the Hebrew.'
- source_word: יָדְעָה מָּה
  chosen: knows nothing
  alternatives:
  - does not know anything
  - knows not what
  - does not know what
  lexicon: HALOT
  rationale: The idiom literally reads 'does not know what,' functioning as an emphatic
    statement of ignorance. 'Knows nothing' is idiomatic English that captures the
    force. A more literal rendering is worth preserving in a footnote because the
    Hebrew wording is somewhat abrupt.
