id: PRO.9.4
reference: Proverbs 9:4
source:
  edition: WLC
  text: מִי פֶ֭תִי יָסֻ֣ר הֵ֑נָּה חֲסַר לֵ֝֗ב אָ֣מְרָה לּֽ/וֹ־־׃
translation:
  text: Whoever is simple, let him turn in here! To him who lacks sense she says,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'lacking heart.' In Hebrew idiom, 'heart' often refers to understanding
      or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Whoever
  alternatives:
  - Who
  - Who is
  lexicon: HALOT
  rationale: Introduces an indefinite/generic addressee rather than a specific individual.
    'Whoever' captures the invitational force in idiomatic English better than a bare
    'Who.'
- source_word: פֶתִי
  chosen: simple
  alternatives:
  - naive
  - inexperienced
  - gullible
  lexicon: HALOT
  rationale: In Proverbs פתי denotes the naive or easily led person, not necessarily
    intellectually deficient. 'Simple' preserves the wisdom-literature category and
    traditional semantic range without over-paraphrasing.
- source_word: יָסֻר
  chosen: let him turn in
  alternatives:
  - let him turn aside
  - let him come in
  lexicon: HALOT
  rationale: The jussive form expresses invitation/exhortation. 'Turn in' fits the
    context of entering Wisdom's house and preserves the directional nuance better
    than a flat 'come.'
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - this way
  - hereward
  lexicon: HALOT
  rationale: Deictic adverb pointing to the speaker's location. 'Here' is natural
    and sufficiently direct.
- source_word: חֲסַר לֵב
  chosen: lacks sense
  alternatives:
  - lacks heart
  - is without understanding
  - lacks judgment
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'lacking heart,' where 'heart' denotes
    understanding/discernment. 'Lacks sense' communicates the idiomatic meaning in
    clear modern English while avoiding misleading anatomical literalism in the main
    text.
- source_word: אָמְרָה
  chosen: she says
  alternatives:
  - she said
  lexicon: HALOT
  rationale: 'Although morphologically qatal, in this discourse setting it functions
    as the narrative introduction to direct speech and is naturally rendered present
    in English: ''she says.'' This keeps the invitation vivid.'
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - to such a one
  - to him
  lexicon: HALOT
  rationale: Refers back to the singular generic addressee. 'To him' preserves the
    masculine singular form in line with the gender-accurate policy, while functioning
    generically in context.
