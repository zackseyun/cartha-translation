id: PRO.9.7
reference: Proverbs 9:7
source:
  edition: WLC
  text: יֹ֤סֵ֨ר לֵ֗ץ לֹקֵ֣חַֽ ל֣/וֹ קָל֑וֹן וּ/מוֹכִ֖יחַ לְ/רָשָׁ֣ע מוּמֽ/וֹ׀׃
translation:
  text: Whoever corrects a scoffer gets dishonor for himself, and whoever rebukes
    a wicked man gets his blemish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'takes disgrace to himself' for 'gets dishonor for himself.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his blemish'; the phrase may mean that the rebuker receives abuse
      or reproach from the wicked person.
    reason: lexical_alternative
  - marker: c
    text: '''Wicked man'' renders a masculine singular Hebrew form used generically.'
    reason: cultural_note
lexical_decisions:
- source_word: יֹסֵר
  chosen: Whoever corrects
  alternatives:
  - He who disciplines
  - One who instructs
  lexicon: HALOT
  rationale: The participle introduces a general principle, best rendered with an
    English indefinite relative ('whoever'). The verb יסר can mean discipline, chasten,
    or instruct/correct; here in wisdom context with parallel 'rebukes,' 'corrects'
    fits the sense of verbal correction without overstating punitive discipline.
- source_word: לֵץ
  chosen: a scoffer
  alternatives:
  - a mocker
  - a scorner
  lexicon: HALOT
  rationale: לץ in Proverbs denotes a contemptuous, arrogant rejecter of wisdom. 'Scoffer'
    is concise, current, and preserves the derisive nuance better than the more archaic
    'scorner.'
- source_word: לֹקֵחַ לוֹ
  chosen: gets dishonor for himself
  alternatives:
  - takes disgrace to himself
  - acquires shame for himself
  lexicon: HALOT
  rationale: לקח with לּוֹ is idiomatic for incurring or receiving something upon
    oneself. 'Gets ... for himself' is natural English and preserves the reflexive
    sense.
- source_word: קָלוֹן
  chosen: dishonor
  alternatives:
  - shame
  - disgrace
  lexicon: HALOT
  rationale: קלון denotes public shame/disgrace. 'Dishonor' works well in parallel
    with the next colon and avoids over-psychologizing the term as inward shame alone.
- source_word: וּמוֹכִיחַ
  chosen: and whoever rebukes
  alternatives:
  - and one who reproves
  - and whoever corrects
  lexicon: HALOT
  rationale: The Hiphil participle of יכח commonly means to reprove or rebuke. 'Rebukes'
    gives a sharper verbal parallel to 'corrects' in the first colon while avoiding
    exact repetition.
- source_word: לְרָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a guilty man
  lexicon: HALOT
  rationale: רשע here is singular and generic. Per the project's gender-accurate policy,
    'man' is retained because the Hebrew is grammatically masculine singular used
    representatively. 'Wicked man' is the most straightforward rendering.
- source_word: מוּמוֹ
  chosen: his blemish
  alternatives:
  - his defect
  - abuse for himself
  - insult
  lexicon: HALOT
  rationale: מוּם normally denotes a blemish or defect. In this proverb it likely
    refers metaphorically to the reproach or stain one receives from dealing with
    the wicked. The suffix is best taken as referring to the wicked man in the immediate
    phrase, yielding a terse, somewhat proverbial expression. Because the Hebrew is
    compact and somewhat ambiguous, the more interpretive alternatives are preserved
    in a footnote.
