id: PRO.9.12
reference: Proverbs 9:12
source:
  edition: WLC
  text: אִם חָ֭כַמְתָּ חָכַ֣מְתָּ לָּ֑/ךְ וְ֝/לַ֗צְתָּ לְֽ/בַדְּ/ךָ֥ תִשָּֽׂא־׃
translation:
  text: If you are wise, you are wise for yourself; if you scoff, you alone will bear
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will bear the consequences alone.' The Hebrew simply says 'will bear,'
      leaving the burden implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional statement. 'If' best preserves the Hebrew conditional
    force in this wisdom saying; 'when' would overstate certainty.
- source_word: חָכַמְתָּ ... חָכַמְתָּ לָּךְ
  chosen: you are wise, you are wise for yourself
  alternatives:
  - if you become wise, you become wise for yourself
  - if you are wise, you are wise to your own benefit
  lexicon: HALOT
  rationale: The repetition of חכם is preserved for emphasis. English 'are wise' communicates
    the stative/resultative sense naturally in a proverb. 'For yourself' renders לָךְ
    idiomatically as personal benefit rather than mere possession.
- source_word: וְלַצְתָּ
  chosen: if you scoff
  alternatives:
  - if you mock
  - if you are a scoffer
  lexicon: HALOT
  rationale: From לוץ, denoting arrogant derision characteristic of the 'scoffer'
    in Proverbs. 'Scoff' fits the wisdom-literature register and preserves the verbal
    force better than the more generic 'mock'.
- source_word: לְבַדְּךָ
  chosen: you alone
  alternatives:
  - by yourself
  - alone
  lexicon: HALOT
  rationale: Placed with the subject in English to emphasize sole personal responsibility.
    The Hebrew means 'by yourself/alone'; 'you alone' is the most natural emphatic
    rendering in context.
- source_word: תִשָּׂא
  chosen: will bear it
  alternatives:
  - will bear the consequences
  - will carry it
  lexicon: HALOT
  rationale: נשא here means to bear or carry a burden. The object is implicit in Hebrew;
    'it' is supplied in English to avoid awkwardness while leaving the burden/consequence
    unspecified, as in the source. 'Bear the consequences' is interpretive and therefore
    kept as an alternative rather than the main text.
