id: PRO.9.14
reference: Proverbs 9:14
source:
  edition: WLC
  text: וְֽ֭/יָשְׁבָה לְ/פֶ֣תַח בֵּיתָ֑/הּ עַל כִּ֝סֵּ֗א מְרֹ֣מֵי קָֽרֶת־׃
translation:
  text: and sits at the doorway of her house, on a seat at the heights of the city,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on a throne at the high places of the city.' The Hebrew כִּסֵּא can
      denote a royal seat or throne, but the immediate context does not require regal
      imagery, so 'seat' is retained in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבָה
  chosen: and sits
  alternatives:
  - and she sits
  - and has sat
  - and sat
  lexicon: HALOT
  rationale: Qal perfect 3fs of ישׁב with prefixed conjunction in Hebrew narrative/poetic
    description can function as a present-like descriptive perfect in context. Since
    the surrounding portrait of Folly is vivid and ongoing, English present 'sits'
    best captures the scene without over-literal past tense.
- source_word: לְפֶתַח
  chosen: at the doorway
  alternatives:
  - at the entrance
  - at the opening
  - by the door
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Doorway' is natural modern English
    and preserves the concrete image of her positioning at the entrance.
- source_word: בֵּיתָהּ
  chosen: of her house
  alternatives:
  - of her home
  lexicon: HALOT
  rationale: בַּיִת commonly means house/household. Here the physical location is
    in view, so 'house' is preferable to the more affective 'home'.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple locative preposition; 'on' is the natural modern equivalent.
- source_word: כִּסֵּא
  chosen: a seat
  alternatives:
  - a throne
  - a chair
  lexicon: HALOT
  rationale: כִּסֵּא can mean seat, chair, or throne depending on context. Here the
    context is personified Folly stationed publicly, not royal enthronement. 'Seat'
    preserves the lexical sense without importing regal overtones; 'chair' is too
    mundane.
- source_word: מְרֹמֵי
  chosen: the heights of
  alternatives:
  - the high places of
  - the elevated places of
  lexicon: HALOT
  rationale: From מָרוֹם/height, plural construct. 'The heights of' is idiomatic and
    preserves the elevated/public prominence of the location.
- source_word: קָרֶת
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: קָרֶת denotes a city/town. In wisdom literature, 'city' better matches
    the public urban setting and common English biblical usage.
