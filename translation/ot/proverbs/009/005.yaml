theological_decisions:
- issue: Nature of Wisdom's invitation imagery
  chosen_reading: Retain the concrete meal imagery without allegorical expansion in
    the translation.
  alternative_readings:
  - Interpret the bread and wine sacramentally
  - Interpret the meal as a generalized metaphor for instruction
  rationale: The verse personifies Wisdom inviting the simple to a prepared feast.
    While the imagery may invite broader theological reflection, the translation should
    not import sacramental or doctrinal meanings not explicit in the Hebrew. The concrete
    invitation is preserved and any theological resonance is left to interpretation.
  doctrine_reference: Translation philosophy §§1, 3
