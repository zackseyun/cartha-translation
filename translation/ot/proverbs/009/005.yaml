id: PRO.9.5
reference: Proverbs 9:5
source:
  edition: WLC
  text: לְ֭כוּ לַחֲמ֣וּ בְֽ/לַחֲמִ֑/י וּ֝/שְׁת֗וּ בְּ/יַ֣יִן מָסָֽכְתִּי׃
translation:
  text: Come, eat of my bread, and drink of the wine I have mixed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Go, eat of my bread.'' The Hebrew verb literally means ''go,'' but
      in this invitation context it functions idiomatically as a summons: ''Come.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the wine I have prepared.' The Hebrew verb specifically refers to mixed
      wine, likely prepared with water or spices.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Though the verb literally means 'go/walk,' in invitational discourse
    English idiom prefers 'Come' when the speaker summons hearers to herself. This
    best conveys the force of Wisdom's invitation without woodenly preserving deictic
    perspective.
- source_word: לַחֲמוּ
  chosen: eat
  alternatives:
  - feed on
  lexicon: HALOT
  rationale: The verb from לחם II means 'eat' here, not 'fight.' 'Eat' is the plain
    contextual sense in parallel with 'drink' and with the object 'my bread.'
- source_word: בְלַחֲמִי
  chosen: of my bread
  alternatives:
  - my bread
  - from my bread
  lexicon: HALOT
  rationale: The preposition ב here is partitive/instrumental in sense with the eating
    verb. 'Eat of my bread' is natural English and preserves the invitation to partake
    of what Wisdom has prepared.
- source_word: וּשְׁתוּ
  chosen: and drink
  lexicon: HALOT
  rationale: Simple imperative coordinated with the previous command; 'and drink'
    preserves the parallelism.
- source_word: בְּיַיִן
  chosen: of the wine
  alternatives:
  - wine
  - from the wine
  lexicon: HALOT
  rationale: With 'drink,' the preposition is naturally rendered partitivally in English
    as 'drink of the wine,' matching the structure of the first colon and preserving
    the poetic balance.
- source_word: מָסָכְתִּי
  chosen: I have mixed
  alternatives:
  - I have prepared
  - I have spiced
  lexicon: HALOT
  rationale: The verb refers to mixing wine, likely with water and/or spices, a customary
    preparation. 'I have mixed' is the most direct rendering; 'prepared' is broader
    but less precise, while 'spiced' may be too specific.
