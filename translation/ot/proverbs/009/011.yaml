id: PRO.9.11
reference: Proverbs 9:11
source:
  edition: WLC
  text: כִּי בִ֭/י יִרְבּ֣וּ יָמֶ֑י/ךָ וְ/יוֹסִ֥יפוּ לְּ֝/ךָ֗ שְׁנ֣וֹת חַיִּֽים־׃
translation:
  text: For by me your days will be many, and years of life will be added to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''in me'' or ''through me''; the Hebrew preposition can be understood
      in several closely related senses here, though the context favors instrumentality:
      Wisdom is the means by which life is prolonged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding exhortation. 'For'
    fits the proverbial explanatory flow in English better than the more explicit
    'because'.
- source_word: בִי
  chosen: by me
  alternatives:
  - in me
  - through me
  lexicon: HALOT
  rationale: 'The preposition ב with 1cs suffix here expresses means/instrumentality
    in context: wisdom is the means by which life is prolonged. ''By me'' is concise
    and preserves the personified speech of Wisdom.'
- source_word: יִרְבּוּ
  chosen: will be many
  alternatives:
  - will increase
  - will multiply
  lexicon: HALOT
  rationale: From רבה, 'be many/increase.' With 'your days' as subject, idiomatic
    English is 'your days will be many.' This preserves the Hebrew image without awkwardness.
- source_word: יָמֶיךָ
  chosen: your days
  lexicon: HALOT
  rationale: A standard Hebrew expression for lifespan or length of life. Retained
    literally because it is natural English and preserves the source metaphor.
- source_word: וְיוֹסִיפוּ
  chosen: will be added
  alternatives:
  - will increase
  - they will add
  lexicon: HALOT
  rationale: Hiphil of יסף commonly carries a causative/passive-result sense in this
    construction. Rendering as passive English ('will be added') best matches the
    following dative phrase and avoids an unnecessary indefinite subject.
- source_word: לְךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The lamed marks the person to whom the added years accrue. 'To you' is
    the most direct formal equivalent in this collocation.
- source_word: שְׁנוֹת חַיִּים
  chosen: years of life
  alternatives:
  - years of living
  - life-years
  lexicon: HALOT
  rationale: A genitive construction meaning years characterized by life, i.e., years
    of life. This is both literal and idiomatic in English.
