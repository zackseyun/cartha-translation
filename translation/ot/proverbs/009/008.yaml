id: PRO.9.8
reference: Proverbs 9:8
source:
  edition: WLC
  text: אַל תּ֣וֹכַח לֵ֭ץ פֶּן יִשְׂנָאֶ֑/ךָּ הוֹכַ֥ח לְ֝/חָכָ֗ם וְ/יֶאֱהָבֶֽ/ךָּ־־׃
translation:
  text: Do not rebuke a scoffer, lest he hate you; rebuke a wise man, and he will
    love you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mocker.' The Hebrew לֵץ refers to a person marked by arrogant, dismissive
      scorn.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a wise man'; the masculine singular is used representatively in
      Proverbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not' is the natural English
    imperative equivalent without adding emphasis not explicit in the Hebrew.
- source_word: תּוֹכַח / הוֹכַח (יכח)
  chosen: rebuke
  alternatives:
  - correct
  - reprove
  lexicon: HALOT
  rationale: The verb יכח in wisdom literature commonly carries the sense of verbal
    correction or reproof. 'Rebuke' preserves the confrontational force better than
    the softer 'correct,' while remaining idiomatic in both clauses.
- source_word: לֵץ
  chosen: scoffer
  alternatives:
  - mocker
  - scorner
  lexicon: HALOT
  rationale: In Proverbs, לֵץ denotes a person characterized by arrogant derision,
    not merely casual mockery. 'Scoffer' is a standard wisdom-term equivalent in English
    and preserves that moral profile better than 'mocker.'
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: פֶּן introduces a negative consequence to be avoided. 'Lest' is concise
    and accurately reflects the warning relationship between the clauses.
- source_word: יִשְׂנָאֶךָּ
  chosen: he hate you
  alternatives:
  - he will hate you
  lexicon: HALOT
  rationale: The imperfect after פֶּן expresses likely consequence. English idiom
    after 'lest' normally uses the bare form 'he hate you'; this preserves the syntactic
    relation cleanly. The sense is future/resultative.
- source_word: לְחָכָם
  chosen: a wise man
  alternatives:
  - the wise
  - a wise person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers to a representative
    type in Proverbs. Per the gender-accurate policy, 'a wise man' better matches
    the source form than the gender-neutral 'a wise person,' while still functioning
    generically.
- source_word: וְיֶאֱהָבֶךָּ
  chosen: and he will love you
  alternatives:
  - and he loves you
  lexicon: HALOT
  rationale: The imperfect here expresses expected result following the imperative.
    'He will love you' is the most natural English rendering of the consequence.
