- issue: Gendered singular in wisdom instruction
  chosen_reading: a wise man
  alternative_readings:
  - a wise person
  - the wise
  rationale: The masculine singular is retained in English because the source uses
    a grammatically masculine representative singular. This follows the translation
    philosophy's gender-accurate preference rather than flattening to a neutral form.
