id: PRO.9.15
reference: Proverbs 9:15
source:
  edition: WLC
  text: לִ/קְרֹ֥א לְ/עֹֽבְרֵי דָ֑רֶךְ הַֽ֝/מְיַשְּׁרִ֗ים אֹֽרְחוֹתָֽ/ם־׃
translation:
  text: 'to call out to those passing by on the road, who are going straight on their
    paths:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who make their paths straight.' The Hebrew participle may emphasize
      either proceeding straight ahead or keeping one's course straight.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרֹא
  chosen: to call out
  alternatives:
  - to call
  - to summon
  lexicon: HALOT
  rationale: The infinitive construct expresses purpose in the larger sentence ('to
    call...'). 'Call out' captures the public, vocal sense appropriate to the woman
    calling from her seat in context, while remaining close to the Hebrew.
- source_word: לְעֹבְרֵי דָרֶךְ
  chosen: to those passing by on the road
  alternatives:
  - to passersby
  - to those who pass along the way
  lexicon: HALOT
  rationale: The participial form of עבר denotes people in the act or habit of passing
    by. 'Those passing by on the road' preserves the verbal force and the concrete
    image of travelers.
- source_word: דָרֶךְ
  chosen: road
  alternatives:
  - way
  - path
  lexicon: HALOT
  rationale: Here דָרֶךְ refers to the traveled route of passersby. 'Road' distinguishes
    it from the following אֹרְחוֹת ('paths') and sounds natural in English.
- source_word: הַמְיַשְּׁרִים
  chosen: who are going straight on
  alternatives:
  - who make straight
  - who go straight
  - who direct straight
  lexicon: HALOT
  rationale: From ישר, the participle can mean making or keeping something straight.
    With 'their paths' as object, the idiom refers to people proceeding directly on
    their course. 'Who are going straight on' communicates that they are minding their
    own way rather than deviating.
- source_word: אֹרְחוֹתָם
  chosen: their paths
  alternatives:
  - their ways
  - their tracks
  lexicon: HALOT
  rationale: אֹרַח often denotes a path or course of travel, literal or figurative.
    'Paths' fits the proverb's travel imagery and can also retain the moral undertone
    common in wisdom literature.
