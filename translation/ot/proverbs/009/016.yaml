id: PRO.9.16
reference: Proverbs 9:16
source:
  edition: WLC
  text: מִי פֶ֭תִי יָסֻ֣ר הֵ֑נָּה וַ/חֲסַר לֵ֝֗ב וְ/אָ֣מְרָה לּֽ/וֹ־־׃
translation:
  text: Whoever is simple, let him turn in here! And to him who lacks sense she says,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'lacking heart.' In Proverbs, 'heart' often refers to understanding,
      judgment, or inner sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Whoever
  alternatives:
  - Who
  - Who is
  lexicon: HALOT
  rationale: 'Used idiomatically with the following adjective and verb to introduce
    a general invitation: ''Whoever is ...'' rather than a bare interrogative ''Who?''.'
- source_word: פֶתִי
  chosen: simple
  alternatives:
  - naive
  - inexperienced
  lexicon: HALOT
  rationale: In Proverbs, פתי denotes the gullible or morally unformed person, not
    merely someone intellectually slow. 'Simple' preserves the wisdom-literature category
    and traditional semantic range.
- source_word: יָסֻר
  chosen: let him turn in
  alternatives:
  - let him turn aside
  - let him come over
  lexicon: HALOT
  rationale: The jussive/imperfect here functions as an invitation or summons. 'Turn
    in' fits the context of entering the woman's house and is natural English while
    retaining the directional sense of סור.
- source_word: הֵנָּה
  chosen: here
  alternatives:
  - this way
  - hither
  lexicon: HALOT
  rationale: A deictic adverb pointing to the speaker's location. 'Here' is clear
    modern English; 'hither' would be archaic.
- source_word: חֲסַר לֵב
  chosen: him who lacks sense
  alternatives:
  - the one lacking heart
  - the senseless one
  - the one without understanding
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'lacking heart,' where 'heart' denotes
    understanding or judgment. 'Lacks sense' communicates the idiomatic meaning in
    readable English without flattening the wisdom nuance.
- source_word: וְאָמְרָה לוֹ
  chosen: she says
  alternatives:
  - she said to him
  - she speaks to him
  lexicon: HALOT
  rationale: 'The wayyiqtol advances the narrative with the feminine subject from
    context (Folly/the woman). English present ''she says'' works well in direct-speech
    introduction within proverbial discourse; ''to him'' is retained in the preceding
    phrase: ''And to him who lacks sense she says.'''
