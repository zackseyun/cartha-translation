theological_decisions:
- issue: Personification of wisdom
  chosen_reading: Render חָכְמוֹת as the personified singular 'Wisdom' with feminine
    pronouns.
  alternative_readings:
  - Render more explicitly as 'Lady Wisdom' or 'Woman Wisdom'
  rationale: The Hebrew presents wisdom as a female personification in this discourse,
    and the singular feminine verbs and suffixes require feminine reference in English.
    A more explicit label like 'Lady Wisdom' adds interpretive material not present
    in the verse itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without importing extra doctrinal claims.'
