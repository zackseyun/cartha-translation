id: PRO.9.1
reference: Proverbs 9:1
source:
  edition: WLC
  text: חָ֭כְמוֹת בָּנְתָ֣ה בֵיתָ֑/הּ חָצְבָ֖ה עַמּוּדֶ֣י/הָ שִׁבְעָֽה׃
translation:
  text: Wisdom has built her house; she has hewn out her seven pillars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew חָכְמוֹת is plural in form but takes singular feminine verbs here,
      functioning as a personified singular: ''Wisdom.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמוֹת
  chosen: Wisdom
  alternatives:
  - wisdoms
  - woman Wisdom
  lexicon: HALOT
  rationale: Although morphologically plural in form, the noun functions here as a
    singular personification, as shown by the following singular feminine verbs. 'Wisdom'
    best captures the literary personification without awkwardly preserving the plural
    form in English. 'Woman Wisdom' is interpretive and unnecessary in the main text.
- source_word: בָּנְתָה
  chosen: has built
  alternatives:
  - built
  lexicon: HALOT
  rationale: The perfect verb presents the action as complete. English present perfect
    reads naturally in this poetic context and preserves the completed sense while
    fitting the parallel line.
- source_word: בֵיתָהּ
  chosen: her house
  alternatives:
  - her household
  - her home
  lexicon: HALOT
  rationale: The primary sense is a physical 'house,' which fits the architectural
    imagery continued by 'pillars.' 'Household' would shift the image toward family
    or dynasty, which is less immediate here.
- source_word: חָצְבָה
  chosen: has hewn out
  alternatives:
  - has carved out
  - has cut out
  lexicon: HALOT
  rationale: The verb commonly refers to hewing or quarrying stone. 'Has hewn out'
    preserves the concrete, labor-intensive architectural imagery better than smoother
    but less specific alternatives.
- source_word: עַמּוּדֶיהָ
  chosen: her pillars
  alternatives:
  - her columns
  lexicon: HALOT
  rationale: '''Pillars'' is the standard architectural term in English Bible style
    and matches the solidity and grandeur of the image. ''Columns'' is possible but
    slightly more stylistically marked.'
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: The numeral is rendered directly. In context it likely conveys completeness
    or fullness, but that symbolic force should not be imported into the main text
    beyond the literal number.
