id: PRO.9.9
reference: Proverbs 9:9
source:
  edition: WLC
  text: תֵּ֣ן לְ֭/חָכָם וְ/יֶחְכַּם ע֑וֹד הוֹדַ֥ע לְ֝/צַדִּ֗יק וְ/י֣וֹסֶף לֶֽקַח־׃פ
translation:
  text: Give to a wise man, and he will become wiser still; teach a righteous man,
    and he will add learning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'Give instruction to a wise man.' The Hebrew leaves
      the object of 'give' unstated.
    reason: lexical_alternative
  - marker: b
    text: '''Righteous man'' uses the masculine singular form of the Hebrew as a representative
      singular, a common style in Proverbs.'
    reason: cultural_note
lexical_decisions:
- source_word: תֵּן
  chosen: Give
  alternatives:
  - Instruct
  - Offer
  lexicon: HALOT
  rationale: The imperative of נתן is broadly 'give.' In this proverb's elliptical
    style, the object is left unstated, so 'Give' preserves the Hebrew terseness better
    than supplying 'instruction' in the main text.
- source_word: לְחָכָם
  chosen: to a wise man
  alternatives:
  - to the wise
  - to a wise person
  lexicon: HALOT
  rationale: חָכָם denotes a wise person; the singular masculine form is retained
    as 'wise man' in keeping with the gender-accurate policy and the representative
    singular style of Proverbs.
- source_word: וְיֶחְכַּם עוֹד
  chosen: and he will become wiser still
  alternatives:
  - and he will be yet wiser
  - and he will grow still wiser
  lexicon: HALOT
  rationale: The verb from חכם means 'become wise' or 'act wisely'; with עוֹד ('still,
    further'), the sense is increase in wisdom. 'Become wiser still' is idiomatic
    modern English and captures the comparative force implied by context.
- source_word: הוֹדַע
  chosen: teach
  alternatives:
  - make known to
  - inform
  lexicon: HALOT
  rationale: The Hiphil imperative of ידע means 'make known.' In wisdom-instruction
    context, 'teach' best conveys the pedagogical force without unnecessary stiffness.
- source_word: לְצַדִּיק
  chosen: a righteous man
  alternatives:
  - the righteous
  - a just man
  lexicon: HALOT
  rationale: צַדִּיק commonly means 'righteous' or 'just.' 'Righteous man' fits wisdom
    literature usage and parallels 'wise man' in the first colon.
- source_word: וְיוֹסֶף לֶקַח
  chosen: and he will add learning
  alternatives:
  - and he will increase in learning
  - and he will gain instruction
  lexicon: HALOT
  rationale: יסף means 'add, increase,' and לֶקַח in Proverbs refers to received teaching/learning.
    'Add learning' is a fairly literal rendering; in English idiom it means to acquire
    more learning. This preserves the Hebrew imagery of increase.
