id: PRO.11.21
reference: Proverbs 11:21
source:
  edition: WLC
  text: יָ֣ד לְ֭/יָד לֹא יִנָּ֣קֶה רָּ֑ע וְ/זֶ֖רַע צַדִּיקִ֣ים נִמְלָֽט־׃
translation:
  text: Hand to hand, the evil man will not go unpunished, but the offspring of the
    righteous will escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Hand to hand,' an idiom likely meaning 'surely' or expressing firm
      certainty.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָד לְיָד
  chosen: Hand to hand
  alternatives:
  - Surely
  - Hand in hand
  lexicon: HALOT
  rationale: The idiom literally reads 'hand to hand.' In Proverbs it functions as
    an emphatic expression, likely conveying certainty or solidarity/combination.
    'Hand to hand' preserves the Hebrew imagery in readable English better than collapsing
    it to the interpretive adverb 'surely.' The idiomatic alternative is preserved
    in a footnote.
- source_word: יִנָּקֶה
  chosen: will go unpunished
  alternatives:
  - will be acquitted
  - will be left unpunished
  lexicon: HALOT
  rationale: The Niphal of נקה commonly means to be free from punishment, be acquitted,
    or go unpunished. In this wisdom context, the sense is judicial/moral consequence
    rather than formal courtroom acquittal alone. 'Will go unpunished' is idiomatic
    English and fits the proverb's warning.
- source_word: רָּע
  chosen: the evil man
  alternatives:
  - the wicked
  - evil
  lexicon: HALOT
  rationale: The adjective is masculine singular and functions substantivally for
    a wicked person. Following the gender-accurate guideline, 'the evil man' reflects
    the singular masculine form more closely than the abstract 'evil.' 'The wicked'
    is possible but less explicitly singular.
- source_word: וְזֶרַע
  chosen: but the offspring
  alternatives:
  - and the seed
  - but the seed
  - and the offspring
  lexicon: HALOT
  rationale: זֶרַע can mean seed, descendants, or offspring. Here it refers to progeny/descendants,
    not literal seed. The conjunction is rendered adversatively as 'but' because the
    proverb contrasts the fate of the wicked with that of the righteous line.
- source_word: צַדִּיקִים
  chosen: of the righteous
  alternatives:
  - of righteous people
  - of righteous men
  lexicon: HALOT
  rationale: 'Plural adjective used substantivally: ''righteous ones/people.'' ''Of
    the righteous'' is natural English and preserves the collective sense without
    over-specifying gender.'
- source_word: נִמְלָט
  chosen: will escape
  alternatives:
  - will be delivered
  - will get away
  lexicon: HALOT
  rationale: The Niphal of מלט denotes escape or deliverance. 'Will escape' best matches
    the concise proverbial style while leaving open whether the escape is from judgment,
    calamity, or the wicked person's fate.
