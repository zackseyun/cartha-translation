theological_decisions:
- issue: Gendered substantival adjective רָּע
  chosen_reading: the evil man
  alternative_readings:
  - the wicked
  - an evil person
  rationale: The Hebrew form is masculine singular and appears to denote a representative
    wicked person. Per the translation philosophy, gender-accurate rendering is preferred
    over neutralizing when the source is grammatically masculine and representative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Interpretation of יָד לְיָד idiom
  chosen_reading: Preserve the literal idiom in the main text
  alternative_readings:
  - surely
  - be assured
  rationale: The phrase is somewhat opaque but important. Preserving the Hebrew image
    maintains auditability and avoids over-resolving the idiom into a single interpretive
    adverb. A clarifying alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
