id: PRO.11.29
reference: Proverbs 11:29
source:
  edition: WLC
  text: עוֹכֵ֣ר בֵּ֭ית/וֹ יִנְחַל ר֑וּחַ וְ/עֶ֥בֶד אֱ֝וִ֗יל לַ/חֲכַם לֵֽב־־׃
translation:
  text: Whoever troubles his own house will inherit wind, and the fool will be a servant
    to the wise of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will inherit nothing' / 'will inherit emptiness'; Hebrew 'wind' is a
      metaphor for what is insubstantial or futile.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house' may refer to one's household or family, not merely the physical
      dwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹכֵר
  chosen: troubles
  alternatives:
  - brings trouble on
  - ruins
  - disturbs
  lexicon: HALOT
  rationale: The participle denotes one who causes trouble or brings calamity. 'Troubles'
    is concise, natural English and preserves the active sense without over-specifying
    total destruction.
- source_word: בֵּיתוֹ
  chosen: his own house
  alternatives:
  - his household
  - his family
  lexicon: HALOT
  rationale: Hebrew 'house' can denote household/family as well as the domestic sphere.
    'His own house' keeps the concrete Hebrew image while naturally implying the household.
- source_word: יִנְחַל
  chosen: will inherit
  alternatives:
  - will receive as an inheritance
  - will possess
  lexicon: HALOT
  rationale: 'The verb commonly means ''inherit'' or ''take possession.'' ''Will inherit''
    preserves the proverb''s irony: the only legacy gained is emptiness.'
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - air
  - emptiness
  - nothing
  lexicon: HALOT
  rationale: Here the noun likely carries the sense of something insubstantial or
    futile. 'Wind' preserves the Hebrew metaphor and the proverbial force better than
    an interpretive gloss like 'nothing.'
- source_word: וְעֶבֶד
  chosen: will be a servant
  alternatives:
  - and a servant
  - will become a slave
  - will serve as a servant
  lexicon: HALOT
  rationale: 'The verbless clause implies result: the fool ends up in servile relation
    to the wise. ''Will be a servant'' supplies natural English predication without
    overstating the bonded nature as ''slave,'' which is not clearly foregrounded
    here.'
- source_word: אֱוִיל
  chosen: the fool
  alternatives:
  - a fool
  - the foolish one
  lexicon: HALOT
  rationale: A common wisdom-term for a morally and practically senseless person.
    'The fool' matches English proverbial style and treats the term as a type.
- source_word: לַחֲכַם־לֵב
  chosen: to the wise of heart
  alternatives:
  - to the wise-hearted
  - to the wise in heart
  - to the wise person
  lexicon: HALOT
  rationale: The phrase describes one characterized by inner wisdom. 'Wise of heart'
    is slightly formal but clear and preserves the Hebrew anthropological expression
    better than flattening it to simply 'wise person.'
