id: PRO.11.17
reference: Proverbs 11:17
source:
  edition: WLC
  text: גֹּמֵ֣ל נַ֭פְשׁ/וֹ אִ֣ישׁ חָ֑סֶד וְ/עֹכֵ֥ר שְׁ֝אֵר֗/וֹ אַכְזָרִֽי׃
translation:
  text: A man of kindness benefits himself, but a cruel man troubles his own flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his body'; alternatively, 'his kin' if שְׁאֵרוֹ is taken in the sense
      of blood-relatives rather than flesh/body.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּמֵל
  chosen: benefits
  alternatives:
  - deals bountifully with
  - does good to
  - rewards
  lexicon: HALOT
  rationale: The participle of גמל here denotes doing good or bringing benefit. 'Benefits'
    is concise, natural English and fits the proverb's contrast with the harmful action
    in the second colon.
- source_word: נַפְשׁוֹ
  chosen: himself
  alternatives:
  - his soul
  - his life
  lexicon: HALOT
  rationale: נפש can mean soul, self, or life. In this wisdom context the sense is
    reflexive and practical rather than anthropological, so 'himself' best conveys
    that the kind person's conduct returns benefit to his own person.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and functions representatively
    in a proverb. Per the gender-accurate policy, 'man' preserves the source form
    and proverbial style.
- source_word: חָסֶד
  chosen: kindness
  alternatives:
  - steadfast love
  - mercy
  - loyal love
  lexicon: HALOT
  rationale: Here חֶסֶד describes the character of the man rather than covenantal
    divine love in a technical sense. 'Kindness' is idiomatic in English ('a man of
    kindness') and captures benevolent, loyal concern without overloading the line
    with specifically covenantal terminology.
- source_word: עֹכֵר
  chosen: troubles
  alternatives:
  - brings trouble on
  - harms
  - disturbs
  lexicon: HALOT
  rationale: The verb עכר commonly carries the sense of bringing trouble. 'Troubles'
    preserves the causative sense and works well in the antithetical parallelism with
    'benefits.'
- source_word: שְׁאֵרוֹ
  chosen: his own flesh
  alternatives:
  - his body
  - his kin
  lexicon: HALOT
  rationale: שְׁאֵר can denote flesh, body, or blood-relative/kin. In this proverb,
    paired with נפשוֹ in the first colon, the most natural contrast is between benefiting
    oneself and harming one's own body/flesh. 'His own flesh' preserves the Hebrew
    imagery while remaining understandable. 'Kin' is possible but less likely in this
    immediate parallelism.
- source_word: אַכְזָרִי
  chosen: a cruel man
  alternatives:
  - the cruel man
  - one who is cruel
  lexicon: HALOT
  rationale: The adjective functions substantivally here. Rendering it as 'a cruel
    man' matches the structure of the first colon and keeps the antithetical pairing
    clear in English.
