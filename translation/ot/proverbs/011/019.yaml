theological_decisions:
- issue: Sense of צְדָקָה in wisdom context
  chosen_reading: righteousness as moral uprightness leading to life
  alternative_readings:
  - justice as social equity leading to life
  rationale: The proverb's antithetical parallelism contrasts a virtuous moral path
    with pursuing evil. While צְדָקָה can include justice, the immediate contrast
    favors the broader ethical sense 'righteousness.' This preserves the wisdom-literature
    emphasis without importing narrower doctrinal categories.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
