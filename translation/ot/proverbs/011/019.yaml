id: PRO.11.19
reference: Proverbs 11:19
source:
  edition: WLC
  text: כֵּן צְדָקָ֥ה לְ/חַיִּ֑ים וּ/מְרַדֵּ֖ף רָעָ֣ה לְ/מוֹתֽ/וֹ־׃
translation:
  text: So righteousness leads to life, but he who pursues evil, to his own death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Thus righteousness is for life' or 'Indeed, righteousness leads to life.'
      The Hebrew first clause is verbless, so English must supply the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - Indeed
  lexicon: HALOT
  rationale: כֵּן here functions adverbially, drawing an inferential or emphatic conclusion
    from the surrounding wisdom sayings. 'So' is concise, natural English that preserves
    the proverbial force better than the more formal 'thus.'
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - right conduct
  lexicon: HALOT
  rationale: The noun denotes righteousness/uprightness in wisdom literature. 'Righteousness'
    is the default rendering for this semantic field and fits the moral contrast with
    pursuing evil. 'Justice' is possible in some contexts, but here the proverb contrasts
    personal moral orientation and outcome.
- source_word: לְחַיִּים
  chosen: leads to life
  alternatives:
  - is for life
  - results in life
  lexicon: HALOT
  rationale: The preposition ל with 'life' expresses result or goal. Because the Hebrew
    clause is verbless, English requires supplying a copular/resultative sense. 'Leads
    to life' makes the proverb readable while preserving the causal/resultative relationship.
- source_word: וּמְרַדֵּף
  chosen: but he who pursues
  alternatives:
  - and one pursuing
  - but whoever chases
  lexicon: HALOT
  rationale: 'The participle functions substantivally: ''the one who pursues.'' The
    conjunction marks contrast with the first colon, so ''but he who pursues'' captures
    both the adversative sense and the ongoing/habitual force of the participle.'
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - wickedness
  - calamity
  lexicon: HALOT
  rationale: In this moral contrast with righteousness and life, רָעָה is best taken
    ethically as 'evil' rather than circumstantially as 'harm' or 'calamity.'
- source_word: לְמוֹתוֹ
  chosen: to his own death
  alternatives:
  - to his death
  - results in his death
  lexicon: HALOT
  rationale: The phrase literally means 'to his death.' Adding 'own' brings out the
    3ms suffix in idiomatic English and clarifies that the pursuer of evil brings
    death upon himself. The preposition ל again expresses result/destination.
