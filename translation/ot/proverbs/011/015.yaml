id: PRO.11.15
reference: Proverbs 11:15
source:
  edition: WLC
  text: רַע יֵ֭רוֹעַ כִּי עָ֣רַב זָ֑ר וְ/שֹׂנֵ֖א תֹקְעִ֣ים בּוֹטֵֽחַ־־׃
translation:
  text: He will surely suffer harm if he becomes surety for a stranger, but whoever
    hates handshakes is secure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'striking hands'—a gesture used to seal a pledge or guarantee.
    reason: cultural_note
  - marker: b
    text: Or, 'whoever hates giving pledges is safe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַע
  chosen: surely suffer harm
  alternatives:
  - evil
  - badly
  lexicon: HALOT
  rationale: 'Used adverbially/predicatively with יֵרֹועַ to intensify the warning:
    the sense is not moral evil here but adverse outcome or harm.'
- source_word: יֵרֹועַ
  chosen: will suffer harm
  alternatives:
  - will fare badly
  - will be broken
  lexicon: HALOT
  rationale: From רעע in the Niphal, conveying experiencing injury or misfortune.
    'Will suffer harm' is idiomatic and fits the proverb's warning tone.
- source_word: כִּי
  chosen: if
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Though often causal, here it introduces the circumstance under which
    harm comes. English 'if' best captures the conditional force in this proverb.
- source_word: עָרַב
  chosen: becomes surety
  alternatives:
  - puts up security
  - guarantees a debt
  lexicon: HALOT
  rationale: The verb refers to pledging oneself as guarantor for another's obligation.
    'Becomes surety' preserves the legal-financial nuance with moderate formality.
- source_word: זָר
  chosen: for a stranger
  alternatives:
  - for a foreigner
  - for an outsider
  lexicon: HALOT
  rationale: In wisdom literature זָר commonly denotes an unrelated outsider rather
    than specifically an ethnic foreigner. 'Stranger' fits the social and prudential
    context.
- source_word: שֹׂנֵא
  chosen: hates
  alternatives:
  - rejects
  - avoids
  lexicon: HALOT
  rationale: The participle is strong and should not be softened unnecessarily. In
    proverbial style 'hates' can denote firm aversion.
- source_word: תֹקְעִים
  chosen: handshakes
  alternatives:
  - striking hands
  - pledges
  lexicon: HALOT
  rationale: Literally 'those who strike' or the act of striking hands, a gesture
    used to seal a pledge. 'Handshakes' communicates the concrete image in contemporary
    English, while the financial-pledge sense is preserved by context and footnote.
- source_word: בּוֹטֵחַ
  chosen: is secure
  alternatives:
  - is safe
  - lives confidently
  lexicon: HALOT
  rationale: Conveys being safe/secure from the danger just described. 'Is secure'
    is concise and proverbially apt.
