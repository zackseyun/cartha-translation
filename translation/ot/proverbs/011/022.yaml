id: PRO.11.22
reference: Proverbs 11:22
source:
  edition: WLC
  text: נֶ֣זֶם זָ֭הָב בְּ/אַ֣ף חֲזִ֑יר אִשָּׁ֥ה יָ֝פָ֗ה וְ/סָ֣רַת טָֽעַם׃
translation:
  text: Like a gold ring in a pig’s snout is a beautiful woman who lacks discretion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like a gold nose ring in a pig’s snout is a beautiful woman without
      good sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶזֶם
  chosen: ring
  alternatives:
  - nose ring
  - jewel
  lexicon: HALOT
  rationale: נֶזֶם denotes a ring or nose ring, often jewelry worn in the nose. Because
    the following phrase explicitly locates it 'in a pig’s snout,' English 'ring'
    is sufficient and natural, while the location supplies the nasal sense.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard material term; 'gold' preserves the contrast between precious
    ornament and unclean animal.
- source_word: בְּאַף
  chosen: in a pig’s snout
  alternatives:
  - in the nose of a pig
  lexicon: HALOT
  rationale: אַף can mean 'nose' as well as 'anger.' Here the concrete anatomical
    sense is required. 'Snout' is idiomatic and fitting for a pig, making the image
    vivid in modern English.
- source_word: חֲזִיר
  chosen: pig
  alternatives:
  - swine
  - boar
  lexicon: HALOT
  rationale: '''Pig'' is the clearest modern English equivalent. ''Swine'' is more
    traditional but less natural for the target readership.'
- source_word: אִשָּׁה
  chosen: woman
  alternatives:
  - wife
  lexicon: HALOT
  rationale: The noun can mean 'woman' or 'wife.' No marital context is present, so
    the generic 'woman' is preferable.
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - fair
  - attractive
  lexicon: HALOT
  rationale: '''Beautiful'' best captures the adjective''s positive evaluation of
    physical attractiveness in contemporary English.'
- source_word: וְסָרַת טָעַם
  chosen: who lacks discretion
  alternatives:
  - and turns away from good sense
  - but without taste
  - and departing from judgment
  lexicon: HALOT
  rationale: The participial expression literally describes one who has turned aside
    from טַעַם. In wisdom literature טַעַם can denote discernment, judgment, or good
    sense, not merely aesthetic 'taste.' 'Who lacks discretion' communicates the moral-intellectual
    deficiency idiomatically in English.
