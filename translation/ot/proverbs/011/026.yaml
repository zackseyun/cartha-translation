id: PRO.11.26
reference: Proverbs 11:26
source:
  edition: WLC
  text: מֹ֣נֵֽעַ בָּ֭ר יִקְּבֻ֣/הוּ לְא֑וֹם וּ֝/בְרָכָ֗ה לְ/רֹ֣אשׁ מַשְׁבִּֽיר׃
translation:
  text: The one who withholds grain—the people curse him, but blessing is on the head
    of the one who sells it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nation' or 'the populace' curse him; Hebrew לְאֹם can denote a people-group
      or the public collectively.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who distributes grain'; the Hebrew participle can emphasize
      supplying grain, though in context it commonly refers to selling/provisioning
      rather than hoarding.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹנֵעַ
  chosen: the one who withholds
  alternatives:
  - whoever holds back
  - one withholding
  lexicon: HALOT
  rationale: Participial form functioning substantivally; English renders the ongoing/general
    character of the person described rather than a one-time act.
- source_word: בָּר
  chosen: grain
  alternatives:
  - corn
  - wheat
  lexicon: HALOT
  rationale: Hebrew בָּר here refers generically to grain/cereal produce, not specifically
    maize ('corn' in modern English) and not necessarily wheat alone.
- source_word: יִקְּבֻהוּ
  chosen: curse him
  alternatives:
  - denounce him
  - execrate him
  lexicon: HALOT
  rationale: From נקב in the sense of cursing/uttering a curse against. 'Curse' is
    the most direct and natural English equivalent in this wisdom context.
- source_word: לְאֹם
  chosen: the people
  alternatives:
  - the populace
  - the nation
  lexicon: HALOT
  rationale: Though often 'people' or 'nation,' here the sense is the public/community
    reacting to hoarding. 'The people' best fits the proverb's social setting.
- source_word: וּבְרָכָה
  chosen: but blessing
  alternatives:
  - and blessing
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but English idiom and the antithetical
    parallelism of Hebrew wisdom favor 'but' to make the contrast explicit without
    altering meaning.
- source_word: לְרֹאשׁ
  chosen: is on the head of
  alternatives:
  - rests on the head of
  - comes upon
  lexicon: HALOT
  rationale: Keeps the Hebrew idiom of blessing resting upon a person's head, preserving
    the concrete imagery rather than flattening it to simply 'upon' or 'for'.
- source_word: מַשְׁבִּיר
  chosen: the one who sells it
  alternatives:
  - the seller of grain
  - the one who distributes grain
  lexicon: HALOT
  rationale: Hiphil participle of שׁבר in this commercial context refers to selling/providing
    grain. 'Sells it' fits the contrast with withholding grain and avoids implying
    mere charitable distribution.
