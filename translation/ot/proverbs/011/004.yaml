id: PRO.11.4
reference: Proverbs 11:4
source:
  edition: WLC
  text: לֹא יוֹעִ֣יל ה֭וֹן בְּ/י֣וֹם עֶבְרָ֑ה וּ֝/צְדָקָ֗ה תַּצִּ֥יל מִ/מָּֽוֶת־׃
translation:
  text: Wealth is of no use on the day of wrath, but righteousness delivers from death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'riches do not profit on a day of wrath.'
    reason: lexical_alternative
  - marker: b
    text: '''Righteousness'' can also be rendered ''justice'' or ''right conduct''
      in wisdom contexts.'
    reason: lexical_alternative
  - marker: c
    text: '''The day of wrath'' may refer broadly to a time of judgment or calamity;
      the proverb does not specify further.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹן
  chosen: wealth
  alternatives:
  - riches
  - treasure
  lexicon: HALOT
  rationale: הוֹן denotes material wealth or riches. 'Wealth' is natural modern English
    and broad enough to cover possessions generally without sounding archaic like
    'riches.'
- source_word: יוֹעִיל
  chosen: is of no use
  alternatives:
  - does not profit
  - does not benefit
  - will not avail
  lexicon: HALOT
  rationale: The Hiphil of יעל means to profit, benefit, or be of use. 'Is of no use'
    communicates the predicate smoothly in English while preserving the sense of ineffectiveness.
- source_word: בְּיוֹם עֶבְרָה
  chosen: on the day of wrath
  alternatives:
  - in the day of fury
  - on a day of wrath
  lexicon: HALOT
  rationale: יוֹם with ב marks the time, and עֶבְרָה denotes wrath, fury, or overflowing
    anger. 'The day of wrath' best captures the proverbial force and likely points
    to a decisive time of judgment rather than merely any angry day.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - right conduct
  lexicon: HALOT
  rationale: צְדָקָה can denote righteousness or justice. In Proverbs it often refers
    to uprightness expressed in life. 'Righteousness' is the default rendering aligned
    with the project's contested-terms guidance, while the ethical nuance is preserved
    by context.
- source_word: תַּצִּיל
  chosen: delivers
  alternatives:
  - rescues
  - saves
  lexicon: HALOT
  rationale: The Hiphil of נצל means to snatch away, rescue, or deliver. 'Delivers'
    is concise, idiomatic, and fits wisdom-style parallelism.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - from mortal danger
  lexicon: HALOT
  rationale: The phrase is literally 'from death.' While it may include deliverance
    from deadly consequences more broadly, the Hebrew expression should remain direct
    in the main text.
