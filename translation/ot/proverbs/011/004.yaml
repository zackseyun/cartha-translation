theological_decisions:
- issue: Sense of 'the day of wrath'
  chosen_reading: A decisive day of judgment in general terms, without specifying
    a later doctrinal framework beyond the proverb itself.
  alternative_readings:
  - A temporal day of human calamity or disaster
  - An eschatological day of divine judgment
  rationale: The Hebrew proverb states that wealth fails in a time of wrath while
    righteousness delivers from death. The wording naturally allows a judgment setting,
    but the verse itself does not require a fully specified eschatological interpretation.
    The translation preserves the theological tension rather than narrowing it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Meaning of 'righteousness delivers from death'
  chosen_reading: Righteousness is presented as the means by which one is delivered
    from death within wisdom theology, without importing later debates about justification.
  alternative_readings:
  - Practical uprightness preserves life from destructive consequences
  - Covenantal righteousness secures divine deliverance
  rationale: The proverb affirms the life-preserving value of righteousness, but it
    should not be overread as a technical statement about soteriology. The English
    keeps the wording straightforward and lets the proverb speak in its own register.
  doctrine_reference: Affirmations and Translation philosophy §1, §3
