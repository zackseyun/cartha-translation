theological_decisions:
- issue: Gendered representative language in וְאִישׁ
  chosen_reading: a man of understanding
  alternative_readings:
  - a person of understanding
  - one of understanding
  rationale: The Hebrew uses masculine singular representative language. Following
    the stated gender-accurate philosophy, the translation retains 'man' rather than
    neutralizing it, while understanding it generically in proverbial usage.
