id: PRO.11.12
reference: Proverbs 11:12
source:
  edition: WLC
  text: בָּז לְ/רֵעֵ֥/הוּ חֲסַר לֵ֑ב וְ/אִ֖ישׁ תְּבוּנ֣וֹת יַחֲרִֽישׁ־־׃
translation:
  text: Whoever despises his neighbor lacks sense, but a man of understanding keeps
    silent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his friend' or 'his companion.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'lacks heart,' an idiom for lacking sense or understanding.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'a man of understanding,' using masculine singular language
      in a representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּז
  chosen: despises
  alternatives:
  - shows contempt for
  - scorns
  lexicon: HALOT
  rationale: The participle denotes treating someone with contempt. 'Despises' is
    concise, natural English and fits the proverb's moral contrast.
- source_word: לְרֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. In wisdom literature, 'neighbor'
    best preserves the broader social-ethical sense rather than implying close friendship
    only.
- source_word: חֲסַר לֵב
  chosen: lacks sense
  alternatives:
  - is lacking heart
  - is without sense
  - lacks understanding
  lexicon: HALOT
  rationale: Literally 'lacking heart.' In Hebrew idiom, לֵב often refers to the inner
    faculty of judgment and understanding, not merely emotion. 'Lacks sense' communicates
    the idiomatic meaning in clear modern English.
- source_word: וְאִישׁ
  chosen: a man
  alternatives:
  - but one
  - but a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and representative. Per
    translation philosophy, the masculine form is retained where it carries generic
    force.
- source_word: תְּבוּנוֹת
  chosen: of understanding
  alternatives:
  - of discernment
  - of insight
  lexicon: HALOT
  rationale: Though formally plural, the noun expresses the quality or fullness of
    discernment. 'Of understanding' is idiomatic with 'a man of...' and matches the
    wisdom context.
- source_word: יַחֲרִישׁ
  chosen: keeps silent
  alternatives:
  - is silent
  - holds his peace
  lexicon: HALOT
  rationale: The Hiphil here means to be silent or keep quiet. 'Keeps silent' conveys
    deliberate restraint, which suits the proverb's contrast with contemptuous speech.
