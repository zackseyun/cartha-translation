id: PRO.11.25
reference: Proverbs 11:25
source:
  edition: WLC
  text: נֶֽפֶשׁ בְּרָכָ֥ה תְדֻשָּׁ֑ן וּ֝/מַרְוֶ֗ה גַּם ה֥וּא יוֹרֶֽא־־׃
translation:
  text: A generous person will be enriched, and whoever refreshes others will himself
    be refreshed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'A soul of blessing will be made fat.' The Hebrew uses imagery
      of abundance and flourishing.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'the one who waters will himself be watered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  lexicon: HALOT
  rationale: Although literally 'soul,' נֶפֶשׁ often denotes the person as a whole.
    In English, 'a generous soul' is possible but less natural and may sound archaic
    or overly spiritualized. 'Person' best conveys the idiomatic sense here in readable
    modern English.
- source_word: בְּרָכָה
  chosen: generous
  alternatives:
  - blessing
  - bountiful
  - blessed
  lexicon: HALOT
  rationale: The noun literally means 'blessing,' but in this construct-like expression
    נֶפֶשׁ בְּרָכָה it describes a person characterized by blessing others, hence
    'generous.' This captures the ethical sense in context better than the more wooden
    'soul of blessing.'
- source_word: תְדֻשָּׁן
  chosen: will be enriched
  alternatives:
  - will be made fat
  - will prosper
  - will be satisfied
  lexicon: HALOT
  rationale: From דשׁן in the Pual, the image is of being made fat/rich in the sense
    of abundance and flourishing. 'Will be enriched' preserves the metaphorical result
    in natural English without the misleading modern connotations of physical fatness.
- source_word: וּמַרְוֶה
  chosen: whoever refreshes others
  alternatives:
  - the one who waters
  - he who gives drink
  - the one who satisfies
  lexicon: HALOT
  rationale: The Hiphil participle of רוה literally suggests causing to drink or watering,
    used metaphorically here for giving refreshment or abundance to others. 'Refreshes
    others' communicates the figurative sense clearly; 'waters' is preserved as an
    alternative because it reflects the underlying imagery.
- source_word: יוֹרֶא
  chosen: will himself be refreshed
  alternatives:
  - will be watered
  - will be satisfied
  lexicon: HALOT
  rationale: 'This form is traditionally understood in parallel with the previous
    colon as a reciprocal image: the one who refreshes others will in turn be refreshed.
    ''Will be watered'' is more literal to the metaphor, but ''will himself be refreshed''
    gives the intended sense in idiomatic English while preserving the reciprocity
    with ''himself''.'
- source_word: גַּם הוּא
  chosen: will himself
  alternatives:
  - he also
  - even he
  lexicon: HALOT
  rationale: 'The phrase adds emphasis and reciprocity: the benefactor also receives
    benefit. ''Will himself'' expresses this naturally in English and keeps the stress
    on the subject''s corresponding return.'
