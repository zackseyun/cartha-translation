theological_decisions:
- issue: Anthropological gender in singular masculine forms
  chosen_reading: Retain singular masculine 'his way'
  alternative_readings:
  - their way
  rationale: The Hebrew uses singular masculine forms generically in a wisdom saying.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    English when the source is grammatically masculine and representative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
