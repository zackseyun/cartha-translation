id: PRO.11.5
reference: Proverbs 11:5
source:
  edition: WLC
  text: צִדְקַ֣ת תָּ֭מִים תְּיַשֵּׁ֣ר דַּרְכּ֑/וֹ וּ֝/בְ/רִשְׁעָת֗/וֹ יִפֹּ֥ל רָשָֽׁע׃
translation:
  text: The righteousness of the blameless makes his way straight, but by his wickedness
    the wicked falls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'directs his path' or 'smooths his way.' The Hebrew verb carries the
      image of making a path straight.
    reason: lexical_alternative
  - marker: b
    text: Or 'in his wickedness.' The phrase can denote either the sphere of the wicked
      man's conduct or the means by which he comes to ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקַת
  chosen: righteousness
  alternatives:
  - justice
  - integrity
  lexicon: HALOT
  rationale: Construct form of צְדָקָה here denotes the quality of being in the right
    / upright conduct. 'Righteousness' is the most direct and consistent rendering
    in wisdom literature; 'justice' is possible but less fitting in this individual
    moral context.
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - upright
  - whole
  - integrity
  lexicon: HALOT
  rationale: In Proverbs, תמים commonly describes moral wholeness or integrity rather
    than sinless perfection. 'Blameless' preserves the ethical sense without overstating
    absolute perfection.
- source_word: תְּיַשֵּׁר
  chosen: makes straight
  alternatives:
  - directs
  - smooths
  - levels
  lexicon: HALOT
  rationale: Piel of ישר means to make straight or level. In idiomatic English with
    'way,' 'makes his way straight' preserves the metaphor of a morally ordered path
    better than a more interpretive 'guides' or 'directs' alone.
- source_word: דַּרְכּוֹ
  chosen: his way
  alternatives:
  - his path
  - his course
  lexicon: HALOT
  rationale: '''Way'' is the standard wisdom-literature metaphor for one''s manner
    or course of life. It also pairs naturally with the straightness imagery of the
    verb.'
- source_word: וּבְרִשְׁעָתוֹ
  chosen: by his wickedness
  alternatives:
  - in his wickedness
  - through his wickedness
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or locatively. Here
    'by his wickedness' best conveys that the wicked man's own evil is the means of
    his downfall, matching the proverb's moral causality.
- source_word: יִפֹּל
  chosen: falls
  alternatives:
  - will fall
  - stumbles
  lexicon: HALOT
  rationale: The imperfect in proverbial discourse expresses a general truth. Present-tense
    English ('falls') communicates gnomic force naturally; 'will fall' is possible
    but sounds more predictive than proverbial.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - an evil person
  lexicon: HALOT
  rationale: The singular adjective used substantivally denotes the wicked person
    as a type. 'The wicked' is concise, idiomatic, and preserves the proverbial category.
