id: PRO.11.10
reference: Proverbs 11:10
source:
  edition: WLC
  text: בְּ/ט֣וּב צַ֭דִּיקִים תַּעֲלֹ֣ץ קִרְיָ֑ה וּ/בַ/אֲבֹ֖ד רְשָׁעִ֣ים רִנָּֽה׃
translation:
  text: When the righteous prosper, a city rejoices; and when the wicked perish, there
    is shouting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'When it goes well with the righteous, a city rejoices.' The Hebrew
      literally speaks of the 'good' or 'well-being' of the righteous.
    reason: lexical_alternative
  - marker: b
    text: Or, 'there is a cry of joy.' The Hebrew term can denote ringing or jubilant
      shouting.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטוּב
  chosen: When the righteous prosper
  alternatives:
  - In the good of the righteous
  - By the goodness of the righteous
  - When it goes well with the righteous
  lexicon: HALOT
  rationale: The preposition ב plus טוּב can denote circumstance or occasion ('in/at
    the good, well-being, prosperity of'). In this proverb, an idiomatic temporal
    rendering is best in English. 'Prosper' captures the sense of well-being or favorable
    condition more naturally than a wooden 'in the good of.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is concise, natural,
    and preserves the moral category central to Proverbs.
- source_word: תַּעֲלֹץ
  chosen: rejoices
  alternatives:
  - exults
  - is jubilant
  lexicon: HALOT
  rationale: The verb עלץ conveys exultant joy. 'Rejoices' is clear modern English
    and fits the personified subject 'city,' while avoiding overstatement.
- source_word: קִרְיָה
  chosen: a city
  alternatives:
  - the city
  - town
  lexicon: HALOT
  rationale: קִרְיָה refers to a city/town. The anarthrous Hebrew is well represented
    by the generic English singular 'a city,' expressing a proverbial general truth
    rather than a specific city.
- source_word: וּבַאֲבֹד
  chosen: and when ... perish
  alternatives:
  - and at the perishing of
  - and when ... are destroyed
  lexicon: HALOT
  rationale: The conjunction plus preposition with the infinitive construct of אבד
    introduces a parallel circumstance to the first colon. 'When ... perish' gives
    idiomatic English and preserves the temporal sense.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  - the guilty
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The wicked' is the standard concise
    rendering and matches the moral contrast with 'the righteous.'
- source_word: רִנָּה
  chosen: there is shouting
  alternatives:
  - there is joyful shouting
  - there is a cry of joy
  - there is singing
  lexicon: HALOT
  rationale: רִנָּה often denotes a ringing cry, frequently joyful. Here the context
    favors public acclamation at the removal of the wicked. 'There is shouting' preserves
    the terseness of the Hebrew and leaves the exact nuance broad enough to include
    jubilant outcry.
