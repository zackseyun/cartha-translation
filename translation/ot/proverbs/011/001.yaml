id: PRO.11.1
reference: Proverbs 11:1
source:
  edition: WLC
  text: מֹאזְנֵ֣י מִ֭רְמָה תּוֹעֲבַ֣ת יְהוָ֑ה וְ/אֶ֖בֶן שְׁלֵמָ֣ה רְצוֹנֽ/וֹ׃
translation:
  text: Dishonest scales are an abomination to Yahweh, but a full weight is his delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a complete stone.' That is, a full and accurate standard weight used in trade.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹאזְנֵי
  chosen: scales
  alternatives:
  - balances
  lexicon: HALOT
  rationale: The dual/plural construct from מאזנים refers to weighing scales or balances. 'Scales' is the more natural modern English term while preserving the commercial/legal imagery.
- source_word: מִרְמָה
  chosen: dishonest
  alternatives:
  - deceit
  - fraudulent
  lexicon: HALOT
  rationale: The noun denotes deceit or fraud. Rendered adjectivally with 'scales' in English ('dishonest scales') for idiomatic clarity while retaining the sense of deceptive measurement.
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable thing
  lexicon: HALOT
  rationale: A strong covenantal-moral term for something detestable to God. 'An abomination' preserves the severity and established biblical force better than a softer paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶבֶן
  chosen: weight
  alternatives:
  - stone
  - stone weight
  lexicon: HALOT
  rationale: Literally 'stone,' but in commercial context it refers to a standard stone weight used on scales. 'Weight' communicates the intended referent in clear modern English.
- source_word: שְׁלֵמָה
  chosen: full
  alternatives:
  - whole
  - complete
  - accurate
  lexicon: HALOT
  rationale: The adjective means complete/whole. With 'weight' it conveys a full, unimpaired, honest standard measure, contrasting with deceptive scales.
- source_word: רְצוֹנוֹ
  chosen: his delight
  alternatives:
  - his favor
  - his good pleasure
  lexicon: HALOT
  rationale: The noun denotes favor, pleasure, or delight. 'His delight' gives a natural antithetical parallel to 'abomination' and reflects the personal evaluative sense.
