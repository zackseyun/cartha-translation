id: PRO.11.27
reference: Proverbs 11:27
source:
  edition: WLC
  text: שֹׁ֣חֵֽר ט֭וֹב יְבַקֵּ֣שׁ רָצ֑וֹן וְ/דֹרֵ֖שׁ רָעָ֣ה תְבוֹאֶֽ/נּוּ׃
translation:
  text: Whoever diligently seeks good seeks favor, but evil comes to the one who searches
    for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seeks early for good'; the Hebrew verb can carry the sense of earnest
      or early seeking.
    reason: lexical_alternative
  - marker: b
    text: '''Favor'' may refer broadly to acceptance or goodwill, whether from God,
      from people, or both.'
    reason: lexical_alternative
  - marker: c
    text: Or 'evil will come upon him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחֵר
  chosen: diligently seeks
  alternatives:
  - seeks early
  - pursues earnestly
  - is diligent in seeking
  lexicon: HALOT
  rationale: The participle denotes earnest, eager, or diligent seeking, not merely
    a neutral 'seek.' 'Diligently seeks' captures the intensive nuance in idiomatic
    modern English better than the more literal but potentially misleading 'seeks
    early.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  - goodness
  lexicon: HALOT
  rationale: 'The adjective functions substantivally here: the object sought is ''good''
    or ''what is good.'' ''Good'' is concise and natural in English while preserving
    the broad moral/practical sense.'
- source_word: יְבַקֵּשׁ
  chosen: seeks
  alternatives:
  - looks for
  - pursues
  lexicon: HALOT
  rationale: A common verb for seeking. Rendered 'seeks' to preserve the lexical parallel
    with the first colon while keeping readable English.
- source_word: רָצוֹן
  chosen: favor
  alternatives:
  - acceptance
  - goodwill
  lexicon: HALOT
  rationale: In wisdom literature this noun commonly denotes favor or acceptance from
    others, and by implication possibly from God. 'Favor' is the most natural concise
    rendering and preserves the proverb's broad applicability without over-specifying
    the source of the favor.
- source_word: וְדֹרֵשׁ
  chosen: but the one who searches for
  alternatives:
  - and whoever seeks
  - but whoever pursues
  - but the seeker of
  lexicon: HALOT
  rationale: Though formally 'and,' the conjunction marks antithetical parallelism
    in this proverb, so 'but' best reflects the sense in English. דָּרַשׁ here means
    to seek or pursue. 'The one who searches for' makes explicit the implied subject
    in smooth English.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - harm
  - trouble
  - calamity
  lexicon: HALOT
  rationale: The noun can denote moral evil or harmful trouble. In this antithetical
    wisdom context, 'evil' preserves the moral dimension of seeking what is wrong,
    while the consequence clause allows the sense that harmful evil returns upon the
    seeker.
- source_word: תְבוֹאֶנּוּ
  chosen: evil comes to the one who searches for it
  alternatives:
  - it will come upon him
  - it comes upon him
  - she/it will come to him
  lexicon: HALOT
  rationale: 'The verb means ''will come'' or ''comes,'' with a 3ms suffix ''to him.''
    English idiom prefers an explicit subject, supplied from the previous noun: the
    evil sought comes upon the seeker. Present tense is common in proverbs, but present
    ''comes'' here communicates proverbial certainty naturally.'
