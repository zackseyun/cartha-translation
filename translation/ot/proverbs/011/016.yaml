id: PRO.11.16
reference: Proverbs 11:16
source:
  edition: WLC
  text: אֵֽשֶׁת חֵ֭ן תִּתְמֹ֣ךְ כָּב֑וֹד וְ֝/עָרִיצִ֗ים יִתְמְכוּ עֹֽשֶׁר־־׃
translation:
  text: A gracious woman obtains honor, and ruthless men obtain wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A woman of grace holds fast to honor ... and ruthless men hold fast
      to wealth.' The Hebrew verb in both clauses literally means 'to hold/support,'
      but here likely carries the sense of securing or obtaining.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשֶׁת חֵן
  chosen: a gracious woman
  alternatives:
  - a woman of grace
  - a charming woman
  lexicon: HALOT
  rationale: Construct phrase literally 'woman of favor/grace.' In Proverbs, חֵן commonly
    carries the sense of grace, favor, or graciousness rather than mere superficial
    charm. 'A gracious woman' is natural English and preserves the moral quality implied.
- source_word: תִּתְמֹךְ
  chosen: obtains
  alternatives:
  - holds fast to
  - retains
  - supports
  lexicon: HALOT
  rationale: The verb תמך basically means 'grasp, hold, support.' In this proverb's
    parallelism, the sense is that the subject lays hold of or secures something.
    'Obtains' communicates the result idiomatically in English while fitting both
    cola.
- source_word: כָּבוֹד
  chosen: honor
  alternatives:
  - glory
  - esteem
  lexicon: HALOT
  rationale: In wisdom literature כבוד often denotes social honor or esteem rather
    than visible glory. 'Honor' best fits the proverb's contrast with wealth.
- source_word: עָרִיצִים
  chosen: ruthless men
  alternatives:
  - violent men
  - tyrants
  lexicon: HALOT
  rationale: The noun refers to the ruthless, violent, or oppressive. 'Ruthless men'
    is broad enough to include forceful oppression without over-specifying political
    tyranny.
- source_word: יִתְמְכוּ
  chosen: obtain
  alternatives:
  - hold fast to
  - retain
  - grasp
  lexicon: HALOT
  rationale: Same verb as earlier in the verse. Here too the sense is securing or
    gaining possession. Using 'obtain' preserves the parallel with the first colon
    in readable English.
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: Standard rendering for material abundance; 'wealth' is clear modern English
    and pairs well with 'honor' in the contrast.
