id: PRO.11.24
reference: Proverbs 11:24
source:
  edition: WLC
  text: יֵ֣שׁ מְ֭פַזֵּר וְ/נוֹסָ֥ף ע֑וֹד וְ/חוֹשֵׂ֥ךְ מִ֝/יֹּ֗שֶׁר אַךְ לְ/מַחְסֽוֹר־׃
translation:
  text: There is one who scatters, yet gains still more; and one who withholds what
    is right, but only to poverty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and one who withholds more than is right.' The Hebrew phrase מִיֹּשֶׁר
      is difficult; it may mean withholding beyond what is proper, or withholding
      what fairness requires.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  chosen: There is one who
  alternatives:
  - One person
  - There is
  lexicon: HALOT
  rationale: Introduces a general case or type rather than a specific individual.
    English idiom requires supplying 'one who' to connect with the following participles.
- source_word: מְפַזֵּר
  chosen: scatters
  alternatives:
  - disperses
  - gives freely
  lexicon: HALOT
  rationale: The participle literally denotes scattering. In this proverb's generosity
    context it implies openhanded giving, but 'scatters' preserves the metaphor and
    avoids over-paraphrasing.
- source_word: וְנוֹסָף עוֹד
  chosen: yet gains still more
  alternatives:
  - and increases yet more
  - and has even more added
  lexicon: HALOT
  rationale: נוסף conveys increase/addition. 'Gains still more' is natural English
    and captures the paradox that generous distribution results in increase.
- source_word: וְחוֹשֵׂךְ
  chosen: and one who withholds
  alternatives:
  - and one who keeps back
  - and one who spares
  lexicon: HALOT
  rationale: The verb means to withhold or hold back. 'Withholds' fits the antithetical
    parallel with generous scattering.
- source_word: מִיֹּשֶׁר
  chosen: what is right
  alternatives:
  - more than is right
  - from uprightness
  - from what is fitting
  lexicon: HALOT
  rationale: The phrase is difficult. The noun יֹשֶׁר commonly denotes uprightness,
    straightness, or what is right/fitting. In context, the sense is withholding beyond
    propriety or withholding what fairness requires. 'What is right' preserves the
    ethical force without importing an excessive amount not explicit in the Hebrew.
- source_word: אַךְ
  chosen: but only
  alternatives:
  - surely
  - only
  - indeed
  lexicon: HALOT
  rationale: אַךְ marks limitation or emphatic result. 'But only' brings out the ironic
    outcome in the second line.
- source_word: לְמַחְסוֹר
  chosen: to poverty
  alternatives:
  - to want
  - to lack
  - to need
  lexicon: HALOT
  rationale: The noun denotes lack or deficiency. 'Poverty' expresses the proverb's
    economic and practical sense clearly in English.
