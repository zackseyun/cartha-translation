theological_decisions:
- issue: Rendering of צְדָקָה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  - what is right
  rationale: Although Proverbs can use the term in an ethical-social sense overlapping
    with justice, the default project rendering is 'righteousness' unless context
    strongly demands otherwise. Here the agricultural metaphor and moral contrast
    support retaining the broader theological-ethical term.
