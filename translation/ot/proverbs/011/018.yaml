id: PRO.11.18
reference: Proverbs 11:18
source:
  edition: WLC
  text: רָשָׁ֗ע עֹשֶׂ֥ה פְעֻלַּת שָׁ֑קֶר וְ/זֹרֵ֥עַ צְ֝דָקָ֗ה שֶׂ֣כֶר אֱמֶֽת־׃
translation:
  text: A wicked man earns deceptive wages, but one who sows righteousness receives
    a true reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does a work of falsehood'; the Hebrew expression may emphasize either
      deceitful gain or labor that proves empty.
    reason: lexical_alternative
  - marker: b
    text: Or 'sure wages' or 'reliable reward'; literally 'wages/reward of truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked
  - a wicked person
  lexicon: HALOT
  rationale: Singular masculine noun used generically/proverbially. Rendered with
    gender-accurate 'man' per project philosophy, while preserving the representative
    sense of the proverb.
- source_word: עֹשֶׂה פְעֻלַּת שָׁקֶר
  chosen: earns deceptive wages
  alternatives:
  - does a work of falsehood
  - produces deceitful gain
  - works for a deceptive wage
  lexicon: HALOT
  rationale: The Hebrew literally combines 'does/makes' with 'work/deed of falsehood.'
    In context, the phrase points to the outcome or payoff of wicked labor rather
    than merely the act itself. 'Earns deceptive wages' captures the idiomatic sense
    in readable English while retaining the irony that the apparent payoff is false
    or unreliable.
- source_word: שָׁקֶר
  chosen: deceptive
  alternatives:
  - 'false'
  - fraudulent
  - vain
  lexicon: HALOT
  rationale: 'שָׁקֶר often denotes falsehood, deception, or unreliability. ''Deceptive''
    fits the proverb''s contrast: the wicked person''s gain appears real but proves
    false.'
- source_word: וְזֹרֵעַ
  chosen: but one who sows
  alternatives:
  - and one who sows
  - but the one sowing
  lexicon: HALOT
  rationale: The conjunction can be simple 'and,' but in this antithetical proverb
    the contrastive sense is natural in English. 'One who sows' avoids unnecessary
    repetition of 'man' while preserving the singular proverbial subject.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: Default rendering is 'righteousness.' In Proverbs the term can overlap
    with justice/right conduct, but 'righteousness' best preserves the moral-theological
    dimension and aligns with project consistency.
- source_word: שֶׂכֶר אֱמֶת
  chosen: a true reward
  alternatives:
  - sure wages
  - a reliable reward
  - faithful wages
  lexicon: HALOT
  rationale: Construct phrase literally 'wages/reward of truth.' In idiomatic English
    this denotes reward that is genuine, dependable, and not illusory. 'True reward'
    preserves the contrast with 'deceptive wages' and reads naturally.
