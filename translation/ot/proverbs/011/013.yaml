id: PRO.11.13
reference: Proverbs 11:13
source:
  edition: WLC
  text: הוֹלֵ֣ךְ רָ֭כִיל מְגַלֶּה סּ֑וֹד וְ/נֶאֱמַן ר֝֗וּחַ מְכַסֶּ֥ה דָבָֽר־־׃
translation:
  text: A gossip reveals a secret, but one who is faithful in spirit conceals a matter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'One who goes about as a talebearer reveals a secret.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'faithful of spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ רָכִיל
  chosen: A gossip
  alternatives:
  - One who goes about as a slanderer
  - A talebearer
  - A whisperer
  lexicon: HALOT
  rationale: The idiom literally means 'one walking as a רכיל.' In context it describes
    a habitual carrier of damaging talk. 'A gossip' is natural modern English and
    captures the proverb's characterization without woodenly preserving 'walking.'
    'Slanderer' is possible, but the parallel with revealing secrets points more broadly
    to gossiping/tale-bearing than strictly false accusation.
- source_word: מְגַלֶּה
  chosen: reveals
  alternatives:
  - uncovers
  - discloses
  lexicon: HALOT
  rationale: The participle denotes making something known or uncovered. 'Reveals'
    is idiomatic and fits the object 'secret' well.
- source_word: סּוֹד
  chosen: a secret
  alternatives:
  - confidential matter
  - counsel
  lexicon: HALOT
  rationale: Here the sense is private/confidential information. While סוד can denote
    intimate counsel or council, the proverb contrasts exposing private information
    with covering a matter, so 'secret' is the clearest rendering.
- source_word: נֶאֱמַן רוּחַ
  chosen: one who is faithful in spirit
  alternatives:
  - a trustworthy person
  - faithful of spirit
  - reliable in spirit
  lexicon: HALOT
  rationale: Literally 'faithful of spirit.' The phrase describes inward reliability/discretion.
    'One who is faithful in spirit' preserves the anthropological language of רוח
    while remaining readable. 'Trustworthy person' is smoother but loses the explicit
    'spirit' wording.
- source_word: מְכַסֶּה
  chosen: conceals
  alternatives:
  - covers
  - keeps hidden
  lexicon: HALOT
  rationale: '''Conceals'' communicates the figurative sense of covering over information.
    ''Covers'' is more literal, but in English can sound opaque without explanation.'
- source_word: דָבָר
  chosen: a matter
  alternatives:
  - a thing
  - an affair
  - a word
  lexicon: HALOT
  rationale: דבר is broad, but in wisdom literature and in this parallelism it refers
    to a matter/issue/information. 'A matter' is idiomatic and suitably general.
