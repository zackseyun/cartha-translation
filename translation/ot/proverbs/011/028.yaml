id: PRO.11.28
reference: Proverbs 11:28
source:
  edition: WLC
  text: בּוֹטֵ֣חַ בְּ֭/עָשְׁר/וֹ ה֣וּא יִפֹּ֑ל וְ֝/כֶ/עָלֶ֗ה צַדִּיקִ֥ים יִפְרָֽחוּ׃
translation:
  text: Whoever trusts in his wealth will fall, but the righteous will flourish like
    foliage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'like a leaf.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹטֵחַ
  chosen: trusts
  alternatives:
  - is confident
  - relies
  lexicon: HALOT
  rationale: The participle from בטח denotes placing confidence or trust in something.
    'Trusts' is the most natural English rendering and preserves the proverb's moral
    force better than the slightly weaker 'relies.'
- source_word: בְּעָשְׁרוֹ
  chosen: in his wealth
  alternatives:
  - in his riches
  - in his abundance
  lexicon: HALOT
  rationale: עֹשֶׁר refers to wealth/riches. 'Wealth' is idiomatic modern English
    and fits the warning against misplaced security.
- source_word: הוּא
  chosen: (implicit in English)
  alternatives:
  - he
  rationale: The independent pronoun adds emphasis in Hebrew ('he will fall'), but
    English does not require an explicit pronoun here. The emphasis is adequately
    conveyed by the clause structure.
- source_word: יִפֹּל
  chosen: will fall
  alternatives:
  - falls
  - will collapse
  lexicon: HALOT
  rationale: The imperfect in proverbial discourse commonly expresses a general future/result.
    'Will fall' captures the consequence of trusting wealth without overinterpreting
    the nature of the downfall.
- source_word: וְכֶעָלֶה
  chosen: like foliage
  alternatives:
  - like a leaf
  - like leaves
  lexicon: HALOT
  rationale: עָלֶה is singular 'leaf,' but with the prefixed כ in a simile and in
    parallel with the plural righteous, the image is collective/representative. 'Like
    foliage' communicates the flourishing, verdant image naturally in English while
    preserving the botanical metaphor. The more literal 'like a leaf' is preserved
    in a footnote.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: The masculine plural adjective functions substantivally. 'The righteous'
    is concise, idiomatic, and preserves the representative plural without unnecessary
    expansion.
- source_word: יִפְרָחוּ
  chosen: will flourish
  alternatives:
  - will blossom
  - will sprout
  lexicon: HALOT
  rationale: פרח commonly denotes blossoming or flourishing. 'Will flourish' best
    matches the proverb's figurative contrast with falling and works smoothly with
    the plant imagery.
