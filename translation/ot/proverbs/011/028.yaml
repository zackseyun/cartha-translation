theological_decisions:
- issue: Gender representation in the opening participial construction
  chosen_reading: Whoever trusts in his wealth
  alternative_readings:
  - He who trusts in his wealth
  - One who trusts in wealth
  rationale: The Hebrew is grammatically masculine singular but generic in proverbial
    style. 'Whoever' preserves the generic force in natural English, while retaining
    'his' to reflect the masculine singular orientation in line with the project's
    gender-accurate policy.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nature of the simile with עָלֶה
  chosen_reading: like foliage
  alternative_readings:
  - like a leaf
  rationale: The Hebrew noun is singular, but the proverb's imagery is not focused
    on numerical singularity; it evokes verdant growth in contrast to collapse. 'Like
    foliage' is an optimal-equivalence rendering that preserves the image's force
    in modern English, while the more formal alternative is preserved in a footnote
    for auditability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
