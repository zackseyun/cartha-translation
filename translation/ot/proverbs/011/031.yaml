id: PRO.11.31
reference: Proverbs 11:31
source:
  edition: WLC
  text: הֵ֣ן צַ֭דִּיק בָּ/אָ֣רֶץ יְשֻׁלָּ֑ם אַ֝֗ף כִּֽי רָשָׁ֥ע וְ/חוֹטֵֽא־׃
translation:
  text: Look, if the righteous is repaid on earth, how much more the wicked and the
    sinner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Indeed, the righteous is recompensed in the land'; the Hebrew can also
      be rendered more formally as 'Behold, the righteous will be repaid in the land/earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: Introduces an emphatic assertion or attention-getter. 'Look' preserves
    the force in readable modern English better than the more archaic 'Behold,' while
    'Indeed' is possible but less vivid.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the righteous person
  lexicon: HALOT
  rationale: The singular masculine adjective functions substantivally. 'The righteous'
    preserves the representative singular without over-specifying gender in English,
    while remaining close to the Hebrew.
- source_word: בָּאָרֶץ
  chosen: on earth
  alternatives:
  - in the land
  - in the earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth,' 'land,' or 'country.' In this proverb's general
    moral principle, the broader sense 'earth' best fits the contrast with divine
    recompense occurring within this life. 'On earth' is idiomatic English.
- source_word: יְשֻׁלָּם
  chosen: is repaid
  alternatives:
  - is recompensed
  - is rewarded
  - is requited
  lexicon: HALOT
  rationale: Pual of שלם here denotes receiving due repayment or recompense. 'Is repaid'
    is broad enough to include recompense without implying only positive reward; this
    suits the proverb's logic that even the righteous receive due consequences in
    this life.
- source_word: אַף כִּי
  chosen: how much more
  alternatives:
  - much more
  - even more so
  - surely then
  lexicon: HALOT
  rationale: 'The combination introduces an a fortiori argument: if this is true in
    the lesser case, then all the more in the greater. ''How much more'' makes that
    logic explicit and natural in English.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for the substantival adjective in wisdom literature.
    'The wicked' is concise and idiomatic.
- source_word: וְחוֹטֵא
  chosen: the sinner
  alternatives:
  - the one who sins
  - the sinful one
  lexicon: HALOT
  rationale: חוֹטֵא as a participle/substantive denotes one characterized by sinning.
    'The sinner' is the most natural English equivalent and preserves the pairing
    with 'the wicked'.
