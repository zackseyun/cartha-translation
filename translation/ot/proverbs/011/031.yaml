theological_decisions:
- issue: Nature of the righteous person's recompense
  chosen_reading: The verse states that even the righteous receives due repayment
    on earth, without specifying whether that repayment is positive reward, disciplinary
    suffering, or both.
  alternative_readings:
  - The righteous is rewarded on earth
  - The righteous is punished on earth
  rationale: The Hebrew verb permits the broader idea of recompense/repayment. Narrowing
    it to only reward or only punishment would over-interpret the proverb. The a fortiori
    structure is preserved by the neutral 'repaid.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
