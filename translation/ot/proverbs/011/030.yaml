theological_decisions:
- issue: Meaning of 'wins souls' in wisdom context
  chosen_reading: Rendered as 'he who wins souls' as an idiom for gaining or influencing
    people, not as an explicit statement about evangelistic conversion.
  alternative_readings:
  - he who captures lives
  - he who saves souls
  rationale: The Hebrew idiom does not by itself specify later Christian evangelistic
    categories. The translation preserves the familiar wording 'wins souls' because
    it is lexically defensible and idiomatic in English, while documentation clarifies
    that the proverb speaks more broadly of wise influence over persons.
  doctrine_reference: Translation philosophy §1, §3
