id: PRO.11.30
reference: Proverbs 11:30
source:
  edition: WLC
  text: פְּֽרִי צַ֭דִּיק עֵ֣ץ חַיִּ֑ים וְ/לֹקֵ֖חַ נְפָשׂ֣וֹת חָכָֽם־׃
translation:
  text: The fruit of the righteous is a tree of life, and he who wins souls is wise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he who takes persons/lives is wise.' The Hebrew literally uses 'takes'
      with 'souls,' an idiom that can mean winning people over or gaining influence
      with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרִי
  chosen: fruit
  alternatives:
  - produce
  - result
  lexicon: HALOT
  rationale: The noun commonly denotes fruit or produce. 'Fruit' preserves the metaphor
    and allows both literal and figurative resonance in wisdom literature.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - a righteous man
  - the just
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'The righteous' is natural English
    and preserves the representative/generic force without over-specifying an individual
    male referent, while still reflecting the Hebrew singular class usage.
- source_word: עֵץ חַיִּים
  chosen: a tree of life
  alternatives:
  - the tree of life
  - a life-giving tree
  lexicon: HALOT
  rationale: This is a stock wisdom expression in Proverbs. 'A tree of life' preserves
    the idiom and its intertextual resonance with earlier uses in Proverbs and Genesis
    better than a paraphrase such as 'life-giving tree.'
- source_word: וְלֹקֵחַ
  chosen: he who wins
  alternatives:
  - and one who takes
  - and he who captures
  lexicon: HALOT
  rationale: The participle of לקח literally means 'taking,' but in this collocation
    with 'souls' a wooden rendering would mislead modern readers. 'Wins' best captures
    the idiomatic sense of gaining people over, while preserving the active force
    of the participle.
- source_word: נְפָשׂוֹת
  chosen: souls
  alternatives:
  - lives
  - persons
  - people
  lexicon: HALOT
  rationale: נפשׁ can denote soul, life, self, or person depending on context. Here
    'souls' preserves the traditional and metaphorical force of the proverb, though
    the sense includes persons/lives rather than immaterial souls in a narrowly anthropological
    sense.
- source_word: חָכָם
  chosen: is wise
  alternatives:
  - is a wise man
  - is skillful
  lexicon: HALOT
  rationale: The adjective is predicative here. 'Is wise' is concise, idiomatic, and
    avoids unnecessary gendered expansion while preserving the proverb's evaluative
    conclusion.
