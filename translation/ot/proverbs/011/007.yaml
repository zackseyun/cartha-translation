id: PRO.11.7
reference: Proverbs 11:7
source:
  edition: WLC
  text: בְּ/מ֤וֹת אָדָ֣ם רָ֭שָׁע תֹּאבַ֣ד תִּקְוָ֑ה וְ/תוֹחֶ֖לֶת אוֹנִ֣ים אָבָֽדָה׃
translation:
  text: When a wicked man dies, his hope perishes, and the expectation of strength
    comes to nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the expectation of the strong perishes.' The Hebrew אוֹנִים is difficult
      and may refer either to strength/power or to strong ones.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּמוֹת
  chosen: When ... dies
  alternatives:
  - At the death of
  - In the dying of
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of מות introduces a temporal
    clause. English reads most naturally as 'when ... dies' while preserving the temporal
    sense.
- source_word: אָדָם
  chosen: man
  alternatives:
  - person
  - humankind
  lexicon: HALOT
  rationale: Here אָדָם refers to an individual male-generic figure in wisdom style,
    not humanity in general. Per doctrine, gender-accurate rendering is preferred,
    so 'man' is retained.
- source_word: רָשָׁע
  chosen: wicked
  alternatives:
  - guilty
  - evil
  lexicon: HALOT
  rationale: In Proverbs רָשָׁע commonly denotes the morally wicked person in contrast
    to the righteous. 'Wicked' is the most idiomatic and contextually established
    gloss.
- source_word: תֹּאבַד
  chosen: perishes
  alternatives:
  - is lost
  - vanishes
  lexicon: HALOT
  rationale: From אבד, indicating destruction or disappearance. 'Perishes' fits proverbial
    style and matches the moral seriousness of the contrast.
- source_word: תִּקְוָה
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: תקוה is straightforwardly 'hope.' It is the object that ceases at the
    wicked man's death.
- source_word: וְתוֹחֶלֶת
  chosen: and the expectation
  alternatives:
  - and the hope
  lexicon: HALOT
  rationale: תוחלת overlaps semantically with תקוה but is distinct enough to preserve
    with a near-synonym. 'Expectation' avoids flattening the parallelism into exact
    repetition.
- source_word: אוֹנִים
  chosen: of strength
  alternatives:
  - of the strong
  - of vigor
  - of wealth
  lexicon: HALOT
  rationale: 'The noun is difficult. The consonantal form most naturally relates to
    און/אֹון in the sense of strength or vigor. Rendering it abstractly as ''strength''
    yields coherent sense: what is expected from one''s power comes to nothing. ''Wealth''
    is less likely here, and ''the strong'' would require taking the form as a personal
    plural, which is possible but less clear in context.'
- source_word: אָבָדָה
  chosen: comes to nothing
  alternatives:
  - perishes
  - has perished
  lexicon: HALOT
  rationale: Also from אבד. To avoid awkward repetition with the first colon while
    preserving the same semantic field, 'comes to nothing' expresses the collapse
    of expectation in idiomatic English.
