theological_decisions:
- issue: Gender rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - person
  rationale: The proverb speaks of a representative individual rather than humanity
    collectively. Following the doctrine's gender-accurate principle, 'man' best matches
    the source intent without unnecessary neutralization.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of אוֹנִים
  chosen_reading: strength
  alternative_readings:
  - the strong
  - wealth
  rationale: The Hebrew term is lexically difficult and has been rendered variously
    in English tradition. 'Strength' best preserves the likely sense of power/vigor
    without overinterpreting. Because the alternative 'the strong' is viable and reflected
    in some translations, it is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
