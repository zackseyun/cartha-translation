id: PRO.11.9
reference: Proverbs 11:9
source:
  edition: WLC
  text: בְּ/פֶ֗ה חָ֭נֵף יַשְׁחִ֣ת רֵעֵ֑/הוּ וּ֝/בְ/דַ֗עַת צַדִּיקִ֥ים יֵחָלֵֽצוּ׃
translation:
  text: With his mouth the godless man destroys his neighbor, but by knowledge the
    righteous are delivered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the hypocrite destroys his neighbor with his mouth.' The Hebrew word
      can denote a hypocritical, impious, or godless person.
    reason: lexical_alternative
  - marker: b
    text: Or 'the righteous escape by knowledge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפֶה
  chosen: With his mouth
  alternatives:
  - By his mouth
  - Through his mouth
  lexicon: HALOT
  rationale: The preposition ב with 'mouth' is instrumental here, indicating means.
    'With his mouth' is idiomatic modern English and preserves the concrete imagery
    of speech as the instrument of harm.
- source_word: חָנֵף
  chosen: the godless man
  alternatives:
  - the hypocrite
  - the profane man
  - the impious man
  lexicon: HALOT
  rationale: חָנֵף can denote one who is irreligious, impious, or hypocritical. In
    Proverbs, the emphasis is moral-spiritual corruption rather than merely insincere
    outward behavior, so 'godless man' best captures the broader sense. 'Man' preserves
    the masculine singular form in line with the gender-accurate policy.
- source_word: יַשְׁחִת
  chosen: destroys
  alternatives:
  - ruins
  - corrupts
  - brings to ruin
  lexicon: HALOT
  rationale: The Hiphil of שׁחת commonly means 'destroy' or 'ruin.' 'Destroys' is
    concise, strong, and fits the proverb's warning about the destructive power of
    speech.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. 'Neighbor' is broad and
    morally weighty in biblical English, fitting wisdom literature's social-ethical
    context without implying close friendship.
- source_word: וּבְדַעַת
  chosen: but by knowledge
  alternatives:
  - but through knowledge
  - but by understanding
  lexicon: HALOT
  rationale: The conjunction marks contrast with the first colon, and ב again indicates
    means. דַּעַת is 'knowledge,' a key wisdom term in Proverbs; retaining 'knowledge'
    preserves that thematic vocabulary better than 'understanding' here.
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  - the just
  lexicon: HALOT
  rationale: The plural adjective functions substantivally. 'The righteous' is the
    standard concise rendering and preserves the ethical category central to Proverbs.
- source_word: יֵחָלֵצוּ
  chosen: are delivered
  alternatives:
  - escape
  - are rescued
  - are set free
  lexicon: HALOT
  rationale: The Niphal of חלץ here conveys being delivered or rescued. 'Are delivered'
    fits the passive/reflexive nuance and leaves open whether the deliverance is from
    the godless person's destructive speech or from danger more generally.
