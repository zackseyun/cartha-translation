theological_decisions:
- issue: Sense of חָנֵף in wisdom context
  chosen_reading: Rendered as 'the godless man' rather than 'the hypocrite.'
  alternative_readings:
  - the hypocrite
  - the impious man
  rationale: The Hebrew term can include hypocrisy, but the proverb contrasts a morally
    corrupt person with 'the righteous' and focuses on destructive speech. 'Godless'
    better captures the broader ethical-religious category without narrowing the verse
    to mere insincerity.
  doctrine_reference: Translation philosophy §1, §4, §5
- issue: Subject/object relation in the second colon
  chosen_reading: '''the righteous are delivered'' as a general class statement'
  alternative_readings:
  - '''people are delivered by the knowledge of the righteous'''
  rationale: The Hebrew syntax most naturally takes צַדִּיקִים as the subject of יֵחָלֵצוּ.
    While some English renderings construe the phrase more instrumentally for others'
    benefit, the plain sense is that the righteous themselves are delivered by knowledge.
  doctrine_reference: Translation philosophy §1, §3
