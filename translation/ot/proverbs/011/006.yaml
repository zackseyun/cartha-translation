id: PRO.11.6
reference: Proverbs 11:6
source:
  edition: WLC
  text: צִדְקַ֣ת יְ֭שָׁרִים תַּצִּילֵ֑/ם וּ֝/בְ/הַוַּ֗ת בֹּגְדִ֥ים יִלָּכֵֽדוּ׃
translation:
  text: The righteousness of the upright rescues them, but the treacherous are caught
    by their craving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but the treacherous are caught in their ruin' or 'by their destruction.'
      The Hebrew noun can denote either destructive desire/craving or calamity/ruin;
      the main text takes it as the inner craving that ensnares them.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקַת
  chosen: righteousness
  alternatives:
  - justice
  - integrity
  lexicon: HALOT
  rationale: Construct form of צְדָקָה here denotes the quality or practice of being
    in the right; 'righteousness' best matches the moral sense in Proverbs and aligns
    with the project's default for cognate terms. 'Justice' is possible but less natural
    in this individual-ethical context; 'integrity' overlaps semantically but is narrower.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  lexicon: HALOT
  rationale: Refers to morally straight/upright people. 'The upright' is idiomatic
    English and preserves the wisdom-literature ethical category.
- source_word: תַּצִּילֵם
  chosen: rescues them
  alternatives:
  - delivers them
  - saves them
  lexicon: HALOT
  rationale: Hiphil of נצל means to snatch away, deliver, rescue. 'Rescues' is vivid
    and natural modern English; 'delivers' is traditional but slightly less immediate;
    'saves' could sound overly theological in this proverb's practical moral setting.
- source_word: וּבְהַוַּת
  chosen: by their craving
  alternatives:
  - by their desire
  - in their ruin
  - by their destruction
  lexicon: HALOT
  rationale: The noun הַוָּה can denote desire/craving and in some contexts disaster/ruin.
    In parallel with 'the treacherous' and the passive 'are caught,' the sense of
    being ensnared by their own destructive desire fits well. The prefixed ב is instrumental
    here, hence 'by.' Because the noun is semantically difficult, alternatives are
    preserved in a footnote.
- source_word: בֹּגְדִים
  chosen: the treacherous
  alternatives:
  - the unfaithful
  - traitors
  lexicon: HALOT
  rationale: From בגד, those who act treacherously or faithlessly. 'The treacherous'
    captures the character type in Proverbs without narrowing it to covenantal apostasy
    alone ('unfaithful') or political betrayal alone ('traitors').
- source_word: יִלָּכֵדוּ
  chosen: are caught
  alternatives:
  - are trapped
  - are captured
  lexicon: HALOT
  rationale: Niphal of לכד conveys being seized or trapped. 'Are caught' is concise
    and idiomatic, fitting the proverb's antithetical parallelism.
