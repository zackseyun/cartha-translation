id: PRO.11.3
reference: Proverbs 11:3
source:
  edition: WLC
  text: תֻּמַּ֣ת יְשָׁרִ֣ים תַּנְחֵ֑/ם וְ/סֶ֖לֶף בּוֹגְדִ֣ים ו/שד/ם׃
translation:
  text: The integrity of the upright guides them, but the crookedness of the treacherous
    destroys them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perversity' instead of 'crookedness' for סֶלֶף; the Hebrew image is
      of moral twisting set against the 'upright.'
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be rendered 'the perversity of the treacherous
      ruins them' or more literally 'is their destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֻּמַּת
  chosen: integrity
  alternatives:
  - blamelessness
  - innocence
  lexicon: HALOT
  rationale: The noun from תם denotes completeness or moral integrity in wisdom literature.
    'Integrity' fits the ethical sense in Proverbs and reads naturally in modern English
    without overstating sinlessness, which 'blamelessness' might suggest.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the straight
  - the honest
  lexicon: HALOT
  rationale: יָשָׁר commonly refers to those who are morally straight or upright.
    'The upright' is idiomatic in English wisdom style and preserves the ethical contrast
    with the treacherous.
- source_word: תַּנְחֵם
  chosen: guides them
  alternatives:
  - leads them
  lexicon: HALOT
  rationale: Hiphil of נחה means to lead or guide. 'Guides them' best conveys moral
    direction in a proverbial context, not merely physical leading.
- source_word: סֶלֶף
  chosen: crookedness
  alternatives:
  - perversity
  - distortion
  lexicon: HALOT
  rationale: The noun denotes twisting, distortion, or moral crookedness. 'Crookedness'
    preserves the concrete metaphor and pairs well with 'upright' as an intentional
    contrast.
- source_word: בּוֹגְדִים
  chosen: the treacherous
  alternatives:
  - traitors
  - the faithless
  lexicon: HALOT
  rationale: The participle refers to those who act treacherously or betray trust.
    'The treacherous' captures the habitual moral character in a general wisdom setting
    better than the more specific 'traitors'.
- source_word: וְשָׁדָם
  chosen: destroys them
  alternatives:
  - ravages them
  - plunders them
  - ruins them
  lexicon: HALOT
  rationale: From שׁדד, the noun can denote violence, devastation, or destruction.
    In this parallelism, the sense is that the treacherous are brought to ruin by
    their own crookedness. 'Destroys them' is concise and clear, though 'ruins them'
    is a viable softer alternative.
