theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God. Following the project's doctrine,
    YHWH is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological sense of 'heart'
  chosen_reading: Retain 'heart' literally
  alternative_readings:
  - mind
  - inner self
  rationale: In Hebrew wisdom literature, 'heart' denotes the inner moral-intellectual
    center. Retaining 'heart' preserves the biblical anthropology and imagery without
    flattening it into a single modern category.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
