id: PRO.11.20
reference: Proverbs 11:20
source:
  edition: WLC
  text: תּוֹעֲבַ֣ת יְ֭הוָה עִקְּשֵׁי לֵ֑ב וּ֝/רְצוֹנ֗/וֹ תְּמִ֣ימֵי דָֽרֶךְ־׃
translation:
  text: The crooked in heart are an abomination to the LORD, but those blameless in
    their way are his delight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the perverse of heart' for 'the crooked in heart.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the blameless of way,' that is, those whose conduct is whole or
      upright.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבַת
  chosen: an abomination
  alternatives:
  - detestable
  - a detestable thing
  lexicon: HALOT
  rationale: The noun denotes something abhorrent or detestable, often with strong
    moral or covenantal revulsion. 'An abomination' preserves the intensity and proverbial
    terseness better than a softer paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and preserving reverential treatment
    of YHWH.
- source_word: עִקְּשֵׁי לֵב
  chosen: the crooked in heart
  alternatives:
  - the perverse of heart
  - those with twisted hearts
  lexicon: HALOT
  rationale: The adjective conveys crookedness, perversity, or moral distortion. 'Crooked
    in heart' is natural modern English while retaining the metaphor of inward moral
    bent. 'Heart' in Hebrew anthropology refers to the inner person, mind, and will,
    not merely emotion.
- source_word: וּרְצוֹנוֹ
  chosen: are his delight
  alternatives:
  - are his favor
  - are acceptable to him
  - his pleasure is in
  lexicon: HALOT
  rationale: The noun means pleasure, favor, or delight, with the 3ms suffix referring
    to the LORD. Rendering the verbless clause as 'are his delight' is idiomatic in
    English and preserves the contrast with 'abomination.'
- source_word: תְּמִימֵי דָרֶךְ
  chosen: those blameless in their way
  alternatives:
  - the blameless in way
  - those of blameless conduct
  - the upright in conduct
  lexicon: HALOT
  rationale: תָּמִים here carries the sense of integrity, wholeness, or blamelessness;
    דֶּרֶךְ in wisdom literature commonly refers to one's course of life or conduct.
    'Blameless in their way' preserves the Hebrew idiom while remaining readable.
    The plural is represented by 'those' and 'their' for natural English.
