id: PRO.11.11
reference: Proverbs 11:11
source:
  edition: WLC
  text: בְּ/בִרְכַּ֣ת יְ֭שָׁרִים תָּר֣וּם קָ֑רֶת וּ/בְ/פִ֥י רְ֝שָׁעִ֗ים תֵּהָרֵֽס׃
translation:
  text: By the blessing of the upright a city is exalted, but by the mouth of the
    wicked it is torn down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Through the blessing of the upright a city rises.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by the mouth of the wicked'; the phrase points to the destructive
      power of wicked speech.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/בִרְכַּת
  chosen: By the blessing of
  alternatives:
  - Through the blessing of
  - By the blessing from
  lexicon: HALOT
  rationale: בְּ marks means/instrument here ('by/through'), and בִרְכָּה denotes
    blessing. 'By the blessing of' preserves the concise proverbial construction and
    allows either the upright's spoken blessing or their beneficent influence.
- source_word: יְשָׁרִים
  chosen: the upright
  alternatives:
  - the honest
  - the righteous
  lexicon: HALOT
  rationale: יָשָׁר refers to those who are straight/upright in moral character. 'The
    upright' is the most direct and idiomatic rendering in wisdom literature, avoiding
    over-specification while preserving ethical force.
- source_word: תָּר֣וּם
  chosen: is exalted
  alternatives:
  - is lifted up
  - rises
  lexicon: HALOT
  rationale: From רוּם, Qal 3fs, agreeing with the feminine subject קָרֶת ('city').
    'Is exalted' captures elevation/prosperity in a civic sense better than the more
    physical 'is lifted up,' and is more formal than simply 'rises'.
- source_word: קָ֑רֶת
  chosen: a city
  alternatives:
  - a town
  lexicon: HALOT
  rationale: קָרֶת denotes a city/town. 'City' is the standard English equivalent
    and fits the proverb's social-political scope.
- source_word: וּ/בְ/פִ֥י
  chosen: but by the mouth of
  alternatives:
  - but by the speech of
  - but by the words of
  lexicon: HALOT
  rationale: The conjunction marks contrast, and בְּ with 'mouth' again indicates
    means. Retaining 'mouth' preserves the Hebrew imagery and highlights destructive
    speech as the instrument.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - the guilty
  - evil people
  lexicon: HALOT
  rationale: רָשָׁע in wisdom literature commonly denotes the morally wicked. 'The
    wicked' is the established and accurate rendering.
- source_word: תֵּהָרֵֽס
  chosen: it is torn down
  alternatives:
  - it is overthrown
  - it is destroyed
  lexicon: HALOT
  rationale: Niphal of הרס means to be torn down/overthrown. 'It is torn down' preserves
    the passive/resultative sense and pairs well antithetically with 'is exalted.'
    The pronoun 'it' refers back to 'city' and is required in natural English.
