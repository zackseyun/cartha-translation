id: PRO.11.2
reference: Proverbs 11:2
source:
  edition: WLC
  text: בָּֽא זָ֭דוֹן וַ/יָּבֹ֣א קָל֑וֹן וְֽ/אֶת צְנוּעִ֥ים חָכְמָֽה־־׃
translation:
  text: When arrogance comes, disgrace comes also, but with the humble is wisdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When pride comes, then comes shame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  chosen: comes
  alternatives:
  - arrives
  - enters
  lexicon: HALOT
  rationale: Qal perfect of בוא used proverbially/generically; present-tense English
    fits wisdom-saying style better than a simple past ('came').
- source_word: זָדוֹן
  chosen: arrogance
  alternatives:
  - pride
  - presumption
  - insolence
  lexicon: HALOT
  rationale: The noun denotes proud, presumptuous arrogance rather than a neutral
    sense of self-regard. 'Arrogance' captures the moral fault clearly in modern English.
    'Pride' is possible but broader and can be ambiguous in contemporary usage.
- source_word: וַיָּבֹא
  chosen: comes also
  alternatives:
  - then comes
  - and comes
  lexicon: HALOT
  rationale: The waw-consecutive continues the paired result in proverbial parallelism.
    'Comes also' preserves the linkage and the sense that disgrace accompanies arrogance.
- source_word: קָלוֹן
  chosen: disgrace
  alternatives:
  - shame
  - dishonor
  - ignominy
  lexicon: HALOT
  rationale: The term refers to public shame/disgrace. 'Disgrace' communicates both
    shame and dishonor in readable modern English.
- source_word: וְאֶת
  chosen: with
  alternatives:
  - and with
  - among
  lexicon: HALOT
  rationale: 'Although את is not the more common preposition for ''with,'' in this
    construction it introduces association: ''with the humble.'' This yields natural
    English and matches the contrastive parallelism.'
- source_word: צְנוּעִים
  chosen: the humble
  alternatives:
  - the modest
  - the lowly
  lexicon: HALOT
  rationale: The adjective denotes those who are modest, unassuming, or humble. 'The
    humble' best fits the ethical contrast to arrogance and is idiomatic in English.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - wise dealing
  lexicon: HALOT
  rationale: The noun is the standard term 'wisdom.' The verbless clause is naturally
    rendered 'with the humble is wisdom,' preserving the concise proverbial form.
