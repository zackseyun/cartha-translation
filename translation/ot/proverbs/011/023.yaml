theological_decisions:
- issue: Sense of the final clause
  chosen_reading: The hope of the wicked results in or amounts to wrath.
  alternative_readings:
  - The hope of the wicked is anger/fury.
  - The hope of the wicked ends in God's wrath.
  rationale: The Hebrew simply states 'the hope of the wicked [is] wrath' without
    explicitly identifying whose wrath is in view. To preserve the proverb's terseness
    and ambiguity, the main text keeps 'is wrath' rather than specifying 'God's wrath.'
    This avoids importing a theological subject not overtly stated while leaving room
    for readers to infer either the wicked's angry expectation or the wrath that meets
    them.
  doctrine_reference: Preserve theological tension rather than resolve it.
