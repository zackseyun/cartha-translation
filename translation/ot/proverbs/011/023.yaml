id: PRO.11.23
reference: Proverbs 11:23
source:
  edition: WLC
  text: תַּאֲוַ֣ת צַדִּיקִ֣ים אַךְ ט֑וֹב תִּקְוַ֖ת רְשָׁעִ֣ים עֶבְרָֽה־׃
translation:
  text: The desire of the righteous is only good, but the hope of the wicked is wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'expectation' for 'hope.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fury.' The Hebrew does not explicitly say whose wrath is meant; it may
      refer to the wicked's angry expectation or to the wrath that comes upon them.
    reason: alternative_reading
lexical_decisions:
- source_word: תַּאֲוַת
  chosen: desire
  alternatives:
  - longing
  lexicon: HALOT
  rationale: The noun denotes desire or longing. 'Desire' is the most natural and
    concise English rendering here and fits the proverb's contrast with 'hope.'
- source_word: צַדִּיקִים
  chosen: the righteous
  alternatives:
  - righteous people
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The righteous' is idiomatic in
    English and preserves the moral category without unnecessary expansion.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - nothing but
  lexicon: HALOT
  rationale: In this context the particle restricts the outcome/content of the righteous
    person's desire. 'Only' clearly conveys exclusivity.
- source_word: טוֹב
  chosen: good
  alternatives:
  - what is good
  lexicon: HALOT
  rationale: Simple predicate noun/adjective. 'Good' is direct and preserves the Hebrew
    brevity; 'what is good' is possible but slightly more interpretive.
- source_word: תִּקְוַת
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: The noun can mean hope or expectation. 'Hope' is the more common English
    equivalent and matches the proverb's ethical contrast.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked people
  lexicon: HALOT
  rationale: Plural adjective used substantivally. 'The wicked' is standard and parallel
    to 'the righteous.'
- source_word: עֶבְרָה
  chosen: wrath
  alternatives:
  - fury
  - overflowing anger
  lexicon: HALOT
  rationale: The noun commonly denotes wrath or rage. Here it is best taken as the
    outcome/character of the wicked's hope. 'Wrath' preserves the terseness and moral
    weight of the Hebrew; 'fury' is possible but less standard in wisdom literature.
