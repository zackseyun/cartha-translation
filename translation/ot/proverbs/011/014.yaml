id: PRO.11.14
reference: Proverbs 11:14
source:
  edition: WLC
  text: בְּ/אֵ֣ין תַּ֭חְבֻּלוֹת יִפָּל עָ֑ם וּ֝/תְשׁוּעָ֗ה בְּ/רֹ֣ב יוֹעֵֽץ־׃
translation:
  text: Without guidance a people falls, but in an abundance of counselors there is
    deliverance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Where there is no guidance, a people falls; but in a multitude of counselors
      there is safety/victory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/אֵין
  chosen: Without
  alternatives:
  - Where there is no
  - In the absence of
  lexicon: HALOT
  rationale: The preposition ב with אֵין forms a circumstantial expression meaning
    'in the absence of' or 'without.' 'Without' is concise and natural in English
    while preserving the conditional sense.
- source_word: תַּחְבֻּלוֹת
  chosen: guidance
  alternatives:
  - wise guidance
  - strategy
  - steering
  - counsel
  lexicon: HALOT
  rationale: The noun can denote guidance, direction, or strategic steering, often
    with the image of ship-handling. 'Guidance' best fits the proverb's broad wisdom
    context without over-specifying military or nautical strategy. 'Counsel' was avoided
    here to preserve distinction from יוֹעֵץ later in the verse.
- source_word: יִפָּל
  chosen: falls
  alternatives:
  - comes to ruin
  - is overthrown
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall.' In proverbial context it can imply
    collapse or ruin, but 'falls' preserves the metaphor and allows readers to hear
    the broader sense.
- source_word: עָם
  chosen: a people
  alternatives:
  - the people
  - a nation
  lexicon: HALOT
  rationale: עָם can mean 'people' or 'nation.' The anarthrous form is well represented
    by 'a people,' expressing a general principle rather than a specific nation.
- source_word: וּ/תְשׁוּעָה
  chosen: there is deliverance
  alternatives:
  - there is victory
  - there is safety
  - salvation
  lexicon: HALOT
  rationale: תְּשׁוּעָה can denote deliverance, victory, or salvation. In wisdom literature
    and civic context, 'deliverance' captures rescue/preservation without narrowing
    to military victory alone. The existential 'there is' reflects the verbless Hebrew
    clause.
- source_word: בְּ/רֹב
  chosen: in an abundance of
  alternatives:
  - in the multitude of
  - with many
  lexicon: HALOT
  rationale: The phrase means 'in the abundance/multitude of.' 'In an abundance of'
    is idiomatic and preserves the Hebrew emphasis on numerous advisers.
- source_word: יוֹעֵץ
  chosen: counselors
  alternatives:
  - advisers
  - those who give counsel
  lexicon: HALOT
  rationale: Although singular in form, the phrase רֹב יוֹעֵץ is a collective expression
    meaning many counselors/advisers. 'Counselors' is the most natural English rendering
    and maintains the contrast with lack of guidance in the first colon.
