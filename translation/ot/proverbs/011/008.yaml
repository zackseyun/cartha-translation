theological_decisions:
- issue: Interpretation of the proverb's reversal
  chosen_reading: 'The verse states a general wisdom principle of reversal: the righteous
    is delivered from trouble, and the wicked experiences what would otherwise have
    befallen him.'
  alternative_readings:
  - A more concrete substitution in which the wicked specifically falls into the very
    trouble from which the righteous was rescued
  rationale: The Hebrew supports a substitution/reversal idea through תַּחְתָּיו,
    but does not require a highly specific narrative scenario. The translation preserves
    the proverb's concise statement without over-interpreting mechanism or timing.
  doctrine_reference: Preserve theological tension rather than resolve it
