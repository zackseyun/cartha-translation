id: PRO.11.8
reference: Proverbs 11:8
source:
  edition: WLC
  text: צַ֭דִּיק מִ/צָּרָ֣ה נֶחֱלָ֑ץ וַ/יָּבֹ֖א רָשָׁ֣ע תַּחְתָּֽי/ו׃
translation:
  text: The righteous man is rescued from trouble, and the wicked comes in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "instead of him"; the Hebrew phrase can express substitution, suggesting
      that the wicked falls into the trouble in place of the righteous.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  chosen: the righteous man
  alternatives:
  - the righteous
  - a righteous man
  lexicon: HALOT
  rationale: Adjective used substantivally for a singular masculine person. 'The righteous
    man' preserves the representative singular and the gender-accurate masculine form,
    while sounding natural in English. 'The righteous' is possible but less explicit
    about the singular individual in this proverb.
- source_word: מִצָּרָה
  chosen: from trouble
  alternatives:
  - from distress
  - from adversity
  lexicon: HALOT
  rationale: The preposition מִן marks separation/deliverance out of a state or circumstance.
    צָרָה commonly denotes trouble, distress, or adversity. 'Trouble' is clear, idiomatic,
    and broad enough for the proverb's general statement.
- source_word: נֶחֱלָץ
  chosen: is rescued
  alternatives:
  - is delivered
  - escapes
  lexicon: HALOT
  rationale: Niphal form of חלץ here conveys being drawn out or delivered. 'Is rescued'
    communicates passive deliverance in readable modern English. 'Is delivered' is
    also viable but can sound more ecclesiastical; 'escapes' can imply more self-action
    than the passive form suggests.
- source_word: וַיָּבֹא
  chosen: comes
  alternatives:
  - enters
  - comes upon
  lexicon: HALOT
  rationale: The waw-consecutive verb advances the proverb's second clause. In English
    proverbial style, simple present 'comes' best expresses the general truth. 'Enters'
    is too spatially specific, while 'comes upon' would add an object not explicit
    in the Hebrew.
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - a wicked man
  lexicon: HALOT
  rationale: Substantival adjective referring to the unrighteous counterpart to the
    righteous man. 'The wicked' is idiomatic English for this class/representative
    individual and matches wisdom-literature style.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - under him
  lexicon: HALOT
  rationale: 'תַּחַת with pronominal suffix commonly means ''in place of'' or ''instead
    of.'' Here it expresses substitution: the wicked takes the place of the righteous
    in experiencing the trouble. ''Under him'' would be overly literal and misleading
    in context.'
