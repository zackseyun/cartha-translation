id: SNG.4.7
reference: Song of Songs 4:7
source:
  edition: WLC
  text: כֻּלָּ֤/ךְ יָפָה֙ רַעְיָתִ֔/י וּ/מ֖וּם אֵ֥ין בָּֽ/ךְ׃ס
translation:
  text: You are altogether beautiful, my beloved, and there is no blemish in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You are all beautiful' or 'All of you is beautiful.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my love' or 'my darling.'
    reason: lexical_alternative
  - marker: c
    text: Or 'spot,' 'defect,' or 'flaw.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּךְ
  chosen: altogether
  alternatives:
  - all of you
  - wholly
  lexicon: HALOT
  rationale: The construction with the 2fs suffix intensifies the statement about
    the woman as a whole. 'Altogether' is idiomatic modern English that preserves
    the comprehensive force better than the more wooden 'all of you'.
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: '''Beautiful'' is the clear contemporary equivalent for the adjective
    here. ''Fair'' is archaic in this sense, and ''lovely'' is possible but slightly
    softer than the direct statement of beauty.'
- source_word: רַעְיָתִי
  chosen: my beloved
  alternatives:
  - my darling
  - my love
  - my companion
  lexicon: HALOT
  rationale: In Song of Songs this term is an intimate address for the female lover.
    'My beloved' preserves the affectionate and relational force without sounding
    overly colloquial. 'My love' is possible, but 'beloved' better conveys the noun-like
    vocative quality.
- source_word: וּמוּם
  chosen: blemish
  alternatives:
  - spot
  - defect
  - flaw
  lexicon: HALOT
  rationale: מוּם commonly denotes a physical defect or blemish. 'Blemish' fits both
    the literal lexical sense and the poetic context of flawless beauty. 'Spot' is
    traditional but narrower and potentially misleading in modern English.
- source_word: אֵין בָּךְ
  chosen: there is no ... in you
  alternatives:
  - you have no ...
  - there is not ... in you
  lexicon: HALOT
  rationale: The existential negative plus preposition is most naturally rendered
    'there is no blemish in you.' This preserves the Hebrew structure while remaining
    natural English.
