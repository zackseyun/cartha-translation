id: SNG.4.10
reference: Song of Songs 4:10
source:
  edition: WLC
  text: מַה יָּפ֥וּ דֹדַ֖יִ/ךְ אֲחֹתִ֣/י כַלָּ֑ה מַה טֹּ֤בוּ דֹדַ֨יִ/ךְ֙ מִ/יַּ֔יִן
    וְ/רֵ֥יחַ שְׁמָנַ֖יִ/ךְ מִ/כָּל בְּשָׂמִֽים־־־׃
translation:
  text: How beautiful your love is, my sister, my bride! How much better your love
    is than wine, and the fragrance of your oils than all spices!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your caresses' for both occurrences of 'your love'; the Hebrew דֹדַיִךְ
      can refer to love expressed in physical affection.
    reason: lexical_alternative
  - marker: b
    text: '''Your oils'' likely refers to perfumed oils or ointments.'
    reason: cultural_note
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How very
  - O how
  lexicon: HALOT
  rationale: Exclamatory מַה introduces admiration, best rendered with English 'How'
    rather than an interrogative 'what.'
- source_word: יָּפוּ
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: From יפה, describing attractiveness or beauty. 'Beautiful' is natural
    modern English and fits the poetic praise.
- source_word: דֹדַיִךְ
  chosen: your love
  alternatives:
  - your caresses
  - your lovemaking
  lexicon: HALOT
  rationale: דּוֹדִים in Song can denote love, expressions of love, or caresses. Here
    'your love' preserves the poetic and relational sense without becoming either
    too vague or too explicit. The same gloss is kept in both occurrences for consistency.
- source_word: אֲחֹתִי כַלָּה
  chosen: my sister, my bride
  alternatives:
  - my sister-bride
  lexicon: HALOT
  rationale: Both nouns are terms of endearment in the Song. Rendering both explicitly
    preserves the Hebrew parallel address and avoids collapsing them into a single
    English compound.
- source_word: טֹּבוּ
  chosen: better
  alternatives:
  - sweeter
  - more delightful
  lexicon: HALOT
  rationale: Comparative sense is required by the following מִן construction ('than
    wine'). 'Better' is the most direct and idiomatic rendering.
- source_word: מִיַּיִן
  chosen: than wine
  alternatives:
  - more than wine
  lexicon: HALOT
  rationale: The preposition marks comparison. 'Than wine' fits the English comparative
    introduced by 'better.'
- source_word: וְרֵיחַ
  chosen: and the fragrance
  alternatives:
  - and the scent
  - and the aroma
  lexicon: HALOT
  rationale: רֵיחַ denotes smell/scent. 'Fragrance' suits the positive poetic context.
- source_word: שְׁמָנַיִךְ
  chosen: of your oils
  alternatives:
  - of your perfumes
  - of your ointments
  lexicon: HALOT
  rationale: Literally 'your oils,' likely perfumed oils in context. The main text
    keeps the concrete image 'oils' while allowing the perfumed sense to be inferred
    from context.
- source_word: מִכָּל בְּשָׂמִים
  chosen: than all spices
  alternatives:
  - than every spice
  - than all perfumes
  lexicon: HALOT
  rationale: בְּשָׂמִים refers to aromatic substances/spices. 'Spices' is a standard
    and concrete rendering; the comparative 'than all' follows the Hebrew closely.
