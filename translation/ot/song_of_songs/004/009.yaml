id: SNG.4.9
reference: Song of Songs 4:9
source:
  edition: WLC
  text: לִבַּבְתִּ֖/נִי אֲחֹתִ֣/י כַלָּ֑ה לִבַּבְתִּ֨י/נִי֙ ב/אחד מֵ/עֵינַ֔יִ/ךְ בְּ/אַחַ֥ד
    עֲנָ֖ק מִ/צַּוְּרֹנָֽיִ/ךְ׃
translation:
  text: You have captured my heart, my sister, my bride; you have captured my heart
    with one glance of your eyes, with one jewel of your necklace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You have ravished my heart' (traditional); the Hebrew verb is rare and
      conveys that the beloved has powerfully moved or overwhelmed the speaker's heart.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with one from your eyes.' The sense is likely 'with a single
      glance.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew may also be understood as 'with one chain/ornament from your neck'
      or 'with one of the ornaments on your neck.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבַּבְתִּנִי
  chosen: you have captured my heart
  alternatives:
  - you have ravished my heart
  - you have emboldened me
  - you have made my heart beat faster
  lexicon: HALOT
  rationale: The verb לבב in this stem with 1cs suffix is rare and contextually expresses
    the beloved's heart being powerfully affected. 'Captured my heart' is idiomatic
    modern English that preserves the emotional force without archaic 'ravished.'
    The repetition in the Hebrew is retained by repeating the clause.
- source_word: אֲחֹתִי
  chosen: my sister
  lexicon: HALOT
  rationale: Literal rendering is preferred. In Song of Songs this is an affectionate
    term of intimacy, not a biological claim; the literal wording should stand and
    let the poetic idiom speak.
- source_word: כַלָּה
  chosen: my bride
  alternatives:
  - bride
  lexicon: HALOT
  rationale: 'In direct address with the preceding possessive, English idiom naturally
    supplies ''my'': ''my sister, my bride.'' This preserves the marital/bridal nuance.'
- source_word: בְאֶחָד מֵעֵינַיִךְ
  chosen: with one glance of your eyes
  alternatives:
  - with one of your eyes
  - with one look from your eyes
  lexicon: HALOT
  rationale: Formally the phrase is 'with one from your eyes,' but in English the
    sense is not that only one eye is in view; it is a single look or glance. 'Glance'
    communicates the idiomatic force while staying close to the imagery.
- source_word: בְּאַחַד עֲנָק
  chosen: with one jewel
  alternatives:
  - with one chain
  - with one ornament
  - with one strand
  lexicon: HALOT
  rationale: עֲנָק denotes a neck ornament/necklace. Because the following phrase
    specifies 'from your necklace(s)/neck,' 'one jewel' best captures the singular
    item on the ornament that enchants the speaker. This avoids the awkward English
    'with one neck-chain from your neck.'
- source_word: מִצַּוְּרֹנָיִךְ
  chosen: of your necklace
  alternatives:
  - from your neck
  - of your neck-chains
  lexicon: HALOT
  rationale: Though derived from 'neck,' the plural/dual form in this collocation
    likely refers to what is worn on the neck rather than the anatomical neck itself.
    Rendering it as 'your necklace' gives the most natural sense in context with עֲנָק
    while preserving the adornment imagery.
