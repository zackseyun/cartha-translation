id: SNG.4.11
reference: Song of Songs 4:11
source:
  edition: WLC
  text: נֹ֛פֶת תִּטֹּ֥פְנָה שִׂפְתוֹתַ֖יִ/ךְ כַּלָּ֑ה דְּבַ֤שׁ וְ/חָלָב֙ תַּ֣חַת לְשׁוֹנֵ֔/ךְ
    וְ/רֵ֥יחַ שַׂלְמֹתַ֖יִ/ךְ כְּ/רֵ֥יחַ לְבָנֽוֹן׃ס
translation:
  text: Your lips drip honeycomb, bride; honey and milk are under your tongue, and
    the fragrance of your garments is like the fragrance of Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comb honey'; the Hebrew נֹפֶת is more specific than the later word for
      'honey.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'honey and milk,' not the more familiar phrase 'milk and honey.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹפֶת
  chosen: honeycomb
  alternatives:
  - comb honey
  - honey
  lexicon: HALOT
  rationale: נֹפֶת refers specifically to flowing honey/honeycomb rather than the
    more general דְּבַשׁ later in the verse. Rendering it as 'honeycomb' preserves
    the poetic distinction between the two honey terms.
- source_word: תִּטֹּפְנָה
  chosen: drip
  alternatives:
  - drop
  - distill
  lexicon: HALOT
  rationale: The verb from נטף denotes dripping or flowing in drops. 'Drip' is vivid,
    natural English and fits the sensual poetic imagery.
- source_word: שִׂפְתוֹתַיִךְ
  chosen: your lips
  lexicon: HALOT
  rationale: Straightforward plural construct with 2fs suffix; 'your lips' is the
    natural equivalent.
- source_word: כַּלָּה
  chosen: bride
  alternatives:
  - bride-to-be
  lexicon: HALOT
  rationale: In Song of Songs this term is a term of endearment for the beloved in
    bridal imagery. 'Bride' is the standard and most natural rendering.
- source_word: דְּבַשׁ וְחָלָב
  chosen: honey and milk
  alternatives:
  - milk and honey
  lexicon: HALOT
  rationale: The Hebrew order is 'honey and milk,' not the more familiar idiom 'milk
    and honey.' Preserving the source order respects original-language primacy and
    avoids importing the stock biblical phrase where it is not used here.
- source_word: תַּחַת לְשׁוֹנֵךְ
  chosen: under your tongue
  alternatives:
  - beneath your tongue
  lexicon: HALOT
  rationale: A direct and idiomatic rendering of the preposition plus noun with suffix;
    it preserves the concrete sensual imagery.
- source_word: רֵיחַ
  chosen: fragrance
  alternatives:
  - scent
  - smell
  lexicon: HALOT
  rationale: In this positive poetic context, 'fragrance' better conveys pleasant
    aroma than the more neutral 'smell'.
- source_word: שַׂלְמֹתַיִךְ
  chosen: your garments
  alternatives:
  - your clothes
  - your robes
  lexicon: HALOT
  rationale: The plural noun refers to clothing/outer garments. 'Garments' is suitably
    elevated yet readable for love poetry.
- source_word: כְּרֵיחַ לְבָנוֹן
  chosen: like the fragrance of Lebanon
  alternatives:
  - like the scent of Lebanon
  lexicon: HALOT
  rationale: Lebanon evokes its famed cedars and mountain freshness. Keeping 'Lebanon'
    literal preserves the geographic-poetic image rather than paraphrasing it.
