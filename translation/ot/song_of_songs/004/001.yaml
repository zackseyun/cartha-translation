id: SNG.4.1
reference: Song of Songs 4:1
source:
  edition: WLC
  text: הִנָּ֨/ךְ יָפָ֤ה רַעְיָתִ/י֙ הִנָּ֣/ךְ יָפָ֔ה עֵינַ֣יִ/ךְ יוֹנִ֔ים מִ/בַּ֖עַד
    לְ/צַמָּתֵ֑/ךְ שַׂעְרֵ/ךְ֙ כְּ/עֵ֣דֶר הָֽ/עִזִּ֔ים שֶׁ/גָּלְשׁ֖וּ מֵ/הַ֥ר גִּלְעָֽד׃
translation:
  text: Look, you are beautiful, my beloved; look, you are beautiful. Your eyes are
    doves behind your veil. Your hair is like a flock of goats streaming down from
    Mount Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through your veil.' The Hebrew expression suggests partial concealment
      behind a covering.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term translated 'veil' may also be understood as 'locks' or 'braid,'
      though 'veil' best fits the immediate context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנָּךְ
  chosen: Look, you are
  alternatives:
  - Behold, you are
  - Indeed, you are
  lexicon: HALOT
  rationale: הִנֵּה with 2fs suffix is a deictic/exclamatory particle. 'Look' preserves
    the vivid poetic exclamation in contemporary English better than archaic 'behold,'
    while retaining the demonstrative force.
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: A straightforward adjective of beauty. 'Beautiful' is the most natural
    modern English equivalent; 'fair' is archaic and potentially misleading.
- source_word: רַעְיָתִי
  chosen: my beloved
  alternatives:
  - my darling
  - my companion
  - my love
  lexicon: HALOT
  rationale: In Song of Songs this term is an intimate address for the female lover.
    'My beloved' preserves both affection and poetic dignity better than the more
    colloquial 'my darling' or the flatter 'my companion.'
- source_word: עֵינַיִךְ יוֹנִים
  chosen: Your eyes are doves
  alternatives:
  - Your eyes are like doves
  - Your eyes are dove-like
  lexicon: HALOT
  rationale: The Hebrew is verbless and literally appositional, 'your eyes doves.'
    English idiom requires supplying 'are.' The direct metaphor 'are doves' is stronger
    and closer to the Hebrew than adding 'like,' while remaining intelligible.
- source_word: מִבַּעַד
  chosen: behind
  alternatives:
  - through
  - from behind
  lexicon: HALOT
  rationale: The preposition indicates something seen through or from behind an intervening
    covering. 'Behind' fits smooth English with the following noun phrase, while the
    nuance of partial concealment is retained.
- source_word: לְצַמָּתֵךְ
  chosen: your veil
  alternatives:
  - your locks
  - your braid
  - your shawl
  lexicon: HALOT
  rationale: The noun is debated, but in this context it most plausibly refers to
    a woman's veil or covering, especially with 'from/behind' and the imagery of eyes
    seen through it. 'Locks' is less likely here because hair is mentioned explicitly
    in the next clause.
- source_word: שַׂעְרֵךְ
  chosen: Your hair
  lexicon: HALOT
  rationale: Simple possessive noun; no reason to depart from the standard rendering.
- source_word: כְּעֵדֶר הָעִזִּים
  chosen: like a flock of goats
  alternatives:
  - like a herd of goats
  lexicon: HALOT
  rationale: עֵדֶר commonly denotes a flock/herd. 'Flock of goats' is idiomatic and
    preserves the pastoral image.
- source_word: שֶׁגָּלְשׁוּ
  chosen: streaming down
  alternatives:
  - descending
  - moving down
  - leaping down
  lexicon: HALOT
  rationale: The verb conveys flowing/sliding downward. 'Streaming down' captures
    the visual effect of dark hair cascading, which suits the poetic simile better
    than the more mechanical 'descending.'
- source_word: מֵהַר גִּלְעָד
  chosen: from Mount Gilead
  alternatives:
  - down Mount Gilead
  - from the hill country of Gilead
  lexicon: HALOT
  rationale: The singular 'mountain of Gilead' is best represented as 'Mount Gilead'
    in English. This preserves the geographic image without overinterpreting the exact
    topography.
