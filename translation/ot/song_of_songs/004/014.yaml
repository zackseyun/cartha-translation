id: SNG.4.14
reference: Song of Songs 4:14
source:
  edition: WLC
  text: נֵ֣רְדְּ וְ/כַרְכֹּ֗ם קָנֶה֙ וְ/קִנָּמ֔וֹן עִ֖ם כָּל עֲצֵ֣י לְבוֹנָ֑ה מֹ֚ר
    וַ/אֲהָל֔וֹת עִ֖ם כָּל רָאשֵׁ֥י בְשָׂמִֽים׀־־׃
translation:
  text: nard and saffron, calamus and cinnamon, with every kind of frankincense tree,
    myrrh and aloes, with all the finest spices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spikenard.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sweet cane' for 'calamus.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew literally, 'with all trees of frankincense.'
    reason: lexical_alternative
  - marker: d
    text: '''Aloes'' here likely refers to fragrant agarwood, not aloe vera.'
    reason: cultural_note
  - marker: e
    text: Hebrew literally, 'with all the chief spices.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵרְדְּ
  chosen: nard
  alternatives:
  - spikenard
  lexicon: HALOT
  rationale: A fragrant plant/aromatic substance, traditionally identified as nard.
    'Nard' is concise modern English; 'spikenard' is a more traditional but less common
    equivalent.
- source_word: כַרְכֹּם
  chosen: saffron
  lexicon: HALOT
  rationale: The term denotes saffron, a costly aromatic spice. 'Saffron' is the standard
    English rendering.
- source_word: קָנֶה
  chosen: calamus
  alternatives:
  - sweet cane
  - reed
  lexicon: HALOT
  rationale: In a perfume/spice list, the aromatic sense is primary. 'Calamus' best
    conveys an aromatic reed rather than a generic 'reed.'
- source_word: קִנָּמוֹן
  chosen: cinnamon
  lexicon: HALOT
  rationale: Standard identification of the spice; 'cinnamon' is the natural English
    equivalent.
- source_word: עִם כָּל עֲצֵי לְבוֹנָה
  chosen: with every kind of frankincense tree
  alternatives:
  - with all trees of frankincense
  - with every tree of frankincense
  lexicon: HALOT
  rationale: Literally 'with all trees of frankincense.' Because the phrase functions
    collectively in a poetic spice catalogue, 'every kind of frankincense tree' gives
    readable English while preserving the arboreal imagery rather than reducing it
    simply to the resin 'frankincense.'
- source_word: מֹר
  chosen: myrrh
  lexicon: HALOT
  rationale: Standard rendering for the aromatic resin.
- source_word: אֲהָלוֹת
  chosen: aloes
  alternatives:
  - agarwood
  - eaglewood
  lexicon: HALOT
  rationale: In biblical perfume contexts this refers not to medicinal aloe vera but
    to fragrant aloes/agarwood. 'Aloes' preserves the traditional biblical wording;
    the more specific identification 'agarwood' is worth preserving as an alternative.
- source_word: רָאשֵׁי בְשָׂמִים
  chosen: the finest spices
  alternatives:
  - chief spices
  - choice spices
  - all kinds of spices
  lexicon: HALOT
  rationale: Literally 'heads/chiefs of spices,' an idiom for the best or choicest
    spices. 'The finest spices' communicates the superlative force naturally in modern
    English.
