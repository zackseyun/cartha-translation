theological_decisions:
- issue: Erotic garden imagery and possessive shift
  chosen_reading: Retain the sensual metaphor without allegorizing; preserve the shift
    from 'my garden' to 'his garden.'
  alternative_readings:
  - Interpret the garden language explicitly allegorically
  - Flatten the possessive shift for stylistic smoothness
  rationale: The Hebrew presents intimate poetic imagery directly. The translation
    should neither suppress its sensuality nor import a doctrinal allegory not stated
    in the text. Preserving 'my garden' and then 'his garden' reflects the poem's
    reciprocal love imagery and respects the source text's wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
