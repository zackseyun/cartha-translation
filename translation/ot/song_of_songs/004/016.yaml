id: SNG.4.16
reference: Song of Songs 4:16
source:
  edition: WLC
  text: ע֤וּרִי צָפוֹן֙ וּ/ב֣וֹאִי תֵימָ֔ן הָפִ֥יחִי גַנִּ֖/י יִזְּל֣וּ בְשָׂמָ֑י/ו
    יָבֹ֤א דוֹדִ/י֙ לְ/גַנּ֔/וֹ וְ/יֹאכַ֖ל פְּרִ֥י מְגָדָֽי/ו׃
translation:
  text: Awake, north wind, and come, south wind! Blow on my garden, so that its spices
    may flow. Let my beloved come into his garden and eat its choicest fruits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'north' and 'south'; 'wind' is supplied in English because the directions
      are addressed as agents who blow on the garden.
    reason: lexical_alternative
  - marker: b
    text: Or 'its perfume/fragrance may flow.' The Hebrew term can refer to aromatic
      spices or the scent they produce.
    reason: lexical_alternative
  - marker: c
    text: The shift from 'my garden' to 'his garden' is present in the Hebrew text
      and likely expresses mutual belonging within the lovers' imagery.
    reason: cross_reference
lexical_decisions:
- source_word: ע֤וּרִי
  chosen: Awake
  alternatives:
  - Rouse yourself
  - Arise
  lexicon: HALOT
  rationale: Imperative feminine singular addressed poetically to the north wind.
    'Awake' is idiomatic and preserves the vivid summons without overinterpreting
    the metaphor.
- source_word: צָפוֹן
  chosen: north wind
  alternatives:
  - north
  lexicon: HALOT
  rationale: Although the noun is simply 'north,' in context it is directly addressed
    in parallel with 'south' and functions as a metonymy for the north wind. Supplying
    'wind' in English makes the sense clear and matches the following command to blow.
- source_word: וּ/ב֣וֹאִי
  chosen: and come
  alternatives:
  - and enter
  - and blow in
  lexicon: HALOT
  rationale: Qal imperative of 'come.' 'And come' preserves the simple verbal force;
    the idea of blowing is expressed separately by הָפִיחִי.
- source_word: תֵימָן
  chosen: south wind
  alternatives:
  - south
  lexicon: HALOT
  rationale: As with 'north,' the directional noun here refers to the south wind in
    poetic address. English requires the implied meteorological sense for clarity.
- source_word: הָפִ֥יחִי
  chosen: Blow on
  alternatives:
  - Breathe on
  - Waft over
  lexicon: HALOT
  rationale: Hiphil imperative from a verb of blowing/breathing. 'Blow on' is natural
    English for wind acting upon a garden and preserves the causative sense without
    becoming awkward.
- source_word: גַנִּ֖/י
  chosen: my garden
  lexicon: HALOT
  rationale: Straightforward possessive. The female speaker refers to herself metaphorically
    as a garden in the immediate context.
- source_word: יִזְּל֣וּ
  chosen: may flow
  alternatives:
  - may drip
  - may stream forth
  lexicon: HALOT
  rationale: Jussive/imperfect expressing desired result. The verb commonly denotes
    flowing or trickling; 'may flow' is smooth English and fits the image of fragrance
    spreading.
- source_word: בְשָׂמָ֑י/ו
  chosen: its spices
  alternatives:
  - its balsam
  - its perfume
  - its fragrance
  lexicon: HALOT
  rationale: The noun can denote aromatic substances/spices. 'Its spices' keeps the
    concrete imagery of the garden's aromatic produce better than the more abstract
    'fragrance,' while still fitting the context of scent being released.
- source_word: יָבֹ֤א
  chosen: Let ... come
  alternatives:
  - May ... come
  lexicon: HALOT
  rationale: Jussive nuance after the wish about the garden. 'Let my beloved come'
    is idiomatic English for the volitional sense.
- source_word: דוֹדִ/י
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: Traditional and contextually appropriate rendering in Song of Songs.
    'My beloved' preserves affection without sounding reductive or overly explicit.
- source_word: לְ/גַנּ֔/וֹ
  chosen: into his garden
  alternatives:
  - to his garden
  lexicon: HALOT
  rationale: The preposition can be rendered 'to/into'; 'into his garden' fits the
    motion verb 'come.' The shift from 'my garden' to 'his garden' is retained as
    part of the poem's mutual-possession imagery.
- source_word: וְ/יֹאכַ֖ל
  chosen: and eat
  alternatives:
  - and enjoy
  lexicon: HALOT
  rationale: Literal eating imagery should be preserved; 'enjoy' would overinterpret
    the metaphor.
- source_word: פְּרִ֥י
  chosen: fruits
  alternatives:
  - fruit
  lexicon: HALOT
  rationale: Collective singular in Hebrew is naturally rendered as plural in English
    here for idiomatic style.
- source_word: מְגָדָֽי/ו
  chosen: its choicest
  alternatives:
  - its pleasant
  - its precious
  - its excellent
  lexicon: HALOT
  rationale: The noun denotes choice or precious things/delicacies. Rendering adjectivally
    as 'choicest fruits' is idiomatic English and conveys quality rather than mere
    pleasantness.
