theological_decisions:
- issue: Whether the imagery should be rendered literally or interpreted allegorically
  chosen_reading: Literal poetic imagery retained in the main text
  alternative_readings:
  - Erotic metaphor for the beloved's body
  - Symbolic/allegorical reference to a place of retreat or worship
  rationale: The Hebrew presents evocative poetic imagery without explicitly identifying
    its referent. In keeping with optimal equivalence and the instruction not to import
    doctrinal claims the text does not make, the translation preserves the literal
    imagery and leaves interpretive/allegorical readings to readers and notes rather
    than embedding them in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
