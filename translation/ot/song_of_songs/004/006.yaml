id: SNG.4.6
reference: Song of Songs 4:6
source:
  edition: WLC
  text: עַ֤ד שֶׁ/יָּפ֨וּחַ֙ הַ/יּ֔וֹם וְ/נָ֖סוּ הַ/צְּלָלִ֑ים אֵ֤לֶךְ לִ/י֙ אֶל הַ֣ר
    הַ/מּ֔וֹר וְ/אֶל גִּבְעַ֖ת הַ/לְּבוֹנָֽה־־׃
translation:
  text: Until the day breathes and the shadows flee, I will go away to the mountain
    of myrrh and to the hill of frankincense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Until the day blows/grows cool and the shadows flee.' The Hebrew verb
      is literally 'breathes' and may evoke the evening breeze or the breaking of
      dawn.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'I will go to myself' / 'I will go.' The Hebrew includes an ethical
      dative ('for myself'), which may add emphasis rather than a separate idea.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: Until
  alternatives:
  - Before
  lexicon: HALOT
  rationale: Temporal marker introducing the duration or limit of the action; 'until'
    is the natural English equivalent here.
- source_word: שֶׁיָּפוּחַ
  chosen: breathes
  alternatives:
  - blows
  - grows cool
  - breaks
  lexicon: HALOT
  rationale: From פוח, literally 'to breathe' or 'blow.' In this poetic context with
    'day,' the image is of the day exhaling or the breeze of evening/morning arising.
    'Breathes' preserves the metaphor more transparently than interpretive renderings
    like 'grows cool' or 'breaks.'
- source_word: הַיּוֹם
  chosen: the day
  alternatives:
  - daytime
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with article; paired with the verb
    to form a poetic personification.
- source_word: וְנָסוּ
  chosen: flee
  alternatives:
  - vanish
  - run away
  lexicon: HALOT
  rationale: From נוס, 'to flee.' 'Flee' keeps the vivid verbal imagery; 'vanish'
    is possible but less concrete.
- source_word: הַצְּלָלִים
  chosen: the shadows
  alternatives:
  - shades
  lexicon: HALOT
  rationale: Standard rendering of צללים. 'Shadows' fits the poetic scene and common
    English usage.
- source_word: אֵלֶךְ לִי
  chosen: I will go away
  alternatives:
  - I will go
  - let me go
  lexicon: HALOT
  rationale: The verb is first person singular 'I will go'; the attached לִי is an
    ethical/dative nuance that can suggest 'for myself' or simply add emphasis. 'Go
    away' captures movement from the present scene without overtranslating the pronoun.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition.
- source_word: הַר הַמּוֹר
  chosen: the mountain of myrrh
  alternatives:
  - the hill-country of myrrh
  lexicon: HALOT
  rationale: Construct phrase rendered formally. 'Myrrh' is the aromatic resin מור;
    preserving the concrete image is preferable to allegorizing.
- source_word: גִּבְעַת הַלְּבוֹנָה
  chosen: the hill of frankincense
  alternatives:
  - the hill of incense
  lexicon: HALOT
  rationale: לבונה specifically denotes frankincense, not incense generically. 'Hill'
    appropriately distinguishes גבעה from the preceding 'mountain.'
