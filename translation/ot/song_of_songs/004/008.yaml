id: SNG.4.8
reference: Song of Songs 4:8
source:
  edition: WLC
  text: אִתִּ֤/י מִ/לְּבָנוֹן֙ כַּלָּ֔ה אִתִּ֖/י מִ/לְּבָנ֣וֹן תָּב֑וֹאִי תָּשׁ֣וּרִי
    מֵ/רֹ֣אשׁ אֲמָנָ֗ה מֵ/רֹ֤אשׁ שְׂנִיר֙ וְ/חֶרְמ֔וֹן מִ/מְּעֹנ֣וֹת אֲרָי֔וֹת מֵֽ/הַרְרֵ֖י
    נְמֵרִֽים׀׃
translation:
  text: Come with me from Lebanon, my bride; with me from Lebanon, come. Descend from
    the summit of Amanah, from the summit of Senir and Hermon, from lions’ dens, from
    mountains of leopards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look down from the summit of Amanah, from the summit of Senir and Hermon.'
      The Hebrew verb here is difficult and may denote looking out from the mountain
      heights rather than descending from them.
    reason: lexical_alternative
  - marker: b
    text: Senir is an ancient name for part of the Hermon range.
    reason: cultural_note
lexical_decisions:
- source_word: אִתִּי
  chosen: with me
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix most naturally means 'with me.' Repeated
    twice for emphasis and invitation. Rendering 'with me' fits the romantic summons
    better than any spatial sense.
- source_word: מִלְּבָנוֹן
  chosen: from Lebanon
  lexicon: HALOT
  rationale: 'The prefixed מִן marks source/origin: ''from Lebanon.'' Repeated in
    the verse and retained in English for poetic parallelism.'
- source_word: כַּלָּה
  chosen: my bride
  alternatives:
  - bride
  lexicon: HALOT
  rationale: In Song of Songs this term denotes the beloved as bride. English idiom
    naturally supplies the possessive in direct address ('my bride'), matching the
    relational force of the vocative.
- source_word: תָּבֹואִי
  chosen: come
  alternatives:
  - you shall come
  - you must come
  lexicon: HALOT
  rationale: The form can be read with modal/jussive force in context. 'Come' best
    captures the lover's summons in natural English without over-specifying futurity
    or obligation.
- source_word: תָּשׁוּרִי
  chosen: descend
  alternatives:
  - look
  - gaze
  - journey
  lexicon: HALOT
  rationale: This verb is difficult and has been understood as 'look' or 'gaze' from
    the heights, but in this context of invitation away from dangerous mountain regions,
    'descend' fits the movement implied by the sequence and yields coherent sense
    in English. The alternative is preserved in a footnote.
- source_word: מֵרֹאשׁ
  chosen: from the summit of
  alternatives:
  - from the top of
  - from the head of
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but for mountains idiomatic English is
    'summit' or 'top.' 'Summit' is vivid and natural.
- source_word: אֲמָנָה
  chosen: Amanah
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated, per philosophy
    for names.
- source_word: שְׂנִיר
  chosen: Senir
  lexicon: HALOT
  rationale: Proper place name, another designation associated with the Hermon range;
    transliterated.
- source_word: חֶרְמוֹן
  chosen: Hermon
  lexicon: HALOT
  rationale: Proper place name; transliterated.
- source_word: מִמְּעֹנוֹת אֲרָיוֹת
  chosen: from lions’ dens
  alternatives:
  - from lions’ lairs
  - from the dwellings of lions
  lexicon: HALOT
  rationale: מְעוֹנוֹת denotes habitations/dens. 'Lions’ dens' is concise, idiomatic,
    and preserves the dangerous imagery.
- source_word: מֵהַרְרֵי נְמֵרִים
  chosen: from mountains of leopards
  alternatives:
  - from leopard mountains
  - from hills of leopards
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'Mountains of leopards' preserves
    the poetic image and parallelism with 'lions’ dens.'
