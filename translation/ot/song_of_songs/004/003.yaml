id: SNG.4.3
reference: Song of Songs 4:3
source:
  edition: WLC
  text: כְּ/ח֤וּט הַ/שָּׁנִי֙ שִׂפְתֹתַ֔יִ/ךְ וּ/מִדְבָּרֵ֖י/ךְ נָאוֶ֑ה כְּ/פֶ֤לַח
    הָֽ/רִמּוֹן֙ רַקָּתֵ֔/ךְ מִ/בַּ֖עַד לְ/צַמָּתֵֽ/ךְ׃
translation:
  text: Your lips are like a scarlet thread, and your mouth is lovely. Your temples
    are like a slice of pomegranate behind your veil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your speech is lovely'; the Hebrew term can refer to speaking or speech,
      though here it likely points to the mouth in the poem's sequence of physical
      features.
    reason: lexical_alternative
  - marker: b
    text: Or 'through your veil'; the Hebrew expression suggests something seen through
      or from behind a covering.
    reason: lexical_alternative
  - marker: c
    text: Or 'your locks' or 'your hair' for 'your veil'; the Hebrew term is debated
      in this context.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּ/ח֤וּט
  chosen: are like a ... thread
  alternatives:
  - are like a cord
  - are like a strand
  lexicon: HALOT
  rationale: חוּט denotes a thread, cord, or string. 'Thread' best fits the delicate
    poetic comparison with lips and works naturally in English.
- source_word: הַ/שָּׁנִי
  chosen: scarlet
  alternatives:
  - crimson
  lexicon: HALOT
  rationale: שָׁנִי refers to scarlet/crimson dye. 'Scarlet' is the more established
    and vivid English equivalent in biblical and poetic usage.
- source_word: שִׂפְתֹתַיִךְ
  chosen: your lips
  lexicon: HALOT
  rationale: Dual/plural form of 'lip'; in English the natural rendering is the plural
    'lips'.
- source_word: וּ/מִדְבָּרֵיךְ
  chosen: your mouth
  alternatives:
  - your speech
  - your words
  lexicon: HALOT
  rationale: Though the noun can relate to speech or speaking, in this immediate context
    of physical beauty imagery it most likely refers metonymically to the mouth/speaking
    mouth rather than abstract speech. 'Your mouth is lovely' preserves the sensual
    parallelism.
- source_word: נָאוֶה
  chosen: lovely
  alternatives:
  - beautiful
  - comely
  lexicon: HALOT
  rationale: נָאוֶה means lovely/beautiful/fitting. 'Lovely' suits the intimate poetic
    register without sounding archaic.
- source_word: כְּ/פֶלַח
  chosen: like a slice of
  alternatives:
  - like a half of
  - like a segment of
  lexicon: HALOT
  rationale: פֶּלַח denotes a slice or segment. 'Slice' is the clearest modern English
    choice for the image of a cut pomegranate.
- source_word: הָֽ/רִמּוֹן
  chosen: pomegranate
  lexicon: HALOT
  rationale: Standard rendering of רִמּוֹן.
- source_word: רַקָּתֵךְ
  chosen: your temples
  alternatives:
  - your cheeks
  lexicon: HALOT
  rationale: רַקָּה usually denotes the temple side of the head. Some English versions
    use 'cheeks,' but 'temples' is more lexically precise, especially with the image
    of color seen through a veil.
- source_word: מִ/בַּעַד
  chosen: behind
  alternatives:
  - through
  - from behind
  lexicon: HALOT
  rationale: The preposition conveys something seen through or from behind an intervening
    object. 'Behind' is concise in English, while the footnote preserves the nuance
    'through' as a viable alternative.
- source_word: לְ/צַמָּתֵךְ
  chosen: your veil
  alternatives:
  - your locks
  - your flowing hair
  lexicon: HALOT
  rationale: צַמָּה in Song of Songs is traditionally understood as a veil or covering,
    though some take it as hair/locks. 'Veil' best fits the imagery of something partially
    concealing the temples and is the most widely defensible contextual sense.
