id: SNG.4.13
reference: Song of Songs 4:13
source:
  edition: WLC
  text: שְׁלָחַ֨יִ/ךְ֙ פַּרְדֵּ֣ס רִמּוֹנִ֔ים עִ֖ם פְּרִ֣י מְגָדִ֑ים כְּפָרִ֖ים עִם
    נְרָדִֽים־׃
translation:
  text: Your shoots are an orchard of pomegranates with choice fruits, henna with
    nards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your branches' or, less likely in this context, 'Your channels.' The
      Hebrew term is rare and debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'garden' or 'park'; the Hebrew word can denote an enclosed orchard or
      parkland.
    reason: lexical_alternative
  - marker: c
    text: Traditional English versions often have 'camphire'; the plant is more likely
      henna.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלָחַיִךְ
  chosen: your shoots
  alternatives:
  - your branches
  - your channels
  - your plants
  lexicon: HALOT
  rationale: The noun is difficult and context-sensitive. In this garden/orchard imagery,
    'shoots' best fits the metaphor of the beloved as a cultivated, fruitful garden.
    'Channels' is possible etymologically in some contexts, but here the following
    list of fruits and aromatics favors botanical growth rather than irrigation works.
- source_word: פַּרְדֵּס
  chosen: orchard
  alternatives:
  - park
  - garden
  - paradise
  lexicon: HALOT
  rationale: The term denotes an enclosed park/orchard. 'Orchard' fits the immediate
    mention of pomegranates and fruit better than the broader 'garden' and avoids
    the misleading theological overtones of 'paradise' in English.
- source_word: רִמּוֹנִים
  chosen: pomegranates
  lexicon: HALOT
  rationale: Standard rendering of the fruit named in the orchard imagery.
- source_word: פְּרִי מְגָדִים
  chosen: choice fruits
  alternatives:
  - precious fruits
  - excellent fruits
  - delicious fruits
  lexicon: HALOT
  rationale: The construct phrase refers to especially fine or choice produce. 'Choice
    fruits' is natural modern English and preserves the sense of select, desirable
    produce.
- source_word: כְּפָרִים
  chosen: henna
  alternatives:
  - camphire
  lexicon: HALOT
  rationale: The plant is commonly identified as henna (Lawsonia inermis). 'Camphire'
    reflects older English tradition but is botanically misleading in contemporary
    usage.
- source_word: נְרָדִים
  chosen: nards
  alternatives:
  - spikenards
  - nard plants
  lexicon: HALOT
  rationale: Plural form likely refers to nard plants or varieties/clusters of nard.
    'Nards' preserves the Hebrew plural and the poetic list of aromatics; 'spikenards'
    is possible but less natural in this compact poetic line.
