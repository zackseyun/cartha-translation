id: SNG.4.12
reference: Song of Songs 4:12
source:
  edition: WLC
  text: גַּ֥ן נָע֖וּל אֲחֹתִ֣/י כַלָּ֑ה גַּ֥ל נָע֖וּל מַעְיָ֥ן חָתֽוּם׀׃
translation:
  text: A locked garden is my sister, my bride; a locked spring, a sealed fountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shut' for both occurrences of 'locked.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'spring' can elsewhere mean 'heap,' but here the
      parallel with 'fountain' supports the water-source sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּן
  chosen: garden
  alternatives:
  - enclosed garden
  lexicon: HALOT
  rationale: The basic sense is 'garden.' The following participle נָעוּל supplies
    the idea of being shut/locked, so 'garden' is sufficient without importing enclosure
    twice into the noun itself.
- source_word: נָעוּל
  chosen: locked
  alternatives:
  - shut
  - barred
  - enclosed
  lexicon: HALOT
  rationale: The passive participle from נעל denotes something shut or locked. 'Locked'
    is vivid, natural English and preserves the imagery of restricted access better
    than the more generic 'shut.' It is repeated for both occurrences to reflect the
    Hebrew repetition.
- source_word: אֲחֹתִי
  chosen: my sister
  lexicon: HALOT
  rationale: In Song of Songs this is an intimate form of address, but the literal
    kinship term should be retained rather than paraphrased, in keeping with optimal
    equivalence and the book's poetic diction.
- source_word: כַלָּה
  chosen: my bride
  alternatives:
  - bride
  lexicon: HALOT
  rationale: 'The noun means ''bride.'' Adding ''my'' in English matches the appositional
    vocative sequence with the suffixed ''my sister'' and yields natural parallel
    address: ''my sister, my bride.'''
- source_word: גַּל
  chosen: spring
  alternatives:
  - heap
  - wave
  lexicon: HALOT
  rationale: In this poetic context, paired with מַעְיָן ('fountain/spring'), the
    word is best understood in the sense of a water source, traditionally rendered
    'spring.' Although the consonants can denote 'heap' elsewhere, the immediate parallelism
    strongly favors a water-image here.
- source_word: מַעְיָן
  chosen: fountain
  alternatives:
  - spring
  - well
  lexicon: HALOT
  rationale: The term denotes a source of water. Since גַּל is rendered 'spring' in
    the preceding colon, 'fountain' preserves the poetic parallel without awkward
    repetition and reflects a flowing water source.
- source_word: חָתוּם
  chosen: sealed
  alternatives:
  - closed
  - shut up
  lexicon: HALOT
  rationale: The passive participle means 'sealed.' This is the most direct rendering
    and complements 'locked' while preserving the distinct imagery of a secured water
    source.
