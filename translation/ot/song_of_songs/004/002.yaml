id: SNG.4.2
reference: Song of Songs 4:2
source:
  edition: WLC
  text: שִׁנַּ֨יִ/ךְ֙ כְּ/עֵ֣דֶר הַ/קְּצוּב֔וֹת שֶׁ/עָל֖וּ מִן הָ/רַחְצָ֑ה שֶׁ/כֻּלָּ/ם֙
    מַתְאִימ֔וֹת וְ/שַׁכֻּלָ֖ה אֵ֥ין בָּ/הֶֽם־׃
translation:
  text: Your teeth are like a flock of shorn ewes that have come up from the washing,
    all of them bearing twins, and none among them has lost her young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and none of them is bereaved.' The Hebrew keeps the sheep image rather
      than stating directly that no tooth is missing.
    reason: lexical_alternative
  - marker: b
    text: The paired-sheep imagery implies a full, evenly matched set of teeth.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁנַּיִךְ
  chosen: your teeth
  alternatives:
  - your ivory teeth
  lexicon: HALOT
  rationale: Literal reference to the woman's teeth; no embellishment is warranted
    by the Hebrew.
- source_word: כְּעֵדֶר
  chosen: like a flock
  alternatives:
  - like a herd
  lexicon: HALOT
  rationale: עֵדֶר commonly denotes a flock, especially of small livestock; 'flock'
    fits the pastoral simile naturally in English.
- source_word: הַקְּצוּבוֹת
  chosen: of shorn ewes
  alternatives:
  - that are shorn
  - newly shorn ones
  lexicon: HALOT
  rationale: From קצב in the passive participial form, referring to animals that have
    been shorn/clipped. Supplying 'ewes' makes the image intelligible in English because
    the following feminine forms continue the sheep imagery.
- source_word: שֶׁעָלוּ מִן הָרַחְצָה
  chosen: that have come up from the washing
  alternatives:
  - that have come up from washing
  - that have come up from the bath
  lexicon: HALOT
  rationale: Retains the concrete pastoral image of sheep emerging clean from being
    washed. 'The washing' reflects the noun with article without sounding overly wooden.
- source_word: שֶׁכֻּלָּם
  chosen: all of them
  alternatives:
  - every one of them
  lexicon: HALOT
  rationale: Straightforward rendering of the totalizing expression.
- source_word: מַתְאִימוֹת
  chosen: bearing twins
  alternatives:
  - twinned
  - matched in pairs
  lexicon: HALOT
  rationale: The form derives from a root meaning to be paired/twinned. In the tooth
    simile, 'bearing twins' preserves the sheep metaphor while conveying that the
    teeth are complete in matching pairs.
- source_word: וְשַׁכֻּלָה אֵין בָּהֶם
  chosen: and none among them has lost her young
  alternatives:
  - and none of them is bereaved
  - and none among them is missing its mate
  lexicon: HALOT
  rationale: שַׁכֻּלָה literally means bereaved. Within the sheep metaphor, 'has lost
    her young' is the most natural English expression, while also implying by analogy
    that no tooth is missing. The alternative 'is missing its mate' captures the implied
    sense but is less literal to the metaphor.
