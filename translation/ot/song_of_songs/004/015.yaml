id: SNG.4.15
reference: Song of Songs 4:15
source:
  edition: WLC
  text: מַעְיַ֣ן גַּנִּ֔ים בְּאֵ֖ר מַ֣יִם חַיִּ֑ים וְ/נֹזְלִ֖ים מִן לְבָנֽוֹן־׃
translation:
  text: A spring of gardens, a well of living water, and flowing streams from Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fountain of gardens'; the Hebrew מַעְיָן can denote a spring or fountainhead.
    reason: lexical_alternative
  - marker: b
    text: '''Living water'' is a Hebrew expression for fresh, flowing water, not stagnant
      water.'
    reason: cultural_note
  - marker: c
    text: Or 'and streams flowing from Lebanon' or 'and flowing waters from Lebanon.'
      The Hebrew participle emphasizes water in motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעְיָן
  chosen: spring
  alternatives:
  - fountain
  - source
  lexicon: HALOT
  rationale: Denotes a natural spring or fountainhead. 'Spring' is idiomatic modern
    English and fits the parallel with 'well' and flowing waters.
- source_word: גַּנִּים
  chosen: gardens
  alternatives:
  - garden
  lexicon: HALOT
  rationale: The plural is explicit in the Hebrew and should be preserved. It likely
    conveys abundance or multiple garden plots rather than a singular enclosed garden.
- source_word: בְּאֵר
  chosen: well
  alternatives:
  - cistern
  lexicon: HALOT
  rationale: The noun ordinarily means 'well.' 'Cistern' would suggest stored water,
    whereas the context emphasizes fresh, life-giving water.
- source_word: מַיִם חַיִּים
  chosen: living water
  alternatives:
  - fresh water
  - running water
  lexicon: HALOT
  rationale: A standard Hebrew expression for fresh, flowing, life-giving water. 'Living
    water' preserves the Hebrew imagery and its literary resonance, while remaining
    understandable in English.
- source_word: וְנֹזְלִים
  chosen: and flowing streams
  alternatives:
  - and streams flowing
  - and trickling waters
  lexicon: HALOT
  rationale: The participle means 'flowing' or 'running down.' Because English style
    prefers an expressed noun, 'streams' is supplied from the water imagery and kept
    plural to reflect the masculine plural participle. This yields natural English
    without losing the sense of movement.
- source_word: מִן לְבָנוֹן
  chosen: from Lebanon
  alternatives:
  - down from Lebanon
  lexicon: HALOT
  rationale: A straightforward geographical phrase. 'From Lebanon' preserves the source
    text; 'down from Lebanon' is interpretive and not required in the main text.
