id: SNG.4.5
reference: Song of Songs 4:5
source:
  edition: WLC
  text: שְׁנֵ֥י שָׁדַ֛יִ/ךְ כִּ/שְׁנֵ֥י עֳפָרִ֖ים תְּאוֹמֵ֣י צְבִיָּ֑ה הָ/רוֹעִ֖ים
    בַּ/שּׁוֹשַׁנִּֽים׃
translation:
  text: Your two breasts are like two fawns, twins of a gazelle, grazing among the
    lilies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'twins of a doe.' The Hebrew צְבִיָּה can refer more generally to a female
      deer-like animal; 'gazelle' is retained here to match the Song's recurring imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵי שָׁדַיִךְ
  chosen: your two breasts
  alternatives:
  - your breasts
  lexicon: HALOT
  rationale: The construct phrase explicitly includes the numeral 'two' with 'your
    breasts.' English can omit the numeral as implicit, but retaining it mirrors the
    Hebrew poetic parallelism and prepares for the comparison with 'two fawns.'
- source_word: כִּשְׁנֵי
  chosen: are like two
  alternatives:
  - like two
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, 'like/as.' English supplies 'are' naturally
    in a verbless clause.
- source_word: עֳפָרִים
  chosen: fawns
  alternatives:
  - young deer
  - young gazelles
  lexicon: HALOT
  rationale: The noun denotes young deer-like animals; 'fawns' is concise, idiomatic,
    and fits the tender imagery. 'Young gazelles' is possible, but the following 'of
    a gazelle' is better taken as specifying the mother animal in the next phrase.
- source_word: תְּאוֹמֵי
  chosen: twins
  alternatives:
  - a pair
  - twin ones
  lexicon: HALOT
  rationale: The construct form means 'twins of.' 'Twins' preserves the image of matched
    young animals and corresponds to the dual imagery of the woman's breasts.
- source_word: צְבִיָּה
  chosen: of a gazelle
  alternatives:
  - of a doe
  lexicon: HALOT
  rationale: The feminine noun can denote a female gazelle/doe. 'Gazelle' preserves
    the likely species association in Song of Songs imagery and avoids introducing
    a broader English term unless context requires it.
- source_word: הָרֹעִים
  chosen: grazing
  alternatives:
  - feeding
  - pasturing
  lexicon: HALOT
  rationale: The participle from רעה describes animals feeding. 'Grazing' is the most
    natural English choice for fawns among flowers and keeps the pastoral image vivid.
- source_word: בַּשּׁוֹשַׁנִּים
  chosen: among the lilies
  alternatives:
  - among the flowers
  - in the lilies
  lexicon: HALOT
  rationale: שׁוֹשַׁנִּים is conventionally and plausibly rendered 'lilies.' 'Among'
    is better English than a wooden 'in' for animals moving within a patch of lilies.
