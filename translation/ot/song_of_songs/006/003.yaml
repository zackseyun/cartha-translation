theological_decisions:
- issue: Relational language in the Song
  chosen_reading: Retain the poetic mutual-belonging language without allegorical
    expansion.
  alternative_readings:
  - Interpret the beloved as God or the Messiah in translation
  rationale: The Hebrew presents reciprocal love language between lovers. The translation
    should preserve the text's poetic sense and not import later allegorical or doctrinal
    interpretations into the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
