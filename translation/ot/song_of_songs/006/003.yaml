id: SNG.6.3
reference: Song of Songs 6:3
source:
  edition: WLC
  text: אֲנִ֤י לְ/דוֹדִ/י֙ וְ/דוֹדִ֣/י לִ֔/י הָ/רֹעֶ֖ה בַּ/שׁוֹשַׁנִּֽים׃ס
translation:
  text: I am my beloved's, and my beloved is mine, he who grazes among the lilies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he who shepherds among the lilies.' The Hebrew participle can denote
      grazing, pasturing, or shepherding.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: Straightforward first-person singular pronoun opening the mutual possession
    statement.
- source_word: לְדוֹדִי
  chosen: my beloved's
  alternatives:
  - for my beloved
  - to my beloved
  - my beloved
  lexicon: HALOT
  rationale: 'The preposition ל with the noun plus 1cs suffix expresses belonging/possession
    in this poetic formula; English possessive best captures the idiom here: ''I am
    my beloved''s.'' ''Beloved'' is preferred over ''lover'' to preserve the affectionate,
    covenant-like tone of the Song without oversexualizing the term.'
- source_word: וְדוֹדִי לִי
  chosen: and my beloved is mine
  alternatives:
  - and my beloved belongs to me
  - and my beloved is for me
  lexicon: HALOT
  rationale: The verbless clause is naturally supplied in English with 'is.' 'Is mine'
    mirrors the first colon and preserves the reciprocal structure and poetic balance.
- source_word: הָרֹעֶה
  chosen: he who grazes
  alternatives:
  - the one who shepherds
  - who pastures
  - who feeds his flock
  lexicon: HALOT
  rationale: The Qal participle of רעה can mean 'to pasture, graze, shepherd.' In
    this context, with 'among the lilies,' the image is pastoral and poetic. 'He who
    grazes' keeps the participial force and avoids importing an explicit object ('his
    flock') not present in the Hebrew. 'Shepherds' is possible, but 'grazes' better
    matches the intransitive pastoral imagery here.
- source_word: בַּשׁוֹשַׁנִּים
  chosen: among the lilies
  alternatives:
  - among the flowers
  - among the lotuses
  lexicon: HALOT
  rationale: שׁוֹשַׁנִּים is traditionally and plausibly rendered 'lilies.' The preposition
    ב here is best expressed as 'among' in idiomatic English for location within a
    setting. 'Lilies' preserves the recurring floral imagery in the Song more consistently
    than a generalized 'flowers.'
