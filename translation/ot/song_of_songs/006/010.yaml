id: SNG.6.10
reference: Song of Songs 6:10
source:
  edition: WLC
  text: מִי זֹ֥את הַ/נִּשְׁקָפָ֖ה כְּמוֹ שָׁ֑חַר יָפָ֣ה כַ/לְּבָנָ֗ה בָּרָה֙ כַּֽ/חַמָּ֔ה
    אֲיֻמָּ֖ה כַּ/נִּדְגָּלֽוֹת־־׃ס
translation:
  text: Who is this who looks forth like the dawn, beautiful as the moon, bright as
    the sun, awe-inspiring as bannered armies?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who is she who appears like the dawn ... ?'
    reason: lexical_alternative
  - marker: b
    text: '''Bright'' renders a Hebrew adjective that can also mean ''pure'' or ''clear.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'awe-inspiring as armies with banners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֹאת
  chosen: Who is this
  alternatives:
  - Who is she
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses the interrogative 'who' with the feminine
    demonstrative 'this.' In English, 'Who is this' preserves the rhetorical exclamation
    naturally while leaving the feminine referent implicit in context. 'Who is she'
    is possible but slightly more interpretive.
- source_word: הַנִּשְׁקָפָה
  chosen: who looks forth
  alternatives:
  - who appears
  - who gazes down
  lexicon: HALOT
  rationale: From שׁקף, 'to look out/down, appear from a vantage point.' 'Looks forth'
    preserves the visual, poetic sense without overcommitting to a specific spatial
    image. 'Appears' is smoother but less vivid; 'gazes down' is too specific here.
- source_word: כְּמוֹ שָׁחַר
  chosen: like the dawn
  alternatives:
  - like the morning dawn
  - like daybreak
  lexicon: HALOT
  rationale: שׁחר denotes dawn/daybreak. 'Like the dawn' is concise, poetic, and idiomatic.
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: The adjective denotes beauty. 'Beautiful' is clear modern English; 'fair'
    is traditional but archaic/ambiguous.
- source_word: כַלְּבָנָה
  chosen: as the moon
  alternatives:
  - like the moon
  lexicon: HALOT
  rationale: Simple simile with the definite noun 'the moon.' 'As the moon' fits the
    poetic parallelism in English.
- source_word: בָּרָה
  chosen: bright
  alternatives:
  - pure
  - clear
  - radiant
  lexicon: HALOT
  rationale: The adjective can carry senses such as pure/clear/bright. In parallel
    with moon and sun imagery, 'bright' best fits the luminous context. 'Pure' is
    possible but would shift the line toward moral or ceremonial connotations not
    demanded by the immediate imagery.
- source_word: כַּחַמָּה
  chosen: as the sun
  alternatives:
  - like the sun
  lexicon: HALOT
  rationale: Straightforward celestial comparison; 'as the sun' maintains the poetic
    cadence.
- source_word: אֲיֻמָּה
  chosen: awe-inspiring
  alternatives:
  - terrible
  - majestic
  - fearsome
  lexicon: HALOT
  rationale: The term conveys dread-inspiring impressiveness. 'Awe-inspiring' communicates
    the force in contemporary English without the misleading moral negativity of older
    'terrible.' 'Fearsome' is possible but harsher than the romantic-poetic context
    suggests.
- source_word: כַּנִּדְגָּלוֹת
  chosen: as bannered armies
  alternatives:
  - as armies with banners
  - as bannered hosts
  lexicon: HALOT
  rationale: From דגל, relating to banners/standards. The feminine plural participial/noun
    form likely evokes military companies distinguished by banners. 'Bannered armies'
    is compact, vivid, and preserves the martial metaphor.
