id: SNG.6.4
reference: Song of Songs 6:4
source:
  edition: WLC
  text: יָפָ֨ה אַ֤תְּ רַעְיָתִ/י֙ כְּ/תִרְצָ֔ה נָאוָ֖ה כִּ/ירוּשָׁלִָ֑ם אֲיֻמָּ֖ה
    כַּ/נִּדְגָּלֽוֹת׃
translation:
  text: You are beautiful, my love, like Tirzah, lovely like Jerusalem, awe-inspiring
    like bannered armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fearsome like armies with banners.' The Hebrew image is of ordered military
      ranks under standards, emphasizing imposing splendor.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָפָה
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: Predicate adjective describing the woman's beauty. 'Beautiful' is natural
    modern English and preserves the straightforward commendation better than the
    somewhat archaic 'fair.'
- source_word: רַעְיָתִי
  chosen: my love
  alternatives:
  - my darling
  - my beloved
  - my companion
  lexicon: HALOT
  rationale: A term of intimate affection used repeatedly in Song of Songs. 'My love'
    is idiomatic, readable, and fits the romantic context better than the more wooden
    'my companion.'
- source_word: כְּתִרְצָה
  chosen: like Tirzah
  alternatives:
  - as Tirzah
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. Tirzah is a place name and should be
    transliterated per project philosophy. 'Like Tirzah' preserves the simile without
    overexplaining the city's connotations in the main text.
- source_word: נָאוָה
  chosen: lovely
  alternatives:
  - comely
  - beautiful
  lexicon: HALOT
  rationale: A second adjective parallel to יָפָה. Rendering it as 'lovely' preserves
    the poetic variation rather than flattening both adjectives into the same English
    word.
- source_word: כִּירוּשָׁלִָם
  chosen: like Jerusalem
  alternatives:
  - as Jerusalem
  lexicon: HALOT
  rationale: Another comparative phrase with a proper place name. 'Jerusalem' is transliterated
    conventionally, and 'like' keeps the poetic parallelism clear.
- source_word: אֲיֻמָּה
  chosen: awe-inspiring
  alternatives:
  - terrible
  - majestic
  - fearsome
  lexicon: HALOT
  rationale: The adjective conveys something formidable or inspiring dread. In this
    love-poem context, older English 'terrible' is misleading, while 'awe-inspiring'
    captures the sense of overwhelming impressiveness without implying moral evil.
- source_word: כַּנִּדְגָּלוֹת
  chosen: like bannered armies
  alternatives:
  - like armies with banners
  - like hosts with banners
  lexicon: HALOT
  rationale: The form likely refers to military companies distinguished by banners/standards.
    'Bannered armies' is concise, poetic, and communicates the image of ordered, imposing
    martial display. The military nuance is retained rather than softened into a vague
    'hosts.'
