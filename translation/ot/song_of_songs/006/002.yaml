id: SNG.6.2
reference: Song of Songs 6:2
source:
  edition: WLC
  text: דּוֹדִ/י֙ יָרַ֣ד לְ/גַנּ֔/וֹ לַ/עֲרוּג֖וֹת הַ/בֹּ֑שֶׂם לִ/רְעוֹת֙ בַּ/גַּנִּ֔ים
    וְ/לִ/לְקֹ֖ט שֽׁוֹשַׁנִּֽים׃
translation:
  text: My beloved has gone down to his garden, to the beds of spices, to graze in
    the gardens and to gather lilies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to feed' or 'to pasture.' The Hebrew verb can denote grazing or feeding
      and may intentionally preserve pastoral ambiguity.
    reason: lexical_alternative
  - marker: b
    text: The exact flower denoted by the Hebrew may be uncertain; traditionally,
      'lilies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹדִי
  chosen: My beloved
  alternatives:
  - My lover
  lexicon: HALOT
  rationale: The noun דּוֹד in Song of Songs commonly denotes the woman's beloved.
    'My beloved' is the established and natural English equivalent that preserves
    both affection and relational focus without the narrower modern connotations of
    'lover.'
- source_word: יָרַד
  chosen: has gone down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: The qatal form narrates a completed action. 'Has gone down' gives idiomatic
    English with present relevance in context, while preserving the directional sense
    of ירד.
- source_word: לְגַנּוֹ
  chosen: to his garden
  alternatives:
  - into his garden
  lexicon: HALOT
  rationale: The preposition ל marks direction toward. 'To his garden' is a straightforward
    rendering and fits the movement expressed by ירד.
- source_word: לַעֲרוּגוֹת הַבֹּשֶׂם
  chosen: to the beds of spices
  alternatives:
  - to the beds of balsam
  - to the rows of perfume plants
  lexicon: HALOT
  rationale: עֲרוּגוֹת refers to cultivated beds or plots, and בֹּשֶׂם denotes spice,
    balsam, or fragrant substance. 'Beds of spices' is clear, natural English that
    preserves the horticultural and aromatic imagery.
- source_word: לִרְעוֹת
  chosen: to graze
  alternatives:
  - to pasture
  - to feed
  lexicon: HALOT
  rationale: The verb רעה literally means 'to pasture/graze/feed.' In Song of Songs
    it can carry pastoral imagery. 'To graze' keeps the concrete metaphor and avoids
    over-interpreting whether the beloved is feeding himself, his flock, or moving
    among the gardens.
- source_word: בַּגַּנִּים
  chosen: in the gardens
  alternatives:
  - among the gardens
  lexicon: HALOT
  rationale: The preposition ב with the plural noun is most naturally rendered 'in
    the gardens.' The plural is retained rather than harmonized to the earlier singular
    'garden,' preserving the poetic variation of the Hebrew.
- source_word: וְלִלְקֹט
  chosen: and to gather
  alternatives:
  - and to pick
  - and to pluck
  lexicon: HALOT
  rationale: לקט means to gather or pick. 'Gather' is broad and natural, fitting flowers
    without sounding overly colloquial.
- source_word: שׁוֹשַׁנִּים
  chosen: lilies
  alternatives:
  - flowers
  - lotuses
  lexicon: HALOT
  rationale: The traditional and most widely accepted rendering is 'lilies,' though
    the exact species is uncertain. Retaining 'lilies' preserves the poem's imagery
    and intertextual consistency within Song of Songs.
