id: SNG.6.5
reference: Song of Songs 6:5
source:
  edition: WLC
  text: הָסֵ֤בִּי עֵינַ֨יִ/ךְ֙ מִ/נֶּגְדִּ֔/י שֶׁ֥/הֵ֖ם הִרְהִיבֻ֑/נִי שַׂעְרֵ/ךְ֙
    כְּ/עֵ֣דֶר הָֽ/עִזִּ֔ים שֶׁ/גָּלְשׁ֖וּ מִן הַ/גִּלְעָֽד־׃
translation:
  text: Turn your eyes away from me, for they overwhelm me. Your hair is like a flock
    of goats streaming down from Gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for they disconcert me' / 'for they overpower me.' The Hebrew verb here
      is rare and its nuance is debated; the main text renders the likely sense in
      context.
    reason: lexical_alternative
  - marker: b
    text: Or 'descending from Gilead' or 'on the slopes of Gilead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָסֵבִּי
  chosen: Turn ... away
  alternatives:
  - Turn aside
  - Remove
  lexicon: HALOT
  rationale: Imperative feminine singular from סבב/סוּב in the causative stem, here
    asking the woman to turn her eyes away. 'Turn ... away' is natural English and
    preserves the direct imperative force.
- source_word: עֵינַיִךְ מִנֶּגְדִּי
  chosen: your eyes away from me
  alternatives:
  - your eyes from before me
  - your eyes from facing me
  lexicon: HALOT
  rationale: נֶגֶד with מן conveys movement away from being in front of or opposite
    the speaker. 'Away from me' is idiomatic while retaining the relational sense.
- source_word: שֶׁהֵם הִרְהִיבֻנִי
  chosen: for they overwhelm me
  alternatives:
  - for they disturb me
  - for they make me bold
  - for they disconcert me
  lexicon: HALOT
  rationale: The verb רהב in this form is difficult and context-sensitive. In this
    love-poetry context, the sense is that her eyes overpower or unsettle him. 'Overwhelm
    me' best captures the emotional force in clear modern English without overinterpreting.
- source_word: שַׂעְרֵךְ
  chosen: Your hair
  lexicon: HALOT
  rationale: Straightforward possessive noun, introducing the next comparison.
- source_word: כְּעֵדֶר הָעִזִּים
  chosen: like a flock of goats
  alternatives:
  - like a herd of goats
  lexicon: HALOT
  rationale: עֵדֶר commonly denotes a flock/herd; 'flock' works well in English for
    goats in poetic simile and matches the pastoral imagery.
- source_word: שֶׁגָּלְשׁוּ
  chosen: streaming down
  alternatives:
  - descending
  - moving down
  - flowing down
  lexicon: HALOT
  rationale: The verb גלשׁ evokes moving/sliding downward. For hair compared to goats
    on a hillside, 'streaming down' preserves the visual elegance of the simile in
    idiomatic English.
- source_word: מִן הַגִּלְעָד
  chosen: from Gilead
  alternatives:
  - down Mount Gilead
  - on the slopes of Gilead
  lexicon: HALOT
  rationale: The Hebrew says 'from Gilead.' Some English versions expand to 'Mount
    Gilead' or 'the slopes of Gilead' to clarify the image, but the source text itself
    names Gilead simply, so the translation keeps that wording.
