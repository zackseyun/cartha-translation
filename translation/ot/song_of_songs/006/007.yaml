id: SNG.6.7
reference: Song of Songs 6:7
source:
  edition: WLC
  text: כְּ/פֶ֤לַח הָ/רִמּוֹן֙ רַקָּתֵ֔/ךְ מִ/בַּ֖עַד לְ/צַמָּתֵֽ/ךְ׃
translation:
  text: Your cheeks are like a slice of pomegranate behind your veil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behind your locks' or 'through your hair,' if לְצַמָּתֵךְ is taken as
      referring to hair rather than a veil.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּפֶלַח
  chosen: like a slice
  alternatives:
  - like a section
  - like a half
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). פֶלַח denotes a split piece
    or segment. 'Slice' is natural modern English and fits the image of a cut section
    of fruit, while preserving the simile.
- source_word: הָרִמּוֹן
  chosen: of pomegranate
  alternatives:
  - of the pomegranate
  lexicon: HALOT
  rationale: The noun is 'pomegranate.' English idiom prefers 'a slice of pomegranate'
    rather than retaining the article literally. The fruit imagery is important in
    the Song's sensual-poetic register.
- source_word: רַקָּתֵךְ
  chosen: your cheeks
  alternatives:
  - your temple
  - your cheek
  lexicon: HALOT
  rationale: רַקָּה can denote the temple/side of the head, but in this poetic context
    the plural sense in English ('cheeks') best conveys the visible facial beauty
    being described. Many English versions render 'cheeks' or similar because the
    comparison is to the blush/redness seen through the veil. The singular Hebrew
    form with 2fs suffix can function collectively here.
- source_word: מִבַּעַד
  chosen: behind
  alternatives:
  - through
  - from behind
  lexicon: HALOT
  rationale: The preposition indicates something seen from behind or through an intervening
    covering. 'Behind' is concise and idiomatic with 'veil,' while still allowing
    the sense of partial visibility.
- source_word: לְצַמָּתֵךְ
  chosen: your veil
  alternatives:
  - your locks
  - your hair
  - your shawl
  lexicon: HALOT
  rationale: In Song 4:1 and 6:7 this term is commonly understood as a woman's veil
    or covering, though some take it as hair/locks. 'Veil' best fits the phrase מבעד
    ל and the imagery of beauty partially concealed. Because the lexical sense is
    debated, the alternative is preserved in a footnote.
