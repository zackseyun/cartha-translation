id: SNG.6.1
reference: Song of Songs 6:1
source:
  edition: WLC
  text: אָ֚נָה הָלַ֣ךְ דּוֹדֵ֔/ךְ הַ/יָּפָ֖ה בַּ/נָּשִׁ֑ים אָ֚נָה פָּנָ֣ה דוֹדֵ֔/ךְ
    וּ/נְבַקְשֶׁ֖/נּוּ עִמָּֽ/ךְ׃
translation:
  text: Where has your beloved gone, most beautiful among women? Where has your beloved
    turned, that we may seek him with you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Where has your beloved turned aside?' The verb can suggest changing
      direction or turning away, not merely physical movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָ֚נָה
  chosen: Where
  alternatives:
  - To where
  - Whither
  lexicon: HALOT
  rationale: Interrogative adverb asking for destination. 'Where' is natural modern
    English; 'to where' is more literal but less idiomatic.
- source_word: הָלַ֣ךְ
  chosen: has gone
  alternatives:
  - went
  - has walked
  lexicon: HALOT
  rationale: Qal perfect 3ms of הלך in context asks about the beloved's present whereabouts
    based on a completed departure. English present perfect conveys this well.
- source_word: דּוֹדֵ֔ךְ
  chosen: your beloved
  alternatives:
  - your lover
  lexicon: HALOT
  rationale: דּוֹד in Song of Songs commonly denotes the woman's beloved in an affectionate/romantic
    sense. 'Beloved' preserves the poetic register better than 'lover' without adding
    or subtracting sensual force.
- source_word: הַ/יָּפָ֖ה
  chosen: most beautiful
  alternatives:
  - beautiful
  - fairest
  lexicon: HALOT
  rationale: With the article and in apposition to the addressee, the phrase functions
    as a superlative expression in context. 'Most beautiful' communicates the sense
    clearly in modern English.
- source_word: בַּ/נָּשִׁ֑ים
  chosen: among women
  alternatives:
  - among the women
  - of women
  lexicon: HALOT
  rationale: 'Comparative/superlative idiom: ''most beautiful among women.'' Omitting
    the article in English yields the most idiomatic rendering while preserving the
    Hebrew sense.'
- source_word: פָּנָ֣ה
  chosen: has turned
  alternatives:
  - turned aside
  - gone
  - faced
  lexicon: HALOT
  rationale: Qal perfect 3ms of פנה literally means 'turned.' In this context it asks
    in what direction he has gone. 'Has turned' preserves the imagery and parallelism
    with the first colon.
- source_word: וּ/נְבַקְשֶׁ֖/נּוּ
  chosen: that we may seek him
  alternatives:
  - and we will seek him
  - so that we may look for him
  lexicon: HALOT
  rationale: 'Cohortative/imperfect 1cp with 3ms suffix after the question expresses
    purpose or intended result: they ask so they can join the search. ''That we may
    seek him'' fits the discourse and English style.'
- source_word: עִמָּֽ/ךְ
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Straightforward preposition plus 2fs suffix, indicating accompaniment
    in the search.
