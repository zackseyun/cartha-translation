id: SNG.6.6
reference: Song of Songs 6:6
source:
  edition: WLC
  text: שִׁנַּ֨יִ/ךְ֙ כְּ/עֵ֣דֶר הָֽ/רְחֵלִ֔ים שֶׁ/עָל֖וּ מִן הָ/רַחְצָ֑ה שֶׁ/כֻּלָּ/ם֙
    מַתְאִימ֔וֹת וְ/שַׁכֻּלָ֖ה אֵ֥ין בָּ/הֶֽם־׃
translation:
  text: Your teeth are like a flock of ewes that have come up from the washing, all
    of them bearing twins, and none among them has lost her young.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all of them are paired'; the line likely implies that every tooth has
      its matching counterpart.
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''bereaved.'' The metaphor suggests completeness: none is lacking
      its pair.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁנַּיִךְ
  chosen: your teeth
  alternatives:
  - your set of teeth
  lexicon: HALOT
  rationale: Direct second feminine singular possessive; the plural 'teeth' is the
    natural English equivalent.
- source_word: כְּעֵדֶר הָרְחֵלִים
  chosen: like a flock of ewes
  alternatives:
  - like a flock of sheep
  lexicon: HALOT
  rationale: רְחֵלִים specifically denotes female sheep/ewes, not sheep generically.
    'Flock of ewes' preserves the pastoral image more precisely.
- source_word: שֶׁעָלוּ מִן הָרַחְצָה
  chosen: that have come up from the washing
  alternatives:
  - that have come up from washing
  - that have come up from the bath
  lexicon: HALOT
  rationale: The relative clause describes the flock as emerging from washing. 'The
    washing' keeps the Hebrew article and evokes the image of freshly washed white
    sheep, which suits the poetic comparison to teeth.
- source_word: שֶׁכֻּלָּם מַתְאִימוֹת
  chosen: all of them bearing twins
  alternatives:
  - all of them matched
  - all of them paired
  lexicon: HALOT
  rationale: The verb/adjectival form from תאם in this context refers to being paired,
    specifically by producing twins in the sheep metaphor. Because the comparison
    is to teeth, the sense is that each tooth has its matching counterpart; 'bearing
    twins' preserves the sheep image while implying paired completeness.
- source_word: וְשַׁכֻּלָה אֵין בָּהֶם
  chosen: and none among them has lost her young
  alternatives:
  - and none among them is bereaved
  - and none of them is missing its mate
  lexicon: HALOT
  rationale: שַׁכֻּלָה literally means bereaved/one that has lost offspring. In the
    sheep metaphor this means none has lost her young; in the implied comparison to
    teeth, none is missing. The main text keeps the metaphor intact rather than flattening
    it to the implied meaning.
