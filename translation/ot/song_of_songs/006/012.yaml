id: SNG.6.12
reference: Song of Songs 6:12
source:
  edition: WLC
  text: לֹ֣א יָדַ֔עְתִּי נַפְשִׁ֣/י שָׂמַ֔תְ/נִי מַרְכְּב֖וֹת עַמִּ/י נָדִֽיב־׃
translation:
  text: Before I knew it, my desire set me among the chariots of my noble people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul set me among the chariots of my princely people'; Hebrew is
      difficult, and 'myself' or 'my heart' are also possible for 'my desire.'
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood as 'the chariots of Ammi-nadib,'
      taking the words as a proper name rather than 'my noble people.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יָדַעְתִּי
  chosen: Before I knew it
  alternatives:
  - I did not know
  - I knew not
  lexicon: HALOT
  rationale: The Hebrew is literally 'I did not know,' but in context this idiom naturally
    conveys suddenness or unawareness of how the situation developed. 'Before I knew
    it' preserves the sense in readable modern English without excessive paraphrase.
- source_word: נַפְשִׁי
  chosen: my desire
  alternatives:
  - my soul
  - myself
  - my heart
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, self, inner being, or desire/appetite depending
    on context. In this poetic line, 'my desire' best captures the impulsive inward
    movement that leads to the next clause, while 'my soul' in English would sound
    overly opaque. Because the term is ambiguous and poetically loaded, alternatives
    are preserved in a footnote.
- source_word: שָׂמַתְנִי
  chosen: set me among
  alternatives:
  - placed me in
  - made me like
  - brought me to
  lexicon: HALOT
  rationale: The verb שׂוּם means 'to put, place, set.' 'Set me among' fits the image
    of being placed amid chariots. Some interpreters take the phrase more idiomatically
    ('made me like the chariots'), but the basic locative sense is preferable in the
    main text.
- source_word: מַרְכְּבוֹת
  chosen: the chariots
  alternatives:
  - chariots
  lexicon: HALOT
  rationale: The plural noun straightforwardly means 'chariots.' The English article
    helps the phrase read naturally as a definite poetic image.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my kinsmen
  lexicon: HALOT
  rationale: The noun עַם commonly means 'people.' The suffix is first person singular,
    so 'my people' is the most direct rendering.
- source_word: נָדִיב
  chosen: noble
  alternatives:
  - princely
  - willing
  - generous
  lexicon: HALOT
  rationale: נָדִיב can mean noble, princely, or generous. Here it most plausibly
    qualifies 'my people' as noble/princely, though the syntax is difficult. 'Noble'
    is concise and idiomatic; alternatives are preserved in a footnote because the
    phrase is notoriously uncertain.
