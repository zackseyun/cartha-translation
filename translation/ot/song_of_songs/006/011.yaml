id: SNG.6.11
reference: Song of Songs 6:11
source:
  edition: WLC
  text: אֶל גִּנַּ֤ת אֱגוֹז֙ יָרַ֔דְתִּי לִ/רְא֖וֹת בְּ/אִבֵּ֣י הַ/נָּ֑חַל לִ/רְאוֹת֙
    הֲ/פָֽרְחָ֣ה הַ/גֶּ֔פֶן הֵנֵ֖צוּ הָ/רִמֹּנִֽים־׃
translation:
  text: I went down to the walnut grove to look at the shoots in the valley, to see
    whether the vine had budded, whether the pomegranates had blossomed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the garden of nuts' or 'the nut orchard.' The Hebrew likely refers to
      a cultivated grove of walnut or nut trees.
    reason: lexical_alternative
  - marker: b
    text: '''Valley'' translates a Hebrew term that can also refer to a wadi or streambed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'whether the vine had blossomed.' The Hebrew verb can cover budding or
      flowering.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּנַּת אֱגוֹז
  chosen: the walnut grove
  alternatives:
  - the garden of nuts
  - the nut orchard
  lexicon: HALOT
  rationale: גִּנָּה is a garden/grove, and אֱגוֹז denotes walnut or nut tree. 'Walnut
    grove' is idiomatic modern English and fits the cultivated setting better than
    the overly literal 'garden of nuts.'
- source_word: יָרַדְתִּי
  chosen: I went down
  alternatives:
  - I descended
  lexicon: HALOT
  rationale: The verb ירד commonly means 'go down/descend.' 'Went down' is natural
    English and preserves the directional sense without sounding stiff.
- source_word: לִרְאוֹת
  chosen: to look / to see
  alternatives:
  - to inspect
  lexicon: HALOT
  rationale: The infinitive occurs twice. Rendering the first as 'to look at' and
    the second as 'to see whether' reflects natural English while preserving the observational
    purpose in both clauses.
- source_word: בְּאִבֵּי הַנָּחַל
  chosen: the shoots in the valley
  alternatives:
  - the green plants by the wadi
  - the fresh growth in the streambed
  lexicon: HALOT
  rationale: אִבִּים refers to fresh growth/shoots, and נַחַל can denote a wadi, torrent-bed,
    or valley. 'Shoots in the valley' is readable and suits poetic English, while
    preserving the image of vegetation in a watered ravine.
- source_word: הֲפָרְחָה הַגֶּפֶן
  chosen: whether the vine had budded
  alternatives:
  - whether the vine had blossomed
  - whether the vine was in bloom
  lexicon: HALOT
  rationale: פרח can mean bud, sprout, or blossom. Because the following clause uses
    a different verb for the pomegranates, 'had budded' helps preserve the lexical
    distinction between the two plant images.
- source_word: הֵנֵצוּ הָרִמֹּנִים
  chosen: whether the pomegranates had blossomed
  alternatives:
  - whether the pomegranate trees were in bloom
  - whether the pomegranates had flowered
  lexicon: HALOT
  rationale: נוץ in this stem refers to putting forth blossoms. 'The pomegranates
    had blossomed' is concise and poetic; English can use the fruit/tree term metonymically
    as Hebrew does.
