id: SNG.6.8
reference: Song of Songs 6:8
source:
  edition: WLC
  text: שִׁשִּׁ֥ים הֵ֨מָּה֙ מְּלָכ֔וֹת וּ/שְׁמֹנִ֖ים פִּֽילַגְשִׁ֑ים וַ/עֲלָמ֖וֹת
    אֵ֥ין מִסְפָּֽר׃
translation:
  text: There are sixty queens and eighty concubines, and young women without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidens'; possibly 'virgins.' The Hebrew עֲלָמוֹת refers broadly to
      young women and does not by itself require the more specific sense 'virgins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁשִּׁים
  chosen: sixty
  lexicon: HALOT
  rationale: Cardinal number; straightforwardly rendered as 'sixty.'
- source_word: הֵמָּה
  chosen: There are
  alternatives:
  - they are
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the enumeration. In idiomatic
    English, an existential construction ('There are') better conveys the sense than
    the wooden 'they are.'
- source_word: מְּלָכוֹת
  chosen: queens
  alternatives:
  - royal women
  lexicon: HALOT
  rationale: Plural of 'queen'; in this courtly harem context, 'queens' is the natural
    and sufficiently formal rendering.
- source_word: וּשְׁמֹנִים
  chosen: and eighty
  lexicon: HALOT
  rationale: Conjunction plus cardinal number; rendered directly as 'and eighty.'
- source_word: פִּילַגְשִׁים
  chosen: concubines
  alternatives:
  - secondary wives
  lexicon: HALOT
  rationale: Standard lexical sense in royal/marital contexts. 'Concubines' is the
    established and most precise English term for women of recognized but lesser status
    than wives/queens.
- source_word: וַעֲלָמוֹת
  chosen: and young women
  alternatives:
  - and maidens
  - and virgins
  lexicon: HALOT
  rationale: עֲלָמוֹת denotes young women of marriageable age; 'young women' is the
    broadest accurate rendering. 'Virgins' is possible in some contexts but is more
    specific than the term itself requires here; 'maidens' is accurate but more archaic.
- source_word: אֵין מִסְפָּר
  chosen: without number
  alternatives:
  - beyond counting
  - there is no number
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for innumerability. 'Without number' preserves
    the elevated poetic tone while remaining natural English.
