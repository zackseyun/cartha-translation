id: SNG.6.9
reference: Song of Songs 6:9
source:
  edition: WLC
  text: אַחַ֥ת הִיא֙ יוֹנָתִ֣/י תַמָּתִ֔/י אַחַ֥ת הִיא֙ לְ/אִמָּ֔/הּ בָּרָ֥ה הִ֖יא
    לְ/יֽוֹלַדְתָּ֑/הּ רָא֤וּ/הָ בָנוֹת֙ וַֽ/יְאַשְּׁר֔וּ/הָ מְלָכ֥וֹת וּ/פִֽילַגְשִׁ֖ים
    וַֽ/יְהַלְלֽוּ/הָ׃ס
translation:
  text: My dove, my flawless one, is the only one; she is the only one of her mother,
    pure to the one who bore her. Daughters saw her and called her blessed; queens
    and concubines also praised her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my perfect one' for 'my flawless one.' The Hebrew term can convey completeness
      or blamelessness.
    reason: lexical_alternative
  - marker: b
    text: Or 'choice' / 'radiant' for 'pure.' The Hebrew adjective may emphasize purity
      or exceptional quality.
    reason: lexical_alternative
  - marker: c
    text: '''Daughters'' may refer more broadly to young women or maidens in the poem''s
      idiom.'
    reason: cultural_note
lexical_decisions:
- source_word: יוֹנָתִי
  chosen: my dove
  alternatives:
  - my darling
  lexicon: HALOT
  rationale: Literally 'my dove.' In Song of Songs this is an endearment and imagery
    of beauty/gentleness; retaining the bird image preserves the poetic metaphor rather
    than flattening it to a generic term of affection.
- source_word: תַמָּתִי
  chosen: my flawless one
  alternatives:
  - my perfect one
  - my blameless one
  lexicon: HALOT
  rationale: From תם/תמה, conveying completeness, wholeness, or blameless beauty.
    'Flawless' fits the romantic-poetic context better than the more moralized 'blameless'
    and sounds more natural than 'perfect' in modern English while preserving the
    superlative sense.
- source_word: אַחַת הִיא
  chosen: is the only one
  alternatives:
  - is one
  - is unique
  lexicon: HALOT
  rationale: The repeated phrase emphasizes singularity and exclusiveness, not merely
    numerical identity. 'The only one' best captures the force in context.
- source_word: לְאִמָּהּ
  chosen: of her mother
  alternatives:
  - to her mother
  - for her mother
  lexicon: HALOT
  rationale: The preposition ל here expresses relation with the following predicate,
    indicating status in relation to her mother. English idiom is best conveyed by
    'of her mother' in the phrase 'the only one of her mother.'
- source_word: בָּרָה
  chosen: pure
  alternatives:
  - choice
  - clear
  - radiant
  lexicon: HALOT
  rationale: The adjective can denote purity/cleanness and by extension selectness.
    In parallel with her singular status and in relation to the one who bore her,
    'pure' is the most straightforward rendering, while preserving the elevated poetic
    register.
- source_word: לְיוֹלַדְתָּהּ
  chosen: to the one who bore her
  alternatives:
  - to her mother who gave birth to her
  - to her bearer
  lexicon: HALOT
  rationale: The participial form means 'the one bearing/giving birth to her.' 'To
    the one who bore her' is natural English and preserves the relational sense introduced
    by ל.
- source_word: רָאוּהָ
  chosen: saw her
  alternatives:
  - looked upon her
  lexicon: HALOT
  rationale: Simple past narrative verb; 'saw her' is sufficient and idiomatic.
- source_word: בָנוֹת
  chosen: daughters
  alternatives:
  - young women
  - maidens
  lexicon: HALOT
  rationale: Literally 'daughters.' In Song of Songs it can denote women/maidens,
    but retaining 'daughters' preserves the poetic diction and intertextual resonance
    within the book.
- source_word: וַיְאַשְּׁרוּהָ
  chosen: called her blessed
  alternatives:
  - pronounced her happy
  - declared her fortunate
  lexicon: HALOT
  rationale: From אשר in the Piel, meaning to declare blessed/happy. 'Called her blessed'
    is idiomatic biblical English and preserves the evaluative force.
- source_word: מְלָכוֹת
  chosen: queens
  lexicon: HALOT
  rationale: Straightforward plural noun.
- source_word: וּפִילַגְשִׁים
  chosen: and concubines also
  alternatives:
  - and concubines
  lexicon: HALOT
  rationale: The conjunction links a second group with queens; adding 'also' in English
    clarifies that both groups joined in the action, matching the Hebrew coordination
    and improving flow.
- source_word: וַיְהַלְלוּהָ
  chosen: praised her
  alternatives:
  - extolled her
  lexicon: HALOT
  rationale: From הלל, 'praise.' 'Praised her' is clear and natural; 'extolled' is
    possible but less accessible.
