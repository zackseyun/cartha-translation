theological_decisions:
- issue: Interpretation of the woman's speech
  chosen_reading: Render as a literal domestic objection without importing sexual
    euphemism into the main text.
  alternative_readings:
  - Read the clothing and feet language as primarily erotic metaphor
  rationale: Song of Songs often permits layered readings, but this verse's immediate
    wording is concrete and domestic. Optimal equivalence preserves the literal sense
    in the main text and leaves broader literary or symbolic readings to interpretation
    rather than translation.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import claims the text does not make.
