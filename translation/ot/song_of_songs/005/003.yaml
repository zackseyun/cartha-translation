id: SNG.5.3
reference: Song of Songs 5:3
source:
  edition: WLC
  text: פָּשַׁ֨טְתִּי֙ אֶת כֻּתָּנְתִּ֔/י אֵיכָ֖כָה אֶלְבָּשֶׁ֑/נָּה רָחַ֥צְתִּי אֶת
    רַגְלַ֖/י אֵיכָ֥כָה אֲטַנְּפֵֽ/ם־־׃
translation:
  text: I have taken off my tunic—how can I put it on again? I have washed my feet—how
    can I soil them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have stripped off my garment—how could I put it on?'
    reason: lexical_alternative
  - marker: b
    text: Or 'how can I dirty them?'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּשַׁטְתִּי
  chosen: I have taken off
  alternatives:
  - I have stripped off
  - I have removed
  lexicon: HALOT
  rationale: The verb means to strip off or remove clothing. 'Taken off' is natural
    modern English and fits the domestic context without sounding overly abrupt.
- source_word: כֻּתָּנְתִּי
  chosen: my tunic
  alternatives:
  - my garment
  - my robe
  lexicon: HALOT
  rationale: כֻּתֹּנֶת refers to a basic body garment or tunic. 'Tunic' is more specific
    than the generic 'garment' and better reflects the underlying item than 'robe,'
    which can suggest a different style.
- source_word: אֵיכָכָה
  chosen: how can I
  alternatives:
  - how could I
  - how am I to
  lexicon: HALOT
  rationale: The interrogative expresses reluctance or practical objection. 'How can
    I' captures the idiomatic force in clear modern English.
- source_word: אֶלְבָּשֶׁנָּה
  chosen: put it on again
  alternatives:
  - clothe myself with it
  - wear it again
  lexicon: HALOT
  rationale: The verb is 'put on/wear,' with the 3fs suffix referring back to the
    feminine noun 'tunic.' 'Put it on again' makes the implied reversal explicit in
    idiomatic English.
- source_word: רָחַצְתִּי
  chosen: I have washed
  alternatives:
  - I washed
  lexicon: HALOT
  rationale: The perfect here presents a completed present-relevant action. English
    present perfect fits the sequence of excuses better than a simple past.
- source_word: רַגְלַי
  chosen: my feet
  alternatives:
  - my foot
  lexicon: HALOT
  rationale: The dual/plural form here naturally refers to both feet. 'My feet' is
    the idiomatic English equivalent.
- source_word: אֲטַנְּפֵם
  chosen: soil them
  alternatives:
  - dirty them
  - defile them
  lexicon: HALOT
  rationale: The piel of טנף means to make dirty or soil. 'Soil them' preserves the
    concrete sense and fits the poetic parallelism. 'Defile' would over-spiritualize
    a plainly physical image.
