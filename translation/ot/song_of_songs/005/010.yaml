id: SNG.5.10
reference: Song of Songs 5:10
source:
  edition: WLC
  text: דּוֹדִ֥/י צַח֙ וְ/אָד֔וֹם דָּג֖וּל מֵ/רְבָבָֽה׃
translation:
  text: My beloved is radiant and ruddy, distinguished among ten thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'conspicuous among ten thousand,' or more literally, 'bannered among
      ten thousand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: In Song of Songs, דּוֹד commonly denotes the woman's beloved in a romantic
    sense. 'My beloved' is idiomatic, dignified modern English and fits the book's
    recurring relational language better than the more sexually explicit 'my lover'
    in this context.
- source_word: צַח
  chosen: radiant
  alternatives:
  - bright
  - gleaming
  - fair
  lexicon: HALOT
  rationale: The adjective conveys brightness/clarity/shining appearance. 'Radiant'
    captures visible brilliance in natural English without importing the older English
    ambiguity of 'fair,' which can suggest beauty or light complexion rather than
    luminosity.
- source_word: וְאָדוֹם
  chosen: and ruddy
  alternatives:
  - and red
  - and rosy
  lexicon: HALOT
  rationale: אָדוֹם denotes redness. 'Ruddy' is the established natural English descriptor
    for healthy reddish coloring in a person's appearance and avoids the awkwardness
    of 'red' as a bodily description.
- source_word: דָּגוּל
  chosen: distinguished
  alternatives:
  - conspicuous
  - bannered
  - preeminent
  lexicon: HALOT
  rationale: The passive form likely conveys being marked out, conspicuous, or distinguished.
    'Distinguished' communicates prominence among others in smooth English. The more
    literal 'bannered' is possible etymologically but obscure in context; 'preeminent'
    is interpretive and slightly stronger.
- source_word: מֵרְבָבָה
  chosen: among ten thousand
  alternatives:
  - out of ten thousand
  - above ten thousand
  lexicon: HALOT
  rationale: The preposition מִן with רְבָבָה here expresses comparison or selection
    from a vast multitude. 'Among ten thousand' is a natural English idiom conveying
    his outstanding status within a countless host, matching the poetic sense.
