id: SNG.5.11
reference: Song of Songs 5:11
source:
  edition: WLC
  text: רֹאשׁ֖/וֹ כֶּ֣תֶם פָּ֑ז קְוּצּוֹתָי/ו֙ תַּלְתַּלִּ֔ים שְׁחֹר֖וֹת כָּ/עוֹרֵֽב׃
translation:
  text: His head is purest gold; his locks are wavy, black as a raven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fine gold' for 'purest gold'; the Hebrew uses two gold terms together
      for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'his curls are in waves' or 'his tresses are curly'; the Hebrew term
      is rare and poetic.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁוֹ
  chosen: His head
  alternatives:
  - His chief part
  lexicon: HALOT
  rationale: The noun רֹאשׁ literally means 'head.' In this poetic blazon of the beloved's
    body, the concrete anatomical sense is primary.
- source_word: כֶּתֶם פָּז
  chosen: purest gold
  alternatives:
  - fine gold
  - refined gold
  lexicon: HALOT
  rationale: The paired terms intensify the image of precious, high-quality gold.
    Rendering them together as 'purest gold' preserves the poetic force in natural
    English better than a wooden 'gold of fine gold,' while still reflecting the superlative
    quality.
- source_word: קְוּצּוֹתָיו
  chosen: his locks
  alternatives:
  - his curls
  - his tresses
  lexicon: HALOT
  rationale: The term refers to locks or hanging curls of hair. 'Locks' is idiomatic,
    poetic, and readable modern English.
- source_word: תַּלְתַּלִּים
  chosen: wavy
  alternatives:
  - curly
  - in curls
  lexicon: HALOT
  rationale: This rare poetic term describes the form of the hair, likely flowing
    in waves or curls. 'Wavy' fits the parallel with 'locks' and avoids over-specifying
    beyond the uncertain lexical nuance.
- source_word: שְׁחֹרוֹת
  chosen: black
  alternatives:
  - dark
  lexicon: HALOT
  rationale: The adjective straightforwardly denotes blackness. 'Black' is the most
    direct rendering.
- source_word: כָּעוֹרֵב
  chosen: as a raven
  alternatives:
  - like a raven
  lexicon: HALOT
  rationale: The comparison uses the preposition כ and the noun 'raven' to evoke glossy
    black color. 'As a raven' is a natural poetic simile in English.
