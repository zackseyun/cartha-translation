id: SNG.5.2
reference: Song of Songs 5:2
source:
  edition: WLC
  text: אֲנִ֥י יְשֵׁנָ֖ה וְ/לִבִּ֣/י עֵ֑ר ק֣וֹל דּוֹדִ֣/י דוֹפֵ֗ק פִּתְחִי לִ֞/י אֲחֹתִ֤/י
    רַעְיָתִ/י֙ יוֹנָתִ֣/י תַמָּתִ֔/י שֶׁ/רֹּאשִׁ/י֙ נִמְלָא טָ֔ל קְוֻּצּוֹתַ֖/י רְסִ֥יסֵי
    לָֽיְלָה׀־־׃
translation:
  text: 'I was asleep, but my heart was awake. The sound of my beloved knocking: “Open
    to me, my sister, my darling, my dove, my blameless one, for my head is drenched
    with dew, my locks with the drops of the night.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The voice of my beloved' for 'The sound of my beloved.' Hebrew qol can
      mean either 'sound' or 'voice' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'my perfect one' or 'my undefiled one' for 'my blameless one.' The Hebrew
      term conveys completeness, innocence, or purity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשֵׁנָה
  chosen: was asleep
  alternatives:
  - sleeping
  lexicon: HALOT
  rationale: The feminine singular adjective functions predicatively with אֲנִי. 'Was
    asleep' reads naturally in English and fits the scene-setting aspect better than
    the more progressive 'sleeping.'
- source_word: לִבִּי עֵר
  chosen: my heart was awake
  alternatives:
  - my heart was alert
  - my mind was awake
  lexicon: HALOT
  rationale: לֵב can denote the inner self, but 'heart' preserves the Hebrew imagery
    and poetic tension. עֵר is rendered 'awake' as the natural antonym to 'asleep.'
- source_word: קוֹל דּוֹדִי
  chosen: The sound of my beloved
  alternatives:
  - A sound—my beloved!
  - The voice of my beloved
  lexicon: HALOT
  rationale: קוֹל can mean 'sound' or 'voice.' Because the following participle דוֹפֵק
    identifies the audible action, 'The sound of my beloved' best captures the abrupt
    perception without over-specifying speech. 'Voice' is possible and worth preserving
    in a footnote.
- source_word: דוֹפֵק
  chosen: knocking
  alternatives:
  - is knocking
  - knocks
  lexicon: HALOT
  rationale: The participle conveys ongoing action. English poetic style allows the
    verbless exclamation 'The sound of my beloved knocking' to preserve the vivid
    immediacy.
- source_word: פִּתְחִי לִי
  chosen: Open to me
  alternatives:
  - Open for me
  - Open up for me
  lexicon: HALOT
  rationale: Imperative plus לִי is naturally rendered 'Open to me.' This is idiomatic
    and retains the direct appeal.
- source_word: אֲחֹתִי
  chosen: my sister
  lexicon: HALOT
  rationale: A conventional term of endearment in the Song. It should be translated
    literally rather than paraphrased away, preserving the source imagery.
- source_word: רַעְיָתִי
  chosen: my darling
  alternatives:
  - my love
  - my companion
  lexicon: HALOT
  rationale: The term denotes the beloved female partner. 'My darling' is affectionate,
    natural modern English; 'my love' is also possible but can sound slightly flatter
    in a string of endearments.
- source_word: יוֹנָתִי
  chosen: my dove
  lexicon: HALOT
  rationale: The metaphor is transparent and should be preserved literally.
- source_word: תַמָּתִי
  chosen: my blameless one
  alternatives:
  - my perfect one
  - my undefiled one
  lexicon: HALOT
  rationale: From תם/תמם, conveying completeness, innocence, or blamelessness. 'My
    blameless one' avoids misleading modern connotations of flawlessness in 'perfect'
    while preserving moral/relational purity better than the archaic-sounding 'undefiled.'
- source_word: שֶׁרֹּאשִׁי נִמְלָא טָל
  chosen: for my head is drenched with dew
  alternatives:
  - for my head is filled with dew
  - because my head is wet with dew
  lexicon: HALOT
  rationale: The conjunction introduces the reason for the plea. נִמְלָא literally
    'is filled' is idiomatically expressed as 'is drenched' in English to match the
    physical image.
- source_word: קְוּצּוֹתַי
  chosen: my locks
  alternatives:
  - my hair
  - my curls
  lexicon: HALOT
  rationale: The word refers to locks of hair. 'Locks' is concise, poetic, and natural
    in this context.
- source_word: רְסִיסֵי לָיְלָה
  chosen: the drops of the night
  alternatives:
  - night mist
  - night dew
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the poetic parallel with dew. 'Night
    mist' is interpretive; 'drops of the night' keeps the imagery open and evocative.
