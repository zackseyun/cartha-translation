id: SNG.5.4
reference: Song of Songs 5:4
source:
  edition: WLC
  text: דּוֹדִ֗/י שָׁלַ֤ח יָד/וֹ֙ מִן הַ/חֹ֔ר וּ/מֵעַ֖/י הָמ֥וּ עָלָֽי/ו־׃
translation:
  text: My beloved put his hand through the opening, and my inward parts trembled
    for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the hole.' The Hebrew is literally 'from the hole,' likely referring
      to an opening in the door.
    reason: lexical_alternative
  - marker: b
    text: Or 'my insides were stirred for him' or 'my heart was moved for him.' The
      Hebrew speaks of deep inward emotion in bodily terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: The noun denotes the woman’s beloved in the Song. 'My beloved' preserves
    the relational and poetic sense without the more overtly sexual nuance of 'my
    lover,' though that nuance can be contextually present in the book.
- source_word: שָׁלַח
  chosen: put
  alternatives:
  - sent
  - stretched out
  lexicon: HALOT
  rationale: Although the verb commonly means 'send,' in this idiom with 'hand' it
    means to extend or put forth the hand. 'Put' is natural English in this context
    and fits the action of reaching through an opening.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: A straightforward rendering of the noun with pronominal suffix; singular
    is retained.
- source_word: מִן הַחֹר
  chosen: through the opening
  alternatives:
  - from the hole
  - through the hole
  lexicon: HALOT
  rationale: The phrase refers to an opening or hole in/at the door by which the beloved
    reaches in. 'Through the opening' is idiomatic modern English and avoids an overly
    crude or potentially misleading literalism while preserving the concrete image.
- source_word: וּמֵעַי
  chosen: my inward parts
  alternatives:
  - my heart
  - my insides
  - my bowels
  lexicon: HALOT
  rationale: The Hebrew term literally refers to inner organs and, by extension, deep
    emotions or inward being. 'My inward parts' preserves the embodied Hebrew imagery
    better than the interpretive 'my heart,' while avoiding the archaic or distracting
    'bowels.'
- source_word: הָמוּ
  chosen: trembled
  alternatives:
  - were stirred
  - yearned
  - were in turmoil
  lexicon: HALOT
  rationale: The verb denotes inner agitation, stirring, or tumult. 'Trembled' captures
    the visceral emotional movement in concise poetic English, though the semantic
    range includes being stirred or moved.
- source_word: עָלָיו
  chosen: for him
  alternatives:
  - because of him
  - over him
  lexicon: HALOT
  rationale: With this verb and emotional context, the preposition expresses movement
    of feeling toward the beloved. 'For him' is the most natural idiomatic rendering
    in English, while 'over him' would sound opaque.
