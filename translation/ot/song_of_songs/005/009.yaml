id: SNG.5.9
reference: Song of Songs 5:9
source:
  edition: WLC
  text: מַה דּוֹדֵ֣/ךְ מִ/דּ֔וֹד הַ/יָּפָ֖ה בַּ/נָּשִׁ֑ים מַה דּוֹדֵ֣/ךְ מִ/דּ֔וֹד
    שֶׁ/כָּ֖כָה הִשְׁבַּעְתָּֽ/נוּ־־׃
translation:
  text: What is your beloved more than another beloved, most beautiful among women?
    What is your beloved more than another beloved, that you have made us swear like
    this?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your lover' throughout the verse; Hebrew דּוֹד can denote a beloved
      in a romantic sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'you adjured us' or 'you put us under oath'; the Hebrew verb means to
      cause someone to swear.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What is
  alternatives:
  - How is
  lexicon: HALOT
  rationale: Interrogative introducing a comparative question. 'What is' is idiomatic
    in English before the repeated phrase 'more than another beloved,' while preserving
    the Hebrew's direct interrogative force.
- source_word: דּוֹדֵךְ
  chosen: your beloved
  alternatives:
  - your lover
  lexicon: HALOT
  rationale: דּוֹד in Song of Songs commonly denotes the woman's beloved/lover. 'Beloved'
    preserves the poetic and relational sense without sounding overly erotic or flattening
    the literary register.
- source_word: מִדּוֹד
  chosen: more than another beloved
  alternatives:
  - than another lover
  - above another beloved
  lexicon: HALOT
  rationale: 'The preposition מִן here marks comparison: ''more than/above.'' Repeating
    ''beloved'' reflects the Hebrew wordplay and parallelism. ''Another beloved''
    is more natural than a bare ''a beloved'' in English in this comparative setting.'
- source_word: הַיָּפָה בַּנָּשִׁים
  chosen: most beautiful among women
  alternatives:
  - fairest among women
  - beautiful among women
  lexicon: HALOT
  rationale: A superlative sense is conveyed by the adjective with ב plus plural noun
    in context. 'Most beautiful among women' is clear modern English; 'fairest' is
    traditional but archaic.
- source_word: שֶׁכָּכָה
  chosen: like this
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: This adverb points to manner or degree. 'Like this' is natural contemporary
    English and fits the women's question about the intensity of her charge.
- source_word: הִשְׁבַּעְתָּנוּ
  chosen: you have made us swear
  alternatives:
  - you adjured us
  - you put us under oath
  lexicon: HALOT
  rationale: Hiphil of שבע means to cause someone to swear, to adjure. 'Made us swear'
    is transparent and accessible; 'adjured' is precise but less readable for the
    target audience.
