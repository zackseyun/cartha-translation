id: SNG.5.8
reference: Song of Songs 5:8
source:
  edition: WLC
  text: הִשְׁבַּ֥עְתִּי אֶתְ/כֶ֖ם בְּנ֣וֹת יְרוּשָׁלִָ֑ם אִֽם תִּמְצְאוּ֙ אֶת דּוֹדִ֔/י
    מַה תַּגִּ֣ידוּ ל֔/וֹ שֶׁ/חוֹלַ֥ת אַהֲבָ֖ה אָֽנִי־־־׃
translation:
  text: 'I adjure you, daughters of Jerusalem: if you find my beloved, what will you
    tell him? That I am sick with love.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that I am lovesick.' The Hebrew literally says 'sick with love.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁבַּעְתִּי
  chosen: I adjure you
  alternatives:
  - I put you under oath
  - I charge you
  lexicon: HALOT
  rationale: Hiphil of שׁבע in this idiom means to place someone under oath or solemnly
    charge them. 'Adjure' preserves the formal, urgent tone better than a flatter
    'charge,' while remaining concise in English.
- source_word: בְּנוֹת יְרוּשָׁלִָם
  chosen: daughters of Jerusalem
  alternatives:
  - young women of Jerusalem
  - women of Jerusalem
  lexicon: HALOT
  rationale: A conventional vocative in the Song. 'Daughters of Jerusalem' is the
    most direct and literarily faithful rendering; alternatives are interpretive expansions
    of the social sense.
- source_word: אִם תִּמְצְאוּ
  chosen: if you find
  alternatives:
  - when you find
  lexicon: HALOT
  rationale: אִם normally marks a conditional 'if.' Some English versions use 'when'
    to reflect expectation, but the Hebrew form itself is conditional, so 'if' better
    preserves the source wording and tension.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: דּוֹד in the Song denotes the beloved male partner. 'My beloved' is idiomatic,
    dignified, and consistent with the book's poetic register; 'my lover' is possible
    but narrower and more explicit than the Hebrew requires.
- source_word: מַה תַּגִּידוּ לוֹ
  chosen: what will you tell him?
  alternatives:
  - what shall you tell him?
  - what are you to tell him?
  lexicon: HALOT
  rationale: The interrogative מַה with Hiphil of נגד asks what message they should
    convey. 'Will you tell' reads naturally in English while preserving the direct
    question.
- source_word: שֶׁחוֹלַת אַהֲבָה
  chosen: that I am sick with love
  alternatives:
  - that I am lovesick
  - that I am faint with love
  lexicon: HALOT
  rationale: The phrase literally describes being sick from love. 'Sick with love'
    keeps the metaphor transparent and close to the Hebrew; 'lovesick' is idiomatic
    and valid but slightly more interpretive/compressed.
- source_word: אַהֲבָה
  chosen: love
  lexicon: HALOT
  rationale: Standard sense of אַהֲבָה. 'Love' is the natural and consistent rendering.
