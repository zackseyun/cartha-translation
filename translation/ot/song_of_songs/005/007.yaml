id: SNG.5.7
reference: Song of Songs 5:7
source:
  edition: WLC
  text: מְצָאֻ֧/נִי הַ/שֹּׁמְרִ֛ים הַ/סֹּבְבִ֥ים בָּ/עִ֖יר הִכּ֣וּ/נִי פְצָע֑וּ/נִי
    נָשְׂא֤וּ אֶת רְדִידִ/י֙ מֵֽ/עָלַ֔/י שֹׁמְרֵ֖י הַ/חֹמֽוֹת־׃
translation:
  text: The watchmen who go about the city found me; they struck me, they wounded
    me; the keepers of the walls took my cloak from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who patrol the city.' The Hebrew participle means 'going around' or
      'circling,' and in context likely refers to making rounds as city watchmen.
    reason: lexical_alternative
  - marker: b
    text: Or 'took away my veil' or 'lifted my shawl off me.' The Hebrew רְדִיד refers
      to an outer wrap or covering garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְצָאֻנִי
  chosen: found me
  alternatives:
  - came upon me
  - met me
  lexicon: HALOT
  rationale: From מצא, straightforwardly 'find.' In context of the woman searching
    through the city, 'found me' is the most natural and direct rendering.
- source_word: הַשֹּׁמְרִים
  chosen: the watchmen
  alternatives:
  - the guards
  - the keepers
  lexicon: HALOT
  rationale: From שמר, participial noun for those keeping watch. 'Watchmen' fits the
    urban/night setting and pairs naturally with the following participle and later
    'keepers of the walls.'
- source_word: הַסֹּבְבִים בָּעִיר
  chosen: who go about the city
  alternatives:
  - who patrol the city
  - who make their rounds in the city
  lexicon: HALOT
  rationale: From סבב, 'go around, circle.' 'Go about the city' preserves the participial
    sense without over-specifying a technical police function, though patrol is contextually
    possible.
- source_word: הִכּוּנִי
  chosen: they struck me
  alternatives:
  - they beat me
  - they hit me
  lexicon: HALOT
  rationale: From נכה, a broad verb for striking. 'Struck me' is accurate and leaves
    the degree of violence to be intensified by the next verb.
- source_word: פְצָעוּנִי
  chosen: they wounded me
  alternatives:
  - they injured me
  lexicon: HALOT
  rationale: From פצע, 'wound, injure.' 'Wounded me' preserves the stronger, more
    violent sense and distinguishes it from the previous verb.
- source_word: נָשְׂאוּ אֶת רְדִידִי מֵעָלַי
  chosen: took my cloak from me
  alternatives:
  - lifted my shawl off me
  - took away my veil
  lexicon: HALOT
  rationale: נשא with מֵעָלַי here means removing/taking away from upon her. רדיד
    denotes an outer wrap/veil-like garment. 'Cloak' is a readable modern choice for
    an outer covering without implying a full face veil; alternatives are possible
    and worth preserving.
- source_word: שֹׁמְרֵי הַחֹמוֹת
  chosen: the keepers of the walls
  alternatives:
  - the watchmen of the walls
  - the guards of the walls
  lexicon: HALOT
  rationale: Construct phrase identifying these men as those guarding the walls. 'Keepers
    of the walls' is a fairly literal rendering that preserves the parallel with the
    earlier שֹׁמְרִים while avoiding awkward repetition of 'watchmen' in English.
