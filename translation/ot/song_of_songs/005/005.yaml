id: SNG.5.5
reference: Song of Songs 5:5
source:
  edition: WLC
  text: קַ֥מְתִּֽי אֲנִ֖י לִ/פְתֹּ֣חַ לְ/דוֹדִ֑/י וְ/יָדַ֣/י נָֽטְפוּ מ֗וֹר וְ/אֶצְבְּעֹתַ/י֙
    מ֣וֹר עֹבֵ֔ר עַ֖ל כַּפּ֥וֹת הַ/מַּנְעֽוּל־׃
translation:
  text: I arose to open to my beloved, and my hands dripped with myrrh, my fingers
    with flowing myrrh, on the handles of the bolt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'liquid myrrh' or 'running myrrh' for 'flowing myrrh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the handles of the lock' or 'the latch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַמְתִּי אֲנִי
  chosen: I arose
  alternatives:
  - I got up
  - I rose
  lexicon: HALOT
  rationale: Qal perfect 1cs of קום with explicit pronoun for emphasis. 'I arose'
    preserves the literary tone and the marked first-person subject without becoming
    archaic.
- source_word: לִפְתֹּחַ
  chosen: to open
  lexicon: HALOT
  rationale: Infinitive construct of פתח with straightforward sense 'to open,' here
    referring to opening the door.
- source_word: לְדוֹדִי
  chosen: to my beloved
  alternatives:
  - for my beloved
  lexicon: HALOT
  rationale: דּוֹד in Song of Songs commonly denotes the woman's lover/beloved. 'To
    my beloved' fits the idiom of opening the door to someone.
- source_word: יָדַי נָטְפוּ מוֹר
  chosen: my hands dripped with myrrh
  alternatives:
  - my hands dropped myrrh
  - my hands flowed with myrrh
  lexicon: HALOT
  rationale: נטף means 'to drip, drop.' 'Dripped with myrrh' is idiomatic English
    and preserves the sensual imagery.
- source_word: אֶצְבְּעֹתַי
  chosen: my fingers
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for fingers.
- source_word: מוֹר עֹבֵר
  chosen: flowing myrrh
  alternatives:
  - liquid myrrh
  - running myrrh
  - choice myrrh
  lexicon: HALOT
  rationale: עֹבֵר literally means 'passing, flowing over.' In this context it likely
    describes myrrh in a flowing/liquid state rather than a static substance. 'Flowing
    myrrh' preserves the verbal imagery and avoids overinterpretation.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: 'The preposition most naturally indicates contact/location here: the
    myrrh is on the door hardware.'
- source_word: כַּפּוֹת
  chosen: handles
  alternatives:
  - palms
  - plates
  - knobs
  lexicon: HALOT
  rationale: Though כף often means 'palm,' in this architectural context with מנעול
    it refers to the hand-grips or handles associated with the locking mechanism.
    'Handles' is the clearest modern English equivalent.
- source_word: הַמַּנְעוּל
  chosen: the bolt
  alternatives:
  - the lock
  - the latch
  lexicon: HALOT
  rationale: מנעול denotes a locking device or bolt. 'Bolt' best fits ancient door
    hardware and explains the associated handles; 'lock' would sound more modern and
    mechanical.
