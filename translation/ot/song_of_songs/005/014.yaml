id: SNG.5.14
reference: Song of Songs 5:14
source:
  edition: WLC
  text: יָדָי/ו֙ גְּלִילֵ֣י זָהָ֔ב מְמֻלָּאִ֖ים בַּ/תַּרְשִׁ֑ישׁ מֵעָי/ו֙ עֶ֣שֶׁת
    שֵׁ֔ן מְעֻלֶּ֖פֶת סַפִּירִֽים׃
translation:
  text: His hands are rods of gold, set with beryl; his abdomen is polished ivory,
    covered with sapphires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set with topaz' or 'set with chrysolite'; the precise identification
      of the stone named by Hebrew תַּרְשִׁישׁ is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'rings of gold.' The Hebrew term refers to rounded golden forms and may
      evoke jewelry-like craftsmanship.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'his inward parts' or 'his belly'; here the context favors a literal
      bodily description.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדָיו
  chosen: his hands
  alternatives:
  - his arms
  lexicon: HALOT
  rationale: The noun יָד commonly means 'hand' but can extend to the arm. In this
    poetic body-description context, 'hands' is the most direct and conventional rendering,
    preserving the concrete imagery.
- source_word: גְּלִילֵי זָהָב
  chosen: rods of gold
  alternatives:
  - cylinders of gold
  - rings of gold
  lexicon: HALOT
  rationale: גְּלִילִים denotes rounded or cylindrical forms. 'Rods' communicates
    elongated rounded objects better in English than 'cylinders,' while avoiding the
    potentially misleading 'rings,' though that is a traditional option.
- source_word: מְמֻלָּאִים בַּתַּרְשִׁישׁ
  chosen: set with beryl
  alternatives:
  - filled with tarshish-stone
  - set with topaz
  - set with chrysolite
  lexicon: HALOT
  rationale: The passive participle 'filled' in jewelry imagery is idiomatically rendered
    'set with.' תַּרְשִׁישׁ names a precious stone of uncertain exact identification;
    'beryl' is a common modern translation, while alternatives remain possible and
    should be preserved in a footnote due to lexical uncertainty.
- source_word: מֵעָיו
  chosen: his abdomen
  alternatives:
  - his belly
  - his inward parts
  lexicon: HALOT
  rationale: מֵעֶה can refer literally to the belly/abdomen or figuratively to inward
    parts. In this physical praise poem, the literal bodily sense is primary. 'Abdomen'
    is more natural and dignified in modern English than 'bowels' or 'inward parts,'
    and less colloquial than 'belly'.
- source_word: עֶשֶׁת שֵׁן
  chosen: polished ivory
  alternatives:
  - a panel of ivory
  - carved ivory
  - ivory work
  lexicon: HALOT
  rationale: The phrase denotes worked or fashioned ivory. 'Polished ivory' captures
    the sense of refined, crafted ivory in a way that fits the poetic comparison.
- source_word: מְעֻלֶּפֶת סַפִּירִים
  chosen: covered with sapphires
  alternatives:
  - overlaid with sapphires
  - adorned with sapphires
  lexicon: HALOT
  rationale: The participle conveys being overlaid, wrapped, or covered. 'Covered
    with' is clear modern English and preserves the visual richness. סַפִּירִים is
    traditionally 'sapphires,' though the ancient stone may not match the modern gem
    exactly.
