theological_decisions:
- issue: Sense of דּוֹדִים in the closing invitation
  chosen_reading: 'abstract/object sense: ''with love'''
  alternative_readings:
  - 'vocative: ''O lovers''/''beloved ones'''
  rationale: The verse shifts from first-person enjoyment to an imperative invitation.
    Reading דודים as the object/complement of intoxication ('be drunk with love')
    best matches Hebrew poetic usage in Song of Songs, where דודים often refers to
    love or love-expressions. This preserves the sensual-poetic force without importing
    allegorical theology into the translation.
  doctrine_reference: Translation philosophy §1, §3, §6
