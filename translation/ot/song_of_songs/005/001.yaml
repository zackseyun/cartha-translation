id: SNG.5.1
reference: Song of Songs 5:1
source:
  edition: WLC
  text: בָּ֣אתִי לְ/גַנִּ/י֮ אֲחֹתִ֣/י כַלָּה֒ אָרִ֤יתִי מוֹרִ/י֙ עִם בְּשָׂמִ֔/י
    אָכַ֤לְתִּי יַעְרִ/י֙ עִם דִּבְשִׁ֔/י שָׁתִ֥יתִי יֵינִ֖/י עִם חֲלָבִ֑/י אִכְל֣וּ
    רֵעִ֔ים שְׁת֥וּ וְ/שִׁכְר֖וּ דּוֹדִֽים־־־׃ס
translation:
  text: I have come into my garden, my sister, my bride; I have gathered my myrrh
    with my spice. I have eaten my honeycomb with my honey; I have drunk my wine with
    my milk. Eat, friends; drink, and be drunk with love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Drink, and become drunk, beloved ones' / 'O lovers,' taking דּוֹדִים
      as a vocative rather than 'love.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּאתִי
  chosen: I have come
  alternatives:
  - I came
  - I have entered
  lexicon: HALOT
  rationale: Qal perfect 1cs of בוא. English present perfect fits the sequence of
    completed actions with present relevance in the poetic context better than simple
    past, while preserving the speaker's arrival.
- source_word: לְגַנִּי
  chosen: into my garden
  alternatives:
  - to my garden
  lexicon: HALOT
  rationale: The preposition ל with verbs of motion can indicate goal/destination;
    in idiomatic English 'into my garden' best conveys arrival within the space rather
    than merely toward it.
- source_word: אֲחֹתִי כַלָּה
  chosen: my sister, my bride
  alternatives:
  - my sister-bride
  lexicon: HALOT
  rationale: A fixed Song of Songs vocative pair. Rendering both terms separately
    preserves the Hebrew imagery and tenderness without collapsing them into a compound.
- source_word: אָרִיתִי
  chosen: I have gathered
  alternatives:
  - I have plucked
  - I have picked
  lexicon: HALOT
  rationale: The verb ארה in this context refers to collecting aromatic produce. 'Gathered'
    is natural and broad enough for myrrh and spice, avoiding an overly specific agricultural
    nuance.
- source_word: מוֹרִי
  chosen: my myrrh
  lexicon: HALOT
  rationale: Straightforward possessive noun; 'myrrh' is the standard rendering for
    the aromatic resin.
- source_word: בְּשָׂמִי
  chosen: my spice
  alternatives:
  - my balsam
  - my perfume
  lexicon: HALOT
  rationale: בשם denotes aromatic spice/perfume. 'Spice' pairs well with myrrh and
    keeps the concrete sensory imagery. Singular is retained to match the Hebrew form.
- source_word: אָכַלְתִּי
  chosen: I have eaten
  alternatives:
  - I ate
  lexicon: HALOT
  rationale: Perfect 1cs parallel to the surrounding verbs; present perfect preserves
    the poetic list of completed enjoyments.
- source_word: יַעְרִי
  chosen: my honeycomb
  alternatives:
  - my forest honey
  - my honey from the comb
  lexicon: HALOT
  rationale: יער here is the honeycomb or honey in the comb, as shown by the pairing
    with 'my honey.' 'Honeycomb' is the clearest idiomatic English equivalent.
- source_word: דִּבְשִׁי
  chosen: my honey
  lexicon: HALOT
  rationale: Standard rendering; the pairing 'honeycomb with my honey' preserves the
    Hebrew's abundance imagery.
- source_word: שָׁתִיתִי
  chosen: I have drunk
  alternatives:
  - I drank
  lexicon: HALOT
  rationale: Perfect 1cs, parallel to the other completed actions.
- source_word: יֵינִי
  chosen: my wine
  lexicon: HALOT
  rationale: Standard rendering of יין.
- source_word: חֲלָבִי
  chosen: my milk
  lexicon: HALOT
  rationale: Standard rendering of חלב. Retained literally in the sensual banquet
    imagery rather than paraphrased.
- source_word: אִכְלוּ רֵעִים
  chosen: Eat, friends
  alternatives:
  - Eat, companions
  lexicon: HALOT
  rationale: Imperative plural plus vocative/plural noun. 'Friends' is the most natural
    modern English equivalent for רעים here.
- source_word: שְׁתוּ
  chosen: drink
  lexicon: HALOT
  rationale: Simple imperative plural continuing the invitation.
- source_word: וְשִׁכְרוּ
  chosen: and be drunk
  alternatives:
  - and become intoxicated
  - and drink deeply
  lexicon: HALOT
  rationale: Qal imperative plural of שׁכר means to become drunk/intoxicated. The
    stronger literal sense should be preserved in the main text rather than softened,
    while context clarifies the poetic, celebratory register.
- source_word: דּוֹדִים
  chosen: with love
  alternatives:
  - lovers
  - beloved ones
  - caresses
  lexicon: HALOT
  rationale: In Song of Songs דודים commonly denotes love/caresses rather than functioning
    here as a second vocative. 'Be drunk with love' yields coherent English and fits
    the book's recurring semantic field. The alternative reading as direct address
    is preserved in a footnote.
