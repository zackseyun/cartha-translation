id: SNG.5.15
reference: Song of Songs 5:15
source:
  edition: WLC
  text: שׁוֹקָי/ו֙ עַמּ֣וּדֵי שֵׁ֔שׁ מְיֻסָּדִ֖ים עַל אַדְנֵי פָ֑ז מַרְאֵ֨/הוּ֙ כַּ/לְּבָנ֔וֹן
    בָּח֖וּר כָּ/אֲרָזִֽים־־׃
translation:
  text: His legs are pillars of marble, set on bases of fine gold. His appearance
    is like Lebanon, choice like the cedars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pillars of alabaster' for 'pillars of marble'; the Hebrew שֵׁשׁ may
      denote a fine white stone rather than marble specifically.
    reason: lexical_alternative
  - marker: b
    text: Or 'His appearance is like Lebanon, distinguished as the cedars.' The Hebrew
      בָּחוּר here likely conveys select excellence rather than 'young man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹקָיו
  chosen: his legs
  alternatives:
  - his thighs
  - his lower legs
  lexicon: HALOT
  rationale: שׁוֹק can denote the leg/thigh area. In this poetic body-description
    context, 'legs' is the most natural modern English rendering and fits the comparison
    to pillars without sounding overly anatomical. 'Thighs' is possible but narrower
    and less idiomatic here.
- source_word: עַמּוּדֵי
  chosen: pillars of
  alternatives:
  - columns of
  lexicon: HALOT
  rationale: The construct plural means 'pillars/columns of.' 'Pillars' preserves
    the poetic grandeur and is standard English for architectural supports in elevated
    imagery.
- source_word: שֵׁשׁ
  chosen: marble
  alternatives:
  - alabaster
  - white marble
  lexicon: HALOT
  rationale: In this context שֵׁשׁ refers to a fine white stone material, traditionally
    rendered 'marble.' While some argue for 'alabaster' or a broader precious white
    stone, 'marble' best matches the architectural comparison and common English understanding.
- source_word: מְיֻסָּדִים
  chosen: set
  alternatives:
  - founded
  - established
  - mounted
  lexicon: HALOT
  rationale: The passive participle from יסד conveys being founded or firmly placed.
    'Set' gives clear, natural English in the image of pillars placed upon bases,
    while retaining the sense of secure placement.
- source_word: אַדְנֵי
  chosen: bases of
  alternatives:
  - sockets of
  - pedestals of
  lexicon: HALOT
  rationale: אַדֶן commonly denotes a base or socket, especially in architectural
    settings. 'Bases' is the clearest idiomatic choice in this poetic description.
- source_word: פָז
  chosen: fine gold
  alternatives:
  - pure gold
  - refined gold
  lexicon: HALOT
  rationale: פָז denotes high-quality refined gold. 'Fine gold' is a well-established
    and accurate English equivalent that preserves the elevated poetic register.
- source_word: מַרְאֵהוּ
  chosen: his appearance
  alternatives:
  - his form
  - his look
  - his bearing
  lexicon: HALOT
  rationale: מַרְאֶה refers to appearance or visible form. 'His appearance' is broad
    enough to cover the overall impression intended by the verse.
- source_word: כַּלְּבָנוֹן
  chosen: like Lebanon
  alternatives:
  - like the Lebanon
  lexicon: HALOT
  rationale: The comparison invokes Lebanon as a byword for majesty and beauty. English
    idiom prefers 'like Lebanon' rather than the more wooden 'like the Lebanon.'
- source_word: בָּחוּר
  chosen: choice
  alternatives:
  - excellent
  - select
  - distinguished
  lexicon: HALOT
  rationale: Though the form can elsewhere mean 'young man/chosen one,' here it functions
    adjectivally in parallel with the simile and describes excellence or select quality.
    'Choice' captures the sense of select excellence in concise poetic English.
- source_word: כָּאֲרָזִים
  chosen: like the cedars
  alternatives:
  - as cedars
  lexicon: HALOT
  rationale: The cedars of Lebanon symbolize height, strength, and nobility. 'Like
    the cedars' preserves the simile and the likely association with Lebanon in the
    previous phrase.
