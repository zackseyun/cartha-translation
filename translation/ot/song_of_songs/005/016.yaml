theological_decisions:
- issue: Potential messianic/theological overreading of מַחֲמַדִּים
  chosen_reading: Render in its immediate poetic sense as 'desirable' within the love
    poem.
  alternative_readings:
  - Use traditional 'altogether lovely' with possible devotional/messianic resonance
  - Treat the term as a title-like expression
  rationale: The verse is spoken within the literary context of the woman praising
    her beloved in the Song. The translation should not import later theological or
    devotional associations not demanded by the Hebrew. A direct lexical rendering
    preserves the text's plain sense and avoids doctrinal overreach.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
