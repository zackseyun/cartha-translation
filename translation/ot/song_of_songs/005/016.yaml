id: SNG.5.16
reference: Song of Songs 5:16
source:
  edition: WLC
  text: חִכּ/וֹ֙ מַֽמְתַקִּ֔ים וְ/כֻלּ֖/וֹ מַחֲּמַדִּ֑ים זֶ֤ה דוֹדִ/י֙ וְ/זֶ֣ה רֵעִ֔/י
    בְּנ֖וֹת יְרוּשָׁלִָֽם׃
translation:
  text: His mouth is sweetness itself, and all of him is desirable. This is my beloved,
    and this is my friend, O daughters of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his palate is sweet' or 'his taste is sweetness,' reflecting the more
      literal sense of the Hebrew word.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of him is delights' / 'altogether lovely.' The Hebrew uses an intensive
      plural expressing desirability or loveliness.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִכּוֹ
  chosen: his mouth
  alternatives:
  - his palate
  - his taste
  lexicon: HALOT
  rationale: The noun literally refers to the palate/roof of the mouth, but in poetic
    context it functions metonymically for the mouth and especially the sweetness
    of kisses/speech. 'His mouth' is natural English and preserves the embodied imagery
    better than the more anatomical 'palate.'
- source_word: מַמְתַקִּים
  chosen: sweetness itself
  alternatives:
  - sweetnesses
  - most sweet
  - sweet things
  lexicon: HALOT
  rationale: The plural is an intensive/abstract plural in context. 'Sweetness itself'
    captures the superlative force in idiomatic English without flattening it to a
    mere adjective. It also preserves the poetic emphasis better than the traditional
    'most sweet,' which sounds archaic.
- source_word: וְכֻלּוֹ
  chosen: all of him
  alternatives:
  - his whole being
  - everything about him
  lexicon: HALOT
  rationale: The phrase is literally 'and all of him.' This rendering keeps the concrete
    personal focus of the Hebrew while remaining readable. 'Everything about him'
    is possible but slightly more interpretive.
- source_word: מַחֲמַדִּים
  chosen: desirable
  alternatives:
  - altogether lovely
  - delights
  - precious
  lexicon: HALOT
  rationale: The noun denotes desirability, preciousness, or loveliness. Because the
    Hebrew is plural, likely an abstract/intensive plural, a predicate adjective in
    English is the most natural equivalent. 'Desirable' reflects the lexical sense
    directly and avoids importing later traditional phrasing such as 'altogether lovely.'
- source_word: זֶה
  chosen: this is
  alternatives:
  - this one is
  - such is
  lexicon: HALOT
  rationale: The demonstrative points emphatically to the man just described. 'This
    is' is straightforward and idiomatic in English.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: In Song of Songs this term is a standard relational term of affection.
    'My beloved' preserves the poetic register and avoids the narrower or more sexually
    explicit connotations 'my lover' may carry in modern English, while still conveying
    intimacy.
- source_word: וְזֶה
  chosen: and this is
  alternatives:
  - and this one is
  lexicon: HALOT
  rationale: The repeated demonstrative is retained for poetic emphasis and parallelism.
- source_word: רֵעִי
  chosen: my friend
  alternatives:
  - my companion
  - my dear one
  lexicon: HALOT
  rationale: The noun can denote friend, companion, or associate. 'My friend' is the
    most direct rendering and preserves the tenderness and relational breadth of the
    Hebrew alongside 'my beloved.'
- source_word: בְּנוֹת יְרוּשָׁלָם
  chosen: O daughters of Jerusalem
  alternatives:
  - young women of Jerusalem
  lexicon: HALOT
  rationale: This is the conventional vocative address in the Song. 'Daughters of
    Jerusalem' preserves the poetic and literary refrain; 'young women' is interpretive
    and loses the formal imagery of the Hebrew expression.
