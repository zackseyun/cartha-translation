id: SNG.5.13
reference: Song of Songs 5:13
source:
  edition: WLC
  text: לְחָיָ/ו֙ כַּ/עֲרוּגַ֣ת הַ/בֹּ֔שֶׂם מִגְדְּל֖וֹת מֶרְקָחִ֑ים שִׂפְתוֹתָי/ו֙
    שֽׁוֹשַׁנִּ֔ים נֹטְפ֖וֹת מ֥וֹר עֹבֵֽר׃
translation:
  text: His cheeks are like beds of spice, towers of perfume; his lips are lilies,
    dripping flowing myrrh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mounds/raised beds of mixed spices' for 'towers of perfume'; the Hebrew
      image in this phrase is difficult and may refer to elevated beds or heaps of
      aromatic plants rather than literal towers.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְחָיָו
  chosen: his cheeks
  alternatives:
  - his jaws
  - his face
  lexicon: HALOT
  rationale: The plural form with 3ms suffix refers to the sides of the face/cheeks.
    'Cheeks' is the most natural English in this poetic blazon context, while 'jaws'
    is too anatomical and 'face' too broad.
- source_word: כַּעֲרוּגַת הַבֹּשֶׂם
  chosen: like beds of spice
  alternatives:
  - like a bed of balsam
  - like a garden-bed of perfume
  lexicon: HALOT
  rationale: עֲרוּגָה denotes a garden bed or plot; with הַבֹּשֶׂם, the phrase evokes
    cultivated aromatic plants. 'Beds of spice' preserves the horticultural image
    and reads naturally in English poetry.
- source_word: מִגְדְּלוֹת מֶרְקָחִים
  chosen: towers of perfume
  alternatives:
  - mounds of spices
  - raised beds of mixed spices
  lexicon: HALOT
  rationale: The phrase is difficult. מִגְדְּלוֹת literally suggests 'towers' or elevated
    structures, and מֶרְקָחִים refers to compounded perfumes/spices. Retaining 'towers'
    preserves the vivid metaphor and avoids flattening the unusual Hebrew. Because
    the exact image is debated, an alternative is preserved in a footnote.
- source_word: שִׂפְתוֹתָיו
  chosen: his lips
  lexicon: HALOT
  rationale: Straightforward plural noun with 3ms suffix.
- source_word: שׁוֹשַׁנִּים
  chosen: lilies
  alternatives:
  - lotuses
  lexicon: HALOT
  rationale: The flower term is traditionally rendered 'lilies'; while the precise
    botanical identification is uncertain, 'lilies' is the standard and best-known
    equivalent in English biblical poetry.
- source_word: נֹטְפוֹת
  chosen: dripping
  alternatives:
  - distilling
  - dropping
  lexicon: HALOT
  rationale: The participle conveys a gentle flowing or dripping. 'Dripping' is vivid
    and idiomatic in modern English.
- source_word: מוֹר
  chosen: myrrh
  lexicon: HALOT
  rationale: Standard rendering for the aromatic resin.
- source_word: עֹבֵר
  chosen: flowing
  alternatives:
  - liquid
  - running
  - passing
  lexicon: HALOT
  rationale: Used adjectivally with myrrh, likely describing myrrh that flows freely
    or is liquid. 'Flowing' best captures the sensory image in context; 'passing'
    would be too literal and obscure in English.
