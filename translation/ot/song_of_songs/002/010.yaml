id: SNG.2.10
reference: Song of Songs 2:10
source:
  edition: WLC
  text: עָנָ֥ה דוֹדִ֖/י וְ/אָ֣מַר לִ֑/י ק֥וּמִי לָ֛/ךְ רַעְיָתִ֥/י יָפָתִ֖/י וּ/לְכִי
    לָֽ/ךְ־׃
translation:
  text: My beloved answered and said to me, “Rise up, my love, my beautiful one, and
    come away.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and go away.” The Hebrew verb is literally “go,” but “come away” better
      conveys the beloved’s inviting summons in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנָה
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb commonly means 'answer, respond.' 'Answered' preserves the Hebrew
    narrative idiom, even though no prior speech is quoted in the immediate verse.
- source_word: דוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: In Song of Songs, דוֹד denotes the beloved male in a romantic sense.
    'My beloved' is natural English and preserves the affectionate, literary tone
    better than the more sexually explicit 'my lover' here.
- source_word: וְאָמַר לִי
  chosen: and said to me
  alternatives:
  - saying to me
  - and spoke to me
  lexicon: HALOT
  rationale: A straightforward rendering of the waw + qatal construction and indirect
    object. 'Said to me' is idiomatic and keeps the parallel verbal sequence with
    'answered.'
- source_word: קוּמִי
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative feminine singular. 'Rise up' preserves the elevated poetic
    tone while remaining readable modern English.
- source_word: לָךְ
  chosen: —
  alternatives:
  - for yourself
  lexicon: HALOT
  rationale: The ethical/directional dative after the imperative is not naturally
    represented in English. It is absorbed into the command rather than translated
    woodenly.
- source_word: רַעְיָתִי
  chosen: my love
  alternatives:
  - my darling
  - my companion
  lexicon: HALOT
  rationale: A term of endearment for the female beloved. 'My love' is the most natural
    poetic English equivalent and fits the romantic context.
- source_word: יָפָתִי
  chosen: my beautiful one
  alternatives:
  - my fair one
  - my beautiful one
  lexicon: HALOT
  rationale: Literally 'my beautiful [female].' 'My beautiful one' is clear modern
    English; 'my fair one' is traditional but can sound archaic or imply complexion
    specifically.
- source_word: וּלְכִי לָךְ
  chosen: and come away
  alternatives:
  - and go
  - and go away
  lexicon: HALOT
  rationale: הלך literally means 'go,' but in this invitation context English idiom
    prefers 'come away,' especially from the speaker's perspective and the romantic
    summons of the passage. This is an optimal-equivalence choice to preserve sense
    and tone rather than a mechanically formal 'go.'
