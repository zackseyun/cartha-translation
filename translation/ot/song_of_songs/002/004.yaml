id: SNG.2.4
reference: Song of Songs 2:4
source:
  edition: WLC
  text: הֱבִיאַ֨/נִי֙ אֶל בֵּ֣ית הַ/יָּ֔יִן וְ/דִגְל֥/וֹ עָלַ֖/י אַהֲבָֽה־׃
translation:
  text: He brought me into the house of wine, and his banner over me was love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the banqueting house.' The Hebrew reads more literally 'the house of
      wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֱבִיאַנִי
  chosen: He brought me
  alternatives:
  - He has brought me
  - He led me
  lexicon: HALOT
  rationale: Hiphil perfect 3ms + 1cs object from בוא/ביא, causative sense 'bring'
    or 'lead in.' In poetic context, simple past reads naturally in English. 'Brought
    me' preserves the causative movement without overinterpreting aspect.
- source_word: אֶל
  chosen: into
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to' or 'toward,' with a verb of motion and
    a destination noun phrase it is naturally rendered 'into' in English to express
    entry into the place.
- source_word: בֵּית הַיָּיִן
  chosen: the house of wine
  alternatives:
  - the banqueting house
  - the wine house
  - the banquet hall
  lexicon: HALOT
  rationale: Formally, the construct phrase means 'house of wine.' Traditional English
    often has 'banqueting house,' but that expands the image beyond the Hebrew wording.
    'House of wine' preserves the metaphor and poetic concreteness while remaining
    intelligible.
- source_word: וְדִגְלוֹ
  chosen: and his banner
  alternatives:
  - and his standard
  - and his signal
  lexicon: HALOT
  rationale: דֶּגֶל denotes a banner or standard. 'Banner' is the most natural poetic
    English equivalent and preserves the imagery of public display or emblem.
- source_word: עָלַי
  chosen: over me
  alternatives:
  - upon me
  - above me
  lexicon: HALOT
  rationale: The preposition עַל with this image is best rendered 'over me,' matching
    the spatial metaphor of a banner extended above someone.
- source_word: אַהֲבָה
  chosen: love
  alternatives:
  - his love
  lexicon: HALOT
  rationale: 'The noun is anarthrous and stands predicatively/appositionally after
    the clause: ''his banner over me was love.'' Supplying ''his'' before ''love''
    is interpretive and unnecessary. ''Love'' also aligns with the project''s default
    rendering for cognate terms where applicable.'
