id: SNG.2.13
reference: Song of Songs 2:13
source:
  edition: WLC
  text: הַ/תְּאֵנָה֙ חָֽנְטָ֣ה פַגֶּ֔י/הָ וְ/הַ/גְּפָנִ֥ים סְמָדַ֖ר נָ֣תְנוּ רֵ֑יחַ
    ק֥וּמִי לכי רַעְיָתִ֥/י יָפָתִ֖/י וּ/לְכִי לָֽ/ךְ׀־׃ס
translation:
  text: The fig tree has ripened its early figs, and the vines in blossom give off
    fragrance. Arise, my love, my beautiful one, and come away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fig tree has formed its green figs.' The Hebrew verb and noun can
      emphasize the fruit's early developmental stage rather than full ripeness.
    reason: lexical_alternative
  - marker: b
    text: Or 'the vines in blossom are fragrant' or 'the vines with tender grapes
      give fragrance.'
    reason: lexical_alternative
  - marker: c
    text: 'Literally, ''and go for yourself''; here the sense is an invitation to
      depart with the speaker: ''come away.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנְטָה
  chosen: has ripened
  alternatives:
  - has formed
  - has spiced/perfumed
  lexicon: HALOT
  rationale: In context with פַגֶּיהָ ('its early figs'), the verb refers to the fig
    tree bringing its fruit to an evident stage of development. 'Has ripened' communicates
    the seasonal sense naturally in English better than the more wooden 'has formed,'
    while avoiding an implausible perfume sense here.
- source_word: פַגֶּיהָ
  chosen: its early figs
  alternatives:
  - its green figs
  - its unripe figs
  lexicon: HALOT
  rationale: פג denotes the early fig/young fig. 'Early figs' preserves the botanical
    and seasonal nuance in a readable way; 'green figs' is possible but less transparent
    for modern readers.
- source_word: סְמָדַר
  chosen: in blossom
  alternatives:
  - blossom
  - tender grapes
  lexicon: HALOT
  rationale: The noun denotes the vine's blossom stage or very early grape development.
    Because the Hebrew construction is 'the vines, סמדר, have given fragrance,' 'in
    blossom' fits the syntax and explains why fragrance is mentioned.
- source_word: נָתְנוּ רֵיחַ
  chosen: give off fragrance
  alternatives:
  - give fragrance
  - send forth aroma
  - are fragrant
  lexicon: HALOT
  rationale: A natural English rendering of the idiom 'give smell/fragrance.' 'Give
    off fragrance' is idiomatic and preserves the sensory imagery.
- source_word: קוּמִי
  chosen: Arise
  alternatives:
  - Rise up
  - Get up
  lexicon: HALOT
  rationale: An imperative of invitation. 'Arise' retains poetic dignity without sounding
    archaic in this context.
- source_word: רַעְיָתִי
  chosen: my love
  alternatives:
  - my darling
  - my beloved
  - my companion
  lexicon: HALOT
  rationale: A term of intimate affection used in the Song. 'My love' is the most
    natural and established English equivalent here, preserving tenderness without
    over-paraphrase.
- source_word: יָפָתִי
  chosen: my beautiful one
  alternatives:
  - my fair one
  - my lovely one
  lexicon: HALOT
  rationale: The adjective denotes beauty. 'My beautiful one' is clear modern English;
    'my fair one' is traditional but sounds dated and may suggest complexion rather
    than beauty.
- source_word: וּלְכִי לָךְ
  chosen: and come away
  alternatives:
  - and go yourself
  - and go along
  - and come
  lexicon: HALOT
  rationale: Although literally 'and go לך,' in this romantic invitation context the
    idiom is best rendered 'come away,' matching the speaker's summons and the discourse
    flow. This is an optimal-equivalence choice rather than a strictly formal one.
