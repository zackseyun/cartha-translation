id: SNG.2.14
reference: Song of Songs 2:14
source:
  edition: WLC
  text: יוֹנָתִ֞/י בְּ/חַגְוֵ֣י הַ/סֶּ֗לַע בְּ/סֵ֨תֶר֙ הַ/מַּדְרֵגָ֔ה הַרְאִ֨י/נִי֙
    אֶתּ מַרְאַ֔יִ/ךְ הַשְׁמִיעִ֖י/נִי אֶת קוֹלֵ֑/ךְ כִּי קוֹלֵ֥/ךְ עָרֵ֖ב וּ/מַרְאֵ֥י/ךְ
    נָאוֶֽה־־־׃ס
translation:
  text: My dove, in the clefts of the rock, in the hiding place of the cliff, let
    me see your form; let me hear your voice, for your voice is sweet, and your form
    is lovely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the secret place of the steep path' / 'in the shelter of the precipice';
      the Hebrew word translated 'cliff' is rare and may refer to a steep rocky ascent
      or ledge.
    reason: lexical_alternative
  - marker: b
    text: Or 'show me your face'; the Hebrew can refer more specifically to visible
      appearance or countenance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹנָתִי
  chosen: My dove
  alternatives:
  - My pigeon
  lexicon: HALOT
  rationale: A term of endearment literally meaning 'my dove.' 'Dove' is the natural
    English equivalent and preserves the poetic imagery and affectionate address.
- source_word: בְּחַגְוֵי הַסֶּלַע
  chosen: in the clefts of the rock
  alternatives:
  - in the crannies of the rock
  - in the hiding places of the rock
  lexicon: HALOT
  rationale: חגוי refers to clefts/crannies. 'Clefts' is idiomatic, concrete, and
    preserves the plural image of rocky recesses.
- source_word: בְּסֵתֶר הַמַּדְרֵגָה
  chosen: in the hiding place of the cliff
  alternatives:
  - in the secret place of the steep path
  - in the shelter of the precipice
  lexicon: HALOT
  rationale: סתר denotes a hidden place or concealment. מדרגה is difficult and likely
    refers to a steep place, ledge, or cliff-like ascent. 'Hiding place of the cliff'
    communicates the sense clearly in natural English without over-specifying a debated
    topographical nuance.
- source_word: הַרְאִינִי אֶת־מַרְאַיִךְ
  chosen: let me see your form
  alternatives:
  - show me your face
  - let me see your appearance
  lexicon: HALOT
  rationale: 'The imperative with 1cs suffix is a request: ''show me / let me see.''
    מראה can mean appearance, form, or countenance. Since the noun later parallels
    ''voice'' and the final clause says ''your form is lovely,'' ''form'' preserves
    the broader visual sense better than the more specific ''face.'''
- source_word: הַשְׁמִיעִינִי אֶת־קוֹלֵךְ
  chosen: let me hear your voice
  alternatives:
  - make me hear your voice
  lexicon: HALOT
  rationale: The Hiphil imperative literally means 'cause me to hear,' but idiomatic
    English is 'let me hear.' This keeps the requestive tone while remaining natural.
- source_word: עָרֵב
  chosen: sweet
  alternatives:
  - pleasant
  lexicon: HALOT
  rationale: The adjective denotes pleasantness or sweetness. 'Sweet' fits the romantic-poetic
    context and is a standard English collocation with 'voice.'
- source_word: נָאוֶה
  chosen: lovely
  alternatives:
  - beautiful
  - comely
  lexicon: HALOT
  rationale: The adjective means lovely/beautiful. 'Lovely' matches the poetic register
    and pairs well with 'sweet' in the preceding clause.
- source_word: מַרְאַיִךְ / מַרְאֵיךְ
  chosen: form
  alternatives:
  - appearance
  - face
  lexicon: HALOT
  rationale: The noun occurs twice in the verse. Rendering both instances consistently
    as 'form' preserves lexical cohesion and avoids narrowing the meaning to facial
    features alone.
