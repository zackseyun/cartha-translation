id: SNG.2.3
reference: Song of Songs 2:3
source:
  edition: WLC
  text: כְּ/תַפּ֨וּחַ֙ בַּ/עֲצֵ֣י הַ/יַּ֔עַר כֵּ֥ן דּוֹדִ֖/י בֵּ֣ין הַ/בָּנִ֑ים בְּ/צִלּ/וֹ֙
    חִמַּ֣דְתִּי וְ/יָשַׁ֔בְתִּי וּ/פִרְי֖/וֹ מָת֥וֹק לְ/חִכִּֽ/י׃
translation:
  text: Like an apple tree among the trees of the forest, so is my beloved among the
    sons. In his shade I delighted and sat down, and his fruit was sweet to my taste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''among the young men.'' Hebrew: ''among the sons.'''
    reason: lexical_alternative
  - marker: b
    text: The precise species denoted by Hebrew תַּפּוּחַ is uncertain; traditionally
      'apple tree.'
    reason: cultural_note
lexical_decisions:
- source_word: תַּפּוּחַ
  chosen: apple tree
  alternatives:
  - apricot tree
  - citron tree
  - fruit tree
  lexicon: HALOT
  rationale: The traditional and most recognizable rendering is 'apple tree.' The
    precise species behind תַּפּוּחַ is debated, but the comparison depends on a desirable
    fruit-bearing tree standing out among ordinary forest trees. 'Apple tree' preserves
    the poetic image in idiomatic English while noting botanical uncertainty in alternatives.
- source_word: בַּעֲצֵי הַיַּעַר
  chosen: among the trees of the forest
  alternatives:
  - among the forest trees
  lexicon: HALOT
  rationale: 'The phrase is a partitive comparison: one notable tree set within the
    broader mass of woodland trees. ''Among the trees of the forest'' is natural English
    and preserves the imagery.'
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: In Song of Songs דּוֹד commonly denotes the beloved male in a romantic
    sense. 'My beloved' is both accurate and suitably elevated for the poem, whereas
    'my lover' can sound more clinical or reductionistic in English.
- source_word: בֵּין הַבָּנִים
  chosen: among the sons
  alternatives:
  - among the young men
  - among the men
  lexicon: HALOT
  rationale: בָּנִים is literally 'sons.' In this poetic comparison it refers to male
    peers or young men. Following the project's gender-accurate principle, the main
    text keeps 'sons,' preserving the Hebrew form and the comparison's literary texture.
- source_word: בְּצִלּוֹ
  chosen: in his shade
  alternatives:
  - in its shade
  lexicon: HALOT
  rationale: The suffix is masculine singular and naturally continues the beloved/tree
    metaphor. Because the comparison has already shifted to the male beloved, English
    personalizes the image with 'his shade' rather than the more wooden 'its shade.'
- source_word: חִמַּדְתִּי
  chosen: I delighted
  alternatives:
  - I desired
  - I took great delight
  lexicon: HALOT
  rationale: The verb conveys desire, delight, or taking pleasure in something precious.
    Here, with the following 'sat down,' 'I delighted' captures both affection and
    volition without oversexualizing the line.
- source_word: וְיָשַׁבְתִּי
  chosen: and sat down
  alternatives:
  - and I sat
  - and dwelt
  lexicon: HALOT
  rationale: The qatal form in sequence describes the speaker's action of taking her
    place in the beloved's shade. 'Sat down' is vivid and idiomatic, suggesting repose
    under the tree.
- source_word: וּפִרְיוֹ
  chosen: and his fruit
  alternatives:
  - and its fruit
  lexicon: HALOT
  rationale: The metaphor continues from the tree to the beloved. 'His fruit' preserves
    the personal metaphor already established by 'my beloved' and 'his shade.'
- source_word: מָתוֹק
  chosen: was sweet
  alternatives:
  - is sweet
  lexicon: HALOT
  rationale: A predicative adjective describing the fruit's pleasant quality. 'Was
    sweet' matches the past-oriented verbal sequence in English.
- source_word: לְחִכִּי
  chosen: to my taste
  alternatives:
  - to my palate
  - in my mouth
  lexicon: HALOT
  rationale: חֵךְ refers literally to the palate. 'To my taste' is a natural English
    equivalent that preserves the sensory image without sounding overly anatomical.
