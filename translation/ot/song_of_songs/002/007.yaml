theological_decisions:
- issue: Referent and personification of 'love' in the final clause
  chosen_reading: Treat 'love' as the feminine antecedent of the verb, rendered with
    English 'it' for natural style.
  alternative_readings:
  - Render the pronoun as 'she' to preserve personification more explicitly
  - Take the verb impersonally as 'until it is ready/willing'
  rationale: The verse is poetic rather than doctrinally contested. Hebrew grammar
    points to feminine 'love' as antecedent, but English style favors 'it' for an
    abstract noun. This preserves the poetic warning not to force love before its
    proper desire or timing without overinterpreting the metaphor.
  doctrine_reference: Translation philosophy §3, §6
