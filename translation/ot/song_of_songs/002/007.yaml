id: SNG.2.7
reference: Song of Songs 2:7
source:
  edition: WLC
  text: הִשְׁבַּ֨עְתִּי אֶתְ/כֶ֜ם בְּנ֤וֹת יְרוּשָׁלִַ֨ם֙ בִּ/צְבָא֔וֹת א֖וֹ בְּ/אַיְל֣וֹת
    הַ/שָּׂדֶ֑ה אִם תָּעִ֧ירוּ וְֽ/אִם תְּעֽוֹרְר֛וּ אֶת הָ/אַהֲבָ֖ה עַ֥ד שֶׁ/תֶּחְפָּֽץ־׀־־׃ס
translation:
  text: 'I adjure you, daughters of Jerusalem, by the gazelles or by the does of the
    field: do not stir up or awaken love until it pleases.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I put you under oath.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by the gazelles or by the does of the field,' a poetic oath formula;
      some see a wordplay echoing divine titles, but the animal imagery is the plain
      sense here.
    reason: cultural_note
  - marker: c
    text: Or 'that you not arouse or awaken love until she/it pleases.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִשְׁבַּעְתִּי
  chosen: I adjure you
  alternatives:
  - I put you under oath
  - I charge you solemnly
  lexicon: HALOT
  rationale: Hiphil of שׁבע in this idiom means to put someone under oath or solemnly
    charge them. 'Adjure' preserves the formal, oath-like force better than the flatter
    'charge,' while remaining idiomatic in this recurring refrain.
- source_word: בְּנ֤וֹת יְרוּשָׁלִַם
  chosen: daughters of Jerusalem
  alternatives:
  - young women of Jerusalem
  - women of Jerusalem
  lexicon: HALOT
  rationale: A conventional Hebrew address. 'Daughters of Jerusalem' is the most direct
    and literary rendering, preserving the personified/corporate form of address rather
    than flattening it to merely 'women'.
- source_word: בִּצְבָאוֹת
  chosen: by the gazelles
  alternatives:
  - by the wild gazelles
  lexicon: HALOT
  rationale: The noun צְבָאוֹת here is best taken as 'gazelles,' not 'hosts/armies.'
    In Song it participates in a poetic oath formula paired with 'does of the field.'
    The animal sense fits the immediate parallelism and avoids importing an unrelated
    military meaning.
- source_word: אוֹ
  chosen: or
  alternatives:
  - and
  lexicon: HALOT
  rationale: The conjunction normally means 'or.' In this oath formula it links two
    parallel animal expressions. Retaining 'or' reflects the Hebrew directly without
    forcing a cumulative sense.
- source_word: בְּאַיְלוֹת הַשָּׂדֶה
  chosen: by the does of the field
  alternatives:
  - by the hinds of the field
  - by the female deer of the field
  lexicon: HALOT
  rationale: אַיְלוֹת are female deer/gazelles. 'Does' is natural modern English and
    preserves the feminine imagery. 'Of the field' is kept formally rather than paraphrased
    away.
- source_word: אִם תָּעִירוּ וְאִם תְּעוֹרְרוּ
  chosen: do not stir up or awaken
  alternatives:
  - that you not arouse or awaken
  - lest you stir up or awaken
  lexicon: HALOT
  rationale: Following an adjuration, אִם can function idiomatically in a prohibitive
    oath sense. English expresses this most naturally as 'do not ...' The paired verbs
    are near-synonyms; rendering both ('stir up or awaken') preserves the Hebrew intensification
    rather than collapsing them into one verb.
- source_word: הָאַהֲבָה
  chosen: love
  alternatives:
  - the love
  lexicon: HALOT
  rationale: 'Although marked with the article in Hebrew, English idiom here prefers
    an anarthrous abstract noun: ''love.'' Retaining ''the love'' would sound wooden
    and less natural without adding clarity.'
- source_word: עַד שֶׁתֶּחְפָּץ
  chosen: until it pleases
  alternatives:
  - until she pleases
  - until he pleases
  - until it is willing
  lexicon: HALOT
  rationale: The 3fs verb most naturally refers back to the feminine noun 'love.'
    English commonly uses 'it' for an abstract noun. This preserves the Hebrew grammar
    without over-personifying love as 'she' in the main text. The sense is that love
    should not be prematurely awakened before its proper time/desire.
