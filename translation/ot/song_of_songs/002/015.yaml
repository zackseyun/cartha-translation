id: SNG.2.15
reference: Song of Songs 2:15
source:
  edition: WLC
  text: אֶֽחֱזוּ לָ֨/נוּ֙ שֽׁוּעָלִ֔ים שֽׁוּעָלִ֥ים קְטַנִּ֖ים מְחַבְּלִ֣ים כְּרָמִ֑ים
    וּ/כְרָמֵ֖י/נוּ סְמָדַֽר־׃
translation:
  text: Catch the foxes for us, the little foxes that ruin vineyards, for our vineyards
    are in blossom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שׁוּעָלִים can also be understood as 'jackals' in some contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'that spoil vineyards.'
    reason: lexical_alternative
  - marker: c
    text: Or 'our vineyards are in bloom' or, less likely, 'have tender grapes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶֽחֱזוּ
  chosen: Catch
  alternatives:
  - Seize
  - Take hold of
  lexicon: HALOT
  rationale: Imperative plural from אחז, calling for active apprehension. 'Catch'
    is idiomatic and natural in English for animals, while preserving the force of
    the command.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - for me
  - on our behalf
  lexicon: HALOT
  rationale: The preposition with 1cp suffix is best rendered 'for us,' preserving
    the plural voice of the speakers/participants in the poem.
- source_word: שׁוּעָלִים
  chosen: foxes
  alternatives:
  - jackals
  lexicon: HALOT
  rationale: The standard rendering is 'foxes.' Although some argue for 'jackals'
    in certain contexts, in this vineyard image 'foxes' is the more natural and traditional
    sense; the alternative is worth preserving in a footnote because the Hebrew term
    can be debated.
- source_word: שׁוּעָלִים קְטַנִּים
  chosen: the little foxes
  alternatives:
  - little foxes
  - young foxes
  lexicon: HALOT
  rationale: The repetition plus adjective gives emphasis. 'The little foxes' preserves
    the marked repetition and specificity; 'young foxes' is possible but less direct
    than the adjective 'little.'
- source_word: מְחַבְּלִים
  chosen: that ruin
  alternatives:
  - that spoil
  - that destroy
  lexicon: HALOT
  rationale: The participle describes ongoing harmful action. 'Ruin' communicates
    real damage without overstating to total destruction; 'spoil' is traditional but
    less current in modern English.
- source_word: כְּרָמִים
  chosen: vineyards
  alternatives:
  - vines
  lexicon: HALOT
  rationale: The noun normally denotes vineyards rather than individual vines. Keeping
    'vineyards' also matches the repeated term later in the verse.
- source_word: וּכְרָמֵינוּ
  chosen: for our vineyards
  alternatives:
  - and our vineyards
  lexicon: HALOT
  rationale: The conjunction plus noun with suffix can be rendered simply 'and our
    vineyards,' but in English the causal sense is naturally carried by 'for' in connection
    with the verbless clause that follows, yielding a smoother and contextually coherent
    line.
- source_word: סְמָדַר
  chosen: are in blossom
  alternatives:
  - are blossoming
  - are in bloom
  - have tender grapes
  lexicon: HALOT
  rationale: The term refers to the vine in blossom/early bloom. 'Are in blossom'
    is clear, natural English and fits the seasonal imagery. 'Tender grapes' reflects
    an older interpretive tradition but is less likely than blossom-stage growth in
    this context.
