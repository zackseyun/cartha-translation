id: SNG.2.17
reference: Song of Songs 2:17
source:
  edition: WLC
  text: עַ֤ד שֶׁ/יָּפ֨וּחַ֙ הַ/יּ֔וֹם וְ/נָ֖סוּ הַ/צְּלָלִ֑ים סֹב֩ דְּמֵה לְ/ךָ֨ דוֹדִ֜/י
    לִ/צְבִ֗י א֛וֹ לְ/עֹ֥פֶר הָ/אַיָּלִ֖ים עַל הָ֥רֵי בָֽתֶר־־׃ס
translation:
  text: Until the day breathes and the shadows flee, turn, my beloved—be like a gazelle
    or a young stag on the mountains of Bether.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Until the day cools and the shadows flee.' The Hebrew literally speaks
      of the day 'breathing' or 'blowing,' a poetic expression often understood as
      the coming of the evening breeze or the freshening of dawn.
    reason: lexical_alternative
  - marker: b
    text: '''Bether'' may be a place name. Alternatively, the phrase may mean ''mountains
      of separation'' or, less likely, ''rugged/jagged mountains.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עַד שֶׁיָּפוּחַ הַיּוֹם
  chosen: Until the day breathes
  alternatives:
  - Until the day blows
  - Until the day cools
  lexicon: HALOT
  rationale: The verb פוח literally denotes blowing/breathing. In this poetic context,
    'the day breathes' preserves the vivid metaphor without over-interpreting it as
    merely 'cools.' 'Until the day cools' is traditional and plausible, but it smooths
    the imagery; the Hebrew presents the day as animated.
- source_word: וְנָסוּ הַצְּלָלִים
  chosen: and the shadows flee
  alternatives:
  - and the shadows vanish
  - and the shadows pass away
  lexicon: HALOT
  rationale: נוּס commonly means 'flee.' In poetry this can naturally describe shadows
    retreating at daybreak. 'Flee' keeps the verbal force stronger than the more interpretive
    'vanish.'
- source_word: סֹב
  chosen: turn
  alternatives:
  - turn around
  - return
  lexicon: HALOT
  rationale: The imperative from סבב can mean 'turn' or 'turn around.' In context
    the woman addresses her beloved with an urgent movement-related command. 'Turn'
    is concise and natural; 'return' is possible interpretively but less directly
    tied to the verb's basic sense.
- source_word: דְּמֵה לְךָ
  chosen: be like
  alternatives:
  - make yourself like
  - resemble
  lexicon: HALOT
  rationale: 'The imperative of דמה here calls for comparison: the beloved is to be
    like a gazelle or young stag. ''Be like'' is idiomatic modern English and preserves
    the simile.'
- source_word: דוֹדִי
  chosen: my beloved
  alternatives:
  - my love
  lexicon: HALOT
  rationale: In Song of Songs, דוֹד functions as an intimate relational term. 'My
    beloved' is the established and semantically precise rendering, preserving affection
    without sounding overly casual.
- source_word: לִצְבִי
  chosen: like a gazelle
  alternatives:
  - to a gazelle
  lexicon: HALOT
  rationale: With דמה, the prefixed ל marks the standard of comparison. 'Like a gazelle'
    expresses the intended simile in natural English.
- source_word: לְעֹפֶר הָאַיָּלִים
  chosen: or a young stag
  alternatives:
  - or a fawn of the deer
  - or a young deer
  lexicon: HALOT
  rationale: עֹפֶר denotes a young animal; with אַיָּלִים it refers to a young male
    deer/stag. 'Young stag' is concise and preserves the masculine imagery better
    than the broader 'young deer.'
- source_word: עַל הָרֵי בָתֶר
  chosen: on the mountains of Bether
  alternatives:
  - on the mountains of separation
  - on the rugged mountains
  lexicon: HALOT
  rationale: בתר may be a place name ('Bether') or a descriptive noun related to division/cutting.
    Because the phrase is uncertain and may preserve a toponym, the main text keeps
    'Bether' transliterated, while alternatives are preserved in a footnote for auditability.
