id: SNG.2.12
reference: Song of Songs 2:12
source:
  edition: WLC
  text: הַ/נִּצָּנִים֙ נִרְא֣וּ בָ/אָ֔רֶץ עֵ֥ת הַ/זָּמִ֖יר הִגִּ֑יעַ וְ/ק֥וֹל הַ/תּ֖וֹר
    נִשְׁמַ֥ע בְּ/אַרְצֵֽ/נוּ׃
translation:
  text: The blossoms appear in the land; the time of singing has come, and the voice
    of the turtledove is heard in our land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the time of pruning has come.' The Hebrew זָמִיר can denote either
      'singing/song' or 'pruning'; 'singing' is preferred here because it fits the
      parallel mention of the turtledove's voice.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּצָּנִים
  chosen: the blossoms
  alternatives:
  - the flowers
  - the buds
  lexicon: HALOT
  rationale: נִצָּנִים refers to blossoms/flowers appearing in spring. 'Blossoms'
    fits the seasonal imagery and avoids the narrower sense of unopened 'buds' while
    remaining more vivid than the generic 'flowers'.
- source_word: נִרְאוּ
  chosen: appear
  alternatives:
  - are seen
  - have appeared
  lexicon: HALOT
  rationale: The Niphal of ראה here conveys becoming visible/appearing. 'Appear' is
    idiomatic modern English and preserves the intransitive sense.
- source_word: בָאָרֶץ
  chosen: in the land
  alternatives:
  - on the earth
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/earth. In this poetic, localized spring setting,
    'land' better matches the scene than the global 'earth.'
- source_word: עֵת
  chosen: the time of
  alternatives:
  - the season of
  lexicon: HALOT
  rationale: עֵת denotes a time/season. 'The time of' keeps the Hebrew structure and
    reads naturally in English.
- source_word: הַזָּמִיר
  chosen: singing
  alternatives:
  - pruning
  - song
  lexicon: HALOT
  rationale: זָמִיר is lexically debated between 'singing/song' and 'pruning.' In
    the immediate context of audible bird imagery ('the voice of the turtledove is
    heard'), 'singing' best fits the poetic parallelism and spring motif. The alternative
    is preserved in a footnote.
- source_word: הִגִּיעַ
  chosen: has come
  alternatives:
  - has arrived
  lexicon: HALOT
  rationale: The verb נגע/הגיע in this idiom means to arrive or come. 'Has come' is
    natural and suits the seasonal announcement.
- source_word: וְקוֹל
  chosen: and the voice of
  alternatives:
  - and the sound of
  lexicon: HALOT
  rationale: קוֹל commonly means voice/sound. With a bird subject, 'voice' preserves
    the Hebrew's personified, lyrical quality.
- source_word: הַתּוֹר
  chosen: the turtledove
  alternatives:
  - the dove
  lexicon: HALOT
  rationale: תּוֹר specifically denotes the turtledove, a familiar bird in biblical
    springtime imagery. The more specific rendering is preferable.
- source_word: נִשְׁמַע
  chosen: is heard
  alternatives:
  - is heard calling
  - is audible
  lexicon: HALOT
  rationale: The Niphal of שמע means 'is heard.' The simple passive preserves the
    Hebrew without adding interpretive material such as 'calling.'
- source_word: בְּאַרְצֵנוּ
  chosen: in our land
  alternatives:
  - in our country
  lexicon: HALOT
  rationale: The 1cp suffix gives a shared, intimate setting. 'Our land' preserves
    both the possessive and the poetic tone.
