id: SNG.2.5
reference: Song of Songs 2:5
source:
  edition: WLC
  text: סַמְּכ֨וּ/נִי֙ בָּֽ/אֲשִׁישׁ֔וֹת רַפְּד֖וּ/נִי בַּ/תַּפּוּחִ֑ים כִּי חוֹלַ֥ת
    אַהֲבָ֖ה אָֽנִי־׃
translation:
  text: Sustain me with raisin cakes; refresh me with apples, for I am sick with love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with cakes of raisins' or 'with pressed grape cakes.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term traditionally rendered 'apples' may refer more broadly to
      a fragrant fruit; the exact botanical identification is uncertain.
    reason: cultural_note
  - marker: c
    text: Or 'love-sick.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סַמְּכוּנִי
  chosen: Sustain me
  alternatives:
  - Strengthen me
  - Support me
  lexicon: HALOT
  rationale: The imperative plural from סמך means to support or uphold. 'Sustain me'
    fits the context of physical or emotional weakness and reads naturally in English
    while preserving the sense of being upheld.
- source_word: בָּאֲשִׁישׁוֹת
  chosen: with raisin cakes
  alternatives:
  - with cakes of raisins
  - with pressed grape cakes
  lexicon: HALOT
  rationale: אֲשִׁישׁוֹת refers to pressed cakes, commonly understood as raisin or
    grape cakes. 'Raisin cakes' is idiomatic, concise, and reflects the likely food
    item without over-specifying beyond the lexical evidence.
- source_word: רַפְּדוּנִי
  chosen: refresh me
  alternatives:
  - revive me
  - comfort me
  - spread beneath me
  lexicon: HALOT
  rationale: The verb רפד in this stem can convey supporting, restoring, or refreshing.
    In parallel with 'sustain me' and followed by food imagery, 'refresh me' best
    captures the restorative sense in contemporary English.
- source_word: בַּתַּפּוּחִים
  chosen: with apples
  alternatives:
  - with apricots
  - with apple-fruits
  lexicon: HALOT
  rationale: תַּפּוּחַ is traditionally rendered 'apple,' though the exact botanical
    identification is uncertain. 'Apples' preserves the conventional and likely sense;
    the botanical uncertainty is worth noting in a footnote rather than displacing
    the main text.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: כִּי introduces the reason for the imperatives. 'For' is natural and
    slightly more literary, fitting the poetic register.
- source_word: חוֹלַת אַהֲבָה
  chosen: sick with love
  alternatives:
  - faint with love
  - love-sick
  - sick from love
  lexicon: HALOT
  rationale: The phrase literally denotes being ill because of love. 'Sick with love'
    preserves the metaphor clearly and naturally. 'Lovesick' is possible, but the
    more transparent phrasing better reflects the Hebrew construction.
- source_word: אָֽנִי
  chosen: I am
  lexicon: HALOT
  rationale: The independent pronoun adds explicit self-reference. In English it is
    naturally represented in the clause 'I am sick with love.'
