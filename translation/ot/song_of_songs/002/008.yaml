id: SNG.2.8
reference: Song of Songs 2:8
source:
  edition: WLC
  text: ק֣וֹל דּוֹדִ֔/י הִנֵּה זֶ֖ה בָּ֑א מְדַלֵּג֙ עַל הֶ֣/הָרִ֔ים מְקַפֵּ֖ץ עַל
    הַ/גְּבָעֽוֹת־־־׃
translation:
  text: The sound of my beloved! Look, there he comes, leaping over the mountains,
    bounding over the hills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The voice of my beloved!'; Hebrew qol can mean either 'sound' or 'voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹל
  chosen: The sound of
  alternatives:
  - The voice of
  lexicon: HALOT
  rationale: קוֹל can denote either 'sound' or 'voice.' Here the exclamatory opening
    fits the broader sensory scene and allows for the beloved's approach to be heard
    before he is seen. 'Voice' is possible, but since the following clause emphasizes
    movement and arrival rather than speech, 'sound' better captures the immediate
    sense.
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: דּוֹד in Song of Songs is a term of endearment for the male lover/beloved.
    'My beloved' preserves the poetic and relational sense without sounding overly
    erotic or colloquial; 'my lover' is possible but narrower and less idiomatic in
    English Bible style.
- source_word: הִנֵּה זֶה
  chosen: Look, there he comes
  alternatives:
  - Behold, here he comes
  - Look, this is he, coming
  lexicon: HALOT
  rationale: The combination is deictic and vivid, drawing attention to the beloved's
    sudden appearance. 'Look' gives natural modern English for הִנֵּה, while 'there
    he comes' expresses the demonstrative force of זֶה with the participial/imminent
    sense in context.
- source_word: בָּא
  chosen: he comes
  alternatives:
  - is coming
  - comes
  lexicon: HALOT
  rationale: The qatal here functions in lively present-like narration describing
    the beloved's approach. English present 'he comes' is idiomatic in this poetic
    scene; 'is coming' is also possible but slightly less vivid.
- source_word: מְדַלֵּג
  chosen: leaping
  alternatives:
  - skipping
  - springing
  lexicon: HALOT
  rationale: The participle depicts agile movement. 'Leaping' conveys energetic, graceful
    motion appropriate to the poetic imagery; 'skipping' may sound too playful in
    modern English, and 'springing' is possible but less natural here.
- source_word: עַל הֶהָרִים
  chosen: over the mountains
  alternatives:
  - upon the mountains
  - across the mountains
  lexicon: HALOT
  rationale: עַל with verbs of motion here is best rendered 'over,' conveying movement
    across elevated terrain in poetic imagery. 'Upon' is more formal but less natural
    in contemporary English.
- source_word: מְקַפֵּץ
  chosen: bounding
  alternatives:
  - jumping
  - springing
  lexicon: HALOT
  rationale: This verb is near-synonymous with the previous one but likely chosen
    for poetic variation and intensification. 'Bounding' preserves the lively, repeated
    motion and gives good English parallelism with 'leaping.'
- source_word: עַל הַגְּבָעוֹת
  chosen: over the hills
  alternatives:
  - upon the hills
  lexicon: HALOT
  rationale: Parallel to 'over the mountains,' this keeps the paired landscape terms
    distinct and natural in English. 'Hills' is the standard rendering for גְּבָעוֹת.
