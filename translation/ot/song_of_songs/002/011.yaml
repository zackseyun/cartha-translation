id: SNG.2.11
reference: Song of Songs 2:11
source:
  edition: WLC
  text: כִּֽי הִנֵּ֥ה ה/סתו עָבָ֑ר הַ/גֶּ֕שֶׁם חָלַ֖ף הָלַ֥ךְ לֽ/וֹ־׃
translation:
  text: For look, the winter has passed; the rain is over and gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rainy season has passed.' The Hebrew term for 'winter' can refer
      more specifically to the season of rains.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding invitation. 'For' preserves
    the connective force naturally in English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is vivid and modern, avoiding
    archaic 'behold' while preserving the demonstrative emphasis.
- source_word: הַסְּתָו
  chosen: the winter
  alternatives:
  - the rainy season
  - autumn
  lexicon: HALOT
  rationale: The noun denotes the winter/rainy season. In this poetic context, 'the
    winter' is the most idiomatic and traditional English rendering, especially since
    the next clause explicitly mentions rain.
- source_word: עָבָר
  chosen: has passed
  alternatives:
  - passed away
  - is past
  lexicon: HALOT
  rationale: 'Qal perfect indicates completed action. Present perfect in English fits
    the immediate poetic setting: the season has now passed.'
- source_word: הַגֶּשֶׁם
  chosen: the rain
  alternatives:
  - the heavy rain
  - the downpour
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for rain. Definite article retained.
- source_word: חָלַף
  chosen: is over
  alternatives:
  - has passed
  - has ceased
  lexicon: HALOT
  rationale: The verb overlaps semantically with 'passed,' but varying the English
    avoids awkward repetition while preserving the sense of something moving on or
    disappearing.
- source_word: הָלַךְ לוֹ
  chosen: and gone
  alternatives:
  - has gone away
  - has gone off
  lexicon: HALOT
  rationale: 'The idiom intensifies the previous verb: the rain has not only passed
    but gone away. ''And gone'' gives concise, natural English and preserves the climactic
    parallelism.'
