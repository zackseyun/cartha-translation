id: SNG.2.6
reference: Song of Songs 2:6
source:
  edition: WLC
  text: שְׂמֹאל/וֹ֙ תַּ֣חַת לְ/רֹאשִׁ֔/י וִ/ימִינ֖/וֹ תְּחַבְּקֵֽ/נִי׃
translation:
  text: His left hand is under my head, and his right hand embraces me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his left arm ... his right arm,' since the Hebrew terms for 'left' and
      'right' can denote the corresponding side or hand/arm in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂמֹאלוֹ
  chosen: his left hand
  alternatives:
  - his left arm
  - his left
  lexicon: HALOT
  rationale: The noun denotes the left side/left hand. In English, 'left hand' is
    the most natural explicit rendering in this bodily context, even though 'hand'
    is not separately stated. 'Left arm' is possible by implication but less direct.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly indicates position beneath something.
    'Under' is idiomatic and clear in modern English.
- source_word: לְרֹאשִׁי
  chosen: my head
  alternatives:
  - my headrest
  lexicon: HALOT
  rationale: The noun רֹאשׁ means 'head.' The prefixed preposition with תַּחַת yields
    the sense 'under my head.' No expansion beyond the concrete body part is warranted.
- source_word: וִימִינוֹ
  chosen: and his right hand
  alternatives:
  - and his right arm
  - and his right
  lexicon: HALOT
  rationale: As with שְׂמֹאלוֹ, the noun denotes the right side/right hand. 'Right
    hand' makes the parallelism explicit and natural in English.
- source_word: תְּחַבְּקֵנִי
  chosen: embraces me
  alternatives:
  - holds me close
  - clasped me
  lexicon: HALOT
  rationale: From חבק, 'to embrace.' The imperfect here is well rendered as a present
    in this poetic context, describing the scene vividly. 'Embraces me' preserves
    the intimate physical imagery without paraphrase.
