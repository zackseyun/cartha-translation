id: SNG.2.2
reference: Song of Songs 2:2
source:
  edition: WLC
  text: כְּ/שֽׁוֹשַׁנָּה֙ בֵּ֣ין הַ/חוֹחִ֔ים כֵּ֥ן רַעְיָתִ֖/י בֵּ֥ין הַ/בָּנֽוֹת׃
translation:
  text: Like a lily among thorns, so is my beloved among the daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young women' for 'the daughters'; the Hebrew idiom can refer to women
      of the group more generally, not only literal daughters.
    reason: lexical_alternative
  - marker: b
    text: Or 'my love' or 'my darling' for 'my beloved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/שׁוֹשַׁנָּה
  chosen: Like a lily
  alternatives:
  - Like a lotus
  - Like a flower
  lexicon: HALOT
  rationale: שׁוֹשַׁנָּה traditionally denotes a lily-like flower. 'Lily' is the standard
    and most recognizable English rendering, preserving the poetic image without over-specifying
    the exact botanical species. The prefixed כְ is rendered 'Like' to mark explicit
    comparison.
- source_word: בֵּין
  chosen: among
  alternatives:
  - between
  - in the midst of
  lexicon: HALOT
  rationale: Though literally 'between,' with a plural object in poetic comparison
    English 'among' is more natural and accurately conveys placement within a group.
- source_word: הַחוֹחִים
  chosen: thorns
  alternatives:
  - brambles
  - thornbushes
  lexicon: HALOT
  rationale: חוֹחִים refers to thorny plants. 'Thorns' is concise, idiomatic, and
    preserves the contrast between beauty and harshness in the poetic simile.
- source_word: כֵּן
  chosen: so is
  alternatives:
  - so
  - thus is
  lexicon: HALOT
  rationale: כֵּן introduces the second half of the comparison. 'So is' makes the
    English simile complete and readable.
- source_word: רַעְיָתִי
  chosen: my beloved
  alternatives:
  - my darling
  - my companion
  - my love
  lexicon: HALOT
  rationale: The term denotes the speaker's female beloved/companion in an intimate
    poetic context. 'My beloved' is natural, elevated without being archaic, and avoids
    the possible trivialization of 'my love' while preserving affection.
- source_word: הַבָּנוֹת
  chosen: the daughters
  alternatives:
  - the young women
  - the girls
  - the maidens
  lexicon: HALOT
  rationale: בָּנוֹת is literally 'daughters.' In Song of Songs it can idiomatically
    refer to young women, but here 'the daughters' preserves the Hebrew wording and
    the recurring poetic idiom, while remaining understandable in English.
