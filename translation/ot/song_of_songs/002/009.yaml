id: SNG.2.9
reference: Song of Songs 2:9
source:
  edition: WLC
  text: דּוֹמֶ֤ה דוֹדִ/י֙ לִ/צְבִ֔י א֖וֹ לְ/עֹ֣פֶר הָֽ/אַיָּלִ֑ים הִנֵּה זֶ֤ה עוֹמֵד֙
    אַחַ֣ר כָּתְלֵ֔/נוּ מַשְׁגִּ֨יחַ֙ מִן הַֽ/חֲלֹּנ֔וֹת מֵצִ֖יץ מִן הַֽ/חֲרַכִּֽים־־־׃
translation:
  text: My beloved is like a gazelle or a young stag. Look—there he stands behind
    our wall, gazing through the windows, peering through the lattice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fawn of the deer' for 'a young stag.' The Hebrew phrase refers to
      a young member of the deer family; the translation chooses the masculine-specific
      image to match the Hebrew wording and the beloved's portrayal.
    reason: lexical_alternative
  - marker: b
    text: '''Lattice'' refers to a screened or slatted opening in the wall or window
      area, not necessarily a separate modern window fixture.'
    reason: cultural_note
lexical_decisions:
- source_word: דּוֹמֶה
  chosen: is like
  alternatives:
  - resembles
  lexicon: HALOT
  rationale: The participle expresses likeness or comparison. In idiomatic English,
    'is like' is the most natural rendering in this verbless-style poetic clause.
- source_word: דוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: In Song of Songs, דּוֹד commonly denotes the woman's beloved in an affectionate,
    relational sense. 'My beloved' preserves the poetic and covenantally resonant
    tone better than the more sexually explicit 'my lover,' while remaining faithful
    to the context.
- source_word: לִצְבִי
  chosen: a gazelle
  alternatives:
  - a roe
  lexicon: HALOT
  rationale: צְבִי refers to a gazelle/deer-like animal. 'Gazelle' is the clearest
    modern English equivalent; 'roe' is archaic and less precise.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive comparison between two similar images.
- source_word: לְעֹפֶר הָאַיָּלִים
  chosen: a young stag
  alternatives:
  - a fawn of the deer
  - a young hart
  lexicon: HALOT
  rationale: עֹפֶר denotes a young animal; with הָאַיָּלִים it specifies the deer/stag
    kind. 'Young stag' is natural modern English and preserves the masculine imagery
    better than the more generic 'fawn.'
- source_word: הִנֵּה זֶה
  chosen: Look—there he
  alternatives:
  - Behold, he
  - See, this one
  lexicon: HALOT
  rationale: The deictic expression draws vivid attention in poetry. 'Look—there he'
    captures the immediacy and natural English discourse force better than the more
    wooden 'behold, this one.'
- source_word: עוֹמֵד
  chosen: stands
  alternatives:
  - is standing
  lexicon: HALOT
  rationale: The participle conveys present vivid action. English simple present in
    this poetic setting communicates the scene naturally.
- source_word: אַחַר כָּתְלֵנוּ
  chosen: behind our wall
  alternatives:
  - behind our house-wall
  - behind our walls
  lexicon: HALOT
  rationale: כֹּתֶל commonly means wall. The singular with first person plural suffix
    is best rendered straightforwardly as 'our wall,' likely the wall of the house
    or enclosure.
- source_word: מַשְׁגִּיחַ
  chosen: gazing
  alternatives:
  - looking
  - watching
  lexicon: HALOT
  rationale: The Hiphil participle here conveys looking attentively from outside.
    'Gazing' fits the romantic-poetic context better than the more neutral 'looking'
    or the potentially ominous 'watching.'
- source_word: מִן הַחֲלּוֹנוֹת
  chosen: through the windows
  alternatives:
  - from the windows
  - at the windows
  lexicon: HALOT
  rationale: With verbs of looking, English idiom prefers 'through the windows' to
    express the line of sight through openings.
- source_word: מֵצִיץ
  chosen: peering
  alternatives:
  - glancing
  - looking in
  lexicon: HALOT
  rationale: The participle suggests a more specific act of peeking or looking through
    a narrow opening. 'Peering' preserves that nuance and pairs well with the previous
    participle without flattening the imagery.
- source_word: מִן הַחֲרַכִּים
  chosen: through the lattice
  alternatives:
  - through the openings
  - through the window lattice
  lexicon: HALOT
  rationale: חֲרַכִּים refers to narrow openings or latticework. 'Lattice' is the
    established and still intelligible English term that best matches the architectural
    image.
