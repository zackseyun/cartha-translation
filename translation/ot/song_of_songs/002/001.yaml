id: SNG.2.1
reference: Song of Songs 2:1
source:
  edition: WLC
  text: אֲנִי֙ חֲבַצֶּ֣לֶת הַ/שָּׁר֔וֹן שֽׁוֹשַׁנַּ֖ת הָ/עֲמָקִֽים׃
translation:
  text: I am a crocus of Sharon, a lily of the valleys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rose of Sharon.' The Hebrew חֲבַצֶּלֶת refers to a flower whose exact
      species is uncertain; 'crocus' is preferred here as a more likely identification,
      while the traditional rendering is preserved.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: 'The independent pronoun marks explicit first-person self-identification.
    English idiom naturally supplies the copula: ''I am.'''
- source_word: חֲבַצֶּלֶת
  chosen: crocus
  alternatives:
  - rose
  - asphodel
  - meadow-saffron
  lexicon: HALOT
  rationale: The Hebrew plant term is uncertain. Traditional 'rose' is likely too
    specific and probably reflects translation tradition more than lexical certainty.
    'Crocus' is a common modern scholarly approximation that preserves the sense of
    a field flower without importing the later English image of a rose.
- source_word: הַשָּׁרוֹן
  chosen: of Sharon
  alternatives:
  - of the Sharon plain
  - of the plain of Sharon
  lexicon: HALOT
  rationale: Sharon is a geographic proper name, so it is transliterated rather than
    translated, per project philosophy. The construct relation is naturally rendered
    'of Sharon.'
- source_word: שׁוֹשַׁנַּת
  chosen: lily
  alternatives:
  - lotus
  - flower
  lexicon: HALOT
  rationale: Though the exact species may be uncertain, 'lily' is the standard and
    most defensible English rendering for שׁוֹשַׁנָּה/שׁוֹשַׁנַּת in biblical usage.
    It preserves the poetic floral imagery without overinterpreting the botany.
- source_word: הָעֲמָקִים
  chosen: of the valleys
  alternatives:
  - of the vales
  - of the lowlands
  lexicon: HALOT
  rationale: The plural noun denotes valleys or low-lying places. 'Valleys' is clear
    modern English and fits the poetic parallelism with 'Sharon.'
