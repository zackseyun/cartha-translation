id: SNG.2.16
reference: Song of Songs 2:16
source:
  edition: WLC
  text: דּוֹדִ֥/י לִ/י֙ וַ/אֲנִ֣י ל֔/וֹ הָ/רֹעֶ֖ה בַּ/שּׁוֹשַׁנִּֽים׃
translation:
  text: My beloved is mine, and I am his—he who grazes among the lilies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my lover' for 'my beloved.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew participle can also be rendered 'the one who shepherds' or simply
      'feeding among the lilies.'
    reason: lexical_alternative
  - marker: c
    text: The exact flower meant by 'lilies' is uncertain; it may refer more broadly
      to a showy blossom.
    reason: cultural_note
lexical_decisions:
- source_word: דּוֹדִי
  chosen: my beloved
  alternatives:
  - my lover
  lexicon: HALOT
  rationale: דּוֹד in Song of Songs commonly denotes the woman's beloved in an intimate
    romantic sense. 'My beloved' is the established and natural English equivalent,
    preserving affection without sounding overly erotic or reducing the relational
    nuance to merely sexual possession.
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  lexicon: HALOT
  rationale: The preposition with pronominal suffix expresses possession/relationship.
    'Is mine' is idiomatic and mirrors the terse Hebrew predicate better than the
    more interpretive 'belongs to me.'
- source_word: וַאֲנִי לוֹ
  chosen: and I am his
  alternatives:
  - and I belong to him
  lexicon: HALOT
  rationale: This balances the first clause closely and preserves the mutuality of
    the Hebrew. 'I am his' is concise and relationally symmetrical with 'is mine.'
- source_word: הָרֹעֶה
  chosen: he who grazes
  alternatives:
  - the one who pastures
  - the one who shepherds
  - feeding
  lexicon: HALOT
  rationale: The Qal participle of רעה can mean 'to pasture, graze, shepherd.' In
    this poetic context the participle likely describes the beloved as moving/feeding
    among the flowers rather than emphasizing his role as a shepherd over others.
    'He who grazes' preserves the participial force and fits the imagery without over-specifying
    an object.
- source_word: בַּשּׁוֹשַׁנִּים
  chosen: among the lilies
  alternatives:
  - among the flowers
  - among the lotuses
  lexicon: HALOT
  rationale: שׁוֹשַׁנִּים is traditionally rendered 'lilies'; the exact botanical
    referent is uncertain, but 'lilies' is the conventional and sufficiently transparent
    English rendering. 'Among' captures the locative sense naturally in English poetry
    better than a wooden 'in the lilies.'
