id: SNG.8.7
reference: Song of Songs 8:7
source:
  edition: WLC
  text: מַ֣יִם רַבִּ֗ים לֹ֤א יֽוּכְלוּ֙ לְ/כַבּ֣וֹת אֶת הָֽ/אַהֲבָ֔ה וּ/נְהָר֖וֹת
    לֹ֣א יִשְׁטְפ֑וּ/הָ אִם יִתֵּ֨ן אִ֜ישׁ אֶת כָּל ה֤וֹן בֵּית/וֹ֙ בָּ/אַהֲבָ֔ה בּ֖וֹז
    יָב֥וּזוּ לֽ/וֹ־־־־׃ס
translation:
  text: Many waters cannot quench love, nor can rivers sweep it away. If a man were
    to give all the wealth of his house for love, he would be utterly despised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they would surely despise him.' The Hebrew expresses strong contempt
      with an infinitive absolute plus finite verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם רַבִּים
  chosen: Many waters
  alternatives:
  - Great waters
  - Abundant waters
  lexicon: HALOT
  rationale: A literal image is preferable in poetry. 'Many waters' preserves the
    Hebrew idiom and its metaphorical force of overwhelming opposition without over-interpreting
    it as merely 'floods.'
- source_word: לֹא יוּכְלוּ לְכַבּוֹת
  chosen: cannot quench
  alternatives:
  - are not able to extinguish
  - cannot put out
  lexicon: HALOT
  rationale: כבה commonly means to extinguish or quench, especially of fire. 'Quench'
    preserves the poetic contrast between water and the flame-like imagery of love
    in the immediate context (8:6) while remaining natural English.
- source_word: הָאַהֲבָה
  chosen: love
  lexicon: HALOT
  rationale: The noun straightforwardly denotes love. The definite article is not
    carried into English because generic abstract nouns are normally anarthrous in
    idiomatic English.
- source_word: וּנְהָרוֹת
  chosen: nor can rivers
  alternatives:
  - and rivers
  - nor rivers
  lexicon: HALOT
  rationale: The conjunction is rendered in a way that matches the parallel negative
    clause in English. 'Rivers' is the plain sense and preserves the intensification
    from 'many waters' to strong flowing waters.
- source_word: לֹא יִשְׁטְפוּהָ
  chosen: sweep it away
  alternatives:
  - overflow it
  - wash it away
  - flood over it
  lexicon: HALOT
  rationale: שטף conveys flooding, washing away, or overwhelming. 'Sweep it away'
    best captures the destructive force directed toward love and reads naturally in
    English poetry.
- source_word: אִם יִתֵּן אִישׁ
  chosen: If a man were to give
  alternatives:
  - If a man gives
  - Should a man give
  - If anyone were to give
  lexicon: HALOT
  rationale: The conditional here is best represented as a hypothetical. 'A man' follows
    the gender-accurate policy and matches אִישׁ; 'were to give' conveys the potential
    or imagined case idiomatically.
- source_word: כָּל הוֹן בֵּיתוֹ
  chosen: all the wealth of his house
  alternatives:
  - all the riches of his house
  - all his household wealth
  lexicon: HALOT
  rationale: הוֹן denotes wealth or riches; 'house' here refers to household/estate.
    'All the wealth of his house' preserves the Hebrew structure while remaining clear.
- source_word: בָּאַהֲבָה
  chosen: for love
  alternatives:
  - for the sake of love
  - in exchange for love
  lexicon: HALOT
  rationale: The preposition ב here is idiomatic in a transactional sense. 'For love'
    is concise and natural, implying exchange without over-explicating the metaphor.
- source_word: בּוֹז יָבֻזוּ לוֹ
  chosen: he would be utterly despised
  alternatives:
  - they would surely despise him
  - he would be scorned with contempt
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. English
    expresses this well with 'utterly despised.' The plural verb with לּוֹ is idiomatically
    rendered as a passive in English, avoiding an unnecessary indefinite 'they' while
    preserving the sense.
