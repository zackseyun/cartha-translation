id: SNG.8.12
reference: Song of Songs 8:12
source:
  edition: WLC
  text: כָּרְמִ֥/י שֶׁ/לִּ֖/י לְ/פָנָ֑/י הָ/אֶ֤לֶף לְ/ךָ֙ שְׁלֹמֹ֔ה וּ/מָאתַ֖יִם לְ/נֹטְרִ֥ים
    אֶת פִּרְיֽ/וֹ־׃
translation:
  text: My vineyard, my very own, is before me. The thousand is for you, Solomon,
    and two hundred for those who keep its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A thousand pieces of silver are for you, Solomon.' The previous verse
      mentions 'a thousand pieces of silver,' but this verse itself says only 'the
      thousand.'
    reason: lexical_alternative
  - marker: b
    text: '''Is before me'' may also imply ''is in my keeping'' or ''under my control.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּרְמִי
  chosen: My vineyard
  alternatives:
  - My vineyard plot
  lexicon: HALOT
  rationale: כֶּרֶם ordinarily means 'vineyard.' In Song of Songs it also carries
    metaphorical resonance for the woman herself or what belongs to her, but the image
    should be preserved rather than interpreted away in the main text.
- source_word: שֶׁלִּי
  chosen: my very own
  alternatives:
  - that is mine
  - belonging to me
  lexicon: HALOT
  rationale: The repetition after כַּרְמִי intensifies possession. Rendering it as
    'my very own' preserves the emphatic force more naturally than a wooden 'which
    is mine.'
- source_word: לְפָנַי
  chosen: is before me
  alternatives:
  - is in my keeping
  - is before my face
  lexicon: HALOT
  rationale: The phrase literally means 'before me.' In context it likely conveys
    possession/control or immediate presence, but the more literal wording preserves
    the poetic ambiguity.
- source_word: הָאֶלֶף
  chosen: The thousand
  alternatives:
  - A thousand pieces of silver
  - the thousand shekels
  lexicon: HALOT
  rationale: The Hebrew has simply 'the thousand' with no explicit currency term in
    this verse. Because the previous verse mentions a thousand silver pieces, the
    amount is understandable from context, but the main text should not add 'pieces
    of silver' here beyond what is stated.
- source_word: לְךָ שְׁלֹמֹה
  chosen: is for you, Solomon
  alternatives:
  - belongs to you, Solomon
  lexicon: HALOT
  rationale: The lamed marks assignment or possession. 'Is for you' is natural English
    and preserves the sense of allotment addressed directly to Solomon.
- source_word: וּמָאתַיִם
  chosen: and two hundred
  alternatives:
  - plus two hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number; no need to specify currency in the main
    text since it is likewise unstated here.
- source_word: לְנֹטְרִים
  chosen: for those who keep
  alternatives:
  - for the keepers of
  - for those who guard
  lexicon: HALOT
  rationale: The participle from נטר can mean keep, guard, watch over. 'Those who
    keep' fits the agricultural context and reads smoothly in English.
- source_word: אֶת־פִּרְיוֹ
  chosen: its fruit
  alternatives:
  - its produce
  - the fruit of it
  lexicon: HALOT
  rationale: פְּרִי means fruit/produce. The 3ms suffix most naturally refers back
    to the vineyard as a grammatical masculine antecedent in poetic usage; 'its fruit'
    is idiomatic English.
