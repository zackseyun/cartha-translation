id: SNG.8.5
reference: Song of Songs 8:5
source:
  edition: WLC
  text: מִ֣י זֹ֗את עֹלָה֙ מִן הַ/מִּדְבָּ֔ר מִתְרַפֶּ֖קֶת עַל דּוֹדָ֑/הּ תַּ֤חַת הַ/תַּפּ֨וּחַ֙
    עֽוֹרַרְתִּ֔י/ךָ שָׁ֚מָּ/ה חִבְּלַ֣תְ/ךָ אִמֶּ֔/ךָ שָׁ֖מָּ/ה חִבְּלָ֥ה יְלָדַֽתְ/ךָ־־׃
translation:
  text: Who is this coming up from the wilderness, leaning on her beloved? Under the
    apple tree I awakened you; there your mother was in labor with you; there she
    who gave birth to you was in labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'Under the apricot tree'; the exact species denoted by the
      Hebrew word is uncertain, though 'apple tree' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'I aroused you'; the Hebrew may carry a nuance beyond simple waking in
      this love-poetry context.
    reason: alternative_reading
  - marker: c
    text: The speaker likely shifts in the middle of the verse from an observing voice
      to direct address, and the exact speaker is not explicit in Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: עֹלָה
  chosen: coming up
  alternatives:
  - ascending
  - rising
  lexicon: HALOT
  rationale: The participle of עלה commonly means 'go up/come up.' 'Coming up' is
    idiomatic in English and preserves the movement imagery without over-literal stiffness.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: מִדְבָּר can denote wilderness or desert. 'Wilderness' better preserves
    the broader uncultivated-region sense and echoes established biblical usage.
- source_word: מִתְרַפֶּקֶת עַל
  chosen: leaning on
  alternatives:
  - clinging to
  - resting upon
  lexicon: HALOT
  rationale: The rare reflexive form from רפק conveys close physical support or attachment.
    'Leaning on' best fits the romantic scene and the preposition עַל.
- source_word: דּוֹדָהּ
  chosen: her beloved
  alternatives:
  - her lover
  lexicon: HALOT
  rationale: In Song of Songs דּוֹד is a term of endearment for the male lover. 'Beloved'
    is both accurate and suitably literary without becoming archaic.
- source_word: תַּחַת הַתַּפּוּחַ
  chosen: Under the apple tree
  alternatives:
  - Under the apricot tree
  lexicon: HALOT
  rationale: תַּפּוּחַ is traditionally rendered 'apple,' though the precise species
    is uncertain. Because 'apple tree' is the standard and contextually intelligible
    rendering, it is retained, with the botanical uncertainty preserved in a footnote.
- source_word: עוֹרַרְתִּיךָ
  chosen: I awakened you
  alternatives:
  - I aroused you
  - I stirred you up
  lexicon: HALOT
  rationale: The verb עור can mean awaken or arouse. In this love-poetry context a
    sexual nuance is possible, but 'awakened' preserves the lexical core while leaving
    the nuance open rather than overstating it.
- source_word: חִבְּלַתְךָ
  chosen: was in labor with you
  alternatives:
  - conceived you
  - bore you with labor pains
  lexicon: HALOT
  rationale: The verb חבל in the piel/polel can refer to writhing or labor pains in
    childbirth. 'Was in labor with you' best matches the maternal childbirth context
    and avoids the less likely 'conceived you' here.
- source_word: יְלָדַתְךָ
  chosen: gave birth to you
  alternatives:
  - bore you
  lexicon: HALOT
  rationale: ילד plainly denotes giving birth. 'Gave birth to you' is clear modern
    English and avoids ambiguity.
- source_word: שָׁמָּה ... שָׁמָּה
  chosen: there ... there
  lexicon: HALOT
  rationale: The repeated adverb is preserved to reflect the Hebrew emphasis and poetic
    parallelism.
