theological_decisions:
- issue: Speaker and addressee shift in the second half of the verse
  chosen_reading: 'Render the first clause as a descriptive question and the second
    half as direct address: ''I awakened you ... your mother ... gave birth to you.'''
  alternative_readings:
  - Treat the entire verse as spoken by the daughters of Jerusalem
  - Treat the awakening line as spoken by the woman to the man with stronger erotic
    force
  rationale: The Hebrew shifts naturally from third-person description ('her beloved')
    to second-person address ('I awakened you'). The translation preserves this poetic
    shift rather than smoothing it out. No doctrinal issue is at stake, but the ambiguity
    of speaker is literary and should remain visible.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it.
