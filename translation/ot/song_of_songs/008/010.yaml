id: SNG.8.10
reference: Song of Songs 8:10
source:
  edition: WLC
  text: אֲנִ֣י חוֹמָ֔ה וְ/שָׁדַ֖/י כַּ/מִּגְדָּל֑וֹת אָ֛ז הָיִ֥יתִי בְ/עֵינָ֖י/ו כְּ/מוֹצְאֵ֥ת
    שָׁלֽוֹם׃פ
translation:
  text: I am a wall, and my breasts are like towers; then I was in his eyes like one
    who finds peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like one who obtains peace'; the Hebrew expression may also carry the
      broader sense of finding well-being, wholeness, or favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמָה
  chosen: wall
  alternatives:
  - rampart
  lexicon: HALOT
  rationale: The noun denotes a wall, likely a city wall or defensive wall. 'Wall'
    preserves the metaphor's simplicity and firmness in English without over-specifying
    military nuance.
- source_word: שָׁדַי
  chosen: my breasts
  alternatives:
  - my bosom
  lexicon: HALOT
  rationale: The Hebrew explicitly refers to the woman's breasts in the dual/plural
    possessive form. 'My breasts' is the most direct and natural rendering, fitting
    the poem's embodied imagery.
- source_word: כַּמִּגְדָּלוֹת
  chosen: like towers
  alternatives:
  - like turrets
  lexicon: HALOT
  rationale: The comparison is architectural and plural. 'Like towers' is the standard,
    transparent image and pairs naturally with 'wall' in the same metaphorical field.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: The adverb marks a resulting or subsequent state. 'Then' is concise and
    idiomatic while preserving the temporal/logical transition.
- source_word: הָיִיתִי
  chosen: I was
  alternatives:
  - I became
  lexicon: HALOT
  rationale: The Qal perfect of היה can mean 'was' or sometimes 'became' depending
    on context. Here 'I was' better fits the predicative clause 'in his eyes like...'
    without adding a stronger ingressive nuance than the Hebrew requires.
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  lexicon: HALOT
  rationale: This idiom commonly means in someone's estimation or view. 'In his eyes'
    preserves the Hebrew image and remains understandable in modern English.
- source_word: כְּמוֹצְאֵת
  chosen: like one who finds
  alternatives:
  - like one who brings forth
  - like one who obtains
  lexicon: HALOT
  rationale: From מצא, the participial feminine form most naturally means 'finding'
    or 'obtaining.' Rendering it as 'like one who finds' keeps the feminine singular
    sense and avoids over-interpretation. The exact nuance is debated, so alternatives
    are preserved in a footnote.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - wholeness
  - favor
  - contentment
  lexicon: HALOT
  rationale: Shalom has a broad semantic range including peace, well-being, and wholeness.
    'Peace' is the most concise and recognizable rendering here, while the broader
    nuance is worth noting in a footnote because the phrase may imply being received
    with favor and well-being.
