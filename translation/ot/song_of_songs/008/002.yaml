id: SNG.8.2
reference: Song of Songs 8:2
source:
  edition: WLC
  text: אֶנְהָֽגֲ/ךָ֗ אֲבִֽיאֲ/ךָ֛ אֶל בֵּ֥ית אִמִּ֖/י תְּלַמְּדֵ֑/נִי אַשְׁקְ/ךָ֙
    מִ/יַּ֣יִן הָ/רֶ֔קַח מֵ/עֲסִ֖יס רִמֹּנִֽ/י־׃
translation:
  text: I would lead you and bring you into my mother’s house—she who used to teach
    me; I would give you spiced wine to drink, from the juice of my pomegranate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you would teach me.' The Hebrew verb 'teach me' is third feminine singular,
      which most naturally refers to 'my mother,' but the terse poetic syntax has
      led some to connect it differently.
    reason: alternative_reading
  - marker: b
    text: Or, 'from the sweet wine of my pomegranate.' The Hebrew term can refer to
      fresh juice or sweet wine/must.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶנְהָגֲךָ
  chosen: I would lead you
  alternatives:
  - I will lead you
  - I would guide you
  lexicon: HALOT
  rationale: Qal imperfect 1cs of נהג with 2ms suffix. In this poetic context the
    imperfect is best rendered with modal/desiderative force ('would') rather than
    simple future. 'Lead' preserves the concrete sense without overinterpreting as
    merely emotional guidance.
- source_word: אֲבִיאֲךָ
  chosen: and bring you
  alternatives:
  - and take you in
  - and bring you in
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs of בוא with 2ms suffix. Coordinated with the previous
    verb, it expresses the speaker's intended action. 'Bring you' is idiomatic and
    keeps the causative movement sense.
- source_word: בֵּית אִמִּי
  chosen: into my mother’s house
  alternatives:
  - to my mother’s house
  lexicon: HALOT
  rationale: Construct phrase with directional sense after אֶל. 'Into' fits naturally
    with 'bring' and the imagery of entering the house.
- source_word: תְּלַמְּדֵנִי
  chosen: she who used to teach me
  alternatives:
  - you would teach me
  - may she teach me
  - she teaches me
  lexicon: HALOT
  rationale: Piel imperfect 3fs + 1cs suffix from למד. The 3fs morphology most naturally
    refers back to 'my mother,' not to the male beloved. Because the clause is terse
    and somewhat elliptical in Hebrew, English supplies 'she who' for clarity. 'Used
    to teach me' fits the maternal-household recollection and avoids making it a new
    request directed to the beloved.
- source_word: אַשְׁקְךָ
  chosen: I would give you ... to drink
  alternatives:
  - I would make you drink
  - I would let you drink
  lexicon: HALOT
  rationale: Hiphil imperfect 1cs + 2ms suffix of שקה means to cause to drink/give
    drink. In English, 'give you ... to drink' is natural and preserves the causative
    sense.
- source_word: מִיַּיִן הָרֶקַח
  chosen: spiced wine
  alternatives:
  - wine mixed with spices
  - perfumed wine
  lexicon: HALOT
  rationale: יין with הרקח refers to wine prepared or mixed with spices/aromatics.
    'Spiced wine' is concise, idiomatic, and preserves the sensual banquet imagery.
- source_word: מֵעֲסִיס רִמֹּנִי
  chosen: from the juice of my pomegranate
  alternatives:
  - from the sweet wine of my pomegranate
  - from the fresh juice of my pomegranate
  lexicon: HALOT
  rationale: עסיס denotes juice, sweet fresh drink, or must. Given the parallel with
    wine and the possessive 'my pomegranate,' 'juice' is a clear modern rendering
    that preserves the fruit imagery without forcing fermentation. Singular 'pomegranate'
    follows the Hebrew singular with 1cs suffix.
