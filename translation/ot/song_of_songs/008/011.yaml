id: SNG.8.11
reference: Song of Songs 8:11
source:
  edition: WLC
  text: כֶּ֣רֶם הָיָ֤ה לִ/שְׁלֹמֹה֙ בְּ/בַ֣עַל הָמ֔וֹן נָתַ֥ן אֶת הַ/כֶּ֖רֶם לַ/נֹּטְרִ֑ים
    אִ֛ישׁ יָבִ֥א בְּ/פִרְי֖/וֹ אֶ֥לֶף כָּֽסֶף־׃
translation:
  text: Solomon had a vineyard at Baal-hamon; he entrusted the vineyard to keepers.
    Each man was to bring a thousand pieces of silver for its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he gave the vineyard to the keepers'; the Hebrew verb is broadly 'gave,'
      but here likely implies entrusting or assigning it for management.
    reason: lexical_alternative
  - marker: b
    text: Or 'from its fruit' or 'with his fruit.' The Hebrew suffix in 'its/his fruit'
      may be understood with reference to the vineyard or distributively to each keeper's
      produce.
    reason: lexical_alternative
  - marker: c
    text: Literally 'a thousand silver'; the specific unit of silver is not stated
      in the Hebrew.
    reason: cultural_note
lexical_decisions:
- source_word: כֶּרֶם
  chosen: vineyard
  alternatives:
  - vine
  lexicon: HALOT
  rationale: The noun denotes a cultivated vineyard rather than a single vine; 'vineyard'
    fits both occurrences in the verse.
- source_word: הָיָה לִשְׁלֹמֹה
  chosen: Solomon had
  alternatives:
  - there was for Solomon
  - belonged to Solomon
  lexicon: HALOT
  rationale: 'The Hebrew construction literally means ''there was to Solomon,'' an
    idiom naturally rendered in English as possession: ''Solomon had.'' This is smoother
    than a wooden literalism while preserving the sense.'
- source_word: בְּבַעַל הָמוֹן
  chosen: at Baal-hamon
  alternatives:
  - in Baal-hamon
  lexicon: HALOT
  rationale: This is best taken as a place name and transliterated, per policy to
    transliterate names. 'At' is a natural locative preposition in English for a named
    site.
- source_word: נָתַן אֶת־הַכֶּרֶם לַנֹּטְרִים
  chosen: he entrusted the vineyard to keepers
  alternatives:
  - he gave the vineyard to the keepers
  - he leased the vineyard to caretakers
  lexicon: HALOT
  rationale: נתן is broadly 'give,' but in this agricultural-economic context the
    sense is assignment/entrustment to those who watch or manage it. 'Entrusted' communicates
    the functional relationship without over-specifying a legal lease.
- source_word: לַנֹּטְרִים
  chosen: to keepers
  alternatives:
  - to guards
  - to caretakers
  - to watchmen
  lexicon: HALOT
  rationale: From נטר, 'to keep/watch/guard.' In a vineyard context, 'keepers' is
    broad and idiomatic, preserving both guarding and tending aspects.
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The distributive singular is preserved. Following the gender-accurate
    policy, 'man' is retained rather than neutralizing the term, though the sense
    is distributive for each individual keeper.
- source_word: יָבִא
  chosen: was to bring
  alternatives:
  - would bring
  - brought
  - must bring
  lexicon: HALOT
  rationale: The imperfect here expresses customary or expected action in the arrangement.
    'Was to bring' captures obligation/expectation without overstating command.
- source_word: בְּפִרְיוֹ
  chosen: for its fruit
  alternatives:
  - with its fruit
  - from its fruit
  - for his fruit
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the vineyard in context, yielding
    'its fruit.' The preposition is rendered 'for' to express payment in relation
    to the produce, rather than the more awkward literal 'in/with.'
- source_word: אֶלֶף כָּסֶף
  chosen: a thousand pieces of silver
  alternatives:
  - a thousand silver shekels
  - a thousand silver coins
  lexicon: HALOT
  rationale: The Hebrew literally says 'a thousand silver.' Since no unit such as
    shekels is explicit, 'pieces of silver' is a transparent English rendering that
    avoids adding a denomination not stated in the text.
