id: SNG.8.9
reference: Song of Songs 8:9
source:
  edition: WLC
  text: אִם חוֹמָ֣ה הִ֔יא נִבְנֶ֥ה עָלֶ֖י/הָ טִ֣ירַת כָּ֑סֶף וְ/אִם דֶּ֣לֶת הִ֔יא
    נָצ֥וּר עָלֶ֖י/הָ ל֥וּחַ אָֽרֶז־־׃
translation:
  text: If she is a wall, we will build on her a battlement of silver; but if she
    is a door, we will enclose her with a board of cedar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a turret of silver.' The Hebrew phrase may refer to a tower-like or
      fortified architectural feature.
    reason: lexical_alternative
  - marker: b
    text: Or 'we will guard/barricade her with a cedar plank.' The Hebrew verb can
      carry the sense of enclosing, besieging, or guarding.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמָה
  chosen: wall
  alternatives:
  - rampart
  lexicon: HALOT
  rationale: The noun denotes a wall, likely metaphorical here for firmness or chastity.
    'Wall' is the plain and idiomatic English equivalent and preserves the imagery
    without overinterpreting it.
- source_word: נִבְנֶה
  chosen: we will build
  alternatives:
  - let us build
  lexicon: HALOT
  rationale: Qal imperfect 1cp of בנה is best rendered as a simple future in this
    context, expressing what the speakers will do if the condition is met.
- source_word: טִירַת כָּסֶף
  chosen: a battlement of silver
  alternatives:
  - a turret of silver
  - a palace of silver
  lexicon: HALOT
  rationale: טִירָה can denote a fortified structure or tower-like architectural feature.
    In parallel with 'wall,' 'battlement' fits the building imagery better than 'palace,'
    while preserving the sense of adornment and strengthening. 'Turret' is possible
    but less natural in contemporary English.
- source_word: דֶּלֶת
  chosen: door
  alternatives:
  - gate
  lexicon: HALOT
  rationale: The noun ordinarily means 'door.' Although metaphorical, the basic image
    should be retained rather than generalized.
- source_word: נָצוּר
  chosen: we will enclose
  alternatives:
  - we will barricade
  - we will guard
  lexicon: HALOT
  rationale: From צור in the sense of enclosing or hemming in. In this architectural
    metaphor, 'enclose' best matches the following phrase 'with a board of cedar'
    without importing an overly militarized nuance.
- source_word: לוּחַ אָרֶז
  chosen: a board of cedar
  alternatives:
  - a cedar plank
  - a panel of cedar
  lexicon: HALOT
  rationale: לוּחַ is a board/plank/tablet. 'Board of cedar' is a clear, fairly formal
    rendering that preserves the construction material and the concrete image.
- source_word: עָלֶיהָ
  chosen: on her
  alternatives:
  - upon her
  - against her
  lexicon: HALOT
  rationale: The preposition על with 3fs suffix is rendered literally in the first
    clause as 'on her' to preserve the metaphor of building upon the girl as a wall.
    In the second clause, English idiom favors 'with' after the verb 'enclose,' but
    the underlying sense remains architectural and protective.
- source_word: וְאִם
  chosen: but if
  alternatives:
  - and if
  lexicon: HALOT
  rationale: Though formally 'and if,' the conjunction marks the contrasting second
    condition in English. 'But if' better conveys the parallel contrast between the
    two metaphors.
