id: SNG.8.3
reference: Song of Songs 8:3
source:
  edition: WLC
  text: שְׂמֹאל/וֹ֙ תַּ֣חַת רֹאשִׁ֔/י וִֽ/ימִינ֖/וֹ תְּחַבְּקֵֽ/נִי׃
translation:
  text: His left hand is under my head, and his right hand embraces me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his left ... and his right'; 'hand' is supplied in English
      from the sense of the paired expressions.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂמֹאלוֹ
  chosen: his left hand
  alternatives:
  - his left arm
  - his left
  lexicon: HALOT
  rationale: The noun denotes the left side/hand. In this embrace context, English
    idiom prefers 'left hand' rather than the bare 'left,' making the implied body
    part explicit without overtranslation. 'Arm' is possible contextually but less
    directly tied to the lexical form.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: The preposition straightforwardly means 'under/beneath.' 'Under' is the
    most natural modern English choice here.
- source_word: רֹאשִׁי
  chosen: my head
  lexicon: HALOT
  rationale: A direct rendering of the noun with first-person singular suffix.
- source_word: וִימִינוֹ
  chosen: and his right hand
  alternatives:
  - and his right arm
  - and his right
  lexicon: HALOT
  rationale: The conjunction plus noun denotes 'and his right [hand/side].' As with
    שְׂמֹאלוֹ, English idiom favors making 'hand' explicit in this poetic embrace
    scene. 'Arm' is possible by implication but not required by the lexical form.
- source_word: תְּחַבְּקֵנִי
  chosen: embraces me
  alternatives:
  - holds me close
  - clasped me
  lexicon: HALOT
  rationale: From חבק, 'to embrace.' The imperfect here is well rendered as a present
    in English poetic style, describing the scene vividly. 'Holds me close' is interpretive;
    'clasped me' would shift aspect toward a simple past not demanded by the Hebrew.
