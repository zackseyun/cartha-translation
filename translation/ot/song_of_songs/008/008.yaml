id: SNG.8.8
reference: Song of Songs 8:8
source:
  edition: WLC
  text: אָח֥וֹת לָ֨/נוּ֙ קְטַנָּ֔ה וְ/שָׁדַ֖יִם אֵ֣ין לָ֑/הּ מַֽה נַּעֲשֶׂה֙ לַ/אֲחֹתֵ֔/נוּ
    בַּ/יּ֖וֹם שֶׁ/יְּדֻבַּר בָּֽ/הּ־־׃
translation:
  text: We have a little sister, and she has no breasts. What shall we do for our
    sister on the day when she is spoken for?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on the day when she is spoken about.' The Hebrew may refer generally
      to discussion concerning her, though in context it likely points to marriage
      negotiations.
    reason: alternative_reading
lexical_decisions:
- source_word: אָחוֹת לָנוּ
  chosen: We have a ... sister
  alternatives:
  - Our sister
  lexicon: HALOT
  rationale: The construction literally means 'a sister belongs to us / we have a
    sister.' English idiom favors 'We have a sister,' while retaining the familial
    possession expressed by לָנוּ.
- source_word: קְטַנָּה
  chosen: little
  alternatives:
  - young
  - small
  lexicon: HALOT
  rationale: The adjective denotes smallness/youth. 'Little' is natural in English
    and can imply youth/status within the family context without over-specifying age.
- source_word: וְשָׁדַיִם אֵין לָהּ
  chosen: and she has no breasts
  alternatives:
  - and her breasts are not developed
  - and she has no bosom
  lexicon: HALOT
  rationale: 'The Hebrew is direct and concrete: ''breasts are not to her.'' ''She
    has no breasts'' preserves the plain sense and the verse''s concern with physical
    immaturity. Softer paraphrases import interpretation (''not developed'') beyond
    the wording.'
- source_word: מַה נַּעֲשֶׂה
  chosen: What shall we do
  alternatives:
  - What are we to do
  - What should we do
  lexicon: HALOT
  rationale: The first person plural imperfect here expresses deliberation. 'What
    shall we do' captures the rhetorical planning tone in idiomatic English.
- source_word: לַאֲחֹתֵנוּ
  chosen: for our sister
  alternatives:
  - about our sister
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'for,' expressing action taken
    on behalf of the sister. 'About' is possible but less natural with 'do' in English.
- source_word: בַּיּוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: A relatively formal temporal expression is retained to mirror the Hebrew
    structure, while remaining readable.
- source_word: שֶׁיְּדֻבַּר בָּהּ
  chosen: when she is spoken for
  alternatives:
  - when she is spoken about
  - when arrangements are made for her
  - when she is courted
  lexicon: HALOT
  rationale: The passive of דבר with ב can mean 'be spoken for/about.' In this marriage-context,
    'spoken for' best captures the likely sense of marriage negotiations or betrothal
    discussion. Because the Hebrew could more generally mean 'spoken about,' that
    alternative is preserved in a footnote.
