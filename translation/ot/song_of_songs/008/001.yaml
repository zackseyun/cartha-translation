id: SNG.8.1
reference: Song of Songs 8:1
source:
  edition: WLC
  text: מִ֤י יִתֶּנְ/ךָ֙ כְּ/אָ֣ח לִ֔/י יוֹנֵ֖ק שְׁדֵ֣י אִמִּ֑/י אֶֽמְצָאֲ/ךָ֤ בַ/חוּץ֙
    אֶשָׁ֣קְ/ךָ֔ גַּ֖ם לֹא יָב֥וּזוּ לִֽ/י־׃
translation:
  text: Oh, that you were like a brother to me, one who nursed at my mother’s breasts!
    If I found you outside, I would kiss you, and no one would despise me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If only you were like a brother to me.' The opening Hebrew idiom expresses
      a wish.
    reason: lexical_alternative
  - marker: b
    text: That is, a brother who had shared the same mother’s nursing, making public
      affection socially acceptable.
    reason: cultural_note
  - marker: c
    text: Hebrew literally, 'they would not despise me,' using an indefinite plural
      for general public disapproval.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֶּנְךָ
  chosen: Oh, that you were
  alternatives:
  - Who will give you to be
  - If only you were
  lexicon: HALOT
  rationale: The idiom מִי יִתֵּן expresses a wish rather than a literal question
    about giving. English idiom is best captured by an optative expression such as
    'Oh, that...' or 'If only...'.
- source_word: כְּאָח לִי
  chosen: like a brother to me
  alternatives:
  - as my brother
  - like a brother for me
  lexicon: HALOT
  rationale: כְּ marks comparison, not identity; 'like a brother to me' preserves
    the simile and the personal relation expressed by לִי.
- source_word: יוֹנֵק שְׁדֵי אִמִּי
  chosen: one who nursed at my mother’s breasts
  alternatives:
  - suckling my mother’s breasts
  - nursing from my mother’s breasts
  lexicon: HALOT
  rationale: יוֹנֵק is a participle describing one who suckles/nurses. 'Nursed at
    my mother’s breasts' is natural English while retaining the concrete maternal
    imagery that grounds the social logic of the verse.
- source_word: אֶמְצָאֲךָ
  chosen: If I found you
  alternatives:
  - Should I find you
  - When I find you
  lexicon: HALOT
  rationale: The imperfect here works well in a hypothetical or contingent sense in
    context; 'If I found you' fits the wishful tone and leads naturally into the following
    action.
- source_word: בַּחוּץ
  chosen: outside
  alternatives:
  - in the street
  - outdoors
  lexicon: HALOT
  rationale: The noun means 'outside' or 'in the open/outdoors.' 'Outside' is broad
    and natural, avoiding over-specification while preserving the public setting implied
    by the next clause.
- source_word: אֶשָׁקְךָ
  chosen: I would kiss you
  alternatives:
  - I would kiss you openly
  - I would kiss you there
  lexicon: HALOT
  rationale: The verb means 'kiss.' The modal 'would' matches the hypothetical sense
    carried from the previous clause.
- source_word: גַּם לֹא יָבֻזוּ לִי
  chosen: and no one would despise me
  alternatives:
  - and they would not despise me either
  - and I would not be scorned
  lexicon: HALOT
  rationale: The 3mp verb is an indefinite plural ('they would not despise'), which
    idiomatic English often renders as 'no one would despise me.' This communicates
    the social acceptability she imagines if he were publicly kissable like a brother.
