theological_decisions:
- issue: Social/familial imagery in erotic poetry
  chosen_reading: Retain the sibling comparison as a social convention, not as a literal
    familial claim
  alternative_readings:
  - Paraphrase to avoid the brother imagery
  - Interpret as actual kinship
  rationale: The verse uses the culturally intelligible wish that the beloved were
    socially equivalent to a nursing brother, so public affection would not incur
    shame. The translation preserves the literal imagery and does not soften it, while
    avoiding any doctrinal or moral inference beyond the text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
