id: SNG.8.13
reference: Song of Songs 8:13
source:
  edition: WLC
  text: הַ/יוֹשֶׁ֣בֶת בַּ/גַּנִּ֗ים חֲבֵרִ֛ים מַקְשִׁיבִ֥ים לְ/קוֹלֵ֖/ךְ הַשְׁמִיעִֽי/נִי׃
translation:
  text: You who dwell in the gardens, companions are listening for your voice; let
    me hear it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'cause me to hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיּוֹשֶׁבֶת
  chosen: You who dwell
  alternatives:
  - O you who sit
  - You who live
  lexicon: HALOT
  rationale: Feminine singular participle with article used vocatively/addressing
    the woman. 'Dwell' fits poetic context better than the more wooden 'sit' and preserves
    the ongoing sense of residing/being present.
- source_word: בַּגַּנִּים
  chosen: in the gardens
  alternatives:
  - among the gardens
  - in the garden places
  lexicon: HALOT
  rationale: Plural noun with preposition and article. The plural should be retained
    rather than flattened to singular; 'in the gardens' is natural and formally close.
- source_word: חֲבֵרִים
  chosen: companions
  alternatives:
  - friends
  - associates
  lexicon: HALOT
  rationale: The noun denotes companions/friends. 'Companions' preserves the relational
    but somewhat literary tone suitable to the Song and avoids over-specifying social
    intimacy.
- source_word: מַקְשִׁיבִים
  chosen: are listening for
  alternatives:
  - are listening to
  - are attentive to
  lexicon: HALOT
  rationale: Hiphil participle from קשׁב conveys attentive listening. With לְקוֹלֵךְ,
    English idiom 'listening for your voice' captures expectancy and attentiveness
    better than the flatter 'listening to.'
- source_word: לְקוֹלֵךְ
  chosen: your voice
  alternatives:
  - the sound of you
  - your sound
  lexicon: HALOT
  rationale: קוֹל commonly means 'voice' in direct personal address. This is the most
    natural and contextually fitting rendering.
- source_word: הַשְׁמִיעִינִי
  chosen: let me hear it
  alternatives:
  - cause me to hear
  - make me hear
  lexicon: HALOT
  rationale: Hiphil imperative 2fs + 1cs suffix literally means 'cause me to hear.'
    Idiomatic English 'let me hear it' preserves the request while remaining natural.
    The object 'it' refers back to her voice and is supplied in English for clarity.
