id: SNG.8.6
reference: Song of Songs 8:6
source:
  edition: WLC
  text: שִׂימֵ֨/נִי כַֽ/חוֹתָ֜ם עַל לִבֶּ֗/ךָ כַּֽ/חוֹתָם֙ עַל זְרוֹעֶ֔/ךָ כִּֽי עַזָּ֤ה
    כַ/מָּ֨וֶת֙ אַהֲבָ֔ה קָשָׁ֥ה כִ/שְׁא֖וֹל קִנְאָ֑ה רְשָׁפֶ֕י/הָ רִשְׁפֵּ֕י אֵ֖שׁ
    שַׁלְהֶ֥בֶתְ יָֽה־־־׃
translation:
  text: Set me as a seal upon your heart, as a seal upon your arm; for love is as
    strong as death, jealousy as relentless as Sheol. Its flashes are flashes of fire,
    a flame of Yah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jealousy as cruel as the grave'; Hebrew 'Sheol' may also be understood
      more generally as the realm of the dead.
    reason: alternative_reading
  - marker: b
    text: Or 'its sparks are sparks of fire.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a flame of Yah'; possibly an intensive expression, 'a mighty flame'
      or 'a blazing flame.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂימֵנִי
  chosen: Set me
  alternatives:
  - Place me
  lexicon: HALOT
  rationale: Imperative 2ms with 1cs suffix; direct, intimate appeal. 'Set me' is
    idiomatic and preserves the force of the request without over-paraphrase.
- source_word: כַחוֹתָם
  chosen: as a seal
  alternatives:
  - like a signet
  - like a seal
  lexicon: HALOT
  rationale: חוֹתָם denotes a seal/signet used to mark ownership, identity, or authentication.
    'Seal' is clear modern English and preserves the metaphor; 'signet' is possible
    but less accessible.
- source_word: עַל לִבֶּךָ
  chosen: upon your heart
  alternatives:
  - on your heart
  lexicon: HALOT
  rationale: Formal metaphorical location retained. 'Upon' suits poetic register and
    parallels the second clause.
- source_word: עַל זְרוֹעֶךָ
  chosen: upon your arm
  alternatives:
  - on your arm
  lexicon: HALOT
  rationale: זְרוֹעַ is 'arm.' Retained literally to preserve the paired imagery of
    inward affection and outward strength/display.
- source_word: כִּי עַזָּה כַמָּוֶת אַהֲבָה
  chosen: for love is as strong as death
  alternatives:
  - for love is strong as death
  lexicon: HALOT
  rationale: עַזָּה means strong/mighty/fierce. 'As strong as death' is the most natural
    English comparison and preserves the stark poetic parallel.
- source_word: קָשָׁה כִשְׁאוֹל קִנְאָה
  chosen: jealousy as relentless as Sheol
  alternatives:
  - jealousy as cruel as the grave
  - ardor as relentless as Sheol
  - passion as fierce as Sheol
  lexicon: HALOT
  rationale: קִנְאָה can mean jealousy, zeal, or ardor. In this love-poem context
    it denotes exclusive, possessive passion; 'jealousy' preserves the lexical value,
    while 'relentless' renders קָשָׁה in a way fitting Sheol's inexorable character
    better than the traditional but potentially misleading 'cruel.' Sheol is retained
    rather than flattened to 'grave' because the Hebrew term is explicit.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  lexicon: HALOT
  rationale: The Hebrew term is preserved as 'Sheol' to maintain source-language specificity
    and avoid reducing it merely to a burial place. A footnote preserves 'the grave'
    as a possible interpretive gloss.
- source_word: רְשָׁפֶיהָ
  chosen: Its flashes
  alternatives:
  - Its sparks
  - Its bolts
  lexicon: HALOT
  rationale: The suffix refers back to the feminine antecedent, most naturally love/jealousy
    as personified. רֶשֶׁף can denote flame, spark, or fiery bolt. 'Flashes' works
    well with the following apposition and keeps the vivid poetic energy.
- source_word: רִשְׁפֵּי אֵשׁ
  chosen: are flashes of fire
  alternatives:
  - are sparks of fire
  - are fiery flashes
  lexicon: HALOT
  rationale: Construct phrase intensifies the previous term. Repeating 'flashes' mirrors
    the Hebrew repetition and preserves the poetic emphasis.
- source_word: שַׁלְהֶבֶתְ יָה
  chosen: a flame of Yah
  alternatives:
  - the flame of Yahweh
  - a mighty flame
  - a blazing flame
  lexicon: HALOT
  rationale: This rare expression most naturally includes the divine name element
    יָה. To preserve the Hebrew's force and auditable transparency, the translation
    keeps the theophoric element rather than dissolving it into a mere superlative.
    'Yah' is concise and reflects the Hebrew form, while a footnote can note the idiomatic
    alternative 'mighty flame.'
