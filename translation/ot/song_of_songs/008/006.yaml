theological_decisions:
- issue: Whether שַׁלְהֶבֶתְ יָה contains a divine-name reference or only an intensive
    superlative
  chosen_reading: 'Retain explicit divine-name element: ''a flame of Yah'''
  alternative_readings:
  - a mighty flame
  - a blazing flame
  - the flame of Yahweh
  rationale: The Hebrew text explicitly contains יָה, the short form of the divine
    name. Preserving it best reflects original-language primacy and avoids obscuring
    a potentially significant theological-poetic nuance. Because the phrase is rare
    and debated, idiomatic alternatives are preserved in a footnote rather than resolved
    away.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether קִנְאָה should be softened to 'passion/ardor' in a love-poem
  chosen_reading: Keep lexical core with 'jealousy'
  alternative_readings:
  - ardor
  - passion
  - zeal
  rationale: Although the context is romantic and positive, the Hebrew noun commonly
    denotes jealousy/zeal with exclusivity. Retaining 'jealousy' preserves the text's
    tension and intensity rather than smoothing it into a less demanding modern term.
  doctrine_reference: Translation philosophy §3, §5
