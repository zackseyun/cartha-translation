id: SNG.3.10
reference: Song of Songs 3:10
source:
  edition: WLC
  text: עַמּוּדָי/ו֙ עָ֣שָׂה כֶ֔סֶף רְפִידָת֣/וֹ זָהָ֔ב מֶרְכָּב֖/וֹ אַרְגָּמָ֑ן תּוֹכ/וֹ֙
    רָצ֣וּף אַהֲבָ֔ה מִ/בְּנ֖וֹת יְרוּשָׁלִָֽם׃
translation:
  text: He made its pillars of silver, its backrest of gold, its seat of purple; its
    interior was inlaid with love by the daughters of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its base/support of gold'; the Hebrew term rendered 'backrest' is rare
      and uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'its carriage of purple'; the Hebrew term may refer more broadly to the
      riding place or carriage structure.
    reason: lexical_alternative
  - marker: c
    text: Or 'its interior was paved with love.' The Hebrew expression is unusual;
      the text likely portrays lavish adornment in poetic language.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדָיו
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: The noun commonly denotes pillars or columns. In the context of a portable
    couch/palanquin, 'pillars' is natural English and preserves the architectural
    imagery.
- source_word: עָשָׂה
  chosen: He made
  alternatives:
  - he fashioned
  lexicon: HALOT
  rationale: Straightforward rendering of the common verb 'to make/do.' The subject
    remains singular masculine from context, referring to Solomon as in the surrounding
    verse.
- source_word: כֶסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard rendering for the metal.
- source_word: רְפִידָתוֹ
  chosen: its backrest
  alternatives:
  - its base
  - its support
  - its covering
  lexicon: HALOT
  rationale: The noun is rare and contextually difficult. In this furnishing context
    it likely refers to a structural support or resting place. 'Backrest' fits the
    imagery of a sedan chair/couch better than 'covering,' while preserving concreteness.
    Because the term is uncertain, alternatives are preserved in a footnote.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Standard rendering for the metal.
- source_word: מֶרְכָּבוֹ
  chosen: its seat
  alternatives:
  - its carriage
  - its chariot
  - its riding place
  lexicon: HALOT
  rationale: Although the noun often relates to chariotry/vehicle, in this context
    of the palanquin's components it most plausibly denotes the place of riding/sitting.
    'Seat' gives clear modern English while fitting the object described. The more
    formal 'carriage' is possible but less natural here.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple cloth
  - purple fabric
  lexicon: HALOT
  rationale: The term denotes purple material/dye associated with luxury. 'Purple'
    is sufficiently idiomatic in English, with the material sense understood from
    context.
- source_word: תּוֹכוֹ
  chosen: its interior
  alternatives:
  - its inside
  - its midst
  lexicon: HALOT
  rationale: Refers to the inside of the palanquin. 'Interior' is natural and suitably
    elevated without being archaic.
- source_word: רָצוּף
  chosen: was inlaid
  alternatives:
  - was paved
  - was overlaid
  lexicon: HALOT
  rationale: The participle conveys something laid or fitted over/with. For the decorated
    interior of a royal litter, 'inlaid' best captures ornamental workmanship in idiomatic
    English. Because 'paved' is a traditional possibility, it is preserved in a footnote.
- source_word: אַהֲבָה
  chosen: with love
  alternatives:
  - with leather
  - love
  lexicon: HALOT
  rationale: The plain lexical sense is 'love.' Some interpreters propose a different
    sense or emendation related to leather/covering because 'paved with love' is unusual,
    but the MT supports 'love,' and the poetic context favors retaining the evocative
    expression rather than normalizing it.
- source_word: מִבְּנוֹת יְרוּשָׁלָם
  chosen: by the daughters of Jerusalem
  alternatives:
  - from the daughters of Jerusalem
  lexicon: HALOT
  rationale: 'The preposition can indicate agency or source. Here agency best fits
    the clause: the interior is adorned by the daughters of Jerusalem. This also preserves
    the poem''s recurring chorus figure.'
