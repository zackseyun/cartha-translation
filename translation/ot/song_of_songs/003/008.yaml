id: SNG.3.8
reference: Song of Songs 3:8
source:
  edition: WLC
  text: כֻּלָּ/ם֙ אֲחֻ֣זֵי חֶ֔רֶב מְלֻמְּדֵ֖י מִלְחָמָ֑ה אִ֤ישׁ חַרְבּ/וֹ֙ עַל יְרֵכ֔/וֹ
    מִ/פַּ֖חַד בַּ/לֵּילּֽוֹת־׃ס
translation:
  text: All of them are holding swords, trained in warfare; each man has his sword
    at his thigh because of terror in the nights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at night.' The Hebrew reads literally 'in the nights,' a plural expression
      that may poetically intensify the sense of nighttime danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - All
  - Every one of them
  lexicon: HALOT
  rationale: The pronominal suffix makes the collective explicit; 'All of them' is
    natural English and preserves the totality of the group.
- source_word: אֲחֻזֵי חֶרֶב
  chosen: are holding swords
  alternatives:
  - grasping the sword
  - equipped with swords
  lexicon: HALOT
  rationale: The passive/participle construction from אחז with 'sword' idiomatically
    describes men bearing or gripping swords. Plural 'swords' fits English distributive
    sense for the group.
- source_word: מְלֻמְּדֵי מִלְחָמָה
  chosen: trained in warfare
  alternatives:
  - trained for battle
  - experienced in war
  lexicon: HALOT
  rationale: The participle from למד here denotes being taught/trained, and 'warfare'
    preserves the broader military sense of מִלְחָמָה without sounding archaic.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: Distributive singular after a plural collective is well represented by
    'each man.' This is gender-accurate to the masculine singular and suits the immediate
    picture of armed guards.
- source_word: חַרְבּוֹ עַל יְרֵכוֹ
  chosen: has his sword at his thigh
  alternatives:
  - his sword on his thigh
  - wears his sword at his side
  lexicon: HALOT
  rationale: This phrase evokes a weapon strapped or ready at the upper leg/hip area.
    'At his thigh' is the more literal rendering and preserves the imagery.
- source_word: מִפַּחַד
  chosen: because of terror
  alternatives:
  - because of fear
  - against terror
  lexicon: HALOT
  rationale: The preposition מִן here is causal ('because of' / 'on account of').
    'Terror' better conveys the intensity of פַּחַד in this protective context.
- source_word: בַּלֵּילוֹת
  chosen: in the nights
  alternatives:
  - in the night
  - at night
  lexicon: HALOT
  rationale: The Hebrew is plural, likely an idiomatic plural referring to nighttime
    danger generally. 'In the nights' preserves the plural form, though English readers
    may hear it as poetic rather than strictly temporal.
