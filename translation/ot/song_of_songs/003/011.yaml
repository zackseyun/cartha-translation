id: SNG.3.11
reference: Song of Songs 3:11
source:
  edition: WLC
  text: צְאֶ֧ינָה וּֽ/רְאֶ֛ינָה בְּנ֥וֹת צִיּ֖וֹן בַּ/מֶּ֣לֶךְ שְׁלֹמֹ֑ה בָּ/עֲטָרָ֗ה
    שֶׁ/עִטְּרָה לּ֤/וֹ אִמּ/וֹ֙ בְּ/י֣וֹם חֲתֻנָּת֔/וֹ וּ/בְ/י֖וֹם שִׂמְחַ֥ת לִבּֽ/וֹ׀־׃ס
translation:
  text: Go out and look, O daughters of Zion, at King Solomon, with the crown with
    which his mother crowned him on the day of his wedding, on the day of the joy
    of his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the wreath/garland'; the Hebrew עֲטָרָה can denote a festive crown
      or wreath, fitting a wedding setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְאֶינָה
  chosen: Go out
  alternatives:
  - Come out
  - Go forth
  lexicon: HALOT
  rationale: Imperative feminine plural from יצא, calling the daughters to leave their
    place and go out to see. 'Go out' is natural modern English and preserves the
    movement outward.
- source_word: וּרְאֶינָה
  chosen: and look
  alternatives:
  - and see
  - and behold
  lexicon: HALOT
  rationale: Imperative feminine plural from ראה. 'Look' fits the direct summons in
    idiomatic English after 'go out'; 'see' is possible but slightly less vivid in
    this exhortative sequence.
- source_word: בְּנוֹת צִיּוֹן
  chosen: O daughters of Zion
  alternatives:
  - daughters of Zion
  lexicon: HALOT
  rationale: Vocative address to the women of Zion/Jerusalem. 'O' appropriately marks
    direct address in elevated poetic style without becoming archaic.
- source_word: בַּמֶּלֶךְ שְׁלֹמֹה
  chosen: at King Solomon
  alternatives:
  - upon King Solomon
  - on King Solomon
  lexicon: HALOT
  rationale: The preposition ב after a verb of seeing can mark the object looked at.
    English idiom prefers 'look at King Solomon'.
- source_word: בָּעֲטָרָה
  chosen: with the crown
  alternatives:
  - in the crown
  - wearing the crown
  lexicon: HALOT
  rationale: 'The preposition ב here is best rendered instrumentally or circumstantially:
    the king is to be seen with/wearing the crown. ''With the crown'' preserves the
    Hebrew structure and avoids over-paraphrase.'
- source_word: עֲטָרָה
  chosen: crown
  alternatives:
  - wreath
  - garland
  - diadem
  lexicon: HALOT
  rationale: עֲטָרָה denotes a crown or wreath. 'Crown' is the broadest and most standard
    rendering; 'wreath/garland' is possible in a wedding context but too specific
    for the main text.
- source_word: שֶׁעִטְּרָה לוֹ אִמּוֹ
  chosen: with which his mother crowned him
  alternatives:
  - that his mother placed on him
  - which his mother adorned him with
  lexicon: HALOT
  rationale: The relative clause repeats the cognate verb from עטר. Rendering it as
    'with which his mother crowned him' preserves the wordplay and the formal connection
    to 'crown'.
- source_word: בְּיוֹם חֲתֻנָּתוֹ
  chosen: on the day of his wedding
  alternatives:
  - on the day of his marriage
  - on his wedding day
  lexicon: HALOT
  rationale: חֲתֻנָּה refers to wedding/marriage festivities. 'The day of his wedding'
    is clear, natural, and close to the Hebrew construction.
- source_word: וּבְיוֹם שִׂמְחַת לִבּוֹ
  chosen: on the day of the joy of his heart
  alternatives:
  - and on the day of his heart's joy
  - and on the day when his heart rejoiced
  lexicon: HALOT
  rationale: A second temporal phrase parallel to the wedding day. 'The joy of his
    heart' preserves the Hebrew genitive and poetic tone better than a more interpretive
    paraphrase.
