id: SNG.3.2
reference: Song of Songs 3:2
source:
  edition: WLC
  text: אָק֨וּמָה נָּ֜א וַ/אֲסוֹבְבָ֣ה בָ/עִ֗יר בַּ/שְּׁוָקִים֙ וּ/בָ֣/רְחֹב֔וֹת אֲבַקְשָׁ֕ה
    אֵ֥ת שֶׁ/אָהֲבָ֖ה נַפְשִׁ֑/י בִּקַּשְׁתִּ֖י/ו וְ/לֹ֥א מְצָאתִֽי/ו׃
translation:
  text: I will rise now and go about the city, in the marketplaces and in the streets;
    I will seek the one my soul loves. I sought him, but I did not find him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'him whom my soul loves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָק֨וּמָה
  chosen: I will rise
  alternatives:
  - Let me rise
  - I must rise
  lexicon: HALOT
  rationale: Cohortative 1cs of קום expresses resolve or intention. 'I will rise'
    preserves the speaker's self-exhortation in natural English without over-paraphrasing.
- source_word: נָּא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: Here נָא functions as a particle of urgency or immediacy rather than
    polite entreaty. 'Now' fits the speaker's internal resolve better than 'please.'
- source_word: וַאֲסוֹבְבָה
  chosen: and go about
  alternatives:
  - and roam
  - and circle around
  lexicon: HALOT
  rationale: From סבב, the cohortative conveys moving through the city in search.
    'Go about' is idiomatic and preserves the sense of traversing the city without
    sounding overly wooden.
- source_word: בָעִיר
  chosen: the city
  alternatives:
  - town
  lexicon: HALOT
  rationale: עִיר normally means 'city.' 'The city' matches the definite form and
    the poetic urban setting.
- source_word: בַּשְּׁוָקִים
  chosen: in the marketplaces
  alternatives:
  - in the markets
  - in the squares
  lexicon: HALOT
  rationale: שׁוּק refers to market areas or bazaars. 'Marketplaces' captures the
    public commercial spaces more precisely than the broader 'squares.'
- source_word: וּבָרְחֹבוֹת
  chosen: and in the streets
  alternatives:
  - and in the open places
  - and in the plazas
  lexicon: HALOT
  rationale: רְחֹבוֹת denotes broad public ways or open streets. 'Streets' is the
    most natural modern rendering here, while the pairing with 'marketplaces' preserves
    the public-search imagery.
- source_word: אֲבַקְשָׁה
  chosen: I will seek
  alternatives:
  - I will search for
  lexicon: HALOT
  rationale: בקשׁ means to seek/search for. 'Seek' is concise, literary, and fits
    the emotional tone of the poem.
- source_word: אֵת שֶׁאָהֲבָה נַפְשִׁי
  chosen: the one my soul loves
  alternatives:
  - him whom my soul loves
  - the one I love with my soul
  lexicon: HALOT
  rationale: This clause is a signature refrain in Song of Songs. 'The one my soul
    loves' preserves both the relative sense and the Hebrew נפשׁ idiom without archaic
    English. 'Soul' is retained rather than flattened to 'heart' for lexical transparency.
- source_word: בִּקַּשְׁתִּיו
  chosen: I sought him
  alternatives:
  - I searched for him
  lexicon: HALOT
  rationale: Perfect 1cs + 3ms suffix resumes the action in summary form. 'I sought
    him' keeps verbal consistency with אֲבַקְשָׁה and preserves the poetic repetition.
- source_word: וְלֹא מְצָאתִיו
  chosen: but I did not find him
  alternatives:
  - and did not find him
  lexicon: HALOT
  rationale: מצא means 'find.' Rendering waw here as 'but' brings out the adversative
    force in English after the search, while remaining faithful to the sense.
