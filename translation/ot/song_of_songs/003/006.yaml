id: SNG.3.6
reference: Song of Songs 3:6
source:
  edition: WLC
  text: מִ֣י זֹ֗את עֹלָה֙ מִן הַ/מִּדְבָּ֔ר כְּ/תִֽימֲר֖וֹת עָשָׁ֑ן מְקֻטֶּ֤רֶת מוֹר֙
    וּ/לְבוֹנָ֔ה מִ/כֹּ֖ל אַבְקַ֥ת רוֹכֵֽל־׃
translation:
  text: Who is this coming up from the wilderness like columns of smoke, perfumed
    with myrrh and frankincense, with every fragrant powder of the merchant?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like pillars of smoke.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Who is she, coming up from the wilderness...?' The Hebrew uses a feminine
      demonstrative ('this [woman]').
    reason: lexical_alternative
  - marker: c
    text: '''Wilderness'' may also be rendered ''desert.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֹאת
  chosen: Who is this
  alternatives:
  - Who is she
  lexicon: HALOT
  rationale: The Hebrew interrogative plus feminine demonstrative literally means
    'Who [is] this?' The feminine form implies a female referent, but English idiom
    in poetic exclamation is better preserved by 'Who is this,' while the feminine
    reference remains inferable from context.
- source_word: עֹלָה
  chosen: coming up
  alternatives:
  - rising
  - ascending
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' 'Coming up' is natural English and
    preserves the motion imagery without over-literal stiffness.
- source_word: מִן הַמִּדְבָּר
  chosen: from the wilderness
  alternatives:
  - from the desert
  lexicon: HALOT
  rationale: מִדְבָּר can denote wilderness or desert. 'Wilderness' better preserves
    the broader semantic range and biblical resonance without requiring a barren-sand
    reading.
- source_word: כְּתִימֲרוֹת עָשָׁן
  chosen: like columns of smoke
  alternatives:
  - like pillars of smoke
  - like palm-like plumes of smoke
  lexicon: HALOT
  rationale: תִּימֲרוֹת refers to rising columns/plumes, likely from a root associated
    with upright forms. 'Columns of smoke' is clear modern English; 'pillars' is traditional
    and possible, but 'columns' avoids overly fixed liturgical phrasing while retaining
    the vertical image.
- source_word: מְקֻטֶּרֶת
  chosen: perfumed
  alternatives:
  - fumigated
  - made fragrant
  - incensed
  lexicon: HALOT
  rationale: The passive participle from קטר here describes being scented by burning
    aromatics. 'Perfumed' communicates the result naturally in English poetry; 'incensed'
    would be obscure or misleading in modern usage.
- source_word: מוֹר
  chosen: myrrh
  lexicon: HALOT
  rationale: Standard rendering for the aromatic resin מור.
- source_word: וּלְבוֹנָה
  chosen: frankincense
  lexicon: HALOT
  rationale: Standard rendering for לבונה, the aromatic resin frankincense.
- source_word: מִכֹּל אַבְקַת רֹכֵל
  chosen: with every fragrant powder of the merchant
  alternatives:
  - from every powder of the merchant
  - with all the merchant's powders
  - with every spice-powder of the trader
  lexicon: HALOT
  rationale: אַבְקַת denotes powder/dust, here aromatic powder in context. רֹכֵל is
    a trader/merchant, likely one dealing in spices or perfumes. 'With every fragrant
    powder of the merchant' makes the implicit aromatic sense explicit from context
    while preserving the genitive relationship.
