id: SNG.3.3
reference: Song of Songs 3:3
source:
  edition: WLC
  text: מְצָא֨וּ/נִי֙ הַ/שֹּׁ֣מְרִ֔ים הַ/סֹּבְבִ֖ים בָּ/עִ֑יר אֵ֛ת שֶׁ/אָהֲבָ֥ה נַפְשִׁ֖/י
    רְאִיתֶֽם׃
translation:
  text: 'The watchmen who go about the city found me: “Have you seen the one whom
    my soul loves?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the watchmen who patrol the city found me.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the one whom my soul loves,” a recurring poetic expression in
      the Song.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְצָאוּנִי
  chosen: found me
  alternatives:
  - came upon me
  - met me
  lexicon: HALOT
  rationale: Qal perfect 3cp + 1cs suffix from מצא, straightforwardly 'found me.'
    'Found me' is the most natural and direct English rendering in context.
- source_word: הַשֹּׁמְרִים
  chosen: the watchmen
  alternatives:
  - the guards
  - the keepers
  lexicon: HALOT
  rationale: Participle from שמר with article, used substantivally for those keeping
    watch. 'Watchmen' fits the city-night setting and preserves the literary tone
    better than the flatter 'guards.'
- source_word: הַסֹּבְבִים
  chosen: who go about
  alternatives:
  - who patrol
  - who make their rounds
  - circling
  lexicon: HALOT
  rationale: Participle from סבב, modifying 'watchmen.' 'Who go about' preserves the
    ongoing, descriptive sense without over-specifying a modern policing concept.
    'Patrol' is possible but slightly interpretive.
- source_word: בָּעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Simple locative phrase. In English, 'go about the city' naturally incorporates
    the prepositional sense.
- source_word: אֵת שֶׁאָהֲבָה נַפְשִׁי
  chosen: the one whom my soul loves
  alternatives:
  - him whom my soul loves
  - the one I love with my soul
  - the one my heart loves
  lexicon: HALOT
  rationale: This idiom recurs in Song. 'The one whom my soul loves' preserves both
    the object marker construction and the poetic force of נֶפֶשׁ as 'soul/self/life.'
    'Him whom' is more traditional but less natural in modern English; 'my heart'
    would flatten the Hebrew term.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - my whole being
  lexicon: HALOT
  rationale: נפש often denotes the inner self or whole being, but in this poetic refrain
    'my soul' is both faithful and idiomatic in English biblical style. The phrase
    is well established and preserves the verse's emotional depth.
- source_word: רְאִיתֶם
  chosen: Have you seen
  alternatives:
  - Did you see
  - Have you looked upon
  lexicon: HALOT
  rationale: Second masculine plural perfect from ראה used in direct speech as a question.
    Present perfect in English suits the immediate inquiry to the watchmen better
    than simple past.
