id: SNG.3.9
reference: Song of Songs 3:9
source:
  edition: WLC
  text: אַפִּרְי֗וֹן עָ֤שָׂה ל/וֹ֙ הַ/מֶּ֣לֶךְ שְׁלֹמֹ֔ה מֵ/עֲצֵ֖י הַ/לְּבָנֽוֹן׃
translation:
  text: King Solomon made for himself a palanquin from the trees of Lebanon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'litter,' 'carriage,' or 'sedan chair'; the Hebrew term is rare and its
      exact referent is uncertain, though it clearly denotes a luxurious conveyance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַפִּרְיוֹן
  chosen: palanquin
  alternatives:
  - litter
  - carriage
  - sedan chair
  lexicon: HALOT
  rationale: A rare loanword of uncertain precise referent, denoting a portable royal
    conveyance. 'Palanquin' best captures an elevated, carried vehicle in natural
    modern English without over-specifying construction. Alternatives are preserved
    because the term is uncommon and debated.
- source_word: עָשָׂה
  chosen: made
  alternatives:
  - constructed
  - fashioned
  lexicon: HALOT
  rationale: The common verb 'make/do' is straightforward here. 'Made' is idiomatic
    and sufficiently broad, avoiding unnecessary embellishment.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix can mean 'for him,' but with Solomon
    as the immediately following subject, English idiom favors the reflexive sense
    'for himself,' indicating personal possession or use.
- source_word: הַמֶּלֶךְ שְׁלֹמֹה
  chosen: King Solomon
  alternatives:
  - the king, Solomon
  lexicon: HALOT
  rationale: This is the natural English rendering of the title plus personal name.
    Names are transliterated per project philosophy, while the title is translated.
- source_word: מֵעֲצֵי
  chosen: from the trees of
  alternatives:
  - from the wood of
  - from timbers of
  lexicon: HALOT
  rationale: Literally 'from the trees/woods of.' Because the plural construct with
    Lebanon points to material sourced from its famed forests, 'from the trees of'
    preserves the imagery while remaining clear. 'Wood' or 'timbers' are possible
    but slightly more interpretive.
- source_word: הַלְּבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
