id: SNG.3.7
reference: Song of Songs 3:7
source:
  edition: WLC
  text: הִנֵּ֗ה מִטָּת/וֹ֙ שֶׁ/לִּ/שְׁלֹמֹ֔ה שִׁשִּׁ֥ים גִּבֹּרִ֖ים סָבִ֣יב לָ֑/הּ
    מִ/גִּבֹּרֵ֖י יִשְׂרָאֵֽל׃
translation:
  text: Look, it is Solomon’s couch; sixty mighty men are around it, from the mighty
    men of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bed'; the Hebrew term can denote a bed or couch, and some understand
      it here as a portable royal litter or palanquin in light of the surrounding
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the scene with deictic attention. 'Look' is natural modern
    English and preserves the demonstrative force without archaic tone.
- source_word: מִטָּתוֹ
  chosen: his couch
  alternatives:
  - his bed
  - his litter
  - his palanquin
  lexicon: HALOT
  rationale: The noun can denote a bed, couch, or place of reclining. In this context
    of a guarded royal conveyance or resting place, 'couch' preserves the ambiguity
    better than 'bed' while avoiding over-specifying to 'palanquin,' which is more
    explicit in v. 9, not here.
- source_word: שֶׁלִּשְׁלֹמֹה
  chosen: Solomon’s
  alternatives:
  - belonging to Solomon
  - which is Solomon’s
  lexicon: HALOT
  rationale: The construction marks possession. The English genitive is the most natural
    rendering.
- source_word: שִׁשִּׁים
  chosen: sixty
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: גִּבֹּרִים
  chosen: mighty men
  alternatives:
  - warriors
  - valiant men
  - heroes
  lexicon: HALOT
  rationale: The term commonly denotes strong, valiant fighting men. 'Mighty men'
    preserves the lexical link with the repeated phrase later in the verse and echoes
    established biblical usage without becoming archaic.
- source_word: סָבִיב
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: HALOT
  rationale: Expresses surrounding position. 'Around' is concise and idiomatic.
- source_word: לָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The pronominal suffix is grammatically feminine because מִטָּה is feminine.
    English idiom refers to an inanimate object as 'it,' so the translation follows
    sense rather than preserving grammatical gender.
- source_word: מִגִּבֹּרֵי יִשְׂרָאֵל
  chosen: from the mighty men of Israel
  alternatives:
  - of the mighty men of Israel
  - from Israel’s warriors
  lexicon: HALOT
  rationale: 'The preposition מִן here indicates selection or source: these sixty
    are drawn from among Israel''s mighty men. Rendering it explicitly as ''from''
    preserves that nuance.'
