id: SNG.3.1
reference: Song of Songs 3:1
source:
  edition: WLC
  text: עַל מִשְׁכָּבִ/י֙ בַּ/לֵּיל֔וֹת בִּקַּ֕שְׁתִּי אֵ֥ת שֶׁ/אָהֲבָ֖ה נַפְשִׁ֑/י
    בִּקַּשְׁתִּ֖י/ו וְ/לֹ֥א מְצָאתִֽי/ו־׃
translation:
  text: On my bed in the nights I sought the one my soul loves; I sought him, but
    I did not find him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'in the nights' is plural, suggesting repeated nights or nighttime
      periods; many English versions smooth this to 'by night.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל מִשְׁכָּבִי
  chosen: On my bed
  alternatives:
  - Upon my bed
  - On my couch
  lexicon: HALOT
  rationale: מִשְׁכָּב denotes a place of lying down, often bed or couch. 'On my bed'
    is natural English and preserves the concrete image without unnecessary archaism.
- source_word: בַּלֵּילוֹת
  chosen: in the nights
  alternatives:
  - by night
  - in the night watches
  - at night
  lexicon: HALOT
  rationale: The Hebrew is plural ('nights'), not singular. 'In the nights' preserves
    the plural form and the sense of repeated nocturnal searching better than the
    traditional singular 'by night.'
- source_word: בִּקַּשְׁתִּי
  chosen: I sought
  alternatives:
  - I searched for
  - I looked for
  lexicon: HALOT
  rationale: בקשׁ commonly means 'seek' or 'search for.' 'I sought' is concise, literary,
    and fits the poetic register of Song of Songs.
- source_word: אֵת שֶׁאָהֲבָה נַפְשִׁי
  chosen: the one my soul loves
  alternatives:
  - him whom my soul loves
  - the one I love with my soul
  - the one my life loves
  lexicon: HALOT
  rationale: This clause literally means 'whom my soul has loved/loves.' 'The one
    my soul loves' is idiomatic modern English while preserving the Hebrew's personal
    object and the emotive force of נֶפֶשׁ as the inner self.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - my inner being
  - I
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, life, or person depending on context. Here
    'my soul' preserves the poetic and affective depth of the Hebrew and matches the
    love-language of the Song.
- source_word: בִּקַּשְׁתִּיו
  chosen: I sought him
  alternatives:
  - I searched for him
  - I looked for him
  lexicon: HALOT
  rationale: The repeated verb should be retained in English to preserve the Hebrew
    parallelism and intensification. The pronominal suffix is explicit, so 'him' is
    included.
- source_word: וְלֹא מְצָאתִיו
  chosen: but I did not find him
  alternatives:
  - and I did not find him
  - but I could not find him
  lexicon: HALOT
  rationale: The conjunction plus negation introduces the unsuccessful result. 'But'
    brings out the adversative sense naturally in English, while 'did not find him'
    closely reflects the Hebrew verb מצא.
