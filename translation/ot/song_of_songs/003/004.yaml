id: SNG.3.4
reference: Song of Songs 3:4
source:
  edition: WLC
  text: כִּ/מְעַט֙ שֶׁ/עָבַ֣רְתִּי מֵ/הֶ֔ם עַ֣ד שֶֽׁ/מָּצָ֔אתִי אֵ֥ת שֶׁ/אָהֲבָ֖ה
    נַפְשִׁ֑/י אֲחַזְתִּי/ו֙ וְ/לֹ֣א אַרְפֶּ֔/נּוּ עַד שֶׁ֤/הֲבֵיאתִי/ו֙ אֶל בֵּ֣ית
    אִמִּ֔/י וְ/אֶל חֶ֖דֶר הוֹרָתִֽ/י־־־׃
translation:
  text: I had scarcely passed by them when I found the one my soul loves. I held on
    to him and would not let him go until I had brought him into my mother's house,
    into the chamber of the one who conceived me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'him whom my soul loves.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the chamber of the one who conceived me,' a poetic parallel to 'my
      mother's house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְעַט
  chosen: I had scarcely
  alternatives:
  - hardly
  - barely
  lexicon: HALOT
  rationale: The idiom introduces an event that happened almost immediately after
    passing the watchmen. 'I had scarcely' captures the temporal nuance in natural
    English better than a wooden 'a little.'
- source_word: שֶׁעָבַרְתִּי מֵהֶם
  chosen: passed by them
  alternatives:
  - passed from them
  - gone beyond them
  lexicon: HALOT
  rationale: עבר with מן here indicates moving on from the watchmen just mentioned.
    'Passed by them' is idiomatic and preserves the narrative movement.
- source_word: עַד שֶׁמָּצָאתִי
  chosen: when I found
  alternatives:
  - until I found
  lexicon: HALOT
  rationale: Although עד שׁ formally means 'until,' in English after 'I had scarcely...'
    the smoother equivalent is 'when I found,' conveying the near-immediacy without
    awkwardness.
- source_word: אֵת שֶׁאָהֲבָה נַפְשִׁי
  chosen: the one my soul loves
  alternatives:
  - him whom my soul loves
  - the one I love with my soul
  lexicon: HALOT
  rationale: This recurring phrase in Song of Songs is best kept with 'soul' preserved
    rather than flattened to simply 'the one I love.' 'The one my soul loves' is both
    faithful and readable.
- source_word: אֲחַזְתִּיו
  chosen: I held on to him
  alternatives:
  - I seized him
  - I held him
  lexicon: HALOT
  rationale: אחז can mean grasp, seize, hold fast. In this romantic context 'held
    on to him' conveys affectionate firmness without implying violence.
- source_word: וְלֹא אַרְפֶּנּוּ
  chosen: and would not let him go
  alternatives:
  - and did not release him
  - and would not leave him
  lexicon: HALOT
  rationale: רפה in hiphil here means to let go or release. 'Would not let him go'
    is the most natural English equivalent and matches the emotional force.
- source_word: עַד שֶׁהֲבֵיאתִיו
  chosen: until I had brought him
  alternatives:
  - until I brought him
  lexicon: HALOT
  rationale: The pluperfect-like English form fits the sequence after 'would not let
    him go' and preserves the completed action before the destination phrases.
- source_word: אֶל בֵּית אִמִּי
  chosen: into my mother's house
  alternatives:
  - to my mother's house
  lexicon: HALOT
  rationale: '''Into'' better reflects the motion toward interior space implied by
    the context of bringing him inside.'
- source_word: וְאֶל חֶדֶר הוֹרָתִי
  chosen: into the chamber of the one who conceived me
  alternatives:
  - into the room of she who conceived me
  - into the chamber of my mother
  lexicon: HALOT
  rationale: הוֹרָתִי is a participial form meaning 'the one who conceived/bore me.'
    'Conceived me' is more precise to the Hebrew root and avoids reducing the poetic
    parallelism to mere repetition of 'mother.'
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my self
  - my being
  lexicon: HALOT
  rationale: The Hebrew term often denotes the inner self or whole person, but in
    this poetic refrain 'my soul' preserves the literary and emotional texture of
    the Song.
