id: EZK.18.24
reference: Ezekiel 18:24
source:
  edition: WLC
  text: וּ/בְ/שׁ֨וּב צַדִּ֤יק מִ/צִּדְקָת/וֹ֙ וְ/עָ֣שָׂה עָ֔וֶל כְּ/כֹ֨ל הַ/תּוֹעֵב֜וֹת
    אֲשֶׁר עָשָׂ֧ה הָ/רָשָׁ֛ע יַעֲשֶׂ֖ה וָ/חָ֑י כָּל צדקת/ו אֲשֶׁר עָשָׂה֙ לֹ֣א תִזָּכַ֔רְנָה
    בְּ/מַעֲל֧/וֹ אֲשֶׁר מָעַ֛ל וּ/בְ/חַטָּאת֥/וֹ אֲשֶׁר חָטָ֖א בָּ֥/ם יָמֽוּת־־־־־׃
translation:
  text: But when a righteous man turns away from his righteousness and does injustice,
    doing all the abominations that the wicked man has done, will he live? None of
    the righteous deeds that he has done will be remembered. In the treachery by which
    he has acted treacherously, and in the sin that he has committed—in them he shall
    die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the detestable things.'
    reason: lexical_alternative
  - marker: b
    text: '''Acted treacherously'' may also be rendered ''been unfaithful'' or ''committed
      trespass''; the Hebrew emphasizes breach of faith through a cognate noun-verb
      pair.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in them he shall die,' referring to the treachery and sin just
      mentioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשׁוּב
  chosen: But when ... turns away
  alternatives:
  - And when ... turns back/returns
  lexicon: HALOT
  rationale: The conjunction plus infinitive construct introduces a conditional-temporal
    clause. In context, 'when' is natural English, and 'But' captures the contrast
    with the previous verse. שׁוּב with מן here means turning away from a prior state,
    so 'turns away' is more precise than simply 'returns'.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - a righteous person
  - the righteous man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'Righteous man' preserves
    the masculine singular form and representative force, in line with the gender-accurate
    policy. 'A' fits the generic case better than 'the'.
- source_word: מִצִּדְקָתוֹ
  chosen: from his righteousness
  alternatives:
  - from his righteous conduct
  - from his justice
  lexicon: HALOT
  rationale: The noun denotes righteousness/right conduct here. 'Righteousness' preserves
    the lexical link with צַדִּיק and the broader moral category, while 'from' reflects
    the preposition מן.
- source_word: וְעָשָׂה עָוֶל
  chosen: and does injustice
  alternatives:
  - and commits iniquity
  - and does wrong
  lexicon: HALOT
  rationale: עָוֶל denotes injustice, wrong, or unrighteousness. 'Does injustice'
    is both readable and morally weighty, and it avoids archaic 'iniquity' while preserving
    the active sense of עשה + noun.
- source_word: כְּכֹל הַתּוֹעֵבוֹת
  chosen: all the abominations
  alternatives:
  - all the detestable things
  - every abominable act
  lexicon: HALOT
  rationale: תּוֹעֵבוֹת is a strong covenantal-moral term often rendered 'abominations.'
    Retaining 'abominations' preserves the severity and intertextual resonance in
    Ezekiel.
- source_word: הָרָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked one
  - the guilty man
  lexicon: HALOT
  rationale: The adjective is substantival and contrasts with צַדִּיק. 'The wicked
    man' preserves the singular representative figure and the moral contrast.
- source_word: יַעֲשֶׂה וָחָי
  chosen: doing ... will he live?
  alternatives:
  - shall he do them and live?
  - can he live?
  lexicon: HALOT
  rationale: 'The Hebrew presents the action and then the rhetorical question of survival.
    English idiom is improved by making the participial sense explicit: ''doing ...
    will he live?'' This preserves the rhetorical force without over-paraphrasing.'
- source_word: כָּל צִדְקֹתָו
  chosen: None of the righteous deeds
  alternatives:
  - All his righteous acts
  - any of his righteous acts
  lexicon: HALOT
  rationale: With the following negated verb, the sense is that not one of his prior
    righteous acts will count or be recalled. Rendering as 'None of the righteous
    deeds' makes the distributive force clear in English.
- source_word: לֹא תִזָּכַרְנָה
  chosen: will be remembered
  alternatives:
  - will be recalled
  - will be taken into account
  lexicon: HALOT
  rationale: The Niphal of זכר is naturally 'be remembered.' Although the judicial
    nuance may imply not being taken into account, the more literal rendering should
    stand in the main text.
- source_word: בְּמַעֲלוֹ אֲשֶׁר מָעַל
  chosen: In the treachery by which he has acted treacherously
  alternatives:
  - For the unfaithfulness in which he has been unfaithful
  - In his trespass by which he trespassed
  lexicon: HALOT
  rationale: The cognate noun-verb pair from מעל conveys breach of faith, treachery,
    or unfaithfulness, not merely generic wrongdoing. 'Acted treacherously' preserves
    the covenantal betrayal nuance better than the more technical but less transparent
    'trespass.'
- source_word: וּבְחַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: and in the sin that he has committed
  alternatives:
  - and for the sin that he sinned
  - and in his sin by which he sinned
  lexicon: HALOT
  rationale: The cognate construction intensifies personal culpability. Smooth English
    requires 'the sin that he has committed,' which preserves the meaning without
    wooden repetition.
- source_word: בָּם
  chosen: in them
  alternatives:
  - because of them
  - for them
  lexicon: HALOT
  rationale: The preposition is literally 'in them,' referring back to the treachery
    and sin just mentioned. This is somewhat idiomatic in Hebrew for the sphere/cause
    of death; retaining 'in them' keeps the textual texture while remaining intelligible.
- source_word: יָמוּת
  chosen: he shall die
  alternatives:
  - he will die
  lexicon: HALOT
  rationale: The imperfect here states the consequence/judgment. 'He shall die' suitably
    conveys the solemn judicial force.
