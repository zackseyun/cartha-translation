theological_decisions:
- issue: Whether the verse should be phrased to imply loss of accumulated merit versus
    covenantal accountability for present apostasy
  chosen_reading: The translation preserves the text's judicial statement that prior
    righteous deeds will not be remembered if a righteous man turns away and commits
    wickedness, without importing a later doctrinal framework about merit or perseverance.
  alternative_readings:
  - A rendering that emphasizes forfeiture of merit
  - A rendering that softens the statement into mere social consequence
  rationale: Ezekiel 18 addresses individual moral accountability before God. The
    wording should remain as the text states—prior righteous deeds will not be remembered,
    and he will die in his treachery and sin—without resolving broader theological
    debates beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
