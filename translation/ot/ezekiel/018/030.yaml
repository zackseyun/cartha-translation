theological_decisions:
- issue: Rendering the individualizing masculine אִישׁ in a corporate address
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew singles out each individual within the house of Israel for
    judgment. Following the project's gender-accurate principle, the masculine representative
    form is retained rather than neutralized, while the distributive sense is made
    explicit with 'each.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering עָוֺן in the final clause
  chosen_reading: iniquity may not become a stumbling block for you
  alternative_readings:
  - your iniquity may not be your ruin
  - guilt may not become a stumbling block for you
  rationale: The Hebrew phrase לְמִכְשׁוֹל עָוֺן is terse and can be understood as
    'a stumbling block of iniquity' or more idiomatically 'a cause of ruin through
    iniquity.' The main text keeps the lexical components visible and avoids over-interpreting
    the exact nuance, while an alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
