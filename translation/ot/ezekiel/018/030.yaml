id: EZK.18.30
reference: Ezekiel 18:30
source:
  edition: WLC
  text: לָ/כֵן֩ אִ֨ישׁ כִּ/דְרָכָ֜י/ו אֶשְׁפֹּ֤ט אֶתְ/כֶם֙ בֵּ֣ית יִשְׂרָאֵ֔ל נְאֻ֖ם
    אֲדֹנָ֣/י יְהוִ֑ה שׁ֤וּבוּ וְ/הָשִׁ֨יבוּ֙ מִ/כָּל פִּשְׁעֵי/כֶ֔ם וְ/לֹֽא יִהְיֶ֥ה
    לָ/כֶ֛ם לְ/מִכְשׁ֖וֹל עָוֺֽן־־׃
translation:
  text: Therefore I will judge each man according to his ways, O house of Israel,
    declares the Lord GOD. Turn back and turn away from all your transgressions, so
    that iniquity may not become a stumbling block for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that your iniquity may not become your ruin.' The Hebrew final phrase
      is compact and may emphasize either iniquity as the stumbling block or iniquity
      as leading to ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding argument; 'Therefore'
    preserves the logical force in natural English.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The singular distributive 'man' is explicit in Hebrew and governs the
    judgment statement individually. 'Each man' preserves the gender-accurate representative
    force per translation philosophy, rather than flattening to a gender-neutral collective.
- source_word: כִּדְרָכָיו
  chosen: according to his ways
  alternatives:
  - according to his conduct
  - according to his ways of life
  lexicon: HALOT
  rationale: דֶּרֶךְ often denotes one's course of conduct. 'Ways' keeps the Hebrew
    metaphor and echoes the chapter's repeated moral terminology.
- source_word: אֶשְׁפֹּט אֶתְכֶם
  chosen: I will judge
  alternatives:
  - I will bring judgment on
  lexicon: HALOT
  rationale: The verb שׁפט here is forensic/judicial. English 'I will judge' is direct
    and sufficient, with the object carried by context in the clause.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Vocative address is clear in context; adding 'O' reflects prophetic direct
    address without sounding archaic in this setting.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' אֲדֹנָי
    יְהוִה is conventionally 'Lord GOD'; 'the LORD' is the default for YHWH alone,
    but here 'Lord GOD' preserves the combined title and distinguishes the two elements.
- source_word: שׁוּבוּ
  chosen: Turn back
  alternatives:
  - Repent
  - Return
  lexicon: HALOT
  rationale: שׁוּב literally means 'turn/return.' 'Turn back' preserves the metaphor
    of reversal without importing later theological terminology more strongly than
    the Hebrew itself.
- source_word: וְהָשִׁיבוּ
  chosen: turn away
  alternatives:
  - put away
  - turn yourselves away
  lexicon: HALOT
  rationale: The Hiphil of שׁוּב here is causative and, with מִן, calls for removing
    oneself from transgressions. 'Turn away' captures the practical renunciation in
    idiomatic English while preserving the verbal parallel with the previous imperative.
- source_word: מִכָּל פִּשְׁעֵיכֶם
  chosen: from all your transgressions
  alternatives:
  - from all your rebellions
  - from all your offenses
  lexicon: HALOT
  rationale: פֶּשַׁע carries the sense of rebellion/transgression against God. 'Transgressions'
    is a standard, readable rendering that retains moral and covenantal weight.
- source_word: וְלֹא יִהְיֶה לָכֶם
  chosen: so that ... may not become for you
  alternatives:
  - and it will not be for you
  - lest it become for you
  lexicon: HALOT
  rationale: The clause expresses intended result following the imperatives. Rendering
    with 'so that' makes the purpose/result relation clear in English.
- source_word: לְמִכְשׁוֹל
  chosen: a stumbling block
  alternatives:
  - an obstacle
  - a cause of stumbling
  lexicon: HALOT
  rationale: מִכְשׁוֹל is something over which one stumbles, often morally or in judgment
    contexts. 'Stumbling block' preserves the metaphor and biblical resonance.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  - sin
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity, guilt, or its consequence. Here the phrase
    is compressed and somewhat ambiguous; 'iniquity' best preserves the moral sense
    without over-resolving whether the emphasis is on sin itself or its culpable result.
