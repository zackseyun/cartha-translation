id: EZK.18.7
reference: Ezekiel 18:7
source:
  edition: WLC
  text: וְ/אִישׁ֙ לֹ֣א יוֹנֶ֔ה חֲבֹלָת֥/וֹ חוֹב֙ יָשִׁ֔יב גְּזֵלָ֖ה לֹ֣א יִגְזֹ֑ל
    לַחְמ/וֹ֙ לְ/רָעֵ֣ב יִתֵּ֔ן וְ/עֵירֹ֖ם יְכַסֶּה בָּֽגֶד־׃
translation:
  text: He does not oppress anyone, but restores the debtor’s pledge; he does not
    commit robbery; he gives his bread to the hungry and covers the naked with a garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returns the pledge taken for a debt' or 'returns collateral to the debtor.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his bread'; that is, his food.
    reason: lexical_alternative
  - marker: c
    text: Or 'clothes the naked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹנֶה
  chosen: oppress
  alternatives:
  - wrong
  - mistreat
  - extort
  lexicon: HALOT
  rationale: The Hiphil of ינה commonly carries the sense of oppressing or exploiting
    another person. 'Oppress' best captures unjust social/economic mistreatment in
    this ethical context.
- source_word: אִישׁ
  chosen: anyone
  alternatives:
  - a man
  - another man
  lexicon: HALOT
  rationale: Although אִישׁ is formally masculine singular, here it functions generically
    in a legal-ethical description. 'Anyone' communicates the representative force
    in natural English without changing the sense of the prohibition.
- source_word: חֲבֹלָתוֹ חוֹב יָשִׁיב
  chosen: restores the debtor’s pledge
  alternatives:
  - returns his collateral for a debt
  - returns the pledge taken for a loan
  lexicon: HALOT
  rationale: The phrase refers to returning an item taken as security for a debt.
    'Pledge' is concise and biblically recognizable; adding 'debtor’s' clarifies whose
    pledge is in view and reflects חוֹב ('debt').
- source_word: גְּזֵלָה לֹא יִגְזֹל
  chosen: he does not commit robbery
  alternatives:
  - he does not rob
  - he does not seize by theft
  lexicon: HALOT
  rationale: The cognate noun + verb construction intensifies the idea of robbery/plunder.
    'Commit robbery' preserves the force better than a flatter 'steal,' which can
    sound too broad or mild.
- source_word: לַחְמוֹ
  chosen: his bread
  alternatives:
  - his food
  lexicon: HALOT
  rationale: Hebrew 'bread' can stand concretely or representatively for food. 'His
    bread' preserves the source image and idiom while remaining clear in English.
- source_word: לְרָעֵב
  chosen: to the hungry
  alternatives:
  - to the hungry person
  lexicon: HALOT
  rationale: The adjective functions substantivally. 'To the hungry' is idiomatic
    and preserves the ethical focus on those in need.
- source_word: עֵירֹם
  chosen: the naked
  alternatives:
  - the unclothed
  - the poorly clothed
  lexicon: HALOT
  rationale: The term denotes one lacking adequate clothing. 'The naked' is the standard
    direct rendering and fits the parallel with providing a garment.
- source_word: יְכַסֶּה בָּגֶד
  chosen: covers the naked with a garment
  alternatives:
  - clothes the naked
  - covers with clothing
  lexicon: HALOT
  rationale: The Hebrew uses the verb 'cover' with the object 'garment.' This rendering
    stays close to the source while remaining natural. 'Clothes the naked' is possible
    but less formally transparent.
