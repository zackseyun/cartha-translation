- issue: Generic masculine ethical subject
  chosen_reading: He does not oppress anyone, ...
  alternative_readings:
  - A man does not oppress another ...
  - Such a man does not oppress anyone ...
  rationale: The verse continues the portrait of a righteous person using masculine
    singular forms. Retaining 'he' follows the gender-accurate policy while rendering
    אִישׁ generically as 'anyone' in the object position for natural English.
