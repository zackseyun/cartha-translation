id: EZK.18.28
reference: Ezekiel 18:28
source:
  edition: WLC
  text: וַ/יִּרְאֶ֣ה ו/ישוב מִ/כָּל פְּשָׁעָ֖י/ו אֲשֶׁ֣ר עָשָׂ֑ה חָי֥וֹ יִחְיֶ֖ה לֹ֥א
    יָמֽוּת־׃
translation:
  text: Because he considered and turned back from all his transgressions that he
    had committed, he will surely live; he will not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he saw' or 'And he saw'; the Hebrew verb is literally 'saw,' here
      likely meaning perceived or considered.
    reason: lexical_alternative
  - marker: b
    text: Or 'repented' for 'turned back'; the Hebrew says 'turned/returned,' preserving
      the image of reversal from sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאֶה
  chosen: Because he considered
  alternatives:
  - And he saw
  - For he saw
  lexicon: HALOT
  rationale: The verb ראה literally means 'see,' but in this context of moral reflection
    leading to repentance, English 'considered' best conveys perceptive recognition
    rather than mere physical sight. The prefixed waw here is rendered contextually
    as causal/resultative ('because/for') in light of the preceding verse's logic.
- source_word: וישוב
  chosen: turned back
  alternatives:
  - repented
  - turned
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn/return.' 'Turned back' preserves the concrete
    metaphor of reversal from sin without importing later theological terminology
    too strongly. 'Repented' is interpretive and therefore left as an alternative.
- source_word: מִכָּל פְּשָׁעָיו
  chosen: from all his transgressions
  alternatives:
  - from all his rebellions
  - from all his offenses
  lexicon: HALOT
  rationale: פֶּשַׁע carries the sense of transgression/rebellion, often willful violation.
    'Transgressions' is a clear and established English equivalent that preserves
    moral seriousness without over-specifying political rebellion.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had committed
  alternatives:
  - that he had done
  - which he did
  lexicon: HALOT
  rationale: עָשָׂה is broadly 'do/make.' With sins as object, idiomatic English prefers
    'commit.' The pluperfect sense ('had committed') fits the retrospective relation
    to his turning back.
- source_word: חָיוֹ יִחְיֶה
  chosen: he will surely live
  alternatives:
  - living he will live
  - he shall certainly live
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'He will
    surely live' is a natural English way to preserve the emphatic force.
- source_word: לֹא יָמוּת
  chosen: he will not die
  alternatives:
  - he shall not die
  lexicon: HALOT
  rationale: A straightforward negated imperfect. 'Will not die' is clear modern English
    and preserves the contrast with 'will surely live.'
