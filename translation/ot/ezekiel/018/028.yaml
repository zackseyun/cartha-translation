theological_decisions:
- issue: Nature of the life/death statement in Ezekiel's covenantal warning context
  chosen_reading: Retain the text's direct promise and warning language as 'he will
    surely live; he will not die' without specifying whether the referent is exclusively
    physical, spiritual, temporal, or eschatological.
  alternative_readings:
  - physical survival
  - covenantal/judicial life
  - spiritual life
  rationale: The verse affirms life for the repentant wicked in Ezekiel's discourse
    without narrowly resolving the precise theological scope of 'live' and 'die.'
    Preserving the Hebrew wording maintains the text's intended moral and theological
    force without importing a later systematic category.
  doctrine_reference: Preserve theological tension rather than resolve it.
