id: EZK.18.19
reference: Ezekiel 18:19
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֕ם מַדֻּ֛עַ לֹא נָשָׂ֥א הַ/בֵּ֖ן בַּ/עֲוֺ֣ן הָ/אָ֑ב וְ/הַ/בֵּ֞ן
    מִשְׁפָּ֧ט וּ/צְדָקָ֣ה עָשָׂ֗ה אֵ֣ת כָּל חֻקּוֹתַ֥/י שָׁמַ֛ר וַ/יַּעֲשֶׂ֥ה אֹתָ֖/ם
    חָיֹ֥ה יִחְיֶֽה־־׃
translation:
  text: Yet you say, ‘Why does the son not bear the iniquity of the father?’ But the
    son has done justice and righteousness, has kept all my statutes, and has done
    them; he shall surely live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the guilt of the father' or 'the punishment for the father's iniquity.'
      The Hebrew idiom 'bear iniquity' can include both guilt and its consequences.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: Yet you say
  alternatives:
  - And you say
  - But you say
  lexicon: HALOT
  rationale: The conjunction plus perfect 2mp introduces the people's objection in
    discourse. 'Yet' captures the adversative force in context, where the audience
    resists the principle just stated.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative of reason; 'Why' is the natural modern English
    equivalent.
- source_word: לֹא נָשָׂא
  chosen: does ... not bear
  alternatives:
  - does ... not carry
  - has ... not borne
  lexicon: HALOT
  rationale: נשא with עון commonly means to bear guilt/iniquity or its consequence.
    Present English in the question fits the generic principle under discussion better
    than a simple past.
- source_word: הַבֵּן
  chosen: the son
  alternatives:
  - a son
  lexicon: HALOT
  rationale: The article points to the son as a class representative in the proverb-like
    objection. 'The son' preserves the Hebrew form and the father-son contrast.
- source_word: בַּעֲוֺן הָאָב
  chosen: the iniquity of the father
  alternatives:
  - the guilt of the father
  - the punishment for the father's iniquity
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or punishment. Here 'iniquity' preserves
    the Hebrew's moral weight and leaves intact the biblical idiom 'bear iniquity'
    without over-resolving whether guilt or penalty is foregrounded.
- source_word: מִשְׁפָּט וּצְדָקָה
  chosen: justice and righteousness
  alternatives:
  - what is just and right
  - justice and what is right
  lexicon: HALOT
  rationale: This common Ezekiel pair denotes conduct aligned with God's standards.
    'Justice and righteousness' preserves the lexical pairing and theological resonance
    better than a looser paraphrase.
- source_word: עָשָׂה
  chosen: has done
  alternatives:
  - practices
  - did
  lexicon: HALOT
  rationale: The perfect summarizes the son's established conduct. 'Has done' works
    naturally with the following perfects and retains the concrete verbal force.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חקים is often rendered 'statutes' in legal contexts. This keeps consistency
    with common covenantal/legal terminology.
- source_word: שָׁמַר
  chosen: has kept
  alternatives:
  - has observed
  - has guarded
  lexicon: HALOT
  rationale: In legal-covenantal contexts, שמר means to keep/observe commandments.
    'Has kept' is idiomatic and concise.
- source_word: וַיַּעֲשֶׂה אֹתָם
  chosen: and has done them
  alternatives:
  - and has practiced them
  - and has carried them out
  lexicon: HALOT
  rationale: The Hebrew intentionally pairs keeping with doing. 'Has done them' sounds
    slightly formal but preserves the repetition and emphasis on actual obedience.
- source_word: חָיֹה יִחְיֶה
  chosen: he shall surely live
  alternatives:
  - he will certainly live
  - he shall indeed live
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'Shall surely
    live' is a standard, clear way to preserve the emphatic force.
