theological_decisions:
- issue: Meaning of 'bear the iniquity of the father'
  chosen_reading: Retain the idiom without specifying whether it refers primarily
    to inherited guilt or to punishment for the father's sin.
  alternative_readings:
  - bear the guilt of the father
  - bear the punishment for the father's iniquity
  rationale: The verse argues individual accountability, but the Hebrew idiom עון
    can encompass guilt and its consequences. The translation preserves the text's
    wording and theological tension rather than narrowing it to one doctrinal formulation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it).
