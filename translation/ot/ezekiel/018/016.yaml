id: EZK.18.16
reference: Ezekiel 18:16
source:
  edition: WLC
  text: וְ/אִישׁ֙ לֹ֣א הוֹנָ֔ה חֲבֹל֙ לֹ֣א חָבָ֔ל וּ/גְזֵלָ֖ה לֹ֣א גָזָ֑ל לַחְמ/וֹ֙
    לְ/רָעֵ֣ב נָתָ֔ן וְ/עֵר֖וֹם כִּסָּה בָֽגֶד־׃
translation:
  text: He has not oppressed anyone, has not taken a pledge, and has not robbed; he
    has given his bread to the hungry and covered the naked with a garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has not seized collateral' or 'has not taken a debtor’s pledge.' The
      Hebrew refers to taking a pledge from a debtor, often with the implication of
      abusive or unjust practice.
    reason: lexical_alternative
  - marker: b
    text: Literally 'his bread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: anyone
  alternatives:
  - a man
  - a person
  lexicon: HALOT
  rationale: Though literally 'man,' in this context with negation and ethical conduct
    it functions generically ('any person'). Rendering 'anyone' communicates the representative
    force in natural English while preserving the sense.
- source_word: הוֹנָה
  chosen: has not oppressed
  alternatives:
  - has not wronged
  - has not mistreated
  - has not defrauded
  lexicon: HALOT
  rationale: The verb ינה in this stem commonly denotes oppressing or mistreating
    another, especially in social-ethical contexts. 'Oppressed' best fits the surrounding
    concern for justice toward the vulnerable.
- source_word: חֲבֹל ... חָבָל
  chosen: has not taken a pledge
  alternatives:
  - has not seized collateral
  - has not taken a debtor's pledge
  lexicon: HALOT
  rationale: The noun-verb pairing from חבל refers to taking a pledge/collateral from
    a debtor. 'Taken a pledge' is concise and reflects the legal-economic background;
    the context in Ezekiel 18 echoes Torah prohibitions about abusive seizure of pledges.
- source_word: גְזֵלָה ... גָזָל
  chosen: has not robbed
  alternatives:
  - has not committed robbery
  - has not plundered
  - has not stolen
  lexicon: HALOT
  rationale: The noun-verb combination intensifies the idea of robbery or violent/severe
    taking. 'Robbed' is stronger and more precise than the broader 'stolen.'
- source_word: לַחְמוֹ
  chosen: his bread
  alternatives:
  - his food
  lexicon: HALOT
  rationale: לחם literally means 'bread,' and retaining it preserves the concrete
    imagery of sharing one's own sustenance. It can imply food more broadly, but 'bread'
    is the more textually transparent choice here.
- source_word: לְרָעֵב
  chosen: to the hungry
  alternatives:
  - to the hungry person
  lexicon: HALOT
  rationale: The adjective used substantivally refers to a hungry person or the hungry
    generally. 'To the hungry' is idiomatic and preserves the ethical generality.
- source_word: עֵרוֹם
  chosen: the naked
  alternatives:
  - the unclothed
  - the poorly clothed
  lexicon: HALOT
  rationale: The adjective denotes one who is naked or lacking adequate clothing.
    'The naked' is the standard direct rendering and fits the parallel with providing
    a garment.
- source_word: כִּסָּה בָגֶד
  chosen: covered the naked with a garment
  alternatives:
  - clothed the naked
  - covered with clothing
  lexicon: HALOT
  rationale: The Hebrew is literally 'covered [with] a garment.' This fuller rendering
    preserves the concrete action and object, rather than compressing it to the more
    interpretive 'clothed.'
