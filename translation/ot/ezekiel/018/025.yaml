id: EZK.18.25
reference: Ezekiel 18:25
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֕ם לֹ֥א יִתָּכֵ֖ן דֶּ֣רֶךְ אֲדֹנָ֑/י שִׁמְעוּ נָא֙ בֵּ֣ית יִשְׂרָאֵ֔ל
    הֲ/דַרְכִּ/י֙ לֹ֣א יִתָּכֵ֔ן הֲ/לֹ֥א דַרְכֵי/כֶ֖ם לֹ֥א יִתָּכֵֽנוּ־׃
translation:
  text: 'Yet you say, ‘The Lord’s way is not just.’ Hear now, house of Israel: Is
    my way not just? Is it not your ways that are not just?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'right' or 'fair' for 'just' in each occurrence of 'is not just.' The
      Hebrew term here concerns what is proper or equitable.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: Yet you say
  alternatives:
  - And you say
  - But you say
  lexicon: HALOT
  rationale: The conjunction plus qatal here advances the discourse with adversative
    force in context, responding to Israel's objection. 'Yet' captures the rebuttal
    tone more naturally than a simple 'and.'
- source_word: יִתָּכֵן
  chosen: is just
  alternatives:
  - is right
  - is fair
  - is established
  lexicon: HALOT
  rationale: In this disputation context about moral equity, the Niphal of תכן refers
    to what is right, proper, or equitable. 'Just' best fits the forensic-ethical
    sense and preserves the accusation against God's conduct. 'Fair' is possible but
    slightly more colloquial and less weighty.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - conduct
  - path
  lexicon: HALOT
  rationale: '''Way'' is the standard metaphorical rendering for manner of acting
    or course of dealing, and it works for both the Lord and Israel in the verse''s
    contrast.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title אֲדֹנָי, appropriately rendered 'the Lord.'
    This aligns with the project's default rendering for divine lordship language
    and standard English usage in prophetic discourse.
- source_word: שִׁמְעוּ נָא
  chosen: Hear now
  alternatives:
  - Listen now
  - Please hear
  lexicon: HALOT
  rationale: The imperative plus particle נָא is an urgent appeal. 'Hear now' preserves
    the prophetic register and directness without sounding archaic.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: house of Israel
  alternatives:
  - household of Israel
  lexicon: HALOT
  rationale: This is the standard covenantal address to the people as a corporate
    entity. 'House of Israel' is both accurate and idiomatic in prophetic literature.
- source_word: הֲדַרְכִּי לֹא יִתָּכֵן
  chosen: Is my way not just?
  alternatives:
  - Is my way not right?
  - Is my conduct not just?
  lexicon: HALOT
  rationale: The interrogative form expects the audience to recognize the truth of
    God's justice. Rendering the clause straightforwardly preserves the rhetorical
    challenge.
- source_word: הֲלֹא דַרְכֵיכֶם לֹא יִתָּכֵנוּ
  chosen: Is it not your ways that are not just?
  alternatives:
  - Is it not your ways that are not right?
  - Are not your ways unjust?
  lexicon: HALOT
  rationale: The Hebrew fronting highlights 'your ways' in contrast to 'my way.' The
    chosen English keeps the contrast explicit and mirrors the Hebrew rhetorical reversal.
    Plural 'ways' is retained because the Hebrew is plural.
