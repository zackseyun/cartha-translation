theological_decisions:
- issue: Moral characterization of God's dealings in response to Israel's accusation
  chosen_reading: Render יִתָּכֵן as 'just' throughout the verse
  alternative_readings:
  - right
  - fair
  rationale: The chapter centers on divine justice and individual responsibility.
    'Just' preserves the theological and judicial force of the accusation and God's
    rebuttal without softening it into mere procedural 'fairness.'
  doctrine_reference: Translation philosophy §3, §5
