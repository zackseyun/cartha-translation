id: EZK.18.23
reference: Ezekiel 18:23
source:
  edition: WLC
  text: הֶ/חָפֹ֤ץ אֶחְפֹּץ֙ מ֣וֹת רָשָׁ֔ע נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה הֲ/ל֛וֹא בְּ/שׁוּב֥/וֹ
    מִ/דְּרָכָ֖י/ו וְ/חָיָֽה׃ס
translation:
  text: Do I take any pleasure at all in the death of the wicked? declares the Lord
    GOD. Is it not rather in his turning from his ways and living?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do I indeed delight in the death of the wicked?' The Hebrew verb can
      express pleasure, delight, or desire.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'declares the Lord GOD' (אֲדֹנָי יְהוִה). The divine name יְהוָה
      is normally rendered 'the LORD'; in this compound title English convention uses
      'GOD' to avoid 'Lord LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'when he turns from his ways and lives.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶחָפֹץ אֶחְפֹּץ
  chosen: Do I take any pleasure at all
  alternatives:
  - Do I indeed delight
  - Do I really desire
  lexicon: HALOT
  rationale: 'The infinitive absolute with finite verb intensifies the verbal idea.
    English expresses this naturally with an emphatic question: ''Do I take any pleasure
    at all...?'' This preserves the rhetorical force without awkward literalism.'
- source_word: מוֹת
  chosen: the death
  alternatives:
  - dying
  lexicon: HALOT
  rationale: The noun denotes death as the event/state. 'The death' fits the Hebrew
    construct with 'wicked' better than the more process-oriented 'dying.'
- source_word: רָשָׁע
  chosen: the wicked
  alternatives:
  - the wicked man
  - the guilty
  lexicon: HALOT
  rationale: This adjective/substantive refers to a wicked person generically. 'The
    wicked' is idiomatic English and preserves the representative singular sense without
    adding 'man,' which is not required here.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: In prophetic formulae, 'declares' is clear modern English and preserves
    the authoritative speech-act sense.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the
    compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD'
    by rendering 'the Lord GOD.' This preserves both titles while remaining readable.
- source_word: הֲלוֹא
  chosen: Is it not rather
  alternatives:
  - Is it not
  - Surely it is
  lexicon: HALOT
  rationale: The particle introduces the expected positive answer in a rhetorical
    question. 'Rather' brings out the contrast with the preceding question, which
    is explicit in the discourse though not a separate Hebrew word.
- source_word: בְּשׁוּבוֹ
  chosen: in his turning
  alternatives:
  - when he turns
  - that he turn
  lexicon: HALOT
  rationale: The preposition with infinitive construct literally gives 'in/when his
    turning.' 'In his turning' keeps the close formal relation and works with the
    rhetorical structure; it also preserves the repentance motif without over-interpreting.
- source_word: מִדְּרָכָיו
  chosen: from his ways
  alternatives:
  - from his ways of life
  - from his conduct
  lexicon: HALOT
  rationale: '''Ways'' is a common biblical metaphor for conduct and should be retained
    for consistency and theological resonance. The plural with suffix is represented
    directly.'
- source_word: וְחָיָה
  chosen: and living
  alternatives:
  - and live
  - so that he may live
  lexicon: HALOT
  rationale: 'Given the parallel with ''in his turning,'' the English gerund ''and
    living'' yields a smooth balance: God''s pleasure is in the wicked person''s turning
    and living. This avoids forcing a more explicit purpose nuance than the Hebrew
    requires.'
