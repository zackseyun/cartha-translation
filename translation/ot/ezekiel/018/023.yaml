theological_decisions:
- issue: Divine disposition toward the wicked's death versus repentance
  chosen_reading: The verse is rendered as a rhetorical denial that God delights in
    the death of the wicked, with the positive alternative being the wicked person's
    turning and living.
  alternative_readings:
  - 'A stronger volitional sense: God does not desire the death of the wicked'
  - 'A more affective sense: God does not delight in the death of the wicked'
  rationale: חפץ can denote pleasure, delight, or desire. 'Take pleasure' preserves
    the affective-volitional overlap without importing a full theological system about
    divine will. The rhetorical structure is maintained so the text itself carries
    the tension between judgment and mercy.
  doctrine_reference: Preserve theological tension rather than resolve it.
