theological_decisions:
- issue: Individual moral responsibility in the illustrative case
  chosen_reading: The son observes his father's sins yet does not imitate them.
  alternative_readings:
  - The son merely notices the sins without moral discernment
  - The verse implies inherited guilt despite different conduct
  rationale: The verse contributes to Ezekiel 18's argument that judgment is according
    to one's own conduct. The translation preserves the repeated 'sees' and the concluding
    refusal to act similarly, without importing broader doctrinal claims beyond the
    text.
  doctrine_reference: Affirmations; Translation philosophy §3
