id: EZK.18.14
reference: Ezekiel 18:14
source:
  edition: WLC
  text: וְ/הִנֵּה֙ הוֹלִ֣יד בֵּ֔ן וַ/יַּ֕רְא אֶת כָּל חַטֹּ֥את אָבִ֖י/ו אֲשֶׁ֣ר עָשָׂ֑ה
    וַ/יִּרְאֶ֕ה וְ/לֹ֥א יַעֲשֶׂ֖ה כָּ/הֵֽן־־׃
translation:
  text: But look, he fathers a son, and he sees all the sins that his father has done;
    he sees them, and he does not do likewise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he begets a son.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats ''he sees'' for emphasis: ''he sees ... he sees, and does
      not do likewise.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: But look
  alternatives:
  - Now look
  - Behold
  - But behold
  lexicon: HALOT
  rationale: Introduces a vivid new case in the argument. 'Look' preserves the deictic
    force in readable modern English; 'But' reflects the discourse contrast with the
    prior example.
- source_word: הוֹלִיד בֵּן
  chosen: he fathers a son
  alternatives:
  - he begets a son
  - he has a son
  lexicon: HALOT
  rationale: The Hiphil of ילד is causative/generative ('beget, father'). 'Fathers
    a son' is more precise than the flatter 'has a son' and more natural in modern
    English than 'begets.'
- source_word: וַיַּרְא
  chosen: he sees
  alternatives:
  - he saw
  lexicon: HALOT
  rationale: Although the Hebrew wayyiqtol is formally past/narrative, the surrounding
    case-law style in English reads naturally as present in this illustrative sequence.
    This preserves the vividness of the example without distorting the sense.
- source_word: כָּל חַטֹּאת אָבִיו
  chosen: all the sins that his father has done
  alternatives:
  - all his father's sins
  - all the sinful deeds of his father
  lexicon: HALOT
  rationale: חַטֹּאת here is plural in sense ('sins'). Expanding with the following
    relative clause yields natural English while preserving the concrete moral acts
    in view.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that his father has done
  alternatives:
  - which he did
  - that he committed
  lexicon: HALOT
  rationale: Links the sins to the father's actual conduct. 'Has done' is straightforward
    and keeps the verbal connection with the later 'does not do.'
- source_word: וַיִּרְאֶה
  chosen: he sees them
  alternatives:
  - and considers
  - and sees
  lexicon: HALOT
  rationale: The repetition of ראה is retained rather than collapsed, since the Hebrew
    intentionally repeats it for emphasis. 'Them' makes the object explicit in idiomatic
    English.
- source_word: וְלֹא יַעֲשֶׂה כָּהֵן
  chosen: and he does not do likewise
  alternatives:
  - and does not do such things
  - and does not do the same
  - and does not do like them
  lexicon: HALOT
  rationale: כָּהֵן means 'thus/so, like this/these.' 'Do likewise' captures the comparative
    force succinctly and idiomatically, referring back to the father's sins.
