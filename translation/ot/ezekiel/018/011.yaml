id: EZK.18.11
reference: Ezekiel 18:11
source:
  edition: WLC
  text: וְ/ה֕וּא אֶת כָּל אֵ֖לֶּה לֹ֣א עָשָׂ֑ה כִּ֣י גַ֤ם אֶל הֶֽ/הָרִים֙ אָכַ֔ל וְ/אֶת
    אֵ֥שֶׁת רֵעֵ֖/הוּ טִמֵּֽא־־־־׃
translation:
  text: But he has done none of all these things; instead, he has even eaten on the
    mountains and defiled his neighbor’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, he has participated in illicit cultic meals at the high places
      or mountain shrines.
    reason: cultural_note
  - marker: b
    text: Or 'has eaten at the mountain shrines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: But he
  alternatives:
  - And he
  - As for him
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks a contrast with the righteous
    father in the preceding context. 'But he' brings out the adversative force naturally
    in English.
- source_word: אֶת כָּל אֵלֶּה לֹא עָשָׂה
  chosen: has done none of all these things
  alternatives:
  - did not do any of these things
  - has not done all these things
  lexicon: HALOT
  rationale: The phrase negates participation in the righteous deeds just listed.
    'None of all these things' preserves the comprehensive force of כָּל אֵלֶּה better
    than a looser paraphrase.
- source_word: כִּי גַם
  chosen: instead, ... even
  alternatives:
  - for also
  - indeed also
  - but even
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory/contrastive clause, and גַם intensifies
    the following offenses. English requires some restructuring; 'instead' captures
    the contrast and 'even' preserves the additive emphasis.
- source_word: אֶל הֶהָרִים אָכַל
  chosen: has even eaten on the mountains
  alternatives:
  - has eaten at the mountain shrines
  - has eaten upon the mountains
  lexicon: HALOT
  rationale: This idiom refers to participating in illicit cultic meals at high places.
    'On the mountains' keeps the Hebrew image while remaining understandable; the
    cultic implication can be clarified in a footnote rather than imported into the
    main text.
- source_word: אֵשֶׁת רֵעֵהוּ
  chosen: his neighbor’s wife
  alternatives:
  - the wife of his companion
  - his fellow man's wife
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or fellow. 'Neighbor’s wife'
    is idiomatic English and fits the moral/legal register of the passage.
- source_word: טִמֵּא
  chosen: defiled
  alternatives:
  - made unclean
  - violated
  lexicon: HALOT
  rationale: In this sexual context, the Piel of טמא denotes rendering someone unclean
    through illicit sexual relations. 'Defiled' preserves both the moral and ritual
    dimensions without over-paraphrasing.
