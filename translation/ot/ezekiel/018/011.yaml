theological_decisions:
- issue: Whether to make the idolatrous sense of eating on the mountains explicit
    in the main text
  chosen_reading: Retain the literal phrase 'eaten on the mountains' in the main text
  alternative_readings:
  - has eaten at the mountain shrines
  - has participated in idol feasts on the high places
  rationale: The Hebrew expression is a known idiom for illicit worship, but the text
    itself uses the concrete phrase. Optimal equivalence favors preserving the source
    image in the main text while allowing explanatory clarification in a footnote
    rather than resolving the idiom into a fuller interpretation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
