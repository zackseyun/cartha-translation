theological_decisions:
- issue: Cultic language of eating on the mountains
  chosen_reading: The phrase is rendered literally as participation in illicit high-place
    worship rather than generalized dining in the hills.
  alternative_readings:
  - A broader reading as simply eating sacrificial meals at shrines
  rationale: In Ezekiel's context, 'eating on the mountains' is a stock expression
    for idolatrous cultic practice. The translation keeps the literal wording while
    allowing the surrounding references to idols to clarify the sense.
- issue: Moral force of sexual impurity language
  chosen_reading: '''has not defiled his neighbor’s wife'''
  alternative_readings:
  - '''has not violated his neighbor’s wife'''
  rationale: The Hebrew focuses on defilement through adultery, not necessarily on
    coercion. The chosen wording preserves the text's moral-theological category without
    importing an additional claim.
