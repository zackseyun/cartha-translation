id: EZK.18.15
reference: Ezekiel 18:15
source:
  edition: WLC
  text: עַל הֶֽ/הָרִים֙ לֹ֣א אָכָ֔ל וְ/עֵינָי/ו֙ לֹ֣א נָשָׂ֔א אֶל גִּלּוּלֵ֖י בֵּ֣ית
    יִשְׂרָאֵ֑ל אֶת אֵ֥שֶׁת רֵעֵ֖/הוּ לֹ֥א טִמֵּֽא־־־׃
translation:
  text: He has not eaten on the mountains, nor lifted up his eyes to the idols of
    the house of Israel; he has not defiled his neighbor’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “has not eaten at the mountain shrines,” referring
      to participation in idolatrous worship.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for “idols” is contemptuous and may carry the sense of “filthy
      idols.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל הֶהָרִים ... אָכָל
  chosen: has not eaten on the mountains
  alternatives:
  - has not eaten at the mountain shrines
  - has not eaten upon the mountains
  lexicon: HALOT
  rationale: The idiom refers to participating in cultic meals at high places. A relatively
    formal rendering preserves the Hebrew imagery ('on the mountains') while allowing
    readers to infer the idolatrous setting from context; a more explicit interpretive
    expansion is preserved as an alternative.
- source_word: וְעֵינָיו לֹא נָשָׂא
  chosen: nor lifted up his eyes
  alternatives:
  - nor looked up
  - nor set his eyes
  lexicon: HALOT
  rationale: The Hebrew idiom 'lift up the eyes to' can denote directing attention
    or devotion toward something. Retaining the idiom is natural enough in English
    and preserves the source texture.
- source_word: גִּלּוּלֵי בֵּית יִשְׂרָאֵל
  chosen: the idols of the house of Israel
  alternatives:
  - the filthy idols of the house of Israel
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols, sometimes carrying
    a contemptuous nuance. 'Idols' is the clearest main-text rendering; the more forceful
    nuance is preserved as an alternative rather than imported into the main text.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is a standard covenantal-national designation. 'House
    of Israel' preserves the Hebrew expression and Ezekiel's style better than the
    shorter 'Israel'.
- source_word: אֵשֶׁת רֵעֵהוּ
  chosen: his neighbor’s wife
  alternatives:
  - the wife of his companion
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or fellow. 'Neighbor' is idiomatic
    and fits the ethical register of the passage.
- source_word: לֹא טִמֵּא
  chosen: has not defiled
  alternatives:
  - has not made unclean
  - has not violated
  lexicon: HALOT
  rationale: In this sexual context, טמא carries moral and ritual defilement. 'Defiled'
    preserves that weight better than the flatter 'made unclean,' while 'violated'
    would over-specify beyond the lexical sense here.
