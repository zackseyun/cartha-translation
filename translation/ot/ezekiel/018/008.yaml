id: EZK.18.8
reference: Ezekiel 18:8
source:
  edition: WLC
  text: בַּ/נֶּ֣שֶׁךְ לֹֽא יִתֵּ֗ן וְ/תַרְבִּית֙ לֹ֣א יִקָּ֔ח מֵ/עָ֖וֶל יָשִׁ֣יב יָד֑/וֹ
    מִשְׁפַּ֤ט אֱמֶת֙ יַֽעֲשֶׂ֔ה בֵּ֥ין אִ֖ישׁ לְ/אִֽישׁ־׃
translation:
  text: He does not lend at interest or take profit; he keeps his hand back from injustice;
    he carries out true justice between one man and another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He does not lend on usury or take increase.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'he turns back his hand from injustice.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'between man and man,' a legal idiom for judging fairly between two
      parties.
    reason: cultural_note
lexical_decisions:
- source_word: בַּנֶּשֶׁךְ
  chosen: at interest
  alternatives:
  - on usury
  - with interest
  lexicon: HALOT
  rationale: נֶשֶׁךְ refers to interest charged on a loan, often with exploitative
    connotations in legal texts. 'At interest' is clear modern English and avoids
    the archaic 'usury,' while still reflecting the economic-legal sense.
- source_word: יִתֵּן
  chosen: lend
  alternatives:
  - give
  lexicon: HALOT
  rationale: Although the verb is literally 'give,' in collocation with נֶשֶׁךְ it
    idiomatically means to give money on loan at interest. 'Lend' captures the sense
    required by the context.
- source_word: וְתַרְבִּית
  chosen: profit
  alternatives:
  - increase
  - interest
  lexicon: HALOT
  rationale: תַרְבִּית is a near-synonym of נֶשֶׁךְ in prohibitions against exploitative
    lending. 'Profit' preserves the distinction from the first term while communicating
    gain extracted from the loan.
- source_word: יִקָּח
  chosen: take
  alternatives:
  - receive
  lexicon: HALOT
  rationale: The verb is straightforwardly 'take.' In English, 'take profit' is idiomatic
    enough in this legal-moral context and preserves the active sense of receiving
    gain.
- source_word: מֵעָוֶל
  chosen: from injustice
  alternatives:
  - from wrong
  - from iniquity
  lexicon: HALOT
  rationale: עָוֶל denotes injustice, wrongdoing, or unrighteousness, especially in
    social/legal settings. 'From injustice' fits the ethical and judicial context
    of the verse.
- source_word: יָשִׁיב יָדוֹ
  chosen: he keeps his hand back
  alternatives:
  - he turns back his hand
  - he withdraws his hand
  lexicon: HALOT
  rationale: The idiom literally means 'he turns back his hand' and conveys refraining
    from participation. 'Keeps his hand back' preserves the metaphor in readable English
    better than a fully flattened paraphrase.
- source_word: מִשְׁפַּט אֱמֶת
  chosen: true justice
  alternatives:
  - faithful judgment
  - just judgment
  - a true verdict
  lexicon: HALOT
  rationale: The phrase combines judicial decision-making with truth/faithfulness.
    'True justice' is natural English that preserves both the legal and moral dimensions.
- source_word: יַעֲשֶׂה
  chosen: he carries out
  alternatives:
  - he does
  - he executes
  lexicon: HALOT
  rationale: While literally 'does,' in context of judicial practice 'carries out'
    expresses enacted justice in idiomatic English.
- source_word: בֵּין אִישׁ לְאִישׁ
  chosen: between one man and another
  alternatives:
  - between a man and a man
  - between one person and another
  lexicon: HALOT
  rationale: The Hebrew is literally 'between man and man,' an idiom for adjudicating
    between parties. Following the project's gender-accurate principle, 'man' is retained
    rather than neutralized to 'person,' while 'one man and another' gives natural
    English.
