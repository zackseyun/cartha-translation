theological_decisions:
- issue: Rendering of economic terms נֶשֶׁךְ and תַרְבִּית
  chosen_reading: Different but related terms rendered as 'interest' and 'profit'
  alternative_readings:
  - '''usury'' and ''increase'''
  - '''interest'' for both terms'
  rationale: The verse uses two related loan-profit terms. Rendering them with slight
    distinction reflects the Hebrew pairing without overstating a technical difference.
    'Usury' is possible but too archaic for the stated translation philosophy.
  doctrine_reference: DOCTRINE.md Translation philosophy points 5 and 6
- issue: Gendered idiom בֵּין אִישׁ לְאִישׁ
  chosen_reading: between one man and another
  alternative_readings:
  - between one person and another
  rationale: The source uses masculine singular אִישׁ in a representative legal idiom.
    Per the project's gender-accurate policy, the masculine form is preserved rather
    than neutralized, while still communicating the judicial setting.
  doctrine_reference: DOCTRINE.md Translation philosophy point 4
