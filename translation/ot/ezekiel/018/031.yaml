theological_decisions:
- issue: Human responsibility and divine gift in the command to obtain a new heart
    and spirit
  chosen_reading: Retain the imperative 'make for yourselves a new heart and a new
    spirit' without softening or harmonizing with later passages where God gives a
    new heart/spirit.
  alternative_readings:
  - Render more dynamically as 'get yourselves a new heart and a new spirit'
  - Interpretively soften to avoid tension with Ezekiel 36
  rationale: The verse directly commands repentance in strong terms. The translation
    preserves the theological tension within Ezekiel between human responsibility
    and God's renewing action, in line with the doctrine statement not to resolve
    genuine ambiguity or tension.
  doctrine_reference: Translation philosophy §3
- issue: Rendering פשע noun/verb pair
  chosen_reading: Use 'transgressions' and 'have transgressed' to preserve the lexical
    repetition.
  alternative_readings:
  - Use 'rebellions' and 'have rebelled'
  rationale: Both are possible, but 'transgression' is slightly broader and idiomatic
    in English while still conveying covenant violation. Preserving the cognate repetition
    keeps the prophetic rhetoric audible.
  doctrine_reference: Translation philosophy §5
