id: EZK.18.31
reference: Ezekiel 18:31
source:
  edition: WLC
  text: הַשְׁלִ֣יכוּ מֵ/עֲלֵי/כֶ֗ם אֶת כָּל פִּשְׁעֵי/כֶם֙ אֲשֶׁ֣ר פְּשַׁעְתֶּ֣ם בָּ֔/ם
    וַ/עֲשׂ֥וּ לָ/כֶ֛ם לֵ֥ב חָדָ֖שׁ וְ/ר֣וּחַ חֲדָשָׁ֑ה וְ/לָ֥/מָּה תָמֻ֖תוּ בֵּ֥ית
    יִשְׂרָאֵֽל־־׃
translation:
  text: Throw away from yourselves all your transgressions by which you have transgressed,
    and make for yourselves a new heart and a new spirit. Why should you die, O house
    of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Cast away from yourselves all your rebellions in which you have rebelled.'
      The Hebrew repeats the same root for 'transgressions' and 'have transgressed,'
      emphasizing culpability.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁלִיכוּ
  chosen: Throw away
  alternatives:
  - Cast away
  - Throw off
  lexicon: HALOT
  rationale: Imperative plural of שלך with the sense of casting away or discarding.
    'Throw away' is natural modern English and preserves the forceful command better
    than a softer option.
- source_word: מֵעֲלֵיכֶם
  chosen: from yourselves
  alternatives:
  - from upon yourselves
  - off yourselves
  lexicon: HALOT
  rationale: Literally 'from upon you.' In English, 'from yourselves' communicates
    removal of what clings to them without awkwardness; the preceding 'throw away'
    already carries the 'off' nuance.
- source_word: פִּשְׁעֵיכֶם
  chosen: your transgressions
  alternatives:
  - your rebellions
  - your offenses
  lexicon: HALOT
  rationale: פשע commonly denotes rebellion or transgression against rightful authority.
    'Transgressions' is a standard and accurate rendering here, while the verbal cognate
    later preserves the lexical connection.
- source_word: אֲשֶׁר פְּשַׁעְתֶּם בָּם
  chosen: by which you have transgressed
  alternatives:
  - in which you have rebelled
  - with which you have transgressed
  lexicon: HALOT
  rationale: The clause is somewhat tautological in Hebrew, using the cognate verb
    with the noun. 'By which you have transgressed' preserves the rhetorical emphasis
    and avoids flattening the repetition.
- source_word: וַעֲשׂוּ לָכֶם
  chosen: and make for yourselves
  alternatives:
  - and get yourselves
  - and make yourselves
  lexicon: HALOT
  rationale: עשה plus ל conveys producing or acquiring for oneself. 'Make for yourselves'
    stays close to the Hebrew while remaining idiomatic.
- source_word: לֵב חָדָשׁ
  chosen: a new heart
  lexicon: HALOT
  rationale: A central Ezekiel expression denoting inner disposition or will. 'Heart'
    should be retained literally rather than paraphrased as 'mind' or 'inner life'.
- source_word: רוּחַ חֲדָשָׁה
  chosen: a new spirit
  lexicon: HALOT
  rationale: רוּחַ here is best kept as 'spirit,' matching Ezekiel's theological vocabulary
    and preserving the pairing with 'heart.'
- source_word: וְלָמָּה
  chosen: Why should
  alternatives:
  - Why will
  - Why do
  lexicon: HALOT
  rationale: Introduces a rhetorical appeal. 'Why should you die' captures the exhortational
    force in context better than a simple predictive 'will.'
- source_word: תָמֻתוּ
  chosen: you die
  alternatives:
  - you die?
  - you perish
  lexicon: HALOT
  rationale: מות is straightforwardly 'die.' 'Perish' would add interpretive coloring
    not required by the Hebrew.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Vocative address to the covenant people. Adding 'O' reflects the direct
    appeal and solemn prophetic tone in natural English.
