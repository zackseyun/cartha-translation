theological_decisions:
- issue: Meaning of נֶפֶשׁ in a moral-judicial context
  chosen_reading: his life
  alternative_readings:
  - his soul
  - himself
  rationale: The chapter repeatedly contrasts living and dying in relation to conduct
    and divine judgment. Rendering נַפְשׁוֹ as 'his life' preserves the Hebrew sense
    in context and avoids suggesting a narrower statement about the immaterial soul
    alone.
  doctrine_reference: Translation philosophy §1, §3
