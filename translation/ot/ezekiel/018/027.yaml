id: EZK.18.27
reference: Ezekiel 18:27
source:
  edition: WLC
  text: וּ/בְ/שׁ֣וּב רָשָׁ֗ע מֵֽ/רִשְׁעָת/וֹ֙ אֲשֶׁ֣ר עָשָׂ֔ה וַ/יַּ֥עַשׂ מִשְׁפָּ֖ט
    וּ/צְדָקָ֑ה ה֖וּא אֶת נַפְשׁ֥/וֹ יְחַיֶּֽה־׃
translation:
  text: And when a wicked man turns away from the wickedness that he has done and
    does justice and righteousness, he will preserve his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will keep himself alive' or 'he will save his soul alive.' The Hebrew
      idiom uses 'his nephesh,' which can mean 'life,' 'self,' or 'soul' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/שׁוּב
  chosen: And when ... turns away
  alternatives:
  - But when ... turns
  - And in turning
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus infinitive construct of שוב introduces
    a temporal circumstance: ''and/when turning.'' In English, ''And when ... turns
    away'' is natural and preserves the conditional-temporal force. ''Turns away''
    brings out the sense of repentance from prior conduct.'
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked man
  - a wicked person
  lexicon: HALOT
  rationale: The singular masculine adjective used substantivally refers to an individual
    characterized as wicked. 'A wicked man' is gender-accurate to the Hebrew form
    and fits the representative singular style of the passage.
- source_word: מֵֽ/רִשְׁעָת/וֹ
  chosen: from the wickedness
  alternatives:
  - from his wickedness
  - from his wrongdoing
  lexicon: HALOT
  rationale: The noun denotes wickedness/guilt in an abstract sense. 'From the wickedness'
    works smoothly with the following relative clause 'that he has done,' while still
    referring to his own wicked conduct.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has done
  alternatives:
  - which he did
  - that he committed
  lexicon: HALOT
  rationale: This relative clause modifies 'wickedness' and points to concrete acts
    already performed. The English present perfect ('has done') naturally conveys
    prior completed action with present relevance.
- source_word: וַ/יַּ֥עַשׂ
  chosen: and does
  alternatives:
  - and practices
  - and acts with
  lexicon: HALOT
  rationale: Though formally a wayyiqtol, in this conditional-temporal construction
    it carries the consequent action. 'Does' is the most direct equivalent and pairs
    idiomatically with the following objects.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - what is just
  - judgment
  lexicon: HALOT
  rationale: In ethical contexts, משפט commonly denotes justice or just judgment.
    'Justice' is clear modern English and matches the moral-legal sense here.
- source_word: וּ/צְדָקָה
  chosen: righteousness
  alternatives:
  - what is right
  - justice
  lexicon: HALOT
  rationale: צדקה in this pairing with משפט is well rendered 'righteousness.' Keeping
    both terms distinct preserves the Hebrew collocation rather than flattening both
    into 'justice.'
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis. English can represent this adequately
    with 'he'; adding 'himself' would be possible but slightly heavier than needed
    in the flow of the verse.
- source_word: אֶת נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: נפש often means 'life' or 'self' in Hebrew anthropology. In this context
    of living versus dying in Ezekiel 18, 'his life' best conveys the concrete sense
    without importing later soul-body dualism.
- source_word: יְחַיֶּה
  chosen: will preserve
  alternatives:
  - will keep alive
  - will save alive
  - will cause to live
  lexicon: HALOT
  rationale: The piel of חיה here means to keep alive or preserve life. 'Will preserve
    his life' communicates the result clearly in idiomatic English and fits the chapter's
    emphasis on life versus death as covenantal consequence.
