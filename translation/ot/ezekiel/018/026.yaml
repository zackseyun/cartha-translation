theological_decisions:
- issue: Whether the verse should be rendered in a way that settles later doctrinal
    debates about apostasy or perseverance
  chosen_reading: Translate the conditional moral principle straightforwardly without
    importing a systematic-theological conclusion beyond the verse itself.
  alternative_readings:
  - A reading emphasizing final apostasy
  - A reading minimizing real turning away
  rationale: The Hebrew states that a righteous man who turns from his righteousness,
    does injustice, and dies because of those acts will die for the injustice he has
    done. The translation should preserve this warning as stated without resolving
    broader intertraditional debates not explicit in the verse.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
