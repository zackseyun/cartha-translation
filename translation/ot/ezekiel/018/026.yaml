id: EZK.18.26
reference: Ezekiel 18:26
source:
  edition: WLC
  text: בְּ/שׁוּב צַדִּ֧יק מִ/צִּדְקָת֛/וֹ וְ/עָ֥שָׂה עָ֖וֶל וּ/מֵ֣ת עֲלֵי/הֶ֑ם בְּ/עַוְל֥/וֹ
    אֲשֶׁר עָשָׂ֖ה יָמֽוּת־־׃ס
translation:
  text: When a righteous man turns away from his righteousness and does injustice,
    and he dies because of them, he shall die for the injustice that he has done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and does wrong' / 'and commits iniquity.' The Hebrew עָוֶל carries the
      sense of injustice, wrong, or unrighteousness.
    reason: lexical_alternative
  - marker: b
    text: '''Because of them'' refers to the wrongful acts just mentioned; the Hebrew
      uses a plural pronoun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּב
  chosen: When ... turns away
  alternatives:
  - In turning
  - When ... returns
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of שוב introduces a temporal
    clause. In this context שוב with מן indicates turning away from a prior state,
    not returning to it, so 'When ... turns away' best captures the sense in natural
    English.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - a righteous person
  - the righteous man
  lexicon: HALOT
  rationale: The singular adjective functions substantivally for an individual case.
    'Man' preserves the grammatically masculine singular in keeping with the gender-accurate
    policy, while still representing a general principle.
- source_word: מִצִּדְקָתוֹ
  chosen: from his righteousness
  alternatives:
  - from his righteous conduct
  - from his justice
  lexicon: HALOT
  rationale: The noun denotes righteousness/right conduct here in an ethical sense.
    'Righteousness' is the most direct and consistent rendering; 'justice' is possible
    but less fitting in this immediate contrast with personal wrongdoing.
- source_word: וְעָשָׂה עָוֶל
  chosen: and does injustice
  alternatives:
  - and commits iniquity
  - and does wrong
  lexicon: HALOT
  rationale: עָוֶל denotes injustice, wrong, or unrighteousness. 'Does injustice'
    preserves the verbal-nominal construction and the ethical/judicial force better
    than the more archaic 'commits iniquity.'
- source_word: וּמֵת
  chosen: and he dies
  alternatives:
  - and dies
  lexicon: HALOT
  rationale: Simple narrative sequence with waw + qatal. English may include the pronoun
    for clarity, though the sense is simply his death following his wrongdoing.
- source_word: עֲלֵיהֶם
  chosen: because of them
  alternatives:
  - for them
  - on account of them
  - for these things
  lexicon: HALOT
  rationale: The plural pronominal suffix most naturally refers back to the wrongful
    acts just mentioned. 'Because of them' conveys causal force idiomatically. The
    plural is retained in sense, even though English does not specify the antecedent
    explicitly.
- source_word: בְּעַוְלוֹ אֲשֶׁר עָשָׂה
  chosen: for the injustice that he has done
  alternatives:
  - in his injustice that he did
  - because of the wrong he committed
  lexicon: HALOT
  rationale: This phrase explains the basis of his death. Rendering ב instrumentally/causally
    as 'for' gives clear English. 'The injustice that he has done' preserves the relative
    clause and the focus on his own culpable act.
- source_word: יָמוּת
  chosen: he shall die
  alternatives:
  - he will die
  - he must die
  lexicon: HALOT
  rationale: The imperfect here states the sure consequence/principle. 'He shall die'
    preserves the judicial and proverbial force better than the merely predictive
    'will die.'
