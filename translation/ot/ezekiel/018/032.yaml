theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Sovereign LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the object more interpretive ('the wicked') based on context
  chosen_reading: the one who dies
  alternative_readings:
  - the wicked
  - the dead
  rationale: 'The immediate Hebrew says ''the dying one / the one who dies,'' not ''the wicked.'' Although the surrounding context addresses the wicked person''s turning, the translation should not import a noun absent from the verse. This preserves the text''s wording and its theological breadth: God does not delight in death itself as the outcome for the person addressed.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
