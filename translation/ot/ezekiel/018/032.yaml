id: EZK.18.32
reference: Ezekiel 18:32
source:
  edition: WLC
  text: כִּ֣י לֹ֤א אֶחְפֹּץ֙ בְּ/מ֣וֹת הַ/מֵּ֔ת נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה וְ/הָשִׁ֖יבוּ וִֽ/חְיֽוּ׃פ
translation:
  text: For I take no pleasure in the death of the one who dies, declares the Lord GOD. Therefore turn back and live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I do not desire the death of the dying one.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Lord GOD' represents אֲדֹנָי יְהוִה; alternatively, 'the Lord Yahweh.'
    reason: alternative_reading
  - marker: c
    text: Or 'return and live.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding appeal. 'For' preserves the explanatory force in natural English.
- source_word: לֹא אֶחְפֹּץ
  chosen: I take no pleasure
  alternatives:
  - I do not desire
  - I do not delight
  lexicon: HALOT
  rationale: חפץ expresses pleasure, delight, or desire. 'Take no pleasure' fits the idiom with בְּמוֹת and communicates divine disposition without sounding overly wooden.
- source_word: בְּמוֹת
  chosen: in the death
  alternatives:
  - in dying
  - in the death of
  lexicon: HALOT
  rationale: The preposition ב plus the noun מוֹת is idiomatically rendered with 'in' here after חפץ, yielding 'take pleasure in the death.'
- source_word: הַמֵּת
  chosen: the one who dies
  alternatives:
  - the dead one
  - the dying one
  - the wicked
  lexicon: HALOT
  rationale: The participial form from מות can denote 'the one dying' or 'the one who dies.' 'The one who dies' is idiomatic and avoids the misleading English sense of 'the dead' as already deceased. 'The wicked' is interpretive and not present in the Hebrew of this verse, though the broader context concerns the wicked.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is clear modern English and preserves the solemn prophetic register.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Sovereign LORD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, rendering as 'the Lord GOD' avoids the awkward 'Lord LORD' and reflects established English convention while still translating both elements.
- source_word: וְהָשִׁיבוּ
  chosen: turn back
  alternatives:
  - return
  - repent
  lexicon: HALOT
  rationale: From שוב, the imperative calls for turning/returning. 'Turn back' preserves the concrete metaphor and moral force without importing the fuller theological term 'repent' where the Hebrew here specifically speaks of turning.
- source_word: וִחְיוּ
  chosen: and live
  alternatives:
  - so that you may live
  - that you may live
  lexicon: HALOT
  rationale: Simple imperative/jussive sequence. 'And live' is formally close; with the preceding conjunction rendered as 'So,' the full clause reads naturally as consequence and appeal.
