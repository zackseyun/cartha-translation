theological_decisions:
- issue: Whether to render שׁוּב with explicitly theological language ('repent')
  chosen_reading: turns back
  alternative_readings:
  - repents
  - turns
  rationale: The verse emphasizes a concrete turning away from sins and a corresponding
    life of obedience. 'Turns back' preserves the Hebrew metaphor and avoids narrowing
    the term to later theological shorthand while still conveying moral reversal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether חָיֹה יִחְיֶה refers primarily to physical survival, covenantal life,
    or eschatological salvation
  chosen_reading: he shall surely live
  alternative_readings:
  - he shall surely remain alive
  - he shall surely have life
  rationale: The Hebrew expression is left broad, preserving the theological tension
    of Ezekiel's life/death language rather than resolving it into merely physical
    or fully eschatological categories. The translation mirrors the source without
    importing a doctrinal system.
  doctrine_reference: Translation philosophy §3
