id: EZK.18.3
reference: Ezekiel 18:3
source:
  edition: WLC
  text: חַי אָ֕נִי נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה אִם יִֽהְיֶ֨ה לָ/כֶ֜ם ע֗וֹד מְשֹׁ֛ל הַ/מָּשָׁ֥ל הַ/זֶּ֖ה בְּ/יִשְׂרָאֵֽל־־׃
translation:
  text: As I live, declares the Lord GOD, this proverb shall no longer be used by you in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath idiom: ''If this proverb shall still be for you in Israel,'' with the sense ''Surely this proverb shall no longer be used by you in Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'quoted' or 'spoken'; the Hebrew verb refers to employing a proverb or proverbial saying.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֕נִי
  chosen: As I live
  alternatives:
  - As surely as I live
  - By my life
  lexicon: HALOT
  rationale: Idiomatic oath formula in Hebrew introducing a solemn divine declaration. 'As I live' preserves the form and force without unnecessary expansion.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is natural modern English and preserves the authoritative speech-introduction.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English when אֲדֹנָי precedes YHWH, avoiding 'Lord LORD.' Per doctrine, YHWH is rendered 'the LORD'; in this fixed combination, 'GOD' signals the underlying divine name while preserving reverential convention.
- source_word: אִם יִהְיֶה
  chosen: shall no longer be
  alternatives:
  - if there shall be
  - surely there shall not be
  lexicon: HALOT
  rationale: 'In oath contexts, אִם can function elliptically with an implied negation: ''surely not.'' Rendering the clause as a direct prohibition of future occurrence captures the idiomatic force in English.'
- source_word: לָכֶם
  chosen: by you
  alternatives:
  - to you
  - among you
  lexicon: HALOT
  rationale: 'The preposition marks possession/use in context. ''By you'' best fits the idiom of proverb usage in English: the proverb will no longer be used by the people addressed.'
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any more
  - still
  lexicon: HALOT
  rationale: With the oath-negated future clause, עוֹד indicates cessation from this point onward. 'No longer' is the clearest idiomatic rendering.
- source_word: מְשֹׁל
  chosen: be used
  alternatives:
  - be quoted
  - be spoken
  - be made into a proverb
  lexicon: HALOT
  rationale: The infinitive from משל here refers to employing or reciting a proverb. 'Be used' is broad enough to cover the idiom without over-specifying manner.
- source_word: הַמָּשָׁל הַזֶּה
  chosen: this proverb
  alternatives:
  - this saying
  - this parable
  lexicon: HALOT
  rationale: מָשָׁל commonly denotes a proverb or proverbial saying in this context. 'Proverb' fits the immediate discourse, which cites a popular saying in Israel.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: Locative/social setting of the proverb's circulation. 'In Israel' is the most natural and sufficiently precise rendering.
