id: EZK.18.22
reference: Ezekiel 18:22
source:
  edition: WLC
  text: כָּל פְּשָׁעָי/ו֙ אֲשֶׁ֣ר עָשָׂ֔ה לֹ֥א יִזָּכְר֖וּ ל֑/וֹ בְּ/צִדְקָת֥/וֹ אֲשֶׁר
    עָשָׂ֖ה יִֽחְיֶֽה־־׃
translation:
  text: None of the transgressions that he has committed will be remembered against
    him; because of the righteousness that he has practiced, he will live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be held against him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in his righteousness' or 'by his righteousness'; the Hebrew preposition
      can be understood in more than one closely related sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: None of
  alternatives:
  - All
  lexicon: HALOT
  rationale: With the following negated verb ('will not be remembered'), English idiom
    is clearer with 'None of the...' rather than the more wooden 'All ... will not
    be remembered,' while preserving the totalizing force of כָּל.
- source_word: פְּשָׁעָיו
  chosen: the transgressions
  alternatives:
  - rebellions
  - offenses
  - sins
  lexicon: HALOT
  rationale: פשע commonly denotes acts of rebellion or transgression. 'Transgressions'
    preserves the moral-legal force without overinterpreting as merely generic 'sins.'
    The article is supplied naturally in English.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has committed
  alternatives:
  - that he has done
  - which he did
  lexicon: HALOT
  rationale: For עשה with wrongdoing, English normally uses 'commit' rather than 'do.'
    The perfect is rendered with present relevance ('has committed') in natural English.
- source_word: לֹא יִזָּכְרוּ לוֹ
  chosen: will be remembered against him
  alternatives:
  - will not be remembered to him
  - will not be held against him
  lexicon: HALOT
  rationale: The Niphal of זכר here is passive ('be remembered'), and לּוֹ in this
    judicial context is best expressed as 'against him.' This preserves the forensic
    sense more transparently than the literal but awkward 'to him.'
- source_word: בְּצִדְקָתוֹ
  chosen: because of the righteousness
  alternatives:
  - in his righteousness
  - by his righteousness
  - for his righteousness
  lexicon: HALOT
  rationale: 'The preposition ב here is causal/instrumental. ''Because of the righteousness''
    best fits the clause logic in context: his prior transgressions are not remembered
    on account of the righteous conduct now characterizing him. ''Righteousness''
    is the standard rendering for צדקה and fits the moral covenantal context.'
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he has practiced
  alternatives:
  - that he has done
  - which he did
  lexicon: HALOT
  rationale: With צדקה, English idiom favors 'practice' to express enacted righteous
    behavior. This avoids the clumsy 'righteousness that he has done' while staying
    close to the Hebrew.
- source_word: יִחְיֶה
  chosen: he will live
  alternatives:
  - he shall live
  lexicon: HALOT
  rationale: The verb denotes life as the outcome promised in the chapter's covenantal/judicial
    framework. 'Will live' is clear modern English and preserves the future/resultative
    force.
