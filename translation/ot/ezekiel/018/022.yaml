theological_decisions:
- issue: Whether the verse teaches meritorious self-justification or states the covenantal
    principle of individual accountability and life for the repentant righteous person
  chosen_reading: 'Render the statement straightforwardly without importing later
    doctrinal categories: the text says that the person''s transgressions will not
    be remembered and that he will live because of the righteousness he has practiced.'
  alternative_readings:
  - A stronger forensic paraphrase implying full justification language
  - A weakened paraphrase that treats 'live' as merely temporal well-being
  rationale: The verse itself speaks in Ezekiel's own covenantal and judicial terms.
    The translation should preserve that tension and not resolve broader theological
    debates beyond what the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
