id: EZK.18.5
reference: Ezekiel 18:5
source:
  edition: WLC
  text: וְ/אִ֖ישׁ כִּי יִהְיֶ֣ה צַדִּ֑יק וְ/עָשָׂ֥ה מִשְׁפָּ֖ט וּ/צְדָקָֽה־׃
translation:
  text: But if a man is righteous and does justice and righteousness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Now if a man' or 'And if a man'; the Hebrew conjunction can mark simple
      continuation as well as contrast.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ
  chosen: But if a man
  alternatives:
  - Now if a man
  - And if a man
  - But if anyone
  lexicon: HALOT
  rationale: אִישׁ is singular masculine 'man.' Per the doctrine's gender-accurate
    principle, 'man' is retained rather than neutralizing to 'person/anyone.' The
    prefixed וְ is rendered with discourse force as 'But' to mark the conditional
    turn in the argument, though 'and/now' are possible.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this construction with a following imperfect, כִּי introduces a conditional
    protasis best rendered 'if' in English.
- source_word: יִהְיֶה
  chosen: is
  alternatives:
  - becomes
  - comes to be
  - will be
  lexicon: HALOT
  rationale: Though formally an imperfect of היה ('to be'), idiomatic English in a
    present general condition is best expressed as 'is' rather than a wooden 'will
    be' or 'comes to be.'
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  - upright
  lexicon: HALOT
  rationale: צַדִּיק commonly denotes one who is righteous/just. 'Righteous' best
    preserves the moral-covenantal sense here and aligns with the paired noun צְדָקָה
    later in the verse.
- source_word: וְ/עָשָׂה
  chosen: and does
  alternatives:
  - and practices
  - and acts with
  lexicon: HALOT
  rationale: עשה plus the following objects is naturally rendered 'does.' This keeps
    the concrete ethical emphasis without paraphrase.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: In ethical pairings such as 'justice and righteousness,' מִשְׁפָּט refers
    to just judgment/justice. 'Justice' is the clearest modern English equivalent.
- source_word: וּ/צְדָקָה
  chosen: righteousness
  alternatives:
  - what is right
  - justice
  lexicon: HALOT
  rationale: צְדָקָה in this stock pairing is best rendered 'righteousness.' Keeping
    both 'justice' and 'righteousness' preserves the Hebrew distinction rather than
    collapsing them into one English term.
