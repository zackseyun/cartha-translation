- issue: Gendered representative singular
  chosen_reading: a man
  alternative_readings:
  - anyone
  - a person
  rationale: The Hebrew uses grammatically masculine singular אִישׁ. Following the
    doctrine's gender-accurate principle, the translation preserves 'man' rather than
    neutralizing the expression, while the context still presents a representative
    case.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
