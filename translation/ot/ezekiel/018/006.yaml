id: EZK.18.6
reference: Ezekiel 18:6
source:
  edition: WLC
  text: אֶל הֶֽ/הָרִים֙ לֹ֣א אָכָ֔ל וְ/עֵינָי/ו֙ לֹ֣א נָשָׂ֔א אֶל גִּלּוּלֵ֖י בֵּ֣ית
    יִשְׂרָאֵ֑ל וְ/אֶת אֵ֤שֶׁת רֵעֵ֨/הוּ֙ לֹ֣א טִמֵּ֔א וְ/אֶל אִשָּׁ֥ה נִדָּ֖ה לֹ֥א
    יִקְרָֽב־־־־׃
translation:
  text: he does not eat on the mountains, does not lift up his eyes to the idols of
    the house of Israel, does not defile his neighbor’s wife, and does not approach
    a woman during her menstrual impurity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eat at the mountain shrines'; the phrase refers to participating in
      sacrificial meals at high places.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'idols' uses a strongly contemptuous term for false gods.
    reason: lexical_alternative
  - marker: c
    text: '''Does not approach'' is a Hebrew euphemism for sexual relations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל־הֶהָרִים ... אָכָל
  chosen: eat on the mountains
  alternatives:
  - eat at the mountain shrines
  - eat upon the mountains
  lexicon: HALOT
  rationale: Literally 'to/on the mountains he did not eat.' In Ezekiel this idiom
    refers to participating in cultic meals at high places. 'Eat on the mountains'
    preserves the Hebrew imagery while remaining understandable; the cultic nuance
    can be clarified by an alternative footnote rather than paraphrased into the main
    text.
- source_word: וְעֵינָיו לֹא נָשָׂא
  chosen: does not lift up his eyes
  alternatives:
  - does not look to
  - does not set his eyes on
  lexicon: HALOT
  rationale: The idiom 'lift up the eyes to' can imply regard, desire, or devotion.
    Retaining the idiom keeps the Hebrew flavor and allows the object 'to the idols'
    to signal the sense of idolatrous regard.
- source_word: גִּלּוּלֵי
  chosen: idols
  alternatives:
  - dung-idols
  - filthy idols
  lexicon: HALOT
  rationale: The noun is Ezekiel's contemptuous term for idols. 'Idols' is the clear
    standard rendering in English; more pejorative expansions such as 'dung-idols'
    likely overtranslate in the main text, though the derogatory force is worth noting
    in a footnote.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is explicit in Hebrew and commonly denotes the covenant
    people collectively. 'The house of Israel' preserves the prophetic diction better
    than flattening to simply 'Israel'.
- source_word: אֵשֶׁת רֵעֵהוּ
  chosen: his neighbor’s wife
  alternatives:
  - the wife of his companion
  - another man's wife
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or fellow. 'His neighbor's wife'
    is idiomatic English and matches common biblical legal phrasing without narrowing
    beyond the Hebrew.
- source_word: לֹא טִמֵּא
  chosen: does not defile
  alternatives:
  - does not make unclean
  - does not violate
  lexicon: HALOT
  rationale: The piel of טמא here refers to sexual defilement/adultery. 'Defile' preserves
    both moral and purity overtones better than the more clinical 'make unclean' or
    the more interpretive 'violate.'
- source_word: אִשָּׁה נִדָּה
  chosen: a woman during her menstrual impurity
  alternatives:
  - a menstruating woman
  - a woman in her period of uncleanness
  lexicon: HALOT
  rationale: נִדָּה denotes menstrual impurity/separation in Levitical purity language.
    'During her menstrual impurity' communicates the ritual state clearly in modern
    English without archaic 'uncleanness' language.
- source_word: לֹא יִקְרָב
  chosen: does not approach
  alternatives:
  - does not come near
  - does not have relations with
  lexicon: HALOT
  rationale: The verb literally means 'come near/approach.' In this context it is
    a sexual euphemism, but 'approach' preserves the Hebrew wording while the object
    and context make the meaning sufficiently clear. A more explicit alternative can
    be footnoted.
