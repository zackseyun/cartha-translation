theological_decisions:
- issue: Whether to make the cultic setting of 'eat on the mountains' explicit in
    the main text
  chosen_reading: Keep the literal phrase 'eat on the mountains' in the main text
  alternative_readings:
  - eat at the mountain shrines
  rationale: The verse lists righteous behaviors in language echoing Israel's legal
    and prophetic idiom. Making the cultic implication explicit would aid comprehension
    but risks paraphrasing beyond the source. Optimal equivalence favors preserving
    the Hebrew expression in the text and clarifying by footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition.'
- issue: Whether to render purity language in explicitly ritual or broadly moral terms
  chosen_reading: Retain 'defile' and 'menstrual impurity'
  alternative_readings:
  - make unclean
  - during her period
  rationale: The verse combines moral and ritual categories. Rendering with 'defile'
    and 'menstrual impurity' preserves that tension rather than reducing the text
    to either purely ethical or purely ceremonial language.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
