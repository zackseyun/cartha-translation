id: EZK.18.12
reference: Ezekiel 18:12
source:
  edition: WLC
  text: עָנִ֤י וְ/אֶבְיוֹן֙ הוֹנָ֔ה גְּזֵל֣וֹת גָּזָ֔ל חֲבֹ֖ל לֹ֣א יָשִׁ֑יב וְ/אֶל
    הַ/גִּלּוּלִים֙ נָשָׂ֣א עֵינָ֔י/ו תּוֹעֵבָ֖ה עָשָֽׂה־׃
translation:
  text: He has oppressed the poor and needy, committed robbery, not returned a pledge,
    lifted up his eyes to the idols, and done an abomination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a contemptuous term for idols, carrying a pejorative
      sense such as 'filthy idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנִי וְאֶבְיוֹן
  chosen: the poor and needy
  alternatives:
  - the afflicted and needy
  - the poor and destitute
  lexicon: HALOT
  rationale: The paired nouns form a common hendiadys-like expression for socially
    vulnerable persons. 'Poor and needy' is idiomatic, clear modern English and preserves
    the socioeconomic emphasis.
- source_word: הוֹנָה
  chosen: has oppressed
  alternatives:
  - has wronged
  - has defrauded
  lexicon: HALOT
  rationale: The verb denotes mistreating or exploiting another, often economically
    or socially. In this context with 'poor and needy,' 'oppressed' best captures
    exploitative abuse rather than mere generic wrongdoing.
- source_word: גְּזֵלוֹת גָּזָל
  chosen: committed robbery
  alternatives:
  - has robbed
  - has taken by robbery
  - has committed acts of robbery
  lexicon: HALOT
  rationale: The cognate noun + verb construction intensifies the act of violent or
    wrongful seizure. 'Committed robbery' preserves the force of the construction
    in natural English.
- source_word: חֲבֹל לֹא יָשִׁיב
  chosen: not returned a pledge
  alternatives:
  - not restored collateral
  - not returned what was taken in pledge
  lexicon: HALOT
  rationale: חֲבֹל refers to a pledged item or collateral taken for a debt. 'Pledge'
    is concise and biblically recognizable; 'returned' reflects the causative sense
    of the verb here in context.
- source_word: וְאֶל־הַגִּלּוּלִים נָשָׂא עֵינָיו
  chosen: lifted up his eyes to the idols
  alternatives:
  - looked to the idols
  - raised his eyes toward the idols
  lexicon: HALOT
  rationale: This idiom can denote directing attention or devotion toward something.
    Here, in a list of covenant violations, it points to idolatrous regard or worship.
    The more literal 'lifted up his eyes' preserves the Hebrew imagery while remaining
    understandable.
- source_word: הַגִּלּוּלִים
  chosen: the idols
  alternatives:
  - the dung-idols
  - the filthy idols
  lexicon: HALOT
  rationale: The term is Ezekiel's contemptuous word for idols. 'Idols' is the standard
    clear rendering for the main text; the pejorative nuance is worth preserving in
    a footnote rather than overloading the translation.
- source_word: תּוֹעֵבָה עָשָׂה
  chosen: done an abomination
  alternatives:
  - committed an abomination
  - done something detestable
  lexicon: HALOT
  rationale: The noun denotes something ritually or morally detestable before God.
    'Done an abomination' is a close, weighty rendering that matches the Hebrew collocation
    and preserves biblical register.
