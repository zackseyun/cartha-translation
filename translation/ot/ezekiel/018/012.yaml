theological_decisions:
- issue: Idolatry idiom and moral force
  chosen_reading: The verse is rendered as describing concrete covenant violations,
    including idolatrous devotion ('lifted up his eyes to the idols') and morally
    detestable action ('done an abomination').
  alternative_readings:
  - The eye-lifting idiom could be flattened to 'looked to the idols' or interpreted
    more explicitly as 'worshiped idols.'
  rationale: The Hebrew idiom likely implies worshipful regard, but the text itself
    uses the image of lifting the eyes. Preserving the idiom maintains textual transparency
    while allowing readers to infer the idolatrous sense from context.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
