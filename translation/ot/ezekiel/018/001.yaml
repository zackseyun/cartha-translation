id: EZK.18.1
reference: Ezekiel 18:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD' in English translations;
      alternatively transliterated 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - Now ... came
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential
    introduction. In English, rendering the clause idiomatically with 'And ... came'
    preserves the discourse flow without the wooden 'and it happened,' while still
    reflecting the Hebrew onset.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר־יְהוָה, 'the word' is the established
    and semantically precise rendering, referring to a specific divine communication.
    'Message' is possible but less formally tied to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX/NT pattern.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix straightforwardly indicates
    direction toward the prophet. 'To me' is accurate, natural modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. 'Saying,'
    is the most transparent and conventional rendering, signaling that the following
    verse contains the content of the divine word.
