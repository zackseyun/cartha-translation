theological_decisions:
- issue: Nature of the death sentence in prophetic legal rhetoric
  chosen_reading: Render the clause as a judicial sentence ('he shall surely be put
    to death') without specifying civil procedure beyond the text.
  alternative_readings:
  - Render more generally as 'he shall surely die'
  rationale: The Hebrew passive suggests a pronounced death sentence, but the verse
    itself does not detail the human or divine mechanism. The translation preserves
    the legal force without importing a fuller penal theory.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
