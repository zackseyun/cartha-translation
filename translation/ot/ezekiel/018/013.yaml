id: EZK.18.13
reference: Ezekiel 18:13
source:
  edition: WLC
  text: בַּ/נֶּ֧שֶׁךְ נָתַ֛ן וְ/תַרְבִּ֥ית לָקַ֖ח וָ/חָ֑י לֹ֣א יִֽחְיֶ֗ה אֵ֣ת כָּל
    הַ/תּוֹעֵב֤וֹת הָ/אֵ֨לֶּה֙ עָשָׂ֔ה מ֣וֹת יוּמָ֔ת דָּמָ֖י/ו בּ֥/וֹ יִהְיֶֽה־׃
translation:
  text: He lends at interest and takes profit—and shall he live? He shall not live.
    He has done all these abominations; he shall surely be put to death; his blood
    shall be upon himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'usury' for 'at interest'; the Hebrew terms refer to interest/profit
      taken on a loan, especially in condemned exploitative lending.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall surely die.' The Hebrew expression is an emphatic death sentence.
    reason: alternative_reading
  - marker: c
    text: Literally, 'his blood shall be on him,' an idiom meaning he bears responsibility
      for his own death.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּנֶּשֶׁךְ
  chosen: at interest
  alternatives:
  - on interest
  - usury
  lexicon: HALOT
  rationale: נֶשֶׁךְ denotes interest on a loan, especially condemned exploitative
    interest in legal/prophetic contexts. 'At interest' is clear modern English; 'usury'
    is traditional but can misleadingly suggest only excessive interest in modern
    usage.
- source_word: וְתַרְבִּית
  chosen: profit
  alternatives:
  - increase
  - interest
  lexicon: HALOT
  rationale: תַּרְבִּית is paired with נֶשֶׁךְ as a near-synonym for gain extracted
    from lending. 'Profit' captures illicit gain in contemporary English while preserving
    the distinction from the first term.
- source_word: וָחָי לֹא יִחְיֶה
  chosen: and shall he live? He shall not live.
  alternatives:
  - and live? He shall not live
  - will he live? He will not live
  lexicon: HALOT
  rationale: The sequence uses a rhetorical question followed by emphatic denial.
    Rendering it as a question preserves the Hebrew force better than flattening it
    into a simple statement.
- source_word: אֵת כָּל הַתּוֹעֵבוֹת הָאֵלֶּה
  chosen: all these abominations
  alternatives:
  - all these detestable things
  lexicon: HALOT
  rationale: תּוֹעֵבוֹת regularly denotes abhorrent acts, often with covenantal/moral
    weight. 'Abominations' preserves the severity and prophetic register.
- source_word: מוֹת יוּמָת
  chosen: he shall surely be put to death
  alternatives:
  - he shall surely die
  - dying he shall be put to death
  lexicon: HALOT
  rationale: The infinitive absolute with passive/imperfect intensifies the death
    sentence. 'Be put to death' reflects the passive/judicial sense more precisely
    than simply 'die.'
- source_word: דָּמָיו בּוֹ יִהְיֶה
  chosen: his blood shall be upon himself
  alternatives:
  - his blood shall be upon him
  - his bloodguilt shall be on him
  lexicon: HALOT
  rationale: This idiom assigns responsibility for the death to the offender. 'Upon
    himself' makes the reflexive sense explicit in idiomatic English.
