id: EZK.18.20
reference: Ezekiel 18:20
source:
  edition: WLC
  text: הַ/נֶּ֥פֶשׁ הַ/חֹטֵ֖את הִ֣יא תָמ֑וּת בֵּ֞ן לֹא יִשָּׂ֣א בַּ/עֲוֺ֣ן הָ/אָ֗ב
    וְ/אָב֙ לֹ֤א יִשָּׂא֙ בַּ/עֲוֺ֣ן הַ/בֵּ֔ן צִדְקַ֤ת הַ/צַּדִּיק֙ עָלָ֣י/ו תִּֽהְיֶ֔ה
    וְ/רִשְׁעַ֥ת רשע עָלָ֥י/ו תִּֽהְיֶֽה־׀׃ס
translation:
  text: The person who sins—he shall die. A son shall not bear the iniquity of the
    father, and a father shall not bear the iniquity of the son. The righteousness
    of the righteous shall be upon him, and the wickedness of the wicked shall be
    upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'The soul who sins, it shall die.' Here 'soul' (Hebrew
      nephesh) refers to the individual person.
    reason: lexical_alternative
  - marker: b
    text: '''Bear the iniquity'' is a Hebrew legal idiom that can include both guilt
      and its liability.'
    reason: cultural_note
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  chosen: the person
  alternatives:
  - the soul
  lexicon: HALOT
  rationale: Though נֶפֶשׁ is often glossed 'soul,' in this legal-moral context it
    refers to the individual person/life rather than an immaterial component. 'The
    person' communicates the Hebrew sense naturally in English without importing later
    anthropological assumptions.
- source_word: הַחֹטֵאת
  chosen: who sins
  alternatives:
  - that sins
  - the sinning one
  lexicon: HALOT
  rationale: The participle denotes the one characterized by committing sin. 'Who
    sins' is idiomatic modern English and preserves the ongoing/generic force.
- source_word: הִיא תָמוּת
  chosen: he shall die
  alternatives:
  - it shall die
  - that one shall die
  lexicon: HALOT
  rationale: The feminine pronoun agrees with נֶפֶשׁ grammatically, but English should
    follow natural gender for a representative individual. 'He' is gender-accurate
    generic usage per project philosophy, and 'shall die' preserves the judicial force
    better than a simple future 'will die'.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - the son
  - a child
  lexicon: HALOT
  rationale: The Hebrew is singular and masculine. 'A son' preserves the representative
    legal formulation. 'Child' would flatten the father-son parallel and move away
    from the source wording.
- source_word: יִשָּׂא בַּעֲוֺן
  chosen: shall not bear the iniquity
  alternatives:
  - shall not bear the guilt
  - shall not suffer for the iniquity
  lexicon: HALOT
  rationale: The idiom literally means 'bear iniquity/guilt.' 'Bear the iniquity'
    preserves the Hebrew legal-theological expression and its moral weight. 'Guilt'
    is possible, but the noun עָוֺן often includes both wrongdoing and its liability;
    'iniquity' keeps that breadth.
- source_word: הָאָב
  chosen: the father
  alternatives:
  - his father
  lexicon: HALOT
  rationale: The article marks the generic role within the legal maxim. 'The father'
    keeps the proverb-like formulation.
- source_word: וְאָב
  chosen: and a father
  alternatives:
  - and the father
  lexicon: HALOT
  rationale: Anarthrous use after the first clause works naturally in English as 'and
    a father,' maintaining the reciprocal parallelism.
- source_word: הַבֵּן
  chosen: the son
  alternatives:
  - his son
  lexicon: HALOT
  rationale: The article again marks the role in the reciprocal statement. 'The son'
    preserves the balanced legal formulation.
- source_word: צִדְקַת הַצַּדִּיק
  chosen: the righteousness of the righteous
  alternatives:
  - the righteousness of the just man
  lexicon: HALOT
  rationale: This preserves the cognate relationship between the noun and adjective/root.
    'Righteous' is the standard rendering and fits the moral-legal context.
- source_word: עָלָיו תִּהְיֶה
  chosen: shall be upon him
  alternatives:
  - shall rest on him
  - shall belong to him
  lexicon: HALOT
  rationale: The prepositional expression is retained fairly literally because it
    conveys personal moral accountability. 'Upon him' is idiomatic enough and preserves
    the Hebrew imagery.
- source_word: וְרִשְׁעַת רָשָׁע
  chosen: and the wickedness of the wicked
  alternatives:
  - and the wickedness of the wicked man
  - and the guilt of the wicked
  lexicon: HALOT
  rationale: The noun-adjective pairing mirrors the previous clause and should be
    preserved. 'Wickedness of the wicked' keeps the rhetorical symmetry with 'righteousness
    of the righteous.'
