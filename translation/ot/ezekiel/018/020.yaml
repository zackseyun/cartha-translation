theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: Rendered as 'person' rather than 'soul'
  alternative_readings:
  - the soul who sins
  rationale: The verse teaches individual moral accountability in a legal-prophetic
    context, not a technical doctrine of the soul's separability. 'Person' avoids
    misleading metaphysical overtones while preserving the text's force.
  doctrine_reference: Translation philosophy §1, §6
- issue: Generic masculine representation
  chosen_reading: Used 'he' and 'son/father' in the main text
  alternative_readings:
  - they
  - child/parent
  rationale: The Hebrew uses masculine singular forms in a representative legal statement.
    Per project philosophy, gender-accurate rendering is preferred over neutralization
    when the source uses masculine generically.
  doctrine_reference: Translation philosophy §4
- issue: Moral accountability formula
  chosen_reading: Retained 'bear the iniquity' language
  alternative_readings:
  - bear the guilt
  - be punished for
  rationale: The Hebrew idiom carries both wrongdoing and liability. A more interpretive
    rendering like 'be punished for' would narrow the expression beyond what the source
    explicitly states.
  doctrine_reference: Translation philosophy §1, §3, §5
