theological_decisions:
- issue: Conditional/adversative force of the opening conjunction
  chosen_reading: But if he fathers
  alternative_readings:
  - And he fathers
  rationale: Although the Hebrew conjunction is simply 'and,' the discourse context
    is contrastive and conditional, introducing the case of a righteous man who has
    a wicked son. Rendering 'But if' communicates the logic of the passage in natural
    English without adding doctrinal content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
