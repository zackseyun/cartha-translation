id: EZK.18.10
reference: Ezekiel 18:10
source:
  edition: WLC
  text: וְ/הוֹלִ֥יד בֵּן פָּרִ֖יץ שֹׁפֵ֣ךְ דָּ֑ם וְ/עָ֣שָׂה אָ֔ח מֵ/אַחַ֖ד מֵ/אֵֽלֶּה־׃
translation:
  text: But if he fathers a violent son, one who sheds blood and does any one of these
    things,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And he begets a violent son, a shedder of blood, and
      does one of these things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹלִיד
  chosen: But if he fathers
  alternatives:
  - And he fathers
  - And he begets
  - But he fathers
  lexicon: HALOT
  rationale: הוליד from ילד means 'to beget/father.' In English, 'fathers' is more
    natural than 'begets' while preserving the male-specific sense. The prefixed conjunction
    is rendered adversatively ('But if') because the broader context shifts to a contrasting
    case from the righteous father in the preceding verse and continues a conditional
    scenario.
- source_word: בֵּן
  chosen: a ... son
  alternatives:
  - a child
  lexicon: HALOT
  rationale: בן specifically means 'son,' not merely 'child.' This preserves the masculine
    singular reference present in the Hebrew.
- source_word: פָּרִיץ
  chosen: violent
  alternatives:
  - violent man
  - ruthless
  - lawless
  lexicon: HALOT
  rationale: פריץ denotes a violent, ruthless, or lawless person. 'Violent' is concise,
    natural English and fits the immediate apposition with bloodshed.
- source_word: שֹׁפֵךְ דָּם
  chosen: one who sheds blood
  alternatives:
  - a shedder of blood
  - bloodshedder
  - a murderer
  lexicon: HALOT
  rationale: The participial phrase literally means 'shedding blood.' 'One who sheds
    blood' preserves the Hebrew idiom and avoids narrowing the phrase to only judicially
    defined murder, though murder is included.
- source_word: וְעָשָׂה
  chosen: and does
  alternatives:
  - and commits
  - and practices
  lexicon: HALOT
  rationale: עשה is the common verb 'do/make.' 'Does' is the most direct rendering
    here, with the object supplied by the following phrase.
- source_word: אָח
  chosen: any one
  alternatives:
  - one
  - even one
  lexicon: HALOT
  rationale: The ketiv-like form here is commonly understood in context as an idiomatic
    element leading into 'one of these.' Rendering it as 'any one' captures the sense
    that even a single listed offense is in view.
- source_word: מֵאַחַד מֵאֵלֶּה
  chosen: of these things
  alternatives:
  - of one of these
  - from any one of these
  lexicon: HALOT
  rationale: The phrase means 'from one of these.' In idiomatic English with the preceding
    'any one,' 'of these things' communicates the referent clearly while preserving
    the singular force through 'any one.'
