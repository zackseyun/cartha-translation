id: EZK.18.18
reference: Ezekiel 18:18
source:
  edition: WLC
  text: אָבִ֞י/ו כִּֽי עָ֣שַׁק עֹ֗שֶׁק גָּזַל֙ גֵּ֣זֶל אָ֔ח וַ/אֲשֶׁ֥ר לֹא ט֛וֹב עָשָׂ֖ה
    בְּ/ת֣וֹךְ עַמָּ֑י/ו וְ/הִנֵּה מֵ֖ת בַּ/עֲוֺנֽ/וֹ־־־׃
translation:
  text: As for his father, because he practiced extortion, robbed his brother, and
    did what was not good among his people, behold, he shall die in his iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'practiced oppression.' The Hebrew uses a verb-noun pairing for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'robbed a brother.' 'Brother' may be read generically for a fellow member
      of the community.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'behold,' an emphatic discourse marker.
    reason: lexical_alternative
  - marker: d
    text: Or 'he dies in his iniquity' or 'he is dead in his iniquity'; the Hebrew
      perfect presents the outcome as certain.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - as for his father
  - his father, however
  lexicon: HALOT
  rationale: Construct form with 3ms suffix; in context it resumes the father in contrast
    to the righteous son. English keeps the familial relation explicit.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the grounds for the father's fate; 'because' makes the causal
    force clear in modern English.
- source_word: עָשַׁק עֹשֶׁק
  chosen: practiced extortion
  alternatives:
  - oppressed by oppression
  - committed oppression
  - practiced oppression
  lexicon: HALOT
  rationale: The verb-noun cognate intensifies the action. 'Practiced extortion' captures
    exploitative economic oppression in a natural English collocation without flattening
    the force.
- source_word: גָּזַל גֵּזֶל אָח
  chosen: robbed his brother
  alternatives:
  - committed robbery against a brother
  - plundered his brother
  - robbed a brother
  lexicon: HALOT
  rationale: The cognate verb-noun construction again intensifies the act. 'Brother'
    is retained as gender-accurate and source-near; the suffixless אָח is understood
    relationally/generically in context, but the 3ms possessive is supplied naturally
    in English from the discourse context.
- source_word: וַאֲשֶׁר לֹא טוֹב עָשָׂה
  chosen: and did what was not good
  alternatives:
  - and did what is not good
  - and did evil
  lexicon: HALOT
  rationale: A relatively literal rendering preserves the Hebrew idiom and avoids
    importing the stronger summary term 'evil' where the text itself says 'not good.'
- source_word: בְּתוֹךְ עַמָּיו
  chosen: among his people
  alternatives:
  - in the midst of his people
  - within his people
  lexicon: HALOT
  rationale: Idiomatic English for social location within the community; preserves
    the communal setting of the wrongdoing.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - indeed
  - look
  lexicon: HALOT
  rationale: Retains the deictic-emphatic force of the Hebrew discourse marker and
    the prophetic tone.
- source_word: מֵת
  chosen: he shall die
  alternatives:
  - he dies
  - he is dead
  lexicon: HALOT
  rationale: Though morphologically perfect, in this judicial-prophetic context it
    expresses the certainty of the consequence; English future best conveys the sense.
- source_word: בַּעֲוֹנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - in his guilt
  - for his guilt
  lexicon: HALOT
  rationale: '''Iniquity'' preserves the moral weight of עָוֹן and allows the phrase
    to echo the chapter''s emphasis on personal culpability. ''In'' is kept rather
    than smoothing to ''for,'' since the Hebrew preposition can carry the sense of
    dying in the state/burden of one''s own guilt.'
