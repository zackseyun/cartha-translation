theological_decisions:
- issue: Individual responsibility for sin in Ezekiel 18
  chosen_reading: The verse states that the father dies for his own iniquity, not
    for another's sin.
  alternative_readings:
  - A more generalized statement of death in guilt without emphasis on individual
    moral accountability
  rationale: The immediate chapter argues against transgenerational punishment as
    a deterministic principle. The translation preserves the explicit personal suffixes
    and causal structure without adding doctrinal explanation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
