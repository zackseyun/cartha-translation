theological_decisions:
- issue: Individual responsibility versus inherited punishment
  chosen_reading: The son is not punished with death for the father's iniquity when
    he acts righteously.
  alternative_readings:
  - The phrase could be read more woodenly as 'will not die in his father's iniquity.'
  rationale: The immediate context of Ezekiel 18 argues that each person is judged
    for his own conduct. Rendering בַּעֲוֺן as 'for' makes the causal sense explicit
    without importing theology beyond the chapter's argument.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently clarifies the sense.
