id: EZK.18.17
reference: Ezekiel 18:17
source:
  edition: WLC
  text: מֵ/עָנִ֞י הֵשִׁ֣יב יָד֗/וֹ נֶ֤שֶׁךְ וְ/תַרְבִּית֙ לֹ֣א לָקָ֔ח מִשְׁפָּטַ֣/י
    עָשָׂ֔ה בְּ/חֻקּוֹתַ֖/י הָלָ֑ךְ ה֗וּא לֹ֥א יָמ֛וּת בַּ/עֲוֺ֥ן אָבִ֖י/ו חָיֹ֥ה
    יִחְיֶֽה׃
translation:
  text: He has withheld his hand from the poor, has not taken interest or profit,
    has carried out my judgments, and has walked in my statutes. He will not die for
    his father's iniquity; he will surely live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has turned back his hand from the poor.' The Hebrew idiom pictures refraining
      from harming or exploiting the poor.
    reason: lexical_alternative
  - marker: b
    text: '''Interest or profit'' translates two related Hebrew terms for gain taken
      on a loan; traditionally, ''usury and increase.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'he will not die in his father's iniquity.' The sense in context is that
      he will not die because of his father's guilt.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעָנִי
  chosen: from the poor
  alternatives:
  - from affliction
  - from the afflicted
  lexicon: HALOT
  rationale: The noun עָנִי commonly denotes a poor or afflicted person. In this context
    with 'withheld his hand,' the sense is social/economic exploitation of the poor
    person, so 'from the poor' best fits the legal-ethical context.
- source_word: הֵשִׁיב יָדוֹ
  chosen: has withheld his hand
  alternatives:
  - has turned back his hand
  - has kept his hand back
  lexicon: HALOT
  rationale: Literally 'has turned back his hand.' In context this idiom means refraining
    from harmful or exploitative action against the poor. 'Has withheld his hand'
    preserves the metaphor while remaining natural English.
- source_word: נֶשֶׁךְ
  chosen: interest
  alternatives:
  - usury
  lexicon: HALOT
  rationale: Refers to interest charged on a loan. 'Interest' is clear modern English;
    'usury' in contemporary usage can imply only excessive interest, which is narrower
    than the Hebrew term.
- source_word: תַרְבִּית
  chosen: profit
  alternatives:
  - increase
  - gain
  lexicon: HALOT
  rationale: This term is paired with נֶשֶׁךְ and refers to increase/profit taken
    from lending. 'Profit' communicates the economic sense naturally in English while
    preserving the distinction from 'interest'.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט often denotes legal judgments or ordinances. 'My judgments'
    keeps the juridical flavor and pairs well with 'my statutes' in the next clause.
- source_word: בְּחֻקּוֹתַי הָלָךְ
  chosen: has walked in my statutes
  alternatives:
  - has lived by my statutes
  - has followed my statutes
  lexicon: HALOT
  rationale: The idiom 'walk in' is common covenantal language for conduct. Retaining
    'walked in my statutes' preserves the biblical metaphor and legal-covenantal register.
- source_word: בַּעֲוֺן אָבִיו
  chosen: for his father's iniquity
  alternatives:
  - in his father's iniquity
  - because of his father's guilt
  lexicon: HALOT
  rationale: The preposition here indicates the basis or cause of punishment. In context
    Ezekiel stresses individual responsibility, so 'for his father's iniquity' clearly
    conveys that he will not die on account of the father's sin.
- source_word: חָיֹה יִחְיֶה
  chosen: he will surely live
  alternatives:
  - he shall surely live
  - living he will live
  lexicon: HALOT
  rationale: The infinitive absolute with imperfect intensifies the verb. 'He will
    surely live' is a natural English way to preserve the emphatic force.
