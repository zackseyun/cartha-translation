id: EZK.18.4
reference: Ezekiel 18:4
source:
  edition: WLC
  text: הֵ֤ן כָּל הַ/נְּפָשׁוֹת֙ לִ֣/י הֵ֔נָּה כְּ/נֶ֧פֶשׁ הָ/אָ֛ב וּ/כְ/נֶ֥פֶשׁ הַ/בֵּ֖ן
    לִ/י הֵ֑נָּה הַ/נֶּ֥פֶשׁ הַ/חֹטֵ֖את הִ֥יא תָמֽוּת־־׃ס
translation:
  text: Look, every life belongs to me. The life of the father is like the life of
    the son—both belong to me. The person who sins is the one who will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all souls are mine ... the soul who sins shall die.' Hebrew נֶפֶשׁ can
      mean 'soul,' 'life,' 'self,' or 'person,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic declaration. 'Look' preserves the attention-getting
    force in readable modern English better than the more archaic 'Behold.'
- source_word: כָּל הַנְּפָשׁוֹת
  chosen: every life
  alternatives:
  - all souls
  - every person
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or person. Here the statement concerns
    all human lives as belonging to God and then moves to individual accountability.
    'Every life' preserves the concrete sense without importing later dualistic connotations
    often associated with 'soul.'
- source_word: לִי הֵנָּה
  chosen: belongs to me
  alternatives:
  - are mine
  - are for me
  lexicon: HALOT
  rationale: The Hebrew literally says 'are mine.' 'Belongs to me' expresses possession
    naturally in English while preserving the claim of divine ownership.
- source_word: כְּנֶפֶשׁ הָאָב וּכְנֶפֶשׁ הַבֵּן
  chosen: The life of the father is like the life of the son
  alternatives:
  - Like the life of the father, so also the life of the son
  - As the soul of the father, so also the soul of the son
  lexicon: HALOT
  rationale: The comparative כְּ...וּכְּ construction sets father and son on equal
    footing before God. This rendering makes the comparison explicit and readable
    while retaining the repeated נֶפֶשׁ idea.
- source_word: הַנֶּפֶשׁ
  chosen: The person
  alternatives:
  - The soul
  - The life
  lexicon: HALOT
  rationale: In the final clause נֶפֶשׁ refers to the individual moral agent. 'The
    person' best communicates that the one who sins is the one held accountable, avoiding
    misleading English associations of 'soul' as an immaterial part only.
- source_word: הַחֹטֵאת
  chosen: who sins
  alternatives:
  - that sins
  - the sinner
  lexicon: HALOT
  rationale: The participle denotes the one committing sin. 'Who sins' preserves the
    verbal force better than the more static label 'the sinner.'
- source_word: הִיא
  chosen: is the one who
  alternatives:
  - she
  - it
  lexicon: HALOT
  rationale: The feminine pronoun agrees with נֶפֶשׁ grammatically, not necessarily
    with natural gender. English should not force a female referent here. 'Is the
    one who' conveys the emphatic identification.
- source_word: תָמוּת
  chosen: will die
  alternatives:
  - shall die
  - must die
  lexicon: HALOT
  rationale: The imperfect here states the consequence/judgment. 'Will die' is clear
    modern English and avoids the archaic tone of 'shall die' while not overstating
    necessity with 'must die.'
