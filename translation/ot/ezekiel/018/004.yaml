theological_decisions:
- issue: Rendering נֶפֶשׁ in a context often cited for the doctrine of the soul
  chosen_reading: Render נֶפֶשׁ contextually as 'life' in the possession clauses and
    'person' in the accountability clause
  alternative_readings:
  - soul throughout
  rationale: The verse emphasizes God's ownership of all human lives and individual
    responsibility for sin, not a technical anthropology of an immaterial soul. A
    uniform 'soul' is possible, but in contemporary English it can suggest meanings
    narrower or more metaphysical than the Hebrew requires. The contextual rendering
    preserves the theological point without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 5
