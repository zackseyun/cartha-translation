id: EZK.18.29
reference: Ezekiel 18:29
source:
  edition: WLC
  text: וְ/אָֽמְרוּ֙ בֵּ֣ית יִשְׂרָאֵ֔ל לֹ֥א יִתָּכֵ֖ן דֶּ֣רֶךְ אֲדֹנָ֑/י הַ/דְּרָכַ֞/י
    לֹ֤א יִתָּֽכְנּוּ֙ בֵּ֣ית יִשְׂרָאֵ֔ל הֲ/לֹ֥א דַרְכֵי/כֶ֖ם לֹ֥א יִתָּכֵֽן׃
translation:
  text: Yet the house of Israel says, ‘The way of the Lord is not just.’ Are my ways
    not just, O house of Israel? Is it not your ways that are not just?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The way of the Lord is not right' or 'is not fair.' The Hebrew verb
      concerns what is measured or ordered rightly; here it refers to moral rectitude
      in the Lord's dealings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: Yet ... says
  alternatives:
  - And ... says
  - But ... says
  lexicon: HALOT
  rationale: The conjunction plus qatal introduces the people's continued objection
    in context. English present 'says' is natural for direct discourse, and 'Yet'
    captures the adversative force in the flow from the preceding rebuttal.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - house of Israel
  - Israel
  lexicon: HALOT
  rationale: A standard literal rendering preserving the corporate covenantal address;
    retaining 'house' is preferable to flattening it to simply 'Israel'.
- source_word: לֹא יִתָּכֵן
  chosen: is not just
  alternatives:
  - is not right
  - is not fair
  - is not established/ordered
  lexicon: HALOT
  rationale: The Niphal of תכן here concerns what is measured, regulated, or right/just
    in moral evaluation. In this disputation context, 'just' best fits the accusation
    against the Lord's way and the divine rebuttal. 'Fair' is possible but can sound
    colloquial and psychologically subjective; 'right' is broader but less pointed.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - conduct
  lexicon: HALOT
  rationale: '''Way'' is the standard rendering and works both for the Lord''s manner
    of acting and the people''s manner of life, preserving the repeated wordplay.'
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: 'Follows the project''s default rendering for the divine title. The article
    in English is idiomatic in this construction: ''the way of the Lord.'''
- source_word: הֲלֹא
  chosen: Are ... not ... ? / Is it not ... ?
  alternatives:
  - Surely ... not ... ?
  lexicon: HALOT
  rationale: Rendered as a rhetorical question expecting agreement, matching the rebuking
    force of the Hebrew.
- source_word: הַדְּרָכַי
  chosen: my ways
  alternatives:
  - my way
  lexicon: HALOT
  rationale: The plural should be preserved, matching the Hebrew and setting up the
    contrast with 'your ways.'
- source_word: דַרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your way
  - your conduct
  lexicon: HALOT
  rationale: Plural retained for consistency with the Hebrew and the rhetorical contrast.
    It refers to the people's patterns of conduct and moral course.
