theological_decisions:
- issue: Moral evaluation term in the accusation against God
  chosen_reading: Translate יִתָּכֵן as 'just' throughout the verse
  alternative_readings:
  - right
  - fair
  rationale: The verse centers on whether the Lord's dealings are morally straight
    and equitable. 'Just' preserves the judicial-ethical force of the chapter without
    importing a narrower modern sense of emotional fairness. The same English term
    is kept across all three occurrences to preserve the rhetorical symmetry.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
