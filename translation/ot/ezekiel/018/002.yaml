id: EZK.18.2
reference: Ezekiel 18:2
source:
  edition: WLC
  text: מַה לָּ/כֶ֗ם אַתֶּם֙ מֹֽשְׁלִים֙ אֶת הַ/מָּשָׁ֣ל הַ/זֶּ֔ה עַל אַדְמַ֥ת יִשְׂרָאֵ֖ל
    לֵ/אמֹ֑ר אָבוֹת֙ יֹ֣אכְלוּ בֹ֔סֶר וְ/שִׁנֵּ֥י הַ/בָּנִ֖ים תִּקְהֶֽינָה־־־׃
translation:
  text: What do you mean, that you keep repeating this proverb in the land of Israel,
    saying, ‘The fathers eat sour grapes, and the children’s teeth are set on edge’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The fathers eat sour grapes, and the sons’ teeth are dulled /
      set on edge.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לָּכֶם
  chosen: What do you mean
  alternatives:
  - What is it to you
  - What is with you
  lexicon: HALOT
  rationale: The idiom מַה לָכֶם introduces a rebuke or challenge to the audience's
    behavior. 'What do you mean' communicates the idiomatic force in natural English
    better than a wooden rendering while preserving the confrontational tone.
- source_word: מֹשְׁלִים
  chosen: you keep repeating
  alternatives:
  - you are using
  - you are quoting
  - you are making a proverb
  lexicon: HALOT
  rationale: From משל in the sense 'to use/speak a proverb.' Because the verb is participial
    and depicts ongoing customary action, 'keep repeating' captures the iterative
    force in context.
- source_word: הַמָּשָׁל הַזֶּה
  chosen: this proverb
  alternatives:
  - this saying
  - this parable
  lexicon: HALOT
  rationale: מָשָׁל here is a proverbial saying, not a narrative parable. 'Proverb'
    is the most precise English equivalent.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  chosen: in the land of Israel
  alternatives:
  - upon the soil of Israel
  - concerning the land of Israel
  lexicon: HALOT
  rationale: אַדְמָה is literally 'ground/soil,' but in this construction it refers
    to the territory of Israel. 'In the land of Israel' is idiomatic and contextually
    clear.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard quotative introduction to the proverb; 'saying' preserves the
    direct-speech linkage.
- source_word: אָבוֹת
  chosen: The fathers
  alternatives:
  - The parents
  - Fathers
  lexicon: HALOT
  rationale: The Hebrew specifically says 'fathers,' and the translation philosophy
    prefers gender-accurate rendering rather than neutralizing to 'parents.'
- source_word: יֹאכְלוּ בֹסֶר
  chosen: eat sour grapes
  alternatives:
  - eat unripe grapes
  - have eaten sour grapes
  lexicon: HALOT
  rationale: בֹסֶר denotes unripe/sour grapes. 'Sour grapes' is the established and
    accurate English idiom here. The imperfect is rendered as a gnomic present within
    the proverb.
- source_word: שִׁנֵּי הַבָּנִים
  chosen: the children’s teeth
  alternatives:
  - the sons' teeth
  lexicon: HALOT
  rationale: While בָּנִים literally means 'sons,' in this proverb it refers to offspring
    generally in contrast to fathers. 'Children' best conveys the representative familial
    sense in natural English.
- source_word: תִּקְהֶינָה
  chosen: are set on edge
  alternatives:
  - become blunt
  - grow dull
  - are dulled
  lexicon: HALOT
  rationale: The verb refers to the unpleasant numbing/dulling sensation in the teeth
    caused by sour fruit. 'Are set on edge' is the standard idiomatic English equivalent
    and best matches the proverb's sense.
