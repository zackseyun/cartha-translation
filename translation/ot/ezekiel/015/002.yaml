id: EZK.15.2
reference: Ezekiel 15:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם מַה יִּֽהְיֶ֥ה עֵץ הַ/גֶּ֖פֶן מִ/כָּל עֵ֑ץ הַ/זְּמוֹרָ֕ה אֲשֶׁ֥ר
    הָיָ֖ה בַּ/עֲצֵ֥י הַ/יָּֽעַר־־־־׃
translation:
  text: Son of man, how is the wood of the vine better than any wood—the branch that
    is among the trees of the forest?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'what is the wood of the vine more than any wood, the
      branch that is among the trees of the forest?' The Hebrew is elliptical and
      comparative.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A fixed prophetic address in Ezekiel. 'Son of man' preserves the Hebrew
    idiom and its established force better than smoothing to 'mortal,' while here
    it is not a messianic title but a vocative to the prophet.
- source_word: מַה יִּהְיֶה
  chosen: how is ... better
  alternatives:
  - what is ... more than
  - how does ... compare
  lexicon: HALOT
  rationale: 'In context the question is comparative: what advantage or superiority
    does vine wood have over other wood? English requires some expansion to make the
    elliptical Hebrew idiomatic.'
- source_word: עֵץ הַגֶּפֶן
  chosen: the wood of the vine
  alternatives:
  - vine wood
  - the vine tree/wood
  lexicon: HALOT
  rationale: Literally 'wood of the vine.' Chosen wording preserves the focus on the
    material/wood rather than the plant as such, which is important for the metaphor
    in the surrounding verses.
- source_word: מִכָּל עֵץ
  chosen: than any wood
  alternatives:
  - more than every tree
  - than all wood
  lexicon: HALOT
  rationale: The preposition מִן with כָּל marks comparison. 'Any wood' is natural
    English and fits the rhetorical question about usefulness relative to other wood.
- source_word: הַזְּמוֹרָה
  chosen: the branch
  alternatives:
  - the vine branch
  - the tendril
  - the shoot
  lexicon: HALOT
  rationale: זְמוֹרָה denotes a vine branch/shoot. 'The branch' is concise and natural;
    the vine association is already established by 'the wood of the vine.'
- source_word: אֲשֶׁר הָיָה בַּעֲצֵי הַיָּעַר
  chosen: that is among the trees of the forest
  alternatives:
  - which was among the trees of the forest
  - that was in the forest trees
  lexicon: HALOT
  rationale: Though the Hebrew perfect can be rendered 'was,' English present works
    better in this generic comparison. 'Among the trees of the forest' captures the
    sense of the vine branch growing amid forest trees.
