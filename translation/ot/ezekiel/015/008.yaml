id: EZK.15.8
reference: Ezekiel 15:8
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י אֶת הָ/אָ֖רֶץ שְׁמָמָ֑ה יַ֚עַן מָ֣עֲלוּ מַ֔עַל נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃פ
translation:
  text: And I will make the land a desolation, because they have acted unfaithfully, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''they have committed a breach of faith'' or ''they have been faithless.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew title: ''Lord Yahweh''; traditionally rendered ''the Lord GOD'' to reflect the combination of ''Adonai'' with the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will give
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set,' but with the object 'the land' and predicate 'desolation' the idiom means to make or render the land desolate. 'Make' communicates the result naturally in English without over-paraphrasing.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land,' 'earth,' or 'country.' In Ezekiel's judgment context it refers to the territorial land under judgment, not the whole globe, so 'the land' is best.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  - devastation
  lexicon: HALOT
  rationale: The noun denotes a state of ruin or desolation. 'A desolation' preserves the nominal force of the Hebrew better than the adjective 'desolate' while remaining idiomatic in English.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of the fact that
  lexicon: HALOT
  rationale: יַעַן introduces the reason for judgment. 'Because' is the clearest natural English causal connector.
- source_word: מָעֲלוּ מַעַל
  chosen: they have acted unfaithfully
  alternatives:
  - they committed trespass
  - they were faithless
  - they committed a breach of faith
  lexicon: HALOT
  rationale: The verb-noun combination intensifies the idea of covenantal unfaithfulness or breach of trust. 'Acted unfaithfully' captures the idiomatic force in readable modern English better than the archaic 'committed a trespass,' while preserving the covenantal sense.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: This prophetic formula introduces a solemn divine pronouncement. 'Declares' is standard, clear English and fits modern readability goals.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title is conventionally rendered 'Lord GOD' in English when אֲדֹנָי stands with the divine name, avoiding 'Lord LORD.' Per doctrine, יְהוָה is rendered 'the LORD'; in this compound, 'GOD' signals the underlying divine name in established English practice.
