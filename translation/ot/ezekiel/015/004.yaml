id: EZK.15.4
reference: Ezekiel 15:4
source:
  edition: WLC
  text: הִנֵּ֥ה לָ/אֵ֖שׁ נִתַּ֣ן לְ/אָכְלָ֑ה אֵת֩ שְׁנֵ֨י קְצוֹתָ֜י/ו אָכְלָ֤ה הָ/אֵשׁ֙
    וְ/תוֹכ֣/וֹ נָחָ֔ר הֲ/יִצְלַ֖ח לִ/מְלָאכָֽה׃
translation:
  text: Look, it is given to the fire for fuel. The fire has consumed both of its
    ends, and its middle is charred. Is it fit for any work?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be consumed'; literally 'for eating,' with fire personified as consuming
      the wood.
    reason: lexical_alternative
  - marker: b
    text: Or 'useful for work' or 'suitable for workmanship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the illustration with deictic force. 'Look' preserves the
    attention-getting function in readable modern English better than the more archaic
    'Behold.'
- source_word: לָאֵשׁ
  chosen: to the fire
  alternatives:
  - for the fire
  lexicon: HALOT
  rationale: 'The prefixed ל marks direction/destination here: the wood is handed
    over to fire. ''To the fire'' is idiomatic and preserves the image.'
- source_word: נִתַּן
  chosen: it is given
  alternatives:
  - it is handed over
  - it is put
  lexicon: HALOT
  rationale: Passive of נתן. 'Is given' keeps the passive sense and the terse prophetic
    style without over-interpreting agency.
- source_word: לְאָכְלָה
  chosen: for fuel
  alternatives:
  - to be consumed
  - for burning
  - for food
  lexicon: HALOT
  rationale: Although the noun is literally 'for eating/consumption,' with fire as
    the consumer the idiomatic English equivalent is 'for fuel.' This conveys the
    metaphor naturally while staying close to the Hebrew sense of being consumed by
    fire.
- source_word: שְׁנֵי קְצוֹתָיו
  chosen: both of its ends
  alternatives:
  - its two ends
  lexicon: HALOT
  rationale: The dual-number expression is best represented by 'both of its ends,'
    which sounds natural in English and preserves the emphasis on the two extremities.
- source_word: אָכְלָה הָאֵשׁ
  chosen: The fire has consumed
  alternatives:
  - The fire consumed
  - The fire has eaten up
  lexicon: HALOT
  rationale: The verb אכל is commonly used metaphorically of fire consuming. 'Has
    consumed' fits the completed-result sense in context and avoids the overly literal
    'eaten up.'
- source_word: וְתוֹכוֹ
  chosen: and its middle
  alternatives:
  - and its inside
  - and its interior
  lexicon: HALOT
  rationale: תוֹךְ denotes the middle/interior. 'Its middle' fits the image of a vine
    branch burned at both ends and in the center.
- source_word: נָחָר
  chosen: is charred
  alternatives:
  - is scorched
  - is burned through
  - is burned
  lexicon: HALOT
  rationale: The verb denotes being burned or scorched by heat. 'Is charred' vividly
    captures the damaged state of the middle after fire has already consumed the ends.
- source_word: הֲיִצְלַח
  chosen: Is it fit
  alternatives:
  - Will it prosper
  - Will it succeed
  - Is it useful
  lexicon: HALOT
  rationale: In this context of suitability for craftsmanship, the verb carries the
    sense of proving useful or suitable rather than prospering in a broad sense. 'Is
    it fit' is concise and idiomatic.
- source_word: לִמְלָאכָה
  chosen: for any work
  alternatives:
  - for workmanship
  - for a task
  - for use
  lexicon: HALOT
  rationale: 'מְלָאכָה here refers to practical work or use. ''For any work'' preserves
    the rhetorical force: such wood is no longer suitable for making anything.'
