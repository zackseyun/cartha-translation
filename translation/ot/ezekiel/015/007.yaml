- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the judgment idiom 'set my face against them'
  chosen_reading: Preserve the idiom in the main text
  alternative_readings:
  - I will oppose them
  - I will turn against them
  rationale: The Hebrew expression carries covenantal-judicial weight in prophetic literature. Preserving the idiom maintains theological and literary continuity rather than reducing it to a generic statement of opposition.
