id: EZK.15.7
reference: Ezekiel 15:7
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י אֶת פָּנַ/י֙ בָּ/הֶ֔ם מֵ/הָ/אֵ֣שׁ יָצָ֔אוּ וְ/הָ/אֵ֖שׁ תֹּֽאכְלֵ֑/ם וִֽ/ידַעְתֶּם֙ כִּֽי אֲנִ֣י יְהוָ֔ה בְּ/שׂוּמִ֥/י אֶת פָּנַ֖/י בָּ/הֶֽם־־־׃
translation:
  text: And I will set my face against them. They have come out from the fire, but the fire will consume them. Then you will know that I am Yahweh, when I set my face against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''set my face against them,'' expressing determined opposition and judgment.'
    reason: cultural_note
  - marker: b
    text: Or 'They came out of the fire, but the fire will devour them.' The Hebrew contrasts coming out from one fire with being consumed by fire nonetheless.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will set
  alternatives:
  - I will place
  - I will turn
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' In the idiom with 'my face against them,' 'set' is the most natural English equivalent and preserves the force of deliberate opposition.
- source_word: אֶת־פָּנַי בָּהֶם
  chosen: my face against them
  alternatives:
  - my face on them
  lexicon: HALOT
  rationale: The idiom 'set one's face against' is a standard Hebrew expression for determined hostility or judgment. English should preserve the idiom rather than flatten it to a paraphrase.
- source_word: מֵהָאֵשׁ יָצָאוּ
  chosen: They have come out from the fire
  alternatives:
  - They escaped from the fire
  - They came out of the fire
  lexicon: HALOT
  rationale: יצא means 'go/come out.' The clause states emergence from one fire, not necessarily successful escape; 'have come out from the fire' preserves the Hebrew sequence and leaves the irony for the next clause.
- source_word: וְהָאֵשׁ תֹּאכְלֵם
  chosen: but the fire will consume them
  alternatives:
  - and the fire will devour them
  - yet the fire will consume them
  lexicon: HALOT
  rationale: 'אכל with fire as subject commonly means ''consume/devour.'' ''Consume'' is idiomatic and suitably grave. Rendering waw adversatively with ''but'' brings out the contrast implicit in the context: though they came out from one fire, another fire still destroys them.'
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect in prophetic discourse often carries consequential force. 'Then' communicates result without overtranslating.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּשׂוּמִי אֶת־פָּנַי בָּהֶם
  chosen: when I set my face against them
  alternatives:
  - in my setting my face against them
  - when I place my face against them
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct is temporal here: ''when I set.'' Repeating the idiom consistently preserves the rhetorical framing of the verse.'
