id: EZK.15.1
reference: Ezekiel 15:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the prophetic formula ויהי דבר־יהוה אלי, English idiom is best served by rendering the clause as 'the word of the LORD came to me' rather than the more wooden 'the word of the LORD was to me.' This preserves the standard Hebrew prophetic introduction while remaining natural English.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר in this formula refers to a divine communication. 'The word' preserves the recurring prophetic expression and its theological resonance better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix straightforwardly means 'to me.' 'Unto me' is unnecessarily archaic for the project's modern-English aims.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - and said
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct speech. 'Saying' is the most transparent and conventional rendering in this formula, especially since the content follows in the next verse.
