theological_decisions:
- issue: Nature of the imagery
  chosen_reading: Translate the verse as a rhetorical statement about the uselessness
    of burned vine wood, without importing allegorical interpretation into the verse
    itself.
  alternative_readings:
  - Explicitly interpret the wood as Jerusalem/Judah in the main text
  rationale: The broader context identifies the metaphor's referent, but this verse
    itself speaks in image-language. The translation should preserve the metaphor
    and let the context supply the interpretation rather than embedding it in the
    wording.
  doctrine_reference: Translation philosophy §1, §3
