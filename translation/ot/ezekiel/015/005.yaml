id: EZK.15.5
reference: Ezekiel 15:5
source:
  edition: WLC
  text: הִנֵּה֙ בִּֽ/הְיוֹת֣/וֹ תָמִ֔ים לֹ֥א יֵֽעָשֶׂ֖ה לִ/מְלָאכָ֑ה אַ֣ף כִּי אֵ֤שׁ
    אֲכָלַ֨תְ/הוּ֙ וַ/יֵּחָ֔ר וְ/נַעֲשָׂ֥ה ע֖וֹד לִ/מְלָאכָֽה־׃ס
translation:
  text: Look, when it was whole, it was not made for any work. How much less, when
    the fire has consumed it and it is charred, can it still be made into anything
    for work?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sound' or 'intact' for 'whole.' The Hebrew describes the wood before
      it has been damaged by fire.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''How much less,'' an argument from the lesser to the greater: if
      it was useless when intact, it is even less useful after being burned.'
    reason: lexical_alternative
  - marker: c
    text: Or 'scorched' for 'charred.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the statement with attention-getting force. 'Look' is natural
    modern English while preserving the deictic emphasis better than a flat omission.
- source_word: בִּהְיוֹתוֹ
  chosen: when it was
  alternatives:
  - in its being
  - while it was
  lexicon: HALOT
  rationale: The preposition with infinitive construct and pronominal suffix is temporal
    here, introducing the condition of the wood before burning. 'When it was' gives
    clear English syntax.
- source_word: תָמִים
  chosen: whole
  alternatives:
  - sound
  - intact
  - complete
  lexicon: HALOT
  rationale: In context of vine wood, the sense is physical unimpairedness, not moral
    blamelessness. 'Whole' is concise and idiomatic for wood that has not yet been
    damaged.
- source_word: לֹא יֵעָשֶׂה לִמְלָאכָה
  chosen: it was not made for any work
  alternatives:
  - it could not be made into an object for work
  - it was not usable for work
  lexicon: HALOT
  rationale: 'The Niphal of עשה here is passive/resultative: the wood is not made
    or fashioned for practical use. ''For any work'' reflects the broad sense of מְלָאכָה
    as useful labor/task rather than a specific craft.'
- source_word: אַף כִּי
  chosen: How much less
  alternatives:
  - indeed when
  - even though
  - how much more
  lexicon: HALOT
  rationale: 'In this argument from lesser to greater, the idiom introduces a fortiori
    reasoning: if it was useless when intact, much less after burning. ''How much
    less'' captures the logic clearly.'
- source_word: אֵשׁ אֲכָלַתְהוּ
  chosen: the fire has consumed it
  alternatives:
  - fire has eaten it
  - a fire has devoured it
  lexicon: HALOT
  rationale: The perfect describes completed burning. 'Consumed' is idiomatic English
    for fire and preserves the severity without over-literalizing 'eaten.'
- source_word: וַיֵּחָר
  chosen: it is charred
  alternatives:
  - it is scorched
  - it is burned
  lexicon: HALOT
  rationale: From חרר, the sense is being burned/charred by heat. 'Charred' distinguishes
    the post-fire damaged condition and fits the imagery of partially burned wood.
- source_word: וְנַעֲשָׂה עוֹד לִמְלָאכָה
  chosen: can it still be made into anything for work
  alternatives:
  - will it still be made for work
  - can it again be made useful for work
  lexicon: HALOT
  rationale: The clause is best taken rhetorically in context, asking whether such
    burned wood can still be fashioned into something useful. 'Still' reflects עוֹד,
    and 'anything for work' makes explicit the implied object in natural English.
