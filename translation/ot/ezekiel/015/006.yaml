id: EZK.15.6
reference: Ezekiel 15:6
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה כַּ/אֲשֶׁ֤ר עֵץ הַ/גֶּ֨פֶן֙ בְּ/עֵ֣ץ הַ/יַּ֔עַר אֲשֶׁר נְתַתִּ֥י/ו לָ/אֵ֖שׁ לְ/אָכְלָ֑ה כֵּ֣ן נָתַ֔תִּי אֶת יֹשְׁבֵ֖י יְרוּשָׁלִָֽם־־־׃
translation:
  text: 'Therefore thus says the Lord GOD: As the wood of the vine among the trees of the forest, which I have given to the fire for fuel, so I have given the inhabitants of Jerusalem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to the fire for consumption'; that is, as something to be burned up. Or, more literally, 'to the fire to be consumed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the conclusion/application of the preceding comparison.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; 'thus says' preserves the formal prophetic cadence without archaic excess.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי is rendered 'Lord' and יְהוִה follows the doctrinal default 'the LORD.' In the combined title, English convention uses 'the Lord GOD' to avoid 'Lord LORD' while still signaling the divine name behind יְהוִה.
- source_word: עֵץ הַגֶּפֶן
  chosen: the wood of the vine
  alternatives:
  - the vine wood
  - the wood of the grapevine
  lexicon: HALOT
  rationale: עֵץ here refers to wood/material rather than a living tree in abstraction. 'The wood of the vine' best fits the comparison to fuel and preserves the concrete imagery.
- source_word: בְּעֵץ הַיַּעַר
  chosen: among the trees of the forest
  alternatives:
  - with the trees of the forest
  - in the wood of the forest
  lexicon: HALOT
  rationale: 'The beth is best taken in a comparative/locative sense within the larger simile: vine wood set among forest trees. ''Among'' reads naturally in English and preserves the contrast.'
- source_word: נְתַתִּיו
  chosen: which I have given
  alternatives:
  - which I gave
  - which I handed over
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect here to connect the prior illustrative action with its present application. The 3ms suffix refers back to the vine wood.
- source_word: לָאֵשׁ לְאָכְלָה
  chosen: to the fire for fuel
  alternatives:
  - to the fire to be consumed
  - to the fire for burning
  - to the fire for devouring
  lexicon: HALOT
  rationale: Literally 'to the fire for consumption.' 'For fuel' captures the idiomatic sense of wood being given over as something to be burned, while remaining faithful to the image.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Marks the apodosis of the simile; 'so' is concise and natural.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I gave
  - I hand over
  lexicon: HALOT
  rationale: Matches the earlier perfect for rhetorical parallelism and presents the judgment as decisively enacted.
- source_word: יֹשְׁבֵי יְרוּשָׁלִָם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those who dwell in Jerusalem
  - the dwellers of Jerusalem
  lexicon: HALOT
  rationale: Idiomatic rendering of the participial construct; 'inhabitants' is natural modern English and preserves the collective sense.
