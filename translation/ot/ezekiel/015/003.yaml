id: EZK.15.3
reference: Ezekiel 15:3
source:
  edition: WLC
  text: הֲ/יֻקַּ֤ח מִמֶּ֨/נּוּ֙ עֵ֔ץ לַ/עֲשׂ֖וֹת לִ/מְלָאכָ֑ה אִם יִקְח֤וּ מִמֶּ֨/נּוּ֙
    יָתֵ֔ד לִ/תְל֥וֹת עָלָ֖י/ו כָּל כֶּֽלִי־־׃
translation:
  text: Is wood taken from it to make anything useful? Or do they take from it a peg
    to hang every kind of vessel on it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to make anything for work' / 'for any useful task.' The Hebrew phrase
      לַעֲשׂוֹת לִמְלָאכָה emphasizes practical usefulness.
    reason: lexical_alternative
  - marker: b
    text: '''Peg'' could also be rendered ''stake'' or ''nail,'' but the sense is
      a fixed support from which objects are hung.'
    reason: lexical_alternative
  - marker: c
    text: '''Vessel'' here is a broad term for an article, implement, or container,
      not only pottery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֻקַּח
  chosen: Is ... taken
  alternatives:
  - Can ... be taken
  - Is ... obtained
  lexicon: HALOT
  rationale: 'Rendered as an interrogative passive of לקח, matching the rhetorical
    question form: ''Is [it] taken?'' English supplies the auxiliary for natural syntax.'
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from this vine
  - from it
  lexicon: HALOT
  rationale: The pronoun refers back to the vine/wood of the previous context. 'From
    it' preserves the Hebrew anaphora without over-specifying in the verse itself.
- source_word: עֵץ
  chosen: wood
  alternatives:
  - timber
  - wooden material
  lexicon: HALOT
  rationale: In context the point is not a living tree but usable wood material. 'Wood'
    is the most natural English equivalent here.
- source_word: לַעֲשׂוֹת לִמְלָאכָה
  chosen: to make anything useful
  alternatives:
  - to make something for work
  - to make an object for use
  - for any work
  lexicon: HALOT
  rationale: The phrase denotes making something for practical use or workmanship.
    'Anything useful' captures the rhetorical force in idiomatic English while preserving
    the sense of utility.
- source_word: אִם
  chosen: Or
  alternatives:
  - Or if
  - If
  lexicon: HALOT
  rationale: Here אִם introduces the second rhetorical alternative in parallel with
    the first question. 'Or' gives the best English flow.
- source_word: יִקְחוּ
  chosen: do they take
  alternatives:
  - will they take
  - can they take
  lexicon: HALOT
  rationale: 'Imperfect in rhetorical question context is well represented by present
    English: ''do they take?''.'
- source_word: יָתֵד
  chosen: a peg
  alternatives:
  - a hook
  - a stake
  - a nail
  lexicon: HALOT
  rationale: יתד commonly denotes a peg or stake. In this domestic/object-hanging
    context, 'peg' is the clearest and least misleading choice.
- source_word: לִתְלוֹת
  chosen: to hang
  alternatives:
  - to suspend
  lexicon: HALOT
  rationale: Straightforward infinitive of תלה; 'to hang' is natural modern English.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - on that
  - upon it
  lexicon: HALOT
  rationale: Refers to the peg/wood as the support. 'On it' is idiomatic and sufficiently
    literal.
- source_word: כָּל כֶּלִי
  chosen: every kind of vessel
  alternatives:
  - every vessel
  - any utensil
  - all kinds of objects
  lexicon: HALOT
  rationale: כלי is broad ('vessel, implement, article'). 'Vessel' preserves the concrete
    object sense, and 'every kind of' reflects כל with idiomatic English breadth.
