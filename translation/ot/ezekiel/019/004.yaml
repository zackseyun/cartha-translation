id: EZK.19.4
reference: Ezekiel 19:4
source:
  edition: WLC
  text: וַ/יִּשְׁמְע֥וּ אֵלָ֛י/ו גּוֹיִ֖ם בְּ/שַׁחְתָּ֣/ם נִתְפָּ֑שׂ וַ/יְבִאֻ֥/הוּ
    בַֽ/חַחִ֖ים אֶל אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: The nations heard about him; he was caught in their pit, and they brought
    him with hooks to the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard of him.' The Hebrew idiom may denote hearing reports concerning
      him rather than hearing him directly.
    reason: lexical_alternative
  - marker: b
    text: Or 'trap' for 'pit.' The image is of a hunting pit used to capture prey.
    reason: lexical_alternative
  - marker: c
    text: '''With hooks'' may refer to restraining hooks or rings used on captured
      animals or prisoners.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ אֵלָיו
  chosen: heard about him
  alternatives:
  - heard him
  - heard of him
  lexicon: HALOT
  rationale: The idiom שׁמע אל can mean 'hear of/about' in context rather than literal
    auditory reception. Here, with 'nations' responding to the lion's reputation and
    then capturing him, 'heard about him' best conveys the sense of receiving report
    concerning him.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - Gentiles
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to foreign peoples/nations. 'The nations'
    is the most natural contextual rendering; 'Gentiles' would import later Jewish/Christian
    usage not required here.
- source_word: בְּשַׁחְתָּם
  chosen: in their pit
  alternatives:
  - in their trap
  - in their ditch
  lexicon: HALOT
  rationale: שַׁחַת commonly denotes a pit, often one used for capture or destruction.
    Given the lion-hunt imagery, 'pit' preserves the concrete metaphor while allowing
    the capture sense to emerge from context.
- source_word: נִתְפָּשׂ
  chosen: was caught
  alternatives:
  - was captured
  - was seized
  lexicon: HALOT
  rationale: The Niphal form naturally yields a passive/reflexive sense. 'Was caught'
    fits the hunting imagery and pairs well with 'pit'.
- source_word: וַיְבִאֻהוּ
  chosen: they brought him
  alternatives:
  - they led him
  - they carried him away
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means 'bring.' 'Brought him' is the straightforward
    rendering and leaves the manner of transport to the following phrase.
- source_word: בַחַחִים
  chosen: with hooks
  alternatives:
  - with rings
  - with nose-hooks
  lexicon: HALOT
  rationale: חַחִים refers to hooks/rings used to restrain captives or animals. 'With
    hooks' is the clearest general rendering in English; the more specific 'nose-hooks'
    is possible but not explicit in the verse itself.
- source_word: אֶל אֶרֶץ מִצְרַיִם
  chosen: to the land of Egypt
  alternatives:
  - into the land of Egypt
  - to Egypt
  lexicon: HALOT
  rationale: Retaining 'land of Egypt' preserves the formal geographic expression
    of the Hebrew while remaining natural English.
