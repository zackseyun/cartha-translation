theological_decisions:
- issue: Royal imagery in the vine allegory
  chosen_reading: Retain both botanical and regal imagery by rendering מַטֶּה as 'branch'
    in the vine context and שֵׁבֶט as 'scepter' for rule.
  alternative_readings:
  - Render both terms uniformly as 'rod/staff' to foreground kingship
  - Render both terms uniformly as 'branch' to foreground the vine metaphor
  rationale: 'The verse intentionally blends metaphors: the Davidic line is pictured
    as a vine whose branches once became rulers. The translation preserves that tension
    rather than collapsing the imagery into only political or only botanical language.'
  doctrine_reference: Translation philosophy §3, §5
