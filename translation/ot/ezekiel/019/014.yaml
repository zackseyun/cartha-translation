id: EZK.19.14
reference: Ezekiel 19:14
source:
  edition: WLC
  text: וַ/תֵּצֵ֨א אֵ֜שׁ מִ/מַּטֵּ֤ה בַדֶּ֨י/הָ֙ פִּרְיָ֣/הּ אָכָ֔לָה וְ/לֹא הָ֥יָה
    בָ֛/הּ מַטֵּה עֹ֖ז שֵׁ֣בֶט לִ/מְשׁ֑וֹל קִ֥ינָה הִ֖יא וַ/תְּהִ֥י לְ/קִינָֽה־־׃פ
translation:
  text: And fire went out from a branch of its limbs; it consumed its fruit, and there
    was not in it a strong branch, a scepter to rule. This is a lamentation, and it
    has become a lamentation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a rod among its branches'; Hebrew מַטֶּה can mean 'branch,' 'rod,'
      or 'staff.' The main text follows the vine imagery, while the verse's later
      'scepter' preserves the royal sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'there was no strong rod in it, no scepter for ruling.' The Hebrew intentionally
      blends vine imagery with royal imagery.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּצֵא אֵשׁ
  chosen: And fire went out
  alternatives:
  - And a fire came out
  - And fire came forth
  lexicon: HALOT
  rationale: The wayyiqtol plus noun gives a vivid narrative progression. 'Went out'
    preserves the concrete image without archaic tone; 'fire' is left indefinite in
    English as in Hebrew.
- source_word: מִמַּטֵּה
  chosen: from a branch
  alternatives:
  - from a staff
  - from a rod
  lexicon: HALOT
  rationale: מַטֶּה can mean staff, rod, or branch/shoot depending on context. In
    this vine allegory, arboreal imagery dominates, so 'branch' best fits the metaphor
    while allowing the later royal nuance to reappear in 'scepter.'
- source_word: בַדֶּיהָ
  chosen: its limbs
  alternatives:
  - its branches
  - its boughs
  lexicon: HALOT
  rationale: בַּד can denote branch/bough. 'Limbs' differentiates it from מַטֶּה in
    the same clause and preserves the image of larger structural growth from which
    a smaller branch emerges.
- source_word: פִּרְיָהּ אָכָלָה
  chosen: it consumed its fruit
  alternatives:
  - it devoured its fruit
  - it consumed her fruit
  lexicon: HALOT
  rationale: The feminine verb refers back to 'fire.' 'Consumed' is idiomatic for
    fire and keeps the destructive force. 'Its fruit' matches the vine imagery and
    avoids overpersonalizing the metaphor.
- source_word: וְלֹא הָיָה בָהּ
  chosen: and there was not in it
  alternatives:
  - and there was no... in it
  - and it had no
  lexicon: HALOT
  rationale: This more literal structure preserves the Hebrew existential phrasing
    and the sense that the vine lacks what is needed within itself.
- source_word: מַטֵּה עֹז
  chosen: a strong branch
  alternatives:
  - a mighty staff
  - a strong rod
  lexicon: HALOT
  rationale: Again, in context מַטֶּה is best rendered with vegetal imagery. עֹז adds
    strength/might. 'Strong branch' keeps continuity with the allegory while preparing
    for the royal metaphor in apposition.
- source_word: שֵׁבֶט לִמְשׁוֹל
  chosen: a scepter to rule
  alternatives:
  - a ruler's staff
  - a rod for ruling
  lexicon: HALOT
  rationale: 'שֵׁבֶט often denotes a rod or scepter and here clearly carries royal
    authority. ''A scepter to rule'' preserves the appositional force: the vine lacks
    a branch fit to be a ruling scepter.'
- source_word: קִינָה הִיא
  chosen: This is a lamentation
  alternatives:
  - It is a lament
  - A lamentation it is
  lexicon: HALOT
  rationale: The verbless clause is emphatic. 'This is a lamentation' is natural English
    and preserves the formal, dirge-like conclusion.
- source_word: וַתְּהִי לְקִינָה
  chosen: and it has become a lamentation
  alternatives:
  - and it became a lamentation
  - and it serves as a lamentation
  lexicon: HALOT
  rationale: The phrase marks the poem itself as a lament and perhaps the subject
    as fit for lament. 'Has become' communicates resultant state in readable English.
