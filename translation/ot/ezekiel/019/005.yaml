id: EZK.19.5
reference: Ezekiel 19:5
source:
  edition: WLC
  text: וַ/תֵּ֨רֶא֙ כִּ֣י נֽוֹחֲלָ֔ה אָבְדָ֖ה תִּקְוָתָ֑/הּ וַ/תִּקַּ֛ח אֶחָ֥ד מִ/גֻּרֶ֖י/הָ
    כְּפִ֥יר שָׂמָֽתְ/הוּ׃
translation:
  text: When she saw that she had waited in vain, that her hope was lost, she took
    one of her cubs and made him a young lion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she was weakened' / 'she was disappointed.' The Hebrew term is difficult;
      the main text follows the contextual sense of frustrated waiting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When she saw
  alternatives:
  - And she saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the lament narrative. 'When she saw' captures
    both the temporal sense in English and the narrative flow more naturally than
    a bare 'And she saw.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what she saw rather than a causal clause; 'that'
    best fits the syntax here.
- source_word: נוֹחֲלָה
  chosen: she had waited in vain
  alternatives:
  - she was weakened
  - she was disappointed
  - she became sick
  lexicon: HALOT
  rationale: The form is difficult, but in context with 'her hope was lost' it conveys
    frustrated expectation rather than physical illness. 'Had waited in vain' fits
    the lament's sense that expectation proved futile.
- source_word: אָבְדָה תִּקְוָתָהּ
  chosen: her hope was lost
  alternatives:
  - her hope had perished
  - her expectation was gone
  lexicon: HALOT
  rationale: A straightforward rendering of the verbal-nominal clause. 'Hope' is idiomatic
    and preserves the emotional force of the lament.
- source_word: וַתִּקַּח אֶחָד מִגֻּרֶיהָ
  chosen: she took one of her cubs
  alternatives:
  - she took one from her whelps
  - she took one of her young
  lexicon: HALOT
  rationale: גּוּר refers to a lion cub/young one in this lioness metaphor. 'Cubs'
    is clear modern English and keeps the imagery explicit.
- source_word: כְּפִיר
  chosen: a young lion
  alternatives:
  - a lion
  - a strong young lion
  lexicon: HALOT
  rationale: כְּפִיר specifically denotes a young lion, not merely any lion. Retaining
    'young' preserves the lexical distinction from other lion terms.
- source_word: שָׂמָתְהוּ
  chosen: made him
  alternatives:
  - set him up as
  - appointed him as
  lexicon: HALOT
  rationale: The verb 'set/place' here idiomatically means to make or establish him
    as a young lion. 'Made him' is concise and natural in English while preserving
    the metaphorical force.
