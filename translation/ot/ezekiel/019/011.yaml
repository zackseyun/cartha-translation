id: EZK.19.11
reference: Ezekiel 19:11
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ לָ֞/הּ מַטּ֣וֹת עֹ֗ז אֶל שִׁבְטֵי֙ מֹֽשְׁלִ֔ים וַ/תִּגְבַּ֥הּ
    קֽוֹמָת֖/וֹ עַל בֵּ֣ין עֲבֹתִ֑ים וַ/יֵּרָ֣א בְ/גָבְה֔/וֹ בְּ/רֹ֖ב דָּלִיֹּתָֽי/ו־־־׃
translation:
  text: And she had strong branches fit for rulers’ scepters, and its stature rose
    high among the thick boughs; it was seen in its height, in the abundance of its
    branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'above the dense foliage.' The Hebrew likely refers to thick boughs or
      dense growth; the traditional rendering 'above the clouds' is possible but less
      likely in this vine context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטּוֹת עֹז
  chosen: strong branches
  alternatives:
  - strong rods
  - mighty staffs
  lexicon: HALOT
  rationale: מַטּוֹת can denote rods/staffs/branches depending on context. In this
    vine allegory, the imagery is botanical, so 'branches' best preserves the metaphor,
    while עֹז contributes the sense of strength or might.
- source_word: אֶל שִׁבְטֵי מֹשְׁלִים
  chosen: fit for rulers’ scepters
  alternatives:
  - for rulers' scepters
  - into rulers' scepters
  lexicon: HALOT
  rationale: שֵׁבֶט commonly means rod/scepter/tribe. Here, with מֹשְׁלִים ('those
    who rule'), the royal sense 'scepters' is most natural. אֶל is somewhat idiomatic
    in this poetic context; 'fit for' expresses suitability without over-literal awkwardness.
- source_word: וַתִּגְבַּהּ קוֹמָתוֹ
  chosen: and its stature rose high
  alternatives:
  - and its height was exalted
  - and its trunk grew tall
  lexicon: HALOT
  rationale: Though the verb is feminine agreeing with the vine, the suffix on קוֹמָה
    is masculine singular, likely referring to the vine in poetic variation. 'Its
    stature rose high' captures the elevated growth without forcing a more technical
    botanical term.
- source_word: עַל בֵּין עֲבֹתִים
  chosen: among the thick boughs
  alternatives:
  - above the clouds
  - above the dense foliage
  - among the thick branches
  lexicon: HALOT
  rationale: עֲבֹתִים can refer to thick foliage or dense boughs. In context of a
    luxuriant vine, 'thick boughs' fits the immediate imagery better than the traditional
    'clouds,' which likely reflects a secondary interpretive move rather than the
    plain botanical sense.
- source_word: וַיֵּרָא
  chosen: it was seen
  alternatives:
  - it appeared
  - it was visible
  lexicon: HALOT
  rationale: 'The Niphal form is naturally rendered as passive/reflexive: ''was seen''
    or ''appeared.'' ''Was seen'' best conveys conspicuous visibility resulting from
    its height.'
- source_word: בְגָבְהוֹ
  chosen: in its height
  alternatives:
  - because of its height
  - at its height
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken in a descriptive sense: it was
    seen ''in'' or ''by'' its height, i.e., as characterized by great height.'
- source_word: בְּרֹב דָּלִיֹּתָיו
  chosen: in the abundance of its branches
  alternatives:
  - with its many branches
  - in the multitude of its boughs
  lexicon: HALOT
  rationale: דָּלִיּוֹת refers to hanging branches/boughs. 'Branches' is clear modern
    English and maintains consistency with the vine metaphor; 'abundance' renders
    רֹב in a natural but still fairly formal way.
