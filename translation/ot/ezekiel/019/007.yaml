id: EZK.19.7
reference: Ezekiel 19:7
source:
  edition: WLC
  text: וַ/יֵּ֨דַע֙ אַלְמְנוֹתָ֔י/ו וְ/עָרֵי/הֶ֖ם הֶחֱרִ֑יב וַ/תֵּ֤שַׁם אֶ֨רֶץ֙ וּ/מְלֹאָ֔/הּ
    מִ/קּ֖וֹל שַׁאֲגָתֽ/וֹ׃
translation:
  text: He knew their widows, and he laid waste their cities; the land and its fullness
    were desolated by the sound of his roaring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'he knew their/his widows.' The verb 'knew' may carry a hostile or
      sexual nuance in context; some understand the line more concretely as abuse
      of women. Others, following an alternative reading, render 'he destroyed their
      palaces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּדַע
  chosen: he knew
  alternatives:
  - he violated
  - he ravished
  lexicon: HALOT
  rationale: The verb ידע normally means 'know,' but in some contexts can function
    euphemistically for sexual relations. Here, in a lion metaphor about a predatory
    ruler, the phrase is difficult. Retaining 'knew' preserves the Hebrew wording
    and ambiguity without over-interpreting; the more specific hostile/sexual sense
    is preserved in a footnote as a lexical alternative.
- source_word: אַלְמְנוֹתָיו
  chosen: their widows
  alternatives:
  - his widows
  - their palaces
  lexicon: HALOT
  rationale: The consonantal text points to 'his widows,' but the immediate parallel
    with 'their cities' and the broader context of victims supports understanding
    the sense as the widows belonging to those he destroyed, hence 'their widows.'
    Some interpreters and versions read a different underlying sense such as 'palaces';
    this is preserved in a footnote because the Hebrew is notoriously difficult.
- source_word: וְעָרֵיהֶם הֶחֱרִיב
  chosen: and he laid waste their cities
  alternatives:
  - and he destroyed their cities
  lexicon: HALOT
  rationale: החריב means to devastate or lay waste. 'Laid waste' fits the poetic lament
    style and the imagery of ruin.
- source_word: וַתֵּשַׁם
  chosen: were desolated
  alternatives:
  - was made desolate
  - became desolate
  lexicon: HALOT
  rationale: The verb from שמם denotes becoming desolate or appalled. Because the
    subject is effectively the compound 'the land and its fullness,' English plural
    agreement ('were desolated') reads naturally while preserving the passive/resultative
    sense.
- source_word: אֶרֶץ וּמְלֹאָהּ
  chosen: the land and its fullness
  alternatives:
  - the land and all that filled it
  - the הארץ and everything in it
  lexicon: HALOT
  rationale: This idiom refers to the land together with all it contains. 'Its fullness'
    is slightly formal but transparent and preserves the compact Hebrew expression.
- source_word: מִקּוֹל שַׁאֲגָתוֹ
  chosen: by the sound of his roaring
  alternatives:
  - from the sound of his roaring
  - at the sound of his roaring
  lexicon: HALOT
  rationale: The preposition מן here marks cause or source. 'By the sound of his roaring'
    communicates the devastating effect of the lion's terrifying cry in context.
