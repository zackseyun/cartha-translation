theological_decisions:
- issue: Handling the difficult phrase אַלְמְנוֹתָיו in a metaphorical judgment oracle
  chosen_reading: Retain a translation tied to the MT sense of 'widows' while preserving
    ambiguity and noting the alternative 'palaces.'
  alternative_readings:
  - his widows
  - his palaces
  rationale: This is a lexical/text-critical difficulty rather than a doctrinal dispute.
    Following original-language primacy, the draft stays close to the Masoretic wording
    instead of replacing it with a smoother traditional conjecture, while documenting
    the alternatives in a footnote for transparency.
  doctrine_reference: Translation philosophy §§1, 3, 5
