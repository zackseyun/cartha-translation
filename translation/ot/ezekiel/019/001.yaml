id: EZK.19.1
reference: Ezekiel 19:1
source:
  edition: WLC
  text: וְ/אַתָּה֙ שָׂ֣א קִינָ֔ה אֶל נְשִׂיאֵ֖י יִשְׂרָאֵֽל־׃
translation:
  text: And you, raise a lamentation over the princes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take up a lament' or 'lift up a dirge.'
    reason: lexical_alternative
  - marker: b
    text: '''Princes'' may refer specifically to the royal rulers of Judah/Israel,
      not merely leaders in general.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: And you,
  alternatives:
  - And as for you,
  - Now you,
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a direct address with
    mild emphasis. 'And you,' preserves the discourse continuity and the emphatic
    shift to Ezekiel without sounding overly wooden.
- source_word: שָׂא
  chosen: raise
  alternatives:
  - take up
  - lift up
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry,' but in the idiom with קִינָה it
    means to begin or utter a dirge. 'Raise' is natural English that still reflects
    the underlying metaphor better than the more interpretive 'sing' or 'utter.'
- source_word: קִינָה
  chosen: lamentation
  alternatives:
  - lament
  - dirge
  lexicon: HALOT
  rationale: The noun denotes a funeral lament or dirge. 'Lamentation' preserves the
    formal, mournful tone and fits prophetic diction. 'Dirge' is possible but slightly
    narrower and more stylistically marked.
- source_word: אֶל
  chosen: over
  alternatives:
  - for
  - concerning
  - against
  lexicon: HALOT
  rationale: Although the preposition commonly means 'to/toward,' with lament language
    it can indicate the subject or object of mourning. 'Over' is idiomatic in English
    for lamenting someone and best conveys the sense here.
- source_word: נְשִׂיאֵי
  chosen: princes
  alternatives:
  - leaders
  - chiefs
  - rulers
  lexicon: HALOT
  rationale: The noun refers to elevated leaders or rulers. In this context of the
    Davidic royal house in Ezekiel 19, 'princes' preserves the political and dynastic
    nuance better than the broader 'leaders.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the proper name, in keeping with the translation
    philosophy to transliterate names rather than translate them.
