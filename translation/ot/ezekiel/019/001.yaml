theological_decisions:
- issue: Referent of 'princes of Israel'
  chosen_reading: Retain the broader dynastic-political term 'princes of Israel' in
    the main text.
  alternative_readings:
  - kings of Israel
  - leaders of Israel
  rationale: The Hebrew uses נְשִׂיאֵי, not the more specific term for 'kings.' Since
    the chapter develops a lament over royal figures, some interpret this specifically
    as kings or the royal house, but the translation should not narrow the term beyond
    the source text. 'Princes' preserves the ambiguity and political status without
    importing a more specific claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
