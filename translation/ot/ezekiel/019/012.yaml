id: EZK.19.12
reference: Ezekiel 19:12
source:
  edition: WLC
  text: וַ/תֻּתַּ֤שׁ בְּ/חֵמָה֙ לָ/אָ֣רֶץ הֻשְׁלָ֔כָה וְ/ר֥וּחַ הַ/קָּדִ֖ים הוֹבִ֣ישׁ
    פִּרְיָ֑/הּ הִתְפָּרְק֧וּ וְ/יָבֵ֛שׁוּ מַטֵּ֥ה עֻזָּ֖/הּ אֵ֥שׁ אֲכָלָֽתְ/הוּ׃
translation:
  text: But she was uprooted in wrath; she was thrown down to the ground. And the
    east wind dried up her fruit; her strong branch was torn off and withered; fire
    consumed it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her mighty scepter' or 'the rod of her strength'; the Hebrew term can
      carry both branch imagery and royal-rule overtones in this lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֻּתַּשׁ
  chosen: was uprooted
  alternatives:
  - was plucked up
  - was torn up
  lexicon: HALOT
  rationale: The passive of נתשׁ in vine imagery naturally conveys removal from the
    ground by the roots. 'Uprooted' is vivid, idiomatic English and fits the metaphor
    of the mother vine in the context.
- source_word: בְּחֵמָה
  chosen: in wrath
  alternatives:
  - in fury
  - with wrath
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'In wrath' preserves the compact Hebrew
    prepositional phrase and suits the judgment context.
- source_word: לָאָרֶץ הֻשְׁלָכָה
  chosen: was thrown down to the ground
  alternatives:
  - was cast to the earth
  - was hurled to the ground
  lexicon: HALOT
  rationale: The pair of prepositional phrase plus passive verb emphasizes violent
    abasement. 'Thrown down to the ground' captures both the motion and the humiliation
    in natural English.
- source_word: רוּחַ הַקָּדִים
  chosen: the east wind
  alternatives:
  - the wind from the east
  lexicon: HALOT
  rationale: This is the standard Hebrew expression for the destructive east wind.
    The definite form is preserved.
- source_word: הוֹבִישׁ פִּרְיָהּ
  chosen: dried up her fruit
  alternatives:
  - withered her fruit
  - made her fruit dry
  lexicon: HALOT
  rationale: 'The Hiphil of יבשׁ here is causative: the east wind causes the fruit
    to dry up. ''Dried up'' is idiomatic and keeps the agricultural image.'
- source_word: הִתְפָּרְקוּ
  chosen: was torn off
  alternatives:
  - were broken off
  - were snapped off
  lexicon: HALOT
  rationale: The verb conveys being broken apart or torn away. Because the following
    noun phrase is singular in English sense ('her strong branch'), English smoothness
    favors a singular rendering tied to the collective/poetic image, while retaining
    the violent separation.
- source_word: וְיָבֵשׁוּ
  chosen: and withered
  alternatives:
  - and dried up
  lexicon: HALOT
  rationale: Following the tearing off, the branch's condition is described as drying/withered.
    'Withered' avoids repetition with the earlier 'dried up her fruit' while preserving
    sense.
- source_word: מַטֵּה עֻזָּהּ
  chosen: her strong branch
  alternatives:
  - the rod of her strength
  - her mighty scepter
  - her strong stem
  lexicon: HALOT
  rationale: מַטֶּה can mean rod, staff, branch, or scepter depending on context.
    In this lament over a vine, the arboreal sense remains active, yet the phrase
    also alludes to royal power (cf. v. 11). 'Her strong branch' preserves the vine
    metaphor in the main text; the royal nuance is worth preserving in a footnote.
- source_word: אֵשׁ אֲכָלָתְהוּ
  chosen: fire consumed it
  alternatives:
  - fire devoured it
  - a fire consumed him/it
  lexicon: HALOT
  rationale: The feminine verb with masculine suffix reflects agreement with 'fire'
    as subject and the branch/rod as object. 'Consumed' is natural in judgment language
    and fits the metaphorical destruction.
