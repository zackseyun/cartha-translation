theological_decisions:
- issue: Metaphorical rendering of מַטֵּה עֻזָּהּ in a royal-vine lament
  chosen_reading: Render the phrase as 'her strong branch' in the main text while
    preserving the possible royal nuance ('scepter/rod of strength') in a footnote.
  alternative_readings:
  - her mighty scepter
  - the rod of her strength
  rationale: 'The immediate imagery is botanical: a vine uprooted, fruit dried, branch
    torn off. Yet the broader context (especially v. 11) uses vine imagery to speak
    of royal rule. Preserving the vine image in the main text best reflects the local
    syntax and metaphor, while a footnote documents the royal nuance without collapsing
    the poetic tension.'
  doctrine_reference: Translation philosophy §3, §5
