- issue: Rendering of אָדָם in a representative singular context
  chosen_reading: man
  alternative_readings:
  - human
  - people
  rationale: The Hebrew uses singular אָדָם. Following the doctrine's gender-accurate
    principle, the translation keeps 'man' rather than flattening to a gender-neutral
    plural, while preserving the broader human sense in a footnote.
