id: EZK.19.3
reference: Ezekiel 19:3
source:
  edition: WLC
  text: וַ/תַּ֛עַל אֶחָ֥ד מִ/גֻּרֶ֖י/הָ כְּפִ֣יר הָיָ֑ה וַ/יִּלְמַ֥ד לִ/טְרָף טֶ֖רֶף
    אָדָ֥ם אָכָֽל־׃
translation:
  text: She brought up one of her cubs; he became a young lion, and he learned to
    tear prey; he devoured man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''he devoured humans'' / ''he devoured people.'' Hebrew: ''man'' (אָדָם)
      in the singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַל
  chosen: She brought up
  alternatives:
  - She raised
  - She caused to come up
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/bring up.' In this maternal-animal
    context, 'brought up' naturally conveys rearing/raising a cub while still reflecting
    the underlying image more closely than a freer paraphrase.
- source_word: אֶחָד מִגֻּרֶיהָ
  chosen: one of her cubs
  alternatives:
  - one from her whelps
  - one of her young
  lexicon: HALOT
  rationale: גּוּר refers to a young animal, especially a lion cub in context. 'One
    of her cubs' is idiomatic modern English and preserves the partitive construction.
- source_word: כְּפִיר
  chosen: a young lion
  alternatives:
  - a lion
  - a lion cub
  lexicon: HALOT
  rationale: 'כְּפִיר commonly denotes a young lion, often one vigorous enough to
    hunt. ''Young lion'' best captures the stage implied here: no longer merely a
    cub, but not just a generic ''lion.'''
- source_word: הָיָה
  chosen: he became
  alternatives:
  - he was
  lexicon: HALOT
  rationale: Although היה can be rendered 'was,' in this developmental sequence 'became'
    better reflects the progression from cub to young lion.
- source_word: וַיִּלְמַד לִטְרָף טֶרֶף
  chosen: he learned to tear prey
  alternatives:
  - he learned to seize prey
  - he learned to prey on prey
  lexicon: HALOT
  rationale: The cognate verb+noun construction intensifies the predatory action.
    'Tear prey' preserves the violent hunting image more vividly than the flatter
    'catch prey.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  - a human
  lexicon: HALOT
  rationale: Here אָדָם is singular and refers to human beings as the object of devouring.
    Per the project's gender-accurate policy, 'man' is retained as the most direct
    rendering, while the broader sense 'human' is preserved as an alternative.
- source_word: אָכָל
  chosen: he devoured
  alternatives:
  - he ate
  - he consumed
  lexicon: HALOT
  rationale: '''Devoured'' fits the predatory context and communicates the force of
    the verb more naturally than the bare ''ate.'''
