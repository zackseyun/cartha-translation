theological_decisions:
- issue: Rendering of אָדָם in a predatory metaphor
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The verse is not making a doctrinal statement about anthropology but
    using vivid allegorical language. Following the project's gender-accurate principle
    and the contested-terms guidance for אָדָם ('man / humankind' context-dependent),
    'man' best matches the singular Hebrew and the force of the image, while the collective
    possibility is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4; Contested terms table
    for אָדָם'
