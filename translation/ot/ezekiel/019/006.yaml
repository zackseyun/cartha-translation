id: EZK.19.6
reference: Ezekiel 19:6
source:
  edition: WLC
  text: וַ/יִּתְהַלֵּ֥ךְ בְּ/תוֹךְ אֲרָי֖וֹת כְּפִ֣יר הָיָ֑ה וַ/יִּלְמַ֥ד לִ/טְרָף
    טֶ֖רֶף אָדָ֥ם אָכָֽל־־׃
translation:
  text: He prowled among the lions; he became a young lion. He learned to tear prey;
    he devoured man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he ate people' / 'he devoured humankind'; Hebrew 'man' can function
      collectively here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלֵּךְ
  chosen: prowled
  alternatives:
  - walked about
  - went about
  lexicon: HALOT
  rationale: The hitpael of הלך here conveys repeated movement within the lion metaphor,
    not a simple neutral 'walked.' 'Prowled' fits the predatory imagery and the poetic
    context better while remaining within the semantic range of moving about.
- source_word: בְּתוֹךְ אֲרָיוֹת
  chosen: among the lions
  alternatives:
  - in the midst of lions
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' 'Among the lions' is natural
    modern English and preserves the image of this figure moving within a pride or
    group of lions.
- source_word: כְּפִיר
  chosen: young lion
  alternatives:
  - lion cub
  - young male lion
  lexicon: HALOT
  rationale: כְּפִיר commonly denotes a vigorous young lion, not a tiny cub. 'Young
    lion' is the standard and best contextual rendering in prophetic poetry.
- source_word: הָיָה
  chosen: became
  alternatives:
  - was
  lexicon: HALOT
  rationale: 'Although היה can be stative (''was''), in this sequence it marks development
    within the allegory: he came to be a young lion. ''Became'' better reflects the
    progression.'
- source_word: וַיִּלְמַד
  chosen: learned
  alternatives:
  - was trained
  lexicon: HALOT
  rationale: The verb straightforwardly means 'learned.' The context implies acquiring
    predatory behavior, but the text does not specify an external trainer, so 'learned'
    is preferable to 'was trained.'
- source_word: לִטְרָף טֶרֶף
  chosen: to tear prey
  alternatives:
  - to seize prey
  - to prey on prey
  lexicon: HALOT
  rationale: The infinitive plus cognate accusative intensifies the predatory action.
    'To tear prey' preserves the violent lion imagery better than the more generic
    'seize prey.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: In this context the singular אָדָם functions as a collective/generic
    object of predation, but the imagery is concrete and masculine-singular in Hebrew.
    Per doctrine, gender-accurate rendering is preferred where it matches source intent;
    'man' preserves the starkness of the line, while a footnote notes the collective
    sense.
- source_word: אָכָל
  chosen: devoured
  alternatives:
  - ate
  - consumed
  lexicon: HALOT
  rationale: Within predatory animal imagery, 'devoured' is the most idiomatic and
    vivid English equivalent. 'Ate' is too flat for the poetic violence of the verse.
