id: EZK.19.13
reference: Ezekiel 19:13
source:
  edition: WLC
  text: וְ/עַתָּ֖ה שְׁתוּלָ֣ה בַ/מִּדְבָּ֑ר בְּ/אֶ֖רֶץ צִיָּ֥ה וְ/צָמָֽא׃
translation:
  text: And now she is planted in the wilderness, in a dry and thirsty land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "transplanted in the wilderness." The Hebrew participle can be understood
      in context as implying removal and replanting, though the form itself more directly
      means "planted."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks a transition from the previous
    description to the present state. 'And now' preserves the discourse flow better
    than simply 'Now.'
- source_word: שְׁתוּלָה
  chosen: is planted
  alternatives:
  - is transplanted
  - has been planted
  lexicon: HALOT
  rationale: The passive participle describes the lioness/vine figure as set in a
    new location. 'Is planted' is the most natural English rendering and preserves
    the metaphor. 'Transplanted' is possible in context because the image implies
    removal and replanting, but the Hebrew form itself states the planted condition
    rather than explicitly the transfer.
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness or steppe rather than only sandy desert.
    'Wilderness' better matches common biblical usage and preserves the desolate-exile
    imagery.
- source_word: בְּאֶרֶץ
  chosen: in a land
  alternatives:
  - in the land
  - in a country
  lexicon: HALOT
  rationale: The preposition with אֶרֶץ introduces a further description of location.
    Because the noun lacks the article and is qualified by following descriptors,
    'in a land' is the most straightforward English rendering.
- source_word: צִיָּה
  chosen: dry
  alternatives:
  - parched
  - arid
  lexicon: HALOT
  rationale: צִיָּה denotes dryness, drought, or parched conditions. 'Dry' is clear
    modern English and works smoothly in the paired expression with 'thirsty.'
- source_word: וְצָמָא
  chosen: and thirsty
  alternatives:
  - and parched
  - of thirst
  lexicon: HALOT
  rationale: The conjunction joins a second descriptor of the land. Although the noun
    can denote thirst, in English the adjectival rendering 'thirsty' naturally conveys
    a land marked by lack of water, echoing the Hebrew compactly.
