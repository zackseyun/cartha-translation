id: EZK.19.2
reference: Ezekiel 19:2
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֗ מָ֤ה אִמְּ/ךָ֙ לְבִיָּ֔א בֵּ֥ין אֲרָי֖וֹת רָבָ֑צָה בְּ/ת֥וֹךְ
    כְּפִרִ֖ים רִבְּתָ֥ה גוּרֶֽי/הָ׃
translation:
  text: and say, ‘What was your mother? A lioness. Among lions she lay down; in the
    midst of young lions she reared her cubs.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Among lionesses she lay down.' The Hebrew plural can be understood more
      generally as 'lions,' but some translators render it by sense to match the feminine
      imagery of 'lioness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she raised' or 'she made many' her cubs. The Hebrew verb can carry the
      idea of increase, but in this context it likely refers to rearing offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What was
  alternatives:
  - What
  - How
  lexicon: HALOT
  rationale: Here מָה introduces a rhetorical exclamation/question about the identity
    or character of the mother in the lament. 'What was your mother?' preserves the
    Hebrew interrogative force better than smoothing to 'Your mother was like...'
    while remaining intelligible in English.
- source_word: אִמְּךָ
  chosen: your mother
  lexicon: HALOT
  rationale: Direct second-person singular suffix retained. The lament addresses the
    prince/house represented by 'you,' so 'your mother' should remain explicit.
- source_word: לְבִיָּא
  chosen: a lioness
  alternatives:
  - lion
  lexicon: HALOT
  rationale: The noun is specifically feminine, so 'lioness' is required for gender
    accuracy and fits the maternal imagery of the verse.
- source_word: בֵּין אֲרָיוֹת
  chosen: Among lions
  alternatives:
  - Among lionesses
  lexicon: HALOT
  rationale: Although the mother is a lioness, אֲרָיוֹת here is the common plural
    'lions.' 'Among lions' is the most straightforward rendering. 'Among lionesses'
    is possible by sense in context, but less textually transparent.
- source_word: רָבָצָה
  chosen: she lay down
  alternatives:
  - she crouched
  - she rested
  lexicon: HALOT
  rationale: The verb commonly denotes lying down or crouching, especially of animals.
    'She lay down' is natural English and preserves the image without overinterpreting
    posture or mood.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: HALOT
  rationale: A slightly more formal rendering suits the poetic lament and preserves
    the spatial imagery. It also avoids flattening the parallelism with the previous
    phrase.
- source_word: כְּפִרִים
  chosen: young lions
  alternatives:
  - lion cubs
  lexicon: HALOT
  rationale: כְּפִיר commonly refers to young lions, often vigorous young predators
    rather than nursing cubs. 'Young lions' best fits the social setting in parallel
    with 'lions.'
- source_word: רִבְּתָה
  chosen: she reared
  alternatives:
  - she raised
  - she multiplied
  - she made many
  lexicon: HALOT
  rationale: With גוּרֶיהָ ('her cubs') as object, the verb is best understood in
    the sense of bringing up or rearing rather than numerical multiplication alone.
    'She reared' fits the maternal context and the poetic image.
- source_word: גוּרֶיהָ
  chosen: her cubs
  alternatives:
  - her whelps
  lexicon: HALOT
  rationale: The noun denotes the young of a lion. 'Cubs' is clear modern English;
    'whelps' is accurate but archaic and less readable.
