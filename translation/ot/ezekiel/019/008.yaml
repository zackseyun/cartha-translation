id: EZK.19.8
reference: Ezekiel 19:8
source:
  edition: WLC
  text: וַ/יִּתְּנ֨וּ עָלָ֥י/ו גּוֹיִ֛ם סָבִ֖יב מִ/מְּדִינ֑וֹת וַֽ/יִּפְרְשׂ֥וּ עָלָ֛י/ו
    רִשְׁתָּ֖/ם בְּ/שַׁחְתָּ֥/ם נִתְפָּֽשׂ׃
translation:
  text: Then nations from the provinces set themselves against him all around, and
    they spread their net over him; he was caught in their pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came against him all around from the provinces.' The Hebrew idiom can
      be rendered more literally as 'set against him.'
    reason: lexical_alternative
  - marker: b
    text: '''Pit'' likely refers to a trap-pit used in hunting.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְּנוּ עָלָיו
  chosen: set themselves against him
  alternatives:
  - came against him
  - set against him
  - directed themselves against him
  lexicon: HALOT
  rationale: The idiom נתן על can mean to set oneself against or direct action against
    someone. In this hunting/judgment context, 'set themselves against him' conveys
    hostile coordinated action more naturally than a wooden 'gave against him.'
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' 'Gentiles' would import an Israel/Gentile
    contrast not foregrounded here; the referent is foreign national powers.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - from every side
  lexicon: HALOT
  rationale: This adverb emphasizes encirclement. 'All around' is idiomatic modern
    English and preserves the image of surrounding the prey.
- source_word: מִמְּדִינוֹת
  chosen: from the provinces
  alternatives:
  - from the regions
  - from the states
  - from the countries
  lexicon: HALOT
  rationale: מְדִינוֹת often refers to administrative districts or provinces rather
    than sovereign nations. 'From the provinces' fits the imperial-political setting
    and explains how the nations come from surrounding jurisdictions.
- source_word: וַיִּפְרְשׂוּ עָלָיו רִשְׁתָּם
  chosen: they spread their net over him
  alternatives:
  - they spread their snare over him
  - they cast their net over him
  lexicon: HALOT
  rationale: The verb פרשׂ means to spread out. 'Net' is the straightforward rendering
    of רֶשֶׁת here and maintains the lion-hunt metaphor.
- source_word: בְּשַׁחְתָּם
  chosen: in their pit
  alternatives:
  - in their trap-pit
  - in their ditch
  lexicon: HALOT
  rationale: שַׁחַת can denote a pit, often a pit used as a trap. 'Pit' is concise
    and natural; the trapping nuance is already supported by the surrounding net imagery.
- source_word: נִתְפָּשׂ
  chosen: he was caught
  alternatives:
  - he was captured
  - he was seized
  lexicon: HALOT
  rationale: The passive form means to be caught or captured. 'Caught' best matches
    the hunting metaphor and keeps the sentence vivid.
