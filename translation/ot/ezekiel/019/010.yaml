id: EZK.19.10
reference: Ezekiel 19:10
source:
  edition: WLC
  text: אִמְּ/ךָ֥ כַ/גֶּ֛פֶן בְּ/דָמְ/ךָ֖ עַל מַ֣יִם שְׁתוּלָ֑ה פֹּֽרִיָּה֙ וַֽ/עֲנֵפָ֔ה
    הָיְתָ֖ה מִ/מַּ֥יִם רַבִּֽים־׃
translation:
  text: Your mother was like a vine in your blood, planted by waters; she was fruitful
    and full of branches because of abundant waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'in your blood,' a difficult phrase. Some interpret or emend it as
      'in your likeness' or 'in your vineyard.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִמְּךָ
  chosen: your mother
  alternatives:
  - your mother-city
  lexicon: HALOT
  rationale: Literal possessive noun. In context the mother is a poetic figure for
    the royal house/nation, but the text itself says 'your mother,' so the metaphor
    is preserved rather than interpreted in the main text.
- source_word: כַגֶּפֶן
  chosen: like a vine
  alternatives:
  - as a vine
  lexicon: HALOT
  rationale: כ marks comparison; גפן is the common word for vine/grapevine. 'Like
    a vine' is natural modern English and preserves the simile.
- source_word: בְּדָמְךָ
  chosen: in your blood
  alternatives:
  - in your likeness
  - in your vineyard
  lexicon: HALOT
  rationale: The consonantal text most naturally reads 'in your blood,' and this difficult
    reading is retained in the main text out of fidelity to the Hebrew. Because the
    phrase is obscure and several ancient/modern alternatives have been proposed,
    those are preserved in a footnote rather than smoothing the text.
- source_word: עַל מַיִם
  chosen: by waters
  alternatives:
  - by water
  - beside waters
  lexicon: HALOT
  rationale: The preposition with מים in this imagery suggests location near a water
    source. 'By waters' keeps the plural and the poetic feel.
- source_word: שְׁתוּלָה
  chosen: planted
  alternatives:
  - transplanted
  lexicon: HALOT
  rationale: Passive participial/adjectival form from שתל, 'plant.' 'Planted' is the
    straightforward rendering; 'transplanted' is possible in some contexts but not
    required here.
- source_word: פֹּרִיָּה
  chosen: fruitful
  alternatives:
  - bearing fruit
  lexicon: HALOT
  rationale: Adjectival form meaning fruitful/productive. 'Fruitful' is concise and
    idiomatic.
- source_word: וַעֲנֵפָה
  chosen: full of branches
  alternatives:
  - branchy
  - having branches
  lexicon: HALOT
  rationale: From ענף, relating to branches/boughs. Since English lacks a natural
    adjective equivalent, 'full of branches' communicates the sense clearly.
- source_word: הָיְתָה
  chosen: she was
  alternatives:
  - it was
  lexicon: HALOT
  rationale: The subject is grammatically feminine singular, matching the feminine
    imagery of mother/vine. 'She was' preserves the personified metaphor.
- source_word: מִמַּיִם רַבִּים
  chosen: because of abundant waters
  alternatives:
  - from many waters
  lexicon: HALOT
  rationale: 'מן here is best taken causally/source-related in the poetic image: the
    vine''s fruitfulness and branching result from plentiful water. ''Abundant waters''
    is more idiomatic than ''many waters'' in this clause while preserving the sense.'
