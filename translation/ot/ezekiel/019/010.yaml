theological_decisions:
- issue: Handling the obscure phrase בְּדָמְךָ
  chosen_reading: Retain the MT-like rendering 'in your blood' in the main text and
    preserve alternatives in a footnote.
  alternative_readings:
  - in your likeness
  - in your vineyard
  rationale: This is primarily a textual/lexical difficulty, not a doctrinal one.
    Following the translation philosophy of original-language primacy and preserving
    tension rather than resolving ambiguity, the difficult Hebrew is kept in the main
    text instead of being emended silently.
  doctrine_reference: Translation philosophy §§1, 3
