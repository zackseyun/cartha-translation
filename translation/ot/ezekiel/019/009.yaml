id: EZK.19.9
reference: Ezekiel 19:9
source:
  edition: WLC
  text: וַֽ/יִּתְּנֻ֤/הוּ בַ/סּוּגַר֙ בַּֽ/חַחִ֔ים וַ/יְבִאֻ֖/הוּ אֶל מֶ֣לֶךְ בָּבֶ֑ל
    יְבִאֻ֨/הוּ֙ בַּ/מְּצֹד֔וֹת לְמַ֗עַן לֹא יִשָּׁמַ֥ע קוֹל֛/וֹ ע֖וֹד אֶל הָרֵ֥י
    יִשְׂרָאֵֽל־־־׃פ
translation:
  text: They put him in a cage with hooks, and brought him to the king of Babylon;
    they brought him into strongholds, so that his voice might no longer be heard
    on the mountains of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into fortresses,' 'into a prison,' or possibly 'into siege works'; the
      Hebrew term can denote strongholds or places associated with capture/confinement.
    reason: lexical_alternative
  - marker: b
    text: Or 'his roar might no longer be heard.' The Hebrew literally says 'his voice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֻהוּ
  chosen: They put him
  alternatives:
  - They placed him
  - They set him
  lexicon: HALOT
  rationale: Common verb נתן in the waw-consecutive narrative sequence; 'put' is the
    most natural modern English rendering in this context of confinement.
- source_word: בַסּוּגַר
  chosen: in a cage
  alternatives:
  - in prison
  - in confinement
  lexicon: HALOT
  rationale: סוּגַר denotes an enclosure or cage in this animal-hunt metaphor. 'Cage'
    preserves the leonine imagery of the lament better than the more abstract 'prison.'
- source_word: בַּחַחִים
  chosen: with hooks
  alternatives:
  - with rings
  - with hooks in the jaws
  - with fetters
  lexicon: HALOT
  rationale: חַחִים refers to hooks/rings used to control captured animals or prisoners.
    'With hooks' is concise and literal; the more specific placement 'in the jaws/nose'
    is not explicit here and is better left unstated.
- source_word: וַיְבִאֻהוּ אֶל מֶלֶךְ בָּבֶל
  chosen: and brought him to the king of Babylon
  alternatives:
  - and led him to the king of Babylon
  lexicon: HALOT
  rationale: בוא in Hiphil commonly means 'bring.' 'King of Babylon' is a straightforward
    genitival rendering.
- source_word: יְבִאֻהוּ בַּמְּצֹדוֹת
  chosen: they brought him into strongholds
  alternatives:
  - they brought him into fortresses
  - they brought him into a prison
  - they brought him into siege works
  lexicon: HALOT
  rationale: מְצֹדוֹת can denote strongholds/fortresses or places of capture. In context
    after capture and transport, it likely refers to secure confinement. 'Strongholds'
    preserves the lexical sense without over-specifying a prison term not directly
    used.
- source_word: לְמַעַן לֹא יִשָּׁמַע קוֹלוֹ עוֹד
  chosen: so that his voice might no longer be heard
  alternatives:
  - so that his roar might no longer be heard
  - so that his sound might no longer be heard
  lexicon: HALOT
  rationale: קוֹל literally means 'voice/sound.' Because the subject is metaphorically
    a lion representing Judah's ruler, 'voice' keeps the human referent in view while
    preserving the metaphor. 'Roar' is contextually attractive but interpretively
    narrows the image.
- source_word: אֶל הָרֵי יִשְׂרָאֵל
  chosen: on the mountains of Israel
  alternatives:
  - upon the mountains of Israel
  - in the hill country of Israel
  lexicon: HALOT
  rationale: הרי ישראל is a common Ezekiel expression for the mountainous land of
    Israel. 'On the mountains of Israel' is idiomatic and sufficiently literal.
