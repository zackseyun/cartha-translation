theological_decisions:
- issue: Metaphorical register of the captured lion/prince
  chosen_reading: Retain imagery of capture and suppression without explicitly identifying
    the historical king in the translation.
  alternative_readings:
  - Interpret the verse explicitly as referring to Jehoiachin or another Judean ruler
    in the main text
  rationale: The lament uses lion imagery for Judah's rulers. The translation should
    preserve the metaphor and not import a specific historical identification into
    the text itself, since the Hebrew does not name the ruler here.
  doctrine_reference: Translation philosophy §§1, 3
