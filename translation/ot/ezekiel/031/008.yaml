theological_decisions:
- issue: Meaning of 'the garden of God'
  chosen_reading: Rendered literally as 'the garden of God' without specifying Eden
    in the main text.
  alternative_readings:
  - Eden
  - God's paradise
  rationale: The phrase strongly evokes Eden, but the Hebrew text here says 'the garden
    of God.' Preserving the literal wording maintains the prophetic imagery without
    importing a more specific identification into the translation itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
