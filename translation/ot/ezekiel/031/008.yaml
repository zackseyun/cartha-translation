id: EZK.31.8
reference: Ezekiel 31:8
source:
  edition: WLC
  text: אֲרָזִ֣ים לֹֽא עֲמָמֻ/הוּ֮ בְּ/גַן אֱלֹהִים֒ בְּרוֹשִׁ֗ים לֹ֤א דָמוּ֙ אֶל
    סְעַפֹּתָ֔י/ו וְ/עַרְמֹנִ֥ים לֹֽא הָי֖וּ כְּ/פֹֽארֹתָ֑י/ו כָּל עֵץ֙ בְּ/גַן אֱלֹהִ֔ים
    לֹא דָמָ֥ה אֵלָ֖י/ו בְּ/יָפְיֽ/וֹ־־־־־־־׃
translation:
  text: Cedars did not overshadow it in the garden of God; cypresses did not compare
    with its boughs, and plane trees were not like its branches. No tree in the garden
    of God compared with it in its beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in God's garden.' The Hebrew reads literally 'in the garden of God,'
      an expression that evokes Eden.
    reason: lexical_alternative
  - marker: b
    text: '''Plane trees'' is the likely sense; traditional translations often read
      ''chestnut trees.'''
    reason: alternative_reading
lexical_decisions:
- source_word: אֲרָזִים
  chosen: Cedars
  alternatives:
  - cedar trees
  lexicon: HALOT
  rationale: Standard rendering of the plural of אֶרֶז. The simple 'Cedars' fits the
    poetic comparison and parallels the following tree names.
- source_word: עֲמָמֻהוּ
  chosen: did not overshadow it
  alternatives:
  - did not hide it
  - did not darken it
  - did not rival it
  lexicon: HALOT
  rationale: The verb from עמם commonly carries the sense of becoming dark or obscured.
    In this arboreal context, 'overshadow' best captures the image of one tree's canopy
    not eclipsing the Assyrian cedar, while preserving the concrete metaphor better
    than the more abstract 'rival.'
- source_word: בְּגַן אֱלֹהִים
  chosen: in the garden of God
  alternatives:
  - in God's garden
  lexicon: HALOT
  rationale: A formally transparent rendering that preserves the elevated, Eden-like
    imagery of the phrase without overinterpreting it.
- source_word: בְּרוֹשִׁים
  chosen: cypresses
  alternatives:
  - fir trees
  - junipers
  lexicon: HALOT
  rationale: The precise species is debated, but 'cypresses' is a common modern rendering
    for בְּרוֹשִׁים and works well in a list of majestic trees. The uncertainty is
    lexical rather than theological.
- source_word: דָמוּ
  chosen: did not compare with
  alternatives:
  - were not like
  - did not resemble
  lexicon: HALOT
  rationale: From דמה, here expressing comparison. 'Did not compare with' gives idiomatic
    English while preserving the sense that these trees fell short in likeness or
    equivalence.
- source_word: סְעַפֹּתָיו
  chosen: its boughs
  alternatives:
  - its branches
  - its limbs
  lexicon: HALOT
  rationale: This term refers to larger branching structures. 'Boughs' preserves the
    distinction from the later פֹארֹתָיו, which can then be rendered with a different
    English term.
- source_word: עַרְמֹנִים
  chosen: plane trees
  alternatives:
  - chestnut trees
  lexicon: HALOT
  rationale: Modern scholarship generally favors 'plane trees' over the traditional
    'chestnut trees.' This follows original-language primacy over translation tradition.
- source_word: פֹארֹתָיו
  chosen: its branches
  alternatives:
  - its foliage
  - its shoots
  lexicon: HALOT
  rationale: The noun denotes branches or leafy growth. 'Branches' is natural English
    and provides a slight lexical distinction from 'boughs' for סְעַפֹּתָיו.
- source_word: כָּל עֵץ
  chosen: No tree
  alternatives:
  - Every tree ... not
  - Not any tree
  lexicon: HALOT
  rationale: English idiom requires restructuring the Hebrew negative comparison.
    'No tree' accurately conveys the universal negation.
- source_word: דָמָה אֵלָיו
  chosen: compared with it
  alternatives:
  - was like it
  - resembled it
  lexicon: HALOT
  rationale: Maintains consistency with the earlier use of דמה while producing smooth
    English in the climactic summary line.
- source_word: בְּיָפְיוֹ
  chosen: in its beauty
  alternatives:
  - in beauty
  - for its beauty
  lexicon: HALOT
  rationale: The beth is best retained as 'in,' expressing the sphere or respect in
    which no tree matched it.
