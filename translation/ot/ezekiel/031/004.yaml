theological_decisions:
- issue: Pronoun/reference alignment in a mixed metaphor
  chosen_reading: Use impersonal 'it/its' throughout for the tree and the deep's water
    system
  alternative_readings:
  - Use 'him/his' for the tree as representing Assyria/Pharaoh
  - Use 'she/her' following feminine grammatical forms tied to 'the deep'
  rationale: The verse operates within an extended arboreal metaphor for a nation/kingdom.
    English 'it' best preserves the immediate image of the tree and avoids prematurely
    collapsing the metaphor into the political referent. Feminine suffixes in Hebrew
    are grammatical and need not be mirrored in English.
  doctrine_reference: Translation philosophy §1, §3, §6
