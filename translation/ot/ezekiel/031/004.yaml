id: EZK.31.4
reference: Ezekiel 31:4
source:
  edition: WLC
  text: מַ֣יִם גִּדְּל֔וּ/הוּ תְּה֖וֹם רֹֽמְמָ֑תְ/הוּ אֶת נַהֲרֹתֶ֗י/הָ הֹלֵךְ֙ סְבִיב֣וֹת
    מַטָּעָ֔/הּ וְ/אֶת תְּעָלֹתֶ֣י/הָ שִׁלְחָ֔ה אֶ֖ל כָּל עֲצֵ֥י הַ/שָּׂדֶֽה־־־׃
translation:
  text: Waters made it grow; the deep made it rise high. Its rivers flowed all around
    its planting place, and it sent out its channels to all the trees of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Its streams went around its planting place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the deep exalted it' or 'made it tall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם
  chosen: Waters
  alternatives:
  - Water
  lexicon: HALOT
  rationale: Hebrew plural form commonly functions as a mass noun. English plural
    'waters' preserves the elevated, poetic register and matches the imagery of abundant
    water sources.
- source_word: גִּדְּלוּהוּ
  chosen: made it grow
  alternatives:
  - raised it
  - made him great
  lexicon: HALOT
  rationale: From גדל, causative sense with 3ms suffix referring to the tree/corresponding
    empire symbol. 'Made it grow' fits the arboreal metaphor better than the more
    abstract 'made it great.'
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the deep waters
  - the abyss
  lexicon: HALOT
  rationale: '''The deep'' is the standard concise rendering for the subterranean
    or primeval deep and suits the context of abundant waters nourishing the tree.'
- source_word: רֹמְמָתְהוּ
  chosen: made it rise high
  alternatives:
  - exalted it
  - made it tall
  lexicon: HALOT
  rationale: From רום in a causative sense. 'Made it rise high' preserves both height
    imagery and the elevated style, while staying within the tree metaphor.
- source_word: נַהֲרֹתֶיהָ
  chosen: Its rivers
  alternatives:
  - its streams
  lexicon: HALOT
  rationale: Although the suffix is feminine, it refers back to תְּהוֹם ('the deep').
    'Rivers' is the more direct gloss for נהרות and conveys substantial watercourses
    proceeding from the deep.
- source_word: הֹלֵךְ
  chosen: flowed
  alternatives:
  - went
  - ran
  lexicon: HALOT
  rationale: Literally 'going,' but with rivers as subject the idiomatic English equivalent
    is 'flowed.' This is an optimal-equivalence adjustment for natural English.
- source_word: סְבִיבוֹת
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: The plural adverbial form intensifies the surrounding motion/location.
    'All around' captures the distributive sense naturally.
- source_word: מַטָּעָהּ
  chosen: its planting place
  alternatives:
  - its plantation
  - its planted ground
  lexicon: HALOT
  rationale: The noun denotes a planting or planted area. 'Planting place' is clear
    modern English and preserves the agricultural image without sounding overly technical.
- source_word: תְּעָלֹתֶיהָ
  chosen: its channels
  alternatives:
  - its canals
  - its conduits
  lexicon: HALOT
  rationale: The term refers to watercourses or irrigation channels branching out.
    'Channels' is broad enough to fit both natural and cultivated imagery in the metaphor.
- source_word: שִׁלְחָה
  chosen: it sent out
  alternatives:
  - it sent forth
  - she sent
  lexicon: HALOT
  rationale: From שלח, here of extending or sending out watercourses. English uses
    impersonal 'it' because the referent in context is the deep/its water system within
    the tree metaphor.
- source_word: אֶל כָּל עֲצֵי הַשָּׂדֶה
  chosen: to all the trees of the field
  alternatives:
  - to every tree of the field
  - to all the trees in the countryside
  lexicon: HALOT
  rationale: A straightforward rendering preserving the collective image of the other
    trees affected by these waters. 'Of the field' keeps the biblical landscape idiom.
