id: EZK.31.7
reference: Ezekiel 31:7
source:
  edition: WLC
  text: וַ/יְּיִ֣ף בְּ/גָדְל֔/וֹ בְּ/אֹ֖רֶךְ דָּֽלִיּוֹתָ֑י/ו כִּֽי הָיָ֥ה שָׁרְשׁ֖/וֹ
    אֶל מַ֥יִם רַבִּֽים־־׃
translation:
  text: So it was beautiful in its greatness, in the length of its branches, because
    its root was by abundant waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "many waters."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְּיִף
  chosen: it was beautiful
  alternatives:
  - it became beautiful
  - it was fair
  lexicon: HALOT
  rationale: From יפה in the Qal wayyiqtol, describing the tree's beauty/pleasant
    appearance. 'It was beautiful' is natural English and fits the descriptive context
    better than the more archaic 'fair.' 'Became beautiful' is possible aspectually,
    but the verse functions as a description of its state.
- source_word: בְּגָדְלוֹ
  chosen: in its greatness
  alternatives:
  - because of its greatness
  - in its size
  lexicon: HALOT
  rationale: גדל denotes greatness/magnitude. The prefixed ב is taken in a descriptive
    sense ('in'), linking beauty with the tree's great stature. 'Size' is possible
    but flatter and less elevated than the context warrants.
- source_word: בְּאֹרֶךְ
  chosen: in the length of
  alternatives:
  - with the length of
  - because of the length of
  lexicon: HALOT
  rationale: אֹרֶךְ means length. Repeating 'in' mirrors the Hebrew structure and
    keeps the parallelism with 'in its greatness.'
- source_word: דָּלִיּוֹתָיו
  chosen: its branches
  alternatives:
  - its boughs
  lexicon: HALOT
  rationale: The noun refers to hanging branches/boughs. 'Branches' is clearer in
    modern English; 'boughs' is a viable but more literary alternative.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the tree's beauty and grandeur. 'Because' is
    clearer in contemporary English than 'for' while preserving the causal force.
- source_word: הָיָה שָׁרְשׁוֹ אֶל
  chosen: its root was by
  alternatives:
  - its root was toward
  - its root reached to
  lexicon: HALOT
  rationale: The phrase literally has 'its root was to/toward.' In context, with waters
    as the sustaining source, English idiom favors 'was by,' expressing proximity
    and access without overinterpreting as active extension.
- source_word: מַיִם רַבִּים
  chosen: abundant waters
  alternatives:
  - many waters
  - great waters
  lexicon: HALOT
  rationale: The phrase can be rendered literally 'many waters,' but in English that
    can sound awkward here. 'Abundant waters' conveys plentiful water supply, which
    is the point of the metaphor. The more literal alternative is preserved in a footnote.
