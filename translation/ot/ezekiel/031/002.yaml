id: EZK.31.2
reference: Ezekiel 31:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם אֱמֹ֛ר אֶל פַּרְעֹ֥ה מֶֽלֶךְ מִצְרַ֖יִם וְ/אֶל הֲמוֹנ֑/וֹ אֶל
    מִ֖י דָּמִ֥יתָ בְ/גָדְלֶֽ/ךָ־־־־־׃
translation:
  text: 'Son of man, say to Pharaoh king of Egypt and to his multitude: Whom are you
    like in your greatness?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his hordes' or 'to his throng'; the Hebrew can denote the mass of
      people, forces, or retinue associated with Pharaoh.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A relatively formal rendering
    preserves the idiom and its recurring literary force in the book better than a
    more interpretive alternative such as 'mortal.' 'אָדָם' here is singular and generic,
    fitting 'man' per the project's gender-accurate policy.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - speak
  lexicon: HALOT
  rationale: Imperative of אמר. 'Say' is the most natural and direct English equivalent
    in prophetic speech formulas.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name, consistent
    with common biblical usage.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: king of Egypt
  lexicon: HALOT
  rationale: Straightforward construct relationship; formal rendering is clear and
    idiomatic.
- source_word: הֲמוֹנוֹ
  chosen: his multitude
  alternatives:
  - his hordes
  - his wealth
  - his throng
  lexicon: HALOT
  rationale: הָמוֹן commonly denotes a multitude, crowd, abundance, or tumultuous
    mass. In this address to Pharaoh, it most naturally refers to the mass of people
    or forces associated with him. 'His multitude' preserves the breadth of the Hebrew
    without over-specifying military or economic nuance.
- source_word: אֶל מִי
  chosen: Whom
  alternatives:
  - To whom
  lexicon: HALOT
  rationale: In English, the comparison introduced by דמה is most idiomatically rendered
    'Whom are you like?' rather than the more wooden 'To whom are you likened?'
- source_word: דָּמִיתָ
  chosen: are you like
  alternatives:
  - have you compared yourself
  - do you resemble
  lexicon: HALOT
  rationale: The verb דמה in this context expresses resemblance/comparison. 'Are you
    like' is idiomatic and fits the rhetorical question addressed directly to Pharaoh.
- source_word: בְגָדְלְךָ
  chosen: in your greatness
  alternatives:
  - in your grandeur
  - in your greatness of stature
  lexicon: HALOT
  rationale: The preposition ב plus noun גדל can indicate the sphere or respect in
    which the comparison is made. 'In your greatness' preserves the Hebrew structure
    and leaves open whether the greatness is political, imperial, or majestic.
