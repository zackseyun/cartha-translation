id: EZK.31.12
reference: Ezekiel 31:12
source:
  edition: WLC
  text: וַ/יִּכְרְתֻ֧/הוּ זָרִ֛ים עָרִיצֵ֥י גוֹיִ֖ם וַֽ/יִּטְּשֻׁ֑/הוּ אֶל הֶ֠/הָרִים
    וּ/בְ/כָל גֵּ֨אָי֜וֹת נָפְל֣וּ דָלִיּוֹתָ֗י/ו וַ/תִּשָּׁבַ֤רְנָה פֹֽארֹתָי/ו֙
    בְּ/כֹל֙ אֲפִיקֵ֣י הָ/אָ֔רֶץ וַ/יֵּרְד֧וּ מִ/צִּלּ֛/וֹ כָּל עַמֵּ֥י הָ/אָ֖רֶץ
    וַֽ/יִּטְּשֻֽׁ/הוּ־־־׃
translation:
  text: Foreigners, the most ruthless of the nations, cut it down and left it. Its
    branches fell on the mountains and in every valley, and its boughs were broken
    in all the channels of the land. Then all the peoples of the earth went down from
    its shade and left it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abandoned it' for the repeated verb 'left it' (וַיִּטְּשֻׁהוּ) in both
      clauses.
    reason: lexical_alternative
  - marker: b
    text: '''Channels of the land'' may also be rendered ''watercourses of the land''
      or ''ravines of the earth.'''
    reason: lexical_alternative
  - marker: c
    text: The fallen tree represents Assyria and its ruler in the larger metaphor
      of the chapter; English 'it' preserves the tree image, though 'him' is possible
      if the political referent is foregrounded.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרְתֻהוּ
  chosen: cut it down
  alternatives:
  - felled it
  - cut him down
  lexicon: HALOT
  rationale: כרת in this arboreal metaphor naturally means cutting down/felling a
    tree. The object suffix is masculine singular, referring to the Assyrian-as-cedar
    image; English 'it' preserves the tree metaphor in context.
- source_word: זָרִים
  chosen: Foreigners
  alternatives:
  - strangers
  - aliens
  lexicon: HALOT
  rationale: זרים commonly denotes foreigners/strangers. 'Foreigners' is the most
    natural modern English in a national/military context.
- source_word: עָרִיצֵי גוֹיִם
  chosen: the most ruthless of the nations
  alternatives:
  - the tyrants of the nations
  - the violent ones of the nations
  lexicon: HALOT
  rationale: עָרִיץ carries the sense of ruthless, violent, or tyrannical. The construct
    with גוים identifies them as drawn from the nations. 'The most ruthless of the
    nations' is idiomatic and preserves the superlative-like force often conveyed
    in context.
- source_word: וַיִּטְּשֻׁהוּ
  chosen: left it
  alternatives:
  - abandoned it
  - cast it away
  lexicon: HALOT
  rationale: נטש means leave, abandon, forsake. Here after cutting down the tree,
    'left it' fits the sequence and keeps the repeated verb consistent later in the
    verse.
- source_word: אֶל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - to the mountains
  - upon the mountains
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with נפל and the image of branches landing,
    English 'on the mountains' better expresses resultant location.
- source_word: גֵּאָיוֹת
  chosen: valley
  alternatives:
  - ravines
  - gorges
  lexicon: HALOT
  rationale: The term denotes valleys or low-lying hollows. 'Valley' is the broadest
    clear English choice; the plural is represented by 'every valley' with כל.
- source_word: דָלִיּוֹתָיו
  chosen: branches
  alternatives:
  - boughs
  - shoots
  lexicon: HALOT
  rationale: This term refers to hanging branches or boughs. 'Branches' is clear modern
    English and pairs well with the following more elevated term rendered 'boughs'
    to preserve some lexical distinction.
- source_word: פֹארֹתָיו
  chosen: boughs
  alternatives:
  - branches
  - limbs
  lexicon: HALOT
  rationale: A term for leafy boughs/large branches. Rendering it as 'boughs' preserves
    a distinction from דליותיו without becoming obscure.
- source_word: אֲפִיקֵי הָאָרֶץ
  chosen: the channels of the land
  alternatives:
  - the ravines of the earth
  - the watercourses of the land
  lexicon: HALOT
  rationale: אפיקים often denotes channels, streambeds, or watercourses. 'Channels
    of the land' is literal enough while remaining readable; 'land' is preferable
    here to 'earth' because the image is topographical.
- source_word: וַיֵּרְדוּ מִצִּלּוֹ
  chosen: went down from its shade
  alternatives:
  - came down from its shadow
  - departed from under its shade
  lexicon: HALOT
  rationale: ירד is 'go down/descend.' In context of peoples formerly sheltered by
    the great tree, 'went down from its shade' preserves the spatial metaphor and
    the loss of protection.
- source_word: כָּל עַמֵּי הָאָרֶץ
  chosen: all the peoples of the earth
  alternatives:
  - all the peoples of the land
  - all the nations of the earth
  lexicon: HALOT
  rationale: עמים is 'peoples,' not specifically 'nations' here. הארץ can mean earth/land;
    given the international scope of the cedar symbol in the surrounding oracle, 'earth'
    best conveys breadth.
- source_word: וַיִּטְּשֻׁהוּ
  chosen: left it
  alternatives:
  - abandoned it
  - forsook it
  lexicon: HALOT
  rationale: The repeated verb is rendered consistently. The peoples who once benefited
    from the tree's shade now leave it after its fall.
