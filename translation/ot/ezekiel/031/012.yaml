theological_decisions:
- issue: Referent of the masculine singular suffixes in the tree metaphor
  chosen_reading: Render with neuter 'it' to maintain the cedar/tree imagery in English
  alternative_readings:
  - Render with masculine 'him' to foreground the king/Assyria behind the metaphor
  rationale: The verse continues the extended metaphor of Assyria as a majestic tree.
    English 'it' best matches the immediate imagery, while the broader context makes
    clear the political referent behind the symbol.
