theological_decisions:
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of אֶרֶץ תַּחְתִּית
  chosen_reading: the land below
  alternative_readings:
  - the netherworld
  - the lower earth
  rationale: The phrase points to the realm of the dead in prophetic imagery. 'The land below' preserves the metaphor without importing a more developed doctrinal geography than the Hebrew itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it.'
