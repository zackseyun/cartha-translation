id: EZK.31.18
reference: Ezekiel 31:18
source:
  edition: WLC
  text: אֶל מִ֨י דָמִ֥יתָ כָּ֛כָה בְּ/כָב֥וֹד וּ/בְ/גֹ֖דֶל בַּ/עֲצֵי עֵ֑דֶן וְ/הוּרַדְתָּ֨ אֶת עֲצֵי עֵ֜דֶן אֶל אֶ֣רֶץ תַּחְתִּ֗ית בְּ/ת֨וֹךְ עֲרֵלִ֤ים תִּשְׁכַּב֙ אֶת חַלְלֵי חֶ֔רֶב ה֤וּא פַרְעֹה֙ וְ/כָל הֲמוֹנֹ֔/ה נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־־־־־־׃ס
translation:
  text: To whom were you thus like in glory and greatness among the trees of Eden? Yet you shall be brought down with the trees of Eden to the land below; in the midst of the uncircumcised you shall lie with those slain by the sword. This is Pharaoh and all his multitude, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lower earth' or 'the netherworld.' The Hebrew refers to the realm below, the place of the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: דָמִיתָ
  chosen: were you like
  alternatives:
  - did you resemble
  - were you compared
  lexicon: HALOT
  rationale: The verb דמה here asks a rhetorical question of resemblance/comparison. 'Were you like' is idiomatic modern English and preserves the direct second-person address.
- source_word: כָּכָה
  chosen: —
  alternatives:
  - thus
  - like this
  - in this way
  lexicon: HALOT
  rationale: The adverb intensifies the comparison ('thus/in this way'), but in English it is naturally absorbed into the rhetorical question and the following specification 'in glory and greatness.' Rendering it explicitly would sound wooden; its force is preserved by the phrasing.
- source_word: כָבוֹד
  chosen: glory
  alternatives:
  - honor
  - splendor
  lexicon: HALOT
  rationale: '''Glory'' best captures royal magnificence in this taunt over Pharaoh and matches common biblical usage.'
- source_word: גֹדֶל
  chosen: greatness
  alternatives:
  - size
  - magnitude
  lexicon: HALOT
  rationale: Although the noun can denote physical greatness, in this context of imperial pride and comparison among majestic trees, 'greatness' captures both scale and status.
- source_word: עֲצֵי עֵדֶן
  chosen: the trees of Eden
  alternatives:
  - the trees in Eden
  lexicon: HALOT
  rationale: A literal rendering preserves the metaphor established throughout the chapter, where nations/kings are compared to trees in Eden.
- source_word: וְהוּרַדְתָּ
  chosen: you shall be brought down
  alternatives:
  - you were brought down
  - you will be brought down
  lexicon: HALOT
  rationale: The Hophal gives a passive/causative sense. In prophetic discourse the perfect can function with future force; 'shall be brought down' fits the judgment oracle context.
- source_word: אֶרֶץ תַּחְתִּית
  chosen: the land below
  alternatives:
  - the lower earth
  - the netherworld
  - the lowest parts of the earth
  lexicon: HALOT
  rationale: The phrase refers to the underworld/realm of the dead. 'The land below' is readable modern English that preserves the downward spatial imagery without over-specifying a later doctrinal concept.
- source_word: בְּתוֹךְ עֲרֵלִים
  chosen: among the uncircumcised
  alternatives:
  - in the midst of the uncircumcised
  lexicon: HALOT
  rationale: A straightforward rendering preserves the covenantal and shame-laden force of the Hebrew expression in Ezekiel's judgment language.
- source_word: תִּשְׁכַּב
  chosen: you shall lie
  alternatives:
  - you will lie down
  lexicon: HALOT
  rationale: In context this is a euphemistic image for lying in death among the slain. 'You shall lie' is concise and preserves the grave/death imagery.
- source_word: חַלְלֵי חֶרֶב
  chosen: those slain by the sword
  alternatives:
  - the sword-slain
  - the pierced by the sword
  lexicon: HALOT
  rationale: This is the most natural English equivalent for the construct phrase and clearly communicates violent death.
- source_word: הוּא פַרְעֹה וְכָל הֲמוֹנוֹ
  chosen: This is Pharaoh and all his multitude
  alternatives:
  - Such is Pharaoh and all his hordes
  - That is Pharaoh and all his wealth
  lexicon: HALOT
  rationale: הֲמוֹן here in Ezekiel commonly refers to a noisy mass, multitude, or host. 'This is Pharaoh and all his multitude' sums up the oracle and matches the demonstrative force of הוּא.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following the project's doctrine, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English Bible style avoids 'Lord LORD' by rendering 'the Lord GOD.'
