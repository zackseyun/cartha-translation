id: EZK.31.9
reference: Ezekiel 31:9
source:
  edition: WLC
  text: יָפֶ֣ה עֲשִׂיתִ֔י/ו בְּ/רֹ֖ב דָּֽלִיּוֹתָ֑י/ו וַ/יְקַנְאֻ֨/הוּ֙ כָּל עֲצֵי
    עֵ֔דֶן אֲשֶׁ֖ר בְּ/גַ֥ן הָ/אֱלֹהִֽים־־׃ס
translation:
  text: I made it beautiful with its many branches, and all the trees of Eden that
    were in the garden of God envied it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I made him beautiful ... and all the trees of Eden ... envied him,'
      if the underlying referent is foregrounded as Assyria/the king rather than the
      tree image itself.
    reason: alternative_reading
lexical_decisions:
- source_word: יָפֶה
  chosen: beautiful
  alternatives:
  - fair
  - lovely
  lexicon: HALOT
  rationale: Predicate adjective describing the tree's appearance/splendor. 'Beautiful'
    is natural modern English and preserves the aesthetic sense without archaic tone.
- source_word: עֲשִׂיתִיו
  chosen: I made it
  alternatives:
  - I made him
  - I made it fair/beautiful
  lexicon: HALOT
  rationale: 'Qal perfect 1cs with 3ms suffix: God is the speaker, declaring his action
    toward the tree/Assyria symbol. English ''it'' fits the immediate arboreal metaphor
    better than ''him,'' while the object sense is retained.'
- source_word: בְּרֹב
  chosen: with its many
  alternatives:
  - in the abundance of
  - because of the multitude of
  lexicon: HALOT
  rationale: 'The preposition ב plus ''abundance/multitude'' is rendered idiomatically
    as instrumental or descriptive: the beauty is expressed in connection with the
    abundance of branches.'
- source_word: דָּלִיּוֹתָיו
  chosen: branches
  alternatives:
  - boughs
  - shoots
  lexicon: HALOT
  rationale: Refers to the tree's hanging branches/boughs. 'Branches' is the clearest
    modern English term; 'boughs' is possible but less common.
- source_word: וַיְקַנְאֻהוּ
  chosen: envied it
  alternatives:
  - were jealous of it
  - envied him
  lexicon: HALOT
  rationale: The verb קנא here conveys jealousy/envy. 'Envied it' is concise and idiomatic.
    'It' continues the tree imagery consistently in English.
- source_word: כָּל עֲצֵי עֵדֶן
  chosen: all the trees of Eden
  alternatives:
  - every tree of Eden
  lexicon: HALOT
  rationale: Collective expression for the other glorious trees in the Eden imagery.
    'All the trees of Eden' preserves the poetic corporate sense.
- source_word: אֲשֶׁר בְּגַן הָאֱלֹהִים
  chosen: that were in the garden of God
  alternatives:
  - which were in God's garden
  - that were in the divine garden
  lexicon: HALOT
  rationale: A relative clause specifying the location of the trees. 'Garden of God'
    preserves the elevated biblical idiom and echoes Eden language elsewhere in Ezekiel.
