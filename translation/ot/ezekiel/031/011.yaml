id: EZK.31.11
reference: Ezekiel 31:11
source:
  edition: WLC
  text: וְ/אֶ֨תְּנֵ֔/הוּ בְּ/יַ֖ד אֵ֣יל גּוֹיִ֑ם עָשׂ֤וֹ יַֽעֲשֶׂה֙ ל֔/וֹ כְּ/רִשְׁע֖/וֹ
    גֵּרַשְׁתִּֽ/הוּ׃
translation:
  text: I gave him into the hand of a mighty one of the nations; he will surely deal
    with him. According to his wickedness I drove him out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ruler of nations' / 'the mighty one of the nations.' The Hebrew
      expression can denote a powerful ruler among the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶתְּנֵהוּ
  chosen: I gave him
  alternatives:
  - I delivered him
  - I will give him
  lexicon: HALOT
  rationale: 'From נתן with 1cs subject and 3ms object. Although the form can be discussed
    morphologically, in context following the judgment speech it functions naturally
    as a past/perfective statement: God has handed Assyria over. ''Gave'' is straightforward
    English; ''delivered'' is possible but slightly more interpretive.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: A common Hebrew idiom for delivering someone into another's control.
    The literal 'into the hand of' is retained because it is clear in English and
    preserves the imagery.
- source_word: אֵיל גּוֹיִם
  chosen: a mighty one of the nations
  alternatives:
  - the ruler of nations
  - a strong one of the nations
  - the mighty one of the nations
  lexicon: HALOT
  rationale: אֵיל can denote a strong or mighty one, not necessarily specifically
    'ram' here. In context it refers to the powerful foreign ruler used as God's instrument
    (likely Babylon's king). 'A mighty one of the nations' stays close to the Hebrew
    without over-specifying 'ruler,' though that sense is contextually present.
- source_word: עָשׂוֹ יַעֲשֶׂה לוֹ
  chosen: he will surely deal with him
  alternatives:
  - he will surely act against him
  - he will certainly do to him what is fitting
  - in doing he will do to him
  lexicon: HALOT
  rationale: This is an infinitive absolute plus imperfect of עשה, intensifying the
    verbal idea. English cannot reproduce the form directly, so 'will surely deal
    with him' conveys emphatic certainty while fitting the context of punitive action.
- source_word: כְּרִשְׁעוֹ
  chosen: According to his wickedness
  alternatives:
  - for his wickedness
  - as his wickedness deserved
  lexicon: HALOT
  rationale: 'The preposition כ marks correspondence: the judgment matches the subject''s
    wickedness. ''According to his wickedness'' preserves that proportional sense
    more closely than the simpler ''for his wickedness.'''
- source_word: גֵּרַשְׁתִּהוּ
  chosen: I drove him out
  alternatives:
  - I cast him out
  - I expelled him
  lexicon: HALOT
  rationale: גרש commonly means drive out, expel. 'Drove him out' is vivid, idiomatic,
    and suits the imagery of removal from place and status.
