theological_decisions:
- issue: Identification of the agent called אֵיל גּוֹיִם
  chosen_reading: Rendered generically as 'a mighty one of the nations' without naming
    the historical figure in the main text.
  alternative_readings:
  - '''the ruler of nations'''
  - an explicit interpretive identification with the king of Babylon
  rationale: The Hebrew describes the instrument of divine judgment in generic terms.
    While the historical referent is likely the Babylonian ruler, the text itself
    does not name him here, so the translation preserves the wording rather than importing
    the identification into the main text.
  doctrine_reference: Translation philosophy §1, §3
