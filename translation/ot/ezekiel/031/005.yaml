id: EZK.31.5
reference: Ezekiel 31:5
source:
  edition: WLC
  text: עַל כֵּן֙ גָּבְהָ֣א קֹמָת֔/וֹ מִ/כֹּ֖ל עֲצֵ֣י הַ/שָּׂדֶ֑ה וַ/תִּרְבֶּ֨ינָה
    סַֽרְעַפֹּתָ֜י/ו וַ/תֶּאֱרַ֧כְנָה פארת/ו מִ/מַּ֥יִם רַבִּ֖ים בְּ/שַׁלְּחֽ/וֹ־׃
translation:
  text: Therefore its height rose above all the trees of the field, and its boughs
    multiplied, and its branches grew long from abundant waters as it spread out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when it sent out its shoots/branches.' The Hebrew literally refers to
      its 'sending out,' with the object left implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּבְהָא
  chosen: rose above
  alternatives:
  - was high
  - grew tall
  lexicon: HALOT
  rationale: From גבהּ/גבה, 'to be high, grow high.' In context with מִכֹּל ('above
    all'), English 'rose above' captures both elevation and comparison more naturally
    than a stative 'was high.'
- source_word: קֹמָתוֹ
  chosen: its height
  alternatives:
  - its stature
  lexicon: HALOT
  rationale: קומה commonly denotes height or stature. 'Height' fits the arboreal imagery
    and keeps the focus on vertical extent.
- source_word: מִכֹּל עֲצֵי הַשָּׂדֶה
  chosen: above all the trees of the field
  alternatives:
  - than all the trees of the open country
  lexicon: HALOT
  rationale: A comparative construction with מן. 'Trees of the field' is a standard,
    transparent rendering and suits prophetic imagery.
- source_word: סַרְעַפֹּתָיו
  chosen: its boughs
  alternatives:
  - its branches
  lexicon: HALOT
  rationale: This term refers to larger branching growth; rendering it as 'boughs'
    helps distinguish it from the following פארתו, which is also branch-related but
    can denote shoots/foliage-bearing branches.
- source_word: וַתִּרְבֶּינָה
  chosen: multiplied
  alternatives:
  - became many
  - increased
  lexicon: HALOT
  rationale: The verb רבה indicates becoming many/increasing. 'Multiplied' is concise
    and preserves the sense of numerical increase in the boughs.
- source_word: פארתו
  chosen: its branches
  alternatives:
  - its shoots
  - its foliage
  lexicon: HALOT
  rationale: Though the noun can be associated with leafy branches or beautifying
    foliage, in this tree metaphor 'branches' is the clearest natural English rendering,
    especially paired with the verb 'grew long.'
- source_word: וַתֶּאֱרַכְנָה
  chosen: grew long
  alternatives:
  - lengthened
  - became long
  lexicon: HALOT
  rationale: From ארך, 'to be long/become long.' 'Grew long' is idiomatic for branches
    and preserves the developmental imagery.
- source_word: מִמַּיִם רַבִּים
  chosen: from abundant waters
  alternatives:
  - because of many waters
  - from great waters
  lexicon: HALOT
  rationale: The preposition מן here marks source/cause. 'From abundant waters' preserves
    the imagery of nourishment supplied by plentiful water.
- source_word: בְּשַׁלְּחוֹ
  chosen: as it spread out
  alternatives:
  - when it sent out its shoots
  - in its sending out
  lexicon: HALOT
  rationale: From שלח in a horticultural sense, likely 'sending out' branches/shoots.
    Because the direct object is implicit in Hebrew, 'as it spread out' gives clear
    English while preserving the image of outward extension. The more explicit alternative
    is preserved in a footnote.
