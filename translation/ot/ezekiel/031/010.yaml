id: EZK.31.10
reference: Ezekiel 31:10
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֕עַן אֲשֶׁ֥ר גָּבַ֖הְתָּ בְּ/קוֹמָ֑ה
    וַ/יִּתֵּ֤ן צַמַּרְתּ/וֹ֙ אֶל בֵּ֣ין עֲבוֹתִ֔ים וְ/רָ֥ם לְבָב֖/וֹ בְּ/גָבְהֽ/וֹ־׃
translation:
  text: 'Therefore thus says the Lord GOD: Because you grew tall in stature, and set
    your top among the clouds, and his heart was lifted up in his height,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the thick boughs.' The Hebrew term can refer to dense foliage
      or thick branches; 'clouds' reflects the sense of extreme height in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.'
    Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English
    tradition commonly uses 'Lord GOD' to avoid 'Lord LORD' while preserving both
    elements.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because that
  - Forasmuch as
  lexicon: HALOT
  rationale: This conjunction pair introduces the reason for the judgment. 'Because'
    is natural modern English and adequately represents the causal force without unnecessary
    archaism.
- source_word: גָּבַהְתָּ
  chosen: you grew tall
  alternatives:
  - you were exalted
  - you became high
  lexicon: HALOT
  rationale: The verb denotes becoming high/tall. In the tree metaphor of the chapter,
    physical height imagery remains primary, though it also supports the pride motif.
    'Grew tall' preserves the arboreal image better than the more abstract 'were exalted.'
- source_word: בְּקוֹמָה
  chosen: in stature
  alternatives:
  - in height
  - in tallness
  lexicon: HALOT
  rationale: קוֹמָה refers to height/stature. 'In stature' is idiomatic English and
    fits the metaphor of a towering tree or empire.
- source_word: וַיִּתֵּן
  chosen: and set
  alternatives:
  - and put
  - and gave
  lexicon: HALOT
  rationale: Although the basic sense of נתן is 'give,' in this construction it means
    to place or set. 'Set' is the most natural English equivalent here.
- source_word: צַמַּרְתּוֹ
  chosen: your top
  alternatives:
  - your treetop
  - your crown
  lexicon: HALOT
  rationale: The noun refers to the topmost part of a tree. Because the addressee
    is second person in the clause, the suffix is represented as 'your.' 'Top' is
    concise and preserves the metaphor; 'treetop' is possible but slightly more interpretive.
- source_word: אֶל בֵּין עֲבוֹתִים
  chosen: among the clouds
  alternatives:
  - among the thick boughs
  - into the midst of the clouds
  lexicon: HALOT
  rationale: עֲבוֹתִים can denote thick foliage/boughs, but in this context many understand
    a wordplay or elevated imagery reaching into cloud-height. The immediate sense
    is the tree's top reaching into lofty regions. 'Among the clouds' gives clear
    modern English, while the boughs alternative is preserved in a footnote because
    it is lexically viable and common in formal translations.
- source_word: וְרָם לְבָבוֹ
  chosen: and his heart was lifted up
  alternatives:
  - and his heart became proud
  - and his heart was exalted
  lexicon: HALOT
  rationale: This clause shifts from height imagery to inward pride. 'His heart was
    lifted up' closely follows the Hebrew idiom while remaining understandable in
    English.
- source_word: בְּגָבְהוֹ
  chosen: in his height
  alternatives:
  - because of his height
  - in his loftiness
  lexicon: HALOT
  rationale: The phrase links the pride to the subject's exalted condition. 'In his
    height' is formally close and preserves the metaphorical connection between physical
    height and arrogant self-exaltation.
