theological_decisions:
- issue: Pronoun shift within the verse
  chosen_reading: Retain the shift from second person ('you grew tall ... your top')
    to third person ('his heart was lifted up').
  alternative_readings:
  - Regularize all pronouns to second person
  - Regularize all pronouns to third person
  rationale: The Hebrew text itself shifts person, likely reflecting the prophetic
    style and the movement between direct address and description of the figure symbolized
    by the tree. Preserving the shift is more transparent to the source than smoothing
    it away.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
