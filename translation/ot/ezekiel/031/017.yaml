id: EZK.31.17
reference: Ezekiel 31:17
source:
  edition: WLC
  text: גַּם הֵ֗ם אִתּ֛/וֹ יָרְד֥וּ שְׁא֖וֹלָ/ה אֶל חַלְלֵי חָ֑רֶב וּ/זְרֹע֛/וֹ יָשְׁב֥וּ
    בְ/צִלּ֖/וֹ בְּ/ת֥וֹךְ גּוֹיִֽם־־־׃
translation:
  text: They too went down with it to Sheol, to those slain by the sword; its arm
    had dwelt in its shade among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its strength' or 'its allies'; literally 'its arm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: too
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Adds these others to the judgment already described; 'too' is natural
    English here.
- source_word: אִתּוֹ
  chosen: with it
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The antecedent in context is the cedar/Assyria portrayed as a tree, so
    English 'it' best reflects the metaphorical referent rather than personalizing
    it as 'him.'
- source_word: יָרְדוּ שְׁאוֹלָה
  chosen: went down ... to Sheol
  alternatives:
  - descended ... to Sheol
  - went down ... to the grave
  lexicon: HALOT
  rationale: The idiom is literally 'went down to Sheol.' 'Sheol' is retained rather
    than flattened to 'grave' because the Hebrew term carries the underworld/dead-realm
    sense beyond mere burial.
- source_word: חַלְלֵי חָרֶב
  chosen: those slain by the sword
  alternatives:
  - the slain of the sword
  - the sword-slain
  lexicon: HALOT
  rationale: This renders the construct phrase idiomatically in modern English while
    preserving the violent cause of death.
- source_word: זְרֹעוֹ
  chosen: its arm
  alternatives:
  - his arm
  - its strength
  - its allies
  lexicon: HALOT
  rationale: Literally 'its arm.' In context it may metaphorically denote strength
    or dependent powers, but the main text preserves the image. Because the metaphor
    may point to supporters/allies, that alternative is preserved in a footnote.
- source_word: יָשְׁבוּ
  chosen: had dwelt
  alternatives:
  - dwelt
  - lived
  - sat
  lexicon: HALOT
  rationale: The verb commonly means 'dwell/live'; 'had dwelt' fits the retrospective
    lament context. 'Sat' would be too wooden here.
- source_word: בְצִלּוֹ
  chosen: in its shade
  alternatives:
  - under its shadow
  - in his shade
  lexicon: HALOT
  rationale: The tree metaphor governs the imagery; 'shade' is clear modern English
    and preserves the protective nuance.
- source_word: בְּתוֹךְ גּוֹיִם
  chosen: among the nations
  alternatives:
  - in the midst of the nations
  - among the peoples
  lexicon: HALOT
  rationale: Idiomatic rendering of the spatial phrase with גוים as 'nations,' fitting
    Ezekiel's international judgment context.
