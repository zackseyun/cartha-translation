theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The Hebrew term is left as 'Sheol' to preserve the Old Testament concept
    without forcing a narrower or more interpretively loaded English equivalent. This
    maintains theological tension rather than resolving the term into simple burial
    or a later developed doctrine of hell.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
