id: EZK.31.3
reference: Ezekiel 31:3
source:
  edition: WLC
  text: הִנֵּ֨ה אַשּׁ֜וּר אֶ֣רֶז בַּ/לְּבָנ֗וֹן יְפֵ֥ה עָנָ֛ף וְ/חֹ֥רֶשׁ מֵצַ֖ל וּ/גְבַ֣הּ
    קוֹמָ֑ה וּ/בֵ֣ין עֲבֹתִ֔ים הָיְתָ֖ה צַמַּרְתּֽ/וֹ׃
translation:
  text: Behold, Assyria was a cedar in Lebanon, beautiful in branch, and a forest
    giving shade, and lofty in height; its top was among the clouds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cedar of Lebanon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'among thick boughs' or 'among dense foliage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and vividness of the opening particle.
    'Behold' is slightly elevated but still natural in prophetic discourse.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: Rendered as the nation/entity 'Assyria,' which fits the prophetic comparison.
    'Asshur' is possible as a transliteration, but standard English usage favors 'Assyria'
    for the imperial power in view.
- source_word: אֶרֶז בַּלְּבָנוֹן
  chosen: a cedar in Lebanon
  alternatives:
  - a cedar of Lebanon
  - a cedar on Lebanon
  lexicon: HALOT
  rationale: The phrase identifies Assyria metaphorically as a cedar located in Lebanon
    imagery. 'In Lebanon' is a straightforward rendering of the preposition and reads
    naturally in English; 'cedar of Lebanon' is also idiomatic and worth preserving
    as an alternative.
- source_word: יְפֵה עָנָף
  chosen: beautiful in branch
  alternatives:
  - beautiful in branches
  - fair of branches
  lexicon: HALOT
  rationale: Keeps the singular collective sense of עָנָף while preserving the compact
    Hebrew description. The phrase describes the tree's impressive branching structure.
- source_word: וְחֹרֶשׁ מֵצַל
  chosen: and a forest giving shade
  alternatives:
  - and shady with thickets
  - and a thicket for shade
  - and a shade-giving grove
  lexicon: HALOT
  rationale: חֹרֶשׁ can denote a wooded growth/thicket/forest, and מֵצַל conveys providing
    shade. The Hebrew likely pictures luxuriant density rather than merely one branchy
    tree, so 'a forest giving shade' captures the metaphorical fullness, though more
    literal alternatives are possible.
- source_word: וּגְבַהּ קוֹמָה
  chosen: and lofty in height
  alternatives:
  - and tall in stature
  - and high in stature
  lexicon: HALOT
  rationale: Expresses the idiom of exalted height in clear modern English while preserving
    the metaphor of imposing stature.
- source_word: וּבֵין עֲבֹתִים
  chosen: among the clouds
  alternatives:
  - among thick boughs
  - among dense foliage
  lexicon: HALOT
  rationale: עֲבֹתִים can denote thick things, and in arboreal context may refer to
    dense boughs; however, in this verse and its imagery of towering height, many
    understand it metaphorically as cloud masses. 'Among the clouds' best fits the
    climax of height and the broader poetic picture, while the arboreal alternative
    is preserved in a footnote.
- source_word: צַמַּרְתּוֹ
  chosen: its top
  alternatives:
  - its treetop
  - its crown
  lexicon: HALOT
  rationale: Refers to the topmost part/crown of the tree. 'Its top' is concise and
    natural; 'crown' is possible but can sound more interpretive.
