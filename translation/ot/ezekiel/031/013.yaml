id: EZK.31.13
reference: Ezekiel 31:13
source:
  edition: WLC
  text: עַל מַפַּלְתּ֥/וֹ יִשְׁכְּנ֖וּ כָּל ע֣וֹף הַ/שָּׁמָ֑יִם וְ/אֶל פֹּארֹתָ֣י/ו
    הָי֔וּ כֹּ֖ל חַיַּ֥ת הַ/שָּׂדֶֽה־־־׃
translation:
  text: On its fallen trunk all the birds of the heavens will dwell, and on its boughs
    will be all the beasts of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On its downfall all the birds of the heavens will dwell.' The Hebrew
      noun can be rendered more abstractly, but the tree image in context supports
      the concrete sense 'fallen trunk.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its branches.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַפַּלְתּוֹ
  chosen: its fallen trunk
  alternatives:
  - its downfall
  - its fallen mass
  - its ruin
  lexicon: HALOT
  rationale: The noun from נפל can denote a fall/fallen thing. In this arboreal metaphor,
    the immediate context is the felled cedar/Assyria, so an English rendering that
    keeps the image concrete is preferable to the abstract 'downfall.' 'Fallen trunk'
    conveys the tree imagery while reflecting the result of its fall.
- source_word: יִשְׁכְּנוּ
  chosen: will dwell
  alternatives:
  - will settle
  - will lodge
  - will rest
  lexicon: HALOT
  rationale: שׁכן commonly means dwell, settle, or reside. 'Will dwell' is natural
    English and preserves the image of birds taking up habitation on the fallen tree.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the birds of heaven
  lexicon: HALOT
  rationale: A formally close rendering is retained. 'Birds of the heavens' reflects
    the Hebrew genitive and matches prophetic diction, while remaining understandable
    in English.
- source_word: פֹּארֹתָיו
  chosen: its boughs
  alternatives:
  - its branches
  - its limbs
  lexicon: HALOT
  rationale: The term refers to the larger spreading branches/boughs of a tree. 'Boughs'
    better suits elevated poetic-prophetic style and the cedar imagery than the more
    generic 'branches.'
- source_word: הָיוּ
  chosen: will be
  alternatives:
  - were
  - came to be
  lexicon: HALOT
  rationale: Although morphologically qatal, in this prophetic context it functions
    with future force in parallel with יִשׁכנוּ. Rendering both clauses futurally
    gives coherent English and reflects the predictive description of the felled tree's
    aftermath.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the beasts of the field
  alternatives:
  - the wild animals of the field
  - the animals of the countryside
  lexicon: HALOT
  rationale: This is a standard biblical collocation. 'Beasts of the field' preserves
    the register and broad animal sense without over-specifying wildness.
- source_word: עַל ... וְאֶל
  chosen: On ... and on
  alternatives:
  - Upon ... and against
  - Over ... and toward
  lexicon: HALOT
  rationale: The first preposition is straightforwardly 'on/upon.' The second is formally
    'to/toward,' but with הָיוּ and the image of animals occupying the branches, idiomatic
    English is best expressed as 'on its boughs,' preserving the spatial sense rather
    than a wooden 'toward its boughs.'
