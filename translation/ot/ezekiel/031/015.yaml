theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  - hell
  rationale: The Hebrew term refers to the underworld/realm of the dead in Israelite
    idiom. Translating it as 'Sheol' preserves the conceptual world of the text and
    avoids importing either a purely physical grave or later developed notions of
    hell.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cosmic mourning imagery
  chosen_reading: Retained as poetic-cosmic judgment language without over-allegorizing
  alternative_readings:
  - purely literal environmental catastrophe
  - fully decoded political allegory in the main text
  rationale: The verse personifies the deep, Lebanon, and the trees as participating
    in mourning over the downfall of the great tree/empire. The translation preserves
    the imagery rather than flattening it into explanatory paraphrase.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source text says without importing interpretation'
