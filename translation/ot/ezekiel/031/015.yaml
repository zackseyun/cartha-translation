id: EZK.31.15
reference: Ezekiel 31:15
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנָ֣/י יְהוִ֗ה בְּ/י֨וֹם רִדְתּ֤/וֹ שְׁא֨וֹלָ/ה֙ הֶאֱבַ֜לְתִּי
    כִּסֵּ֤תִי עָלָי/ו֙ אֶת תְּה֔וֹם וָֽ/אֶמְנַע֙ נַהֲרוֹתֶ֔י/הָ וַ/יִּכָּלְא֖וּ מַ֣יִם
    רַבִּ֑ים וָ/אַקְדִּ֤ר עָלָי/ו֙ לְבָנ֔וֹן וְ/כָל עֲצֵ֥י הַ/שָּׂדֶ֖ה עָלָ֥י/ו עֻלְפֶּֽה־־־׃
translation:
  text: 'Thus says the Lord GOD: On the day he went down to Sheol, I caused mourning;
    I covered the deep because of him, and I restrained its rivers, and the many waters
    were stopped. I made Lebanon grow dark because of him, and all the trees of the
    field fainted because of him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.' Hebrew 'Sheol' names the underworld
      of the dead and is left transliterated here to avoid narrowing the sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'I darkened Lebanon because of him.' The Hebrew verb can express causing
      gloom or darkness, fitting the verse's mourning imagery.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the trees of the field swooned because of him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered with the conventional English equivalent for the divine title-plus-name
    combination. Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי
    יְהוִה, English convention uses 'the Lord GOD' to avoid 'Lord LORD' while preserving
    both elements.
- source_word: בְּיוֹם רִדְתּוֹ שְׁאוֹלָה
  chosen: On the day he went down to Sheol
  alternatives:
  - On the day of his descent to Sheol
  - When he descended to Sheol
  lexicon: HALOT
  rationale: Kept the temporal phrase explicit and rendered שְׁאוֹל as 'Sheol' rather
    than 'the grave' or 'hell' to preserve the Hebrew concept of the underworld/realm
    of the dead without importing later doctrinal associations.
- source_word: הֶאֱבַלְתִּי
  chosen: I caused mourning
  alternatives:
  - I made mourn
  - I brought mourning
  lexicon: HALOT
  rationale: Hiphil of אבל is causative; 'I caused mourning' preserves the causative
    force better than a simple intransitive 'I mourned.'
- source_word: כִּסֵּתִי עָלָיו אֶת תְּהוֹם
  chosen: I covered the deep because of him
  alternatives:
  - I covered the deep over him
  - I made the deep mourn for him
  lexicon: HALOT
  rationale: The verb כסה normally means 'cover.' The preposition עַל with pronominal
    suffix here is taken in a causal/situational sense, 'because of him' or 'on account
    of him,' fitting the context of cosmic mourning. 'The deep' renders תְּהוֹם as
    the primeval/deep waters.
- source_word: וָאֶמְנַע נַהֲרוֹתֶיהָ
  chosen: and I restrained its rivers
  alternatives:
  - and I held back its streams
  - and I withheld its channels
  lexicon: HALOT
  rationale: מנע conveys withholding/restraining. The feminine suffix refers back
    to תְּהוֹם, so 'its rivers' is the most natural English rendering.
- source_word: וַיִּכָּלְאוּ מַיִם רַבִּים
  chosen: and the many waters were stopped
  alternatives:
  - and abundant waters were shut up
  - and great waters were restrained
  lexicon: HALOT
  rationale: The Niphal/passive sense indicates the waters were held back or shut
    off. 'The many waters were stopped' is readable modern English while preserving
    the passive result.
- source_word: וָאַקְדִּר עָלָיו לְבָנוֹן
  chosen: I made Lebanon grow dark because of him
  alternatives:
  - I darkened Lebanon because of him
  - I made Lebanon mourn in darkness because of him
  lexicon: HALOT
  rationale: קדר in the Hiphil conveys causing darkness/gloom. 'Lebanon' here likely
    stands metonymically for its forested heights; the phrase expresses cosmic lament.
    'Grow dark' captures the resultant gloom idiomatically.
- source_word: וְכָל עֲצֵי הַשָּׂדֶה
  chosen: and all the trees of the field
  alternatives:
  - and every tree of the field
  lexicon: HALOT
  rationale: A straightforward rendering preserving the collective imagery of the
    surrounding nations/trees in the allegory.
- source_word: עָלָיו עֻלְפֶּה
  chosen: fainted because of him
  alternatives:
  - swooned because of him
  - were covered in languishing because of him
  lexicon: HALOT
  rationale: The noun עֻלְפֶּה denotes faintness/languishing. In English, converting
    the verbless/nominal expression into the verbal 'fainted' yields natural sense
    while preserving the image of collapse in grief or shock.
