id: EZK.31.14
reference: Ezekiel 31:14
source:
  edition: WLC
  text: לְמַ֡עַן אֲשֶׁר֩ לֹא יִגְבְּה֨וּ בְ/קוֹמָתָ֜/ם כָּל עֲצֵי מַ֗יִם וְ/לֹֽא יִתְּנ֤וּ
    אֶת צַמַּרְתָּ/ם֙ אֶל בֵּ֣ין עֲבֹתִ֔ים וְ/לֹֽא יַעַמְד֧וּ אֵלֵי/הֶ֛ם בְּ/גָבְהָ֖/ם
    כָּל שֹׁ֣תֵי מָ֑יִם כִּֽי כֻלָּ/ם֩ נִתְּנ֨וּ לַ/מָּ֜וֶת אֶל אֶ֣רֶץ תַּחְתִּ֗ית
    בְּ/ת֛וֹךְ בְּנֵ֥י אָדָ֖ם אֶל י֥וֹרְדֵי בֽוֹר־־־־־־־־־־־׃ס
translation:
  text: so that all the trees by the waters may not grow tall in their height, and
    may not set their treetop among the clouds, and that none of the water-drinkers
    may stand over them in their height; for all of them are given over to death,
    to the land below, among the sons of man, with those who go down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the midst of the thick boughs/foliage.' The Hebrew עֲבֹתִים can
      be understood as dense growth rather than clouds.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of 'may stand over them in their height' is difficult; it may
      mean that no other well-watered trees should exalt themselves alongside or above
      them.
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן אֲשֶׁר
  chosen: so that
  alternatives:
  - in order that
  - to the end that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English while
    preserving the purposive force.
- source_word: יִגְבְּהוּ בְקוֹמָתָם
  chosen: may not grow tall in their height
  alternatives:
  - may not be exalted in their stature
  - may not rise high in their height
  lexicon: HALOT
  rationale: The verb גבהּ denotes becoming high/exalted; with 'in their height/stature'
    the imagery is arboreal and metaphorical. 'Grow tall' keeps the tree image vivid
    while retaining the warning against loftiness.
- source_word: כָּל עֲצֵי מַיִם
  chosen: all the trees by the waters
  alternatives:
  - all the water-fed trees
  - all the trees of the waters
  lexicon: HALOT
  rationale: Literally 'trees of water/waters.' In context of luxuriant trees nourished
    by abundant water, 'by the waters' is idiomatic and preserves the setting without
    overinterpreting.
- source_word: יִתְּנוּ אֶת צַמַּרְתָּם
  chosen: may not set their treetop
  alternatives:
  - may not put their top
  - may not raise their crown
  lexicon: HALOT
  rationale: צַמֶּרֶת refers to the topmost part of a tree, its crown/treetop. 'Set
    their treetop' fits the Hebrew verb נתן plus object and keeps the arboreal metaphor.
- source_word: אֶל בֵּין עֲבֹתִים
  chosen: among the clouds
  alternatives:
  - into the midst of the thick boughs
  - among the thick foliage
  lexicon: HALOT
  rationale: עֲבֹתִים can denote thick growth or clouds; in this context the phrase
    is commonly understood as reaching into the cloud-mass/heights, matching the imagery
    of towering pride. The arboreal alternative is possible and worth preserving in
    a footnote.
- source_word: וְלֹא יַעַמְדוּ אֵלֵיהֶם בְּגָבְהָם כָּל שֹׁתֵי מָיִם
  chosen: and that none of the water-drinkers may stand over them in their height
  alternatives:
  - and that all who drink water may not stand beside them in their height
  - and that no water-fed trees may remain standing to them in their height
  lexicon: HALOT
  rationale: 'The clause is difficult. שֹׁתֵי מָיִם is literally ''drinkers of water,''
    likely metaphorically the well-watered trees/nations. אֵלֵיהֶם is taken comparatively/superiorly
    here: ''over them.'' This yields a coherent sense: no other well-watered tree
    should exalt itself above the fallen one. Because the syntax is compressed and
    debated, the main text stays close while preserving the ambiguity in a footnote.'
- source_word: שֹׁתֵי מָיִם
  chosen: the water-drinkers
  alternatives:
  - those who drink water
  - the well-watered ones
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the metaphor and avoids prematurely
    resolving whether the referent is literal trees, rulers, or nations.
- source_word: כִּי כֻלָּם נִתְּנוּ לַמָּוֶת
  chosen: for all of them are given over to death
  alternatives:
  - for all of them are handed over to death
  - for they have all been consigned to death
  lexicon: HALOT
  rationale: The Niphal of נתן here conveys being handed over/consigned. 'Given over
    to death' is idiomatic and weighty.
- source_word: אֶל אֶרֶץ תַּחְתִּית
  chosen: to the land below
  alternatives:
  - to the lower earth
  - to the underworld land
  lexicon: HALOT
  rationale: Literally 'to the land beneath/lower land.' 'The land below' is readable
    modern English and preserves the descent imagery without importing a technical
    doctrine of the afterlife.
- source_word: בְּתוֹךְ בְּנֵי אָדָם
  chosen: among the sons of man
  alternatives:
  - among the sons of men
  - among humankind
  lexicon: HALOT
  rationale: בני אדם is literally 'sons of man/humankind.' Per gender-accurate philosophy,
    'sons of man' preserves the Hebrew form and its mortal-human contrast with the
    lofty trees. A more inclusive paraphrase is possible but less formally transparent.
- source_word: יֹרְדֵי בוֹר
  chosen: those who go down to the pit
  alternatives:
  - those descending to the pit
  - those who go down to the grave
  lexicon: HALOT
  rationale: בּוֹר is 'pit,' often a grave/underworld image. 'The pit' preserves the
    metaphor and intertextual resonance better than flattening to 'grave'.
