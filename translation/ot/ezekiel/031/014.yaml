theological_decisions:
- issue: Anthropological phrase בְּנֵי אָדָם
  chosen_reading: among the sons of man
  alternative_readings:
  - among humankind
  - among mortals
  rationale: The phrase emphasizes mortal humanity in contrast to exalted trees/nations.
    Following the project's gender-accurate principle, the masculine form is retained
    rather than neutralized, while the sense remains representative rather than male-exclusive.
