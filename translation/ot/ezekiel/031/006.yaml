theological_decisions:
- issue: Metaphorical tree imagery for imperial shelter
  chosen_reading: Retain the arboreal metaphor straightforwardly without interpreting
    the nations symbolically in the translation line.
  alternative_readings:
  - Explicitly interpret the tree as Assyria or empire within the verse
  rationale: The verse is part of an extended metaphor. The translation should preserve
    the imagery and not import the interpretation into the text itself.
  doctrine_reference: Translation philosophy §1, §3
