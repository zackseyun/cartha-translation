theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  rationale: The Hebrew term denotes the realm of the dead and carries conceptual
    freight beyond a burial place. Transliteration avoids collapsing the imagery into
    mere burial while not making a speculative doctrinal claim about the afterlife.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Interpretation of the comfort of the trees in the underworld
  chosen_reading: The fallen nations/powers symbolized by the trees are 'comforted'
    by Assyria's descent
  alternative_readings:
  - The trees are 'consoled' in a purely poetic sense without implying conscious afterlife
    experience
  rationale: The verse uses the chapter's sustained metaphor of trees for nations
    and depicts them in the underworld. The translation preserves the imagery and
    tension without resolving questions about the intermediate state beyond what the
    text itself portrays.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
