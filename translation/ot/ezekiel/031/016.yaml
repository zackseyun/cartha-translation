id: EZK.31.16
reference: Ezekiel 31:16
source:
  edition: WLC
  text: מִ/קּ֤וֹל מַפַּלְתּ/וֹ֙ הִרְעַ֣שְׁתִּי גוֹיִ֔ם בְּ/הוֹרִדִ֥/י אֹת֛/וֹ שְׁא֖וֹלָ/ה
    אֶת י֣וֹרְדֵי ב֑וֹר וַ/יִּנָּ֨חֲמ֜וּ בְּ/אֶ֤רֶץ תַּחְתִּית֙ כָּל עֲצֵי עֵ֔דֶן
    מִבְחַ֥ר וְ/טוֹב לְבָנ֖וֹן כָּל שֹׁ֥תֵי מָֽיִם־־־־־׃
translation:
  text: At the sound of his fall I made nations quake, when I brought him down to
    Sheol with those who go down to the pit; and all the trees of Eden, the choice
    and best of Lebanon, all that drink water, were comforted in the earth beneath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the grave' or 'to the underworld' for 'to Sheol.'
    reason: lexical_alternative
  - marker: b
    text: Or 'were consoled' or 'took comfort.' The sense may be that the other fallen
      powers found grim consolation when this great tree also descended.
    reason: lexical_alternative
  - marker: c
    text: Literally 'the lower earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  chosen: At the sound of
  alternatives:
  - From the sound of
  - At the noise of
  lexicon: HALOT
  rationale: קוֹל commonly means 'sound, noise, voice.' In this context of a great
    tree's collapse, 'sound' is the most natural English rendering; 'at' captures
    the causal/temporal force of the prefixed preposition in idiomatic English.
- source_word: מַפַּלְתוֹ
  chosen: his fall
  alternatives:
  - his downfall
  - his collapse
  lexicon: HALOT
  rationale: The noun denotes a falling/downfall. 'His fall' is concise and preserves
    the image of the felled cedar/empire while allowing the metaphorical political
    sense to remain.
- source_word: הִרְעַשְׁתִּי
  chosen: I made ... quake
  alternatives:
  - I shook
  - I made ... tremble
  lexicon: HALOT
  rationale: 'The Hiphil conveys causation: God causes the nations to shake. ''Made
    nations quake'' is vivid, natural English and preserves the causative force.'
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: In Ezekiel's international judgment context, גוים refers to nations/peoples
    generally, not specifically 'Gentiles' in a later Jewish-Christian contrastive
    sense.
- source_word: בְּהוֹרִדִי אֹתוֹ
  chosen: when I brought him down
  alternatives:
  - when I caused him to go down
  - in my bringing him down
  lexicon: HALOT
  rationale: The infinitive construct with preposition is best rendered temporally
    here. 'Brought him down' preserves the causative sense of ירד in Hiphil and reads
    naturally.
- source_word: שְׁאוֹלָה
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the underworld
  lexicon: HALOT
  rationale: Sheol is the Hebrew term for the realm of the dead. Transliteration preserves
    the source-world concept better than flattening it to 'grave,' while remaining
    readable.
- source_word: אֶת יֹרְדֵי בוֹר
  chosen: with those who go down to the pit
  alternatives:
  - with those descending to the pit
  - to those who go down to the pit
  lexicon: HALOT
  rationale: Although אֶת can mark the direct object, in context after 'brought him
    down to Sheol' it is best taken in an associative sense, 'with,' as in many English
    translations and the verse's parallelism. 'Those who go down to the pit' is a
    standard idiomatic rendering for the dead.
- source_word: בּוֹר
  chosen: the pit
  alternatives:
  - the grave
  - the cistern
  lexicon: HALOT
  rationale: In poetic/judgment contexts בור commonly refers metaphorically to the
    pit of death, not a literal cistern. 'The pit' preserves the imagery and intertextual
    resonance.
- source_word: וַיִּנָּחֲמוּ
  chosen: were comforted
  alternatives:
  - were consoled
  - took comfort
  lexicon: HALOT
  rationale: The Niphal of נחם here indicates receiving comfort/being consoled. 'Were
    comforted' keeps the passive nuance and the irony that the other fallen powers
    find grim consolation in Assyria's descent.
- source_word: בְּאֶרֶץ תַּחְתִּית
  chosen: in the earth beneath
  alternatives:
  - in the lower earth
  - in the netherworld
  lexicon: HALOT
  rationale: Literally 'in the lowest/lower earth.' 'The earth beneath' is readable
    modern English that preserves the downward spatial imagery without importing later
    cosmological terminology.
- source_word: כָּל עֲצֵי עֵדֶן
  chosen: all the trees of Eden
  alternatives:
  - all Eden's trees
  lexicon: HALOT
  rationale: The phrase should be kept fairly literal because the chapter's extended
    arboreal metaphor is central. 'Trees of Eden' preserves the allusion to the garden
    imagery.
- source_word: מִבְחַר וְטוֹב לְבָנוֹן
  chosen: the choice and best of Lebanon
  alternatives:
  - the choicest and best of Lebanon
  - Lebanon's finest and best
  lexicon: HALOT
  rationale: This appositional phrase further describes the trees. 'Choice and best'
    is slightly formal but clear, preserving the superlative quality without over-paraphrasing.
- source_word: כָּל שֹׁתֵי מָיִם
  chosen: all that drink water
  alternatives:
  - all the well-watered ones
  - all who drink water
  lexicon: HALOT
  rationale: Literally 'all drinkers of water.' Because the referent remains the metaphorical
    trees, 'all that drink water' keeps the personified imagery while sounding natural
    enough in English.
