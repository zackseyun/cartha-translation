id: EZK.31.1
reference: Ezekiel 31:1
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/אַחַ֤ת עֶשְׂרֵה֙ שָׁנָ֔ה בַּ/שְּׁלִישִׁ֖י בְּ/אֶחָ֣ד לַ/חֹ֑דֶשׁ הָיָ֥ה דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And it happened in the eleventh year, in the third month, on the first day of the month, that the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Introduces a narrative/date formula. 'And it happened' preserves the Hebrew wayyiqtol opening without archaic English like 'came to pass.'
- source_word: בְּאַחַת עֶשְׂרֵה שָׁנָה
  chosen: in the eleventh year
  alternatives:
  - in year eleven
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew ordinal-like dating expression; English requires smoothing to 'the eleventh year.'
- source_word: בַּשְּׁלִישִׁי
  chosen: in the third month
  alternatives:
  - in the third
  lexicon: HALOT
  rationale: Although 'month' is not repeated here, it is implied by the dating formula and made explicit in natural English.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew calendrical expression. 'On the first day of the month' is clear modern English and preserves the temporal specificity.
- source_word: הָיָה דְבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  - the word of the LORD came to pass
  lexicon: HALOT
  rationale: Prophetic formula commonly rendered 'came' in English to express divine revelation addressed to the prophet. This is more idiomatic than a wooden 'was.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md contested terms table.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating the recipient of revelation; rendered in contemporary English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' preserves the formal transition into the following oracle.
