theological_decisions:
- issue: Meaning of רוּחַ in the vision
  chosen_reading: the spirit
  alternative_readings:
  - the wind
  - the breath
  rationale: The verse explains the coordinated animation of the wheels with the living
    creature(s). Rendering רוּחַ as 'spirit' preserves the likely animating-force
    sense without making a stronger doctrinal claim such as identifying this directly
    as the Holy Spirit. The Hebrew remains polyvalent, so alternatives are preserved
    in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Number nuance of הַחַיָּה
  chosen_reading: the living creature
  alternative_readings:
  - the living creatures
  - the living being
  rationale: The Hebrew is singular with the article, likely functioning collectively
    or as a unified visionary referent. Retaining the singular respects the source
    form while allowing the context of multiple beings to remain in view.
  doctrine_reference: Original-language primacy over translation tradition.
