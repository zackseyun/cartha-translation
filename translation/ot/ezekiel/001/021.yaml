id: EZK.1.21
reference: Ezekiel 1:21
source:
  edition: WLC
  text: בְּ/לֶכְתָּ֣/ם יֵלֵ֔כוּ וּ/בְ/עָמְדָ֖/ם יַֽעֲמֹ֑דוּ וּֽ/בְ/הִנָּשְׂאָ֞/ם מֵ/עַ֣ל
    הָ/אָ֗רֶץ יִנָּשְׂא֤וּ הָ/אֽוֹפַנִּים֙ לְ/עֻמָּתָ֔/ם כִּ֛י ר֥וּחַ הַ/חַיָּ֖ה בָּ/אוֹפַנִּֽים׃
translation:
  text: When they went, these went; and when they stood, these stood; and when they
    were lifted up from above the earth, the wheels were lifted up alongside them,
    for the spirit of the living creature was in the wheels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wind' or 'the breath' was in the wheels.
    reason: lexical_alternative
  - marker: b
    text: Or 'corresponding to them' or 'opposite them' for 'alongside them.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the living creature' is singular, possibly referring collectively
      to the living beings as a unified reality.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֶכְתָּם ... יֵלֵכוּ
  chosen: When they went, these went
  alternatives:
  - As they went, they went
  - When they moved, these moved
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct gives a temporal sense, 'when/in
    their going.' The finite verb הלך then states the corresponding action. 'Went'
    is retained rather than 'moved' for formal closeness, though the context clearly
    concerns motion.
- source_word: וּבְעָמְדָם יַעֲמֹדוּ
  chosen: and when they stood, these stood
  alternatives:
  - and when they stopped, these stopped
  lexicon: HALOT
  rationale: עמד commonly means 'stand' or 'remain standing.' 'Stood' preserves the
    repeated, tightly parallel structure of the Hebrew better than the more interpretive
    'stopped.'
- source_word: וּבְהִנָּשְׂאָם
  chosen: and when they were lifted up
  alternatives:
  - and when they rose
  - and when they were raised
  lexicon: HALOT
  rationale: The Niphal of נשׂא is passive/reflexive, 'be lifted up, be carried.'
    'Were lifted up' best preserves the passive nuance and the visionary imagery.
- source_word: מֵעַל הָאָרֶץ
  chosen: from above the earth
  alternatives:
  - from the earth
  - off the ground
  lexicon: HALOT
  rationale: מֵעַל is more specific than simple 'from'; it denotes movement from a
    position over/upon the earth. 'From above the earth' is somewhat literal but reflects
    the Hebrew preposition more precisely than flattening it to 'from the earth.'
- source_word: יִנָּשְׂאוּ הָאוֹפַנִּים
  chosen: the wheels were lifted up
  alternatives:
  - the wheels rose
  - the wheels were raised
  lexicon: HALOT
  rationale: Again the Niphal of נשׂא is passive, matching the prior clause. 'Were
    lifted up' preserves the repeated verbal linkage between the creatures and the
    wheels.
- source_word: לְעֻמָּתָם
  chosen: alongside them
  alternatives:
  - beside them
  - corresponding to them
  - opposite them
  lexicon: HALOT
  rationale: The term indicates being in front of, opposite, or corresponding to something.
    In this context of coordinated movement, 'alongside them' communicates the wheels'
    matched position and motion in idiomatic English. The more literal 'corresponding
    to them' is possible but less natural in the main text.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי here introduces the explanation for the synchronized movement. 'For'
    is concise and preserves the explanatory force.
- source_word: רוּחַ
  chosen: the spirit
  alternatives:
  - the wind
  - the breath
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In this visionary context explaining
    the animating principle shared by creature and wheels, 'spirit' best fits the
    sense without over-specifying beyond the Hebrew.
- source_word: הַחַיָּה
  chosen: the living creature
  alternatives:
  - the living being
  - the creature
  lexicon: HALOT
  rationale: The singular collective noun refers back to the living beings of the
    vision as a class or unified entity. 'The living creature' is a conventional and
    contextually clear rendering, while preserving the singular form.
- source_word: בָּאוֹפַנִּים
  chosen: was in the wheels
  alternatives:
  - was within the wheels
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In the wheels' is the most direct
    rendering and explains the wheels' coordinated motion.
