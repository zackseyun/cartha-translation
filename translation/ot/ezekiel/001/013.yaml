id: EZK.1.13
reference: Ezekiel 1:13
source:
  edition: WLC
  text: וּ/דְמ֨וּת הַ/חַיּ֜וֹת מַרְאֵי/הֶ֣ם כְּ/גַחֲלֵי אֵ֗שׁ בֹּֽעֲרוֹת֙ כְּ/מַרְאֵ֣ה
    הַ/לַּפִּדִ֔ים הִ֕יא מִתְהַלֶּ֖כֶת בֵּ֣ין הַ/חַיּ֑וֹת וְ/נֹ֣גַהּ לָ/אֵ֔שׁ וּ/מִן
    הָ/אֵ֖שׁ יוֹצֵ֥א בָרָֽק־־׃
translation:
  text: And the appearance of the living creatures was like burning coals of fire,
    like the appearance of torches; it was moving about among the living creatures,
    and the fire had brightness, and from the fire lightning was coming out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'like glowing coals of fire' or 'like fiery coals burning.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'it was going back and forth among the living creatures.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''and brightness to the fire''; the sense is that the fire was
      radiant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  chosen: appearance
  alternatives:
  - likeness
  - form
  lexicon: HALOT
  rationale: Though דְּמוּת often means 'likeness' or 'form,' in this visionary context
    it introduces what something looked like. 'Appearance' fits the immediate descriptive
    function and pairs naturally with מַרְאֵיהֶם.
- source_word: הַחַיּוֹת
  chosen: the living creatures
  alternatives:
  - the living beings
  lexicon: HALOT
  rationale: Consistent with Ezekiel 1 usage, חַיּוֹת refers to animate heavenly beings
    seen in the vision. 'Living creatures' is established, clear English without over-specifying
    their identity.
- source_word: מַרְאֵיהֶם
  chosen: the appearance of
  alternatives:
  - their appearance
  - what they looked like
  lexicon: HALOT
  rationale: 'The construct with 3mp suffix is represented idiomatically in English
    by folding it into the clause: ''the appearance of the living creatures was…''
    This preserves the descriptive emphasis of מַרְאֶה.'
- source_word: כְּגַחֲלֵי אֵשׁ בֹּעֲרוֹת
  chosen: like burning coals of fire
  alternatives:
  - like glowing coals of fire
  - like fiery coals burning
  lexicon: HALOT
  rationale: גַּחֲלֵי אֵשׁ denotes fire-coals; בֹּעֲרוֹת adds the sense of actively
    burning. 'Burning coals of fire' preserves both the noun phrase and participial
    vividness.
- source_word: כְּמַרְאֵה הַלַּפִּדִים
  chosen: like the appearance of torches
  alternatives:
  - like the appearance of flaming torches
  - like torches
  lexicon: HALOT
  rationale: לַפִּידִים are torches/flames. 'Torches' is the most direct lexical equivalent;
    the preceding 'appearance of' is retained to mirror the Hebrew comparison structure.
- source_word: הִיא
  chosen: it
  alternatives:
  - this
  - he/she
  lexicon: HALOT
  rationale: The feminine singular pronoun most naturally refers back to the fiery
    appearance just described rather than to the creatures themselves. English 'it'
    best captures this impersonal referent.
- source_word: מִתְהַלֶּכֶת
  chosen: was moving about
  alternatives:
  - was going back and forth
  - was moving to and fro
  - was walking about
  lexicon: HALOT
  rationale: The hitpael of הלך conveys repeated or roaming motion. 'Was moving about'
    is natural English and preserves the ongoing, active movement in the vision.
- source_word: בֵּין הַחַיּוֹת
  chosen: among the living creatures
  alternatives:
  - between the living creatures
  lexicon: HALOT
  rationale: Though בֵּין is often 'between,' with a plural collective in English
    'among' better conveys movement in the midst of multiple beings.
- source_word: וְנֹגַהּ לָאֵשׁ
  chosen: the fire had brightness
  alternatives:
  - there was brightness to the fire
  - the fire was radiant
  - brightness belonged to the fire
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness, radiance, or shining. The lamed marks relation/possession.
    'The fire had brightness' is concise and preserves the predicative sense without
    over-paraphrase.
- source_word: וּמִן הָאֵשׁ יוֹצֵא בָרָק
  chosen: from the fire lightning was coming out
  alternatives:
  - from the fire came lightning
  - lightning was going out from the fire
  lexicon: HALOT
  rationale: יֹצֵא is a participle, giving vivid ongoing action. 'Was coming out'
    preserves the aspect better than a simple past, while 'lightning' is the standard
    gloss for בָּרָק.
