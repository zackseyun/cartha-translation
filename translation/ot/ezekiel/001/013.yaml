theological_decisions:
- issue: Referent of the feminine singular pronoun הִיא in the visionary description
  chosen_reading: It refers to the fiery appearance/fire moving among the living creatures,
    not to one creature individually.
  alternative_readings:
  - It refers more generally to the appearance/likeness as a whole.
  - It personifies the fire-like phenomenon.
  rationale: The nearest coherent feminine antecedents are the descriptive nouns for
    appearance/fire imagery, and the following clauses continue describing the fire's
    brightness and lightning. Rendering 'it' preserves the ambiguity of the exact
    antecedent while avoiding an unwarranted personalizing interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
