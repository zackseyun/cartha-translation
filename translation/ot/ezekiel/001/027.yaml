theological_decisions:
- issue: Referent of the anthropomorphic description in the vision
  chosen_reading: Use 'his waist' and 'around him' to reflect the masculine singular
    suffixes in the Hebrew without over-identifying the figure beyond the text.
  alternative_readings:
  - Use impersonal 'its waist'/'around it' to avoid anthropomorphic specificity
  rationale: The Hebrew suffixes are masculine singular, and the immediate context
    describes the likeness of a human form. Rendering with 'his' preserves the source
    grammar and the text's anthropomorphic imagery while not making claims beyond
    Ezekiel's visionary description.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral);
    §3 (Preserve theological tension rather than resolve it)
