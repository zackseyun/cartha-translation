id: EZK.1.27
reference: Ezekiel 1:27
source:
  edition: WLC
  text: וָ/אֵ֣רֶא כְּ/עֵ֣ין חַשְׁמַ֗ל כְּ/מַרְאֵה אֵ֤שׁ בֵּֽית לָ/הּ֙ סָבִ֔יב מִ/מַּרְאֵ֥ה
    מָתְנָ֖י/ו וּ/לְ/מָ֑עְלָ/ה וּ/מִ/מַּרְאֵ֤ה מָתְנָי/ו֙ וּ/לְ/מַ֔טָּה רָאִ֨יתִי֙
    כְּ/מַרְאֵה אֵ֔שׁ וְ/נֹ֥גַֽהּ ל֖/וֹ סָבִֽיב׀־־־׃
translation:
  text: And I saw something like the appearance of glowing metal, like the appearance
    of fire enclosed all around, from the appearance of his waist and upward; and
    from the appearance of his waist and downward I saw something like the appearance
    of fire, and brightness all around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חַשְׁמַל (hashmal) is uncertain; possible renderings include 'amber'
      or 'electrum' (a bright metal alloy).
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase rendered 'enclosed all around' is difficult; it may describe
      the fire as appearing within an enclosing brightness or casing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/עֵין
  chosen: something like
  alternatives:
  - like the gleam of
  - like the appearance of
  lexicon: HALOT
  rationale: The construction introduces comparison rather than direct identification.
    'Something like' preserves Ezekiel's visionary hesitation and avoids over-precision.
- source_word: חַשְׁמַל
  chosen: glowing metal
  alternatives:
  - amber
  - electrum
  - brilliant metal
  lexicon: HALOT
  rationale: The term is rare and uncertain. 'Amber' is traditional but likely too
    specific and potentially misleading as fossil resin; 'electrum' is precise but
    too technical for the target audience. 'Glowing metal' captures the luminous metallic
    sense in readable English, while preserving uncertainty in a footnote.
- source_word: כְּ/מַרְאֵה
  chosen: the appearance of
  alternatives:
  - like
  - what looked like
  lexicon: HALOT
  rationale: This repeated term is central to the verse's phenomenological language.
    Rendering it consistently as 'the appearance of' preserves the visionary, non-literal
    framing.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Standard rendering; no contextual reason to vary.
- source_word: בֵּית לָהּ סָבִיב
  chosen: enclosed all around
  alternatives:
  - within it all around
  - with a surrounding enclosure
  - in a casing all around
  lexicon: HALOT
  rationale: The phrase is difficult, literally involving 'house/interior to it around.'
    In context it likely describes the fire as having an enclosing or encased appearance.
    'Enclosed all around' is idiomatic and preserves the sense without forcing a highly
    technical image.
- source_word: מָתְנָיו
  chosen: his waist
  alternatives:
  - his loins
  - his hips
  lexicon: HALOT
  rationale: '''Waist'' is natural modern English and fits the bodily reference in
    the vision. ''Loins'' is more traditional but archaic and potentially distracting.'
- source_word: וּלְמָעְלָה
  chosen: and upward
  alternatives:
  - and above
  - upward from there
  lexicon: HALOT
  rationale: This pairs naturally with 'from the appearance of his waist' and preserves
    the spatial orientation.
- source_word: וּלְמַטָּה
  chosen: and downward
  alternatives:
  - and below
  - downward from there
  lexicon: HALOT
  rationale: Balances 'and upward' and preserves the spatial symmetry of the verse.
- source_word: וְנֹגַהּ לוֹ סָבִיב
  chosen: and brightness all around him
  alternatives:
  - and radiance around it
  - with brightness surrounding him
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness or radiance. The pronominal suffix is masculine
    here, naturally referring back to the figure described. 'Brightness all around
    him' is concise and vivid.
