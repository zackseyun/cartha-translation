id: EZK.1.17
reference: Ezekiel 1:17
source:
  edition: WLC
  text: עַל אַרְבַּ֥עַת רִבְעֵי/הֶ֖ן בְּ/לֶכְתָּ֣/ם יֵלֵ֑כוּ לֹ֥א יִסַּ֖בּוּ בְּ/לֶכְתָּֽ/ן־׃
translation:
  text: They went on their four sides as they moved; they did not turn as they went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They went in any of their four directions as they moved; they did not
      turn as they went.' The Hebrew expression 'their four sides/quarters' can be
      understood as spatial sides or directions.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: 'on'
  alternatives:
  - toward
  - upon
  - according to
  lexicon: HALOT
  rationale: With אַרְבַּעַת רִבְעֵיהֶן, the preposition introduces the manner or
    orientation of movement. In English, 'on their four sides' best preserves the
    spatial sense without over-interpreting.
- source_word: אַרְבַּעַת
  chosen: four
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying 'sides/quarters.'
- source_word: רִבְעֵיהֶן
  chosen: their sides
  alternatives:
  - their four directions
  - their quarters
  lexicon: HALOT
  rationale: The noun denotes quarters/sides. 'Sides' is more natural in English here
    and fits the visionary description of movement in relation to the four-faced living
    creatures/wheels. 'Directions' is possible but slightly more interpretive.
- source_word: בְּלֶכְתָּם
  chosen: as they moved
  alternatives:
  - when they went
  - in their going
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys contemporaneous action.
    'As they moved' is idiomatic modern English and preserves the temporal sense.
- source_word: יֵלֵכוּ
  chosen: they went on
  alternatives:
  - they went
  - they would go
  - they proceeded
  lexicon: HALOT
  rationale: The imperfect here describes characteristic action in the vision. 'Went
    on' conveys continued motion and avoids awkward repetition with the following
    phrase.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard English negation with the following finite verb.
- source_word: יִסַּבּוּ
  chosen: turn
  alternatives:
  - turn aside
  - change direction
  - go around
  lexicon: HALOT
  rationale: The Niphal of סבב here refers to turning from one's course. 'Turn' is
    the clearest and least over-interpreted rendering in context.
- source_word: בְּלֶכְתָּן
  chosen: as they went
  alternatives:
  - when they went
  - in their going
  lexicon: HALOT
  rationale: Again a temporal infinitive construct with ב. The feminine plural suffix
    likely agrees with the nearer feminine referent in the vision, but English need
    not mark the gender; 'as they went' preserves the sense.
