id: EZK.1.25
reference: Ezekiel 1:25
source:
  edition: WLC
  text: וַ/יְהִי ק֕וֹל מֵ/עַ֕ל לָ/רָקִ֖יעַ אֲשֶׁ֣ר עַל רֹאשָׁ֑/ם בְּ/עָמְדָ֖/ם תְּרַפֶּ֥ינָה
    כַנְפֵי/הֶֽן־־׃
translation:
  text: And there was a sound from above the expanse that was over their heads; when
    they stood still, they let down their wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a voice from above the expanse.' The Hebrew word qol can mean either
      'sound' or 'voice'; 'sound' is retained in the main text because the clause
      does not yet specify articulated speech.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''firmament'' for ''expanse.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And there was
  alternatives:
  - And it came to pass
  - Then there was
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces the occurrence of a phenomenon.
    'And there was' is natural modern English and preserves the narrative progression
    without archaic phrasing like 'it came to pass.'
- source_word: קוֹל
  chosen: a sound
  alternatives:
  - a voice
  - a noise
  lexicon: HALOT
  rationale: קוֹל can mean 'sound,' 'voice,' or 'noise.' In this immediate clause
    the source of the sound is not yet identified as speech, so 'sound' best preserves
    the ambiguity. 'Voice' is possible, but would over-specify before the context
    makes that explicit.
- source_word: מֵעַל לָרָקִיעַ
  chosen: from above the expanse
  alternatives:
  - from above the firmament
  - from over the expanse
  lexicon: HALOT
  rationale: מֵעַל indicates source from above/over. רָקִיעַ is rendered 'expanse'
    rather than the traditional 'firmament' for readable modern English while retaining
    the spatial imagery. 'From above the expanse' is the most natural English sequence.
- source_word: אֲשֶׁר עַל רֹאשָׁם
  chosen: that was over their heads
  alternatives:
  - which was over their heads
  - that was above their heads
  lexicon: HALOT
  rationale: The relative clause modifies 'the expanse.' 'That was over their heads'
    is idiomatic and accurately reflects the spatial relation.
- source_word: בְּעָמְדָם
  chosen: when they stood still
  alternatives:
  - when they stood
  - as they stood
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance.
    In context of the living creatures' movement and stopping, 'when they stood still'
    brings out the sense of ceasing motion more clearly than the bare 'when they stood.'
- source_word: תְּרַפֶּינָה
  chosen: they let down
  alternatives:
  - they lowered
  - they relaxed
  lexicon: HALOT
  rationale: From רפה in the Hiphil, the verb conveys slackening, relaxing, or letting
    drop. With 'wings' as subject/object relation in context, 'they let down' communicates
    that the wings were no longer extended in motion. 'Relaxed' is too abstract in
    English here.
- source_word: כַנְפֵיהֶן
  chosen: their wings
  lexicon: HALOT
  rationale: Standard rendering of כָּנָף in the plural construct with 3fp suffix.
    The feminine plural suffix matches the grammatical form of the living creatures'
    wings in context.
