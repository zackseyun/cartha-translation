theological_decisions:
- issue: Visionary analogy language
  chosen_reading: Preserve Ezekiel's repeated markers of resemblance ('likeness,'
    'appearance,' 'like') rather than simplifying them into direct description.
  alternative_readings:
  - Reduce to a smoother direct statement such as 'there was an expanse of dazzling
    crystal above their heads'
  rationale: The verse presents a prophetic vision using careful analogical language.
    Preserving that tension avoids overstating what Ezekiel claims to have seen and
    aligns with the translation philosophy of not resolving ambiguity or visionary
    indirection beyond the source text.
  doctrine_reference: Translation philosophy §3
