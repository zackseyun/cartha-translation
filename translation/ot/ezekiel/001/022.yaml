id: EZK.1.22
reference: Ezekiel 1:22
source:
  edition: WLC
  text: וּ/דְמ֞וּת עַל רָאשֵׁ֤י הַ/חַיָּה֙ רָקִ֔יעַ כְּ/עֵ֖ין הַ/קֶּ֣רַח הַ/נּוֹרָ֑א
    נָט֥וּי עַל רָאשֵׁי/הֶ֖ם מִ/לְ/מָֽעְלָ/ה־־׃
translation:
  text: And above the heads of the living creature there was the likeness of an expanse,
    like the appearance of awe-inspiring ice, stretched out above their heads from
    above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the living beings' / 'the living creatures'; the Hebrew uses a singular
      collective expression here, though the verse later refers to 'their heads.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'crystal.' The Hebrew word more commonly means 'ice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  chosen: And ... there was the likeness of
  alternatives:
  - And the likeness of
  - And a likeness was
  lexicon: HALOT
  rationale: דְּמוּת denotes 'likeness, form, resemblance.' In Ezekiel's vision report
    it often signals analogical description rather than direct identification, so
    'likeness of' is preserved rather than flattened to 'something like.' The prefixed
    conjunction is rendered 'And' to maintain the narrative sequence.
- source_word: הַחַיָּה
  chosen: the living creature
  alternatives:
  - the living beings
  - the living creatures
  lexicon: HALOT
  rationale: Although the singular form appears here, the following plural suffixes
    ('their heads') show a collective sense. 'The living creature' reflects the singular
    Hebrew while allowing the collective reference to emerge in context; the plural
    alternative is preserved in a footnote because English readers may expect agreement
    with the later plural pronouns.
- source_word: רָקִיעַ
  chosen: an expanse
  alternatives:
  - a firmament
  - a vault
  lexicon: HALOT
  rationale: רָקִיעַ refers to something spread out or extended overhead. 'Expanse'
    is the most natural modern English rendering and avoids the archaic feel of 'firmament'
    while preserving the spatial imagery better than the more interpretive 'vault.'
- source_word: כְּעֵין
  chosen: like the appearance of
  alternatives:
  - like
  - like the look of
  lexicon: HALOT
  rationale: 'The phrase intensifies Ezekiel''s analogical language: not identity
    but visual resemblance. ''Like the appearance of'' preserves the layered comparison
    characteristic of the chapter.'
- source_word: הַקֶּרַח
  chosen: ice
  alternatives:
  - crystal
  - frost
  lexicon: HALOT
  rationale: The noun normally denotes 'ice.' Some English traditions use 'crystal,'
    likely influenced by contextual interpretation and comparison with similar visionary
    language elsewhere, but the Hebrew here more directly supports 'ice.' The traditional
    alternative is preserved in a footnote.
- source_word: הַנּוֹרָא
  chosen: awe-inspiring
  alternatives:
  - awesome
  - fearsome
  - terrifying
  lexicon: HALOT
  rationale: From ירא, the participial/adjectival form conveys something that evokes
    fear, awe, or dread. 'Awe-inspiring' captures the reverential terror of the vision
    without sounding colloquial ('awesome') or overly one-sided toward mere fright
    ('terrifying').
- source_word: נָטוּי
  chosen: stretched out
  alternatives:
  - spread out
  - extended
  lexicon: HALOT
  rationale: The passive participial form from נטה describes something extended overhead.
    'Stretched out' is vivid, natural English and fits the visual scene.
- source_word: מִלְמָעְלָה
  chosen: from above
  alternatives:
  - upward
  - overhead
  lexicon: HALOT
  rationale: The adverbial phrase indicates position from above/overhead. 'From above'
    is a close rendering, though in English it sounds slightly redundant with 'above
    their heads'; the redundancy mirrors the Hebrew emphasis on vertical placement.
