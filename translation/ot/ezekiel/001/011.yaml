id: EZK.1.11
reference: Ezekiel 1:11
source:
  edition: WLC
  text: וּ/פְנֵי/הֶ֕ם וְ/כַנְפֵי/הֶ֥ם פְּרֻד֖וֹת מִ/לְ/מָ֑עְלָ/ה לְ/אִ֗ישׁ שְׁ֚תַּיִם
    חֹבְר֣וֹת אִ֔ישׁ וּ/שְׁתַּ֣יִם מְכַסּ֔וֹת אֵ֖ת גְּוִיֹתֵי/הֶֽנָה׃
translation:
  text: And their faces and their wings were separated above; each had two joined
    to another, and two covering their bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were spread out above.' The Hebrew verb primarily means 'were separated/divided,'
      but in context it may imply that the wings were extended upward.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for each one, two were joined, each, and two were covering their
      bodies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְנֵיהֶם
  chosen: their faces
  alternatives:
  - their face(s)
  lexicon: HALOT
  rationale: פָּנִים is formally plural and commonly rendered 'face/faces' depending
    on context. Here the plural suits the repeated description of the four living
    creatures and matches the Hebrew form without forcing a singular collective.
- source_word: וְכַנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Standard rendering of כָּנָף in this visionary creature context.
- source_word: פְּרֻדוֹת
  chosen: were separated
  alternatives:
  - were spread out
  - were divided
  lexicon: HALOT
  rationale: From פרד, 'to separate/divide.' The sense is that the faces and wings
    were distinct or parted above. 'Separated' preserves the lexical core better than
    the more interpretive 'spread out,' though the latter is possible from context.
- source_word: מִלְמָעְלָה
  chosen: above
  alternatives:
  - from above
  - upward
  lexicon: HALOT
  rationale: Adverbial phrase indicating the upward location/orientation of the separation.
    'Above' is concise and natural in English.
- source_word: לְאִישׁ
  chosen: each
  alternatives:
  - to each
  - for each one
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each' in this construction. This avoids awkwardly
    literal repetition while preserving the distributive force.
- source_word: שְׁתַּיִם חֹבְרוֹת אִישׁ
  chosen: two joined to another
  alternatives:
  - two touching another
  - two joined one to another
  lexicon: HALOT
  rationale: חבר means 'join/connect.' The phrase describes two wings of each creature
    being connected with those of another. 'Joined to another' is readable and faithful;
    'touching' is possible but less explicit than the Hebrew verb.
- source_word: וּשְׁתַּיִם מְכַסּוֹת
  chosen: and two covering
  alternatives:
  - and two were covering
  lexicon: HALOT
  rationale: The participle מְכַסּוֹת gives an ongoing descriptive sense. English
    can render this naturally as 'and two covering' within the verbless descriptive
    clause.
- source_word: אֵת גְּוִיֹתֵיהֶנָה
  chosen: their bodies
  alternatives:
  - their body
  - their backs
  lexicon: HALOT
  rationale: גְּוִיָּה denotes body/corpse; here plainly 'bodies.' Some translations
    render 'bodies' from context, while 'backs' is too specific for this noun in this
    form.
