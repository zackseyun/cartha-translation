id: EZK.1.14
reference: Ezekiel 1:14
source:
  edition: WLC
  text: וְ/הַ/חַיּ֖וֹת רָצ֣וֹא וָ/שׁ֑וֹב כְּ/מַרְאֵ֖ה הַ/בָּזָֽק׃
translation:
  text: And the living creatures were darting back and forth, like the appearance
    of lightning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the living creatures ran and returned, like the appearance
      of lightning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחַיּוֹת
  chosen: And the living creatures
  alternatives:
  - And the creatures
  - Now the living beings
  lexicon: HALOT
  rationale: חַיּוֹת literally means 'living things/creatures.' In Ezekiel 1 this
    term refers to the animated beings of the vision. 'Living creatures' is natural
    English and preserves the descriptive force without prematurely importing later
    identification from 10:20.
- source_word: רָצוֹא וָשׁוֹב
  chosen: were darting back and forth
  alternatives:
  - ran and returned
  - were going to and fro
  - kept moving back and forth
  lexicon: HALOT
  rationale: The paired infinitive absolutes from רוץ ('run') and שוב ('return') express
    rapid repeated motion. English needs a finite verbal expression; 'were darting
    back and forth' captures the iterative, swift movement better than the more wooden
    'ran and returned,' while staying close to the imagery.
- source_word: כְּמַרְאֵה
  chosen: like the appearance of
  alternatives:
  - like
  - in appearance like
  lexicon: HALOT
  rationale: מַרְאֶה denotes appearance, sight, or visual form. Retaining 'appearance'
    reflects Ezekiel's visionary language and avoids flattening the comparison into
    a bare simile.
- source_word: הַבָּזָק
  chosen: lightning
  alternatives:
  - a flash of lightning
  - the lightning flash
  lexicon: HALOT
  rationale: בָּזָק denotes lightning or a lightning flash. 'Lightning' is concise
    and idiomatic in English; the preceding 'like the appearance of' already conveys
    the visual comparison.
