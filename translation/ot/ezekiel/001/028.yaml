id: EZK.1.28
reference: Ezekiel 1:28
source:
  edition: WLC
  text: כְּ/מַרְאֵ֣ה הַ/קֶּ֡שֶׁת אֲשֶׁר֩ יִֽהְיֶ֨ה בֶ/עָנָ֜ן בְּ/י֣וֹם הַ/גֶּ֗שֶׁם
    כֵּ֣ן מַרְאֵ֤ה הַ/נֹּ֨גַהּ֙ סָבִ֔יב ה֕וּא מַרְאֵ֖ה דְּמ֣וּת כְּבוֹד יְהוָ֑ה וָֽ/אֶרְאֶה֙
    וָ/אֶפֹּ֣ל עַל פָּנַ֔/י וָ/אֶשְׁמַ֖ע ק֥וֹל מְדַבֵּֽר־־׃ס
translation:
  text: Like the appearance of the rainbow that is in the cloud on a day of rain,
    so was the appearance of the brightness all around. This was the appearance of
    the likeness of the glory of the LORD. When I saw it, I fell on my face, and I
    heard the voice of one speaking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the bow'; in this context, with cloud and rain, it refers to a rainbow.
    reason: lexical_alternative
  - marker: b
    text: Or 'radiance' for 'brightness.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression is literally 'the appearance of the likeness of the
      glory of the LORD,' preserving multiple layers of qualification in Ezekiel's
      vision report.
    reason: cultural_note
  - marker: d
    text: Or 'I heard a voice speaking.' The Hebrew does not explicitly identify the
      speaker in this clause.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּמַרְאֵה
  chosen: Like the appearance of
  alternatives:
  - Like the sight of
  - As the appearance of
  lexicon: HALOT
  rationale: מַרְאֶה denotes visible appearance or sight. Rendering with 'appearance'
    preserves Ezekiel's repeated visual-language pattern and the simile introduced
    by כְּ.
- source_word: הַקֶּשֶׁת
  chosen: the rainbow
  alternatives:
  - the bow
  lexicon: HALOT
  rationale: Though literally 'the bow,' in this meteorological context with cloud
    and rain it clearly refers to a rainbow. 'Rainbow' communicates the plain sense
    in modern English.
- source_word: אֲשֶׁר יִהְיֶה בֶעָנָן בְּיוֹם הַגֶּשֶׁם
  chosen: that is in the cloud on a day of rain
  alternatives:
  - that appears in the cloud on a rainy day
  lexicon: HALOT
  rationale: The clause describes the normal setting of a rainbow. 'Is in the cloud'
    stays close to the Hebrew while remaining natural enough in English.
- source_word: כֵּן מַרְאֵה הַנֹּגַהּ סָבִיב
  chosen: so was the appearance of the brightness all around
  alternatives:
  - so was the appearance of the radiance all around
  - so was the look of the surrounding brightness
  lexicon: HALOT
  rationale: נֹגַהּ refers to brightness, shining, or radiance. 'Brightness' is accessible
    and fits the visual emphasis. סָבִיב is rendered 'all around' to convey surrounding
    brilliance.
- source_word: הוּא
  chosen: This was
  alternatives:
  - It was
  - That was
  lexicon: HALOT
  rationale: The pronoun resumes and identifies the preceding phenomenon. 'This was'
    works idiomatically in English to introduce the explanatory statement.
- source_word: מַרְאֵה דְּמוּת כְּבוֹד יְהוָה
  chosen: the appearance of the likeness of the glory of the LORD
  alternatives:
  - the appearance of the form of the glory of the LORD
  - the likeness of the appearance of the glory of the LORD
  lexicon: HALOT
  rationale: 'The stacked nouns are deliberate and should be preserved rather than
    flattened. Ezekiel carefully qualifies the vision: not a direct claim to see God''s
    essence, but the appearance of the likeness of his glory. יְהוָה follows the project
    default ''the LORD''.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: וָאֶרְאֶה
  chosen: When I saw it
  alternatives:
  - And I saw
  - When I saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Supplying 'it' makes the
    English natural by referring back to the vision just described.
- source_word: וָאֶפֹּל עַל פָּנַי
  chosen: I fell on my face
  alternatives:
  - I fell facedown
  lexicon: HALOT
  rationale: This is a standard idiom for prostration in awe or submission. 'I fell
    on my face' preserves the idiom's force and familiarity.
- source_word: וָאֶשְׁמַע קוֹל מְדַבֵּר
  chosen: I heard the voice of one speaking
  alternatives:
  - I heard a voice speaking
  - I heard the sound of someone speaking
  lexicon: HALOT
  rationale: קוֹל can mean 'voice' or 'sound'; here 'voice' best fits the following
    participle. Since מְדַבֵּר lacks an explicit subject, 'of one speaking' preserves
    the Hebrew's indefiniteness better than specifying the speaker.
