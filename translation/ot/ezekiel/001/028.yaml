theological_decisions:
- issue: Rendering the layered expression describing the divine manifestation
  chosen_reading: the appearance of the likeness of the glory of the LORD
  alternative_readings:
  - the likeness of the glory of the LORD
  - the appearance of the glory of the LORD
  rationale: The Hebrew piles up qualifiers (appearance/likeness/glory) that guard
    against an over-direct identification of the vision with God's essence. Preserving
    the full chain maintains the text's theological restraint and visionary character
    rather than simplifying it into a more direct statement.
  doctrine_reference: Translation philosophy §3; Contested terms table for יְהוָה
- issue: Identifying the speaker in the final clause
  chosen_reading: the voice of one speaking
  alternative_readings:
  - the voice of him who was speaking
  - a voice speaking
  rationale: The Hebrew participle does not explicitly identify the speaker. Retaining
    the indefiniteness preserves the narrative tension and avoids importing a more
    specific theological identification than the verse itself states.
  doctrine_reference: Translation philosophy §3
