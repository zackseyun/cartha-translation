id: EZK.1.18
reference: Ezekiel 1:18
source:
  edition: WLC
  text: וְ/גַ֨בֵּי/הֶ֔ן וְ/גֹ֥בַהּ לָ/הֶ֖ם וְ/יִרְאָ֣ה לָ/הֶ֑ם וְ/גַבֹּתָ֗/ם מְלֵאֹ֥ת
    עֵינַ֛יִם סָבִ֖יב לְ/אַרְבַּעְתָּֽ/ן׃
translation:
  text: As for their rims, they were high and fearsome, and the rims of all four were
    full of eyes all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'awesome'; the Hebrew term denotes something that inspires fear or dread.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּבֵּיהֶן
  chosen: their rims
  alternatives:
  - their backs
  - their sides
  - their felloes
  lexicon: HALOT
  rationale: In the wheel context of Ezekiel 1:15–21, גב refers to the rim or outer
    structure of a wheel. 'Rims' is clear modern English and fits the imagery better
    than archaic 'felloes.'
- source_word: גֹבַהּ
  chosen: high
  alternatives:
  - height
  lexicon: HALOT
  rationale: The noun denotes height. In English, predicative 'they were high' is
    more natural than a literal but awkward 'height was to them.'
- source_word: יִרְאָה
  chosen: fearsome
  alternatives:
  - awesome
  - terrifying
  - dread
  lexicon: HALOT
  rationale: The noun literally denotes fear/dread. 'Fearsome' preserves the sense
    that the appearance inspired fear without overinterpreting as moral reverence.
    'Awesome' in modern English can sound weakened or colloquial.
- source_word: לָהֶם
  chosen: they were
  alternatives:
  - to them
  - for them
  lexicon: Hebrew grammar
  rationale: The repeated לָהֶם is retained idiomatically in English through predication
    ('they were high and fearsome'), reflecting the descriptive force rather than
    woodenly reproducing the preposition.
- source_word: גַּבֹּתָם
  chosen: the rims
  alternatives:
  - their rims
  lexicon: HALOT
  rationale: Same lexical item as the opening term, again referring to the wheel rims.
    Rendered with explicit article in English for smoother style before 'of all four.'
- source_word: מְלֵאֹת עֵינַיִם
  chosen: full of eyes
  alternatives:
  - covered with eyes
  lexicon: HALOT
  rationale: A close rendering of the Hebrew participial phrase. 'Full of eyes' preserves
    the vivid, strange imagery without softening it.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: HALOT
  rationale: '''All around'' is natural modern English and conveys the comprehensive
    surrounding sense.'
- source_word: לְאַרְבַּעְתָּן
  chosen: of all four
  alternatives:
  - for the four of them
  - for all four
  lexicon: Hebrew grammar
  rationale: 'Refers to the four wheels. ''Of all four'' expresses the distributive
    sense clearly in English: each of the four rims was full of eyes all around.'
