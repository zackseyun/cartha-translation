id: EZK.1.2
reference: Ezekiel 1:2
source:
  edition: WLC
  text: בַּ/חֲמִשָּׁ֖ה לַ/חֹ֑דֶשׁ הִ֚יא הַ/שָּׁנָ֣ה הַ/חֲמִישִׁ֔ית לְ/גָל֖וּת הַ/מֶּ֥לֶךְ
    יוֹיָכִֽין׃
translation:
  text: On the fifth day of the month—it was the fifth year of the exile of King Jehoiachin—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deportation of King Jehoiachin.' The Hebrew גָּלוּת can denote exile
      or deportation; 'exile' was chosen as the broader and more idiomatic chronological
      reference.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/חֲמִשָּׁה
  chosen: On the fifth day
  alternatives:
  - On the fifth
  - On the fifth day
  lexicon: HALOT
  rationale: The preposition ב plus the cardinal 'five' in date formula functions
    idiomatically as 'on the fifth day.' English normally supplies 'day' for clarity
    in calendrical expressions.
- source_word: לַ/חֹדֶשׁ
  chosen: of the month
  alternatives:
  - of the month
  - in the month
  lexicon: HALOT
  rationale: In Hebrew dating formulas, ל + חֹדֶשׁ commonly completes the expression
    'on the fifth day of the month.' 'Of the month' is the most natural English rendering
    here.
- source_word: הִיא
  chosen: it was
  alternatives:
  - it was
  - this was
  lexicon: HALOT
  rationale: The independent pronoun is resumptive/emphatic, linking this verse to
    the dating notice. 'It was' gives natural English while preserving the explanatory
    force.
- source_word: הַ/שָּׁנָה הַ/חֲמִישִׁית
  chosen: the fifth year
  alternatives:
  - the fifth year
  lexicon: HALOT
  rationale: Straightforward ordinal dating expression; rendered formally and clearly.
- source_word: לְ/גָלוּת
  chosen: of the exile
  alternatives:
  - of the exile
  - of the deportation
  - since the exile
  lexicon: HALOT
  rationale: The noun denotes exile/deportation. 'Of the exile' fits the construct
    chain and preserves the state of banishment as the chronological reference point.
    'Deportation' is possible but narrower and less idiomatic in this formula.
- source_word: הַ/מֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  - King
  lexicon: HALOT
  rationale: 'In English, royal title before a personal name is naturally rendered
    without the article: ''King Jehoiachin,'' though Hebrew has the article in the
    construct phrase.'
- source_word: יוֹיָכִין
  chosen: Jehoiachin
  alternatives:
  - Jehoiachin
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
