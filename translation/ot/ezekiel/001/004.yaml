theological_decisions:
- issue: Rendering of visionary imagery without over-interpreting the theophany
  chosen_reading: Descriptive, phenomenological language ('something like the appearance
    of glowing metal')
  alternative_readings:
  - More interpretive renderings that identify the substance more precisely, such
    as 'amber' or 'electrum'
  rationale: The verse presents a theophanic vision in deliberately analogical language.
    The translation preserves Ezekiel's visual approximations rather than resolving
    the imagery into a precise material identification the Hebrew does not securely
    provide.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
