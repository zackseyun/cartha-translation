id: EZK.1.4
reference: Ezekiel 1:4
source:
  edition: WLC
  text: וָ/אֵ֡רֶא וְ/הִנֵּה֩ ר֨וּחַ סְעָרָ֜ה בָּאָ֣ה מִן הַ/צָּפ֗וֹן עָנָ֤ן גָּדוֹל֙
    וְ/אֵ֣שׁ מִתְלַקַּ֔חַת וְ/נֹ֥גַֽהּ ל֖/וֹ סָבִ֑יב וּ/מִ֨/תּוֹכָ֔/הּ כְּ/עֵ֥ין הַ/חַשְׁמַ֖ל
    מִ/תּ֥וֹךְ הָ/אֵֽשׁ־׃
translation:
  text: 'And I looked, and behold, a storm wind was coming from the north: a great
    cloud, with fire flashing continually, and brightness around it; and from its
    midst was something like the appearance of glowing metal, from the midst of the
    fire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a whirlwind.' The Hebrew phrase can denote a violent windstorm; traditional
      English often has 'whirlwind.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew hashmal, a rare term of uncertain meaning; possibly 'electrum' or
      'amber-like glow.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fire infolding itself' (traditional rendering). The Hebrew expression
      is difficult and may describe fire in continual, self-intensifying motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  chosen: And I looked
  alternatives:
  - And I saw
  lexicon: HALOT
  rationale: The verb ראה commonly means 'see,' but in English prophetic vision reports
    often read more naturally as 'looked' when followed by 'behold,' preserving the
    sense of directed visual attention without redundancy ('I saw, and behold').
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force of הִנֵּה in a vivid vision
    narrative. Though somewhat elevated, 'behold' best preserves the suddenness and
    rhetorical force.
- source_word: רוּחַ סְעָרָה
  chosen: a storm wind
  alternatives:
  - a whirlwind
  - a tempestuous wind
  lexicon: HALOT
  rationale: The phrase denotes a violent windstorm. 'Storm wind' is more lexically
    transparent than the traditional 'whirlwind,' which can suggest a specific rotating
    funnel not required by the Hebrew.
- source_word: בָּאָה מִן הַצָּפוֹן
  chosen: was coming from the north
  alternatives:
  - came from the north
  - was coming out of the north
  lexicon: HALOT
  rationale: The participial/finite sequence in context presents the scene as unfolding
    before Ezekiel. 'Was coming' captures the visionary immediacy better than simple
    past.
- source_word: עָנָן גָּדוֹל
  chosen: a great cloud
  alternatives:
  - a huge cloud
  - a massive cloud
  lexicon: HALOT
  rationale: A straightforward rendering preserving the grandeur without colloquial
    tone.
- source_word: אֵשׁ מִתְלַקַּחַת
  chosen: fire flashing continually
  alternatives:
  - fire infolding itself
  - fire taking hold of itself
  - fire continually kindling
  lexicon: HALOT
  rationale: The hitpael of לקח here is difficult and traditionally rendered 'infolding
    itself,' but the sense is of fire in continual motion/intensification. 'Flashing
    continually' communicates active, self-renewing fiery movement in readable modern
    English while staying within the semantic range suggested by major lexicons and
    context.
- source_word: נֹגַהּ לוֹ סָבִיב
  chosen: brightness around it
  alternatives:
  - radiance around it
  - a glow all around it
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness or radiance. The pronoun likely refers to the
    storm-cloud/fire complex; 'around it' is concise and natural.
- source_word: וּמִתּוֹכָהּ
  chosen: and from its midst
  alternatives:
  - and from the midst of it
  - and out of its midst
  lexicon: HALOT
  rationale: Preserves the repeated 'midst' language that structures the vision while
    using natural English.
- source_word: כְּעֵין
  chosen: something like the appearance of
  alternatives:
  - like the look of
  - like the appearance of
  lexicon: HALOT
  rationale: עַיִן in this idiom means 'appearance' or 'look.' Adding 'something'
    smooths the English and reflects Ezekiel's cautious visionary comparison.
- source_word: הַחַשְׁמַל
  chosen: glowing metal
  alternatives:
  - amber
  - electrum
  - brilliant alloy
  lexicon: HALOT
  rationale: חַשְׁמַל is a rare and uncertain term. Traditional 'amber' is likely
    too specific and probably inaccurate; many modern interpreters understand a shining
    metallic substance, often electrum. 'Glowing metal' preserves the visual effect
    without overclaiming lexical certainty.
- source_word: מִתּוֹךְ הָאֵשׁ
  chosen: from the midst of the fire
  alternatives:
  - from within the fire
  - out of the fire
  lexicon: HALOT
  rationale: Keeps the repetition of 'midst' found in the Hebrew, which contributes
    to the layered, emerging quality of the vision.
