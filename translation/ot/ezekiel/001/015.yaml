theological_decisions:
- issue: Referent and number in לְאַרְבַּעַת פָּנָיו
  chosen_reading: 'Render distributively: ''for each of their four faces'''
  alternative_readings:
  - '''with its four faces'''
  - '''corresponding to its four faces'''
  rationale: The singular suffix after the plural 'living creatures' is naturally
    taken as distributive in Hebrew. Since each creature has four faces in the immediate
    context, the translation should preserve that relationship without implying a
    different visionary structure than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than overstate certainty.
