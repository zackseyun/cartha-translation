id: EZK.1.15
reference: Ezekiel 1:15
source:
  edition: WLC
  text: וָ/אֵ֖רֶא הַ/חַיּ֑וֹת וְ/הִנֵּה֩ אוֹפַ֨ן אֶחָ֥ד בָּ/אָ֛רֶץ אֵ֥צֶל הַ/חַיּ֖וֹת
    לְ/אַרְבַּ֥עַת פָּנָֽי/ו׃
translation:
  text: As I looked at the living creatures, behold, one wheel was on the earth beside
    the living creatures, for each of their four faces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'corresponding to its four faces.' The Hebrew phrase is compact and may
      describe the wheel as positioned in relation to each creature's four-faced form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  chosen: As I looked
  alternatives:
  - And I saw
  - Then I looked
  lexicon: HALOT
  rationale: The waw-consecutive with ראה advances the narrative. 'As I looked' gives
    natural English flow while preserving the first-person visual report. 'And I saw'
    is more formal but slightly wooden here.
- source_word: הַחַיּוֹת
  chosen: the living creatures
  alternatives:
  - the living beings
  lexicon: HALOT
  rationale: In Ezekiel 1 this term refers to the animate throne-creatures. 'Living
    creatures' is the established and accurate rendering, preserving both liveliness
    and creatureliness without overinterpreting their identity.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: The particle marks sudden attention to a new element in the vision. 'Behold'
    preserves the vivid deictic force better than a flattened 'there was,' and remains
    readable in this prophetic context.
- source_word: אוֹפַן אֶחָד
  chosen: one wheel
  alternatives:
  - a wheel
  - one wheel each
  lexicon: HALOT
  rationale: The singular noun with אֶחָד is best rendered explicitly as 'one wheel.'
    This prepares for the distributive sense clarified by the following phrase about
    the four faces.
- source_word: בָּאָרֶץ
  chosen: on the earth
  alternatives:
  - on the ground
  - upon the earth
  lexicon: HALOT
  rationale: The phrase indicates location at ground level in the vision. 'On the
    earth' is a straightforward rendering of אֶרֶץ here; 'ground' is possible but
    less consistent with the Hebrew noun.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - at the side of
  lexicon: HALOT
  rationale: The preposition denotes proximity. 'Beside' is concise and natural English.
- source_word: לְאַרְבַּעַת פָּנָיו
  chosen: for each of their four faces
  alternatives:
  - corresponding to its four faces
  - according to the four of its faces
  lexicon: HALOT
  rationale: The Hebrew is compact and somewhat awkward in English. The singular pronominal
    suffix likely refers distributively to each living creature, each of which has
    four faces (v. 6). 'For each of their four faces' communicates that distributive
    relationship in clear English without forcing a more speculative interpretation.
