id: EZK.1.23
reference: Ezekiel 1:23
source:
  edition: WLC
  text: וְ/תַ֨חַת֙ הָ/רָקִ֔יעַ כַּנְפֵי/הֶ֣ם יְשָׁר֔וֹת אִשָּׁ֖ה אֶל אֲחוֹתָ֑/הּ לְ/אִ֗ישׁ
    שְׁתַּ֤יִם מְכַסּוֹת֙ לָ/הֵ֔נָּה וּ/לְ/אִ֗ישׁ שְׁתַּ֤יִם מְכַסּוֹת֙ לָ/הֵ֔נָּה
    אֵ֖ת גְּוִיֹּתֵי/הֶֽם־׃
translation:
  text: And under the expanse their wings were straight, each one toward her sister.
    Each had two covering them, and each had two covering their bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a woman toward her sister,' using feminine singular forms
      because 'wings' is grammatically feminine; the sense is that the wings corresponded
      to one another.
    reason: lexical_alternative
  - marker: b
    text: Or 'firmament' for 'expanse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתַחַת
  chosen: And under
  alternatives:
  - Now under
  - Beneath
  lexicon: HALOT
  rationale: Conjunction plus preposition is rendered straightforwardly to continue
    the vision description and mark spatial relation beneath the expanse.
- source_word: הָרָקִיעַ
  chosen: the expanse
  alternatives:
  - the firmament
  - the vault
  lexicon: HALOT
  rationale: רָקִיעַ denotes the extended dome-like expanse above. 'Expanse' is clear
    modern English and avoids the archaic feel of 'firmament' while preserving the
    concrete imagery.
- source_word: כַּנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Standard rendering of כָּנָף in this visionary creature context.
- source_word: יְשָׁרוֹת
  chosen: were straight
  alternatives:
  - were stretched straight
  - were upright
  lexicon: HALOT
  rationale: The adjective from ישר conveys straightness/alignment. 'Were straight'
    preserves the concise descriptive force; the following phrase explains their orientation
    toward one another.
- source_word: אִשָּׁה אֶל אֲחוֹתָהּ
  chosen: each one toward her sister
  alternatives:
  - one toward another
  - each toward the other
  lexicon: HALOT
  rationale: Literally feminine singular language, matching the grammatical gender
    of 'wings.' Rendering it more literally preserves the vivid personified correspondence
    of the wings, while still being understandable in English.
- source_word: לְאִישׁ
  chosen: each had
  alternatives:
  - for each one
  - to each one
  lexicon: HALOT
  rationale: Though literally 'for each/man,' in distributive usage here it means
    'each one.' Supplying 'had' makes the verbless Hebrew idiomatic in English.
- source_word: שְׁתַּיִם
  chosen: two
  lexicon: HALOT
  rationale: Simple numeral; repeated distributively for each creature.
- source_word: מְכַסּוֹת לָהֵנָּה
  chosen: covering them
  alternatives:
  - covering for them
  - covering themselves
  lexicon: HALOT
  rationale: 'The participle from כסה means ''covering.'' The pronoun most naturally
    refers back to the creatures in context: two wings were covering them. This keeps
    the syntax compact and coherent with the repeated distributive structure.'
- source_word: וּלְאִישׁ שְׁתַּיִם מְכַסּוֹת לָהֵנָּה
  chosen: and each had two covering
  alternatives:
  - and for each, two were covering
  - and each had another two covering
  lexicon: HALOT
  rationale: The repeated clause marks the second pair of wings for each creature.
    English requires slight smoothing; 'another' is implied by context but left unstated
    to stay close to the Hebrew.
- source_word: אֵת גְּוִיֹּתֵיהֶם
  chosen: their bodies
  alternatives:
  - their corpses
  - their backs
  lexicon: HALOT
  rationale: גְּוִיָּה can mean body/corpse depending on context. In this living-creature
    vision, 'bodies' is clearly intended, not 'corpses.' The phrase specifies what
    the second pair of wings covered.
