id: EZK.1.16
reference: Ezekiel 1:16
source:
  edition: WLC
  text: מַרְאֵ֨ה הָ/אוֹפַנִּ֤ים וּ/מַעֲשֵׂי/הֶם֙ כְּ/עֵ֣ין תַּרְשִׁ֔ישׁ וּ/דְמ֥וּת
    אֶחָ֖ד לְ/אַרְבַּעְתָּ֑/ן וּ/מַרְאֵי/הֶם֙ וּ/מַ֣עֲשֵׂי/הֶ֔ם כַּ/אֲשֶׁ֛ר יִהְיֶ֥ה
    הָ/אוֹפַ֖ן בְּ/ת֥וֹךְ הָ/אוֹפָֽן׃
translation:
  text: The appearance of the wheels and their workmanship was like the gleam of beryl,
    and the four of them had the same likeness; and their appearance and their workmanship
    were as if a wheel were within a wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tarshish, a precious stone of uncertain identification; traditionally
      rendered 'beryl' or 'chrysolite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְאֵה
  chosen: appearance
  alternatives:
  - look
  - visible form
  lexicon: HALOT
  rationale: מַרְאֶה commonly denotes visible appearance or what is seen. 'Appearance'
    is natural English and fits the visionary description.
- source_word: הָאוֹפַנִּים
  chosen: the wheels
  lexicon: HALOT
  rationale: אוֹפַן is the ordinary term for a wheel. The definite article is retained.
- source_word: וּמַעֲשֵׂיהֶם
  chosen: their workmanship
  alternatives:
  - their construction
  - their structure
  lexicon: HALOT
  rationale: מַעֲשֶׂה can mean work, workmanship, or construction. 'Workmanship' preserves
    both the crafted quality and the parallelism with 'appearance.'
- source_word: כְּעֵין תַּרְשִׁישׁ
  chosen: like the gleam of beryl
  alternatives:
  - like tarshish-stone
  - like chrysolite
  lexicon: HALOT
  rationale: כְּעֵין is literally 'like the eye/appearance of.' In gemstone contexts
    it idiomatically refers to visual quality or gleam. תַּרְשִׁישׁ is a precious
    stone of uncertain exact identification; 'beryl' is a common and defensible English
    equivalent, while the uncertainty is preserved in a footnote.
- source_word: וּדְמוּת אֶחָד לְאַרְבַּעְתָּן
  chosen: the four of them had the same likeness
  alternatives:
  - one likeness was for the four of them
  - all four had one form
  lexicon: HALOT
  rationale: 'The Hebrew is somewhat compressed: literally, ''and one likeness for
    the four of them.'' The chosen rendering makes the sense clear in idiomatic English
    while preserving the emphasis on uniformity among all four wheels.'
- source_word: וּמַרְאֵיהֶם
  chosen: their appearance
  lexicon: HALOT
  rationale: Same lexical field as the opening מַרְאֵה; repeated in English for consistency
    with the Hebrew repetition.
- source_word: וּמַעֲשֵׂיהֶם
  chosen: their workmanship
  alternatives:
  - their construction
  lexicon: HALOT
  rationale: Repeated term; rendered consistently to preserve the Hebrew parallelism.
- source_word: כַּאֲשֶׁר יִהְיֶה הָאוֹפַן בְּתוֹךְ הָאוֹפָן
  chosen: as if a wheel were within a wheel
  alternatives:
  - like a wheel in the midst of a wheel
  - as when one wheel is inside another
  lexicon: HALOT
  rationale: This clause describes the striking configuration of the wheels. 'As if
    a wheel were within a wheel' is idiomatic and preserves the simile introduced
    by כַּאֲשֶׁר.
