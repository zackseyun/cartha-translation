theological_decisions:
- issue: Anthropomorphic description of the figure on the throne
  chosen_reading: 'Retain the layered language of resemblance: "a likeness with the
    appearance of a man"'
  alternative_readings:
  - '"someone like a man"'
  - '"a human form"'
  rationale: The Hebrew stacks דמות and כמראה to avoid a flat identification of God
    with a human body while still reporting a humanlike manifestation. Preserving
    this tension fits the translation philosophy and avoids over-resolving the theology
    of the vision.
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms: אָדָם → man / humankind (context)'
