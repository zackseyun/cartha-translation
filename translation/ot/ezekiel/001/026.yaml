id: EZK.1.26
reference: Ezekiel 1:26
source:
  edition: WLC
  text: וּ/מִ/מַּ֗עַל לָ/רָקִ֨יעַ֙ אֲשֶׁ֣ר עַל רֹאשָׁ֔/ם כְּ/מַרְאֵ֥ה אֶֽבֶן סַפִּ֖יר
    דְּמ֣וּת כִּסֵּ֑א וְ/עַל֙ דְּמ֣וּת הַ/כִּסֵּ֔א דְּמ֞וּת כְּ/מַרְאֵ֥ה אָדָ֛ם עָלָ֖י/ו
    מִ/לְ/מָֽעְלָ/ה־־׃
translation:
  text: And above the expanse that was over their heads was the likeness of a throne,
    in appearance like sapphire stone; and seated above the likeness of the throne
    was a likeness with the appearance of a man above it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly "lapis lazuli stone"; the precise ancient gemstone denoted by
      Hebrew sappir is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָקִיעַ
  chosen: expanse
  alternatives:
  - vault
  - firmament
  lexicon: HALOT
  rationale: '"Expanse" preserves the idea of a spread-out surface without the archaic
    feel of "firmament"; in Ezekiel''s vision context it refers to the platform-like
    expanse above the living creatures.'
- source_word: כְּמַרְאֵה
  chosen: in appearance like / with the appearance of
  alternatives:
  - like the appearance of
  - as the appearance of
  lexicon: HALOT
  rationale: The repeated visionary formula marks resemblance rather than direct identification.
    Rendering it with "appearance" preserves Ezekiel's careful phenomenological language.
- source_word: אֶבֶן סַפִּיר
  chosen: sapphire stone
  alternatives:
  - lapis lazuli
  - sapphire
  lexicon: HALOT
  rationale: The traditional identification is "sapphire," though the ancient stone
    may have resembled lapis lazuli. "Sapphire stone" keeps the conventional rendering
    while signaling a gemstone rather than a color alone.
- source_word: דְּמוּת
  chosen: likeness
  alternatives:
  - form
  - figure
  lexicon: HALOT
  rationale: '"Likeness" is important in Ezekiel 1 because the prophet repeatedly
    avoids claiming direct sight of the divine essence; he describes analogical resemblance.'
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat
  lexicon: HALOT
  rationale: In this visionary and royal context, "throne" is the natural and theologically
    significant sense.
- source_word: אָדָם
  chosen: man
  alternatives:
  - human being
  - humankind
  lexicon: HALOT
  rationale: Here the word refers to a single humanlike figure, not humanity in general.
    Per doctrine, the gender-accurate rendering is "man."
- source_word: עָלָיו מִלְמָעְלָה
  chosen: above it
  alternatives:
  - upon it from above
  - high above it
  lexicon: HALOT
  rationale: The phrase locates the humanlike appearance above the throne-likeness.
    "Above it" is concise and natural, while retaining the spatial sense of the Hebrew.
