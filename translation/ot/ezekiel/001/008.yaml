id: EZK.1.8
reference: Ezekiel 1:8
source:
  edition: WLC
  text: ו/יד/ו אָדָ֗ם מִ/תַּ֨חַת֙ כַּנְפֵי/הֶ֔ם עַ֖ל אַרְבַּ֣עַת רִבְעֵי/הֶ֑ם וּ/פְנֵי/הֶ֥ם
    וְ/כַנְפֵי/הֶ֖ם לְ/אַרְבַּעְתָּֽ/ם׃
translation:
  text: And they had human hands under their wings on their four sides; and the four
    of them had their faces and their wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is syntactically compressed: literally, ''and human hands from under
      their wings on their four sides, and their faces and their wings, to the four
      of them.'' The translation makes the implied relationships explicit in English.'
    reason: lexical_alternative
  - marker: b
    text: Or 'man’s hands' instead of 'human hands.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָדוֹת
  chosen: they had ... hands
  alternatives:
  - and hands
  - and the hands
  lexicon: HALOT
  rationale: The noun יָד in the plural means 'hands.' Because the verbless Hebrew
    clause implies possession/existence, English supplies 'they had' for natural syntax.
    The prefixed conjunction continues the description.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - of a man
  lexicon: HALOT
  rationale: Here אָדָם qualifies the kind of hands, distinguishing them from animal
    features in the vision. 'Human' is the most natural adjectival rendering in English.
    This aligns with the doctrine guideline that אָדָם may be rendered 'man' or 'humankind'
    depending on context; here adjectival 'human' best matches the source sense.
- source_word: מִתַּחַת כַּנְפֵיהֶם
  chosen: under their wings
  alternatives:
  - beneath their wings
  lexicon: HALOT
  rationale: מִתַּחַת denotes position beneath something. 'Under their wings' is straightforward
    and idiomatic.
- source_word: עַל אַרְבַּעַת רִבְעֵיהֶם
  chosen: on their four sides
  alternatives:
  - at their four sides
  - on the four sides of each
  lexicon: HALOT
  rationale: רֶבַע/רִבְעֵי in this context refers to quarters/sides. The phrase indicates
    distribution on all four sides of the living creatures. 'On their four sides'
    is concise and preserves the spatial sense.
- source_word: וּפְנֵיהֶם
  chosen: their faces
  alternatives:
  - their face(s)
  lexicon: HALOT
  rationale: פָּנִים is regularly rendered 'face/faces.' The plural suffix and the
    surrounding description of the four living creatures support 'their faces.'
- source_word: וְכַנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Direct rendering of כָּנָף in the plural construct with suffix.
- source_word: לְאַרְבַּעְתָּם
  chosen: the four of them had
  alternatives:
  - belonging to the four of them
  - for all four of them
  lexicon: HALOT
  rationale: This phrase most naturally refers back to the four living creatures collectively.
    Because the Hebrew is elliptical, English must smooth the syntax. Rendering it
    with an explicit subject relation—'the four of them had'—captures the sense that
    what follows applies to all four.
