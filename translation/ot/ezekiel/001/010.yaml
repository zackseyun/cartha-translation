id: EZK.1.10
reference: Ezekiel 1:10
source:
  edition: WLC
  text: וּ/דְמ֣וּת פְּנֵי/הֶם֮ פְּנֵ֣י אָדָם֒ וּ/פְנֵ֨י אַרְיֵ֤ה אֶל הַ/יָּמִין֙ לְ/אַרְבַּעְתָּ֔/ם
    וּ/פְנֵי שׁ֥וֹר מֵֽ/הַ/שְּׂמֹ֖אול לְ/אַרְבַּעְתָּ֑/ן וּ/פְנֵי נֶ֖שֶׁר לְ/אַרְבַּעְתָּֽ/ן־־־׃
translation:
  text: 'As for the likeness of their faces: each had a human face; the four had a
    lion’s face on the right side, the four had an ox’s face on the left side, and
    the four had an eagle’s face.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vulture' for 'eagle'; Hebrew nesher can refer more broadly to a large
      bird of prey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  chosen: As for the likeness of
  alternatives:
  - and the likeness of
  - the form of
  lexicon: HALOT
  rationale: דְּמוּת denotes likeness/form/resemblance. Here it introduces a descriptive
    clause about the appearance of the faces, so 'As for the likeness of' gives natural
    English while preserving the descriptive force.
- source_word: פְּנֵיהֶם
  chosen: their faces
  alternatives:
  - their face appearance
  lexicon: HALOT
  rationale: פָּנִים commonly means 'face/faces.' The plural possessive is best rendered
    straightforwardly as 'their faces' in this visionary description.
- source_word: פְּנֵי אָדָם
  chosen: a human face
  alternatives:
  - the face of a man
  - a man's face
  lexicon: HALOT
  rationale: אָדָם can mean 'man' or 'humankind.' In this context of four creaturely
    faces, the contrast is between human and animal faces, so 'human face' is the
    most natural and gender-accurate rendering, consistent with the doctrine guidance
    on אָדָם.
- source_word: אַרְיֵה
  chosen: lion
  lexicon: HALOT
  rationale: Standard lexical sense is 'lion.' The construct with פְּנֵי yields 'lion's
    face' in English idiom.
- source_word: אֶל הַיָּמִין
  chosen: on the right side
  alternatives:
  - to the right
  - toward the right
  lexicon: HALOT
  rationale: The phrase locates the lion face on the right side. 'On the right side'
    is idiomatic and spatially clear in English.
- source_word: לְאַרְבַּעְתָּם / לְאַרְבַּעְתָּן
  chosen: the four had
  alternatives:
  - for all four of them
  - belonging to the four
  lexicon: HALOT
  rationale: The phrase indicates that this description applies to all four living
    beings. Rendering it as 'the four had' makes the distributive force explicit and
    readable in English. The shift between masculine and feminine pronominal suffixes
    is not semantically significant enough to preserve in translation here.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: שׁוֹר most naturally denotes an ox/bovine. 'Ox' is the conventional and
    suitably precise English term in this visionary list.
- source_word: מֵהַשְּׂמֹאול
  chosen: on the left side
  alternatives:
  - from the left
  - to the left
  lexicon: HALOT
  rationale: 'Though the preposition is literally ''from,'' in this positional description
    the sense is locative: the ox face was on the left side.'
- source_word: נֶשֶׁר
  chosen: eagle
  alternatives:
  - vulture
  lexicon: HALOT
  rationale: נֶשֶׁר can denote a large bird of prey, sometimes argued as 'vulture,'
    but 'eagle' is the standard and contextually appropriate rendering in prophetic
    and visionary texts. The alternative is worth preserving in a footnote because
    of lexical debate.
