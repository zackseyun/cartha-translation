theological_decisions:
- issue: Rendering אָדָם in a visionary creature-description
  chosen_reading: human face
  alternative_readings:
  - man's face
  rationale: The Hebrew term can denote 'man' or 'humankind/human.' Since the point
    is species contrast rather than male gender, 'human face' best reflects the source
    sense without importing male specificity.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)''.'
