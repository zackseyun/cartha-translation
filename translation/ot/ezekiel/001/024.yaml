theological_decisions:
- issue: Rendering of שַׁדַּי
  chosen_reading: the Almighty
  alternative_readings:
  - Shaddai
  rationale: The doctrine excerpt directs that titles be translated rather than transliterated.
    'The Almighty' is the standard semantic rendering of the divine title here and
    avoids importing a proper-name sense not required by the text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2'
