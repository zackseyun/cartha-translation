id: EZK.1.24
reference: Ezekiel 1:24
source:
  edition: WLC
  text: וָ/אֶשְׁמַ֣ע אֶת ק֣וֹל כַּנְפֵי/הֶ֡ם כְּ/קוֹל֩ מַ֨יִם רַבִּ֤ים כְּ/קוֹל שַׁדַּי֙
    בְּ/לֶכְתָּ֔/ם ק֥וֹל הֲמֻלָּ֖ה כְּ/ק֣וֹל מַחֲנֶ֑ה בְּ/עָמְדָ֖/ם תְּרַפֶּ֥ינָה
    כַנְפֵי/הֶֽן־־׃
translation:
  text: And I heard the sound of their wings, like the sound of many waters, like
    the sound of the Almighty when they went, a sound of tumult like the sound of
    an army camp. When they stood still, they lowered their wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the sound of Shaddai.' The Hebrew uses the divine title שַׁדַּי,
      traditionally rendered 'the Almighty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like the sound of a camp'; the Hebrew מַחֲנֶה often refers to a military
      camp, hence 'army camp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  chosen: And I heard
  alternatives:
  - Then I heard
  - I heard
  lexicon: HALOT
  rationale: Wayyiqtol first common singular of שׁמע introduces the next event in
    Ezekiel's vision report. 'And I heard' preserves the narrative sequence without
    overinterpreting temporal nuance.
- source_word: קוֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: קוֹל can mean 'voice,' 'sound,' or 'noise.' In this verse it refers repeatedly
    to the audible noise made by wings and compared phenomena, so 'sound' is the most
    natural and consistent English rendering.
- source_word: כַּנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Literal rendering of the construct plural with 3mp suffix. The masculine
    suffix refers back to the living creatures as a mixed grammatical group; English
    naturally uses 'their.'
- source_word: כְּקוֹל מַיִם רַבִּים
  chosen: like the sound of many waters
  alternatives:
  - like the sound of great waters
  - like the sound of rushing waters
  lexicon: HALOT
  rationale: A common biblical simile for overwhelming volume. 'Many waters' is formally
    close and idiomatic enough in English, preserving the imagery better than an interpretive
    paraphrase such as 'rushing waters.'
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Following the translation philosophy to translate titles rather than
    transliterate them. In this context the divine title is best rendered 'the Almighty.'
    The comparison is to the sound associated with the Almighty, not necessarily a
    direct divine speech act.
- source_word: בְּלֶכְתָּם
  chosen: when they went
  alternatives:
  - as they went
  - in their going
  lexicon: HALOT
  rationale: Infinitive construct with preposition ב conveys temporal circumstance.
    'When they went' is clear modern English and preserves the action setting for
    the sound.
- source_word: הֲמֻלָּה
  chosen: tumult
  alternatives:
  - uproar
  - roar
  - commotion
  lexicon: HALOT
  rationale: The noun denotes a loud, agitated noise. 'Tumult' captures the force
    and elevated register appropriate to the vision while avoiding over-specific imagery.
- source_word: כְּקוֹל מַחֲנֶה
  chosen: like the sound of an army camp
  alternatives:
  - like the sound of a camp
  - like the sound of an army
  lexicon: HALOT
  rationale: מַחֲנֶה often means 'camp,' especially a military encampment. Because
    the comparison concerns loud collective noise, 'army camp' makes the likely sense
    explicit without straying far from the Hebrew.
- source_word: בְּעָמְדָם
  chosen: When they stood still
  alternatives:
  - When they stood
  - as they stood
  lexicon: HALOT
  rationale: Temporal infinitive construct with preposition ב. 'Stood still' brings
    out the contrast with 'when they went' and fits the scene of ceasing motion.
- source_word: תְּרַפֶּינָה
  chosen: they lowered
  alternatives:
  - they let down
  - they relaxed
  - they dropped
  lexicon: HALOT
  rationale: From רפה in the Hiphil, here meaning to let something sink, slacken,
    or hang down. 'Lowered' is the clearest idiomatic English for wings ceasing active
    motion.
- source_word: כַנְפֵיהֶן
  chosen: their wings
  lexicon: HALOT
  rationale: The suffix is feminine plural, agreeing with 'wings' as a feminine noun
    rather than changing the referent. English simply repeats 'their wings.'
