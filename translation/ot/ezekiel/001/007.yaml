id: EZK.1.7
reference: Ezekiel 1:7
source:
  edition: WLC
  text: וְ/רַגְלֵי/הֶ֖ם רֶ֣גֶל יְשָׁרָ֑ה וְ/כַ֣ף רַגְלֵי/הֶ֗ם כְּ/כַף֙ רֶ֣גֶל עֵ֔גֶל
    וְ/נֹ֣צְצִ֔ים כְּ/עֵ֖ין נְחֹ֥שֶׁת קָלָֽל׃
translation:
  text: Their legs were straight, and the soles of their feet were like the sole of
    a calf’s foot, and they gleamed like the appearance of polished bronze.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “like a calf’s hoof.” The Hebrew more literally
      says “like the sole of a calf’s foot.”
    reason: lexical_alternative
  - marker: b
    text: Or “burnished bronze.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֵיהֶם
  chosen: their legs
  alternatives:
  - their feet
  lexicon: HALOT
  rationale: רֶגֶל can denote either 'foot' or 'leg' depending on context. Here the
    following phrase separately mentions the soles of their feet, so rendering the
    first occurrence as 'legs' preserves the distinction in the Hebrew.
- source_word: רֶגֶל יְשָׁרָה
  chosen: were straight
  alternatives:
  - were upright
  lexicon: HALOT
  rationale: 'The singular noun with adjective functions distributively/collectively:
    each had a straight leg. ''Straight'' best matches the plain descriptive sense
    without overinterpreting posture.'
- source_word: כַּף רַגְלֵיהֶם
  chosen: the soles of their feet
  alternatives:
  - the bottoms of their feet
  lexicon: HALOT
  rationale: כַּף in bodily contexts refers to the palm/sole. 'Soles' is the natural
    English equivalent here.
- source_word: כְּכַף רֶגֶל עֵגֶל
  chosen: like the sole of a calf’s foot
  alternatives:
  - like a calf’s hoof
  - like the sole of a young bull’s foot
  lexicon: HALOT
  rationale: Formally, the Hebrew compares the sole to the sole of a calf's foot.
    Although 'hoof' is an interpretive simplification, the Hebrew retains the anatomy
    of 'foot,' so the main text stays closer to the source while preserving the more
    idiomatic alternative in a footnote.
- source_word: וְנֹצְצִים
  chosen: they gleamed
  alternatives:
  - they sparkled
  - they shone
  lexicon: HALOT
  rationale: The participle describes a bright, flashing appearance. 'Gleamed' is
    vivid modern English and fits the visionary description.
- source_word: כְּעֵין
  chosen: like the appearance of
  alternatives:
  - like
  - with the look of
  lexicon: HALOT
  rationale: עַיִן in this construction means 'appearance' or 'look.' Rendering it
    explicitly avoids flattening the comparison.
- source_word: נְחֹשֶׁת קָלָל
  chosen: polished bronze
  alternatives:
  - burnished bronze
  - gleaming bronze
  - polished copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can refer to bronze/copper, and in many English Bible contexts
    'bronze' is the more idiomatic rendering for metal imagery. קָלָל here likely
    conveys something polished, gleaming, or burnished. 'Polished bronze' is clear
    modern English; 'burnished bronze' is preserved as a lexical alternative.
