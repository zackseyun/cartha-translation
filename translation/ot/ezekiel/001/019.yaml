theological_decisions:
- issue: Identity of הַחַיּוֹת in Ezekiel's vision
  chosen_reading: Render generically as 'the living creatures' without specifying
    cherubim in the main text
  alternative_readings:
  - the cherubim
  rationale: Although Ezekiel later identifies these beings as cherubim (cf. Ezek
    10), this verse itself uses the more general term חַיּוֹת. To avoid importing
    later identification into the immediate text, the translation preserves the wording
    here.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
