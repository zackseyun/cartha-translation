id: EZK.1.19
reference: Ezekiel 1:19
source:
  edition: WLC
  text: וּ/בְ/לֶ֨כֶת֙ הַֽ/חַיּ֔וֹת יֵלְכ֥וּ הָ/אוֹפַנִּ֖ים אֶצְלָ֑/ם וּ/בְ/הִנָּשֵׂ֤א
    הַֽ/חַיּוֹת֙ מֵ/עַ֣ל הָ/אָ֔רֶץ יִנָּשְׂא֖וּ הָ/אוֹפַנִּֽים׃
translation:
  text: When the living creatures moved, the wheels moved beside them; and when the
    living creatures were lifted up from the earth, the wheels were lifted up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went' instead of 'moved' for both the creatures and the wheels; the
      Hebrew uses the same verb for their coordinated motion.
    reason: lexical_alternative
  - marker: b
    text: Ezekiel later identifies these 'living creatures' as cherubim (see Ezekiel
      10:20).
    reason: cross_reference
lexical_decisions:
- source_word: וּבְלֶכֶת
  chosen: When ... moved
  alternatives:
  - as ... went
  - in the going of
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of הלך introduces a temporal
    circumstance. 'When ... moved' gives natural English while preserving the temporal
    sense better than a more wooden 'in the going of.'
- source_word: הַחַיּוֹת
  chosen: the living creatures
  alternatives:
  - the living beings
  - the animals
  lexicon: HALOT
  rationale: In Ezekiel 1 this term refers to the animated throne-creatures of the
    vision, not ordinary animals. 'Living creatures' is established and accurate without
    overinterpreting their identity.
- source_word: יֵלְכוּ
  chosen: moved
  alternatives:
  - went
  - walked
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk,' but in this visionary context 'moved' fits
    the motion of the wheels and creatures in coordinated fashion and reads naturally
    in English.
- source_word: הָאוֹפַנִּים
  chosen: the wheels
  alternatives:
  - the wheelwork
  lexicon: HALOT
  rationale: אופן straightforwardly denotes 'wheel.' The plural refers to the wheels
    associated with the creatures in the vision.
- source_word: אֶצְלָם
  chosen: beside them
  alternatives:
  - next to them
  - alongside them
  lexicon: HALOT
  rationale: אצל indicates proximity. 'Beside them' is concise and idiomatic, preserving
    the close association between wheels and creatures.
- source_word: וּבְהִנָּשֵׂא
  chosen: when ... were lifted up
  alternatives:
  - when ... rose
  - when ... were raised
  lexicon: HALOT
  rationale: The Niphal infinitive construct of נשׂא here is passive/reflexive in
    sense. 'Were lifted up' preserves the verbal link with the following finite verb
    and avoids implying merely self-propelled ascent.
- source_word: מֵעַל הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from above the earth
  - off the ground
  lexicon: HALOT
  rationale: The phrase literally means 'from upon the earth.' 'From the earth' is
    smooth English and adequately conveys departure from contact with the ground;
    'off the ground' is possible but slightly more colloquial.
- source_word: יִנָּשְׂאוּ
  chosen: were lifted up
  alternatives:
  - rose
  - were raised
  lexicon: HALOT
  rationale: Using the same English expression as for הִנָּשֵׂא preserves the repeated
    נשׂא wordplay and the coordinated motion between creatures and wheels.
