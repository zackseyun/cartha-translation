id: EZK.1.9
reference: Ezekiel 1:9
source:
  edition: WLC
  text: חֹֽבְרֹ֛ת אִשָּׁ֥ה אֶל אֲחוֹתָ֖/הּ כַּנְפֵי/הֶ֑ם לֹא יִסַּ֣בּוּ בְ/לֶכְתָּ֔/ן
    אִ֛ישׁ אֶל עֵ֥בֶר פָּנָ֖י/ו יֵלֵֽכוּ־־־׃
translation:
  text: Their wings were joined, each to her sister. As they moved, they did not turn;
    each one went straight ahead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a woman to her sister,' an idiom meaning corresponding
      parts joined to one another.
    reason: lexical_alternative
  - marker: b
    text: Or 'each one went in the direction of its face.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֹבְרֹת
  chosen: were joined
  alternatives:
  - were connected
  - were coupled
  lexicon: HALOT
  rationale: Passive participle from חבר conveys being joined/connected. 'Were joined'
    is natural English and preserves the stative/passive sense.
- source_word: אִשָּׁה אֶל אֲחוֹתָהּ
  chosen: each to her sister
  alternatives:
  - one to another
  - each one to the other
  lexicon: HALOT
  rationale: Literally 'a woman to her sister,' an idiom for corresponding items paired
    with each other. Rendering it more literally as 'each to her sister' preserves
    the feminine singular imagery that agrees with 'wing' while remaining intelligible.
- source_word: כַּנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Straightforward rendering of 'their wings'; placed as the subject in
    idiomatic English.
- source_word: לֹא יִסַּבּוּ
  chosen: they did not turn
  alternatives:
  - they would not turn
  - they did not change direction
  lexicon: HALOT
  rationale: The verb סבב in this context refers to turning aside or changing direction
    in movement. Simple past fits the visionary narrative.
- source_word: בְּלֶכְתָּן
  chosen: as they moved
  alternatives:
  - when they went
  - in their going
  lexicon: HALOT
  rationale: Infinitive construct with preposition ב conveys contemporaneous action.
    'As they moved' is idiomatic and captures the temporal sense.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - each man
  - every one
  lexicon: HALOT
  rationale: Though grammatically masculine singular, here it distributively refers
    to each living creature. 'Each one' preserves the distributive force without implying
    maleness.
- source_word: אֶל עֵבֶר פָּנָיו
  chosen: straight ahead
  alternatives:
  - toward the other side of his face
  - in the direction of his face
  - forward
  lexicon: HALOT
  rationale: Literally 'toward the region/side of his face,' an idiom meaning in the
    direction one is facing. 'Straight ahead' communicates the sense clearly in modern
    English.
- source_word: יֵלֵכוּ
  chosen: went
  alternatives:
  - would go
  - moved
  lexicon: HALOT
  rationale: Common verb 'go/walk.' In sequence with the preceding clause, simple
    past 'went' best fits the English narrative style.
