theological_decisions:
- issue: Whether רוּחַ should be rendered as a direct reference to the Holy Spirit
  chosen_reading: the spirit
  alternative_readings:
  - the Spirit
  - the wind
  rationale: The verse does not explicitly identify the referent as the Holy Spirit.
    To preserve theological tension rather than resolve ambiguity, the main text uses
    lowercase 'spirit,' while alternatives are preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
