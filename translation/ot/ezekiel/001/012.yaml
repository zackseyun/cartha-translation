id: EZK.1.12
reference: Ezekiel 1:12
source:
  edition: WLC
  text: וְ/אִ֛ישׁ אֶל עֵ֥בֶר פָּנָ֖י/ו יֵלֵ֑כוּ אֶ֣ל אֲשֶׁר֩ יִֽהְיֶה שָׁ֨מָּ/ה הָ/ר֤וּחַ
    לָ/לֶ֨כֶת֙ יֵלֵ֔כוּ לֹ֥א יִסַּ֖בּוּ בְּ/לֶכְתָּֽ/ן־־׃
translation:
  text: And each one went straight ahead. Wherever the spirit was to go, they went;
    they did not turn as they went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wind'; possibly 'the Spirit.' The Hebrew word רוּחַ can mean 'spirit,'
      'wind,' or 'breath,' and the verse does not explicitly identify the referent.
    reason: alternative_reading
  - marker: b
    text: Literally, 'toward the direction of its face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: And each one
  alternatives:
  - And each man
  - And each creature
  lexicon: HALOT
  rationale: אִישׁ literally means 'man' or 'individual.' In this vision context it
    refers distributively to each of the four living beings, so 'each one' preserves
    the singular distributive force without awkwardly implying human identity.
- source_word: אֶל עֵבֶר פָּנָיו
  chosen: straight ahead
  alternatives:
  - toward the direction of its face
  - in the direction of his face
  lexicon: HALOT
  rationale: Literally, 'toward the side/direction of its face.' The idiom describes
    movement directly forward in the direction each face was oriented. 'Straight ahead'
    is a natural English rendering that captures the sense concisely.
- source_word: יֵלֵכוּ
  chosen: went
  alternatives:
  - would go
  - walked
  lexicon: HALOT
  rationale: The imperfect in this visionary description functions as past narrative
    description. 'Went' fits the English flow better than a wooden future-like rendering.
- source_word: אֶל אֲשֶׁר יִהְיֶה שָׁמָּה הָרוּחַ לָלֶכֶת
  chosen: Wherever the spirit was to go
  alternatives:
  - Wherever the wind was to go
  - To wherever the Spirit was going
  lexicon: HALOT
  rationale: רוּחַ can mean 'spirit,' 'wind,' or 'breath.' In this immediate context
    of animated heavenly beings moving in coordinated fashion, 'spirit' best conveys
    the animating directional impulse. The clause is rendered idiomatically as 'Wherever
    the spirit was to go' to reflect purpose/direction signaled by לָלֶכֶת.
- source_word: הָרוּחַ
  chosen: the spirit
  alternatives:
  - the wind
  - the Spirit
  lexicon: HALOT
  rationale: The article marks a specific referent. Capitalized 'Spirit' would over-specify
    the referent as the Holy Spirit, which the Hebrew does not explicitly require
    here. Lowercase 'spirit' preserves the ambiguity while fitting the vision context.
- source_word: לֹא יִסַּבּוּ
  chosen: they did not turn
  alternatives:
  - they did not turn aside
  - they did not change direction
  lexicon: HALOT
  rationale: The Niphal of סבב here denotes turning or changing direction. 'They did
    not turn' is direct and matches the repeated emphasis in the passage on unwavering
    forward movement.
- source_word: בְּלֶכְתָּן
  chosen: as they went
  alternatives:
  - in their going
  - while going
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys contemporaneous action.
    'As they went' is idiomatic modern English and preserves the temporal nuance.
