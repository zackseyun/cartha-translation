id: EZK.1.20
reference: Ezekiel 1:20
source:
  edition: WLC
  text: עַ֣ל אֲשֶׁר֩ יִֽהְיֶה שָּׁ֨ם הָ/ר֤וּחַ לָ/לֶ֨כֶת֙ יֵלֵ֔כוּ שָׁ֥מָּ/ה הָ/ר֖וּחַ
    לָ/לֶ֑כֶת וְ/הָ/אוֹפַנִּ֗ים יִנָּשְׂאוּ֙ לְ/עֻמָּתָ֔/ם כִּ֛י ר֥וּחַ הַ/חַיָּ֖ה
    בָּ/אוֹפַנִּֽים־׃
translation:
  text: Wherever the spirit would go, they went there; the wheels were lifted up alongside
    them, because the spirit of the living creature was in the wheels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wind' or 'breath'; Hebrew רוּחַ can carry any of these senses. Here
      it refers to the animating or directing spirit in the vision.
    reason: lexical_alternative
  - marker: b
    text: Or 'opposite them' or 'corresponding to them' for 'alongside them.'
    reason: lexical_alternative
  - marker: c
    text: Some readers understand 'spirit' here as a reference to the Spirit of God;
      the Hebrew does not make that identification explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: הָרוּחַ / רוּחַ
  chosen: the spirit / the spirit
  alternatives:
  - wind
  - breath
  - Spirit
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In this vision context it denotes
    the animating/directing impulse governing the movement of the living creatures
    and wheels. Lowercase 'spirit' best preserves the Hebrew sense without over-interpreting
    it as a direct reference to the Holy Spirit. The repeated use is kept consistent
    within the verse.
- source_word: עַל אֲשֶׁר יִהְיֶה שָּׁם
  chosen: Wherever
  alternatives:
  - Where
  - At the place where
  - Wherever it was
  lexicon: HALOT
  rationale: 'The combination introduces an indefinite relative clause of place: ''wherever/where.''
    ''Wherever'' captures the distributive sense naturally in English and fits the
    repeated directional movement in the verse.'
- source_word: לָלֶכֶת ... יֵלֵכוּ
  chosen: would go ... they went
  alternatives:
  - to go ... they went
  - was to go ... they would go
  lexicon: HALOT
  rationale: The infinitive with רוּחַ plus the imperfect verb expresses intended/directed
    movement. 'Would go' communicates volitional direction in idiomatic English without
    adding excessive interpretation; the following 'they went' preserves the simple
    verbal action.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to there
  - in that direction
  lexicon: HALOT
  rationale: The directional adverb is most naturally rendered 'there' in English.
    The directional force is already implied by the motion verb.
- source_word: הָאוֹפַנִּים
  chosen: the wheels
  alternatives:
  - wheelwork
  lexicon: HALOT
  rationale: אוֹפַנִּים plainly refers to the wheels seen in the vision. 'Wheels'
    is the standard and contextually clear rendering.
- source_word: יִנָּשְׂאוּ
  chosen: were lifted up
  alternatives:
  - were raised
  - rose
  lexicon: HALOT
  rationale: The Niphal of נשׂא is passive/reflexive here. 'Were lifted up' preserves
    the passive nuance and matches the visionary description better than the more
    intransitive 'rose.'
- source_word: לְעֻמָּתָם
  chosen: alongside them
  alternatives:
  - opposite them
  - corresponding to them
  - beside them
  lexicon: HALOT
  rationale: The preposition indicates position corresponding to or alongside the
    living creatures. In this movement context, 'alongside them' is the clearest idiomatic
    English rendering.
- source_word: הַחַיָּה
  chosen: the living creature
  alternatives:
  - the living beings
  - the living one
  lexicon: HALOT
  rationale: Although the broader context includes multiple living creatures, the
    singular collective usage in Hebrew is well represented by 'the living creature,'
    a conventional rendering in Ezekiel 1 that preserves the grammatical number.
