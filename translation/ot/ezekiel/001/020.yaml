theological_decisions:
- issue: Whether רוּחַ should be rendered as 'Spirit' implying the Holy Spirit
  chosen_reading: lowercase 'spirit'
  alternative_readings:
  - Spirit
  rationale: The verse describes the animating/directing principle within the visionary
    creatures and wheels. The text itself does not explicitly identify this as the
    Holy Spirit, so lowercase 'spirit' preserves theological tension and avoids importing
    a stronger doctrinal claim than the Hebrew warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
