theological_decisions:
- issue: Genitive nuance in מַרְאוֹת אֱלֹהִים
  chosen_reading: visions of God
  alternative_readings:
  - divine visions
  - visions from God
  rationale: The Hebrew construct is ambiguous. The main text keeps the ambiguity
    rather than specifying source ('from God') or adjectival quality ('divine'), in
    keeping with the principle of preserving theological tension where the source
    permits multiple plausible readings.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
