id: EZK.1.1
reference: Ezekiel 1:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בִּ/שְׁלֹשִׁ֣ים שָׁנָ֗ה בָּֽ/רְבִיעִי֙ בַּ/חֲמִשָּׁ֣ה לַ/חֹ֔דֶשׁ
    וַ/אֲנִ֥י בְ/תֽוֹךְ הַ/גּוֹלָ֖ה עַל נְהַר כְּבָ֑ר נִפְתְּחוּ֙ הַ/שָּׁמַ֔יִם וָ/אֶרְאֶ֖ה
    מַרְא֥וֹת אֱלֹהִֽים׀־־־׃
translation:
  text: Now it happened in the thirtieth year, in the fourth month, on the fifth day
    of the month, while I was among the exiles by the Kebar River, the heavens were
    opened, and I saw visions of God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'by the Kebar Canal'; the Hebrew says 'Kebar River,' but the
      location may have been a major canal in Babylonia.
    reason: cultural_note
  - marker: b
    text: Or 'divine visions' or 'visions from God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the account. 'Now it happened'
    preserves the discourse-opening force in readable modern English without archaic
    phrasing.
- source_word: בִּשְׁלֹשִׁים שָׁנָה
  chosen: in the thirtieth year
  alternatives:
  - in thirty years
  - when thirty years had passed
  lexicon: HALOT
  rationale: The preposition with cardinal plus 'year' functions idiomatically for
    a date reference. English ordinal style best reflects the temporal marker.
- source_word: בָּרְבִיעִי
  chosen: in the fourth month
  alternatives:
  - in the fourth
  lexicon: HALOT
  rationale: Although 'month' is not repeated here, the dating formula clearly implies
    the month. Supplying 'month' in English is necessary for clarity and matches the
    parallel dating phrase.
- source_word: בַּחֲמִשָּׁה לַחֹדֶשׁ
  chosen: on the fifth day of the month
  alternatives:
  - on the fifth of the month
  lexicon: HALOT
  rationale: Standard Hebrew date formula. 'Day' is implied and naturally supplied
    in English.
- source_word: וַאֲנִי
  chosen: while I was
  alternatives:
  - and I
  - as for me, I
  lexicon: HALOT
  rationale: The pronoun marks a circumstantial clause linked to the temporal setting.
    'While I was' conveys the syntax and flow better than a wooden 'and I'.
- source_word: בְתוֹךְ הַגּוֹלָה
  chosen: among the exiles
  alternatives:
  - in the midst of the exiles
  - among the deportees
  lexicon: HALOT
  rationale: The phrase denotes Ezekiel's location within the community of those carried
    away. 'Exiles' is idiomatic and clear; 'deportees' is possible but less natural
    in literary English.
- source_word: עַל נְהַר כְּבָר
  chosen: by the Kebar River
  alternatives:
  - upon the river Chebar
  - beside the Kebar Canal
  lexicon: HALOT
  rationale: עַל with a waterway here indicates location by/along it. כְּבָר is a
    proper name, transliterated as 'Kebar' per policy. 'River' follows the Hebrew
    noun נהר, though some understand the waterway as a canal; that alternative is
    preserved in a footnote.
- source_word: נִפְתְּחוּ הַשָּׁמַיִם
  chosen: the heavens were opened
  alternatives:
  - the sky was opened
  - the heavens opened
  lexicon: HALOT
  rationale: Passive plural verb with plural noun 'heavens.' 'The heavens were opened'
    preserves the elevated register and visionary tone better than 'sky.'
- source_word: וָאֶרְאֶה
  chosen: and I saw
  alternatives:
  - then I saw
  lexicon: HALOT
  rationale: Simple narrative continuation from the opening of the heavens to Ezekiel's
    perception.
- source_word: מַרְאוֹת אֱלֹהִים
  chosen: visions of God
  alternatives:
  - divine visions
  - visions from God
  lexicon: HALOT
  rationale: The construct can denote visions whose content or source is divine. 'Visions
    of God' is the most direct rendering and preserves the Hebrew's theological weight
    without over-resolving whether the genitive is subjective or objective; alternatives
    are preserved in a footnote.
