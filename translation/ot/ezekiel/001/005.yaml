id: EZK.1.5
reference: Ezekiel 1:5
source:
  edition: WLC
  text: וּ/מִ֨/תּוֹכָ֔/הּ דְּמ֖וּת אַרְבַּ֣ע חַיּ֑וֹת וְ/זֶה֙ מַרְאֵֽי/הֶ֔ן דְּמ֥וּת
    אָדָ֖ם לָ/הֵֽנָּה׃
translation:
  text: 'And from within it came the likeness of four living creatures. And this was
    their appearance: they had the likeness of a man.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four living beings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the likeness of a man'; that is, they appeared in human form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִתּוֹכָהּ
  chosen: And from within it
  alternatives:
  - And out of the midst of it
  - And from its midst
  lexicon: HALOT
  rationale: The prepositional compound means 'and/from the midst of it.' 'From within
    it' is natural modern English while preserving the spatial sense. The feminine
    suffix refers back to the fiery cloud/storm phenomenon in the preceding context.
- source_word: דְּמוּת
  chosen: the likeness of
  alternatives:
  - a likeness of
  - the form of
  lexicon: HALOT
  rationale: דמות signals resemblance rather than direct identification, an important
    feature in Ezekiel's visionary language. 'The likeness of' preserves that mediated,
    analogical sense.
- source_word: אַרְבַּע חַיּוֹת
  chosen: four living creatures
  alternatives:
  - four living beings
  - four creatures
  lexicon: HALOT
  rationale: חיות here denotes animate beings in the vision. 'Living creatures' is
    the most established and accurate English rendering, preserving both vitality
    and creatureliness without overinterpreting them as animals.
- source_word: וְזֶה מַרְאֵיהֶן
  chosen: And this was their appearance
  alternatives:
  - And this was how they looked
  - And this was their form
  lexicon: HALOT
  rationale: מראה commonly refers to visible appearance. The singular demonstrative
    with the plural suffix is idiomatic; English smooths this as 'this was their appearance.'
- source_word: דְּמוּת אָדָם
  chosen: the likeness of a man
  alternatives:
  - the likeness of a human
  - a human likeness
  lexicon: HALOT
  rationale: אָדָם here refers to human form rather than humanity in the abstract.
    Per doctrine, gender-accurate rendering is preferred; 'man' best matches the singular
    Hebrew while conveying humanlike appearance.
- source_word: לָהֵנָּה
  chosen: they had
  alternatives:
  - belonged to them
  - was theirs
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'to them,' but in English
    the clause is best completed idiomatically as 'they had the likeness of a man,'
    making explicit the predicative possession implied by the Hebrew.
