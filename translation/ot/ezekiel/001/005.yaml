theological_decisions:
- issue: Rendering visionary ontology without overdefinition
  chosen_reading: Retain repeated 'likeness' language and render חיות as 'living creatures'
  alternative_readings:
  - Render more directly as 'four creatures'
  - Interpret as angelic beings in the main text
  rationale: Ezekiel deliberately uses resemblance language to describe what he sees.
    The translation preserves that theological and phenomenological restraint rather
    than identifying the beings more specifically than the verse itself does.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
