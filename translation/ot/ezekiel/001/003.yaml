id: EZK.1.3
reference: Ezekiel 1:3
source:
  edition: WLC
  text: הָיֹ֣ה הָיָ֣ה דְבַר יְ֠הוָה אֶל יְחֶזְקֵ֨אל בֶּן בּוּזִ֧י הַ/כֹּהֵ֛ן בְּ/אֶ֥רֶץ כַּשְׂדִּ֖ים עַל נְהַר כְּבָ֑ר וַ/תְּהִ֥י עָלָ֛י/ו שָׁ֖ם יַד יְהוָֽה־־־־־־׃
translation:
  text: the word of Yahweh indeed came to Ezekiel son of Buzi, the priest, in the land of the Chaldeans by the Kebar River, and there the hand of Yahweh was upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the word of the LORD certainly came to Ezekiel'—the Hebrew repeats the verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or, 'in the land of the Babylonians'; 'Chaldeans' is the more literal rendering of the Hebrew term.
    reason: lexical_alternative
  - marker: c
    text: Or, 'the hand of the LORD was upon him.'
    reason: alternative_reading
lexical_decisions:
- source_word: הָיֹה הָיָה
  chosen: came indeed
  alternatives:
  - certainly came
  - truly came
  - did indeed come
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of היה intensifies the verbal idea. In English, a natural way to preserve the emphasis without awkward literalism is 'came indeed' attached to the following clause ('the word of the LORD came indeed').
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the formal and theological resonance of divine revelation better than the more interpretive 'message.' 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: In the prophetic formula, אֶל marks the recipient of the divine word. 'To' is the natural modern English equivalent.
- source_word: יְחֶזְקֵאל בֶּן בּוּזִי
  chosen: Ezekiel son of Buzi
  alternatives:
  - Yehezkel son of Buzi
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions per translation philosophy. 'Son of' is retained rather than reduced to a patronymic adjective.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the priestly one
  lexicon: HALOT
  rationale: The noun straightforwardly identifies Ezekiel as a priest. The appositional placement after the patronymic is preserved in readable English.
- source_word: בְּאֶרֶץ כַּשְׂדִּים
  chosen: in the land of the Chaldeans
  alternatives:
  - in the land of the Babylonians
  - in Chaldea
  lexicon: HALOT
  rationale: כַּשְׂדִּים is literally 'Chaldeans.' Although it can refer broadly to Babylonia in context, the more direct rendering is preferred here, with readability maintained.
- source_word: עַל נְהַר כְּבָר
  chosen: by the Kebar River
  alternatives:
  - upon the river Chebar
  - at the Kebar Canal
  lexicon: HALOT
  rationale: עַל with a waterway here is locative. 'By' is idiomatic English. 'Kebar' is a standard transliteration; 'River' is retained as the conventional rendering, though some understand the waterway as a canal.
- source_word: וַתְּהִי עָלָיו שָׁם יַד יְהוָה
  chosen: and there the hand of the LORD came upon him
  alternatives:
  - and there the hand of the LORD was upon him
  - and there the power of the LORD came upon him
  lexicon: HALOT
  rationale: The idiom 'the hand of the LORD' commonly denotes the forceful, empowering, or revelatory action of God on a prophet. 'Came upon him' reflects the verbal clause and keeps the idiom intact rather than over-interpreting it as 'power.' 'There' preserves שָׁם.
