theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Prophetic idiom 'the hand of the LORD'
  chosen_reading: retain the idiom as 'the hand of the LORD came upon him'
  alternative_readings:
  - the power of the LORD came upon him
  - the LORD took hold of him
  rationale: Retaining the idiom preserves the text's theological texture and avoids importing a narrower interpretation of the experience. The phrase signals divine agency and prophetic compulsion without reducing it to a single doctrinal category.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
