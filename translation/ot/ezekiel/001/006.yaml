id: EZK.1.6
reference: Ezekiel 1:6
source:
  edition: WLC
  text: וְ/אַרְבָּעָ֥ה פָנִ֖ים לְ/אֶחָ֑ת וְ/אַרְבַּ֥ע כְּנָפַ֖יִם לְ/אַחַ֥ת לָ/הֶֽם׃
translation:
  text: Each had four faces, and each of them had four wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and four faces to one, and four wings to one for them,' a Hebrew
      distributive construction meaning that each living creature had four faces and
      four wings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַרְבָּעָה
  chosen: four
  lexicon: HALOT
  rationale: Cardinal number straightforwardly rendered as 'four.'
- source_word: פָנִים
  chosen: faces
  alternatives:
  - face
  lexicon: HALOT
  rationale: Though morphologically plural, in context it refers to the four distinct
    faces possessed by each living creature, so 'faces' is the natural English rendering.
- source_word: לְאֶחָת
  chosen: each
  alternatives:
  - to one
  - for one
  lexicon: HALOT
  rationale: The preposition ל with the feminine singular numeral here idiomatically
    means 'for each one' or 'each,' referring back to each living creature individually.
    English smooths this to 'each' rather than a wooden 'to one.'
- source_word: וְאַרְבַּע
  chosen: and four
  lexicon: HALOT
  rationale: Second cardinal number coordinated with the first clause; rendered naturally
    in English within the sentence structure.
- source_word: כְּנָפַיִם
  chosen: wings
  lexicon: HALOT
  rationale: Dual/plural form for winged appendages; 'wings' is the standard and contextually
    clear rendering.
- source_word: לְאַחַת
  chosen: each
  alternatives:
  - to one
  - for one
  lexicon: HALOT
  rationale: 'As with לְאֶחָת, the phrase is distributive: each creature had four
    wings.'
- source_word: לָהֶם
  chosen: of them
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The pronoun resumes the plural antecedent collectively. In English, 'each
    of them had' best captures the distributive sense without awkwardness.
