theological_decisions:
- issue: Identity of the recipient
  chosen_reading: the one clothed in linen
  alternative_readings:
  - the man clothed in linen
  rationale: The broader context identifies this figure as the man clothed in linen
    (cf. Ezek 10:2, 6), but this verse itself only says 'clothed in linen.' To avoid
    importing more than the verse states, the main text keeps the wording minimal
    while preserving the contextual alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3
