id: EZK.10.7
reference: Ezekiel 10:7
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ הַ/כְּר֨וּב אֶת יָד֜/וֹ מִ/בֵּינ֣וֹת לַ/כְּרוּבִ֗ים אֶל הָ/אֵשׁ֙
    אֲשֶׁר֙ בֵּינ֣וֹת הַ/כְּרֻבִ֔ים וַ/יִּשָּׂא֙ וַ/יִּתֵּ֔ן אֶל חָפְנֵ֖י לְבֻ֣שׁ
    הַ/בַּדִּ֑ים וַ/יִּקַּ֖ח וַ/יֵּצֵֽא־־־׃
translation:
  text: Then the cherub stretched out his hand from among the cherubim to the fire
    that was among the cherubim, and he lifted some up and put it into the palms of
    the one clothed in linen, who took it and went out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'from between the cherubim' ... 'the fire that was between
      the cherubim.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the palms of the one clothed in linen'; in context this is
      the same figure earlier called 'the man clothed in linen' (10:2, 10:6).
    reason: cross_reference
lexical_decisions:
- source_word: הַכְּרוּב
  chosen: the cherub
  alternatives:
  - the cherubim member
  - the living creature
  lexicon: HALOT
  rationale: Singular with article; the verse focuses on one cherub acting. 'Cherub'
    preserves the specific heavenly being rather than generalizing to 'living creature,'
    though the beings are identified together elsewhere.
- source_word: וַיִּשְׁלַח
  chosen: stretched out
  alternatives:
  - sent out
  - reached out
  lexicon: HALOT
  rationale: In context with 'his hand,' the idiom means extending or reaching out
    the hand. 'Stretched out' is natural English and keeps the physical action vivid.
- source_word: מִבֵּינוֹת לַכְּרוּבִים
  chosen: from among the cherubim
  alternatives:
  - from between the cherubim
  lexicon: HALOT
  rationale: The prepositional phrase indicates location within the midst of the cherubim.
    'From among' reads more naturally in English, while still conveying the spatial
    sense.
- source_word: הָאֵשׁ אֲשֶׁר בֵּינוֹת הַכְּרֻבִים
  chosen: the fire that was among the cherubim
  alternatives:
  - the fire that was between the cherubim
  lexicon: HALOT
  rationale: Retains the repeated spatial description and the definite 'the fire.'
    'Among' is smoother English for the plural setting, though 'between' is possible
    more formally.
- source_word: וַיִּשָּׂא
  chosen: he lifted some up
  alternatives:
  - he took
  - he carried
  lexicon: HALOT
  rationale: The verb literally means 'lifted/carried.' Because the direct object
    is implicit and the next verb is 'put/gave,' English benefits from supplying 'some'
    to indicate some of the fire/coals without over-specifying beyond the Hebrew.
- source_word: וַיִּתֵּן
  chosen: put it into
  alternatives:
  - gave to
  - placed into
  lexicon: HALOT
  rationale: Although the verb is broadly 'gave,' the concrete scene of transferring
    fiery material into someone's hands is better represented by 'put it into' in
    idiomatic English.
- source_word: חָפְנֵי
  chosen: the palms
  alternatives:
  - the hands
  - the cupped hands
  - the handfuls
  lexicon: HALOT
  rationale: The noun refers specifically to the hollow or cupped palms/hands. 'Palms'
    preserves the concreteness better than the generic 'hands.'
- source_word: לְבֻשׁ הַבַּדִּים
  chosen: the one clothed in linen
  alternatives:
  - the man clothed in linen
  - the linen-clothed one
  lexicon: HALOT
  rationale: Literally 'clothed in the linens/linen garments.' The Hebrew here does
    not explicitly repeat 'man' in this verse, though that figure is identified earlier.
    'The one clothed in linen' avoids importing an explicit noun not present here
    while remaining clear.
- source_word: וַיִּקַּח וַיֵּצֵא
  chosen: who took it and went out
  alternatives:
  - and he took it and went out
  lexicon: HALOT
  rationale: The final verbs continue the action of the linen-clothed figure. English
    can render this smoothly with a relative clause after identifying him, while preserving
    the sequence of actions.
