id: EZK.10.3
reference: Ezekiel 10:3
source:
  edition: WLC
  text: וְ/הַ/כְּרֻבִ֗ים עֹֽמְדִ֛ים מִ/ימִ֥ין לַ/בַּ֖יִת בְּ/בֹא֣/וֹ הָ/אִ֑ישׁ וְ/הֶ/עָנָ֣ן
    מָלֵ֔א אֶת הֶ/חָצֵ֖ר הַ/פְּנִימִֽית־׃
translation:
  text: Now the cherubim were standing on the south side of the house when the man
    went in, and the cloud filled the inner court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on the right side of the house.'' In temple orientation this
      refers to the south side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: Retains the established transliterated plural for the heavenly beings
    rather than simplifying to 'cherubs,' which can sound informal. The definite article
    is preserved.
- source_word: עֹמְדִים
  chosen: were standing
  alternatives:
  - stood
  lexicon: HALOT
  rationale: The participle conveys a durative/stative sense in the scene, so 'were
    standing' better reflects the ongoing posture than the simple past 'stood.'
- source_word: מִימִין לַבַּיִת
  chosen: on the south side of the house
  alternatives:
  - at the right side of the house
  - to the right of the house
  lexicon: HALOT
  rationale: Literally 'from/right side of the house,' but in temple orientation 'right
    side' corresponds to the south side when facing east, as in sanctuary directional
    usage. 'South side' communicates the spatial sense more clearly in English.
- source_word: בְּבֹאוֹ הָאִישׁ
  chosen: when the man went in
  alternatives:
  - as the man entered
  - at the man's entering
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal sense, naturally
    rendered 'when ... went in.' 'The man' refers back to the previously mentioned
    man clothed in linen; the text here simply says 'the man,' so that is preserved.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the man clothed in linen
  lexicon: HALOT
  rationale: The Hebrew expression is simply 'the man.' Expanding it in the main text
    would import context not explicitly repeated in this verse.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Straightforward rendering with the article preserved. In context this
    is the manifestation cloud associated with divine glory, but the noun itself should
    remain simply 'the cloud.'
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - had filled
  - was filling
  lexicon: HALOT
  rationale: 'The qatal form advances the narrative with a completed action: ''filled.'''
- source_word: הֶחָצֵר הַפְּנִימִית
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: Both are possible; 'court' is concise and standard for temple architecture.
    'Inner' preserves the adjectival distinction from outer areas.
