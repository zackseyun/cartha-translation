theological_decisions:
- issue: Directional rendering of מִימִין in temple context
  chosen_reading: Rendered contextually as 'on the south side of the house' rather
    than woodenly 'on the right side of the house.'
  alternative_readings:
  - on the right side of the house
  rationale: This is not a doctrinal issue but an interpretive spatial decision. In
    sanctuary orientation, the right side when facing east is the south side. The
    contextual rendering avoids ambiguity for modern readers while staying faithful
    to the referent.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of 'the man'
  chosen_reading: Kept as 'the man' without expanding the identification in the main
    text.
  alternative_readings:
  - the man clothed in linen
  rationale: The verse itself uses the simple noun with article. Preserving that wording
    avoids importing more than the source text states here, while the broader context
    supplies the identification.
  doctrine_reference: Translation philosophy §1
