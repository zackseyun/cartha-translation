id: EZK.10.15
reference: Ezekiel 10:15
source:
  edition: WLC
  text: וַ/יֵּרֹ֖מּוּ הַ/כְּרוּבִ֑ים הִ֣יא הַ/חַיָּ֔ה אֲשֶׁ֥ר רָאִ֖יתִי בִּֽ/נְהַר
    כְּבָֽר־׃
translation:
  text: And the cherubim rose up. They were the living creature that I had seen by
    the Kebar Canal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They were the living creatures that I saw by the river Chebar.' The
      Hebrew has singular 'the living creature,' likely identifying the cherubim with
      the class of beings seen earlier; 'Kebar Canal' may also be rendered 'river
      Chebar.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּרֹמּוּ
  chosen: rose up
  alternatives:
  - were lifted up
  - mounted up
  lexicon: HALOT
  rationale: From רוּם in the waw-consecutive imperfect, describing upward movement/elevation.
    'Rose up' is natural English and fits the visionary motion without over-specifying
    agency. 'Were lifted up' is possible but would make the verb more passive than
    the form suggests here.
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: Standard English biblical transliteration for כְּרוּבִים. 'Cherubim'
    preserves the recognizable form and solemn register appropriate to Ezekiel's vision.
- source_word: הִיא
  chosen: They were
  alternatives:
  - This was
  - It was
  lexicon: HALOT
  rationale: 'Although formally feminine singular (''she/it''), it refers back appositionally
    to the collective visionary beings just mentioned and agrees with הַחַיָּה (''the
    living creature,'' feminine singular used collectively/class-wise). English idiom
    prefers plural reference to match ''cherubim'': ''They were the living creature...''.'
- source_word: הַחַיָּה
  chosen: the living creature
  alternatives:
  - the living being
  - the living creatures
  lexicon: HALOT
  rationale: Consistent with Ezekiel 1 and 10, where חַיָּה denotes the animated heavenly
    being(s). Singular is retained because the Hebrew has singular with the pronoun,
    likely identifying the cherubim with the visionary class/entity previously seen.
    'Living creature' is the established and clearest rendering.
- source_word: אֲשֶׁר רָאִיתִי
  chosen: that I had seen
  alternatives:
  - which I saw
  lexicon: HALOT
  rationale: 'English past perfect best conveys prior action relative to the current
    narrative moment: Ezekiel identifies these beings as the ones seen earlier.'
- source_word: בִּנְהַר כְּבָר
  chosen: by the Kebar Canal
  alternatives:
  - at the river Kebar
  - by the river Chebar
  lexicon: HALOT
  rationale: נְהַר can denote a river or canal/watercourse; in the Babylonian setting
    'canal' is likely more precise. 'Kebar' follows standard transliteration from
    Hebrew rather than the older 'Chebar.' 'By' is a natural rendering of the preposition
    in this locative setting.
