theological_decisions:
- issue: Identification of the cherubim with the earlier beings seen in Ezekiel 1
  chosen_reading: 'Render the clause straightforwardly as an identification: ''They
    were the living creature that I had seen by the Kebar Canal.'''
  alternative_readings:
  - 'Render with singular English throughout: ''It was the living creature...'''
  - 'Render with plural predicate: ''They were the living creatures...'''
  rationale: The Hebrew uses singular feminine pronoun and noun after a plural subject,
    likely treating the beings as a class or visionary entity. The translation preserves
    this tension as much as readable English allows by keeping 'living creature' singular
    while using plural 'They were' to refer back to 'cherubim.' This avoids flattening
    the literary link to Ezekiel 1 while remaining idiomatic.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
