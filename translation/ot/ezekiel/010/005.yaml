id: EZK.10.5
reference: Ezekiel 10:5
source:
  edition: WLC
  text: וְ/קוֹל֙ כַּנְפֵ֣י הַ/כְּרוּבִ֔ים נִשְׁמַ֕ע עַד הֶ/חָצֵ֖ר הַ/חִיצֹנָ֑ה כְּ/ק֥וֹל
    אֵל שַׁדַּ֖י בְּ/דַבְּרֽ/וֹ־־׃
translation:
  text: And the sound of the wings of the cherubim was heard as far as the outer court,
    like the sound of God Almighty when he speaks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''like the sound of El Shaddai when he speaks.'' ''El Shaddai''
      is translated here as ''God Almighty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקוֹל
  chosen: And the sound
  alternatives:
  - And the noise
  - Now the sound
  lexicon: HALOT
  rationale: קוֹל commonly denotes 'sound, voice, noise.' Here it refers to an audible
    phenomenon produced by the wings, so 'sound' is the most natural English choice.
    The prefixed conjunction is rendered simply as 'And' in narrative sequence.
- source_word: כַּנְפֵי
  chosen: of the wings
  alternatives:
  - of the wing-beats
  - of the wings of
  lexicon: HALOT
  rationale: Construct plural of כָּנָף, 'wing.' 'Of the wings' preserves the concrete
    imagery without adding interpretive nuance such as 'wing-beats.'
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: Cherubim is the conventional transliteration for the heavenly beings
    כרובים and preserves the specific biblical referent better than the more colloquial
    'cherubs.'
- source_word: נִשְׁמַע
  chosen: was heard
  alternatives:
  - could be heard
  - was audible
  lexicon: HALOT
  rationale: 'Niphal of שׁמע here is passive/resultative: ''was heard.'' This is a
    straightforward formal rendering that remains natural in English.'
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: The preposition marks extent. 'As far as' clearly conveys the reach of
    the sound.
- source_word: הֶחָצֵר הַחִיצֹנָה
  chosen: the outer court
  alternatives:
  - the outer courtyard
  - the exterior court
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard' and חִיצוֹנָה means 'outer/outermost.' 'Outer
    court' is concise, idiomatic, and fits temple-context usage.
- source_word: כְּקוֹל
  chosen: like the sound of
  alternatives:
  - like the voice of
  - as the sound of
  lexicon: HALOT
  rationale: The comparison is between one audible phenomenon and another. 'Like the
    sound of' keeps the simile explicit and avoids implying articulated speech too
    early.
- source_word: אֵל שַׁדַּי
  chosen: God Almighty
  alternatives:
  - El Shaddai
  - the Almighty God
  lexicon: HALOT
  rationale: As a divine title, this is best translated rather than transliterated,
    in keeping with the project's philosophy to translate titles. 'God Almighty' is
    the standard, intelligible rendering of אֵל שַׁדַּי.
- source_word: בְּדַבְּרוֹ
  chosen: when he speaks
  alternatives:
  - when he spoke
  - in his speaking
  - as he speaks
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct plus suffix can denote temporal
    circumstance: ''when he speaks.'' Present tense works well in a simile describing
    the characteristic sound associated with divine speech, rather than a single past
    event.'
