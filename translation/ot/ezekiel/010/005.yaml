theological_decisions:
- issue: Rendering the divine title אֵל שַׁדַּי
  chosen_reading: God Almighty
  alternative_readings:
  - El Shaddai
  - the Almighty God
  rationale: The phrase is a title for God, and the translation philosophy directs
    that titles be translated to preserve meaning. 'God Almighty' is the clearest
    standard English equivalent and does not import additional doctrinal claims beyond
    the Hebrew title itself.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
