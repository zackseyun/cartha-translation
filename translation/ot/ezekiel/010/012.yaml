id: EZK.10.12
reference: Ezekiel 10:12
source:
  edition: WLC
  text: וְ/כָל בְּשָׂרָ/ם֙ וְ/גַבֵּ/הֶ֔ם וִֽ/ידֵי/הֶ֖ם וְ/כַנְפֵי/הֶ֑ם וְ/הָ/אֽוֹפַנִּ֗ים
    מְלֵאִ֤ים עֵינַ֨יִם֙ סָבִ֔יב לְ/אַרְבַּעְתָּ֖/ם אוֹפַנֵּי/הֶֽם־׃
translation:
  text: And all their bodies, their backs, their hands, their wings, and the wheels
    were full of eyes all around—the wheels belonging to the four of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'their flesh.'
    reason: lexical_alternative
  - marker: b
    text: The final clause may be rendered more compactly, 'their four wheels' or
      'the wheels of the four of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשָׂרָם
  chosen: their bodies
  alternatives:
  - their flesh
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh,' but in this enumerative description
    of the creatures' parts, 'bodies' communicates the collective physical frame more
    naturally in English without losing the concrete sense.
- source_word: גַבֵּיהֶם
  chosen: their backs
  alternatives:
  - their backsides
  - their rims/heights
  lexicon: HALOT
  rationale: Given the sequence 'bodies ... backs ... hands ... wings,' the referent
    is anatomical, so 'backs' fits best. Although the root can in some contexts relate
    to elevation or rim, here the body-part list favors 'backs'.
- source_word: יְדֵיהֶם
  chosen: their hands
  alternatives:
  - their arms
  lexicon: HALOT
  rationale: The standard sense of יָד is 'hand'; nothing in context requires broadening
    to 'arm'.
- source_word: כַנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Standard rendering for כָּנָף in visionary creature contexts.
- source_word: הָאוֹפַנִּים
  chosen: the wheels
  lexicon: HALOT
  rationale: אוֹפַן denotes a wheel; in Ezekiel's vision this is the established concrete
    image and should be translated rather than paraphrased.
- source_word: מְלֵאִים עֵינַיִם
  chosen: were full of eyes
  alternatives:
  - were covered with eyes
  lexicon: HALOT
  rationale: The adjective + noun construction is literally 'full of eyes.' 'Covered
    with eyes' is interpretive and vivid, but 'full of eyes' stays closer to the Hebrew
    while remaining clear.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: HALOT
  rationale: Idiomatic modern English for the adverbial sense 'around/on every side.'
- source_word: לְאַרְבַּעְתָּם
  chosen: belonging to the four of them
  alternatives:
  - for the four of them
  - of the four of them
  lexicon: HALOT
  rationale: The phrase clarifies that the wheels are associated with each of the
    four living creatures. English needs some expansion to make the relation explicit.
- source_word: אוֹפַנֵּיהֶם
  chosen: the wheels belonging to the four of them
  alternatives:
  - their wheels
  lexicon: HALOT
  rationale: The final noun resumes and specifies the wheels in relation to the four
    creatures. Rendering it explicitly avoids ambiguity in English and reflects the
    appositional/clarifying force at the end of the verse.
