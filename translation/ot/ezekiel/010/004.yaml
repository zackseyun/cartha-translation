id: EZK.10.4
reference: Ezekiel 10:4
source:
  edition: WLC
  text: וַ/יָּ֤רָם כְּבוֹד יְהוָה֙ מֵ/עַ֣ל הַ/כְּר֔וּב עַ֖ל מִפְתַּ֣ן הַ/בָּ֑יִת וַ/יִּמָּלֵ֤א הַ/בַּ֨יִת֙ אֶת הֶ֣/עָנָ֔ן וְ/הֶֽ/חָצֵר֙ מָֽלְאָ֔ה אֶת נֹ֖גַהּ כְּב֥וֹד יְהוָֽה־־־׃
translation:
  text: And the glory of Yahweh rose up from above the cherub to the threshold of the house, and the house was filled with the cloud, and the court was filled with the brightness of the glory of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from over the cherub.' The Hebrew uses the singular 'cherub' here.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the threshold of the temple.' Hebrew 'house' in this context refers to the sanctuary/temple building.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרָם
  chosen: rose up
  alternatives:
  - was lifted up
  - moved up
  lexicon: HALOT
  rationale: From רוּם in the wayyiqtol, describing upward movement/elevation of the divine glory. 'Rose up' is natural English and preserves the motion without over-interpreting agency.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifest divine glory/presence. The construct phrase is rendered transparently. יְהוָה follows the project default 'the LORD' rather than 'Yahweh'.
- source_word: מֵעַל הַכְּרוּב
  chosen: from above the cherub
  alternatives:
  - from over the cherub
  - from upon the cherub
  lexicon: HALOT
  rationale: מֵעַל indicates movement from a position above/upon. Singular כְּרוּב is retained as 'the cherub,' matching the Hebrew form in this vision context rather than harmonizing to a plural.
- source_word: עַל מִפְתַּן הַבָּיִת
  chosen: to the threshold of the house
  alternatives:
  - onto the threshold of the temple
  - to the doorway threshold of the house
  lexicon: HALOT
  rationale: With verbs of motion, עַל can indicate movement onto/to a location. מִפְתָּן is 'threshold.' הַבַּיִת in Ezekiel's temple vision can be rendered 'house'; this keeps the Hebrew term while remaining understandable.
- source_word: וַיִּמָּלֵא הַבַּיִת אֶת הֶעָנָן
  chosen: the house was filled with the cloud
  alternatives:
  - the house filled with the cloud
  lexicon: HALOT
  rationale: Passive/medio-passive sense of מלא in this stem is best represented by English passive. The direct-object marker with 'the cloud' yields the content filling the house. The definite article supports 'the cloud,' likely the known theophanic cloud.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Standard rendering for עָנָן. The article suggests a specific, recognizable cloud associated with the divine presence.
- source_word: וְהֶחָצֵר מָלְאָה
  chosen: and the court was filled
  alternatives:
  - and the courtyard was full
  - and the court filled
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard.' 'Court' is concise and fits temple architecture. English passive smooths the Hebrew predicate construction while preserving sense.
- source_word: נֹגַהּ
  chosen: brightness
  alternatives:
  - radiance
  - splendor
  - shining
  lexicon: HALOT
  rationale: נֹגַהּ denotes shining brightness or radiance. 'Brightness' is clear modern English and pairs well with 'glory' without becoming overly ornate.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: Repeated phrase kept consistent within the verse, preserving the emphasis of the Hebrew repetition.
