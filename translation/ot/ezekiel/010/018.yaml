id: EZK.10.18
reference: Ezekiel 10:18
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ כְּב֣וֹד יְהוָ֔ה מֵ/עַ֖ל מִפְתַּ֣ן הַ/בָּ֑יִת וַֽ/יַּעֲמֹ֖ד עַל
    הַ/כְּרוּבִֽים־׃
translation:
  text: Then the glory of the LORD went out from above the threshold of the house
    and stood over the cherubim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the temple.'' Hebrew: ''the house.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - departed
  - went forth
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form denotes movement outward.
    'Went out' is the plain, natural English equivalent and preserves the concrete
    motion without adding interpretive weight. 'Departed' is possible but slightly
    more interpretive/theological in this temple-departure context.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here refers to the manifest glory/presence associated with YHWH
    in Ezekiel's vision. 'The glory of the LORD' is the standard and transparent rendering,
    preserving both the construct relationship and the theological resonance of the
    phrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    while remaining faithful to the covenant name.
- source_word: מֵעַל
  chosen: from above
  alternatives:
  - from upon
  - 'off'
  lexicon: HALOT
  rationale: The preposition indicates movement away from a position above/upon something.
    'From above' reads naturally in English and fits the spatial imagery of the vision.
    'Off' is too colloquial; 'from upon' is more formal but less natural.
- source_word: מִפְתַּן
  chosen: threshold
  alternatives:
  - doorstep
  - sill
  lexicon: HALOT
  rationale: מִפְתָּן denotes a threshold or entrance sill. 'Threshold' is the most
    precise and idiomatic choice in this temple setting.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'the house.' In Ezekiel this refers to the temple, but
    the translation keeps the source term rather than substituting the interpretation
    'temple.' The context makes the referent clear.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took its stand
  - came to rest
  lexicon: HALOT
  rationale: עמד commonly means 'stand' or 'take one's stand.' 'Stood' is concise
    and preserves the visual sequence of the vision without overtranslating.
- source_word: עַל
  chosen: over
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: Given the visionary spatial relationship, 'over the cherubim' communicates
    position more naturally in English than 'upon the cherubim,' while still reflecting
    עַל. It also matches the preceding 'from above' imagery.
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the established English plural borrowed from Hebrew
    and best preserves the specific visionary beings in Ezekiel. ''Cherubs'' is more
    colloquial and less fitting for the register of the passage.'
