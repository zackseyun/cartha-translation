theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also aligns with the solemn register of Ezekiel and avoids introducing
    a denominationally loaded preference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to translate הַבָּיִת as 'house' or interpretively as 'temple'
  chosen_reading: the house
  alternative_readings:
  - the temple
  rationale: Although the referent is the temple, the Hebrew text uses 'house.' Optimal
    equivalence here favors preserving the source wording while allowing readers to
    infer the temple context from Ezekiel's vision.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
