theological_decisions:
- issue: Rendering of אָדָם
  chosen_reading: human
  alternative_readings:
  - man
  rationale: The phrase describes the form of the hands in contrast to the creatures'
    other features, not maleness. Following the doctrine's gender-accurate principle,
    'human hands' best matches the contextual sense while preserving the anthropomorphic
    contrast.
