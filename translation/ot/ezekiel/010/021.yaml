id: EZK.10.21
reference: Ezekiel 10:21
source:
  edition: WLC
  text: אַרְבָּעָ֨ה אַרְבָּעָ֤ה פָנִים֙ לְ/אֶחָ֔ד וְ/אַרְבַּ֥ע כְּנָפַ֖יִם לְ/אֶחָ֑ד
    וּ/דְמוּת֙ יְדֵ֣י אָדָ֔ם תַּ֖חַת כַּנְפֵי/הֶֽם׃
translation:
  text: Each one had four faces, and each one had four wings, and the likeness of
    human hands was under their wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the hands of a man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְבָּעָה אַרְבָּעָה
  chosen: Each one had four
  alternatives:
  - Four each
  - Each had four
  lexicon: HALOT
  rationale: The distributive repetition of the numeral indicates 'four each' or 'each
    one had four.' English idiom is best served by making the distributive sense explicit.
- source_word: פָנִים
  chosen: faces
  alternatives:
  - face
  lexicon: HALOT
  rationale: Plural noun; in this visionary context it refers to multiple faces possessed
    by each living creature.
- source_word: לְאֶחָד
  chosen: each one
  alternatives:
  - for each one
  - to each one
  lexicon: HALOT
  rationale: The preposition with 'one' functions distributively here, referring to
    each individual creature.
- source_word: וְאַרְבַּע כְּנָפַיִם לְאֶחָד
  chosen: and each one had four wings
  alternatives:
  - and four wings for each one
  lexicon: HALOT
  rationale: Maintains the parallel structure with the previous clause while producing
    natural English.
- source_word: וּדְמוּת
  chosen: and the likeness of
  alternatives:
  - and a likeness of
  - and something like
  lexicon: HALOT
  rationale: דְּמוּת often signals resemblance rather than strict identity in Ezekiel's
    visions. 'The likeness of' preserves the visionary, analogical language.
- source_word: יְדֵי אָדָם
  chosen: human hands
  alternatives:
  - the hands of a man
  - man's hands
  lexicon: HALOT
  rationale: אָדָם here denotes human kind rather than a specific male individual.
    Per doctrine, gender-accurate rendering favors 'human' in this context.
- source_word: תַּחַת כַּנְפֵיהֶם
  chosen: under their wings
  alternatives:
  - beneath their wings
  lexicon: HALOT
  rationale: Straightforward spatial expression; plural suffix refers back to the
    creatures.
