id: EZK.10.11
reference: Ezekiel 10:11
source:
  edition: WLC
  text: בְּ/לֶכְתָּ֗/ם אֶל אַרְבַּ֤עַת רִבְעֵי/הֶם֙ יֵלֵ֔כוּ לֹ֥א יִסַּ֖בּוּ בְּ/לֶכְתָּ֑/ם
    כִּ֣י הַ/מָּק֞וֹם אֲשֶׁר יִפְנֶ֤ה הָ/רֹאשׁ֙ אַחֲרָ֣י/ו יֵלֵ֔כוּ לֹ֥א יִסַּ֖בּוּ
    בְּ/לֶכְתָּֽ/ם־־׃
translation:
  text: When they went, they would go in any of their four directions; they did not
    turn as they went, for to the place where the head faced, they followed after
    it; they did not turn as they went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward their four sides' or 'to their four quarters.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the head'; this likely refers to the leading or frontward orientation
      in the vision.
    reason: cultural_note
lexical_decisions:
- source_word: בְּלֶכְתָּם
  chosen: when they went / as they went
  alternatives:
  - in their going
  - while going
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of הלך plus suffix expresses
    contemporaneous action. English idiom is best captured by 'when they went' at
    the start and 'as they went' in the repeated clauses, preserving the temporal
    sense without awkwardness.
- source_word: אֶל אַרְבַּעַת רִבְעֵיהֶם
  chosen: in any of their four directions
  alternatives:
  - toward their four sides
  - to their four quarters
  lexicon: HALOT
  rationale: רבע can denote a quarter/side. In this vision context of movement in
    four possible orientations, 'four directions' is the clearest modern English rendering.
    'Any of' brings out the distributive sense implied by the movement options.
- source_word: יֵלֵכוּ
  chosen: they would go
  alternatives:
  - they went
  - they go
  lexicon: HALOT
  rationale: The imperfect here describes customary or characteristic action in the
    visionary description. 'Would go' conveys repeated/habitual movement more naturally
    than a simple future in English.
- source_word: לֹא יִסַּבּוּ
  chosen: they did not turn
  alternatives:
  - they would not turn
  - they did not turn aside
  lexicon: HALOT
  rationale: נסב in this stem refers to turning or changing direction. 'Did not turn'
    is concise and fits the repeated emphasis that the wheels/creatures moved straight
    without swiveling.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for why they did not turn. 'For'
    preserves the explanatory force in a compact way.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the direction
  - the spot
  lexicon: HALOT
  rationale: The noun literally means 'place.' Although the sense approaches 'direction'
    in context, retaining 'place' stays closer to the Hebrew while remaining intelligible.
- source_word: יִפְנֶה
  chosen: faced
  alternatives:
  - turned
  - was directed
  lexicon: HALOT
  rationale: From פנה, 'to turn/face.' With 'the head' as subject, 'faced' is the
    most natural English expression for orientation.
- source_word: הָרֹאשׁ
  chosen: the head
  alternatives:
  - the chief one
  - the front
  lexicon: HALOT
  rationale: The Hebrew is literally 'the head.' In this vision it likely refers to
    the leading/front orientation rather than a human head, but the literal image
    should be preserved in the main text.
- source_word: אַחֲרָיו
  chosen: after it
  alternatives:
  - behind it
  - after him
  lexicon: HALOT
  rationale: The suffix refers back to 'the head' grammatically masculine singular.
    Since the referent is not personal here, 'it' is preferable in English. 'After
    it' preserves the following movement.
- source_word: יֵלֵכוּ ... אַחֲרָיו יֵלֵכוּ
  chosen: they followed after it
  alternatives:
  - they would go after it
  - they went after it
  lexicon: HALOT
  rationale: The Hebrew repeats הלך with אַחֲרָיו. 'They followed after it' makes
    the relation explicit in natural English while preserving the directional dependence.
