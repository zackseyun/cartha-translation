id: EZK.10.9
reference: Ezekiel 10:9
source:
  edition: WLC
  text: וָ/אֶרְאֶ֗ה וְ/הִנֵּ֨ה אַרְבָּעָ֣ה אוֹפַנִּים֮ אֵ֣צֶל הַ/כְּרוּבִים֒ אוֹפַ֣ן
    אֶחָ֗ד אֵ֚צֶל הַ/כְּר֣וּב אֶחָ֔ד וְ/אוֹפַ֣ן אֶחָ֔ד אֵ֖צֶל הַ/כְּר֣וּב אֶחָ֑ד וּ/מַרְאֵה֙
    הָ/א֣וֹפַנִּ֔ים כְּ/עֵ֖ין אֶ֥בֶן תַּרְשִֽׁישׁ׃
translation:
  text: And I looked, and behold, four wheels beside the cherubim, one wheel beside
    each cherub; and the appearance of the wheels was like the gleam of beryl stone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'tarshish stone'; the exact gemstone identification is uncertain.
      It may refer to beryl, chrysolite, or another precious stone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  chosen: And I looked
  alternatives:
  - And I saw
  lexicon: HALOT
  rationale: The verb ראה commonly means 'see,' but in narrative vision reports English
    'looked' can better reflect the act of directing attention before the description
    that follows. 'Saw' is possible, but 'looked' fits the sequence with 'behold.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and there were
  - and look
  lexicon: HALOT
  rationale: Retains the vivid deictic force of the Hebrew discourse marker in prophetic
    vision narrative. This is slightly formal but still natural enough in context
    and preserves the immediacy of the scene.
- source_word: אַרְבָּעָה אוֹפַנִּים
  chosen: four wheels
  lexicon: HALOT
  rationale: Straightforward rendering of the numeral plus noun. 'Wheels' is the normal
    gloss for אוֹפַן in Ezekiel's throne-vision context.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - at the side of
  lexicon: HALOT
  rationale: '''Beside'' is concise and natural, accurately conveying proximity without
    over-specifying position.'
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the established English plural for the Hebrew
    term and suits the elevated visionary context.'
- source_word: אוֹפַן אֶחָד אֵצֶל הַכְּרוּב אֶחָד
  chosen: one wheel beside each cherub
  alternatives:
  - one wheel beside one cherub
  lexicon: HALOT
  rationale: The Hebrew repeats 'one ... one' distributively. English idiom is clearer
    with 'each cherub,' which preserves the sense without awkward repetition.
- source_word: וּמַרְאֵה הָאוֹפַנִּים
  chosen: and the appearance of the wheels
  alternatives:
  - and the look of the wheels
  lexicon: HALOT
  rationale: מַרְאֶה often denotes visible appearance. 'Appearance' is natural and
    suitably descriptive in a vision report.
- source_word: כְּעֵין
  chosen: was like the gleam of
  alternatives:
  - was like the appearance of
  - was like the color of
  lexicon: HALOT
  rationale: The phrase literally involves 'like the eye/appearance of,' an idiom
    for visual resemblance. 'Gleam of' captures the visual quality in context better
    than the older 'color of,' which can be misleading in modern English.
- source_word: אֶבֶן תַּרְשִׁישׁ
  chosen: beryl stone
  alternatives:
  - tarshish stone
  - topaz
  - chrysolite
  lexicon: HALOT
  rationale: The precise gemstone identification is uncertain. 'Beryl' is a common
    modern scholarly rendering and communicates a gemstone without overclaiming certainty.
    'Stone' is retained because אֶבֶן is explicit in the Hebrew.
