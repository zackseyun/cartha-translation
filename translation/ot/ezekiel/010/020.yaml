id: EZK.10.20
reference: Ezekiel 10:20
source:
  edition: WLC
  text: הִ֣יא הַ/חַיָּ֗ה אֲשֶׁ֥ר רָאִ֛יתִי תַּ֥חַת אֱלֹהֵֽי יִשְׂרָאֵ֖ל בִּֽ/נְהַר
    כְּבָ֑ר וָ/אֵדַ֕ע כִּ֥י כְרוּבִ֖ים הֵֽמָּה־־׃
translation:
  text: This was the living creature that I saw beneath the God of Israel by the Kebar
    Canal, and I knew that they were cherubim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the river Kebar'; the Hebrew term can refer to a river or a canal.
      'Chebar' is the traditional English form of the name.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִיא
  chosen: This was
  alternatives:
  - It was
  - This is
  lexicon: HALOT
  rationale: The feminine singular pronoun refers back to the visionary being just
    described. In English, 'This was' naturally identifies the referent in retrospective
    narration and fits the past-tense context established by 'I saw' and 'I knew.'
- source_word: הַחַיָּה
  chosen: the living creature
  alternatives:
  - the living being
  - the animal
  lexicon: HALOT
  rationale: חַיָּה can denote a living thing/animal, but in Ezekiel's throne-vision
    context it refers to a supernatural animate being. 'Living creature' is established,
    accurate, and avoids reducing the referent to an ordinary animal.
- source_word: אֲשֶׁר רָאִיתִי
  chosen: that I saw
  alternatives:
  - which I saw
  lexicon: HALOT
  rationale: A straightforward relative clause; 'that I saw' is idiomatic modern English.
- source_word: תַּחַת
  chosen: beneath
  alternatives:
  - under
  - below
  lexicon: HALOT
  rationale: תַּחַת commonly means 'under/beneath.' 'Beneath' preserves the spatial
    imagery with slightly elevated but still readable diction suitable to the vision
    account.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - God of Israel
  lexicon: HALOT
  rationale: The construct phrase is definite in context. Including 'the' is natural
    English and preserves the covenantal title.
- source_word: בִּנְהַר כְּבָר
  chosen: by the Kebar Canal
  alternatives:
  - at the river Kebar
  - by the river Chebar
  - at the Kebar River
  lexicon: HALOT
  rationale: נְהַר can mean river/canal. In the Babylonian setting, 'canal' is likely
    more geographically precise than 'river.' 'Kebar' follows standard transliteration
    from Hebrew rather than the traditional 'Chebar.' 'By' fits the locative sense
    idiomatically.
- source_word: וָאֵדַע
  chosen: and I knew
  alternatives:
  - and I realized
  - and I came to know
  lexicon: HALOT
  rationale: The waw-consecutive with ידע narrates Ezekiel's recognition. 'And I knew'
    is formally close and clear; 'realized' is possible but slightly more interpretive.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Ezekiel knew, best rendered
    'that.'
- source_word: כְרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the standard English borrowing for the Hebrew plural
    and preserves the text''s formal, visionary register better than the more colloquial
    ''cherubs.'''
- source_word: הֵמָּה
  chosen: they were
  alternatives:
  - these were
  lexicon: HALOT
  rationale: The plural pronoun requires an English plural predicate. Although the
    antecedent earlier is grammatically singular collective ('the living creature'),
    the sense is the composite beings/wheels-beings Ezekiel identifies as cherubim,
    so 'they were' best reflects the Hebrew shift to plural.
