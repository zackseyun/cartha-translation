theological_decisions:
- issue: Identification of the throne beings
  chosen_reading: Render חַיָּה as 'living creature' and כְרוּבִים as 'cherubim,'
    preserving Ezekiel's recognition that the beings seen earlier are cherubim.
  alternative_readings:
  - Render more generically as 'living beings' without emphasizing the identification
  - Translate כְרוּבִים as 'cherubs'
  rationale: The verse itself states Ezekiel's recognition; the translation should
    preserve that theological-literary development without flattening the visionary
    terminology or domesticating it.
