id: EZK.10.17
reference: Ezekiel 10:17
source:
  edition: WLC
  text: בְּ/עָמְדָ֣/ם יַעֲמֹ֔דוּ וּ/בְ/רוֹמָ֖/ם יֵר֣וֹמּוּ אוֹתָ֑/ם כִּ֛י ר֥וּחַ הַ/חַיָּ֖ה
    בָּ/הֶֽם׃
translation:
  text: When they stood still, these stood still; and when they were lifted up, these
    were lifted up with them, for the spirit of the living creature was in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spirit of life was in them,' if הַחַיָּה is taken more abstractly;
      Hebrew also allows the nuance of 'breath' or 'wind' for 'spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעָמְדָם
  chosen: when they stood still
  alternatives:
  - as they stood
  - at their standing
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with 3mp suffix is temporal/circumstantial
    here, best rendered 'when they stood.' 'Stood still' clarifies the stative sense
    in context of coordinated movement between cherubim and wheels.
- source_word: יַעֲמֹדוּ
  chosen: these stood still
  alternatives:
  - they stood
  - they would stand
  lexicon: HALOT
  rationale: Qal imperfect 3mp of עמד continues the correlated action. 'These' is
    supplied in English to reflect the implied subject from context, namely the wheels,
    distinguished from the antecedent 'they' (the cherubim/living creatures).
- source_word: וּבְרוֹמָם
  chosen: when they were lifted up
  alternatives:
  - and when they rose
  - and when they were exalted
  lexicon: HALOT
  rationale: The conjunction plus ב with infinitive construct of רום gives a second
    temporal clause parallel to the first. In this throne-vision context the sense
    is physical upward movement, not exaltation.
- source_word: יֵרוֹמּוּ אֹתָם
  chosen: these were lifted up with them
  alternatives:
  - they were lifted up, them
  - they rose with them
  lexicon: HALOT
  rationale: The verb is passive/reflexive in sense ('were lifted up'). The object
    marker with suffix after a passive-form verb is awkward in English if rendered
    woodenly; context shows the wheels were lifted up along with the living creatures.
    'With them' expresses the relational force clearly and matches the parallel in
    the vision narrative.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the explanation for the coordinated movement; 'for' preserves
    the explanatory connection in a concise literary register.
- source_word: רוּחַ
  chosen: the spirit
  alternatives:
  - the wind
  - the breath
  lexicon: HALOT
  rationale: In Ezekiel's vision context רוּחַ can denote animating spirit or impulse.
    'Spirit' best fits the explanatory clause about the life-directing power within
    the wheels, while preserving the term's semantic richness.
- source_word: הַחַיָּה
  chosen: the living creature
  alternatives:
  - the living being
  - the animal
  lexicon: HALOT
  rationale: Singular collective/generic reference to the visionary creature associated
    with the wheels. 'Living creature' matches Ezekiel's established terminology and
    avoids the misleadingly mundane 'animal'.
- source_word: בָּהֶם
  chosen: was in them
  alternatives:
  - was within them
  lexicon: HALOT
  rationale: Simple locative expression referring to the wheels. 'In them' is natural
    and sufficiently literal.
