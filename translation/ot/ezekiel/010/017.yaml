theological_decisions:
- issue: Meaning of רוּחַ in the vision
  chosen_reading: the spirit of the living creature
  alternative_readings:
  - the spirit of life
  - the wind/breath of the living creature
  rationale: The phrase most naturally refers to the animating spirit associated with
    the living creature(s), explaining why the wheels move in exact concert with them.
    This preserves the visionary mystery without reducing it to mere wind or abstract
    vitality. Because the Hebrew singular can be collective, the translation keeps
    the singular as written while allowing contextual plurality in interpretation.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
