id: EZK.10.16
reference: Ezekiel 10:16
source:
  edition: WLC
  text: וּ/בְ/לֶ֨כֶת֙ הַ/כְּרוּבִ֔ים יֵלְכ֥וּ הָ/אוֹפַנִּ֖ים אֶצְלָ֑/ם וּ/בִ/שְׂאֵ֨ת
    הַ/כְּרוּבִ֜ים אֶת כַּנְפֵי/הֶ֗ם לָ/רוּם֙ מֵ/עַ֣ל הָ/אָ֔רֶץ לֹא יִסַּ֧בּוּ הָ/אוֹפַנִּ֛ים
    גַּם הֵ֖ם מֵ/אֶצְלָֽ/ם־־־׃
translation:
  text: When the cherubim moved, the wheels moved beside them; and when the cherubim
    lifted up their wings to rise from the earth, the wheels also did not turn away
    from beside them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not turn from beside them.' The Hebrew emphasizes that the wheels
      did not depart from the cherubim's side as they rose.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְלֶכֶת
  chosen: When ... moved
  alternatives:
  - as ... went
  - in the going of
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of הלך introduces a temporal
    clause. 'When ... moved' is natural modern English and preserves the temporal
    sense without wooden literalism.
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the established transliteration of the Hebrew
    plural כרובים and fits the visionary context better than the more colloquial ''cherubs.'''
- source_word: יֵלְכוּ
  chosen: moved
  alternatives:
  - went
  - walked
  lexicon: HALOT
  rationale: In this throne-vision context, the motion of the living beings is best
    rendered 'moved.' 'Went' is possible but less idiomatic in English for coordinated
    visionary movement.
- source_word: הָאוֹפַנִּים
  chosen: the wheels
  lexicon: HALOT
  rationale: אופן plainly denotes a wheel. The repeated use in Ezekiel's vision should
    remain consistent.
- source_word: אֶצְלָם
  chosen: beside them
  alternatives:
  - next to them
  - alongside them
  lexicon: HALOT
  rationale: אצל indicates proximity. 'Beside them' is concise and matches the spatial
    relationship in the vision.
- source_word: וּבִשְׂאֵת
  chosen: when ... lifted up
  alternatives:
  - when ... raised
  - in the lifting up of
  lexicon: HALOT
  rationale: Again a temporal clause with ב + infinitive construct, here from נשׂא.
    'Lifted up' is the most natural rendering with 'wings' as the object.
- source_word: אֶת כַּנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Direct object marker plus 'their wings'; straightforward rendering.
- source_word: לָרוּם
  chosen: to rise
  alternatives:
  - to be high
  - to lift themselves up
  lexicon: HALOT
  rationale: The infinitive of רום here expresses purpose/result of lifting the wings.
    'To rise' fits the immediate context of ascent from the earth.
- source_word: מֵעַל הָאָרֶץ
  chosen: from the earth
  alternatives:
  - from above the earth
  - off the ground
  lexicon: HALOT
  rationale: Literally 'from upon/above the earth.' In idiomatic English with a verb
    of rising, 'from the earth' communicates the sense clearly without awkwardness.
- source_word: לֹא יִסַּבּוּ
  chosen: did not turn away
  alternatives:
  - did not turn
  - did not change direction
  lexicon: HALOT
  rationale: The Niphal of סבב here conveys turning aside/away. Because the following
    phrase is 'from beside them,' 'did not turn away' best captures the idea that
    the wheels did not depart from the cherubim's side.
- source_word: גַּם הֵם
  chosen: also
  alternatives:
  - they too
  - even they
  lexicon: HALOT
  rationale: This adds emphasis that the wheels likewise behaved in coordination with
    the cherubim. English can express this naturally with 'also' attached to 'the
    wheels.'
- source_word: מֵאֶצְלָם
  chosen: from beside them
  alternatives:
  - away from them
  - from their side
  lexicon: HALOT
  rationale: The prefixed מן marks separation from proximity. 'From beside them' preserves
    the spatial nuance and explains the sense of not turning away.
