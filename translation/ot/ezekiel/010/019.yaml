id: EZK.10.19
reference: Ezekiel 10:19
source:
  edition: WLC
  text: וַ/יִּשְׂא֣וּ הַ/כְּרוּבִ֣ים אֶת כַּ֠נְפֵי/הֶם וַ/יֵּר֨וֹמּוּ מִן הָ/אָ֤רֶץ
    לְ/עֵינַ/י֙ בְּ/צֵאתָ֔/ם וְ/הָ/אֽוֹפַנִּ֖ים לְ/עֻמָּתָ֑/ם וַֽ/יַּעֲמֹ֗ד פֶּ֣תַח
    שַׁ֤עַר בֵּית יְהוָה֙ הַ/קַּדְמוֹנִ֔י וּ/כְב֧וֹד אֱלֹהֵֽי יִשְׂרָאֵ֛ל עֲלֵי/הֶ֖ם
    מִ/לְ/מָֽעְלָ/ה־־־־׃
translation:
  text: Then the cherubim lifted up their wings and rose from the earth before my
    eyes as they went out, with the wheels beside them; and it stood at the entrance
    of the eastern gate of the house of the LORD, and the glory of the God of Israel
    was above them, from above.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the wheels were opposite them / alongside them.' The Hebrew expression
      denotes corresponding position.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'it stood' is singular; the subject may be the composite throne-chariot
      structure rather than the cherubim alone.
    reason: alternative_reading
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: lifted up
  alternatives:
  - raised
  - carried
  lexicon: HALOT
  rationale: The verb נשׂא in this context with 'their wings' naturally means 'lifted
    up' or 'raised.' 'Lifted up' preserves the concrete motion and fits the visionary
    scene.
- source_word: הַכְּרוּבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the standard English transliteration for the plural
    heavenly beings כרובים and preserves the specific biblical imagery better than
    the more colloquial ''cherubs.'''
- source_word: כַּנְפֵיהֶם
  chosen: their wings
  lexicon: HALOT
  rationale: Straightforward rendering of the construct plural with pronominal suffix.
- source_word: וַיֵּרֹמּוּ מִן־הָאָרֶץ
  chosen: rose from the earth
  alternatives:
  - were lifted up from the earth
  - went up from the ground
  lexicon: HALOT
  rationale: The Niphal-like/passive-elevative sense here describes upward movement.
    'Rose from the earth' is natural English and preserves the visual ascent.
- source_word: לְעֵינַי
  chosen: before my eyes
  alternatives:
  - in my sight
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression, preserving Ezekiel's eyewitness
    perspective.
- source_word: בְּצֵאתָם
  chosen: as they went out
  alternatives:
  - when they went out
  - in their going out
  lexicon: HALOT
  rationale: The infinitive construct with preposition marks contemporaneous action.
    'As they went out' reads smoothly while retaining temporal overlap.
- source_word: וְהָאוֹפַנִּים
  chosen: with the wheels
  alternatives:
  - and the wheels
  lexicon: HALOT
  rationale: Although formally introduced with waw, the clause continues the description
    of accompaniment. Rendering with 'with the wheels' makes explicit that the wheels
    moved in relation to the cherubim, matching the following לְעֻמָּתָם.
- source_word: לְעֻמָּתָם
  chosen: beside them
  alternatives:
  - opposite them
  - alongside them
  lexicon: HALOT
  rationale: The term denotes corresponding position or facing alignment. In this
    movement scene, 'beside them' communicates the spatial relation clearly in idiomatic
    English.
- source_word: וַיַּעֲמֹד
  chosen: it stood
  alternatives:
  - he stood
  - they stood
  lexicon: HALOT
  rationale: The verb is singular masculine, while the nearest plural subjects are
    'cherubim' and 'wheels.' The singular likely functions collectively or refers
    back to the composite chariot-throne entity. 'It stood' preserves the grammatical
    singular without over-specifying a personal subject.
- source_word: פֶּתַח שַׁעַר
  chosen: the entrance of the gate
  alternatives:
  - the doorway of the gate
  - the opening of the gate
  lexicon: HALOT
  rationale: פתח plus שער denotes the entry area/opening of the gate. 'Entrance of
    the gate' is clear and sufficiently formal.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' closely reflects the Hebrew and preserves the
    temple-house imagery. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name as specified
    in DOCTRINE.md.
- source_word: הַקַּדְמוֹנִי
  chosen: eastern
  alternatives:
  - east
  - eastward
  lexicon: HALOT
  rationale: The adjective denotes the eastern side/orientation. 'Eastern' is the
    natural attributive English form modifying 'gate.'
- source_word: וּכְבוֹד אֱלֹהֵי יִשְׂרָאֵל
  chosen: and the glory of the God of Israel
  lexicon: HALOT
  rationale: A direct rendering preserving Ezekiel's recurring phrase for the visible
    manifestation of God's presence.
- source_word: עֲלֵיהֶם
  chosen: above them
  alternatives:
  - over them
  lexicon: HALOT
  rationale: Spatially, 'above them' best fits the visionary description of the divine
    glory positioned over the cherubim/wheels.
- source_word: מִלְמָעְלָה
  chosen: from above
  alternatives:
  - up above
  - on high
  lexicon: HALOT
  rationale: The adverb intensifies or clarifies the elevated position. Rendered explicitly
    as 'from above' to preserve the Hebrew wording, though it is somewhat redundant
    in English.
