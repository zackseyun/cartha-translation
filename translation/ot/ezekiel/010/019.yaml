theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Subject of וַיַּעֲמֹד
  chosen_reading: singular collective rendered as 'it stood'
  alternative_readings:
  - the cherubim stood
  - he stood
  rationale: The Hebrew verb is singular despite preceding plural elements. Rather
    than harmonize to the plural or personify the subject, the translation preserves
    the singular with a collective 'it,' likely referring to the composite throne-chariot
    manifestation.
