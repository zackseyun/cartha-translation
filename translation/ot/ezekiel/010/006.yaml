theological_decisions:
- issue: Identification of the unnamed commanding subject
  chosen_reading: Retained as the pronoun 'he' without specifying 'the LORD' or another
    figure.
  alternative_readings:
  - the one on the throne commanded
  - the LORD commanded
  rationale: The immediate Hebrew clause uses only a pronominal suffix and does not
    explicitly restate the subject. To preserve the text's discourse flow and avoid
    importing an interpretive identification into the translation, the subject remains
    'he.'
  doctrine_reference: Preserve theological tension rather than resolve it.
