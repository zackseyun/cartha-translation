id: EZK.10.6
reference: Ezekiel 10:6
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/צַוֺּת/וֹ֙ אֶת הָ/אִ֤ישׁ לְבֻֽשׁ הַ/בַּדִּים֙ לֵ/אמֹ֔ר קַ֥ח
    אֵשׁ֙ מִ/בֵּינ֣וֹת לַ/גַּלְגַּ֔ל מִ/בֵּינ֖וֹת לַ/כְּרוּבִ֑ים וַ/יָּבֹא֙ וַֽ/יַּעֲמֹ֔ד
    אֵ֖צֶל הָ/אוֹפָֽן־־׃
translation:
  text: And it happened, when he commanded the man clothed in linen, saying, “Take
    fire from between the whirling wheel, from between the cherubim,” that he went
    in and stood beside the wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from among the wheelwork”; the Hebrew גַּלְגַּל can refer to a wheel
      or a whirling wheel structure in this vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event. 'And it happened'
    preserves the Hebrew discourse function without archaic phrasing.
- source_word: בְּצַוֺּתוֹ
  chosen: when he commanded
  alternatives:
  - as he commanded
  - at his commanding
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ב and 3ms suffix gives a temporal
    sense, 'when he commanded.' The subject is left as 'he' because the Hebrew does
    not restate the antecedent here.
- source_word: הָאִישׁ לְבֻשׁ הַבַּדִּים
  chosen: the man clothed in linen
  alternatives:
  - the man dressed in linen garments
  - the man wearing linen
  lexicon: HALOT
  rationale: This is the established figure from the surrounding vision. 'Clothed
    in linen' is natural English and preserves the participial/adjectival force of
    לְבֻשׁ with the definite 'linen' garments.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with these words
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech.
- source_word: קַח אֵשׁ
  chosen: Take fire
  alternatives:
  - Take some fire
  - Receive fire
  lexicon: HALOT
  rationale: Imperative plus direct object. English idiom allows the anarthrous noun
    as 'fire'; 'some fire' is possible but not required.
- source_word: מִבֵּינוֹת לַגַּלְגַּל
  chosen: from between the whirling wheel
  alternatives:
  - from among the wheelwork
  - from between the wheel
  lexicon: HALOT
  rationale: גַּלְגַּל can denote a wheel or whirling wheel; in this visionary context
    it likely refers to the wheel structure associated with the cherubim. 'Whirling
    wheel' preserves the vivid sense and distinguishes it from the later אוֹפָן term.
- source_word: מִבֵּינוֹת לַכְּרוּבִים
  chosen: from between the cherubim
  alternatives:
  - from among the cherubim
  lexicon: HALOT
  rationale: Spatial repetition in Hebrew is retained for emphasis and clarity in
    the vision scene.
- source_word: וַיָּבֹא
  chosen: he went in
  alternatives:
  - he came
  - he entered
  lexicon: HALOT
  rationale: In context of moving into the visionary space between/near the cherubim
    and wheels, 'went in' best captures the directional nuance rather than the more
    generic 'came.'
- source_word: וַיַּעֲמֹד אֵצֶל הָאוֹפָן
  chosen: stood beside the wheel
  alternatives:
  - stood next to the wheel
  - stood beside the wheelwork
  lexicon: HALOT
  rationale: אוֹפָן is the ordinary term for 'wheel.' 'Beside' is a natural rendering
    of אֵצֶל. Singular is retained as in the Hebrew.
