id: EZK.10.13
reference: Ezekiel 10:13
source:
  edition: WLC
  text: לָ/א֖וֹפַנִּ֑ים לָ/הֶ֛ם קוֹרָ֥א הַ/גַּלְגַּ֖ל בְּ/אָזְנָֽ/י׃
translation:
  text: As for the wheels, they were called “the wheelwork” in my hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “they were called ‘the wheel’ in my hearing.” The Hebrew גַּלְגַּל may
      mean “wheel,” but here “wheelwork” is used to preserve the distinction from
      אֹופַנִּים (“wheels”).
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאֹופַנִּים
  chosen: As for the wheels
  alternatives:
  - To the wheels
  - Regarding the wheels
  lexicon: HALOT
  rationale: The prefixed ל marks the topic/dative-like reference here rather than
    simple direction. In context, Ezekiel is identifying what was said concerning
    the wheels, so an English topical rendering such as 'As for the wheels' best captures
    the discourse function.
- source_word: לָהֶם
  chosen: they were called
  alternatives:
  - one called to them
  - he called them
  lexicon: HALOT
  rationale: 'The pronoun refers back to the wheels and works with קוֹרָא in an impersonal/passive-like
    sense: ''it was called concerning them / they were called.'' English idiom prefers
    an explicit passive here.'
- source_word: קוֹרָא
  chosen: were called
  alternatives:
  - was calling
  - called out
  lexicon: HALOT
  rationale: Though morphologically a participial form, in this clause it functions
    verbally to report what designation was given. 'Were called' communicates the
    naming sense of קרא clearly in English.
- source_word: הַגַּלְגַּל
  chosen: the wheelwork
  alternatives:
  - the wheel
  - the whirling wheel
  - the wheel-like thing
  lexicon: HALOT
  rationale: גַּלְגַּל can denote a wheel, whirl, or wheelwork. Because אֹופַנִּים
    already means 'wheels,' rendering this second term identically would flatten the
    distinction. 'Wheelwork' preserves the definite noun while signaling a collective/mechanical
    sense suitable to the visionary context.
- source_word: בְּאָזְנָי
  chosen: in my hearing
  alternatives:
  - in my ears
  - as I heard
  lexicon: HALOT
  rationale: This idiom means something was spoken audibly to the prophet. 'In my
    hearing' is natural modern English and preserves the firsthand auditory witness.
