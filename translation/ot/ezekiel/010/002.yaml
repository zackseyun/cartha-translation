id: EZK.10.2
reference: Ezekiel 10:2
source:
  edition: WLC
  text: וַ/יֹּ֜אמֶר אֶל הָ/אִ֣ישׁ לְבֻ֣שׁ הַ/בַּדִּ֗ים וַ/יֹּ֡אמֶר בֹּא֩ אֶל בֵּינ֨וֹת
    לַ/גַּלְגַּ֜ל אֶל תַּ֣חַת לַ/כְּר֗וּב וּ/מַלֵּ֨א חָפְנֶ֤י/ךָ גַֽחֲלֵי אֵשׁ֙ מִ/בֵּינ֣וֹת
    לַ/כְּרֻבִ֔ים וּ/זְרֹ֖ק עַל הָ/עִ֑יר וַ/יָּבֹ֖א לְ/עֵינָֽ/י־׀־־־־׃
translation:
  text: And he said to the man clothed in linen, and said, “Go in among the wheelwork,
    under the cherub, and fill your hands with coals of fire from among the cherubim,
    and scatter them over the city.” And he went in before my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “between the wheels.” The Hebrew term may refer to the wheeled structure
      collectively rather than a single wheel.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבֻשׁ הַבַּדִּים
  chosen: clothed in linen
  alternatives:
  - wearing linen garments
  - dressed in linen
  lexicon: HALOT
  rationale: The participial expression identifies the previously introduced figure
    by his attire. 'Clothed in linen' is natural English and preserves the formal
    descriptive force without adding 'garments,' which is implied by the plural noun.
- source_word: בֵּינוֹת לַגַּלְגַּל
  chosen: among the wheelwork
  alternatives:
  - between the wheels
  - into the midst of the wheel
  lexicon: HALOT
  rationale: גַּלְגַּל here likely refers collectively to the wheeled structure associated
    with the throne-chariot, not merely a single wheel. 'Wheelwork' captures the collective/mechanical
    sense better than the traditional singular 'wheel' while remaining readable.
- source_word: אֶל תַּחַת לַכְּרוּב
  chosen: under the cherub
  alternatives:
  - beneath the cherub
  lexicon: HALOT
  rationale: The phrase is spatial and singular in form. 'Under the cherub' preserves
    the Hebrew wording; the singular likely points to the nearest cherubic figure
    within the vision rather than functioning as a generic plural.
- source_word: וּמַלֵּא חָפְנֶיךָ
  chosen: fill your hands
  alternatives:
  - fill your palms
  - fill your cupped hands
  lexicon: HALOT
  rationale: חָפְנַיִם denotes the hollow or handful formed by the hands. 'Fill your
    hands' is idiomatic and sufficiently concrete in English.
- source_word: גַחֲלֵי אֵשׁ
  chosen: coals of fire
  alternatives:
  - burning coals
  - fire-coals
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid imagery and avoids over-interpreting
    whether the emphasis is on the coals themselves or their burning state.
- source_word: מִבֵּינוֹת לַכְּרֻבִים
  chosen: from among the cherubim
  alternatives:
  - from between the cherubim
  lexicon: HALOT
  rationale: The preposition indicates origin from the space occupied by the cherubim.
    'From among' reads more naturally in English while preserving the spatial sense.
- source_word: וּזְרֹק עַל הָעִיר
  chosen: scatter them over the city
  alternatives:
  - throw them over the city
  - cast them upon the city
  lexicon: HALOT
  rationale: Since the direct object is implied from the preceding 'coals of fire,'
    English benefits from supplying 'them.' 'Scatter' fits the action of dispersing
    coals in judgment better than the more generic 'throw.'
- source_word: לְעֵינָי
  chosen: before my eyes
  alternatives:
  - in my sight
  lexicon: HALOT
  rationale: An idiomatic rendering that preserves Ezekiel's eyewitness perspective
    within the vision.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  chosen: And he said ... and said
  alternatives:
  - And he said ... saying
  - Then he said ...
  lexicon: HALOT
  rationale: The Hebrew repeats the verb אמר in close succession. Retaining both occurrences
    reflects the source text's style, though the second introduces the quoted command.
