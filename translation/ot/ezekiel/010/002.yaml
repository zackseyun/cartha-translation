theological_decisions:
- issue: Nature of the coals-scattering action
  chosen_reading: Render the command straightforwardly as an act of judgment without
    explicating symbolism in the main text.
  alternative_readings:
  - Possible purification imagery alongside judgment
  rationale: In context, the act anticipates Jerusalem's judgment, but the verse itself
    does not explicitly interpret the symbolism. The translation should preserve the
    imagery without importing a fuller theological explanation into the text.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
