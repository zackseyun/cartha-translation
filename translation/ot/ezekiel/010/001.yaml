theological_decisions:
- issue: Visionary language and degree of identification
  chosen_reading: Retain layered comparison language ('something like... in appearance
    like the likeness of a throne') rather than stating directly that Ezekiel saw
    a throne.
  alternative_readings:
  - Simplify to 'there was a sapphire throne above them'
  rationale: Ezekiel intentionally uses repeated comparison terms to preserve the
    transcendence and indirectness of the vision. Flattening the wording would overstate
    what the text claims to identify directly.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
