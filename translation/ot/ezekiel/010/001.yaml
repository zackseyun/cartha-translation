id: EZK.10.1
reference: Ezekiel 10:1
source:
  edition: WLC
  text: וָ/אֶרְאֶ֗ה וְ/הִנֵּ֤ה אֶל הָ/רָקִ֨יעַ֙ אֲשֶׁר֙ עַל רֹ֣אשׁ הַ/כְּרֻבִ֔ים כְּ/אֶ֣בֶן
    סַפִּ֔יר כְּ/מַרְאֵ֖ה דְּמ֣וּת כִּסֵּ֑א נִרְאָ֖ה עֲלֵי/הֶֽם־־׃
translation:
  text: Then I looked, and behold, on the expanse that was above the heads of the
    cherubim there appeared over them something like a sapphire stone, in appearance
    like the likeness of a throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'like a lapis lazuli stone'; the Hebrew term traditionally
      rendered 'sapphire' may denote a deep blue precious stone identified differently
      in modern mineral terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  chosen: Then I looked
  alternatives:
  - And I saw
  - I looked
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I looked' gives natural
    English sequence while preserving the first-person visual report.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: This discourse marker signals sudden attention to the vision. 'Behold'
    preserves the vividness and prophetic register better than flatter alternatives.
- source_word: הָרָקִיעַ
  chosen: the expanse
  alternatives:
  - the firmament
  - the vault
  lexicon: HALOT
  rationale: רָקִיעַ in Ezekiel's throne vision denotes the extended heavenly platform
    above the creatures. 'Expanse' is clear modern English and avoids the archaic
    feel of 'firmament' while preserving the concrete imagery.
- source_word: אֲשֶׁר עַל רֹאשׁ הַכְּרֻבִים
  chosen: that was above the heads of the cherubim
  alternatives:
  - which was over the heads of the cherubim
  lexicon: HALOT
  rationale: This relative clause locates the expanse spatially. 'Above the heads'
    is straightforward and natural.
- source_word: הַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - the cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' is the standard English transliteration for this class
    of heavenly beings and best preserves the biblical imagery.'
- source_word: כְּאֶבֶן סַפִּיר
  chosen: something like a sapphire stone
  alternatives:
  - like sapphire stone
  - like a lapis lazuli stone
  lexicon: HALOT
  rationale: The phrase compares what is seen to a precious blue stone. 'Sapphire
    stone' follows traditional rendering and is readily understood; 'something like'
    reflects the visionary comparison.
- source_word: כְּמַרְאֵה דְּמוּת כִּסֵּא
  chosen: in appearance like the likeness of a throne
  alternatives:
  - having the appearance of the likeness of a throne
  - like the appearance of the form of a throne
  lexicon: HALOT
  rationale: Ezekiel stacks comparison terms to signal visionary approximation rather
    than direct identification. The translation preserves this cumulative tentativeness
    instead of collapsing it to simply 'a throne.'
- source_word: נִרְאָה
  chosen: there appeared
  alternatives:
  - was seen
  - appeared
  lexicon: HALOT
  rationale: The Niphal is best rendered as a passive/intransitive appearance formula.
    'There appeared' fits English idiom and keeps the focus on what became visible.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - above them
  - upon them
  lexicon: HALOT
  rationale: The pronoun refers back to the cherubim. 'Over them' matches the spatial
    imagery and links naturally with the preceding description of the expanse above
    their heads.
