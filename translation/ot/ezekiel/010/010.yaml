id: EZK.10.10
reference: Ezekiel 10:10
source:
  edition: WLC
  text: וּ/מַ֨רְאֵי/הֶ֔ם דְּמ֥וּת אֶחָ֖ד לְ/אַרְבַּעְתָּ֑/ם כַּ/אֲשֶׁ֛ר יִהְיֶ֥ה הָ/אוֹפַ֖ן
    בְּ/ת֥וֹךְ הָ/אוֹפָֽן׃
translation:
  text: As for their appearance, the four of them had one likeness, as when a wheel
    is within a wheel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the same likeness'; the Hebrew emphasizes that all four shared an identical
      form.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'as when the wheel is within the wheel.' English uses 'a wheel
      ... a wheel' idiomatically in this simile.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַרְאֵיהֶם
  chosen: As for their appearance
  alternatives:
  - And their appearance
  - Their appearance
  lexicon: HALOT
  rationale: מַרְאֶה denotes appearance or visible form. The prefixed conjunction
    is rendered idiomatically with a topical phrase ('As for') to introduce the description
    naturally in English while preserving the discourse function.
- source_word: דְּמוּת אֶחָד
  chosen: one likeness
  alternatives:
  - the same likeness
  - one form
  lexicon: HALOT
  rationale: דְּמוּת means likeness, form, or resemblance. Combined with אֶחָד, the
    phrase emphasizes uniformity among the four; 'one likeness' preserves the concrete
    imagery without overinterpreting.
- source_word: לְאַרְבַּעְתָּם
  chosen: the four of them
  alternatives:
  - for all four of them
  - for the four
  lexicon: HALOT
  rationale: The phrase specifies that the single likeness applied to all four. 'The
    four of them' is clear modern English and preserves the distributive sense.
- source_word: כַּאֲשֶׁר יִהְיֶה
  chosen: as when ... is
  alternatives:
  - just as ... was
  - like ... being
  lexicon: HALOT
  rationale: This comparative construction introduces an analogy. Although the imperfect
    can be rendered more literally, 'as when ... is' gives a natural English comparison
    without changing the sense.
- source_word: הָאוֹפַן
  chosen: a wheel
  alternatives:
  - the wheel
  lexicon: HALOT
  rationale: 'Though marked with the article in Hebrew, English idiom in a simile
    often uses the indefinite: ''as when a wheel is within a wheel.'' This avoids
    awkwardness while retaining the image.'
- source_word: בְּתוֹךְ הָאוֹפָן
  chosen: within a wheel
  alternatives:
  - in the midst of a wheel
  - inside a wheel
  lexicon: HALOT
  rationale: בְּתוֹךְ conveys being in the midst or inside. 'Within' is concise, natural,
    and preserves the visionary imagery familiar from the context.
