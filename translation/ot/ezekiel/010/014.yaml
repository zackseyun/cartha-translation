theological_decisions:
- issue: Relation of 'cherub' here to the 'ox' face in Ezekiel 1:10
  chosen_reading: Translate the text as 'the cherub' without harmonizing it to 'ox.'
  alternative_readings:
  - Translate 'cherub' as 'ox' to align with Ezekiel 1:10
  - Paraphrase as 'cherub-like ox'
  rationale: The Hebrew text in this verse explicitly reads 'the cherub.' The translation
    should preserve the wording of the received text rather than resolve the interpretive
    question by harmonization. Readers can be alerted to the parallel in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
