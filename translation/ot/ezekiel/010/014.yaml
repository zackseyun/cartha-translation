id: EZK.10.14
reference: Ezekiel 10:14
source:
  edition: WLC
  text: וְ/אַרְבָּעָ֥ה פָנִ֖ים לְ/אֶחָ֑ד פְּנֵ֨י הָ/אֶחָ֜ד פְּנֵ֣י הַ/כְּר֗וּב וּ/פְנֵ֤י
    הַ/שֵּׁנִי֙ פְּנֵ֣י אָדָ֔ם וְ/הַ/שְּׁלִישִׁי֙ פְּנֵ֣י אַרְיֵ֔ה וְ/הָ/רְבִיעִ֖י
    פְּנֵי נָֽשֶׁר־׃
translation:
  text: 'And each one had four faces: the face of the first was the face of the cherub,
    and the face of the second was the face of a man, and the third the face of a
    lion, and the fourth the face of an eagle.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ezekiel 1:10 describes the corresponding face as that of an ox; here the
      Hebrew text reads 'the cherub.'
    reason: cross_reference
  - marker: b
    text: Or 'vulture' for 'eagle'; the Hebrew term can refer more broadly to a large
      bird of prey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַרְבָּעָה פָנִים לְאֶחָד
  chosen: And each one had four faces
  alternatives:
  - And four faces belonged to each one
  - And there were four faces for each one
  lexicon: HALOT
  rationale: The Hebrew is verbless and literally reads 'and four faces to one.' In
    English, an explicit verb is required. 'Each one had four faces' preserves the
    distributive sense of לְאֶחָד naturally and clearly.
- source_word: פְּנֵי הָאֶחָד
  chosen: the face of the first
  alternatives:
  - the first face
  - the face of the one
  lexicon: HALOT
  rationale: Here הָאֶחָד functions ordinally in sequence with 'the second... the
    third... the fourth.' Rendering it 'the first' best reflects the structure of
    the list.
- source_word: הַכְּרוּב
  chosen: the cherub
  alternatives:
  - a cherub
  - the cherub-face
  lexicon: HALOT
  rationale: The definite article is present, so 'the cherub' is the most direct rendering.
    This wording also preserves the notable variation from Ezekiel 1:10, where the
    corresponding face is described as that of an ox.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - man
  - a human
  lexicon: HALOT
  rationale: In this visionary list of creature faces, אָדָם denotes a human/man face
    rather than humankind in the collective sense. Per doctrine, gender-accurate rendering
    is preferred where the source points that way. 'A man' is idiomatic after 'the
    face of.'
- source_word: אַרְיֵה
  chosen: a lion
  alternatives:
  - lion
  lexicon: HALOT
  rationale: Straightforward animal designation in anarthrous form; English idiom
    after 'the face of' favors 'a lion.'
- source_word: נָשֶׁר
  chosen: an eagle
  alternatives:
  - vulture
  lexicon: HALOT
  rationale: נָשֶׁר can denote a large bird of prey, often rendered 'eagle,' though
    some contexts may overlap with 'vulture.' 'Eagle' is the standard and best fits
    the traditional visionary imagery here; the lexical alternative is worth preserving
    in a footnote.
