id: EZK.10.8
reference: Ezekiel 10:8
source:
  edition: WLC
  text: וַ/יֵּרָ֖א לַ/כְּרֻבִ֑ים תַּבְנִית֙ יַד אָדָ֔ם תַּ֖חַת כַּנְפֵי/הֶֽם־׃
translation:
  text: And the cherubim appeared to have the form of a man's hand under their wings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a human hand.' The Hebrew reads literally 'the form of a hand of a
      man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  chosen: appeared to have
  alternatives:
  - was seen
  - there appeared
  lexicon: HALOT
  rationale: Niphal of ראה here functions as a passive/appearance expression. In context,
    the clause describes what was visible about the cherubim, so 'appeared to have'
    communicates the observational sense naturally in English while preserving the
    visual/passive force.
- source_word: לַכְּרֻבִים
  chosen: the cherubim
  alternatives:
  - to the cherubim
  - among the cherubim
  lexicon: HALOT
  rationale: 'The prefixed ל with the Niphal of ראה can mark the entity to which something
    was visible/appeared. English idiom is smoother with the cherubim as subject of
    appearance: ''the cherubim appeared to have...'' rather than a more wooden ''to
    the cherubim was seen...''.'
- source_word: תַּבְנִית
  chosen: the form of
  alternatives:
  - likeness of
  - pattern of
  lexicon: HALOT
  rationale: תבנית denotes form, pattern, or likeness. Here it introduces the visible
    shape under the wings. 'Form of' is natural modern English and fits the visionary
    description.
- source_word: יַד אָדָם
  chosen: a man's hand
  alternatives:
  - a human hand
  - the hand of a man
  lexicon: HALOT
  rationale: The phrase is singular and indefinite in sense. Following the doctrine's
    gender-accurate guidance for אָדָם, 'a man's hand' preserves the masculine singular
    expression. 'A human hand' is possible, but the source wording is more specifically
    'man' than an abstract humanity term here.
- source_word: תַּחַת כַּנְפֵיהֶם
  chosen: under their wings
  alternatives:
  - beneath their wings
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'Under their wings' is clear and
    idiomatic.
