theological_decisions:
- issue: Rendering of אָדָם in a visionary anatomical description
  chosen_reading: a man's hand
  alternative_readings:
  - a human hand
  rationale: The Hebrew uses אָדָם in a singular masculine construction describing
    visible form. Per the translation philosophy's gender-accurate principle and the
    contested-terms guidance for אָדָם ('man / humankind' by context), this context
    favors 'man' rather than the more neutral 'humanity/humankind.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
