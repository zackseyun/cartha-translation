id: EZK.10.22
reference: Ezekiel 10:22
source:
  edition: WLC
  text: וּ/דְמ֣וּת פְּנֵי/הֶ֔ם הֵ֣מָּה הַ/פָּנִ֗ים אֲשֶׁ֤ר רָאִ֨יתִי֙ עַל נְהַר כְּבָ֔ר
    מַרְאֵי/הֶ֖ם וְ/אוֹתָ֑/ם אִ֛ישׁ אֶל עֵ֥בֶר פָּנָ֖י/ו יֵלֵֽכוּ־־־׃
translation:
  text: And the likeness of their faces was the same as the faces that I had seen
    by the Kebar River—their appearance and themselves. Each one went straight ahead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'their appearance and themselves,' emphasizing that these were
      the same beings Ezekiel had seen earlier by the Kebar River.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'each one went toward the direction of his face,' an idiom meaning
      they moved straight forward without turning.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  chosen: And the likeness
  alternatives:
  - And the form
  - And the appearance
  lexicon: HALOT
  rationale: דְּמוּת denotes likeness, form, or resemblance. 'Likeness' preserves
    the connection to Ezekiel's repeated visionary language without over-interpreting
    it as mere visual appearance.
- source_word: פְּנֵיהֶם / הַפָּנִים
  chosen: their faces ... the faces
  alternatives:
  - their face ... the face
  - their appearance ... the appearance
  lexicon: HALOT
  rationale: פָּנִים literally means 'face/faces.' Retaining 'faces' preserves the
    concrete imagery of the living creatures rather than abstracting to 'appearance.'
- source_word: הֵמָּה
  chosen: was the same as
  alternatives:
  - were
  - they were
  lexicon: HALOT
  rationale: 'The pronoun is emphatic (''they themselves''). In English, the clause
    is best rendered idiomatically as an equation: ''was the same as.'' The emphatic
    force is partly carried by the later phrase ''their appearance and themselves.'''
- source_word: אֲשֶׁר רָאִיתִי
  chosen: that I had seen
  alternatives:
  - which I saw
  lexicon: HALOT
  rationale: The relative clause refers back to Ezekiel's earlier vision. English
    past perfect naturally conveys prior action relative to the present narration.
- source_word: עַל נְהַר כְּבָר
  chosen: by the Kebar River
  alternatives:
  - at the Kebar River
  - upon the river Kebar
  lexicon: HALOT
  rationale: עַל with a river in narrative location can be rendered idiomatically
    as 'by.' 'Kebar' is transliterated as a proper name.
- source_word: מַרְאֵיהֶם וְאוֹתָם
  chosen: their appearance and themselves
  alternatives:
  - their appearance and their very being
  - their form and them
  lexicon: HALOT
  rationale: This compressed phrase restates identity between the present vision and
    the earlier one. Rendering both elements preserves the Hebrew's emphatic fullness
    rather than collapsing it into a smoother but less transparent sentence.
- source_word: אִישׁ אֶל עֵבֶר פָּנָיו יֵלֵכוּ
  chosen: Each one went straight ahead
  alternatives:
  - Each one went toward the direction of his face
  - Each went forward in the direction before him
  lexicon: HALOT
  rationale: Literally, 'each man toward the other side/front of his face they would
    go,' an idiom already seen in Ezekiel for moving without turning aside. 'Went
    straight ahead' is the clearest optimal-equivalence rendering of the idiom.
