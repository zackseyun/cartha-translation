theological_decisions:
- issue: Rendering the divine name יְהוָה in the city's name
  chosen_reading: The LORD Is There
  alternative_readings:
  - Yahweh Is There
  - Jehovah Is There
  rationale: The verse gives a symbolic name built from the Tetragrammaton and the
    adverb 'there.' In keeping with the project's doctrine, יְהוָה is rendered 'the
    LORD' in the main text rather than transliterated. Because the Hebrew form of
    the name is significant to the naming formula, a footnote preserves the more transparent
    transliterated alternative.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — יְהוָה YHWH → the LORD;
    alternatives Yahweh, Jehovah preserved where relevant'
