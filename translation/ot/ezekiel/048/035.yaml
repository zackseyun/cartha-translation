id: EZK.48.35
reference: Ezekiel 48:35
source:
  edition: WLC
  text: סָבִ֕יב שְׁמֹנָ֥ה עָשָׂ֖ר אָ֑לֶף וְ/שֵׁם הָ/עִ֥יר מִ/יּ֖וֹם יְהוָ֥ה שָֽׁמָּ/ה־׀׃
translation:
  text: All around shall be eighteen thousand, and the name of the city from that
    day on shall be, The LORD Is There.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH shammah,'' traditionally transliterated ''Yahweh is there.'''
    reason: alternative_reading
lexical_decisions:
- source_word: סָבִיב
  chosen: All around
  alternatives:
  - Round about
  - The perimeter all around
  lexicon: HALOT
  rationale: Adverbial/topographical term summarizing the total measurement around
    the city. 'All around' is natural modern English and preserves the spatial sense
    without archaic phrasing.
- source_word: שְׁמֹנָה עָשָׂר אָלֶף
  chosen: eighteen thousand
  alternatives:
  - eighteen thousand cubits
  - eighteen thousand measures
  lexicon: HALOT
  rationale: The Hebrew gives the number plainly without repeating the unit in this
    clause; the unit is understood from the immediate context of the chapter's measurements.
    The main text keeps the Hebrew's terseness rather than supplying 'cubits,' which
    would be interpretive.
- source_word: וְשֵׁם הָעִיר
  chosen: and the name of the city
  alternatives:
  - and the city's name
  lexicon: HALOT
  rationale: A straightforward construct expression. The fuller phrasing is slightly
    more formal and suits the solemn naming formula.
- source_word: מִיּוֹם
  chosen: from that day on
  alternatives:
  - from that day
  - as of that day
  lexicon: HALOT
  rationale: The preposition plus 'day' marks the point from which the name applies.
    'From that day on' makes the ongoing force explicit in idiomatic English.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation's stated policy.
- source_word: שָׁמָּה
  chosen: Is There
  alternatives:
  - there
  - is there
  lexicon: HALOT
  rationale: 'In the city''s symbolic name, the adverb functions predicatively: ''YHWH
    shammah'' means ''The LORD is there.'' Capitalizing ''Is There'' signals that
    this is the formal name assigned to the city, not merely a descriptive clause.'
