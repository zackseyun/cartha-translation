id: EZK.48.22
reference: Ezekiel 48:22
source:
  edition: WLC
  text: וּ/מֵ/אֲחֻזַּ֤ת הַ/לְוִיִּם֙ וּ/מֵ/אֲחֻזַּ֣ת הָ/עִ֔יר בְּ/ת֛וֹךְ אֲשֶׁ֥ר לַ/נָּשִׂ֖יא
    יִֽהְיֶ֑ה בֵּ֣ין גְּב֣וּל יְהוּדָ֗ה וּ/בֵין֙ גְּב֣וּל בִּנְיָמִ֔ן לַ/נָּשִׂ֖יא
    יִהְיֶֽה׀׃
translation:
  text: And from the property of the Levites and from the property of the city, in
    the midst of what belongs to the prince, between the border of Judah and the border
    of Benjamin, it shall belong to the prince.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'within what shall be for the prince.'
    reason: lexical_alternative
  - marker: b
    text: Or 'between the territory of Judah and the territory of Benjamin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחֻזַּת
  chosen: property
  alternatives:
  - possession
  - holding
  - landholding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed possession or property holding. 'Property'
    is natural modern English and fits the territorial context of Ezekiel 48 without
    sounding overly technical.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation; definite article preserved.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward reference to the city's allotted land in the surrounding
    context.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - within
  - in the middle of
  lexicon: HALOT
  rationale: The phrase marks location within the larger tract assigned to the prince.
    'In the midst of' preserves the spatial sense more formally than simply 'within,'
    while remaining readable.
- source_word: אֲשֶׁר לַנָּשִׂיא יִהְיֶה
  chosen: what belongs to the prince
  alternatives:
  - that shall be for the prince
  - which shall belong to the prince
  lexicon: HALOT
  rationale: This relative clause identifies the larger area as the prince's portion.
    'What belongs to the prince' is idiomatic English that captures possession without
    unnecessary stiffness.
- source_word: נָשִׂיא
  chosen: prince
  alternatives:
  - leader
  - ruler
  lexicon: HALOT
  rationale: In Ezekiel, נָשִׂיא is a recognized title for the civic ruler. 'Prince'
    is the conventional and contextually appropriate rendering, preserving the distinction
    from 'king'.
- source_word: בֵּין גְּבוּל יְהוּדָה וּבֵין גְּבוּל בִּנְיָמִן
  chosen: between the border of Judah and the border of Benjamin
  alternatives:
  - between the territory of Judah and the territory of Benjamin
  - between Judah's border and Benjamin's border
  lexicon: HALOT
  rationale: גְּבוּל can mean border or territory. Here the phrase marks the tract's
    position between tribal boundary lines; 'border' keeps the spatial imagery close
    to the Hebrew.
- source_word: לַנָּשִׂיא יִהְיֶה
  chosen: it shall belong to the prince
  alternatives:
  - it shall be for the prince
  - it shall be the prince's
  lexicon: HALOT
  rationale: The repeated clause concludes emphatically that this intervening section
    is assigned to the prince. 'It shall belong to the prince' makes the possessive
    force explicit in clear English.
