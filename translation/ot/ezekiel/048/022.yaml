theological_decisions:
- issue: Rendering of נָשִׂיא in Ezekiel's restored-land vision
  chosen_reading: prince
  alternative_readings:
  - leader
  - ruler
  rationale: The term is a political title in Ezekiel's temple and land-allotment
    vision. 'Prince' preserves the textual distinction from royal terminology and
    avoids importing a more specific constitutional or messianic interpretation than
    the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it.
