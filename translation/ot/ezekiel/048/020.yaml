id: EZK.48.20
reference: Ezekiel 48:20
source:
  edition: WLC
  text: כָּל הַ/תְּרוּמָ֗ה חֲמִשָּׁ֤ה וְ/עֶשְׂרִים֙ אֶ֔לֶף בַּ/חֲמִשָּׁ֥ה וְ/עֶשְׂרִ֖ים
    אָ֑לֶף רְבִיעִ֗ית תָּרִ֨ימוּ֙ אֶת תְּרוּמַ֣ת הַ/קֹּ֔דֶשׁ אֶל אֲחֻזַּ֖ת הָ/עִֽיר־־־׃
translation:
  text: The whole contribution shall be twenty-five thousand by twenty-five thousand;
    you shall set apart the holy contribution as a quarter of the city's property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'twenty-five thousand cubits by twenty-five thousand cubits,' if the
      unit from the surrounding context is supplied.
    reason: lexical_alternative
  - marker: b
    text: Or, 'you shall set apart the holy contribution for a fourth part of the
      city's possession.'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּרוּמָה / תְּרוּמַת
  chosen: contribution / contribution
  alternatives:
  - offering
  - portion set apart
  - heave offering
  lexicon: HALOT
  rationale: In this land-allotment context, the term refers to a designated portion
    lifted out or set apart from the whole, not a cultic sacrifice brought to the
    altar. 'Contribution' preserves the idea of a reserved allotment without importing
    sacrificial overtones. The repeated noun is rendered consistently.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף ... בַּחֲמִשָּׁה וְעֶשְׂרִים אָלֶף
  chosen: twenty-five thousand by twenty-five thousand
  alternatives:
  - twenty-five thousand cubits by twenty-five thousand cubits
  lexicon: HALOT
  rationale: The Hebrew gives the dimensions numerically without repeating a unit
    here; 'by' is the natural English way to express dimensions. 'Cubits' is possible
    from the broader context, but since it is not explicit in this verse, it is preserved
    as an alternative rather than inserted into the main text.
- source_word: רְבִיעִית
  chosen: as a quarter of
  alternatives:
  - a fourth part
  - four-square
  lexicon: HALOT
  rationale: Here the feminine ordinal/substantival form most naturally indicates
    that the holy contribution is to be set apart in relation to the city's holding
    as one quarter. 'Four-square' is less likely in this syntax, and 'a fourth part'
    is semantically equivalent but less idiomatic in modern English.
- source_word: תָּרִימוּ
  chosen: you shall set apart
  alternatives:
  - you shall raise up
  - you shall offer up
  lexicon: HALOT
  rationale: The Hiphil of רום with תְּרוּמָה commonly carries the sense of setting
    apart or presenting as a contribution. In this administrative-geographical context,
    'set apart' best conveys the action without suggesting physical lifting.
- source_word: הַקֹּדֶשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: The adjective marks this contribution as belonging to the sacred domain.
    'Holy' is the standard biblical rendering and fits the register.
- source_word: אֶל
  chosen: as
  alternatives:
  - for
  - toward
  - in relation to
  lexicon: HALOT
  rationale: 'The preposition is somewhat idiomatic here. Rendering it woodenly as
    ''to'' or ''toward'' is awkward in English. ''As'' captures the functional relation:
    the holy contribution is designated as a quarter with respect to the city''s property.'
- source_word: אֲחֻזַּת הָעִיר
  chosen: the city's property
  alternatives:
  - the possession of the city
  - the city's holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or landed holding. 'The city's property'
    is clear modern English; 'holding' is also possible and slightly more technical.
    The genitive is rendered naturally as possession belonging to the city.
