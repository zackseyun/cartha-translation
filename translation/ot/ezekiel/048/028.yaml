id: EZK.48.28
reference: Ezekiel 48:28
source:
  edition: WLC
  text: וְ/עַל֙ גְּב֣וּל גָּ֔ד אֶל פְּאַ֖ת נֶ֣גֶב תֵּימָ֑נָ/ה וְ/הָיָ֨ה גְב֜וּל מִ/תָּמָ֗ר
    מֵ֚י מְרִיבַ֣ת קָדֵ֔שׁ נַחֲלָ֖ה עַל הַ/יָּ֥ם הַ/גָּדֽוֹל־־׃
translation:
  text: And along the border of Gad, on the south side southward, the border shall
    run from Tamar to the waters of Meribath-kadesh, to the Wadi of Egypt, and on
    to the Great Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meribath-kadesh may also be rendered 'Meribah-kadesh,' the more familiar
      form of the place name in English translations.
    reason: lexical_alternative
  - marker: b
    text: Or 'the brook of Egypt.' The Hebrew term can denote a wadi or streambed;
      'wadi' is used here to avoid suggesting a perennial brook.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And along
  alternatives:
  - And upon
  - Now along
  lexicon: HALOT
  rationale: Introduces the next boundary description with a natural English connective
    plus spatial sense. 'Along' fits boundary language better than the more literal
    but less idiomatic 'upon.'
- source_word: גְּבוּל גָּד
  chosen: the border of Gad
  alternatives:
  - Gad's border
  - the territory border of Gad
  lexicon: HALOT
  rationale: Construct chain indicates the boundary associated with Gad's allotment.
    'Border of Gad' is clear and formally close.
- source_word: אֶל פְּאַת נֶגֶב תֵּימָנָה
  chosen: on the south side southward
  alternatives:
  - toward the southern side
  - to the south side, toward the south
  lexicon: HALOT
  rationale: The Hebrew piles up southern directional terms for precision. The rendering
    preserves the emphasis without collapsing it to a single 'south.'
- source_word: וְהָיָה גְבוּל
  chosen: the border shall run
  alternatives:
  - the border shall be
  - and the border was
  lexicon: HALOT
  rationale: In boundary formulas, English idiom commonly expresses היה + גבול as
    the course of the boundary. 'Shall run' conveys the function of the line more
    naturally than the bare 'shall be.'
- source_word: מִתָּמָר
  chosen: from Tamar
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy.
- source_word: מֵי מְרִיבַת קָדֵשׁ
  chosen: the waters of Meribath-kadesh
  alternatives:
  - the waters of Meribah-kadesh
  - the waters of the dispute at Kadesh
  lexicon: HALOT
  rationale: A fixed toponym/boundary marker. Transliteration preserves the place
    name; 'Meribath-kadesh' follows the Hebrew construct form as written here. The
    more familiar 'Meribah-kadesh' is preserved as an alternative.
- source_word: נַחֲלָה
  chosen: the Wadi of Egypt
  alternatives:
  - the brook of Egypt
  - the wadi
  lexicon: HALOT
  rationale: In this boundary context, נחל denotes a wadi/seasonal watercourse, traditionally
    identified with the Wadi of Egypt. 'Brook' is traditional but can mislead modern
    readers into imagining a small perennial stream.
- source_word: עַל הַיָּם הַגָּדוֹל
  chosen: and on to the Great Sea
  alternatives:
  - to the Great Sea
  - along the Great Sea
  lexicon: HALOT
  rationale: Refers to the Mediterranean as the major western boundary. 'On to' reflects
    continuation of the boundary line to that landmark.
