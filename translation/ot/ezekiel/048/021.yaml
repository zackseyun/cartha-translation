id: EZK.48.21
reference: Ezekiel 48:21
source:
  edition: WLC
  text: וְ/הַ/נּוֹתָ֣ר לַ/נָּשִׂ֣יא מִ/זֶּ֣ה וּ/מִ/זֶּ֣ה לִ/תְרֽוּמַת הַ/קֹּ֣דֶשׁ
    וְ/לַ/אֲחֻזַּ֪ת הָ/עִ֟יר אֶל פְּנֵ֣י חֲמִשָּׁה֩ וְ/עֶשְׂרִ֨ים אֶ֥לֶף תְּרוּמָה֮
    עַד גְּב֣וּל קָדִימָ/ה֒ וְ/יָ֗מָּ/ה עַל פְּ֠נֵי חֲמִשָּׁ֨ה וְ/עֶשְׂרִ֥ים אֶ֨לֶף֙
    עַל גְּב֣וּל יָ֔מָּ/ה לְ/עֻמַּ֥ת חֲלָקִ֖ים לַ/נָּשִׂ֑יא וְ/הָֽיְתָה֙ תְּרוּמַ֣ת
    הַ/קֹּ֔דֶשׁ וּ/מִקְדַּ֥שׁ הַ/בַּ֖יִת ב/תוכ/ה׀׀־־׀־־־׃
translation:
  text: And what remains shall belong to the prince, on both sides of the holy contribution
    and of the city's property, alongside the twenty-five thousand of the contribution
    as far as the eastern border, and westward alongside the twenty-five thousand
    toward the western border, parallel to the portions for the prince. And the holy
    contribution and the sanctuary of the temple shall be in its midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply reads 'twenty-five thousand'; the unit is understood from
      the surrounding context of Ezekiel's land measurements.
    reason: cultural_note
lexical_decisions:
- source_word: וְהַנּוֹתָר
  chosen: And what remains
  alternatives:
  - And the remainder
  - And what is left
  lexicon: HALOT
  rationale: The participial form with article functions substantivally, referring
    to the remaining land after prior allotments. 'What remains' is natural modern
    English while preserving the sense of residue.
- source_word: לַנָּשִׂיא
  chosen: shall belong to the prince
  alternatives:
  - shall be for the prince
  - shall belong to the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel's temple vision regularly denotes the civic leader/prince.
    'Prince' preserves established Ezekiel usage better than the more generic 'ruler.'
    The supplied verb 'shall belong' makes explicit the dative relation in idiomatic
    English.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on both sides
  alternatives:
  - from this side and from that side
  - on this side and on that side
  lexicon: HALOT
  rationale: The idiom indicates land lying on either side of the sacred allotment
    and city property. 'On both sides' is concise and accurate.
- source_word: לִתְרוּמַת הַקֹּדֶשׁ
  chosen: of the holy contribution
  alternatives:
  - of the holy allotment
  - of the sacred district
  lexicon: HALOT
  rationale: תְּרוּמָה literally denotes a contribution/heave offering, but in Ezekiel
    45–48 it refers to the land set apart as an offering. 'Holy contribution' keeps
    the cultic nuance and remains readable.
- source_word: וְלַאֲחֻזַּת הָעִיר
  chosen: and of the city's property
  alternatives:
  - and of the city's possession
  - and of the city's holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or property-holding. 'City's property'
    is clear modern English for the municipal tract.
- source_word: אֶל־פְּנֵי חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף תְּרוּמָה
  chosen: alongside the twenty-five thousand of the contribution
  alternatives:
  - in front of the twenty-five thousand of the contribution
  - adjacent to the twenty-five thousand cubits of the contribution
  lexicon: HALOT
  rationale: אֶל־פְּנֵי here expresses spatial correspondence/adjacency. The measurement
    unit is implicit from the broader context; the Hebrew text here simply says 'twenty-five
    thousand.' 'Alongside' best fits the land-description style.
- source_word: עַד גְּבוּל קָדִימָה
  chosen: as far as the eastern border
  alternatives:
  - up to the eastern boundary
  lexicon: HALOT
  rationale: קָדִימָה indicates eastward/east. 'Eastern border' is straightforward
    in this boundary description.
- source_word: וְיָמָּה
  chosen: and westward
  alternatives:
  - and to the west
  - and west
  lexicon: HALOT
  rationale: Directional adverb continuing the description of the prince's land on
    the opposite side.
- source_word: עַל־פְּנֵי חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  chosen: alongside the twenty-five thousand
  alternatives:
  - opposite the twenty-five thousand
  - parallel to the twenty-five thousand
  lexicon: HALOT
  rationale: The repeated spatial phrase mirrors the earlier clause. 'Alongside' keeps
    the parallelism and avoids overcomplication.
- source_word: עַל גְּבוּל יָמָּה
  chosen: toward the western border
  alternatives:
  - up to the western border
  - at the western boundary
  lexicon: HALOT
  rationale: This marks the extent of the western side. 'Toward' fits the flow after
    'westward alongside...' and avoids awkward repetition.
- source_word: לְעֻמַּת חֲלָקִים
  chosen: parallel to the portions
  alternatives:
  - corresponding to the portions
  - opposite the portions
  lexicon: HALOT
  rationale: לְעֻמַּת conveys correspondence or alignment. 'Parallel to' suits the
    geometric land-allotment context.
- source_word: וְהָיְתָה תְּרוּמַת הַקֹּדֶשׁ
  chosen: And the holy contribution
  alternatives:
  - And the holy allotment
  - And the sacred contribution
  lexicon: HALOT
  rationale: The clause states the relation of the sacred tract within the prince's
    surrounding land. Repeating 'holy contribution' maintains consistency with earlier
    rendering of תְּרוּמָה.
- source_word: וּמִקְדַּשׁ הַבַּיִת
  chosen: and the sanctuary of the temple
  alternatives:
  - and the sanctuary of the house
  - and the temple sanctuary
  lexicon: HALOT
  rationale: בַּיִת in Ezekiel's temple vision often refers to the temple complex/house.
    'Temple' communicates the referent clearly in English; 'sanctuary of the temple'
    preserves the construct relation.
- source_word: בְּתוֹכָהּ
  chosen: shall be in its midst
  alternatives:
  - shall be in the middle of it
  - shall be within it
  lexicon: HALOT
  rationale: The feminine suffix most naturally refers to the holy contribution/tract.
    'In its midst' is idiomatic and preserves the spatial sense.
