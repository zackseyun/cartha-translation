id: EZK.48.25
reference: Ezekiel 48:25
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל שִׁמְע֗וֹן מִ/פְּאַ֥ת קָדִ֛ימָ/ה עַד פְּאַת יָ֖מָּ/ה יִשָׂשכָ֥ר
    אֶחָֽד׀־־׃
translation:
  text: And along the border of Simeon, from the east side to the west side, Issachar,
    one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the side of the sea.' Here 'sea' functions as a
      standard Hebrew term for 'west.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And along
  alternatives:
  - And beside
  - And on
  lexicon: HALOT
  rationale: In this territorial-allotment formula, עַל with prefixed conjunction
    introduces the next strip adjacent to the previous one. 'Along' fits the boundary
    sense more naturally in English than the more literal 'on' and is smoother than
    'beside' in this repeated cadastral pattern.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: The noun denotes the boundary line or border of a tribal allotment. 'Border'
    is concise and natural here; 'territory' would overstate the sense from line to
    whole region.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  rationale: Personal/tribal name is transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: מִ/פְּאַת
  chosen: from the ... side
  alternatives:
  - from the edge of
  - from the extremity of
  lexicon: HALOT
  rationale: פֵּאָה/פְּאַת refers to an extremity, edge, or side. In this geographic
    formula, 'side' is the most idiomatic English rendering.
- source_word: קָדִימָה
  chosen: east
  alternatives:
  - eastward
  - eastern
  lexicon: HALOT
  rationale: The directional term with locale ending indicates the eastern side. 'East
    side' is idiomatic with the paired 'west side' that follows.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  lexicon: HALOT
  rationale: Marks extent from one side to the other. 'To' is sufficient and natural
    in English; 'as far as' is possible but heavier.
- source_word: פְּאַת יָמָּה
  chosen: the west side
  alternatives:
  - the sea side
  - the western side
  lexicon: HALOT
  rationale: יָם literally means 'sea' but in Hebrew geographic usage commonly denotes
    'west' because of the Mediterranean. In this allotment formula, the directional
    sense is primary, so 'west side' communicates the plain sense best.
- source_word: יִשָׂשכָר
  chosen: Issachar
  rationale: Personal/tribal name is transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  lexicon: HALOT
  rationale: Although the Hebrew text has simply 'one,' the chapter's repeated allotment
    formula clearly means one tribal portion/strip of land. Supplying 'portion' in
    English makes the elliptical cadastral style intelligible without adding interpretive
    content beyond the immediate context.
