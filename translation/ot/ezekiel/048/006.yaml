id: EZK.48.6
reference: Ezekiel 48:6
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל אֶפְרַ֗יִם מִ/פְּאַ֥ת קָדִ֛ים וְ/עַד פְּאַת יָ֖מָּ/ה רְאוּבֵ֥ן
    אֶחָֽד׀־־׃
translation:
  text: And along the border of Ephraim, from the east side to the west side, Reuben,
    one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Reuben, one.' The word 'portion' is supplied in English because
      the chapter uses 'one' elliptically for one tribal allotment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the side of the sea'; here 'sea' functions as the standard Hebrew
      term for the west.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַל
  chosen: And along
  alternatives:
  - And beside
  - Now on
  lexicon: HALOT
  rationale: The preposition עַל in this territorial listing context indicates position
    along or beside a border. 'And along' reads naturally in English while preserving
    the spatial sense and the connective waw.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In Ezekiel 48's land-allotment context, גְּבוּל refers to a territorial
    boundary line. 'Border' is concise and idiomatic here.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: מִפְּאַת קָדִים
  chosen: from the east side
  alternatives:
  - from the eastern edge
  - from the east end
  lexicon: HALOT
  rationale: פֵּאָה denotes an extremity/side/edge, and קָדִים here marks the eastern
    direction. 'From the east side' is clear and matches the repeated formula in this
    chapter.
- source_word: וְעַד פְּאַת יָמָּה
  chosen: to the west side
  alternatives:
  - and as far as the western edge
  - to the sea side
  lexicon: HALOT
  rationale: פֵּאָה again means side/edge. יָם can denote 'sea' and by extension 'west'
    in Hebrew orientation. In this geographic formula, the directional sense is primary,
    so 'west side' is the clearest rendering; 'sea side' is a more literal but less
    transparent alternative.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Proper tribal name; transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  - one allotment
  lexicon: HALOT
  rationale: Although the Hebrew simply says 'one,' in this chapter it functions elliptically
    for one tribal allotment/portion. Supplying 'portion' makes the sense explicit
    in natural English without materially expanding the meaning.
