id: EZK.48.15
reference: Ezekiel 48:15
source:
  edition: WLC
  text: וַ/חֲמֵ֨שֶׁת אֲלָפִ֜ים הַ/נּוֹתָ֣ר בָּ/רֹ֗חַב עַל פְּנֵ֨י חֲמִשָּׁ֤ה וְ/עֶשְׂרִים֙
    אֶ֔לֶף חֹֽל ה֣וּא לָ/עִ֔יר לְ/מוֹשָׁ֖ב וּ/לְ/מִגְרָ֑שׁ וְ/הָיְתָ֥ה הָ/עִ֖יר ב/תוכ/ה־־׃
translation:
  text: And the remaining five thousand in width, along the face of the twenty-five
    thousand, shall be common land for the city, for dwelling, and for open land;
    and the city shall be in its midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'alongside the twenty-five thousand.' The Hebrew phrase literally reads
      'along the face of,' a spatial expression that can be rendered in several close
      ways.
    reason: lexical_alternative
  - marker: b
    text: '''Common land'' renders a Hebrew term meaning land that is not holy or
      sacred, in contrast to the consecrated allotments described around it.'
    reason: cultural_note
  - marker: c
    text: Or 'open land' may be understood as land around the city for common use,
      possibly including pastureland.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתָר
  chosen: the remaining
  alternatives:
  - that is left over
  - the remainder
  lexicon: HALOT
  rationale: The Niphal participle of יתר/נותר denotes what remains after prior allotments.
    'The remaining' is concise and natural in English while preserving the spatial/accounting
    sense of the land measurement.
- source_word: בָּרֹחַב
  chosen: in width
  alternatives:
  - for width
  - as to the width
  lexicon: HALOT
  rationale: רֹחַב refers to breadth/width. 'In width' fits the surveying context
    and idiomatic English description of dimensions.
- source_word: עַל־פְּנֵי
  chosen: along the face of
  alternatives:
  - alongside
  - adjacent to
  - opposite
  lexicon: HALOT
  rationale: Literally 'upon the face of.' In land-description contexts it marks extension
    alongside or in front of a measured tract. I retained a relatively formal rendering,
    'along the face of,' to preserve the spatial imagery and avoid over-interpreting
    the exact geometry.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  chosen: the twenty-five thousand
  alternatives:
  - twenty-five thousand cubits
  lexicon: HALOT
  rationale: The number refers back to the previously described sacred district's
    length. 'The twenty-five thousand' preserves the anaphoric force. 'Cubits' is
    implied from the larger context but not repeated in this clause, so it is not
    supplied in the main text.
- source_word: חֹל
  chosen: common land
  alternatives:
  - profane land
  - ordinary land
  - secular land
  lexicon: HALOT
  rationale: חֹל contrasts with holy/sacred space and denotes what is common or non-sacred.
    'Common land' best communicates the cultic contrast in readable modern English
    without importing pejorative overtones of 'profane.'
- source_word: לָעִיר
  chosen: for the city
  alternatives:
  - belonging to the city
  - for city use
  lexicon: HALOT
  rationale: The lamed marks purpose/allocation. 'For the city' is straightforward
    and leaves the exact administrative nuance open.
- source_word: לְמוֹשָׁב
  chosen: for dwelling
  alternatives:
  - for habitation
  - for settlement
  lexicon: HALOT
  rationale: מוֹשָׁב denotes dwelling/settlement. 'For dwelling' is natural and suits
    the city's residential function.
- source_word: וּלְמִגְרָשׁ
  chosen: and for open land
  alternatives:
  - and for pastureland
  - and for common land
  - and for suburbs
  lexicon: HALOT
  rationale: מִגְרָשׁ often refers to open land around a settlement, sometimes for
    pasture. In an urban-planning context, 'open land' is broad enough to fit the
    setting without the potentially misleading older English 'suburbs.'
- source_word: בְּתוֹכָהּ
  chosen: in its midst
  alternatives:
  - in the middle of it
  - within it
  lexicon: HALOT
  rationale: תּוֹךְ indicates the interior/middle. 'In its midst' preserves the formal
    spatial sense that the city is centrally situated within the allotted common tract.
