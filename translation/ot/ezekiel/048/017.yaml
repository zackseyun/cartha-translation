id: EZK.48.17
reference: Ezekiel 48:17
source:
  edition: WLC
  text: וְ/הָיָ֣ה מִגְרָשׁ֮ לָ/עִיר֒ צָפ֨וֹנָ/ה֙ חֲמִשִּׁ֣ים וּ/מָאתַ֔יִם וְ/נֶ֖גְבָּ/ה
    חֲמִשִּׁ֣ים וּ/מָאתָ֑יִם וְ/קָדִ֨ימָ/ה֙ חֲמִשִּׁ֣ים וּ/מָאתַ֔יִם וְ/יָ֖מָּ/ה חֲמִשִּׁ֥ים
    וּ/מָאתָֽיִם׃
translation:
  text: And the city's open land shall be two hundred fifty cubits to the north, two
    hundred fifty to the south, two hundred fifty to the east, and two hundred fifty
    to the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply gives the measurements as 'fifty and two hundred' in each
      direction; this is rendered in standard English order as 'two hundred fifty.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for the land around the city can also be rendered 'pasture
      land' or 'common land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: shall be
  alternatives:
  - and it shall be
  - and there shall be
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction continues the description with future/resultative
    force in context. 'Shall be' gives clear English legal-descriptive force appropriate
    to Ezekiel's allotment vision.
- source_word: מִגְרָשׁ
  chosen: open land
  alternatives:
  - pasture land
  - common land
  - suburbs
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to land set apart around a settlement, not urban 'suburbs'
    in the modern sense. 'Open land' is natural modern English and fits the measured
    area around the city.
- source_word: לָעִיר
  chosen: the city's
  alternatives:
  - for the city
  - belonging to the city
  lexicon: HALOT
  rationale: 'The lamed marks relation/possession: the open land is assigned to the
    city. English possessive is the most readable equivalent.'
- source_word: צָפוֹנָה
  chosen: to the north
  alternatives:
  - northward
  - on the north side
  lexicon: HALOT
  rationale: Directional he indicates direction/side. 'To the north' reads smoothly
    in the sequence of measurements.
- source_word: חֲמִשִּׁים וּמָאתַיִם
  chosen: two hundred fifty
  alternatives:
  - two hundred and fifty
  lexicon: HALOT
  rationale: The Hebrew number is literally 'fifty and two hundred.' Modern English
    normally expresses this as 'two hundred fifty.'
- source_word: וְנֶגְבָּה
  chosen: to the south
  alternatives:
  - southward
  - on the south side
  lexicon: HALOT
  rationale: Directional term from negeb/south with directional ending; rendered consistently
    with the other compass points.
- source_word: וְקָדִימָה
  chosen: to the east
  alternatives:
  - eastward
  - on the east side
  - to the front
  lexicon: HALOT
  rationale: In geographical orientation קדימה denotes east/front. Here the cardinal
    sense is required by the list of directions.
- source_word: וְיָמָּה
  chosen: to the west
  alternatives:
  - westward
  - on the west side
  - seaward
  lexicon: HALOT
  rationale: Literally 'sea-ward,' a standard Hebrew way to indicate west. In English,
    'to the west' communicates the intended compass direction most clearly.
