id: EZK.48.23
reference: Ezekiel 48:23
source:
  edition: WLC
  text: וְ/יֶ֖תֶר הַ/שְּׁבָטִ֑ים מִ/פְּאַ֥ת קָדִ֛ימָ/ה עַד פְּאַת יָ֖מָּ/ה בִּנְיָמִ֥ן
    אֶחָֽד־־׃
translation:
  text: 'And for the rest of the tribes: from the eastern side to the western side,
    Benjamin, one portion.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Benjamin, one.' The word 'portion' is supplied in English because
      the chapter repeatedly uses 'one' elliptically for one tribal allotment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: And for the rest
  alternatives:
  - And the remainder
  - And as for the rest
  lexicon: HALOT
  rationale: Introduces a new section concerning the remaining tribes. 'And for the
    rest' is natural English while preserving the connective and the sense of remainder.
- source_word: הַשְּׁבָטִים
  chosen: of the tribes
  alternatives:
  - of the tribal groups
  lexicon: HALOT
  rationale: Standard rendering of שֵׁבֶט in this land-allotment context is 'tribe.'
    The plural with article refers to the remaining tribes not yet listed.
- source_word: מִפְּאַת קָדִימָה
  chosen: from the eastern side
  alternatives:
  - from the east side
  - from the eastern border
  lexicon: HALOT
  rationale: פֵּאָה denotes an extremity, side, or border. 'Eastern side' fits the
    repeated territorial formula in Ezekiel 48 and reads smoothly in English.
- source_word: עַד פְּאַת יָמָּה
  chosen: to the western side
  alternatives:
  - as far as the west side
  - to the western border
  lexicon: HALOT
  rationale: יָם with directional ending here denotes the west/westward, literally
    the sea side. 'Western side' communicates the directional sense clearly in idiomatic
    English.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  rationale: Proper tribal name, transliterated according to the translation philosophy.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one allotment
  - one
  lexicon: HALOT
  rationale: Although the Hebrew reads simply 'one,' in this chapter it functions
    elliptically for one territorial strip/allotment. Supplying 'portion' makes the
    sense explicit in English without over-paraphrasing and matches the recurring
    pattern of the chapter.
