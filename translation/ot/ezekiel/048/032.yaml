id: EZK.48.32
reference: Ezekiel 48:32
source:
  edition: WLC
  text: וְ/אֶל פְּאַ֣ת קָדִ֗ימָ/ה חֲמֵ֤שׁ מֵאוֹת֙ וְ/אַרְבַּ֣עַת אֲלָפִ֔ים וּ/שְׁעָרִ֖ים
    שְׁלֹשָׁ֑ה וְ/שַׁ֨עַר יוֹסֵ֜ף אֶחָ֗ד שַׁ֤עַר בִּנְיָמִן֙ אֶחָ֔ד שַׁ֥עַר דָּ֖ן
    אֶחָֽד־׃
translation:
  text: 'And on the east side, four thousand five hundred cubits, with three gates:
    the gate of Joseph, one; the gate of Benjamin, one; the gate of Dan, one.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply reads 'four thousand five hundred'; 'cubits' is supplied from
      the surrounding context of the city's measurements in this chapter.
    reason: cross_reference
lexical_decisions:
- source_word: פְּאַת קָדִימָה
  chosen: the east side
  alternatives:
  - the eastern side
  - the east quarter
  lexicon: HALOT
  rationale: פְּאַת denotes a side, edge, or quarter, and קָדִימָה specifies the east/eastward
    direction. 'East side' is natural English and fits the repeated boundary-description
    formula in this passage.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  chosen: four thousand five hundred cubits
  alternatives:
  - four thousand five hundred
  - four thousand and five hundred cubits
  lexicon: HALOT
  rationale: The Hebrew number is literally 'five hundred and four thousand,' idiomatically
    4,500. 'Cubits' is supplied from the immediate context of the surrounding measurements
    in Ezekiel 48, since the unit is understood though not repeated in this clause.
- source_word: וּשְׁעָרִים שְׁלֹשָׁה
  chosen: with three gates
  alternatives:
  - and three gates
  - there shall be three gates
  lexicon: HALOT
  rationale: The conjunction links the measurement statement with the gate count.
    'With three gates' gives smooth English while preserving the descriptive force
    of the verbless Hebrew.
- source_word: שַׁעַר
  chosen: gate
  lexicon: HALOT
  rationale: Standard rendering for the city gates named after the tribes in this
    vision.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal/tribal name transliterated according to the translation philosophy.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  rationale: Personal/tribal name transliterated according to the translation philosophy.
- source_word: דָּן
  chosen: Dan
  rationale: Personal/tribal name transliterated according to the translation philosophy.
- source_word: אֶחָד ... אֶחָד ... אֶחָד
  chosen: one ... one ... one
  alternatives:
  - each one
  - one gate each
  lexicon: HALOT
  rationale: The repeated אֶחָד after each gate name is retained explicitly to mirror
    the Hebrew enumeration and emphasize one gate per tribe.
