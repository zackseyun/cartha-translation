id: EZK.48.33
reference: Ezekiel 48:33
source:
  edition: WLC
  text: וּ/פְאַת נֶ֗גְבָּ/ה חֲמֵ֨שׁ מֵא֜וֹת וְ/אַרְבַּ֤עַת אֲלָפִים֙ מִדָּ֔ה וּ/שְׁעָרִ֖ים
    שְׁלֹשָׁ֑ה שַׁ֣עַר שִׁמְע֞וֹן אֶחָ֗ד שַׁ֤עַר יִשָּׂשכָר֙ אֶחָ֔ד שַׁ֥עַר זְבוּלֻ֖ן
    אֶחָֽד־׃
translation:
  text: 'On the south side, 4,500 cubits by measure, with three gates: the gate of
    Simeon, one; the gate of Issachar, one; the gate of Zebulun, one.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says '4,500 by measure'; 'cubits' is supplied from the immediate
      context of the city's dimensions in this section.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/פְאַת נֶגְבָּה
  chosen: On the south side
  alternatives:
  - And on the south side
  - And the south side
  lexicon: HALOT
  rationale: פאה denotes a side/border/edge, and נגב here specifies the southern direction.
    English idiom favors 'on the south side' in this architectural description. The
    prefixed conjunction is naturally absorbed into the flow rather than mechanically
    repeated as 'and'.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  chosen: 4,500
  alternatives:
  - four thousand five hundred
  lexicon: HALOT
  rationale: The Hebrew number is literally 'five hundred and four thousand,' i.e.,
    4,500. Numerals are rendered in standard modern English form for readability.
- source_word: מִדָּה
  chosen: cubits by measure
  alternatives:
  - in measurement
  - as a measurement
  - measuring
  lexicon: HALOT
  rationale: In this chapter the city's dimensions are being specified. Since the
    immediately preceding context gives the unit as cubits, English supplies 'cubits'
    for clarity, while retaining 'by measure' to reflect מִדָּה rather than paraphrasing
    away the term.
- source_word: וּ/שְׁעָרִים שְׁלֹשָׁה
  chosen: with three gates
  alternatives:
  - and three gates
  - there shall be three gates
  lexicon: HALOT
  rationale: The phrase introduces the gates belonging to this side. 'With three gates'
    is concise, natural English and accurately conveys the descriptive function of
    the Hebrew without adding a verb not present in the text.
- source_word: שַׁעַר שִׁמְעוֹן אֶחָד
  chosen: the gate of Simeon, one
  alternatives:
  - one gate of Simeon
  - the gate named for Simeon, one
  lexicon: HALOT
  rationale: The Hebrew repeats 'gate' plus tribal name plus 'one' in a list. Retaining
    the appositional structure preserves the formal pattern of the source better than
    smoothing it into a freer paraphrase.
- source_word: שַׁעַר יִשָּׂשכָר אֶחָד
  chosen: the gate of Issachar, one
  alternatives:
  - one gate of Issachar
  lexicon: HALOT
  rationale: Same listing structure as the previous item; consistency is important
    in this highly patterned passage.
- source_word: שַׁעַר זְבוּלֻן אֶחָד
  chosen: the gate of Zebulun, one
  alternatives:
  - one gate of Zebulun
  lexicon: HALOT
  rationale: Same listing structure as the previous items; preserves the repetitive
    cadence of the Hebrew.
