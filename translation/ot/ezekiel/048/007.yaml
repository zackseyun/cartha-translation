id: EZK.48.7
reference: Ezekiel 48:7
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל רְאוּבֵ֗ן מִ/פְּאַ֥ת קָדִ֛ים עַד פְּאַת יָ֖מָּ/ה יְהוּדָ֥ה אֶחָֽד׀־־׃
translation:
  text: 'And along the border of Reuben, from the eastern side to the western side: Judah, one portion.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Judah, one.' The word 'portion' is implied by the land-allotment formula in this chapter.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sea side' can function as a directional term meaning 'west side.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the eastern side to the western side, Judah, one portion.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/עַל
  chosen: And along
  alternatives:
  - And beside
  - Now along
  lexicon: HALOT
  rationale: Introduces the next allotment in the sequence and marks location relative to the preceding tribal border. 'Along' fits the territorial description better than a more literal but less natural 'upon'.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this land-allotment context, גְּבוּל denotes the boundary line of a tribal portion. 'Border' is natural English and sufficiently precise.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Standard English transliteration of the tribal name.
- source_word: מִ/פְּאַת קָדִים
  chosen: from the eastern side
  alternatives:
  - from the east side
  - from the eastern edge
  lexicon: HALOT
  rationale: פְּאָה literally refers to an extremity/side/edge. In this surveying formula, 'side' communicates the directional extent idiomatically.
- source_word: עַד פְּאַת יָמָּה
  chosen: to the western side
  alternatives:
  - to the west side
  - to the sea side
  lexicon: HALOT
  rationale: יָם can denote 'sea' and by extension 'west' in Hebrew geographical orientation. Here the directional sense is primary in the repeated allotment formula, so 'western side' is clearest in English.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English transliteration of the tribal name.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  - one allotment
  lexicon: HALOT
  rationale: Although the Hebrew has only 'one,' the noun 'portion' is implied by the recurring distribution formula in Ezekiel 48. Supplying it in English avoids awkwardness while staying close to the sense.
