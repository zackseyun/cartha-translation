id: EZK.48.29
reference: Ezekiel 48:29
source:
  edition: WLC
  text: זֹ֥את הָ/אָ֛רֶץ אֲשֶׁר תַּפִּ֥ילוּ מִֽ/נַּחֲלָ֖ה לְ/שִׁבְטֵ֣י יִשְׂרָאֵ֑ל וְ/אֵ֨לֶּה֙ מַחְלְקוֹתָ֔/ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃פ
translation:
  text: This is the land that you shall assign as an inheritance to the tribes of Israel, and these are their portions, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their divisions' or 'their allotments'; 'their portions' conveys the sense of assigned tribal shares of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: 'Demonstrative introducing a summary statement; English idiom naturally supplies the copula: ''This is the land.'''
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/territory
  lexicon: HALOT
  rationale: Standard rendering of אֶרֶץ here in the concrete territorial sense within Ezekiel's land-allotment vision.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'the land'; 'that' is natural modern English.
- source_word: תַּפִּילוּ
  chosen: you shall assign
  alternatives:
  - you shall apportion
  - you shall cause to fall
  - you shall allot
  lexicon: HALOT
  rationale: Hiphil of נפל in land-distribution contexts means to assign/apportion, reflecting the idiom of causing a lot or inheritance share to fall. 'Assign' is clear modern English while preserving the distributive sense.
- source_word: מִנַּחֲלָה
  chosen: as an inheritance
  alternatives:
  - for inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה denotes inherited possession/allotment. The prefixed מִן here is idiomatic in the construction with הפיל in allotment language; 'as an inheritance' best captures the function of the land being distributed.
- source_word: לְשִׁבְטֵי יִשְׂרָאֵל
  chosen: to the tribes of Israel
  alternatives:
  - for the tribes of Israel
  lexicon: HALOT
  rationale: Marks the recipients of the allotment. 'To the tribes of Israel' is straightforward and idiomatic.
- source_word: וְאֵלֶּה
  chosen: and these are
  alternatives:
  - and these
  lexicon: HALOT
  rationale: Deictic plural introducing the concluding identification of the tribal allotments; English idiom again supplies the copula.
- source_word: מַחְלְקוֹתָם
  chosen: their portions
  alternatives:
  - their divisions
  - their allotments
  - their shares
  lexicon: HALOT
  rationale: Refers to the distributed shares of land among the tribes. 'Portions' is concise and natural; 'allotments' is possible but slightly more technical.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Prophetic formula introducing divine speech authentication. 'Declares' is standard readable English for נְאֻם.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD' by default; in the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering as 'Lord GOD,' preserving both elements of the Hebrew title.
