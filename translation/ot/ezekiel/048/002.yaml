id: EZK.48.2
reference: Ezekiel 48:2
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל דָּ֗ן מִ/פְּאַ֥ת קָדִ֛ים עַד פְּאַת יָ֖מָּ/ה אָשֵׁ֥ר אֶחָֽד׀־־׃
translation:
  text: And along the border of Dan, from the eastern side to the western side, Asher,
    one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to the side of the sea.' Here 'sea' functions as a directional
      term meaning west.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And along
  alternatives:
  - And beside
  - Now along
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the next allotment in the
    sequence and indicates position adjacent to the border. 'And along' is natural
    English and preserves the spatial sense.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this land-allotment context, גְּבוּל refers to a territorial boundary
    line. 'Border' is concise and idiomatic.
- source_word: דָּן
  chosen: Dan
  rationale: Proper tribal name; transliterated according to the translation philosophy.
- source_word: מִפְּאַת קָדִים
  chosen: from the eastern side
  alternatives:
  - from the east side
  - from the eastern edge
  lexicon: HALOT
  rationale: פֵּאָה denotes an extremity/side/edge, and קָדִים here marks the east.
    'From the eastern side' reads smoothly while preserving the geographic reference.
- source_word: עַד פְּאַת יָמָּה
  chosen: to the western side
  alternatives:
  - to the west side
  - to the side of the sea
  lexicon: HALOT
  rationale: יָם in directional usage commonly denotes the west, derived from the
    Mediterranean's location. 'Western side' communicates the directional sense clearly
    in English; the more literal 'side of the sea' would be less transparent here.
- source_word: אָשֵׁר
  chosen: Asher
  rationale: Proper tribal name; transliterated.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  - one allotment
  lexicon: HALOT
  rationale: In Ezekiel 48 this numeral functions elliptically for one tribal allotment/portion.
    Supplying 'portion' makes the sense explicit in English without adding interpretive
    excess, since the allotment formula is repeated throughout the chapter.
