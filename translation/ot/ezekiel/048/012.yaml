id: EZK.48.12
reference: Ezekiel 48:12
source:
  edition: WLC
  text: וְ/הָיְתָ֨ה לָ/הֶ֧ם תְּרוּמִיָּ֛ה מִ/תְּרוּמַ֥ת הָ/אָ֖רֶץ קֹ֣דֶשׁ קָדָשִׁ֑ים
    אֶל גְּב֖וּל הַ/לְוִיִּֽם־׃
translation:
  text: And it shall be for them a special allotment from the contribution of the
    land, a most holy place, beside the territory of the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a reserved portion' for תְּרוּמִיָּה; the Hebrew term is related to
      a contribution or offering set apart for sacred use.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'most holy'; compare the superlative expression sometimes rendered
      'holy of holies.' Here it describes the sanctity of the land portion.
    reason: lexical_alternative
  - marker: c
    text: Or 'the border of the Levites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - And it shall become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this descriptive allocation
    context functions futurally/resultatively, introducing what the land portion will
    be.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - belonging to them
  lexicon: HALOT
  rationale: The preposition ל marks possession/benefit for the priests referenced
    in the immediate context; 'for them' is natural and sufficiently precise.
- source_word: תְּרוּמִיָּה
  chosen: a special allotment
  alternatives:
  - an offering
  - a contribution
  - a reserved portion
  lexicon: HALOT
  rationale: This noun denotes a raised-offering/consecrated portion. In Ezekiel 45–48,
    the term refers specifically to a designated tract of land set apart, so 'special
    allotment' communicates the land-allocation sense better than cultic 'offering'
    alone.
- source_word: מִתְּרוּמַת הָאָרֶץ
  chosen: from the contribution of the land
  alternatives:
  - from the offering of the land
  - from the land's reserved portion
  lexicon: HALOT
  rationale: The phrase identifies this allotment as deriving from the larger sacred
    tract set apart from the land. 'Contribution' preserves the terumah language while
    remaining readable.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: a most holy place
  alternatives:
  - most holy
  - holy of holies
  lexicon: HALOT
  rationale: The superlative construction means 'most holy.' Because the referent
    here is a land portion rather than the inner sanctuary itself, 'a most holy place'
    avoids importing the technical sanctuary term 'Holy of Holies' too strongly while
    preserving the superlative holiness.
- source_word: אֶל
  chosen: beside
  alternatives:
  - by
  - toward
  - next to
  lexicon: HALOT
  rationale: In this boundary description, the preposition indicates adjacency relative
    to the Levites' border; 'beside' is idiomatic in English for territorial proximity.
- source_word: גְּבוּל הַלְוִיִּם
  chosen: the territory of the Levites
  alternatives:
  - the border of the Levites
  - the boundary of the Levites
  lexicon: HALOT
  rationale: Although גְּבוּל can mean 'border/boundary,' in land-allotment contexts
    it often denotes the territorial area defined by that border. 'Territory' reads
    more naturally in English while fitting the context.
