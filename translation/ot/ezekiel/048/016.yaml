id: EZK.48.16
reference: Ezekiel 48:16
source:
  edition: WLC
  text: וְ/אֵלֶּה֮ מִדּוֹתֶי/הָ֒ פְּאַ֣ת צָפ֗וֹן חֲמֵ֤שׁ מֵאוֹת֙ וְ/אַרְבַּ֣עַת אֲלָפִ֔ים
    וּ/פְאַת נֶ֕גֶב חֲמֵ֥שׁ חמש מֵא֖וֹת וְ/אַרְבַּ֣עַת אֲלָפִ֑ים וּ/מִ/פְּאַ֣ת קָדִ֗ים
    חֲמֵ֤שׁ מֵאוֹת֙ וְ/אַרְבַּ֣עַת אֲלָפִ֔ים וּ/פְאַת יָ֕מָּ/ה חֲמֵ֥שׁ מֵא֖וֹת וְ/אַרְבַּ֥עַת
    אֲלָפִֽים־־׃
translation:
  text: 'And these are its measurements: the north side, four thousand five hundred;
    and the south side, four thousand five hundred; and from the east side, four thousand
    five hundred; and the west side, four thousand five hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'five hundred and four thousand' for each side; the English
      reverses the order to match standard number expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדּוֹתֶיהָ
  chosen: its measurements
  alternatives:
  - its dimensions
  lexicon: HALOT
  rationale: Refers to the city's measured extents in context. 'Measurements' is natural
    modern English and fits the repeated numerical specifications.
- source_word: פְּאַת
  chosen: side
  alternatives:
  - edge
  - corner
  - quarter
  lexicon: HALOT
  rationale: In this surveying/contextual usage, פאה denotes a side or border of the
    city. 'Side' is the clearest idiomatic rendering in English.
- source_word: צָפוֹן
  chosen: north
  alternatives:
  - northward
  lexicon: HALOT
  rationale: Cardinal direction naming the northern side of the city.
- source_word: נֶגֶב
  chosen: south
  alternatives:
  - south side
  - Negev
  lexicon: HALOT
  rationale: Here it is a directional term, not the regional proper name 'Negev,'
    since it is coordinated with the other cardinal directions.
- source_word: מִפְּאַת קָדִים
  chosen: from the east side
  alternatives:
  - the east side
  - from the eastern side
  lexicon: HALOT
  rationale: The prefixed מִן is present only here in the Hebrew phrase. Rendering
    it as 'from the east side' preserves the preposition without making the English
    overly awkward.
- source_word: קָדִים
  chosen: east
  alternatives:
  - eastward
  lexicon: HALOT
  rationale: Directional term for the eastern side.
- source_word: יָמָּה
  chosen: west
  alternatives:
  - seaward
  - toward the sea
  lexicon: HALOT
  rationale: Though literally related to 'sea,' in cardinal-direction usage it means
    'west.' 'West' communicates the intended sense directly for modern readers.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  chosen: four thousand five hundred
  alternatives:
  - four thousand and five hundred
  lexicon: HALOT
  rationale: Standard English number order reverses the Hebrew sequence. The same
    value is repeated for each side.
