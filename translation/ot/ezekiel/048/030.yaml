id: EZK.48.30
reference: Ezekiel 48:30
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה תּוֹצְאֹ֣ת הָ/עִ֑יר מִ/פְּאַ֣ת צָפ֔וֹן חֲמֵ֥שׁ מֵא֛וֹת וְ/אַרְבַּ֥עַת
    אֲלָפִ֖ים מִדָּֽה׃
translation:
  text: 'And these are the exits of the city: on the north side, four thousand five
    hundred in measurement.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the outgoings of the city.' The Hebrew term can denote the city's outward
      extents or exits.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'five hundred and four thousand,' an order commonly rendered
      in English as 'four thousand five hundred.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - Now these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative naturally introduces the next section.
    'And these are' preserves the connective force and the formal listing style of
    the Hebrew.
- source_word: תּוֹצְאֹת
  chosen: the exits
  alternatives:
  - the goings out
  - the boundaries
  - the gates
  lexicon: HALOT
  rationale: The noun denotes 'outgoings' or 'exits.' In this context introducing
    the city's sides and gates, 'exits' is the most natural English rendering without
    prematurely specifying 'gates,' which are named in the following verses.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun.
- source_word: מִפְּאַת
  chosen: on the ... side
  alternatives:
  - from the corner of
  - from the side of
  - from the edge of
  lexicon: HALOT
  rationale: פֵּאָה can mean side, edge, or corner. In this surveying context, 'side'
    best fits the description of the city's perimeter.
- source_word: צָפוֹן
  chosen: north
  alternatives:
  - the north
  lexicon: HALOT
  rationale: Directional term rendered idiomatically in English as 'north' within
    the phrase 'on the north side.'
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  chosen: four thousand five hundred
  alternatives:
  - four thousand and five hundred
  lexicon: HALOT
  rationale: The Hebrew order is 'five hundred and four thousand,' but idiomatic English
    reverses to 'four thousand five hundred' while preserving the total.
- source_word: מִדָּה
  chosen: in measurement
  alternatives:
  - as a measurement
  - cubits
  - measures
  lexicon: HALOT
  rationale: The noun indicates a measured dimension but does not itself specify the
    unit in this verse. 'In measurement' preserves the Hebrew's generality and avoids
    importing 'cubits,' which is not explicit here.
