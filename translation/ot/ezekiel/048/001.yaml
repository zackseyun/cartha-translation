id: EZK.48.1
reference: Ezekiel 48:1
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה שְׁמ֣וֹת הַ/שְּׁבָטִ֑ים מִ/קְצֵ֣ה צָפ֡וֹנָ/ה אֶל יַ֣ד דֶּֽרֶךְ
    חֶתְלֹ֣ן לְֽבוֹא חֲמָ֡ת חֲצַ֣ר עֵינָן֩ גְּב֨וּל דַּמֶּ֤שֶׂק צָפ֨וֹנָ/ה֙ אֶל יַ֣ד
    חֲמָ֔ת וְ/הָיוּ ל֧/וֹ פְאַת קָדִ֛ים הַ/יָּ֖ם דָּ֥ן אֶחָֽד־־׀־־־־׃
translation:
  text: 'Now these are the names of the tribes: from the northern extremity, beside
    the way of Hethlon to Lebo-hamath, Hazar-enan, at the border of Damascus northward
    beside Hamath, and extending from the east side to the sea, Dan, one portion.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Lebo-hamath, traditionally understood as a place-name; literally,
      'the entrance of Hamath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and it shall have its side from east to sea'; the Hebrew clause is compressed
      and describes the east-to-west extent of Dan's allotment.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  lexicon: HALOT
  rationale: Introduces the list that follows. 'Now' gives natural English discourse
    flow while preserving the conjunctive force; 'And these are' is more formal but
    less idiomatic here.
- source_word: שְׁמוֹת הַשְּׁבָטִים
  chosen: the names of the tribes
  alternatives:
  - the names of the tribal groups
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Tribes' is the standard and contextually
    precise rendering for Israel's tribal allotments.
- source_word: מִקְצֵה צָפוֹנָה
  chosen: from the northern extremity
  alternatives:
  - from the northern end
  - from the far north
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity or end. 'Northern extremity' preserves the
    boundary-list style of the passage.
- source_word: אֶל יַד
  chosen: beside
  alternatives:
  - at the side of
  - alongside
  lexicon: HALOT
  rationale: The idiom יַד with אֶל in boundary descriptions indicates adjacency.
    'Beside' is concise and natural in English.
- source_word: דֶּרֶךְ חֶתְלֹן
  chosen: the way of Hethlon
  alternatives:
  - the road to Hethlon
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean road/way. 'The way of Hethlon' stays close to the Hebrew
    and suits a topographical formula.
- source_word: לְבוֹא חֲמָת
  chosen: to Lebo-hamath
  alternatives:
  - toward the entrance of Hamath
  - as far as Lebo-hamath
  lexicon: HALOT
  rationale: Although literally 'to the entering of Hamath,' this expression functions
    as a place-name elsewhere. Rendering it as the proper name 'Lebo-hamath' best
    fits the geographic list.
- source_word: חֲצַר עֵינָן
  chosen: Hazar-enan
  alternatives:
  - Hazar Enan
  lexicon: HALOT
  rationale: Proper place-name transliterated by standard convention, in keeping with
    the translation philosophy to transliterate names.
- source_word: גְּבוּל דַּמֶּשֶׂק צָפוֹנָה
  chosen: at the border of Damascus northward
  alternatives:
  - on the northern border of Damascus
  - the border of Damascus on the north
  lexicon: HALOT
  rationale: The phrase marks the northern boundary in relation to Damascus. 'At the
    border of Damascus northward' preserves the sequence and boundary-list feel without
    over-paraphrasing.
- source_word: אֶל יַד חֲמָת
  chosen: beside Hamath
  alternatives:
  - alongside Hamath
  - at the side of Hamath
  lexicon: HALOT
  rationale: Same boundary idiom as earlier in the verse; consistency favors 'beside.'
- source_word: וְהָיוּ לוֹ
  chosen: and extending for it
  alternatives:
  - and it shall have
  - and there shall belong to it
  lexicon: HALOT
  rationale: This clause introduces the span of Dan's allotment. The Hebrew is somewhat
    compressed; the English rendering makes explicit that the portion stretches across
    the land while retaining the sense of possession/allotment.
- source_word: פְאַת קָדִים הַיָּם
  chosen: from the east side to the sea
  alternatives:
  - the eastern side to the west sea
  - from the east border to the sea
  lexicon: HALOT
  rationale: פֵאָה is an edge/side/border; קָדִים indicates east; הַיָּם here refers
    to the sea on the west side of the land. 'From the east side to the sea' communicates
    the full east-west span naturally.
- source_word: דָּן אֶחָד
  chosen: Dan, one portion
  alternatives:
  - Dan, one allotment
  - Dan, one section
  lexicon: HALOT
  rationale: The tribe name is followed elliptically by אֶחָד, indicating one territorial
    strip/allotment. 'One portion' is concise and fits the allotment context.
