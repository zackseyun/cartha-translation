id: EZK.48.4
reference: Ezekiel 48:4
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל נַפְתָּלִ֗י מִ/פְּאַ֥ת קָדִ֛מָ/ה עַד פְּאַת יָ֖מָּ/ה מְנַשֶּׁ֥ה
    אֶחָֽד׀־־׃
translation:
  text: And along the border of Naphtali, from the east side to the west side, Manasseh,
    one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Manasseh one.' The word 'portion' is supplied in English
      because the chapter repeatedly uses this elliptical allotment formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And along
  alternatives:
  - And beside
  - Now along
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the next territorial strip
    in the sequence. 'And along' is natural English and preserves the spatial sense
    of על in this boundary formula.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this land-allotment context, גְּבוּל refers to a territorial border
    or boundary line. 'Border' is concise and idiomatic in English.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: מִפְּאַת קָדִימָה עַד פְּאַת יָמָּה
  chosen: from the east side to the west side
  alternatives:
  - from the eastern edge to the western edge
  - from the east end to the west end
  lexicon: HALOT
  rationale: This repeated formula marks the full east-west span of each tribal allotment.
    פֵּאָה is literally 'side/edge.' 'From the east side to the west side' is clear,
    accurate, and preserves the geographic framing.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper tribal name; transliterated by standard convention.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  lexicon: HALOT
  rationale: Although the Hebrew has only 'one,' the allotment formula throughout
    the chapter implies 'one portion' or 'one tract.' Supplying 'portion' in English
    makes the elliptical Hebrew idiomatic without adding new content.
