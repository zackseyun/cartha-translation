  from: on the north, twenty-five thousand
  to: on the north, a length of twenty-five thousand
  rationale: The Hebrew text is elliptical for the northern dimension, omitting the word for 'length' (אֹרֶךְ) which appears for the parallel southern dimension. The current rendering mirrors this ellipsis, but the result is an awkward English phrase ('twenty-five thousand' what?). Supplying 'a length of' for clarity and parallelism, as is clearly implied by the context and the southern measurement, would be a better 'optimal-equivalence' rendering, making the text more readable without altering the core meaning.
