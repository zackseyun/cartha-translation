id: EZK.48.10
reference: Ezekiel 48:10
source:
  edition: WLC
  text: וּ֠/לְ/אֵ֜לֶּה תִּהְיֶ֣ה תְרֽוּמַת הַ/קֹּדֶשׁ֮ לַ/כֹּֽהֲנִים֒ צָפ֜וֹנָ/ה חֲמִשָּׁ֧ה וְ/עֶשְׂרִ֣ים אֶ֗לֶף וְ/יָ֨מָּ/ה֙ רֹ֚חַב עֲשֶׂ֣רֶת אֲלָפִ֔ים וְ/קָדִ֗ימָ/ה רֹ֚חַב עֲשֶׂ֣רֶת אֲלָפִ֔ים וְ/נֶ֕גְבָּ/ה אֹ֕רֶךְ חֲמִשָּׁ֥ה וְ/עֶשְׂרִ֖ים אָ֑לֶף וְ/הָיָ֥ה מִקְדַּשׁ יְהוָ֖ה בְּ/תוֹכֽ/וֹ־־׃
translation:
  text: 'And for these, the holy contribution shall belong to the priests: on the north, a length of twenty-five thousand; on the west, a width of ten thousand; on the east, a width of ten thousand; and on the south, a length of twenty-five thousand; and the sanctuary of the LORD shall be in its midst.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacred district' or 'the consecrated offering'; Hebrew 'the holy contribution,' a set-apart portion assigned for sacred use.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the north, twenty-five thousand'.
    reason: previous_rendering
lexical_decisions:
- source_word: וּלְאֵלֶּה
  chosen: And for these
  alternatives:
  - And for them
  - And to these
  lexicon: HALOT
  rationale: The preposition ל with the demonstrative points to allocation or assignment. 'For these' fits the land-allotment context better than a more wooden 'to these.'
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  chosen: the holy contribution
  alternatives:
  - the holy allotment
  - the sacred district
  - the consecrated offering
  lexicon: HALOT
  rationale: תְּרוּמָה is a 'contribution/heave offering,' but in Ezekiel's land vision it denotes a set-apart portion of land. 'Holy contribution' preserves the cultic sense while remaining readable. Alternatives are possible, but this rendering stays closer to the Hebrew wording.
- source_word: לַכֹּהֲנִים
  chosen: shall belong to the priests
  alternatives:
  - for the priests
  - to the priests
  lexicon: HALOT
  rationale: The dative marks the recipients of the allotted sacred portion. 'Shall belong to the priests' makes the possessive/allotment sense explicit in natural English.
- source_word: צָפוֹנָה
  chosen: on the north
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: Directional adverb in a boundary description. 'On the north' reads naturally in English measurements.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  chosen: twenty-five thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number in the boundary description.
- source_word: וְיָמָּה
  chosen: on the west
  alternatives:
  - westward
  - to the west
  lexicon: HALOT
  rationale: Though derived from 'sea,' in geographic orientation it means 'west/westward.' 'On the west' is the clearest idiomatic rendering here.
- source_word: רֹחַב
  chosen: a width
  alternatives:
  - width
  - breadth
  lexicon: HALOT
  rationale: Used in contrast with אֹרֶךְ ('length'). The indefinite article suits English measurement style.
- source_word: וְקָדִימָה
  chosen: on the east
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: Directional term for the eastern side. 'On the east' matches the parallel phrasing with north and west.
- source_word: וְנֶגְבָּה
  chosen: on the south
  alternatives:
  - southward
  - to the south
  lexicon: HALOT
  rationale: Directional term indicating the southern side. 'On the south' keeps the boundary formula consistent.
- source_word: אֹרֶךְ
  chosen: a length
  alternatives:
  - length
  lexicon: HALOT
  rationale: Contrasts with 'width' and describes the north-south dimension here.
- source_word: מִקְדַּשׁ יְהוָה
  chosen: the sanctuary of the LORD
  alternatives:
  - the LORD's sanctuary
  - the holy place of the LORD
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes the sanctuary/holy place. Per doctrine, יְהוָה is rendered 'the LORD.' The construct is naturally expressed as 'the sanctuary of the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the LORD.'
- source_word: בְּתוֹכוֹ
  chosen: in its midst
  alternatives:
  - in the middle of it
  - within it
  lexicon: HALOT
  rationale: Refers to the sanctuary being centrally located within the sacred allotment. 'In its midst' is idiomatic and preserves the spatial emphasis.
