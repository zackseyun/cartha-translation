id: EZK.48.18
reference: Ezekiel 48:18
source:
  edition: WLC
  text: וְ/הַ/נּוֹתָ֨ר בָּ/אֹ֜רֶךְ לְ/עֻמַּ֣ת תְּרוּמַ֣ת הַ/קֹּ֗דֶשׁ עֲשֶׂ֨רֶת אֲלָפִ֤ים
    קָדִ֨ימָ/ה֙ וַ/עֲשֶׂ֤רֶת אֲלָפִים֙ יָ֔מָּ/ה וְ/הָיָ֕ה לְ/עֻמַּ֖ת תְּרוּמַ֣ת הַ/קֹּ֑דֶשׁ
    וְ/הָיְתָ֤ה תבואת/ה לְ/לֶ֔חֶם לְ/עֹבְדֵ֖י הָ/עִֽיר׀׃
translation:
  text: And the remainder along the length, corresponding to the holy contribution,
    shall be ten thousand to the east and ten thousand to the west; it shall correspond
    to the holy contribution, and its produce shall be for food for the workers of
    the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew יָמָּה is literally 'toward the sea,' a standard Hebrew way of indicating
      west.
    reason: lexical_alternative
  - marker: b
    text: Or 'for bread'; here 'bread' likely stands for food provisions more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנּוֹתָר
  chosen: And the remainder
  alternatives:
  - And what is left
  - And the rest
  lexicon: HALOT
  rationale: The participial form from יתר/נותר denotes what remains after the prior
    allotment. 'Remainder' is concise and fits the land-allotment context.
- source_word: בָּאֹרֶךְ
  chosen: along the length
  alternatives:
  - in length
  - for the length
  lexicon: HALOT
  rationale: The phrase describes the remaining tract in relation to the longitudinal
    dimension of the sacred allotment. 'Along the length' is natural English and preserves
    the spatial sense.
- source_word: לְעֻמַּת
  chosen: corresponding to
  alternatives:
  - opposite
  - alongside
  - parallel to
  lexicon: HALOT
  rationale: The preposition indicates alignment or correspondence with the holy contribution.
    'Corresponding to' captures the measured relation better than the more visual
    'opposite' in this surveying context.
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  chosen: the holy contribution
  alternatives:
  - the holy allotment
  - the sacred offering
  lexicon: HALOT
  rationale: תרומה is a contribution/set-apart portion, and in Ezekiel 45–48 it refers
    to the designated sacred tract. 'Holy contribution' preserves the cultic terminology
    without over-paraphrasing.
- source_word: עֲשֶׂרֶת אֲלָפִים ... קָדִימָה
  chosen: ten thousand to the east
  alternatives:
  - ten thousand eastward
  lexicon: HALOT
  rationale: The cardinal number plus directional adverb marks the eastern extent.
    'To the east' is idiomatic and clear.
- source_word: וַעֲשֶׂרֶת אֲלָפִים יָמָּה
  chosen: and ten thousand to the west
  alternatives:
  - and ten thousand westward
  - and ten thousand toward the sea
  lexicon: HALOT
  rationale: ימה literally can mean 'seaward,' which in Israelite orientation usually
    means westward. Here 'to the west' communicates the directional sense clearly
    for modern readers.
- source_word: וְהָיָה לְעֻמַּת תְּרוּמַת הַקֹּדֶשׁ
  chosen: it shall correspond to the holy contribution
  alternatives:
  - it shall lie alongside the holy contribution
  - it shall be parallel to the holy contribution
  lexicon: HALOT
  rationale: The repeated phrase reinforces the tract's alignment with the sacred
    portion. Repeating 'correspond' preserves the structural emphasis of the Hebrew.
- source_word: וְהָיְתָה תבואתה
  chosen: and its produce shall be
  alternatives:
  - and its yield shall be
  - and its harvest shall be
  lexicon: HALOT
  rationale: תבואה refers to produce/yield of the land. 'Produce' is broad and suitable
    for an agricultural allotment.
- source_word: לְלֶחֶם
  chosen: for food
  alternatives:
  - for bread
  lexicon: HALOT
  rationale: Although לחם literally means 'bread,' it often functions more broadly
    for food provisions. In context of land produce supporting workers, 'for food'
    best conveys the intended sense in natural English.
- source_word: לְעֹבְדֵי הָעִיר
  chosen: for the workers of the city
  alternatives:
  - for those who serve the city
  - for the laborers of the city
  lexicon: HALOT
  rationale: The participle from עבד denotes those working or serving in relation
    to the city. 'Workers of the city' is straightforward and avoids implying specifically
    cultic service.
