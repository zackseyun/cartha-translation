id: EZK.48.14
reference: Ezekiel 48:14
source:
  edition: WLC
  text: וְ/לֹא יִמְכְּר֣וּ מִמֶּ֗/נּוּ וְ/לֹ֥א יָמֵ֛ר וְ/לֹ֥א יעבור רֵאשִׁ֣ית הָ/אָ֑רֶץ כִּי קֹ֖דֶשׁ לַ/יהוָֽה־־׃
translation:
  text: They must not sell any of it, nor exchange it, nor shall the firstfruits of the land pass over, for it is holy to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the firstfruits of the land' or 'the first portion of the land.' The Hebrew phrase may emphasize either the land's first/prime portion or its consecrated firstfruits-like status.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמְכְּרוּ
  chosen: sell
  alternatives:
  - dispose of
  lexicon: HALOT
  rationale: The verb מכר in the Hiphil/Qal usage here straightforwardly denotes selling. 'Sell' is the plain legal/economic sense in context of land restrictions.
- source_word: מִמֶּנּוּ
  chosen: any of it
  alternatives:
  - from it
  - any of this
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix refers back to the holy allotment/portion just described. English idiom prefers 'any of it' after 'sell' to make the prohibition natural and clear.
- source_word: יָמֵר
  chosen: exchange
  alternatives:
  - substitute
  - barter
  lexicon: HALOT
  rationale: From מוּר, commonly 'to exchange' or 'substitute.' In land/holy-property legislation, 'exchange' best captures the prohibition against trading one parcel for another.
- source_word: יעבור
  chosen: pass over to another
  alternatives:
  - be transferred
  - pass away
  lexicon: HALOT
  rationale: עבר literally means 'pass over/pass by,' but in property context it idiomatically refers to transfer from one party to another. 'Pass over to another' preserves the Hebrew image while making the legal sense explicit.
- source_word: רֵאשִׁית הָאָרֶץ
  chosen: this choice portion of the land
  alternatives:
  - the firstfruits of the land
  - the best of the land
  - the first portion of the land
  lexicon: HALOT
  rationale: רֵאשִׁית can mean 'beginning,' 'first part,' or 'firstfruits/chief part.' Here, in context of a consecrated allotment, it denotes the prime/first portion set apart from the land. 'Choice portion of the land' communicates the sense naturally in English without importing harvest imagery too strongly, while preserving the idea of a specially designated first part.
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - a holy thing
  - sacred
  lexicon: HALOT
  rationale: The predicate states the status of the land as consecrated. 'Holy' is the standard and theologically weighty rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Following project doctrine, יהוה is rendered 'the LORD.' The preposition ל marks dedication/belonging; 'to the LORD' preserves that consecratory sense.
