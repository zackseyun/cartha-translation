id: EZK.48.5
reference: Ezekiel 48:5
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל מְנַשֶּׁ֗ה מִ/פְּאַ֥ת קָדִ֛מָ/ה עַד פְּאַת יָ֖מָּ/ה אֶפְרַ֥יִם
    אֶחָֽד׀־־׃
translation:
  text: And along the border of Manasseh, from the east side to the west side, Ephraim,
    one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Ephraim, one'; the sense in context is 'Ephraim, one
      portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And along
  alternatives:
  - And beside
  - Now along
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the next tribal allotment
    in sequence. 'And along' preserves the connective force and the spatial sense
    of על in this boundary formula.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this land-allotment context, גְּבוּל refers to the boundary line or
    border of a tribal portion. 'Border' is natural English and fits the repeated
    formula in Ezekiel 48.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Standard English transliteration of the tribal name.
- source_word: מִפְּאַת קָדִימָה
  chosen: from the east side
  alternatives:
  - from the eastern edge
  - from the east end
  lexicon: HALOT
  rationale: פֵּאָה denotes an extremity, side, or edge. With קָדִימָה, the phrase
    marks the eastern extent of the allotment. 'From the east side' is clear and idiomatic.
- source_word: עַד פְּאַת יָמָּה
  chosen: to the west side
  alternatives:
  - as far as the western edge
  - to the west end
  lexicon: HALOT
  rationale: This balances the previous phrase and marks the full span from east to
    west. יָמָּה literally relates to the sea, but in geographic orientation it means
    westward/west side.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Standard English transliteration of the tribal name.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  lexicon: HALOT
  rationale: Although the Hebrew has simply 'one,' the allotment formula throughout
    the chapter implies 'one portion.' Supplying 'portion' in English makes the sense
    explicit without adding new content beyond the established pattern.
