id: EZK.48.13
reference: Ezekiel 48:13
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּ֗ם לְ/עֻמַּת֙ גְּב֣וּל הַ/כֹּהֲנִ֔ים חֲמִשָּׁ֨ה וְ/עֶשְׂרִ֥ים
    אֶ֨לֶף֙ אֹ֔רֶךְ וְ/רֹ֖חַב עֲשֶׂ֣רֶת אֲלָפִ֑ים כָּל אֹ֗רֶךְ חֲמִשָּׁ֤ה וְ/עֶשְׂרִים֙
    אֶ֔לֶף וְ/רֹ֖חַב עֲשֶׂ֥רֶת אֲלָפִֽים־׃
translation:
  text: And alongside the territory of the priests, the Levites shall have twenty-five
    thousand cubits in length and ten thousand in width. The whole length shall be
    twenty-five thousand, and the width ten thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says 'twenty-five thousand' and 'ten thousand'; 'cubits' is
      supplied from the surrounding context of Ezekiel 48 for clarity.
    reason: cross_reference
lexical_decisions:
- source_word: לְעֻמַּת
  chosen: alongside
  alternatives:
  - opposite
  - corresponding to
  - adjacent to
  lexicon: HALOT
  rationale: In this land-allotment context, the preposition indicates spatial correspondence/adjacency
    to the priests' territory. 'Alongside' is natural modern English and fits the
    boundary description better than the more wooden 'opposite.'
- source_word: גְּבוּל
  chosen: territory
  alternatives:
  - border
  - boundary
  - district
  lexicon: HALOT
  rationale: Although the noun can mean 'border' or 'boundary,' here it refers metonymically
    to the bounded allotment belonging to the priests. 'Territory' best conveys the
    land parcel in idiomatic English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the plural noun in this cultic-land context.
- source_word: וְהַלְוִיִּם
  chosen: the Levites shall have
  alternatives:
  - and the Levites
  - as for the Levites
  lexicon: HALOT
  rationale: The Hebrew is verbless, supplying the allotment description elliptically
    from context. English requires a predicate for clarity; 'shall have' makes explicit
    that a land portion is being assigned to the Levites without adding content beyond
    the immediate context.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  chosen: twenty-five thousand cubits
  alternatives:
  - twenty-five thousand
  - twenty-five thousand reeds
  lexicon: HALOT
  rationale: The numeral itself is 'twenty-five thousand.' The unit is not repeated
    in this verse but is carried over from the surrounding context of Ezekiel 48,
    where the measurements are in cubits. Supplying 'cubits' in English prevents ambiguity
    for readers. 'Reeds' is not supported here in the immediate context of this chapter's
    allotment measurements.
- source_word: אֹרֶךְ
  chosen: in length
  alternatives:
  - length
  - long
  lexicon: HALOT
  rationale: Rendered as a dimensional specification. 'In length' reads smoothly after
    the numeral phrase.
- source_word: וְרֹחַב עֲשֶׂרֶת אֲלָפִים
  chosen: and ten thousand in width
  alternatives:
  - and a width of ten thousand
  - and ten thousand wide
  lexicon: HALOT
  rationale: Keeps the dimensional parallelism while using natural English word order.
- source_word: כָּל
  chosen: The whole
  alternatives:
  - all
  - entire
  lexicon: HALOT
  rationale: Introduces the summarizing restatement of the dimensions. 'The whole
    length' is idiomatic and reflects the construct relationship.
- source_word: כָּל אֹרֶךְ
  chosen: The whole length
  alternatives:
  - all the length
  - the entire length
  lexicon: HALOT
  rationale: This phrase summarizes the total longitudinal measure of the Levites'
    allotment.
