id: EZK.48.8
reference: Ezekiel 48:8
source:
  edition: WLC
  text: וְ/עַל֙ גְּב֣וּל יְהוּדָ֔ה מִ/פְּאַ֥ת קָדִ֖ים עַד פְּאַת יָ֑מָּ/ה תִּהְיֶ֣ה
    הַ/תְּרוּמָ֣ה אֲֽשֶׁר תָּרִ֡ימוּ חֲמִשָּׁה֩ וְ/עֶשְׂרִ֨ים אֶ֜לֶף רֹ֗חַב וְ/אֹ֜רֶךְ
    כְּ/אַחַ֤ד הַ/חֲלָקִים֙ מִ/פְּאַ֤ת קָדִ֨ימָ/ה֙ עַד פְּאַת יָ֔מָּ/ה וְ/הָיָ֥ה הַ/מִּקְדָּ֖שׁ
    בְּ/תוֹכֽ/וֹ־־־־־׃
translation:
  text: 'Along the border of Judah, from the east side to the west side, shall be
    the contribution that you shall set apart: twenty-five thousand in width, and
    in length like one of the tribal portions, from the east side to the west side;
    and the sanctuary shall be in its midst.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the offering' or 'the district set apart.' The Hebrew term refers to
      a portion specially set apart for holy use.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the east edge to the seaward edge'; 'west side' expresses
      the idiomatic directional sense.
    reason: lexical_alternative
  - marker: c
    text: That is, like one of the tribes' allotted land portions in length.
    reason: cultural_note
lexical_decisions:
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  lexicon: HALOT
  rationale: In land-allotment context, גְּבוּל denotes a territorial border or boundary.
    'Border' is natural modern English and fits the geographic description.
- source_word: מִפְּאַת קָדִים ... עַד פְּאַת יָמָּה
  chosen: from the east side to the west side
  alternatives:
  - from the eastern edge to the western edge
  - from the east end to the west end
  lexicon: HALOT
  rationale: פֵּאָה literally refers to an extremity/side/edge. In this surveying
    context, 'side' communicates the span clearly. יָם with directional suffix means
    'west/westward' by the sea; rendering as 'west side' conveys the idiomatic directional
    sense rather than the literal 'seaward side'.
- source_word: הַתְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the allotment set apart
  - the sacred district
  lexicon: HALOT
  rationale: תְּרוּמָה is literally something 'raised up,' hence a contribution or
    offering set apart. In Ezekiel 45–48 it refers to the special tract set apart
    for holy use. 'Contribution' preserves the lexical core while remaining readable;
    the following clause 'that you shall set apart' clarifies the technical sense.
- source_word: תָּרִימוּ
  chosen: you shall set apart
  alternatives:
  - you shall offer
  - you shall raise up
  lexicon: HALOT
  rationale: The Hiphil of רוּם here is idiomatic for setting apart as an offering/contribution.
    'Set apart' best matches the land-allotment context and avoids a misleading sacrificial
    nuance that 'offer' might suggest.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  chosen: twenty-five thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number. The unit is not repeated here in the
    Hebrew clause; English can leave it implicit as in many translations, since the
    chapter's measuring context supplies it.
- source_word: רֹחַב
  chosen: in width
  alternatives:
  - wide
  lexicon: HALOT
  rationale: A dimensional noun in a surveying description; 'in width' is idiomatic
    and pairs well with 'in length.'
- source_word: אֹרֶךְ
  chosen: in length
  alternatives:
  - long
  lexicon: HALOT
  rationale: A dimensional noun; 'in length' preserves the formal measurement style
    of the passage.
- source_word: כְּאַחַד הַחֲלָקִים
  chosen: like one of the tribal portions
  alternatives:
  - equal to one of the portions
  - like one of the allotments
  lexicon: HALOT
  rationale: חֵלֶק means portion/share/allotment. In context these are the tribes'
    land strips, so 'tribal portions' makes explicit what is implicit in context and
    aids readability without adding foreign content.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes the sanctuary/holy precinct. 'Sanctuary' is the standard
    and suitably broad rendering here.
- source_word: בְּתוֹכוֹ
  chosen: in its midst
  alternatives:
  - in the middle of it
  - within it
  lexicon: HALOT
  rationale: The phrase indicates central placement within the set-apart tract. 'In
    its midst' is natural, dignified English and preserves the spatial emphasis.
