id: EZK.48.34
reference: Ezekiel 48:34
source:
  edition: WLC
  text: פְּאַת יָ֗מָּ/ה חֲמֵ֤שׁ מֵאוֹת֙ וְ/אַרְבַּ֣עַת אֲלָפִ֔ים שַֽׁעֲרֵי/הֶ֖ם שְׁלֹשָׁ֑ה
    שַׁ֣עַר גָּ֞ד אֶחָ֗ד שַׁ֤עַר אָשֵׁר֙ אֶחָ֔ד שַׁ֥עַר נַפְתָּלִ֖י אֶחָֽד־׃
translation:
  text: 'On the west side, four thousand five hundred, with their three gates: the
    gate of Gad, one; the gate of Asher, one; the gate of Naphtali, one.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'five hundred and four thousand.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''their gates: three''; the Hebrew is a verbless listing formula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּאַת יָמָּה
  chosen: On the west side
  alternatives:
  - At the west side
  - The western side
  lexicon: HALOT
  rationale: פְּאַת denotes an edge/side/border, and יָמָּה here is the directional
    term 'westward' (lit. 'sea-ward'). In context listing the city's sides, 'On the
    west side' is natural modern English while preserving the locative sense.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  chosen: four thousand five hundred
  alternatives:
  - four thousand and five hundred
  lexicon: HALOT
  rationale: The Hebrew number is literally 'five hundred and four thousand,' idiomatically
    4,500. Standard English orders the larger unit first.
- source_word: שַׁעֲרֵיהֶם שְׁלֹשָׁה
  chosen: with their three gates
  alternatives:
  - their gates, three
  - there shall be three gates
  lexicon: HALOT
  rationale: The phrase is verbless and appositional in this measurement list. 'With
    their three gates' smoothly conveys that this side has three gates, while retaining
    the possessive suffix 'their' referring to the side/city arrangement.
- source_word: שַׁעַר גָּד אֶחָד
  chosen: the gate of Gad, one
  alternatives:
  - one gate of Gad
  - the Gad gate, one
  lexicon: HALOT
  rationale: The Hebrew repeats 'gate + tribal name + one' in a list. Rendering it
    as 'the gate of Gad, one' preserves the enumerative style and the genitival relation
    better than a more paraphrastic English restructuring.
- source_word: שַׁעַר אָשֵׁר אֶחָד
  chosen: the gate of Asher, one
  alternatives:
  - one gate of Asher
  - the Asher gate, one
  lexicon: HALOT
  rationale: Same construction and rationale as with Gad; consistency across the tribal
    gate names is important in this catalog.
- source_word: שַׁעַר נַפְתָּלִי אֶחָד
  chosen: the gate of Naphtali, one
  alternatives:
  - one gate of Naphtali
  - the Naphtali gate, one
  lexicon: HALOT
  rationale: Same construction and rationale as with the preceding gate names; 'Naphtali'
    is transliterated as a personal/tribal name per translation philosophy.
