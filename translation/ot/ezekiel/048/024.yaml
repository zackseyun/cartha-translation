id: EZK.48.24
reference: Ezekiel 48:24
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל בִּנְיָמִ֗ן מִ/פְּאַ֥ת קָדִ֛ימָ/ה עַד פְּאַת יָ֖מָּ/ה שִׁמְע֥וֹן
    אֶחָֽד׀־־׃
translation:
  text: 'Along the border of Benjamin, from the east side to the west side, Simeon:
    one portion.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Simeon, one'; the noun 'portion' is implied by the repeated
      allotment formula in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: Along
  alternatives:
  - And along
  - Beside
  lexicon: HALOT
  rationale: The phrase introduces the next tribal allotment in sequence and marks
    location relative to a border. 'Along' is natural English for the distributive
    boundary formula in this chapter; 'and' is not required in English though it is
    implicit in the progression.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this land-allotment context the noun denotes the delimiting line or
    border of a tribal portion, not the territory as a whole. 'Border' is concise
    and idiomatic.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  rationale: Proper tribal name, transliterated by standard English convention per
    translation philosophy.
- source_word: מִפְּאַת קָדִימָה
  chosen: from the east side
  alternatives:
  - from the eastern edge
  - from the east end
  lexicon: HALOT
  rationale: The construction literally refers to the edge/side on the east. 'East
    side' preserves the spatial sense while reading smoothly in English.
- source_word: עַד פְּאַת יָמָּה
  chosen: to the west side
  alternatives:
  - as far as the western edge
  - to the west end
  lexicon: HALOT
  rationale: This balances the previous phrase and reflects the repeated formula spanning
    the allotment from east to west.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  rationale: Proper tribal name, transliterated by standard English convention.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one allotment
  - one share
  lexicon: HALOT
  rationale: Here 'one' is elliptical within Ezekiel 48's repeated allotment formula,
    referring to a single tribal strip/portion. Supplying 'portion' makes the sense
    explicit in English without over-paraphrasing.
