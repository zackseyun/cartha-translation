id: EZK.48.9
reference: Ezekiel 48:9
source:
  edition: WLC
  text: הַ/תְּרוּמָ֕ה אֲשֶׁ֥ר תָּרִ֖ימוּ לַֽ/יהוָ֑ה אֹ֗רֶךְ חֲמִשָּׁ֤ה וְ/עֶשְׂרִים֙
    אֶ֔לֶף וְ/רֹ֖חַב עֲשֶׂ֥רֶת אֲלָפִֽים׃
translation:
  text: The contribution that you shall set apart for the LORD shall be twenty-five
    thousand in length and ten thousand in width.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offering' or 'portion set apart.' The Hebrew term refers to something
      lifted up or designated as a contribution, and in this context it denotes the
      sacred tract set apart from the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַתְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the allotment
  - the portion set apart
  lexicon: HALOT
  rationale: תְּרוּמָה denotes something lifted up or set apart as a contribution/offering.
    In Ezekiel 45–48 it refers to the sacred tract set apart from the land, so 'contribution'
    preserves the idea of a designated portion without implying only a cultic sacrifice.
    'Offering' is possible but can sound too narrowly sacrificial in English.
- source_word: אֲשֶׁר תָּרִימוּ
  chosen: that you shall set apart
  alternatives:
  - that you shall offer
  - that you shall raise up
  lexicon: HALOT
  rationale: The Hiphil of רוּם here means to set apart as a contribution. 'Set apart'
    communicates the land-allotment context more naturally than the more literal 'raise
    up,' while remaining close to the Hebrew sense.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: The preposition ל marks dedication/direction. 'For the LORD' fits the
    sense of a portion designated for him. Per doctrine, יהוה is rendered 'the LORD'
    rather than 'Yahweh' in the main text.
- source_word: אֹרֶךְ
  chosen: in length
  alternatives:
  - the length shall be
  lexicon: HALOT
  rationale: The noun introduces the first dimension of the tract. Rendering with
    'in length' yields natural English while preserving the dimensional specification.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  chosen: twenty-five thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number. The unit is not stated in this verse,
    so it should not be supplied in the main text.
- source_word: וְרֹחַב
  chosen: and ten thousand in width
  alternatives:
  - and the width, ten thousand
  - and ten thousand wide
  lexicon: HALOT
  rationale: רֹחַב means breadth/width. 'In width' parallels 'in length' and keeps
    the dimensional style of the Hebrew.
- source_word: עֲשֶׂרֶת אֲלָפִים
  chosen: ten thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number. As with the previous number, the unit
    is left implicit because the Hebrew leaves it implicit here.
