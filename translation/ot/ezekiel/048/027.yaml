id: EZK.48.27
reference: Ezekiel 48:27
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל זְבוּלֻ֗ן מִ/פְּאַ֥ת קָדִ֛מָ/ה עַד פְּאַת יָ֖מָּ/ה גָּ֥ד
    אֶחָֽד׀־־׃
translation:
  text: And along the border of Zebulun, from the east side to the west side, Gad,
    one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Gad, one.' The word 'portion' is supplied from the chapter's
      repeated allotment formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And along
  alternatives:
  - And beside
  - And upon
  lexicon: HALOT
  rationale: In this boundary-allotment formula, עַל with prefixed conjunction introduces
    the next tribal strip in sequence. 'Along' best conveys spatial relation to the
    border in natural English.
- source_word: גְּבוּל
  chosen: the border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes a border or boundary line. 'Border' fits the
    repeated geographic formula in Ezekiel 48.
- source_word: זְבוּלֻן
  chosen: Zebulun
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: מִפְּאַת קָדִימָה
  chosen: from the east side
  alternatives:
  - from the eastern edge
  - from the east end
  lexicon: HALOT
  rationale: פֵּאָה means edge/side, and קָדִימָה indicates the eastward direction.
    'From the east side' preserves the boundary-marker sense in idiomatic English.
- source_word: עַד פְּאַת יָמָּה
  chosen: to the west side
  alternatives:
  - as far as the west side
  - to the western edge
  lexicon: HALOT
  rationale: The phrase marks the extent of the allotment from east to west. יָמָּה
    literally relates to the sea/west; in this geographic formula it means the west
    side.
- source_word: גָּד
  chosen: Gad
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  lexicon: HALOT
  rationale: Although the Hebrew reads simply 'one,' the allotment context throughout
    the chapter makes 'one portion' the implied sense. Supplying 'portion' in English
    clarifies the elliptical formula without adding new content.
