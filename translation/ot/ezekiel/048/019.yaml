id: EZK.48.19
reference: Ezekiel 48:19
source:
  edition: WLC
  text: וְ/הָ/עֹבֵ֖ד הָ/עִ֑יר יַעַבְד֕וּ/הוּ מִ/כֹּ֖ל שִׁבְטֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: And those who work in the city shall serve it from all the tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the worker of the city shall serve it'—the Hebrew singular participle
      may be taken individually, but here it likely has a collective sense.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'serve it/him'; the suffix is masculine singular. It refers
      to the city in context, so English renders 'it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹבֵד
  chosen: those who work
  alternatives:
  - the worker
  - the one serving
  - those serving
  lexicon: HALOT
  rationale: The form is a singular participle with the article, but in context it
    functions collectively/generically for the labor force associated with the city.
    English plural idiom ('those who work') best conveys the collective sense without
    awkwardness.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר as 'city.' The article is preserved.
- source_word: יַעַבְדֻהוּ
  chosen: shall serve it
  alternatives:
  - shall work for it
  - shall cultivate it
  - shall serve him
  lexicon: HALOT
  rationale: From עבד, here in the sense of rendering labor/service. The pronominal
    suffix is masculine singular, referring back to the city conceptually; English
    naturally uses 'it' for a city in this context. 'Serve' preserves the lexical
    link with the participle from the same root better than 'work for,' while avoiding
    over-specification such as 'cultivate.'
- source_word: מִכֹּל
  chosen: from all
  alternatives:
  - out of all
  lexicon: HALOT
  rationale: 'מן with כֹּל indicates source/origin: the workers are drawn from all
    the tribes.'
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  chosen: the tribes of Israel
  alternatives:
  - Israel's tribes
  lexicon: HALOT
  rationale: Standard construct rendering. The article is supplied naturally in English.
