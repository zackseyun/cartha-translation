id: EZK.48.31
reference: Ezekiel 48:31
source:
  edition: WLC
  text: וְ/שַׁעֲרֵ֣י הָ/עִ֗יר עַל שְׁמוֹת֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל שְׁעָרִ֥ים שְׁלוֹשָׁ֖ה
    צָפ֑וֹנָ/ה שַׁ֣עַר רְאוּבֵ֞ן אֶחָ֗ד שַׁ֤עַר יְהוּדָה֙ אֶחָ֔ד שַׁ֥עַר לֵוִ֖י אֶחָֽד־׃
translation:
  text: 'And the gates of the city shall be named after the tribes of Israel: three
    gates on the north side—one gate of Reuben, one gate of Judah, one gate of Levi.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall bear the names of the tribes of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁעֲרֵי הָעִיר
  chosen: And the gates of the city
  alternatives:
  - Now the gates of the city
  - As for the gates of the city
  lexicon: HALOT
  rationale: Construct phrase with conjunction; straightforwardly rendered as the
    subject of the clause. 'And' preserves the Hebrew narrative/descriptive linkage
    without overinterpreting it.
- source_word: עַל שְׁמוֹת שִׁבְטֵי יִשְׂרָאֵל
  chosen: shall be named after the tribes of Israel
  alternatives:
  - shall bear the names of the tribes of Israel
  - according to the names of the tribes of Israel
  lexicon: HALOT
  rationale: The preposition עַל with 'names' here indicates designation/naming correspondence.
    'Shall be named after' gives natural English while preserving the sense that the
    gates correspond to tribal names.
- source_word: שְׁעָרִים שְׁלוֹשָׁה
  chosen: three gates
  alternatives:
  - there shall be three gates
  lexicon: HALOT
  rationale: Simple numeric phrase. English fronting as 'three gates' is concise and
    natural in the list structure.
- source_word: צָפוֹנָה
  chosen: on the north side
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: Directional/locative form indicating the northern side of the city. 'On
    the north side' best fits the architectural description in idiomatic English.
- source_word: שַׁעַר רְאוּבֵן אֶחָד
  chosen: one gate of Reuben
  alternatives:
  - the gate of Reuben, one
  - one gate named Reuben
  - one gate for Reuben
  lexicon: HALOT
  rationale: The repeated pattern names each gate by tribal association. 'Gate of
    Reuben' is a natural English genitive preserving the naming relationship.
- source_word: שַׁעַר יְהוּדָה אֶחָד
  chosen: one gate of Judah
  alternatives:
  - one gate named Judah
  - one gate for Judah
  lexicon: HALOT
  rationale: Same construction and rationale as the preceding gate name; consistency
    is important in this enumerative context.
- source_word: שַׁעַר לֵוִי אֶחָד
  chosen: one gate of Levi
  alternatives:
  - one gate named Levi
  - one gate for Levi
  lexicon: HALOT
  rationale: Same construction and rationale as the preceding gate names. 'Levi' is
    retained as the tribal name, not expanded to 'the Levites,' because the text lists
    tribal designations.
