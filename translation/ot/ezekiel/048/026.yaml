id: EZK.48.26
reference: Ezekiel 48:26
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל יִשָׂשכָ֗ר מִ/פְּאַ֥ת קָדִ֛ימָ/ה עַד פְּאַת יָ֖מָּ/ה זְבוּלֻ֥ן
    אֶחָֽד׀־־׃
translation:
  text: And along the border of Issachar, from the east side to the west side, Zebulun,
    one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Zebulun one'; 'portion' is supplied from the chapter's
      repeated land-allotment formula.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sea side' is an idiom for the west side.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/עַל
  chosen: And along
  alternatives:
  - And beside
  - Now along
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces the next territorial allotment
    in the sequence. 'And along' is natural English and preserves the spatial sense
    of עַל here better than a bare 'upon'.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this land-allotment context, גְּבוּל refers to the boundary line of
    the preceding tribe's portion. 'Border' is concise and idiomatic.
- source_word: יִשָׂשכָר
  chosen: Issachar
  rationale: Proper tribal name; transliterated according to standard English convention
    per translation philosophy.
- source_word: מִפְּאַת
  chosen: from the ... side
  alternatives:
  - from the edge of
  - from the corner of
  lexicon: HALOT
  rationale: פֵּאָה literally denotes edge/side. In Ezekiel 48's geographic formula,
    'from the east side' communicates the boundary extent more clearly than the more
    literal but less natural 'from the edge of the east.'
- source_word: קָדִימָה
  chosen: east
  alternatives:
  - eastward
  - eastern side
  lexicon: HALOT
  rationale: Directional term indicating the eastern extremity. Rendered as 'east
    side' in combination with פְּאַת for smooth, consistent English.
- source_word: עַד
  chosen: to
  alternatives:
  - as far as
  lexicon: HALOT
  rationale: Marks the extent of the allotment from one side to the other. 'To' is
    sufficient and idiomatic here.
- source_word: פְּאַת יָמָּה
  chosen: the west side
  alternatives:
  - the sea side
  - the western side
  lexicon: HALOT
  rationale: יָם literally means 'sea,' but in Hebrew geographic usage it commonly
    denotes 'west' because of the Mediterranean. In this boundary formula, 'west side'
    best conveys the directional sense for modern readers.
- source_word: זְבוּלֻן
  chosen: Zebulun
  rationale: Proper tribal name; transliterated according to standard English convention.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one allotment
  - one
  lexicon: HALOT
  rationale: Although the Hebrew has simply 'one,' the noun 'portion' is implied by
    the repeated allotment formula throughout the chapter. Supplying it in English
    avoids awkwardness while staying within the text's established pattern.
