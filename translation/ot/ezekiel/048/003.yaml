id: EZK.48.3
reference: Ezekiel 48:3
source:
  edition: WLC
  text: וְ/עַ֣ל גְּב֣וּל אָשֵׁ֗ר מִ/פְּאַ֥ת קָדִ֛ימָ/ה וְ/עַד פְּאַת יָ֖מָּ/ה נַפְתָּלִ֥י
    אֶחָֽד׀־־׃
translation:
  text: And alongside the border of Asher, from the eastern side to the western side,
    Naphtali, one portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Naphtali, one.' The word 'portion' is supplied for clarity
      from the land-allotment context of this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And alongside
  alternatives:
  - And by
  - And upon
  lexicon: HALOT
  rationale: In this territorial-allotment formula, עַל with the prefixed conjunction
    introduces the next tract in relation to the previous border. 'Alongside' best
    conveys spatial adjacency in natural English while preserving the sense of placement
    relative to Asher's border.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: The noun denotes a boundary line or border. 'Border' is concise and fits
    the repeated land-distribution formula in Ezekiel 48.
- source_word: אָשֵׁר
  chosen: Asher
  rationale: Proper tribal name; transliterated according to the translation philosophy
    for personal/tribal names.
- source_word: מִ/פְּאַת קָדִימָה
  chosen: from the eastern side
  alternatives:
  - from the east side
  - from the eastern edge
  lexicon: HALOT
  rationale: פֵּאָה refers to an extremity, side, or edge; קָדִימָה indicates the
    east/eastern direction. 'From the eastern side' is idiomatic and preserves the
    boundary-marker sense.
- source_word: וְ/עַד פְּאַת יָמָּה
  chosen: to the western side
  alternatives:
  - and as far as the west side
  - to the western edge
  lexicon: HALOT
  rationale: עַד marks extent, and פֵּאָה again denotes side/edge. יָמָּה literally
    relates to the sea and idiomatically means west/westward. 'To the western side'
    communicates the full east-to-west span clearly in English.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Proper tribal name; transliterated.
- source_word: אֶחָד
  chosen: one portion
  alternatives:
  - one
  - a single portion
  - one allotment
  lexicon: HALOT
  rationale: Although the Hebrew has simply 'one,' in this chapter it functions elliptically
    for one tribal allotment/portion. Supplying 'portion' makes the sense explicit
    in English without over-paraphrasing, since the chapter repeatedly describes land
    allotments.
