id: EZK.48.11
reference: Ezekiel 48:11
source:
  edition: WLC
  text: לַ/כֹּהֲנִ֤ים הַֽ/מְקֻדָּשׁ֙ מִ/בְּנֵ֣י צָד֔וֹק אֲשֶׁ֥ר שָׁמְר֖וּ מִשְׁמַרְתִּ֑/י
    אֲשֶׁ֣ר לֹֽא תָע֗וּ בִּ/תְעוֹת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל כַּ/אֲשֶׁ֥ר תָּע֖וּ הַ/לְוִיִּֽם־׃ס
translation:
  text: It shall be for the priests who are consecrated from the sons of Zadok, who
    kept my charge, who did not go astray when the sons of Israel went astray, as
    the Levites went astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the descendants of Zadok.'
    reason: lexical_alternative
  - marker: b
    text: '''Kept my charge'' refers to faithfully carrying out the duty entrusted
      by God, especially in priestly service.'
    reason: cultural_note
  - marker: c
    text: Or 'when the people of Israel went astray.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַכֹּהֲנִים
  chosen: for the priests
  alternatives:
  - belonging to the priests
  - for the priestly ones
  lexicon: HALOT
  rationale: The prefixed ל marks destination/allotment in the larger land-distribution
    context. 'For the priests' fits the syntax and the preceding implied subject ('it/this
    shall be').
- source_word: הַמְקֻדָּשׁ
  chosen: who are consecrated
  alternatives:
  - the consecrated ones
  - who are holy
  - who are set apart
  lexicon: HALOT
  rationale: Passive participle from קדשׁ. 'Consecrated' best captures cultic setting
    and priestly sanctification better than the broader 'holy' or 'set apart.'
- source_word: מִבְּנֵי צָדוֹק
  chosen: from the sons of Zadok
  alternatives:
  - from the descendants of Zadok
  - from among the sons of Zadok
  lexicon: HALOT
  rationale: Retains the familial idiom while remaining natural English. 'Sons of
    Zadok' is transparent and preserves the priestly lineage reference.
- source_word: שָׁמְרוּ מִשְׁמַרְתִּי
  chosen: kept my charge
  alternatives:
  - kept my requirement
  - fulfilled my duty assigned to them
  - guarded my ordinance
  lexicon: HALOT
  rationale: This collocation commonly denotes faithful observance of an entrusted
    duty, especially cultic obligation. 'Kept my charge' is concise and preserves
    covenantal/priestly nuance.
- source_word: לֹא תָעוּ
  chosen: did not go astray
  alternatives:
  - did not wander
  - did not err
  lexicon: HALOT
  rationale: תעה here is moral/cultic deviation, not mere physical wandering. 'Go
    astray' is the standard idiomatic English equivalent.
- source_word: בִּתְעוֹת בְּנֵי יִשְׂרָאֵל
  chosen: when the sons of Israel went astray
  alternatives:
  - in the going astray of the sons of Israel
  - when the people of Israel went astray
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks the circumstance/time: ''when
    ... went astray.'' ''Sons of Israel'' is retained for formal transparency, though
    ''people of Israel'' is possible.'
- source_word: כַּאֲשֶׁר תָּעוּ הַלְוִיִּם
  chosen: as the Levites went astray
  alternatives:
  - just as the Levites went astray
  - like the Levites, who went astray
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison. The clause contrasts Zadokite faithfulness
    with Levitical unfaithfulness in Ezekiel's priestly framework.
