theological_decisions:
- issue: Rendering of priestly lineage and status in Ezekiel's temple vision
  chosen_reading: The verse distinguishes a subset of priests, the consecrated sons
    of Zadok, on the basis of covenantal/cultic faithfulness.
  alternative_readings:
  - The verse could be rendered more dynamically to emphasize reward for loyalty rather
    than lineage.
  rationale: The Hebrew explicitly grounds the allotment in both lineage ('sons of
    Zadok') and faithful keeping of God's charge. The translation preserves both without
    importing later doctrinal claims about priesthood.
  doctrine_reference: Translation philosophy §§1, 3, 5
