id: EZK.45.13
reference: Ezekiel 45:13
source:
  edition: WLC
  text: זֹ֥את הַ/תְּרוּמָ֖ה אֲשֶׁ֣ר תָּרִ֑ימוּ שִׁשִּׁ֤ית הָֽ/אֵיפָה֙ מֵ/חֹ֣מֶר הַֽ/חִטִּ֔ים
    וְ/שִׁשִּׁיתֶם֙ הָֽ/אֵיפָ֔ה מֵ/חֹ֖מֶר הַ/שְּׂעֹרִֽים׃
translation:
  text: 'This is the contribution that you shall offer: one-sixth of an ephah from
    each homer of wheat, and one-sixth of an ephah from each homer of barley.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An ephah and a homer are ancient units of dry measure; the verse specifies
      a fixed grain contribution of one-sixth of an ephah per homer.
    reason: cultural_note
lexical_decisions:
- source_word: תְּרוּמָה
  chosen: contribution
  alternatives:
  - offering
  - heave offering
  - tribute
  lexicon: HALOT
  rationale: In this administrative/cultic context, תְּרוּמָה denotes a portion set
    apart and presented. 'Contribution' is natural modern English and fits the measured
    levy described here better than the more archaic 'heave offering.' 'Offering'
    is possible but less precise for a fixed assessed portion.
- source_word: תָּרִימוּ
  chosen: you shall offer
  alternatives:
  - you shall lift up
  - you shall present
  lexicon: HALOT
  rationale: The Hiphil of רום with תְּרוּמָה idiomatically means to present or offer
    a raised contribution. 'You shall offer' captures the idiomatic force in English
    without woodenly preserving 'lift up.'
- source_word: שִׁשִּׁית
  chosen: one-sixth
  alternatives:
  - a sixth part
  - the sixth
  lexicon: HALOT
  rationale: The fractional sense is clear in context of measured grain dues. 'One-sixth'
    is concise and idiomatic.
- source_word: אֵיפָה
  chosen: ephah
  alternatives:
  - basket
  - dry measure
  lexicon: HALOT
  rationale: This is a standard ancient dry measure. Transliteration preserves the
    technical unit; replacing it with a generic term would lose precision.
- source_word: חֹמֶר
  chosen: homer
  alternatives:
  - cor
  - measure
  lexicon: HALOT
  rationale: This is another technical unit of capacity. 'Homer' is the direct transliteration
    of חֹמֶר; 'cor' reflects a related/alternate term in some contexts but is not
    the form present here.
- source_word: מֵחֹמֶר
  chosen: from each homer
  alternatives:
  - from a homer
  - out of a homer
  lexicon: HALOT
  rationale: The preposition marks the assessed amount taken from a unit quantity.
    'From each homer' makes explicit the distributive sense in English, which is implied
    in the regulation.
- source_word: הַחִטִּים
  chosen: wheat
  alternatives:
  - the wheat
  lexicon: HALOT
  rationale: English normally omits the article with grain names in this kind of measurement
    statement.
- source_word: וְשִׁשִּׁיתֶם
  chosen: and one-sixth
  alternatives:
  - and a sixth part
  - namely one-sixth
  lexicon: HALOT
  rationale: Though morphologically unusual, in context it clearly parallels the previous
    fractional expression and introduces the second assessed amount. Rendering it
    simply as 'and one-sixth' preserves the parallelism and sense.
- source_word: הַשְּׂעֹרִים
  chosen: barley
  alternatives:
  - the barley
  lexicon: HALOT
  rationale: As with 'wheat,' idiomatic English omits the article in a measurement
    formula.
