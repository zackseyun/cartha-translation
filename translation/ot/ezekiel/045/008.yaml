theological_decisions:
- issue: Referent of the pronoun 'him' in the land-possession clause
  chosen_reading: The pronoun refers to the prince described in the surrounding context.
  alternative_readings:
  - A generic ruler
  - The ruling office collectively
  rationale: The immediate context in Ezekiel 45 concerns the prince's allotted portion.
    Retaining the pronoun without overexpansion preserves the textual reference while
    allowing the context to identify the referent.
