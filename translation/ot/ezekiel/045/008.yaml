id: EZK.45.8
reference: Ezekiel 45:8
source:
  edition: WLC
  text: לָ/אָ֛רֶץ יִֽהְיֶה לּ֥/וֹ לַֽ/אֲחֻזָּ֖ה בְּ/יִשְׂרָאֵ֑ל וְ/לֹא יוֹנ֨וּ ע֤וֹד
    נְשִׂיאַ/י֙ אֶת עַמִּ֔/י וְ/הָ/אָ֛רֶץ יִתְּנ֥וּ לְ/בֵֽית יִשְׂרָאֵ֖ל לְ/שִׁבְטֵי/הֶֽם־־־־׃ס
translation:
  text: This land shall belong to him as a possession in Israel. And my princes shall
    no longer oppress my people, but they shall give the land to the house of Israel
    according to their tribes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the land they shall give to the house of Israel by their tribes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאָרֶץ
  chosen: This land
  alternatives:
  - The land
  - As for the land
  lexicon: HALOT
  rationale: With the prefixed ל and fronted position, the phrase introduces the topic
    emphatically. 'This land' captures the deictic force in context better than a
    bare 'the land,' while remaining natural English.
- source_word: יִהְיֶה לּוֹ
  chosen: shall belong to him
  alternatives:
  - shall be his
  - shall be for him
  lexicon: HALOT
  rationale: The construction 'be to him' idiomatically expresses possession. 'Shall
    belong to him' is clear modern English and preserves the possessive sense.
- source_word: לַאֲחֻזָּה
  chosen: as a possession
  alternatives:
  - for a possession
  - as property
  - as an inheritance-holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or possession. 'As a possession' is
    concise and fits the land-tenure context without overtechnical wording.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - within Israel
  - among Israel
  lexicon: HALOT
  rationale: The preposition is straightforwardly locative here, indicating the possession
    is situated within Israel.
- source_word: יוֹנוּ
  chosen: oppress
  alternatives:
  - mistreat
  - defraud
  - exploit
  lexicon: HALOT
  rationale: The Hiphil of ינה commonly carries the sense of oppressing or exploiting.
    'Oppress' best fits the political abuse by rulers in context.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any more
  - again
  lexicon: HALOT
  rationale: In combination with the negation, עוֹד naturally yields 'no longer,'
    expressing cessation of prior abuse.
- source_word: נְשִׂיאַי
  chosen: my princes
  alternatives:
  - my leaders
  - my rulers
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel often refers to a prince or chief ruler. Since the
    same chapter discusses 'the prince,' 'princes' preserves the political title and
    literary linkage.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; no reason to depart from the usual rendering.
- source_word: וְהָאָרֶץ יִתְּנוּ
  chosen: but they shall give the land
  alternatives:
  - and they shall give the land
  - and the land they shall give
  lexicon: HALOT
  rationale: 'The conjunction can be rendered simply ''and,'' but in English ''but''
    appropriately marks the contrast with the prior oppression: instead of exploiting
    the people, the rulers are to allot the land properly.'
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - to Israel's house
  - to the people of Israel
  lexicon: HALOT
  rationale: '''House of Israel'' is a standard prophetic designation and should be
    preserved for consistency and literary texture.'
- source_word: לְשִׁבְטֵיהֶם
  chosen: according to their tribes
  alternatives:
  - by their tribes
  - to their tribes
  lexicon: HALOT
  rationale: The phrase indicates distribution in tribal allotments. 'According to
    their tribes' makes the distributive sense explicit and idiomatic in English.
