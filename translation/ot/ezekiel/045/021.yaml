id: EZK.45.21
reference: Ezekiel 45:21
source:
  edition: WLC
  text: בָּ֠/רִאשׁוֹן בְּ/אַרְבָּעָ֨ה עָשָׂ֥ר יוֹם֙ לַ/חֹ֔דֶשׁ יִהְיֶ֥ה לָ/כֶ֖ם הַ/פָּ֑סַח
    חָ֕ג שְׁבֻע֣וֹת יָמִ֔ים מַצּ֖וֹת יֵאָכֵֽל׃
translation:
  text: In the first month, on the fourteenth day of the month, you shall have the
    Passover, a feast of seven days; unleavened bread shall be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the Passover, a feast of seven days.' Elsewhere the Passover
      and the Feast of Unleavened Bread can be distinguished, but here the text presents
      them together.
    reason: alternative_reading
  - marker: b
    text: Or 'for seven days.' The Hebrew expression is literally 'weeks of days,'
      an idiom here meaning a seven-day period.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרִאשׁוֹן
  chosen: In the first month
  alternatives:
  - In the first
  lexicon: HALOT
  rationale: With the prefixed preposition and in calendrical context, the phrase
    denotes the first month, not merely 'at first.' English supplies 'month' naturally
    from the following date expression.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם לַחֹדֶשׁ
  chosen: on the fourteenth day of the month
  alternatives:
  - on day fourteen of the month
  lexicon: HALOT
  rationale: Standard Hebrew date formula. 'Fourteenth day of the month' is idiomatic
    and precise in English.
- source_word: יִהְיֶה לָכֶם
  chosen: you shall have
  alternatives:
  - there shall be for you
  - it shall be for you
  lexicon: HALOT
  rationale: The construction expresses observance or possession from the audience's
    perspective. 'You shall have' is natural English while preserving the directive
    force.
- source_word: הַפָּסַח
  chosen: the Passover
  alternatives:
  - Passover
  lexicon: HALOT
  rationale: Definite noun referring to the established festival/observance. 'The
    Passover' is standard and clear.
- source_word: חָג
  chosen: a feast
  alternatives:
  - a festival
  lexicon: HALOT
  rationale: חָג denotes a pilgrimage/festival feast. 'Feast' fits the cultic setting
    and reads naturally in apposition to 'the Passover.'
- source_word: שְׁבֻעוֹת יָמִים
  chosen: of seven days
  alternatives:
  - for seven days
  lexicon: HALOT
  rationale: Although שְׁבֻעוֹת often means 'weeks,' here with 'days' it functions
    idiomatically for a seven-day duration. 'Of seven days' preserves the appositional
    description of the feast.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened loaves
  - matzot
  lexicon: HALOT
  rationale: The term refers to bread made without leaven in Passover context. 'Unleavened
    bread' is the established and accurate English rendering.
- source_word: יֵאָכֵל
  chosen: shall be eaten
  alternatives:
  - is to be eaten
  - must be eaten
  lexicon: HALOT
  rationale: Niphal imperfect gives passive sense. 'Shall be eaten' preserves the
    formal directive tone without overstating modality.
