theological_decisions:
- issue: Relationship of Passover to the seven-day feast
  chosen_reading: Render the verse so that Passover is identified with or immediately
    introduces a seven-day feast, without harmonizing away the wording.
  alternative_readings:
  - Render 'the Passover feast of seven days' as a single fused title
  - Distinguish sharply between Passover day and the Feast of Unleavened Bread in
    translation
  rationale: The Hebrew appositionally reads 'the Passover, a feast of seven days.'
    Since the verse itself presents them together, the translation preserves that
    wording rather than importing a stricter later distinction from other passages.
  doctrine_reference: Preserve theological tension rather than resolve it.
