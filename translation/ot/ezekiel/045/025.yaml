theological_decisions:
- issue: Referent of the implicit subject in יַעֲשֶׂה
  chosen_reading: he = the prince described in the immediate context
  alternative_readings:
  - he = an unspecified worshiper or officiant
  rationale: The surrounding passage repeatedly assigns these cultic provisions to
    the prince (cf. preceding verses). Rendering simply 'he' preserves the Hebrew
    while the lexical choice 'provide' reflects the prince's responsibility without
    importing priestly functions.
