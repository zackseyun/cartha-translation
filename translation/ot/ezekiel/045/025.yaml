id: EZK.45.25
reference: Ezekiel 45:25
source:
  edition: WLC
  text: בַּ/שְּׁבִיעִ֡י בַּ/חֲמִשָּׁה֩ עָשָׂ֨ר י֤וֹם לַ/חֹ֨דֶשׁ֙ בֶּ/חָ֔ג יַעֲשֶׂ֥ה
    כָ/אֵ֖לֶּה שִׁבְעַ֣ת הַ/יָּמִ֑ים כַּֽ/חַטָּאת֙ כָּ/עֹלָ֔ה וְ/כַ/מִּנְחָ֖ה וְ/כַ/שָּֽׁמֶן׃ס
translation:
  text: 'In the seventh month, on the fifteenth day of the month, at the feast, he
    shall provide the same offerings for seven days: the sin offering, the burnt offering,
    the grain offering, and the oil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'during the feast' or 'at the festival.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'he shall do like these'; that is, he shall provide the same prescribed
      offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּ/שְּׁבִיעִי
  chosen: In the seventh month
  alternatives:
  - In the seventh
  lexicon: HALOT
  rationale: The ordinal with the prefixed preposition functions temporally here and,
    with the following date expression, refers to the seventh month rather than merely
    'the seventh' in isolation. English requires 'month' for clarity.
- source_word: בַּ/חֲמִשָּׁה עָשָׂר יוֹם לַ/חֹדֶשׁ
  chosen: on the fifteenth day of the month
  alternatives:
  - on the fifteenth day of that month
  lexicon: HALOT
  rationale: This is the standard Hebrew calendrical expression. 'Of the month' is
    a natural, sufficiently formal rendering.
- source_word: בֶּ/חָג
  chosen: at the feast
  alternatives:
  - during the feast
  - at the festival
  lexicon: HALOT
  rationale: חָג denotes a pilgrimage/festival feast. Since the context is the feast
    beginning on the fifteenth day of the seventh month, 'the feast' is appropriate
    and preserves the article. 'At the feast' is concise and natural.
- source_word: יַעֲשֶׂה
  chosen: he shall provide
  alternatives:
  - he shall do
  - he shall make
  - he shall offer
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'), but in sacrificial context it refers
    to carrying out/providing the required offerings. 'Provide' fits the prince's
    role in this chapter better than the more wooden 'do' and avoids over-specifying
    priestly action implied by 'offer'.
- source_word: כָ/אֵלֶּה
  chosen: the same offerings
  alternatives:
  - like these
  - these same things
  lexicon: HALOT
  rationale: The phrase points back to the previously specified sacrificial requirements.
    'The same offerings' makes the anaphoric reference explicit in idiomatic English.
- source_word: שִׁבְעַת הַ/יָּמִים
  chosen: for seven days
  alternatives:
  - throughout the seven days
  - for the seven days
  lexicon: HALOT
  rationale: The expression indicates duration over the festival period. 'For seven
    days' is natural English and preserves the temporal force.
- source_word: כַּֽ/חַטָּאת
  chosen: the sin offering
  alternatives:
  - as the sin offering
  - like the sin offering
  lexicon: HALOT
  rationale: 'The prefixed כ here is distributive/comparative in a list meaning ''corresponding
    to / in the matter of'' each offering category. English idiom is best served by
    simply naming the category: ''the sin offering.'''
- source_word: כָ/עֹלָה
  chosen: the burnt offering
  alternatives:
  - as the burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term 'burnt offering.' As with the
    previous item, the prefixed כ is not naturally reproduced in English.
- source_word: וְ/כַ/מִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial legislation is commonly rendered 'grain offering,'
    which is clearer for modern readers than the broader 'offering' and more contextually
    precise than 'tribute offering' here.
- source_word: וְ/כַ/שָּׁמֶן
  chosen: and the oil
  alternatives:
  - and oil
  lexicon: HALOT
  rationale: The article is present in Hebrew, and the item refers to the prescribed
    oil accompanying the offerings. 'The oil' preserves the definiteness and the patterned
    list structure.
