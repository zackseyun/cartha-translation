id: EZK.45.10
reference: Ezekiel 45:10
source:
  edition: WLC
  text: מֹֽאזְנֵי צֶ֧דֶק וְ/אֵֽיפַת צֶ֛דֶק וּ/בַת צֶ֖דֶק יְהִ֥י לָ/כֶֽם־־־׃
translation:
  text: You must have honest scales, an honest ephah, and an honest bath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An ephah was a standard dry measure.
    reason: cultural_note
  - marker: b
    text: A bath was a standard liquid measure.
    reason: cultural_note
  - marker: c
    text: Or 'just' scales, a 'just' ephah, and a 'just' bath.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֹאזְנֵי
  chosen: scales
  alternatives:
  - balances
  lexicon: HALOT
  rationale: Dual/plural construct form of מאזנים referring to weighing instruments.
    'Scales' is the most natural modern English rendering; 'balances' is possible
    but less common.
- source_word: צֶדֶק
  chosen: honest
  alternatives:
  - just
  - right
  - accurate
  lexicon: HALOT
  rationale: Repeated three times modifying scales, ephah, and bath. In this commercial/legal
    context the sense is fairness/integrity in measurement. 'Honest' communicates
    idiomatic English better than the more formal 'just' while preserving the ethical
    force.
- source_word: אֵיפָה
  chosen: ephah
  alternatives:
  - dry measure
  lexicon: HALOT
  rationale: A specific Hebrew dry-measure unit. Per translation philosophy, specific
    cultural measurement terms are best transliterated rather than replaced with a
    vague equivalent; readers can be aided by a footnote.
- source_word: בַּת
  chosen: bath
  alternatives:
  - liquid measure
  lexicon: HALOT
  rationale: A specific Hebrew liquid-measure unit. Transliterated to preserve the
    source term and its pairing with ephah in Ezekiel's measurement system.
- source_word: יְהִי
  chosen: You must have
  alternatives:
  - shall be for you
  - let there be for you
  lexicon: HALOT
  rationale: Jussive of היה with לָכֶם expresses directive obligation. 'You must have'
    renders the legal-command force in clear English better than the wooden 'shall
    be for you'.
- source_word: לָכֶם
  chosen: you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: 'Second person masculine plural indirect object. Absorbed idiomatically
    into English as the addressed community: ''You must have...'' rather than the
    less natural ''...shall be for you.'''
