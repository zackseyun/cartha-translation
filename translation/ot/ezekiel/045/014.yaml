id: EZK.45.14
reference: Ezekiel 45:14
source:
  edition: WLC
  text: וְ/חֹ֨ק הַ/שֶּׁ֜מֶן הַ/בַּ֣ת הַ/שֶּׁ֗מֶן מַעְשַׂ֤ר הַ/בַּת֙ מִן הַ/כֹּ֔ר עֲשֶׂ֥רֶת
    הַ/בַּתִּ֖ים חֹ֑מֶר כִּֽי עֲשֶׂ֥רֶת הַ/בַּתִּ֖ים חֹֽמֶר־־׃
translation:
  text: And the fixed due of oil shall be one bath of oil from each cor, from ten
    baths—that is, one homer, for ten baths are one homer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a tenth of the bath from the cor.'' The verse expresses the oil
      tribute as one-tenth of a cor/homer, with the following clause explaining that
      a homer equals ten baths.'
    reason: lexical_alternative
  - marker: b
    text: A bath, cor, and homer are ancient Israelite units of measure; the text
      itself notes that ten baths equal one homer.
    reason: cultural_note
lexical_decisions:
- source_word: חֹק
  chosen: fixed due
  alternatives:
  - statute
  - portion
  - due
  lexicon: HALOT
  rationale: In this tribute context, חֹק refers not to a legal statute in the abstract
    but to the prescribed allotment or due to be given. 'Fixed due' captures both
    the set nature and the obligation.
- source_word: שֶּׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The Hebrew term means 'oil,' commonly olive oil in context. Since the
    source text does not explicitly say 'olive,' the broader 'oil' is retained.
- source_word: בַּת
  chosen: bath
  alternatives:
  - liquid measure
  lexicon: HALOT
  rationale: This is a technical unit of liquid measure. It is best transliterated
    as 'bath' rather than converted into an approximate modern measure, preserving
    the source's metrological precision.
- source_word: מַעְשַׂר
  chosen: from each
  alternatives:
  - tenth
  - one-tenth
  lexicon: HALOT
  rationale: Literally the word denotes 'tenth' or 'tithe.' In this compressed measurement
    formula, the sense is that one bath is taken out of each cor/homer. Rendering
    the distributive sense as 'from each' makes the tribute calculation intelligible
    in English while preserving the underlying one-tenth relationship through the
    rest of the verse.
- source_word: כֹּר
  chosen: cor
  alternatives:
  - kor
  lexicon: HALOT
  rationale: A dry measure here used in equivalence with homer. 'Cor' is a standard
    English transliteration and preserves the ancient unit.
- source_word: עֲשֶׂרֶת הַבַּתִּים
  chosen: ten baths
  alternatives:
  - ten bath-measures
  lexicon: HALOT
  rationale: This phrase states the numerical equivalence needed for the tribute calculation.
    A straightforward rendering is clearest.
- source_word: חֹמֶר
  chosen: homer
  alternatives:
  - homer-measure
  lexicon: HALOT
  rationale: This is another technical unit of measure. It is preserved by transliteration,
    especially since the verse itself explains its equivalence to ten baths.
- source_word: כִּי
  chosen: that is
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory clarification of the measurement
    equivalence rather than a causal statement. 'That is' communicates the explanatory
    force naturally in English.
