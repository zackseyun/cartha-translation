id: EZK.45.22
reference: Ezekiel 45:22
source:
  edition: WLC
  text: וְ/עָשָׂ֤ה הַ/נָּשִׂיא֙ בַּ/יּ֣וֹם הַ/ה֔וּא בַּעֲד֕/וֹ וּ/בְעַ֖ד כָּל עַ֣ם
    הָ/אָ֑רֶץ פַּ֖ר חַטָּֽאת־׃
translation:
  text: On that day the prince shall provide, for himself and for all the people of
    the land, a bull as a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a bull for a purification offering.' The Hebrew חַטָּאת can denote the
      offering that removes sin or impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: shall provide
  alternatives:
  - shall make
  - shall offer
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but in sacrificial contexts it
    commonly carries the sense of preparing or offering a sacrifice. 'Provide' fits
    the administrative/cultic role of the prince in this chapter and reads naturally
    in English without over-paraphrasing.
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel regularly denotes the civic ruler/prince rather than
    a generic leader. 'Prince' preserves the established Ezekiel usage and the specific
    office in the temple vision.
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - in that day
  - on that same day
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'On that day' is idiomatic modern
    English and sufficiently formal.
- source_word: בַּעֲדוֹ
  chosen: for himself
  alternatives:
  - on his behalf
  - for his own sake
  lexicon: HALOT
  rationale: בעד with pronominal suffix indicates representation or benefit. 'For
    himself' is the clearest concise rendering in sacrificial context.
- source_word: וּבְעַד כָּל עַם הָאָרֶץ
  chosen: and for all the people of the land
  alternatives:
  - and on behalf of all the people of the land
  - and for all the people of the הארץ
  lexicon: HALOT
  rationale: The phrase denotes those represented by the offering. 'People of the
    land' is a standard rendering of עַם הָאָרֶץ and here likely refers broadly to
    the populace of the land, not merely a social class.
- source_word: פַּר
  chosen: a bull
  alternatives:
  - a young bull
  - a bull from the herd
  lexicon: HALOT
  rationale: פַּר denotes a bull in sacrificial usage. 'Bull' is the simplest accurate
    rendering; the Hebrew here does not explicitly specify 'young'.
- source_word: חַטָּאת
  chosen: as a sin offering
  alternatives:
  - for a sin offering
  - a purification offering
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers to the offering rather
    than abstract 'sin.' 'Sin offering' is the traditional and still clear rendering.
    'Purification offering' is a defensible alternative in priestly texts, but 'sin
    offering' remains the more recognizable default here.
