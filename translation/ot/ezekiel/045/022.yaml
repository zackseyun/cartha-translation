theological_decisions:
- issue: Rendering of חַטָּאת in cultic context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term can denote either sin or the sacrifice associated with dealing
    with sin/impurity. In this verse the sacrificial object 'a bull' makes the offering
    sense certain. 'Sin offering' preserves familiar biblical terminology while not
    forcing a narrower theological interpretation than the context warrants.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
