id: EZK.45.11
reference: Ezekiel 45:11
source:
  edition: WLC
  text: הָ/אֵיפָ֣ה וְ/הַ/בַּ֗ת תֹּ֤כֶן אֶחָד֙ יִֽהְיֶ֔ה לָ/שֵׂ֕את מַעְשַׂ֥ר הַ/חֹ֖מֶר
    הַ/בָּ֑ת וַ/עֲשִׂירִ֤ת הַ/חֹ֨מֶר֙ הָֽ/אֵיפָ֔ה אֶל הַ/חֹ֖מֶר יִהְיֶ֥ה מַתְכֻּנְתּֽ/וֹ־׃
translation:
  text: The ephah and the bath shall be of one measure, so that the bath may hold
    a tenth of a homer, and the ephah a tenth of a homer; their standard shall be
    according to the homer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their fixed proportion shall be according to the homer.'
    reason: lexical_alternative
  - marker: b
    text: A homer was a larger standard measure; both the ephah (dry measure) and
      the bath (liquid measure) were set at one-tenth of it.
    reason: cultural_note
  - marker: c
    text: '''Cor'' is a traditional alternative name for the homer.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיפָה
  chosen: ephah
  alternatives:
  - epha
  lexicon: HALOT
  rationale: A dry measure with no natural English equivalent; transliteration preserves
    the technical unit rather than approximating it.
- source_word: בַּת
  chosen: bath
  lexicon: HALOT
  rationale: A liquid measure; transliterated because it is a specific ancient unit,
    not the common English noun in sense.
- source_word: תֹּכֶן אֶחָד
  chosen: one measure
  alternatives:
  - one standard
  - the same quantity
  lexicon: HALOT
  rationale: The phrase denotes a single fixed measure/standard shared by both units.
    'One measure' is clear modern English and fits the metrological context.
- source_word: לָשֵׂאת
  chosen: may hold
  alternatives:
  - to contain
  - to bear
  lexicon: HALOT
  rationale: In context of capacity standards for measures, the infinitive expresses
    what the vessel/unit contains. 'May hold' is idiomatic and accurate.
- source_word: מַעְשַׂר
  chosen: a tenth
  alternatives:
  - a tenth part
  lexicon: HALOT
  rationale: The noun means 'tenth' here in a quantitative, not cultic, sense.
- source_word: חֹמֶר
  chosen: homer
  alternatives:
  - cor
  lexicon: HALOT
  rationale: A larger standard unit. 'Homer' follows the Hebrew form; 'cor' reflects
    a variant/traditional equivalent but is less transparent to the Hebrew here.
- source_word: עֲשִׂירִת
  chosen: a tenth
  alternatives:
  - a tenth part
  lexicon: HALOT
  rationale: Parallel to מַעְשַׂר and likewise denotes one-tenth as a fraction of
    the homer.
- source_word: אֶל הַחֹמֶר
  chosen: according to the homer
  alternatives:
  - in relation to the homer
  - by the homer
  lexicon: HALOT
  rationale: The preposition marks the homer as the governing reference standard for
    the smaller measures.
- source_word: מַתְכֻּנְתּוֹ
  chosen: their standard
  alternatives:
  - its fixed proportion
  - its measurement standard
  lexicon: HALOT
  rationale: Though morphologically singular with suffix, the sense in context is
    the prescribed standard/proportion for the measures just mentioned. English plural
    possessive clarifies the collective reference to ephah and bath.
