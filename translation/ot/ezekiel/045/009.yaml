theological_decisions:
- issue: Rendering of the divine name יְהוָה within אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of מִשְׁפָּט וּצְדָקָה
  chosen_reading: justice and righteousness
  alternative_readings:
  - justice and what is right
  - judgment and righteousness
  rationale: The pair is a standard ethical formula in the Hebrew Bible. 'Justice and righteousness' preserves both terms distinctly and avoids collapsing them into a single modern concept.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
