id: EZK.45.9
reference: Ezekiel 45:9
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנָ֣/י יְהוִ֗ה רַב לָ/כֶם֙ נְשִׂיאֵ֣י יִשְׂרָאֵ֔ל חָמָ֤ס וָ/שֹׁד֙ הָסִ֔ירוּ וּ/מִשְׁפָּ֥ט וּ/צְדָקָ֖ה עֲשׂ֑וּ הָרִ֤ימוּ גְרֻשֹֽׁתֵי/כֶם֙ מֵ/עַ֣ל עַמִּ֔/י נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: 'Thus says the Lord GOD: Enough, princes of Israel! Remove violence and plunder, and do justice and righteousness. Put away your expulsions from my people, declares the Lord GOD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your expulsions' or 'your acts of dispossession.' The Hebrew term refers to driving people out; in this context it likely includes forced removal from land or property.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  rationale: Rendered the divine title pair in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by using 'Lord GOD,' which preserves the sense of the Hebrew reverential reading.
- source_word: רַב לָכֶם
  chosen: Enough from you
  alternatives:
  - Enough for you
  - You have gone too far
  - Let it suffice you
  lexicon: HALOT
  rationale: The idiom conveys rebuke meaning 'enough!' or 'that is enough from/for you.' 'Enough from you' is natural modern English and preserves the confrontational force without over-paraphrasing.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  chosen: princes of Israel
  alternatives:
  - leaders of Israel
  - rulers of Israel
  lexicon: HALOT
  rationale: נָשִׂיא often denotes a chief, prince, or leader. 'Princes' preserves the formal political nuance and matches Ezekiel's usage for Israel's ruling class better than the flatter 'leaders.'
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - oppression
  lexicon: HALOT
  rationale: A standard rendering for חָמָס in prophetic denunciations, capturing both brutality and social injustice.
- source_word: שֹׁד
  chosen: plunder
  alternatives:
  - destruction
  - robbery
  - spoil
  lexicon: HALOT
  rationale: In this context of abusive rule and exploitation, 'plunder' best conveys predatory seizure of goods/property. 'Destruction' is possible but less concrete alongside 'violence.'
- source_word: הָסִירוּ
  chosen: Remove
  alternatives:
  - put away
  - take away
  lexicon: HALOT
  rationale: Imperative calling for cessation/removal of abusive practices. 'Remove' is concise and fits the paired objects 'violence and plunder.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In ethical-political context, מִשְׁפָּט refers to just governance rather than merely judicial verdict. 'Justice' is the clearest English equivalent here.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: Paired with מִשְׁפָּט, צְדָקָה is well rendered 'righteousness,' preserving the common Hebrew ethical pair 'justice and righteousness.' 'What is right' is possible but less weighty and less consistent.
- source_word: עֲשׂוּ
  chosen: do
  alternatives:
  - practice
  - establish
  lexicon: HALOT
  rationale: Simple imperative matching the Hebrew verb and yielding the idiomatic phrase 'do justice and righteousness.'
- source_word: הָרִימוּ
  chosen: Put away
  alternatives:
  - remove
  - lift off
  lexicon: HALOT
  rationale: Literally 'lift up/remove.' Here it governs oppressive acts imposed on the people; 'put away' is idiomatic and avoids awkward repetition of 'remove' immediately after the previous clause.
- source_word: גְרֻשֹׁתֵיכֶם
  chosen: your evictions
  alternatives:
  - your expulsions
  - your acts of dispossession
  lexicon: HALOT
  rationale: From a noun related to driving out/casting out. In context of rulers abusing the populace, 'evictions' concretely captures forced removal from land/property, which fits Ezekiel 45's concern with just land allotment. Because the term can be understood more broadly as expulsions/dispossession, that alternative is preserved in a footnote.
- source_word: מֵעַל עַמִּי
  chosen: from my people
  alternatives:
  - off my people
  lexicon: HALOT
  rationale: Idiomatic English for removal of oppressive actions directed against the people. 'Off my people' is too literal in English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - says the Lord GOD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic modern English and preserves the solemn prophetic authority.
