id: EZK.45.15
reference: Ezekiel 45:15
source:
  edition: WLC
  text: וְ/שֶׂה אַחַ֨ת מִן הַ/צֹּ֤אן מִן הַ/מָּאתַ֨יִם֙ מִ/מַּשְׁקֵ֣ה יִשְׂרָאֵ֔ל לְ/מִנְחָ֖ה וּ/לְ/עוֹלָ֣ה וְ/לִ/שְׁלָמִ֑ים לְ/כַפֵּ֣ר עֲלֵי/הֶ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־׃
translation:
  text: and one sheep from every two hundred from the well-watered pastures of Israel, for a grain offering and for a burnt offering and for peace offerings, to make atonement for them, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the watered land of Israel' or 'from the rich pastureland of Israel.' The Hebrew phrase likely refers to well-watered grazing land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֶׂה אַחַת
  chosen: and one sheep
  alternatives:
  - and one lamb
  - and one head of small livestock
  lexicon: HALOT
  rationale: שֶׂה can denote a sheep or goat from the flock, and in some contexts specifically a lamb. Here, because the next phrase already specifies 'from the flock' and the tribute is counted proportionally, 'one sheep' is a natural, readable rendering without over-specifying age or sex.
- source_word: מִן הַצֹּאן מִן הַמָּאתַיִם
  chosen: from every two hundred
  alternatives:
  - out of the flock, from two hundred
  - one from the flock out of every two hundred
  lexicon: HALOT
  rationale: 'The construction expresses a ratio for the required levy: one animal out of each two hundred from the flock. ''From every two hundred'' communicates the proportional sense clearly in English while preserving the underlying count.'
- source_word: מִמַּשְׁקֵה יִשְׂרָאֵל
  chosen: from the well-watered pastures of Israel
  alternatives:
  - from the watered land of Israel
  - from the drink of Israel
  - from the rich pastureland of Israel
  lexicon: HALOT
  rationale: מַשְׁקֶה literally relates to drinking/watering and here likely refers metonymically to well-watered grazing land or pasture. Since the phrase modifies the source of the flock animals, 'well-watered pastures of Israel' best fits the agricultural context and avoids an opaque literalism.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering. Although the broader sense can be 'gift' or 'tribute,' the surrounding sacrificial terms make the cultic sense primary here.
- source_word: וּלְעוֹלָה
  chosen: and for a burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard term for the whole burnt offering; the traditional rendering remains the clearest and most accurate.
- source_word: וְלִשְׁלָמִים
  chosen: and for peace offerings
  alternatives:
  - and for fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים refers to well-being/peace offerings. 'Peace offerings' is the most established and transparent rendering, while 'fellowship offerings' is interpretive and narrower.
- source_word: לְכַפֵּר עֲלֵיהֶם
  chosen: to make atonement for them
  alternatives:
  - to atone for them
  - to purge for them
  lexicon: HALOT
  rationale: כפר in sacrificial contexts is best rendered with 'make atonement,' which preserves the cultic and theological force without importing a narrower theory of atonement.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם introduces a divine declaration formula. Following the project's contested-terms guidance, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, the conventional English representation is 'Lord GOD' to avoid 'Lord LORD' while still translating both titles.
