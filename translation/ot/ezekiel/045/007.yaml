id: EZK.45.7
reference: Ezekiel 45:7
source:
  edition: WLC
  text: וְ/לַ/נָּשִׂ֡יא מִ/זֶּ֣ה וּ/מִ/זֶּה֩ לִ/תְרוּמַ֨ת הַ/קֹּ֜דֶשׁ וְ/לַ/אֲחֻזַּ֣ת
    הָ/עִ֗יר אֶל פְּנֵ֤י תְרֽוּמַת הַ/קֹּ֨דֶשׁ֙ וְ/אֶל פְּנֵי֙ אֲחֻזַּ֣ת הָ/עִ֔יר
    מִ/פְּאַת יָ֣ם יָ֔מָּ/ה וּ/מִ/פְּאַת קֵ֖דְמָ/ה קָדִ֑ימָ/ה וְ/אֹ֗רֶךְ לְ/עֻמּוֹת֙
    אַחַ֣ד הַ/חֲלָקִ֔ים מִ/גְּב֥וּל יָ֖ם אֶל גְּב֥וּל קָדִֽימָ/ה־־־־־־׃
translation:
  text: And for the prince there shall be land on both sides of the holy district
    and the property of the city, adjoining the holy district and adjoining the property
    of the city, from the west side westward and from the east side eastward; and
    in length corresponding to one of the tribal portions, from the western border
    to the eastern border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'holy contribution' or 'sacred allotment'; here it refers to the
      set-apart tract of land, so 'holy district' is used.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'from the sea side' and 'to the border eastward'; in Ezekiel's
      territorial descriptions, 'sea' functions as 'west.'
    reason: cultural_note
lexical_decisions:
- source_word: לַנָּשִׂיא
  chosen: for the prince
  alternatives:
  - for the ruler
  - for the leader
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel commonly denotes the civic ruler/prince rather than
    a generic leader. 'Prince' preserves the established Ezekiel usage without implying
    a lesser rank than the text requires.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on both sides
  alternatives:
  - from this side and from that side
  lexicon: HALOT
  rationale: The idiom indicates land lying on either side of the sacred/city allotment.
    'On both sides' is natural English and captures the distributive sense.
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  chosen: the holy district
  alternatives:
  - the holy contribution
  - the sacred allotment
  lexicon: HALOT
  rationale: In this land-allotment context, תְּרוּמָה refers to the set-apart portion
    of land, not a monetary offering. 'Holy district' communicates a consecrated tract
    of land in readable English.
- source_word: אֲחֻזַּת הָעִיר
  chosen: the property of the city
  alternatives:
  - the city's possession
  - the city's landholding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or landed property. 'Property of the city'
    is clear and fits the legal-land context.
- source_word: אֶל־פְּנֵי ... וְאֶל־פְּנֵי
  chosen: adjoining ... and adjoining
  alternatives:
  - alongside ... and alongside
  - opposite ... and opposite
  lexicon: HALOT
  rationale: The phrase literally means 'toward/in front of the face of,' but here
    in boundary description it indicates land lying adjacent to or facing the holy
    district and city property. 'Adjoining' best fits the cadastral context.
- source_word: מִפְּאַת יָם יָמָּה
  chosen: from the west side westward
  alternatives:
  - from the western side toward the west
  - from the sea side westward
  lexicon: HALOT
  rationale: יָם can denote 'sea' or the west as a compass direction. In territorial
    descriptions it commonly means 'west.' Retaining 'side ... westward' reflects
    the Hebrew's boundary style.
- source_word: וּמִפְּאַת קֵדְמָה קָדִימָה
  chosen: from the east side eastward
  alternatives:
  - from the eastern side toward the east
  lexicon: HALOT
  rationale: This mirrors the previous directional formula. 'East side eastward' preserves
    the repetitive cadastral wording.
- source_word: וְאֹרֶךְ
  chosen: and in length
  alternatives:
  - and the length shall be
  - with length
  lexicon: HALOT
  rationale: The noun introduces the next dimension of the allotment. 'And in length'
    is concise while preserving the shift from width/boundaries to longitudinal measure.
- source_word: לְעֻמּוֹת אַחַד הַחֲלָקִים
  chosen: corresponding to one of the tribal portions
  alternatives:
  - parallel to one of the portions
  - equal to one of the allotments
  lexicon: HALOT
  rationale: לְעֻמּוֹת conveys correspondence or alignment. הַחֲלָקִים here refers
    to the tribal allotments described in the surrounding context. Supplying 'tribal'
    makes the referent explicit in English without overtranslating.
- source_word: מִגְּבוּל יָם אֶל־גְּבוּל קָדִימָה
  chosen: from the western border to the eastern border
  alternatives:
  - from the border on the west to the border on the east
  lexicon: HALOT
  rationale: A straightforward rendering of the boundary formula. 'Western/eastern
    border' is idiomatic English and preserves the full span of the prince's land.
