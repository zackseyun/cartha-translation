id: EZK.45.2
reference: Ezekiel 45:2
source:
  edition: WLC
  text: יִהְיֶ֤ה מִ/זֶּה֙ אֶל הַ/קֹּ֔דֶשׁ חֲמֵ֥שׁ מֵא֛וֹת בַּ/חֲמֵ֥שׁ מֵא֖וֹת מְרֻבָּ֣ע
    סָבִ֑יב וַ/חֲמִשִּׁ֣ים אַמָּ֔ה מִגְרָ֥שׁ ל֖/וֹ סָבִֽיב־׃
translation:
  text: From this there shall be for the holy place a square of five hundred by five
    hundred all around, with fifty cubits of open land for it all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sanctuary.' The Hebrew קֹדֶשׁ here can denote the sacred area
      more generally, not only the sanctuary building itself.
    reason: lexical_alternative
  - marker: b
    text: Or 'pasture land' or 'common land' for the surrounding open area (מִגְרָשׁ).
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/זֶּה
  chosen: From this
  alternatives:
  - Of this
  - From it
  lexicon: HALOT
  rationale: The phrase points back to the previously described allotment and introduces
    the portion assigned from it. 'From this' is the most natural English equivalent
    in context.
- source_word: אֶל הַ/קֹּדֶשׁ
  chosen: for the holy place
  alternatives:
  - for the sanctuary
  - for the holy portion
  lexicon: HALOT
  rationale: The preposition here marks destination/allocation rather than motion,
    so 'for' fits better than a literal 'to.' קֹדֶשׁ in this land-measurement context
    refers to the sacred area; 'holy place' preserves the sanctity term without over-specifying
    the building itself.
- source_word: חֲמֵשׁ מֵאוֹת בַּ/חֲמֵשׁ מֵאוֹת
  chosen: five hundred by five hundred
  alternatives:
  - five hundred cubits by five hundred cubits
  - five hundred on five hundred
  lexicon: HALOT
  rationale: This is a dimensional formula. English idiom prefers 'five hundred by
    five hundred.' 'Cubits' is not repeated in the Hebrew at this point, so it is
    left implicit here and made explicit later where אַמָּה occurs.
- source_word: מְרֻבָּע
  chosen: a square
  alternatives:
  - square
  - squared
  lexicon: HALOT
  rationale: The passive participial form denotes shape. Rendering it as 'a square'
    makes the syntax natural in English while preserving the geometric sense.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: The term indicates surrounding extent. 'All around' communicates the
    distributive force clearly in modern English.
- source_word: וַ/חֲמִשִּׁים אַמָּה
  chosen: with fifty cubits
  alternatives:
  - and fifty cubits
  lexicon: HALOT
  rationale: The conjunction introduces an additional specification attached to the
    square. 'With fifty cubits' reads more naturally in English than a bare coordinate
    'and fifty cubits' while preserving the additive sense.
- source_word: מִגְרָשׁ
  chosen: open land
  alternatives:
  - pasture land
  - common land
  - suburbs
  lexicon: HALOT
  rationale: מִגְרָשׁ denotes an open area or surrounding land set apart around a
    site. 'Open land' is clear modern English and avoids the misleading older 'suburbs.'
    'Pasture land' is possible in some contexts, but here the emphasis is on the buffer
    area around the holy square.
- source_word: ל֖/וֹ
  chosen: for it
  alternatives:
  - belonging to it
  - around it
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the holy area/square. 'For it' preserves
    the possessive/allotted sense without overtranslation.
