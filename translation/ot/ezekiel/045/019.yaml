id: EZK.45.19
reference: Ezekiel 45:19
source:
  edition: WLC
  text: וְ/לָקַ֨ח הַ/כֹּהֵ֜ן מִ/דַּ֣ם הַ/חַטָּ֗את וְ/נָתַן֙ אֶל מְזוּזַ֣ת הַ/בַּ֔יִת
    וְ/אֶל אַרְבַּ֛ע פִּנּ֥וֹת הָ/עֲזָרָ֖ה לַ/מִּזְבֵּ֑חַ וְ/עַ֨ל מְזוּזַ֔ת שַׁ֖עַר
    הֶ/חָצֵ֥ר הַ/פְּנִימִֽית־־־׃
translation:
  text: And the priest shall take some of the blood of the sin offering and put it
    on the doorposts of the temple, on the four corners of the ledge of the altar,
    and on the doorposts of the gate of the inner court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering.' The Hebrew term can denote the offering associated
      with sin and cleansing in sacrificial contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: shall take
  alternatives:
  - and he took
  - and he is to take
  lexicon: HALOT
  rationale: Converted the Hebrew waw-consecutive perfect into English future/modal
    narrative instruction, fitting the procedural context of the surrounding cultic
    legislation.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; singular is retained
    because the Hebrew is singular.
- source_word: מִדַּם
  chosen: some of the blood
  alternatives:
  - from the blood
  - of the blood
  lexicon: HALOT
  rationale: The preposition מִן with 'blood' naturally indicates taking a portion
    from the sacrificial blood, so idiomatic English 'some of the blood' best conveys
    the sense.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  - the sin sacrifice
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the offering rather
    than abstract 'sin.' 'Sin offering' is the most recognizable and contextually
    precise rendering, though 'purification offering' is a viable alternative emphasizing
    function.
- source_word: וְנָתַן
  chosen: and put
  alternatives:
  - and place
  - and apply
  - and give
  lexicon: HALOT
  rationale: In ritual application contexts, נתן means to place/apply. 'Put' is clear
    modern English without over-interpreting the action.
- source_word: אֶל מְזוּזַת הַבַּיִת
  chosen: on the doorposts of the temple
  alternatives:
  - to the doorpost of the house
  - on the doorframe of the house
  lexicon: HALOT
  rationale: מְזוּזָה refers to a doorpost/doorframe side-post. Though singular in
    construct, English idiom often uses the plural 'doorposts' for the frame as a
    unit. הַבַּיִת in Ezekiel's temple vision refers specifically to the temple building,
    so 'temple' is clearer than the generic 'house.'
- source_word: אַרְבַּע פִּנּוֹת
  chosen: the four corners
  alternatives:
  - the four horns
  - the four corner-points
  lexicon: HALOT
  rationale: פִּנּוֹת normally means corners. 'Horns' would require a different lexical
    basis and is not supported by the Hebrew here.
- source_word: הָעֲזָרָה לַמִּזְבֵּחַ
  chosen: the ledge of the altar
  alternatives:
  - the enclosure of the altar
  - the border of the altar
  - the altar court
  lexicon: HALOT
  rationale: In Ezekiel's temple description עֲזָרָה here most plausibly refers to
    the altar's surrounding ledge/platform rather than a court in the broader complex.
    The prefixed ל on מִּזְבֵּחַ is taken as specifying relation ('of/belonging to
    the altar') in this technical architectural phrase. 'Ledge of the altar' best
    fits the immediate architectural context and parallels in Ezekiel 43.
- source_word: וְעַל מְזוּזַת שַׁעַר
  chosen: and on the doorposts of the gate
  alternatives:
  - and on the doorpost of the gate
  - and upon the gatepost
  lexicon: HALOT
  rationale: Again, מְזוּזָה denotes the side-post(s) of an entrance. English plural
    'doorposts' is idiomatic for the gate structure as a whole.
- source_word: הֶחָצֵר הַפְּנִימִית
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: Standard rendering of the temple-complex term; 'court' is concise and
    conventional in English temple descriptions.
