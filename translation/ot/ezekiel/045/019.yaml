theological_decisions:
- issue: Rendering חַטָּאת in a sacrificial law context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The verse describes ritual blood application from a sacrificial animal.
    While some scholars prefer 'purification offering' to stress the rite's cleansing
    function, 'sin offering' remains a faithful and widely understood rendering that
    matches the cultic context without importing extra theological claims. The alternative
    is preserved in a footnote because it is a meaningful lexical-theological nuance.
  doctrine_reference: Translation philosophy §3, §5
