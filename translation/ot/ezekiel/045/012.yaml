id: EZK.45.12
reference: Ezekiel 45:12
source:
  edition: WLC
  text: וְ/הַ/שֶּׁ֖קֶל עֶשְׂרִ֣ים גֵּרָ֑ה עֶשְׂרִ֨ים שְׁקָלִ֜ים חֲמִשָּׁ֧ה וְ/עֶשְׂרִ֣ים
    שְׁקָלִ֗ים עֲשָׂרָ֤ה וַ/חֲמִשָּׁה֙ שֶׁ֔קֶל הַ/מָּנֶ֖ה יִֽהְיֶ֥ה לָ/כֶֽם׃
translation:
  text: And the shekel shall be twenty gerahs; twenty shekels, twenty-five shekels,
    and fifteen shekels shall be your mina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew lists the mina as 'twenty shekels, twenty-five shekels, and fifteen
      shekels'—that is, a total of sixty shekels. This differs from other ancient
      reckonings of the mina and likely reflects a specific standard in Ezekiel's
      temple legislation.
    reason: cultural_note
  - marker: b
    text: Or 'maneh.' The Hebrew term refers to a larger unit of weight or money.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֶּׁקֶל
  chosen: the shekel
  alternatives:
  - the sacred shekel
  - the standard shekel
  lexicon: HALOT
  rationale: Basic monetary weight/unit term. The article is retained with 'the shekel'
    to reflect a defined standard unit in the legal/economic context.
- source_word: גֵּרָה
  chosen: gerahs
  alternatives:
  - geras
  lexicon: HALOT
  rationale: A small weight/monetary subdivision. Kept as a transliterated unit rather
    than converted into an approximate modern equivalent, preserving the ancient measurement
    system.
- source_word: עֶשְׂרִים
  chosen: twenty
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying gerahs and later shekels.
- source_word: שְׁקָלִים / שֶׁקֶל
  chosen: shekels
  lexicon: HALOT
  rationale: Rendered consistently as the monetary/weight unit 'shekel(s).' Singular
    שֶׁקֶל after fifteen is idiomatically absorbed into the coordinated English series
    as 'fifteen shekels.'
- source_word: חֲמִשָּׁה וְעֶשְׂרִים
  chosen: twenty-five
  alternatives:
  - five and twenty
  lexicon: HALOT
  rationale: English uses the natural modern order 'twenty-five' rather than the more
    literal but archaic 'five and twenty.'
- source_word: עֲשָׂרָה וַחֲמִשָּׁה
  chosen: fifteen
  alternatives:
  - ten and five
  lexicon: HALOT
  rationale: Rendered in standard modern English number form.
- source_word: הַמָּנֶה
  chosen: your mina
  alternatives:
  - the mina
  - your maneh
  lexicon: HALOT
  rationale: Rendered as 'mina,' the conventional English name for the larger weight/monetary
    unit. The prefixed article plus לָכֶם is expressed as 'your mina,' indicating
    the standard to be used by the audience addressed.
- source_word: יִהְיֶה לָכֶם
  chosen: shall be your
  alternatives:
  - shall belong to you as
  - shall amount for you to
  lexicon: HALOT
  rationale: This construction establishes the official standard in force for the
    addressees. 'Shall be your' is concise and natural while preserving the prescriptive
    force.
