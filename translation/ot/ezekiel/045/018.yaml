theological_decisions:
- issue: Rendering the ritual verb חטא with the sanctuary as object
  chosen_reading: you shall purify the sanctuary
  alternative_readings:
  - you shall make atonement for the sanctuary
  - you shall cleanse the sanctuary from sin
  rationale: The Hebrew presents a ritual purification act applied to the sanctuary.
    'Purify' preserves the cultic function without importing a narrower later theological
    formulation, while acknowledging that atonement language is a viable traditional
    alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
