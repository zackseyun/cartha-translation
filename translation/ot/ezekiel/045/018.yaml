id: EZK.45.18
reference: Ezekiel 45:18
source:
  edition: WLC
  text: כֹּה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ בָּֽ/רִאשׁוֹן֙ בְּ/אֶחָ֣ד לַ/חֹ֔דֶשׁ תִּקַּ֥ח
    פַּר בֶּן בָּקָ֖ר תָּמִ֑ים וְ/חִטֵּאתָ֖ אֶת הַ/מִּקְדָּֽשׁ־־־־׃
translation:
  text: 'Thus says the Lord GOD: In the first month, on the first day of the month,
    you shall take a bull from the herd without blemish, and you shall purify the
    sanctuary.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you shall make atonement for the sanctuary.' The Hebrew verb here is
      a ritual term that can denote purification or decontamination from sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally distinguished in English
    as 'Lord GOD' when אֲדֹנָי precedes YHWH. Per doctrine, YHWH is rendered 'the
    LORD'; in this fixed combination, 'GOD' preserves the traditional differentiation
    and avoids 'Lord LORD.'
- source_word: בָּרִאשׁוֹן
  chosen: In the first month
  alternatives:
  - In the first
  lexicon: HALOT
  rationale: Though 'month' is not repeated in this word alone, the following phrase
    לַחֹדֶשׁ clarifies the calendrical sense. English idiom requires making the temporal
    reference explicit.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Literally 'on one of the month,' a standard Hebrew date expression meaning
    the first day of the month. Expanded slightly for clear modern English.
- source_word: תִּקַּח
  chosen: you shall take
  alternatives:
  - you are to take
  - take
  lexicon: HALOT
  rationale: The imperfect in this legal/instructional context carries directive force.
    'You shall take' fits English legislative style and preserves the command.
- source_word: פַּר בֶּן בָּקָר
  chosen: a bull from the herd
  alternatives:
  - a young bull
  - a bull calf
  lexicon: HALOT
  rationale: The phrase denotes a bull of the cattle herd. 'Bull from the herd' is
    natural English and avoids over-specifying age where the Hebrew primarily identifies
    the animal type.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Cultic language in sacrificial contexts is best rendered 'without blemish,'
    the standard idiom for an acceptable sacrificial animal.
- source_word: וְחִטֵּאתָ
  chosen: you shall purify
  alternatives:
  - you shall make atonement for
  - you shall cleanse from sin
  lexicon: HALOT
  rationale: The piel of חטא in ritual contexts means to de-sin/purify, not that the
    sanctuary itself commits sin. 'Purify' communicates the cultic cleansing sense
    clearly in English.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: HALOT
  rationale: מקדש refers broadly to the sacred precinct/shrine. 'Sanctuary' is the
    most fitting general cultic term here.
