id: EZK.45.4
reference: Ezekiel 45:4
source:
  edition: WLC
  text: קֹ֣דֶשׁ מִן הָ/אָ֜רֶץ ה֗וּא לַ/כֹּ֨הֲנִ֜ים מְשָׁרְתֵ֤י הַ/מִּקְדָּשׁ֙ יִֽהְיֶ֔ה הַ/קְּרֵבִ֖ים לְ/שָׁרֵ֣ת אֶת יְהוָ֑ה וְ/הָיָ֨ה לָ/הֶ֤ם מָקוֹם֙ לְ/בָ֣תִּ֔ים וּ/מִקְדָּ֖שׁ לַ/מִּקְדָּֽשׁ־־׃
translation:
  text: It is a holy portion of the land; it shall be for the priests, the ministers of the sanctuary, who draw near to minister to Yahweh. And it shall be for them as a place for houses and as a holy place for the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and a holy place for the sanctuary'; the Hebrew expression is compact and may refer to a consecrated area belonging to the sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֶשׁ
  chosen: a holy portion
  alternatives:
  - holiness
  - a holy place
  - something holy
  lexicon: HALOT
  rationale: In this land-allotment context, the noun refers not abstractly to holiness but to land set apart as sacred. 'A holy portion' makes explicit the implied sense from the surrounding measurements and allotments while remaining close to the Hebrew.
- source_word: מִן הָאָרֶץ
  chosen: of the land
  alternatives:
  - from the land
  lexicon: HALOT
  rationale: 'The preposition מן here is best taken partitively: this is a sacred portion taken from the land. English idiom prefers ''of the land'' in this construction.'
- source_word: לַכֹּהֲנִים
  chosen: for the priests
  lexicon: HALOT
  rationale: Straightforward dative of possession/allocation in the allotment description.
- source_word: מְשָׁרְתֵי הַמִּקְדָּשׁ
  chosen: the ministers of the sanctuary
  alternatives:
  - those who serve the sanctuary
  - the servants of the sanctuary
  lexicon: HALOT
  rationale: משרתים denotes those performing ministerial service. 'Ministers' fits cultic service in readable modern English without implying Christian clergy categories; 'sanctuary' is the natural rendering of מקדש here.
- source_word: הַקְּרֵבִים
  chosen: who draw near
  alternatives:
  - who come near
  - who approach
  lexicon: HALOT
  rationale: This participle often has priestly/cultic force in Ezekiel. 'Draw near' preserves that technical nuance better than the more ordinary 'come near.'
- source_word: לְשָׁרֵת אֶת יְהוָה
  chosen: to minister to the LORD
  alternatives:
  - to serve the LORD
  lexicon: HALOT
  rationale: In priestly context, 'minister' better conveys formal cultic service than the broader 'serve.' יְהוָה follows the doctrinal default 'the LORD'.
- source_word: מָקוֹם לְבָתִּים
  chosen: a place for houses
  alternatives:
  - a place for dwellings
  - a place for homes
  lexicon: HALOT
  rationale: The phrase indicates residential space assigned to the priests. 'Houses' is the most direct rendering of בתים.
- source_word: וּמִקְדָּשׁ לַמִּקְדָּשׁ
  chosen: and as holy land for the sanctuary
  alternatives:
  - and a holy place for the sanctuary
  - and open land for the sanctuary
  - and a consecrated area for the sanctuary
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat difficult. Retaining 'sanctuary' for the second מקדש is clear. The first מקדש is taken in the sense of a consecrated/sacred area belonging to or surrounding the sanctuary. 'Holy land' communicates the idea of sacred precinct without over-specifying architecture.
