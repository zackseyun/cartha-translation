id: EZK.45.1
reference: Ezekiel 45:1
source:
  edition: WLC
  text: וּ/בְ/הַפִּֽילְ/כֶ֨ם אֶת הָ/אָ֜רֶץ בְּ/נַחֲלָ֗ה תָּרִימוּ֩ תְרוּמָ֨ה לַ/יהוָ֥ה
    קֹדֶשׁ֮ מִן הָ/אָרֶץ֒ אֹ֗רֶךְ חֲמִשָּׁ֨ה וְ/עֶשְׂרִ֥ים אֶ֨לֶף֙ אֹ֔רֶךְ וְ/רֹ֖חַב
    עֲשָׂ֣רָה אָ֑לֶף קֹדֶשׁ ה֥וּא בְ/כָל גְּבוּלָ֖/הּ סָבִֽיב־׀־־־׃
translation:
  text: 'And when you divide the land as an inheritance, you shall set apart an offering
    to the LORD, a holy portion from the land: twenty-five thousand cubits in length
    and ten thousand in width. It shall be holy within all its surrounding boundary.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''twenty-five thousand length and ten thousand width''; ''cubits''
      is implied by the measurement context and supplied for clarity.'
    reason: cultural_note
  - marker: b
    text: Or 'allot the land by lot as an inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַפִּילְכֶם
  chosen: when you divide
  alternatives:
  - when you cast down
  - when you allot by lot
  lexicon: HALOT
  rationale: The Hiphil of נפל with land-allotment context refers to causing portions
    to fall, i.e., apportioning/dividing by lot. 'When you divide' gives clear modern
    English while preserving the distributive sense. 'Allot by lot' is possible but
    more specific than the immediate English context requires.
- source_word: בְּנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inherited possession/allotment. 'As an inheritance'
    fits the syntax of dividing the land and preserves covenantal-land terminology.
- source_word: תָּרִימוּ תְרוּמָה
  chosen: you shall set apart an offering
  alternatives:
  - you shall raise up a contribution
  - you shall present a heave offering
  lexicon: HALOT
  rationale: The idiom of רום + תְּרוּמָה means to set apart or contribute a designated
    portion. 'Set apart an offering' communicates the cultic dedication without importing
    the more technical and potentially misleading older term 'heave offering' in this
    land-allotment context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication to YHWH. Per doctrine, יהוה is rendered
    'the LORD.' 'To the LORD' best reflects consecratory direction.
- source_word: קֹדֶשׁ מִן הָאָרֶץ
  chosen: a holy portion from the land
  alternatives:
  - something holy from the land
  - a holy district from the land
  lexicon: HALOT
  rationale: קֹדֶשׁ here functions substantivally for a consecrated area/portion.
    'Holy portion' is natural English and fits the following dimensions. 'District'
    is interpretive and better left for contexts where the territorial sense is more
    explicit.
- source_word: אֹרֶךְ חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף אֹרֶךְ
  chosen: twenty-five thousand cubits in length
  alternatives:
  - a length of twenty-five thousand
  - twenty-five thousand long
  lexicon: HALOT
  rationale: The Hebrew repeats 'length' for emphasis/measurement style. English smooths
    this to one explicit phrase. 'Cubits' is supplied because the measurement unit
    is implicit in this temple-vision context and standardly understood.
- source_word: וְרֹחַב עֲשָׂרָה אָלֶף
  chosen: and ten thousand in width
  alternatives:
  - and a width of ten thousand
  lexicon: HALOT
  rationale: A straightforward rendering of the dimensional phrase in idiomatic English.
- source_word: קֹדֶשׁ הוּא
  chosen: It shall be holy
  alternatives:
  - it is holy
  - this is holy
  lexicon: HALOT
  rationale: The clause predicates holiness of the allotted tract. Future-like 'shall
    be' fits the legal-instructional context better than a simple present in English.
- source_word: בְּכָל גְּבוּלָהּ סָבִיב
  chosen: within all its surrounding boundary
  alternatives:
  - all around within its border
  - throughout all its border round about
  lexicon: HALOT
  rationale: The phrase describes the entirety of the tract within its perimeter.
    'Within all its surrounding boundary' is slightly formal but clear and preserves
    the comprehensive force of בְּכָל ... סָבִיב.
