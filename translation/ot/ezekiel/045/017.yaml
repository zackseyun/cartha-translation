id: EZK.45.17
reference: Ezekiel 45:17
source:
  edition: WLC
  text: וְ/עַֽל הַ/נָּשִׂ֣יא יִהְיֶ֗ה הָ/עוֹל֣וֹת וְ/הַ/מִּנְחָה֮ וְ/הַ/נֵּסֶךְ֒ בַּ/חַגִּ֤ים
    וּ/בֶ/חֳדָשִׁים֙ וּ/בַ/שַּׁבָּת֔וֹת בְּ/כָֽל מוֹעֲדֵ֖י בֵּ֣ית יִשְׂרָאֵ֑ל הֽוּא
    יַעֲשֶׂ֞ה אֶת הַ/חַטָּ֣את וְ/אֶת הַ/מִּנְחָ֗ה וְ/אֶת הָֽ/עוֹלָה֙ וְ/אֶת הַ/שְּׁלָמִ֔ים
    לְ/כַפֵּ֖ר בְּעַ֥ד בֵּֽית יִשְׂרָאֵֽל־־־־־־־־׃ס
translation:
  text: And the burnt offerings, the grain offering, and the drink offering at the
    feasts, at the new moons, and at the Sabbaths—at all the appointed times of the
    house of Israel—shall be the prince’s responsibility. He shall provide the sin
    offering, the grain offering, the burnt offering, and the peace offerings, to
    make atonement for the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the purification offering' for 'the sin offering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the fellowship offerings' or 'the offerings of well-being' for 'the
      peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל הַנָּשִׂיא יִהְיֶה
  chosen: shall be the prince’s responsibility
  alternatives:
  - shall be upon the prince
  - shall belong to the prince
  lexicon: HALOT
  rationale: The preposition עַל with היה here expresses obligation or charge resting
    on someone. Rendering it as 'shall be the prince’s responsibility' communicates
    the idiomatic force in natural English better than a wooden 'shall be upon the
    prince,' while preserving the sense of assigned duty.
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel commonly refers to the civic leader/prince. 'Prince'
    preserves the established Ezekiel usage and avoids over-specifying as 'king,'
    which the text does not say.
- source_word: הָעוֹלוֹת
  chosen: the burnt offerings
  alternatives:
  - the whole burnt offerings
  lexicon: HALOT
  rationale: עוֹלָה denotes the burnt offering. The plural is retained. 'Burnt offerings'
    is standard, clear English.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts refers specifically to the grain offering,
    not merely any offering. This rendering is both precise and readable.
- source_word: הַנֵּסֶךְ
  chosen: the drink offering
  alternatives:
  - the libation
  lexicon: HALOT
  rationale: נֶסֶךְ is the poured-out offering accompanying sacrifices. 'Drink offering'
    is the clearest standard English equivalent; 'libation' is possible but less accessible.
- source_word: בַּחַגִּים וּבֶחֳדָשִׁים וּבַשַּׁבָּתוֹת
  chosen: at the feasts, at the new moons, and at the Sabbaths
  alternatives:
  - during the festivals, the new moons, and the Sabbaths
  lexicon: HALOT
  rationale: These are recurring sacred times. 'Feasts' for חַגִּים, 'new moons' for
    חֳדָשִׁים, and 'Sabbaths' for שַׁבָּתוֹת are straightforward and preserve the
    cultic calendar terminology.
- source_word: בְּכָל מוֹעֲדֵי בֵּית יִשְׂרָאֵל
  chosen: at all the appointed times of the house of Israel
  alternatives:
  - at all the appointed feasts of the house of Israel
  - at all the festivals of the house of Israel
  lexicon: HALOT
  rationale: מוֹעֲדִים broadly denotes appointed times/seasons, often sacred assemblies.
    Since חַגִּים has already been rendered 'feasts,' 'appointed times' avoids redundancy
    and preserves the broader scope.
- source_word: הוּא יַעֲשֶׂה
  chosen: He shall provide
  alternatives:
  - he shall make
  - he shall perform
  lexicon: HALOT
  rationale: In sacrificial contexts עשה can mean to prepare or provide/offer the
    required sacrifices. Since the prince is responsible for supplying these offerings,
    'provide' best fits the context and English idiom.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the 'sin offering'; in priestly sacrificial
    contexts it is the offering. 'Sin offering' is the conventional rendering, while
    'purification offering' is a defensible nuance preserved in a footnote.
- source_word: הָעוֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: Singular here after the earlier plural likely refers generically to the
    category of offering. Standard rendering retained for consistency.
- source_word: הַשְּׁלָמִים
  chosen: the peace offerings
  alternatives:
  - the fellowship offerings
  - the offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally rendered 'peace offerings.' Alternatives such
    as 'fellowship offerings' or 'offerings of well-being' capture aspects of the
    term, but 'peace offerings' remains concise and recognizable; an alternative is
    preserved in a footnote.
- source_word: לְכַפֵּר בְּעַד
  chosen: to make atonement for
  alternatives:
  - to atone for
  - to make expiation for
  lexicon: HALOT
  rationale: כפר in sacrificial contexts refers to making atonement. 'To make atonement
    for' is clear, standard English and preserves the cultic-theological sense without
    importing a narrower theory of atonement.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is retained rather than simplified to 'Israel' in
    order to preserve the corporate covenantal expression used in Ezekiel.
