theological_decisions:
- issue: Role of the prince in relation to sacrificial worship
  chosen_reading: The verse assigns responsibility to the prince to provide the required
    offerings for Israel’s appointed times.
  alternative_readings:
  - The prince personally performs the offerings in a priestly sense.
  rationale: The wording emphasizes that the obligation rests on the prince and that
    he 'does/makes/provides' the offerings. In context, this need not imply that he
    acts as a priest with his own hands; it can denote his responsibility to furnish
    them. The translation therefore uses 'shall provide' to avoid overstating a priestly
    role the text does not explicitly assign.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of sacrificial atonement language
  chosen_reading: The text speaks of cultic atonement for the house of Israel within
    Ezekiel’s temple vision.
  alternative_readings:
  - Atonement here should be paraphrased into a later systematic-theological category.
  rationale: The translation keeps the sacrificial language 'make atonement' and does
    not import later doctrinal formulations beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
