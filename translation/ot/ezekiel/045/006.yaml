id: EZK.45.6
reference: Ezekiel 45:6
source:
  edition: WLC
  text: וַ/אֲחֻזַּ֨ת הָ/עִ֜יר תִּתְּנ֗וּ חֲמֵ֤שֶׁת אֲלָפִים֙ רֹ֔חַב וְ/אֹ֗רֶךְ חֲמִשָּׁ֤ה
    וְ/עֶשְׂרִים֙ אֶ֔לֶף לְ/עֻמַּ֖ת תְּרוּמַ֣ת הַ/קֹּ֑דֶשׁ לְ/כָל בֵּ֥ית יִשְׂרָאֵ֖ל
    יִהְיֶֽה־׃
translation:
  text: And you shall give the city's property an area five thousand wide and twenty-five
    thousand long, corresponding to the holy contribution; it shall belong to the
    whole house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'alongside the holy contribution' or 'parallel to the holy contribution.'
      The Hebrew expression can denote spatial alignment as well as correspondence
      in measure.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of Israel,' a collective term for the people of Israel.
    reason: cultural_note
lexical_decisions:
- source_word: אֲחֻזַּת הָעִיר
  chosen: the city's property
  alternatives:
  - the possession of the city
  - the city's holding
  - the city's landholding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a possession or landed property. In this land-allotment
    context, 'the city's property' is natural modern English while preserving the
    idea of a designated landholding for the city.
- source_word: תִּתְּנוּ
  chosen: you shall give
  alternatives:
  - you shall assign
  - you shall set aside
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' In legal-allotment context 'assign' is
    possible, but 'you shall give' stays closer to the Hebrew while remaining clear.
- source_word: חֲמֵשֶׁת אֲלָפִים רֹחַב
  chosen: five thousand wide
  alternatives:
  - a width of five thousand
  - five thousand cubits wide
  lexicon: HALOT
  rationale: 'The Hebrew gives the dimension tersely: number + ''width.'' ''Five thousand
    wide'' reflects that compact style. The unit is not stated in this verse, so it
    is not supplied in the main text.'
- source_word: וְאֹרֶךְ חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  chosen: and twenty-five thousand long
  alternatives:
  - and a length of twenty-five thousand
  - and twenty-five thousand in length
  lexicon: HALOT
  rationale: This mirrors the Hebrew coordinate dimension statement and keeps the
    measured-land style of the passage.
- source_word: לְעֻמַּת
  chosen: corresponding to
  alternatives:
  - alongside
  - parallel to
  - adjacent to
  lexicon: HALOT
  rationale: לְעֻמַּת can indicate correspondence, opposite position, or alignment.
    Here the city's tract is measured in relation to the holy allotment, so 'corresponding
    to' captures the relational sense without overcommitting to strict spatial adjacency.
- source_word: תְּרוּמַת הַקֹּדֶשׁ
  chosen: the holy contribution
  alternatives:
  - the holy allotment
  - the sacred offering
  lexicon: HALOT
  rationale: תְּרוּמָה is a contribution/offering set apart, and in Ezekiel 45 it
    refers to the consecrated land portion. 'Holy contribution' preserves the cultic
    language and links with the broader chapter.
- source_word: לְכָל בֵּית יִשְׂרָאֵל
  chosen: to the whole house of Israel
  alternatives:
  - for the whole house of Israel
  - belonging to all the house of Israel
  lexicon: HALOT
  rationale: בֵּית יִשְׂרָאֵל is the standard collective expression 'house of Israel.'
    'Whole' reflects כָל, and 'to' works idiomatically with the following היה to express
    belonging.
- source_word: יִהְיֶה
  chosen: it shall belong
  alternatives:
  - it shall be
  - it shall serve
  lexicon: HALOT
  rationale: Although היה is simply 'be,' in this possessive/distributive context
    English idiom is better expressed by 'it shall belong,' making explicit the sense
    that this tract is for all Israel.
