id: EZK.45.23
reference: Ezekiel 45:23
source:
  edition: WLC
  text: וְ/שִׁבְעַ֨ת יְמֵֽי הֶ/חָ֜ג יַעֲשֶׂ֧ה עוֹלָ֣ה לַֽ/יהוָ֗ה שִׁבְעַ֣ת פָּ֠רִים
    וְ/שִׁבְעַ֨ת אֵילִ֤ים תְּמִימִם֙ לַ/יּ֔וֹם שִׁבְעַ֖ת הַ/יָּמִ֑ים וְ/חַטָּ֕את שְׂעִ֥יר
    עִזִּ֖ים לַ/יּֽוֹם־׃
translation:
  text: During the seven days of the feast he shall provide as a burnt offering to
    the LORD seven bulls and seven rams without blemish each day for the seven days,
    and as a sin offering one male goat each day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'festival' for 'feast.'
    reason: lexical_alternative
  - marker: b
    text: Or 'purification offering' for 'sin offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָג
  chosen: the feast
  alternatives:
  - the festival
  lexicon: HALOT
  rationale: חַג denotes a pilgrimage feast/festival. 'Feast' is the more natural
    biblical-English rendering here and fits the cultic context.
- source_word: יַעֲשֶׂה
  chosen: he shall provide
  alternatives:
  - he shall make
  - he shall offer
  lexicon: HALOT
  rationale: עָשָׂה literally means 'do/make,' but in sacrificial contexts it commonly
    carries the sense of preparing/providing/performing an offering. 'Provide' fits
    the prince's responsibility in this temple legislation without over-paraphrasing.
- source_word: עוֹלָה
  chosen: burnt offering
  lexicon: HALOT
  rationale: Standard cultic term for the whole burnt offering; 'burnt offering' is
    the established and accurate English equivalent.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication/direction of the offering. 'To the LORD'
    is idiomatic and preserves the offering's orientation. Per doctrine, יהוה is rendered
    'the LORD'.
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: פַּר in sacrificial contexts commonly refers to a bull. 'Bulls' is concise
    and natural; 'young bulls' is possible but not explicit in the form here.
- source_word: אֵילִים
  chosen: rams
  lexicon: HALOT
  rationale: אֵילִים are male sheep, specifically rams, in sacrificial usage.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Cultic qualification for acceptable sacrificial animals. 'Without blemish'
    is the clearest standard English rendering.
- source_word: לַיּוֹם
  chosen: each day
  alternatives:
  - per day
  - for the day
  lexicon: HALOT
  rationale: The distributive sense in this repeated sacrificial schedule is best
    conveyed by 'each day' in natural English.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: While חַטָּאת can denote either 'sin' or the offering associated with
    sin/purification, in sacrificial legislation 'sin offering' is the most recognizable
    and contextually appropriate rendering. 'Purification offering' is a viable alternative
    but less conventional here.
- source_word: שְׂעִיר עִזִּים
  chosen: one male goat
  alternatives:
  - a goat
  - a buck goat
  - a he-goat
  lexicon: HALOT
  rationale: The construct phrase denotes a male goat from the goats. English idiom
    is best served by 'one male goat,' with 'one' supplied because the singular noun
    in this enumerative context naturally indicates a single animal.
