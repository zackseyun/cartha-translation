id: EZK.45.3
reference: Ezekiel 45:3
source:
  edition: WLC
  text: וּ/מִן הַ/מִּדָּ֤ה הַ/זֹּאת֙ תָּמ֔וֹד אֹ֗רֶךְ חמש וְ/עֶשְׂרִים֙ אֶ֔לֶף וְ/רֹ֖חַב
    עֲשֶׂ֣רֶת אֲלָפִ֑ים וּ/בֽ/וֹ יִהְיֶ֥ה הַ/מִּקְדָּ֖שׁ קֹ֥דֶשׁ קָדָשִֽׁים־־׃
translation:
  text: From this measured area you shall measure a length of twenty-five thousand
    and a width of ten thousand, and in it shall be the sanctuary, the most holy place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “the sanctuary, the Holy of Holies.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן הַמִּדָּה הַזֹּאת
  chosen: From this measured area
  alternatives:
  - From this measurement
  - And from this measure
  lexicon: HALOT
  rationale: מִדָּה denotes a measurement or measured portion. In this land-allotment
    context, 'measured area' best captures that the reference is not merely an abstract
    unit but the previously defined tract. 'From' preserves the preposition מִן.
- source_word: תָּמֹד
  chosen: you shall measure
  alternatives:
  - you are to measure
  - measure
  lexicon: HALOT
  rationale: Qal imperfect 2ms of מדד is naturally rendered as an instruction/future,
    'you shall measure.' This preserves the direct address and procedural tone of
    the vision.
- source_word: אֹרֶךְ
  chosen: a length
  alternatives:
  - length
  lexicon: HALOT
  rationale: The noun marks the first dimension being specified. The indefinite article
    is natural English style.
- source_word: חמש ועשרים אלף
  chosen: twenty-five thousand
  alternatives:
  - five and twenty thousand
  lexicon: HALOT
  rationale: The Hebrew numeral sequence is rendered in standard contemporary English
    order.
- source_word: וְרֹחַב עֲשֶׂרֶת אֲלָפִים
  chosen: and a width of ten thousand
  alternatives:
  - and breadth ten thousand
  - and a breadth of ten thousand
  lexicon: HALOT
  rationale: רֹחַב refers to width/breadth. 'Width' is more natural modern English
    while preserving the dimensional contrast with 'length'.
- source_word: וּבוֹ
  chosen: and in it
  alternatives:
  - and within it
  - and there
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix points back to the measured tract.
    'In it' is the most direct rendering.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple sanctuary
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes the sacred precinct/shrine. 'Sanctuary' is the standard
    and suitably broad rendering in Ezekiel's temple vision.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: the most holy place
  alternatives:
  - most holy
  - holy of holies
  lexicon: HALOT
  rationale: The superlative construction literally means 'holiness of holinesses'
    / 'most holy.' Because it stands appositionally to 'the sanctuary,' 'the most
    holy place' makes the sense explicit in idiomatic English. 'Holy of Holies' is
    a viable traditional alternative but less transparent for modern readers.
