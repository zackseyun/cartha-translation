theological_decisions:
- issue: Rendering of קֹדֶשׁ קָדָשִׁים in temple-context language
  chosen_reading: the most holy place
  alternative_readings:
  - most holy
  - Holy of Holies
  rationale: The phrase is a cultic superlative. The chosen rendering communicates
    the sancta designation clearly in modern English without importing extra doctrinal
    claims. A traditional alternative is preserved in a footnote because readers may
    recognize it from established English Bible tradition.
  doctrine_reference: Translation philosophy §§5–6
