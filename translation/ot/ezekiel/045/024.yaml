id: EZK.45.24
reference: Ezekiel 45:24
source:
  edition: WLC
  text: וּ/מִנְחָ֗ה אֵיפָ֥ה לַ/פָּ֛ר וְ/אֵיפָ֥ה לָ/אַ֖יִל יַֽעֲשֶׂ֑ה וְ/שֶׁ֖מֶן הִ֥ין
    לָ/אֵיפָֽה׃
translation:
  text: And as the grain offering, he shall provide an ephah for each bull and an
    ephah for each ram, and a hin of oil for each ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall make' or 'he shall prepare'; the Hebrew verb is literally 'do/make'
      and in sacrificial context can refer to preparing or providing the required
      offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In sacrificial context, מִנְחָה commonly denotes the cereal/grain offering
    rather than a generic gift. 'Grain offering' is standard, clear modern English
    and fits the cultic regulations here.
- source_word: אֵיפָה
  chosen: ephah
  alternatives:
  - about a bushel
  lexicon: HALOT
  rationale: This is a dry measure. Retaining 'ephah' preserves the technical cultic
    measurement and avoids flattening the text into an approximate modern equivalent.
- source_word: לַפָּר
  chosen: for each bull
  alternatives:
  - for the bull
  - for a bull
  lexicon: HALOT
  rationale: The preposition ל marks allocation, and the article here functions generically
    within sacrificial prescription. 'For each bull' best conveys the distributive
    sense in English.
- source_word: לָאַיִל
  chosen: for each ram
  alternatives:
  - for the ram
  - for a ram
  lexicon: HALOT
  rationale: As with לַפָּר, the phrase is distributive in a ritual prescription.
    'For each ram' communicates the required amount per animal.
- source_word: יַעֲשֶׂה
  chosen: he shall provide
  alternatives:
  - he shall make
  - he shall prepare
  - he shall offer
  lexicon: HALOT
  rationale: עשה literally means 'do/make,' but in sacrificial legislation it often
    carries the sense of preparing or providing what is required. 'Provide' reads
    naturally in English while preserving the prescriptive force.
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The Hebrew says simply 'oil.' While olive oil is culturally likely, specifying
    'olive' would add information not explicit in the text.
- source_word: הִין
  chosen: hin
  alternatives:
  - about a gallon
  lexicon: HALOT
  rationale: This is a liquid measure. Retaining the Hebrew unit preserves precision
    and consistency with the source text's cultic terminology.
- source_word: לָאֵיפָה
  chosen: for each ephah
  alternatives:
  - to the ephah
  - per ephah
  lexicon: HALOT
  rationale: The phrase specifies the ratio of oil to grain measure. 'For each ephah'
    is idiomatic and clearly distributive in English.
