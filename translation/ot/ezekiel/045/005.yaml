id: EZK.45.5
reference: Ezekiel 45:5
source:
  edition: WLC
  text: וַ/חֲמִשָּׁ֨ה וְ/עֶשְׂרִ֥ים אֶ֨לֶף֙ אֹ֔רֶךְ וַ/עֲשֶׂ֥רֶת אֲלָפִ֖ים רֹ֑חַב
    יהיה לַ/לְוִיִּם֩ מְשָׁרְתֵ֨י הַ/בַּ֧יִת לָ/הֶ֛ם לַ/אֲחֻזָּ֖ה עֶשְׂרִ֥ים לְשָׁכֹֽת׃
translation:
  text: And an area twenty-five thousand long and ten thousand wide shall be for the
    Levites, the ministers of the house, for their possession, with twenty chambers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'as their possession for twenty chambers/rooms.' The final
      phrase is syntactically difficult in Hebrew.
    reason: alternative_reading
  - marker: b
    text: '''The house'' here refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: וַ/חֲמִשָּׁה וְ/עֶשְׂרִים אֶלֶף
  chosen: twenty-five thousand
  alternatives:
  - five and twenty thousand
  lexicon: HALOT
  rationale: The Hebrew cardinal construction literally reads 'five and twenty thousand,'
    but standard modern English expresses this as 'twenty-five thousand.'
- source_word: אֹרֶךְ
  chosen: long
  alternatives:
  - in length
  - length
  lexicon: HALOT
  rationale: Here the noun denotes the dimension of length. 'Long' works idiomatically
    in English when paired with the following width measurement.
- source_word: וַ/עֲשֶׂרֶת אֲלָפִים
  chosen: ten thousand
  lexicon: HALOT
  rationale: Straightforward numerical expression for the second dimension.
- source_word: רֹחַב
  chosen: wide
  alternatives:
  - in width
  - width
  lexicon: HALOT
  rationale: 'As with אֹרֶךְ, the dimensional noun is rendered idiomatically as an
    adjective in English: ''ten thousand wide.'''
- source_word: יהיה
  chosen: shall be
  alternatives:
  - will be
  - is to be
  lexicon: HALOT
  rationale: The imperfect here assigns the tract to a specified group in the visionary
    legislation. 'Shall be' preserves the formal prescriptive sense.
- source_word: לַ/לְוִיִּם
  chosen: for the Levites
  alternatives:
  - belong to the Levites
  lexicon: HALOT
  rationale: The preposition marks assignment of this land portion to the Levites.
- source_word: מְשָׁרְתֵי הַ/בַּיִת
  chosen: the ministers of the house
  alternatives:
  - those who minister in the house
  - the servants of the house
  lexicon: HALOT
  rationale: מְשָׁרְתֵי is a participial designation for those performing service;
    'ministers' fits cultic service without importing later ecclesiastical office.
    'The house' in Ezekiel commonly refers to the temple.
- source_word: הַ/בַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Literally 'the house.' Because Ezekiel frequently uses this term for
    the temple, the literal rendering is retained in the main text while the referent
    is clear from context.
- source_word: לָ/הֶם לַ/אֲחֻזָּה
  chosen: for their possession
  alternatives:
  - as a possession for them
  - for them as a property
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or possession. 'For their possession'
    is concise and natural in English.
- source_word: עֶשְׂרִים לְשָׁכֹת
  chosen: with twenty chambers
  alternatives:
  - twenty rooms
  - twenty cells
  - twenty chambers
  lexicon: HALOT
  rationale: לְשָׁכֹת refers to chambers/rooms associated with the temple complex.
    The syntax is compressed; 'with twenty chambers' best captures the appositional/additional
    sense in readable English. Because the phrase is somewhat difficult and has been
    understood differently, an alternative is preserved in a footnote.
