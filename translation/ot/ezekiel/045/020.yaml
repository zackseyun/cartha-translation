theological_decisions:
- issue: Scope of the purification rite
  chosen_reading: The verse prescribes atonement for the temple in relation to persons
    who sin unintentionally or in simplicity/naivety.
  alternative_readings:
  - The rite is performed on behalf of such persons directly
  - 'The phrase may distinguish two categories: the inadvertent sinner and the simple/naive
    person'
  rationale: The direct object of כפר is 'the temple/house,' so the atonement is made
    for the sanctuary, though occasioned by human offenses. The translation preserves
    both the human reference and the sanctuary-focused result without importing a
    fuller sacrificial theology than the verse states.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it'
- issue: Rendering of generic masculine אִישׁ
  chosen_reading: for anyone
  alternative_readings:
  - for a man
  rationale: The Hebrew is grammatically masculine singular but functions generically.
    Rendering it as 'anyone' reflects the source intent rather than unnecessarily
    restricting the scope to males, while remaining faithful to the representative
    force of the original.
  doctrine_reference: 'Translation philosophy #4: gender-accurate over gender-neutral'
