id: EZK.45.20
reference: Ezekiel 45:20
source:
  edition: WLC
  text: וְ/כֵ֤ן תַּֽעֲשֶׂה֙ בְּ/שִׁבְעָ֣ה בַ/חֹ֔דֶשׁ מֵ/אִ֥ישׁ שֹׁגֶ֖ה וּ/מִ/פֶּ֑תִי
    וְ/כִפַּרְתֶּ֖ם אֶת הַ/בָּֽיִת־׃
translation:
  text: And so you shall do on the seventh day of the month for anyone who sins unintentionally
    or through simplicity; thus you shall make atonement for the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a man who errs and for the simple one.' The Hebrew may distinguish
      two classes of persons, and פֶּתִי can also be rendered 'naive' or 'simple.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house,' referring here to the temple/sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  chosen: And so
  alternatives:
  - And likewise
  - Thus
  lexicon: HALOT
  rationale: Connective plus adverb points back to the preceding purification instruction
    and introduces a corresponding action; 'And so' preserves the linkage without
    sounding wooden.
- source_word: תַּעֲשֶׂה
  chosen: you shall do
  alternatives:
  - you shall perform
  - you shall make
  lexicon: HALOT
  rationale: Common verb עשה here refers to carrying out the prescribed ritual action.
    'You shall do' is natural and sufficiently formal.
- source_word: בְּשִׁבְעָה בַחֹדֶשׁ
  chosen: on the seventh day of the month
  alternatives:
  - on the seventh of the month
  lexicon: HALOT
  rationale: The phrase is elliptical but idiomatically refers to the seventh day
    within the month, not a seventh month. English supplies 'day' for clarity.
- source_word: מֵאִישׁ
  chosen: for anyone
  alternatives:
  - for a man
  - because of each person
  lexicon: HALOT
  rationale: Although אִישׁ is formally masculine singular, the sense here is generic.
    Per translation philosophy, representative masculine may be rendered according
    to intent; 'anyone' best conveys the generic reference in contemporary English.
- source_word: שֹׁגֶה
  chosen: who sins unintentionally
  alternatives:
  - who goes astray unintentionally
  - who errs
  lexicon: HALOT
  rationale: The participle from שגה denotes erring, especially unintentionally or
    inadvertently in cultic/legal contexts. 'Who sins unintentionally' makes the ritual
    context explicit.
- source_word: וּמִפֶּתִי
  chosen: or through simplicity
  alternatives:
  - or through ignorance
  - or being simple-minded
  - or through naivety
  lexicon: HALOT
  rationale: פֶּתִי often denotes a simple, naive, or inexperienced person. Here the
    prepositional phrase likely describes a class of offense arising from simplicity/naivety.
    'Through simplicity' stays close to the Hebrew while avoiding overinterpretation;
    'ignorance' is possible but less exact lexically.
- source_word: וְכִפַּרְתֶּם
  chosen: thus you shall make atonement
  alternatives:
  - and you shall purge
  - and you shall effect atonement
  lexicon: HALOT
  rationale: כפר in priestly/temple contexts commonly means 'make atonement.' The
    prefixed conjunction here is taken as consequential in English style after the
    purpose clause. 'Make atonement' is the standard transparent rendering.
- source_word: הַבָּיִת
  chosen: the temple
  alternatives:
  - the house
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, 'the house' refers specifically to the sanctuary/temple
    complex. 'Temple' communicates the referent clearly in English, while 'house'
    would be less transparent.
