id: EZK.45.16
reference: Ezekiel 45:16
source:
  edition: WLC
  text: כֹּ֚ל הָ/עָ֣ם הָ/אָ֔רֶץ יִהְי֖וּ אֶל הַ/תְּרוּמָ֣ה הַ/זֹּ֑את לַ/נָּשִׂ֖יא
    בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: All the people of the land shall give this contribution to the prince in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'All the people of the land shall be for this contribution
      to the prince in Israel.' The Hebrew idiom likely means that the people are
      to provide this assessed contribution for the prince.
    reason: lexical_alternative
  - marker: b
    text: '''Contribution'' translates Hebrew terumah, a set-apart portion or offering;
      ''offering'' or ''tribute'' are also possible depending on whether the cultic
      or civic aspect is emphasized.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל הָעָם הָאָרֶץ
  chosen: All the people of the land
  alternatives:
  - All the people of the הארץ
  - All the people of the country
  lexicon: HALOT
  rationale: The construct-like sequence means the totality of the populace belonging
    to the land. 'People of the land' is a standard and natural rendering in prophetic/legal
    contexts and preserves the Hebrew expression better than the more interpretive
    'citizens' or the flatter 'everyone in the land'.
- source_word: יִהְיוּ אֶל
  chosen: shall give
  alternatives:
  - shall be for
  - shall belong to
  - shall be toward
  lexicon: HALOT
  rationale: Literally, 'shall be to/toward.' In this offering context, the idiom
    indicates that the people are to provide or contribute the specified offering
    for the prince. Rendering it woodenly as 'shall be to this contribution' is awkward
    in English and obscures the sense. 'Shall give' captures the implied action demanded
    by the context of tribute/assessment.
- source_word: הַתְּרוּמָה
  chosen: contribution
  alternatives:
  - offering
  - heave offering
  - tribute
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart or lifted up, often for sacred
    or official use. Here the context is a required apportioned gift connected with
    the prince's cultic responsibilities (vv. 13–17). 'Contribution' is clear modern
    English and broad enough to preserve the term's technical sense without importing
    specifically sacrificial language at this point. 'Offering' is possible, and 'tribute'
    captures the civic aspect, but 'contribution' best balances both.
- source_word: הַזֹּאת
  chosen: this
  lexicon: HALOT
  rationale: Straightforward demonstrative referring to the specified contribution
    just described in the preceding context.
- source_word: לַנָּשִׂיא
  chosen: to the prince
  alternatives:
  - for the prince
  - to the leader
  - to the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel commonly denotes the designated civic ruler/prince,
    not necessarily a king. 'Prince' preserves Ezekiel's terminology and avoids overtranslating
    as 'king' or flattening to 'leader.' The preposition ל here is naturally rendered
    'to' in English with the sense of provision for his use/responsibility.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - of Israel
  - within Israel
  lexicon: HALOT
  rationale: The preposition ב is best retained as 'in' rather than converted to the
    more idiomatic but less literal 'of.' This yields 'the prince in Israel,' identifying
    his sphere/location. 'Of Israel' is possible in English, but 'in Israel' more
    closely reflects the Hebrew wording.
