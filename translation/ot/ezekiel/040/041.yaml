id: EZK.40.41
reference: Ezekiel 40:41
source:
  edition: WLC
  text: אַרְבָּעָ֨ה שֻׁלְחָנ֜וֹת מִ/פֹּ֗ה וְ/אַרְבָּעָ֧ה שֻׁלְחָנ֛וֹת מִ/פֹּ֖ה לְ/כֶ֣תֶף
    הַ/שָּׁ֑עַר שְׁמוֹנָ֥ה שֻׁלְחָנ֖וֹת אֲלֵי/הֶ֥ם יִשְׁחָֽטוּ׃
translation:
  text: Four tables on this side and four tables on that side, by the side of the
    gate—eight tables; on them they would slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on one side and on the other side.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “at the shoulder of the gate,” an idiom for the side or flank
      of the gate structure.
    reason: cultural_note
  - marker: c
    text: Or “they shall slaughter”; the Hebrew imperfect may describe either future
      action or the intended/customary use of the tables.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְבָּעָה
  chosen: Four
  lexicon: HALOT
  rationale: Straightforward cardinal number introducing the first group of tables.
- source_word: שֻׁלְחָנוֹת
  chosen: tables
  alternatives:
  - tables for slaughter
  - slaughter tables
  lexicon: HALOT
  rationale: The noun itself means 'tables'; their function is supplied by the following
    clause ('on them they would slaughter'), so the main text keeps the simple gloss
    rather than importing function into the noun.
- source_word: מִפֹּה ... מִפֹּה
  chosen: on this side ... on that side
  alternatives:
  - here ... there
  - on one side ... on the other side
  lexicon: HALOT
  rationale: The paired deictic expressions indicate opposite sides. 'On this side
    ... on that side' is natural English and preserves the spatial contrast.
- source_word: לְכֶתֶף הַשָּׁעַר
  chosen: by the side of the gate
  alternatives:
  - at the shoulder of the gate
  - beside the gate
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder' but in architectural/spatial contexts
    refers to a side or flank. 'By the side of the gate' communicates the idiom clearly
    in modern English.
- source_word: שְׁמוֹנָה
  chosen: eight
  lexicon: HALOT
  rationale: Summative cardinal number totaling the two groups of four.
- source_word: אֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  - at them
  lexicon: HALOT
  rationale: The preposition with pronoun most naturally indicates the surface/location
    of the slaughtering activity with reference to the tables.
- source_word: יִשְׁחָטוּ
  chosen: they would slaughter
  alternatives:
  - they slaughtered
  - they shall slaughter
  - one would slaughter
  lexicon: HALOT
  rationale: The imperfect here describes customary or designated function within
    the visionary temple instructions rather than a single past event. 'They would
    slaughter' captures this functional/imperfective sense in English without overcommitting
    to strict futurity.
