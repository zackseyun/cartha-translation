id: EZK.40.9
reference: Ezekiel 40:9
source:
  edition: WLC
  text: וַ/יָּ֜מָד אֶת אֻלָ֤ם הַ/שַּׁ֨עַר֙ שְׁמֹנֶ֣ה אַמּ֔וֹת ו/איל/ו שְׁתַּ֣יִם אַמּ֑וֹת
    וְ/אֻלָ֥ם הַ/שַּׁ֖עַר מֵ/הַ/בָּֽיִת־׃
translation:
  text: 'Then he measured the portico of the gate: eight cubits, and its side pillars
    two cubits; and the portico of the gate was toward the temple.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its jambs,' 'its pilasters,' or 'its posts' for the architectural term
      rendered 'side pillars.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house'; in this temple vision, the term refers to the temple
      building.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  lexicon: HALOT
  rationale: Wayyiqtol of מדד introduces the next action in the vision sequence. 'Then'
    conveys the narrative progression naturally in English without losing the simple
    past sense.
- source_word: אֻלָם
  chosen: portico
  alternatives:
  - vestibule
  - porch
  lexicon: HALOT
  rationale: אֻלָם denotes an entrance hall/porch-like architectural feature. 'Portico'
    is clear modern English and fits temple-gate architecture better than the more
    archaic 'porch' or the less vivid 'vestibule'.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the gateway
  lexicon: HALOT
  rationale: שער is the gate structure being measured. 'Gate' is the most direct rendering;
    'gateway' is possible but less consistent with the repeated architectural terminology
    in this passage.
- source_word: שְׁמֹנֶה אַמּוֹת
  chosen: eight cubits
  lexicon: HALOT
  rationale: Straightforward measurement phrase. 'Cubits' preserves the ancient unit
    rather than converting it, which is preferable in a temple-measurement context.
- source_word: וְאֵילוֹ
  chosen: and its side pillars
  alternatives:
  - and its jambs
  - and its pilasters
  - and its posts
  lexicon: HALOT
  rationale: אֵיל can refer to projecting structural supports of a doorway/gate. In
    this architectural context, 'side pillars' communicates the likely referent clearly.
    Because the exact architectural equivalent is debated, alternatives are preserved
    in a footnote.
- source_word: שְׁתַּיִם אַמּוֹת
  chosen: two cubits
  lexicon: HALOT
  rationale: Straightforward measurement of the preceding architectural element.
- source_word: וְאֻלָם הַשַּׁעַר
  chosen: and the portico of the gate
  alternatives:
  - and the gate's portico
  lexicon: HALOT
  rationale: Repeated phrase retained with similar English wording for consistency
    and readability.
- source_word: מֵהַבָּיִת
  chosen: was toward the temple
  alternatives:
  - was on the inner side
  - faced the house
  - was from the house side
  lexicon: HALOT
  rationale: בית here refers to the temple building/house, not a generic house. In
    the spatial description of Ezekiel's temple, the phrase indicates orientation
    toward the temple interior. 'Was toward the temple' expresses the directional
    sense idiomatically in English while preserving the architectural relationship.
