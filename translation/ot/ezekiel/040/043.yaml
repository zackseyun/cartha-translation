id: EZK.40.43
reference: Ezekiel 40:43
source:
  edition: WLC
  text: וְ/הַֽ/שְׁפַתַּ֗יִם טֹ֧פַח אֶחָ֛ד מוּכָנִ֥ים בַּ/בַּ֖יִת סָבִ֣יב סָבִ֑יב וְ/אֶל
    הַ/שֻּׁלְחָנ֖וֹת בְּשַׂ֥ר הַ/קָּרְבָֽן׀־׃
translation:
  text: And hooks, a handbreadth long, were fastened all around inside the house,
    and on the tables was the flesh of the offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term translated 'hooks' is uncertain; it may also mean 'ledges'
      or another fixture associated with the slaughtering area.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁפַתַּיִם
  chosen: hooks
  alternatives:
  - ledges
  - double hooks
  - hearthstones
  lexicon: HALOT, BDB
  rationale: The noun is rare and difficult. In this temple-slaughter context, many
    understand it as hooks or pegs used for hanging sacrificial meat or utensils.
    This best fits the immediate mention of tables and sacrificial flesh. Because
    the term is uncertain, alternatives are preserved in a footnote.
- source_word: טֹפַח אֶחָד
  chosen: a handbreadth long
  alternatives:
  - one handbreadth
  lexicon: HALOT, BDB
  rationale: טֹפַח is a handbreadth, a small unit of measure. In English, 'a handbreadth
    long' makes the measurement idiomatic while preserving the concrete sense.
- source_word: מוּכָנִים
  chosen: were fastened
  alternatives:
  - were prepared
  - were fixed
  - were set
  lexicon: HALOT, BDB
  rationale: From כון in the passive/participle sense, indicating something established
    or fixed in place. 'Were fastened' suits the likely referent 'hooks' better than
    the more general 'prepared.'
- source_word: בַּבַּיִת
  chosen: inside the house
  alternatives:
  - in the house
  - in the temple building
  lexicon: HALOT, BDB
  rationale: בַּיִת here refers to the building/house in the temple complex. 'Inside
    the house' clarifies spatially without over-specifying beyond the Hebrew.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT, BDB
  rationale: The doubled form intensifies the circumferential sense. 'All around'
    is natural modern English and preserves the repetition's force.
- source_word: וְאֶל הַשֻּׁלְחָנוֹת
  chosen: and on the tables
  alternatives:
  - and by the tables
  - and toward the tables
  lexicon: HALOT, BDB
  rationale: Although אֶל often means 'to/toward,' in this compressed descriptive
    context it likely indicates relation/location with the following clause. 'On the
    tables' gives the most coherent sense in English with the nominal clause that
    follows.
- source_word: בְּשַׂר הַקָּרְבָן
  chosen: the flesh of the offering
  alternatives:
  - the meat of the offering
  - the flesh of the قربן/sacrifice
  - the sacrificial meat
  lexicon: HALOT, BDB
  rationale: בָּשָׂר is literally 'flesh,' and קָרְבָּן is an offering brought near,
    here sacrificial. 'The flesh of the offering' preserves the cultic register without
    unnecessary jargon.
