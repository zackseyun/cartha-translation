id: EZK.40.5
reference: Ezekiel 40:5
source:
  edition: WLC
  text: וְ/הִנֵּ֥ה חוֹמָ֛ה מִ/ח֥וּץ לַ/בַּ֖יִת סָבִ֣יב סָבִ֑יב וּ/בְ/יַ֨ד הָ/אִ֜ישׁ
    קְנֵ֣ה הַ/מִּדָּ֗ה שֵׁשׁ אַמּ֤וֹת בָּֽ/אַמָּה֙ וָ/טֹ֔פַח וַ/יָּ֜מָד אֶת רֹ֤חַב
    הַ/בִּנְיָן֙ קָנֶ֣ה אֶחָ֔ד וְ/קוֹמָ֖ה קָנֶ֥ה אֶחָֽד׀־־׃
translation:
  text: 'And behold, there was a wall outside the house, all around, and in the hand
    of the man was a measuring reed of six cubits, each cubit being a cubit and a
    handbreadth. And he measured the width of the structure: one reed, and the height:
    one reed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''six cubits by the cubit and a handbreadth,'' that is, using a
      long cubit of a regular cubit plus a handbreadth.'
    reason: cultural_note
  - marker: b
    text: Or 'the width of the building.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the deictic, visionary force that introduces a new sight in prophetic
    narrative. 'Behold' is slightly formal but still readable and preserves the text's
    attention-directing function better than omitting it.
- source_word: חוֹמָה
  chosen: wall
  alternatives:
  - fortification wall
  lexicon: HALOT
  rationale: Standard rendering for a substantial wall. No need to over-specify as
    defensive fortification here; the context is architectural description.
- source_word: מִחוּץ לַבַּיִת
  chosen: outside the house
  alternatives:
  - on the outside of the temple
  - outside the building
  lexicon: HALOT
  rationale: Literally 'outside the house.' In Ezekiel's temple vision, 'house' can
    refer to the temple complex/house, but 'house' is preserved to stay close to the
    Hebrew while remaining intelligible.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - all around on every side
  lexicon: HALOT
  rationale: The doubled term intensifies the encircling sense. 'All around' captures
    the repetition idiomatically without awkward duplication in English.
- source_word: וּבְיַד הָאִישׁ
  chosen: in the hand of the man
  alternatives:
  - the man had in his hand
  - in the man's hand
  lexicon: HALOT
  rationale: Keeps the concrete Hebrew expression and maintains continuity with the
    previously introduced visionary guide as 'the man.'
- source_word: קְנֵה הַמִּדָּה
  chosen: a measuring reed
  alternatives:
  - a measuring rod
  - the measuring reed
  lexicon: HALOT
  rationale: קנה is a reed used as a measuring implement. 'Measuring reed' is more
    specific to the ancient object than the more generic 'rod,' while still natural
    English.
- source_word: שֵׁשׁ אַמּוֹת
  chosen: of six cubits
  alternatives:
  - six cubits long
  lexicon: HALOT
  rationale: Expresses the reed's length straightforwardly. 'Cubits' preserves the
    ancient unit rather than converting it.
- source_word: בָּאַמָּה וָטֹפַח
  chosen: each cubit being a cubit and a handbreadth
  alternatives:
  - by the cubit and a handbreadth
  - with each cubit equal to a cubit and a handbreadth
  lexicon: HALOT
  rationale: 'This phrase explains the standard used: a long cubit consisting of a
    regular cubit plus a handbreadth. The chosen wording makes the measurement basis
    explicit for modern readers while staying close to the Hebrew sense.'
- source_word: וַיָּמָד
  chosen: And he measured
  alternatives:
  - Then he measured
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol rendered with past tense. 'And' preserves
    the sequential flow.
- source_word: רֹחַב הַבִּנְיָן
  chosen: the width of the structure
  alternatives:
  - the breadth of the building
  - the width of the building
  lexicon: HALOT
  rationale: בִּנְיָן is a built structure/building. 'Structure' avoids possible confusion
    with the earlier 'house' while fitting the architectural context.
- source_word: קָנֶה אֶחָד
  chosen: one reed
  alternatives:
  - a reed
  lexicon: HALOT
  rationale: Preserves the measured result in the same unit just introduced.
- source_word: וְקוֹמָה
  chosen: and the height
  alternatives:
  - and its height
  - and the elevation
  lexicon: HALOT
  rationale: קוֹמָה here denotes vertical extent. 'Height' is the natural architectural
    equivalent.
