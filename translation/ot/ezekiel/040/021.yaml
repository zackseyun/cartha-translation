id: EZK.40.21
reference: Ezekiel 40:21
source:
  edition: WLC
  text: ו/תא/ו שְׁלוֹשָׁ֤ה מִ/פּוֹ֙ וּ/שְׁלֹשָׁ֣ה מִ/פּ֔וֹ ו/איל/ו ו/אלמ/ו הָיָ֔ה
    כְּ/מִדַּ֖ת הַ/שַּׁ֣עַר הָ/רִאשׁ֑וֹן חֲמִשִּׁ֤ים אַמָּה֙ אָרְכּ֔/וֹ וְ/רֹ֕חַב
    חָמֵ֥שׁ וְ/עֶשְׂרִ֖ים בָּ/אַמָּֽה׃
translation:
  text: 'Its guardrooms were three on this side and three on that side, and its side
    pillars and its portico had the same measurements as the first gate: its length
    was fifty cubits, and the width twenty-five cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jambs' or 'pilasters' for 'side pillars'; the Hebrew architectural term
      is somewhat uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'vestibule' or 'porch' for 'portico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּא
  chosen: guardrooms
  alternatives:
  - alcoves
  - side rooms
  - cells
  lexicon: HALOT
  rationale: In Ezekiel 40 the term refers to the small chambers built into the gate
    structure. 'Guardrooms' best fits the architectural and functional context in
    modern English better than the less clear 'little chambers' or the overly generic
    'rooms'.
- source_word: שְׁלוֹשָׁה מִפּוֹ ... וּשְׁלוֹשָׁה מִפּוֹ
  chosen: three on this side and three on that side
  alternatives:
  - three here and three there
  - three on one side and three on the other
  lexicon: HALOT
  rationale: The distributive phrasing indicates symmetrical placement on opposite
    sides of the gateway. 'This side ... that side' preserves the spatial sense naturally.
- source_word: אֵיל
  chosen: side pillars
  alternatives:
  - jambs
  - pilasters
  - posts
  lexicon: HALOT
  rationale: In Ezekiel's temple vision this architectural term likely denotes projecting
    structural supports associated with the gate. 'Side pillars' is understandable
    modern English and avoids the technical uncertainty of 'jambs' while still signaling
    a structural element.
- source_word: אֵלַם
  chosen: portico
  alternatives:
  - vestibule
  - porch
  lexicon: HALOT
  rationale: The term denotes the porch-like entrance area of the gate complex. 'Portico'
    is a clear architectural equivalent in contemporary English; 'vestibule' is possible
    but can sound interior rather than entrance-facing.
- source_word: הָיָה כְּמִדַּת הַשַּׁעַר הָרִאשׁוֹן
  chosen: had the same measurements as the first gate
  alternatives:
  - was according to the measurements of the first gate
  - was like the measure of the first gate
  lexicon: HALOT
  rationale: This clause compares the dimensions of this gate structure with the previously
    described gate. 'Had the same measurements as' communicates the comparative force
    idiomatically without losing precision.
- source_word: הַשַּׁעַר הָרִאשׁוֹן
  chosen: the first gate
  alternatives:
  - the former gate
  - the earlier gate
  lexicon: HALOT
  rationale: The adjective marks sequence in the description, referring back to the
    gate first measured in the vision. 'First gate' is the most straightforward rendering.
- source_word: חֲמִשִּׁים אַמָּה אָרְכּוֹ
  chosen: its length was fifty cubits
  alternatives:
  - it was fifty cubits long
  lexicon: HALOT
  rationale: This preserves the explicit noun 'length' while remaining natural in
    English.
- source_word: וְרֹחַב חָמֵשׁ וְעֶשְׂרִים בָּאַמָּה
  chosen: and the width twenty-five cubits
  alternatives:
  - and twenty-five cubits wide
  - and its width was twenty-five cubits
  lexicon: HALOT
  rationale: The Hebrew gives the corresponding width measurement. The chosen wording
    is concise and parallel to the previous clause.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits (about 18 inches each)
  lexicon: HALOT
  rationale: The standard biblical unit should be retained rather than converted,
    since the vision's measurements are given in cubits throughout the passage.
