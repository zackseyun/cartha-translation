id: EZK.40.31
reference: Ezekiel 40:31
source:
  edition: WLC
  text: וְ/אֵלַמָּ֗/ו אֶל חָצֵר֙ הַ/חִ֣צוֹנָ֔ה וְ/תִמֹרִ֖ים אֶל איל/ו וּ/מַעֲל֥וֹת
    שְׁמוֹנֶ֖ה מעל/ו־־׃
translation:
  text: Its portico faced the outer court, and palm trees were on its jambs, and eight
    steps went up to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its vestibule ... its pilasters'; the Hebrew architectural terms in
      Ezekiel 40 are specialized and sometimes rendered differently in English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלַמּוֹ
  chosen: its portico
  alternatives:
  - its vestibule
  - its porch
  lexicon: HALOT
  rationale: אֵלָם in Ezekiel’s temple vision denotes the projecting entrance structure
    of a gate/building. 'Portico' is natural modern English and suitably architectural;
    'vestibule' can suggest an interior space, and 'porch' may sound too domestic.
- source_word: אֶל חָצֵר הַחִיצוֹנָה
  chosen: faced the outer court
  alternatives:
  - was toward the outer court
  - was to the outer court
  lexicon: HALOT
  rationale: With the nominal clause and directional אֶל, the sense is orientation
    toward the outer court. 'Faced' expresses this clearly in idiomatic English without
    adding meaning.
- source_word: תִמֹרִים
  chosen: palm trees
  alternatives:
  - palm-tree decorations
  - palms
  lexicon: HALOT
  rationale: The plural noun refers to palm-tree forms/decorations in temple architecture.
    'Palm trees' is the straightforward rendering; the decorative sense is inferable
    from the architectural context.
- source_word: אֵילָו
  chosen: its jambs
  alternatives:
  - its pilasters
  - its posts
  lexicon: HALOT
  rationale: In Ezekiel 40 this term refers to the structural side elements of gateways/openings.
    'Jambs' fits doorway architecture well. 'Pilasters' is possible but more technical;
    'posts' is broader and less precise.
- source_word: מַעֲלוֹת שְׁמוֹנֶה
  chosen: eight steps
  alternatives:
  - eight stairways
  - eight ascents
  lexicon: HALOT
  rationale: The phrase denotes a flight/number of steps. 'Eight steps' is the most
    idiomatic and contextually precise rendering in English.
- source_word: מַעֲלוֹ
  chosen: went up to it
  alternatives:
  - its ascent was by them
  - one went up by it
  lexicon: HALOT
  rationale: The singular noun with suffix refers to the ascent/access belonging to
    the gate structure. In context, English expresses the idea most naturally as 'went
    up to it,' indicating approach by the eight steps.
