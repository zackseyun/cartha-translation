id: EZK.40.18
reference: Ezekiel 40:18
source:
  edition: WLC
  text: וְ/הָ/רִֽצְפָה֙ אֶל כֶּ֣תֶף הַ/שְּׁעָרִ֔ים לְ/עֻמַּ֖ת אֹ֣רֶךְ הַ/שְּׁעָרִ֑ים
    הָ/רִֽצְפָ֖ה הַ/תַּחְתּוֹנָֽה־׃
translation:
  text: And the pavement was beside the side of the gates, corresponding to the length
    of the gates—the lower pavement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite the length of the gates'; the Hebrew לְעֻמַּת can denote spatial
      correspondence or position opposite something.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִצְפָה
  chosen: the pavement
  alternatives:
  - the paved area
  - the flooring
  lexicon: HALOT
  rationale: רִצְפָה denotes a paved surface or pavement. 'Pavement' is the most natural
    architectural term in English and fits the temple-vision context.
- source_word: אֶל
  chosen: beside
  alternatives:
  - by
  - toward
  - at
  lexicon: HALOT
  rationale: With כֶּתֶף in this spatial description, אֶל conveys adjacency rather
    than motion. 'Beside' communicates location clearly in English.
- source_word: כֶּתֶף
  chosen: the side
  alternatives:
  - the shoulder
  - the flank
  lexicon: HALOT
  rationale: Literally 'shoulder,' but in architectural/topographical usage it refers
    to a side or flank. 'Side' is the clearest idiomatic rendering here.
- source_word: הַשְּׁעָרִים
  chosen: the gates
  alternatives:
  - the gate structures
  - the gateways
  lexicon: HALOT
  rationale: Plural noun referring to the gate complexes in the visionary temple precinct.
    'Gates' is sufficiently clear and preserves the Hebrew number.
- source_word: לְעֻמַּת
  chosen: corresponding to
  alternatives:
  - opposite
  - alongside
  - matching
  lexicon: HALOT
  rationale: The term indicates correspondence or alignment in relation to the gates'
    length. 'Corresponding to' best captures the measured architectural relationship.
- source_word: אֹרֶךְ
  chosen: the length
  alternatives:
  - the full length
  lexicon: HALOT
  rationale: Standard rendering of the measurement term in this temple-description
    context.
- source_word: הָרִצְפָה הַתַּחְתּוֹנָה
  chosen: the lower pavement
  alternatives:
  - the pavement below
  - the lower paved area
  lexicon: HALOT
  rationale: The adjective תַּחְתּוֹנָה distinguishes this pavement from another higher
    or inner pavement in the larger architectural description. 'Lower pavement' is
    concise and natural.
