id: EZK.40.28
reference: Ezekiel 40:28
source:
  edition: WLC
  text: וַ/יְבִיאֵ֛/נִי אֶל חָצֵ֥ר הַ/פְּנִימִ֖י בְּ/שַׁ֣עַר הַ/דָּר֑וֹם וַ/יָּ֨מָד֙
    אֶת הַ/שַּׁ֣עַר הַ/דָּר֔וֹם כַּ/מִּדּ֖וֹת הָ/אֵֽלֶּה־־׃
translation:
  text: Then he brought me into the inner court by way of the south gate, and he measured
    the south gate according to these measurements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the south gate.' The Hebrew preposition can indicate entry by
      means of the gate.
    reason: lexical_alternative
  - marker: b
    text: That is, the gate had the same measurements as those previously described.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  chosen: Then he brought me
  alternatives:
  - And he brought me
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in the Hiphil means 'bring.' English 'Then' captures
    the narrative progression naturally, though 'And' is also possible.
- source_word: חָצֵר הַפְּנִימִי
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: חָצֵר is commonly 'court/courtyard.' 'Inner court' is standard and fits
    Ezekiel's temple-vision architectural terminology.
- source_word: בְּשַׁעַר הַדָּרוֹם
  chosen: by way of the south gate
  alternatives:
  - through the south gate
  - at the south gate
  lexicon: HALOT
  rationale: The preposition ב with 'gate' here most naturally indicates the route
    or means of entry into the inner court. 'By way of' is idiomatic English that
    preserves this sense without overcommitting beyond the Hebrew.
- source_word: וַיָּמָד
  chosen: and he measured
  alternatives:
  - then he measured
  lexicon: HALOT
  rationale: Qal wayyiqtol of מדד, straightforwardly 'measure.' The repeated measuring
    is a key motif in the vision and should remain explicit.
- source_word: אֶת הַשַּׁעַר הַדָּרוֹם
  chosen: the south gate
  alternatives:
  - that south gate
  lexicon: HALOT
  rationale: Direct object of the measuring verb; the definite phrase refers to the
    gate just mentioned.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  chosen: according to these measurements
  alternatives:
  - with these measurements
  - like these measurements
  - according to these dimensions
  lexicon: HALOT
  rationale: כְּ with מִדּוֹת expresses correspondence to a previously established
    set of dimensions. 'According to these measurements' best conveys that the gate
    matched the measurements already described in the surrounding context.
