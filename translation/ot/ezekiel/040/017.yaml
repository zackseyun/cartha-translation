id: EZK.40.17
reference: Ezekiel 40:17
source:
  edition: WLC
  text: וַ/יְבִיאֵ֗/נִי אֶל הֶֽ/חָצֵר֙ הַ/חִ֣יצוֹנָ֔ה וְ/הִנֵּ֤ה לְשָׁכוֹת֙ וְ/רִֽצְפָ֔ה
    עָשׂ֥וּי לֶ/חָצֵ֖ר סָבִ֣יב סָבִ֑יב שְׁלֹשִׁ֥ים לְשָׁכ֖וֹת אֶל הָ/רִֽצְפָֽה־׀־׃
translation:
  text: Then he brought me into the outer court, and behold, there were chambers and
    a pavement made for the court all around, all around; thirty chambers faced the
    pavement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were by the pavement' or 'were toward the pavement.' The Hebrew says
      literally 'thirty chambers to the pavement,' indicating their relation to the
      paved area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  chosen: Then he brought me
  alternatives:
  - And he brought me
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative sequence; 'Then' captures the forward movement
    of the vision naturally in English while preserving the agent's action toward
    Ezekiel.
- source_word: הֶחָצֵר הַחִיצוֹנָה
  chosen: the outer court
  alternatives:
  - the outer courtyard
  - the exterior court
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard'; 'outer court' is the standard architectural
    sense in this temple vision and is concise modern English.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה marks visual attention in prophetic description. 'Behold' preserves
    the deictic force and fits the elevated register of the vision account.
- source_word: לְשָׁכוֹת
  chosen: chambers
  alternatives:
  - rooms
  - cells
  lexicon: HALOT
  rationale: לשכה in temple/building contexts denotes chambers or rooms set aside
    for use. 'Chambers' best matches the architectural and cultic setting.
- source_word: וְרִצְפָה
  chosen: and a pavement
  alternatives:
  - and paving
  - and a paved area
  lexicon: HALOT
  rationale: רִצְפָה denotes a paved surface or pavement. The noun 'pavement' is the
    most direct rendering here.
- source_word: עָשׂוּי לֶחָצֵר
  chosen: made for the court
  alternatives:
  - laid in the court
  - constructed for the court
  - made in the court
  lexicon: HALOT
  rationale: The passive participle עָשׂוּי with ל marks something made/prepared for
    the court area. 'Made for the court' preserves the syntax without overinterpreting
    the exact construction method.
- source_word: סָבִיב סָבִיב
  chosen: all around, all around
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: The repetition is emphatic and spatially descriptive. Retaining both
    occurrences reflects the Hebrew intensification rather than smoothing it away.
- source_word: שְׁלֹשִׁים לְשָׁכוֹת
  chosen: thirty chambers
  alternatives:
  - thirty rooms
  lexicon: HALOT
  rationale: Straightforward numeral plus noun; 'chambers' maintains consistency with
    the earlier occurrence of לשכות in the verse.
- source_word: אֶל הָרִצְפָה
  chosen: faced the pavement
  alternatives:
  - were by the pavement
  - were toward the pavement
  - were on the pavement
  lexicon: HALOT
  rationale: 'The preposition אֶל here is best understood relationally in the architectural
    description: the chambers were oriented toward or along the pavement. ''Faced
    the pavement'' gives clear English sense without implying they stood on top of
    it.'
