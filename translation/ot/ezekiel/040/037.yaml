id: EZK.40.37
reference: Ezekiel 40:37
source:
  edition: WLC
  text: ו/איל/ו לֶֽ/חָצֵר֙ הַ/חִ֣יצוֹנָ֔ה וְ/תִמֹרִ֥ים אֶל איל/ו מִ/פּ֣וֹ וּ/מִ/פּ֑וֹ
    וּ/שְׁמֹנֶ֥ה מַעֲל֖וֹת מעל/ו־׃
translation:
  text: Its portico faced the outer court, and palm trees were on its jambs, on this
    side and on that side; and eight steps went up to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'palm-tree decorations were on its pilasters.' The Hebrew names palm
      trees explicitly, but in this architectural context the reference may be to
      carved palm motifs rather than literal trees.
    reason: lexical_alternative
  - marker: b
    text: Or 'its vestibule/porch was toward the outer court.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵילָו/אֵילָיו
  chosen: its portico
  alternatives:
  - its vestibule
  - its porch
  lexicon: HALOT
  rationale: In Ezekiel 40 this architectural term refers to the projecting entrance
    structure of the gate. 'Portico' is natural modern English and fits the repeated
    gate-description formula better than the more domestic-sounding 'porch.' The pronominal
    suffix is rendered 'its.'
- source_word: לֶחָצֵר הַחִיצוֹנָה
  chosen: faced the outer court
  alternatives:
  - was toward the outer court
  - was to the outer court
  lexicon: HALOT
  rationale: The preposition ל with the architectural noun indicates orientation.
    English idiom prefers an explicit verb of orientation; 'faced' conveys the sense
    clearly without over-paraphrase.
- source_word: תִמֹרִים
  chosen: palm trees
  alternatives:
  - palm-tree decorations
  - palms
  lexicon: HALOT
  rationale: The plural noun literally denotes palm trees; in this temple-architecture
    context it likely refers to palm-tree carvings or motifs, but the Hebrew leaves
    that implicit. 'Palm trees' preserves the lexical form while remaining understandable.
- source_word: אֶל אֵילָיו
  chosen: on its jambs
  alternatives:
  - against its portico
  - on its pilasters
  lexicon: HALOT
  rationale: Here אֵילָיו is best understood as the gate's side-posts/jambs rather
    than a second mention of the whole portico. The phrase with אֶל marks placement
    upon or against these architectural members. 'Jambs' is concise and fits the repeated
    description of palms attached to the gate structure.
- source_word: מִפּוֹ וּמִפּוֹ
  chosen: on this side and on that side
  alternatives:
  - on either side
  - here and there
  lexicon: HALOT
  rationale: This distributive pair indicates symmetry on both sides. The fuller rendering
    preserves the repetitive Hebrew style better than the compressed 'on either side,'
    while remaining readable.
- source_word: שְׁמֹנֶה מַעֲלוֹת
  chosen: eight steps
  alternatives:
  - eight stair-steps
  - eight ascents
  lexicon: HALOT
  rationale: The phrase denotes the number of steps leading upward. 'Eight steps'
    is the plain architectural sense in English.
- source_word: מַעֲלוֹ
  chosen: went up to it
  alternatives:
  - was its ascent
  - led up to it
  lexicon: HALOT
  rationale: The singular noun with suffix refers to the ascent belonging to the structure.
    In idiomatic English, expressing the function of the steps as 'went up to it'
    communicates the sense clearly. 'Led up to it' is possible, but 'went up to it'
    stays closer to the ascent imagery.
