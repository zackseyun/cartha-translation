theological_decisions:
- issue: Implicit subject of the visionary transport verbs
  chosen_reading: Render the subject as 'he' rather than explicitly 'God'
  alternative_readings:
  - God brought me ... and set me down ...
  rationale: The Hebrew verbs are third masculine singular with the subject understood
    from context. Using 'he' preserves the textual economy and avoids adding explicit
    wording not present in the verse, while the opening phrase already frames the
    action as divine.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
