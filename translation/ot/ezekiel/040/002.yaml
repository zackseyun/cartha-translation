id: EZK.40.2
reference: Ezekiel 40:2
source:
  edition: WLC
  text: בְּ/מַרְא֣וֹת אֱלֹהִ֔ים הֱבִיאַ֖/נִי אֶל אֶ֣רֶץ יִשְׂרָאֵ֑ל וַ/יְנִיחֵ֗/נִי
    אֶל הַ֤ר גָּבֹ֨הַּ֙ מְאֹ֔ד וְ/עָלָ֥י/ו כְּ/מִבְנֵה עִ֖יר מִ/נֶּֽגֶב־־־׃
translation:
  text: In visions of God he brought me into the land of Israel and set me down on
    a very high mountain; on it, toward the south, was something like the structure
    of a city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in divine visions' or 'in visions from God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'toward the south'; the Hebrew may indicate southern orientation rather
      than source.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמַרְאוֹת אֱלֹהִים
  chosen: In visions of God
  alternatives:
  - In divine visions
  - In visions from God
  lexicon: HALOT
  rationale: The plural מַרְאוֹת with בְּ is best rendered instrumentally/locatively
    as 'in visions.' אֱלֹהִים here qualifies the visions as divine rather than functioning
    as a simple possessive only; 'visions of God' preserves the Hebrew wording while
    allowing the idiomatic sense 'divine visions.'
- source_word: הֱבִיאַנִי
  chosen: he brought me
  alternatives:
  - he caused me to come
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring.' The subject is implicit from context
    and naturally rendered 'he,' referring to God without over-specifying beyond the
    Hebrew form.
- source_word: אֶל אֶרֶץ יִשְׂרָאֵל
  chosen: into the land of Israel
  alternatives:
  - to the land of Israel
  lexicon: HALOT
  rationale: With הֱבִיא and אֶל, English 'into' better conveys movement into the
    land rather than mere direction toward it.
- source_word: וַיְנִיחֵנִי
  chosen: and set me down
  alternatives:
  - and placed me
  - and caused me to rest
  lexicon: HALOT
  rationale: The verb נוח in Hiphil can mean 'set down, place, deposit.' In this visionary
    transport context, 'set me down' is vivid and natural, avoiding the misleading
    sense of giving rest.
- source_word: אֶל הַר גָּבֹהַּ מְאֹד
  chosen: on a very high mountain
  alternatives:
  - upon a very high mountain
  - to a very high mountain
  lexicon: HALOT
  rationale: After a placement verb, English idiom prefers 'on' for location atop
    a mountain. גָּבֹהַּ מְאֹד is straightforwardly 'very high.'
- source_word: וְעָלָיו
  chosen: on it
  alternatives:
  - and on it
  - upon it
  lexicon: HALOT
  rationale: Refers back to the mountain. English can omit the conjunction's full
    weight after the semicolon while preserving the sense in smooth narrative flow.
- source_word: כְּמִבְנֵה עִיר
  chosen: something like the structure of a city
  alternatives:
  - like a city building
  - like the appearance of a city structure
  - like a city's construction
  lexicon: HALOT
  rationale: מִבְנֶה denotes a structure/building pattern rather than the city itself.
    The prefixed כ marks comparison, so 'something like the structure of a city' preserves
    Ezekiel's cautious visionary description.
- source_word: מִנֶּגֶב
  chosen: toward the south
  alternatives:
  - from the south
  - on the south side
  lexicon: HALOT
  rationale: נֶגֶב here most likely indicates southern orientation relative to the
    prophet's viewpoint on the mountain. 'Toward the south' preserves the directional
    ambiguity better than the more definite 'on the south side,' while avoiding the
    potentially misleading source-direction sense 'from the south.'
