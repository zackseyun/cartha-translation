id: EZK.40.33
reference: Ezekiel 40:33
source:
  edition: WLC
  text: ו/תא/ו ו/אל/ו ו/אלמ/ו כַּ/מִּדּ֣וֹת הָ/אֵ֔לֶּה וְ/חַלּוֹנ֥וֹת ל֛/וֹ ו/ל/אלמ/ו
    סָבִ֣יב סָבִ֑יב אֹ֚רֶךְ חֲמִשִּׁ֣ים אַמָּ֔ה וְ/רֹ֕חַב חָמֵ֥שׁ וְ/עֶשְׂרִ֖ים אַמָּֽה׀׃
translation:
  text: And its guardrooms, its side pillars, and its portico were according to these
    measurements; and it had windows all around, both it and its portico. Its length
    was fifty cubits, and its width twenty-five cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jambs' or 'pilasters' for 'side pillars.' The Hebrew architectural term
      is difficult and may refer to structural gateway members.
    reason: lexical_alternative
  - marker: b
    text: Or 'vestibule' or 'porch' for 'portico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּא
  chosen: guardrooms
  alternatives:
  - alcoves
  - cells
  - chambers
  lexicon: HALOT
  rationale: In Ezekiel 40, תָּא refers to the small rooms associated with the gate
    structure, commonly understood as guard chambers. 'Guardrooms' best fits the architectural
    and functional context without being overly technical.
- source_word: אַיִל
  chosen: side pillars
  alternatives:
  - jambs
  - pilasters
  - posts
  lexicon: HALOT
  rationale: The term in this temple-vision context denotes prominent structural members
    of the gateway. 'Side pillars' is clearer for modern readers than 'jambs' while
    preserving the architectural sense. 'Pilasters' is possible but more technical.
- source_word: אֵילָם
  chosen: portico
  alternatives:
  - vestibule
  - porch
  lexicon: HALOT
  rationale: In temple architecture, אֵילָם commonly denotes a projecting entrance
    structure. 'Portico' is natural modern English and suitably architectural; 'vestibule'
    can suggest an interior space, and 'porch' may sound too domestic.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  chosen: according to these measurements
  alternatives:
  - like these measurements
  - with these dimensions
  lexicon: HALOT
  rationale: The phrase indicates conformity to the dimensions just described. 'According
    to these measurements' is idiomatic and precise in context.
- source_word: חַלּוֹנוֹת
  chosen: windows
  alternatives:
  - openings
  - window openings
  lexicon: HALOT
  rationale: The ordinary sense 'windows' fits the architectural description. Some
    render more cautiously as 'window openings,' but the simpler term is sufficient
    in English.
- source_word: לוֹ וּלְאֵילַמּוֹ
  chosen: both it and its portico
  alternatives:
  - for it and for its portico
  - in it and in its portico
  lexicon: HALOT
  rationale: The lamed preposition here marks possession/location in the architectural
    description. Rendering the phrase as 'both it and its portico' communicates that
    windows belonged to both the gate structure and its portico.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled expression intensifies the idea of surrounding on every side.
    'All around' is natural modern English and preserves the distributive force.
- source_word: אֹרֶךְ חֲמִשִּׁים אַמָּה
  chosen: Its length was fifty cubits
  alternatives:
  - a length of fifty cubits
  lexicon: HALOT
  rationale: This is a straightforward dimensional statement. Supplying 'was' makes
    the English sentence complete and readable.
- source_word: רֹחַב חָמֵשׁ וְעֶשְׂרִים אַמָּה
  chosen: its width twenty-five cubits
  alternatives:
  - a width of twenty-five cubits
  - and the width was twenty-five cubits
  lexicon: HALOT
  rationale: The phrase gives the second dimension. 'Twenty-five cubits' is the standard
    English expression for the compound numeral.
