id: EZK.40.26
reference: Ezekiel 40:26
source:
  edition: WLC
  text: וּ/מַעֲל֤וֹת שִׁבְעָה֙ עלות/ו ו/אלמ/ו לִ/פְנֵי/הֶ֑ם וְ/תִמֹרִ֣ים ל֗/וֹ אֶחָ֥ד
    מִ/פּ֛וֹ וְ/אֶחָ֥ד מִ/פּ֖וֹ אֶל איל/ו־׃
translation:
  text: And its ascent had seven steps, with its vestibule before them; and it had
    palm-tree ornaments, one on this side and one on that side, on its jambs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'porch' for 'vestibule' (Heb. אֵילָם), a traditional rendering in temple-vision
      contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'posts' or 'side pillars' for 'jambs' (Heb. אֵילָו).
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲלוֹת
  chosen: ascent
  alternatives:
  - steps
  - stairway
  lexicon: HALOT
  rationale: The noun refers to the stair approach. Because שִׁבְעָה follows and the
    next word likely relates to going up, rendering the phrase as 'its ascent had
    seven steps' preserves the architectural sense without awkward repetition ('steps
    seven its ascent').
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Straightforward cardinal number modifying the stair approach.
- source_word: עֲלוֹתוֹ
  chosen: its ascent had
  alternatives:
  - its going up was
  - its stairway was
  lexicon: HALOT
  rationale: From עלה in a nominal form with 3ms suffix, referring to the gateway's
    upward approach. In English, folding this into the clause 'its ascent had seven
    steps' is the most natural equivalent.
- source_word: וְאֵילַמּוֹ
  chosen: with its vestibule
  alternatives:
  - and its porch
  - and its portico
  lexicon: HALOT
  rationale: אֵילָם in Ezekiel's temple vision denotes the projecting entrance structure
    of a gate/building. 'Vestibule' is clear modern architectural English and fits
    the temple-gate context better than the more traditional but less precise 'porch'.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: Refers to the vestibule being situated in front of the steps/ascent.
    'Before them' is a natural and sufficiently literal rendering.
- source_word: וְתִמֹרִים
  chosen: palm-tree ornaments
  alternatives:
  - palm trees
  - palm decorations
  lexicon: HALOT
  rationale: In this architectural context the term denotes carved or decorative palm
    motifs rather than literal trees. 'Palm-tree ornaments' makes the implied decorative
    sense explicit for modern readers.
- source_word: לוֹ
  chosen: it had
  alternatives:
  - there were for it
  lexicon: HALOT
  rationale: The dative pronoun indicates possession with respect to the gateway structure.
    English idiom expresses this most naturally as 'it had.'
- source_word: אֶחָד מִפֹּה וְאֶחָד מִפֹּה
  chosen: one on this side and one on that side
  alternatives:
  - one on either side
  - one from here and one from there
  lexicon: HALOT
  rationale: Idiomatic expression indicating symmetry on both sides. The chosen rendering
    preserves the distributive force and spatial imagery.
- source_word: אֵילָו
  chosen: its jambs
  alternatives:
  - its side pillars
  - its posts
  lexicon: HALOT
  rationale: In Ezekiel's architectural descriptions, this term commonly refers to
    the structural side-posts/jambs of the gateway. 'Jambs' is more precise than the
    generic 'posts,' though 'posts' remains a viable alternative.
