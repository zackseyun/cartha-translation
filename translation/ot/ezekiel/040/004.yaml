id: EZK.40.4
reference: Ezekiel 40:4
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר אֵלַ֜/י הָ/אִ֗ישׁ בֶּן אָדָ֡ם רְאֵ֣ה בְ/עֵינֶי/ךָ֩ וּ/בְ/אָזְנֶ֨י/ךָ
    שְּׁמָ֜ע וְ/שִׂ֣ים לִבְּ/ךָ֗ לְ/כֹ֤ל אֲשֶׁר אֲנִי֙ מַרְאֶ֣ה אוֹתָ֔/ךְ כִּ֛י לְמַ֥עַן
    הַרְאוֹתְ/כָ֖ה הֻבָ֣אתָה הֵ֑נָּה הַגֵּ֛ד אֶת כָּל אֲשֶׁר אַתָּ֥ה רֹאֶ֖ה לְ/בֵ֥ית
    יִשְׂרָאֵֽל־־־־־׃
translation:
  text: And the man said to me, “Son of man, see with your eyes, and hear with your
    ears, and set your heart on all that I show you, for you were brought here so
    that I might show it to you. Declare to the house of Israel all that you see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortal' or 'human one' for 'Son of man.' The Hebrew expression is Ezekiel’s
      regular form of address.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: The noun is the ordinary Hebrew word for 'man.' In this vision context
    it refers to the male figure introduced in the preceding verse, so 'the man' is
    the most natural and contextually precise rendering.
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard form of address. A more dynamic rendering
    like 'human one' or 'mortal' captures the sense, but 'Son of man' preserves the
    repeated idiom and its literary continuity in Ezekiel. Here אָדָם is best rendered
    within the fixed expression rather than as a standalone generic term.
- source_word: רְאֵה
  chosen: see
  alternatives:
  - look
  lexicon: HALOT
  rationale: The imperative of ראה here calls for active visual attention. 'See' works
    well with the paired phrase 'with your eyes' and preserves the formal parallelism
    with 'hear with your ears.'
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: The imperative means 'hear/listen.' 'Hear' better matches the Hebrew
    wording and the parallel structure with 'see,' while still conveying attentive
    reception.
- source_word: וְשִׂים לִבְּךָ
  chosen: set your heart
  alternatives:
  - pay attention
  - set your mind
  lexicon: HALOT
  rationale: Literally 'set your heart.' In Hebrew לֵב/לֵבָב often includes thought,
    will, and attention. 'Set your heart' preserves the anthropological imagery and
    seriousness better than flattening it to merely 'pay attention.'
- source_word: לְכֹל אֲשֶׁר אֲנִי מַרְאֶה אוֹתָךְ
  chosen: on all that I show you
  alternatives:
  - to all that I am showing you
  - to everything that I cause you to see
  lexicon: HALOT
  rationale: The Hiphil of ראה means 'show/cause to see.' 'I show you' is idiomatic
    English and adequately represents the causative sense without awkwardness.
- source_word: כִּי לְמַעַן הַרְאוֹתְכָה הֻבָאתָה הֵנָּה
  chosen: for you were brought here so that I might show it to you
  alternatives:
  - for in order to show you, you were brought here
  - because you were brought here for me to show you
  lexicon: HALOT
  rationale: 'The clause expresses purpose: Ezekiel was brought to this place in order
    that the figure might show him these things. ''Here'' renders הֵנָּה naturally.
    The pronoun ''it'' in English gathers the visionary content just mentioned; the
    Hebrew object is implicit in the infinitive construction.'
- source_word: הַגֵּד
  chosen: declare
  alternatives:
  - tell
  - report
  lexicon: HALOT
  rationale: The Hiphil imperative of נגד often means to make known or report. 'Declare'
    fits the prophetic register and the solemn charge better than the more casual
    'tell.'
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - to Israel
  - to the people of Israel
  lexicon: HALOT
  rationale: '''House of Israel'' is a standard prophetic expression and should be
    preserved for consistency and literary texture rather than reduced to a simpler
    paraphrase.'
- source_word: כָּל אֲשֶׁר אַתָּה רֹאֶה
  chosen: all that you see
  alternatives:
  - everything that you are seeing
  lexicon: HALOT
  rationale: This straightforward phrase summarizes the visionary material Ezekiel
    is to report. The simple present 'you see' is idiomatic and sufficient in English.
