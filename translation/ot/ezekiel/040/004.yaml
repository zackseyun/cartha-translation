theological_decisions:
- issue: Rendering of the recurring address בֶּן אָדָם in Ezekiel
  chosen_reading: Son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The phrase is not a christological title here but a prophetic form of
    address to Ezekiel. Retaining 'Son of man' preserves the repeated literary formula
    and avoids over-interpretive paraphrase, while alternatives are acknowledged as
    possible sense renderings.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)'''
