id: EZK.40.14
reference: Ezekiel 40:14
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ אֶת אֵילִ֖ים שִׁשִּׁ֣ים אַמָּ֑ה וְ/אֶל אֵיל֙ הֶֽ/חָצֵ֔ר הַ/שַּׁ֖עַר
    סָבִ֥יב סָבִֽיב־־׀׃
translation:
  text: And he made the jambs sixty cubits, and to the jamb of the court the gate
    extended all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew meaning uncertain in this difficult architectural clause. 'Jambs'
      may also be rendered 'posts' or 'pilasters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'And he made the jambs sixty cubits, up to the jamb of the court, the
      gate all around.' The Hebrew syntax of the second clause is obscure.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: he made
  alternatives:
  - he measured
  - he set
  lexicon: HALOT
  rationale: The verb עשה normally means 'make/do.' In this difficult architectural
    context some versions smooth it to 'measured,' but the Hebrew form itself is the
    common verb 'made,' so the draft preserves that unless context compels otherwise.
- source_word: אֵילִים
  chosen: the jambs
  alternatives:
  - pilasters
  - porch-posts
  - projections
  lexicon: HALOT
  rationale: In Ezekiel 40 this architectural term refers to structural gate elements,
    commonly understood as jambs or projecting posts. 'Jambs' is concise modern English
    and fits the gate-setting better than the less familiar 'posts' or more interpretive
    'pilasters.'
- source_word: שִׁשִּׁים אַמָּה
  chosen: sixty cubits
  alternatives:
  - sixty cubit-lengths
  lexicon: HALOT
  rationale: Standard architectural measurement phrase. 'Cubits' preserves the ancient
    unit rather than converting it.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and as far as
  - and toward
  lexicon: HALOT
  rationale: The preposition אל commonly means 'to/toward/as far as.' Because the
    clause is syntactically difficult, 'and to' keeps the Hebrew linkage without over-resolving
    the construction.
- source_word: אֵיל
  chosen: the jamb
  alternatives:
  - the post
  - the pilaster
  lexicon: HALOT
  rationale: Singular of the same architectural term as earlier in the verse. Rendering
    it consistently as 'jamb' preserves lexical coherence.
- source_word: הֶחָצֵר
  chosen: the court
  alternatives:
  - the courtyard
  lexicon: HALOT
  rationale: Both are possible; 'court' is slightly more formal and suits temple architecture.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the gateway
  lexicon: HALOT
  rationale: '''Gate'' is the straightforward rendering; ''gateway'' is possible but
    not necessary here.'
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled adverb intensifies the sense of surrounding extent. 'All
    around' is natural modern English and reflects the repetition.
