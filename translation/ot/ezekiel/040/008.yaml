id: EZK.40.8
reference: Ezekiel 40:8
source:
  edition: WLC
  text: וַ/יָּ֜מָד אֶת אֻלָ֥ם הַ/שַּׁ֛עַר מֵ/הַ/בַּ֖יִת קָנֶ֥ה אֶחָֽד־׃
translation:
  text: 'Then he measured the vestibule of the gate, from the temple building: one
    rod.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one reed.' The Hebrew term can denote a reed used as a measuring rod.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the house.' In Ezekiel's temple vision, 'the house' often refers
      to the temple building; the exact spatial nuance of 'from' here is difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative sequentially. 'Then' gives natural English
    narrative flow while preserving the simple past sense.
- source_word: אֻלָם
  chosen: vestibule
  alternatives:
  - porch
  - portico
  lexicon: HALOT
  rationale: Refers to an entrance hall/porch-like architectural space. 'Vestibule'
    is precise modern architectural English and fits temple/gate context better than
    the more traditional but potentially less clear 'porch'.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the gateway
  lexicon: HALOT
  rationale: The noun denotes the gate structure. 'Gate' is the most direct rendering;
    the surrounding context already makes clear this is an architectural complex.
- source_word: מֵהַבַּיִת
  chosen: from the temple building
  alternatives:
  - from the house
  - on the inside of the gatehouse
  - toward the house
  lexicon: HALOT
  rationale: בַּיִת in Ezekiel's temple vision commonly refers to the temple building/'house.'
    The prefixed מִן is difficult in context and likely marks orientation or reference
    point. 'From the temple building' preserves the preposition without over-interpreting
    the exact spatial nuance. 'House' would be too vague in English here.
- source_word: קָנֶה אֶחָד
  chosen: one rod
  alternatives:
  - one reed
  lexicon: HALOT
  rationale: In this vision the measuring instrument is a long measuring reed/rod.
    'Rod' communicates function more clearly in contemporary English, while 'reed'
    remains a viable more literal alternative.
