id: EZK.40.44
reference: Ezekiel 40:44
source:
  edition: WLC
  text: וּ/מִ/חוּצָ/ה֩ לַ/שַּׁ֨עַר הַ/פְּנִימִ֜י לִֽשְׁכ֣וֹת שָׁרִ֗ים בֶּ/חָצֵ֤ר הַ/פְּנִימִי֙
    אֲשֶׁ֗ר אֶל כֶּ֨תֶף֙ שַׁ֣עַר הַ/צָּפ֔וֹן וּ/פְנֵי/הֶ֖ם דֶּ֣רֶךְ הַ/דָּר֑וֹם אֶחָ֗ד
    אֶל כֶּ֨תֶף֙ שַׁ֣עַר הַ/קָּדִ֔ים פְּנֵ֖י דֶּ֥רֶךְ הַ/צָּפֹֽן־־׃
translation:
  text: And outside the inner gate were chambers for singers in the inner court, which
    were beside the shoulder of the north gate, with their front toward the south;
    one was beside the shoulder of the east gate, facing toward the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beside the side of the north gate.' The Hebrew uses 'shoulder' metaphorically
      for the side or flank of a structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'beside the side of the east gate.' The Hebrew again uses 'shoulder'
      for the side of the gate structure.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew text of this verse is syntactically compressed, and some translations
      smooth the layout description differently; the sense is that singer-chambers
      stood in the inner court near the north and east gates, with opposite orientations
      southward and northward.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִחוּצָה
  chosen: And outside
  alternatives:
  - Now outside
  - And on the outside
  lexicon: HALOT
  rationale: The compound conjunction + preposition + noun/adverb indicates location
    outside or on the outside. 'And outside' preserves the connective force and spatial
    sense without over-specifying.
- source_word: לַשַּׁעַר הַפְּנִימִי
  chosen: the inner gate
  alternatives:
  - the inward gate
  lexicon: HALOT
  rationale: שַׁעַר is 'gate,' and פְּנִימִי means 'inner/inside.' 'Inner gate' is
    natural modern English and fits the temple-complex spatial description.
- source_word: לִשְׁכוֹת
  chosen: chambers
  alternatives:
  - rooms
  - cells
  lexicon: HALOT
  rationale: In temple architecture לִשְׁכָּה commonly denotes chambers or rooms attached
    to sacred precincts. 'Chambers' best matches the architectural register of Ezekiel
    40.
- source_word: שָׁרִים
  chosen: singers
  alternatives:
  - singing men
  lexicon: HALOT
  rationale: The participial/plural form from שׁיר refers to those who sing. 'Singers'
    is the most idiomatic rendering in context.
- source_word: בֶּחָצֵר הַפְּנִימִי
  chosen: in the inner court
  alternatives:
  - in the inner courtyard
  lexicon: HALOT
  rationale: חָצֵר is court/courtyard. 'Inner court' is the standard architectural
    expression and reads smoothly.
- source_word: אֲשֶׁר אֶל כֶּתֶף שַׁעַר הַצָּפוֹן
  chosen: which were beside the shoulder of the north gate
  alternatives:
  - which were at the side of the north gate
  - which were beside the flank of the north gate
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in architectural/topographical
    usage it denotes a side or flank. I retained 'shoulder' in the main text for auditability
    and because Ezekiel repeatedly uses the term in this vision; the more idiomatic
    'side' is preserved as an alternative.
- source_word: וּפְנֵיהֶם דֶּרֶךְ הַדָּרוֹם
  chosen: with their front toward the south
  alternatives:
  - with their faces toward the south
  - facing south
  lexicon: HALOT
  rationale: פָּנִים in architectural description refers to the front or facing side.
    'With their front toward the south' preserves the concrete spatial orientation.
- source_word: אֶחָד
  chosen: one was
  alternatives:
  - one chamber was
  - one set was
  lexicon: HALOT
  rationale: The singular numeral here introduces the second chamber/unit in contrast
    to the first. English requires a supplied predicate; 'one was' is concise and
    natural.
- source_word: אֶל כֶּתֶף שַׁעַר הַקָּדִים
  chosen: beside the shoulder of the east gate
  alternatives:
  - beside the side of the east gate
  - at the flank of the east gate
  lexicon: HALOT
  rationale: As above, כֶּתֶף is rendered consistently as 'shoulder' in the main text
    to preserve Ezekiel's repeated spatial term, while idiomatic alternatives are
    noted.
- source_word: פְּנֵי דֶּרֶךְ הַצָּפוֹן
  chosen: facing toward the north
  alternatives:
  - with its front toward the north
  - facing north
  lexicon: HALOT
  rationale: This repeats the orientation language with the second chamber. 'Facing
    toward the north' keeps the parallelism with the prior clause.
