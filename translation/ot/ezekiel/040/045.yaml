id: EZK.40.45
reference: Ezekiel 40:45
source:
  edition: WLC
  text: וַ/יְדַבֵּ֖ר אֵלָ֑/י זֹ֣ה הַ/לִּשְׁכָּ֗ה אֲשֶׁ֤ר פָּנֶ֨י/הָ֙ דֶּ֣רֶךְ הַ/דָּר֔וֹם
    לַ/כֹּ֣הֲנִ֔ים שֹׁמְרֵ֖י מִשְׁמֶ֥רֶת הַ/בָּֽיִת׃
translation:
  text: 'Then he spoke to me: “This chamber, whose front faces south, is for the priests
    who keep charge of the temple.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the house.” In this temple-vision context, the Hebrew term commonly
      refers to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אֵלַי
  chosen: Then he spoke to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The wayyiqtol of דבר with אֶל marks narrative progression and direct
    speech introduction. 'Then he spoke to me' is natural modern English while preserving
    the sequential force of the Hebrew.
- source_word: זֹה הַלִּשְׁכָּה
  chosen: This chamber
  alternatives:
  - This room
  - This cell
  lexicon: HALOT
  rationale: לִשְׁכָּה in temple-architecture contexts refers to a chamber/room attached
    to the complex. 'Chamber' fits the formal architectural setting better than the
    more generic 'room'.
- source_word: אֲשֶׁר פָּנֶיהָ דֶּרֶךְ הַדָּרוֹם
  chosen: whose front faces south
  alternatives:
  - which faces south
  - whose face is toward the south
  lexicon: HALOT
  rationale: פָּנִים with a pronominal suffix in spatial description denotes the front
    or facing side. 'Whose front faces south' preserves the concrete architectural
    orientation more closely than a flatter 'which faces south'.
- source_word: דָּרוֹם
  chosen: south
  alternatives:
  - the south side
  lexicon: HALOT
  rationale: The cardinal direction is straightforward here; 'south' is sufficient
    in English.
- source_word: לַכֹּהֲנִים
  chosen: is for the priests
  alternatives:
  - belongs to the priests
  - is assigned to the priests
  lexicon: HALOT
  rationale: The prefixed ל marks purpose or assignment. 'Is for the priests' communicates
    designated use without over-specifying ownership.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  chosen: who keep charge
  alternatives:
  - who keep the duty
  - who are on duty
  - who keep watch
  lexicon: HALOT
  rationale: The participle plus cognate noun expresses the performance of an assigned
    duty or charge. 'Keep charge' preserves the idiomatic temple-service sense better
    than the more military 'keep watch' or the less natural 'keep the duty'.
- source_word: הַבָּיִת
  chosen: the temple
  alternatives:
  - the house
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, 'the house' refers specifically to the temple
    complex/sanctuary. Rendering it as 'the temple' makes the referent clear in contemporary
    English while remaining faithful to context.
