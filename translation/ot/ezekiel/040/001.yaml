id: EZK.40.1
reference: Ezekiel 40:1
source:
  edition: WLC
  text: בְּ/עֶשְׂרִ֣ים וְ/חָמֵ֣שׁ שָׁנָ֣ה לְ֠/גָלוּתֵ/נוּ בְּ/רֹ֨אשׁ הַ/שָּׁנָ֜ה בֶּ/עָשׂ֣וֹר לַ/חֹ֗דֶשׁ בְּ/אַרְבַּ֤ע עֶשְׂרֵה֙ שָׁנָ֔ה אַחַ֕ר אֲשֶׁ֥ר הֻכְּתָ֖ה הָ/עִ֑יר בְּ/עֶ֣צֶם הַ/יּ֣וֹם הַ/זֶּ֗ה הָיְתָ֤ה עָלַ/י֙ יַד יְהוָ֔ה וַ/יָּבֵ֥א אֹתִ֖/י שָֽׁמָּ/ה׀־׃
translation:
  text: In the twenty-fifth year of our exile, at the beginning of the year, on the tenth day of the month, in the fourteenth year after the city had been struck down, on that very day the hand of Yahweh was upon me, and he brought me there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''at the head of the year''; this may refer to the New Year observance, but the phrase is rendered more transparently here as ''at the beginning of the year.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'after the city had fallen' / 'after the city had been captured.' The Hebrew more literally says 'after the city had been struck down.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְגָלוּתֵנוּ
  chosen: of our exile
  alternatives:
  - of our captivity
  lexicon: HALOT
  rationale: גָּלוּת denotes exile/deportation. 'Exile' is more natural modern English and fits the communal first-person suffix 'our' without implying only imprisonment.
- source_word: בְּרֹאשׁ הַשָּׁנָה
  chosen: at the beginning of the year
  alternatives:
  - at the head of the year
  - on New Year's Day
  lexicon: HALOT
  rationale: Literally 'at the head of the year.' Rendered idiomatically as 'at the beginning of the year.' 'On New Year's Day' is possible interpretively, but the Hebrew expression is preserved more transparently in the main text.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: on the tenth day of the month
  alternatives:
  - on the tenth of the month
  lexicon: HALOT
  rationale: The phrase specifies the calendar date. Expanded with 'day' for clear English while remaining close to the Hebrew.
- source_word: הֻכְּתָה
  chosen: had been struck down
  alternatives:
  - had been taken
  - had been smitten
  - had fallen
  lexicon: HALOT
  rationale: Passive of נכה, 'to strike, smite.' For a city, 'struck down' preserves the violent passive sense better than the smoother but less literal 'fell' or the more interpretive 'was captured.'
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the city of Jerusalem
  lexicon: HALOT
  rationale: The Hebrew says simply 'the city.' Since Jerusalem is contextually obvious but not explicit here, the translation keeps the formal reference in the main text.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on that very day
  alternatives:
  - on that same day
  - on the very same day
  lexicon: HALOT
  rationale: This idiom intensifies the exactness of the date. 'On that very day' captures the emphatic force of עֶצֶם in natural English.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the power of the LORD
  - the LORD's hand
  lexicon: HALOT
  rationale: A recurring prophetic idiom for divine power or compulsion. The literal expression is retained because it is both intelligible and theologically significant in Ezekiel.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the stated doctrine.
- source_word: וַיָּבֵא אֹתִי שָׁמָּה
  chosen: and he brought me there
  alternatives:
  - and he brought me to that place
  lexicon: HALOT
  rationale: The subject is understood from context as the LORD/the divine agent. 'There' is the natural rendering of שָׁמָּה and preserves the destination without over-specifying it.
