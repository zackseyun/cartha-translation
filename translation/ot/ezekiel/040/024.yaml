id: EZK.40.24
reference: Ezekiel 40:24
source:
  edition: WLC
  text: וַ/יּוֹלִכֵ֨/נִי֙ דֶּ֣רֶךְ הַ/דָּר֔וֹם וְ/הִנֵּה שַׁ֖עַר דֶּ֣רֶךְ הַ/דָּר֑וֹם
    וּ/מָדַ֤ד איל/ו ו/אילמ/ו כַּ/מִּדּ֖וֹת הָ/אֵֽלֶּה־׃
translation:
  text: Then he led me by way of the south, and behold, there was a gate facing south.
    He measured its side pillars and its porch according to these measurements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more technically, 'its jambs' for 'its side pillars.' The Hebrew architectural
      term likely refers to the gate's supporting side structures.
    reason: lexical_alternative
  - marker: b
    text: That is, the gate's dimensions matched those previously described.
    reason: cross_reference
lexical_decisions:
- source_word: וַיּוֹלִכֵנִי
  chosen: Then he led me
  alternatives:
  - And he brought me
  - And he led me
  lexicon: HALOT
  rationale: From הלך in the causative sense, 'cause to go/lead.' 'Then' fits the
    narrative waw in smooth English while preserving sequence.
- source_word: דֶּרֶךְ הַדָּרוֹם
  chosen: by way of the south
  alternatives:
  - toward the south
  - to the south
  lexicon: HALOT
  rationale: Literally 'the way of the south.' Rendered idiomatically as directional
    movement while retaining the repeated spatial terminology of the temple vision.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Preserves the deictic, attention-directing force of the Hebrew discourse
    marker in prophetic vision narrative.
- source_word: שַׁעַר דֶּרֶךְ הַדָּרוֹם
  chosen: a gate facing south
  alternatives:
  - a gate by way of the south
  - a gate toward the south
  lexicon: HALOT
  rationale: The phrase identifies the gate by orientation. 'Facing south' is natural
    English and matches the architectural context.
- source_word: וּמָדַד
  chosen: He measured
  alternatives:
  - and he measured
  lexicon: HALOT
  rationale: Simple narrative continuation; English capitalized here because it begins
    a new sentence.
- source_word: אֵילוֹ
  chosen: its side pillars
  alternatives:
  - its jambs
  - its pilasters
  lexicon: HALOT
  rationale: In Ezekiel's temple descriptions, אֵיל/אֵילִים refers to prominent structural
    supports associated with gateways. 'Side pillars' is clearer for modern readers
    than the more technical 'jambs,' while still architectural rather than paraphrastic.
- source_word: וְאֵילַמּוֹ
  chosen: its porch
  alternatives:
  - its vestibule
  - its portico
  lexicon: HALOT
  rationale: אֵילָם in temple architecture denotes the porch/vestibule area. 'Porch'
    is the most accessible modern equivalent.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  chosen: according to these measurements
  alternatives:
  - like these measurements
  - with the same measurements as these
  lexicon: HALOT
  rationale: Expresses conformity to the previously given dimensions. 'According to
    these measurements' is idiomatic and preserves the comparative force.
