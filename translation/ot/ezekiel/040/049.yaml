id: EZK.40.49
reference: Ezekiel 40:49
source:
  edition: WLC
  text: אֹ֣רֶךְ הָ/אֻלָ֞ם עֶשְׂרִ֣ים אַמָּ֗ה וְ/רֹ֨חַב֙ עַשְׁתֵּ֣י עֶשְׂרֵ֣ה אַמָּ֔ה
    וּ/בַֽ/מַּעֲל֔וֹת אֲשֶׁ֥ר יַעֲל֖וּ אֵלָ֑י/ו וְ/עַמֻּדִים֙ אֶל הָ֣/אֵילִ֔ים אֶחָ֥ד
    מִ/פֹּ֖ה וְ/אֶחָ֥ד מִ/פֹּֽה־׃
translation:
  text: The length of the vestibule was twenty cubits, and the width was twelve cubits,
    and by the steps by which one went up to it; and pillars were beside the sidewalls,
    one on this side and one on that side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'portico' or 'porch' for 'vestibule' (Hebrew אֻלָם).
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'sidewalls' (אֵילִים) is architecturally difficult;
      it may also refer to 'jambs,' 'pilasters,' or other projecting structural elements.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - long side
  - measurement in length
  lexicon: HALOT
  rationale: Standard architectural measurement term; 'length' is the natural English
    equivalent in this temple-description context.
- source_word: הָאֻלָם
  chosen: vestibule
  alternatives:
  - portico
  - porch
  lexicon: HALOT
  rationale: Refers to the entrance hall/porch-like structure before the building.
    'Vestibule' is clear modern English and suitably architectural; 'portico' and
    'porch' are possible but either more classical or potentially too domestic.
- source_word: אַמָּה
  chosen: cubits
  alternatives:
  - cubits (about 18 inches each)
  lexicon: HALOT
  rationale: Standard rendering of the ancient unit; transliterated measurement is
    preferable to converting into modern units in the main text.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: Regular counterpart to 'length' in measurement formulas.
- source_word: עַשְׁתֵּי עֶשְׂרֵה
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal number in construct form with the feminine noun
    'cubits'.
- source_word: וּבַמַּעֲלוֹת
  chosen: by the steps
  alternatives:
  - with steps
  - and there were steps
  lexicon: HALOT
  rationale: The prefixed preposition and article most naturally indicate relation
    to the ascent. 'By the steps' preserves the concise Hebrew linkage without over-expanding
    the clause.
- source_word: אֲשֶׁר יַעֲלוּ אֵלָיו
  chosen: by which one went up to it
  alternatives:
  - by which they went up to it
  - which went up to it
  lexicon: HALOT
  rationale: The Hebrew has a relative clause with a 3mp verb, but in English an impersonal
    singular ('one went up') best conveys the generic sense. 'To it' refers back to
    the vestibule.
- source_word: וְעַמֻּדִים
  chosen: and pillars
  alternatives:
  - and columns
  lexicon: HALOT
  rationale: Architectural supports; 'pillars' is idiomatic and fits temple-description
    style.
- source_word: אֶל הָאֵילִים
  chosen: beside the sidewalls
  alternatives:
  - toward the jambs
  - by the projecting walls
  - beside the pilasters
  lexicon: HALOT
  rationale: אֵילִים in Ezekiel's temple vision is difficult and contextually architectural.
    Here it most likely refers to the structural side elements/jamb-like sidewalls
    associated with the vestibule. 'Beside the sidewalls' gives a readable architectural
    sense without excessive technicality, while preserving the relation marked by
    אֶל.
- source_word: אֶחָד מִפֹּה וְאֶחָד מִפֹּה
  chosen: one on this side and one on that side
  alternatives:
  - one on one side and one on the other
  - one here and one there
  lexicon: HALOT
  rationale: Idiomatic distributive expression indicating symmetry on both sides.
