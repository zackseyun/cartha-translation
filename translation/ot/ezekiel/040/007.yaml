id: EZK.40.7
reference: Ezekiel 40:7
source:
  edition: WLC
  text: וְ/הַ/תָּ֗א קָנֶ֨ה אֶחָ֥ד אֹ֨רֶךְ֙ וְ/קָנֶ֤ה אֶחָד֙ רֹ֔חַב וּ/בֵ֥ין הַ/תָּאִ֖ים
    חָמֵ֣שׁ אַמּ֑וֹת וְ/סַ֣ף הַ֠/שַּׁעַר מֵ/אֵ֨צֶל אוּלָ֥ם הַ/שַּׁ֛עַר מֵֽ/הַ/בַּ֖יִת
    קָנֶ֥ה אֶחָֽד׃
translation:
  text: And each guardroom was one reed long and one reed wide, and between the guardrooms
    was five cubits. And the threshold of the gate beside the portico of the gate,
    toward the inside, was one reed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'side room' or 'chamber' for 'guardroom' (Hebrew תָּא), an architectural
      term in Ezekiel's temple vision.
    reason: lexical_alternative
  - marker: b
    text: Or 'vestibule' or 'porch' for 'portico' (Hebrew אוּלָם).
    reason: lexical_alternative
  - marker: c
    text: The phrase 'toward the inside' renders Hebrew 'from the house,' likely indicating
      the inner side of the gate complex rather than a separate house.
    reason: cultural_note
lexical_decisions:
- source_word: הַתָּא
  chosen: guardroom
  alternatives:
  - side room
  - alcove
  - chamber
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, תָּא refers to the small rooms built into
    the gate structure. 'Guardroom' best fits the architectural context and common
    function implied in gate complexes, while remaining understandable in modern English.
- source_word: קָנֶה אֶחָד
  chosen: one reed
  alternatives:
  - one measuring reed
  - one rod
  lexicon: HALOT
  rationale: קָנֶה here is a unit of measure established in the surrounding context,
    not merely a plant. 'One reed' is concise and natural, while preserving the architectural
    measuring terminology.
- source_word: אֹרֶךְ
  chosen: long
  alternatives:
  - in length
  lexicon: HALOT
  rationale: Rendered adjectivally in English ('one reed long') for readable modern
    style while preserving the dimensional statement.
- source_word: רֹחַב
  chosen: wide
  alternatives:
  - in width
  - broad
  lexicon: HALOT
  rationale: Rendered adjectivally in parallel with 'long' for natural English and
    structural symmetry.
- source_word: בֵּין הַתָּאִים
  chosen: between the guardrooms
  alternatives:
  - between the side rooms
  - between the chambers
  lexicon: HALOT
  rationale: Maintains the same gloss for תָּא in the plural for consistency, as required
    by the translation philosophy.
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  alternatives:
  - five cubits of space
  lexicon: HALOT
  rationale: אַמָּה is the standard cubit measure. The Hebrew does not explicitly
    add 'of space,' so the simpler rendering is preferred.
- source_word: סַף
  chosen: threshold
  alternatives:
  - sill
  lexicon: HALOT
  rationale: In architectural context, סַף is best rendered 'threshold,' the standard
    term for the base crossing point of an entrance.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the gateway
  lexicon: HALOT
  rationale: '''Gate'' is the more direct rendering, though the structure is architecturally
    a gateway. The surrounding details already make clear that a built gate-complex
    is in view.'
- source_word: מֵאֵצֶל
  chosen: beside
  alternatives:
  - by
  - next to
  - at the side of
  lexicon: HALOT
  rationale: The prepositional sense is spatial proximity. 'Beside' is concise and
    fits the architectural description.
- source_word: אוּלָם הַשַּׁעַר
  chosen: the portico of the gate
  alternatives:
  - the vestibule of the gate
  - the porch of the gate
  lexicon: HALOT
  rationale: אוּלָם commonly denotes a porch or vestibule. 'Portico' communicates
    an architectural entrance-hall clearly in modern English without sounding archaic.
- source_word: מֵהַבַּיִת
  chosen: toward the inside
  alternatives:
  - on the inner side
  - from the house
  - inward
  lexicon: HALOT
  rationale: In this temple-vision context, בַּיִת can denote the interior/building
    side rather than a domestic 'house.' The phrase marks orientation from the inner
    side of the gate complex. 'Toward the inside' communicates the spatial sense more
    clearly than a wooden 'from the house.'
