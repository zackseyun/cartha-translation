id: EZK.40.12
reference: Ezekiel 40:12
source:
  edition: WLC
  text: וּ/גְב֞וּל לִ/פְנֵ֤י הַ/תָּאוֹת֙ אַמָּ֣ה אֶחָ֔ת וְ/אַמָּה אַחַ֥ת גְּב֖וּל
    מִ/פֹּ֑ה וְ/הַ/תָּ֕א שֵׁשׁ אַמּ֣וֹת מִ/פּ֔וֹ וְ/שֵׁ֥שׁ אַמּ֖וֹת מִ/פּֽוֹ־־׃
translation:
  text: And there was a barrier of one cubit in front of the side rooms, and a barrier
    of one cubit on the other side; and each side room was six cubits on this side
    and six cubits on that side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guardrooms,' 'cells,' or 'alcoves' for 'side rooms' (Hebrew תָּאוֹת),
      referring to small chambers in the gate structure.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses repeated deictic expressions, literally 'from here' and
      'from there,' to indicate the measurements on opposite sides.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְב֞וּל
  chosen: barrier
  alternatives:
  - border
  - limit
  - space
  - wall
  lexicon: HALOT
  rationale: In this architectural context, גְּבוּל refers not to an abstract boundary
    but to a defined separating strip or partition before the guard/side rooms. 'Barrier'
    communicates a physical delimiting structure or space better than the more abstract
    'border' or 'limit.'
- source_word: לִפְנֵי
  chosen: in front of
  alternatives:
  - before
  lexicon: HALOT
  rationale: The phrase is spatial in this temple-vision measurement context. 'In
    front of' gives the concrete architectural sense more clearly in modern English
    than 'before.'
- source_word: הַתָּאוֹת
  chosen: the side rooms
  alternatives:
  - the guardrooms
  - the cells
  - the alcoves
  lexicon: HALOT
  rationale: תָּא/תָּאוֹת in Ezekiel 40 commonly denotes small chambers built into
    the gate structure. 'Side rooms' is a clear, natural rendering that fits the architecture
    without overcommitting to a military function implied by 'guardrooms.'
- source_word: אַמָּה אֶחָת / וְאַמָּה אַחַת
  chosen: one cubit ... one cubit
  alternatives:
  - a cubit ... a cubit
  lexicon: HALOT
  rationale: The Hebrew explicitly measures the boundary on each side as one cubit.
    'Cubit' preserves the ancient unit rather than converting it, which is preferable
    in a measurement-heavy vision text.
- source_word: מִפֹּה ... מִפּוֹ
  chosen: on the other side ... on this side ... on that side
  alternatives:
  - from here ... from there
  - on this side ... on that side
  lexicon: HALOT
  rationale: The deictic expressions mark opposite sides in the layout. English idiom
    requires smoothing for readability while preserving the bilateral spatial contrast.
- source_word: וְהַתָּא
  chosen: each side room was
  alternatives:
  - and the side room was
  lexicon: HALOT
  rationale: Although singular in form, the noun functions distributively in context
    after the plural 'side rooms.' 'Each side room was' best conveys the measurement
    applying to the individual rooms.
- source_word: שֵׁשׁ אַמּוֹת
  chosen: six cubits
  lexicon: HALOT
  rationale: Straightforward measurement; retaining 'cubits' preserves the source-text
    unit and the repetitive measured style of the passage.
