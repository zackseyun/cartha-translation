id: EZK.40.19
reference: Ezekiel 40:19
source:
  edition: WLC
  text: וַ/יָּ֣מָד רֹ֡חַב מִ/לִּ/פְנֵי֩ הַ/שַּׁ֨עַר הַ/תַּחְתּ֜וֹנָ/ה לִ/פְנֵ֨י הֶ/חָצֵ֧ר
    הַ/פְּנִימִ֛י מִ/ח֖וּץ מֵאָ֣ה אַמָּ֑ה הַ/קָּדִ֖ים וְ/הַ/צָּפֽוֹן׃
translation:
  text: 'Then he measured the width from the front of the lower gate to the front
    of the inner court outside: one hundred cubits, on the east and on the north.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lower gateway.' The Hebrew term for 'gate' can refer to the gate
      structure as a whole, not merely the doorway.
    reason: lexical_alternative
  - marker: b
    text: That is, the measurement was one hundred cubits for both the eastern side
      and the northern side.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  lexicon: HALOT
  rationale: Wayyiqtol of מדד introduces the next action in the vision narrative.
    'Then' gives natural English sequence while preserving the consecutive force.
- source_word: רֹחַב
  chosen: the width
  alternatives:
  - a width
  - the breadth
  lexicon: HALOT
  rationale: The noun denotes a measured span across. 'Width' is the most natural
    modern English equivalent; 'breadth' is possible but less current.
- source_word: מִלִּפְנֵי
  chosen: from the front of
  alternatives:
  - from before
  - from the face of
  lexicon: HALOT
  rationale: לפני here is spatial, marking the point from which the measurement begins.
    'Front of' communicates the architectural sense better than the more literal but
    less idiomatic 'before'.
- source_word: הַשַּׁעַר הַתַּחְתּוֹנָה
  chosen: the lower gate
  alternatives:
  - the lower gateway
  - the bottom gate
  lexicon: HALOT
  rationale: The adjective means 'lower' in contrast to the inner court area. 'Gate'
    is sufficient in English, though the structure is a gate-complex; 'gateway' is
    possible but not necessary here.
- source_word: לִפְנֵי הֶחָצֵר הַפְּנִימִי
  chosen: to the front of the inner court
  alternatives:
  - to the face of the inner court
  - before the inner court
  lexicon: HALOT
  rationale: Again spatial לפני marks the endpoint of the measurement. 'Front of the
    inner court' preserves the architectural orientation.
- source_word: מִחוּץ
  chosen: outside
  alternatives:
  - on the outside
  - externally
  lexicon: HALOT
  rationale: The term indicates the measurement is taken on the outer side. 'Outside'
    is concise and clear in context.
- source_word: מֵאָה אַמָּה
  chosen: one hundred cubits
  alternatives:
  - a hundred cubits
  lexicon: HALOT
  rationale: Standard architectural measure. 'Cubits' should be retained rather than
    converted, preserving the source culture and precision.
- source_word: הַקָּדִים וְהַצָּפוֹן
  chosen: on the east and on the north
  alternatives:
  - eastward and northward
  - for the east and the north
  lexicon: HALOT
  rationale: These directional nouns summarize that the same measurement applied to
    both the eastern and northern sides/gates. 'On the east and on the north' is idiomatic
    and keeps the distributive sense.
