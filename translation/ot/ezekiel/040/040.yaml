id: EZK.40.40
reference: Ezekiel 40:40
source:
  edition: WLC
  text: וְ/אֶל הַ/כָּתֵ֣ף מִ/ח֗וּצָ/ה לָ/עוֹלֶה֙ לְ/פֶ֨תַח֙ הַ/שַּׁ֣עַר הַ/צָּפ֔וֹנָ/ה
    שְׁנַ֖יִם שֻׁלְחָנ֑וֹת וְ/אֶל הַ/כָּתֵ֣ף הָ/אַחֶ֗רֶת אֲשֶׁר֙ לְ/אֻלָ֣ם הַ/שַּׁ֔עַר
    שְׁנַ֖יִם שֻׁלְחָנֽוֹת־־׃
translation:
  text: And on the outer side of the shoulder, by the ascent to the entrance of the
    north gate, were two tables; and on the other shoulder, which belonged to the
    porch of the gate, were two tables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'side' / 'flank' for 'shoulder' in this architectural description.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the ascent' or 'where one goes up to the entrance of the north gate.'
    reason: lexical_alternative
  - marker: c
    text: Or 'which was by the porch of the gate'; the Hebrew expression indicates
      association with the gate's porch/vestibule.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּתֵף
  chosen: shoulder
  alternatives:
  - side
  - flank
  lexicon: HALOT
  rationale: Literally 'shoulder.' In architectural description it denotes a side
    projection or side area. 'Shoulder' preserves the concrete Hebrew image while
    remaining intelligible in context; alternatives like 'side' are possible but less
    formally tied to the source term.
- source_word: מִחוּצָה
  chosen: outer side
  alternatives:
  - outside
  - on the outside
  lexicon: HALOT
  rationale: The form indicates the exterior/outside. 'Outer side' fits the spatial
    description with כָּתֵף and reads naturally in English.
- source_word: לָעוֹלֶה
  chosen: by the ascent
  alternatives:
  - at the ascent
  - where one goes up
  lexicon: HALOT
  rationale: From עלה, here functioning substantivally/participially for the place
    of going up. In this temple-vision context it most naturally refers to the ascent
    or stairway leading up to the gate entrance. 'By the ascent' is concise and spatially
    appropriate.
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - opening
  - entry
  lexicon: HALOT
  rationale: '''Entrance'' best fits an architectural gateway context in contemporary
    English.'
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: Standard rendering in temple and city architecture. 'Gateway' is possible,
    but 'gate' is more idiomatic and sufficiently clear.
- source_word: הַצָּפוֹנָה
  chosen: north
  alternatives:
  - northern side
  lexicon: HALOT
  rationale: Directional adjective used with 'gate'; 'north gate' is the natural English
    construction.
- source_word: שְׁנַיִם שֻׁלְחָנוֹת
  chosen: two tables
  lexicon: HALOT
  rationale: Straightforward numerical phrase. 'Tables' is the normal rendering in
    this sacrificial-preparation context.
- source_word: הָאַחֶרֶת
  chosen: the other
  alternatives:
  - the second
  lexicon: HALOT
  rationale: Marks the corresponding opposite side. 'The other' is the most natural
    English equivalent here.
- source_word: אֲשֶׁר לְאֻלָם הַשַּׁעַר
  chosen: which belonged to the porch of the gate
  alternatives:
  - which was by the porch of the gate
  - which was at the vestibule of the gate
  lexicon: HALOT
  rationale: אֻלָם is the porch/vestibule. The relation marked by לְ is somewhat flexible;
    'belonged to the porch of the gate' conveys association with that side area, while
    preserving the architectural linkage.
- source_word: אֻלָם
  chosen: porch
  alternatives:
  - vestibule
  lexicon: HALOT
  rationale: '''Porch'' is accessible modern English and suits temple architecture;
    ''vestibule'' is more technical.'
