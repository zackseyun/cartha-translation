id: EZK.40.32
reference: Ezekiel 40:32
source:
  edition: WLC
  text: וַ/יְבִיאֵ֛/נִי אֶל הֶ/חָצֵ֥ר הַ/פְּנִימִ֖י דֶּ֣רֶךְ הַ/קָּדִ֑ים וַ/יָּ֣מָד
    אֶת הַ/שַּׁ֔עַר כַּ/מִּדּ֖וֹת הָ/אֵֽלֶּה־־׃
translation:
  text: Then he brought me into the inner court by way of the east, and he measured
    the gate according to these measurements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gateway.' The Hebrew שַׁעַר can refer either to the gate itself
      or to the larger gate structure in this temple vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  chosen: Then he brought me
  alternatives:
  - And he brought me
  lexicon: HALOT
  rationale: Wayyiqtol of בוא with 1cs suffix narrates sequential action. 'Then' conveys
    narrative progression in natural English; 'brought me' preserves the causative
    sense.
- source_word: הֶחָצֵר הַפְּנִימִי
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: חָצֵר denotes a court/courtyard; in temple-vision context 'court' is
    standard and concise. הַפְּנִימִי specifies the inner one.
- source_word: דֶּרֶךְ הַקָּדִים
  chosen: by way of the east
  alternatives:
  - by the eastern way
  - toward the east
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean way/path/route. In this architectural context it indicates
    the route of approach. הַקָּדִים is 'the east/east side.' 'By way of the east'
    best captures the idiom without over-specifying.
- source_word: וַיָּמָד
  chosen: and he measured
  alternatives:
  - then he measured
  lexicon: HALOT
  rationale: Simple narrative verb from מדד, continuing the sequence. 'Measured' is
    the plain architectural sense.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - the gateway
  lexicon: HALOT
  rationale: שַׁעַר can denote gate or gate-complex. Since the surrounding passage
    repeatedly measures architectural gate structures, 'gate' is retained as the standard
    rendering, with 'gateway' a possible alternative.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  chosen: according to these measurements
  alternatives:
  - with these measurements
  - by these measurements
  - according to those measurements
  lexicon: HALOT
  rationale: 'כְּ with מִדּוֹת expresses conformity/comparison: the gate matched the
    dimensions already described. ''According to these measurements'' makes the referential
    sense explicit in idiomatic English. ''These'' follows the proximal demonstrative
    הָאֵלֶּה.'
