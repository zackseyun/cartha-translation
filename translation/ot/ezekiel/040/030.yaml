id: EZK.40.30
reference: Ezekiel 40:30
source:
  edition: WLC
  text: וְ/אֵֽלַמּ֖וֹת סָבִ֣יב סָבִ֑יב אֹ֗רֶךְ חָמֵ֤שׁ וְ/עֶשְׂרִים֙ אַמָּ֔ה וְ/רֹ֖חַב
    חָמֵ֥שׁ אַמּֽוֹת׀׃
translation:
  text: 'And vestibules all around, all around: twenty-five cubits long and five cubits
    wide.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'porches' or 'porticos' for the architectural term translated 'vestibules.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלַמּוֹת
  chosen: vestibules
  alternatives:
  - porches
  - porticos
  - vestibule-like projections
  lexicon: HALOT
  rationale: The plural of אוּלָם/אֵילָם in temple-architecture contexts refers to
    porch/vestibule structures. 'Vestibules' is a clear modern architectural term
    that fits the gate-complex description better than the more traditional but potentially
    domestic-sounding 'porches.'
- source_word: סָבִיב סָבִיב
  chosen: all around, all around
  alternatives:
  - round about, round about
  - on every side
  lexicon: HALOT
  rationale: The doubled expression is emphatic and distributive. Repeating it in
    English preserves the Hebrew rhythm and emphasis rather than collapsing it into
    a single adverb.
- source_word: אֹרֶךְ
  chosen: long
  alternatives:
  - length
  lexicon: HALOT
  rationale: Rendered adjectivally with the measurement phrase ('twenty-five cubits
    long') for natural English while preserving the dimensional sense.
- source_word: חָמֵשׁ וְעֶשְׂרִים אַמָּה
  chosen: twenty-five cubits
  alternatives:
  - five and twenty cubits
  lexicon: HALOT
  rationale: Modern English number order improves readability without loss of meaning.
    'Cubit' is retained as the standard ancient unit rather than converted.
- source_word: רֹחַב
  chosen: wide
  alternatives:
  - width
  lexicon: HALOT
  rationale: Rendered adjectivally in parallel with 'long' for smooth English measurement
    style.
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  lexicon: HALOT
  rationale: Straightforward rendering of the width measurement; plural 'cubits' matches
    normal English usage.
