theological_decisions:
- issue: Priestly privilege of the sons of Zadok within the Levitical order
  chosen_reading: The verse identifies a subset of Levites, the sons of Zadok, as
    those who approach the LORD for altar service.
  alternative_readings:
  - A broader reference to all Levites without distinction
  rationale: 'The Hebrew explicitly narrows the referent: ''They are the sons of Zadok
    ... from among the sons of Levi.'' The translation preserves this distinction
    without importing later theological claims beyond the text.'
