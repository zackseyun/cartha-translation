id: EZK.40.46
reference: Ezekiel 40:46
source:
  edition: WLC
  text: וְ/הַ/לִּשְׁכָּ֗ה אֲשֶׁ֤ר פָּנֶ֨י/הָ֙ דֶּ֣רֶךְ הַ/צָּפ֔וֹן לַ/כֹּ֣הֲנִ֔ים
    שֹׁמְרֵ֖י מִשְׁמֶ֣רֶת הַ/מִּזְבֵּ֑חַ הֵ֣מָּה בְנֵֽי צָד֗וֹק הַ/קְּרֵבִ֧ים מִ/בְּנֵֽי
    לֵוִ֛י אֶל יְהוָ֖ה לְ/שָׁרְתֽ/וֹ־־־׃
translation:
  text: And the chamber whose front faces north is for the priests who keep charge
    of the altar. They are the sons of Zadok, who from among the sons of Levi come
    near to the LORD to minister to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who draw near from among the sons of Levi to the LORD to serve him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִּשְׁכָּה
  chosen: chamber
  alternatives:
  - room
  - cell
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, לִשְׁכָּה refers to a designated room/chamber
    within the complex. 'Chamber' is idiomatic in English for temple architecture
    and preserves the formal sense better than the more generic 'room'.
- source_word: פָּנֶיהָ דֶּרֶךְ הַצָּפוֹן
  chosen: whose front faces north
  alternatives:
  - whose face is toward the north
  - that faces north
  lexicon: HALOT
  rationale: פָּנִים with directional language denotes the front/orientation of a
    structure. 'Whose front faces north' makes the architectural sense clear in natural
    English while retaining the imagery of orientation.
- source_word: לַכֹּהֲנִים
  chosen: is for the priests
  alternatives:
  - belongs to the priests
  - is for priests
  lexicon: HALOT
  rationale: The lamed marks assignment or purpose. Supplying 'is for' is necessary
    in English and fits the context of designated temple chambers.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת הַמִּזְבֵּחַ
  chosen: who keep charge of the altar
  alternatives:
  - who keep the duty of the altar
  - who are responsible for the altar
  - who keep the service of the altar
  lexicon: HALOT
  rationale: The idiom שמר משמרת means to keep charge, keep duty, or guard responsibility.
    'Keep charge of the altar' is concise, natural, and preserves the cultic responsibility
    without reducing it merely to physical guarding.
- source_word: הֵמָּה
  chosen: They are
  alternatives:
  - These are
  lexicon: HALOT
  rationale: The pronoun is emphatic, identifying the priests just mentioned. 'They
    are' is the most natural English rendering in context.
- source_word: בְנֵי צָדוֹק
  chosen: the sons of Zadok
  alternatives:
  - the descendants of Zadok
  lexicon: HALOT
  rationale: A literal genealogical expression is appropriate here. 'Sons of Zadok'
    preserves the formal wording and priestly lineage emphasis; 'descendants' is interpretive
    and less textually transparent.
- source_word: הַקְּרֵבִים
  chosen: who ... come near
  alternatives:
  - who approach
  - who draw near
  lexicon: HALOT
  rationale: The participle from קרב in priestly contexts often denotes approaching
    God for sacred service. 'Come near' preserves the cultic nuance and echoes priestly
    language without over-paraphrase.
- source_word: מִבְּנֵי לֵוִי
  chosen: from among the sons of Levi
  alternatives:
  - from among the Levites
  - of the sons of Levi
  lexicon: HALOT
  rationale: The phrase marks selection from within the larger Levitical group. 'From
    among the sons of Levi' preserves both the familial wording and the partitive
    force of מִן.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - before the LORD
  lexicon: HALOT
  rationale: The preposition אֶל with קרב naturally yields 'to' in this context. The
    divine name is rendered 'the LORD' per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: לְשָׁרְתוֹ
  chosen: to minister to him
  alternatives:
  - to serve him
  - to attend him
  lexicon: HALOT
  rationale: In priestly contexts, שׁרת commonly denotes ministering in sacred service.
    'Minister to him' preserves the cultic and reverential sense better than the broader
    'serve him'.
