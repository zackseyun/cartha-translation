id: EZK.40.35
reference: Ezekiel 40:35
source:
  edition: WLC
  text: וַ/יְבִיאֵ֖/נִי אֶל שַׁ֣עַר הַ/צָּפ֑וֹן וּ/מָדַ֖ד כַּ/מִּדּ֥וֹת הָ/אֵֽלֶּה־׃
translation:
  text: Then he brought me to the north gate and measured it according to these measurements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and measured [it] with these measurements,' that is, using the same
      dimensions as previously described.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  chosen: Then he brought me
  alternatives:
  - And he brought me
  - Then he led me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'Then' reads naturally
    in English while preserving sequence. The Hiphil of בוא here means 'bring/lead';
    'brought me' is the most direct rendering, with 'led me' possible but less literal.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: The preposition marks movement toward a destination. 'To' is the most
    straightforward English equivalent here.
- source_word: שַׁעַר הַצָּפוֹן
  chosen: the north gate
  alternatives:
  - the northern gate
  - the gate facing north
  lexicon: HALOT
  rationale: Construct chain with the definite noun yields 'the north gate.' 'Northern
    gate' is possible, but 'north gate' is concise and idiomatic in architectural
    description.
- source_word: וּמָדַד
  chosen: and measured it
  alternatives:
  - and he measured
  - and measured
  lexicon: HALOT
  rationale: 'The verb is Qal perfect 3ms with the same subject continuing. English
    idiom benefits from supplying the object ''it,'' which is implied by the context:
    the gate just mentioned. This makes the sentence clear without adding interpretive
    content beyond the immediate antecedent.'
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  chosen: according to these measurements
  alternatives:
  - with these measurements
  - like these measurements
  - by these measurements
  lexicon: HALOT
  rationale: 'The prefixed כ here expresses correspondence or conformity: the gate
    was measured in accordance with the same dimensions/pattern already described.
    ''According to these measurements'' best conveys that sense in clear modern English.'
