id: EZK.40.23
reference: Ezekiel 40:23
source:
  edition: WLC
  text: וְ/שַׁ֨עַר֙ לֶ/חָצֵ֣ר הַ/פְּנִימִ֔י נֶ֣גֶד הַ/שַּׁ֔עַר לַ/צָּפ֖וֹן וְ/לַ/קָּדִ֑ים
    וַ/יָּ֧מָד מִ/שַּׁ֛עַר אֶל שַׁ֖עַר מֵאָ֥ה אַמָּֽה־׃
translation:
  text: And a gate to the inner court was opposite the gate on the north and on the
    east; and he measured from gate to gate one hundred cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'facing' the gate on the north and on the east.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: The noun denotes an architectural gate/gateway. 'Gate' is the most natural
    and sufficiently precise English rendering in this temple-vision context.
- source_word: חָצֵר הַפְּנִימִי
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: The phrase refers to the enclosed inner court area of the temple complex.
    'Inner court' is standard, clear English and fits Ezekiel's architectural terminology.
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - facing
  - in front of
  lexicon: HALOT
  rationale: Here the preposition indicates spatial correspondence across from another
    gate. 'Opposite' best captures the positional relationship in concise architectural
    language.
- source_word: לַצָּפוֹן וְלַקָּדִים
  chosen: on the north and on the east
  alternatives:
  - to the north and to the east
  - northward and eastward
  lexicon: HALOT
  rationale: These directional expressions identify the locations of the corresponding
    gates. 'On the north and on the east' reads naturally in English while preserving
    the directional sense.
- source_word: וַיָּמָד
  chosen: he measured
  alternatives:
  - and he measured
  lexicon: HALOT
  rationale: The verb is the waw-consecutive form of 'measure.' The subject is the
    measuring man from the vision context. Including 'he' is necessary in English;
    retaining 'and' also reflects the Hebrew narrative sequence.
- source_word: מִשַּׁעַר אֶל שַׁעַר
  chosen: from gate to gate
  alternatives:
  - from one gate to another gate
  lexicon: HALOT
  rationale: This idiom expresses the measured distance between two gates. 'From gate
    to gate' is concise and faithful.
- source_word: מֵאָה אַמָּה
  chosen: one hundred cubits
  alternatives:
  - a hundred cubits
  lexicon: HALOT
  rationale: אַמָּה is the standard ancient cubit measure. The translation preserves
    the source unit rather than converting it, which is preferable in a temple-measurement
    passage.
