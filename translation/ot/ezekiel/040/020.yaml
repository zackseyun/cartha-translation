id: EZK.40.20
reference: Ezekiel 40:20
source:
  edition: WLC
  text: וְ/הַ/שַּׁ֗עַר אֲשֶׁ֤ר פָּנָי/ו֙ דֶּ֣רֶךְ הַ/צָּפ֔וֹן לֶ/חָצֵ֖ר הַ/חִֽיצוֹנָ֑ה
    מָדַ֥ד אָרְכּ֖/וֹ וְ/רָחְבּֽ/וֹ׃
translation:
  text: As for the gate whose front faced north toward the outer court, he measured
    its length and its width.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'whose face was toward the north.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשַּׁעַר
  chosen: As for the gate
  alternatives:
  - And the gate
  - The gate
  lexicon: HALOT
  rationale: The conjunction with the definite noun introduces the next architectural
    feature in a descriptive sequence. 'As for the gate' brings out the topic-shift
    function naturally in English, while retaining the definite reference.
- source_word: אֲשֶׁר פָּנָיו
  chosen: whose front faced
  alternatives:
  - which faced
  - whose face was toward
  lexicon: HALOT
  rationale: פָּנִים literally means 'face/front.' In an architectural context, 'front'
    is more idiomatic than the overly literal 'face,' while preserving the directional
    sense.
- source_word: דֶּרֶךְ הַצָּפוֹן
  chosen: north
  alternatives:
  - toward the north
  - in the direction of the north
  lexicon: HALOT
  rationale: דֶּרֶךְ with a direction indicates orientation. 'Faced north' is concise,
    natural English that preserves the directional meaning.
- source_word: לֶחָצֵר הַחִיצוֹנָה
  chosen: toward the outer court
  alternatives:
  - belonging to the outer court
  - of the outer court
  lexicon: HALOT
  rationale: The prefixed ל here is best taken as indicating relation/direction with
    the gate oriented toward the outer court. 'Toward the outer court' fits the spatial
    description of the temple complex.
- source_word: מָדַד
  chosen: he measured
  alternatives:
  - he measured off
  lexicon: HALOT
  rationale: The verb simply states the measuring action by the previously established
    measuring figure. English requires the explicit pronoun 'he.'
- source_word: אָרְכּוֹ
  chosen: its length
  lexicon: HALOT
  rationale: Standard architectural term for the gate's longitudinal dimension; the
    suffix refers to the gate.
- source_word: וְרָחְבּוֹ
  chosen: and its width
  alternatives:
  - and its breadth
  lexicon: HALOT
  rationale: '''Width'' is the clearest modern English equivalent for the gate''s
    transverse dimension; ''breadth'' is possible but less natural for contemporary
    readers.'
