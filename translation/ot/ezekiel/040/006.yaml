id: EZK.40.6
reference: Ezekiel 40:6
source:
  edition: WLC
  text: וַ/יָּב֗וֹא אֶל שַׁ֨עַר֙ אֲשֶׁ֤ר פָּנָי/ו֙ דֶּ֣רֶךְ הַ/קָּדִ֔ימָ/ה וַ/יַּ֖עַל
    ב/מעלות/ו וַ/יָּ֣מָד אֶת סַ֣ף הַ/שַּׁ֗עַר קָנֶ֤ה אֶחָד֙ רֹ֔חַב וְ/אֵת֙ סַ֣ף אֶחָ֔ד
    קָנֶ֥ה אֶחָ֖ד רֹֽחַב־׀־׃
translation:
  text: 'Then he came to the gate that faced east, and he went up its steps and measured
    the threshold of the gate: one reed wide. And the other threshold was one reed
    wide.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "And one threshold was one reed wide." The Hebrew says "one threshold,"
      but in context it likely refers to the corresponding threshold on the other
      side of the gate.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: '"Gate" is the natural architectural term in English for the entry structure
    being measured. "Gateway" is possible, but "gate" is more idiomatic and sufficiently
    covers the larger gate-complex in this context.'
- source_word: אֲשֶׁר פָּנָיו דֶּרֶךְ הַקָּדִימָה
  chosen: that faced east
  alternatives:
  - whose front was toward the east
  - that faced toward the east
  lexicon: HALOT
  rationale: The phrase literally describes the gate's face/front being in the direction
    of the east. "That faced east" is concise modern English and preserves the orientation
    without over-literal awkwardness.
- source_word: במעלותיו
  chosen: its steps
  alternatives:
  - its stairway
  - its ascent
  lexicon: HALOT
  rationale: The plural noun refers to the steps leading up to the gate. "Its steps"
    is the clearest architectural rendering in context.
- source_word: סַף הַשַּׁעַר
  chosen: the threshold of the gate
  alternatives:
  - the gate threshold
  - the sill of the gate
  lexicon: HALOT
  rationale: סַף commonly denotes a threshold/sill. "Threshold of the gate" is clear
    and natural English for the measured architectural feature.
- source_word: קָנֶה אֶחָד רֹחַב
  chosen: one reed wide
  alternatives:
  - a width of one reed
  - one measuring reed in width
  lexicon: HALOT
  rationale: קָנֶה here is the measuring reed used throughout the vision, and רֹחַב
    specifies width. "One reed wide" is concise and preserves the measurement unit.
- source_word: וְאֵת סַף אֶחָד
  chosen: And the other threshold
  alternatives:
  - And one threshold
  - And the second threshold
  lexicon: HALOT
  rationale: Although אֶחָד literally means "one," in this distributive architectural
    description it distinguishes the corresponding threshold on the other side. English
    idiom is best served by "the other threshold," which communicates the paired structure
    more clearly.
- source_word: וַיָּבֹא ... וַיַּעַל ... וַיָּמָד
  chosen: Then he came ... and he went up ... and measured
  alternatives:
  - And he came ... and went up ... and measured
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol sequence narrates successive actions. "Then" at
    the start and simple past verbs in sequence convey the narrative flow naturally
    in English.
