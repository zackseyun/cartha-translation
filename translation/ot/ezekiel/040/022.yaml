id: EZK.40.22
reference: Ezekiel 40:22
source:
  edition: WLC
  text: ו/חלונ/ו ו/אלמ/ו ו/תמר/ו כְּ/מִדַּ֣ת הַ/שַּׁ֔עַר אֲשֶׁ֥ר פָּנָ֖י/ו דֶּ֣רֶךְ
    הַ/קָּדִ֑ים וּ/בְ/מַעֲל֥וֹת שֶׁ֨בַע֙ יַֽעֲלוּ ב֔/וֹ ו/אילמ/ו לִ/פְנֵי/הֶֽם־׃
translation:
  text: Its windows, its porch, and its palm-tree decorations had the same measurements
    as the gate that faced east. People would go up to it by seven steps, and its
    porch was in front of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its vestibule' or 'its portico' for both occurrences of the architectural
      term.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'its palm trees'; in context this likely refers to palm-tree carvings
      or decorative motifs rather than literal trees.
    reason: cultural_note
  - marker: c
    text: 'The Hebrew uses a plural verb (''they would go up''), likely as an impersonal
      expression: ''one would go up'' or ''people would go up.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחַלּוֹנוֹ
  chosen: its windows
  alternatives:
  - its window openings
  lexicon: HALOT
  rationale: חַלּוֹן denotes a window or window opening. The plural/singular form
    with suffix here is best represented collectively as 'its windows' in natural
    English.
- source_word: וְאֵלַמּוֹ / וְאֵילַמּוֹ
  chosen: its porch
  alternatives:
  - its vestibule
  - its portico
  lexicon: HALOT
  rationale: אֵילָם/אוּלָם in temple architecture refers to a projecting entrance
    structure. 'Porch' is clear modern English and fits the architectural context
    better than the more technical 'vestibule' or 'portico.' The verse contains the
    term twice; both are rendered consistently.
- source_word: וְתִמָּרוֹ
  chosen: its palm-tree decorations
  alternatives:
  - its palm trees
  - its palm ornaments
  lexicon: HALOT
  rationale: תִּמָּרָה in this architectural context refers to palm-tree shaped decorative
    features, not literal planted trees. 'Palm-tree decorations' makes the implied
    ornamental sense explicit.
- source_word: כְּמִדַּת
  chosen: had the same measurements as
  alternatives:
  - according to the measure of
  - like the measurements of
  lexicon: HALOT
  rationale: The comparative כ plus מִדָּה indicates conformity in dimensions. 'Had
    the same measurements as' communicates the architectural comparison idiomatically.
- source_word: הַשַּׁעַר אֲשֶׁר פָּנָיו דֶּרֶךְ הַקָּדִים
  chosen: the gate that faced east
  alternatives:
  - the gate whose front was toward the east
  - the gate facing the east
  lexicon: HALOT
  rationale: פָּנָיו ... דֶּרֶךְ הַקָּדִים is an idiom of orientation. 'Faced east'
    is concise and accurate.
- source_word: וּבְמַעֲלוֹת שֶׁבַע יַעֲלוּ בוֹ
  chosen: People would go up to it by seven steps
  alternatives:
  - they went up to it by seven steps
  - one would go up to it by seven steps
  lexicon: HALOT
  rationale: The 3mp verb is impersonal/generic in this descriptive vision context.
    English often supplies an indefinite subject. 'By seven steps' reflects ב plus
    the noun of ascent as the means/path of approach.
- source_word: לִפְנֵיהֶם
  chosen: in front of them
  alternatives:
  - before them
  - facing them
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' Here it describes the porch's
    position relative to the approaching steps/entrants. 'In front of them' preserves
    the spatial relation, though the exact referent of 'them' is somewhat compressed
    in Hebrew.
