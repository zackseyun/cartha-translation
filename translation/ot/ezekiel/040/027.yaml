id: EZK.40.27
reference: Ezekiel 40:27
source:
  edition: WLC
  text: וְ/שַׁ֛עַר לֶ/חָצֵ֥ר הַ/פְּנִימִ֖י דֶּ֣רֶךְ הַ/דָּר֑וֹם וַ/יָּ֨מָד מִ/שַּׁ֧עַר
    אֶל הַ/שַּׁ֛עַר דֶּ֥רֶךְ הַ/דָּר֖וֹם מֵאָ֥ה אַמּֽוֹת־׃
translation:
  text: 'And there was a gate to the inner court on the south side, and he measured
    from gate to gate toward the south: one hundred cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the south' in the first occurrence of the phrase; Hebrew literally
      'by way of the south.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁעַר
  chosen: And there was a gate
  alternatives:
  - And a gate
  - Now there was a gate
  lexicon: HALOT
  rationale: The clause is verbless in Hebrew, so English supplies 'there was' for
    natural readability. 'Gate' is the straightforward sense of שַׁעַר in this temple-vision
    context.
- source_word: לֶחָצֵר הַפְּנִימִי
  chosen: to the inner court
  alternatives:
  - for the inner court
  - belonging to the inner court
  lexicon: HALOT
  rationale: The lamed marks relation/direction; in context the gate gives access
    to the inner court. 'Inner court' is the standard architectural sense of חָצֵר
    הַפְּנִימִי.
- source_word: דֶּרֶךְ הַדָּרוֹם
  chosen: on the south side
  alternatives:
  - toward the south
  - in the direction of the south
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/direction,' but in this architectural description
    it locates the gate by orientation. 'On the south side' is idiomatic English for
    the first occurrence.
- source_word: וַיָּמָד
  chosen: and he measured
  alternatives:
  - then he measured
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. The subject remains the measuring
    guide from the surrounding context, so 'he measured' is retained.
- source_word: מִשַּׁעַר אֶל הַשַּׁעַר
  chosen: from gate to gate
  alternatives:
  - from the gate to the gate
  lexicon: HALOT
  rationale: The phrase expresses measurement between two corresponding gates. English
    idiom prefers the anarthrous 'from gate to gate' while preserving the relational
    sense.
- source_word: דֶּרֶךְ הַדָּרוֹם
  chosen: toward the south
  alternatives:
  - on the south side
  - in the direction of the south
  lexicon: HALOT
  rationale: For the second occurrence, the phrase modifies the measurement's orientation
    rather than simply locating the gate, so 'toward the south' better reflects the
    directional nuance.
- source_word: מֵאָה אַמּוֹת
  chosen: one hundred cubits
  alternatives:
  - a hundred cubits
  lexicon: HALOT
  rationale: This is the plain numerical measurement. 'Cubits' preserves the ancient
    unit rather than converting it, which is more transparent to the source text.
