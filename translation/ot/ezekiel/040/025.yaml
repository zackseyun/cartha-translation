id: EZK.40.25
reference: Ezekiel 40:25
source:
  edition: WLC
  text: וְ/חַלּוֹנִ֨ים ל֤/וֹ ו/ל/אילמ/ו סָבִ֣יב סָבִ֔יב כְּ/הַ/חֲלֹּנ֖וֹת הָ/אֵ֑לֶּה
    חֲמִשִּׁ֤ים אַמָּה֙ אֹ֔רֶךְ וְ/רֹ֕חַב חָמֵ֥שׁ וְ/עֶשְׂרִ֖ים אַמָּֽה׀׃
translation:
  text: And it had windows all around, and its porch also had windows all around,
    like these windows. The length was fifty cubits, and the width twenty-five cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vestibule' or 'portico' for 'porch' (Hebrew אֵילָם), an architectural
      term in Ezekiel's temple vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלּוֹנִים
  chosen: windows
  alternatives:
  - openings
  - window frames
  lexicon: HALOT
  rationale: The noun plainly denotes windows/openings in the gate structure. 'Windows'
    is the most natural modern English rendering and fits the repeated architectural
    description in this chapter.
- source_word: לוֹ
  chosen: it had
  alternatives:
  - to it
  - for it
  lexicon: HALOT
  rationale: 'The pronominal suffix with the preceding noun is idiomatically rendered
    in English as possession/existence: ''it had windows,'' rather than the more wooden
    ''windows were to it.'' The referent is the gate structure under description.'
- source_word: וְלְאֵילָמָו
  chosen: and its porch also had windows
  alternatives:
  - and to its vestibule
  - and its portico
  lexicon: HALOT
  rationale: אֵילָם in Ezekiel's temple vision refers to a projecting porch/vestibule
    area. 'Porch' is readable modern English; 'vestibule' or 'portico' are possible
    but less natural here. The suffix indicates the porch belonging to the same structure,
    and the clause is smoothed into idiomatic English by supplying 'had windows' from
    context.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled expression intensifies the circumferential sense. 'All around'
    captures the repetition naturally in modern English without awkward redundancy.
- source_word: כְּהַחֲלּוֹנוֹת הָאֵלֶּה
  chosen: like these windows
  alternatives:
  - like those windows
  - according to these windows
  lexicon: HALOT
  rationale: The phrase compares the windows just mentioned with the pattern previously
    described. 'These windows' preserves the demonstrative force, even though in English
    it may point anaphorically to the kind already described.
- source_word: חֲמִשִּׁים אַמָּה אֹרֶךְ
  chosen: The length was fifty cubits
  alternatives:
  - fifty cubits long
  lexicon: HALOT
  rationale: This is a standard architectural measurement formula. Rendering it as
    a full clause reads smoothly while preserving the formal measurement.
- source_word: וְרֹחַב חָמֵשׁ וְעֶשְׂרִים אַמָּה
  chosen: and the width twenty-five cubits
  alternatives:
  - and twenty-five cubits wide
  lexicon: HALOT
  rationale: The Hebrew gives the corresponding width measurement. 'Twenty-five cubits'
    is the straightforward equivalent of 'five and twenty cubits' in contemporary
    English.
