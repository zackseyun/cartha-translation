id: EZK.40.29
reference: Ezekiel 40:29
source:
  edition: WLC
  text: ו/תא/ו ו/איל/ו ו/אלמ/ו כַּ/מִּדּ֣וֹת הָ/אֵ֔לֶּה וְ/חַלּוֹנ֥וֹת ל֛/וֹ ו/ל/אלמ/ו
    סָבִ֣יב סָבִ֑יב חֲמִשִּׁ֤ים אַמָּה֙ אֹ֔רֶךְ וְ/רֹ֕חַב עֶשְׂרִ֥ים וְ/חָמֵ֖שׁ אַמּֽוֹת׀׃
translation:
  text: And its guardroom, its side pillars, and its porch were according to these
    measurements; and it had windows, and its porch had windows, all around. The length
    was fifty cubits, and the width twenty-five cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jambs,' 'pilasters,' or 'posts' for 'side pillars.'
    reason: lexical_alternative
  - marker: b
    text: Or 'vestibule' for 'porch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּא
  chosen: guardroom
  alternatives:
  - alcove
  - gate chamber
  - cell
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, תָּא refers to one of the small rooms/chambers
    associated with the gate structure. 'Guardroom' fits the architectural context
    better than the vaguer 'chamber' or 'cell' and remains readable.
- source_word: אַיִל
  chosen: side pillar
  alternatives:
  - jamb
  - pilaster
  - post
  lexicon: HALOT
  rationale: In this temple-building context, the term denotes a structural vertical
    element of the gateway. 'Side pillar' is clearer for modern readers than 'jamb'
    while preserving the architectural sense.
- source_word: אֵילָם
  chosen: porch
  alternatives:
  - vestibule
  - portico
  lexicon: HALOT
  rationale: The word commonly denotes the projecting entrance area of a building.
    'Porch' is natural modern English and sufficiently precise in this context.
- source_word: כַּמִּדּוֹת הָאֵלֶּה
  chosen: according to these measurements
  alternatives:
  - like these measurements
  - with the same dimensions as these
  lexicon: HALOT
  rationale: The phrase indicates conformity to previously given dimensions. 'According
    to these measurements' communicates that these features matched the measurements
    already described.
- source_word: חַלּוֹנוֹת
  chosen: windows
  alternatives:
  - openings
  - latticed windows
  lexicon: HALOT
  rationale: The standard sense is 'windows.' Nothing in this verse alone requires
    specifying latticework, so the simpler rendering is preferred.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled form intensifies the circumferential sense. 'All around'
    is idiomatic and captures the repetition without awkwardness.
- source_word: חֲמִשִּׁים אַמָּה אֹרֶךְ
  chosen: The length was fifty cubits
  alternatives:
  - fifty cubits long
  lexicon: HALOT
  rationale: This gives the first dimension explicitly and reads smoothly in English
    while preserving the measurement.
- source_word: וְרֹחַב עֶשְׂרִים וְחָמֵשׁ אַמּוֹת
  chosen: and the width twenty-five cubits
  alternatives:
  - and twenty-five cubits wide
  lexicon: HALOT
  rationale: This preserves the coordinate structure of the Hebrew and keeps the architectural
    measurement style consistent.
- source_word: לּוֹ ... וְלְאֵילָמוֹ
  chosen: it had windows, and its porch had windows
  alternatives:
  - windows belonged to it and to its porch
  - there were windows in it and in its porch
  lexicon: HALOT
  rationale: The pronominal constructions indicate possession/location for both the
    gate structure and its porch. This rendering makes the syntax clear in natural
    English.
