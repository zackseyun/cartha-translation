theological_decisions:
- issue: Rendering sacrificial terminology without importing later doctrinal interpretation
  chosen_reading: burnt offering, sin offering, and guilt offering
  alternative_readings:
  - burnt offering, purification offering, and reparation offering
  rationale: The verse is a descriptive temple-vision text listing recognized categories
    of sacrifices. The translation keeps the conventional cultic terms closest to
    the Hebrew usage and avoids interpretive expansion beyond the text. Because חַטָּאת
    and אָשָׁם can carry purification/reparation nuances, those alternatives are preserved
    in a footnote rather than elevated into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
