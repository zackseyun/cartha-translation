id: EZK.40.39
reference: Ezekiel 40:39
source:
  edition: WLC
  text: וּ/בְ/אֻלָ֣ם הַ/שַּׁ֗עַר שְׁנַ֤יִם שֻׁלְחָנוֹת֙ מִ/פּ֔וֹ וּ/שְׁנַ֥יִם שֻׁלְחָנ֖וֹת
    מִ/פֹּ֑ה לִ/שְׁח֤וֹט אֲלֵי/הֶם֙ הָ/עוֹלָ֔ה וְ/הַ/חַטָּ֖את וְ/הָ/אָשָֽׁם׃
translation:
  text: And in the portico of the gate were two tables on this side and two tables
    on that side, on which to slaughter the burnt offering, the sin offering, and
    the guilt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the purification offering' for 'the sin offering'; the Hebrew term can
      denote the offering associated with purification from sin/impurity.
    reason: lexical_alternative
  - marker: b
    text: Or 'the reparation offering' for 'the guilt offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאֻלָם
  chosen: And in the portico
  alternatives:
  - And in the vestibule
  - And in the porch
  lexicon: HALOT
  rationale: אֻלָם denotes a porch/vestibule/portico area at the front of a structure.
    'Portico' is clear modern English and fits temple-gate architecture without sounding
    archaic.
- source_word: הַשַּׁעַר
  chosen: of the gate
  alternatives:
  - of the gateway
  lexicon: HALOT
  rationale: שַׁעַר commonly means 'gate' or 'gateway.' Here it refers to the gate
    structure in Ezekiel's temple vision. 'Gate' is concise and natural; the architectural
    sense is preserved by the surrounding wording.
- source_word: שְׁנַיִם שֻׁלְחָנוֹת ... וּשְׁנַיִם שֻׁלְחָנוֹת
  chosen: were two tables on this side and two tables on that side
  alternatives:
  - were two tables here and two tables there
  - were two tables on one side and two tables on the other side
  lexicon: HALOT
  rationale: The repeated numeral plus noun gives a measured architectural description.
    'On this side ... on that side' best captures מִפֹּה ... מִפֹּה idiomatically
    in English while preserving the bilateral layout.
- source_word: מִפּוֹ ... מִפֹּה
  chosen: on this side ... on that side
  alternatives:
  - here ... there
  - from here ... from there
  lexicon: HALOT
  rationale: Though literally 'from here ... from there/here,' in this spatial context
    the phrase indicates opposite sides. English architectural description is best
    served by 'on this side ... on that side.'
- source_word: לִשְׁחֹט
  chosen: to slaughter
  alternatives:
  - to kill
  - to butcher
  lexicon: HALOT
  rationale: שׁחט is the standard sacrificial verb for slaughtering animals. 'Slaughter'
    preserves the ritual-sacrificial sense better than the more generic 'kill' and
    avoids the commercial connotations of 'butcher.'
- source_word: אֲלֵיהֶם
  chosen: on which
  alternatives:
  - upon them
  - on them
  lexicon: HALOT
  rationale: Literally 'upon them,' referring to the tables. English idiom prefers
    the relative construction 'on which' after mentioning the tables.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard term for the burnt offering. This established
    rendering is both accurate and understandable.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the offering associated with sin/purification.
    In sacrificial lists, 'sin offering' is the most recognizable and contextually
    appropriate rendering; 'purification offering' is a viable interpretive alternative
    worth preserving.
- source_word: הָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the reparation offering
  lexicon: HALOT
  rationale: אָשָׁם in sacrificial contexts refers to the offering for guilt/reparation.
    'Guilt offering' is the standard English rendering; 'reparation offering' highlights
    restitution nuance but is less familiar.
