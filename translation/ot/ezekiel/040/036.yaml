id: EZK.40.36
reference: Ezekiel 40:36
source:
  edition: WLC
  text: תא/ו אל/ו ו/אלמ/ו וְ/חַלּוֹנ֥וֹת ל֖/וֹ סָבִ֣יב סָבִ֑יב אֹ֚רֶךְ חֲמִשִּׁ֣ים
    אַמָּ֔ה וְ/רֹ֕חַב חָמֵ֥שׁ וְ/עֶשְׂרִ֖ים אַמָּֽה׀׃
translation:
  text: Its guardrooms, its side pillars, and its portico, with windows all around,
    had a length of fifty cubits and a width of twenty-five cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jambs' or 'pilasters' for 'side pillars.' The Hebrew architectural term
      is somewhat technical.
    reason: lexical_alternative
  - marker: b
    text: Or 'vestibule' or 'porch' for 'portico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּאָיו
  chosen: Its guardrooms
  alternatives:
  - Its chambers
  - Its cells
  lexicon: HALOT
  rationale: תָּא in Ezekiel’s temple vision refers to the small rooms or guard-chambers
    associated with the gate structure. 'Guardrooms' best fits the architectural context
    and common usage in this chapter, while remaining understandable in modern English.
- source_word: אֵלָיו
  chosen: its side pillars
  alternatives:
  - its jambs
  - its pilasters
  lexicon: HALOT
  rationale: The term in this temple-gate context denotes the structural side elements
    of the gateway. 'Side pillars' is clearer for modern readers than the more technical
    'jambs,' while preserving the architectural sense.
- source_word: אֵלַמּוֹ
  chosen: its portico
  alternatives:
  - its vestibule
  - its porch
  lexicon: HALOT
  rationale: אֵילָם/אֵלָם in temple architecture denotes a projecting entrance structure.
    'Portico' is a natural modern architectural equivalent and fits Ezekiel’s repeated
    usage in this chapter.
- source_word: וְחַלּוֹנוֹת לוֹ סָבִיב סָבִיב
  chosen: with windows all around
  alternatives:
  - and it had windows all around
  - and windows belonged to it all around
  lexicon: HALOT
  rationale: The phrase states that the structure had windows on every side. 'With
    windows all around' expresses the circumstantial relation smoothly in English
    without losing the repeated סָבִיב for surrounding placement.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled form intensifies/completes the idea of surrounding placement.
    'All around' is idiomatic modern English and preserves the distributive force.
- source_word: אֹרֶךְ חֲמִשִּׁים אַמָּה
  chosen: had a length of fifty cubits
  alternatives:
  - was fifty cubits long
  - 'length: fifty cubits'
  lexicon: HALOT
  rationale: This gives the gate structure’s measured length. 'Had a length of' is
    slightly more explicit in English prose while remaining close to the Hebrew measurement
    formula.
- source_word: וְרֹחַב חָמֵשׁ וְעֶשְׂרִים אַמָּה
  chosen: and a width of twenty-five cubits
  alternatives:
  - and was twenty-five cubits wide
  - with a breadth of twenty-five cubits
  lexicon: HALOT
  rationale: Standard rendering of the measurement phrase. 'Width' is the clearest
    modern term; 'twenty-five cubits' preserves the source unit rather than converting
    it.
