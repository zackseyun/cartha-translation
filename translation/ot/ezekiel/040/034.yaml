id: EZK.40.34
reference: Ezekiel 40:34
source:
  edition: WLC
  text: ו/אלמ/ו לֶֽ/חָצֵר֙ הַ/חִ֣יצוֹנָ֔ה וְ/תִמֹרִ֥ים אֶל אל/ו מִ/פּ֣וֹ וּ/מִ/פּ֑וֹ
    וּ/שְׁמֹנֶ֥ה מַעֲל֖וֹת מעל/ו־׃
translation:
  text: Its portico faced the outer court, and palm trees were on its jambs, on this
    side and on that side; and eight steps went up to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'palm-tree carvings,' since the term is literal ('palm trees') but likely
      refers to decorative motifs in this architectural context.
    reason: lexical_alternative
  - marker: b
    text: Or 'side pillars' for 'jambs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלַמּוֹ
  chosen: Its portico
  alternatives:
  - And its portico
  - Its vestibule
  lexicon: HALOT
  rationale: אֵלָם in temple-gate contexts refers to the projecting porch/vestibule
    structure. 'Portico' is clear modern English and fits the architectural setting.
    The prefixed conjunction is absorbed into the English sentence flow rather than
    rendered woodenly as sentence-initial 'and.'
- source_word: לֶחָצֵר הַחִיצוֹנָה
  chosen: faced the outer court
  alternatives:
  - was toward the outer court
  - belonged to the outer court
  lexicon: HALOT
  rationale: The preposition ל with this architectural description indicates orientation/direction.
    English idiom is best expressed by 'faced the outer court,' which communicates
    the spatial relation naturally without over-paraphrase.
- source_word: וְתִמֹרִים
  chosen: and palm trees
  alternatives:
  - and palm-tree carvings
  - and palm decorations
  lexicon: HALOT
  rationale: תִמֹרִים literally means 'palm trees.' In temple architecture these are
    likely carved decorative palm motifs, but the Hebrew noun itself is not explicit
    here. The main text keeps the literal 'palm trees,' while the architectural nuance
    is preserved as an alternative.
- source_word: אֶל־אֵלָיו
  chosen: were on its jambs
  alternatives:
  - were on its side pillars
  - were on its projecting supports
  lexicon: HALOT
  rationale: In this recurring gate description, אֵיל/אֵילָיו refers to the structural
    side-posts/jambs of the gateway. 'Jambs' is concise and architecturally appropriate,
    though 'side pillars' is a possible broader rendering.
- source_word: מִפֹּה וּמִפֹּה
  chosen: on this side and on that side
  alternatives:
  - on either side
  - here and there
  lexicon: HALOT
  rationale: The idiom denotes bilateral placement. 'On this side and on that side'
    preserves the distributive feel of the Hebrew more closely than the compressed
    'on either side.'
- source_word: וּשְׁמֹנֶה מַעֲלוֹת
  chosen: and eight steps
  alternatives:
  - and eight stair-steps
  - with eight steps
  lexicon: HALOT
  rationale: מַעֲלוֹת here denotes steps/stairway ascent. 'Eight steps' is the most
    natural and sufficiently precise rendering.
- source_word: מַעֲלוֹ
  chosen: went up to it
  alternatives:
  - its ascent
  - led up to it
  - was its stairway
  lexicon: HALOT
  rationale: The noun denotes the ascent belonging to the structure. In idiomatic
    English, after 'eight steps,' the sense is best completed as 'went up to it,'
    making explicit the function of the steps without distorting the Hebrew.
