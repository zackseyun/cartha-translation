id: EZK.40.11
reference: Ezekiel 40:11
source:
  edition: WLC
  text: וַ/יָּ֛מָד אֶת רֹ֥חַב פֶּֽתַח הַ/שַּׁ֖עַר עֶ֣שֶׂר אַמּ֑וֹת אֹ֣רֶךְ הַ/שַּׁ֔עַר
    שְׁל֥וֹשׁ עֶשְׂרֵ֖ה אַמּֽוֹת־־׃
translation:
  text: 'Then he measured the width of the entrance of the gate: ten cubits, and the
    length of the gate: thirteen cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gateway' instead of 'gate'; the Hebrew שַׁעַר can denote the gate structure
      as a whole, not only the door opening.
    reason: lexical_alternative
  - marker: b
    text: Some translations render the second measurement more interpretively (for
      example, as the depth or span of the gateway), but the Hebrew text simply says
      'the length of the gate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  - He measured
  lexicon: HALOT
  rationale: Wayyiqtol of מדד introduces the next action in the vision sequence. 'Then
    he measured' preserves the narrative progression in natural English.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: Standard dimensional term meaning horizontal extent. 'Width' is the clearest
    modern English equivalent.
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - opening
  - entry
  lexicon: HALOT
  rationale: Refers to the opening or entryway. 'Entrance' reads naturally with 'of
    the gate' and fits architectural description.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: In Ezekiel 40 the term denotes the gate structure/complex. 'Gate' is
    retained as the more direct rendering, while still allowing the architectural
    sense in context.
- source_word: עֶשֶׂר אַמּוֹת
  chosen: ten cubits
  alternatives:
  - ten cubits wide
  lexicon: HALOT
  rationale: The Hebrew gives the measured dimension directly. 'Cubits' preserves
    the ancient unit rather than converting it.
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - depth
  lexicon: HALOT
  rationale: Default sense is linear extent/length. Although some English versions
    render the second dimension in a more interpretive way, 'length' stays closest
    to the Hebrew.
- source_word: שְׁלֹשׁ עֶשְׂרֵה אַמּוֹת
  chosen: thirteen cubits
  alternatives:
  - thirteen cubits long
  lexicon: HALOT
  rationale: Straightforward cardinal number plus unit. Kept formally in line with
    the Hebrew measurement style.
