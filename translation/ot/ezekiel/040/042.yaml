theological_decisions:
- issue: Specificity of זֶבַח in sacrificial terminology
  chosen_reading: Render broadly as 'the sacrifice' rather than specifically 'the
    peace offering.'
  alternative_readings:
  - the peace offering
  rationale: The Hebrew term can denote sacrifice generally or, in some contexts,
    a specific class such as peace offerings. Since the verse itself does not explicitly
    narrow the category, the broader rendering preserves the text's scope and avoids
    importing a more specific cultic classification than the wording demands.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
