id: EZK.40.42
reference: Ezekiel 40:42
source:
  edition: WLC
  text: וְ/אַרְבָּעָה֩ שֻׁלְחָנ֨וֹת לָ/עוֹלָ֜ה אַבְנֵ֣י גָזִ֗ית אֹרֶךְ֩ אַמָּ֨ה אַחַ֤ת
    וָ/חֵ֨צִי֙ וְ/רֹ֨חַב אַמָּ֤ה אַחַת֙ וָ/חֵ֔צִי וְ/גֹ֖בַהּ אַמָּ֣ה אֶחָ֑ת אֲלֵי/הֶ֗ם
    וְ/יַנִּ֤יחוּ אֶת הַ/כֵּלִים֙ אֲשֶׁ֨ר יִשְׁחֲט֧וּ אֶת הָ/עוֹלָ֛ה בָּ֖/ם וְ/הַ/זָּֽבַח־־׃
translation:
  text: And four tables for the burnt offering were of cut stone, a cubit and a half
    long, a cubit and a half wide, and one cubit high. On them they would place the
    implements with which they slaughtered the burnt offering and the sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of hewn stone.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew zebaḥ can mean 'sacrifice' generally; in some contexts it refers
      more specifically to a peace offering.
    reason: alternative_reading
lexical_decisions:
- source_word: שֻׁלְחָנוֹת
  chosen: tables
  alternatives:
  - tables
  - slaughter tables
  lexicon: HALOT
  rationale: The noun denotes tables or table-like surfaces. Since the sacrificial
    function is specified elsewhere in the verse, the simple 'tables' is sufficient
    in the main text without over-interpreting.
- source_word: לָעוֹלָה
  chosen: for the burnt offering
  alternatives:
  - for the burnt offering
  - for burnt offering
  lexicon: HALOT
  rationale: 'עוֹלָה is the standard term for the burnt offering. The prefixed ל marks
    purpose or designation: these tables were for that offering.'
- source_word: אַבְנֵי גָזִית
  chosen: of cut stone
  alternatives:
  - of hewn stone
  - made of cut stones
  lexicon: HALOT
  rationale: The construct phrase refers to dressed/hewn stones. 'Cut stone' is natural
    modern English and preserves the material description.
- source_word: אַמָּה אַחַת וָחֵצִי
  chosen: a cubit and a half
  alternatives:
  - one and a half cubits
  lexicon: HALOT
  rationale: This is the standard measurement expression. 'A cubit and a half' is
    idiomatic and keeps the ancient unit rather than converting it.
- source_word: וְגֹבַהּ אַמָּה אֶחָת
  chosen: and one cubit high
  alternatives:
  - and its height was one cubit
  lexicon: HALOT
  rationale: The suffix on גֹבַהּ means 'its height,' but English expresses the dimension
    naturally as 'one cubit high'.
- source_word: אֲלֵיהֶם
  chosen: On them
  alternatives:
  - upon them
  - on these
  lexicon: HALOT
  rationale: The preposition indicates placement on top of the tables. 'On them' is
    the most natural rendering.
- source_word: וְיַנִּיחוּ
  chosen: they would place
  alternatives:
  - they placed
  - they set down
  - they would set
  lexicon: HALOT
  rationale: The Hiphil of נוח here conveys causing something to rest or be set down.
    An iterative/customary sense fits the temple-instruction context better than a
    simple past.
- source_word: הַכֵּלִים
  chosen: the implements
  alternatives:
  - the utensils
  - the tools
  - the vessels
  lexicon: HALOT
  rationale: כֵּלִים is broad, but in this slaughter context it refers to the instruments
    used in sacrificial preparation. 'Implements' is specific without being overly
    technical.
- source_word: אֲשֶׁר יִשְׁחֲטוּ
  chosen: with which they slaughtered
  alternatives:
  - with which they would slaughter
  - with which they slaughter
  lexicon: HALOT
  rationale: The relative clause modifies the implements. English past-style description
    works smoothly in this visionary architectural report, though the sense is functional
    rather than strictly past-time.
- source_word: הָעוֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: Same sacrificial term as earlier in the verse; consistency favors 'burnt
    offering'.
- source_word: וְהַזָּבַח
  chosen: and the sacrifice
  alternatives:
  - and the slain offering
  - and the peace offering
  lexicon: HALOT
  rationale: זֶבַח is a general term for sacrifice, often one involving slaughter.
    Although in some contexts it can refer more specifically to a peace offering,
    nothing in this verse alone requires that narrower rendering, so the broader 'sacrifice'
    is preferred.
- source_word: בָּם
  chosen: with which
  alternatives:
  - by means of them
  - with them
  lexicon: HALOT
  rationale: The preposition plus pronoun refers back to the implements as the means
    by which the slaughter was performed. In English this is best folded into 'with
    which.'
