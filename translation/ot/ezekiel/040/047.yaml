id: EZK.40.47
reference: Ezekiel 40:47
source:
  edition: WLC
  text: וַ/יָּ֨מָד אֶת הֶ/חָצֵ֜ר אֹ֣רֶךְ מֵאָ֣ה אַמָּ֗ה וְ/רֹ֛חַב מֵאָ֥ה אַמָּ֖ה מְרֻבָּ֑עַת
    וְ/הַ/מִּזְבֵּ֖חַ לִ/פְנֵ֥י הַ/בָּֽיִת־׀׃
translation:
  text: 'Then he measured the court: one hundred cubits long and one hundred cubits
    wide, square; and the altar was before the temple.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtyard.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before the house'; here 'house' refers to the temple building in
      Ezekiel's vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  - He measured
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'Then' gives natural
    English sequence while preserving the past narrative sense of מדד, 'measure.'
- source_word: הֶחָצֵר
  chosen: the court
  alternatives:
  - the courtyard
  lexicon: HALOT
  rationale: חָצֵר commonly denotes an enclosed court/courtyard. 'Court' is concise
    and idiomatic in temple-architecture contexts.
- source_word: אֹרֶךְ מֵאָה אַמָּה
  chosen: one hundred cubits long
  alternatives:
  - a length of one hundred cubits
  lexicon: HALOT
  rationale: This renders the dimensional phrase naturally in English while preserving
    the unit 'cubits' rather than converting it.
- source_word: וְרֹחַב מֵאָה אַמָּה
  chosen: and one hundred cubits wide
  alternatives:
  - and a width of one hundred cubits
  lexicon: HALOT
  rationale: Parallel to the previous dimension, expressed in clear modern English.
- source_word: מְרֻבָּעַת
  chosen: square
  alternatives:
  - four-sided
  - squared
  lexicon: HALOT
  rationale: The passive participial form indicates a square shape. 'Square' is the
    most natural architectural rendering in English.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ in cultic contexts.
- source_word: לִפְנֵי הַבָּיִת
  chosen: before the temple
  alternatives:
  - in front of the temple
  - before the house
  lexicon: HALOT
  rationale: בַּיִת in Ezekiel's temple vision often refers specifically to the temple
    structure rather than a generic 'house.' 'Before' preserves the spatial relation
    of לִפְנֵי, while 'temple' clarifies the referent for English readers.
