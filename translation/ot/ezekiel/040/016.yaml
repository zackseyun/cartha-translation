id: EZK.40.16
reference: Ezekiel 40:16
source:
  edition: WLC
  text: וְ/חַלֹּנ֣וֹת אֲטֻמ֣וֹת אֶֽל הַ/תָּאִ֡ים וְ/אֶל֩ אֵלֵי/הֵ֨מָה לִ/פְנִ֤ימָה
    לַ/שַּׁ֨עַר֙ סָבִ֣יב סָבִ֔יב וְ/כֵ֖ן לָ/אֵֽלַמּ֑וֹת וְ/חַלּוֹנ֞וֹת סָבִ֤יב סָבִיב֙
    לִ/פְנִ֔ימָה וְ/אֶל אַ֖יִל תִּמֹרִֽים־׀׀־׃
translation:
  text: And there were recessed windows toward the guardrooms and toward their side
    pillars, inward, all around the gate; and likewise for the porticos. And windows
    were all around on the inside, and on each pillar were palm-tree decorations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'closed windows,' 'narrow windows,' or 'windows with recessed frames.'
      The Hebrew adjective likely describes a particular architectural form rather
      than windows that could not admit light at all.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for these gateway structural elements (rendered here 'side
      pillars' and 'pillar') are difficult architectural vocabulary; alternatives
      include 'jambs' or 'pilasters.'
    reason: lexical_alternative
  - marker: c
    text: Or 'vestibules' or 'porches' for 'porticos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלֹּנוֹת
  chosen: windows
  alternatives:
  - openings
  lexicon: HALOT
  rationale: The standard sense is 'windows.' In this architectural context, 'openings'
    is possible but less specific.
- source_word: אֲטֻמוֹת
  chosen: recessed
  alternatives:
  - closed
  - narrow
  - blocked
  lexicon: HALOT
  rationale: In Ezekiel's temple vision this adjective describes windows that are
    not open in the ordinary sense, likely fixed or narrowing inward. 'Recessed' communicates
    the architectural idea in readable English better than the misleadingly absolute
    'closed.'
- source_word: הַתָּאִים
  chosen: the guardrooms
  alternatives:
  - the side rooms
  - the chambers
  lexicon: HALOT
  rationale: In Ezekiel 40 the term refers to the gate chambers/guardrooms. 'Guardrooms'
    fits the gatehouse setting and is a common contextual rendering.
- source_word: אֵלֵיהֶמָה
  chosen: their side pillars
  alternatives:
  - their jambs
  - their projecting supports
  lexicon: HALOT
  rationale: The noun from איל in this architectural context refers to structural
    side elements of the gateway, often rendered 'jambs' or 'pilasters.' 'Side pillars'
    is clearer for modern readers while preserving the architectural sense.
- source_word: לִפְנִימָה
  chosen: inward / on the inside
  alternatives:
  - toward the interior
  - insideward
  lexicon: HALOT
  rationale: The adverb indicates orientation toward the interior of the gate structure.
    It is rendered idiomatically in two places according to English flow while preserving
    the same sense.
- source_word: לַשַּׁעַר
  chosen: the gate
  alternatives:
  - the gateway
  lexicon: HALOT
  rationale: Either 'gate' or 'gateway' is possible in this architectural description.
    'Gate' is concise and natural here.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled expression intensifies the circumferential sense. 'All around'
    captures the repetition idiomatically.
- source_word: וְכֵן
  chosen: likewise
  alternatives:
  - and so
  - thus also
  lexicon: HALOT
  rationale: This links the same feature to the next architectural element.
- source_word: אֵלַמּוֹת
  chosen: the porticos
  alternatives:
  - the vestibules
  - the porches
  lexicon: HALOT
  rationale: The term denotes porch-like entrance structures. 'Porticos' is a natural
    modern architectural equivalent; 'vestibules' is possible but more interior-sounding.
- source_word: אַיִל
  chosen: pillar
  alternatives:
  - jamb
  - pilaster
  lexicon: HALOT
  rationale: In the final clause the singular likely has a distributive sense, referring
    to each structural pillar/jamb. 'Pillar' is understandable and fits the decorative
    note.
- source_word: תִּמֹרִים
  chosen: palm-tree decorations
  alternatives:
  - palm trees
  - palm motifs
  lexicon: HALOT
  rationale: The context is architectural ornamentation, not literal planted trees.
    'Palm-tree decorations' makes the implied decorative function explicit in English.
