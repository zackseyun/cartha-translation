id: EZK.40.3
reference: Ezekiel 40:3
source:
  edition: WLC
  text: וַ/יָּבֵ֨יא אוֹתִ֜/י שָׁ֗מָּ/ה וְ/הִנֵּה אִישׁ֙ מַרְאֵ֨/הוּ֙ כְּ/מַרְאֵ֣ה
    נְחֹ֔שֶׁת וּ/פְתִיל פִּשְׁתִּ֥ים בְּ/יָד֖/וֹ וּ/קְנֵ֣ה הַ/מִּדָּ֑ה וְ/ה֥וּא עֹמֵ֖ד
    בַּ/שָּֽׁעַר־־׃
translation:
  text: He brought me there, and behold, there was a man whose appearance was like
    the appearance of bronze, with a linen cord in his hand and a measuring reed;
    and he was standing in the gateway.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whose appearance was like bronze.' The Hebrew repeats 'appearance'
      for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or, 'a cord of flax' or 'a flax line.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'at the gate.' The Hebrew term can refer to the gate structure or gateway
      area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: He brought
  alternatives:
  - Then he brought
  - And he brought
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can omit an explicit
    connective for natural style while preserving sequence. The subject remains the
    previously mentioned guide/agent.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  - thither
  lexicon: HALOT
  rationale: The adverb indicates movement to the location just described. 'There'
    is natural modern English and sufficiently precise in context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: This discourse marker signals a vivid new sight in the vision. 'Behold'
    preserves the prophetic register better than flatter alternatives.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a male figure
  lexicon: HALOT
  rationale: The Hebrew is the ordinary masculine singular noun 'man.' Per gender-accurate
    policy, 'man' is retained rather than neutralized.
- source_word: מַרְאֵהוּ כְּמַרְאֵה נְחֹשֶׁת
  chosen: whose appearance was like the appearance of bronze
  alternatives:
  - whose appearance was like bronze
  - with an appearance like gleaming bronze
  - whose appearance was like the appearance of copper
  lexicon: HALOT
  rationale: The Hebrew repeats מַרְאֶה/appearance, and the translation preserves
    that repetition rather than collapsing it entirely. נְחֹשֶׁת can denote bronze/copper;
    'bronze' is the most idiomatic and traditional fit for a radiant metallic appearance
    in visionary description.
- source_word: פְּתִיל פִּשְׁתִּים
  chosen: a linen cord
  alternatives:
  - a cord of flax
  - a flax line
  lexicon: HALOT
  rationale: The phrase denotes a cord made of flax/linen, likely for measuring. 'Linen
    cord' is clear modern English; 'flax line' is possible but less natural.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in his hands
  - at his side
  lexicon: HALOT
  rationale: Singular is explicit in Hebrew and should be preserved.
- source_word: קְנֵה הַמִּדָּה
  chosen: a measuring reed
  alternatives:
  - the measuring reed
  - a reed for measuring
  - a measuring rod
  lexicon: HALOT
  rationale: This is a reed used as a measuring instrument. English idiom favors 'measuring
    reed.' The Hebrew construction is definite in function but indefinite in introduction,
    so 'a measuring reed' fits the scene.
- source_word: וְהוּא עֹמֵד
  chosen: and he was standing
  alternatives:
  - and he stood
  - while he stood
  lexicon: HALOT
  rationale: The participle presents the figure in a continuing posture within the
    scene. 'Was standing' captures the descriptive aspect better than simple past
    'stood.'
- source_word: בַּשַּׁעַר
  chosen: in the gateway
  alternatives:
  - at the gate
  - in the gate
  lexicon: HALOT
  rationale: In this temple-vision context, שַׁעַר often refers not merely to a door
    but to a gate structure/gateway. 'In the gateway' best fits the architectural
    setting and the preposition ב.
