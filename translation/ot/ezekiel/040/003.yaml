theological_decisions:
- issue: Identity of the 'man' in the vision
  chosen_reading: Rendered simply as 'a man' without identifying him as an angel or
    theophany.
  alternative_readings:
  - an angelic messenger
  - a divine/theophanic figure
  rationale: The Hebrew text itself only says 'a man' and describes his appearance
    and measuring instruments. The translation should not import a more specific identification
    that the verse does not explicitly make.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
