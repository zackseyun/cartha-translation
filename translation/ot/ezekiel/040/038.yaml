id: EZK.40.38
reference: Ezekiel 40:38
source:
  edition: WLC
  text: וְ/לִשְׁכָּ֣ה וּ/פִתְחָ֔/הּ בְּ/אֵילִ֖ים הַ/שְּׁעָרִ֑ים שָׁ֖ם יָדִ֥יחוּ אֶת
    הָ/עֹלָֽה־׃
translation:
  text: There was a chamber with its doorway by the gateposts of the gates; there
    they would rinse the burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew architectural term rendered 'gateposts' may also be understood
      as 'vestibules,' 'projecting pillars,' or a similar structural feature of the
      gate complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁכָּה
  chosen: a chamber
  alternatives:
  - a room
  - a cell
  lexicon: HALOT
  rationale: לשכה commonly denotes a chamber or room within a larger temple/gate complex.
    'Chamber' fits the architectural setting of Ezekiel 40 and preserves the formal
    sense better than the more generic 'room'.
- source_word: וּפִתְחָהּ
  chosen: with its doorway
  alternatives:
  - and its entrance
  - and its opening
  lexicon: HALOT
  rationale: פתח with 3fs suffix refers to the chamber's entrance/opening. Rendering
    the conjunction plus noun idiomatically as 'with its doorway' produces natural
    English while preserving the possessive relation.
- source_word: בְּאֵילִים
  chosen: by the gateposts
  alternatives:
  - by the vestibules
  - by the projecting pillars
  - in the porticos
  lexicon: HALOT
  rationale: אֵילִים in Ezekiel's temple vision is a technical architectural term
    often understood as gateposts/pilasters. 'Gateposts' is the clearest accessible
    rendering. Because the exact architectural referent is debated, alternatives are
    preserved in a footnote.
- source_word: הַשְּׁעָרִים
  chosen: of the gates
  alternatives:
  - of the gate structures
  lexicon: HALOT
  rationale: The plural likely refers to the gate complexes in this visionary temple
    architecture. 'Of the gates' is a straightforward rendering that keeps the plural.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb indicating the place just described.
- source_word: יָדִיחוּ
  chosen: they would rinse
  alternatives:
  - they rinse
  - they wash
  lexicon: HALOT
  rationale: 'The Hiphil of דוח here refers to rinsing/washing sacrificial material.
    ''Rinse'' is slightly more precise in a ritual-preparation context than the broader
    ''wash.'' The imperfect is rendered with customary/habitual force in this descriptive
    vision: ''they would rinse.'''
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: עלה is the standard term for the burnt offering. 'Burnt offering' is
    the established and accurate English equivalent.
