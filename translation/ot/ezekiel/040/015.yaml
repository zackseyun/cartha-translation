id: EZK.40.15
reference: Ezekiel 40:15
source:
  edition: WLC
  text: וְ/עַ֗ל פְּנֵי֙ הַ/שַּׁ֣עַר ה/יאתון עַל לִ/פְנֵ֕י אֻלָ֥ם הַ/שַּׁ֖עַר הַ/פְּנִימִ֑י
    חֲמִשִּׁ֖ים אַמָּֽה־׃
translation:
  text: And from the front of the outer gateway to the front of the vestibule of the
    inner gate was fifty cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew text is difficult at 'the outer gateway'; the underlying term is
      unusual here. Many interpreters understand it to mean the outer gate/gateway
      from the context of the surrounding measurements.
    reason: textual_variant
  - marker: b
    text: Or 'porch' for 'vestibule.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'gate' may also be rendered 'gateway' in this chapter because it
      refers to a gate-complex rather than only the doors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And from
  alternatives:
  - And upon
  - Now from
  lexicon: HALOT
  rationale: In this measurement context, the preposition introduces the starting
    point of a distance rather than a literal vertical relation. 'And from' gives
    natural English while preserving the connective force of waw.
- source_word: פְּנֵי
  chosen: the front of
  alternatives:
  - the face of
  - the surface of
  lexicon: HALOT
  rationale: פָּנִים in architectural measurement idiom refers to the front or facing
    side. 'Front of' is the clearest idiomatic rendering in English.
- source_word: הַשַּׁעַר
  chosen: the gateway
  alternatives:
  - the gate
  lexicon: HALOT
  rationale: In Ezekiel 40 the term denotes a substantial gate-structure, not merely
    doors. 'Gateway' better reflects the architectural complex being measured.
- source_word: היאתון
  chosen: the outer
  alternatives:
  - the eastern
  - the entrance
  lexicon: HALOT
  rationale: The ketiv here is difficult, but in context and by comparison with the
    repeated architectural terminology in the chapter, it refers to the outer gate/gateway.
    'Outer' fits the measurement sequence from outer to inner structures.
- source_word: לִפְנֵי
  chosen: to the front of
  alternatives:
  - before
  - up to the front of
  lexicon: HALOT
  rationale: This prepositional phrase marks the endpoint of the measured span. 'To
    the front of' preserves the spatial precision of the Hebrew.
- source_word: אֻלָם
  chosen: the vestibule
  alternatives:
  - the porch
  - the portico
  lexicon: HALOT
  rationale: In temple architecture אוּלָם denotes a porch-like entrance hall. 'Vestibule'
    is precise and readable in modern English.
- source_word: הַשַּׁעַר הַפְּנִימִי
  chosen: the inner gate
  alternatives:
  - the inner gateway
  lexicon: HALOT
  rationale: This identifies the gate on the inner side of the complex. 'Inner gate'
    is concise; the architectural sense remains clear because 'vestibule' already
    signals a built structure.
- source_word: חֲמִשִּׁים אַמָּה
  chosen: fifty cubits
  alternatives:
  - fifty cubit-lengths
  lexicon: HALOT
  rationale: Standard rendering for the measurement expression; 'cubits' is conventional
    and sufficiently transparent for a temple-measurement text.
