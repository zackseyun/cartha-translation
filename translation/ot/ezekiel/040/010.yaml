id: EZK.40.10
reference: Ezekiel 40:10
source:
  edition: WLC
  text: וְ/תָאֵ֨י הַ/שַּׁ֜עַר דֶּ֣רֶךְ הַ/קָּדִ֗ים שְׁלֹשָׁ֤ה מִ/פֹּה֙ וּ/שְׁלֹשָׁ֣ה
    מִ/פֹּ֔ה מִדָּ֥ה אַחַ֖ת לִ/שְׁלָשְׁתָּ֑/ם וּ/מִדָּ֥ה אַחַ֛ת לָ/אֵילִ֖ם מִ/פֹּ֥ה
    וּ/מִ/פּֽוֹ׃
translation:
  text: And the guardrooms of the gate facing east were three on this side and three
    on that side; the three of them had one measure, and the side pillars had one
    measure on this side and on that side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'side rooms' for 'guardrooms'; the Hebrew term refers to small chambers
      built into the gate structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'jambs' or 'pilasters' for 'side pillars'; the exact architectural term
      is debated in Ezekiel's temple vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָאֵי
  chosen: guardrooms
  alternatives:
  - side rooms
  - alcoves
  - cells
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, תָאִים refers to the small chambers built
    into the gate structure. 'Guardrooms' best conveys their likely function in a
    gate complex while remaining natural English. 'Cells' is too harsh and 'alcoves'
    too architectural but less functional.
- source_word: הַשַּׁעַר
  chosen: the gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: Standard rendering for שער. 'Gate' is concise and fits the architectural
    description; 'gateway' is possible but less direct here.
- source_word: דֶּרֶךְ הַקָּדִים
  chosen: facing east
  alternatives:
  - toward the east
  - on the east side
  lexicon: HALOT
  rationale: The phrase literally means 'way of the east' and in context identifies
    the orientation of the gate. 'Facing east' is idiomatic and precise.
- source_word: שְׁלֹשָׁה מִפֹּה וּשְׁלֹשָׁה מִפֹּה
  chosen: three on this side and three on that side
  alternatives:
  - three here and three there
  - three on one side and three on the other
  lexicon: HALOT
  rationale: The deictic expressions indicate corresponding placements on opposite
    sides of the gate passage. 'On this side ... on that side' preserves the spatial
    symmetry.
- source_word: מִדָּה אַחַת לִשְׁלָשְׁתָּם
  chosen: the three of them had one measure
  alternatives:
  - all three had the same measurement
  - one size for the three of them
  lexicon: HALOT
  rationale: The Hebrew emphasizes uniformity of dimensions among the three chambers.
    'One measure' keeps the architectural language of the source while remaining readable.
- source_word: אֵילִם
  chosen: side pillars
  alternatives:
  - porch pillars
  - jambs
  - pilasters
  lexicon: HALOT
  rationale: In Ezekiel's temple architecture, אֵילִים refers to prominent structural
    uprights associated with the gate. 'Side pillars' is understandable modern English
    and avoids overtechnical terminology, while signaling architectural supports rather
    than animals ('rams,' a different sense of the consonants).
- source_word: וּמִדָּה אַחַת לָאֵילִם מִפֹּה וּמִפּוֹ
  chosen: the side pillars had one measure on this side and on that side
  alternatives:
  - the pillars on this side and that side had the same measurement
  lexicon: HALOT
  rationale: This clause mirrors the previous statement of uniform dimensions, now
    applied to the gate's uprights on both sides. The rendering preserves the repetition
    and symmetry of the Hebrew.
