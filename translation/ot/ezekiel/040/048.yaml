id: EZK.40.48
reference: Ezekiel 40:48
source:
  edition: WLC
  text: וַ/יְבִאֵ/נִי֮ אֶל אֻלָ֣ם הַ/בַּיִת֒ וַ/יָּ֨מָד֙ אֵ֣ל אֻלָ֔ם חָמֵ֤שׁ אַמּוֹת֙
    מִ/פֹּ֔ה וְ/חָמֵ֥שׁ אַמּ֖וֹת מִ/פֹּ֑ה וְ/רֹ֣חַב הַ/שַּׁ֔עַר שָׁלֹ֤שׁ אַמּוֹת֙
    מִ/פּ֔וֹ וְ/שָׁלֹ֥שׁ אַמּ֖וֹת מִ/פּֽוֹ־׃
translation:
  text: 'Then he brought me to the vestibule of the house, and he measured the jambs
    of the vestibule: five cubits on this side and five cubits on that side; and the
    width of the gate was three cubits on this side and three cubits on that side.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'portico' or 'porch' for 'vestibule.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house'; in this vision, the temple building is meant.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'jambs' is an architectural word that can also
      be translated 'posts' or 'side pillars.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֻלָם
  chosen: vestibule
  alternatives:
  - portico
  - porch
  lexicon: HALOT
  rationale: In temple architecture this term denotes the entrance hall/porch area
    before the main structure. 'Vestibule' is precise and readable modern English,
    avoiding the more domestic feel of 'porch' while still natural.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Hebrew literally says 'the house.' In Ezekiel's temple vision this refers
    to the temple building, but retaining 'house' preserves the source wording and
    its architectural/theological resonance.
- source_word: אֵל אֻלָם
  chosen: the jambs of the vestibule
  alternatives:
  - the side pillars of the vestibule
  - the posts of the vestibule
  lexicon: HALOT
  rationale: The noun אֵל here is an architectural term for the side structures/posts
    at the entrance, not the common word 'God.' 'Jambs' best fits the immediate context
    of measured entrance sides and pairs naturally with the bilateral measurements
    'on this side ... on that side.'
- source_word: חָמֵשׁ אַמּוֹת ... מִפֹּה וְחָמֵשׁ אַמּוֹת מִפֹּה
  chosen: five cubits on this side and five cubits on that side
  alternatives:
  - five cubits from here and five cubits from there
  lexicon: HALOT
  rationale: The deictic expressions indicate the two corresponding sides of the entrance.
    English idiom is best served by 'on this side ... on that side.'
- source_word: רֹחַב הַשַּׁעַר
  chosen: the width of the gate
  alternatives:
  - the width of the entrance
  - the breadth of the gateway
  lexicon: HALOT
  rationale: שַׁעַר commonly means 'gate/gateway.' In this architectural context it
    refers to the entrance opening. 'Gate' is a straightforward rendering, while the
    measured width clarifies that the opening is in view.
- source_word: שָׁלֹשׁ אַמּוֹת מִפּוֹ וְשָׁלֹשׁ אַמּוֹת מִפּוֹ
  chosen: three cubits on this side and three cubits on that side
  alternatives:
  - three cubits from here and three cubits from there
  lexicon: HALOT
  rationale: As above, the repeated deictic phrasing marks the two sides of the entrance.
    The chosen rendering is clear and mirrors the Hebrew structure.
- source_word: וַיְבִאֵנִי ... וַיָּמָד
  chosen: Then he brought me ... and he measured
  alternatives:
  - And he brought me ... and measured
  lexicon: HALOT
  rationale: The waw-consecutive verbal sequence advances the vision narrative. Supplying
    'Then' gives natural English narrative flow without over-paraphrasing, and repeating
    'he' maintains clarity.
