id: EZK.40.13
reference: Ezekiel 40:13
source:
  edition: WLC
  text: וַ/יָּ֣מָד אֶת הַ/שַּׁ֗עַר מִ/גַּ֤ג הַ/תָּא֙ לְ/גַגּ֔/וֹ רֹ֕חַב עֶשְׂרִ֥ים
    וְ/חָמֵ֖שׁ אַמּ֑וֹת פֶּ֖תַח נֶ֥גֶד פָּֽתַח־׃
translation:
  text: 'Then he measured the gateway from the roof of one guardroom to its roof:
    twenty-five cubits wide, doorway opposite doorway.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the roof of the side room to its roof.' The Hebrew term תָּא refers
      to a chamber within the gate structure, often understood here as a guardroom.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'doorway opposite doorway,' describing entrances facing each
      other across the gateway.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English sequence
    while preserving the simple past action.
- source_word: הַשַּׁעַר
  chosen: the gateway
  alternatives:
  - the gate
  lexicon: HALOT
  rationale: In Ezekiel 40 the term refers to the gate structure/complex, not merely
    the door leaf or opening, so 'gateway' better fits the architectural context.
- source_word: מִגַּג הַתָּא לְגַגּוֹ
  chosen: from the roof of one guardroom to its roof
  alternatives:
  - from the roof of the side room to its roof
  - from roof to roof
  lexicon: HALOT
  rationale: תָּא in this temple vision denotes a guardroom/side chamber within the
    gate structure. The pronominal suffix on גַגּוֹ is singular ('its roof'), referring
    back to the corresponding roof across the span. English supplies 'one' to make
    the measurement intelligible.
- source_word: רֹחַב
  chosen: wide
  alternatives:
  - in width
  - as the width was
  lexicon: HALOT
  rationale: 'The noun states the dimension being measured. Rendering it adjectivally
    after the number is idiomatic English: ''twenty-five cubits wide.'''
- source_word: עֶשְׂרִים וְחָמֵשׁ אַמּוֹת
  chosen: twenty-five cubits
  alternatives:
  - twenty and five cubits
  lexicon: HALOT
  rationale: Standard contemporary English number expression with the ancient unit
    retained formally.
- source_word: פֶּתַח נֶגֶד פָּתַח
  chosen: doorway opposite doorway
  alternatives:
  - opening opposite opening
  - entrance facing entrance
  - doorway across from doorway
  lexicon: HALOT
  rationale: The repeated noun with נֶגֶד expresses corresponding entrances facing
    each other across the measured width. 'Doorway opposite doorway' is concise and
    preserves the architectural symmetry.
