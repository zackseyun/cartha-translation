id: EZK.35.3
reference: Ezekiel 35:3
source:
  edition: WLC
  text: וְ/אָמַ֣רְתָּ לּ֗/וֹ כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֥י אֵלֶ֖י/ךָ הַר
    שֵׂעִ֑יר וְ/נָטִ֤יתִי יָדִ/י֙ עָלֶ֔י/ךָ וּ/נְתַתִּ֖י/ךָ שְׁמָמָ֥ה וּ/מְשַׁמָּֽה־׃
translation:
  text: 'and say to it, ‘Thus says the Lord GOD: Behold, I am against you, Mount Seir,
    and I will stretch out my hand against you and make you a desolation and a waste.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and make you a desolation and an object of horror/astonishment.' The
      second noun can carry the sense of devastation that evokes horror.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Rendered with small-caps covenant name convention as 'the Lord GOD.'
    Per doctrine, יְהוָה defaults to 'the LORD'; in the compound אֲדֹנָי יְהוִה, English
    tradition commonly uses 'Lord GOD' to avoid 'Lord LORD.' This preserves both titles
    while remaining readable.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Behold
  lexicon: HALOT
  rationale: Introduces a solemn divine declaration. 'Behold' preserves the prophetic
    force better than the more colloquial 'look' or 'see'.
- source_word: אֵלֶיךָ
  chosen: I am against you
  alternatives:
  - I am against you
  - I am coming against you
  lexicon: HALOT
  rationale: With הִנְנִי plus אֶל in judgment contexts, the idiom signals hostile
    opposition. 'I am against you' is the standard and clear English rendering.
- source_word: הַר שֵׂעִיר
  chosen: Mount Seir
  alternatives:
  - the hill country of Seir
  - mountain of Seir
  lexicon: HALOT
  rationale: As a proper geographic name, transliterated 'Seir' and rendered הַר in
    the conventional singular form 'Mount,' which works naturally in direct address
    to the region/personified mountain.
- source_word: וְנָטִיתִי יָדִי עָלֶיךָ
  chosen: I will stretch out my hand against you
  alternatives:
  - I will extend my hand against you
  - I will turn my hand against you
  lexicon: HALOT
  rationale: This is a common judgment idiom. 'Stretch out my hand against you' preserves
    the metaphor and its judicial/punitive force.
- source_word: וּנְתַתִּיךָ
  chosen: make you
  alternatives:
  - set you as
  - make you
  - turn you into
  lexicon: HALOT
  rationale: In context with the following nouns of devastation, the verb means to
    cause the object to become something. 'Make you' is concise and idiomatic.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolation
  - wasteland
  - horror
  lexicon: HALOT
  rationale: 'Conveys devastated ruin. The noun is rendered concretely with the article
    in English for natural style: ''a desolation.'''
- source_word: וּמְשַׁמָּה
  chosen: and a waste
  alternatives:
  - and a waste
  - and an object of horror
  - and a devastation
  lexicon: HALOT
  rationale: Paired with שְׁמָמָה, this second noun intensifies the judgment. 'Waste'
    preserves the semantic field of ruin without collapsing the pair into a single
    English term; an alternative nuance of 'object of horror/astonishment' is worth
    preserving in a footnote.
- source_word: וְאָמַרְתָּ לּוֹ
  chosen: and say to it
  alternatives:
  - and say to him
  - and say to it
  lexicon: HALOT
  rationale: Although the pronominal suffix is grammatically masculine singular, the
    addressee is the personified geographic entity Mount Seir. English 'it' fits the
    mountain referent while retaining the personification through direct address.
