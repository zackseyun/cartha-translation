theological_decisions:
- issue: Rendering the divine name in the compound אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt sets the default for יְהוָה as 'the LORD.' In this
    compound, however, strict application would produce awkward English ('Lord LORD').
    'The Lord GOD' is the standard equivalent that preserves reverence and distinguishes
    the two Hebrew elements without introducing a transliterated divine name into
    the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation
    philosophy #6'
