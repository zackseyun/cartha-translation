id: EZK.35.12
reference: Ezekiel 35:12
source:
  edition: WLC
  text: וְֽ/יָדַעְתָּ֮ כִּֽי אֲנִ֣י יְהוָה֒ שָׁמַ֣עְתִּי אֶת כָּל נָאָֽצוֹתֶ֗י/ךָ
    אֲשֶׁ֥ר אָמַ֛רְתָּ עַל הָרֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֣ר שממה לָ֥/נוּ נִתְּנ֖וּ לְ/אָכְלָֽה־׀־־־׀׃
translation:
  text: Then you will know that I am the LORD. I have heard all your blasphemies that
    you spoke against the mountains of Israel, saying, ‘They are desolate; they have
    been given to us for food.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all your contemptuous words' or 'all your revilings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ
  chosen: Then you will know
  alternatives:
  - And you will know
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed waw in prophetic discourse commonly carries
    a future/result sense. 'Then' brings out the consequential force in context without
    over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: 'The perfect is rendered with present relevance in English: God has heard
    and therefore will act. ''I have heard'' preserves that force naturally.'
- source_word: נָאָצוֹתֶיךָ
  chosen: blasphemies
  alternatives:
  - contemptuous words
  - revilings
  - insults
  lexicon: HALOT
  rationale: From נאץ, denoting scornful or contemptuous speech, often against God
    or what belongs to him. Because the speech is directed against 'the mountains
    of Israel' in a context where God identifies with his land and people, 'blasphemies'
    fittingly conveys the gravity. A lexical alternative is preserved in a footnote
    because 'contemptuous words' is also defensible.
- source_word: עַל הָרֵי יִשְׂרָאֵל
  chosen: against the mountains of Israel
  alternatives:
  - concerning the mountains of Israel
  lexicon: HALOT
  rationale: The preposition עַל with hostile speech here is best rendered 'against,'
    reflecting antagonism rather than mere topic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard quotative introduction.
- source_word: שָׁמֵמָה
  chosen: They are desolate
  alternatives:
  - It is desolate
  - A desolation
  lexicon: HALOT
  rationale: Though formally singular/feminine, the predicate refers collectively
    to the mountains/land of Israel. English idiom naturally uses plural agreement
    with the implied referent.
- source_word: נִתְּנוּ לָנוּ לְאָכְלָה
  chosen: they have been given to us for food
  alternatives:
  - they have been given to us to devour
  - they are given to us as prey
  lexicon: HALOT
  rationale: The Niphal of נתן plus לְאָכְלָה expresses being handed over for consumption.
    'For food' is a transparent rendering; 'to devour' is more idiomatic but slightly
    more interpretive.
