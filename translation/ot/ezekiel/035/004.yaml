id: EZK.35.4
reference: Ezekiel 35:4
source:
  edition: WLC
  text: עָרֶ֨י/ךָ֙ חָרְבָּ֣ה אָשִׂ֔ים וְ/אַתָּ֖ה שְׁמָמָ֣ה תִֽהְיֶ֑ה וְ/יָדַעְתָּ֖ כִּֽי אֲנִ֥י יְהוָֽה־׃
translation:
  text: I will make your cities ruins, and you will become a desolation; then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (traditionally rendered ''the LORD''); alternatively transliterated ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עָרֶיךָ
  chosen: your cities
  alternatives:
  - your towns
  lexicon: HALOT
  rationale: The plural construct of עִיר with 2ms suffix refers to the inhabited urban centers belonging to the addressee. 'Cities' is the standard and most natural rendering in prophetic judgment contexts.
- source_word: חָרְבָּה
  chosen: ruins
  alternatives:
  - waste places
  - a ruin
  lexicon: HALOT
  rationale: The noun denotes a state of devastation or ruined condition. With אָשִׂים ('I will make/set'), idiomatic English is 'make ... ruins' rather than the more wooden 'make ... a ruin' when the object is plural.
- source_word: אָשִׂים
  chosen: I will make
  alternatives:
  - I will set
  - I will turn into
  lexicon: HALOT
  rationale: שׂוּם commonly means 'put, set, make.' In this causative-like construction with a predicate noun, 'I will make' is the clearest English equivalent.
- source_word: וְאַתָּה
  chosen: and you
  alternatives:
  - and as for you
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis, contrasting the fate of the cities with the fate of the addressee. 'And you' preserves the directness; the emphasis is adequately conveyed in English without overtranslation.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - a wasteland
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. Because it stands as the predicate complement of תִהְיֶה, the nominal rendering 'become a desolation' preserves the Hebrew structure and prophetic force better than the adjectival 'be desolate.'
- source_word: תִהְיֶה
  chosen: you will become
  alternatives:
  - you will be
  lexicon: HALOT
  rationale: היה can mean 'be' or 'become.' Here, in a judgment pronouncement following 'I will make your cities ruins,' 'become' better captures the transition into a state of desolation.
- source_word: וְיָדַעְתָּ
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction links consequence/result after judgment. 'Then' makes the discourse relation explicit in natural English while remaining faithful to the prophetic formula.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: This is the standard recognition formula in Ezekiel. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'That I am the LORD' preserves both covenantal identity and the formulaic force.
