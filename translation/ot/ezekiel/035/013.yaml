theological_decisions:
- issue: Rendering of divine response to arrogant speech
  chosen_reading: The verse is translated as direct divine accusation of hostile,
    boastful speech against God, without softening the offense into mere speaking
    about God.
  alternative_readings:
  - The speech could be rendered more generally as speaking proudly concerning me.
  rationale: The repeated עָלַי and the verbs of self-exaltation and multiplying words
    indicate antagonistic speech directed against God. The translation preserves the
    gravity of rebellion without adding doctrinal interpretation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
