id: EZK.35.13
reference: Ezekiel 35:13
source:
  edition: WLC
  text: וַ/תַּגְדִּ֤ילוּ עָלַ/י֙ בְּ/פִי/כֶ֔ם וְ/הַעְתַּרְתֶּ֥ם עָלַ֖/י דִּבְרֵי/כֶ֑ם
    אֲנִ֖י שָׁמָֽעְתִּי׃ס
translation:
  text: And with your mouth you magnified yourselves against me, and multiplied your
    words against me; I myself have heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you boasted against me'; the Hebrew literally speaks of making yourselves
      great against God.
    reason: lexical_alternative
  - marker: b
    text: Or 'heaped up your words against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּגְדִּילוּ
  chosen: you magnified yourselves
  alternatives:
  - you boasted
  - you made yourselves great
  lexicon: HALOT
  rationale: From גדל in the Hiphil, here used idiomatically of making oneself great
    in speech against God. 'Magnified yourselves' preserves the verbal imagery and
    the adversative sense with עָלַי; 'boasted' is a plausible dynamic alternative
    but is less formally transparent.
- source_word: עָלַי
  chosen: against me
  alternatives:
  - over me
  - concerning me
  lexicon: HALOT
  rationale: The preposition עַל with hostile speech in this context is best rendered
    'against me,' conveying opposition rather than mere topic.
- source_word: בְּפִיכֶם
  chosen: with your mouth
  alternatives:
  - by your mouth
  - with your speech
  lexicon: HALOT
  rationale: A fairly literal rendering of the instrumental beth + 'mouth.' 'With
    your mouth' keeps the concrete Hebrew expression and suits the parallel with 'your
    words' in the next clause.
- source_word: וְהַעְתַּרְתֶּם
  chosen: multiplied
  alternatives:
  - heaped up
  - made many
  lexicon: HALOT
  rationale: From עתר in the Hiphil, likely 'to make abundant' or 'multiply.' In context
    of hostile speech, 'multiplied' naturally conveys piling up words. 'Heaped up'
    is idiomatic but more interpretive.
- source_word: דִּבְרֵיכֶם
  chosen: your words
  alternatives:
  - your speeches
  - your statements
  lexicon: HALOT
  rationale: The common noun דבר is best kept as 'words' here, matching the concrete
    accusation of spoken hostility.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - as for me, I
  lexicon: HALOT
  rationale: The explicit pronoun before the verb is emphatic. 'I myself' reflects
    that emphasis in natural English.
- source_word: שָׁמָעְתִּי
  chosen: have heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: 'The perfect can be rendered as a present-result perfect in English:
    God has heard and therefore knows their speech. This fits the judicial tone of
    the oracle.'
