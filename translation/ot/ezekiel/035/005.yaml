id: EZK.35.5
reference: Ezekiel 35:5
source:
  edition: WLC
  text: יַ֗עַן הֱי֤וֹת לְ/ךָ֙ אֵיבַ֣ת עוֹלָ֔ם וַ/תַּגֵּ֥ר אֶת בְּנֵֽי יִשְׂרָאֵ֖ל
    עַל יְדֵי חָ֑רֶב בְּ/עֵ֣ת אֵידָ֔/ם בְּ/עֵ֖ת עֲוֺ֥ן קֵֽץ־־־־׃
translation:
  text: Because you had an everlasting enmity and handed over the sons of Israel to
    the power of the sword at the time of their disaster, at the time of the punishment
    of the end,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the people of Israel.'' Hebrew: ''the sons of
      Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'at the time of final iniquity' or 'at the time when guilt reached its
      end.' The Hebrew phrase is difficult and may refer either to iniquity/guilt
      or to its punishment.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Because that
  lexicon: HALOT
  rationale: Introduces the reason for the judgment in the surrounding context. 'Because'
    is natural modern English and preserves the causal force.
- source_word: הֱיוֹת לְךָ אֵיבַת עוֹלָם
  chosen: you had an everlasting enmity
  alternatives:
  - there was for you perpetual hostility
  - you possessed ancient hatred
  lexicon: HALOT
  rationale: The infinitive construction with לְךָ expresses a state belonging to
    Edom/Seir. 'Everlasting enmity' captures both the enduring nature of עוֹלָם and
    the noun אֵיבָה as hostility/enmity. 'Ancient hatred' is possible, but 'everlasting'
    better reflects the common force of עוֹלָם here.
- source_word: וַתַּגֵּר
  chosen: handed over
  alternatives:
  - delivered up
  - poured out
  - dragged away
  lexicon: HALOT
  rationale: From נגר in the Hiphil, likely with the sense of giving over or delivering
    over. In context with 'to the power of the sword,' 'handed over' best fits the
    idiom and avoids the overly literal but obscure 'poured out.'
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Retains the familial/corporate expression of the Hebrew. This follows
    the project's gender-accurate principle; a more idiomatic collective alternative
    is possible but less formally transparent.
- source_word: עַל יְדֵי חָרֶב
  chosen: to the power of the sword
  alternatives:
  - into the hands of the sword
  - over to the sword
  - by the sword
  lexicon: HALOT
  rationale: Literally 'upon the hands of the sword,' an idiom for being given into
    deadly violence. 'To the power of the sword' conveys the metaphor clearly in English
    while preserving the sense of being surrendered to lethal force.
- source_word: בְּעֵת אֵידָם
  chosen: at the time of their disaster
  alternatives:
  - in the time of their calamity
  - at the time of their ruin
  lexicon: HALOT
  rationale: אֵיד denotes calamity/disaster. 'Disaster' is clear modern English and
    fits the prophetic judgment context.
- source_word: בְּעֵת עֲוֺן קֵץ
  chosen: at the time of the punishment of the end
  alternatives:
  - at the time of final punishment
  - at the time when iniquity reached its end
  - at the time of the iniquity of the end
  lexicon: HALOT
  rationale: 'The phrase is compressed and somewhat difficult. עָוֹן can denote guilt,
    iniquity, or its consequent punishment. In judgment contexts, ''punishment'' is
    a well-attested extension and yields coherent sense: the climactic time when punishment
    had reached its end-point. This avoids overinterpreting the syntax while preserving
    the solemnity of קֵץ (''end'').'
