theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the people of Israel
  - the Israelites
  rationale: The Hebrew is explicitly filial/corporate rather than a generic ethnonym.
    Following the doctrine's gender-accurate principle, the translation preserves
    the source form in the main text while allowing a more idiomatic collective sense
    as an alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Sense of עֲוֺן in בְּעֵת עֲוֺן קֵץ
  chosen_reading: punishment
  alternative_readings:
  - iniquity
  - guilt
  rationale: The Hebrew term can denote either sin/guilt or the punishment borne for
    it. In this prophetic judgment formula, 'punishment' best fits the temporal expression
    and the surrounding context of calamity and sword. The alternative is preserved
    because the phrase is genuinely difficult.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
