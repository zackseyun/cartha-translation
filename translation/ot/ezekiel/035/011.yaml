theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of וְנוֹדַעְתִּי בָם
  chosen_reading: I will make myself known among them
  alternative_readings:
  - I will be known among them
  - I will make myself known through them
  rationale: The verse emphasizes that God's judgment on Edom vindicates him before those Edom hated. The chosen rendering preserves divine self-revelation without over-specifying mechanism. Alternatives are preserved because the Niphal plus preposition allows more than one plausible nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
