id: EZK.35.11
reference: Ezekiel 35:11
source:
  edition: WLC
  text: לָ/כֵ֣ן חַי אָ֗נִי נְאֻם֮ אֲדֹנָ֣/י יְהוִה֒ וְ/עָשִׂ֗יתִי כְּ/אַפְּ/ךָ֙ וּ/כְ/קִנְאָ֣תְ/ךָ֔ אֲשֶׁ֣ר עָשִׂ֔יתָה מִ/שִּׂנְאָתֶ֖י/ךָ בָּ֑/ם וְ/נוֹדַ֥עְתִּי בָ֖/ם כַּ/אֲשֶׁ֥ר אֶשְׁפְּטֶֽ/ךָ־׃
translation:
  text: Therefore, as I live, declares the Lord GOD, I will deal with you according to your anger and according to your jealousy, which you acted out because of your hatred against them; and I will make myself known through them when I judge you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will be known among them' or 'I will make myself known through them.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding indictment.
- source_word: חַי אָנִי
  chosen: as I live
  alternatives:
  - surely I live
  - by my life
  lexicon: HALOT
  rationale: Conventional divine oath formula; 'as I live' preserves the solemn first-person oath without archaic excess.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - utterance of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' אֲדֹנָי יְהוִה is conventionally 'Lord GOD'; YHWH is rendered 'the LORD' by project doctrine, but in the compound title with אֲדֹנָי, English tradition and clarity favor 'Lord GOD' to avoid 'Lord LORD.'
- source_word: וְעָשִׂיתִי
  chosen: I will deal with you
  alternatives:
  - I will act
  - I will do
  lexicon: HALOT
  rationale: עשה with an implied object in judgment context is idiomatically 'deal with' rather than the overly bare 'do.' The direct object 'with you' is supplied from the second-person suffixes and final clause.
- source_word: כְּאַפְּךָ
  chosen: according to your anger
  alternatives:
  - in keeping with your anger
  - like your anger
  lexicon: HALOT
  rationale: כְ marks measure or correspondence; 'according to' best conveys proportional retribution.
- source_word: וּכְקִנְאָתְךָ
  chosen: and according to your jealousy
  alternatives:
  - and according to your zeal
  - and according to your envy
  lexicon: HALOT
  rationale: קִנְאָה can denote jealousy or zeal; here the hostile context toward 'them' favors 'jealousy' as resentful passion rather than positive zeal.
- source_word: אֲשֶׁר עָשִׂיתָה
  chosen: which you acted out
  alternatives:
  - which you showed
  - which you exercised
  lexicon: HALOT
  rationale: The verb 'did/made' with anger and jealousy is awkward in English; 'acted out' captures the idea of putting these passions into hostile action while staying close to the Hebrew.
- source_word: מִשִּׂנְאָתֶיךָ
  chosen: because of your hatred
  alternatives:
  - from your hatred
  - out of your hatred
  lexicon: HALOT
  rationale: The preposition מן here is causal/source-oriented; 'because of' communicates that the anger and jealousy arose from hatred.
- source_word: בָּם
  chosen: against them
  alternatives:
  - toward them
  - with them
  lexicon: HALOT
  rationale: Given the hostile emotions and actions, English idiom requires 'against them' to make the adversative force explicit.
- source_word: וְנוֹדַעְתִּי
  chosen: I will make myself known
  alternatives:
  - I will be known
  - I will reveal myself
  lexicon: HALOT
  rationale: Niphal of ידע can be either stative ('be known') or effectively reflexive/passive with divine self-disclosure. 'I will make myself known' brings out God's active self-revelation through judgment.
- source_word: בָם
  chosen: among them
  alternatives:
  - through them
  - in them
  lexicon: HALOT
  rationale: The pronoun refers to those against whom Edom acted; 'among them' fits the public manifestation of God's identity in their midst. 'Through them' is possible but less natural here.
- source_word: כַּאֲשֶׁר אֶשְׁפְּטֶךָ
  chosen: when I judge you
  alternatives:
  - as I judge you
  - in that I judge you
  lexicon: HALOT
  rationale: 'כַאֲשֶׁר here is best taken temporally in context: God''s self-disclosure among them occurs at the time of Edom''s judgment.'
