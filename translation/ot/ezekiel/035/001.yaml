id: EZK.35.1
reference: Ezekiel 35:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential
    introduction. In English, the idiom is best carried by beginning the clause with
    'And' and expressing the event through the following verb 'came,' rather than
    the wooden 'and it happened.' This preserves the discourse flow without unnecessary
    archaism.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'the word' is the standard and
    most transparent rendering, signaling a specific divine communication. 'Message'
    is possible but less formally tied to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines for the divine name יְהוָה, the default rendering
    is 'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern. Alternatives are preserved as possibilities but not used in the main
    text.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means
    'to me.' 'Unto me' is unnecessarily archaic in modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct speech in
    prophetic formulas. 'Saying,' is the most literal and natural bridge into the
    following oracle.
- source_word: דְבַר יְהוָה ... אֵלַי
  chosen: the word of the LORD came to me
  alternatives:
  - the word of the LORD was to me
  - the LORD's word came to me
  lexicon: HALOT
  rationale: This whole clause is a fixed prophetic formula. Rendering it idiomatically
    as 'the word of the LORD came to me' preserves both the Hebrew structure and familiar
    prophetic cadence in readable modern English.
