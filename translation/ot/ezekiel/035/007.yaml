theological_decisions:
- issue: Judgment idiom in the paired nouns for devastation
  chosen_reading: Render both nouns distinctly ('desolation and a waste') to preserve
    the intensity of divine judgment.
  alternative_readings:
  - Compress into a single expression such as 'utter desolation'
  rationale: The verse is a judgment oracle, and the Hebrew uses two cognate nouns
    for emphasis. Preserving both reflects the rhetoric without importing additional
    theological claims.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
