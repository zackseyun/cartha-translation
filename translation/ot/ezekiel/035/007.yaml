id: EZK.35.7
reference: Ezekiel 35:7
source:
  edition: WLC
  text: וְ/נָֽתַתִּי֙ אֶת הַ֣ר שֵׂעִ֔יר לְ/שִֽׁמְמָ֖ה וּ/שְׁמָמָ֑ה וְ/הִכְרַתִּ֥י
    מִמֶּ֖/נּוּ עֹבֵ֥ר וָ/שָֽׁב־׃
translation:
  text: I will make Mount Seir a desolation and a waste, and I will cut off from it
    anyone passing through and returning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will cut off from it everyone going through and coming back'; the
      Hebrew participles may describe all movement through the land as a merism.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will make
  alternatives:
  - I will set
  - I will give
  lexicon: HALOT
  rationale: נתן literally means 'give/set,' but with the object 'Mount Seir' and
    complement 'for desolation and waste' the idiom means to make or turn into. 'I
    will make' is natural English and preserves the causative force.
- source_word: הַר שֵׂעִיר
  chosen: Mount Seir
  alternatives:
  - the hill country of Seir
  lexicon: HALOT
  rationale: Proper place name; standard transliteration is appropriate. 'Mount' reflects
    הַר directly, while the broader regional sense is possible but less precise here.
- source_word: לְשִׁמְמָה וּשְׁמָמָה
  chosen: a desolation and a waste
  alternatives:
  - desolate and devastated
  - an appalling desolation
  lexicon: HALOT
  rationale: The paired near-synonyms intensify the judgment. Rendering both nouns
    preserves the Hebrew emphasis better than collapsing them into one term. 'Desolation
    and waste' is readable and weighty.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will eliminate
  - I will destroy
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means to cut off, often in judgment contexts.
    'Cut off' preserves the idiomatic and covenant-judgment resonance without overinterpreting
    the exact mode of destruction.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - from him
  - out of it
  lexicon: HALOT
  rationale: Refers back to Mount Seir as a place/region, so English neuter 'it' is
    most natural.
- source_word: עֹבֵר וָשָׁב
  chosen: anyone passing through and returning
  alternatives:
  - the one who passes through and returns
  - traveler and returner
  - all traffic in and out
  lexicon: HALOT
  rationale: The participles likely form a merism for movement through the land, indicating
    the removal of all passersby or all traffic. 'Anyone passing through and returning'
    keeps the participial sense and avoids paraphrasing too far. The exact nuance
    could also be 'going and coming back,' so an alternative is preserved in a footnote.
