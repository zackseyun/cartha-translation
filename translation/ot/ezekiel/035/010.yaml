id: EZK.35.10
reference: Ezekiel 35:10
source:
  edition: WLC
  text: יַ֣עַן אֲ֠מָרְ/ךָ אֶת שְׁנֵ֨י הַ/גּוֹיִ֜ם וְ/אֶת שְׁתֵּ֧י הָ/אֲרָצ֛וֹת לִ֥/י
    תִהְיֶ֖ינָה וִֽ/ירַשְׁנ֑וּ/הָ וַֽ/יהוָ֖ה שָׁ֥ם הָיָֽה־־׃
translation:
  text: Because you said, ‘These two nations and these two lands will be mine, and
    we will take possession of them’—though the LORD was there—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two nations' and 'the two lands.' The Hebrew uses the article; 'these'
      is supplied in English to reflect the specific entities in view from the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'and the LORD was there' or 'while the LORD was there.' The Hebrew conjunction
      can be read in more than one way; the main text takes it concessively to reflect
      the sense of Edom's presumptuous claim.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment. 'Because' is natural modern
    English and preserves the causal force.
- source_word: אֲמָרְךָ
  chosen: you said
  alternatives:
  - your saying
  lexicon: HALOT
  rationale: The infinitive/verb form with suffix is best rendered idiomatically as
    a finite clause in English.
- source_word: שְׁנֵי הַגּוֹיִם
  chosen: these two nations
  alternatives:
  - the two nations
  lexicon: HALOT
  rationale: Refers to the paired political entities in view, likely Judah/Israel
    or their associated peoples. 'These' brings out the deictic specificity implied
    by the context, though the article alone could be rendered 'the two nations.'
- source_word: שְׁתֵּי הָאֲרָצוֹת
  chosen: these two lands
  alternatives:
  - the two lands
  - the two countries
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to territorial lands rather than abstract 'earths.'
    'Lands' is the most natural paired rendering with 'nations.'
- source_word: לִי תִהְיֶינָה
  chosen: will be mine
  alternatives:
  - shall belong to me
  lexicon: HALOT
  rationale: Expresses Edom's claim of possession. 'Will be mine' is concise and idiomatic
    while preserving the possessive force.
- source_word: וִירַשְׁנוּהָ
  chosen: and we will take possession of them
  alternatives:
  - and we will possess them
  - and we will dispossess and occupy them
  lexicon: HALOT
  rationale: ירשׁ often carries the sense of taking possession/inheriting, frequently
    with the implication of dispossessing prior occupants. 'Take possession of them'
    preserves the active conquest nuance without overtranslating. The Hebrew suffix
    is singular feminine, likely referring collectively to the land-complex; English
    'them' matches the preceding plural 'lands' for clarity.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: שָׁם הָיָה
  chosen: though the LORD was there
  alternatives:
  - yet the LORD was there
  - when the LORD was there
  lexicon: HALOT
  rationale: 'The clause is adversative in context: Edom presumed to seize the land
    despite the LORD''s presence/claim. ''Though'' best conveys the rhetorical force
    in English. ''There'' likely points to the land as the place of YHWH''s presence
    and ownership.'
