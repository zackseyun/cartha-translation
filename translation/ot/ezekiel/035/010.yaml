theological_decisions:
- issue: Force of the final clause וַיהוָה שָׁם הָיָה
  chosen_reading: Rendered adversatively as 'though the LORD was there'
  alternative_readings:
  - '''and the LORD was there'''
  - '''while the LORD was there'''
  rationale: 'The bare waw can be read coordinately, but in context the clause heightens
    Edom''s arrogance: they claimed the lands for themselves despite YHWH''s presence
    and covenant claim. An adversative/concessive rendering communicates the sense
    without adding doctrinal content.'
  doctrine_reference: 'Translation philosophy #3 (preserve tension where genuine ambiguity
    exists) and contested terms entry for יְהוָה'
- issue: Referent of 'the two nations' and 'the two lands'
  chosen_reading: Left implicit in the main text
  alternative_readings:
  - Judah and Israel
  - Israel and Judah
  - their territories
  rationale: The historical referent is contextually inferable, but the Hebrew text
    itself does not name them here. The translation preserves the text's level of
    explicitness rather than importing an interpretation into the main line.
  doctrine_reference: 'Translation philosophy #1 (original-language primacy)'
