id: EZK.35.2
reference: Ezekiel 35:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם שִׂ֥ים פָּנֶ֖י/ךָ עַל הַ֣ר שֵׂעִ֑יר וְ/הִנָּבֵ֖א עָלָֽי/ו־־׃
translation:
  text: Son of man, set your face against Mount Seir and prophesy against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mortal, set your face against Mount Seir and prophesy against it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering
    preserves the idiom and its repeated usage in the book better than a more interpretive
    alternative such as 'mortal.' The noun אָדָם here is singular and masculine, so
    'man' is gender-accurate per project guidelines.
- source_word: שִׂים
  chosen: set
  alternatives:
  - direct
  - turn
  lexicon: HALOT
  rationale: The imperative literally means 'set/place.' In the idiom with 'your face'
    and עַל, 'set' is the most natural English equivalent while preserving the Hebrew
    imagery.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your gaze
  - your attention
  lexicon: HALOT
  rationale: Retaining 'face' preserves the prophetic idiom of determined opposition
    or orientation. More dynamic options lose the concrete metaphor present in Hebrew.
- source_word: עַל
  chosen: against
  alternatives:
  - toward
  - upon
  lexicon: HALOT
  rationale: Although עַל often means 'upon/against,' in the idiom 'set your face
    against' and again with 'prophesy against,' the adversative sense is clearly intended.
- source_word: הַר שֵׂעִיר
  chosen: Mount Seir
  alternatives:
  - the hill country of Seir
  lexicon: HALOT
  rationale: As a proper geographic name, transliteration is appropriate. 'Mount Seir'
    is the conventional and accurate rendering of the singular construct phrase.
- source_word: וְהִנָּבֵא
  chosen: and prophesy
  alternatives:
  - and speak prophetically
  lexicon: HALOT
  rationale: The Niphal imperative of נבא is the standard verb for prophetic proclamation.
    'Prophesy' is clear, idiomatic, and sufficiently formal.
- source_word: עָלָיו
  chosen: against it
  alternatives:
  - against him
  lexicon: HALOT
  rationale: The pronoun is grammatically masculine singular, agreeing with 'Mount
    Seir.' In English, a mountain or region is naturally referred to as 'it,' while
    'against' reflects the hostile oracle context.
