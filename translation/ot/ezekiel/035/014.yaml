id: EZK.35.14
reference: Ezekiel 35:14
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה כִּ/שְׂמֹ֨חַ֙ כָּל הָ/אָ֔רֶץ שְׁמָמָ֖ה אֶעֱשֶׂה
    לָּֽ/ךְ־־׃
translation:
  text: 'Thus says the Lord GOD: As the whole earth rejoices, I will make you desolate.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When the whole earth rejoices, I will make you desolate.' The Hebrew
      conjunction can be understood temporally.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the whole earth'; some take this more locally as 'the whole land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus' preserves the formal force
    of the introduction in readable English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Though morphologically perfect, in prophetic formulae it is idiomatically
    rendered as present in English ('Thus says') to convey the standing divine declaration.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'the Lord GOD.'
    'YHWH' follows the project default as 'the LORD,' but when paired with אֲדֹנָי,
    English convention uses 'Lord GOD' to avoid 'Lord LORD.' The article improves
    English flow.
- source_word: כִּשְׂמֹחַ
  chosen: As ... rejoices
  alternatives:
  - When ... rejoices
  - Because ... rejoices
  lexicon: HALOT
  rationale: The prefixed כ here is best taken temporally/comparatively, introducing
    the circumstance under which judgment falls on Edom. 'As' is concise and natural;
    'because' would overstate causation.
- source_word: כָּל הָאָרֶץ
  chosen: the whole earth
  alternatives:
  - all the land
  - the whole land
  lexicon: HALOT
  rationale: In this judgment context the phrase most naturally refers broadly to
    the earth/world rather than a localized land. 'Whole earth' matches common prophetic
    usage.
- source_word: שׂמח
  chosen: rejoices
  alternatives:
  - is glad
  - celebrates
  lexicon: HALOT
  rationale: '''Rejoices'' preserves the elevated tone and the positive emotional
    sense without adding nuance not explicit in the Hebrew.'
- source_word: שְׁמָמָה
  chosen: desolate
  alternatives:
  - a desolation
  - devastated
  lexicon: HALOT
  rationale: Predicate/resultative sense after עשה with ל yields idiomatic English
    'make you desolate.' This is smoother than the more wooden 'make you a desolation'
    while preserving meaning.
- source_word: אֶעֱשֶׂה לָּךְ
  chosen: I will make you
  alternatives:
  - I will make for you
  - I will make of you
  lexicon: HALOT
  rationale: The idiom עשה + ל + pronoun here means to cause the addressee to become
    something; 'I will make you' is the natural English equivalent.
