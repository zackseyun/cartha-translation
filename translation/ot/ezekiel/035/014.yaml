theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default renders יְהוָה as 'the LORD,' but in the fixed Hebrew
    title אֲדֹנָי יְהוִה, English convention avoids the awkward 'Lord LORD.' 'the
    Lord GOD' preserves reverence and recognizability without introducing a transliterated
    divine name into the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
