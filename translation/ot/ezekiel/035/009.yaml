id: EZK.35.9
reference: Ezekiel 35:9
source:
  edition: WLC
  text: שִֽׁמְמ֤וֹת עוֹלָם֙ אֶתֶּנְ/ךָ֔ וְ/עָרֶ֖י/ךָ לֹ֣א תישבנה וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־׃
translation:
  text: I will make you an everlasting desolation, and your cities will not be inhabited; then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an everlasting waste' or 'everlasting desolations.' The Hebrew uses a plural noun for devastation, likely intensifying the judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְמוֹת
  chosen: desolation
  alternatives:
  - desolations
  - wastes
  - ruins
  lexicon: HALOT
  rationale: The plural noun intensifies the state of devastation. English idiom prefers the singular abstract noun in this construction ('make you an everlasting desolation') rather than the less natural 'desolations.'
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - perpetual
  - forever-lasting
  - ancient/long duration
  lexicon: HALOT
  rationale: In this judgment context the term denotes enduring duration into the indefinite future. 'Everlasting' is natural and weighty in English; 'perpetual' is possible but slightly stiffer.
- source_word: אֶתֶּנְךָ
  chosen: I will make you
  alternatives:
  - I will set you as
  - I will give you over to be
  lexicon: HALOT
  rationale: Although the verb is literally 'give/set,' in this idiom with a predicate noun it means to appoint or make someone into a condition. 'I will make you' best conveys the Hebrew sense in clear English.
- source_word: וְעָרֶיךָ
  chosen: and your cities
  alternatives:
  - and your towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city.' 'Cities' is the standard and sufficiently broad rendering here.
- source_word: לֹא תישבנה
  chosen: will not be inhabited
  alternatives:
  - will not be lived in
  - will not be settled
  - will remain uninhabited
  lexicon: HALOT
  rationale: The Niphal-like/passive sense is not present morphologically, but the Qal 3fp with cities as subject naturally means 'will not be inhabited/settled.' This is the most idiomatic English rendering with inanimate subject 'cities.'
- source_word: וִידַעְתֶּם
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply 'and,' but in context it marks result following judgment. 'Then' brings out the consequential force without overinterpreting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
