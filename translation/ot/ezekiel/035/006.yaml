id: EZK.35.6
reference: Ezekiel 35:6
source:
  edition: WLC
  text: לָ/כֵ֣ן חַי אָ֗נִי נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה כִּֽי לְ/דָ֥ם אֶעֶשְׂ/ךָ֖ וְ/דָ֣ם
    יִרְדֲּפֶ֑/ךָ אִם לֹ֥א דָ֛ם שָׂנֵ֖אתָ וְ/דָ֥ם יִרְדֲּפֶֽ/ךָ־־־׃
translation:
  text: Therefore, as I live, declares the Lord GOD, I will make you blood, and blood
    will pursue you. Since you did not hate bloodshed, blood will pursue you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I will make you blood'; the Hebrew likely evokes both
      bloodshed and bloodguilt through repeated wordplay on 'blood.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'blood'; here the sense is likely 'bloodshed' or violent bloodguilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the divine judgment as a consequence
    of the preceding accusation.
- source_word: חַי אָ֗נִי
  chosen: as I live
  alternatives:
  - I live
  - by my life
  lexicon: HALOT
  rationale: Idiomatic oath formula in prophetic speech. 'As I live' preserves the
    solemn self-oath force in natural English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' אֲדֹנָי
    יְהוִה is conventionally and clearly rendered 'Lord GOD'; YHWH follows the project's
    default as 'the LORD,' but in the combined title 'Lord GOD' is standard English
    representation of אֲדֹנָי יְהוִה.
- source_word: לְדָם אֶעֶשְׂךָ
  chosen: I will make you blood
  alternatives:
  - I will make you bloodshed
  - I will give you over to blood
  - I will make you bloody
  lexicon: HALOT
  rationale: 'The Hebrew is strikingly terse: literally ''for/to blood I will make
    you.'' Retaining ''blood'' preserves the wordplay with the repeated דָם throughout
    the verse and avoids over-interpreting the exact nuance. English is slightly abrupt,
    but the prophetic rhetoric warrants it.'
- source_word: דָם
  chosen: blood
  alternatives:
  - bloodshed
  - guilt for blood
  lexicon: HALOT
  rationale: The noun recurs four times and likely carries both literal blood and
    bloodguilt/bloodshed associations. Main text keeps the repeated 'blood' for rhetorical
    consistency; one instance is clarified in context by footnote as 'bloodshed' being
    a viable sense.
- source_word: יִרְדֲּפֶךָ
  chosen: will pursue you
  alternatives:
  - will chase you
  - will persecute you
  lexicon: HALOT
  rationale: רדף commonly means 'pursue/chase.' 'Pursue' fits judgment language and
    preserves the repeated refrain.
- source_word: אִם לֹא
  chosen: Since ... not
  alternatives:
  - surely
  - indeed
  - because ... not
  lexicon: HALOT
  rationale: 'Here אִם לֹא is best taken not as a simple conditional but as an asseverative/causal
    construction in context: the reason for judgment is that Edom did not hate bloodshed.
    ''Since you did not...'' communicates the logic clearly in English.'
- source_word: דָם שָׂנֵאתָ
  chosen: you did not hate bloodshed
  alternatives:
  - you did not hate blood
  - you hated not blood
  lexicon: HALOT
  rationale: While דָם is literally 'blood,' in this clause the sense is moral aversion
    to bloodshed/violence. Rendering it 'bloodshed' makes the idiom intelligible in
    English while the repeated 'blood' elsewhere preserves the Hebrew wordplay.
