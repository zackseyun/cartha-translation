theological_decisions:
- issue: Rendering the divine name יְהוָה within אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default renders YHWH as 'the LORD.' In the fixed Hebrew title
    אֲדֹנָי יְהוִה, English convention commonly uses 'Lord GOD' to avoid 'Lord LORD'
    while still signaling the divine name. This respects the doctrine file's default
    handling of YHWH without awkward English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
