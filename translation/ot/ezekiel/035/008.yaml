id: EZK.35.8
reference: Ezekiel 35:8
source:
  edition: WLC
  text: וּ/מִלֵּאתִ֥י אֶת הָרָ֖י/ו חֲלָלָ֑י/ו גִּבְעוֹתֶ֤י/ךָ וְ/גֵאוֹתֶ֨י/ךָ֙ וְ/כָל
    אֲפִיקֶ֔י/ךָ חַלְלֵי חֶ֖רֶב יִפְּל֥וּ בָ/הֶֽם־־־׃
translation:
  text: And I will fill its mountains with its slain; on your hills, in your valleys,
    and in all your ravines, those slain by the sword will fall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'will fall in them,' referring to the hills, valleys,
      and ravines just named.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִלֵּאתִי
  chosen: I will fill
  alternatives:
  - and I will fill
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic speech functions naturally
    as a future declaration in English. The conjunction need not be represented with
    a separate 'and' if English style is smoother without loss of sense.
- source_word: הָרָיו
  chosen: its mountains
  alternatives:
  - his mountains
  lexicon: HALOT
  rationale: The 3ms suffix refers to Mount Seir/Edom as a corporate land entity.
    English 'its' best matches the geographic referent, while the following 2ms forms
    address the land/personified nation directly.
- source_word: חֲלָלָיו
  chosen: its slain
  alternatives:
  - its dead
  - its pierced
  lexicon: HALOT
  rationale: חָלָל commonly denotes those slain, especially in battle. 'Slain' preserves
    the violent military sense better than the flatter 'dead'.
- source_word: גִּבְעוֹתֶיךָ
  chosen: your hills
  alternatives:
  - your high places
  lexicon: HALOT
  rationale: The noun ordinarily means hills. 'High places' would import cultic overtones
    not demanded here.
- source_word: גֵאוֹתֶיךָ
  chosen: your valleys
  alternatives:
  - your heights
  - your exalted places
  lexicon: HALOT
  rationale: In this topographical list alongside hills and ravines, the term is best
    taken in the sense of low-lying areas/valleys rather than abstract exaltation
    or heights. This yields a coherent landscape triad in context.
- source_word: אֲפִיקֶיךָ
  chosen: your ravines
  alternatives:
  - your channels
  - your wadis
  - your streams
  lexicon: HALOT
  rationale: The word denotes channels, beds, or ravines. 'Ravines' fits the judgment-on-landscape
    context better than 'streams,' which could suggest flowing water rather than terrain.
- source_word: חַלְלֵי חֶרֶב
  chosen: those slain by the sword
  alternatives:
  - the sword-slain
  - the slain of the sword
  lexicon: HALOT
  rationale: This construct phrase is rendered idiomatically in English while preserving
    the instrumentality of violent death.
- source_word: יִפְּלוּ בָהֶם
  chosen: will fall
  alternatives:
  - will fall in them
  - will fall among them
  lexicon: HALOT
  rationale: The prepositional phrase refers back to the listed topographical features.
    English can omit the explicit final locative in the main line because the preceding
    'on... in... in...' already supplies the locations; the fuller sense is preserved
    in a footnote.
