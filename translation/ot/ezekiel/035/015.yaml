id: EZK.35.15
reference: Ezekiel 35:15
source:
  edition: WLC
  text: כְּ/שִׂמְחָ֨תְ/ךָ֜ לְ/נַחְלַ֧ת בֵּֽית יִשְׂרָאֵ֛ל עַ֥ל אֲשֶׁר שָׁמֵ֖מָה כֵּ֣ן
    אֶעֱשֶׂה לָּ֑/ךְ שְׁמָמָ֨ה תִֽהְיֶ֤ה הַר שֵׂעִיר֙ וְ/כָל אֱד֣וֹם כֻּלָּ֔/הּ וְ/יָדְע֖וּ
    כִּֽי אֲנִ֥י יְהוָֽה־־־־־־׃פ
translation:
  text: 'As you rejoiced over the inheritance of the house of Israel because it was
    desolate, so I will do to you: you will become a desolation, Mount Seir, and all
    Edom, all of it. Then they will know that I am the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''you will be desolate.'' The Hebrew more literally uses the noun ''desolation'':
      ''you will become a desolation.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and all Edom, all of it,' an emphatic way of saying the whole of
      Edom.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשִׂמְחָתְךָ
  chosen: As you rejoiced
  alternatives:
  - According to your rejoicing
  - Just as you were glad
  lexicon: HALOT
  rationale: The prefixed כְ marks comparison ('as/just as'), and שִׂמְחָה with 2ms
    suffix denotes Edom's rejoicing. Rendering as a verbal clause in English is more
    natural than a nominal 'as your joy' while preserving the comparative force.
- source_word: לְנַחְלַת בֵּית יִשְׂרָאֵל
  chosen: over the inheritance of the house of Israel
  alternatives:
  - concerning the inheritance of the house of Israel
  - at the inheritance of the house of Israel
  lexicon: HALOT
  rationale: נַחֲלָה commonly means 'inheritance/possession.' The preposition לְ after
    a joy/rejoicing noun can indicate the object or occasion of rejoicing; 'over'
    communicates that sense idiomatically in English.
- source_word: עַל אֲשֶׁר שָׁמֵמָה
  chosen: because it was desolate
  alternatives:
  - because it lay desolate
  - over the fact that it was desolate
  lexicon: HALOT
  rationale: עַל אֲשֶׁר introduces the reason for Edom's rejoicing. שָׁמֵמָה is a
    stative/perfect feminine singular referring back to the inheritance/land; 'was
    desolate' is a clear causal rendering.
- source_word: כֵּן אֶעֱשֶׂה לָּךְ
  chosen: so I will do to you
  alternatives:
  - so I will deal with you
  - thus I will act toward you
  lexicon: HALOT
  rationale: כֵּן marks corresponding retribution ('so/thus'), and עשה with לְ can
    mean 'do to/deal with.' 'Do to you' preserves the terse judicial force.
- source_word: שְׁמָמָה תִהְיֶה
  chosen: you will become a desolation
  alternatives:
  - you will be desolate
  - you will become desolate
  lexicon: HALOT
  rationale: The noun שְׁמָמָה ('desolation') used predicatively is stronger than
    a simple adjective. 'Become a desolation' preserves the nominal force and the
    judgment motif repeated in the verse.
- source_word: הַר שֵׂעִיר
  chosen: Mount Seir
  lexicon: HALOT
  rationale: Standard transliteration of the place name; 'mountain of Seir' is possible
    but less idiomatic as a proper geographic designation.
- source_word: וְכָל אֱדוֹם כֻּלָּהּ
  chosen: and all Edom, all of it
  alternatives:
  - and all Edom in its entirety
  - even all Edom, every bit of it
  lexicon: HALOT
  rationale: The combination of כָּל with the resumptive כֻּלָּהּ is emphatic. Retaining
    'all Edom, all of it' reflects the totalizing emphasis better than a single 'all
    Edom'.
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in context it marks
    the result of the judgment. 'Then' brings out the consequential sense without
    overinterpreting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the translation policy for YHWH.
