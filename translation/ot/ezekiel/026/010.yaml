id: EZK.26.10
reference: Ezekiel 26:10
source:
  edition: WLC
  text: מִ/שִּׁפְעַ֥ת סוּסָ֖י/ו יְכַסֵּ֣/ךְ אֲבָקָ֑/ם מִ/קּוֹל֩ פָּרַ֨שׁ וְ/גַלְגַּ֜ל
    וָ/רֶ֗כֶב תִּרְעַ֨שְׁנָה֙ חֽוֹמוֹתַ֔יִ/ךְ בְּ/בֹא/וֹ֙ בִּ/שְׁעָרַ֔יִ/ךְ כִּ/מְבוֹאֵ֖י
    עִ֥יר מְבֻקָּעָֽה׃
translation:
  text: From the abundance of his horses their dust will cover you; at the sound of
    horseman and wheel and chariot your walls will quake when he enters your gates,
    as men enter a city that has been breached.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the noise of cavalry, wheels, and chariots.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'as the entrances of a city breached'; the sense is entry
      like that into a city whose defenses have been broken open.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשִּׁפְעַת
  chosen: From the abundance of
  alternatives:
  - From the multitude of
  - Because of the abundance of
  lexicon: HALOT
  rationale: שִׁפְעָה denotes abundance/plenty. In context it describes the sheer
    quantity of horses producing dust, so 'abundance' is natural modern English while
    preserving the causal/source nuance of מִן.
- source_word: סוּסָיו
  chosen: his horses
  alternatives:
  - his cavalry horses
  lexicon: HALOT
  rationale: Straightforward plural of 'horse' with 3ms suffix, referring to the invader's
    horses.
- source_word: יְכַסֵּךְ אֲבָקָם
  chosen: their dust will cover you
  alternatives:
  - the dust of them will cover you
  - their dust will overwhelm you
  lexicon: HALOT
  rationale: The verb כסה is 'cover.' אֲבָקָם is 'their dust,' i.e., the dust raised
    by the horses. 'Cover you' preserves the vivid physical image addressed to the
    city as feminine singular.
- source_word: מִקּוֹל
  chosen: at the sound of
  alternatives:
  - from the sound of
  - because of the noise of
  lexicon: HALOT
  rationale: קוֹל can mean sound/noise. Here the preposition and context of military
    approach favor a causal-circumstantial sense, rendered idiomatically as 'at the
    sound of.'
- source_word: פָּרַשׁ
  chosen: horseman
  alternatives:
  - rider
  - cavalryman
  lexicon: HALOT
  rationale: פָּרָשׁ refers to a horseman/cavalryman. Singular after קול functions
    collectively in a list of military sounds; 'horseman' keeps the lexical sense
    without overinterpreting.
- source_word: וְגַלְגַּל
  chosen: and wheel
  alternatives:
  - and the rumbling of wheels
  lexicon: HALOT
  rationale: גַּלְגַּל is literally 'wheel.' Although collective sense is possible,
    the Hebrew singulars in the sound-list are retained in English for compactness
    and vividness.
- source_word: וָרֶכֶב
  chosen: and chariot
  alternatives:
  - and chariots
  - and war chariots
  lexicon: HALOT
  rationale: רֶכֶב can denote chariotry collectively. Singular is maintained to mirror
    the Hebrew list under 'sound of'; English readers will understand it as military
    equipment generically.
- source_word: תִּרְעַשְׁנָה
  chosen: will quake
  alternatives:
  - will shake
  - will tremble
  lexicon: HALOT
  rationale: רעשׁ conveys shaking/quaking. 'Quake' fits fortified walls reacting to
    siege-entry and preserves the force of the verb.
- source_word: חוֹמוֹתַיִךְ
  chosen: your walls
  alternatives:
  - your city walls
  lexicon: HALOT
  rationale: Plural 'walls' with 2fs suffix, addressed to Tyre personified as feminine
    singular.
- source_word: בְּבֹאוֹ בִּשְׁעָרַיִךְ
  chosen: when he enters your gates
  alternatives:
  - at his entering your gates
  - when he comes into your gates
  lexicon: HALOT
  rationale: Infinitive construct with preposition plus suffix gives temporal sense.
    'When he enters your gates' is clear and natural.
- source_word: כִּמְבוֹאֵי עִיר מְבֻקָּעָה
  chosen: as men enter a city that has been breached
  alternatives:
  - as at the entrances of a breached city
  - as one enters a breached city
  lexicon: HALOT
  rationale: The plural construct מְבוֹאֵי is awkward literally ('entrances of').
    In context it functions idiomatically for the manner of entry into a broken city.
    Supplying 'men enter' yields coherent English and reflects common interpretation
    of the simile without excessive paraphrase. מְבֻקָּעָה is 'breached/broken into.'
