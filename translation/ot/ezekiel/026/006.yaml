id: EZK.26.6
reference: Ezekiel 26:6
source:
  edition: WLC
  text: וּ/בְנוֹתֶ֨י/הָ֙ אֲשֶׁ֣ר בַּ/שָּׂדֶ֔ה בַּ/חֶ֖רֶב תֵּהָרַ֑גְנָה וְ/יָדְע֖וּ
    כִּי אֲנִ֥י יְהוָֽה־׃פ
translation:
  text: And her daughters who are in the field will be killed by the sword, and they
    will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her daughter towns' or 'her villages'; that is, Tyre's dependent settlements.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'in the field'; likely referring to settlements on the mainland or
      in the countryside.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנוֹתֶיהָ
  chosen: her daughters
  alternatives:
  - her daughter towns
  - her villages
  lexicon: HALOT
  rationale: Literally 'her daughters.' In prophetic and geographic usage, 'daughters'
    can refer to dependent settlements belonging to a mother city. The literal rendering
    is preserved in the main text for transparency, while common interpretive alternatives
    are preserved in a footnote.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  chosen: who are in the field
  alternatives:
  - that are on the mainland
  - that are in the countryside
  lexicon: HALOT
  rationale: The phrase is literally 'which/that are in the field.' In context of
    Tyre and its associated settlements, this likely refers to mainland settlements
    rather than the island city itself. 'In the field' keeps the Hebrew image while
    remaining intelligible; the contextual alternative is footnoted.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare or judgment. 'By the sword' is natural
    English and preserves the instrumental sense.
- source_word: תֵּהָרַגְנָה
  chosen: will be killed
  alternatives:
  - will be slain
  lexicon: HALOT
  rationale: Niphal imperfect 3fp of הרג, passive/reflexive sense. 'Will be killed'
    is clear modern English; 'will be slain' is more traditional but less natural
    for the stated translation philosophy.
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - and they shall know
  lexicon: HALOT
  rationale: Common Ezekiel formula. 'Will know' expresses the future/resultative
    force in readable modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
