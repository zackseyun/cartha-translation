theological_decisions:
- issue: Referent of 'her daughters' in an oracle against Tyre
  chosen_reading: Dependent settlements belonging to Tyre are denoted, while the main
    text retains the literal expression 'her daughters.'
  alternative_readings:
  - Literal female offspring of the city personified
  - her villages/towns on the mainland
  rationale: The immediate context concerns Tyre and associated places under judgment.
    Hebrew city-personification commonly uses 'daughter(s)' for dependent communities.
    To preserve both transparency and contextual sense, the literal phrase is kept
    in the text and the interpretive sense is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's contested-terms policy for YHWH.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
