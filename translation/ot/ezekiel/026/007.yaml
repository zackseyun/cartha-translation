id: EZK.26.7
reference: Ezekiel 26:7
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֧י מֵבִ֣יא אֶל צֹ֗ר נְבוּכַדְרֶאצַּ֧ר מֶֽלֶךְ בָּבֶ֛ל מִ/צָּפ֖וֹן מֶ֣לֶךְ מְלָכִ֑ים בְּ/ס֛וּס וּ/בְ/רֶ֥כֶב וּ/בְ/פָרָשִׁ֖ים וְ/קָהָ֥ל וְ/עַם רָֽב־־־׃
translation:
  text: 'For thus says the Lord GOD: Behold, I am bringing against Tyre Nebuchadnezzar king of Babylon from the north, king of kings, with horses and chariots and horsemen, and an assembly and a numerous people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew spelling here corresponds more closely to 'Nebuchadrezzar'; English tradition commonly uses 'Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine explanation for the judgment oracle; 'For' fits the discourse connection to the preceding context better than a stronger asseverative like 'Indeed.'
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  - thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense English 'says' is idiomatic for Hebrew prophetic speech formulas.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Renders אֲדֹנָי as 'Lord' and preserves the DOCTRINE.md default for יְהוָה as 'the LORD.' In combination, 'the Lord GOD' is clear modern English and reflects the traditional distinction without using 'Yahweh' in the main text.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Marks solemn divine self-announcement. 'Behold' preserves the elevated prophetic tone without adding content.
- source_word: מֵבִיא אֶל
  chosen: I am bringing against
  alternatives:
  - I am bringing to
  - I will bring against
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' in this military-judgment context English idiom requires 'against.' The participle with הִנְנִי conveys imminent action, well represented by 'I am bringing.'
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the city name.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Uses the conventional English form familiar to readers. The Hebrew spelling here more closely reflects 'Nebuchadrezzar,' which is preserved as an alternative in a footnote for auditability.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct rendering.
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: Natural English rendering of direction/source; also fits the prophetic motif of invasion from the north.
- source_word: מֶלֶךְ מְלָכִים
  chosen: a king of kings
  alternatives:
  - the king of kings
  - king over kings
  lexicon: HALOT
  rationale: The phrase is appositional to Nebuchadnezzar and lacks the article; 'a king of kings' preserves the Hebrew form and denotes imperial supremacy without importing later absolute theological usage.
- source_word: בְּסוּס
  chosen: with horses
  alternatives:
  - with cavalry horses
  lexicon: HALOT
  rationale: Collective singular after בְ is naturally rendered as plural in English military description.
- source_word: וּבְרֶכֶב
  chosen: and chariots
  alternatives:
  - and chariotry
  lexicon: HALOT
  rationale: Plural English is more idiomatic for the collective military force.
- source_word: וּבְפָרָשִׁים
  chosen: and horsemen
  alternatives:
  - and cavalry
  lexicon: HALOT
  rationale: More formally corresponds to the Hebrew noun than the more interpretive 'cavalry,' while remaining readable.
- source_word: וְקָהָל
  chosen: and an assembly
  alternatives:
  - and a company
  - and a host
  lexicon: HALOT
  rationale: Denotes a gathered mass or contingent. 'Assembly' keeps the lexical sense broad without over-specifying military organization.
- source_word: וְעַם רָב
  chosen: and a numerous people
  alternatives:
  - and many people
  - and a great army
  lexicon: HALOT
  rationale: עַם is literally 'people,' and רָב means 'many/numerous.' This avoids paraphrasing to 'army' while still conveying large numbers.
