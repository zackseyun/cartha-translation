id: EZK.26.21
reference: Ezekiel 26:21
source:
  edition: WLC
  text: בַּלָּה֥וֹת אֶתְּנֵ֖/ךְ וְ/אֵינֵ֑/ךְ וּֽ/תְבֻקְשִׁ֗י וְ/לֹֽא תִמָּצְאִ֥י עוֹד֙ לְ/עוֹלָ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהֹוִֽה־׃ס
translation:
  text: I will make you a terror, and you will be no more. Though you are sought, you will never again be found, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be sought, but you will not be found again forever.' The Hebrew sequence may be read more simply as coordinate future clauses rather than concessive.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'declares the Lord GOD' represents אֲדֹנָי יְהוִה, literally 'Lord YHWH'; English convention avoids 'Lord LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּלָּהוֹת
  chosen: a terror
  alternatives:
  - terrors
  - an object of horror
  - sudden terrors
  lexicon: HALOT
  rationale: 'The plural noun can function abstractly/intensively. In context, a singular English expression is more natural: Tyre is made into something horrifying. ''A terror'' preserves the force without awkward literalism.'
- source_word: אֶתְּנֵךְ
  chosen: I will make you
  alternatives:
  - I will give you
  - I will set you
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with a predicate noun here it idiomatically means 'make' or 'set as.' 'I will make you a terror' is the clearest English rendering.
- source_word: וְאֵינֵךְ
  chosen: and you will be no more
  alternatives:
  - and you are not
  - and you will not exist
  lexicon: HALOT
  rationale: The verbless negative clause expresses cessation of existence/presence. 'You will be no more' is idiomatic and fits the judgment context.
- source_word: וּתְבֻקְשִׁי
  chosen: Though you are sought
  alternatives:
  - and you will be sought
  - people will seek you
  lexicon: HALOT
  rationale: 'The passive/imperfect can be rendered straightforwardly as future passive, but in English the concessive sense fits the sequence well: even if sought, Tyre will not be found. This preserves the passive force without specifying the seekers.'
- source_word: וְלֹא תִמָּצְאִי
  chosen: you will never again be found
  alternatives:
  - you will not be found
  - you will not be discovered
  lexicon: HALOT
  rationale: The Niphal of מצא is passive ('be found'). Adding 'never again' brings out the force of עוד with the following לעולם in natural English.
- source_word: עוֹד לְעוֹלָם
  chosen: never again ... forever
  alternatives:
  - any longer forever
  - again for ever
  - ever again
  lexicon: HALOT
  rationale: The combination intensifies the permanence of the judgment. The English wording keeps both elements, though somewhat compressed. 'Never again' conveys עוד and 'forever' conveys לעולם.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נאם is a prophetic formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'Lord GOD' avoids 'Lord LORD' and follows established English convention while preserving both titles.
