theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies יְהוָה should normally be rendered 'the LORD.'
    In the compound title אֲדֹנָי יְהוִה, English convention uses 'the Lord GOD' to
    represent both elements without the awkward 'Lord LORD.' This preserves reverence
    tradition and readability while signaling the full title.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
