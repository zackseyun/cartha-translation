id: EZK.26.3
reference: Ezekiel 26:3
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֥י עָלַ֖יִ/ךְ צֹ֑ר וְ/הַעֲלֵיתִ֤י
    עָלַ֨יִ/ךְ֙ גּוֹיִ֣ם רַבִּ֔ים כְּ/הַעֲל֥וֹת הַ/יָּ֖ם לְ/גַלָּֽי/ו׃
translation:
  text: 'Therefore thus says the Lord GOD: Behold, I am against you, Tyre, and I will
    bring up many nations against you, as the sea brings up its waves.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Lord YHWH'' (אֲדֹנָי יְהוִה); English ''the Lord GOD'' reflects
      the traditional way of rendering both divine titles together without saying
      ''Lord LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the divine response to the
    preceding accusation/judgment context. 'Therefore' preserves the formal connection
    cleanly in English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says' is natural, recognizable,
    and appropriately formal without being archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the divine name YHWH.
    Following doctrine, יְהוָה is rendered 'the LORD'; in this fixed English convention
    אֲדֹנָי יְהוִה is commonly represented as 'the Lord GOD' to avoid 'Lord LORD'
    while preserving both elements.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: Deictic particle marking emphatic divine announcement. 'Behold' preserves
    the solemn prophetic force better than the more colloquial 'Look' or 'See.'
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: With הִנְנִי in a judgment context, the preposition conveys hostile stance
    rather than mere location. 'Against you' makes the adversative sense explicit.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the city name.
- source_word: וְהַעֲלֵיתִי
  chosen: I will bring up
  alternatives:
  - I will raise up
  - I will bring against
  lexicon: HALOT
  rationale: Hiphil of עלה here means causing to come up/advance against Tyre. 'Bring
    up' preserves the verbal imagery and matches the following sea comparison.
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  lexicon: HALOT
  rationale: גּוֹיִם ordinarily denotes nations/peoples; in an international military
    context 'nations' is the most precise and conventional rendering.
- source_word: כְּהַעֲלוֹת הַיָּם לְגַלָּיו
  chosen: as the sea brings up its waves
  alternatives:
  - as the sea causes its waves to rise
  - like the sea bringing up its waves
  lexicon: HALOT
  rationale: The comparison likens the coming nations to successive sea waves. 'Brings
    up its waves' preserves the repeated-motion imagery and echoes the earlier 'bring
    up' for rhetorical effect.
