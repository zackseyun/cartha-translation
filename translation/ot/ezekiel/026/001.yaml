id: EZK.26.1
reference: Ezekiel 26:1
source:
  edition: WLC
  text: וַ/יְהִ֛י בְּ/עַשְׁתֵּֽי עֶשְׂרֵ֥ה שָׁנָ֖ה בְּ/אֶחָ֣ד לַ/חֹ֑דֶשׁ הָיָ֥ה דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־־׃
translation:
  text: And it happened in the eleventh year, on the first day of the month, that the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on the first of the month,'' a standard dating formula meaning the first day of the month.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a dated prophetic episode. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בְּעַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: in the eleventh year
  alternatives:
  - in year eleven
  - in the eleventh year
  lexicon: HALOT
  rationale: The preposition plus numeral phrase gives the date formula. English idiom naturally renders this as 'in the eleventh year.'
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  - on day one of the month
  lexicon: HALOT
  rationale: Literally 'on one of the month,' a standard Hebrew dating expression meaning the first day of the month. The fuller rendering is clearer in modern English while remaining faithful.
- source_word: הָיָה דְבַר יְהוָה אֵלַי
  chosen: the word of the LORD came to me
  alternatives:
  - the word of the LORD was to me
  - the word of the LORD came to me
  lexicon: HALOT
  rationale: Standard prophetic formula. Although Hebrew uses 'was,' English idiom for revelatory arrival is 'came to me.' 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say
  - 'as follows:'
  lexicon: HALOT
  rationale: Infinitive introducing direct speech. 'Saying,' is the natural English equivalent and signals continuation into the next verse.
