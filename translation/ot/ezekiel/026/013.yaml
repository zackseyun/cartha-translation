id: EZK.26.13
reference: Ezekiel 26:13
source:
  edition: WLC
  text: וְ/הִשְׁבַּתִּ֖י הֲמ֣וֹן שִׁירָ֑יִ/ךְ וְ/ק֣וֹל כִּנּוֹרַ֔יִ/ךְ לֹ֥א יִשָּׁמַ֖ע
    עֽוֹד׃
translation:
  text: And I will put an end to the noise of your songs, and the sound of your lyres
    will be heard no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your harps.' The Hebrew כִּנּוֹר refers to a stringed instrument often
      identified as a lyre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  chosen: And I will put an end to
  alternatives:
  - and I will cause to cease
  - and I will stop
  lexicon: HALOT
  rationale: 'Hiphil of שׁבת here is causative: not merely ''rest'' but ''cause to
    cease/put an end to.'' ''Put an end to'' is idiomatic modern English that preserves
    the force of decisive cessation.'
- source_word: הֲמוֹן
  chosen: the noise
  alternatives:
  - the multitude
  - the din
  - the tumult
  lexicon: HALOT
  rationale: In context with songs and instruments, the noun refers to loud sound
    or din rather than a numerical 'multitude.' 'Noise' best fits the judgment context
    and parallelism with 'sound.'
- source_word: שִׁירַיִךְ
  chosen: your songs
  alternatives:
  - your singing
  lexicon: HALOT
  rationale: Plural noun with 2fs suffix referring to Tyre's songs. 'Your songs' is
    the most direct and natural rendering.
- source_word: וְקוֹל
  chosen: and the sound of
  alternatives:
  - and the voice of
  - and the noise of
  lexicon: HALOT
  rationale: קוֹל is broad ('voice/sound/noise'), but with instruments it is best
    rendered 'sound.' The construct relation is naturally expressed in English as
    'the sound of.'
- source_word: כִּנּוֹרַיִךְ
  chosen: your lyres
  alternatives:
  - your harps
  lexicon: HALOT
  rationale: כִּנּוֹר denotes a stringed instrument often rendered 'lyre' in modern
    scholarship; 'harp' is traditional but less precise. 'Lyres' preserves the likely
    instrument type while remaining readable.
- source_word: לֹא יִשָּׁמַע עוֹד
  chosen: will be heard no more
  alternatives:
  - will not be heard again
  - will no longer be heard
  lexicon: HALOT
  rationale: 'Niphal imperfect of שׁמע is passive/reflexive in sense here: ''be heard.''
    עוֹד adds the idea of continuation ending: ''no more'' is concise and idiomatic.'
