id: EZK.26.8
reference: Ezekiel 26:8
source:
  edition: WLC
  text: בְּנוֹתַ֥יִ/ךְ בַּ/שָּׂדֶ֖ה בַּ/חֶ֣רֶב יַהֲרֹ֑ג וְ/נָתַ֨ן עָלַ֜יִ/ךְ דָּיֵ֗ק
    וְ/שָׁפַ֤ךְ עָלַ֨יִ/ךְ֙ סֹֽלְלָ֔ה וְ/הֵקִ֥ים עָלַ֖יִ/ךְ צִנָּֽה׃
translation:
  text: He will kill your daughters in the field with the sword, set up a siege wall
    against you, throw up a siege ramp against you, and raise a large shield against
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your daughter towns' or 'your villages in the countryside'; the Hebrew
      literally says 'your daughters in the field,' referring to dependent settlements.
    reason: lexical_alternative
  - marker: b
    text: '''Large shield'' may refer more specifically to siege protection such as
      a mantlet or shielded covering used in assault operations.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנוֹתַיִךְ
  chosen: your daughters
  alternatives:
  - your villages
  - your daughter towns
  lexicon: HALOT
  rationale: Literally 'your daughters.' In prophetic and military contexts this can
    denote dependent settlements of a city ('daughter towns/villages'). Because the
    Hebrew expression is concrete and traditional, the main text keeps 'daughters,'
    while a footnote preserves the idiomatic sense of satellite settlements.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - on the mainland
  - in the countryside
  lexicon: HALOT
  rationale: The basic sense is 'in the field/open country.' Given the oracle against
    Tyre, this likely refers to mainland settlements outside the island city, but
    'in the field' best preserves the Hebrew image without over-interpreting.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Standard instrumental expression for death in warfare; 'with the sword'
    is natural and close to the Hebrew.
- source_word: יַהֲרֹג
  chosen: he will kill
  alternatives:
  - he will slay
  lexicon: HALOT
  rationale: Simple future sense of הרג. 'Kill' is clear modern English; 'slay' is
    more literary but less natural.
- source_word: דָּיֵק
  chosen: siege works
  alternatives:
  - siege wall
  - siege tower
  - bulwark
  lexicon: HALOT
  rationale: A technical siege term for an assault structure or siege installation.
    'Siege works' is broad enough to cover the military sense without falsely narrowing
    to one exact structure.
- source_word: סֹלְלָה
  chosen: a ramp
  alternatives:
  - a siege ramp
  - a mound
  lexicon: HALOT
  rationale: Refers to an embankment/ramp built up against a city in siege warfare.
    'Ramp' is concise and understandable; the siege context already makes the military
    sense clear.
- source_word: צִנָּה
  chosen: a large shield
  alternatives:
  - shield
  - mantlet
  lexicon: HALOT
  rationale: Usually a large shield. In siege context it may refer to protective covering/shielding
    equipment. 'Large shield' preserves the lexical value while remaining intelligible;
    'mantlet' is possible but too specialized for the main text.
- source_word: וְנָתַן ... וְשָׁפַךְ ... וְהֵקִים
  chosen: he will set up ... throw up ... raise
  alternatives:
  - he set ... poured out ... established
  lexicon: HALOT
  rationale: These wayyiqtol/qatal forms in prophetic discourse carry future force
    in English within the prediction sequence. The chosen verbs reflect standard siege
    actions in idiomatic English.
