id: EZK.26.9
reference: Ezekiel 26:9
source:
  edition: WLC
  text: וּ/מְחִ֣י קָֽבָלּ֔/וֹ יִתֵּ֖ן בְּ/חֹֽמוֹתָ֑יִ/ךְ וּ/מִ֨גְדְּלֹתַ֔יִ/ךְ יִתֹּ֖ץ
    בְּ/חַרְבוֹתָֽי/ו׃
translation:
  text: He will direct the blow of his battering ram against your walls, and with
    his swords he will tear down your towers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'with his axes' or 'with his iron tools,' if the final phrase
      is understood as referring more generally to siege weapons rather than literally
      to swords.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחִי
  chosen: the blow
  alternatives:
  - the strike
  - the impact
  lexicon: HALOT
  rationale: The noun denotes a striking or blow. 'The blow' is natural English and
    fits the siege context without overparaphrasing.
- source_word: קָבַלּוֹ
  chosen: his battering ram
  alternatives:
  - his siege engine
  - his ram
  lexicon: HALOT
  rationale: In context of assault on city walls, the term refers to a siege implement
    used for battering. 'Battering ram' makes the military image explicit for modern
    readers while remaining faithful to the sense.
- source_word: יִתֵּן
  chosen: will direct
  alternatives:
  - will set
  - will bring
  - will apply
  lexicon: HALOT
  rationale: Literally 'will give/put,' but in English with an object like 'the blow
    of his battering ram' against walls, 'will direct' best conveys the idiomatic
    action of applying the ram to the walls.
- source_word: בְּחֹמוֹתַיִךְ
  chosen: against your walls
  alternatives:
  - on your walls
  - into your walls
  lexicon: HALOT
  rationale: The preposition with a verb of striking naturally yields 'against' in
    English, expressing hostile impact on the city's fortifications.
- source_word: וּמִגְדְּלֹתַיִךְ
  chosen: your towers
  alternatives:
  - your strongholds
  - your turrets
  lexicon: HALOT
  rationale: The noun refers to towers as defensive structures of the city. 'Towers'
    is the straightforward architectural term.
- source_word: יִתֹּץ
  chosen: will tear down
  alternatives:
  - will break down
  - will demolish
  lexicon: HALOT
  rationale: The verb means to pull down or demolish. 'Tear down' is vivid, readable
    modern English and fits siege destruction.
- source_word: בְּחַרְבוֹתָיו
  chosen: with his swords
  alternatives:
  - with his axes
  - with his iron tools
  lexicon: HALOT
  rationale: The consonantal text points to 'swords,' the standard sense of חֶרֶב.
    Although some interpreters think another implement may be implied because towers
    are demolished, the received text is best rendered directly as 'swords,' with
    the contextual tension noted in a footnote.
