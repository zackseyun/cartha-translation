theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine specifies יְהוָה → 'the LORD.' In the fixed Hebrew title
    אֲדֹנָי יְהוִה, English translations commonly use 'Lord GOD' to avoid the awkward
    duplication 'Lord LORD' while still signaling the covenant name behind the title.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
