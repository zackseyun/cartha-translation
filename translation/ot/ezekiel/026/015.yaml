id: EZK.26.15
reference: Ezekiel 26:15
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֛ר אֲדֹנָ֥/י יְהוִ֖ה לְ/צ֑וֹר הֲ/לֹ֣א מִ/קּ֣וֹל מַפַּלְתֵּ֗/ךְ בֶּ/אֱנֹ֨ק
    חָלָ֜ל בֵּ/הָ֤רֵֽג הֶ֨רֶג֙ בְּ/תוֹכֵ֔/ךְ יִרְעֲשׁ֖וּ הָ/אִיִּֽים׀׃
translation:
  text: 'Thus says the Lord GOD to Tyre: Will not the coastlands quake at the sound
    of your fall, when the wounded groan, when slaughter is carried out in your midst?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands.' The Hebrew term can denote islands or, more broadly, coastlands/maritime
      regions.
    reason: lexical_alternative
  - marker: b
    text: '''The wounded'' could also be rendered ''the slain''; the Hebrew word can
      refer to one pierced or fatally wounded. Here ''the wounded'' fits the accompanying
      groaning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered as 'the Lord GOD,' the conventional English representation of
    אֲדֹנָי יְהוִה. Per doctrine, יְהוָה is rendered 'the LORD'; in this compound
    title, English convention uses 'GOD' to avoid 'Lord LORD' while preserving the
    divine title force.
- source_word: לְצוֹר
  chosen: to Tyre
  lexicon: HALOT
  rationale: Proper name of the city, transliterated in standard English form.
- source_word: הֲלֹא
  chosen: Will not
  alternatives:
  - Surely
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer; 'Will
    not' preserves the interrogative force naturally in English.
- source_word: מִקּוֹל
  chosen: at the sound of
  alternatives:
  - from the sound of
  - because of the sound of
  lexicon: HALOT
  rationale: The preposition with 'sound/voice' here marks the occasion or cause of
    the reaction. 'At the sound of' is idiomatic and preserves the sensory trigger.
- source_word: מַפַּלְתֵּךְ
  chosen: your fall
  alternatives:
  - your downfall
  - your collapse
  lexicon: HALOT
  rationale: '''Fall'' is a direct rendering of the noun and fits the prophetic judgment
    context. ''Downfall'' is possible, but ''fall'' keeps the imagery concise and
    closer to the Hebrew.'
- source_word: בֶּאֱנֹק
  chosen: when ... groan
  alternatives:
  - at the groaning of
  - with the groaning of
  lexicon: HALOT
  rationale: The infinitive construct of אנק denotes groaning. In English, converting
    the clause to 'when the wounded groan' yields a natural temporal construction
    while preserving the sense.
- source_word: חָלָל
  chosen: the wounded
  alternatives:
  - the slain
  - the pierced
  lexicon: HALOT
  rationale: Although חָלָל can denote one slain, in this context it is linked with
    groaning, which suits 'the wounded' better than 'the slain.' This avoids the awkwardness
    of dead persons groaning while preserving the injury/death field of meaning.
- source_word: בֵּהָרֵג הֶרֶג
  chosen: when slaughter is carried out
  alternatives:
  - when killing happens
  - at the killing of a slaughter
  - when a massacre occurs
  lexicon: HALOT
  rationale: This infinitive + cognate accusative intensifies the act of killing.
    'When slaughter is carried out' captures the emphatic violence in readable English
    without over-paraphrasing.
- source_word: בְּתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  - inside you
  lexicon: HALOT
  rationale: Addressed to the city as feminine singular; 'in your midst' is the standard
    idiomatic rendering for events occurring within the city.
- source_word: יִרְעֲשׁוּ
  chosen: quake
  alternatives:
  - shake
  - tremble
  lexicon: HALOT
  rationale: The verb denotes shaking or quaking, often from fear or upheaval. 'Quake'
    conveys both physical and emotional disturbance.
- source_word: הָאִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  - the maritime lands
  lexicon: HALOT
  rationale: In prophetic literature אִיִּים often refers broadly to coastlands or
    maritime regions, not merely islands. 'Coastlands' best fits the geopolitical
    scope of Tyre's seafaring world.
