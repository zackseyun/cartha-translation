theological_decisions:
- issue: Metaphorical description of Jerusalem as דַּלְתוֹת הָעַמִּים
  chosen_reading: the gateway of the peoples
  alternative_readings:
  - the doors of the peoples
  - the gates of the nations
  rationale: 'The phrase is metaphorical and somewhat compressed. Rendering it as
    ''gateway of the peoples'' preserves the image while making sense in English:
    Jerusalem is viewed as a strategic access point whose fall benefits Tyre. This
    is a lexical-contextual decision, not a doctrinal one, but it affects interpretation
    enough to document.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
