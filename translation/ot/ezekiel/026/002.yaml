id: EZK.26.2
reference: Ezekiel 26:2
source:
  edition: WLC
  text: בֶּן אָדָ֗ם יַ֠עַן אֲשֶׁר אָ֨מְרָה צֹּ֤ר עַל יְרוּשָׁלִַ֨ם֙ הֶאָ֔ח נִשְׁבְּרָ֛ה
    דַּלְת֥וֹת הָ/עַמִּ֖ים נָסֵ֣בָּה אֵלָ֑/י אִמָּלְאָ֖ה הָחֳרָֽבָה־־־׃
translation:
  text: Son of man, because Tyre said concerning Jerusalem, ‘Aha! The gateway of the
    peoples is broken; it has turned to me. I will be filled, now that she is laid
    waste,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the gates of the peoples' or 'the doors of the peoples.' The Hebrew
      phrase is compressed and may portray Jerusalem as an entry point for many nations.
    reason: lexical_alternative
  - marker: b
    text: That is, Tyre expects to profit from Jerusalem's fall, as trade or access
      is redirected to her.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is the standard vocative address to Ezekiel. 'Son of man' preserves
    the Hebrew idiom and its repeated usage in the book better than more interpretive
    alternatives.
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - inasmuch as
  - for that
  lexicon: HALOT
  rationale: The compound conjunction introduces the reason for the oracle. 'Because'
    is natural modern English and accurately conveys the causal force.
- source_word: צֹּר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the city name.
- source_word: עַל יְרוּשָׁלִַם
  chosen: concerning Jerusalem
  alternatives:
  - against Jerusalem
  - about Jerusalem
  lexicon: HALOT
  rationale: The preposition עַל with verbs of speech can mean 'concerning' or 'against.'
    Here Tyre's statement is hostile, but the immediate sense is speech about Jerusalem;
    the hostility is evident from the content itself.
- source_word: הֶאָח
  chosen: Aha!
  alternatives:
  - Ha!
  - Ah!
  lexicon: HALOT
  rationale: An interjection of malicious gloating. 'Aha!' captures the taunting exclamation
    in idiomatic English.
- source_word: נִשְׁבְּרָה
  chosen: is broken
  alternatives:
  - has been broken
  - is shattered
  lexicon: HALOT
  rationale: The Niphal conveys a passive/resultative sense. 'Is broken' is concise
    and fits the prophetic taunt.
- source_word: דַּלְת֥וֹת הָעַמִּים
  chosen: the gateway of the peoples
  alternatives:
  - the doors of the peoples
  - the gates of the peoples
  lexicon: HALOT
  rationale: Though דַּלְתוֹת is formally plural ('doors/leaves'), in context it functions
    idiomatically for a city gate or gateway. Jerusalem is pictured as an entry point
    for many nations/peoples, likely in trade or access. 'Gateway' communicates the
    collective/functional sense better than the more wooden 'doors.'
- source_word: נָסֵבָּה אֵלַי
  chosen: it has turned to me
  alternatives:
  - she has turned to me
  - it has swung around to me
  lexicon: HALOT
  rationale: The verb conveys turning around/toward. The subject is the 'gateway'
    just mentioned, treated as a feminine noun in Hebrew; English can naturally render
    it as 'it.' The sense is that the advantage or traffic formerly associated with
    Jerusalem now comes to Tyre.
- source_word: אִמָּלְאָה
  chosen: I will be filled
  alternatives:
  - I will be replenished
  - I will become full
  lexicon: HALOT
  rationale: The first-person form expresses Tyre's expectation of gain. 'Filled'
    preserves the metaphor of abundance without over-specifying commercial profit
    in the main text.
- source_word: הָחֳרָבָה
  chosen: she is laid waste
  alternatives:
  - she is ruined
  - she is desolated
  lexicon: HALOT
  rationale: The feminine singular refers to Jerusalem. 'Laid waste' is a natural
    English rendering for urban devastation and preserves the passive/resultative
    force.
