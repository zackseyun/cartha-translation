id: EZK.26.4
reference: Ezekiel 26:4
source:
  edition: WLC
  text: וְ/שִׁחֲת֞וּ חֹמ֣וֹת צֹ֗ר וְ/הָֽרְסוּ֙ מִגְדָּלֶ֔י/הָ וְ/סִֽחֵיתִ֥י עֲפָרָ֖/הּ
    מִמֶּ֑/נָּה וְ/נָתַתִּ֥י אוֹתָ֖/הּ לִ/צְחִ֥יחַ סָֽלַע׃
translation:
  text: They will destroy the walls of Tyre and tear down her towers, and I will scrape
    her soil away from her and make her a bare rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her dust' instead of 'her soil'; the Hebrew עָפָר can denote dust, loose
      earth, or soil. The sense here is that the city will be stripped down to the
      rock.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁחֲתוּ
  chosen: they will destroy
  alternatives:
  - they will ruin
  - they will devastate
  - they will spoil
  lexicon: HALOT
  rationale: The verb שׁחת in this context of siege and demolition refers to destructive
    action against city defenses. 'Destroy' is natural modern English and fits the
    object 'walls' better than the broader 'ruin' or the less idiomatic 'spoil'.
- source_word: חֹמוֹת
  chosen: the walls
  alternatives:
  - walls
  lexicon: HALOT
  rationale: Plural construct with Tyre; rendered straightforwardly as 'the walls'
    to reflect the city's fortifications.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the place name צור.
- source_word: וְהָרְסוּ
  chosen: tear down
  alternatives:
  - demolish
  - break down
  lexicon: HALOT
  rationale: הרס commonly denotes pulling down structures. 'Tear down' is vivid, idiomatic,
    and distinct enough from the previous 'destroy' to preserve the Hebrew's two demolition
    verbs.
- source_word: מִגְדָּלֶיהָ
  chosen: her towers
  alternatives:
  - her strongholds
  lexicon: HALOT
  rationale: מגדל normally means 'tower.' In a city-siege context these are defensive
    towers. 'Her towers' preserves the concrete image.
- source_word: וְסִחֵיתִי
  chosen: I will scrape
  alternatives:
  - I will sweep
  - I will clear away
  lexicon: HALOT
  rationale: The verb from סחה/סיח in this context conveys removing the surface material
    from the city site. 'Scrape' best matches the image of stripping away debris/soil
    down to bedrock.
- source_word: עֲפָרָהּ
  chosen: her soil
  alternatives:
  - her dust
  - her debris
  lexicon: HALOT
  rationale: עפר can mean dust, loose earth, or soil. Here the image is of removing
    the city's very earth from the site. 'Soil' communicates the physical stripping
    more clearly in English than 'dust,' while remaining concrete.
- source_word: מִמֶּנָּה
  chosen: away from her
  alternatives:
  - from her
  - off her
  lexicon: HALOT
  rationale: The preposition marks removal from the city. 'Away from her' reads naturally
    with 'scrape' and preserves the feminine personification of the city.
- source_word: וְנָתַתִּי אֹתָהּ
  chosen: make her
  alternatives:
  - set her as
  - turn her into
  lexicon: HALOT
  rationale: נתן plus predicate can mean to make or set something as something. 'Make
    her' is idiomatic English for the resulting state.
- source_word: לִצְחִיחַ סָלַע
  chosen: a bare rock
  alternatives:
  - a bare place of rock
  - a shining rock
  - a naked rock
  lexicon: HALOT
  rationale: The phrase denotes a stripped, exposed rocky surface. 'Bare rock' captures
    the image of complete desolation and exposure in clear modern English.
