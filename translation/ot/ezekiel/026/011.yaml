id: EZK.26.11
reference: Ezekiel 26:11
source:
  edition: WLC
  text: בְּ/פַרְס֣וֹת סוּסָ֔י/ו יִרְמֹ֖ס אֶת כָּל חֽוּצוֹתָ֑יִ/ךְ עַמֵּ/ךְ֙ בַּ/חֶ֣רֶב
    יַהֲרֹ֔ג וּ/מַצְּב֥וֹת עֻזֵּ֖/ךְ לָ/אָ֥רֶץ תֵּרֵֽד־־׃
translation:
  text: With the hoofs of his horses he will trample all your streets; he will kill
    your people with the sword, and the pillars of your strength will come down to
    the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all your open places' or 'all your squares' for 'all your streets.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the monuments of your strength.' The Hebrew may refer to prominent pillars
      or standing monuments associated with Tyre's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפַרְסוֹת
  chosen: With the hoofs of
  alternatives:
  - By the hoofs of
  - With the hooves of
  lexicon: HALOT
  rationale: 'The preposition ב plus פַרְסוֹת indicates instrument or means: trampling
    is done by means of the horses'' hoofs. ''Hoofs'' is a standard spelling; ''hooves''
    is an acceptable modern variant but not necessary.'
- source_word: סוּסָיו
  chosen: his horses
  alternatives:
  - his horsemen's horses
  - his steeds
  lexicon: HALOT
  rationale: The noun plainly means 'his horses.' The wider context concerns the attacking
    king and his army, but the possessive here directly modifies 'horses,' not 'horsemen.'
    'Steeds' is more literary than the translation philosophy prefers.
- source_word: יִרְמֹס
  chosen: he will trample
  alternatives:
  - he will tread down
  - he will crush underfoot
  lexicon: HALOT
  rationale: The verb רמס commonly conveys trampling underfoot. 'Trample' is vivid,
    natural English, and fits the military devastation imagery.
- source_word: כָּל חוּצוֹתָיִךְ
  chosen: all your streets
  alternatives:
  - all your open places
  - all your squares
  lexicon: HALOT
  rationale: חוּצוֹת can denote streets or open places/plazas within a city. In this
    siege context, 'streets' is the most natural broad rendering in English, while
    still covering the urban thoroughfares being overrun.
- source_word: עַמֵּךְ
  chosen: your people
  alternatives:
  - your populace
  lexicon: HALOT
  rationale: The noun עַם here refers to the inhabitants of the city. 'Your people'
    is the standard and sufficiently direct rendering.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: The phrase is an idiomatic expression for violent killing in battle.
    'With the sword' preserves the concrete imagery and remains idiomatic in English.
- source_word: יַהֲרֹג
  chosen: he will kill
  alternatives:
  - he will slay
  lexicon: HALOT
  rationale: '''Kill'' is the plain sense of הרג. ''Slay'' is traditional but more
    elevated/archaic than desired.'
- source_word: וּמַצְּבוֹת עֻזֵּךְ
  chosen: and the pillars of your strength
  alternatives:
  - and your mighty pillars
  - and the monuments of your strength
  - and the garrisons of your strength
  lexicon: HALOT
  rationale: מַצֵּבוֹת can mean standing stones, pillars, or monuments. In context,
    modified by 'your strength,' it likely refers to prominent strong pillars/monuments
    symbolizing or embodying Tyre's power. 'Pillars of your strength' preserves the
    metaphor and avoids over-specifying military installations. Alternatives such
    as 'garrisons' are too interpretive for the Hebrew form here.
- source_word: לָאָרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  - to the land
  lexicon: HALOT
  rationale: In a falling/destruction context, 'to the ground' is the most idiomatic
    English equivalent of 'to the earth' and communicates collapse.
- source_word: תֵּרֵד
  chosen: will come down
  alternatives:
  - will fall
  - will be brought down
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/come down.' Because the subject
    is plural in sense ('pillars') though the form is singular feminine agreeing with
    a collective/plural noun pattern, the English predicate is rendered plurally.
    'Will come down' preserves the verbal image without forcing a passive not present
    in the Hebrew.
