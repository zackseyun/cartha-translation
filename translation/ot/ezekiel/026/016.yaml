id: EZK.26.16
reference: Ezekiel 26:16
source:
  edition: WLC
  text: וְֽ/יָרְד֞וּ מֵ/עַ֣ל כִּסְאוֹתָ֗/ם כֹּ֚ל נְשִׂיאֵ֣י הַ/יָּ֔ם וְ/הֵסִ֨ירוּ֙
    אֶת מְעִ֣ילֵי/הֶ֔ם וְ/אֶת בִּגְדֵ֥י רִקְמָתָ֖/ם יִפְשֹׁ֑טוּ חֲרָד֤וֹת יִלְבָּ֨שׁוּ֙
    עַל הָ/אָ֣רֶץ יֵשֵׁ֔בוּ וְ/חָֽרְדוּ֙ לִ/רְגָעִ֔ים וְ/שָׁמְמ֖וּ עָלָֽיִ/ךְ־־׀־׃
translation:
  text: Then all the princes of the sea will come down from their thrones, remove
    their robes, and strip off their embroidered garments. They will clothe themselves
    with trembling, sit on the ground, tremble moment by moment, and be appalled at
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the leaders of the sea.' The Hebrew phrase is literally 'all the
      princes of the sea,' referring to maritime rulers.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'They will wear tremblings,' a vivid image of terror as clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרְדוּ
  chosen: Then ... will come down
  alternatives:
  - and ... will go down
  - and ... will descend
  lexicon: HALOT
  rationale: The verb means 'go/come down, descend.' 'Come down' fits the English
    perspective in a prophetic scene and naturally introduces the sequence. 'Then'
    brings out the narrative force of the prefixed conjunction in context.
- source_word: מֵעַל כִּסְאוֹתָם
  chosen: from their thrones
  alternatives:
  - from upon their thrones
  - off their seats
  lexicon: HALOT
  rationale: כִּסֵּא commonly means 'throne/seat.' Given these are rulers, 'thrones'
    preserves their status and the humiliation implied by leaving them.
- source_word: כֹּל נְשִׂיאֵי הַיָּם
  chosen: all the princes of the sea
  alternatives:
  - all the leaders of the sea
  - all the rulers of the coastlands
  lexicon: HALOT
  rationale: נָשִׂיא is a leader, prince, or chief. 'Princes' preserves the elevated
    political sense. הַיָּם is literally 'the sea'; in context it refers to maritime
    rulers, so the literal phrase is retained rather than interpreting more freely
    as 'coastlands' in the main text.
- source_word: וְהֵסִירוּ
  chosen: remove
  alternatives:
  - take off
  - put away
  lexicon: HALOT
  rationale: The Hiphil of סוּר here means to remove. 'Remove' is slightly more formal
    and pairs well with the following clothing actions.
- source_word: מְעִילֵיהֶם
  chosen: their robes
  alternatives:
  - their outer garments
  - their mantles
  lexicon: HALOT
  rationale: מְעִיל denotes an outer robe or mantle. 'Robes' is clear modern English
    and suits the dignified attire of rulers.
- source_word: בִּגְדֵי רִקְמָתָם
  chosen: their embroidered garments
  alternatives:
  - their richly woven garments
  - their embroidered clothes
  lexicon: HALOT
  rationale: בֶּגֶד is garment/clothing; רִקְמָה refers to embroidered or variegated
    work. 'Embroidered garments' is a natural rendering that preserves the luxury
    implied.
- source_word: יִפְשֹׁטוּ
  chosen: strip off
  alternatives:
  - take off
  - remove
  lexicon: HALOT
  rationale: פשט with clothing means to strip off or take off. 'Strip off' gives the
    stronger, more vivid force of the Hebrew and avoids flattening the parallelism
    with 'remove' earlier.
- source_word: חֲרָדוֹת יִלְבָּשׁוּ
  chosen: They will clothe themselves with trembling
  alternatives:
  - they will put on trembling
  - they will be clothed with terror
  lexicon: HALOT
  rationale: Literally, 'tremblings they will wear/put on.' The idiom personifies
    terror as clothing. 'Clothe themselves with trembling' preserves the metaphor
    while remaining readable. 'Terror' is possible interpretively, but 'trembling'
    stays closer to the noun.
- source_word: עַל הָאָרֶץ יֵשֵׁבוּ
  chosen: sit on the ground
  alternatives:
  - sit on the earth
  - sit upon the ground
  lexicon: HALOT
  rationale: Though הָאָרֶץ can mean 'earth/land,' in this posture context 'ground'
    is the most natural English expression and conveys abasement.
- source_word: וְחָרְדוּ לִרְגָעִים
  chosen: tremble moment by moment
  alternatives:
  - tremble every moment
  - shudder continually
  lexicon: HALOT
  rationale: The verb means tremble/shudder. לִרְגָעִים is literally 'for moments'
    or 'at moments,' idiomatically expressing repeated or continual trembling. 'Moment
    by moment' captures the iterative force well.
- source_word: וְשָׁמְמוּ עָלָיִךְ
  chosen: and be appalled at you
  alternatives:
  - and be astonished because of you
  - and be desolated over you
  lexicon: HALOT
  rationale: שׁמם can denote being appalled, desolated, or astonished. In judgment
    contexts with עַל, 'be appalled at/over' is idiomatic English and fits the reaction
    to Tyre's downfall.
