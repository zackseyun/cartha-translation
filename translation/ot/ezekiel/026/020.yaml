id: EZK.26.20
reference: Ezekiel 26:20
source:
  edition: WLC
  text: וְ/הוֹרַדְתִּי/ךְ֩ אֶת י֨וֹרְדֵי ב֜וֹר אֶל עַ֣ם עוֹלָ֗ם וְ֠/הוֹשַׁבְתִּי/ךְ
    בְּ/אֶ֨רֶץ תַּחְתִּיּ֜וֹת כָּ/חֳרָב֤וֹת מֵֽ/עוֹלָם֙ אֶת י֣וֹרְדֵי ב֔וֹר לְמַ֖עַן
    לֹ֣א תֵשֵׁ֑בִי וְ/נָתַתִּ֥י צְבִ֖י בְּ/אֶ֥רֶץ חַיִּֽים־־־׃
translation:
  text: Then I will bring you down with those who go down to the pit, to the people
    of long ago; and I will make you dwell in the land below, like ruins from ancient
    times, with those who go down to the pit, so that you will not be inhabited. But
    I will set beauty in the land of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of old' or 'the ancient people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the lower earth' or 'in the lowest regions.'
    reason: lexical_alternative
  - marker: c
    text: Or 'glory' or 'splendor' in the land of the living.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרַדְתִּיךְ
  chosen: Then I will bring you down
  alternatives:
  - and I will bring you down
  - I will cast you down
  lexicon: HALOT
  rationale: Hiphil of ירד with 2fs suffix is causative, 'cause you to go down.' 'Bring
    you down' is natural English and preserves the downward movement without overinterpreting
    as violent overthrow.
- source_word: יֹרְדֵי בוֹר
  chosen: those who go down to the pit
  alternatives:
  - those descending to the pit
  - those who go down to the grave
  lexicon: HALOT
  rationale: The participial phrase is rendered verbally for readable English. 'Pit'
    preserves the concrete Hebrew image and its underworld/grave resonance better
    than flattening to 'grave' in the main text.
- source_word: בּוֹר
  chosen: pit
  alternatives:
  - grave
  - dungeon
  lexicon: HALOT
  rationale: In this context of descent to the underworld realm, 'pit' is the standard
    and suitably broad rendering, allowing both grave and netherworld associations.
- source_word: עַם עוֹלָם
  chosen: the people of long ago
  alternatives:
  - the everlasting people
  - the people of old
  - the ancient people
  lexicon: HALOT
  rationale: Here עוֹלָם refers to antiquity/remote past rather than endless duration.
    'The people of long ago' communicates the dead of former generations in idiomatic
    English.
- source_word: וְהוֹשַׁבְתִּיךְ
  chosen: I will make you dwell
  alternatives:
  - I will settle you
  - I will place you to dwell
  lexicon: HALOT
  rationale: Hiphil of ישׁב is causative. 'Make you dwell' preserves the causative
    force and fits the judgment context.
- source_word: בְּאֶרֶץ תַּחְתִּיּוֹת
  chosen: in the land below
  alternatives:
  - in the lower earth
  - in the netherworld
  - in the lowest parts of the earth
  lexicon: HALOT
  rationale: Literally 'in a land of lower places/lowest regions.' 'The land below'
    is concise, natural, and preserves the underworld sense without importing later
    technical terminology.
- source_word: כָּחֳרָבוֹת מֵעוֹלָם
  chosen: like ruins from ancient times
  alternatives:
  - like ancient ruins
  - as the desolations of old
  - among ruins from of old
  lexicon: HALOT
  rationale: The phrase compares Tyre's fate to age-old ruins/desolations. 'Like ruins
    from ancient times' captures both the comparative כ and the temporal sense of
    מֵעוֹלָם.
- source_word: לְמַעַן לֹא תֵשֵׁבִי
  chosen: so that you will not be inhabited
  alternatives:
  - so that you will not dwell
  - so that you may not be settled
  lexicon: HALOT
  rationale: Although the verb is 2fs Qal of ישׁב ('sit/dwell'), in context addressed
    to the city it naturally means being inhabited/settled. English idiom favors passive
    'be inhabited' for a city.
- source_word: וְנָתַתִּי
  chosen: But I will set
  alternatives:
  - and I will set
  - and I will give
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively because the clause contrasts
    the judged city with what God will establish in the land of the living. 'Set'
    fits the object 'beauty/glory' better than the more wooden 'give'.
- source_word: צְבִי
  chosen: beauty
  alternatives:
  - glory
  - splendor
  - honor
  lexicon: HALOT
  rationale: צְבִי can denote beauty, splendor, or glory. 'Beauty' is chosen because
    it is a common sense of the noun and avoids overdefining the referent; the broader
    sense is preserved in a footnote.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: in the land of the living
  alternatives:
  - in the living land
  lexicon: HALOT
  rationale: This is a standard idiom for the realm of earthly life in contrast to
    the pit/underworld. The traditional rendering is both accurate and clear.
