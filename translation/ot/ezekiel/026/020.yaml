theological_decisions:
- issue: Referent and nuance of the final clause וְנָתַתִּי צְבִי בְּאֶרֶץ חַיִּים
  chosen_reading: Render generally as God's setting 'beauty' in the land of the living,
    without specifying beyond the Hebrew whether this means glory, splendor, or restoration
    elsewhere.
  alternative_readings:
  - I will set glory in the land of the living
  - I will restore splendor in the land of the living
  rationale: The Hebrew is terse and somewhat debated in context. The translation
    preserves the contrast between descent to the pit and God's action in the land
    of the living without importing a more specific theological interpretation than
    the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
