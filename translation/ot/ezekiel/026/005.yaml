id: EZK.26.5
reference: Ezekiel 26:5
source:
  edition: WLC
  text: מִשְׁטַ֨ח חֲרָמִ֤ים תִּֽהְיֶה֙ בְּ/ת֣וֹךְ הַ/יָּ֔ם כִּ֚י אֲנִ֣י דִבַּ֔רְתִּי נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה וְ/הָיְתָ֥ה לְ/בַ֖ז לַ/גּוֹיִֽם׃
translation:
  text: She will become a place for spreading nets in the midst of the sea, for I have spoken, declares the Lord GOD, and she will become plunder for the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spreading place for fishing nets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁטַח
  chosen: a place for spreading
  alternatives:
  - a spreading place
  - an outspread surface
  lexicon: HALOT
  rationale: The noun denotes a spread-out place or surface. In context with חֲרָמִים, the idiom refers to an area used to spread fishing nets out to dry, so an infinitival English phrase is more natural while preserving the image.
- source_word: חֲרָמִים
  chosen: nets
  alternatives:
  - fishing nets
  lexicon: HALOT
  rationale: The plural refers to fishing nets. 'Nets' is sufficient in context, since the maritime setting already signals the kind of nets in view.
- source_word: בְּתוֹךְ הַיָּם
  chosen: in the midst of the sea
  alternatives:
  - in the middle of the sea
  - in the heart of the sea
  lexicon: HALOT
  rationale: A fairly direct rendering of the prepositional phrase. 'Sea' is retained rather than 'ocean'; 'in the midst' preserves the elevated prophetic diction without becoming archaic.
- source_word: כִּי אֲנִי דִבַּרְתִּי
  chosen: for I have spoken
  alternatives:
  - for I have said
  - because I have spoken
  lexicon: HALOT
  rationale: The perfect verb grounds the certainty of the oracle in the Lord's utterance. 'I have spoken' is a standard and fitting prophetic rendering.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is the prophetic formula 'declares/oracle of.' For יְהוָה, the doctrinal default is 'the LORD'; because אֲדֹנָי precedes it, 'Lord GOD' avoids the awkward 'Lord LORD' while still signaling the divine name by small-caps convention in 'GOD'.
- source_word: וְהָיְתָה לְבַז
  chosen: and she will become plunder
  alternatives:
  - and she will become spoil
  - and she will be for plunder
  lexicon: HALOT
  rationale: לְבַז indicates being given over as spoil/plunder. 'Become plunder' is idiomatic English and preserves the resultative sense.
- source_word: לַגּוֹיִם
  chosen: for the nations
  alternatives:
  - for the nations around
  - for the Gentiles
  lexicon: HALOT
  rationale: In this judgment context, גּוֹיִם refers to the nations/peoples, not specifically 'Gentiles' in a later theological sense.
- source_word: תִּהְיֶה ... וְהָיְתָה
  chosen: She will become ... and she will become
  alternatives:
  - It will become ... and it will become
  lexicon: HALOT
  rationale: The feminine singular verbs refer to Tyre, a city regularly personified as feminine. 'She' preserves the grammatical and literary personification better than impersonal 'it'.
