id: EZK.26.19
reference: Ezekiel 26:19
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה בְּ/תִתִּ֤/י אֹתָ/ךְ֙ עִ֣יר נֶחֱרֶ֔בֶת כֶּ/עָרִ֖ים אֲשֶׁ֣ר לֹֽא נוֹשָׁ֑בוּ בְּ/הַעֲל֤וֹת עָלַ֨יִ/ךְ֙ אֶת תְּה֔וֹם וְ/כִסּ֖וּ/ךְ הַ/מַּ֥יִם הָ/רַבִּֽים־־׃
translation:
  text: 'For thus says the Lord GOD: When I make you a ruined city, like the cities that are not inhabited, when I bring up the deep over you and the great waters cover you,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when I cause the deep to rise over you.'
    reason: lexical_alternative
  - marker: b
    text: '''The many waters'' may also be rendered ''great waters.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; however, in the compound אֲדֹנָי יְהוִה, many English translations use 'Lord GOD' to avoid 'Lord LORD.' This preserves the distinct divine title construction while remaining readable.
- source_word: בְּתִתִּי
  chosen: When I make
  alternatives:
  - when I give
  - in my making
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this causative-like idiom with a predicate object ('make you a ruined city') English 'make' best reflects the sense.
- source_word: עִיר נֶחֱרֶבֶת
  chosen: a ruined city
  alternatives:
  - a desolated city
  - a city laid waste
  lexicon: HALOT
  rationale: The participle from חרב denotes being ruined/desolated. 'Ruined city' is natural modern English and preserves the passive-result sense.
- source_word: כֶּעָרִים אֲשֶׁר לֹא נוֹשָׁבוּ
  chosen: like the cities that are not inhabited
  alternatives:
  - like the cities that are uninhabited
  - like the cities that no one inhabits
  lexicon: HALOT
  rationale: The Niphal of ישב here describes cities left without inhabitants. 'Are not inhabited' is slightly more formal but closely tracks the Hebrew verbal form.
- source_word: בְּהַעֲלוֹת ... אֶת תְּהוֹם
  chosen: when I bring up the deep
  alternatives:
  - when I cause the deep to rise
  - when I bring the deep up
  lexicon: HALOT
  rationale: The infinitive construct of עלה with תְּהוֹם conveys causing the deep waters to come up. 'Bring up the deep' is concise and preserves the imagery.
- source_word: תְּהוֹם
  chosen: the deep
  alternatives:
  - the abyss
  - the deep waters
  lexicon: HALOT
  rationale: תְּהוֹם commonly refers to the primeval deep or oceanic depths. 'The deep' is the standard, sufficiently weighty English rendering without overinterpreting cosmological nuance.
- source_word: וְכִסּוּךְ הַמַּיִם הָרַבִּים
  chosen: and the many waters cover you
  alternatives:
  - and great waters cover you
  - and abundant waters cover you
  lexicon: HALOT
  rationale: רַבִּים with 'waters' can mean many/mighty/great. 'Many waters' is a transparent rendering that preserves the Hebrew idiom and echoes biblical flood/judgment language.
