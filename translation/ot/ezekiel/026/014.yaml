id: EZK.26.14
reference: Ezekiel 26:14
source:
  edition: WLC
  text: וּ/נְתַתִּ֞י/ךְ לִ/צְחִ֣יחַ סֶ֗לַע מִשְׁטַ֤ח חֲרָמִים֙ תִּֽהְיֶ֔ה לֹ֥א תִבָּנֶ֖ה ע֑וֹד כִּ֣י אֲנִ֤י יְהוָה֙ דִּבַּ֔רְתִּי נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃ס
translation:
  text: I will make you a bare rock, a place for spreading nets. You will not be rebuilt again, for I, Yahweh, have spoken, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a place to spread fishing nets.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH; the closing title is literally 'Lord YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּנְתַתִּיךְ
  chosen: I will make you
  alternatives:
  - and I will set you
  - and I will give you over as
  lexicon: HALOT
  rationale: נתן with a predicative complement here expresses causing Tyre to become something, not merely 'giving.' 'I will make you' is idiomatic and fits the following complements.
- source_word: לִצְחִיחַ סֶלַע
  chosen: a bare rock
  alternatives:
  - a shining rock
  - a dry rock
  - a naked rock
  lexicon: HALOT
  rationale: The phrase denotes a stripped, barren rock surface. 'Bare rock' communicates the image naturally in English and matches the context of total desolation.
- source_word: מִשְׁטַח חֲרָמִים
  chosen: a place for spreading nets
  alternatives:
  - a spreading place of nets
  - a place to spread fishing nets
  lexicon: HALOT
  rationale: מִשְׁטַח is a spreading surface/place, and חֲרָמִים are fishing nets. The chosen rendering is clear modern English while preserving the concrete image.
- source_word: תִּהְיֶה
  chosen: You will be
  alternatives:
  - you shall become
  lexicon: HALOT
  rationale: Simple future of היה linking Tyre to the predicate 'a place for spreading nets.' 'You will be' is the most natural English copular rendering.
- source_word: לֹא תִבָּנֶה עוֹד
  chosen: You will not be rebuilt again
  alternatives:
  - you will never be rebuilt
  - you will not be built anymore
  lexicon: HALOT
  rationale: The Niphal of בנה is passive/reflexive, 'be rebuilt.' עוֹד adds the sense 'again/any longer.' 'Again' preserves the temporal force without overstating to an absolute 'never' beyond the wording.
- source_word: כִּי אֲנִי יְהוָה דִּבַּרְתִּי
  chosen: for I, the LORD, have spoken
  alternatives:
  - for I, the LORD, have said it
  - because I, the LORD, have spoken
  lexicon: HALOT
  rationale: The causal כִּי introduces the ground of certainty. Per doctrine, יְהוָה is rendered 'the LORD.' 'Have spoken' preserves the prophetic formula's solemnity.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic declaration formula. 'Declares' is idiomatic in English prophetic style. אֲדֹנָי יְהוִה is conventionally and accurately rendered 'Lord GOD,' distinguishing אדני from the divine name.
