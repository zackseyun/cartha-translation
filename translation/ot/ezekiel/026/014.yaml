theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord GOD Yahweh
  - the Lord Yahweh
  rationale: To reflect both elements of the Hebrew title without awkward repetition ('Lord LORD'), the standard English equivalent 'the Lord GOD' is used. This preserves the distinction between אֲדֹנָי and יְהוִה while honoring the doctrine's default for YHWH.
