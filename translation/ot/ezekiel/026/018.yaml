id: EZK.26.18
reference: Ezekiel 26:18
source:
  edition: WLC
  text: עַתָּה֙ יֶחְרְד֣וּ הָֽ/אִיִּ֔ן י֖וֹם מַפַּלְתֵּ֑/ךְ וְ/נִבְהֲל֛וּ הָ/אִיִּ֥ים
    אֲשֶׁר בַּ/יָּ֖ם מִ/צֵּאתֵֽ/ךְ־׃ס
translation:
  text: Now the coastlands will tremble on the day of your downfall, and the islands
    that are in the sea will be terrified at your departure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands' in the first clause; Hebrew אִיִּים can refer either to
      islands or to coastlands/maritime lands. Here 'coastlands' is used for the broader
      sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from your going out' or 'because of your going out.' The phrase
      likely refers to Tyre's disappearance in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the immediate consequence of Tyre's fall. 'Now'
    is natural English and fits the prophetic discourse.
- source_word: יֶחְרְדוּ
  chosen: will tremble
  alternatives:
  - will quake
  - will shudder
  - will be terrified
  lexicon: HALOT
  rationale: From חרד, expressing trembling with fear. 'Will tremble' preserves the
    physical-emotional force without overinterpreting.
- source_word: הָאִיִּן
  chosen: the coastlands
  alternatives:
  - the islands
  lexicon: HALOT
  rationale: אִי/אִיִּים can denote islands or maritime coastlands. In prophetic literature
    it often refers broadly to distant maritime lands/peoples, so 'coastlands' best
    captures the wider geographic sense here.
- source_word: יוֹם מַפַּלְתֵּךְ
  chosen: on the day of your downfall
  alternatives:
  - in the day of your fall
  - on the day of your collapse
  lexicon: HALOT
  rationale: Construct phrase indicating the time of Tyre's ruin. 'Downfall' is idiomatic
    and suitably weighty for prophetic judgment.
- source_word: וְנִבְהֲלוּ
  chosen: will be terrified
  alternatives:
  - will be dismayed
  - will panic
  - will be appalled
  lexicon: HALOT
  rationale: From בהל in the Niphal, conveying alarm or dismay. 'Will be terrified'
    matches the fear-laden context and complements 'will tremble' without flattening
    the distinction.
- source_word: הָאִיִּים אֲשֶׁר בַּיָּם
  chosen: the islands that are in the sea
  alternatives:
  - the coastlands that are by the sea
  - the maritime lands
  lexicon: HALOT
  rationale: Here the added qualifier 'that are in the sea' favors the more literal
    sense 'islands' rather than the broader 'coastlands.' Preserving the distinction
    between the two occurrences of איים reflects the Hebrew wording.
- source_word: מִצֵּאתֵךְ
  chosen: at your departure
  alternatives:
  - because of your going out
  - when you vanish
  - at your exit
  lexicon: HALOT
  rationale: From יצא, literally 'your going out.' In context of Tyre's destruction,
    it likely refers to her disappearance/departure from the scene. 'At your departure'
    is concise and preserves the metaphorical force without making it more explicit
    than the Hebrew does.
