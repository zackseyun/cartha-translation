id: EZK.26.12
reference: Ezekiel 26:12
source:
  edition: WLC
  text: וְ/שָׁלְל֣וּ חֵילֵ֗/ךְ וּ/בָֽזְזוּ֙ רְכֻלָּתֵ֔/ךְ וְ/הָֽרְסוּ֙ חוֹמוֹתַ֔יִ/ךְ
    וּ/בָתֵּ֥י חֶמְדָּתֵ֖/ךְ יִתֹּ֑צוּ וַ/אֲבָנַ֤יִ/ךְ וְ/עֵצַ֨יִ/ךְ֙ וַֽ/עֲפָרֵ֔/ךְ
    בְּ/ת֥וֹךְ מַ֖יִם יָשִֽׂימוּ׃
translation:
  text: They will plunder your wealth and loot your merchandise. They will tear down
    your walls and demolish your splendid houses. They will throw your stones, your
    timbers, and your rubble into the midst of the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your dust.' The Hebrew word can mean 'dust,' 'earth,' or, in this context,
      the debris of a demolished city.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלְלוּ
  chosen: will plunder
  alternatives:
  - will spoil
  - will carry off as spoil
  lexicon: HALOT
  rationale: The verb שׁלל commonly denotes taking spoil in war. 'Plunder' is natural
    modern English and preserves the military-economic sense better than the archaic
    'spoil'.
- source_word: חֵילֵךְ
  chosen: your wealth
  alternatives:
  - your army
  - your strength
  - your resources
  lexicon: HALOT
  rationale: 'חַיִל can mean strength, army, or wealth/resources depending on context.
    Here, paired with commercial language (''your merchandise'') and in an oracle
    against Tyre, the economic sense fits best: the invaders seize her riches.'
- source_word: בָזְזוּ
  chosen: loot
  alternatives:
  - plunder
  - despoil
  lexicon: HALOT
  rationale: A near-synonym of שׁלל, but varying the English avoids awkward repetition
    while keeping the sense of violent seizure.
- source_word: רְכֻלָּתֵךְ
  chosen: your merchandise
  alternatives:
  - your trade goods
  - your wares
  - your commerce
  lexicon: HALOT
  rationale: The noun refers to trade or merchandise. Because the object is something
    seized, 'merchandise' or 'trade goods' fits better than the more abstract 'commerce.'
    'Merchandise' is concise and idiomatic.
- source_word: הָרְסוּ
  chosen: will tear down
  alternatives:
  - will destroy
  - will break down
  lexicon: HALOT
  rationale: Used for pulling down structures. 'Tear down' is vivid and structurally
    specific, fitting walls.
- source_word: חוֹמוֹתַיִךְ
  chosen: your walls
  lexicon: HALOT
  rationale: Straightforward plural of city walls/fortifications.
- source_word: בָתֵּי חֶמְדָּתֵךְ
  chosen: your splendid houses
  alternatives:
  - your pleasant houses
  - your desirable houses
  - your precious houses
  lexicon: HALOT
  rationale: The phrase denotes houses of delight/desire, i.e., fine or luxurious
    houses. 'Splendid houses' communicates the sense in clear modern English without
    sounding wooden.
- source_word: יִתֹּצוּ
  chosen: will demolish
  alternatives:
  - will break down
  - will pull down
  lexicon: HALOT
  rationale: The verb נתץ often means to smash or demolish structures. 'Demolish'
    fits buildings naturally and complements 'tear down' used earlier.
- source_word: אֲבָנַיִךְ
  chosen: your stones
  lexicon: HALOT
  rationale: Literal building stones from the destroyed city.
- source_word: עֵצַיִךְ
  chosen: your timbers
  alternatives:
  - your wood
  - your beams
  lexicon: HALOT
  rationale: Though literally 'your woods/wood,' in this construction with stones
    and debris from demolished buildings, 'timbers' best conveys construction material.
- source_word: עֲפָרֵךְ
  chosen: your rubble
  alternatives:
  - your dust
  - your debris
  - your soil
  lexicon: HALOT
  rationale: עָפָר literally means dust/earth. In context—stones, timbers, and material
    cast into the water after demolition—'rubble' captures the practical sense of
    pulverized debris better than the more literal but potentially misleading 'dust.'
- source_word: בְּתוֹךְ מַיִם
  chosen: into the midst of the waters
  alternatives:
  - into the water
  - into the heart of the sea
  lexicon: HALOT
  rationale: The Hebrew is literally 'into the midst of waters.' Retaining 'waters'
    preserves the plural form and the vividness of the image, while 'into' reflects
    the motion implied by 'put/place' in context.
- source_word: יָשִׂימוּ
  chosen: will throw
  alternatives:
  - will put
  - will place
  lexicon: HALOT
  rationale: The basic verb means 'put/place,' but in context of hostile destruction
    and dumping building remains into the waters, English idiom prefers 'throw.' This
    is a contextually justified dynamic adjustment within optimal equivalence.
