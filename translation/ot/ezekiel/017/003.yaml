theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt sets the default rendering of יְהוָה as 'the LORD.'
    In the fixed Hebrew title אֲדֹנָי יְהוִה, however, English convention 'the Lord
    GOD' avoids the confusing 'Lord LORD' while still signaling the divine name. This
    is a translation convention rather than a doctrinally loaded choice.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation
    philosophy §1, §6'
