id: EZK.17.3
reference: Ezekiel 17:3
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֞ כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה הַ/נֶּ֤שֶׁר הַ/גָּדוֹל֙ גְּד֤וֹל
    הַ/כְּנָפַ֨יִם֙ אֶ֣רֶךְ הָ/אֵ֔בֶר מָלֵא֙ הַ/נּוֹצָ֔ה אֲשֶׁר ל֖/וֹ הָֽ/רִקְמָ֑ה
    בָּ֚א אֶל הַ/לְּבָנ֔וֹן וַ/יִּקַּ֖ח אֶת צַמֶּ֥רֶת הָ/אָֽרֶז־׀־־־׃
translation:
  text: 'and say, ‘Thus says the Lord GOD: The great eagle, great in wingspan, long
    in pinions, full of plumage, which had variegated feathers, came to Lebanon and
    took the top of the cedar.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''which had embroidery/variegation''; the phrase likely refers
      metaphorically to richly patterned or multicolored plumage.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.'
    Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English
    tradition commonly avoids 'Lord LORD' by using 'Lord GOD.' This preserves the
    divine title distinction without awkward repetition.
- source_word: הַנֶּשֶׁר הַגָּדוֹל
  chosen: The great eagle
  alternatives:
  - The large eagle
  lexicon: HALOT
  rationale: נֶשֶׁר is the large bird of prey traditionally rendered 'eagle.' 'Great'
    reflects both size and grandeur and fits the allegorical register of the riddle.
- source_word: גְּדוֹל הַכְּנָפַיִם
  chosen: great in wingspan
  alternatives:
  - great of wings
  - large-winged
  lexicon: HALOT
  rationale: A semi-idiomatic rendering that preserves the Hebrew descriptive force
    while sounding natural in English. It refers to the eagle's impressive wings.
- source_word: אֶרֶךְ הָאֵבֶר
  chosen: long in pinions
  alternatives:
  - long of limb
  - long-feathered
  - long in wing-feathers
  lexicon: HALOT
  rationale: אֵבֶר here refers to wing/flight feathers or pinions rather than a generic
    'limb.' 'Long in pinions' best fits avian imagery and keeps the poetic compactness.
- source_word: מָלֵא הַנּוֹצָה
  chosen: full of plumage
  alternatives:
  - full of feathers
  lexicon: HALOT
  rationale: '''Plumage'' is slightly more literary and suits the elevated metaphor,
    while accurately conveying abundant feathers.'
- source_word: אֲשֶׁר לוֹ הָרִקְמָה
  chosen: which had variegated feathers
  alternatives:
  - which had colorful plumage
  - which had embroidered plumage
  lexicon: HALOT
  rationale: רִקְמָה literally denotes variegated or embroidered work. In this avian
    context it describes patterned, multicolored plumage. 'Variegated feathers' preserves
    the image without forcing the textile metaphor into the main text.
- source_word: בָּא אֶל הַלְּבָנוֹן
  chosen: came to Lebanon
  alternatives:
  - came to the Lebanon
  lexicon: HALOT
  rationale: Straightforward geographic rendering. English normally omits the article
    with the place name.
- source_word: צַמֶּרֶת הָאָרֶז
  chosen: the top of the cedar
  alternatives:
  - the treetop of the cedar
  - the crown of the cedar
  lexicon: HALOT
  rationale: צַמֶּרֶת denotes the topmost part, tuft, or crown. 'Top' is clear and
    direct; 'cedar' preserves the specific tree imagery central to the allegory.
