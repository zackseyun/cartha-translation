theological_decisions:
- issue: Covenantal-political terminology
  chosen_reading: Retain 'covenant' rather than reducing the term to a merely secular
    'treaty.'
  alternative_readings:
  - made a treaty with him
  rationale: The Hebrew בְּרִית is the normal covenant term and should be preserved
    unless context clearly demands otherwise. Here the political arrangement is still
    expressed in covenantal language, and the following oath reinforces that solemn
    binding character.
  doctrine_reference: Translation philosophy §1, §5
- issue: אָלָה nuance
  chosen_reading: Render with 'oath' in the main text while preserving curse-sanction
    nuance in a footnote.
  alternative_readings:
  - curse
  - curse-oath
  rationale: The source term can carry both oath and curse dimensions. To preserve
    theological and legal tension rather than over-resolve it, the main text uses
    accessible English and the footnote records the fuller semantic range.
  doctrine_reference: Translation philosophy §3
