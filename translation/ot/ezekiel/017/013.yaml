id: EZK.17.13
reference: Ezekiel 17:13
source:
  edition: WLC
  text: וַ/יִּקַּח֙ מִ/זֶּ֣רַע הַ/מְּלוּכָ֔ה וַ/יִּכְרֹ֥ת אִתּ֖/וֹ בְּרִ֑ית וַ/יָּבֵ֤א
    אֹת/וֹ֙ בְּ/אָלָ֔ה וְ/אֶת אֵילֵ֥י הָ/אָ֖רֶץ לָקָֽח־׃
translation:
  text: And he took one of the royal offspring and made a covenant with him, bringing
    him under an oath, and he took the mighty men of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under a curse-oath'; the Hebrew term can denote an oath accompanied
      by a curse for breaking it.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזֶּרַע הַמְּלוּכָה
  chosen: one of the royal offspring
  alternatives:
  - from the seed of the kingdom
  - from the royal seed
  - one of the king's descendants
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed,' but in human lineage contexts it refers
    to offspring/descendants. הַמְּלוּכָה denotes royalty/kingship/royal house. 'One
    of the royal offspring' preserves the partitive sense of מִן and gives clear modern
    English without flattening the dynastic nuance.
- source_word: וַיִּכְרֹת אִתּוֹ בְּרִית
  chosen: made a covenant with him
  alternatives:
  - cut a covenant with him
  - made a treaty with him
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' 'Made a covenant'
    is natural English while retaining covenantal force better than the more political
    'treaty.'
- source_word: וַיָּבֵא אֹתוֹ בְּאָלָה
  chosen: bringing him under an oath
  alternatives:
  - caused him to enter into an oath
  - brought him into a curse
  - put him under a curse-oath
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often with curse-sanction. In this political-covenantal
    context, the sense is that he bound him by a sworn obligation. 'Bringing him under
    an oath' is idiomatic and preserves the coercive covenantal force. Because the
    Hebrew term can include the idea of a curse-oath, that nuance is preserved in
    a footnote.
- source_word: אֵילֵי הָאָרֶץ
  chosen: the mighty men of the land
  alternatives:
  - the nobles of the land
  - the leaders of the land
  - the strong ones of the land
  lexicon: HALOT
  rationale: אֵילִים literally means 'rams' but figuratively denotes powerful men,
    nobles, or leaders. 'Mighty men' preserves the metaphorical sense of strength
    and status without over-specifying a formal office.
- source_word: לָקָח
  chosen: he took
  alternatives:
  - he seized
  lexicon: HALOT
  rationale: The final verb resumes the narrative action plainly. 'Took' is the standard
    rendering and fits the context of taking away the land's leading men.
