id: EZK.17.22
reference: Ezekiel 17:22
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה וְ/לָקַ֣חְתִּי אָ֗נִי מִ/צַּמֶּ֧רֶת הָ/אֶ֛רֶז
    הָ/רָמָ֖ה וְ/נָתָ֑תִּי מֵ/רֹ֤אשׁ יֹֽנְקוֹתָי/ו֙ רַ֣ךְ אֶקְטֹ֔ף וְ/שָׁתַ֣לְתִּי
    אָ֔נִי עַ֥ל הַר גָּבֹ֖הַ וְ/תָלֽוּל־׃
translation:
  text: 'Thus says the Lord GOD: I myself will take from the top of the lofty cedar
    and set it out. From the tip of its young shoots I myself will pluck a tender
    one, and I myself will plant it on a high and lofty mountain.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the crown of the cedar.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a tender one'; that is, a tender shoot or sprig.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the divine title as 'the Lord GOD' to reflect the traditional
    English handling of אֲדֹנָי + יְהוִה while honoring the doctrine default that
    יְהוָה is rendered 'the LORD.' Because 'Lord LORD' is awkward in English, 'GOD'
    signals the underlying divine name in this compound title.
- source_word: מִצַּמֶּרֶת
  chosen: from the top
  alternatives:
  - from the treetop
  - from the crown
  lexicon: HALOT
  rationale: The noun refers to the topmost part or crown of a tree. 'From the top'
    is clear modern English and fits the following cedar imagery without over-specifying
    beyond the Hebrew.
- source_word: הָאֶרֶז הָרָמָה
  chosen: the lofty cedar
  alternatives:
  - the high cedar
  - the exalted cedar
  lexicon: HALOT
  rationale: אֶרֶז is 'cedar.' הָרָמָה describes it as high/elevated. 'Lofty cedar'
    is idiomatic and preserves the elevated imagery.
- source_word: וְנָתַתִּי
  chosen: and set it out
  alternatives:
  - and place it
  - and put it
  lexicon: HALOT
  rationale: In this horticultural context, after taking from the cedar, the verb
    naturally means to place/set the cutting for planting. 'Set it out' fits the sequence
    and anticipates the explicit planting later in the verse.
- source_word: מֵרֹאשׁ יֹנְקוֹתָיו
  chosen: from the tip of its young shoots
  alternatives:
  - from the top of its twigs
  - from the head of its sucklings/shoots
  lexicon: HALOT
  rationale: רֹאשׁ here means extremity/top; יֹנְקוֹת are tender shoots/sprouts. 'Tip
    of its young shoots' preserves the botanical image in natural English.
- source_word: רַךְ
  chosen: a tender one
  alternatives:
  - a tender shoot
  - a soft one
  lexicon: HALOT
  rationale: The adjective functions substantivally for the item plucked from among
    the shoots. 'A tender one' preserves the Hebrew terseness while allowing the antecedent
    to be understood from context.
- source_word: אֶקְטֹף
  chosen: will pluck
  alternatives:
  - will cut off
  - will pick
  lexicon: HALOT
  rationale: The verb means to pluck or crop off. 'Will pluck' suits the image of
    taking a tender sprig from the cedar.
- source_word: וְשָׁתַלְתִּי
  chosen: and I myself will plant it
  alternatives:
  - and I will transplant it
  lexicon: HALOT
  rationale: The verb is the standard term for planting. 'Plant it' is direct and
    clear; 'transplant' is interpretive and therefore left as an alternative only.
- source_word: עַל הַר גָּבֹהַ וְתָלוּל
  chosen: on a high and lofty mountain
  alternatives:
  - on a high and prominent mountain
  - on a high and elevated mountain
  lexicon: HALOT
  rationale: גָּבֹהַ means high; תָלוּל adds the sense of being raised, lofty, or
    prominent. 'High and lofty mountain' preserves the poetic parallelism and elevated
    imagery.
- source_word: אָ֗נִי ... אָ֔נִי
  chosen: I myself
  alternatives:
  - I
  - I indeed
  lexicon: HALOT
  rationale: The explicit pronoun with first-person verbs is emphatic. 'I myself'
    brings that emphasis into English without sounding archaic.
