theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine default renders יְהוָה as 'the LORD.' In the fixed Hebrew
    expression אֲדֹנָי יְהוִה, English convention commonly uses 'Lord GOD' to avoid
    the awkward repetition 'Lord LORD' while still signaling the divine name. This
    is a translation convention rather than a doctrinally loaded choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
