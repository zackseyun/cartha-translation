id: EZK.17.14
reference: Ezekiel 17:14
source:
  edition: WLC
  text: לִֽ/הְיוֹת֙ מַמְלָכָ֣ה שְׁפָלָ֔ה לְ/בִלְתִּ֖י הִתְנַשֵּׂ֑א לִ/שְׁמֹ֥ר אֶת
    בְּרִית֖/וֹ לְ/עָמְדָֽ/הּ־׃
translation:
  text: so that it might become a lowly kingdom, not lifting itself up, but keeping
    his covenant so as to stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "treaty" for "covenant"; the Hebrew term can denote a binding political
      agreement in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִהְיוֹת
  chosen: so that it might become
  alternatives:
  - to become
  - that it might be
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose in context,
    continuing the previous clause. 'Become' fits the sense of היה here as entering
    a state, though 'be' is possible.
- source_word: מַמְלָכָה
  chosen: kingdom
  alternatives:
  - royal realm
  - kingdom-state
  lexicon: HALOT
  rationale: Standard rendering for ממלכה; it refers to the political entity under
    discussion.
- source_word: שְׁפָלָה
  chosen: lowly
  alternatives:
  - low
  - humble
  - base
  lexicon: HALOT
  rationale: Describes the kingdom's reduced status. 'Lowly' is natural English and
    preserves the idea of political abasement without implying moral virtue as strongly
    as 'humble' might.
- source_word: לְבִלְתִּי
  chosen: not
  alternatives:
  - so as not to
  - in order not to
  lexicon: HALOT
  rationale: Introduces a negative purpose/result clause. In English, the force is
    carried smoothly by 'not' attached to the following infinitival idea.
- source_word: הִתְנַשֵּׂא
  chosen: lifting itself up
  alternatives:
  - exalting itself
  - raising itself
  lexicon: HALOT
  rationale: The Hitpael conveys self-exaltation. 'Lifting itself up' is vivid and
    idiomatic, preserving the reflexive nuance.
- source_word: לִשְׁמֹר
  chosen: keeping
  alternatives:
  - to keep
  - guarding
  - observing
  lexicon: HALOT
  rationale: Here שמר governs 'covenant' in the sense of observing/keeping treaty
    obligations. 'Keeping' is the standard covenantal rendering.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - the covenant with him
  lexicon: HALOT
  rationale: ברית can denote covenant or treaty; in this political context it refers
    to the binding agreement with the Babylonian king. 'Covenant' preserves the Hebrew
    term's gravity and consistency, while the political sense is clear from context.
- source_word: לְעָמְדָהּ
  chosen: so as to stand
  alternatives:
  - that it might stand
  - so that it might endure
  lexicon: HALOT
  rationale: The infinitive of עמד with 3fs suffix refers back to the kingdom. 'Stand'
    preserves the metaphor of remaining established; 'endure' is interpretive and
    therefore left as an alternative.
