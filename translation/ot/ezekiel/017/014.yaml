theological_decisions:
- issue: Rendering בְּרִית in a political context
  chosen_reading: covenant
  alternative_readings:
  - treaty
  rationale: Although the immediate context is an international vassal agreement,
    the Hebrew term is ברית, and the translation philosophy favors preserving key
    terms consistently unless context demands otherwise. 'Covenant' retains the lexical
    link while allowing readers to sense the solemnity of the oath-bound arrangement;
    'treaty' is preserved in a footnote as a contextual alternative.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
