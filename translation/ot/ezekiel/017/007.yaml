id: EZK.17.7
reference: Ezekiel 17:7
source:
  edition: WLC
  text: וַ/יְהִ֤י נֶֽשֶׁר אֶחָד֙ גָּד֔וֹל גְּד֥וֹל כְּנָפַ֖יִם וְ/רַב נוֹצָ֑ה וְ/הִנֵּה֩
    הַ/גֶּ֨פֶן הַ/זֹּ֜את כָּֽפְנָ֧ה שָׁרֳשֶׁ֣י/הָ עָלָ֗י/ו וְ/דָֽלִיּוֹתָי/ו֙ שִׁלְחָה
    לּ֔/וֹ לְ/הַשְׁק֣וֹת אוֹתָ֔/הּ מֵ/עֲרֻג֖וֹת מַטָּעָֽ/הּ־־־׃
translation:
  text: And there was another great eagle with great wings and much plumage; and behold,
    this vine bent its roots toward him and sent out its branches to him, that he
    might water it from the beds where it was planted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vulture' for נֶשֶׁר; the Hebrew term can denote a large bird of prey
      more generally, though 'eagle' best fits the imagery here.
    reason: lexical_alternative
  - marker: b
    text: Or 'turned its roots toward him and stretched out its shoots to him.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase may also be rendered 'from the beds of its planting' or
      'from the garden plots where it was planted.'
    reason: lexical_alternative
  - marker: d
    text: Or 'so that he might water it from the beds where it was planted.'.
    reason: previous_rendering
lexical_decisions:
- source_word: נֶשֶׁר
  chosen: eagle
  alternatives:
  - vulture
  lexicon: HALOT
  rationale: The standard rendering in Ezekiel 17 is 'eagle,' fitting the royal-imperial
    imagery of the allegory. While the Hebrew term can denote a large bird of prey
    more broadly, 'eagle' is the conventional and contextually suitable choice here.
- source_word: גָּדוֹל גְּדֹל כְּנָפַיִם
  chosen: great ... with great wings
  alternatives:
  - large ... long-winged
  - great-winged
  lexicon: HALOT
  rationale: 'The repeated גדול intensifies the description: the eagle is great, specifically
    great in wings. English expresses this naturally as ''great eagle, with great
    wings'' rather than a more wooden repetition.'
- source_word: רַב נוֹצָה
  chosen: much plumage
  alternatives:
  - full of feathers
  - many feathers
  lexicon: HALOT
  rationale: נוֹצָה refers to plumage/feathers. 'Much plumage' preserves the descriptive
    force in readable English and avoids awkward literalism.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - now behold
  lexicon: HALOT
  rationale: This discourse marker signals a vivid turn in the allegory. 'And behold'
    preserves that rhetorical force better than a flatter connective.
- source_word: כָּפְנָה
  chosen: bent
  alternatives:
  - turned
  - inclined
  lexicon: HALOT
  rationale: The verb conveys turning or bending toward. 'Bent' captures the physical
    image of the vine reorienting itself toward the second eagle.
- source_word: שָׁרֳשֶׁיהָ עָלָיו
  chosen: its roots toward him
  alternatives:
  - its roots to him
  - its roots upon him
  lexicon: HALOT
  rationale: With על in this context, the sense is directional orientation toward
    the eagle, not literal contact 'upon him.' 'Toward him' is the clearest English
    rendering.
- source_word: דָלִיּוֹתָיו שִׁלְחָה לּוֹ
  chosen: sent out its branches to him
  alternatives:
  - stretched out its shoots to him
  - sent its boughs toward him
  lexicon: HALOT
  rationale: The vine is personified as extending its growth toward the eagle. Although
    the suffix on 'branches' is morphologically 3ms in the table, the sense in context
    is the vine's branches; English renders the intended referent rather than reproducing
    the formal irregularity.
- source_word: לְהַשְׁקוֹת אֹתָהּ
  chosen: so that he might water it
  alternatives:
  - to water it
  - for watering it
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'So that he might water it' makes explicit
    the purposive nuance and keeps the eagle as the implied subject.
- source_word: מֵעֲרֻגוֹת מַטָּעָהּ
  chosen: from the beds where it was planted
  alternatives:
  - from the garden beds of its planting
  - from the rows of its plantation
  lexicon: HALOT
  rationale: עֲרֻגוֹת denotes beds or plots, and מַטָּעָהּ refers to its planting/plantation.
    The phrase likely means the place from which the vine would receive water. 'From
    the beds where it was planted' is natural English that preserves the agricultural
    imagery.
