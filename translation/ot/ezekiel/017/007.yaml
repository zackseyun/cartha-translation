  category: mistranslation
  tier: 2
  from: so that he might water it from the beds where it was planted.
  to: from the beds where it was planted, so that he might water it.
  rationale: The current rendering incorrectly attaches the prepositional phrase 'from
    the beds where it was planted' (מֵעֲרֻגוֹת מַטָּעָהּ) to the verb 'to water'.
    This creates a nonsensical reading where the new eagle is supposed to water the
    vine using water from the beds the vine is already in. The entire point of the
    allegory here is that the vine is disloyally turning *away from* its well-watered
    plot (see v. 8) to seek sustenance from a new source (the second eagle). The Hebrew
    phrase modifies the vine's actions of bending its roots and sending its branches,
    indicating the location it is turning *from*. The phrase should be syntactically
    linked to the vine's actions, not the eagle's.
