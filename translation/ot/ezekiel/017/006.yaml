id: EZK.17.6
reference: Ezekiel 17:6
source:
  edition: WLC
  text: וַ/יִּצְמַ֡ח וַ/יְהִי֩ לְ/גֶ֨פֶן סֹרַ֜חַת שִׁפְלַ֣ת קוֹמָ֗ה לִ/פְנ֤וֹת דָּלִיּוֹתָי/ו֙
    אֵלָ֔י/ו וְ/שָׁרָשָׁ֖י/ו תַּחְתָּ֣י/ו יִֽהְי֑וּ וַ/תְּהִ֣י לְ/גֶ֔פֶן וַ/תַּ֣עַשׂ
    בַּדִּ֔ים וַ/תְּשַׁלַּ֖ח פֹּארֽוֹת׃
translation:
  text: And it sprouted and became a spreading vine, low in stature, with its branches
    turned toward him and its roots beneath him. So it became a vine and produced
    branches and sent out shoots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'luxuriant' or 'branching' vine' for 'spreading vine.'
    reason: lexical_alternative
  - marker: b
    text: The repeated 'became a vine' is retained from the Hebrew for emphasis.
    reason: lexical_alternative
  - marker: c
    text: The pronouns 'him' likely refer to the great eagle in the allegory (cf.
      Ezek 17:3–4), though some render them more impersonally as 'it.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּצְמַח
  chosen: it sprouted
  alternatives:
  - it grew
  - it sprang up
  lexicon: HALOT
  rationale: From צמח, describing the initial emergence/growth of the planted seed.
    'Sprouted' captures the inception of growth more vividly than the broader 'grew'.
- source_word: וַיְהִי לְגֶפֶן
  chosen: became a ... vine
  alternatives:
  - became like a vine
  lexicon: HALOT
  rationale: The construction marks transformation/result. 'Became a vine' is the
    plain sense in context.
- source_word: סֹרַחַת
  chosen: spreading
  alternatives:
  - luxuriant
  - branching
  lexicon: HALOT
  rationale: The participle describes outward extension. 'Spreading' fits the image
    of a vine extending laterally without overstating luxuriance.
- source_word: שִׁפְלַת קוֹמָה
  chosen: low in stature
  alternatives:
  - of low height
  - short
  lexicon: HALOT
  rationale: Literally 'low of height/stature.' 'Low in stature' preserves the metaphorical-physical
    description and reads naturally in English.
- source_word: לִפְנוֹת דָּלִיּוֹתָיו אֵלָיו
  chosen: with its branches turned toward him
  alternatives:
  - so that its branches turned toward him
  - to turn its branches toward him
  lexicon: HALOT
  rationale: ל + infinitive expresses purpose/result. The phrase indicates orientation/dependence
    of the vine's branches toward the eagle in the allegory. 'Turned toward him' preserves
    the directional sense.
- source_word: דָּלִיּוֹתָיו
  chosen: its branches
  alternatives:
  - its boughs
  lexicon: HALOT
  rationale: A term for hanging branches/boughs. 'Branches' is clear modern English;
    'boughs' is more literary but less natural.
- source_word: וְשָׁרָשָׁיו תַּחְתָּיו יִהְיוּ
  chosen: and its roots beneath him
  alternatives:
  - and its roots were under him
  - while its roots remained under him
  lexicon: HALOT
  rationale: The clause depicts the roots situated under the one previously mentioned.
    English idiom prefers a verbless-style rendering here, though the sense of continued
    position is retained.
- source_word: וַתְּהִי לְגֶפֶן
  chosen: So it became a vine
  alternatives:
  - And it became a vine
  lexicon: HALOT
  rationale: The repeated clause is retained rather than collapsed, since the Hebrew
    repeats it for emphasis and progression in the allegory.
- source_word: וַתַּעַשׂ בַּדִּים
  chosen: produced branches
  alternatives:
  - made shoots
  - formed boughs
  lexicon: HALOT
  rationale: עשה with בדים means to produce/grow branches. 'Produced branches' is
    idiomatic and preserves the agricultural image.
- source_word: וַתְּשַׁלַּח פֹּארוֹת
  chosen: sent out shoots
  alternatives:
  - sent out foliage
  - put forth sprigs
  lexicon: HALOT
  rationale: The verb 'send out' with פֹּארוֹת conveys extending fresh growth. 'Shoots'
    best matches the image of new vine growth in accessible English.
- source_word: אֵלָיו / תַּחְתָּיו
  chosen: him
  alternatives:
  - it
  lexicon: HALOT
  rationale: The suffixes are masculine singular. In the allegory the antecedent is
    the great eagle (masculine), so 'him' preserves the personal referent rather than
    flattening it to 'it'.
