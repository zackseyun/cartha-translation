id: EZK.17.17
reference: Ezekiel 17:17
source:
  edition: WLC
  text: וְ/לֹא֩ בְ/חַ֨יִל גָּד֜וֹל וּ/בְ/קָהָ֣ל רָ֗ב יַעֲשֶׂ֨ה אוֹת֤/וֹ פַרְעֹה֙ בַּ/מִּלְחָמָ֔ה
    בִּ/שְׁפֹּ֥ךְ סֹלְלָ֖ה וּ/בִ/בְנ֣וֹת דָּיֵ֑ק לְ/הַכְרִ֖ית נְפָשׁ֥וֹת רַבּֽוֹת׃
translation:
  text: Pharaoh will not act for him in the war with a great army and a large assembly,
    when they cast up a siege ramp and build a siege wall to cut off many lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not help him in the war with a great army and a large company.'
      The Hebrew expression 'do/make him' is idiomatic here for taking effective action
      on his behalf.
    reason: lexical_alternative
  - marker: b
    text: The siege terms may also be rendered 'siege mound' and 'siegework' or 'siege
      tower.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְחַיִל גָּדוֹל
  chosen: with a great army
  alternatives:
  - with great force
  - with a great host
  lexicon: HALOT
  rationale: חַיִל in military context commonly denotes military force, army, or troops
    rather than abstract strength. 'Army' is the clearest modern English rendering
    here.
- source_word: וּבְקָהָל רָב
  chosen: and a large assembly
  alternatives:
  - and with many people
  - and a great company
  - and a large contingent
  lexicon: HALOT
  rationale: קָהָל is literally an assembly/congregation. In this military setting
    it likely refers to a large gathered body accompanying the army. 'Large assembly'
    preserves the lexical sense without over-specifying.
- source_word: יַעֲשֶׂה אֹתוֹ
  chosen: will not act for him
  alternatives:
  - will not help him
  - will not deal with him
  - will not support him
  lexicon: HALOT
  rationale: עשה with object pronoun can be idiomatic and compressed. In context the
    sense is that Pharaoh will not take effective action on his behalf. 'Act for him'
    preserves the verbal breadth while fitting the military context.
- source_word: בַּמִּלְחָמָה
  chosen: in the war
  alternatives:
  - in battle
  - in warfare
  lexicon: HALOT
  rationale: The noun is singular with article. 'In the war' is a natural rendering,
    though the context is a military campaign or battle.
- source_word: בִּשְׁפֹּךְ סֹלְלָה
  chosen: when they cast up a siege ramp
  alternatives:
  - by pouring out a siege mound
  - when a siege ramp is raised
  lexicon: HALOT
  rationale: שׁפך literally means 'pour out,' but with סֹלְלָה in siege contexts it
    refers idiomatically to heaping up or casting up an earthen siege ramp.
- source_word: וּבִבְנוֹת דָּיֵק
  chosen: and build a siege wall
  alternatives:
  - and build a siege tower
  - and build a circumvallation
  - and build a siegework
  lexicon: HALOT
  rationale: דָּיֵק denotes a siege structure; English renderings vary. 'Siege wall'
    is a defensible, readable choice that pairs well with 'siege ramp' and reflects
    fortification language.
- source_word: לְהַכְרִית נְפָשׁוֹת רַבּוֹת
  chosen: to cut off many lives
  alternatives:
  - to kill many people
  - to cut off many persons
  lexicon: HALOT
  rationale: הכרית literally means 'cut off,' and נְפָשׁוֹת often means lives/persons.
    'Cut off many lives' preserves the Hebrew idiom and its severity better than the
    flatter 'kill many people'.
