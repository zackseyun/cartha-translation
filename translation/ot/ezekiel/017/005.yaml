id: EZK.17.5
reference: Ezekiel 17:5
source:
  edition: WLC
  text: וַ/יִּקַּח֙ מִ/זֶּ֣רַע הָ/אָ֔רֶץ וַֽ/יִּתְּנֵ֖/הוּ בִּ/שְׂדֵה זָ֑רַע קָ֚ח
    עַל מַ֣יִם רַבִּ֔ים צַפְצָפָ֖ה שָׂמֽ/וֹ־־׃
translation:
  text: Then he took some of the seed of the land and planted it in fertile soil;
    he placed it beside abundant waters, like a willow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "poplar" for the final plant term; the Hebrew צַפְצָפָה is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזֶּרַע הָאָרֶץ
  chosen: some of the seed of the land
  alternatives:
  - some of the land's seed
  - seed from the land
  - offspring of the land
  lexicon: HALOT
  rationale: זֶרַע here is literal in the allegory's planting imagery, not 'offspring'
    in a genealogical sense. 'Some of the seed of the land' preserves the partitive
    sense of מִן and the agricultural metaphor.
- source_word: וַיִּתְּנֵהוּ
  chosen: planted it
  alternatives:
  - set it
  - placed it
  lexicon: HALOT
  rationale: Although נתן literally means 'gave/put,' in this agricultural context
    with following field/seed language, English 'planted it' best conveys the idiomatic
    force without obscuring the imagery.
- source_word: בִּשְׂדֵה זָרַע
  chosen: in fertile soil
  alternatives:
  - in a field for sowing
  - in a seed field
  - in cultivated ground
  lexicon: HALOT
  rationale: Literally 'in a field of seed/sowing.' The phrase denotes a place suitable
    for sowing. 'In fertile soil' is a natural optimal-equivalence rendering that
    communicates the agrarian sense succinctly.
- source_word: קָח
  chosen: fertile
  alternatives:
  - good
  - choice
  - productive
  lexicon: HALOT
  rationale: This rare noun/adjectival form is commonly understood to denote something
    choice or suitable in context. Rendered together with בִּשְׂדֵה זָרַע as 'fertile'
    to avoid a wooden and obscure English phrase.
- source_word: עַל מַיִם רַבִּים
  chosen: beside abundant waters
  alternatives:
  - by many waters
  - near plentiful waters
  lexicon: HALOT
  rationale: עַל in placement contexts can mean by/beside. 'Abundant waters' is more
    idiomatic than 'many waters' while preserving the image of plentiful irrigation.
- source_word: צַפְצָפָה
  chosen: willow
  alternatives:
  - poplar
  - a willow tree
  lexicon: HALOT
  rationale: The plant term is uncertain, with 'willow' and 'poplar' both proposed.
    'Willow' is a common and contextually fitting rendering for a water-loving tree,
    while the alternative is preserved in a footnote.
- source_word: שָׂמוֹ
  chosen: he placed it
  alternatives:
  - he set it
  - he made it
  lexicon: HALOT
  rationale: שׂים means 'set/place.' Here it governs the final comparison or designation
    involving צַפְצָפָה. 'He placed it' keeps the planting imagery coherent in English.
