theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default renders יְהוָה as 'the LORD.' In the compound אֲדֹנָי
    יְהוִה, standard English practice is 'the Lord GOD' to preserve both components
    without the awkward 'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding אָלָה as 'oath' rather than foregrounding 'curse'
  chosen_reading: my oath
  alternative_readings:
  - my curse
  rationale: The term can include curse-sanction, but in this context the focus is
    the sworn obligation that the king despised. Since YHWH claims the violated oath
    as his own, 'my oath' best fits the immediate syntax and historical setting, while
    the curse nuance is preserved in a footnote.
