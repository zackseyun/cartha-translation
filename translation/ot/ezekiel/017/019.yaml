id: EZK.17.19
reference: Ezekiel 17:19
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּה אָמַ֨ר אֲדֹנָ֣/י יְהוִה֮ חַי אָנִי֒ אִם לֹ֗א אָֽלָתִ/י֙ אֲשֶׁ֣ר
    בָּזָ֔ה וּ/בְרִיתִ֖/י אֲשֶׁ֣ר הֵפִ֑יר וּ/נְתַתִּ֖י/ו בְּ/רֹאשֽׁ/וֹ־־־׃
translation:
  text: 'Therefore thus says the Lord GOD: As I live, surely my oath that he despised
    and my covenant that he broke—I will place it on his own head.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my curse'; the Hebrew term can denote an oath that carries a curse for
      violation.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the divine judgment that
    follows from the preceding accusation.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; 'thus says' preserves the formal
    prophetic register in readable English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: 'Renders the title-plus-divine-name formula in line with the doctrine
    default: יְהוָה as ''the LORD.'' In combination with אֲדֹנָי, English convention
    uses ''the Lord GOD'' to avoid ''Lord LORD'' while preserving both elements.'
- source_word: חַי אָנִי
  chosen: As I live
  alternatives:
  - By my life
  - Surely as I live
  lexicon: HALOT
  rationale: Standard divine oath formula. 'As I live' is idiomatic and preserves
    the solemn self-oath.
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration
    rather than a literal conditional; 'surely' best conveys the force in English.
- source_word: אָלָתִי
  chosen: my oath
  alternatives:
  - my curse
  - the oath sworn to me
  lexicon: HALOT
  rationale: Although אלה can denote an oath with curse-sanction, here the context
    is covenant violation by Zedekiah against the king to whom he swore, and YHWH
    claims that oath as his own because it was sworn before him. 'My oath' is the
    most natural and contextually fitting rendering; the curse nuance is secondary
    and can be preserved as an alternative.
- source_word: בָּזָה
  chosen: he despised
  alternatives:
  - he treated with contempt
  - he scorned
  lexicon: HALOT
  rationale: Conveys contemptuous rejection of the oath; 'despised' is concise and
    strong.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my treaty
  - my pact
  lexicon: HALOT
  rationale: בְּרִית is regularly rendered 'covenant.' Here YHWH identifies the political
    covenant as his own because it was made under divine sanction.
- source_word: הֵפִיר
  chosen: he broke
  alternatives:
  - he violated
  - he annulled
  lexicon: HALOT
  rationale: '''Broke'' is the standard, clear English equivalent for violating a
    covenant.'
- source_word: וּנְתַתִּיו
  chosen: I will place it
  alternatives:
  - I will bring it
  - I will put it
  lexicon: HALOT
  rationale: The object is the guilt/consequence of the despised oath and broken covenant.
    'Place it' preserves the concrete metaphor without over-interpreting.
- source_word: בְּרֹאשׁוֹ
  chosen: on his own head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: Idiomatic expression for bringing responsibility or punishment back upon
    the offender himself. 'His own head' makes the reflexive force explicit in natural
    English.
