id: EZK.17.1
reference: Ezekiel 17:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened, the word of Yahweh came to me, saying.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - Now ... came
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive plus היה is a common narrative/discourse introducer.
    In English, rendering it woodenly as 'and it happened' is possible but unnatural
    here. Because the clause continues with 'the word of the LORD,' the idiomatic
    sense is best carried by 'And ... came,' preserving the sequential force without
    awkwardness.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In prophetic formulae, דָּבָר commonly denotes the divine word/message.
    'The word' preserves the established prophetic idiom and keeps the connection
    to revelation language, while remaining natural in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines for the divine name יְהוָה, the default rendering
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention
    that reflects the covenant name without transliteration.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means
    'to me.' 'Unto me' is more archaic and less suitable for readable modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. 'Saying,'
    is the most concise and formally transparent rendering, preserving the prophetic
    speech formula and signaling that the following verse contains the content.
