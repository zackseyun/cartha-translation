theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and preserving continuity with Jewish reverence practice and the
    Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether הַנִּשְׁאָרִים should be rendered with the theologically charged
    term 'remnant'
  chosen_reading: those who remain
  alternative_readings:
  - the survivors
  - the remnant
  rationale: In this judgment context the term denotes those left alive and then dispersed,
    not a preserved faithful remnant. The translation avoids importing a positive
    remnant theology not warranted by the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
