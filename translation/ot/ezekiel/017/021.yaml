id: EZK.17.21
reference: Ezekiel 17:21
source:
  edition: WLC
  text: וְ/אֵ֨ת כָּל מברח/ו בְּ/כָל אֲגַפָּי/ו֙ בַּ/חֶ֣רֶב יִפֹּ֔לוּ וְ/הַ/נִּשְׁאָרִ֖ים
    לְ/כָל ר֣וּחַ יִפָּרֵ֑שׂוּ וִ/ידַעְתֶּ֕ם כִּ֛י אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי־־־׃ס
translation:
  text: And all his fugitives among all his troops will fall by the sword, and those
    who remain will be scattered to every wind. Then you will know that I, the LORD,
    have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his fugitives'; some ancient versions and translations understand
      the term as 'his chosen men' or similar.
    reason: alternative_reading
  - marker: b
    text: Literally 'his wings,' a Hebrew military image for divisions or troops.
    reason: lexical_alternative
lexical_decisions:
- source_word: מברחו
  chosen: his fugitives
  alternatives:
  - his fugitives/escapees
  - his chosen men
  lexicon: HALOT
  rationale: The ketiv-like form from ברח most naturally denotes those fleeing or
    attempting escape, hence 'fugitives.' Some versions take it in the sense of select
    men or those around him, influenced by context and ancient versions, but the Hebrew
    form itself is best represented by 'fugitives.'
- source_word: אֲגַפָּיו
  chosen: his troops
  alternatives:
  - his bands
  - his wings
  - his companies
  lexicon: HALOT
  rationale: Literally 'his wings,' but in military context the term refers metaphorically
    to divisions, flanks, or troops. 'Troops' gives the military sense in clear modern
    English while reflecting the metaphorical extension.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death in battle or execution by weapon; 'by the sword'
    preserves the biblical and military force naturally in English.
- source_word: הַנִּשְׁאָרִים
  chosen: those who remain
  alternatives:
  - the survivors
  - the remnant
  lexicon: HALOT
  rationale: Refers to those left after the fall. 'Those who remain' is transparent
    and avoids importing the more theologically loaded 'remnant' where the context
    is primarily judgment.
- source_word: לְכָל רוּחַ
  chosen: to every wind
  alternatives:
  - to every direction
  - to all winds
  lexicon: HALOT
  rationale: A Hebrew idiom for dispersal in every direction. 'To every wind' preserves
    the vivid imagery while remaining understandable.
- source_word: יִפָּרֵשׂוּ
  chosen: will be scattered
  alternatives:
  - will be dispersed
  - will spread out
  lexicon: HALOT
  rationale: The Niphal here conveys being dispersed abroad. 'Will be scattered' best
    matches the judgment context and common English usage.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  lexicon: HALOT
  rationale: '''Have spoken'' preserves the solemn prophetic formula and matches the
    force of divine declaration in Ezekiel.'
