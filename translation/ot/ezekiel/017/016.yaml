id: EZK.17.16
reference: Ezekiel 17:16
source:
  edition: WLC
  text: חַי אָ֗נִי נְאֻם֮ אֲדֹנָ֣/י יְהוִה֒ אִם לֹ֗א בִּ/מְקוֹם֙ הַ/מֶּ֨לֶךְ֙ הַ/מַּמְלִ֣יךְ
    אֹת֔/וֹ אֲשֶׁ֤ר בָּזָה֙ אֶת אָ֣לָת֔/וֹ וַ/אֲשֶׁ֥ר הֵפֵ֖ר אֶת בְּרִית֑/וֹ אִתּ֥/וֹ
    בְ/תוֹךְ בָּבֶ֖ל יָמֽוּת־־־־־׃
translation:
  text: As I live, declares the Lord GOD, surely in the place of the king who made
    him king, whose oath he despised and whose covenant he broke—with him, in the
    midst of Babylon, he will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose curse-oath he despised'; the Hebrew word for 'oath' can carry
      the sense of an oath accompanied by a self-imprecation.
    reason: lexical_alternative
  - marker: b
    text: Or 'whose treaty he broke.' The Hebrew word commonly rendered 'covenant'
      can also refer to a political pact between kings.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֗נִי
  chosen: As I live
  alternatives:
  - As surely as I live
  - By my life
  lexicon: HALOT
  rationale: Standard Hebrew oath formula. 'As I live' preserves the solemn self-oath
    concisely; 'surely' later reflects the force of אִם לֹא in the apodosis.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the prophetic speech formula 'declares/oracle of.' יְהוָה is
    rendered 'the LORD' per doctrine; אֲדֹנָי is translated 'Lord,' yielding the conventional
    Ezekielian 'Lord GOD.'
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - certainly
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration
    rather than a literal conditional 'if not.' 'Surely' best conveys the emphatic
    force in natural English.
- source_word: בִּמְקוֹם
  chosen: in the place of
  alternatives:
  - in the place where
  - at the place of
  lexicon: HALOT
  rationale: The phrase points to the location associated with the enthroning king;
    'in the place of' is the most direct rendering and fits the following relative
    clauses.
- source_word: הַמֶּלֶךְ הַמַּמְלִיךְ אֹתוֹ
  chosen: the king who made him king
  alternatives:
  - the king who enthroned him
  - the king who installed him as king
  lexicon: HALOT
  rationale: The Hiphil participle of מלך means 'cause to reign/make king.' Rendering
    it explicitly as 'made him king' preserves the wordplay with מֶלֶךְ and the political
    dependence implied in the context.
- source_word: אֲשֶׁר בָּזָה אֶת אָלָתוֹ
  chosen: whose oath he despised
  alternatives:
  - whose curse-oath he despised
  - whose sworn oath he treated with contempt
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often with curse implications. 'Oath' is clear
    in English; the stronger nuance is worth preserving in a footnote rather than
    overloading the main text.
- source_word: וַאֲשֶׁר הֵפֵר אֶת בְּרִיתוֹ
  chosen: and whose covenant he broke
  alternatives:
  - and whose treaty he broke
  - and whose pact he violated
  lexicon: HALOT
  rationale: בְּרִית is broadly 'covenant/treaty.' In this international-political
    setting 'treaty' is possible, but 'covenant' preserves the Hebrew term's gravity
    and its linkage with oath-breaking.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - with that king
  lexicon: HALOT
  rationale: The pronoun refers back to the enthroning king. 'With him' is sufficient
    and keeps the Hebrew's compactness.
- source_word: בְּתוֹךְ בָּבֶל
  chosen: in the midst of Babylon
  alternatives:
  - in Babylon
  - within Babylon
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst of/in the middle of.' Retaining
    'in the midst of' preserves the spatial vividness and emphasis that he will die
    there, not escape.
- source_word: יָמוּת
  chosen: he will die
  alternatives:
  - he shall die
  lexicon: HALOT
  rationale: Simple imperfect with future force in prophetic declaration. 'Will die'
    is readable modern English.
