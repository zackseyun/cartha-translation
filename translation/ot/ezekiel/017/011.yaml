id: EZK.17.11
reference: Ezekiel 17:11
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'and it was/came to pass,' in the prophetic
    formula 'the word of YHWH came' idiomatic English is best expressed with 'came.'
    This preserves the standard Hebrew revelatory formula without wooden phrasing.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: '''Word'' is the standard rendering in the formula ''the word of YHWH,''
    preserving both the lexical sense and the prophetic register. ''Message'' is possible
    but less formally tied to the recurring biblical formula.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding biblical
    English convention.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix straightforwardly means 'to
    me.' 'Unto me' is accurate but archaic, and the translation philosophy prefers
    readable modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: In direct speech introduction formulas, לֵאמֹר is naturally rendered
    'saying' in English. This keeps the formal prophetic cadence and signals that
    the following verse contains the spoken content.
