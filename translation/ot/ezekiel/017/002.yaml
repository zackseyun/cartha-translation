id: EZK.17.2
reference: Ezekiel 17:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם ח֥וּד חִידָ֖ה וּ/מְשֹׁ֣ל מָשָׁ֑ל אֶל בֵּ֖ית יִשְׂרָאֵֽל־־׃
translation:
  text: Son of man, pose a riddle and speak a parable to the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mortal' or 'Human one.' The Hebrew idiom 'son of man' is retained here
      as Ezekiel's recurring form of address.
    reason: lexical_alternative
  - marker: b
    text: Or 'proverb.' Hebrew mashal can denote a proverb, parable, or figurative
      saying; here the extended figurative discourse favors 'parable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A relatively formal rendering
    preserves the idiom and its repeated usage in the book better than smoothing to
    'mortal,' though that is a viable contextual alternative. The Hebrew uses אָדָם
    in the sense of 'man/human,' and the phrase functions as a vocative title.
- source_word: חוּד
  chosen: pose
  alternatives:
  - propound
  - tell
  lexicon: HALOT
  rationale: The imperative means to put forth or present something pointedly. 'Pose'
    is natural modern English with 'riddle' and preserves the directive force without
    becoming archaic like 'propound'.
- source_word: חִידָה
  chosen: riddle
  alternatives:
  - enigmatic saying
  - puzzle
  lexicon: HALOT
  rationale: The noun denotes a riddle or enigmatic utterance. 'Riddle' is the most
    direct and idiomatic equivalent in English.
- source_word: וּמְשֹׁל
  chosen: speak
  alternatives:
  - utter
  - set forth
  lexicon: HALOT
  rationale: Though from the verb associated with speaking in proverb/parabolic form,
    English normally requires a more idiomatic verb before 'parable.' 'Speak a parable'
    preserves the Hebrew construction's force better than a wooden 'parable a parable'
    or an awkward 'proverb a proverb.'
- source_word: מָשָׁל
  chosen: parable
  alternatives:
  - proverb
  - allegory
  lexicon: HALOT
  rationale: In this context the coming discourse is an extended figurative comparison,
    not merely a short proverb. 'Parable' best captures the genre for modern readers,
    while 'allegory' is interpretive and 'proverb' too narrow.
- source_word: אֶל בֵּית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - against the house of Israel
  - to Israel
  lexicon: HALOT
  rationale: אֶל most naturally means 'to' here, marking the audience addressed. 'House
    of Israel' preserves the covenantal-national expression rather than flattening
    it to simply 'Israel'.
