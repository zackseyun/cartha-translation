theological_decisions:
- issue: Rendering the vocative בֶּן אָדָם in Ezekiel
  chosen_reading: Son of man
  alternative_readings:
  - Mortal
  - Human one
  rationale: The phrase is not a christological title here but a repeated prophetic
    address. Even so, retaining 'Son of man' preserves the Hebrew idiom and literary
    texture of Ezekiel. Because the doctrine calls for gender-accurate rendering and
    original-language primacy, the traditional idiomatic form is kept rather than
    neutralizing it.
  doctrine_reference: Translation philosophy §§1, 4
