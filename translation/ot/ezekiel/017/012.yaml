id: EZK.17.12
reference: Ezekiel 17:12
source:
  edition: WLC
  text: אֱמָר נָא֙ לְ/בֵ֣ית הַ/מֶּ֔רִי הֲ/לֹ֥א יְדַעְתֶּ֖ם מָה אֵ֑לֶּה אֱמֹ֗ר הִנֵּה
    בָ֨א מֶֽלֶךְ בָּבֶ֤ל יְרוּשָׁלִַ֨ם֙ וַ/יִּקַּ֤ח אֶת מַלְכָּ/הּ֙ וְ/אֶת שָׂרֶ֔י/הָ
    וַ/יָּבֵ֥א אוֹתָ֛/ם אֵלָ֖י/ו בָּבֶֽלָ/ה־־־־־־׃
translation:
  text: Say now to the rebellious house, ‘Do you not know what these things mean?’
    Say, ‘Look, the king of Babylon came to Jerusalem and took its king and its officials
    and brought them to himself in Babylon.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what these things are.' The Hebrew likely asks whether the rebellious
      house understands the meaning of the allegory.
    reason: lexical_alternative
  - marker: b
    text: Or 'its princes.' The Hebrew term can refer to royal or governing leaders.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'to Babylon' with a directional ending; English may also be rendered
      'in Babylon' after 'brought them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית הַמֶּרִי
  chosen: the rebellious house
  alternatives:
  - the house of rebellion
  - the rebellious people
  lexicon: HALOT
  rationale: Idiomatic Hebrew for the corporate people characterized by rebellion.
    'House' is retained to preserve the metaphor and Ezekiel's recurring expression,
    while 'rebellious' renders the genitival idea naturally in English.
- source_word: הֲלֹא יְדַעְתֶּם
  chosen: Do you not know
  alternatives:
  - Do you not understand
  - Surely you know
  lexicon: HALOT
  rationale: ידע can denote knowledge or understanding. Here the rhetorical question
    introduces explanation of the allegory; 'know' stays closer to the Hebrew while
    remaining natural.
- source_word: מָה אֵלֶּה
  chosen: what these things mean
  alternatives:
  - what these are
  - what these things are
  lexicon: HALOT
  rationale: The phrase points to the significance of the preceding symbolic actions/parabolic
    elements, not merely their identity. 'Mean' makes explicit the implied sense in
    idiomatic English without over-paraphrasing.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A discourse marker drawing attention to the explanation. 'Look' is readable
    modern English and preserves the deictic force better than the archaic 'Behold.'
- source_word: בָּא
  chosen: came
  alternatives:
  - has come
  - went
  lexicon: HALOT
  rationale: Simple past fits the narrative explanation. Although Hebrew can use the
    perfect with vivid force, English past tense is the most natural equivalent here.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - took away
  lexicon: HALOT
  rationale: לקח is straightforward here. 'Took' is sufficiently broad and lets the
    context convey the forced deportation.
- source_word: מַלְכָּהּ
  chosen: its king
  alternatives:
  - her king
  lexicon: HALOT
  rationale: The suffix refers to Jerusalem grammatically feminine. In English, for
    a city 'its' is the natural non-poetic rendering.
- source_word: שָׂרֶיהָ
  chosen: its officials
  alternatives:
  - its princes
  - its leaders
  lexicon: HALOT
  rationale: שׂרים can mean princes, officials, or rulers. In this historical-political
    context, 'officials' communicates governing elites without implying royal sons
    specifically.
- source_word: וַיְבֵא אוֹתָם אֵלָיו
  chosen: brought them to himself
  alternatives:
  - brought them to him
  lexicon: HALOT
  rationale: The reflexive nuance of אֵלָיו after 'brought' is preserved with 'to
    himself,' emphasizing transfer into the Babylonian king's custody.
- source_word: בָּבֶלָה
  chosen: in Babylon
  alternatives:
  - to Babylon
  lexicon: HALOT
  rationale: The directional he can indicate motion toward Babylon, but because the
    preceding verb already expresses movement, English idiom is smoother with 'in
    Babylon' at the destination. The locative sense is preserved in the resulting
    state.
