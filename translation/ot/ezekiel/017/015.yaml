id: EZK.17.15
reference: Ezekiel 17:15
source:
  edition: WLC
  text: וַ/יִּמְרָד בּ֗/וֹ לִ/שְׁלֹ֤חַ מַלְאָכָי/ו֙ מִצְרַ֔יִם לָֽ/תֶת ל֥/וֹ סוּסִ֖ים
    וְ/עַם רָ֑ב הֲ/יִצְלָ֤ח הֲ/יִמָּלֵט֙ הָ/עֹשֵׂ֣ה אֵ֔לֶּה וְ/הֵפֵ֥ר בְּרִ֖ית וְ/נִמְלָֽט־־־׃
translation:
  text: But he rebelled against him by sending his messengers to Egypt to give him
    horses and many people. Will he prosper? Will the one who does these things escape?
    Can he break a covenant and yet escape?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'horses and a large army' / 'horses and many troops'; the Hebrew reads
      literally 'horses and many people,' referring in context to military support
      from Egypt.
    reason: lexical_alternative
  - marker: b
    text: Or 'violate a covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְרָד
  chosen: rebelled
  alternatives:
  - revolted
  - rebelled treacherously
  lexicon: HALOT
  rationale: מרד commonly denotes rebellion or revolt against an overlord. 'Rebelled'
    is direct, natural English and fits the political-vassal context.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - against it
  lexicon: HALOT
  rationale: The pronominal object refers to the king/overlord in the allegory's interpretation.
    English idiom with מרד takes 'against,' making the adversative sense explicit.
- source_word: לִשְׁלֹחַ מַלְאָכָיו
  chosen: by sending his messengers
  alternatives:
  - to send his envoys
  - by sending his ambassadors
  lexicon: HALOT
  rationale: מלאך can mean messenger, envoy, or ambassador. 'Messengers' is the broad
    lexical sense; the diplomatic nuance is clear from the destination and purpose.
- source_word: מִצְרַיִם
  chosen: to Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name.
- source_word: לָתֶת לוֹ סוּסִים וְעַם רָב
  chosen: to give him horses and many people
  alternatives:
  - to provide him horses and a large army
  - to give him horses and many troops
  lexicon: HALOT
  rationale: 'The infinitive expresses the purpose of the embassy: securing military
    aid. עם רָב is literally ''many people''; in context it refers to military manpower.
    I retained the more literal ''many people'' in the main text to avoid over-specifying
    beyond the Hebrew, while preserving military alternatives in footnotes.'
- source_word: הֲיִצְלָח
  chosen: Will he prosper?
  alternatives:
  - Will he succeed?
  lexicon: HALOT
  rationale: צלח in this context asks whether the rebellion will succeed/prosper.
    'Prosper' preserves the broader outcome-oriented sense.
- source_word: הֲיִמָּלֵט
  chosen: Will he ... escape?
  alternatives:
  - Will he get away?
  - Will he be delivered?
  lexicon: HALOT
  rationale: נמלט denotes escape or deliverance from danger. 'Escape' fits the judicial-rhetorical
    force of the questions.
- source_word: הָעֹשֶׂה אֵלֶּה
  chosen: the one who does these things
  alternatives:
  - he who does these things
  lexicon: HALOT
  rationale: This substantival participle is rendered with natural modern English
    while preserving the generic singular force.
- source_word: וְהֵפֵר בְּרִית
  chosen: Can he break a covenant
  alternatives:
  - Can he violate a covenant
  - Can he break the covenant
  lexicon: HALOT
  rationale: הפר ברית means to break/violate a covenant. The absence of the article
    on ברית supports the indefinite 'a covenant' in English, though the context points
    to a specific covenant already known.
- source_word: וְנִמְלָט
  chosen: and yet escape
  alternatives:
  - and escape
  - and still get away
  lexicon: HALOT
  rationale: The final clause repeats the escape verb for emphasis. 'And yet escape'
    brings out the rhetorical incredulity implied by the sequence.
