theological_decisions:
- issue: Nature of the political agreement denoted by בְּרִית
  chosen_reading: covenant
  alternative_readings:
  - treaty
  - agreement
  rationale: Although the context is international politics, ברית in Ezekiel carries
    covenantal weight and should not be flattened to a merely secular 'treaty.' 'Covenant'
    preserves the moral-theological seriousness of oath-breaking in the prophetic
    indictment.
  doctrine_reference: Translation philosophy §1, §5
