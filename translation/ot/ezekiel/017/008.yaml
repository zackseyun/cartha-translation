id: EZK.17.8
reference: Ezekiel 17:8
source:
  edition: WLC
  text: אֶל שָׂ֥דֶה טּ֛וֹב אֶל מַ֥יִם רַבִּ֖ים הִ֣יא שְׁתוּלָ֑ה לַ/עֲשׂ֤וֹת עָנָף֙
    וְ/לָ/שֵׂ֣את פֶּ֔רִי לִ/הְי֖וֹת לְ/גֶ֥פֶן אַדָּֽרֶת־־׃ס
translation:
  text: It was planted in a good field by abundant waters, to produce branches and
    bear fruit, to become a majestic vine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beside many waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to become a splendid vine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂדֶה טּוֹב
  chosen: a good field
  alternatives:
  - good soil
  - fertile field
  lexicon: HALOT
  rationale: שָׂדֶה normally denotes a field rather than soil. 'Good field' preserves
    the concrete agricultural image; 'fertile field' is interpretive and smoother
    but less literal.
- source_word: אֶל מַיִם רַבִּים
  chosen: by abundant waters
  alternatives:
  - beside many waters
  - near plentiful waters
  lexicon: HALOT
  rationale: The repeated אֶל with planting imagery conveys location/proximity. In
    idiomatic English, 'by abundant waters' fits the image naturally while preserving
    the sense of plentiful water supply. 'Many waters' is possible but slightly less
    idiomatic here.
- source_word: שְׁתוּלָה
  chosen: was planted
  alternatives:
  - was transplanted
  - had been planted
  lexicon: HALOT
  rationale: The passive participial form denotes being planted/set out. 'Was planted'
    is the clearest English rendering. 'Was transplanted' could fit the broader parable
    context but is more specific than the word itself in this verse.
- source_word: לַעֲשׂוֹת עָנָף
  chosen: to produce branches
  alternatives:
  - to make branches
  - to put forth boughs
  lexicon: HALOT
  rationale: The infinitive plus עָנָף expresses intended result. 'Produce branches'
    is natural modern English and keeps the botanical sense. 'Boughs' is more elevated
    and less accessible.
- source_word: וְלָשֵׂאת פֶּרִי
  chosen: and bear fruit
  alternatives:
  - and carry fruit
  - and yield fruit
  lexicon: HALOT
  rationale: נשא with פְּרִי is a standard idiom for bearing fruit. 'Bear fruit' is
    the established and accurate English equivalent.
- source_word: לִהְיוֹת לְגֶפֶן אַדָּרֶת
  chosen: to become a majestic vine
  alternatives:
  - to become a splendid vine
  - to become a noble vine
  lexicon: HALOT
  rationale: אַדָּרֶת conveys magnificence, majesty, or splendor. 'Majestic' preserves
    the elevated quality without sounding archaic. 'Noble' is possible but can suggest
    social rank more than visual grandeur.
