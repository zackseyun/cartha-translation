theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical scope of the tree imagery
  chosen_reading: Preserve the arboreal metaphor without explicating its political/theological referents in the main text.
  alternative_readings:
  - Interpret the trees explicitly as kings/nations in translation
  rationale: In context the trees symbolize rulers or nations, but the Hebrew text itself states the image rather than unpacking it here. Optimal equivalence preserves the metaphor and lets the context supply its meaning.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition'
