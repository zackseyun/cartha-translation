id: EZK.17.24
reference: Ezekiel 17:24
source:
  edition: WLC
  text: וְֽ/יָדְע֞וּ כָּל עֲצֵ֣י הַ/שָּׂדֶ֗ה כִּ֣י אֲנִ֤י יְהוָה֙ הִשְׁפַּ֣לְתִּי עֵ֣ץ גָּבֹ֗הַ הִגְבַּ֨הְתִּי֙ עֵ֣ץ שָׁפָ֔ל הוֹבַ֨שְׁתִּי֙ עֵ֣ץ לָ֔ח וְ/הִפְרַ֖חְתִּי עֵ֣ץ יָבֵ֑שׁ אֲנִ֥י יְהוָ֖ה דִּבַּ֥רְתִּי וְ/עָשִֽׂיתִי־׀׃פ
translation:
  text: 'And all the trees of the field shall know that I am Yahweh: I have brought low the high tree, I have raised up the low tree, I have dried up the green tree, and I have made the dry tree flourish. I am Yahweh; I have spoken, and I have done it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fresh tree' / 'the moist tree' for 'the green tree.' The Hebrew adjective literally denotes freshness or moisture.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have caused the dry tree to bud/blossom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: shall know
  alternatives:
  - will know
  - must know
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in prophetic discourse functions futurally/resultatively: the outcome is that all the trees come to know. ''Shall know'' preserves the prophetic certainty and elevated tone.'
- source_word: כָּל עֲצֵי הַשָּׂדֶה
  chosen: all the trees of the field
  alternatives:
  - every tree of the field
  - all the trees in the open country
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Trees of the field' preserves the imagery and intertextual resonance of arboreal symbolism in prophetic literature better than a more interpretive paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִשְׁפַּלְתִּי
  chosen: I have brought low
  alternatives:
  - I have humbled
  - I have made low
  lexicon: HALOT
  rationale: 'The Hiphil conveys causation: causing what is high to become low. ''Brought low'' is idiomatic English and fits the reversal motif without importing specifically moral connotations that ''humbled'' might suggest.'
- source_word: עֵץ גָּבֹהַ
  chosen: the high tree
  alternatives:
  - a high tree
  - the tall tree
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, English idiom in this stylized reversal sequence works naturally with 'the high tree' as a representative class image. 'High' better matches the exaltation/humbling contrast than merely physical 'tall.'
- source_word: הִגְבַּהְתִּי
  chosen: I have raised up
  alternatives:
  - I have exalted
  - I have made high
  lexicon: HALOT
  rationale: Hiphil of גבה in antithetic parallelism with 'brought low.' 'Raised up' is clear modern English and preserves both literal and metaphorical force without over-theologizing.
- source_word: עֵץ שָׁפָל
  chosen: the low tree
  alternatives:
  - the lowly tree
  - a low tree
  lexicon: HALOT
  rationale: '''Low'' keeps the image parallel to ''high tree.'' ''Lowly'' would tilt toward a more personal/moral nuance not required by the Hebrew.'
- source_word: הוֹבַשְׁתִּי
  chosen: I have dried up
  alternatives:
  - I have withered
  - I have made dry
  lexicon: HALOT
  rationale: Hiphil of יבש means to cause to dry up. 'Dried up' is the most direct and preserves the causative force.
- source_word: עֵץ לָח
  chosen: the green tree
  alternatives:
  - the fresh tree
  - the moist tree
  lexicon: HALOT
  rationale: Though לָח literally denotes moisture/freshness, in English arboreal imagery 'green tree' best communicates a living, flourishing tree and pairs naturally with 'dry tree.'
- source_word: וְהִפְרַחְתִּי
  chosen: I have made ... flourish
  alternatives:
  - I have caused ... to sprout
  - I have made ... bud
  lexicon: HALOT
  rationale: Hiphil of פרח can denote causing to bud/blossom. In context of reversal between dry and living trees, 'made the dry tree flourish' communicates restored vitality in natural English while staying close to the image.
- source_word: עֵץ יָבֵשׁ
  chosen: the dry tree
  alternatives:
  - the withered tree
  - a dry tree
  lexicon: HALOT
  rationale: '''Dry tree'' is the direct lexical equivalent and forms the expected contrast with ''green tree.'' ''Withered'' is interpretive and overlaps too much with the preceding verb.'
- source_word: דִּבַּרְתִּי וְעָשִׂיתִי
  chosen: I have spoken, and I have done it
  alternatives:
  - I have spoken and acted
  - I have said it and done it
  lexicon: HALOT
  rationale: The pair emphasizes YHWH's effective word. 'Done it' makes explicit the implied object in idiomatic English and preserves the force that what God declares he accomplishes.
