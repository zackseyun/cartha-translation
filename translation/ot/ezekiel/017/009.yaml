theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord YHWH
  - Lord Yahweh
  rationale: Per doctrine, יְהוָה defaults to 'the LORD.' In the sequence אֲדֹנָי
    יְהוִה, English convention 'Lord GOD' avoids 'Lord LORD' while still signaling
    the divine name through small-caps 'GOD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
