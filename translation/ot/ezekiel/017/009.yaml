id: EZK.17.9
reference: Ezekiel 17:9
source:
  edition: WLC
  text: אֱמֹ֗ר כֹּ֥ה אָמַ֛ר אֲדֹנָ֥/י יְהֹוִ֖ה תִּצְלָ֑ח הֲ/לוֹא֩ אֶת שָׁרָשֶׁ֨י/הָ
    יְנַתֵּ֜ק וְ/אֶת פִּרְיָ֣/הּ יְקוֹסֵ֣ס וְ/יָבֵ֗שׁ כָּל טַרְפֵּ֤י צִמְחָ/הּ֙ תִּיבָ֔שׁ
    וְ/לֹֽא בִ/זְרֹ֤עַ גְּדוֹלָה֙ וּ/בְ/עַם רָ֔ב לְ/מַשְׂא֥וֹת אוֹתָ֖/הּ מִ/שָּׁרָשֶֽׁי/הָ־־׀־־־׃
translation:
  text: 'Say, ‘Thus says the Lord GOD: Will it prosper? Will he not pull up its roots,
    cut off its fruit, so that it dries up? All the fresh leaves of its growth will
    wither. And not by a great arm or by many people will it be lifted from its roots.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'arm'; a figurative expression for strength or power.
    reason: lexical_alternative
  - marker: b
    text: Or 'uproot its roots' for the first clause; the Hebrew verb can emphasize
      tearing loose or pulling away.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative introducing the prophetic proclamation; 'Say' is the natural
    concise English equivalent in this formula.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord YHWH
  - Thus says the Lord GOD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Per doctrine, יְהוָה is rendered
    'the LORD'; with אֲדֹנָי preceding, English convention uses 'Lord GOD' to distinguish
    the divine name without awkward repetition.
- source_word: תִּצְלָח
  chosen: Will it prosper?
  alternatives:
  - Will it thrive?
  - Will it succeed?
  lexicon: HALOT
  rationale: The verb asks whether the vine will succeed or flourish. 'Prosper' captures
    both viability and success in context.
- source_word: הֲלוֹא
  chosen: Will ... not
  alternatives:
  - Surely ... will
  - Is it not the case that ... will
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer; English
    idiom is best conveyed with 'Will ... not'.
- source_word: שָׁרָשֶׁיהָ
  chosen: its roots
  lexicon: HALOT
  rationale: Literal botanical image central to the allegory; plural retained.
- source_word: יְנַתֵּק
  chosen: pull up
  alternatives:
  - uproot
  - tear away
  lexicon: HALOT
  rationale: The verb denotes tearing loose or pulling away. 'Pull up' is vivid, readable
    modern English and fits the agricultural metaphor.
- source_word: פִּרְיָהּ
  chosen: its fruit
  lexicon: HALOT
  rationale: Literal produce of the vine; retained as part of the allegorical imagery.
- source_word: יְקוֹסֵס
  chosen: cut off
  alternatives:
  - strip off
  - pluck off
  lexicon: HALOT
  rationale: The verb refers to clipping or cutting off. 'Cut off' is clear and forceful
    in context.
- source_word: וְיָבֵשׁ
  chosen: so that it dries up
  alternatives:
  - and it dries up
  - and it withers
  lexicon: HALOT
  rationale: Conveys the resulting state of the vine after its roots and fruit are
    removed. 'So that' makes the consequence explicit in smooth English.
- source_word: כָּל טַרְפֵּי צִמְחָהּ
  chosen: All the fresh leaves of its growth
  alternatives:
  - All the leaves of its sprouting
  - All the fresh foliage it put forth
  lexicon: HALOT
  rationale: טַרְפֵּי refers to fresh leaves/foliage, and צִמְחָהּ to its sprout/growth.
    The phrase is rendered concretely to preserve the plant imagery.
- source_word: תִּיבָשׁ
  chosen: will wither
  alternatives:
  - will dry up
  lexicon: HALOT
  rationale: A natural English rendering for vegetation; varies from the earlier 'dries
    up' for readability while preserving the same semantic field, documented here
    as a contextual exception.
- source_word: וְלֹא בִזְרֹעַ גְּדוֹלָה וּבְעַם רָב
  chosen: And not by a great arm or by many people
  alternatives:
  - And not with a strong arm and many people
  - But not by great strength and a large army
  lexicon: HALOT
  rationale: זְרוֹעַ literally means 'arm' and often connotes power; retained literally
    here to preserve the metaphorical force. עַם רָב is 'many people,' likely military
    manpower, but the Hebrew says 'people,' not explicitly 'army.'
- source_word: לְמַשְׂאוֹת אוֹתָהּ מִשָּׁרָשֶׁיהָ
  chosen: will it be lifted from its roots
  alternatives:
  - will one lift it from its roots
  - to pull it up from its roots
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ל expresses the action in view:
    lifting/carrying away the vine from its roots. Passive English best fits the rhetorical
    question and keeps the subject implicit as in Hebrew.'
