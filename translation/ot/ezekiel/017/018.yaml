id: EZK.17.18
reference: Ezekiel 17:18
source:
  edition: WLC
  text: וּ/בָזָ֥ה אָלָ֖ה לְ/הָפֵ֣ר בְּרִ֑ית וְ/הִנֵּ֨ה נָתַ֥ן יָד֛/וֹ וְ/כָל אֵ֥לֶּה
    עָשָׂ֖ה לֹ֥א יִמָּלֵֽט־׃ס
translation:
  text: He despised the oath by breaking the covenant; and behold, he had given his
    hand, yet did all these things. He will not escape.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curse'; the Hebrew term can denote an oath that carries a curse
      sanction.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he had given his hand,' an idiom for making a pledge or agreement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָזָה
  chosen: He despised
  alternatives:
  - He treated with contempt
  - He scorned
  lexicon: HALOT
  rationale: The verb בזה denotes despising or treating with contempt. 'Despised'
    is concise and preserves the moral force of the accusation.
- source_word: אָלָה
  chosen: the oath
  alternatives:
  - the curse
  - the sworn oath
  lexicon: HALOT
  rationale: In covenant contexts אָלָה can denote an oath, often one carrying curse
    sanctions. Here 'the oath' best fits the parallel with 'covenant' and the political-treaty
    setting; the curse nuance is secondary and can be preserved in a footnote.
- source_word: לְהָפֵר בְּרִית
  chosen: by breaking the covenant
  alternatives:
  - to break the covenant
  - by violating the covenant
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses the manner/result connected
    to despising the oath. 'By breaking the covenant' reads naturally in English while
    preserving the causal/manner relationship.
- source_word: בְּרִית
  chosen: the covenant
  alternatives:
  - the treaty
  - the agreement
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term. Although the immediate setting
    is an international treaty, 'covenant' preserves the biblical and theological
    weight of the term.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - indeed
  - look
  lexicon: HALOT
  rationale: הִנֵּה marks emphasis and draws attention to the seriousness of what
    follows. 'And behold' preserves that rhetorical force better than omitting it.
- source_word: נָתַן יָדוֹ
  chosen: he had given his hand
  alternatives:
  - he had pledged himself
  - he had given his pledge
  lexicon: HALOT
  rationale: The idiom literally means giving the hand as a sign of pledge or agreement.
    The main text keeps the idiom for transparency; an idiomatic alternative is worth
    preserving in a footnote.
- source_word: וְכָל אֵלֶּה עָשָׂה
  chosen: yet did all these things
  alternatives:
  - and did all these things
  - having done all these things
  lexicon: HALOT
  rationale: 'The clause sums up his treacherous actions. ''Yet'' brings out the adversative
    sense implied by the context: despite his pledge, he acted this way.'
- source_word: לֹא יִמָּלֵט
  chosen: He will not escape
  alternatives:
  - he will not get away
  - he will not be delivered
  lexicon: HALOT
  rationale: The Niphal of מלט here conveys escaping judgment. 'He will not escape'
    is the most natural and contextually precise rendering.
