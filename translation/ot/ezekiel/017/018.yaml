theological_decisions:
- issue: Rendering of covenantal-political terminology
  chosen_reading: Retain 'oath' and 'covenant' rather than reducing both to secular
    treaty language.
  alternative_readings:
  - '''curse'' for אָלָה'
  - '''treaty'' for בְּרִית'
  rationale: The verse condemns political treachery in terms that also carry covenantal
    and moral weight before God. Preserving 'oath' and 'covenant' maintains that theological
    dimension without overstating it.
  doctrine_reference: Translation philosophy §§1, 5
