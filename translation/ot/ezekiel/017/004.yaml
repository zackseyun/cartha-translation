id: EZK.17.4
reference: Ezekiel 17:4
source:
  edition: WLC
  text: אֵ֛ת רֹ֥אשׁ יְנִֽיקוֹתָ֖י/ו קָטָ֑ף וַ/יְבִיאֵ֨/הוּ֙ אֶל אֶ֣רֶץ כְּנַ֔עַן בְּ/עִ֥יר
    רֹכְלִ֖ים שָׂמֽ/וֹ־׃
translation:
  text: He plucked off the topmost of its young shoots and brought it to a land of
    Canaan; he set it in a city of merchants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a merchant land'; 'Canaan' can carry a commercial sense here, especially
      in light of the parallel phrase 'city of merchants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  chosen: topmost
  alternatives:
  - top
  - head
  - chief part
  lexicon: HALOT
  rationale: In construct with 'young shoots,' the noun denotes the uppermost or leading
    part. 'Topmost' conveys the image naturally in English while preserving the concrete
    metaphor.
- source_word: יְנִיקוֹתָיו
  chosen: its young shoots
  alternatives:
  - its twigs
  - its sucklings
  - its tender shoots
  lexicon: HALOT
  rationale: From a root associated with suckling/nursing, the term here refers metaphorically
    to fresh growth on the cedar. 'Young shoots' is clear modern English and fits
    the arboreal imagery better than the more literal but opaque 'sucklings.'
- source_word: קָטָף
  chosen: plucked off
  alternatives:
  - cropped
  - cut off
  - snapped off
  lexicon: HALOT
  rationale: The verb denotes plucking or cropping. 'Plucked off' preserves the vivid
    action and suits the metaphor of removing a shoot from a tree.
- source_word: וַיְבִיאֵהוּ
  chosen: brought it
  alternatives:
  - carried it
  - brought him
  lexicon: HALOT
  rationale: The suffix refers back to the shoot/topmost growth as a metaphorical
    object, so 'it' is preferable. 'Brought' is the standard rendering of the verb
    and fits the narrative movement.
- source_word: אֶרֶץ כְּנַעַן
  chosen: a land of Canaan
  alternatives:
  - the land of Canaan
  - a merchant land
  - the land of merchants
  lexicon: HALOT
  rationale: Although 'Canaan' can carry an extended sense related to trade/merchant
    activity in some contexts, the phrase is retained more literally here as 'a land
    of Canaan' to preserve the wordplay with the following 'city of merchants.' This
    keeps the proper-name form visible while allowing the next clause to interpret
    the commercial nuance.
- source_word: בְּעִיר רֹכְלִים
  chosen: in a city of merchants
  alternatives:
  - in a trading city
  - in a city of traders
  lexicon: HALOT
  rationale: The participial noun רֹכְלִים refers to traders or merchants. 'City of
    merchants' is slightly more formal and preserves the genitival structure of the
    Hebrew.
- source_word: שָׂמוֹ
  chosen: he set it
  alternatives:
  - placed it
  - put it
  lexicon: HALOT
  rationale: A common verb of placing/setting. 'Set it' is concise and idiomatic in
    English, especially in parallel with the preceding movement verb.
