id: EZK.17.20
reference: Ezekiel 17:20
source:
  edition: WLC
  text: וּ/פָרַשְׂתִּ֤י עָלָי/ו֙ רִשְׁתִּ֔/י וְ/נִתְפַּ֖שׂ בִּ/מְצֽוּדָתִ֑/י וַ/הֲבִיאוֹתִ֣י/הוּ
    בָבֶ֗לָ/ה וְ/נִשְׁפַּטְתִּ֤י אִתּ/וֹ֙ שָׁ֔ם מַעֲל֖/וֹ אֲשֶׁ֥ר מָֽעַל בִּֽ/י־׃
translation:
  text: I will spread my net over him, and he will be caught in my snare; then I will
    bring him to Babylon, and there I will enter into judgment with him for his treachery
    by which he acted treacherously against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there I will judge him.' The Hebrew expression can be rendered more
      simply, but the wording used in the main text preserves the legal nuance of
      entering into judgment with him.
    reason: lexical_alternative
  - marker: b
    text: '''Treachery'' may also be rendered ''unfaithfulness'' or ''breach of faith.''
      The Hebrew emphasizes covenant violation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָרַשְׂתִּי
  chosen: I will spread
  alternatives:
  - I will spread out
  - I will cast
  lexicon: HALOT
  rationale: פָרַשׂ commonly means to spread out or stretch out. 'Spread' fits the
    image of laying a net and preserves the first-person future sense.
- source_word: רִשְׁתִּי
  chosen: my net
  alternatives:
  - my mesh
  - my hunting net
  lexicon: HALOT
  rationale: רֶשֶׁת is the standard term for a net. 'My net' is the natural English
    equivalent and preserves the trapping metaphor.
- source_word: וְנִתְפַּשׂ
  chosen: he will be caught
  alternatives:
  - he will be seized
  - he will be captured
  lexicon: HALOT
  rationale: 'The Niphal of תפשׂ here is passive/reflexive in sense: the subject is
    taken in the trap. ''He will be caught'' matches the net imagery better than the
    more military ''captured.'''
- source_word: בִּמְצוּדָתִי
  chosen: in my snare
  alternatives:
  - in my trap
  - in my stronghold
  lexicon: HALOT
  rationale: Though מְצוּדָה can denote a stronghold in some contexts, here the parallel
    with 'my net' and the verb 'be caught' strongly favors the hunting sense 'snare'
    or 'trap.' 'Snare' preserves the poetic parallelism.
- source_word: וַהֲבִיאוֹתִיהוּ
  chosen: then I will bring him
  alternatives:
  - and I will bring him
  - and I will cause him to come
  lexicon: HALOT
  rationale: The form is a first-person causative with vav-consecutive sequence. In
    English, 'then I will bring him' conveys the narrative progression naturally.
- source_word: בָבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  lexicon: HALOT
  rationale: The directional he indicates motion toward Babylon. Standard English
    expresses this as 'to Babylon.'
- source_word: וְנִשְׁפַּטְתִּי אִתּוֹ שָׁם
  chosen: there I will enter into judgment with him
  alternatives:
  - there I will judge him
  - there I will contend with him in judgment
  lexicon: HALOT
  rationale: The Niphal/reciprocal-like construction with אֵת can suggest entering
    into judicial proceedings with someone, not merely issuing a verdict. 'Enter into
    judgment with him' preserves the legal nuance and the relational force of אִתּוֹ.
- source_word: מַעֲלוֹ
  chosen: his treachery
  alternatives:
  - his unfaithfulness
  - his breach of faith
  - his trespass
  lexicon: HALOT
  rationale: מַעַל denotes breach of faith, often covenantal treachery. 'Treachery'
    is concise, serious, and fits the political-covenantal context of Zedekiah's rebellion
    against an oath ultimately treated as against God.
- source_word: אֲשֶׁר מָעַל בִּי
  chosen: by which he acted treacherously against me
  alternatives:
  - which he committed against me
  - in which he was unfaithful to me
  lexicon: HALOT
  rationale: The cognate verb-object pairing intensifies the offense. Rendering both
    with 'treachery/acted treacherously' preserves the Hebrew emphasis. 'Against me'
    keeps the direct offense toward God explicit.
