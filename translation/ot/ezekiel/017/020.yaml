theological_decisions:
- issue: Nature of the offense described by מַעַל / מָעַל
  chosen_reading: Render as 'treachery' and 'acted treacherously against me,' preserving
    both covenantal and political dimensions without narrowing it to merely ritual
    sin.
  alternative_readings:
  - unfaithfulness against me
  - trespass against me
  rationale: In context, the verse concerns Zedekiah's violation of an oath and covenant,
    which Ezekiel presents as ultimately an offense against God. 'Treachery' best
    preserves the gravity and covenant-breach nuance without importing later technical
    categories.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Judicial wording of וְנִשְׁפַּטְתִּי אִתּוֹ
  chosen_reading: Use 'I will enter into judgment with him' rather than the simpler
    'I will judge him.'
  alternative_readings:
  - I will judge him there
  - I will contend with him there in judgment
  rationale: The Hebrew construction can imply judicial engagement rather than only
    pronouncing sentence. This preserves the legal-covenantal tone and avoids flattening
    the expression.
  doctrine_reference: Translation philosophy §1, §5
