id: EZK.30.9
reference: Ezekiel 30:9
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יֵצְא֨וּ מַלְאָכִ֤ים מִ/לְּ/פָנַ/י֙ בַּ/צִּ֔ים לְ/הַחֲרִ֖יד
    אֶת כּ֣וּשׁ בֶּ֑טַח וְ/הָיְתָ֨ה חַלְחָלָ֤ה בָ/הֶם֙ בְּ/י֣וֹם מִצְרַ֔יִם כִּ֥י
    הִנֵּ֖ה בָּאָֽה־׃ס
translation:
  text: On that day messengers will go out from before me in ships to terrify Cush,
    secure as she is, and trembling will come upon them on the day of Egypt, for behold,
    it is coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'envoys'; the Hebrew word can also mean 'angels,' but in this context
      it most likely refers to human messengers sent with news of Egypt's fall.
    reason: lexical_alternative
  - marker: b
    text: Or 'Ethiopia.' The Hebrew place-name is Cush.
    reason: alternative_reading
  - marker: c
    text: Literally 'on the day of Egypt,' that is, the day when judgment comes upon
      Egypt.
    reason: cultural_note
lexical_decisions:
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this geopolitical judgment context, human emissaries or heralds fit
    better than supernatural 'angels.' 'Messengers' is broad enough to preserve the
    Hebrew while matching the setting.
- source_word: מִלְּפָנַי
  chosen: from before me
  alternatives:
  - from me
  - from my presence
  lexicon: HALOT
  rationale: The idiom literally means 'from before me.' Retaining 'before' preserves
    the sense that these messengers are sent out from Yahweh's presence, not merely
    originating from him in an abstract sense.
- source_word: בַּצִּים
  chosen: in ships
  alternatives:
  - by ships
  - in boats
  lexicon: HALOT
  rationale: The noun refers to seagoing vessels. 'In ships' is idiomatic and suits
    the image of emissaries traveling rapidly by water.
- source_word: לְהַחֲרִיד
  chosen: to terrify
  alternatives:
  - to frighten
  - to make tremble
  lexicon: HALOT
  rationale: The Hiphil conveys causing dread or panic. 'Terrify' best captures the
    force of the causative verb in a judgment oracle.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Following the philosophy of transliterating names, the place-name is
    rendered 'Cush' rather than the interpretive geographical equivalent 'Ethiopia.'
- source_word: בֶּטַח
  chosen: secure as she is
  alternatives:
  - in security
  - confidently
  - at ease
  lexicon: HALOT
  rationale: The term denotes a state of security or confidence. The phrase modifies
    Cush, highlighting the irony that a people feeling secure will be terrified.
- source_word: חַלְחָלָה
  chosen: trembling
  alternatives:
  - anguish
  - writhing
  - panic
  lexicon: HALOT
  rationale: The noun denotes shaking, trembling, or convulsive anguish. 'Trembling'
    keeps the physical-emotional force and echoes the terror motif of the previous
    clause.
- source_word: בָהֶם
  chosen: upon them
  alternatives:
  - among them
  - in them
  lexicon: HALOT
  rationale: The preposition can be rendered several ways, but 'upon them' is natural
    English for an overwhelming experience of dread coming over a people.
- source_word: בְּיוֹם מִצְרַיִם
  chosen: on the day of Egypt
  alternatives:
  - in the day of Egypt
  - when Egypt's day comes
  - on Egypt's day
  lexicon: HALOT
  rationale: This compact Hebrew expression points to the time of Egypt's judgment.
    'On the day of Egypt' preserves the Hebrew form while remaining understandable
    in context.
- source_word: כִּי הִנֵּה בָּאָה
  chosen: for behold, it is coming
  alternatives:
  - for look, it comes
  - for indeed, it has come
  lexicon: HALOT
  rationale: The feminine singular verb most naturally refers to the impending 'day'
    or calamity. Present-progressive English conveys imminent certainty better than
    a simple future here.
