theological_decisions:
- issue: Divine speaker perspective in prophetic judgment
  chosen_reading: The verse speaks of messengers going out 'from before me,' preserving
    Yahweh as the direct speaker behind the oracle.
  alternative_readings:
  - Render more loosely as 'from me' without the presence imagery
  rationale: The Hebrew explicitly uses presence language. Preserving it maintains
    the theological picture of judgment proceeding from Yahweh's own presence rather
    than from impersonal historical forces.
  doctrine_reference: Translation philosophy §1, §3
