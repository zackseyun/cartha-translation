id: EZK.30.24
reference: Ezekiel 30:24
source:
  edition: WLC
  text: וְ/חִזַּקְתִּ֗י אֶת זְרֹעוֹת֙ מֶ֣לֶךְ בָּבֶ֔ל וְ/נָתַתִּ֥י אֶת חַרְבִּ֖/י
    בְּ/יָד֑/וֹ וְ/שָׁבַרְתִּי֙ אֶת זְרֹע֣וֹת פַּרְעֹ֔ה וְ/נָאַ֛ק נַאֲק֥וֹת חָלָ֖ל
    לְ/פָנָֽי/ו־־־׃
translation:
  text: And I will strengthen the arms of the king of Babylon, and I will put my sword
    into his hand; but I will break the arms of Pharaoh, and he will groan before
    him with the groanings of a mortally wounded man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'before me,' if the final pronoun is understood to refer to the LORD
      rather than to the king of Babylon.
    reason: alternative_reading
lexical_decisions:
- source_word: חִזַּקְתִּי
  chosen: I will strengthen
  alternatives:
  - I have strengthened
  - I will make strong
  lexicon: HALOT
  rationale: In prophetic discourse the perfect with prefixed conjunction commonly
    carries future force in sequence. 'Strengthen' preserves the concrete metaphor
    of empowering military might.
- source_word: זְרֹעוֹת
  chosen: arms
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: Literally 'arms'; in context it is a military-power metaphor. Retaining
    'arms' preserves the imagery, especially because the verse contrasts strengthening
    and breaking the same body part.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Standard construct rendering; no need to supply the personal name since
    the Hebrew does not.
- source_word: נָתַתִּי אֶת חַרְבִּי בְּיָדוֹ
  chosen: I will put my sword into his hand
  alternatives:
  - I will give my sword into his hand
  lexicon: HALOT
  rationale: '''Put into his hand'' is idiomatic and natural in English while preserving
    the image of YHWH granting Babylon delegated power for judgment.'
- source_word: חַרְבִּי
  chosen: my sword
  lexicon: HALOT
  rationale: 'The possessive is significant: the military action of Babylon is presented
    as an instrument of divine judgment.'
- source_word: שָׁבַרְתִּי
  chosen: I will break
  alternatives:
  - I have broken
  - I will shatter
  lexicon: HALOT
  rationale: '''Break'' is the standard rendering and matches the recurring ''broken
    arm'' motif in this context.'
- source_word: זְרֹעוֹת פַּרְעֹה
  chosen: the arms of Pharaoh
  alternatives:
  - the power of Pharaoh
  lexicon: HALOT
  rationale: Literal 'arms' should be retained for consistency with the metaphor already
    established in the passage.
- source_word: נָאַק
  chosen: he will groan
  alternatives:
  - he will moan
  lexicon: HALOT
  rationale: The verb denotes anguished groaning; 'groan' is vivid and idiomatic.
- source_word: נַאֲקוֹת
  chosen: with the groanings
  alternatives:
  - groans
  - moanings
  lexicon: HALOT
  rationale: The cognate noun intensifies the verbal idea. 'With the groanings' preserves
    the Hebrew cognate construction better than flattening it.
- source_word: חָלָל
  chosen: of a mortally wounded man
  alternatives:
  - of one slain
  - of a wounded man
  lexicon: HALOT
  rationale: Here the adjective/noun describes someone pierced down in battle. 'Mortally
    wounded man' fits the immediate image of deathlike agony better than the more
    static 'slain' in English.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - before his face
  - in his presence
  lexicon: HALOT
  rationale: Most naturally refers to Pharaoh groaning in the presence of the king
    of Babylon just mentioned, highlighting humiliation before his conqueror.
