theological_decisions:
- issue: Referent of the pronoun in לְפָנָיו
  chosen_reading: The final pronoun refers to the king of Babylon, so Pharaoh groans
    before him.
  alternative_readings:
  - The pronoun refers to the LORD, so Pharaoh groans before God.
  rationale: The nearest masculine singular antecedent is the king of Babylon ('into
    his hand'), and the immediate context emphasizes Babylon's triumph over Pharaoh.
    Theologically, either reading still presents YHWH as sovereign, but the syntax
    and flow favor humiliation before Babylon as YHWH's instrument.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity
    is genuine.
