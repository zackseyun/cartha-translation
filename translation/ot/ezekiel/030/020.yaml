id: EZK.30.20
reference: Ezekiel 30:20
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/אַחַ֤ת עֶשְׂרֵה֙ שָׁנָ֔ה בָּֽ/רִאשׁ֖וֹן בְּ/שִׁבְעָ֣ה לַ/חֹ֑דֶשׁ הָיָ֥ה דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And it happened in the eleventh year, in the first month, on the seventh day of the month, that the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a dated prophetic notice. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בְּאַחַת עֶשְׂרֵה שָׁנָה
  chosen: in the eleventh year
  alternatives:
  - in year eleven
  lexicon: HALOT
  rationale: The Hebrew cardinal construction with 'year' idiomatically expresses an ordinal date in English. 'Eleventh year' is the natural equivalent.
- source_word: בָּרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - in the first
  lexicon: HALOT
  rationale: The adjective 'first' here functions substantivally in dating formulae and refers to the first month. English requires the implied noun for clarity.
- source_word: בְּשִׁבְעָה לַחֹדֶשׁ
  chosen: on the seventh day of the month
  alternatives:
  - on the seventh of the month
  lexicon: HALOT
  rationale: Hebrew dating idiom literally 'on seven of the month' means the seventh day of the month. The fuller English rendering is clearer while remaining faithful.
- source_word: הָיָה דְבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD happened
  - the word of the LORD was
  lexicon: HALOT
  rationale: Standard prophetic formula. Although the verb is 'was/came to be,' English idiomatically renders this as 'came' when introducing divine revelation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct and natural rendering of the preposition plus first-person singular suffix.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: Conventional introduction to direct speech. Retaining 'saying' preserves the formal prophetic cadence and signals continuation into the next verse.
