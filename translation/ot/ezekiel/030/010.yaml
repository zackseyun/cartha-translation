id: EZK.30.10
reference: Ezekiel 30:10
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה וְ/הִשְׁבַּתִּי֙ אֶת הֲמ֣וֹן מִצְרַ֔יִם בְּ/יַ֖ד נְבוּכַדְרֶאצַּ֥ר מֶלֶךְ בָּבֶֽל־־׃
translation:
  text: 'Thus says the Lord GOD: I will put an end to the multitude of Egypt by the hand of Nebuchadnezzar king of Babylon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by the hand of,' an idiom meaning 'through' or 'by means of.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Nebuchadrezzar,' reflecting a form closer to the Hebrew spelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - So
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the formal prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: In the formula כֹּה אָמַר, English idiom commonly uses the present 'says' for direct prophetic speech, even though the Hebrew form is qatal.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Renders the title אֲדֹנָי as 'Lord' and the divine name יְהוִה according to the doctrinal default as 'the LORD.' In the combined form אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD' while still signaling the divine name.
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end to
  alternatives:
  - I will cause to cease
  - I will stop
  lexicon: HALOT
  rationale: From שׁבת in the Hiphil, meaning to cause to cease. 'Put an end to' is a clear, idiomatic rendering that preserves the causative force better than the flatter 'stop.'
- source_word: הֲמוֹן
  chosen: the multitude
  alternatives:
  - the wealth
  - the hordes
  - the abundance
  lexicon: HALOT
  rationale: In judgment oracles against nations, הָמוֹן often denotes the mass, throng, or populous abundance of a nation. 'Multitude' best captures the broad sense here without over-specifying either people alone or wealth alone.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English name for the nation.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: A common Hebrew idiom for agency or instrumentality. 'By the hand of' preserves the idiom and the solemn prophetic style.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration/traditional form. Although the Hebrew spelling here aligns more closely with 'Nebuchadrezzar,' 'Nebuchadnezzar' is the established English form and remains identifiable to readers.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct chain indicating Nebuchadnezzar's royal title and realm.
