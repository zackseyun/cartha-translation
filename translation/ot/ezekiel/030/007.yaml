id: EZK.30.7
reference: Ezekiel 30:7
source:
  edition: WLC
  text: וְ/נָשַׁ֕מּוּ בְּ/ת֖וֹךְ אֲרָצ֣וֹת נְשַׁמּ֑וֹת וְ/עָרָ֕י/ו בְּ/תוֹךְ עָרִ֥ים
    נַחֲרָב֖וֹת תִּֽהְיֶֽינָה־׃
translation:
  text: They will be made desolate among desolate lands, and its cities will be among
    ruined cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the midst of desolate lands ... in the midst of ruined cities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשַׁמּוּ
  chosen: they will be made desolate
  alternatives:
  - they will be desolated
  - they will be laid waste
  - they will be appalled
  lexicon: HALOT
  rationale: From שׁמם in the Niphal, expressing a state/result of devastation. 'Be
    made desolate' preserves the passive/resultative force and fits the judgment context
    better than the less idiomatic 'be desolated.'
- source_word: בְּתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  - in
  lexicon: HALOT
  rationale: The preposition plus תוך denotes being in the midst of. 'Among' is natural
    modern English and preserves the comparative placement within a larger set.
- source_word: אֲרָצוֹת
  chosen: lands
  alternatives:
  - countries
  - earths
  lexicon: HALOT
  rationale: Plural of אֶרֶץ here refers to territories/nations rather than soil or
    the whole earth. 'Lands' is broad and idiomatic in prophetic judgment oracles.
- source_word: נְשַׁמּוֹת
  chosen: desolate
  alternatives:
  - devastated
  - laid waste
  lexicon: HALOT
  rationale: Participle/adjectival form modifying 'lands.' 'Desolate' keeps the lexical
    connection with the preceding verb from the same root שׁמם.
- source_word: וְעָרָיו
  chosen: and its cities
  alternatives:
  - and his cities
  lexicon: HALOT
  rationale: The 3ms suffix refers back to Egypt as a national entity. In English,
    'its' is the natural rendering for a country, avoiding an unnecessarily personalizing
    'his' while preserving the singular referent.
- source_word: עָרִים
  chosen: cities
  alternatives:
  - towns
  lexicon: HALOT
  rationale: Standard rendering of עִיר in prophetic contexts; 'cities' matches the
    scale and diction of the oracle.
- source_word: נַחֲרָבוֹת
  chosen: ruined
  alternatives:
  - destroyed
  - laid waste
  - desolated
  lexicon: HALOT
  rationale: From חרב in a passive/descriptive form. 'Ruined' is clear modern English
    and pairs well with 'cities,' while still conveying devastation.
- source_word: תִּהְיֶינָה
  chosen: will be
  alternatives:
  - shall become
  lexicon: HALOT
  rationale: Simple future of היה linking the subject 'cities' with their comparative
    state among ruined cities. 'Will be' is the most direct and natural rendering.
