id: EZK.30.26
reference: Ezekiel 30:26
source:
  edition: WLC
  text: וַ/הֲפִצוֹתִ֤י אֶת מִצְרַ֨יִם֙ בַּ/גּוֹיִ֔ם וְ/זֵרִיתִ֥י אוֹתָ֖/ם בָּ/אֲרָצ֑וֹת וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־־׃ס
translation:
  text: I will scatter Egypt among the nations, and I will disperse them through the lands. Then they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will scatter them among the nations, and disperse them through the countries.' The Hebrew first names 'Egypt' and then refers to its people with 'them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִצוֹתִי
  chosen: I will scatter
  alternatives:
  - I will disperse
  - I will drive apart
  lexicon: HALOT
  rationale: From פוץ, meaning to scatter or disperse. 'Scatter' is the most natural English equivalent here and pairs well with the following verb without becoming overly repetitive.
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The proper noun can denote the land or nation collectively. Here 'Egypt' best reflects the Hebrew form and allows the following plural pronoun to refer to its people collectively.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - into the nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' 'Among the nations' fits the exile/judgment context and is idiomatic in English.
- source_word: וְזֵרִיתִי
  chosen: I will disperse
  alternatives:
  - I will scatter
  - I will winnow
  lexicon: HALOT
  rationale: From זרה, often 'scatter' or 'winnow.' In this context of international dispersion, 'disperse' differentiates it from the previous verb while preserving the same judgment image.
- source_word: אוֹתָם
  chosen: them
  alternatives:
  - it
  lexicon: HALOT
  rationale: Although the antecedent is the collective noun 'Egypt,' the plural pronoun points to the Egyptians as a people. English 'them' best captures the shift from nation to inhabitants.
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - through the countries
  - in the lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is the plural of 'land/earth.' 'Through the lands' conveys broad geographic dispersion and reads naturally in English.
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - and they will know
  - so they will know
  lexicon: HALOT
  rationale: The conjunction links result to judgment. 'Then' makes the consequential force clear in natural English without overstating causation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
