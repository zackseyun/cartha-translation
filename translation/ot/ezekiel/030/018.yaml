theological_decisions:
- issue: Referent of feminine pronouns in the latter half of the verse
  chosen_reading: The feminine singular refers to Tahpanhes/city imagery, with 'her
    daughters' denoting dependent towns or settlements.
  alternative_readings:
  - The feminine singular refers more broadly to Egypt personified.
  rationale: The immediate mention of Tahpanhes and the common prophetic idiom of
    a city with 'daughters' support taking the feminine as the city image, though
    the wider oracle concerns Egypt. The translation preserves the feminine imagery
    without forcing a narrower interpretive gloss into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
