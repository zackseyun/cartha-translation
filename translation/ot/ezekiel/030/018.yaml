id: EZK.30.18
reference: Ezekiel 30:18
source:
  edition: WLC
  text: וּ/בִֽ/תְחַפְנְחֵס֙ חָשַׂ֣ךְ הַ/יּ֔וֹם בְּ/שִׁבְרִ/י שָׁם֙ אֶת מֹט֣וֹת מִצְרַ֔יִם
    וְ/נִשְׁבַּת בָּ֖/הּ גְּא֣וֹן עֻזָּ֑/הּ הִ֚יא עָנָ֣ן יְכַסֶּ֔/נָּה וּ/בְנוֹתֶ֖י/הָ
    בַּ/שְּׁבִ֥י תֵלַֽכְנָה־־־׃
translation:
  text: And in Tahpanhes the day will grow dark when I break there the bars of Egypt,
    and the pride of her strength will cease in her. As for her, a cloud will cover
    her, and her daughters will go into captivity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the yoke-bars of Egypt.' The Hebrew metaphor may refer to the supports
      of Egypt's power or dominion.
    reason: lexical_alternative
  - marker: b
    text: '''Her daughters'' is a common prophetic expression for a city''s dependent
      towns or surrounding settlements.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבִתְחַפְנְחֵס
  chosen: And in Tahpanhes
  alternatives:
  - And at Tahpanhes
  lexicon: HALOT
  rationale: Proper place name is transliterated per philosophy. The prefixed preposition
    ב is naturally rendered 'in' for location; 'at' is possible but less direct.
- source_word: חָשַׂךְ הַיּוֹם
  chosen: the day will grow dark
  alternatives:
  - the day will be darkened
  - daylight will be withheld
  lexicon: HALOT
  rationale: The verb חשׂך carries the sense of becoming dark or withholding light.
    'Will grow dark' is idiomatic English and preserves the ominous judgment imagery
    without over-paraphrase.
- source_word: בְּשִׁבְרִי
  chosen: when I break
  alternatives:
  - in my breaking
  - when I shatter
  lexicon: HALOT
  rationale: The infinitive construct with 1cs suffix after a temporal setting is
    well rendered 'when I break.' 'Shatter' is possible, but 'break' better matches
    the concrete metaphor and keeps the wording restrained.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: 'Retained for emphasis and locality: the breaking happens there in Egypt,
    specifically at Tahpanhes.'
- source_word: מֹטוֹת מִצְרַיִם
  chosen: the bars of Egypt
  alternatives:
  - the yoke-bars of Egypt
  - the staffs of Egypt
  lexicon: HALOT
  rationale: מוטות commonly denotes bars/poles/yoke-bars. In context of breaking Egypt's
    power, 'bars' best conveys supports of strength or dominion. 'Yoke-bars' is possible
    and reflected in some translations, but 'bars' is cleaner English while preserving
    the metaphor.
- source_word: וְנִשְׁבַּת בָּהּ
  chosen: will cease in her
  alternatives:
  - will be brought to an end in her
  - will be cut off in her
  lexicon: HALOT
  rationale: The Niphal of שבת here means to cease/come to an end. 'In her' refers
    back to the city/location. This preserves the passive/inchoative sense without
    adding an explicit agent beyond the context of divine judgment.
- source_word: גְּאוֹן עֻזָּהּ
  chosen: the pride of her strength
  alternatives:
  - the pride of her power
  - her proud might
  lexicon: HALOT
  rationale: 'A construct chain: ''pride'' + ''strength/power.'' ''The pride of her
    strength'' preserves both nouns and the rhetorical force of Egypt''s arrogant
    power.'
- source_word: הִיא
  chosen: As for her
  alternatives:
  - she
  - it
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'As for her' brings out the disjunctive
    emphasis before the next clause better than a bare pronoun in English.
- source_word: עָנָן יְכַסֶּנָּה
  chosen: a cloud will cover her
  alternatives:
  - cloud will cover her
  - a storm cloud will cover her
  lexicon: HALOT
  rationale: The singular noun 'cloud' likely carries judgment imagery and perhaps
    metaphorical gloom. The simple rendering preserves the image without interpretive
    expansion.
- source_word: וּבְנוֹתֶיהָ
  chosen: her daughters
  alternatives:
  - her dependent towns
  - her villages
  lexicon: HALOT
  rationale: Literally 'her daughters.' In prophetic city or nation oracles this often
    refers to dependent towns/settlements. The literal rendering is retained in the
    main text for transparency, with the idiomatic sense preserved in a footnote.
- source_word: בַּשְּׁבִי תֵלַכְנָה
  chosen: will go into captivity
  alternatives:
  - will go into exile
  - will be taken captive
  lexicon: HALOT
  rationale: The phrase literally means 'will go in/into captivity.' This is standard
    English and preserves the movement imagery of deportation.
