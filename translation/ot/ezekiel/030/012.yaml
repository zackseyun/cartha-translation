id: EZK.30.12
reference: Ezekiel 30:12
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י יְאֹרִים֙ חָֽרָבָ֔ה וּ/מָכַרְתִּ֥י אֶת הָ/אָ֖רֶץ בְּ/יַד רָעִ֑ים וַ/הֲשִׁמֹּתִ֞י אֶ֤רֶץ וּ/מְלֹאָ/הּ֙ בְּ/יַד זָרִ֔ים אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי־־־׃ס
translation:
  text: And I will make the Nile channels dry, and I will sell the land into the hand of evil men; and I will devastate the land and its fullness by the hand of foreigners. I am Yahweh; I have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the canals' or 'the rivers'; in Egypt the term likely refers to the Nile waterways.
    reason: lexical_alternative
  - marker: b
    text: Or 'hand over the land'; the Hebrew verb is literally 'sell,' a judgment image for giving a people over to hostile power.
    reason: lexical_alternative
  - marker: c
    text: Or 'the land and all that is in it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְאֹרִים
  chosen: the Nile channels
  alternatives:
  - the canals
  - the rivers
  - the streams
  lexicon: HALOT
  rationale: In Ezekiel's Egyptian context, יְאֹרִים refers specifically to the Nile waterways rather than generic rivers. 'Nile channels' preserves the Egyptian setting and the likely sense of distributaries/canals.
- source_word: חָרָבָה
  chosen: dry
  alternatives:
  - dry land
  - drought
  - waste
  lexicon: HALOT
  rationale: With נתן in this construction, the sense is to make the waterways dry. English idiom prefers 'make ... dry' rather than a more wooden 'give ... dryness.'
- source_word: וּמָכַרְתִּי
  chosen: I will sell
  alternatives:
  - I will give over
  - I will hand over
  lexicon: HALOT
  rationale: The verb מכר literally means 'sell.' In judgment contexts it can imply handing over to enemies, but 'sell' preserves the force of divine abandonment more transparently.
- source_word: בְּיַד רָעִים
  chosen: into the hand of evil men
  alternatives:
  - into the power of evil ones
  - into the hand of the wicked
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is common biblical language for being delivered to someone's power. 'Evil men' renders the masculine plural adjective substantivally without over-specifying identity.
- source_word: וַהֲשִׁמֹּתִי
  chosen: I will devastate
  alternatives:
  - I will lay waste
  - I will desolate
  lexicon: HALOT
  rationale: '''Devastate'' is natural modern English and conveys the causative force of the Hiphil of שמם without sounding archaic.'
- source_word: אֶרֶץ וּמְלֹאָהּ
  chosen: the land and all that fills it
  alternatives:
  - the land and its fullness
  - the land and all that is in it
  lexicon: HALOT
  rationale: The phrase denotes the land together with everything that fills it. 'All that fills it' stays close to the Hebrew while remaining readable.
- source_word: בְּיַד זָרִים
  chosen: by the hand of foreigners
  alternatives:
  - by foreigners
  - by the hand of strangers
  lexicon: HALOT
  rationale: The repeated idiom is preserved for rhetorical consistency. זָרִים here means foreign outsiders/invaders, well rendered by 'foreigners.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I have said
  lexicon: HALOT
  rationale: This prophetic formula is conventionally and accurately rendered 'I have spoken,' emphasizing the certainty of the declared judgment.
