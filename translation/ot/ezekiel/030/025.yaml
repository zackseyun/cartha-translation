theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency of Babylon in divine judgment
  chosen_reading: YHWH's sword is placed in Babylon's hand, with Babylon acting as the instrument of divine judgment
  alternative_readings:
  - A less explicit rendering that obscures the instrumental relationship
  rationale: The Hebrew explicitly states that YHWH gives 'my sword' into the hand of Babylon's king. The translation preserves both divine sovereignty and human agency without importing further theological claims.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
