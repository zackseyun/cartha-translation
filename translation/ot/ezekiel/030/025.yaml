id: EZK.30.25
reference: Ezekiel 30:25
source:
  edition: WLC
  text: וְ/הַחֲזַקְתִּ֗י אֶת זְרֹעוֹת֙ מֶ֣לֶךְ בָּבֶ֔ל וּ/זְרֹע֥וֹת פַּרְעֹ֖ה תִּפֹּ֑לְנָה וְֽ/יָדְע֞וּ כִּֽי אֲנִ֣י יְהוָ֗ה בְּ/תִתִּ֤/י חַרְבִּ/י֙ בְּ/יַ֣ד מֶֽלֶךְ בָּבֶ֔ל וְ/נָטָ֥ה אוֹתָ֖/הּ אֶל אֶ֥רֶץ מִצְרָֽיִם־־־־׃
translation:
  text: I will strengthen the arms of the king of Babylon, but Pharaoh’s arms will fall. Then they will know that I am Yahweh, when I put my sword into the hand of the king of Babylon and he stretches it out against the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and Pharaoh’s arms will fail.' The Hebrew says 'fall,' preserving the image of military collapse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֲזַקְתִּי
  chosen: I will strengthen
  alternatives:
  - I will make strong
  - I will harden
  lexicon: HALOT
  rationale: Hiphil of חזק here is causative, expressing YHWH's action of giving strength or making strong. 'Strengthen' is natural English and fits the military metaphor of empowering Babylon's king.
- source_word: זְרֹעוֹת
  chosen: arms
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: The plural 'arms' is the concrete image in the Hebrew and should be preserved. In context it metaphorically denotes military power, but the bodily image is important, especially in contrast with Pharaoh's arms falling.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct phrase; retained formally.
- source_word: וּזְרֹעוֹת פַּרְעֹה תִּפֹּלְנָה
  chosen: but Pharaoh’s arms will fall
  alternatives:
  - and Pharaoh's arms will fall
  - but Pharaoh's arms will fail
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in context the clause is adversative, contrasting Babylon's strengthening with Pharaoh's collapse. 'Fall' preserves the Hebrew verb נפל and the vivid metaphor better than the more interpretive 'fail'.
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - and they will know
  lexicon: HALOT
  rationale: The waw-consecutive sense is naturally represented in English as 'Then,' marking result from the preceding judgment acts.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּתִתִּי חַרְבִּי בְּיַד מֶלֶךְ בָּבֶל
  chosen: when I put my sword into the hand of the king of Babylon
  alternatives:
  - when I give my sword into the hand of the king of Babylon
  - as I place my sword in the hand of the king of Babylon
  lexicon: HALOT
  rationale: נתן literally means 'give/put.' 'Put ... into the hand' is idiomatic enough in English and preserves the image of YHWH granting Babylon authority as his instrument of judgment.
- source_word: חַרְבִּי
  chosen: my sword
  lexicon: HALOT
  rationale: Retained literally; it signifies YHWH's instrument of judgment, here wielded through Babylon.
- source_word: וְנָטָה אֹתָהּ
  chosen: and he stretches it out
  alternatives:
  - and he wields it
  - and he extends it
  lexicon: HALOT
  rationale: נטה commonly means 'stretch out' or 'extend.' The pronoun refers back to 'my sword.' 'Stretches it out' preserves the concrete action and echoes prophetic judgment language.
- source_word: אֶל אֶרֶץ מִצְרַיִם
  chosen: against the land of Egypt
  alternatives:
  - toward the land of Egypt
  - over the land of Egypt
  lexicon: HALOT
  rationale: Although אֶל is basically 'to/toward,' in this hostile military context English idiom prefers 'against,' making explicit the direction of attack without over-paraphrasing.
