id: EZK.30.3
reference: Ezekiel 30:3
source:
  edition: WLC
  text: כִּֽי קָר֣וֹב י֔וֹם וְ/קָר֥וֹב י֖וֹם לַֽ/יהוָ֑ה י֣וֹם עָנָ֔ן עֵ֥ת גּוֹיִ֖ם יִֽהְיֶֽה־׃
translation:
  text: For the day is near, yes, the day of Yahweh is near; it will be a day of clouds, a time of nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a day of cloud.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the time of the nations.' The Hebrew phrase is terse and may refer to a decisive season concerning the nations.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the day of the LORD,' a prophetic expression for a day of divine intervention in judgment.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the lament/oracle. 'For' best preserves the connective force in context without overinterpreting it as strictly causal ('because').
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - draws near
  - is close
  lexicon: HALOT
  rationale: Predicate adjective describing the imminence of the day. 'Is near' is idiomatic and preserves the urgent temporal sense.
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Standard rendering; repeated three times in Hebrew for emphasis. The English keeps the repetition to preserve rhetorical force.
- source_word: וְקָרוֹב
  chosen: yes, ... is near
  alternatives:
  - and near
  - indeed near
  lexicon: HALOT
  rationale: The conjunction plus repeated adjective intensifies the statement. Rendering with 'yes' captures the emphatic repetition in natural English better than a wooden second 'and near.'
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - belonging to the LORD
  - for the LORD
  lexicon: HALOT
  rationale: In the prophetic expression 'day of the LORD,' the lamed marks relation/possession. This is the established and contextually correct sense. Per doctrine, יהוה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: יוֹם עָנָן
  chosen: a day of clouds
  alternatives:
  - a cloudy day
  - a day of cloud
  lexicon: HALOT
  rationale: Construct-like apposition describing the character of the day. Plural 'clouds' is natural English and conveys ominous storm imagery; 'a day of cloud' is more literal but less idiomatic.
- source_word: עֵת
  chosen: a time for
  alternatives:
  - the time of
  - a time of
  lexicon: HALOT
  rationale: 'Marks an appointed season or occasion. ''A time for nations'' best captures the terse Hebrew phrase in context: a decisive time pertaining to the nations.'
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In prophetic judgment contexts, גוים ordinarily means the nations, not specifically 'Gentiles' as opposed to Jews. 'Nations' is the clearest and most contextually appropriate rendering.
- source_word: יִהְיֶה
  chosen: it will be
  alternatives:
  - shall be
  - will become
  lexicon: HALOT
  rationale: Future copula referring back to the day. 'It will be' makes the English sentence complete and clear.
