theological_decisions:
- issue: Rendering the prophetic formula יוֹם לַיהוָה
  chosen_reading: the day of Yahweh
  alternative_readings:
  - the LORD's day
  - a day belonging to the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of עֵת גּוֹיִם
  chosen_reading: a time for nations
  alternative_readings:
  - the time of the nations
  - a time of nations
  rationale: The phrase is terse and somewhat elliptical. The chosen rendering preserves the broad prophetic sense of a season concerning the nations without over-specifying whether it means judgment upon them, their allotted time, or an era characterized by them. This preserves the text's tension rather than resolving it too narrowly.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
