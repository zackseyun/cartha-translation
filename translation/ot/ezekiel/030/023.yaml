id: EZK.30.23
reference: Ezekiel 30:23
source:
  edition: WLC
  text: וַ/הֲפִצוֹתִ֥י אֶת מִצְרַ֖יִם בַּ/גּוֹיִ֑ם וְ/זֵרִיתִ֖/ם בָּ/אֲרָצֽוֹת־׃
translation:
  text: I will scatter Egypt among the nations, and I will disperse them through the
    lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Egypt' in the first clause, with 'them' in the second; the nation-name
      stands for its people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִצוֹתִי
  chosen: I will scatter
  alternatives:
  - I will disperse
  - I will cause to be scattered
  lexicon: HALOT
  rationale: From פוץ in the Hiphil, expressing causative scattering. 'I will scatter'
    is natural English and preserves the divine action without overloading the causative
    nuance.
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The direct object is the place-name 'Egypt,' but in prophetic judgment
    language the nation stands for its people. Retaining 'Egypt' follows the Hebrew
    wording while allowing the following plural pronominal suffix to refer to its
    inhabitants collectively.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - into the nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' 'Among the nations' fits the idiom
    of exile/judgment scattering better than a more wooden 'in the nations.'
- source_word: וְזֵרִיתִם
  chosen: and I will disperse them
  alternatives:
  - and I will winnow them
  - and I will scatter them
  lexicon: HALOT
  rationale: From זרה, often 'scatter' or 'winnow.' In parallel with the previous
    verb, 'disperse them' preserves the poetic variation in English while reflecting
    the plural suffix 'them' explicitly.
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - through the countries
  - in the lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is plural, referring to various lands/countries. 'Through the
    lands' conveys broad geographic dispersion and reads smoothly in parallel with
    'among the nations.'
