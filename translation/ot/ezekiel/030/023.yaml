theological_decisions:
- issue: Referent shift between singular 'Egypt' and plural suffix 'them'
  chosen_reading: Retain 'Egypt' in the first clause and render the suffix explicitly
    as 'them' in the second, allowing the nation-name to stand metonymically for its
    people.
  alternative_readings:
  - Translate 'Egypt' as 'the Egyptians' throughout for smoother English
  rationale: The Hebrew text itself juxtaposes the singular nation-name with a plural
    pronominal suffix, a common prophetic usage in which the land/nation represents
    its population. Preserving this in idiomatic English maintains fidelity to the
    source without obscuring meaning.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
