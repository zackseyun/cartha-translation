id: EZK.30.19
reference: Ezekiel 30:19
source:
  edition: WLC
  text: וְ/עָשִׂ֥יתִי שְׁפָטִ֖ים בְּ/מִצְרָ֑יִם וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־׃פ
translation:
  text: Thus I will execute judgments on Egypt, and they will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Yahweh.' The Hebrew has the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָשִׂיתִי
  chosen: Thus I will execute
  alternatives:
  - And I will do
  - And I will carry out
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but with שְׁפָטִים as its object
    it idiomatically means to carry out or execute judgments. 'Thus' reflects the
    prefixed conjunction in context as a consequential transition rather than a simple
    additive 'and.'
- source_word: שְׁפָטִים
  chosen: judgments
  alternatives:
  - acts of judgment
  - justice
  lexicon: HALOT
  rationale: The plural noun commonly denotes judicial acts or punishments in prophetic
    judgment contexts. 'Judgments' preserves the formal sense and prophetic register
    better than the more interpretive 'justice.'
- source_word: בְּמִצְרַיִם
  chosen: on Egypt
  alternatives:
  - in Egypt
  - against Egypt
  lexicon: HALOT
  rationale: Although the preposition is literally 'in,' English idiom with punitive
    action is better expressed as 'on Egypt.' This communicates the object of divine
    judgment naturally without losing the locative sense.
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - then they will know
  lexicon: HALOT
  rationale: A standard Ezekiel formula. 'Know' is retained rather than softened to
    'realize' in order to preserve the covenantal and revelatory force of ידע.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: This is the recurring recognition formula in Ezekiel. Following the doctrinal
    guideline for יְהוָה, the divine name is rendered 'the LORD' in the main text,
    while the alternative 'Yahweh' is preserved in a footnote.
