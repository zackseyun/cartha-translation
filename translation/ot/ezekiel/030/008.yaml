id: EZK.30.8
reference: Ezekiel 30:8
source:
  edition: WLC
  text: וְ/יָדְע֖וּ כִּֽי אֲנִ֣י יְהוָ֑ה בְּ/תִתִּ/י אֵ֣שׁ בְּ/מִצְרַ֔יִם וְ/נִשְׁבְּר֖וּ כָּל עֹזְרֶֽי/הָ־־־׃
translation:
  text: Then they will know that I am Yahweh, when I set fire to Egypt and all her helpers are broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all her allies are broken.' The Hebrew literally says 'all her helpers,' which may refer to Egypt's supporting nations or forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: The verb means 'know.' The prefixed conjunction can be rendered simply 'and,' but in context it marks the result of the announced judgment, so 'Then' brings out the discourse flow without departing from the Hebrew sense.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they will know, so 'that' is the most natural English rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּתִתִּי
  chosen: when I set
  alternatives:
  - in my giving
  - when I give
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב marks temporal circumstance: ''when I give/put.'' In idiomatic English with אֵשׁ, ''when I set'' best conveys the action.'
- source_word: אֵשׁ
  chosen: fire
  alternatives:
  - a fire
  lexicon: HALOT
  rationale: 'The noun means ''fire.'' English idiom with ''set'' commonly omits the article: ''set fire in Egypt.'''
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - against Egypt
  lexicon: HALOT
  rationale: The preposition is straightforwardly 'in.' While the sense is hostile judgment, the Hebrew wording is locative, so 'in Egypt' is retained.
- source_word: וְנִשְׁבְּרוּ
  chosen: and ... are broken
  alternatives:
  - and ... will be broken
  - and ... are shattered
  lexicon: HALOT
  rationale: The Niphal of שבר denotes being broken/shattered. English present 'are broken' after 'when' is idiomatic in a future-temporal clause; the sense remains future relative to the prophecy. 'Broken' is preferred over 'shattered' for a slightly broader, less interpretively intensified rendering.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard rendering meaning totality.
- source_word: עֹזְרֶיהָ
  chosen: her helpers
  alternatives:
  - her allies
  - those who help her
  lexicon: HALOT
  rationale: From עזר, 'helper/helping one.' In context this likely refers to Egypt's supporting nations or forces. 'Helpers' preserves the lexical sense more directly, while 'allies' is a plausible contextual interpretation preserved as an alternative.
