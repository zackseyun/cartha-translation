id: EZK.30.21
reference: Ezekiel 30:21
source:
  edition: WLC
  text: בֶּן אָדָ֕ם אֶת זְר֛וֹעַ פַּרְעֹ֥ה מֶֽלֶךְ מִצְרַ֖יִם שָׁבָ֑רְתִּי וְ/הִנֵּ֣ה
    לֹֽא חֻ֠בְּשָׁה לָ/תֵ֨ת רְפֻא֜וֹת לָ/שׂ֥וּם חִתּ֛וּל לְ/חָבְשָׁ֥/הּ לְ/חָזְקָ֖/הּ
    לִ/תְפֹּ֥שׂ בֶּ/חָֽרֶב־־־־׃ס
translation:
  text: Son of man, I have broken the arm of Pharaoh king of Egypt, and behold, it
    has not been bound up to apply healing, to put on a bandage, to bind it, to strengthen
    it so that it may grasp the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to give remedies'; the Hebrew phrase refers to applying medical treatment
      to the broken arm.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard prophetic address in Ezekiel. A relatively formal rendering
    preserves the idiom and its repeated usage in the book better than a more interpretive
    alternative.
- source_word: זְרֹעַ
  chosen: arm
  alternatives:
  - forearm
  - strength
  lexicon: HALOT
  rationale: Literal 'arm' fits the political-military metaphor. The figurative sense
    of strength is conveyed by context and need not be substituted into the main text.
- source_word: שָׁבַרְתִּי
  chosen: I have broken
  alternatives:
  - I broke
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English, fitting the
    ensuing description of the arm's untreated condition.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: Preserves the discourse marker's vividness and prophetic force.
- source_word: חֻבְּשָׁה
  chosen: it has not been bound up
  alternatives:
  - it has not been bandaged
  lexicon: HALOT
  rationale: Keeps the passive medical imagery and allows the later noun for bandage
    to remain distinct.
- source_word: לָתֵת רְפֻאוֹת
  chosen: to apply healing
  alternatives:
  - to give remedies
  - to bring healing
  lexicon: HALOT
  rationale: The phrase refers to medical treatment/remedies. 'Apply healing' is natural
    English while retaining the concrete treatment imagery.
- source_word: חִתּוּל
  chosen: a bandage
  alternatives:
  - wrapping
  - dressing
  lexicon: HALOT
  rationale: Concrete medical term for a wrapping/bandage; 'bandage' is the clearest
    modern equivalent.
- source_word: לְחָבְשָׁהּ
  chosen: to bind it
  alternatives:
  - to bandage it
  lexicon: HALOT
  rationale: Maintains verbal distinction from the noun חִתּוּל while still matching
    the medical context.
- source_word: לְחָזְקָהּ
  chosen: to strengthen it
  alternatives:
  - to make it strong
  - to make it firm
  lexicon: HALOT
  rationale: Straightforward rendering of the infinitive expressing the intended result
    of treatment.
- source_word: לִתְפֹּשׂ בֶּחָרֶב
  chosen: so that it may grasp the sword
  alternatives:
  - to take hold of the sword
  - to wield the sword
  lexicon: HALOT
  rationale: Retains the image of restored military capacity. 'Grasp the sword' is
    literal and idiomatic enough; 'wield' would be slightly more interpretive.
