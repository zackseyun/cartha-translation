id: EZK.30.17
reference: Ezekiel 30:17
source:
  edition: WLC
  text: בַּח֥וּרֵי אָ֛וֶן וּ/פִי בֶ֖סֶת בַּ/חֶ֣רֶב יִפֹּ֑לוּ וְ/הֵ֖נָּה בַּ/שְּׁבִ֥י
    תֵלַֽכְנָה־׃
translation:
  text: The young men of Aven and of Pi-beseth will fall by the sword, and these cities
    will go into captivity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aven likely refers to On, that is, Heliopolis in Egypt.
    reason: alternative_reading
  - marker: b
    text: Pi-beseth is commonly identified with Bubastis.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּח֥וּרֵי
  chosen: young men of
  alternatives:
  - chosen men of
  - youths of
  lexicon: HALOT
  rationale: בַּחוּרִים commonly denotes young men in the prime of life. 'Young men'
    is the most natural English rendering here and fits the military/disaster context
    without overstating elite status.
- source_word: אָ֛וֶן
  chosen: Aven
  alternatives:
  - 'On'
  lexicon: HALOT
  rationale: This is a place name. Following the philosophy of transliterating names,
    'Aven' is retained in the main text. Because the name likely refers to On/Heliopolis
    in Egypt, that alternative is preserved in a footnote.
- source_word: וּ/פִי בֶ֖סֶת
  chosen: and of Pi-beseth
  alternatives:
  - and of Bubastis
  lexicon: HALOT
  rationale: A toponym; transliteration is preferred for names. 'Pi-beseth' reflects
    the Hebrew form, while the historically identified Greek/English place name 'Bubastis'
    is worth preserving in a footnote.
- source_word: בַּ/חֶ֣רֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare/judgment. 'By the sword' is idiomatic
    and preserves the instrumental sense.
- source_word: יִפֹּ֑לוּ
  chosen: will fall
  alternatives:
  - will be slain
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall' and often functions as a conventional
    expression for dying in battle. 'Will fall' preserves the Hebrew imagery while
    remaining clear in context.
- source_word: וְ/הֵ֖נָּה
  chosen: and these cities
  alternatives:
  - and they
  - and these women
  lexicon: HALOT
  rationale: The feminine plural pronoun refers back to the cities just named, not
    to women. English requires the referent to be made explicit for clarity, so 'these
    cities' is supplied.
- source_word: בַּ/שְּׁבִ֥י
  chosen: into captivity
  alternatives:
  - into exile
  - as captives
  lexicon: HALOT
  rationale: The noun denotes captivity/captive state. 'Into captivity' is the most
    direct and idiomatic rendering in a judgment oracle.
- source_word: תֵלַֽכְנָה
  chosen: will go
  alternatives:
  - will be taken
  - will depart
  lexicon: HALOT
  rationale: הלך is literally 'go/walk.' In combination with 'into captivity,' 'will
    go' preserves the Hebrew wording while clearly conveying deportation.
