id: EZK.30.14
reference: Ezekiel 30:14
source:
  edition: WLC
  text: וַ/הֲשִׁמֹּתִי֙ אֶת פַּתְר֔וֹס וְ/נָתַ֥תִּי אֵ֖שׁ בְּ/צֹ֑עַן וְ/עָשִׂ֥יתִי
    שְׁפָטִ֖ים בְּ/נֹֽא־׃
translation:
  text: I will make Pathros desolate, and I will set fire in Zoan, and I will execute
    judgments on No.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lay Pathros waste.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will kindle a fire in Zoan.' Literally, 'I will give fire in Zoan.'
    reason: lexical_alternative
  - marker: c
    text: No is the Egyptian city also known as Thebes.
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲשִׁמֹּתִי
  chosen: I will make desolate
  alternatives:
  - I will lay waste
  - I will devastate
  lexicon: HALOT
  rationale: From שׁמם in the causative stem, expressing causing a place to become
    desolate. 'Make desolate' preserves the resultative force and prophetic register
    without over-paraphrase.
- source_word: פַּתְרוֹס
  chosen: Pathros
  rationale: Proper place name; transliterated per translation philosophy rather than
    translated.
- source_word: וְנָתַתִּי אֵשׁ
  chosen: I will set fire
  alternatives:
  - I will put fire
  - I will kindle a fire
  lexicon: HALOT
  rationale: Literally 'I will give fire,' an idiom for bringing destructive burning.
    'Set fire' is natural modern English and preserves the sense of inflicted conflagration.
- source_word: בְּצֹעַן
  chosen: in Zoan
  alternatives:
  - against Zoan
  rationale: The preposition ב normally means 'in' here, indicating the location where
    the fire is set. 'Zoan' is the standard English form of the place name.
- source_word: וְעָשִׂיתִי שְׁפָטִים
  chosen: I will execute judgments
  alternatives:
  - I will carry out judgments
  - I will perform acts of judgment
  lexicon: HALOT
  rationale: The collocation 'do/make judgments' is a standard Hebrew idiom for carrying
    out punitive judicial acts. 'Execute judgments' is idiomatic in English and retains
    the judicial nuance.
- source_word: בְּנֹא
  chosen: on No
  alternatives:
  - against No
  - in No
  rationale: With 'execute judgments,' English commonly uses 'on' to express the target
    of punitive action. This best conveys the sense of divine judgment directed at
    the city while remaining close to the Hebrew construction.
