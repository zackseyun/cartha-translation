id: EZK.30.16
reference: Ezekiel 30:16
source:
  edition: WLC
  text: וְ/נָתַ֤תִּי אֵשׁ֙ בְּ/מִצְרַ֔יִם ח֤וּל תחיל סִ֔ין וְ/נֹ֖א תִּהְיֶ֣ה לְ/הִבָּקֵ֑עַ
    וְ/נֹ֖ף צָרֵ֥י יוֹמָֽם׃
translation:
  text: And I will set fire in Egypt; Sin will writhe in anguish, and No will be broken
    open, and Noph will have enemies by day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sin is the Egyptian city commonly identified with Pelusium.
    reason: cross_reference
  - marker: b
    text: No is commonly identified with Thebes.
    reason: cross_reference
  - marker: c
    text: Noph is commonly identified with Memphis.
    reason: cross_reference
  - marker: d
    text: Or 'Noph will have adversaries in the daytime.' The Hebrew clause is terse
      and may emphasize open, continual attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will set
  alternatives:
  - And I will give
  - And I will put
  lexicon: HALOT
  rationale: נתן literally means 'give/put,' but with אֵשׁ and a location it idiomatically
    means to set or bring fire upon a place. 'Set' is natural English and preserves
    the causative force.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward lexical rendering; in prophetic judgment contexts it
    commonly signifies destructive fire.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - against Egypt
  lexicon: HALOT
  rationale: The preposition ב is most naturally 'in.' In context it implies judgment
    upon Egypt, but 'in Egypt' is the plain sense.
- source_word: חוּל תחיל
  chosen: will writhe in anguish
  alternatives:
  - will tremble
  - will be in labor
  - will be in anguish
  lexicon: HALOT
  rationale: The verb חול often denotes writhing, trembling, or labor pains. Here,
    with Sin as subject under judgment, 'will writhe in anguish' captures the vivid
    image of convulsive distress better than the flatter 'tremble.'
- source_word: סִין
  chosen: Sin
  alternatives:
  - Pelusium
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated.
    The referent is the Egyptian city often identified with Pelusium; that identification
    is better preserved in a footnote than substituted into the main text.
- source_word: וְנֹא
  chosen: 'No'
  alternatives:
  - Thebes
  lexicon: HALOT
  rationale: The Hebrew proper name is transliterated as 'No' in keeping with the
    stated policy to transliterate names. 'Thebes' is a historical identification,
    not the form of the source text.
- source_word: תִּהְיֶה לְהִבָּקֵעַ
  chosen: will be broken open
  alternatives:
  - will be breached
  - will be split apart
  lexicon: HALOT
  rationale: The Niphal infinitive of בקע conveys being split, broken through, or
    breached. For a city under attack, 'broken open' preserves the concrete image
    while remaining readable.
- source_word: וְנֹף
  chosen: Noph
  alternatives:
  - Memphis
  lexicon: HALOT
  rationale: The Hebrew proper name is transliterated. 'Memphis' is the common historical
    identification and is suitable for a footnote rather than the main text.
- source_word: צָרֵי יוֹמָם
  chosen: will have enemies by day
  alternatives:
  - adversaries by day
  - distresses daily
  - foes in the daytime
  lexicon: HALOT
  rationale: צָרֵי is best taken as 'enemies/adversaries' from צרר/צר. יוֹמָם is the
    adverb 'by day/in the daytime.' The clause is terse; supplying 'will have' yields
    clear English while preserving the sense of open, continual assault. This is preferable
    to emending toward an abstract noun such as 'distresses.'
