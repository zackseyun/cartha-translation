id: EZK.30.6
reference: Ezekiel 30:6
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה וְ/נָֽפְלוּ֙ סֹמְכֵ֣י מִצְרַ֔יִם וְ/יָרַ֖ד גְּא֣וֹן עֻזָּ֑/הּ מִ/מִּגְדֹּ֣ל סְוֵנֵ֗ה בַּ/חֶ֨רֶב֙ יִפְּלוּ בָ֔/הּ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃
translation:
  text: 'Thus says Yahweh: The supporters of Egypt will fall, and the pride of her strength will come down. From Migdol to Syene they will fall by the sword within her, declares the Lord GOD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pride of her power.'
    reason: lexical_alternative
  - marker: b
    text: Migdol and Syene mark the extent of Egypt from north to south.
    reason: cultural_note
  - marker: c
    text: Or 'they will fall within her by the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: סֹמְכֵי מִצְרַיִם
  chosen: those who support Egypt
  alternatives:
  - the supporters of Egypt
  - those who uphold Egypt
  lexicon: HALOT
  rationale: The participle of סמך denotes supporting/upholding. 'Those who support Egypt' is natural English and preserves the active sense without overinterpreting as military allies only.
- source_word: וְנָפְלוּ
  chosen: will fall
  alternatives:
  - shall fall
  lexicon: HALOT
  rationale: Future sense fits the prophetic judgment context.
- source_word: גְּאוֹן עֻזָּהּ
  chosen: the pride of her strength
  alternatives:
  - the pride of her power
  - her proud might
  lexicon: HALOT
  rationale: גאון commonly denotes pride, majesty, or exaltation; עז denotes strength/might. The construct is preserved fairly literally as 'the pride of her strength,' referring to Egypt's proud power.
- source_word: וְיָרַד
  chosen: will come down
  alternatives:
  - will be brought down
  - will descend
  lexicon: HALOT
  rationale: A straightforward rendering of ירד. 'Will come down' preserves the intransitive form; 'will be brought down' would add passive nuance not explicit in the Hebrew.
- source_word: מִמִּגְדֹּל סְוֵנֵה
  chosen: From Migdol to Syene
  alternatives:
  - From Migdol to Seveneh
  - From Migdol as far as Syene
  lexicon: HALOT
  rationale: These are place names marking the extent of Egypt. Names are transliterated per philosophy. 'From ... to ...' captures the merism of geographic range.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare/judgment.
- source_word: יִפְּלוּ בָהּ
  chosen: they will fall in her
  alternatives:
  - they will fall within her
  - they will fall there
  lexicon: HALOT
  rationale: The plural verb likely refers to those within the geographic scope of Egypt; בָהּ is most naturally 'in her,' referring to the land/country as feminine. The somewhat literal rendering preserves the Hebrew referent without collapsing it into a paraphrase.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: Prophetic affirmation formula. אֲדֹנָי יְהוִה is conventionally and clearly rendered 'the Lord GOD'; this distinguishes it from the earlier simple divine name while maintaining readable English.
