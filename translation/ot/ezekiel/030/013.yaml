theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine default renders יְהוָה as 'the LORD.' In the compound title
    with אֲדֹנָי, English convention uses 'Lord GOD' to avoid 'Lord LORD' while still
    signaling the divine name. This is a translation convention rather than a theological
    reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation
    philosophy #2'
