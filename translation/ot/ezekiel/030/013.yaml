id: EZK.30.13
reference: Ezekiel 30:13
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנָ֣/י יְהוִ֗ה וְ/הַאֲבַדְתִּ֨י גִלּוּלִ֜ים וְ/הִשְׁבַּתִּ֤י
    אֱלִילִים֙ מִ/נֹּ֔ף וְ/נָשִׂ֥יא מֵ/אֶֽרֶץ מִצְרַ֖יִם לֹ֣א יִֽהְיֶה ע֑וֹד וְ/נָתַתִּ֥י
    יִרְאָ֖ה בְּ/אֶ֥רֶץ מִצְרָֽיִם־־־׃
translation:
  text: 'Thus says the Lord GOD: I will destroy the idols and put an end to the images
    from Noph, and there will no longer be a prince from the land of Egypt; and I
    will put fear in the land of Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Noph is the Hebrew name for the Egyptian city later known in Greek as Memphis.
    reason: cross_reference
  - marker: b
    text: Or 'there will no longer be a ruler from the land of Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the divine title as 'the Lord GOD' to reflect the traditional
    English distinction for אֲדֹנָי יְהוִה while honoring the doctrine default that
    יְהוָה is rendered 'the LORD.' Small caps are not available in plain text output,
    so 'GOD' signals the underlying divine name in combination with 'Lord.'
- source_word: וְהַאֲבַדְתִּי
  chosen: I will destroy
  alternatives:
  - I will wipe out
  - I will make perish
  lexicon: HALOT
  rationale: Hiphil of אבד here expresses decisive removal or destruction. 'Destroy'
    is strong, natural English and fits the judgment context.
- source_word: גִלּוּלִים
  chosen: idols
  alternatives:
  - dung-idols
  - fetishes
  lexicon: HALOT
  rationale: Though the Hebrew term is contemptuous and may carry a pejorative nuance,
    'idols' is the clearest standard rendering in English. The stronger derogatory
    force is not easily preserved idiomatically without sounding interpretive.
- source_word: וְהִשְׁבַּתִּי
  chosen: put an end to
  alternatives:
  - cause to cease
  - stop
  lexicon: HALOT
  rationale: Hiphil of שׁבת means to cause to cease. 'Put an end to' is idiomatic
    and preserves the causative force better than the flatter 'stop.'
- source_word: אֱלִילִים
  chosen: images
  alternatives:
  - worthless idols
  - false gods
  - idols
  lexicon: HALOT
  rationale: Since גִלּוּלִים already appears in the same clause and is rendered 'idols,'
    rendering אֱלִילִים as 'images' preserves the distinction between the two near-synonyms
    without overtranslating. The term can denote idols as empty or worthless objects,
    but 'images' works well in context.
- source_word: מִנֹּף
  chosen: from Noph
  alternatives:
  - from Memphis
  lexicon: HALOT
  rationale: Following the translation philosophy to transliterate names rather than
    translate them, the Egyptian city name is rendered 'Noph' rather than the more
    familiar Greek-derived 'Memphis.'
- source_word: וְנָשִׂיא מֵאֶרֶץ מִצְרַיִם לֹא יִהְיֶה עוֹד
  chosen: there will no longer be a prince from the land of Egypt
  alternatives:
  - and a prince from the land of Egypt will no longer exist
  - and there will no longer be a ruler from the land of Egypt
  lexicon: HALOT
  rationale: נָשִׂיא commonly means 'prince,' 'leader,' or 'ruler.' 'Prince' is retained
    as a fairly formal but standard rendering, and the clause order is adjusted slightly
    for natural English while preserving the sense that native Egyptian princely rule
    will cease.
- source_word: וְנָתַתִּי יִרְאָה
  chosen: I will put fear
  alternatives:
  - I will bring fear
  - I will set terror
  lexicon: HALOT
  rationale: The idiom literally means 'I will give/put fear.' 'Put fear' is a close
    and readable rendering. 'Terror' would intensify beyond what the noun itself requires.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - throughout the land of Egypt
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase; 'in the land
    of Egypt' preserves the Hebrew wording without adding distributive nuance.
