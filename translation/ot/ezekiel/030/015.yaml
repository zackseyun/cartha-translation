id: EZK.30.15
reference: Ezekiel 30:15
source:
  edition: WLC
  text: וְ/שָׁפַכְתִּ֣י חֲמָתִ֔/י עַל סִ֖ין מָע֣וֹז מִצְרָ֑יִם וְ/הִכְרַתִּ֖י אֶת
    הֲמ֥וֹן נֹֽא־־׃
translation:
  text: And I will pour out my wrath on Sin, the stronghold of Egypt, and I will cut
    off the multitude of No.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sin is commonly identified with Pelusium, a fortified city on Egypt’s northeastern
      frontier.
    reason: cross_reference
  - marker: b
    text: No is commonly identified with Thebes.
    reason: cross_reference
lexical_decisions:
- source_word: וְשָׁפַכְתִּי
  chosen: And I will pour out
  alternatives:
  - And I will pour forth
  - And I will pour
  lexicon: HALOT
  rationale: The verb שׁפך in this context of divine judgment is naturally rendered
    'pour out,' an established but still transparent English idiom for the outflow
    of wrath. The prefixed conjunction is carried forward as 'And.'
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning anger or wrath. 'Wrath' best preserves
    the gravity and judicial force of divine anger in prophetic judgment language
    without sounding overly emotive.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: The preposition literally means 'on/upon.' In English, 'on' is concise
    and natural here; 'against' is interpretive and less literal.
- source_word: סִין
  chosen: Sin
  alternatives:
  - Pelusium
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated.
    'Sin' is the Hebrew place name; the historical identification with Pelusium is
    better left to a footnote.
- source_word: מָעוֹז מִצְרָיִם
  chosen: the stronghold of Egypt
  alternatives:
  - Egypt's stronghold
  - the fortress of Egypt
  lexicon: HALOT
  rationale: מָעוֹז denotes a place of strength or fortification. 'The stronghold
    of Egypt' preserves the appositional force describing Sin and reads naturally
    in English.
- source_word: וְהִכְרַתִּי
  chosen: and I will cut off
  alternatives:
  - and I will destroy
  - and I will wipe out
  lexicon: HALOT
  rationale: כרת in the Hiphil often means 'cut off' in judgment contexts. This preserves
    the Hebrew metaphor and avoids over-paraphrasing, while still communicating decisive
    removal.
- source_word: אֶת הֲמוֹן
  chosen: the multitude
  alternatives:
  - the crowd
  - the wealth
  - the hordes
  lexicon: HALOT
  rationale: הָמוֹן can denote a multitude, abundance, or tumult. Here 'the multitude'
    best fits the likely sense of populous inhabitants or mass of people associated
    with No, while remaining broad enough not to over-specify.
- source_word: נֹא
  chosen: 'No'
  alternatives:
  - Thebes
  lexicon: HALOT
  rationale: The Hebrew preserves the place name No; by project policy, names are
    transliterated in the main text. The common historical identification with Thebes
    is worth preserving in a footnote.
