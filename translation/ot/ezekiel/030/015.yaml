theological_decisions:
- issue: Rendering divine judgment language without softening or over-interpreting
  chosen_reading: Retain 'my wrath' and 'cut off' as direct divine actions of judgment
  alternative_readings:
  - Use softer idioms such as 'anger' or 'destroy'
  rationale: The Hebrew presents YHWH's judgment in stark, active terms. Optimal equivalence
    here favors preserving that force rather than muting it for readability.
  doctrine_reference: Translation philosophy §§1, 3, 6
