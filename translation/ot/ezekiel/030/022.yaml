id: EZK.30.22
reference: Ezekiel 30:22
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה הִנְ/נִי֙ אֶל פַּרְעֹ֣ה מֶֽלֶךְ מִצְרַ֔יִם
    וְ/שָֽׁבַרְתִּי֙ אֶת זְרֹ֣עֹתָ֔י/ו אֶת הַ/חֲזָקָ֖ה וְ/אֶת הַ/נִּשְׁבָּ֑רֶת וְ/הִפַּלְתִּ֥י
    אֶת הַ/חֶ֖רֶב מִ/יָּדֽ/וֹ־׀־־־־־־׃
translation:
  text: 'Therefore thus says the Lord GOD: Behold, I am against Pharaoh king of Egypt,
    and I will break his arms, both the strong one and the broken one, and I will
    make the sword fall from his hand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the strong arm and the broken arm.' The Hebrew adjectives are feminine
      singular, referring back to 'arm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding judgment context;
    'Therefore' preserves the prophetic logic clearly in English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' is natural, recognizable,
    and sufficiently formal without being archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD' by default; in the
    compound title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by rendering
    'Lord GOD,' which preserves the distinction and reflects established source-sensitive
    practice.
- source_word: הִנְנִי אֶל
  chosen: Behold, I am against
  alternatives:
  - Look, I am against
  - See, I am against
  lexicon: HALOT
  rationale: הִנְנִי introduces emphatic divine self-involvement; 'Behold' preserves
    the solemn prophetic force. אֶל in this hostile context is best rendered 'against.'
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: Keeps the appositional royal title compact and close to the Hebrew word
    order.
- source_word: וְשָׁבַרְתִּי
  chosen: and I will break
  alternatives:
  - and I will shatter
  lexicon: HALOT
  rationale: The verb שׁבר commonly means 'break'; this keeps continuity with the
    arm imagery in the immediate context.
- source_word: זְרֹעֹתָיו
  chosen: his arms
  alternatives:
  - his forearms
  - his strength
  lexicon: HALOT
  rationale: Literal 'arms' is preferable because the verse develops a concrete metaphor
    of military power and weapon loss; the figurative sense of strength is carried
    by the image itself.
- source_word: אֶת הַחֲזָקָה וְאֶת הַנִּשְׁבָּרֶת
  chosen: both the strong one and the broken one
  alternatives:
  - the strong one and the one already broken
  - the strong arm and the broken arm
  lexicon: HALOT
  rationale: The feminine singular adjective/participle refer back to 'arm' understood
    from the prior noun. 'Both ... and ...' makes explicit that two arms are in view.
    'Broken one' preserves the participial force without over-interpreting temporality,
    though the context implies one arm was already broken.
- source_word: וְהִפַּלְתִּי
  chosen: and I will make ... fall
  alternatives:
  - and I will cause ... to fall
  - and I will drop
  lexicon: HALOT
  rationale: Hiphil of נפל is causative; 'make ... fall' is idiomatic and preserves
    divine agency.
- source_word: הַחֶרֶב מִיָּדוֹ
  chosen: the sword fall from his hand
  alternatives:
  - the sword from his hand
  - his sword from his hand
  lexicon: HALOT
  rationale: The definite noun with prepositional phrase is naturally rendered as
    the weapon dropping from Pharaoh's hand, a vivid sign of lost power. Adding 'his'
    to 'hand' is required by the suffix; leaving 'sword' as 'the sword' follows the
    Hebrew.
