theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt sets the default for יְהוָה as 'the LORD.' In the
    fixed Hebrew title אֲדֹנָי יְהוִה, however, rendering both elements mechanically
    as 'Lord LORD' is poor English and obscures the title. 'the Lord GOD' is the standard
    way to preserve both elements while honoring the stated policy regarding the divine
    name.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)'
