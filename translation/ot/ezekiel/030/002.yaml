id: EZK.30.2
reference: Ezekiel 30:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הִנָּבֵא֙ וְ/אָ֣מַרְתָּ֔ כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה הֵילִ֖ילוּ
    הָ֥הּ לַ/יּֽוֹם־׃
translation:
  text: 'Son of man, prophesy and say, ‘Thus says the Lord GOD: Wail, “Alas for the
    day!”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Howl'' is another possible rendering of the imperative; ''wail''
      was chosen for natural modern English while preserving the force of lament.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Ah for the day!' The Hebrew interjection expresses grief or dread at
      the coming day of judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Son of Adam
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering
    preserves the idiom and its repeated usage in the book better than a dynamic alternative
    like 'mortal.' 'אָדָם' here refers to man/humanity in a representative singular
    sense, and the established English idiom 'son of man' best matches the source
    form.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - phesy forth
  - speak prophetically
  lexicon: HALOT
  rationale: Imperative of נבא, directing Ezekiel to deliver prophetic speech. 'Prophesy'
    is the natural modern English equivalent and preserves the formal prophetic register.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  - saying
  lexicon: HALOT
  rationale: Sequential command following 'prophesy.' 'And say' is concise and idiomatic
    while preserving the twofold command structure in Hebrew.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the recognizable
    formula and solemnity.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD' by default; in the
    compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD'
    and renders 'Lord GOD.' This preserves both the title and the divine name reverentially
    represented.
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative plural from ילל, a cry of lament/distress. 'Wail' is vivid,
    natural English and fits prophetic judgment language. 'Howl' is possible, but
    can sound more animalistic in modern English; 'lament' is somewhat too restrained
    for the force of the verb.
- source_word: הָהּ
  chosen: Alas
  alternatives:
  - Ah
  - Aha
  - Woe
  lexicon: HALOT
  rationale: Interjection of grief or dread. 'Alas' best conveys mournful exclamation
    in contemporary readable English. 'Woe' would over-interpret toward a formal doom
    formula rather than an exclamatory cry.
- source_word: לַיּוֹם
  chosen: for the day
  alternatives:
  - for that day
  - because of the day
  - for the day to come
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as exclamatory/objective with the
    lament cry: ''Alas for the day!'' This preserves the terseness and ominous focus
    on the coming day of judgment without adding words not present in the Hebrew.'
