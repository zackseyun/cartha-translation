theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies יְהוָה should normally be rendered 'the
    LORD.' In the fixed Hebrew combination אֲדֹנָי יְהוִה, English convention 'the
    Lord GOD' avoids the awkward 'Lord LORD' while still signaling the compound divine
    title. This is a translation convention, not a doctrinally loaded choice.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
