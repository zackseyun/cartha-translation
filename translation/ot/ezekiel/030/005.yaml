id: EZK.30.5
reference: Ezekiel 30:5
source:
  edition: WLC
  text: כּ֣וּשׁ וּ/פ֤וּט וְ/לוּד֙ וְ/כָל הָ/עֶ֣רֶב וְ/כ֔וּב וּ/בְנֵ֖י אֶ֣רֶץ הַ/בְּרִ֑ית
    אִתָּ֖/ם בַּ/חֶ֥רֶב יִפֹּֽלוּ־׃פ
translation:
  text: Cush and Put and Lud and all the mixed people and Cub and the sons of the
    land of the covenant—with them they will fall by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all Arabia,' 'all the mercenaries,' or 'all the mixed multitude' for
      'all the mixed people' (Hebrew עֶרֶב).
    reason: lexical_alternative
  - marker: b
    text: '''Cub'' is a rare place-name; the identification is uncertain. It may also
      be rendered ''Kub.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'the people of the land of the covenant.' The phrase may refer to people
      allied by treaty, and some understand it as referring to Judeans living in Egypt.
    reason: alternative_reading
lexical_decisions:
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Proper place-name/people-name; transliteration is preferred for names.
    'Ethiopia' is a traditional interpretive equivalent but less precise to the Hebrew
    ethnogeographic term.
- source_word: פּוּט
  chosen: Put
  alternatives:
  - Phut
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. 'Phut' reflects
    older spelling tradition.
- source_word: לוּד
  chosen: Lud
  alternatives:
  - Lydia
  - Lydians
  lexicon: HALOT
  rationale: Transliteration preserves the Hebrew form rather than importing a later
    Greek geographical identification.
- source_word: כָל הָעֶרֶב
  chosen: all the mixed people
  alternatives:
  - all Arabia
  - all the mercenaries
  - all the mixed multitude
  lexicon: HALOT
  rationale: עֶרֶב here most naturally denotes a mixed population or mixed company
    rather than a specific ethnic name. 'Mixed people' is readable modern English
    and fits the military/oracular context. Because the term is debated, alternatives
    are preserved in a footnote.
- source_word: כּוּב
  chosen: Cub
  alternatives:
  - Kub
  lexicon: HALOT
  rationale: Rare proper name; transliteration is safest. English 'Cub' follows common
    convention, while 'Kub' more closely reflects the consonants; uncertainty is noted
    in a footnote.
- source_word: בְנֵי אֶרֶץ הַבְּרִית
  chosen: the sons of the land of the covenant
  alternatives:
  - the people of the land of the covenant
  - the children of the covenant land
  lexicon: HALOT
  rationale: A formally close rendering best preserves the Hebrew phrase's ambiguity.
    'Sons of' reflects בְנֵי and follows the project's gender-accurate principle.
    The referent of 'the land of the covenant' is uncertain, so a less interpretive
    rendering is preferred in the main text, with explanatory alternatives footnoted.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - among them
  lexicon: HALOT
  rationale: The preposition indicates association with the previously listed peoples.
    'With them' is the most direct rendering.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - by warfare
  - by violence
  lexicon: HALOT
  rationale: Standard idiom for death in battle/judgment; 'by the sword' preserves
    the Hebrew image and prophetic register.
- source_word: יִפֹּלוּ
  chosen: they will fall
  alternatives:
  - they will be slain
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall'; in this context it implies death
    in battle, but the literal rendering preserves the idiom while allowing the context
    to convey the result.
