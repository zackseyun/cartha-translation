id: EZK.30.4
reference: Ezekiel 30:4
source:
  edition: WLC
  text: וּ/בָאָ֥ה חֶ֨רֶב֙ בְּ/מִצְרַ֔יִם וְ/הָיְתָ֤ה חַלְחָלָה֙ בְּ/כ֔וּשׁ בִּ/נְפֹ֥ל
    חָלָ֖ל בְּ/מִצְרָ֑יִם וְ/לָקְח֣וּ הֲמוֹנָ֔/הּ וְ/נֶהֶרְס֖וּ יְסוֹדֹתֶֽי/הָ׃
translation:
  text: And a sword will come against Egypt, and there will be anguish in Cush, when
    the slain fall in Egypt, and they take away her wealth, and her foundations are
    torn down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cush is the region south of Egypt, often corresponding broadly to ancient
      Nubia rather than the modern nation-state of Ethiopia.
    reason: cultural_note
  - marker: b
    text: Or 'there will be trembling in Cush.' The Hebrew term can denote shaking,
      writhing, or anguish in response to disaster.
    reason: lexical_alternative
  - marker: c
    text: Or 'they take away her multitude/abundance.' The Hebrew word can refer to
      a population, abundance, or wealth; here it is rendered in the sense of plundered
      riches.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאָה
  chosen: will come
  alternatives:
  - comes
  - shall come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futuristically; English future best conveys the announced judgment.
- source_word: חֶרֶב
  chosen: a sword
  alternatives:
  - the sword
  - war
  - violence
  lexicon: HALOT
  rationale: Literal 'sword' is retained as the standard metonym for warfare/invasion;
    the indefinite article fits English idiom without over-specifying.
- source_word: בְּמִצְרַיִם
  chosen: against Egypt
  alternatives:
  - in Egypt
  - into Egypt
  lexicon: HALOT
  rationale: The preposition is literally 'in/into,' but with 'come' and 'sword' in
    a judgment context it idiomatically indicates hostile incursion; 'against Egypt'
    makes the force clear in natural English.
- source_word: וְהָיְתָה חַלְחָלָה
  chosen: there will be anguish
  alternatives:
  - there will be trembling
  - there will be writhing
  - there will be terror
  lexicon: HALOT
  rationale: חַלְחָלָה denotes trembling, writhing, or anguish in the face of calamity.
    'Anguish' captures the emotional and bodily distress without sounding overly technical.
- source_word: בְּכוּשׁ
  chosen: in Cush
  alternatives:
  - in Ethiopia
  lexicon: HALOT
  rationale: The proper name is transliterated per project policy rather than replaced
    with the historically broader but potentially misleading modern geographic label
    'Ethiopia.'
- source_word: בִּנְפֹל חָלָל
  chosen: when the slain fall
  alternatives:
  - when the wounded fall
  - when the pierced fall
  - at the falling of the slain
  lexicon: HALOT
  rationale: The infinitive construct plus noun gives a temporal clause. חָלָל in
    military contexts commonly means one slain. 'The slain fall' preserves the stark
    imagery.
- source_word: וְלָקְחוּ הֲמוֹנָהּ
  chosen: they take away her wealth
  alternatives:
  - they take away her multitude
  - they seize her abundance
  - they carry off her hordes
  lexicon: HALOT
  rationale: הָמוֹן can mean multitude, abundance, or wealth. In a conquest context
    with subsequent destruction language, 'wealth' best fits the plundering sense,
    while the unspecified subject reflects invading forces.
- source_word: וְנֶהֶרְסוּ יְסוֹדֹתֶיהָ
  chosen: her foundations are torn down
  alternatives:
  - her foundations are destroyed
  - her bases are demolished
  lexicon: HALOT
  rationale: The Niphal conveys being pulled down/demolished. 'Foundations' may be
    literal or figurative for the structures/supports of Egypt; retaining the image
    preserves the breadth of the Hebrew.
