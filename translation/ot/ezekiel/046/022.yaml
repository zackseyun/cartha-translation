id: EZK.46.22
reference: Ezekiel 46:22
source:
  edition: WLC
  text: בְּ/אַרְבַּ֜עַת מִקְצֹע֤וֹת הֶֽ/חָצֵר֙ חֲצֵר֣וֹת קְטֻר֔וֹת אַרְבָּעִ֣ים אֹ֔רֶךְ
    וּ/שְׁלֹשִׁ֖ים רֹ֑חַב מִדָּ֣ה אַחַ֔ת לְ/אַרְבַּעְתָּ֖/ם מְׄהֻׄקְׄצָׄעֽׄוֹׄתׄ׃
translation:
  text: In the four corners of the court there were enclosed courts, forty long and
    thirty wide; the four of them had the same measurement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'walled courts' or 'closed-off courts.' The Hebrew adjective likely
      describes the courts as enclosed spaces.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew does not explicitly repeat the unit 'cubits' here, though it
      is implied by the surrounding temple measurements.
    reason: cultural_note
  - marker: c
    text: The final Hebrew term is rare and difficult. It may also be understood to
      emphasize that these were the four corner courts.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְצֹעוֹת
  chosen: corners
  alternatives:
  - angles
  - corner-areas
  lexicon: HALOT
  rationale: In architectural context the noun refers to the corners or corner sections
    of the court. 'Corners' is the most natural English rendering here.
- source_word: חֲצֵרוֹת
  chosen: courts
  alternatives:
  - courtyards
  - enclosures
  lexicon: HALOT
  rationale: The plural denotes smaller court areas within the larger court complex.
    'Courts' is concise and fits temple architecture; 'courtyards' is possible but
    slightly heavier in English.
- source_word: קְטֻרוֹת
  chosen: enclosed
  alternatives:
  - walled
  - closed off
  lexicon: HALOT
  rationale: The adjective describes these courts as shut in or enclosed. 'Enclosed'
    preserves the architectural sense without over-specifying the construction material.
- source_word: אַרְבָּעִים אֹרֶךְ וּשְׁלֹשִׁים רֹחַב
  chosen: forty long and thirty wide
  alternatives:
  - forty cubits long and thirty cubits wide
  - a length of forty and a width of thirty
  lexicon: HALOT
  rationale: The Hebrew gives dimensions elliptically. English idiom naturally supplies
    'long' and 'wide.' 'Cubits' is not explicit in this verse, though implied by the
    surrounding measuring context, so it is not inserted into the main text.
- source_word: מִדָּה אַחַת
  chosen: the same measurement
  alternatives:
  - one measure
  - a single size
  lexicon: HALOT
  rationale: The phrase indicates uniformity among the four courts. 'The same measurement'
    communicates that all four shared identical dimensions.
- source_word: לְאַרְבַּעְתָּם
  chosen: the four of them
  alternatives:
  - all four
  - for the four of them
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the four corner courts. English
    smooths the dative-like construction as a resumptive phrase.
- source_word: מְהֻקְצָעוֹת
  chosen: had
  alternatives:
  - were cornered
  - were set in the corners
  - were alike in the corners
  lexicon: HALOT
  rationale: This rare/passive form is difficult, but in context it most plausibly
    reinforces the description of the four corner courts as corresponding units. Rendering
    the clause as 'the four of them had the same measurement' captures the sense of
    equivalence without forcing an opaque literalism.
