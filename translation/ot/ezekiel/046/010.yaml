theological_decisions:
- issue: Role and status of the prince in Ezekiel's temple vision
  chosen_reading: Render נָשִׂיא as 'prince' without importing messianic or royal-theological
    claims.
  alternative_readings:
  - leader
  - ruler
  rationale: The verse presents a procedural instruction about the prince's movement
    with the worshipers. The translation should preserve the title used in Ezekiel's
    vision while not overstating the figure's identity beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
