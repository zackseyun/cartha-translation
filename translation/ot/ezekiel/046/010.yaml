id: EZK.46.10
reference: Ezekiel 46:10
source:
  edition: WLC
  text: וְֽ/הַ/נָּשִׂ֑יא בְּ/תוֹכָ֤/ם בְּ/בוֹאָ/ם֙ יָב֔וֹא וּ/בְ/צֵאתָ֖/ם יֵצֵֽאוּ׃
translation:
  text: And the prince shall be among them; when they enter, he shall enter, and when
    they go out, they shall go out together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their midst.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'they shall go out'; the sense is that the prince departs with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a lifted-up one, i.e., a prince, leader, or
    chief. In Ezekiel 40–48 it is a technical title for the civic ruler associated
    with temple worship, so 'the prince' preserves the established contextual sense
    better than the broader 'leader' or 'ruler'.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: The phrase literally means 'in their midst.' 'Among them' is a natural
    modern-English rendering that preserves the sense that the prince is not isolated
    from the people but positioned with them.
- source_word: בְּבוֹאָם
  chosen: when they enter
  alternatives:
  - in their entering
  - as they come in
  lexicon: HALOT
  rationale: 'The preposition plus infinitive construct with 3mp suffix expresses
    temporal circumstance: ''when they enter.'' This is smoother in English than the
    more wooden ''in their entering'' while remaining close to the Hebrew.'
- source_word: יָבֹוא
  chosen: he shall enter
  alternatives:
  - he enters
  - he is to enter
  lexicon: HALOT
  rationale: The imperfect here fits the procedural/instructional context of Ezekiel's
    temple regulations. 'He shall enter' conveys the directive or expected action
    in idiomatic English.
- source_word: וּבְצֵאתָם
  chosen: and when they go out
  alternatives:
  - and in their going out
  - and when they leave
  lexicon: HALOT
  rationale: As with בְּבוֹאָם, the construction is temporal. 'Go out' matches the
    Hebrew verb יצא and keeps verbal consistency with the following finite verb.
- source_word: יֵצֵאוּ
  chosen: they shall go out together
  alternatives:
  - they shall go out
  - he shall go out
  lexicon: HALOT
  rationale: The consonantal and vocalized text is 3mp, 'they shall go out.' Since
    the subject could sound ambiguous in English after 'he shall enter,' 'together'
    is supplied to make explicit the implied sense that the prince departs with the
    people. This is an interpretive but contextually warranted clarification based
    on the plural verb and the preceding 'among them.'
