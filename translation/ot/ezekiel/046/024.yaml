id: EZK.46.24
reference: Ezekiel 46:24
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑/י אֵ֚לֶּה בֵּ֣ית הַֽ/מְבַשְּׁלִ֔ים אֲשֶׁ֧ר יְבַשְּׁלוּ שָׁ֛ם
    מְשָׁרְתֵ֥י הַ/בַּ֖יִת אֶת זֶ֥בַח הָ/עָֽם־־׃
translation:
  text: Then he said to me, “These are the kitchens where the ministers of the temple
    shall boil the people's sacrifice.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the cooking rooms” or more literally “the house of those who boil/cook.”
    reason: lexical_alternative
  - marker: b
    text: Or “the servants/attendants of the temple.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית הַמְבַשְּׁלִים
  chosen: the kitchens
  alternatives:
  - the cooking rooms
  - the house of those who boil/cook
  lexicon: HALOT
  rationale: Literally 'house of the cooks/those who boil.' In this architectural
    temple context, the plural sense is natural in English, referring to designated
    kitchen areas rather than a single 'house.' 'Kitchens' is clear modern English
    and fits the function of the space.
- source_word: מְבַשְּׁלִים / יְבַשְּׁלוּ
  chosen: shall boil
  alternatives:
  - shall cook
  - boil
  lexicon: HALOT
  rationale: The verb בשׁל commonly refers to boiling/cooking. Because the same root
    appears in both the participial phrase and the finite verb, rendering the action
    as 'boil' preserves lexical consistency and reflects sacrificial preparation language.
- source_word: מְשָׁרְתֵי הַבַּיִת
  chosen: the ministers of the temple
  alternatives:
  - the servants of the temple
  - the temple attendants
  - the ministers of the house
  lexicon: HALOT
  rationale: מְשָׁרְתִים denotes those who minister/serve in an official cultic capacity.
    הַבַּיִת in Ezekiel's temple vision refers to the temple complex, not an ordinary
    house. 'Ministers of the temple' communicates formal service without flattening
    the cultic setting.
- source_word: זֶבַח הָעָם
  chosen: the people's sacrifice
  alternatives:
  - the sacrifice of the people
  - the people's offering
  lexicon: HALOT
  rationale: זֶבַח is specifically a sacrifice, often a slaughtered sacrificial offering,
    not a generic gift. The construct with הָעָם indicates that it belongs to or is
    brought by the people. 'The people's sacrifice' is natural English and preserves
    the sacrificial sense.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives smooth English
    narrative flow while preserving sequence.
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: English idiom requires a copula here to make the identification explicit.
- source_word: שָׁם
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: 'Although literally ''there,'' English relative style prefers ''where''
    after identifying a place: ''the kitchens where...'' This is a natural optimal-equivalence
    rendering of the locative adverb in context.'
