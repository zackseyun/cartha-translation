id: EZK.46.3
reference: Ezekiel 46:3
source:
  edition: WLC
  text: וְ/הִשְׁתַּחֲו֣וּ עַם הָ/אָ֗רֶץ פֶּ֚תַח הַ/שַּׁ֣עַר הַ/ה֔וּא בַּ/שַּׁבָּת֖וֹת
    וּ/בֶ/חֳדָשִׁ֑ים לִ/פְנֵ֖י יְהוָֽה־׃
translation:
  text: And the people of the land shall bow down at the entrance of that gate, before
    the LORD, on the Sabbaths and on the new moons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before Yahweh.' The Hebrew has the divine name יְהוָה.
    reason: alternative_reading
  - marker: b
    text: '''The people of the land'' likely refers to the lay population, in contrast
      to the prince and priests in the surrounding context.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִשְׁתַּחֲווּ
  chosen: shall bow down
  alternatives:
  - shall worship
  - shall prostrate themselves
  lexicon: HALOT
  rationale: The verb שׁחה in the Hishtaphel/Hithpael commonly denotes the physical
    act of bowing down in reverence. 'Bow down' preserves the embodied action while
    allowing its worshipful force in context. 'Worship' is possible but less concrete;
    'prostrate themselves' is more explicit but overly specific for smooth English
    here.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the הארץ
  lexicon: HALOT
  rationale: Literally 'people of the land.' In Ezekiel's temple vision this denotes
    the lay population in contrast to the prince and priests. The literal rendering
    preserves the social distinction without importing the interpretive gloss 'common
    people' into the main text.
- source_word: פֶּתַח
  chosen: at the entrance of
  alternatives:
  - at the doorway of
  - at the opening of
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening or entrance. 'At the entrance of' is idiomatic
    in English and fits the spatial sense with the following 'gate.'
- source_word: הַשַּׁעַר הַהוּא
  chosen: that gate
  alternatives:
  - the gate
  - that gateway
  lexicon: HALOT
  rationale: The demonstrative הַהוּא is significant and points back to the specific
    gate under discussion in the context. 'That gate' preserves the deictic force
    better than simply 'the gate.'
- source_word: בַּשַּׁבָּתוֹת
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath days
  - on Sabbaths
  lexicon: HALOT
  rationale: The plural form is retained. 'On the Sabbaths' is a natural English rendering
    that preserves the recurring sacred times in view.
- source_word: וּבֶחֳדָשִׁים
  chosen: and on the new moons
  alternatives:
  - and at the new moons
  - and on the monthly festivals
  lexicon: HALOT
  rationale: חֹדֶשׁ here refers to the new-moon observances rather than merely months.
    'New moons' is the standard concise rendering and best matches the cultic calendar
    context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי expresses presence before God in worship. 'Before the LORD' is
    both natural and faithful. Per doctrine, יְהוָה is rendered 'the LORD,' while
    'Yahweh' is preserved as an alternative rather than used in the main text.
