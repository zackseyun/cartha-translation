id: EZK.46.7
reference: Ezekiel 46:7
source:
  edition: WLC
  text: וְ/אֵיפָ֨ה לַ/פָּ֜ר וְ/אֵיפָ֤ה לָ/אַ֨יִל֙ יַעֲשֶׂ֣ה מִנְחָ֔ה וְ/לַ֨/כְּבָשִׂ֔ים
    כַּ/אֲשֶׁ֥ר תַּשִּׂ֖יג יָד֑/וֹ וְ/שֶׁ֖מֶן הִ֥ין לָ/אֵיפָֽה׃
translation:
  text: And he shall provide as a grain offering an ephah for the bull and an ephah
    for the ram, and for the lambs whatever his hand can afford, and a hin of oil
    to each ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as much as his means permit.' The Hebrew idiom literally refers to what
      his hand reaches or is able to provide.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיפָה
  chosen: an ephah
  alternatives:
  - a bushel measure
  lexicon: HALOT
  rationale: Kept the Hebrew dry-measure term as 'ephah' rather than converting to
    an approximate modern unit, since this is a cultic regulation and the specific
    ancient measure is textually important.
- source_word: פַּר
  chosen: the bull
  alternatives:
  - a bull
  lexicon: HALOT
  rationale: Rendered with the definite sense signaled by the prefixed article in
    לַפָּר, referring to the sacrificial bull in this ordinance.
- source_word: אַיִל
  chosen: the ram
  alternatives:
  - a ram
  lexicon: HALOT
  rationale: Rendered with the definite sense signaled by the prefixed article in
    לָאַיִל, matching the sacrificial ram specified in the regulation.
- source_word: יַעֲשֶׂה מִנְחָה
  chosen: he shall provide as a grain offering
  alternatives:
  - he shall make a grain offering
  - he shall prepare a grain offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial context is best rendered 'grain offering.' יַעֲשֶׂה
    literally 'he shall make/do' is idiomatically expressed as 'provide' in English
    for offering quantities, while preserving the sense of presenting the required
    offering.
- source_word: כְּבָשִׂים
  chosen: the lambs
  alternatives:
  - the male lambs
  lexicon: HALOT
  rationale: Standard rendering is 'lambs.' The broader sacrificial context already
    identifies the animals; adding 'male' here would over-specify beyond normal English
    unless context demanded it.
- source_word: כַּאֲשֶׁר תַּשִּׂיג יָדוֹ
  chosen: whatever his hand can afford
  alternatives:
  - as much as his means permit
  - according to what he can obtain
  lexicon: HALOT
  rationale: This Hebrew idiom refers to what one's resources are sufficient to provide.
    'Whatever his hand can afford' preserves the concrete imagery of 'hand' while
    remaining natural English.
- source_word: שֶׁמֶן הִין לָאֵיפָה
  chosen: a hin of oil to each ephah
  alternatives:
  - a hin of oil per ephah
  lexicon: HALOT
  rationale: The phrase specifies the oil ratio accompanying the grain offering. 'To
    each ephah' makes the distributive sense explicit and readable in English.
