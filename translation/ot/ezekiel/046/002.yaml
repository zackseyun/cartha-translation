theological_decisions:
- issue: Identity and status of the prince in Ezekiel's temple vision
  chosen_reading: Render נָשִׂיא as 'prince' without importing a messianic or fully
    royal interpretation.
  alternative_readings:
  - leader
  - ruler
  - messianic prince
  rationale: The verse itself identifies a specific temple participant with privileges
    and limits, but does not explicitly define him as the Messiah or as a reigning
    king. The translation should preserve the title without resolving broader interpretive
    debates.
  doctrine_reference: Preserve theological tension rather than resolve it.
