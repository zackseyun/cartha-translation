id: EZK.46.2
reference: Ezekiel 46:2
source:
  edition: WLC
  text: וּ/בָ֣א הַ/נָּשִׂ֡יא דֶּרֶךְ֩ אוּלָ֨ם הַ/שַּׁ֜עַר מִ/ח֗וּץ וְ/עָמַד֙ עַל מְזוּזַ֣ת
    הַ/שַּׁ֔עַר וְ/עָשׂ֣וּ הַ/כֹּהֲנִ֗ים אֶת עֽוֹלָת/וֹ֙ וְ/אֶת שְׁלָמָ֔י/ו וְ/הִֽשְׁתַּחֲוָ֛ה
    עַל מִפְתַּ֥ן הַ/שַּׁ֖עַר וְ/יָצָ֑א וְ/הַ/שַּׁ֥עַר לֹֽא יִסָּגֵ֖ר עַד הָ/עָֽרֶב־־־־־־׃
translation:
  text: And the prince shall enter by way of the porch of the gate from outside, and
    shall stand by the doorpost of the gate. Then the priests shall offer his burnt
    offering and his peace offerings, and he shall bow down in worship at the threshold
    of the gate. Then he shall go out, but the gate shall not be shut until evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel's temple vision refers to a recognized civic/royal
    figure, but not necessarily a king. 'Prince' preserves the established distinction
    and avoids overstating monarchy.
- source_word: דֶּרֶךְ אוּלָם הַשַּׁעַר מִחוּץ
  chosen: by way of the porch of the gate from outside
  alternatives:
  - through the vestibule of the gate from outside
  - by the way of the gate portico from outside
  lexicon: HALOT
  rationale: דֶּרֶךְ marks route or way; אוּלָם is a porch/vestibule. 'By way of the
    porch of the gate from outside' keeps the spatial sequence clear and fairly formal.
- source_word: מְזוּזַת הַשַּׁעַר
  chosen: the doorpost of the gate
  alternatives:
  - the jamb of the gate
  - the gatepost
  lexicon: HALOT
  rationale: מְזוּזָה is a doorpost/jamb. 'Doorpost' is natural English and preserves
    the architectural specificity better than the more general 'gatepost'.
- source_word: וְעָשׂוּ הַכֹּהֲנִים אֶת עֹלָתוֹ
  chosen: the priests shall offer his burnt offering
  alternatives:
  - the priests shall prepare his burnt offering
  - the priests shall perform his burnt offering
  lexicon: HALOT
  rationale: עָשָׂה with sacrifices commonly means to perform/offer them. 'Offer'
    is idiomatic in English sacrificial contexts.
- source_word: שְׁלָמָיו
  chosen: his peace offerings
  alternatives:
  - his fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally rendered 'peace offerings.' 'Fellowship offerings'
    is possible, but 'peace offerings' is more direct and preserves the lexical connection
    to wholeness/peace.
- source_word: וְהִשְׁתַּחֲוָה
  chosen: he shall bow down in worship
  alternatives:
  - he shall worship
  - he shall prostrate himself
  lexicon: HALOT
  rationale: The verb denotes bodily prostration or bowing in reverence. 'Bow down
    in worship' preserves both the physical action and devotional sense.
- source_word: מִפְתַּן הַשַּׁעַר
  chosen: the threshold of the gate
  alternatives:
  - the entrance threshold of the gate
  lexicon: HALOT
  rationale: מִפְתָּן is threshold/sill. 'Threshold of the gate' is the most straightforward
    architectural rendering.
- source_word: לֹא יִסָּגֵר עַד הָעָרֶב
  chosen: the gate shall not be shut until evening
  alternatives:
  - the gate shall not be closed until evening
  lexicon: HALOT
  rationale: The Niphal of סגר means be shut/closed. 'Shut' fits gate language naturally
    in English.
