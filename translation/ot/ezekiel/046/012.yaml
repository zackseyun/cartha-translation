id: EZK.46.12
reference: Ezekiel 46:12
source:
  edition: WLC
  text: וְ/כִֽי יַעֲשֶׂה֩ הַ/נָּשִׂ֨יא נְדָבָ֜ה עוֹלָ֣ה אֽוֹ שְׁלָמִים֮ נְדָבָ֣ה לַֽ/יהוָה֒ וּ/פָ֣תַֽח ל֗/וֹ אֶת הַ/שַּׁ֨עַר֙ הַ/פֹּנֶ֣ה קָדִ֔ים וְ/עָשָׂ֤ה אֶת עֹֽלָת/וֹ֙ וְ/אֶת שְׁלָמָ֔י/ו כַּ/אֲשֶׁ֥ר יַעֲשֶׂ֖ה בְּ/י֣וֹם הַ/שַּׁבָּ֑ת וְ/יָצָ֛א וְ/סָגַ֥ר אֶת הַ/שַּׁ֖עַר אַחֲרֵ֥י צֵאתֽ/וֹ־־־־־׃
translation:
  text: But when the prince makes a freewill offering to Yahweh, either a burnt offering or peace offerings, the gate that faces east shall be opened for him, and he shall offer his burnt offering and his peace offerings as he does on the Sabbath day. Then he shall go out, and after he goes out the gate shall be shut.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' for 'peace offerings.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew has an unspecified third-person verb (''and he opened'' / ''and he shut''); the English passive preserves the unnamed agent: ''shall be opened'' ... ''shall be shut.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But when
  alternatives:
  - And when
  - Now when
  lexicon: HALOT
  rationale: Introduces a conditional/temporal case within the larger legal instruction. 'But when' captures the shift to a particular circumstance better than a simple additive 'and when' in English discourse.
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel's temple legislation is a recognized office-holder, commonly rendered 'prince.' This preserves the established political-cultic nuance without overstating monarchy.
- source_word: נְדָבָה
  chosen: a freewill offering
  alternatives:
  - a voluntary offering
  lexicon: HALOT
  rationale: The noun denotes an offering given voluntarily rather than by fixed obligation. 'Freewill offering' is the standard and precise cultic English equivalent.
- source_word: עוֹלָה
  chosen: a burnt offering
  lexicon: HALOT
  rationale: Standard sacrificial term for the whole burnt offering; widely understood and formally accurate.
- source_word: שְׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  lexicon: HALOT
  rationale: Traditional rendering preserves the lexical connection to wholeness/well-being and remains recognizable in sacrificial contexts. 'Fellowship offerings' is interpretive and narrower.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition marks dedication/presentation to YHWH; 'to the LORD' is natural and sufficiently precise.
- source_word: וּפָתַח לוֹ
  chosen: the gate that faces east shall be opened for him
  alternatives:
  - they shall open for him the gate that faces east
  lexicon: HALOT
  rationale: Hebrew uses a third masculine singular with no explicit subject. English idiom prefers a passive here, leaving the unnamed agent implicit while preserving the sense that access is granted to him.
- source_word: הַשַּׁעַר הַפֹּנֶה קָדִים
  chosen: the gate that faces east
  alternatives:
  - the east-facing gate
  - the gate facing eastward
  lexicon: HALOT
  rationale: A clear, natural rendering of the participial phrase identifying the specific gate.
- source_word: וְעָשָׂה
  chosen: he shall offer
  alternatives:
  - he shall make
  - he shall perform
  lexicon: HALOT
  rationale: In sacrificial contexts עשה commonly means to perform/offer a sacrifice. 'Offer' is the idiomatic cultic equivalent in English.
- source_word: כַּאֲשֶׁר יַעֲשֶׂה בְּיוֹם הַשַּׁבָּת
  chosen: as he does on the Sabbath day
  alternatives:
  - as he shall do on the Sabbath day
  - just as he does on the Sabbath
  lexicon: HALOT
  rationale: Compares this procedure with the already described Sabbath practice. Present-style English in legal instruction reads naturally while preserving the habitual force.
- source_word: וְיָצָא
  chosen: Then he shall go out
  alternatives:
  - and he shall go out
  lexicon: HALOT
  rationale: Marks the next step in the sequence. 'Then' helps English readers follow the procedural order.
- source_word: וְסָגַר אֶת־הַשַּׁעַר אַחֲרֵי צֵאתוֹ
  chosen: and after he goes out the gate shall be shut
  alternatives:
  - and one shall shut the gate after he goes out
  - and the gate shall be closed after his departure
  lexicon: HALOT
  rationale: As with 'opened for him,' the Hebrew leaves the agent implicit. Passive English best preserves that ambiguity and reads smoothly in procedural legislation.
