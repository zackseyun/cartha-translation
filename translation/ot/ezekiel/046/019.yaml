id: EZK.46.19
reference: Ezekiel 46:19
source:
  edition: WLC
  text: וַ/יְבִיאֵ֣/נִי בַ/מָּבוֹא֮ אֲשֶׁ֣ר עַל כֶּ֣תֶף הַ/שַּׁעַר֒ אֶל הַ/לִּשְׁכ֤וֹת
    הַ/קֹּ֨דֶשׁ֙ אֶל הַ/כֹּ֣הֲנִ֔ים הַ/פֹּנ֖וֹת צָפ֑וֹנָ/ה וְ/הִנֵּה שָׁ֣ם מָק֔וֹם
    ב/ירכת/ם יָֽמָּ/ה־־־־׃ס
translation:
  text: Then he brought me through the entrance that was beside the gate to the holy
    chambers for the priests, which faced north; and behold, there was a place there
    at their far western end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'at their far end, westward.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  chosen: Then he brought me
  alternatives:
  - And he brought me
  lexicon: HALOT
  rationale: Wayyiqtol of בוא with 1cs suffix; rendered as narrative past. 'Then'
    captures sequential movement in English narrative, while 'brought me' preserves
    the causative sense.
- source_word: בַּמָּבוֹא
  chosen: through the entrance
  alternatives:
  - into the entrance
  - by the entrance
  lexicon: HALOT
  rationale: מָבוֹא denotes an entrance/entryway. In context of being led into a temple
    area, 'through the entrance' best conveys movement via the access point.
- source_word: אֲשֶׁר עַל כֶּתֶף הַשַּׁעַר
  chosen: that was beside the gate
  alternatives:
  - that was on the side of the gate
  - that was at the shoulder of the gate
  lexicon: HALOT
  rationale: כֶּתֶף literally 'shoulder/side, flank.' In architectural context, 'beside
    the gate' is natural English while preserving the spatial sense. A more literal
    'shoulder of the gate' would be obscure.
- source_word: אֶל הַלִּשְׁכוֹת הַקֹּדֶשׁ
  chosen: to the holy chambers
  alternatives:
  - to the sacred rooms
  - to the holy cells
  lexicon: HALOT
  rationale: לִשְׁכָּה refers to a chamber/room in temple architecture; plural here.
    הַקֹּדֶשׁ qualifies them as holy/sacred. 'Holy chambers' is both accurate and
    idiomatic in Ezekiel's temple context.
- source_word: אֶל הַכֹּהֲנִים
  chosen: for the priests
  alternatives:
  - belonging to the priests
  - to the priests
  lexicon: HALOT
  rationale: The second אֶל likely indicates relation or destination with the chambers,
    i.e., chambers designated for priestly use. 'For the priests' communicates function
    more clearly than a wooden repetition of 'to the priests.'
- source_word: הַפֹּנוֹת צָפוֹנָה
  chosen: which faced north
  alternatives:
  - that were facing north
  - turned northward
  lexicon: HALOT
  rationale: Participle of פנה with directional accusative/adverbial ending. Since
    the referent is the chambers, the relative clause is rendered in English as 'which
    faced north.'
- source_word: וְהִנֵּה שָׁם מָקוֹם
  chosen: and behold, there was a place there
  alternatives:
  - and look, there was a place there
  - and there, behold, was a place
  lexicon: HALOT
  rationale: הִנֵּה marks visual attention. Retaining 'behold' preserves the deictic
    force and visionary tone of Ezekiel. מָקוֹם is simply 'place' here.
- source_word: בְּיַרְכְתָם
  chosen: at their far end
  alternatives:
  - in their rear part
  - at their back part
  - in the recesses of them
  lexicon: HALOT
  rationale: יַרְכָּה/יַרְכְתַיִם can denote remote parts, recesses, far side. With
    3mp suffix referring to the chambers, 'at their far end' gives the architectural
    sense in clear English.
- source_word: יָמָּה
  chosen: western
  alternatives:
  - westward
  - toward the sea
  lexicon: HALOT
  rationale: Directional term from יָם used idiomatically for west in biblical Hebrew.
    Because it modifies the location of the far end, 'western' is the clearest contextual
    rendering.
