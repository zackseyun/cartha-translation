theological_decisions:
- issue: Gendered distributive expression אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - anyone
  rationale: The Hebrew uses the masculine singular distributively. Following the
    project's gender-accurate policy, the translation preserves the masculine representative
    form rather than neutralizing it in the main text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
