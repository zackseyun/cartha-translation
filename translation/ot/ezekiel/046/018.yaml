id: EZK.46.18
reference: Ezekiel 46:18
source:
  edition: WLC
  text: וְ/לֹא יִקַּ֨ח הַ/נָּשִׂ֜יא מִ/נַּחֲלַ֣ת הָ/עָ֗ם לְ/הֽוֹנֹתָ/ם֙ מֵ/אֲחֻזָּתָ֔/ם
    מֵ/אֲחֻזָּת֖/וֹ יַנְחִ֣ל אֶת בָּנָ֑י/ו לְמַ֨עַן֙ אֲשֶׁ֣ר לֹֽא יָפֻ֣צוּ עַמִּ֔/י
    אִ֖ישׁ מֵ/אֲחֻזָּתֽ/וֹ־־־׃
translation:
  text: The prince shall not take any of the people's inheritance, oppressing them
    out of their property. He shall give his sons an inheritance out of his own property,
    so that my people may not be scattered, each man from his property.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wronging them' or 'defrauding them' for 'oppressing them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man'; the expression is distributive, meaning each individual
      among the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the ruler
  - the leader
  lexicon: HALOT
  rationale: In Ezekiel, נָשִׂיא is a technical term for the civic leader/prince,
    distinct from a king. 'Prince' preserves the established contextual nuance without
    importing monarchy language.
- source_word: יִקַּח מִנַּחֲלַת הָעָם
  chosen: take any of the people's inheritance
  alternatives:
  - take from the inheritance of the people
  - seize any of the people's inheritance
  lexicon: HALOT
  rationale: לָקַח with מִן here denotes taking from what belongs to the people. 'Any
    of the people's inheritance' makes the distributive sense natural in English while
    preserving the legal-property context of נַחֲלָה.
- source_word: לְהוֹנֹתָם
  chosen: oppressing them
  alternatives:
  - wronging them
  - defrauding them
  - mistreating them
  lexicon: HALOT
  rationale: The Hiphil of ינה carries the sense of oppressing or exploiting. In this
    land-tenure context, 'oppressing them' captures coercive dispossession better
    than the narrower 'defrauding.'
- source_word: מֵאֲחֻזָּתָם
  chosen: out of their property
  alternatives:
  - from their possession
  - from their holding
  lexicon: HALOT
  rationale: אֲחֻזָּה refers to landed property/holding. 'Property' is clear modern
    English; 'holding' is possible but less natural. 'Out of' reflects the source
    preposition and the idea of dispossession from what is theirs.
- source_word: מֵאֲחֻזָּתוֹ יַנְחִל אֶת־בָּנָיו
  chosen: He shall give his sons an inheritance out of his own property
  alternatives:
  - From his own property he shall provide an inheritance for his sons
  - He shall cause his sons to inherit from his own possession
  lexicon: HALOT
  rationale: The Hiphil of נחל means to give as an inheritance/cause to inherit. The
    phrase contrasts the prince's own estate with the people's holdings, so 'give
    his sons an inheritance out of his own property' is both clear and faithful.
- source_word: לְמַעַן אֲשֶׁר לֹא יָפֻצוּ
  chosen: so that ... may not be scattered
  alternatives:
  - so that ... may not be dispersed
  - so that ... may not be driven away
  lexicon: HALOT
  rationale: פּוּץ commonly means to scatter/disperse. In context the scattering is
    from ancestral land allotments, likely by forced displacement. 'Scattered' preserves
    the verbal image without over-specifying the mechanism.
- source_word: עַמִּי אִישׁ מֵאֲחֻזָּתוֹ
  chosen: my people may not be scattered, each man from his property
  alternatives:
  - my people, each from his property
  - my people, any man from his possession
  lexicon: HALOT
  rationale: אִישׁ here is distributive ('each man/each one'). Per the gender-accurate
    policy, 'each man' is retained because it matches the Hebrew form and representative
    force. 'Property' again renders אֲחֻזָּה consistently in this verse.
