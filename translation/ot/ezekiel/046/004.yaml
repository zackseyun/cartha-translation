id: EZK.46.4
reference: Ezekiel 46:4
source:
  edition: WLC
  text: וְ/הָ֣/עֹלָ֔ה אֲשֶׁר יַקְרִ֥ב הַ/נָּשִׂ֖יא לַֽ/יהוָ֑ה בְּ/י֣וֹם הַ/שַּׁבָּ֗ת שִׁשָּׁ֧ה כְבָשִׂ֛ים תְּמִימִ֖ם וְ/אַ֥יִל תָּמִֽים־׃
translation:
  text: And the burnt offering that the prince presents to Yahweh on the Sabbath day shall be six unblemished lambs and one unblemished ram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offers'; the Hebrew verb literally means 'brings near' in sacrificial usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעֹלָה
  chosen: And the burnt offering
  alternatives:
  - And the ascending offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering in sacrificial contexts. 'Burnt offering' is the established and contextually precise English equivalent; 'ascending offering' is more etymological but less idiomatic and less clear.
- source_word: אֲשֶׁר יַקְרִב
  chosen: that ... presents
  alternatives:
  - that ... brings near
  - that ... offers
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to bring/present an offering. 'Presents' is natural English and preserves the cultic act without over-paraphrase; 'offers' is possible, but 'presents' keeps closer to the underlying sense of bringing before God.
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel's temple vision refers to the recognized civic ruler/prince, not necessarily a king. 'Prince' is the conventional and contextually fitting rendering.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication of the offering. 'To the LORD' is a natural rendering. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbath
  - on the Sabbath
  lexicon: HALOT
  rationale: This phrase specifies the time of offering. 'On the Sabbath day' is clear, idiomatic, and preserves the definiteness of the Hebrew.
- source_word: שִׁשָּׁה כְבָשִׂים
  chosen: six ... lambs
  alternatives:
  - six sheep
  lexicon: HALOT
  rationale: כְבָשִׂים in sacrificial lists commonly refers to lambs rather than sheep in general. 'Lambs' best matches English sacrificial usage and likely age/category sense.
- source_word: תְּמִימִם
  chosen: unblemished
  alternatives:
  - without defect
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמים denotes freedom from physical defect. 'Unblemished' is concise, idiomatic, and cultically precise.
- source_word: וְאַיִל
  chosen: and one ... ram
  alternatives:
  - and a ram
  lexicon: HALOT
  rationale: 'אַיִל is ''ram.'' English idiom benefits from supplying ''one'' to match the counted list structure: six lambs and one ram.'
- source_word: תָּמִים
  chosen: unblemished
  alternatives:
  - without defect
  - perfect
  lexicon: HALOT
  rationale: Same sacrificial adjective as earlier in singular form, applied to the ram. Rendering consistently as 'unblemished' preserves key-term consistency.
