id: EZK.46.9
reference: Ezekiel 46:9
source:
  edition: WLC
  text: וּ/בְ/ב֨וֹא עַם הָ/אָ֜רֶץ לִ/פְנֵ֣י יְהוָה֮ בַּ/מּֽוֹעֲדִים֒ הַ/בָּ֡א דֶּרֶךְ שַׁ֨עַר צָפ֜וֹן לְ/הִֽשְׁתַּחֲוֺ֗ת יֵצֵא֙ דֶּרֶךְ שַׁ֣עַר נֶ֔גֶב וְ/הַ/בָּא֙ דֶּרֶךְ שַׁ֣עַר נֶ֔גֶב יֵצֵ֖א דֶּרֶךְ שַׁ֣עַר צָפ֑וֹנָ/ה לֹ֣א יָשׁ֗וּב דֶּ֤רֶךְ הַ/שַּׁ֨עַר֙ אֲשֶׁר בָּ֣א ב֔/וֹ כִּ֥י נִכְח֖/וֹ יצאו־־־־־־׃
translation:
  text: And when the people of the land come before Yahweh at the appointed times, whoever enters by way of the north gate to worship shall go out by way of the south gate, and whoever enters by way of the south gate shall go out by way of the north gate. He shall not return by way of the gate through which he entered, but shall go out straight ahead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at the appointed feasts' or 'at the festivals.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to bow down' or 'to prostrate oneself.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'for opposite him/it they shall go out,' that is, they are to continue straight through and exit on the opposite side rather than leave by the gate through which they entered.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the הארץ/land
  lexicon: HALOT
  rationale: A formal rendering fits the temple-context idiom and avoids importing the more interpretive sense 'common people.' In Ezekiel this phrase distinguishes the general populace from the prince and priests.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' preserves the cultic sense of appearing in God's presence.
- source_word: בַּמּוֹעֲדִים
  chosen: at the appointed times
  alternatives:
  - at the appointed feasts
  - at the festivals
  lexicon: HALOT
  rationale: מוֹעֵד can denote appointed times or festal occasions. Here the broader 'appointed times' preserves the lexical range while fitting the temple-regulation context.
- source_word: הַבָּא ... לְהִשְׁתַּחֲוֺת
  chosen: whoever enters ... to worship
  alternatives:
  - the one who comes ... to bow down
  - he who enters ... to prostrate himself
  lexicon: HALOT
  rationale: The participle with infinitive expresses a general rule. 'Whoever enters' is natural English for the generic singular. הִשְׁתַּחֲוָה literally means bow down/prostrate oneself, but 'worship' best captures the cultic act in readable modern English.
- source_word: דֶּרֶךְ שַׁעַר צָפוֹן / דֶּרֶךְ שַׁעַר נֶגֶב
  chosen: by way of the north gate / by way of the south gate
  alternatives:
  - through the north gate / through the south gate
  lexicon: HALOT
  rationale: דֶּרֶךְ with gate language is naturally rendered 'by way of.' This preserves the directional emphasis of the regulation.
- source_word: יֵצֵא
  chosen: shall go out
  alternatives:
  - must go out
  - is to go out
  lexicon: HALOT
  rationale: The imperfect here is prescriptive within legal/ritual instruction. 'Shall go out' conveys the rule without over-paraphrasing.
- source_word: לֹא יָשׁוּב
  chosen: He shall not return
  alternatives:
  - he must not go back
  - he shall not turn back
  lexicon: HALOT
  rationale: '''Return'' is the straightforward sense of שוב and fits the movement regulation.'
- source_word: אֲשֶׁר בָּא בוֹ
  chosen: through which he entered
  alternatives:
  - by which he came in
  lexicon: HALOT
  rationale: This idiomatic English rendering captures the relative clause and the gate as the route of entry.
- source_word: כִּי נִכְחוֹ יֵצֵאוּ
  chosen: but shall go out straight ahead
  alternatives:
  - for they shall go out opposite it
  - but they shall go out in front of him/it
  - but he shall go out directly onward
  lexicon: HALOT
  rationale: נִכְחֹו conveys what is opposite, straight before, or directly ahead. In this gate-crossing rule, the sense is that the worshiper exits on the opposite side rather than retracing his steps. 'Straight ahead' communicates the practical force in clear English. The plural verb likely has an impersonal/generic force after singular participles, so English singular is retained for smoothness and consistency with the preceding clauses.
