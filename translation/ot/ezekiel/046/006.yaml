id: EZK.46.6
reference: Ezekiel 46:6
source:
  edition: WLC
  text: וּ/בְ/י֣וֹם הַ/חֹ֔דֶשׁ פַּ֥ר בֶּן בָּקָ֖ר תְּמִימִ֑ם וְ/שֵׁ֧שֶׁת כְּבָשִׂ֛ם
    וָ/אַ֖יִל תְּמִימִ֥ם יִהְיֽוּ־׃
translation:
  text: And on the day of the new moon, there shall be an unblemished young bull from
    the herd, and six lambs and a ram; they shall be unblemished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on the day of the month'; in this cultic context the phrase
      refers to the new moon observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/י֣וֹם הַ/חֹ֔דֶשׁ
  chosen: And on the day of the new moon
  alternatives:
  - And on the day of the month
  - And on the monthly feast day
  lexicon: HALOT
  rationale: The idiom בְּיוֹם הַחֹדֶשׁ in cultic context refers to the new moon observance,
    not merely any day within a month. 'New moon' best captures the calendrical-sacrificial
    setting in readable English.
- source_word: פַּר בֶּן בָּקָר
  chosen: an unblemished young bull from the herd
  alternatives:
  - a bull, a son of cattle
  - a young bull
  lexicon: HALOT
  rationale: פַּר בֶּן־בָּקָר is a standard sacrificial expression for a young bull/bull
    from the herd. English idiom prefers 'young bull' or 'bull from the herd' rather
    than the literal 'son of cattle.' I combined the sense naturally while preserving
    sacrificial specificity.
- source_word: תְּמִימִם
  chosen: unblemished
  alternatives:
  - without blemish
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמים denotes an animal free from defect. 'Unblemished'
    is clear modern English and preserves the cultic requirement better than the potentially
    misleading 'perfect.'
- source_word: וְ/שֵׁשֶׁת כְּבָשִׂם
  chosen: and six lambs
  alternatives:
  - and six male lambs
  - and six sheep
  lexicon: HALOT
  rationale: כְּבָשִׂים commonly refers to lambs in sacrificial contexts. 'Lambs'
    is the most natural rendering here; the masculine form need not be separately
    marked in English unless context requires it.
- source_word: וָ/אַיִל
  chosen: and a ram
  alternatives:
  - and one ram
  lexicon: HALOT
  rationale: אַיִל is the standard term for a ram in sacrificial lists. The conjunction
    plus singular noun is naturally rendered 'and a ram.'
- source_word: יִהְיֽוּ
  chosen: they shall be unblemished
  alternatives:
  - shall be unblemished
  - must be unblemished
  lexicon: HALOT
  rationale: The plural verb applies to the latter listed animals and, by sense, to
    the whole offering set. Rendering it as 'they shall be unblemished' preserves
    the Hebrew predication and the legal-prescriptive force without over-paraphrasing.
