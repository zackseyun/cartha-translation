id: EZK.46.13
reference: Ezekiel 46:13
source:
  edition: WLC
  text: וְ/כֶ֨בֶשׂ בֶּן שְׁנָת֜/וֹ תָּמִ֗ים תַּעֲשֶׂ֥ה עוֹלָ֛ה לַ/יּ֖וֹם לַֽ/יהֹוָ֑ה
    בַּ/בֹּ֥קֶר בַּ/בֹּ֖קֶר תַּעֲשֶׂ֥ה אֹתֽ/וֹ־׃
translation:
  text: And you shall offer a year-old male lamb without blemish as a burnt offering
    to the LORD daily; morning by morning you shall offer it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''morning by morning,'' expressing a regular daily repetition;
      alternatively, ''every morning.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, typically a male sheep in sacrificial contexts.
    'Male lamb' makes the sacrificial specification explicit in English without overtranslation.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year-old
  alternatives:
  - in its first year
  - a son of its year
  lexicon: HALOT
  rationale: The idiom literally means 'son of its year,' referring to an animal one
    year old. 'A year-old' is natural modern English and preserves the age requirement.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תָּמִים refers to an animal free from defect.
    'Without blemish' is the standard clear rendering in cultic context.
- source_word: תַּעֲשֶׂה
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: Although עשה literally means 'do/make,' in offering contexts it commonly
    means to prepare or offer a sacrifice. 'Offer' best conveys the ritual action
    in idiomatic English.
- source_word: עוֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for a burnt offering. 'Burnt
    offering' is established and accurate.
- source_word: לַיּוֹם
  chosen: daily
  alternatives:
  - for the day
  - day by day
  - each day
  lexicon: HALOT
  rationale: With sacrificial instruction, the phrase functions adverbially to indicate
    regular daily repetition. 'Daily' is concise and natural.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' fits the offering
    language and preserves the direction of dedication.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: morning by morning
  alternatives:
  - every morning
  - in the morning, in the morning
  lexicon: HALOT
  rationale: The repetition expresses regular recurrence. 'Morning by morning' preserves
    the Hebrew distributive emphasis more closely than simply 'every morning'.
- source_word: אֹתוֹ
  chosen: it
  lexicon: HALOT
  rationale: The direct-object pronoun refers back to the lamb/offering. 'It' is the
    natural English equivalent.
