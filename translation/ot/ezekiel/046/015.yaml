id: EZK.46.15
reference: Ezekiel 46:15
source:
  edition: WLC
  text: ו/עשו אֶת הַ/כֶּ֧בֶשׂ וְ/אֶת הַ/מִּנְחָ֛ה וְ/אֶת הַ/שֶּׁ֖מֶן בַּ/בֹּ֣קֶר בַּ/בֹּ֑קֶר
    עוֹלַ֖ת תָּמִֽיד־־־׃פ
translation:
  text: They shall provide the lamb, the grain offering, and the oil, morning by morning,
    as a regular burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a continual burnt offering.' The Hebrew emphasizes the ongoing regularity
      of this offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂוּ
  chosen: They shall provide
  alternatives:
  - they shall make
  - they shall prepare
  - they shall offer
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but in sacrificial contexts it
    commonly carries the sense of preparing or providing what is required for the
    offering. 'Provide' fits the direct objects listed (the lamb, grain offering,
    and oil) and avoids implying that the lamb itself is being manufactured. 'Offer'
    is possible but slightly interpretive because the verb here governs the sacrificial
    components rather than the burnt offering term directly.
- source_word: הַכֶּבֶשׂ
  chosen: the lamb
  alternatives:
  - the male lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often specifically a young male in sacrificial
    contexts. English 'lamb' is natural and sufficient here; 'male' is not explicit
    in this form and need not be added.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly/sacrificial contexts refers specifically to the grain
    offering. This is more precise than the generic 'offering' and more transparent
    for modern readers than 'tribute offering' in this temple-regulation context.
- source_word: הַשֶּׁמֶן
  chosen: the oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: שֶׁמֶן means 'oil,' and in Israelite sacrificial practice this would
    ordinarily be olive oil. Since the Hebrew says only 'oil,' the translation keeps
    the broader term without adding 'olive' to the main text.
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: morning by morning
  alternatives:
  - every morning
  - morning after morning
  lexicon: HALOT
  rationale: The repeated phrase is distributive and idiomatic, expressing daily repetition.
    'Morning by morning' preserves the Hebrew cadence and iterative force better than
    the flatter 'every morning.'
- source_word: עוֹלַת תָּמִיד
  chosen: as a regular burnt offering
  alternatives:
  - a continual burnt offering
  - the regular burnt offering
  - a daily burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard 'burnt offering.' תָּמִיד conveys regular continuity.
    'Regular burnt offering' is clear modern English and reflects the established
    cultic sense without sounding archaic. The prefixed sense 'as' is supplied in
    English to make the verbless Hebrew phrase read naturally as the result or function
    of the listed provisions.
