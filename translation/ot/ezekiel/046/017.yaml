id: EZK.46.17
reference: Ezekiel 46:17
source:
  edition: WLC
  text: וְ/כִֽי יִתֵּ֨ן מַתָּנָ֜ה מִ/נַּחֲלָת֗/וֹ לְ/אַחַד֙ מֵֽ/עֲבָדָ֔י/ו וְ/הָ֤יְתָה
    לּ/וֹ֙ עַד שְׁנַ֣ת הַ/דְּר֔וֹר וְ/שָׁבַ֖ת לַ/נָּשִׂ֑יא אַ֚ךְ נַחֲלָת֔/וֹ בָּנָ֖י/ו
    לָ/הֶ֥ם תִּהְיֶֽה־־׃
translation:
  text: But if he gives a gift from his inheritance to one of his servants, it shall
    belong to him until the year of liberty; then it shall return to the prince. Only
    his inheritance belongs to his sons; it shall be theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the year of release'; this likely refers to the Jubilee-type restoration
      year, though the Hebrew here says 'liberty' rather than using the usual term
      'Jubilee.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case in contrast with the previous regulation.
    'But if' captures both the conjunction and the conditional force in natural English.
- source_word: יִתֵּן
  chosen: he gives
  alternatives:
  - he should give
  - he grants
  lexicon: HALOT
  rationale: Qal imperfect of נתן in a legal setting is well rendered as a simple
    present in English legislative style.
- source_word: מַתָּנָה
  chosen: a gift
  alternatives:
  - a present
  - a grant
  lexicon: HALOT
  rationale: '''Gift'' is the most direct and natural rendering for the noun, fitting
    the context of transferred property.'
- source_word: מִנַּחֲלָתוֹ
  chosen: from his inheritance
  alternatives:
  - out of his inheritance
  - from his property holding
  lexicon: HALOT
  rationale: נחלה here refers specifically to hereditary landed possession, not merely
    general property. 'Inheritance' preserves that legal nuance.
- source_word: לְאַחַד מֵעֲבָדָיו
  chosen: to one of his servants
  alternatives:
  - to one of his slaves
  lexicon: HALOT
  rationale: עבד can denote servant or slave. Here the bonded status is not the theological
    focus; the legal contrast is between sons and household dependents, so 'servants'
    is appropriate and readable while remaining accurate.
- source_word: וְהָיְתָה לּוֹ
  chosen: it shall belong to him
  alternatives:
  - it shall be his
  - it shall remain his
  lexicon: HALOT
  rationale: The feminine verb agrees with the gifted inheritance portion. 'Shall
    belong to him' makes explicit the temporary possession conveyed by the gift.
- source_word: עַד שְׁנַת הַדְּרוֹר
  chosen: until the year of liberty
  alternatives:
  - until the year of release
  - until the year of jubilee
  lexicon: HALOT
  rationale: דְּרוֹר denotes release/liberty. In Ezekiel this phrase refers to the
    restoration year analogous to Jubilee, but the Hebrew term itself is 'liberty.'
    Main text preserves the lexical sense; a footnote can note 'jubilee' as an interpretive
    alternative.
- source_word: וְשָׁבַת לַנָּשִׂיא
  chosen: then it shall return to the prince
  alternatives:
  - and it shall revert to the prince
  lexicon: HALOT
  rationale: The verb means 'return.' 'Prince' is the standard rendering of נשיא in
    Ezekiel's temple vision context and distinguishes this figure from a king.
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - However
  - Nevertheless
  lexicon: HALOT
  rationale: 'אַךְ marks restriction or exception here: the permanent hereditary right
    is limited to the prince''s sons.'
- source_word: נַחֲלָתוֹ בָּנָיו לָהֶם תִּהְיֶה
  chosen: his inheritance belongs to his sons; it shall be theirs
  alternatives:
  - his inheritance—his sons shall have it
  - his inheritance shall belong to his sons
  lexicon: HALOT
  rationale: The clause emphasizes that the prince's hereditary estate remains with
    his sons permanently. Splitting it into two English clauses preserves the emphasis
    and clarity of possession.
