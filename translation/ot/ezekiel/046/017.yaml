theological_decisions:
- issue: Rendering of עבד in a legal-property context
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The term can denote either servants or slaves. In this verse the focus
    is not on the bonded nature of the individuals but on the temporary versus hereditary
    transfer of land. Therefore 'servants' best fits the context while preserving
    the social hierarchy implied by the Hebrew.
  doctrine_reference: Translation philosophy §1; Contested terms table for δοῦλος
    by analogy of context-sensitive bonded-language rendering
- issue: Rendering of דְּרוֹר
  chosen_reading: liberty
  alternative_readings:
  - release
  - jubilee
  rationale: The Hebrew lexeme denotes release/liberty. Because the verse concerns
    restoration of property in a set year, 'jubilee' is contextually plausible, but
    the source text here does not use the usual term יוֹבֵל. To preserve source-language
    primacy, the main text keeps 'liberty' and notes the interpretive alternative
    in a footnote.
  doctrine_reference: Translation philosophy §1 and §3
