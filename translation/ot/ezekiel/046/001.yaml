id: EZK.46.1
reference: Ezekiel 46:1
source:
  edition: WLC
  text: כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ שַׁ֜עַר הֶ/חָצֵ֤ר הַ/פְּנִימִית֙ הַ/פֹּנֶ֣ה קָדִ֔ים יִהְיֶ֣ה סָג֔וּר שֵׁ֖שֶׁת יְמֵ֣י הַֽ/מַּעֲשֶׂ֑ה וּ/בְ/י֤וֹם הַ/שַּׁבָּת֙ יִפָּתֵ֔חַ וּ/בְ/י֥וֹם הַ/חֹ֖דֶשׁ יִפָּתֵֽחַ־׃
translation:
  text: 'Thus says the Lord GOD: The gate of the inner court that faces east shall be shut during the six working days, but on the Sabbath day it shall be opened, and on the day of the new moon it shall be opened.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the day of the new moon'; that is, the monthly new-moon observance.
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic register without unnecessary archaism.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with YHWH. Following the doctrine default for יְהוָה, the tetragrammaton is not transliterated; 'the Lord GOD' is the conventional English way to distinguish this combination and avoids the awkward 'Lord LORD.'
- source_word: שַׁעַר הֶחָצֵר הַפְּנִימִית
  chosen: The gate of the inner court
  alternatives:
  - The gate of the inner courtyard
  lexicon: HALOT
  rationale: Construct chain indicates the gate belonging to the inner court. 'Court' is concise and standard in temple-context English.
- source_word: הַפֹּנֶה קָדִים
  chosen: that faces east
  alternatives:
  - that looks eastward
  - facing east
  lexicon: HALOT
  rationale: Participial phrase describing the gate's orientation. 'Faces east' is natural modern English and preserves the directional sense.
- source_word: יִהְיֶה סָגוּר
  chosen: shall be shut
  alternatives:
  - shall remain closed
  - will be closed
  lexicon: HALOT
  rationale: Predicate adjective with היה expresses a continuing state. 'Shut' is a direct rendering; 'shall' fits the legal/instructional tone.
- source_word: שֵׁשֶׁת יְמֵי הַמַּעֲשֶׂה
  chosen: during the six working days
  alternatives:
  - for six days of work
  - throughout the six days of labor
  lexicon: HALOT
  rationale: The phrase contrasts ordinary workdays with Sabbath and new moon. 'Working days' communicates the idiom clearly in contemporary English.
- source_word: וּבְיוֹם הַשַּׁבָּת
  chosen: but on the Sabbath day
  alternatives:
  - and on the Sabbath day
  - on the day of the Sabbath
  lexicon: HALOT
  rationale: The conjunction marks contrast with the preceding closure on workdays; English 'but' makes the contrast explicit and natural.
- source_word: יִפָּתֵחַ
  chosen: it shall be opened
  alternatives:
  - it shall be open
  - it shall be opened up
  lexicon: HALOT
  rationale: Nifal imperfect of פתח is best rendered as passive verbal action here, matching the repeated form in the verse.
- source_word: וּבְיוֹם הַחֹדֶשׁ
  chosen: and on the day of the new moon
  alternatives:
  - and on the day of the month
  - and on new moon day
  lexicon: HALOT
  rationale: In cultic calendrical context, הַחֹדֶשׁ refers to the new moon observance rather than merely 'month.' This best fits Ezekiel's temple regulations.
