id: EZK.46.16
reference: Ezekiel 46:16
source:
  edition: WLC
  text: כֹּה אָמַ֞ר אֲדֹנָ֣/י יְהֹוִ֗ה כִּֽי יִתֵּ֨ן הַ/נָּשִׂ֤יא מַתָּנָה֙ לְ/אִ֣ישׁ מִ/בָּנָ֔י/ו נַחֲלָת֥/וֹ הִ֖יא לְ/בָנָ֣י/ו תִּֽהְיֶ֑ה אֲחֻזָּתָ֥/ם הִ֖יא בְּ/נַחֲלָֽה־־׃
translation:
  text: 'Thus says the Lord GOD: If the prince gives a gift to one of his sons, it is his inheritance; it shall belong to his sons as their possession by inheritance.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to a man from among his sons,'' an idiom meaning ''to any one of his sons.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'as their possession in inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; present-tense English is natural for the Hebrew formula introducing divine speech.
- source_word: אֲדֹנָי יְהֹוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Follows the project's default rendering of יְהוָה as 'the LORD.' In the compound title אֲדֹנָי יְהוִה, rendering as 'the Lord GOD' avoids the awkward 'Lord LORD' and reflects standard English convention while preserving the divine title combination.
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  - For
  lexicon: HALOT
  rationale: 'Here כִּי introduces a conditional case in legal/instructional material: ''if the prince gives...'' rather than causal ''for''.'
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the ruler
  - the leader
  lexicon: HALOT
  rationale: In Ezekiel's temple legislation, נָשִׂיא is a technical title for the civic leader; 'prince' is the established and contextually fitting rendering.
- source_word: מַתָּנָה
  chosen: a gift
  alternatives:
  - a present
  - a grant
  lexicon: HALOT
  rationale: The noun denotes something given; 'gift' is the clearest modern English choice in this inheritance context.
- source_word: לְאִישׁ מִבָּנָיו
  chosen: to any one of his sons
  alternatives:
  - to a man from among his sons
  - to one of his sons
  lexicon: HALOT
  rationale: אִישׁ here functions idiomatically for an individual person, and with מִבָּנָיו means one member from among his sons. 'Any one of his sons' captures the distributive sense naturally.
- source_word: נַחֲלָתוֹ הִיא
  chosen: it is his inheritance
  alternatives:
  - it is his hereditary possession
  - it is his patrimony
  lexicon: HALOT
  rationale: The clause identifies the gift as becoming the son's inherited holding. 'Inheritance' is the most transparent rendering of נַחֲלָה here.
- source_word: לְבָנָיו תִּהְיֶה
  chosen: it shall belong to his sons
  alternatives:
  - it shall be for his sons
  - it shall pass to his sons
  lexicon: HALOT
  rationale: The referent is the son who received the gift; on his death it remains within his line. 'Belong to his sons' expresses the future possession clearly.
- source_word: אֲחֻזָּתָם
  chosen: as their property
  alternatives:
  - as their possession
  - as their holding
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed possession or property holding. 'Property' is clear modern English; 'possession' is possible but slightly less concrete.
- source_word: בְּנַחֲלָה
  chosen: by inheritance
  alternatives:
  - as an inheritance
  - in inheritance
  lexicon: HALOT
  rationale: The phrase specifies the manner or legal basis of possession. 'By inheritance' communicates that the property is held as hereditary estate.
