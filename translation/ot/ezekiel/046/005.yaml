id: EZK.46.5
reference: Ezekiel 46:5
source:
  edition: WLC
  text: וּ/מִנְחָה֙ אֵיפָ֣ה לָ/אַ֔יִל וְ/לַ/כְּבָשִׂ֥ים מִנְחָ֖ה מַתַּ֣ת יָד֑/וֹ וְ/שֶׁ֖מֶן
    הִ֥ין לָ/אֵיפָֽה׃
translation:
  text: And the grain offering shall be an ephah with the ram, and with the lambs
    a grain offering as much as his hand can give, and a hin of oil to each ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the ram' and 'for the lambs'; the Hebrew preposition can mark association
      or allocation in sacrificial instructions.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the gift of his hand,' an idiom meaning according to what he is
      able to give.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In sacrificial legislation, מִנְחָה commonly denotes the cereal/grain
    offering rather than a generic gift. 'Grain offering' is the clearest modern cultic
    equivalent and fits the measurement language that follows.
- source_word: אֵיפָה
  chosen: an ephah
  alternatives:
  - ephah
  lexicon: HALOT
  rationale: A dry measure; transliterated rather than converted to preserve the source's
    cultic precision.
- source_word: לָאַיִל
  chosen: with the ram
  alternatives:
  - for the ram
  lexicon: HALOT
  rationale: The preposition ל here links the specified grain-offering amount to the
    ram. 'With the ram' reads naturally in English sacrificial instructions and reflects
    accompaniment/allocation.
- source_word: לַכְּבָשִׂים
  chosen: with the lambs
  alternatives:
  - for the lambs
  lexicon: HALOT
  rationale: As with לָאַיִל, the preposition marks the offering associated with the
    lambs. 'With the lambs' keeps the parallel structure and avoids implying a fixed
    amount where the next phrase makes it variable.
- source_word: מַתַּת יָדוֹ
  chosen: as much as his hand can give
  alternatives:
  - according to his means
  - as his hand gives
  - as much as he is able to give
  lexicon: HALOT
  rationale: This idiom expresses capacity or means. The chosen rendering preserves
    the concrete Hebrew image ('hand') while making the sense clear in modern English.
- source_word: שֶׁמֶן
  chosen: oil
  lexicon: HALOT
  rationale: Standard rendering in sacrificial contexts; no reason to specify further.
- source_word: הִין
  chosen: a hin
  alternatives:
  - hin
  lexicon: HALOT
  rationale: A liquid measure; transliterated to preserve the technical cultic unit.
- source_word: לָאֵיפָה
  chosen: to each ephah
  alternatives:
  - for an ephah
  - per ephah
  lexicon: HALOT
  rationale: The phrase gives the oil ratio corresponding to the grain measure. 'To
    each ephah' communicates the distributive sense naturally in English.
