theological_decisions:
- issue: Identity/status of הַנָּשִׂיא in Ezekiel's temple vision
  chosen_reading: Rendered neutrally as 'the prince' without importing a messianic
    or specifically royal interpretation.
  alternative_readings:
  - the ruler
  - a messianic prince
  rationale: The verse itself gives procedural temple-entry instructions and does
    not require resolving broader debates about the prince's identity. Following the
    translation philosophy, the rendering preserves the text's lexical sense without
    importing doctrinal conclusions the verse does not state.
  doctrine_reference: Preserve theological tension rather than resolve it.
