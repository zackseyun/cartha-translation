id: EZK.46.8
reference: Ezekiel 46:8
source:
  edition: WLC
  text: וּ/בְ/ב֖וֹא הַ/נָּשִׂ֑יא דֶּ֣רֶךְ אוּלָ֤ם הַ/שַּׁ֨עַר֙ יָב֔וֹא וּ/בְ/דַרְכּ֖/וֹ
    יֵצֵֽא׃
translation:
  text: When the prince enters, he shall enter by way of the porch of the gate, and
    he shall go out by the same way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'by his way he shall go out,' meaning he exits by the same route
      he entered.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/ב֖וֹא
  chosen: When ... enters
  alternatives:
  - and when ... enters
  - on entering
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition with the infinitive construct
    of בוא functions temporally here. 'When ... enters' gives clear English sense
    while preserving the temporal force better than a more wooden 'and in the entering
    of.'
- source_word: הַ/נָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel's temple vision regularly denotes the civic ruler/prince,
    not necessarily a king. 'Prince' preserves established Ezekiel usage and avoids
    overstating royal status.
- source_word: דֶּ֣רֶךְ
  chosen: by way of
  alternatives:
  - through
  - by the way of
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/path.' In this movement instruction, 'by
    way of' is natural English and retains the directional nuance.
- source_word: אוּלָ֤ם
  chosen: the porch
  alternatives:
  - the vestibule
  - the portico
  lexicon: HALOT
  rationale: אוּלָם refers to the porch/vestibule area of the gate structure. 'Porch'
    is accessible modern English and sufficiently architectural without becoming technical.
- source_word: הַ/שַּׁ֨עַר
  chosen: of the gate
  alternatives:
  - of the gateway
  lexicon: HALOT
  rationale: In construct with אוּלָם, the phrase is best rendered 'the porch of the
    gate.' 'Gate' is concise and idiomatic in temple-architecture contexts.
- source_word: יָב֔וֹא
  chosen: he shall enter
  alternatives:
  - he is to enter
  - he must enter
  lexicon: HALOT
  rationale: The imperfect here gives procedural instruction within the vision. 'He
    shall enter' preserves the directive force without over-interpreting it as either
    mere future or explicit command.
- source_word: וּ/בְ/דַרְכּ֖/וֹ
  chosen: by the same way
  alternatives:
  - by his way
  - by that way
  - by the way he came
  lexicon: HALOT
  rationale: Literally 'and by his way.' In context, the possessive refers to the
    route just mentioned, not a personal manner. 'By the same way' communicates the
    intended procedural symmetry in idiomatic English.
- source_word: יֵצֵֽא
  chosen: he shall go out
  alternatives:
  - he shall leave
  - he shall exit
  lexicon: HALOT
  rationale: יצא is the standard verb for going out. 'Go out' is the most direct and
    natural rendering.
