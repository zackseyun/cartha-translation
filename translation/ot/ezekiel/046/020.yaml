theological_decisions:
- issue: Meaning of holiness transmission in לְקַדֵּשׁ אֶת הָעָם
  chosen_reading: The clause refers to preventing the offerings from being taken into
    the outer court in a way that would transmit sanctity to the people.
  alternative_readings:
  - preventing profanation of the people
  - preventing unauthorized contact with holy things without emphasis on transmitted
    holiness
  rationale: In priestly/temple contexts קדש can denote the conferral of holiness
    through contact with sacred things. The immediate logic of designated cooking
    spaces supports preventing holy offerings from being carried into a less restricted
    area where the people would be consecrated by contact. This preserves the cultic
    logic of the text without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
