id: EZK.46.20
reference: Ezekiel 46:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י זֶ֣ה הַ/מָּק֗וֹם אֲשֶׁ֤ר יְבַשְּׁלוּ שָׁם֙ הַ/כֹּ֣הֲנִ֔ים
    אֶת הָ/אָשָׁ֖ם וְ/אֶת הַ/חַטָּ֑את אֲשֶׁ֤ר יֹאפוּ֙ אֶת הַ/מִּנְחָ֔ה לְ/בִלְתִּ֥י
    הוֹצִ֛יא אֶל הֶ/חָצֵ֥ר הַ/חִֽיצוֹנָ֖ה לְ/קַדֵּ֥שׁ אֶת הָ/עָֽם־־־־־־׃
translation:
  text: Then he said to me, “This is the place where the priests shall boil the guilt
    offering and the sin offering, and where they shall bake the grain offering, so
    as not to bring them out into the outer court and thereby make the people holy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “consecrate the people” or “sanctify the people.” The Hebrew verb means
      to make holy; in this temple context it likely refers to holiness being transmitted
      by contact with sacred offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    sequence while preserving the simple narrative force.
- source_word: זֶה הַמָּקוֹם
  chosen: This is the place
  alternatives:
  - This is the location
  lexicon: HALOT
  rationale: A straightforward deictic identification; 'place' is the natural and
    sufficiently formal rendering of מָקוֹם.
- source_word: אֲשֶׁר יְבַשְּׁלוּ שָׁם הַכֹּהֲנִים
  chosen: where the priests shall boil
  alternatives:
  - where the priests cook
  - where the priests will boil
  lexicon: HALOT
  rationale: בשל in sacrificial contexts commonly refers to boiling/cooking by boiling.
    'Boil' is more precise than the broader 'cook.' Future-like 'shall' fits the visionary
    instruction/register.
- source_word: הָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the trespass offering
  lexicon: HALOT
  rationale: אָשָׁם in cultic law denotes the reparation/guilt offering. 'Guilt offering'
    is clearer in modern English than the traditional 'trespass offering.'
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: The standard cultic rendering is 'sin offering.' While some contexts
    emphasize purification, this verse names the recognized sacrificial category,
    so the conventional gloss is retained.
- source_word: אֲשֶׁר יֹאפוּ אֶת הַמִּנְחָה
  chosen: and where they shall bake the grain offering
  alternatives:
  - and where they shall bake the offering
  - and where they shall bake the tribute offering
  lexicon: HALOT
  rationale: The second אֲשֶׁר continues the description of the place. מִנְחָה in
    priestly sacrificial context is best rendered 'grain offering,' not the broader
    'gift/tribute.'
- source_word: לְבִלְתִּי הוֹצִיא
  chosen: so as not to bring them out
  alternatives:
  - in order not to take them out
  - lest they bring them out
  lexicon: HALOT
  rationale: לְבִלְתִּי + infinitive expresses purpose/prevention. The object is implicit
    from the offerings just mentioned; English requires it to be supplied.
- source_word: אֶל הֶחָצֵר הַחִיצוֹנָה
  chosen: into the outer court
  alternatives:
  - to the outer court
  lexicon: HALOT
  rationale: '''Outer court'' is the standard architectural term in Ezekiel''s temple
    vision. ''Into'' fits the motion sense of הוציא אל in idiomatic English.'
- source_word: לְקַדֵּשׁ אֶת הָעָם
  chosen: and thereby make the people holy
  alternatives:
  - to consecrate the people
  - to sanctify the people
  lexicon: HALOT
  rationale: קדש in the Hiphil means to make holy/consecrate. In this context the
    concern is transmission of holiness from sacred meat/space to the people. 'Make
    the people holy' is clear modern English; 'thereby' makes the resultative nuance
    explicit.
