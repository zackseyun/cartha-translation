id: EZK.46.11
reference: Ezekiel 46:11
source:
  edition: WLC
  text: וּ/בַ/חַגִּ֣ים וּ/בַ/מּוֹעֲדִ֗ים תִּהְיֶ֤ה הַ/מִּנְחָה֙ אֵיפָ֤ה לַ/פָּר֙ וְ/אֵיפָ֣ה
    לָ/אַ֔יִל וְ/לַ/כְּבָשִׂ֖ים מַתַּ֣ת יָד֑/וֹ וְ/שֶׁ֖מֶן הִ֥ין לָ/אֵיפָֽה׃ס
translation:
  text: At the festivals and the appointed times, the grain offering shall be one
    ephah for the bull and one ephah for the ram, and for the lambs as much as he
    is able to give, with a hin of oil to each ephah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'for the lambs, the gift of his hand,' an idiom meaning according
      to what he can afford or is able to give.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַחַגִּים
  chosen: At the festivals
  alternatives:
  - And at the feasts
  - At the feast days
  lexicon: HALOT
  rationale: חַגִּים refers to pilgrimage or festal occasions. 'Festivals' is natural
    modern English and preserves the cultic calendar sense.
- source_word: וּבַמּוֹעֲדִים
  chosen: and the appointed times
  alternatives:
  - and the appointed feasts
  - and the set times
  lexicon: HALOT
  rationale: מוֹעֲדִים denotes appointed times/seasons, often sacred assemblies. 'Appointed
    times' preserves the broader calendrical sense without collapsing it into the
    same term as חַגִּים.
- source_word: תִּהְיֶה הַמִּנְחָה
  chosen: the grain offering shall be
  alternatives:
  - the offering shall be
  - the tribute offering shall be
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering.
    This is more precise than the generic 'offering' and fits the accompanying measures
    of ephah and oil.
- source_word: אֵיפָה
  chosen: one ephah
  alternatives:
  - an ephah
  lexicon: HALOT
  rationale: אֵיפָה is a dry measure. 'One ephah' makes the implied numeral explicit
    in idiomatic English when paired with each animal.
- source_word: לַפָּר
  chosen: for the bull
  alternatives:
  - for each bull
  lexicon: HALOT
  rationale: פַּר is a bull from the herd used in sacrifice. The singular with article
    is best rendered generically here as 'the bull' in the prescribed offering formula.
- source_word: וְאֵיפָה לָאַיִל
  chosen: and one ephah for the ram
  alternatives:
  - and an ephah for the ram
  lexicon: HALOT
  rationale: Maintains the parallel structure of the prescribed quantities for the
    larger sacrificial animals.
- source_word: וְלַכְּבָשִׂים מַתַּת יָדוֹ
  chosen: and for the lambs as much as he is able to give
  alternatives:
  - and for the lambs, a gift of his hand
  - and for the lambs, according to what his hand gives
  lexicon: HALOT
  rationale: The idiom מַתַּת יָדוֹ literally 'the gift of his hand' means according
    to his means or ability to give. The chosen rendering communicates the idiomatic
    sense in clear English.
- source_word: וְשֶׁמֶן הִין לָאֵיפָה
  chosen: with a hin of oil to each ephah
  alternatives:
  - and oil, a hin for each ephah
  - with a hin of oil for the ephah
  lexicon: HALOT
  rationale: This specifies the oil ratio accompanying the grain offering. 'To each
    ephah' makes the distributive sense explicit and readable.
