id: EZK.46.14
reference: Ezekiel 46:14
source:
  edition: WLC
  text: וּ/מִנְחָה֩ תַעֲשֶׂ֨ה עָלָ֜י/ו בַּ/בֹּ֤קֶר בַּ/בֹּ֨קֶר֙ שִׁשִּׁ֣ית הָֽ/אֵיפָ֔ה וְ/שֶׁ֛מֶן שְׁלִישִׁ֥ית הַ/הִ֖ין לָ/רֹ֣ס אֶת הַ/סֹּ֑לֶת מִנְחָה֙ לַֽ/יהוָ֔ה חֻקּ֥וֹת עוֹלָ֖ם תָּמִֽיד־׃
translation:
  text: And you shall prepare with it, morning by morning, a grain offering of a sixth of an ephah, and a third of a hin of oil to moisten the fine flour—a grain offering to Yahweh, a perpetual statute continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for it' / 'upon it'; the Hebrew likely refers to the grain offering being prepared in addition to the daily lamb offering mentioned in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Or 'to mix' the fine flour; the Hebrew verb is rare and suggests moistening the flour with oil.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'statutes of perpetuity continually,' an idiom stressing an enduring, regular requirement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנְחָה
  chosen: And ... a grain offering
  alternatives:
  - And an offering
  - And a tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the cereal/grain offering rather than a generic gift. 'Grain offering' is the clearest modern cultic equivalent and matches the verse's mention of fine flour and oil.
- source_word: תַעֲשֶׂה
  chosen: you shall prepare
  alternatives:
  - you shall make
  - he shall prepare
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in sacrificial instructions 'prepare' fits idiomatic English. The 2ms form is retained as 'you shall.'
- source_word: עָלָיו
  chosen: with it
  alternatives:
  - for it
  - upon it
  - for him
  lexicon: HALOT
  rationale: 'The preposition על with suffix here most naturally refers back to the daily burnt offering/lamb of the previous verse: the grain offering is prepared in addition to or along with it. ''With it'' communicates accompaniment in natural English without overcommitting to a spatial sense.'
- source_word: בַּבֹּקֶר בַּבֹּקֶר
  chosen: morning by morning
  alternatives:
  - every morning
  - in the morning, in the morning
  lexicon: HALOT
  rationale: The repeated expression is distributive and iterative. 'Morning by morning' preserves the Hebrew rhythm and continual sense better than the flatter 'every morning.'
- source_word: שִׁשִּׁית הָאֵיפָה
  chosen: a sixth of an ephah
  alternatives:
  - one-sixth of an ephah
  lexicon: HALOT
  rationale: This is a straightforward measure phrase. 'A sixth of an ephah' is idiomatic and precise.
- source_word: וְשֶׁמֶן שְׁלִישִׁית הַהִין
  chosen: and a third of a hin of oil
  alternatives:
  - and oil, a third of a hin
  lexicon: HALOT
  rationale: The Hebrew apposition is rendered in smooth English while preserving the ancient measure.
- source_word: לָרֹס
  chosen: to moisten
  alternatives:
  - to mix
  - to wet
  - to sprinkle on
  lexicon: HALOT
  rationale: The infinitive from רוס is rare and refers to moistening or soaking. Given the object 'the fine flour' and the presence of oil, 'to moisten' best captures the action without implying a full mixture beyond the text.
- source_word: אֶת־הַסֹּלֶת
  chosen: the fine flour
  alternatives:
  - the choice flour
  - the flour
  lexicon: HALOT
  rationale: סֹלֶת is fine flour used in offerings. 'Fine flour' is the standard and sufficiently transparent rendering.
- source_word: מִנְחָה לַיהוָה
  chosen: a grain offering to the LORD
  alternatives:
  - an offering to the LORD
  lexicon: HALOT
  rationale: The phrase restates and identifies the offering's cultic character and recipient. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: חֻקּוֹת עוֹלָם
  chosen: a perpetual statute
  alternatives:
  - an everlasting ordinance
  - a permanent statute
  lexicon: HALOT
  rationale: The plural חֻקּוֹת with עוֹלָם functions idiomatically for an enduring prescribed ordinance. Singular English reads naturally for the institutional requirement.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - continually as a regular offering
  lexicon: HALOT
  rationale: תָּמִיד emphasizes ongoing regularity. 'Continually' preserves the adverbial force, even though the English phrase is somewhat emphatic after 'perpetual statute,' reflecting the Hebrew's cumulative stress.
