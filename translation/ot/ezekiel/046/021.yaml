id: EZK.46.21
reference: Ezekiel 46:21
source:
  edition: WLC
  text: וַ/יּוֹצִיאֵ֗/נִי אֶל הֶֽ/חָצֵר֙ הַ/חִ֣יצֹנָ֔ה וַ/יַּ֣עֲבִירֵ֔/נִי אֶל אַרְבַּ֖עַת
    מִקְצוֹעֵ֣י הֶ/חָצֵ֑ר וְ/הִנֵּ֤ה חָצֵר֙ בְּ/מִקְצֹ֣עַ הֶ/חָצֵ֔ר חָצֵ֖ר בְּ/מִקְצֹ֥עַ
    הֶ/חָצֵֽר־־׃
translation:
  text: Then he brought me out to the outer court and led me past the four corners
    of the court, and behold, there was a court in each corner of the court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats, literally, ''a court in the corner of the court, a court
      in the corner of the court,'' after mentioning the four corners; the sense is
      distributive: a court in each of the four corners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאֵנִי
  chosen: Then he brought me out
  alternatives:
  - And he brought me out
  - Then he took me out
  lexicon: HALOT
  rationale: From יצא in Hiphil with 1cs suffix, meaning to cause to go out/bring
    out. 'Then' reflects the narrative waw in smooth English; 'brought me out' is
    natural and sufficiently formal.
- source_word: הֶחָצֵר הַחִיצֹנָה
  chosen: the outer court
  alternatives:
  - the outer courtyard
  - the exterior court
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard'; in Ezekiel's temple vision 'court' is the
    standard architectural term. הַחִיצֹנָה specifies the outer area, so 'outer court'
    is the most idiomatic rendering.
- source_word: וַיַּעֲבִירֵנִי
  chosen: led me past
  alternatives:
  - brought me through
  - caused me to pass by
  lexicon: HALOT
  rationale: From עבר in Hiphil, 'cause to pass over/through/by.' In this spatial
    survey context, 'led me past' communicates guided movement around the court more
    clearly than the more wooden 'caused me to pass by.'
- source_word: אַרְבַּעַת מִקְצוֹעֵי הֶחָצֵר
  chosen: the four corners of the court
  alternatives:
  - the four corners of the courtyard
  - the four angles of the court
  lexicon: HALOT
  rationale: מִקְצוֹעַ denotes a corner or angle. 'Corners' is the normal architectural
    English equivalent.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: The particle marks sudden attention to what is seen. 'Behold' preserves
    the deictic force and suits the visionary style of Ezekiel.
- source_word: חָצֵר בְּמִקְצֹעַ הֶחָצֵר חָצֵר בְּמִקְצֹעַ הֶחָצֵר
  chosen: there was a court in each corner of the court
  alternatives:
  - there was a court in the corner of the court, a court in the corner of the court
  - a court was in one corner of the court, and a court in another corner of the court
  lexicon: HALOT
  rationale: The Hebrew repeats the phrase for emphasis/distribution rather than to
    identify only two corners. Given the immediately preceding 'four corners,' English
    can naturally express the distributive sense as 'in each corner of the court'
    without losing meaning. The repetition is thus represented idiomatically rather
    than mechanically.
