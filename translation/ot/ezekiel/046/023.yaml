id: EZK.46.23
reference: Ezekiel 46:23
source:
  edition: WLC
  text: וְ/ט֨וּר סָבִ֥יב בָּ/הֶ֛ם סָבִ֖יב לְ/אַרְבַּעְתָּ֑/ם וּ/מְבַשְּׁל֣וֹת עָשׂ֔וּי
    מִ/תַּ֥חַת הַ/טִּיר֖וֹת סָבִֽיב׃
translation:
  text: A row ran around within them, around all four of them, and cooking places
    had been made beneath the rows all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beneath the enclosures,' 'beneath the ledges,' or 'beneath the walls';
      the exact architectural sense of the Hebrew term is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוּר
  chosen: row
  alternatives:
  - course
  - wall
  - enclosure
  lexicon: HALOT
  rationale: The noun denotes a row or course running around the structure. In this
    architectural context, 'row' best fits the idea of a continuous built feature
    around each court. 'Wall' is possible in some translations, but the following
    phrase about cooking installations beneath the rows suggests a structural course
    or ledge rather than a full wall.
- source_word: סָבִיב ... סָבִיב
  chosen: around ... all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The repeated use of סָבִיב emphasizes encircling on every side. Rendering
    both occurrences preserves the Hebrew repetition and spatial emphasis without
    sounding overly wooden.
- source_word: בָּהֶם
  chosen: within them
  alternatives:
  - in them
  - inside them
  lexicon: HALOT
  rationale: Refers back to the four small courts described in the previous verse.
    'Within them' communicates interior location naturally in English.
- source_word: לְאַרְבַּעְתָּם
  chosen: all four of them
  alternatives:
  - the four of them
  - for the four of them
  lexicon: HALOT
  rationale: The phrase identifies the feature as applying to each of the four courts.
    'All four of them' makes the distributive sense clear.
- source_word: מְבַשְּׁלוֹת
  chosen: cooking places
  alternatives:
  - boiling places
  - hearths
  - places for boiling
  lexicon: HALOT
  rationale: From the root בשׁל, 'to boil/cook.' In temple-kitchen context, this refers
    to places used for cooking sacrificial portions. 'Cooking places' is clear modern
    English and broad enough to cover the culinary function without over-specifying
    the exact apparatus.
- source_word: עָשׂוּי
  chosen: had been made
  alternatives:
  - were made
  - were constructed
  lexicon: HALOT
  rationale: Passive participial form indicating completed construction. 'Had been
    made' conveys the stative/resultative sense in idiomatic English.
- source_word: מִתַּחַת
  chosen: beneath
  alternatives:
  - under
  - below
  lexicon: HALOT
  rationale: A straightforward spatial preposition; 'beneath' fits the architectural
    description smoothly.
- source_word: הַטִּירוֹת
  chosen: the rows
  alternatives:
  - the enclosures
  - the ledges
  - the walls
  lexicon: HALOT
  rationale: Likely related to the surrounding structural rows/courses just mentioned.
    Rendering it consistently as 'rows' preserves the connection in the verse. Because
    the exact architectural referent is somewhat uncertain, alternatives are preserved
    in a footnote.
