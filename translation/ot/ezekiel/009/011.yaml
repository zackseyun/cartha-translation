id: EZK.9.11
reference: Ezekiel 9:11
source:
  edition: WLC
  text: וְ/הִנֵּ֞ה הָ/אִ֣ישׁ לְבֻ֣שׁ הַ/בַּדִּ֗ים אֲשֶׁ֤ר הַ/קֶּ֨סֶת֙ בְּ/מָתְנָ֔י/ו
    מֵשִׁ֥יב דָּבָ֖ר לֵ/אמֹ֑ר עָשִׂ֕יתִי כ/אשר צִוִּיתָֽ/נִי׀׃ס
translation:
  text: And behold, the man clothed in linen, who had the writing case at his waist,
    brought back word, saying, “I have done as you commanded me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inkhorn' for 'writing case,' a traditional rendering of the container
      carried at his waist.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the discourse-marking force of sudden attention/directing the
    reader's gaze, which is common in prophetic narrative. 'Behold' is slightly formal
    but still readable and preserves the vividness better than omitting it.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular and refers back to the previously
    identified figure. 'The man' is gender-accurate and contextually specific.
- source_word: לְבֻשׁ הַבַּדִּים
  chosen: clothed in linen
  alternatives:
  - wearing linen garments
  - dressed in linen
  lexicon: HALOT
  rationale: This idiom describes attire. 'Clothed in linen' is natural English and
    preserves the formal, priestly-sounding texture of the phrase without overexpanding
    the Hebrew.
- source_word: הַקֶּסֶת
  chosen: the writing case
  alternatives:
  - the inkhorn
  - the scribe's case
  lexicon: HALOT
  rationale: The noun denotes a container for writing implements/ink. 'Writing case'
    is clearer to modern readers than the traditional 'inkhorn,' while still reflecting
    the object rather than paraphrasing its function too broadly.
- source_word: בְּמָתְנָיו
  chosen: at his waist
  alternatives:
  - at his loins
  - on his hips
  lexicon: HALOT
  rationale: '''Loins'' is more literal/traditional, but ''at his waist'' communicates
    the bodily location naturally in modern English without loss of sense.'
- source_word: מֵשִׁיב דָּבָר
  chosen: brought back word
  alternatives:
  - reported back
  - returned an answer
  lexicon: HALOT
  rationale: The participle plus 'word' conveys giving a report in response. 'Brought
    back word' preserves the concrete Hebrew idiom better than the more interpretive
    'reported back,' while remaining idiomatic English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the direct
    speech straightforwardly.
- source_word: עָשִׂיתִי
  chosen: I have done
  alternatives:
  - I did
  lexicon: HALOT
  rationale: The perfect here naturally conveys completed action with present relevance
    in the report. 'I have done' fits the context of mission completion.
- source_word: כַּאֲשֶׁר צִוִּיתָנִי
  chosen: as you commanded me
  alternatives:
  - just as you commanded me
  - according to what you commanded me
  lexicon: HALOT
  rationale: This is a straightforward comparison/compliance formula. 'As you commanded
    me' is concise and faithful.
