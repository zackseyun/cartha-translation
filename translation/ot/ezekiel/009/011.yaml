theological_decisions:
- issue: Nature of the linen-clothed figure
  chosen_reading: Render descriptively as 'the man clothed in linen' without identifying
    him more specifically.
  alternative_readings:
  - an angelic being
  - a priestly figure
  - a theophanic figure
  rationale: The verse itself identifies the figure by appearance and role, not by
    explicit ontology. To label him beyond the text would import interpretation not
    stated in the Hebrew. This preserves theological restraint in line with the translation
    philosophy.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
