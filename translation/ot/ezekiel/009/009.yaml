- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of דָּמִים and מֻטֶּה in a judgment context
  chosen_reading: bloodshed ... injustice
  alternative_readings:
  - blood ... perversion
  - bloodguilt ... distorted justice
  rationale: The verse indicts the land and city for violent wrongdoing and civic/judicial corruption. The chosen renderings preserve the ethical and social dimensions without over-specifying a technical legal sense.
