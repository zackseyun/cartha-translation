id: EZK.9.9
reference: Ezekiel 9:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י עֲוֺ֨ן בֵּֽית יִשְׂרָאֵ֤ל וִֽ/יהוּדָה֙ גָּדוֹל֙ בִּ/מְאֹ֣ד מְאֹ֔ד וַ/תִּמָּלֵ֤א הָ/אָ֨רֶץ֙ דָּמִ֔ים וְ/הָ/עִ֖יר מָלְאָ֣ה מֻטֶּ֑ה כִּ֣י אָמְר֗וּ עָזַ֤ב יְהוָה֙ אֶת הָ/אָ֔רֶץ וְ/אֵ֥ין יְהוָ֖ה רֹאֶֽה־־׃
translation:
  text: Then he said to me, “The iniquity of the house of Israel and Judah is exceedingly great, and the land is filled with bloodshed, and the city is full of perversion. For they say, ‘Yahweh has forsaken the land, and Yahweh does not see.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'full of perversion' or 'full of distorted justice.' The Hebrew term points to crookedness or the perversion of what is right, likely including judicial injustice.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wickedness
  - punishment for iniquity
  lexicon: HALOT
  rationale: The noun commonly denotes iniquity/guilt. Here it summarizes the moral perversity of Israel and Judah rather than the consequent punishment, so 'iniquity' best preserves the ethical force.
- source_word: בֵּית יִשְׂרָאֵל וִיהוּדָה
  chosen: the house of Israel and Judah
  alternatives:
  - the house of Israel and of Judah
  - Israel and Judah
  lexicon: HALOT
  rationale: Retains the corporate covenantal expression 'house of' while keeping readable English. The phrase governs both Israel and Judah together in context.
- source_word: גָּדוֹל בִּמְאֹד מְאֹד
  chosen: exceedingly great
  alternatives:
  - very, very great
  - great beyond measure
  lexicon: HALOT
  rationale: The doubled מְאֹד intensifies strongly. 'Exceedingly great' conveys the emphatic superlative force in natural English without flattening the repetition.
- source_word: וַתִּמָּלֵא הָאָרֶץ דָּמִים
  chosen: the land is filled with bloodshed
  alternatives:
  - the land is full of bloods
  - the land is filled with blood
  lexicon: HALOT
  rationale: Plural דָּמִים often denotes bloodguilt or acts of violence rather than literal blood as a substance. 'Bloodshed' captures the idiomatic sense.
- source_word: מֻטֶּה
  chosen: injustice
  alternatives:
  - perversion
  - distortion of justice
  - wrongdoing
  lexicon: HALOT
  rationale: In this context of social corruption and judicial evil, the noun points to perverted justice or crookedness. 'Injustice' is clear modern English and fits the civic setting of 'the city.'
- source_word: עָזַב
  chosen: has forsaken
  alternatives:
  - has abandoned
  - has left
  lexicon: HALOT
  rationale: The perfect verb expresses their claim that the LORD has deserted the land. 'Forsaken' preserves the covenantal and theological weight better than the flatter 'left.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רֹאֶה
  chosen: does not see
  alternatives:
  - is not seeing
  - does not look
  lexicon: HALOT
  rationale: A straightforward rendering of the participle in this clause. It expresses their denial of divine oversight or attention.
