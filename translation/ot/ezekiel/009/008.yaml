id: EZK.9.8
reference: Ezekiel 9:8
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כְּ/הַכּוֹתָ֔/ם וְ/נֵֽאשֲׁאַ֖ר אָ֑נִי וָ/אֶפְּלָ֨/ה עַל פָּנַ֜/י וָ/אֶזְעַ֗ק וָֽ/אֹמַר֙ אֲהָהּ֙ אֲדֹנָ֣/י יְהוִ֔ה הֲ/מַשְׁחִ֣ית אַתָּ֗ה אֵ֚ת כָּל שְׁאֵרִ֣ית יִשְׂרָאֵ֔ל בְּ/שָׁפְכְּ/ךָ֥ אֶת חֲמָתְ/ךָ֖ עַל יְרוּשָׁלִָֽם־־־־׃
translation:
  text: And it happened, while they were striking them down and I was left alone, that I fell on my face and cried out, and I said, “Ah, Lord GOD, will you destroy all the remnant of Israel when you pour out your wrath on Jerusalem?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Lord GOD' represents the address אֲדֹנָי יְהוִה, literally 'Lord YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the scene transition. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כְּהַכּוֹתָם
  chosen: while they were striking them down
  alternatives:
  - as they were striking
  - when they struck
  lexicon: HALOT
  rationale: Infinitive construct with prefixed כ conveys contemporaneous action, 'while/as they were striking.' The verb נכה here refers to lethal smiting in context, so 'striking them down' makes the force clearer than a bare 'striking.' The object 'them' is implicit in the suffix and context.
- source_word: וְנֵאשֲׁאַר אֲנִי
  chosen: and I alone was left
  alternatives:
  - and I was left
  - while I remained
  lexicon: HALOT
  rationale: Nifal of שׁאר means 'be left/remain.' Adding 'alone' brings out the emphatic pronoun אֲנִי in natural English.
- source_word: וָאֶפְּלָה עַל־פָּנַי
  chosen: I fell on my face
  alternatives:
  - I fell upon my face
  - I threw myself facedown
  lexicon: HALOT
  rationale: Idiomatic expression of prostration and urgent supplication. 'On my face' is both literal and natural.
- source_word: וָאֶזְעַק
  chosen: cried out
  alternatives:
  - cried
  - called out
  lexicon: HALOT
  rationale: זעק often denotes an urgent cry for help or protest. 'Cried out' preserves the intensity.
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  - Oh no
  lexicon: HALOT
  rationale: Interjection of lament/distress. 'Ah' is concise and natural; 'alas' is possible but more archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  lexicon: HALOT
  rationale: This combines אֲדֹנָי with the divine name YHWH. Following doctrine, YHWH is rendered 'the LORD'; in the conventional English representation of this compound address, 'Lord GOD' avoids the awkward 'Lord LORD' while signaling the divine name behind the second term.
- source_word: הֲמַשְׁחִית אַתָּה
  chosen: will you destroy
  alternatives:
  - are you destroying
  - would you destroy
  lexicon: HALOT
  rationale: Interrogative with participle can express imminent or contemplated action. In this plea, English future 'will you destroy' best captures the force of Ezekiel's question.
- source_word: כָּל שְׁאֵרִית יִשְׂרָאֵל
  chosen: all the remnant of Israel
  alternatives:
  - the whole remnant of Israel
  - all Israel's remnant
  lexicon: HALOT
  rationale: שְׁאֵרִית is a theologically significant term for those left over after judgment. 'Remnant' should be preserved rather than flattened to 'survivors.'
- source_word: בְּשָׁפְכְּךָ אֶת־חֲמָתְךָ
  chosen: as you pour out your wrath
  alternatives:
  - when you pour out your wrath
  - by pouring out your wrath
  - as you pour out your fury
  lexicon: HALOT
  rationale: Infinitive construct with ב can mark contemporaneous circumstance. 'Pour out' preserves the metaphor of שׁפך. חֵמָה here is divine wrath/fury; 'wrath' is a standard, weighty rendering in judgment contexts.
- source_word: עַל יְרוּשָׁלִָם
  chosen: on Jerusalem
  alternatives:
  - upon Jerusalem
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; 'on' is idiomatic modern English.
