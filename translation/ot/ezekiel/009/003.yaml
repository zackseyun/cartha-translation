theological_decisions:
- issue: Personal agency in the subject of וַיִּקְרָא after 'the glory of the God
    of Israel'
  chosen_reading: Render the verb personally as 'he called' rather than impersonally
    as 'it called.'
  alternative_readings:
  - Render as 'it called,' referring grammatically to 'the glory'
  rationale: The Hebrew verb is masculine singular, and while its nearest antecedent
    is the grammatically masculine noun 'glory,' the context presents the glory as
    the manifestation of Israel's God acting personally. Using 'he' preserves that
    personal agency without adding a separate divine name not present in the clause.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence with original-language primacy.
