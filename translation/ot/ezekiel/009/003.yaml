id: EZK.9.3
reference: Ezekiel 9:3
source:
  edition: WLC
  text: וּ/כְב֣וֹד אֱלֹהֵ֣י יִשְׂרָאֵ֗ל נַעֲלָה֙ מֵ/עַ֤ל הַ/כְּרוּב֙ אֲשֶׁ֣ר הָיָ֣ה
    עָלָ֔י/ו אֶ֖ל מִפְתַּ֣ן הַ/בָּ֑יִת וַ/יִּקְרָ֗א אֶל הָ/אִישׁ֙ הַ/לָּבֻ֣שׁ הַ/בַּדִּ֔ים
    אֲשֶׁ֛ר קֶ֥סֶת הַ/סֹּפֵ֖ר בְּ/מָתְנָֽי/ו׀־׃ס
translation:
  text: And the glory of the God of Israel went up from above the cherub on which
    it had been, to the threshold of the house. And he called to the man clothed in
    linen, who had the scribe’s writing case at his waist.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the threshold of the temple.' Hebrew 'house' here refers to the temple
      building in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the scribe’s ink case'; traditional English has 'inkhorn.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew could also be rendered 'it called,' referring back to 'the glory,'
      but the context suggests personal divine agency.
    reason: alternative_reading
lexical_decisions:
- source_word: כְבוֹד
  chosen: glory
  alternatives:
  - presence
  - radiance
  lexicon: HALOT
  rationale: '''Glory'' is the standard rendering for כָּבוֹד and fits Ezekiel''s
    temple-vision context, where the visible manifestation of God''s presence is in
    view. Alternatives such as ''presence'' or ''radiance'' capture aspects of the
    sense but are narrower or more interpretive.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The God of Israel' preserves the
    covenantal identification without adding interpretive nuance.
- source_word: נַעֲלָה
  chosen: went up
  alternatives:
  - rose
  - moved up
  lexicon: HALOT
  rationale: The verb עלה normally means 'go up/ascend.' 'Went up' preserves the directional
    force while remaining natural English. 'Rose' is possible but can sound less spatially
    concrete in this vision report.
- source_word: מֵעַל
  chosen: from above
  alternatives:
  - from over
  - from upon
  lexicon: HALOT
  rationale: The preposition indicates movement away from a position over the cherub.
    'From above' is idiomatic and preserves the spatial relation.
- source_word: הַכְּרוּב
  chosen: the cherub
  alternatives:
  - the cherubim
  lexicon: HALOT
  rationale: The Hebrew form here is singular, so 'the cherub' is preferred. Although
    Ezekiel elsewhere often speaks of multiple cherubim, this clause grammatically
    refers to a singular cherub as the immediate location beneath the glory.
- source_word: אֲשֶׁר הָיָה עָלָיו
  chosen: on which it had been
  alternatives:
  - over which it had been
  - where it had been resting
  lexicon: HALOT
  rationale: The relative clause refers back to the cherub and describes the prior
    location of the glory. 'On which it had been' is concise and reflects the Hebrew
    without overinterpreting the posture as 'resting.'
- source_word: מִפְתַּן הַבָּיִת
  chosen: the threshold of the house
  alternatives:
  - the threshold of the temple
  lexicon: HALOT
  rationale: מִפְתָּן is 'threshold.' בַּיִת literally means 'house'; in Ezekiel's
    temple context it refers to the temple building. The main text keeps the more
    literal 'house,' while 'temple' is a contextual alternative worth noting.
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - it called
  lexicon: HALOT
  rationale: Hebrew uses a masculine singular verb. Given the immediately preceding
    subject 'the glory of the God of Israel,' English could in theory use 'it called,'
    but the narrative often treats the divine glory as a manifestation of God's own
    action. 'He called' best reflects the personal agency implied in context.
- source_word: הָאִישׁ
  chosen: the man
  lexicon: HALOT
  rationale: The noun is singular and specific. 'The man' preserves the source's wording
    and does not flatten the visionary figure into a generic messenger.
- source_word: הַלָּבֻשׁ הַבַּדִּים
  chosen: clothed in linen
  alternatives:
  - dressed in linen garments
  lexicon: HALOT
  rationale: This participial phrase is naturally rendered 'clothed in linen.' It
    preserves the formal, priestly-sounding description without unnecessary expansion.
- source_word: קֶסֶת הַסֹּפֵר
  chosen: the scribe’s writing case
  alternatives:
  - the secretary's inkhorn
  - the scribe's ink case
  lexicon: HALOT
  rationale: The term denotes a writing implement container. Traditional 'inkhorn'
    is understandable but archaic; 'scribe’s writing case' is more accessible modern
    English while preserving the occupational association.
- source_word: בְּמָתְנָיו
  chosen: at his waist
  alternatives:
  - at his loins
  - on his hips
  lexicon: HALOT
  rationale: Literally 'at his loins,' but 'waist' is clearer in modern English and
    appropriately concrete. 'Loins' would sound archaic here.
