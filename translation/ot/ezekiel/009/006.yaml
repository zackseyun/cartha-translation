theological_decisions:
- issue: Whether to render הַתָּו as a literal letter-name or as a functional protective
    sign
  chosen_reading: the mark
  alternative_readings:
  - the sign
  - the taw-mark
  rationale: The immediate context concerns those previously marked for preservation.
    Rendering the term functionally as 'the mark' best communicates the narrative
    sense in modern English, while preserving the more literal 'taw-mark' in a footnote
    for auditability.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether הַזְּקֵנִים refers to age ('old men') or office ('elders')
  chosen_reading: old men
  alternative_readings:
  - elders
  rationale: The verse begins with a list of age/sex categories under judgment, and
    the repeated זקן naturally echoes that list. Because the men are located before
    the temple, 'elders' remains a plausible contextual alternative and is preserved
    in a footnote rather than resolved dogmatically.
  doctrine_reference: Translation philosophy §3, §4
