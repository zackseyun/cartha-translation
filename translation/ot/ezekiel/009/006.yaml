id: EZK.9.6
reference: Ezekiel 9:6
source:
  edition: WLC
  text: זָקֵ֡ן בָּח֣וּר וּ/בְתוּלָה֩ וְ/טַ֨ף וְ/נָשִׁ֜ים תַּהַרְג֣וּ לְ/מַשְׁחִ֗ית
    וְ/עַל כָּל אִ֨ישׁ אֲשֶׁר עָלָ֤י/ו הַ/תָּו֙ אַל תִּגַּ֔שׁוּ וּ/מִ/מִּקְדָּשִׁ֖/י
    תָּחֵ֑לּוּ וַ/יָּחֵ֨לּוּ֙ בָּ/אֲנָשִׁ֣ים הַ/זְּקֵנִ֔ים אֲשֶׁ֖ר לִ/פְנֵ֥י הַ/בָּֽיִת־־־־׃
translation:
  text: Old man, young man, and virgin, and little children, and women—you shall kill
    them utterly. But do not come near anyone on whom is the mark, and begin at my
    sanctuary. So they began with the old men who were before the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the taw'; that is, the protective mark placed on the faithful (see
      v. 4).
    reason: lexical_alternative
  - marker: b
    text: Or 'the elders' who were before the house (that is, the temple).
    reason: alternative_reading
lexical_decisions:
- source_word: זָקֵן
  chosen: old man
  alternatives:
  - elder
  - old person
  lexicon: HALOT
  rationale: Here the singular functions distributively in a list of classes of people
    to be struck. 'Old man' fits the age-category contrast with 'young man' and matches
    the masculine singular form more closely than the institutional sense 'elder.'
- source_word: בָּחוּר
  chosen: young man
  alternatives:
  - young warrior
  - choice young man
  lexicon: HALOT
  rationale: The noun commonly denotes a young man in the prime of life. In this judgment
    list, the age/sex categorization is primary, so 'young man' is preferable to a
    more specialized sense such as 'warrior.'
- source_word: בְתוּלָה
  chosen: virgin
  alternatives:
  - young woman
  lexicon: HALOT
  rationale: The plain lexical sense is 'virgin.' Although some contexts may emphasize
    youth or unmarried status, nothing here requires weakening the term to 'young
    woman.'
- source_word: טַף
  chosen: little children
  alternatives:
  - children
  - dependents
  lexicon: HALOT
  rationale: The term refers to small children or little ones. 'Little children' preserves
    the pathos and specificity better than the broader 'children.'
- source_word: נָשִׁים
  chosen: women
  alternatives:
  - wives
  lexicon: HALOT
  rationale: In this list of demographic groups, the generic sense 'women' is most
    natural; 'wives' would introduce a relational nuance not signaled by the context.
- source_word: תַּהַרְגוּ
  chosen: you shall kill
  alternatives:
  - kill
  - strike down
  - slay
  lexicon: HALOT
  rationale: A direct imperative-like command to the executioners. 'You shall kill'
    reflects the Hebrew form naturally in English command style while retaining the
    severity of the verb.
- source_word: לְמַשְׁחִית
  chosen: to destruction
  alternatives:
  - utterly
  - for destruction
  lexicon: HALOT
  rationale: This prepositional phrase intensifies the command toward complete destruction.
    'To destruction' preserves the nominal force and avoids over-paraphrasing, while
    still reading naturally with 'kill.'
- source_word: עַל כָּל אִישׁ
  chosen: any man
  alternatives:
  - any person
  - anyone
  lexicon: HALOT
  rationale: The Hebrew uses אִישׁ, literally 'man.' Per the project's gender-accurate
    principle, 'man' is retained unless context clearly demands a generic neutral
    rendering. Here the distributive sense can still be expressed as 'any man' without
    obscuring meaning.
- source_word: הַתָּו
  chosen: the mark
  alternatives:
  - the sign
  - the taw-mark
  lexicon: HALOT
  rationale: Though literally related to the letter taw, in context it denotes the
    protective mark placed on the righteous in the preceding verse. 'The mark' communicates
    the function clearly; the more literal letter-reference is worth preserving in
    a footnote.
- source_word: אַל תִּגַּשׁוּ
  chosen: do not come near
  alternatives:
  - do not approach
  - do not touch
  lexicon: HALOT
  rationale: The verb means to approach or come near. 'Do not touch' would over-interpret;
    the prohibition is against approaching for judgment.
- source_word: וּמִמִּקְדָּשִׁי תָּחֵלּוּ
  chosen: begin from my sanctuary
  alternatives:
  - start at my sanctuary
  - profane from my sanctuary
  lexicon: HALOT
  rationale: From חלל in the Hiphil here, the sense is 'begin.' 'Sanctuary' is the
    standard rendering of מִקְדָּשׁ in this context. The phrase indicates the starting
    point of judgment, not desecration by the agents as the main verbal idea.
- source_word: וַיָּחֵלּוּ
  chosen: so they began
  alternatives:
  - and they began
  lexicon: HALOT
  rationale: Narrative waw advancing the action. 'So they began' reads smoothly in
    English and reflects the consequential force from the preceding command.
- source_word: בָּאֲנָשִׁים הַזְּקֵנִים
  chosen: with the old men
  alternatives:
  - with the elders
  - among the old men
  lexicon: HALOT
  rationale: Given the immediate repetition of the age category and the setting of
    judgment, 'old men' is more likely than the office-bearing sense 'elders,' though
    the latter is possible because of the temple setting. The main text keeps the
    age sense; the alternative is preserved in a footnote.
- source_word: לִפְנֵי הַבָּיִת
  chosen: who were before the house
  alternatives:
  - who were in front of the temple
  - who were before the house of God
  lexicon: HALOT
  rationale: בַּיִת here refers contextually to the temple building. 'The house' preserves
    the Hebrew wording, while the temple reference can be clarified in a footnote
    if needed.
