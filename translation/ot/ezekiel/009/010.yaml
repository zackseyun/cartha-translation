id: EZK.9.10
reference: Ezekiel 9:10
source:
  edition: WLC
  text: וְ/גַ֨ם אֲנִ֔י לֹא תָח֥וֹס עֵינִ֖/י וְ/לֹ֣א אֶחְמֹ֑ל דַּרְכָּ֖/ם בְּ/רֹאשָׁ֥/ם
    נָתָֽתִּי־־׃
translation:
  text: And as for me also, my eye will not spare, nor will I show pity; I have brought
    their way upon their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their conduct.' Hebrew 'their way' is an idiom for one's manner of life
      or behavior.
    reason: lexical_alternative
  - marker: b
    text: '''Upon their heads'' is a Hebrew expression for recompense returning on
      the guilty.'
    reason: cultural_note
lexical_decisions:
- source_word: וְגַם
  chosen: And ... also
  alternatives:
  - Moreover
  - And also
  - Even
  lexicon: HALOT
  rationale: Conveys additive emphasis linking this statement to the preceding judgment.
    Rendering the conjunction and particle together as 'And ... also' preserves the
    Hebrew force without sounding wooden.
- source_word: אֲנִי
  chosen: as for me
  alternatives:
  - I
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'As for me' brings out the contrastive/emphatic
    force in natural English better than a bare 'I,' while still preserving first-person
    emphasis.
- source_word: לֹא תָחוֹס עֵינִי
  chosen: my eye will not spare
  alternatives:
  - my eye will not pity
  - my eye will not have compassion
  lexicon: HALOT
  rationale: This is a Hebrew idiom for withholding compassion. 'Spare' is concise,
    idiomatic in English, and matches common prophetic/judgment usage while retaining
    the concrete subject 'my eye' from the Hebrew.
- source_word: וְלֹא אֶחְמֹל
  chosen: nor will I show pity
  alternatives:
  - nor will I have compassion
  - nor will I spare
  lexicon: HALOT
  rationale: חמל overlaps semantically with חס, but using 'show pity' avoids awkward
    repetition of 'spare' while preserving the parallelism of withheld compassion.
- source_word: דַּרְכָּם
  chosen: their way
  alternatives:
  - their conduct
  - their ways
  lexicon: HALOT
  rationale: Hebrew 'way' often denotes conduct or manner of life. Singular 'their
    way' matches the Hebrew form and preserves the idiom; the moral sense is clear
    in context.
- source_word: בְּרֹאשָׁם
  chosen: upon their heads
  alternatives:
  - on their heads
  - back on their own heads
  lexicon: HALOT
  rationale: This idiom expresses recompense returning on the guilty. 'Upon their
    heads' is a clear, fairly literal rendering that preserves the judicial imagery
    without adding interpretive wording like 'back on their own heads' to the main
    text.
- source_word: נָתַתִּי
  chosen: I have brought
  alternatives:
  - I have put
  - I have set
  - I have given
  lexicon: HALOT
  rationale: Although the verb is literally 'given/put,' English idiom in this judgment
    formula is better served by 'brought ... upon their heads.' This preserves the
    sense of imposed recompense in readable modern English.
