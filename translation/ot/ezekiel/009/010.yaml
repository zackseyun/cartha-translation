theological_decisions:
- issue: Divine judgment language and compassion
  chosen_reading: The verse is rendered as a declaration that God will withhold sparing
    mercy and repay the people's conduct upon them, without softening the severity
    or importing extra doctrinal explanation.
  alternative_readings:
  - A more interpretive rendering could make the repayment idea explicit as 'I have
    brought the consequences of their conduct upon their heads.'
  rationale: The Hebrew itself states uncompromising judgment in idiomatic terms.
    The translation preserves that tension and severity without paraphrastic expansion
    beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
