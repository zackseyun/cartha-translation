theological_decisions:
- issue: Rendering of the command to desecrate the temple precincts
  chosen_reading: 'Translate the imperative directly as a divine command within the
    vision: ''Defile the house.'''
  alternative_readings:
  - Soften to 'make the house unclean'
  rationale: The text presents YHWH commanding judgment that results in ritual defilement
    of the temple because of Jerusalem's sin. The translation should preserve the
    theological shock and not soften the force of the judgment scene.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether to make explicit that 'the house' means the temple
  chosen_reading: Keep 'the house' in the main text rather than substituting 'the
    temple.'
  alternative_readings:
  - Translate 'the temple'
  rationale: Optimal equivalence favors preserving the Hebrew image while allowing
    context to identify the referent. This avoids unnecessary interpretive expansion
    in the main text.
  doctrine_reference: Translation philosophy §1, §5
