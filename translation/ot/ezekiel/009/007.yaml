id: EZK.9.7
reference: Ezekiel 9:7
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵי/הֶ֜ם טַמְּא֣וּ אֶת הַ/בַּ֗יִת וּ/מַלְא֧וּ אֶת הַ/חֲצֵר֛וֹת
    חֲלָלִ֖ים צֵ֑אוּ וְ/יָצְא֖וּ וְ/הִכּ֥וּ בָ/עִֽיר־־׃
translation:
  text: And he said to them, “Defile the house, and fill the courts with the slain.
    Go out.” So they went out and struck down people in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple.' Hebrew literally 'the house.'
    reason: lexical_alternative
  - marker: b
    text: Or 'fill the courtyards with corpses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טַמְּאוּ
  chosen: Defile
  alternatives:
  - Make unclean
  - Pollute
  lexicon: HALOT
  rationale: The Piel imperative of טמא here is a command to render the temple complex
    ritually impure. 'Defile' is the most natural English equivalent in a cultic/judgment
    context and preserves the shock of the command.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Literally 'the house.' In Ezekiel's temple context it refers to the temple,
    but retaining 'house' preserves the Hebrew wording while remaining intelligible.
    The cultic reference is clear from context.
- source_word: הַחֲצֵרוֹת
  chosen: the courts
  alternatives:
  - the courtyards
  lexicon: HALOT
  rationale: Refers to the temple precincts/courtyards. 'Courts' is idiomatic in English
    for temple architecture and fits the register of the passage.
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - corpses
  - dead bodies
  lexicon: HALOT
  rationale: The noun denotes those pierced/killed. 'The slain' is concise, grave,
    and fits the judgment scene better than the more clinical 'corpses,' while still
    implying dead bodies filling the courts.
- source_word: צֵאוּ
  chosen: Go out
  alternatives:
  - Go forth
  lexicon: HALOT
  rationale: A direct imperative to leave the temple area for the city. 'Go out' is
    straightforward modern English.
- source_word: וְיָצְאוּ
  chosen: So they went out
  alternatives:
  - And they went out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So they went out' reads
    naturally in English while preserving sequence.
- source_word: וְהִכּוּ
  chosen: struck down people
  alternatives:
  - smote
  - struck
  - killed
  lexicon: HALOT
  rationale: נכה in this context refers to lethal striking in judgment. 'Struck down'
    communicates deadly force without archaic 'smote.' 'People' is supplied in English
    because the object is implicit from context and needed for naturalness.
- source_word: בָעִיר
  chosen: in the city
  alternatives:
  - throughout the city
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In the city' is the plain sense;
    broader distributive force is possible from context but should not be overtranslated.
