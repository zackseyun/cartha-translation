id: EZK.9.4
reference: Ezekiel 9:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אל/ו עֲבֹר֙ בְּ/ת֣וֹךְ הָ/עִ֔יר בְּ/ת֖וֹךְ יְרֽוּשָׁלִָ֑ם וְ/הִתְוִ֨יתָ תָּ֜ו עַל מִצְח֣וֹת הָ/אֲנָשִׁ֗ים הַ/נֶּֽאֱנָחִים֙ וְ/הַ/נֶּ֣אֱנָקִ֔ים עַ֚ל כָּל הַ/תּ֣וֹעֵב֔וֹת הַֽ/נַּעֲשׂ֖וֹת בְּ/תוֹכָֽ/הּ־־׃
translation:
  text: And Yahweh said to him, “Pass through the midst of the city, through the midst of Jerusalem, and put a mark on the foreheads of the men who sigh and groan over all the abominations being done in her midst.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew taw: possibly referring to the letter ת used as a mark.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH.
- source_word: עֲבֹר
  chosen: Pass through
  alternatives:
  - Go through
  - Cross through
  lexicon: HALOT
  rationale: The imperative of עבר here directs movement through the city. 'Pass through' is natural English and preserves the command's force.
- source_word: בְּתוֹךְ ... בְּתוֹךְ
  chosen: through the midst of ... through the midst of
  alternatives:
  - through ... through
  - in the midst of ... in the midst of
  lexicon: HALOT
  rationale: The repetition is retained to reflect the Hebrew emphasis and cadence. 'Through the midst of' is slightly more formal but still readable.
- source_word: וְהִתְוִיתָ תָּו
  chosen: put a mark
  alternatives:
  - set a mark
  - mark with a taw
  - inscribe a mark
  lexicon: HALOT
  rationale: The verb and noun together denote placing a distinguishing mark. 'Put a mark' is clear modern English. The noun תָּו may historically refer to the letter taw, but in context the functional sense is a protective identifying mark.
- source_word: מִצְחוֹת
  chosen: foreheads
  alternatives:
  - brows
  lexicon: HALOT
  rationale: Standard anatomical rendering; 'foreheads' is the clearest contemporary English equivalent.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  - the persons
  lexicon: HALOT
  rationale: The Hebrew noun is masculine plural and should be rendered gender-accurately per project philosophy. In context it refers to the marked individuals within Jerusalem, not humanity in general.
- source_word: הַנֶּאֱנָחִים וְהַנֶּאֱנָקִים
  chosen: who sigh and groan
  alternatives:
  - who mourn and lament
  - who groan and cry out
  lexicon: HALOT
  rationale: The paired participles express audible grief and anguish. 'Sigh and groan' preserves the lexical distinction without overinterpreting the emotional state.
- source_word: עַל כָּל הַתּוֹעֵבוֹת
  chosen: over all the abominations
  alternatives:
  - because of all the abominations
  - over all the detestable things
  lexicon: HALOT
  rationale: עַל here expresses grief concerning the city's sins. 'Abominations' is the standard rendering for תּוֹעֵבוֹת in prophetic denunciation and preserves its moral-religious weight.
- source_word: הַנַּעֲשׂוֹת
  chosen: being done
  alternatives:
  - that are done
  - done
  lexicon: HALOT
  rationale: The participle is rendered progressively to convey ongoing actions within the city.
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - in it
  - within her
  lexicon: HALOT
  rationale: The feminine suffix refers back to the city/Jerusalem. 'In her midst' preserves the feminine personification common for cities in Hebrew.
