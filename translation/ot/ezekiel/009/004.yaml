theological_decisions:
- issue: Potential symbolic significance of תָּו as the letter taw
  chosen_reading: Rendered functionally as 'a mark' in the main text
  alternative_readings:
  - Rendered more specifically as 'a taw' or 'the letter taw'
  rationale: The immediate sense is an identifying mark placed for protection/judgment distinction. Specifying the ancient letter form in the main text could import later symbolic associations not explicit in the verse. The lexical possibility is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
