id: EZK.9.5
reference: Ezekiel 9:5
source:
  edition: WLC
  text: וּ/לְ/אֵ֨לֶּה֙ אָמַ֣ר בְּ/אָזְנַ֔/י עִבְר֥וּ בָ/עִ֛יר אַחֲרָ֖י/ו וְ/הַכּ֑וּ
    על תָּחֹ֥ס עיני/כם וְ/אַל תַּחְמֹֽלוּ־־׃
translation:
  text: And to those others he said in my hearing, “Pass through the city after him
    and strike; do not let your eye spare, and do not show pity.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''do not let your eye spare''—a vivid idiom meaning not to withhold
      compassion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאֵלֶּה
  chosen: And to those others
  alternatives:
  - And to these
  - And to those
  lexicon: HALOT
  rationale: The phrase refers back to the remaining executioners in contrast to the
    man clothed in linen of the previous verse. Rendering אֵלֶּה with 'those others'
    makes the discourse contrast clear in natural English without adding content beyond
    the context.
- source_word: אָמַר בְּאָזְנַי
  chosen: he said in my hearing
  alternatives:
  - he said in my ears
  - he said so that I could hear
  lexicon: HALOT
  rationale: The idiom 'in my ears' means the speech was audible to the prophet. 'In
    my hearing' is a natural English equivalent that preserves the sense of direct
    audibility.
- source_word: עִבְרוּ
  chosen: Pass through
  alternatives:
  - Go through
  - Cross through
  lexicon: HALOT
  rationale: The imperative of עבר here commands movement through the city. 'Pass
    through' is idiomatic and suitably formal for a divine command.
- source_word: בָעִיר
  chosen: the city
  alternatives:
  - through the city
  lexicon: HALOT
  rationale: With the preposition included in the clause, the phrase is best rendered
    'through the city.' The noun itself is 'the city,' referring to Jerusalem in context.
- source_word: אַחֲרָיו
  chosen: after him
  alternatives:
  - behind him
  lexicon: HALOT
  rationale: This refers to following the previously mentioned marked man through
    the city. 'After him' is the most natural English rendering in this command sequence.
- source_word: וְהַכּוּ
  chosen: and strike
  alternatives:
  - and smite
  - and kill
  lexicon: HALOT
  rationale: נכה is broad enough to mean strike down in judgment. 'Strike' preserves
    the verbal force without prematurely narrowing it to 'kill,' though lethal judgment
    is implied by the context.
- source_word: עַל תָּחֹס עֵינֵיכֶם
  chosen: do not let your eye spare
  alternatives:
  - your eye shall not spare
  - do not have pity with your eye
  lexicon: HALOT
  rationale: The singular verb with 'your eye' functions distributively. This is a
    common Hebrew idiom for withholding compassion. Rendering it literally preserves
    the vividness of the source while remaining understandable.
- source_word: וְאַל תַּחְמֹלוּ
  chosen: and do not show pity
  alternatives:
  - and do not spare
  - and do not have compassion
  lexicon: HALOT
  rationale: חמל overlaps with חס in the previous clause but adds an explicit prohibition
    of pity/compassion. To avoid flattening the parallelism into identical English,
    'show pity' preserves the semantic distinction while keeping the force of the
    command.
