theological_decisions:
- issue: Severity of the judgment command
  chosen_reading: The command is rendered as an uncompromising divine judgment without
    softening the violence or importing extra theological explanation.
  alternative_readings:
  - A more euphemistic rendering that reduces the force of the command
  rationale: The Hebrew presents a stark judgment scene. Optimal equivalence here
    requires preserving the severity of the command while using readable English.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
