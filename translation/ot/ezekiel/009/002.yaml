theological_decisions:
- issue: Identity and nature of the six men and the linen-clothed man
  chosen_reading: Render them phenomenologically as 'men' without importing angelic
    interpretation into the translation.
  alternative_readings:
  - six execution angels and one angelic scribe
  - humanlike heavenly beings
  rationale: 'The Hebrew text presents what Ezekiel sees: ''six men'' and ''one man
    among them.'' While the broader context strongly suggests heavenly agents, the
    translation should preserve the visionary description rather than interpret beyond
    the wording.'
  doctrine_reference: Preserve theological tension rather than resolve it.
