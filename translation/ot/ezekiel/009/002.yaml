id: EZK.9.2
reference: Ezekiel 9:2
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה שִׁשָּׁ֣ה אֲנָשִׁ֡ים בָּאִ֣ים מִ/דֶּרֶךְ שַׁ֨עַר הָ/עֶלְי֜וֹן אֲשֶׁ֣ר
    מָפְנֶ֣ה צָפ֗וֹנָ/ה וְ/אִ֨ישׁ כְּלִ֤י מַפָּצ/וֹ֙ בְּ/יָד֔/וֹ וְ/אִישׁ אֶחָ֤ד בְּ/תוֹכָ/ם֙
    לָבֻ֣שׁ בַּדִּ֔ים וְ/קֶ֥סֶת הַ/סֹּפֵ֖ר בְּ/מָתְנָ֑י/ו וַ/יָּבֹ֨אוּ֙ וַ/יַּ֣עַמְד֔וּ
    אֵ֖צֶל מִזְבַּ֥ח הַ/נְּחֹֽשֶׁת׀־׀־׃
translation:
  text: And behold, six men were coming from the direction of the upper gate, which
    faces north, each with his weapon for smashing in his hand; and one man among
    them was clothed in linen, with a scribe’s writing case at his waist. And they
    came and stood beside the bronze altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each with his destroying weapon in his hand.' The Hebrew term refers
      to an implement for breaking or smashing, but the exact kind of weapon is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'with a scribe’s inkhorn at his waist.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - And see
  lexicon: HALOT
  rationale: Retains the vivid deictic force that introduces a sudden visionary sight.
    'Behold' is slightly elevated but still natural in prophetic narrative and preserves
    the immediacy better than a flatter 'look.'
- source_word: שִׁשָּׁה אֲנָשִׁים
  chosen: six men
  alternatives:
  - six men/figures
  - six persons
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural and refers to humanlike agents
    in the vision. Following the gender-accurate principle, 'men' is preferred over
    gender-neutral alternatives.
- source_word: בָּאִים
  chosen: were coming
  alternatives:
  - came
  - coming
  lexicon: HALOT
  rationale: The participle conveys ongoing action in the visionary scene. 'Were coming'
    captures the progressive sense more naturally in English than a simple past.
- source_word: מִדֶּרֶךְ
  chosen: from the direction of
  alternatives:
  - by way of
  - from the way of
  - from
  lexicon: HALOT
  rationale: The phrase indicates approach by a route or direction. 'From the direction
    of' is idiomatic and clarifies spatial movement without over-paraphrasing.
- source_word: שַׁעַר הָעֶלְיוֹן
  chosen: the upper gate
  alternatives:
  - the upper gateway
  - the higher gate
  lexicon: HALOT
  rationale: A straightforward rendering of the temple gate designation. 'Upper gate'
    is concise and preserves likely architectural terminology.
- source_word: אֲשֶׁר מָפְנֶה צָפוֹנָה
  chosen: which faces north
  alternatives:
  - which is turned toward the north
  - that faces northward
  lexicon: HALOT
  rationale: This clause specifies orientation. 'Faces north' is clear modern English
    and preserves the directional detail.
- source_word: וְאִישׁ כְּלִי מַפָּצוֹ בְּיָדוֹ
  chosen: each with his weapon for smashing in his hand
  alternatives:
  - each with his destroying weapon in his hand
  - each with his shattering weapon in his hand
  - each with his club in his hand
  lexicon: HALOT
  rationale: מַפָּץ denotes an instrument of breaking or smashing. 'Weapon for smashing'
    preserves the destructive sense without over-specifying the exact implement, which
    is uncertain.
- source_word: וְאִישׁ אֶחָד בְּתוֹכָם
  chosen: and one man among them
  alternatives:
  - and one man in their midst
  - and a single man among them
  lexicon: HALOT
  rationale: בְּתוֹכָם indicates position within the group. 'Among them' is natural
    and accurate.
- source_word: לָבֻשׁ בַּדִּים
  chosen: was clothed in linen
  alternatives:
  - was dressed in linen garments
  - was wearing linen
  lexicon: HALOT
  rationale: בַּדִּים refers to linen garments, often associated with priestly or
    sacred attire. 'Clothed in linen' is idiomatic and preserves the formal tone.
- source_word: קֶסֶת הַסֹּפֵר
  chosen: a scribe’s writing case
  alternatives:
  - an inkhorn of a scribe
  - a scribe's ink case
  lexicon: HALOT
  rationale: The traditional 'inkhorn' is understandable but archaic. The Hebrew denotes
    a writing container/case associated with a scribe; 'writing case' is readable
    modern English while preserving function.
- source_word: בְּמָתְנָיו
  chosen: at his waist
  alternatives:
  - at his loins
  - on his hips
  - at his side
  lexicon: HALOT
  rationale: '''Loins'' is formally possible but sounds archaic in contemporary English.
    ''At his waist'' communicates the bodily location clearly.'
- source_word: וַיָּבֹאוּ
  chosen: And they came
  alternatives:
  - Then they came
  - So they came
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. 'And they came' preserves the sequence
    simply.
- source_word: וַיַּעַמְדוּ אֵצֶל
  chosen: stood beside
  alternatives:
  - stood by
  - took their stand beside
  lexicon: HALOT
  rationale: אֵצֶל indicates proximity. 'Stood beside' is natural and spatially precise.
- source_word: מִזְבַּח הַנְּחֹשֶׁת
  chosen: the bronze altar
  alternatives:
  - the altar of bronze
  - the brazen altar
  lexicon: HALOT
  rationale: Modern English prefers 'bronze' over 'brazen.' The phrase likely refers
    to the well-known bronze altar in the temple precincts.
