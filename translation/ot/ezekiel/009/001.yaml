id: EZK.9.1
reference: Ezekiel 9:1
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א בְ/אָזְנַ֗/י ק֤וֹל גָּדוֹל֙ לֵ/אמֹ֔ר קָרְב֖וּ פְּקֻדּ֣וֹת הָ/עִ֑יר
    וְ/אִ֛ישׁ כְּלִ֥י מַשְׁחֵת֖/וֹ בְּ/יָדֽ/וֹ׃
translation:
  text: Then he cried out in my ears with a loud voice, saying, “Draw near, you overseers
    of the city, each with his weapon of destruction in his hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Come near, you appointed ones of the city”; the Hebrew term may denote
      those appointed for oversight or visitation/judgment.
    reason: alternative_reading
  - marker: b
    text: Hebrew literally “and each man [with] his weapon of destruction in his hand.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he cried out
  alternatives:
  - he called out
  - he proclaimed
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'cry out.' With 'in my ears' and 'with a
    loud voice,' the sense is not a quiet summons but a forceful shout, so 'cried
    out' best reflects the intensity.
- source_word: בְאָזְנַי
  chosen: in my ears
  alternatives:
  - in my hearing
  - to my ears
  lexicon: HALOT
  rationale: A literal rendering preserves the vividness of the Hebrew idiom while
    remaining intelligible in English. 'In my hearing' is possible but less concrete.
- source_word: קוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - with a great voice
  - loudly
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for speaking loudly. 'With a loud
    voice' is idiomatic modern English and preserves the noun-based construction better
    than the adverb 'loudly.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive introduces direct speech. 'Saying' is the most transparent
    and formally faithful connector.
- source_word: קָרְבוּ
  chosen: Draw near
  alternatives:
  - Come near
  - Approach
  lexicon: HALOT
  rationale: The imperative is plural. 'Draw near' preserves the solemn, command-like
    tone better than the more ordinary 'come near,' while remaining natural English.
- source_word: פְּקֻדּוֹת הָעִיר
  chosen: you overseers of the city
  alternatives:
  - you appointed ones of the city
  - you punishments of the city
  - you visitations of the city
  lexicon: HALOT
  rationale: The noun from פקד is difficult and contextually refers to the agents
    summoned for judgment. In light of the following clause about each man carrying
    a destructive weapon and the appearance of executioners in the next verse, 'overseers
    of the city' captures the idea of those appointed over the city, likely as agents
    of visitation/judgment. More literal options like 'visitations' are obscure in
    English; 'punishments' over-interprets the abstract noun as the act rather than
    the agents.
- source_word: וְאִישׁ
  chosen: each
  alternatives:
  - and each man
  - and every man
  lexicon: HALOT
  rationale: Although the Hebrew is singular 'man,' the distributive sense in context
    is best conveyed by 'each.' This preserves the representative force without awkward
    English repetition.
- source_word: כְּלִי מַשְׁחֵתוֹ
  chosen: his weapon of destruction
  alternatives:
  - his destroying weapon
  - his weapon for destroying
  - his instrument of destruction
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel, implement, or weapon; in this judgment
    context 'weapon' is the clearest contextual rendering. מַשְׁחֵת denotes destruction/destructive
    action, so 'weapon of destruction' is both natural and faithful.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in his hands
  - at hand
  lexicon: HALOT
  rationale: The singular matches the Hebrew and suits the distributive 'each.' It
    also keeps the image concrete and immediate.
