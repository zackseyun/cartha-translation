theological_decisions:
- issue: Rendering of פְּקֻדּוֹת הָעִיר in a judgment context
  chosen_reading: you overseers of the city
  alternative_readings:
  - you appointed ones of the city
  - you punishments/visitations of the city
  rationale: The verse introduces agents who carry destructive weapons and execute
    divine judgment in the following context. The Hebrew term is lexically difficult,
    deriving from פקד with senses involving appointment, oversight, or visitation.
    The chosen rendering avoids flattening the term into a mere abstraction while
    also not importing later angelological specificity into the text. It presents
    them as those commissioned over the city for judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
