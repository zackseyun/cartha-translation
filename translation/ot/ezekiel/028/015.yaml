id: EZK.28.15
reference: Ezekiel 28:15
source:
  edition: WLC
  text: תָּמִ֤ים אַתָּה֙ בִּ/דְרָכֶ֔י/ךָ מִ/יּ֖וֹם הִבָּֽרְאָ֑/ךְ עַד נִמְצָ֥א עַוְלָ֖תָ/ה
    בָּֽ/ךְ־׃
translation:
  text: You were blameless in your ways from the day you were created, until unrighteousness
    was found in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perfect in your ways.' The Hebrew term can denote completeness or integrity;
      here 'blameless' was chosen to fit the moral context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּמִים
  chosen: blameless
  alternatives:
  - perfect
  - whole
  - complete
  lexicon: HALOT
  rationale: In moral and evaluative contexts תמים commonly conveys integrity or blamelessness
    rather than absolute metaphysical perfection. 'Blameless' fits the context of
    conduct ('in your ways') and avoids overstating the claim.
- source_word: בִּדְרָכֶיךָ
  chosen: in your ways
  alternatives:
  - in your conduct
  - in your paths
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom while remaining
    natural in English. 'Ways' in prophetic literature often denotes one's manner
    of life or conduct.
- source_word: מִיּוֹם הִבָּרְאָךְ
  chosen: from the day you were created
  alternatives:
  - from the day of your creation
  - since the day you were created
  lexicon: HALOT
  rationale: The Niphal infinitive/verb form with suffix indicates being created.
    'From the day you were created' is idiomatic and preserves the temporal force
    of מִן + יוֹם.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the time when
  lexicon: HALOT
  rationale: Standard temporal marker introducing the change in condition.
- source_word: נִמְצָא
  chosen: was found
  alternatives:
  - was discovered
  - appeared
  lexicon: HALOT
  rationale: The passive sense is best preserved. 'Was found' reflects the Hebrew
    directly and leaves open whether the evil emerged or was exposed.
- source_word: עַוְלָתָה
  chosen: unrighteousness
  alternatives:
  - wickedness
  - injustice
  - iniquity
  lexicon: HALOT
  rationale: The noun denotes wrong, injustice, or unrighteousness. 'Unrighteousness'
    best captures the moral dimension without narrowing it merely to social injustice.
    'Iniquity' is traditional but less accessible for modern readers.
- source_word: בָּךְ
  chosen: in you
  alternatives:
  - within you
  lexicon: HALOT
  rationale: A direct and natural rendering of the prepositional phrase, preserving
    the internal location of the discovered evil.
