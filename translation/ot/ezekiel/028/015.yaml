theological_decisions:
- issue: Potential overreading of תמים as absolute perfection in a passage often tied
    to broader theological interpretations of the king of Tyre
  chosen_reading: blameless
  alternative_readings:
  - perfect
  rationale: The translation avoids importing a stronger ontological claim than the
    Hebrew requires. In context, the verse speaks of moral integrity in one's ways
    until evil was found, not necessarily absolute perfection in every conceivable
    sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
