id: EZK.28.18
reference: Ezekiel 28:18
source:
  edition: WLC
  text: מֵ/רֹ֣ב עֲוֺנֶ֗י/ךָ בְּ/עֶ֨וֶל֙ רְכֻלָּ֣תְ/ךָ֔ חִלַּ֖לְתָּ מִקְדָּשֶׁ֑י/ךָ
    וָֽ/אוֹצִא אֵ֤שׁ מִ/תּֽוֹכְ/ךָ֙ הִ֣יא אֲכָלַ֔תְ/ךָ וָ/אֶתֶּנְ/ךָ֤ לְ/אֵ֨פֶר֙ עַל
    הָ/אָ֔רֶץ לְ/עֵינֵ֖י כָּל רֹאֶֽי/ךָ־־־׃
translation:
  text: By the abundance of your iniquities, in the unrighteousness of your trade,
    you profaned your sanctuaries; so I brought out a fire from your midst—it consumed
    you—and I turned you to ashes on the earth in the sight of all who saw you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''your holy places.'' The Hebrew is plural: ''your sanctuaries.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'your trading' or 'your commerce.'
    reason: lexical_alternative
  - marker: c
    text: Some translate 'I brought out fire from within you'; the Hebrew depicts
      fire emerging from his midst as the instrument of judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵרֹב
  chosen: By the abundance of
  alternatives:
  - From the abundance of
  - Because of the abundance of
  lexicon: HALOT
  rationale: The preposition מִן with רֹב can express cause or source. 'By the abundance
    of' preserves the causal force while staying close to the Hebrew structure.
- source_word: עֲוֺנֶיךָ
  chosen: your iniquities
  alternatives:
  - your sins
  - your guilt
  lexicon: HALOT
  rationale: עָוֹן can denote both wrongdoing and guilt. 'Iniquities' preserves the
    moral weight and plural form without flattening it to the more generic 'sins.'
- source_word: בְּעֶוֶל
  chosen: in the unrighteousness of
  alternatives:
  - through the injustice of
  - by the wrongfulness of
  lexicon: HALOT
  rationale: עֶוֶל denotes injustice, wrong, unrighteousness. 'In the unrighteousness
    of' keeps the prepositional linkage to what follows and matches prophetic moral
    diction.
- source_word: רְכֻלָּתְךָ
  chosen: your trade
  alternatives:
  - your trading
  - your commerce
  - your trafficking
  lexicon: HALOT
  rationale: In Ezekiel 27–28 the term is tied to commercial activity. 'Trade' is
    concise and natural in English. 'Trafficking' could suggest exploitative nuance,
    but the immediate context already conveys corruption through 'unrighteousness.'
- source_word: חִלַּלְתָּ
  chosen: you profaned
  alternatives:
  - you defiled
  - you desecrated
  lexicon: HALOT
  rationale: The piel of חלל commonly means to profane or desecrate what is holy.
    'Profaned' best matches the cultic register and the object 'sanctuaries.'
- source_word: מִקְדָּשֶׁיךָ
  chosen: your sanctuaries
  alternatives:
  - your holy places
  - your sanctuary
  lexicon: HALOT
  rationale: The form is plural, so 'sanctuaries' should be retained. Though the referent
    is debated in context, the lexical sense is cultic holy places, not merely abstract
    holiness.
- source_word: וָאוֹצִא אֵשׁ מִתּוֹכְךָ
  chosen: so I brought out a fire from your midst
  alternatives:
  - and I brought out fire from within you
  - therefore I caused fire to come out from your midst
  lexicon: HALOT
  rationale: The waw-consecutive advances the judgment sequence. 'Brought out a fire
    from your midst' is a close rendering; adding 'so' clarifies the consequential
    flow in English.
- source_word: הִיא אֲכָלַתְךָ
  chosen: it consumed you
  alternatives:
  - she consumed you
  - it devoured you
  lexicon: HALOT
  rationale: The feminine pronoun refers back to 'fire' (אֵשׁ, grammatically feminine).
    English normally uses 'it' for fire. 'Consumed' fits judgment imagery and avoids
    over-literal gendering.
- source_word: וָאֶתֶּנְךָ לְאֵפֶר
  chosen: I turned you to ashes
  alternatives:
  - I made you into ashes
  - I reduced you to ashes
  lexicon: HALOT
  rationale: Literally 'I gave you to ashes,' an idiom of reduction by judgment. 'Turned
    you to ashes' is idiomatic English while preserving the resultative force.
- source_word: עַל הָאָרֶץ
  chosen: on the earth
  alternatives:
  - upon the ground
  - on the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean earth, land, or ground. Here the image is public humiliation
    in the visible world; 'on the earth' preserves breadth and solemnity.
- source_word: לְעֵינֵי כָּל רֹאֶיךָ
  chosen: in the sight of all who saw you
  alternatives:
  - before the eyes of all who saw you
  - in the sight of all your onlookers
  lexicon: HALOT
  rationale: The phrase emphasizes public visibility of judgment. 'In the sight of
    all who saw you' is natural and keeps the Hebrew emphasis on eyewitnesses.
