theological_decisions:
- issue: Referent and imagery of 'your sanctuaries' in a taunt over the king/prince
    of Tyre
  chosen_reading: Retain the literal cultic term 'your sanctuaries' without resolving
    whether the verse speaks purely of the historical ruler, the city/cult of Tyre,
    or a typological/supernatural figure.
  alternative_readings:
  - Interpret as metaphorical 'your sacred places' referring to royal dignity
  - Interpret as evidence of an angelic/supernatural being with heavenly sanctuaries
  rationale: The Hebrew noun is plainly plural and cultic. The translation should
    preserve the lexical form without importing a specific theological interpretation
    of the broader passage. This maintains the text's tension rather than resolving
    a debated reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
