id: EZK.28.11
reference: Ezekiel 28:11
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'and it was/came to pass,' in the prophetic
    formula ויהי דבר־יהוה ... the idiomatic English rendering is that the word 'came.'
    This preserves the standard sense of the formula without woodenly translating
    the Hebrew existential verb.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר in this prophetic expression refers to a spoken divine communication.
    'The word' preserves the formulaic and theological weight better than the more
    interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The prepositional phrase marks Ezekiel as the recipient of the divine
    word. 'To me' is natural modern English and fully accurate.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in standard
    Hebrew narrative and prophetic style. 'Saying' is the conventional and accurate
    English equivalent.
