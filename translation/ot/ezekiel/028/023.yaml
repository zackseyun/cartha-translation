id: EZK.28.23
reference: Ezekiel 28:23
source:
  edition: WLC
  text: וְ/שִׁלַּחְתִּי בָ֞/הּ דֶּ֤בֶר וָ/דָם֙ בְּ/ח֣וּצוֹתֶ֔י/הָ וְ/נִפְלַ֤ל חָלָל֙
    בְּ/תוֹכָ֔/הּ בְּ/חֶ֥רֶב עָלֶ֖י/הָ מִ/סָּבִ֑יב וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־־׃
translation:
  text: And I will send pestilence into her, and blood into her streets; the slain
    will fall in her midst by the sword against her on every side. Then they will
    know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bloodshed into her streets.' The Hebrew reads literally 'blood,' likely
      referring to violent bloodshed in the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: And I will send
  alternatives:
  - And I will dispatch
  - And I will send forth
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    as a future declaration from God. 'Send' is the plain and idiomatic English equivalent.
- source_word: דֶּבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: In prophetic judgment contexts, דֶּבֶר commonly denotes epidemic disease
    sent as divine judgment. 'Pestilence' preserves that formal, covenant-judgment
    sense better than the broader 'disease'.
- source_word: וָדָם
  chosen: and blood
  alternatives:
  - and bloodshed
  lexicon: HALOT
  rationale: The Hebrew noun is literally 'blood.' In context it implies violent bloodshed,
    but the text itself uses the concrete term, so the main text keeps 'blood' rather
    than interpreting more expansively.
- source_word: בְּחוּצוֹתֶיהָ
  chosen: into her streets
  alternatives:
  - in her streets
  - into her open places
  lexicon: HALOT
  rationale: חוּצוֹת refers to streets or public places of a city. Because this phrase
    is governed by the same sending verb as the previous object, 'into her streets'
    makes the English syntax clear while preserving the spatial sense.
- source_word: וְנִפְלַל חָלָל
  chosen: the slain will fall
  alternatives:
  - the wounded will fall
  - the pierced will fall
  lexicon: HALOT
  rationale: Though the verb form is unusual in pointing, the clause clearly conveys
    fallen casualties. חָלָל in this context is best rendered 'the slain,' a standard
    prophetic term for those killed in battle or judgment.
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the middle of her
  lexicon: HALOT
  rationale: A common idiom for the interior of a city or people under judgment. 'In
    her midst' is natural and retains the elevated prophetic register.
- source_word: בְּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death through warfare or violent judgment. 'By the
    sword' is the most idiomatic English equivalent in biblical style.
- source_word: עָלֶיהָ מִסָּבִיב
  chosen: against her on every side
  alternatives:
  - upon her all around
  - against her from all around
  lexicon: HALOT
  rationale: The phrase intensifies the image of attack surrounding the city. 'Against
    her on every side' communicates hostile encirclement clearly in modern English.
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: The conjunction marks result. 'Then' brings out the consequential force
    in English without overtranslating.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated project
    standard.
