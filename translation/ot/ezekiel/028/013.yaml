id: EZK.28.13
reference: Ezekiel 28:13
source:
  edition: WLC
  text: בְּ/עֵ֨דֶן גַּן אֱלֹהִ֜ים הָיִ֗יתָ כָּל אֶ֨בֶן יְקָרָ֤ה מְסֻכָתֶ֨/ךָ֙ אֹ֣דֶם
    פִּטְדָ֞ה וְ/יָהֲלֹ֗ם תַּרְשִׁ֥ישׁ שֹׁ֨הַם֙ וְ/יָ֣שְׁפֵ֔ה סַפִּ֣יר נֹ֔פֶךְ וּ/בָרְקַ֖ת
    וְ/זָהָ֑ב מְלֶ֨אכֶת תֻּפֶּ֤י/ךָ וּ/נְקָבֶ֨י/ךָ֙ בָּ֔/ךְ בְּ/י֥וֹם הִבָּרַאֲ/ךָ֖
    כּוֹנָֽנוּ־־׃
translation:
  text: 'You were in Eden, the garden of God; every precious stone was your covering:
    ruby, topaz, and diamond; beryl, onyx, and jasper; sapphire, turquoise, and emerald;
    and gold. The workmanship of your tambourines and your pipes was in you; on the
    day you were created, they were prepared.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The precise identification of several stones in this verse is uncertain;
      ancient gemstone names do not always correspond exactly to modern terms. Possible
      alternatives include carnelian for 'ruby,' chrysolite for 'topaz' or 'beryl,'
      lapis lazuli for 'sapphire,' and carbuncle for 'turquoise' or 'emerald.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'The workmanship of your settings and your mountings was in you,' taking
      the difficult Hebrew terms as referring to jewelry craftsmanship rather than
      musical instruments.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעֵדֶן גַּן אֱלֹהִים
  chosen: in Eden, the garden of God
  alternatives:
  - in Eden, God's garden
  lexicon: HALOT
  rationale: Retains the appositional structure and the proper name Eden. 'Garden
    of God' is a transparent rendering of the construct chain and preserves the elevated,
    sacred setting.
- source_word: הָיִיתָ
  chosen: you were
  alternatives:
  - you came to be
  lexicon: HALOT
  rationale: Simple past of היה fits the descriptive recollection in context.
- source_word: כָּל אֶבֶן יְקָרָה
  chosen: every precious stone
  alternatives:
  - every valuable stone
  lexicon: HALOT
  rationale: Standard rendering of the phrase; 'precious' is idiomatic in English
    for gemstones.
- source_word: מְסֻכָתֶךָ
  chosen: was your covering
  alternatives:
  - covered you
  - was your adornment
  lexicon: HALOT
  rationale: The noun from סכך denotes a covering. 'Was your covering' preserves the
    nominal syntax and leaves open whether the sense is clothing, ornamentation, or
    protective overlay.
- source_word: אֹדֶם
  chosen: ruby
  alternatives:
  - carnelian
  - sardius
  lexicon: HALOT
  rationale: The exact gemstone identification is uncertain. 'Ruby' is a familiar
    modern equivalent, while alternatives are preserved because ancient gem terminology
    does not map neatly onto modern mineralogy.
- source_word: פִּטְדָה
  chosen: topaz
  alternatives:
  - chrysolite
  lexicon: HALOT
  rationale: A common traditional identification; uncertainty remains, so an alternative
    is footnoted.
- source_word: יָהֲלֹם
  chosen: diamond
  alternatives:
  - jasper
  - onyx
  lexicon: HALOT
  rationale: Traditional rendering is retained for readability, though the precise
    stone is debated.
- source_word: תַּרְשִׁישׁ
  chosen: beryl
  alternatives:
  - chrysolite
  lexicon: HALOT
  rationale: Common scholarly rendering in gemstone lists; exact identification remains
    uncertain.
- source_word: שֹׁהַם
  chosen: onyx
  alternatives:
  - beryl
  lexicon: HALOT
  rationale: Traditional and widely recognized rendering in priestly gemstone contexts.
- source_word: יָשְׁפֵה
  chosen: jasper
  lexicon: HALOT
  rationale: Standard rendering with relatively broad agreement.
- source_word: סַפִּיר
  chosen: sapphire
  alternatives:
  - lapis lazuli
  lexicon: HALOT
  rationale: Traditional rendering is retained in the main text, but 'lapis lazuli'
    is a strong historical candidate and worth preserving in a footnote.
- source_word: נֹפֶךְ
  chosen: turquoise
  alternatives:
  - carbuncle
  - garnet
  lexicon: HALOT
  rationale: The stone is uncertain; 'turquoise' is a readable modern choice, with
    alternatives preserved.
- source_word: בָרְקַת
  chosen: emerald
  alternatives:
  - carbuncle
  lexicon: HALOT
  rationale: Traditional rendering retained, though the exact identification is debated.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward rendering.
- source_word: מְלֶאכֶת
  chosen: the workmanship of
  alternatives:
  - the craft of
  - the setting of
  lexicon: HALOT
  rationale: מלאכה here refers to crafted work or workmanship. This fits the description
    of fashioned ornamentation or instruments.
- source_word: תֻּפֶּיךָ
  chosen: your tambourines
  alternatives:
  - your settings
  - your timbrels
  lexicon: HALOT
  rationale: The consonantal text naturally suggests 'tambourines/timbrels,' a traditional
    rendering. However, because the context is a gemstone list, some understand a
    jewelry-related term such as 'settings'; this alternative is preserved in a footnote
    rather than resolved dogmatically.
- source_word: וּנְקָבֶיךָ
  chosen: your pipes
  alternatives:
  - your sockets
  - your mountings
  lexicon: HALOT
  rationale: Traditionally rendered 'pipes' alongside 'tambourines,' but the term
    can also be understood in a craftsmanship/jewelry sense ('settings/sockets').
    Because the Hebrew is difficult, the main text keeps the traditional reading while
    preserving the alternative in a footnote.
- source_word: בָּךְ
  chosen: was in you
  alternatives:
  - were with you
  - belonged to you
  lexicon: HALOT
  rationale: The preposition plus pronoun is rendered literally enough to preserve
    the internal/possessive nuance without overinterpreting.
- source_word: בְּיוֹם הִבָּרַאֲךָ
  chosen: on the day you were created
  alternatives:
  - when you were created
  lexicon: HALOT
  rationale: Formal enough to preserve the temporal phrase and the passive divine-creation
    language.
- source_word: כּוֹנָנוּ
  chosen: they were prepared
  alternatives:
  - they were established
  - they were made ready
  lexicon: HALOT
  rationale: The passive sense fits the context of crafted elements being readied
    at creation.
