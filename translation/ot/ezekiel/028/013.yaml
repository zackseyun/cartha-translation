theological_decisions:
- issue: Identity and imagery of the addressee in Ezekiel 28:13
  chosen_reading: Translate the verse's exalted Eden imagery straightforwardly without
    importing a specific doctrinal identification (human king only, mythic figure,
    or Satan) into the wording.
  alternative_readings:
  - A taunt directed solely at the king of Tyre using hyperbolic royal imagery
  - A dual-reference passage with typological or allusive application to Satan/fallen
    cherub
  rationale: The verse uses Edenic and creation language, but the translation should
    preserve the imagery without resolving the larger interpretive debate in the wording
    itself. This follows the principle of preserving theological tension rather than
    importing conclusions not explicit in the text.
  doctrine_reference: Translation philosophy §3
