id: EZK.28.12
reference: Ezekiel 28:12
source:
  edition: WLC
  text: בֶּן אָדָ֕ם שָׂ֥א קִינָ֖ה עַל מֶ֣לֶךְ צ֑וֹר וְ/אָמַ֣רְתָּ לּ֗/וֹ כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה אַתָּה֙ חוֹתֵ֣ם תָּכְנִ֔ית מָלֵ֥א חָכְמָ֖ה וּ/כְלִ֥יל יֹֽפִי־־׃
translation:
  text: 'Son of man, raise a lament over the king of Tyre, and say to him, ‘Thus says the Lord GOD: You were the seal of perfection, full of wisdom and perfect in beauty.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You are the seal of perfection'; the Hebrew lacks an explicit copular verb, and the tense is supplied from context.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the seal of perfection'; alternatively, 'the signet of perfection' or 'the one sealing the pattern.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A fixed address to Ezekiel. Retaining the traditional, more formal 'Son of man' preserves the idiom and its literary resonance better than smoothing to 'human one' or 'mortal.' 'אָדָם' here refers to a human being, but the collocation functions as a title-like address.
- source_word: שָׂא
  chosen: raise
  alternatives:
  - take up
  - lift up
  lexicon: HALOT
  rationale: In the idiom 'raise/take up a lament,' the verb means to utter or begin a lamentation. 'Raise' is natural modern English while staying close to the Hebrew image.
- source_word: קִינָה
  chosen: lament
  alternatives:
  - dirge
  lexicon: HALOT
  rationale: '''Lament'' is the clearest accessible rendering. ''Dirge'' is possible but more marked and less natural for contemporary readers.'
- source_word: עַל
  chosen: over
  alternatives:
  - concerning
  - against
  lexicon: HALOT
  rationale: With lament language, 'over' is the most idiomatic English equivalent, conveying the object of mourning/oracle.
- source_word: מֶלֶךְ צֹר
  chosen: the king of Tyre
  lexicon: HALOT
  rationale: Straightforward rendering of the construct phrase with standard English transliteration of the place name.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord Yahweh
  - Thus says the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, English convention uses 'Lord GOD' to distinguish the two divine names/titles without awkward repetition ('Lord LORD').
- source_word: אַתָּה
  chosen: You were
  alternatives:
  - You are
  lexicon: HALOT
  rationale: Although the pronoun itself is simply 'you,' English requires a copular verb. Given the lament context over the king's downfall and the following description of former splendor, the past tense is the best contextual rendering in English.
- source_word: חוֹתֵם
  chosen: the seal
  alternatives:
  - sealing
  - signet
  - one who seals
  lexicon: HALOT
  rationale: The participle is difficult, but in context it most plausibly denotes that which marks or embodies completeness, hence 'the seal.' This yields a coherent phrase in English with the following noun. 'Signet' is possible but less clear; 'one who seals' is too wooden here.
- source_word: תָּכְנִית
  chosen: of perfection
  alternatives:
  - of proportion
  - of pattern
  - of completeness
  lexicon: HALOT
  rationale: The noun can denote pattern, arrangement, or measured form. In this context of idealized wisdom and beauty, 'perfection' best captures the sense of consummate completeness in idiomatic English. The more literal 'pattern' is possible but less intelligible in this collocation.
- source_word: מָלֵא חָכְמָה
  chosen: full of wisdom
  lexicon: HALOT
  rationale: A direct and natural rendering of the adjective-noun phrase.
- source_word: וּכְלִיל יֹפִי
  chosen: and perfect in beauty
  alternatives:
  - and complete in beauty
  - and full of beauty
  lexicon: HALOT
  rationale: כְלִיל conveys completeness/wholeness. 'Perfect in beauty' is idiomatic English and matches the elevated poetic register of the lament.
