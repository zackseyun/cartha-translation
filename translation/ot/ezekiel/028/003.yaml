id: EZK.28.3
reference: Ezekiel 28:3
source:
  edition: WLC
  text: הִנֵּ֥ה חָכָ֛ם אַתָּ֖ה מ/דנאל כָּל סָת֖וּם לֹ֥א עֲמָמֽוּ/ךָ־׃
translation:
  text: Look, you are wiser than Danel; no hidden thing is obscure to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Danel'; traditionally 'Daniel.' The spelling here lacks the yod
      found in the more familiar form, so the main text preserves the Hebrew form
      while noting the traditional identification.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces an emphatic assertion. 'Look' preserves the deictic force
    in readable modern English better than the more archaic 'Behold.'
- source_word: חָכָם
  chosen: wiser
  alternatives:
  - wise
  lexicon: HALOT
  rationale: Although formally an adjective ('wise'), the following preposition מ
    before the name marks comparison, so idiomatic English requires the comparative
    'wiser than.'
- source_word: מ/דנאל
  chosen: than Danel
  alternatives:
  - than Daniel
  lexicon: HALOT
  rationale: The consonantal form here is דנאל (Danel), not the more familiar later
    spelling Daniel. Since personal names are to be transliterated, the main text
    preserves 'Danel.' Because many readers will associate the figure with 'Daniel,'
    that alternative is preserved in a footnote.
- source_word: כָּל סָתוּם
  chosen: no hidden thing
  alternatives:
  - nothing hidden
  - no secret
  lexicon: HALOT
  rationale: The phrase denotes anything concealed or closed off. 'No hidden thing'
    keeps the concrete sense of the Hebrew while remaining natural in English. 'Secret'
    is possible but slightly more interpretive.
- source_word: לֹא עֲמָמוּךָ
  chosen: is obscure to you
  alternatives:
  - is hidden from you
  - they have not concealed from you
  - is too dark for you
  lexicon: HALOT
  rationale: 'From a verb conveying dimness/obscurity rather than simple concealment.
    With the preceding ''hidden thing,'' rendering it as ''is obscure to you'' preserves
    the wordplay-like distinction: nothing concealed remains unclear to him. Singular
    English predicate is used idiomatically with the distributive sense of כָּל.'
