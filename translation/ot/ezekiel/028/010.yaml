id: EZK.28.10
reference: Ezekiel 28:10
source:
  edition: WLC
  text: מוֹתֵ֧י עֲרֵלִ֛ים תָּמ֖וּת בְּ/יַד זָרִ֑ים כִּ֚י אֲנִ֣י דִבַּ֔רְתִּי נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃ס
translation:
  text: You will die the death of the uncircumcised by the hand of foreigners, for I have spoken, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the deaths of the uncircumcised you will die,' an idiom meaning you will die a death like that of the uncircumcised.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹתֵי
  chosen: the death of
  alternatives:
  - deaths of
  - a death like that of
  lexicon: HALOT
  rationale: Construct plural of מות used idiomatically with the following verb תמות to intensify or specify manner of death. English singular 'the death of' best conveys the Hebrew idiom without awkward literalism.
- source_word: עֲרֵלִים
  chosen: the uncircumcised
  alternatives:
  - uncircumcised men
  lexicon: HALOT
  rationale: Retains the covenantal and shame-laden force of the Hebrew adjective used substantivally. 'The uncircumcised' is a standard and transparent English equivalent.
- source_word: תָּמוּת
  chosen: you will die
  alternatives:
  - you shall die
  lexicon: HALOT
  rationale: Qal imperfect 2ms with future force in prophetic judgment. 'You will die' is natural modern English while preserving direct address.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - at the hand of
  - by
  lexicon: HALOT
  rationale: This Hebrew idiom denotes agency or instrumentality. 'By the hand of' preserves the vividness of the source while remaining idiomatic in English.
- source_word: זָרִים
  chosen: foreigners
  alternatives:
  - strangers
  - aliens
  lexicon: HALOT
  rationale: In this judgment context the word refers to foreign people, not merely unknown persons. 'Foreigners' is clear modern English and fits Ezekiel's usage.
- source_word: כִּי אֲנִי דִבַּרְתִּי
  chosen: for I have spoken
  alternatives:
  - because I have spoken
  - for I myself have spoken
  lexicon: HALOT
  rationale: Introduces the divine ground and certainty of the judgment. 'For I have spoken' is concise and preserves the completed force of the perfect.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - utterance of
  - oracle of
  lexicon: HALOT
  rationale: Prophetic formula best rendered with an English reporting verb. 'Declares' is readable modern English and preserves solemn prophetic authority.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following project doctrine, יהוה is rendered 'the LORD' by default; in the fixed Hebrew title אֲדֹנָי יְהוִה, standard English convention is 'the Lord GOD' to avoid 'Lord LORD.' Small caps cannot be represented in the tool field, so 'GOD' signals the divine name.
