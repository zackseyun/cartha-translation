id: EZK.28.8
reference: Ezekiel 28:8
source:
  edition: WLC
  text: לַ/שַּׁ֖חַת יֽוֹרִד֑וּ/ךָ וָ/מַ֛תָּה מְמוֹתֵ֥י חָלָ֖ל בְּ/לֵ֥ב יַמִּֽים׃
translation:
  text: They will bring you down to the pit, and you will die the death of one slain
    in the heart of the seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the grave" or "to destruction"; Hebrew "to the pit."
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally "the deaths of one slain," an idiom for a violent death.
    reason: lexical_alternative
  - marker: c
    text: Or "in the midst of the seas."
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשַּׁחַת
  chosen: to the pit
  alternatives:
  - to the grave
  - to the destruction
  - to the abyss
  lexicon: HALOT
  rationale: שַׁחַת can denote a pit, grave, or destruction. Here with the verb 'bring
    down' it evokes descent to a deadly pit or grave. 'Pit' preserves the concrete
    imagery and avoids over-interpreting it as either merely abstract destruction
    or a specific underworld term.
- source_word: יוֹרִדוּךָ
  chosen: they will bring you down
  alternatives:
  - they will cast you down
  - they will make you go down
  lexicon: HALOT
  rationale: 'Hiphil of ירד with 2ms suffix is causative: ''they will bring/cause
    you to go down.'' ''Bring you down'' is idiomatic and preserves the causative
    force without adding violence beyond the text.'
- source_word: וָמַתָּה
  chosen: and you will die
  alternatives:
  - and you shall die
  lexicon: HALOT
  rationale: Simple rendering of the qatal with prefixed conjunction in prophetic
    discourse. 'Will die' fits modern readable English while preserving the predictive
    force.
- source_word: מְמוֹתֵי חָלָל
  chosen: the death of one slain
  alternatives:
  - the deaths of the slain
  - a violent death
  - the death of the slain
  lexicon: HALOT
  rationale: The plural construct 'deaths of' is an idiomatic intensive expression
    in Hebrew. Rendering it woodenly as 'deaths' is awkward in English. 'The death
    of one slain' captures the sense of a violent, slaughtered death while staying
    close to the Hebrew imagery.
- source_word: חָלָל
  chosen: one slain
  alternatives:
  - the slain
  - a pierced one
  - one mortally wounded
  lexicon: HALOT
  rationale: חָלָל commonly denotes one slain or fatally wounded. 'One slain' is natural
    in English and fits the singular sense in context after smoothing the Hebrew idiom.
- source_word: בְּלֵב יַמִּים
  chosen: in the heart of the seas
  alternatives:
  - in the midst of the seas
  - in the middle of the seas
  lexicon: HALOT
  rationale: לֵב literally means 'heart,' and in spatial idiom refers to the midst
    or center. 'In the heart of the seas' preserves the vivid metaphor and matches
    Ezekiel's repeated maritime imagery for Tyre.
