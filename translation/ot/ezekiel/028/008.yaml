theological_decisions:
- issue: Whether שַׁחַת should be rendered with a more theologically loaded underworld
    term
  chosen_reading: to the pit
  alternative_readings:
  - to the grave
  - to the abyss
  rationale: The verse speaks of judgment and death, but the Hebrew term itself does
    not require a specific doctrine of the afterlife here. 'Pit' preserves the imagery
    without importing later theological specificity.
  doctrine_reference: Translation philosophy §1, §3
