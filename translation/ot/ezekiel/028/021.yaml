theological_decisions:
- issue: Rendering the address בֶּן אָדָם in Ezekiel
  chosen_reading: Son of man
  alternative_readings:
  - human one
  - mortal
  rationale: This is not a christological title here but a repeated divine address
    to Ezekiel. The chosen rendering preserves the recognizable Hebrew idiom and literary
    consistency across Ezekiel without importing messianic meaning.
