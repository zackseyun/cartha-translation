id: EZK.28.21
reference: Ezekiel 28:21
source:
  edition: WLC
  text: בֶּן אָדָ֕ם שִׂ֥ים פָּנֶ֖י/ךָ אֶל צִיד֑וֹן וְ/הִנָּבֵ֖א עָלֶֽי/הָ־־׃
translation:
  text: Son of man, set your face toward Sidon, and prophesy against her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human one' or 'mortal.' Hebrew 'son of man,' a common form of address
      to Ezekiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Conventional and contextually appropriate rendering of Ezekiel’s vocative
    address. Although idiomatically it means a human being/mortal, 'Son of man' preserves
    the Hebrew expression and its repeated usage in Ezekiel more transparently than
    a dynamic substitute.
- source_word: שִׂים
  chosen: set
  alternatives:
  - direct
  - turn
  lexicon: HALOT
  rationale: In the imperative with 'your face,' the idiom means to set or direct
    one’s face toward someone or somewhere. 'Set' preserves the Hebrew idiom while
    remaining natural English.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - yourself
  - your attention
  lexicon: HALOT
  rationale: Literal rendering is preferable because 'set your face' is an established
    prophetic idiom in English and reflects the concrete Hebrew noun פנים.
- source_word: אֶל
  chosen: toward
  alternatives:
  - against
  - to
  lexicon: HALOT
  rationale: With 'set your face,' אֶל naturally means directional movement or orientation.
    'Toward' fits the idiom better than the more wooden 'to' and avoids prematurely
    importing hostility into this prepositional phrase.
- source_word: צִידוֹן
  chosen: Sidon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְהִנָּבֵא
  chosen: and prophesy
  alternatives:
  - and speak as a prophet
  lexicon: HALOT
  rationale: Direct rendering of the Niphal imperative of נבא. 'Prophesy' is the standard
    concise English equivalent in prophetic commissioning contexts.
- source_word: עָלֶיהָ
  chosen: against her
  alternatives:
  - concerning her
  - over her
  lexicon: HALOT
  rationale: In this prophetic judgment context, על with נבא commonly carries an adversative
    sense, 'against.' The feminine suffix refers to the city Sidon, naturally rendered
    'her' in English for a city personified as feminine in Hebrew.
