theological_decisions:
- issue: Sense of חַיִל in a taunt against the ruler of Tyre
  chosen_reading: material wealth
  alternative_readings:
  - strength
  - power
  - army/resources
  rationale: The immediate context specifies 'gold and silver' and 'treasuries,' so
    the verse is describing economic accumulation rather than military might in the
    main line. The broader semantic range is worth preserving because the word can
    include strength/resources.
