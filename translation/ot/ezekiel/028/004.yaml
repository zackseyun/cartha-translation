id: EZK.28.4
reference: Ezekiel 28:4
source:
  edition: WLC
  text: בְּ/חָכְמָֽתְ/ךָ֙ וּ/בִ/תְבוּנָ֣תְ/ךָ֔ עָשִׂ֥יתָ לְּ/ךָ֖ חָ֑יִל וַ/תַּ֛עַשׂ
    זָהָ֥ב וָ/כֶ֖סֶף בְּ/אוֹצְרוֹתֶֽי/ךָ׃
translation:
  text: By your wisdom and by your understanding you made wealth for yourself, and
    you put gold and silver into your treasuries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you made strength/power for yourself'; the Hebrew word can denote wealth,
      strength, or resources, but here the mention of gold, silver, and treasuries
      favors 'wealth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחָכְמָתְךָ
  chosen: By your wisdom
  alternatives:
  - With your wisdom
  lexicon: HALOT
  rationale: The preposition ב here is instrumental, indicating means. 'By your wisdom'
    is natural English and preserves the causal/instrumental sense.
- source_word: וּבִתְבוּנָתְךָ
  chosen: and by your understanding
  alternatives:
  - and by your insight
  lexicon: HALOT
  rationale: תְּבוּנָה denotes understanding, discernment, or insight. 'Understanding'
    pairs well with 'wisdom' and preserves the semantic distinction without overinterpreting.
- source_word: עָשִׂיתָ לְךָ חָיִל
  chosen: you made wealth for yourself
  alternatives:
  - you gained riches for yourself
  - you made power for yourself
  lexicon: HALOT
  rationale: חַיִל can mean strength, wealth, resources, or military power depending
    on context. Here the following clause about gold and silver in treasuries strongly
    favors material wealth. 'Made wealth for yourself' keeps the verbal link with
    עשה while expressing the economic sense.
- source_word: וַתַּעַשׂ
  chosen: you put
  alternatives:
  - you made
  - you acquired
  lexicon: HALOT
  rationale: Although עשה literally means 'make/do,' in this collocation with gold
    and silver and the prepositional phrase 'in your treasuries,' idiomatic English
    prefers 'put' to express the result of accumulating and storing wealth. This is
    an optimal-equivalence adjustment for readability while staying within the clause's
    sense.
- source_word: זָהָב וָכֶסֶף
  chosen: gold and silver
  lexicon: HALOT
  rationale: Standard literal rendering; the pair functions as a merism for precious
    wealth.
- source_word: בְּאוֹצְרוֹתֶיךָ
  chosen: into your treasuries
  alternatives:
  - in your storehouses
  - in your treasuries
  lexicon: HALOT
  rationale: אוֹצָר refers to a treasury, storehouse, or place of stored valuables.
    Because the contents are gold and silver, 'treasuries' is more precise than the
    broader 'storehouses.' 'Into' reflects the directional sense in idiomatic English
    for depositing valuables.
