theological_decisions:
- issue: Whether אֵל / אֱלֹהִים in the ruler's boast should be rendered as the singular
    true God or as generic/plural divinity
  chosen_reading: Render the boast as generic/plural divinity ('a god,' 'gods') rather
    than as a direct claim to be the God of Israel.
  alternative_readings:
  - I am God; I sit in the seat of God
  - I sit in the seat of God in the heart of the seas
  rationale: The context is a pagan ruler's arrogant self-deification. Hebrew אֵל
    can mean 'god,' and אֱלֹהִים may be read as plural or as a singular divine title
    depending on context. Here the rhetoric of self-exaltation and the maritime setting
    favor a claim to divinity in general rather than identification with YHWH specifically.
    The singular alternative remains plausible and should be preserved in a footnote
    rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה
    rendered as the LORD, while other divine terms are translated by context.
