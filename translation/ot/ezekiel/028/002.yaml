id: EZK.28.2
reference: Ezekiel 28:2
source:
  edition: WLC
  text: בֶּן אָדָ֡ם אֱמֹר֩ לִ/נְגִ֨יד צֹ֜ר כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה יַ֣עַן
    גָּבַ֤הּ לִבְּ/ךָ֙ וַ/תֹּ֨אמֶר֙ אֵ֣ל אָ֔נִי מוֹשַׁ֧ב אֱלֹהִ֛ים יָשַׁ֖בְתִּי בְּ/לֵ֣ב
    יַמִּ֑ים וְ/אַתָּ֤ה אָדָם֙ וְֽ/לֹא אֵ֔ל וַ/תִּתֵּ֥ן לִבְּ/ךָ֖ כְּ/לֵ֥ב אֱלֹהִֽים־־׀־׃
translation:
  text: 'Son of man, say to the prince of Tyre, ‘Thus says the Lord GOD: Because your
    heart is proud, and you say, “I am a god; I sit in the seat of gods in the heart
    of the seas,” yet you are a man and not a god, though you set your heart like
    the heart of gods.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I am God; I sit in the seat of God in the heart of the seas.” Hebrew
      אֵל / אֱלֹהִים here can be read in a singular sense.
    reason: alternative_reading
  - marker: b
    text: Or, “you set your heart like the heart of God.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard prophetic address in Ezekiel. Retaining the familiar singular
    expression preserves the Hebrew idiom and its force as a designation for the prophet,
    rather than flattening it to a generic paraphrase.
- source_word: לִנְגִיד צֹר
  chosen: to the prince of Tyre
  alternatives:
  - to the ruler of Tyre
  - to the leader of Tyre
  lexicon: HALOT
  rationale: נָגִיד commonly denotes a leader, ruler, or prince. 'Prince' is a natural
    English rendering here and preserves the distinction from a divine or royal claim
    without overstating it as 'king' in this verse.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default for יְהוָה as 'the LORD.' In the compound
    title אֲדֹנָי יְהוִה, English convention renders this as 'the Lord GOD' to avoid
    'Lord LORD' while still translating both elements.
- source_word: יַעַן גָּבַהּ לִבְּךָ
  chosen: Because your heart is proud
  alternatives:
  - Because your heart is lifted up
  - Because your heart has become haughty
  lexicon: HALOT
  rationale: The Hebrew literally speaks of the heart being high/exalted. 'Your heart
    is proud' communicates the idiomatic sense in clear modern English while preserving
    the causal force of יַעַן.
- source_word: אֵל אֲנִי
  chosen: I am a god
  alternatives:
  - I am God
  - I am divine
  lexicon: HALOT
  rationale: אֵל here lacks markers requiring the unique God of Israel and is part
    of the ruler's blasphemous self-exaltation. Lowercase 'a god' best reflects the
    Hebrew form and immediate context.
- source_word: מוֹשַׁב אֱלֹהִים
  chosen: the seat of gods
  alternatives:
  - the seat of God
  - the dwelling place of gods
  - a divine seat
  lexicon: HALOT
  rationale: מוֹשַׁב denotes seat, dwelling, or place of sitting. With plural אֱלֹהִים
    and the surrounding boastful language, 'the seat of gods' best preserves the imagery
    of a divine council or divine realm claim. The singular alternative is worth preserving
    in a footnote because אֱלֹהִים can sometimes function singularly.
- source_word: בְּלֵב יַמִּים
  chosen: in the heart of the seas
  alternatives:
  - in the midst of the seas
  - at the heart of the seas
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid Hebrew image. 'Heart'
    is understandable in English and matches the metaphorical center/midst sense.
- source_word: וְאַתָּה אָדָם וְלֹא אֵל
  chosen: yet you are a man and not a god
  alternatives:
  - but you are man and not God
  - but you are human and not a god
  lexicon: HALOT
  rationale: אָדָם here contrasts mortal humanity with claimed divinity. Per doctrine,
    gender-accurate rendering is preferred; since the addressee is an individual male
    ruler, 'a man' is appropriate.
- source_word: וַתִּתֵּן לִבְּךָ כְּלֵב אֱלֹהִים
  chosen: though you set your heart like the heart of gods
  alternatives:
  - and you set your heart as the heart of God
  - and you make your mind like the mind of gods
  lexicon: HALOT
  rationale: The idiom 'set your heart' conveys self-disposition or self-estimation.
    Retaining 'heart' preserves the Hebrew anthropology. The comparison with אֱלֹהִים
    is rendered plurally to match the earlier boast and maintain internal coherence,
    while a singular alternative is preserved in a footnote.
