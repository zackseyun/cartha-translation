theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of וְנִקְדַּשְׁתִּי בָם
  chosen_reading: I show myself holy through them
  alternative_readings:
  - I will be sanctified in them
  - I will prove myself holy through them
  rationale: The phrase concerns God's holiness being publicly manifested among the nations by his action in restoring Israel. The chosen rendering preserves the theological emphasis on God's holiness being displayed, without implying moral improvement in God himself.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
