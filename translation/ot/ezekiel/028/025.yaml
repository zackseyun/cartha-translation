id: EZK.28.25
reference: Ezekiel 28:25
source:
  edition: WLC
  text: כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ בְּ/קַבְּצִ֣/י אֶת בֵּ֣ית יִשְׂרָאֵ֗ל מִן הָֽ/עַמִּים֙ אֲשֶׁ֣ר נָפֹ֣צוּ בָ֔/ם וְ/נִקְדַּ֥שְׁתִּי בָ֖/ם לְ/עֵינֵ֣י הַ/גּוֹיִ֑ם וְ/יָֽשְׁבוּ֙ עַל אַדְמָתָ֔/ם אֲשֶׁ֥ר נָתַ֖תִּי לְ/עַבְדִּ֥/י לְ/יַעֲקֹֽב־׀־־־׃
translation:
  text: 'Thus says the Lord GOD: When I gather the house of Israel from the peoples among whom they were scattered, and I show myself holy among them in the sight of the nations, then they will dwell on their own land that I gave to my servant Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I will be sanctified in them' or 'I will prove myself holy through them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Renders the divine title pair in standard English prophetic style. Per doctrine, יְהוָה defaults to 'the LORD'; in the compound אֲדֹנָי יְהוִה, English convention commonly uses 'Lord GOD' to avoid 'Lord LORD' while preserving both elements.
- source_word: בְּקַבְּצִי
  chosen: When I gather
  alternatives:
  - in my gathering
  - as I gather
  lexicon: HALOT
  rationale: The prefixed ב plus infinitive construct with 1cs suffix is temporal here, naturally rendered 'when I gather' in English.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: Keeps the covenantal corporate expression rather than flattening it to 'people of Israel.'
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים often denotes peoples/ethnic groups. 'Peoples' avoids confusion with the later גּוֹיִם, which is rendered 'nations' for distinction.
- source_word: נָפֹצוּ בָם
  chosen: among whom they were scattered
  alternatives:
  - into whom they were dispersed
  - where they were scattered
  lexicon: HALOT
  rationale: Passive Niphal of פוץ indicates being scattered; בָם is best expressed idiomatically as 'among whom' with reference to the peoples.
- source_word: וְנִקְדַּשְׁתִּי בָם
  chosen: I show myself holy through them
  alternatives:
  - I will be sanctified in them
  - I will prove myself holy through them
  lexicon: HALOT
  rationale: The Niphal of קדשׁ with God as subject often means being shown/proved holy before observers. 'Through them' captures בָם instrumentally/locatively in context. This balances literal sense with readable English.
- source_word: לְעֵינֵי הַגּוֹיִם
  chosen: in the sight of the nations
  alternatives:
  - before the eyes of the nations
  - before the nations
  lexicon: HALOT
  rationale: A standard idiom meaning publicly before the nations; 'in the sight of' is natural and preserves the visual/public force.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In this prophetic geopolitical context, 'nations' is the clearest rendering.
- source_word: וְיָשְׁבוּ עַל אַדְמָתָם
  chosen: then they will dwell on their own land
  alternatives:
  - and they will live on their land
  - and they will settle on their soil
  lexicon: HALOT
  rationale: יָשַׁב here denotes settled dwelling. 'Their own land' makes explicit the possessive force of the suffix in idiomatic English.
- source_word: אַדְמָתָם
  chosen: their own land
  alternatives:
  - their land
  - their soil
  lexicon: HALOT
  rationale: אֲדָמָה can mean ground/land; in restoration context 'land' is the natural choice.
- source_word: אֲשֶׁר נָתַתִּי לְעַבְדִּי לְיַעֲקֹב
  chosen: that I gave to my servant Jacob
  alternatives:
  - which I gave to Jacob my servant
  lexicon: HALOT
  rationale: Both English orders are possible; this one is smooth and preserves the covenantal designation 'my servant Jacob.'
