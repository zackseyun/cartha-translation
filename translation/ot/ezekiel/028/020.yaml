id: EZK.28.20
reference: Ezekiel 28:20
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the prophetic formula ויהי דבר־יהוה אלי, English idiom is best served by rendering the clause as 'the word of the LORD came to me' rather than the more wooden 'and the word of the LORD was to me.' This preserves the standard sense of the formula without unnecessary awkwardness.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר here refers to the prophetic word/message from God. 'The word' preserves the established prophetic formula and its theological weight better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The prepositional phrase marks Ezekiel as the recipient of the prophetic word. 'To me' is the natural modern English equivalent.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in the next verse. 'Saying' is the standard and sufficiently formal rendering that preserves the discourse linkage.
