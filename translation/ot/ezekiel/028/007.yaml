theological_decisions:
- issue: Referent and tone in the oracle against the ruler of Tyre
  chosen_reading: Translate the verse as a historical-prophetic judgment against the
    addressed ruler/city without importing later theological identifications into
    the main text.
  alternative_readings:
  - Read the language typologically as also echoing a cosmic fall motif
  rationale: The verse itself speaks directly of foreign invaders, swords, wisdom,
    and splendor in a judgment oracle. The translation should preserve the immediate
    historical sense and not embed a debated typological or satanic interpretation
    into the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
