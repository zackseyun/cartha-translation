id: EZK.28.7
reference: Ezekiel 28:7
source:
  edition: WLC
  text: לָ/כֵ֗ן הִנְ/נִ֨י מֵבִ֤יא עָלֶ֨י/ךָ֙ זָרִ֔ים עָרִיצֵ֖י גּוֹיִ֑ם וְ/הֵרִ֤יקוּ
    חַרְבוֹתָ/ם֙ עַל יְפִ֣י חָכְמָתֶ֔/ךָ וְ/חִלְּל֖וּ יִפְעָתֶֽ/ךָ־׃
translation:
  text: Therefore, behold, I am bringing strangers against you, the most ruthless
    of the nations; they will draw their swords against the beauty of your wisdom,
    and they will defile your splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners' for 'strangers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will unsheathe their swords.' Literally, 'they will empty out their
      swords.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they will profane your radiance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding
    accusation/judgment.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - see, I am
  lexicon: HALOT
  rationale: Prophetic deictic formula marking solemn divine announcement. Retaining
    'behold' preserves the elevated prophetic tone without excessive archaism in this
    context.
- source_word: מֵבִיא עָלֶיךָ
  chosen: I am bringing against you
  alternatives:
  - I will bring against you
  - I am about to bring against you
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent future with vividness.
    'I am bringing' preserves the Hebrew aspectual force while remaining natural English.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - outsiders
  lexicon: HALOT
  rationale: זָרִים denotes those who are foreign/alien. 'Strangers' is a close formal
    rendering and fits the judgment context; 'foreigners' is possible but slightly
    more interpretive.
- source_word: עָרִיצֵי גּוֹיִם
  chosen: the most ruthless of the nations
  alternatives:
  - the ruthless ones of the nations
  - the terrible ones of the nations
  - the tyrants of the nations
  lexicon: HALOT
  rationale: עָרִיץ commonly carries the sense of ruthless, violent, or terrifying
    oppressor. In construct with 'nations,' the phrase identifies especially brutal
    peoples from among the nations. 'The most ruthless of the nations' communicates
    the superlative-like force idiomatically.
- source_word: וְהֵרִיקוּ חַרְבוֹתָם
  chosen: they will draw their swords
  alternatives:
  - they will unsheathe their swords
  - they will empty out their swords
  lexicon: HALOT
  rationale: The verb literally means to empty/pour out; with swords it idiomatically
    means to draw or unsheathe them for attack. 'Draw their swords' is the clearest
    natural equivalent.
- source_word: עַל יְפִי חָכְמָתֶךָ
  chosen: against the beauty of your wisdom
  alternatives:
  - against your beautiful wisdom
  - upon the beauty of your wisdom
  lexicon: HALOT
  rationale: יְפִי denotes beauty, and the phrase is literally 'the beauty of your
    wisdom.' Retaining the genitive preserves the poetic expression and the irony
    that Tyre's celebrated wisdom will be assaulted.
- source_word: וְחִלְּלוּ
  chosen: they will defile
  alternatives:
  - they will profane
  - they will desecrate
  lexicon: HALOT
  rationale: חלל in the piel often means to profane/defile. Since the object here
    is the king's splendor rather than a cultic holy object, 'defile' is the most
    natural English choice while preserving the dishonoring sense.
- source_word: יִפְעָתֶךָ
  chosen: your splendor
  alternatives:
  - your radiance
  - your brightness
  - your appearance
  lexicon: HALOT
  rationale: The noun denotes shining appearance, radiance, or splendor. 'Splendor'
    fits the royal context and pairs well with the preceding 'beauty of your wisdom.'
