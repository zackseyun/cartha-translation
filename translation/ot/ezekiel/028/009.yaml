id: EZK.28.9
reference: Ezekiel 28:9
source:
  edition: WLC
  text: הֶ/אָמֹ֤ר תֹּאמַר֙ אֱלֹהִ֣ים אָ֔נִי לִ/פְנֵ֖י הֹֽרְגֶ֑/ךָ וְ/אַתָּ֥ה אָדָ֛ם
    וְ/לֹא אֵ֖ל בְּ/יַ֥ד מְחַלְלֶֽי/ךָ־׃
translation:
  text: Will you still say, ‘I am a god,’ before the one who kills you? But you are
    a man, and not a god, in the hand of those who profane you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Will you indeed say” or “Will you really keep saying”; the Hebrew uses
      an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man'; the contrast is between a human being and deity.
    reason: lexical_alternative
  - marker: c
    text: Or “those who defile you”; the Hebrew verb can carry the sense of profaning
      or desecrating, highlighting the humiliation of one who claimed to be divine.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָמֹר תֹּאמַר
  chosen: Will you still say
  alternatives:
  - Will you indeed say
  - Will you really keep saying
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of אמר intensifies the verbal
    idea. English conveys this naturally with an emphatic future-like question, here
    'Will you still say,' fitting the taunt in context without over-literal repetition.
- source_word: אֱלֹהִים
  chosen: a god
  alternatives:
  - God
  - divine
  lexicon: HALOT
  rationale: In this context the prince of Tyre claims divinity for himself (cf. v.
    2). Because the predicate lacks markers requiring the singular proper sense 'God,'
    and because the speaker is rebuking a human ruler's self-deification, 'a god'
    best captures the claim idiomatically in English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: A straightforward spatial-relational rendering fits the scene of confrontation
    with the killer.
- source_word: הֹרְגֶךָ
  chosen: the one who kills you
  alternatives:
  - your killer
  - the one slaying you
  lexicon: HALOT
  rationale: The participial form is rendered as an agentive expression. 'The one
    who kills you' preserves the active, imminent force better than the more static
    noun 'killer.'
- source_word: אָדָם
  chosen: a man
  alternatives:
  - human
  - mortal
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered gender-accurately according to context.
    Here it contrasts a human ruler with deity, so 'a man' is the most direct and
    rhetorically sharp rendering; 'mortal' is interpretive and better left as an alternative.
- source_word: אֵל
  chosen: a god
  alternatives:
  - God
  - divine being
  lexicon: HALOT
  rationale: The singular אל here parallels the earlier divinity claim and is best
    rendered 'a god' rather than 'God,' since the point is denial of the ruler's supposed
    deity, not a statement about Israel's God.
- source_word: בְּיַד
  chosen: in the hand of
  alternatives:
  - at the mercy of
  - under the power of
  lexicon: HALOT
  rationale: The idiom literally means being in someone's hand, expressing power or
    control. The literal rendering is clear in modern English and preserves the Hebrew
    imagery.
- source_word: מְחַלְלֶיךָ
  chosen: those who profane you
  alternatives:
  - those who wound you
  - those who defile you
  - those who pierce you
  lexicon: HALOT
  rationale: 'From חלל in the sense ''profane, defile, desecrate.'' In context of
    humiliating judgment, ''profane you'' preserves the irony: the one claiming divinity
    will be treated as common and desecrated. Alternatives like ''wound'' reflect
    other stems/usages but are less fitting here.'
