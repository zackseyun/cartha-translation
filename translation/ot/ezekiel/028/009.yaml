theological_decisions:
- issue: Rendering the ruler's self-deifying claim
  chosen_reading: I am a god ... you are a man, and not a god
  alternative_readings:
  - I am God ... you are man, and not God
  rationale: The verse mocks the prince of Tyre's claim to divinity rather than engaging
    in discourse about the true God by name. Using the indefinite in English best
    reflects the Hebrew predicates in context and avoids implying identification with
    Israel's God specifically, while still preserving the blasphemous self-exaltation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s plain sense'
- issue: Force of מחלליך
  chosen_reading: those who profane you
  alternative_readings:
  - those who wound you
  - those who defile you
  rationale: The judgment theme includes humiliation and desacralization of one who
    claimed divine status. 'Profane' preserves that theological irony more clearly
    than a merely physical term.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than flattening lexical weight'
