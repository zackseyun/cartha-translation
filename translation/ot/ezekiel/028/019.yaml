theological_decisions:
- issue: Force of the final annihilation formula in a taunt/judgment oracle
  chosen_reading: 'Render the clause as emphatic final disappearance: ''you will be
    no more forever.'''
  alternative_readings:
  - '''and you are no more forever'''
  - '''you will cease to exist forever'''
  rationale: The Hebrew existential negative plus עַד עוֹלָם expresses irreversible
    end. The translation preserves the text's rhetoric of total downfall without importing
    a broader doctrinal claim beyond the oracle itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
