id: EZK.28.19
reference: Ezekiel 28:19
source:
  edition: WLC
  text: כָּל יוֹדְעֶ֨י/ךָ֙ בָּֽ/עַמִּ֔ים שָׁמְמ֖וּ עָלֶ֑י/ךָ בַּלָּה֣וֹת הָיִ֔יתָ
    וְ/אֵינְ/ךָ֖ עַד עוֹלָֽם־־׃פ
translation:
  text: All who know you among the peoples are appalled at you; you have become a
    horror, and you will be no more forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have become terrors' / 'an object of terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Distributive/collective quantifier introducing the full scope of those
    affected. 'All' is idiomatic in English with the following plural participle.
- source_word: יוֹדְעֶיךָ
  chosen: who know you
  alternatives:
  - your acquaintances
  - those who knew you
  lexicon: HALOT
  rationale: Qal participle of ידע with 2ms suffix denotes those knowing the addressee.
    Present-like 'who know you' works as a general characterization; 'acquaintances'
    is too weak and 'knew' over-specifies past time.
- source_word: בָּעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  - among the peoples of the world
  lexicon: HALOT
  rationale: עַמִּים is plural 'peoples.' 'Among the peoples' preserves the preposition
    and avoids importing the more politically charged 'nations,' though that is possible
    in context.
- source_word: שָׁמְמוּ
  chosen: are appalled
  alternatives:
  - are astonished
  - are desolated
  - are horrified
  lexicon: HALOT
  rationale: The verb שמם in this context expresses stunned horror/desolation in reaction
    to judgment. 'Are appalled' captures the emotional force in natural English better
    than the more wooden 'are astonished.'
- source_word: עָלֶיךָ
  chosen: at you
  alternatives:
  - over you
  - because of you
  lexicon: HALOT
  rationale: With שמם, על marks the object/cause of astonishment. 'At you' is concise
    and idiomatic in English; 'over you' is also possible but can suggest sympathy
    more than shock.
- source_word: בַּלָּהוֹת
  chosen: a horror
  alternatives:
  - terrors
  - an object of terror
  lexicon: HALOT
  rationale: The plural noun can function idiomatically to denote a state/object of
    terror. Singular English 'a horror' communicates the predicate naturally. 'Terrors'
    is more literal in form but less idiomatic here.
- source_word: הָיִיתָ
  chosen: have become
  alternatives:
  - were
  - became
  lexicon: HALOT
  rationale: Though formally perfect 'you were/became,' in prophetic judgment speech
    the perfect often presents the result as certain or accomplished. 'Have become'
    conveys resultant state in smooth English.
- source_word: וְאֵינְךָ
  chosen: you will be no more
  alternatives:
  - and you are not
  - and you are no more
  - and you will not exist
  lexicon: HALOT
  rationale: The existential negative with suffix means 'you are not/no more.' In
    context of final judgment, English future 'you will be no more' best conveys the
    force for readers, while preserving the sense of disappearance.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - to everlasting
  lexicon: HALOT
  rationale: Standard idiom for enduring perpetuity. 'Forever' is clear modern English
    and preserves the finality of the oracle.
