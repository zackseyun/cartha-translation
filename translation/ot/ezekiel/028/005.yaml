theological_decisions:
- issue: Potentially broader sense of חֵיל as strength/power versus wealth
  chosen_reading: wealth
  alternative_readings:
  - power
  - riches
  - resources
  rationale: The oracle addresses the ruler of Tyre in a mercantile setting, and the
    immediate context emphasizes commercial success. Rendering both instances as 'wealth'
    preserves contextual coherence without importing a militaristic sense not demanded
    here.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering the pride idiom literally or idiomatically
  chosen_reading: your heart became proud
  alternative_readings:
  - your heart was lifted up
  rationale: Optimal equivalence favors a clear idiomatic English rendering while
    preserving the literal Hebrew image in a footnote for auditability.
  doctrine_reference: Translation philosophy §6
