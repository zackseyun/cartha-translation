id: EZK.28.5
reference: Ezekiel 28:5
source:
  edition: WLC
  text: בְּ/רֹ֧ב חָכְמָתְ/ךָ֛ בִּ/רְכֻלָּתְ/ךָ֖ הִרְבִּ֣יתָ חֵילֶ֑/ךָ וַ/יִּגְבַּ֥הּ
    לְבָבְ/ךָ֖ בְּ/חֵילֶֽ/ךָ׃ס
translation:
  text: By your great wisdom in your trade you increased your wealth, and your heart
    became proud because of your wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your trading' or 'by your commerce'; the Hebrew term refers to commercial
      activity.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your heart was lifted up,' an idiom for becoming proud.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew word rendered 'wealth' can also mean 'riches,' 'resources,' or
      in some contexts 'strength/power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב
  chosen: By your great
  alternatives:
  - in the abundance of your
  - through the greatness of your
  lexicon: HALOT
  rationale: 'The preposition ב plus רֹב expresses means or circumstance: ''by/through
    the abundance of.'' ''Great'' gives natural English while preserving the sense
    of magnitude.'
- source_word: חָכְמָתְךָ
  chosen: wisdom
  alternatives:
  - skill
  - shrewdness
  lexicon: HALOT
  rationale: חָכְמָה commonly means 'wisdom,' but in commercial context can shade
    toward practical skill or shrewdness. 'Wisdom' preserves the lexical core while
    allowing the ironic context to supply the nuance.
- source_word: בִּרְכֻלָּתְךָ
  chosen: in your trade
  alternatives:
  - by your trading
  - in your commerce
  - by your merchandise
  lexicon: HALOT
  rationale: רְכֻלָּה in Ezekiel often refers to commercial trading/traffic. 'Trade'
    is concise, idiomatic modern English, and fits the rebuke against Tyre's mercantile
    success. 'Merchandise' is possible but sounds more like goods than the activity
    itself.
- source_word: הִרְבִּיתָ
  chosen: you increased
  alternatives:
  - you multiplied
  - you made great
  lexicon: HALOT
  rationale: The Hiphil of רבה here means causing something to become numerous or
    great. 'You increased' is the most natural rendering with 'wealth' as the object.
- source_word: חֵילֶךָ
  chosen: wealth
  alternatives:
  - riches
  - power
  - resources
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, or resources. In this commercial context,
    'wealth' best fits both occurrences in the verse, though the semantic overlap
    with 'power' is worth preserving in a footnote.
- source_word: וַיִּגְבַּהּ לְבָבְךָ
  chosen: your heart became proud
  alternatives:
  - your heart was lifted up
  - your heart grew haughty
  lexicon: HALOT
  rationale: The idiom 'heart was high/lifted up' denotes pride or arrogance. 'Became
    proud' communicates the idiomatic sense clearly in modern English, while a footnote
    can preserve the more literal image.
- source_word: בְּחֵילֶךָ
  chosen: because of your wealth
  alternatives:
  - through your wealth
  - in your wealth
  - because of your riches
  lexicon: HALOT
  rationale: 'The preposition ב here likely marks occasion or cause: the heart became
    proud on account of wealth. ''Because of your wealth'' makes the causal relation
    explicit in idiomatic English.'
