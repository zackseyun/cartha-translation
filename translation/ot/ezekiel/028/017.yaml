id: EZK.28.17
reference: Ezekiel 28:17
source:
  edition: WLC
  text: גָּבַ֤הּ לִבְּ/ךָ֙ בְּ/יָפְיֶ֔/ךָ שִׁחַ֥תָּ חָכְמָתְ/ךָ֖ עַל יִפְעָתֶ֑/ךָ
    עַל אֶ֣רֶץ הִשְׁלַכְתִּ֗י/ךָ לִ/פְנֵ֧י מְלָכִ֛ים נְתַתִּ֖י/ךָ לְ/רַ֥אֲוָה בָֽ/ךְ־־׃
translation:
  text: Your heart was lifted up because of your beauty; you corrupted your wisdom
    because of your splendor. I cast you to the ground; I set you before kings, for
    them to look at you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your heart became proud because of your beauty; you ruined your wisdom
      because of your radiance.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I cast you to the earth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I made you a spectacle before kings.'
    reason: alternative_reading
lexical_decisions:
- source_word: גָּבַהּ לִבְּךָ
  chosen: Your heart was lifted up
  alternatives:
  - Your heart became proud
  - Your heart was exalted
  lexicon: HALOT
  rationale: The idiom literally speaks of the heart being high/exalted. 'Was lifted
    up' preserves the metaphor and the moral sense of pride without over-paraphrasing.
- source_word: בְּיָפְיֶךָ
  chosen: because of your beauty
  alternatives:
  - in your beauty
  - by your beauty
  lexicon: HALOT
  rationale: The preposition ב here is causal/instrumental in context. 'Because of
    your beauty' communicates the reason for the pride more naturally in English.
- source_word: שִׁחַתָּ
  chosen: you corrupted
  alternatives:
  - you ruined
  - you destroyed
  lexicon: HALOT
  rationale: The verb denotes spoiling or corrupting. 'Corrupted' fits the object
    'your wisdom' and preserves the moral/intellectual degradation implied.
- source_word: חָכְמָתְךָ
  chosen: your wisdom
  alternatives:
  - your skill
  lexicon: HALOT
  rationale: In Ezekiel's taunt over the ruler of Tyre, חכמה includes practical and
    political wisdom, but 'wisdom' remains the best broad rendering.
- source_word: עַל יִפְעָתֶךָ
  chosen: because of your splendor
  alternatives:
  - on account of your radiance
  - because of your brightness
  lexicon: HALOT
  rationale: The preposition עַל here is causal ('because of/on account of'). יפעה
    denotes shining appearance, splendor, or radiance. 'Splendor' is idiomatic and
    suits the parallel with 'beauty'.
- source_word: עַל אֶרֶץ
  chosen: to the ground
  alternatives:
  - to the earth
  - down to the land
  lexicon: HALOT
  rationale: Although ארץ often means 'earth/land,' in this judgment context 'to the
    ground' is the most natural English expression for being cast down.
- source_word: הִשְׁלַכְתִּיךָ
  chosen: I cast you
  alternatives:
  - I threw you
  - I hurled you
  lexicon: HALOT
  rationale: The Hiphil of שלך conveys forceful casting. 'Cast' is strong yet dignified
    and fits prophetic judgment style.
- source_word: לִפְנֵי מְלָכִים נְתַתִּיךָ
  chosen: I set you before kings
  alternatives:
  - I placed you before kings
  - I made you a spectacle before kings
  lexicon: HALOT
  rationale: The clause literally says 'I gave/set you before kings.' 'Set you before
    kings' preserves the formal imagery without importing 'spectacle' too early, since
    the next phrase explains the purpose.
- source_word: לְרַאֲוָה בָךְ
  chosen: for them to look at you
  alternatives:
  - for a spectacle of you
  - for viewing in you
  - to gaze at you
  lexicon: HALOT
  rationale: The infinitive of ראה with prefixed ל expresses purpose/result. The final
    בך is awkward in English if rendered woodenly. 'For them to look at you' captures
    the sense that kings behold him as an object lesson of judgment. A more formal
    alternative, 'as a spectacle,' is possible but less directly tied to the verbal
    root 'see'.
