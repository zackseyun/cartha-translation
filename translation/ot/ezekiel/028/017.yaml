theological_decisions:
- issue: Referent of the addressee in Ezekiel 28:17
  chosen_reading: The verse addresses the king/ruler of Tyre in prophetic taunt language,
    without resolving in translation whether the imagery also alludes typologically
    to a supernatural being.
  alternative_readings:
  - Purely human ruler
  - Human ruler with typological/symbolic allusion to a heavenly rebel
  rationale: The Hebrew text itself addresses a singular 'you' in elevated lament
    language. The translation should preserve the imagery of downfall and pride without
    importing a specific theological identification not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
