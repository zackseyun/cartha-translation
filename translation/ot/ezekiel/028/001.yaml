id: EZK.28.1
reference: Ezekiel 28:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential
    introduction. In English, the idiomatic sense is best carried by folding it into
    the clause 'And the word ... came' rather than the more wooden 'And it happened'
    or archaic 'And it came to pass.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In prophetic formulae, דָּבָר commonly denotes the divine word/message
    delivered to the prophet. 'The word' preserves the established prophetic idiom
    while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines for יְהוָה, the default rendering is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention that
    reflects the divine name without transliteration.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition with first-person singular suffix straightforwardly indicates
    direction toward the prophet. 'To me' is accurate and readable modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'with these words:'
  - 'thus:'
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. 'Saying,'
    is the most transparent and conventional rendering, especially since the following
    verse supplies the content.
