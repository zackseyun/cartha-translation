id: EZK.28.16
reference: Ezekiel 28:16
source:
  edition: WLC
  text: בְּ/רֹ֣ב רְכֻלָּתְ/ךָ֗ מָל֧וּ תוֹכְ/ךָ֛ חָמָ֖ס וַֽ/תֶּחֱטָ֑א וָ/אֶחַלֶּלְ/ךָ֩
    מֵ/הַ֨ר אֱלֹהִ֤ים וָֽ/אַבֶּדְ/ךָ֙ כְּר֣וּב הַ/סֹּכֵ֔ךְ מִ/תּ֖וֹךְ אַבְנֵי אֵֽשׁ־׃
translation:
  text: By the abundance of your trade, your midst was filled with violence, and you
    sinned; so I profaned you from the mountain of God, and I destroyed you, O guardian
    cherub, from the midst of the stones of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your trading' or 'your commerce'; the Hebrew term can also carry the
      sense of 'trafficking.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I cast you out as defiled.' The Hebrew verb means 'to profane' or 'treat
      as unholy,' likely with the sense of expulsion from a sacred place.
    reason: lexical_alternative
  - marker: c
    text: Or 'covering cherub.' The Hebrew participle literally means 'covering/overshadowing,'
      here rendered 'guardian' to express its protective sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרֹב
  chosen: By the abundance of
  alternatives:
  - In the abundance of
  - Through the abundance of
  lexicon: HALOT
  rationale: ב + רֹב is a causal/instrumental expression here, introducing the means
    or circumstance by which the following corruption occurred. 'By the abundance
    of' preserves the Hebrew structure while remaining natural English.
- source_word: רְכֻלָּתְךָ
  chosen: your trade
  alternatives:
  - your trading
  - your commerce
  - your trafficking
  lexicon: HALOT
  rationale: The noun can denote trade, commerce, or trafficking. 'Your trade' is
    concise and idiomatic. 'Trafficking' can suggest illicit trade in English, which
    may over-specify the Hebrew, though the context is morally negative.
- source_word: מָל֧וּ תוֹכְךָ חָמָס
  chosen: your midst was filled with violence
  alternatives:
  - they filled your midst with violence
  - your interior was filled with violence
  lexicon: HALOT
  rationale: 'Although מָל֧וּ is morphologically 3cp (''they filled''), the clause
    is idiomatically rendered as a passive/resultative in English: ''your midst was
    filled with violence.'' This best reflects the Hebrew sense without forcing an
    unspecified subject. תוֹךְ is ''midst'' or ''inner part''; ''your midst'' preserves
    the metaphorical interior/social center.'
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - violence and injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, often including ruthless wrongdoing.
    'Violence' is the standard and most direct rendering here.
- source_word: וַתֶּחֱטָא
  chosen: and you sinned
  alternatives:
  - so you sinned
  - and thus you sinned
  lexicon: HALOT
  rationale: A straightforward rendering of the waw-consecutive verb. The simple coordination
    preserves the Hebrew flow; the causal nuance is carried by the larger sentence
    context.
- source_word: וָאֶחַלֶּלְךָ
  chosen: so I profaned you
  alternatives:
  - therefore I cast you out as defiled
  - so I desecrated you
  - therefore I expelled you as unclean
  lexicon: HALOT
  rationale: From חלל in the piel, the sense is to profane, defile, or treat as unholy.
    'I profaned you' is formally close and preserves the cultic/theological force.
    Because English readers may hear 'profane' as merely verbal abuse, a footnote
    preserves the sense 'cast out as defiled'.
- source_word: מֵהַר אֱלֹהִים
  chosen: from the mountain of God
  alternatives:
  - from God's mountain
  lexicon: HALOT
  rationale: A literal rendering preserves the elevated, mythic-cultic imagery of
    the passage. 'Mountain of God' is a recognizable biblical expression.
- source_word: וָאַבֶּדְךָ
  chosen: and I destroyed you
  alternatives:
  - and I banished you
  - and I made you perish
  lexicon: HALOT
  rationale: אבד in the piel/hiphil domain can mean destroy, cause to perish, or remove.
    'Destroyed' is the most direct lexical equivalent, though in context it may include
    expulsion; that nuance is not strong enough to replace the primary gloss.
- source_word: כְּרוּב
  chosen: cherub
  alternatives:
  - cherubim-being
  lexicon: HALOT
  rationale: Standard English biblical rendering for כְּרוּב. Singular is required
    by the Hebrew.
- source_word: הַסֹּכֵךְ
  chosen: guardian
  alternatives:
  - covering
  - anointed covering
  lexicon: HALOT
  rationale: From סכך, 'to cover, screen, shelter.' In this context modifying cherub,
    'guardian' communicates the protective/overshadowing role in natural English.
    'Covering' is more literal but opaque in modern English. The traditional 'anointed
    cherub that covers' is not supported by this Hebrew form in this verse.
- source_word: מִתּוֹךְ אַבְנֵי אֵשׁ
  chosen: from the midst of the stones of fire
  alternatives:
  - from among the stones of fire
  lexicon: HALOT
  rationale: A largely formal rendering preserves the enigmatic imagery. 'From the
    midst of' echoes the Hebrew מִתּוֹךְ closely; 'from among' is smoother but slightly
    less formal.
