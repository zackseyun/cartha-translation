theological_decisions:
- issue: Whether to render the addressee in a way that resolves the debated identity
    of the figure (human king, mythic cherub, or typological/supernatural referent)
  chosen_reading: Preserve the text's direct address and cherubic imagery without
    resolving the broader interpretive debate.
  alternative_readings:
  - Translate in a way that flattens the imagery into purely royal metaphor
  - Translate in a way that explicitly identifies Satan or a primordial angelic fall
  rationale: The verse itself addresses 'you' and names the figure 'cherub' within
    exalted temple/Edenic imagery. The translation should preserve that tension rather
    than import a full interpretive system not explicit in the Hebrew.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
