id: EZK.28.6
reference: Ezekiel 28:6
source:
  edition: WLC
  text: לָ/כֵ֕ן כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה יַ֛עַן תִּתְּ/ךָ֥ אֶת לְבָבְ/ךָ֖ כְּ/לֵ֥ב
    אֱלֹהִֽים־׃
translation:
  text: 'Therefore thus says the Lord GOD: Because you have made your heart like the
    heart of a god,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the heart of God.' Hebrew אֱלֹהִים can mean 'God,' 'a god,' or
      'gods' depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    accusation; 'Therefore' is natural and sufficiently formal.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; present-tense English idiom
    best reflects the formulaic force in context.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD' by default; in the
    compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD'
    by rendering 'the Lord GOD.' This preserves both elements of the Hebrew title.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Because
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Causal conjunction introducing the reason for the divine declaration;
    'Because' is the clearest modern equivalent.
- source_word: תִּתְּךָ אֶת לְבָבְךָ
  chosen: you have made your heart
  alternatives:
  - you set your heart
  - you gave your heart
  - you made your mind
  lexicon: HALOT
  rationale: The idiom literally involves 'giving/setting' the heart. Here the sense
    is that the ruler has constituted or regarded his inner self in a certain way.
    'Made your heart' preserves the Hebrew imagery better than a more interpretive
    paraphrase.
- source_word: לְבָבְךָ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' includes thought and will, but 'heart' should be retained
    in the main text to preserve the source metaphor and biblical idiom.
- source_word: כְּלֵב אֱלֹהִים
  chosen: like the heart of a god
  alternatives:
  - like the heart of God
  - like a divine heart
  - like the heart of gods
  lexicon: HALOT
  rationale: In this taunt against the prince of Tyre, אֱלֹהִים without the article
    in a comparison can naturally mean 'a god/divine being' rather than the God of
    Israel. Rendering it 'a god' avoids implying that the text affirms likeness to
    the true God, and fits the ruler's arrogant self-deification in context.
