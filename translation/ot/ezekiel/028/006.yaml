theological_decisions:
- issue: Rendering אֱלֹהִים in the phrase כְּלֵב אֱלֹהִים
  chosen_reading: a god
  alternative_readings:
  - God
  - gods
  rationale: The context is a denunciation of human pride and self-exaltation, not
    a statement that the ruler's heart is actually like the heart of the true God.
    'A god' best captures the claim to divinity being mocked. Because the Hebrew form
    can also be understood as 'God,' that alternative is preserved in a footnote rather
    than resolved silently.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for יְהוָה distinguishes covenant name
    from other divine terms.
