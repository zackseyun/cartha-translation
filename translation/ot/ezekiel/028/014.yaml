id: EZK.28.14
reference: Ezekiel 28:14
source:
  edition: WLC
  text: אַ֨תְּ כְּר֔וּב מִמְשַׁ֖ח הַ/סּוֹכֵ֑ךְ וּ/נְתַתִּ֗י/ךָ בְּ/הַ֨ר קֹ֤דֶשׁ אֱלֹהִים֙
    הָיִ֔יתָ בְּ/ת֥וֹךְ אַבְנֵי אֵ֖שׁ הִתְהַלָּֽכְתָּ־־׃
translation:
  text: You were an anointed guardian cherub, and I placed you on the holy mountain
    of God; you walked in the midst of stones of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anointed cherub that covers,' traditionally 'anointed covering cherub.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text begins with a feminine-form pronoun ('you'), while the surrounding
      verbs and suffixes are masculine; the sense is still singular 'you.'
    reason: textual_variant
lexical_decisions:
- source_word: כְּר֔וּב
  chosen: cherub
  alternatives:
  - cherubim-being
  - cherub
  lexicon: HALOT
  rationale: The singular noun denotes the heavenly throne-guardian creature. 'Cherub'
    is the established English singular and preserves the specific imagery better
    than a generic paraphrase like 'angelic being'.
- source_word: מִמְשַׁ֖ח
  chosen: anointed
  alternatives:
  - of anointing
  - anointed one
  lexicon: HALOT
  rationale: 'The noun relates to anointing. In construct with כְּרוּב and followed
    by הַסּוֹכֵךְ, it is best rendered adjectivally in English: ''anointed ... cherub.''
    This is more natural than the overly literal ''cherub of anointing'' while preserving
    the consecratory sense.'
- source_word: הַ/סּוֹכֵ֑ךְ
  chosen: guardian
  alternatives:
  - covering
  - sheltering
  - that covers
  lexicon: HALOT
  rationale: From סכך, 'to cover/shelter.' In cherub imagery, the sense is protective/overshadowing,
    likely alluding to cherubim overshadowing sacred space. 'Guardian' communicates
    function in clear modern English; the more literal 'covering' is preserved in
    a footnote because it is a traditional rendering.
- source_word: וּ/נְתַתִּ֗י/ךָ
  chosen: and I placed you
  alternatives:
  - and I set you
  - and I appointed you
  lexicon: HALOT
  rationale: נתן commonly means 'give, set, place.' In this locative context with
    'on the holy mountain of God,' 'placed' is the most natural English rendering.
- source_word: בְּ/הַ֨ר קֹ֤דֶשׁ אֱלֹהִים֙
  chosen: on the holy mountain of God
  alternatives:
  - upon God's holy mountain
  - in the mountain of God's holiness
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Holy mountain of God' preserves the
    elevated, sacred locale without overinterpreting the image.
- source_word: הָיִ֔יתָ
  chosen: you were
  alternatives:
  - you came to be
  lexicon: HALOT
  rationale: Simple past of היה. 'You were' fits the descriptive sequence of the verse.
- source_word: בְּ/ת֥וֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - within
  lexicon: HALOT
  rationale: '''In the midst of'' preserves the vivid spatial imagery more fully than
    the simpler ''among,'' though both are possible.'
- source_word: אַבְנֵי אֵ֖שׁ
  chosen: stones of fire
  alternatives:
  - fiery stones
  - stones blazing with fire
  lexicon: HALOT
  rationale: A literal rendering best preserves the striking and somewhat enigmatic
    Hebrew image. A smoother paraphrase like 'fiery stones' is possible but slightly
    reduces the text's poetic force.
- source_word: הִתְהַלָּֽכְתָּ
  chosen: you walked
  alternatives:
  - you moved about
  - you walked back and forth
  lexicon: HALOT
  rationale: The hitpael of הלך can suggest walking about, but 'you walked' is sufficient
    and idiomatic, leaving the poetic scene intact without over-specifying repeated
    motion.
- source_word: אַ֨תְּ
  chosen: You
  alternatives:
  - you
  lexicon: HALOT
  rationale: The written form is feminine singular, while the surrounding verbal suffixes/forms
    are masculine singular. Because the clause clearly addresses the same masculine
    referent as the rest of the verse, English simply uses 'you.' The gender/form
    irregularity is best treated as a textual or orthographic issue rather than represented
    in translation.
