theological_decisions:
- issue: Nature of the addressee in the lament over the king of Tyre
  chosen_reading: Retain the exalted cherubic imagery without resolving whether it
    refers only metaphorically to the king of Tyre, to an Edenic/primal figure, or
    typologically beyond him.
  alternative_readings:
  - Purely metaphorical royal imagery for the king of Tyre
  - Reference to a supernatural being behind or represented by the king
  - Dual/typological reference
  rationale: The verse uses highly elevated mythic-sacral language. The translation
    should preserve that tension rather than force a specific theological interpretation
    not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
