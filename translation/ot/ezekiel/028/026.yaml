id: EZK.28.26
reference: Ezekiel 28:26
source:
  edition: WLC
  text: וְ/יָשְׁב֣וּ עָלֶי/הָ֮ לָ/בֶטַח֒ וּ/בָנ֤וּ בָתִּים֙ וְ/נָטְע֣וּ כְרָמִ֔ים
    וְ/יָשְׁב֖וּ לָ/בֶ֑טַח בַּ/עֲשׂוֹתִ֣/י שְׁפָטִ֗ים בְּ/כֹ֨ל הַ/שָּׁאטִ֤ים אֹתָ/ם֙
    מִ/סְּבִ֣יבוֹתָ֔/ם וְ/יָ֣דְע֔וּ כִּ֛י אֲנִ֥י יְהוָ֖ה אֱלֹהֵי/הֶֽם׃ס
translation:
  text: They will dwell on it securely, and they will build houses and plant vineyards.
    They will dwell securely when I execute judgments on all those who treat them
    with contempt all around them. Then they will know that I am the LORD their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despise them' or 'scorn them' for 'treat them with contempt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשְׁבוּ עָלֶיהָ
  chosen: They will dwell on it
  alternatives:
  - They will live in it
  - They will settle on it
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'dwell, sit, remain.' With עַל + feminine singular
    suffix referring back to the land, 'dwell on it' is a natural, fairly formal rendering
    that preserves the land-oriented imagery.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: בֶּטַח denotes security/safety. The adverbial English 'securely' reads
    naturally in modern English while preserving the sense of living without threat.
    The repetition later in the verse is also preserved for emphasis.
- source_word: וּבָנוּ בָתִּים
  chosen: they will build houses
  alternatives:
  - they will build homes
  lexicon: HALOT
  rationale: A straightforward rendering of the verb-noun collocation. 'Houses' is
    more formally aligned with בָּתִּים than the more interpretive 'homes.'
- source_word: וְנָטְעוּ כְרָמִים
  chosen: plant vineyards
  alternatives:
  - plant vine-gardens
  lexicon: HALOT
  rationale: כְּרָמִים refers specifically to vineyards, a standard idiomatic expression
    in English for agricultural settlement and prosperity.
- source_word: וְיָשְׁבוּ לָבֶטַח
  chosen: They will dwell securely
  alternatives:
  - They will live in safety
  lexicon: HALOT
  rationale: The second occurrence repeats the security motif. The translation keeps
    the repetition rather than smoothing it away, since the Hebrew uses it emphatically.
- source_word: בַּעֲשׂוֹתִי שְׁפָטִים
  chosen: when I execute judgments
  alternatives:
  - when I carry out judgments
  - as I execute judgments
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב can be temporal here: ''when
    I do/execute judgments.'' ''Execute judgments'' is idiomatic biblical English
    and preserves divine judicial action without over-paraphrase.'
- source_word: שְׁפָטִים
  chosen: judgments
  alternatives:
  - justice
  - acts of judgment
  lexicon: HALOT
  rationale: In this context the plural refers to punitive judicial acts against hostile
    nations, so 'judgments' is more precise than the broader 'justice.'
- source_word: בְּכֹל הַשָּׁאטִים אֹתָם
  chosen: on all those who treat them with contempt
  alternatives:
  - on all those who despise them
  - on all those who scorn them
  lexicon: HALOT
  rationale: The participle from שׁאט carries the sense of showing contempt, disdain,
    or scorn. 'Treat them with contempt' captures the active hostility in accessible
    modern English. 'Despise' is possible but slightly less concrete.
- source_word: מִסְּבִיבוֹתָם
  chosen: all around them
  alternatives:
  - round about them
  - from around them
  lexicon: HALOT
  rationale: This phrase identifies the surrounding hostile peoples. 'All around them'
    is natural modern English and preserves the geographic sense.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה אֱלֹהֵיהֶם
  chosen: Then they will know that I am the LORD their God
  alternatives:
  - And they will know that I am the LORD their God
  lexicon: HALOT
  rationale: The clause expresses the result of God's restorative and judicial action.
    'Then' makes the consequential force clear in English. יְהוָה is rendered 'the
    LORD' per project doctrine.
