theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the repeated security language
  chosen_reading: Preserve the repetition ('dwell securely' ... 'dwell securely')
  alternative_readings:
  - Compress into a single statement of safety
  rationale: The Hebrew repeats the security formula for emphasis in the restoration
    promise. Preserving the repetition maintains the rhetorical weight and theological
    contrast with prior judgment.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms)'
