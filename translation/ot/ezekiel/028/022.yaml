id: EZK.28.22
reference: Ezekiel 28:22
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֗ כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֤י עָלַ֨יִ/ךְ֙ צִיד֔וֹן
    וְ/נִכְבַּדְתִּ֖י בְּ/תוֹכֵ֑/ךְ וְֽ/יָדְע֞וּ כִּֽי אֲנִ֣י יְהוָ֗ה בַּ/עֲשׂ֥וֹתִ/י
    בָ֛/הּ שְׁפָטִ֖ים וְ/נִקְדַּ֥שְׁתִּי בָֽ/הּ־׃
translation:
  text: 'and say, ‘Thus says the Lord GOD: Behold, I am against you, Sidon, and I
    will be glorified in your midst. And they will know that I am the LORD when I
    execute judgments in her and show myself holy in her.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will gain glory in your midst.' The Hebrew verb can emphasize God’s
      being honored or his displaying his glory through judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'be sanctified in her' or 'manifest my holiness in her.' The expression
      means that the LORD’s holiness is publicly vindicated through his acts of judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - Lord Yahweh
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English
    to reflect אֲדֹנָי plus the divine name. This preserves the distinction in the
    Hebrew while avoiding the awkward 'Lord LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: הִנְנִי עָלַיִךְ
  chosen: Behold, I am against you
  alternatives:
  - Look, I am against you
  - See, I am against you
  lexicon: HALOT
  rationale: הִנְנִי introduces a solemn divine declaration; 'Behold' preserves the
    prophetic force. עַל with hostile sense is well rendered 'against you.'
- source_word: צִידוֹן
  chosen: Sidon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְנִכְבַּדְתִּי
  chosen: I will be glorified
  alternatives:
  - I will gain glory
  - I will be honored
  lexicon: HALOT
  rationale: The Niphal of כבד here expresses YHWH's gaining/displaying glory through
    judgment. 'Be glorified' is idiomatic and preserves the theological weight of
    divine self-vindication.
- source_word: בְּתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  - in the midst of you
  lexicon: HALOT
  rationale: A natural English rendering of the locative phrase addressed to the city
    as feminine singular.
- source_word: וְיָדְעוּ
  chosen: they will know
  alternatives:
  - they shall know
  lexicon: HALOT
  rationale: Common Ezekiel formula; simple future in modern English best fits the
    prophetic declaration.
- source_word: בַּעֲשׂוֹתִי בָהּ שְׁפָטִים
  chosen: when I execute judgments in her
  alternatives:
  - when I carry out judgments against her
  - when I perform acts of judgment in her
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב commonly has temporal force,
    'when I do/make.' שְׁפָטִים in this judgment context is best rendered 'judgments.'
    'In her' reflects the Hebrew preposition and the city metaphor.
- source_word: וְנִקְדַּשְׁתִּי בָהּ
  chosen: show myself holy in her
  alternatives:
  - be sanctified in her
  - manifest my holiness in her
  lexicon: HALOT
  rationale: The Niphal of קדש in Ezekiel often means that God displays or vindicates
    his holiness before observers through acts in history. 'Show myself holy' communicates
    this clearly in modern English while preserving the theological sense.
