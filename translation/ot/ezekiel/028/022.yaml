theological_decisions:
- issue: Rendering the divine self-glorification and sanctification formulas
  chosen_reading: I will be glorified ... and show myself holy
  alternative_readings:
  - I will gain glory ... and be sanctified
  - I will be honored ... and manifest my holiness
  rationale: The verse presents God's judgment on Sidon as a revelation of his glory
    and holiness. The chosen wording preserves this theological tension without flattening
    it into merely human recognition or abstract reputation.
  doctrine_reference: 'Translation philosophy §§3, 6; Contested terms: יְהוָה → the
    LORD'
