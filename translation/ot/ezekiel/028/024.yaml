id: EZK.28.24
reference: Ezekiel 28:24
source:
  edition: WLC
  text: וְ/לֹֽא יִהְיֶ֨ה ע֜וֹד לְ/בֵ֣ית יִשְׂרָאֵ֗ל סִלּ֤וֹן מַמְאִיר֙ וְ/ק֣וֹץ מַכְאִ֔ב מִ/כֹּל֙ סְבִ֣יבֹתָ֔/ם הַ/שָּׁאטִ֖ים אוֹתָ֑/ם וְ/יָ֣דְע֔וּ כִּ֥י אֲנִ֖י אֲדֹנָ֥/י יְהוִֽה־׃ס
translation:
  text: And there will no longer be for the house of Israel a brier causing bitterness or a thorn causing pain from among all those around them who despise them. Then they will know that I am the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a prickle that embitters'; the Hebrew image is of a sharp, injurious plant used metaphorically for hostile neighbors.
    reason: lexical_alternative
lexical_decisions:
- source_word: סִלּוֹן
  chosen: brier
  alternatives:
  - thorn
  - prickle
  lexicon: HALOT
  rationale: A plant metaphor for something sharp and injurious. 'Brier' fits the imagery and pairs naturally with 'thorn' in the next phrase without collapsing the two nouns into one English term.
- source_word: מַמְאִיר
  chosen: that causes bitterness
  alternatives:
  - grievous
  - causing pain
  - irritating
  lexicon: HALOT
  rationale: The participle modifies the brier and conveys harmful, embittering effect. 'That causes bitterness' preserves the likely semantic link to bitterness/irritation better than a vaguer 'grievous.'
- source_word: קוֹץ
  chosen: thorn
  alternatives:
  - brier
  - prickle
  lexicon: HALOT
  rationale: A common image for something piercing and troublesome. 'Thorn' is the most natural English equivalent and preserves the parallelism with סִלּוֹן.
- source_word: מַכְאִב
  chosen: that causes pain
  alternatives:
  - painful
  - causing hurt
  lexicon: HALOT
  rationale: The participle is causative in force; 'that causes pain' makes the verbal sense explicit in readable English.
- source_word: מִכֹּל סְבִיבֹתָם
  chosen: from all those around them
  alternatives:
  - from all their neighbors round about
  - from all their surrounding peoples
  lexicon: HALOT
  rationale: The phrase refers to hostile surrounding peoples/nations rather than mere geography. 'Those around them' is natural English and keeps the source's broad reference.
- source_word: הַשָּׁאטִים אוֹתָם
  chosen: who despise them
  alternatives:
  - who treat them with contempt
  - who scorn them
  lexicon: HALOT
  rationale: The participle denotes hostile contempt. 'Despise' is concise, strong, and idiomatic.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is a standard covenantal designation and should be preserved rather than reduced to simply 'Israel.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine's default, יְהוָה is rendered 'the LORD.' In the combined title אֲדֹנָי יְהוִה, standard English differentiation is needed to avoid 'Lord LORD'; 'the Lord GOD' is the established and clear rendering.
- source_word: וְיָדְעוּ כִּי אֲנִי
  chosen: Then they will know that I am
  alternatives:
  - and they will know that I am
  lexicon: HALOT
  rationale: The conjunction advances the result of the preceding promise. 'Then' brings out the consequential sense in smooth English without over-paraphrasing.
