id: EZK.43.17
reference: Ezekiel 43:17
source:
  edition: WLC
  text: וְ/הָ/עֲזָרָ֞ה אַרְבַּ֧ע עֶשְׂרֵ֣ה אֹ֗רֶךְ בְּ/אַרְבַּ֤ע עֶשְׂרֵה֙ רֹ֔חַב
    אֶ֖ל אַרְבַּ֣עַת רְבָעֶ֑י/הָ וְ/הַ/גְּבוּל סָבִ֨יב אוֹתָ֜/הּ חֲצִ֣י הָ/אַמָּ֗ה
    וְ/הַֽ/חֵיק לָ֤/הּ אַמָּה֙ סָבִ֔יב וּ/מַעֲלֹתֵ֖/הוּ פְּנ֥וֹת קָדִֽים־׃
translation:
  text: And the ledge was fourteen cubits long by fourteen cubits wide at its four
    sides, and the rim around it was half a cubit, and its base was a cubit all around;
    and its steps faced east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the settle' or 'the platform' for 'the ledge' (הָעֲזָרָה), a technical
      term for a structural tier of the altar.
    reason: lexical_alternative
  - marker: b
    text: Or 'to its four quarters'; the Hebrew phrase indicates that the fourteen-by-fourteen
      measurement applied uniformly on all four sides.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'its gutter' for 'its base' (הַחֵיק), if the term is understood
      as a surrounding trench-like feature at the altar's bottom.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲזָרָה
  chosen: the ledge
  alternatives:
  - the settle
  - the platform
  - the upper ledge
  lexicon: HALOT
  rationale: In the altar-description context, this term refers to a structural stage
    or ledge of the altar rather than a courtyard. 'Ledge' is clear modern English
    and fits the dimensional description. 'Settle' is traditional in some English
    versions but is archaic for modern readers.
- source_word: אֹרֶךְ ... רֹחַב
  chosen: long by ... wide
  alternatives:
  - in length ... in width
  lexicon: HALOT
  rationale: These are standard dimensional terms. 'Long by ... wide' gives natural
    English while preserving the measurement format.
- source_word: אֶל אַרְבַּעַת רְבָעֶיהָ
  chosen: at its four sides
  alternatives:
  - toward its four corners
  - to its four quarters
  lexicon: HALOT
  rationale: The phrase indicates the measurement applies uniformly on all four sides/quadrants.
    'At its four sides' is the clearest idiomatic rendering in this architectural
    context. 'Corners' is possible but less precise to the Hebrew 'quarters' idea.
- source_word: הַגְּבוּל
  chosen: the rim
  alternatives:
  - the border
  - the edge
  lexicon: HALOT
  rationale: Here the word denotes the surrounding border or molding of the altar
    structure. 'Rim' communicates a raised bordering edge in concise modern English.
- source_word: חֲצִי הָאַמָּה
  chosen: half a cubit
  alternatives:
  - a half cubit
  lexicon: HALOT
  rationale: Straightforward measurement phrase; 'half a cubit' is standard English.
- source_word: הַחֵיק
  chosen: its base
  alternatives:
  - its gutter
  - its bosom
  - its bottom
  lexicon: HALOT
  rationale: In this temple-altar context, the term refers to the bottom/base section
    of the altar structure. 'Base' best fits the architectural sense and avoids the
    misleadingly literal 'bosom.' Some take it as a surrounding trench or gutter,
    but the immediate context of altar tiers favors 'base'.
- source_word: מַעֲלֹתֵהוּ
  chosen: its steps
  alternatives:
  - its ascent
  lexicon: HALOT
  rationale: The plural form naturally suggests steps. This also matches the following
    verb 'faced' and the directional note. 'Ascent' is possible as a collective singular,
    but 'steps' is more direct.
- source_word: פְּנוֹת קָדִים
  chosen: faced east
  alternatives:
  - turned toward the east
  - facing eastward
  lexicon: HALOT
  rationale: This verbal phrase indicates orientation. 'Faced east' is concise and
    natural while preserving the directional force.
- source_word: אַמָּה
  chosen: cubit
  lexicon: HALOT
  rationale: Standard ancient unit of length; retained as 'cubit' rather than converted,
    to preserve source-text specificity.
