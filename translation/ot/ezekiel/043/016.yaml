id: EZK.43.16
reference: Ezekiel 43:16
source:
  edition: WLC
  text: ו/ה/אראיל שְׁתֵּ֤ים עֶשְׂרֵה֙ אֹ֔רֶךְ בִּ/שְׁתֵּ֥ים עֶשְׂרֵ֖ה רֹ֑חַב רָב֕וּעַ
    אֶ֖ל אַרְבַּ֥עַת רְבָעָֽי/ו׃
translation:
  text: And the altar hearth was twelve cubits long by twelve wide, square on its
    four sides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew אֶל אַרְבַּעַת רְבָעָיו, literally 'to/toward its four quarters';
      this may also be rendered 'at its four corners.'
    reason: lexical_alternative
  - marker: b
    text: '''Cubits'' is supplied from the surrounding context of the altar measurements.'
    reason: cross_reference
lexical_decisions:
- source_word: הָאֲרִיאֵל
  chosen: the altar hearth
  alternatives:
  - the altar
  - the ariel
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, הָאֲרִיאֵל refers to the top hearth/platform
    of the altar rather than a generic 'altar.' 'Altar hearth' best captures the cultic
    architectural sense in context, while avoiding an opaque transliteration.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  lexicon: HALOT
  rationale: Standard cardinal number.
- source_word: אֹרֶךְ
  chosen: long
  alternatives:
  - in length
  - length
  lexicon: HALOT
  rationale: Rendered idiomatically in the measurement formula as 'twelve cubits long.'
- source_word: בִּשְׁתֵּים עֶשְׂרֵה
  chosen: by twelve
  alternatives:
  - twelve in
  lexicon: HALOT
  rationale: The preposition ב here introduces the corresponding width measurement;
    English measurement style is naturally 'long by twelve wide.'
- source_word: רֹחַב
  chosen: wide
  alternatives:
  - in width
  - width
  lexicon: HALOT
  rationale: Rendered idiomatically in parallel with 'long.'
- source_word: רָבוּעַ
  chosen: square
  lexicon: HALOT
  rationale: Describes the shape of the structure.
- source_word: אֶל אַרְבַּעַת רְבָעָיו
  chosen: on its four sides
  alternatives:
  - toward its four quarters
  - at its four corners
  lexicon: HALOT
  rationale: The phrase indicates the altar hearth was square with reference to its
    four sides/quarters. 'On its four sides' communicates the architectural sense
    clearly in modern English. 'Corners' is possible interpretively, but 'quarters/sides'
    is closer to the Hebrew expression.
- source_word: cubits (implicit from context)
  chosen: cubits
  rationale: Although 'cubits' is not repeated in this verse's Hebrew line, it is
    supplied from the immediately preceding measurement context (v. 13ff., especially
    v. 14–15) and is necessary for intelligible English rendering of the dimensions.
