id: EZK.43.24
reference: Ezekiel 43:24
source:
  edition: WLC
  text: וְ/הִקְרַבְתָּ֖/ם לִ/פְנֵ֣י יְהוָ֑ה וְ/הִשְׁלִ֨יכוּ הַ/כֹּהֲנִ֤ים עֲלֵי/הֶם֙ מֶ֔לַח וְ/הֶעֱל֥וּ אוֹתָ֛/ם עֹלָ֖ה לַֽ/יהוָֽה׃
translation:
  text: You shall present them before Yahweh, and the priests shall throw salt on them and offer them up as a burnt offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast salt on them.' The Hebrew verb is literally 'throw/cast,' not the more specific 'sprinkle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּם
  chosen: You shall present them
  alternatives:
  - You shall bring them near
  - You shall offer them
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/present. 'Present them' is natural English in sacrificial context while preserving the act of bringing the animals before God. 'Offer' was avoided here to prevent confusion with the later distinct sacrificial verb for offering them up.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial-relational, 'before/in the presence of.' 'Before the LORD' is the standard concise rendering in cultic contexts. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהִשְׁלִיכוּ
  chosen: shall throw
  alternatives:
  - shall cast
  - shall sprinkle
  lexicon: HALOT
  rationale: The verb שלך ordinarily means 'throw/cast.' Although ritual contexts can suggest a more controlled action, the plain lexical sense is stronger than 'sprinkle,' so 'throw' best reflects the Hebrew without over-ritualizing it.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in temple-sacrificial context.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix indicates the salt is placed/thrown onto the sacrificial animals. 'On them' is clear modern English.
- source_word: מֶלַח
  chosen: salt
  lexicon: HALOT
  rationale: Direct lexical equivalent; important in sacrificial procedure and covenantal symbolism, though the verse itself does not explicate that symbolism.
- source_word: וְהֶעֱלוּ
  chosen: offer them up
  alternatives:
  - bring them up
  - sacrifice them
  lexicon: HALOT
  rationale: The Hiphil of עלה in sacrificial usage means to cause to ascend, hence to offer up. 'Offer them up' preserves the idiom behind the burnt offering without sounding wooden.
- source_word: עֹלָה
  chosen: as a burnt offering
  alternatives:
  - for a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the technical term for the whole burnt offering. 'As a burnt offering' fits the syntax and clearly identifies the sacrificial category.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The lamed marks direction/dedication. 'To the LORD' is a natural rendering and mirrors the sacrificial orientation.
