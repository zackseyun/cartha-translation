id: EZK.43.20
reference: Ezekiel 43:20
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֣ מִ/דָּמ֗/וֹ וְ/נָ֨תַתָּ֜ה עַל אַרְבַּ֤ע קַרְנֹתָי/ו֙ וְ/אֶל
    אַרְבַּע֙ פִּנּ֣וֹת הָ/עֲזָרָ֔ה וְ/אֶֽל הַ/גְּב֖וּל סָבִ֑יב וְ/חִטֵּאתָ֥ אוֹת֖/וֹ
    וְ/כִפַּרְתָּֽ/הוּ־־־׃
translation:
  text: And you shall take some of its blood and put it on its four horns, on the
    four corners of the ledge, and on the rim all around; so you shall purify it and
    make atonement for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the settle.' The Hebrew term refers to the altar's surrounding structural
      ledge/platform in Ezekiel's vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדָּמוֹ
  chosen: some of its blood
  alternatives:
  - from its blood
  - of its blood
  lexicon: HALOT
  rationale: The partitive מן with 'blood' naturally indicates taking a portion rather
    than the whole. 'Some of its blood' is idiomatic English and preserves the sacrificial
    procedure.
- source_word: קַרְנֹתָיו
  chosen: its four horns
  alternatives:
  - its four projections
  lexicon: HALOT
  rationale: In altar contexts קֶרֶן conventionally refers to the horn-like projections
    at the corners. 'Horns' is the standard and clearest cultic rendering.
- source_word: פִּנּוֹת
  chosen: corners
  alternatives:
  - corner-pieces
  - angles
  lexicon: HALOT
  rationale: The noun denotes corners or corner extremities. 'Corners' is the most
    natural English equivalent here.
- source_word: הָעֲזָרָה
  chosen: the ledge
  alternatives:
  - the enclosure
  - the settle
  lexicon: HALOT
  rationale: In Ezekiel's temple vision this term refers to the altar's surrounding
    structure/platform rather than the later temple court. 'Ledge' communicates an
    architectural feature of the altar in accessible English. 'Settle' is traditional
    but archaic; 'enclosure' is less precise.
- source_word: הַגְּבוּל סָבִיב
  chosen: the rim all around
  alternatives:
  - the border all around
  - the surrounding edge
  lexicon: HALOT
  rationale: גְּבוּל here denotes the border/edge of the altar structure, and סָבִיב
    adds the circumferential sense. 'Rim all around' is readable modern English for
    the altar's outer edge.
- source_word: וְחִטֵּאתָ אֹתוֹ
  chosen: so you shall purify it
  alternatives:
  - and you shall cleanse it
  - and you shall de-sin it
  lexicon: HALOT
  rationale: The Piel of חטא in sacrificial contexts means to purge from impurity/sin,
    not to cause to sin. 'Purify it' best captures the ritual-cleansing sense in natural
    English.
- source_word: וְכִפַּרְתָּהוּ
  chosen: make atonement for it
  alternatives:
  - purge it
  - cover it
  lexicon: HALOT
  rationale: כפר in priestly ritual language is conventionally and accurately rendered
    'make atonement.' This preserves the cultic-theological force without importing
    a narrower doctrinal theory.
