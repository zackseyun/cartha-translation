theological_decisions:
- issue: Rendering the paired ritual verbs חטא (Piel) and כפר distinctly
  chosen_reading: purify it and make atonement for it
  alternative_readings:
  - cleanse it and atone for it
  - decontaminate it and purge it
  rationale: The Hebrew uses two related but distinct sacrificial actions. Rendering
    both with separate English expressions preserves the ritual sequence and theological
    nuance rather than collapsing them into one idea.
  doctrine_reference: Translation philosophy §3, §5
