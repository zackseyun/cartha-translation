theological_decisions:
- issue: Ritual term חטא in temple-consecration context
  chosen_reading: purifying
  alternative_readings:
  - making atonement
  - cleansing from sin
  rationale: The verb here refers to the ritual removal of impurity/sin from the altar
    in the consecration sequence. 'Purifying' preserves the cultic sense without narrowing
    it to expiation alone or importing systematic-theological categories beyond the
    immediate context.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
