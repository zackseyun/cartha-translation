id: EZK.43.23
reference: Ezekiel 43:23
source:
  edition: WLC
  text: בְּ/כַלּוֹתְ/ךָ֖ מֵֽ/חַטֵּ֑א תַּקְרִיב֙ פַּ֣ר בֶּן בָּקָ֣ר תָּמִ֔ים וְ/אַ֥יִל
    מִן הַ/צֹּ֖אן תָּמִֽים־־׃
translation:
  text: When you have finished purifying, you shall present a flawless young bull
    and a flawless ram from the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when you have finished making atonement' or 'when you have finished
      cleansing from sin.' The Hebrew verb can carry the sense of purifying or de-sinning
      in sacrificial contexts.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a bull, a son of the herd.'
    reason: lexical_alternative
  - marker: c
    text: Or 'without blemish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכַלּוֹתְךָ
  chosen: When you have finished
  alternatives:
  - When you finish
  - At the completion of your
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of כלה with 2ms suffix introduces
    a temporal clause. 'When you have finished' gives natural English while preserving
    the completed-action sense.
- source_word: מֵחַטֵּא
  chosen: purifying
  alternatives:
  - making atonement
  - cleansing from sin
  - purging
  lexicon: HALOT
  rationale: From חטא in the piel/polel sense used in sacrificial contexts, meaning
    to de-sin/purify. In this temple-ritual context, 'purifying' best captures the
    action without over-importing later doctrinal language. 'Making atonement' is
    possible but broader and less precise here.
- source_word: תַּקְרִיב
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts commonly means to present/offer.
    'Present' is slightly more formal and fits the ritual sequence, while remaining
    clear.
- source_word: פַּר בֶּן בָּקָר
  chosen: a young bull
  alternatives:
  - a bull from the herd
  - a bull calf
  lexicon: HALOT
  rationale: The phrase denotes a bull of the cattle herd. 'Young bull' is idiomatic
    English that reflects the בן בָּקָר construction without awkward literalism.
- source_word: תָּמִים
  chosen: flawless
  alternatives:
  - without blemish
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמים denotes an animal free from defect. 'Flawless'
    is readable modern English and conveys the cultic requirement well. 'Without blemish'
    is a strong traditional alternative worth preserving.
- source_word: וְאַיִל
  chosen: and a ram
  alternatives:
  - and one ram
  lexicon: HALOT
  rationale: אַיִל is the standard term for a ram. The simple rendering is sufficient.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep and goats
  - of the flock
  lexicon: HALOT
  rationale: צאן is a collective term for small livestock, especially sheep/goats.
    'From the flock' is the natural concise rendering in sacrificial context.
- source_word: תָּמִים
  chosen: flawless
  alternatives:
  - without blemish
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Repeated adjective applied to the ram; rendered consistently with the
    first occurrence for clarity and lexical consistency.
