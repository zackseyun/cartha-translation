id: EZK.43.7
reference: Ezekiel 43:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י בֶּן אָדָם֙ אֶת מְק֣וֹם כִּסְאִ֗/י וְ/אֶת מְקוֹם֙ כַּפּ֣וֹת
    רַגְלַ֔/י אֲשֶׁ֧ר אֶשְׁכָּן שָׁ֛ם בְּ/ת֥וֹךְ בְּנֵֽי יִשְׂרָאֵ֖ל לְ/עוֹלָ֑ם וְ/לֹ֣א
    יְטַמְּא֣וּ ע֣וֹד בֵּֽית יִ֠שְׂרָאֵל שֵׁ֣ם קָדְשִׁ֞/י הֵ֤מָּה וּ/מַלְכֵי/הֶם֙
    בִּ/זְנוּתָ֔/ם וּ/בְ/פִגְרֵ֥י מַלְכֵי/הֶ֖ם בָּמוֹתָֽ/ם־־־־־־׃
translation:
  text: And he said to me, “Son of man, this is the place of my throne and the place
    of the soles of my feet, where I will dwell among the children of Israel forever.
    And the house of Israel shall no longer defile my holy name, neither they nor
    their kings, by their prostitution and by the corpses of their kings at their
    high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'and by the corpses of their kings in their death.' The Hebrew
      final word is traditionally read 'their high places,' which fits the context
      of cultic defilement, but some understand it in relation to 'their death.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of man
  lexicon: HALOT
  rationale: Conventional and contextually appropriate rendering of Ezekiel's address
    formula. It preserves the Hebrew idiom and the representative-human sense without
    flattening it to a paraphrase.
- source_word: מְקוֹם כִּסְאִי
  chosen: the place of my throne
  alternatives:
  - my throne's place
  lexicon: HALOT
  rationale: A straightforward construct rendering. English idiom prefers 'the place
    of my throne' over a more wooden possessive form.
- source_word: מְקוֹם כַּפּוֹת רַגְלַי
  chosen: the place of the soles of my feet
  alternatives:
  - the place for the soles of my feet
  - the place of my footstool
  lexicon: HALOT
  rationale: כַּפּוֹת רַגְלַי refers literally to the soles of the feet. 'Footstool'
    is interpretive and not the lexical form here, so the more literal expression
    is preferred.
- source_word: אֲשֶׁר אֶשְׁכָּן שָׁם
  chosen: where I will dwell
  alternatives:
  - where I dwell
  - where I will reside there
  lexicon: HALOT
  rationale: The imperfect after the relative clause naturally points forward in this
    visionary context. 'Where I will dwell' reads naturally in English; 'there' is
    implicit in 'where' and need not be repeated.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the children of Israel
  alternatives:
  - in the midst of the children of Israel
  - among the people of Israel
  lexicon: HALOT
  rationale: בְּתוֹךְ conveys 'in the midst of/among.' 'Children of Israel' preserves
    the covenantal familial expression more closely than the flatter 'people of Israel.'
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  - for the age
  lexicon: HALOT
  rationale: '''Forever'' is the most natural modern English rendering here and adequately
    conveys the durative force in context.'
- source_word: יְטַמְּאוּ
  chosen: shall no longer defile
  alternatives:
  - will no longer make unclean
  - shall no longer profane
  lexicon: HALOT
  rationale: The verb טמא fundamentally means to make unclean/defile. Because the
    object is God's holy name, 'defile' preserves the impurity imagery while fitting
    idiomatic English better than 'make unclean.' 'Profane' is possible but shifts
    toward a different semantic field.
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  lexicon: HALOT
  rationale: Standard and accurate rendering of the construct phrase, preserving the
    covenantal significance of God's name.
- source_word: הֵמָּה וּמַלְכֵיהֶם
  chosen: neither they nor their kings
  alternatives:
  - they and their kings
  lexicon: HALOT
  rationale: 'With the preceding negation, English idiom requires an explicit correlative
    negative: ''neither they nor their kings.'' This makes the Hebrew coordination
    clear in natural English.'
- source_word: בִּזְנוּתָם
  chosen: by their prostitution
  alternatives:
  - by their whoring
  - by their harlotry
  - by their sexual immorality
  lexicon: HALOT
  rationale: זְנוּת often carries both literal and metaphorical-covenantal overtones
    in prophetic literature. 'Prostitution' preserves the starkness of the imagery
    without resorting to archaic 'whoring' or narrowing it to merely sexual misconduct.
- source_word: וּבְפִגְרֵי מַלְכֵיהֶם
  chosen: and by the corpses of their kings
  alternatives:
  - and by the dead bodies of their kings
  lexicon: HALOT
  rationale: פגר denotes a corpse/carcass. 'Corpses' is direct, natural, and preserves
    the impurity association relevant to the context.
- source_word: בָּמוֹתָם
  chosen: at their high places
  alternatives:
  - on their high places
  - in their death
  lexicon: HALOT
  rationale: Given the consonantal form and the broader Ezekiel context of cultic
    defilement, 'their high places' is the best reading. A minority interpretive possibility
    connects the form with 'their death,' but the cultic sense better fits the immediate
    context and traditional vocalization.
