theological_decisions:
- issue: Nature of Israel's defilement in the final clause
  chosen_reading: The verse refers to cultic and covenantal defilement through idolatrous
    prostitution and association with the corpses of their kings at their high places.
  alternative_readings:
  - The final phrase may be understood as 'by the corpses of their kings in their
    death' rather than 'at their high places.'
  rationale: The immediate temple-holiness context and the common prophetic association
    of high places with idolatrous worship support the cultic reading. This preserves
    the text's theological emphasis on holiness and defilement without over-specifying
    the historical referent. Because the alternative has some support in interpretation,
    it is preserved in a footnote rather than erased.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
