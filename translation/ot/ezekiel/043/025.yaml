theological_decisions:
- issue: Shift in grammatical subject within sacrificial instructions
  chosen_reading: Preserve the Hebrew shift from second person singular ('you shall
    offer') to third person plural ('they shall offer') in the main text.
  alternative_readings:
  - 'Smooth both clauses to singular: ''you shall offer ... and offer ...'''
  - 'Smooth both clauses to plural: ''they shall offer ... and they shall offer ...'''
  rationale: The Hebrew text distinctly uses תַּעֲשֶׂה followed by יַעֲשׂוּ. Since
    no doctrinal issue requires harmonization, preserving the tension follows the
    translation philosophy of original-language primacy and avoiding unwarranted paraphrase.
    The likely sense is that Ezekiel is addressed while priests perform parts of the
    rite, but the text itself leaves the shift implicit.
  doctrine_reference: Translation philosophy §§1, 3, 5
