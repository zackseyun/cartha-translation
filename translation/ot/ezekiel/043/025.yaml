id: EZK.43.25
reference: Ezekiel 43:25
source:
  edition: WLC
  text: שִׁבְעַ֣ת יָמִ֔ים תַּעֲשֶׂ֥ה שְׂעִיר חַטָּ֖את לַ/יּ֑וֹם וּ/פַ֧ר בֶּן בָּקָ֛ר
    וְ/אַ֥יִל מִן הַ/צֹּ֖אן תְּמִימִ֥ים יַעֲשֽׂוּ־־־׃
translation:
  text: For seven days you shall offer a goat as a sin offering each day, and they
    shall offer a bull, a son of the herd, and a ram from the flock, without blemish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a bull, a son of the herd.' This is a standard sacrificial
      expression; many translations smooth it to 'a young bull' or 'a bull from the
      herd.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from singular ('you shall offer') to plural ('they shall
      offer'). The translation preserves this change rather than smoothing it out.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  lexicon: HALOT
  rationale: The construct phrase denotes duration. 'For seven days' is idiomatic
    English and preserves the temporal force better than the bare 'Seven days'.
- source_word: תַּעֲשֶׂה
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: Although עשה literally means 'do/make,' in sacrificial contexts it commonly
    means to perform or offer a sacrifice. 'Offer' best reflects the cultic sense
    in clear English.
- source_word: שְׂעִיר חַטָּאת
  chosen: a goat as a sin offering
  alternatives:
  - a goat for a sin offering
  - a he-goat as a sin offering
  lexicon: HALOT
  rationale: שְׂעִיר is a male goat; English 'goat' is sufficient here without overloading
    the line with 'he-goat.' חַטָּאת in sacrificial context refers to the sin offering
    rather than abstract 'sin.' 'As a sin offering' is natural and accurate.
- source_word: לַיּוֹם
  chosen: each day
  alternatives:
  - daily
  - for the day
  lexicon: HALOT
  rationale: The phrase specifies repetition on each of the seven days. 'Each day'
    is explicit and readable.
- source_word: וּפַר בֶּן בָּקָר
  chosen: a bull, a son of the herd
  alternatives:
  - a young bull
  - a bull from the herd
  lexicon: HALOT
  rationale: פַר is 'bull.' The appositional בֶּן בָּקָר is literally 'son of the
    herd/cattle,' a stock sacrificial expression. Retaining 'a son of the herd' preserves
    the Hebrew wording while remaining intelligible, though 'young bull' is a possible
    smoothing.
- source_word: וְאַיִל מִן הַצֹּאן
  chosen: and a ram from the flock
  alternatives:
  - and a ram of the flock
  lexicon: HALOT
  rationale: אַיִל is 'ram.' מִן הַצֹּאן indicates source/classification, naturally
    rendered 'from the flock.'
- source_word: תְּמִימִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמים denotes animals free from defect. 'Without
    blemish' is the standard clear English rendering and preserves cultic significance.
- source_word: יַעֲשׂוּ
  chosen: they shall offer
  alternatives:
  - they shall make
  - they shall prepare
  lexicon: HALOT
  rationale: As with תַּעֲשֶׂה, the verb in sacrificial context means to perform/offer.
    The shift from second person singular to third person plural is preserved as 'you
    shall offer ... and they shall offer,' reflecting the Hebrew rather than smoothing
    it away.
