id: EZK.43.12
reference: Ezekiel 43:12
source:
  edition: WLC
  text: זֹ֖את תּוֹרַ֣ת הַ/בָּ֑יִת עַל רֹ֣אשׁ הָ֠/הָר כָּל גְּבֻל֞/וֹ סָבִ֤יב סָבִיב֙
    קֹ֣דֶשׁ קָדָשִׁ֔ים הִנֵּה זֹ֖את תּוֹרַ֥ת הַ/בָּֽיִת־־׀־׃
translation:
  text: 'This is the law of the house: on the top of the mountain, all its surrounding
    territory is most holy. Behold, this is the law of the house.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all its border all around is most holy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'holy of holies'; that is, 'most holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת הַבָּיִת
  chosen: the law of the house
  alternatives:
  - the instruction of the house
  - the law of the temple
  lexicon: HALOT
  rationale: תּוֹרָה commonly means 'law' or 'instruction.' Here it introduces the
    governing rule/principle for the temple structure and precincts. 'House' preserves
    the Hebrew בַּיִת directly; 'temple' is a plausible contextual alternative but
    less formally transparent.
- source_word: עַל רֹאשׁ הָהָר
  chosen: on the top of the mountain
  alternatives:
  - upon the summit of the mountain
  - at the head of the mountain
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in topographical context idiomatic
    English is 'top' or 'summit.' 'On the top of the mountain' is natural and faithful.
- source_word: כָּל גְּבֻלוֹ סָבִיב סָבִיב
  chosen: all its surrounding territory
  alternatives:
  - all its border all around
  - its whole area round about
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. Because the phrase refers
    to the entire precinct around the house on the mountain, 'surrounding territory'
    best captures the sense in readable English. The doubled סָבִיב intensifies/comprehensively
    marks the area as 'all around,' which is incorporated into 'surrounding.'
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - holiness of holinesses
  lexicon: HALOT
  rationale: The Hebrew superlative construction means 'most holy.' 'Holy of holies'
    is traditional and possible, but in this context it describes the status of the
    whole surrounding area rather than naming the inner sanctuary specifically, so
    the adjectival English rendering is clearer.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - See
  - Indeed
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to the summary restatement.
    'Behold' preserves the solemn demonstrative force; 'See' would be more colloquial.
- source_word: זֹאת ... זֹאת
  chosen: This ... this
  alternatives:
  - This ... this very
  lexicon: HALOT
  rationale: The repeated demonstrative frames the verse and should be preserved for
    emphasis and structural cohesion.
