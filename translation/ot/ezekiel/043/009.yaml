id: EZK.43.9
reference: Ezekiel 43:9
source:
  edition: WLC
  text: עַתָּ֞ה יְרַחֲק֧וּ אֶת זְנוּתָ֛/ם וּ/פִגְרֵ֥י מַלְכֵי/הֶ֖ם מִמֶּ֑/נִּי וְ/שָׁכַנְתִּ֥י
    בְ/תוֹכָ֖/ם לְ/עוֹלָֽם־׃ס
translation:
  text: Now let them put far from me their prostitution and the corpses of their kings,
    and I will dwell in their midst forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their whoring' or 'their harlotry'; the Hebrew uses a prostitution metaphor
      for covenantal unfaithfulness, often expressed through idolatry.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the corpses of their kings' may refer literally to royal dead
      bodies or, more broadly, to defiling royal burial installations or memorials
      near the sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - From now on
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the required change in response
    to the preceding vision and command. 'Now' is concise and natural.
- source_word: יְרַחֲקוּ
  chosen: let them put far
  alternatives:
  - let them remove
  - they shall put far away
  - let them keep far away
  lexicon: HALOT
  rationale: Hiphil of רחק is causative, 'cause to be far/remove.' The jussive-like
    force in context after עתה is best represented with an exhortatory/imperatival
    'let them put far,' rather than a simple future.
- source_word: זְנוּתָם
  chosen: their prostitution
  alternatives:
  - their whoring
  - their harlotry
  - their sexual immorality
  lexicon: HALOT
  rationale: זְנוּת often denotes figurative covenantal unfaithfulness/idolatry in
    prophetic literature. 'Prostitution' preserves the metaphor strongly without the
    archaic tone of 'harlotry' or the potentially over-moralized narrowing of 'sexual
    immorality.'
- source_word: פִגְרֵי מַלְכֵיהֶם
  chosen: the corpses of their kings
  alternatives:
  - the dead bodies of their kings
  - the carcasses of their kings
  lexicon: HALOT
  rationale: פגר means corpse/dead body. 'Corpses' is direct and dignified. The phrase
    likely refers to defiling royal remains or funerary installations near the sanctuary;
    the translation should preserve the concrete imagery rather than interpret it
    away.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The preposition marks separation from God's presence/sanctuary. 'From
    me' is the plain sense and works idiomatically with 'put far.'
- source_word: וְשָׁכַנְתִּי
  chosen: and I will dwell
  alternatives:
  - then I will dwell
  - and I will reside
  lexicon: HALOT
  rationale: שכן is a key covenant-presence verb. 'Dwell' preserves its theological
    resonance better than 'reside.'
- source_word: בְתוֹכָם
  chosen: in their midst
  alternatives:
  - among them
  - in the midst of them
  lexicon: HALOT
  rationale: '''In their midst'' preserves the spatial and covenantal nuance of divine
    presence more fully than the flatter ''among them.'''
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for the age
  - perpetually
  lexicon: HALOT
  rationale: In this restoration context, לְעוֹלָם expresses enduring permanence.
    'Forever' is the most natural modern English rendering.
