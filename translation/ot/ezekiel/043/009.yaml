theological_decisions:
- issue: Nature of זְנוּתָם in prophetic context
  chosen_reading: Rendered metaphorically as 'their prostitution,' preserving the
    prophetic image of covenantal unfaithfulness/idolatry without reducing it to a
    purely sexual sin.
  alternative_readings:
  - their sexual immorality
  - their idolatry
  rationale: The Hebrew metaphor is significant and should remain visible. Translating
    directly as 'idolatry' would interpret rather than translate; 'sexual immorality'
    would risk flattening the prophetic covenant metaphor.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of יְרַחֲקוּ
  chosen_reading: 'Exhortatory/jussive sense: ''let them put far'''
  alternative_readings:
  - 'predictive future: ''they will remove'''
  rationale: In context, the clause expresses the condition expected of the people
    in response to God's declaration. The exhortatory force better fits the discourse
    than a bare prediction.
  doctrine_reference: Translation philosophy §1
- issue: Meaning of 'the corpses of their kings'
  chosen_reading: Kept as a concrete phrase without interpretive expansion
  alternative_readings:
  - interpreted as funerary monuments or memorials of kings
  - interpreted more broadly as royal idolatrous remains
  rationale: The exact historical referent is debated, but the Hebrew wording is concrete.
    The translation preserves that concreteness and leaves fuller interpretation to
    footnote/study material rather than importing it into the text.
  doctrine_reference: Translation philosophy §§1, 3
