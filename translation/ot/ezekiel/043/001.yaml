id: EZK.43.1
reference: Ezekiel 43:1
source:
  edition: WLC
  text: וַ/יּוֹלִכֵ֖/נִי אֶל הַ/שָּׁ֑עַר שַׁ֕עַר אֲשֶׁ֥ר פֹּנֶ֖ה דֶּ֥רֶךְ הַ/קָּדִֽים־׃
translation:
  text: Then he brought me to the gate, the gate that faces east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''gate'': ''to the gate, the gate that faces east.'' The
      repetition likely adds specificity and emphasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹלִכֵנִי
  chosen: Then he brought me
  alternatives:
  - Then he led me
  - And he brought me
  lexicon: HALOT
  rationale: From הלך in the Hiphil with 1cs suffix, meaning to cause someone to go,
    hence 'bring/lead.' 'Brought me' is natural English in this spatial context; 'Then'
    reflects the narrative waw-consecutive.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Standard directional preposition. 'To' best fits English after 'brought
    me.'
- source_word: הַשַּׁעַר
  chosen: the gate
  lexicon: HALOT
  rationale: Definite singular noun with article; rendered straightforwardly as 'the
    gate.'
- source_word: שַׁעַר
  chosen: the gate
  alternatives:
  - gate
  lexicon: HALOT
  rationale: 'The second occurrence appositionally specifies the first: ''the gate,
    the gate that...'' Repeating ''the gate'' preserves the Hebrew emphasis and structure
    rather than collapsing it.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the descriptive clause. 'That' is more
    natural in contemporary English.
- source_word: פֹּנֶה
  chosen: faces
  alternatives:
  - looks toward
  - turns toward
  lexicon: HALOT
  rationale: Participle of פנה describing orientation. 'Faces' is concise, idiomatic,
    and accurately conveys directional orientation.
- source_word: דֶּרֶךְ
  chosen: east
  alternatives:
  - toward the east
  - in the direction of the east
  lexicon: HALOT
  rationale: In the expression 'דרך + direction,' the noun functions adverbially/directionally,
    'toward/in the direction of.' In English, with 'faces,' this is best compressed
    to 'faces east' rather than the more wooden 'faces toward the east.'
- source_word: הַקָּדִים
  chosen: east
  alternatives:
  - the east
  - the east wind/east side
  lexicon: HALOT
  rationale: Here קדִים denotes the eastern direction, not specifically the east wind.
    Because it follows דרך in a directional phrase, 'east' is the clearest rendering.
