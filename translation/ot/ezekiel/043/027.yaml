id: EZK.43.27
reference: Ezekiel 43:27
source:
  edition: WLC
  text: וִֽ/יכַלּ֖וּ אֶת הַ/יָּמִ֑ים וְ/הָיָה֩ בַ/יּ֨וֹם הַ/שְּׁמִינִ֜י וָ/הָ֗לְאָה
    יַעֲשׂ֨וּ הַ/כֹּהֲנִ֤ים עַל הַ/מִּזְבֵּ֨חַ֙ אֶת עוֹלֽוֹתֵי/כֶם֙ וְ/אֶת שַׁלְמֵי/כֶ֔ם
    וְ/רָצִ֣אתִי אֶתְ/כֶ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהֹוִֽה־ס־־־׃ס
translation:
  text: When the days are completed, then from the eighth day onward the priests shall
    offer on the altar your burnt offerings and your peace offerings, and I will accept
    you, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיכַלּוּ
  chosen: are completed
  alternatives:
  - are finished
  - come to an end
  lexicon: HALOT
  rationale: From כלה in the passive/intransitive sense of being brought to completion.
    English passive 'are completed' fits the Hebrew plural verb with 'the days' as
    subject and preserves the ritual-sequence sense.
- source_word: הַיָּמִים
  chosen: the days
  lexicon: HALOT
  rationale: Refers to the previously prescribed period of days for altar consecration.
    Kept definite in English.
- source_word: וְהָיָה
  chosen: then
  alternatives:
  - and it shall be
  - and it will happen
  lexicon: HALOT
  rationale: Idiomatic narrative-transition use introducing what follows after the
    completion of the days. Rendered smoothly as 'then' in optimal equivalence rather
    than woodenly retaining 'and it shall be.'
- source_word: בַיּוֹם הַשְּׁמִינִי וָהָלְאָה
  chosen: from the eighth day onward
  alternatives:
  - on the eighth day and onward
  - on the eighth day and thereafter
  lexicon: HALOT
  rationale: The phrase marks the start of regular ongoing sacrificial use after the
    seven-day rite. 'From the eighth day onward' captures both the initial day and
    continuation.
- source_word: יַעֲשׂוּ
  chosen: shall offer
  alternatives:
  - shall make
  - shall perform
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial context with
    offerings on the altar, idiomatic English is 'offer.' This avoids awkwardness
    while preserving cultic meaning.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the officiating cultic personnel.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: Standard cultic prepositional phrase; 'on' is natural modern English.
- source_word: עוֹלֹתֵיכֶם
  chosen: your burnt offerings
  lexicon: HALOT
  rationale: עוֹלָה is the standard whole-burnt offering. Traditional and accurate
    rendering retained.
- source_word: שַׁלְמֵיכֶם
  chosen: your peace offerings
  alternatives:
  - your fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally 'peace offerings'; this remains recognizable
    and sufficiently precise. 'Fellowship offerings' is possible but more interpretive,
    so preserved in a footnote.
- source_word: וְרָצִאתִי אֶתְכֶם
  chosen: I will accept you
  alternatives:
  - I will be pleased with you
  - I will favor you
  lexicon: HALOT
  rationale: The object is the people ('you'), not merely their offerings. 'I will
    accept you' preserves the covenantal-relational force without overexpansion.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declaration of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the prophetic messenger formula 'declares.' אֲדֹנָי יְהוִה is
    conventionally rendered 'Lord GOD'; the divine name follows project doctrine as
    'the LORD,' but in the compound title with Adonai the standard English equivalent
    is 'Lord GOD' to avoid 'Lord LORD.'
