theological_decisions:
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default for יְהוָה is 'the LORD.' In the fixed combination
    אֲדֹנָי יְהוִה, however, English convention uses 'Lord GOD' to avoid the awkward
    'Lord LORD' while still signaling the compound divine title. This is a stylistic-theological
    convention consistent with the doctrine's treatment of YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
