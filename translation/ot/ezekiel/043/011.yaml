id: EZK.43.11
reference: Ezekiel 43:11
source:
  edition: WLC
  text: וְ/אִֽם נִכְלְמ֞וּ מִ/כֹּ֣ל אֲשֶׁר עָשׂ֗וּ צוּרַ֣ת הַ/בַּ֡יִת וּ/תְכוּנָת֡/וֹ
    וּ/מוֹצָאָ֡י/ו וּ/מוֹבָאָ֣י/ו וְֽ/כָל צֽוּרֹתָ֡/ו וְ/אֵ֣ת כָּל חֻקֹּתָי/ו֩ וְ/כָל
    צורת/י וְ/כָל תורת/ו הוֹדַ֣ע אוֹתָ֔/ם וּ/כְתֹ֖ב לְ/עֵֽינֵי/הֶ֑ם וְ/יִשְׁמְר֞וּ
    אֶת כָּל צוּרָת֛/וֹ וְ/אֶת כָּל חֻקֹּתָ֖י/ו וְ/עָשׂ֥וּ אוֹתָֽ/ם־־־־־־־־־־׃
translation:
  text: And if they are ashamed of all that they have done, make known to them the
    design of the house, its arrangement, its exits, its entrances, all its forms,
    all its statutes, all its forms, and all its laws; and write it before their eyes,
    so that they may keep its whole design and all its statutes and do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the form/pattern of the house ... all its forms ... all its pattern.'
      The Hebrew repeatedly uses צורָה language, emphasizing the temple's structural
      pattern.
    reason: lexical_alternative
  - marker: b
    text: '''Its laws'' may also be rendered ''its instructions.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְלְמוּ
  chosen: are ashamed
  alternatives:
  - are humiliated
  - are put to shame
  lexicon: HALOT
  rationale: The Niphal of כלם here expresses a response of shame/remorse in view
    of prior sins. 'Are ashamed' is natural modern English and fits the conditional
    sense.
- source_word: צוּרַת הַבַּיִת
  chosen: the design of the house
  alternatives:
  - the form of the house
  - the plan of the house
  - the pattern of the house
  lexicon: HALOT
  rationale: צוּרָה in this temple-vision context refers to structural form/pattern.
    'Design' communicates architectural shape and plan without sounding overly technical.
- source_word: תְכוּנָתוֹ
  chosen: its arrangement
  alternatives:
  - its layout
  - its proportions
  - its fixed order
  lexicon: HALOT
  rationale: The noun points to measured arrangement or ordered configuration. 'Arrangement'
    is broad enough to cover the temple's ordered structure.
- source_word: מוֹצָאָיו
  chosen: its exits
  alternatives:
  - its goings out
  - its outlets
  lexicon: HALOT
  rationale: In architectural context this naturally refers to points of exit from
    the structure.
- source_word: מוֹבָאָיו
  chosen: its entrances
  alternatives:
  - its entries
  - its goings in
  lexicon: HALOT
  rationale: Paired with 'exits,' this denotes points of entry into the temple complex.
- source_word: כָל צֻרוֹתָיו / כָל צורתו
  chosen: all its forms / its whole design
  alternatives:
  - all its details
  - all its patterns
  - all its ordinances
  lexicon: HALOT
  rationale: The repeated צורָה language likely emphasizes the temple's forms/patterns.
    In the first occurrence the plural is rendered 'all its forms'; in the later summary
    phrase the singular with כָל is idiomatically rendered 'its whole design' for
    readable English while preserving the architectural sense.
- source_word: חֻקֹּתָיו
  chosen: its statutes
  alternatives:
  - its ordinances
  - its prescribed rules
  lexicon: HALOT
  rationale: חֹק/חֻקָּה often denotes prescribed statute or ordinance. 'Statutes'
    preserves the normative force and remains readable.
- source_word: תּוֹרֹתָיו
  chosen: its laws
  alternatives:
  - its instructions
  - its teachings
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction, but in this clustered legal-architectural
    list 'laws' distinguishes it from 'statutes' while preserving normative content.
- source_word: הוֹדַע אוֹתָם
  chosen: make known to them
  alternatives:
  - show them
  - inform them
  lexicon: HALOT
  rationale: The Hiphil of ידע means to cause to know. 'Make known to them' is a clear
    and suitably formal rendering.
- source_word: וּכְתֹב לְעֵינֵיהֶם
  chosen: write it before their eyes
  alternatives:
  - write it in their sight
  - record it before them
  lexicon: HALOT
  rationale: 'The phrase is vivid and public: the plan is to be written in their presence.
    ''Before their eyes'' preserves the Hebrew idiom.'
- source_word: וְיִשְׁמְרוּ
  chosen: so that they may keep
  alternatives:
  - that they may observe
  - that they may guard
  lexicon: HALOT
  rationale: שׁמר here means to observe/keep in the sense of careful adherence. 'Keep'
    is concise and idiomatic with statutes.
- source_word: וְעָשׂוּ אוֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  lexicon: HALOT
  rationale: A very literal rendering that preserves the Hebrew sequence 'keep ...
    and do.' The plural object refers to the prescribed forms/statutes/laws collectively.
