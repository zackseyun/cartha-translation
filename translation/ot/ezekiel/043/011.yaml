theological_decisions:
- issue: Whether the temple terminology should be rendered in a way that over-specifies
    a literal blueprint versus a broader visionary pattern
  chosen_reading: Use architectural language ('design,' 'arrangement,' 'exits,' 'entrances')
    while preserving the normative terms ('statutes,' 'laws') without resolving larger
    interpretive debates about the temple's fulfillment.
  alternative_readings:
  - Render more woodenly as 'form/pattern' throughout
  - Render more dynamically as 'plans/regulations' throughout
  rationale: The verse itself combines architectural and legal vocabulary. The translation
    preserves that tension rather than deciding whether the vision is merely symbolic
    or strictly architectural.
  doctrine_reference: Translation philosophy §3
- issue: Handling the repeated צורָה language
  chosen_reading: Preserve the repetition substantially, but vary the final occurrence
    to 'its whole design' for natural English.
  alternative_readings:
  - Use 'form' in every occurrence
  - Use 'pattern' in every occurrence
  rationale: The Hebrew repetition is meaningful, but exact repetition of 'form' four
    times in English is awkward and less clear in this architectural context. The
    variation is documented rather than hidden.
  doctrine_reference: Translation philosophy §5
