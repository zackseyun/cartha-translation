id: EZK.43.14
reference: Ezekiel 43:14
source:
  edition: WLC
  text: וּ/מֵ/חֵ֨יק הָ/אָ֜רֶץ עַד הָ/עֲזָרָ֤ה הַ/תַּחְתּוֹנָה֙ שְׁתַּ֣יִם אַמּ֔וֹת
    וְ/רֹ֖חַב אַמָּ֣ה אֶחָ֑ת וּ/מֵ/הֳ/עֲזָרָ֨ה הַ/קְּטַנָּ֜ה עַד הָ/עֲזָרָ֤ה הַ/גְּדוֹלָה֙
    אַרְבַּ֣ע אַמּ֔וֹת וְ/רֹ֖חַב הָ/אַמָּֽה־־׃
translation:
  text: And from the ledge of the ground up to the lower platform shall be two cubits,
    with a width of one cubit; and from the smaller platform up to the larger platform
    shall be four cubits, with the width of one cubit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חֵיק הָאָרֶץ is literally 'the bosom of the earth' and may refer
      to the altar's base, recess, or ground-level ledge.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term עֲזָרָה in this passage refers to stepped structural levels
      of the altar; translations vary between 'ledge,' 'platform,' and the older architectural
      term 'settle.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase is literally 'and the width of the cubit,' likely meaning
      a width of one cubit, parallel to the earlier measurement.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיק הָאָרֶץ
  chosen: the ledge of the ground
  alternatives:
  - the base on the ground
  - the bosom of the earth
  - the gutter of the ground
  lexicon: HALOT
  rationale: חֵיק literally can denote 'bosom' or a hollow/recess. In this architectural
    context of the altar, it refers to the bottom ledge/base at ground level rather
    than a figurative 'bosom.' 'Ledge of the ground' preserves the concrete structural
    sense while remaining readable.
- source_word: עֲזָרָה
  chosen: platform
  alternatives:
  - ledge
  - settlement
  - border
  lexicon: HALOT
  rationale: In Ezekiel 43:13–17 the term refers to successive projecting stages or
    offsets of the altar structure. 'Platform' communicates a stepped architectural
    level more clearly in modern English than the less transparent 'settle' or the
    potentially too narrow 'ledge.'
- source_word: הַתַּחְתּוֹנָה
  chosen: lower
  alternatives:
  - bottom
  - lowest
  lexicon: HALOT
  rationale: The adjective marks the first of two levels. 'Lower' fits the comparative
    relation to the larger upper stage without overcommitting to an absolute superlative.
- source_word: שְׁתַּיִם אַמּוֹת
  chosen: two cubits
  alternatives:
  - two cubits high
  lexicon: HALOT
  rationale: The Hebrew gives the measurement directly; the vertical sense is inferred
    from the architectural description. English can leave 'high' implicit because
    'from ... up to ... two cubits' already conveys height.
- source_word: וְרֹחַב אַמָּה אֶחָת
  chosen: with a width of one cubit
  alternatives:
  - and one cubit wide
  - its width one cubit
  lexicon: HALOT
  rationale: רֹחַב denotes breadth/width. The prepositional phrase is smoothed into
    idiomatic English while preserving the measurement.
- source_word: הֳעֲזָרָה הַקְּטַנָּה
  chosen: the smaller platform
  alternatives:
  - the small platform
  - the lesser ledge
  lexicon: HALOT
  rationale: The adjective is rendered comparatively because it is paired with 'the
    larger platform' in the next phrase, highlighting relative size between the two
    stages.
- source_word: הָעֲזָרָה הַגְּדוֹלָה
  chosen: the larger platform
  alternatives:
  - the great platform
  - the large platform
  lexicon: HALOT
  rationale: גָּדוֹל here is best understood in the architectural comparative sense
    relative to the smaller stage below. 'Larger' makes that relation explicit in
    natural English.
- source_word: אַרְבַּע אַמּוֹת
  chosen: four cubits
  alternatives:
  - four cubits high
  lexicon: HALOT
  rationale: As with the earlier measurement, the vertical dimension is implied by
    'from ... up to ...'. The translation keeps close to the Hebrew wording.
- source_word: וְרֹחַב הָאַמָּה
  chosen: with the width of one cubit
  alternatives:
  - and its width one cubit
  - with a width of one cubit
  lexicon: HALOT
  rationale: The article on אַמָּה likely points back to the previously specified
    standard width, effectively 'the cubit' = one cubit. For clear English, this is
    rendered as the same measurement as the prior clause.
