theological_decisions:
- issue: Agent implied in 'when I came to destroy the city'
  chosen_reading: Retain the first-person wording without softening or reassigning
    agency.
  alternative_readings:
  - when he came to destroy the city
  - when I came and saw the city destroyed
  rationale: The MT reads first person, linking Ezekiel's visionary participation
    with the earlier judgment vision (cf. chs. 8–11). The translation should preserve
    this difficult wording rather than resolve it interpretively. Because English
    readers may misconstrue Ezekiel as the literal destroyer, the alternative understanding
    is preserved in a footnote rather than altering the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
