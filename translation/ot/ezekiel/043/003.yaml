id: EZK.43.3
reference: Ezekiel 43:3
source:
  edition: WLC
  text: וּ/כְ/מַרְאֵ֨ה הַ/מַּרְאֶ֜ה אֲשֶׁ֣ר רָאִ֗יתִי כַּ/מַּרְאֶ֤ה אֲשֶׁר רָאִ֨יתִי֙
    בְּ/בֹאִ/י֙ לְ/שַׁחֵ֣ת אֶת הָ/עִ֔יר וּ/מַרְא֕וֹת כַּ/מַּרְאֶ֕ה אֲשֶׁ֥ר רָאִ֖יתִי
    אֶל נְהַר כְּבָ֑ר וָ/אֶפֹּ֖ל אֶל פָּנָֽ/י־־־־־׃
translation:
  text: And the appearance of the vision that I saw was like the appearance that I
    saw when I came to destroy the city, and the visions were like the appearance
    that I saw by the Kebar Canal; and I fell on my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when he came to destroy the city'; the Hebrew text reads 'when I came,'
      which may reflect Ezekiel's participation in the vision of Jerusalem's destruction
      rather than literal personal agency.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the river Kebar'; likely a major canal in Babylonia rather than
      a natural river.
    reason: cultural_note
lexical_decisions:
- source_word: מַרְאֶה / מַרְאוֹת
  chosen: appearance / visions
  alternatives:
  - sight
  - vision / appearances
  lexicon: HALOT
  rationale: The verse intentionally repeats מַרְאֶה to stress visual correspondence.
    I render the singular instances as 'appearance' and the plural מַרְאוֹת as 'visions'
    to preserve the Hebrew number shift while keeping natural English. 'Appearance
    of the vision' reflects the construct-like phrasing without flattening the repetition.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I had seen
  lexicon: HALOT
  rationale: Simple past best fits the prophet's recollection of prior visionary experiences
    and preserves the repeated refrain.
- source_word: בְּבֹאִי
  chosen: when I came
  alternatives:
  - when I went
  - as I came
  lexicon: HALOT
  rationale: The infinitive construct with 1cs suffix is temporal here. 'When I came'
    is idiomatic and preserves the first-person perspective.
- source_word: לְשַׁחֵת
  chosen: to destroy
  alternatives:
  - to ruin
  - to bring destruction on
  lexicon: HALOT
  rationale: The verb שׁחת in this context denotes destructive action. 'To destroy'
    is the clearest and most direct rendering.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: Standard rendering; in context this refers to Jerusalem, but the Hebrew
    says 'the city,' so the translation retains the expression rather than making
    the referent explicit in the main text.
- source_word: אֶל נְהַר כְּבָר
  chosen: by the Kebar Canal
  alternatives:
  - at the river Chebar
  - toward the Kebar River
  lexicon: HALOT
  rationale: In Ezekiel, נְהַר־כְּבָר refers to the Kebar waterway in Babylonia. 'By
    the Kebar Canal' is geographically more precise and reflects modern understanding
    of the location better than 'river.'
- source_word: וָאֶפֹּל אֶל־פָּנַי
  chosen: and I fell on my face
  alternatives:
  - and I fell facedown
  lexicon: HALOT
  rationale: This is a standard idiom of reverence and overwhelm in prophetic vision
    reports. 'Fell on my face' preserves the idiom's force and biblical resonance.
