theological_decisions:
- issue: Rendering of sacrificial term חַטָּאת in cultic context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can carry both the idea of sin and the offering associated
    with it. In this verse the sacrificial referent is explicit ('the bull'), so 'sin
    offering' is retained as the familiar and accurate cultic term. The alternative
    'purification offering' is lexically defensible in priestly material but is not
    necessary to preserve here in the main text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Smoothing person shift in וּשְׂרָפוֹ
  chosen_reading: direct second-person instructional English ('burn it')
  alternative_readings:
  - 'retain third person: ''and he shall burn it'''
  rationale: The Hebrew shifts person within procedural instructions, a feature that
    can sound unnatural or misleading in English. Optimal equivalence permits smoothing
    where the source meaning is not altered. The command remains directed within the
    ritual procedure without importing a new subject.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
