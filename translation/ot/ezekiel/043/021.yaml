id: EZK.43.21
reference: Ezekiel 43:21
source:
  edition: WLC
  text: וְ/לָ֣קַחְתָּ֔ אֵ֖ת הַ/פָּ֣ר הַֽ/חַטָּ֑את וּ/שְׂרָפ/וֹ֙ בְּ/מִפְקַ֣ד הַ/בַּ֔יִת
    מִ/ח֖וּץ לַ/מִּקְדָּֽשׁ׃
translation:
  text: Then you shall take the bull of the sin offering and burn it in the appointed
    place of the temple, outside the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the bull for the sin offering'; alternatively, 'the bull of the purification
      offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the appointed place of the house'; 'house' here refers to the
      temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: Then you shall take
  alternatives:
  - And you shall take
  lexicon: HALOT
  rationale: The waw with qatal in instructional sequence is naturally rendered with
    simple future/modal English. 'Then' brings out the procedural sequence in the
    ritual instructions, while 'shall take' preserves the directive force.
- source_word: הַפָּר
  chosen: the bull
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull/young bull. 'Bull' is the most straightforward
    and natural rendering here; the age nuance is not explicit enough in context to
    require 'young.'
- source_word: הַחַטָּאת
  chosen: of the sin offering
  alternatives:
  - for sin
  - of the purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the 'sin offering.' In sacrificial
    context modifying 'bull,' it clearly refers to the offering. 'Sin offering' is
    the standard cultic rendering; 'purification offering' is possible in priestly
    contexts but is less transparent for general readers and not required by the immediate
    syntax.
- source_word: וּשְׂרָפוֹ
  chosen: and burn it
  alternatives:
  - and he shall burn it
  - and one shall burn it
  lexicon: HALOT
  rationale: 'The form is 3ms with 3ms object suffix, but in context it continues
    the instructional sequence addressed to the hearer. English commonly smooths such
    shifts by maintaining the direct imperative/instructional line: ''and burn it.''
    This avoids an awkward unexplained switch to third person while preserving the
    action commanded.'
- source_word: בְּמִפְקַד הַבַּיִת
  chosen: in the appointed place of the temple
  alternatives:
  - in the appointed place of the house
  - in the muster/place assigned for the house
  - in the precinct assigned to the temple
  lexicon: HALOT
  rationale: מִפְקָד has the sense of appointment, assignment, or designated place.
    In this architectural/cultic context, 'appointed place' best captures a specific
    designated area. הַבַּיִת in Ezekiel's temple vision often refers to the temple
    complex/house; 'temple' is clearer modern English than the more literal but potentially
    opaque 'house.'
- source_word: מִחוּץ לַמִּקְדָּשׁ
  chosen: outside the sanctuary
  alternatives:
  - outside the holy place
  - outside the sacred precinct
  lexicon: HALOT
  rationale: מִחוּץ means 'outside,' and מִקְדָּשׁ denotes the sanctuary/holy place.
    'Outside the sanctuary' is clear and preserves the cultic distinction between
    the designated burning place and the sacred area proper.
