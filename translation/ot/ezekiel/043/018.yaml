theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' In the compound with אֲדֹנָי,
    English convention 'the Lord GOD' communicates both elements and avoids the confusing
    'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
