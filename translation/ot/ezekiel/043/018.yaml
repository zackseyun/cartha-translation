id: EZK.43.18
reference: Ezekiel 43:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י בֶּן אָדָם֙ כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה אֵ֚לֶּה חֻקּ֣וֹת
    הַ/מִּזְבֵּ֔חַ בְּ/י֖וֹם הֵעָֽשׂוֹת֑/וֹ לְ/הַעֲל֤וֹת עָלָי/ו֙ עוֹלָ֔ה וְ/לִ/זְרֹ֥ק
    עָלָ֖י/ו דָּֽם־׃
translation:
  text: 'And he said to me, “Son of man, thus says the Lord GOD: These are the statutes
    of the altar on the day it is made, for offering burnt offerings on it and for
    sprinkling blood on it.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on the day of its being made''; the phrase may also be understood
      more generally as ''when it is made.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'a burnt offering'; the Hebrew singular may function collectively here.
    reason: lexical_alternative
  - marker: c
    text: Or 'for dashing blood on it'; the Hebrew verb can denote a more forceful
      ritual application of blood than English 'sprinkling' sometimes suggests.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of man
  lexicon: HALOT
  rationale: This is Ezekiel’s standard form of address. A relatively formal rendering
    preserves the idiom and its repeated literary force better than a paraphrase such
    as 'human one.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine, and combined
    with אֲדֹנָי in the conventional English form 'the Lord GOD' to reflect the double
    divine title without awkward repetition ('Lord LORD').
- source_word: חֻקּוֹת
  chosen: statutes
  alternatives:
  - ordinances
  - regulations
  - prescriptions
  lexicon: HALOT
  rationale: חֻקּוֹת commonly denotes prescribed enactments or fixed statutes. 'Statutes'
    is concise and suitably formal in this cultic/legal context.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial altar; no contextual reason to
    vary.
- source_word: בְּיוֹם הֵעָשׂוֹתוֹ
  chosen: on the day it is made
  alternatives:
  - when it is made
  - on the day of its being made
  lexicon: HALOT
  rationale: The Hebrew uses בְּיוֹם plus infinitive construct with suffix, literally
    'in/on the day of its being made.' 'On the day it is made' preserves the temporal
    sense in natural English.
- source_word: לְהַעֲלוֹת
  chosen: for offering
  alternatives:
  - to offer up
  - for causing to ascend
  lexicon: HALOT
  rationale: The Hiphil of עלה in sacrificial contexts means to offer up. 'For offering'
    fits the purpose clause and reads naturally in English.
- source_word: עוֹלָה
  chosen: burnt offerings
  alternatives:
  - a burnt offering
  lexicon: HALOT
  rationale: Although singular in form, עוֹלָה can function collectively in sacrificial
    instruction. The plural 'burnt offerings' best matches the general cultic purpose
    being described.
- source_word: וְלִזְרֹק ... דָּם
  chosen: and for sprinkling blood
  alternatives:
  - and for throwing blood
  - and for dashing blood
  lexicon: HALOT
  rationale: זרק with blood in sacrificial contexts refers to ritual application of
    blood at the altar. 'Sprinkling' is the most familiar and broadly accurate English
    cultic term, though more forceful renderings are possible in some contexts.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  lexicon: HALOT
  rationale: Simple locative rendering; 'on it' is modern and clear while preserving
    the repeated reference to the altar as the object of sacrificial action.
