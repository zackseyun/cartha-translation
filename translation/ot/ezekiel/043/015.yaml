id: EZK.43.15
reference: Ezekiel 43:15
source:
  edition: WLC
  text: וְ/הַֽ/הַרְאֵ֖ל אַרְבַּ֣ע אַמּ֑וֹת וּ/מֵ/הָ/אֲרִאֵ֣יל וּ/לְ/מַ֔עְלָ/ה הַ/קְּרָנ֖וֹת
    אַרְבַּֽע׃
translation:
  text: And the altar hearth shall be four cubits, and from the altar hearth and upward,
    the four horns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew har'el / ari'el are difficult altar terms here. They may be rendered
      more literally as 'hearth of God' or transliterated 'Ariel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְאֵל
  chosen: the altar hearth
  alternatives:
  - the hearth of God
  - the upper altar ledge
  - Ariel
  lexicon: HALOT
  rationale: In the altar-dimension context of Ezekiel 43, הַרְאֵל refers to the top
    hearth/platform of the altar rather than a proper name. 'Altar hearth' best captures
    the cultic function in clear English. Alternatives such as 'Ariel' or 'hearth
    of God' preserve the Hebrew form/etymology but are less transparent in context.
- source_word: אַרְבַּע אַמּוֹת
  chosen: four cubits
  lexicon: HALOT
  rationale: A straightforward measurement phrase; 'cubits' preserves the ancient
    unit rather than converting to a modern approximation.
- source_word: מֵהָאֲרִאֵיל
  chosen: from the altar hearth
  alternatives:
  - from the ariel
  - from the hearth of God
  lexicon: HALOT
  rationale: The related form אֲרִאֵיל here is best understood in parallel with הַרְאֵל
    as the altar hearth/top. Rendering both with the same English gloss preserves
    the structural description. The preposition מִן is expressed as 'from.'
- source_word: וּלְמַעְלָה
  chosen: and upward
  alternatives:
  - upward
  - above
  lexicon: HALOT
  rationale: This adverbial phrase marks vertical extension from the altar hearth.
    'And upward' preserves the Hebrew connective and the spatial sense.
- source_word: הַקְּרָנוֹת אַרְבַּע
  chosen: the four horns
  alternatives:
  - four horns
  lexicon: HALOT
  rationale: 'Refers to the four projecting altar horns. English idiom naturally places
    the numeral before the noun: ''the four horns.'''
