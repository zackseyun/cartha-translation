id: EZK.43.10
reference: Ezekiel 43:10
source:
  edition: WLC
  text: אַתָּ֣ה בֶן אָדָ֗ם הַגֵּ֤ד אֶת בֵּֽית יִשְׂרָאֵל֙ אֶת הַ/בַּ֔יִת וְ/יִכָּלְמ֖וּ
    מֵ/עֲוֺנֽוֹתֵי/הֶ֑ם וּ/מָדְד֖וּ אֶת תָּכְנִֽית־־־־־׃
translation:
  text: As for you, son of man, declare to the house of Israel the temple, so that
    they may be ashamed of their iniquities; and let them measure the plan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house.' Here the Hebrew term refers to the sanctuary/temple in Ezekiel's
      vision.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pattern' or 'the design.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A relatively formal rendering
    preserves the idiom and its literary continuity in the book better than a more
    interpretive alternative such as 'mortal.' Although אָדָם can mean 'humankind'
    in some contexts, here the fixed vocative expression is best kept as 'son of man.'
- source_word: הַגֵּד
  chosen: declare
  alternatives:
  - tell
  - make known
  lexicon: HALOT
  rationale: The imperative of נגד calls for a clear act of reporting or announcing.
    'Declare' fits the prophetic register and the solemnity of the command without
    becoming archaic.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: This is a standard covenantal collective expression. Retaining 'house
    of Israel' preserves the source wording and prophetic style.
- source_word: הַבַּיִת
  chosen: the temple
  alternatives:
  - the house
  lexicon: HALOT
  rationale: Although the noun literally means 'house,' in this vision context it
    refers specifically to the sanctuary structure Ezekiel is being shown. 'Temple'
    communicates the referent clearly in modern English while remaining faithful to
    context.
- source_word: וְיִכָּלְמוּ
  chosen: so that they may be ashamed
  alternatives:
  - and they will be ashamed
  - that they may feel disgrace
  lexicon: HALOT
  rationale: The prefixed verb after the imperative is best taken as expressing purpose
    or result. 'So that they may be ashamed' captures the intended response to the
    revealed temple vision.
- source_word: מֵעֲוֺנוֹתֵיהֶם
  chosen: of their iniquities
  alternatives:
  - because of their sins
  - of their guilt
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity or guilt-bearing wrongdoing,
    not merely generic sin. 'Iniquities' preserves that moral weight and matches prophetic
    diction.
- source_word: וּמָדְדוּ
  chosen: and let them measure
  alternatives:
  - and they shall measure
  - then they are to measure
  lexicon: HALOT
  rationale: Following the purpose clause, this is naturally heard as a jussive-like
    continuation of the command sequence. 'Let them measure' reflects the exhortational
    force better than a simple future.
- source_word: תָּכְנִית
  chosen: the plan
  alternatives:
  - the pattern
  - the design
  lexicon: HALOT
  rationale: The noun refers to the architectural layout or blueprint-like form of
    the temple. 'Plan' is clear modern English; 'pattern' is possible but can sound
    less concrete in this context.
