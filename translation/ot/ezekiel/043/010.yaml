theological_decisions:
- issue: Referent of 'the house' in the temple vision
  chosen_reading: Rendered as 'the temple' rather than the more literal 'the house.'
  alternative_readings:
  - the house
  rationale: The Hebrew term is literally 'house,' but within Ezekiel 40–43 it specifically
    denotes the visionary sanctuary. Using 'temple' avoids ambiguity for modern readers
    while not adding doctrinal content beyond the context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of the verbs after the imperative
  chosen_reading: 'Read as purpose/exhortation: ''so that they may be ashamed ...
    and let them measure.'''
  alternative_readings:
  - 'simple coordination: ''and they will be ashamed ... and they will measure'''
  rationale: The syntax after the imperative favors a consequential or intended-response
    sense. This preserves the prophetic call to repentance and careful attention to
    the temple pattern without overstating certainty.
  doctrine_reference: Translation philosophy §1, §3
