theological_decisions:
- issue: Anthropomorphic judgment language in וָאֲכַל אֹתָם
  chosen_reading: Rendered idiomatically as 'I consumed them' rather than a literal
    'I ate them.'
  alternative_readings:
  - I devoured them
  - I destroyed them
  rationale: The Hebrew verb is metaphorical in divine-judgment contexts. 'Consumed'
    preserves the severity of God's holiness and judgment without implying a crude
    literalism the context does not intend.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without paraphrase beyond warrant.'
