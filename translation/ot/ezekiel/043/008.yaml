id: EZK.43.8
reference: Ezekiel 43:8
source:
  edition: WLC
  text: בְּ/תִתָּ֨/ם סִפָּ֜/ם אֶת סִפִּ֗/י וּ/מְזֽוּזָתָ/ם֙ אֵ֣צֶל מְזוּזָתִ֔/י וְ/הַ/קִּ֖יר
    בֵּינִ֣/י וּ/בֵֽינֵי/הֶ֑ם וְ/טִמְּא֣וּ אֶת שֵׁ֣ם קָדְשִׁ֗/י בְּ/תֽוֹעֲבוֹתָ/ם֙
    אֲשֶׁ֣ר עָשׂ֔וּ וָ/אֲכַ֥ל אֹתָ֖/ם בְּ/אַפִּֽ/י־׀־׃
translation:
  text: When they set their threshold beside my threshold and their doorposts beside
    my doorposts, with the wall between me and them, they defiled my holy name by
    the abominations that they committed; so I consumed them in my anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their sill beside my sill.' The Hebrew term can denote a threshold or
      sill.
    reason: lexical_alternative
  - marker: b
    text: Or 'their doorframes beside my doorframes.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'I ate them'; here the Hebrew idiom means 'I consumed/devoured
      them' in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתִתָּם
  chosen: When they set
  alternatives:
  - in their setting
  - when they placed
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of נתן introduces a temporal-circumstantial
    clause. 'When they set' is natural English and preserves the temporal force without
    over-literal awkwardness.
- source_word: סִפָּם / סִפִּי
  chosen: their threshold / my threshold
  alternatives:
  - their sill / my sill
  lexicon: HALOT
  rationale: סַף commonly denotes a threshold or sill. 'Threshold' best fits temple/building
    context in contemporary English and pairs well with 'doorposts.'
- source_word: מְזוּזָתָם / מְזוּזָתִי
  chosen: their doorposts / my doorposts
  alternatives:
  - their doorframes / my doorframes
  - their jambs / my jambs
  lexicon: HALOT
  rationale: מְזוּזָה refers to a doorpost/jamb. 'Doorposts' is the clearest standard
    rendering and maintains the architectural imagery.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - alongside
  lexicon: HALOT
  rationale: The preposition indicates close proximity. 'Beside' is concise and idiomatic.
- source_word: וְהַקִּיר בֵּינִי וּבֵינֵיהֶם
  chosen: with the wall between me and them
  alternatives:
  - while the wall was between me and them
  - and the wall was between me and them
  lexicon: HALOT
  rationale: The clause is verbless in Hebrew. 'With the wall between me and them'
    preserves the circumstantial sense and the stark image of only a wall separating
    the profane encroachment from God's holy space.
- source_word: וְטִמְּאוּ
  chosen: they defiled
  alternatives:
  - they made unclean
  - they polluted
  lexicon: HALOT
  rationale: טמא in the piel means to defile/make unclean. 'Defiled' is the most fitting
    in a holiness-context involving God's name.
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  - my sacred name
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for God's holy reputation/identity.
    'My holy name' is both literal and idiomatic.
- source_word: בְּתוֹעֲבוֹתָם
  chosen: by the abominations
  alternatives:
  - with their abominations
  - through their detestable practices
  lexicon: HALOT
  rationale: The beth marks means or instrument. 'By the abominations' preserves the
    causal/instrumental force and keeps the strong moral-religious sense of תועבות.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they committed
  alternatives:
  - that they did
  - which they practiced
  lexicon: HALOT
  rationale: Although literally 'that they did,' English idiom with 'abominations'
    is better served by 'committed,' which does not add meaning beyond the moral force
    already present in the noun.
- source_word: וָאֲכַל אֹתָם
  chosen: so I consumed them
  alternatives:
  - and I consumed them
  - so I destroyed them
  lexicon: HALOT
  rationale: אכל literally means 'eat,' but in judgment contexts it idiomatically
    means 'consume/devour.' 'Consumed' preserves the metaphorical force without woodenness.
    'So' reflects the consequential flow from their defilement to divine judgment.
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - in my wrath
  - in my nostril
  lexicon: HALOT
  rationale: אַף literally relates to nose/nostril but idiomatically means anger.
    'In my anger' is clear modern English; 'wrath' is possible but slightly more traditional
    and elevated.
