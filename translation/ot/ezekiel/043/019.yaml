id: EZK.43.19
reference: Ezekiel 43:19
source:
  edition: WLC
  text: וְ/נָתַתָּ֣ה אֶל הַ/כֹּהֲנִ֣ים הַ/לְוִיִּ֡ם אֲשֶׁ֣ר הֵם֩ מִ/זֶּ֨רַע צָד֜וֹק
    הַ/קְּרֹבִ֣ים אֵלַ֗/י נְאֻ֛ם אֲדֹנָ֥/י יְהוִ֖ה לְ/שָֽׁרְתֵ֑/נִי פַּ֥ר בֶּן בָּקָ֖ר
    לְ/חַטָּֽאת־־׃
translation:
  text: And you shall give to the Levitical priests who are from the offspring of
    Zadok, who draw near to me to minister to me, declares the Lord GOD, a bull, a
    son of the herd, for a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'a bull from the herd' or 'a young bull.' The Hebrew
      reads literally, 'a bull, a son of the herd.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: And you shall give
  alternatives:
  - And give
  - Then you shall give
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an injunctive/future command. 'You shall give' preserves the directive force
    in natural English; 'And' retains the connective.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  chosen: the Levitical priests
  alternatives:
  - the priests, the Levites
  - the Levitical priesthood
  lexicon: HALOT
  rationale: The phrase identifies priests belonging to the Levitical order, not all
    Levites indiscriminately. 'Levitical priests' is concise and idiomatic while preserving
    both elements.
- source_word: אֲשֶׁר הֵם מִזֶּרַע צָדוֹק
  chosen: who are from the offspring of Zadok
  alternatives:
  - who are of the seed of Zadok
  - who are descendants of Zadok
  lexicon: HALOT
  rationale: מִזֶּרַע literally means 'from the seed/offspring.' 'Offspring of Zadok'
    preserves the genealogical sense without archaic wording. 'Descendants' is possible
    but slightly less formally tied to the Hebrew imagery.
- source_word: הַקְּרֹבִים אֵלַי
  chosen: who draw near to me
  alternatives:
  - who come near to me
  - who approach me
  lexicon: HALOT
  rationale: קרב in priestly contexts often carries cultic overtones of approaching
    God for service. 'Draw near' preserves both the literal and worship-related sense.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is standard, clear
    English. Per doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding,
    'Lord GOD' avoids 'Lord LORD' and reflects common English convention for אֲדֹנָי
    יְהוִה.
- source_word: לְשָׁרְתֵנִי
  chosen: to minister to me
  alternatives:
  - to serve me
  lexicon: HALOT
  rationale: In priestly context, שׁרת denotes liturgical or official service. 'Minister
    to me' better conveys cultic service than the broader 'serve me,' while remaining
    readable.
- source_word: פַּר בֶּן בָּקָר
  chosen: a bull, a son of the herd
  alternatives:
  - a young bull
  - a bull from the herd
  lexicon: HALOT
  rationale: The Hebrew is literally 'a bull, son of cattle/herd.' To keep the text
    auditable, the main text preserves the appositional expression rather than collapsing
    it entirely. A more idiomatic alternative is preserved in a footnote.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial context, חַטָּאת denotes the sin offering rather than
    sin abstractly. 'For a sin offering' is clear and standard.
