theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies יְהוָה should normally be rendered 'the
    LORD.' In the compound אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid
    the awkward repetition 'Lord LORD' while still signaling the divine name through
    small-caps convention on GOD.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
