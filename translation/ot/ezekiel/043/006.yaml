id: EZK.43.6
reference: Ezekiel 43:6
source:
  edition: WLC
  text: וָ/אֶשְׁמַ֛ע מִדַּבֵּ֥ר אֵלַ֖/י מֵ/הַ/בָּ֑יִת וְ/אִ֕ישׁ הָיָ֥ה עֹמֵ֖ד אֶצְלִֽ/י׃
translation:
  text: Then I heard someone speaking to me from the house, while a man was standing
    beside me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I heard a voice speaking to me from the house.' The Hebrew does not
      explicitly supply the noun 'voice' or identify the speaker in this verse.
    reason: lexical_alternative
  - marker: b
    text: '''The house'' here refers to the temple building in Ezekiel''s vision.'
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶשְׁמַע
  chosen: Then I heard
  alternatives:
  - And I heard
  - So I heard
  lexicon: HALOT
  rationale: Wayyiqtol of שׁמע advances the narrative. 'Then I heard' gives natural
    English sequence while preserving the past narrative force.
- source_word: מִדַּבֵּר
  chosen: someone speaking
  alternatives:
  - one speaking
  - a voice speaking
  - speaking
  lexicon: HALOT
  rationale: The preposition מִן with the infinitive/participle-like verbal form yields
    the sense of hearing speech in progress. English idiom requires an implied subject;
    'someone speaking' is the least interpretively loaded and avoids adding 'voice'
    where the Hebrew does not explicitly say it.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - with me
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward the prophet; 'to me' is the
    straightforward rendering.
- source_word: מֵהַבָּיִת
  chosen: from the house
  alternatives:
  - from the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Ezekiel's temple vision it refers
    to the temple structure, but 'house' preserves the Hebrew term more directly.
    The temple sense is contextually clear without replacing the noun in the main
    text.
- source_word: וְאִישׁ
  chosen: while a man
  alternatives:
  - and a man
  - and the man
  lexicon: HALOT
  rationale: אִישׁ is anarthrous and should be rendered 'a man,' not 'the man.' The
    conjunction is rendered contextually as 'while' to express the concurrent circumstance
    in smoother English.
- source_word: הָיָה עֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - had been standing
  lexicon: HALOT
  rationale: The היה + participle construction expresses ongoing past action/state.
    'Was standing' best reflects the durative aspect.
- source_word: אֶצְלִי
  chosen: beside me
  alternatives:
  - near me
  - at my side
  lexicon: HALOT
  rationale: אֵצֶל denotes proximity. 'Beside me' is natural English and fits the
    spatial scene.
