theological_decisions:
- issue: Identity of the speaker from within the temple-house
  chosen_reading: 'Render the clause without specifying the speaker''s identity: ''someone
    speaking to me from the house.'''
  alternative_readings:
  - '''I heard him speaking to me from the house'''
  - '''I heard a voice speaking to me from the house'''
  rationale: The Hebrew does not explicitly identify the speaker in this verse, though
    the wider context may imply the divine speaker. To preserve theological tension
    and avoid importing an identification not stated here, the translation leaves
    the subject indefinite.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
