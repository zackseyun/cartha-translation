id: EZK.43.4
reference: Ezekiel 43:4
source:
  edition: WLC
  text: וּ/כְב֥וֹד יְהוָ֖ה בָּ֣א אֶל הַ/בָּ֑יִת דֶּ֣רֶךְ שַׁ֔עַר אֲשֶׁ֥ר פָּנָ֖י/ו
    דֶּ֥רֶךְ הַ/קָּדִֽים־׃
translation:
  text: And the glory of the LORD came into the house by way of the gate that faces
    east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the house''; in this vision context, this refers to the temple
      building.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through the gate that faces the east.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/כְב֥וֹד
  chosen: And the glory
  alternatives:
  - Then the glory
  - and the glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifested glory/presence of God, not merely
    'honor.' The prefixed conjunction is rendered naturally as 'And' in context.
- source_word: יְהוָ֖ה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' rather than
    transliterated.
- source_word: בָּ֣א
  chosen: came
  alternatives:
  - entered
  lexicon: HALOT
  rationale: The verb בוא means 'to come/enter.' 'Came' preserves the Hebrew wording,
    while the following phrase 'into the house' makes the motion clear.
- source_word: אֶל הַ/בָּ֑יִת
  chosen: into the house
  alternatives:
  - to the house
  - into the temple
  lexicon: HALOT
  rationale: Although בַּיִת in this temple vision refers to the temple structure,
    'house' is the direct lexical equivalent and preserves Ezekiel's idiom. 'Into'
    reflects the sense of motion into the structure.
- source_word: דֶּ֣רֶךְ
  chosen: by way of
  alternatives:
  - through
  - by the way of
  lexicon: HALOT
  rationale: דֶּרֶךְ here introduces the route taken. 'By way of' is natural English
    and preserves the directional nuance.
- source_word: שַׁ֔עַר
  chosen: the gate
  alternatives:
  - the gateway
  lexicon: HALOT
  rationale: שַׁעַר is best rendered 'gate' in this architectural context.
- source_word: אֲשֶׁ֥ר פָּנָ֖י/ו
  chosen: that faces
  alternatives:
  - whose front is toward
  - that is oriented toward
  lexicon: HALOT
  rationale: The idiom with פָּנִים ('face/front') describes orientation. 'That faces'
    is concise, accurate modern English.
- source_word: דֶּ֥רֶךְ הַ/קָּדִֽים
  chosen: east
  alternatives:
  - the east
  - the eastward direction
  lexicon: HALOT
  rationale: קָדִים denotes the east/eastward direction. In English, 'faces east'
    is the most natural rendering of the full clause.
