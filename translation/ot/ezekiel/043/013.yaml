id: EZK.43.13
reference: Ezekiel 43:13
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה מִדּ֤וֹת הַ/מִּזְבֵּ֨חַ֙ בָּֽ/אַמּ֔וֹת אַמָּ֥ה אַמָּ֖ה וָ/טֹ֑פַח
    וְ/חֵ֨יק הָ/אַמָּ֜ה וְ/אַמָּה רֹ֗חַב וּ/גְבוּלָ֨/הּ אֶל שְׂפָתָ֤/הּ סָבִיב֙ זֶ֣רֶת
    הָ/אֶחָ֔ד וְ/זֶ֖ה גַּ֥ב הַ/מִּזְבֵּֽחַ־־׃
translation:
  text: 'And these are the measurements of the altar in cubits (the cubit being a
    cubit and a handbreadth): its gutter shall be one cubit, and one cubit its width,
    and its border on its rim all around shall be one span. And this shall be the
    base of the altar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a cubit, a cubit and a handbreadth,'' i.e., the longer cubit
      used for these measurements.'
    reason: cultural_note
  - marker: b
    text: Or 'trench' or 'base' for 'gutter' (Hebrew חֵיק); the exact architectural
      feature is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'this is the height/back-structure of the altar' for 'this shall be the
      base of the altar' (Hebrew גַּב).
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדּוֹת
  chosen: measurements
  alternatives:
  - dimensions
  lexicon: HALOT
  rationale: The noun refers to measured specifications. 'Measurements' is natural
    modern English and fits the technical architectural context.
- source_word: בָּאַמּוֹת אַמָּה אַמָּה וָטֹפַח
  chosen: in cubits (the cubit being a cubit and a handbreadth)
  alternatives:
  - by cubits, each cubit a cubit and a handbreadth
  - in cubits, each cubit measuring a cubit and a handbreadth
  lexicon: HALOT
  rationale: 'The phrase explains the unit of measure used here: a long cubit consisting
    of a standard cubit plus a handbreadth. The parenthetical rendering preserves
    the explanatory force while remaining readable.'
- source_word: חֵיק
  chosen: gutter
  alternatives:
  - base
  - bosom
  - trench
  lexicon: HALOT
  rationale: In this altar-description context, the term denotes the recessed lower
    area or surrounding trench-like base feature of the altar structure, not a figurative
    'bosom.' 'Gutter' best captures the architectural sense here and aligns with the
    following dimensions.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - broad
  lexicon: HALOT
  rationale: Standard dimensional term in construction descriptions; 'width' is the
    clear English equivalent.
- source_word: גְּבוּלָהּ
  chosen: border
  alternatives:
  - rim
  - ledge
  - edge
  lexicon: HALOT
  rationale: The word denotes a boundary edge or enclosing margin. 'Border' works
    well with the following phrase 'on its rim all around,' distinguishing the feature
    from the lip itself.
- source_word: שְׂפָתָהּ
  chosen: rim
  alternatives:
  - lip
  - edge
  lexicon: HALOT
  rationale: Literally 'lip,' but in English architectural description 'rim' is more
    idiomatic for the edge of a structure.
- source_word: זֶרֶת
  chosen: span
  alternatives:
  - handspan
  lexicon: HALOT
  rationale: A small unit of measure, commonly rendered 'span.' 'Handspan' is slightly
    more explicit, but 'span' is standard and concise.
- source_word: גַּב
  chosen: base
  alternatives:
  - height
  - back
  - elevation
  lexicon: HALOT
  rationale: In this context the term refers to the raised foundation or back-structure
    of the altar's lower section. 'Base' best fits the immediate architectural description
    and the sequence of measurements.
- source_word: הַמִּזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial structure described in the temple
    vision.
