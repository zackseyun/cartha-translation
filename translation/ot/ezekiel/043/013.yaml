theological_decisions:
- issue: Technical temple-measurement terminology with uncertain architectural referents
  chosen_reading: Render the terms in clear architectural English without over-specifying
    beyond the Hebrew
  alternative_readings:
  - Translate חֵיק as 'base' and גַּב as 'height'
  - Translate חֵיק as 'trench' and גַּב as 'back'
  rationale: The verse is descriptive rather than doctrinal, and several terms are
    rare or context-bound. The translation preserves the concrete measurement data
    while avoiding interpretive overreach about the altar's exact engineering form.
    Alternatives are preserved in footnotes for auditability.
  doctrine_reference: Translation philosophy §§1, 3, 5
