theological_decisions:
- issue: Personal reference in the suffixes attached to 'voice' and 'glory'
  chosen_reading: 'Use personal pronouns: ''his voice'' ... ''his glory'''
  alternative_readings:
  - its sound ... its glory
  rationale: Although 'glory' is grammatically the antecedent, the context is a personal
    theophany of the God of Israel. English naturally renders the manifestation personally
    without importing extra doctrine; it reflects the text's portrayal of divine presence
    rather than an impersonal phenomenon.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
