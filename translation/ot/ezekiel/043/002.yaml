id: EZK.43.2
reference: Ezekiel 43:2
source:
  edition: WLC
  text: וְ/הִנֵּ֗ה כְּבוֹד֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל בָּ֖א מִ/דֶּ֣רֶךְ הַ/קָּדִ֑ים וְ/קוֹל֗/וֹ
    כְּ/קוֹל֙ מַ֣יִם רַבִּ֔ים וְ/הָ/אָ֖רֶץ הֵאִ֥ירָה מִ/כְּבֹדֽ/וֹ׃
translation:
  text: And behold, the glory of the God of Israel was coming from the way of the
    east, and his voice was like the sound of many waters, and the earth shone from
    his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the east' or 'from the direction of the east.' The Hebrew is literally
      'from the way of the east.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like the roar of many waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Behold
  lexicon: HALOT
  rationale: Retains the vivid deictic/interjectional force that marks a visionary
    scene. 'And behold' is slightly formal but still natural enough in prophetic narrative
    and preserves the suddenness better than omitting it.
- source_word: כְּבוֹד
  chosen: the glory
  alternatives:
  - the splendor
  - the weighty glory
  lexicon: HALOT
  rationale: '''Glory'' is the standard rendering for כבוד in theological and visionary
    contexts and best preserves the covenantal/theophanic resonance. ''Splendor''
    is possible but weaker theologically.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct chain, preserving the
    covenant identity formula common in the prophets.
- source_word: בָּא
  chosen: was coming
  alternatives:
  - came
  - is coming
  lexicon: HALOT
  rationale: The qatal in prophetic vision report can be rendered with English past
    progressive to convey the scene as Ezekiel sees it unfolding. 'Was coming' fits
    the visionary immediacy better than the simple past 'came'.
- source_word: מִדֶּרֶךְ הַקָּדִים
  chosen: from the way of the east
  alternatives:
  - from the east
  - from the direction of the east
  lexicon: HALOT
  rationale: דרך literally means 'way/road/direction.' 'From the way of the east'
    preserves the Hebrew expression while remaining intelligible. 'From the east'
    is smoother but slightly less precise.
- source_word: וְקוֹלוֹ
  chosen: and his voice
  alternatives:
  - and its sound
  - and his sound
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the glory/theophanic presence. English
    personalizes naturally here as 'his voice,' matching the personal divine manifestation
    in context. 'Sound' is lexically possible but less fitting with the following
    comparison.
- source_word: כְּקוֹל מַיִם רַבִּים
  chosen: was like the sound of many waters
  alternatives:
  - was like the roar of many waters
  - was like the sound of great waters
  lexicon: HALOT
  rationale: קול can mean 'sound' or 'voice.' Because the previous phrase already
    uses 'voice,' rendering the comparison as 'the sound of many waters' avoids awkward
    repetition while preserving the Hebrew imagery. 'Roar' is interpretive and stronger
    than the base term.
- source_word: וְהָאָרֶץ
  chosen: and the earth
  alternatives:
  - and the land
  lexicon: HALOT
  rationale: ארץ can mean 'earth' or 'land.' In this cosmic theophanic context, 'earth'
    better matches the scope of the illumination imagery.
- source_word: הֵאִירָה
  chosen: shone
  alternatives:
  - was illuminated
  - gave light
  lexicon: HALOT
  rationale: A concise, natural rendering of the Hiphil here. 'Shone' communicates
    the result clearly in English without unnecessary stiffness.
- source_word: מִכְּבֹדוֹ
  chosen: from his glory
  alternatives:
  - with his glory
  - because of his glory
  lexicon: HALOT
  rationale: 'The preposition מן is best taken as source: the earth''s radiance proceeds
    from his glory. This preserves the imagery of emanating divine splendor.'
