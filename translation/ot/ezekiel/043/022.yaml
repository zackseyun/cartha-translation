theological_decisions:
- issue: Rendering חטאת and חטא language in a sacrificial purification context
  chosen_reading: Use 'sin offering' for לְחַטָּאת and 'purify' for the verb חטא applied
    to the altar.
  alternative_readings:
  - Use 'purification offering' to align noun and verb more explicitly
  rationale: The Hebrew uses the same root for the offering and the ritual action,
    but English idiom typically distinguishes them. 'Sin offering' preserves familiar
    sacrificial terminology, while 'purify the altar' accurately conveys that the
    altar is ritually cleansed, not morally made sinful. This preserves the cultic
    theology without importing later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 5, 6
