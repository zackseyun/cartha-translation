id: EZK.43.22
reference: Ezekiel 43:22
source:
  edition: WLC
  text: וּ/בַ/יּוֹם֙ הַ/שֵּׁנִ֔י תַּקְרִ֛יב שְׂעִיר עִזִּ֥ים תָּמִ֖ים לְ/חַטָּ֑את
    וְ/חִטְּאוּ֙ אֶת הַ/מִּזְבֵּ֔חַ כַּ/אֲשֶׁ֥ר חִטְּא֖וּ בַּ/פָּֽר־־׃
translation:
  text: And on the second day you shall present a male goat without blemish for a
    sin offering, and they shall purify the altar just as they purified it with the
    bull.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew חַטָּאת can denote the offering
      used to remove impurity as well as 'sin offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַיּוֹם הַשֵּׁנִי
  chosen: And on the second day
  alternatives:
  - On the second day
  lexicon: HALOT
  rationale: Temporal phrase with prefixed conjunction ו plus preposition ב. 'And
    on the second day' preserves the sequential connection to the prior instructions
    while remaining natural English.
- source_word: תַּקְרִיב
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context commonly means to present/offer.
    'Present' keeps the formal cultic sense without sounding wooden; 'offer' is possible
    but could blur with the specific offering named later.
- source_word: שְׂעִיר עִזִּים
  chosen: a male goat
  alternatives:
  - a goat of the goats
  - a he-goat
  lexicon: HALOT
  rationale: Standard sacrificial idiom for a male goat. 'He-goat' is accurate but
    less natural in modern English; 'male goat' is clear and precise.
- source_word: תָּמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמִים denotes an animal free from defect.
    'Without blemish' is the established and accurate cultic rendering.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - for sin
  - as a purification offering
  lexicon: HALOT
  rationale: חטאת can denote either sin or the sin/purification offering. Here the
    sacrificial context requires the offering sense. 'Sin offering' is the most recognizable
    rendering; 'purification offering' captures function but is less conventional.
    Because the following verb concerns purifying the altar, the offering's purificatory
    aspect is preserved in the verbal translation.
- source_word: וְחִטְּאוּ אֶת־הַמִּזְבֵּחַ
  chosen: and they shall purify the altar
  alternatives:
  - and they shall cleanse the altar
  - and they shall de-sin the altar
  lexicon: HALOT
  rationale: Piel of חטא in priestly ritual contexts means to purge/purify from impurity
    rather than to cause moral sin. 'Purify' best communicates the ritual action in
    idiomatic English.
- source_word: כַּאֲשֶׁר חִטְּאוּ בַּפָּר
  chosen: just as they purified it with the bull
  alternatives:
  - just as they purified it by the bull
  - just as they made purification with the bull
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison to the prior day's rite. The preposition
    ב with פָּר is instrumental here, hence 'with the bull.' Supplying 'it' in English
    clarifies the object carried over from 'the altar.'
