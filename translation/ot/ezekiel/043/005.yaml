id: EZK.43.5
reference: Ezekiel 43:5
source:
  edition: WLC
  text: וַ/תִּשָּׂאֵ֣/נִי ר֔וּחַ וַ/תְּבִיאֵ֕/נִי אֶל הֶֽ/חָצֵ֖ר הַ/פְּנִימִ֑י וְ/הִנֵּ֛ה
    מָלֵ֥א כְבוֹד יְהוָ֖ה הַ/בָּֽיִת־־׃
translation:
  text: Then the Spirit lifted me up and brought me into the inner court, and behold,
    the glory of the LORD filled the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wind' or 'a spirit'; Hebrew רוּחַ can bear these senses, though in Ezekiel's
      vision context it likely refers to the divine Spirit.
    reason: alternative_reading
  - marker: b
    text: Or 'the temple'; Hebrew 'the house' is the more literal expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂאֵנִי
  chosen: lifted me up
  alternatives:
  - carried me
  - raised me
  lexicon: HALOT
  rationale: From נשׂא, here with the Spirit as subject and Ezekiel as object, the
    sense is upward conveyance or elevation in visionary transport. 'Lifted me up'
    is idiomatic, preserves the motion, and matches Ezekiel's recurring visionary
    language better than the more generic 'carried me.'
- source_word: רוּחַ
  chosen: the Spirit
  alternatives:
  - a spirit
  - wind
  lexicon: HALOT
  rationale: Although רוּחַ can mean 'wind,' 'breath,' or 'spirit,' in Ezekiel's visionary
    transport scenes it most naturally refers to the divine Spirit. The definite article
    is absent in Hebrew, but English idiom and the contextual specificity justify
    'the Spirit.' This avoids reducing the action to impersonal wind while not overtranslating
    beyond the prophetic context.
- source_word: וַתְּבִיאֵנִי
  chosen: brought me
  alternatives:
  - led me in
  - caused me to enter
  lexicon: HALOT
  rationale: From בוא in the Hiphil, the causative sense is 'bring' or 'cause to enter.'
    'Brought me' is natural English and adequately conveys the causative movement
    into the next location.
- source_word: הֶחָצֵר הַפְּנִימִי
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: חָצֵר denotes a court/courtyard. 'Inner court' is the standard and concise
    architectural rendering in temple contexts, with 'inner courtyard' as a valid
    but slightly less conventional alternative.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a striking sight. 'Behold'
    preserves the prophetic register and suddenness better than flatter modern alternatives.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - was full of
  - had filled
  lexicon: HALOT
  rationale: Though formally an adjective/participle-like predicate ('was full'),
    the clause in English is most naturally rendered with 'filled' when the subject
    is 'the glory of the LORD' and the object is 'the house.' This captures the resultative
    sense without awkwardness.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifest divine glory/presence. 'The glory of
    the LORD' is both accurate and weighty, preserving the construct relationship
    and Ezekiel's established terminology.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and the stated translation
    policy.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' and in this temple vision it refers to
    the temple structure. 'The house' preserves the Hebrew wording and Ezekiel's temple
    idiom, while readers can infer from context that the temple is meant.
