theological_decisions:
- issue: Referent of רוּחַ in Ezekiel's visionary transport
  chosen_reading: the Spirit as divine agent
  alternative_readings:
  - a spirit
  - wind
  rationale: The immediate literary context is prophetic vision and transport, where
    Ezekiel repeatedly attributes movement to the divine Spirit. Rendering it as 'the
    Spirit' preserves that theological and narrative coherence without introducing
    a denominationally specific claim beyond the text's likely sense.
  doctrine_reference: Translation philosophy §3 (preserve tension where genuine ambiguity
    exists)
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This verse does not provide a compelling contextual reason to depart
    from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
