theological_decisions:
- issue: Rendering the cultic idiom וּמִלְאוּ יָדוֹ with reference to the altar
  chosen_reading: and they shall ordain it
  alternative_readings:
  - and they shall consecrate it
  - and they shall fill its hand
  rationale: The Hebrew idiom literally reads 'fill its hand,' an expression used
    for installation/ordination in cultic settings. Since English readers would not
    understand the literal idiom, the main text uses 'ordain it' to preserve the installation
    sense. Because applying 'ordain' to an altar is unusual in English, alternatives
    are preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §§1, 3, 6
