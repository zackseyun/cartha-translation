id: EZK.43.26
reference: Ezekiel 43:26
source:
  edition: WLC
  text: שִׁבְעַ֣ת יָמִ֗ים יְכַפְּרוּ֙ אֶת הַ/מִּזְבֵּ֔חַ וְ/טִֽהֲר֖וּ אֹת֑/וֹ וּ/מִלְא֖וּ
    יד/ו־׃
translation:
  text: For seven days they shall make atonement for the altar and cleanse it, and
    they shall ordain it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'fill its hand,' a cultic idiom meaning to install, consecrate,
      or ordain for service.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  chosen: For seven days
  alternatives:
  - Seven days
  lexicon: HALOT
  rationale: The accusative of duration indicates the time span over which the actions
    occur. 'For seven days' makes the temporal force explicit in natural English.
- source_word: יְכַפְּרוּ
  chosen: they shall make atonement
  alternatives:
  - they shall purge
  - they shall expiate
  lexicon: HALOT
  rationale: From כפר in priestly/ritual context, the sense is performing rites of
    atonement/purification. 'Make atonement' is the most standard and accessible rendering
    in English, preserving the cultic significance without overtechnical language.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Straightforward rendering of the cultic object in context.
- source_word: וְטִהֲרוּ אֹתוֹ
  chosen: and cleanse it
  alternatives:
  - and purify it
  lexicon: HALOT
  rationale: טהר in ritual contexts can be rendered 'cleanse' or 'purify.' 'Cleanse'
    is slightly more readable in modern English while still fitting ceremonial purification.
- source_word: וּמִלְאוּ יָדוֹ
  chosen: and they shall ordain it
  alternatives:
  - and fill its hand
  - and consecrate it
  lexicon: HALOT
  rationale: The idiom מלא יד commonly means 'ordain' or 'consecrate/install' in priestly
    contexts ('fill the hand'). Here the object is the altar, not a priest, so a literal
    rendering would be obscure. 'Ordain it' preserves the formal cultic sense that
    the altar is being installed/commissioned for service. 'Consecrate it' is possible,
    but because the previous verb already covers purification, 'ordain' better reflects
    the distinct idiomatic force.
