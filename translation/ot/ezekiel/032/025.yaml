id: EZK.32.25
reference: Ezekiel 32:25
source:
  edition: WLC
  text: בְּ/ת֣וֹךְ חֲ֠לָלִים נָתְנ֨וּ מִשְׁכָּ֥ב לָ/הּ֙ בְּ/כָל הֲמוֹנָ֔/הּ סְבִֽיבוֹתָ֖י/ו
    קִבְרֹתֶ֑/הָ כֻּלָּ֣/ם עֲרֵלִ֣ים חַלְלֵי חֶ֡רֶב כִּֽי נִתַּ֨ן חִתִּיתָ֜/ם בְּ/אֶ֣רֶץ
    חַיִּ֗ים וַ/יִּשְׂא֤וּ כְלִמָּתָ/ם֙ אֶת י֣וֹרְדֵי ב֔וֹר בְּ/ת֥וֹךְ חֲלָלִ֖ים נִתָּֽן־־־־׃
translation:
  text: Among the slain they made a bed for her with all her multitude; her graves
    are all around him. All of them are uncircumcised, slain by the sword, because
    their terror was set in the land of the living. So they bore their disgrace with
    those who go down to the pit; she was placed among the slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from feminine ('her') to masculine ('him/his') in the middle
      of the verse, likely moving between the nation personified and its representative
      figure. The translation preserves this shift.
    reason: alternative_reading
  - marker: b
    text: Or 'because they spread their terror in the land of the living.' The Hebrew
      literally says 'because their terror was set in the land of the living.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he was placed among the slain,' if the final singular is taken to refer
      to a masculine representative rather than the nation personified as feminine.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּתוֹךְ חֲלָלִים
  chosen: Among the slain
  alternatives:
  - In the midst of the slain
  - Among the pierced
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst/middle of'; with חֲלָלִים in this
    funerary-war context, 'among the slain' is idiomatic and clear. 'Slain' fits the
    repeated motif in the verse and chapter better than the more wooden 'wounded'
    or 'pierced.'
- source_word: נָתְנוּ מִשְׁכָּב לָהּ
  chosen: they made a bed for her
  alternatives:
  - they gave her a resting place
  - they set a couch for her
  lexicon: HALOT
  rationale: The idiom is literally 'they gave/made a bed for her.' In context of
    the underworld grave-arrangement imagery, 'made a bed for her' preserves the metaphor
    without over-paraphrasing it into merely 'buried her.'
- source_word: בְּכָל הֲמוֹנָהּ
  chosen: with all her multitude
  alternatives:
  - with all her throng
  - with all her hordes
  lexicon: HALOT
  rationale: הָמוֹן here denotes the mass of people associated with the nation/personified
    entity. 'Multitude' is broad and suitable for the lament context; 'hordes' would
    sound more interpretive and militarized than the Hebrew requires.
- source_word: סְבִיבוֹתָיו קִבְרֹתֶהָ
  chosen: her graves are all around him
  alternatives:
  - her graves are all around her
  - his surroundings are her graves
  lexicon: HALOT
  rationale: 'The Hebrew preserves a gender shift: feminine suffix on ''her graves''
    but masculine suffix on ''around him.'' This likely reflects the movement between
    the personified nation and its leader/collective representative. The translation
    keeps the shift auditable rather than smoothing it away.'
- source_word: כֻּלָּם עֲרֵלִים
  chosen: All of them are uncircumcised
  alternatives:
  - All of them are foreskinned
  lexicon: HALOT
  rationale: עֲרֵלִים is the standard term 'uncircumcised.' In Ezekiel's grave-oracle
    rhetoric it marks covenantal outsider status and shame. The conventional rendering
    is both accurate and comprehensible.
- source_word: חַלְלֵי חֶרֶב
  chosen: slain by the sword
  alternatives:
  - killed by the sword
  - sword-slain
  lexicon: HALOT
  rationale: This construct phrase is a common war-death expression. 'Slain by the
    sword' is natural English and preserves the formal force of the Hebrew.
- source_word: כִּי נִתַּן חִתִּיתָם
  chosen: because their terror was set
  alternatives:
  - because they spread their terror
  - because their dread was imposed
  lexicon: HALOT
  rationale: The passive/impersonal נִתַּן with חִתִּיתָם is most literally 'their
    terror was given/set.' English 'was set' preserves the passive notion and avoids
    importing an explicit subject not present in the Hebrew.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: in the land of the living
  alternatives:
  - in the land of life
  lexicon: HALOT
  rationale: This is a standard biblical expression contrasting the realm of the living
    with Sheol/the pit. The established English phrase is accurate and clear.
- source_word: וַיִּשְׂאוּ כְלִמָּתָם
  chosen: So they bore their disgrace
  alternatives:
  - And they carried their shame
  - And they bore their humiliation
  lexicon: HALOT
  rationale: נשא with כְלִמָּה conveys bearing/carrying shame. 'Disgrace' is readable
    modern English and fits the judgment context.
- source_word: אֶת יֹרְדֵי בוֹר
  chosen: with those who go down to the pit
  alternatives:
  - with the ones descending to the pit
  - with those who descend to the grave
  lexicon: HALOT
  rationale: 'The את here is rendered associatively in context: they bear disgrace
    along with the rest of the dead. ''Pit'' preserves the Sheol/grave imagery better
    than flattening to ''grave'' alone.'
- source_word: בְּתוֹךְ חֲלָלִים נִתָּן
  chosen: she was placed among the slain
  alternatives:
  - he was placed among the slain
  - it was set among the slain
  lexicon: HALOT
  rationale: The final clause resumes the opening idea with a passive singular. Given
    the preceding feminine references, 'she was placed' best matches the personified
    nation in context, while the masculine forms earlier are preserved where they
    occur rather than harmonized throughout.
