theological_decisions:
- issue: Retention of the 'uncircumcised' label in a judgment oracle
  chosen_reading: All of them are uncircumcised
  alternative_readings:
  - All of them are defiled outsiders
  rationale: The Hebrew term is explicit and carries covenantal/judgment significance
    in Ezekiel. The translation preserves the concrete term rather than replacing
    it with an interpretive abstraction.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
- issue: Gender shift between feminine and masculine suffixes in the grave imagery
  chosen_reading: her graves are all around him ... she was placed among the slain
  alternative_readings:
  - her graves are all around her ... she was placed among the slain
  - his graves are all around him ... he was placed among the slain
  rationale: The Hebrew text itself shifts gender, likely reflecting personified nation
    and representative ruler/collective. Preserving the shift is preferable to smoothing
    out an ambiguity the source leaves in place.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it'
