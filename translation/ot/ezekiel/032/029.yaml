theological_decisions:
- issue: Meaning of 'the uncircumcised' in a judgment oracle
  chosen_reading: Retain the covenantal term literally as 'the uncircumcised' rather
    than paraphrasing it as merely 'the dishonored dead' or 'the nations.'
  alternative_readings:
  - the dishonored dead
  - the nations
  rationale: The Hebrew term carries covenantal and shame connotations in Ezekiel's
    oracles against the nations. A literal rendering preserves the theological force
    and the prophet's rhetoric without importing later doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
