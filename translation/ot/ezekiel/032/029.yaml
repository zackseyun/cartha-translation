id: EZK.32.29
reference: Ezekiel 32:29
source:
  edition: WLC
  text: שָׁ֣מָּ/ה אֱד֗וֹם מְלָכֶ֨י/הָ֙ וְ/כָל נְשִׂיאֶ֔י/הָ אֲשֶׁר נִתְּנ֥וּ בִ/גְבוּרָתָ֖/ם
    אֶת חַלְלֵי חָ֑רֶב הֵ֛מָּה אֶת עֲרֵלִ֥ים יִשְׁכָּ֖בוּ וְ/אֶת יֹ֥רְדֵי בֽוֹר־־־־־־׃
translation:
  text: There is Edom, her kings and all her princes, who, despite their might, were
    laid among those slain by the sword. They lie with the uncircumcised and with
    those who go down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with their might' or 'in their might'; the Hebrew phrase may be read
      more literally, but the context highlights the irony that their strength did
      not prevent their downfall.
    reason: lexical_alternative
  - marker: b
    text: '''The pit'' is a common Hebrew image for the realm of the dead or the grave.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמָּה
  chosen: There is
  alternatives:
  - There
  - There too
  lexicon: HALOT
  rationale: In this repeated lament formula in Ezekiel 32, the adverb points out
    the presence of another nation in Sheol/the grave-realm scene. 'There is' gives
    natural English while preserving the deictic force.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Standard transliteration of the nation name.
- source_word: מְלָכֶיהָ
  chosen: her kings
  lexicon: HALOT
  rationale: Straightforward construct with 3fs suffix referring to Edom as a nation.
- source_word: וְכָל נְשִׂיאֶיהָ
  chosen: and all her princes
  alternatives:
  - and all her leaders
  - and all her chiefs
  lexicon: HALOT
  rationale: נָשִׂיא often denotes a ruler, chief, or prince. 'Princes' fits the elevated
    political register of the lament and pairs well with 'kings.'
- source_word: אֲשֶׁר נִתְּנוּ
  chosen: who ... were laid
  alternatives:
  - who were given
  - who were placed
  lexicon: HALOT
  rationale: 'The Niphal of נתן here is passive: they were ''put/placed.'' In context
    of burial among the dead, ''were laid'' is idiomatic English and preserves the
    passive sense.'
- source_word: בִּגְבוּרָתָם
  chosen: despite their might
  alternatives:
  - with their might
  - in their might
  - because of their might
  lexicon: HALOT
  rationale: The phrase marks the irony that these rulers, characterized by military
    strength, nevertheless ended up among the slain. 'Despite their might' brings
    out the concessive force implied by the context better than a wooden 'in their
    might.'
- source_word: אֶת חַלְלֵי חָרֶב
  chosen: among those slain by the sword
  alternatives:
  - with the slain of the sword
  - with the sword-slain
  lexicon: HALOT
  rationale: חַלְלֵי חָרֶב is a common expression for those killed violently in battle.
    'Among those slain by the sword' is clear modern English and reflects the object
    marker plus association in context.
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The pronoun is resumptive/emphatic. English can represent it simply with
    'They' without overloading the sentence.
- source_word: עֲרֵלִים
  chosen: the uncircumcised
  alternatives:
  - the foreskinned
  lexicon: HALOT
  rationale: Standard rendering for the covenantally charged term in prophetic judgment
    contexts. It denotes those outside the covenant and/or ritually disgraced in death.
- source_word: יִשְׁכָּבוּ
  chosen: lie
  alternatives:
  - will lie
  - are lying
  lexicon: HALOT
  rationale: The imperfect here functions in the visionary description of their state
    in the underworld. English present 'lie' fits the scene description naturally.
- source_word: וְאֶת יֹרְדֵי בוֹר
  chosen: and with those who go down to the pit
  alternatives:
  - and with those who descend to the pit
  - and with those who go down to the grave
  lexicon: HALOT
  rationale: בּוֹר in this context refers to the pit/grave realm. 'Pit' preserves
    the metaphor and intertextual resonance in prophetic literature better than flattening
    it to 'grave.'
