id: EZK.32.6
reference: Ezekiel 32:6
source:
  edition: WLC
  text: וְ/הִשְׁקֵיתִ֨י אֶ֧רֶץ צָפָתְ/ךָ֛ מִ/דָּמְ/ךָ֖ אֶל הֶֽ/הָרִ֑ים וַ/אֲפִקִ֖ים
    יִמָּלְא֥וּ/ן מִמֶּֽ/ךָּ־׃
translation:
  text: I will drench the land with your flowing blood up to the mountains, and the
    ravines will be filled with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will water the land of your outpouring with your blood.' The Hebrew
      expression is difficult; the translation 'your flowing blood' brings out the
      likely sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'channels' or 'riverbeds' for 'ravines.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the ravines will be filled from you,' likely meaning with your
      blood or remains.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁקֵיתִי
  chosen: I will drench
  alternatives:
  - I will water
  - I will soak
  - I will make drink
  lexicon: HALOT
  rationale: From שׁקה in the Hiphil, literally 'cause to drink' or 'water.' In this
    violent judgment context, 'drench' best conveys the metaphorical sense of saturating
    the land with blood without sounding too agricultural or too wooden.
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the ground
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or ground. Here the immediate image is the
    terrain of Egypt being saturated, so 'the land' is the most natural contextual
    rendering.
- source_word: צָפָתְךָ
  chosen: your flowing blood
  alternatives:
  - your flood
  - your outpouring
  - your gore
  lexicon: HALOT
  rationale: The noun is difficult and likely denotes what gushes or floats from the
    slain body. Because it is immediately qualified by 'from your blood,' the sense
    is the blood as it pours out. 'Your flowing blood' makes the image explicit in
    idiomatic English while preserving the gruesome force.
- source_word: מִדָּמְךָ
  chosen: with your flowing blood
  alternatives:
  - from your blood
  - because of your blood
  lexicon: HALOT
  rationale: 'The preposition מִן after the preceding verb can be rendered literally
    ''from your blood,'' but in English the sense is instrumental/material: the land
    is drenched with blood. This is folded into the phrase ''with your flowing blood''
    for clarity.'
- source_word: אֶל הֶהָרִים
  chosen: up to the mountains
  alternatives:
  - to the mountains
  - as far as the mountains
  lexicon: HALOT
  rationale: אֶל here marks extent toward the mountains rather than simple direction.
    'Up to the mountains' captures the spread of the blood over the landscape.
- source_word: וַאֲפִקִים
  chosen: the ravines
  alternatives:
  - the channels
  - the wadis
  - the streams
  lexicon: HALOT
  rationale: אֲפִיקִים commonly refers to channels, riverbeds, or ravines. In parallel
    with mountains and in a judgment-landscape image, 'ravines' is vivid and natural
    English.
- source_word: יִמָּלְאוּן
  chosen: will be filled
  alternatives:
  - will fill up
  lexicon: HALOT
  rationale: Niphal imperfect of מלא, passive/reflexive sense. 'Will be filled' is
    the straightforward rendering.
- source_word: מִמֶּךָּ
  chosen: with you
  alternatives:
  - from you
  - with your remains
  lexicon: HALOT
  rationale: Literally 'from you,' but in context it means the ravines are filled
    with the fallen monster's blood and carcass. 'With you' preserves the directness
    and horror of the personified address without over-interpreting in the main text.
