theological_decisions:
- issue: Rendering of the divine name יְהוָה in the prophetic formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In the compound אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to represent
    the two Hebrew divine titles distinctly without producing the awkward 'Lord LORD.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Sense of חֲתִיתוֹ
  chosen_reading: his terror
  alternative_readings:
  - my terror
  rationale: The consonantal text with 3ms suffix naturally yields 'his terror,' referring
    to Pharaoh's terror previously exercised in the land of the living. Some ancient
    versions/readings support 'my terror,' but the provided Hebrew text points to
    the 3ms suffix and is followed here.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    preserve alternatives in footnotes where ambiguity is significant'
