id: EZK.32.32
reference: Ezekiel 32:32
source:
  edition: WLC
  text: כִּֽי נָתַ֥תִּי אֶת חתית/ו בְּ/אֶ֣רֶץ חַיִּ֑ים וְ/הֻשְׁכַּב֩ בְּ/ת֨וֹךְ עֲרֵלִ֜ים
    אֶת חַלְלֵי חֶ֗רֶב פַּרְעֹה֙ וְ/כָל הֲמוֹנֹ֔/ה נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־־־׃פ
translation:
  text: For I put his terror in the land of the living, and he will be laid among
    the uncircumcised, with those slain by the sword—Pharaoh and all his multitude,
    declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following some ancient witnesses: “my terror in the land of the living.”
      The Hebrew text here reads “his terror.”'
    reason: textual_variant
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the rationale or explanation for the preceding lament/judgment
    statement. 'For' preserves the connective force in natural English.
- source_word: נָתַתִּי
  chosen: I put
  alternatives:
  - I gave
  - I set
  lexicon: HALOT
  rationale: נתן commonly means 'give/put/set.' In this context with 'terror' and
    location ('in the land of the living'), 'put' is idiomatic and preserves the causative
    placement sense without overinterpreting.
- source_word: חֲתִיתוֹ
  chosen: his terror
  alternatives:
  - his dread
  - his horror
  lexicon: HALOT
  rationale: The noun denotes terror/dread. The 3ms suffix points to Pharaoh. 'His
    terror' best captures the fear he inspired in the world of the living; 'dread'
    is possible but slightly less direct.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: in the land of the living
  alternatives:
  - in the earth of the living
  - in the land of life
  lexicon: HALOT
  rationale: A conventional Hebrew expression for the realm of the living as opposed
    to Sheol/the dead. The established English phrase is both accurate and readable.
- source_word: וְהֻשְׁכַּב
  chosen: and he will be laid
  alternatives:
  - and he shall be laid down
  - and he will lie
  lexicon: HALOT
  rationale: 'Hophal of שׁכב is passive/causative-passive: ''be laid.'' This likely
    refers to being laid in death/burial among the dead. ''Will be laid'' preserves
    the passive force better than simple ''will lie.'''
- source_word: בְּתוֹךְ עֲרֵלִים
  chosen: among the uncircumcised
  alternatives:
  - in the midst of the uncircumcised
  lexicon: HALOT
  rationale: עֲרֵלִים literally means 'uncircumcised ones.' In Ezekiel this is a loaded
    covenantal and shame term for the nations in death. 'Among the uncircumcised'
    is accurate and idiomatic.
- source_word: אֶת חַלְלֵי חֶרֶב
  chosen: with those slain by the sword
  alternatives:
  - with the slain of the sword
  - among the sword-slain
  lexicon: HALOT
  rationale: The preposition-like אֶת here marks association. 'Those slain by the
    sword' is clear modern English while preserving the violent judgment imagery.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: וְכָל הֲמוֹנוֹ
  chosen: and all his multitude
  alternatives:
  - and all his hordes
  - and all his throng
  lexicon: HALOT
  rationale: הָמוֹן often denotes a multitude, mass, or tumultuous host. 'Multitude'
    fits the funerary/judgment register and avoids overmilitarizing beyond what the
    word itself requires, though military overtones are present in context.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula, well rendered 'declares.' Following
    doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'Lord GOD'
    is the conventional English equivalent that avoids 'Lord LORD'.
