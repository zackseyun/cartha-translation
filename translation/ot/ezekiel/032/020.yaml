theological_decisions:
- issue: Referent of the feminine pronoun in the imperative clause
  chosen_reading: 'The pronoun refers to Egypt personified as a feminine entity: ''drag
    her away.'''
  alternative_readings:
  - The pronoun could be taken more abstractly or as referring to the sword clause
    in a difficult construction.
  rationale: The broader context addresses Pharaoh/Egypt and repeatedly personifies
    the nation. Rendering the pronoun personally preserves the prophetic taunt and
    avoids flattening the imagery.
- issue: Interpretation of the abrupt clause חֶרֶב נִתָּנָה
  chosen_reading: Rendered literally as 'The sword is given.'
  alternative_readings:
  - '''A sword is appointed'''
  - '''The sword has been given over'''
  rationale: The Hebrew is compressed and somewhat elliptical. A relatively literal
    rendering best preserves the textual tension rather than resolving it beyond what
    the source warrants.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it.
