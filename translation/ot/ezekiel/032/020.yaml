id: EZK.32.20
reference: Ezekiel 32:20
source:
  edition: WLC
  text: בְּ/ת֥וֹךְ חַלְלֵי חֶ֖רֶב יִפֹּ֑לוּ חֶ֣רֶב נִתָּ֔נָה מָשְׁכ֥וּ אוֹתָ֖/הּ וְ/כָל
    הֲמוֹנֶֽי/הָ־־׃
translation:
  text: They will fall among those slain by the sword. The sword is given; drag her
    away, and all her multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A sword is appointed'; the Hebrew clause is terse and may express that
      the sword has been assigned for judgment.
    reason: alternative_reading
  - marker: b
    text: That is, Egypt personified, together with all her people.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  - among the midst of
  lexicon: HALOT
  rationale: The preposition plus noun literally means 'in the midst of,' but idiomatic
    English in this context is 'among,' preserving the sense of being counted within
    the company of the slain.
- source_word: חַלְלֵי חֶרֶב
  chosen: those slain by the sword
  alternatives:
  - the slain of the sword
  - the sword-slain
  lexicon: HALOT
  rationale: The construct phrase denotes people pierced/killed in battle. 'Those
    slain by the sword' is natural English and preserves the violent judicial-war
    context.
- source_word: יִפֹּלוּ
  chosen: will fall
  alternatives:
  - shall fall
  lexicon: HALOT
  rationale: Qal imperfect 3mp here is future/predictive in context. 'Will fall' is
    contemporary English while retaining the prophetic force.
- source_word: חֶרֶב נִתָּנָה
  chosen: The sword is given
  alternatives:
  - A sword is appointed
  - The sword has been given over
  lexicon: HALOT
  rationale: The terse clause is difficult, but the passive of נתן naturally yields
    'is given.' Retaining 'sword' as subject preserves the abrupt, judgment-oracle
    style and avoids over-interpretation.
- source_word: מָשְׁכוּ
  chosen: drag
  alternatives:
  - draw
  - pull
  lexicon: HALOT
  rationale: The imperative plural calls for forceful movement. In context of descent
    to the pit/realm of the dead, 'drag' better conveys the violent action than the
    more ambiguous 'draw.'
- source_word: אוֹתָהּ
  chosen: her away
  alternatives:
  - her
  - it
  lexicon: HALOT
  rationale: The feminine singular pronoun most naturally refers to Egypt as a feminine
    national entity in the surrounding context. 'Away' is supplied in English to make
    the command idiomatic with 'drag.'
- source_word: וְכָל הֲמוֹנֶיהָ
  chosen: with all her multitude
  alternatives:
  - and all her hordes
  - and all her throng
  lexicon: HALOT
  rationale: הָמוֹן in Ezekiel often refers to the noisy mass, multitude, or hordes
    associated with a nation. 'Multitude' is broad and fits the funeral/judgment setting
    without implying only military forces.
