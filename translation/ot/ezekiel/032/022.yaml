id: EZK.32.22
reference: Ezekiel 32:22
source:
  edition: WLC
  text: שָׁ֤ם אַשּׁוּר֙ וְ/כָל קְהָלָ֔/הּ סְבִֽיבוֹתָ֖י/ו קִבְרֹתָ֑י/ו כֻּלָּ֣/ם חֲלָלִ֔ים
    הַ/נֹּפְלִ֖ים בֶּ/חָֽרֶב־׃
translation:
  text: There is Assyria and all her assembly, with his graves all around him; all
    of them are slain, fallen by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew shifts in gender/personification: ''Assyria'' and ''all her assembly''
      are followed by masculine suffixes in ''his graves'' and ''around him.'' The
      translation preserves this shift rather than smoothing it out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  chosen: There is
  alternatives:
  - There
  - There lies
  lexicon: HALOT
  rationale: Locative adverb introducing the next figure in the underworld tableau.
    'There is' gives natural English while preserving the deictic force.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: The proper name here denotes the nation/empire personified in Sheol.
    'Assyria' is the standard English transliteration for the geopolitical entity.
- source_word: וְכָל־קְהָלָהּ
  chosen: and all her assembly
  alternatives:
  - and all her company
  - and all her multitude
  lexicon: HALOT
  rationale: קהל denotes an assembled group. 'Assembly' preserves the collective sense
    without overinterpreting as military forces only. The suffix is morphologically
    3fs, agreeing with the nation personified as feminine, hence 'her.'
- source_word: סְבִיבוֹתָיו
  chosen: all around him
  alternatives:
  - around him
  - surrounding him
  lexicon: HALOT
  rationale: 'The plural form functions adverbially/locatively: those graves are situated
    around the central figure. ''All around him'' captures the spatial emphasis.'
- source_word: קִבְרֹתָיו
  chosen: his graves
  alternatives:
  - his tombs
  - his burial places
  lexicon: HALOT
  rationale: Though the antecedent is the personified Assyria, the masculine suffix
    here is retained in translation as 'his,' reflecting the Hebrew shift in personification.
    'Graves' is the most direct rendering.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: Summative pronoun referring to the whole group in the graves.
- source_word: חֲלָלִים
  chosen: slain
  alternatives:
  - killed
  - pierced ones
  lexicon: HALOT
  rationale: In this context the noun denotes those killed violently in battle. 'Slain'
    is concise and suitably grave.
- source_word: הַנֹּפְלִים
  chosen: fallen
  alternatives:
  - those who fell
  lexicon: HALOT
  rationale: Participial form further characterizing the dead. 'Fallen' preserves
    the martial register and parallels prophetic diction.
- source_word: בֶּחָרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare; 'by the sword' is the most idiomatic
    English equivalent.
