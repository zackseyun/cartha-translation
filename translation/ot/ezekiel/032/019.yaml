id: EZK.32.19
reference: Ezekiel 32:19
source:
  edition: WLC
  text: מִ/מִּ֖י נָעָ֑מְתָּ רְדָ֥/ה וְ/הָשְׁכְּבָ֖/ה אֶת עֲרֵלִֽים־׃
translation:
  text: Whom do you surpass in beauty? Go down, and be laid to rest with the uncircumcised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'More beautiful than whom are you?' The Hebrew is a rhetorical comparison.
    reason: lexical_alternative
  - marker: b
    text: Or, 'and lie down with the uncircumcised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמִּי
  chosen: Whom
  alternatives:
  - More than whom
  - Whom ... ?
  lexicon: HALOT
  rationale: The preposition מִן with the interrogative מִי yields a comparative sense,
    literally 'from whom?/more than whom?' In idiomatic English, 'Whom do you surpass...?'
    best captures the comparison and rhetorical question.
- source_word: נָעָמְתָּ
  chosen: do you surpass in beauty
  alternatives:
  - were you pleasant
  - are you more delightful than
  - are you more beautiful than
  lexicon: HALOT
  rationale: From נעם, here in a rhetorical comparative context within a lament over
    Egypt/Pharaoh. The sense is not mere pleasantness but attractiveness/splendor
    in comparison with others. 'Surpass in beauty' communicates the implied comparison
    naturally in English.
- source_word: רְדָה
  chosen: Go down
  alternatives:
  - Descend
  - Go down there
  lexicon: HALOT
  rationale: Imperative of ירד. In this context of descent to the realm of the dead,
    'Go down' is the standard and vivid rendering.
- source_word: וְהָשְׁכְּבָה
  chosen: and be laid to rest
  alternatives:
  - and lie down
  - and be laid down
  lexicon: HALOT
  rationale: Imperative/volitive form from שכב in a death context. A wooden 'lie down'
    could miss the funerary nuance. 'Be laid to rest' brings out the mortuary sense
    while remaining faithful to the context of joining the dead.
- source_word: אֶת
  chosen: with
  alternatives:
  - beside
  - among
  lexicon: HALOT
  rationale: 'Although אֶת is normally the direct-object marker, after שכב it can
    mark accompaniment/association in sense: lying with someone. English requires
    ''with'' to express the relation naturally.'
- source_word: עֲרֵלִים
  chosen: the uncircumcised
  alternatives:
  - the foreskinned
  - the uncircumcised ones
  lexicon: HALOT
  rationale: The term is a standard Hebrew designation for those outside the covenantal
    mark, and in Ezekiel's grave-oracle context it functions as a shame-laden category
    for the slain nations. 'The uncircumcised' is the established and precise rendering.
