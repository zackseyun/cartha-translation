theological_decisions:
- issue: Connotation of עֲרֵלִים in a judgment/oracle context
  chosen_reading: the uncircumcised
  alternative_readings:
  - the heathen
  - the unclean
  rationale: The Hebrew specifically refers to lack of circumcision, a concrete covenantal
    marker, not a generalized pagan or impure status. Retaining 'uncircumcised' preserves
    the text's covenantal and shame imagery without importing broader doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 5
