id: EZK.32.11
reference: Ezekiel 32:11
source:
  edition: WLC
  text: כִּ֛י כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה חֶ֥רֶב מֶֽלֶךְ בָּבֶ֖ל תְּבוֹאֶֽ/ךָ־׃
translation:
  text: 'For thus says the Lord GOD: The sword of the king of Babylon will come upon you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sword of the king of Babylon will come to/against you'; 'against you' brings out the hostile force of the idiom in this judgment context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement. 'For' best preserves the discourse connection in natural English.
- source_word: כֹּה
  chosen: thus
  alternatives:
  - this is what
  - so
  lexicon: HALOT
  rationale: Standard prophetic messenger formula with אָמַר. 'Thus' preserves the formal prophetic cadence without sounding archaic in this context.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, in prophetic formulae it is idiomatically rendered as present in English ('thus says') to convey the ongoing force of the divine declaration.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the divine name YHWH. Following the doctrine default, יְהוָה is rendered 'the LORD'; in the conventional English representation of the compound title, 'the Lord GOD' avoids the awkward 'Lord LORD' and preserves both elements.
- source_word: חֶרֶב
  chosen: The sword
  alternatives:
  - A sword
  lexicon: HALOT
  rationale: Though formally construct with 'king of Babylon,' the phrase functions as a definite, specific instrument of judgment already identified by context. 'The sword' best reflects the impending, known military threat.
- source_word: מֶלֶךְ בָּבֶל
  chosen: of the king of Babylon
  alternatives:
  - belonging to the king of Babylon
  - of Babylon's king
  lexicon: HALOT
  rationale: Straightforward construct chain. 'King of Babylon' is the most natural and transparent English rendering.
- source_word: תְּבוֹאֶךָ
  chosen: will come against you
  alternatives:
  - will come upon you
  - will come to you
  lexicon: HALOT
  rationale: The verb בוא with a hostile subject like 'sword' in judgment context implies hostile advance, not mere arrival. 'Against you' makes the adversative force explicit in idiomatic English.
