id: EZK.32.15
reference: Ezekiel 32:15
source:
  edition: WLC
  text: בְּ/תִתִּ/י֩ אֶת אֶ֨רֶץ מִצְרַ֜יִם שְׁמָמָ֣ה וּ/נְשַׁמָּ֗ה אֶ֚רֶץ מִ/מְּלֹאָ֔/הּ בְּ/הַכּוֹתִ֖/י אֶת כָּל י֣וֹשְׁבֵי בָ֑/הּ וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־־־־׃
translation:
  text: When I make the land of Egypt a desolation, and the land is desolated of all that fills it, when I strike down all who dwell in it, then they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the land is laid waste, emptied of all that fills it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/תִתִּ/י
  chosen: When I make
  alternatives:
  - When I give
  - In my making
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive construct of נתן introduces a temporal clause here: ''when I make/give.'' In context, נתן with a result complement (''the land of Egypt desolation'') idiomatically means ''make'' or ''turn into,'' not the more wooden ''give.'''
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt's land
  - the land, Egypt
  lexicon: HALOT
  rationale: Standard construct-like apposition rendered naturally in English as 'the land of Egypt.'
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. 'A desolation' preserves the nominal force better than the adjective 'desolate.'
- source_word: וּ/נְשַׁמָּה
  chosen: and the land is stripped
  alternatives:
  - and laid waste
  - and made desolate
  lexicon: HALOT
  rationale: This passive/descriptive form intensifies the devastation. Because שְׁמָמָה already covers 'desolation,' rendering this as 'is stripped' avoids redundant English while preserving the sense of being emptied or devastated.
- source_word: אֶרֶץ מִ/מְּלֹאָ/הּ
  chosen: the land is stripped of all that fills it
  alternatives:
  - the land from its fullness
  - the land of its abundance
  - the land of all that is in it
  lexicon: HALOT
  rationale: The phrase literally speaks of the land 'from its fullness,' i.e., deprived of what fills it. 'All that fills it' captures the idiom of fullness/contents without awkwardness.
- source_word: בְּ/הַכּוֹתִ/י
  chosen: when I strike down
  alternatives:
  - when I strike
  - when I smite
  lexicon: HALOT
  rationale: 'Again ב with infinitive construct is temporal: ''when I strike.'' ''Strike down'' makes explicit the lethal force in this judgment context.'
- source_word: כָּל יֹשְׁבֵי בָהּ
  chosen: all who dwell in it
  alternatives:
  - all its inhabitants
  - all who live in it
  lexicon: HALOT
  rationale: The participial expression literally means 'all the dwellers in it.' 'All who dwell in it' is close to the Hebrew and idiomatic English; 'inhabitants' would also be valid.
- source_word: וְיָדְעוּ
  chosen: then they will know
  alternatives:
  - and they will know
  lexicon: HALOT
  rationale: The conjunction here marks the result of the preceding judgment. 'Then' brings out the consequential force in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
