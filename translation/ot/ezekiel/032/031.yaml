id: EZK.32.31
reference: Ezekiel 32:31
source:
  edition: WLC
  text: אוֹתָ/ם֙ יִרְאֶ֣ה פַרְעֹ֔ה וְ/נִחַ֖ם עַל כָּל המונ/ה חַלְלֵי חֶ֨רֶב֙ פַּרְעֹ֣ה וְ/כָל חֵיל֔/וֹ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־־׃
translation:
  text: Pharaoh will see them and be comforted over all his multitude, Pharaoh and all his army, slain by the sword, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and be consoled' / 'and take comfort.' The Hebrew verb can also mean 'be sorry' or 'relent' in other contexts, but here it likely means that Pharaoh finds grim consolation when he sees others sharing his downfall.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring back to the nations/kings in Sheol described in the surrounding context; simple plural pronoun is sufficient.
- source_word: יִרְאֶה
  chosen: will see
  alternatives:
  - shall see
  - sees
  lexicon: HALOT
  rationale: Imperfect with future sense in prophetic discourse; 'will see' is natural modern English.
- source_word: וְנִחַם
  chosen: and be comforted
  alternatives:
  - and be consoled
  - and take comfort
  - and be sorry/relent
  lexicon: HALOT
  rationale: In this context נחם most naturally means to receive consolation upon seeing others share the same fate in the underworld. 'Be comforted' preserves the grim irony of the passage better than 'be sorry' or 'relent,' which do not fit the object phrase 'concerning all his multitude.'
- source_word: עַל כָּל הֲמוֹנוֹ
  chosen: concerning all his multitude
  alternatives:
  - over all his multitude
  - for all his throng
  - because of all his hordes
  lexicon: HALOT
  rationale: הָמוֹן here denotes the mass of Pharaoh's people/forces. 'Multitude' is suitably broad and traditional without being obscure. The preposition עַל after נחם is rendered 'concerning' to express the basis or occasion of consolation.
- source_word: חַלְלֵי חֶרֶב
  chosen: slain by the sword
  alternatives:
  - the sword-slain
  - those pierced by the sword
  lexicon: HALOT
  rationale: A standard Hebrew idiom for violent death in battle. 'Slain by the sword' is idiomatic English and preserves the martial sense.
- source_word: פַּרְעֹה וְכָל חֵילוֹ
  chosen: Pharaoh and all his army
  alternatives:
  - Pharaoh and all his host
  - Pharaoh and all his forces
  lexicon: HALOT
  rationale: חַיִל in this context refers to military force. 'Army' is the clearest modern rendering.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares.' Following doctrine guidance, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, the conventional English representation is 'Lord GOD' rather than 'Lord LORD.'
