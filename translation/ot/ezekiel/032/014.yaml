theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine excerpt sets the default rendering of יְהוָה as 'the LORD.'
    In the fixed combination אֲדֹנָי יְהוִה, English translations commonly use 'the
    Lord GOD' to preserve reverence and avoid awkward repetition. This is a translational
    convention rather than a doctrinally loaded choice.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
