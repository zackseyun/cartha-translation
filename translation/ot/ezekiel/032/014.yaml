id: EZK.32.14
reference: Ezekiel 32:14
source:
  edition: WLC
  text: אָ֚ז אַשְׁקִ֣יעַ מֵֽימֵי/הֶ֔ם וְ/נַהֲרוֹתָ֖/ם כַּ/שֶּׁ֣מֶן אוֹלִ֑יךְ נְאֻ֖ם
    אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: Then I will let their waters settle, and I will make their rivers flow like
    oil, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will make their waters sink/subside.' The Hebrew verb can denote
      causing waters to settle down or become still.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will lead their rivers like oil,' that is, cause them to move smoothly
      like oil.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the consequent moment in the oracle; 'Then' is
    natural and sufficiently formal.
- source_word: אַשְׁקִיעַ
  chosen: I will let ... settle
  alternatives:
  - I will cause ... to sink
  - I will make ... subside
  - I will calm
  lexicon: HALOT
  rationale: Hiphil of שקע conveys causing to sink/subside. With 'waters' as object,
    the sense is that the waters become settled or clear after prior disturbance.
    'Let their waters settle' captures the causative sense in idiomatic English without
    over-paraphrase.
- source_word: מֵימֵיהֶם
  chosen: their waters
  alternatives:
  - their water
  lexicon: HALOT
  rationale: Plural form is retained in English as 'waters,' a common biblical and
    poetic usage appropriate to the imagery.
- source_word: וְנַהֲרוֹתָם
  chosen: and ... their rivers
  alternatives:
  - and their streams
  - and their canals
  lexicon: HALOT
  rationale: נְהָרוֹת normally denotes rivers/streams. 'Rivers' best fits the large-scale
    Nile imagery in the surrounding context.
- source_word: כַּשֶּׁמֶן
  chosen: like oil
  alternatives:
  - like olive oil
  lexicon: HALOT
  rationale: שֶׁמֶן is 'oil,' often olive oil by default. 'Like oil' preserves the
    simile's brevity and smooth-flowing imagery; specifying 'olive' would add detail
    not explicit in the text.
- source_word: אוֹלִיךְ
  chosen: I will make ... flow
  alternatives:
  - I will lead
  - I will cause to go
  - I will conduct
  lexicon: HALOT
  rationale: Hiphil of הלך is causative, 'cause to go.' With rivers as subject/object
    of motion, idiomatic English is 'make their rivers flow.'
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is readable modern English and
    preserves the solemn divine speech formula.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD.' In the compound title
    אֲדֹנָי יְהוִה, standard English convention is 'the Lord GOD' to avoid 'Lord LORD'
    while still signaling the divine name.
