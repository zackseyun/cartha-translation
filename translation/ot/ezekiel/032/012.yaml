theological_decisions:
- issue: Sense of גְּאוֹן in a judgment oracle
  chosen_reading: the pride of Egypt
  alternative_readings:
  - the majesty of Egypt
  - the wealth of Egypt
  rationale: The term can denote both arrogant pride and the grandeur in which a nation
    glories. In this oracle of humiliation, 'pride' best captures the prophetic theme
    while still allowing the broader sense of Egypt's splendor to be heard.
