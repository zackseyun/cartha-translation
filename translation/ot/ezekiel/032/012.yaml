id: EZK.32.12
reference: Ezekiel 32:12
source:
  edition: WLC
  text: בְּ/חַרְב֤וֹת גִּבּוֹרִים֙ אַפִּ֣יל הֲמוֹנֶ֔/ךָ עָרִיצֵ֥י גוֹיִ֖ם כֻּלָּ֑/ם
    וְ/שָֽׁדְדוּ֙ אֶת גְּא֣וֹן מִצְרַ֔יִם וְ/נִשְׁמַ֖ד כָּל הֲמוֹנָֽ/הּ־־׃
translation:
  text: By the swords of mighty men I will make your multitude fall— all of them the
    ruthless ones of the nations. They will plunder the pride of Egypt, and all her
    multitude will be destroyed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tyrants of the nations' for 'the ruthless ones of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the majesty of Egypt'; the Hebrew can denote both pride and grandeur.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחַרְבוֹת
  chosen: By the swords of
  alternatives:
  - With the swords of
  lexicon: HALOT
  rationale: The preposition ב plus 'swords' is instrumental here, indicating means.
    'By the swords of' is natural English and preserves the image of destruction through
    warfare.
- source_word: גִּבּוֹרִים
  chosen: mighty men
  alternatives:
  - warriors
  - mighty ones
  lexicon: HALOT
  rationale: גִּבּוֹרִים commonly denotes strong warriors or mighty men. 'Mighty men'
    keeps the formal force and matches the martial context; 'warriors' is possible
    but slightly more interpretive.
- source_word: אַפִּיל
  chosen: I will make ... fall
  alternatives:
  - I will cause ... to fall
  - I will cast down
  lexicon: HALOT
  rationale: Hiphil of נפל is causative. 'I will make your multitude fall' is idiomatic
    English that preserves the causative sense without sounding wooden.
- source_word: הֲמוֹנֶךָ
  chosen: your multitude
  alternatives:
  - your hordes
  - your throng
  lexicon: HALOT
  rationale: הָמוֹן in Ezekiel often refers to a mass, multitude, or noisy throng,
    especially of people. 'Multitude' is broad and fits both military and populous
    senses in this lament context.
- source_word: עָרִיצֵי גוֹיִם כֻּלָּם
  chosen: all of them the ruthless ones of the nations
  alternatives:
  - all of them, the tyrants of the nations
  - all of them, the ruthless of the nations
  lexicon: HALOT
  rationale: עָרִיץ carries the sense of ruthless, violent, or tyrannical persons.
    'Ruthless ones of the nations' preserves the appositional force and avoids over-specifying
    political office implied by 'tyrants.'
- source_word: וְשָׁדְדוּ
  chosen: They will plunder
  alternatives:
  - They will devastate
  - They will despoil
  lexicon: HALOT
  rationale: The verb שׁדד often means to plunder or despoil. 'Plunder' fits the military
    setting and takes the direct object naturally in English.
- source_word: גְּאוֹן מִצְרַיִם
  chosen: the pride of Egypt
  alternatives:
  - the majesty of Egypt
  - the wealth of Egypt
  lexicon: HALOT
  rationale: גָּאוֹן can denote pride, exaltation, or majesty. In prophetic judgment
    contexts it often has the negative sense of arrogant pride, but can also include
    what Egypt boasts in. 'The pride of Egypt' preserves that ambiguity and prophetic
    resonance.
- source_word: וְנִשְׁמַד
  chosen: will be destroyed
  alternatives:
  - will be annihilated
  - will perish
  lexicon: HALOT
  rationale: Niphal of שׁמד expresses being destroyed or exterminated. 'Will be destroyed'
    is strong, clear, and idiomatic without overstating beyond the Hebrew.
- source_word: כָּל הֲמוֹנָהּ
  chosen: all her multitude
  alternatives:
  - all her hordes
  - all her throng
  lexicon: HALOT
  rationale: The feminine suffix refers back to Egypt. Repeating 'multitude' reflects
    the Hebrew repetition of הָמוֹן and preserves the rhetorical parallelism of the
    verse.
