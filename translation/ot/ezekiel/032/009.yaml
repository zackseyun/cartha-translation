id: EZK.32.9
reference: Ezekiel 32:9
source:
  edition: WLC
  text: וְ/הִ֨כְעַסְתִּ֔י לֵ֖ב עַמִּ֣ים רַבִּ֑ים בַּ/הֲבִיאִ֤/י שִׁבְרְ/ךָ֙ בַּ/גּוֹיִ֔ם
    עַל אֲרָצ֖וֹת אֲשֶׁ֥ר לֹֽא יְדַעְתָּֽ/ם־־׃
translation:
  text: And I will trouble the hearts of many peoples when I bring your ruin among
    the nations, into lands that you have not known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will anger the heart of many peoples,' or 'I will grieve the hearts
      of many peoples.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your destruction.' The Hebrew term can denote breaking, fracture, or
      ruin.
    reason: lexical_alternative
  - marker: c
    text: Or 'to lands that you have not known.' The phrase refers to foreign lands
      unfamiliar to you.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכְעַסְתִּי
  chosen: I will trouble
  alternatives:
  - I will vex
  - I will anger
  - I will grieve
  lexicon: HALOT
  rationale: The Hiphil of כעס can mean to provoke to anger or to cause grief/disturbance.
    In this judgment context, the object is 'the heart' of many peoples, so 'trouble'
    captures inner agitation without narrowing the sense to simple anger alone.
- source_word: לֵב
  chosen: the hearts of
  alternatives:
  - the heart of
  lexicon: HALOT
  rationale: Though singular in Hebrew, לֵב often functions collectively with a plural
    genitive. English idiom prefers the distributive plural 'the hearts of many peoples.'
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples groups
  lexicon: HALOT
  rationale: עַמִּים is best rendered 'peoples' here to distinguish it from the later
    גּוֹיִם ('nations') and to preserve the broader ethnic sense.
- source_word: בַּהֲבִיאִי
  chosen: when I bring
  alternatives:
  - in my bringing
  - as I bring
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance
    here. 'When I bring' is natural English and preserves the causal-temporal linkage.
- source_word: שִׁבְרְךָ
  chosen: your ruin
  alternatives:
  - your destruction
  - your breaking
  - your collapse
  lexicon: HALOT
  rationale: שֶׁבֶר commonly denotes breaking, fracture, or ruin/disaster. In an oracle
    against Pharaoh/Egypt, 'your ruin' communicates the result of divine judgment
    in idiomatic English.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - into the nations
  - among the Gentiles
  lexicon: HALOT
  rationale: With a verb of bringing and the context of international dissemination
    of Egypt's downfall, 'among the nations' best conveys public exposure before foreign
    nations.
- source_word: עַל אֲרָצוֹת
  chosen: into lands
  alternatives:
  - over lands
  - upon lands
  - to lands
  lexicon: HALOT
  rationale: Although עַל often means 'upon/over,' in this construction after 'bring
    ... among the nations' it extends the movement to foreign territories. 'Into lands'
    gives the sense in clear English.
- source_word: אֲשֶׁר לֹא יְדַעְתָּם
  chosen: that you have not known
  alternatives:
  - which you did not know
  - that you have never known
  lexicon: HALOT
  rationale: יָדַע here means experiential acquaintance. 'Have not known' preserves
    the perfect's stative/resultative force and fits the address to Pharaoh/Egypt
    regarding unfamiliar lands.
