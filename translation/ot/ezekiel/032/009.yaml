theological_decisions:
- issue: Nature of the judgment's emotional effect on the nations
  chosen_reading: The verse describes God causing inward distress/agitation among
    many peoples at news or display of Egypt's downfall, not merely inciting anger.
  alternative_readings:
  - God will make many peoples angry
  - God will make many peoples mourn
  rationale: The verb כעס in Hiphil can overlap anger and vexation, but the object
    'heart' broadens the effect to inner turmoil. The translation avoids over-specifying
    one emotional response where the Hebrew allows a wider range.
  doctrine_reference: Preserve theological tension rather than resolve it.
