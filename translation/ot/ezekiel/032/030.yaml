theological_decisions:
- issue: Rendering of עֲרֵלִים in a judgment context
  chosen_reading: uncircumcised
  alternative_readings:
  - uninitiated
  - outside the covenant
  rationale: The Hebrew term is literal and carries covenantal shame implications
    in Ezekiel. The translation preserves the concrete term and lets the theological
    force arise from the context rather than importing an interpretive paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Temporal/aspectual rendering of wayyiqtol verbs in a Sheol catalog
  chosen_reading: present-state English for וַיִּשְׁכְּבוּ ('They lie')
  alternative_readings:
  - simple past 'and they lay down'
  rationale: Though formally past, the discourse function here is descriptive of the
    current arrangement of the dead in the pit. Present English better reflects the
    visionary catalog style without distorting the Hebrew sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
