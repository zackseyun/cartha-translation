id: EZK.32.30
reference: Ezekiel 32:30
source:
  edition: WLC
  text: שָׁ֣מָּ/ה נְסִיכֵ֥י צָפ֛וֹן כֻּלָּ֖/ם וְ/כָל צִֽדֹנִ֑י אֲשֶׁר יָרְד֣וּ אֶת
    חֲלָלִ֗ים בְּ/חִתִּיתָ֤/ם מִ/גְבֽוּרָתָ/ם֙ בּוֹשִׁ֔ים וַ/יִּשְׁכְּב֤וּ עֲרֵלִים֙
    אֶת חַלְלֵי חֶ֔רֶב וַ/יִּשְׂא֥וּ כְלִמָּתָ֖/ם אֶת י֥וֹרְדֵי בֽוֹר־־־־־־׃
translation:
  text: There are all the princes of the north, and all the Sidonians, who went down
    with the slain, ashamed despite the terror they caused by their might. They lie
    uncircumcised with those slain by the sword, and they bear their disgrace with
    those who go down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There they are, all the princes of the north.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their terror from their might,' that is, the terror they inspired
      because of their military strength.
    reason: lexical_alternative
  - marker: c
    text: '''Uncircumcised'' is retained as a literal covenantal term of shame in
      Ezekiel''s judgment language.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמָּה
  chosen: There are
  alternatives:
  - There
  - There they are
  lexicon: HALOT
  rationale: In this catalog of the dead in Sheol, the adverb points out presence
    in that realm. English idiom is smoother with an existential 'There are' rather
    than a bare 'There.'
- source_word: נְסִיכֵי צָפוֹן
  chosen: the princes of the north
  alternatives:
  - the leaders of the north
  - the chiefs of the north
  lexicon: HALOT
  rationale: נְסִיךְ denotes princes/rulers. 'Princes' preserves the elevated political
    sense without over-specifying monarchy.
- source_word: כֻּלָּם
  chosen: all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Included to preserve the comprehensive force of the Hebrew.
- source_word: וְכָל צִדֹנִי
  chosen: and all the Sidonians
  alternatives:
  - and every Sidonian
  - and all of Sidon
  lexicon: HALOT
  rationale: The singular gentilic functions collectively. 'The Sidonians' is natural
    English and preserves the people-group reference.
- source_word: יָרְדוּ
  chosen: went down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: A common idiom in this chapter for descent to the realm of the dead;
    'went down' is clear and natural.
- source_word: אֶת חֲלָלִים
  chosen: with the slain
  alternatives:
  - to the slain
  - among the slain
  lexicon: HALOT
  rationale: 'Although אֶת normally marks the direct object, in this context after
    ''went down'' it functions associatively in sense: they descended in company with
    the slain. This matches the repeated pattern in Ezekiel 32.'
- source_word: בְּחִתִּיתָם
  chosen: the terror they caused
  alternatives:
  - their terror
  - their dreadfulness
  lexicon: HALOT
  rationale: The noun denotes terror/dread associated with them; in context it is
    terror imposed on others, not merely fear felt by them.
- source_word: מִגְבוּרָתָם
  chosen: by their might
  alternatives:
  - because of their might
  - from their might
  lexicon: HALOT
  rationale: 'The preposition marks source or basis: the terror proceeded from their
    military strength. ''By their might'' is concise and idiomatic.'
- source_word: בּוֹשִׁים
  chosen: ashamed
  alternatives:
  - put to shame
  - disgraced
  lexicon: HALOT
  rationale: The participle describes their present condition in death. 'Ashamed'
    preserves the adjectival force; the resulting disgrace is then echoed by כְלִמָּתָם
    later in the verse.
- source_word: וַיִּשְׁכְּבוּ
  chosen: They lie
  alternatives:
  - and they lay down
  - and they have lain
  lexicon: HALOT
  rationale: In this funerary/sheol context, the wayyiqtol describes resultant state.
    Present 'They lie' communicates their ongoing condition among the dead.
- source_word: עֲרֵלִים
  chosen: uncircumcised
  alternatives:
  - as uncircumcised
  lexicon: HALOT
  rationale: This is a key covenantal and shame marker in Ezekiel's oracles against
    the nations. The literal term should be preserved, not paraphrased.
- source_word: אֶת חַלְלֵי חֶרֶב
  chosen: with those slain by the sword
  alternatives:
  - with the sword-slain
  - among those pierced by the sword
  lexicon: HALOT
  rationale: Again אֶת is best represented associatively in English. 'Those slain
    by the sword' is clear modern English.
- source_word: וַיִּשְׂאוּ כְלִמָּתָם
  chosen: and they bear their disgrace
  alternatives:
  - and they carry their shame
  - and they have borne their humiliation
  lexicon: HALOT
  rationale: נשא with כְלִמָּה is an idiom for bearing shame/disgrace. 'Disgrace'
    avoids repetition with 'ashamed' while preserving the semantic field.
- source_word: אֶת יֹרְדֵי בוֹר
  chosen: with those who go down to the pit
  alternatives:
  - with those who descend to the pit
  - among those who go down to the pit
  lexicon: HALOT
  rationale: The phrase is a stock expression for the dead. 'Pit' preserves the imagery
    of the grave/underworld without over-interpreting.
