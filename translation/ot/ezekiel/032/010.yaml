id: EZK.32.10
reference: Ezekiel 32:10
source:
  edition: WLC
  text: וַ/הֲשִׁמּוֹתִ֨י עָלֶ֜י/ךָ עַמִּ֣ים רַבִּ֗ים וּ/מַלְכֵי/הֶם֙ יִשְׂעֲר֤וּ עָלֶ֨י/ךָ֙
    שַׂ֔עַר בְּ/עוֹפְפִ֥/י חַרְבִּ֖/י עַל פְּנֵי/הֶ֑ם וְ/חָרְד֤וּ לִ/רְגָעִים֙ אִ֣ישׁ
    לְ/נַפְשׁ֔/וֹ בְּ/י֖וֹם מַפַּלְתֶּֽ/ךָ־׃ס
translation:
  text: I will make many peoples appalled at you, and their kings will shudder with
    horror because of you when I brandish my sword before them; and they will tremble
    every moment, each man for his own life, on the day of your downfall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kings will be horribly afraid because of you'—the Hebrew uses
      a verb and cognate noun for intense horror.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'when I make my sword fly before them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from moment to moment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁמּוֹתִי
  chosen: I will make ... appalled
  alternatives:
  - I will devastate
  - I will make desolate
  - I will astonish
  lexicon: HALOT
  rationale: Hiphil of שמם here takes peoples as object and עָלֶיךָ with reference
    to Egypt; in this construction the sense is causative astonishment/desolation.
    'Make ... appalled' best fits the following reaction language and idiomatic English.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples
  lexicon: HALOT
  rationale: עַמִּים is more literally 'peoples' than 'nations'; retained to reflect
    collective ethnic groups rather than modern nation-states.
- source_word: יִשְׂעֲרוּ ... שַׂעַר
  chosen: will shudder with horror
  alternatives:
  - will be horribly afraid
  - will be storm-tossed with terror
  - will bristle in horror
  lexicon: HALOT
  rationale: The verb שער with cognate noun שַׂעַר forms an intensive expression of
    violent trembling/horror. 'Shudder with horror' captures the cognate emphasis
    in natural English.
- source_word: בְּעוֹפְפִי חַרְבִּי
  chosen: when I brandish my sword
  alternatives:
  - when I make my sword fly
  - as I wave my sword
  - when my sword flashes
  lexicon: HALOT
  rationale: The infinitive of עוּף literally suggests flying; with 'my sword' it
    is an idiom for swinging/brandishing. 'Brandish' preserves the vivid martial image
    without awkward literalism.
- source_word: עַל־פְּנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  - over against them
  lexicon: HALOT
  rationale: Idiomatic spatial rendering in context of public display of divine judgment.
- source_word: וְחָרְדוּ
  chosen: and they will tremble
  alternatives:
  - and they will quake
  - and they will be terrified
  lexicon: HALOT
  rationale: חרד denotes trembling in fear; 'tremble' keeps the physical and emotional
    sense.
- source_word: לִרְגָעִים
  chosen: every moment
  alternatives:
  - continually
  - from moment to moment
  - for moments
  lexicon: HALOT
  rationale: Plural of רגע with ל expresses repeated moments; 'every moment' conveys
    ongoing panic more clearly than the less idiomatic 'for moments.'
- source_word: אִישׁ לְנַפְשׁוֹ
  chosen: each man for his own life
  alternatives:
  - each one for himself
  - each man for his soul
  - each for his own life
  lexicon: HALOT
  rationale: Literally 'a man for his life/soul.' In context of mortal fear, נֶפֶשׁ
    is best rendered 'life.' 'Each man' preserves the singular distributive masculine
    form per gender-accurate policy.
- source_word: בְּיוֹם מַפַּלְתֶּךָ
  chosen: on the day of your downfall
  alternatives:
  - in the day of your fall
  - on the day you fall
  - on the day of your collapse
  lexicon: HALOT
  rationale: מַפָּלָה denotes downfall/fall in judgment. 'Downfall' is natural English
    and preserves the catastrophic sense addressed to Egypt.
