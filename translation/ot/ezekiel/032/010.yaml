theological_decisions:
- issue: Divine agency in judgment imagery
  chosen_reading: The speaker is God directly threatening Egypt and the nations with
    fear through his own sword.
  alternative_readings:
  - The sword could be understood instrumentally through Babylon as God's agent.
  rationale: The first-person suffixes and verbs ('I will make,' 'my sword') present
    direct divine agency. The translation preserves that immediacy while not excluding
    historical mediation by Babylon.
