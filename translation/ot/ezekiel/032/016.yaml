id: EZK.32.16
reference: Ezekiel 32:16
source:
  edition: WLC
  text: קִינָ֥ה הִיא֙ וְ/ק֣וֹנְנ֔וּ/הָ בְּנ֥וֹת הַ/גּוֹיִ֖ם תְּקוֹנֵ֣נָּה אוֹתָ֑/הּ
    עַל מִצְרַ֤יִם וְ/עַל כָּל הֲמוֹנָ/הּ֙ תְּקוֹנֵ֣נָּה אוֹתָ֔/הּ נְאֻ֖ם אֲדֹנָ֥/י
    יְהוִֽה־־־׃פ
translation:
  text: This is a lamentation, and the daughters of the nations will lament over her.
    They will lament over Egypt and over all her multitude, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is a dirge'; the Hebrew קִינָה can denote a funeral song or lament.
    reason: lexical_alternative
  - marker: b
    text: Or 'the women of the nations'; literally 'the daughters of the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִינָה
  chosen: lamentation
  alternatives:
  - dirge
  - lament
  lexicon: HALOT
  rationale: Denotes a funeral lament or dirge. 'Lamentation' is natural English and
    preserves the formal tone; 'dirge' is possible but somewhat narrower and less
    common.
- source_word: וְקֹנְנוּהָ
  chosen: and the daughters of the nations will lament over her
  alternatives:
  - and they shall chant a lament over her
  - and they shall mourn her
  lexicon: HALOT
  rationale: From קונן, to sing or utter a lament. The suffix refers back to the lamentation/song
    as something performed, but in English the sense is best carried by making the
    mourners explicit with the following subject. 'Lament over her' preserves the
    idiom without awkwardness.
- source_word: בְּנוֹת הַגּוֹיִם
  chosen: the daughters of the nations
  alternatives:
  - the women of the nations
  lexicon: HALOT
  rationale: A gender-accurate rendering of the Hebrew expression. It likely refers
    to women as professional mourners or representative female mourners among the
    nations. 'Daughters' keeps the metaphorical/familial wording of the source.
- source_word: תְּקוֹנֵנָּה
  chosen: will lament
  alternatives:
  - shall chant a lament
  - shall wail
  lexicon: HALOT
  rationale: Imperfect verb from קונן indicating future or modal action in prophetic
    discourse. 'Will lament' is clear, idiomatic, and consistent with the noun קִינָה.
- source_word: עַל
  chosen: over
  alternatives:
  - for
  - concerning
  lexicon: HALOT
  rationale: In lament contexts, עַל commonly marks the object of mourning. 'Over'
    is the most idiomatic English choice here.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English name for the nation.
- source_word: כָּל הֲמוֹנָהּ
  chosen: all her multitude
  alternatives:
  - all her hordes
  - all her wealth
  - all her throng
  lexicon: HALOT
  rationale: הָמוֹן in Ezekiel often refers to the mass, multitude, or noisy throng
    associated with a nation. 'Multitude' is broad enough to include Egypt's people/host
    without over-specifying military force.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: Prophetic messenger formula. 'Declares' is standard, readable English.
    Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'Lord
    GOD' reflects the conventional distinction without producing 'Lord LORD.'
