theological_decisions:
- issue: Rendering the divine name יְהוָה in the prophetic formula נְאֻם אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD.' In the compound אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid
    the awkward 'Lord LORD' while still signaling the divine name. This preserves
    reverence tradition and established differentiation in English Bible style.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
