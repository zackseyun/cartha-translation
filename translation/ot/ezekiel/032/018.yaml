theological_decisions:
- issue: Nature of the underworld imagery in אֶרֶץ תַּחְתִּיּוֹת / בוֹר
  chosen_reading: Render the imagery concretely as 'the land beneath' and 'the pit'
    without identifying it with a later, more systematized doctrine such as hell.
  alternative_readings:
  - the netherworld
  - Sheol
  - hell
  rationale: The Hebrew depicts the realm of the dead in poetic judgment language.
    The translation preserves the imagery and theological tension without importing
    later doctrinal specificity not explicit in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
