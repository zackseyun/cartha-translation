id: EZK.32.18
reference: Ezekiel 32:18
source:
  edition: WLC
  text: בֶּן אָדָ֕ם נְהֵ֛ה עַל הֲמ֥וֹן מִצְרַ֖יִם וְ/הוֹרִדֵ֑/הוּ א֠וֹתָ/הּ וּ/בְנ֨וֹת
    גּוֹיִ֧ם אַדִּרִ֛ם אֶל אֶ֥רֶץ תַּחְתִּיּ֖וֹת אֶת י֥וֹרְדֵי בֽוֹר־־־־׃
translation:
  text: Son of man, wail over the multitude of Egypt, and bring her down—her and the
    daughters of mighty nations—to the land beneath, with those who go down to the
    pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lament over the hordes of Egypt.' The Hebrew word can denote a multitude
      or throng.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the daughters of mighty nations,' a figurative expression for nations
      or peoples associated with Egypt.
    reason: cultural_note
  - marker: c
    text: Or 'the lower earth' or 'the netherworld.' The Hebrew speaks of the realm
      beneath, associated with the dead.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional rendering in Ezekiel for the divine address בן אדם. It is
    transparent to the Hebrew and preserves the idiomatic prophetic form of address
    better than more interpretive alternatives.
- source_word: נְהֵה
  chosen: wail
  alternatives:
  - lament
  - groan
  lexicon: HALOT
  rationale: The verb denotes lamentation or dirge-like mourning. 'Wail' captures
    the audible, funeral-like force in a concise modern English form.
- source_word: הֲמוֹן מִצְרַיִם
  chosen: the multitude of Egypt
  alternatives:
  - the hordes of Egypt
  - the wealth of Egypt
  lexicon: HALOT
  rationale: המון commonly denotes a multitude, throng, or noisy mass. In this judgment
    context it most naturally refers to Egypt's populous mass rather than specifically
    wealth, so 'multitude' is preferred.
- source_word: וְהוֹרִדֵהוּ
  chosen: bring her down
  alternatives:
  - cast her down
  - make it descend
  - bring him down
  lexicon: HALOT
  rationale: The consonantal form points to a causative imperative from ירד, 'cause
    to go down.' Because the following object marker אותָהּ is feminine singular and
    clearly resumes Egypt as a nation, the English reflects the sense as 'bring her
    down.' The masculine pronominal suffix in the written form is difficult and likely
    reflects the verse's syntactic irregularity; the translation follows the overall
    sense rather than reproducing the mismatch woodenly.
- source_word: אוֹתָהּ
  chosen: her
  alternatives:
  - it
  lexicon: HALOT
  rationale: Egypt as a nation is regularly treated as feminine in Hebrew, so 'her'
    is the most natural gender-accurate rendering in English.
- source_word: וּבְנוֹת גּוֹיִם אַדִּרִם
  chosen: her and the daughters of mighty nations
  alternatives:
  - and the daughters of majestic nations
  - and the daughters of powerful peoples
  lexicon: HALOT
  rationale: '''Daughters'' is retained formally because it is the Hebrew image, likely
    referring to dependent peoples or personified nations associated with Egypt. אַדִּרִם
    conveys might or majesty; ''mighty nations'' is clear and natural.'
- source_word: אֶרֶץ תַּחְתִּיּוֹת
  chosen: the land beneath
  alternatives:
  - the lower earth
  - the netherworld
  - the lowest parts of the earth
  lexicon: HALOT
  rationale: Literally 'the land of lower parts/places.' 'The land beneath' preserves
    the downward, underworld-oriented imagery without over-specifying a later technical
    doctrine of the afterlife.
- source_word: אֶת יֹרְדֵי בוֹר
  chosen: with those who go down to the pit
  alternatives:
  - to those who go down to the pit
  - with the pit-descenders
  lexicon: HALOT
  rationale: 'The phrase identifies the company of the dead. Rendering אֶת here as
    associative, ''with,'' best fits the sense: Egypt is brought down into the realm
    occupied by those descending to the pit.'
- source_word: בּוֹר
  chosen: the pit
  alternatives:
  - the grave
  - the dungeon
  lexicon: HALOT
  rationale: In this context of descent to the underworld, 'pit' is the standard and
    most transparent rendering, preserving the metaphorical and funerary resonance.
