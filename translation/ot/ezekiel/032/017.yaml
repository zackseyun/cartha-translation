id: EZK.32.17
reference: Ezekiel 32:17
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בִּ/שְׁתֵּ֣י עֶשְׂרֵ֣ה שָׁנָ֔ה בַּ/חֲמִשָּׁ֥ה עָשָׂ֖ר לַ/חֹ֑דֶשׁ
    הָיָ֥ה דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And it happened in the twelfth year, on the fifteenth day of the month, that
    the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text renders the divine name as ''the LORD''
      in keeping with the project''s standard practice.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a dated prophetic notice. 'And
    it happened' preserves the Hebrew discourse function while using readable modern
    English; 'came to pass' is more traditional but archaic.
- source_word: בִּשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: in the twelfth year
  alternatives:
  - in year twelve
  lexicon: HALOT
  rationale: Standard dating formula. English idiom prefers ordinal expression 'the
    twelfth year' rather than a more wooden rendering.
- source_word: בַּחֲמִשָּׁה עָשָׂר לַחֹדֶשׁ
  chosen: on the fifteenth day of the month
  alternatives:
  - on the fifteenth of the month
  - on day fifteen of the month
  lexicon: HALOT
  rationale: The Hebrew literally gives 'on the fifteen of the month'; idiomatic English
    supplies 'day.' This keeps the formal dating structure clear.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the word of Yahweh
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than 'Yahweh.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct and natural rendering of the preposition plus first-person suffix.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: Conventional introduction to direct speech in prophetic formulas; 'saying'
    best reflects the infinitive construction and anticipates the following oracle.
