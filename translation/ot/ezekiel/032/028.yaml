id: EZK.32.28
reference: Ezekiel 32:28
source:
  edition: WLC
  text: וְ/אַתָּ֗ה בְּ/ת֧וֹךְ עֲרֵלִ֛ים תִּשָּׁבַ֥ר וְ/תִשְׁכַּ֖ב אֶת חַלְלֵי חָֽרֶב־־׃
translation:
  text: But you, in the midst of the uncircumcised, will be broken and will lie with
    those slain by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'with the slain of the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - You also
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a direct, emphatic address
    and a transition from the preceding nations to Pharaoh/Egypt. 'But you' captures
    the adversative force in context better than a simple 'and you.'
- source_word: בְּ/ת֧וֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: HALOT
  rationale: The phrase denotes being situated among a group. 'In the midst of' preserves
    the solemn, poetic register of the lament while remaining clear.
- source_word: עֲרֵלִים
  chosen: the uncircumcised
  alternatives:
  - the foreskinned
  - the unclean
  lexicon: HALOT
  rationale: The literal sense is 'uncircumcised ones.' In Ezekiel this is a stock
    term of disgrace for those outside covenant honor in death. 'The uncircumcised'
    is the standard, transparent rendering and preserves the cultural-theological
    force without overinterpreting it as merely 'unclean.'
- source_word: תִּשָּׁבַר
  chosen: will be broken
  alternatives:
  - will be shattered
  - will be crushed
  lexicon: HALOT
  rationale: Niphal imperfect of שבר here is best taken as passive/reflexive, describing
    defeat and ruin. 'Will be broken' is sufficiently literal and fits the funeral/judgment
    imagery; 'shattered' is possible but slightly more interpretive.
- source_word: וְ/תִשְׁכַּב
  chosen: and will lie
  alternatives:
  - and will lie down
  lexicon: HALOT
  rationale: שׁכב is a common euphemistic verb for lying in death or burial. 'Will
    lie' is concise and natural in English, while the following phrase supplies the
    funerary context.
- source_word: אֶת חַלְלֵי חָרֶב
  chosen: with those slain by the sword
  alternatives:
  - with the slain of the sword
  - with the sword-slain
  lexicon: HALOT
  rationale: The object marker with שׁכב in this context yields the sense of lying
    together with the dead. 'Those slain by the sword' is idiomatic modern English
    while preserving the violent judgment imagery of the Hebrew construct phrase.
