theological_decisions:
- issue: Meaning of 'the uncircumcised' in an oracular lament over the nations
  chosen_reading: Retain the literal covenantal/cultural term 'the uncircumcised'
    rather than interpret it as a generalized label such as 'the godless' or 'the
    unclean.'
  alternative_readings:
  - the unclean
  - the godless
  - the heathen
  rationale: The Hebrew explicitly uses the bodily/covenantal term. In Ezekiel 32
    it functions as a shame marker in death among the nations. Translating it literally
    preserves the text's imagery and theological texture without importing a broader
    doctrinal category not stated in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 5
