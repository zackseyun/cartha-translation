id: EZK.32.3
reference: Ezekiel 32:3
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה וּ/פָרַשְׂתִּ֤י עָלֶ֨י/ךָ֙ אֶת רִשְׁתִּ֔/י בִּ/קְהַ֖ל עַמִּ֣ים רַבִּ֑ים וְ/הֶעֱל֖וּ/ךָ בְּ/חֶרְמִֽ/י־׃
translation:
  text: 'Thus says the Lord GOD: I will spread my net over you with an assembly of many peoples, and they will haul you up in my dragnet.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with/in an assembly of many peoples'; the phrase may mean that many peoples are the instrument by which God spreads the net.
    reason: lexical_alternative
  - marker: b
    text: Or 'and they will draw you up in my net.' The Hebrew uses a second fishing-net term here, distinct from 'net' earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the Tetragrammaton. Following the doctrine default, יְהוָה is not transliterated but represented reverentially. Because English convention avoids 'Lord LORD,' 'GOD' signals the underlying divine name in this compound title.
- source_word: וּפָרַשְׂתִּי
  chosen: I will spread
  alternatives:
  - I will spread out
  - I will cast
  lexicon: HALOT
  rationale: פרשׂ commonly means 'spread out' or 'stretch out.' In the context of a net, 'spread' is natural English and preserves the image without over-paraphrasing to 'cast.'
- source_word: רִשְׁתִּי
  chosen: my net
  alternatives:
  - my net
  lexicon: HALOT
  rationale: רֶשֶׁת is the ordinary term for a net. The possessive suffix is retained explicitly.
- source_word: בִּקְהַל עַמִּים רַבִּים
  chosen: with an assembly of many peoples
  alternatives:
  - in the assembly of many peoples
  - by an assembly of many peoples
  - with a company of many peoples
  lexicon: HALOT
  rationale: 'קהל denotes an assembled group or gathering. The preposition ב here is instrumental/circumstantial in context: God spreads the net by means of or accompanied by a gathered multitude of nations. ''Peoples'' preserves the plural עמים better than ''nations'' in this immediate phrase.'
- source_word: וְהֶעֱלוּךָ
  chosen: and they will haul you up
  alternatives:
  - and they will bring you up
  - and they will draw you up
  lexicon: HALOT
  rationale: עלה in Hiphil means to cause to go up, here in the fishing/hunting metaphor meaning to pull up from the waters. 'Haul you up' best fits the net imagery in idiomatic modern English.
- source_word: בְּחֶרְמִי
  chosen: in my dragnet
  alternatives:
  - in my net
  - with my dragnet
  lexicon: HALOT
  rationale: חֵרֶם/חֶרֶם here is a fishing net term distinct from רשת, often understood as a dragnet or seine. Rendering it distinctly as 'dragnet' preserves the lexical variation and the intensified capture image.
