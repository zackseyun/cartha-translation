id: EZK.32.26
reference: Ezekiel 32:26
source:
  edition: WLC
  text: שָׁ֣ם מֶ֤שֶׁךְ תֻּבַל֙ וְ/כָל הֲמוֹנָ֔/הּ סְבִֽיבוֹתָ֖י/ו קִבְרוֹתֶ֑י/הָ כֻּלָּ֤/ם
    עֲרֵלִים֙ מְחֻ֣לְלֵי חֶ֔רֶב כִּֽי נָתְנ֥וּ חִתִּיתָ֖/ם בְּ/אֶ֥רֶץ חַיִּֽים־־׃
translation:
  text: There are Meshech and Tubal, and all her multitude; their graves are all around
    him. All of them are uncircumcised, slain by the sword, because they spread their
    terror in the land of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and all her multitude; around him are her graves,' with
      shifting singular and feminine suffixes in the poetic line.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  chosen: There are
  alternatives:
  - There is
  - There
  lexicon: HALOT
  rationale: In this catalog of nations in Sheol, שָׁם functions deictically ('there').
    English idiom often supplies 'there are/is' to make the verbless clause natural.
    Plural sense fits the compound subject 'Meshech and Tubal.'
- source_word: מֶשֶׁךְ תֻּבַל
  chosen: Meshech and Tubal
  lexicon: HALOT
  rationale: These are proper names of peoples/regions and should be transliterated
    rather than translated, per translation philosophy.
- source_word: וְכָל הֲמוֹנָהּ
  chosen: and all her multitude
  alternatives:
  - and all her hordes
  - and all her throng
  lexicon: HALOT
  rationale: הָמוֹן here denotes the mass of people associated with the nation. 'Multitude'
    preserves the collective sense without overinterpreting as strictly military,
    though martial context is present.
- source_word: סְבִיבוֹתָיו קִבְרוֹתֶיהָ
  chosen: their graves are all around him
  alternatives:
  - her graves are all around him
  - his graves are all around them
  lexicon: HALOT
  rationale: 'The Hebrew shifts number/gender in a compressed poetic way: ''around
    him'' with ''her graves.'' The most coherent sense in context is that the graves
    belonging to Meshech-Tubal/their multitude surround the central figure or collective
    representative in Sheol. English regularizes the possessive to ''their graves''
    while retaining ''around him'' for the final pronominal suffix.'
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - all of them there
  lexicon: HALOT
  rationale: Resumes the collective group and introduces the descriptive predicates
    that follow.
- source_word: עֲרֵלִים
  chosen: uncircumcised
  lexicon: HALOT
  rationale: Literal rendering preserves the covenantal and shame connotations in
    Ezekiel's burial-oracle context. No dynamic substitute captures the same force.
- source_word: מְחֻלְלֵי חֶרֶב
  chosen: slain by the sword
  alternatives:
  - pierced by the sword
  - wounded by the sword
  lexicon: HALOT
  rationale: In this context the passive participle with 'sword' refers to those fatally
    struck in battle. 'Slain' communicates the result clearly in English and matches
    the repeated formula in the chapter.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their shameful condition in death.
- source_word: נָתְנוּ חִתִּיתָם
  chosen: they spread their terror
  alternatives:
  - they caused their terror
  - they put their terror
  lexicon: HALOT
  rationale: The idiom 'give/put terror' means to inflict or spread dread. 'Spread
    their terror' is natural modern English while preserving causative force.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: in the land of the living
  alternatives:
  - in the earth of the living
  lexicon: HALOT
  rationale: Established Hebrew idiom for the realm of earthly life as opposed to
    Sheol; 'land of the living' is both accurate and readable.
