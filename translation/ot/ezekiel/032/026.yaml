theological_decisions:
- issue: Retention of covenantal shame language in burial judgment
  chosen_reading: uncircumcised
  alternative_readings:
  - defiled
  - uninitiated
  rationale: The verse uses עֲרֵלִים in Ezekiel's repeated contrast between the nations
    and those marked by covenant identity. Rendering it literally preserves the theological
    and rhetorical force of disgrace in death without importing extra interpretation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Handling of poetic pronoun shifts
  chosen_reading: regularize part of the possessive to 'their graves' while preserving
    'around him'
  alternative_readings:
  - preserve all suffixes literally as 'her multitude... around him, her graves'
  rationale: The Hebrew contains compressed, shifting suffixes typical of poetic lament.
    The translation preserves the key imagery and one marked singular pronoun while
    smoothing the possessive enough for intelligible English, avoiding paraphrase
    but also avoiding obscurity.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
