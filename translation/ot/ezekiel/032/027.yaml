id: EZK.32.27
reference: Ezekiel 32:27
source:
  edition: WLC
  text: וְ/לֹ֤א יִשְׁכְּבוּ֙ אֶת גִּבּוֹרִ֔ים נֹפְלִ֖ים מֵ/עֲרֵלִ֑ים אֲשֶׁ֣ר יָרְדֽוּ
    שְׁא֣וֹל בִּ/כְלֵֽי מִלְחַמְתָּ/ם֩ וַ/יִּתְּנ֨וּ אֶת חַרְבוֹתָ֜/ם תַּ֣חַת רָאשֵׁי/הֶ֗ם
    וַ/תְּהִ֤י עֲוֺֽנֹתָ/ם֙ עַל עַצְמוֹתָ֔/ם כִּֽי חִתִּ֥ית גִּבּוֹרִ֖ים בְּ/אֶ֥רֶץ
    חַיִּֽים־־־־־־׃
translation:
  text: And they do not lie with the mighty, the fallen from among the uncircumcised,
    who went down to Sheol with their weapons of war, whose swords were placed under
    their heads, and whose iniquities were upon their bones; for the terror of the
    mighty was in the land of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And they shall not lie with the mighty'—the Hebrew verb may be understood
      with a future nuance in this lament.
    reason: lexical_alternative
  - marker: b
    text: Or 'with the fallen mighty from among the uncircumcised.' The Hebrew construction
      is difficult, and some take 'mighty' and 'fallen' more closely together.
    reason: alternative_reading
  - marker: c
    text: Sheol is the realm of the dead; alternatively, 'the grave' or 'the underworld.'
    reason: lexical_alternative
  - marker: d
    text: '''Iniquities'' may also be understood as ''guilt'' or ''the punishment
      for their iniquity.'''
    reason: lexical_alternative
  - marker: e
    text: The Hebrew of the final clause is difficult; alternatively, 'for they spread
      terror as mighty men in the land of the living.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא יִשְׁכְּבוּ
  chosen: And they do not lie
  alternatives:
  - And they shall not lie
  - But they do not lie
  lexicon: HALOT
  rationale: The verb שׁכב in this funerary context means 'lie' in burial/rest. The
    yiqtol after waw + negation can be rendered as present-like in English within
    the lament's vivid description, though a future nuance is possible. 'Lie' preserves
    the burial imagery better than 'rest.'
- source_word: אֶת גִּבּוֹרִים
  chosen: with the mighty
  alternatives:
  - beside the mighty
  - among the mighty warriors
  lexicon: HALOT
  rationale: 'Although אֶת is normally the object marker, in this difficult construction
    many take it in the sense of association/comparison in context: the point is that
    these dead do not share burial status with the mighty. ''The mighty'' keeps גִּבּוֹרִים
    broad and dignified without over-specifying ''warriors'' here.'
- source_word: נֹפְלִים מֵעֲרֵלִים
  chosen: the fallen from among the uncircumcised
  alternatives:
  - those fallen from the uncircumcised
  - fallen uncircumcised ones
  lexicon: HALOT
  rationale: נֹפְלִים is substantival, 'the fallen.' מֵעֲרֵלִים is best taken partitively,
    'from among the uncircumcised.' 'Uncircumcised' is retained literally because
    it is a repeated and theologically charged category in this chapter.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the underworld
  lexicon: HALOT
  rationale: Sheol is preserved by transliteration to avoid flattening the Hebrew
    concept into either mere burial ('grave') or a more developed later notion of
    hell. This maintains lexical transparency.
- source_word: בִּכְלֵי מִלְחַמְתָּם
  chosen: with their weapons of war
  alternatives:
  - with their battle gear
  - with the weapons of their warfare
  lexicon: HALOT
  rationale: כְּלֵי מִלְחָמָה refers to military equipment. 'Weapons of war' is natural
    English and preserves the martial burial imagery.
- source_word: וַיִּתְּנוּ אֶת חַרְבוֹתָם תַּחַת רָאשֵׁיהֶם
  chosen: whose swords were placed under their heads
  alternatives:
  - and they placed their swords under their heads
  - with their swords laid under their heads
  lexicon: HALOT
  rationale: The Hebrew shifts to a wayyiqtol narrative form. In English, a relative
    clause smooths the syntax and keeps the referent tied to the mighty dead. Passive
    wording avoids overcommitting to who performed the burial act while preserving
    the image.
- source_word: וַתְּהִי עֲוֺנֹתָם עַל עַצְמוֹתָם
  chosen: and whose iniquities were upon their bones
  alternatives:
  - and their guilt was upon their bones
  - and the punishment for their iniquity was upon their bones
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment. Here the phrase is terse
    and evocative; 'iniquities were upon their bones' preserves the Hebrew's ambiguity
    and grim force rather than resolving it to either guilt or punishment alone.
- source_word: כִּי חִתִּית גִּבּוֹרִים
  chosen: for the terror of the mighty
  alternatives:
  - for they spread terror among the mighty
  - for the terror caused by mighty men
  lexicon: HALOT
  rationale: חִתִּית denotes terror/dread. The phrase is elliptical and textually
    difficult. Rendering it as 'the terror of the mighty' reflects the likely sense
    that these warriors inspired terror, without over-expanding the Hebrew.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: was in the land of the living
  alternatives:
  - in the land of the living
  - throughout the land of the living
  lexicon: HALOT
  rationale: אֶרֶץ חַיִּים is a standard idiom for the world of the living. Supplying
    'was' completes the English clause naturally while preserving the contrast with
    Sheol.
