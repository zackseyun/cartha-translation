theological_decisions:
- issue: Meaning of עָוֹן in a judgment context
  chosen_reading: Retain 'iniquities' in the main text without resolving whether the
    emphasis is on sin, guilt, or punishment.
  alternative_readings:
  - guilt
  - punishment for their iniquity
  rationale: The Hebrew term can carry all three senses, and the verse's rhetoric
    may intentionally compress moral offense and its consequence. Preserving the ambiguity
    follows the stated philosophy of maintaining theological tension where the source
    is genuinely open.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
