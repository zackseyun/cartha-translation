theological_decisions:
- issue: Nature of the cosmic language
  chosen_reading: Render the imagery straightforwardly as cosmic darkening in judgment
    without specifying whether it is literal astronomical collapse or metaphorical
    political downfall.
  alternative_readings:
  - Strictly literal cosmic catastrophe
  - Purely metaphorical description of Pharaoh/Egypt's fall
  rationale: The verse uses established prophetic judgment imagery. The translation
    should preserve the text's vivid cosmic language and theological force without
    collapsing the imagery into a single interpretive scheme not demanded by the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
