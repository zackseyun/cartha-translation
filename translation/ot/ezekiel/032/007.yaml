id: EZK.32.7
reference: Ezekiel 32:7
source:
  edition: WLC
  text: וְ/כִסֵּיתִ֤י בְ/כַבּֽוֹתְ/ךָ֙ שָׁמַ֔יִם וְ/הִקְדַּרְתִּ֖י אֶת כֹּֽכְבֵי/הֶ֑ם
    שֶׁ֚מֶשׁ בֶּ/עָנָ֣ן אֲכַסֶּ֔/נּוּ וְ/יָרֵ֖חַ לֹא יָאִ֥יר אוֹרֽ/וֹ־־׃
translation:
  text: When I blot you out, I will cover the heavens and darken their stars; I will
    cover the sun with a cloud, and the moon will not give its light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when I extinguish you' or 'when you are extinguished.' The Hebrew uses
      the imagery of being put out like a light.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִסֵּיתִי
  chosen: I will cover
  alternatives:
  - I covered
  - I will conceal
  lexicon: HALOT
  rationale: From כסה, 'to cover/conceal.' In context of cosmic darkening, 'cover'
    is the most natural English rendering. Although the Hebrew form is perfect with
    prefixed conjunction, in prophetic discourse it functions futurally in sequence
    with the following verbs, so English future is appropriate.
- source_word: בְכַבּוֹתְךָ
  chosen: when I blot you out
  alternatives:
  - when you are extinguished
  - when I extinguish you
  lexicon: HALOT
  rationale: From כבה, 'to go out/be extinguished,' here in an infinitive construct
    with 2ms suffix after בְ, literally 'in/when your being extinguished.' Because
    the addressee is Pharaoh/Egypt personified, idiomatic English 'when I blot you
    out' captures the judgment sense better than the more wooden 'when I extinguish
    you,' while preserving the metaphor of extinguishing a luminary/life.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: Plural form commonly rendered 'heavens.' In this cosmic-judgment context,
    'the heavens' preserves the elevated register and breadth better than 'the sky.'
- source_word: וְהִקְדַּרְתִּי
  chosen: and darken
  alternatives:
  - and make dark
  - and blacken
  lexicon: HALOT
  rationale: From קדר in the causative, 'to make dark.' English 'darken' is concise
    and natural.
- source_word: כֹּכְבֵיהֶם
  chosen: their stars
  alternatives:
  - its stars
  - the stars of them
  lexicon: HALOT
  rationale: The 3mp suffix refers back to 'the heavens' as a plural form. English
    idiom prefers 'their stars' rather than the formally possible but less natural
    'its stars.'
- source_word: שֶׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: בֶּעָנָן
  chosen: with a cloud
  alternatives:
  - in a cloud
  - by a cloud
  lexicon: HALOT
  rationale: The preposition ב here is best rendered instrumentally or locatively.
    'With a cloud' is idiomatic in English for obscuring the sun and fits the imagery.
- source_word: אֲכַסֶּנּוּ
  chosen: I will cover
  alternatives:
  - I will conceal it
  lexicon: HALOT
  rationale: Again from כסה. The 3ms suffix refers to the sun. Repeating 'cover' preserves
    lexical consistency within the verse.
- source_word: וְיָרֵחַ
  chosen: and the moon
  lexicon: HALOT
  rationale: Straightforward lexical rendering.
- source_word: לֹא יָאִיר אוֹרוֹ
  chosen: will not give its light
  alternatives:
  - will not shine its light
  - will not let its light shine
  lexicon: HALOT
  rationale: From אור in the Hiphil, 'to give light/shine.' 'Will not give its light'
    is idiomatic, preserves the causative nuance, and matches common English biblical
    style without archaism.
