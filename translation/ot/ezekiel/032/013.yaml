theological_decisions:
- issue: Rendering of אָדָם in a generic expression
  chosen_reading: human foot
  alternative_readings:
  - man's foot
  - foot of man
  rationale: The Hebrew is grammatically singular masculine but generic in sense.
    Following the project's gender-accurate principle, the translation reflects humanity
    in general rather than an individual male.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
