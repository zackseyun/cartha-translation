id: EZK.32.13
reference: Ezekiel 32:13
source:
  edition: WLC
  text: וְ/הַֽאֲבַדְתִּי֙ אֶת כָּל בְּהֶמְתָּ֔/הּ מֵ/עַ֖ל מַ֣יִם רַבִּ֑ים וְ/לֹ֨א
    תִדְלָחֵ֤/ם רֶֽגֶל אָדָם֙ ע֔וֹד וּ/פַרְס֥וֹת בְּהֵמָ֖ה לֹ֥א תִדְלָחֵֽ/ם־־־׃
translation:
  text: And I will destroy all its beasts from beside its abundant waters, and no
    human foot will muddy them anymore, nor will the hooves of beasts muddy them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many waters.'
    reason: lexical_alternative
  - marker: b
    text: The verb means to make the waters turbid or muddy by trampling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַאֲבַדְתִּי
  chosen: And I will destroy
  alternatives:
  - And I will make perish
  - And I will wipe out
  lexicon: HALOT
  rationale: Hiphil of אבד with first-person subject expresses causative destruction/removal.
    'Destroy' is natural modern English and fits the judgment context without over-paraphrase.
- source_word: בְּהֶמְתָּהּ
  chosen: its beasts
  alternatives:
  - its cattle
  - its animals
  - its livestock
  lexicon: HALOT
  rationale: בְּהֵמָה can denote beasts/animals, including domesticated stock. In
    this poetic judgment oracle, 'beasts' preserves the broad category and matches
    the later parallel 'hooves of beasts.' The 3fs suffix refers to Egypt/the land/city
    personified.
- source_word: מֵעַל מַיִם רַבִּים
  chosen: from beside its abundant waters
  alternatives:
  - from upon many waters
  - away from its many waters
  lexicon: HALOT
  rationale: מֵעַל literally 'from upon/from over,' but idiomatically here indicates
    removal from the area of the waters. 'Beside' communicates location in readable
    English. רַבִּים with מים is rendered 'abundant' rather than wooden 'many' to
    sound natural while preserving the sense of plentiful waters.
- source_word: תִדְלָחֵם
  chosen: will muddy them
  alternatives:
  - will foul them
  - will stir them up
  - will trouble them
  lexicon: HALOT
  rationale: The verb דלח in this context refers to making water turbid by trampling/stirring.
    'Muddy' is the clearest idiomatic English equivalent for waters disturbed by feet/hooves.
    The 3mp suffix refers back to the waters.
- source_word: רֶגֶל אָדָם
  chosen: human foot
  alternatives:
  - foot of man
  - man's foot
  lexicon: HALOT
  rationale: אָדָם here is generic, not a proper name. Per doctrine, a gender-accurate
    rendering should match intent; the phrase denotes any human being, so 'human foot'
    best conveys the generic sense in natural English.
- source_word: עוֹד
  chosen: anymore
  alternatives:
  - again
  - still
  lexicon: HALOT
  rationale: In a negated future clause, עוֹד naturally means 'any longer/anymore,'
    emphasizing cessation.
- source_word: וּפַרְסוֹת בְּהֵמָה
  chosen: nor will the hooves of beasts
  alternatives:
  - nor the hoofs of cattle
  - nor animal hooves
  lexicon: HALOT
  rationale: פַּרְסוֹת are split hooves. 'Hooves of beasts' preserves the Hebrew construct
    relation and parallels the previous clause about human feet.
