id: EZK.32.24
reference: Ezekiel 32:24
source:
  edition: WLC
  text: שָׁ֤ם עֵילָם֙ וְ/כָל הֲמוֹנָ֔/הּ סְבִיב֖וֹת קְבֻרָתָ֑/הּ כֻּלָּ֣/ם חֲלָלִים֩
    הַ/נֹּפְלִ֨ים בַּ/חֶ֜רֶב אֲֽשֶׁר יָרְד֥וּ עֲרֵלִ֣ים אֶל אֶ֣רֶץ תַּחְתִּיּ֗וֹת
    אֲשֶׁ֨ר נָתְנ֤וּ חִתִּיתָ/ם֙ בְּ/אֶ֣רֶץ חַיִּ֔ים וַ/יִּשְׂא֥וּ כְלִמָּתָ֖/ם אֶת
    י֥וֹרְדֵי בֽוֹר־־׀־־׃
translation:
  text: There is Elam and all her multitude, all around her grave, all of them slain,
    fallen by the sword, who went down uncircumcised to the land below, who spread
    their terror in the land of the living; and they bore their shame with those who
    go down to the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the lower earth' or 'to the netherworld.' The Hebrew literally speaks
      of 'the land of lower places,' an image for the realm of the dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  chosen: There is
  alternatives:
  - There
  - There lies
  lexicon: HALOT
  rationale: Introduces the next figure in the underworld scene. 'There is' is natural
    English while preserving the deictic force.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy.
- source_word: וְכָל הֲמוֹנָהּ
  chosen: and all her multitude
  alternatives:
  - and all her hordes
  - and all her throng
  lexicon: HALOT
  rationale: הָמוֹן here denotes the mass of people associated with Elam, likely its
    populous host. 'Multitude' is idiomatic and suitably broad.
- source_word: סְבִיבוֹת קְבֻרָתָהּ
  chosen: all around her grave
  alternatives:
  - around her tomb
  - surrounding her burial place
  lexicon: HALOT
  rationale: Expresses spatial arrangement of the dead around Elam's burial site.
    'Grave' is the most straightforward English equivalent.
- source_word: כֻּלָּם חֲלָלִים
  chosen: all of them slain
  alternatives:
  - all of them pierced
  - all of them dead
  lexicon: HALOT
  rationale: חֲלָלִים commonly refers to those slain violently, especially in battle.
    'Slain' preserves that nuance better than the generic 'dead'.
- source_word: הַנֹּפְלִים בַּחֶרֶב
  chosen: fallen by the sword
  alternatives:
  - those falling by the sword
  - killed by the sword
  lexicon: HALOT
  rationale: A conventional martial idiom in English that closely matches the Hebrew
    participial phrase.
- source_word: יָרְדוּ עֲרֵלִים
  chosen: went down uncircumcised
  alternatives:
  - went down as the uncircumcised
  - descended uncircumcised
  lexicon: HALOT
  rationale: עֲרֵלִים is retained literally as 'uncircumcised,' an important covenantal
    and shame marker in Ezekiel's lament over the nations.
- source_word: אֶל אֶרֶץ תַּחְתִּיּוֹת
  chosen: to the land below
  alternatives:
  - to the lower earth
  - to the netherworld
  - to the lowest parts of the earth
  lexicon: HALOT
  rationale: The phrase denotes the underworld/realm beneath. 'The land below' is
    readable modern English that preserves the spatial imagery without over-paraphrasing.
- source_word: נָתְנוּ חִתִּיתָם
  chosen: spread their terror
  alternatives:
  - caused their terror
  - put their dread
  lexicon: HALOT
  rationale: Idiomatic rendering of 'gave/placed their terror.' It conveys the effect
    they had among the living.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: in the land of the living
  lexicon: HALOT
  rationale: Standard and transparent rendering of a common biblical expression for
    the world of the living.
- source_word: וַיִּשְׂאוּ כְלִמָּתָם
  chosen: and they bore their shame
  alternatives:
  - and they carried their disgrace
  - and they bore their humiliation
  lexicon: HALOT
  rationale: נשא with כְלִמָּה conveys bearing or carrying disgrace as an enduring
    condition. 'Shame' is concise and natural.
- source_word: אֶת יֹרְדֵי בוֹר
  chosen: with those who go down to the pit
  alternatives:
  - along with those who descend to the pit
  - with the pit-goers
  lexicon: HALOT
  rationale: The object marker here is rendered in sense with associative force in
    English, matching the idiom of sharing the fate of those descending to the pit.
    'Pit' preserves the grave/underworld imagery.
