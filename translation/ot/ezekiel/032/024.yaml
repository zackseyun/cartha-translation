theological_decisions:
- issue: Rendering עֲרֵלִים in a judgment context
  chosen_reading: uncircumcised
  alternative_readings:
  - uninitiated
  - defiled
  rationale: The term is kept literal because in Ezekiel it functions as a covenantal
    and shame-laden designation for the nations in death. A metaphorical softening
    would obscure the prophetic rhetoric.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering אֶרֶץ תַּחְתִּיּוֹת
  chosen_reading: the land below
  alternative_readings:
  - the netherworld
  - the lower parts of the earth
  rationale: The Hebrew evokes the realm beneath the land of the living without requiring
    a fully systematized doctrine of the afterlife. 'The land below' preserves the
    imagery while avoiding interpretive over-specification.
  doctrine_reference: Do not import doctrinal claims the text does not make.
