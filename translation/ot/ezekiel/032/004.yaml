id: EZK.32.4
reference: Ezekiel 32:4
source:
  edition: WLC
  text: וּ/נְטַשְׁתִּ֣י/ךָ בָ/אָ֔רֶץ עַל פְּנֵ֥י הַ/שָּׂדֶ֖ה אֲטִילֶ֑/ךָ וְ/הִשְׁכַּנְתִּ֤י
    עָלֶ֨י/ךָ֙ כָּל ע֣וֹף הַ/שָּׁמַ֔יִם וְ/הִשְׂבַּעְתִּ֥י מִמְּ/ךָ֖ חַיַּ֥ת כָּל
    הָ/אָֽרֶץ־־־׃
translation:
  text: I will cast you onto the land; I will throw you down on the open field, and
    I will cause every bird of the heavens to settle on you, and I will satisfy the
    beasts of all the earth with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will abandon you on the land.' The Hebrew verb can carry the sense
      of leaving or casting away.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will satisfy from you the beasts of all the earth,' that is,
      the beasts will have their fill by feeding on you.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְטַשְׁתִּיךָ
  chosen: I will cast you onto the land
  alternatives:
  - I will abandon you on the land
  - I will leave you on the land
  lexicon: HALOT
  rationale: The verb נטשׁ can mean leave, abandon, or cast away. In this judgment
    context, with the following image of being thrown onto the field and consumed
    by scavengers, 'cast' best captures the violent disposal implied, while still
    reflecting the core sense.
- source_word: בָאָרֶץ
  chosen: onto the land
  alternatives:
  - on the الأرض
  - on the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or earth. Here the immediate parallel with 'on the
    open field' points to the terrestrial setting of the corpse rather than the whole
    world, so 'land' is more precise.
- source_word: עַל־פְּנֵי הַשָּׂדֶה
  chosen: on the open field
  alternatives:
  - on the face of the field
  - in the field
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי means 'on the surface of' or 'upon.' 'Open field'
    conveys exposure and readability in English better than the more wooden 'face
    of the field.'
- source_word: אֲטִילֶךָ
  chosen: I will throw you down
  alternatives:
  - I will hurl you
  - I will cast you
  lexicon: HALOT
  rationale: The Hiphil of טול conveys throwing or hurling. 'Throw you down' fits
    the imagery of a defeated monster brought low onto the field and avoids awkward
    repetition with the earlier 'cast.'
- source_word: וְהִשְׁכַּנְתִּי עָלֶיךָ
  chosen: I will cause ... to settle on you
  alternatives:
  - I will make ... dwell on you
  - I will let ... rest on you
  lexicon: HALOT
  rationale: The causative form of שכן means to cause to dwell or settle. In context
    of carrion birds descending upon a carcass, 'settle on you' is the most natural
    English expression.
- source_word: כָּל עוֹף הַשָּׁמַיִם
  chosen: every bird of the heavens
  alternatives:
  - all the birds of the sky
  - every bird of the sky
  lexicon: HALOT
  rationale: עוֹף is a collective for flying creatures, often rendered 'birds.' 'Of
    the heavens' is slightly more formal and preserves the Hebrew genitive, while
    remaining natural enough in English.
- source_word: וְהִשְׂבַּעְתִּי
  chosen: I will satisfy
  alternatives:
  - I will fill
  - I will satiate
  - I will feed to the full
  lexicon: HALOT
  rationale: The Hiphil of שׂבע means to satisfy or fill to fullness. 'Satisfy' preserves
    the idea that the scavengers will have their fill from the fallen body.
- source_word: מִמְּךָ
  chosen: with you
  alternatives:
  - from you
  - on you
  lexicon: HALOT
  rationale: Although literally 'from you,' English idiom in feeding contexts often
    uses 'with you' to express the source of what satisfies the beasts. This communicates
    that the beasts are filled by consuming him.
- source_word: חַיַּת כָּל הָאָרֶץ
  chosen: the beasts of all the earth
  alternatives:
  - all the beasts of the earth
  - the wild animals of the whole land
  lexicon: HALOT
  rationale: חַיָּה here refers to animals, especially wild beasts in a scavenging
    context. 'Beasts' preserves the elevated prophetic tone. 'Of all the earth' reflects
    the Hebrew construction, though idiomatically it means the beasts throughout the
    land/earth.
