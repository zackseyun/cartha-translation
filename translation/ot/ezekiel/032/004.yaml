theological_decisions:
- issue: Scope of אֶרֶץ / הָאָרֶץ in a judgment oracle
  chosen_reading: Render the first as 'land' and the final phrase as 'all the earth'
  alternative_readings:
  - Render both as 'land'
  - Render both as 'earth'
  rationale: The first occurrence is localized by 'on the open field,' favoring 'land.'
    The final phrase is a stock broader expression and works naturally as 'all the
    earth,' preserving the sweeping image of total exposure to scavengers. This is
    a lexical-contextual decision, not a doctrinal one, but it affects the force of
    the oracle.
