theological_decisions:
- issue: Rendering of violent judgment imagery
  chosen_reading: Preserve the concrete imagery of flesh scattered on mountains and
    valleys filled with the fallen body.
  alternative_readings:
  - Soften to 'body' and 'remains' for readability
  rationale: The verse is a prophetic judgment oracle using deliberately graphic imagery
    to portray humiliation and defeat. Softening the language would undertranslate
    the Hebrew's force.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
