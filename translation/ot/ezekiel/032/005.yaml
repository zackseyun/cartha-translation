id: EZK.32.5
reference: Ezekiel 32:5
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י אֶת בְּשָׂרְ/ךָ֖ עַל הֶֽ/הָרִ֑ים וּ/מִלֵּאתִ֥י הַ/גֵּאָי֖וֹת
    רָמוּתֶֽ/ךָ־־׃
translation:
  text: And I will put your flesh on the mountains, and I will fill the valleys with
    your carcass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with your corpse' or, more literally, 'with your lofty frame/height';
      the Hebrew term is difficult, but the context points to Pharaoh’s fallen body
      spread across the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will put
  alternatives:
  - And I will set
  - And I will lay
  lexicon: HALOT
  rationale: נתן has a broad semantic range including give, put, set. In this judgment
    context with a corpse scattered over terrain, 'put' is natural modern English
    and preserves the direct divine action.
- source_word: בְּשָׂרְךָ
  chosen: your flesh
  alternatives:
  - your body
  - your meat
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' The imagery is gruesome and physical, so
    the literal rendering should be preserved rather than softened to 'body.'
- source_word: הֶהָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: הרים normally means 'mountains.' 'Hills' would weaken the scale and is
    unnecessary.
- source_word: וּמִלֵּאתִי
  chosen: and I will fill
  alternatives:
  - and I will make full
  lexicon: HALOT
  rationale: מלא in the piel commonly means 'fill.' This straightforward rendering
    preserves the force of the image.
- source_word: הַגֵּאָיוֹת
  chosen: the valleys
  alternatives:
  - the ravines
  lexicon: HALOT
  rationale: גאה/גיא refers to valleys or ravines. 'Valleys' is the broader and more
    idiomatic English choice here, while still fitting the topographical parallel
    with 'mountains.'
- source_word: רָמוּתֶךָ
  chosen: your carcass
  alternatives:
  - your height
  - your lofty frame
  - your corpse
  lexicon: HALOT
  rationale: Although the form is unusual and related to a root associated with height/exaltation,
    in context it refers to the fallen mass or corpse of Pharaoh filling the valleys.
    'Your carcass' best conveys the concrete, humiliating image in idiomatic English.
    'Your height' would be too obscure in English without explanation.
