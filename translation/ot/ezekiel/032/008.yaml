id: EZK.32.8
reference: Ezekiel 32:8
source:
  edition: WLC
  text: כָּל מְא֤וֹרֵי אוֹר֙ בַּ/שָּׁמַ֔יִם אַקְדִּירֵ֖/ם עָלֶ֑י/ךָ וְ/נָתַ֤תִּי חֹ֨שֶׁךְ֙ עַֽל אַרְצְ/ךָ֔ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: All the lights of light in the heavens I will darken over you, and I will put darkness over your land, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the luminaries in the heavens.' The Hebrew phrase is literally 'the lights of light in the heavens,' referring to the heavenly bodies as sources of light.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier covering the totality of the heavenly lights; 'all' is the most natural English equivalent here.
- source_word: מְאֹרֵי אוֹר
  chosen: the shining lights
  alternatives:
  - the lights of light
  - the luminaries
  - the bright lights
  lexicon: HALOT
  rationale: The construct phrase literally means 'lights of light,' an idiomatic intensification for luminous bodies. 'Shining lights' preserves the emphasis on brightness while remaining readable modern English. 'Luminaries' is possible but less natural for the target audience.
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in the sky
  - in heaven
  lexicon: HALOT
  rationale: Plural 'heavens' reflects the Hebrew form and suits prophetic cosmic imagery better than the flatter 'sky.' Singular 'heaven' would underrepresent the Hebrew number.
- source_word: אַקְדִּירֵם
  chosen: I will darken
  alternatives:
  - I will make dark
  - I will dim
  lexicon: HALOT
  rationale: 'Hiphil of קדר here is causative: YHWH causes the lights to become dark. ''I will darken'' is concise and idiomatic.'
- source_word: עָלֶיךָ
  chosen: over you
  alternatives:
  - against you
  - upon you
  lexicon: HALOT
  rationale: The preposition עַל in this judgment context can indicate something coming over or upon the addressee. 'Over you' fits the imagery of cosmic darkening descending upon Egypt/Pharaoh.
- source_word: וְנָתַתִּי חֹשֶׁךְ
  chosen: and I will put darkness
  alternatives:
  - and I will set darkness
  - and I will bring darkness
  lexicon: HALOT
  rationale: The common verb נתן literally means 'give/put/set.' 'Put darkness' preserves the concrete force of the Hebrew better than the more interpretive 'bring darkness.'
- source_word: עַל אַרְצְךָ
  chosen: over your land
  alternatives:
  - upon your land
  - over your earth
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory of the addressed nation/ruler, not the whole earth. 'Land' is the appropriate contextual rendering.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic in English prophetic discourse and preserves the solemnity of the divine pronouncement.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine guideline, YHWH is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English practice avoids 'Lord LORD' by rendering as 'the Lord GOD.' This preserves both elements of the Hebrew title in a conventional, readable form.
