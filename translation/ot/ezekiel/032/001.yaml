id: EZK.32.1
reference: Ezekiel 32:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בִּ/שְׁתֵּ֣י עֶשְׂרֵ֣ה שָׁנָ֔ה בִּ/שְׁנֵי עָשָׂ֥ר חֹ֖דֶשׁ בְּ/אֶחָ֣ד
    לַ/חֹ֑דֶשׁ הָיָ֥ה דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־־׃
translation:
  text: And it happened in the twelfth year, in the twelfth month, on the first day
    of the month, that the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD'' in English translations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a dated prophetic formula. 'And
    it happened' preserves the temporal/narrative force without archaic diction like
    'came to pass.'
- source_word: בִּשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: in the twelfth year
  alternatives:
  - in year twelve
  - in the twelfth year of exile
  lexicon: HALOT
  rationale: Standard dating formula. English idiom prefers ordinal expression 'the
    twelfth year.' The Hebrew here does not explicitly repeat 'of exile,' so it is
    not supplied.
- source_word: בִּשְׁנֵי עָשָׂר חֹדֶשׁ
  chosen: in the twelfth month
  alternatives:
  - in month twelve
  lexicon: HALOT
  rationale: A straightforward calendrical expression; ordinal English is the most
    natural equivalent.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Literally 'on one of the month,' an idiomatic Hebrew date formula meaning
    the first day of the month. The fuller rendering is clearer in modern English
    while remaining faithful.
- source_word: הָיָה דְבַר יְהוָה אֵלַי
  chosen: the word of the LORD came to me
  alternatives:
  - the word of the LORD was to me
  - the word of the LORD came to me
  lexicon: HALOT
  rationale: Conventional prophetic formula. Although literally 'the word of YHWH
    was to me,' 'came to me' is the natural English equivalent for revelatory arrival.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' is idiomatic and signals
    the continuation into the next verse.
