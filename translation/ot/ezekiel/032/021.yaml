theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - hell
  - the realm of the dead
  rationale: The Hebrew term does not map neatly onto later theological notions of
    'hell,' nor is it merely a grave-site. Retaining 'Sheol' preserves the Old Testament
    conceptual world and avoids importing later doctrinal specificity the text itself
    does not make.
  doctrine_reference: Translation philosophy §1, §3
- issue: Understanding אֵלֵי גִבּוֹרִים
  chosen_reading: human warrior-chiefs in the underworld
  alternative_readings:
  - divine beings/gods of warriors
  rationale: Although אלים can denote 'gods' or 'mighty ones,' the immediate context
    throughout Ezekiel 32 catalogs fallen nations and warriors in Sheol. Rendering
    the phrase as elite human warriors preserves contextual coherence and avoids introducing
    a mythological claim not required by the text.
  doctrine_reference: Translation philosophy §1, §3
