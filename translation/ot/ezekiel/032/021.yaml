id: EZK.32.21
reference: Ezekiel 32:21
source:
  edition: WLC
  text: יְדַבְּרוּ ל֞/וֹ אֵלֵ֧י גִבּוֹרִ֛ים מִ/תּ֥וֹךְ שְׁא֖וֹל אֶת עֹֽזְרָ֑י/ו יָֽרְד֛וּ
    שָׁכְב֥וּ הָ/עֲרֵלִ֖ים חַלְלֵי חָֽרֶב־־־׃
translation:
  text: 'The mighty chiefs will speak to him from the midst of Sheol, with his helpers:
    ‘They have gone down; they lie still, the uncircumcised, slain by the sword.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the strong among the warriors'; the Hebrew phrase is difficult and could
      more literally be rendered 'the mighty ones of the warriors.'
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; it is not identical
      in meaning to 'hell.'
    reason: cultural_note
  - marker: c
    text: Or 'with his allies.' The Hebrew can indicate those accompanying him in
      death.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַבְּרוּ
  chosen: will speak
  alternatives:
  - shall speak
  - speak
  lexicon: HALOT
  rationale: 'Piel imperfect 3mp of דבר here is best rendered as a future within the
    prophetic taunt scene: the dead warriors are envisioned as addressing Pharaoh
    upon his arrival in Sheol.'
- source_word: לּוֹ
  chosen: to him
  alternatives:
  - of him
  lexicon: HALOT
  rationale: 'The preposition ל with 3ms suffix most naturally marks indirect object:
    the speech is directed to Pharaoh/ Egypt personified.'
- source_word: אֵלֵי גִבּוֹרִים
  chosen: the mighty chiefs
  alternatives:
  - the mighty ones among the warriors
  - the strong among the heroes
  - the gods of the mighty
  lexicon: HALOT
  rationale: This difficult phrase is commonly understood idiomatically of the foremost
    or strongest warriors/chieftains in the underworld context, not literal deities.
    'Chiefs' captures the superlative/elite sense while remaining readable. The alternative
    'gods of the mighty' is possible lexically from אלים but context favors human
    warrior-lords in Sheol.
- source_word: מִתּוֹךְ שְׁאוֹל
  chosen: from the midst of Sheol
  alternatives:
  - from within Sheol
  - out of Sheol
  lexicon: HALOT
  rationale: Maintains the vivid spatial imagery of speech arising from the interior
    of the realm of the dead. 'Sheol' is retained rather than paraphrased as 'the
    grave' or 'hell' because the Hebrew term has its own conceptual range.
- source_word: אֶת עֹזְרָיו
  chosen: with his helpers
  alternatives:
  - his helpers
  - along with his allies
  lexicon: HALOT
  rationale: The particle אֶת here is taken in its associative sense ('with'), yielding
    the sense that the mighty chiefs speak together with Pharaoh's helpers/allies.
    This fits the syntax and the scene of the dead addressing the newcomer.
- source_word: יָרְדוּ
  chosen: They have gone down
  alternatives:
  - They went down
  - They have descended
  lexicon: HALOT
  rationale: The perfect describes completed descent to the underworld. Present perfect
    in English preserves the resultant state relevant to the following 'they lie still.'
- source_word: שָׁכְבוּ
  chosen: they lie still
  alternatives:
  - they lie down
  - they have lain
  lexicon: HALOT
  rationale: In death contexts שכב often denotes lying in death. 'Lie still' makes
    the funerary force clear without over-paraphrasing.
- source_word: הָעֲרֵלִים
  chosen: the uncircumcised
  alternatives:
  - the foreskinned
  lexicon: HALOT
  rationale: Standard and contextually appropriate rendering in Ezekiel's oracles
    against the nations. It carries covenantal and shame connotations in this context.
- source_word: חַלְלֵי חָרֶב
  chosen: slain by the sword
  alternatives:
  - pierced by the sword
  - killed by the sword
  lexicon: HALOT
  rationale: A conventional Hebrew death expression. 'Slain by the sword' is idiomatic
    English and preserves the martial tone.
