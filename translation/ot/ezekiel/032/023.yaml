theological_decisions:
- issue: Personification of the nation/entity by feminine suffixes
  chosen_reading: Render the suffixes as 'her' throughout
  alternative_readings:
  - render as 'its' to emphasize the nation as a political entity
  rationale: The Hebrew uses feminine singular suffixes, consistent with prophetic
    personification of nations. 'Her' preserves the literary force without adding
    theological content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Underworld imagery of בוֹר
  chosen_reading: Translate בוֹר as 'pit' rather than interpretively as 'Sheol'
  alternative_readings:
  - Sheol
  - grave
  rationale: The Hebrew term here is בוֹר, not שְׁאוֹל. 'Pit' preserves the imagery
    and avoids importing a more specific term than the text uses.
  doctrine_reference: Translation philosophy §1, §3
