id: EZK.32.23
reference: Ezekiel 32:23
source:
  edition: WLC
  text: אֲשֶׁ֨ר נִתְּנ֤וּ קִבְרֹתֶ֨י/הָ֙ בְּ/יַרְכְּתֵי ב֔וֹר וַ/יְהִ֣י קְהָלָ֔/הּ
    סְבִיב֖וֹת קְבֻרָתָ֑/הּ כֻּלָּ֤/ם חֲלָלִים֙ נֹפְלִ֣ים בַּ/חֶ֔רֶב אֲשֶׁר נָתְנ֥וּ
    חִתִּ֖ית בְּ/אֶ֥רֶץ חַיִּֽים־־׃
translation:
  text: whose graves were set in the remotest parts of the pit, and her assembly was
    around her grave—all of them slain, fallen by the sword, who spread terror in
    the land of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the recesses of the pit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'caused terror in the land of the living.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִתְּנוּ
  chosen: were set
  alternatives:
  - were placed
  - were given
  lexicon: HALOT
  rationale: Passive of נתן here refers to the placement of graves, not giving in
    a transactional sense. 'Were set' is natural English while preserving the passive
    idea.
- source_word: קִבְרֹתֶיהָ
  chosen: her graves
  alternatives:
  - its graves
  lexicon: HALOT
  rationale: The feminine singular suffix refers to the nation/personified entity
    in context. 'Her' preserves the personification common in prophetic taunts.
- source_word: בְּיַרְכְּתֵי בוֹר
  chosen: in the remotest parts of the pit
  alternatives:
  - in the recesses of the pit
  - in the farthest parts of the Pit
  lexicon: HALOT
  rationale: יַרְכְּתֵי denotes extreme or remote recesses. 'Pit' is the standard
    rendering for בוֹר in underworld/burial imagery; capitalization is unnecessary
    here.
- source_word: קְהָלָהּ
  chosen: her assembly
  alternatives:
  - her company
  - her multitude
  lexicon: HALOT
  rationale: קהל denotes an assembled group. 'Assembly' is slightly formal but fits
    the collective sense and echoes the funeral/military company surrounding the grave.
- source_word: סְבִיבוֹת קְבֻרָתָהּ
  chosen: around her grave
  alternatives:
  - all around her tomb
  - surrounding her burial place
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'Grave' is more idiomatic than
    'burial place' and matches the surrounding burial imagery.
- source_word: כֻּלָּם חֲלָלִים
  chosen: all of them slain
  alternatives:
  - all of them pierced
  - all of them dead
  lexicon: HALOT
  rationale: חֲלָלִים commonly refers to those slain, especially in battle. 'Slain'
    preserves the violent nuance better than merely 'dead.'
- source_word: נֹפְלִים בַּחֶרֶב
  chosen: fallen by the sword
  alternatives:
  - falling by the sword
  - killed by the sword
  lexicon: HALOT
  rationale: Though formally a participle, in this list-like description it functions
    adjectivally/appositionally with חֲלָלִים. 'Fallen by the sword' is idiomatic
    and preserves the martial register.
- source_word: נָתְנוּ חִתִּית
  chosen: spread terror
  alternatives:
  - caused terror
  - put terror
  lexicon: HALOT
  rationale: The idiom נתן + חִתִּית means to inflict or spread terror. 'Spread terror'
    is natural English and captures the effect on others.
- source_word: בְּאֶרֶץ חַיִּים
  chosen: in the land of the living
  alternatives:
  - in the living land
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression contrasting the world of the
    living with the pit/realm of the dead. The established English phrase accurately
    reflects the idiom.
