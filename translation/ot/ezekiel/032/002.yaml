id: EZK.32.2
reference: Ezekiel 32:2
source:
  edition: WLC
  text: בֶּן אָדָ֗ם שָׂ֤א קִינָה֙ עַל פַּרְעֹ֣ה מֶֽלֶךְ מִצְרַ֔יִם וְ/אָמַרְתָּ֣ אֵלָ֔י/ו
    כְּפִ֥יר גּוֹיִ֖ם נִדְמֵ֑יתָ וְ/אַתָּה֙ כַּ/תַּנִּ֣ים בַּ/יַּמִּ֔ים וַ/תָּ֣גַח
    בְּ/נַהֲרוֹתֶ֗י/ךָ וַ/תִּדְלַח מַ֨יִם֙ בְּ/רַגְלֶ֔י/ךָ וַ/תִּרְפֹּ֖ס נַהֲרוֹתָֽ/ם־־־־׃
translation:
  text: 'Son of man, raise a lament over Pharaoh king of Egypt, and say to him: You
    compared yourself to a young lion among the nations, but you are like the monster
    in the seas; you burst forth in your rivers, you muddied the waters with your
    feet, and you fouled their rivers.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'You were likened to a young lion among the nations.' The Hebrew verb
      may be read passively rather than reflexively.
    reason: alternative_reading
  - marker: b
    text: Hebrew tannin/tannim in this context likely refers to a great aquatic creature;
      possible renderings include 'dragon' or 'sea monster.'
    reason: lexical_alternative
  - marker: c
    text: Or 'you trampled their rivers.' The Hebrew verb emphasizes trampling; 'fouled'
      brings out the effect in the water imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional and contextually appropriate address to Ezekiel. It preserves
    the Hebrew idiom and the representative force of אָדָם without flattening it to
    a paraphrase.
- source_word: שָׂא קִינָה
  chosen: raise a lament
  alternatives:
  - take up a lament
  - lift up a lamentation
  lexicon: HALOT
  rationale: A standard prophetic idiom for beginning a funeral dirge. 'Raise a lament'
    is natural modern English while retaining the formal tone.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: Direct rendering of the royal title sequence; no article is required
    in English.
- source_word: כְּפִיר גּוֹיִם
  chosen: a young lion among the nations
  alternatives:
  - a lion cub of the nations
  - a strong lion among the nations
  lexicon: HALOT
  rationale: כְּפִיר denotes a young lion, often emphasizing vigor and predatory strength.
    'Among the nations' best captures the relational sense in context.
- source_word: נִדְמֵיתָ
  chosen: You compared yourself
  alternatives:
  - you were likened
  - you seemed like
  - you were considered
  lexicon: HALOT
  rationale: The Niphal can be taken as passive/reflexive. In this taunt context,
    'You compared yourself' brings out Pharaoh's pretension more clearly than a bare
    passive, while staying within the semantic range.
- source_word: כַּתַּנִּים בַּיַּמִּים
  chosen: like the monster in the seas
  alternatives:
  - like a dragon in the seas
  - like a sea monster in the seas
  - like the jackal in the seas
  lexicon: HALOT
  rationale: תַּנִּים/תַּנִּין language can denote a great reptilian or chaotic sea
    creature. In an aquatic setting with rivers and seas, 'monster' or 'sea monster'
    fits better than 'jackal.' 'The monster' reflects the definite article.
- source_word: וַתָּגַח
  chosen: you burst forth
  alternatives:
  - you gored
  - you thrashed about
  - you charged out
  lexicon: HALOT
  rationale: The verb literally can suggest butting/goring, but in this watery imagery
    it describes violent surging activity from within the rivers. 'Burst forth' communicates
    the image naturally in English.
- source_word: בְּנַהֲרוֹתֶיךָ
  chosen: in your rivers
  alternatives:
  - through your streams
  - in your Nile channels
  lexicon: HALOT
  rationale: Straightforward rendering of the plural with second masculine singular
    suffix. 'Rivers' preserves the imagery without over-specifying the Nile system
    in the main text.
- source_word: וַתִּדְלַח מַיִם בְּרַגְלֶיךָ
  chosen: you muddied the waters with your feet
  alternatives:
  - you stirred up the waters with your feet
  - you made the waters turbid with your feet
  lexicon: HALOT
  rationale: The verb conveys making water muddy or turbid. 'Muddied the waters' is
    idiomatic and vivid while remaining literal in this context.
- source_word: וַתִּרְפֹּס נַהֲרוֹתָם
  chosen: you fouled their rivers
  alternatives:
  - you trampled their rivers
  - you muddied their streams
  lexicon: HALOT
  rationale: The verb can mean trample, but with rivers as object the effect is pollution/disturbance.
    'Fouled' captures the result of trampling in water imagery. The 3mp suffix is
    preserved as 'their,' likely referring to the waters/streams of others affected
    by Pharaoh.
