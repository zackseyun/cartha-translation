id: EZK.22.18
reference: Ezekiel 22:18
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הָיוּ לִ֥/י בֵֽית יִשְׂרָאֵ֖ל ל/סוג כֻּלָּ֡/ם נְ֠חֹשֶׁת וּ/בְדִ֨יל
    וּ/בַרְזֶ֤ל וְ/עוֹפֶ֨רֶת֙ בְּ/ת֣וֹךְ כּ֔וּר סִגִ֥ים כֶּ֖סֶף הָיֽוּ־־־׃ס
translation:
  text: Son of man, the house of Israel has become dross to me; all of them are bronze
    and tin and iron and lead in the midst of a furnace. They have become the dross
    of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze' (נְחֹשֶׁת).
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional and contextually fitting address formula in Ezekiel. It
    preserves the Hebrew idiom without unnecessary paraphrase.
- source_word: הָיוּ לִי
  chosen: has become ... to me
  alternatives:
  - were to me
  - have been to me
  lexicon: HALOT
  rationale: The qatal with לִי expresses resultant state from Yahweh's perspective.
    Singular English agreement is used because 'house of Israel' is a collective singular.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retains the covenantal-collective expression rather than flattening it
    to the simpler proper name.
- source_word: לְסוּג
  chosen: dross
  alternatives:
  - slag
  - impurity
  lexicon: HALOT
  rationale: סוּג/סִגִים refers to metal refuse separated in smelting. 'Dross' is
    the standard and most precise biblical-English equivalent here.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: Makes explicit the distributive force of the pronoun attached to 'all'.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: The term can denote copper or bronze. In a list of common smelted metals
    contrasted with silver, 'bronze' is the more natural English rendering, while
    acknowledging 'copper' as possible.
- source_word: בְּדִיל
  chosen: tin
  alternatives: []
  lexicon: HALOT
  rationale: Standard rendering for the metal named in alloying/smelting contexts.
- source_word: בַּרְזֶל
  chosen: iron
  alternatives: []
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: עוֹפֶרֶת
  chosen: lead
  alternatives: []
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: בְּתוֹךְ כּוּר
  chosen: in the midst of a furnace
  alternatives:
  - inside a smelting furnace
  - in a crucible
  lexicon: HALOT
  rationale: כּוּר is a smelting furnace. 'In the midst of' reflects בְּתוֹךְ while
    remaining natural English.
- source_word: סִגִים כֶּסֶף
  chosen: the dross of silver
  alternatives:
  - silver dross
  - the impurities of silver
  lexicon: HALOT
  rationale: Construct chain best rendered as 'the dross of silver.' This preserves
    the metaphor that Israel is not precious silver but the waste removed from it.
