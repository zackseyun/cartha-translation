theological_decisions:
- issue: Divine speaker reference in first-person pronoun לִי
  chosen_reading: Retained as 'to me' without expanding to 'before me' or paraphrasing
    divine rejection.
  alternative_readings:
  - before me
  - in my sight
  rationale: The Hebrew simply marks Yahweh's evaluative relation to Israel. The translation
    preserves the metaphor of worthlessness without importing additional theological
    explanation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Metallurgical metaphor
  chosen_reading: Rendered literally as dross/silver-dross imagery
  alternative_readings:
  - general moral corruption paraphrase
  rationale: The verse's theological force comes through the smelting metaphor itself.
    A literal rendering preserves prophetic imagery and avoids interpretive flattening.
  doctrine_reference: Translation philosophy §1, §3
