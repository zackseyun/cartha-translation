theological_decisions:
- issue: Referent of the feminine suffix in בְּתוֹכָהּ
  chosen_reading: Render generically as 'within it' without specifying the antecedent.
  alternative_readings:
  - within the city
  - within the furnace/crucible
  rationale: The immediate literary context blends Jerusalem and furnace imagery.
    Preserving 'it' maintains the prophetic metaphorical tension rather than collapsing
    it into a single explicit referent.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
