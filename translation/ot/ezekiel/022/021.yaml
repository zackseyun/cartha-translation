id: EZK.22.21
reference: Ezekiel 22:21
source:
  edition: WLC
  text: וְ/כִנַּסְתִּ֣י אֶתְ/כֶ֔ם וְ/נָפַחְתִּ֥י עֲלֵי/כֶ֖ם בְּ/אֵ֣שׁ עֶבְרָתִ֑/י
    וְ/נִתַּכְתֶּ֖ם בְּ/תוֹכָֽ/הּ׃
translation:
  text: I will gather you, and I will blow on you with the fire of my wrath, and you
    will be melted within it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in its midst.' The pronoun may point to the city in the broader context
      or to the furnace/crucible in the smelting metaphor.
    reason: alternative_reading
lexical_decisions:
- source_word: כִנַּסְתִּי
  chosen: I will gather
  alternatives:
  - I will collect
  - I will assemble
  lexicon: HALOT
  rationale: The verb כנס in this context refers to bringing the people together for
    judgment, continuing the smelting metaphor from the surrounding verses. 'Gather'
    is natural English and preserves the concrete action without overinterpreting.
- source_word: נָפַחְתִּי עֲלֵיכֶם
  chosen: I will blow on you
  alternatives:
  - I will fan against you
  - I will breathe on you
  lexicon: HALOT
  rationale: נפח commonly means 'blow' or 'breathe.' In the furnace/smelting imagery,
    'blow on you' best preserves the image of intensifying fire by bellows. 'Against
    you' is possible interpretively, but the preposition עַל here is adequately represented
    by 'on.'
- source_word: בְּאֵשׁ עֶבְרָתִי
  chosen: with the fire of my wrath
  alternatives:
  - in the fire of my wrath
  - with the fire of my fury
  lexicon: HALOT
  rationale: אֵשׁ is literal 'fire,' and עֶבְרָה denotes overflowing anger/wrath.
    'With the fire of my wrath' fits the instrumental sense and keeps the metaphor
    vivid. 'Wrath' is preferred over 'fury' for consistency and gravity.
- source_word: נִתַּכְתֶּם
  chosen: you will be melted
  alternatives:
  - you will be smelted
  - you will be poured out
  lexicon: HALOT
  rationale: In context of metal refining, נתך can denote melting or liquefying. 'Melted'
    is the clearest modern English rendering. 'Smelted' is too technical and shifts
    agency/process; 'poured out' is a possible sense elsewhere but does not fit this
    furnace image as well here.
- source_word: בְּתוֹכָהּ
  chosen: within it
  alternatives:
  - in its midst
  - inside it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the furnace/city imagery
    in context, most immediately the smelting setting. 'Within it' is concise and
    preserves the referential ambiguity better than specifying 'the city' or 'the
    furnace' in the main text.
