id: EZK.22.17
reference: Ezekiel 22:17
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as standard narrative/sequential
    introduction. In this prophetic formula, idiomatic English is best achieved by
    folding the existential sense into the clause 'the word ... came' rather than
    the wooden 'and it happened.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the fixed prophetic expression דְבַר יְהוָה, 'the word' is the most
    natural and established equivalent, preserving both lexical transparency and the
    formulaic force of divine revelation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention
    while signaling the covenant name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple preposition plus first-person singular suffix; 'to me' is the
    natural modern English rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. 'Saying'
    preserves the formal prophetic cadence and leaves the following quotation properly
    introduced.
