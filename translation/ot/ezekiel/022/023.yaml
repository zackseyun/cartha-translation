id: EZK.22.23
reference: Ezekiel 22:23
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it was the word of the LORD to me, saying''—a standard prophetic
      formula meaning ''the word of the LORD came to me.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'and it was/came to pass,' in the prophetic
    formula ויהי דבר־יהוה אלי the idiomatic English rendering is 'the word ... came
    to me.' This preserves the formulaic sense without wooden English.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: In prophetic superscription/formula contexts, דָּבָר commonly denotes
    the divine word or message. 'The word' preserves the established prophetic formula
    and the text's gravity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating the recipient of the
    prophetic word. 'To me' is natural modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive construct introducing direct speech
    in prophetic formulas. 'Saying' is idiomatic and prepares for the following oracle.
