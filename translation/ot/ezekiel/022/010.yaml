id: EZK.22.10
reference: Ezekiel 22:10
source:
  edition: WLC
  text: עֶרְוַת אָ֖ב גִּלָּה בָ֑/ךְ טְמֵאַ֥ת הַ/נִּדָּ֖ה עִנּוּ בָֽ/ךְ־־־׃
translation:
  text: In you they uncover a father's nakedness; in you they violate a woman in her
    menstrual impurity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'uncover a father's nakedness,' a Levitical idiom for illicit sexual
      relations; compare Lev 18:7.
    reason: cross_reference
  - marker: b
    text: 'Or ''among you.'' The Hebrew addresses Jerusalem as a woman/city: ''in
      you.'''
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the impurity of menstruation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶרְוַת אָב
  chosen: a father's nakedness
  alternatives:
  - the nakedness of a father
  - his father's nakedness
  lexicon: HALOT
  rationale: The construct phrase literally means 'the nakedness of a father.' In
    Levitical sexual-prohibition language, 'uncover nakedness' is an idiom for illicit
    sexual relations. 'A father's nakedness' preserves the Hebrew idiom while remaining
    intelligible; the more wooden 'the nakedness of a father' is possible but less
    natural in English.
- source_word: גִּלָּה
  chosen: they uncover
  alternatives:
  - one uncovers
  - has uncovered
  lexicon: HALOT
  rationale: Though morphologically singular in the table, the verb functions idiomatically
    and collectively in context, matching the surrounding accusations against Jerusalem's
    inhabitants. Present-tense English conveys the prophetic indictment vividly and
    aligns with nearby clauses listing ongoing offenses.
- source_word: בָךְ
  chosen: in you
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: The preposition with 2fs suffix addresses the city/personified community.
    'In you' preserves the direct prophetic address to Jerusalem better than the more
    interpretive 'among you,' though the latter reflects the communal sense.
- source_word: טְמֵאַת הַנִּדָּה
  chosen: a woman in her menstrual impurity
  alternatives:
  - the uncleanness of menstruation
  - one unclean from menstruation
  lexicon: HALOT
  rationale: The phrase denotes the state of ritual impurity associated with menstruation.
    Rendering it as 'a woman in her menstrual impurity' makes explicit the implied
    female referent and communicates the sense in clear modern English without reducing
    the cultic connotation to merely medical description.
- source_word: עִנּוּ
  chosen: they violate
  alternatives:
  - they humble
  - they afflict
  - they have sexual relations with
  lexicon: HALOT
  rationale: In this sexual context, the verb carries the sense of abusive sexual
    violation rather than generic humiliation. 'They violate' preserves the moral
    gravity and likely coercive connotation better than the ambiguous 'humble' or
    overly bland 'have sexual relations with'.
