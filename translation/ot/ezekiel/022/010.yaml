theological_decisions:
- issue: Rendering Levitical sexual idiom without over-paraphrase
  chosen_reading: Retain 'uncover a father's nakedness' in the main text while letting
    the idiom imply incestuous sexual sin.
  alternative_readings:
  - Paraphrase as 'they have sexual relations with their father's wife/commit incest
    with a father's wife'
  rationale: The idiom is a fixed legal expression in the Hebrew Bible. A fuller paraphrase
    could import a specific interpretation not stated explicitly in this verse, while
    the retained idiom preserves intertextual links with Leviticus and keeps the accusation
    as stated.
