id: EZK.22.16
reference: Ezekiel 22:16
source:
  edition: WLC
  text: וְ/נִחַ֥לְתְּ בָּ֖/ךְ לְ/עֵינֵ֣י גוֹיִ֑ם וְ/יָדַ֖עַתְּ כִּֽי אֲנִ֥י יְהוָֽה־׃פ
translation:
  text: And you will be profaned through yourself before the eyes of the nations, and you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be defiled' or 'you will be dishonored in yourself.' The Hebrew verb may be understood with nuances of profanation, defilement, or public dishonor.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִחַלְתְּ
  chosen: you will be profaned
  alternatives:
  - you will be defiled
  - you will be dishonored
  - you will be treated as common
  lexicon: HALOT
  rationale: The Niphal 2fs of חלל here most naturally carries a passive/reflexive sense of being profaned or defiled. In Ezekiel, the root often concerns desecration/profanation rather than mere inheritance; context of judgment before the nations supports 'be profaned.' 'Profaned' preserves the covenantal and holiness dimension better than the flatter 'dishonored.'
- source_word: בָּךְ
  chosen: in yourself
  alternatives:
  - through yourself
  - by yourself
  lexicon: HALOT
  rationale: The preposition ב with 2fs suffix is terse and somewhat idiomatic. 'In yourself' is a fairly literal rendering that preserves the sense that the profanation attaches to Jerusalem herself. Alternatives such as 'through yourself' are possible interpretive expansions, but the Hebrew does not require that stronger causal nuance in the main text.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This idiom literally means 'to the eyes of' and commonly denotes public visibility. 'Before the eyes of' keeps the vividness of the Hebrew while remaining natural English.
- source_word: גוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In prophetic judgment contexts, גוים usually refers to foreign nations collectively. 'The nations' is the standard and clearest rendering here; 'Gentiles' would sound overly NT-shaped in English.
- source_word: וְיָדַעַתְּ
  chosen: and you will know
  alternatives:
  - then you will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly has future/resultative force. 'And you will know' is sufficiently natural; the consequential nuance is present from context without needing to add 'then' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
