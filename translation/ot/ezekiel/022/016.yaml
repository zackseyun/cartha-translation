theological_decisions:
- issue: Sense of חלל in this verse
  chosen_reading: judicial/cultic profanation of Jerusalem before the nations
  alternative_readings:
  - loss of inheritance/possession
  - general dishonor without holiness connotation
  rationale: The consonantal form has been understood in more than one way in translation history, but in Ezekiel's immediate context of impurity, shame, and divine judgment, the profanation sense best fits the prophet's holiness vocabulary. This preserves the theological theme that Jerusalem's sin results in public desecration before the nations.
