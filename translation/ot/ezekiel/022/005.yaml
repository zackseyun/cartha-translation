theological_decisions:
- issue: How to construe the compressed phrase טְמֵאַת הַשֵּׁם
  chosen_reading: 'vocative/appositional description: ''O defiled one of name'''
  alternative_readings:
  - '''defiled of name'''
  - '''defiled in reputation'''
  - '''whose name is defiled'''
  rationale: The Hebrew is elliptical. Retaining a relatively literal rendering avoids
    over-interpreting while preserving the prophetic taunt against Jerusalem's reputation.
    A more explicit paraphrase such as 'whose name is defiled' is possible but goes
    beyond the compact wording.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether to make the addressee explicit as Jerusalem/city
  chosen_reading: keep second-person 'you' without adding 'Jerusalem' or 'city'
  alternative_readings:
  - '''you, Jerusalem'''
  - '''you, city'''
  rationale: The immediate context identifies the addressee, so adding it here would
    import words not present in the verse. The personified feminine forms are sufficiently
    represented by 'defiled one.'
  doctrine_reference: Translation philosophy §1, §6
