id: EZK.22.5
reference: Ezekiel 22:5
source:
  edition: WLC
  text: הַ/קְּרֹב֛וֹת וְ/הָ/רְחֹק֥וֹת מִמֵּ֖/ךְ יִתְקַלְּסוּ בָ֑/ךְ טְמֵאַ֣ת הַ/שֵּׁ֔ם
    רַבַּ֖ת הַ/מְּהוּמָֽה־׃
translation:
  text: Those who are near and those who are far from you will mock you, O defiled
    one of name, full of turmoil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unclean in reputation,' 'whose name is defiled,' or more literally 'defiled
      of name.' The Hebrew phrase is compressed and may refer to Jerusalem's polluted
      reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'full of confusion,' 'full of uproar,' or 'abounding in disorder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְּרֹבוֹת
  chosen: those who are near
  alternatives:
  - the nearby ones
  - those nearby
  lexicon: HALOT
  rationale: Substantival feminine plural adjective with article, referring to nearby
    peoples/cities. 'Those who are near' is natural English and preserves the comparative
    spatial sense.
- source_word: וְהָרְחֹקוֹת
  chosen: and those who are far
  alternatives:
  - and the distant ones
  - and those far away
  lexicon: HALOT
  rationale: Parallel substantival adjective to the previous term. Rendered coordinately
    to preserve the rhetorical pairing of near and far.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'The preposition מן marks separation/source: those far from Jerusalem.
    ''From you'' is the plain spatial sense.'
- source_word: יִתְקַלְּסוּ
  chosen: will mock
  alternatives:
  - will deride
  - will scoff at
  - will make sport of
  lexicon: HALOT
  rationale: Hitpael/imperfect of קלס conveys mocking or derisive speech. 'Will mock'
    is concise, idiomatic, and fits the object marked by בָּךְ.
- source_word: בָךְ
  chosen: you
  alternatives:
  - at you
  - of you
  lexicon: HALOT
  rationale: With the verb of mocking, English idiom prefers a direct object ('mock
    you') rather than a literal prepositional rendering, while preserving the sense.
- source_word: טְמֵאַת
  chosen: defiled one
  alternatives:
  - unclean one
  - you who are defiled
  lexicon: HALOT
  rationale: Construct form of the adjective/noun 'unclean, defiled' used vocatively/appositionally
    of the city. 'Defiled one' preserves the personified address to Jerusalem.
- source_word: הַשֵּׁם
  chosen: of name
  alternatives:
  - in name
  - of reputation
  - named
  lexicon: HALOT
  rationale: Literally 'of the name' in construct with the preceding term. The phrase
    is compressed and likely characterizes reputation. 'Of name' keeps the Hebrew
    terseness while allowing the following context to define the reputation negatively.
- source_word: רַבַּת
  chosen: full of
  alternatives:
  - great in
  - abounding in
  lexicon: HALOT
  rationale: Construct feminine singular from רב, here introducing the following noun
    as a quality possessed in abundance. 'Full of' is idiomatic and clear.
- source_word: הַמְּהוּמָה
  chosen: turmoil
  alternatives:
  - confusion
  - uproar
  - disorder
  lexicon: HALOT
  rationale: The noun denotes tumult, confusion, or disorder. 'Turmoil' captures both
    social disorder and agitated unrest in readable modern English.
