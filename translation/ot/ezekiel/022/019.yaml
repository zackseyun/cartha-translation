id: EZK.22.19
reference: Ezekiel 22:19
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֛עַן הֱי֥וֹת כֻּלְּ/כֶ֖ם לְ/סִגִ֑ים לָ/כֵן֙ הִנְ/נִ֣י קֹבֵ֣ץ אֶתְ/כֶ֔ם אֶל תּ֖וֹךְ יְרוּשָׁלִָֽם־׃
translation:
  text: 'Therefore thus says the Lord GOD: Because all of you have become dross, therefore behold, I am gathering you into the midst of Jerusalem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slag' or 'metal impurities.' The Hebrew refers to the waste material separated from metal in smelting.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine title combines Adonai with YHWH. Per doctrine, YHWH is rendered 'the LORD'; however, in the conventional English representation of the compound אֲדֹנָי יְהוִה, 'Lord GOD' avoids the awkward 'Lord LORD' and preserves both elements of the Hebrew title.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment statement. 'Because' is clear modern English and fits the syntax.
- source_word: הֱיוֹת
  chosen: have become
  alternatives:
  - being
  - have been
  lexicon: HALOT
  rationale: With יַעַן, the infinitive construct of היה expresses the state/result that grounds the oracle. 'Have become' brings out the resultant condition in idiomatic English.
- source_word: כֻּלְּכֶם
  chosen: all of you
  alternatives:
  - you all
  - all of you together
  lexicon: HALOT
  rationale: Explicitly preserves the collective force of the Hebrew second person plural.
- source_word: לְסִגִים
  chosen: dross
  alternatives:
  - slag
  - impurities
  lexicon: HALOT
  rationale: סִיגִים refers to metallic waste/impurities removed in smelting. 'Dross' is the standard biblical and metallurgical term and matches the immediate refining metaphor in context.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - see, I am
  lexicon: HALOT
  rationale: Preserves the emphatic deictic force of the Hebrew announcement formula while keeping readable English.
- source_word: קֹבֵץ
  chosen: am gathering
  alternatives:
  - will gather
  - am assembling
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent or certain future action. 'I am gathering' preserves the vividness of the Hebrew while naturally implying impending action.
- source_word: אֶל תּוֹךְ יְרוּשָׁלִָם
  chosen: into the midst of Jerusalem
  alternatives:
  - into Jerusalem
  - into the middle of Jerusalem
  lexicon: HALOT
  rationale: תּוֹךְ means 'midst, interior.' 'Into the midst of Jerusalem' preserves the image more fully than the flatter 'into Jerusalem,' especially in a context of being gathered for judgment within the city.
