theological_decisions:
- issue: Rendering חֹל in the holiness distinction
  chosen_reading: common
  alternative_readings:
  - profane
  - ordinary
  rationale: The verse contrasts cultic categories, not necessarily moral evil versus
    holiness. Rendering חֹל as 'common' preserves priestly holiness terminology and
    avoids implying that everything non-holy is inherently wicked.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sense of וָאֵחַל
  chosen_reading: 'passive: ''I have been profaned among them'''
  alternative_readings:
  - 'reflexive nuance: ''I was defiled myself among them'''
  - active-related interpretations tied to a different vocalization
  rationale: 'In context the clause summarizes the consequence of priestly misconduct:
    God''s holiness is profaned in the community. The passive English rendering communicates
    this clearly without overstating a more speculative nuance.'
  doctrine_reference: Translation philosophy §1, §3
