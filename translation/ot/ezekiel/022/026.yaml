id: EZK.22.26
reference: Ezekiel 22:26
source:
  edition: WLC
  text: כֹּהֲנֶ֜י/הָ חָמְס֣וּ תוֹרָתִ/י֮ וַ/יְחַלְּל֣וּ קָדָשַׁ/י֒ בֵּֽין קֹ֤דֶשׁ
    לְ/חֹל֙ לֹ֣א הִבְדִּ֔ילוּ וּ/בֵין הַ/טָּמֵ֥א לְ/טָה֖וֹר לֹ֣א הוֹדִ֑יעוּ וּ/מִ/שַׁבְּתוֹתַ/י֙
    הֶעְלִ֣ימוּ עֵֽינֵי/הֶ֔ם וָ/אֵחַ֖ל בְּ/תוֹכָֽ/ם־־׃
translation:
  text: Her priests have done violence to my law and have profaned my holy things.
    They have not distinguished between the holy and the common, and they have not
    taught the difference between the unclean and the clean. They have hidden their
    eyes from my Sabbaths, and I have been profaned among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between the holy and the profane.' The Hebrew term here more precisely
      means what is common or ordinary, in contrast to what is holy.
    reason: lexical_alternative
  - marker: b
    text: Or 'I was profaned in their midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָמְסוּ
  chosen: have done violence to
  alternatives:
  - have violated
  - have wronged
  lexicon: HALOT
  rationale: The verb חמס conveys violent wrong or violation, stronger than a generic
    'break.' 'Have done violence to my law' preserves the metaphorical force of treating
    Torah with outrage and abuse.
- source_word: תוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  - my Torah
  lexicon: HALOT
  rationale: תוֹרָה can mean instruction broadly, but in prophetic covenantal accusation
    'law' is the most natural concise English rendering. 'Instruction' is possible,
    but 'law' better fits the priests' legal-teaching role in this verse.
- source_word: וַיְחַלְּלוּ
  chosen: have profaned
  alternatives:
  - have desecrated
  lexicon: HALOT
  rationale: חלל in the piel commonly means to profane or desecrate what is holy.
    'Profaned' is retained for consistency with holiness language in Ezekiel.
- source_word: קָדָשַׁי
  chosen: my holy things
  alternatives:
  - my sacred things
  - my sancta
  lexicon: HALOT
  rationale: The plural likely refers to things belonging to God's holy sphere, especially
    sacred offerings, places, or matters. 'My holy things' is transparent and preserves
    the broad scope better than narrowing to one cultic referent.
- source_word: בֵּין קֹדֶשׁ לְחֹל
  chosen: between the holy and the common
  alternatives:
  - between holy and profane
  - between the sacred and the ordinary
  lexicon: HALOT
  rationale: חֹל is not the same as morally evil; it denotes what is ordinary/common
    in contrast to holy. 'Common' best preserves the cultic distinction without importing
    moral condemnation. 'Profane' is a traditional rendering but can misleadingly
    suggest active irreverence rather than non-holy status.
- source_word: הִבְדִּילוּ
  chosen: have not distinguished
  alternatives:
  - have not separated
  - have not made a distinction
  lexicon: HALOT
  rationale: The priestly duty here is discernment and classification. 'Distinguished'
    is idiomatic and fits the legal-cultic context.
- source_word: וּבֵין הַטָּמֵא לְטָהוֹר
  chosen: between the unclean and the clean
  alternatives:
  - between the impure and the pure
  lexicon: HALOT
  rationale: These are standard priestly purity terms. 'Unclean' and 'clean' preserve
    biblical idiom and avoid over-psychologizing or moralizing ritual categories.
- source_word: הוֹדִיעוּ
  chosen: have not taught the difference
  alternatives:
  - have not made known
  - have not informed
  lexicon: HALOT
  rationale: Although the verb literally means 'make known,' in priestly context the
    sense is instructional. 'Have not taught the difference' makes explicit the pedagogical
    force in natural English.
- source_word: וּמִשַׁבְּתוֹתַי
  chosen: from my Sabbaths
  alternatives:
  - from my Sabbath days
  lexicon: HALOT
  rationale: The plural 'my Sabbaths' is preserved, matching Hebrew usage for the
    recurring sacred observances and maintaining covenantal language.
- source_word: הֶעְלִימוּ עֵינֵיהֶם
  chosen: have hidden their eyes from
  alternatives:
  - have shut their eyes to
  - have ignored
  lexicon: HALOT
  rationale: The idiom means deliberate disregard. 'Hidden their eyes from' keeps
    the Hebrew image while remaining understandable; it suggests willful neglect rather
    than mere oversight.
- source_word: וָאֵחַל
  chosen: I have been profaned
  alternatives:
  - I was profaned
  - I was treated as profane
  lexicon: HALOT
  rationale: 'The form is best taken as passive/reflexive from חלל: God is profaned
    in the midst of the people through priestly failure. ''I have been profaned''
    preserves the resultative sense in context.'
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: Both are possible. 'Among them' is smoother modern English while preserving
    the communal setting of God's profanation.
