id: EZK.22.2
reference: Ezekiel 22:2
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֔ם הֲ/תִשְׁפֹּ֥ט הֲ/תִשְׁפֹּ֖ט אֶת עִ֣יר הַ/דָּמִ֑ים וְ/ה֣וֹדַעְתָּ֔/הּ
    אֵ֖ת כָּל תּוֹעֲבוֹתֶֽי/הָ־־־׃
translation:
  text: And you, son of man, will you judge, will you judge the city of bloodshed?
    Then make known to her all her abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bloody city' or 'the city of bloodguilt'; Hebrew literally 'the
      city of bloods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering
    preserves the idiom and its repeated usage in the book. Although the phrase means
    a human being/mortal in context, 'son of man' best reflects the Hebrew form and
    maintains consistency.
- source_word: הֲתִשְׁפֹּט הֲתִשְׁפֹּט
  chosen: will you judge, will you judge
  alternatives:
  - will you judge? will you judge?
  - are you going to judge, are you going to judge
  lexicon: HALOT
  rationale: The doubled interrogative verb is emphatic and rhetorical. Repeating
    'will you judge' preserves the Hebrew intensification better than collapsing it
    into a single verb.
- source_word: עִיר הַדָּמִים
  chosen: the city of bloodshed
  alternatives:
  - the bloody city
  - the city of bloodguilt
  - the city of bloods
  lexicon: HALOT
  rationale: The plural 'bloods' in Hebrew often denotes bloodshed or bloodguilt.
    'City of bloodshed' is natural English and preserves the sense of a city marked
    by violent killing, without reducing it merely to an adjective like 'bloody.'
- source_word: וְהוֹדַעְתָּהּ
  chosen: Then make known to her
  alternatives:
  - and make known to her
  - and inform her
  lexicon: HALOT
  rationale: The conjunction plus Hiphil of ידע carries a causative sense, 'cause
    her to know' or 'make known to her.' 'Then' captures the discourse force following
    the rhetorical question, though 'and' is also possible.
- source_word: תּוֹעֲבוֹתֶיהָ
  chosen: her abominations
  alternatives:
  - her detestable acts
  - her abhorrent practices
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong covenantal-moral term often rendered 'abomination.'
    Retaining 'abominations' preserves the prophetic and theological weight of the
    accusation, while remaining understandable in modern English.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: The totalizing force is explicit in the Hebrew and should be preserved.
