  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The doctrine guidelines prefer gender-accurate renderings matching source
    intent. Here the phrase is an established Hebrew idiom and recurring prophetic
    address, so the traditional but source-faithful 'son of man' is retained rather
    than neutralizing it.
