id: EZK.22.11
reference: Ezekiel 22:11
source:
  edition: WLC
  text: וְ/אִ֣ישׁ אֶת אֵ֣שֶׁת רֵעֵ֗/הוּ עָשָׂה֙ תּֽוֹעֵבָ֔ה וְ/אִ֥ישׁ אֶת כַּלָּת֖/וֹ
    טִמֵּ֣א בְ/זִמָּ֑ה וְ/אִ֛ישׁ אֶת אֲחֹת֥/וֹ בַת אָבִ֖י/ו עִנָּה בָֽ/ךְ׀־־־־־׃
translation:
  text: One man commits an abomination with his neighbor’s wife, another defiles his
    daughter-in-law with lewdness, and another violates his sister, his father’s daughter,
    within you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does a detestable act with.' The Hebrew idiom is literally 'does an
      abomination.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with sexual depravity' for 'with lewdness.'
    reason: lexical_alternative
  - marker: c
    text: Or 'humiliates' or 'ravishes.' The Hebrew verb can denote sexual violation
      with an added sense of humiliation or abuse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  chosen: one man ... another ... another
  alternatives:
  - and a man
  - each man
  lexicon: HALOT
  rationale: The repeated singular אִישׁ structures a list of individual offenders.
    English idiom is clearer with 'one man ... another ... another' rather than repeating
    'and a man' three times.
- source_word: אֵשֶׁת רֵעֵהוּ
  chosen: his neighbor’s wife
  alternatives:
  - the wife of his companion
  - his fellow’s wife
  lexicon: HALOT
  rationale: רֵעַ commonly denotes a neighbor, companion, or fellow. 'Neighbor’s wife'
    is natural modern English and preserves the relational sense.
- source_word: עָשָׂה תּוֹעֵבָה
  chosen: commits an abomination with
  alternatives:
  - does an abomination with
  - commits a detestable act with
  lexicon: HALOT
  rationale: The idiom literally 'does an abomination' refers here to adulterous sexual
    sin. 'Commits an abomination with' preserves the moral weight of תּוֹעֵבָה while
    reading naturally in English.
- source_word: כַּלָּתוֹ
  chosen: his daughter-in-law
  lexicon: HALOT
  rationale: Standard kinship term; 'daughter-in-law' is the direct and precise rendering.
- source_word: טִמֵּא
  chosen: defiles
  alternatives:
  - makes unclean
  - pollutes
  lexicon: HALOT
  rationale: In sexual contexts טמא often carries both ritual and moral defilement.
    'Defiles' preserves that overlap better than the more wooden 'makes unclean.'
- source_word: בְּזִמָּה
  chosen: with lewdness
  alternatives:
  - by wickedness
  - in depravity
  - with sexual depravity
  lexicon: HALOT
  rationale: זִמָּה in this context denotes sexually wicked, shameless conduct. 'With
    lewdness' is concise, readable, and retains the sexual-moral force.
- source_word: אֲחֹתוֹ בַת אָבִיו
  chosen: his sister, his father’s daughter
  alternatives:
  - his half-sister by his father
  - his sister, the daughter of his father
  lexicon: HALOT
  rationale: The Hebrew apposition specifies the incestuous relationship in the wording
    of Levitical law. Keeping 'his sister, his father’s daughter' preserves the legal
    and familial precision without over-interpreting the exact family structure.
- source_word: עִנָּה
  chosen: violates
  alternatives:
  - humiliates
  - ravishes
  - has sexual relations with
  lexicon: HALOT
  rationale: ענה in sexual contexts often conveys violation or abuse, not merely intercourse.
    'Violates' communicates the coercive and degrading sense better than a neutral
    phrase.
- source_word: בָּךְ
  chosen: within you
  alternatives:
  - in you
  - among you
  lexicon: HALOT
  rationale: The feminine singular pronoun addresses Jerusalem/city personified. 'Within
    you' fits the city imagery and the catalog of sins occurring in her midst.
