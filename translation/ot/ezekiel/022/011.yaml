theological_decisions:
- issue: Moral-theological force of sexual offense terminology
  chosen_reading: Retain strong ethical language ('abomination,' 'defiles,' 'violates')
    rather than soften to neutral descriptions of illicit sex.
  alternative_readings:
  - Use more euphemistic renderings such as 'has relations with' or 'behaves immorally
    with'
  rationale: The verse is an indictment of grave covenantal and social corruption.
    The Hebrew terms carry strong moral condemnation and, in the final clause, likely
    coercive violation. Preserving that weight aligns with optimal equivalence and
    avoids muting the text’s ethical force.
  doctrine_reference: Translation philosophy §§1, 6
