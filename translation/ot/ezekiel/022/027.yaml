id: EZK.22.27
reference: Ezekiel 22:27
source:
  edition: WLC
  text: שָׂרֶ֣י/הָ בְ/קִרְבָּ֔/הּ כִּ/זְאֵבִ֖ים טֹ֣רְפֵי טָ֑רֶף לִ/שְׁפָּךְ דָּם֙
    לְ/אַבֵּ֣ד נְפָשׁ֔וֹת לְמַ֖עַן בְּצֹ֥עַ בָּֽצַע־׃
translation:
  text: Her princes within her are like wolves tearing prey, to shed blood, to destroy
    lives, in order to gain dishonest profit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to destroy persons' or 'to destroy souls'; Hebrew nephashot can denote
      persons, lives, or souls depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to make unjust gain' or 'to gain by extortion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֶיהָ
  chosen: her princes
  alternatives:
  - her officials
  - her leaders
  lexicon: HALOT
  rationale: שַׂר commonly denotes a prince, ruler, or official. In this prophetic
    indictment, 'princes' preserves the elevated political sense better than the broader
    'leaders,' while remaining natural English.
- source_word: בְּקִרְבָּהּ
  chosen: within her
  alternatives:
  - in her midst
  - inside her
  lexicon: HALOT
  rationale: The phrase literally means 'in her midst.' 'Within her' is concise, idiomatic,
    and preserves the image of corruption located inside the city/community.
- source_word: כִּזְאֵבִים
  chosen: like wolves
  alternatives:
  - as wolves
  lexicon: HALOT
  rationale: The comparative כ plus 'wolves' introduces a simile. 'Like wolves' is
    the most natural modern English rendering.
- source_word: טֹרְפֵי טָרֶף
  chosen: tearing prey
  alternatives:
  - ravening prey
  - tearing apart prey
  - preying on prey
  lexicon: HALOT
  rationale: The participle plus cognate object intensifies predatory violence. 'Tearing
    prey' preserves the vividness and alliteration of the Hebrew without becoming
    archaic ('ravening').
- source_word: לִשְׁפָּךְ דָּם
  chosen: to shed blood
  alternatives:
  - for shedding blood
  lexicon: HALOT
  rationale: A standard Hebrew idiom for violent killing. 'To shed blood' is the established
    and accurate English equivalent.
- source_word: לְאַבֵּד נְפָשׁוֹת
  chosen: to destroy lives
  alternatives:
  - to destroy souls
  - to destroy persons
  - to kill people
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to living persons/lives rather than the immaterial
    soul in a narrow sense. 'Lives' communicates the concrete sense and avoids misleading
    theological overreading.
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so as to
  - for the sake of
  lexicon: HALOT
  rationale: This marks purpose/result. 'In order to' clearly expresses the motivation
    behind the violence.
- source_word: בְּצֹעַ בָּצַע
  chosen: gain dishonest profit
  alternatives:
  - make unjust gain
  - get gain by extortion
  - gain plunder
  lexicon: HALOT
  rationale: The infinitive plus cognate noun from בצע emphasizes acquisitive greed,
    often unjust or violent gain. 'Gain dishonest profit' captures both the economic
    motive and its moral corruption in readable English.
