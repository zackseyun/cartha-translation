theological_decisions:
- issue: Meaning of נְפָשׁוֹת in a judgment context
  chosen_reading: '''lives'' referring to persons being destroyed'
  alternative_readings:
  - '''souls'''
  rationale: The context is social violence and bloodshed by civic rulers, so the
    term denotes human lives/persons rather than making a doctrinal statement about
    the soul. This preserves the text's concrete accusation without importing later
    anthropological debates.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
