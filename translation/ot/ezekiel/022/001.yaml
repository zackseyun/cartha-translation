id: EZK.22.1
reference: Ezekiel 22:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה functions here as standard narrative/sequential
    introduction. In English, rendering the idiom with the natural prophetic formula
    'And ... came' communicates the sense without woodenly preserving 'it happened/came
    to pass.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the construct phrase דְבַר יְהוָה, 'the word' is the standard and
    contextually precise rendering for prophetic revelation. 'Message' is possible
    but less formally tied to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention
    while signaling the covenant name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: 'The preposition plus first-person suffix straightforwardly indicates
    direction toward the prophet: ''to me.'' ''Unto me'' is archaic and less readable.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive commonly introduces direct speech in prophetic formulas.
    'Saying' is concise, conventional, and prepares for the following oracle in the
    next verse.
