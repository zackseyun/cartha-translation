id: EZK.22.13
reference: Ezekiel 22:13
source:
  edition: WLC
  text: וְ/הִנֵּה֙ הִכֵּ֣יתִי כַפִּ֔/י אֶל בִּצְעֵ֖/ךְ אֲשֶׁ֣ר עָשִׂ֑ית וְ/עַ֨ל דָּמֵ֔/ךְ
    אֲשֶׁ֥ר הָי֖וּ בְּ/תוֹכֵֽ/ךְ־־׃
translation:
  text: And behold, I strike my hand against your unjust gain that you have made,
    and against the bloodshed that has been in your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your dishonest gain' or 'your greed.' The Hebrew term can denote profit
      gained by injustice or violence.
    reason: lexical_alternative
  - marker: b
    text: Or 'your bloodguilt.' The Hebrew 'bloods' can refer collectively to acts
      of bloodshed and the guilt attached to them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic attention-getting particle and the vividness of
    the Hebrew discourse marker rather than omitting it. 'Behold' is slightly elevated
    but still readable in prophetic speech.
- source_word: הִכֵּיתִי
  chosen: I strike
  alternatives:
  - I have struck
  - I clap
  - I smite
  lexicon: HALOT
  rationale: The perfect can be rendered as a vivid present in prophetic declaration.
    Here 'I strike' communicates an enacted gesture of judgment. 'Clap' is possible
    in context of striking the hand, but the verb itself is simply 'strike' and avoids
    over-specifying the gesture.
- source_word: כַפִּי
  chosen: my hand
  alternatives:
  - my palm
  lexicon: HALOT
  rationale: Hebrew כף can mean 'palm' or 'hand.' In English idiom 'strike my hand'
    is more natural than 'strike my palm' while preserving the bodily gesture.
- source_word: אֶל
  chosen: against
  alternatives:
  - at
  - toward
  lexicon: HALOT
  rationale: With a hostile judicial gesture, 'against' best conveys the adversative
    force in context.
- source_word: בִּצְעֵךְ
  chosen: your unjust gain
  alternatives:
  - your profit
  - your dishonest gain
  - your greed
  lexicon: HALOT
  rationale: בצע often denotes gain acquired by violence or injustice, not mere neutral
    profit. 'Unjust gain' captures both the economic and moral sense without paraphrasing
    too far.
- source_word: אֲשֶׁר עָשִׂית
  chosen: that you have made
  alternatives:
  - which you acquired
  - that you have gotten
  lexicon: HALOT
  rationale: Keeps close to the Hebrew verb 'do/make' while fitting English usage
    with 'gain.' 'Acquired' is interpretive; 'made' preserves the source wording.
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and concerning
  - and over
  lexicon: HALOT
  rationale: Parallel to the previous prepositional phrase and suited to the judicial
    denunciation.
- source_word: דָּמֵךְ
  chosen: the bloodshed
  alternatives:
  - your blood
  - your bloodguilt
  - the blood in you
  lexicon: HALOT
  rationale: The plural/singular blood term in prophetic indictment often functions
    collectively for acts of bloodshed or bloodguilt. 'Bloodshed' is the clearest
    idiomatic English in this context of violence within the city.
- source_word: אֲשֶׁר הָיוּ בְּתוֹכֵךְ
  chosen: that has been in your midst
  alternatives:
  - that was within you
  - that is in you
  lexicon: HALOT
  rationale: Addresses the city as feminine singular. 'In your midst' is a standard
    and natural rendering for בתוך, preserving the corporate/civic setting.
