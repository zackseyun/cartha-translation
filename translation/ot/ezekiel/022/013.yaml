theological_decisions:
- issue: Nature of the divine hand gesture in judgment
  chosen_reading: Rendered as 'I strike my hand against' to preserve a concrete gesture
    of divine indignation/judgment without over-interpreting it as applause or mere
    metaphor.
  alternative_readings:
  - I clap my hands over
  - I have struck my hand at
  rationale: The verse depicts YHWH's embodied judicial response to Jerusalem's sins.
    The translation keeps the anthropomorphic imagery and does not flatten it into
    abstraction.
