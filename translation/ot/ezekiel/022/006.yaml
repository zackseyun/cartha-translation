id: EZK.22.6
reference: Ezekiel 22:6
source:
  edition: WLC
  text: הִנֵּה֙ נְשִׂיאֵ֣י יִשְׂרָאֵ֔ל אִ֥ישׁ לִ/זְרֹע֖/וֹ הָ֣יוּ בָ֑/ךְ לְמַ֖עַן
    שְׁפָךְ דָּֽם־׃
translation:
  text: Look, the princes of Israel in you, each according to his power, have been
    bent on shedding blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'each according to his arm.' Here 'arm' is a Hebrew idiom for
      strength or power.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces attention emphatically. 'Look' preserves the deictic force
    in readable modern English better than the more archaic 'Behold.'
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  chosen: the princes of Israel
  alternatives:
  - the leaders of Israel
  - the chiefs of Israel
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a lifted-up leader, chief, or prince. In this
    prophetic indictment of ruling elites, 'princes' preserves the political rank
    and traditional prophetic diction better than the broader 'leaders.'
- source_word: אִישׁ
  chosen: each
  alternatives:
  - each man
  - every one
  lexicon: HALOT
  rationale: Though literally 'man,' here it functions distributively with the following
    phrase ('each according to his power'). English 'each' conveys the distributive
    sense naturally without unnecessary stiffness; the masculine possessive is retained
    later to reflect the source's gendered form.
- source_word: לִזְרֹעוֹ
  chosen: according to his power
  alternatives:
  - with his arm
  - by his strength
  lexicon: HALOT
  rationale: Literally 'to/for his arm.' In Hebrew, 'arm' often metonymically signifies
    strength or power. Here the idiom means each ruler acting on the basis of his
    own power or influence. 'According to his power' communicates the idiomatic sense
    clearly.
- source_word: הָיוּ בָךְ
  chosen: have been in you
  alternatives:
  - were in you
  - have been among you
  lexicon: HALOT
  rationale: The phrase locates these rulers within Jerusalem ('you,' feminine singular).
    English style smooths this in the full sentence, but the sense is that these princes
    are present and active within the city. The final rendering integrates this as
    'in you' after 'Israel' to preserve the direct address.
- source_word: לְמַעַן שְׁפָךְ דָּם
  chosen: bent on shedding blood
  alternatives:
  - for the sake of shedding blood
  - to shed blood
  lexicon: HALOT
  rationale: Literally 'for the sake of shedding blood.' In context this expresses
    purpose and culpable intent. 'Bent on shedding blood' captures the forceful, accusatory
    sense in idiomatic English, while still reflecting the purposive construction.
- source_word: דָּם
  chosen: blood
  alternatives:
  - bloodshed
  lexicon: HALOT
  rationale: The noun is singular 'blood,' but in English the idiom 'shedding blood'
    naturally conveys violent bloodshed. This preserves the concrete imagery of the
    Hebrew.
