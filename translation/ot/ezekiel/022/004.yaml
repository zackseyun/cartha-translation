theological_decisions:
- issue: Nature of Jerusalem's impurity and guilt
  chosen_reading: The verse speaks of covenantal/judicial guilt from bloodshed and
    ritual-moral uncleanness from idolatry without importing later doctrinal categories.
  alternative_readings:
  - Treating impurity as merely ceremonial
  - Treating guilt as exclusively metaphorical
  rationale: The Hebrew pairs bloodguilt and uncleanness as concrete prophetic charges
    against Jerusalem. The translation preserves both dimensions without flattening
    either into purely ritual or purely symbolic language.
  doctrine_reference: Preserve theological tension rather than resolve it.
