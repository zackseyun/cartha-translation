id: EZK.22.4
reference: Ezekiel 22:4
source:
  edition: WLC
  text: בְּ/דָמֵ֨/ךְ אֲשֶׁר שָׁפַ֜כְתְּ אָשַׁ֗מְתְּ וּ/בְ/גִלּוּלַ֤יִ/ךְ אֲשֶׁר עָשִׂית֙
    טָמֵ֔את וַ/תַּקְרִ֣יבִי יָמַ֔יִ/ךְ וַ/תָּב֖וֹא עַד שְׁנוֹתָ֑יִ/ךְ עַל כֵּ֗ן נְתַתִּ֤י/ךְ
    חֶרְפָּה֙ לַ/גּוֹיִ֔ם וְ/קַלָּסָ֖ה לְ/כָל הָ/אֲרָצֽוֹת־־־־־׃
translation:
  text: By your blood that you have shed, you have become guilty, and by your idols
    that you have made, you have become unclean. You have brought your days near and
    have come to your years. Therefore I have made you a reproach to the nations and
    a mockery to all the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'You have hastened your days and reached the end
      of your years.' The Hebrew idiom likely refers to the approach of Jerusalem's
      appointed time of judgment.
    reason: lexical_alternative
  - marker: b
    text: The term translated 'idols' is a contemptuous Hebrew word often used in
      Ezekiel for false gods, carrying a pejorative sense beyond a neutral term for
      images.
    reason: cultural_note
lexical_decisions:
- source_word: בְּדָמֵךְ
  chosen: by your blood
  alternatives:
  - in your blood
  - because of your bloodshed
  lexicon: HALOT
  rationale: 'The preposition ב with דם here is instrumental/causal in context: Jerusalem
    is indicted on account of bloodshed. ''By your blood'' preserves the Hebrew compactness
    while allowing the following relative clause to specify ''that you have shed.'''
- source_word: שָׁפַכְתְּ
  chosen: you have shed
  alternatives:
  - you shed
  - you poured out
  lexicon: HALOT
  rationale: שׁפך commonly means 'shed/pour out.' In a judicial context with דם, 'shed'
    is the natural English collocation for bloodguilt.
- source_word: אָשַׁמְתְּ
  chosen: you have become guilty
  alternatives:
  - you are guilty
  - you have incurred guilt
  lexicon: HALOT
  rationale: The verb אשׁם denotes becoming guilty or bearing guilt. 'Have become
    guilty' reflects the resultant state from the bloodshed more clearly than a simple
    stative 'are guilty.'
- source_word: גִלּוּלַיִךְ
  chosen: your idols
  alternatives:
  - your dung-idols
  - your filthy idols
  lexicon: HALOT
  rationale: גִלּוּלִים is Ezekiel's contemptuous term for idols. 'Idols' is the clear
    main-text rendering; the pejorative force is real but difficult to preserve idiomatically
    without sounding interpretive, so stronger alternatives are reserved as lexical
    possibilities rather than main text.
- source_word: טָמֵאת
  chosen: you have become unclean
  alternatives:
  - you are defiled
  - you have defiled yourself
  lexicon: HALOT
  rationale: The verb טמא in the Qal can denote becoming unclean/defiled. 'Have become
    unclean' matches the parallel with 'have become guilty' and avoids adding reflexive
    force not explicit in the form.
- source_word: וַתַּקְרִיבִי יָמַיִךְ
  chosen: You have brought your days near
  alternatives:
  - You have brought near your days
  - You have hastened your days
  lexicon: HALOT
  rationale: קרב in Hiphil means 'bring near.' The idiom refers to bringing near the
    days of judgment/end. 'Brought your days near' is a readable but still close rendering.
- source_word: וַתָּבֹוא עַד שְׁנוֹתָיִךְ
  chosen: and have come to your years
  alternatives:
  - and reached your years
  - and come to the end of your years
  lexicon: HALOT
  rationale: The phrase is idiomatic and likely parallels the previous clause, indicating
    arrival at the appointed years of judgment. 'Have come to your years' stays close
    to the Hebrew while remaining intelligible; more interpretive expansions are avoided
    in the main text.
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - disgrace
  - object of scorn
  lexicon: HALOT
  rationale: חרפה often denotes reproach, disgrace, or taunt. 'Reproach' preserves
    the covenantal/judicial tone common in prophetic literature.
- source_word: קַלָּסָה
  chosen: a mockery
  alternatives:
  - a taunt
  - an object of derision
  lexicon: HALOT
  rationale: קלסה denotes derision or mockery. 'Mockery' is natural modern English
    and pairs well with 'reproach' without collapsing the distinction between the
    two nouns.
- source_word: הָאֲרָצוֹת
  chosen: the lands
  alternatives:
  - the countries
  - the earth
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to lands/countries in parallel with 'the nations,'
    not the whole earth in an abstract sense. 'Lands' preserves the broad geopolitical
    sense.
