theological_decisions:
- issue: Social-ethical covenant terminology for vulnerable persons
  chosen_reading: Retain specific categories ('sojourner,' 'fatherless,' 'widow')
    rather than flattening to generic 'the vulnerable.'
  alternative_readings:
  - the foreigner, the orphan, and the widow
  - the vulnerable
  rationale: The verse indicts covenant violations against named protected groups
    in Israel's law. Preserving the specific categories maintains the intertextual
    force without importing extra doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 5
