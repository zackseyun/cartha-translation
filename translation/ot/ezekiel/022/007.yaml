id: EZK.22.7
reference: Ezekiel 22:7
source:
  edition: WLC
  text: אָ֤ב וָ/אֵם֙ הֵקַ֣לּוּ בָ֔/ךְ לַ/גֵּ֛ר עָשׂ֥וּ בַ/עֹ֖שֶׁק בְּ/תוֹכֵ֑/ךְ יָת֥וֹם
    וְ/אַלְמָנָ֖ה ה֥וֹנוּ בָֽ/ךְ׃
translation:
  text: In you they have treated father and mother with contempt; in your midst they
    have oppressed the sojourner; in you they have defrauded the fatherless and the
    widow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the foreigner' or 'the resident alien' for 'the sojourner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the orphan and the widow' for 'the fatherless and the widow.'
    reason: lexical_alternative
  - marker: c
    text: The repeated 'in you' addresses the city directly, personifying Jerusalem
      as a woman.
    reason: cultural_note
lexical_decisions:
- source_word: הֵקַלּוּ
  chosen: have treated ... with contempt
  alternatives:
  - have dishonored
  - have made light of
  lexicon: HALOT
  rationale: From קלל in the Hiphil, here meaning to treat lightly, dishonor, or show
    contempt. 'Treated ... with contempt' is idiomatic modern English and preserves
    the moral force of the accusation.
- source_word: אָב וָאֵם
  chosen: father and mother
  alternatives:
  - parents
  lexicon: HALOT
  rationale: The Hebrew names the two explicitly rather than using a collective. 'Father
    and mother' preserves the wording and echoes covenantal/commandment language better
    than the more generalized 'parents'.
- source_word: בָךְ
  chosen: In you
  alternatives:
  - Within you
  - Among you
  lexicon: HALOT
  rationale: Addressed to the city/personified Jerusalem in the feminine singular.
    'In you' preserves the repeated rhetorical refrain and the direct address.
- source_word: לַגֵּר
  chosen: the sojourner
  alternatives:
  - the foreigner
  - the resident alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Sojourner' preserves
    the covenantal-social category without reducing it merely to ethnicity; alternatives
    are viable but either sound more technical ('resident alien') or narrower ('foreigner').
- source_word: עָשׂוּ בָעֹשֶׁק
  chosen: have oppressed
  alternatives:
  - have committed extortion against
  - have dealt with by oppression
  lexicon: HALOT
  rationale: Literally 'they did with oppression/extortion.' The idiom conveys exploitative
    treatment. 'Have oppressed' is concise and natural, while retaining the injustice
    inherent in עֹשֶׁק.
- source_word: בְּתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  lexicon: HALOT
  rationale: תוֹךְ means midst/interior. 'In your midst' is a natural English rendering
    that highlights these abuses occurring inside the community itself.
- source_word: יָתוֹם וְאַלְמָנָה
  chosen: the fatherless and the widow
  alternatives:
  - the orphan and the widow
  lexicon: HALOT
  rationale: יָתוֹם is literally one without a father. 'Fatherless' preserves the
    Hebrew nuance and traditional covenantal pairing with 'widow,' though 'orphan'
    is a possible smoother alternative.
- source_word: הוֹנוּ
  chosen: have defrauded
  alternatives:
  - have wronged
  - have exploited
  - have mistreated
  lexicon: HALOT
  rationale: From ינה in the Hiphil, denoting mistreatment by oppression, exploitation,
    or defrauding. 'Have defrauded' captures the unjust exploitation strongly and
    fits the social-justice context of the verse.
