id: EZK.22.15
reference: Ezekiel 22:15
source:
  edition: WLC
  text: וַ/הֲפִיצוֹתִ֤י אוֹתָ/ךְ֙ בַּ/גּוֹיִ֔ם וְ/זֵרִיתִ֖י/ךְ בָּ/אֲרָצ֑וֹת וַ/הֲתִמֹּתִ֥י
    טֻמְאָתֵ֖/ךְ מִמֵּֽ/ךְ׃
translation:
  text: I will scatter you among the nations and disperse you through the lands, and
    I will purge your uncleanness from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'remove your impurity from you' or 'put an end to your defilement in
      you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִיצוֹתִי
  chosen: I will scatter
  alternatives:
  - I will disperse
  - I will drive apart
  lexicon: HALOT
  rationale: From פוץ/פוץ-like dispersal language in judgment contexts; 'scatter'
    is natural English and fits exile imagery.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations among whom Jerusalem will be exiled.
    'Nations' is the standard and least interpretively loaded rendering.
- source_word: וְזֵרִיתִיךְ
  chosen: and disperse you
  alternatives:
  - and winnow you
  - and scatter you
  lexicon: HALOT
  rationale: זרה can mean scatter/winnow. In parallel with the previous verb and with
    the object being the city/personified people, 'disperse you' preserves the parallelism
    while avoiding awkward repetition.
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - through the countries
  - into the lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is plural 'lands/countries.' 'Through the lands' conveys broad
    geographic dispersion and reads smoothly in English.
- source_word: וַהֲתִמֹּתִי
  chosen: and I will purge
  alternatives:
  - and I will consume
  - and I will remove completely
  - and I will put an end to
  lexicon: HALOT
  rationale: From תמם in a causative form meaning to bring to an end/remove. In context
    with טֻמְאָה ('uncleanness'), 'purge' best captures the result of removing impurity
    through judgment.
- source_word: טֻמְאָתֵךְ
  chosen: your uncleanness
  alternatives:
  - your impurity
  - your defilement
  lexicon: HALOT
  rationale: טֻמְאָה denotes impurity/uncleanness, often with moral and cultic force.
    'Uncleanness' preserves that biblical register without over-specifying ritual
    or moral categories.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - out of you
  - away from you
  lexicon: HALOT
  rationale: The preposition marks removal from the addressee; 'from you' is the most
    direct rendering.
