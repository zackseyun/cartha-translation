theological_decisions:
- issue: Nature of the purification described in judgment
  chosen_reading: The line is rendered as removal of Jerusalem's uncleanness through
    exile-judgment, without specifying whether the cleansing is primarily moral, ritual,
    or metaphorical.
  alternative_readings:
  - I will be defiled by you
  - I will consume your uncleanness
  - I will show myself clean from you
  rationale: The Hebrew clause concerns the termination/removal of impurity in the
    context of divine judgment. The translation preserves the theological tension
    that judgment both punishes and purifies, without importing a narrower doctrinal
    explanation not explicit in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
