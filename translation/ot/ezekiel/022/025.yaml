theological_decisions:
- issue: Meaning of נֶפֶשׁ in a judgment context
  chosen_reading: Rendered as 'lives' rather than 'souls'
  alternative_readings:
  - souls
  - persons
  rationale: The verse condemns murderous exploitation, not making a technical statement
    about the immaterial soul. 'Lives' best reflects the Hebrew idiom and avoids importing
    later theological precision not demanded by the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
