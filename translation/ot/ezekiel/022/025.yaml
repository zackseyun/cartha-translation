id: EZK.22.25
reference: Ezekiel 22:25
source:
  edition: WLC
  text: קֶ֤שֶׁר נְבִיאֶ֨י/הָ֙ בְּ/תוֹכָ֔/הּ כַּ/אֲרִ֥י שׁוֹאֵ֖ג טֹ֣רֵֽף טָ֑רֶף נֶ֣פֶשׁ
    אָכָ֗לוּ חֹ֤סֶן וִ/יקָר֙ יִקָּ֔חוּ אַלְמְנוֹתֶ֖י/הָ הִרְבּ֥וּ בְ/תוֹכָֽ/הּ׃
translation:
  text: 'A conspiracy of her prophets is in her midst, like a roaring lion tearing
    prey: they have devoured lives, they take treasure and precious things, they have
    multiplied her widows in her midst.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have devoured persons' or, more literally, 'souls.' Hebrew nephesh
      often means a living being or life, not only the immaterial soul.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁר
  chosen: conspiracy
  alternatives:
  - plot
  - band together
  lexicon: HALOT
  rationale: The noun denotes a conspiratorial alliance or treasonous plotting. 'Conspiracy'
    best captures the hostile, coordinated wrongdoing of the prophets in context.
- source_word: נְבִיאֶיהָ
  chosen: her prophets
  lexicon: HALOT
  rationale: Straightforward construct with 3fs suffix referring to the city; 'her
    prophets' preserves the possessive relation.
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  lexicon: HALOT
  rationale: A common idiom for activity occurring within the city/community. 'In
    her midst' preserves the Hebrew idiom and the repeated framing at beginning and
    end of the verse.
- source_word: כַּאֲרִי שׁוֹאֵג טֹרֵף טָרֶף
  chosen: like a roaring lion tearing prey
  alternatives:
  - like a lion roaring, tearing prey
  lexicon: HALOT
  rationale: The simile is vivid and violent. 'Roaring lion' is natural English for
    שׁוֹאֵג, and 'tearing prey' renders the participle plus cognate object without
    unnecessary stiffness.
- source_word: נֶפֶשׁ אָכָלוּ
  chosen: they have devoured lives
  alternatives:
  - they have devoured persons
  - they have devoured souls
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to living persons/lives rather than the immaterial
    soul. 'Devoured lives' keeps the metaphor while avoiding a misleadingly technical
    theological sense of 'souls'.
- source_word: חֹסֶן
  chosen: treasure
  alternatives:
  - wealth
  - riches
  lexicon: HALOT
  rationale: The term denotes material wealth or store of riches. 'Treasure' fits
    the parallel with 'precious things' and the predatory imagery.
- source_word: וִיקָר
  chosen: precious things
  alternatives:
  - valuables
  - honor
  lexicon: HALOT
  rationale: In this context of plunder, the noun most naturally refers to costly
    valuables rather than abstract honor. 'Precious things' preserves the broad sense.
- source_word: יִקָּחוּ
  chosen: they take
  alternatives:
  - they seize
  lexicon: HALOT
  rationale: The imperfect here expresses characteristic action. 'They take' is simple
    and direct; the predatory context already conveys force.
- source_word: אַלְמְנוֹתֶיהָ הִרְבּוּ
  chosen: they have multiplied her widows
  alternatives:
  - they have made many of her women widows
  lexicon: HALOT
  rationale: This idiom means their violence has caused many deaths, leaving many
    widows. The more literal 'multiplied her widows' is intelligible in English and
    preserves the starkness of the Hebrew.
