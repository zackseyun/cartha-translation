id: EZK.22.8
reference: Ezekiel 22:8
source:
  edition: WLC
  text: קָדָשַׁ֖/י בָּזִ֑ית וְ/אֶת שַׁבְּתֹתַ֖/י חִלָּֽלְתְּ־׃
translation:
  text: You have despised my holy things, and you have profaned my Sabbaths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my sanctuaries' / 'my holy places.' The Hebrew can refer more specifically
      to sacred places, but here it is rendered more broadly as 'my holy things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָדָשַׁי
  chosen: my holy things
  alternatives:
  - my sanctuaries
  - my sacred things
  - my holy places
  lexicon: HALOT
  rationale: The plural form with 1cs suffix literally means 'my holy things.' In
    context, Ezekiel often uses holy/sacred things broadly for what belongs to God's
    holiness, not necessarily only the temple building. 'My holy things' preserves
    the breadth better than the narrower 'my sanctuary' or 'my holy places.'
- source_word: בָּזִית
  chosen: you have despised
  alternatives:
  - you have treated with contempt
  - you have scorned
  lexicon: HALOT
  rationale: The verb בזה commonly denotes despising or holding in contempt. 'Despised'
    is concise, natural English and preserves the moral force of the accusation.
- source_word: שַׁבְּתֹתַי
  chosen: my Sabbaths
  alternatives:
  - my sabbath days
  lexicon: HALOT
  rationale: The plural with 1cs suffix is straightforwardly 'my Sabbaths.' Retaining
    'Sabbaths' preserves the covenantal and cultic terminology better than a more
    explanatory paraphrase.
- source_word: חִלָּלְתְּ
  chosen: you have profaned
  alternatives:
  - you have defiled
  - you have desecrated
  lexicon: HALOT
  rationale: The piel of חלל in cultic contexts means to profane or treat as common
    what is holy. 'Profaned' is the most precise English equivalent in this holiness
    context.
