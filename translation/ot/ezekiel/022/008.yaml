theological_decisions:
- issue: Scope of קָדָשַׁי
  chosen_reading: broad reference to God's holy things
  alternative_readings:
  - specific reference to God's sanctuary/temple
  rationale: The Hebrew plural naturally allows a broad collective sense. Rendering
    it as 'my holy things' avoids over-specifying the referent while still fitting
    Ezekiel's temple-holiness context.
  doctrine_reference: Translation philosophy §1, §5
