id: EZK.22.29
reference: Ezekiel 22:29
source:
  edition: WLC
  text: עַ֤ם הָ/אָ֨רֶץ֙ עָ֣שְׁקוּ עֹ֔שֶׁק וְ/גָזְל֖וּ גָּזֵ֑ל וְ/עָנִ֤י וְ/אֶבְיוֹן֙
    הוֹנ֔וּ וְ/אֶת הַ/גֵּ֥ר עָשְׁק֖וּ בְּ/לֹ֥א מִשְׁפָּֽט־׃
translation:
  text: The people of the land have practiced oppression and committed robbery; they
    have mistreated the poor and needy, and they have oppressed the foreigner without
    justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sojourner' or 'the resident alien.' The Hebrew term refers to a
      foreign-born person residing among the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the הארץ/land
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. In Ezekiel this
    refers broadly to the populace of the land, not merely a technical class term.
    'People of the land' preserves the Hebrew expression without overinterpreting
    it as 'common people.'
- source_word: עָשְׁקוּ עֹשֶׁק
  chosen: have practiced oppression
  alternatives:
  - have oppressed with oppression
  - have committed extortion
  lexicon: HALOT
  rationale: The verb-noun cognate intensifies the action. English prefers an idiomatic
    rendering rather than a wooden repetition. 'Practiced oppression' preserves the
    durative/characterizing force better than a single simple verb.
- source_word: וְגָזְלוּ גָּזֵל
  chosen: and committed robbery
  alternatives:
  - and robbed by robbery
  - and seized plunder
  lexicon: HALOT
  rationale: Another verb-noun cognate construction indicating blatant acts of theft.
    'Committed robbery' is natural English and retains the force of criminal taking.
- source_word: וְעָנִי וְאֶבְיוֹן
  chosen: the poor and needy
  alternatives:
  - the afflicted and the needy
  - the poor and destitute
  lexicon: HALOT
  rationale: This common pair denotes socially and economically vulnerable persons.
    'Poor and needy' is idiomatic, clear, and preserves the distinction without unnecessary
    archaism.
- source_word: הוֹנוּ
  chosen: have mistreated
  alternatives:
  - have wronged
  - have defrauded
  - have oppressed
  lexicon: HALOT
  rationale: The Hiphil of ינה/הונה here conveys abusive or exploitative treatment.
    'Mistreated' is broad enough to cover the abuse in context, while avoiding flattening
    it into the same English verb used for עשק later in the verse.
- source_word: הַגֵּר
  chosen: the foreigner
  alternatives:
  - the sojourner
  - the resident alien
  - the stranger
  lexicon: HALOT
  rationale: גר denotes a non-native resident living among Israel. 'Foreigner' is
    readable modern English; 'sojourner' is more traditional but less transparent,
    and 'resident alien' is accurate but bureaucratic.
- source_word: עָשְׁקוּ
  chosen: have oppressed
  alternatives:
  - have exploited
  - have extorted
  lexicon: HALOT
  rationale: Here the simple verbal force is best represented by 'oppressed.' Using
    'oppressed' for this second occurrence helps preserve the lexical link with the
    earlier cognate phrase while still allowing the first phrase to be rendered idiomatically.
- source_word: בְּלֹא מִשְׁפָּט
  chosen: without justice
  alternatives:
  - without legal right
  - without due process
  - unjustly
  lexicon: HALOT
  rationale: משפט here refers to justice in the sense of rightful legal and moral
    order. 'Without justice' is concise and preserves the noun's weight better than
    the adverb 'unjustly.'
