theological_decisions:
- issue: Social-ethical terminology in prophetic indictment
  chosen_reading: Retain concrete categories of injustice without softening them into
    generic wrongdoing.
  alternative_readings:
  - Use broader moral language such as 'did wrong' or 'acted wickedly'
  rationale: The verse specifically condemns oppression, robbery, abuse of the poor,
    and injustice toward the foreigner. The translation preserves these concrete covenantal-ethical
    violations rather than generalizing them.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
