theological_decisions:
- issue: Intercessory and protective imagery in prophetic metaphor
  chosen_reading: Render the verse with both civic-defense imagery ('wall,' 'breach')
    and intercessory language ('before me,' 'on behalf of the land') intact.
  alternative_readings:
  - 'Render more dynamically as purely intercessory: ''someone to intervene/pray for
    the land'''
  - 'Render more formally with repeated ''wall'': ''one walling a wall'''
  rationale: The Hebrew combines literal defensive imagery with representative standing
    before God. Preserving both dimensions avoids flattening the text either into
    mere construction language or mere prayer language, thus maintaining the theological
    tension the source presents.
  doctrine_reference: Translation philosophy §3, §6
- issue: Gender rendering of אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The source is singular masculine and likely representative. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral smoothing unless context
    clearly demands otherwise.
  doctrine_reference: Translation philosophy §4
