id: EZK.22.30
reference: Ezekiel 22:30
source:
  edition: WLC
  text: וָ/אֲבַקֵּ֣שׁ מֵ/הֶ֡ם אִ֣ישׁ גֹּֽדֵר גָּדֵר֩ וְ/עֹמֵ֨ד בַּ/פֶּ֧רֶץ לְ/פָנַ֛/י
    בְּעַ֥ד הָ/אָ֖רֶץ לְ/בִלְתִּ֣י שַׁחֲתָ֑/הּ וְ/לֹ֖א מָצָֽאתִי־׃
translation:
  text: And I sought from among them a man who would build up a wall and stand in
    the breach before me on behalf of the land, so that I would not destroy it, but
    I found none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stand in the gap.' The Hebrew image is of taking one's place in a breach
      in the wall, with the sense of protective intervention.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man.' The singular masculine form may function representatively,
      but the translation preserves the wording of the source.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲבַקֵּשׁ
  chosen: And I sought
  alternatives:
  - And I searched
  - And I looked for
  lexicon: HALOT
  rationale: The verb בקש denotes seeking or looking for. 'Sought' is concise and
    suitably weighty in prophetic discourse; the prefixed conjunction is rendered
    'And' to preserve the narrative-prophetic flow.
- source_word: מֵהֶם
  chosen: from among them
  alternatives:
  - among them
  - from them
  lexicon: HALOT
  rationale: The preposition מן with pronoun indicates selection out of a group. 'From
    among them' makes explicit that the sought person was to be found within the people
    under indictment.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Hebrew אִישׁ is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred where it matches the source. Here 'a man' preserves the
    singular masculine form and representative force.
- source_word: גֹּדֵר גָּדֵר
  chosen: who would build up a wall
  alternatives:
  - repair a wall
  - wall up a wall
  - build a wall
  lexicon: HALOT
  rationale: The participle plus cognate noun literally means 'one fencing/walling
    a wall.' In context of civic defense and metaphorical restoration, the idiom points
    to rebuilding or repairing a protective barrier. 'Build up a wall' preserves the
    imagery without awkward literalism.
- source_word: וְעֹמֵד בַּפֶּרֶץ
  chosen: and stand in the breach
  alternatives:
  - and stand in the gap
  - and stand in the breach in the wall
  lexicon: HALOT
  rationale: The phrase is a well-established military and intercessory image. 'Breach'
    is the more concrete rendering of פֶּרֶץ, while still idiomatic in English. 'Stand
    in the gap' is possible but slightly more interpretive and less tied to the wall
    imagery.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: The phrase indicates standing before God in his presence, likely in intercessory
    representation. 'Before me' is the most direct and natural rendering.
- source_word: בְּעַד הָאָרֶץ
  chosen: on behalf of the land
  alternatives:
  - for the land
  - for the sake of the land
  lexicon: HALOT
  rationale: בְּעַד commonly means 'on behalf of' or 'for the sake of.' 'On behalf
    of the land' best captures the representative/intercessory nuance in context.
- source_word: לְבִלְתִּי שַׁחֲתָהּ
  chosen: so that I would not destroy it
  alternatives:
  - so as not to destroy it
  - to keep me from destroying it
  lexicon: HALOT
  rationale: The construction expresses purpose or intended prevention. The suffix
    refers back to 'the land' (feminine singular). 'So that I would not destroy it'
    communicates the divine intention clearly in natural English.
- source_word: וְלֹא מָצָאתִי
  chosen: but I found none
  alternatives:
  - and I found none
  - but I did not find one
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' English idiom favors 'but'
    to mark the tragic contrast between the search and its failure. 'Found none' succinctly
    conveys the absence of any such man.
