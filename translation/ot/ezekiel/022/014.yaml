theological_decisions:
- issue: Rendering the divine action in אֲנִי עֹשֶׂה אוֹתָךְ
  chosen_reading: when I deal with you
  alternative_readings:
  - when I act against you
  - when I judge you
  rationale: The Hebrew indicates YHWH's direct action upon the addressee in a judgment
    context. 'Deal with you' preserves the severity without importing a narrower judicial
    term not explicitly present in the verb alone.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Prophetic perfect in וְעָשִׂיתִי
  chosen_reading: I will do it
  alternative_readings:
  - and I have done it
  - and I will act
  rationale: In context, the clause functions as a solemn assurance that what the
    LORD has spoken will certainly come to pass. Rendering it as future best communicates
    the Hebrew prophetic usage in readable English.
  doctrine_reference: Translation philosophy §§1, 6
