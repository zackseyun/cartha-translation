id: EZK.22.14
reference: Ezekiel 22:14
source:
  edition: WLC
  text: הֲ/יַעֲמֹ֤ד לִבֵּ/ךְ֙ אִם תֶּחֱזַ֣קְנָה יָדַ֔יִ/ךְ לַ/יָּמִ֕ים אֲשֶׁ֥ר אֲנִ֖י
    עֹשֶׂ֣ה אוֹתָ֑/ךְ אֲנִ֥י יְהוָ֖ה דִּבַּ֥רְתִּי וְ/עָשִֽׂיתִי־׃
translation:
  text: Will your heart endure, or will your hands remain strong, in the days when
    I deal with you? I, the LORD, have spoken, and I will do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Will your heart stand firm, or your hands be strong, in the days when
      I act against you?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיַעֲמֹד
  chosen: endure
  alternatives:
  - stand
  - remain standing
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand,' but in this rhetorical question
    about surviving divine judgment, 'endure' best conveys the idiomatic sense of
    holding up under pressure in natural English.
- source_word: לִבֵּךְ
  chosen: your heart
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the inner self, courage, or resolve. 'Your
    heart' preserves the Hebrew anthropological image and fits the parallel with 'your
    hands.'
- source_word: תֶּחֱזַקְנָה יָדַיִךְ
  chosen: your hands remain strong
  alternatives:
  - your hands be strong
  - your hands hold firm
  lexicon: HALOT
  rationale: The feminine plural verb agrees with 'hands.' The expression is idiomatic
    for strength or capacity to act. 'Remain strong' communicates continued ability
    in the face of coming judgment while preserving the bodily metaphor.
- source_word: לַיָּמִים
  chosen: in the days
  alternatives:
  - for the days
  - when the days come
  lexicon: HALOT
  rationale: The preposition with 'days' is temporal. 'In the days' is a natural and
    sufficiently formal rendering.
- source_word: אֲשֶׁר אֲנִי עֹשֶׂה אוֹתָךְ
  chosen: when I deal with you
  alternatives:
  - that I act against you
  - when I act toward you
  - when I judge you
  lexicon: HALOT
  rationale: Literally, 'which I am doing you' is elliptical in English. In context
    of judgment, the phrase means God taking action against Jerusalem. 'Deal with
    you' is idiomatic and broad enough to avoid over-specifying beyond the Hebrew,
    while still conveying punitive action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  - spoke
  lexicon: HALOT
  rationale: The perfect verb here underscores the certainty of the divine declaration
    already issued. 'Have spoken' preserves that force in contemporary English.
- source_word: וְעָשִׂיתִי
  chosen: I will do it
  alternatives:
  - and I will act
  - and I will accomplish it
  lexicon: HALOT
  rationale: Though formally a perfect with conjunction, in prophetic discourse it
    carries a future/resultative force following the declaration formula. 'I will
    do it' is concise, idiomatic, and reflects the certainty of fulfillment.
