id: EZK.22.9
reference: Ezekiel 22:9
source:
  edition: WLC
  text: אַנְשֵׁ֥י רָכִ֛יל הָ֥יוּ בָ֖/ךְ לְמַ֣עַן שְׁפָךְ דָּ֑ם וְ/אֶל הֶֽ/הָרִים֙
    אָ֣כְלוּ בָ֔/ךְ זִמָּ֖ה עָשׂ֥וּ בְ/תוֹכֵֽ/ךְ־־׃
translation:
  text: Slanderous men were in you in order to shed blood; and on the mountains they
    ate in you; they committed lewdness in your midst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men of slander,' 'talebearers,' or 'informers.' The Hebrew term can
      refer to trafficking in accusations or defamation.
    reason: lexical_alternative
  - marker: b
    text: That is, they participated in illicit meals at the high places, likely associated
      with idolatrous worship.
    reason: cultural_note
  - marker: c
    text: Or 'wickedness' or 'sexual depravity.' The Hebrew term often carries a sense
      of shameless moral outrage, frequently sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי רָכִיל
  chosen: slanderous men
  alternatives:
  - men of slander
  - talebearers
  - informers
  lexicon: HALOT
  rationale: The construct phrase literally means 'men of רכיל.' In context, רכיל
    refers to slander, tale-bearing, or trafficking in accusations, especially as
    it leads to judicial violence. 'Slanderous men' is natural English and preserves
    the moral/juridical force better than the more archaic 'talebearers.'
- source_word: לְמַעַן שְׁפָךְ דָּם
  chosen: in order to shed blood
  alternatives:
  - to shed blood
  - for bloodshed
  lexicon: HALOT
  rationale: לְמַעַן with the infinitive expresses purpose/result. 'In order to shed
    blood' preserves the purposive force and the concrete idiom 'shed blood,' which
    in prophetic literature commonly denotes murderous violence.
- source_word: וְאֶל הֶהָרִים אָכְלוּ
  chosen: and on the mountains they ate
  alternatives:
  - and they ate on the mountains
  - and they ate at the mountain shrines
  lexicon: HALOT
  rationale: The Hebrew is literally 'and to/on the mountains they ate,' an idiom
    for participating in illicit cultic meals at high places. 'On the mountains they
    ate' keeps the Hebrew imagery while remaining intelligible; the cultic implication
    can be clarified in a footnote rather than over-interpreting in the main text.
- source_word: זִמָּה
  chosen: lewdness
  alternatives:
  - wickedness
  - sexual depravity
  - outrage
  lexicon: HALOT
  rationale: זִמָּה often denotes especially shameless sexual misconduct or gross
    moral outrage. In this vice list, 'lewdness' best captures the likely sexual-moral
    force without becoming overly explicit beyond the text.
- source_word: עָשׂוּ בְתוֹכֵךְ
  chosen: they committed ... in your midst
  alternatives:
  - they did ... within you
  - they practiced ... among you
  lexicon: HALOT
  rationale: The verb עשה with an abstract object is idiomatically 'do/commit/practice.'
    'Committed ... in your midst' is idiomatic English and preserves the personified
    address to Jerusalem as feminine singular.
