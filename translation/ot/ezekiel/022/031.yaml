theological_decisions:
- issue: Divine judgment language
  chosen_reading: Retain strong personal language of God's indignation, wrath, and
    retributive justice without softening.
  alternative_readings:
  - Use less personal or less severe terms such as 'displeasure' or 'punishment'
  rationale: The Hebrew explicitly attributes judicial wrath and recompense to God.
    The translation should preserve the gravity of the prophetic judgment rather than
    dilute it.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord the LORD
  - Lord Yahweh
  rationale: The project default is YHWH → 'the LORD.' In the compound אֲדֹנָי יְהוִה,
    however, English convention and readability favor 'Lord GOD' to avoid awkward
    repetition while still signaling the divine name.
  doctrine_reference: 'Contested terms: יְהוָה YHWH | Default English: the LORD'
