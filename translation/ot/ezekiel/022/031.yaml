id: EZK.22.31
reference: Ezekiel 22:31
source:
  edition: WLC
  text: וָ/אֶשְׁפֹּ֤ךְ עֲלֵי/הֶם֙ זַעְמִ֔/י בְּ/אֵ֥שׁ עֶבְרָתִ֖/י כִּלִּיתִ֑י/ם דַּרְכָּ/ם֙
    בְּ/רֹאשָׁ֣/ם נָתַ֔תִּי נְאֻ֖ם אֲדֹנָ֥/י יְהֹוִֽה׃פ
translation:
  text: So I poured out my indignation on them; with the fire of my wrath I consumed
    them. I have put their way on their own heads, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''I have put their way on their heads,'' a prophetic idiom meaning
      that the consequences of their conduct have come back upon them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with the fire of my fury I destroyed them.'
    reason: alternative_reading
  - marker: c
    text: Hebrew אֲדֹנָי יְהוִה, traditionally rendered 'Lord GOD'; elsewhere the
      divine name יְהוָה is rendered 'the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁפֹּךְ
  chosen: I poured out
  alternatives:
  - I poured forth
  lexicon: HALOT
  rationale: שׁפך in the Qal commonly means 'pour out.' In judgment contexts, 'poured
    out' is idiomatic and preserves the metaphor of wrath being emptied onto the people.
- source_word: זַעְמִי
  chosen: my indignation
  alternatives:
  - my anger
  - my fury
  lexicon: HALOT
  rationale: זַעַם denotes indignation or denunciatory wrath. 'Indignation' preserves
    the judicial and moral force better than the more generic 'anger.'
- source_word: בְּאֵשׁ עֶבְרָתִי
  chosen: with the fire of my wrath
  alternatives:
  - in the fire of my fury
  - by the fire of my overflowing rage
  lexicon: HALOT
  rationale: The phrase is metaphorical for destructive judgment. עֶבְרָה often denotes
    overflowing wrath/fury; 'wrath' is concise and weighty. Rendering the preposition
    as 'with' gives natural English while preserving instrumentality.
- source_word: כִּלִּיתִים
  chosen: I consumed them
  alternatives:
  - I destroyed them
  - I brought them to an end
  lexicon: HALOT
  rationale: כלה in the Piel can mean to finish, consume, or destroy. 'Consumed them'
    fits the fire imagery immediately preceding and preserves the metaphorical coherence.
- source_word: דַּרְכָּם
  chosen: their way
  alternatives:
  - their conduct
  - their ways
  lexicon: HALOT
  rationale: דֶּרֶךְ here refers metaphorically to manner of life or conduct. 'Their
    way' keeps the Hebrew singular collective and preserves the common prophetic idiom.
- source_word: בְּרֹאשָׁם נָתַתִּי
  chosen: I have put their way on their own heads
  alternatives:
  - I have brought their conduct down on their heads
  - I repaid their way upon their heads
  lexicon: HALOT
  rationale: 'This idiom expresses retributive justice: the consequences of their
    conduct return upon them. ''Put ... on their own heads'' preserves the Hebrew
    image more directly than a fully interpretive paraphrase.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is standard, readable
    English. אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD'; this also aligns
    with the project's default of rendering YHWH as 'the LORD,' though in this fixed
    compound 'Lord GOD' is the most natural equivalent.
- source_word: יְהוִה
  chosen: GOD
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Within the compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD'
    by rendering YHWH as 'GOD' in small caps. Since plain text cannot show small caps,
    'GOD' signals the underlying divine name while preserving the established distinction.
