id: EZK.22.22
reference: Ezekiel 22:22
source:
  edition: WLC
  text: כְּ/הִתּ֥וּךְ כֶּ֨סֶף֙ בְּ/ת֣וֹךְ כּ֔וּר כֵּ֖ן תֻּתְּכ֣וּ בְ/תוֹכָ֑/הּ וִֽ/ידַעְתֶּם֙
    כִּֽי אֲנִ֣י יְהוָ֔ה שָׁפַ֥כְתִּי חֲמָתִ֖/י עֲלֵי/כֶֽם־׃פ
translation:
  text: As silver is melted in the midst of a furnace, so you will be melted in the
    midst of it; and you will know that I, the LORD, have poured out my wrath on you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inside it'; the pronoun refers to the city (Jerusalem) in the immediate
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּהִתּוּךְ
  chosen: As ... is melted
  alternatives:
  - As ... is smelted
  - Like the melting of
  lexicon: HALOT
  rationale: 'The noun with prefixed כ functions comparatively: ''as/like the melting
    of.'' In idiomatic English, ''As silver is melted'' best conveys the simile while
    preserving the passive sense.'
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard rendering for the metal; the refining image depends on literal
    silver.
- source_word: בְּתוֹךְ כּוּר
  chosen: in the midst of a furnace
  alternatives:
  - inside a furnace
  - in a smelting furnace
  lexicon: HALOT
  rationale: כּוּר denotes a furnace/smelting furnace. 'In the midst of a furnace'
    preserves the repeated בְּתוֹךְ imagery and the enclosed setting of judgment.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: 'Standard correlative with the opening comparison: ''As ... so ...''.'
- source_word: תֻּתְּכוּ
  chosen: you will be melted
  alternatives:
  - you will be smelted
  - you will be liquefied
  lexicon: HALOT
  rationale: Passive verbal form matching the refining metaphor. 'Melted' is natural
    English and keeps the judgment image without overtechnical wording.
- source_word: בְתוֹכָהּ
  chosen: in the midst of it
  alternatives:
  - inside it
  - within it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to Jerusalem/city from the prior
    context. 'In the midst of it' preserves the Hebrew wording while allowing the
    antecedent to remain implicit as in the source.
- source_word: וִידַעְתֶּם
  chosen: and you will know
  alternatives:
  - then you will know
  lexicon: HALOT
  rationale: Common Ezekiel formula of recognition. Simple future fits the sequence;
    'then' is interpretive and not required.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: שָׁפַכְתִּי
  chosen: have poured out
  alternatives:
  - poured out
  lexicon: HALOT
  rationale: The perfect can be rendered as a completed action with present relevance
    after 'you will know that.' 'Have poured out' reads naturally in English and highlights
    the accomplished act of judgment.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning wrath/fury. 'Wrath' is weighty, idiomatic,
    and suitable for prophetic judgment language.
- source_word: עֲלֵיכֶם
  chosen: on you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: Direct and natural English for the preposition עַל in this judgment context.
