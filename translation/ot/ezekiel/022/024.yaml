id: EZK.22.24
reference: Ezekiel 22:24
source:
  edition: WLC
  text: בֶּן אָדָ֕ם אֱמָר לָ֕/הּ אַ֣תְּ אֶ֔רֶץ לֹ֥א מְטֹהָרָ֖ה הִ֑יא לֹ֥א גֻשְׁמָ֖/הּ
    בְּ/י֥וֹם זָֽעַם־־׃
translation:
  text: Son of man, say to her, ‘You are a land not cleansed, not rained on in the
    day of indignation.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'not purified.' The Hebrew participle can denote a state of uncleanness
      or not having been cleansed.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression is rare and may also be understood as 'without rain'
      or 'not showered upon' in the day of wrath.
    reason: lexical_alternative
  - marker: c
    text: Or, 'in the day of wrath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional prophetic address in Ezekiel. The Hebrew is singular and
    idiomatic; 'Son of man' preserves the form and register better than more interpretive
    alternatives.
- source_word: אֱמָר לָהּ
  chosen: say to her
  alternatives:
  - tell her
  lexicon: HALOT
  rationale: Direct imperative plus preposition and pronominal suffix. 'Say to her'
    is the more formally transparent rendering.
- source_word: אַתְּ אֶרֶץ
  chosen: You are a land
  alternatives:
  - You are land
  - You are the land
  lexicon: HALOT
  rationale: The independent pronoun plus noun identifies the addressee metaphorically
    as the land. Supplying 'are' is required in English. The anarthrous noun does
    not require 'the' here.
- source_word: לֹא מְטֹהָרָה
  chosen: not cleansed
  alternatives:
  - uncleansed
  - not purified
  - not clean
  lexicon: HALOT
  rationale: The passive participial form from טהר indicates a state of not having
    been made clean/pure. 'Not cleansed' preserves the passive nuance and likely moral-ritual
    force better than the flatter 'not clean.'
- source_word: לֹא גֻשְׁמָהּ
  chosen: not rained on
  alternatives:
  - without rain
  - not showered upon
  - not washed by rain
  lexicon: HALOT
  rationale: The rare form from גשם is best taken in relation to rain/showers. 'Not
    rained on' is concise and preserves the passive sense. Because the Hebrew is unusual
    and has been understood differently, alternatives are preserved in a footnote.
- source_word: בְּיוֹם זָעַם
  chosen: in the day of indignation
  alternatives:
  - on the day of wrath
  - in the day of anger
  lexicon: HALOT
  rationale: זעם denotes wrath/indignation. 'Indignation' fits prophetic judgment
    diction while remaining readable. 'Day of indignation' preserves the genitival
    force without overinterpreting whose wrath is in view, though context implies
    divine judgment.
