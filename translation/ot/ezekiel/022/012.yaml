id: EZK.22.12
reference: Ezekiel 22:12
source:
  edition: WLC
  text: שֹׁ֥חַד לָֽקְחוּ בָ֖/ךְ לְמַ֣עַן שְׁפָךְ דָּ֑ם נֶ֧שֶׁךְ וְ/תַרְבִּ֣ית לָקַ֗חַתְּ וַ/תְּבַצְּעִ֤י רֵעַ֨יִ/ךְ֙ בַּ/עֹ֔שֶׁק וְ/אֹתִ֣/י שָׁכַ֔חַתְּ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: In you they have taken bribes to shed blood; you have taken interest and profit, and you have extorted your neighbors by oppression, and you have forgotten me, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''usury and increase.'' The Hebrew uses two related terms for profit from lending: ''interest'' (נֶשֶׁךְ) and ''profit/increase'' (תַרְבִּית).'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁחַד
  chosen: bribes
  alternatives:
  - a bribe
  - payoff
  lexicon: HALOT
  rationale: 'The noun denotes a bribe. Plural English fits the generic/collective sense in context: the city''s inhabitants are characterized by repeated acts of bribery.'
- source_word: לָקְחוּ בָךְ
  chosen: In you they have taken
  alternatives:
  - They have taken in you
  - Among you they have taken
  lexicon: HALOT
  rationale: The 3cp verb with בָךְ (2fs, addressing Jerusalem) is best rendered idiomatically as 'In you they have taken,' meaning 'within you/among your people.' This preserves the personified-city address.
- source_word: לְמַעַן שְׁפָךְ דָּם
  chosen: to shed blood
  alternatives:
  - for the sake of shedding blood
  - to pour out blood
  lexicon: HALOT
  rationale: 'This infinitive construction expresses purpose/result: bribes are taken with the aim of bloodshed, likely judicial murder or violence. ''Shed blood'' is the natural English equivalent and preserves the moral gravity.'
- source_word: נֶשֶׁךְ
  chosen: interest
  alternatives:
  - usury
  lexicon: HALOT
  rationale: The term refers to interest on a loan, often condemned in exploitative contexts. 'Interest' is clearer modern English; 'usury' is possible but can imply only excessive interest in modern usage.
- source_word: תַרְבִּית
  chosen: profit
  alternatives:
  - increase
  - excess interest
  lexicon: HALOT
  rationale: Paired with נֶשֶׁךְ, the word denotes gain/increase from lending. 'Profit' communicates illicit financial gain in readable English, while the pairing with 'interest' preserves the two-term Hebrew expression.
- source_word: לָקַחַתְּ
  chosen: you have taken
  alternatives:
  - you took
  lexicon: HALOT
  rationale: The qatal 2fs continues the accusation against personified Jerusalem. Present perfect English suits the prophetic indictment of completed characteristic actions.
- source_word: וַתְּבַצְּעִי
  chosen: you have extorted
  alternatives:
  - you have exploited
  - you have made unjust gain from
  - you have plundered
  lexicon: HALOT
  rationale: From בצע in this context of unjust gain, the sense is greedy exploitation for profit. 'Extorted' best captures wrongful gain extracted from others and fits the following phrase 'by oppression.'
- source_word: רֵעַיִךְ
  chosen: your neighbors
  alternatives:
  - your companions
  - your associates
  lexicon: HALOT
  rationale: The plural construct with 2fs suffix refers to fellow members of the community. 'Neighbors' fits prophetic ethical language and communicates social proximity better than the more formal 'companions.'
- source_word: בָּעֹשֶׁק
  chosen: by oppression
  alternatives:
  - through oppression
  - with extortion
  lexicon: HALOT
  rationale: The noun denotes oppression, fraud, or unjust exaction. 'By oppression' is concise and preserves the instrumental sense of the preposition.
- source_word: וְאֹתִי שָׁכַחַתְּ
  chosen: and you have forgotten me
  alternatives:
  - and me you forgot
  lexicon: HALOT
  rationale: The clause climactically identifies covenantal forgetfulness of God as the root offense. Straightforward English preserves the emphasis without overinterpreting.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is idiomatic in English prophetic style. אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD'; this also follows the doctrine default of rendering YHWH as 'the LORD' rather than transliterating it.
