id: EZK.22.28
reference: Ezekiel 22:28
source:
  edition: WLC
  text: וּ/נְבִיאֶ֗י/הָ טָח֤וּ לָ/הֶם֙ תָּפֵ֔ל חֹזִ֣ים שָׁ֔וְא וְ/קֹסְמִ֥ים לָ/הֶ֖ם
    כָּזָ֑ב אֹמְרִ֗ים כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה וַֽ/יהוָ֖ה לֹ֥א דִבֵּֽר׃
translation:
  text: And her prophets have plastered over for them with whitewash, seeing falsehood
    and divining lies for them, saying, ‘Thus says the Lord GOD,’ when the LORD has
    not spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with untempered mortar” or “with flimsy plaster.” The Hebrew image is
      of a deceptive coating that hides defects.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “the Lord GOD” (אֲדֹנָי יְהוִה); elsewhere the divine name יְהוָה
      is rendered “the LORD.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְבִיאֶיהָ
  chosen: And her prophets
  alternatives:
  - And the prophets of her
  lexicon: HALOT
  rationale: Construct plural with 3fs suffix refers to the city's prophets; 'her
    prophets' is the most natural English rendering in context.
- source_word: טָחוּ
  chosen: have plastered over
  alternatives:
  - have smeared
  - have coated
  lexicon: HALOT
  rationale: The verb literally denotes plastering/smearing a surface. 'Have plastered
    over' preserves the building metaphor and fits Ezekiel's repeated imagery of deceptive
    wall-coating.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition here marks advantage/reference; 'for them' fits the sense
    that the prophets act on behalf of the corrupt leaders/people.
- source_word: תָּפֵל
  chosen: with whitewash
  alternatives:
  - with untempered mortar
  - with flimsy plaster
  lexicon: HALOT
  rationale: In Ezekiel this noun refers to a superficial coating used in the wall
    metaphor. 'Whitewash' is clear modern English and preserves the image of covering
    defects deceptively. Traditional 'untempered mortar' is less transparent and likely
    reflects translation tradition more than plain sense.
- source_word: חֹזִים שָׁוְא
  chosen: seeing falsehood
  alternatives:
  - seeing vanity
  - seeing what is false
  lexicon: HALOT
  rationale: Participial phrase describing prophetic activity. 'Falsehood' captures
    שָׁוְא as emptiness/deception in prophetic context.
- source_word: וְקֹסְמִים לָהֶם כָּזָב
  chosen: and divining lies for them
  alternatives:
  - and practicing divination of lies for them
  - and divining falsehood for them
  lexicon: HALOT
  rationale: קֹסְמִים is specifically divinatory activity, not generic prophecy. 'Divining
    lies' is concise and preserves the illicit, deceptive sense.
- source_word: אֹמְרִים
  chosen: saying
  alternatives:
  - while saying
  lexicon: HALOT
  rationale: Simple participle of attendant speech introducing the quoted formula.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves recognizable
    prophetic cadence without undue archaism.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  lexicon: HALOT
  rationale: Following project doctrine, יְהוָה is rendered 'the LORD.' In the compound
    title אֲדֹנָי יְהוִה, English convention 'the Lord GOD' avoids the awkward 'Lord
    LORD' while signaling the divine name.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' preserving
    reverential convention and consistency.
- source_word: לֹא דִבֵּר
  chosen: has not spoken
  alternatives:
  - did not speak
  lexicon: HALOT
  rationale: 'The perfect can be rendered as present perfect in English to stress
    the current invalidity of their claim: they say God has spoken when in fact he
    has not.'
