theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD / the Lord GOD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default for YHWH. In
    the compound אֲדֹנָי יְהוִה, 'the Lord GOD' is used to avoid 'Lord LORD' while
    still distinguishing the title-plus-name construction.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Metaphorical rendering of תָּפֵל in Ezekiel's wall imagery
  chosen_reading: whitewash
  alternative_readings:
  - untempered mortar
  - flimsy plaster
  rationale: The verse participates in Ezekiel's broader metaphor of deceptive coating
    over structural corruption. 'Whitewash' communicates superficial concealment clearly
    in modern English without importing extra doctrinal meaning.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
