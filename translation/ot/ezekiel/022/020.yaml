id: EZK.22.20
reference: Ezekiel 22:20
source:
  edition: WLC
  text: קְבֻ֣צַת כֶּ֡סֶף וּ֠/נְחֹשֶׁת וּ/בַרְזֶ֨ל וְ/עוֹפֶ֤רֶת וּ/בְדִיל֙ אֶל תּ֣וֹךְ
    כּ֔וּר לָ/פַֽחַת עָלָ֥י/ו אֵ֖שׁ לְ/הַנְתִּ֑יךְ כֵּ֤ן אֶקְבֹּץ֙ בְּ/אַפִּ֣/י וּ/בַ/חֲמָתִ֔/י
    וְ/הִנַּחְתִּ֥י וְ/הִתַּכְתִּ֖י אֶתְ/כֶֽם־־׃
translation:
  text: As one gathers silver and bronze and iron and lead and tin into the midst
    of a furnace, to blow fire on it in order to melt it, so I will gather you in
    my anger and in my wrath, and I will place you there and melt you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze' (נְחֹשֶׁת).
    reason: lexical_alternative
  - marker: b
    text: The final verb continues the furnace metaphor and can also be rendered 'smelt
      you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְבֻצַת
  chosen: As one gathers
  alternatives:
  - The gathering of
  - Like the gathering of
  lexicon: HALOT
  rationale: The noun from קבץ functions idiomatically/comparatively here with כֵּן
    later, introducing the smelting analogy. English needs a verbal expression for
    natural sense. 'As one gathers' captures the comparative force without over-literal
    awkwardness.
- source_word: כֶּסֶף
  chosen: silver
  lexicon: HALOT
  rationale: Standard metal term; literal in the smelting image.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: In biblical metal lists this term often denotes bronze rather than pure
    copper in English translation tradition and likely referent. 'Copper' is possible,
    but 'bronze' fits the alloyed-metals smelting context and common OT usage.
- source_word: בַרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: עוֹפֶרֶת
  chosen: lead
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: בְדִיל
  chosen: tin
  alternatives:
  - alloy
  lexicon: HALOT
  rationale: Most likely 'tin' in a metals list. Some broader metallurgical nuance
    is possible, but 'tin' is the clearest direct rendering.
- source_word: אֶל תּוֹךְ כּוּר
  chosen: into the midst of a furnace
  alternatives:
  - into a furnace
  - into the middle of a smelting furnace
  lexicon: HALOT
  rationale: תּוֹךְ adds the sense of interior/midst; כּוּר is a smelting furnace.
    'Into the midst of a furnace' preserves the vividness while remaining readable.
- source_word: לָפַחַת עָלָיו אֵשׁ
  chosen: to blow fire on it
  alternatives:
  - to blow on it with fire
  - to fan the fire against it
  lexicon: HALOT
  rationale: The infinitive of נפח means to blow/blast; with עָלָיו and אֵשׁ the sense
    is forcing/blowing fire onto the metal mass in the furnace. 'On it' is the most
    natural English representation.
- source_word: לְהַנְתִּיךְ
  chosen: in order to melt it
  alternatives:
  - to smelt it
  - to liquefy it
  lexicon: HALOT
  rationale: From נתך in the causative, here meaning to melt/smelt. 'Melt it' is clearer
    modern English and matches the image.
- source_word: כֵּן אֶקְבֹּץ
  chosen: so I will gather you
  alternatives:
  - thus I will gather
  - so I will assemble
  lexicon: HALOT
  rationale: Maintains the comparison established by כֵּן and the repeated root קבץ.
    'Gather' preserves lexical consistency with the opening image.
- source_word: בְּאַפִּי וּבַחֲמָתִי
  chosen: in my anger and in my wrath
  alternatives:
  - in my nose and in my fury
  - in my anger and in my fury
  lexicon: HALOT
  rationale: אַפִּי is idiomatically 'my anger' (lit. nose), and חֵמָה/חֲמָה intensifies
    as wrath/fury. Rendering both distinctly preserves the Hebrew piling up of divine
    indignation.
- source_word: וְהִנַּחְתִּי
  chosen: and I will place you there
  alternatives:
  - and I will set you down
  - and I will leave you
  lexicon: HALOT
  rationale: 'From נוח in Hiphil, likely ''set/place'' in context: God gathers them
    into the furnace-like setting and positions them there for judgment. ''Leave you''
    is possible but weaker in the sequence.'
- source_word: וְהִתַּכְתִּי אֶתְכֶם
  chosen: and melt you
  alternatives:
  - and smelt you
  - and pour you out
  lexicon: HALOT
  rationale: Again from נתך, here continuing the furnace metaphor. 'Melt you' is the
    most direct and comprehensible rendering; 'smelt' is possible but less natural
    for modern readers.
