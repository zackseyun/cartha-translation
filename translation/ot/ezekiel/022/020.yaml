theological_decisions:
- issue: Rendering the judgment metaphor without softening its force
  chosen_reading: 'Retain the furnace/smelting imagery as a depiction of divine judgment:
    ''I will gather you... and melt you.'''
  alternative_readings:
  - Interpret more abstractly as 'refine you'
  - Soften to 'test you'
  rationale: The immediate context is punitive judgment on Jerusalem, not a primarily
    purifying refinement motif. The Hebrew imagery is severe and should remain severe
    in English.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
