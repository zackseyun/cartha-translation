theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - Lord YHWH
  - the Lord, the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make explicit that 'her time' is a time of judgment
  chosen_reading: her time may come
  alternative_readings:
  - her time of judgment may come
  - her end may come
  rationale: The context clearly implies judgment, but the Hebrew says only 'her time.' To preserve theological tension and avoid importing more than the text states, the main text leaves it implicit.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
