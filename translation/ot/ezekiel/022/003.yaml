id: EZK.22.3
reference: Ezekiel 22:3
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֗ כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה עִ֣יר שֹׁפֶ֥כֶת דָּ֛ם בְּ/תוֹכָ֖/הּ לָ/ב֣וֹא עִתָּ֑/הּ וְ/עָשְׂתָ֧ה גִלּוּלִ֛ים עָלֶ֖י/הָ לְ/טָמְאָֽה׃
translation:
  text: 'And say, ‘Thus says the Lord GOD: A city shedding blood in her midst, so that her time may come, and making idols against herself to defile herself!’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for her time to come'; the phrase implies the city's appointed time of judgment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word for 'idols' is contemptuous and can carry the sense of 'filthy idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - Lord YHWH
  - the Lord, the LORD
  lexicon: HALOT
  rationale: The compound divine title is conventionally distinguished in English as 'Lord GOD' when אֲדֹנָי precedes the divine name. This also respects the doctrine default of rendering YHWH as 'the LORD,' while avoiding the awkward 'Lord LORD.' Capitalizing GOD signals the underlying divine name.
- source_word: עִיר
  chosen: city
  alternatives:
  - city
  - town
  lexicon: HALOT
  rationale: Standard rendering for an urban center; 'city' fits prophetic address to Jerusalem.
- source_word: שֹׁפֶכֶת דָּם
  chosen: that sheds blood
  alternatives:
  - shedding blood
  - that pours out blood
  - that spills blood
  lexicon: HALOT
  rationale: The participle plus object denotes ongoing bloodshed or bloodguilt. 'Sheds blood' is idiomatic and preserves the moral/judicial force better than a more literal but less natural 'pours out blood.'
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the midst of her
  lexicon: HALOT
  rationale: The feminine pronominal suffix refers to the city. 'In her midst' preserves the personified feminine city imagery common in prophetic literature.
- source_word: לָבוֹא עִתָּהּ
  chosen: so that her time may come
  alternatives:
  - to bring her time
  - for her time to come
  - until her time comes
  lexicon: HALOT
  rationale: 'The infinitive construct with ל expresses result or purpose tied to the bloodshed: the city''s appointed time of judgment is coming. ''So that her time may come'' preserves the Hebrew linkage without over-interpreting the exact nuance.'
- source_word: וְעָשְׂתָה גִלּוּלִים
  chosen: and that makes idols
  alternatives:
  - and has made idols
  - and that fashions idols
  - and made filthy idols
  lexicon: HALOT
  rationale: גִלּוּלִים is a strongly pejorative term for idols, but in readable modern English 'idols' carries the core referent. The finite verb with waw continues the description of the city. The pejorative force is not fully reproduced lexically, so it is carried by the context of defilement.
- source_word: גִלּוּלִים
  chosen: idols
  alternatives:
  - dung-idols
  - filthy idols
  - images
  lexicon: HALOT
  rationale: The term is contemptuous in Hebrew. 'Idols' is the clearest main-text rendering; more pejorative alternatives are possible but risk sounding interpretive or unnatural in English. The contemptuous nuance is noted here.
- source_word: עָלֶיהָ
  chosen: against herself
  alternatives:
  - upon herself
  - for herself
  - against her
  lexicon: HALOT
  rationale: 'In context the preposition likely conveys harmful effect directed back on the city herself: the idols are made to her own detriment. ''Against herself'' best captures the reflexive/self-destructive sense.'
- source_word: לְטָמְאָה
  chosen: to defile herself
  alternatives:
  - for her defilement
  - to become unclean
  - to make herself unclean
  lexicon: HALOT
  rationale: The infinitive expresses result or purpose. 'To defile herself' is natural English and preserves the reflexive moral-ritual sense of becoming unclean through idolatry.
