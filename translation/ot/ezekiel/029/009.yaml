id: EZK.29.9
reference: Ezekiel 29:9
source:
  edition: WLC
  text: וְ/הָיְתָ֤ה אֶֽרֶץ מִצְרַ֨יִם֙ לִ/שְׁמָמָ֣ה וְ/חָרְבָּ֔ה וְ/יָדְע֖וּ כִּֽי
    אֲנִ֣י יְהוָ֑ה יַ֧עַן אָמַ֛ר יְאֹ֥ר לִ֖/י וַ/אֲנִ֥י עָשִֽׂיתִי־־׃
translation:
  text: And the land of Egypt will become a desolation and a waste, and they will
    know that I am the LORD, because he said, ‘The Nile is mine, and I made it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the river is mine''; in the context of Egypt, ''river'' refers
      specifically to the Nile.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future/result sense. 'Will become' brings out the transition into the
    stated condition more naturally in English than a simple stative 'will be.'
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Retains the concrete territorial sense of אֶרֶץ while remaining idiomatic.
    The phrase refers to the country/land, not merely the political entity in abstraction.
- source_word: לִשְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - an appalling waste
  lexicon: HALOT
  rationale: שְׁמָמָה denotes devastation/desolation as a resulting state. The noun
    is preserved with an English noun phrase rather than flattened into an adjective.
- source_word: וְחָרְבָּה
  chosen: and a waste
  alternatives:
  - and ruins
  - and a ruin
  lexicon: HALOT
  rationale: Paired with שְׁמָמָה, this noun intensifies the picture of devastation.
    'Waste' preserves the semantic overlap without awkward repetition; 'ruins' is
    possible but slightly more concrete than the Hebrew requires.
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - then they will know
  lexicon: HALOT
  rationale: Standard Ezekiel recognition formula. The subject is left implicit in
    Hebrew; English keeps the plural 'they' to reflect the unspecified inhabitants/observers
    rather than over-specifying.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving covenantal force in standard English Bible style.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of the fact that
  lexicon: HALOT
  rationale: Introduces the reason for judgment. 'Because' is the clearest modern
    English equivalent.
- source_word: יְאֹר
  chosen: The Nile
  alternatives:
  - the river
  - the Nile River
  lexicon: HALOT
  rationale: In Egyptian contexts יְאֹר commonly refers specifically to the Nile.
    Using 'The Nile' makes the referent explicit for English readers and fits the
    context of Egypt.
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  lexicon: HALOT
  rationale: Possessive predicate in direct speech. 'Is mine' is concise and preserves
    the arrogant claim of ownership.
- source_word: וַאֲנִי עָשִׂיתִי
  chosen: and I made it
  alternatives:
  - and I myself made it
  - and I created it
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis; English can convey this adequately
    without overloading the sentence. 'Made' is preferable to 'created' here because
    עשה is the ordinary verb and the speaker's boast is about having produced or fashioned
    the Nile.
