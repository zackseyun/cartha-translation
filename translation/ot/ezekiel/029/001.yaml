id: EZK.29.1
reference: Ezekiel 29:1
source:
  edition: WLC
  text: בַּ/שָּׁנָה֙ הָ/עֲשִׂירִ֔ית בָּ/עֲשִׂרִ֕י בִּ/שְׁנֵ֥ים עָשָׂ֖ר לַ/חֹ֑דֶשׁ
    הָיָ֥ה דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: In the tenth year, in the tenth month, on the twelfth day of the month, the
    word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the word of YHWH.'' Main text renders the divine name as ''the
      LORD'' per project style; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בַּשָּׁנָה הָעֲשִׂירִית
  chosen: In the tenth year
  alternatives:
  - In the tenth year of [the exile/reign]
  lexicon: HALOT
  rationale: The Hebrew gives a date formula with the preposition ב plus 'year' and
    the ordinal 'tenth.' No explicit reference point is stated in this verse, so the
    translation preserves the formal dating expression without supplying an interpretive
    anchor.
- source_word: בָּעֲשִׂרִי
  chosen: in the tenth month
  alternatives:
  - in the tenth
  lexicon: HALOT
  rationale: Although 'month' is not repeated here, it is implied by Hebrew date-formula
    usage and clarified by the later לַחֹדֶשׁ. English requires the noun for natural
    sense, so 'month' is supplied.
- source_word: בִּשְׁנֵים עָשָׂר לַחֹדֶשׁ
  chosen: on the twelfth day of the month
  alternatives:
  - on the twelfth of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew way of specifying the day within the month.
    'Day' is implicit but necessary in English; 'of the month' keeps the formal structure
    clear.
- source_word: הָיָה דְבַר יְהוָה
  chosen: the word of the LORD came
  alternatives:
  - the word of the LORD was
  - the word of the LORD happened
  lexicon: HALOT
  rationale: This is a common prophetic formula. While הָיָה is literally 'was,' idiomatic
    English for this revelatory formula is 'came,' which best conveys the onset of
    divine speech without paraphrasing beyond the established sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding biblical English
    convention.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix straightforwardly indicates
    direction toward the prophet. 'To me' is clear modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in the next
    verse. 'Saying,' is the standard and sufficiently transparent rendering.
