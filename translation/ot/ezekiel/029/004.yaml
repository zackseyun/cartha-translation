id: EZK.29.4
reference: Ezekiel 29:4
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י חחיים בִּ/לְחָיֶ֔י/ךָ וְ/הִדְבַּקְתִּ֥י דְגַת יְאֹרֶ֖י/ךָ בְּ/קַשְׂקְשֹׂתֶ֑י/ךָ
    וְ/הַעֲלִיתִ֨י/ךָ֙ מִ/תּ֣וֹךְ יְאֹרֶ֔י/ךָ וְ/אֵת֙ כָּל דְּגַ֣ת יְאֹרֶ֔י/ךָ בְּ/קַשְׂקְשֹׂתֶ֖י/ךָ
    תִּדְבָּֽק־־׃
translation:
  text: I will put hooks in your jaws, and I will make the fish of your Nile channels
    cling to your scales; and I will bring you up from the midst of your Nile channels,
    and all the fish of your Nile channels will cling to your scales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your rivers' or 'your canals'; the Hebrew term refers in Egypt contexts
      to the Nile and its waterways.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your cheeks.' The Hebrew word can mean 'jaw' or 'cheek'; 'jaws' fits
      the river-creature imagery here.
    reason: lexical_alternative
lexical_decisions:
- source_word: חחיים
  chosen: hooks
  alternatives:
  - hooks and barbs
  - thorns
  lexicon: HALOT
  rationale: The noun refers to implements placed in the jaws to seize or drag a creature.
    In this judgment image against Pharaoh as a crocodile/monster, 'hooks' is the
    most natural English rendering and matches the extraction imagery of the verse.
- source_word: בִּלְחָיֶיךָ
  chosen: in your jaws
  alternatives:
  - in your cheeks
  lexicon: HALOT
  rationale: לְחִי can denote jaw/cheek. Here, with hooks inserted into a great river
    creature, 'jaws' better fits the animal imagery and the act of capture.
- source_word: וְהִדְבַּקְתִּי
  chosen: I will make ... cling
  alternatives:
  - I will cause ... to stick
  - I will fasten
  lexicon: HALOT
  rationale: 'The Hiphil of דבק is causative: God causes the fish to adhere to Pharaoh''s
    scales. ''Make ... cling'' is idiomatic and preserves the causative force.'
- source_word: דְגַת
  chosen: the fish of
  alternatives:
  - the fish
  lexicon: HALOT
  rationale: 'Construct form with the following noun: ''the fish of your Nile channels.''
    Singular collective in Hebrew is best rendered as an English collective plural.'
- source_word: יְאֹרֶיךָ
  chosen: your Nile channels
  alternatives:
  - your rivers
  - your canals
  - your Nile streams
  lexicon: HALOT
  rationale: יְאֹר in Ezekiel's Egypt oracles refers specifically to the Nile and
    its waterways, not generic rivers. 'Nile channels' preserves the Egyptian setting
    and the plural form here.
- source_word: בְּקַשְׂקְשֹׂתֶיךָ
  chosen: to your scales
  alternatives:
  - on your scales
  - in your scales
  lexicon: HALOT
  rationale: The preposition with דבק expresses attachment. 'To your scales' is natural
    English with 'cling,' while preserving the image of fish stuck to the crocodile/monster's
    scales.
- source_word: וְהַעֲלִיתִיךָ
  chosen: I will bring you up
  alternatives:
  - I will pull you up
  - I will lift you up
  lexicon: HALOT
  rationale: The Hiphil of עלה means to cause to go up. 'Bring you up' is broad enough
    to preserve the imagery of hauling Pharaoh from the water without over-specifying
    the mechanism.
- source_word: מִתּוֹךְ
  chosen: from the midst of
  alternatives:
  - out of
  - from among
  lexicon: HALOT
  rationale: The phrase emphasizes extraction from within the Nile waters. 'From the
    midst of' is slightly more formal but preserves the force of the Hebrew.
- source_word: תִּדְבָּק
  chosen: will cling
  alternatives:
  - will stick
  - will be attached
  lexicon: HALOT
  rationale: Qal imperfect feminine singular agrees with the collective noun 'fish'
    construed as a collective entity, or distributively with the fish-group. English
    plural collective 'all the fish ... will cling' communicates the sense naturally.
