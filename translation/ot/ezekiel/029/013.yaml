id: EZK.29.13
reference: Ezekiel 29:13
source:
  edition: WLC
  text: כִּ֛י כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה מִ/קֵּ֞ץ אַרְבָּעִ֤ים שָׁנָה֙ אֲקַבֵּ֣ץ
    אֶת מִצְרַ֔יִם מִן הָ/עַמִּ֖ים אֲשֶׁר נָפֹ֥צוּ שָֽׁמָּ/ה־־־׃
translation:
  text: 'For thus says the Lord GOD: At the end of forty years I will gather Egypt
    from the peoples where they were scattered.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from the peoples'; alternatively, 'from the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the divine explanation or ground for the preceding judgment
    statement; 'for' best preserves the connective force in context.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' is idiomatic, recognizable,
    and suitably formal without being archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' per doctrine, but in the
    compound title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by rendering
    'Lord GOD.' This preserves both elements of the Hebrew title while following established
    reverential practice.
- source_word: מִקֵּץ
  chosen: At the end of
  alternatives:
  - After
  - From the end of
  lexicon: HALOT
  rationale: The preposition with קֵץ marks the conclusion of a period. 'At the end
    of' is more precise than the looser 'after,' while remaining natural English.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward temporal expression; no reason to paraphrase.
- source_word: אֲקַבֵּץ
  chosen: I will gather
  alternatives:
  - I will collect
  - I will bring together
  lexicon: HALOT
  rationale: קבץ commonly denotes gathering people back together, often with restoration
    overtones. 'Gather' is the most direct and biblically consistent rendering.
- source_word: אֶת מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: The object is the nation as a corporate entity, not merely individual
    Egyptians. 'Egypt' best reflects the Hebrew proper noun used metonymically for
    the people/land.
- source_word: מִן הָעַמִּים
  chosen: from the peoples
  alternatives:
  - from the nations
  lexicon: HALOT
  rationale: עַמִּים is literally 'peoples.' While 'nations' is possible, 'peoples'
    more closely matches the Hebrew plural and avoids over-specifying political structure.
- source_word: אֲשֶׁר נָפֹצוּ שָׁמָּה
  chosen: where they were scattered
  alternatives:
  - among whom they were scattered there
  - to which they were scattered
  lexicon: HALOT
  rationale: The clause refers to the peoples/lands among which Egypt had been dispersed.
    English idiom is best served by 'where they were scattered,' which captures the
    passive/dispersed sense of נפצו and the locative force of שָׁמָּה.
