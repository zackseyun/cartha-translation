theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies יְהוָה → 'the LORD.' In this fixed Hebrew
    combination, however, English style normally renders אֲדֹנָי יְהוִה as 'the Lord
    GOD' to avoid the awkward 'Lord LORD' while still signaling the covenant name/title
    combination.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
