id: EZK.29.18
reference: Ezekiel 29:18
source:
  edition: WLC
  text: בֶּן אָדָ֗ם נְבוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּ֠בֶל הֶעֱבִ֨יד אֶת חֵיל֜/וֹ עֲבֹדָ֤ה
    גְדֹלָה֙ אֶל צֹ֔ר כָּל רֹ֣אשׁ מֻקְרָ֔ח וְ/כָל כָּתֵ֖ף מְרוּטָ֑ה וְ֠/שָׂכָר לֹא
    הָ֨יָה ל֤/וֹ וּ/לְ/חֵיל/וֹ֙ מִ/צֹּ֔ר עַל הָ/עֲבֹדָ֖ה אֲשֶׁר עָבַ֥ד עָלֶֽי/הָ־־־־־־־־־׃ס
translation:
  text: Son of man, Nebuchadnezzar king of Babylon made his army labor hard against
    Tyre; every head was made bald and every shoulder was rubbed bare, yet there was
    no pay for him or for his army from Tyre for the labor that he had performed against
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mortal' for 'Son of man,' a common address to Ezekiel; the Hebrew is
      literally 'son of man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'great labor' or 'hard service.'
    reason: lexical_alternative
  - marker: c
    text: The imagery of every head made bald and every shoulder rubbed bare likely
      reflects the physical strain of siege labor.
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard Ezekiel address formula. Although idiomatically it can mean
    'mortal' or 'human being,' 'Son of man' preserves the Hebrew expression and its
    repeated literary function in Ezekiel. The doctrine guidance on אָדָם allows 'man'
    where context supports it.
- source_word: הֶעֱבִיד
  chosen: made ... labor
  alternatives:
  - caused ... to serve
  - worked
  lexicon: HALOT
  rationale: 'Hiphil of עבד is causative: Nebuchadnezzar caused his force to do labor.
    ''Made his army labor'' captures the causative force better than a simple ''worked.'''
- source_word: חֵילוֹ
  chosen: his army
  alternatives:
  - his force
  - his troops
  lexicon: HALOT
  rationale: חיל here refers to military forces in context, not merely wealth or strength.
    'Army' is the clearest modern English rendering.
- source_word: עֲבֹדָה גְדֹלָה
  chosen: labor hard
  alternatives:
  - great labor
  - hard service
  lexicon: HALOT
  rationale: The phrase denotes severe, extensive labor. Rendering it verbally as
    'labor hard' produces natural English while preserving the intensity of גְדֹלָה.
- source_word: אֶל צֹר
  chosen: against Tyre
  alternatives:
  - for Tyre
  - toward Tyre
  lexicon: HALOT
  rationale: In military context with Nebuchadnezzar and his army, the preposition
    marks hostile direction. 'Against Tyre' best reflects the siege setting.
- source_word: כָּל רֹאשׁ מֻקְרָח
  chosen: every head was made bald
  alternatives:
  - every head became bald
  - every head was bald
  lexicon: HALOT
  rationale: The passive participle indicates the result of strenuous labor, likely
    from helmet/friction or siege toil. 'Was made bald' preserves the resultant nuance.
- source_word: כָּל כָּתֵף מְרוּטָה
  chosen: every shoulder was rubbed bare
  alternatives:
  - every shoulder was peeled
  - every shoulder was chafed bare
  lexicon: HALOT
  rationale: מְרוּטָה conveys being made bare/scraped smooth. 'Rubbed bare' communicates
    the physical abrasion from carrying loads during siege work.
- source_word: שָׂכָר
  chosen: pay
  alternatives:
  - wages
  - reward
  lexicon: HALOT
  rationale: The term denotes compensation for labor. 'Pay' is clear modern English;
    'wages' is possible but slightly narrower/stiffer.
- source_word: מִצֹּר
  chosen: from Tyre
  alternatives:
  - out of Tyre
  lexicon: HALOT
  rationale: The sense is that no compensation came to Nebuchadnezzar or his army
    from the campaign against Tyre. 'From Tyre' is the most direct rendering of the
    preposition.
- source_word: עַל הָעֲבֹדָה אֲשֶׁר עָבַד עָלֶיהָ
  chosen: for the labor that he had performed against it
  alternatives:
  - for the service that he served against it
  - for the labor that he labored over it
  lexicon: HALOT
  rationale: The clause explains the basis for the unpaid compensation. 'Performed'
    avoids awkward repetition in English while retaining the work motif. 'Against
    it' fits the military context and the feminine suffix refers to Tyre.
