theological_decisions:
- issue: Prophetic perfect in the final clause
  chosen_reading: I have given you as food
  alternative_readings:
  - I will give you as food
  rationale: The Hebrew perfect נְתַתִּיךָ can be retained as a prophetic perfect,
    presenting the judgment as certain and effectively accomplished. This preserves
    the force of the Hebrew rather than flattening it into a simple future.
  doctrine_reference: Translation philosophy §1, §3
