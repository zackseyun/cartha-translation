id: EZK.29.5
reference: Ezekiel 29:5
source:
  edition: WLC
  text: וּ/נְטַשְׁתִּ֣י/ךָ הַ/מִּדְבָּ֗רָ/ה אוֹתְ/ךָ֙ וְ/אֵת֙ כָּל דְּגַ֣ת יְאֹרֶ֔י/ךָ
    עַל פְּנֵ֤י הַ/שָּׂדֶה֙ תִּפּ֔וֹל לֹ֥א תֵאָסֵ֖ף וְ/לֹ֣א תִקָּבֵ֑ץ לְ/חַיַּ֥ת הָ/אָ֛רֶץ
    וּ/לְ/ע֥וֹף הַ/שָּׁמַ֖יִם נְתַתִּ֥י/ךָ לְ/אָכְלָֽה־־׃
translation:
  text: I will cast you into the wilderness, you and all the fish of your streams.
    You will fall on the open field; you will not be gathered or collected. I have
    given you as food to the beasts of the earth and to the birds of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fish of your Nile channels'; the Hebrew term for 'streams' is often
      used for the Nile and its waterways in Egyptian contexts.
    reason: cultural_note
  - marker: b
    text: Or 'you will not be gathered or gathered together'; the Hebrew uses two
      near-synonymous verbs to intensify that no one will recover or bury the body.
    reason: lexical_alternative
  - marker: c
    text: The final clause is literally 'I have given you for food,' a prophetic perfect
      expressing the certainty of the coming judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְטַשְׁתִּיךָ
  chosen: I will cast you
  alternatives:
  - I will abandon you
  - I will throw you down
  lexicon: HALOT
  rationale: The verb נטשׁ can mean leave, abandon, or cast away. In this judgment
    context, with movement into the wilderness and exposure for consumption, 'cast'
    best captures forcible disposal without over-paraphrasing.
- source_word: הַמִּדְבָּרָה
  chosen: into the wilderness
  alternatives:
  - to the wilderness
  - into the desert
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the wilderness. 'Wilderness'
    is broader and more natural than 'desert' while preserving the desolate setting.
- source_word: דְּגַת יְאֹרֶיךָ
  chosen: the fish of your streams
  alternatives:
  - the fish of your Nile channels
  - the fish of your rivers
  lexicon: HALOT
  rationale: דגה is collective 'fish.' יְאֹר often refers to Nile waterways in Egyptian
    contexts. 'Streams' is readable English for the plural construct, while the Egyptian/Nile
    nuance is preserved in a footnote.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  chosen: on the open field
  alternatives:
  - on the פני of the field
  - on the surface of the field
  - in the field
  lexicon: HALOT
  rationale: The idiom means exposed on the surface/open expanse of the field. 'Open
    field' communicates public exposure and vulnerability better than a wooden rendering.
- source_word: תִּפּוֹל
  chosen: You will fall
  alternatives:
  - you will lie fallen
  lexicon: HALOT
  rationale: A straightforward future rendering fits the sequence of judgment. English
    naturally hears the resulting collapse from the prior casting out.
- source_word: לֹא תֵאָסֵף
  chosen: you will not be gathered
  alternatives:
  - you will not be picked up
  - you will not be brought in
  lexicon: HALOT
  rationale: אָסף in the Niphal here refers to being gathered up, likely for burial
    or removal. 'Gathered' preserves the lexical link and leaves the implication unstated.
- source_word: וְלֹא תִקָּבֵץ
  chosen: or collected
  alternatives:
  - or assembled
  - or gathered together
  lexicon: HALOT
  rationale: Using 'collected' avoids awkward repetition while still reflecting the
    near-synonymous second verb. The pair emphasizes total lack of recovery or burial.
- source_word: לְחַיַּת הָאָרֶץ
  chosen: to the beasts of the earth
  alternatives:
  - for the wild animals of the land
  - to the animals of the earth
  lexicon: HALOT
  rationale: חיה often denotes wild beasts in such carrion scenes. 'Beasts of the
    earth' is vivid, idiomatic, and suitably grave.
- source_word: וּלְעוֹף הַשָּׁמַיִם
  chosen: and to the birds of the heavens
  alternatives:
  - and to the birds of the sky
  - and to the fowl of heaven
  lexicon: HALOT
  rationale: This is a common biblical expression. 'Birds of the heavens' preserves
    the elevated register and Hebrew imagery better than the flatter 'sky,' though
    either is possible.
- source_word: נְתַתִּיךָ לְאָכְלָה
  chosen: I have given you as food
  alternatives:
  - I have given you for food
  - I have made you food
  lexicon: HALOT
  rationale: The perfect can be rendered as a prophetic perfect in English. 'Given
    you as food' is clear and preserves the judicial force of divine handing over.
