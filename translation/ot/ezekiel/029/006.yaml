id: EZK.29.6
reference: Ezekiel 29:6
source:
  edition: WLC
  text: וְ/יָֽדְעוּ֙ כָּל יֹשְׁבֵ֣י מִצְרַ֔יִם כִּ֖י אֲנִ֣י יְהוָ֑ה יַ֧עַן הֱיוֹתָ֛/ם
    מִשְׁעֶ֥נֶת קָנֶ֖ה לְ/בֵ֥ית יִשְׂרָאֵֽל־׃
translation:
  text: Then all the inhabitants of Egypt will know that I am the LORD, because they
    were a staff of reed to the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a reed staff.' The Hebrew image is of something used for support but
      too weak to bear weight.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: Then ... will know
  alternatives:
  - And ... will know
  lexicon: HALOT
  rationale: The waw with qatal in prophetic discourse commonly advances the sequence/result.
    'Then' brings out the consequential force in context, while 'will know' is the
    standard rendering of ידע in Ezekiel's recognition formula.
- source_word: כָּל יֹשְׁבֵי מִצְרַיִם
  chosen: all the inhabitants of Egypt
  alternatives:
  - all who dwell in Egypt
  - all the residents of Egypt
  lexicon: HALOT
  rationale: יֹשְׁבֵי literally means 'those dwelling,' but 'inhabitants' is natural
    modern English and preserves the collective sense.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: This is Ezekiel's recurring recognition formula. Per doctrine, יְהוָה
    is rendered 'the LORD' rather than transliterated. 'That' fits the content clause
    after 'know'.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: יַעַן introduces the reason for judgment. 'Because' is the clearest contemporary
    equivalent.
- source_word: הֱיוֹתָם
  chosen: they were
  alternatives:
  - their being
  lexicon: HALOT
  rationale: The infinitive construct with suffix is idiomatically rendered as a finite
    clause in English after יַעַן.
- source_word: מִשְׁעֶנֶת קָנֶה
  chosen: a staff of reed
  alternatives:
  - a reed staff
  - a staff made of reed
  lexicon: HALOT
  rationale: The phrase denotes something leaned on for support but unreliable. 'Staff
    of reed' preserves the metaphor and echoes the imagery developed in the following
    verse better than a more interpretive paraphrase.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - for the house of Israel
  lexicon: HALOT
  rationale: The preposition ל here marks relation/advantage. 'To the house of Israel'
    is a literal but still natural rendering and preserves the covenantal-national
    expression 'house of Israel'.
