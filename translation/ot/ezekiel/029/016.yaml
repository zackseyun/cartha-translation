theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of Egypt as Israel's object of reliance
  chosen_reading: a source of confidence
  alternative_readings:
  - a confidence
  - a trust
  - a security
  rationale: The verse condemns Israel's reliance on Egypt. The chosen wording makes the relational sense explicit without over-paraphrasing, preserving the theological critique of misplaced trust in foreign power rather than in the Lord.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence, preserve source plain sense'
