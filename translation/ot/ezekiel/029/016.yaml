id: EZK.29.16
reference: Ezekiel 29:16
source:
  edition: WLC
  text: וְ/לֹ֣א יִֽהְיֶה עוֹד֩ לְ/בֵ֨ית יִשְׂרָאֵ֤ל לְ/מִבְטָח֙ מַזְכִּ֣יר עָוֺ֔ן בִּ/פְנוֹתָ֖/ם אַחֲרֵי/הֶ֑ם וְ/יָ֣דְע֔וּ כִּ֥י אֲנִ֖י אֲדֹנָ֥/י יְהוִֽה־׃פ
translation:
  text: And it will no longer be for the house of Israel a source of confidence, bringing iniquity to remembrance when they turn after them; then they will know that I am the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'confidence,' 'trust,' or 'security.' The Hebrew term refers to something relied on for safety.
    reason: lexical_alternative
  - marker: b
    text: Or 'reminding them of guilt' or 'bringing guilt to mind.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Lord GOD' represents אֲדֹנָי יְהוִה, literally 'Lord YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא יִהְיֶה עוֹד
  chosen: it will no longer be
  alternatives:
  - it shall be no more
  - it will not again be
  lexicon: HALOT
  rationale: Combines negation, imperfect of היה, and עוֹד to express cessation into the future. 'Will no longer be' is natural modern English and preserves the durative/future sense.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - to the house of Israel
  lexicon: HALOT
  rationale: Retains the covenantal-national expression 'house of Israel' rather than flattening to 'Israelites.' The preposition ל is well represented by 'for' in this predicate construction.
- source_word: לְמִבְטָח
  chosen: a source of confidence
  alternatives:
  - confidence
  - trust
  - security
  lexicon: HALOT
  rationale: מִבְטָח denotes an object or ground of trust/security. 'A source of confidence' makes explicit that Egypt had functioned as something relied upon, fitting the context of misplaced political dependence.
- source_word: מַזְכִּיר עָוֺן
  chosen: bringing iniquity to remembrance
  alternatives:
  - reminding them of guilt
  - causing sin to be remembered
  - bringing guilt to mind
  lexicon: HALOT
  rationale: The Hiphil participle of זכר means 'causing to remember/reminding.' עָוֺן can mean iniquity, guilt, or punishment for guilt. 'Bringing iniquity to remembrance' stays close to the Hebrew while allowing the idiom to convey that Israel's wrongful reliance is exposed and recalled.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: Here עָוֺן likely points to culpable wrongdoing rather than merely subjective guilt. 'Iniquity' preserves the moral weight and avoids over-psychologizing the term.
- source_word: בִּפְנוֹתָם אַחֲרֵיהֶם
  chosen: when they turn after them
  alternatives:
  - when they turn to follow them
  - in their turning after them
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance, 'when/in turning.' אַחֲרֵי with the pronominal suffix expresses following after. 'Turn after them' is a fairly literal rendering that preserves the idiom of seeking alliance/dependence.
- source_word: וְיָדְעוּ
  chosen: then they will know
  alternatives:
  - and they will know
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English 'then' clarifies the resultative force in context without adding foreign meaning.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  lexicon: HALOT
  rationale: 'Follows the project''s doctrinal standard: יְהוָה rendered ''the LORD.'' In the compound title אֲדֹנָי יְהוִה, standard English convention is ''Lord GOD'' to avoid ''Lord LORD'' while preserving both elements of the Hebrew title.'
