id: EZK.29.15
reference: Ezekiel 29:15
source:
  edition: WLC
  text: מִן הַ/מַּמְלָכוֹת֙ תִּהְיֶ֣ה שְׁפָלָ֔ה וְ/לֹֽא תִתְנַשֵּׂ֥א ע֖וֹד עַל הַ/גּוֹיִ֑ם
    וְ/הִ֨מְעַטְתִּ֔י/ם לְ/בִלְתִּ֖י רְד֥וֹת בַּ/גּוֹיִֽם־־־׃
translation:
  text: It will be the lowliest of the kingdoms, and it will no longer exalt itself
    above the nations; and I will make them few, so that they will not rule over the
    nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the kingdoms' for 'of the kingdoms.' The Hebrew construction marks
      Egypt as the most abased in comparison with the other kingdoms.
    reason: lexical_alternative
  - marker: b
    text: Or 'be lifted up' instead of 'exalt itself.' The Hebrew can express either
      passive elevation or reflexive self-exaltation; the context of national pride
      favors 'exalt itself.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'I will make them few.' The pronoun is plural, referring to Egypt's
      people/power collectively.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'in/among the nations'; rendered 'over the nations' because the verb
      'rule' in English normally takes 'over' for the object of dominion.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַמַּמְלָכוֹת
  chosen: of the kingdoms
  alternatives:
  - among the kingdoms
  - from the kingdoms
  lexicon: HALOT
  rationale: 'The מן with a superlative/comparative sense here is best rendered partitively:
    Egypt will be the lowest in relation to the other kingdoms. ''Of the kingdoms''
    is natural English with ''lowliest''; ''among the kingdoms'' is possible but slightly
    more interpretive.'
- source_word: תִּהְיֶה שְׁפָלָה
  chosen: it will be the lowliest
  alternatives:
  - it will be low
  - it will be the lowest
  lexicon: HALOT
  rationale: שָׁפָל denotes lowness/humiliation. In context, with מן הממלכות, the
    sense is comparative/superlative, not merely descriptive. 'The lowliest' preserves
    the humiliation motif while reading naturally.
- source_word: וְלֹא תִתְנַשֵּׂא עוֹד
  chosen: and it will no longer exalt itself
  alternatives:
  - and it will no longer be lifted up
  - and it will no longer rise up
  lexicon: HALOT
  rationale: The Hitpael/Nitpael-like form of נשׂא here conveys self-exaltation or
    being raised up. 'Exalt itself' best fits the political pride context and the
    following phrase 'above the nations.'
- source_word: עַל הַגּוֹיִם
  chosen: above the nations
  alternatives:
  - over the nations
  lexicon: HALOT
  rationale: With תתנשא, על is spatial/metaphorical superiority. 'Above the nations'
    fits the idiom of exaltation better than 'over,' which could blur into the later
    verb of ruling.
- source_word: וְהִמְעַטְתִּים
  chosen: and I will make them few
  alternatives:
  - and I will diminish them
  - and I will reduce them
  lexicon: HALOT
  rationale: The Hiphil of מעט means to make small/few. The 3mp suffix refers to Egypt's
    people/power collectively. 'Make them few' preserves the concrete sense and explains
    the result clause that follows.
- source_word: לְבִלְתִּי רְדוֹת
  chosen: so that they will not rule
  alternatives:
  - so that they may not rule
  - to keep them from ruling
  lexicon: HALOT
  rationale: לבלתי introduces purpose/result prevention. רדה means to rule/have dominion.
    'So that they will not rule' gives clear English while preserving the divine purpose.
- source_word: בַּגּוֹיִם
  chosen: over the nations
  alternatives:
  - among the nations
  lexicon: HALOT
  rationale: Although ב normally means 'in/among,' with רדה the sense is dominion
    with respect to peoples. English idiom prefers 'rule over the nations.' 'Among
    the nations' is more literal but less clear in context.
