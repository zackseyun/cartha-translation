id: EZK.29.17
reference: Ezekiel 29:17
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/עֶשְׂרִ֤ים וָ/שֶׁ֨בַע֙ שָׁנָ֔ה בָּֽ/רִאשׁ֖וֹן בְּ/אֶחָ֣ד לַ/חֹ֑דֶשׁ
    הָיָ֥ה דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And it happened in the twenty-seventh year, in the first month, on the first
    day of the month, that the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'on the first of the month.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a dated prophetic notice. 'And it happened'
    preserves the temporal/narrative force while avoiding archaic 'came to pass.'
- source_word: בְּעֶשְׂרִים וָשֶׁבַע שָׁנָה
  chosen: in the twenty-seventh year
  alternatives:
  - in year twenty-seven
  lexicon: HALOT
  rationale: The Hebrew gives a calendrical date formula. English idiom naturally
    compresses the cardinal expression into the ordinal 'twenty-seventh year.'
- source_word: בָּרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - in the first
  lexicon: HALOT
  rationale: Though 'month' is not repeated in this word itself, the dating formula
    clearly means 'in the first month'; this is standard and necessary for clear English.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Hebrew idiom literally 'on one of the month' means the first day of the
    month. The chosen rendering is explicit and natural.
- source_word: הָיָה דְבַר יְהוָה אֵלַי
  chosen: the word of the LORD came to me
  alternatives:
  - the word of the LORD was to me
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Came to me' communicates the idiomatic force
    of divine revelation in English better than a more wooden rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Conventional introduction to direct speech; 'saying' is the natural English
    equivalent and signals that the oracle continues in the next verse.
