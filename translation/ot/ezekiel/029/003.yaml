theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of Pharaoh's boast וַאֲנִי עֲשִׂיתִנִי
  chosen_reading: 'Pharaoh claims self-creation: ''I made myself'''
  alternative_readings:
  - 'Pharaoh claims to have made the Nile for himself: ''I made it for myself'''
  rationale: The direct object suffix is first person singular, and the immediate rhetoric emphasizes Pharaoh's hubris. Retaining the self-creation claim preserves the theological force of arrogant self-deification without softening the text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document ambiguity and preserve alternative in footnote'
