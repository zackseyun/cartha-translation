id: EZK.29.3
reference: Ezekiel 29:3
source:
  edition: WLC
  text: דַּבֵּ֨ר וְ/אָמַרְתָּ֜ כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה הִנְ/נִ֤י עָלֶ֨י/ךָ֙ פַּרְעֹ֣ה מֶֽלֶךְ מִצְרַ֔יִם הַ/תַּנִּים֙ הַ/גָּד֔וֹל הָ/רֹבֵ֖ץ בְּ/ת֣וֹךְ יְאֹרָ֑י/ו אֲשֶׁ֥ר אָמַ֛ר לִ֥/י יְאֹרִ֖/י וַ/אֲנִ֥י עֲשִׂיתִֽ/נִי־׀־׃
translation:
  text: 'Speak and say, ‘Thus says the Lord GOD: Behold, I am against you, Pharaoh king of Egypt, the great sea monster lying in the midst of his Nile channels, who says, “My Nile is mine, and I made myself.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the great dragon”; in context, the image may also evoke a crocodile-like Nile monster.
    reason: lexical_alternative
  - marker: b
    text: Or “My river is mine, and I made it for myself.” The Hebrew may be read as Pharaoh boasting either of owning the Nile or of having made himself.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the compound divine title in the conventional English form 'the Lord GOD.' Per doctrine, YHWH is rendered 'the LORD'; however, in the Hebrew sequence אֲדֹנָי יְהוִה, many English translations avoid 'Lord LORD' by using 'Lord GOD.' This preserves the distinction of the double title while remaining readable.
- source_word: הִנְנִי עָלֶיךָ
  chosen: Behold, I am against you
  alternatives:
  - Look, I am against you
  - Here I am against you
  lexicon: HALOT
  rationale: הִנְנִי introduces emphatic divine action; 'Behold' preserves prophetic force. עַל with hostile sense is best rendered 'against you.'
- source_word: תַּנִּים
  chosen: sea monster
  alternatives:
  - dragon
  - serpent
  - crocodile
  lexicon: HALOT
  rationale: תַּנִּים/תַּנִּין in prophetic and mythic contexts can denote a great reptilian or chaos creature. 'Sea monster' communicates the imagery without overcommitting to later dragon imagery or to a strictly zoological 'crocodile,' though Egypt/Nile context makes crocodile a plausible nuance.
- source_word: הָרֹבֵץ
  chosen: lying
  alternatives:
  - crouching
  - lurking
  - stretching himself out
  lexicon: HALOT
  rationale: The participle from רבץ commonly denotes lying down or crouching. 'Lying' is natural English and fits the image of Pharaoh settled arrogantly in the Nile.
- source_word: בְּתוֹךְ יְאֹרָיו
  chosen: in the midst of his Nile channels
  alternatives:
  - in the midst of his rivers
  - in the midst of his Nile streams
  lexicon: HALOT
  rationale: יְאֹר is especially associated with the Nile and its waterways in Egyptian contexts. 'Nile channels' makes the Egyptian reference explicit and reflects the plural possessive 'his Nile channels.'
- source_word: יְאֹרִי
  chosen: My Nile
  alternatives:
  - My river
  - My Nile channel
  lexicon: HALOT
  rationale: For consistency with יְאֹרָיו and the Egyptian setting, the singular is rendered 'My Nile.' This captures Pharaoh's claim of ownership over the life-giving river system.
- source_word: וַאֲנִי עֲשִׂיתִנִי
  chosen: and I made myself
  alternatives:
  - and I made it for myself
  - and I made myself for myself
  lexicon: HALOT
  rationale: The suffix on עֲשִׂיתִנִי is first person singular object, yielding the striking boast 'I made myself.' This best reflects the grammar and Pharaoh's self-exalting claim. Some take the object elliptically as the Nile, but the Masoretic pointing favors reflexive self-creation language.
