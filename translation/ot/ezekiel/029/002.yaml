id: EZK.29.2
reference: Ezekiel 29:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם שִׂ֣ים פָּנֶ֔י/ךָ עַל פַּרְעֹ֖ה מֶ֣לֶךְ מִצְרָ֑יִם וְ/הִנָּבֵ֣א
    עָלָ֔י/ו וְ/עַל מִצְרַ֖יִם כֻּלָּֽ/הּ־־־׃
translation:
  text: Son of man, set your face against Pharaoh king of Egypt, and prophesy against
    him and against all Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mortal, set your face against Pharaoh king of Egypt...' The Hebrew address
      בן אדם is a recurring title for Ezekiel and can also be rendered 'mortal' or
      'human one.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A conventional and sufficiently transparent rendering of the Hebrew address
    בן אדם in Ezekiel. It preserves the masculine singular form and the prophetic
    idiom better than more interpretive alternatives such as 'mortal.' The doctrine
    excerpt prefers gender-accurate renderings where the source is masculine.
- source_word: שִׂים פָּנֶיךָ
  chosen: set your face
  alternatives:
  - direct your face
  - turn your face
  lexicon: HALOT
  rationale: This idiom in prophetic contexts conveys deliberate orientation in opposition
    or focus. 'Set your face' preserves the Hebrew imagery and is natural enough in
    English; the following preposition 'against' clarifies the hostile stance.
- source_word: עַל
  chosen: against
  alternatives:
  - toward
  - upon
  lexicon: HALOT
  rationale: With 'set your face' and later with 'prophesy,' על carries adversative
    force in this judgment context. 'Against' best reflects the prophetic denunciation
    directed at Pharaoh and Egypt.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name, following the
    translation philosophy to transliterate names.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: king of Egypt
  alternatives:
  - the king of Egypt
  lexicon: HALOT
  rationale: 'The construct phrase identifies Pharaoh appositionally. English idiom
    works well without the article here: ''Pharaoh king of Egypt.'''
- source_word: וְהִנָּבֵא
  chosen: and prophesy
  alternatives:
  - and speak prophetically
  - and declare as a prophet
  lexicon: HALOT
  rationale: '''Prophesy'' is the standard and accurate rendering of the Niphal imperative
    of נבא. It preserves the formal prophetic commission language without paraphrase.'
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - concerning him
  lexicon: HALOT
  rationale: In this judgment oracle context, the preposition is adversative rather
    than merely topical. 'Against him' matches the force of the command.
- source_word: מִצְרַיִם כֻּלָּהּ
  chosen: all Egypt
  alternatives:
  - the whole of Egypt
  - Egypt in its entirety
  lexicon: HALOT
  rationale: כֻּלָּהּ intensifies the scope to the entire land/nation. 'All Egypt'
    is concise, natural, and fully conveys the totalizing force.
