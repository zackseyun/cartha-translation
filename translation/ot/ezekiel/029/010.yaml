id: EZK.29.10
reference: Ezekiel 29:10
source:
  edition: WLC
  text: לָ/כֵ֛ן הִנְ/נִ֥י אֵלֶ֖י/ךָ וְ/אֶל יְאֹרֶ֑י/ךָ וְ/נָתַתִּ֞י אֶת אֶ֣רֶץ מִצְרַ֗יִם
    לְ/חָרְבוֹת֙ חֹ֣רֶב שְׁמָמָ֔ה מִ/מִּגְדֹּ֥ל סְוֵנֵ֖ה וְ/עַד גְּב֥וּל כּֽוּשׁ־־־׃
translation:
  text: Therefore, behold, I am against you and against your Nile channels, and I
    will make the land of Egypt ruins, a desolation laid waste, from Migdol to Syene,
    as far as the border of Cush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your rivers'; the Hebrew term in Egyptian contexts often refers specifically
      to the Nile and its branches or canals.
    reason: lexical_alternative
  - marker: b
    text: Syene is the ancient city near modern Aswan, marking Egypt's southern extent.
    reason: cultural_note
  - marker: c
    text: Cush refers to the region south of Egypt, often associated with Nubia rather
      than the boundaries of the modern state of Ethiopia.
    reason: cultural_note
lexical_decisions:
- source_word: יְאֹרֶיךָ
  chosen: your Nile channels
  alternatives:
  - your rivers
  - your Nile streams
  - your canals
  lexicon: HALOT
  rationale: יְאֹר commonly refers to the Nile or its branches/canals in Egyptian
    contexts. Because the address is to Pharaoh/Egypt, 'Nile channels' preserves the
    Egyptian setting better than the generic 'rivers' while remaining natural English.
- source_word: לְחָרְבוֹת חֹרֶב שְׁמָמָה
  chosen: ruins, a desolation laid waste
  alternatives:
  - utter ruins and desolation
  - waste places, a waste and desolation
  - desolate ruins
  lexicon: HALOT
  rationale: The Hebrew piles up near-synonymous devastation terms for emphasis. The
    chosen rendering preserves the cumulative force without flattening it into a single
    English term. 'Laid waste' reflects חֹרֶב's devastation nuance, while 'desolation'
    renders שְׁמָמָה.
- source_word: מִמִּגְדֹּל סְוֵנֵה
  chosen: from Migdol to Syene
  alternatives:
  - from Migdol to Seveneh
  - from Migdol to Aswan
  lexicon: HALOT
  rationale: These are place names marking Egypt's extent. Per translation philosophy,
    names are transliterated rather than translated. 'Syene' is the standard English
    form for סְוֵנֵה in this context; 'Aswan' is a modern equivalent but less directly
    tied to the Hebrew form.
- source_word: וְעַד גְּבוּל כּוּשׁ
  chosen: as far as the border of Cush
  alternatives:
  - even to the border of Cush
  - to the border of Ethiopia
  lexicon: HALOT
  rationale: כּוּשׁ is best preserved as 'Cush' rather than replaced with 'Ethiopia,'
    which can mislead modern readers into a strictly modern geopolitical reference.
    'As far as' naturally conveys the extent marker.
- source_word: הִנְנִי אֵלֶיךָ
  chosen: behold, I am against you
  alternatives:
  - look, I am against you
  - see, I am against you
  lexicon: HALOT
  rationale: This prophetic formula signals divine opposition. 'Behold' retains the
    solemn register and discourse force of הִנְנִי while remaining intelligible in
    modern English.
- source_word: וְנָתַתִּי אֶת אֶרֶץ מִצְרַיִם
  chosen: I will make the land of Egypt
  alternatives:
  - I will give the land of Egypt over as
  - I will set the land of Egypt as
  lexicon: HALOT
  rationale: נתן with a resultative complement here means to render or make the land
    into a devastated state, not merely 'give' in a neutral sense. 'I will make' communicates
    the idiomatic force in clear English.
