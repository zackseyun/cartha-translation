id: EZK.29.12
reference: Ezekiel 29:12
source:
  edition: WLC
  text: וְ/נָתַתִּ֣י אֶת אֶרֶץ֩ מִצְרַ֨יִם שְׁמָמָ֜ה בְּ/ת֣וֹךְ אֲרָצ֣וֹת נְשַׁמּ֗וֹת
    וְ/עָרֶ֨י/הָ֙ בְּ/ת֨וֹךְ עָרִ֤ים מָֽחֳרָבוֹת֙ תִּֽהְיֶ֣יןָ שְׁמָמָ֔ה אַרְבָּעִ֖ים
    שָׁנָ֑ה וַ/הֲפִצֹתִ֤י אֶת מִצְרַ֨יִם֙ בַּ/גּוֹיִ֔ם וְֽ/זֵרִיתִ֖י/ם בָּ/אֲרָצֽוֹת־׀־׃פ
translation:
  text: And I will make the land of Egypt a desolation among desolated lands, and
    her cities will be a desolation among ruined cities for forty years; and I will
    scatter Egypt among the nations and disperse them through the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among devastated lands' and 'among devastated cities.' The Hebrew uses
      closely related terms for desolation and ruin in parallel clauses.
    reason: lexical_alternative
  - marker: b
    text: That is, Egypt's people; the Hebrew shifts from the place-name 'Egypt' to
      the plural pronoun 'them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will make
  alternatives:
  - I will give
  - I will set
  lexicon: HALOT
  rationale: נתן literally means 'give/put,' but in this construction with the object
    plus שְׁמָמָה it idiomatically means to make or render something into a state.
    'I will make' is natural English and preserves the causative force.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'land of Egypt,' not merely the nation name.
    Retaining 'land' preserves the territorial emphasis in a judgment oracle about
    devastation.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  lexicon: HALOT
  rationale: The noun denotes a state of devastation or desolation. 'A desolation'
    preserves the nominal form and the severity of the judgment.
- source_word: בְּתוֹךְ אֲרָצוֹת נְשַׁמּוֹת
  chosen: among desolated lands
  alternatives:
  - in the midst of desolated lands
  - among devastated countries
  lexicon: HALOT
  rationale: בְּתוֹךְ here functions comparatively/locatively, meaning Egypt will
    be counted among other devastated lands. 'Among' is idiomatic English. 'Desolated
    lands' keeps the participial sense of נְשַׁמּוֹת.
- source_word: וְעָרֶיהָ
  chosen: and her cities
  alternatives:
  - and its cities
  lexicon: HALOT
  rationale: Hebrew commonly treats lands/cities as feminine. English may use 'its,'
    but 'her' preserves the personified feminine reference and fits prophetic style.
- source_word: בְּתוֹךְ עָרִים מָחֳרָבוֹת
  chosen: among ruined cities
  alternatives:
  - in the midst of ruined cities
  - among devastated cities
  lexicon: HALOT
  rationale: מָחֳרָבוֹת denotes cities laid waste or ruined. 'Ruined cities' is clear
    modern English and avoids awkward repetition while preserving the image.
- source_word: תִּהְיֶיןָ שְׁמָמָה
  chosen: will be a desolation
  alternatives:
  - will become desolate
  - will lie desolate
  lexicon: HALOT
  rationale: The verb היה plus noun expresses resulting state. 'Will be a desolation'
    mirrors the Hebrew structure more closely than an adjectival paraphrase.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: for forty years
  lexicon: HALOT
  rationale: Straightforward temporal duration; retained formally.
- source_word: וַהֲפִצֹתִי
  chosen: and I will scatter
  alternatives:
  - and I will disperse
  lexicon: HALOT
  rationale: The hiphil of פוץ conveys causing people to be scattered. 'Scatter' is
    the standard and vivid rendering.
- source_word: אֶת מִצְרַיִם
  chosen: Egypt
  alternatives:
  - the Egyptians
  lexicon: HALOT
  rationale: Although the proper noun can stand metonymically for the people, the
    following plural pronominal suffix on 'I will disperse them' shows the inhabitants
    are in view. Keeping 'Egypt' reflects the Hebrew wording while allowing the next
    clause to clarify the people are meant.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  lexicon: HALOT
  rationale: גּוֹיִם in prophetic judgment contexts is well rendered 'nations.'
- source_word: וְזֵרִיתִים
  chosen: and disperse them
  alternatives:
  - and winnow them
  - and scatter them
  lexicon: HALOT
  rationale: זרה can mean scatter/winnow. In parallel with 'scatter' and with destination
    'through the lands,' 'disperse them' provides good English variation while preserving
    the sense of forced distribution.
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - through the countries
  - in the lands
  lexicon: HALOT
  rationale: The preposition plus plural noun indicates distribution across various
    lands. 'Through the lands' captures the breadth of exile.
