theological_decisions:
- issue: Rendering the restoration idiom שׁוּב שְׁבוּת
  chosen_reading: restore the fortunes of Egypt
  alternative_readings:
  - bring back the captives of Egypt
  - restore the captivity of Egypt
  rationale: The phrase can be read literally in exile/restoration contexts, but in
    prophetic idiom it often denotes reversal of condition more broadly. Because the
    next clause explicitly states the return to Pathros, the broader idiomatic rendering
    avoids unnecessary repetition while preserving the restoration theme.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of עַל in עַל אֶרֶץ מְכוּרָתָם
  chosen_reading: to the land of their origin
  alternative_readings:
  - upon the land of their origin
  rationale: A highly literal 'upon' is possible, but English idiom and the movement
    context favor 'to.' This is a translational rather than doctrinal decision, preserving
    the sense of return to native territory.
  doctrine_reference: Translation philosophy §6
