id: EZK.29.14
reference: Ezekiel 29:14
source:
  edition: WLC
  text: וְ/שַׁבְתִּי֙ אֶת שְׁב֣וּת מִצְרַ֔יִם וַ/הֲשִׁבֹתִ֤י אֹתָ/ם֙ אֶ֣רֶץ פַּתְר֔וֹס
    עַל אֶ֖רֶץ מְכֽוּרָתָ֑/ם וְ/הָ֥יוּ שָׁ֖ם מַמְלָכָ֥ה שְׁפָלָֽה־־׃
translation:
  text: And I will restore the fortunes of Egypt and bring them back to the land of
    Pathros, to the land of their origin, and there they will be a lowly kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will bring back the captives of Egypt' / 'I will restore the captivity
      of Egypt.' The Hebrew idiom can be rendered more literally, though here it likely
      refers more broadly to restoring Egypt's condition.
    reason: lexical_alternative
  - marker: b
    text: Pathros was a region of Upper Egypt, here described as the Egyptians' land
      of origin.
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׁבְתִּי אֶת־שְׁבוּת מִצְרַיִם
  chosen: I will restore the fortunes of Egypt
  alternatives:
  - I will bring back the captives of Egypt
  - I will restore the captivity of Egypt
  lexicon: HALOT
  rationale: The idiom שׁוּב שְׁבוּת commonly means to restore fortunes/restore well-being,
    though historically it can be rendered more literally with captivity/captives.
    Here the following clause already expresses physical return, so 'restore the fortunes'
    best captures the idiom in natural English without redundancy.
- source_word: וַהֲשִׁבֹתִי אֹתָם
  chosen: and bring them back
  alternatives:
  - and return them
  - and cause them to return
  lexicon: HALOT
  rationale: 'Hiphil of שׁוּב is causative: God causes the Egyptians to return. ''Bring
    them back'' is idiomatic modern English and preserves the causative sense.'
- source_word: אֶרֶץ פַּתְרוֹס
  chosen: the land of Pathros
  alternatives:
  - Pathros
  lexicon: HALOT
  rationale: אֶרֶץ is retained as 'land' for clarity and to reflect the Hebrew construct
    phrase. Pathros is a place-name and is transliterated per translation philosophy.
- source_word: עַל אֶרֶץ מְכוּרָתָם
  chosen: to the land of their origin
  alternatives:
  - to the land of their birth
  - upon the land of their origin
  - to their native land
  lexicon: HALOT
  rationale: מְכוּרָה refers to place of origin/birth. Although עַל often means 'upon,'
    in this restoration context it functions directionally/appositionally with the
    preceding destination phrase. 'To the land of their origin' is clear English and
    fits the sense of return to native homeland.
- source_word: וְהָיוּ שָׁם
  chosen: and there they will be
  alternatives:
  - and they will be there
  lexicon: HALOT
  rationale: A straightforward rendering preserving the Hebrew word order emphasis
    on location with natural English style.
- source_word: מַמְלָכָה שְׁפָלָה
  chosen: a lowly kingdom
  alternatives:
  - a low kingdom
  - a humble kingdom
  - a base kingdom
  lexicon: HALOT
  rationale: שָׁפָל denotes low, humble, brought low. 'Lowly kingdom' communicates
    diminished status without archaic harshness such as 'base kingdom.'
