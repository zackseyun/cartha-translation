theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies יְהוָה should normally be rendered 'the LORD.'
    In the compound אֲדֹנָי יְהוִה, English convention uses 'the Lord GOD' to avoid
    the confusing 'Lord LORD' while still signaling the two-part Hebrew title.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation
    philosophy #2'
