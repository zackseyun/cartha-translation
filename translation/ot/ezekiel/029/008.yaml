id: EZK.29.8
reference: Ezekiel 29:8
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֛י מֵבִ֥יא עָלַ֖יִ/ךְ חָ֑רֶב
    וְ/הִכְרַתִּ֥י מִמֵּ֖/ךְ אָדָ֥ם וּ/בְהֵמָֽה׃
translation:
  text: 'Therefore thus says the Lord GOD: Behold, I am bringing a sword against you,
    and I will cut off from you man and beast.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will bring the sword against you.' The Hebrew 'a sword' can function
      as a collective image for warfare and judgment.
    reason: lexical_alternative
  - marker: b
    text: '''Man and beast'' is a stock judgment formula meaning both humans and animals.'
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the judgment that follows from
    the preceding accusation; 'Therefore' preserves the formal prophetic logic.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says' is idiomatic, recognizable,
    and suitably weighty without being archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine title combines אֲדֹנָי with the Tetragrammaton. Following
    doctrine, יְהוָה is rendered 'the LORD'; in the established English convention
    for this compound title, 'the Lord GOD' avoids the awkward 'Lord LORD' while preserving
    both elements.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: Deictic particle marking solemn divine announcement. 'Behold' preserves
    the prophetic force better than the more casual 'Look' or 'See'.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I bring
  - I will bring
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent action. 'I am bringing'
    captures the vivid, impending sense better than a simple future.
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  - on you
  lexicon: HALOT
  rationale: With hostile judgment language and 'sword,' English idiom favors 'against
    you' to make the adversative force explicit.
- source_word: חָרֶב
  chosen: a sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: Anarthrous singular commonly functions as an instrument of war/judgment.
    'A sword' is the most direct rendering, while still allowing the broader sense
    of military violence.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will wipe out
  - I will destroy
  lexicon: HALOT
  rationale: The verb כרת in the Hiphil commonly means to cut off, remove, or exterminate.
    'Cut off' preserves the lexical imagery and prophetic register better than more
    interpretive alternatives.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - out of you
  - from among you
  lexicon: HALOT
  rationale: Refers to removal from Egypt personified as feminine singular. 'From
    you' is literal and clear.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here paired with
    'beast' in a judgment formula, it denotes human beings generically; 'man' preserves
    the traditional human/animal contrast and the source's gender-accurate singular
    collective usage.
- source_word: וּבְהֵמָה
  chosen: and beast
  alternatives:
  - and animals
  - and cattle
  lexicon: HALOT
  rationale: In this stock judgment expression, 'beast' is the most concise and traditional
    counterpart to 'man,' covering domesticated animals broadly without narrowing
    the sense to 'cattle'.
