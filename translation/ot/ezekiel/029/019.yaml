id: EZK.29.19
reference: Ezekiel 29:19
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֥י נֹתֵ֛ן לִ/נְבוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל אֶת אֶ֣רֶץ מִצְרָ֑יִם וְ/נָשָׂ֨א הֲמֹנָ֜/הּ וְ/שָׁלַ֤ל שְׁלָלָ/הּ֙ וּ/בָזַ֣ז בִּזָּ֔/הּ וְ/הָיְתָ֥ה שָׂכָ֖ר לְ/חֵילֽ/וֹ־־׃
translation:
  text: 'Therefore thus says the Lord GOD: Behold, I am giving the land of Egypt to Nebuchadnezzar king of Babylon, and he will carry off its multitude, plunder its spoil, and seize its booty; and it will be wages for his army.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'its multitude/abundance'; here likely meaning Egypt's wealth or resources in the context of plunder.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks the statement as a consequence of the preceding oracle; 'Therefore' preserves the inferential force in natural English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; concise and recognizable without being archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Renders אֲדֹנָי as 'Lord' and, per doctrine, יְהוָה as 'the LORD.' In combination, conventional English capitalization yields 'the Lord GOD' to distinguish the divine name while avoiding the awkward 'Lord LORD.'
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Indeed
  lexicon: HALOT
  rationale: Signals solemn divine announcement. 'Behold' retains prophetic gravity better than the more colloquial 'Look' or 'See'.
- source_word: נֹתֵן
  chosen: I am giving
  alternatives:
  - I give
  - I will give
  lexicon: HALOT
  rationale: The participle with הִנְנִי conveys imminent or certain action. 'I am giving' preserves the vividness and certainty without over-paraphrasing.
- source_word: לִנְבוּכַדְרֶאצַּר
  chosen: to Nebuchadnezzar
  alternatives:
  - for Nebuchadnezzar
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/recipient of the gift; 'to Nebuchadnezzar' is the most straightforward rendering.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Keeps the concrete territorial sense of אֶרֶץ rather than reducing it to the country name alone.
- source_word: וְנָשָׂא הֲמֹנָהּ
  chosen: he will carry off its wealth
  alternatives:
  - he will carry off its multitude
  - he will take away its abundance
  lexicon: HALOT
  rationale: הָמוֹן can denote abundance, wealth, or multitude. In this context of military compensation and parallel plunder terms, 'wealth' best captures the economic sense.
- source_word: וְשָׁלַל שְׁלָלָהּ
  chosen: plunder its spoil
  alternatives:
  - take its plunder
  - despoil its spoil
  lexicon: HALOT
  rationale: The verb-noun cognate intensifies the act of taking spoil. 'Plunder its spoil' preserves the Hebrew wordplay and military register.
- source_word: וּבָזַז בִּזָּהּ
  chosen: seize its booty
  alternatives:
  - loot its loot
  - carry off its prey
  lexicon: HALOT
  rationale: Another verb-noun cognate parallel to the previous phrase. 'Seize its booty' gives idiomatic English while preserving the sense of forcible taking.
- source_word: וְהָיְתָה שָׂכָר לְחֵילוֹ
  chosen: and it will be wages for his army
  alternatives:
  - and it will become pay for his force
  - and it will be compensation for his troops
  lexicon: HALOT
  rationale: שָׂכָר denotes wages/pay. חַיִל here refers to the military force rather than abstract strength. 'Wages for his army' fits the context of recompense for military service in the preceding verse.
