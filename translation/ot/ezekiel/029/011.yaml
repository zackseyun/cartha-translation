theological_decisions:
- issue: Rendering of אָדָם in a generic statement
  chosen_reading: human in the sense of humankind, rendered 'human foot'
  alternative_readings:
  - man's foot
  rationale: The phrase is generic and refers to any human traveler, not specifically
    a male. This follows the doctrine guideline to render אָדָם as 'man' or 'humankind'
    according to context, with gender-accurate intent preserved.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy
