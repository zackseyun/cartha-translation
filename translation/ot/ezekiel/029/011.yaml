id: EZK.29.11
reference: Ezekiel 29:11
source:
  edition: WLC
  text: לֹ֤א תַעֲבָר בָּ/הּ֙ רֶ֣גֶל אָדָ֔ם וְ/רֶ֥גֶל בְּהֵמָ֖ה לֹ֣א תַעֲבָר בָּ֑/הּ
    וְ/לֹ֥א תֵשֵׁ֖ב אַרְבָּעִ֥ים שָׁנָֽה־־׃
translation:
  text: No human foot will pass through it, and no animal foot will pass through it;
    and it will not be inhabited for forty years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'No foot of man ... and no foot of beast.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲבָר בָּהּ
  chosen: will pass through it
  alternatives:
  - will pass in it
  - will cross through it
  lexicon: HALOT
  rationale: עבר with ב marks movement through the land/region. 'Pass through it'
    is natural English and preserves the image of traversing the land.
- source_word: רֶגֶל אָדָם
  chosen: human foot
  alternatives:
  - foot of man
  - man's foot
  lexicon: HALOT
  rationale: 'Literally ''foot of man.'' Because the phrase is idiomatic for human
    traffic, ''human foot'' preserves the singular collective sense while avoiding
    awkward English. This also fits the doctrine guideline for אָדָם: context here
    is generic humanity, not an individual male.'
- source_word: רֶגֶל בְּהֵמָה
  chosen: animal foot
  alternatives:
  - foot of beast
  - beast's foot
  lexicon: HALOT
  rationale: Parallel to 'human foot.' 'Animal' is clearer in modern English than
    'beast' here and matches the generic sense of בְּהֵמָה.
- source_word: לֹא תֵשֵׁב
  chosen: it will not be inhabited
  alternatives:
  - it will not be lived in
  - it will not be settled
  lexicon: HALOT
  rationale: ישב in reference to a land commonly means to dwell, inhabit, or be settled.
    Because the subject is the land of Egypt in context, English idiom prefers the
    passive 'it will not be inhabited' over the more literal but less natural 'it
    will not sit/dwell.'
- source_word: אַרְבָּעִים שָׁנָה
  chosen: for forty years
  lexicon: HALOT
  rationale: Straightforward temporal expression indicating duration.
