id: EZK.29.20
reference: Ezekiel 29:20
source:
  edition: WLC
  text: פְּעֻלָּת/וֹ֙ אֲשֶׁר עָ֣בַד בָּ֔/הּ נָתַ֥תִּי ל֖/וֹ אֶת אֶ֣רֶץ מִצְרָ֑יִם
    אֲשֶׁר֙ עָ֣שׂוּ לִ֔/י נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃ס
translation:
  text: As his wages for which he labored against it, I have given him the land of
    Egypt, because they worked for me, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As payment for his work which he did against it.' The Hebrew noun can
      mean 'work,' 'deed,' or 'wages/recompense.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'it' likely refers to Tyre from the preceding context (29:18).
    reason: cross_reference
  - marker: c
    text: Or 'because they acted for me' or 'because they did it for me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּעֻלָּתוֹ
  chosen: his wages
  alternatives:
  - his work
  - his recompense
  - his reward
  lexicon: HALOT
  rationale: The noun can denote work, deed, or wages/recompense. In this context
    YHWH is compensating Nebuchadnezzar for military labor, so 'his wages' best captures
    the compensatory sense and fits the following gift of Egypt as payment.
- source_word: אֲשֶׁר עָבַד בָּהּ
  chosen: for which he labored against it
  alternatives:
  - with which he served in it
  - wherein he labored
  - for which he worked on it
  lexicon: HALOT
  rationale: עבד commonly means 'work/serve/labor.' With the feminine singular suffix
    likely referring back to Tyre from the prior context, the sense is labor expended
    in a campaign against that city. 'Labored against it' makes the military context
    explicit without overparaphrasing.
- source_word: נָתַתִּי לוֹ
  chosen: I have given him
  alternatives:
  - I gave him
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered as simple past or present perfect
    in English. 'I have given' fits prophetic declaration of a decided divine act
    with present relevance.
- source_word: אֶת אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Retaining 'the land of' reflects the Hebrew wording and emphasizes territorial
    possession rather than merely the nation as an abstract entity.
- source_word: אֲשֶׁר עָשׂוּ לִי
  chosen: because they worked for me
  alternatives:
  - which they did for me
  - because they acted for me
  - for they labored for me
  lexicon: HALOT
  rationale: עָשׂוּ is broadly 'did/made,' but in context of military service and
    compensation it idiomatically refers to carrying out labor/service on YHWH's behalf.
    'Worked for me' communicates the sense naturally in English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic formula 'declares.' Per doctrine, יְהוָה
    is rendered 'the LORD.' 'Lord GOD' preserves אֲדֹנָי יְהוִה in conventional readable
    English.
