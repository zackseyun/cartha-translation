theological_decisions:
- issue: Metaphorical vs. interpretive rendering of Egypt as false support
  chosen_reading: Preserve the physical reed metaphor in the main text ('leaned on
    you,' 'shoulder,' 'hips') rather than interpret it abstractly as political reliance.
  alternative_readings:
  - render 'leaned on you' as 'relied on you'
  rationale: The verse continues the metaphor from the previous verse of Egypt as
    a staff of reed. Keeping the bodily imagery preserves the prophetic force and
    lets the theological implication of false trust emerge from the metaphor itself
    rather than from explanatory paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of מָתְנַיִם
  chosen_reading: Use 'hips' in the main text with the destabilizing sense expressed
    in the verb phrase.
  alternative_readings:
  - loins
  rationale: This choice aims for readable modern English while preserving the bodily
    image. 'Loins' is more traditional and should be preserved in a footnote as a
    lexical alternative.
  doctrine_reference: Translation philosophy §§5, 6
