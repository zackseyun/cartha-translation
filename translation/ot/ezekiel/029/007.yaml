id: EZK.29.7
reference: Ezekiel 29:7
source:
  edition: WLC
  text: בְּ/תָפְשָׂ֨/ם בְּ/ךָ֤ ב/כפ/ך תֵּר֔וֹץ וּ/בָקַעְתָּ֥ לָ/הֶ֖ם כָּל כָּתֵ֑ף
    וּ/בְ/הִֽשָּׁעֲנָ֤/ם עָלֶ֨י/ךָ֙ תִּשָּׁבֵ֔ר וְ/הַעֲמַדְתָּ֥ לָ/הֶ֖ם כָּל מָתְנָֽיִם־־׃ס
translation:
  text: When they took hold of you with their hand, you were crushed, and you split
    open every shoulder for them; and when they leaned on you, you were broken, and
    you made all their hips stand unsteadily.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when they relied on you.' The Hebrew keeps the physical image 'leaned
      on you,' continuing the reed metaphor.
    reason: lexical_alternative
  - marker: b
    text: Or 'all their loins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתָפְשָׂם
  chosen: when they took hold of
  alternatives:
  - when they grasped
  - when they seized
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks a temporal clause, 'when/in
    their taking hold.' 'Took hold of' is natural English and preserves the concrete
    image of grasping the reed.
- source_word: בְּךָ
  chosen: of you
  alternatives:
  - you
  lexicon: HALOT
  rationale: Object of the grasping; rendered idiomatically with the preceding verb
    as 'took hold of you.'
- source_word: בכפך
  chosen: with their hand
  alternatives:
  - in the palm
  - by the hand
  lexicon: HALOT
  rationale: Though the consonantal form reflects 'your palm/hand,' the sense in context
    is the people's act of grasping Egypt like a reed in the hand. English idiom favors
    'with their hand.' This follows the imagery of the preceding verse rather than
    a hyper-literal but awkward rendering.
- source_word: תֵּרֹוץ
  chosen: you were crushed
  alternatives:
  - you were broken
  - you were shattered
  lexicon: HALOT
  rationale: Niphal of רצץ conveys being crushed or broken. 'Crushed' differentiates
    this clause from the later שבר ('were broken') and preserves the violent imagery.
- source_word: וּבָקַעְתָּ
  chosen: and you split open
  alternatives:
  - and you tore open
  - and you caused to split
  lexicon: HALOT
  rationale: Qal perfect 2ms with waw, addressed to Egypt/reed. The verb בקע means
    split, cleave, break open. 'Split open' captures the causative effect on those
    leaning on Egypt without over-paraphrasing.
- source_word: כָּל כָּתֵף
  chosen: every shoulder
  alternatives:
  - every shoulder blade
  - every side
  lexicon: HALOT
  rationale: כָּתֵף literally means shoulder. In the metaphor of a splintering reed
    piercing the one who grasps it, 'every shoulder' is the most direct rendering.
- source_word: וּבְהִשָּׁעֲנָם עָלֶיךָ
  chosen: and when they leaned on you
  alternatives:
  - and when they supported themselves on you
  - and when they relied on you
  lexicon: HALOT
  rationale: The infinitive construct of שען with ב again marks a temporal clause.
    Because the image is physical support from the reed metaphor, 'leaned on you'
    is preferable in the main text; 'relied on you' is a possible interpretive extension.
- source_word: תִּשָּׁבֵר
  chosen: you were broken
  alternatives:
  - you broke
  - you were shattered
  lexicon: HALOT
  rationale: Niphal of שבר is passive/reflexive, 'be broken.' 'Were broken' keeps
    the parallel with the first clause and the passive sense.
- source_word: וְהַעֲמַדְתָּ
  chosen: and you made ... stand unsteadily
  alternatives:
  - and you made ... stand
  - and you caused ... to totter
  lexicon: HALOT
  rationale: Hiphil of עמד literally means 'cause to stand,' but in this context the
    result is destabilization after the support collapses. The idiom likely means
    causing the loins to shake or be thrown off balance. 'Made ... stand unsteadily'
    preserves the literal core while communicating the effect.
- source_word: כָּל מָתְנַיִם
  chosen: all their hips
  alternatives:
  - all their loins
  - all their waists
  lexicon: HALOT
  rationale: מָתְנַיִם denotes loins/hips. 'Hips' is more accessible modern English;
    'loins' is possible but can sound archaic or carry misleading connotations in
    contemporary usage.
