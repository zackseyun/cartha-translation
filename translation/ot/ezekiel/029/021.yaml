theological_decisions:
- issue: Metaphorical force of 'horn'
  chosen_reading: Retain 'horn' as a metaphor for renewed strength/exaltation for Israel rather than interpreting it directly as a specific messianic figure in the translation.
  alternative_readings:
  - Render interpretively as 'strength' or 'power'
  - Read as an explicit messianic prediction
  rationale: The Hebrew image naturally conveys strength, dignity, or restored power. While later biblical theology can connect 'horn' imagery with royal or messianic hope, this verse itself does not require that narrower identification. Preserving the metaphor avoids importing a doctrinal conclusion the text does not explicitly state.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Meaning of פִּתְחוֹן פֶּה for Ezekiel
  chosen_reading: Translate as restored/granted speech without over-specifying whether this is permanent release from muteness or a particular prophetic opportunity.
  alternative_readings:
  - '''freedom to speak'''
  - '''bold speech'''
  - '''opening of your mouth'''
  rationale: The phrase likely echoes Ezekiel's prophetic speech restrictions and their reversal, but the verse itself states the granting of speech opportunity among the people. A relatively literal rendering preserves the connection without over-interpreting the exact mode or duration.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
