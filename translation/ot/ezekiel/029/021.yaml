id: EZK.29.21
reference: Ezekiel 29:21
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא אַצְמִ֤יחַ קֶ֨רֶן֙ לְ/בֵ֣ית יִשְׂרָאֵ֔ל וּ/לְ/ךָ֛ אֶתֵּ֥ן פִּתְחֽוֹן פֶּ֖ה בְּ/תוֹכָ֑/ם וְ/יָדְע֖וּ כִּי אֲנִ֥י יְהוָֽה־־׃פ
translation:
  text: On that day I will cause a horn to sprout for the house of Israel, and I will give you an opening of the mouth among them, and they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will make a horn grow'—that is, I will raise up strength or honor for the house of Israel.
    reason: lexical_alternative
  - marker: b
    text: '''An opening of the mouth'' is a Hebrew idiom for being enabled or permitted to speak, likely echoing Ezekiel''s earlier periods of restricted speech.'
    reason: cultural_note
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is natural modern English and preserves the prophetic time marker without unnecessary archaism.
- source_word: אַצְמִיחַ
  chosen: I will cause ... to sprout
  alternatives:
  - I will make ... grow
  - I will raise up
  lexicon: HALOT
  rationale: 'Hiphil of צמח is causative: ''cause to sprout/grow.'' ''Cause ... to sprout'' preserves the agricultural metaphor more closely than the more interpretive ''raise up.'''
- source_word: קֶרֶן
  chosen: horn
  alternatives:
  - strength
  - might
  - power
  lexicon: HALOT
  rationale: Literally 'horn.' In context it is a metaphor for strength or exaltation, but the image is important and should be preserved in the main text rather than resolved into an abstract term.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: Retains the covenantal-national expression 'house of Israel' rather than flattening it to simply 'Israel.'
- source_word: וּלְךָ
  chosen: and I will give you
  alternatives:
  - and to you I will give
  lexicon: HALOT
  rationale: Direct address to Ezekiel is preserved. English word order is smoothed while keeping the emphatic shift to the prophet.
- source_word: פִּתְחוֹן פֶּה
  chosen: an opening of the mouth
  alternatives:
  - freedom to speak
  - opening of your mouth
  lexicon: HALOT
  rationale: The Hebrew idiom refers to the restoration or granting of speech. The more literal 'an opening of the mouth' preserves the idiom and its connection to Ezekiel's earlier muteness, while remaining intelligible. 'Your mouth' is possible by sense, but the Hebrew has anarthrous 'mouth' rather than an explicit possessive.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: '''Among them'' is clear modern English for the communal setting. ''In their midst'' is slightly more formal but not necessary in the main text.'
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - then they will know
  lexicon: HALOT
  rationale: Simple future/result clause. 'They' most naturally refers to those among whom Ezekiel speaks, likely Israel in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
