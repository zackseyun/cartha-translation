id: EZK.27.27
reference: Ezekiel 27:27
source:
  edition: WLC
  text: הוֹנֵ/ךְ֙ וְ/עִזְבוֹנַ֔יִ/ךְ מַעֲרָבֵ֕/ךְ מַלָּחַ֖יִ/ךְ וְ/חֹבְלָ֑יִ/ךְ מַחֲזִיקֵ֣י
    בִדְקֵ֣/ך וְֽ/עֹרְבֵ֣י מַ֠עֲרָבֵ/ךְ וְ/כָל אַנְשֵׁ֨י מִלְחַמְתֵּ֜/ךְ אֲשֶׁר בָּ֗/ךְ
    וּ/בְ/כָל קְהָלֵ/ךְ֙ אֲשֶׁ֣ר בְּ/תוֹכֵ֔/ךְ יִפְּלוּ֙ בְּ/לֵ֣ב יַמִּ֔ים בְּ/י֖וֹם
    מַפַּלְתֵּֽ/ךְ־־־׃
translation:
  text: Your wealth, your wares, your merchandise, your sailors, and your pilots,
    those who repair your damage, and those who trade in your merchandise, and all
    your men of war who are in you, with all your assembly that is in your midst,
    will fall into the heart of the seas on the day of your downfall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who caulk your seams' or 'those who mend your breaches.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heart of the seas,' that is, the midst or depths of the seas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹנֵךְ
  chosen: your wealth
  alternatives:
  - your riches
  - your substance
  lexicon: HALOT
  rationale: הוֹן commonly denotes wealth or riches. 'Wealth' is natural modern English
    and fits the commercial lament over Tyre.
- source_word: עִזְבוֹנַיִךְ
  chosen: your wares
  alternatives:
  - your goods
  - your estate
  lexicon: HALOT
  rationale: In Ezekiel 27 this term belongs to the trade/commercial semantic field.
    'Wares' best captures saleable goods in a maritime trading context.
- source_word: מַעֲרָבֵךְ
  chosen: your merchandise
  alternatives:
  - your trade
  - your market goods
  lexicon: HALOT
  rationale: The noun in this chapter repeatedly refers to commercial exchange/cargo.
    'Merchandise' preserves the mercantile sense better than the broader 'trade' in
    this list of ship-and-commerce elements.
- source_word: מַלָּחַיִךְ
  chosen: your sailors
  alternatives:
  - your mariners
  - your seamen
  lexicon: HALOT
  rationale: '''Sailors'' is the clearest modern equivalent; ''mariners'' is possible
    but more archaic.'
- source_word: חֹבְלָיִךְ
  chosen: your pilots
  alternatives:
  - your shipmasters
  - your sailors
  lexicon: HALOT
  rationale: In Ezekiel 27 the term refers to those who direct or manage the ship
    rather than ordinary rowers/sailors. 'Pilots' is concise and idiomatic in English.
- source_word: מַחֲזִיקֵי בִדְקֵךְ
  chosen: those who repair your damage
  alternatives:
  - those who caulk your seams
  - those who mend your breaches
  lexicon: HALOT
  rationale: Literally 'those who hold/strengthen your breach/crack.' In nautical
    context this refers to repairers of the ship's damage or seams. 'Repair your damage'
    is readable and contextually accurate, while a more technical 'caulk your seams'
    is preserved in a footnote.
- source_word: עֹרְבֵי מַעֲרָבֵךְ
  chosen: those who trade in your merchandise
  alternatives:
  - dealers in your wares
  - those who barter your goods
  lexicon: HALOT
  rationale: The participle from ערב here is commercial in context. 'Trade in your
    merchandise' clearly conveys merchant activity tied to Tyre's cargo.
- source_word: אַנְשֵׁי מִלְחַמְתֵּךְ
  chosen: your men of war
  alternatives:
  - your warriors
  - your fighting men
  lexicon: HALOT
  rationale: A formal military expression. 'Men of war' preserves the force and matches
    the gendered Hebrew without unnecessary neutralization.
- source_word: קְהָלֵךְ
  chosen: your assembly
  alternatives:
  - your company
  - your multitude
  lexicon: HALOT
  rationale: קהל denotes an assembled group. Here it likely refers broadly to all
    gathered personnel aboard/in Tyre. 'Assembly' is sufficiently broad and formal.
- source_word: יִפְּלוּ
  chosen: will fall
  alternatives:
  - will sink
  - will collapse
  lexicon: HALOT
  rationale: The basic verb is 'fall.' In context of maritime disaster it implies
    sinking/destruction, but the main text preserves the Hebrew image rather than
    paraphrasing to 'sink.'
- source_word: בְּלֵב יַמִּים
  chosen: into the heart of the seas
  alternatives:
  - into the midst of the seas
  - in the depths of the seas
  lexicon: HALOT
  rationale: A vivid Hebrew idiom meaning the middle/deep part of the seas. 'Heart
    of the seas' preserves the metaphor while remaining understandable; a more interpretive
    alternative is footnoted.
- source_word: מַפַּלְתֵּךְ
  chosen: your downfall
  alternatives:
  - your fall
  - your ruin
  lexicon: HALOT
  rationale: The noun denotes collapse/fall. 'Downfall' communicates both the event
    and its catastrophic nature in idiomatic English.
