id: EZK.27.7
reference: Ezekiel 27:7
source:
  edition: WLC
  text: שֵׁשׁ בְּ/רִקְמָ֤ה מִ/מִּצְרַ֨יִם֙ הָיָ֣ה מִפְרָשֵׂ֔/ךְ לִ/הְי֥וֹת לָ֖/ךְ
    לְ/נֵ֑ס תְּכֵ֧לֶת וְ/אַרְגָּמָ֛ן מֵ/אִיֵּ֥י אֱלִישָׁ֖ה הָיָ֥ה מְכַסֵּֽ/ךְ־׃
translation:
  text: Fine embroidered linen from Egypt was your sail, serving as your banner; blue
    and purple from the coasts of Elishah was your covering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the islands of Elishah.' The Hebrew can refer to islands or coastlands.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be your ensign/standard.' The Hebrew נֵס denotes a banner, standard,
      or signal visible from afar.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: שֵׁשׁ commonly denotes fine linen, especially high-quality textile material.
    'Fine linen' best captures the likely luxury sense in this maritime trade lament.
- source_word: בְּרִקְמָה
  chosen: embroidered
  alternatives:
  - with embroidery
  - variegated work
  - colored fabric
  lexicon: HALOT
  rationale: רִקְמָה refers to embroidered or richly worked fabric. In English, 'fine
    embroidered linen' reads naturally while preserving the textile craftsmanship
    indicated by the Hebrew.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Straightforward geographic source marker indicating provenance of the
    textile.
- source_word: מִפְרָשֵׂךְ
  chosen: your sail
  alternatives:
  - your spreading cloth
  - your awning
  lexicon: HALOT
  rationale: In the ship metaphor of Tyre, מִפְרָשׂ denotes a sail. 'Your sail' fits
    the immediate nautical context better than a more generic 'spreading cloth.'
- source_word: לִהְיוֹת לָךְ לְנֵס
  chosen: serving as your banner
  alternatives:
  - to be for you as a signal
  - to be your ensign
  - to be your standard
  lexicon: HALOT
  rationale: נֵס can mean banner, standard, or signal-pole/ensign. In context, the
    sail is described as functioning as a visible emblem. 'Serving as your banner'
    preserves the functional nuance while remaining idiomatic.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue cloth
  - violet
  lexicon: HALOT
  rationale: תְּכֵלֶת denotes a blue or blue-violet dyed material. 'Blue' is the clearest
    accessible rendering in paired color terminology.
- source_word: וְאַרְגָּמָן
  chosen: purple
  alternatives:
  - purple cloth
  - reddish-purple
  lexicon: HALOT
  rationale: אַרְגָּמָן is the well-known purple dye/fabric term. 'Purple' is standard
    and sufficient here.
- source_word: מֵאִיֵּי אֱלִישָׁה
  chosen: from the coasts of Elishah
  alternatives:
  - from the islands of Elishah
  lexicon: HALOT
  rationale: אִיִּים can denote islands or coastlands/coasts. In trade-oracle context,
    'coasts' communicates maritime regions supplying luxury goods; 'Elishah' is transliterated
    as a proper name per translation philosophy.
- source_word: מְכַסֵּךְ
  chosen: your covering
  alternatives:
  - your awning
  - what covered you
  lexicon: HALOT
  rationale: The noun denotes a covering in the ship imagery. 'Your covering' preserves
    the metaphor without over-specifying a technical nautical term not explicit in
    the Hebrew.
