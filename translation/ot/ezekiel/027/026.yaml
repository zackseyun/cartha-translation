id: EZK.27.26
reference: Ezekiel 27:26
source:
  edition: WLC
  text: בְּ/מַ֤יִם רַבִּים֙ הֱבִיא֔וּ/ךְ הַ/שָּׁטִ֖ים אֹתָ֑/ךְ ר֚וּחַ הַ/קָּדִ֔ים
    שְׁבָרֵ֖/ךְ בְּ/לֵ֥ב יַמִּֽים׃
translation:
  text: Into great waters your rowers brought you; the east wind shattered you in
    the heart of the seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in great waters' or 'upon many waters.' The Hebrew preposition can be
      rendered in several ways, but the motion implied by 'brought you' favors 'into
      great waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the midst of the seas.' Hebrew 'heart of the seas' is an idiom for
      the inner part or midst.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/מַיִם רַבִּים
  chosen: into great waters
  alternatives:
  - in great waters
  - upon many waters
  lexicon: HALOT
  rationale: The preposition ב can be rendered broadly as in/into/among depending
    on motion and context. Because הֱבִיאוּךְ ('they brought you') implies movement,
    'into great waters' best reflects the sense of being taken out into deep/open
    waters. רַבִּים with מים idiomatically conveys abundance/expanse, so 'great waters'
    is more natural here than a strictly numerical 'many waters'.
- source_word: הֱבִיאוּךְ
  chosen: brought you
  alternatives:
  - have brought you
  - led you
  lexicon: HALOT
  rationale: From בוא/הביא in the Hiphil, 'bring' is the standard causative sense.
    English simple past fits the prophetic lament context.
- source_word: הַשָּׁטִים
  chosen: your rowers
  alternatives:
  - the rowers
  - those who ply the oars
  - mariners
  lexicon: HALOT
  rationale: The participial form from שׁוט/שׁיט in this nautical context refers specifically
    to those who propel the ship. Because the verb already carries a 2fs suffix ('brought
    you'), supplying 'your rowers' makes the relationship explicit and idiomatic in
    English, matching the personified ship/Tyre imagery in context.
- source_word: רוּחַ הַקָּדִים
  chosen: the east wind
  alternatives:
  - an east wind
  lexicon: HALOT
  rationale: A definite noun phrase is present. In Hebrew poetry and prophetic imagery,
    'the east wind' is a familiar destructive wind, so the definite rendering is appropriate.
- source_word: שְׁבָרֵךְ
  chosen: shattered you
  alternatives:
  - broke you
  - wrecked you
  lexicon: HALOT
  rationale: From שׁבר, the sense is violent breaking. 'Shattered' conveys the force
    of catastrophic destruction in the shipwreck metaphor more vividly than the flatter
    'broke,' while remaining faithful to the lexical sense.
- source_word: בְּלֵב יַמִּים
  chosen: in the heart of the seas
  alternatives:
  - in the midst of the seas
  - in the deep of the seas
  lexicon: HALOT
  rationale: לֵב ('heart') is a common Hebrew metaphor for the inner/middle part.
    Retaining 'heart' preserves the imagery and poetic force, while 'of the seas'
    reflects the plural יַמִּים, likely intensifying the maritime setting rather than
    requiring singular 'sea'.
