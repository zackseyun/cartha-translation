id: EZK.27.32
reference: Ezekiel 27:32
source:
  edition: WLC
  text: וְ/נָשְׂא֨וּ אֵלַ֤יִ/ךְ בְּ/נִי/הֶם֙ קִינָ֔ה וְ/קוֹנְנ֖וּ עָלָ֑יִ/ךְ מִ֣י
    כְ/צ֔וֹר כְּ/דֻמָ֖ה בְּ/ת֥וֹךְ הַ/יָּֽם׃
translation:
  text: 'They will raise a lamentation over you in their wailing, and they will lament
    over you: ‘Who is like Tyre, silenced in the midst of the sea?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who is like Tyre, brought to silence in the midst of the sea?' The Hebrew
      term can denote being stilled, silenced, or laid waste.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'in their wailing' is textually and lexically difficult;
      some understand it differently, including readings related to 'their sons.'
      The mourning context favors the sense of lamenting cry.
    reason: textual_variant
lexical_decisions:
- source_word: וְנָשְׂאוּ
  chosen: they will raise
  alternatives:
  - they will take up
  - they will lift up
  lexicon: HALOT
  rationale: נשא with קינה is an idiom for beginning or uttering a lament; 'raise'
    preserves the image while sounding natural in English.
- source_word: אֵלַיִךְ
  chosen: over you
  alternatives:
  - to you
  - against you
  lexicon: HALOT
  rationale: Although the preposition is אל, in this lament context English 'over
    you' best conveys the sense of directing a lament concerning Tyre.
- source_word: בְּנִיהֶם
  chosen: in their wailing
  alternatives:
  - with their sons
  - with their voice
  lexicon: HALOT
  rationale: The consonantal form is commonly understood here in context as referring
    to lamenting cry/wailing rather than literal 'sons.' The surrounding terms קינה
    and קוננו strongly favor a mourning expression. 'In their wailing' captures the
    instrumental/circumstantial force of בְּ.
- source_word: קִינָה
  chosen: a lamentation
  alternatives:
  - a dirge
  - a lament
  lexicon: HALOT
  rationale: קינה is a formal lament or dirge. 'Lamentation' preserves the elevated
    funeral-song sense without sounding overly technical.
- source_word: וְקוֹנְנוּ
  chosen: and they will lament
  alternatives:
  - and they will chant a dirge
  - and they will wail
  lexicon: HALOT
  rationale: The verb from קונן denotes performing a lament. 'Lament' keeps the lexical
    connection with קינה while remaining readable.
- source_word: עָלַיִךְ
  chosen: over you
  alternatives:
  - concerning you
  lexicon: HALOT
  rationale: על with lament language is naturally rendered 'over you' in English funeral/mourning
    idiom.
- source_word: מִי כְצוֹר
  chosen: Who is like Tyre
  alternatives:
  - Who is like Ṣor
  lexicon: HALOT
  rationale: The interrogative comparison introduces the content of the lament. The
    place name is rendered by standard English transliteration 'Tyre.'
- source_word: כְּדֻמָה
  chosen: silenced
  alternatives:
  - destroyed
  - made still
  - brought to silence
  lexicon: HALOT
  rationale: From דמם/דמה in this passive-like adjectival form, the sense is being
    stilled or silenced. 'Silenced' fits the lament context and avoids overinterpreting
    as total destruction, though that is implied by context.
- source_word: בְּתוֹךְ הַיָּם
  chosen: in the midst of the sea
  alternatives:
  - in the heart of the sea
  - in the middle of the sea
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the poetic force and echoes the maritime
    setting of Tyre.
