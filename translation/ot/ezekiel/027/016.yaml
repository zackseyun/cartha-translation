id: EZK.27.16
reference: Ezekiel 27:16
source:
  edition: WLC
  text: אֲרָ֥ם סֹחַרְתֵּ֖/ךְ מֵ/רֹ֣ב מַעֲשָׂ֑יִ/ךְ בְּ֠/נֹפֶךְ אַרְגָּמָ֨ן וְ/רִקְמָ֤ה
    וּ/בוּץ֙ וְ/רָאמֹ֣ת וְ/כַדְכֹּ֔ד נָתְנ֖וּ בְּ/עִזְבוֹנָֽיִ/ךְ׃
translation:
  text: Aram traded with you because of your many products, giving turquoise, purple,
    embroidered cloth, fine linen, coral, and rubies for your wares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'emerald' or 'carbuncle' for 'turquoise'; the identification of the Hebrew
      gemstone name is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or possibly another luxury material such as 'mother-of-pearl'; the meaning
      of the Hebrew term rendered 'coral' is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'agate,' 'garnet,' or another precious stone; the exact identification
      of the Hebrew term rendered 'rubies' is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  - the Arameans
  lexicon: HALOT
  rationale: A proper name is best transliterated per project philosophy. In this
    trade-oracle context it may stand for the region or its merchants, but 'Aram'
    preserves the Hebrew designation without importing a modern geopolitical label.
- source_word: סֹחַרְתֵּךְ
  chosen: traded with you
  alternatives:
  - was your trader
  - did business with you
  lexicon: HALOT
  rationale: The participial/commercial form from סחר denotes merchant activity. 'Traded
    with you' is idiomatic modern English and fits the list of exchanged goods.
- source_word: מֵרֹב מַעֲשָׂיִךְ
  chosen: because of your many products
  alternatives:
  - from the abundance of your works
  - because of your many wares
  lexicon: HALOT
  rationale: Literally 'from the abundance of your works/made things.' In the commercial
    context of Ezekiel 27, this refers to Tyre's manufactured goods or commercial
    output. 'Products' communicates the sense naturally while preserving the causal
    idea introduced by מִן.
- source_word: נֹפֶךְ
  chosen: turquoise
  alternatives:
  - emerald
  - carbuncle
  lexicon: HALOT
  rationale: The precise gemstone is uncertain. 'Turquoise' is a common modern rendering
    in this verse's trade list, but the uncertainty should be preserved in a footnote
    because ancient gem identifications are debated.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple dye
  - purple cloth
  lexicon: HALOT
  rationale: The term denotes purple material/dye associated with luxury trade. 'Purple'
    is sufficiently clear in an itemized list.
- source_word: רִקְמָה
  chosen: embroidered cloth
  alternatives:
  - embroidery
  - embroidered work
  lexicon: HALOT
  rationale: The noun refers to embroidered textile work. 'Embroidered cloth' makes
    explicit the likely traded commodity in English.
- source_word: בוּץ
  chosen: fine linen
  alternatives:
  - byssus
  - linen
  lexicon: HALOT
  rationale: A fine linen textile is intended. 'Fine linen' is standard, clear English
    and avoids the less familiar 'byssus' in the main text.
- source_word: רָאמֹת
  chosen: coral
  alternatives:
  - heights
  - mother-of-pearl
  lexicon: HALOT
  rationale: The word is rare and uncertain. In this commercial list, many interpreters
    understand a luxury material such as coral. The uncertainty merits a footnote.
- source_word: כַדְכֹּד
  chosen: rubies
  alternatives:
  - agate
  - garnet
  - beryl
  lexicon: HALOT
  rationale: Another precious stone with uncertain identification. 'Rubies' is a plausible
    contextual rendering in a luxury-goods list, but the lexical uncertainty should
    be footnoted.
- source_word: נָתְנוּ
  chosen: giving
  alternatives:
  - they gave
  - they traded
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'they gave.' In English, 'giving' links smoothly
    to the preceding merchant clause and the following list of goods exchanged.
- source_word: בְּעִזְבוֹנָיִךְ
  chosen: for your wares
  alternatives:
  - for your goods
  - in exchange for your merchandise
  lexicon: HALOT
  rationale: The noun refers to traded goods/merchandise. 'For your wares' is concise
    and commercially natural in context.
