id: EZK.27.10
reference: Ezekiel 27:10
source:
  edition: WLC
  text: פָּרַ֨ס וְ/ל֤וּד וּ/פוּט֙ הָי֣וּ בְ/חֵילֵ֔/ךְ אַנְשֵׁ֖י מִלְחַמְתֵּ֑/ךְ מָגֵ֤ן
    וְ/כוֹבַע֙ תִּלּוּ בָ֔/ךְ הֵ֖מָּה נָתְנ֥וּ הֲדָרֵֽ/ךְ־׃
translation:
  text: Persia, Lud, and Put were in your army, your men of war. They hung shield
    and helmet in you; they gave your splendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They hung shield and helmet on you,' with the image of military equipment
      displayed on Tyre's walls or within the city.
    reason: lexical_alternative
  - marker: b
    text: Or 'they contributed to your glory' / 'they bestowed your majesty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַס
  chosen: Persia
  alternatives:
  - Paras
  lexicon: HALOT
  rationale: Proper place-name referring to Persia; standard English transliteration
    is appropriate for a nation name.
- source_word: לוּד
  chosen: Lud
  alternatives:
  - Lydia
  - Ludim
  lexicon: HALOT
  rationale: Transliterated as a people/place name per translation philosophy. 'Lydia'
    is interpretive and contextually possible in some traditions, but the Hebrew form
    is best preserved as 'Lud'.
- source_word: פוּט
  chosen: Put
  alternatives:
  - Phut
  lexicon: HALOT
  rationale: Transliterated ethnonym/place name. 'Phut' reflects older English tradition;
    'Put' more directly reflects the Hebrew consonants.
- source_word: בְחֵילֵךְ
  chosen: in your army
  alternatives:
  - in your force
  - among your wealth
  lexicon: HALOT
  rationale: חַיִל can denote military force, strength, or wealth depending on context.
    Here the following phrase 'men of your war' makes the military sense clear, so
    'in your army' is the most natural English rendering.
- source_word: אַנְשֵׁי מִלְחַמְתֵּךְ
  chosen: your men of war
  alternatives:
  - your warriors
  - the men of your warfare
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'men of your war.' 'Men of war'
    preserves the martial register and the masculine wording of the Hebrew.
- source_word: מָגֵן
  chosen: shield
  lexicon: HALOT
  rationale: Standard rendering for defensive weaponry.
- source_word: כוֹבַע
  chosen: helmet
  lexicon: HALOT
  rationale: Standard rendering for military headgear.
- source_word: תִּלּוּ בָךְ
  chosen: they hung in you
  alternatives:
  - they hung on you
  - they displayed in you
  lexicon: HALOT
  rationale: The verb תלה means 'hang.' With Tyre addressed as feminine singular,
    בָךְ is literally 'in you.' In idiomatic English for a city, 'in you' is unusual
    but defensible; the main text keeps it to reflect the Hebrew image of equipment
    hung within the city.
- source_word: הֵמָּה נָתְנוּ הֲדָרֵךְ
  chosen: they gave your splendor
  alternatives:
  - they bestowed your majesty
  - they contributed to your glory
  lexicon: HALOT
  rationale: הָדָר denotes splendor, majesty, adornment, or glory. In context the
    foreign troops and their displayed arms enhance Tyre's magnificence, so 'they
    gave your splendor' concisely preserves the Hebrew idiom.
