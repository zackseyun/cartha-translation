id: EZK.27.28
reference: Ezekiel 27:28
source:
  edition: WLC
  text: לְ/ק֖וֹל זַעֲקַ֣ת חֹבְלָ֑יִ/ךְ יִרְעֲשׁ֖וּ מִגְרֹשֽׁוֹת׃
translation:
  text: At the sound of the cry of your sailors, the pasturelands will quake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your rowers' for 'your sailors'; the Hebrew term can refer more specifically
      to a ship's oarsmen or seamen.
    reason: lexical_alternative
  - marker: b
    text: Or 'the open lands' or 'the common lands'; older versions often have 'suburbs,'
      but the Hebrew refers to outlying land around a settlement rather than modern
      suburbs.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקוֹל
  chosen: At the sound of
  alternatives:
  - At the voice of
  - At the noise of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound, voice, or noise. With prefixed לְ introducing
    circumstance, 'At the sound of' is idiomatic English and preserves the causal-temporal
    sense.
- source_word: זַעֲקַת
  chosen: the cry of
  alternatives:
  - the outcry of
  - the shouting of
  lexicon: HALOT
  rationale: From זעק, denoting a cry or outcry, often in distress. 'Cry' is the most
    natural rendering here in a lament context.
- source_word: חֹבְלָיִךְ
  chosen: your sailors
  alternatives:
  - your rowers
  - your mariners
  lexicon: HALOT
  rationale: Though the root can refer to those who handle ropes or steer ships and
    is sometimes rendered 'rowers' in maritime contexts, in Ezekiel 27 the term broadly
    denotes Tyre's shipmen. 'Sailors' is clear modern English and fits optimal equivalence;
    'rowers' is preserved as an alternative because of the nautical specificity.
- source_word: יִרְעֲשׁוּ
  chosen: will quake
  alternatives:
  - will shake
  - will tremble
  lexicon: HALOT
  rationale: רעש conveys shaking, quaking, or trembling. 'Will quake' captures the
    vivid physical disturbance in poetic judgment language.
- source_word: מִגְרֹשׁוֹת
  chosen: the pasturelands
  alternatives:
  - the open lands
  - the common lands
  - the suburbs
  lexicon: HALOT
  rationale: מִגְרָשׁ often refers to open land or pastureland around a settlement.
    Older English 'suburbs' can mislead modern readers into an urban-residential sense
    foreign to the Hebrew. 'Pasturelands' best reflects the likely sense of outlying
    open lands, while alternatives are preserved.
