id: EZK.27.3
reference: Ezekiel 27:3
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ לְ/צ֗וֹר ה/ישבתי עַל מְבוֹאֹ֣ת יָ֔ם רֹכֶ֨לֶת֙ הָֽ/עַמִּ֔ים אֶל אִיִּ֖ים רַבִּ֑ים כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה צ֕וֹר אַ֣תְּ אָמַ֔רְתְּ אֲנִ֖י כְּלִ֥ילַת יֹֽפִי־־׃
translation:
  text: 'and say to Tyre, who dwells at the entrances of the sea, trader of the peoples to many coastlands: Thus says the Lord GOD: Tyre, you have said, ‘I am perfect in beauty.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to many islands.' The Hebrew term can refer to islands or, more broadly, maritime coastlands.
    reason: lexical_alternative
lexical_decisions:
- source_word: הישבתי
  chosen: who dwells
  alternatives:
  - inhabiting
  - situated
  lexicon: HALOT
  rationale: Qal participle feminine singular modifying Tyre; rendered as a relative clause in natural English while preserving the ongoing/state sense.
- source_word: מְבוֹאֹת יָם
  chosen: the entrances of the sea
  alternatives:
  - the gateways of the sea
  - the approaches to the sea
  - the seafaring entrances
  lexicon: HALOT
  rationale: מְבוֹאֹת literally denotes entrances/approaches. Retaining 'entrances' preserves the concrete maritime imagery of Tyre's strategic location better than a looser paraphrase.
- source_word: רֹכֶלֶת
  chosen: merchant
  alternatives:
  - trader
  - trafficker
  lexicon: HALOT
  rationale: The feminine participle agrees with Tyre and denotes commercial activity. 'Merchant' is clear modern English and fits the city's personification.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים often means peoples/nations. 'Peoples' better reflects the plural ethnic sense in a trade context.
- source_word: אֶל אִיִּים רַבִּים
  chosen: to many coastlands
  alternatives:
  - to many islands
  - for many coastlands
  lexicon: HALOT
  rationale: אִיִּים can denote islands or coastlands. In prophetic geography it often refers broadly to maritime lands across the sea; 'coastlands' best captures that wider sense.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD' in general; in the compound title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by rendering 'the Lord GOD,' which preserves the title distinction naturally.
- source_word: כְּלִילַת יֹפִי
  chosen: perfect in beauty
  alternatives:
  - perfect in loveliness
  - the perfection of beauty
  - complete in beauty
  lexicon: HALOT
  rationale: The phrase expresses claimed consummate beauty. 'Perfect in beauty' is idiomatic English and preserves the boastful force. 'The perfection of beauty' is possible but less natural after 'I am.'
