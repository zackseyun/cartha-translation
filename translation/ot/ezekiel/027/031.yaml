id: EZK.27.31
reference: Ezekiel 27:31
source:
  edition: WLC
  text: וְ/הִקְרִ֤יחוּ אֵלַ֨יִ/ךְ֙ קָרְחָ֔ה וְ/חָגְר֖וּ שַׂקִּ֑ים וּ/בָכ֥וּ אֵלַ֛יִ/ךְ
    בְּ/מַר נֶ֖פֶשׁ מִסְפֵּ֥ד מָֽר־׃
translation:
  text: They will make themselves bald for you, and put on sackcloth, and they will
    weep over you with bitter soul, with bitter mourning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''with bitterness of soul''; the expression denotes deep inner
      anguish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיחוּ
  chosen: will make themselves bald
  alternatives:
  - will shave themselves bald
  - will make bald
  lexicon: HALOT
  rationale: Hiphil of קרח in mourning context denotes causing baldness/shaving the
    head as a sign of lament. 'Make themselves bald' preserves the causative nuance
    while remaining natural English.
- source_word: אֵלַיִךְ
  chosen: for you
  alternatives:
  - because of you
  - over you
  lexicon: HALOT
  rationale: The preposition אֶל with lament language can indicate direction toward
    the addressee or occasion on account of her. Here 'for you' fits the first clause
    naturally in English, expressing mourning on Tyre's account.
- source_word: קָרְחָה
  chosen: bald
  alternatives:
  - baldness
  lexicon: HALOT
  rationale: 'The noun literally means ''baldness,'' but in idiomatic English after
    the verb it is best represented adjectivally: ''make themselves bald.'''
- source_word: וְחָגְרוּ שַׂקִּים
  chosen: put on sackcloth
  alternatives:
  - gird themselves with sackcloth
  - wear sackcloth
  lexicon: HALOT
  rationale: The Hebrew literally says 'gird on sackcloths.' 'Put on sackcloth' is
    a clear modern equivalent for the mourning practice without losing the image.
- source_word: וּבָכוּ
  chosen: they will weep
  alternatives:
  - they will cry
  - they will lament
  lexicon: HALOT
  rationale: בכה is the ordinary verb 'weep/cry.' 'Weep' best matches the solemn lament
    context.
- source_word: אֵלַיִךְ
  chosen: over you
  alternatives:
  - for you
  - because of you
  lexicon: HALOT
  rationale: With the verb 'weep,' English idiom prefers 'over you' to express lament
    directed toward Tyre.
- source_word: בְּמַר נֶפֶשׁ
  chosen: with bitter soul
  alternatives:
  - with bitterness of soul
  - with bitter grief
  lexicon: HALOT
  rationale: Literally 'in/with bitterness of soul.' 'With bitter soul' is somewhat
    formal but preserves the Hebrew anthropological expression נפשׁ rather than flattening
    it entirely to 'grief.'
- source_word: מִסְפֵּד מָר
  chosen: with bitter mourning
  alternatives:
  - a bitter lamentation
  - bitter wailing
  lexicon: HALOT
  rationale: The phrase intensifies the lament. Rendering it as a second coordinated
    phrase with 'with' reflects the Hebrew appositional piling up of mourning expressions.
