id: EZK.27.2
reference: Ezekiel 27:2
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֔ם שָׂ֥א עַל צֹ֖ר קִינָֽה־־׃
translation:
  text: And you, son of man, raise a lamentation over Tyre,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take up a lament over Tyre.' The Hebrew verb literally means 'lift up'
      and is a standard idiom for beginning a lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: And you,
  alternatives:
  - Now you,
  lexicon: HALOT
  rationale: The conjunction with independent pronoun marks direct address and a transition.
    'And you' preserves the Hebrew discourse flow without overinterpreting the conjunction.
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address formula. 'Son of man' preserves
    the established idiom and the gender-accurate wording of the Hebrew, rather than
    flattening it to a dynamic equivalent.
- source_word: שָׂא
  chosen: raise
  alternatives:
  - lift up
  - take up
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry,' but in prophetic lament contexts
    it idiomatically introduces the utterance of a lament. 'Raise' is natural English
    while still reflecting the metaphor better than the more interpretive 'sing' or
    'utter'.
- source_word: עַל
  chosen: over
  alternatives:
  - concerning
  - against
  lexicon: HALOT
  rationale: With lament language, עַל commonly marks the object or subject of mourning.
    'Over' is the most idiomatic English choice for lamentation and avoids importing
    hostility implied by 'against'.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: קִינָה
  chosen: lamentation
  alternatives:
  - lament
  - dirge
  lexicon: HALOT
  rationale: The noun denotes a formal lament or dirge. 'Lamentation' preserves the
    elevated prophetic register; 'dirge' is possible but somewhat narrower and more
    stylistically marked in modern English.
