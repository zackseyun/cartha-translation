id: EZK.27.18
reference: Ezekiel 27:18
source:
  edition: WLC
  text: דַּמֶּ֧שֶׂק סֹחַרְתֵּ֛/ךְ בְּ/רֹ֥ב מַעֲשַׂ֖יִ/ךְ מֵ/רֹ֣ב כָּל ה֑וֹן בְּ/יֵ֥ין
    חֶלְבּ֖וֹן וְ/צֶ֥מֶר צָֽחַר־׃
translation:
  text: Damascus traded with you because of your many products, because of your abundant
    wealth, with wine from Helbon and white wool.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Damascus was your trader ... with Helbon wine and bright wool.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּמֶּשֶׂק
  chosen: Damascus
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard English convention per
    translation philosophy.
- source_word: סֹחַרְתֵּךְ
  chosen: traded with you
  alternatives:
  - was your trader
  - did business with you
  - was your merchant
  lexicon: HALOT
  rationale: From סחר in a commercial context. The form with 2fs suffix addresses
    Tyre directly. 'Traded with you' is idiomatic modern English and preserves the
    bilateral commercial sense better than the more wooden 'was your trader.'
- source_word: בְּרֹב מַעֲשַׂיִךְ
  chosen: because of your many products
  alternatives:
  - for the abundance of your wares
  - with your many goods
  lexicon: HALOT
  rationale: מַעֲשֶׂה literally means 'work/deed/made thing,' but in Ezekiel 27's
    trade catalogue it refers to commercial output or wares. 'Products' is readable
    modern English and fits the mercantile context. בְּ here is taken in a causal/instrumental-commercial
    sense.
- source_word: מֵרֹב כָּל הוֹן
  chosen: because of your abundant wealth
  alternatives:
  - because of the abundance of all wealth
  - from the abundance of every kind of riches
  lexicon: HALOT
  rationale: הוֹן denotes wealth/riches. The phrase intensifies Tyre's commercial
    prosperity. A highly literal rendering ('abundance of all wealth') is awkward
    in English; 'abundant wealth' conveys the sense naturally while retaining the
    emphasis.
- source_word: בְּיֵין חֶלְבּוֹן
  chosen: with wine from Helbon
  alternatives:
  - with Helbon wine
  lexicon: HALOT
  rationale: Helbon is a known place associated with prized wine near Damascus. The
    preposition marks the commodity of trade. 'Wine from Helbon' is slightly more
    explicit for modern readers than the attributive form.
- source_word: וְצֶמֶר צָחַר
  chosen: and white wool
  alternatives:
  - and bright wool
  - and gleaming wool
  lexicon: HALOT
  rationale: צֶמֶר is 'wool.' צָחַר here is commonly understood as an adjective meaning
    bright/white/shining. 'White wool' is the clearest idiomatic rendering in a list
    of trade goods.
