id: EZK.27.6
reference: Ezekiel 27:6
source:
  edition: WLC
  text: אַלּוֹנִים֙ מִ/בָּ֔שָׁן עָשׂ֖וּ מִשּׁוֹטָ֑יִ/ךְ קַרְשֵׁ֤/ךְ עָֽשׂוּ שֵׁן֙
    בַּת אֲשֻׁרִ֔ים מֵ/אִיֵּ֖י כתים־־׃
translation:
  text: They made your oars of oaks from Bashan; they made your deck of ivory inlaid
    in cypress from the coasts of Kittim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they made your planks/boards of ivory.' The Hebrew term may refer more
      specifically to the ship's planking than to its deck.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is difficult: ''ivory, daughter of Ashurim.'' Many understand this
      to refer to ivory inlaid in cypress or boxwood from Kittim.'
    reason: alternative_reading
  - marker: c
    text: '''Kittim'' likely refers to Cyprus or nearby western maritime regions.'
    reason: cultural_note
lexical_decisions:
- source_word: אַלּוֹנִים
  chosen: oaks
  alternatives:
  - terebinths
  lexicon: HALOT
  rationale: The noun commonly denotes large hardwood trees, often rendered 'oaks.'
    In this maritime-building context, 'oaks' fits the sense of strong timber and
    is the standard rendering for Bashan's famed forests.
- source_word: מִבָּשָׁן
  chosen: from Bashan
  lexicon: HALOT
  rationale: A geographic source designation. Bashan was known for its timber, so
    the straightforward place-name transliteration is best.
- source_word: מִשּׁוֹטַיִךְ
  chosen: your oars
  alternatives:
  - your poles
  lexicon: HALOT
  rationale: In the ship metaphor of Ezekiel 27, the term refers to rowing implements.
    'Oars' is the clearest contextual rendering.
- source_word: קַרְשֵׁךְ
  chosen: your deck
  alternatives:
  - your planks
  - your boards
  lexicon: HALOT
  rationale: The noun can denote boards/planking. In this shipbuilding context, English
    'deck' communicates the function naturally, while still reflecting a structural
    wooden surface. Because the exact component is debated, alternatives are preserved
    in a footnote.
- source_word: שֵׁן
  chosen: ivory
  alternatives:
  - tooth
  lexicon: HALOT
  rationale: Literally 'tooth,' but in material descriptions it idiomatically means
    ivory. Here it describes luxury ship construction material.
- source_word: בַּת אֲשֻׁרִים
  chosen: inlaid in cypress
  alternatives:
  - daughter of Asshurites
  - boxwood
  - larch
  lexicon: HALOT
  rationale: This phrase is textually and lexically difficult. Many modern translations
    understand it as a kind of wood, often cypress or boxwood, used together with
    ivory in decorative work. Given the shipbuilding context and the parallel material
    list, rendering the phrase as a wood-specification yields the most coherent sense
    in English. The more literal but obscure reading is preserved in a footnote.
- source_word: מֵאִיֵּי כִתִּים
  chosen: from the coasts of Kittim
  alternatives:
  - from the islands of Kittim
  - from Cyprus
  lexicon: HALOT
  rationale: אִיִּים can mean islands/coastlands. 'Coasts' fits idiomatic English
    in a trade-oracle context. 'Kittim' is best transliterated as a place-name, though
    it likely refers broadly to Cyprus or the western maritime region.
