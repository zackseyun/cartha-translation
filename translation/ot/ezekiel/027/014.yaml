id: EZK.27.14
reference: Ezekiel 27:14
source:
  edition: WLC
  text: מִ/בֵּ֖ית תּוֹגַרְמָ֑ה סוּסִ֤ים וּ/פָֽרָשִׁים֙ וּ/פְרָדִ֔ים נָתְנ֖וּ עִזְבוֹנָֽיִ/ךְ׃
translation:
  text: From Beth-togarmah they traded horses, war horses, and mules for your wares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From the house of Togarmah.' The Hebrew expression can denote a people
      or region associated with Togarmah, not necessarily a literal household.
    reason: lexical_alternative
  - marker: b
    text: Or 'horsemen' or 'cavalry horses' for 'war horses.' The Hebrew term often
      refers to riders/cavalry, but here the trade context favors an equine sense.
    reason: alternative_reading
lexical_decisions:
- source_word: מִבֵּית תּוֹגַרְמָה
  chosen: From Beth-togarmah
  alternatives:
  - From the house of Togarmah
  - From Togarmah
  lexicon: HALOT
  rationale: בֵּית literally means 'house,' but in geographic/ethnic expressions it
    commonly denotes a people or region associated with a named ancestor/place. Since
    Ezekiel 27 lists trading partners by region/people, 'Beth-togarmah' preserves
    the proper name transparently without over-interpreting it as a literal household.
    Hyphenation reflects standard English transliteration of the place name.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: The standard plural noun for horses; straightforward in this trade list.
- source_word: וּפָרָשִׁים
  chosen: war horses
  alternatives:
  - horsemen
  - cavalry horses
  lexicon: HALOT
  rationale: Though פָרָשִׁים can denote horsemen/cavalry in many contexts, here it
    appears in a merchandise list alongside horses and mules. Since human riders are
    less likely to be listed as trade goods here, the sense 'war horses' or cavalry
    horses best fits the commercial context. 'War horses' is concise and natural English.
- source_word: וּפְרָדִים
  chosen: mules
  lexicon: HALOT
  rationale: Standard rendering of the animal term; fits the list of traded livestock.
- source_word: נָתְנוּ
  chosen: they traded
  alternatives:
  - they gave
  - they supplied
  lexicon: HALOT
  rationale: 'Literally ''they gave,'' but in Ezekiel 27 the verb functions idiomatically
    in a commercial register: these nations ''gave'' goods as Tyre''s trade payment
    or exchange. ''They traded'' communicates the mercantile sense in readable modern
    English.'
- source_word: עִזְבוֹנָיִךְ
  chosen: your wares
  alternatives:
  - your merchandise
  - your goods
  lexicon: HALOT
  rationale: This noun in Ezekiel 27 refers to commercial goods/merchandise. 'Your
    wares' is idiomatic, concise, and suits the trade-catalog style, while preserving
    the sense of marketable goods belonging to Tyre.
