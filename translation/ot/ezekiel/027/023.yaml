id: EZK.27.23
reference: Ezekiel 27:23
source:
  edition: WLC
  text: חָרָ֤ן וְ/כַנֵּה֙ וָ/עֶ֔דֶן רֹכְלֵ֖י שְׁבָ֑א אַשּׁ֖וּר כִּלְמַ֥ד רֹכַלְתֵּֽ/ךְ׃
translation:
  text: Haran and Canneh and Eden, the merchants of Sheba, Asshur, and Kilmad, traded
    with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Calneh” for Canneh.
    reason: lexical_alternative
  - marker: b
    text: Or “Assyria” for Asshur.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרָן
  chosen: Haran
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: כַנֵּה
  chosen: Canneh
  alternatives:
  - Calneh
  lexicon: HALOT
  rationale: Proper place name. 'Canneh' reflects a direct transliteration of the
    consonantal form here; 'Calneh' is a traditional alternative associated with other
    passages and is worth preserving as a lexical alternative.
- source_word: עֶדֶן
  chosen: Eden
  lexicon: HALOT
  rationale: Proper place name here, not the garden motif. Transliteration is appropriate
    in this trade-oracle list of regions/cities.
- source_word: רֹכְלֵי
  chosen: the merchants of
  alternatives:
  - traders of
  lexicon: HALOT
  rationale: Construct plural from רכל, referring to commercial traders. 'Merchants
    of' is idiomatic in English and fits the construct relation with Sheba.
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Proper place/people name in a commercial context; transliterated.
- source_word: אַשּׁוּר
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: HALOT
  rationale: The Hebrew form is the proper name Asshur. 'Assyria' is a possible contextual
    rendering for the region/empire, but 'Asshur' more closely follows the source
    form and preserves the sequence of named trading partners.
- source_word: כִּלְמַד
  chosen: Kilmad
  lexicon: HALOT
  rationale: Rare proper place name; transliteration is the most transparent choice
    given lexical uncertainty.
- source_word: רֹכַלְתֵּךְ
  chosen: traded with you
  alternatives:
  - were your traders
  - did business with you
  lexicon: HALOT
  rationale: Qal perfect 3rd feminine singular with 2fs suffix from רכל in the commercial
    sense. In context, the clause summarizes the named parties' commercial dealings
    with Tyre. 'Traded with you' is natural modern English while preserving the core
    sense.
