id: EZK.27.12
reference: Ezekiel 27:12
source:
  edition: WLC
  text: תַּרְשִׁ֥ישׁ סֹחַרְתֵּ֖/ךְ מֵ/רֹ֣ב כָּל ה֑וֹן בְּ/כֶ֤סֶף בַּרְזֶל֙ בְּדִ֣יל
    וְ/עוֹפֶ֔רֶת נָתְנ֖וּ עִזְבוֹנָֽיִ/ךְ־׃
translation:
  text: Tarshish was your trader because of your abundant wealth; with silver, iron,
    tin, and lead they paid for your wares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tarshish may refer to the distant trading region later identified by some
      with Tartessus in Spain.
    reason: cultural_note
  - marker: b
    text: Or “they gave for your merchandise.” The Hebrew verb is simply “gave,” but
      here it functions in a trade context.
    reason: lexical_alternative
  - marker: c
    text: Or “your merchandise” or “your goods.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּרְשִׁישׁ
  chosen: Tarshish
  alternatives:
  - Tartessus
  lexicon: HALOT
  rationale: Proper place name; per philosophy, names are transliterated rather than
    translated. Some identify it with Tartessus, but the text gives the name, not
    the interpretation.
- source_word: סֹחַרְתֵּךְ
  chosen: your trader
  alternatives:
  - your trading partner
  - your merchant
  lexicon: HALOT
  rationale: From סחר, denoting commerce/trading. Singular feminine form with 2fs
    suffix agrees with Tyre addressed as feminine. 'Your trader' is a concise rendering;
    the collective sense can be represented in English without forcing plural.
- source_word: מֵרֹב כָּל הוֹן
  chosen: because of your abundant wealth
  alternatives:
  - from the abundance of all wealth
  - because of the abundance of all riches
  lexicon: HALOT
  rationale: 'מִן here is causal or explanatory in context: Tarshish traded with Tyre
    on account of Tyre''s great wealth/resources. הוֹן denotes wealth/riches. ''Abundant
    wealth'' gives natural English while preserving the sense of superabundance.'
- source_word: בְּכֶסֶף בַּרְזֶל בְּדִיל וְעוֹפֶרֶת
  chosen: with silver, iron, tin, and lead
  alternatives:
  - in silver, iron, tin, and lead
  lexicon: HALOT
  rationale: List of trade commodities/instruments of exchange. 'With' fits idiomatic
    English for payment or exchange while preserving the preposition's instrumental
    sense.
- source_word: נָתְנוּ
  chosen: they paid
  alternatives:
  - they gave
  - they traded
  lexicon: HALOT
  rationale: Basic sense is 'they gave,' but in this mercantile context the verb refers
    to giving goods in exchange. 'They paid' makes the commercial force explicit without
    overparaphrasing.
- source_word: עִזְבוֹנָיִךְ
  chosen: your wares
  alternatives:
  - your goods
  - your merchandise
  lexicon: HALOT
  rationale: Commercial term in Ezekiel 27 for articles of trade. 'Wares' is concise,
    natural, and suitably specific to merchant inventory.
