id: EZK.27.33
reference: Ezekiel 27:33
source:
  edition: WLC
  text: בְּ/צֵ֤את עִזְבוֹנַ֨יִ/ךְ֙ מִ/יַּמִּ֔ים הִשְׂבַּ֖עַתְּ עַמִּ֣ים רַבִּ֑ים בְּ/רֹ֤ב
    הוֹנַ֨יִ/ךְ֙ וּ/מַ֣עֲרָבַ֔יִ/ךְ הֶעֱשַׁ֖רְתְּ מַלְכֵי אָֽרֶץ־׃
translation:
  text: When your wares went out from the seas, you satisfied many peoples; with your
    abundant wealth and your merchandise you enriched the kings of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your goods' for 'your wares' (עִזְבוֹנַיִךְ); both refer to Tyre's trade
      cargo in this lament.
    reason: lexical_alternative
  - marker: b
    text: Or 'the kings of the land' for 'the kings of the earth'; Hebrew אֶרֶץ can
      mean either depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֵאת
  chosen: When ... went out
  alternatives:
  - as ... went out
  - at the going out of
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct of יצא introduces a temporal
    clause. 'When ... went out' is natural English and preserves the temporal sense
    without awkward literalism.
- source_word: עִזְבוֹנַיִךְ
  chosen: your wares
  alternatives:
  - your goods
  - your merchandise
  lexicon: HALOT
  rationale: The noun refers to trade goods or articles of commerce in this Tyre oracle.
    'Wares' fits the commercial setting and avoids redundancy with the later מַעֲרָבַיִךְ,
    which can be rendered 'merchandise.'
- source_word: מִיַּמִּים
  chosen: from the seas
  alternatives:
  - from the sea
  - from the oceans
  lexicon: HALOT
  rationale: The plural is retained as 'seas,' matching the maritime imagery and the
    Hebrew form better than a singular smoothing.
- source_word: הִשְׂבַּעַתְּ
  chosen: you satisfied
  alternatives:
  - you filled
  - you supplied abundantly
  lexicon: HALOT
  rationale: In the Hiphil, שבע commonly means to satisfy or fill. Here it describes
    Tyre's trade meeting the desires or needs of many peoples; 'satisfied' captures
    that commercial abundance well.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples
  lexicon: HALOT
  rationale: '''Peoples'' is more literal for עמים and preserves the ethnic-national
    sense without over-specifying as modern nation-states.'
- source_word: בְּרֹב
  chosen: with your abundant
  alternatives:
  - by the abundance of your
  - through the greatness of your
  lexicon: HALOT
  rationale: The preposition marks means or circumstance. 'With your abundant ...'
    is idiomatic English and conveys the instrumental sense.
- source_word: הוֹנַיִךְ
  chosen: wealth
  alternatives:
  - riches
  - abundance
  lexicon: HALOT
  rationale: The noun denotes wealth or riches. 'Wealth' is concise and fits the economic
    context.
- source_word: וּמַעֲרָבַיִךְ
  chosen: your merchandise
  alternatives:
  - your trade goods
  - your exchange goods
  lexicon: HALOT
  rationale: In Ezekiel 27 this noun belongs to the vocabulary of trade and exchange.
    'Merchandise' is the clearest modern rendering in context. Since עִזְבוֹנַיִךְ
    already covers 'wares,' the slight variation avoids wooden repetition while keeping
    the commercial sense.
- source_word: הֶעֱשַׁרְתְּ
  chosen: you enriched
  alternatives:
  - you made rich
  lexicon: HALOT
  rationale: The Hiphil of עשר means to make rich or enrich. 'You enriched' is direct
    and idiomatic.
- source_word: מַלְכֵי אָרֶץ
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: HALOT
  rationale: Although ארץ can mean 'land,' in this international trade lament the
    broader sense 'earth' best fits the scope of Tyre's influence and preserves the
    elevated rhetoric.
