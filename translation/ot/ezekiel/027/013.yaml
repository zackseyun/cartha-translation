id: EZK.27.13
reference: Ezekiel 27:13
source:
  edition: WLC
  text: יָוָ֤ן תֻּבַל֙ וָ/מֶ֔שֶׁךְ הֵ֖מָּה רֹֽכְלָ֑יִ/ךְ בְּ/נֶ֤פֶשׁ אָדָם֙ וּ/כְלֵ֣י
    נְחֹ֔שֶׁת נָתְנ֖וּ מַעֲרָבֵֽ/ךְ׃
translation:
  text: Javan, Tubal, and Meshech—they were your traders; they exchanged human lives
    and articles of bronze for your wares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'persons'; in context this likely refers to people sold in trade, that
      is, slaves.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָוָן
  chosen: Javan
  alternatives:
  - Greece
  lexicon: HALOT
  rationale: A proper name for a people/place, so transliterated per project policy.
    'Greece' is a contextual identification but less formally tied to the Hebrew ethnonym.
- source_word: תֻּבַל
  chosen: Tubal
  lexicon: HALOT
  rationale: Proper name of a people/region; transliteration preserves the Hebrew
    form.
- source_word: מֶשֶׁךְ
  chosen: Meshech
  lexicon: HALOT
  rationale: Proper name of a people/region; transliteration preserves the Hebrew
    form.
- source_word: רֹכְלָיִךְ
  chosen: your traders
  alternatives:
  - your merchants
  lexicon: HALOT
  rationale: The noun refers to commercial partners or merchants. 'Traders' is natural
    modern English and fits the trade-oracle context; 'merchants' is a viable alternative.
- source_word: בְּנֶפֶשׁ אָדָם
  chosen: human lives
  alternatives:
  - persons
  - slaves
  lexicon: HALOT
  rationale: Literally 'with soul/life of man.' In this trade context it denotes humans
    as trade goods. 'Human lives' preserves the starkness without over-specifying
    legal status; 'slaves' is interpretive though often contextually implied, and
    'persons' is more neutral but weaker.
- source_word: כְלֵי נְחֹשֶׁת
  chosen: articles of bronze
  alternatives:
  - vessels of bronze
  - objects of bronze
  lexicon: HALOT
  rationale: A broad expression for manufactured bronze goods. 'Articles' is idiomatic
    and suitably general; 'vessels' would be too narrow.
- source_word: נָתְנוּ
  chosen: they exchanged
  alternatives:
  - they gave
  - they traded
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in a commercial context with the
    object 'your wares' it idiomatically means they offered/exchanged these goods
    in trade.
- source_word: מַעֲרָבֵךְ
  chosen: your wares
  alternatives:
  - your merchandise
  - your market
  lexicon: HALOT
  rationale: In Ezekiel 27 this noun belongs to the semantic field of trade and exchanged
    goods. 'Your wares' is concise, natural English; 'your merchandise' is slightly
    more formal; 'your market' is possible in some contexts but less fitting here
    where exchanged goods are in view.
