id: EZK.27.19
reference: Ezekiel 27:19
source:
  edition: WLC
  text: וְדָ֤ן וְ/יָוָן֙ מְ/אוּזָּ֔ל בְּ/עִזְבוֹנַ֖יִ/ךְ נָתָ֑נּוּ בַּרְזֶ֤ל עָשׁוֹת֙
    קִדָּ֣ה וְ/קָנֶ֔ה בְּ/מַעֲרָבֵ֖/ךְ הָיָֽה׃
translation:
  text: Dan and Javan from Uzal traded with you; they exchanged wrought iron, cassia,
    and cane for your wares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Dan'; some read 'Vedan' or otherwise emend the name because the
      text is difficult.
    reason: textual_variant
  - marker: b
    text: Or 'Javan from Uzal.' The relation between 'Javan' and 'Uzal' is syntactically
      difficult in Hebrew.
    reason: alternative_reading
  - marker: c
    text: Or 'calamus' or 'sweet cane.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָן
  chosen: Dan
  alternatives:
  - Vedan
  lexicon: HALOT
  rationale: Taken as a place or trading people name. The consonantal text permits
    'Dan,' though some interpreters prefer reading it with the following as a compound
    or emending toward 'Vedan.' Because the MT reads Dan, the main text preserves
    it and notes the alternative.
- source_word: וְיָוָן
  chosen: Javan
  alternatives:
  - Greece
  - Ionians
  lexicon: HALOT
  rationale: As a proper name in trade-oracle context, transliteration is preferred
    over interpretive renderings like 'Greece' or 'Ionians.'
- source_word: מְאוּזָּל
  chosen: from Uzal
  alternatives:
  - from Meuzal
  - wandering/about
  lexicon: HALOT
  rationale: Best taken as a toponym, likely Uzal, with prefixed preposition. This
    yields a coherent list of trading partners. Other construals are more speculative
    and less natural in the merchant catalog.
- source_word: בְּעִזְבוֹנַיִךְ
  chosen: traded with you
  alternatives:
  - in your goods
  - with your wares
  lexicon: HALOT
  rationale: The noun refers to merchandise/trade goods. In English, the verbal sense
    'traded with you' best fits with the following verb and keeps the commercial force
    natural.
- source_word: נָתָנּוּ
  chosen: they exchanged
  alternatives:
  - they gave
  - they supplied
  lexicon: HALOT
  rationale: Although literally 'gave,' in a trade list the sense is commercial exchange
    or supply. 'Exchanged' fits the context of merchant transactions.
- source_word: בַּרְזֶל עָשׁוֹת
  chosen: wrought iron
  alternatives:
  - worked iron
  - ironwork
  lexicon: HALOT
  rationale: The adjective/participle with 'iron' indicates iron that has been worked
    or manufactured, not merely raw metal.
- source_word: קִדָּה
  chosen: cassia
  alternatives:
  - cassia bark
  - aromatic spice
  lexicon: HALOT
  rationale: Commonly identified as cassia, an aromatic product suitable to a trade
    inventory. 'Cassia' is concise and standard.
- source_word: וְקָנֶה
  chosen: cane
  alternatives:
  - calamus
  - sweet cane
  lexicon: HALOT
  rationale: The term denotes reed/cane, often aromatic in trade contexts. 'Cane'
    is the most straightforward main-text rendering; the more specific 'calamus' is
    possible but less accessible.
- source_word: בְּמַעֲרָבֵךְ
  chosen: for your wares
  alternatives:
  - among your merchandise
  - in your market
  lexicon: HALOT
  rationale: In this chapter the noun refers to merchandise or articles of trade.
    'For your wares' expresses the commercial exchange clearly in idiomatic English.
