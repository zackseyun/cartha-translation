id: EZK.27.25
reference: Ezekiel 27:25
source:
  edition: WLC
  text: אֳנִיּ֣וֹת תַּרְשִׁ֔ישׁ שָׁרוֹתַ֖יִ/ךְ מַעֲרָבֵ֑/ךְ וַ/תִּמָּלְאִ֧י וַֽ/תִּכְבְּדִ֛י
    מְאֹ֖ד בְּ/לֵ֥ב יַמִּֽים־׃
translation:
  text: The ships of Tarshish were your caravans for your merchandise, and you were
    filled and became very heavy in the heart of the seas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The ships of Tarshish were your carriers for your wares.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the heart of the seas,' an idiom for the midst or depths of the
      sea.
    reason: cultural_note
lexical_decisions:
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  chosen: the ships of Tarshish
  alternatives:
  - Tarshish ships
  - seagoing ships
  lexicon: HALOT
  rationale: The construct phrase most naturally denotes ships associated with Tarshish.
    'Ships of Tarshish' preserves the Hebrew expression and its likely technical/commercial
    sense better than flattening it to merely 'merchant ships' or 'seagoing ships.'
- source_word: שָׁרוֹתַיִךְ
  chosen: were your caravans
  alternatives:
  - were your rowers
  - were your traders
  - sang of you
  lexicon: HALOT
  rationale: In context of Ezekiel 27's trade lament, the form is best taken from
    a root related to service/attendance in commerce, yielding the sense that the
    Tarshish ships served as Tyre's carriers. 'Caravans' fits the commercial imagery
    and parallels the following 'your merchandise.' Alternatives such as 'rowers'
    do not fit the morphology or immediate context here.
- source_word: מַעֲרָבֵךְ
  chosen: for your merchandise
  alternatives:
  - your wares
  - your trade goods
  - your exchange
  lexicon: HALOT
  rationale: The noun in this chapter refers to traded goods or merchandise. 'Merchandise'
    is slightly more formal but accurately captures the commercial register of the
    lament.
- source_word: וַתִּמָּלְאִי
  chosen: you were filled
  alternatives:
  - you became full
  - you were loaded
  lexicon: HALOT
  rationale: The Niphal/wayyiqtol conveys becoming full. 'Were filled' preserves the
    passive/resultative nuance and suits the image of Tyre loaded with goods.
- source_word: וַתִּכְבְּדִי
  chosen: became very heavy
  alternatives:
  - became weighty
  - were heavily laden
  - became honored
  lexicon: HALOT
  rationale: In this maritime-commercial context, the physical metaphor of weight
    from cargo is primary, not the abstract sense 'be honored.' 'Became very heavy'
    keeps the image vivid and prepares for the location phrase that follows.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier; 'very' is natural modern English.
- source_word: בְּלֵב יַמִּים
  chosen: in the heart of the seas
  alternatives:
  - in the midst of the seas
  - in the open sea
  lexicon: HALOT
  rationale: This idiom is common in Ezekiel for the deep/midst of the seas. 'In the
    heart of the seas' is a transparent, vivid rendering that preserves the Hebrew
    metaphor.
