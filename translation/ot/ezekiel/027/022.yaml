id: EZK.27.22
reference: Ezekiel 27:22
source:
  edition: WLC
  text: רֹכְלֵ֤י שְׁבָא֙ וְ/רַעְמָ֔ה הֵ֖מָּה רֹכְלָ֑יִ/ךְ בְּ/רֹ֨אשׁ כָּל בֹּ֜שֶׂם
    וּ/בְ/כָל אֶ֤בֶן יְקָרָה֙ וְ/זָהָ֔ב נָתְנ֖וּ עִזְבוֹנָֽיִ/ךְ־־׃
translation:
  text: The merchants of Sheba and Raamah—they were your merchants; with the choicest
    of every spice, with every precious stone, and gold, they paid for your wares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they gave for your merchandise.' The Hebrew verb is literally 'gave,'
      but here it functions in a commercial sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכְלֵי
  chosen: merchants of
  alternatives:
  - traders of
  lexicon: HALOT
  rationale: רכל in this commercial lament refers to those engaged in trade. 'Merchants'
    is the most natural English rendering in this context and fits the repeated usage
    in Ezekiel 27.
- source_word: שְׁבָא
  chosen: Sheba
  rationale: Proper name; transliterated per translation philosophy.
- source_word: וְרַעְמָה
  chosen: and Raamah
  rationale: Proper name; transliterated per translation philosophy.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis. English can reflect this with simple
    'they' plus dash structure without becoming overly stiff.
- source_word: רֹכְלָיִךְ
  chosen: your merchants
  alternatives:
  - your traders
  lexicon: HALOT
  rationale: 'Same lemma as earlier in the verse; consistency favors ''merchants.''
    The suffix marks Tyre as the addressee: ''your merchants.'''
- source_word: בְּרֹאשׁ כָּל בֹּשֶׂם
  chosen: with the choicest of every spice
  alternatives:
  - with the finest of every kind of balsam
  - with the best of every spice
  lexicon: HALOT
  rationale: רֹאשׁ here idiomatically means 'best/choicest' rather than literal 'head.'
    בֹּשֶׂם denotes aromatic spice/perfume material. 'Choicest of every spice' captures
    the idiom and the luxury-trade setting.
- source_word: וּבְכָל אֶבֶן יְקָרָה
  chosen: with every precious stone
  alternatives:
  - with all kinds of precious stones
  lexicon: HALOT
  rationale: Singular collective construction naturally renders as a class term in
    English. 'Precious stone' is standard and clear.
- source_word: וְזָהָב
  chosen: and gold
  lexicon: HALOT
  rationale: Straightforward commodity term in the trade list.
- source_word: נָתְנוּ
  chosen: they paid
  alternatives:
  - they gave
  - they traded
  lexicon: HALOT
  rationale: Although the verb is literally 'gave,' in a commercial context with the
    object 'your wares' the sense is payment/exchange. 'They paid' communicates the
    transactional force more idiomatically in English.
- source_word: עִזְבוֹנָיִךְ
  chosen: your wares
  alternatives:
  - your goods
  - your merchandise
  lexicon: HALOT
  rationale: The noun in Ezekiel 27 refers to traded goods/merchandise. 'Wares' is
    concise, natural in a trade oracle, and avoids awkward repetition of 'merchandise'
    after 'merchants.'
