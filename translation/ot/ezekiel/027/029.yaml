id: EZK.27.29
reference: Ezekiel 27:29
source:
  edition: WLC
  text: וְֽ/יָרְד֞וּ מֵ/אָנִיּֽוֹתֵי/הֶ֗ם כֹּ֚ל תֹּפְשֵׂ֣י מָשׁ֔וֹט מַלָּחִ֕ים כֹּ֖ל
    חֹבְלֵ֣י הַ/יָּ֑ם אֶל הָ/אָ֖רֶץ יַעֲמֹֽדוּ־׃
translation:
  text: And all who handle the oar will come down from their ships; the sailors, all
    the seamen of the sea, will stand on the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the rowers.' The Hebrew is literally 'all who handle the oar.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the mariners of the sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרְדוּ
  chosen: will come down
  alternatives:
  - will descend
  - came down
  lexicon: HALOT
  rationale: Qal wayyiqtol of ירד in prophetic poetry/narrative commonly advances
    the scene. In English, 'will come down' fits the lament context and the movement
    from ship to shore naturally; 'descend' is more formal but less idiomatic.
- source_word: מֵאָנִיּוֹתֵיהֶם
  chosen: from their ships
  alternatives:
  - out of their ships
  - from their vessels
  lexicon: HALOT
  rationale: The noun refers to seagoing ships. 'Ships' is the most natural modern
    English rendering here. The prefixed מן is expressed by 'from.'
- source_word: כֹּל תֹּפְשֵׂי מָשׁוֹט
  chosen: all who handle the oar
  alternatives:
  - all who grasp the oar
  - all the rowers
  lexicon: HALOT
  rationale: תפשׂי is literally 'those who seize/handle,' and משוט is 'oar.' 'Handle
    the oar' preserves the concrete Hebrew image without over-interpreting as a technical
    class term. 'Rowers' is possible but slightly more interpretive.
- source_word: מַלָּחִים
  chosen: the sailors
  alternatives:
  - mariners
  lexicon: HALOT
  rationale: A standard term for sailors. 'Sailors' is clear modern English; 'mariners'
    is traditional but somewhat archaic.
- source_word: כֹּל חֹבְלֵי הַיָּם
  chosen: all the seamen of the sea
  alternatives:
  - all the mariners of the sea
  - all who work the sea
  lexicon: HALOT
  rationale: חֹבְלֵי הַיָּם denotes those engaged in seafaring, likely sailors/seamen
    broadly. 'Seamen of the sea' preserves the Hebrew fullness and parallelism with
    מַלָּחִים, even though it sounds slightly emphatic in English. The repetition
    reflects the poetic lament style rather than redundancy to be smoothed away.
- source_word: אֶל הָאָרֶץ
  chosen: on the land
  alternatives:
  - onto the land
  - to the shore
  - to the earth
  lexicon: HALOT
  rationale: Although literally 'to the land/earth,' the idiomatic sense in this maritime
    context is standing ashore. 'On the land' communicates the contrast with being
    aboard ship while staying close to the Hebrew.
- source_word: יַעֲמֹדוּ
  chosen: will stand
  alternatives:
  - shall stand
  - will take their stand
  lexicon: HALOT
  rationale: The basic sense of עמד is 'stand.' No stronger interpretive nuance is
    required here; the image is of disembarking and standing ashore in mourning.
