id: EZK.27.4
reference: Ezekiel 27:4
source:
  edition: WLC
  text: בְּ/לֵ֥ב יַמִּ֖ים גְּבוּלָ֑יִ/ךְ בֹּנַ֕יִ/ךְ כָּלְל֖וּ יָפְיֵֽ/ךְ׃
translation:
  text: Your borders are in the heart of the seas; your builders perfected your beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the midst of the seas.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your builders completed your beauty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֵב
  chosen: in the heart of
  alternatives:
  - in the midst of
  - at the center of
  lexicon: HALOT
  rationale: לֵב literally means 'heart,' and in spatial expressions it commonly denotes
    the interior or center. 'In the heart of' preserves the vivid metaphor while remaining
    natural English.
- source_word: יַמִּים
  chosen: the seas
  alternatives:
  - the sea
  lexicon: HALOT
  rationale: The plural יַמִּים is best retained as 'seas,' matching the Hebrew form
    and the maritime imagery of Tyre's setting.
- source_word: גְּבוּלַיִךְ
  chosen: your borders
  alternatives:
  - your territory
  - your boundaries
  - your coasts
  lexicon: HALOT
  rationale: גְּבוּל denotes border, boundary, or territory. 'Your borders' is the
    most direct rendering and fits the image of Tyre's extent being situated in the
    sea. 'Coasts' is possible in maritime context but is more interpretive than the
    Hebrew requires.
- source_word: בֹּנַיִךְ
  chosen: your builders
  alternatives:
  - your shipbuilders
  - those who built you
  lexicon: HALOT
  rationale: The participial form from בנה means 'your builders.' In context Tyre
    is being portrayed as a splendid ship/city, so 'shipbuilders' is contextually
    plausible, but 'builders' better preserves the metaphorical breadth of the Hebrew.
- source_word: כָּלְלוּ
  chosen: perfected
  alternatives:
  - completed
  - made perfect
  - finished
  lexicon: HALOT
  rationale: The verb כלל in the piel/qal-related usage here carries the sense of
    completing or bringing to perfection. 'Perfected' best conveys the idea that the
    builders brought Tyre's beauty to its full form, not merely that they finished
    construction.
- source_word: יָפְיֵךְ
  chosen: your beauty
  alternatives:
  - your splendor
  - your loveliness
  lexicon: HALOT
  rationale: יֹפִי/יָפִי refers to beauty or splendor. 'Your beauty' is the most straightforward
    and preserves the poetic personification.
