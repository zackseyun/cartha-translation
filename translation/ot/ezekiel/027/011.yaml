id: EZK.27.11
reference: Ezekiel 27:11
source:
  edition: WLC
  text: בְּנֵ֧י אַרְוַ֣ד וְ/חֵילֵ֗ךְ עַל חוֹמוֹתַ֨יִ/ךְ֙ סָבִ֔יב וְ/גַ֨מָּדִ֔ים בְּ/מִגְדְּלוֹתַ֖יִ/ךְ
    הָי֑וּ שִׁלְטֵי/הֶ֞ם תִּלּ֤וּ עַל חוֹמוֹתַ֨יִ/ךְ֙ סָבִ֔יב הֵ֖מָּה כָּלְל֥וּ יָפְיֵֽ/ךְ־־׃
translation:
  text: The sons of Arvad, along with your army, were on your walls all around, and
    the Gammadites were in your towers. They hung their shields on your walls all
    around; they perfected your beauty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גַמָּדִים is obscure. It is rendered here as an ethnic name, 'the
      Gammadites'; alternatively, some understand it more generally as 'warriors'
      or preserve the spelling 'Gamadites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אַרְוַד
  chosen: The sons of Arvad
  alternatives:
  - The men of Arvad
  - The people of Arvad
  lexicon: HALOT
  rationale: Literally 'sons of Arvad,' a common Hebrew ethnogeographic expression
    for the inhabitants/men of a place. 'Sons of Arvad' preserves the source form
    while remaining intelligible in context.
- source_word: חֵילֵךְ
  chosen: your army
  alternatives:
  - your forces
  - your host
  lexicon: HALOT
  rationale: חַיִל can denote military force, army, or troops. In this context of
    defenders stationed on walls, 'your army' best conveys the military sense in natural
    English.
- source_word: חוֹמוֹתַיִךְ סָבִיב
  chosen: your walls all around
  alternatives:
  - your walls round about
  - all around your walls
  lexicon: HALOT
  rationale: The phrase indicates encirclement/complete coverage of the city's walls.
    'All around' is clear modern English and preserves the distributive sense.
- source_word: גַמָּדִים
  chosen: the Gammadites
  alternatives:
  - the Gamadites
  - brave warriors
  lexicon: HALOT
  rationale: The term is obscure and likely a gentilic or ethnic designation rather
    than a common noun. Transliteration preserves the uncertainty better than interpretive
    renderings like 'brave warriors.' An alternative spelling reflecting the underlying
    consonants is worth preserving in a footnote.
- source_word: בְּמִגְדְּלוֹתַיִךְ
  chosen: in your towers
  alternatives:
  - on your towers
  lexicon: HALOT
  rationale: The preposition ב normally means 'in' or 'at.' With defensive towers,
    English idiom favors 'in your towers' for stationed guards, though 'on' is possible.
- source_word: שִׁלְטֵיהֶם
  chosen: their shields
  alternatives:
  - their bucklers
  lexicon: HALOT
  rationale: The noun refers to shields, likely larger defensive shields. 'Shields'
    is the standard accessible rendering.
- source_word: תִּלּוּ
  chosen: They hung
  alternatives:
  - They suspended
  lexicon: HALOT
  rationale: The verb denotes hanging up or suspending. 'Hung' is the natural English
    equivalent in this military-decorative context.
- source_word: כָּלְלוּ
  chosen: they perfected
  alternatives:
  - they completed
  - they made complete
  lexicon: HALOT
  rationale: The verb carries the sense of completing or bringing to perfection. In
    context, the defenders and their displayed shields are portrayed as contributing
    to Tyre's splendor; 'perfected' preserves the elevated poetic force.
- source_word: יָפְיֵךְ
  chosen: your beauty
  alternatives:
  - your splendor
  lexicon: HALOT
  rationale: The noun denotes beauty or attractiveness. 'Beauty' is the most direct
    rendering, while the surrounding context already conveys civic magnificence.
