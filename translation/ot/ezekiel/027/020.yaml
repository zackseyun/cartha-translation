id: EZK.27.20
reference: Ezekiel 27:20
source:
  edition: WLC
  text: דְּדָן֙ רֹֽכַלְתֵּ֔/ךְ בְ/בִגְדֵי חֹ֖פֶשׁ לְ/רִכְבָּֽה־׃
translation:
  text: Dedan traded with you in saddlecloths for riding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Dedan was your merchant in garments for riding,” with the exact sense
      of the traded textile term uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּדָן
  chosen: Dedan
  lexicon: HALOT
  rationale: Proper place name; transliterated per translation philosophy rather than
    translated.
- source_word: רֹכַלְתֵּךְ
  chosen: traded with you
  alternatives:
  - was your trader
  - was your merchant
  lexicon: HALOT
  rationale: From רכל in commercial contexts, denoting trading/merchant activity.
    The verbal form with 2fs suffix addresses Tyre directly; 'traded with you' is
    idiomatic English and preserves the relational sense.
- source_word: בְּבִגְדֵי
  chosen: in ... cloths
  alternatives:
  - with garments
  - with coverings
  lexicon: HALOT
  rationale: בגד commonly means garment/clothing, but in this trade list the phrase
    refers to a class of textile goods. 'Cloths' fits the mercantile context better
    than personal apparel while staying close to the Hebrew.
- source_word: חֹפֶשׁ
  chosen: saddle
  alternatives:
  - freedom
  - covering
  - spreading
  lexicon: HALOT
  rationale: Although חפש elsewhere can relate to freedom, in this collocation with
    בגדי and the following לְרִכְבָּה it is best understood as a specialized textile
    term associated with riding equipment. Hence 'saddlecloths' in English captures
    the likely referent.
- source_word: לְרִכְבָּה
  chosen: for riding
  alternatives:
  - for chariotry
  - for riding horses
  lexicon: HALOT
  rationale: From רכב, referring broadly to riding/ride equipment. 'For riding' is
    sufficiently broad and avoids over-specifying horses or chariots where the Hebrew
    does not explicitly do so.
