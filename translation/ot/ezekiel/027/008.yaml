id: EZK.27.8
reference: Ezekiel 27:8
source:
  edition: WLC
  text: יֹשְׁבֵ֤י צִידוֹן֙ וְ/אַרְוַ֔ד הָי֥וּ שָׁטִ֖ים לָ֑/ךְ חֲכָמַ֤יִ/ךְ צוֹר֙ הָ֣יוּ
    בָ֔/ךְ הֵ֖מָּה חֹבְלָֽיִ/ךְ׃
translation:
  text: The inhabitants of Sidon and Arvad were your rowers; your wise men, Tyre,
    were within you; they were your sailors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your pilots.' The Hebrew term for 'sailors' can refer more specifically
      to those who direct or manage a ship.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those dwelling in
  - residents of
  lexicon: HALOT
  rationale: The construct participle from ישׁב denotes those who dwell in a place.
    'The inhabitants of' is idiomatic modern English and fits the construct relation
    with the place names.
- source_word: צִידוֹן
  chosen: Sidon
  rationale: Standard English transliteration of the Phoenician city name.
- source_word: וְאַרְוַד
  chosen: and Arvad
  alternatives:
  - and Arwad
  rationale: Standard transliteration of the place name; paired with Sidon as maritime
    cities supplying personnel.
- source_word: שָׁטִים
  chosen: rowers
  alternatives:
  - oarsmen
  - mariners
  lexicon: HALOT
  rationale: In this ship metaphor the participle refers specifically to those who
    propel the vessel with oars. 'Rowers' is more precise than the broader 'mariners'
    and more natural than 'oarsmen' in contemporary English.
- source_word: לָךְ
  chosen: your
  alternatives:
  - for you
  rationale: 'The preposition with second feminine singular suffix is possessive in
    sense within the ship allegory: these men belong to Tyre''s enterprise. English
    expresses this naturally as ''your.'''
- source_word: חֲכָמַיִךְ
  chosen: your wise men
  alternatives:
  - your skilled men
  - your experts
  lexicon: HALOT
  rationale: חכם can denote wisdom or technical skill. Here, in a nautical context,
    it points to skilled specialists. 'Your wise men' preserves the lexical link to
    wisdom language while allowing the context to define their expertise.
- source_word: צוֹר
  chosen: Tyre
  rationale: Standard English transliteration of the city name, here used in direct
    address within the lament.
- source_word: בָךְ
  chosen: within you
  alternatives:
  - in you
  rationale: Because Tyre is portrayed as a ship, 'within you' communicates location
    aboard/in the city-ship more naturally than the bare 'in you' while remaining
    close to the Hebrew.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  rationale: Independent pronoun used for emphasis; English usually conveys this adequately
    with explicit 'they' before the predicate.
- source_word: חֹבְלָיִךְ
  chosen: your sailors
  alternatives:
  - your pilots
  - your seamen
  lexicon: HALOT
  rationale: The noun can denote sailors/shipmen and in some contexts those who handle
    or steer a ship. Since 'rowers' has already rendered שׁטים, a distinct but still
    broad nautical term is needed here. 'Sailors' is natural English for the skilled
    ship personnel supplied by Tyre's own wise men; 'pilots' is possible but narrower
    and somewhat interpretive.
