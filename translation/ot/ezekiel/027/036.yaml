id: EZK.27.36
reference: Ezekiel 27:36
source:
  edition: WLC
  text: סֹֽחֲרִים֙ בָּ֣/עַמִּ֔ים שָׁרְק֖וּ עָלָ֑יִ/ךְ בַּלָּה֣וֹת הָיִ֔ית וְ/אֵינֵ֖/ךְ
    עַד עוֹלָֽם־׃ס
translation:
  text: Merchants among the peoples hiss at you; you have become a horror, and you
    will be no more forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whistle at you.' The Hebrew verb can denote whistling or hissing; here
      it conveys a reaction of astonishment or derision.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have become terrors' / 'an object of terror.' The Hebrew noun is
      plural in form but may function collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: סֹחֲרִים
  chosen: Merchants
  alternatives:
  - Traders
  lexicon: HALOT
  rationale: The participle from סחר denotes those engaged in trade. 'Merchants' is
    natural English and fits the commercial context of the Tyre lament.
- source_word: בָּעַמִּים
  chosen: among the peoples
  alternatives:
  - among the nations
  lexicon: HALOT
  rationale: עַמִּים is plural and refers broadly to various peoples. 'Among the peoples'
    preserves the distributive international sense without over-specifying political
    nationhood.
- source_word: שָׁרְקוּ
  chosen: hiss
  alternatives:
  - whistle
  - shriek in derision
  lexicon: HALOT
  rationale: The verb שׁרק can denote whistling or hissing. In prophetic judgment
    contexts it often conveys a reaction of astonishment or derision. 'Hiss' best
    captures the ominous, contemptuous response in English.
- source_word: עָלַיִךְ
  chosen: at you
  alternatives:
  - over you
  - because of you
  lexicon: HALOT
  rationale: With שׁרק, עַל marks the object or target of the reaction. 'At you' is
    idiomatic in English for hissing directed toward someone.
- source_word: בַּלָּהוֹת
  chosen: a horror
  alternatives:
  - terrors
  - an object of terror
  lexicon: HALOT
  rationale: 'The plural noun can denote terrors or horrors. In predicate position
    after ''you have become,'' English idiom favors a singular collective sense: ''a
    horror,'' meaning something appalling and dreadful.'
- source_word: הָיִית
  chosen: you have become
  alternatives:
  - you were
  - you became
  lexicon: HALOT
  rationale: The qatal here summarizes Tyre's resultant state after judgment. 'You
    have become' communicates the attained condition in good English.
- source_word: וְאֵינֵךְ
  chosen: you will be no more
  alternatives:
  - you are not
  - you are gone
  lexicon: HALOT
  rationale: 'The negative existential with pronominal suffix, followed by עַד עוֹלָם,
    expresses permanent disappearance. Future-oriented English best reflects the prophetic
    outcome: ''you will be no more.'''
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  lexicon: HALOT
  rationale: This idiom denotes enduring perpetuity. 'Forever' is the clearest modern
    English equivalent.
