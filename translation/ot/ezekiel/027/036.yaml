theological_decisions:
- issue: Force of the final clause in a prophetic judgment oracle
  chosen_reading: Permanent obliteration is expressed as 'you will be no more forever.'
  alternative_readings:
  - You are no more forever
  - You will not exist anymore
  rationale: The Hebrew negative existential plus עַד עוֹלָם communicates irreversible
    end. The translation preserves the severity of judgment without importing metaphysical
    claims beyond the oracle's plain sense.
  doctrine_reference: Translation philosophy §1, §3, §6
