id: EZK.27.1
reference: Ezekiel 27:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential introduction. In English, the idiomatic sense is best carried by folding it into the clause 'And the word ... came' rather than the wooden 'and it happened,' which is less natural and adds no distinct meaning in this formulaic prophetic introduction.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: דבר in the construct phrase דְבַר יְהוָה is the standard prophetic formula 'the word of the LORD.' 'Word' preserves the established formula and its covenantal/theological resonance better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus 1cs suffix straightforwardly indicates direction toward the prophet. 'To me' is accurate and natural modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct speech. 'Saying' is the conventional and sufficiently transparent rendering, especially in prophetic formulae where the following verse supplies the content.
