id: EZK.27.15
reference: Ezekiel 27:15
source:
  edition: WLC
  text: בְּנֵ֤י דְדָן֙ רֹֽכְלַ֔יִ/ךְ אִיִּ֥ים רַבִּ֖ים סְחֹרַ֣ת יָדֵ֑/ךְ קַרְנ֥וֹת
    שֵׁן֙ ו/הובנים הֵשִׁ֖יבוּ אֶשְׁכָּרֵֽ/ךְ׃
translation:
  text: The sons of Dedan were your merchants. Many coastlands were the market of
    your hand; they brought back ivory tusks and ebony as your payment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many islands were your market' for 'Many coastlands were the market
      of your hand.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'horns of ivory.'
    reason: lexical_alternative
  - marker: c
    text: Or 'ebony wood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי דְדָן
  chosen: The sons of Dedan
  alternatives:
  - The people of Dedan
  - The Dedanites
  lexicon: HALOT
  rationale: Formal rendering preserves the Hebrew construct 'sons of X' while still
    reading naturally in English. Since this is an ethnic/geographic designation,
    alternatives are possible, but 'sons of Dedan' best reflects the source wording.
- source_word: רֹכְלַיִךְ
  chosen: your merchants
  alternatives:
  - your traders
  lexicon: HALOT
  rationale: The noun refers to commercial traders. 'Merchants' fits the economic
    context of Ezekiel 27 and is idiomatic in English.
- source_word: אִיִּים רַבִּים
  chosen: Many coastlands
  alternatives:
  - Many islands
  lexicon: HALOT
  rationale: In prophetic and trade contexts, אִיִּים often denotes maritime coastlands
    or island regions broadly, not only literal islands. 'Coastlands' better captures
    the geographic-commercial sense here.
- source_word: סְחֹרַת יָדֵךְ
  chosen: were the market of your hand
  alternatives:
  - were your market
  - were your commercial sphere
  - were the merchandise of your hand
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic. Retaining 'of your hand' preserves
    the concrete Hebrew expression while 'market' conveys the commercial sense of
    סְחֹרָה in context. This balances transparency and readability.
- source_word: קַרְנוֹת שֵׁן
  chosen: ivory tusks
  alternatives:
  - horns of ivory
  - elephant tusks
  lexicon: HALOT
  rationale: Literally 'horns of tooth/ivory.' The phrase refers to tusks used as
    trade goods. 'Ivory tusks' is clear modern English and preserves the material
    sense.
- source_word: וְהוֹבְנִים
  chosen: ebony
  alternatives:
  - ebony wood
  lexicon: HALOT
  rationale: The term is traditionally understood as ebony, a luxury trade item fitting
    the context. 'Ebony' is concise and natural.
- source_word: הֵשִׁיבוּ
  chosen: they brought back
  alternatives:
  - they returned
  - they paid
  - they brought
  lexicon: HALOT
  rationale: The hiphil of שוב commonly means 'bring back/return.' In this trade context
    it describes what Dedan delivered in exchange. 'Brought back' preserves the verbal
    force without overinterpreting.
- source_word: אֶשְׁכָּרֵךְ
  chosen: your payment
  alternatives:
  - your wages
  - your exchange price
  - your fee
  lexicon: HALOT
  rationale: The noun denotes compensation or payment. In a mercantile oracle, 'payment'
    is the clearest English equivalent.
