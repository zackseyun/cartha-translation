id: EZK.27.21
reference: Ezekiel 27:21
source:
  edition: WLC
  text: עֲרַב֙ וְ/כָל נְשִׂיאֵ֣י קֵדָ֔ר הֵ֖מָּה סֹחֲרֵ֣י יָדֵ֑/ךְ בְּ/כָרִ֤ים וְ/אֵילִים֙
    וְ/עַתּוּדִ֔ים בָּ֖/ם סֹחֲרָֽיִ/ךְ־׃
translation:
  text: Arabia and all the princes of Kedar—they were your trading partners; in lambs,
    rams, and male goats, in these they traded with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Arab' / 'the Arabians.' The Hebrew proper name can denote the Arabian
      region or its people.
    reason: alternative_reading
  - marker: b
    text: Literally 'merchants of your hand,' an idiom meaning those who traded with
      you.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲרַב
  chosen: Arabia
  alternatives:
  - Arab
  - the Arabians
  lexicon: HALOT
  rationale: As a place/people name in a trade-oracle list, the geographic rendering
    'Arabia' fits English usage best while still allowing the inhabitants to be implied
    as the merchants.
- source_word: נְשִׂיאֵי
  chosen: princes
  alternatives:
  - chiefs
  - leaders
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes tribal rulers or chieftains. 'Princes' preserves
    the elevated political sense in a traditional but still understandable way; 'chiefs'
    is possible but slightly more ethnographic in tone.
- source_word: קֵדָר
  chosen: Kedar
  lexicon: HALOT
  rationale: Proper name transliterated per project philosophy.
- source_word: סֹחֲרֵי יָדֵךְ
  chosen: your trading partners
  alternatives:
  - merchants at your hand
  - dealers with you
  lexicon: HALOT
  rationale: Literally 'merchants of your hand,' an idiom for those doing business
    with Tyre. 'Your trading partners' communicates the commercial relationship in
    natural English without over-literal obscurity.
- source_word: כָרִים
  chosen: lambs
  alternatives:
  - pasture lambs
  - young rams
  lexicon: HALOT
  rationale: כַּר commonly refers to a lamb or pasture-fed young sheep. Since אֵילִים
    follows and clearly means 'rams,' rendering כָרִים as 'lambs' best preserves the
    distinction between the animal categories.
- source_word: אֵילִים
  chosen: rams
  lexicon: HALOT
  rationale: Standard lexical sense; distinct from כָרִים and עַתּוּדִים.
- source_word: עַתּוּדִים
  chosen: male goats
  alternatives:
  - he-goats
  - goats
  lexicon: HALOT
  rationale: Specifically male goats. 'Male goats' is clear modern English; 'he-goats'
    is accurate but less natural.
- source_word: בָּם
  chosen: in these
  alternatives:
  - with these
  - by them
  lexicon: HALOT
  rationale: The preposition marks the commodities in which the trade was conducted.
    'In these' mirrors the Hebrew structure and links the final clause back to the
    listed livestock.
- source_word: סֹחֲרָיִךְ
  chosen: they traded with you
  alternatives:
  - were your merchants
  - did business with you
  lexicon: HALOT
  rationale: The repeated merchant root is rendered verbally here for smoother English
    and to avoid awkward repetition of 'merchants.' The 2fs suffix refers to Tyre
    as the addressed city.
