id: EZK.27.30
reference: Ezekiel 27:30
source:
  edition: WLC
  text: וְ/הִשְׁמִ֤יעוּ עָלַ֨יִ/ךְ֙ בְּ/קוֹלָ֔/ם וְ/יִזְעֲק֖וּ מָרָ֑ה וְ/יַעֲל֤וּ
    עָֽפָר֙ עַל רָ֣אשֵׁי/הֶ֔ם בָּ/אֵ֖פֶר יִתְפַּלָּֽשׁוּ־׃
translation:
  text: They will raise their voice over you and cry out bitterly; they will throw
    dust on their heads; they will roll in ashes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will make their voice heard over you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will wallow in ashes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁמִיעוּ
  chosen: they will raise
  alternatives:
  - they will make heard
  - they will cause to be heard
  - they will sound
  lexicon: HALOT
  rationale: Hiphil of שׁמע means to cause to be heard. In English idiom with 'voice'
    the natural equivalent is 'raise,' preserving the causative sense without awkwardness.
- source_word: עָלַיִךְ
  chosen: over you
  alternatives:
  - against you
  - concerning you
  lexicon: HALOT
  rationale: עַל with lament language can mean over/concerning. Here, in a funeral-dirge
    context over Tyre, 'over you' best conveys lamentation directed toward her downfall
    rather than hostile speech against her.
- source_word: בְּקוֹלָם
  chosen: their voice
  alternatives:
  - their sound
  - their cry
  - their voices
  lexicon: HALOT
  rationale: קוֹל is singular with 3mp suffix, literally 'their voice/sound.' English
    commonly uses singular collective 'their voice' in this idiom; plural is possible
    but less direct.
- source_word: וְיִזְעֲקוּ
  chosen: and cry out
  alternatives:
  - and wail
  - and scream
  lexicon: HALOT
  rationale: זעק denotes a loud cry or outcry. 'Cry out' is broad and natural, fitting
    mourning language without over-specifying the emotional register.
- source_word: מָרָה
  chosen: bitterly
  alternatives:
  - bitter
  - in bitterness
  lexicon: HALOT
  rationale: The adverbial accusative/adjectival form modifies the crying. 'Bitterly'
    is idiomatic English and captures the intensity of grief.
- source_word: וְיַעֲלוּ
  chosen: they will throw
  alternatives:
  - they will bring up
  - they will cast up
  - they will put
  lexicon: HALOT
  rationale: עלה literally means 'go up/bring up,' but with dust on the head in mourning
    it refers to tossing or throwing dust upward onto oneself. 'Throw' best communicates
    the mourning gesture.
- source_word: עָפָר
  chosen: dust
  alternatives:
  - loose earth
  - soil
  lexicon: HALOT
  rationale: עפר commonly denotes dust or dry earth. 'Dust' is the standard and most
    fitting term in mourning imagery.
- source_word: עַל רָאשֵׁיהֶם
  chosen: on their heads
  alternatives:
  - upon their heads
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; 'on their heads' is clear modern
    English.
- source_word: בָּאֵפֶר
  chosen: in ashes
  alternatives:
  - in the ashes
  - with ashes
  lexicon: HALOT
  rationale: The preposition plus noun indicates the substance in which they cover
    themselves or writhe. 'In ashes' is the most natural English expression for this
    mourning act.
- source_word: יִתְפַּלָּשׁוּ
  chosen: they will roll
  alternatives:
  - they will wallow
  - they will cover themselves
  - they will prostrate themselves
  lexicon: HALOT
  rationale: The hitpael of פלשׁ in this context refers to rolling or wallowing in
    ashes as a sign of mourning. 'Roll' is vivid and sufficiently literal; 'wallow'
    may sound too pejorative in English.
