id: EZK.27.24
reference: Ezekiel 27:24
source:
  edition: WLC
  text: הֵ֤מָּה רֹכְלַ֨יִ/ךְ֙ בְּ/מַכְלֻלִ֔ים בִּ/גְלוֹמֵי֙ תְּכֵ֣לֶת וְ/רִקְמָ֔ה
    וּ/בְ/גִנְזֵ֖י בְּרֹמִ֑ים בַּ/חֲבָלִ֧ים חֲבֻשִׁ֛ים וַ/אֲרֻזִ֖ים בְּ/מַרְכֻלְתֵּֽ/ךְ׃
translation:
  text: 'They were your merchants in choice wares: in wraps of blue and embroidered
    cloth, and in treasuries of multicolored fabrics, bound with cords and secured,
    among your merchandise.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in chests of cedar' / 'cedar-lined'; the Hebrew term is difficult, and
      some understand it from the word for 'cedar' rather than as another description
      of how the goods were packed.
    reason: alternative_reading
  - marker: b
    text: The phrase rendered 'treasuries of multicolored fabrics' is uncertain; it
      may refer to valuable stores, chests, or bundles of richly colored textiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכְלַיִךְ
  chosen: your merchants
  alternatives:
  - your traders
  - your peddlers
  lexicon: HALOT
  rationale: רכל in this chapter refers to commercial traders engaged in Tyre's trade
    network. 'Merchants' is idiomatic and fits the repeated commercial context better
    than the narrower 'peddlers'.
- source_word: מַכְלֻלִים
  chosen: choice wares
  alternatives:
  - perfect things
  - luxury goods
  - finished goods
  lexicon: HALOT
  rationale: The noun denotes costly or finely made items in a trade context. 'Choice
    wares' preserves the sense of select, high-quality merchandise without the awkwardly
    literal 'perfect things'.
- source_word: גְלוֹמֵי תְכֵלֶת
  chosen: wraps of blue
  alternatives:
  - rolls of blue cloth
  - garments of blue
  - mantles of blue
  lexicon: HALOT
  rationale: גלם here likely refers to wrapped or rolled textile goods rather than
    finished garments. 'Wraps of blue' keeps the textile sense while remaining readable.
    תכלת denotes blue or blue-purple dyed material; 'blue' is the most natural concise
    rendering.
- source_word: רִקְמָה
  chosen: embroidered cloth
  alternatives:
  - embroidery
  - embroidered work
  lexicon: HALOT
  rationale: In a list of traded textiles, the term points to embroidered fabric or
    workmanship. 'Embroidered cloth' makes explicit the commercial object being traded.
- source_word: גִנְזֵי בְּרֹמִים
  chosen: treasuries of multicolored fabrics
  alternatives:
  - storehouses of rich garments
  - chests of variegated cloth
  - treasures of colored fabrics
  lexicon: HALOT
  rationale: גנזי literally suggests treasuries/storehouses/chests; in a merchant
    inventory it likely refers to valuable packed stores. ברמים is difficult and commonly
    understood as variegated or multicolored textiles. The chosen rendering conveys
    valuable stored textile goods in idiomatic English.
- source_word: חֲבָלִים
  chosen: cords
  alternatives:
  - ropes
  - bands
  lexicon: HALOT
  rationale: The word denotes cords/ropes used for binding packages. 'Cords' fits
    the scale of bundled merchandise better than the heavier 'ropes'.
- source_word: חֲבֻשִׁים
  chosen: bound
  alternatives:
  - tied
  - wrapped
  lexicon: HALOT
  rationale: Passive participle from חבש, indicating the goods were tied up or bound.
    'Bound' is concise and suits packaged trade goods.
- source_word: אֲרֻזִים
  chosen: secured
  alternatives:
  - packed
  - cedar-lined
  - made of cedar
  lexicon: HALOT
  rationale: The form is difficult. In context after 'bound with cords,' it most plausibly
    describes goods that were firmly packed or secured. Some take it from ארז ('cedar'),
    yielding 'cedar-lined/in cedar chests,' but the immediate syntax favors another
    packaging descriptor. The alternative is preserved in a footnote.
- source_word: מַרְכֻלְתֵּךְ
  chosen: your merchandise
  alternatives:
  - your market
  - your trade
  lexicon: HALOT
  rationale: The noun in Ezekiel 27 regularly denotes Tyre's traded goods or commerce.
    'Your merchandise' best matches the concrete inventory style of the verse.
