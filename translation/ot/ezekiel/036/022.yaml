theological_decisions:
- issue: Rendering the divine name יְהוָה within אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD.' In the fixed Hebrew combination אֲדֹנָי יְהוִה, however, English style
    traditionally renders 'Lord GOD' to avoid the awkward duplication 'Lord LORD.'
    This preserves reverence and distinguishes the title-plus-name construction without
    transliterating the divine name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Divine motive in restoration
  chosen_reading: It is not for your sake ... but for my holy name
  rationale: The translation preserves the text's theological emphasis that God's
    action is grounded in concern for his holy name rather than Israel's merit. No
    softening or doctrinal expansion is introduced.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
