id: EZK.36.22
reference: Ezekiel 36:22
source:
  edition: WLC
  text: לָ/כֵ֞ן אֱמֹ֣ר לְ/בֵֽית יִשְׂרָאֵ֗ל כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה לֹ֧א לְמַעַנְ/כֶ֛ם
    אֲנִ֥י עֹשֶׂ֖ה בֵּ֣ית יִשְׂרָאֵ֑ל כִּ֤י אִם לְ/שֵׁם קָדְשִׁ/י֙ אֲשֶׁ֣ר חִלַּלְתֶּ֔ם
    בַּ/גּוֹיִ֖ם אֲשֶׁר בָּ֥אתֶם שָֽׁם־־־־׃
translation:
  text: 'Therefore say to the house of Israel, ‘Thus says the Lord GOD: It is not
    for your sake that I am acting, house of Israel, but for my holy name, which you
    have profaned among the nations where you went.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for the sake of my holy name.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'which you have desecrated among the nations where you came.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding context; 'therefore'
    preserves the discourse connection clearly in modern English.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - speak
  lexicon: HALOT
  rationale: Standard imperative of אמר in prophetic commissioning formulas; 'say'
    is the natural English equivalent.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - to Israel
  lexicon: HALOT
  rationale: Retains the covenantal/corporate expression 'house of Israel' rather
    than flattening it to simply 'Israel'.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; concise and natural while preserving
    the formal tone.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Follows the doctrinal default of rendering יְהוָה as 'the LORD.' In the
    compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by rendering as
    'Lord GOD,' which preserves both elements reverently and intelligibly.
- source_word: לֹא לְמַעַנְכֶם
  chosen: It is not for your sake
  alternatives:
  - Not for your sake
  - Not on your account
  lexicon: HALOT
  rationale: Expresses motive/purpose. The fuller English clause makes the negated
    motivation explicit and readable.
- source_word: אֲנִי עֹשֶׂה
  chosen: I am acting
  alternatives:
  - I act
  - I am doing this
  lexicon: HALOT
  rationale: The participle עֹשֶׂה here conveys present/forthcoming divine action.
    'I am acting' is idiomatic and captures the sense without adding an object absent
    from the Hebrew.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Vocative repetition is retained to preserve emphasis and prophetic address.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except that it is for
  - rather
  lexicon: HALOT
  rationale: In this contrastive construction after negation, 'but' best conveys the
    adversative force in natural English.
- source_word: לְשֵׁם קָדְשִׁי
  chosen: for my holy name
  alternatives:
  - for the sake of my holy name
  - for my sacred name
  lexicon: HALOT
  rationale: Keeps the covenantal-theological concept of God's 'name' intact. 'Holy'
    is the standard rendering of קָדוֹשׁ-related forms and preserves the sanctity
    emphasis.
- source_word: אֲשֶׁר חִלַּלְתֶּם
  chosen: which you have profaned
  alternatives:
  - which you have defiled
  - which you have desecrated
  lexicon: HALOT
  rationale: חלל in the piel commonly means to profane or treat as common. 'Profaned'
    best preserves the theological force regarding God's holy name.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: In Ezekiel's Hebrew context, 'nations' is the most transparent rendering
    of גּוֹיִם and avoids importing later NT-specific associations of 'Gentiles'.
- source_word: אֲשֶׁר בָּאתֶם שָׁם
  chosen: where you went
  alternatives:
  - where you came
  - where you entered
  lexicon: HALOT
  rationale: Though בוא literally means 'come/enter,' English relative clauses of
    destination are more naturally rendered 'where you went.' This reflects idiomatic
    target-language usage without changing the sense.
