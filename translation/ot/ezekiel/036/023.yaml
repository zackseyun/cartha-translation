id: EZK.36.23
reference: Ezekiel 36:23
source:
  edition: WLC
  text: וְ/קִדַּשְׁתִּ֞י אֶת שְׁמִ֣/י הַ/גָּד֗וֹל הַֽ/מְחֻלָּל֙ בַּ/גּוֹיִ֔ם אֲשֶׁ֥ר
    חִלַּלְתֶּ֖ם בְּ/תוֹכָ֑/ם וְ/יָדְע֨וּ הַ/גּוֹיִ֜ם כִּי אֲנִ֣י יְהוָ֗ה נְאֻם֙ אֲדֹנָ֣/י
    יְהוִ֔ה בְּ/הִקָּדְשִׁ֥/י בָ/כֶ֖ם לְ/עֵינֵי/הֶֽם־־׃
translation:
  text: I will vindicate the holiness of my great name, which has been profaned among
    the nations, which you have profaned among them. Then the nations will know that
    I am the LORD, declares the Lord GOD, when I show myself holy through you before
    their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I will sanctify my great name.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'when I am sanctified in you before their eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתִּי
  chosen: I will vindicate the holiness of
  alternatives:
  - I will sanctify
  - I will make holy
  - I will show as holy
  lexicon: HALOT
  rationale: The piel of קדשׁ here is causative/declarative in public reputation,
    not implying that God's name is intrinsically lacking holiness. 'Vindicate the
    holiness of' communicates that God will publicly uphold and display the holiness
    of his name in response to its profanation.
- source_word: שְׁמִי הַגָּדוֹל
  chosen: my great name
  alternatives:
  - my name, the great one
  lexicon: HALOT
  rationale: A straightforward construct with attributive adjective. 'Great name'
    preserves both covenantal reputation and majesty.
- source_word: הַמְחֻלָּל
  chosen: which has been profaned
  alternatives:
  - which has been defiled
  - which has been desecrated
  lexicon: HALOT
  rationale: The pual participle of חלל in this context concerns treating as common/profane,
    especially God's name among the nations. 'Profaned' is the standard and most theologically
    precise English equivalent.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גוים in Ezekiel refers to the surrounding peoples/nations. 'Nations'
    is clearer in English and avoids importing later NT Jew/Gentile distinctions.
- source_word: אֲשֶׁר חִלַּלְתֶּם בְּתוֹכָם
  chosen: which you have profaned among them
  alternatives:
  - which you profaned in their midst
  lexicon: HALOT
  rationale: 'The relative clause resumes ''my great name.'' בְּתוֹכָם is best taken
    with the second profanation clause: Israel profaned God''s name in the midst of
    the nations.'
- source_word: וְיָדְעוּ
  chosen: Then ... will know
  alternatives:
  - and ... will know
  lexicon: HALOT
  rationale: The conjunction advances the result of God's action. 'Then' brings out
    the consequential force in natural English without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula. 'Declares' is idiomatic modern English.
    Because אֲדֹנָי stands before the divine name, 'Lord GOD' avoids the awkward 'Lord
    LORD' while preserving both titles.
- source_word: בְּהִקָּדְשִׁי בָכֶם
  chosen: when I show myself holy through you
  alternatives:
  - when I am sanctified in you
  - when I prove myself holy by you
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks the circumstance/time. The niphal/passive-reflexive
    sense here is that God manifests himself as holy in relation to Israel. ''Through
    you'' best captures בָכֶם in context: God demonstrates his holiness by his dealings
    with Israel.'
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  lexicon: HALOT
  rationale: A common idiom for public visibility. 'Before their eyes' is vivid and
    natural.
