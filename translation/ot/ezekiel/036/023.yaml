theological_decisions:
- issue: Rendering קדשׁ with respect to God's name
  chosen_reading: I will vindicate the holiness of my great name
  alternative_readings:
  - I will sanctify my great name
  - I will make my great name holy
  rationale: The verse does not suggest that God becomes holy; rather, he publicly
    demonstrates and upholds the holiness of his already holy name after Israel's
    profanation. This preserves the theological distinction between God's intrinsic
    holiness and its public recognition.
  doctrine_reference: Translation philosophy §1, §3
- issue: Instrumental/local sense of בְּהִקָּדְשִׁי בָכֶם
  chosen_reading: when I show myself holy through you
  alternative_readings:
  - when I am sanctified in you
  rationale: The Hebrew can be rendered more formally as 'in you,' but in context
    the sense is that God will display his holiness to the nations by what he does
    with Israel. 'Through you' communicates that public manifestation without denying
    the more literal wording, which is preserved in a footnote.
  doctrine_reference: Translation philosophy §5
