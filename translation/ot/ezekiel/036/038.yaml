id: EZK.36.38
reference: Ezekiel 36:38
source:
  edition: WLC
  text: כְּ/צֹ֣אן קָֽדָשִׁ֗ים כְּ/צֹ֤אן יְרוּשָׁלִַ֨ם֙ בְּ/מ֣וֹעֲדֶ֔י/הָ כֵּ֤ן תִּהְיֶ֨ינָה֙ הֶ/עָרִ֣ים הֶ/חֳרֵב֔וֹת מְלֵא֖וֹת צֹ֣אן אָדָ֑ם וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־׃ס
translation:
  text: Like the holy flock, like the flock of Jerusalem at her appointed feasts, so the ruined cities will be filled with flocks of people. Then they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “filled with human flocks” or “filled with people like a flock.” The Hebrew literally reads “filled with flocks of men,” preserving the image of people multiplied like sacrificial sheep in Jerusalem at festival times.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצֹאן קָדָשִׁים
  chosen: Like the holy flock
  alternatives:
  - Like the flock of holy things
  - Like sacred sheep/flocks
  lexicon: HALOT
  rationale: צֹאן denotes small livestock collectively, often 'flock.' קָדָשִׁים here most naturally qualifies the sacrificial/holy character of the flock in cultic context, especially in parallel with Jerusalem at festival times. Singular collective 'flock' reads naturally in English while preserving the simile.
- source_word: כְּצֹאן יְרוּשָׁלִַם בְּמוֹעֲדֶיהָ
  chosen: like the flock of Jerusalem at her appointed feasts
  alternatives:
  - like Jerusalem's flock at her festivals
  - like the flock in Jerusalem at its appointed times
  lexicon: HALOT
  rationale: מוֹעֵד commonly means appointed time/feast in cultic settings. Given the sacrificial imagery, 'appointed feasts' best preserves both timing and worship context. 'Her' reflects the feminine suffix referring to Jerusalem.
- source_word: כֵּן תִּהְיֶינָה
  chosen: so ... will be
  alternatives:
  - thus ... will become
  lexicon: HALOT
  rationale: 'Standard comparative-correlative construction: ''as... so...''. Future sense from תִּהְיֶינָה is retained.'
- source_word: הֶעָרִים הֶחֳרֵבוֹת
  chosen: the ruined cities
  alternatives:
  - the desolate cities
  - the devastated cities
  lexicon: HALOT
  rationale: חָרֵב/חֳרֵב denotes ruined, desolate, laid waste. 'Ruined' is concise and idiomatic here.
- source_word: מְלֵאוֹת צֹאן אָדָם
  chosen: will be filled with flocks of men
  alternatives:
  - will be full of human flocks
  - will be filled with people like a flock
  lexicon: HALOT
  rationale: 'The phrase is metaphorical: human beings compared to a flock. Retaining ''flocks of men'' preserves the Hebrew imagery more closely than flattening to simply ''people,'' while still being intelligible. אָדָם here refers to human beings, but because the phrase is idiomatic and collective, ''men'' preserves the source''s gender-accurate generic force per doctrine guidance.'
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: Simple waw + perfect with future/result sense in context. 'Then' brings out the consequential force in English without overtranslating.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָדָם
  chosen: men
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: אָדָם can denote humanity generically. Here in construct with צֹאן, the expression emphasizes cities filled with human beings as with sacrificial flocks. 'Men' preserves the source's gender-accurate generic force; alternatives are possible but less formally aligned.
