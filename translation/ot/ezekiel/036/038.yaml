theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per DOCTRINE.md contested terms,
    the default English rendering is 'the LORD,' while alternatives may be noted but
    not adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אָדָם in a generic-human sense
  chosen_reading: men
  alternative_readings:
  - humankind
  - people
  rationale: The project prefers gender-accurate renderings over gender-neutral ones
    where the source carries representative/generic force. In this metaphorical construct,
    'men' preserves the Hebrew form while still functioning generically in English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם
    → man / humankind (context)'
