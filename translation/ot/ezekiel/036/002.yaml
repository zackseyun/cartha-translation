theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The doctrine file sets the default rendering of יְהוָה as 'the LORD.'
    In the compound title, English convention uses 'Lord GOD' to represent both Hebrew
    elements without awkward repetition. This preserves reverential convention and
    source distinction.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → ''the LORD'''
