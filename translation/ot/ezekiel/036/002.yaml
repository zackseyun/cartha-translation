id: EZK.36.2
reference: Ezekiel 36:2
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֣עַן אָמַ֧ר הָ/אוֹיֵ֛ב עֲלֵי/כֶ֖ם הֶאָ֑ח
    וּ/בָמ֣וֹת עוֹלָ֔ם לְ/מֽוֹרָשָׁ֖ה הָ֥יְתָה לָּֽ/נוּ׃
translation:
  text: 'Thus says the Lord GOD: Because the enemy said against you, ‘Aha!’ and, ‘The
    ancient heights have become our possession,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the ancient high places have become our inheritance.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Standard English rendering for the compound divine title in Ezekiel.
    'Lord' translates אֲדֹנָי and 'GOD' represents YHWH in keeping with the project's
    default for יְהוָה as 'the LORD'; in the compound title, 'GOD' avoids 'Lord LORD'
    in English while preserving both elements.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - For the reason that
  lexicon: HALOT
  rationale: Introduces the reason for the following divine statement; 'Because' is
    natural modern English and preserves the causal force.
- source_word: הָאוֹיֵב
  chosen: the enemy
  alternatives:
  - an enemy
  - the foe
  lexicon: HALOT
  rationale: The article supports a definite sense. 'The enemy' is the most straightforward
    rendering.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - concerning you
  - over you
  lexicon: HALOT
  rationale: In context of hostile speech, 'against you' best conveys adversarial
    force.
- source_word: הֶאָח
  chosen: Aha!
  alternatives:
  - Ha!
  - Aha
  lexicon: HALOT
  rationale: Interjection of malicious triumph. 'Aha!' is idiomatic English and preserves
    the taunting tone.
- source_word: בָּמוֹת
  chosen: heights
  alternatives:
  - high places
  - mountain heights
  lexicon: HALOT
  rationale: Literally 'high places/heights.' Here the referent is the elevated places
    of the land rather than necessarily cult sites alone. 'Heights' keeps the image
    broad; the more traditional 'high places' is preserved in a footnote as a lexical
    alternative.
- source_word: עוֹלָם
  chosen: ancient
  alternatives:
  - everlasting
  - age-old
  - of old
  lexicon: HALOT
  rationale: In this context modifying the heights of the land, the sense is longstanding
    antiquity rather than metaphysical eternity. 'Ancient' is the clearest idiomatic
    choice.
- source_word: לְמוֹרָשָׁה
  chosen: our possession
  alternatives:
  - for a possession to us
  - as an inheritance for us
  - our inheritance
  lexicon: HALOT
  rationale: Denotes something possessed or inherited. 'Our possession' is natural
    English and fits the enemy's boast of seizure. 'Our inheritance' is possible but
    can imply legitimate right more strongly than the taunt warrants.
- source_word: הָיְתָה לָּנוּ
  chosen: have become our possession
  alternatives:
  - has become ours
  - was ours for a possession
  lexicon: HALOT
  rationale: The Hebrew is singular feminine agreeing with the collective idea expressed
    by the preceding phrase. English idiom renders the resultative sense well with
    'have become our possession,' treating the quoted claim as referring to the heights
    collectively.
