id: EZK.36.31
reference: Ezekiel 36:31
source:
  edition: WLC
  text: וּ/זְכַרְתֶּם֙ אֶת דַּרְכֵי/כֶ֣ם הָ/רָעִ֔ים וּ/מַעַלְלֵי/כֶ֖ם אֲשֶׁ֣ר לֹֽא
    טוֹבִ֑ים וּ/נְקֹֽטֹתֶם֙ בִּ/פְנֵי/כֶ֔ם עַ֚ל עֲוֺנֹ֣תֵי/כֶ֔ם וְ/עַ֖ל תּוֹעֲבֽוֹתֵי/כֶֽם־־׃
translation:
  text: Then you will remember your evil ways and your deeds that were not good, and
    you will loathe yourselves because of your iniquities and your abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and you will loathe yourselves in your own sight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְכַרְתֶּם
  chosen: Then you will remember
  alternatives:
  - and you will remember
  lexicon: HALOT
  rationale: Qal perfect 2mp with prefixed waw in prophetic sequence functions futurally
    in context following preceding restoration promises. 'Then' brings out the consequential
    sense in English, while 'remember' preserves the core lexical meaning.
- source_word: דַּרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes way, path, or manner of life. Here it refers
    metaphorically to moral conduct. 'Ways' preserves the Hebrew image and is natural
    English.
- source_word: הָרָעִים
  chosen: evil
  alternatives:
  - bad
  - wicked
  lexicon: HALOT
  rationale: The adjective marks the moral quality of the ways. 'Evil' best conveys
    ethical corruption without flattening the force.
- source_word: וּמַעַלְלֵיכֶם
  chosen: your deeds
  alternatives:
  - your actions
  - your practices
  lexicon: HALOT
  rationale: מַעֲלָל refers to deeds or actions, often with moral evaluation. 'Deeds'
    pairs well with 'ways' and preserves the concrete sense.
- source_word: אֲשֶׁר לֹא טוֹבִים
  chosen: that were not good
  alternatives:
  - which were evil
  - that were not right
  lexicon: HALOT
  rationale: The relative clause explicitly says 'not good.' Retaining this wording
    reflects the Hebrew rather than intensifying it to 'evil,' since 'evil' has already
    been used for the ways.
- source_word: וּנְקֹטֹתֶם
  chosen: you will loathe yourselves
  alternatives:
  - you will feel disgust at yourselves
  - you will be sickened with yourselves
  lexicon: HALOT
  rationale: The verb נקט in this stem/context conveys revulsion or loathing. Because
    it is followed by 'in your face/selves' and concerns moral self-repulsion, 'loathe
    yourselves' is the most idiomatic and forceful rendering.
- source_word: בִּפְנֵיכֶם
  chosen: yourselves
  alternatives:
  - in your own sight
  - before yourselves
  lexicon: HALOT
  rationale: Literally 'in your faces/presence.' In this idiom with נקט, the sense
    is reflexive self-disgust. 'Yourselves' communicates the idiomatic force in clear
    English. A more formal alternative is preserved in a footnote.
- source_word: עַל עֲוֺנֹתֵיכֶם
  chosen: because of your iniquities
  alternatives:
  - for your iniquities
  - on account of your guilt
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity or guilt. 'Iniquities' preserves the moral
    and covenantal weight and matches the plural concrete sense here. 'Because of'
    expresses causal עַל naturally in English.
- source_word: וְעַל תּוֹעֲבֹתֵיכֶם
  chosen: and your abominations
  alternatives:
  - and your detestable acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה denotes something abhorrent, often in cultic and moral contexts.
    'Abominations' preserves the strong biblical register and theological gravity.
