theological_decisions:
- issue: Meaning of God's relation to 'my holy name' in וָאֶחְמֹל
  chosen_reading: God expresses zealous concern for the sanctity/reputation of his
    holy name rather than pity toward Israel in this clause.
  alternative_readings:
  - God spared his holy name
  - God had pity for the sake of his holy name
  rationale: The immediate object of חמל is 'my holy name,' and the surrounding context
    (vv. 20–23) emphasizes the vindication of God's name among the nations. Rendering
    the clause as concern for the name preserves this theological emphasis without
    importing a different object of compassion.
  doctrine_reference: Translation philosophy §1, §3, §6
