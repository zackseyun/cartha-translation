id: EZK.36.21
reference: Ezekiel 36:21
source:
  edition: WLC
  text: וָ/אֶחְמֹ֖ל עַל שֵׁ֣ם קָדְשִׁ֑/י אֲשֶׁ֤ר חִלְּל֨וּ/הוּ֙ בֵּ֣ית יִשְׂרָאֵ֔ל
    בַּ/גּוֹיִ֖ם אֲשֶׁר בָּ֥אוּ שָֽׁמָּ/ה־־׃ס
translation:
  text: But I had concern for my holy name, which the house of Israel had profaned
    among the nations where they had gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I spared my holy name' or 'I had pity for my holy name.' The Hebrew
      verb can denote sparing or pity, but here it refers to the Lord's concern for
      the honor of his holy name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶחְמֹל
  chosen: I had concern
  alternatives:
  - I spared
  - I had pity
  - I was concerned for
  - I had compassion on
  lexicon: HALOT
  rationale: The verb חמל commonly conveys sparing, pitying, or having compassion/concern.
    In this context the object is 'my holy name,' not persons, so 'I had concern for'
    best captures the idiom in natural English without implying literal emotional
    pity toward the name itself. The past perfect fits the discourse flow after Israel's
    profanation among the nations.
- source_word: עַל
  chosen: for
  alternatives:
  - 'on'
  - over
  - concerning
  lexicon: HALOT
  rationale: With חמל, עַל marks the object of concern/pity. English idiom prefers
    'concern for' here.
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  - my sacred name
  lexicon: HALOT
  rationale: A standard covenantal expression referring to God's reputation and revealed
    identity. 'My holy name' is both natural and formally close.
- source_word: אֲשֶׁר חִלְּלוּהוּ
  chosen: which ... had profaned
  alternatives:
  - which ... had defiled
  - which ... had desecrated
  lexicon: HALOT
  rationale: חלל in the piel means to profane or treat as common what is holy. 'Profaned'
    preserves the holiness vocabulary central to Ezekiel.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  - Israel
  lexicon: HALOT
  rationale: '''House of Israel'' is a frequent prophetic designation and should be
    retained for consistency unless English becomes unnatural; here it remains clear
    and suitably formal.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים here refers to the foreign peoples among whom Israel was scattered.
    'Among the nations' is the most natural and contextually accurate rendering in
    Ezekiel.
- source_word: אֲשֶׁר בָּאוּ שָׁמָּה
  chosen: where they had gone
  alternatives:
  - where they went
  - to which they came
  - where they had come
  lexicon: HALOT
  rationale: בוא plus שמה literally means 'came there,' but in context of exile from
    Israel to foreign lands, idiomatic English prefers 'gone there' or simply 'gone.'
    The relative clause modifies 'the nations'; 'where they had gone' communicates
    destination naturally.
