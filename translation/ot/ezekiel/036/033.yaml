id: EZK.36.33
reference: Ezekiel 36:33
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה בְּ/יוֹם֙ טַהֲרִ֣/י אֶתְ/כֶ֔ם מִ/כֹּ֖ל עֲוֺנֽוֹתֵי/כֶ֑ם
    וְ/הֽוֹשַׁבְתִּי֙ אֶת הֶ֣/עָרִ֔ים וְ/נִבְנ֖וּ הֶ/חֳרָבֽוֹת־׃
translation:
  text: 'Thus says the Lord GOD: On the day I cleanse you from all your iniquities,
    I will cause the cities to be inhabited, and the ruins will be rebuilt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Lord GOD' represents the title אֲדֹנָי יְהוִה; alternatively,
      'the Lord Yahweh.'
    reason: alternative_reading
  - marker: b
    text: Or 'I will settle the cities' / 'I will cause people to dwell in the cities.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the waste places' or 'the desolate places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered as 'the Lord GOD,' the standard English representation of the
    compound divine title אֲדֹנָי יְהוִה. Per doctrine, יְהוָה is rendered 'the LORD';
    in this fixed combination, conventional English avoids 'Lord LORD' by using 'Lord
    GOD,' which preserves the reverential substitution pattern without introducing
    a transliteration.
- source_word: בְּיוֹם
  chosen: On the day
  alternatives:
  - In the day
  - When
  lexicon: HALOT
  rationale: A formally close temporal expression. 'On the day' preserves the Hebrew
    idiom while remaining natural English; 'when' would be smoother but less formally
    transparent.
- source_word: טַהֲרִי
  chosen: I cleanse
  alternatives:
  - I purify
  - I make clean
  lexicon: HALOT
  rationale: The piel of טהר here denotes cleansing/purifying from defilement. 'Cleanse'
    is idiomatic in English and fits the moral-spiritual context of removal of impurity
    from sins.
- source_word: מִכֹּל עֲוֺנוֹתֵיכֶם
  chosen: from all your iniquities
  alternatives:
  - from all your sins
  - from all your guilt
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of iniquity/guilt rather than the broader
    'sin.' 'Iniquities' preserves the moral weight and aligns with the source term
    more closely, while 'from' reflects the preposition מִן indicating separation/removal.
- source_word: וְהוֹשַׁבְתִּי אֶת הֶעָרִים
  chosen: I will cause the cities to be inhabited
  alternatives:
  - I will settle the cities
  - I will make the cities inhabited
  - I will cause people to dwell in the cities
  lexicon: HALOT
  rationale: 'The hiphil of ישׁב is causative: not merely ''I will dwell'' but ''I
    will cause to dwell / settle.'' Because the direct object is ''the cities,'' English
    idiom is best captured by ''cause the cities to be inhabited,'' preserving the
    causative sense without adding an explicit subject like ''people'' not present
    in the Hebrew.'
- source_word: וְנִבְנוּ הֶחֳרָבוֹת
  chosen: the ruins will be rebuilt
  alternatives:
  - the waste places will be rebuilt
  - the desolate places will be rebuilt
  lexicon: HALOT
  rationale: חֳרָבוֹת refers to ruined/desolated places. 'Ruins' is concise and natural
    in English, and pairs well with the passive/reflexive nuance of נבנוּ, 'will be
    rebuilt.'
