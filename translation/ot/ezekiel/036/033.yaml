theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies יְהוָה normally as 'the LORD.' In the fixed Hebrew
    sequence אֲדֹנָי יְהוִה, English translations traditionally use 'Lord GOD' to
    avoid the awkward 'Lord LORD.' This preserves reverence and distinguishes the
    compound title without transliterating the divine name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
