id: EZK.36.7
reference: Ezekiel 36:7
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה אֲנִ֖י נָשָׂ֣אתִי אֶת יָדִ֑/י אִם לֹ֤א הַ/גּוֹיִם֙ אֲשֶׁ֣ר לָ/כֶ֣ם מִ/סָּבִ֔יב הֵ֖מָּה כְּלִמָּתָ֥/ם יִשָּֽׂאוּ־־׃
translation:
  text: 'Therefore thus says the Lord GOD: I have lifted up my hand in oath that surely the nations that are around you will bear their disgrace.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I have lifted up my hand,' an idiom for swearing an oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title combines אֲדֹנָי with the divine name YHWH. Following the doctrine default for יְהוָה, the divine name is not transliterated but represented reverentially. In English Ezekiel conventionally distinguishes this form as 'Lord GOD' to avoid 'Lord LORD' and to reflect both elements of the Hebrew title.
- source_word: נָשָׂאתִי אֶת יָדִי
  chosen: I have lifted up my hand in oath
  alternatives:
  - I have lifted up my hand
  - I have sworn
  lexicon: HALOT
  rationale: Literally 'I have lifted my hand.' In prophetic and covenantal contexts this idiom signifies taking an oath. 'In oath' preserves the imagery while making the idiomatic force clear, avoiding an overly opaque literalism and an overly flattened paraphrase.
- source_word: אִם לֹא
  chosen: that
  alternatives:
  - surely
  - indeed
  - if not
  lexicon: HALOT
  rationale: After an oath formula, אִם לֹא functions asseveratively, introducing the sworn content rather than a simple conditional. Rendering it as 'that' after 'in oath' gives natural English syntax; the emphatic force is then reinforced by 'will surely' later in the clause.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to surrounding foreign peoples/nations hostile to Israel. 'Nations' is the most standard and contextually appropriate rendering; 'Gentiles' would import later Jewish/Christian usage not required by the immediate context.
- source_word: מִסָּבִיב
  chosen: around you
  alternatives:
  - all around you
  - surrounding you
  lexicon: HALOT
  rationale: The phrase identifies the neighboring nations geographically. 'Around you' is concise and natural, preserving the spatial sense.
- source_word: כְּלִמָּתָם
  chosen: their disgrace
  alternatives:
  - their shame
  - their humiliation
  - their reproach
  lexicon: HALOT
  rationale: כְּלִמָּה denotes shame, disgrace, or humiliation. 'Disgrace' fits the judicial-prophetic tone and works well with the idiom 'bear their disgrace.' 'Shame' is possible but can sound more internal/psychological in modern English.
- source_word: יִשָּׂאוּ
  chosen: will surely bear
  alternatives:
  - will bear
  - will carry
  lexicon: HALOT
  rationale: From נשׂא, 'to bear/carry.' In context it means to bear the consequence of disgrace. 'Will surely bear' captures both the verb and the emphatic force of the oath construction in the clause.
