theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for YHWH, following
    Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of אָדָם in a human/animal contrast
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine calls for gender-accurate rendering by context. Here אָדָם
    is a collective contrasted with beast, so 'man' best preserves the source pairing
    while functioning generically.
  doctrine_reference: 'Contested terms: אָדָם adam → man / humankind (context)'
