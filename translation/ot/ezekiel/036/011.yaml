id: EZK.36.11
reference: Ezekiel 36:11
source:
  edition: WLC
  text: וְ/הִרְבֵּיתִ֧י עֲלֵי/כֶ֛ם אָדָ֥ם וּ/בְהֵמָ֖ה וְ/רָב֣וּ וּ/פָר֑וּ וְ/הוֹשַׁבְתִּ֨י
    אֶתְ/כֶ֜ם כְּ/קַדְמֽוֹתֵי/כֶ֗ם וְ/הֵטִֽבֹתִי֙ מֵ/רִאשֹׁ֣תֵי/כֶ֔ם וִֽ/ידַעְתֶּ֖ם
    כִּֽי אֲנִ֥י יְהוָֽה־׃
translation:
  text: And I will multiply on you man and beast, and they will multiply and be fruitful;
    and I will settle you as in your former times, and I will do better for you than
    at your beginnings. Then you will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind and animals.' The Hebrew reads literally 'man and beast,'
      a common prophetic pairing for human and animal population together.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will cause you to dwell' / 'I will resettle you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will do good to you more than at first.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  chosen: I will multiply
  alternatives:
  - I will make numerous
  - I will increase
  lexicon: HALOT
  rationale: Hiphil of רבה with first-person subject expresses causative increase.
    'Multiply' preserves the verbal link with the following וְרָבוּ and echoes covenant-restoration
    language without over-paraphrase.
- source_word: עֲלֵיכֶם
  chosen: on you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: The preposition is literally 'upon/on you.' In English this is somewhat
    marked, but it reflects the Hebrew image of people and animals increasing over
    the land/mountains addressed in context. Retained for source transparency.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it is paired
    with 'beast' and denotes human population in contrast to animals. 'Man' preserves
    the singular collective force and the human/animal pairing.
- source_word: וּבְהֵמָה
  chosen: beast
  alternatives:
  - livestock
  - animals
  lexicon: HALOT
  rationale: בְּהֵמָה here is a collective for animals, especially domesticated stock
    in land-restoration contexts. 'Beast' keeps the concise pairing 'man and beast'
    common in prophetic English; 'livestock' is possible but narrower.
- source_word: וְרָבוּ וּפָרוּ
  chosen: they will multiply and be fruitful
  alternatives:
  - they will become many and be fruitful
  - they will increase and bear fruit
  lexicon: HALOT
  rationale: The two Qal verbs describe resultant population growth and fertility.
    'Be fruitful' is the natural rendering of פרה and preserves biblical resonance.
    The subject is the preceding 'man and beast' collectively, hence 'they will.'
- source_word: וְהוֹשַׁבְתִּי אֶתְכֶם
  chosen: I will settle you
  alternatives:
  - I will cause you to dwell
  - I will resettle you
  lexicon: HALOT
  rationale: 'Hiphil of ישב is causative: causing the people to dwell. ''Settle you''
    is readable modern English and preserves the restoration-to-inhabited-land sense
    better than the more wooden ''cause you to dwell.'''
- source_word: כְּקַדְמֹתֵיכֶם
  chosen: as in your former times
  alternatives:
  - as at first
  - as formerly
  lexicon: HALOT
  rationale: The noun refers to former days/earlier state. 'As in your former times'
    communicates restoration to an earlier condition without implying exact replication
    of the remote beginning.
- source_word: וְהֵטִבֹתִי
  chosen: I will do better for you
  alternatives:
  - I will make it better for you
  - I will prosper you more
  lexicon: HALOT
  rationale: Hiphil of יטב means to do good/make well. In this comparative construction,
    'do better for you' captures the benefactive sense and the comparison that follows.
- source_word: מֵרִאשֹׁתֵיכֶם
  chosen: than at your beginnings
  alternatives:
  - than formerly
  - than at first
  lexicon: HALOT
  rationale: The comparative מן plus 'your beginnings/first times' points to an earlier
    stage. 'Than at your beginnings' is slightly formal but preserves the plural abstract
    noun and the comparison with the restored future.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  chosen: Then you will know that I am the LORD
  alternatives:
  - And you will know that I am the LORD
  lexicon: HALOT
  rationale: Standard covenant formula in Ezekiel. 'The LORD' follows doctrine for
    יְהוָה. 'Then' makes the result nuance natural in English, though the conjunction
    is simply waw.
