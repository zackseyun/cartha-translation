id: EZK.36.34
reference: Ezekiel 36:34
source:
  edition: WLC
  text: וְ/הָ/אָ֥רֶץ הַ/נְּשַׁמָּ֖ה תֵּֽעָבֵ֑ד תַּ֚חַת אֲשֶׁ֣ר הָיְתָ֣ה שְׁמָמָ֔ה
    לְ/עֵינֵ֖י כָּל עוֹבֵֽר־׃
translation:
  text: And the desolate land will be cultivated instead of being a desolation in
    the sight of all who pass by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the desolate land will be worked/cultivated, whereas it had been a
      desolation before the eyes of all who passed by.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Ezekiel's restoration context, אֶרֶץ refers to the territory of Israel
    rather than the whole earth. 'Land' is the most natural and contextually precise
    English rendering.
- source_word: הַנְּשַׁמָּה
  chosen: desolate
  alternatives:
  - laid waste
  - devastated
  lexicon: HALOT
  rationale: This passive participial form functions adjectivally with 'land.' 'Desolate'
    preserves the state of ruin succinctly and matches the restoration/desolation
    contrast in the verse.
- source_word: תֵּעָבֵד
  chosen: will be cultivated
  alternatives:
  - will be worked
  - will be tilled
  lexicon: HALOT
  rationale: The Niphal of עבד here denotes the land being worked agriculturally.
    'Will be cultivated' communicates the passive sense clearly in natural English
    and fits the agricultural restoration imagery.
- source_word: תַּחַת אֲשֶׁר
  chosen: instead of being
  alternatives:
  - whereas it had been
  - in place of the fact that it was
  lexicon: HALOT
  rationale: 'The construction marks contrast or replacement: the land will now be
    cultivated in place of its former condition. ''Instead of being'' brings out that
    contrast idiomatically in English.'
- source_word: הָיְתָה שְׁמָמָה
  chosen: being a desolation
  alternatives:
  - having been desolate
  - being laid waste
  lexicon: HALOT
  rationale: שְׁמָמָה is a noun, not merely an adjective, so 'a desolation' preserves
    the nominal force better than simply repeating 'desolate.' The participial English
    phrase fits the contrast with the future cultivation.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before the eyes of
  - in the eyes of
  lexicon: HALOT
  rationale: This idiom denotes public visibility or observation. 'In the sight of'
    is clear, natural, and preserves the concrete imagery of being seen by passersby.
- source_word: כָּל עוֹבֵר
  chosen: all who pass by
  alternatives:
  - every passerby
  - all passersby
  lexicon: HALOT
  rationale: The singular participle with כָּל has a collective sense. 'All who pass
    by' is smooth modern English and preserves the ongoing, generic force of the participle.
