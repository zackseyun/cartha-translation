id: EZK.36.19
reference: Ezekiel 36:19
source:
  edition: WLC
  text: וָ/אָפִ֤יץ אֹתָ/ם֙ בַּ/גּוֹיִ֔ם וַ/יִּזָּר֖וּ בָּ/אֲרָצ֑וֹת כְּ/דַרְכָּ֥/ם
    וְ/כַ/עֲלִילוֹתָ֖/ם שְׁפַטְתִּֽי/ם׃
translation:
  text: So I scattered them among the nations, and they were dispersed through the
    lands; I judged them according to their ways and according to their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they were scattered through the countries.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָפִיץ
  chosen: I scattered
  alternatives:
  - I dispersed
  - I drove apart
  lexicon: HALOT
  rationale: The Hiphil of פוץ commonly conveys causing to scatter. 'I scattered'
    is natural English and preserves divine agency without overinterpreting the manner
    of exile.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations among whom Israel was exiled.
    'Nations' is the most contextually appropriate and least misleading in English;
    'Gentiles' would import later Jewish/NT associations.
- source_word: וַיִּזָּרוּ
  chosen: they were dispersed
  alternatives:
  - they were scattered
  lexicon: HALOT
  rationale: 'The Niphal/passive-reflexive sense complements the prior active verb:
    God scattered them, and as a result they were dispersed. Using ''dispersed'' avoids
    awkward repetition with ''scattered'' while preserving the semantic overlap.'
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - through the countries
  - in the lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is the plural of 'lands/earth.' In exile context it denotes
    various territories/countries. 'Through the lands' fits the distributive sense
    of dispersion across multiple regions.
- source_word: כְּדַרְכָּם
  chosen: according to their ways
  alternatives:
  - according to their conduct
  - by their way
  lexicon: HALOT
  rationale: דֶּרֶךְ in prophetic moral contexts often means manner of life or conduct.
    'Ways' preserves the Hebrew metaphor and common prophetic idiom.
- source_word: וְכַעֲלִילוֹתָם
  chosen: and according to their deeds
  alternatives:
  - and according to their actions
  - and according to their practices
  lexicon: HALOT
  rationale: עֲלִילוֹת denotes deeds/actions, often with moral coloring. 'Deeds' is
    concise and suitably weighty in a judgment context.
- source_word: שְׁפַטְתִּים
  chosen: I judged them
  alternatives:
  - I brought them to judgment
  - I punished them
  lexicon: HALOT
  rationale: The verb שׁפט fundamentally means to judge. 'I judged them' preserves
    the judicial framing of divine action; 'punished' would narrow the sense to penalty
    rather than judgment according to conduct.
