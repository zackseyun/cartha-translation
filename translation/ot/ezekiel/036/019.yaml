theological_decisions:
- issue: Relationship between divine judgment and exile
  chosen_reading: The verse presents exile as God's judicial act in response to Israel's
    conduct.
  alternative_readings:
  - The verse could be rendered more passively, emphasizing the state of dispersion
    rather than God's agency.
  rationale: The first-person verbs explicitly attribute both scattering and judging
    to God. The translation preserves this theological claim without expanding it
    beyond the verse.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
