id: EZK.36.25
reference: Ezekiel 36:25
source:
  edition: WLC
  text: וְ/זָרַקְתִּ֧י עֲלֵי/כֶ֛ם מַ֥יִם טְהוֹרִ֖ים וּ/טְהַרְתֶּ֑ם מִ/כֹּ֧ל טֻמְאוֹתֵי/כֶ֛ם
    וּ/מִ/כָּל גִּלּ֥וּלֵי/כֶ֖ם אֲטַהֵ֥ר אֶתְ/כֶֽם־׃
translation:
  text: And I will sprinkle clean water on you, and you will be clean; from all your
    uncleannesses and from all your idols I will cleanse you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from all your dung-idols'; Ezekiel often uses a deliberately
      contemptuous term for idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָרַקְתִּי
  chosen: And I will sprinkle
  alternatives:
  - And I will throw
  - And I will scatter
  lexicon: HALOT
  rationale: זרק in ritual/purification contexts is best rendered 'sprinkle,' which
    fits both the direct object 'water' and the cleansing imagery of the verse. More
    literal options like 'throw' or 'scatter' are possible in other contexts but are
    too blunt here.
- source_word: עֲלֵיכֶם
  chosen: on you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: The preposition על with persons after 'sprinkle' is naturally rendered
    'on you' in modern English. 'Upon you' is more formal but less natural.
- source_word: מַיִם טְהוֹרִים
  chosen: clean water
  alternatives:
  - pure water
  lexicon: HALOT
  rationale: טָהוֹר commonly denotes ritual cleanness/purity. 'Clean water' is idiomatic
    and preserves the purification sense without sounding overly technical. 'Pure
    water' is possible, but 'clean' better matches the repeated cleansing language
    in the verse.
- source_word: וּטְהַרְתֶּם
  chosen: and you will be clean
  alternatives:
  - and you shall be clean
  - and you will be purified
  lexicon: HALOT
  rationale: Though from the same root as 'cleanse,' the form here describes the resulting
    state of the people, so 'you will be clean' is preferable to the more process-oriented
    'be purified.' This also preserves the distinction from the later first-person
    verb 'I will cleanse you.'
- source_word: מִכֹּל טֻמְאוֹתֵיכֶם
  chosen: from all your uncleannesses
  alternatives:
  - from all your impurities
  - from all your defilements
  lexicon: HALOT
  rationale: The plural noun refers broadly to states of impurity/defilement. 'Uncleannesses'
    is slightly less common in English but preserves the lexical connection to the
    clean/cleanse language and the plural form. 'Defilements' is a viable alternative
    but shifts away from the root repetition.
- source_word: וּמִכָּל גִּלּוּלֵיכֶם
  chosen: and from all your idols
  alternatives:
  - and from all your dung-idols
  - and from all your idol-images
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. 'Idols' is the
    clearest main-text rendering. The pejorative force ('dung-idols') is lexically
    significant but too interpretive for the main text, so it is preserved in a footnote.
- source_word: אֲטַהֵר אֶתְכֶם
  chosen: I will cleanse you
  alternatives:
  - I will purify you
  - I will make you clean
  lexicon: HALOT
  rationale: 'The Piel form is causative/intensive: God actively removes impurity.
    ''I will cleanse you'' is direct, natural, and keeps the repeated טהר wordplay
    across the verse.'
