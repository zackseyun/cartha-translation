theological_decisions:
- issue: Nature of the cleansing imagery
  chosen_reading: Retain the language of ritual/moral cleansing without specifying
    sacramental mechanism.
  alternative_readings:
  - Read as primarily metaphorical national restoration
  - Read as directly sacramental/baptismal in main text
  rationale: The verse uses purification imagery that later Christian readers may
    connect typologically with baptism, but the Hebrew text itself speaks of God's
    cleansing from impurity and idols in the context of restoration. The translation
    should preserve that theological openness without importing later doctrinal specificity
    into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
