theological_decisions:
- issue: Nature of the impurity language
  chosen_reading: Render the comparison in cultic-moral terms without softening it
    to merely social offensiveness.
  alternative_readings:
  - Translate more generally as 'filthiness' or 'pollution' without menstrual reference
  rationale: The verse uses ritual impurity imagery to describe Israel's moral defilement
    of the land. The translation should preserve that theological metaphor rather
    than reduce it to generic disgust language.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Temporal force of the opening clause
  chosen_reading: 'Supply ''when'' in English: ''when the house of Israel was dwelling...'''
  alternative_readings:
  - 'Leave as a verbless apposition: ''the house of Israel dwelling on their land...'''
  rationale: English idiom benefits from an explicit temporal connection, and the
    Hebrew participial clause functions as the setting for the following action. This
    is an optimal-equivalence adjustment, not an interpretive expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
