id: EZK.36.17
reference: Ezekiel 36:17
source:
  edition: WLC
  text: בֶּן אָדָ֗ם בֵּ֤ית יִשְׂרָאֵל֙ יֹשְׁבִ֣ים עַל אַדְמָתָ֔/ם וַ/יְטַמְּא֣וּ אוֹתָ֔/הּ
    בְּ/דַרְכָּ֖/ם וּ/בַ/עֲלִֽילוֹתָ֑/ם כְּ/טֻמְאַת֙ הַ/נִּדָּ֔ה הָיְתָ֥ה דַרְכָּ֖/ם
    לְ/פָנָֽ/י־־׃
translation:
  text: Son of man, when the house of Israel was dwelling on their own land, they
    defiled it by their way and by their deeds; their way before me was like the uncleanness
    of a menstruating woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like menstrual uncleanness' or 'like the impurity of menstruation.'
      The Hebrew compares Israel's conduct to the ritual impurity associated with
      menstruation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard prophetic address in Ezekiel. Retaining the familiar 'Son of
    man' preserves the idiom and its literary continuity, while still accurately reflecting
    the Hebrew בן אדם.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: A conventional collective expression for Israel. 'House of Israel' preserves
    the covenantal and corporate sense more closely than the more interpretive 'people
    of Israel'.
- source_word: יֹשְׁבִים
  chosen: was dwelling
  alternatives:
  - dwelt
  - lived
  - was living
  lexicon: HALOT
  rationale: The participle describes ongoing residence. 'Was dwelling' captures the
    durative sense in smooth English and fits the temporal setup of the verse.
- source_word: עַל אַדְמָתָם
  chosen: on their own land
  alternatives:
  - on their land
  - upon their soil
  lexicon: HALOT
  rationale: אַדָמָה can mean land/ground/soil. 'Their own land' brings out the possessive
    force and covenant-land context without becoming wooden.
- source_word: וַיְטַמְּאוּ אֹתָהּ
  chosen: they defiled it
  alternatives:
  - they made it unclean
  - they polluted it
  lexicon: HALOT
  rationale: טמא in this context refers to ritual-moral defilement of the land. 'Defiled'
    best preserves both cultic and ethical resonance.
- source_word: בְּדַרְכָּם
  chosen: by their way
  alternatives:
  - by their conduct
  - through their way of life
  lexicon: HALOT
  rationale: דֶּרֶךְ often functions metaphorically for conduct. 'Way' preserves the
    Hebrew metaphor; the following phrase clarifies the practical outworking.
- source_word: וּבַעֲלִילוֹתָם
  chosen: by their deeds
  alternatives:
  - by their acts
  - by their practices
  lexicon: HALOT
  rationale: עֲלִילוֹת refers to actions/deeds, often with a negative moral coloring.
    'Deeds' is concise and natural, while retaining moral weight.
- source_word: כְּטֻמְאַת הַנִּדָּה
  chosen: like the uncleanness of a menstruating woman
  alternatives:
  - like menstrual uncleanness
  - like the impurity of menstruation
  lexicon: HALOT
  rationale: The phrase compares Israel's conduct to menstrual impurity. Rendering
    the image explicitly avoids euphemistic flattening and makes the simile intelligible
    to modern readers.
- source_word: הָיְתָה דַרְכָּם לְפָנַי
  chosen: their way before me was
  alternatives:
  - their conduct in my sight was
  - their way in my presence was
  lexicon: HALOT
  rationale: לְפָנַי is literally 'before me,' indicating God's evaluative presence.
    'Before me' preserves the relational and judicial nuance more directly than a
    paraphrase.
