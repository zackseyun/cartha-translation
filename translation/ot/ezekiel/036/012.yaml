id: EZK.36.12
reference: Ezekiel 36:12
source:
  edition: WLC
  text: וְ/הוֹלַכְתִּי֩ עֲלֵי/כֶ֨ם אָדָ֜ם אֶת עַמִּ֤/י יִשְׂרָאֵל֙ וִֽ/ירֵשׁ֔וּ/ךָ
    וְ/הָיִ֥יתָ לָ/הֶ֖ם לְ/נַחֲלָ֑ה וְ/לֹא תוֹסִ֥ף ע֖וֹד לְ/שַׁכְּלָֽ/ם־־׃ס
translation:
  text: And I will cause man—my people Israel—to walk upon you, and they will possess
    you, and you will be their inheritance, and you will no longer again bereave them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will bring people upon you, my people Israel.' The Hebrew literally
      says 'I will cause man to walk upon you,' with 'my people Israel' explaining
      who is meant.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will inherit you.' The verb can mean either 'possess' or 'inherit'
      in land contexts.
    reason: lexical_alternative
  - marker: c
    text: Or 'make them childless' / 'deprive them of children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹלַכְתִּי
  chosen: I will cause ... to walk
  alternatives:
  - I will lead
  - I will bring
  lexicon: HALOT
  rationale: Hiphil of הלך is causative. With עֲלֵיכֶם ('upon/on you') and the land
    addressed in the context, the sense is causing people to move/walk upon the land,
    not merely abstract guidance. 'Cause to walk' preserves the causative force better
    than a simple 'bring,' though 'bring' is a possible smoother English alternative.
- source_word: עֲלֵיכֶם
  chosen: upon you
  alternatives:
  - on you
  - over you
  lexicon: HALOT
  rationale: The addressee is the land/mountains in the surrounding context, grammatically
    plural. English singular 'you' is used because the land is treated collectively.
    'Upon you' fits the imagery of people traversing and inhabiting the land.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it is immediately
    apposed/explained by 'my people Israel,' so the singular collective 'man' preserves
    the Hebrew form while functioning corporately. 'Humankind' would be too broad,
    and 'people' would flatten the lexical distinction before the apposition.
- source_word: אֶת עַמִּי יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - my people, Israel
  lexicon: HALOT
  rationale: 'Direct object marker plus construct phrase identifies who the collective
    ''man'' is: specifically Israel. The appositional dash in English reflects the
    explanatory relationship.'
- source_word: וִירֵשׁוּךָ
  chosen: they will possess you
  alternatives:
  - they will inherit you
  - they will take possession of you
  lexicon: HALOT
  rationale: ירשׁ commonly carries the sense of possessing/inheriting land. Because
    the object is the land itself addressed as 'you,' 'possess you' is idiomatic and
    direct. 'Inherit you' is possible and is conceptually echoed in the next clause
    with נַחֲלָה.
- source_word: וְהָיִיתָ לָהֶם לְנַחֲלָה
  chosen: you will be their inheritance
  alternatives:
  - you will be for them as an inheritance
  - you will become their possession
  lexicon: HALOT
  rationale: נַחֲלָה is standardly 'inheritance.' Retaining that term preserves covenant-land
    theology and the parallel with ירשׁ. The English is smoothed slightly from the
    Hebrew prepositional structure.
- source_word: וְלֹא תוֹסִף עוֹד
  chosen: you will no longer again
  alternatives:
  - you will no longer
  - you will not continue any longer
  lexicon: HALOT
  rationale: 'The combination intensifies cessation: ''you will not add עוד.'' English
    normally needs only ''no longer,'' but ''again'' helps preserve the iterative
    nuance that this will not recur.'
- source_word: לְשַׁכְּלָם
  chosen: bereave them
  alternatives:
  - make them childless
  - deprive them of children
  lexicon: HALOT
  rationale: The piel of שׁכל often means to bereave or make childless. In the land-oracle
    context, the idea is that the land will no longer rob Israel of its children/inhabitants.
    'Bereave them' is concise and preserves the metaphorical force; the more explicit
    child-related sense is worth preserving in a footnote.
