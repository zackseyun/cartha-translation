theological_decisions:
- issue: Rendering covenant-land terminology without flattening it
  chosen_reading: you will be their inheritance
  alternative_readings:
  - you will be their possession
  rationale: Using 'inheritance' preserves the covenantal and theological resonance
    of Israel receiving the land from God, rather than reducing the clause to mere
    ownership language.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
