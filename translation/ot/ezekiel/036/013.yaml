id: EZK.36.13
reference: Ezekiel 36:13
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֚עַן אֹמְרִ֣ים לָ/כֶ֔ם אֹכֶ֥לֶת אָדָ֖ם אתי
    וּ/מְשַׁכֶּ֥לֶת גוי/ך הָיִֽית׃
translation:
  text: 'Thus says the Lord GOD: Because they say of you, ‘You are a land that devours
    man and has bereaved your nation,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a devourer of man'; 'man' here carries a collective sense,
      i.e., people/humankind.
    reason: lexical_alternative
  - marker: b
    text: Or 'has made your nation childless' / 'has bereaved your people.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Standard prophetic introductory adverb; 'Thus' preserves the formal prophetic
    cadence without becoming archaic in context.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Conventional rendering of the compound divine title אֲדֹנָי יְהוִה. Per
    doctrine, יְהוָה is rendered 'the LORD'; in this compound, English convention
    uses 'the Lord GOD' to avoid 'Lord LORD' while preserving both elements.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - On account of
  lexicon: HALOT
  rationale: Introduces the reason clause plainly and naturally.
- source_word: אֹמְרִים לָכֶם
  chosen: they say of you
  alternatives:
  - they say to you
  - they are saying about you
  lexicon: HALOT
  rationale: Although ל often means 'to,' here the following feminine singular predicates
    address the land indirectly; idiomatic English is 'say of you/about you.'
- source_word: אֹכֶלֶת
  chosen: devours
  alternatives:
  - eats
  - consumes
  lexicon: HALOT
  rationale: The participle from אכל is metaphorical of a land consuming its inhabitants.
    'Devours' best conveys the vivid, hostile imagery.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here the singular
    collective after 'devours' is idiomatic as 'man,' preserving the Hebrew expression
    while functioning generically.
- source_word: אתי (2fs pronoun)
  chosen: a land
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The ketiv-like form reflects the feminine singular addressee, the land.
    English requires making the implied referent explicit for clarity: ''You are a
    land that…'' rather than leaving the pronoun bare.'
- source_word: וּמְשַׁכֶּלֶת
  chosen: has bereaved
  alternatives:
  - causes to miscarry
  - deprives of children
  - makes childless
  lexicon: HALOT
  rationale: The verb שׁכל in the piel commonly denotes bereaving or making childless.
    In context of a land losing inhabitants, 'has bereaved' captures the result without
    over-specifying miscarriage.
- source_word: גּוֹיִךְ
  chosen: your nation
  alternatives:
  - your people
  - your inhabitants
  lexicon: HALOT
  rationale: Though גוי can mean 'nation' or 'people,' the singular with 2fs suffix
    refers to the land's own national population. 'Your nation' preserves the corporate
    sense better than the more diffuse 'people.'
- source_word: הָיִית
  chosen: has ...
  alternatives:
  - you have been
  - you were
  lexicon: HALOT
  rationale: 'English smooths the Hebrew perfect with the preceding participles by
    expressing the accusation as a present characterization with resultant force:
    ''You are ... and have bereaved ...'''
