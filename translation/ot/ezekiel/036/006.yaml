id: EZK.36.6
reference: Ezekiel 36:6
source:
  edition: WLC
  text: לָ/כֵ֕ן הִנָּבֵ֖א עַל אַדְמַ֣ת יִשְׂרָאֵ֑ל וְ/אָמַרְתָּ֡ לֶ/הָרִ֣ים וְ֠/לַ/גְּבָעוֹת לָ/אֲפִיקִ֨ים וְ/לַ/גֵּאָי֜וֹת כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה הִנְ/נִ֨י בְ/קִנְאָתִ֤/י וּ/בַ/חֲמָתִ/י֙ דִּבַּ֔רְתִּי יַ֛עַן כְּלִמַּ֥ת גּוֹיִ֖ם נְשָׂאתֶֽם־־׀׃
translation:
  text: 'Therefore prophesy concerning the land of Israel, and say to the mountains and the hills, to the ravines and the valleys, ‘Thus says the Lord GOD: Behold, I have spoken in my jealousy and in my wrath, because you have borne the disgrace of the nations.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my zeal.' The Hebrew קִנְאָה can carry the sense of jealousy or zeal, especially in covenantal contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'the reproach of the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - the soil of Israel
  - the ground of Israel
  lexicon: HALOT
  rationale: אַדְמָה can mean ground/soil/land. In this context, where the terrain features of Israel are directly addressed, 'land of Israel' is the most natural and idiomatic rendering in English while preserving the territorial sense.
- source_word: לֶהָרִים ... לַגְּבָעוֹת ... לָאֲפִיקִים ... וְלַגֵּאָיוֹת
  chosen: to the mountains and the hills, to the ravines and the valleys
  alternatives:
  - to the mountains and the hills, to the channels and the valleys
  - to the mountains and the hills, to the wadis and the valleys
  lexicon: HALOT
  rationale: The verse personifies the topography of Israel. הָרִים and גְּבָעוֹת are straightforwardly 'mountains' and 'hills.' אֲפִיקִים can denote channels, ravines, or streambeds; 'ravines' best fits a natural-landscape list in readable English. גֵּאָיוֹת are 'valleys.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine guideline for יְהוָה, the divine name is rendered 'the LORD.' In the compound אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering as 'the Lord GOD,' preserving both elements and matching the source's solemn titulature.
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנְנִי here introduces emphatic divine self-involvement. 'Look' is a readable modern-English equivalent to the deictic force of 'behold,' without archaic tone.
- source_word: בְקִנְאָתִי
  chosen: in my jealousy
  alternatives:
  - in my zeal
  lexicon: HALOT
  rationale: קִנְאָה can denote jealousy or zeal. In divine speech about covenantal offense and vindication, 'jealousy' preserves the stronger relational and covenantal nuance, while 'zeal' is a viable alternative worth preserving.
- source_word: וּבַחֲמָתִי
  chosen: and in my wrath
  alternatives:
  - and in my fury
  lexicon: HALOT
  rationale: חֵמָה commonly denotes wrath, fury, or heat of anger. 'Wrath' is weighty but still natural English and fits prophetic judgment language.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I speak
  - I have declared
  lexicon: HALOT
  rationale: The perfect verb presents the speech as a settled divine utterance. 'I have spoken' preserves the completed, authoritative force common in prophetic formulae.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of the fact that
  lexicon: HALOT
  rationale: יַעַן introduces the reason clause. 'Because' is the clearest natural English equivalent.
- source_word: כְּלִמַּת גּוֹיִם
  chosen: the disgrace of the nations
  alternatives:
  - the reproach of the nations
  - the humiliation from the nations
  lexicon: HALOT
  rationale: כְּלִמָּה denotes disgrace, insult, or reproach. 'Disgrace' communicates the shame-bearing sense clearly; 'reproach' is more traditional and remains a strong alternative.
- source_word: נְשָׂאתֶם
  chosen: you have borne
  alternatives:
  - you have carried
  - you have endured
  lexicon: HALOT
  rationale: נשא in this idiom means to bear/carry a burden, here metaphorically the shame imposed by the nations. 'You have borne' is both idiomatic and close to the Hebrew image.
