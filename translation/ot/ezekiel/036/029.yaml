id: EZK.36.29
reference: Ezekiel 36:29
source:
  edition: WLC
  text: וְ/הוֹשַׁעְתִּ֣י אֶתְ/כֶ֔ם מִ/כֹּ֖ל טֻמְאֽוֹתֵי/כֶ֑ם וְ/קָרָ֤אתִי אֶל הַ/דָּגָן֙
    וְ/הִרְבֵּיתִ֣י אֹת֔/וֹ וְ/לֹא אֶתֵּ֥ן עֲלֵי/כֶ֖ם רָעָֽב־־׃
translation:
  text: I will save you from all your uncleannesses, and I will call for the grain
    and multiply it, and I will not bring famine upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all your impurities' or 'from all your defilements.' The Hebrew
      uses impurity language that can include both ritual and moral uncleanness.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will summon the grain.' The Hebrew pictures God as calling for the
      grain, emphasizing his sovereign command over agricultural abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשַׁעְתִּי
  chosen: I will save
  alternatives:
  - I will deliver
  - I will rescue
  lexicon: HALOT
  rationale: The Hiphil of ישׁע here denotes Yahweh's act of bringing the people out
    of a defiled condition. 'Save' is the most direct and natural rendering in English
    and preserves the theological weight of divine deliverance without over-specifying
    the mode.
- source_word: מִכֹּל טֻמְאוֹתֵיכֶם
  chosen: from all your uncleannesses
  alternatives:
  - from all your impurities
  - from all your defilements
  lexicon: HALOT
  rationale: טֻמְאָה language in Ezekiel is cultic and moral. 'Uncleannesses' keeps
    the plural and preserves the impurity framework of the Hebrew better than the
    smoother but less transparent 'impurities.'
- source_word: וְקָרָאתִי אֶל הַדָּגָן
  chosen: I will call for the grain
  alternatives:
  - I will summon the grain
  - I will call to the grain
  lexicon: HALOT
  rationale: קרא אל literally means 'call to/for.' In this agricultural context, the
    idiom expresses divine command over fertility and produce. 'Call for the grain'
    is idiomatic in English while still reflecting the metaphor of summoning abundance.
- source_word: הַדָּגָן
  chosen: the grain
  alternatives:
  - corn
  - the cereal crop
  lexicon: HALOT
  rationale: דגן refers broadly to grain/cereal produce, not specifically maize. 'The
    grain' is accurate, natural, and avoids the misleading traditional English 'corn'
    for modern readers.
- source_word: וְהִרְבֵּיתִי אֹתוֹ
  chosen: and multiply it
  alternatives:
  - and make it abundant
  - and increase it
  lexicon: HALOT
  rationale: The Hiphil of רבה means to make numerous or abundant. 'Multiply it' stays
    close to the Hebrew and fits the imagery of increased produce.
- source_word: וְלֹא אֶתֵּן עֲלֵיכֶם רָעָב
  chosen: and I will not bring famine upon you
  alternatives:
  - and I will not give famine against you
  - and I will not send famine on you
  lexicon: HALOT
  rationale: נתן על with רָעָב is an idiomatic way of imposing famine. 'Bring famine
    upon you' communicates the sense clearly in modern English while preserving divine
    agency.
