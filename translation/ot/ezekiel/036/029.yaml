theological_decisions:
- issue: Nature of salvation in context
  chosen_reading: Temporal-covenantal deliverance from impurity and its consequences,
    expressed in language that also carries broader theological resonance.
  alternative_readings:
  - Primarily spiritual salvation from sin
  - Purely ritual cleansing without broader covenant renewal
  rationale: In Ezekiel 36 the promise includes cleansing, new heart/spirit, land
    restoration, and agricultural blessing. Rendering ישׁע as 'save' preserves the
    canonical theological resonance without narrowing the verse to later doctrinal
    categories or flattening it into merely ritual language.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Impurity terminology
  chosen_reading: Retain impurity language ('uncleannesses') rather than interpretively
    resolving it into only moral or only ceremonial categories.
  alternative_readings:
  - sins
  - impurities
  - defilements
  rationale: The Hebrew term can encompass cultic and moral pollution in Ezekiel.
    The translation preserves that tension rather than collapsing the category into
    a single doctrinal interpretation.
  doctrine_reference: Translation philosophy §3
