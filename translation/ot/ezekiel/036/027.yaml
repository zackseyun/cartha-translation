id: EZK.36.27
reference: Ezekiel 36:27
source:
  edition: WLC
  text: וְ/אֶת רוּחִ֖/י אֶתֵּ֣ן בְּ/קִרְבְּ/כֶ֑ם וְ/עָשִׂ֗יתִי אֵ֤ת אֲשֶׁר בְּ/חֻקַּ/י֙
    תֵּלֵ֔כוּ וּ/מִשְׁפָּטַ֥/י תִּשְׁמְר֖וּ וַ/עֲשִׂיתֶֽם־־׃
translation:
  text: And I will put my Spirit within you, and I will cause you to walk in my statutes,
    and you will keep my judgments and do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my decrees' for 'my statutes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my ordinances' or 'my rules' for 'my judgments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחִי
  chosen: my Spirit
  alternatives:
  - my breath
  - my wind
  lexicon: HALOT
  rationale: In this restoration context, רוּחַ with first-person suffix refers to
    God's own Spirit rather than breath or wind. Capitalizing 'Spirit' signals the
    personal divine referent in English without adding content beyond the Hebrew context.
- source_word: בְּקִרְבְּכֶם
  chosen: within you
  alternatives:
  - in your midst
  - inside you
  lexicon: HALOT
  rationale: The phrase literally denotes 'in your inner part/midst.' Here, paired
    with the gift of God's Spirit and the new heart in the surrounding context, 'within
    you' best captures the inward transformative sense.
- source_word: וְעָשִׂיתִי
  chosen: I will cause
  alternatives:
  - I will make
  - I will do
  lexicon: HALOT
  rationale: 'The verb עשה normally means ''do/make,'' but with אֵת אֲשֶׁר plus following
    finite verbs it functions causatively in sense: God will bring it about that they
    walk in his statutes. ''I will cause'' expresses the Hebrew idiom clearly in English.'
- source_word: בְּחֻקַּי תֵּלֵכוּ
  chosen: to walk in my statutes
  alternatives:
  - to follow my statutes
  - to live by my statutes
  lexicon: HALOT
  rationale: הלך 'walk' is a common covenantal metaphor for conduct. Retaining 'walk'
    preserves the biblical idiom while remaining understandable.
- source_word: חֻקַּי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: חֹק/חֻקָּה often denotes prescribed enactments. 'Statutes' is a standard
    and suitably formal rendering that distinguishes it from the following מִשְׁפָּטִים.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or ordinance. Here
    in covenant-law pairing with חֻקִּים, 'judgments' preserves the legal nuance and
    the distinction between the two terms.
- source_word: תִּשְׁמְרוּ
  chosen: you will keep
  alternatives:
  - you will observe
  - you will guard
  lexicon: HALOT
  rationale: שׁמר in legal contexts commonly means keep/observe. 'Keep' is concise
    and idiomatic in English for covenant obedience.
- source_word: וַעֲשִׂיתֶם
  chosen: and do them
  alternatives:
  - and carry them out
  - and practice them
  lexicon: HALOT
  rationale: 'The final verb resumes and intensifies obedience: not merely guarding
    mentally but performing. ''Do them'' is direct and preserves the Hebrew simplicity.'
