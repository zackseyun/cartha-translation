theological_decisions:
- issue: Divine agency and human obedience
  chosen_reading: and I will cause you to walk in my statutes
  alternative_readings:
  - and I will make it so that you walk in my statutes
  - and I will act so that you walk according to my statutes
  rationale: The Hebrew presents God's effective action resulting in Israel's obedience.
    The translation preserves that strong divine agency without importing a later
    denominational framework beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
