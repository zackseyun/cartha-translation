id: EZK.36.14
reference: Ezekiel 36:14
source:
  edition: WLC
  text: לָ/כֵ֗ן אָדָם֙ לֹא תֹ֣אכְלִי ע֔וֹד ו/גוי/ך לֹ֣א תכשלי ע֑וֹד נְאֻ֖ם אֲדֹנָ֥/י
    יְהוִֽה־־׃
translation:
  text: Therefore you will no longer devour man, and you will no longer cause your
    nation to stumble, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following an alternative vocalization/tradition: ''you will no longer
      bereave your nation.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction linking this promise to the preceding
    context; 'Therefore' preserves the formal connection clearly.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: The land is personified as feminine singular and addressed directly.
    Here אָדָם is a collective object meaning human beings/people. Per doctrine, gender-accurate
    rendering is preferred; 'man' preserves the Hebrew form and echoes the idiom 'devour
    man,' while the collective sense remains clear in context.
- source_word: תֹּאכְלִי
  chosen: devour
  alternatives:
  - eat
  - consume
  lexicon: HALOT
  rationale: Though literally 'eat,' in this land-personification context the idiom
    refers to the land consuming its inhabitants. 'Devour' communicates the metaphor
    naturally in English without over-paraphrasing.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - anymore
  - again
  lexicon: HALOT
  rationale: Combined with לֹא, it idiomatically means cessation from this point forward.
    'No longer' is the most natural English equivalent.
- source_word: וְגוֹיִךְ
  chosen: your nation
  alternatives:
  - your people
  - your nations
  lexicon: HALOT
  rationale: The suffix is feminine singular, referring to the land; the noun is morphologically
    singular here. 'Your nation' reflects the singular form and the corporate people
    belonging to the land. 'Your people' is possible but less formally tied to גוי.
- source_word: תַכְשִׁלִי
  chosen: cause your nation to stumble
  alternatives:
  - bereave your nation
  - make your nation fall
  lexicon: HALOT
  rationale: The consonantal form points to כשל ('stumble'). This yields the sense
    that the land will no longer be a cause of downfall for its nation. Some versions
    reflect a different vocalization/tradition, 'bereave,' likely influenced by the
    surrounding context and ancient versions; that alternative is preserved in a footnote.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares.' Per doctrine,
    יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, the conventional English
    representation is 'Lord GOD' to avoid 'Lord LORD' while preserving both divine
    titles.
