theological_decisions:
- issue: Rendering of the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: Per doctrine, יְהוָה defaults to 'the LORD.' In the fixed combination
    with אֲדֹנָי, English convention uses 'Lord GOD' to represent both titles distinctly
    and avoid awkward repetition. This is a translation convention rather than a doctrinally
    loaded choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
