theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Prophetic perfect/restoration formula in דִּבַּרְתִּי וְעָשִׂיתִי
  chosen_reading: have spoken, and I will do it
  alternative_readings:
  - have spoken and have done it
  - have spoken and done it
  rationale: Although the final verb is morphologically perfect, in prophetic declaration it commonly expresses certain future accomplishment. Rendering it as future in English preserves the force of divine promise rather than implying the act was already fully completed at the time of speaking.
