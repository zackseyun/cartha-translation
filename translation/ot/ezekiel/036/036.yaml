id: EZK.36.36
reference: Ezekiel 36:36
source:
  edition: WLC
  text: וְ/יָדְע֣וּ הַ/גּוֹיִ֗ם אֲשֶׁ֣ר יִֽשָּׁאֲרוּ֮ סְבִיבוֹתֵי/כֶם֒ כִּ֣י אֲנִ֣י יְהוָ֗ה בָּנִ֨יתִי֙ הַ/נֶּ֣הֱרָס֔וֹת נָטַ֖עְתִּי הַ/נְּשַׁמָּ֑ה אֲנִ֥י יְהוָ֖ה דִּבַּ֥רְתִּי וְ/עָשִֽׂיתִי׀׃ס
translation:
  text: Then the nations that remain around you will know that I, Yahweh, have rebuilt the ruined places and planted what was desolate. I, Yahweh, have spoken, and I will do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have spoken and done it.' The Hebrew final verb is formally perfect, but here it likely expresses the certainty of what the LORD will accomplish.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: Then ... will know
  alternatives:
  - and ... will know
  lexicon: HALOT
  rationale: The waw + perfect/converted form carries forward-result sense in context after the restoration promises; 'Then' makes the discourse progression natural in English without losing the future force of 'will know'.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In Ezekiel this term ordinarily refers to the surrounding peoples/nations rather than 'Gentiles' as a later Jewish-Christian contrast term.
- source_word: אֲשֶׁר יִשָּׁאֲרוּ סְבִיבוֹתֵיכֶם
  chosen: that remain around you
  alternatives:
  - that are left around you
  - that survive around you
  lexicon: HALOT
  rationale: נשׁאר in Niphal denotes remaining or being left over. 'Remain around you' is idiomatic and preserves the sense of surrounding nations left after judgment.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּנִיתִי
  chosen: have rebuilt
  alternatives:
  - built
  - am rebuilding
  lexicon: HALOT
  rationale: Given the object 'the ruined places,' English naturally supplies the restorative prefix 're-'. This reflects the context of restoration rather than initial construction.
- source_word: הַנֶּהֱרָסוֹת
  chosen: the ruined places
  alternatives:
  - the destroyed places
  - the ruins
  lexicon: HALOT
  rationale: The passive participial form denotes places that have been torn down/ruined. 'Ruined places' is clear, natural, and keeps the plural local sense.
- source_word: נָטַעְתִּי
  chosen: have replanted
  alternatives:
  - planted
  - have planted
  lexicon: HALOT
  rationale: In restoration context, 'replanted' appropriately conveys renewed cultivation of what had been devastated, paralleling 'have rebuilt.'
- source_word: הַנְּשַׁמָּה
  chosen: what was desolate
  alternatives:
  - the desolate land
  - the devastated place
  lexicon: HALOT
  rationale: The singular substantive/participle functions collectively for that which was desolated. 'What was desolate' is idiomatic in English and avoids over-specifying 'land' where the Hebrew leaves it broader.
- source_word: דִּבַּרְתִּי וְעָשִׂיתִי
  chosen: have spoken, and I will do it
  alternatives:
  - have spoken and done it
  - have said it and will do it
  lexicon: HALOT
  rationale: 'The first verb is perfect (''have spoken''), while the following form in this prophetic formula is best rendered with future force in English: what the LORD has declared he will surely accomplish. Adding ''it'' makes the English complete and reflects the implied object.'
