id: EZK.36.16
reference: Ezekiel 36:16
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project default ''the LORD''
      for the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the prophetic formula ויהי דבר־יהוה אלי, English idiom is best served
    by rendering the clause as 'the word of the LORD came to me' rather than the more
    wooden 'and the word of the LORD was to me.' This preserves the conventional sense
    of the Hebrew wayyiqtol construction in revelatory contexts.
- source_word: דְבַר
  chosen: word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר in this formula denotes the divine word/message. 'Word' is retained
    because it is both accurate and standard in prophetic revelation formulas, without
    needing to expand to 'message' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint's treatment of the covenant name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix straightforwardly indicates
    direction toward the prophet as recipient of revelation. 'To me' is clear modern
    English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: לֵאמֹר regularly introduces the content of speech. 'Saying' preserves
    the formal linkage to the following divine utterance and fits standard English
    Bible style.
