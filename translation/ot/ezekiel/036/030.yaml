id: EZK.36.30
reference: Ezekiel 36:30
source:
  edition: WLC
  text: וְ/הִרְבֵּיתִי֙ אֶת פְּרִ֣י הָ/עֵ֔ץ וּ/תְנוּבַ֖ת הַ/שָּׂדֶ֑ה לְמַ֗עַן אֲ֠שֶׁר
    לֹ֣א תִקְח֥וּ ע֛וֹד חֶרְפַּ֥ת רָעָ֖ב בַּ/גּוֹיִֽם־׃
translation:
  text: And I will multiply the fruit of the tree and the produce of the field, so
    that you will no longer bear the reproach of famine among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will no longer suffer the disgrace of famine among the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  chosen: And I will multiply
  alternatives:
  - And I will make abundant
  - And I will increase
  lexicon: HALOT
  rationale: Hiphil perfect 1cs of רבה with prefixed conjunction in prophetic discourse
    functions as a future promise from God. 'Multiply' preserves the causative sense
    and the agricultural abundance context.
- source_word: פְּרִי הָעֵץ
  chosen: the fruit of the tree
  alternatives:
  - the fruit of the trees
  lexicon: HALOT
  rationale: Singular collective is natural in Hebrew. Rendering with singular 'the
    tree' preserves the source form while still idiomatic in English as a collective
    expression.
- source_word: וּתְנוּבַת הַשָּׂדֶה
  chosen: and the produce of the field
  alternatives:
  - and the yield of the field
  - and the crops of the field
  lexicon: HALOT
  rationale: תְּנוּבָה refers to produce/yield. 'Produce' is clear modern English
    and pairs well with 'fruit.' Singular 'field' reflects the Hebrew collective singular.
- source_word: לְמַעַן אֲשֶׁר
  chosen: so that
  alternatives:
  - in order that
  - for the sake that
  lexicon: HALOT
  rationale: This combination introduces purpose/result. 'So that' is the most natural
    modern English equivalent.
- source_word: לֹא תִקְחוּ עוֹד
  chosen: you will no longer bear
  alternatives:
  - you will no longer receive
  - you will no longer suffer
  lexicon: HALOT
  rationale: Although לקח commonly means 'take/receive,' with חֶרְפָּה ('reproach')
    the idiom is best expressed in English as 'bear' or 'suffer' reproach. 'Bear'
    preserves the sense of carrying/enduring disgrace without woodenly translating
    the Hebrew verb.
- source_word: חֶרְפַּת רָעָב
  chosen: the reproach of famine
  alternatives:
  - the disgrace of famine
  - the shame of famine
  lexicon: HALOT
  rationale: Construct chain meaning reproach/disgrace associated with famine. 'Reproach'
    preserves the covenantal and public-shame nuance often present in prophetic literature.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - from the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to surrounding peoples/nations observing Israel's
    condition. 'Among the nations' best fits the preposition and Ezekiel's international
    setting; 'Gentiles' would sound overly NT-specific.
