theological_decisions:
- issue: Whether the promise emphasizes mere agricultural prosperity or covenantal
    vindication before the nations
  chosen_reading: 'The translation preserves both: material abundance (''fruit...produce'')
    is given with the purpose that Israel no longer bears famine''s reproach among
    the nations.'
  alternative_readings:
  - A purely economic promise
  - A purely honor-shame restoration promise
  rationale: The Hebrew explicitly joins agricultural increase with removal of public
    reproach. The wording should not collapse one into the other.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
