theological_decisions:
- issue: Rendering the divine name within אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrinal default for יְהוָה is 'the LORD.' In this fixed compound,
    however, 'the Lord GOD' is the clearest English equivalent and avoids the awkward
    'Lord LORD' while still signaling the divine name conventionally through 'GOD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
