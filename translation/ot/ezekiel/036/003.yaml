id: EZK.36.3
reference: Ezekiel 36:3
source:
  edition: WLC
  text: לָ/כֵן֙ הִנָּבֵ֣א וְ/אָמַרְתָּ֔ כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה יַ֣עַן בְּ/יַ֡עַן
    שַׁמּוֹת֩ וְ/שָׁאֹ֨ף אֶתְ/כֶ֜ם מִ/סָּבִ֗יב לִֽ/הְיוֹתְ/כֶ֤ם מֽוֹרָשָׁה֙ לִ/שְׁאֵרִ֣ית
    הַ/גּוֹיִ֔ם וַ/תֵּֽעֲל֛וּ עַל שְׂפַ֥ת לָשׁ֖וֹן וְ/דִבַּת עָֽם־־׃
translation:
  text: 'Therefore prophesy and say, Thus says the Lord GOD: Because, indeed because
    they have made you desolate and have snapped at you from every side, so that you
    became a possession for the remnant of the nations, and you have come up on the
    lips of the tongue and into the slander of the people,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have pantingly pursued you,' 'have swallowed you up,' or 'have gasped
      after you'; the Hebrew verb is difficult and conveys hostile, predatory pressure
      from the surrounding nations.
    reason: lexical_alternative
  - marker: b
    text: Literally 'you came up on the lip of the tongue,' an idiom meaning that
      you became the subject of people's speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the prophetic response to the
    prior situation.
- source_word: הִנָּבֵא וְאָמַרְתָּ
  chosen: prophesy and say
  alternatives:
  - prophesy, and you shall say
  lexicon: HALOT
  rationale: Imperative plus following verb addressed to Ezekiel; concise English
    preserves the prophetic commission.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: For יְהוָה the doctrinal default is 'the LORD,' but in the compound title
    אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD.' 'the Lord GOD' best represents
    the Hebrew title while preserving reverence and readability.
- source_word: יַעַן בְּיַעַן
  chosen: Because, indeed because
  alternatives:
  - Because
  - Since indeed
  - For because
  lexicon: HALOT
  rationale: The doubled causal expression is emphatic. Rendering both elements preserves
    the rhetorical force rather than flattening to a single 'because.'
- source_word: שַׁמּוֹת
  chosen: they have made you desolate
  alternatives:
  - they have devastated you
  - they have laid you waste
  lexicon: HALOT
  rationale: Infinitive/verb form from שמם conveys making desolate or laying waste.
    'Made you desolate' fits the land/mountains context.
- source_word: שָׁאֹף
  chosen: have snapped at you
  alternatives:
  - have pantingly pursued you
  - have swallowed you up
  - have gasped after you
  lexicon: HALOT
  rationale: The verb is difficult and contextually hostile. In this setting of surrounding
    nations aggressively seeking possession, 'snap at' captures predatory hostility
    and aligns with many contextual readings better than a literal but opaque 'pant
    after.'
- source_word: מִסָּבִיב
  chosen: from every side
  alternatives:
  - all around
  - from around about
  lexicon: HALOT
  rationale: Idiomatic English for hostile action coming from surrounding peoples.
- source_word: לִהְיוֹתְכֶם מוֹרָשָׁה
  chosen: so that you became a possession
  alternatives:
  - to make you a possession
  - for you to become a possession
  - as a possession
  lexicon: HALOT
  rationale: Expresses result/purpose of the hostile action. 'Possession' reflects
    מורשה as something taken as property or inheritance.
- source_word: לִשְׁאֵרִית הַגּוֹיִם
  chosen: for the remnant of the nations
  alternatives:
  - for the rest of the nations
  - for the surviving nations
  lexicon: HALOT
  rationale: שְׁאֵרִית is 'remnant/rest.' Here it refers to the remaining surrounding
    nations, not a theological remnant of Israel.
- source_word: וַתֵּעֲלוּ עַל שְׂפַת לָשׁוֹן
  chosen: and you have come up on the lips of the tongue
  alternatives:
  - and you became a talk on every tongue
  - and you came up on the lip of the tongue
  lexicon: HALOT
  rationale: A difficult idiom. The literal imagery of being on people's lips points
    to becoming the subject of speech. I retained much of the metaphor while keeping
    it intelligible.
- source_word: וְדִבַּת עָם
  chosen: and into the slander of the people
  alternatives:
  - and the evil report of the people
  - and the gossip of the people
  lexicon: HALOT
  rationale: דִבָּה commonly denotes slander, defaming report, or bad rumor. 'Slander'
    best captures the hostile speech context.
