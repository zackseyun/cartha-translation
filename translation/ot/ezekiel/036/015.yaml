id: EZK.36.15
reference: Ezekiel 36:15
source:
  edition: WLC
  text: וְ/לֹא אַשְׁמִ֨יעַ אֵלַ֤יִ/ךְ עוֹד֙ כְּלִמַּ֣ת הַ/גּוֹיִ֔ם וְ/חֶרְפַּ֥ת עַמִּ֖ים לֹ֣א תִשְׂאִי ע֑וֹד ו/גוי/ך לֹא תַכְשִׁ֣לִי ע֔וֹד נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־׃ס
translation:
  text: And I will no longer let you hear the disgrace of the nations, and you will no longer bear the reproach of the peoples, and you will no longer cause your nation to stumble, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make your nation fall' or, following another interpretive tradition, 'bereave your nation.' The Hebrew consonantal text here is difficult; the Masoretic vocalization supports 'cause your nation to stumble.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁמִיעַ
  chosen: let you hear
  alternatives:
  - make you hear
  - cause you to hear
  lexicon: HALOT
  rationale: Hiphil of שׁמע means to cause to hear. In English, 'let you hear' naturally conveys the causative sense in this context of no longer exposing the land/people to hostile taunts.
- source_word: כְּלִמַּת
  chosen: disgrace
  alternatives:
  - shame
  - humiliation
  lexicon: HALOT
  rationale: The noun denotes public shame or disgrace. 'Disgrace' fits the context of taunting from surrounding nations and pairs well with 'reproach' in the next clause without sounding redundant.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In Ezekiel this term commonly refers to the surrounding nations/peoples rather than 'Gentiles' as a later Jewish-Christian contrast term.
- source_word: חֶרְפַּת
  chosen: reproach
  alternatives:
  - taunt
  - insult
  lexicon: HALOT
  rationale: The noun carries the sense of scorn or reproach. 'Reproach' preserves the prophetic register and distinguishes it from כְּלִמָּה while remaining understandable.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: Rendered 'the peoples' to preserve the lexical distinction from גּוֹיִם in the previous phrase, while still referring broadly to foreign groups.
- source_word: תִשְׂאִי
  chosen: bear
  alternatives:
  - carry
  - endure
  lexicon: HALOT
  rationale: Qal of נשׂא here idiomatically means to bear or carry reproach. 'Bear' is the standard concise English equivalent.
- source_word: וְגוֹיִךְ
  chosen: your nation
  alternatives:
  - your people
  lexicon: HALOT
  rationale: The ketiv-like form with 2fs suffix points to the nation belonging to the addressed land/people. 'Your nation' best matches the singular גוי and avoids flattening to plural.
- source_word: תַכְשִׁלִי
  chosen: cause ... to stumble
  alternatives:
  - make ... fall
  - bereave
  lexicon: HALOT
  rationale: Hiphil of כשל normally means to cause to stumble. In context, the addressed entity will no longer be a cause of downfall for its own nation. Some versions reflect a different vocalization/tradition ('bereave'), but the MT morphology supports 'cause to stumble'.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is idiomatic English. Per doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'Lord GOD' is the conventional way to avoid 'Lord LORD' while preserving both titles.
