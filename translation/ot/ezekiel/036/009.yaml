id: EZK.36.9
reference: Ezekiel 36:9
source:
  edition: WLC
  text: כִּ֖י הִנְ/נִ֣י אֲלֵי/כֶ֑ם וּ/פָנִ֣יתִי אֲלֵי/כֶ֔ם וְ/נֶעֱבַדְתֶּ֖ם וְ/נִזְרַעְתֶּֽם׃
translation:
  text: For behold, I am for you, and I will turn to you, and you will be cultivated
    and sown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am toward you.' The Hebrew expression conveys the LORD's favorable
      orientation toward the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding promise; 'For'
    best preserves the connective force in context.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - here I am
  lexicon: HALOT
  rationale: An attention-getting deictic formula. 'Behold' preserves the prophetic
    solemnity and immediacy better than more colloquial options.
- source_word: אֲלֵיכֶם
  chosen: for you
  alternatives:
  - toward you
  - to you
  lexicon: HALOT
  rationale: With the following declaration of divine favor toward the mountains/land
    of Israel, the preposition here conveys beneficial orientation rather than mere
    direction. 'I am for you' is idiomatic and captures covenantal favor.
- source_word: וּפָנִיתִי אֲלֵיכֶם
  chosen: I will turn to you
  alternatives:
  - I will turn toward you
  - I will attend to you
  lexicon: HALOT
  rationale: The idiom of turning toward someone expresses favorable attention and
    action. 'I will turn to you' is natural English while retaining the metaphor.
- source_word: וְנֶעֱבַדְתֶּם
  chosen: you will be cultivated
  alternatives:
  - you will be worked
  - you will be tilled
  lexicon: HALOT
  rationale: Niphal of עבד here refers to land being worked agriculturally, not human
    service. 'Cultivated' communicates the passive agricultural sense clearly in modern
    English.
- source_word: וְנִזְרַעְתֶּם
  chosen: and sown
  alternatives:
  - and planted
  - and seeded
  lexicon: HALOT
  rationale: Niphal of זרע means to be sown/seeded. 'Sown' is the most direct agricultural
    rendering and fits the land imagery.
