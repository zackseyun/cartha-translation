theological_decisions:
- issue: Divine stance expressed by אֲלֵיכֶם after הִנְנִי
  chosen_reading: I am for you
  alternative_readings:
  - I am toward you
  - here I am, coming to you
  rationale: The verse speaks of YHWH's favorable re-engagement with the land/mountains
    of Israel. Rendering the phrase as 'I am for you' preserves the sense of divine
    favor without importing additional theological claims beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source''s plain sense.'
