id: EZK.36.20
reference: Ezekiel 36:20
source:
  edition: WLC
  text: וַ/יָּב֗וֹא אֶל הַ/גּוֹיִם֙ אֲשֶׁר בָּ֣אוּ שָׁ֔ם וַֽ/יְחַלְּל֖וּ אֶת שֵׁ֣ם
    קָדְשִׁ֑/י בֶּ/אֱמֹ֤ר לָ/הֶם֙ עַם יְהוָ֣ה אֵ֔לֶּה וּ/מֵ/אַרְצ֖/וֹ יָצָֽאוּ־־־־׃
translation:
  text: And when they came to the nations where they went, they profaned my holy name,
    because it was said of them, ‘These are the people of the LORD, and yet they had
    to go out of his land.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when it was said to them'; the sense in context is
      that this was said about them among the nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'but they went out from his land.' The Hebrew implies the disgrace of
      exile without explicitly stating who drove them out.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: when they came
  alternatives:
  - and he came
  - and it came
  lexicon: HALOT
  rationale: Although the form is 3ms singular, the surrounding plural verbs and the
    collective subject Israel support a distributive/collective sense in English.
    Rendering with plural 'they came' avoids awkward singular-collective English and
    matches the verse's flow.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to foreign nations rather than 'Gentiles'
    as a later Jewish/Christian religious category. 'Nations' is the most natural
    and contextually accurate rendering.
- source_word: וַיְחַלְּלוּ
  chosen: they profaned
  alternatives:
  - they defiled
  - they desecrated
  - they treated as common
  lexicon: HALOT
  rationale: חלל in the piel here means to profane or desecrate what is holy. 'Profaned'
    preserves the covenantal/theological force tied to God's name.
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  - my sacred name
  lexicon: HALOT
  rationale: This is the standard Hebrew expression for God's reputation and revealed
    identity in its holiness. 'My holy name' is both natural and theologically weighty.
- source_word: בֶּאֱמֹר לָהֶם
  chosen: because it was said of them
  alternatives:
  - when people said to them
  - by saying to them
  - when it was said to them
  lexicon: HALOT
  rationale: The infinitive construct with preposition introduces the circumstance
    or means by which the profanation occurred. The sense is that the nations' saying
    this about Israel caused God's name to be profaned. 'Of them' best captures the
    implied reference in context, even though the Hebrew literally has 'to them.'
- source_word: עַם יְהוָה אֵלֶּה
  chosen: These are the people of the LORD
  alternatives:
  - These are the LORD's people
  - These are a people of the LORD
  lexicon: HALOT
  rationale: This preserves the demonstrative emphasis and the covenant-name reference.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וּמֵאַרְצוֹ יָצָאוּ
  chosen: and yet they had to go out of his land
  alternatives:
  - and from his land they went out
  - but they went out from his land
  - yet they were driven out of his land
  lexicon: HALOT
  rationale: The Hebrew states that they went out from his land; in context this implies
    exile and disgrace. 'Had to go out' brings out the shame-laden implication without
    overtranslating to an explicit passive such as 'were driven out.' 'His land' refers
    to the LORD's land in the quoted speech.
