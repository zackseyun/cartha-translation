theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Who profaned God's name
  chosen_reading: Israel profaned God's name indirectly by their condition among the
    nations, as expressed through what was said about them
  alternative_readings:
  - the nations profaned God's name by saying this
  - the text leaves agency somewhat compressed between Israel's presence and the nations'
    speech
  rationale: The plural verb 'they profaned' most naturally refers to Israel in the
    immediate discourse context (cf. surrounding verses), yet the mechanism is the
    nations' saying about them, 'These are the people of the LORD...' The translation
    preserves this tension by keeping Israel as subject while rendering the causal
    clause impersonally.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
