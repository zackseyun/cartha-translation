theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH'
- issue: Sense of אִדָּרֵשׁ in relation to divine sovereignty and prayer
  chosen_reading: I will let the house of Israel ask me
  alternative_readings:
  - I will be inquired of by the house of Israel
  - I will allow myself to be sought by the house of Israel
  rationale: The verse presents promised restoration alongside the necessity of Israel's appeal to God. The translation preserves that tension rather than resolving it into either unconditional action alone or human initiative alone.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Rendering of אָדָם
  chosen_reading: men
  alternative_readings:
  - humankind
  - people
  rationale: The Hebrew is grammatically singular masculine used generically in a collective expression. Per doctrine, gender-accurate rendering is preferred where it matches source intent. Here 'men' preserves the lexical form, while a footnote can note the broader human sense.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
