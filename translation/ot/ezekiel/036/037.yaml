id: EZK.36.37
reference: Ezekiel 36:37
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה ע֗וֹד זֹ֛את אִדָּרֵ֥שׁ לְ/בֵֽית יִשְׂרָאֵ֖ל לַ/עֲשׂ֣וֹת לָ/הֶ֑ם אַרְבֶּ֥ה אֹתָ֛/ם כַּ/צֹּ֖אן אָדָֽם־׃
translation:
  text: 'Thus says the Lord GOD: Yet in this also I will let the house of Israel ask me to act for them: I will multiply them like a flock of men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will be inquired of by the house of Israel to do this for them.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'like a flock of men'; that is, a great human multitude like a flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Standard English rendering for the compound divine title in Ezekiel. Per doctrine, יְהוָה is rendered 'the LORD'; in the fixed combination אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD' while preserving both elements.
- source_word: עוֹד זֹאת
  chosen: Yet in this also
  alternatives:
  - Again in this
  - Still concerning this
  - In this also
  lexicon: HALOT
  rationale: עוֹד adds the sense of continuation or further action; זֹאת points to the matter just described. 'Yet in this also' preserves both the resumptive and additive force in natural English.
- source_word: אִדָּרֵשׁ
  chosen: I will let ... ask me
  alternatives:
  - I will be sought by
  - I will be inquired of by
  - I will allow ... to seek
  lexicon: HALOT
  rationale: Niphal of דרש here conveys allowing oneself to be sought or consulted. In context, after promises of restoration, God says he will still require/permit Israel to seek him for this blessing. 'I will let the house of Israel ask me' is idiomatic and preserves divine responsiveness without implying mere passive inquiry.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Retains the covenantal corporate expression of the Hebrew rather than flattening it to simply 'Israel'.
- source_word: לַעֲשׂוֹת לָהֶם
  chosen: to act for them
  alternatives:
  - to do for them
  - to do this for them
  lexicon: HALOT
  rationale: The infinitive of עשה with לָהֶם is broad ('to do for them'). 'To act for them' is slightly more idiomatic in English while still preserving the open-ended sense of divine action.
- source_word: אַרְבֶּה אֹתָם
  chosen: I will multiply them
  alternatives:
  - I will increase them
  - I will make them many
  lexicon: HALOT
  rationale: Hiphil of רבה commonly means to make numerous or multiply. 'Multiply' fits the restoration context and echoes covenantal population language.
- source_word: כַּצֹּאן אָדָם
  chosen: like a flock of men
  alternatives:
  - like human sheep
  - like a human flock
  - like a flock of people
  lexicon: HALOT
  rationale: The phrase is unusual and literally combines 'flock' with 'man/humankind.' 'Like a flock of men' preserves the metaphor's strangeness and the masculine/generic אדם per doctrine. A smoother alternative such as 'people' is possible but loses the lexical texture.
