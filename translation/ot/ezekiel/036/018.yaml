theological_decisions:
- issue: Nature of divine judgment language
  chosen_reading: 'Rendered חֲמָתִי as ''my wrath'' and kept the causal grounds explicit:
    bloodshed and idolatrous defilement of the land.'
  alternative_readings:
  - my fury
  - my rage
  rationale: The verse presents God's response as judicial and covenantal, not arbitrary
    passion. 'Wrath' best communicates holy judgment while avoiding overstatement
    beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Referent of הָאָרֶץ
  chosen_reading: Translated as 'the land' rather than 'the earth.'
  alternative_readings:
  - the earth
  rationale: In Ezekiel's context the concern is the defilement of Israel's land through
    bloodshed and idolatry. This preserves the covenant-land theme without importing
    a universal scope the immediate context does not require.
  doctrine_reference: Translation philosophy §1, §5
