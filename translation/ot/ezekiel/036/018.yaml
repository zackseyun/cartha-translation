id: EZK.36.18
reference: Ezekiel 36:18
source:
  edition: WLC
  text: וָ/אֶשְׁפֹּ֤ךְ חֲמָתִ/י֙ עֲלֵי/הֶ֔ם עַל הַ/דָּ֖ם אֲשֶׁר שָׁפְכ֣וּ עַל הָ/אָ֑רֶץ
    וּ/בְ/גִלּוּלֵי/הֶ֖ם טִמְּאֽוּ/הָ־־־׃
translation:
  text: So I poured out my wrath upon them for the blood that they had poured out
    on the land, because they had defiled it with their idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols; some renderings
      try to reflect this pejorative force more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁפֹּךְ
  chosen: I poured out
  alternatives:
  - I poured forth
  - I spilled
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁפךְ, a common verb for pouring out liquids and metaphorically
    wrath. 'Poured out' is idiomatic English and preserves the verbal link with later
    שָׁפְכוּ in the verse.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning anger/wrath in divine-judgment contexts.
    'Wrath' best preserves the solemn judicial sense without sounding merely emotional.
- source_word: עֲלֵיהֶם
  chosen: upon them
  alternatives:
  - on them
  - against them
  lexicon: HALOT
  rationale: The preposition עַל with the object of wrath naturally yields 'upon them.'
    This keeps the image of wrath being poured out over them.
- source_word: עַל הַדָּם אֲשֶׁר שָׁפְכוּ
  chosen: for the blood that they had poured out
  alternatives:
  - because of the blood they shed
  - on account of the blood that they poured out
  lexicon: HALOT
  rationale: The repeated root שׁפךְ is preserved by rendering both occurrences with
    'poured out.' Although English often says 'shed blood,' preserving the Hebrew
    wordplay and verbal repetition is preferable here.
- source_word: עַל הָאָרֶץ
  chosen: on the land
  alternatives:
  - on the earth
  - in the land
  lexicon: HALOT
  rationale: In Ezekiel, הָאָרֶץ often refers specifically to the land of Israel rather
    than the whole earth. 'On the land' is a natural rendering that preserves that
    likely territorial sense.
- source_word: וּבְגִלּוּלֵיהֶם
  chosen: with their idols
  alternatives:
  - by their idols
  - with their dung-idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's derogatory term for idols. 'Idols' is the clear
    main-text rendering; the pejorative force is real but difficult to reproduce idiomatically
    without awkwardness, so a footnote preserves the nuance.
- source_word: טִמְּאוּהָ
  chosen: they had defiled it
  alternatives:
  - they made it unclean
  - they polluted it
  lexicon: HALOT
  rationale: טמא in the Piel means to defile/make unclean. 'Defiled' fits covenantal
    and cultic pollution language well. The suffix refers back to 'the land,' hence
    'it.'
