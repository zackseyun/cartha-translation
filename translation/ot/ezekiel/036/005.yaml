id: EZK.36.5
reference: Ezekiel 36:5
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ אִם לֹ֠א בְּ/אֵ֨שׁ קִנְאָתִ֥/י דִבַּ֛רְתִּי עַל שְׁאֵרִ֥ית הַ/גּוֹיִ֖ם וְ/עַל אֱד֣וֹם כֻּלָּ֑/א אֲשֶׁ֣ר נָתְנֽוּ אֶת אַרְצִ֣/י לָ֠/הֶם לְ/מ֨וֹרָשָׁ֜ה בְּ/שִׂמְחַ֤ת כָּל לֵבָב֙ בִּ/שְׁאָ֣ט נֶ֔פֶשׁ לְמַ֥עַן מִגְרָשָׁ֖/הּ לָ/בַֽז־־־־־־׀־׃
translation:
  text: 'Therefore thus says the Lord GOD: Surely in the fire of my jealousy I have spoken against the remnant of the nations and against all Edom, who gave my land to themselves as a possession with wholehearted joy and with contempt of soul, in order to make its pastureland plunder.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'gave my land to themselves for an inheritance.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew of the final clause is difficult; it may also be understood along the lines of 'to make its pastureland/open land plunder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD' while preserving both elements.
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath-like prophetic discourse אִם לֹא functions idiomatically as a strong asseveration rather than a literal conditional, so 'Surely' best conveys the force in natural English.
- source_word: בְּאֵשׁ קִנְאָתִי
  chosen: in the fire of my jealousy
  alternatives:
  - with the fire of my zeal
  - in my jealous fire
  lexicon: HALOT
  rationale: Kept the concrete metaphor 'fire' and rendered קִנְאָה as 'jealousy,' a standard covenantal term for divine zeal. 'Jealousy' better preserves the relational and judicial nuance than the smoother 'zeal'.
- source_word: דִבַּרְתִּי עַל
  chosen: I have spoken against
  alternatives:
  - I spoke against
  - I have declared against
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English ('have spoken') in prophetic proclamation. עַל in this hostile context is naturally 'against.'
- source_word: שְׁאֵרִית הַגּוֹיִם
  chosen: the remnant of the nations
  alternatives:
  - the rest of the nations
  - the remaining nations
  lexicon: HALOT
  rationale: שְׁאֵרִית commonly means 'remnant' or 'remainder.' Here it refers to the surviving/rest nations around Israel; 'remnant' preserves the lexical force, though without importing a positive theological sense.
- source_word: אֱדוֹם כֻּלָּהּ
  chosen: all Edom
  alternatives:
  - the whole of Edom
  - Edom in its entirety
  lexicon: HALOT
  rationale: Simple, natural rendering of the collective expression with the feminine pronominal suffix referring to the nation/land.
- source_word: נָתְנוּ אֶת אַרְצִי לָהֶם לְמוֹרָשָׁה
  chosen: gave my land to themselves as a possession
  alternatives:
  - made my land their possession
  - assigned my land to themselves for an inheritance
  lexicon: HALOT
  rationale: Retains the reflexive sense of לָהֶם and the noun מוֹרָשָׁה as 'possession.' 'Inheritance' is possible, but here the stress is on wrongful appropriation rather than legitimate heirship.
- source_word: בְּשִׂמְחַת כָּל לֵבָב
  chosen: with wholehearted joy
  alternatives:
  - with joy of all the heart
  - with full-hearted rejoicing
  lexicon: HALOT
  rationale: An idiomatic English rendering that preserves the intensifying sense of total inner delight.
- source_word: בִּשְׁאָט נֶפֶשׁ
  chosen: with contempt of soul
  alternatives:
  - with scorn from the soul
  - with utter contempt
  - with spiteful desire
  lexicon: HALOT
  rationale: שְׁאָט conveys contempt/scorn; נֶפֶשׁ intensifies it as inward disposition. 'With contempt of soul' is somewhat formal but preserves both lexical elements and the emotional force.
- source_word: לְמַעַן מִגְרָשָׁהּ לָבַז
  chosen: in order to drive it out for plunder
  alternatives:
  - so as to dispossess its pastureland for plunder
  - in order to make its open land a prey
  - to cast it out as plunder
  lexicon: HALOT
  rationale: This clause is difficult. מִגְרָשׁ can denote open land/pastureland, but in context the sense is dispossession of the land for spoil. The 3fs suffix refers back to 'my land.' 'Drive it out for plunder' captures the hostile purpose in readable English while acknowledging the compressed Hebrew.
