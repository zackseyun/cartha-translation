theological_decisions:
- issue: Meaning of "new spirit"
  chosen_reading: an inwardly renewed human spirit/disposition given by God
  alternative_readings:
  - the Holy Spirit
  rationale: The immediate parallelism with "a new heart" and the following verse's
    explicit mention of "my Spirit" suggest that verse 26 speaks first of the people's
    renewed inner disposition, while verse 27 distinguishes and adds God's own Spirit.
    The translation therefore keeps the lowercase "spirit" in the main text without
    foreclosing the theological connection.
  doctrine_reference: Preserve theological tension rather than resolve it.
