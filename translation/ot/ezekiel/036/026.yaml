id: EZK.36.26
reference: Ezekiel 36:26
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י לָ/כֶם֙ לֵ֣ב חָדָ֔שׁ וְ/ר֥וּחַ חֲדָשָׁ֖ה אֶתֵּ֣ן בְּ/קִרְבְּ/כֶ֑ם
    וַ/הֲסִ֨רֹתִ֜י אֶת לֵ֤ב הָ/אֶ֨בֶן֙ מִ/בְּשַׂרְ/כֶ֔ם וְ/נָתַתִּ֥י לָ/כֶ֖ם לֵ֥ב
    בָּשָֽׂר־׃
translation:
  text: And I will give you a new heart, and I will put a new spirit within you; and
    I will remove the heart of stone from your flesh and give you a heart of flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a renewed spirit"; some understand "spirit" here as anticipating the
      gift of God's Spirit in the following verse.
    reason: alternative_reading
lexical_decisions:
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: '"Heart" is the standard and most transparent rendering for לֵב in Hebrew
    anthropology, encompassing will, thought, and disposition. Alternatives such as
    "mind" or "inner self" are too interpretive for the main text here.'
- source_word: חָדָשׁ / חֲדָשָׁה
  chosen: new
  alternatives:
  - renewed
  - fresh
  lexicon: HALOT
  rationale: The adjective plainly means "new." "Renewed" would import an interpretive
    nuance not explicit in the Hebrew, which presents divine replacement and gift.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - wind
  - breath
  lexicon: HALOT
  rationale: In this context of inward transformation, "spirit" best fits the anthropological
    sense. "Wind" and "breath" are lexically possible elsewhere but not suitable here.
- source_word: בְּקִרְבְּכֶם
  chosen: within you
  alternatives:
  - in your midst
  - inside you
  lexicon: HALOT
  rationale: Given the singular inward-transformation imagery of heart and spirit,
    "within you" best conveys internal placement. "In your midst" is possible in other
    contexts but would sound more corporate/spatial than the immediate parallelism
    suggests.
- source_word: וַהֲסִרֹתִי
  chosen: I will remove
  alternatives:
  - I will take away
  - I will turn aside
  lexicon: HALOT
  rationale: '"Remove" is clear modern English and matches the causative sense of
    taking something away. "Take away" is also possible but slightly less precise
    in the replacement imagery.'
- source_word: לֵב הָאֶבֶן
  chosen: the heart of stone
  alternatives:
  - the stony heart
  lexicon: HALOT
  rationale: The construct phrase is most directly rendered "heart of stone." "Stony
    heart" is idiomatic English but slightly more interpretive than the Hebrew form.
- source_word: מִבְּשַׂרְכֶם
  chosen: from your flesh
  alternatives:
  - out of your body
  - from your body
  lexicon: HALOT
  rationale: בָּשָׂר ordinarily means "flesh." Retaining "flesh" preserves the concrete
    bodily metaphor and avoids over-paraphrase. "Body" would smooth the image but
    weaken lexical transparency.
- source_word: לֵב בָּשָׂר
  chosen: a heart of flesh
  alternatives:
  - a fleshy heart
  - a tender heart
  lexicon: HALOT
  rationale: '"Heart of flesh" preserves the Hebrew contrast with "heart of stone."
    "Tender heart" captures part of the sense but interprets the metaphor rather than
    translating it.'
- source_word: וְנָתַתִּי ... אֶתֵּן ... וְנָתַתִּי
  chosen: I will give ... I will put ... give
  alternatives:
  - I will give ... I will give ... I will give
  lexicon: HALOT
  rationale: The repeated נתן literally means "give," but rendering the middle clause
    as "put" in English is a natural contextual equivalent with "within you." This
    preserves readability while maintaining the sense of divine bestowal.
