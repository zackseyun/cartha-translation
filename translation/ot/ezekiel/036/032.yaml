theological_decisions:
- issue: Rendering the divine title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord the LORD
  - the Lord Yahweh
  rationale: The project default is יְהוָה → 'the LORD,' but this compound title requires
    an English form that preserves both elements without redundancy. 'The Lord GOD'
    is a standard and transparent way to reflect אֲדֹנָי + יְהוִה while honoring the
    default treatment of the divine name.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה → the LORD), with
    documented per-verse variance allowed'
