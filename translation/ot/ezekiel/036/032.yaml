id: EZK.36.32
reference: Ezekiel 36:32
source:
  edition: WLC
  text: לֹ֧א לְמַעַנְ/כֶ֣ם אֲנִֽי עֹשֶׂ֗ה נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה יִוָּדַ֖ע לָ/כֶ֑ם
    בּ֧וֹשׁוּ וְ/הִכָּלְמ֛וּ מִ/דַּרְכֵי/כֶ֖ם בֵּ֥ית יִשְׂרָאֵֽל־׃ס
translation:
  text: It is not for your sake that I am acting, declares the Lord GOD; let it be
    known to you. Be ashamed and humiliated because of your ways, O house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Be ashamed and disgraced because of your ways.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַנְכֶם
  chosen: for your sake
  alternatives:
  - for your benefit
  - on your account
  lexicon: HALOT
  rationale: לְמַעַן commonly expresses purpose or benefit. 'For your sake' is idiomatic
    and preserves the force that YHWH's action is not motivated by Israel's merit
    or advantage.
- source_word: עֹשֶׂה
  chosen: am acting
  alternatives:
  - am doing
  - do
  lexicon: HALOT
  rationale: עשה is broad ('do/make/act'). In context, 'am acting' better captures
    divine intervention already described in the surrounding passage, while remaining
    within the semantic range.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' אֲדֹנָי
    יְהוִה is conventionally 'Lord GOD'; 'the LORD' is the project default for יְהוָה,
    but in the fixed compound אֲדֹנָי יְהוִה, 'Lord GOD' avoids the awkward 'Lord
    LORD' and reflects standard English representation of the title pair.
- source_word: יְהוִה
  chosen: GOD
  alternatives:
  - the LORD
  - Yahweh
  lexicon: HALOT
  rationale: Within the compound title אֲדֹנָי יְהוִה, English convention renders
    יְהוָה as 'GOD' in small caps to distinguish it from אֲדֹנָי ('Lord'). This is
    a documented exception to the default standalone rendering 'the LORD' and preserves
    the source distinction.
- source_word: יִוָּדַע לָכֶם
  chosen: let it be known to you
  alternatives:
  - know it
  - be it known to you
  lexicon: HALOT
  rationale: The Niphal imperfect of ידע here has a passive/jussive-like force in
    context. 'Let it be known to you' preserves the formal force and the emphasis
    that Israel must recognize this truth.
- source_word: בֹּשׁוּ
  chosen: be ashamed
  alternatives:
  - be put to shame
  - feel shame
  lexicon: HALOT
  rationale: The imperative calls Israel to shame in response to its conduct. 'Be
    ashamed' is direct, natural English and preserves the moral force.
- source_word: וְהִכָּלְמוּ
  chosen: and humiliated
  alternatives:
  - and disgraced
  - and confounded
  lexicon: HALOT
  rationale: The verb כלם in the Niphal conveys disgrace/humiliation. Rendering it
    as 'humiliated' keeps a distinction from בוש ('ashamed') while preserving the
    paired intensification. In English imperative sequence, 'Be ashamed and humiliated'
    is smoother than repeating 'be' twice.
- source_word: מִדַּרְכֵיכֶם
  chosen: because of your ways
  alternatives:
  - for your ways
  - from your ways
  lexicon: HALOT
  rationale: With verbs of shame, מן can indicate cause or occasion. 'Because of your
    ways' clearly communicates that Israel's conduct is the reason for shame.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: The vocative force is explicit in context; adding 'O' preserves the prophetic
    address and solemn tone in natural English.
