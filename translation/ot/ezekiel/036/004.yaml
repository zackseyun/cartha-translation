id: EZK.36.4
reference: Ezekiel 36:4
source:
  edition: WLC
  text: לָ/כֵן֙ הָרֵ֣י יִשְׂרָאֵ֔ל שִׁמְע֖וּ דְּבַר אֲדֹנָ֣/י יְהוִ֑ה כֹּֽה אָמַ֣ר
    אֲדֹנָ֣/י יְ֠הוִה לֶ/הָרִ֨ים וְ/לַ/גְּבָע֜וֹת לָ/אֲפִיקִ֣ים וְ/לַ/גֵּאָי֗וֹת וְ/לֶ/חֳרָב֤וֹת
    הַ/שֹּֽׁמְמוֹת֙ וְ/לֶ/עָרִ֣ים הַ/נֶּעֱזָב֔וֹת אֲשֶׁ֨ר הָי֤וּ לְ/בַז֙ וּ/לְ/לַ֔עַג
    לִ/שְׁאֵרִ֥ית הַ/גּוֹיִ֖ם אֲשֶׁ֥ר מִ/סָּבִֽיב־־׃ס
translation:
  text: 'Therefore, mountains of Israel, hear the word of the Lord GOD. Thus says
    the Lord GOD to the mountains and to the hills, to the ravines and to the valleys,
    to the desolate ruins and to the abandoned cities that have become plunder and
    mockery to the remnant of the nations that are all around:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watercourses' or 'channels' for 'ravines' (אֲפִיקִים).
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the nations' for 'the remnant of the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the prior
    accusation/oracle; 'Therefore' is natural and sufficiently formal.
- source_word: הָרֵי יִשְׂרָאֵל
  chosen: mountains of Israel
  alternatives:
  - mountains of Isra'el
  lexicon: HALOT
  rationale: Construct phrase addressed directly; retained literally because the landforms
    are personified throughout the context.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: Imperative plural. 'Hear' preserves prophetic diction and covenantal
    resonance better than the slightly more colloquial 'listen'.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: In prophetic formulae, 'word' is the standard and more transparent rendering,
    preserving the formal register.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the
    compound title אֲדֹנָי יְהוִה, conventional English avoids 'Lord LORD'; 'the Lord
    GOD' clearly represents the Hebrew title while preserving reverence tradition.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' is idiomatic and suitably
    formal.
- source_word: לֶהָרִים וְלַגְּבָעוֹת
  chosen: to the mountains and to the hills
  alternatives:
  - to the mountains and the hills
  lexicon: HALOT
  rationale: Repeated preposition retained for rhetorical cadence and to mirror the
    Hebrew address list.
- source_word: אֲפִיקִים
  chosen: ravines
  alternatives:
  - channels
  - watercourses
  - wadis
  lexicon: HALOT
  rationale: The term can denote channels, streambeds, or ravines. In this topographical
    list, 'ravines' best fits natural land features in readable English without over-specifying
    hydrology.
- source_word: גֵּאָיוֹת
  chosen: valleys
  alternatives:
  - gorges
  lexicon: HALOT
  rationale: Common topographical counterpart to mountains/hills; 'valleys' is the
    broad and natural rendering.
- source_word: חֳרָבוֹת הַשֹּׁמְמוֹת
  chosen: the desolate ruins
  alternatives:
  - the ruined waste places
  - the desolated ruins
  lexicon: HALOT
  rationale: חֳרָבוֹת denotes ruins/waste places; the participle adds the idea of
    desolation. 'Desolate ruins' is concise and preserves both elements.
- source_word: עָרִים הַנֶּעֱזָבוֹת
  chosen: the abandoned cities
  alternatives:
  - the forsaken cities
  lexicon: HALOT
  rationale: נֶעֱזָבוֹת conveys being left behind or forsaken. 'Abandoned' is clear
    modern English and fits the devastation context.
- source_word: לְבַז
  chosen: plunder
  alternatives:
  - prey
  - spoil
  lexicon: HALOT
  rationale: The noun denotes something taken as spoil. 'Plunder' is idiomatic in
    English for what the cities became to surrounding nations.
- source_word: לַעַג
  chosen: mockery
  alternatives:
  - derision
  - scorn
  lexicon: HALOT
  rationale: The term refers to ridicule or taunting. 'Mockery' is accessible and
    forceful.
- source_word: שְׁאֵרִית הַגּוֹיִם
  chosen: the remnant of the nations
  alternatives:
  - the rest of the nations
  - the surviving nations
  lexicon: HALOT
  rationale: שְׁאֵרִית often means 'remnant.' Here it refers to the remaining surrounding
    nations; 'remnant' preserves the lexical form, though not necessarily a theological
    remnant motif.
- source_word: אֲשֶׁר מִסָּבִיב
  chosen: that are all around
  alternatives:
  - that are around
  - round about
  lexicon: HALOT
  rationale: Modifies 'the nations' and indicates surrounding peoples. 'All around'
    is natural modern English and captures the spatial emphasis.
