theological_decisions:
- issue: Rendering the divine name יְהוָה in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD.' In the fixed Hebrew title אֲדֹנָי יְהוִה, however, English convention and
    clarity favor 'the Lord GOD' to avoid the awkward 'Lord LORD.' This preserves
    the distinction of the compound title without importing a different theology.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether שְׁאֵרִית ('remnant') should be given a specialized theological sense
    here
  chosen_reading: the remnant of the nations
  alternative_readings:
  - the rest of the nations
  rationale: Although 'remnant' can carry theological weight elsewhere, here the phrase
    refers straightforwardly to the remaining surrounding nations. The lexical form
    is preserved without implying a redemptive remnant theology not demanded by the
    context.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
