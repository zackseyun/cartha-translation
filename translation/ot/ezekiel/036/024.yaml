theological_decisions:
- issue: Restoration language and possession of the land
  chosen_reading: into your own land
  alternative_readings:
  - to your land
  - into your land
  rationale: The verse speaks of God's act of restoring the exiles to the land that
    belongs to them covenantally. Rendering the possessive suffix with 'your own land'
    preserves the personal and covenantal force without importing later theological
    systems beyond the text itself.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
