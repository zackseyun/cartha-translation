id: EZK.36.24
reference: Ezekiel 36:24
source:
  edition: WLC
  text: וְ/לָקַחְתִּ֤י אֶתְ/כֶם֙ מִן הַ/גּוֹיִ֔ם וְ/קִבַּצְתִּ֥י אֶתְ/כֶ֖ם מִ/כָּל
    הָ/אֲרָצ֑וֹת וְ/הֵבֵאתִ֥י אֶתְ/כֶ֖ם אֶל אַדְמַתְ/כֶֽם־־־׃
translation:
  text: For I will take you from the nations, and gather you from all the lands, and
    bring you into your own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from all the countries.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'to your land'; 'your own land' brings out the possessive force
      of the Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתִּי
  chosen: I will take
  alternatives:
  - I will take up
  - I will fetch
  lexicon: HALOT
  rationale: לקח in this context denotes Yahweh's deliberate action of taking the
    people out from among the nations. 'I will take' is the most direct and natural
    English rendering and preserves the personal, active force of the first-person
    verb.
- source_word: מִן הַגּוֹיִם
  chosen: from the nations
  alternatives:
  - from among the nations
  - from the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' In Ezekiel's exile-restoration context
    it refers to the foreign peoples/countries among whom Israel has been scattered.
    'Nations' is preferred over 'Gentiles' because the geographic-political sense
    is primary here, though 'from among the nations' is a plausible expansion.
- source_word: וְקִבַּצְתִּי
  chosen: and gather
  alternatives:
  - and collect
  - and assemble
  lexicon: HALOT
  rationale: קבץ is a standard restoration verb meaning to gather scattered people
    back together. 'Gather' preserves both the literal and covenant-restoration resonance
    common in prophetic literature.
- source_word: מִכָּל הָאֲרָצוֹת
  chosen: from all the lands
  alternatives:
  - from all the countries
  - from all the earths/lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is the plural of אֶרֶץ and here refers to multiple lands/countries
    where the exiles are dispersed. 'Lands' is slightly more literal than 'countries'
    and fits the restoration idiom well.
- source_word: וְהֵבֵאתִי
  chosen: and bring
  alternatives:
  - and bring back
  - and cause to come
  lexicon: HALOT
  rationale: בוא in the Hiphil means 'cause to come' or 'bring.' 'Bring' is idiomatic
    English and keeps the causative sense. 'Bring back' is contextually true but adds
    'back,' which is not explicit in the Hebrew.
- source_word: אֶל אַדְמַתְכֶם
  chosen: into your own land
  alternatives:
  - to your land
  - to your soil
  - into your land
  lexicon: HALOT
  rationale: אַדָמָה can mean ground, soil, or land. In this restoration context it
    refers to Israel's homeland. 'Into your own land' communicates both destination
    and possessive force naturally in English; 'own' makes explicit the possessive
    suffix without overstating the claim.
