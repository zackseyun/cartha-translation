theological_decisions:
- issue: Referent of 'they' in 'for they are near to come'
  chosen_reading: '''They'' refers to ''my people Israel,'' i.e., the exiles are near
    to return.'
  alternative_readings:
  - 'Impersonal sense: ''the time is near for them to come'''
  rationale: The nearest and most natural antecedent is 'my people Israel.' The verse
    promises the land's renewed fruitfulness because the people are soon returning.
    No broader doctrinal issue is at stake, but the referent affects clarity.
