id: EZK.36.8
reference: Ezekiel 36:8
source:
  edition: WLC
  text: וְ/אַתֶּ֞ם הָרֵ֤י יִשְׂרָאֵל֙ עַנְפְּ/כֶ֣ם תִּתֵּ֔נוּ וּ/פֶרְיְ/כֶ֥ם תִּשְׂא֖וּ
    לְ/עַמִּ֣/י יִשְׂרָאֵ֑ל כִּ֥י קֵרְב֖וּ לָ/בֽוֹא׃
translation:
  text: But you, mountains of Israel, shall put forth your branches and bear your
    fruit for my people Israel, for they are near to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for their coming is near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרֵי יִשְׂרָאֵל
  chosen: mountains of Israel
  alternatives:
  - mountains in Israel
  - hill country of Israel
  lexicon: HALOT
  rationale: הָרִים/הָרֵי denotes mountains/hills; the construct with Israel is most
    naturally rendered 'mountains of Israel,' a recurring Ezekiel phrase addressing
    the land topographically and personified.
- source_word: עַנְפְּכֶם
  chosen: your branches
  alternatives:
  - your boughs
  lexicon: HALOT
  rationale: עָנָף refers to a branch or bough. 'Branches' is clear modern English
    and fits the agricultural image.
- source_word: תִּתֵּנוּ
  chosen: shall put forth
  alternatives:
  - shall give
  - shall yield
  lexicon: HALOT
  rationale: Though the verb is literally 'give,' in English with 'branches' the idiomatic
    sense is that the mountains 'put forth' branches/foliage. This preserves the image
    without wooden English.
- source_word: וּפֶרְיְכֶם
  chosen: your fruit
  alternatives:
  - your produce
  lexicon: HALOT
  rationale: פְּרִי commonly means fruit/produce. 'Fruit' best preserves the agricultural
    metaphor and matches the parallelism with branches.
- source_word: תִּשְׂאוּ
  chosen: bear
  alternatives:
  - carry
  - produce
  lexicon: HALOT
  rationale: נָשָׂא literally means lift/carry, but with fruit the idiomatic sense
    is 'bear fruit.' This is standard and faithful to the collocation.
- source_word: לְעַמִּי יִשְׂרָאֵל
  chosen: for my people Israel
  alternatives:
  - for my people, Israel
  - for my people of Israel
  lexicon: HALOT
  rationale: The preposition ל here expresses benefit/destination. 'For my people
    Israel' is natural and preserves the covenantal possessive 'my people.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי introduces the reason for the promised fertility. 'For' is concise
    and natural in English.
- source_word: קֵרְבוּ לָבוֹא
  chosen: they are near to come
  alternatives:
  - they are about to come
  - their coming is near
  lexicon: HALOT
  rationale: The construction combines 'be near' with an infinitive 'to come.' 'They
    are near to come' is formally close, though somewhat stiff; it preserves the imminence
    of Israel's return. An alternative smoother rendering is preserved in a footnote.
