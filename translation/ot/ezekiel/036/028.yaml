theological_decisions:
- issue: Covenant-formula rendering
  chosen_reading: Render the paired clauses idiomatically as 'you will be my people,
    and I will be your God.'
  alternative_readings:
  - you will be a people to me, and I will be God to you
  rationale: The Hebrew uses classic covenant-formula language. The idiomatic English
    rendering preserves both meaning and canonical resonance without paraphrasing
    beyond the text.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gendered ancestral term
  chosen_reading: Retain 'fathers' in the main text
  alternative_readings:
  - ancestors
  rationale: The Hebrew explicitly says 'fathers,' and the project prefers gender-accurate
    rendering where the source is grammatically and semantically masculine. Here the
    patriarchal promise background is significant.
  doctrine_reference: Translation philosophy §4
