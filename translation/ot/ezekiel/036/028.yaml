id: EZK.36.28
reference: Ezekiel 36:28
source:
  edition: WLC
  text: וִ/ישַׁבְתֶּ֣ם בָּ/אָ֔רֶץ אֲשֶׁ֥ר נָתַ֖תִּי לַ/אֲבֹֽתֵי/כֶ֑ם וִ/הְיִ֤יתֶם
    לִ/י֙ לְ/עָ֔ם וְ/אָ֣נֹכִ֔י אֶהְיֶ֥ה לָ/כֶ֖ם לֵ/אלֹהִֽים׃
translation:
  text: You will dwell in the land that I gave to your fathers, and you will be my
    people, and I will be your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ancestors' for 'fathers.' The Hebrew is literally 'fathers,' echoing
      the ancestral covenant promises.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִישַׁבְתֶּם
  chosen: you will dwell
  alternatives:
  - you will live
  - you will settle
  lexicon: HALOT
  rationale: From ישׁב, here a qatal with prefixed waw in prophetic discourse functioning
    futurally. 'Dwell' preserves the sense of settled habitation without over-specifying
    permanence as 'settle' might.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  - on the land
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in covenantal/geographical contexts. 'Land'
    best matches the promise motif in Ezekiel and the patriarchal reference that follows.
- source_word: אֲשֶׁר נָתַתִּי
  chosen: that I gave
  alternatives:
  - which I gave
  - that I have given
  lexicon: HALOT
  rationale: Simple past is the most natural English rendering of the relative clause
    and reflects the completed gift to the ancestors.
- source_word: לַאֲבֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: Literally 'to your fathers.' This is a patriarchal covenant formula;
    'fathers' preserves the source wording and biblical resonance. An inclusive alternative
    is possible in contemporary English but would lose the intertextual link to the
    ancestral promise language.
- source_word: וִהְיִיתֶם לִי לְעָם
  chosen: you will be my people
  alternatives:
  - you will become a people for me
  - you will be a people to me
  lexicon: HALOT
  rationale: This is standard covenant formula language. 'My people' is the idiomatic
    and theologically loaded English equivalent, preferable to a more wooden rendering.
- source_word: וְאָנֹכִי אֶהְיֶה לָכֶם לֵאלֹהִים
  chosen: and I will be your God
  alternatives:
  - and I myself will be God to you
  lexicon: HALOT
  rationale: Another standard covenant formula. 'Your God' is the established and
    accurate idiom. The explicit pronoun אָנֹכִי adds emphasis, but English need not
    mark it separately because the clause already carries solemn covenant force.
