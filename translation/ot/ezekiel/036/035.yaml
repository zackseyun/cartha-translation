id: EZK.36.35
reference: Ezekiel 36:35
source:
  edition: WLC
  text: וְ/אָמְר֗וּ הָ/אָ֤רֶץ הַלֵּ֨זוּ֙ הַ/נְּשַׁמָּ֔ה הָיְתָ֖ה כְּ/גַן עֵ֑דֶן וְ/הֶ/עָרִ֧ים
    הֶ/חֳרֵב֛וֹת וְ/הַֽ/נְשַׁמּ֥וֹת וְ/הַ/נֶּהֱרָס֖וֹת בְּצוּר֥וֹת יָשָֽׁבוּ־׃
translation:
  text: And they will say, ‘This land that was desolate has become like the garden
    of Eden, and the cities that were ruined, desolate, and torn down are fortified
    and inhabited.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This desolate land has become like Eden's garden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: And they will say
  alternatives:
  - Then they will say
  - And people will say
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries future sense in English within the restoration sequence. 'They' is retained
    rather than an impersonal passive to reflect the Hebrew subject.
- source_word: הָאָרֶץ הַלֵּזוּ הַנְּשַׁמָּה
  chosen: This land that was desolate
  alternatives:
  - This desolate land
  - This land, the desolate one
  lexicon: HALOT
  rationale: הַלֵּזוּ is the demonstrative 'this,' modifying 'land.' הַנְּשַׁמָּה
    functions attributively/predicatively as 'desolate' or 'laid waste.' The relative-style
    English 'that was desolate' best captures the Hebrew flow and the contrast with
    restoration.
- source_word: הָיְתָה
  chosen: has become
  alternatives:
  - has become
  - was
  lexicon: HALOT
  rationale: Although the verb is formally 'was/became,' in context it marks a change
    of state resulting from restoration. 'Has become' expresses the resultant transformation
    more naturally in English than a simple past 'was.'
- source_word: כְּגַן עֵדֶן
  chosen: like the garden of Eden
  alternatives:
  - like Eden's garden
  - like the Garden of Eden
  lexicon: HALOT
  rationale: The simile is explicit with כְּ. 'the garden of Eden' is a clear, natural
    rendering; capitalization of 'garden' is not required by the Hebrew, though 'Eden'
    is a proper name.
- source_word: וְהֶעָרִים
  chosen: and the cities
  alternatives:
  - and the towns
  lexicon: HALOT
  rationale: עִיר normally means 'city'; 'cities' preserves the standard sense.
- source_word: הֶחֳרֵבוֹת
  chosen: ruined
  alternatives:
  - waste
  - in ruins
  lexicon: HALOT
  rationale: From חרב in adjectival form, describing devastation. 'Ruined' is idiomatic
    in a list of city conditions and avoids awkward repetition with 'desolate.'
- source_word: הַנְשַׁמּוֹת
  chosen: desolate
  alternatives:
  - laid waste
  - wasted
  lexicon: HALOT
  rationale: This term overlaps semantically with the earlier singular form. Keeping
    'desolate' preserves lexical continuity while allowing the triad of conditions
    to stand.
- source_word: הַנֶּהֱרָסוֹת
  chosen: torn down
  alternatives:
  - demolished
  - destroyed
  lexicon: HALOT
  rationale: Passive participle from הרס, referring specifically to structures pulled
    down. 'Torn down' is concrete and fits urban imagery.
- source_word: בְּצוּרוֹת
  chosen: fortified
  alternatives:
  - made into fortified cities
  - walled
  lexicon: HALOT
  rationale: Adjective meaning fortified/defended. 'Fortified' is broader and more
    accurate than 'walled,' which would over-specify the means of defense.
- source_word: יָשָׁבוּ
  chosen: inhabited
  alternatives:
  - settled
  - dwelt
  lexicon: HALOT
  rationale: Qal perfect plural from ישׁב can mean dwell/settle. In English, with
    cities as subject, 'are inhabited' is the most natural resultative rendering.
