theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default rendering
    for YHWH. No contextual factor in this verse warrants deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering the idiom בֶן אָדָם in Ezekiel
  chosen_reading: son of man
  alternative_readings:
  - mortal
  - human one
  rationale: The phrase is a recurring address formula in Ezekiel. Preserving the
    idiom maintains literary consistency and avoids importing an interpretive paraphrase.
    This is not a christological title here but a prophetic address.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §5; Contested terms: אָדָם
