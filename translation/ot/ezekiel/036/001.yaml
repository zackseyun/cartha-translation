id: EZK.36.1
reference: Ezekiel 36:1
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֔ם הִנָּבֵ֖א אֶל הָרֵ֣י יִשְׂרָאֵ֑ל וְ/אָ֣מַרְתָּ֔ הָרֵי֙
    יִשְׂרָאֵ֔ל שִׁמְע֖וּ דְּבַר יְהוָֽה־־־׃
translation:
  text: And you, son of man, prophesy to the mountains of Israel, and say, ‘Mountains
    of Israel, hear the word of the LORD.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hill country of Israel.' The Hebrew literally says 'mountains of Israel,'
      and the main text keeps the personified geographical imagery.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD' represents the divine name YHWH; alternatively, 'Yahweh.'
    reason: alternative_reading
  - marker: c
    text: Or 'mortal' for 'son of man'; the main text preserves Ezekiel’s recurring
      form of address.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering
    preserves the idiom and its literary continuity throughout the book better than
    a more interpretive alternative such as 'mortal.' Although אָדָם can mean 'humankind'
    in some contexts, here the fixed expression is best retained as 'son of man.'
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - prophesy forth
  - speak prophetically
  lexicon: HALOT
  rationale: The Niphal imperative of נבא is the standard prophetic commission formula.
    'Prophesy' is the most natural and established English equivalent without unnecessary
    expansion.
- source_word: אֶל
  chosen: to
  alternatives:
  - against
  - concerning
  lexicon: HALOT
  rationale: 'The preposition here most straightforwardly indicates direction of address:
    Ezekiel is to speak to the mountains. While prophetic speech can at times be adversative
    in force, this verse itself introduces the addressee rather than explicitly marking
    hostility.'
- source_word: הָרֵי יִשְׂרָאֵל
  chosen: the mountains of Israel
  alternatives:
  - the hill country of Israel
  lexicon: HALOT
  rationale: The construct phrase literally denotes the mountains belonging to or
    associated with Israel. 'Mountains of Israel' preserves the personified geographical
    address that is important in Ezekiel. 'Hill country' is possible idiomatically,
    but the repeated vocative favors the more literal 'mountains.'
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  - and speak
  lexicon: HALOT
  rationale: A simple imperative-like continuation in English best reflects the Hebrew
    sequence after the command to prophesy. 'And say' is concise and natural.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: The imperative calls the personified mountains to receive the prophetic
    message. 'Hear' preserves the biblical resonance of covenantal summons language
    better than the more colloquial 'listen to.'
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Word' should be retained for consistency
    and theological-literary continuity. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
