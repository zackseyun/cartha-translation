theological_decisions:
- issue: Referent of the addressee and restoration language
  chosen_reading: The verse addresses the land/mountains of Israel and promises concrete
    national restoration for Israel's population centers.
  alternative_readings:
  - A purely metaphorical spiritual restoration detached from the land
  rationale: The immediate context addresses the land directly, and the vocabulary
    of cities, inhabitants, and ruins being rebuilt is concrete. The translation therefore
    preserves the territorial-restoration imagery and does not spiritualize it in
    the main text.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
