id: EZK.36.10
reference: Ezekiel 36:10
source:
  edition: WLC
  text: וְ/הִרְבֵּיתִ֤י עֲלֵי/כֶם֙ אָדָ֔ם כָּל בֵּ֥ית יִשְׂרָאֵ֖ל כֻּלֹּ֑/ה וְ/נֹֽשְׁבוּ֙
    הֶֽ/עָרִ֔ים וְ/הֶ/חֳרָב֖וֹת תִּבָּנֶֽינָה־׃
translation:
  text: And I will multiply people upon you—all the house of Israel, all of it. The
    cities will be inhabited, and the ruins will be rebuilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'adam' here is a collective term for human population; alternatively,
      'humankind' or more literally 'man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the waste places' / 'the desolate places' for 'the ruins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  chosen: And I will multiply
  alternatives:
  - And I will increase
  - And I will make numerous
  lexicon: HALOT
  rationale: Hiphil of רבה expresses causing to become many. 'Multiply' preserves
    the causative force and echoes common biblical diction without becoming archaic.
- source_word: עֲלֵיכֶם
  chosen: upon you
  alternatives:
  - on you
  - over you
  lexicon: HALOT
  rationale: The preposition עַל with plural suffix is spatially metaphorical here,
    referring to the mountains/land addressed in context. 'Upon you' is natural and
    preserves the image of population spread over the land.
- source_word: אָדָם
  chosen: people
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Although אָדָם often means 'man' or 'humankind,' here it refers to population
    increase on the land. 'People' best conveys the collective sense in idiomatic
    English while remaining faithful to the referent. This aligns with the doctrine
    note that אָדָם may be rendered 'man / humankind' depending on context.
- source_word: כָּל בֵּית יִשְׂרָאֵל כֻּלֹּה
  chosen: all the house of Israel, all of it
  alternatives:
  - the whole house of Israel, all of it
  - all the house of Israel, the whole of it
  lexicon: HALOT
  rationale: The phrase is emphatic, with כָּל and then כֻּלֹּה reinforcing totality.
    Rendering both elements preserves the Hebrew emphasis rather than collapsing them
    into a single English expression.
- source_word: וְנֹשְׁבוּ
  chosen: will be inhabited
  alternatives:
  - will be settled
  - will be dwelt in
  lexicon: HALOT
  rationale: From ישׁב in the Niphal, the sense is that the cities will again have
    inhabitants. 'Will be inhabited' is the most natural passive/resultative rendering
    in English.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עָרִים straightforwardly denotes cities/towns. 'Cities' is the standard
    rendering and fits the restoration context.
- source_word: וְהֶחֳרָבוֹת
  chosen: the ruins
  alternatives:
  - the waste places
  - the desolate places
  lexicon: HALOT
  rationale: חֳרָבוֹת denotes devastated or ruined places. 'Ruins' is concise and
    vivid in context, especially paired with rebuilding. 'Waste places' is possible
    but less natural in contemporary English.
- source_word: תִּבָּנֶינָה
  chosen: will be rebuilt
  alternatives:
  - will be built
  - will be built up again
  lexicon: HALOT
  rationale: Niphal of בנה can be rendered passively, and in context of previously
    ruined places, 'rebuilt' makes the restoration sense explicit without adding foreign
    content.
