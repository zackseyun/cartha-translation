theological_decisions:
- issue: Rendering the divine name/title sequence אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: 'Force of the verse: kingship asserted through judgment imagery'
  chosen_reading: I will reign over you
  alternative_readings:
  - I will rule over you
  - I will be king over you
  rationale: The text presents Yahweh's kingship as an unavoidable assertion over Israel, expressed through exodus-like power and wrath. 'Reign' preserves the royal-theological dimension without importing later systematic categories.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
