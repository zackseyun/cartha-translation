id: EZK.20.33
reference: Ezekiel 20:33
source:
  edition: WLC
  text: חַי אָ֕נִי נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה אִם לֹ֠א בְּ/יָ֨ד חֲזָקָ֜ה וּ/בִ/זְר֧וֹעַ נְטוּיָ֛ה וּ/בְ/חֵמָ֥ה שְׁפוּכָ֖ה אֶמְל֥וֹךְ עֲלֵי/כֶֽם־־׃
translation:
  text: As I live, declares the Lord GOD, surely with a strong hand and an outstretched arm and with wrath poured out, I will reign over you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will rule over you' or 'I will be king over you.' The Hebrew verb carries royal force.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֕נִי
  chosen: As I live
  alternatives:
  - As surely as I live
  - I live
  lexicon: HALOT
  rationale: Idiomatic oath formula in prophetic speech. 'As I live' preserves the Hebrew form while remaining natural English; 'surely' later in the clause helps convey the emphatic force of the oath-plus-particle construction.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic speech tag 'declares/oracle of.' אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD' in English to reflect the qere-based reading and avoid 'Lord LORD.' Per doctrine, יְהוָה is rendered 'the LORD'; in this compound title, 'Lord GOD' is the established equivalent that preserves the distinction.
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration rather than a literal conditional, so 'surely' best conveys the force in English.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - by a strong hand
  - with mighty power
  lexicon: HALOT
  rationale: Retains the Exodus-shaped idiom and imagery of divine power. 'With' fits the instrumental sense naturally in English.
- source_word: וּבִזְרֹעַ נְטוּיָה
  chosen: and an outstretched arm
  alternatives:
  - and with an outstretched arm
  lexicon: HALOT
  rationale: Standard biblical idiom paired with 'strong hand.' The preposition is understood from the previous phrase; English can omit the repeated 'with' without loss, though the sense remains instrumental.
- source_word: וּבְחֵמָה שְׁפוּכָה
  chosen: and with wrath poured out
  alternatives:
  - and with fury poured out
  - and with outpoured wrath
  lexicon: HALOT
  rationale: חֵמָה often denotes wrath/fury. 'Wrath' fits the solemn prophetic register, and 'poured out' preserves the passive participial imagery of divine anger being unleashed.
- source_word: אֶמְלֹךְ עֲלֵיכֶם
  chosen: I will reign over you
  alternatives:
  - I will rule over you
  - I will be king over you
  lexicon: HALOT
  rationale: The verb מלך means to reign/be king. 'Reign over you' preserves the royal force more clearly than the flatter 'rule over you,' especially in a context of Yahweh asserting kingship over a resistant people.
