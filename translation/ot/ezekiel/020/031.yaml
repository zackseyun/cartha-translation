theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gender rendering of בְּנֵיכֶם
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The Hebrew explicitly says 'your sons,' not a gender-neutral term for children. Per doctrine, gender-accurate rendering is preferred unless context clearly requires a generic sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
- issue: Force of the final oath formula אִם אִדָּרֵשׁ לָכֶם
  chosen_reading: I will not be inquired of by you
  alternative_readings:
  - if I am inquired of by you
  rationale: A formally literal rendering with 'if' would obscure the idiomatic oath-negation in English. The chosen reading preserves the semantic force without importing additional theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
