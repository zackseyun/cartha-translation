id: EZK.20.31
reference: Ezekiel 20:31
source:
  edition: WLC
  text: וּ/בִ/שְׂאֵ֣ת מַתְּנֹֽתֵי/כֶ֡ם בְּֽ/הַעֲבִיר֩ בְּנֵי/כֶ֨ם בָּ/אֵ֜שׁ אַתֶּם֩ נִטְמְאִ֤֨ים לְ/כָל גִּלּֽוּלֵי/כֶם֙ עַד הַ/יּ֔וֹם וַ/אֲנִ֛י אִדָּרֵ֥שׁ לָ/כֶ֖ם בֵּ֣ית יִשְׂרָאֵ֑ל חַי אָ֗נִי נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה אִם אִדָּרֵ֖שׁ לָ/כֶֽם־־־־׃
translation:
  text: And when you present your gifts, when you make your sons pass through the fire, you defile yourselves with all your idols to this day. And shall I be inquired of by you, O house of Israel? As I live, declares the Lord GOD, I will not be inquired of by you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'make your sons pass through the fire,' an idiom for child-sacrifice in idolatrous worship.
    reason: cultural_note
  - marker: b
    text: Or 'offerings' for 'gifts.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew literally uses an oath formula with ''if''; in context it means a strong denial: ''I will certainly not be inquired of by you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׂאֵת
  chosen: when you present
  alternatives:
  - and in lifting up
  - and when you offer
  lexicon: HALOT
  rationale: From נשׂא with prefixed conjunction/preposition, here functioning idiomatically with 'your gifts' to mean presenting or offering them, not merely physically lifting them.
- source_word: מַתְּנֹתֵיכֶם
  chosen: your gifts
  alternatives:
  - your offerings
  - your tribute
  lexicon: HALOT
  rationale: '''Gifts'' is the most direct rendering of מתנות; in sacrificial context ''offerings'' is possible, but ''gifts'' preserves the lexical form while allowing the cultic sense to emerge from context.'
- source_word: בְּהַעֲבִיר בְּנֵיכֶם בָּאֵשׁ
  chosen: when you make your sons pass through the fire
  alternatives:
  - when you cause your children to pass through the fire
  - when you burn your sons in the fire
  lexicon: HALOT
  rationale: This is the established Hebrew idiom for child-sacrifice associated with Molech worship. 'Make ... pass through the fire' preserves the source wording without over-specifying the ritual mechanism; 'sons' is retained because the Hebrew is explicitly masculine plural.
- source_word: אַתֶּם נִטְמְאִים
  chosen: you defile yourselves
  alternatives:
  - you become unclean
  - you are defiled
  lexicon: HALOT
  rationale: 'The Niphal here conveys becoming defiled, but in context the reflexive sense is strong: by these acts they render themselves unclean. ''Defile yourselves'' communicates both result and culpability.'
- source_word: לְכָל גִּלּוּלֵיכֶם
  chosen: with all your idols
  alternatives:
  - by all your idols
  - through all your idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's strongly pejorative term for idols. 'With' fits English idiom after 'defile yourselves' and preserves the association with idolatrous practices.
- source_word: עַד הַיּוֹם
  chosen: to this day
  alternatives:
  - until this day
  - even to today
  lexicon: HALOT
  rationale: Idiomatic English equivalent indicating the continuing state up to the present prophetic moment.
- source_word: וַאֲנִי אִדָּרֵשׁ לָכֶם
  chosen: And shall I be inquired of by you
  alternatives:
  - And shall I let myself be consulted by you
  - And shall I answer your inquiry
  lexicon: HALOT
  rationale: דרשׁ in the Niphal commonly means 'be sought' or 'be consulted/inquired of,' especially of seeking divine guidance. The interrogative force is rhetorical and anticipates the emphatic denial that follows.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Vocative force is clear in context; 'O' preserves prophetic address and solemnity in natural English.
- source_word: חַי אָנִי
  chosen: As I live
  alternatives:
  - By my life
  lexicon: HALOT
  rationale: Standard oath formula introducing a solemn divine declaration.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declaration of the Lord GOD
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is well rendered 'declares' in prophetic speech. Following doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'Lord GOD' is the conventional and clear English equivalent for אֲדֹנָי יְהוִה.
- source_word: אִם אִדָּרֵשׁ לָכֶם
  chosen: I will not be inquired of by you
  alternatives:
  - surely I will not be consulted by you
  - if I am inquired of by you
  lexicon: HALOT
  rationale: The oath + אִם construction here is elliptical and idiomatically expresses a strong negation. Rendering it as a plain English denial communicates the force of the Hebrew oath formula rather than preserving a misleading literal 'if'.
