id: EZK.20.21
reference: Ezekiel 20:21
source:
  edition: WLC
  text: וַ/יַּמְרוּ בִ֣/י הַ/בָּנִ֗ים בְּ/חֻקּוֹתַ֣/י לֹֽא הָ֠לָכוּ וְ/אֶת מִשְׁפָּטַ֨/י
    לֹא שָׁמְר֜וּ לַ/עֲשׂ֣וֹת אוֹתָ֗/ם אֲשֶׁר֩ יַעֲשֶׂ֨ה אוֹתָ֤/ם הָֽ/אָדָם֙ וָ/חַ֣י
    בָּ/הֶ֔ם אֶת שַׁבְּתוֹתַ֖/י חִלֵּ֑לוּ וָ/אֹמַ֞ר לִ/שְׁפֹּ֧ךְ חֲמָתִ֣/י עֲלֵי/הֶ֗ם
    לְ/כַלּ֥וֹת אַפִּ֛/י בָּ֖/ם בַּ/מִּדְבָּֽר־־־־־׃
translation:
  text: But the children rebelled against me. They did not walk in my statutes, and
    they did not keep my judgments so as to do them—the judgments that, if a man does
    them, he will live by them. They profaned my Sabbaths. So I said I would pour
    out my wrath on them, to spend my anger against them in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if a person does them, he will live by them.' Hebrew 'the man' is a
      generic singular for a human being.
    reason: lexical_alternative
  - marker: b
    text: This clause echoes Leviticus 18:5.
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּמְרוּ בִי
  chosen: rebelled against me
  alternatives:
  - were rebellious against me
  - defied me
  lexicon: HALOT
  rationale: מרה with ב marks rebellion directed against God. 'Rebelled against me'
    is idiomatic and preserves the covenantal force better than a weaker 'disobeyed.'
- source_word: הַבָּנִים
  chosen: the children
  alternatives:
  - the sons
  lexicon: HALOT
  rationale: Though literally 'the sons,' in context it refers to the next generation
    of Israel in a collective sense. 'The children' communicates the generational
    contrast without implying only males.
- source_word: בְּחֻקּוֹתַי לֹא הָלָכוּ
  chosen: did not walk in my statutes
  alternatives:
  - did not follow my statutes
  lexicon: HALOT
  rationale: The idiom 'walk in' is common covenant language and should be preserved
    in English where natural. 'Statutes' is a standard rendering for חֻקִּים.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים here refers to God's legal decisions/ordinances. 'Judgments'
    preserves the juridical sense and matches the following relative clause.
- source_word: לֹא שָׁמְרוּ לַעֲשׂוֹת אוֹתָם
  chosen: they did not keep my judgments so as to do them
  alternatives:
  - they did not keep them to practice them
  - they did not observe them
  lexicon: HALOT
  rationale: שׁמר + infinitive of עשׂה expresses guarding/keeping with a view to doing.
    The translation preserves both the keeping and the doing rather than collapsing
    them into a single verb.
- source_word: אֲשֶׁר יַעֲשֶׂה אֹתָם הָאָדָם וָחַי בָּהֶם
  chosen: the judgments that, if a man does them, he will live by them
  alternatives:
  - which if a man does, he shall live by them
  - which a person who does will live by
  lexicon: HALOT
  rationale: The clause echoes Lev 18:5. Per doctrine, אָדָם is rendered gender-accurately
    as 'man' here because the Hebrew singular generic is retained in the source. 'Live
    by them' preserves the preposition and the established biblical phrasing.
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: The singular generic noun is best represented by 'a man' in keeping with
    the project's gender-accurate policy. An inclusive alternative is worth preserving
    in a footnote because English readers may otherwise hear it as male-exclusive.
- source_word: אֶת שַׁבְּתוֹתַי חִלֵּלוּ
  chosen: They profaned my Sabbaths
  alternatives:
  - They desecrated my Sabbaths
  lexicon: HALOT
  rationale: חלל in the piel means to profane/desecrate. 'Profaned' is concise and
    preserves the sacred/profane contrast.
- source_word: וָאֹמַר
  chosen: So I said I would
  alternatives:
  - Then I said I would
  - And I said I would
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So I said I would' reads
    naturally in English while preserving the consequential force.
- source_word: לִשְׁפֹּךְ חֲמָתִי עֲלֵיהֶם
  chosen: pour out my wrath on them
  alternatives:
  - pour out my fury on them
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'Wrath' is weighty but readable; 'pour
    out' preserves the metaphor.
- source_word: לְכַלּוֹת אַפִּי בָּם
  chosen: to spend my anger against them
  alternatives:
  - to exhaust my anger on them
  - to complete my anger against them
  lexicon: HALOT
  rationale: כלה with אַף conveys bringing anger to its full expression or completion.
    'Spend my anger against them' is idiomatic English that preserves the sense of
    fully venting judgment without over-paraphrase.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר in the exodus context is conventionally and accurately 'wilderness,'
    which also resonates with the broader biblical narrative.
