theological_decisions:
- issue: Generic use of אָדָם in the life-by-obedience clause
  chosen_reading: a man
  alternative_readings:
  - a person
  - one
  rationale: The Hebrew uses singular הָאָדָם generically. Following the project's
    gender-accurate policy, the main text retains 'man' rather than neutralizing the
    form, while an inclusive alternative is preserved in a footnote for clarity.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
