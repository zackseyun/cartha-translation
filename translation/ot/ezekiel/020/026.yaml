theological_decisions:
- issue: Divine agency in Israel's defilement and child-sacrifice context
  chosen_reading: Retain the direct first-person divine statement ('I defiled them')
    without softening it, while allowing the instrumental phrase to show that this
    occurred through their own cultic gifts and the passing over of the firstborn.
  alternative_readings:
  - Paraphrasing to 'I gave them over to defilement'
  - Interpreting the action as merely permissive rather than directly stated
  rationale: The Hebrew text explicitly uses first-person causative language. The
    translation should preserve that theological tension rather than resolve it by
    weakening divine agency. At the same time, the verse itself locates the defilement
    in relation to their gifts and the abhorrent rite, so the wording should not imply
    that God morally authored evil apart from the text's judicial context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of the firstborn-sacrifice idiom
  chosen_reading: Translate the idiom with explicit firstborn language and preserve
    the more literal 'opener of the womb' in a footnote.
  alternative_readings:
  - Translate only literally as 'every opener of the womb'
  - Translate more interpretively as 'every firstborn child'
  rationale: The Hebrew idiom is standard for the firstborn, but the immediate context
    of passing through and the womb imagery are both significant. The main text keeps
    readability while a footnote preserves the literal form for auditability.
  doctrine_reference: Optimal equivalence; document significant lexical decisions.
