id: EZK.20.26
reference: Ezekiel 20:26
source:
  edition: WLC
  text: וָ/אֲטַמֵּ֤א אוֹתָ/ם֙ בְּ/מַתְּנוֹתָ֔/ם בְּ/הַעֲבִ֖יר כָּל פֶּ֣טֶר רָ֑חַם
    לְמַ֣עַן אֲשִׁמֵּ֔/ם לְמַ֨עַן֙ אֲשֶׁ֣ר יֵֽדְע֔וּ אֲשֶׁ֖ר אֲנִ֥י יְהוָֽה־׃ס
translation:
  text: And I defiled them through their gifts, when they made every firstborn pass
    through the womb, so that I might devastate them, so that they might know that
    I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'every opener of the womb.' This Hebrew idiom refers to every
      firstborn.
    reason: lexical_alternative
  - marker: b
    text: Or 'I made them unclean' / 'I polluted them.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'made ... pass through' refers to the ritual passing over of
      the firstborn, likely alluding to child sacrifice.
    reason: cultural_note
  - marker: d
    text: Or 'so that I might make them desolate' or 'so that I might horrify them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲטַמֵּא
  chosen: And I defiled
  alternatives:
  - And I made unclean
  - And I polluted
  lexicon: HALOT
  rationale: 'The Hiphil of טמא here is causative: God says he rendered them unclean.
    ''Defiled'' is idiomatic and preserves the cultic/moral force better than the
    more clinical ''made unclean,'' while avoiding over-interpretive expansion.'
- source_word: בְּמַתְּנוֹתָם
  chosen: through their gifts
  alternatives:
  - by their gifts
  - with their offerings
  lexicon: HALOT
  rationale: מַתָּנוֹת commonly means gifts/presents, but in sacrificial context can
    denote offerings. 'Gifts' keeps the lexical form while allowing the cultic sense
    to emerge from context. 'Through' reflects instrumental בְּ.
- source_word: בְּהַעֲבִיר
  chosen: when they made ... pass through
  alternatives:
  - by making ... pass through
  - in causing ... to pass through
  lexicon: HALOT
  rationale: The infinitive construct with בְּ can be rendered instrumentally or temporally.
    Here 'when they made ... pass through' reads naturally in English while preserving
    the ritual action alluded to.
- source_word: כָּל פֶּטֶר רָחַם
  chosen: every firstborn pass through the womb
  alternatives:
  - every opener of the womb
  - every first issue of the womb
  lexicon: HALOT
  rationale: 'The Hebrew idiom literally means ''every opener of the womb,'' a standard
    expression for the firstborn. Because the phrase is embedded after הַעֲבִיר, the
    translation keeps both the firstborn sense and the womb imagery: ''every firstborn
    pass through the womb.'''
- source_word: לְמַעַן אֲשִׁמֵּם
  chosen: so that I might devastate them
  alternatives:
  - so that I might horrify them
  - so that I might make them desolate
  lexicon: HALOT
  rationale: The Hiphil of שמם can mean to make desolate/devastate, or to appall.
    In this judgment context, 'devastate' best captures the punitive result without
    narrowing it to emotional shock alone.
- source_word: לְמַעַן אֲשֶׁר יֵדְעוּ
  chosen: so that they might know
  alternatives:
  - in order that they may know
  lexicon: HALOT
  rationale: A common Ezekiel formula expressing the revelatory purpose of judgment.
    'Might know' preserves the purposive nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
