id: EZK.20.3
reference: Ezekiel 20:3
source:
  edition: WLC
  text: בֶּן אָדָ֗ם דַּבֵּ֞ר אֶת זִקְנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם כֹּ֤ה
    אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הֲ/לִ/דְרֹ֥שׁ אֹתִ֖/י אַתֶּ֣ם בָּאִ֑ים חַי אָ֨נִי֙ אִם
    אִדָּרֵ֣שׁ לָ/כֶ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־־׃
translation:
  text: 'Son of man, speak to the elders of Israel and say to them, Thus says the
    Lord GOD: Is it to inquire of me that you have come? As I live, I will not be
    inquired of by you, declares the Lord GOD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Is it to consult me that you have come?' The verb can denote seeking
      an oracle or inquiry from God.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew literally, ''As I live, if I am inquired of by you''—an oath formula
      expressing strong negation: ''I will not be inquired of by you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional and contextually fitting rendering of Ezekiel’s address
    formula. It preserves the Hebrew idiom and the representative singular אָדָם ('man')
    rather than flattening it to a purely dynamic equivalent.
- source_word: דַּבֵּר
  chosen: speak
  alternatives:
  - speak to
  - address
  lexicon: HALOT
  rationale: Imperative of דבר. 'Speak' is the core command; the following אֶת marks
    the object, so 'speak to' is supplied naturally in English by the phrase 'speak
    to the elders of Israel.'
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel’s elders
  lexicon: HALOT
  rationale: Standard rendering for the recognized leadership group; preserves the
    genitival relationship without paraphrase.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord Yahweh
  - Thus says the Lord GOD Yahweh
  lexicon: HALOT
  rationale: כֹּה אָמַר is the standard prophetic messenger formula, best rendered
    'Thus says.' Per doctrine, יְהוָה is rendered 'the LORD'; in combination with
    אֲדֹנָי, English convention uses 'Lord GOD' to avoid 'Lord LORD' while preserving
    both divine titles.
- source_word: הֲלִדְרֹשׁ אֹתִי
  chosen: Is it to inquire of me
  alternatives:
  - Have you come to seek me
  - Is it to consult me
  lexicon: HALOT
  rationale: דרשׁ in this context refers to seeking an oracle or consultation from
    God, not general spiritual seeking. 'Inquire of me' best matches the prophetic/juridical
    sense in Ezekiel.
- source_word: בָּאִים
  chosen: you have come
  alternatives:
  - you are coming
  lexicon: HALOT
  rationale: Although formally a participle, in this interrogative context with implied
    purpose it functions naturally as an English present perfect describing their
    arrival for a purpose.
- source_word: חַי אָנִי
  chosen: As I live
  alternatives:
  - By my life
  lexicon: HALOT
  rationale: Standard oath formula in divine speech. 'As I live' is idiomatic, solemn,
    and widely intelligible.
- source_word: אִם אִדָּרֵשׁ לָכֶם
  chosen: I will not be inquired of by you
  alternatives:
  - shall I indeed let myself be consulted by you?
  - I will not let you inquire of me
  lexicon: HALOT
  rationale: 'The particle אִם after an oath functions idiomatically as a strong negation
    (''surely not''). The Niphal of דרשׁ is passive/reflexive in sense: God refuses
    to be consulted by them. ''I will not be inquired of by you'' preserves the force
    and the verbal connection with the earlier ''inquire of me.'''
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - utterance of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is readable modern
    English and preserves the authoritative speech-act force.
