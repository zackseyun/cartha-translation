theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: Per doctrine, יְהוָה defaults to 'the LORD.' In the fixed combination
    with אֲדֹנָי, English translations commonly use 'Lord GOD' to preserve both elements
    without the awkward 'Lord LORD.' This is a translation convention, not a theological
    reinterpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the oath-plus-אִם construction
  chosen_reading: As I live, I will not be inquired of by you
  alternative_readings:
  - As I live ... shall I be inquired of by you?
  rationale: The Hebrew oath formula with אִם expresses emphatic denial. Rendering
    it as a direct negation in English communicates the intended force more clearly
    than preserving the bare conditional particle.
