id: EZK.20.24
reference: Ezekiel 20:24
source:
  edition: WLC
  text: יַ֜עַן מִשְׁפָּטַ֤/י לֹֽא עָשׂוּ֙ וְ/חֻקּוֹתַ֣/י מָאָ֔סוּ וְ/אֶת שַׁבְּתוֹתַ֖/י
    חִלֵּ֑לוּ וְ/אַחֲרֵי֙ גִּלּוּלֵ֣י אֲבוֹתָ֔/ם הָי֖וּ עֵינֵי/הֶֽם־־׃
translation:
  text: because they did not practice my judgments, and they rejected my statutes,
    and they profaned my Sabbaths, and their eyes were after the idols of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols; some renderings
      bring out the scorn with expressions like 'disgusting idols' or 'dung-idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: יַעַן introduces the reason for the preceding divine action/judgment.
    'Because' is the most natural modern English causal connector and preserves the
    explanatory force.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּט often refers to legal judgments/ordinances. 'Judgments' keeps
    the formal covenant-legal sense and matches Ezekiel's diction better than the
    flatter 'rules.'
- source_word: עָשׂוּ
  chosen: did not practice
  alternatives:
  - did not do
  - did not carry out
  lexicon: HALOT
  rationale: With covenantal requirements as object, English idiom prefers 'practice'
    over the wooden 'do,' while still staying close to the Hebrew verb.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my prescriptions
  lexicon: HALOT
  rationale: חֻקּוֹת is a standard covenant-law term. 'Statutes' is a conventional
    and accurate rendering that distinguishes it from מִשְׁפָּטַי.
- source_word: מָאָסוּ
  chosen: they rejected
  alternatives:
  - they despised
  - they refused
  lexicon: HALOT
  rationale: מָאַס conveys repudiation or rejection. 'Rejected' is clear modern English
    and avoids the potentially more emotive 'despised' unless context requires it.
- source_word: שַׁבְּתוֹתַי
  chosen: my Sabbaths
  alternatives:
  - my sabbath days
  lexicon: HALOT
  rationale: The plural refers to the covenantal Sabbath observances. 'My Sabbaths'
    is the most direct and established rendering.
- source_word: חִלֵּלוּ
  chosen: they profaned
  alternatives:
  - they desecrated
  - they defiled
  lexicon: HALOT
  rationale: In cultic/covenantal contexts חלל in the piel means to profane or treat
    as common. 'Profaned' best preserves the theological and covenantal weight.
- source_word: אַחֲרֵי
  chosen: were after
  alternatives:
  - followed after
  - went after
  lexicon: HALOT
  rationale: Combined with 'their eyes' and הָיוּ, the idiom expresses desire/orientation
    toward something. 'Were after' is concise and preserves the Hebrew structure.
- source_word: גִּלּוּלֵי
  chosen: the idols
  alternatives:
  - the disgusting idols
  - the dung-idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. The basic sense
    'idols' is suitable for the main text; the pejorative nuance is worth preserving
    in a footnote rather than overtranslating in the line.
- source_word: אֲבוֹתָם
  chosen: of their fathers
  alternatives:
  - of their ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'fathers.' Per gender-accurate policy, the
    masculine familial term is retained rather than neutralized to 'ancestors.'
- source_word: הָיוּ עֵינֵיהֶם
  chosen: their eyes were
  alternatives:
  - their eyes looked
  - their eyes were fixed
  lexicon: HALOT
  rationale: This idiom denotes inward desire and outward orientation. Rendering it
    literally as 'their eyes were' preserves the Hebrew image, with the following
    'after' making the sense clear.
