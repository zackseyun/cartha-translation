theological_decisions:
- issue: Retention of masculine familial term in אֲבוֹתָם
  chosen_reading: of their fathers
  alternative_readings:
  - of their ancestors
  rationale: The Hebrew specifically uses the masculine plural 'fathers.' Following
    the translation philosophy's gender-accurate principle, the translation retains
    the source's familial term rather than broadening it to a gender-neutral collective.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering of גִּלּוּלִים
  chosen_reading: idols
  alternative_readings:
  - disgusting idols
  - dung-idols
  rationale: Ezekiel's term is intentionally contemptuous, but an expanded rendering
    in the main text would move beyond optimal equivalence. The pejorative force is
    preserved in a footnote for auditability without paraphrasing the line.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
