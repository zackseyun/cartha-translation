id: EZK.20.18
reference: Ezekiel 20:18
source:
  edition: WLC
  text: וָ/אֹמַ֤ר אֶל בְּנֵי/הֶם֙ בַּ/מִּדְבָּ֔ר בְּ/חוּקֵּ֤י אֲבֽוֹתֵי/כֶם֙ אַל תֵּלֵ֔כוּ
    וְ/אֶת מִשְׁפְּטֵי/הֶ֖ם אַל תִּשְׁמֹ֑רוּ וּ/בְ/גִלּוּלֵי/הֶ֖ם אַל תִּטַּמָּֽאוּ־־־־־׃
translation:
  text: And I said to their children in the wilderness, ‘Do not walk in the statutes
    of your fathers, and do not keep their judgments, and do not defile yourselves
    with their idols.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols; possible renderings
      include “filthy idols” or even “dung-idols.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  - So I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר narrates sequential past action. 'And I said' preserves
    the simple narrative progression without overinterpreting discourse force.
- source_word: בְּנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  lexicon: HALOT
  rationale: בנים can mean sons specifically or children more generally. Here the
    referent is the next generation of Israel in the wilderness, so 'their children'
    best conveys the generational sense in natural English while remaining faithful
    to the context.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness land; 'wilderness' is the established
    and contextually apt rendering in Israel's exodus setting.
- source_word: בְּחֻקֵּי
  chosen: in the statutes
  alternatives:
  - according to the statutes
  - in the ordinances
  lexicon: HALOT
  rationale: חֻקִּים refers to prescribed statutes. 'Walk in the statutes' reflects
    the Hebrew idiom with sufficient English clarity and preserves the legal-covenantal
    nuance.
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural with ancestral force. Per gender-accurate
    policy, 'your fathers' is retained rather than neutralizing to 'ancestors,' though
    the sense is the prior generation.
- source_word: אַל תֵּלֵכוּ
  chosen: do not walk
  alternatives:
  - do not follow
  - must not walk
  lexicon: HALOT
  rationale: הלך in this idiom means to conduct oneself according to something. 'Do
    not walk' preserves the metaphor and biblical style; 'follow' is possible but
    less formally tied to the Hebrew wording.
- source_word: מִשְׁפְּטֵיהֶם
  chosen: their judgments
  alternatives:
  - their rules
  - their ordinances
  - their customs
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal contexts often means judgments/ordinances. 'Judgments'
    keeps the lexical distinction from חֻקִּים ('statutes') and avoids collapsing
    two different Hebrew legal terms into one English gloss.
- source_word: תִּשְׁמֹרוּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר with laws commonly means keep/observe. 'Keep' is concise, idiomatic,
    and standard in covenantal legal contexts.
- source_word: גִּלּוּלֵיהֶם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols. 'Idols' is the clear
    main-text rendering; the more contemptuous nuance is real but difficult to express
    naturally in running English without sounding interpretive, so it is preserved
    in a footnote.
- source_word: תִּטַּמָּאוּ
  chosen: do not defile yourselves
  alternatives:
  - do not make yourselves unclean
  - do not become unclean
  lexicon: HALOT
  rationale: The hitpael/reflexive sense indicates becoming defiled through association
    with idols. 'Do not defile yourselves' communicates the reflexive force and moral-ritual
    contamination clearly.
