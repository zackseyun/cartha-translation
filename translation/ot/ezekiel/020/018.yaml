theological_decisions:
- issue: Rendering of ancestral term אֲבוֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is grammatically masculine plural and refers to the prior
    generation. Following the gender-accurate policy, the translation keeps 'fathers'
    rather than neutralizing the term, while the context makes clear that a generational
    contrast is intended.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Pejorative force of גִּלּוּלִים
  chosen_reading: idols
  alternative_readings:
  - filthy idols
  - dung-idols
  rationale: The term is contemptuous, but a highly pejorative English gloss in the
    main text risks sounding paraphrastic. The base sense 'idols' is retained in the
    text, with the derogatory nuance preserved in a footnote for auditability.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 5
