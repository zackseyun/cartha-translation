id: EZK.20.17
reference: Ezekiel 20:17
source:
  edition: WLC
  text: וַ/תָּ֧חָס עֵינִ֛/י עֲלֵי/הֶ֖ם מִֽ/שַּׁחֲתָ֑/ם וְ/לֹֽא עָשִׂ֧יתִי אוֹתָ֛/ם
    כָּלָ֖ה בַּ/מִּדְבָּֽר־׃
translation:
  text: But my eye spared them from destroying them, and I did not make a complete
    end of them in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my eye spared them,'' an idiom expressing compassionate restraint.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּחָס
  chosen: spared
  alternatives:
  - had compassion
  - pitied
  lexicon: HALOT
  rationale: From חוס, expressing sparing or showing pity. 'Spared' fits the idiom
    with 'my eye' in English and preserves the concrete sense of withholding destruction.
- source_word: עֵינִי
  chosen: my eye
  alternatives:
  - I
  - my eyes
  lexicon: HALOT
  rationale: The Hebrew uses the singular noun 'my eye' as the subject, an idiom for
    compassionate regard. Retaining 'my eye' preserves the vivid anthropomorphic expression
    rather than flattening it to 'I'.
- source_word: עֲלֵיהֶם
  chosen: them
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: With חוס the preposition marks the object of pity/sparing. In natural
    English this is best represented simply as the object 'them'.
- source_word: מִשַּׁחֲתָם
  chosen: from destroying them
  alternatives:
  - from ruin
  - from their destruction
  - from bringing them to ruin
  lexicon: HALOT
  rationale: The prefixed מן plus infinitive construct of שׁחת with 3mp suffix most
    naturally means 'from destroying them' or 'from bringing them to ruin.' This makes
    explicit the verbal force present in the Hebrew form.
- source_word: וְלֹא עָשִׂיתִי אוֹתָם כָּלָה
  chosen: I did not make a complete end of them
  alternatives:
  - I did not destroy them completely
  - I did not consume them utterly
  lexicon: HALOT
  rationale: The idiom עשה כלה means to make a full end or complete destruction. 'Make
    a complete end of' preserves the idiomatic force while remaining understandable
    in modern English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מדבר in Israel''s exodus
    context and better preserves the biblical setting than ''desert,'' which can sound
    overly geographic and less covenant-historical.'
