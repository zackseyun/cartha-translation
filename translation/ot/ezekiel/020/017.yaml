theological_decisions:
- issue: Anthropomorphic expression of divine compassion
  chosen_reading: Retain 'my eye spared them' rather than abstracting to 'I spared
    them.'
  alternative_readings:
  - I spared them
  - I looked on them with pity
  rationale: The Hebrew intentionally uses bodily imagery for God's merciful regard.
    Preserving the anthropomorphism maintains the text's rhetorical force without
    implying a denial of divine transcendence.
  doctrine_reference: Translation philosophy §1, §3
