id: EZK.20.40
reference: Ezekiel 20:40
source:
  edition: WLC
  text: כִּ֣י בְ/הַר קָדְשִׁ֞/י בְּ/הַ֣ר מְר֣וֹם יִשְׂרָאֵ֗ל נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה
    שָׁ֣ם יַעַבְדֻ֜/נִי כָּל בֵּ֧ית יִשְׂרָאֵ֛ל כֻּלֹּ֖/ה בָּ/אָ֑רֶץ שָׁ֣ם אֶרְצֵ֔/ם
    וְ/שָׁ֞ם אֶדְר֣וֹשׁ אֶת תְּרוּמֹֽתֵי/כֶ֗ם וְ/אֶת רֵאשִׁ֛ית מַשְׂאוֹתֵי/כֶ֖ם בְּ/כָל
    קָדְשֵׁי/כֶֽם־׀־־־־׃
translation:
  text: For on my holy mountain, on the high mountain of Israel, declares the Lord
    GOD, there all the house of Israel, all of them in the land, will serve me. There
    I will accept them, and there I will require your contributions and the firstfruits
    of your gifts, with all your holy things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your offerings' for 'your contributions'; the Hebrew term refers to
      portions set apart and presented to God.
    reason: lexical_alternative
  - marker: b
    text: Or 'the first of your offerings' for 'the firstfruits of your gifts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with all your sacred offerings' for 'with all your holy things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְהַר קָדְשִׁי
  chosen: on my holy mountain
  alternatives:
  - at my holy mountain
  - in my holy mountain
  lexicon: HALOT
  rationale: בְ with הַר is most naturally locative here; 'on my holy mountain' is
    idiomatic English for worship on a mountain height and preserves the cultic setting.
- source_word: בְהַר מְרוֹם יִשְׂרָאֵל
  chosen: on the high mountain of Israel
  alternatives:
  - on Israel's lofty mountain
  - on the mountain height of Israel
  lexicon: HALOT
  rationale: מְרוֹם denotes height/elevation. 'High mountain of Israel' keeps the
    parallelism with 'my holy mountain' and avoids over-paraphrase.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula best rendered 'declares.' Per doctrine,
    יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'Lord GOD' is the standard
    English equivalent that avoids 'Lord LORD.'
- source_word: יַעַבְדֻנִי
  chosen: will serve me
  alternatives:
  - will worship me
  - will minister to me
  lexicon: HALOT
  rationale: עבד in covenant/cultic contexts can mean serve or worship. 'Serve me'
    preserves the broader sense while fitting the sacrificial context that follows.
- source_word: כָּל בֵּית יִשְׂרָאֵל כֻּלֹּה
  chosen: all the house of Israel, all of them
  alternatives:
  - the whole house of Israel, all of it
  - all Israel's house, every one of them
  lexicon: HALOT
  rationale: The doubled totalizing expression is emphatic. Rendering both elements
    preserves the stress on the entirety of restored Israel.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/land
  - in the country
  lexicon: HALOT
  rationale: '''The land'' is the natural covenantal/geographical sense in Ezekiel,
    better than the generic ''country.'''
- source_word: אֶרְצֵם
  chosen: I will accept them
  alternatives:
  - I will be pleased with them
  - I will receive them favorably
  lexicon: HALOT
  rationale: רצה in sacrificial and relational contexts commonly means accept favorably.
    Here the object is the people, so 'accept them' is concise and faithful.
- source_word: אֶדְרוֹשׁ
  chosen: I will require
  alternatives:
  - I will seek
  - I will demand
  lexicon: HALOT
  rationale: דרש can mean seek/inquire/require. In context of offerings due to God,
    'require' best conveys that he calls for or expects these offerings, without the
    harshness of 'demand.'
- source_word: תְּרוּמֹתֵיכֶם
  chosen: your contributions
  alternatives:
  - your offerings
  - your heave offerings
  lexicon: HALOT
  rationale: תְּרוּמָה refers to a contribution/offering set apart for God. 'Contributions'
    is readable modern English; 'heave offerings' is too technical for main text.
- source_word: רֵאשִׁית מַשְׂאוֹתֵיכֶם
  chosen: the firstfruits of your gifts
  alternatives:
  - the best of your offerings
  - the first of your contributions
  lexicon: HALOT
  rationale: רֵאשִׁית is 'first/beginning' and in offering contexts often 'firstfruits.'
    מַשְׂאֹת likely denotes what is lifted/brought as offerings or gifts. 'Firstfruits
    of your gifts' preserves both ideas without collapsing them into one term.
- source_word: בְּכָל קָדְשֵׁיכֶם
  chosen: with all your holy things
  alternatives:
  - in all your holy gifts
  - together with all your sacred offerings
  lexicon: HALOT
  rationale: 'קָדְשֵׁיכֶם is broad: holy things/things consecrated by the people.
    ''With all your holy things'' keeps the breadth and avoids over-specifying a narrower
    sacrificial category.'
