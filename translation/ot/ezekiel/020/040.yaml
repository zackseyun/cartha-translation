theological_decisions:
- issue: Rendering the divine name יְהוָה in the prophetic formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD
  rationale: The project default for יְהוָה is 'the LORD.' In the compound אֲדֹנָי
    יְהוִה, English convention 'Lord GOD' preserves the distinction and avoids the
    awkward 'Lord LORD.' This is a translation convention, not a doctrinal claim beyond
    the stated default.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
