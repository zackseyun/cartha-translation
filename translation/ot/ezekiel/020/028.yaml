theological_decisions:
- issue: Rendering of oath idiom נָשָׂא יָד
  chosen_reading: I had lifted up my hand
  alternative_readings:
  - I swore
  rationale: The phrase denotes divine oath-taking, but the translation preserves
    the Hebrew idiom in the main text for transparency and biblical texture rather
    than flattening it to the interpretation 'swore.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Cultic language for illicit worship sites
  chosen_reading: every high hill and every leafy tree
  alternative_readings:
  - every high place and every green tree
  rationale: The Hebrew here uses descriptive terms rather than the technical noun
    for 'high place.' The translation keeps the concrete imagery while allowing readers
    to recognize the idolatrous setting. The traditional phrase 'every green tree'
    is preserved as an alternative because of its intertextual familiarity.
  doctrine_reference: Translation philosophy §1, §5
