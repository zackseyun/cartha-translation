id: EZK.20.28
reference: Ezekiel 20:28
source:
  edition: WLC
  text: וָ/אֲבִיאֵ/ם֙ אֶל הָ/אָ֔רֶץ אֲשֶׁ֤ר נָשָׂ֨אתִי֙ אֶת יָדִ֔/י לָ/תֵ֥ת אוֹתָ֖/הּ
    לָ/הֶ֑ם וַ/יִּרְאוּ֩ כָל גִּבְעָ֨ה רָמָ֜ה וְ/כָל עֵ֣ץ עָבֹ֗ת וַ/יִּזְבְּחוּ שָׁ֤ם
    אֶת זִבְחֵי/הֶם֙ וַ/יִּתְּנוּ שָׁם֙ כַּ֣עַס קָרְבָּנָ֔/ם וַ/יָּשִׂ֣ימוּ שָׁ֗ם
    רֵ֚יחַ נִיח֣וֹחֵי/הֶ֔ם וַ/יַּסִּ֥יכוּ שָׁ֖ם אֶת נִסְכֵּי/הֶֽם־־־־־־־־׃
translation:
  text: So I brought them into the land that I had lifted up my hand to give to them,
    and they saw every high hill and every leafy tree, and there they sacrificed their
    sacrifices, and there they presented the provocation of their offering, and there
    they set their pleasing aromas, and there they poured out their drink offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the land that I swore to give them'; literally, 'the land that I lifted
      up my hand to give to them.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional biblical wording: ''every high hill and every green tree.'''
    reason: lexical_alternative
  - marker: c
    text: The Hebrew phrase is literally 'the provocation of their offering,' expressing
      that their offering was offensive and provoking to God.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֲבִיאֵם
  chosen: So I brought them
  alternatives:
  - Then I brought them
  - And I brought them
  lexicon: HALOT
  rationale: Hiphil of בוא means 'bring in/bring.' The prefixed waw continues the
    narrative sequence; 'So' captures the consequential flow from the prior context
    without sounding wooden.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: Standard covenantal/geographical sense in Ezekiel; 'land' preserves the
    biblical resonance of the promised land.
- source_word: נָשָׂאתִי אֶת־יָדִי
  chosen: I had lifted up my hand
  alternatives:
  - I swore
  - I raised my hand
  lexicon: HALOT
  rationale: This idiom refers to oath-taking. The more literal 'lifted up my hand'
    is retained in the main text to preserve the Hebrew imagery, while the oath sense
    remains clear from context.
- source_word: לָתֵת אֹתָהּ לָהֶם
  chosen: to give to them
  alternatives:
  - to give it to them
  lexicon: HALOT
  rationale: A straightforward rendering of the infinitive phrase. 'It' is omitted
    in English for smoother style while preserving the sense.
- source_word: וַיִּרְאוּ
  chosen: they saw
  alternatives:
  - they looked at
  - they noticed
  lexicon: HALOT
  rationale: The verb is simple perception, but in context it implies noticing attractive
    cultic sites. 'Saw' is sufficiently direct and leaves the implication to context.
- source_word: כָל גִּבְעָה רָמָה
  chosen: every high hill
  alternatives:
  - every lofty hill
  - every elevated hill
  lexicon: HALOT
  rationale: This is standard language for illicit worship sites. 'High hill' is idiomatic
    and preserves the cultic association of 'high places' without importing the technical
    term where the Hebrew here is descriptive.
- source_word: וְכָל עֵץ עָבֹת
  chosen: every leafy tree
  alternatives:
  - every thick tree
  - every luxuriant tree
  - every shady tree
  lexicon: HALOT
  rationale: עָבֹת denotes something dense/thick. In this cultic context, the sense
    is a luxuriant tree suitable for worship rites. 'Leafy tree' is natural modern
    English and evokes the visual setting.
- source_word: וַיִּזְבְּחוּ שָׁם אֶת־זִבְחֵיהֶם
  chosen: there they sacrificed their sacrifices
  alternatives:
  - there they offered their sacrifices
  - there they slaughtered their sacrifices
  lexicon: HALOT
  rationale: The Hebrew repeats cognate verb and noun. Preserving the repetition reflects
    the source text's emphasis, even if slightly formal in English.
- source_word: וַיִּתְּנוּ שָׁם כַּעַס קָרְבָּנָם
  chosen: there they presented the provocation of their offering
  alternatives:
  - there they gave the provocation of their offering
  - there they presented their offensive offering
  - there they provoked me with their offering
  lexicon: HALOT
  rationale: כַּעַס literally denotes provocation/anger. The phrase is compressed
    Hebrew indicating that their offering was provoking. The chosen rendering stays
    close to the wording and preserves the rhetorical force without adding an explicit
    object ('me') not present in the text.
- source_word: וַיָּשִׂימוּ שָׁם רֵיחַ נִיחוֹחֵיהֶם
  chosen: there they set their pleasing aromas
  alternatives:
  - there they placed their soothing aromas
  - there they made their pleasing aroma
  lexicon: HALOT
  rationale: רֵיחַ נִיחוֹחַ is a sacrificial formula often rendered 'pleasing aroma.'
    Here the plural suffix requires 'their pleasing aromas.' 'Set' follows the Hebrew
    verb שׂים.
- source_word: וַיַּסִּיכוּ שָׁם אֶת־נִסְכֵּיהֶם
  chosen: there they poured out their drink offerings
  alternatives:
  - there they poured their libations
  lexicon: HALOT
  rationale: נסך in this cultic context refers to pouring libations; 'drink offerings'
    is the clearest standard English equivalent.
