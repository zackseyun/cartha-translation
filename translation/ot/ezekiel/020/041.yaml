theological_decisions:
- issue: Rendering of God's self-sanctification in relation to Israel
  chosen_reading: I will show myself holy through you
  alternative_readings:
  - I will be sanctified in you
  - I will prove myself holy in you
  rationale: The Hebrew does not mean that Israel makes God intrinsically holier,
    but that his holiness is publicly displayed/vindicated in his dealings with them.
    The chosen rendering preserves this theological sense in accessible English while
    avoiding misunderstanding.
  doctrine_reference: Translation philosophy §§3, 6
