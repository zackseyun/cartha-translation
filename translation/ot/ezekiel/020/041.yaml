id: EZK.20.41
reference: Ezekiel 20:41
source:
  edition: WLC
  text: בְּ/רֵ֣יחַ נִיחֹחַ֮ אֶרְצֶ֣ה אֶתְ/כֶם֒ בְּ/הוֹצִיאִ֤/י אֶתְ/כֶם֙ מִן הָ֣/עַמִּ֔ים
    וְ/קִבַּצְתִּ֣י אֶתְ/כֶ֔ם מִן הָ֣/אֲרָצ֔וֹת אֲשֶׁ֥ר נְפֹצֹתֶ֖ם בָּ֑/ם וְ/נִקְדַּשְׁתִּ֥י
    בָ/כֶ֖ם לְ/עֵינֵ֥י הַ/גּוֹיִֽם־־׃
translation:
  text: I will accept you like a pleasing aroma when I bring you out from the peoples
    and gather you from the lands where you have been scattered, and I will show myself
    holy through you before the eyes of the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will be sanctified in you before the eyes of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'with/as a pleasing aroma,' drawing on sacrificial language of an
      acceptable offering.
    reason: cultural_note
lexical_decisions:
- source_word: בְּרֵיחַ נִיחֹחַ
  chosen: like a pleasing aroma
  alternatives:
  - as a soothing aroma
  - with a pleasing aroma
  lexicon: HALOT
  rationale: The phrase is sacrificial language literally 'with/as an aroma of soothing/pleasing.'
    In English, 'like a pleasing aroma' communicates the metaphor naturally while
    preserving the cultic resonance of acceptability. 'Soothing aroma' is more traditional
    but can suggest calming God emotionally rather than accepted worship.
- source_word: אֶרְצֶה אֶתְכֶם
  chosen: I will accept you
  alternatives:
  - I will take pleasure in you
  - I will be pleased with you
  lexicon: HALOT
  rationale: רצה in this stem commonly conveys acceptance or favorable regard, especially
    in sacrificial contexts. 'Accept you' fits the immediate 'pleasing aroma' imagery
    and avoids sounding merely emotional.
- source_word: בְּהוֹצִיאִי אֶתְכֶם מִן הָעַמִּים
  chosen: when I bring you out from the peoples
  alternatives:
  - when I bring you out from among the peoples
  lexicon: HALOT
  rationale: 'The prefixed ב on the infinitive is temporal here: ''when/as I bring
    out.'' ''The peoples'' is retained rather than ''nations'' here to distinguish
    from גּוֹיִם later, though both can overlap semantically.'
- source_word: וְקִבַּצְתִּי אֶתְכֶם
  chosen: and gather you
  alternatives:
  - and I will gather you together
  lexicon: HALOT
  rationale: Simple future 'and gather you' is idiomatic in English following the
    initial explicit subject. The ingathering theme is central and should remain clear.
- source_word: מִן הָאֲרָצוֹת
  chosen: from the lands
  alternatives:
  - from the countries
  lexicon: HALOT
  rationale: אֲרָצוֹת can mean lands/countries. 'Lands' is slightly broader and fits
    exile geography without implying modern nation-states.
- source_word: אֲשֶׁר נְפֹצֹתֶם בָּם
  chosen: where you have been scattered
  alternatives:
  - into which you were scattered
  - where you were dispersed
  lexicon: HALOT
  rationale: 'The Niphal form is passive/reflexive in sense: ''you were scattered.''
    ''Have been scattered'' gives natural English and reflects the present relevance
    of their dispersed condition.'
- source_word: וְנִקְדַּשְׁתִּי בָכֶם
  chosen: I will show myself holy through you
  alternatives:
  - I will be sanctified in you
  - I will prove myself holy through you
  lexicon: HALOT
  rationale: The Niphal of קדשׁ here expresses God's holiness being manifested or
    vindicated in relation to Israel. 'Show myself holy through you' is clear modern
    English and preserves the theological idea without opaque church jargon. 'In you'
    is preserved conceptually by 'through you' because the nations perceive God's
    holiness by his action in restored Israel.
- source_word: לְעֵינֵי הַגּוֹיִם
  chosen: before the eyes of the nations
  alternatives:
  - in the sight of the nations
  - before the nations
  lexicon: HALOT
  rationale: This phrase is a common idiom for public visibility. 'Before the eyes
    of the nations' is vivid and close to the Hebrew.
