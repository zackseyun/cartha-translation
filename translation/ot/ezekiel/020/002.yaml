id: EZK.20.2
reference: Ezekiel 20:2
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential introduction. In English, the idiom is best carried by beginning with 'And' and letting the main event be expressed by 'came,' rather than the wooden 'and it happened,' which is less natural and adds no distinct meaning in this formulaic prophetic introduction.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'the word' is the established and semantically precise rendering, referring to a specific divine communication. 'Message' is possible but less formally tied to the recurring formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means 'to me.' 'Unto me' is unnecessarily archaic for the project's modern-English aim.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - and said
  lexicon: HALOT
  rationale: The infinitive construct introduces the content of the divine speech in standard Hebrew narrative style. 'Saying' preserves the formal structure and signals that the following verse contains the spoken content.
