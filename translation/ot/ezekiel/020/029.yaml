theological_decisions:
- issue: Rendering of a cultic term associated with illicit worship
  chosen_reading: high place
  alternative_readings:
  - cultic height
  rationale: The verse critiques Israel's idolatrous worship sites. 'High place' is
    the established and accurate English rendering for בָּמָה in this context, preserving
    the cultic significance without importing extra interpretation.
