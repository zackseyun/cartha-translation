id: EZK.20.29
reference: Ezekiel 20:29
source:
  edition: WLC
  text: וָ/אֹמַ֣ר אֲלֵ/הֶ֔ם מָ֣ה הַ/בָּמָ֔ה אֲשֶׁר אַתֶּ֥ם הַ/בָּאִ֖ים שָׁ֑ם וַ/יִּקָּרֵ֤א
    שְׁמָ/הּ֙ בָּמָ֔ה עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: Then I said to them, ‘What is this high place where you are going?’ So its
    name is called Bamah to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew plays on the word bamah: first ''high place,'' then as the place-name
      ''Bamah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What is this
  alternatives:
  - What
  - Why
  lexicon: HALOT
  rationale: Interrogative introducing a pointed question. In context it functions
    idiomatically as a challenge to the place they frequent; adding 'this' in English
    makes the deictic force natural without overtranslating.
- source_word: הַבָּמָה / בָּמָה
  chosen: high place / Bamah
  alternatives:
  - cultic height
  - high hill
  lexicon: HALOT
  rationale: The first occurrence is the common noun for a cultic high place, so it
    is translated 'high place.' The second is presented as the resulting place-name
    by wordplay, so it is transliterated 'Bamah' to preserve the Hebrew pun between
    the common noun and the proper name.
- source_word: אֲשֶׁר אַתֶּם הַבָּאִים שָׁם
  chosen: where you are going
  alternatives:
  - to which you are going
  - that you are entering there
  lexicon: HALOT
  rationale: The participial construction describes their ongoing/customary approach
    to that site. 'Where you are going' is idiomatic modern English and preserves
    the sense of movement toward the place.
- source_word: וַיִּקָּרֵא שְׁמָהּ
  chosen: So its name is called
  alternatives:
  - and its name was called
  - and it was named
  lexicon: HALOT
  rationale: Passive/niphal naming formula. 'So its name is called' preserves the
    Hebrew form and the explanatory/resultative sense linking the question to the
    place-name.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard Hebrew idiom indicating continuation up to the speaker's present
    perspective; 'to this day' is the natural English equivalent.
