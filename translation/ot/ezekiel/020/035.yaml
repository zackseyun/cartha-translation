theological_decisions:
- issue: Judicial nuance of divine action
  chosen_reading: I will enter into judgment with you
  alternative_readings:
  - I will judge you
  rationale: The Hebrew construction suggests a direct judicial encounter rather than
    only a unilateral verdict. This preserves the solemn covenant-lawsuit tone without
    overstating a technical legal procedure.
  doctrine_reference: Translation philosophy §3, §5
