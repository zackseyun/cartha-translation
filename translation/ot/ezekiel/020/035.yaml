id: EZK.20.35
reference: Ezekiel 20:35
source:
  edition: WLC
  text: וְ/הֵבֵאתִ֣י אֶתְ/כֶ֔ם אֶל מִדְבַּ֖ר הָֽ/עַמִּ֑ים וְ/נִשְׁפַּטְתִּ֤י אִתְּ/כֶם֙
    שָׁ֔ם פָּנִ֖ים אֶל פָּנִֽים־־׃
translation:
  text: I will bring you into the wilderness of the peoples, and there I will enter
    into judgment with you face to face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will judge you there face to face.' The Hebrew verb can be rendered
      more simply as 'judge,' but the phrasing also carries the sense of entering
      into judicial proceedings with someone.
    reason: lexical_alternative
  - marker: b
    text: '''The wilderness of the peoples'' may refer to a wilderness-like place
      among the nations where Israel had been scattered.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהֵבֵאתִי
  chosen: I will bring
  alternatives:
  - I will bring in
  - I will lead
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' 'I will bring'
    is the most direct and natural future rendering here.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct object suffix, second person masculine plural; standard English
    object pronoun 'you' fits.
- source_word: אֶל
  chosen: into
  alternatives:
  - to
  lexicon: HALOT
  rationale: With a destination noun, אֶל can be rendered 'to' or 'into.' 'Into' better
    conveys movement into the region named by 'wilderness.'
- source_word: מִדְבַּר
  chosen: wilderness
  alternatives:
  - desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes uncultivated wilderness rather than specifically
    sandy desert. 'Wilderness' also preserves the Exodus resonance in Ezekiel's context.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים is the plural of 'people/peoples.' 'The peoples' is more formally
    precise here, though 'nations' is a viable contextual alternative. The phrase
    likely refers to the lands or populations among whom Israel has been scattered.
- source_word: וְנִשְׁפַּטְתִּי אִתְּכֶם
  chosen: I will enter into judgment with you
  alternatives:
  - I will judge you
  - I will contend with you in judgment
  lexicon: HALOT
  rationale: Niphal of שׁפט with עִם/אֵת can express entering into judicial proceedings
    with someone, not merely pronouncing a verdict. 'Enter into judgment with you'
    preserves the reciprocal/legal nuance better than the simpler 'judge you.'
- source_word: שָׁם
  chosen: there
  rationale: Locative adverb referring to the wilderness just mentioned.
- source_word: פָּנִים אֶל פָּנִים
  chosen: face to face
  alternatives:
  - personally
  - directly
  lexicon: HALOT
  rationale: This idiom literally means 'face to face' and should be preserved in
    the main text. It conveys direct, personal encounter rather than mere proximity.
