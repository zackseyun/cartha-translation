id: EZK.20.12
reference: Ezekiel 20:12
source:
  edition: WLC
  text: וְ/גַ֤ם אֶת שַׁבְּתוֹתַ/י֙ נָתַ֣תִּי לָ/הֶ֔ם לִ/הְי֣וֹת לְ/א֔וֹת בֵּינִ֖/י וּ/בֵֽינֵי/הֶ֑ם לָ/דַ֕עַת כִּ֛י אֲנִ֥י יְהוָ֖ה מְקַדְּשָֽׁ/ם־׃
translation:
  text: I also gave them my Sabbaths to be a sign between me and them, so that they might know that I am Yahweh who sanctifies them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who makes them holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: I also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: The conjunction plus adverb adds another item in a sequence. 'I also' reads naturally in English while preserving the additive force.
- source_word: שַׁבְּתוֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: The plural construct with 1cs suffix is best represented directly as 'my Sabbaths.' This preserves the Hebrew plural, which can refer to the Sabbath institution and its observances collectively.
- source_word: נָתַתִּי לָהֶם
  chosen: gave them
  alternatives:
  - gave to them
  - granted them
  lexicon: HALOT
  rationale: A straightforward rendering of נתן with indirect object suffix. 'Gave them' is idiomatic and sufficiently formal.
- source_word: לִהְיוֹת לְאוֹת
  chosen: to be a sign
  alternatives:
  - as a sign
  lexicon: HALOT
  rationale: The infinitive plus prepositional phrase expresses purpose/result. 'To be a sign' preserves the verbal structure and the covenant-marker sense of אוֹת.
- source_word: בֵּינִי וּבֵינֵיהֶם
  chosen: between me and them
  alternatives:
  - between myself and them
  lexicon: HALOT
  rationale: This is the standard relational expression marking covenant relationship. 'Between me and them' is clear and natural.
- source_word: לָדַעַת
  chosen: so that they might know
  alternatives:
  - for them to know
  - that they may know
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל expresses purpose. 'So that they might know' communicates intended result in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְקַדְּשָׁם
  chosen: who sanctifies them
  alternatives:
  - who makes them holy
  - who consecrates them
  lexicon: HALOT
  rationale: The participle of קדשׁ with 3mp suffix denotes ongoing divine action. 'Who sanctifies them' preserves the theological and covenantal force of the verb while remaining standard English. 'Makes them holy' is a valid dynamic alternative but less consistent with key-term usage.
