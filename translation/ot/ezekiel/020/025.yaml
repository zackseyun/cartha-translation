theological_decisions:
- issue: Whether God's 'giving' of bad statutes should be softened to mere permission
  chosen_reading: Retain the direct wording 'I myself gave them statutes that were
    not good' in the main text.
  alternative_readings:
  - I allowed them to have statutes that were not good
  - I gave them over to statutes that were not good
  rationale: The Hebrew text explicitly uses נתן ('gave') with God as subject. To
    replace this with 'allowed' or 'gave them over' in the main text would import
    an interpretive resolution not stated lexically. At the same time, because the
    statement raises theological tension with God's good law, an explanatory alternative
    is preserved in a footnote rather than resolved in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Relation of this verse to the goodness of God's law elsewhere in Scripture
  chosen_reading: Translate 'not good' straightforwardly without doctrinal qualification
    in the main text.
  alternative_readings:
  - understood as judicially given over to harmful practices
  - understood as referring to foreign/idolatrous statutes rather than God's covenant
    law
  rationale: The verse itself states the tension starkly. Historic orthodoxy does
    not require flattening the wording here; instead, the translation should preserve
    the text's force and allow interpretation to be discussed in notes. This avoids
    importing a harmonization into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
