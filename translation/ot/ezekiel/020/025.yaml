id: EZK.20.25
reference: Ezekiel 20:25
source:
  edition: WLC
  text: וְ/גַם אֲנִי֙ נָתַ֣תִּי לָ/הֶ֔ם חֻקִּ֖ים לֹ֣א טוֹבִ֑ים וּ/מִ֨שְׁפָּטִ֔ים לֹ֥א
    יִֽחְי֖וּ בָּ/הֶֽם־׃
translation:
  text: Moreover, I myself gave them statutes that were not good and ordinances by
    which they would not live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, interpretively, 'I gave them over to statutes that were not good,' preserving
      the sense that this was a judicial act rather than God issuing morally defective
      laws.
    reason: alternative_reading
  - marker: b
    text: The phrase 'live by them' echoes the covenantal idiom that obedience to
      God's statutes leads to life (compare Lev 18:5). Here the expression is deliberately
      reversed.
    reason: cross_reference
lexical_decisions:
- source_word: וְגַם
  chosen: Moreover
  alternatives:
  - And also
  - Even
  lexicon: HALOT
  rationale: Conveys additive and emphatic force linking this statement to the preceding
    argument. 'Moreover' fits the discourse flow in English better than a wooden 'and
    also.'
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - even I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal person marking
    in נָתַתִּי. 'I myself' preserves that emphasis naturally.
- source_word: נָתַתִּי
  chosen: gave
  alternatives:
  - handed over
  - appointed
  lexicon: HALOT
  rationale: The basic sense of נתן is 'give.' While some interpreters understand
    a permissive or judicial nuance in context, the lexical value remains 'gave';
    theological nuance is documented separately.
- source_word: חֻקִּים
  chosen: statutes
  alternatives:
  - decrees
  - prescriptions
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and suitably formal rendering for חֻקִּים
    in legal/covenantal contexts, and pairs well with מִשְׁפָּטִים.'
- source_word: לֹא טוֹבִים
  chosen: that were not good
  alternatives:
  - not good
  - bad
  lexicon: HALOT
  rationale: A relative clause reads naturally in English while preserving the predicative
    force. 'Bad' is possible but stronger and less textually precise than the Hebrew
    negation.
- source_word: וּמִשְׁפָּטִים
  chosen: ordinances
  alternatives:
  - judgments
  - rules
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal contexts often denotes judicial ordinances or rulings.
    'Ordinances' keeps the legal register and distinguishes it from חֻקִּים without
    becoming obscure.
- source_word: לֹא יִחְיוּ בָּהֶם
  chosen: by which they would not live
  alternatives:
  - in which they would not live
  - through which they would not have life
  - by them they could not live
  lexicon: HALOT
  rationale: This echoes the covenantal idiom of living by/through God's statutes,
    here negated. 'By which they would not live' preserves the instrumental sense
    of ב and the imperfect's modal/resultative force in context.
