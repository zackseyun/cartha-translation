id: EZK.20.23
reference: Ezekiel 20:23
source:
  edition: WLC
  text: גַּם אֲנִ֗י נָשָׂ֧אתִי אֶת יָדִ֛/י לָ/הֶ֖ם בַּ/מִּדְבָּ֑ר לְ/הָפִ֤יץ אֹתָ/ם֙
    בַּ/גּוֹיִ֔ם וּ/לְ/זָר֥וֹת אוֹתָ֖/ם בָּ/אֲרָצֽוֹת־־׃
translation:
  text: Moreover, I also raised my hand to them in the wilderness, to scatter them
    among the nations and disperse them through the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I swore to them in the wilderness.' The Hebrew literally says, 'I raised
      my hand to them,' an idiom for taking an oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Moreover
  alternatives:
  - Also
  - Indeed
  lexicon: HALOT
  rationale: Introduces an additional solemn statement in the sequence; 'Moreover'
    captures the additive and weighty discourse function better than a bare 'also'
    in English.
- source_word: נָשָׂאתִי אֶת יָדִי
  chosen: I also raised my hand
  alternatives:
  - I lifted up my hand
  - I swore
  lexicon: HALOT
  rationale: The idiom literally means 'raise/lift the hand' and in covenantal contexts
    signifies taking an oath. The main text preserves the concrete Hebrew image, while
    the oath sense is important and preserved as an alternative.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - concerning them
  lexicon: HALOT
  rationale: 'With the oath idiom, the preposition most naturally indicates the addressees/objects
    of the sworn declaration: ''to them.'''
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard biblical rendering and fits Israel''s
    setting in Ezekiel''s historical rehearsal.'
- source_word: לְהָפִיץ
  chosen: to scatter
  alternatives:
  - to disperse
  - to drive apart
  lexicon: HALOT
  rationale: A common rendering for the Hiphil of this verb in judgment contexts;
    it pairs well with the following verb without collapsing the distinction between
    the two.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: In this exilic judgment context, 'nations' is the most natural and least
    misleading English equivalent; 'Gentiles' would import later Jewish/Christian
    usage.
- source_word: וּלְזָרוֹת
  chosen: and disperse
  alternatives:
  - and winnow
  - and scatter
  lexicon: HALOT
  rationale: The verb overlaps semantically with the previous one but is not identical;
    'disperse' preserves the parallelism while avoiding an awkward repetition of 'scatter
    ... scatter.'
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - through the countries
  - in the lands
  lexicon: HALOT
  rationale: Plural 'lands' reflects the Hebrew plural and conveys distribution across
    various territories. 'Through' fits the sense of being spread abroad over multiple
    lands.
