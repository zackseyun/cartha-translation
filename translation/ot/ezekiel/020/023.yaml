theological_decisions:
- issue: Whether to translate the oath idiom explicitly as 'I swore' or preserve the
    Hebrew image 'I raised my hand'
  chosen_reading: Preserve the idiom in the main text as 'I raised my hand'
  alternative_readings:
  - I swore to them
  rationale: The Hebrew idiom is transparent enough in English and retains the solemn
    covenantal/judicial imagery. Because the idiom can be understood as oath-taking,
    the alternative is preserved in a footnote rather than replacing the image with
    an interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 5
