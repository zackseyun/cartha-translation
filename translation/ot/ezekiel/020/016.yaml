theological_decisions:
- issue: Rendering covenant-law terminology distinctly
  chosen_reading: Different English terms are maintained for מִשְׁפָּטַי ('my judgments')
    and חֻקּוֹתַי ('my statutes').
  alternative_readings:
  - Use the same broad term such as 'laws' for both
  rationale: The Hebrew uses two distinct legal terms, and preserving that distinction
    avoids flattening the texture of covenant language.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Retention of anthropological metaphor in לִבָּם הֹלֵךְ
  chosen_reading: their heart kept going after their idols
  alternative_readings:
  - they were devoted to their idols
  - their hearts followed their idols
  rationale: The Hebrew locates idolatry in the 'heart,' preserving the moral-spiritual
    center of the person rather than reducing it to mere external behavior. The participial
    construction suggests ongoing inclination.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
