id: EZK.20.16
reference: Ezekiel 20:16
source:
  edition: WLC
  text: יַ֜עַן בְּ/מִשְׁפָּטַ֣/י מָאָ֗סוּ וְ/אֶת חֻקּוֹתַ/י֙ לֹא הָלְכ֣וּ בָ/הֶ֔ם
    וְ/אֶת שַׁבְּתוֹתַ֖/י חִלֵּ֑לוּ כִּ֛י אַחֲרֵ֥י גִלּוּלֵי/הֶ֖ם לִבָּ֥/ם הֹלֵֽךְ־־־׃
translation:
  text: because they rejected my judgments, and did not walk in my statutes, and profaned
    my Sabbaths; for their heart kept going after their idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִלּוּלִים is a contemptuous term for idols, possibly carrying the
      sense of 'filthy' or 'dungy' idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for the judgment described in context. 'Because'
    is the most natural modern English causal connector.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my ordinances
  - my rules
  lexicon: HALOT
  rationale: מִשְׁפָּט often denotes legal decisions/judgments. 'Judgments' preserves
    the juridical sense better than the broader 'rules,' while remaining readable.
- source_word: מָאָסוּ
  chosen: rejected
  alternatives:
  - despised
  - spurned
  lexicon: HALOT
  rationale: Conveys active refusal of God's judgments. 'Rejected' is clear modern
    English; 'despised' is possible but adds an emotive nuance not required here.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my ordinances
  lexicon: HALOT
  rationale: A standard rendering for חֻקִּים that maintains distinction from מִשְׁפָּטִים
    in the same clause.
- source_word: לֹא הָלְכוּ בָהֶם
  chosen: did not walk in
  alternatives:
  - did not follow
  - did not live by
  lexicon: HALOT
  rationale: Retains the Hebrew idiom of conduct ('walk in') while remaining understandable
    in English. This also preserves the metaphor of covenantal obedience.
- source_word: שַׁבְּתוֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: Plural form is explicit in Hebrew and should be preserved. 'Sabbaths'
    is the conventional and accurate rendering.
- source_word: חִלֵּלוּ
  chosen: profaned
  alternatives:
  - defiled
  - desecrated
  lexicon: HALOT
  rationale: In covenantal/holy-context language, 'profaned' best captures treating
    what is holy as common.
- source_word: אַחֲרֵי גִלּוּלֵיהֶם
  chosen: after their idols
  alternatives:
  - following their idols
  lexicon: HALOT
  rationale: אַחֲרֵי with הלך forms the idiom 'go after/follow.' 'After their idols'
    preserves the Hebrew imagery and echoes common biblical diction.
- source_word: גִלּוּלֵיהֶם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their filthy idols
  lexicon: HALOT
  rationale: The term is a strongly pejorative word for idols in Ezekiel. Main text
    uses the standard readable 'idols'; the sharper derogatory nuance is worth preserving
    in a footnote rather than overloading the main text.
- source_word: לִבָּם הֹלֵךְ
  chosen: their heart kept going
  alternatives:
  - their heart went
  - their heart was going
  - their heart followed
  lexicon: HALOT
  rationale: The singular 'heart' with participle expresses ongoing disposition/action.
    'Kept going' captures the durative force better than a simple past, while preserving
    the metaphor of inward allegiance.
