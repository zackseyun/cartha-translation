id: EZK.20.20
reference: Ezekiel 20:20
source:
  edition: WLC
  text: וְ/אֶת שַׁבְּתוֹתַ֖/י קַדֵּ֑שׁוּ וְ/הָי֤וּ לְ/אוֹת֙ בֵּינִ֣/י וּ/בֵֽינֵי/כֶ֔ם
    לָ/דַ֕עַת כִּ֛י אֲנִ֥י יְהוָ֖ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: Keep my Sabbaths holy, and let them be a sign between me and you, so that
    you may know that I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (often rendered ''Yahweh''); the main text follows the
      project''s standard rendering, ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: שַׁבְּתוֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: Plural construct with 1cs suffix; rendered literally as 'my Sabbaths'
    to preserve the recurring covenantal institution rather than reducing it to a
    singular abstraction.
- source_word: קַדֵּשׁוּ
  chosen: Keep ... holy
  alternatives:
  - sanctify
  - treat as holy
  - consecrate
  lexicon: HALOT
  rationale: The verb קדשׁ in the piel here calls for treating the Sabbaths as holy.
    'Keep ... holy' is idiomatic modern English that preserves the covenantal force
    without archaic stiffness.
- source_word: וְהָיוּ
  chosen: let them be
  alternatives:
  - and they shall be
  - and they will be
  lexicon: HALOT
  rationale: The waw + היה here functions as a result/jussive-like continuation after
    the imperative. 'Let them be' fits the exhortational flow better than a flat future
    in English.
- source_word: לְאוֹת
  chosen: a sign
  alternatives:
  - as a sign
  - for a sign
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or marker. 'A sign' is the most natural
    English rendering in this covenant context.
- source_word: בֵּינִי וּבֵינֵיכֶם
  chosen: between me and you
  alternatives:
  - between me and among you
  lexicon: HALOT
  rationale: Standard relational expression marking covenant relationship; straightforwardly
    rendered 'between me and you.'
- source_word: לָדַעַת
  chosen: so that you may know
  alternatives:
  - to know
  - for knowing
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose here. 'So that you may know'
    makes the purpose relation explicit in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'Though morphologically plural in form, אֱלֹהִים with singular reference
    to Israel''s deity is regularly rendered singular. The suffix makes the covenantal
    relation explicit: ''your God''.'
