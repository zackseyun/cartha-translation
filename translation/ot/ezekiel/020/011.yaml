id: EZK.20.11
reference: Ezekiel 20:11
source:
  edition: WLC
  text: וָ/אֶתֵּ֤ן לָ/הֶם֙ אֶת חֻקּוֹתַ֔/י וְ/אֶת מִשְׁפָּטַ֖/י הוֹדַ֣עְתִּי אוֹתָ֑/ם
    אֲשֶׁ֨ר יַעֲשֶׂ֥ה אוֹתָ֛/ם הָ/אָדָ֖ם וָ/חַ֥י בָּ/הֶֽם־־׃
translation:
  text: I gave them my statutes, and I made my judgments known to them—those which,
    if a man does them, he will live by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a person' or 'humankind'; Hebrew 'the man' uses a singular representative
      form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  chosen: I gave
  alternatives:
  - I set before
  - I granted
  lexicon: HALOT
  rationale: נתן in this context straightforwardly denotes giving/providing. 'I gave'
    is the plain sense and fits the covenant-law context.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my prescribed statutes
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to enacted prescriptions or statutes. 'Statutes'
    preserves the legal-covenantal register and pairs naturally with מִשְׁפָּטִים.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal contexts can be rendered 'judgments,' 'ordinances,'
    or 'rules.' 'Judgments' preserves the forensic/legal nuance and maintains distinction
    from חֻקּוֹת.
- source_word: הוֹדַעְתִּי אוֹתָם
  chosen: I made ... known to them
  alternatives:
  - I taught them
  - I revealed them to them
  lexicon: HALOT
  rationale: The Hiphil of ידע means to cause to know, hence 'make known.' This is
    more precise than the interpretive 'taught.'
- source_word: אֲשֶׁר יַעֲשֶׂה אֹתָם
  chosen: those which, if ... does them
  alternatives:
  - which whoever does
  - which one who practices
  lexicon: HALOT
  rationale: The relative clause modifies the statutes/judgments. Rendering with 'those
    which, if ... does them' preserves the Hebrew linkage and conditional force without
    over-paraphrase.
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - the man
  - a person
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man / humankind' according to context.
    Here it is grammatically singular with representative force. 'A man' preserves
    the gender-accurate singular form and the proverbial/legal sense; an inclusive
    alternative is worth preserving in a footnote.
- source_word: וָחַי בָּהֶם
  chosen: he will live by them
  alternatives:
  - he shall live in them
  - he will have life by them
  lexicon: HALOT
  rationale: The idiom is the well-known covenantal expression of life in relation
    to obedience. 'Live by them' is idiomatic English and preserves the preposition's
    instrumental/associative force better than a wooden 'live in them' in this context.
