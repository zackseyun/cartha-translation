theological_decisions:
- issue: Sense of covenantal life in the obedience formula
  chosen_reading: Temporal/covenantal life language preserved as 'he will live by
    them' without importing a narrower doctrinal explanation.
  alternative_readings:
  - eternal life through law-keeping
  - national flourishing under covenant obedience
  rationale: The verse states the life-obedience formula without specifying the full
    theological scope. The translation preserves the wording and tension rather than
    resolving whether the emphasis is individual, corporate, temporal, or eschatological.
  doctrine_reference: Preserve theological tension rather than resolve it.
