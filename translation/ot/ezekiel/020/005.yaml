theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern. In the compound
    title אֲדֹנָי יְהוִה, this yields the conventional English form 'the Lord GOD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to translate וָאֶשָּׂא יָדִי interpretively as oath language
  chosen_reading: Preserve the idiom in the main text as 'I lifted up my hand' and
    note the oath sense in a footnote
  alternative_readings:
  - I swore to
  - I pledged to
  rationale: The phrase is an oath idiom, but the translation philosophy prefers preserving
    source-language imagery where possible while documenting interpretive force. This
    keeps the text auditable and avoids paraphrase beyond what the Hebrew explicitly
    says.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
