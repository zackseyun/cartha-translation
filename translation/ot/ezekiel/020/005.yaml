id: EZK.20.5
reference: Ezekiel 20:5
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֗ם כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ בְּ/יוֹם֙ בָּחֳרִ֣/י
    בְ/יִשְׂרָאֵ֔ל וָ/אֶשָּׂ֣א יָדִ֗/י לְ/זֶ֨רַע֙ בֵּ֣ית יַֽעֲקֹ֔ב וָ/אִוָּדַ֥ע לָ/הֶ֖ם
    בְּ/אֶ֣רֶץ מִצְרָ֑יִם וָ/אֶשָּׂ֨א יָדִ֤/י לָ/הֶם֙ לֵ/אמֹ֔ר אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: 'And say to them, ‘Thus says the Lord GOD: On the day when I chose Israel,
    I lifted up my hand to the offspring of the house of Jacob and made myself known
    to them in the land of Egypt; I lifted up my hand to them, saying, “I am the LORD
    your God.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'lifted up my hand,' an idiom often used for swearing an oath or
      making a solemn pledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the Tetragrammaton. Following
    the doctrine default, יְהוָה is rendered 'the LORD.' Because English convention
    often avoids 'Lord LORD' for this compound, 'the Lord GOD' is used to preserve
    both elements distinctly and naturally.
- source_word: בְּיוֹם בָּחֳרִי בְיִשְׂרָאֵל
  chosen: On the day when I chose Israel
  alternatives:
  - In the day I chose Israel
  - When I chose Israel
  lexicon: HALOT
  rationale: בְּיוֹם is a temporal expression, best rendered idiomatically as 'On
    the day when.' בחר retains its covenant-election sense as 'chose' without importing
    later theological systems.
- source_word: וָאֶשָּׂא יָדִי
  chosen: I lifted up my hand
  alternatives:
  - I raised my hand
  - I swore
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'lift up the hand' and commonly signifies
    oath-taking. The main text preserves the concrete idiom for transparency; the
    oath sense is important and preserved in a footnote rather than replacing the
    image with an interpretation.
- source_word: לְזֶרַע בֵּית יַעֲקֹב
  chosen: to the offspring of the house of Jacob
  alternatives:
  - to the seed of the house of Jacob
  - to the descendants of the house of Jacob
  lexicon: HALOT
  rationale: זֶרַע is rendered 'offspring' as a natural modern equivalent that still
    preserves descent language. 'Seed' is more formal but less idiomatic here; 'descendants'
    is possible but slightly more interpretive.
- source_word: וָאִוָּדַע לָהֶם
  chosen: and made myself known to them
  alternatives:
  - and revealed myself to them
  - and was made known to them
  lexicon: HALOT
  rationale: The Niphal of ידע here conveys self-disclosure. 'Made myself known' captures
    the reflexive/passive nuance in clear English and fits the covenantal context.
- source_word: בְּאֶרֶץ מִצְרָיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained because אֶרֶץ is explicit in the Hebrew
    and contributes to the narrative setting.
- source_word: לֵאמֹר אֲנִי יְהוָה אֱלֹהֵיכֶם
  chosen: saying, “I am the LORD your God.”
  alternatives:
  - saying, 'I am Yahweh your God'
  lexicon: HALOT
  rationale: This covenant formula is rendered straightforwardly. Per doctrine, יְהוָה
    is translated 'the LORD,' not transliterated.
