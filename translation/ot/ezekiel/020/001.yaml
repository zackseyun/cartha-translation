id: EZK.20.1
reference: Ezekiel 20:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/שָּׁנָ֣ה הַ/שְּׁבִיעִ֗ית בַּֽ/חֲמִשִׁי֙ בֶּ/עָשׂ֣וֹר לַ/חֹ֔דֶשׁ בָּ֧אוּ אֲנָשִׁ֛ים מִ/זִּקְנֵ֥י יִשְׂרָאֵ֖ל לִ/דְרֹ֣שׁ אֶת יְהוָ֑ה וַ/יֵּשְׁב֖וּ לְ/פָנָֽ/י׀־׃ס
translation:
  text: And it happened in the seventh year, in the fifth month, on the tenth day of the month, that some of the elders of Israel came to inquire of Yahweh, and they sat before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some of the elders of Israel came.' The Hebrew reads more literally, 'men from the elders of Israel,' which may indicate representatives drawn from the elders.
    reason: lexical_alternative
  - marker: b
    text: '''To inquire of the LORD'' can also be rendered ''to seek the LORD'' or ''to consult the LORD''; here the sense is a formal seeking of divine guidance or response.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Introduces a new dated narrative episode with the common Hebrew wayyiqtol of היה. 'And it happened' preserves the narrative force without archaic diction.
- source_word: בַּשָּׁנָה הַשְּׁבִיעִית
  chosen: in the seventh year
  alternatives:
  - in the seventh year of exile
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'in the seventh year' without restating the era reference. The likely implied frame is Jehoiachin's exile, but that is not stated in this verse, so it is not supplied in the main text.
- source_word: בַּחֲמִשִׁי בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: in the fifth month, on the tenth day of the month
  alternatives:
  - on the tenth day of the fifth month
  lexicon: HALOT
  rationale: This preserves the Hebrew date formula closely while remaining natural English. Repeating 'of the month' reflects the Hebrew structure and avoids over-compressing the formal dating style.
- source_word: בָּאוּ אֲנָשִׁים מִזִּקְנֵי יִשְׂרָאֵל
  chosen: men from the elders of Israel came
  alternatives:
  - some of the elders of Israel came
  - men of the elders of Israel came
  lexicon: HALOT
  rationale: The phrase literally has 'men from the elders of Israel.' This most naturally means representatives drawn from the elders rather than necessarily the whole body. 'Men from the elders of Israel' preserves that nuance better than the smoother but slightly more interpretive 'some of the elders of Israel.'
- source_word: לִדְרֹשׁ אֶת יְהוָה
  chosen: to inquire of the LORD
  alternatives:
  - to seek the LORD
  - to consult the LORD
  lexicon: HALOT
  rationale: דרש with God in this setting commonly means seeking an oracle or divine answer. 'Inquire of' best fits the elders' formal approach to the prophet. 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּשְׁבוּ לְפָנַי
  chosen: and they sat before me
  alternatives:
  - and they sat in front of me
  - and they took their seat before me
  lexicon: HALOT
  rationale: A straightforward rendering of the physical posture before Ezekiel. 'Before me' also carries the formal sense of appearing in the prophet's presence.
