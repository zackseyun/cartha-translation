theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to specify the chronological reference as the exile of Jehoiachin
  chosen_reading: Leave the dating as 'the seventh year' without added specification
  alternative_readings:
  - the seventh year of exile
  - the seventh year of King Jehoiachin's exile
  rationale: Although the broader book's chronology likely assumes the exile framework, this verse itself does not explicitly state it. Optimal equivalence avoids importing unstated historical detail into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
