id: EZK.20.38
reference: Ezekiel 20:38
source:
  edition: WLC
  text: וּ/בָרוֹתִ֣י מִ/כֶּ֗ם הַ/מֹּרְדִ֤ים וְ/הַ/פּֽוֹשְׁעִים֙ בִּ֔/י מֵ/אֶ֤רֶץ מְגֽוּרֵי/הֶם֙ אוֹצִ֣יא אוֹתָ֔/ם וְ/אֶל אַדְמַ֥ת יִשְׂרָאֵ֖ל לֹ֣א יָב֑וֹא וִֽ/ידַעְתֶּ֖ם כִּי אֲנִ֥י יְהוָֽה־־׃
translation:
  text: I will purge from among you the rebels and those who transgress against me. I will bring them out of the land where they sojourn, but they will not enter the land of Israel. Then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will sift out from among you.' The Hebrew verb conveys separating out those unfit to remain within the community.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from the land of their sojournings.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew has a singular verb, 'he will not enter,' used with a collective/distributive sense for the group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרוֹתִי
  chosen: I will purge
  alternatives:
  - I will purge out
  - I will sift out
  lexicon: HALOT
  rationale: From ברר in the Piel/Qal-related form here with future sense, conveying removal by separating out. 'Purge' captures the judicial-cleansing nuance better than a bare 'separate,' while remaining natural English.
- source_word: מִכֶּם
  chosen: from among you
  alternatives:
  - from you
  lexicon: HALOT
  rationale: The preposition מן with the pronoun indicates separation out from the group, not merely movement away from them. 'From among you' makes the collective sense explicit.
- source_word: הַמֹּרְדִים
  chosen: the rebels
  alternatives:
  - those who rebel
  lexicon: HALOT
  rationale: Participle used substantivally. 'The rebels' is concise and preserves the ongoing character of rebellion.
- source_word: וְהַפֹּשְׁעִים בִּי
  chosen: those who transgress against me
  alternatives:
  - those who revolt against me
  - the transgressors against me
  lexicon: HALOT
  rationale: פשע often denotes rebellion/transgression, especially covenantal offense. Because מרד already covers rebellion, 'transgress' avoids flattening the distinction while retaining serious covenantal violation. 'Against me' preserves the personal object בי.
- source_word: מֵאֶרֶץ מְגוּרֵיהֶם
  chosen: out of the land where they sojourn
  alternatives:
  - out of the land of their sojourning
  - out of the land where they reside as foreigners
  lexicon: HALOT
  rationale: מָגוּר refers to sojourning/resident-alien dwelling. 'Where they sojourn' is idiomatic modern English and preserves the exile/temporary-residence nuance better than simply 'live.'
- source_word: אוֹצִיא אוֹתָם
  chosen: I will bring them out
  alternatives:
  - I will lead them out
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means cause to go out/bring out. 'Bring them out' is the standard and natural rendering.
- source_word: וְאֶל אַדְמַת יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - the soil of Israel
  lexicon: HALOT
  rationale: אַדְמָה is literally ground/soil, but in this context functions as a territorial designation. 'The land of Israel' is idiomatic and contextually appropriate.
- source_word: לֹא יָבוֹא
  chosen: they will not enter
  alternatives:
  - he will not enter
  lexicon: HALOT
  rationale: The consonantal form is 3ms singular, but with the preceding plural object and collective sense, English naturally renders the implied plural referent as 'they will not enter.' This reflects the distributive sense of the singular verb with a plural group.
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction links result/consequence after the judgment statement. 'Then' brings out the discourse force in clear English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
