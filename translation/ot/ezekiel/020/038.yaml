- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the judgment language in וּבָרוֹתִי
  chosen_reading: purge from among you
  alternative_readings:
  - separate from among you
  - sift out from among you
  rationale: The verse depicts covenantal judgment by removing rebels from the restored community. 'Purge' preserves the severity of divine judgment without adding doctrinal content beyond the text.
