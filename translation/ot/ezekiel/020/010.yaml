id: EZK.20.10
reference: Ezekiel 20:10
source:
  edition: WLC
  text: וָ/אֽוֹצִיאֵ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם וָ/אֲבִאֵ֖/ם אֶל הַ/מִּדְבָּֽר־׃
translation:
  text: So I brought them out from the land of Egypt and brought them into the wilderness.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וָאֹוצִיאֵם
  chosen: So I brought them out
  alternatives:
  - And I brought them out
  - So I led them out
  lexicon: HALOT
  rationale: From יצא in the Hiphil with 1cs subject and 3mp object, meaning to cause
    to go out, bring out, or lead out. 'Brought them out' is natural English and preserves
    the causative sense. The prefixed waw on this narrative verb is rendered 'So'
    to reflect sequential movement in context without wooden repetition.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: The phrase explicitly includes אֶרֶץ, so 'from the land of Egypt' preserves
    the full expression rather than shortening it to 'from Egypt.' This also echoes
    common exodus phrasing in Scripture.
- source_word: וָאֲבִאֵם
  chosen: and brought them
  alternatives:
  - and led them
  - and caused them to come
  lexicon: HALOT
  rationale: From בוא in the Hiphil, 'bring' is the most idiomatic equivalent in this
    context. Repeating 'brought' in English mirrors the Hebrew parallelism between
    bringing out and bringing in.
- source_word: אֶל הַמִּדְבָּר
  chosen: into the wilderness
  alternatives:
  - to the wilderness
  - into the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness or steppe. 'Wilderness' is the standard
    biblical rendering and best preserves the exodus setting and theological resonance.
    'Into' fits the motion implied by the verb and preposition more naturally than
    'to' in English.
