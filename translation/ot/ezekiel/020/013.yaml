id: EZK.20.13
reference: Ezekiel 20:13
source:
  edition: WLC
  text: וַ/יַּמְרוּ בִ֨/י בֵֽית יִשְׂרָאֵ֜ל בַּ/מִּדְבָּ֗ר בְּ/חֻקּוֹתַ֨/י לֹא הָלָ֜כוּ
    וְ/אֶת מִשְׁפָּטַ֣/י מָאָ֗סוּ אֲשֶׁר֩ יַעֲשֶׂ֨ה אֹתָ֤/ם הָֽ/אָדָם֙ וָ/חַ֣י בָּ/הֶ֔ם
    וְ/אֶת שַׁבְּתֹתַ֖/י חִלְּל֣וּ מְאֹ֑ד וָ/אֹמַ֞ר לִ/שְׁפֹּ֨ךְ חֲמָתִ֧/י עֲלֵי/הֶ֛ם
    בַּ/מִּדְבָּ֖ר לְ/כַלּוֹתָֽ/ם־־־־־׃
translation:
  text: But the house of Israel rebelled against me in the wilderness. They did not
    walk in my statutes, and they rejected my judgments, which if a man does them,
    he will live by them. They greatly profaned my Sabbaths. Then I said I would pour
    out my wrath on them in the wilderness, to put an end to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a man'; the phrase is a generic singular meaning any person who
      does them will live by them.
    reason: lexical_alternative
  - marker: b
    text: Or 'my ordinances' for 'my judgments.'
    reason: lexical_alternative
  - marker: c
    text: This wording echoes Leviticus 18:5.
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּמְרוּ בִי
  chosen: rebelled against me
  alternatives:
  - were rebellious against me
  - defied me
  lexicon: HALOT
  rationale: מרה with ב marks rebellion/defiance directed against God. 'Rebelled against
    me' is idiomatic and preserves covenantal force better than a flatter 'were disobedient
    to me'.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retains the prophetic corporate designation rather than simplifying to
    'Israel,' preserving the collective-household sense.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard biblical rendering for מִדבר and better
    preserves the theological setting of Israel''s testing than ''desert''.'
- source_word: בְּחֻקּוֹתַי לֹא הָלָכוּ
  chosen: They did not walk in my statutes
  alternatives:
  - They did not follow my statutes
  - They did not live by my statutes
  lexicon: HALOT
  rationale: The idiom 'walk in' is common covenant language and worth preserving
    in English here; 'statutes' is a standard rendering for חֻקּוֹת.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal-covenantal contexts can be rendered 'judgments,'
    'ordinances,' or 'rules.' 'Judgments' preserves the judicial nuance and pairs
    naturally with 'statutes' in prophetic diction.
- source_word: מָאָסוּ
  chosen: rejected
  alternatives:
  - despised
  - spurned
  lexicon: HALOT
  rationale: '''Rejected'' clearly communicates covenant refusal without overstating
    emotional contempt, though contempt is implied.'
- source_word: אֲשֶׁר יַעֲשֶׂה אֹתָם הָאָדָם וָחַי בָּהֶם
  chosen: which if a man does them, he will live by them
  alternatives:
  - which if a person does them, he will live by them
  - which a man shall do and live by them
  lexicon: HALOT
  rationale: This clause echoes Lev 18:5. Per doctrine, gender-accurate rendering
    is preferred where Hebrew uses הָאָדָם with representative force. 'A man' preserves
    the singular generic form; the representative sense can be clarified in a footnote.
    'Live by them' keeps the covenantal idiom rather than paraphrasing as 'find life
    through them.'
- source_word: הָאָדָם
  chosen: a man
  alternatives:
  - a person
  - humankind
  lexicon: HALOT
  rationale: The doctrine table gives אדם as 'man / humankind (context).' Here the
    singular generic construction favors 'a man' in the main text as a gender-accurate
    representative singular.
- source_word: שַׁבְּתֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: Plural 'Sabbaths' reflects the Hebrew and preserves the covenant sign
    emphasis in Ezekiel.
- source_word: חִלֵּלוּ מְאֹד
  chosen: greatly profaned
  alternatives:
  - utterly profaned
  - severely desecrated
  lexicon: HALOT
  rationale: חלל in the piel means to profane/desecrate. 'Greatly profaned' captures
    both the verb and the intensifier מְאֹד in natural English.
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - So I said
  - And I said
  lexicon: HALOT
  rationale: Narrative waw here advances the sequence. 'Then I said' reads naturally
    while preserving the progression.
- source_word: לִשְׁפֹּךְ חֲמָתִי
  chosen: I would pour out my wrath
  alternatives:
  - to pour out my wrath
  - to pour out my fury
  lexicon: HALOT
  rationale: The infinitive after אמר expresses intended action. In English, 'I said
    I would pour out my wrath' makes the syntax explicit. 'Wrath' is a clear rendering
    for חֵמָה/חֲמָה in judgment contexts.
- source_word: לְכַלּוֹתָם
  chosen: to put an end to them
  alternatives:
  - to consume them
  - to destroy them completely
  lexicon: HALOT
  rationale: כלה can mean finish, consume, or bring to an end. 'Put an end to them'
    is idiomatic and communicates intended annihilating judgment without overtranslation.
