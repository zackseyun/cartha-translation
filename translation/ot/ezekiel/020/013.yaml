theological_decisions:
- issue: Generic singular הָאָדָם in covenant-life formula
  chosen_reading: a man ... he will live by them
  alternative_readings:
  - a person ... will live by them
  - whoever does them will live by them
  rationale: The Hebrew uses a grammatically masculine singular with representative
    force. Per DOCTRINE.md, gender-accurate renderings are preferred over gender-neutral
    smoothing, while inclusivity may be clarified in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
- issue: Force of the life promise in וָחַי בָּהֶם
  chosen_reading: he will live by them
  alternative_readings:
  - he will have life through them
  - he will remain alive by them
  rationale: The phrase should preserve the covenantal formulation familiar from Leviticus
    and later biblical usage, without importing a narrower theological system. 'Live
    by them' keeps the textual tension and intertextual resonance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
