id: EZK.20.30
reference: Ezekiel 20:30
source:
  edition: WLC
  text: לָ/כֵ֞ן אֱמֹ֣ר אֶל בֵּ֣ית יִשְׂרָאֵ֗ל כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הַ/בְּ/דֶ֥רֶךְ אֲבֽוֹתֵי/כֶ֖ם אַתֶּ֣ם נִטְמְאִ֑ים וְ/אַחֲרֵ֥י שִׁקּוּצֵי/הֶ֖ם אַתֶּ֥ם זֹנִֽים׀־׃
translation:
  text: 'Therefore say to the house of Israel, Thus says the Lord Yahweh: Are you defiling yourselves in the way of your fathers, and whoring after their detestable things?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Are you becoming unclean in the way of your fathers, and prostituting yourselves after their abominations?'
    reason: lexical_alternative
  - marker: b
    text: '''Detestable things'' can also be rendered ''abominations'' or, in context, ''idols.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the conclusion/application from the preceding indictment.
- source_word: אֱמֹר אֶל בֵּית יִשְׂרָאֵל
  chosen: say to the house of Israel
  alternatives:
  - speak to the house of Israel
  lexicon: HALOT
  rationale: Direct prophetic commission formula; 'house of Israel' preserves the covenantal/corporate designation.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord GOD
  - Thus says the Lord Yahweh
  lexicon: HALOT
  rationale: Prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, English convention uses 'Lord GOD' to distinguish the two divine titles without awkward repetition.
- source_word: הַבְּדֶרֶךְ אֲבוֹתֵיכֶם
  chosen: in the way of your fathers
  alternatives:
  - according to the way of your fathers
  - by the way of your fathers
  lexicon: HALOT
  rationale: Idiomatic expression for following ancestral pattern/practice; 'in the way of' is both natural and close to the Hebrew.
- source_word: אַתֶּם נִטְמְאִים
  chosen: Are you defiling yourselves
  alternatives:
  - Are you becoming unclean
  - Do you make yourselves unclean
  lexicon: HALOT
  rationale: 'The participial form in context is best represented as an ongoing present with rhetorical force. Reflexive sense is appropriate in context: Israel is rendering itself unclean through idolatrous practice.'
- source_word: וְאַחֲרֵי
  chosen: and ... after
  alternatives:
  - and following
  - and after
  lexicon: HALOT
  rationale: Marks pursuit/imitation of what follows; in English it is best completed idiomatically with the following verb.
- source_word: שִׁקּוּצֵיהֶם
  chosen: their detestable things
  alternatives:
  - their abominations
  - their idols
  lexicon: HALOT
  rationale: The noun denotes abhorrent/detestable objects, often idols. 'Detestable things' preserves the lexical force without prematurely narrowing the reference, while still fitting the idolatry context.
- source_word: אַתֶּם זֹנִים
  chosen: whoring
  alternatives:
  - playing the whore
  - committing prostitution
  - prostituting yourselves
  lexicon: HALOT
  rationale: זנה is a standard prophetic metaphor for covenantal unfaithfulness through idolatry. 'Whoring after' is forceful, idiomatic, and preserves the sexualized metaphor better than the softened 'being unfaithful.'
