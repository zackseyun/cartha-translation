id: EZK.20.32
reference: Ezekiel 20:32
source:
  edition: WLC
  text: וְ/הָֽ/עֹלָה֙ עַל ר֣וּחֲ/כֶ֔ם הָי֖וֹ לֹ֣א תִֽהְיֶ֑ה אֲשֶׁ֣ר אַתֶּ֣ם אֹמְרִ֗ים
    נִֽהְיֶ֤ה כַ/גּוֹיִם֙ כְּ/מִשְׁפְּח֣וֹת הָ/אֲרָצ֔וֹת לְ/שָׁרֵ֖ת עֵ֥ץ וָ/אָֽבֶן־׀׃
translation:
  text: What is coming up in your mind will certainly not happen—that you say, ‘We
    will be like the nations, like the clans of the lands, serving wood and stone.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What comes up in your spirit.' The Hebrew says literally, 'the thing
      coming up upon your spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will never come to pass'; the Hebrew uses an infinitive absolute with
      the verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: That is, serving idols made of wood and stone.
    reason: cultural_note
  - marker: d
    text: Or 'worshiping wood and stone.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָעֹלָה עַל רוּחֲכֶם
  chosen: What is coming up in your mind
  alternatives:
  - What comes up in your spirit
  - What is arising in your thoughts
  lexicon: HALOT
  rationale: The participle עֹלָה with עַל plus רוּחַ idiomatically refers to what
    arises within one's inner thought or intention. 'Mind' communicates the sense
    naturally in English, while preserving the metaphor of something 'coming up.'
    'Spirit' is more literal but less clear in contemporary English here.
- source_word: הָיוֹ לֹא תִהְיֶה
  chosen: will certainly not happen
  alternatives:
  - shall not be at all
  - will never come to pass
  lexicon: HALOT
  rationale: The infinitive absolute הָיוֹ before the finite verb תִהְיֶה intensifies
    the negation. 'Will certainly not happen' captures both the future sense and emphatic
    denial in readable modern English.
- source_word: אֲשֶׁר אַתֶּם אֹמְרִים
  chosen: that you say
  alternatives:
  - what you are saying
  - as you say
  lexicon: HALOT
  rationale: This introduces the content of Israel's stated intention. 'That you say'
    is concise and fits the following quotation naturally.
- source_word: נִהְיֶה
  chosen: We will be
  alternatives:
  - Let us be
  - We shall become
  lexicon: HALOT
  rationale: First person plural imperfect expresses intended future state. 'We will
    be' is the most straightforward rendering in context.
- source_word: כַגּוֹיִם
  chosen: like the nations
  alternatives:
  - like the Gentiles
  - like the peoples
  lexicon: HALOT
  rationale: גּוֹיִם in Ezekiel commonly refers to the surrounding nations. 'Nations'
    is the standard and least misleading choice; 'Gentiles' would import later Jewish/Christian
    usage.
- source_word: כְּמִשְׁפְּחוֹת הָאֲרָצוֹת
  chosen: like the clans of the lands
  alternatives:
  - like the families of the countries
  - like the peoples grouped in the lands
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת often means family groups or clans. 'Clans' preserves the
    social-group sense better than the more domestic-sounding 'families.' הָאֲרָצוֹת
    is rendered 'lands' to distinguish it from a single 'earth' and to match the plural.
- source_word: לְשָׁרֵת
  chosen: serving
  alternatives:
  - to serve
  - to worship
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result of becoming like the nations.
    'Serving' fits the quoted aspiration smoothly. While in idol contexts it can imply
    worship, the verb itself is 'serve,' and that more closely follows the Hebrew.
- source_word: עֵץ וָאָבֶן
  chosen: wood and stone
  alternatives:
  - tree and stone
  - wood and rock
  lexicon: HALOT
  rationale: This is a common idiom for idols made of wood and stone. 'Wood and stone'
    is the established literal sense and preserves the polemical force of material
    objects rather than living trees.
