theological_decisions:
- issue: Idolatrous service language
  chosen_reading: serving wood and stone
  alternative_readings:
  - worshiping wood and stone
  rationale: The Hebrew verb means 'serve'; in context the service is religious and
    directed toward idols. The main text keeps the lexical form 'serve/serving' rather
    than interpreting it more specifically as 'worship,' preserving the text's wording
    while allowing readers to infer the idolatrous sense.
  doctrine_reference: Translation philosophy §1, §5
- issue: Inner faculty denoted by רוּחַ
  chosen_reading: mind
  alternative_readings:
  - spirit
  rationale: Here רוּחַ refers to inward intention or thought rather than a developed
    anthropological distinction. Rendering it 'mind' avoids importing theological
    claims about the human spirit and best matches the idiom in context.
  doctrine_reference: Translation philosophy §1, §3
