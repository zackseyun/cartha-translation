id: EZK.20.44
reference: Ezekiel 20:44
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּם֙ כִּֽי אֲנִ֣י יְהוָ֔ה בַּ/עֲשׂוֹתִ֥/י אִתְּ/כֶ֖ם לְמַ֣עַן שְׁמִ֑/י לֹא֩ כְ/דַרְכֵי/כֶ֨ם הָ/רָעִ֜ים וְ/כַ/עֲלִילֽוֹתֵי/כֶ֤ם הַ/נִּשְׁחָתוֹת֙ בֵּ֣ית יִשְׂרָאֵ֔ל נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃פ
translation:
  text: Then you will know that I am Yahweh, when I deal with you for the sake of my name, not according to your evil ways or according to your corrupt deeds, O house of Israel, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when I act toward you.' The Hebrew is broad and does not specify the manner of God's action here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for the sake of my name,' that is, for the honor of his reputation.
    reason: cultural_note
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries a future/result sense. 'Then' makes the consequential force natural in English while preserving the recognition formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּעֲשׂוֹתִי אִתְּכֶם
  chosen: when I deal with you
  alternatives:
  - when I act toward you
  - when I act with you
  lexicon: HALOT
  rationale: עשה with אֵת in this context refers broadly to God's action toward Israel. 'Deal with you' is idiomatic and preserves the open-ended nature of the action without over-specifying blessing or judgment.
- source_word: לְמַעַן שְׁמִי
  chosen: for the sake of my name
  alternatives:
  - for my name's sake
  lexicon: HALOT
  rationale: This phrase expresses God's concern for the honor/reputation of his name. The chosen rendering is clear modern English and retains the theological weight.
- source_word: לֹא כְדַרְכֵיכֶם הָרָעִים
  chosen: not according to your evil ways
  alternatives:
  - not like your evil ways
  lexicon: HALOT
  rationale: דֶּרֶךְ in prophetic moral contexts often means conduct or way of life. 'According to your evil ways' preserves the comparison standard implied by כְּ.
- source_word: וְכַעֲלִילוֹתֵיכֶם הַנִּשְׁחָתוֹת
  chosen: or according to your corrupt deeds
  alternatives:
  - or according to your ruined practices
  - or according to your corrupt acts
  lexicon: HALOT
  rationale: עֲלִילוֹת denotes deeds/practices; the participial adjective הַנִּשְׁחָתוֹת characterizes them as corrupted/depraved. 'Corrupt deeds' is concise and morally forceful.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Direct address is explicit here; 'O' preserves the vocative force in elevated but still natural English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic speech formula 'declares.' אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD' to distinguish the title plus divine name combination in English.
