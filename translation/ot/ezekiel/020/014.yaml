theological_decisions:
- issue: Meaning of God's acting 'for the sake of my name'
  chosen_reading: God restrains judgment to uphold the holiness and public honor of
    his name among the nations.
  alternative_readings:
  - God acts merely for reputation in a superficial sense
  rationale: In Ezekiel, God's 'name' signifies his revealed character and covenantal
    honor, not mere vanity. The translation preserves the idiom without flattening
    its theological depth or overexplaining it in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
