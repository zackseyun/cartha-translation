id: EZK.20.14
reference: Ezekiel 20:14
source:
  edition: WLC
  text: וָ/אֶעֱשֶׂ֖ה לְמַ֣עַן שְׁמִ֑/י לְ/בִלְתִּ֤י הֵחֵל֙ לְ/עֵינֵ֣י הַ/גּוֹיִ֔ם
    אֲשֶׁ֥ר הוֹצֵאתִ֖י/ם לְ/עֵינֵי/הֶֽם׃
translation:
  text: But I acted for the sake of my name, so that it would not be profaned in the
    sight of the nations before whose sight I had brought them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for my name’s sake.'
    reason: lexical_alternative
  - marker: b
    text: '''Profaned'' translates a verb meaning to treat as common or desecrate
      what is holy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱשֶׂה
  chosen: But I acted
  alternatives:
  - But I did
  - But I acted accordingly
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make, act'). In this context, with God as
    subject and the following purpose clauses, 'acted' communicates decisive intervention
    more naturally than the bare 'did.' The prefixed conjunction is rendered adversatively
    as 'But' because the verse contrasts with the prior announced judgment.
- source_word: לְמַעַן שְׁמִי
  chosen: for the sake of my name
  alternatives:
  - for my name's sake
  lexicon: HALOT
  rationale: This is a standard idiom expressing action taken to uphold the honor/reputation
    associated with God's name. 'For the sake of my name' is clear modern English
    while preserving the theological weight of the Hebrew idiom.
- source_word: לְבִלְתִּי הֵחֵל
  chosen: so that it would not be profaned
  alternatives:
  - so as not to profane it
  - so that it would not be defiled
  - so that it would not be treated as common
  lexicon: HALOT
  rationale: 'The infinitive construction expresses purpose/prevention. חלל in the
    piel/hifil-related profanation sense refers to desecrating or treating as common
    what is holy. Because the object is God''s ''name,'' English idiom favors passive
    expression: ''it would not be profaned.'' This preserves the covenant-honor sense
    better than the more physical ''defiled.'''
- source_word: לְעֵינֵי הַגּוֹיִם
  chosen: in the sight of the nations
  alternatives:
  - before the eyes of the nations
  - before the nations
  lexicon: HALOT
  rationale: The Hebrew literally refers to visibility before the nations. 'In the
    sight of' is natural English that retains the public, observable dimension of
    God's action.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In Ezekiel, גוים commonly denotes the surrounding peoples/nations. 'The
    nations' is the most contextually appropriate and least misleading rendering here;
    'Gentiles' would import later Jewish/Christian usage not required by the Hebrew
    context.
- source_word: אֲשֶׁר הוֹצֵאתִים
  chosen: before whose sight I had brought them out
  alternatives:
  - before whom I had brought them out
  - in whose sight I had brought them out
  lexicon: HALOT
  rationale: יצא in the causative means 'bring out.' The suffix refers to Israel.
    The clause modifies 'the nations' and recalls the public nature of the exodus.
    'Had brought them out' reflects the prior action relative to the profanation concern.
- source_word: לְעֵינֵיהֶם
  chosen: before whose sight
  alternatives:
  - before them
  - in their sight
  lexicon: HALOT
  rationale: The repeated 'eyes/sight' language is retained to preserve the emphasis
    on public witness. To avoid awkward duplication in English, the first occurrence
    is rendered 'in the sight of' and the second integrated as 'before whose sight.'
