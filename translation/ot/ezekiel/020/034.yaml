theological_decisions:
- issue: Exodus imagery in a context of both restoration and judgment
  chosen_reading: Retain the exodus-formula language ('strong hand,' 'outstretched
    arm') while also preserving 'wrath poured out' without softening it.
  alternative_readings:
  - Render more dynamically as simple rescue language
  - Interpret the verse as purely restorative and mute the judgment element
  rationale: The Hebrew intentionally evokes the exodus, but in Ezekiel 20 the regathering
    is intertwined with covenant lawsuit and judgment. The translation should preserve
    that tension rather than resolve it into either pure salvation or pure punishment.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
