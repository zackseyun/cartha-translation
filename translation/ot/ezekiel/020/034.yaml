id: EZK.20.34
reference: Ezekiel 20:34
source:
  edition: WLC
  text: וְ/הוֹצֵאתִ֤י אֶתְ/כֶם֙ מִן הָ֣/עַמִּ֔ים וְ/קִבַּצְתִּ֣י אֶתְ/כֶ֔ם מִן הָ֣/אֲרָצ֔וֹת
    אֲשֶׁ֥ר נְפוֹצֹתֶ֖ם בָּ֑/ם בְּ/יָ֤ד חֲזָקָה֙ וּ/בִ/זְר֣וֹעַ נְטוּיָ֔ה וּ/בְ/חֵמָ֖ה
    שְׁפוּכָֽה־־׃
translation:
  text: I will bring you out from the peoples and gather you from the lands where
    you have been scattered, with a strong hand and an outstretched arm and with wrath
    poured out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nations' for 'the peoples.'
    reason: lexical_alternative
  - marker: b
    text: Traditional biblical wording often has 'with a mighty hand and an outstretched
      arm.'
    reason: cross_reference
  - marker: c
    text: Or 'with fury poured out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתִי
  chosen: I will bring ... out
  alternatives:
  - I will lead ... out
  - I will bring forth
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, causative: ''cause to go out, bring out.'' ''Bring
    out'' is idiomatic and preserves the exodus-like force of divine deliverance/judgment.'
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples.' 'Nations' is possible, but 'peoples'
    better matches the plural ethnic/political groups among whom Israel is dispersed
    and avoids flattening the parallel with 'lands.'
- source_word: וְקִבַּצְתִּי
  chosen: and gather
  alternatives:
  - and assemble
  - and collect
  lexicon: HALOT
  rationale: קבץ is the standard verb for regathering exiles. 'Gather' is the most
    natural and biblically recognizable English equivalent.
- source_word: הָאֲרָצוֹת
  chosen: the lands
  alternatives:
  - the countries
  - the earths
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to various territories/countries of exile. 'Lands'
    is a natural rendering and preserves the geographic sense without over-specifying
    modern nation-states.
- source_word: אֲשֶׁר נְפוֹצֹתֶם בָּם
  chosen: where you have been scattered
  alternatives:
  - in which you were scattered
  - where you are scattered
  lexicon: HALOT
  rationale: The Niphal of פוץ is passive/reflexive, 'be scattered.' English present
    perfect ('have been scattered') communicates the resulting state from prior dispersion
    and reads naturally.
- source_word: בְּיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - with a mighty hand
  lexicon: HALOT
  rationale: Literally 'with a strong hand.' This echoes exodus language. 'Mighty
    hand' is traditional, but 'strong hand' stays closer to חֲזָקָה while remaining
    clear.
- source_word: וּבִזְרֹעַ נְטוּיָה
  chosen: and an outstretched arm
  alternatives:
  - and with an extended arm
  lexicon: HALOT
  rationale: A fixed biblical expression of decisive divine action. 'Outstretched
    arm' is the established and accurate English equivalent.
- source_word: וּבְחֵמָה שְׁפוּכָה
  chosen: and with wrath poured out
  alternatives:
  - and with fury poured out
  - and with outpoured wrath
  lexicon: HALOT
  rationale: חֵמָה denotes wrath/fury; שְׁפוּכָה means 'poured out.' 'Wrath poured
    out' is vivid, natural English and preserves the judgmental force. 'Fury' is possible
    but 'wrath' better fits prophetic divine anger language.
