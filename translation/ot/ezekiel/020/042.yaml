id: EZK.20.42
reference: Ezekiel 20:42
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּם֙ כִּֽי אֲנִ֣י יְהוָ֔ה בַּ/הֲבִיאִ֥/י אֶתְ/כֶ֖ם אֶל אַדְמַ֣ת יִשְׂרָאֵ֑ל אֶל הָ/אָ֗רֶץ אֲשֶׁ֤ר נָשָׂ֨אתִי֙ אֶת יָדִ֔/י לָ/תֵ֥ת אוֹתָ֖/הּ לַ/אֲבֽוֹתֵי/כֶֽם־־־־׃
translation:
  text: Then you will know that I am Yahweh, when I bring you into the land of Israel, into the land that I lifted up my hand to give to your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “the land that I swore to give to your fathers.” The Hebrew reads literally, “the land that I lifted up my hand to give to your fathers,” an oath gesture.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  - you shall know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries a future/result sense after preceding divine action. 'Then' makes the consequential force explicit in natural English without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal force in standard English Bible style.
- source_word: בַּהֲבִיאִי
  chosen: when I bring
  alternatives:
  - in my bringing
  - when I have brought
  lexicon: HALOT
  rationale: The infinitive construct with prefixed beth marks the circumstance/time of the recognition formula. 'When I bring' is idiomatic and preserves the temporal sense.
- source_word: אַדְמַת יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - the soil of Israel
  - the ground of Israel
  lexicon: HALOT
  rationale: אַדְמָה can mean soil/ground, but in this restoration context it functions as a territorial designation. 'Land of Israel' is the most natural and contextually fitting rendering.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/earth
  - the country
  lexicon: HALOT
  rationale: Refers specifically to the promised land, not the earth in general. Repeating 'land' preserves the Hebrew parallelism with the previous phrase.
- source_word: נָשָׂאתִי אֶת־יָדִי
  chosen: I lifted up my hand
  alternatives:
  - I swore
  - I raised my hand in oath
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'lift up the hand' and commonly signifies oath-taking. The main text keeps the concrete idiom for transparency; the oath sense is preserved in a footnote.
- source_word: לָתֵת אֹתָהּ
  chosen: to give
  alternatives:
  - to grant
  - to give it
  lexicon: HALOT
  rationale: Simple infinitive of נתן with feminine object referring to the land. English can omit the explicit pronoun without loss, since 'the land' is immediately antecedent.
- source_word: לַאֲבוֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew specifically says 'your fathers.' Per project policy, gender-accurate language is preferred where it matches the source. 'Ancestors' is possible interpretively but less exact.
