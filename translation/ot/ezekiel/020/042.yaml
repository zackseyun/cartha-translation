  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to translate the oath idiom נָשָׂאתִי אֶת־יָדִי idiomatically or literally
  chosen_reading: Retain the literal idiom 'I lifted up my hand' in the main text
  alternative_readings:
  - I swore
  - I raised my hand in oath
  rationale: The phrase is a recognizable Hebrew oath idiom. Preserving the literal image maintains transparency to the source text, while a footnote supplies the idiomatic oath meaning so the theological force of divine promise is not missed.
