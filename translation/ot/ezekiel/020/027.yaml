id: EZK.20.27
reference: Ezekiel 20:27
source:
  edition: WLC
  text: לָ/כֵ֞ן דַּבֵּ֨ר אֶל בֵּ֤ית יִשְׂרָאֵל֙ בֶּן אָדָ֔ם וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה ע֗וֹד זֹ֚את גִּדְּפ֤וּ אוֹתִ/י֙ אֲב֣וֹתֵי/כֶ֔ם בְּ/מַעֲלָ֥/ם בִּ֖/י מָֽעַל־־׃
translation:
  text: 'Therefore speak to the house of Israel, son of man, and say to them, ‘Thus says the Lord Yahweh: In this also your fathers blasphemed me, by acting treacherously against me.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “reviled me” or “treated me with contempt.”
    reason: lexical_alternative
  - marker: b
    text: Or “by their unfaithfulness against me” or “by committing a breach of faith against me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential connective introducing the consequence of the preceding argument.
- source_word: דַּבֵּר אֶל בֵּית יִשְׂרָאֵל
  chosen: speak to the house of Israel
  alternatives:
  - speak to the people of Israel
  lexicon: HALOT
  rationale: Retains the prophetic address formula and the collective covenantal expression 'house of Israel' rather than flattening it to 'people.'
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A more literal rendering preserves the repeated prophetic title and matches the gender-accurate policy; alternatives are possible but less consistent with the book's usage.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord Yahweh
  - Thus says the Lord GOD
  lexicon: HALOT
  rationale: Renders the prophetic messenger formula conventionally. יְהוָה follows the doctrinal default 'the LORD'; because אֲדֹנָי precedes it, small-caps convention is not available here, so 'Lord GOD' clearly distinguishes the two elements in readable English.
- source_word: עוֹד זֹאת
  chosen: In this also
  alternatives:
  - Yet in this
  - Still in this
  lexicon: HALOT
  rationale: The phrase points to an additional instance of offense. 'In this also' preserves the additive force of עוֹד and the demonstrative reference of זֹאת.
- source_word: גִּדְּפוּ אוֹתִי
  chosen: blasphemed me
  alternatives:
  - reviled me
  - treated me with contempt
  lexicon: HALOT
  rationale: גדף in this context denotes abusive speech or affront directed toward God. 'Blasphemed me' best captures the gravity of the offense in direct relation to God.
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: Retains the masculine familial term present in the Hebrew and aligns with the gender-accurate policy. 'Ancestors' is possible but less literal.
- source_word: בְּמַעֲלָם בִּי מָעַל
  chosen: by acting treacherously against me
  alternatives:
  - in their unfaithfulness against me
  - by committing a breach of faith against me
  - by trespassing against me
  lexicon: HALOT
  rationale: The cognate construction with מעל emphasizes faithless betrayal or breach of covenant. 'Acting treacherously against me' communicates covenantal disloyalty in natural English while preserving the force of the repetition.
