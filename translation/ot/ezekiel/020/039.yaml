id: EZK.20.39
reference: Ezekiel 20:39
source:
  edition: WLC
  text: וְ/אַתֶּ֨ם בֵּֽית יִשְׂרָאֵ֜ל כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה אִ֤ישׁ גִּלּוּלָי/ו֙
    לְכ֣וּ עֲבֹ֔דוּ וְ/אַחַ֕ר אִם אֵינְ/כֶ֖ם שֹׁמְעִ֣ים אֵלָ֑/י וְ/אֶת שֵׁ֤ם קָדְשִׁ/י֙
    לֹ֣א תְחַלְּלוּ ע֔וֹד בְּ/מַתְּנֽוֹתֵי/כֶ֖ם וּ/בְ/גִלּוּלֵי/כֶֽם־־׀־־־׃
translation:
  text: 'But as for you, house of Israel, thus says the Lord GOD: Go, each man, serve
    his idols—if afterward you will not listen to me. But you shall no longer profane
    my holy name with your gifts and with your idols.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols; possible renderings
      include 'filthy idols' or 'dung-idols.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Go, serve each his idols; but afterward, if you will not listen to
      me…' The Hebrew syntax after 'serve' is difficult, and the clause may be taken
      with slightly different punctuation.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But as for you
  alternatives:
  - And you
  - As for you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a strong contrastive address.
    'But as for you' brings out the adversative force in context, where YHWH turns
    directly to the house of Israel.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: house of Israel
  alternatives:
  - household of Israel
  lexicon: HALOT
  rationale: Standard covenantal address; 'house of Israel' is the natural and established
    English equivalent and preserves the corporate sense.
- source_word: אֲדֹנָי יְהֹוִה
  chosen: the Lord GOD
  alternatives:
  - Lord YHWH
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the
    compound title אֲדֹנָי יְהֹוִה, conventional English avoids 'Lord LORD' by rendering
    'the Lord GOD.' This preserves the title function without awkward duplication.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - every man
  lexicon: HALOT
  rationale: The distributive singular emphasizes individual responsibility within
    the corporate address. Per translation philosophy, the masculine form is retained
    as gender-accurate to the Hebrew rather than neutralized.
- source_word: גִּלּוּלָיו
  chosen: his idols
  alternatives:
  - his dung-idols
  - his filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. 'Idols' is the
    clearest main-text rendering; stronger pejorative nuances are possible but would
    sound interpretive in the main text, so they are preserved in a footnote.
- source_word: לְכוּ עֲבֹדוּ
  chosen: Go, ... serve
  alternatives:
  - Go and serve
  - Go, serve
  lexicon: HALOT
  rationale: The paired imperatives are rendered straightforwardly. 'Go, each man,
    serve his idols' preserves the sharp, judicial tone.
- source_word: וְאַחַר אִם אֵינְכֶם שֹׁמְעִים אֵלַי
  chosen: if afterward you will not listen to me
  alternatives:
  - but afterward, if you will not listen to me
  - and afterward, if you are not listening to me
  lexicon: HALOT
  rationale: 'The clause is syntactically difficult, but the sense is concessive/judicial:
    they may go serve idols if they refuse to heed YHWH. ''If afterward you will not
    listen to me'' preserves the temporal marker and conditional force without over-resolving
    the Hebrew.'
- source_word: שֹׁמְעִים אֵלַי
  chosen: listen to me
  alternatives:
  - hear me
  - obey me
  lexicon: HALOT
  rationale: שׁמע can imply both hearing and obedience. 'Listen to me' keeps the auditory
    wording while allowing the obedience nuance to remain implicit in context.
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering and preserves the covenantal/theological
    significance of the divine name.
- source_word: לֹא תְחַלְּלוּ עוֹד
  chosen: you shall no longer profane
  alternatives:
  - do not profane anymore
  - you must no longer defile
  lexicon: HALOT
  rationale: The imperfect in this prophetic context is best rendered as a strong
    future/prohibitive declaration. 'Profane' fits חלל in relation to the divine name
    better than the broader 'defile.'
- source_word: בְּמַתְּנוֹתֵיכֶם
  chosen: with your gifts
  alternatives:
  - by your gifts
  - with your offerings
  lexicon: HALOT
  rationale: The noun means gifts/presents and here likely refers to cultic offerings.
    'Gifts' is the more direct lexical equivalent; 'offerings' is possible but slightly
    more interpretive.
- source_word: וּבְגִלּוּלֵיכֶם
  chosen: and with your idols
  alternatives:
  - and by your idols
  lexicon: HALOT
  rationale: The parallel prepositional phrase links their offerings with their idolatrous
    practice as means of profaning God's name. 'With your idols' is the most natural
    English rendering.
