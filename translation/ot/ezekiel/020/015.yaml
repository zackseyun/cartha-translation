id: EZK.20.15
reference: Ezekiel 20:15
source:
  edition: WLC
  text: וְ/גַם אֲנִ֗י נָשָׂ֧אתִי יָדִ֛/י לָ/הֶ֖ם בַּ/מִּדְבָּ֑ר לְ/בִלְתִּי֩ הָבִ֨יא
    אוֹתָ֜/ם אֶל הָ/אָ֣רֶץ אֲשֶׁר נָתַ֗תִּי זָבַ֤ת חָלָב֙ וּ/דְבַ֔שׁ צְבִ֥י הִ֖יא
    לְ/כָל הָ/אֲרָצֽוֹת־־־־׃
translation:
  text: Yet I myself also raised my hand to them in the wilderness, that I would not
    bring them into the land that I had given, flowing with milk and honey, the glory
    of all lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lifted up my hand'; the phrase is an oath idiom and may be rendered
      more interpretively as 'swore.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the beauty' or 'the splendor of all lands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Yet ... also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Conveys additive force with mild adversative progression from the prior
    context. 'Yet' fits the discourse flow in English while 'also' preserves גַּם.
- source_word: נָשָׂאתִי יָדִי
  chosen: raised my hand
  alternatives:
  - lifted up my hand
  - swore
  lexicon: HALOT
  rationale: The idiom literally means raising the hand, commonly in oath-taking.
    Main text keeps the concrete idiom for transparency; the oath sense is implicit
    from context.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - concerning them
  lexicon: HALOT
  rationale: The preposition here naturally marks the addressees/beneficiaries of
    the oath gesture.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard biblical rendering and fits Israel''s
    setting without implying only sandy desert terrain.'
- source_word: לְבִלְתִּי הָבִיא אוֹתָם
  chosen: that I would not bring them
  alternatives:
  - not to bring them
  - so as not to bring them
  lexicon: HALOT
  rationale: Expresses the content/result of the sworn declaration in idiomatic English.
    'Would not bring' captures the volitional future force.
- source_word: הָאָרֶץ אֲשֶׁר נָתַתִּי
  chosen: the land that I had given
  alternatives:
  - the land that I gave
  - the land that I had promised/given
  lexicon: HALOT
  rationale: 'Pluperfect English fits the retrospective perspective: the land had
    already been granted/promised by God before this oath of exclusion.'
- source_word: זָבַת חָלָב וּדְבַשׁ
  chosen: flowing with milk and honey
  lexicon: HALOT
  rationale: Established idiom accurately reflects the Hebrew participial phrase and
    remains natural English.
- source_word: צְבִי
  chosen: the glory
  alternatives:
  - the beauty
  - the splendor
  - the delight
  lexicon: HALOT
  rationale: In this context the noun denotes desirable splendor/excellence of the
    land. 'Glory' preserves the elevated register and comparative superlative sense
    in relation to all lands.
- source_word: הִיא לְכָל הָאֲרָצוֹת
  chosen: of all lands
  alternatives:
  - among all the lands
  - for all the lands
  lexicon: HALOT
  rationale: 'Idiomatic English compresses the Hebrew predicate construction: the
    land is the glory/splendor in relation to all lands, i.e., surpassing them.'
