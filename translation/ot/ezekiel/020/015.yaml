theological_decisions:
- issue: Whether to make the oath sense of נָשָׂאתִי יָדִי explicit
  chosen_reading: Keep the literal idiom 'raised my hand' in the main text
  alternative_readings:
  - Render interpretively as 'swore'
  rationale: The Hebrew idiom is transparent enough in context and preserving it maintains
    source-language texture without obscuring meaning. The oath nuance is documented
    lexically rather than imported as the sole wording.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Force of נָתַתִּי regarding the land
  chosen_reading: Translate as 'had given' rather than 'gave'
  alternative_readings:
  - gave
  rationale: This reflects God's prior grant/promise of the land from the standpoint
    of the wilderness oath, without making a theological distinction beyond the Hebrew
    aspect and discourse context.
  doctrine_reference: Translation philosophy §1, §6
