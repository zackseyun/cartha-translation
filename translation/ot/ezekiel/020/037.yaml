theological_decisions:
- issue: Meaning of the covenant-restoration metaphor
  chosen_reading: The verse depicts YHWH's sovereign examination and binding of the
    people into covenant obligation, without specifying here whether the emphasis
    is primarily punitive or restorative.
  alternative_readings:
  - primarily punitive restraint
  - primarily restorative re-admission to covenant fellowship
  rationale: The imagery of passing under the rod and entering the bond of the covenant
    can suggest both inspection/judgment and renewed covenantal belonging. The translation
    preserves that tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
