id: EZK.20.37
reference: Ezekiel 20:37
source:
  edition: WLC
  text: וְ/הַעֲבַרְתִּ֥י אֶתְ/כֶ֖ם תַּ֣חַת הַ/שָּׁ֑בֶט וְ/הֵבֵאתִ֥י אֶתְ/כֶ֖ם בְּ/מָסֹ֥רֶת
    הַ/בְּרִֽית׃
translation:
  text: I will make you pass under the rod, and I will bring you into the bond of
    the covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the fetter/obligation of the covenant.' The Hebrew term rendered
      'bond' is rare and conveys the idea of being bound or constrained in relation
      to the covenant.
    reason: lexical_alternative
  - marker: b
    text: '''Pass under the rod'' likely evokes the practice of counting or inspecting
      a flock as it passes beneath a shepherd''s rod.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהַעֲבַרְתִּי
  chosen: I will make ... pass
  alternatives:
  - I will cause ... to pass
  - I will bring ... through
  lexicon: HALOT
  rationale: Hiphil of עבר is causative; 'make ... pass' preserves the causative force
    more clearly than a simple 'bring'.
- source_word: תַּחַת הַשָּׁבֶט
  chosen: under the rod
  alternatives:
  - under the staff
  lexicon: HALOT
  rationale: שֵׁבֶט commonly means 'rod, staff, scepter.' In this context the idiom
    evokes a shepherd or owner counting/examining animals by passing them under the
    rod; 'rod' is the established and most natural rendering.
- source_word: וְהֵבֵאתִי
  chosen: I will bring
  alternatives:
  - I will bring in
  - I will lead
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring.' 'Bring' fits the direct object
    plus prepositional phrase and keeps the parallel with the first clause.
- source_word: בְּמָסֹרֶת
  chosen: into the bond
  alternatives:
  - into the fetter
  - into the obligation
  - under the discipline
  lexicon: HALOT
  rationale: מָסֹרֶת is rare and likely denotes a binding bond or restraint. 'Bond'
    best captures the metaphorical sense here in covenant context without over-specifying
    physical fetters.
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - the treaty
  - the pact
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in biblical theology; 'covenant'
    preserves its established semantic and theological force.
