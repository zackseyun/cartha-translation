id: EZK.20.43
reference: Ezekiel 20:43
source:
  edition: WLC
  text: וּ/זְכַרְתֶּם שָׁ֗ם אֶת דַּרְכֵי/כֶם֙ וְ/אֵת֙ כָּל עֲלִיל֣וֹתֵי/כֶ֔ם אֲשֶׁ֥ר
    נִטְמֵאתֶ֖ם בָּ֑/ם וּ/נְקֹֽטֹתֶם֙ בִּ/פְנֵי/כֶ֔ם בְּ/כָל רָעוֹתֵי/כֶ֖ם אֲשֶׁ֥ר
    עֲשִׂיתֶֽם־־־־׃
translation:
  text: There you will remember your ways and all your deeds by which you defiled
    yourselves, and you will loathe yourselves in your own sight for all the evils
    that you have done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will feel disgust with yourselves' / 'you will be sickened by yourselves.'
      The Hebrew verb expresses strong self-abhorrence.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in your faces'; the sense is 'in your own sight' or 'in your
      own eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְכַרְתֶּם
  chosen: you will remember
  alternatives:
  - you shall remember
  - you will call to mind
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally in context. 'Remember' is the plain and natural rendering of זכר here.
- source_word: שָׁם
  chosen: There
  alternatives:
  - therein
  lexicon: HALOT
  rationale: Locative adverb referring back to the place of restoration in the preceding
    context; simple 'there' is idiomatic modern English.
- source_word: דַּרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: דֶּרֶךְ in prophetic moral contexts commonly denotes manner of life or
    conduct. 'Ways' preserves the Hebrew metaphor and remains clear in English.
- source_word: עֲלִילוֹתֵיכֶם
  chosen: your deeds
  alternatives:
  - your actions
  - your practices
  lexicon: HALOT
  rationale: The noun refers to acts or doings. 'Deeds' fits the moral-evaluative
    context and pairs naturally with 'ways' without collapsing the distinction between
    habitual conduct and concrete acts.
- source_word: אֲשֶׁר נִטְמֵאתֶם בָּם
  chosen: by which you defiled yourselves
  alternatives:
  - with which you became unclean
  - in which you defiled yourselves
  lexicon: HALOT
  rationale: נטמא in the Niphal can denote becoming unclean/defiled; in this reflexive
    moral context 'defiled yourselves' best captures culpability. The preposition
    ב marks means or sphere; 'by which' is idiomatic and links the defilement to their
    deeds.
- source_word: וּנְקֹטֹתֶם
  chosen: you will loathe
  alternatives:
  - you will feel disgust
  - you will be sickened
  lexicon: HALOT
  rationale: The verb קוט conveys abhorrence or loathing. 'Loathe' is concise, strong,
    and suits the repentance context better than a weaker emotional gloss.
- source_word: בִּפְנֵיכֶם
  chosen: yourselves in your own sight
  alternatives:
  - before yourselves
  - in your own eyes
  lexicon: HALOT
  rationale: Literally 'in/before your faces.' In this idiom the sense is self-appraisal
    or self-perception. Expanding to 'yourselves in your own sight' makes explicit
    the reflexive object implied by the context and yields natural English.
- source_word: בְּכָל רָעוֹתֵיכֶם
  chosen: for all the evils
  alternatives:
  - because of all your evils
  - for all your wicked deeds
  lexicon: HALOT
  rationale: רָעוֹת can denote evils/wicked acts. 'For all the evils' preserves the
    noun's breadth and works with the following relative clause 'that you have done.'
- source_word: אֲשֶׁר עֲשִׂיתֶם
  chosen: that you have done
  alternatives:
  - which you did
  - that you committed
  lexicon: HALOT
  rationale: 'Simple relative clause with עשה. Present perfect English fits the future
    retrospective perspective: once restored, they will look back on what they have
    done.'
