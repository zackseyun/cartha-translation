theological_decisions:
- issue: Nature of Israel's response after restoration
  chosen_reading: The verse describes repentance expressed as self-loathing over past
    sins, without importing a fuller doctrinal system beyond the text.
  alternative_readings:
  - The verse could be read more weakly as mere regret or shame rather than deep moral
    revulsion.
  rationale: The lexical force of קוט and the context of remembering sinful ways support
    a strong expression of repentance. The translation preserves that force while
    not adding later theological categories not explicit in the verse.
  doctrine_reference: Translation philosophy §1, §3
