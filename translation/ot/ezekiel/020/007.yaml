theological_decisions:
- issue: Rendering the Hebrew idiom שִׁקּוּצֵי עֵינָיו
  chosen_reading: the detestable things of his eyes
  alternative_readings:
  - the abominations before his eyes
  - the detestable idols he looks at
  rationale: The phrase likely refers to idolatrous objects desired or regarded by each person. A relatively literal rendering preserves the Hebrew imagery and avoids prematurely collapsing the idiom into an interpretive paraphrase, while the context still makes the idolatrous reference clear.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
- issue: Rendering Ezekiel's polemical term גִּלּוּלִים
  chosen_reading: idols
  alternative_readings:
  - filthy idols
  - dung-idols
  rationale: The term is intentionally contemptuous, but the main text should remain readable modern English. The stronger pejorative nuance is preserved in a footnote rather than elevated into the main line in a way that may over-specify the lexical image.
  doctrine_reference: Translation philosophy §§1, 6
