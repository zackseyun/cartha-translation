id: EZK.20.7
reference: Ezekiel 20:7
source:
  edition: WLC
  text: וָ/אֹמַ֣ר אֲלֵ/הֶ֗ם אִ֣ישׁ שִׁקּוּצֵ֤י עֵינָי/ו֙ הַשְׁלִ֔יכוּ וּ/בְ/גִלּוּלֵ֥י מִצְרַ֖יִם אַל תִּטַּמָּ֑אוּ אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: And I said to them, ‘Each man, throw away the detestable things before his eyes, and do not defile yourselves with the idols of Egypt. I am Yahweh your God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the detestable things of his eyes,' an idiom for the abhorrent objects each man looks to or desires; likely idolatrous objects.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for 'idols' here is a strongly contemptuous word in Ezekiel; alternatively, 'filthy idols' or more literally 'dung-idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר narrates a past event. 'And I said' preserves the sequential narrative flow without overinterpreting temporal nuance.
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - Each one
  - Every man
  lexicon: HALOT
  rationale: The singular distributive use of אִישׁ before plural imperatives means 'each one individually.' 'Each man' preserves the masculine/gender-accurate form in line with the translation philosophy, while still conveying distributive force.
- source_word: שִׁקּוּצֵי עֵינָיו
  chosen: the detestable things of his eyes
  alternatives:
  - the abominations before his eyes
  - the detestable idols he looks at
  lexicon: HALOT
  rationale: 'שִׁקּוּץ denotes something detestable, especially in idolatrous contexts. The construct with ''his eyes'' is retained fairly literally to preserve the vivid Hebrew idiom: the objects his eyes are set on. ''Detestable things'' is more readable than ''abominations'' while keeping the moral-religious force.'
- source_word: הַשְׁלִיכוּ
  chosen: throw away
  alternatives:
  - cast away
  - throw down
  lexicon: HALOT
  rationale: The imperative calls for decisive rejection. 'Throw away' is natural modern English and adequately reflects the force of השליך.
- source_word: גִּלּוּלֵי מִצְרַיִם
  chosen: the idols of Egypt
  alternatives:
  - the filthy idols of Egypt
  - the dung-idols of Egypt
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. 'Idols' gives the core sense in clear English; the pejorative force is partly carried by the surrounding prohibition against defilement. Stronger renderings like 'dung-idols' are possible but too interpretively loaded for the main text.
- source_word: אַל תִּטַּמָּאוּ
  chosen: do not defile yourselves
  alternatives:
  - do not make yourselves unclean
  - do not become unclean
  lexicon: HALOT
  rationale: The Hitpael/reflexive nuance is well represented by 'defile yourselves.' This keeps the cultic-moral sense of impurity associated with idolatry.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With YHWH as subject and covenantal address to Israel, the plural form functions as the singular 'God.' 'Your God' expresses the covenant relationship clearly.
