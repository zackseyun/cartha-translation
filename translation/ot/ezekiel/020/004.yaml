id: EZK.20.4
reference: Ezekiel 20:4
source:
  edition: WLC
  text: הֲ/תִשְׁפֹּ֣ט אֹתָ֔/ם הֲ/תִשְׁפּ֖וֹט בֶּן אָדָ֑ם אֶת תּוֹעֲבֹ֥ת אֲבוֹתָ֖/ם
    הוֹדִיעֵֽ/ם־־׃
translation:
  text: Will you judge them? Will you judge, son of man? Make known to them the abominations
    of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors' for 'their fathers.' The Hebrew is literally 'their
      fathers.'
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' is Ezekiel''s regular form of address here; alternatively,
      ''mortal'' or ''human one.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲתִשְׁפֹּט
  chosen: Will you judge
  alternatives:
  - Will you govern
  - Will you plead against
  - Will you condemn
  lexicon: HALOT
  rationale: שׁפט in the Qal commonly means 'judge.' In this prophetic challenge context,
    the sense is forensic/judicial rather than administrative. 'Will you judge' preserves
    the repeated rhetorical force of the Hebrew.
- source_word: אֹתָם
  chosen: them
  rationale: Direct object pronoun referring to the elders addressed in context; straightforwardly
    rendered 'them.'
- source_word: הֲתִשְׁפּוֹט
  chosen: Will you judge
  alternatives:
  - Will you condemn
  - Will you pass judgment on
  lexicon: HALOT
  rationale: The second repetition is retained rather than smoothed out, because the
    Hebrew deliberately repeats the challenge for emphasis.
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. Per translation philosophy,
    gender-accurate rendering is preferred where the source is masculine. 'Son of
    man' also preserves the established prophetic idiom better than more interpretive
    alternatives.
- source_word: תּוֹעֲבוֹת
  chosen: abominations
  alternatives:
  - detestable things
  - abominable practices
  lexicon: HALOT
  rationale: תּוֹעֵבָה language in Ezekiel carries strong covenantal and moral weight,
    often especially for idolatrous and defiling acts. 'Abominations' best preserves
    that gravity, though 'abominable practices' is a viable contextual alternative.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'their fathers.' Because the source is masculine
    and genealogical, the main text keeps 'fathers.' 'Ancestors' is possible but less
    precise and slightly flattens the familial rhetoric.
- source_word: הוֹדִיעֵם
  chosen: Make known to them
  alternatives:
  - declare to them
  - inform them of
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause to know, hence 'make known.' This preserves
    the causative force better than the simpler 'tell them,' while remaining natural
    English.
