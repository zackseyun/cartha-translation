theological_decisions:
- issue: Rendering of בֶּן אָדָם
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The phrase here is Ezekiel's prophetic title/address, not a direct messianic
    title claim. The translation preserves the Hebrew idiom and masculine form without
    importing later Christological meaning into this verse.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4 (Gender-accurate
    over gender-neutral)
- issue: Rendering of אֲבוֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The main text preserves the literal familial term and the rhetoric of
    inherited covenant infidelity. A more inclusive genealogical rendering is possible,
    but the source specifically says 'fathers.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4 (Gender-accurate
    over gender-neutral)
