theological_decisions:
- issue: Anthropomorphic description of God in תַּרְתִּי
  chosen_reading: that I had searched out for them
  alternative_readings:
  - that I had selected for them
  rationale: The Hebrew verb is retained in a way that preserves the anthropomorphic
    and relational texture of the text rather than smoothing it into a purely abstract
    divine decree. This does not imply ignorance in God; it reflects the prophetic
    idiom.
  doctrine_reference: Translation philosophy §1, §3
