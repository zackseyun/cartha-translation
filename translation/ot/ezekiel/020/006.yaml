id: EZK.20.6
reference: Ezekiel 20:6
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא נָשָׂ֤אתִי יָדִ/י֙ לָ/הֶ֔ם לְ/הֽוֹצִיאָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם
    אֶל אֶ֜רֶץ אֲשֶׁר תַּ֣רְתִּי לָ/הֶ֗ם זָבַ֤ת חָלָב֙ וּ/דְבַ֔שׁ צְבִ֥י הִ֖יא לְ/כָל
    הָ/אֲרָצֽוֹת־־־׃
translation:
  text: On that day I raised my hand to them to bring them out from the land of Egypt
    into a land that I had searched out for them, flowing with milk and honey; it
    is the glory of all lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I lifted up my hand to them,' that is, 'I swore to them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that I had selected for them'; the Hebrew literally has 'searched out'
      or 'spied out.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the beauty/splendor of all lands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשָׂאתִי יָדִי
  chosen: I raised my hand
  alternatives:
  - I lifted up my hand
  - I swore
  lexicon: HALOT
  rationale: The idiom literally means raising the hand, often in oath-taking contexts.
    Rendering it as 'raised my hand' preserves the concrete Hebrew image while allowing
    readers to infer the oath/pledge sense from context. The more interpretive 'swore'
    is possible but less transparent to the source wording.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: With the oath idiom, the preposition is naturally rendered 'to them,'
    indicating the people toward whom the raised-hand pledge was directed.
- source_word: לְהוֹצִיאָם
  chosen: to bring them out
  alternatives:
  - to lead them out
  - to bring them forth
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause to go out. 'Bring them out' is idiomatic
    modern English and fits exodus language well.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: A straightforward geographic expression. 'From the land of Egypt' reads
    smoothly after 'bring them out' without losing meaning.
- source_word: אֶל אֶרֶץ
  chosen: into a land
  alternatives:
  - to a land
  lexicon: HALOT
  rationale: '''Into a land'' matches the movement implied by the preceding infinitive
    and sounds natural in English.'
- source_word: אֲשֶׁר תַּרְתִּי לָהֶם
  chosen: that I had searched out for them
  alternatives:
  - that I had spied out for them
  - that I had selected for them
  - that I had sought out for them
  lexicon: HALOT
  rationale: The verb תור commonly means to explore, spy out, or seek out. Here God
    speaks anthropomorphically of identifying the land for Israel. 'Searched out'
    preserves the exploratory nuance better than the more abstract 'selected,' while
    avoiding the potentially misleading military connotation of 'spied out' in English.
- source_word: זָבַת חָלָב וּדְבַשׁ
  chosen: flowing with milk and honey
  alternatives:
  - a land flowing with milk and honey
  lexicon: HALOT
  rationale: This is the standard idiom for abundance and fertility. Because it directly
    modifies 'land,' the participial phrase 'flowing with milk and honey' is retained.
- source_word: צְבִי
  chosen: the glory
  alternatives:
  - the beauty
  - the splendor
  - the delight
  lexicon: HALOT
  rationale: צְבִי can denote beauty, splendor, or glory. 'Glory' best captures the
    elevated evaluative sense in prophetic diction and works well with the comparative
    phrase that follows.
- source_word: הִיא לְכָל הָאֲרָצוֹת
  chosen: it is the glory of all lands
  alternatives:
  - it is the most beautiful of all lands
  - it is an ornament among all lands
  lexicon: HALOT
  rationale: The phrase presents the land as preeminent among lands. 'The glory of
    all lands' is a relatively formal but still readable rendering that preserves
    the metaphorical force without flattening it into a mere superlative.
