id: EZK.20.19
reference: Ezekiel 20:19
source:
  edition: WLC
  text: אֲנִי֙ יְהוָ֣ה אֱלֹהֵי/כֶ֔ם בְּ/חֻקּוֹתַ֖/י לֵ֑כוּ וְ/אֶת מִשְׁפָּטַ֥/י שִׁמְר֖וּ וַ/עֲשׂ֥וּ אוֹתָֽ/ם־׃
translation:
  text: I am Yahweh your God; walk in my statutes, and keep my judgments and do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my ordinances' for 'my judgments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'With YHWH as subject and covenantal address to Israel, the plural form functions as the singular title ''God'' with 2mp suffix: ''your God.'''
- source_word: בְּחֻקּוֹתַי
  chosen: in my statutes
  alternatives:
  - by my statutes
  - according to my statutes
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to prescribed statutes/decrees. The preposition ב plus הלך idiomatically yields 'walk in,' expressing conduct ordered by God's statutes.
- source_word: לֵכוּ
  chosen: walk
  alternatives:
  - go
  - live
  lexicon: HALOT
  rationale: הלך in imperative with בְּחֻקּוֹתַי is a common covenantal idiom for ordering one's life, best preserved by 'walk' rather than the flatter 'go' or more interpretive 'live'.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים denotes legal judgments/ordinances. 'Judgments' preserves the juridical sense and pairs naturally with 'statutes,' though 'ordinances' is a viable alternative.
- source_word: שִׁמְרוּ
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: שׁמר in legal/covenantal contexts commonly means to keep or observe. 'Keep' is concise, idiomatic, and standard in command formulations.
- source_word: וַעֲשׂוּ אוֹתָם
  chosen: and do them
  alternatives:
  - and practice them
  - and carry them out
  lexicon: HALOT
  rationale: עשה with object pronoun stresses actual performance of the commands. 'Do them' is direct and preserves the Hebrew emphasis without paraphrase.
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic and, with the verbless clause naming YHWH, is naturally rendered 'I am' in English.
