theological_decisions:
- issue: Meaning of God's acting 'for the sake of my name'
  chosen_reading: God's action is motivated by concern for the public honor of his
    name among the nations, not by arbitrary self-interest.
  alternative_readings:
  - God acted merely to preserve reputation in a superficial sense
  rationale: In Ezekiel, 'name' signifies God's revealed character and covenantal
    honor. The translation preserves this theological concept without paraphrastic
    expansion.
- issue: Force of חלל with reference to God's name
  chosen_reading: Rendered as 'profaned' to preserve the covenantal-sacral sense of
    dishonoring God's holy name before the nations.
  alternative_readings:
  - defiled
  - dishonored
  rationale: 'The context is theological and public: the nations would misconstrue
    God''s character if Israel were destroyed in Egypt. ''Profaned'' best preserves
    the holiness dimension central to Ezekiel.'
