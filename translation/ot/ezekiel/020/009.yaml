id: EZK.20.9
reference: Ezekiel 20:9
source:
  edition: WLC
  text: וָ/אַ֨עַשׂ֙ לְמַ֣עַן שְׁמִ֔/י לְ/בִלְתִּ֥י הֵחֵ֛ל לְ/עֵינֵ֥י הַ/גּוֹיִ֖ם אֲשֶׁר
    הֵ֣מָּה בְ/תוֹכָ֑/ם אֲשֶׁ֨ר נוֹדַ֤עְתִּי אֲלֵי/הֶם֙ לְ/עֵ֣ינֵי/הֶ֔ם לְ/הוֹצִיאָ֖/ם
    מֵ/אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: But I acted for the sake of my name, so that it should not be profaned in
    the sight of the nations among whom they were, to whom I had made myself known
    in their sight by bringing them out of the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for my name’s sake.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that it should not be defiled' or 'so as not to profane it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to whom I revealed myself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעַשׂ
  chosen: But I acted
  alternatives:
  - But I did
  - Yet I acted
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make/act'). In this context it refers to Yahweh's
    decisive intervention in response to Israel's rebellion, so 'acted' is more idiomatic
    and contextually precise than the bare 'did.' The prefixed conjunction is rendered
    adversatively as 'But' to reflect the contrast with the preceding context.
- source_word: לְמַעַן שְׁמִי
  chosen: for the sake of my name
  alternatives:
  - for my name's sake
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom expressing action motivated by concern
    for the honor/reputation attached to God's name. 'For the sake of my name' is
    clear modern English while preserving the theological weight of the idiom.
- source_word: לְבִלְתִּי הֵחֵל
  chosen: so that it should not be profaned
  alternatives:
  - so that it should not be defiled
  - so as not to profane it
  lexicon: HALOT
  rationale: 'The infinitive construct of חלל here is passive/resultative in sense
    with God''s name as the implied object: the concern is that his name not be treated
    as common or dishonored. ''Profaned'' best captures the covenantal/religious force
    better than the more general ''defiled.'''
- source_word: לְעֵינֵי הַגּוֹיִם
  chosen: in the sight of the nations
  alternatives:
  - before the eyes of the nations
  - before the nations
  lexicon: HALOT
  rationale: This phrase denotes public visibility before the nations. 'In the sight
    of' is natural English and preserves the visual/public nuance.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In the Hebrew Bible גוים commonly means nations/peoples, often specifically
    non-Israelite nations. 'The nations' is the most contextually appropriate and
    least anachronistic rendering here.
- source_word: אֲשֶׁר הֵמָּה בְתוֹכָם
  chosen: among whom they were
  alternatives:
  - in whose midst they were
  - among whom they lived
  lexicon: HALOT
  rationale: The clause identifies the nations in whose midst Israel was living. 'Among
    whom they were' is concise and faithful to the Hebrew wording.
- source_word: אֲשֶׁר נוֹדַעְתִּי אֲלֵיהֶם
  chosen: to whom I had made myself known
  alternatives:
  - to whom I revealed myself
  - to whom I became known
  lexicon: HALOT
  rationale: The Niphal of ידע can be stative/passive ('be known') or effectively
    reflexive in context. Here God is the subject and the sense is his self-disclosure
    to the nations through his dealings with Israel. 'Had made myself known' expresses
    that nuance clearly.
- source_word: לְעֵינֵיהֶם
  chosen: in their sight
  alternatives:
  - before their eyes
  lexicon: HALOT
  rationale: This repeats the public/visible dimension of God's self-disclosure. 'In
    their sight' maintains the repetition without awkwardness.
- source_word: לְהוֹצִיאָם
  chosen: by bringing them out
  alternatives:
  - when I brought them out
  - to bring them out
  lexicon: HALOT
  rationale: The infinitive explains the means or occasion of God's self-disclosure
    to the nations. 'By bringing them out' best captures the instrumental nuance in
    smooth English.
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  lexicon: HALOT
  rationale: '''Land of Egypt'' is the standard biblical expression, and ''out of''
    fits the exodus motif and the preceding verb ''bringing them out''.'
