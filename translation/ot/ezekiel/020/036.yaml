id: EZK.20.36
reference: Ezekiel 20:36
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֤ר נִשְׁפַּ֨טְתִּי֙ אֶת אֲב֣וֹתֵי/כֶ֔ם בְּ/מִדְבַּ֖ר אֶ֣רֶץ מִצְרָ֑יִם כֵּ֚ן אִשָּׁפֵ֣ט אִתְּ/כֶ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃
translation:
  text: Just as I entered into judgment with your fathers in the wilderness of the land of Egypt, so I will enter into judgment with you, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I judged your fathers ... so I will judge you.' The Hebrew verb can be rendered more simply as 'judge,' but the wording 'enter into judgment' preserves the formal judicial nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  lexicon: HALOT
  rationale: Introduces a comparison between past and future divine action. 'Just as' clearly signals the correspondence carried by כַּאֲשֶׁר ... כֵּן.
- source_word: נִשְׁפַּטְתִּי
  chosen: I entered into judgment
  alternatives:
  - I judged
  - I contended in judgment
  lexicon: HALOT
  rationale: The Niphal of שׁפט here is not merely a simple verdict but a judicial dealing. 'Entered into judgment' preserves the formal, covenant-lawsuit nuance and matches the parallel future verb.
- source_word: אֶת אֲבוֹתֵיכֶם
  chosen: with your fathers
  alternatives:
  - your fathers
  lexicon: HALOT
  rationale: Although אֶת often marks the direct object, with שׁפט in this construction English idiom is better represented by 'with your fathers,' reflecting judicial engagement rather than a bare object.
- source_word: בְּמִדְבַּר אֶרֶץ מִצְרָיִם
  chosen: in the wilderness of the land of Egypt
  alternatives:
  - in the wilderness of Egypt
  - in the desert land of Egypt
  lexicon: HALOT
  rationale: 'A relatively formal rendering preserves all lexical elements: ''wilderness'' for מִדְבָּר and ''land of Egypt'' for אֶרֶץ מִצְרָיִם. This likely refers to the wilderness associated with the exodus generation; the fuller phrase is retained rather than simplified.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - in the same way
  - thus
  lexicon: HALOT
  rationale: Carries the second half of the comparison succinctly and naturally in English.
- source_word: אִשָּׁפֵט
  chosen: I will enter into judgment
  alternatives:
  - I will judge
  - I will contend in judgment
  lexicon: HALOT
  rationale: Kept parallel with the earlier נִשְׁפַּטְתִּי for consistency and to preserve the judicial/covenantal force of the Niphal form.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition naturally supports 'with you.' While the context is adversative, 'against you' would over-specify what the Hebrew leaves in the judicial idiom.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is well rendered by the prophetic formula 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes YHWH, 'Lord GOD' avoids the awkward 'Lord LORD' and follows established English convention while still translating both titles.
