id: EZK.44.21
reference: Ezekiel 44:21
source:
  edition: WLC
  text: וְ/יַ֥יִן לֹֽא יִשְׁתּ֖וּ כָּל כֹּהֵ֑ן בְּ/בוֹאָ֖/ם אֶל הֶ/חָצֵ֥ר הַ/פְּנִימִֽית־־־׃
translation:
  text: No priest shall drink wine when they enter the inner court.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every priest shall not drink wine upon entering the inner court.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: יַיִן straightforwardly denotes 'wine.' The prefixed conjunction is not
    separately represented in English because the verse begins a prohibition naturally
    without 'and.'
- source_word: לֹא
  chosen: No / shall not
  alternatives:
  - not
  lexicon: HALOT
  rationale: The negation governs the verbal clause. In idiomatic English legal/prohibitive
    style, this is best expressed with 'No priest shall...' rather than a more wooden
    'and wine they shall not drink.'
- source_word: יִשְׁתּוּ
  chosen: shall drink
  alternatives:
  - may drink
  - drink
  lexicon: HALOT
  rationale: The imperfect in this legal context expresses prohibition. 'Shall drink'
    under negation gives clear prescriptive force in English.
- source_word: כָּל כֹּהֵן
  chosen: No priest
  alternatives:
  - every priest
  - any priest
  lexicon: HALOT
  rationale: Literally 'every priest,' but in English prohibitions 'No priest' is
    the most natural equivalent and preserves the universal scope.
- source_word: בְּ/בוֹאָם
  chosen: when they enter
  alternatives:
  - in their entering
  - upon entering
  lexicon: HALOT
  rationale: The preposition with infinitive construct plus 3mp suffix means 'when
    they enter' or 'at their entering.' This temporal rendering is natural English.
    The plural suffix reflects the collective sense of 'priest' as a class, so English
    plural reference is appropriate.
- source_word: אֶל
  chosen: enter
  alternatives:
  - into
  - to
  lexicon: HALOT
  rationale: The directional preposition is absorbed into the English verb phrase
    'enter the inner court,' which is more idiomatic than 'go into the inner court'
    here.
- source_word: הֶחָצֵר הַפְּנִימִית
  chosen: the inner court
  alternatives:
  - the inner courtyard
  lexicon: HALOT
  rationale: חָצֵר denotes a court/courtyard. 'Inner court' is concise, standard in
    temple-context English, and preserves the architectural sense.
