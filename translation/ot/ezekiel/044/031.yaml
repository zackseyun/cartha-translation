id: EZK.44.31
reference: Ezekiel 44:31
source:
  edition: WLC
  text: כָּל נְבֵלָה֙ וּ/טְרֵפָ֔ה מִן הָ/ע֖וֹף וּ/מִן הַ/בְּהֵמָ֑ה לֹ֥א יֹאכְל֖וּ
    הַ/כֹּהֲנִֽים־־־׃פ
translation:
  text: The priests shall not eat any carcass or torn animal, whether from birds or
    from livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any animal that dies naturally or is torn by beasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: With the singular nouns that follow in a prohibition, כָּל is best rendered
    idiomatically as 'any' in English rather than the less natural 'every' or 'all.'
    This preserves the comprehensive force of the ban.
- source_word: נְבֵלָה
  chosen: carcass
  alternatives:
  - that which dies naturally
  - dead body
  lexicon: HALOT
  rationale: נְבֵלָה refers to an animal carcass, especially one not properly slaughtered.
    'Carcass' is concise and natural in English, and fits the dietary-law context
    better than the broader 'dead body.'
- source_word: טְרֵפָה
  chosen: torn animal
  alternatives:
  - animal torn by beasts
  - torn flesh
  lexicon: HALOT
  rationale: טְרֵפָה denotes an animal torn, typically by wild beasts. 'Torn animal'
    preserves the concrete sense without over-specifying agents not explicit in this
    verse.
- source_word: מִן הָעוֹף
  chosen: from birds
  alternatives:
  - from fowl
  - of birds
  lexicon: HALOT
  rationale: עוֹף is a broad term for flying creatures/birds in dietary contexts.
    'Birds' is the clearest modern English rendering; 'fowl' is more traditional but
    less natural for contemporary readers.
- source_word: וּמִן הַבְּהֵמָה
  chosen: from livestock
  alternatives:
  - from animals
  - from cattle
  lexicon: HALOT
  rationale: בְּהֵמָה here contrasts with birds and refers broadly to domesticated
    land animals. 'Livestock' captures that category more precisely than the generic
    'animals,' while 'cattle' would be too narrow.
- source_word: לֹא יֹאכְלוּ
  chosen: shall not eat
  alternatives:
  - must not eat
  - are not to eat
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal/instructional context expresses prohibition.
    'Shall not eat' preserves the formal legal force appropriate to priestly legislation.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Definite reference to the priestly class in this temple-law context;
    'the priests' is straightforward and contextually precise.
