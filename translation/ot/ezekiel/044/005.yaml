id: EZK.44.5
reference: Ezekiel 44:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלַ֜/י יְהֹוָ֗ה בֶּן אָדָ֡ם שִׂ֣ים לִבְּ/ךָ֩ וּ/רְאֵ֨ה בְ/עֵינֶ֜י/ךָ וּ/בְ/אָזְנֶ֣י/ךָ שְּׁמָ֗ע אֵ֣ת כָּל אֲשֶׁ֤ר אֲנִי֙ מְדַבֵּ֣ר אֹתָ֔/ךְ לְ/כָל חֻקּ֥וֹת בֵּית יְהוָ֖ה וּ/לְ/כָל תורת/ו וְ/שַׂמְתָּ֤ לִבְּ/ךָ֙ לִ/מְב֣וֹא הַ/בַּ֔יִת בְּ/כֹ֖ל מוֹצָאֵ֥י הַ/מִּקְדָּֽשׁ־־־־־׃
translation:
  text: And Yahweh said to me, “Son of man, set your heart, and see with your eyes, and hear with your ears all that I am speaking to you concerning all the statutes of the house of Yahweh and all its laws. Set your heart on the entrance of the temple and on all the exits of the sanctuary.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pay attention' for 'set your heart'; the Hebrew idiom literally speaks of directing the heart, meaning focused attention and concern.
    reason: lexical_alternative
  - marker: b
    text: Or 'all its instructions' for 'all its laws'; the Hebrew plural can denote prescribed teachings or regulations, not only legislation in a narrow sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD' to follow Jewish reverence tradition and the LXX pattern.
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A relatively formal rendering preserves the idiom and its literary continuity better than a flattening paraphrase.
- source_word: שִׂים לִבְּךָ
  chosen: set your heart
  alternatives:
  - pay attention
  - set your mind
  lexicon: HALOT
  rationale: Literally 'set your heart.' In Hebrew anthropology לֵב/לֵבָב includes attention, intention, and inner focus. 'Set your heart' preserves the metaphor while remaining understandable.
- source_word: וּרְאֵה בְעֵינֶיךָ
  chosen: see with your eyes
  alternatives:
  - look carefully
  - see
  lexicon: HALOT
  rationale: The Hebrew is emphatic and sensory. Retaining 'with your eyes' preserves the concrete parallelism with 'hear with your ears.'
- source_word: וּבְאָזְנֶיךָ שְׁמָע
  chosen: hear with your ears
  alternatives:
  - listen carefully
  - hear
  lexicon: HALOT
  rationale: As with the previous clause, the bodily expression is retained to preserve the rhetorical force of the command.
- source_word: מְדַבֵּר אֹתָךְ
  chosen: I am speaking to you
  alternatives:
  - I speak with you
  - I am telling you
  lexicon: HALOT
  rationale: The idiom with דבר plus object marker and pronoun is naturally rendered in English as speaking to someone. The participle supports the progressive sense 'am speaking.'
- source_word: לְכָל חֻקּוֹת בֵּית יְהוָה
  chosen: concerning all the statutes of the house of the LORD
  alternatives:
  - about all the statutes of the temple of the LORD
  - for all the statutes of the house of the LORD
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as reference/topic: what God is speaking concerns these regulations. ''House of the LORD'' preserves the Hebrew expression rather than prematurely substituting ''temple'' in this clause.'
- source_word: תּוֹרֹתָיו
  chosen: its laws
  alternatives:
  - its instructions
  - its teachings
  lexicon: HALOT
  rationale: Plural תורות refers here to the temple's prescribed directives/regulations. 'Laws' fits the legal-cultic context, while 'its' refers back to the house/temple.
- source_word: וְשַׂמְתָּ לִבְּךָ
  chosen: Set your heart
  alternatives:
  - Pay attention
  - Fix your attention
  lexicon: HALOT
  rationale: The repeated idiom is rendered consistently with the earlier occurrence to preserve the Hebrew repetition.
- source_word: לִמְבוֹא הַבַּיִת
  chosen: on the entrance of the temple
  alternatives:
  - to the entrance of the house
  - on the entry of the temple
  lexicon: HALOT
  rationale: מבוא denotes entrance/entry. Here 'temple' is a natural contextual rendering of הבית because the immediate concern is access to the sanctuary complex.
- source_word: בְּכָל מוֹצָאֵי הַמִּקְדָּשׁ
  chosen: on all the exits of the sanctuary
  alternatives:
  - and all the exits of the sanctuary
  - and every exit of the holy place
  lexicon: HALOT
  rationale: מוצאים are places of going out, hence 'exits.' The repeated preposition is understood with the second object. 'Sanctuary' is the standard rendering of מקדש in this cultic context.
