theological_decisions:
- issue: Cultic terminology for חֹל in contrast with קֹדֶשׁ
  chosen_reading: common
  alternative_readings:
  - profane
  - ordinary
  rationale: The verse concerns priestly instruction in distinctions of holiness and
    purity. 'Common' preserves the technical contrast with 'holy' without overstating
    moral defilement; 'profane' is possible but can suggest active desecration rather
    than merely non-holy status.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
