id: EZK.44.23
reference: Ezekiel 44:23
source:
  edition: WLC
  text: וְ/אֶת עַמִּ֣/י יוֹר֔וּ בֵּ֥ין קֹ֖דֶשׁ לְ/חֹ֑ל וּ/בֵין טָמֵ֥א לְ/טָה֖וֹר יוֹדִעֻֽ/ם־־׃
translation:
  text: They shall teach my people the difference between the holy and the common,
    and make them know the difference between the unclean and the clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy and the profane.'
    reason: lexical_alternative
  - marker: b
    text: Or 'cause them to discern between the unclean and the clean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹרוּ
  chosen: shall teach
  alternatives:
  - will instruct
  - shall give instruction
  lexicon: HALOT
  rationale: Hiphil of ירה here carries the sense of instructing/teaching, especially
    in priestly legal-cultic contexts. 'Teach' is natural English and preserves the
    priests' didactic role.
- source_word: בֵּין קֹדֶשׁ לְחֹל
  chosen: the difference between the holy and the common
  alternatives:
  - between holy and profane
  - between the sacred and the ordinary
  lexicon: HALOT
  rationale: The phrase marks distinction in cultic status. 'Holy' is the standard
    rendering for קֹדֶשׁ. For חֹל, 'common' best captures what is non-holy without
    importing the stronger moral overtones that 'profane' can carry in English. 'The
    difference between' makes explicit the comparative force of בֵּין ... לְ.
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: In priestly and Ezekiel contexts, טָמֵא is standardly rendered 'unclean,'
    preserving ritual/cultic connotations familiar in English Bible usage.
- source_word: טָהוֹר
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: Paired with טָמֵא, 'clean' is the most idiomatic and consistent English
    rendering in ritual contexts.
- source_word: יוֹדִעֻם
  chosen: make them know
  alternatives:
  - cause them to discern
  - inform them
  lexicon: HALOT
  rationale: 'Hiphil of ידע is causative: ''cause to know.'' ''Make them know'' preserves
    that causative force while remaining readable. The object suffix refers back to
    ''my people.'''
- source_word: וְאֶת עַמִּי
  chosen: my people
  alternatives:
  - and my people
  lexicon: HALOT
  rationale: The direct-object marker with prefixed conjunction introduces the object
    of the first verb. English does not require a separate initial 'and' before the
    object, so 'my people' is the natural rendering.
