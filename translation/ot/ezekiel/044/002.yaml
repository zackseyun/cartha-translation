theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and does not import
    additional theological claims beyond the covenant name's standard English representation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Generic masculine אִישׁ
  chosen_reading: no man
  alternative_readings:
  - no one
  - no person
  rationale: The Hebrew uses a masculine singular noun with generic force. Per the
    project's gender-accurate policy, the translation keeps the masculine form rather
    than neutralizing it, while the generic sense can be noted in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
