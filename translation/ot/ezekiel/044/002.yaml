id: EZK.44.2
reference: Ezekiel 44:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלַ֜/י יְהוָ֗ה הַ/שַּׁ֣עַר הַ/זֶּה֩ סָג֨וּר יִהְיֶ֜ה לֹ֣א יִפָּתֵ֗חַ
    וְ/אִישׁ֙ לֹא יָ֣בֹא ב֔/וֹ כִּ֛י יְהוָ֥ה אֱלֹהֵֽי יִשְׂרָאֵ֖ל בָּ֣א ב֑/וֹ וְ/הָיָ֖ה
    סָגֽוּר־־׃
translation:
  text: And the LORD said to me, “This gate shall remain shut; it shall not be opened,
    and no man shall enter through it, because the LORD, the God of Israel, has entered
    through it. Therefore it shall remain shut.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no one shall enter through it.' The Hebrew says 'no man,' using a masculine
      singular form with generic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and common English Bible convention.
- source_word: הַשַּׁעַר הַזֶּה
  chosen: this gate
  alternatives:
  - that gate
  lexicon: HALOT
  rationale: The demonstrative is proximal ('this'), and 'gate' is the plain sense
    of שַׁעַר in the temple-vision context.
- source_word: סָגוּר יִהְיֶה
  chosen: shall remain shut
  alternatives:
  - shall be shut
  - shall stay closed
  lexicon: HALOT
  rationale: The predicate adjective with היה expresses a continuing state. 'Remain
    shut' captures the durative force naturally in English better than a simple future
    stative.
- source_word: לֹא יִפָּתֵחַ
  chosen: it shall not be opened
  alternatives:
  - it shall not open
  lexicon: HALOT
  rationale: The Niphal of פתח is passive/reflexive; passive English best reflects
    the form here.
- source_word: וְאִישׁ לֹא יָבֹא בוֹ
  chosen: and no man shall enter through it
  alternatives:
  - and no one shall enter it
  - and no person shall come into it
  lexicon: HALOT
  rationale: אִישׁ is grammatically masculine singular used generically. Per translation
    philosophy, gender-accurate rendering is preferred, so 'no man' is retained. 'Enter
    through it' is idiomatic for יָבֹא בוֹ with a gate.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: The conjunction gives the reason for the gate's closure. 'Because' is
    clearer in modern English than 'for' while preserving the causal sense.
- source_word: יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  chosen: the LORD, the God of Israel
  alternatives:
  - the LORD God of Israel
  lexicon: HALOT
  rationale: The appositional structure is made explicit with commas for readable
    modern English while preserving the covenantal title.
- source_word: בָּא בוֹ
  chosen: has entered through it
  alternatives:
  - entered it
  - came through it
  lexicon: HALOT
  rationale: The qatal verb refers to a completed action prior to the commanded state
    of closure. Present perfect English ('has entered') appropriately marks prior
    completed action with present relevance. 'Through it' fits the spatial sense with
    a gate.
- source_word: וְהָיָה סָגוּר
  chosen: Therefore it shall remain shut
  alternatives:
  - and it shall be shut
  - and it shall remain shut
  lexicon: HALOT
  rationale: The conjunction here is consequential in context, restating the result
    of the reason just given. 'Therefore' makes the logic explicit in natural English.
    'Remain shut' preserves the repeated emphasis on continued closure.
