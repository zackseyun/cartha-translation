id: EZK.44.29
reference: Ezekiel 44:29
source:
  edition: WLC
  text: הַ/מִּנְחָה֙ וְ/הַ/חַטָּ֣את וְ/הָ/אָשָׁ֔ם הֵ֖מָּה יֹֽאכְל֑וּ/ם וְ/כָל חֵ֥רֶם
    בְּ/יִשְׂרָאֵ֖ל לָ/הֶ֥ם יִהְיֶֽה־׃
translation:
  text: They shall eat the grain offering, the sin offering, and the guilt offering,
    and every devoted thing in Israel shall be theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the purification offering' for 'the sin offering.'
    reason: lexical_alternative
  - marker: b
    text: '''Devoted thing'' translates Hebrew ḥerem, something irrevocably set apart
      to God; in other contexts the term can carry the sense ''devoted to destruction.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial contexts commonly denotes the cereal/grain
    offering rather than a generic gift. 'Grain offering' is the clearest modern cultic
    equivalent and distinguishes it from the following animal-related offerings.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the sacrifice associated with sin/purification.
    In this list of priestly dues alongside other offerings, the sacrificial sense
    is required. 'Sin offering' is the standard transparent rendering; 'purification
    offering' is a viable contextual alternative but less expected in English.
- source_word: הָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the reparation offering
  - the compensation offering
  lexicon: HALOT
  rationale: אָשָׁם in sacrificial law refers to the offering for guilt/liability.
    'Guilt offering' is the most established and understandable English rendering,
    while alternatives emphasize restitution but are less conventional.
- source_word: הֵמָּה יֹאכְלוּם
  chosen: They shall eat
  alternatives:
  - They shall eat them
  lexicon: HALOT
  rationale: The pronoun הֵמָּה is emphatic ('they themselves'), and the suffix on
    יֹאכְלוּם means 'eat them.' English normally omits the object after a list already
    supplied, so 'They shall eat' is smoother while preserving the sense that these
    offerings are for priestly consumption.
- source_word: חֵרֶם
  chosen: every devoted thing
  alternatives:
  - everything devoted to destruction
  - every dedicated thing
  lexicon: HALOT
  rationale: חֵרֶם denotes something devoted or banned, often irrevocably set apart
    to God. In this priestly-property context, 'devoted thing' best preserves the
    technical cultic sense without importing the warfare nuance 'devoted to destruction,'
    which would mislead here.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The phrase marks the sphere within which such devoted things occur. 'In
    Israel' is the most natural and sufficiently precise rendering.
- source_word: לָהֶם יִהְיֶה
  chosen: shall be theirs
  alternatives:
  - shall belong to them
  lexicon: HALOT
  rationale: This idiom expresses possession or entitlement. 'Shall be theirs' is
    concise, natural English and fits the legal-allotment context.
