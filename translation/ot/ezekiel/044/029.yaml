theological_decisions:
- issue: Rendering of sacrificial terminology in a priestly allotment context
  chosen_reading: Use established cultic terms ('grain offering,' 'sin offering,'
    'guilt offering') rather than flattening them into generic offerings.
  alternative_readings:
  - Use more interpretive renderings such as 'purification offering' or 'reparation
    offering'
  rationale: The verse enumerates specific priestly dues from Israel's sacrificial
    system. Preserving the distinct categories maintains the legal-theological structure
    of the text without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Meaning of חֵרֶם in this context
  chosen_reading: Render as 'devoted thing' in the main text.
  alternative_readings:
  - '''dedicated thing'''
  - '''devoted to destruction'''
  rationale: The context concerns what belongs to the priests, not an act of destruction.
    The translation preserves the technical sense of something irrevocably devoted
    to God while avoiding a misleading warfare connotation.
  doctrine_reference: Translation philosophy §§1, 3, 5
