theological_decisions:
- issue: Scope of the marriage regulation in the temple vision
  chosen_reading: Render the verse as priestly legislation without importing later
    doctrinal or moral conclusions beyond the text.
  alternative_readings:
  - Treat as a timeless universal marriage rule
  - Soften the restriction into a general preference
  rationale: The verse is part of Ezekiel's priestly temple regulations and should
    be translated straightforwardly as such. The wording should preserve the legal
    restriction and exception without extending or minimizing its scope.
  doctrine_reference: Translation philosophy §§1, 3, 6
