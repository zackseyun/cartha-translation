id: EZK.44.22
reference: Ezekiel 44:22
source:
  edition: WLC
  text: וְ/אַלְמָנָה֙ וּ/גְרוּשָׁ֔ה לֹֽא יִקְח֥וּ לָ/הֶ֖ם לְ/נָשִׁ֑ים כִּ֣י אִם בְּתוּלֹ֗ת
    מִ/זֶּ֨רַע֙ בֵּ֣ית יִשְׂרָאֵ֔ל וְ/הָֽ/אַלְמָנָה֙ אֲשֶׁ֣ר תִּֽהְיֶ֣ה אַלְמָנָ֔ה
    מִ/כֹּהֵ֖ן יִקָּֽחוּ־־׃
translation:
  text: They shall not take for themselves as wives a widow or a divorced woman, but
    only virgins from the offspring of the house of Israel; however, they may take
    a widow who is the widow of a priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'a widow who became a widow from a priest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָנָה
  chosen: widow
  lexicon: HALOT
  rationale: 'Standard sense: a woman whose husband has died. Retained consistently
    in both occurrences.'
- source_word: גְרוּשָׁה
  chosen: divorced woman
  alternatives:
  - woman put away
  - divorcee
  lexicon: HALOT
  rationale: The passive participial form denotes a woman who has been divorced. 'Divorced
    woman' is clear modern English and preserves the legal-marital status.
- source_word: יִקְחוּ ... לְנָשִׁים
  chosen: take for themselves as wives
  alternatives:
  - marry
  - take as wives
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'take' with 'for wives.' This rendering
    preserves the idiom's force while remaining natural in English. 'Marry' is possible
    but slightly flattens the formal legal phrasing.
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except
  - rather only
  lexicon: HALOT
  rationale: This restrictive construction introduces the permitted exception. 'But
    only' clearly marks the contrast and limitation.
- source_word: בְּתוּלוֹת
  chosen: virgins
  alternatives:
  - young women
  lexicon: HALOT
  rationale: The term specifically denotes virgins, not merely unmarried young women.
    The more specific rendering should be preserved.
- source_word: מִזֶּרַע בֵּית יִשְׂרָאֵל
  chosen: from the offspring of the house of Israel
  alternatives:
  - from the descendants of the house of Israel
  - from the seed of the house of Israel
  lexicon: HALOT
  rationale: זֶרַע is literally 'seed/offspring.' 'Offspring' is natural English that
    preserves descent language without unnecessary archaism. 'House of Israel' is
    retained as a covenantal-national expression.
- source_word: וְהָאַלְמָנָה אֲשֶׁר תִּהְיֶה אַלְמָנָה מִכֹּהֵן
  chosen: however, they may take a widow who is the widow of a priest
  alternatives:
  - but a widow who is a priest's widow they may take
  - except a widow who became a widow from a priest
  lexicon: HALOT
  rationale: The clause gives an additional permitted category. The Hebrew phrase
    literally reads 'a widow who is/became a widow from a priest,' meaning a widow
    whose deceased husband was a priest. The chosen rendering makes that relationship
    explicit in idiomatic English.
- source_word: מִן in מִכֹּהֵן
  chosen: of
  alternatives:
  - from
  - belonging to
  lexicon: HALOT
  rationale: 'Although the preposition is literally ''from,'' in this context it marks
    source/association: she became a widow by reason of a priest husband. English
    expresses this most naturally as ''widow of a priest.'''
