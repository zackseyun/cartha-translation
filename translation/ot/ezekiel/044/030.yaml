id: EZK.44.30
reference: Ezekiel 44:30
source:
  edition: WLC
  text: וְ/רֵאשִׁית֩ כָּל בִּכּ֨וּרֵי כֹ֜ל וְ/כָל תְּר֣וּמַת כֹּ֗ל מִ/כֹּל֙ תְּרוּמ֣וֹתֵי/כֶ֔ם
    לַ/כֹּהֲנִ֖ים יִֽהְיֶ֑ה וְ/רֵאשִׁ֤ית עֲרִסֽוֹתֵי/כֶם֙ תִּתְּנ֣וּ לַ/כֹּהֵ֔ן לְ/הָנִ֥יחַ
    בְּרָכָ֖ה אֶל בֵּיתֶֽ/ךָ־־־׃
translation:
  text: And the first of all the firstfruits of everything, and every contribution
    from all your contributions, shall belong to the priests. You shall give the first
    of your dough to the priest, to cause a blessing to rest on your house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every offering from all your offerings.' The Hebrew term refers to a
      portion set apart and contributed for sacred use.
    reason: lexical_alternative
  - marker: b
    text: Or 'the first of your kneaded dough'; the Hebrew term can refer to dough
      or, by extension, the kneading batch.
    reason: lexical_alternative
  - marker: c
    text: That is, so that blessing may rest upon your household.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: the first / the first of
  alternatives:
  - firstfruits
  - best part
  - beginning
  lexicon: HALOT
  rationale: רֵאשִׁית denotes the first or chief portion. In the first clause it functions
    with בִּכּוּרֵי, so rendering it as 'the first of all the firstfruits' preserves
    the layered Hebrew emphasis rather than collapsing both terms into a single English
    word. In the second occurrence with עֲרִסוֹתֵיכֶם it refers to the first portion
    of dough.
- source_word: בִּכּוּרֵי
  chosen: firstfruits
  alternatives:
  - first produce
  - earliest produce
  lexicon: HALOT
  rationale: Standard cultic term for the first yield offered to God. 'Firstfruits'
    is the most natural and established English equivalent and fits the temple-law
    context.
- source_word: תְּרוּמַת / תְּרוּמוֹתֵיכֶם
  chosen: contribution / your contributions
  alternatives:
  - offering
  - heave offering
  - gift contribution
  lexicon: HALOT
  rationale: תְּרוּמָה is a lifted-off contribution set apart for sacred use. 'Contribution'
    communicates the dedicated portion without importing the archaic technical term
    'heave offering.' The singular with the following plural is preserved as 'every
    contribution from all your contributions' to reflect the Hebrew structure.
- source_word: לַכֹּהֲנִים יִהְיֶה
  chosen: shall belong to the priests
  alternatives:
  - shall be for the priests
  - shall be the priests'
  lexicon: HALOT
  rationale: This expresses entitlement or assignment. 'Shall belong to the priests'
    is idiomatic modern English and preserves the legal force.
- source_word: עֲרִסוֹתֵיכֶם
  chosen: your dough
  alternatives:
  - your kneading troughs
  - your dough batches
  lexicon: HALOT
  rationale: Though the noun can denote kneading troughs or dough, in this offering
    context it refers metonymically to dough prepared from grain, as in the first
    portion given to the priest. 'Your dough' best conveys the sense in contemporary
    English.
- source_word: תִּתְּנוּ לַכֹּהֵן
  chosen: You shall give ... to the priest
  alternatives:
  - you shall present ... to the priest
  lexicon: HALOT
  rationale: Simple legal instruction with second person plural verb and singular
    collective priestly recipient. English singular 'the priest' reflects the Hebrew.
- source_word: לְהָנִיחַ
  chosen: to cause ... to rest
  alternatives:
  - to make ... rest
  - to bring
  - to set
  lexicon: HALOT
  rationale: 'Hiphil infinitive of נוח means to cause to rest or settle. Here it governs
    ''blessing'' and expresses the result of the gift: the blessing comes to rest
    upon the household.'
- source_word: בְּרָכָה
  chosen: a blessing
  alternatives:
  - blessing
  - prosperity
  lexicon: HALOT
  rationale: The noun denotes blessing in a broad covenantal sense. The indefinite
    article is natural in English though absent in Hebrew.
- source_word: אֶל בֵּיתֶךָ
  chosen: on your house
  alternatives:
  - upon your house
  - to your house
  - on your household
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with לְהָנִיחַ and בְּרָכָה the idiomatic
    sense is that blessing comes to rest upon the house. 'House' can imply household,
    but the concrete term is retained in the main text.
