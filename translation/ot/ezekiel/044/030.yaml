theological_decisions:
- issue: Nature of the promised blessing on the house
  chosen_reading: The verse states that giving the first portion to the priest results
    in blessing resting on the giver's house, without specifying the exact form of
    that blessing.
  alternative_readings:
  - material prosperity promise
  - general covenant favor on the household
  rationale: The Hebrew speaks simply of 'blessing' resting on the house. The translation
    preserves that theological breadth and does not narrow it to prosperity alone
    or to a purely spiritualized sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
