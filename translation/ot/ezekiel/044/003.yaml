theological_decisions:
- issue: Identity and status of the נָשִׂיא in Ezekiel's temple vision
  chosen_reading: Render neutrally as 'the prince' without identifying him as the
    Messiah or as a merely secular official in the translation itself.
  alternative_readings:
  - a messianic prince
  - a Davidic/civic ruler distinct from the Messiah
  rationale: The verse grants a special privilege to the prince but does not itself
    resolve broader interpretive debates about his identity in Ezekiel. The translation
    preserves the title without importing a doctrinal conclusion not explicit in the
    text.
  doctrine_reference: Affirmations; Translation philosophy §3
