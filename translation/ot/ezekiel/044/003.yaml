id: EZK.44.3
reference: Ezekiel 44:3
source:
  edition: WLC
  text: אֶֽת הַ/נָּשִׂ֗יא נָ֥שִׂיא ה֛וּא יֵֽשֶׁב בּ֥/וֹ לֶ/אֱכָול לֶ֖חֶם לִ/פְנֵ֣י
    יְהוָ֑ה מִ/דֶּ֨רֶךְ אֻלָ֤ם הַ/שַּׁ֨עַר֙ יָב֔וֹא וּ/מִ/דַּרְכּ֖/וֹ יֵצֵֽא־־־׃
translation:
  text: As for the prince, because he is the prince, he may sit in it to eat bread
    before the LORD. He shall enter by way of the porch of the gate, and shall go
    out by the same way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he shall go out by the way he came in.' The Hebrew literally says,
      'from his way he shall go out,' likely meaning the same route just mentioned.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת הַנָּשִׂיא
  chosen: As for the prince
  alternatives:
  - But as for the prince
  - The prince
  lexicon: HALOT
  rationale: 'The fronted object marker אֶת with the definite noun functions to mark
    the topic emphatically: ''as for the prince.'' Rendering it this way preserves
    the dislocation/emphasis better than a bare ''the prince.'''
- source_word: נָשִׂיא
  chosen: prince
  alternatives:
  - leader
  - ruler
  lexicon: HALOT
  rationale: נָשִׂיא in Ezekiel commonly denotes a recognized civic ruler/prince rather
    than a generic 'leader.' 'Prince' preserves the established Ezekiel usage without
    importing later messianic claims.
- source_word: נָשִׂיא הוּא
  chosen: because he is the prince
  alternatives:
  - he alone, as prince
  - he is the prince
  lexicon: HALOT
  rationale: The repetition plus pronoun is emphatic and gives the reason for the
    exception to the gate restriction. 'Because he is the prince' makes the causal
    force clear in natural English while preserving the emphasis.
- source_word: יֵשֶׁב בּוֹ
  chosen: he may sit in it
  alternatives:
  - he shall sit in it
  - he may sit there
  lexicon: HALOT
  rationale: The imperfect here expresses permitted/authorized action in context,
    not merely future tense. 'In it' refers to the gate area just mentioned in the
    surrounding context; this keeps the local reference explicit.
- source_word: לֶאֱכָל לֶחֶם
  chosen: to eat bread
  alternatives:
  - to eat a meal
  - to partake of bread
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'eat bread,' which can mean taking a
    meal. The literal wording is retained because it is clear in English and preserves
    the cultic/formal tone.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal/cultic expression. Per doctrine, יְהוָה is rendered
    'the LORD.' 'Before' preserves the spatial and liturgical sense.
- source_word: מִדֶּרֶךְ אֻלָם הַשַּׁעַר
  chosen: by way of the porch of the gate
  alternatives:
  - through the vestibule of the gate
  - by the way of the gate portico
  lexicon: HALOT
  rationale: אֻלָם denotes a porch/vestibule. 'Porch of the gate' is clear modern
    English and fits temple architecture. 'By way of' reflects מִדֶּרֶךְ idiomatically.
- source_word: יָבֹוא
  chosen: He shall enter
  alternatives:
  - he is to enter
  - he may enter
  lexicon: HALOT
  rationale: In this legal/instructional context, the imperfect has directive force.
    'He shall enter' communicates prescribed procedure naturally in English.
- source_word: וּמִדַּרְכּוֹ יֵצֵא
  chosen: and shall go out by the same way
  alternatives:
  - and shall go out by his way
  - and shall go out by the way he came
  lexicon: HALOT
  rationale: 'The suffix on ''way'' most naturally refers back to the route just specified:
    he exits by that same route. ''By the same way'' makes the procedural symmetry
    explicit and idiomatic.'
