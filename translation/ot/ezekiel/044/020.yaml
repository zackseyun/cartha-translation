id: EZK.44.20
reference: Ezekiel 44:20
source:
  edition: WLC
  text: וְ/רֹאשָׁ/ם֙ לֹ֣א יְגַלֵּ֔חוּ וּ/פֶ֖רַע לֹ֣א יְשַׁלֵּ֑חוּ כָּס֥וֹם יִכְסְמ֖וּ
    אֶת רָאשֵׁי/הֶֽם־׃
translation:
  text: They shall not shave their heads, nor let their hair grow long; they shall
    surely trim their heads’ hair.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they shall keep the hair of their heads well trimmed.' The Hebrew expression
      in the final clause is somewhat compact and may be rendered in several closely
      related ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגַלֵּחוּ
  chosen: shall shave
  alternatives:
  - shall shave bald
  - shall shave off
  lexicon: HALOT
  rationale: From גלח in the Piel, referring to shaving the head/hair. English 'shave'
    is the most natural equivalent; the prohibition is against shaving the head bare,
    but 'shave' with the object 'their heads' sufficiently conveys this without overexpansion.
- source_word: פֶרַע
  chosen: their hair grow long
  alternatives:
  - let it grow loose
  - let it hang untrimmed
  lexicon: HALOT
  rationale: פֶרַע denotes unrestrained or untrimmed hair. In context of priestly
    grooming regulations, 'let their hair grow long' communicates the sense idiomatically
    in modern English.
- source_word: יְשַׁלֵּחוּ
  chosen: let ... grow
  alternatives:
  - leave
  - let loose
  lexicon: HALOT
  rationale: The verb שלח literally means 'send/let go,' but with פֶרַע in this context
    it idiomatically means allowing the hair to grow unchecked. 'Let ... grow' best
    captures the sense.
- source_word: כָּסוֹם יִכְסְמוּ
  chosen: shall surely trim
  alternatives:
  - shall carefully trim
  - shall cut evenly
  - shall clip
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. The
    root קסם here refers to trimming/cutting hair. 'Shall surely trim' preserves both
    the verbal idea and the emphasis without sounding unnatural.
- source_word: רֹאשָׁם / רָאשֵׁיהֶם
  chosen: their heads / their heads’ hair
  alternatives:
  - their head / the hair of their heads
  lexicon: HALOT
  rationale: The verse frames the regulation around the head. In English, the final
    clause needs explicit reference to hair for clarity, since 'trim their heads'
    would be misleading. 'Their heads’ hair' is slightly formal but transparent and
    faithful to the Hebrew sense.
