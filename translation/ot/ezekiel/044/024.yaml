id: EZK.44.24
reference: Ezekiel 44:24
source:
  edition: WLC
  text: וְ/עַל רִ֗יב הֵ֚מָּה יַעַמְד֣וּ ל/שפט בְּ/מִשְׁפָּטַ֖/י ו/שפט/הו וְ/אֶת תּוֹרֹתַ֤/י
    וְ/אֶת חֻקֹּתַ/י֙ בְּ/כָל מוֹעֲדַ֣/י יִשְׁמֹ֔רוּ וְ/אֶת שַׁבְּתוֹתַ֖/י יְקַדֵּֽשׁוּ־־־־־׃
translation:
  text: In a dispute, they shall stand to judge; they shall judge it according to
    my judgments. They shall keep my laws and my statutes in all my appointed times,
    and they shall keep my Sabbaths holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'case,' 'controversy,' or 'lawsuit' for 'dispute.'
    reason: lexical_alternative
  - marker: b
    text: '''My appointed times'' may also be rendered ''my appointed festivals''
      or ''my set times.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיב
  chosen: dispute
  alternatives:
  - case
  - controversy
  - lawsuit
  lexicon: HALOT
  rationale: רִיב denotes a legal dispute or contention. 'Dispute' is natural modern
    English and fits the judicial context created by 'stand to judge.' 'Lawsuit' would
    be too narrow, while 'controversy' is less concrete.
- source_word: יַעַמְדוּ
  chosen: shall stand
  alternatives:
  - shall take their stand
  - shall appear
  lexicon: HALOT
  rationale: The verb עמד literally means 'stand.' Retaining 'stand' preserves the
    formal judicial imagery of priests taking their place in adjudication rather than
    flattening it to a mere functional paraphrase.
- source_word: לשפט
  chosen: to judge
  alternatives:
  - for judgment
  - to render judgment
  lexicon: HALOT
  rationale: The infinitive of שפט here expresses purpose. 'To judge' is concise and
    direct; 'to render judgment' is possible but more interpretive.
- source_word: במשפטי
  chosen: according to my judgments
  alternatives:
  - by my judgments
  - according to my ordinances
  - according to my rules
  lexicon: HALOT
  rationale: מִשְׁפָּט often refers to judgments, legal decisions, or ordinances.
    Here, because the immediate context is adjudication, 'judgments' best preserves
    the legal sense and the possessive 'my' indicates Yahweh's judicial standards.
- source_word: ושפטהו
  chosen: they shall judge it
  alternatives:
  - they shall decide it
  - they shall give judgment on it
  lexicon: HALOT
  rationale: The suffix refers back to the dispute/case. 'Judge it' keeps the lexical
    tie to שפט in the previous clause and preserves the Hebrew repetition.
- source_word: תורותי
  chosen: my laws
  alternatives:
  - my instructions
  - my teachings
  lexicon: HALOT
  rationale: תּוֹרוֹת is the plural of תּוֹרָה, which can mean instruction or law.
    In this priestly-legal context, paired with חֻקּוֹת and followed by observance
    language, 'laws' communicates the normative force more clearly in English, though
    'instructions' remains a viable lexical alternative.
- source_word: חקותי
  chosen: my statutes
  alternatives:
  - my decrees
  - my prescribed rules
  lexicon: HALOT
  rationale: חֹק/חֻקָּה commonly denotes statute or prescribed enactment. 'Statutes'
    is a standard and accurate legal rendering that pairs well with 'laws' without
    collapsing the distinction.
- source_word: בכל מועדי
  chosen: in all my appointed times
  alternatives:
  - at all my appointed festivals
  - at all my set times
  - in all my appointed feasts
  lexicon: HALOT
  rationale: מוֹעֵד can denote appointed time or appointed feast/festival. Because
    the term can include sacred assemblies more broadly than feast days alone, 'appointed
    times' is the more comprehensive rendering. The cultic nuance is preserved by
    the possessive 'my.'
- source_word: ישמרו
  chosen: they shall keep
  alternatives:
  - they shall observe
  - they shall guard
  lexicon: HALOT
  rationale: שמר in covenantal/legal contexts often means keep or observe. 'Keep'
    is idiomatic in English for commandments and preserves the covenantal register.
- source_word: שבתותי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: The plural is explicit in Hebrew. 'My Sabbaths' preserves both the plurality
    and the covenantal ownership.
- source_word: יקדשו
  chosen: they shall keep holy
  alternatives:
  - they shall sanctify
  - they shall treat as holy
  - they shall consecrate
  lexicon: HALOT
  rationale: קדש in the piel means to make holy, sanctify, or treat as holy. 'Keep
    holy' is idiomatic English with Sabbath language and conveys active observance
    without sounding overly technical.
