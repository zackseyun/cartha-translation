theological_decisions:
- issue: Rendering of covenantal legal terms in priestly instruction
  chosen_reading: Use distinct legal terms ('judgments,' 'laws,' 'statutes') rather
    than collapsing them into a single English category.
  alternative_readings:
  - Use broader modern terms such as 'rules' or 'regulations' throughout
  rationale: The Hebrew intentionally stacks related but distinct legal vocabulary.
    Preserving those distinctions supports transparency to the source text and avoids
    interpretive flattening.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
