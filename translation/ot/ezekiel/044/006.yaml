id: EZK.44.6
reference: Ezekiel 44:6
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֤ אֶל מֶ֨רִי֙ אֶל בֵּ֣ית יִשְׂרָאֵ֔ל כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה רַב לָ/כֶ֛ם מִֽ/כָּל תּוֹעֲבֽוֹתֵי/כֶ֖ם בֵּ֥ית יִשְׂרָאֵֽל־־־־׃
translation:
  text: 'And say to the rebellious house, to the house of Israel, ‘Thus says the Lord GOD: Enough of all your abominations, O house of Israel.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to the rebellious one'; the noun may also be understood more abstractly as 'rebellion' or collectively as 'the rebellious people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶרִי
  chosen: the rebellious one
  alternatives:
  - rebellion
  - the rebellious people
  - the rebel
  lexicon: HALOT
  rationale: The noun can denote rebellion/rebelliousness or, by metonymy, a rebellious entity. In this address formula, אֶל מֶרִי is best taken as addressing Israel as a rebellious one/entity. 'The rebellious one' preserves the singular Hebrew while still functioning as a collective address, and the following apposition 'to the house of Israel' clarifies the referent.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Standard covenantal-national designation; retained literally for consistency and theological resonance.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: This compound title conventionally distinguishes אֲדֹנָי + YHWH. Per doctrine, YHWH is rendered 'the LORD'; in English Bible style, when paired with אֲדֹנָי, 'GOD' avoids 'Lord LORD.' 'the Lord GOD' is clear, idiomatic, and preserves the title force.
- source_word: רַב לָכֶם
  chosen: Enough
  alternatives:
  - It is much for you
  - Too much for you
  - Let it suffice you
  lexicon: HALOT
  rationale: Idiomatic expression meaning that the addressees have gone far enough. 'Enough' best captures the force in natural modern English without over-paraphrase.
- source_word: מִכָּל תּוֹעֲבוֹתֵיכֶם
  chosen: of all your abominations
  alternatives:
  - from all your abominations
  - with all your abominations
  lexicon: HALOT
  rationale: The phrase depends on the idiom רַב לָכֶם and specifies what has been excessive. 'Of all your abominations' fits the English idiom 'Enough of ...' while preserving the strong cultic-moral term 'abominations' for תּוֹעֵבָה.
- source_word: תּוֹעֲבוֹתֵיכֶם
  chosen: abominations
  alternatives:
  - detestable things
  lexicon: HALOT
  rationale: Maintains the severity and cultic offensiveness conveyed by the Hebrew, especially in Ezekiel's temple-purity context.
