id: EZK.44.17
reference: Ezekiel 44:17
source:
  edition: WLC
  text: וְ/הָיָ֗ה בְּ/בוֹאָ/ם֙ אֶֽל שַׁעֲרֵי֙ הֶ/חָצֵ֣ר הַ/פְּנִימִ֔ית בִּגְדֵ֥י פִשְׁתִּ֖ים
    יִלְבָּ֑שׁוּ וְ/לֹֽא יַעֲלֶ֤ה עֲלֵי/הֶם֙ צֶ֔מֶר בְּ/שָֽׁרְתָ֗/ם בְּ/שַׁעֲרֵ֛י
    הֶ/חָצֵ֥ר הַ/פְּנִימִ֖ית וָ/בָֽיְתָ/ה־־׃
translation:
  text: And when they enter the gates of the inner court, they shall wear linen garments;
    no wool shall come upon them while they minister in the gates of the inner court
    and inside the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they shall not wear wool.' The Hebrew more literally says, 'no wool
      shall come upon them.'
    reason: lexical_alternative
  - marker: b
    text: '''The house'' here refers to the temple building.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And
  alternatives:
  - And it shall be
  - And it shall happen
  lexicon: HALOT
  rationale: This waw + qatal formula introduces the regulation that follows. In English,
    the temporal clause beginning with the next phrase carries the sense naturally,
    so the introductory formula is compressed to 'And' rather than woodenly retaining
    'it shall be.'
- source_word: בְּבוֹאָם
  chosen: when they enter
  alternatives:
  - at their entering
  - in their coming
  lexicon: HALOT
  rationale: The preposition with infinitive construct plus suffix expresses temporal
    circumstance. 'When they enter' is idiomatic modern English and preserves the
    timing.
- source_word: שַׁעֲרֵי הֶחָצֵר הַפְּנִימִית
  chosen: the gates of the inner court
  alternatives:
  - the gateways of the inner court
  lexicon: HALOT
  rationale: A construct chain referring to the access points of the inner court.
    'Gates' is the standard and clear rendering.
- source_word: בִּגְדֵי פִשְׁתִּים
  chosen: linen garments
  alternatives:
  - garments of linen
  - flax garments
  lexicon: HALOT
  rationale: פִשְׁתִּים denotes flax/linen material. 'Linen garments' is natural English
    and preserves the material requirement.
- source_word: יִלְבָּשׁוּ
  chosen: they shall wear
  alternatives:
  - they shall put on
  - they shall be clothed with
  lexicon: HALOT
  rationale: The verb לבשׁ can mean put on or wear. Here the regulation concerns prescribed
    attire during service, so 'shall wear' fits the ongoing requirement.
- source_word: וְלֹא יַעֲלֶה עֲלֵיהֶם צֶמֶר
  chosen: no wool shall come upon them
  alternatives:
  - they shall not wear wool
  - wool shall not be on them
  lexicon: HALOT
  rationale: The Hebrew literally says wool shall not go up upon them. Rather than
    over-literal 'go up,' 'come upon them' preserves the imagery while remaining intelligible.
    It also avoids importing an object like 'garment' not explicit in the text.
- source_word: בְּשָׁרְתָם
  chosen: while they minister
  alternatives:
  - in their ministering
  - when they serve
  lexicon: HALOT
  rationale: The infinitive/participle-like form with suffix indicates the time of
    priestly service. 'Minister' fits cultic service better than the flatter 'serve.'
- source_word: וָבָיְתָה
  chosen: inside the house
  alternatives:
  - and in the house
  - toward the house
  lexicon: HALOT
  rationale: The form refers to the house/temple interior with directional/locative
    force. 'Inside the house' makes explicit the sense of entering or being within
    the temple building, in contrast to the gates of the inner court.
