theological_decisions:
- issue: Cultic terminology for priestly service
  chosen_reading: minister
  alternative_readings:
  - serve
  rationale: The verse concerns priestly regulations in the temple. 'Minister' preserves
    the sacred/cultic nuance without adding doctrinal content beyond the Hebrew.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic'
- issue: Reference of 'the house'
  chosen_reading: inside the house
  alternative_readings:
  - in the house
  rationale: In Ezekiel's temple vision, 'the house' refers to the temple building.
    Rendering it 'inside the house' clarifies the spatial contrast with the gates
    of the inner court while staying within the source sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
