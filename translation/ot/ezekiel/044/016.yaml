id: EZK.44.16
reference: Ezekiel 44:16
source:
  edition: WLC
  text: הֵ֜מָּה יָבֹ֣אוּ אֶל מִקְדָּשִׁ֗/י וְ/הֵ֛מָּה יִקְרְב֥וּ אֶל שֻׁלְחָנִ֖/י
    לְ/שָׁרְתֵ֑/נִי וְ/שָׁמְר֖וּ אֶת מִשְׁמַרְתִּֽ/י־־־׃
translation:
  text: They themselves shall enter my sanctuary, and they themselves shall come near
    to my table to minister to me, and they shall keep my charge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my altar' or 'my altar-table,' since 'table' here is used in a temple-service
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: they themselves
  alternatives:
  - they
  - these
  lexicon: HALOT
  rationale: The independent pronoun is emphatic in context and is repeated twice
    in the verse. Rendering it as 'they themselves' preserves the emphasis and exclusivity
    of the priestly privilege being described.
- source_word: יָבֹאוּ
  chosen: shall enter
  alternatives:
  - will come
  - shall come in
  lexicon: HALOT
  rationale: With אֶל מִקְדָּשִׁי, the verb denotes entry into the sanctuary. 'Shall
    enter' is natural English and preserves the future force.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple sanctuary
  lexicon: HALOT
  rationale: מִקְדָּשׁ refers to a holy place/sanctuary. 'My sanctuary' is the most
    direct and idiomatic rendering in this temple-context.
- source_word: יִקְרְבוּ
  chosen: shall come near
  alternatives:
  - shall approach
  - shall draw near
  lexicon: HALOT
  rationale: The verb often carries cultic overtones of approaching for priestly service.
    'Come near' preserves that sacrificial/priestly nuance without becoming overly
    technical.
- source_word: שֻׁלְחָנִי
  chosen: my table
  alternatives:
  - my altar-table
  - my altar
  lexicon: HALOT
  rationale: The Hebrew word is literally 'table.' In Ezekiel's temple vision it can
    refer to the table associated with offerings, but the text says 'table,' so the
    main text preserves that wording. A more interpretive alternative is worth noting
    in a footnote.
- source_word: לְשָׁרְתֵנִי
  chosen: to minister to me
  alternatives:
  - to serve me
  lexicon: HALOT
  rationale: שרת in priestly contexts commonly denotes ministering in sacred service.
    'Minister to me' preserves the cultic and personal dimension of service directed
    to God.
- source_word: וְשָׁמְרוּ
  chosen: and they shall keep
  alternatives:
  - and they shall guard
  - and they shall observe
  lexicon: HALOT
  rationale: שׁמר with מִשְׁמֶרֶת/מִשְׁמַרְת denotes keeping or observing an assigned
    duty. 'Keep' is concise and idiomatic.
- source_word: מִשְׁמַרְתִּי
  chosen: my charge
  alternatives:
  - my duty
  - my ordinance
  - my commission
  lexicon: HALOT
  rationale: In priestly contexts this noun refers to an assigned obligation or charge.
    'My charge' is a standard and suitably formal rendering that preserves covenantal/priestly
    duty better than the flatter 'duty.'
