theological_decisions:
- issue: Cultic term שֻׁלְחָנִי in temple-service context
  chosen_reading: my table
  alternative_readings:
  - my altar
  - my altar-table
  rationale: The verse concerns priestly access and service in the sanctuary. While
    some interpreters understand 'table' metonymically for the altar or offering table,
    the Hebrew lexeme itself is 'table.' To avoid importing a more specific cultic
    identification than the text explicitly states, the main text keeps 'table' and
    preserves the more interpretive alternatives in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
