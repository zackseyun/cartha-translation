theological_decisions:
- issue: Rendering of the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Sovereign LORD
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In the fixed combination with אֲדֹנָי, English convention uses 'the Lord GOD'
    to preserve both elements without redundancy. This is a translation decision,
    not a doctrinal expansion.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → ''the LORD'')'
- issue: Scope of exclusion for 'foreigner'
  chosen_reading: The verse excludes foreigners characterized as uncircumcised in
    heart and flesh from entering the sanctuary.
  alternative_readings:
  - The verse excludes all foreigners without exception
  - The phrase refers only to a specific subgroup of resident aliens
  rationale: The syntax places 'uncircumcised in heart and uncircumcised in flesh'
    in apposition to 'foreigner,' specifying the kind of foreigner in view. The translation
    preserves the wording without importing a broader theological claim about all
    non-Israelites in every circumstance.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
