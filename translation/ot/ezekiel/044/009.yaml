id: EZK.44.9
reference: Ezekiel 44:9
source:
  edition: WLC
  text: כֹּה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ כָּל בֶּן נֵכָ֗ר עֶ֤רֶל לֵב֙ וְ/עֶ֣רֶל בָּשָׂ֔ר
    לֹ֥א יָב֖וֹא אֶל מִקְדָּשִׁ֑/י לְ/כָל בֶּן נֵכָ֔ר אֲשֶׁ֕ר בְּ/ת֖וֹךְ בְּנֵ֥י יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: 'Thus says the Lord GOD: No foreigner, uncircumcised in heart and uncircumcised
    in flesh, shall enter my sanctuary—no foreigner who is among the sons of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'no son of a foreign land.' The Hebrew idiom means 'foreigner.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among the sons of Israel'; that is, among the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal,
    authoritative tone without archaic excess.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Sovereign LORD
  lexicon: HALOT
  rationale: Renders the title-plus-divine-name combination in conventional English.
    Per doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'the Lord
    GOD' avoids 'Lord LORD' and preserves the distinction.
- source_word: כָּל בֶּן נֵכָר
  chosen: No foreigner
  alternatives:
  - no son of a foreign land
  - no foreign son
  lexicon: HALOT
  rationale: The idiom בֶּן נֵכָר denotes a foreigner/alien, not literally a male
    child. 'No foreigner' communicates the class reference naturally in English while
    preserving the exclusionary force of כָּל with negation.
- source_word: עֶרֶל לֵב
  chosen: uncircumcised in heart
  alternatives:
  - foreskinned of heart
  lexicon: HALOT
  rationale: Established idiom for inner spiritual uncircumcision; a literal-but-natural
    rendering best preserves the metaphor.
- source_word: וְעֶרֶל בָּשָׂר
  chosen: and uncircumcised in flesh
  alternatives:
  - and uncircumcised in body
  lexicon: HALOT
  rationale: Keeps the parallel with 'uncircumcised in heart' and preserves the concrete
    bodily reference of בָּשָׂר as 'flesh.'
- source_word: לֹא יָבֹוא
  chosen: shall enter
  alternatives:
  - shall come into
  - may not enter
  lexicon: HALOT
  rationale: English idiom prefers 'enter' with sanctuary. 'Shall' preserves the legal/declarative
    force of the prohibition.
- source_word: אֶל מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - into my holy place
  - to my sanctuary
  lexicon: HALOT
  rationale: מִקְדָּשׁ refers to the sacred precinct/sanctuary. 'My sanctuary' is
    the most direct and natural rendering here.
- source_word: לְכָל בֶּן נֵכָר
  chosen: —no foreigner
  alternatives:
  - namely, any foreigner
  - that is, any foreigner
  lexicon: HALOT
  rationale: The lamed here is resumptive/emphatic, restating and sharpening the prohibition.
    An em dash in English captures the appositional reinforcement without awkward
    literalism.
- source_word: אֲשֶׁר בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: who is among the sons of Israel
  alternatives:
  - who is among the people of Israel
  - who is in the midst of the sons of Israel
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' 'Sons of Israel' preserves the
    source's familial-national expression and aligns with the project's gender-accurate
    policy; it refers corporately to Israel, not only males.
