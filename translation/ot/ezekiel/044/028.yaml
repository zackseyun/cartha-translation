theological_decisions:
- issue: Relationship between 'inheritance' and 'possession' in the priestly allotment
  chosen_reading: Preserve the Hebrew distinction by rendering נחלה as 'inheritance'
    and אחזה as 'possession' rather than flattening both to one English term.
  alternative_readings:
  - Render both as 'inheritance' for smoother English
  - Render both as 'possession' to stress property language
  rationale: The verse intentionally uses two related but distinct land-tenure terms.
    Preserving both supports the theological point that the priests are denied ordinary
    landed property because the LORD himself is both their allotted share and their
    holding.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
