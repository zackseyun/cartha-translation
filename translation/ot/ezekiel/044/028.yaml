id: EZK.44.28
reference: Ezekiel 44:28
source:
  edition: WLC
  text: וְ/הָיְתָ֤ה לָ/הֶם֙ לְֽ/נַחֲלָ֔ה אֲנִ֖י נַֽחֲלָתָ֑/ם וַ/אֲחֻזָּ֗ה לֹֽא תִתְּנ֤וּ
    לָ/הֶם֙ בְּ/יִשְׂרָאֵ֔ל אֲנִ֖י אֲחֻזָּתָֽ/ם־׃
translation:
  text: 'And this shall be their inheritance: I am their inheritance. And you shall
    give them no possession in Israel; I am their possession.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''And it shall be for them as an inheritance: I am their inheritance.''
      The Hebrew opening is elliptical.'
    reason: lexical_alternative
  - marker: b
    text: '''Possession'' may also be rendered ''landholding'' or ''property,'' referring
      to a permanent holding in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה לָהֶם לְנַחֲלָה
  chosen: And this shall be their inheritance
  alternatives:
  - And it shall be for them as an inheritance
  - And this shall belong to them as an inheritance
  lexicon: HALOT
  rationale: The feminine singular verb with the prepositional phrase is somewhat
    elliptical in Hebrew. Rendering with 'this' makes good English sense and reflects
    the implied subject from context, while preserving the forward-looking legal declaration.
- source_word: נַחֲלָה / נַחֲלָתָם
  chosen: inheritance / their inheritance
  alternatives:
  - heritage
  - allotted inheritance
  lexicon: HALOT
  rationale: נחלה commonly denotes an inheritance or allotted portion, especially
    land or covenantal share. 'Inheritance' best preserves the legal-covenantal sense
    and matches the repeated emphasis in the verse.
- source_word: אֲנִי נַחֲלָתָם
  chosen: I am their inheritance
  alternatives:
  - I am their heritage
  - I am their allotted portion
  lexicon: HALOT
  rationale: The verbless clause is direct and emphatic. 'Inheritance' keeps the lexical
    tie with the previous phrase and communicates that the priests' true allotted
    share is God himself.
- source_word: אֲחֻזָּה
  chosen: possession
  alternatives:
  - property
  - landholding
  lexicon: HALOT
  rationale: אחזה often refers to a landed possession or property holding. 'Possession'
    is broad enough to fit both occurrences while still suggesting a concrete property
    allotment in Israel.
- source_word: לֹא תִתְּנוּ לָהֶם בְּיִשְׂרָאֵל
  chosen: you shall give them no possession in Israel
  alternatives:
  - you shall not give them a landholding in Israel
  - you shall give them no property in Israel
  lexicon: HALOT
  rationale: The second person plural imperfect functions as an instruction to the
    community or leadership. 'You shall give' preserves the legal force without over-specifying
    the addressee.
- source_word: אֲנִי אֲחֻזָּתָם
  chosen: I am their possession
  alternatives:
  - I am their property
  - I am their holding
  lexicon: HALOT
  rationale: 'The Hebrew repeats a different property term from נחלה. Rendering it
    as ''possession'' preserves the lexical distinction while maintaining the parallelism:
    they receive no landed possession because the LORD himself is their possession.'
