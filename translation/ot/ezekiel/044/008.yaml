id: EZK.44.8
reference: Ezekiel 44:8
source:
  edition: WLC
  text: וְ/לֹ֥א שְׁמַרְתֶּ֖ם מִשְׁמֶ֣רֶת קָדָשָׁ֑/י וַ/תְּשִׂימ֗וּ/ן לְ/שֹׁמְרֵ֧י
    מִשְׁמַרְתִּ֛/י בְּ/מִקְדָּשִׁ֖/י לָ/כֶֽם׃
translation:
  text: You have not kept charge of my holy things, but have appointed others to keep
    charge in my sanctuary for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instead of you,' highlighting that others were appointed to perform
      the sanctuary charge in your place.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַרְתֶּם
  chosen: have kept
  alternatives:
  - have guarded
  - have observed
  lexicon: HALOT
  rationale: שׁמר commonly means to keep, guard, or observe. Here with מִשְׁמֶרֶת
    it forms the idiom 'keep charge,' referring to faithful performance of assigned
    temple duty rather than merely physical guarding.
- source_word: מִשְׁמֶרֶת
  chosen: charge
  alternatives:
  - duty
  - obligation
  - guard
  lexicon: HALOT
  rationale: In priestly/temple contexts מִשְׁמֶרֶת often denotes an entrusted responsibility
    or charge. 'Charge' preserves the cultic-administrative sense better than the
    flatter 'duty,' while still reading naturally in English.
- source_word: קָדָשַׁי
  chosen: my holy things
  alternatives:
  - my holy charge
  - my sacred things
  - my sanctuary things
  lexicon: HALOT
  rationale: The plural of קֹדֶשׁ with 1cs suffix most naturally refers to God's holy
    things, i.e., sacred matters/items/rites belonging to the sanctuary. 'My holy
    things' is broad enough to include the sacred trust without over-specifying objects
    alone.
- source_word: וַתְּשִׂימוּן
  chosen: have appointed
  alternatives:
  - have set
  - have placed
  lexicon: HALOT
  rationale: שׂים literally means 'set/place,' but in this context of assigning personnel
    to temple service, 'appointed' best conveys the functional sense in idiomatic
    English.
- source_word: לְשֹׁמְרֵי
  chosen: to keep
  alternatives:
  - as keepers of
  - to guard
  lexicon: HALOT
  rationale: The participle from שׁמר denotes those acting as keepers/guards. Rendering
    it verbally with the following noun phrase ('to keep charge') avoids awkward repetition
    while preserving the sense of assigned custodianship.
- source_word: מִשְׁמַרְתִּי
  chosen: charge
  alternatives:
  - my duty
  - my obligation
  - my guard
  lexicon: HALOT
  rationale: Again the cultic term denotes entrusted responsibility. Here the suffix
    marks it as God's own charge within the sanctuary; 'charge' maintains consistency
    with the first occurrence.
- source_word: בְּמִקְדָּשִׁי
  chosen: in my sanctuary
  alternatives:
  - in my holy place
  - in my temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ refers to the sanctuary/holy precinct. 'Sanctuary' is the most
    precise cultic term in this Ezekiel temple context; 'temple' would be broader
    and less exact.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - on your behalf
  - instead of you
  lexicon: HALOT
  rationale: The preposition with 2mp indicates that these others were appointed in
    the people's place or for their benefit. 'For you' is the most direct rendering;
    the nuance 'instead of you' is plausible and worth preserving in a footnote.
