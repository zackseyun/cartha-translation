theological_decisions:
- issue: Scope of 'my holy things'
  chosen_reading: A broad reference to the sacred responsibilities and holy matters
    of the sanctuary
  alternative_readings:
  - A narrower reference to holy objects/items only
  - A more abstract reference to sacred office alone
  rationale: The Hebrew expression is broad and should not be narrowed beyond the
    text. The verse rebukes failure in temple stewardship generally, so the translation
    preserves that breadth.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
