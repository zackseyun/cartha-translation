id: EZK.44.14
reference: Ezekiel 44:14
source:
  edition: WLC
  text: וְ/נָתַתִּ֣י אוֹתָ֔/ם שֹׁמְרֵ֖י מִשְׁמֶ֣רֶת הַ/בָּ֑יִת לְ/כֹל֙ עֲבֹ֣דָת֔/וֹ
    וּ/לְ/כֹ֛ל אֲשֶׁ֥ר יֵעָשֶׂ֖ה בּֽ/וֹ׃פ
translation:
  text: Yet I will appoint them to keep charge of the house, for all its service and
    for all that is done in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple.' Hebrew 'the house,' a common designation for the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: Yet I will appoint
  alternatives:
  - and I will give
  - and I will set
  lexicon: HALOT
  rationale: נתן literally means 'give/set,' but in this administrative context with
    a following role designation it idiomatically means assigning or appointing to
    duty. 'Yet' reflects the adversative sense from context after the preceding judgment,
    while still grounded in the conjunction.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the Levites under discussion in the
    immediate context.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  chosen: to keep charge
  alternatives:
  - keepers of the charge
  - guardians of the duty
  - those who keep the obligation
  lexicon: HALOT
  rationale: The participial construction plus cognate noun expresses assigned custodial
    responsibility. 'Keep charge' preserves the Hebrew idiom more naturally than the
    wooden 'keepers of the charge' while retaining the sense of entrusted duty.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בית literally means 'house.' In Ezekiel's temple vision it refers specifically
    to the temple complex, but 'house' preserves the source wording and its cultic
    resonance. The temple sense is clear from context.
- source_word: לְכֹל עֲבֹדָתוֹ
  chosen: for all its service
  alternatives:
  - for all its work
  - for all its ministry
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work, service, or cultic service. Here it refers to
    the temple's practical and liturgical functions. 'Service' is broad enough to
    include both without over-specifying 'ministry.' The suffix is rendered 'its'
    referring back to the house.
- source_word: וּלְכֹל אֲשֶׁר יֵעָשֶׂה בוֹ
  chosen: and for all that is done in it
  alternatives:
  - and for everything done in it
  - and for all that shall be done in it
  lexicon: HALOT
  rationale: The passive/imperfect construction denotes whatever activity takes place
    within the house. 'That is done in it' is natural English and preserves the broad,
    comprehensive force of the Hebrew.
