theological_decisions:
- issue: Referent of 'the house'
  chosen_reading: the temple/house of God in Ezekiel's vision, rendered literally
    as 'the house'
  alternative_readings:
  - the temple
  rationale: The verse concerns Levitical duties in the visionary temple. Rendering
    בית as 'house' preserves the Hebrew expression while not obscuring the temple
    referent in context. No doctrinal issue is resolved beyond the text's cultic setting.
