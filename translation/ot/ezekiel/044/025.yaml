theological_decisions:
- issue: Legal force of the final imperfect יִטַּמָּאוּ
  chosen_reading: permission ('they may make themselves unclean')
  alternative_readings:
  - injunctive ('they shall make themselves unclean')
  - simple future ('they will defile themselves')
  rationale: 'In this priestly regulation, the clause lists exceptions to a prohibition.
    The sense is permissive: these are the relatives for whom corpse-defilement is
    allowed. Rendering it as a command would overstate the text.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Meaning of the sister clause אֲשֶׁר לֹא הָיְתָה לְאִישׁ
  chosen_reading: a sister not attached to a man in marriage
  alternative_readings:
  - an unmarried sister
  - a virgin sister
  rationale: The Hebrew states that she 'has not been to a man,' which most naturally
    refers to not being married/belonging to a husband. 'Virgin' is too specific for
    the wording; 'unmarried' is interpretive but substantially correct. The main text
    preserves the more literal relational sense, with a footnote giving the idiomatic
    alternative.
  doctrine_reference: Translation philosophy §1, §3, §4, §6
