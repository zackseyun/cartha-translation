id: EZK.44.25
reference: Ezekiel 44:25
source:
  edition: WLC
  text: וְ/אֶל מֵ֣ת אָדָ֔ם לֹ֥א יָב֖וֹא לְ/טָמְאָ֑ה כִּ֣י אִם לְ/אָ֡ב וּ֠/לְ/אֵם וּ/לְ/בֵ֨ן
    וּ/לְ/בַ֜ת לְ/אָ֗ח וּ/לְ/אָח֛וֹת אֲשֶֽׁר לֹא הָיְתָ֥ה לְ/אִ֖ישׁ יִטַּמָּֽאוּ־־־־׃
translation:
  text: And they shall not go near a dead man to make themselves unclean; but for
    father or mother, for son or daughter, for brother, or for a sister who has not
    belonged to a man, they may make themselves unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'a sister who is unmarried.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵת אָדָם
  chosen: a dead man
  alternatives:
  - a dead person
  - the dead body of a man
  lexicon: HALOT
  rationale: Literally 'dead man/human.' Because אָדָם here follows מֵת and refers
    to an individual corpse rather than humanity in general, 'a dead man' is the most
    natural gender-accurate rendering. 'Dead person' is possible but smooths over
    the masculine singular form.
- source_word: יָבֹוא אֶל
  chosen: go near
  alternatives:
  - come to
  - enter to
  lexicon: HALOT
  rationale: In priestly impurity contexts, the idiom means approaching a corpse,
    not merely arriving somewhere. 'Go near' communicates the ritual-contact sense
    more clearly in English than the more wooden 'come to.'
- source_word: לְטָמְאָה
  chosen: to make themselves unclean
  alternatives:
  - for uncleanness
  - to become unclean
  lexicon: HALOT
  rationale: The infinitive of טמא here expresses the result/purpose of approaching
    the dead. 'To make themselves unclean' brings out the reflexive sense in context,
    matching the later explicit reflexive impurity verb.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except that
  - except
  lexicon: HALOT
  rationale: This introduces the exception to the prohibition. 'But' is idiomatic
    in English before the list of permitted exceptions, while still preserving the
    adversative-exceptive force.
- source_word: לְאָב וּלְאֵם וּלְבֵן וּלְבַת לְאָח וּלְאָחוֹת
  chosen: for father or mother, for son or daughter, for brother, or for a sister
  alternatives:
  - for his father and his mother and his son and his daughter, for his brother and
    his sister
  lexicon: HALOT
  rationale: The lamed marks the relatives for whom defilement is permitted. English
    idiom prefers 'for father or mother...' in a list of exceptions. Possessive 'his'
    is implied by context but omitted for smoother English.
- source_word: אֲשֶׁר לֹא הָיְתָה לְאִישׁ
  chosen: who has not belonged to a man
  alternatives:
  - who has not had a husband
  - who is unmarried
  - who has not been for a man
  lexicon: HALOT
  rationale: The Hebrew is literally 'who has not been to/for a man,' an idiom indicating
    a sister not attached in marriage. 'Has not belonged to a man' preserves the relational
    idiom without overinterpreting as merely 'unmarried,' though that is the practical
    sense.
- source_word: יִטַּמָּאוּ
  chosen: they may make themselves unclean
  alternatives:
  - they shall defile themselves
  - they may become unclean
  lexicon: HALOT
  rationale: The imperfect here gives permitted action in legal context, not a command.
    'May make themselves unclean' best conveys allowance rather than obligation, and
    keeps continuity with the earlier impurity language.
