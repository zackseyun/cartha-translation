theological_decisions:
- issue: Role of the disqualified Levites in the sanctuary
  chosen_reading: They are assigned subordinate temple service rather than priestly
    approach.
  alternative_readings:
  - They continue as full priestly ministers
  rationale: The immediate context distinguishes these Levites from the priests who
    may approach YHWH directly. This verse describes gate oversight, slaughtering
    sacrifices for the people, and attendant service, which are subordinate cultic
    tasks.
