id: EZK.44.11
reference: Ezekiel 44:11
source:
  edition: WLC
  text: וְ/הָי֤וּ בְ/מִקְדָּשִׁ/י֙ מְשָׁ֣רְתִ֔ים פְּקֻדּוֹת֙ אֶל שַׁעֲרֵ֣י הַ/בַּ֔יִת
    וּֽ/מְשָׁרְתִ֖ים אֶת הַ/בָּ֑יִת הֵ֠מָּה יִשְׁחֲט֨וּ אֶת הָ/עֹלָ֤ה וְ/אֶת הַ/זֶּ֨בַח֙
    לָ/עָ֔ם וְ/הֵ֛מָּה יַעַמְד֥וּ לִ/פְנֵי/הֶ֖ם לְ/שָֽׁרְתָֽ/ם־־־־׃
translation:
  text: Yet they shall be ministers in my sanctuary, having oversight at the gates
    of the temple and ministering in the temple. They shall slaughter the burnt offering
    and the sacrifice for the people, and they shall stand before them to minister
    to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charges' or 'duties' at the gates of the temple.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house'; in this temple-vision context, 'temple' clarifies the
      referent.
    reason: lexical_alternative
  - marker: c
    text: Or 'on behalf of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשָׁרְתִים
  chosen: ministers / ministering
  alternatives:
  - servants
  - serving
  lexicon: HALOT
  rationale: The participle from שׁרת denotes cultic service. 'Minister' preserves
    the formal, temple-service sense better than the broader 'serve' or 'servant,'
    while remaining readable modern English.
- source_word: פְּקֻדּוֹת
  chosen: having oversight
  alternatives:
  - charges
  - duties
  - offices
  - responsibilities
  lexicon: HALOT
  rationale: The noun can denote oversight, charge, or assigned responsibility. In
    this context with 'at the gates,' it refers to supervisory/guarding responsibility
    rather than abstract 'ordinances.' 'Having oversight' best captures the functional
    sense.
- source_word: שַׁעֲרֵי הַבַּיִת
  chosen: the gates of the temple
  alternatives:
  - the gates of the house
  lexicon: HALOT
  rationale: בַּיִת in Ezekiel's temple vision commonly refers to the temple complex/house.
    'Temple' communicates the referent clearly in English, while 'house' would sound
    ambiguous.
- source_word: הַבָּיִת
  chosen: the temple
  alternatives:
  - the house
  lexicon: HALOT
  rationale: 'Same rationale as above: in this cultic-vision context, ''temple'' is
    the natural English equivalent for the sanctuary building/complex.'
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: This is the standard sacrificial term for the עולה. 'Burnt offering'
    is the established and accurate English rendering.
- source_word: הַזֶּבַח
  chosen: the sacrifice
  alternatives:
  - the slaughtered offering
  - the peace offering
  lexicon: HALOT
  rationale: זבח is a broad sacrificial term here, not necessarily limited to 'peace
    offering.' 'The sacrifice' preserves the generic cultic sense alongside 'burnt
    offering' as a second category.
- source_word: לָעָם
  chosen: for the people
  alternatives:
  - on behalf of the people
  lexicon: HALOT
  rationale: The preposition ל here indicates benefit/reference. 'For the people'
    is concise and natural; 'on behalf of' is possible but slightly more interpretive.
- source_word: יַעַמְדוּ לִפְנֵיהֶם
  chosen: they shall stand before them
  alternatives:
  - attend them
  - stand in their presence
  lexicon: HALOT
  rationale: The idiom is retained fairly literally. It likely conveys readiness/attendance
    before the people, and the following infinitive clarifies the purpose of service.
- source_word: לְשָׁרְתָם
  chosen: to minister to them
  alternatives:
  - to serve them
  lexicon: HALOT
  rationale: 'The suffix makes the object explicit: service rendered to the people
    in this delegated cultic role. ''Minister to them'' matches the earlier cultic
    vocabulary and preserves coherence.'
- source_word: וְהָיוּ
  chosen: Yet they shall be
  alternatives:
  - And they shall be
  lexicon: HALOT
  rationale: The conjunction links back contrastively to the prior restriction in
    context (they may not approach as priests, yet they will have lesser service).
    'Yet' brings out the discourse contrast implicit in context without overstating
    it.
