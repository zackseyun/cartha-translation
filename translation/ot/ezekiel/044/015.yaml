id: EZK.44.15
reference: Ezekiel 44:15
source:
  edition: WLC
  text: וְ/הַ/כֹּהֲנִ֨ים הַ/לְוִיִּ֜ם בְּנֵ֣י צָד֗וֹק אֲשֶׁ֨ר שָׁמְר֜וּ אֶת מִשְׁמֶ֤רֶת
    מִקְדָּשִׁ/י֙ בִּ/תְע֤וֹת בְּנֵֽי יִשְׂרָאֵל֙ מֵֽ/עָלַ֔/י הֵ֛מָּה יִקְרְב֥וּ אֵלַ֖/י
    לְ/שָֽׁרְתֵ֑/נִי וְ/עָמְד֣וּ לְ/פָנַ֗/י לְ/הַקְרִ֥יב לִ/י֙ חֵ֣לֶב וָ/דָ֔ם נְאֻ֖ם
    אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: But the Levitical priests, the sons of Zadok, who kept the charge of my sanctuary
    when the sons of Israel went astray from me—they shall come near to me to minister
    to me, and they shall stand before me to offer to me fat and blood, declares the
    Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the priests, the Levites.' The Hebrew can be read appositionally rather
      than as the smoother English phrase 'Levitical priests.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the people of Israel' or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the Lord YHWH'; English convention renders this as 'the Lord GOD'
      to avoid 'Lord LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַכֹּהֲנִים הַלְוִיִּם
  chosen: But the Levitical priests
  alternatives:
  - And the priests, the Levites
  - But the priests, the Levites
  lexicon: HALOT
  rationale: The phrase identifies a subset of priests as Levitical. 'But' fits the
    contrast with the preceding exclusion of unfaithful Levites, while 'Levitical
    priests' is smoother modern English than the appositional 'priests, the Levites'
    and preserves the sense.
- source_word: בְּנֵי צָדוֹק
  chosen: the sons of Zadok
  alternatives:
  - the descendants of Zadok
  lexicon: HALOT
  rationale: A formal rendering preserves the familial/covenantal lineage language.
    'Sons' is retained rather than neutralizing to 'descendants,' in keeping with
    gender-accurate policy and the Hebrew idiom.
- source_word: שָׁמְרוּ אֶת מִשְׁמֶרֶת מִקְדָּשִׁי
  chosen: kept the charge of my sanctuary
  alternatives:
  - kept the duty of my sanctuary
  - guarded my sanctuary
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת often denotes an assigned duty, charge, or obligation, especially
    in priestly contexts. 'Kept the charge' preserves the technical cultic nuance
    better than the flatter 'guarded' alone.
- source_word: בִּתְעוֹת
  chosen: when ... went astray
  alternatives:
  - in the going astray of
  - when ... wandered
  lexicon: HALOT
  rationale: The infinitive construct with ב marks the circumstance/time. 'When ...
    went astray' is idiomatic English and preserves the moral-religious sense of straying.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Retaining 'sons' reflects the
    source wording and matches the translation's gender-accurate principle, though
    the phrase functions corporately.
- source_word: מֵעָלַי
  chosen: from me
  alternatives:
  - away from me
  lexicon: HALOT
  rationale: The prepositional phrase indicates apostasy away from YHWH. 'From me'
    is concise and natural; the directional force is already conveyed by 'went astray.'
- source_word: הֵמָּה יִקְרְבוּ אֵלַי
  chosen: they shall come near to me
  alternatives:
  - they themselves shall come near to me
  - they shall approach me
  lexicon: HALOT
  rationale: קָרַב in priestly contexts often has cultic approach language. 'Come
    near' preserves that sacrificial/priestly resonance. The pronoun הֵמָּה adds emphasis,
    represented by the dash construction rather than an extra 'themselves'.
- source_word: לְשָׁרְתֵנִי
  chosen: to minister to me
  alternatives:
  - to serve me
  lexicon: HALOT
  rationale: In priestly contexts שׁרת commonly denotes liturgical service. 'Minister'
    better conveys sacred service than the broader 'serve.'
- source_word: וְעָמְדוּ לְפָנַי
  chosen: and they shall stand before me
  alternatives:
  - and they shall stand in my presence
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the courtroom/cultic posture of attendance
    before God.
- source_word: לְהַקְרִיב לִי
  chosen: to offer to me
  alternatives:
  - to present to me
  - to bring near to me
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to present/offer an offering.
    'Offer' is the clearest cultic English equivalent.
- source_word: חֵלֶב וָדָם
  chosen: fat and blood
  alternatives:
  - the fat and the blood
  lexicon: HALOT
  rationale: These are sacrificial portions. The anarthrous English 'fat and blood'
    is natural and sufficiently specific in context.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' Per
    doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, English
    convention uses 'Lord GOD' to distinguish the double divine title without producing
    'Lord LORD.'
