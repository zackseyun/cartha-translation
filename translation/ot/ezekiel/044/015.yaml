theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' In the compound אֲדֹנָי יְהוִה, standard English practice renders the tetragrammaton
    as 'GOD' to avoid 'Lord LORD' while still signaling the divine name. This preserves
    reverence tradition and readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
