theological_decisions:
- issue: Nature of the cleansing
  chosen_reading: Rendered in neutral cultic terms as 'his cleansing' without specifying
    moral or spiritual cleansing.
  alternative_readings:
  - his purification
  rationale: The verse concerns priestly ritual procedure in context. The translation
    preserves the cultic/legal sense and does not import a broader theological claim
    about inward sanctification beyond what the Hebrew states.
  doctrine_reference: Translation philosophy §1, §3
