id: EZK.44.26
reference: Ezekiel 44:26
source:
  edition: WLC
  text: וְ/אַחֲרֵ֖י טָֽהֳרָת֑/וֹ שִׁבְעַ֥ת יָמִ֖ים יִסְפְּרוּ לֽ/וֹ־׃
translation:
  text: And after his cleansing, they shall count off seven days for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his purification.” The Hebrew refers to ritual cleansing in the priestly
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי
  chosen: And after
  alternatives:
  - After
  lexicon: HALOT
  rationale: אַחֲרֵי denotes temporal succession, 'after.' The prefixed conjunction
    וְ is retained as 'And' for discourse continuity with the preceding regulation.
- source_word: טָהֳרָתוֹ
  chosen: his cleansing
  alternatives:
  - his purification
  - his being cleansed
  lexicon: HALOT
  rationale: From טָהֳרָה, referring to a state/process of ritual purification. 'Cleansing'
    is clear modern English and fits the cultic context; 'purification' is possible
    but slightly more technical.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward cardinal-number construction in construct with 'days';
    rendered literally.
- source_word: יִסְפְּרוּ
  chosen: they shall count off
  alternatives:
  - they shall count
  - they shall reckon
  lexicon: HALOT
  rationale: ספר in the Qal commonly means 'count/number.' 'Count off' conveys the
    formal reckoning of a prescribed waiting period in ritual law better than a bare
    'count'.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: 'The preposition ל here marks reference/beneficiary: the seven days are
    counted with respect to the priest in question. ''For him'' is the most natural
    English rendering in this legal context.'
