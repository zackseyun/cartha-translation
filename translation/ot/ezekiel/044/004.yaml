id: EZK.44.4
reference: Ezekiel 44:4
source:
  edition: WLC
  text: וַ/יְבִיאֵ֜/נִי דֶּֽרֶךְ שַׁ֣עַר הַ/צָּפוֹן֮ אֶל פְּנֵ֣י הַ/בַּיִת֒ וָ/אֵ֕רֶא וְ/הִנֵּ֛ה מָלֵ֥א כְבוֹד יְהוָ֖ה אֶת בֵּ֣ית יְהוָ֑ה וָ/אֶפֹּ֖ל אֶל פָּנָֽ/י־־־־־׃
translation:
  text: Then he brought me by way of the north gate to the front of the house, and I looked, and behold, the glory of Yahweh filled the house of Yahweh; and I fell on my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through the north gate.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple. The translation keeps 'house' to reflect Ezekiel's wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְבִיאֵנִי
  chosen: Then he brought me
  alternatives:
  - And he brought me
  - Then he led me
  lexicon: HALOT
  rationale: Hiphil of בוא with 1cs suffix means 'he brought me.' 'Then' reflects the narrative waw in smooth English; 'brought' is more literal than 'led,' though 'led' is a possible contextual alternative.
- source_word: דֶּרֶךְ שַׁעַר הַצָּפוֹן
  chosen: by way of the north gate
  alternatives:
  - through the north gate
  - by the way of the north gate
  lexicon: HALOT
  rationale: דֶּרֶךְ can denote way/path/route. In this construction it indicates the route taken. 'By way of the north gate' preserves the idiom naturally while staying close to the Hebrew.
- source_word: אֶל פְּנֵי הַבַּיִת
  chosen: to the front of the house
  alternatives:
  - before the house
  - to the face of the house
  lexicon: HALOT
  rationale: פְּנֵי literally 'face of,' often idiomatically 'front of' or 'before.' 'Front of the house' is the clearest natural English equivalent here. 'House' is retained rather than 'temple' to reflect בַּיִת and Ezekiel's temple-house terminology.
- source_word: וָאֵרֶא
  chosen: and I looked
  alternatives:
  - and I saw
  lexicon: HALOT
  rationale: ראה commonly means 'see,' but in sequence with וְהִנֵּה it often introduces a fresh visual notice. 'I looked, and behold' gives good English rhythm while preserving the observational force.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Behold' preserves the suddenness and solemnity appropriate to the vision scene.
- source_word: מָלֵא
  chosen: filled
  alternatives:
  - was full of
  - had filled
  lexicon: HALOT
  rationale: 'Though formally an adjective/participle-like form meaning ''full,'' in English the clause is best rendered verbally: ''the glory of the LORD filled the house.'' This captures the predicative sense naturally.'
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: Standard rendering of כָּבוֹד in this prophetic-temple context. The construct phrase is preserved straightforwardly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' Retaining 'house' preserves Ezekiel's terminology and avoids importing 'temple' where the Hebrew uses house-language.
- source_word: וָאֶפֹּל אֶל פָּנַי
  chosen: and I fell on my face
  alternatives:
  - and I fell facedown
  - and I fell upon my face
  lexicon: HALOT
  rationale: A common Hebrew idiom for prostration. 'I fell on my face' is both accurate and idiomatic in English, preserving the reverential response.
