theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering בַּיִת / בֵּית יְהוָה in Ezekiel's temple vision
  chosen_reading: house / house of Yahweh
  alternative_readings:
  - temple / temple of the LORD
  rationale: The Hebrew repeatedly uses 'house' language in this vision. Translating with 'house' preserves the source-text diction and avoids smoothing every occurrence into 'temple,' though the referent is the temple complex.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
