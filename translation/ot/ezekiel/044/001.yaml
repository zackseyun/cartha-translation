id: EZK.44.1
reference: Ezekiel 44:1
source:
  edition: WLC
  text: וַ/יָּ֣שֶׁב אֹתִ֗/י דֶּ֣רֶךְ שַׁ֤עַר הַ/מִּקְדָּשׁ֙ הַֽ/חִיצ֔וֹן הַ/פֹּנֶ֖ה
    קָדִ֑ים וְ/ה֖וּא סָגֽוּר׃
translation:
  text: Then he brought me back by way of the outer gate of the sanctuary, the one
    facing east, and it was shut.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then he turned me back by way of the outer gate of the sanctuary.' The
      Hebrew verb can be rendered more literally as 'turned/returned me,' but the
      sense is that the guide caused Ezekiel to go back to this gate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: brought ... back
  alternatives:
  - turned me back
  - returned me
  lexicon: HALOT
  rationale: From שוב in the Hiphil/waw-consecutive narrative form, here meaning to
    cause someone to return. 'Brought me back' is idiomatic English and preserves
    the causative sense better than the more awkward 'turned me back.'
- source_word: דֶּרֶךְ
  chosen: by way of
  alternatives:
  - through
  - by the way of
  lexicon: HALOT
  rationale: The noun commonly means 'way/road/path' and in this construction marks
    the route taken. 'By way of' is natural English and reflects movement along a
    route without overstating that he passed through the gate itself.
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: Standard rendering for שער in architectural contexts. 'Gate' is concise
    and fits temple-complex imagery.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the temple precinct
  lexicon: HALOT
  rationale: מקדש refers to the sacred complex. 'Sanctuary' is the most natural English
    equivalent here and avoids implying only the inner shrine while still marking
    the place as holy.
- source_word: הַחִיצוֹן
  chosen: outer
  alternatives:
  - outside
  - external
  lexicon: HALOT
  rationale: Adjectival modifier distinguishing this gate from inner gates in Ezekiel's
    temple vision. 'Outer' is the standard architectural contrast.
- source_word: הַפֹּנֶה קָדִים
  chosen: the one facing east
  alternatives:
  - which faces east
  - eastward-facing
  lexicon: HALOT
  rationale: The participle plus קדים describes orientation. 'The one facing east'
    smoothly apposes 'gate' in English and preserves the definite identification of
    this specific gate.
- source_word: וְהוּא סָגוּר
  chosen: and it was shut
  alternatives:
  - and it was closed
  - but it was shut
  lexicon: HALOT
  rationale: סגור denotes being closed/shut. 'Shut' fits gate language slightly better
    than 'closed.' The conjunction is rendered simply as 'and'; no adversative force
    is required by the Hebrew.
