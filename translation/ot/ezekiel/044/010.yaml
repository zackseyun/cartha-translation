id: EZK.44.10
reference: Ezekiel 44:10
source:
  edition: WLC
  text: כִּ֣י אִם הַ/לְוִיִּ֗ם אֲשֶׁ֤ר רָֽחֲקוּ֙ מֵֽ/עָלַ֔/י בִּ/תְע֤וֹת יִשְׂרָאֵל֙
    אֲשֶׁ֣ר תָּע֣וּ מֵֽ/עָלַ֔/י אַחֲרֵ֖י גִּלּֽוּלֵי/הֶ֑ם וְ/נָשְׂא֖וּ עֲוֺנָֽ/ם־׃
translation:
  text: But the Levites who went far from me when Israel went astray, who went astray
    from me after their idols, shall bear their punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'shall bear their iniquity' or 'shall bear their guilt.' The Hebrew
      idiom includes both culpability and the penalty that follows from it.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Surely
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: In context this introduces a contrastive exception to the preceding restriction,
    best conveyed idiomatically by 'But' rather than a more wooden 'for if' or 'except.'
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical priests
  lexicon: HALOT
  rationale: The Hebrew specifically names Levites, not priests in general. Since
    the verse distinguishes Levites from the Zadokite priests in the surrounding context,
    'the Levites' is the precise rendering.
- source_word: רָחֲקוּ מֵעָלַי
  chosen: went far from me
  alternatives:
  - went away from me
  - became distant from me
  lexicon: HALOT
  rationale: The verb רחק denotes becoming distant or far away. 'Went far from me'
    preserves both the movement metaphor and covenantal estrangement.
- source_word: בִּתְעוֹת יִשְׂרָאֵל
  chosen: when Israel went astray
  alternatives:
  - in the wandering of Israel
  - in Israel's going astray
  lexicon: HALOT
  rationale: The infinitive construct with ב marks the circumstance/time. 'When Israel
    went astray' is natural English and preserves the causal-historical setting.
- source_word: תָּעוּ
  chosen: went astray
  alternatives:
  - wandered
  - erred
  lexicon: HALOT
  rationale: This repeats the same root as תְעוֹת, and 'went astray' preserves the
    repetition and moral-religious sense of deviation.
- source_word: אַחֲרֵי גִּלּוּלֵיהֶם
  chosen: after their idols
  alternatives:
  - following their idols
  lexicon: HALOT
  rationale: אַחֲרֵי commonly means 'after' in the sense of following. גִּלּוּלִים
    is Ezekiel's strongly pejorative term for idols. 'After their idols' keeps the
    Hebrew imagery and idiom.
- source_word: גִּלּוּלֵיהֶם
  chosen: idols
  alternatives:
  - dung-idols
  - filthy idols
  lexicon: HALOT
  rationale: The term is contemptuous in Ezekiel, but standard English Bible style
    usually renders it 'idols.' More interpretive pejorative expansions would over-translate
    the lexical force.
- source_word: וְנָשְׂאוּ עֲוֺנָם
  chosen: shall bear their punishment
  alternatives:
  - shall bear their iniquity
  - shall bear their guilt
  lexicon: HALOT
  rationale: The idiom נשׂא עון can mean to bear guilt and its consequences. In this
    disciplinary context, 'shall bear their punishment' communicates the result clearly
    in modern English, while the alternatives preserve the more formal idiom.
