theological_decisions:
- issue: Rendering the covenant-judgment idiom וְנָשְׂאוּ עֲוֺנָם
  chosen_reading: shall bear their punishment
  alternative_readings:
  - shall bear their iniquity
  - shall bear their guilt
  rationale: The Hebrew idiom can denote both culpability and the penalty borne for
    it. Because the surrounding context concerns exclusion from priestly privilege
    as judgment, 'bear their punishment' best communicates the sense without importing
    later doctrinal categories. The more formal alternatives are preserved in a footnote
    for auditability.
  doctrine_reference: Translation philosophy §1, §5
