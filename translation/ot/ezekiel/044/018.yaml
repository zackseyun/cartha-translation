id: EZK.44.18
reference: Ezekiel 44:18
source:
  edition: WLC
  text: פַּאֲרֵ֤י פִשְׁתִּים֙ יִהְי֣וּ עַל רֹאשָׁ֔/ם וּ/מִכְנְסֵ֣י פִשְׁתִּ֔ים יִהְי֖וּ
    עַל מָתְנֵי/הֶ֑ם לֹ֥א יַחְגְּר֖וּ בַּ/יָּֽזַע־־׃
translation:
  text: Linen turbans shall be on their heads, and linen undergarments shall be on
    their loins; they shall not gird themselves with anything that causes sweat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'they shall not gird themselves with sweat.' The Hebrew
      is elliptical; the sense is likely that they must not wear or fasten garments
      that produce perspiration.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּאֲרֵי
  chosen: turbans
  alternatives:
  - headwraps
  - headdresses
  - ornamental caps
  lexicon: HALOT
  rationale: The noun refers to priestly headgear, not merely generic 'beauty' here.
    'Turbans' best fits the cultic clothing context and pairs naturally with 'on their
    heads.'
- source_word: פִשְׁתִּים
  chosen: linen
  alternatives:
  - flax
  lexicon: HALOT
  rationale: In clothing contexts the material is best rendered 'linen' rather than
    the raw product 'flax.' The repetition is preserved for clarity and consistency.
- source_word: מִכְנְסֵי
  chosen: undergarments
  alternatives:
  - linen shorts
  - breeches
  - trousers
  lexicon: HALOT
  rationale: This term denotes the lower-body garment worn next to the skin by priests.
    'Undergarments' is clear modern English and avoids archaic 'breeches' while not
    overstating the exact cut as 'trousers.'
- source_word: מָתְנֵיהֶם
  chosen: their loins
  alternatives:
  - their waists
  - their hips
  lexicon: HALOT
  rationale: '''Loins'' is the more precise anatomical/clothing term in priestly dress
    instructions, though somewhat formal. It better reflects the Hebrew than the more
    generalized ''waists.'''
- source_word: יַחְגְּרוּ
  chosen: gird themselves
  alternatives:
  - bind themselves
  - wear a belt
  - fasten their garments
  lexicon: HALOT
  rationale: The verb specifically refers to girding or fastening clothing around
    oneself. 'Gird themselves' preserves the clothing-specific action in a concise
    way.
- source_word: בַּיָּזַע
  chosen: with anything that causes sweat
  alternatives:
  - in sweat
  - with sweat
  - so as to sweat
  lexicon: HALOT
  rationale: The preposition with the noun 'sweat' is elliptical in English. The sense
    is that they must not gird themselves in a way or with a material that produces
    perspiration, likely contrasting wool with linen. This rendering communicates
    the likely force without over-specifying the omitted object.
