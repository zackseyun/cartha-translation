theological_decisions:
- issue: Priestly clothing regulation and implied rationale
  chosen_reading: Render the final clause as a prohibition against wearing or fastening
    garments that induce sweating.
  alternative_readings:
  - Render more literally as 'they shall not gird themselves with sweat'
  - Interpret as a ban specifically on woolen belts or garments
  rationale: The Hebrew is terse and somewhat elliptical. The broader context emphasizes
    linen garments for temple service, and the immediate contrast suggests avoidance
    of materials or modes of dress associated with perspiration. The translation keeps
    the practical force of the command without importing a narrower doctrinal claim
    than the text states.
  doctrine_reference: Translation philosophy items 1, 3, and 6
