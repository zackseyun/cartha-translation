theological_decisions:
- issue: Rendering the divine name יְהוָה in the prophetic formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD.' In
    the compound אֲדֹנָי יְהוִה, standard English style avoids 'Lord LORD'; 'the Lord
    GOD' preserves reverential convention and distinguishes the divine name without
    transliterating it in the main text.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
