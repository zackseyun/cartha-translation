id: EZK.44.12
reference: Ezekiel 44:12
source:
  edition: WLC
  text: יַ֗עַן אֲשֶׁ֨ר יְשָׁרְת֤וּ אוֹתָ/ם֙ לִ/פְנֵ֣י גִלּֽוּלֵי/הֶ֔ם וְ/הָי֥וּ לְ/בֵֽית
    יִשְׂרָאֵ֖ל לְ/מִכְשׁ֣וֹל עָוֺ֑ן עַל כֵּן֩ נָשָׂ֨אתִי יָדִ֜/י עֲלֵי/הֶ֗ם נְאֻם֙
    אֲדֹנָ֣/י יְהוִ֔ה וְ/נָשְׂא֖וּ עֲוֺנָֽ/ם־־׃
translation:
  text: Because they ministered to them before their idols and became for the house
    of Israel a stumbling block of iniquity, therefore I have raised my hand against
    them, declares the Lord GOD, and they will bear their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''I have lifted up my hand against them,'' a gesture that
      can signal a solemn oath or judicial action; here the context favors a judgment
      declaration against them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they served them before their idols.' The Hebrew pronoun 'them' is somewhat
      compressed in English and may refer to those associated with the idols or, by
      sense, to the idols themselves.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Because that
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment. 'Because' is natural modern
    English and preserves the explicit causal force.
- source_word: יְשָׁרְתוּ
  chosen: they ministered
  alternatives:
  - they served
  lexicon: HALOT
  rationale: The verb commonly denotes ministerial/service activity, especially cultic
    service. 'Ministered' preserves the temple-priestly context better than the broader
    'served'.
- source_word: אוֹתָם
  chosen: to them
  alternatives:
  - them
  lexicon: HALOT
  rationale: The direct-object marker with pronominal suffix refers back to the idols'
    worshipers or the idols in context; in English, 'ministered to them' best conveys
    the service rendered in front of the idols. The following phrase clarifies the
    idolatrous setting.
- source_word: לִפְנֵי גִלּוּלֵיהֶם
  chosen: before their idols
  alternatives:
  - in the presence of their idols
  - before their dung-idols
  lexicon: HALOT
  rationale: לִפְנֵי is spatial 'before/in front of.' גִלּוּלִים is Ezekiel's pejorative
    term for idols. 'Idols' is the clear standard rendering in readable English; the
    pejorative nuance is real but too woodenly reproduced by 'dung-idols' in the main
    text.
- source_word: וְהָיוּ
  chosen: and became
  alternatives:
  - and were
  lexicon: HALOT
  rationale: In context the verb marks resultant status from prior conduct. 'Became'
    captures the consequential sense better than a static 'were'.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - to the house of Israel
  lexicon: HALOT
  rationale: Retains the covenantal collective expression 'house of Israel' rather
    than flattening to simply 'Israel.' 'For' works idiomatically with the predicate
    construction.
- source_word: לְמִכְשׁוֹל עָוֺן
  chosen: a stumbling block of iniquity
  alternatives:
  - an occasion for sin
  - a stumbling block causing guilt
  lexicon: HALOT
  rationale: This phrase is a stock Ezekiel expression. 'Stumbling block of iniquity'
    preserves the metaphor and moral weight. More interpretive alternatives explain
    the sense but lose the idiom.
- source_word: נָשָׂאתִי יָדִי עֲלֵיהֶם
  chosen: I have raised my hand against them
  alternatives:
  - I have lifted up my hand against them
  - I have sworn against them
  lexicon: HALOT
  rationale: The idiom can denote a solemn oath gesture and, in judgment contexts,
    a raised hand against someone. Here 'against them' makes the hostile judicial
    force explicit while preserving the bodily idiom. The oath nuance is preserved
    in a footnote.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is idiomatic English.
    Per doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'Lord GOD'
    is the conventional English equivalent that avoids 'Lord LORD'.
- source_word: וְנָשְׂאוּ עֲוֺנָם
  chosen: and they will bear their iniquity
  alternatives:
  - and they will bear their guilt
  - and they will suffer the punishment for their iniquity
  lexicon: HALOT
  rationale: The idiom means bearing culpability and its consequences. 'Bear their
    iniquity' preserves the Hebrew expression and theological weight; 'guilt' is possible
    but narrows the semantic range.
