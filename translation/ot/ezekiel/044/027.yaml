theological_decisions:
- issue: Rendering of the divine name יְהוָה in the compound אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' In the fixed Hebrew expression אֲדֹנָי יְהוִה, standard English convention
    uses 'Lord GOD' to distinguish the two elements and avoid the awkward 'Lord LORD.'
    This preserves reverential convention without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
