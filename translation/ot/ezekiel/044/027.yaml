id: EZK.44.27
reference: Ezekiel 44:27
source:
  edition: WLC
  text: וּ/בְ/יוֹם֩ בֹּא֨/וֹ אֶל הַ/קֹּ֜דֶשׁ אֶל הֶ/חָצֵ֤ר הַ/פְּנִימִית֙ לְ/שָׁרֵ֣ת
    בַּ/קֹּ֔דֶשׁ יַקְרִ֖יב חַטָּאת֑/וֹ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: And on the day he enters the sanctuary, into the inner court, to minister
    in the sanctuary, he shall present his sin offering, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his purification offering.' The Hebrew חַטָּאת in sacrificial contexts
      can denote the offering for sin/purification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  chosen: And on the day
  alternatives:
  - And in the day
  - But on the day
  lexicon: HALOT
  rationale: The conjunction with beth + 'day' is temporal. 'On the day' is idiomatic
    modern English and preserves the specific temporal force better than the more
    wooden 'in the day.' Initial 'And' maintains the verse's connection to the preceding
    regulations.
- source_word: בֹּאוֹ
  chosen: he enters
  alternatives:
  - his entering
  - when he comes
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix after 'on the day' functions
    temporally. 'He enters' gives clear English syntax while preserving the subject
    and action.
- source_word: אֶל־הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy place/sanctuary
  lexicon: HALOT
  rationale: קֹדֶשׁ here denotes the sacred precinct rather than abstract holiness.
    'Sanctuary' is natural English for the cultic setting and avoids over-specifying
    a technical chamber if the broader sacred area is intended.
- source_word: אֶל־הֶחָצֵר הַפְּנִימִית
  chosen: into the inner court
  alternatives:
  - to the inner court
  lexicon: HALOT
  rationale: The second אֶל is best taken appositionally/further specifying the destination.
    'Into the inner court' reflects movement into the court area and reads smoothly
    in English.
- source_word: לְשָׁרֵת
  chosen: to minister
  alternatives:
  - to serve
  lexicon: HALOT
  rationale: In priestly/cultic contexts, שׁרת commonly refers to liturgical service.
    'Minister' preserves the sacred-service nuance better than the broader 'serve.'
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  lexicon: HALOT
  rationale: The repeated קֹדֶשׁ is rendered consistently here. 'In the sanctuary'
    fits the cultic context and keeps the parallel with the earlier phrase.
- source_word: יַקְרִיב
  chosen: he shall present
  alternatives:
  - he shall offer
  - he shall bring near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts means to present/offer. 'Present'
    is slightly more literal to the causative sense while remaining natural; the sacrificial
    object makes the cultic meaning clear.
- source_word: חַטָּאתוֹ
  chosen: his sin offering
  alternatives:
  - his purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the sacrifice associated with sin/purification.
    In sacrificial legislation with יקריב, the offering sense is required. 'Sin offering'
    is the standard and most immediately recognizable rendering; 'purification offering'
    is a viable alternative preserved in a footnote because some argue the rite emphasizes
    purification more than expiation.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - utterance of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם introduces a solemn divine declaration. 'Declares' is idiomatic.
    Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, the
    conventional English representation is 'Lord GOD' to avoid 'Lord LORD' while signaling
    the divine name.
