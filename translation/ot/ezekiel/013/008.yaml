id: EZK.13.8
reference: Ezekiel 13:8
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֚עַן דַּבֶּרְ/כֶ֣ם שָׁ֔וְא וַ/חֲזִיתֶ֖ם כָּזָ֑ב לָ/כֵן֙ הִנְ/נִ֣י אֲלֵי/כֶ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: 'Therefore thus says the Lord GOD: Because you have spoken falsehood and seen a lie, therefore behold, I am against you, declares the Lord GOD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Lord YHWH'; traditionally rendered 'the Lord GOD' to avoid the awkward English repetition 'Lord LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Discourse marker introducing both the divine pronouncement and its consequence. 'Therefore' preserves the formal causal force at both occurrences.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  - thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense English idiom best reflects the formulaic force in prophetic speech.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Renders the title-plus-divine-name formula conventionally as 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' and uses 'Lord GOD' to represent the Hebrew reverential reading while preserving the title-name distinction as much as idiomatic English allows.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for judgment. 'Because' is clear, natural, and sufficiently formal.
- source_word: דַּבֶּרְכֶם
  chosen: you have spoken
  alternatives:
  - you speak
  - your speaking
  lexicon: HALOT
  rationale: The infinitive/verb form with suffix functions causally with יַעַן; English finite verbal rendering 'you have spoken' communicates the completed culpable action.
- source_word: שָׁוְא
  chosen: falsehood
  alternatives:
  - vanity
  - emptiness
  - worthlessness
  lexicon: HALOT
  rationale: In prophetic denunciation of deceptive speech, 'falsehood' best captures the semantic force here, more specifically than 'vanity' or 'emptiness'.
- source_word: וַחֲזִיתֶם
  chosen: and seen
  alternatives:
  - and envisioned
  - and prophesied
  lexicon: HALOT
  rationale: From חזה, 'to see' in visionary/prophetic context. 'Seen' preserves the prophetic-vision idiom without overinterpreting as 'prophesied.'
- source_word: כָּזָב
  chosen: a lie
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: Paired with visionary language, this denotes the content of the vision as deceptive. 'A lie' is direct and forceful, matching the singular noun.
- source_word: הִנְנִי אֲלֵיכֶם
  chosen: behold, I am against you
  alternatives:
  - look, I am against you
  - here I am against you
  lexicon: HALOT
  rationale: Idiomatic divine threat formula. 'Behold' preserves the solemn prophetic register, and 'I am against you' accurately conveys hostile opposition.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Common prophetic authentication formula. 'Declares' is readable modern English and preserves the authoritative force.
