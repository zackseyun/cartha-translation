id: EZK.13.3
reference: Ezekiel 13:3
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה ה֖וֹי עַל הַ/נְּבִיאִ֣ים הַ/נְּבָלִ֑ים אֲשֶׁ֥ר הֹלְכִ֛ים אַחַ֥ר רוּחָ֖/ם וּ/לְ/בִלְתִּ֥י רָאֽוּ־׃
translation:
  text: 'Thus says the Lord GOD: Woe to the foolish prophets, who follow their own spirit and have seen nothing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who walk after their own spirit'; the Hebrew idiom is literally 'who go after their own spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  rationale: Rendered as 'the Lord GOD,' the standard English representation of אֲדֹנָי יְהוִה in contexts where the divine name follows Adonai. This preserves the title-plus-name force while following the doctrine default of rendering YHWH as 'the LORD' rather than a transliteration; in this compound form, conventional English capitalization 'GOD' distinguishes the underlying divine name.
- source_word: הוֹי
  chosen: Woe to
  alternatives:
  - Ah!
  - Alas for
  - Woe to
  lexicon: HALOT
  rationale: הוֹי introduces a denunciation or lament-oracle. 'Woe to' best captures the prophetic judgment force in natural English.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  alternatives:
  - the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with article.
- source_word: הַנְּבָלִים
  chosen: foolish
  alternatives:
  - senseless
  - worthless
  - stupid
  lexicon: HALOT
  rationale: From נבל, denoting moral and spiritual folly rather than mere lack of intelligence. 'Foolish' preserves the ethical-prophetic sense and fits biblical register.
- source_word: הֹלְכִים אַחַר רוּחָם
  chosen: who follow their own spirit
  alternatives:
  - who walk after their own spirit
  - who follow their own wind
  lexicon: HALOT
  rationale: The idiom 'walk/go after' means to follow. רוּחַ can mean spirit, wind, or breath; here it refers to their own inner impulse or inspiration, so 'their own spirit' best preserves the prophetic contrast.
- source_word: וּלְבִלְתִּי רָאוּ
  chosen: and have seen nothing
  alternatives:
  - though they have seen nothing
  - without having seen anything
  lexicon: HALOT
  rationale: 'This clause explains the emptiness of their claims: they pursue self-generated inspiration despite having received no true vision. ''Have seen nothing'' is concise and idiomatic, preserving the prophetic sense of visionary sight.'
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula in clear modern English.
