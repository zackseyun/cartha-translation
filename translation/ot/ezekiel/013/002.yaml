id: EZK.13.2
reference: Ezekiel 13:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הִנָּבֵ֛א אֶל נְבִיאֵ֥י יִשְׂרָאֵ֖ל הַ/נִּבָּאִ֑ים וְ/אָֽמַרְתָּ֙ לִ/נְבִיאֵ֣י מִ/לִּבָּ֔/ם שִׁמְע֖וּ דְּבַר יְהוָֽה־־־׃
translation:
  text: Son of man, prophesy against the prophets of Israel who are prophesying, and say to those who prophesy from their own hearts, ‘Hear the word of Yahweh.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'to the prophets of their own heart.' The Hebrew idiom means they speak from themselves rather than from the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering preserves the idiom and its literary continuity in the book better than a more interpretive alternative such as 'mortal.' The Hebrew is singular and masculine, matching the direct address to Ezekiel.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - speak as a prophet
  lexicon: HALOT
  rationale: The Niphal imperative of נבא is the standard verb for prophetic speech. 'Prophesy' is the most direct and natural English equivalent.
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' in prophetic commission formulas with hostile content it can function idiomatically as 'against.' The immediate context is denunciatory, so 'against' best reflects the force in English.
- source_word: נְבִיאֵי יִשְׂרָאֵל
  chosen: the prophets of Israel
  alternatives:
  - Israel’s prophets
  lexicon: HALOT
  rationale: A straightforward construct rendering. 'The prophets of Israel' preserves the Hebrew form and leaves open the irony that these are purported prophets belonging to Israel yet condemned by YHWH.
- source_word: הַנִּבָּאִים
  chosen: who are prophesying
  alternatives:
  - who prophesy
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action. 'Who are prophesying' preserves that aspect more clearly, though idiomatic English could also use the simple present.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  lexicon: HALOT
  rationale: The waw + qatal continues the command sequence. 'And say' is natural modern English while preserving the imperative force.
- source_word: לִנְבִיאֵי מִלִּבָּם
  chosen: to those who prophesy from their own hearts
  alternatives:
  - to the prophets of their own heart
  - to the prophets from their own mind
  lexicon: HALOT
  rationale: The Hebrew literally says 'to the prophets of/from their heart.' In context it refers to self-generated prophecy rather than revelation from YHWH. Rendering the phrase verbally in English communicates the sense clearly while preserving the metaphor of the heart as the source of their message.
- source_word: לֵב/לֵבָב (in מִלִּבָּם)
  chosen: hearts
  alternatives:
  - minds
  - inner selves
  lexicon: HALOT
  rationale: Hebrew 'heart' includes thought and intention, but 'hearts' preserves the source metaphor and avoids over-interpretation. The plural suffix refers to the false prophets collectively.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: The imperative calls for attentive reception. 'Hear' is concise and preserves the prophetic register.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Word' preserves intertextual continuity across prophetic literature. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
