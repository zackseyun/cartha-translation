theological_decisions:
- issue: Force of the preposition אֶל in a judgment context
  chosen_reading: Render as 'against' rather than the more literal 'to'
  alternative_readings:
  - to
  rationale: The verse introduces an oracle of condemnation against false prophets. Translating אֶל as 'against' reflects the adversative force of the commission in context without adding content foreign to the Hebrew.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition'
- issue: Rendering the false prophets’ source of revelation
  chosen_reading: '''those who prophesy from their own hearts'''
  alternative_readings:
  - '''the prophets of their own heart'''
  rationale: The Hebrew idiom emphasizes that their message arises internally rather than from divine revelation. The chosen rendering makes that theological contrast explicit in idiomatic English while retaining the 'heart' imagery.
  doctrine_reference: 'Translation philosophy: preserve source meaning in readable modern English'
