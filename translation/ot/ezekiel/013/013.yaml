id: EZK.13.13
reference: Ezekiel 13:13
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה וּ/בִקַּעְתִּ֥י רֽוּחַ סְעָר֖וֹת בַּֽ/חֲמָתִ֑/י וְ/גֶ֤שֶׁם שֹׁטֵף֙ בְּ/אַפִּ֣/י יִֽהְיֶ֔ה וְ/אַבְנֵ֥י אֶלְגָּבִ֖ישׁ בְּ/חֵמָ֥ה לְ/כָלָֽה־׃
translation:
  text: 'Therefore thus says the Lord GOD: I will unleash a storm wind in my wrath, and there will be a flooding rain in my anger, and hailstones in fury to bring complete destruction.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I will split open a wind of storms'; the sense is that God causes a violent storm wind to break forth.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English tradition commonly avoids 'Lord LORD' by using 'Lord GOD,' which preserves the sense of the divine title combination without awkward duplication.
- source_word: וּבִקַּעְתִּי
  chosen: I will unleash
  alternatives:
  - I will split open
  - I will break forth
  - I will burst out
  lexicon: HALOT
  rationale: The verb בקע literally involves splitting/breaking open, but with 'storm wind' as object the idiomatic sense is that God causes it to break forth. 'Unleash' communicates the causative force in natural English while preserving divine agency.
- source_word: רוּחַ סְעָרוֹת
  chosen: a storm wind
  alternatives:
  - a wind of storms
  - a tempestuous wind
  - a stormy wind
  lexicon: HALOT
  rationale: The construct phrase denotes a violent storm wind. Singular English is natural here though the second noun is plural in Hebrew intensity/abstraction usage.
- source_word: בַּחֲמָתִי
  chosen: in my wrath
  alternatives:
  - in my fury
  - in my rage
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה denotes burning wrath or fury. 'Wrath' fits prophetic judgment diction and distinguishes it from the later occurrence rendered 'fury' for stylistic variation while preserving semantic overlap.
- source_word: גֶּשֶׁם שֹׁטֵף
  chosen: a flooding rain
  alternatives:
  - an overflowing rain
  - a torrential rain
  - a sweeping rain
  lexicon: HALOT
  rationale: שֹׁטֵף conveys overflowing, inundating force. 'Flooding rain' is vivid, natural English and matches the destructive imagery of the context.
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - in my nostril
  - in my wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose/nostril' and by extension 'anger.' The idiomatic emotional sense is clearly intended here; 'in my anger' is the natural English rendering.
- source_word: וְאַבְנֵי אֶלְגָּבִישׁ
  chosen: and hailstones
  alternatives:
  - and stones of hail
  - and great hailstones
  lexicon: HALOT
  rationale: The phrase refers to hailstones. English commonly lexicalizes this as a single word rather than preserving the Hebrew construct literally.
- source_word: בְּחֵמָה
  chosen: in fury
  alternatives:
  - in wrath
  - in heat of anger
  lexicon: HALOT
  rationale: Again denotes divine fury. Rendered 'in fury' to preserve the repeated judgment emphasis while avoiding monotonous repetition of the same English term in one verse.
- source_word: לְכָלָה
  chosen: to bring complete destruction
  alternatives:
  - for destruction
  - to an end
  - for annihilation
  lexicon: HALOT
  rationale: The noun כָּלָה conveys completion/end in the sense of full destruction. 'To bring complete destruction' makes the telic force of לְ explicit and communicates the totality of judgment.
