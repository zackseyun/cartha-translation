  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Characterization of the objects used by the women
  chosen_reading: magic bands
  alternative_readings:
  - bands
  - amulets
  - veils
  rationale: The broader context condemns deceptive/occult practices. Rendering the term with 'magic' reflects the contextual function of the objects without asserting more than the passage implies about their exact material form.
