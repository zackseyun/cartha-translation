id: EZK.13.21
reference: Ezekiel 13:21
source:
  edition: WLC
  text: וְ/קָרַעְתִּ֞י אֶת מִסְפְּחֹֽתֵי/כֶ֗ם וְ/הִצַּלְתִּ֤י אֶת עַמִּ/י֙ מִ/יֶּדְ/כֶ֔ן וְ/לֹֽא יִהְי֥וּ ע֛וֹד בְּ/יֶדְ/כֶ֖ן לִ/מְצוּדָ֑ה וִֽ/ידַעְתֶּ֖ן כִּֽי אֲנִ֥י יְהוָֽה־־־־׃
translation:
  text: I will tear off your magic bands, and I will deliver my people from your hand, and they will no longer be in your hand as prey; then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bands,' 'amulets,' or possibly 'veils'; the Hebrew term is rare, and its exact referent is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'for hunting' or 'for capture'; the Hebrew expression likely conveys being subject to predatory seizure.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרַעְתִּי
  chosen: I will tear off
  alternatives:
  - I will tear apart
  - I will rip off
  lexicon: HALOT
  rationale: The verb קרע commonly means 'tear, rend.' With the direct object 'your mispeḥot,' 'tear off' fits the image of removing items worn or used by the women addressed in context.
- source_word: מִסְפְּחֹתֵיכֶם
  chosen: your magic bands
  alternatives:
  - your bands
  - your veils
  - your amulets
  lexicon: HALOT
  rationale: This rare term occurs in the immediate context of the prophet's denunciation of women using occult/manipulative objects (13:18, 20–21). 'Magic bands' best captures both the likely physical object and its divinatory function without over-specifying the exact form.
- source_word: הִצַּלְתִּי
  chosen: I will deliver
  alternatives:
  - I will rescue
  - I will save
  lexicon: HALOT
  rationale: '''Deliver'' is a natural rendering of נצל in a context of liberation from hostile power. It preserves the concrete sense of being snatched away from another''s control.'
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; no reason to paraphrase.
- source_word: מִיֶּדְכֶן / בְּיֶדְכֶן
  chosen: from your hand / in your hand
  alternatives:
  - from your power / in your power
  lexicon: HALOT
  rationale: Hebrew 'hand' often denotes power or control, but retaining 'hand' preserves the metaphor and the repetition in the verse while remaining intelligible in English.
- source_word: לִמְצוּדָה
  chosen: as prey
  alternatives:
  - for hunting
  - as a snare
  - for capture
  lexicon: HALOT
  rationale: The noun מצודה can denote a net, stronghold, or hunting/capture context depending on usage. Here, after 'they will no longer be in your hand,' the sense is that the people will no longer be subject to the women's predatory capture. 'As prey' communicates the result clearly in idiomatic English.
- source_word: וִידַעְתֶּן
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect in prophetic discourse often carries consequential force. 'Then you will know' makes the result relation clear while staying close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
