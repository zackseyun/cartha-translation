id: EZK.13.7
reference: Ezekiel 13:7
source:
  edition: WLC
  text: הֲ/ל֤וֹא מַֽחֲזֵה שָׁוְא֙ חֲזִיתֶ֔ם וּ/מִקְסַ֥ם כָּזָ֖ב אֲמַרְתֶּ֑ם וְ/אֹֽמְרִים֙ נְאֻם יְהוָ֔ה וַ/אֲנִ֖י לֹ֥א דִבַּֽרְתִּי־־׃ס
translation:
  text: Have you not seen a false vision and spoken a lying divination, when you say, ‘Declares Yahweh,’ though I have not spoken?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a vain vision' and 'a false divination.' The Hebrew terms emphasize emptiness and falsehood in the prophets' claimed revelations.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Have you not
  alternatives:
  - Is it not that
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Have you not' preserves the interrogative force naturally in English.
- source_word: מַחֲזֵה שָׁוְא
  chosen: a false vision
  alternatives:
  - a vain vision
  - an empty vision
  lexicon: HALOT
  rationale: מַחֲזֶה is 'vision/appearance,' and שָׁוְא denotes falsehood, emptiness, or vanity. 'False vision' best fits the prophetic context of deceptive revelation.
- source_word: חֲזִיתֶם
  chosen: seen
  alternatives:
  - beheld
  lexicon: HALOT
  rationale: Simple past 'seen' matches the Qal perfect 2mp and reads naturally with 'vision' in English.
- source_word: וּמִקְסַם כָּזָב
  chosen: and spoken a lying divination
  alternatives:
  - and declared a false divination
  - and uttered deceptive divination
  lexicon: HALOT
  rationale: מִקְסָם refers to divination/oracular pronouncement; כָּזָב means lie/falsehood. Because the following verb אֲמַרְתֶּם governs this phrase, 'spoken a lying divination' preserves the verbal sense while keeping the noun 'divination' explicit.
- source_word: אֲמַרְתֶּם
  chosen: spoken
  alternatives:
  - said
  - declared
  lexicon: HALOT
  rationale: Rendered 'spoken' to avoid repeating 'say' immediately before the quotation formula and to connect smoothly with 'a lying divination.'
- source_word: וְאֹמְרִים
  chosen: when you say
  alternatives:
  - even as you say
  - while saying
  lexicon: HALOT
  rationale: The participle gives ongoing or accompanying action. 'When you say' captures the sense idiomatically in English.
- source_word: נְאֻם יְהוָה
  chosen: Declares the LORD
  alternatives:
  - Oracle of the LORD
  - Utterance of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear modern English and preserves the force of divine pronouncement. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name as specified in DOCTRINE.md.
- source_word: וַאֲנִי לֹא דִבַּרְתִּי
  chosen: though I have not spoken
  alternatives:
  - but I have not spoken
  - when I had not spoken
  lexicon: HALOT
  rationale: The conjunction plus explicit pronoun creates a sharp contrast with their claim to speak for God. 'Though I have not spoken' conveys the adversative force naturally in English.
