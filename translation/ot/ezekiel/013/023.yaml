id: EZK.13.23
reference: Ezekiel 13:23
source:
  edition: WLC
  text: לָ/כֵ֗ן שָׁ֚וְא לֹ֣א תֶחֱזֶ֔ינָה וְ/קֶ֖סֶם לֹא תִקְסַ֣מְנָה ע֑וֹד וְ/הִצַּלְתִּ֤י אֶת עַמִּ/י֙ מִ/יֶּדְ/כֶ֔ן וִֽ/ידַעְתֶּ֖ן כִּֽי אֲנִ֥י יְהוָֽה־־־׃
translation:
  text: Therefore you will no longer see false visions or practice divination, and I will deliver my people from your hand. Then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have false visions.' The Hebrew uses the common prophetic verb 'see' for visionary experience.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks the verse as the consequence of the preceding judgment; 'Therefore' preserves the inferential force in natural English.
- source_word: שָׁוְא
  chosen: 'false'
  alternatives:
  - vain
  - empty
  - worthless
  lexicon: HALOT
  rationale: Here modifying the implied object of visionary activity, the sense is deceptive/untrue rather than merely empty; 'false visions' is idiomatic and contextually precise.
- source_word: תֶחֱזֶינָה
  chosen: you will ... see
  alternatives:
  - you will envision
  - you will behold
  lexicon: HALOT
  rationale: From חזה in prophetic contexts, often 'see' in the sense of receiving a vision. English 'see false visions' preserves the prophetic idiom without over-paraphrasing.
- source_word: קֶסֶם
  chosen: divination
  alternatives:
  - omens
  - soothsaying
  lexicon: HALOT
  rationale: Standard rendering for קסם in prophetic polemic; it denotes forbidden mantic practice.
- source_word: תִקְסַמְנָה
  chosen: practice divination
  alternatives:
  - divine
  - tell fortunes
  lexicon: HALOT
  rationale: Using the cognate verb with the noun yields natural English. 'Tell fortunes' is too colloquial; 'divine' could be misunderstood adjectivally.
- source_word: עוֹד
  chosen: anymore
  alternatives:
  - again
  - any longer
  lexicon: HALOT
  rationale: Conveys cessation from this point forward. Though 'no longer' already appears earlier, retaining 'anymore' reflects the Hebrew adverb's emphatic finality.
- source_word: וְהִצַּלְתִּי
  chosen: I will deliver
  alternatives:
  - I will rescue
  - I will save
  lexicon: HALOT
  rationale: '''Deliver'' fits the immediate context of liberation from oppressive control. ''Save'' could sound overly theological in a broader sense not explicit here.'
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; no reason to paraphrase.
- source_word: מִיֶּדְכֶן
  chosen: from your hand
  alternatives:
  - out of your hand
  - from your power
  lexicon: HALOT
  rationale: The idiom 'from your hand' is common biblical language for deliverance from someone's power/control. It is transparent enough in English and preserves the metaphor.
- source_word: וִידַעְתֶּן
  chosen: Then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect with vav in this context expresses result/consequence. 'Then' makes the sequence clear in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
