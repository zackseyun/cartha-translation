id: EZK.13.9
reference: Ezekiel 13:9
source:
  edition: WLC
  text: וְ/הָיְתָ֣ה יָדִ֗/י אֶֽל הַ/נְּבִיאִ֞ים הַ/חֹזִ֣ים שָׁוְא֮ וְ/הַ/קֹּסְמִ֣ים כָּזָב֒ בְּ/ס֧וֹד עַמִּ֣/י לֹֽא יִהְי֗וּ וּ/בִ/כְתָ֤ב בֵּֽית יִשְׂרָאֵל֙ לֹ֣א יִכָּתֵ֔בוּ וְ/אֶל אַדְמַ֥ת יִשְׂרָאֵ֖ל לֹ֣א יָבֹ֑אוּ וִ/ידַעְתֶּ֕ם כִּ֥י אֲנִ֖י אֲדֹנָ֥/י יְהוִֽה־־־־׃
translation:
  text: And my hand will be against the prophets who see falsehood and who practice lying divination. They will not be in the council of my people, nor will they be written in the register of the house of Israel, nor will they enter the land of Israel. Then you will know that I am the Lord Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly of my people' or 'secret council of my people' for 'council of my people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'record' or 'written roll' for 'register.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the Lord GOD' represents אֲדֹנָי יְהוִה; alternatively, 'the Lord Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיְתָה יָדִי אֶל
  chosen: And my hand will be against
  alternatives:
  - And my hand shall be upon
  - And my hand will be toward
  lexicon: HALOT
  rationale: The idiom 'my hand ... against' conveys active opposition/judgment, not mere direction. 'Against' best captures the hostile force of the expression in context.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering for נביאים; the context identifies them as those claiming prophetic authority.
- source_word: הַחֹזִים שָׁוְא
  chosen: who see falsehood
  alternatives:
  - who see vanity
  - who see what is false
  lexicon: HALOT
  rationale: חזים is a participle, 'those seeing/visioning'; שוא denotes falsehood, emptiness, or vanity. 'See falsehood' preserves the visionary idiom while making the accusation clear.
- source_word: וְהַקֹּסְמִים כָּזָב
  chosen: who practice lying divination
  alternatives:
  - and who divine lies
  - and the diviners of falsehood
  lexicon: HALOT
  rationale: קסם refers to divination; the participial construction parallels the previous phrase. 'Practice lying divination' is readable modern English and preserves the sense that their divinatory activity is fraudulent.
- source_word: בְּסוֹד עַמִּי
  chosen: in the council of my people
  alternatives:
  - in the assembly of my people
  - in the secret council of my people
  lexicon: HALOT
  rationale: סוד can mean confidential circle, council, or intimate assembly. 'Council' fits the exclusion formula here and avoids overreading 'secret' while preserving the idea of belonging to the recognized deliberative community of God's people.
- source_word: וּבִכְתָב בֵּית יִשְׂרָאֵל
  chosen: in the register of the house of Israel
  alternatives:
  - in the writing of the house of Israel
  - in the record of the house of Israel
  lexicon: HALOT
  rationale: כתב here refers not merely to writing in general but to an official written record/list. 'Register' communicates the likely administrative sense in idiomatic English.
- source_word: לֹא יִכָּתֵבוּ
  chosen: nor will they be written
  alternatives:
  - they will not be recorded
  - they will not be enrolled
  lexicon: HALOT
  rationale: The Niphal passive is preserved with 'be written,' while the surrounding phrase clarifies that this means inclusion in a register.
- source_word: וְאֶל אַדְמַת יִשְׂרָאֵל לֹא יָבֹאוּ
  chosen: nor will they enter the land of Israel
  alternatives:
  - nor will they come to the soil of Israel
  - nor will they come into the land of Israel
  lexicon: HALOT
  rationale: אדמת literally means ground/land/soil. In context of covenant judgment and exclusion, 'land of Israel' is the natural English rendering.
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  lexicon: HALOT
  rationale: The prefixed conjunction here is rendered contextually as a resultative transition. 'Then' brings out the consequence of the announced judgment.
- source_word: אֲנִי אֲדֹנָי יְהוִה
  chosen: I am the Lord GOD
  alternatives:
  - I am the Lord Yahweh
  - I am the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes YHWH, English convention uses 'Lord GOD' to distinguish the two divine titles without awkward repetition ('Lord LORD').
