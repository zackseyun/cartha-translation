id: EZK.13.6
reference: Ezekiel 13:6
source:
  edition: WLC
  text: חָ֤זוּ שָׁוְא֙ וְ/קֶ֣סֶם כָּזָ֔ב הָ/אֹֽמְרִים֙ נְאֻם יְהוָ֔ה וַֽ/יהוָ֖ה לֹ֣א שְׁלָחָ֑/ם וְ/יִֽחֲל֖וּ לְ/קַיֵּ֥ם דָּבָֽר־׃
translation:
  text: They have seen falsehood and lying divination, those who say, ‘Declaration of Yahweh,’ though Yahweh has not sent them; yet they hope for the fulfillment of the word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Oracle of the LORD” or “Utterance of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Or “yet they expect the word to be confirmed” or “they wait for the word to be fulfilled.”
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזוּ
  chosen: have seen
  alternatives:
  - saw
  - envisioned
  lexicon: HALOT
  rationale: Qal perfect 3cp of חזה, used of prophetic seeing/vision. 'Have seen' preserves the prophetic-vision idiom while fitting English aspect.
- source_word: שָׁוְא
  chosen: falsehood
  alternatives:
  - vanity
  - emptiness
  - worthlessness
  lexicon: HALOT
  rationale: In prophetic denunciation this noun commonly denotes what is false or empty. 'Falsehood' best matches the context of deceptive prophecy.
- source_word: קֶסֶם כָּזָב
  chosen: lying divination
  alternatives:
  - false divination
  - deceptive omen
  lexicon: HALOT
  rationale: קֶסֶם refers to divination; כָּזָב qualifies it as false/lying. 'Lying divination' is concise and preserves the moral charge of deceit.
- source_word: הָאֹמְרִים
  chosen: those who say
  alternatives:
  - the ones saying
  lexicon: HALOT
  rationale: Substantival participle referring to the false prophets. 'Those who say' is natural English and preserves the ongoing characteristic action.
- source_word: נְאֻם יְהוָה
  chosen: Declaration of the LORD
  alternatives:
  - Oracle of the LORD
  - Utterance of the LORD
  lexicon: HALOT
  rationale: Formulaic prophetic speech marker. 'Declaration of the LORD' is clear modern English and preserves the solemnity of the formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא שְׁלָחָם
  chosen: has not sent them
  alternatives:
  - did not send them
  lexicon: HALOT
  rationale: Straightforward negated perfect with object suffix. Present perfect in English fits the current relevance of their lack of commission.
- source_word: וְיִחֲלוּ
  chosen: yet they hope
  alternatives:
  - and they wait
  - and they expect
  lexicon: HALOT
  rationale: From יחל, to wait/hope. In context it conveys expectation that their message will be confirmed. 'Yet they hope' captures the adversative force in context, though the conjunction is formally simple waw.
- source_word: לְקַיֵּם דָּבָר
  chosen: for the fulfillment of the word
  alternatives:
  - to confirm the word
  - for a word to be fulfilled
  - to establish a word
  lexicon: HALOT
  rationale: The infinitive construct of קום in the piel/hifil-like stem here carries the sense of causing a word to stand, i.e., confirming/fulfilling it. 'Fulfillment of the word' reads naturally in English while preserving the idea that they expect their spoken message to come true.
