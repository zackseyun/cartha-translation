id: EZK.13.14
reference: Ezekiel 13:14
source:
  edition: WLC
  text: וְ/הָ֨רַסְתִּ֜י אֶת הַ/קִּ֨יר אֲשֶׁר טַחְתֶּ֥ם תָּפֵ֛ל וְ/הִגַּעְתִּ֥י/הוּ אֶל הָ/אָ֖רֶץ וְ/נִגְלָ֣ה יְסֹד֑/וֹ וְ/נָֽפְלָה֙ וּ/כְלִיתֶ֣ם בְּ/תוֹכָ֔/הּ וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־־־־׃
translation:
  text: I will tear down the wall that you plastered with whitewash, and bring it down to the ground, so that its foundation is laid bare. It will fall, and you will perish in its midst. Then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you plastered with flimsy mortar.' The Hebrew term can emphasize either whitewashing or an inferior coating; in this context it conveys a deceptive, superficial covering.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרַסְתִּי
  chosen: I will tear down
  alternatives:
  - I will break down
  - I will demolish
  lexicon: HALOT
  rationale: The verb הרס denotes pulling down or demolishing a structure. 'Tear down' is vivid, natural English and fits the image of a wall being destroyed.
- source_word: הַקִּיר
  chosen: the wall
  lexicon: HALOT
  rationale: קִיר is a wall, here the symbolic wall of the false prophets' deceptive message. The concrete image should be retained in translation.
- source_word: טַחְתֶּם תָּפֵל
  chosen: you plastered with whitewash
  alternatives:
  - you smeared with whitewash
  - you coated with whitewash
  - you plastered with flimsy mortar
  lexicon: HALOT
  rationale: The idiom in this chapter refers to covering a wall with deceptive coating. 'Whitewash' best captures the prophetic metaphor of superficial concealment in readable English. 'Flimsy mortar' is possible for תָּפֵל, but in context the chapter's repeated image is better conveyed by 'whitewash.'
- source_word: וְהִגַּעְתִּיהוּ אֶל הָאָרֶץ
  chosen: and bring it down to the ground
  alternatives:
  - and make it touch the ground
  - and strike it to the earth
  lexicon: HALOT
  rationale: The Hiphil of נגע with 'to the earth' expresses causing the wall to come down to ground level. 'Bring it down to the ground' communicates the result clearly in idiomatic English.
- source_word: וְנִגְלָה יְסֹדוֹ
  chosen: so that its foundation is laid bare
  alternatives:
  - and its foundation will be uncovered
  - and its foundation will be exposed
  lexicon: HALOT
  rationale: The passive sense of גלה here indicates exposure. 'Laid bare' is idiomatic and preserves the image of hidden structural weakness being exposed.
- source_word: וְנָפְלָה
  chosen: It will fall
  alternatives:
  - and it will collapse
  lexicon: HALOT
  rationale: The feminine singular verb refers back to the wall. 'It will fall' is simple and direct, preserving the sequence of judgment.
- source_word: וּכְלִיתֶם בְּתוֹכָהּ
  chosen: and you will perish within it
  alternatives:
  - and you will be consumed in its midst
  - and you will come to an end inside it
  lexicon: HALOT
  rationale: כלה in this context denotes being finished or destroyed. 'Perish within it' communicates the judgment clearly and naturally, while preserving the spatial force of בתוך.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  chosen: Then you will know that I am the LORD
  alternatives:
  - and you will know that I am the LORD
  lexicon: HALOT
  rationale: This is Ezekiel's recurring recognition formula. 'The LORD' follows the project's default rendering for יְהוָה. 'Then' makes the resultative force clear in English without adding new content.
