id: EZK.13.16
reference: Ezekiel 13:16
source:
  edition: WLC
  text: נְבִיאֵ֣י יִשְׂרָאֵ֗ל הַֽ/נִבְּאִים֙ אֶל יְר֣וּשָׁלִַ֔ם וְ/הַ/חֹזִ֥ים לָ֖/הּ חֲז֣וֹן שָׁלֹ֑ם וְ/אֵ֣ין שָׁלֹ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהֹוִֽה־׃פ
translation:
  text: the prophets of Israel who prophesy concerning Jerusalem and who see for her a vision of peace, when there is no peace, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a vision of well-being'; Hebrew shalom can include peace, wholeness, and welfare.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאֵי יִשְׂרָאֵל
  chosen: the prophets of Israel
  alternatives:
  - Israel's prophets
  lexicon: HALOT
  rationale: Construct chain straightforwardly denotes the prophets belonging to/associated with Israel. The article is supplied naturally in English.
- source_word: הַנִּבְּאִים
  chosen: who prophesy
  alternatives:
  - who are prophesying
  - who prophesied
  lexicon: HALOT
  rationale: Participial form functions attributively, describing these prophets by their ongoing activity. English relative clause best captures the Hebrew participle in context.
- source_word: אֶל יְרוּשָׁלַםִ
  chosen: to Jerusalem
  alternatives:
  - concerning Jerusalem
  - against Jerusalem
  lexicon: HALOT
  rationale: The preposition אֶל most naturally means 'to/toward.' Since the context is false prophets addressing Jerusalem with deceptive messages, 'to Jerusalem' preserves the direct sense without overinterpreting.
- source_word: וְהַחֹזִים לָהּ
  chosen: and who see for her
  alternatives:
  - and who envision for her
  - and who see concerning her
  lexicon: HALOT
  rationale: חזה is the standard verb for seeing a vision. The pronoun לָהּ refers back to Jerusalem; 'for her' preserves the dative nuance and the benefactive sense of visions purportedly on Jerusalem's behalf.
- source_word: חֲזוֹן שָׁלוֹם
  chosen: a vision of peace
  alternatives:
  - a vision of well-being
  - a peaceful vision
  lexicon: HALOT
  rationale: חָזוֹן is 'vision'; שָׁלוֹם here denotes peace/well-being. 'Peace' is retained because the following repetition 'there is no peace' creates a deliberate rhetorical contrast that should remain explicit.
- source_word: וְאֵין שָׁלוֹם
  chosen: when there is no peace
  alternatives:
  - though there is no peace
  - but there is no peace
  - and there is no peace
  lexicon: HALOT
  rationale: The clause states the reality contradicting the prophets' message. 'When there is no peace' is idiomatic in English and reflects the circumstantial force often conveyed in this recurring Ezekiel/Jeremiah formula.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: Prophetic formula rendered idiomatically as 'declares,' which is standard modern English for divine utterance formulas.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' when אֲדֹנָי precedes YHWH, avoiding the awkward 'Lord LORD.' Per doctrine, YHWH is represented as 'the LORD'; in this fixed combination, 'Lord GOD' is the natural equivalent in English Bible style.
