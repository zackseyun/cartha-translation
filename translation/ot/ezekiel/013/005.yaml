theological_decisions:
- issue: Metaphorical military imagery applied to prophetic responsibility
  chosen_reading: Retain the concrete imagery of breaches, wall, battle, and day of the LORD rather than paraphrasing it into abstract spiritual failure.
  alternative_readings:
  - You did not protect Israel so it could survive judgment.
  rationale: The verse rebukes false prophets through fortification imagery. Preserving the metaphor allows readers to see both the literal picture and its prophetic force without importing an interpretive paraphrase into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated default for the Tetragrammaton in DOCTRINE.md.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
