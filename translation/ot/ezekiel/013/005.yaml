id: EZK.13.5
reference: Ezekiel 13:5
source:
  edition: WLC
  text: לֹ֤א עֲלִיתֶם֙ בַּ/פְּרָצ֔וֹת וַ/תִּגְדְּר֥וּ גָדֵ֖ר עַל בֵּ֣ית יִשְׂרָאֵ֑ל לַ/עֲמֹ֥ד בַּ/מִּלְחָמָ֖ה בְּ/י֥וֹם יְהוָֽה־׃
translation:
  text: You have not gone up into the breaches or built up a wall for the house of Israel, so that it might stand in the battle on the day of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the gaps.' The Hebrew refers to breaches in a wall, continuing the defensive imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלִיתֶם
  chosen: gone up
  alternatives:
  - stepped up
  - gone up into
  lexicon: HALOT
  rationale: The verb עלה is literally 'go up/ascend.' In this prophetic rebuke, the idiom suggests taking action by going up into exposed places in the defenses. 'Gone up' preserves the concrete imagery better than a more interpretive 'stepped up.'
- source_word: בַּפְּרָצוֹת
  chosen: into the breaches
  alternatives:
  - into the gaps
  - into the broken places
  lexicon: HALOT
  rationale: פרצות refers to breaches or breaks in a wall/defense. 'Breaches' best preserves the military-fortification imagery that governs the verse.
- source_word: וַתִּגְדְּרוּ גָדֵר
  chosen: built up a wall
  alternatives:
  - repaired a wall
  - made a fence
  - walled up
  lexicon: HALOT
  rationale: The cognate verb+noun construction intensifies the action of walling or fencing. 'Built up a wall' is natural English that retains the construction's force and the defensive image. 'Fence' would sound too weak in context.
- source_word: עַל בֵּית יִשְׂרָאֵל
  chosen: around the house of Israel
  alternatives:
  - for the house of Israel
  - on behalf of the house of Israel
  lexicon: HALOT
  rationale: With the wall imagery, על is best rendered spatially as 'around/for the protection of' rather than abstractly. 'Around the house of Israel' fits the metaphor of defensive fortification.
- source_word: לַעֲמֹד
  chosen: so that it might stand
  alternatives:
  - to stand
  - so as to stand firm
  lexicon: HALOT
  rationale: The infinitive expresses purpose. Rendering it with 'so that it might stand' makes the purpose relation clear in English. The singular pronoun reflects the collective 'house of Israel' as a singular entity.
- source_word: בַּמִּלְחָמָה
  chosen: in the battle
  alternatives:
  - in battle
  - in the war
  lexicon: HALOT
  rationale: '''Battle'' suits the immediate image of a coming confrontation better than the broader ''war.'' The article is retained naturally in English.'
- source_word: בְּיוֹם יְהוָה
  chosen: on the day of the LORD
  alternatives:
  - in the day of the LORD
  lexicon: HALOT
  rationale: This is the established prophetic expression for divine judgment. Per doctrine, יְהוָה is rendered 'the LORD.' 'On the day' is idiomatic modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
