theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD.' In the fixed Hebrew title אֲדֹנָי יְהוִה, English convention renders this
    as 'the Lord GOD' to preserve both elements without awkward repetition. This is
    a translation convention, not a doctrinal expansion.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
