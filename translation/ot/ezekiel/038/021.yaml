id: EZK.38.21
reference: Ezekiel 38:21
source:
  edition: WLC
  text: וְ/קָרָ֨אתִי עָלָ֤י/ו לְ/כָל הָרַ/י֙ חֶ֔רֶב נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה חֶ֥רֶב
    אִ֖ישׁ בְּ/אָחִ֥י/ו תִּֽהְיֶֽה־׃
translation:
  text: And I will summon a sword against him on all my mountains, declares the Lord
    GOD; every man's sword will be against his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And I will call for a sword against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרָאתִי
  chosen: And I will summon
  alternatives:
  - And I will call
  - And I will call for
  lexicon: HALOT
  rationale: קרא in this context means to call forth or summon an instrument of judgment.
    'Summon' conveys divine commissioning of the sword more naturally in English than
    the more wooden 'call.'
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: With קרא and the context of judgment, עַל is best rendered 'against,'
    expressing hostile direction toward Gog.
- source_word: לְכָל הָרַי
  chosen: on all my mountains
  alternatives:
  - throughout all my mountains
  - against all my mountains
  lexicon: HALOT
  rationale: The phrase locates the judgment within the mountainous land of Israel.
    'On all my mountains' is a natural rendering of the Hebrew and preserves the possessive
    'my.'
- source_word: חֶרֶב
  chosen: a sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: 'The first occurrence is indefinite in sense: God summons sword as an
    instrument of war/judgment. English idiom prefers ''a sword'' here.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the prophetic formula 'declares.' Following the project's doctrine,
    יְהוָה is rendered 'the LORD'; because אֲדֹנָי precedes it, 'Lord GOD' avoids
    'Lord LORD' and reflects standard English convention.
- source_word: חֶרֶב אִישׁ בְּאָחִיו תִּהְיֶה
  chosen: every man's sword will be against his brother
  alternatives:
  - each man's sword will be against his brother
  - the sword of each man will be against his brother
  lexicon: HALOT
  rationale: This idiom describes divinely induced mutual slaughter among the invaders.
    'Every man's sword' preserves the distributive force of אִישׁ and the concrete
    image of internecine violence. 'Brother' is retained as gender-accurate and idiomatic
    for fellow man/kinsman in conflict.
