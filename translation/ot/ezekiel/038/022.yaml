theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: Render the list as concrete acts of divine judgment without softening
    into merely symbolic disaster language.
  alternative_readings:
  - Treat the imagery as purely metaphorical in translation
  rationale: The Hebrew presents a direct divine judgment oracle using familiar covenant-judgment
    and theophanic imagery. The translation should preserve the concreteness of the
    announced acts while leaving broader interpretive questions to exegesis rather
    than resolving them in the wording.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
