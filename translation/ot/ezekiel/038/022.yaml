id: EZK.38.22
reference: Ezekiel 38:22
source:
  edition: WLC
  text: וְ/נִשְׁפַּטְתִּ֥י אִתּ֖/וֹ בְּ/דֶ֣בֶר וּ/בְ/דָ֑ם וְ/גֶ֣שֶׁם שׁוֹטֵף֩ וְ/אַבְנֵ֨י
    אֶלְגָּבִ֜ישׁ אֵ֣שׁ וְ/גָפְרִ֗ית אַמְטִ֤יר עָלָי/ו֙ וְ/עַל אֲגַפָּ֔י/ו וְ/עַל
    עַמִּ֥ים רַבִּ֖ים אֲשֶׁ֥ר אִתּֽ/וֹ־־׃
translation:
  text: And I will enter into judgment with him by pestilence and bloodshed; and I
    will rain down on him, on his troops, and on the many peoples who are with him,
    flooding rain, hailstones, fire, and sulfur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'torrential rain.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''fire and brimstone''; Hebrew ''fire and sulfur.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'his bands' or 'his armies'; the Hebrew term refers to the forces accompanying
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁפַּטְתִּי
  chosen: I will enter into judgment
  alternatives:
  - I will judge
  - I will execute judgment
  lexicon: HALOT
  rationale: The Niphal of שׁפט with אִתּוֹ idiomatically conveys engaging in judicial
    action against someone. 'Enter into judgment' preserves the legal nuance better
    than the flatter 'judge,' while remaining readable modern English.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - against him
  lexicon: HALOT
  rationale: The preposition is literally 'with.' In English, 'enter into judgment
    with him' naturally carries adversative force without changing the preposition
    in translation.
- source_word: בְּדֶבֶר
  chosen: by pestilence
  alternatives:
  - with plague
  - with pestilence
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence/plague as a divine judgment. 'Pestilence'
    fits prophetic judgment diction and pairs well with the instrumental בְּ.
- source_word: וּבְדָם
  chosen: and bloodshed
  alternatives:
  - and blood
  - and bloodguilt
  lexicon: HALOT
  rationale: In a judgment list, דָּם often functions metonymically for violent death
    or bloodshed rather than literal blood. 'Bloodshed' communicates the sense clearly
    in contemporary English.
- source_word: וְגֶשֶׁם שׁוֹטֵף
  chosen: flooding rain
  alternatives:
  - torrential rain
  - overflowing rain
  lexicon: HALOT
  rationale: The noun plus participle expresses a deluge-like storm. 'Flooding rain'
    preserves the imagery of overwhelming rainfall without sounding overly technical.
- source_word: וְאַבְנֵי אֶלְגָּבִישׁ
  chosen: hailstones
  alternatives:
  - stones of hail
  - great hailstones
  lexicon: HALOT
  rationale: This phrase denotes hailstones. The compact English rendering is natural
    and accurate; the stone imagery is inherent in 'hailstones.'
- source_word: אֵשׁ וְגָפְרִית
  chosen: fire, and sulfur
  alternatives:
  - fire and brimstone
  lexicon: HALOT
  rationale: '''Sulfur'' is the direct modern equivalent of גָפְרִית. ''Fire and brimstone''
    is traditional but archaic in tone; the project prefers readable modern English.'
- source_word: אַמְטִיר
  chosen: I will rain down
  alternatives:
  - I will cause to rain
  - I will rain
  lexicon: HALOT
  rationale: The Hiphil of מטר is causative, 'cause to rain.' In idiomatic English,
    'rain down' captures both the causative force and the hostile judgment context.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: Simple modern prepositional rendering; 'on' is preferred over the more
    archaic 'upon' for readability.
- source_word: אֲגַפָּיו
  chosen: his troops
  alternatives:
  - his bands
  - his wings
  - his armies
  lexicon: HALOT
  rationale: Though the noun can literally mean 'wings' or extremities, in military
    context it refers to divisions/flanks/forces accompanying Gog. 'Troops' is a clear
    contextual rendering without over-specifying formal army structure.
- source_word: עַמִּים רַבִּים
  chosen: the many peoples
  alternatives:
  - many peoples
  - many nations
  lexicon: HALOT
  rationale: עַמִּים is 'peoples,' not necessarily political 'nations.' Including
    the article reflects the Hebrew phrase as a definite group associated with him.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who are with him
  alternatives:
  - that are with him
  lexicon: HALOT
  rationale: A personal relative clause suits the human referent 'peoples' and keeps
    the syntax natural in English.
