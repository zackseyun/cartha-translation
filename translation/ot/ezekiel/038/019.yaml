theological_decisions:
- issue: Rendering divine emotional language without softening anthropopathic force
  chosen_reading: my jealousy ... the fire of my wrath
  alternative_readings:
  - my zeal ... the fire of my fury
  rationale: The Hebrew presents YHWH's covenantal jealousy and wrath in strong personal
    terms. The translation preserves this tension rather than reducing it to impersonal
    judgment language. This reflects the source text directly without importing later
    doctrinal explanation.
  doctrine_reference: Translation philosophy §3
- issue: Divine name not present in this verse but first-person speech is clearly
    God's
  chosen_reading: Retain first-person divine speech without adding 'the LORD said'
  alternative_readings:
  - Explicitly supply a speaker tag
  rationale: The verse continues direct divine speech from context. Adding an explicit
    speaker tag would go beyond the Hebrew of this verse.
