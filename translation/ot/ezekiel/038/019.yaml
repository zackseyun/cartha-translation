id: EZK.38.19
reference: Ezekiel 38:19
source:
  edition: WLC
  text: וּ/בְ/קִנְאָתִ֥/י בְ/אֵשׁ עֶבְרָתִ֖/י דִּבַּ֑רְתִּי אִם לֹ֣א בַּ/יּ֣וֹם הַ/ה֗וּא
    יִֽהְיֶה֙ רַ֣עַשׁ גָּד֔וֹל עַ֖ל אַדְמַ֥ת יִשְׂרָאֵֽל־־׀׃
translation:
  text: 'For in my jealousy, in the fire of my wrath, I have spoken: surely on that
    day there will be a great earthquake upon the land of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great shaking' or 'a great trembling.' The Hebrew רַעַשׁ can denote
      a broader shaking, though 'earthquake' fits the context well.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקִנְאָתִי
  chosen: For in my jealousy
  alternatives:
  - And in my jealousy
  - Indeed, in my jealousy
  - In my zeal
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered contextually as 'For' to connect
    this verse with the preceding divine declaration. קִנְאָה can mean 'jealousy'
    or 'zeal'; here 'jealousy' better preserves the covenantal and affective force
    of divine indignation in context, while avoiding over-softening to mere enthusiasm.
- source_word: בְאֵשׁ עֶבְרָתִי
  chosen: in the fire of my wrath
  alternatives:
  - in the fire of my fury
  - with the fire of my wrath
  lexicon: HALOT
  rationale: אֵשׁ is literally 'fire,' used metaphorically for intensity; עֶבְרָה
    denotes overflowing anger/wrath. 'Wrath' is weighty but readable modern English.
    The preposition בְ is retained as 'in,' preserving the Hebrew imagery rather than
    paraphrasing it away.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I spoke
  - I declare
  lexicon: HALOT
  rationale: The perfect verb is rendered 'I have spoken' to convey a solemn, completed
    divine utterance with present force. 'I declare' would be interpretive rather
    than directly lexical.
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath-like asseverative usage, אִם לֹא functions idiomatically as a
    strong affirmation rather than a conditional negation. 'Surely' communicates the
    force naturally in English.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal rendering. 'On that day' is idiomatic modern English
    while preserving the prophetic formula.
- source_word: יִהְיֶה
  chosen: there will be
  alternatives:
  - there shall be
  - it will happen
  lexicon: HALOT
  rationale: Existential use of היה with following noun is best rendered 'there will
    be.' 'Shall' is more archaic.
- source_word: רַעַשׁ גָּדוֹל
  chosen: a great earthquake
  alternatives:
  - a great shaking
  - a great trembling
  lexicon: HALOT
  rationale: רַעַשׁ can denote shaking, quaking, or earthquake. Given the geographic
    phrase 'upon the land of Israel' and the broader context of cosmic disturbance,
    'earthquake' is the clearest and most natural English rendering, while alternatives
    are preserved because the Hebrew can be somewhat broader.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  chosen: upon the land of Israel
  alternatives:
  - on the soil of Israel
  - against the land of Israel
  lexicon: HALOT
  rationale: אַדְמָה is 'ground/land/soil.' 'Land' is the most natural idiomatic choice
    here. עַל is rendered 'upon' to preserve the elevated prophetic tone and spatial
    sense; 'against' would overinterpret the preposition.
