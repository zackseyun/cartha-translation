id: EZK.38.17
reference: Ezekiel 38:17
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנָ֣/י יְהוִ֗ה הַֽ/אַתָּה ה֨וּא אֲשֶׁר דִּבַּ֜רְתִּי בְּ/יָמִ֣ים קַדְמוֹנִ֗ים בְּ/יַד֙ עֲבָדַ/י֙ נְבִיאֵ֣י יִשְׂרָאֵ֔ל הַֽ/נִּבְּאִ֛ים בַּ/יָּמִ֥ים הָ/הֵ֖ם שָׁנִ֑ים לְ/הָבִ֥יא אֹתְ/ךָ֖ עֲלֵי/הֶֽם־־־׃ס
translation:
  text: 'Thus says the Lord GOD: Are you the one of whom I spoke in former days by the hand of my servants the prophets of Israel, who prophesied in those days for years that I would bring you against them?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by the hand of,' an idiom meaning 'through' or 'by means of.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in ancient days' or 'in days of old.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'in those days, years'; the wording emphasizes that these prophecies were spoken over an extended period.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Renders the compound divine title in standard English style. Per doctrine, יְהוָה is rendered 'the LORD'; in the fixed collocation אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD,' so 'the Lord GOD' best preserves reverence and readability.
- source_word: הַאַתָּה הוּא
  chosen: Are you the one
  alternatives:
  - Are you he
  - Is it you
  lexicon: HALOT
  rationale: The interrogative with independent pronouns is emphatic. 'Are you the one' conveys the pointed identification in natural modern English better than the archaic 'Are you he.'
- source_word: אֲשֶׁר דִּבַּרְתִּי
  chosen: of whom I spoke
  alternatives:
  - about whom I spoke
  - whom I mentioned
  lexicon: HALOT
  rationale: English idiom prefers 'spoke of' with a personal referent here. This preserves the sense that Gog was previously spoken about in prophetic revelation.
- source_word: בְּיָמִים קַדְמֹנִים
  chosen: in former days
  alternatives:
  - in ancient days
  - in days of old
  lexicon: HALOT
  rationale: '''Former days'' is a clear, contemporary rendering that preserves the backward-looking temporal sense without sounding overly archaic.'
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: This idiom commonly marks agency of prophetic mediation. 'By the hand of' preserves the Hebrew expression while remaining intelligible in English.
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic commissioning contexts 'servants' is the most natural and established rendering; the bonded-status nuance is not foregrounded here.
- source_word: הַנִּבְּאִים
  chosen: who prophesied
  alternatives:
  - who were prophesying
  lexicon: HALOT
  rationale: A relative participle describing the prophets' activity is best rendered with a simple past relative clause in English for smoothness and narrative clarity.
- source_word: בַּיָּמִים הָהֵם שָׁנִים
  chosen: in those days for years
  alternatives:
  - in those days, for years
  - during those years
  lexicon: HALOT
  rationale: The Hebrew juxtaposes 'in those days' and 'years,' likely intensifying the extended duration of prophetic witness. 'In those days for years' preserves both elements without collapsing one into the other.
- source_word: לְהָבִיא אֹתְךָ עֲלֵיהֶם
  chosen: that I would bring you against them
  alternatives:
  - to bring you against them
  - that I would bring you upon them
  lexicon: HALOT
  rationale: The infinitive expresses the content/purpose of the earlier prophecy. 'Against them' fits hostile military context better than the more literal but less idiomatic 'upon them.'
