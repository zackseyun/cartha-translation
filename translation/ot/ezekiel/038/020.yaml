theological_decisions:
- issue: Rendering of אָדָם in a collective sense
  chosen_reading: every man
  alternative_readings:
  - every human being
  - all humankind
  rationale: The Hebrew uses the singular noun אָדָם collectively for humanity. Following
    the doctrine's gender-accurate principle and the contested-terms guidance, the
    main text keeps 'man' where the source does, while a footnote preserves the inclusive
    sense for modern readers.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
