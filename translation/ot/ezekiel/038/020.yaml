id: EZK.38.20
reference: Ezekiel 38:20
source:
  edition: WLC
  text: וְ/רָעֲשׁ֣וּ מִ/פָּנַ֡/י דְּגֵ֣י הַ/יָּם֩ וְ/ע֨וֹף הַ/שָּׁמַ֜יִם וְ/חַיַּ֣ת
    הַ/שָּׂדֶ֗ה וְ/כָל הָ/רֶ֨מֶשׂ֙ הָ/רֹמֵ֣שׂ עַל הָֽ/אֲדָמָ֔ה וְ/כֹל֙ הָֽ/אָדָ֔ם
    אֲשֶׁ֖ר עַל פְּנֵ֣י הָ/אֲדָמָ֑ה וְ/נֶהֶרְס֣וּ הֶ/הָרִ֗ים וְ/נָֽפְלוּ֙ הַ/מַּדְרֵג֔וֹת
    וְ/כָל חוֹמָ֖ה לָ/אָ֥רֶץ תִּפּֽוֹל־־־־׃
translation:
  text: The fish of the sea, the birds of the heavens, the beasts of the field, every
    creeping thing that creeps on the ground, and every man who is on the face of
    the earth will quake at my presence; the mountains will be thrown down, the cliffs
    will fall, and every wall will fall to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every human being' or 'all humankind.' Hebrew 'every man' uses אָדָם
      collectively for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָעֲשׁוּ
  chosen: will quake
  alternatives:
  - will shake
  - will tremble
  lexicon: HALOT
  rationale: The verb רעשׁ in this context denotes violent shaking or trembling caused
    by divine intervention. 'Will quake' fits both animate subjects and the earthquake
    imagery of the verse better than the more generic 'will tremble.'
- source_word: מִפָּנַי
  chosen: at my presence
  alternatives:
  - before me
  - from before me
  lexicon: HALOT
  rationale: Literally 'from my face/presence.' In English, 'at my presence' naturally
    conveys terror occasioned by Yahweh's appearing, while preserving the causal force
    of the preposition.
- source_word: דְּגֵי הַיָּם
  chosen: the fish of the sea
  alternatives:
  - the fish in the sea
  lexicon: HALOT
  rationale: A straightforward construct phrase; 'of the sea' preserves the Hebrew
    form and biblical cadence.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the birds of heaven
  lexicon: HALOT
  rationale: שָׁמַיִם is literally 'heavens.' 'Birds of the heavens' keeps the elevated
    register and common biblical collocation, though 'sky' would also be possible.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the beasts of the field
  alternatives:
  - the wild animals of the field
  - the animals of the field
  lexicon: HALOT
  rationale: This expression commonly refers to land animals, often wild ones. 'Beasts
    of the field' is a conventional but still understandable rendering that preserves
    the Hebrew idiom.
- source_word: כָּל הָרֶמֶשׂ הָרֹמֵשׂ עַל הָאֲדָמָה
  chosen: every creeping thing that creeps on the ground
  alternatives:
  - every swarming thing that moves on the earth
  - every crawling thing that crawls on the ground
  lexicon: HALOT
  rationale: The Hebrew intentionally uses a cognate expression. The English preserves
    that repetition ('creeping thing that creeps') to reflect the source's style and
    comprehensiveness.
- source_word: כֹל הָאָדָם
  chosen: every man
  alternatives:
  - all humankind
  - every human being
  lexicon: HALOT
  rationale: אָדָם here refers collectively to humanity, but the doctrine directs
    gender-accurate rendering where the source uses 'man' representationally. 'Every
    man' preserves the singular collective force and the Hebrew form.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the earth
  alternatives:
  - on the surface of the ground
  - upon the earth
  lexicon: HALOT
  rationale: A standard Hebrew idiom meaning those living across the earth. 'On the
    face of the earth' is natural English and preserves the idiomatic imagery.
- source_word: וְנֶהֶרְסוּ הֶהָרִים
  chosen: the mountains will be thrown down
  alternatives:
  - the mountains will be torn down
  - the mountains will be demolished
  lexicon: HALOT
  rationale: The Niphal of הרס conveys being pulled down or overthrown. 'Thrown down'
    captures catastrophic collapse in a vivid but not overly interpretive way.
- source_word: הַמַּדְרֵגוֹת
  chosen: the cliffs
  alternatives:
  - the steep places
  - the precipices
  - the terraces
  lexicon: HALOT
  rationale: This rare noun likely refers to steep or terraced heights. In this earthquake
    context, 'cliffs' best communicates the topographical feature that collapses,
    while 'terraces' could mislead modern readers toward agricultural structures.
- source_word: כָל חוֹמָה לָאָרֶץ תִּפּוֹל
  chosen: every wall will fall to the ground
  alternatives:
  - every wall will fall to the earth
  - every wall will collapse to the ground
  lexicon: HALOT
  rationale: The phrase is idiomatic for total collapse. 'To the ground' is the clearest
    modern English equivalent of לָאָרֶץ here.
