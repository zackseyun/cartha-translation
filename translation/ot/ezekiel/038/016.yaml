theological_decisions:
- issue: Eschatological expression בְּאַחֲרִית הַיָּמִים
  chosen_reading: In the latter days
  alternative_readings:
  - In the last days
  - In days to come
  rationale: The phrase has eschatological weight, but the translation should preserve
    the prophetic wording without forcing a specific end-times framework. 'Latter
    days' keeps the tension and avoids over-specifying chronology.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Divine self-sanctification language בְּהִקָּדְשִׁי בְךָ
  chosen_reading: when I show myself holy through you
  alternative_readings:
  - when I sanctify myself in you
  - when I prove myself holy through you
  rationale: The Hebrew speaks of God's holiness being publicly manifested in judgment
    on Gog. Because English 'sanctify myself' can misleadingly suggest that God becomes
    holier, the main text uses 'show myself holy,' while preserving the more literal
    alternative in a footnote for auditability.
  doctrine_reference: Translation philosophy §6 Readable modern English, not archaic
    or academic; §3 Preserve theological tension rather than resolve it.
