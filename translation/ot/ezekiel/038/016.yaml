id: EZK.38.16
reference: Ezekiel 38:16
source:
  edition: WLC
  text: וְ/עָלִ֨יתָ֙ עַל עַמִּ֣/י יִשְׂרָאֵ֔ל כֶּֽ/עָנָ֖ן לְ/כַסּ֣וֹת הָ/אָ֑רֶץ בְּ/אַחֲרִ֨ית
    הַ/יָּמִ֜ים תִּֽהְיֶ֗ה וַ/הֲבִאוֹתִ֨י/ךָ֙ עַל אַרְצִ֔/י לְמַעַן֩ דַּ֨עַת הַ/גּוֹיִ֜ם
    אֹתִ֗/י בְּ/הִקָּדְשִׁ֥/י בְ/ךָ֛ לְ/עֵינֵי/הֶ֖ם גּֽוֹג־־׃ס
translation:
  text: And you will come up against my people Israel like a cloud to cover the land.
    In the latter days it will happen that I will bring you against my land, so that
    the nations may know me when I show myself holy through you before their eyes,
    O Gog.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'when I sanctify myself in you before their eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלִיתָ
  chosen: And you will come up against
  alternatives:
  - And you will ascend against
  - And you will attack
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend,' but in military movement against
    a people or land it idiomatically means to advance against or come up against.
    'Come up against' preserves the Hebrew image while remaining natural English.
- source_word: עַל עַמִּי יִשְׂרָאֵל
  chosen: against my people Israel
  alternatives:
  - upon my people Israel
  lexicon: HALOT
  rationale: The preposition עַל with hostile movement is best rendered 'against.'
    'My people Israel' preserves the covenantal possessive and appositional identification.
- source_word: כֶּעָנָן לְכַסּוֹת הָאָרֶץ
  chosen: like a cloud to cover the land
  alternatives:
  - like a cloud covering the earth
  - like a cloud to cover the earth
  lexicon: HALOT
  rationale: 'The simile is explicit. הָאָרֶץ can mean ''land'' or ''earth''; here
    the immediate context is invasion of Israel, so ''land'' better fits than the
    more global ''earth.'' The infinitive לְכַסּוֹת is purpose/result: ''to cover.'''
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: In the latter days
  alternatives:
  - In the last days
  - In days to come
  lexicon: HALOT
  rationale: This is a conventional prophetic expression. 'Latter days' is a transparent
    and established rendering that preserves the eschatological openness without importing
    a narrower system. 'Last days' is possible but more likely to trigger later theological
    associations not demanded by the Hebrew alone.
- source_word: תִּהְיֶה
  chosen: it will happen
  alternatives:
  - it will be
  - it shall occur
  lexicon: HALOT
  rationale: The feminine singular verb likely refers to the preceding circumstance/event.
    Rendering it idiomatically as 'it will happen' makes good English and captures
    the eventive sense in context.
- source_word: וַהֲבִאוֹתִיךָ
  chosen: I will bring you
  alternatives:
  - I will cause you to come
  - I will lead you
  lexicon: HALOT
  rationale: The Hiphil of בוא is causative. 'I will bring you' is concise and natural,
    while still conveying divine agency over Gog's movement.
- source_word: עַל אַרְצִי
  chosen: against my land
  alternatives:
  - upon my land
  - to my land
  lexicon: HALOT
  rationale: Given the hostile context and repeated עַל, 'against my land' best reflects
    the adversative force. 'My land' preserves YHWH's claim over the land.
- source_word: לְמַעַן דַּעַת הַגּוֹיִם אֹתִי
  chosen: so that the nations may know me
  alternatives:
  - in order that the nations may know me
  lexicon: HALOT
  rationale: This expresses divine purpose. 'Know me' preserves the relational and
    revelatory force of ידע rather than reducing it to mere cognition.
- source_word: בְּהִקָּדְשִׁי בְךָ
  chosen: when I show myself holy through you
  alternatives:
  - when I sanctify myself in you
  - when I prove myself holy through you
  lexicon: HALOT
  rationale: The Niphal/related sanctification expression here refers to God's holiness
    being manifested before the nations through his judgment on Gog. 'Show myself
    holy through you' communicates the sense in clear English without implying moral
    improvement in God. The more literal 'sanctify myself in you' is preserved as
    an alternative because it is traditional and defensible.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  lexicon: HALOT
  rationale: A straightforward idiom meaning publicly and visibly. 'Before their eyes'
    is vivid and natural.
- source_word: גּוֹג
  chosen: O Gog
  alternatives:
  - Gog
  lexicon: HALOT
  rationale: The name is vocative in effect at the end of the divine address. 'O Gog'
    reflects direct address in idiomatic English.
