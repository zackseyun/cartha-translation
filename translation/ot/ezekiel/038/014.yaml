theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies יְהוָה should normally be rendered 'the LORD.'
    In this compound title, 'the Lord GOD' is the clearest English equivalent that
    avoids the awkward 'Lord LORD' and reflects longstanding handling of the Hebrew
    form without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
