id: EZK.38.14
reference: Ezekiel 38:14
source:
  edition: WLC
  text: לָ/כֵן֙ הִנָּבֵ֣א בֶן אָדָ֔ם וְ/אָמַרְתָּ֣ לְ/ג֔וֹג כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י
    יְהוִ֑ה הֲ/ל֣וֹא בַּ/יּ֣וֹם הַ/ה֗וּא בְּ/שֶׁ֨בֶת עַמִּ֧/י יִשְׂרָאֵ֛ל לָ/בֶ֖טַח
    תֵּדָֽע־׀׃
translation:
  text: 'Therefore prophesy, son of man, and say to Gog, ‘Thus says the Lord GOD:
    On that day, when my people Israel are dwelling securely, will you not know it?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are living in safety.' The Hebrew לָבֶטַח can be rendered 'securely'
      or 'in safety.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding context; 'Therefore'
    is natural and preserves the logical connection.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - prophesy forth
  - speak prophetically
  lexicon: HALOT
  rationale: Imperative of נבא addressed to Ezekiel; 'prophesy' is the standard and
    clear English equivalent.
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's recurring divine address. A more literal rendering
    preserves the established idiom and its literary continuity better than a dynamic
    alternative.
- source_word: וְאָמַרְתָּ לְגוֹג
  chosen: and say to Gog
  alternatives:
  - and you shall say to Gog
  - and speak to Gog
  lexicon: HALOT
  rationale: Sequential command following the imperative; 'say to Gog' is straightforward
    and idiomatic.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the solemn
    prophetic register.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD.' In the compound title
    אֲדֹנָי יְהוִה, English convention uses 'the Lord GOD' to avoid 'Lord LORD' while
    still signaling the divine name.
- source_word: הֲלוֹא
  chosen: will you not
  alternatives:
  - surely you will
  - is it not the case that you will
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer; 'will
    you not' captures that force in natural English.
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Common temporal prophetic expression; 'On that day' is idiomatic modern
    English.
- source_word: בְּשֶׁבֶת
  chosen: when ... are dwelling
  alternatives:
  - while ... dwell
  - in the dwelling of
  lexicon: HALOT
  rationale: Infinitive construct of ישב with temporal force. Rendering it with 'when
    ... are dwelling' makes the syntax natural in English while preserving the ongoing-state
    nuance.
- source_word: עַמִּי יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - my people, Israel
  - Israel my people
  lexicon: HALOT
  rationale: Construct phrase identifying Israel as the LORD's people; the chosen
    wording is direct and natural.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: '''Securely'' best conveys the sense of living in a state of security.
    ''In safety'' is possible and traditional, but ''securely'' reads more naturally
    in contemporary English.'
- source_word: תֵּדָע
  chosen: will you not know it
  alternatives:
  - will you not know
  - will you not take notice
  - will you not become aware
  lexicon: HALOT
  rationale: Qal imperfect 2ms of ידע in a rhetorical question. The object is implicit
    from context; adding 'it' makes acceptable English without materially expanding
    the sense. The verb here carries the sense of becoming aware/taking notice of
    Israel's secure dwelling.
