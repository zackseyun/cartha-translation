theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The Hebrew can mean either 'land' or 'earth.' In this oracle against
    Gog, the immediate referent is the territory being overrun, so 'land' better matches
    the local invasion imagery without making an unnecessary cosmological claim.
  doctrine_reference: Translation philosophy §1, §5
- issue: Military metaphor in אֲגַפֶּיךָ
  chosen_reading: your troops
  alternative_readings:
  - your wings
  - your divisions
  rationale: The verse depicts an invading coalition. Rendering the term with its
    military sense preserves the plain force of the Hebrew while remaining readable
    modern English.
  doctrine_reference: Translation philosophy §6
