id: EZK.38.9
reference: Ezekiel 38:9
source:
  edition: WLC
  text: וְ/עָלִ֨יתָ֙ כַּ/שֹּׁאָ֣ה תָב֔וֹא כֶּ/עָנָ֛ן לְ/כַסּ֥וֹת הָ/אָ֖רֶץ תִּֽהְיֶ֑ה
    אַתָּה֙ וְ/כָל אֲגַפֶּ֔י/ךָ וְ/עַמִּ֥ים רַבִּ֖ים אוֹתָֽ/ךְ־׃ס
translation:
  text: You will come up like a storm; you will be like a cloud covering the land—you
    and all your troops, and many peoples with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covering the earth.' The Hebrew word can mean either 'land' or 'earth,'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'your wings'; here the term refers to the military wings or divisions
      of Gog's forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלִיתָ
  chosen: You will come up
  alternatives:
  - You will ascend
  - You will advance
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend,' but in military movement and invasion
    contexts 'come up' is idiomatic and natural in English while preserving the directional
    imagery.
- source_word: כַּשֹּׁאָה
  chosen: like a storm
  alternatives:
  - like a tempest
  - like devastation
  lexicon: HALOT
  rationale: שֹׁאָה can denote storm, tempest, or devastation/desolation depending
    on context. Here the following weather simile 'like a cloud' favors a meteorological
    image, so 'storm' best fits the parallelism and invasion imagery.
- source_word: תָבֹוא
  chosen: you will come
  alternatives:
  - you will arrive
  - you will invade
  lexicon: HALOT
  rationale: בוא is the common verb 'come/enter.' 'Come' is retained rather than the
    more interpretive 'invade,' since the military sense is already conveyed by the
    surrounding imagery.
- source_word: כֶּעָנָן
  chosen: like a cloud
  lexicon: HALOT
  rationale: A straightforward simile; 'cloud' preserves the image of overwhelming
    spread and concealment.
- source_word: לְכַסּוֹת הָאָרֶץ
  chosen: covering the land
  alternatives:
  - to cover the earth
  - to cover the הארץ
  lexicon: HALOT
  rationale: 'The infinitive expresses result or characteristic: the invading force
    is like a cloud ''covering'' the land. ''Land'' is preferred over ''earth'' because
    in prophetic context הארץ often refers to the territory under threat rather than
    the whole globe, though ''earth'' is lexically possible.'
- source_word: תִּהְיֶה
  chosen: you will be
  alternatives:
  - you will become
  lexicon: HALOT
  rationale: 'היה here links the subject to the cloud-covering image: ''you will be
    like a cloud covering the land.'' English smooths the clause by making the comparison
    explicit in context.'
- source_word: אֲגַפֶּיךָ
  chosen: your troops
  alternatives:
  - your wings
  - your bands
  - your divisions
  lexicon: HALOT
  rationale: אגף literally means 'wing,' but in military contexts it refers to wings/flanks/divisions
    of an army. 'Troops' communicates the military sense clearly in modern English
    without awkward literalism.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many armies
  lexicon: HALOT
  rationale: עמים is 'peoples' rather than specifically 'nations' or 'armies.' 'Many
    peoples' preserves the ethnic/political breadth of the coalition.
- source_word: אוֹתָךְ
  chosen: with you
  alternatives:
  - with you/alongside you
  lexicon: HALOT
  rationale: The particle marks accompaniment here. Although the morphology table
    reflects an unusual suffix notation, the context clearly yields 'with you' referring
    to Gog and his allied peoples.
