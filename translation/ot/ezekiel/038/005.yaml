id: EZK.38.5
reference: Ezekiel 38:5
source:
  edition: WLC
  text: פָּרַ֛ס כּ֥וּשׁ וּ/פ֖וּט אִתָּ֑/ם כֻּלָּ֖/ם מָגֵ֥ן וְ/כוֹבָֽע׃
translation:
  text: Persia, Cush, and Put are with them, all of them with shield and helmet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cush is traditionally rendered 'Ethiopia' in some English versions.
    reason: lexical_alternative
  - marker: b
    text: Put is traditionally associated with Libya in some translations and historical
      identifications.
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַס
  chosen: Persia
  alternatives:
  - Paras
  lexicon: HALOT
  rationale: Proper noun referring to the people/region of Persia. Standard English
    transliteration is appropriate for a nation name.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Transliterated place/people name per translation philosophy ('transliterate
    names'). 'Ethiopia' is a traditional but potentially anachronistic interpretive
    rendering.
- source_word: פוּט
  chosen: Put
  alternatives:
  - Libya
  lexicon: HALOT
  rationale: Transliterated ethnogeographic name. 'Libya' appears in some translations/traditions
    but is more interpretive than the Hebrew form warrants.
- source_word: אִתָּם
  chosen: are with them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: The preposition with pronominal suffix means 'with them.' English supplies
    'are' for a natural verbless-clause rendering.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all of them together
  - all of them
  lexicon: HALOT
  rationale: Emphatic summary of the listed allies; rendered explicitly to preserve
    the distributive force.
- source_word: מָגֵן
  chosen: shield
  alternatives:
  - buckler
  lexicon: HALOT
  rationale: Standard rendering for defensive weaponry; 'buckler' is archaic and too
    specific for readable modern English.
- source_word: כוֹבָע
  chosen: helmet
  alternatives:
  - headgear
  lexicon: HALOT
  rationale: Military equipment term best rendered 'helmet' in this context.
