id: EZK.38.10
reference: Ezekiel 38:10
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא יַעֲל֤וּ דְבָרִים֙ עַל לְבָבֶ֔/ךָ וְ/חָשַׁבְתָּ֖ מַחֲשֶׁ֥בֶת רָעָֽה׀־׃
translation:
  text: 'Thus says the Lord GOD: On that day, things will come up in your heart, and you will devise an evil plan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'in your heart'; in Hebrew idiom, the heart is the center of thought and intention, not only emotion.
    reason: cultural_note
  - marker: b
    text: Or 'matters will arise in your heart.' The Hebrew דְבָרִים can mean 'words' or more broadly 'matters/things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic register without sounding archaic beyond normal biblical English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine title combines Adonai with YHWH. Following doctrine, YHWH is rendered 'the LORD'; in the conventional English handling of the compound title, 'Lord GOD' avoids 'Lord LORD' and preserves reverence-tradition usage.
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - And it shall happen on that day
  - And it will be on that day
  lexicon: HALOT
  rationale: The Hebrew idiom introduces a future circumstance. 'On that day' captures the temporal force in natural English; the prefixed waw plus היה is absorbed idiomatically rather than woodenly reproduced.
- source_word: יַעֲלוּ דְבָרִים
  chosen: words will arise
  alternatives:
  - things will come up
  - matters will arise
  - words will come up
  lexicon: HALOT
  rationale: The plural 'words/matters' with 'go up' is idiomatic for thoughts arising internally. 'Words will arise' stays close to the Hebrew while remaining intelligible; 'matters' is possible but less direct.
- source_word: עַל לְבָבֶךָ
  chosen: in your heart
  alternatives:
  - upon your heart
  - into your mind
  lexicon: HALOT
  rationale: Hebrew 'heart' is the seat of thought and intention. 'In your heart' is idiomatic English and preserves the Hebrew anthropology better than reducing it to merely 'mind' in the main text.
- source_word: וְחָשַׁבְתָּ
  chosen: you will devise
  alternatives:
  - you will think
  - you will plan
  - you will conceive
  lexicon: HALOT
  rationale: The verb חשב here denotes intentional planning rather than mere mental activity. 'Devise' conveys deliberate scheming and fits the hostile context.
- source_word: מַחֲשֶׁבֶת רָעָה
  chosen: an evil plan
  alternatives:
  - an evil scheme
  - a wicked thought
  - a harmful plan
  lexicon: HALOT
  rationale: The noun from the same root as the verb intensifies the idea of calculated intent. 'Plan' fits English collocation with 'devise'; 'evil' preserves the moral quality of רעה without softening it to merely pragmatic harm.
