theological_decisions:
- issue: Whether רֹאשׁ in the title נְשִׂיא רֹאשׁ מֶשֶׁךְ וְתֻבָל should be translated
    as a common noun ('chief') or transliterated as the proper name 'Rosh.'
  chosen_reading: 'common noun: ''chief prince of Meshech and Tubal'''
  alternative_readings:
  - 'proper name: ''prince of Rosh, Meshech, and Tubal'''
  rationale: The Hebrew word רֹאשׁ commonly means 'head, chief' and naturally forms
    the expression 'chief prince.' While some translations and interpreters take it
    as a place-name, the lexical and syntactic evidence does not require that reading
    here. To preserve the interpretive tension without overcommitting, the alternative
    is retained in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
