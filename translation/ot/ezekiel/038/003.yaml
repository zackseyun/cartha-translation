id: EZK.38.3
reference: Ezekiel 38:3
source:
  edition: WLC
  text: וְ/אָ֣מַרְתָּ֔ כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה הִנְ/נִ֤י אֵלֶ֨י/ךָ֙ גּ֔וֹג
    נְשִׂ֕יא רֹ֖אשׁ מֶ֥שֶׁךְ וְ/תֻבָֽל׃
translation:
  text: 'and say, ‘Thus says the Lord GOD: Behold, I am against you, Gog, chief prince
    of Meshech and Tubal.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'prince of Rosh, Meshech, and Tubal.' The Hebrew word rosh can be read
      as 'chief' or taken as a proper name.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  lexicon: HALOT
  rationale: Second masculine singular with prefixed conjunction in prophetic commission
    formula. English imperative-like 'and say' fits the discourse flow naturally while
    preserving the command force.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic register and matches the Hebrew idiom.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with YHWH. Following the doctrine
    default for YHWH, the tetragrammaton is rendered 'the LORD'; in this fixed English
    convention with אֲדֹנָי, 'the Lord GOD' avoids 'Lord LORD' and reflects established
    differentiation without transliterating the divine name.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - Here I am
  lexicon: HALOT
  rationale: In divine judgment speech this deictic particle introduces solemn announcement.
    'Behold' preserves the elevated prophetic tone better than the more colloquial
    'Look.'
- source_word: אֵלֶיךָ
  chosen: I am against you
  alternatives:
  - I am toward you
  - I am against you
  lexicon: HALOT
  rationale: 'With הִנְנִי in hostile oracle context, the phrase is idiomatically
    adversative: God is setting himself against Gog. English must make the hostility
    explicit.'
- source_word: גּוֹג
  chosen: Gog
  lexicon: HALOT
  rationale: Proper name; transliterated per translation philosophy.
- source_word: נְשִׂיא
  chosen: prince
  alternatives:
  - leader
  - chief
  lexicon: HALOT
  rationale: The noun denotes a ruler or prince. 'Prince' preserves the political
    title succinctly and fits the construct chain with the following terms.
- source_word: רֹאשׁ
  chosen: chief
  alternatives:
  - Rosh
  lexicon: HALOT
  rationale: 'Here רֹאשׁ is best taken as a common noun/adjective meaning ''head/chief,''
    modifying ''prince'': ''chief prince of Meshech and Tubal.'' This avoids treating
    it as an otherwise uncertain place-name and fits normal Hebrew usage in context.'
- source_word: מֶשֶׁךְ
  chosen: Meshech
  lexicon: HALOT
  rationale: Proper ethnogeographic name; transliterated.
- source_word: וְתֻבָל
  chosen: and Tubal
  lexicon: HALOT
  rationale: Proper ethnogeographic name joined by conjunction; transliterated and
    coordinated straightforwardly.
