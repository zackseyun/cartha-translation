theological_decisions:
- issue: Rendering of the divine self-manifestation verbs in a way that preserves both holiness and public recognition
  chosen_reading: 'Use reflexive/public-manifestation language: ''show myself great,'' ''show myself holy,'' and ''make myself known'''
  alternative_readings:
  - Use more formal renderings such as 'magnify myself,' 'sanctify myself,' and 'be known'
  - Use more interpretive renderings such as 'vindicate my greatness/holiness'
  rationale: The verse emphasizes YHWH's self-disclosure before the nations through decisive action. The chosen wording preserves the Hebrew verbal sequence and theological tension without flattening it into either overly wooden or overly interpretive English.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for יהוה and preserves continuity with the reverential convention reflected in many English Bibles and the LXX pattern.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
