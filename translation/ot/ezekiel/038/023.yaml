id: EZK.38.23
reference: Ezekiel 38:23
source:
  edition: WLC
  text: וְ/הִתְגַּדִּלְתִּי֙ וְ/הִתְקַדִּשְׁתִּ֔י וְ/נ֣וֹדַעְתִּ֔י לְ/עֵינֵ֖י גּוֹיִ֣ם רַבִּ֑ים וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־׃ס
translation:
  text: I will magnify myself and sanctify myself, and I will make myself known in the sight of many nations. Then they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will magnify myself ... sanctify myself ... and be known.' The Hebrew verbs are reflexive/passive in form and can be rendered more formally, but the main text expresses their sense in clear modern English.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִתְגַּדִּלְתִּי
  chosen: I will show myself great
  alternatives:
  - I will magnify myself
  - I will make myself great
  lexicon: HALOT
  rationale: Hitpael of גדל here is reflexive/passive in force within a divine self-declaration. 'Show myself great' preserves the reflexive sense and reads naturally in English, avoiding the potentially misleading implication of self-exaltation for its own sake that 'magnify myself' may carry.
- source_word: וְהִתְקַדִּשְׁתִּי
  chosen: show myself holy
  alternatives:
  - sanctify myself
  - vindicate my holiness
  lexicon: HALOT
  rationale: Hitpael of קדשׁ in Ezekiel often carries the sense of God displaying or vindicating his holiness before the nations. 'Show myself holy' keeps the reflexive form and remains accessible; 'sanctify myself' is too opaque in English, while 'vindicate my holiness' is interpretive.
- source_word: וְנוֹדַעְתִּי
  chosen: I will make myself known
  alternatives:
  - I will be known
  - I will reveal myself
  lexicon: HALOT
  rationale: The Niphal of ידע can be rendered either statively ('be known') or with an effective passive/reflexive sense in context. 'I will make myself known' best captures the divine agency implied by the sequence of first-person verbs and fits the public manifestation theme.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before the eyes of
  - before
  lexicon: HALOT
  rationale: This idiom denotes public visibility. 'In the sight of' is natural modern English while preserving the visual/public force more clearly than the simpler 'before'.
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  - many Gentiles
  lexicon: HALOT
  rationale: In Ezekiel this term commonly refers to nations/peoples in the geopolitical sense. 'Many nations' is the most contextually fitting and least misleading; 'Gentiles' would import a later Jewish/Christian contrast not foregrounded here.
- source_word: וְיָדְעוּ
  chosen: they will know
  alternatives:
  - they will come to know
  - they will acknowledge
  lexicon: HALOT
  rationale: Simple qal imperfect of ידע. 'They will know' is direct and preserves the covenant-recognition formula common in Ezekiel without overinterpreting the mode of knowledge.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
