id: EZK.38.2
reference: Ezekiel 38:2
source:
  edition: WLC
  text: בֶּן אָדָ֗ם שִׂ֤ים פָּנֶ֨י/ךָ֙ אֶל גּוֹג֙ אֶ֣רֶץ הַ/מָּג֔וֹג נְשִׂ֕יא רֹ֖אשׁ
    מֶ֣שֶׁךְ וְ/תֻבָ֑ל וְ/הִנָּבֵ֖א עָלָֽי/ו־־׃
translation:
  text: Son of man, set your face toward Gog, of the land of Magog, the chief prince
    of Meshech and Tubal, and prophesy against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the prince of Rosh, Meshech, and Tubal.' The Hebrew word rosh can be
      read either as the common noun 'chief' or as a proper name.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A fixed address to Ezekiel. 'Son of man' preserves the familiar idiom
    and the masculine singular form of the Hebrew, in keeping with the gender-accurate
    policy. Alternatives such as 'mortal' are possible in context but are less formally
    transparent here.
- source_word: שִׂים פָּנֶיךָ אֶל
  chosen: set your face toward
  alternatives:
  - direct your face toward
  - turn your face toward
  lexicon: HALOT
  rationale: This idiom conveys deliberate orientation or opposition. 'Set your face
    toward' is a natural English rendering that preserves the Hebrew imagery better
    than a more interpretive paraphrase.
- source_word: גּוֹג
  chosen: Gog
  lexicon: HALOT
  rationale: Proper name; transliterated according to standard convention.
- source_word: אֶרֶץ הַמָּגוֹג
  chosen: of the land of Magog
  alternatives:
  - from the land of Magog
  - land of Magog
  lexicon: HALOT
  rationale: The construct chain most naturally identifies Gog in relation to Magog.
    'Of the land of Magog' is concise and preserves the appositional/genitival force
    without overinterpreting.
- source_word: נְשִׂיא
  chosen: prince
  alternatives:
  - leader
  - chief
  lexicon: HALOT
  rationale: The noun denotes a ruler, chieftain, or prince. 'Prince' is a standard
    rendering in prophetic contexts and fits the political title here.
- source_word: רֹאשׁ
  chosen: chief
  alternatives:
  - Rosh
  lexicon: HALOT
  rationale: 'Here רֹאשׁ is best taken adjectivally/appositionally with נְשִׂיא: ''chief
    prince.'' This is the most natural sense in Hebrew and avoids treating ''Rosh''
    as a proper place-name without compelling contextual necessity.'
- source_word: מֶשֶׁךְ וְתֻבָל
  chosen: Meshech and Tubal
  lexicon: HALOT
  rationale: Proper names of peoples/regions; transliterated.
- source_word: וְהִנָּבֵא עָלָיו
  chosen: and prophesy against him
  alternatives:
  - and prophesy concerning him
  lexicon: HALOT
  rationale: With על in prophetic judgment contexts, 'against' is the most idiomatic
    and contextually likely rendering, especially given the hostile oracle that follows.
