theological_decisions:
- issue: Whether רֹאשׁ in the title should be rendered as a common noun ('chief')
    or preserved as the proper name 'Rosh'
  chosen_reading: 'common noun: ''the chief prince of Meshech and Tubal'''
  alternative_readings:
  - 'proper name: ''prince of Rosh, Meshech, and Tubal'''
  rationale: The Hebrew syntax readily supports reading רֹאשׁ as a common noun modifying
    נְשִׂיא, yielding 'chief prince.' This avoids importing a disputed ethnogeographic
    identification into the main text. Because the alternative has a long translation
    history and interpretive significance, it is preserved in a footnote rather than
    adopted in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it); §1 (original-language primacy over translation tradition)
