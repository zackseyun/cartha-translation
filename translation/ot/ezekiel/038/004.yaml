theological_decisions:
- issue: Divine agency in Gog's mobilization
  chosen_reading: YHWH is portrayed as actively redirecting and bringing Gog and his
    forces out for judgment.
  alternative_readings:
  - A weaker permissive sense in which God merely allows Gog to come
  rationale: The sequence of first-person causative verbs ('I will turn... I will
    put... I will bring out') presents strong divine agency. The translation preserves
    that tension without explaining how divine sovereignty and human intent relate.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
