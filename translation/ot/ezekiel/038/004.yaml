id: EZK.38.4
reference: Ezekiel 38:4
source:
  edition: WLC
  text: וְ/שׁ֣וֹבַבְתִּ֔י/ךָ וְ/נָתַתִּ֥י חַחִ֖ים בִּ/לְחָיֶ֑י/ךָ וְ/הוֹצֵאתִי֩ אוֹתְ/ךָ֨
    וְ/אֶת כָּל חֵילֶ֜/ךָ סוּסִ֣ים וּ/פָרָשִׁ֗ים לְבֻשֵׁ֤י מִכְלוֹל֙ כֻּלָּ֔/ם קָהָ֥ל
    רָב֙ צִנָּ֣ה וּ/מָגֵ֔ן תֹּפְשֵׂ֥י חֲרָב֖וֹת כֻּלָּֽ/ם־־׃
translation:
  text: I will turn you around, put hooks in your jaws, and bring you out—you and
    all your army, horses and horsemen, all of them clothed in full armor, a great
    assembly with large shield and small shield, all of them wielding swords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your cheeks.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew distinguishes two kinds of shields here, likely a large shield and
      a smaller shield; traditional renderings often read 'shield and buckler.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשׁוֹבַבְתִּיךָ
  chosen: I will turn you around
  alternatives:
  - I will turn you back
  - I will lead you about
  lexicon: HALOT
  rationale: From שובב/שׁוּב in a causative/iterative sense here, describing YHWH's
    sovereign redirection of Gog. 'Turn you around' is idiomatic modern English and
    preserves the image of being redirected without overinterpreting the exact route.
- source_word: חַחִים
  chosen: hooks
  alternatives:
  - hooks/rings
  lexicon: HALOT
  rationale: The noun denotes hooks or rings used to control animals or captives.
    'Hooks' is the standard, vivid rendering in this prophetic image.
- source_word: בִּלְחָיֶיךָ
  chosen: in your jaws
  alternatives:
  - in your cheeks
  lexicon: HALOT
  rationale: לחי can refer to jaw/cheek. In the idiom of placing hooks for control,
    'jaws' better fits the concrete image in English, while 'cheeks' is preserved
    as a lexical alternative.
- source_word: וְהוֹצֵאתִי אוֹתְךָ
  chosen: and bring you out
  alternatives:
  - and lead you out
  - and bring you forth
  lexicon: HALOT
  rationale: יצא in Hiphil means to cause to go out/bring out. 'Bring you out' is
    natural English and keeps YHWH as the active agent.
- source_word: חֵילֶךָ
  chosen: your army
  alternatives:
  - your force
  - your host
  lexicon: HALOT
  rationale: חיל here refers to military strength/troops rather than wealth or valor.
    'Army' is the clearest contextual rendering.
- source_word: סוּסִים וּפָרָשִׁים
  chosen: horses and horsemen
  alternatives:
  - horses and riders
  - cavalry
  lexicon: HALOT
  rationale: A straightforward military pairing. 'Horsemen' preserves the two-part
    Hebrew expression better than the compressed 'cavalry.'
- source_word: לְבֻשֵׁי מִכְלוֹל
  chosen: clothed in full armor
  alternatives:
  - fully clothed
  - wearing complete equipment
  - clothed in splendor
  lexicon: HALOT
  rationale: The phrase describes being outfitted completely for war. Given the immediate
    military context, 'full armor' best conveys the sense of complete martial equipment
    rather than mere fine clothing.
- source_word: קָהָל רָב
  chosen: a great assembly
  alternatives:
  - a great company
  - a vast multitude
  lexicon: HALOT
  rationale: קהל is an assembled group; in this context a gathered military mass.
    'Great assembly' is accurate and readable.
- source_word: צִנָּה וּמָגֵן
  chosen: large shield and small shield
  alternatives:
  - buckler and shield
  - shield and buckler
  lexicon: HALOT
  rationale: The Hebrew distinguishes two types of defensive gear, commonly a large
    body shield (צנה) and a smaller shield (מגן). Rendering the distinction explicitly
    is clearer for modern readers than preserving archaic military terms.
- source_word: תֹּפְשֵׂי חֲרָבוֹת
  chosen: wielding swords
  alternatives:
  - grasping swords
  - handling swords
  lexicon: HALOT
  rationale: The participle denotes taking hold of or bearing weapons. 'Wielding swords'
    communicates active readiness for battle in idiomatic English.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: Repeated for emphasis in Hebrew. Preserved in English at key points to
    reflect the comprehensive scope of the force.
