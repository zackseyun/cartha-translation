theological_decisions:
- issue: Rendering the divine name יְהוָה in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: Per doctrine, YHWH defaults to 'the LORD.' In the compound title אֲדֹנָי
    יְהוִה, English convention uses 'Lord GOD' to avoid the awkward 'Lord LORD' while
    still signaling the divine name through small-caps 'GOD.' This preserves meaning
    without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
