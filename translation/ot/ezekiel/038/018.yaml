id: EZK.38.18
reference: Ezekiel 38:18
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַּ/יּ֣וֹם הַ/ה֗וּא בְּ/י֨וֹם בּ֥וֹא גוֹג֙ עַל אַדְמַ֣ת יִשְׂרָאֵ֔ל
    נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה תַּעֲלֶ֥ה חֲמָתִ֖/י בְּ/אַפִּֽ/י׀־׃
translation:
  text: And it will happen on that day, on the day when Gog comes against the land
    of Israel, declares the Lord GOD, that my wrath will rise up in my anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my wrath will rise up in my nose,'' with ''nose'' functioning
      idiomatically for anger.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Formulaic future narrative introduction. 'It will happen' preserves the
    prophetic temporal marker in readable modern English without archaic 'come to
    pass.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic discourse. 'On that day' is idiomatic
    modern English and preserves eschatological force.
- source_word: בְּיוֹם בּוֹא גוֹג
  chosen: on the day when Gog comes
  alternatives:
  - in the day of Gog's coming
  - when Gog comes
  lexicon: HALOT
  rationale: The infinitive construct with prefixed preposition is naturally rendered
    as a temporal clause. 'Comes' reflects the Hebrew verbal idea straightforwardly.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  chosen: against the land of Israel
  alternatives:
  - upon the land of Israel
  - against the soil of Israel
  lexicon: HALOT
  rationale: עַל with hostile movement in context is best rendered 'against.' אַדְמָה
    can mean ground/land; 'land' is the natural English choice here for territorial
    reference.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula best rendered 'declares.' Following
    doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'Lord GOD'
    is the conventional and semantically clear English equivalent rather than 'Lord
    LORD.'
- source_word: תַּעֲלֶה
  chosen: will rise up
  alternatives:
  - will come up
  - will ascend
  lexicon: HALOT
  rationale: עלה here is metaphorical for an inner passion surging upward. 'Will rise
    up' communicates the idiom naturally in English.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'Wrath' preserves the solemn prophetic
    register and divine-judicial sense.
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - in my nostril
  - in my nose
  - in my hot anger
  lexicon: HALOT
  rationale: אַף literally means nose/nostril and idiomatically anger. The phrase
    intensifies divine wrath. 'In my anger' gives the idiomatic sense clearly; the
    more literal imagery is possible but less natural in English main text.
