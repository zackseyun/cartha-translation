id: EZK.38.13
reference: Ezekiel 38:13
source:
  edition: WLC
  text: שְׁבָ֡א וּ֠/דְדָן וְ/סֹחֲרֵ֨י תַרְשִׁ֤ישׁ וְ/כָל כְּפִרֶ֨י/הָ֙ יֹאמְר֣וּ לְ/ךָ֔
    הֲ/לִ/שְׁלֹ֤ל שָׁלָל֙ אַתָּ֣ה בָ֔א הֲ/לָ/בֹ֥ז בַּ֖ז הִקְהַ֣לְתָּ קְהָלֶ֑/ךָ לָ/שֵׂ֣את
    כֶּ֣סֶף וְ/זָהָ֗ב לָ/קַ֨חַת֙ מִקְנֶ֣ה וְ/קִנְיָ֔ן לִ/שְׁלֹ֖ל שָׁלָ֥ל גָּדֽוֹל־׀׃ס
translation:
  text: Sheba and Dedan and the merchants of Tarshish, with all her young lions, will
    say to you, ‘Have you come to take plunder? Have you assembled your company to
    seize silver and gold, to take livestock and goods, to take great plunder?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all her villages/colonies' or 'all her strong ones.' The Hebrew literally
      reads 'all her young lions,' likely a metaphor for Tarshish's associated powers
      or dependents.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבָא
  chosen: Sheba
  lexicon: HALOT
  rationale: Proper place/name transliterated according to the translation philosophy
    for names.
- source_word: וּדְדָן
  chosen: Dedan
  lexicon: HALOT
  rationale: Proper place/name transliterated.
- source_word: סֹחֲרֵי
  chosen: merchants of
  alternatives:
  - traders of
  lexicon: HALOT
  rationale: The participial form denotes those engaged in trade; 'merchants' is natural
    modern English and fits the commercial context.
- source_word: תַרְשִׁישׁ
  chosen: Tarshish
  lexicon: HALOT
  rationale: Proper place/name transliterated.
- source_word: כָּל כְּפִרֶיהָ
  chosen: all her young lions
  alternatives:
  - all her villages
  - all her strong ones
  lexicon: HALOT
  rationale: כְּפִיר normally means 'young lion.' In context it may metaphorically
    refer to dependent powers, colonies, or allied rulers associated with Tarshish.
    The literal image is retained in the main text for transparency, with interpretive
    alternatives preserved in a footnote.
- source_word: יֹאמְרוּ לְךָ
  chosen: will say to you
  alternatives:
  - shall say to you
  lexicon: HALOT
  rationale: Simple future rendering of the imperfect in context.
- source_word: הֲלִשְׁלֹל שָׁלָל
  chosen: Have you come to take plunder
  alternatives:
  - Have you come to spoil spoil
  - Have you come to seize spoil
  lexicon: HALOT
  rationale: Infinitive plus cognate accusative intensifies the action. English idiom
    is best conveyed by 'take plunder' rather than a wooden repetition.
- source_word: בָא
  chosen: have you come
  alternatives:
  - are you coming
  lexicon: HALOT
  rationale: Perfective/question sense in English is best represented by 'have you
    come' in this taunting rhetorical question.
- source_word: הֲלָבֹז בַּז
  chosen: Have you assembled your company to seize
  alternatives:
  - Have you come to loot
  lexicon: HALOT
  rationale: The second rhetorical question continues the same accusation. בוז/בז
    refers to booty/loot; 'seize' avoids awkward repetition immediately before the
    explicit list of valuables. The object is supplied by the following clause.
- source_word: הִקְהַלְתָּ קְהָלֶךָ
  chosen: have you assembled your company
  alternatives:
  - have you gathered your assembly
  - have you gathered your hordes
  lexicon: HALOT
  rationale: Verb plus cognate noun emphasizes mustering a group. 'Company' is readable
    and suitably military/commercial without overinterpreting as strictly 'army.'
- source_word: לָשֵׂאת כֶּסֶף וְזָהָב
  chosen: to seize silver and gold
  alternatives:
  - to carry off silver and gold
  lexicon: HALOT
  rationale: נשא literally 'carry/lift,' but in plunder context 'seize' or 'carry
    off' expresses the intended sense. 'Seize' keeps the predatory force concise.
- source_word: לָקַחַת מִקְנֶה וְקִנְיָן
  chosen: to take livestock and goods
  alternatives:
  - to take cattle and possessions
  - to take livestock and property
  lexicon: HALOT
  rationale: מִקְנֶה commonly denotes livestock/cattle; קִנְיָן denotes property/possessions.
    'Livestock and goods' is natural and broad enough for the pair.
- source_word: לִשְׁלֹל שָׁלָל גָּדוֹל
  chosen: to take great plunder
  alternatives:
  - to seize much spoil
  - to carry off great spoil
  lexicon: HALOT
  rationale: The repeated cognate construction climaxes the accusation. 'Great plunder'
    is idiomatic and preserves the emphasis.
