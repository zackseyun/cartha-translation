id: EZK.38.15
reference: Ezekiel 38:15
source:
  edition: WLC
  text: וּ/בָ֤אתָ מִ/מְּקֽוֹמְ/ךָ֙ מִ/יַּרְכְּתֵ֣י צָפ֔וֹן אַתָּ֕ה וְ/עַמִּ֥ים רַבִּ֖ים
    אִתָּ֑/ךְ רֹכְבֵ֤י סוּסִים֙ כֻּלָּ֔/ם קָהָ֥ל גָּד֖וֹל וְ/חַ֥יִל רָֽב׃
translation:
  text: And you will come from your place, from the far north—you and many peoples
    with you, all of them riding horses—a great assembly and a mighty army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the remotest parts of the north' or 'from the uttermost north.'
      The Hebrew idiom refers to the farthest reaches of the north.
    reason: lexical_alternative
  - marker: b
    text: Or, 'a great company and a vast force.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ
  chosen: And you will come
  alternatives:
  - And you shall come
  - Then you will come
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in prophetic discourse commonly
    has future force. 'Will come' gives clear English sense without archaic 'shall.'
    The conjunction is retained as 'And' to preserve the sequence.
- source_word: מִמְּקוֹמְךָ
  chosen: from your place
  alternatives:
  - out of your place
  - from your location
  lexicon: HALOT
  rationale: מָקוֹם is broadly 'place.' 'From your place' is natural and sufficiently
    formal; no need to narrow to 'location' or intensify with 'out of.'
- source_word: מִיַּרְכְּתֵי צָפוֹן
  chosen: from the far north
  alternatives:
  - from the remotest parts of the north
  - from the uttermost north
  - from the recesses of the north
  lexicon: HALOT
  rationale: יַרְכָּה/יַרְכְּתַיִם idiomatically denotes the remote extremities or
    farthest reaches. 'Far north' captures the geographic idiom in readable modern
    English; the fuller alternatives are possible but heavier.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis after the directional phrase. English
    can preserve this adequately with explicit 'you' before the following coordinated
    phrase, without overemphatic wording.
- source_word: וְעַמִּים רַבִּים אִתָּךְ
  chosen: you and many peoples with you
  alternatives:
  - and many peoples with you
  - you, and many nations with you
  lexicon: HALOT
  rationale: עַמִּים is more literally 'peoples' rather than 'nations,' emphasizing
    groups of peoples allied with Gog. The syntax places the pronoun and accompanying
    peoples together, so 'you and many peoples with you' best reflects the Hebrew
    structure.
- source_word: רֹכְבֵי סוּסִים
  chosen: riding horses
  alternatives:
  - horsemen
  - mounted on horses
  lexicon: HALOT
  rationale: The participial phrase literally means 'riders of horses.' 'Riding horses'
    is clear and natural while preserving the image. 'Horsemen' is possible but slightly
    more interpretive and less transparent to the Hebrew construction.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  - every one of them
  lexicon: HALOT
  rationale: The pronoun refers to the accompanying peoples/riders collectively. 'All
    of them' makes the distributive force explicit in English.
- source_word: קָהָל גָּדוֹל
  chosen: a great assembly
  alternatives:
  - a great company
  - a great congregation
  lexicon: HALOT
  rationale: קָהָל denotes an assembled group. In this military context, 'assembly'
    preserves the basic sense without importing the ecclesial associations that 'congregation'
    may carry. 'Company' is possible but less transparent.
- source_word: וְחַיִל רָב
  chosen: and a mighty army
  alternatives:
  - and a great force
  - and a vast army
  lexicon: HALOT
  rationale: חַיִל in military context commonly denotes force, army, or host. 'Mighty
    army' captures both martial sense and the adjective רָב as substantial strength/size.
    'Great force' is possible but less idiomatic in English.
