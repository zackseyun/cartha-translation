id: EZK.38.11
reference: Ezekiel 38:11
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֗ אֶֽעֱלֶה֙ עַל אֶ֣רֶץ פְּרָז֔וֹת אָבוֹא֙ הַ/שֹּׁ֣קְטִ֔ים יֹשְׁבֵ֖י
    לָ/בֶ֑טַח כֻּלָּ֗/ם יֹֽשְׁבִים֙ בְּ/אֵ֣ין חוֹמָ֔ה וּ/בְרִ֥יחַ וּ/דְלָתַ֖יִם אֵ֥ין
    לָ/הֶֽם־׃
translation:
  text: and you will say, ‘I will go up against a land of unwalled villages; I will
    come against those who are at rest, who dwell securely, all of them dwelling without
    a wall, and having no bar or doors.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a land of open country' or 'a land of rural settlements'; the Hebrew
      term refers to places lacking defensive walls.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will come to'; the rendering 'come against' reflects the hostile context
      of Gog's speech.
    reason: lexical_alternative
  - marker: c
    text: Or 'bars or gates'; 'doors' is the more direct rendering of the Hebrew,
      though the context is defensive structures.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: and you will say
  alternatives:
  - and you shall say
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse, functioning
    as a future/sequential statement addressed to Gog. 'Will say' gives natural modern
    English while preserving the predictive force.
- source_word: אֶעֱלֶה
  chosen: I will go up
  alternatives:
  - I will come up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' 'Go up' fits the speaker's self-declared
    intention and preserves the directional nuance without overinterpreting geography.
- source_word: אֶרֶץ פְּרָזוֹת
  chosen: a land of unwalled villages
  alternatives:
  - the land of open country
  - a land of rural settlements
  lexicon: HALOT
  rationale: פְּרָזוֹת denotes open, unwalled settlements/country places. 'Unwalled
    villages' best captures the concrete sense and coheres with the later mention
    of having no wall, bars, or doors.
- source_word: אָבוֹא
  chosen: I will come against
  alternatives:
  - I will come to
  - I will enter
  lexicon: HALOT
  rationale: בוא with hostile context and following descriptions of vulnerable inhabitants
    implies movement against a target. 'Come against' makes the adversarial force
    explicit from context without adding content beyond the syntax and setting.
- source_word: הַשֹּׁקְטִים
  chosen: those who are at rest
  alternatives:
  - the quiet ones
  - those who are undisturbed
  lexicon: HALOT
  rationale: The participle from שקט conveys quietness, tranquility, or being undisturbed.
    'Those who are at rest' is idiomatic and preserves the sense of peaceful ease.
- source_word: יֹשְׁבֵי לָבֶטַח
  chosen: who dwell securely
  alternatives:
  - living in safety
  - dwelling in confidence
  lexicon: HALOT
  rationale: The participial phrase describes settled security. 'Dwell securely' is
    a standard, clear rendering that preserves both habitation and safety.
- source_word: כֻּלָּם יֹשְׁבִים
  chosen: all of them dwelling
  alternatives:
  - all of them live
  - all of them are living
  lexicon: HALOT
  rationale: Retaining 'dwelling' echoes the repeated ישב and preserves the Hebrew's
    emphasis on settled habitation.
- source_word: בְּאֵין חוֹמָה
  chosen: without a wall
  alternatives:
  - with no wall
  - in the absence of a wall
  lexicon: HALOT
  rationale: The preposition plus negative particle expresses lack. Singular 'wall'
    is retained as in Hebrew and works collectively in English.
- source_word: וּבְרִיחַ
  chosen: bar
  alternatives:
  - gate-bar
  - crossbar
  lexicon: HALOT
  rationale: בריח refers to a bar used to secure an entrance or gate. Singular is
    retained in coordination with the following plural noun as Hebrew style allows
    a collective sense.
- source_word: וּדְלָתַיִם
  chosen: doors
  alternatives:
  - gates
  lexicon: HALOT
  rationale: The noun ordinarily means 'doors' or 'double doors.' 'Doors' is the more
    direct lexical equivalent; 'gates' is possible by context but less exact.
- source_word: אֵין לָהֶם
  chosen: having no
  alternatives:
  - there are none for them
  - they have no
  lexicon: HALOT
  rationale: 'Rendered idiomatically in English as a possessive lack attached to the
    prior nouns: ''having no bar or doors.'' This avoids awkward repetition while
    preserving the meaning.'
