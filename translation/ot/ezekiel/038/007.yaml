id: EZK.38.7
reference: Ezekiel 38:7
source:
  edition: WLC
  text: הִכֹּן֙ וְ/הָכֵ֣ן לְ/ךָ֔ אַתָּ֕ה וְ/כָל קְהָלֶ֖/ךָ הַ/נִּקְהָלִ֣ים עָלֶ֑י/ךָ
    וְ/הָיִ֥יתָ לָ/הֶ֖ם לְ/מִשְׁמָֽר־׃
translation:
  text: Be prepared, and prepare yourself—you and all your assembly who are gathered
    around you—and be a guard for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Get ready, and make yourself ready.' The paired verbs intensify the
      command to readiness and preparation.
    reason: lexical_alternative
  - marker: b
    text: Or 'be on guard for them' or 'be their keeper.' The Hebrew may suggest guarding,
      watching over, or taking charge of them.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכֹּן
  chosen: Be prepared
  alternatives:
  - Get ready
  - Establish yourself
  lexicon: HALOT
  rationale: Niphal imperative of כון here has a reflexive/passive-preparatory sense.
    'Be prepared' is natural English and preserves the command's force better than
    the less idiomatic 'be established.'
- source_word: וְהָכֵן לְךָ
  chosen: and prepare yourself
  alternatives:
  - and make preparation for yourself
  - and be ready
  lexicon: HALOT
  rationale: 'Hiphil imperative of כון with לְךָ intensifies the command: not merely
    a state of readiness but active preparation. ''Prepare yourself'' captures the
    reflexive nuance and the paired imperatives.'
- source_word: קְהָלֶךָ
  chosen: your assembly
  alternatives:
  - your company
  - your host
  - your contingent
  lexicon: HALOT
  rationale: קהל denotes an assembled group. In this military context 'assembly' remains
    broad and textually close, avoiding over-specification while still fitting the
    gathered forces.
- source_word: הַנִּקְהָלִים עָלֶיךָ
  chosen: who are gathered around you
  alternatives:
  - who assemble to you
  - who are assembled to you
  - who gather themselves to you
  lexicon: HALOT
  rationale: The participle from קהל describes those being assembled in relation to
    Gog. 'Around you' renders עָלֶיךָ idiomatically in context, conveying forces massing
    about him without wooden literalism.
- source_word: וְהָיִיתָ לָהֶם לְמִשְׁמָר
  chosen: and be a guard for them
  alternatives:
  - and be on guard for them
  - and be their guard
  - and be a keeper for them
  lexicon: HALOT
  rationale: מִשְׁמָר can denote guard, watch, charge, or place/duty of guarding.
    Here the sense is that Gog is to serve as protective watch/guard for the assembled
    forces. 'Be a guard for them' is concise and preserves the noun's force better
    than a more interpretive military paraphrase.
