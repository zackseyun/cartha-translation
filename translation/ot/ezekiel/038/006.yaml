id: EZK.38.6
reference: Ezekiel 38:6
source:
  edition: WLC
  text: גֹּ֚מֶר וְ/כָל אֲגַפֶּ֔י/הָ בֵּ֚ית תּֽוֹגַרְמָ֔ה יַרְכְּתֵ֥י צָפ֖וֹן וְ/אֶת
    כָּל אֲגַפָּ֑י/ו עַמִּ֥ים רַבִּ֖ים אִתָּֽ/ךְ־־־׃
translation:
  text: Gomer and all its troops, the house of Togarmah from the far north and all
    its troops—many peoples are with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its wings' / 'all its divisions'; the Hebrew term can denote wings,
      extremities, or attached companies. Here it is rendered 'troops' because of
      the military context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the remote parts of the north.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּמֶר
  chosen: Gomer
  lexicon: HALOT
  rationale: Proper name of a people/nation; transliterated rather than translated
    in keeping with the philosophy of transliterating names.
- source_word: אֲגַפֶּיהָ
  chosen: its troops
  alternatives:
  - its wings
  - its bands
  lexicon: HALOT
  rationale: Though the noun can literally denote 'wings' or extremities, in military/national
    listing contexts it idiomatically refers to attached divisions or forces. 'Troops'
    best conveys the sense in readable modern English.
- source_word: בֵּית תּוֹגַרְמָה
  chosen: the house of Togarmah
  alternatives:
  - Beth-togarmah
  - the people of Togarmah
  lexicon: HALOT
  rationale: Retains the Hebrew construct 'house of' as a standard ethnogeographic
    designation, while transliterating the proper name.
- source_word: יַרְכְּתֵי צָפוֹן
  chosen: from the far north
  alternatives:
  - from the remotest parts of the north
  - from the uttermost north
  lexicon: HALOT
  rationale: The phrase denotes the remote northern reaches. 'From the far north'
    is natural English and preserves the geographic force without archaic phrasing.
- source_word: אֲגַפָּיו
  chosen: its troops
  alternatives:
  - its wings
  - its bands
  lexicon: HALOT
  rationale: Same noun as earlier in the verse, here with masculine suffix referring
    to the house of Togarmah. For consistency in this military context, rendered 'its
    troops'.
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' rather than specifically political 'nations.'
    'Many peoples' preserves the ethnic-group sense of the Hebrew plural.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - beside you
  lexicon: HALOT
  rationale: Standard rendering of the preposition with pronominal suffix. The suffix
    is feminine singular, addressing Gog as personified in grammatical gender; English
    does not need to mark the feminine here.
