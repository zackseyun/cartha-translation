theological_decisions:
- issue: Metaphorical geography in טַבּוּר הָאָרֶץ
  chosen_reading: the phrase is rendered idiomatically as 'the center of the earth'
    rather than woodenly as 'the navel of the earth'
  alternative_readings:
  - the navel of the earth
  rationale: This is not a doctrinally contested term, but the metaphor can be misunderstood
    if translated too literally. The idiomatic rendering preserves the sense of central
    prominence without importing cosmological claims.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
