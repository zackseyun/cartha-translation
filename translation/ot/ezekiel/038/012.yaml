id: EZK.38.12
reference: Ezekiel 38:12
source:
  edition: WLC
  text: לִ/שְׁלֹ֥ל שָׁלָ֖ל וְ/לָ/בֹ֣ז בַּ֑ז לְ/הָשִׁ֨יב יָדְ/ךָ֜ עַל חֳרָב֣וֹת נוֹשָׁבֹ֗ת
    וְ/אֶל עַם֙ מְאֻסָּ֣ף מִ/גּוֹיִ֔ם עֹשֶׂה֙ מִקְנֶ֣ה וְ/קִנְיָ֔ן יֹשְׁבֵ֖י עַל טַבּ֥וּר
    הָ/אָֽרֶץ־־־׃
translation:
  text: to seize spoil and to carry off plunder, to turn your hand against ruins now
    inhabited and against a people gathered from the nations, who have acquired livestock
    and goods, who dwell at the center of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the navel of the earth,' an idiom for the center or middle of
      the land/world.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁלֹל שָׁלָל
  chosen: to seize spoil
  alternatives:
  - to take spoil
  - to plunder spoil
  lexicon: HALOT
  rationale: The infinitive plus cognate accusative intensifies the action. 'Seize
    spoil' preserves the Hebrew idiom concisely and naturally in English without over-paraphrasing.
- source_word: וְלָבֹז בַּז
  chosen: and to carry off plunder
  alternatives:
  - and to take plunder
  - and to loot loot
  lexicon: HALOT
  rationale: A second infinitive plus cognate object parallels the first phrase. 'Carry
    off plunder' differentiates it slightly from the previous clause while preserving
    the sense of looting.
- source_word: לְהָשִׁיב יָדְךָ
  chosen: to turn your hand
  alternatives:
  - to bring back your hand
  - to stretch out your hand
  lexicon: HALOT
  rationale: The idiom here means to direct or turn one's power against a target.
    'Turn your hand' keeps the metaphor visible; 'stretch out your hand' is possible
    interpretively but is less directly tied to שׁוּב ('turn/return').
- source_word: חֳרָבוֹת נוֹשָׁבוֹת
  chosen: ruins now inhabited
  alternatives:
  - desolate places that are inhabited
  - waste places resettled
  lexicon: HALOT
  rationale: 'The phrase is paradoxical in Hebrew: formerly ruined places are now
    inhabited. ''Ruins now inhabited'' preserves both the past devastation and present
    resettlement in compact English.'
- source_word: עַם מְאֻסָּף מִגּוֹיִם
  chosen: a people gathered from the nations
  alternatives:
  - a people assembled from the nations
  - a people collected from among the nations
  lexicon: HALOT
  rationale: This describes a restored population regathered from exile among many
    nations. 'Gathered from the nations' is idiomatic and faithful.
- source_word: עֹשֶׂה מִקְנֶה וְקִנְיָן
  chosen: who have acquired livestock and goods
  alternatives:
  - who make livestock and property
  - who have gotten cattle and possessions
  lexicon: HALOT
  rationale: עֹשֶׂה with these nouns is an idiom for acquiring or accumulating possessions,
    not literally 'making' them. 'Livestock and goods' communicates movable wealth
    in readable English.
- source_word: מִקְנֶה
  chosen: livestock
  alternatives:
  - cattle
  - herds
  lexicon: HALOT
  rationale: The term broadly denotes domestic animals as property. 'Livestock' is
    broader and more accurate than 'cattle' alone.
- source_word: קִנְיָן
  chosen: goods
  alternatives:
  - property
  - possessions
  lexicon: HALOT
  rationale: The noun refers to acquired property/possessions. 'Goods' fits the economic
    context and pairs well with 'livestock' without sounding overly formal.
- source_word: יֹשְׁבֵי עַל טַבּוּר הָאָרֶץ
  chosen: who dwell at the center of the earth
  alternatives:
  - who live on the navel of the earth
  - who dwell on the heights of the land
  lexicon: HALOT
  rationale: טַבּוּר literally means 'navel,' used metaphorically for the middle or
    center. 'Center of the earth' conveys the idiom in natural English while preserving
    the geographic-centrality image.
