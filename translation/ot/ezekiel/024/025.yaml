id: EZK.24.25
reference: Ezekiel 24:25
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֔ם הֲ/ל֗וֹא בְּ/י֨וֹם קַחְתִּ֤/י מֵ/הֶם֙ אֶת מָ֣עוּזָּ֔/ם
    מְשׂ֖וֹשׂ תִּפְאַרְתָּ֑/ם אֶת מַחְמַ֤ד עֵֽינֵי/הֶם֙ וְ/אֶת מַשָּׂ֣א נַפְשָׁ֔/ם
    בְּנֵי/הֶ֖ם וּ/בְנוֹתֵי/הֶֽם־־־־׃
translation:
  text: And you, son of man, will it not be that on the day when I take from them
    their stronghold, the joy of their glory, the delight of their eyes, and the longing
    of their soul—their sons and their daughters—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the desire of their eyes' for 'the delight of their eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the desire of their soul' for 'the longing of their soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Conventional rendering in Ezekiel for the divine address בן־אדם. It is
    formally accurate and preserves the repeated prophetic title without paraphrasing.
- source_word: הֲלוֹא
  chosen: will it not be that
  alternatives:
  - surely
  - is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting affirmation. 'Will it not
    be that' preserves the interrogative force better in English syntax for the following
    temporal clause.
- source_word: בְּיוֹם
  chosen: on the day when
  alternatives:
  - in the day that
  - when
  lexicon: HALOT
  rationale: Temporal expression introducing the event. 'On the day when' is natural
    modern English while retaining the formal temporal marker.
- source_word: קַחְתִּי מֵהֶם
  chosen: I take from them
  alternatives:
  - I remove from them
  - I seize from them
  lexicon: HALOT
  rationale: לקח with מן here denotes taking away. 'Take from them' is straightforward
    and leaves the force broad enough to include removal/judgment.
- source_word: מָעוּזָּם
  chosen: their stronghold
  alternatives:
  - their refuge
  - their strong strength
  lexicon: HALOT
  rationale: מָעוֹז commonly denotes a place or source of strength/refuge. In context
    it refers to the temple/Jerusalem as what they rely on; 'stronghold' preserves
    both literal and metaphorical force.
- source_word: מְשׂוֹשׂ תִּפְאַרְתָּם
  chosen: the joy of their glory
  alternatives:
  - the rejoicing of their splendor
  - the pride of their joy
  lexicon: HALOT
  rationale: A construct chain of closely related honor/beauty terms. 'The joy of
    their glory' keeps the Hebrew's compact poetic apposition rather than flattening
    it into a single interpretive phrase.
- source_word: מַחְמַד עֵינֵיהֶם
  chosen: the delight of their eyes
  alternatives:
  - the desire of their eyes
  - the precious thing of their eyes
  lexicon: HALOT
  rationale: Idiomatic expression for what is cherished or desired. 'Delight of their
    eyes' is idiomatic English and fits the emotional tone.
- source_word: מַשָּׂא נַפְשָׁם
  chosen: the longing of their soul
  alternatives:
  - the desire of their soul
  - that on which their soul is set
  lexicon: HALOT
  rationale: Though מַשָּׂא often means 'burden,' in this collocation and context
    many understand it as that toward which the soul is lifted/set. 'Longing of their
    soul' best fits the sequence of cherished objects and persons.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  chosen: their sons and their daughters
  alternatives:
  - their children
  lexicon: HALOT
  rationale: Gender-accurate and formally faithful to the Hebrew pair. Avoids flattening
    to 'children' where the source explicitly names sons and daughters.
