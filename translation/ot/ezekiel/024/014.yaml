id: EZK.24.14
reference: Ezekiel 24:14
source:
  edition: WLC
  text: אֲנִ֨י יְהוָ֤ה דִּבַּ֨רְתִּי֙ בָּאָ֣ה וְ/עָשִׂ֔יתִי לֹֽא אֶפְרַ֥ע וְ/לֹא אָח֖וּס וְ/לֹ֣א אֶנָּחֵ֑ם כִּ/דְרָכַ֤יִ/ךְ וְ/כַ/עֲלִילוֹתַ֨יִ/ךְ֙ שְׁפָט֔וּ/ךְ נְאֻ֖ם אֲדֹנָ֥/י יְהֹוִֽה־־׃פ
translation:
  text: I, Yahweh, have spoken; it is coming, and I will do it. I will not hold back, nor will I spare, nor will I relent. According to your ways and according to your deeds they will judge you, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not withdraw' / 'I will not let up' for 'I will not hold back.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nor will I change my mind' for 'nor will I relent.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew has 'they will judge you,' an unspecified plural that may refer to those carrying out the LORD's judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  - spoke
  lexicon: HALOT
  rationale: The perfect here presents a completed divine utterance with ongoing force; 'have spoken' fits idiomatic English and preserves the solemnity of a declared word now being fulfilled.
- source_word: בָּאָה
  chosen: it is coming
  alternatives:
  - it has come
  - it comes
  lexicon: HALOT
  rationale: The feminine singular verb likely has an implicit subject referring to the announced judgment/calamity. 'It is coming' captures the imminent force in context better than a simple past and pairs naturally with the following 'I will do it.'
- source_word: וְעָשִׂיתִי
  chosen: and I will do it
  alternatives:
  - and I have done it
  - and I will act
  lexicon: HALOT
  rationale: Though formally a perfect with conjunction, in this prophetic sequence it functions futurally/resultatively. 'I will do it' is the most natural English rendering in context of impending judgment.
- source_word: אֶפְרַע
  chosen: hold back
  alternatives:
  - withdraw
  - let up
  - slacken
  lexicon: HALOT
  rationale: The verb here conveys refraining or drawing back from executing judgment. 'Hold back' is clear modern English and avoids overinterpreting the nuance.
- source_word: אָחוּס
  chosen: spare
  alternatives:
  - have pity
  - show compassion
  lexicon: HALOT
  rationale: In judgment contexts חוס commonly means to spare or refrain out of pity. 'Spare' is concise and idiomatic in English judicial language.
- source_word: אֶנָּחֵם
  chosen: relent
  alternatives:
  - change my mind
  - be sorry
  - repent
  lexicon: HALOT
  rationale: For divine נָחַם in judgment contexts, 'relent' best communicates reversal of announced punishment without implying moral repentance in God.
- source_word: כִּדְרָכַיִךְ
  chosen: according to your ways
  alternatives:
  - as your ways deserve
  - by your conduct
  lexicon: HALOT
  rationale: '''Ways'' is a standard rendering for דֶּרֶךְ in ethical/judicial contexts and preserves the metaphor of one''s manner of life.'
- source_word: וְכַעֲלִילוֹתַיִךְ
  chosen: and according to your deeds
  alternatives:
  - and according to your acts
  - and according to your practices
  lexicon: HALOT
  rationale: עֲלִילוֹת refers to actions/deeds, often with moral coloring. 'Deeds' is natural and suitably weighty in a judgment oracle.
- source_word: שְׁפָטוּךְ
  chosen: they will judge you
  alternatives:
  - you will be judged
  - they have judged you
  lexicon: HALOT
  rationale: 'The 3rd person plural with 2fs suffix is best represented actively: ''they will judge you.'' The unspecified plural can denote agents of judgment without needing to identify them explicitly.'
- source_word: אֲדֹנָי יְהֹוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Standard English convention renders the title-name combination as 'the Lord GOD,' distinguishing אֲדֹנָי from the following divine name while respecting the project's YHWH policy.
