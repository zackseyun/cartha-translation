theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default is to render YHWH as 'the LORD.' In the compound
    אֲדֹנָי יְהוִה, English convention commonly uses 'Lord GOD' to avoid 'Lord LORD'
    while still signaling the divine name. This preserves reverence tradition and
    remains transparent to the Hebrew form.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
