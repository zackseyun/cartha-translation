id: EZK.24.9
reference: Ezekiel 24:9
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה א֖וֹי עִ֣יר הַ/דָּמִ֑ים גַּם אֲנִ֖י
    אַגְדִּ֥יל הַ/מְּדוּרָֽה־׃
translation:
  text: 'Therefore thus says the Lord GOD: Woe to the city of bloodshed! I also will
    make the firewood pile great.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'city of bloods,' an idiom for a city marked by bloodshed or bloodguilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'I too will enlarge the pyre.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction linking this pronouncement to the preceding
    context; 'Therefore' preserves the prophetic logical connection.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; 'thus says' is both accurate
    and natural in English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Renders the title-plus-divine-name formula in a standard English way.
    'Lord' translates אֲדֹנָי and 'GOD' signals the underlying YHWH in line with the
    project's default rendering of יְהוָה as 'the LORD.' Here 'the Lord GOD' is the
    clearest idiomatic equivalent for the compound form.
- source_word: אוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a lament/judgment cry. 'Woe' best preserves the prophetic
    denunciatory force.
- source_word: עִיר הַדָּמִים
  chosen: the city of bloodshed
  alternatives:
  - the bloody city
  - the city of bloods
  lexicon: HALOT
  rationale: The plural דָּמִים often denotes bloodguilt or acts of bloodshed rather
    than literal blood as a substance. 'City of bloodshed' communicates the moral
    charge clearly in modern English while staying close to the Hebrew.
- source_word: גַּם אֲנִי
  chosen: I also
  alternatives:
  - I too
  - even I
  lexicon: HALOT
  rationale: Marks emphatic divine participation in the announced action. 'I also'
    is straightforward and preserves the emphasis.
- source_word: אַגְדִּיל
  chosen: will make ... great
  alternatives:
  - will enlarge
  - will make ... bigger
  - will pile high
  lexicon: HALOT
  rationale: 'Hiphil of גדל means to make great/enlarge. Because the object is the
    fuel pile, English idiom requires a slightly expanded rendering: ''will make the
    firewood pile great'' = increase/enlarge it.'
- source_word: הַמְּדוּרָה
  chosen: the firewood pile
  alternatives:
  - the pyre
  - the pile of wood
  - the bonfire
  lexicon: HALOT
  rationale: Refers to the pile of fuel for the cooking/judgment-fire imagery in context.
    'Firewood pile' is concrete and accessible; 'pyre' is possible but can sound overly
    specialized or imply funerary usage not explicit here.
