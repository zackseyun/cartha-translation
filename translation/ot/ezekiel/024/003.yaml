id: EZK.24.3
reference: Ezekiel 24:3
source:
  edition: WLC
  text: וּ/מְשֹׁ֤ל אֶל בֵּית הַ/מֶּ֨רִי֙ מָשָׁ֔ל וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה שְׁפֹ֤ת הַ/סִּיר֙ שְׁפֹ֔ת וְ/גַם יְצֹ֥ק בּ֖/וֹ מָֽיִם־־־׃
translation:
  text: 'And speak a proverb to the rebellious house, and say to them, ‘Thus says the Lord GOD: Set on the pot; set it on, and also pour water into it.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a parable.” The Hebrew מָשָׁל can denote a proverb, parable, or figurative saying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְשֹׁל
  chosen: speak
  alternatives:
  - utter
  - present
  lexicon: HALOT
  rationale: From משל in the verbal sense 'to use/speak a proverb or parable.' In English, 'speak a proverb' is natural enough and preserves the explicit connection to the following noun מָשָׁל.
- source_word: בֵּית הַמֶּרִי
  chosen: the rebellious house
  alternatives:
  - the house of rebellion
  - the rebellious people
  lexicon: HALOT
  rationale: A common Ezekiel expression for Israel/Judah in obstinacy. 'House' is retained formally because it is a significant prophetic idiom, while 'rebellious' renders the adjectival force naturally.
- source_word: מָשָׁל
  chosen: a proverb
  alternatives:
  - a parable
  - a taunt
  lexicon: HALOT
  rationale: The term can denote proverb, parable, or figurative saying. Here the ensuing pot-image is an extended figurative saying; 'proverb' stays close to the Hebrew while remaining intelligible. The alternative 'parable' is worth preserving because many English versions use it.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'the Lord GOD.' This preserves the title distinction without awkwardness.
- source_word: שְׁפֹת
  chosen: Set on
  alternatives:
  - put on
  - set in place
  lexicon: HALOT
  rationale: The imperative from שפת here refers to setting a cooking pot on the fire/hearth. 'Set on' is concise and idiomatic in context.
- source_word: הַסִּיר
  chosen: the pot
  alternatives:
  - the cooking pot
  - the cauldron
  lexicon: HALOT
  rationale: A general cooking vessel is intended. 'Pot' is the clearest modern English equivalent; 'cauldron' is possible but sounds more specialized and archaic.
- source_word: שְׁפֹת
  chosen: set it on
  alternatives:
  - put it on
  - place it
  lexicon: HALOT
  rationale: The repeated imperative is retained rather than smoothed away, reflecting the Hebrew emphasis and urgency.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and
  lexicon: HALOT
  rationale: Preserves the additive force of גם without overtranslating.
- source_word: יְצֹק בּוֹ מָיִם
  chosen: pour water into it
  alternatives:
  - pour water in it
  - fill it with water
  lexicon: HALOT
  rationale: יצק means 'pour.' 'Into it' makes the direction explicit. 'Fill it with water' would go beyond the lexical content.
