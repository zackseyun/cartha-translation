theological_decisions:
- issue: Whether to make explicit that 'the delight of your eyes' refers to Ezekiel's
    wife
  chosen_reading: Keep the idiom in the main text without naming the wife
  alternative_readings:
  - the delight of your eyes—your wife
  - your beloved wife
  rationale: The immediate context identifies the referent, but this verse itself
    uses the idiom. Preserving the idiom avoids adding information not stated in the
    line while allowing readers to infer or learn the referent from context.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve original-language primacy.'
