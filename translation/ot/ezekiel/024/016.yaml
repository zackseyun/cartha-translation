id: EZK.24.16
reference: Ezekiel 24:16
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הִנְ/נִ֨י לֹקֵ֧חַ מִמְּ/ךָ֛ אֶת מַחְמַ֥ד עֵינֶ֖י/ךָ בְּ/מַגֵּפָ֑ה
    וְ/לֹ֤א תִסְפֹּד֙ וְ/לֹ֣א תִבְכֶּ֔ה וְ/ל֥וֹא תָב֖וֹא דִּמְעָתֶֽ/ךָ־־׃
translation:
  text: Son of man, behold, I am taking from you the delight of your eyes with a blow,
    yet you shall not mourn or weep, and your tears shall not come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the desire of your eyes.' The phrase refers to what is most precious
      to Ezekiel; in context, it is his wife.
    reason: lexical_alternative
  - marker: b
    text: Or 'by a plague' or 'with a stroke.' The Hebrew term can denote a striking
      blow or plague-like affliction.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'your tear shall not come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A fixed address to Ezekiel throughout the book. 'Son of man' preserves
    the Hebrew idiom and its established force better than smoothing to 'human one'
    or 'mortal.' The masculine singular matches the addressed prophet.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: Introduces a solemn, attention-directing declaration. 'Behold' preserves
    the prophetic gravity more effectively than more colloquial options.
- source_word: לֹקֵחַ
  chosen: I am taking
  alternatives:
  - I take
  - I am about to take
  lexicon: HALOT
  rationale: The participle with הִנְנִי conveys imminent action. 'I am taking' captures
    the vivid immediacy without over-interpreting as purely future.
- source_word: מַחְמַד עֵינֶיךָ
  chosen: the delight of your eyes
  alternatives:
  - the desire of your eyes
  - the precious thing of your eyes
  lexicon: HALOT
  rationale: An idiom for what is most cherished, here referring to Ezekiel's wife
    in context. 'Delight of your eyes' is natural English and preserves the emotive
    force without importing the referent into the text itself.
- source_word: בְּמַגֵּפָה
  chosen: with a blow
  alternatives:
  - by a plague
  - with a stroke
  - suddenly
  lexicon: HALOT
  rationale: מַגֵּפָה can denote a plague, pestilence, or striking blow. In this singular
    personal context, 'with a blow' best conveys a sudden striking act without specifying
    disease. 'Stroke' is possible but may sound medically specific in modern English.
- source_word: תִסְפֹּד
  chosen: mourn
  alternatives:
  - lament
  lexicon: HALOT
  rationale: Refers to formal mourning behavior. 'Mourn' is the clearest modern English
    equivalent; 'lament' is possible but can sound more verbal than ritual-social.
- source_word: תִבְכֶּה
  chosen: weep
  alternatives:
  - cry
  lexicon: HALOT
  rationale: Keeps a distinction from 'mourn' and fits the emotional expression prohibited
    here.
- source_word: וְלֹא תָבוֹא דִּמְעָתֶךָ
  chosen: and your tears shall not come
  alternatives:
  - nor shall your tear come
  - nor shall tears come from you
  - nor shall you shed tears
  lexicon: HALOT
  rationale: The Hebrew literally says 'your tear shall not come.' Rendering it as
    'your tears shall not come' preserves the imagery while remaining idiomatic enough
    in English. 'You shall not shed tears' is smoother but less textually transparent.
