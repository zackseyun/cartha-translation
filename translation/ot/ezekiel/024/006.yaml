theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default renders יְהוָה as 'the LORD.' In this fixed Hebrew
    title, standard English capitalization 'Lord GOD' preserves reverence and avoids
    the awkward duplication 'Lord LORD.' This is a translation convention, not a theological
    reinterpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
