id: EZK.24.6
reference: Ezekiel 24:6
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה אוֹי֮ עִ֣יר הַ/דָּמִים֒ סִ֚יר אֲשֶׁ֣ר
    חֶלְאָתָ֣/ה בָ֔/הּ וְ/חֶ֨לְאָתָ֔/הּ לֹ֥א יָצְאָ֖ה מִמֶּ֑/נָּה לִ/נְתָחֶ֤י/הָ לִ/נְתָחֶ֨י/הָ֙
    הוֹצִיאָ֔/הּ לֹא נָפַ֥ל עָלֶ֖י/הָ גּוֹרָֽל־׀־׃
translation:
  text: 'Therefore thus says the Lord GOD: Woe to the city of bloodshed, the pot whose
    rust is in it, and whose rust has not gone out from it! Piece by piece bring it
    out; no lot has fallen on it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'scum' for 'rust'; the Hebrew term refers to the foul deposit/corrosion
      clinging to the pot.
    reason: lexical_alternative
  - marker: b
    text: That is, the contents are to be taken out one by one, without selection
      by lot.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the divine conclusion/judgment
    from the preceding sign-act context.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; retained in familiar but natural
    English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following doctrine default, יְהוָה is rendered 'the LORD.' In the compound
    title אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD'
    while preserving both elements.
- source_word: אוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: Prophetic lament/judgment interjection; 'Woe' best preserves the force
    of denunciation.
- source_word: עִיר הַדָּמִים
  chosen: the city of bloodshed
  alternatives:
  - the bloody city
  - the city of bloods
  lexicon: HALOT
  rationale: Plural דמים often denotes bloodguilt/bloodshed rather than literal multiple
    bloods. 'City of bloodshed' is idiomatic and preserves the moral charge.
- source_word: סִיר
  chosen: the pot
  alternatives:
  - the cooking pot
  - the cauldron
  lexicon: HALOT
  rationale: Maintains the metaphor established in the chapter. 'Pot' is simple and
    sufficiently concrete.
- source_word: חֶלְאָה
  chosen: rust
  alternatives:
  - corrosion
  - filth
  - scum
  lexicon: HALOT
  rationale: In the pot metaphor, the term denotes the corroded/unclean deposit clinging
    to the vessel. 'Rust' is the most direct image in English, though some versions
    use 'scum.'
- source_word: בָהּ ... מִמֶּנָּה
  chosen: in it ... from it
  alternatives:
  - in her ... from her
  lexicon: HALOT
  rationale: Although the city is feminine, the immediate metaphorical referent is
    the pot, naturally rendered 'it' in English.
- source_word: לֹא יָצְאָה מִמֶּנָּה
  chosen: has not gone out from it
  alternatives:
  - has not come out of it
  - has not been removed from it
  lexicon: HALOT
  rationale: Keeps the verbal image of the rust/scum not leaving the pot, preserving
    the metaphor rather than interpreting it more abstractly.
- source_word: לִנְתָחֶיהָ לִנְתָחֶיהָ הוֹצִיאָהּ
  chosen: Piece by piece bring it out
  alternatives:
  - Bring out its pieces one by one
  - Take it out piece by piece
  lexicon: HALOT
  rationale: 'The repeated phrase intensifies distributive force: each piece is to
    be removed individually. English idiom ''piece by piece'' captures the repetition
    without awkwardness.'
- source_word: נְתָחִים
  chosen: piece
  alternatives:
  - portion
  - cut piece
  - chunk
  lexicon: HALOT
  rationale: Refers to cut portions of meat in the cooking-pot allegory. 'Piece' is
    natural and fits the context.
- source_word: לֹא נָפַל עָלֶיהָ גּוֹרָל
  chosen: no lot has fallen on it
  alternatives:
  - no lot was cast for it
  - the lot did not fall on it
  lexicon: HALOT
  rationale: Retains the imagery of casting lots for portions. The sense is that removal/distribution
    is not by selective allotment but indiscriminate judgment.
