id: EZK.24.5
reference: Ezekiel 24:5
source:
  edition: WLC
  text: מִבְחַ֤ר הַ/צֹּאן֙ לָק֔וֹחַ וְ/גַ֛ם דּ֥וּר הָ/עֲצָמִ֖ים תַּחְתֶּ֑י/הָ רַתַּ֣ח
    רְתָחֶ֔י/הָ גַּם בָּשְׁל֥וּ עֲצָמֶ֖י/הָ בְּ/תוֹכָֽ/הּ־׃ס
translation:
  text: Take the choicest of the flock, and also pile the bones under it; bring it
    to a boil, boil it well, so that its bones are cooked in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'arrange a pile of bones under it.' The Hebrew term translated 'pile'
      is rare, and the exact nuance is uncertain, though the context clearly refers
      to placing bones beneath the pot.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'boil its boiling,' an emphatic expression meaning to
      boil it thoroughly.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְחַר הַצֹּאן
  chosen: the choicest of the flock
  alternatives:
  - the choice sheep
  - the best of the flock
  lexicon: HALOT
  rationale: מִבְחַר denotes what is selected or choice/best. With הַצֹּאן, the sense
    is not merely 'sheep' individually but the flock as the source from which the
    best animal(s) are taken. 'Choicest of the flock' preserves the superlative quality
    and idiomatic English.
- source_word: לָקֹוחַ
  chosen: Take
  alternatives:
  - take it
  - fetch
  lexicon: HALOT
  rationale: Infinitive absolute/verb form used imperativally in this cooking allegory.
    'Take' is the most natural concise command in English.
- source_word: וְגַם דּוּר הָעֲצָמִים תַּחְתֶּיהָ
  chosen: and also pile the bones under it
  alternatives:
  - and also arrange a pile of bones under it
  - and also set the bones under it
  lexicon: HALOT
  rationale: דּוּר is difficult and relatively rare; in context it refers to arranging
    or piling fuel/material. Because the following phrase places 'the bones' beneath
    the pot, the sense is to heap them underneath as fuel or kindling in the metaphor.
    'Pile the bones under it' is vivid and fits the cooking scene.
- source_word: רַתַּח רְתָחֶיהָ
  chosen: bring it to a boil, boil it well
  alternatives:
  - make its boiling boil
  - boil its pieces thoroughly
  lexicon: HALOT
  rationale: The verb plus cognate noun intensifies the action. English cannot reproduce
    the exact cognate construction naturally, so 'bring it to a boil, boil it well'
    conveys both the action and the emphatic force.
- source_word: גַּם בָּשְׁלוּ עֲצָמֶיהָ בְּתוֹכָהּ
  chosen: so that its bones are cooked in it
  alternatives:
  - indeed, let its bones be boiled in it
  - also its bones were cooked in it
  lexicon: HALOT
  rationale: 'בָּשְׁלוּ is perfect plural, likely functioning in the vivid imperative
    sequence/result sense within the allegory. Rendering as a result clause in English
    (''so that'') makes the sequence coherent: boil it thoroughly to the point that
    even its bones are cooked in the pot. ''Cooked'' is more idiomatic than repeating
    ''boiled'' yet still accurate in context.'
