id: EZK.24.1
reference: Ezekiel 24:1
source:
  edition: WLC
  text: וַ/יְהִי֩ דְבַר יְהוָ֨ה אֵלַ֜/י בַּ/שָּׁנָ֤ה הַ/תְּשִׁיעִית֙ בַּ/חֹ֣דֶשׁ הָ/עֲשִׂירִ֔י
    בֶּ/עָשׂ֥וֹר לַ/חֹ֖דֶשׁ לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me in the ninth year, in the tenth month,
    on the tenth day of the month, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says 'in the ninth year'; Ezekiel's dating system commonly
      refers to the years of King Jehoiachin's exile.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a narrative event formula. In English,
    the idiomatic prophetic formula is best carried by folding the verb into 'the
    word ... came' rather than the wooden 'it happened.' 'And' preserves the discourse
    linkage.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the formal and theological
    weight of divine speech better than the more interpretive 'message.' YHWH is rendered
    'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה,
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple directional preposition plus 1cs suffix; 'to me' is accurate and
    natural modern English.
- source_word: בַּשָּׁנָה הַתְּשִׁיעִית
  chosen: in the ninth year
  alternatives:
  - in the ninth year of exile
  lexicon: HALOT
  rationale: The Hebrew text here states only 'in the ninth year' without explicitly
    repeating the reference point. The translation should not import 'of exile' into
    the main text, though the broader Ezekiel dating system implies it.
- source_word: בַּחֹדֶשׁ הָעֲשִׂירִי
  chosen: in the tenth month
  alternatives:
  - in the tenth new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ in dating formulas is naturally 'month.' 'In the tenth month'
    matches standard English calendrical style.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: on the tenth day of the month
  alternatives:
  - on the tenth of the month
  lexicon: HALOT
  rationale: This idiom specifies the day within the month. 'On the tenth day of the
    month' is explicit and clear; 'on the tenth of the month' is possible but slightly
    less formal.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech. 'Saying,' is
    the standard and least interpretive rendering, especially since the speech continues
    in the next verse.
