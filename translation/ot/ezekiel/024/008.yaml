id: EZK.24.8
reference: Ezekiel 24:8
source:
  edition: WLC
  text: לְ/הַעֲל֤וֹת חֵמָה֙ לִ/נְקֹ֣ם נָקָ֔ם נָתַ֥תִּי אֶת דָּמָ֖/הּ עַל צְחִ֣יחַ
    סָ֑לַע לְ/בִלְתִּ֖י הִכָּסֽוֹת־־׃פ
translation:
  text: To stir up wrath, to take vengeance, I have set her blood on a bare rock,
    so that it would not be covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to avenge with vengeance'; the Hebrew uses an infinitive with a cognate
      noun for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Her blood'' may also carry the sense of ''her bloodshed'' or bloodguilt
      in context, but the Hebrew image is literally ''her blood.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַעֲלוֹת
  chosen: to stir up
  alternatives:
  - to bring up
  - to cause to rise
  lexicon: HALOT
  rationale: Hiphil infinitive of עלה here is idiomatic with חֵמָה, expressing the
    causing of wrath to arise rather than a literal upward movement. 'Stir up' is
    natural English and preserves the causative sense.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - rage
  - fury
  - heat
  lexicon: HALOT
  rationale: In prophetic judgment contexts חֵמָה commonly denotes intense anger or
    wrath. 'Wrath' best fits the judicial and divine-judgment setting.
- source_word: לִנְקֹם נָקָם
  chosen: to take vengeance
  alternatives:
  - to avenge
  - for vengeance
  lexicon: HALOT
  rationale: The infinitive plus cognate noun intensifies the verbal idea. 'To take
    vengeance' captures both the action and the emphatic force in idiomatic English.
- source_word: נָתַתִּי
  chosen: I have set
  alternatives:
  - I have placed
  - I gave
  lexicon: HALOT
  rationale: נתן often means 'give,' but with a locative complement ('on a bare rock')
    it means 'set/placed.' 'I have set' is concise and fits the image.
- source_word: דָּמָהּ
  chosen: her blood
  alternatives:
  - her bloodshed
  lexicon: HALOT
  rationale: The singular 'blood' is retained, matching the Hebrew form and preserving
    the concrete image. In context it can imply bloodguilt/bloodshed, but the text's
    imagery is better preserved by the literal rendering.
- source_word: צְחִיחַ סָלַע
  chosen: a bare rock
  alternatives:
  - a bare crag
  - a barren rock
  - a smooth rock
  lexicon: HALOT
  rationale: The phrase denotes an exposed, bare rock surface. 'Bare rock' is vivid,
    natural English and preserves the sense of blood left openly visible rather than
    absorbed or hidden.
- source_word: לְבִלְתִּי הִכָּסוֹת
  chosen: so that it would not be covered
  alternatives:
  - so that it might not be covered
  - without being covered
  lexicon: HALOT
  rationale: 'The construction expresses purpose/result: the blood is placed openly
    with the intent that it remain uncovered. ''So that it would not be covered''
    communicates this clearly in modern English.'
