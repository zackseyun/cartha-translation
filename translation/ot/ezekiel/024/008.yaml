theological_decisions:
- issue: Agency and judicial purpose in the shedding/exposure of blood
  chosen_reading: The speaker intentionally exposes Jerusalem's blood as an act leading
    to wrath and vengeance.
  alternative_readings:
  - The line could be read more generally as describing the blood's exposed state
    without emphasizing divine intentionality.
  rationale: The first-person verb נָתַתִּי ('I have set') and the paired infinitives
    of purpose ('to stir up wrath, to take vengeance') indicate deliberate judicial
    action by God in context. The translation preserves this without expanding beyond
    the verse.
