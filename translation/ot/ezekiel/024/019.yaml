id: EZK.24.19
reference: Ezekiel 24:19
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ אֵלַ֖/י הָ/עָ֑ם הֲ/לֹֽא תַגִּ֥יד לָ֨/נוּ֙ מָה אֵ֣לֶּה לָּ֔/נוּ
    כִּ֥י אַתָּ֖ה עֹשֶֽׂה־־׃
translation:
  text: And the people said to me, “Will you not tell us what these things mean for
    us, that you are doing them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'what are these to us, that you are doing [them]?' The Hebrew
      asks about the significance of Ezekiel's actions for the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in narrative sequence. 'And
    ... said' preserves Hebrew narrative flow in natural English.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct prepositional object marking speech directed toward Ezekiel.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם with article refers collectively to the people present. 'The people'
    is the standard, natural collective rendering.
- source_word: הֲלֹא
  chosen: Will ... not
  alternatives:
  - Are you not going to
  - Surely you will
  lexicon: HALOT
  rationale: Interrogative particle with negation introduces a question expecting
    a response. 'Will you not' best preserves the rhetorical force without overinterpreting
    tone.
- source_word: תַגִּיד
  chosen: tell
  alternatives:
  - declare
  - make known
  lexicon: HALOT
  rationale: Hiphil of נגד means to tell or make known. 'Tell' is idiomatic in direct
    speech and fits the following indirect question.
- source_word: לָנוּ
  chosen: us
  lexicon: HALOT
  rationale: First occurrence marks the indirect object of 'tell'.
- source_word: מָה אֵלֶּה לָּנוּ
  chosen: what these things mean for us
  alternatives:
  - what these things are to us
  - what these things concern for us
  lexicon: HALOT
  rationale: The Hebrew is somewhat elliptical, literally 'what these [are] to us.'
    In context the people ask for the significance of Ezekiel's symbolic actions.
    'What these things mean for us' conveys the idiomatic sense while staying close
    to the source.
- source_word: כִּי
  chosen: that
  alternatives:
  - since
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the clause explaining the referent of 'these things'—namely,
    the actions Ezekiel is performing. 'That' works naturally in English after 'what
    these things mean for us.'
- source_word: אַתָּה עֹשֶׂה
  chosen: you are doing them
  alternatives:
  - you are doing
  - you do
  lexicon: HALOT
  rationale: Qal participle of עשה expresses ongoing action. English requires an object
    for clarity because 'these things' is the antecedent; 'them' is supplied naturally
    from context.
