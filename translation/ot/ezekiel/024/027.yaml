id: EZK.24.27
reference: Ezekiel 24:27
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִפָּ֤תַח פִּ֨י/ךָ֙ אֶת הַ/פָּלִ֔יט וּ/תְדַבֵּ֕ר וְ/לֹ֥א תֵֽאָלֵ֖ם ע֑וֹד וְ/הָיִ֤יתָ לָ/הֶם֙ לְ/מוֹפֵ֔ת וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־־׃ס
translation:
  text: On that day your mouth will be opened when the fugitive comes to you, and you will speak and no longer be mute. So you will be a sign to them, and they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the survivor'; the Hebrew phrase is difficult, and may refer to the time when the fugitive arrives with news.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is natural modern English and preserves the prophetic time reference without unnecessary archaism.
- source_word: יִפָּתַח פִּיךָ
  chosen: your mouth will be opened
  alternatives:
  - your mouth shall be opened
  lexicon: HALOT
  rationale: The Niphal of פתח is passive/reflexive here. Rendering the idiom literally preserves the connection to Ezekiel's imposed muteness and its reversal.
- source_word: אֶת הַפָּלִיט
  chosen: with the fugitive
  alternatives:
  - to the fugitive
  - when the fugitive comes
  - with the survivor
  lexicon: HALOT
  rationale: The direct-object marker אֶת before 'the fugitive' is syntactically difficult in English. In context, this refers to the escaped messenger who arrives with news of Jerusalem's fall (cf. 24:26; 33:21-22). 'With the fugitive' preserves the likely sense that Ezekiel's mouth is opened in connection with that person's arrival, while avoiding over-paraphrase. 'Survivor' is possible, but 'fugitive' better reflects the lexical force of פליט as one who has escaped.
- source_word: וּתְדַבֵּר
  chosen: and you will speak
  alternatives:
  - and you shall speak
  lexicon: HALOT
  rationale: Simple future sense fits the sequence of restoration from muteness to speech.
- source_word: וְלֹא תֵאָלֵם עוֹד
  chosen: and no longer be mute
  alternatives:
  - and not be silent anymore
  - and no longer be speechless
  lexicon: HALOT
  rationale: אלם in the Niphal denotes being mute or unable to speak, not merely choosing silence. 'Mute' best preserves the specific condition described earlier in Ezekiel.
- source_word: וְהָיִיתָ לָהֶם לְמוֹפֵת
  chosen: So you will be a sign to them
  alternatives:
  - and you will be a sign to them
  - and you will be a portent to them
  lexicon: HALOT
  rationale: מוֹפֵת can mean sign, portent, or wonder. In Ezekiel it often denotes a symbolic sign-act. 'Sign' is clear and sufficiently broad; 'portent' is possible but less natural in contemporary English. 'So' brings out the resultative force in context.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  chosen: and they will know that I am the LORD
  alternatives:
  - and they shall know that I am the LORD
  lexicon: HALOT
  rationale: This is a recurring Ezekiel formula. Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
