theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of Ezekiel's restored speech
  chosen_reading: literal restoration from prophetic muteness tied to the fugitive's arrival
  alternative_readings:
  - general end of silence without reference to the fugitive
  - purely metaphorical empowerment to speak
  rationale: The verse completes the earlier sign of Ezekiel's muteness and links its end to the arrival of the fugitive with news. The translation preserves that narrative-theological connection without over-interpreting the mechanics.
