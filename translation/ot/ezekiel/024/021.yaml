id: EZK.24.21
reference: Ezekiel 24:21
source:
  edition: WLC
  text: אֱמֹ֣ר לְ/בֵ֣ית יִשְׂרָאֵ֗ל כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ הִנְ/נִ֨י מְחַלֵּ֤ל אֶת מִקְדָּשִׁ/י֙ גְּא֣וֹן עֻזְּ/כֶ֔ם מַחְמַ֥ד עֵֽינֵי/כֶ֖ם וּ/מַחְמַ֣ל נַפְשְׁ/כֶ֑ם וּ/בְנֵי/כֶ֧ם וּ/בְנֽוֹתֵי/כֶ֛ם אֲשֶׁ֥ר עֲזַבְתֶּ֖ם בַּ/חֶ֥רֶב יִפֹּֽלוּ׀־־׃
translation:
  text: 'Say to the house of Israel, ‘Thus says the Lord GOD: Behold, I am about to profane my sanctuary, the pride of your strength, the delight of your eyes, and the desire of your soul; and your sons and your daughters whom you left behind will fall by the sword.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defile' or 'desecrate' my sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'the desire of your eyes' for 'the delight of your eyes.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression may also be understood as 'that which your soul pities/cherishes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative singular to Ezekiel introducing a prophetic message. 'Say' is the natural English equivalent in this formulaic context.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - to Israel
  lexicon: HALOT
  rationale: Retains the covenantal/collective expression 'house of Israel' rather than flattening it to 'Israel.'
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord Yahweh
  - This is what the Lord GOD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'Lord GOD' is the conventional and clear English rendering.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I am
  - Look, I am
  lexicon: HALOT
  rationale: The particle marks solemn divine self-announcement. In context with the participle מְחַלֵּל, 'I am about to' conveys imminent action in idiomatic English while preserving the force of the Hebrew construction.
- source_word: מְחַלֵּל
  chosen: profane
  alternatives:
  - defile
  - desecrate
  lexicon: HALOT
  rationale: From חלל in the piel, meaning to treat as common/profane. 'Profane' best preserves the cultic and theological force; 'defile' is possible but less precise here.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes the sanctuary/holy place. 'My sanctuary' is broader and more textually exact than 'my temple,' though the Jerusalem temple is in view.
- source_word: גְּאוֹן עֻזְּכֶם
  chosen: the pride of your strength
  alternatives:
  - the glory of your power
  - your mighty pride
  lexicon: HALOT
  rationale: A construct chain describing the sanctuary as the object of Israel's proud confidence. 'Pride of your strength' is a close and intelligible rendering.
- source_word: מַחְמַד עֵינֵיכֶם
  chosen: the delight of your eyes
  alternatives:
  - the desire of your eyes
  - the precious thing of your eyes
  lexicon: HALOT
  rationale: Echoes the diction of Ezekiel 24:16. 'Delight of your eyes' is idiomatic and preserves the emotional value attached to the sanctuary.
- source_word: וּמַחְמַל נַפְשְׁכֶם
  chosen: the desire of your soul
  alternatives:
  - that for which your soul has pity
  - the compassion of your soul
  - the longing of your soul
  lexicon: HALOT
  rationale: The noun is rare and related to sparing/compassion, but in this parallel sequence it denotes what the inner self cherishes. 'Desire of your soul' is the most natural concise rendering, while preserving the affective sense.
- source_word: וּבְנֵיכֶם וּבְנוֹתֵיכֶם
  chosen: your sons and your daughters
  alternatives:
  - your children
  lexicon: HALOT
  rationale: Keeps the explicit gendered pair present in the Hebrew rather than generalizing to 'children,' in line with gender-accurate translation philosophy.
- source_word: אֲשֶׁר עֲזַבְתֶּם
  chosen: whom you left behind
  alternatives:
  - whom you left
  - whom you abandoned
  lexicon: HALOT
  rationale: The verb means leave/forsake. 'Left behind' fits the wartime/displacement context and clarifies that these sons and daughters remained in Jerusalem.
- source_word: בַּחֶרֶב יִפֹּלוּ
  chosen: will fall by the sword
  alternatives:
  - will die by the sword
  - will fall in battle
  lexicon: HALOT
  rationale: A common Hebrew idiom for violent death in war. 'Fall by the sword' preserves the idiom and prophetic register.
