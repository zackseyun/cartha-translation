id: EZK.24.12
reference: Ezekiel 24:12
source:
  edition: WLC
  text: תְּאֻנִ֖ים הֶלְאָ֑ת וְ/לֹֽא תֵצֵ֤א מִמֶּ֨/נָּה֙ רַבַּ֣ת חֶלְאָתָ֔/הּ בְּ/אֵ֖שׁ
    חֶלְאָתָֽ/הּ־׃
translation:
  text: With toil she has wearied herself, yet her abundant corrosion does not go
    out from her; her corrosion remains in the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rust' or 'scum' for 'corrosion.' The Hebrew term denotes the encrusted
      impurity of the pot in Ezekiel's metaphor.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew is elliptical at the end: literally, ''in the fire her corrosion.''
      The translation supplies ''remains'' for clear English sense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּאֻנִים
  chosen: With toil
  alternatives:
  - With efforts
  - With labors
  - In vain labor
  lexicon: HALOT
  rationale: The plural noun denotes exertions/labors. Rendered adverbially with 'With
    toil' to make idiomatic sense in English while preserving the sense of strenuous
    effort invested in the pot-cleansing image.
- source_word: הֶלְאָת
  chosen: she has wearied herself
  alternatives:
  - you have wearied
  - it has wearied
  - she is exhausted
  lexicon: HALOT
  rationale: 'From לאה, ''to be weary/to weary.'' The 3fs form matches the feminine
    subject (the pot/city personified). ''She has wearied herself'' captures reflexive/resultative
    force in context: all the effort has exhausted her.'
- source_word: וְלֹא תֵצֵא מִמֶּנָּה
  chosen: yet ... does not go out from her
  alternatives:
  - but ... does not come out of her
  - but ... cannot be removed from her
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' Kept close to the Hebrew image
    rather than paraphrasing fully as 'be removed,' though that sense is implied by
    the context of impurity not leaving the pot.
- source_word: רַבַּת
  chosen: abundant
  alternatives:
  - great
  - much
  - thick
  lexicon: HALOT
  rationale: Adjectival form from רבב/רב, indicating magnitude. 'Abundant' fits the
    mass/extent of the impurity better than the more generic 'great' in English.
- source_word: חֶלְאָתָהּ
  chosen: corrosion
  alternatives:
  - rust
  - filth
  - scum
  lexicon: HALOT
  rationale: The noun refers to the corroded impurity/encrustation in the cauldron
    metaphor. 'Corrosion' preserves the metal-vessel imagery more precisely than 'filth,'
    while avoiding overcommitting to 'rust' if the term includes broader encrusted
    uncleanness.
- source_word: בְּאֵשׁ
  chosen: in the fire
  alternatives:
  - by fire
  - into the fire
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' here, describing the continuing
    presence of the corrosion even under burning. 'In the fire' best preserves the
    image.
- source_word: חֶלְאָתָהּ
  chosen: her corrosion remains
  alternatives:
  - her corrosion
  - its rust
  - its filth
  lexicon: HALOT
  rationale: 'The final repeated noun is rendered with an implied verb in English
    (''remains'') because the Hebrew is elliptical. This makes the clause intelligible
    while preserving the emphatic repetition: even fire does not purge it.'
