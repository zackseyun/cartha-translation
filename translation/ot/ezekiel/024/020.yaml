id: EZK.24.20
reference: Ezekiel 24:20
source:
  edition: WLC
  text: וָ/אֹמַ֖ר אֲלֵי/הֶ֑ם דְּבַ֨ר יְהוָ֔ה הָיָ֥ה אֵלַ֖/י לֵ/אמֹֽר־׃
translation:
  text: So I said to them, “The word of Yahweh came to me, saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “And I said to them, ‘The word of the LORD was to me, saying,’”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: So I said
  alternatives:
  - And I said
  - Then I said
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of אמר introduces the next speech in sequence. English 'So I said' preserves narrative progression naturally; 'And I said' is more formally possible, and 'Then I said' is also viable.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - to them all
  lexicon: HALOT
  rationale: Preposition אֶל with 3mp suffix straightforwardly indicates indirect object plural, referring to the people who had asked him.
- source_word: דְּבַר יְהוָה
  chosen: The word of the LORD
  alternatives:
  - The message of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Word' preserves the idiom and intertextual consistency better than the more interpretive 'message.' YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'was,' in the formula 'the word of the LORD was/came to me' idiomatic English prefers 'came to me.' This reflects common prophetic usage without adding content.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple prepositional phrase marking recipient of the divine word.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: Infinitive construct of אמר used as quotation introducer. 'Saying' is the most direct and least interpretive rendering, preserving the formal prophetic style.
