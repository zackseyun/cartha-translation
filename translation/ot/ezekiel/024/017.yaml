theological_decisions:
- issue: Rendering mourning customs without over-interpreting ritual significance
  chosen_reading: Translate the commands as prohibitions against customary mourning
    acts, without importing later doctrinal or ritual explanations into the main text.
  alternative_readings:
  - Interpret specific actions as priestly regulations
  - Interpret them as general signs of impurity only
  rationale: The verse lists concrete mourning practices Ezekiel is forbidden to perform.
    The text itself emphasizes sign-act symbolism rather than a developed theological
    rationale for each custom, so the translation remains descriptive.
  doctrine_reference: Translation philosophy items 1 and 3
