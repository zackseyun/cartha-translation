id: EZK.24.17
reference: Ezekiel 24:17
source:
  edition: WLC
  text: הֵאָנֵ֣ק דֹּ֗ם מֵתִים֙ אֵ֣בֶל לֹֽא תַֽעֲשֶׂ֔ה פְאֵֽרְ/ךָ֙ חֲב֣וֹשׁ עָלֶ֔י/ךָ
    וּ/נְעָלֶ֖י/ךָ תָּשִׂ֣ים בְּ/רַגְלֶ֑י/ךָ וְ/לֹ֤א תַעְטֶה֙ עַל שָׂפָ֔ם וְ/לֶ֥חֶם
    אֲנָשִׁ֖ים לֹ֥א תֹאכֵֽל׀־־׃
translation:
  text: Groan silently; do not make mourning for the dead. Bind your turban on yourself,
    and put your sandals on your feet. Do not cover over your mustache, and do not
    eat the bread of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not cover your upper lip.' The Hebrew expression may refer specifically
      to the upper lip area rather than the mustache as facial hair.
    reason: lexical_alternative
  - marker: b
    text: '''The bread of men'' likely refers to food provided by others for mourners,
      that is, mourners'' bread.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵאָנֵק
  chosen: Groan
  alternatives:
  - Sigh
  - Moan
  lexicon: HALOT
  rationale: Imperative from אנק denotes an audible expression of grief or pain. 'Groan'
    best preserves the emotional weight without over-specifying volume or duration.
- source_word: דֹּם
  chosen: silently
  alternatives:
  - in silence
  - quietly
  lexicon: HALOT
  rationale: 'Imperative/adverbial use from דמם conveys silence or stillness. ''Silently''
    fits natural English with the preceding imperative: ''Groan silently.'''
- source_word: מֵתִים אֵבֶל לֹא תַעֲשֶׂה
  chosen: do not make mourning for the dead
  alternatives:
  - do not observe mourning for the dead
  - do not perform mourning for the dead
  lexicon: HALOT
  rationale: The idiom עשה אבל means to engage in mourning rites. 'Make mourning'
    is slightly literal but still understandable and preserves the ritual/action sense
    of the Hebrew.
- source_word: פְאֵרְךָ
  chosen: your turban
  alternatives:
  - your headdress
  - your headband
  lexicon: HALOT
  rationale: פְאֵר can denote an ornamental head covering, especially one associated
    with dignity rather than mourning. 'Turban' is the most idiomatic rendering in
    many prophetic contexts and suits the contrast with mourning customs.
- source_word: חֲבוֹשׁ עָלֶיךָ
  chosen: Bind ... on yourself
  alternatives:
  - wrap ... on yourself
  - put ... on
  lexicon: HALOT
  rationale: The verb חבש means to bind or wrap on. 'Bind your turban on yourself'
    preserves the physical action and the reflexive sense of wearing it.
- source_word: וּנְעָלֶיךָ תָּשִׂים בְּרַגְלֶיךָ
  chosen: put your sandals on your feet
  alternatives:
  - wear your sandals on your feet
  lexicon: HALOT
  rationale: A straightforward instruction not to adopt barefoot mourning practice.
    'Put your sandals on your feet' is clear and close to the Hebrew wording.
- source_word: וְלֹא תַעְטֶה עַל שָׂפָם
  chosen: Do not cover over your mustache
  alternatives:
  - Do not cover your upper lip
  - Do not veil the lower part of your face
  lexicon: HALOT
  rationale: The idiom likely refers to covering the upper lip/mustache area as a
    mourning or uncleanness gesture. 'Mustache' is a conventional rendering of שָׂפָם,
    while the alternative 'upper lip' is lexically possible and worth preserving.
- source_word: וְלֶחֶם אֲנָשִׁים לֹא תֹאכֵל
  chosen: do not eat the bread of men
  alternatives:
  - do not eat the bread brought by men
  - do not eat the mourners' bread
  lexicon: HALOT
  rationale: The phrase likely refers to food provided by others in mourning contexts,
    but the Hebrew is compact. The main text keeps the literal expression 'bread of
    men' for auditability, while a clarifying alternative is preserved in a footnote.
