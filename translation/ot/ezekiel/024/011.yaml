id: EZK.24.11
reference: Ezekiel 24:11
source:
  edition: WLC
  text: וְ/הַעֲמִידֶ֥/הָ עַל גֶּחָלֶ֖י/הָ רֵקָ֑ה לְמַ֨עַן תֵּחַ֜ם וְ/חָ֣רָה נְחֻשְׁתָּ֗/הּ
    וְ/נִתְּכָ֤ה בְ/תוֹכָ/הּ֙ טֻמְאָתָ֔/הּ תִּתֻּ֖ם חֶלְאָתָֽ/הּ־׃
translation:
  text: Then set it empty on its coals, so that it may become hot and its bronze may
    glow, and its uncleanness within it may be melted, and its corrosion consumed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its rust' or 'its scum.' The Hebrew term can refer to corrosion on metal
      and, by extension in this context, the foul residue representing Jerusalem's
      moral defilement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲמִידֶהָ
  chosen: Then set it
  alternatives:
  - and set it
  - and place it
  lexicon: HALOT
  rationale: Hiphil imperative/jussive force from עמד with 3fs suffix refers to the
    pot/cauldron. English imperative 'set it' is natural and sufficiently direct;
    'Then' captures the sequential waw in context.
- source_word: עַל גֶּחָלֶיהָ
  chosen: on its coals
  alternatives:
  - upon its coals
  - on its embers
  lexicon: HALOT
  rationale: גחלים are burning coals/embers. 'Coals' is the more standard and concrete
    rendering here, with the 3fs suffix referring to the fire source associated with
    the pot.
- source_word: רֵקָה
  chosen: empty
  alternatives:
  - bare
  - emptied
  lexicon: HALOT
  rationale: Adjective meaning empty/void, describing the pot after contents are removed.
    'Empty' is the clearest modern English equivalent.
- source_word: לְמַעַן תֵּחַם
  chosen: so that it may become hot
  alternatives:
  - so that it may be heated
  - in order that it may grow hot
  lexicon: HALOT
  rationale: 'Purpose clause with חם in qal: the vessel is to be heated intensely.
    ''Become hot'' is idiomatic and preserves the process.'
- source_word: וְחָרָה נְחֻשְׁתָּהּ
  chosen: and its bronze may glow
  alternatives:
  - and its bronze may become hot
  - and its bronze may burn
  lexicon: HALOT
  rationale: חרה conveys burning/being kindled. Since the subject is the bronze of
    the pot, 'glow' communicates heated metal more precisely than 'burn,' which could
    mislead literally.
- source_word: נְחֻשְׁתָּהּ
  chosen: its bronze
  alternatives:
  - its copper
  - its metal
  lexicon: HALOT
  rationale: נחשת commonly denotes bronze/copper depending on context. For a cooking
    vessel, 'bronze' is the conventional and likely material term in English Bible
    style.
- source_word: וְנִתְּכָה
  chosen: may be melted
  alternatives:
  - be liquefied
  - be poured out
  lexicon: HALOT
  rationale: From נתך in the sense of melting/pouring out. Here the image is of impurity
    being melted out by heat, so 'may be melted' best fits the metallurgical metaphor.
- source_word: בְּתוֹכָהּ טֻמְאָתָהּ
  chosen: its uncleanness within it
  alternatives:
  - its impurity in it
  - the uncleanness inside it
  lexicon: HALOT
  rationale: טֻמְאָה is impurity/uncleanness. In Ezekiel's prophetic idiom, 'uncleanness'
    preserves the moral-ritual force better than the more generic 'impurity.'
- source_word: תִּתֻּם
  chosen: consumed
  alternatives:
  - finished off
  - come to an end
  lexicon: HALOT
  rationale: תם in this form conveys being completed/finished/used up. With the residue/scum
    as subject, 'consumed' fits the refining image and reads naturally in English.
- source_word: חֶלְאָתָהּ
  chosen: its corrosion
  alternatives:
  - its rust
  - its filth
  - its scum
  lexicon: HALOT
  rationale: The term denotes rust, corrosion, or figuratively filth/scum on the pot.
    Because the verse intensifies the image through heating the bronze vessel itself,
    'corrosion' best preserves the metal-refining metaphor while still implying moral
    defilement in context.
