theological_decisions:
- issue: Rendering the impurity imagery in a way that preserves both literal vessel
    language and symbolic moral judgment
  chosen_reading: Use concrete metallurgical language ('bronze,' 'melted,' 'corrosion')
    while retaining morally charged 'uncleanness'
  alternative_readings:
  - Use more purely culinary language such as 'scum' throughout
  - Use more abstract moral language such as 'guilt' or 'sin'
  rationale: 'The Hebrew presents an enacted parable: a literal pot is heated until
    its defilement is removed, symbolizing Jerusalem''s entrenched impurity. The translation
    should not collapse the image into either mere cookware maintenance or abstract
    theology. Keeping both ''uncleanness'' and metal/pot imagery preserves the prophetic
    tension.'
  doctrine_reference: Translation philosophy §3, §5
