id: EZK.24.22
reference: Ezekiel 24:22
source:
  edition: WLC
  text: וַ/עֲשִׂיתֶ֖ם כַּ/אֲשֶׁ֣ר עָשִׂ֑יתִי עַל שָׂפָם֙ לֹ֣א תַעְט֔וּ וְ/לֶ֥חֶם אֲנָשִׁ֖ים
    לֹ֥א תֹאכֵֽלוּ־׃
translation:
  text: 'And you will do as I have done: you will not cover over your mustache, and
    you will not eat the bread of men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the mourner's bread,' that is, food brought by other people
      to comfort those in mourning.
    reason: lexical_alternative
  - marker: b
    text: Covering the mustache or upper lip was a customary sign of mourning or uncleanness.
    reason: cultural_note
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  chosen: And you will do
  alternatives:
  - And you shall do
  - And you did
  lexicon: HALOT
  rationale: The form continues the prophetic prediction/instruction in context, best
    rendered as future in English. 'And' preserves the waw linkage. 'Shall' is possible
    but less natural in modern English.
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  chosen: as I have done
  alternatives:
  - just as I did
  lexicon: HALOT
  rationale: This compares the people's coming behavior with Ezekiel's enacted behavior.
    Present perfect in English naturally links the prior sign-act to the future imitation.
- source_word: עַל שָׂפָם
  chosen: over your mustache
  alternatives:
  - over the upper lip
  - over your lips
  lexicon: HALOT
  rationale: שָׂפָם refers to the upper lip/mustache area in mourning contexts. 'Mustache'
    is the most idiomatic concise rendering in English, while 'over' reflects עַל.
    The phrase refers to covering that part of the face as a mourning custom.
- source_word: לֹא תַעְטוּ
  chosen: you will not cover
  alternatives:
  - you shall not wrap
  - you will not veil
  lexicon: HALOT
  rationale: The verb means to cover or wrap oneself. In this mourning-custom context,
    'cover' is the clearest English equivalent without overinterpreting the exact
    garment or motion.
- source_word: לֶחֶם אֲנָשִׁים
  chosen: the bread of men
  alternatives:
  - mourner's bread
  - food from others
  - the bread of people
  lexicon: HALOT
  rationale: Literally the phrase is 'bread of men/people,' commonly understood as
    food provided by others to mourners. To avoid importing more interpretation than
    the Hebrew explicitly states, the main text keeps the literal expression, while
    a footnote preserves the idiomatic sense.
- source_word: לֹא תֹאכֵלוּ
  chosen: you will not eat
  alternatives:
  - you shall not eat
  lexicon: HALOT
  rationale: Future rendering fits the predictive force of the verse in context and
    keeps the parallel structure with the preceding clause.
