id: EZK.24.23
reference: Ezekiel 24:23
source:
  edition: WLC
  text: וּ/פְאֵרֵ/כֶ֣ם עַל רָאשֵׁי/כֶ֗ם וְ/נַֽעֲלֵי/כֶם֙ בְּ/רַגְלֵי/כֶ֔ם לֹ֥א תִסְפְּד֖וּ
    וְ/לֹ֣א תִבְכּ֑וּ וּ/נְמַקֹּתֶם֙ בַּ/עֲוֺנֹ֣תֵי/כֶ֔ם וּ/נְהַמְתֶּ֖ם אִ֥ישׁ אֶל
    אָחִֽי/ו־־׃
translation:
  text: Your turban[s] will be on your heads and your sandals on your feet; you will
    not mourn and you will not weep, but you will waste away in your iniquities and
    groan, each man to his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your headdresses' or 'your finery'; the Hebrew term refers to an ornamental
      head covering, likely a turban in this mourning context.
    reason: lexical_alternative
  - marker: b
    text: '''In your iniquities'' may also be understood as ''because of your iniquities''
      or, by extension of the Hebrew term, ''in your guilt.'''
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''each man to his brother.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פְאֵרֵיכֶם
  chosen: your turban[s]
  alternatives:
  - your headdresses
  - your finery
  lexicon: HALOT
  rationale: פְאֵר can denote an ornamental headpiece or turban, especially in contexts
    of mourning customs. Here, paired with 'on your heads' and contrasted with mourning
    behavior, it most naturally refers to headwear kept on rather than removed. Bracketed
    plural reflects English uncertainty between collective and distributive expression;
    the Hebrew is plural.
- source_word: נַעֲלֵיכֶם
  chosen: your sandals
  alternatives:
  - your shoes
  lexicon: HALOT
  rationale: The common Hebrew term for footwear is best rendered 'sandals' in an
    ancient Israelite setting; 'shoes' is possible but less culturally specific.
- source_word: תִסְפְּדוּ
  chosen: mourn
  alternatives:
  - lament
  lexicon: HALOT
  rationale: The verb ספד often refers to formal mourning or lamentation for the dead.
    'Mourn' is natural English and fits the prohibition of customary bereavement rites.
- source_word: תִבְכּוּ
  chosen: weep
  alternatives:
  - cry
  lexicon: HALOT
  rationale: A straightforward rendering of בכה. 'Weep' preserves the solemn register
    better than 'cry'.
- source_word: נְמַקֹּתֶם
  chosen: you will waste away
  alternatives:
  - you will rot away
  - you will pine away
  lexicon: HALOT
  rationale: From מקק, conveying wasting, decaying, or pining away. 'Waste away' communicates
    the figurative sense of inward collapse under judgment without sounding overly
    graphic.
- source_word: בַּעֲוֺנֹתֵיכֶם
  chosen: in your iniquities
  alternatives:
  - because of your iniquities
  - in your guilt
  lexicon: HALOT
  rationale: עָוֹן can mean iniquity, guilt, or punishment for iniquity. The preposition
    ב here is retained as 'in' to preserve the Hebrew's compact expression of their
    condition under sin and judgment, rather than over-interpreting it causally.
- source_word: נְהַמְתֶּם
  chosen: groan
  alternatives:
  - moan
  - murmur
  lexicon: HALOT
  rationale: The verb נהם denotes a low sound of distress or anguish. 'Groan' best
    fits the context of suppressed grief and judgment.
- source_word: אִישׁ אֶל אָחִיו
  chosen: each man to his brother
  alternatives:
  - each one to his brother
  - one to another
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular plus 'his brother.' Following
    the project's gender-accurate policy, the translation preserves the male-marked
    wording rather than neutralizing it to 'one another.'
