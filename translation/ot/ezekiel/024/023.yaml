theological_decisions:
- issue: Gendered relational language
  chosen_reading: each man to his brother
  alternative_readings:
  - one to another
  - each one to another
  rationale: The source text uses masculine singular nouns and a kinship term. Per
    translation philosophy, gender-accurate rendering is preferred over gender-neutral
    smoothing unless context clearly demands generic neutralization.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Meaning of עָוֹן in judgment context
  chosen_reading: iniquities
  alternative_readings:
  - guilt
  - punishment for iniquity
  rationale: The Hebrew term can include both the sin and its culpability/consequence.
    Here the main text keeps 'iniquities' to avoid importing a more interpretive gloss,
    while the semantic range is preserved in documentation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 5
