theological_decisions:
- issue: Interpretation of exposed blood imagery
  chosen_reading: Retain the concrete image of blood left uncovered as a sign of public
    guilt and defilement, without making the metaphor more explicit in the main text.
  alternative_readings:
  - Translate more interpretively as 'bloodguilt' or 'bloodshed' throughout
  rationale: 'The verse''s theology is carried by the image itself: Jerusalem''s violence
    is not concealed but openly displayed before God. Preserving the literal imagery
    avoids importing explanatory language beyond what the Hebrew states while still
    allowing the moral force to emerge from context.'
  doctrine_reference: Translation philosophy §§1, 3, 6
