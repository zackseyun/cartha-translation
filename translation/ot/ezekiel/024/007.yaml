id: EZK.24.7
reference: Ezekiel 24:7
source:
  edition: WLC
  text: כִּ֤י דָמָ/הּ֙ בְּ/תוֹכָ֣/הּ הָיָ֔ה עַל צְחִ֥יחַ סֶ֖לַע שָׂמָ֑תְ/הוּ לֹ֤א
    שְׁפָכַ֨תְ/הוּ֙ עַל הָ/אָ֔רֶץ לְ/כַסּ֥וֹת עָלָ֖י/ו עָפָֽר־־׃
translation:
  text: For her blood is in her midst; she set it on a bare rock. She did not pour
    it out on the ground to cover it with dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her bloodguilt'; the Hebrew literally says 'her blood,' using the concrete
      image to express violent guilt.
    reason: lexical_alternative
  - marker: b
    text: Covering blood with earth alludes to the duty not to leave shed blood exposed;
      here the blood is left openly visible on bare rock.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding judgment imagery. 'For'
    fits the causal/explanatory force in context better than the more emphatic 'indeed'.
- source_word: דָמָהּ
  chosen: her blood
  alternatives:
  - her bloodguilt
  - her bloodshed
  lexicon: HALOT
  rationale: The noun is literally 'blood' with 3fs suffix. In context it points to
    bloodshed/guilt, but the concrete image of exposed blood is central to the metaphor,
    so the literal 'her blood' is retained.
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - inside her
  lexicon: HALOT
  rationale: A fairly formal rendering that preserves the locative sense and the corporate/city
    imagery of Jerusalem.
- source_word: הָיָה
  chosen: is
  alternatives:
  - was
  lexicon: HALOT
  rationale: Although morphologically perfect, Hebrew perfect here functions statively
    in prophetic discourse. Present tense in English best conveys the vivid explanatory
    statement.
- source_word: עַל צְחִיחַ סֶלַע
  chosen: on a bare rock
  alternatives:
  - on a bare crag
  - on a shining rock
  - on a barren rock
  lexicon: HALOT
  rationale: צְחִיחַ denotes a bare, exposed surface; סֶלַע is rock/crag. 'Bare rock'
    is natural English and preserves the image of blood left fully exposed rather
    than absorbed into soil.
- source_word: שָׂמָתְהוּ
  chosen: she set it
  alternatives:
  - she placed it
  - she put it
  lexicon: HALOT
  rationale: Simple, direct rendering of שׂים with object suffix. 'Set' works idiomatically
    with the following prepositional phrase.
- source_word: לֹא שְׁפָכַתְהוּ
  chosen: She did not pour it out
  alternatives:
  - she did not spill it
  - she did not shed it
  lexicon: HALOT
  rationale: שׁפך commonly means 'pour out.' 'Shed' could suggest the act of killing,
    but here the focus is on disposal/exposure of blood, so 'pour it out' better matches
    the imagery.
- source_word: עַל הָאָרֶץ
  chosen: on the ground
  alternatives:
  - on the earth
  - upon the land
  lexicon: HALOT
  rationale: In this immediate physical image, 'ground' is more idiomatic and concrete
    than 'earth' or 'land.'
- source_word: לְכַסּוֹת עָלָיו עָפָר
  chosen: to cover it with dust
  alternatives:
  - to cover it with earth
  - to hide it with soil
  lexicon: HALOT
  rationale: This reflects the ancient practice/allusion of covering spilled blood
    with earth. 'Dust' is a natural rendering of עָפָר and preserves the vividness
    of the image.
