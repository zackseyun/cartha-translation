id: EZK.24.18
reference: Ezekiel 24:18
source:
  edition: WLC
  text: וָ/אֲדַבֵּ֤ר אֶל הָ/עָם֙ בַּ/בֹּ֔קֶר וַ/תָּ֥מָת אִשְׁתִּ֖/י בָּ/עָ֑רֶב וָ/אַ֥עַשׂ
    בַּ/בֹּ֖קֶר כַּ/אֲשֶׁ֥ר צֻוֵּֽיתִי־׃
translation:
  text: So I spoke to the people in the morning, and my wife died in the evening.
    Then in the morning I did as I had been commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And I spoke to the people in the morning ... and in the morning I did
      as I was commanded.' The Hebrew narrative uses repeated waw-linked verbs; the
      translation smooths them into natural English while preserving the sequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲדַבֵּר
  chosen: So I spoke
  alternatives:
  - And I spoke
  - I spoke
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So I spoke' captures the
    sequential/resultative flow in readable English without over-literal repetition
    of 'and.'
- source_word: אֶל הָעָם
  chosen: to the people
  alternatives:
  - to the people group
  - to the populace
  lexicon: HALOT
  rationale: עָם commonly means 'people' in a collective sense. With אֶל, 'to the
    people' is the natural English rendering.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - that morning
  - in the morning time
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the time of Ezekiel's speaking.
    'In the morning' is idiomatic and sufficiently precise.
- source_word: וַתָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: מות is the ordinary verb 'to die.' 'Died' is direct and avoids softening
    the text beyond the Hebrew.
- source_word: אִשְׁתִּי
  chosen: my wife
  alternatives:
  - my woman
  lexicon: HALOT
  rationale: The construct with 1cs suffix clearly means 'my wife.' This is the standard
    contextual sense of אִשָּׁה in marital reference.
- source_word: בָּעָרֶב
  chosen: in the evening
  alternatives:
  - that evening
  - at evening
  lexicon: HALOT
  rationale: Temporal phrase parallel to 'in the morning.' 'In the evening' preserves
    the narrative timing clearly.
- source_word: וָאַעַשׂ
  chosen: Then ... I did
  alternatives:
  - And I did
  - So I did
  lexicon: HALOT
  rationale: עשה here is broad and refers to carrying out the commanded action. 'Then
    ... I did' reflects sequence and keeps the implied object general, to be specified
    by the following clause.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison/conformity with the command. 'As' is concise and
    natural.
- source_word: צֻוֵּיתִי
  chosen: I had been commanded
  alternatives:
  - I was commanded
  - I had been instructed
  lexicon: HALOT
  rationale: 'The passive form indicates Ezekiel as recipient of a command. English
    past perfect fits the sequence: the command preceded the action performed the
    next morning.'
