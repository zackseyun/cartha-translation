id: EZK.24.2
reference: Ezekiel 24:2
source:
  edition: WLC
  text: בֶּן אָדָ֗ם כתוב לְ/ךָ֙ אֶת שֵׁ֣ם הַ/יּ֔וֹם אֶת עֶ֖צֶם הַ/יּ֣וֹם הַ/זֶּ֑ה
    סָמַ֤ךְ מֶֽלֶךְ בָּבֶל֙ אֶל יְר֣וּשָׁלִַ֔ם בְּ/עֶ֖צֶם הַ/יּ֥וֹם הַ/זֶּֽה־־־־־־׃
translation:
  text: 'Son of man, write down for yourself the name of the day, this very day: the
    king of Babylon has laid siege against Jerusalem on this very day.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'write down the date.' Literally, 'write for yourself
      the name of the day.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says literally, 'this very day' / 'on this very day,' repeating
      the phrase for emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or, 'has come against Jerusalem.' The Hebrew verb here is rendered in context
      as the beginning of the Babylonian siege.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional and contextually fitting address to Ezekiel; preserves the
    Hebrew idiom with its representative-human force rather than flattening it to
    a generic paraphrase.
- source_word: כתוב לְךָ
  chosen: write down for yourself
  alternatives:
  - write for yourself
  - record for yourself
  lexicon: HALOT
  rationale: The imperative כתוב means 'write'; לְךָ adds a reflexive/personal force
    ('for yourself'). 'Write down for yourself' is natural English while preserving
    the directive to make a specific record.
- source_word: אֶת שֵׁם הַיּוֹם
  chosen: the name of the day
  alternatives:
  - the date
  - the designation of the day
  lexicon: HALOT
  rationale: Literally 'the name of the day.' In context it refers to identifying
    the date, but the Hebrew expression is retained closely in English to preserve
    the wording while remaining understandable.
- source_word: אֶת עֶצֶם הַיּוֹם הַזֶּה
  chosen: this very day
  alternatives:
  - the exact day, this one
  - this same day
  lexicon: HALOT
  rationale: 'עֶצֶם in this idiom intensifies specificity: ''the very/same/exact day.''
    ''This very day'' is idiomatic English and matches the emphatic force.'
- source_word: סָמַךְ
  chosen: has laid siege against
  alternatives:
  - has come against
  - has pressed against
  - has set himself against
  lexicon: HALOT
  rationale: With אֶל יְרוּשָׁלַם and the military context, the verb refers to the
    king of Babylon beginning the siege of Jerusalem. 'Has laid siege against' makes
    the historical sense explicit without undue paraphrase.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct phrase; standard English rendering.
- source_word: אֶל יְרוּשָׁלִַם
  chosen: against Jerusalem
  alternatives:
  - to Jerusalem
  - toward Jerusalem
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with a hostile military verb in
    context English 'against' best conveys the sense.
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  chosen: on this very day
  alternatives:
  - on this same day
  - on the exact day
  lexicon: HALOT
  rationale: The repeated idiom underscores precise simultaneity. 'On this very day'
    preserves the emphasis and links the sign-act to the historical event.
