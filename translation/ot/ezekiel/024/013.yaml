theological_decisions:
- issue: Whether the first purification clause should be rendered as a completed cleansing
    or an attempted/offered cleansing
  chosen_reading: Because I tried to cleanse you
  alternative_readings:
  - Because I cleansed you
  - Though I cleansed you
  rationale: 'The immediate sequence ''I purified you, but you were not purified''
    is awkward if both are taken as straightforward completed events. Rendering the
    first as attempted/offered cleansing preserves the prophetic logic: God acted
    toward cleansing, but Jerusalem remained uncleansed, so further cleansing is withheld
    until wrath is spent.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: How to express the completion of divine wrath in הֲנִיחִי אֶת־חֲמָתִי בָּךְ
  chosen_reading: until I have satisfied my wrath against you
  alternative_readings:
  - until I have spent my wrath on you
  - until I have caused my wrath to rest on you
  rationale: The Hebrew idiom speaks of wrath coming to rest after full execution.
    'Satisfied my wrath' communicates completion without importing a technical atonement
    concept; it is a judgment idiom here, not sacrificial theology.
  doctrine_reference: Translation philosophy §1, §6
