id: EZK.24.13
reference: Ezekiel 24:13
source:
  edition: WLC
  text: בְּ/טֻמְאָתֵ֖/ךְ זִמָּ֑ה יַ֤עַן טִֽהַרְתִּי/ךְ֙ וְ/לֹ֣א טָהַ֔רְתְּ מִ/טֻּמְאָתֵ/ךְ֙
    לֹ֣א תִטְהֲרִי ע֔וֹד עַד הֲנִיחִ֥/י אֶת חֲמָתִ֖/י בָּֽ/ךְ־־־׃
translation:
  text: In your uncleanness is lewdness. Because I tried to cleanse you, but you were
    not cleansed from your uncleanness, you will not be cleansed anymore until I have
    satisfied my wrath against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Because I cleansed you'' or ''Though I cleansed you.'' The Hebrew
      can be taken more formally, but the main text reflects the sense demanded by
      the following clause: ''but you were not cleansed.'''
    reason: lexical_alternative
  - marker: b
    text: Literally 'until I cause my wrath to rest in/on you,' an idiom meaning that
      God's wrath is fully spent.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֻמְאָתֵךְ
  chosen: In your uncleanness
  alternatives:
  - By your uncleanness
  - In your impurity
  lexicon: HALOT
  rationale: טֻמְאָה denotes uncleanness/impurity, often with moral and cultic overlap
    in Ezekiel. 'In your uncleanness' preserves the preposition ב and the state in
    which the following noun is predicated.
- source_word: זִמָּה
  chosen: lewdness
  alternatives:
  - wickedness
  - obscenity
  - depravity
  lexicon: HALOT
  rationale: In Ezekiel this noun often carries a sexually immoral and shameless sense.
    'Lewdness' best matches the prophetic accusation without flattening it to generic
    evil.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment. 'Because' is natural modern
    English and preserves the logic.
- source_word: טִהַרְתִּיךְ
  chosen: I tried to cleanse you
  alternatives:
  - I cleansed you
  - I would have cleansed you
  lexicon: HALOT
  rationale: Given the immediate contrast with 'but you were not cleansed,' the clause
    is best understood as an attempted or offered cleansing frustrated by Jerusalem's
    refusal, not a completed successful cleansing. 'Tried to cleanse' makes the discourse
    coherent in English.
- source_word: וְלֹא טָהַרְתְּ
  chosen: but you were not cleansed
  alternatives:
  - but you did not become clean
  - but you were not purified
  lexicon: HALOT
  rationale: The verb is stative/resultative in context. English passive communicates
    the resulting condition clearly and matches the contrast with God's prior action.
- source_word: מִטֻּמְאָתֵךְ
  chosen: from your uncleanness
  alternatives:
  - from your impurity
  lexicon: HALOT
  rationale: The מן marks separation from the state of uncleanness. Repeating 'uncleanness'
    preserves lexical consistency with the opening phrase.
- source_word: לֹא תִטְהֲרִי עוֹד
  chosen: you will not be cleansed anymore
  alternatives:
  - you shall not be clean again
  - you will not be purified any longer
  lexicon: HALOT
  rationale: Future negation announces continuing judgment. 'Anymore' conveys עוֹד
    naturally in modern English.
- source_word: עַד הֲנִיחִי
  chosen: until I have satisfied
  alternatives:
  - until I have spent
  - until I have set down
  - until I have appeased
  lexicon: HALOT
  rationale: The Hiphil of נוח with wrath means to cause wrath to rest, i.e., to let
    it come to rest after being fully expended. 'Satisfied' is idiomatic English for
    wrath brought to completion, while avoiding overly archaic phrasing.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: חֵמָה in prophetic judgment contexts denotes intense divine wrath. 'Wrath'
    preserves the theological gravity better than the more emotional 'rage'.
- source_word: בָּךְ
  chosen: against you
  alternatives:
  - on you
  - in you
  lexicon: HALOT
  rationale: Though literally 'in/with you,' in context with divine wrath the sense
    is hostile direction toward Jerusalem. 'Against you' is the clearest idiomatic
    rendering.
