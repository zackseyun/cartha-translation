id: EZK.24.4
reference: Ezekiel 24:4
source:
  edition: WLC
  text: אֱסֹ֤ף נְתָחֶ֨י/הָ֙ אֵלֶ֔י/הָ כָּל נֵ֥תַח ט֖וֹב יָרֵ֣ךְ וְ/כָתֵ֑ף מִבְחַ֥ר
    עֲצָמִ֖ים מַלֵּֽא־׃
translation:
  text: Gather its pieces into it, every good piece—the thigh and the shoulder; fill
    it with the choicest bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its cuts of meat' for 'its pieces'; the Hebrew term refers to butchered
      portions.
    reason: lexical_alternative
  - marker: b
    text: Or 'every choice piece'; 'good' here carries the sense of desirable or select
      portions.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱסֹף
  chosen: Gather
  alternatives:
  - Collect
  - Heap up
  lexicon: HALOT
  rationale: Imperative from אסף, here a command to bring together the contents for
    the cooking-pot metaphor. 'Gather' is natural English and preserves the directive
    force.
- source_word: נְתָחֶיהָ
  chosen: its pieces
  alternatives:
  - its cuts of meat
  - its portions
  lexicon: HALOT
  rationale: From נתח, pieces or cuts, especially butchered portions of meat. 'Pieces'
    is concise and fits the culinary imagery; 'cuts of meat' is more explicit but
    slightly heavier stylistically.
- source_word: אֵלֶיהָ
  chosen: into it
  alternatives:
  - into her
  - to it
  lexicon: HALOT
  rationale: Refers back to the pot, grammatically feminine in Hebrew. English idiom
    for an inanimate vessel is 'it'; 'into it' best matches the directional sense.
- source_word: כָּל נֵתַח טוֹב
  chosen: every good piece
  alternatives:
  - every choice piece
  - every fine cut
  lexicon: HALOT
  rationale: Retains the distributive 'every' and the qualitative adjective 'good.'
    In context this means desirable meat portions; 'good piece' is transparent modern
    English.
- source_word: יָרֵךְ וְכָתֵף
  chosen: the thigh and the shoulder
  alternatives:
  - leg and shoulder
  - haunch and shoulder
  lexicon: HALOT
  rationale: These are specific animal parts. 'Thigh' is more anatomically precise
    than 'leg,' and 'shoulder' is standard.
- source_word: מִבְחַר עֲצָמִים
  chosen: the choicest bones
  alternatives:
  - choice bones
  - the best bones
  lexicon: HALOT
  rationale: Literally 'selection/choice of bones.' The phrase likely refers to the
    best bony pieces suitable for broth or rich cooking. 'Choicest bones' preserves
    the superlative sense with readable English.
- source_word: מַלֵּא
  chosen: fill it
  alternatives:
  - fill
  - make it full
  lexicon: HALOT
  rationale: Imperative from מלא. The object 'it' is supplied from context, referring
    again to the pot. This makes the English complete and natural.
