id: EZK.24.24
reference: Ezekiel 24:24
source:
  edition: WLC
  text: וְ/הָיָ֨ה יְחֶזְקֵ֤אל לָ/כֶם֙ לְ/מוֹפֵ֔ת כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה תַּעֲשׂ֑וּ בְּ/בֹאָ֕/הּ וִֽ/ידַעְתֶּ֕ם כִּ֥י אֲנִ֖י אֲדֹנָ֥/י יְהוִֽה־׃ס
translation:
  text: And Ezekiel will be a sign to you; according to all that he has done, you will do. When this comes, then you will know that I am the Lord YHWH.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a portent.' The Hebrew מוֹפֵת can denote a sign, portent, or wonder; here it refers to Ezekiel's symbolic example.
    reason: lexical_alternative
  - marker: b
    text: Or 'when it happens.' The Hebrew literally says 'in/when its coming,' referring to the arrival of the foretold event.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: will be
  alternatives:
  - shall be
  - has become
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in prophetic discourse functions futurally here, introducing the result of the sign-act: Ezekiel will serve as something for the people.'
- source_word: יְחֶזְקֵאל
  chosen: Ezekiel
  rationale: Personal name is transliterated by standard English convention, per translation philosophy.
- source_word: לְמוֹפֵת
  chosen: a sign
  alternatives:
  - an omen
  - a portent
  lexicon: HALOT
  rationale: מוֹפֵת can denote a sign, portent, or wonder. In this context Ezekiel's acted behavior functions as a symbolic sign to the people rather than a miraculous wonder, so 'a sign' is the clearest rendering.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  chosen: according to all that he has done
  alternatives:
  - just as he did
  - according to everything that he did
  lexicon: HALOT
  rationale: The comparative כְּ plus כֹּל and relative clause indicates correspondence with Ezekiel's prior actions. 'According to all that he has done' preserves the formal structure while remaining natural English.
- source_word: תַּעֲשׂוּ
  chosen: you will do
  alternatives:
  - you shall do
  lexicon: HALOT
  rationale: 'Imperfect 2mp here is predictive: the exiles will act in the same way when the announced event occurs.'
- source_word: בְּבֹאָהּ
  chosen: When it comes
  alternatives:
  - when she comes
  - at its coming
  - when it happens
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב plus 3fs suffix refers to the coming of the foretold calamity/news. English idiom prefers impersonal 'it comes' rather than 'she comes.' 'When it comes' keeps the temporal force and leaves the feminine antecedent implicit, as in Hebrew.
- source_word: וִידַעְתֶּם
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction links consequence after the temporal clause. 'Then' makes the sequence explicit in natural English without adding content.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English translations to reflect אֲדֹנָי + YHWH. Because YHWH's default rendering in doctrine is 'the LORD,' and English style with this compound typically uses 'the Lord GOD,' this preserves both reverence and recognizability. The alternative 'the Lord Yahweh' is not adopted because doctrine specifies 'the LORD' for YHWH.
