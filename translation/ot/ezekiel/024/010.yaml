id: EZK.24.10
reference: Ezekiel 24:10
source:
  edition: WLC
  text: הַרְבֵּ֤ה הָ/עֵצִים֙ הַדְלֵ֣ק הָ/אֵ֔שׁ הָתֵ֖ם הַ/בָּשָׂ֑ר וְ/הַרְקַח֙ הַ/מֶּרְקָחָ֔ה
    וְ/הָ/עֲצָמ֖וֹת יֵחָֽרוּ׃
translation:
  text: Pile up the wood, kindle the fire, cook the flesh thoroughly, and boil the
    broth; and let the bones be charred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "heap up the wood."
    reason: lexical_alternative
  - marker: b
    text: Or "cook the meat completely." The Hebrew literally says "the flesh."
    reason: lexical_alternative
  - marker: c
    text: Or "prepare the mixture" or "boil the stew."
    reason: lexical_alternative
  - marker: d
    text: Or "let the bones be burned/scorched."
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְבֵּה
  chosen: Pile up
  alternatives:
  - Make plentiful
  - Heap up
  lexicon: HALOT
  rationale: Imperative from רבה in the causative sense calls for increasing the quantity.
    In context with 'the wood,' idiomatic English is 'pile up' or 'heap up' rather
    than the wooden 'make many.'
- source_word: הָעֵצִים
  chosen: the wood
  alternatives:
  - the pieces of wood
  - the logs
  lexicon: HALOT
  rationale: עֵצִים is plural 'woods/wood pieces,' but English normally uses the mass
    noun 'wood' in this collocation. 'Logs' is too specific.
- source_word: הַדְלֵק
  chosen: kindle
  alternatives:
  - light
  - make burn
  lexicon: HALOT
  rationale: Imperative from דלק in the causative means to ignite or kindle. 'Kindle'
    preserves the vivid command and fits the sacrificial/cooking imagery.
- source_word: הָאֵשׁ
  chosen: the fire
  alternatives:
  - a fire
  lexicon: HALOT
  rationale: The article is present in Hebrew, and 'the fire' fits the sequence of
    commands directed toward the cauldron image.
- source_word: הָתֵם
  chosen: cook ... thoroughly
  alternatives:
  - finish cooking
  - boil completely
  lexicon: HALOT
  rationale: From תמם, the sense is to complete or bring to an end. In this culinary
    context it means to cook fully or thoroughly, not merely 'finish' in an abstract
    sense.
- source_word: הַבָּשָׂר
  chosen: the flesh
  alternatives:
  - the meat
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' Although 'meat' would sound natural
    in a cooking context, 'flesh' better preserves the harsh imagery of the prophetic
    metaphor.
- source_word: וְהַרְקַח
  chosen: and boil
  alternatives:
  - and mix
  - and spice
  lexicon: HALOT
  rationale: The verb רקח can involve mixing or compounding, often of ointments/spices,
    but here with מֶרְקָחָה in a cooking context it most plausibly refers to preparing
    the liquid contents into a boiled mixture. 'Boil' communicates the action clearly
    in context.
- source_word: הַמֶּרְקָחָה
  chosen: the broth
  alternatives:
  - the mixture
  - the stew
  lexicon: HALOT
  rationale: The noun denotes a compounded mixture. In this cauldron-cooking image,
    'broth' best captures the liquid preparation without over-paraphrasing. 'Stew'
    is possible but slightly more interpretive.
- source_word: וְהָעֲצָמוֹת
  chosen: and the bones
  alternatives:
  - and as for the bones
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with conjunction. The phrase
    shifts attention to what remains in the pot.
- source_word: יֵחָרוּ
  chosen: let ... be charred
  alternatives:
  - be burned
  - be scorched
  - glow hot
  lexicon: HALOT
  rationale: From חרר in the Niphal, the sense here is that the bones become burned/scorched
    from intense heat. 'Be charred' conveys the severity and result of the heating
    more vividly than the generic 'be burned.'
