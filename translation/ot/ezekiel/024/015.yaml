id: EZK.24.15
reference: Ezekiel 24:15
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the word of Yahweh came to me, saying.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'and it was/came to pass,' in the prophetic
    formula ויהי דבר־יהוה אלי the idiomatic English rendering is 'the word of the
    LORD came to me.' This preserves the standard Hebrew revelatory formula in natural
    English without unnecessary woodenness.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר in this formula refers to a divine communication. 'The word' is the
    most direct and conventional rendering and preserves the prophetic register better
    than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English Bible
    convention while signaling the covenant name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix straightforwardly indicates
    direction toward Ezekiel as recipient of revelation. 'To me' is accurate and idiomatic
    modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct commonly introduces direct speech after a revelation
    formula. 'Saying' is the standard concise English equivalent and prepares for
    the following divine speech in the next verse.
