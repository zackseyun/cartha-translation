id: EZK.42.18
reference: Ezekiel 42:18
source:
  edition: WLC
  text: אֵ֛ת ר֥וּחַ הַ/דָּר֖וֹם מָדָ֑ד חֲמֵשׁ מֵא֥וֹת קָנִ֖ים בִּ/קְנֵ֥ה הַ/מִּדָּֽה־׃
translation:
  text: 'He measured the south side: five hundred reeds by the measuring reed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and ancient versions read 'cubits' instead of 'reeds' in
      this measurement context; the Masoretic Text reads 'reeds.'
    reason: textual_variant
lexical_decisions:
- source_word: ר֥וּחַ הַ/דָּר֖וֹם
  chosen: the south side
  alternatives:
  - the south wind
  - the south direction
  - the south quarter
  lexicon: HALOT
  rationale: רוּחַ can denote wind, direction, or side/quarter. In this architectural
    measuring context, it refers to the southern side or direction of the complex,
    not wind. 'South side' is natural English in a sequence of boundary measurements.
- source_word: מָדָ֑ד
  chosen: He measured
  alternatives:
  - he measured off
  lexicon: HALOT
  rationale: The verb מדד straightforwardly means 'measure.' The subject remains the
    previously established measurer, so English supplies 'He.'
- source_word: חֲמֵשׁ מֵא֥וֹת
  chosen: five hundred
  lexicon: HALOT
  rationale: Standard cardinal number construction.
- source_word: קָנִ֖ים
  chosen: reeds
  alternatives:
  - cubits
  lexicon: HALOT
  rationale: קָנֶה means 'reed' and in Ezekiel's temple vision functions as a measuring
    unit. The Hebrew explicitly says 'reeds,' not 'cubits.' 'Cubits' is a known alternative
    in some textual traditions/versions, but not the MT wording here.
- source_word: בִּ/קְנֵ֥ה הַ/מִּדָּֽה
  chosen: by the measuring reed
  alternatives:
  - with the measuring reed
  - according to the measuring reed
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: the measurement was taken by
    means of the standard measuring reed. ''By the measuring reed'' is concise and
    idiomatic.'
