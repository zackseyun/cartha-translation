id: EZK.42.12
reference: Ezekiel 42:12
source:
  edition: WLC
  text: וּ/כְ/פִתְחֵ֣י הַ/לְּשָׁכ֗וֹת אֲשֶׁר֙ דֶּ֣רֶךְ הַ/דָּר֔וֹם פֶּ֖תַח בְּ/רֹ֣אשׁ
    דָּ֑רֶךְ דֶּ֗רֶךְ בִּ/פְנֵי֙ הַ/גְּדֶ֣רֶת הֲגִינָ֔ה דֶּ֥רֶךְ הַ/קָּדִ֖ים בְּ/בוֹאָֽ/ן׃
translation:
  text: And corresponding to the doorways of the chambers that were toward the south,
    there was a doorway at the head of the way, the way in front of the protective
    wall, toward the east, as one enters them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the beginning of the passage'; the Hebrew repeats 'way/path' several
      times, and the exact architectural nuance is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'protective' is rare and may also suggest an enclosing
      or screening wall.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְפִתְחֵי
  chosen: And corresponding to the doorways of
  alternatives:
  - And like the entrances of
  - And as the openings of
  lexicon: HALOT
  rationale: The prefixed conjunction plus comparative כ with פתחי indicates comparison/correspondence
    rather than a simple additive 'and the doorways.' 'Corresponding to' captures
    the structural parallel with the previous description.
- source_word: הַלְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the cells
  lexicon: HALOT
  rationale: לשכה in temple-architecture contexts refers to side chambers/rooms. 'Chambers'
    is the standard and suitably architectural rendering.
- source_word: אֲשֶׁר דֶּרֶךְ הַדָּרוֹם
  chosen: that were toward the south
  alternatives:
  - that faced south
  - that were on the south side
  lexicon: HALOT
  rationale: The phrase identifies location/orientation. 'Toward the south' is natural
    English and preserves the directional sense without over-specifying exact facing.
- source_word: פֶּתַח
  chosen: a doorway
  alternatives:
  - an entrance
  - a door
  lexicon: HALOT
  rationale: פתח denotes an opening/entrance. 'Doorway' fits the architectural description
    and avoids implying a physical door leaf.
- source_word: בְּרֹאשׁ דָּרֶךְ
  chosen: at the head of the way
  alternatives:
  - at the beginning of the passage
  - at the start of the path
  lexicon: HALOT
  rationale: ראש with דרך idiomatically indicates the beginning or head of a route.
    'At the head of the way' stays close to the Hebrew while remaining intelligible.
- source_word: דֶּרֶךְ
  chosen: the way
  alternatives:
  - the passage
  - the path
  lexicon: HALOT
  rationale: Repeated דרך likely refers to an access route/passage in the temple complex.
    'Way' preserves the repetition present in Hebrew; more interpretive options are
    possible but less transparent.
- source_word: בִּפְנֵי הַגְּדֶרֶת
  chosen: in front of the wall
  alternatives:
  - before the fence
  - opposite the barrier
  lexicon: HALOT
  rationale: בפני commonly means 'in front of' or 'before.' גדרת denotes a wall/fence/enclosure.
    'Wall' is the most natural architectural term here.
- source_word: הֲגִינָה
  chosen: protective
  alternatives:
  - enclosing
  - screening
  lexicon: HALOT
  rationale: This rare term is commonly understood as describing the wall as protective/sheltering.
    Rendering it adjectivally as 'protective' yields coherent English while reflecting
    the likely function of the structure.
- source_word: דֶּרֶךְ הַקָּדִים
  chosen: toward the east
  alternatives:
  - eastward
  - on the east side
  lexicon: HALOT
  rationale: A directional phrase indicating orientation. 'Toward the east' is straightforward
    and matches the spatial description.
- source_word: בְּבוֹאָן
  chosen: as one enters them
  alternatives:
  - at their entrance
  - when entering them
  lexicon: HALOT
  rationale: The infinitive construct of בוא with 3fp suffix most naturally means
    'in entering them' or 'when one enters them,' referring back to the chambers.
    'As one enters them' is idiomatic and preserves the verbal sense.
