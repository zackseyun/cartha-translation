id: EZK.42.5
reference: Ezekiel 42:5
source:
  edition: WLC
  text: וְ/הַ/לְּשָׁכ֥וֹת הָ/עֶלְיוֹנֹ֖ת קְצֻר֑וֹת כִּֽי יוֹכְל֨וּ אַתִּיקִ֜ים מֵ/הֵ֗נָה
    מֵֽ/הַ/תַּחְתֹּנ֛וֹת וּ/מֵ/הַ/תִּֽכֹנ֖וֹת בִּנְיָֽן־׃
translation:
  text: And the upper chambers were narrower, because the galleries took away from
    them more than from the lower and middle parts of the building.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the terraces,' 'colonnades,' or 'ledges' took away from them.' The Hebrew
      term translated 'galleries' (אַטִּיקִים) is rare and its precise architectural
      referent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the cells
  lexicon: HALOT
  rationale: לשכה in temple/building contexts refers to side rooms or chambers. 'Chambers'
    is the standard architectural term in Ezekiel's temple vision and fits the cultic-building
    context better than the more generic 'rooms'.
- source_word: הָעֶלְיוֹנוֹת
  chosen: the upper
  alternatives:
  - the uppermost
  - the higher
  lexicon: HALOT
  rationale: The adjective marks the top tier in contrast with the lower and middle
    levels later in the verse. 'Upper' is natural English and preserves the spatial
    contrast.
- source_word: קְצֻרוֹת
  chosen: were narrower
  alternatives:
  - were shorter
  - were reduced
  lexicon: HALOT
  rationale: Though the root can denote being short, in this architectural context
    the sense is reduction in breadth/extent, not height. 'Narrower' best explains
    the comparison with lower and middle levels and matches the following causal clause.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason the upper chambers were narrower. 'Because' is
    the clearest modern English causal connector.
- source_word: יוֹכְלוּ
  chosen: took away
  alternatives:
  - consumed
  - encroached on
  - reduced
  lexicon: HALOT
  rationale: From אכל, literally 'eat/consume,' used here metaphorically of architectural
    features taking up space. 'Took away' communicates the spatial effect in idiomatic
    English without over-literal awkwardness.
- source_word: אַתִּיקִים
  chosen: the galleries
  alternatives:
  - the terraces
  - the colonnades
  - the ledges
  lexicon: HALOT
  rationale: This rare architectural term is difficult, but in Ezekiel 41–42 it most
    plausibly refers to projecting gallery-like structures associated with the upper
    levels. 'Galleries' is a conventional and intelligible rendering; alternatives
    remain possible due to lexical uncertainty.
- source_word: מֵהֵנָּה
  chosen: from them
  alternatives:
  - from these
  - out of them
  lexicon: HALOT
  rationale: Refers back to the upper chambers as the structures from which space
    was taken. 'From them' is the most natural English anaphoric rendering.
- source_word: מֵהַתַּחְתֹּנוֹת
  chosen: than from the lower
  alternatives:
  - than from the bottom ones
  - than from the lower parts
  lexicon: HALOT
  rationale: The comparative force is implied by the sequence of prepositional phrases
    in context. 'The lower' refers to the lower tier of chambers.
- source_word: וּמֵהַתִּיכֹנוֹת
  chosen: and middle parts
  alternatives:
  - and the middle ones
  - and the middle tier
  lexicon: HALOT
  rationale: Refers to the middle tier in the three-level structure. 'Middle parts'
    smooths the English while preserving the architectural contrast.
- source_word: בִּנְיָן
  chosen: of the building
  alternatives:
  - of the structure
  - of the edifice
  lexicon: HALOT
  rationale: Summative term for the constructed complex. 'Building' is clear, natural,
    and sufficiently formal for the vision context.
