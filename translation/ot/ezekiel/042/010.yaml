id: EZK.42.10
reference: Ezekiel 42:10
source:
  edition: WLC
  text: בְּ/רֹ֣חַב גֶּ֣דֶר הֶ/חָצֵ֗ר דֶּ֧רֶךְ הַ/קָּדִ֛ים אֶל פְּנֵ֧י הַ/גִּזְרָ֛ה
    וְ/אֶל פְּנֵ֥י הַ/בִּנְיָ֖ן לְשָׁכֽוֹת׀־־׃
translation:
  text: Along the width of the court wall, toward the east, facing the separate area
    and facing the building, were chambers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the width of the court enclosure' or 'along the breadth of the court
      wall.' The Hebrew is spatially compressed and architectural.
    reason: lexical_alternative
  - marker: b
    text: '''The separate area'' renders a technical term in Ezekiel''s temple vision
      for a distinct section set apart from surrounding structures.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּרֹחַב
  chosen: along the width of
  alternatives:
  - in the width of
  - across the width of
  lexicon: HALOT
  rationale: The preposition ב plus רֹחַב denotes location/extension in relation to
    breadth or width. 'Along the width of' gives natural English while preserving
    the spatial sense better than a bare 'in the width of.'
- source_word: גֶּדֶר הֶחָצֵר
  chosen: the court wall
  alternatives:
  - the fence of the court
  - the enclosure wall of the court
  lexicon: HALOT
  rationale: גֶּדֶר is a wall, fence, or enclosing barrier. In this temple-vision
    architectural context, 'wall' is clearer and more idiomatic than 'fence,' while
    retaining the idea of a boundary belonging to the court.
- source_word: דֶּרֶךְ הַקָּדִים
  chosen: toward the east
  alternatives:
  - on the east side
  - eastward
  lexicon: HALOT
  rationale: דֶּרֶךְ with a cardinal direction commonly indicates direction or side.
    'Toward the east' preserves directional force without over-specifying a technical
    side designation.
- source_word: אֶל פְּנֵי
  chosen: facing
  alternatives:
  - opposite
  - in front of
  - toward the front of
  lexicon: HALOT
  rationale: The repeated phrase אֶל־פְּנֵי in architectural description indicates
    orientation or position opposite/fronting something. 'Facing' is concise and natural
    in English architectural description.
- source_word: הַגִּזְרָה
  chosen: the separate area
  alternatives:
  - the separate place
  - the restricted area
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, גִּזְרָה refers to a distinct separated section
    of the complex. 'Separate area' is a clear, established rendering that preserves
    the technical sense without unnecessary jargon.
- source_word: הַבִּנְיָן
  chosen: the building
  alternatives:
  - the structure
  lexicon: HALOT
  rationale: The noun broadly means 'building/structure.' 'The building' is the most
    straightforward rendering and fits the repeated architectural terminology of the
    passage.
- source_word: לְשָׁכוֹת
  chosen: were chambers
  alternatives:
  - were rooms
  - there were chambers
  lexicon: HALOT
  rationale: לְשָׁכוֹת denotes chambers/rooms, often side rooms in temple contexts.
    Because the Hebrew here is verbless and elliptical, supplying 'were' is necessary
    in English. 'Chambers' better matches the formal architectural setting than the
    more generic 'rooms'.
