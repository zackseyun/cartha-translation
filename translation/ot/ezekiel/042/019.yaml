id: EZK.42.19
reference: Ezekiel 42:19
source:
  edition: WLC
  text: סָבַ֖ב אֶל ר֣וּחַ הַ/יָּ֑ם מָדַ֛ד חֲמֵשׁ מֵא֥וֹת קָנִ֖ים בִּ/קְנֵ֥ה הַ/מִּדָּֽה־־׃
translation:
  text: He turned to the west side and measured five hundred reeds with the measuring
    reed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'to the direction of the sea,' a Hebrew way of indicating the
      west.
    reason: cultural_note
  - marker: b
    text: Some interpreters and versions read 'cubits' instead of 'reeds' in this
      measurement context, but the Hebrew here reads 'reeds.'
    reason: alternative_reading
lexical_decisions:
- source_word: סָבַב
  chosen: He turned
  alternatives:
  - He went around
  - He turned around
  lexicon: HALOT
  rationale: The verb means to turn or go around. In this measurement sequence, it
    introduces movement to the next side of the structure rather than a full circling
    action, so 'He turned' is the most natural and sufficiently literal rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks direction toward the next compass side. In idiomatic
    English with 'turned,' this is best represented by 'to,' though the resulting
    phrase is smoothed as 'turned to the west side.'
- source_word: רוּחַ הַיָּם
  chosen: the west side
  alternatives:
  - the direction of the sea
  - the west
  - the sea side
  lexicon: HALOT
  rationale: Literally 'the direction of the sea.' In Hebrew geographical usage, 'sea'
    commonly denotes the west because of the Mediterranean Sea. 'West side' makes
    the directional sense explicit and fits the architectural measuring context.
- source_word: מָדַד
  chosen: measured
  lexicon: HALOT
  rationale: Standard rendering of the verb in this context of surveying temple dimensions.
- source_word: חֲמֵשׁ מֵאוֹת
  chosen: five hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: קָנִים
  chosen: reeds
  alternatives:
  - cubits
  lexicon: HALOT
  rationale: The noun refers to measuring reeds, not cubits. This is important in
    Ezekiel 40–42, where some translations have reflected textual or interpretive
    uncertainty. The immediate qualifier 'with the measuring reed' supports 'reeds'
    here in the main text.
- source_word: בִּקְנֵה הַמִּדָּה
  chosen: with the measuring reed
  alternatives:
  - by the measuring reed
  - using the measuring reed
  lexicon: HALOT
  rationale: The preposition beth is instrumental here, indicating the tool used for
    measurement. Singular 'reed' is natural because it refers to the standard measuring
    instrument.
