id: EZK.42.3
reference: Ezekiel 42:3
source:
  edition: WLC
  text: נֶ֣גֶד הָֽ/עֶשְׂרִ֗ים אֲשֶׁר֙ לֶ/חָצֵ֣ר הַ/פְּנִימִ֔י וְ/נֶ֣גֶד רִֽצְפָ֔ה
    אֲשֶׁ֖ר לֶ/חָצֵ֣ר הַ/חִֽיצוֹנָ֑ה אַתִּ֥יק אֶל פְּנֵֽי אַתִּ֖יק בַּ/שְּׁלִשִֽׁים־־׃
translation:
  text: Opposite the twenty cubits that belonged to the inner court, and opposite
    the pavement that belonged to the outer court, gallery faced gallery in the third
    story.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'attiq' is a rare architectural term; it may denote a gallery, colonnade,
      portico, or similar upper structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the third level'; the Hebrew likely refers to the third story of
      the building.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶגֶד
  chosen: Opposite
  alternatives:
  - facing
  - in front of
  lexicon: HALOT
  rationale: The preposition indicates spatial correspondence or position across from
    something. 'Opposite' is concise and natural in architectural description.
- source_word: הָעֶשְׂרִים
  chosen: the twenty cubits
  alternatives:
  - the twenty
  - the twenty units
  lexicon: HALOT
  rationale: Although 'cubits' is not explicit in this word alone, the architectural
    context and parallel descriptions in the vision indicate a measured span. Supplying
    'cubits' makes the English intelligible without materially expanding the sense.
- source_word: לֶחָצֵר הַפְּנִימִי
  chosen: that belonged to the inner court
  alternatives:
  - of the inner court
  - in the inner court
  lexicon: HALOT
  rationale: 'The lamed here is best taken relationally with the measured area: the
    twenty cubits pertained to or belonged to the inner court. This avoids the less
    clear literal ''to the inner court'' in English.'
- source_word: רִצְפָה
  chosen: the pavement
  alternatives:
  - the paved area
  - the flooring
  lexicon: HALOT
  rationale: In temple architecture this noun refers to a paved surface. 'Pavement'
    is the standard and suitably concrete rendering.
- source_word: לֶחָצֵר הַחִיצוֹנָה
  chosen: that belonged to the outer court
  alternatives:
  - of the outer court
  - in the outer court
  lexicon: HALOT
  rationale: 'As with the earlier phrase, the relation is possessive/associative in
    context: the pavement was associated with the outer court.'
- source_word: אַתִּיק
  chosen: gallery
  alternatives:
  - colonnade
  - portico
  - terrace
  lexicon: HALOT
  rationale: The term is rare and contextually architectural. 'Gallery' best fits
    the sense of an upper structural feature running along the building, and it works
    well in the repeated phrase 'gallery faced gallery.' Alternatives remain possible
    because the exact feature is debated.
- source_word: אֶל פְּנֵי
  chosen: faced
  alternatives:
  - toward the front of
  - opposite
  lexicon: HALOT
  rationale: The idiom expresses one feature being opposite or facing another. 'Faced'
    yields idiomatic English and preserves the reciprocal spatial relation.
- source_word: בַּשְּׁלִשִׁים
  chosen: in the third story
  alternatives:
  - on the third level
  - in three tiers
  lexicon: HALOT
  rationale: In this architectural context the phrase most naturally refers to the
    third level/story of the structure rather than simply the ordinal number 'third'
    without specification. 'Story' clarifies the building description for modern readers.
