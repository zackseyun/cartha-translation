id: EZK.42.15
reference: Ezekiel 42:15
source:
  edition: WLC
  text: וְ/כִלָּ֗ה אֶת מִדּוֹת֙ הַ/בַּ֣יִת הַ/פְּנִימִ֔י וְ/הוֹצִיאַ֨/נִי֙ דֶּ֣רֶךְ
    הַ/שַּׁ֔עַר אֲשֶׁ֥ר פָּנָ֖י/ו דֶּ֣רֶךְ הַ/קָּדִ֑ים וּ/מְדָד֖/וֹ סָבִ֥יב סָבִֽיב־׀׃
translation:
  text: When he had finished measuring the inner temple, he brought me out by way
    of the gate that faced east, and he measured it all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the inner house.' The Hebrew uses 'house' in temple-vision context for
      the sacred structure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the gate whose face was toward the east.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלָּה
  chosen: When he had finished
  alternatives:
  - And he finished
  - When he finished
  lexicon: HALOT
  rationale: The verb from כלה denotes completing or finishing. Rendering with a temporal
    clause ('When he had finished') fits the narrative sequence in English while preserving
    the sense of completed action before the next verb.
- source_word: מִדּוֹת
  chosen: measuring
  alternatives:
  - measurements
  - dimensions
  lexicon: HALOT
  rationale: Although the noun literally means 'measurements' or 'measures,' English
    idiom after 'finished' is smoother with the verbal idea 'finished measuring.'
    This preserves the sense without unnecessary stiffness.
- source_word: הַבַּיִת הַפְּנִימִי
  chosen: the inner temple
  alternatives:
  - the inner house
  - the inner building
  lexicon: HALOT
  rationale: בַּיִת is literally 'house,' but in Ezekiel's temple vision it refers
    to the temple structure/complex. 'Inner temple' communicates the cultic architectural
    sense more clearly in modern English than 'inner house'.
- source_word: וְהוֹצִיאַנִי
  chosen: he brought me out
  alternatives:
  - he led me out
  - he took me out
  lexicon: HALOT
  rationale: The hiphil of יצא means to cause to go out, hence 'bring out' or 'lead
    out.' 'Brought me out' is natural and adequately reflects causation.
- source_word: דֶּרֶךְ
  chosen: by way of
  alternatives:
  - through
  - by the way of
  lexicon: HALOT
  rationale: The prepositional use of דֶּרֶךְ indicates route or means. 'By way of'
    preserves that sense more precisely than the simpler 'through,' though the latter
    is possible.
- source_word: הַשַּׁעַר אֲשֶׁר פָּנָיו דֶּרֶךְ הַקָּדִים
  chosen: the gate that faced east
  alternatives:
  - the gate whose front faced east
  - the gate facing toward the east
  lexicon: HALOT
  rationale: פָּנָיו literally 'its face/front' with דֶּרֶךְ הַקָּדִים indicates orientation
    toward the east. 'That faced east' is clear, idiomatic, and faithful.
- source_word: וּמְדָדוֹ
  chosen: and he measured it
  alternatives:
  - and he measured him
  - and he measured
  lexicon: HALOT
  rationale: The suffix most naturally refers back to the temple complex/structure
    just mentioned, now from the outside perimeter. English requires an object, and
    'it' best captures the likely referent.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around and around
  - on every side
  lexicon: HALOT
  rationale: The doubled expression intensifies the idea of measuring the perimeter
    on every side. 'All around' is idiomatic and preserves the distributive force.
