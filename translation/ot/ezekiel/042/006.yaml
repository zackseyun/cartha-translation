id: EZK.42.6
reference: Ezekiel 42:6
source:
  edition: WLC
  text: כִּ֤י מְשֻׁלָּשׁוֹת֙ הֵ֔נָּה וְ/אֵ֤ין לָ/הֶן֙ עַמּוּדִ֔ים כְּ/עַמּוּדֵ֖י הַ/חֲצֵר֑וֹת
    עַל כֵּ֣ן נֶאֱצַ֗ל מֵ/הַ/תַּחְתּוֹנ֛וֹת וּ/מֵ/הַ/תִּֽיכֹנ֖וֹת מֵ/הָ/אָֽרֶץ־׃
translation:
  text: For they were in three stories, and they had no pillars like the pillars of
    the courts; therefore the upper rooms were set back from the ground more than
    the lower and middle ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were recessed' or 'were reduced'; the Hebrew verb is rare here, and
      the exact architectural nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the architectural feature described in
    the previous verse. 'For' fits the explanatory flow in English.
- source_word: מְשֻׁלָּשׁוֹת
  chosen: in three stories
  alternatives:
  - threefold
  - in three levels
  - three-storied
  lexicon: HALOT
  rationale: In this architectural context the passive/denominative form describes
    a three-tiered structure. 'In three stories' is natural modern English and preserves
    the building sense.
- source_word: הֵנָּה
  chosen: they were
  alternatives:
  - these were
  lexicon: HALOT
  rationale: Refers back to the chambers/buildings under discussion. English requires
    the copular sense to make the clause idiomatic.
- source_word: וְאֵין לָהֶן עַמּוּדִים
  chosen: and they had no pillars
  alternatives:
  - and there were no pillars for them
  - but they had no columns
  lexicon: HALOT
  rationale: The existential construction with ל expresses possession. 'Pillars' is
    a straightforward rendering of עַמּוּדִים in an architectural description.
- source_word: כְּעַמּוּדֵי הַחֲצֵרוֹת
  chosen: like the pillars of the courts
  alternatives:
  - like the columns of the courtyards
  lexicon: HALOT
  rationale: Keeps the comparison explicit with the structural supports belonging
    to the temple courts.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: Marks the consequence drawn from the absence of pillars.
- source_word: נֶאֱצַל
  chosen: were set back
  alternatives:
  - were withdrawn
  - were reduced
  - were recessed
  lexicon: HALOT
  rationale: In this difficult architectural context, the verb most plausibly indicates
    that the upper structure was drawn in/recessed because it lacked supporting pillars.
    'Were set back' communicates the likely spatial sense in clear English.
- source_word: מֵהַתַּחְתּוֹנוֹת וּמֵהַתִּיכֹנוֹת
  chosen: more than the lower and middle ones
  alternatives:
  - from the lower and from the middle stories
  - beyond the lower and middle levels
  lexicon: HALOT
  rationale: 'These feminine plurals refer to the lower and middle stories/rooms.
    The comparative sense is implied by the construction: the upper level was set
    back relative to the lower and middle levels.'
- source_word: מֵהָאָרֶץ
  chosen: from the ground
  alternatives:
  - from the earth
  - at ground level
  lexicon: HALOT
  rationale: In this building description, 'ground' best conveys the physical reference
    point rather than the broader sense 'earth'.
