  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of קָדְשֵׁי הַקֳּדָשִׁים
  chosen_reading: the most holy things
  alternative_readings:
  - the holy of holies offerings
  - the most sacred offerings
  rationale: In this verse the phrase denotes sacrificial items of highest holiness, not the inner sanctuary itself. The immediate apposition naming grain, sin, and guilt offerings confirms the referent.
