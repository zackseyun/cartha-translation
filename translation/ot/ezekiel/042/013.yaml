id: EZK.42.13
reference: Ezekiel 42:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י לִֽשְׁכ֨וֹת הַ/צָּפ֜וֹן לִֽשְׁכ֣וֹת הַ/דָּרוֹם֮ אֲשֶׁ֣ר אֶל פְּנֵ֣י הַ/גִּזְרָה֒ הֵ֣נָּה לִֽשְׁכ֣וֹת הַ/קֹּ֗דֶשׁ אֲשֶׁ֨ר יֹאכְלוּ שָׁ֧ם הַ/כֹּהֲנִ֛ים אֲשֶׁר קְרוֹבִ֥ים לַֽ/יהוָ֖ה קָדְשֵׁ֣י הַ/קֳּדָשִׁ֑ים שָׁ֞ם יַנִּ֣יחוּ קָדְשֵׁ֣י הַ/קֳּדָשִׁ֗ים וְ/הַ/מִּנְחָה֙ וְ/הַ/חַטָּ֣את וְ/הָ/אָשָׁ֔ם כִּ֥י הַ/מָּק֖וֹם קָדֹֽשׁ־׀־־׀׃
translation:
  text: Then he said to me, “The north chambers, the south chambers, which are opposite the separate area—they are the holy chambers, where the priests who draw near to Yahweh shall eat the most holy things. There they shall place the most holy things, the grain offering, the sin offering, and the guilt offering, for the place is holy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “facing the separate area.” The Hebrew expression indicates that these chambers were situated opposite the restricted section of the temple complex.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the most holy things,” referring here to offerings of the highest degree of sanctity, not to the inner room called the Holy of Holies.
    reason: lexical_alternative
  - marker: c
    text: Or “purification offering” for “sin offering.”
    reason: alternative_reading
  - marker: d
    text: Or “reparation offering” for “guilt offering.”
    reason: alternative_reading
lexical_decisions:
- source_word: לִשְׁכּוֹת
  chosen: chambers
  alternatives:
  - rooms
  - cells
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, the term refers to built rooms/chambers associated with temple service. 'Chambers' is the most natural architectural term in English and fits repeated usage in this context better than the less specific 'rooms' or the overly technical 'cells'.
- source_word: הַצָּפוֹן / הַדָּרוֹם
  chosen: the north chambers, the south chambers
  alternatives:
  - the northern chambers, the southern chambers
  lexicon: HALOT
  rationale: Both are directional designations modifying 'chambers.' The shorter English form is readable and preserves the locational force without loss of meaning.
- source_word: אֶל־פְּנֵי הַגִּזְרָה
  chosen: opposite the separate area
  alternatives:
  - facing the separate yard
  - in front of the separate area
  lexicon: HALOT
  rationale: פְּנֵי with אֶל here indicates spatial orientation ('opposite/facing'). הַגִּזְרָה in Ezekiel's temple vision denotes the restricted/separate area west of the temple complex. 'Separate area' preserves the technical sense without overinterpreting it as merely a 'yard'.
- source_word: לִשְׁכּוֹת הַקֹּדֶשׁ
  chosen: the holy chambers
  alternatives:
  - the sacred chambers
  lexicon: HALOT
  rationale: The phrase identifies these rooms as consecrated spaces. 'Holy' is the standard biblical rendering for קדשׁ and maintains consistency with surrounding holiness language.
- source_word: קְרוֹבִים לַיהוָה
  chosen: who draw near to the LORD
  alternatives:
  - who come near to the LORD
  - who approach the LORD
  lexicon: HALOT
  rationale: The participle expresses priestly access in cultic service, not mere physical proximity. 'Draw near' is established biblical English for sacrificial/priestly approach and preserves the ritual nuance.
- source_word: יֹאכְלוּ שָׁם
  chosen: shall eat ... there
  alternatives:
  - will eat ... there
  lexicon: HALOT
  rationale: The imperfect here is future in sense within the visionary instruction. 'Shall' fits the formal, directive tone of temple regulations.
- source_word: קָדְשֵׁי הַקֳּדָשִׁים
  chosen: the most holy things
  alternatives:
  - the holy of holies offerings
  - the most sacred things
  lexicon: HALOT
  rationale: Here the phrase refers not to the inner sanctuary but to offerings/items of highest sanctity, as shown by the following apposition naming offerings. 'Most holy things' preserves the superlative holiness category without confusing it with the room called the Holy of Holies.
- source_word: יַנִּיחוּ
  chosen: they shall place
  alternatives:
  - they shall set down
  - they shall deposit
  - they shall leave
  lexicon: HALOT
  rationale: The Hiphil of נוח here means to put/set down in a designated place. 'Place' is natural English and suits the cultic storage context better than the vaguer 'leave'.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the tribute offering
  - the offering
  lexicon: HALOT
  rationale: In priestly sacrificial contexts, מִנְחָה specifically denotes the grain offering. This is clearer for modern readers than the broader 'offering' and more contextually precise than 'tribute offering'.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: While some contexts emphasize purification, the traditional and still accurate cultic rendering 'sin offering' is clear and widely understood. The context lists standard sacrificial categories rather than foregrounding a technical purification nuance.
- source_word: הָאָשָׁם
  chosen: the guilt offering
  alternatives:
  - the reparation offering
  lexicon: HALOT
  rationale: '''Guilt offering'' is the standard rendering for אָשָׁם in sacrificial law and remains understandable. ''Reparation offering'' captures one aspect but is less familiar.'
- source_word: כִּי הַמָּקוֹם קָדֹשׁ
  chosen: for the place is holy
  alternatives:
  - because the place is holy
  lexicon: HALOT
  rationale: כִּי gives the reason these offerings are placed there. 'For' preserves the explanatory connection in a slightly more formal register appropriate to the passage.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,' following the project's stated default.
