id: EZK.42.2
reference: Ezekiel 42:2
source:
  edition: WLC
  text: אֶל פְּנֵי אֹ֨רֶךְ֙ אַמּ֣וֹת הַ/מֵּאָ֔ה פֶּ֖תַח הַ/צָּפ֑וֹן וְ/הָ/רֹ֖חַב חֲמִשִּׁ֥ים
    אַמּֽוֹת־־׃
translation:
  text: Facing the length of one hundred cubits was the north entrance, and the width
    was fifty cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In front of the length of one hundred cubits was the north entrance.'
      The Hebrew spatial expression is compact and may be rendered in several closely
      related ways.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל פְּנֵי
  chosen: Facing
  alternatives:
  - Toward the front of
  - In front of
  lexicon: HALOT
  rationale: The preposition plus פָּנִים idiom here expresses orientation/location
    relative to the measured structure. 'Facing' gives natural English while preserving
    the spatial sense better than a wooden 'to the face of.'
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - long side
  - extent
  lexicon: HALOT
  rationale: In architectural measurement contexts, אֹרֶךְ denotes the longitudinal
    dimension. 'Length' is the standard and clearest rendering.
- source_word: אַמּוֹת הַמֵּאָה
  chosen: one hundred cubits
  alternatives:
  - a hundred cubits
  lexicon: HALOT
  rationale: Retains the ancient unit אַמָּה as 'cubit' rather than converting to
    modern measurements, preserving the source text's architectural precision.
- source_word: פֶּתַח הַצָּפוֹן
  chosen: the north entrance
  alternatives:
  - the entrance on the north
  - the northern doorway
  lexicon: HALOT
  rationale: פֶּתַח is 'opening/entrance.' In this temple-building context, 'entrance'
    is more natural than 'opening.' The construct with 'the north' is rendered adjectivally
    in idiomatic English as 'the north entrance.'
- source_word: וְהָרֹחַב
  chosen: and the width was
  alternatives:
  - and the breadth was
  - with a width of
  lexicon: HALOT
  rationale: רֹחַב denotes the transverse dimension. 'Width' is contemporary and clear;
    supplying 'was' is required for smooth English in this verbless measurement clause.
- source_word: חֲמִשִּׁים אַמּוֹת
  chosen: fifty cubits
  lexicon: HALOT
  rationale: Straightforward numerical measurement; 'cubits' is retained for consistency
    with the preceding dimension and with temple-measurement contexts.
