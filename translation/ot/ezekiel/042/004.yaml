id: EZK.42.4
reference: Ezekiel 42:4
source:
  edition: WLC
  text: וְ/לִ/פְנֵ֨י הַ/לְּשָׁכ֜וֹת מַהֲלַךְ֩ עֶ֨שֶׂר אַמּ֥וֹת רֹ֨חַב֙ אֶל הַ/פְּנִימִ֔ית
    דֶּ֖רֶךְ אַמָּ֣ה אֶחָ֑ת וּ/פִתְחֵי/הֶ֖ם לַ/צָּפֽוֹן־׃
translation:
  text: Before the chambers was a walkway ten cubits wide toward the inner area, and
    a passage one cubit wide; and their entrances faced north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'toward the inner [side/area]'; the noun is not stated. Some translations
      supply 'court' ('toward the inner court'), but 'court' is not explicit in this
      verse.
    reason: alternative_reading
  - marker: b
    text: The Hebrew text is difficult in this clause. Some understand it as 'a way
      of one cubit' or, following a different vocalization/tradition, 'one hundred
      cubits.'
    reason: textual_variant
lexical_decisions:
- source_word: לִפְנֵי
  chosen: Before
  alternatives:
  - In front of
  - Facing
  lexicon: HALOT
  rationale: Spatial preposition indicating what lay in front of the chambers. 'Before'
    is concise and natural in architectural description.
- source_word: הַלְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the cells
  lexicon: HALOT
  rationale: לשכה in temple/building contexts refers to chambers or rooms. 'Chambers'
    fits the formal architectural setting of Ezekiel's temple vision.
- source_word: מַהֲלַךְ
  chosen: a walkway
  alternatives:
  - a passage
  - a corridor
  - a walk
  lexicon: HALOT
  rationale: The noun denotes a place for walking or a passageway. 'Walkway' best
    captures a traversable strip in front of the chambers without over-specifying
    a built corridor.
- source_word: עֶשֶׂר אַמּוֹת רֹחַב
  chosen: ten cubits wide
  alternatives:
  - a width of ten cubits
  - ten cubits in breadth
  lexicon: HALOT
  rationale: This is a standard measurement phrase. 'Ten cubits wide' is idiomatic
    modern English while preserving the source measurement.
- source_word: אֶל הַפְּנִימִית
  chosen: toward the inner area
  alternatives:
  - toward the inside
  - toward the inner court
  - on the inner side
  lexicon: HALOT
  rationale: The adjective 'inner' is feminine singular with the article, but the
    noun it qualifies is not expressed here. Because the referent is elliptical and
    debated, 'inner area' preserves the directional sense without importing 'court,'
    which is not present in the Hebrew of this verse.
- source_word: דֶּרֶךְ
  chosen: a passage
  alternatives:
  - a way
  - a path
  - a walkway
  lexicon: HALOT
  rationale: In this architectural context, דרך likely denotes a way/access route
    distinct from מהלך. Rendering it 'passage' helps preserve the distinction between
    the broader walkway and the narrower access way.
- source_word: אַמָּה אֶחָת
  chosen: one cubit wide
  alternatives:
  - one cubit
  - a width of one cubit
  lexicon: HALOT
  rationale: Although 'wide' is not repeated explicitly after דרך, English requires
    the dimensional sense to be made clear. Supplying 'wide' is contextually warranted
    from the preceding measurement construction.
- source_word: וּפִתְחֵיהֶם
  chosen: and their entrances
  alternatives:
  - and their doorways
  - and their openings
  lexicon: HALOT
  rationale: פתח can mean opening, doorway, or entrance. 'Entrances' reads naturally
    for chamber access points and matches the plural suffix 'their.'
- source_word: לַצָּפוֹן
  chosen: faced north
  alternatives:
  - were toward the north
  - were on the north side
  lexicon: HALOT
  rationale: The phrase indicates orientation. 'Faced north' expresses the architectural
    direction clearly in idiomatic English.
