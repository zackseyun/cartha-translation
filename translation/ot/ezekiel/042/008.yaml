id: EZK.42.8
reference: Ezekiel 42:8
source:
  edition: WLC
  text: כִּֽי אֹ֣רֶךְ הַ/לְּשָׁכ֗וֹת אֲשֶׁ֛ר לֶ/חָצֵ֥ר הַ/חִֽצוֹנָ֖ה חֲמִשִּׁ֣ים אַמָּ֑ה
    וְ/הִנֵּ֛ה עַל פְּנֵ֥י הַ/הֵיכָ֖ל מֵאָ֥ה אַמָּֽה־־׃
translation:
  text: For the length of the chambers that were by the outer court was fifty cubits,
    and behold, the part facing the temple was a hundred cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in front of the temple was a hundred cubits.' The Hebrew phrase may
      describe the chambers' side facing the temple or the measurement of the area
      before the temple.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory statement continuing the measurement description
    from the preceding context. 'For' fits the discourse flow better than a stronger
    causal 'because' or merely asseverative 'indeed'.
- source_word: אֹרֶךְ
  chosen: length
  alternatives:
  - extent
  lexicon: HALOT
  rationale: Standard architectural measurement term in this temple-vision context;
    'length' is the most natural and precise rendering.
- source_word: לְשָׁכוֹת
  chosen: chambers
  alternatives:
  - rooms
  - cells
  lexicon: HALOT
  rationale: In Ezekiel's temple vision this term refers to built side-rooms/chambers,
    not generic interior rooms. 'Chambers' preserves the architectural register used
    throughout the passage.
- source_word: אֲשֶׁר לֶחָצֵר הַחִיצוֹנָה
  chosen: that were by the outer court
  alternatives:
  - that belonged to the outer court
  - that were toward the outer court
  lexicon: HALOT
  rationale: The phrase locates these chambers in relation to the outer court. 'By
    the outer court' is idiomatic English that preserves the spatial sense without
    over-specifying possession.
- source_word: חֲמִשִּׁים אַמָּה
  chosen: fifty cubits
  alternatives:
  - fifty cubit(s)
  lexicon: HALOT
  rationale: Standard rendering of the measurement expression. 'Cubits' is retained
    rather than converted to modern units to preserve the source-text's measurement
    system.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - now behold
  lexicon: HALOT
  rationale: Marks attention to a notable contrast in measurements. 'And behold' preserves
    the demonstrative force and the elevated descriptive style of the vision report.
- source_word: עַל פְּנֵי
  chosen: facing
  alternatives:
  - in front of
  - opposite
  lexicon: HALOT
  rationale: In this spatial context the idiom indicates orientation toward or in
    front of the temple. 'Facing' is concise and natural in English architectural
    description.
- source_word: הַהֵיכָל
  chosen: the temple
  alternatives:
  - the nave
  - the sanctuary building
  lexicon: HALOT
  rationale: Here הֵיכָל refers to the main temple structure in the visionary complex.
    'Temple' is the clearest rendering for modern readers, while more technical options
    would be less accessible.
- source_word: מֵאָה אַמָּה
  chosen: a hundred cubits
  alternatives:
  - one hundred cubits
  lexicon: HALOT
  rationale: Standard rendering of the measurement phrase; 'a hundred cubits' is natural
    English and matches the architectural style of the passage.
