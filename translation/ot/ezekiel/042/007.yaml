id: EZK.42.7
reference: Ezekiel 42:7
source:
  edition: WLC
  text: וְ/גָדֵ֤ר אֲשֶׁר לַ/חוּץ֙ לְ/עֻמַּ֣ת הַ/לְּשָׁכ֔וֹת דֶּ֛רֶךְ הֶ/חָצֵ֥ר הַ/חִֽצוֹנָ֖ה
    אֶל פְּנֵ֣י הַ/לְּשָׁכ֑וֹת אָרְכּ֖/וֹ חֲמִשִּׁ֥ים אַמָּֽה־־׃
translation:
  text: And the wall that was outside, parallel to the chambers, toward the outer
    court, in front of the chambers—its length was fifty cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite the chambers.' The Hebrew preposition can denote correspondence
      or facing position; 'parallel to' is chosen here because the verse describes
      architectural alignment and measurement.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָדֵר
  chosen: wall
  alternatives:
  - fence
  - barrier
  lexicon: HALOT
  rationale: גדר denotes an enclosing structure or partition. In this architectural
    temple context, 'wall' is the most natural English rendering, while 'fence' could
    sound too light or temporary.
- source_word: לַחוּץ
  chosen: outside
  alternatives:
  - on the outside
  - outward
  lexicon: HALOT
  rationale: The phrase marks exterior location relative to the chambers. 'Outside'
    is concise and idiomatic.
- source_word: לְעֻמַּת
  chosen: parallel to
  alternatives:
  - opposite
  - corresponding to
  - alongside
  lexicon: HALOT
  rationale: The preposition can mean 'opposite' or 'corresponding to.' Given the
    architectural description and measurements, 'parallel to' best conveys spatial
    alignment rather than mere facing.
- source_word: לְּשָׁכוֹת
  chosen: chambers
  alternatives:
  - rooms
  - cells
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, לשכות refers to designated rooms/chambers
    in the complex. 'Chambers' preserves the formal architectural sense better than
    'rooms'.
- source_word: דֶּרֶךְ
  chosen: toward
  alternatives:
  - by way of
  - along the side of
  - in the direction of
  lexicon: HALOT
  rationale: Here דרך functions adverbially/prepositionally in a spatial description.
    'Toward the outer court' gives clear modern English without over-literal awkwardness.
- source_word: הֶחָצֵר הַחִיצוֹנָה
  chosen: the outer court
  alternatives:
  - the outer courtyard
  lexicon: HALOT
  rationale: This is the standard architectural term in temple contexts. 'Court' is
    concise and conventional; 'courtyard' is possible but slightly less consistent
    with temple terminology.
- source_word: אֶל־פְּנֵי
  chosen: in front of
  alternatives:
  - facing
  - before
  lexicon: HALOT
  rationale: The idiom indicates position before or facing something. 'In front of'
    is the clearest spatial rendering in English.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - its extent
  lexicon: HALOT
  rationale: The suffix refers back to the wall/barrier being measured. 'Its length'
    is the straightforward architectural measurement term.
- source_word: חֲמִשִּׁים אַמָּה
  chosen: fifty cubits
  alternatives:
  - seventy-five feet
  lexicon: HALOT
  rationale: The source uses the ancient unit אַמָּה. Per transparent translation
    practice, the unit is preserved as 'cubits' rather than converted in the main
    text.
