id: EZK.42.20
reference: Ezekiel 42:20
source:
  edition: WLC
  text: לְ/אַרְבַּ֨ע רוּח֜וֹת מְדָד֗/וֹ ח֤וֹמָה ל/וֹ֙ סָבִ֣יב סָבִ֔יב אֹ֚רֶךְ חֲמֵ֣שׁ
    מֵא֔וֹת וְ/רֹ֖חַב חֲמֵ֣שׁ מֵא֑וֹת לְ/הַבְדִּ֕יל בֵּ֥ין הַ/קֹּ֖דֶשׁ לְ/חֹֽל׀׃
translation:
  text: He measured it on the four sides; it had a wall all around, five hundred long
    and five hundred wide, to make a separation between the holy and the common.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the four directions' or 'on the four winds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'between the holy and the profane.' The Hebrew contrasts what is holy
      with what is common, that is, not set apart as holy.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְאַרְבַּע רוּחוֹת
  chosen: on the four sides
  alternatives:
  - toward the four winds
  - for the four directions
  lexicon: HALOT
  rationale: רוּחוֹת literally means 'winds' or 'directions.' In this architectural
    measuring context, the idiom refers to the four directions/sides of the structure.
    'On the four sides' is natural English and fits the spatial sense.
- source_word: מְדָדוֹ
  chosen: He measured it
  alternatives:
  - he measured him
  - its measurement was
  lexicon: HALOT
  rationale: The verb is Qal perfect 3ms with 3ms suffix, most naturally 'he measured
    it.' The masculine suffix refers back to the complex/area under discussion. English
    requires an object, and 'it' is the clearest rendering.
- source_word: חוֹמָה לוֹ סָבִיב סָבִיב
  chosen: it had a wall all around
  alternatives:
  - a wall was around it all around
  - with a wall around it on every side
  lexicon: HALOT
  rationale: חוֹמָה is 'wall.' The repeated סָבִיב intensifies the encircling sense.
    Rendering as 'it had a wall all around' preserves the meaning in idiomatic English
    without awkward literal repetition.
- source_word: אֹרֶךְ חֲמֵשׁ מֵאוֹת וְרֹחַב חֲמֵשׁ מֵאוֹת
  chosen: five hundred long and five hundred wide
  alternatives:
  - a length of five hundred and a width of five hundred
  - five hundred cubits long and five hundred cubits wide
  lexicon: HALOT
  rationale: The Hebrew states the dimensions as length and width, each five hundred.
    'Long and wide' is concise and natural. 'Cubits' is not explicit in this verse,
    though the broader context discusses measuring units; it should not be imported
    into the main text here.
- source_word: לְהַבְדִּיל
  chosen: to make a separation
  alternatives:
  - to separate
  - to divide
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the wall exists ''to separate'' or
    ''to make a separation.'' The chosen wording preserves the purposive nuance and
    reads smoothly with the following phrase.'
- source_word: בֵּין הַקֹּדֶשׁ לְחֹל
  chosen: between the holy and the common
  alternatives:
  - between the holy and the profane
  - between the sacred and the common
  lexicon: HALOT
  rationale: הַקֹּדֶשׁ is 'the holy [thing/place]' and חֹל denotes what is common
    or non-holy, not necessarily morally evil. 'Common' better preserves the cultic
    contrast than 'profane,' which can suggest irreverence or wickedness beyond the
    Hebrew term.
