theological_decisions:
- issue: Cultic contrast in חֹל מול קֹדֶשׁ
  chosen_reading: Render חֹל as 'the common' rather than 'the profane.'
  alternative_readings:
  - the profane
  - the ordinary
  rationale: The verse concerns sacred space and ritual distinction, not primarily
    moral corruption. 'Common' preserves the holiness-category distinction without
    overstating defilement. This maintains theological precision in temple language.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
