id: EZK.42.14
reference: Ezekiel 42:14
source:
  edition: WLC
  text: בְּ/בֹאָ֣/ם הַ/כֹּהֲנִ֗ים וְ/לֹֽא יֵצְא֤וּ מֵ/הַ/קֹּ֨דֶשׁ֙ אֶל הֶ/חָצֵ֣ר הַ/חִיצוֹנָ֔ה
    וְ/שָׁ֞ם יַנִּ֧יחוּ בִגְדֵי/הֶ֛ם אֲשֶׁר יְשָׁרְת֥וּ בָ/הֶ֖ן כִּֽי קֹ֣דֶשׁ הֵ֑נָּה
    ילבשו בְּגָדִ֣ים אֲחֵרִ֔ים וְ/קָרְב֖וּ אֶל אֲשֶׁ֥ר לָ/עָֽם־־־־־׃
translation:
  text: When the priests enter, they shall not go out from the holy place into the
    outer court, but there they shall leave their garments in which they minister,
    for they are holy. They shall put on other garments, and then approach what belongs
    to the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that which is for the people'; the Hebrew expression is elliptical and
      may refer to the area accessible to the people.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּבֹאָם
  chosen: When ... enter
  alternatives:
  - At their entering
  - On entering
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with suffix introduces a
    temporal clause. 'When ... enter' is natural modern English and preserves the
    temporal force.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun.
- source_word: וְלֹא יֵצְאוּ
  chosen: they shall not go out
  alternatives:
  - they must not go out
  - they are not to go out
  lexicon: HALOT
  rationale: Imperfect in this instructional temple context carries directive/future
    force. 'Shall not go out' fits the legal-regulative tone without overparaphrase.
- source_word: מֵהַקֹּדֶשׁ
  chosen: from the holy place
  alternatives:
  - from the sanctuary
  - from the holy area
  lexicon: HALOT
  rationale: קֹדֶשׁ here refers to the sacred inner area, contrasted with the outer
    court. 'Holy place' is sufficiently literal and clear.
- source_word: אֶל הֶחָצֵר הַחִיצוֹנָה
  chosen: into the outer court
  alternatives:
  - to the outer court
  lexicon: HALOT
  rationale: The phrase marks movement from the sacred area toward the less restricted
    court. 'Into the outer court' is idiomatic for the prohibited movement.
- source_word: וְשָׁם יַנִּיחוּ
  chosen: but there they shall leave
  alternatives:
  - and there they shall set down
  - and there they shall deposit
  lexicon: HALOT
  rationale: The verb means to place or leave. In context of changing garments, 'leave'
    is the clearest English choice.
- source_word: בִגְדֵיהֶם
  chosen: their garments
  alternatives:
  - their clothes
  - their vestments
  lexicon: HALOT
  rationale: '''Garments'' is a neutral, dignified term suitable for priestly clothing
    without importing later ecclesiastical terminology.'
- source_word: אֲשֶׁר יְשָׁרְתוּ בָהֶן
  chosen: in which they minister
  alternatives:
  - with which they minister
  - in which they serve
  lexicon: HALOT
  rationale: שרת in priestly contexts often denotes liturgical service. 'Minister'
    preserves the cultic sense better than the flatter 'serve.' The preposition is
    naturally rendered 'in which' with garments.
- source_word: כִּי קֹדֶשׁ הֵנָּה
  chosen: for they are holy
  alternatives:
  - because these are holy
  - for those garments are holy
  lexicon: HALOT
  rationale: The feminine plural pronoun refers back to the garments. 'They are holy'
    is concise and preserves the causal explanation.
- source_word: יִלְבְּשׁוּ בְּגָדִים אֲחֵרִים
  chosen: They shall put on other garments
  alternatives:
  - They shall wear other clothes
  - They must clothe themselves with other garments
  lexicon: HALOT
  rationale: Simple and direct rendering of the action required before entering a
    different sphere.
- source_word: וְקָרְבוּ
  chosen: and then approach
  alternatives:
  - and come near
  - and draw near
  lexicon: HALOT
  rationale: קרב often means 'come near/approach.' Here it refers to moving toward
    the area associated with the people after changing clothes. 'Approach' is clear
    and avoids overly technical cultic wording in English.
- source_word: אֶל אֲשֶׁר לָעָם
  chosen: what belongs to the people
  alternatives:
  - that which is for the people
  - the place for the people
  - the area belonging to the people
  lexicon: HALOT
  rationale: The expression is elliptical. Rather than supply an explicit noun not
    present in Hebrew, 'what belongs to the people' preserves the terseness while
    making sense in English. It likely refers to the area or matters accessible to
    the people.
