theological_decisions:
- issue: Nature of priestly holiness and garment sanctity
  chosen_reading: The garments are treated as holy because of their use in priestly
    ministry, requiring separation from the common sphere.
  alternative_readings:
  - The phrase could be read more spatially as referring specifically to a designated
    chamber before entering the people's area.
  rationale: The verse regulates movement between sacred and common space. The translation
    keeps the holiness language explicit and does not flatten it into mere ritual
    procedure.
