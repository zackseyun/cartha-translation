id: EZK.42.11
reference: Ezekiel 42:11
source:
  edition: WLC
  text: וְ/דֶ֨רֶךְ֙ לִ/פְנֵי/הֶ֔ם כְּ/מַרְאֵ֣ה הַ/לְּשָׁכ֗וֹת אֲשֶׁר֙ דֶּ֣רֶךְ הַ/צָּפ֔וֹן
    כְּ/אָרְכָּ֖/ן כֵּ֣ן רָחְבָּ֑/ן וְ/כֹל֙ מוֹצָ֣אֵי/הֶ֔ן וּ/כְ/מִשְׁפְּטֵי/הֶ֖ן
    וּ/כְ/פִתְחֵי/הֶֽן׃
translation:
  text: And before them was a walkway, like the appearance of the chambers that faced
    north; as was their length, so was their width, and all their exits, their arrangements,
    and their entrances were alike.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in front of them was a passage corresponding to the appearance of the
      chambers on the north side.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'arrangements' can also mean 'ordinances,' 'regulations,'
      or 'prescribed manner'; here it likely refers to the structural layout or prescribed
      design of the chambers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדֶרֶךְ
  chosen: a walkway
  alternatives:
  - a way
  - a passage
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way/road/path,' but in this architectural temple
    context it refers to a built access route in front of the chambers. 'Walkway'
    best conveys a physical passage without over-specifying.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: The preposition plus פָּנִים indicates spatial position. 'Before them'
    is natural and sufficiently literal in English; the referent is the chambers just
    described.
- source_word: כְּמַרְאֵה
  chosen: like the appearance of
  alternatives:
  - according to the appearance of
  - similar to
  lexicon: HALOT
  rationale: מַרְאֶה denotes appearance or visual form. The phrase introduces comparison
    of layout/form with the north-side chambers.
- source_word: הַלְּשָׁכוֹת
  chosen: the chambers
  alternatives:
  - the rooms
  - the cells
  lexicon: HALOT
  rationale: לְשָׁכָה in temple/building contexts is conventionally 'chamber.' 'Rooms'
    is possible but less specific to the architectural register of Ezekiel's vision.
- source_word: אֲשֶׁר דֶּרֶךְ הַצָּפוֹן
  chosen: that faced north
  alternatives:
  - that were on the north side
  - that were toward the north
  lexicon: HALOT
  rationale: Literally 'which [were] the way of the north.' In context this idiom
    indicates orientation/location toward the north. 'Faced north' is concise and
    fits the architectural comparison.
- source_word: כְּאָרְכָּן כֵּן רָחְבָּן
  chosen: as was their length, so was their width
  alternatives:
  - their width corresponded to their length
  - according to their length, so their width
  lexicon: HALOT
  rationale: The correlative construction compares dimensions of one set of chambers
    with the other. This rendering preserves the Hebrew balance and keeps the focus
    on corresponding proportions.
- source_word: וְכֹל מוֹצָאֵיהֶן
  chosen: and all their exits
  alternatives:
  - and all their outlets
  - and all their access points
  lexicon: HALOT
  rationale: מוֹצָא can denote place of going out, exit, or outlet. In an architectural
    description, 'exits' is the clearest English choice, though the exact nuance may
    include points of access/egress more broadly.
- source_word: וּכְמִשְׁפְּטֵיהֶן
  chosen: their arrangements
  alternatives:
  - their ordinances
  - their regulations
  - their plan
  lexicon: HALOT
  rationale: מִשְׁפָּט often means judgment/ordinance, but in building descriptions
    it can denote prescribed arrangement, rule, or manner. 'Arrangements' fits the
    architectural context better than legal-sounding options.
- source_word: וּכְפִתְחֵיהֶן
  chosen: their entrances
  alternatives:
  - their doorways
  - their openings
  lexicon: HALOT
  rationale: פֶּתַח refers to an opening/entrance. 'Entrances' is idiomatic and matches
    the building context.
- source_word: implicit comparison across final clauses
  chosen: were alike
  alternatives:
  - corresponded
  - matched
  lexicon: HALOT
  rationale: The Hebrew strings comparative phrases without an explicit finite verb
    at the end. Supplying 'were alike' makes the English sentence complete and reflects
    the sense that the exits, arrangements, and entrances corresponded to those of
    the north chambers.
