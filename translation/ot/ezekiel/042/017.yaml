id: EZK.42.17
reference: Ezekiel 42:17
source:
  edition: WLC
  text: מָדַ֖ד ר֣וּחַ הַ/צָּפ֑וֹן חֲמֵשׁ מֵא֥וֹת קָנִ֛ים בִּ/קְנֵ֥ה הַ/מִּדָּ֖ה סָבִֽיב־׃
translation:
  text: 'He measured the north side: five hundred reeds, by the measuring reed all
    around.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''five hundred reeds.'' Some manuscripts and ancient versions have
      a reading reflected in some translations as ''five hundred cubits.'' The main
      text follows the Masoretic Hebrew here.'
    reason: textual_variant
lexical_decisions:
- source_word: מָדַד
  chosen: He measured
  alternatives:
  - he measured off
  lexicon: HALOT
  rationale: Qal perfect 3ms of מדד, narrating the measuring action performed by the
    man in the vision. Simple past fits the sequence.
- source_word: רוּחַ הַצָּפוֹן
  chosen: the north side
  alternatives:
  - the north wind
  - the north direction
  lexicon: HALOT
  rationale: רוּחַ can mean wind, direction, or side; with הַצָּפוֹן in this architectural
    measuring context, it denotes the northern side/direction of the complex, not
    wind.
- source_word: חֲמֵשׁ מֵאוֹת
  chosen: five hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: קָנִים
  chosen: reeds
  alternatives:
  - cubits
  lexicon: HALOT
  rationale: קָנֶה means reed, and in this context specifically the measuring reed
    unit. The Hebrew here explicitly says reeds, not cubits. This is important because
    some translations reflect a textual or interpretive tradition of 'cubits.'
- source_word: בִּקְנֵה הַמִּדָּה
  chosen: by the measuring reed
  alternatives:
  - with the measuring reed
  - according to the measuring reed
  lexicon: HALOT
  rationale: Instrumental beth indicates the means or standard by which the measurement
    was taken. 'By the measuring reed' is natural English and preserves the instrumentality.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: HALOT
  rationale: Adverbial term indicating the encompassing perimeter measurement. 'All
    around' is idiomatic modern English and preserves the sense.
