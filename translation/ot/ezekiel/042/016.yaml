id: EZK.42.16
reference: Ezekiel 42:16
source:
  edition: WLC
  text: מָדַ֛ד ר֥וּחַ הַ/קָּדִ֖ים בִּ/קְנֵ֣ה הַ/מִּדָּ֑ה חֲמֵשׁ אמות קָנִ֛ים בִּ/קְנֵ֥ה
    הַ/מִּדָּ֖ה סָבִֽיב־׃
translation:
  text: 'He measured the east side with the measuring reed: five hundred reeds by
    the measuring reed, all around.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally reads 'five cubits, reeds.' In context, this is commonly
      understood as 'five hundred reeds,' in harmony with the surrounding measurements
      (vv. 16–19). Some manuscripts and ancient versions reflect this more explicitly.
    reason: textual_variant
lexical_decisions:
- source_word: מָדַד
  chosen: He measured
  alternatives:
  - He measured off
  lexicon: HALOT
  rationale: Qal perfect 3ms of מדד, straightforward narrative verb introducing the
    action of taking measurements.
- source_word: רוּחַ הַקָּדִים
  chosen: the east side
  alternatives:
  - the east wind
  - the eastern direction
  lexicon: HALOT
  rationale: In architectural measurement context, רוּחַ with a directional term denotes
    a side/direction rather than wind. 'East side' is the most natural English in
    this temple-description setting.
- source_word: בִּקְנֵה הַמִּדָּה
  chosen: with the measuring reed
  alternatives:
  - by the measuring reed
  - using the measuring reed
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: the measuring is done by means
    of the reed. ''With the measuring reed'' is idiomatic and precise.'
- source_word: חֲמֵשׁ אמות קָנִים
  chosen: five hundred reeds
  alternatives:
  - five hundred cubits
  - five cubits, reeds
  - five hundred cubit-reeds
  lexicon: HALOT
  rationale: Although the consonantal text includes אמות ('cubits'), the phrase is
    best understood in light of the repeated קָנִים and the immediate context as 'five
    hundred reeds,' matching the measuring formula used in this passage. Rendering
    'five cubits, reeds' is not coherent English here, and 'five hundred cubits' would
    flatten the distinction between cubits and reeds.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: HALOT
  rationale: Adverb indicating the perimeter/circuit of the measured side. 'All around'
    communicates the enclosing measurement naturally in modern English.
