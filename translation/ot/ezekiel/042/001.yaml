id: EZK.42.1
reference: Ezekiel 42:1
source:
  edition: WLC
  text: וַ/יּוֹצִאֵ֗/נִי אֶל הֶֽ/חָצֵר֙ הַ/חִ֣יצוֹנָ֔ה הַ/דֶּ֖רֶךְ דֶּ֣רֶךְ הַ/צָּפ֑וֹן
    וַ/יְבִאֵ֣/נִי אֶל הַ/לִּשְׁכָּ֗ה אֲשֶׁ֨ר נֶ֧גֶד הַ/גִּזְרָ֛ה וַ/אֲשֶֽׁר נֶ֥גֶד
    הַ/בִּנְיָ֖ן אֶל הַ/צָּפֽוֹן־־־־׃
translation:
  text: Then he brought me out into the outer court by the way toward the north, and
    he brought me to the chamber that was opposite the separate area and opposite
    the building on the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the way, way of the north,' an idiomatic directional expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'the separate place.' The Hebrew term refers to a distinct set-apart
      area in Ezekiel's temple vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִאֵנִי
  chosen: Then he brought me out
  alternatives:
  - Then he led me out
  - Then he took me out
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause to go out, hence 'bring out' is a natural
    English equivalent. 'Then' reflects the narrative waw-consecutive sequence.
- source_word: הֶחָצֵר הַחִיצוֹנָה
  chosen: the outer court
  alternatives:
  - the outer courtyard
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard'; 'court' is concise and standard in temple-vision
    contexts. הַחִיצוֹנָה specifies the outer one.
- source_word: הַדֶּרֶךְ דֶּרֶךְ הַצָּפוֹן
  chosen: by the way toward the north
  alternatives:
  - by way of the north
  - by the north way
  - along the way to the north
  lexicon: HALOT
  rationale: The repeated דֶּרֶךְ is idiomatic and directional. Rendering it 'by the
    way toward the north' preserves the Hebrew's route language without awkward literal
    repetition in English.
- source_word: וַיְבִאֵנִי
  chosen: and he brought me to
  alternatives:
  - and he led me to
  - and he brought me in to
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring' or 'lead.' 'Brought me to' fits
    the movement into the next location without over-specifying entry into an interior.
- source_word: הַלִּשְׁכָּה
  chosen: the chamber
  alternatives:
  - the room
  - the cell
  lexicon: HALOT
  rationale: לִשְׁכָּה in temple architecture commonly denotes a chamber/room. Singular
    'the chamber' follows the form of the MT, even though the broader context discusses
    chamber structures.
- source_word: נֶגֶד
  chosen: opposite
  alternatives:
  - in front of
  - facing
  lexicon: HALOT
  rationale: נֶגֶד here marks spatial correspondence. 'Opposite' best fits the architectural
    description and works consistently for both occurrences.
- source_word: הַגִּזְרָה
  chosen: the separate area
  alternatives:
  - the separate place
  - the restricted area
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, גִּזְרָה refers to a distinct separated section
    of the complex. 'Separate area' is clear modern English and preserves the notion
    of set-apart space without importing a more technical term than the text itself
    requires.
- source_word: הַבִּנְיָן
  chosen: the building
  alternatives:
  - the structure
  - the edifice
  lexicon: HALOT
  rationale: בִּנְיָן is a general term for a building/structure. 'Building' is the
    most straightforward rendering in this architectural context.
- source_word: אֶל הַצָּפוֹן
  chosen: on the north
  alternatives:
  - to the north
  - northward
  lexicon: HALOT
  rationale: The final directional phrase most naturally qualifies the location of
    the building/chamber complex. 'On the north' reads idiomatically in English architectural
    description while preserving the directional sense.
