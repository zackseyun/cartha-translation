id: EZK.2.5
reference: Ezekiel 2:5
source:
  edition: WLC
  text: וְ/הֵ֨מָּה֙ אִם יִשְׁמְע֣וּ וְ/אִם יֶחְדָּ֔לוּ כִּ֛י בֵּ֥ית מְרִ֖י הֵ֑מָּה
    וְ/יָ֣דְע֔וּ כִּ֥י נָבִ֖יא הָיָ֥ה בְ/תוֹכָֽ/ם־־׃פ
translation:
  text: And whether they listen or refuse to listen—for they are a rebellious house—they
    will know that a prophet has been among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether they hear or refrain'; the Hebrew literally contrasts 'hear'
      with 'cease/refrain,' here meaning refusal to heed the message.
    reason: lexical_alternative
  - marker: b
    text: Or 'has been in their midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם יִשְׁמְעוּ ... וְאִם יֶחְדָּלוּ
  chosen: whether they listen or refuse to listen
  alternatives:
  - whether they hear or cease
  - if they listen and if they refrain
  lexicon: HALOT
  rationale: The paired conditional construction expresses two possibilities without
    changing the outcome. יִשְׁמְעוּ is naturally 'listen/hear.' יֶחְדָּלוּ literally
    means 'cease/refrain,' but in this prophetic context it idiomatically means refraining
    from heeding the message, hence 'refuse to listen' for clear modern English.
- source_word: בֵּית מְרִי
  chosen: a rebellious house
  alternatives:
  - a house of rebellion
  - a rebellious people
  lexicon: HALOT
  rationale: A common Ezekiel expression. 'House' preserves the Hebrew metaphor and
    covenantal/corporate sense better than flattening to 'people,' while 'rebellious'
    renders מְרִי idiomatically.
- source_word: וְיָדְעוּ
  chosen: they will know
  alternatives:
  - then they will know
  - they shall know
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction after the conditional sequence carries
    future/result sense in context. 'Will know' is natural modern English; 'then'
    is implied but not required in the main text.
- source_word: נָבִיא
  chosen: a prophet
  lexicon: HALOT
  rationale: Straightforward rendering of the noun; the indefinite sense fits the
    Hebrew here.
- source_word: הָיָה בְתוֹכָם
  chosen: has been among them
  alternatives:
  - was among them
  - has been in their midst
  lexicon: HALOT
  rationale: Literally 'was in their midst/among them.' English present perfect ('has
    been among them') communicates the completed presence of the prophet with present
    significance after the prophetic encounter. 'Among them' is more idiomatic than
    'in their midst' while preserving the sense.
- source_word: וְהֵמָּה
  chosen: And
  alternatives:
  - As for them
  - And they
  lexicon: HALOT
  rationale: The pronoun is fronted for emphasis, but English does not require explicit
    repetition here. The conjunction is retained, and the emphasis is sufficiently
    conveyed by the clause structure.
