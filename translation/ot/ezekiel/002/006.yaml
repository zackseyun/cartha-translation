id: EZK.2.6
reference: Ezekiel 2:6
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָ֠דָם אַל תִּירָ֨א מֵ/הֶ֜ם וּ/מִ/דִּבְרֵי/הֶ֣ם אַל תִּירָ֗א
    כִּ֣י סָרָבִ֤ים וְ/סַלּוֹנִים֙ אוֹתָ֔/ךְ וְ/אֶל עַקְרַבִּ֖ים אַתָּ֣ה יוֹשֵׁ֑ב
    מִ/דִּבְרֵי/הֶ֤ם אַל תִּירָא֙ וּ/מִ/פְּנֵי/הֶ֣ם אַל תֵּחָ֔ת כִּ֛י בֵּ֥ית מְרִ֖י
    הֵֽמָּה־־־־־־׃
translation:
  text: But you, son of man, do not fear them, and do not fear their words, though
    briers and thorns are with you and you sit among scorpions. Do not fear their
    words, and do not be dismayed by their faces, for they are a rebellious house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'though rebels and thorns are with you.' The Hebrew word rendered
      'briers' is difficult and has been understood in more than one way, but the
      surrounding imagery favors a thorny-hazard metaphor.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by their faces'; that is, by their intimidating appearance or
      presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Retains the idiomatic address used throughout Ezekiel and preserves the
    masculine singular form. 'Human one' or 'mortal' are possible sense renderings,
    but 'son of man' best reflects the source wording and its repeated rhetorical
    force in this book.
- source_word: תִּירָא
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: A straightforward rendering of ירא in the prohibition. 'Fear' is slightly
    more formal and matches the repeated imperative structure in the verse.
- source_word: דִּבְרֵיהֶם
  chosen: their words
  alternatives:
  - what they say
  - their speech
  lexicon: HALOT
  rationale: Keeps the concrete plural noun 'words' rather than paraphrasing, preserving
    the repetition and verbal hostility implied in context.
- source_word: סָרָבִים
  chosen: briers
  alternatives:
  - rebels
  - stinging weeds
  - thornbushes
  lexicon: HALOT
  rationale: In this context the term is best taken metaphorically with the paired
    plant image that follows. Some have proposed a sense like 'rebels' from a different
    semantic association, but the immediate collocation with 'thorns' and 'scorpions'
    favors a hazardous-image rendering.
- source_word: סַלּוֹנִים
  chosen: thorns
  alternatives:
  - prickles
  - thornbushes
  lexicon: HALOT
  rationale: A natural English equivalent for the paired image with סָרָבִים. Chosen
    for readability while preserving the painful, hostile metaphor.
- source_word: אוֹתָךְ
  chosen: are with you
  alternatives:
  - are against you
  - surround you
  lexicon: HALOT
  rationale: The object marker with second-person suffix after the nominal pair is
    elliptical. 'Are with you' reflects the adversarial circumstance without over-interpreting
    the syntax; the hostility is already conveyed by the imagery.
- source_word: עַקְרַבִּים
  chosen: scorpions
  lexicon: HALOT
  rationale: Direct lexical equivalent; the metaphor of danger and hostility is transparent
    in English.
- source_word: יוֹשֵׁב
  chosen: you sit among
  alternatives:
  - you dwell among
  - you live among
  lexicon: HALOT
  rationale: '''Sit'' is the literal participial sense, but adding ''among'' makes
    the English idiomatic with the preceding preposition and preserves the image of
    being placed in a hostile setting.'
- source_word: מִפְּנֵיהֶם
  chosen: by their faces
  alternatives:
  - before them
  - by their presence
  - by their looks
  lexicon: HALOT
  rationale: The Hebrew literally refers to their 'faces,' often conveying intimidating
    appearance or presence. 'By their faces' keeps the concrete imagery, though the
    sense is intimidation by their demeanor.
- source_word: תֵּחָת
  chosen: do not be dismayed
  alternatives:
  - do not be shattered
  - do not be terrified
  lexicon: HALOT
  rationale: חתת in the Niphal commonly carries the sense of being broken down or
    dismayed. 'Dismayed' fits the emotional force and pairs well with the repeated
    'do not fear.'
- source_word: בֵּית מְרִי
  chosen: a rebellious house
  alternatives:
  - a rebellious people
  - a house of rebellion
  lexicon: HALOT
  rationale: A standard Ezekiel expression. 'House' preserves the Hebrew metaphor
    for the corporate people, while 'rebellious' captures the covenantal defiance
    implied by מְרִי.
