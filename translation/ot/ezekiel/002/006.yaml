theological_decisions:
- issue: Rendering of אָדָם in the address בֶן אָדָם
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The doctrine calls for gender-accurate rendering where the source is
    masculine and representative. Here the expression is Ezekiel's recurring divine
    address, so preserving 'son of man' is preferable to smoothing it into a gender-neutral
    paraphrase.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Metaphorical force of the hostile imagery
  chosen_reading: Retain the imagery of briers, thorns, and scorpions rather than
    flattening it into an abstract statement about opposition
  alternative_readings:
  - They are rebels and harmful people
  - Though they are hostile to you
  rationale: Optimal equivalence here favors preserving the vivid prophetic metaphors
    because they are central to the rhetoric of the verse and do not impede comprehension.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
