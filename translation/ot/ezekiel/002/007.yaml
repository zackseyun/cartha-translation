id: EZK.2.7
reference: Ezekiel 2:7
source:
  edition: WLC
  text: וְ/דִבַּרְתָּ֤ אֶת דְּבָרַ/י֙ אֲלֵי/הֶ֔ם אִֽם יִשְׁמְע֖וּ וְ/אִם יֶחְדָּ֑לוּ
    כִּ֥י מְרִ֖י הֵֽמָּה־־־׃פ
translation:
  text: You shall speak my words to them, whether they listen or whether they refuse,
    for they are rebellious.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whether they hear or whether they refrain.' The Hebrew idiom contrasts
      response with refusal to heed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתָּ
  chosen: You shall speak
  alternatives:
  - and you shall speak
  - you must speak
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in directive context functions
    as an instruction to Ezekiel. 'You shall speak' gives the force of commission
    in natural English without over-paraphrasing.
- source_word: אֶת דְּבָרַי
  chosen: my words
  alternatives:
  - my message
  - my words
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'matter.' The plural with 1cs suffix
    is best kept as 'my words' to preserve the concrete link to God's actual speech
    rather than a more interpretive 'message.'
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - unto them
  lexicon: HALOT
  rationale: Standard directional preposition; 'to them' is the natural modern equivalent.
- source_word: אִם יִשְׁמְעוּ וְאִם יֶחְדָּלוּ
  chosen: whether they listen or whether they refuse
  alternatives:
  - if they hear and if they forbear
  - whether they hear or whether they refrain
  - whether they listen or not
  lexicon: HALOT
  rationale: This recurring Ezekiel formula contrasts response and non-response. יִשְׁמְעוּ
    can mean 'hear/listen/obey'; here 'listen' preserves the auditory sense without
    overstating obedience. יֶחְדָּלוּ literally means 'cease/refrain'; in this idiom
    it means refusing to heed. 'Whether they listen or whether they refuse' communicates
    the contrast clearly while staying close to the Hebrew sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the prophet's obligation regardless of their
    response; 'for' is the most straightforward connective.
- source_word: מְרִי הֵמָּה
  chosen: they are rebellious
  alternatives:
  - they are a rebellious house
  - they are rebellion
  - they are rebellious ones
  lexicon: HALOT
  rationale: מְרִי denotes rebellion/rebelliousness. Since 'house' is not present
    in this verse, it should not be supplied from nearby context. Predicate rendering
    'they are rebellious' is idiomatic English and preserves the characterization.
