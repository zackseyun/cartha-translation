theological_decisions:
- issue: Whether to render יִשְׁמְעוּ as 'hear' or 'obey'
  chosen_reading: listen
  alternative_readings:
  - hear
  - obey
  rationale: The Hebrew verb שׁמע can include obedience, but the immediate contrast
    with refusal/non-response favors the more basic 'listen/hear.' This preserves
    the text's tension without importing a stronger doctrinal or moral conclusion
    than the wording requires.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
