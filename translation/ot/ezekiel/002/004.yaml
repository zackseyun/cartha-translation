theological_decisions:
- issue: Rendering the divine name in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  - the Sovereign LORD
  rationale: The doctrine default for יְהוָה is 'the LORD.' However, in the compound
    title אֲדֹנָי יְהוִה, rendering both woodenly would produce 'Lord LORD.' 'The
    Lord GOD' is the established English solution that preserves both title and divine
    name without importing extra interpretation. 'Sovereign LORD' is interpretive
    and therefore not preferred in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
