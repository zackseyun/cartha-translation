id: EZK.2.4
reference: Ezekiel 2:4
source:
  edition: WLC
  text: וְ/הַ/בָּנִ֗ים קְשֵׁ֤י פָנִים֙ וְ/חִזְקֵי לֵ֔ב אֲנִ֛י שׁוֹלֵ֥חַ אוֹתְ/ךָ֖
    אֲלֵי/הֶ֑ם וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּ֥ה אָמַ֖ר אֲדֹנָ֥/י יְהֹוִֽה־׃
translation:
  text: The sons are hard-faced and hard-hearted; I am sending you to them, and you
    shall say to them, ‘Thus says the Lord GOD.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''hard of face and strong of heart,'' an idiom for shameless and
      stubborn people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Thus says the Lord Yahweh.' The Hebrew title is אֲדֹנָי יְהוִה.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַבָּנִים
  chosen: The sons
  alternatives:
  - The children
  - These sons
  lexicon: HALOT
  rationale: בָּנִים literally means 'sons.' In context it refers to the people of
    Israel just mentioned, but the Hebrew uses the masculine plural noun rather than
    a more generic term. Following the gender-accurate principle, 'sons' is retained
    rather than neutralizing to 'children.' The article is represented by 'The.'
- source_word: קְשֵׁי פָנִים
  chosen: hard-faced
  alternatives:
  - impudent
  - stubborn-faced
  - of hard face
  lexicon: HALOT
  rationale: The construct phrase literally means 'hard of face.' It describes shamelessness,
    defiance, or obstinacy. 'Hard-faced' preserves the concrete Hebrew imagery while
    remaining readable modern English. 'Impudent' captures sense but loses the metaphor.
- source_word: וְחִזְקֵי לֵב
  chosen: hard-hearted
  alternatives:
  - strong-hearted
  - stubborn-hearted
  - of hard heart
  lexicon: HALOT
  rationale: Literally 'strong of heart.' In this prophetic context the idiom is negative,
    referring to inner stubbornness rather than courage. 'Hard-hearted' best conveys
    the intended sense in natural English and pairs well with 'hard-faced' without
    over-paraphrasing.
- source_word: אֲנִי שׁוֹלֵחַ
  chosen: I am sending
  alternatives:
  - I send
  - I am about to send
  lexicon: HALOT
  rationale: The participle with explicit pronoun gives a present/imminent commissioning
    sense. 'I am sending' reflects the ongoing or immediate action more naturally
    than a simple present 'I send.'
- source_word: אוֹתְךָ אֲלֵיהֶם
  chosen: you to them
  alternatives:
  - you against them
  - you toward them
  lexicon: HALOT
  rationale: אֶל with pronominal suffix here marks direction toward the audience of
    Ezekiel's mission. 'To them' is the straightforward rendering.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: and you shall say to them
  alternatives:
  - and you must say to them
  - and say to them
  lexicon: HALOT
  rationale: The qatal following the commissioning context functions with directive/future
    force. 'You shall say' communicates the commission clearly in English.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says' preserves
    the solemn prophetic cadence and is idiomatic English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound title אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD'
    in English to avoid the awkward 'Lord LORD' when YHWH is represented as 'the LORD'
    per doctrine. Small caps cannot be encoded here, so 'GOD' signals the underlying
    divine name in the traditional way.
- source_word: יְהוִה
  chosen: GOD
  alternatives:
  - the LORD
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, YHWH is normally rendered 'the LORD.' In the fixed combination
    אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' so that both elements remain
    visible without producing 'Lord LORD.' This preserves the distinction between
    אֲדֹנָי and יְהוִה.
