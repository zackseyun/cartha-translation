theological_decisions:
- issue: Rendering the written contents of the scroll as a triad of grief/judgment
    terms
  chosen_reading: lamentations and mourning and woe
  alternative_readings:
  - lamentations and groaning and woe
  - dirges and moaning and alas
  rationale: The verse emphasizes the sorrowful and ominous content of the scroll.
    The chosen rendering preserves the cumulative force of three distinct but related
    terms without importing additional theological interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence.
