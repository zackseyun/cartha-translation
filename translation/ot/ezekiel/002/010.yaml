id: EZK.2.10
reference: Ezekiel 2:10
source:
  edition: WLC
  text: וַ/יִּפְרֹ֤שׂ אוֹתָ/הּ֙ לְ/פָנַ֔/י וְ/הִ֥יא כְתוּבָ֖ה פָּנִ֣ים וְ/אָח֑וֹר
    וְ/כָת֣וּב אֵלֶ֔י/הָ קִנִ֥ים וָ/הֶ֖גֶה וָ/הִֽי׃ס
translation:
  text: And he spread it out before me, and it was written on the front and on the
    back; and written on it were lamentations and mourning and woe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on both sides'; traditionally, 'inside and outside.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lamentations and groaning and woe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְרֹשׂ
  chosen: he spread it out
  alternatives:
  - he unrolled it
  - he spread it
  lexicon: HALOT
  rationale: The verb פרשׂ means to spread out or unfold. In context of a scroll being
    opened before Ezekiel, 'spread it out' is natural English and preserves the physical
    action without over-specifying 'unrolled,' though that is contextually possible.
- source_word: אוֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The feminine suffix refers to the scroll. English uses the neuter pronoun
    for an inanimate object.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in front of me
  lexicon: HALOT
  rationale: A standard idiomatic rendering that preserves the spatial sense and fits
    the visionary narrative.
- source_word: כְתוּבָה
  chosen: it was written
  alternatives:
  - it was inscribed
  lexicon: HALOT
  rationale: Passive participle of כתב. 'Written' is the plain and sufficiently broad
    rendering.
- source_word: פָּנִים וְאָחוֹר
  chosen: on the front and on the back
  alternatives:
  - inside and outside
  - on both sides
  lexicon: HALOT
  rationale: Literally 'front and back.' This likely describes both sides of the scroll
    being written on. 'On the front and on the back' is transparent and close to the
    Hebrew. 'Inside and outside' is a traditional interpretive rendering but is less
    literal here.
- source_word: וְכָתוּב אֵלֶיהָ
  chosen: and written on it were
  alternatives:
  - and on it was written
  lexicon: HALOT
  rationale: This construction introduces the content written on the scroll. The chosen
    wording is idiomatic in English while preserving the passive sense.
- source_word: קִנִים
  chosen: lamentations
  alternatives:
  - dirges
  - funeral songs
  lexicon: HALOT
  rationale: קִינָה/קִינִים denotes lament or dirge, often funeral lament. 'Lamentations'
    is the most recognizable and suitably solemn English equivalent.
- source_word: הֶגֶה
  chosen: mourning
  alternatives:
  - groaning
  - sighing
  - moaning
  lexicon: HALOT
  rationale: The noun can denote groaning, murmuring, or moaning. In this triad of
    judgment language, 'mourning' communicates the grief-laden sense in natural English,
    though 'groaning' remains a viable lexical alternative.
- source_word: הִי
  chosen: woe
  alternatives:
  - alas
  lexicon: HALOT
  rationale: An interjection/noun of lament or disaster. 'Woe' best matches prophetic
    diction and the tone of impending judgment.
