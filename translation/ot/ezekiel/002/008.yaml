id: EZK.2.8
reference: Ezekiel 2:8
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם שְׁמַע֙ אֵ֤ת אֲשֶׁר אֲנִי֙ מְדַבֵּ֣ר אֵלֶ֔י/ךָ אַל תְּהִי
    מֶ֖רִי כְּ/בֵ֣ית הַ/מֶּ֑רִי פְּצֵ֣ה פִ֔י/ךָ וֶ/אֱכֹ֕ל אֵ֥ת אֲשֶׁר אֲנִ֖י נֹתֵ֥ן
    אֵלֶֽי/ךָ־־־־־׃
translation:
  text: But you, son of man, hear what I am speaking to you. Do not be rebellious
    like the rebellious house. Open your mouth and eat what I am giving you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortal' or 'human one' for 'son of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Retains the idiomatic address used throughout Ezekiel. Although it can
    mean a human being or mortal, 'son of man' preserves the repeated prophetic form
    of address and its literary force.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen
  - obey
  lexicon: HALOT
  rationale: The imperative fundamentally means 'hear/listen.' In context it carries
    the force of heedful reception, but 'hear' best preserves the lexical form without
    over-interpreting it as explicit obedience.
- source_word: מְדַבֵּר אֵלֶיךָ
  chosen: I am speaking to you
  alternatives:
  - I speak to you
  - I am saying to you
  lexicon: HALOT
  rationale: The participle conveys ongoing or immediate speech. 'I am speaking to
    you' reflects the present, active sense naturally in English.
- source_word: אַל תְּהִי מֶרִי
  chosen: Do not be rebellious
  alternatives:
  - Do not be rebellion
  - Do not become rebellious
  - Do not be defiant
  lexicon: HALOT
  rationale: The noun מֶרִי denotes rebellion/rebelliousness. English idiom requires
    an adjectival rendering here; 'rebellious' communicates the quality without awkward
    literalism.
- source_word: כְּבֵית הַמֶּרִי
  chosen: like the rebellious house
  alternatives:
  - like the house of rebellion
  - like the rebellious household
  lexicon: HALOT
  rationale: בַּיִת here refers to the corporate house of Israel as a collective.
    'Rebellious house' is a natural English rendering that preserves the metaphor
    and echoes Ezekiel's recurring phrase.
- source_word: פְּצֵה פִיךָ
  chosen: Open your mouth
  alternatives:
  - Spread your mouth open
  lexicon: HALOT
  rationale: The verb means to open wide. 'Open your mouth' is the idiomatic English
    equivalent in this command context.
- source_word: וֶאֱכֹל
  chosen: and eat
  alternatives:
  - then eat
  lexicon: HALOT
  rationale: A straightforward imperative following the prior command. 'And eat' preserves
    the sequence and concreteness of the symbolic action.
- source_word: אֵת אֲשֶׁר אֲנִי נֹתֵן אֵלֶיךָ
  chosen: what I am giving you
  alternatives:
  - that which I am giving you
  - what I give you
  lexicon: HALOT
  rationale: The participle נֹתֵן suggests present/immediate action. 'What I am giving
    you' is natural English and matches the ongoing immediacy of the vision.
