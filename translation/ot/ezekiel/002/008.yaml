theological_decisions:
- issue: Rendering of אָדָם in prophetic address
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The doctrine calls for gender-accurate rendering matching source intent.
    Here the phrase is a fixed vocative in Ezekiel, not a generic statement about
    humanity, so the traditional literal rendering is retained for literary and intertextual
    consistency.
