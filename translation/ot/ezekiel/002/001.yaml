id: EZK.2.1
reference: Ezekiel 2:1
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑/י בֶּן אָדָם֙ עֲמֹ֣ד עַל רַגְלֶ֔י/ךָ וַ/אֲדַבֵּ֖ר אֹתָֽ/ךְ־־׃
translation:
  text: And he said to me, “Son of man, stand on your feet, and I will speak with
    you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speak to you.' The Hebrew construction can be rendered either 'with
      you' or 'to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - Then he said to me
  - And he spoke to me
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol is naturally rendered with simple past in
    English. 'Said to me' fits אמר היטב here better than the broader 'spoke to me.'
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal man
  lexicon: HALOT
  rationale: Literally 'son of man.' This is Ezekiel's recurring form of address and
    should be preserved rather than flattened. It also aligns with the doctrine's
    gender-accurate principle and the default handling of אָדָם as 'man' where context
    warrants.
- source_word: עֲמֹד
  chosen: stand
  alternatives:
  - rise
  - get up
  lexicon: HALOT
  rationale: Imperative of עמד here calls Ezekiel to take an upright stance. 'Stand'
    is the most direct and idiomatic rendering.
- source_word: עַל רַגְלֶיךָ
  chosen: on your feet
  alternatives:
  - upon your feet
  - on your legs
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew prepositional phrase; preserves
    the concrete bodily imagery without awkwardness.
- source_word: וַאֲדַבֵּר
  chosen: and I will speak
  alternatives:
  - and I will talk
  - that I may speak
  lexicon: HALOT
  rationale: Though formally a prefixed form with vav, in this command context it
    expresses the speaker's ensuing action/purpose. Future English 'I will speak'
    is the most natural and reflects the sequence after the imperative.
- source_word: אֹתָךְ
  chosen: with you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: With דבר, the object marker can yield the sense 'speak with' or 'speak
    to.' Here 'with you' reflects the direct personal address and is good modern English.
    The ketiv/qere-like gender mismatch in the suffix is not represented in translation
    because the addressee is clearly Ezekiel.
