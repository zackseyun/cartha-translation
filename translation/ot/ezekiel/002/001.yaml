theological_decisions:
- issue: Rendering of בֶּן אָדָם in Ezekiel
  chosen_reading: Son of man
  alternative_readings:
  - Human one
  - Mortal
  rationale: The phrase is a literal Hebrew expression and a marked prophetic address
    in Ezekiel. Preserving it maintains the text's diction and theological-literary
    resonance without importing later christological claims into this verse.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם'
