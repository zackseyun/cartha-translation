id: EZK.2.3
reference: Ezekiel 2:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י בֶּן אָדָם֙ שׁוֹלֵ֨חַ אֲנִ֤י אֽוֹתְ/ךָ֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל
    אֶל גּוֹיִ֥ם הַ/מּוֹרְדִ֖ים אֲשֶׁ֣ר מָרְדוּ בִ֑/י הֵ֤מָּה וַ/אֲבוֹתָ/ם֙ פָּ֣שְׁעוּ
    בִ֔/י עַד עֶ֖צֶם הַ/יּ֥וֹם הַ/זֶּֽה־־־־־׃
translation:
  text: And he said to me, “Son of man, I am sending you to the sons of Israel, to
    rebellious nations who have rebelled against me; they and their fathers have transgressed
    against me to this very day.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'human one' or 'mortal' for 'Son of man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of Adam
  - mortal
  lexicon: HALOT
  rationale: Retains the idiomatic prophetic address used throughout Ezekiel. Per
    doctrine, אָדָם is rendered in a gender-accurate way where context supports it.
    Here the phrase functions as a title-like address to Ezekiel, and 'Son of man'
    preserves both form and intertextual resonance better than more interpretive alternatives.
- source_word: שׁוֹלֵחַ אֲנִי אֹתְךָ
  chosen: I am sending you
  alternatives:
  - I send you
  - I am about to send you
  lexicon: HALOT
  rationale: The participle with explicit pronoun gives a vivid present/future sense.
    'I am sending you' is natural English and preserves the immediacy of the commissioning
    better than a simple present.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Chosen to reflect the Hebrew wording more closely and to follow the project's
    gender-accurate principle rather than flattening to a neutral collective. 'Children
    of Israel' is traditional but can sound archaic; 'Israelites' is smoother but
    less formally transparent.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: The basic sense is 'nations/peoples.' Here it is strikingly applied to
    Israel in their rebellious character, so 'nations' preserves that force without
    importing the later Jewish/Christian technical sense of 'Gentiles.'
- source_word: הַמּוֹרְדִים
  chosen: rebellious
  alternatives:
  - the rebels
  - those who rebel
  lexicon: HALOT
  rationale: As an attributive participle modifying 'nations,' 'rebellious' gives
    idiomatic English while preserving the ongoing character of their revolt.
- source_word: מָרְדוּ בִי
  chosen: have rebelled against me
  alternatives:
  - rebelled against me
  - revolted against me
  lexicon: HALOT
  rationale: Uses the same English root as הַמּוֹרְדִים to preserve the Hebrew wordplay
    and repetition. 'Against me' brings out the adversative force of בְּ.
- source_word: פָּשְׁעוּ בִי
  chosen: have transgressed against me
  alternatives:
  - have rebelled against me
  - have sinned against me
  lexicon: HALOT
  rationale: Varied from 'rebelled' to avoid collapsing two distinct Hebrew verbs
    (מרד and פשע) into one English term. 'Transgressed' preserves covenantal violation
    without over-paraphrase.
- source_word: עַד עֶצֶם הַיּוֹם הַזֶּה
  chosen: to this very day
  alternatives:
  - until this very day
  - to the very bone of this day
  - right up to this day
  lexicon: HALOT
  rationale: This idiom intensifies the temporal expression. 'To this very day' is
    natural English and preserves the emphatic force of עֶצֶם without wooden literalism.
