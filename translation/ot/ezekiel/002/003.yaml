theological_decisions:
- issue: Whether to soften the indictment of Israel by avoiding the term גּוֹיִם ('nations')
  chosen_reading: Retain 'nations' even though the referent is Israel
  alternative_readings:
  - people
  - the Israelites
  rationale: The Hebrew deliberately uses a term commonly associated with nations/peoples
    and applies it to Israel in judgment. Preserving 'nations' keeps the rhetorical
    shock of the accusation rather than domesticating it.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering the address בֶּן אָדָם
  chosen_reading: Use 'Son of man' in the main text
  alternative_readings:
  - human one
  - mortal
  rationale: This is not a christological title here but a recurring divine address
    to Ezekiel. Still, the formal rendering best preserves the repeated idiom and
    canonical resonance; alternatives are preserved in a footnote as lexical possibilities.
  doctrine_reference: 'Contested terms: אָדָם; Translation philosophy §4'
