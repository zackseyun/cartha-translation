id: EZK.2.2
reference: Ezekiel 2:2
source:
  edition: WLC
  text: וַ/תָּ֧בֹא בִ֣/י ר֗וּחַ כַּֽ/אֲשֶׁר֙ דִּבֶּ֣ר אֵלַ֔/י וַ/תַּעֲמִדֵ֖/נִי עַל
    רַגְלָ֑/י וָ/אֶשְׁמַ֕ע אֵ֖ת מִדַּבֵּ֥ר אֵלָֽ/י־׃פ
translation:
  text: And the Spirit entered into me when he spoke to me, and set me on my feet;
    and I heard the one speaking to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a spirit entered into me.' The Hebrew רוּחַ can mean 'spirit,' 'wind,'
      or 'breath'; here the context favors God's Spirit empowering Ezekiel.
    reason: alternative_reading
  - marker: b
    text: Literally, 'I heard the one speaking to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֗וּחַ
  chosen: the Spirit
  alternatives:
  - a spirit
  - wind
  - breath
  lexicon: HALOT
  rationale: In this prophetic commissioning context, רוּחַ most naturally refers
    to the divine Spirit empowering Ezekiel, not an indefinite spirit or literal wind/breath.
    The definite article is not present in Hebrew, but English commonly supplies it
    for a specific, contextually identifiable referent.
- source_word: וַ/תָּ֧בֹא בִ֣/י
  chosen: entered into me
  alternatives:
  - came into me
  - came upon me
  lexicon: HALOT
  rationale: בוא + ב with first-person suffix is most naturally rendered as movement
    into the prophet. 'Entered into me' preserves the inward, empowering sense better
    than the broader 'came upon me.'
- source_word: כַּֽ/אֲשֶׁר֙ דִּבֶּ֣ר אֵלַ֔/י
  chosen: when he spoke to me
  alternatives:
  - as he spoke to me
  - when he was speaking to me
  lexicon: HALOT
  rationale: The clause marks the time of the Spirit's entrance. 'When he spoke to
    me' is natural English and preserves the temporal force of כַאֲשֶׁר.
- source_word: וַ/תַּעֲמִדֵ֖/נִי עַל רַגְלָ֑/י
  chosen: set me on my feet
  alternatives:
  - made me stand on my feet
  - caused me to stand on my feet
  lexicon: HALOT
  rationale: The Hiphil of עמד is causative. 'Set me on my feet' is idiomatic modern
    English while preserving the causative sense.
- source_word: וָ/אֶשְׁמַ֕ע
  chosen: I heard
  alternatives:
  - then I heard
  lexicon: HALOT
  rationale: Simple past fits the Hebrew wayyiqtol sequence. English does not require
    an explicit 'then,' though the sequence remains clear.
- source_word: אֵ֖ת מִדַּבֵּ֥ר אֵלָֽ/י
  chosen: the one speaking to me
  alternatives:
  - him speaking to me
  - the one who was speaking to me
  lexicon: HALOT
  rationale: The particle אֵת marks the object, and the participle מִדַּבֵּר functions
    substantivally. 'The one speaking to me' preserves the Hebrew construction more
    transparently than simply 'him.'
