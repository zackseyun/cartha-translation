theological_decisions:
- issue: Referent of רוּחַ
  chosen_reading: the Spirit as God's empowering Spirit
  alternative_readings:
  - a spirit
  rationale: Within Ezekiel's vision and commissioning narrative, the most coherent
    reading is the divine Spirit enabling the prophet to stand and hear. This reflects
    the text's immediate context without importing later doctrinal elaboration.
  doctrine_reference: Translation philosophy §1, §3
