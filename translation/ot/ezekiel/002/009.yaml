id: EZK.2.9
reference: Ezekiel 2:9
source:
  edition: WLC
  text: וָ/אֶרְאֶ֕ה וְ/הִנֵּה יָ֖ד שְׁלוּחָ֣ה אֵלָ֑/י וְ/הִנֵּה ב֖/וֹ מְגִלַּת סֵֽפֶר־־־׃
translation:
  text: Then I looked, and behold, a hand was stretched out toward me, and behold,
    in it was a scroll of a book.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'a scroll.' The Hebrew phrase is literally 'a scroll of a book.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  chosen: Then I looked
  alternatives:
  - And I saw
  - Then I saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and ראה here introduces a
    new visual moment. 'Then I looked' gives natural English narrative progression
    while preserving the first-person act of seeing.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse particle drawing vivid attention to what appears.
    'Behold' preserves the prophetic immediacy and solemnity better than flatter alternatives.
- source_word: יָד
  chosen: a hand
  alternatives:
  - a hand/arm
  lexicon: HALOT
  rationale: The plain sense is 'hand.' Although context may imply the hand belongs
    to a heavenly figure, the Hebrew does not specify the owner, so the translation
    remains indefinite.
- source_word: שְׁלוּחָה
  chosen: was stretched out
  alternatives:
  - was sent out
  - was extended
  lexicon: HALOT
  rationale: From שלח in the passive/participle sense, the context of a hand reaching
    toward Ezekiel favors 'stretched out' or 'extended' rather than the more abstract
    'sent out.' 'Was stretched out' is idiomatic and visual.
- source_word: אֵלַי
  chosen: toward me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition אֶל commonly indicates direction toward. 'Toward me'
    better captures the spatial movement of the outstretched hand in context.
- source_word: בּוֹ
  chosen: in it
  alternatives:
  - in his hand
  - in it
  lexicon: HALOT
  rationale: The suffix is masculine singular, formally referring to the nearest suitable
    antecedent. Since 'hand' is feminine in Hebrew, the pronoun likely points more
    generally to the presented object/hand-bearing figure; in English, 'in it' is
    the most economical rendering tied to the visible hand/object without over-specifying
    an agent not named in the text.
- source_word: מְגִלַּת סֵפֶר
  chosen: a scroll of a book
  alternatives:
  - a scroll
  - a written scroll
  - a book scroll
  lexicon: HALOT
  rationale: The construct phrase literally denotes a scroll-book, that is, a scroll
    document. 'A scroll of a book' preserves both nouns and the concrete imagery,
    even if slightly formal. Rendering only 'a scroll' would omit ספר.
