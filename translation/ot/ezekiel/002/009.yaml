theological_decisions:
- issue: Identity of the hand
  chosen_reading: Leave the hand's owner unspecified
  alternative_readings:
  - the hand of God
  - the hand of an angelic messenger
  rationale: The verse presents only 'a hand' stretched out toward the prophet. Supplying
    a divine or angelic subject would import interpretation beyond the Hebrew wording.
    The translation therefore preserves the text's restraint.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
