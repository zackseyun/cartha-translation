id: EZK.7.12
reference: Ezekiel 7:12
source:
  edition: WLC
  text: בָּ֤א הָ/עֵת֙ הִגִּ֣יעַ הַ/יּ֔וֹם הַ/קּוֹנֶה֙ אַל יִשְׂמָ֔ח וְ/הַ/מּוֹכֵ֖ר
    אַל יִתְאַבָּ֑ל כִּ֥י חָר֖וֹן אֶל כָּל הֲמוֹנָֽ/הּ־־־־׃
translation:
  text: The time has come; the day has arrived. Let not the buyer rejoice, and let
    not the seller mourn, for wrath is against all her multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all her wealth,' if הֲמוֹנָהּ is taken in the sense of abundance/possessions
      rather than population.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'her multitude,' preserving a feminine personification,
      likely of the city, land, or community under judgment.
    reason: cultural_note
lexical_decisions:
- source_word: בָּא
  chosen: has come
  alternatives:
  - came
  - is coming
  lexicon: HALOT
  rationale: Perfect verb marking the event as having arrived; English present perfect
    fits the prophetic announcement of an already-impending reality.
- source_word: הָעֵת
  chosen: the time
  alternatives:
  - the appointed time
  - the season
  lexicon: HALOT
  rationale: עֵת commonly denotes a time or appointed time. 'The time' is concise
    and natural, while still carrying the sense of a decisive moment in context.
- source_word: הִגִּיעַ
  chosen: has arrived
  alternatives:
  - has reached
  - arrived
  lexicon: HALOT
  rationale: Pairs with בָּא for emphatic parallelism. 'Has arrived' preserves the
    force of reaching the decisive day without awkward literalism.
- source_word: הַיּוֹם
  chosen: the day
  lexicon: HALOT
  rationale: Straightforward rendering; in context it is the day of judgment just
    announced.
- source_word: הַקּוֹנֶה
  chosen: the buyer
  alternatives:
  - the one buying
  - the purchaser
  lexicon: HALOT
  rationale: Substantival participle referring generically to one engaged in buying.
    'Buyer' is idiomatic modern English.
- source_word: אַל יִשְׂמָח
  chosen: let not ... rejoice
  alternatives:
  - must not rejoice
  - should not rejoice
  lexicon: HALOT
  rationale: אַל with imperfect expresses prohibition/jussive nuance. 'Let not' preserves
    the prophetic injunction with suitable solemnity.
- source_word: הַמּוֹכֵר
  chosen: the seller
  alternatives:
  - the one selling
  - the vendor
  lexicon: HALOT
  rationale: Substantival participle parallel to 'the buyer'; 'seller' is the natural
    English counterpart.
- source_word: אַל יִתְאַבָּל
  chosen: let not ... mourn
  alternatives:
  - grieve
  - lament
  lexicon: HALOT
  rationale: The verb denotes mourning or grieving. 'Mourn' best matches the likely
    loss/regret associated with selling property, while preserving the emotional force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition; 'for' fits the explanatory
    relation cleanly.
- source_word: חָרוֹן
  chosen: wrath
  alternatives:
  - burning anger
  - fury
  lexicon: HALOT
  rationale: Common noun for burning anger/wrath, here referring to divine judgment.
    'Wrath' is concise and weighty without over-paraphrase.
- source_word: אֶל
  chosen: against
  alternatives:
  - upon
  - toward
  lexicon: HALOT
  rationale: In this judgment context, English 'against' best conveys hostile direction
    rather than mere movement toward.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Standard rendering; it scopes over the following collective noun.
- source_word: הֲמוֹנָהּ
  chosen: her multitude
  alternatives:
  - her whole multitude
  - her crowd
  - her wealth
  lexicon: HALOT
  rationale: הָמוֹן often denotes a multitude, throng, or abundance. In Ezekiel's
    judgment context, 'multitude' best fits the people/population of the city/land.
    The 3fs suffix is retained as 'her,' likely referring to the land/city/personified
    community. 'Wealth' is possible in some contexts but is less likely here given
    the collective scope and parallel judgment language.
