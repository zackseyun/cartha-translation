theological_decisions:
- issue: Referent of the feminine suffix in הֲמוֹנָהּ
  chosen_reading: Retain the feminine pronoun as 'her multitude' without specifying
    the antecedent in the main text.
  alternative_readings:
  - its multitude
  - all the multitude thereof
  - all her wealth
  rationale: The Hebrew preserves a feminine singular suffix whose antecedent is contextually
    the personified land/city/community under judgment. Keeping 'her' mirrors the
    source and preserves the prophetic personification without over-resolving the
    referent. 'Its' would flatten the gendered personification; 'wealth' is a lexical
    possibility for הָמוֹן in some settings but is less persuasive here.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral.
