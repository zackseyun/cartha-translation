theological_decisions:
- issue: Nuance of גְּאוֹן in a judgment context
  chosen_reading: pride
  alternative_readings:
  - majesty
  - exaltation
  rationale: Because the verse announces divine judgment and humiliation, rendering
    גאון as 'pride' best preserves the moral and rhetorical force without importing
    a positive sense such as 'majesty.'
- issue: Sense of נִחֲלוּ מְקַדְשֵׁיהֶם
  chosen_reading: their sanctuaries will be profaned
  alternative_readings:
  - their holy places will be defiled
  rationale: The passive cultic sense is most natural here. This avoids over-specifying
    which sanctuaries are in view while preserving the desecration theme central to
    Ezekiel.
