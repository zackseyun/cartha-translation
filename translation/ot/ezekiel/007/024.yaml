id: EZK.7.24
reference: Ezekiel 7:24
source:
  edition: WLC
  text: וְ/הֵֽבֵאתִי֙ רָעֵ֣י גוֹיִ֔ם וְ/יָרְשׁ֖וּ אֶת בָּֽתֵּי/הֶ֑ם וְ/הִשְׁבַּתִּי֙
    גְּא֣וֹן עַזִּ֔ים וְ/נִחֲל֖וּ מְקַֽדְשֵׁי/הֶֽם־׃
translation:
  text: And I will bring the worst of the nations, and they will take possession of
    their houses. I will put an end to the pride of the strong, and their sanctuaries
    will be profaned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the most wicked of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will inherit their houses'; the Hebrew verb can mean 'inherit,'
      'possess,' or 'dispossess' depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'their holy places will be defiled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  chosen: And I will bring
  alternatives:
  - And I will bring in
  - And I will bring against them
  lexicon: HALOT
  rationale: 'Hiphil of בוא with first person subject naturally means ''I will bring.''
    English leaves the object implied by context: hostile invaders. ''Bring in'' is
    possible but not required in English.'
- source_word: רָעֵי גוֹיִם
  chosen: the worst of the nations
  alternatives:
  - evil ones of the nations
  - the most wicked of the nations
  lexicon: HALOT
  rationale: 'רָעֵי is the plural construct of רע with an adjectival/superlative sense
    in context: the most evil or worst among the nations. ''Worst of the nations''
    is idiomatic modern English and preserves the severity.'
- source_word: וְיָרְשׁוּ אֶת בָּתֵּיהֶם
  chosen: and they will take possession of their houses
  alternatives:
  - and they will inherit their houses
  - and they will seize their houses
  lexicon: HALOT
  rationale: ירשׁ commonly means 'possess, inherit, dispossess.' In a conquest context,
    'take possession of' best captures forcible occupation without implying lawful
    inheritance. 'Seize' is possible but narrower.
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end to
  alternatives:
  - I will make cease
  - I will stop
  lexicon: HALOT
  rationale: Hiphil of שׁבת means to cause to cease. 'Put an end to' is a natural
    English rendering that preserves the causative force.
- source_word: גְּאוֹן עַזִּים
  chosen: the pride of the strong
  alternatives:
  - the majesty of the mighty
  - the arrogance of the strong
  lexicon: HALOT
  rationale: גאון can denote pride, exaltation, or majesty; in a judgment oracle the
    negative nuance 'pride' fits well. עזים denotes strong/mighty ones. 'Pride of
    the strong' preserves both lexical elements and the condemnatory tone.
- source_word: וְנִחֲלוּ
  chosen: will be profaned
  alternatives:
  - will be defiled
  - will be violated
  lexicon: HALOT
  rationale: 'From חלל in the Niphal, the sense is passive: to be profaned/defiled.
    ''Profaned'' fits the cultic context better than the broader ''defiled'' and matches
    the object ''sanctuaries.'''
- source_word: מְקַדְשֵׁיהֶם
  chosen: their sanctuaries
  alternatives:
  - their holy places
  - their sacred places
  lexicon: HALOT
  rationale: Plural of מקדש refers to sanctuaries/holy places. 'Sanctuaries' is concise
    and preserves the cultic sense.
