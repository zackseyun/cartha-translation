id: EZK.7.17
reference: Ezekiel 7:17
source:
  edition: WLC
  text: כָּל הַ/יָּדַ֖יִם תִּרְפֶּ֑ינָה וְ/כָל בִּרְכַּ֖יִם תֵּלַ֥כְנָה מָּֽיִם־־׃
translation:
  text: All hands will grow weak, and all knees will run with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'all knees will run with water,' likely an idiom for knees giving
      way in terror, possibly including loss of bodily control.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Quantifier covering the totality of the people in view; straightforwardly
    rendered 'all' in both occurrences.
- source_word: הַיָּדַיִם
  chosen: hands
  alternatives:
  - arms
  lexicon: HALOT
  rationale: Literal 'hands' is the natural rendering and preserves the idiom of strength/failure
    in Hebrew. 'Arms' would over-interpret the body-part imagery.
- source_word: תִּרְפֶּינָה
  chosen: will grow weak
  alternatives:
  - will become limp
  - will slacken
  lexicon: HALOT
  rationale: From רפה, conveying weakening or slackening. 'Will grow weak' is idiomatic
    modern English and fits the image of failing strength better than the more wooden
    'will slacken.'
- source_word: בִּרְכַּיִם
  chosen: knees
  lexicon: HALOT
  rationale: Direct anatomical term; also idiomatically associated with fear and collapse
    in context.
- source_word: תֵּלַכְנָה
  chosen: will run
  alternatives:
  - will flow
  - will go
  lexicon: HALOT
  rationale: 'Although the verb is literally ''go/walk,'' with ''water'' as its complement
    the sense is idiomatic: liquid moving down the knees. ''Will run'' captures the
    vivid image in natural English while staying close to the Hebrew.'
- source_word: מָּיִם
  chosen: water
  alternatives:
  - urine
  lexicon: HALOT
  rationale: The Hebrew says 'water.' In this judgment context the idiom likely suggests
    loss of bodily control from terror, but the main text preserves the source wording
    rather than making the implication explicit.
