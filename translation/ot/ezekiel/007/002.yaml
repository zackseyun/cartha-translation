theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the LORD Yahweh
  - the Lord YHWH
  rationale: The doctrinal standard sets יְהוָה as 'the LORD.' In the compound title
    אֲדֹנָי יְהוִה, English convention renders the phrase as 'the Lord GOD' to preserve
    both title elements without awkward duplication. This is a translation convention,
    not a theological reinterpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of הָאָרֶץ in the final clause
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: Within the immediate context, the oracle is addressed 'to the land of
    Israel,' so the final phrase most naturally refers to the whole extent of that
    land rather than the entire world. This preserves the local judgment focus of
    the passage.
