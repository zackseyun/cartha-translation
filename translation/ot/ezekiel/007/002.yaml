id: EZK.7.2
reference: Ezekiel 7:2
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם כֹּה אָמַ֞ר אֲדֹנָ֧/י יְהוִ֛ה לְ/אַדְמַ֥ת יִשְׂרָאֵ֖ל
    קֵ֑ץ בָּ֣א הַ/קֵּ֔ץ עַל ארבעת כַּנְפ֥וֹת הָ/אָֽרֶץ־־־׃
translation:
  text: 'And you, son of man, thus says the Lord GOD to the land of Israel: An end!
    The end has come upon the four corners of the land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the four corners of the earth.' The Hebrew idiom can refer either to
      the extremities of a land or, in broader contexts, the whole earth.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Conventional and contextually appropriate rendering of Ezekiel’s address
    formula. It preserves the Hebrew idiom and the masculine singular form, in line
    with the gender-accurate policy. Although 'mortal' is idiomatic in some versions,
    'son of man' is more formally transparent to the source.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord YHWH
  - Lord GOD
  lexicon: HALOT
  rationale: Standard English rendering for the compound divine title. 'יְהוָה' follows
    the doctrinal default 'the LORD'; in combination with אֲדֹנָי, English convention
    uses 'Lord GOD' to avoid 'Lord LORD' while preserving both elements of the Hebrew
    title.
- source_word: לְאַדְמַת יִשְׂרָאֵל
  chosen: to the land of Israel
  alternatives:
  - against the land of Israel
  - to Israel's soil
  lexicon: HALOT
  rationale: The preposition לְ here marks the addressee/target of the oracle. 'Land'
    is the natural English equivalent for אַדְמָה in this prophetic judgment context.
    'Against' is interpretive and stronger than the preposition itself, though the
    hostile sense is implied by context.
- source_word: קֵץ
  chosen: An end!
  alternatives:
  - The end!
  - End!
  lexicon: HALOT
  rationale: The bare noun is used exclamatorily for emphasis. Rendering it as 'An
    end!' preserves the abruptness and rhetorical force without over-specifying. The
    repetition with הַקֵּץ in the next clause is then maintained distinctly.
- source_word: בָּא הַקֵּץ
  chosen: The end has come
  alternatives:
  - The end comes
  - The end is coming
  lexicon: HALOT
  rationale: Perfect verb with the definite noun is best rendered as a completed or
    imminent-arrival declaration in prophetic speech. 'Has come' captures the prophetic
    certainty and the force of the Hebrew perfect better than a simple future.
- source_word: אַרְבַּעַת כַּנְפוֹת הָאָרֶץ
  chosen: the four corners of the land
  alternatives:
  - the four corners of the earth
  - the four extremities of the land
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' and idiomatically 'edge/corner.' Because
    הָאָרֶץ in this verse is best read in parallel with 'the land of Israel,' 'land'
    is preferable to 'earth.' 'Four corners' preserves the idiom and communicates
    totality over the whole land.
