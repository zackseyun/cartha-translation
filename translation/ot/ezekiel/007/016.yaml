id: EZK.7.16
reference: Ezekiel 7:16
source:
  edition: WLC
  text: וּ/פָֽלְטוּ֙ פְּלִ֣יטֵי/הֶ֔ם וְ/הָי֣וּ אֶל הֶ/הָרִ֗ים כְּ/יוֹנֵ֧י הַ/גֵּאָי֛וֹת
    כֻּלָּ֖/ם הֹמ֑וֹת אִ֖ישׁ בַּ/עֲוֺנֽ/וֹ־׃
translation:
  text: And their survivors will escape and be on the mountains, like doves of the
    valleys, all of them moaning, each one in his iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like doves of the ravines.' The Hebrew term can refer to valleys or
      wadis/ravines.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of them murmuring/cooing'; the Hebrew verb evokes a low sound and,
      in context, grief.
    reason: lexical_alternative
  - marker: c
    text: Or 'each one because of his guilt' or 'for his punishment'; the Hebrew word
      can denote iniquity, guilt, or the consequence of guilt.
    reason: alternative_reading
lexical_decisions:
- source_word: וּפָלְטוּ
  chosen: will escape
  alternatives:
  - shall escape
  - will flee
  lexicon: HALOT
  rationale: From פלט, denoting escape/deliverance from danger. 'Will escape' fits
    the prophetic future sense and avoids over-specifying the manner of escape.
- source_word: פְּלִיטֵיהֶם
  chosen: their survivors
  alternatives:
  - their fugitives
  - their escapees
  - those of them who escape
  lexicon: HALOT
  rationale: The noun denotes those who have escaped. 'Survivors' is natural English
    and captures the result of surviving judgment; 'fugitives' is possible but foregrounds
    flight more than survival.
- source_word: וְהָיוּ אֶל־הֶהָרִים
  chosen: and be on the mountains
  alternatives:
  - and go to the mountains
  - and be toward the mountains
  lexicon: HALOT
  rationale: Literally 'and they will be to/on the mountains.' In context this indicates
    their location after escape. 'Be on the mountains' is idiomatic and preserves
    the verbless-like locative force without adding motion not explicit in היה + אל.
- source_word: כְּיוֹנֵי הַגֵּאָיוֹת
  chosen: like doves of the valleys
  alternatives:
  - like valley doves
  - like doves of the ravines
  lexicon: HALOT
  rationale: The simile compares the survivors to doves associated with valleys/ravines,
    likely emphasizing plaintive sound and vulnerable retreat. 'Valleys' is more accessible;
    'ravines' is a viable alternative given the topographical nuance of גֵּאָיוֹת.
- source_word: כֻּלָּם הֹמוֹת
  chosen: all of them moaning
  alternatives:
  - all of them murmuring
  - all of them cooing
  - all of them lamenting
  lexicon: HALOT
  rationale: The participle from המה denotes making a sound, often a murmur, moan,
    or lament. In this judgment context and with the dove simile, 'moaning' best conveys
    audible grief while preserving the avian resonance.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Although grammatically masculine singular, here it distributively refers
    to individuals among the survivors. 'Each one' preserves the distributive sense
    in natural English without implying only males are in view.
- source_word: בַּעֲוֺנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - because of his guilt
  - in his guilt
  lexicon: HALOT
  rationale: 'עָוֹן can denote iniquity, guilt, or punishment for iniquity. ''In his
    iniquity'' preserves the Hebrew preposition and leaves the exact nuance broad:
    each moans in the sphere of or on account of his own guilt/iniquity.'
