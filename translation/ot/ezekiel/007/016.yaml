theological_decisions:
- issue: Nuance of עָוֹן in a judgment context
  chosen_reading: iniquity/guilt is left somewhat open by rendering 'in his iniquity'
  alternative_readings:
  - for his punishment
  - because of his guilt
  rationale: The Hebrew term can refer to sin, guilt, or its penal consequence. The
    translation preserves the theological tension rather than narrowing the verse
    to either moral culpability alone or punishment alone.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
