id: EZK.7.22
reference: Ezekiel 7:22
source:
  edition: WLC
  text: וַ/הֲסִבּוֹתִ֤י פָנַ/י֙ מֵ/הֶ֔ם וְ/חִלְּל֖וּ אֶת צְפוּנִ֑/י וּ/בָאוּ בָ֥/הּ
    פָּרִיצִ֖ים וְ/חִלְּלֽוּ/הָ־־׃פ
translation:
  text: I will turn my face away from them, and they will profane my treasured place;
    violent men will enter it and profane it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my treasure,' 'my secret place,' or 'my treasured thing.' The Hebrew
      likely refers to something precious and protected, probably connected with the
      sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'ruthless men' or 'robbers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲסִבּוֹתִי
  chosen: I will turn
  alternatives:
  - I turned
  - I will turn away
  lexicon: HALOT
  rationale: From סבב in the Hiphil, here with vav-consecutive in prophetic discourse
    functioning futurally in context. 'I will turn' fits the surrounding judgment
    sequence better than a simple past.
- source_word: פָנַי
  chosen: my face
  alternatives:
  - my presence
  lexicon: HALOT
  rationale: Literal 'my face' is retained because it is a common Hebrew idiom for
    relational favor/attention, and it remains understandable in English.
- source_word: מֵהֶם
  chosen: away from them
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The preposition with the verb 'turn' is naturally expressed in English
    as 'away from them'.
- source_word: וְחִלְּלוּ
  chosen: they will profane
  alternatives:
  - they will defile
  - they will desecrate
  lexicon: HALOT
  rationale: חלל in the Piel commonly means to profane or desecrate what is holy.
    'Profane' preserves the holiness contrast clearly.
- source_word: צְפוּנִי
  chosen: my treasured place
  alternatives:
  - my secret place
  - my hidden thing
  - my treasure
  lexicon: HALOT
  rationale: The noun from צפן denotes something hidden, stored up, or treasured.
    In this context of sanctuary violation, it most likely refers to the LORD's treasured/guarded
    holy place or precious thing. 'My treasured place' communicates both value and
    likely spatial reference without over-specifying beyond the Hebrew.
- source_word: וּבָאוּ בָהּ
  chosen: will enter it
  alternatives:
  - will come into it
  lexicon: HALOT
  rationale: Simple idiomatic English for coming into a feminine singular referent,
    likely the sanctuary/city.
- source_word: פָּרִיצִים
  chosen: violent men
  alternatives:
  - ruthless men
  - robbers
  - invaders
  lexicon: HALOT
  rationale: פָּרִיץ often denotes violent, ruthless, or lawless men. 'Violent men'
    is broad enough to fit the context of hostile intruders without narrowing to theft
    alone.
- source_word: וְחִלְּלוּהָ
  chosen: and profane it
  alternatives:
  - and defile it
  - and desecrate it
  lexicon: HALOT
  rationale: Repeats חלל with feminine singular object; 'profane it' preserves the
    repetition and thematic emphasis of desecration.
