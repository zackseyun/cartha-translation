theological_decisions:
- issue: Referent of צְפוּנִי and בָהּ
  chosen_reading: A valued holy place associated with the sanctuary, rendered generally
    as 'my treasured place' and then 'it.'
  alternative_readings:
  - my treasure
  - my secret place
  - my treasured thing, i.e., the temple treasures or holy precinct
  rationale: The Hebrew expression is terse and somewhat ambiguous. The immediate
    context concerns profanation by intruders, which favors a sanctuary-related referent.
    The translation preserves the ambiguity enough to avoid overcommitting to one
    precise object while still making coherent English.
  doctrine_reference: Preserve theological tension rather than resolve it.
