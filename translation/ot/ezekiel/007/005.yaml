theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The doctrine default for יְהוָה is 'the LORD,' but in the fixed Hebrew
    expression אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid the awkward
    and potentially confusing 'Lord LORD' while still signaling the compound title.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)'
