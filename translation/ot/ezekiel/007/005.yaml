id: EZK.7.5
reference: Ezekiel 7:5
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה רָעָ֛ה אַחַ֥ת רָעָ֖ה הִנֵּ֥ה בָאָֽה׃
translation:
  text: 'Thus says the Lord GOD: A disaster, one unique disaster—behold, it is coming.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A disaster, one disaster'; the Hebrew repeats 'disaster' for emphasis,
      and 'one' may stress singularity or uniqueness.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus' preserves the formal prophetic
    tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, in prophetic formulae it is idiomatically
    rendered as present in English ('Thus says') to introduce the divine oracle.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: This compound divine title is conventionally rendered 'the Lord GOD'
    in English. Per doctrine, יְהוָה is rendered 'the LORD'; but when preceded by
    אֲדֹנָי, small-caps LORD would create awkward duplication ('Lord LORD'), so 'Lord
    GOD' is the standard meaning-preserving equivalent.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In this judgment context the noun denotes calamity/judgment rather than
    moral evil. 'Disaster' is clear modern English and avoids implying that God is
    morally evil.
- source_word: אַחַת
  chosen: one unique
  alternatives:
  - one
  - single
  lexicon: HALOT
  rationale: The numeral intensifies the coming judgment as a singular, distinctive
    catastrophe. 'One unique' brings out the emphatic force in idiomatic English.
- source_word: רָעָה אַחַת רָעָה
  chosen: A disaster, one unique disaster
  alternatives:
  - One disaster, behold, disaster comes
  - A disaster, one disaster
  lexicon: HALOT
  rationale: The Hebrew repetition is emphatic and somewhat abrupt. This rendering
    preserves the repetition while making the appositional force intelligible in English.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the deictic urgency and solemnity of the prophetic announcement.
- source_word: בָאָה
  chosen: it is coming
  alternatives:
  - has come
  - comes
  lexicon: HALOT
  rationale: The participle-like imminence in context is best conveyed by an English
    progressive, stressing the nearness of the announced disaster.
