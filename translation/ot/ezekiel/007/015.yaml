theological_decisions:
- issue: Judgment triad imagery
  chosen_reading: Retain the concrete triad 'sword... pestilence... famine' as covenant-judgment
    language without expanding it interpretively.
  alternative_readings:
  - Paraphrase as generalized disaster, disease, and starvation
  rationale: The verse uses a standard prophetic judgment formula. Preserving the
    concrete terms maintains the theological and literary force without importing
    extra explanation into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Generic masculine reference
  chosen_reading: Use singular 'whoever... him'
  alternative_readings:
  - Use plural 'those... them' for contemporary inclusivity
  rationale: The Hebrew uses distributive singular constructions and a 3ms suffix.
    Following the doctrine's gender-accurate principle, the translation preserves
    the singular form rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
