id: EZK.7.15
reference: Ezekiel 7:15
source:
  edition: WLC
  text: הַ/חֶ֣רֶב בַּ/ח֔וּץ וְ/הַ/דֶּ֥בֶר וְ/הָ/רָעָ֖ב מִ/בָּ֑יִת אֲשֶׁ֤ר בַּ/שָּׂדֶה֙
    בַּ/חֶ֣רֶב יָמ֔וּת וַ/אֲשֶׁ֣ר בָּ/עִ֔יר רָעָ֥ב וָ/דֶ֖בֶר יֹאכֲלֶֽ/נּוּ׃
translation:
  text: The sword is outside, and pestilence and famine are inside the house. Whoever
    is in the field will die by the sword, and whoever is in the city, famine and
    pestilence will consume him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plague' for 'pestilence' (דֶּבֶר).
    reason: lexical_alternative
  - marker: b
    text: Literally 'famine and pestilence will eat him'; 'consume him' renders the
      Hebrew metaphor idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - war
  - the sword of judgment
  lexicon: HALOT
  rationale: חֶרֶב literally means 'sword' and in prophetic judgment contexts commonly
    stands metonymically for violent death by warfare. 'The sword' preserves the concrete
    Hebrew image and the stock judgment triad.
- source_word: בַּחוּץ
  chosen: outside
  alternatives:
  - in the street
  - outdoors
  lexicon: HALOT
  rationale: חוּץ denotes the outside/open area as opposed to the interior. 'Outside'
    best matches the contrast with מִבָּיִת ('inside the house').
- source_word: הַדֶּבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: דֶּבֶר is the standard term for epidemic plague/pestilence in judgment
    formulas. 'Pestilence' preserves the formal prophetic register better than the
    broader 'disease.'
- source_word: הָרָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: רָעָב in this context refers not to personal hunger but to societal scarcity
    and starvation. 'Famine' is the established and precise English equivalent.
- source_word: מִבָּיִת
  chosen: inside the house
  alternatives:
  - within
  - indoors
  - in the house
  lexicon: HALOT
  rationale: Literally 'from house/inside the house' in antithesis to 'outside.' The
    phrase marks the interior sphere where pestilence and famine operate. 'Inside
    the house' makes the contrast explicit in natural English.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  chosen: whoever is in the field
  alternatives:
  - he who is in the countryside
  - whoever is in the open country
  lexicon: HALOT
  rationale: 'The relative construction is distributive: any person located in the
    field/open country. ''Whoever is in the field'' is idiomatic and preserves the
    singular distributive force.'
- source_word: בַּחֶרֶב יָמוּת
  chosen: will die by the sword
  alternatives:
  - will be killed by the sword
  lexicon: HALOT
  rationale: The Hebrew says literally 'will die by the sword.' This is natural English
    and retains the idiom without over-interpreting the agency.
- source_word: וַאֲשֶׁר בָּעִיר
  chosen: and whoever is in the city
  alternatives:
  - and he who is in the city
  lexicon: HALOT
  rationale: Again a distributive relative clause contrasting city with field. 'Whoever'
    communicates the generic singular well in contemporary English.
- source_word: יֹאכֲלֶנּוּ
  chosen: will consume him
  alternatives:
  - will devour him
  - will eat him up
  lexicon: HALOT
  rationale: אָכַל literally means 'eat,' but with famine and pestilence as subjects
    it is metaphorical for destructive consumption. 'Consume him' is idiomatic, vivid,
    and avoids awkward literalism while preserving the personified force.
- source_word: רָעָב וָדֶבֶר
  chosen: famine and pestilence
  alternatives:
  - pestilence and famine
  lexicon: HALOT
  rationale: The Hebrew order in the second colon is 'famine and pestilence,' so the
    translation follows that order there rather than harmonizing with the earlier
    phrase. This preserves the source text's wording.
- source_word: -נּוּ (3ms suffix)
  chosen: him
  alternatives:
  - them
  lexicon: Hebrew grammar
  rationale: The suffix is third masculine singular, matching the distributive singular
    relative clauses. Per translation philosophy, the generic singular is preserved
    rather than pluralized.
