id: EZK.7.18
reference: Ezekiel 7:18
source:
  edition: WLC
  text: וְ/חָגְר֣וּ שַׂקִּ֔ים וְ/כִסְּתָ֥ה אוֹתָ֖/ם פַּלָּצ֑וּת וְ/אֶ֤ל כָּל פָּנִים֙
    בּוּשָׁ֔ה וּ/בְ/כָל רָאשֵׁי/הֶ֖ם קָרְחָֽה־־׃
translation:
  text: They will put on sackcloth, and horror will cover them; shame will be on every
    face, and baldness on all their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terror will cover them.' The Hebrew noun פַּלָּצוּת conveys trembling
      dread or horror.
    reason: lexical_alternative
  - marker: b
    text: '''Baldness'' here signifies mourning and humiliation in the context of
      judgment.'
    reason: cultural_note
lexical_decisions:
- source_word: וְחָגְרוּ
  chosen: They will put on
  alternatives:
  - they will gird themselves with
  - they will wear
  lexicon: HALOT
  rationale: חגר literally means to gird or bind on. With שַׂקִּים as the object,
    the idiom refers to donning mourning attire. 'Put on' is natural modern English
    while preserving the concrete action.
- source_word: שַׂקִּים
  chosen: sackcloth
  alternatives:
  - sacks
  - coarse cloth
  lexicon: HALOT
  rationale: Standard term for the rough mourning garment in prophetic literature.
    Singular collective English 'sackcloth' is idiomatic even though the Hebrew is
    plural.
- source_word: וְכִסְּתָה אֹתָם
  chosen: will cover them
  alternatives:
  - has covered them
  - shall clothe them
  lexicon: HALOT
  rationale: The verb כסה means 'cover.' Although the form is morphologically perfect
    3fs, in this prophetic sequence it functions with future sense alongside the surrounding
    verbs. 'Will cover them' fits the context of coming judgment.
- source_word: פַּלָּצוּת
  chosen: horror
  alternatives:
  - terror
  - shuddering
  lexicon: HALOT
  rationale: The noun denotes trembling dread or horror. 'Horror' best captures the
    overwhelming state that metaphorically covers them, while 'terror' is a close
    alternative.
- source_word: וְאֶל כָּל פָּנִים בּוּשָׁה
  chosen: shame will be on every face
  alternatives:
  - on every face there will be disgrace
  - every face will show shame
  lexicon: HALOT
  rationale: The prepositional phrase with פנים is idiomatically rendered as shame
    being visible on every face. 'Shame' is preferable to 'disgrace' for directness
    and emotional force.
- source_word: וּבְכָל רָאשֵׁיהֶם קָרְחָה
  chosen: baldness on all their heads
  alternatives:
  - every head will be bald
  - shaven heads
  lexicon: HALOT
  rationale: קרחה denotes baldness, often as a sign of mourning or humiliation. The
    Hebrew is nominal rather than verbal, so 'baldness on all their heads' preserves
    the terse prophetic style.
