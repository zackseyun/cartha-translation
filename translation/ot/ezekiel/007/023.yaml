theological_decisions:
- issue: Interpretation of the judgment image הָרַתּוֹק
  chosen_reading: A literal or symbolic chain/fetter associated with coming judgment
    and captivity
  alternative_readings:
  - A general preparation for siege restraints
  - An abstract 'binding' without explicit captivity imagery
  rationale: The immediate context in Ezekiel 7 is invasion, punishment, and the end
    of security. Rendering the noun concretely as 'chain' preserves the prophetic
    image without over-interpreting the exact mechanism.
