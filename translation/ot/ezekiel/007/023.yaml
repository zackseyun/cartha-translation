id: EZK.7.23
reference: Ezekiel 7:23
source:
  edition: WLC
  text: עֲשֵׂ֖ה הָֽ/רַתּ֑וֹק כִּ֣י הָ/אָ֗רֶץ מָֽלְאָה֙ מִשְׁפַּ֣ט דָּמִ֔ים וְ/הָ/עִ֖יר
    מָלְאָ֥ה חָמָֽס׃
translation:
  text: Make the chain, for the land is full of bloody crimes, and the city is full
    of violence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fetter' or 'binding.' The Hebrew term likely evokes restraint, imprisonment,
      or captivity under judgment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'judgment of bloods.' The phrase likely refers to bloodguilt,
      murderous injustice, or crimes deserving judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֵׂה
  chosen: Make
  alternatives:
  - Prepare
  - Fashion
  lexicon: HALOT
  rationale: Qal imperative 2ms of עשה, a direct command. 'Make' is the most straightforward
    English imperative and fits the object that follows.
- source_word: הָרַתּוֹק
  chosen: the chain
  alternatives:
  - the fetter
  - the binding
  lexicon: HALOT
  rationale: The noun is commonly understood as 'chain/fetter.' In context of judgment
    and captivity, 'chain' is natural modern English and preserves the image of restraint.
    The prefixed article supports 'the chain.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperative. 'For' is concise and idiomatic
    in prophetic discourse.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Ezekiel's judgment context, 'the land' best reflects the territorial
    sense, likely the land of Israel/Judah, rather than the whole earth.
- source_word: מָלְאָה
  chosen: is full of
  alternatives:
  - has become full of
  lexicon: HALOT
  rationale: English present 'is full of' naturally conveys the stative/resultative
    force of the perfect here.
- source_word: מִשְׁפַּט דָּמִים
  chosen: bloody crimes
  alternatives:
  - judgment of bloodshed
  - bloodguilt judgment
  - bloodshed
  lexicon: HALOT
  rationale: The construct phrase is difficult literally ('judgment of bloods'). In
    context it denotes legal perversity saturated with bloodshed or bloodguilt. 'Bloody
    crimes' communicates the forensic and violent sense without wooden obscurity.
- source_word: וְהָעִיר
  chosen: and the city
  alternatives:
  - and the city there
  lexicon: HALOT
  rationale: Simple conjunction plus definite noun. 'The city' likely refers to Jerusalem
    as representative center.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - oppression
  lexicon: HALOT
  rationale: A standard rendering of חמס in prophetic judgment texts; it captures
    both brutality and social injustice.
