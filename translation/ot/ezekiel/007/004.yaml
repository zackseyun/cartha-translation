theological_decisions:
- issue: Divine judgment language and recompense formula
  chosen_reading: I will bring your ways upon you
  alternative_readings:
  - I will punish you for your ways
  - I will set your conduct upon you
  rationale: The Hebrew expresses a recompense formula without explicitly adding 'punish.'
    The chosen rendering preserves the metaphor of one's own ways returning upon oneself,
    maintaining the text's judicial force without interpretive expansion.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
