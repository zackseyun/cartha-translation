id: EZK.7.4
reference: Ezekiel 7:4
source:
  edition: WLC
  text: וְ/לֹא תָח֥וֹס עֵינִ֛/י עָלַ֖יִ/ךְ וְ/לֹ֣א אֶחְמ֑וֹל כִּ֣י דְרָכַ֜יִ/ךְ עָלַ֣יִ/ךְ
    אֶתֵּ֗ן וְ/תוֹעֲבוֹתַ֨יִ/ךְ֙ בְּ/תוֹכֵ֣/ךְ תִּֽהְיֶ֔יןָ וִ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י
    יְהוָֽה־־׃פ
translation:
  text: My eye will not spare you, nor will I have pity; for I will bring your ways
    upon you, and your abominations will be within you. Then you will know that I
    am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My eye will not have pity on you.' The Hebrew uses an idiom with 'eye'
      to express sparing or compassion.
    reason: lexical_alternative
  - marker: b
    text: Or 'your abominations will be in your midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָחוֹס עֵינִי
  chosen: My eye will not spare
  alternatives:
  - My eye will not have pity
  - I will not look with compassion
  lexicon: HALOT
  rationale: חוס with 'eye' is an idiom of sparing or looking compassionately. 'My
    eye will not spare' preserves the Hebrew imagery and matches prophetic judgment
    diction better than a more paraphrastic rendering.
- source_word: אֶחְמֹל
  chosen: nor will I have pity
  alternatives:
  - nor will I spare
  - nor will I show compassion
  lexicon: HALOT
  rationale: חמל overlaps with חוס but adds the sense of pity/compassion. Rendering
    it distinctly as 'have pity' preserves the rhetorical doubling rather than flattening
    both verbs into the same English gloss.
- source_word: דְרָכַיִךְ
  chosen: your ways
  alternatives:
  - your conduct
  - your behavior
  lexicon: HALOT
  rationale: '''Ways'' is the standard and theologically resonant rendering for דרך
    in judgment contexts, referring to one''s manner of life and actions. It also
    preserves the metaphorical texture of the Hebrew.'
- source_word: עָלַיִךְ אֶתֵּן
  chosen: I will bring ... upon you
  alternatives:
  - I will set ... upon you
  - I will put ... on you
  lexicon: HALOT
  rationale: Although נתן is literally 'give/put,' in this judgment formula English
    idiom is best served by 'bring ... upon you,' which clearly conveys imposed recompense
    while remaining close to the source sense.
- source_word: וְתוֹעֲבוֹתַיִךְ
  chosen: and your abominations
  alternatives:
  - and your detestable deeds
  - and your abhorrent acts
  lexicon: HALOT
  rationale: תועבות often denotes abhorrent, especially idolatrous, offenses. 'Abominations'
    preserves the covenantal and prophetic force better than a softened dynamic equivalent.
- source_word: בְּתוֹכֵךְ תִּהְיֶיןָ
  chosen: will be within you
  alternatives:
  - will be in your midst
  - will remain in you
  lexicon: HALOT
  rationale: The phrase is somewhat terse. 'Within you' preserves the spatial language
    and likely conveys that the consequences/evidence of the abominations are present
    in Jerusalem herself. 'In your midst' is possible, but 'within you' reads more
    naturally in English while staying close to the Hebrew.
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  lexicon: HALOT
  rationale: 'The prefixed conjunction can be rendered simply ''and,'' but in context
    it marks result: after judgment, recognition follows. ''Then'' makes the discourse
    relation explicit without overtranslating.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
