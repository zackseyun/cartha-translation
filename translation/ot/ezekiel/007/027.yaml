theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the recognition formula וְיָדְעוּ כִּי אֲנִי יְהוָה
  chosen_reading: Then they will know that I am the LORD
  alternative_readings:
  - And they will know that I am the LORD
  rationale: The clause is a standard Ezekiel formula expressing the theological purpose/result
    of judgment. 'Then' clarifies the consequential sense in this context without
    adding doctrinal content.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
