id: EZK.7.27
reference: Ezekiel 7:27
source:
  edition: WLC
  text: הַ/מֶּ֣לֶךְ יִתְאַבָּ֗ל וְ/נָשִׂיא֙ יִלְבַּ֣שׁ שְׁמָמָ֔ה וִ/ידֵ֥י עַם הָ/אָ֖רֶץ
    תִּבָּהַ֑לְנָה מִ/דַּרְכָּ֞/ם אֶעֱשֶׂ֤ה אוֹתָ/ם֙ וּ/בְ/מִשְׁפְּטֵי/הֶ֣ם אֶשְׁפְּטֵ֔/ם
    וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־־׃פ
translation:
  text: The king will mourn, and the prince will clothe himself with desolation, and
    the hands of the people of the land will tremble. According to their way I will
    deal with them, and by their own judgments I will judge them. Then they will know
    that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the prince will put on horror' or 'will be clothed with desolation.'
      The Hebrew uses a clothing metaphor with a noun that can denote desolation or
      appalled ruin.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the hands of the common people will be terrified.' 'People of the land'
      is a Hebrew expression for the populace.
    reason: lexical_alternative
  - marker: c
    text: Or, 'according to their judgments I will judge them.' The Hebrew may mean
      that God judges them by the standards reflected in their own judicial practices.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - the monarch
  lexicon: HALOT
  rationale: Straightforward political title; 'king' is the natural and standard English
    equivalent.
- source_word: יִתְאַבָּל
  chosen: will mourn
  alternatives:
  - will lament
  lexicon: HALOT
  rationale: The verb denotes mourning or lamentation. 'Mourn' is concise, natural
    English and fits the context of national catastrophe.
- source_word: וְנָשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא often denotes a chief, prince, or leader. 'Prince' preserves
    the elevated official sense without flattening it to a generic 'leader.'
- source_word: יִלְבַּשׁ שְׁמָמָה
  chosen: will clothe himself with desolation
  alternatives:
  - will put on horror
  - will be clothed with desolation
  lexicon: HALOT
  rationale: The Hebrew literally uses the clothing metaphor with שְׁמָמָה ('desolation,'
    'appallment'). Preserving the metaphor reflects the source text's vividness better
    than a paraphrase.
- source_word: וִידֵי עַם הָאָרֶץ
  chosen: the hands of the people of the land
  alternatives:
  - the hands of the people of the הארץ
  - the hands of the common people
  lexicon: HALOT
  rationale: The idiom focuses on the people's strength or capacity as represented
    by their hands. 'People of the land' is retained rather than paraphrased, since
    it is a common biblical expression and may denote the populace broadly.
- source_word: תִּבָּהַלְנָה
  chosen: will tremble
  alternatives:
  - will be terrified
  - will panic
  lexicon: HALOT
  rationale: The Niphal of בהל conveys being disturbed, terrified, or thrown into
    panic. 'Will tremble' captures the embodied fear and fits the image of the hands.
- source_word: מִדַּרְכָּם אֶעֱשֶׂה אוֹתָם
  chosen: According to their way I will deal with them
  alternatives:
  - From their way I will act toward them
  - I will deal with them according to their conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ here refers to conduct or manner of life. 'Deal with them according
    to their way' is the sense; 'according to their way I will deal with them' is
    idiomatic English while preserving the judicial reciprocity.
- source_word: וּבְמִשְׁפְּטֵיהֶם אֶשְׁפְּטֵם
  chosen: by their own judgments I will judge them
  alternatives:
  - according to their judgments I will judge them
  - with their ordinances I will judge them
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or ordinance. In
    this context of retributive justice, 'judgments' best preserves the forensic sense.
    'Their own' is supplied in English to make clear the reflexive force implied by
    the suffix.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  chosen: Then they will know that I am the LORD
  alternatives:
  - And they will know that I am the LORD
  lexicon: HALOT
  rationale: This is Ezekiel's recurring recognition formula. 'Then' brings out the
    resultative force in context. Per doctrine, יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
