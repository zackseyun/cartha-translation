theological_decisions:
- issue: Interpretation of the final clause about iniquity and life
  chosen_reading: The clause states that no person will secure or preserve his life
    through his iniquity.
  alternative_readings:
  - No one whose life is in his iniquity will strengthen himself
  - They will not strengthen their lives in their iniquity
  rationale: 'The Hebrew syntax is difficult, especially with the plural verb after
    singular אִישׁ. The chosen rendering reflects the most coherent sense in context:
    sinful schemes will not avert the decreed judgment. This preserves the warning
    without importing later doctrinal categories.'
  doctrine_reference: Preserve theological tension rather than resolve it
