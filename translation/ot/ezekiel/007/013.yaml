id: EZK.7.13
reference: Ezekiel 7:13
source:
  edition: WLC
  text: כִּ֣י הַ/מּוֹכֵ֗ר אֶל הַ/מִּמְכָּר֙ לֹ֣א יָשׁ֔וּב וְ/ע֥וֹד בַּ/חַיִּ֖ים חַיָּתָ֑/ם
    כִּֽי חָז֤וֹן אֶל כָּל הֲמוֹנָ/הּ֙ לֹ֣א יָשׁ֔וּב וְ/אִ֧ישׁ בַּ/עֲוֺנ֛/וֹ חַיָּת֖/וֹ
    לֹ֥א יִתְחַזָּֽקוּ־־־־׃
translation:
  text: For the seller will not return to what was sold, though they are still alive;
    for the vision concerning all its multitude will not turn back, and no man will
    strengthen his life by his iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the sale,' that is, to the property or possession that was sold.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'while still among the living, their life'—a compressed expression
      meaning that even if the parties remain alive, the seller will not recover what
      was sold.
    reason: lexical_alternative
  - marker: c
    text: Or 'against all its multitude.' The preposition can suggest direction toward
      the whole population under judgment.
    reason: alternative_reading
  - marker: d
    text: Or 'will not be revoked.' The sense is that the announced judgment will
      not be reversed.
    reason: alternative_reading
  - marker: e
    text: The Hebrew of the final clause is difficult. It likely means that no one
      will secure his life by means of his iniquity.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמּוֹכֵר
  chosen: the seller
  alternatives:
  - the one selling
  lexicon: HALOT
  rationale: Active participle used substantivally; 'the seller' is natural English
    and preserves the concrete commercial image in the judgment context.
- source_word: אֶל הַמִּמְכָּר
  chosen: to what was sold
  alternatives:
  - to the sale
  - to the thing sold
  - to his sold property
  lexicon: HALOT
  rationale: The phrase literally points 'to the sale/sold thing.' In context of land/property
    transfer, the sense is return to the sold property or transaction. 'To what was
    sold' preserves the Hebrew compactness without over-specifying land.
- source_word: לֹא יָשׁוּב
  chosen: will not return
  alternatives:
  - shall not return
  - will not go back
  lexicon: HALOT
  rationale: Common sense of שוב. 'Will not return' is both formal and idiomatic,
    and it also allows the later repetition with the vision to be echoed consistently.
- source_word: וְעוֹד בַּחַיִּים חַיָּתָם
  chosen: though they are still alive
  alternatives:
  - while their life is still among the living
  - even though they are yet alive
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat awkward literally ('while still
    among the living, their life'). The clause means that even if both parties remain
    alive, the seller will not recover the sold property. 'Though they are still alive'
    communicates the force clearly in modern English.
- source_word: חָזוֹן
  chosen: the vision
  alternatives:
  - the prophetic vision
  - the oracle
  lexicon: HALOT
  rationale: Standard rendering for prophetic revelation. 'Vision' is sufficiently
    clear and preserves the prophetic register.
- source_word: אֶל כָּל הֲמוֹנָהּ
  chosen: concerning all its multitude
  alternatives:
  - against all its multitude
  - upon all its multitude
  lexicon: HALOT
  rationale: The preposition אֶל here marks direction/reference of the vision. Because
    the vision is about the city's/land's populous mass, 'concerning' best fits English
    while avoiding an overly interpretive hostile nuance, though judgment is clearly
    implied by context.
- source_word: לֹא יָשׁוּב
  chosen: will not turn back
  alternatives:
  - will not return
  - will not be revoked
  lexicon: HALOT
  rationale: Repetition of שוב is preserved, but varied slightly for readable English.
    The sense is that the announced judgment will not be reversed or withdrawn.
- source_word: וְאִישׁ
  chosen: no man
  alternatives:
  - no one
  - no person
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the stated philosophy. Here אִישׁ is
    distributive ('each man' / 'any man'). 'No man' preserves the singular representative
    force of the Hebrew.
- source_word: בַּעֲוֹנוֹ
  chosen: by his iniquity
  alternatives:
  - through his guilt
  - in his iniquity
  lexicon: HALOT
  rationale: עָוֹן often denotes iniquity/guilt. Here the phrase indicates the sphere
    or means tied to sin; 'by his iniquity' best fits the following verb and the ironic
    sense that sin cannot secure life.
- source_word: חַיָּתוֹ
  chosen: his life
  alternatives:
  - his living strength
  - his vitality
  lexicon: HALOT
  rationale: From the חיים/חיה word-group, here referring to one's life/life-force.
    'His life' is the clearest rendering in context.
- source_word: לֹא יִתְחַזָּקוּ
  chosen: will strengthen
  alternatives:
  - will preserve
  - will make secure
  - will sustain
  lexicon: HALOT
  rationale: Hitpael/plural form with a difficult syntax. The clause is commonly understood
    to mean that no one will make his life strong/secure by means of his iniquity.
    English singular 'no man will strengthen his life' conveys the distributive sense,
    while preserving the underlying metaphor of strength rather than paraphrasing
    to 'save'.
