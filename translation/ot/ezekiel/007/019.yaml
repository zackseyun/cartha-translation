theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and established English convention while signaling the covenant
    name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render נִדָּה with explicit menstrual imagery
  chosen_reading: an unclean thing
  alternative_readings:
  - menstrual impurity
  - filth
  rationale: The Hebrew term can specifically denote menstrual impurity, but in this
    prophetic metaphor the broader sense of ritual uncleanness is primary. The main
    text keeps the metaphor accessible while a footnote preserves the more specific
    lexical nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #6'
- issue: Sense of נַפְשָׁם in context
  chosen_reading: their appetite
  alternative_readings:
  - their soul
  - their life
  rationale: The immediate parallel with filling the inward parts indicates physical
    hunger rather than a doctrinal statement about the soul. This preserves contextual
    sense and avoids importing later anthropological categories.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3'
