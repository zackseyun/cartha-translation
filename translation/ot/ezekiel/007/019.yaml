id: EZK.7.19
reference: Ezekiel 7:19
source:
  edition: WLC
  text: כַּסְפָּ֞/ם בַּ/חוּצ֣וֹת יַשְׁלִ֗יכוּ וּ/זְהָבָ/ם֮ לְ/נִדָּ֣ה יִֽהְיֶה֒ כַּסְפָּ֨/ם
    וּ/זְהָבָ֜/ם לֹֽא יוּכַ֣ל לְ/הַצִּילָ֗/ם בְּ/יוֹם֙ עֶבְרַ֣ת יְהוָ֔ה נַפְשָׁ/ם֙
    לֹ֣א יְשַׂבֵּ֔עוּ וּ/מֵעֵי/הֶ֖ם לֹ֣א יְמַלֵּ֑אוּ כִּֽי מִכְשׁ֥וֹל עֲוֺנָ֖/ם הָיָֽה־־׃
translation:
  text: They will throw their silver into the streets, and their gold will become
    an unclean thing. Their silver and their gold will not be able to deliver them
    in the day of the LORD’s wrath. They will not satisfy their appetite, nor fill
    their stomachs, for it has become the stumbling block of their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “their gold will be for impurity”; the Hebrew term can
      evoke menstrual uncleanness and thus something ritually repulsive.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפָּם
  chosen: their silver
  alternatives:
  - their money
  lexicon: HALOT
  rationale: כֶּסֶף can denote silver as a metal or money. In parallel with 'their
    gold' and in a judgment context about precious metals being discarded, 'silver'
    best preserves the concrete image.
- source_word: בַּחוּצוֹת
  chosen: into the streets
  alternatives:
  - outside
  - in the open places
  lexicon: HALOT
  rationale: חוּצוֹת refers to streets or open places of a city. 'Into the streets'
    is idiomatic and preserves the public, contemptuous casting away of wealth.
- source_word: יַשְׁלִיכוּ
  chosen: they will throw
  alternatives:
  - they will cast
  lexicon: HALOT
  rationale: The Hiphil of שלך conveys throwing/casting away. 'Throw' is more natural
    modern English while retaining the forceful action.
- source_word: וּזְהָבָם
  chosen: their gold
  lexicon: HALOT
  rationale: Straightforward rendering of the precious metal, kept parallel with 'their
    silver'.
- source_word: לְנִדָּה יִהְיֶה
  chosen: will become an unclean thing
  alternatives:
  - will be as impurity
  - will become something impure
  - will be treated as filth
  lexicon: HALOT
  rationale: נִדָּה often denotes impurity, especially menstrual uncleanness, but
    here functions metaphorically for something ritually repulsive. 'An unclean thing'
    communicates the sense without importing overly specific imagery into the main
    text.
- source_word: לֹא יוּכַל לְהַצִּילָם
  chosen: will not be able to deliver them
  alternatives:
  - will not be able to save them
  - cannot rescue them
  lexicon: HALOT
  rationale: The singular verb with the compound subject is a common collective construction.
    'Deliver' fits prophetic judgment language and avoids narrowing the sense to eternal
    salvation.
- source_word: בְּיוֹם עֶבְרַת יְהוָה
  chosen: in the day of the LORD’s wrath
  alternatives:
  - on the day of the LORD’s fury
  - in the day of the LORD’s overflowing anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes wrath/fury. 'The LORD' follows the project's default
    rendering for יְהוָה. 'Day of the LORD’s wrath' is clear and idiomatic.
- source_word: נַפְשָׁם
  chosen: their appetite
  alternatives:
  - their soul
  - their life
  - their desire
  lexicon: HALOT
  rationale: In this context of eating and bodily filling, נֶפֶשׁ refers to the life/appetite
    of the person, not an abstract immaterial soul. 'Appetite' best fits the immediate
    parallelism.
- source_word: לֹא יְשַׂבֵּעוּ
  chosen: they will not satisfy
  alternatives:
  - they will not be satisfied
  - they will not satiate
  lexicon: HALOT
  rationale: With 'their appetite' as object, the active sense 'satisfy' is the most
    natural English rendering.
- source_word: וּמֵעֵיהֶם
  chosen: their stomachs
  alternatives:
  - their inward parts
  - their bellies
  lexicon: HALOT
  rationale: מֵעֶה literally refers to inward parts/bowels, but in a food context
    it points concretely to the stomach/belly. 'Stomachs' is natural modern English.
- source_word: לֹא יְמַלֵּאוּ
  chosen: nor fill
  alternatives:
  - nor make full
  lexicon: HALOT
  rationale: Simple verbal parallel to the previous clause; 'fill' is idiomatic with
    'stomachs'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason the wealth cannot help them. 'For' preserves the
    explanatory connection concisely.
- source_word: מִכְשׁוֹל
  chosen: stumbling block
  alternatives:
  - snare
  - cause of stumbling
  lexicon: HALOT
  rationale: מִכְשׁוֹל commonly denotes something that causes stumbling. Here it refers
    to wealth as an occasion for sin and downfall.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their sin
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity, guilt, or punishment for guilt. Here 'their
    iniquity' best expresses the moral perversity associated with their misuse of
    wealth.
- source_word: הָיָה
  chosen: it has become
  alternatives:
  - it was
  - it became
  lexicon: HALOT
  rationale: The perfect summarizes the resulting state of their wealth in relation
    to their sin. 'Has become' communicates that resultant condition in English.
