theological_decisions:
- issue: Referent of the feminine suffix in הֲמוֹנָהּ
  chosen_reading: Rendered neutrally as 'her multitude' without specifying the antecedent
    in the main text.
  alternative_readings:
  - the multitude of the city
  - the multitude of the land
  - her wealth/abundance
  rationale: The Hebrew suffix is feminine singular, but the immediate antecedent
    is not explicit enough to justify importing 'Jerusalem' or 'the land' into the
    translation. Preserving 'her' keeps the source-text ambiguity and avoids over-interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
