id: EZK.7.14
reference: Ezekiel 7:14
source:
  edition: WLC
  text: תָּקְע֤וּ בַ/תָּק֨וֹעַ֙ וְ/הָכִ֣ין הַ/כֹּ֔ל וְ/אֵ֥ין הֹלֵ֖ךְ לַ/מִּלְחָמָ֑ה
    כִּ֥י חֲרוֹנִ֖/י אֶל כָּל הֲמוֹנָֽ/הּ־־׃
translation:
  text: They have blown the trumpet and made everything ready, but no one goes to
    the battle, for my wrath is against all her multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the horn' or 'the ram's horn.'
    reason: lexical_alternative
  - marker: b
    text: Or 'against all her wealth/abundance,' if הֲמוֹנָהּ is taken in the sense
      of material abundance rather than population.
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּקְעוּ
  chosen: have blown
  alternatives:
  - blow
  - sound
  lexicon: HALOT
  rationale: The verb תקע with the following noun for trumpet/horn commonly means
    to blow or sound it. The perfect is rendered with present relevance in English
    ('have blown') to fit the sequence of completed preparation followed by the result
    that no one goes.
- source_word: בַתָּקוֹעַ
  chosen: the trumpet
  alternatives:
  - the horn
  - the ram's horn
  lexicon: HALOT
  rationale: The noun תקוע here denotes the instrument being blown. 'Trumpet' is the
    most natural modern English rendering in a military-mobilization context, though
    'horn' is a possible more literal alternative.
- source_word: וְהָכִין הַכֹּל
  chosen: and made everything ready
  alternatives:
  - and prepared everything
  - and set all in order
  lexicon: HALOT
  rationale: כון in the Hiphil means to prepare, make ready, establish. With הכל,
    the sense is comprehensive military preparation. 'Made everything ready' is idiomatic
    modern English and preserves the scope of הכל.
- source_word: וְאֵין הֹלֵךְ
  chosen: but no one goes
  alternatives:
  - yet none goes
  - and there is no one going
  lexicon: HALOT
  rationale: The existential אין plus participle expresses the absence of anyone proceeding.
    'No one goes' is clear English; 'but' brings out the adversative force in context
    between preparation and non-response.
- source_word: לַמִּלְחָמָה
  chosen: to the battle
  alternatives:
  - to war
  - into battle
  lexicon: HALOT
  rationale: מלחמה can mean war or battle. Here the immediate act of going out after
    the trumpet suggests the concrete engagement, so 'to the battle' fits the scene.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason no one goes to battle. 'For' is concise and natural
    in English biblical style.
- source_word: חֲרוֹנִי
  chosen: my wrath
  alternatives:
  - my burning anger
  - my fierce anger
  lexicon: HALOT
  rationale: From חרון, denoting burning anger or wrath. 'My wrath' is concise and
    weighty; the possessive suffix is preserved.
- source_word: אֶל כָּל הֲמוֹנָהּ
  chosen: against all her multitude
  alternatives:
  - against all her crowd
  - upon all her multitude
  - against all her wealth
  lexicon: HALOT
  rationale: המון often means multitude, throng, tumult, or abundance/wealth depending
    on context. In Ezekiel 7 the term can carry the sense of the populous mass of
    the city/land, and this fits the military and judgment context best. The preposition
    אל is rendered contextually as 'against' with wrath. The feminine suffix likely
    refers to the city/land previously in view.
