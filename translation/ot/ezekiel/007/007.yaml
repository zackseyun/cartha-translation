id: EZK.7.7
reference: Ezekiel 7:7
source:
  edition: WLC
  text: בָּ֧אָה הַ/צְּפִירָ֛ה אֵלֶ֖י/ךָ יוֹשֵׁ֣ב הָ/אָ֑רֶץ בָּ֣א הָ/עֵ֗ת קָר֛וֹב הַ/יּ֥וֹם
    מְהוּמָ֖ה וְ/לֹא הֵ֥ד הָרִֽים־׃
translation:
  text: Doom has come upon you, inhabitant of the land. The time has come; the day
    is near—panic, and not joyful shouting on the mountains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The turn has come upon you' or 'Your destiny has come.' The Hebrew term
      is rare and difficult.
    reason: lexical_alternative
  - marker: b
    text: Or 'tumult, and not echo on the mountains.' The final clause is difficult;
      many understand it as a contrast between panic and the usual joyful shouting
      heard on the mountains, possibly at harvest.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּפִירָה
  chosen: doom
  alternatives:
  - turn
  - crown
  - destiny
  lexicon: HALOT
  rationale: The noun is rare and difficult. In this judgment context, with repeated
    'has come' and parallel 'the time has come,' it most plausibly denotes the decisive
    turn/end that has arrived, hence 'doom.' Alternatives such as 'turn' or 'destiny'
    are possible but less explicit in English; 'crown' is lexically attested elsewhere
    but does not fit the context well.
- source_word: יוֹשֵׁב הָאָרֶץ
  chosen: inhabitant of the land
  alternatives:
  - dweller in the land
  - inhabitant of the earth
  lexicon: HALOT
  rationale: 'Singular participle plus noun is naturally rendered as a vocative/address:
    ''inhabitant of the land.'' ''Land'' fits the immediate address to the people
    of the country better than the broader ''earth,'' though the latter is lexically
    possible.'
- source_word: הָעֵת
  chosen: the time
  alternatives:
  - the appointed time
  - the moment
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the temporal announcement.
    'Appointed time' is possible, but the Hebrew here does not require the added nuance
    in English.
- source_word: קָרוֹב הַיּוֹם
  chosen: the day is near
  alternatives:
  - near is the day
  lexicon: HALOT
  rationale: Natural English preserving the Hebrew emphasis on imminence.
- source_word: מְהוּמָה
  chosen: panic
  alternatives:
  - tumult
  - confusion
  - uproar
  lexicon: HALOT
  rationale: In prophetic judgment contexts the term denotes disorder and terror.
    'Panic' communicates the experiential force clearly in modern English.
- source_word: הֵד
  chosen: joyful shouting
  alternatives:
  - echo
  - shouting
  - vintage shouting
  lexicon: HALOT
  rationale: The contrast is between judgmental tumult and the kind of celebratory
    cry associated with mountains/vineyards. 'Joyful shouting' makes the implied contrast
    explicit for English readers. 'Echo' is too neutral, and 'vintage shouting' is
    more interpretive and archaic.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: Standard rendering of the plural noun; mountains likely evoke the places
    from which celebratory cries would normally be heard.
