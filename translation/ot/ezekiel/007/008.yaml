id: EZK.7.8
reference: Ezekiel 7:8
source:
  edition: WLC
  text: עַתָּ֣ה מִ/קָּר֗וֹב אֶשְׁפּ֤וֹךְ חֲמָתִ/י֙ עָלַ֔יִ/ךְ וְ/כִלֵּיתִ֤י אַפִּ/י֙
    בָּ֔/ךְ וּ/שְׁפַטְתִּ֖י/ךְ כִּ/דְרָכָ֑יִ/ךְ וְ/נָתַתִּ֣י עָלַ֔יִ/ךְ אֵ֖ת כָּל
    תּוֹעֲבוֹתָֽיִ/ךְ־׃
translation:
  text: Now, very soon, I will pour out my wrath on you, and I will spend my anger
    against you; I will judge you according to your ways, and I will bring all your
    abominations upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shortly' or 'in a little while'; the Hebrew expression denotes imminent
      judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will exhaust my anger on you.' The Hebrew idiom means that God's anger
      will run its full course against the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Temporal adverb marking immediacy in the prophetic announcement. 'Now'
    is natural and preserves the urgent shift to imminent judgment.
- source_word: מִקָּרוֹב
  chosen: very soon
  alternatives:
  - from nearby
  - shortly
  - in a little while
  lexicon: HALOT
  rationale: In context this adverbial phrase expresses temporal nearness, not spatial
    proximity. 'Very soon' captures the force of imminent action in idiomatic English.
- source_word: אֶשְׁפּוֹךְ חֲמָתִי עָלַיִךְ
  chosen: I will pour out my wrath on you
  alternatives:
  - I will pour out my fury on you
  - I will pour out my heat on you
  lexicon: HALOT
  rationale: שׁפך with חֵמָה is a common judgment idiom. 'Wrath' communicates divine
    judicial anger clearly in modern English; 'pour out' preserves the metaphor.
- source_word: וְכִלֵּיתִי אַפִּי בָּךְ
  chosen: I will spend my anger against you
  alternatives:
  - I will exhaust my anger on you
  - I will satisfy my anger against you
  - I will complete my anger against you
  lexicon: HALOT
  rationale: כלה with אַף conveys bringing anger to its full course or completion.
    'Spend my anger against you' preserves the idea of anger fully expended without
    sounding overly wooden; 'against you' makes the hostile force explicit from בָּךְ.
- source_word: וּשְׁפַטְתִּיךְ
  chosen: I will judge you
  alternatives:
  - I will punish you
  - I will pass judgment on you
  lexicon: HALOT
  rationale: The verb is fundamentally judicial. 'Judge you' keeps the legal-theological
    sense, while the following phrases specify the punitive outcome.
- source_word: כִּדְרָכָיִךְ
  chosen: according to your ways
  alternatives:
  - according to your conduct
  - in keeping with your ways
  lexicon: HALOT
  rationale: דֶּרֶךְ here refers metaphorically to conduct or manner of life. 'Ways'
    preserves the Hebrew metaphor and common prophetic diction.
- source_word: וְנָתַתִּי עָלַיִךְ אֵת כָּל תּוֹעֲבוֹתָיִךְ
  chosen: I will bring all your abominations upon you
  alternatives:
  - I will set all your abominations upon you
  - I will lay on you all your abominations
  - I will bring on you all your detestable deeds
  lexicon: HALOT
  rationale: נתן על in this judgment context means to impose or bring consequences
    upon someone. 'Bring ... upon you' is idiomatic and preserves the causative force.
    תּוֹעֵבוֹת is rendered 'abominations' to retain the strong moral-religious weight
    of the Hebrew, especially in Ezekiel's idolatry context.
