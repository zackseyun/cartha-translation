theological_decisions:
- issue: Rendering divine anger terms distinctly
  chosen_reading: 'Different English terms are used for חֲמָה and אַף: ''wrath'' and
    ''anger.'''
  alternative_readings:
  - Use the same English term for both
  - Render both more dynamically as 'fury'
  rationale: The Hebrew employs two related but distinct anger terms in parallel.
    Using two English terms preserves the rhetorical intensification without overstating
    a technical distinction.
