id: EZK.7.21
reference: Ezekiel 7:21
source:
  edition: WLC
  text: וּ/נְתַתִּ֤י/ו בְּ/יַֽד הַ/זָּרִים֙ לָ/בַ֔ז וּ/לְ/רִשְׁעֵ֥י הָ/אָ֖רֶץ לְ/שָׁלָ֑ל
    ו/חלל/ה־׃
translation:
  text: And I will give it into the hand of foreigners for plunder, and to the wicked
    of the earth for spoil, and they will profane it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wicked of the land.' The Hebrew word can mean either 'earth' or
      'land' depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'defile it' or 'desecrate it.' The verb carries the sense of profaning
      what is holy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּיו
  chosen: And I will give it
  alternatives:
  - And I will hand it over
  - And I will deliver it
  lexicon: HALOT
  rationale: נתן with 1cs + 3ms suffix is a straightforward future-like declaration
    in prophetic discourse. 'Give it' is the most direct rendering; 'hand it over'
    is possible but slightly more interpretive. The 3ms object is left as 'it,' referring
    back to the previously mentioned object in context.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is common in Hebrew for transfer into someone's
    control. Preserving 'hand' maintains the idiomatic force while remaining natural
    in English.
- source_word: הַזָּרִים
  chosen: foreigners
  alternatives:
  - strangers
  - aliens
  lexicon: HALOT
  rationale: זָרִים here denotes outsiders/foreigners rather than merely unknown persons.
    'Foreigners' is clear modern English and fits the invasion-plunder context better
    than 'strangers.'
- source_word: לָבַז
  chosen: for plunder
  alternatives:
  - as plunder
  - for prey
  lexicon: HALOT
  rationale: בַּז refers to plunder/booty taken by force. 'For plunder' matches the
    lamed of result/purpose and is idiomatic in English.
- source_word: וּלְרִשְׁעֵי הָאָרֶץ
  chosen: and to the wicked of the earth
  alternatives:
  - and to the wicked of the land
  lexicon: HALOT
  rationale: רשׁעי means 'wicked ones.' הָאָרֶץ can mean 'land' or 'earth.' In Ezekiel,
    either is possible, but 'earth' preserves the broader sense and matches the supplied
    Hebrew form without narrowing it to a specific territory unless context demands
    it.
- source_word: לְשָׁלָל
  chosen: for spoil
  alternatives:
  - as spoil
  - for booty
  lexicon: HALOT
  rationale: שָׁלָל is a near-synonym of בַּז. Rendering it 'spoil' preserves the
    parallelism without flattening both nouns into the same English word.
- source_word: וְחִלְּלוּהָ
  chosen: and they will profane it
  alternatives:
  - and they will defile it
  lexicon: HALOT
  rationale: חלל in the piel commonly means to profane, desecrate, or defile what
    is holy. 'Profane it' best preserves the sacrilegious sense, especially in Ezekiel
    where holiness/profanation is a major theme. The plural sense is reflected by
    'they,' referring to the invaders/wicked.
