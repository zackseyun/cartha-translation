theological_decisions:
- issue: Rendering of חלל in a holiness context
  chosen_reading: profane
  alternative_readings:
  - defile
  - desecrate
  rationale: Because Ezekiel frequently frames judgment in terms of holiness violated,
    'profane' better preserves the theological dimension of treating something holy
    as common, rather than merely making it ritually dirty.
  doctrine_reference: 'Translation philosophy: preserve theological weight without
    paraphrase.'
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The Hebrew can denote either the land or the earth. No doctrinal issue
    is at stake, but the broader rendering is retained in the main text to avoid over-specifying
    the referent beyond the source text. The alternative is preserved in a footnote
    because context could support 'land.'
  doctrine_reference: 'Translation philosophy: preserve ambiguity where the source
    is genuinely ambiguous.'
