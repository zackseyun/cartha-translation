theological_decisions:
- issue: Rendering תּוֹרָה in a priestly context
  chosen_reading: instruction
  alternative_readings:
  - law
  - teaching
  rationale: 'The verse describes the collapse of recognized sources of guidance:
    prophet, priest, and elders. In that triad, torah from the priest is best understood
    as priestly instruction/teaching rather than the Mosaic law as an abstract corpus.
    This avoids importing a narrower legal sense the context does not require.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Institutional vs. individual force of singular nouns in the leadership triad
  chosen_reading: from a prophet ... from the priest ... from the elders
  alternative_readings:
  - from the prophet ... from the priest ... from elders
  rationale: The Hebrew uses singular forms for prophet and priest and plural for
    elders. The translation reflects English idiom while preserving the institutional
    collapse of all normal channels of guidance, without over-specifying a single
    known prophet or priest.
  doctrine_reference: Translation philosophy §6
