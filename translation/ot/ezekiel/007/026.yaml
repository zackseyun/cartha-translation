id: EZK.7.26
reference: Ezekiel 7:26
source:
  edition: WLC
  text: הֹוָ֤ה עַל הֹוָה֙ תָּב֔וֹא וּ/שְׁמֻעָ֥ה אֶל שְׁמוּעָ֖ה תִּֽהְיֶ֑ה וּ/בִקְשׁ֤וּ
    חָזוֹן֙ מִ/נָּבִ֔יא וְ/תוֹרָה֙ תֹּאבַ֣ד מִ/כֹּהֵ֔ן וְ/עֵצָ֖ה מִ/זְּקֵנִֽים־־׃
translation:
  text: Disaster upon disaster will come, and rumor upon rumor will arise. They will
    seek a vision from a prophet, but instruction will perish from the priest, and
    counsel from the elders.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'report upon report.' The Hebrew term can mean either 'rumor' or 'report';
      here it likely refers to repeated alarming news spreading through the people.
    reason: lexical_alternative
  - marker: b
    text: Or 'law will perish from the priest.' The Hebrew torah can mean 'instruction,'
      'teaching,' or 'law'; in this context it likely refers to priestly instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹוָה
  chosen: disaster
  alternatives:
  - calamity
  - ruin
  - havoc
  lexicon: HALOT
  rationale: The noun denotes destructive calamity or ruin in a judgment context.
    'Disaster' is natural modern English and fits Ezekiel's tone without sounding
    archaic. Repeating it preserves the Hebrew intensification in הֹוָה עַל הֹוָה.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - after
  lexicon: HALOT
  rationale: In the idiom הֹוָה עַל הֹוָה, 'upon' best preserves the piling-up sense
    of one calamity coming on top of another.
- source_word: תָּב֔וֹא
  chosen: will come
  alternatives:
  - will arrive
  - will befall
  lexicon: HALOT
  rationale: The verb בוא is common and straightforward here. 'Will come' keeps the
    concrete force of the Hebrew while allowing the subject 'disaster' to remain vivid.
- source_word: שְׁמֻעָה / שְׁמוּעָה
  chosen: rumor
  alternatives:
  - report
  - news
  lexicon: HALOT
  rationale: In this context of social collapse and alarming tidings, 'rumor' better
    conveys unsettling reports spreading from one to another. 'Report' is possible
    but less evocative of panic.
- source_word: אֶל
  chosen: upon
  alternatives:
  - to
  - after
  lexicon: HALOT
  rationale: Although literally 'to,' the phrase שְׁמֻעָה אֶל שְׁמוּעָה is idiomatic,
    expressing accumulation. Rendering it 'rumor upon rumor' mirrors the first colon
    and communicates the cascading effect.
- source_word: תִּֽהְיֶה
  chosen: will arise
  alternatives:
  - will be
  - will happen
  lexicon: HALOT
  rationale: The verb היה is semantically broad. 'Will arise' gives idiomatic English
    with 'rumor' as subject and conveys the emergence of repeated reports more naturally
    than the bare 'will be.'
- source_word: וּבִקְשׁוּ
  chosen: they will seek
  alternatives:
  - they will look for
  - they will inquire after
  lexicon: HALOT
  rationale: בקשׁ commonly means 'seek.' This preserves the active attempt to obtain
    divine guidance.
- source_word: חָזוֹן
  chosen: a vision
  alternatives:
  - vision
  - revelation
  lexicon: HALOT
  rationale: חזון in prophetic literature refers to revelatory vision. 'A vision'
    is the most direct and established rendering here.
- source_word: מִנָּבִיא
  chosen: from a prophet
  alternatives:
  - from the prophet
  lexicon: HALOT
  rationale: The absence of the article supports an indefinite sense. The people seek
    any prophetic revelation, not necessarily from one specific prophet.
- source_word: תּוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: Here torah refers to priestly instruction rather than specifically codified
    law. 'Instruction' best captures the priest's teaching role in context and avoids
    an overly narrow legal sense.
- source_word: תֹּאבַד
  chosen: will perish
  alternatives:
  - will vanish
  - will be lost
  lexicon: HALOT
  rationale: The verb אבד denotes perishing or disappearing. 'Will perish' preserves
    the severity of the loss of priestly instruction.
- source_word: מִכֹּהֵן
  chosen: from the priest
  alternatives:
  - from a priest
  lexicon: HALOT
  rationale: Although formally singular without article, English idiom often uses
    'the priest' generically for the priestly office. This also balances 'the elders'
    in the final phrase. The sense is institutional rather than individual.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - advice
  - guidance
  lexicon: HALOT
  rationale: The noun denotes deliberative wisdom or counsel. 'Counsel' fits the gravitas
    of elder leadership better than the more casual 'advice.'
- source_word: מִזְּקֵנִים
  chosen: from the elders
  alternatives:
  - from elders
  - from old men
  lexicon: HALOT
  rationale: In context this refers to community leaders, not merely aged persons.
    'The elders' is the natural institutional rendering.
