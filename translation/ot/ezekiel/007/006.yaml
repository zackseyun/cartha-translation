id: EZK.7.6
reference: Ezekiel 7:6
source:
  edition: WLC
  text: קֵ֣ץ בָּ֔א בָּ֥א הַ/קֵּ֖ץ הֵקִ֣יץ אֵלָ֑יִ/ךְ הִנֵּ֖ה בָּאָֽה׃
translation:
  text: An end has come; the end has come. It has awakened against you; look, it is
    coming.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It has roused itself against you.' The Hebrew personifies 'the end'
      as awakening.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to you'; in context this signals the end's hostile arrival, hence
      'against you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֵץ
  chosen: end
  alternatives:
  - doom
  lexicon: HALOT
  rationale: קֵץ denotes an end, limit, or termination. In this judgment context it
    refers to the arrival of the nation's end, but 'end' preserves the Hebrew's stark
    repetition without importing an interpretive expansion like 'doom' into the main
    text.
- source_word: בָּא / בָּאָה
  chosen: has come / is coming
  alternatives:
  - comes
  - has arrived
  lexicon: HALOT
  rationale: The repeated forms of בוא emphasize imminent arrival. English uses 'has
    come' for the completed perfects and 'is coming' for the final feminine form to
    preserve the rhetorical progression and urgency in natural English.
- source_word: הַקֵּץ
  chosen: the end
  lexicon: HALOT
  rationale: 'The article marks specificity: not merely any end, but the decisive
    end announced in the oracle.'
- source_word: הֵקִיץ
  chosen: has awakened
  alternatives:
  - has roused itself
  - has arisen
  - has awoken
  lexicon: HALOT
  rationale: From קוץ/יקץ in the Hiphil, the verb conveys waking or rousing. Here
    the end is personified as something that has awakened against Jerusalem. 'Has
    awakened' preserves the vivid metaphor better than flattening it to 'has come
    upon'.
- source_word: אֵלַיִךְ
  chosen: against you
  alternatives:
  - to you
  - upon you
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' in this judgment context English
    'against you' best conveys hostile movement and the oracle's force. A more literal
    'to you' is possible but less idiomatic and less clear in context.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is readable modern
    English and preserves the urgent demonstrative force without archaic tone.
