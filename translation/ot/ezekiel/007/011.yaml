id: EZK.7.11
reference: Ezekiel 7:11
source:
  edition: WLC
  text: הֶ/חָמָ֥ס קָ֖ם לְ/מַטֵּה רֶ֑שַׁע לֹא מֵ/הֶ֞ם וְ/לֹ֧א מֵ/הֲמוֹנָ֛/ם וְ/לֹ֥א
    מֶ/הֱמֵ/הֶ֖ם וְ/לֹא נֹ֥הַּ בָּ/הֶֽם׀־־־׃
translation:
  text: Violence has arisen as a rod of wickedness; none of them remains, none of
    their multitude, none of their wealth, and there is no eminence among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally but less clearly, 'not from them, and not from their
      multitude, and not from their abundance/tumult.' The Hebrew of these clauses
      is elliptical and difficult.
    reason: alternative_reading
  - marker: b
    text: The Hebrew terms in the last two clauses are uncertain; 'wealth' may also
      be understood as 'abundance' or 'tumult,' and 'eminence' may also be rendered
      'preeminence,' with some taking the phrase differently altogether.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָמָס
  chosen: Violence
  alternatives:
  - The violence
  - Violence/violence-doing
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrong, or violent injustice. Anarthrous
    English 'Violence' best matches the Hebrew here and preserves the stark, personified
    force of the noun at the head of the clause.
- source_word: קָם
  chosen: has arisen
  alternatives:
  - has stood up
  - has risen
  lexicon: HALOT
  rationale: Qal perfect of קום here conveys emergence or rising up. 'Has arisen'
    is idiomatic in English and preserves the image of violence coming to prominence.
- source_word: לְמַטֵּה
  chosen: as a rod
  alternatives:
  - into a rod
  - for a rod
  - as a staff
  lexicon: HALOT
  rationale: מַטֶּה can mean rod, staff, or tribe. In this judgment context, 'rod'
    best fits the metaphor of an instrument of punishment or domination. The prefixed
    ל is rendered idiomatically as 'as' in English.
- source_word: רֶשַׁע
  chosen: of wickedness
  alternatives:
  - of wickedness
  - of evil
  - of guilt
  lexicon: HALOT
  rationale: רֶשַׁע denotes wickedness or guilt in a moral sense. 'Of wickedness'
    preserves the ethical force and fits the construct relation with 'rod.'
- source_word: לֹא מֵהֶם
  chosen: none of them remains
  alternatives:
  - not from them
  - nothing from them
  - none of them
  lexicon: HALOT
  rationale: The Hebrew is elliptical, beginning a series of negated prepositional
    phrases. In context, the sense is that nothing will remain of them. Supplying
    'remains' makes the English intelligible while staying close to the implied sense
    of the judgment oracle.
- source_word: וְלֹא מֵהֲמוֹנָם
  chosen: none of their multitude
  alternatives:
  - none of their abundance
  - none of their crowd
  - none of their tumult
  lexicon: HALOT
  rationale: הָמוֹן often means multitude, abundance, or noisy throng. Here 'multitude'
    best fits the sequence describing the disappearance of people and possessions
    under judgment.
- source_word: וְלֹא מֶהֱמֵהֶם
  chosen: none of their wealth
  alternatives:
  - none of their abundance
  - none of their tumult
  - none of their splendor
  lexicon: HALOT
  rationale: This form is difficult and widely discussed. Many take it as referring
    to their abundance/wealth rather than repeating the idea of mere noise. 'Wealth'
    gives a coherent progression in context, while the uncertainty is preserved in
    a footnote.
- source_word: וְלֹא נֹהַּ בָּהֶם
  chosen: and there is no eminence among them
  alternatives:
  - and no wailing among them
  - and no beauty among them
  - and no preeminence among them
  lexicon: HALOT
  rationale: נֹהַּ is rare and uncertain. 'Eminence'/'preeminence' is a defensible
    contextual sense in many modern translations, indicating that nothing distinguished
    or exalted will remain among them. Because the term is obscure, an alternative
    is preserved in a footnote.
