theological_decisions:
- issue: Handling of multiple obscure and elliptical expressions in a judgment oracle
  chosen_reading: Render the verse as a declaration that violence has become the instrument
    of wickedness and that nothing of the people, their multitude, their wealth, or
    their eminence will remain.
  alternative_readings:
  - 'Render the final clauses more literally but opaquely: ''not from them, and not
    from their multitude, and not from their turmoil, and no ... in them'''
  - Interpret the line as emphasizing social tumult rather than disappearance of people
    and possessions
  rationale: This verse is textually and lexically difficult. The chosen rendering
    follows the broader context of total judgment in Ezekiel 7 and supplies the minimum
    English needed to make the Hebrew ellipses intelligible without importing extra
    doctrine. Alternatives are preserved in footnotes where the Hebrew is especially
    uncertain.
  doctrine_reference: Translation philosophy §§1, 3, 5
