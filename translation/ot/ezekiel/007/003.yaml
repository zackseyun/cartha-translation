theological_decisions:
- issue: Nature of 'the end'
  chosen_reading: A historical-prophetic announcement of imminent judgment, rendered
    simply as 'the end' without importing later technical eschatological categories.
  alternative_readings:
  - A more absolute eschatological 'the end' in a final cosmic sense
  rationale: The immediate context in Ezekiel 7 concerns impending judgment on the
    land/Jerusalem. The translation preserves the source wording and gravity while
    avoiding doctrinal overreading.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of divine judgment language
  chosen_reading: Use direct judicial and affective terms ('anger,' 'judge,' 'abominations')
    without softening or systematizing them.
  alternative_readings:
  - Use more traditional but potentially less accessible terms such as 'wrath'
  rationale: Optimal equivalence calls for readable modern English that retains theological
    weight. The verse presents covenantal judgment plainly, and the translation reflects
    that without paraphrase.
  doctrine_reference: Translation philosophy §6
