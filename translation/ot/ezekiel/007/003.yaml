id: EZK.7.3
reference: Ezekiel 7:3
source:
  edition: WLC
  text: עַתָּה֙ הַ/קֵּ֣ץ עָלַ֔יִ/ךְ וְ/שִׁלַּחְתִּ֤י אַפִּ/י֙ בָּ֔/ךְ וּ/שְׁפַטְתִּ֖י/ךְ
    כִּ/דְרָכָ֑יִ/ךְ וְ/נָתַתִּ֣י עָלַ֔יִ/ךְ אֵ֖ת כָּל תּוֹעֲבֹתָֽיִ/ךְ־׃
translation:
  text: Now the end is upon you, and I will send my anger against you. I will judge
    you according to your ways, and I will bring all your abominations upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will lay all your abominations on you.' The Hebrew literally says
      'I will give/put upon you all your abominations,' an idiom for bringing the
      consequences of those abominations upon the hearer.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  - Indeed now
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the immediacy of the announced
    judgment. 'Now' is natural and preserves the abrupt force.
- source_word: הַקֵּץ
  chosen: the end
  alternatives:
  - an end
  - the final end
  lexicon: HALOT
  rationale: With the article, the noun is best rendered 'the end,' referring to the
    decisive termination/judgment announced in context. This preserves the prophetic
    finality without overinterpreting it as eschatological in a later technical sense.
- source_word: עָלַיִךְ
  chosen: upon you
  alternatives:
  - against you
  - over you
  lexicon: HALOT
  rationale: Spatial/metaphorical preposition indicating the end has come upon Jerusalem/the
    land (feminine singular addressee). 'Upon you' preserves the image and matches
    prophetic judgment idiom.
- source_word: וְשִׁלַּחְתִּי
  chosen: I will send
  alternatives:
  - I will unleash
  - I will let loose
  lexicon: HALOT
  rationale: The verb שלח literally means 'send.' In context it governs divine anger.
    'Send' is sufficiently clear and avoids interpretive expansion, while still sounding
    natural in English.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my wrath
  - my nose/nostril idiomatically
  lexicon: HALOT
  rationale: Though literally related to 'nose' and idiomatically to anger, the sense
    here is clearly divine anger. 'Anger' is more accessible modern English than 'wrath,'
    while retaining the judicial force.
- source_word: בָּךְ
  chosen: against you
  alternatives:
  - in you
  - upon you
  lexicon: HALOT
  rationale: With 'send my anger,' the preposition is best expressed idiomatically
    in English as 'against you,' clarifying hostile direction. This is a context-driven
    adjustment for readability.
- source_word: וּשְׁפַטְתִּיךְ
  chosen: I will judge you
  alternatives:
  - I will pass judgment on you
  lexicon: HALOT
  rationale: Straightforward judicial verb. 'Judge you' is concise and preserves the
    legal-covenantal tone.
- source_word: כִּדְרָכָיִךְ
  chosen: according to your ways
  alternatives:
  - according to your conduct
  - in keeping with your ways
  lexicon: HALOT
  rationale: דֶּרֶךְ in prophetic moral contexts often means conduct or behavior.
    'Ways' preserves the Hebrew metaphor and common prophetic diction while remaining
    understandable.
- source_word: וְנָתַתִּי עָלַיִךְ
  chosen: I will bring ... upon you
  alternatives:
  - I will put ... upon you
  - I will lay ... on you
  lexicon: HALOT
  rationale: Although נתן is literally 'give/put,' in judgment contexts with עַל it
    commonly means to bring consequences upon someone. 'Bring ... upon you' is idiomatic
    English that preserves the punitive sense.
- source_word: אֵת כָּל תּוֹעֲבֹתָיִךְ
  chosen: all your abominations
  alternatives:
  - all your detestable deeds
  - all your abhorrent acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong term for abhorrent, especially idolatrous, offenses.
    'Abominations' preserves the theological and prophetic weight better than a softened
    paraphrase.
