theological_decisions:
- issue: Interpretation of הַצְּפִרָה in a judgment oracle
  chosen_reading: Rendered as 'doom' in the main text
  alternative_readings:
  - the morning
  - the turn
  rationale: The immediate context is an announcement of impending judgment, and the
    surrounding clauses use vivid metaphor for calamity breaking forth. Rendering
    the term as 'doom' communicates the contextual sense without flattening the imagery.
    Because the Hebrew term is debated, a footnote preserves the more literal alternative
    'morning.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
