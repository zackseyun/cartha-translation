id: EZK.7.10
reference: Ezekiel 7:10
source:
  edition: WLC
  text: הִנֵּ֥ה הַ/יּ֖וֹם הִנֵּ֣ה בָאָ֑ה יָֽצְאָה֙ הַ/צְּפִרָ֔ה צָ֚ץ הַ/מַּטֶּ֔ה פָּרַ֖ח
    הַ/זָּדֽוֹן׃
translation:
  text: Look, the day! Look, it comes! Doom has gone out; the rod has budded; arrogance
    has blossomed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the morning has gone out'; the Hebrew term is difficult and may refer
      literally to 'morning' or figuratively to the fated turn that has arrived.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle marking urgent attention. 'Look' preserves the prophetic
    immediacy in readable modern English better than the more archaic 'Behold.' Repetition
    is retained for rhetorical force.
- source_word: הַיּוֹם
  chosen: the day
  alternatives:
  - the day of judgment
  - the time
  lexicon: HALOT
  rationale: Rendered formally as 'the day,' preserving the Hebrew expression and
    its ominous context without importing an interpretive expansion into the main
    text.
- source_word: בָאָה
  chosen: it comes
  alternatives:
  - has come
  - is coming
  lexicon: HALOT
  rationale: Although morphologically perfect, the form functions in prophetic discourse
    with imminent force. 'It comes' gives natural English while preserving the vivid
    certainty of the announcement.
- source_word: יָצְאָה
  chosen: has gone out
  alternatives:
  - has come forth
  - goes out
  lexicon: HALOT
  rationale: 'A straightforward rendering of יצא. The perfect is kept with present-result
    force: the announced calamity has already issued forth.'
- source_word: הַצְּפִרָה
  chosen: doom
  alternatives:
  - the morning
  - the turn
  - the fate
  lexicon: HALOT
  rationale: This noun is difficult and contextually debated. In Ezekiel 7 it most
    likely denotes the fated turn/doom that has arrived, not literal 'morning.' 'Doom'
    best fits the judgment context and the sequence of calamity imagery. The more
    literal alternative is preserved in a footnote.
- source_word: צָץ
  chosen: has budded
  alternatives:
  - sprouted
  - has shot up
  lexicon: HALOT
  rationale: Vegetation imagery is retained. 'Has budded' pairs naturally with the
    following 'has blossomed' and preserves the metaphor of judgment rapidly coming
    to visible expression.
- source_word: הַמַּטֶּה
  chosen: the rod
  alternatives:
  - the staff
  - the scepter
  lexicon: HALOT
  rationale: '''Rod'' best fits the likely image of an instrument of striking/judgment
    in context. ''Staff'' is less forceful, and ''scepter'' would over-specify royal
    imagery not required by the verse itself.'
- source_word: פָּרַח
  chosen: has blossomed
  alternatives:
  - has flowered
  - has bloomed
  lexicon: HALOT
  rationale: Maintains the plant-growth metaphor in parallel with 'has budded.' 'Blossomed'
    is idiomatic and vivid in English.
- source_word: הַזָּדוֹן
  chosen: arrogance
  alternatives:
  - pride
  - insolence
  - presumption
  lexicon: HALOT
  rationale: The noun denotes proud, presumptuous insolence. 'Arrogance' captures
    the moral quality well in contemporary English and fits the prophetic denunciation.
