id: EZK.7.25
reference: Ezekiel 7:25
source:
  edition: WLC
  text: קְפָ֖דָה בָ֑א וּ/בִקְשׁ֥וּ שָׁל֖וֹם וָ/אָֽיִן־׃
translation:
  text: Anguish has come, and they will seek peace, but there is none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Terror has come,' 'Calamity has come,' or 'Horror has come.' The Hebrew
      noun is rare and may emphasize either the dread itself or the disastrous condition
      produced by judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְפָדָה
  chosen: anguish
  alternatives:
  - terror
  - destruction
  - horror
  - calamity
  lexicon: HALOT
  rationale: The noun is rare and contextually denotes a state of severe distress
    accompanying judgment. 'Anguish' communicates the experiential force in readable
    English without over-specifying physical destruction. Alternatives such as 'terror'
    or 'calamity' are possible and worth preserving.
- source_word: בָּא
  chosen: has come
  alternatives:
  - comes
  - is coming
  lexicon: HALOT
  rationale: The qatal form is well rendered as a completed or imminent-completed
    event in prophetic discourse. 'Has come' fits the announcement of judgment as
    now arrived, while remaining natural in English.
- source_word: וּבִקְשׁוּ
  chosen: they will seek
  alternatives:
  - they seek
  - they shall seek
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction in this prophetic sequence is naturally
    rendered futurally in English because it follows the announced arrival of judgment
    and describes the people's consequent response.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  - prosperity
  lexicon: HALOT
  rationale: '''Peace'' is the standard and most contextually fitting rendering here,
    referring not merely to inner calm but to conditions of safety and well-being.
    Broader senses are possible but need not displace the main gloss.'
- source_word: וָאָיִן
  chosen: but there is none
  alternatives:
  - and there is none
  - yet there is none
  lexicon: HALOT
  rationale: The clause denies the existence of the sought peace. Rendering the conjunction
    as 'but' brings out the adversative sense clearly in English, though a more formal
    'and there is none' is possible.
