theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the judgment formula in the closing clause
  chosen_reading: I am the LORD, who strikes
  alternative_readings:
  - I, the LORD, am striking
  - I am the LORD who smites
  rationale: The text emphasizes divine agency in judgment without adding interpretive material beyond the participial form. 'Who strikes' preserves the tension of identity and action without archaic diction.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
