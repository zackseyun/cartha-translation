id: EZK.7.9
reference: Ezekiel 7:9
source:
  edition: WLC
  text: וְ/לֹא תָח֥וֹס עֵינִ֖/י וְ/לֹ֣א אֶחְמ֑וֹל כִּ/דְרָכַ֜יִ/ךְ עָלַ֣יִ/ךְ אֶתֵּ֗ן וְ/תוֹעֲבוֹתַ֨יִ/ךְ֙ בְּ/תוֹכֵ֣/ךְ תִּֽהְיֶ֔יןָ וִֽ/ידַעְתֶּ֕ם כִּ֛י אֲנִ֥י יְהוָ֖ה מַכֶּֽה־׃
translation:
  text: My eye will not spare, nor will I show pity. I will bring your ways upon you, and your abominations will be in your midst. Then you will know that I am Yahweh, who strikes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'My eye will not pity.' The Hebrew idiom uses 'eye' with a verb of sparing/compassion.
    reason: lexical_alternative
  - marker: b
    text: Or, 'according to your ways I will deal with you.' Literally, 'I will bring your ways upon you.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH.'
    reason: cultural_note
lexical_decisions:
- source_word: תָח֥וֹס עֵינִ֖י
  chosen: My eye will not spare
  alternatives:
  - My eye will not pity
  - I will not look with pity
  lexicon: HALOT
  rationale: חוס with 'eye' is an idiom for sparing or looking compassionately. 'My eye will not spare' preserves the Hebrew imagery and matches the judgment context.
- source_word: אֶחְמ֑וֹל
  chosen: nor will I show pity
  alternatives:
  - nor will I have compassion
  - nor will I spare
  lexicon: HALOT
  rationale: חמל overlaps with חוס but adds explicit compassion/mercy nuance. Rendering it as 'show pity' preserves the parallelism without flattening both verbs into the same English term.
- source_word: כִּדְרָכַיִךְ עָלַיִךְ אֶתֵּן
  chosen: I will bring your ways upon you
  alternatives:
  - I will set your ways upon you
  - according to your ways I will deal with you
  lexicon: HALOT
  rationale: דרך here refers to conduct or behavior. The idiom 'bring your ways upon you' keeps the retributive force and the concrete Hebrew expression better than a looser paraphrase.
- source_word: וְתוֹעֲבוֹתַיִךְ
  chosen: and your abominations
  alternatives:
  - and your detestable things
  lexicon: HALOT
  rationale: תועבות is a strong covenantal term for abhorrent practices, often idolatrous or morally repulsive. 'Abominations' preserves that theological and prophetic weight.
- source_word: בְּתוֹכֵךְ תִּהְיֶיןָ
  chosen: will be in your midst
  alternatives:
  - will remain within you
  - will be among you
  lexicon: HALOT
  rationale: The phrase is spatial and vivid. 'In your midst' preserves the Hebrew wording and suggests that the consequences/evidence of the abominations are internal and inescapable.
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect with vav in this prophetic context carries consequential force. 'Then' makes the result relation clear in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַכֶּה
  chosen: who strikes
  alternatives:
  - the one striking
  - who is striking
  - who smites
  lexicon: HALOT
  rationale: The participle identifies the LORD as the one inflicting judgment. 'Who strikes' is natural modern English and preserves the active, ongoing character of the participle.
