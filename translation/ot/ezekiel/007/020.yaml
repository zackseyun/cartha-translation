id: EZK.7.20
reference: Ezekiel 7:20
source:
  edition: WLC
  text: וּ/צְבִ֤י עֶדְי/וֹ֙ לְ/גָא֣וֹן שָׂמָ֔/הוּ וְ/צַלְמֵ֧י תוֹעֲבֹתָ֛/ם שִׁקּוּצֵי/הֶ֖ם
    עָ֣שׂוּ ב֑/וֹ עַל כֵּ֛ן נְתַתִּ֥י/ו לָ/הֶ֖ם לְ/נִדָּֽה־׃
translation:
  text: They made the beauty of his ornament into pride, and in it they made the images
    of their abominations, their detestable things; therefore I have made it an unclean
    thing to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they made with it the images of their abominations, their detestable
      idols.' The Hebrew phrase 'made in/with it' may indicate either location or
      material/instrument.
    reason: lexical_alternative
  - marker: b
    text: '''Unclean thing'' translates a Hebrew term associated with ritual impurity;
      alternatively, ''something to be rejected.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבִי
  chosen: the beauty
  alternatives:
  - the splendor
  - the glory
  lexicon: HALOT
  rationale: צְבִי commonly denotes beauty, splendor, or glory. Here it modifies עֶדְיוֹ
    ('his ornament'), yielding the sense of the object's beauty/splendor rather than
    a gazelle or land. 'Beauty' is natural English and preserves the evaluative force.
- source_word: עֶדְיוֹ
  chosen: his ornament
  alternatives:
  - his adornment
  - his jewelry
  lexicon: HALOT
  rationale: עֲדִי refers to ornament/adornment, often precious finery. 'Ornament'
    keeps the singular form and allows the following pronoun chain to refer back to
    a valued object, likely Jerusalem's precious adornment/wealth, without over-specifying
    as jewelry.
- source_word: לְגָאוֹן
  chosen: into pride
  alternatives:
  - for pride
  - for majesty
  lexicon: HALOT
  rationale: גָּאוֹן can mean exaltation, pride, or majesty. In this judgment context,
    the negative sense 'pride' best fits the accusation that what was beautiful was
    turned into an object of arrogant display. 'Into pride' reflects ל plus the resultative
    sense in context.
- source_word: שָׂמָהוּ
  chosen: made ... into
  alternatives:
  - set it as
  - placed it for
  lexicon: HALOT
  rationale: 'שׂים is broad (''set, place, make''). Here with לְגָאוֹן it carries
    a resultative nuance: they made it into/for pride. English ''made ... into'' best
    captures the transformation implied.'
- source_word: וְצַלְמֵי תוֹעֲבֹתָם
  chosen: the images of their abominations
  alternatives:
  - their abominable images
  - the images of their detestable idols
  lexicon: HALOT
  rationale: צֶלֶם is 'image'; תּוֹעֵבָה is 'abomination,' often for idolatrous offense.
    The construct chain is preserved formally as 'images of their abominations,' leaving
    the exact referent broad as in Hebrew.
- source_word: שִׁקּוּצֵיהֶם
  chosen: their detestable things
  alternatives:
  - their abominations
  - their idols
  lexicon: HALOT
  rationale: שִׁקּוּץ often denotes a detestable thing, especially an idol. Because
    תּוֹעֲבֹתָם already supplies 'abominations,' rendering this as 'detestable things'
    preserves the lexical distinction while still signaling idolatrous impurity.
- source_word: עָשׂוּ בוֹ
  chosen: they made ... in it
  alternatives:
  - they made with it
  - they made by it
  lexicon: HALOT
  rationale: עָשָׂה with ב can indicate making something in/with/from it. Given the
    likely sense that the precious ornament was used as the material or setting for
    idol-images, 'in it' stays close to the Hebrew while preserving the pronoun link.
    The alternative 'with it' is plausible and worth preserving in a footnote.
- source_word: נְתַתִּיו לָהֶם
  chosen: I have made it to them
  alternatives:
  - I have given it to them
  - I have made it for them
  lexicon: HALOT
  rationale: נָתַן is usually 'give,' but in this clause with לְנִדָּה the sense is
    effectively 'make/render it as' something for them. English smooths this as 'I
    have made it ... to them' in combination with the predicate phrase.
- source_word: לְנִדָּה
  chosen: an unclean thing
  alternatives:
  - impurity
  - something to be rejected
  - filth
  lexicon: HALOT
  rationale: נִדָּה can denote impurity, especially menstrual impurity, and by extension
    something unclean/rejected. In this context of defilement and judgment, 'an unclean
    thing' communicates the ritual-moral force without importing an unnecessarily
    explicit idiom into the main text.
