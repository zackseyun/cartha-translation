theological_decisions:
- issue: Nature of the defilement expressed by לְנִדָּה
  chosen_reading: render as ritual-moral uncleanness ('an unclean thing') rather than
    a purely metaphorical 'rejection'
  alternative_readings:
  - something to be rejected
  - filth
  rationale: The verse condemns idolatrous misuse of precious adornment and announces
    divine judgment in terms of impurity. Rendering נִדָּה as 'an unclean thing' preserves
    the cultic and moral dimension without over-literalizing the menstrual-impurity
    background in the main text.
