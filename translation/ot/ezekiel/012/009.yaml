id: EZK.12.9
reference: Ezekiel 12:9
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הֲ/לֹ֨א אָמְר֥וּ אֵלֶ֛י/ךָ בֵּ֥ית יִשְׂרָאֵ֖ל בֵּ֣ית הַ/מֶּ֑רִי
    מָ֖ה אַתָּ֥ה עֹשֶֽׂה־׃
translation:
  text: Son of man, has not the house of Israel, that rebellious house, said to you,
    ‘What are you doing?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rebellious house.' The Hebrew phrase בֵּית הַמֶּרִי is appositional
      to 'the house of Israel' and can be rendered with or without 'that' in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering
    preserves the idiom and its literary continuity throughout the book better than
    a more interpretive alternative such as 'mortal.' 'אָדָם' here refers to a human
    being, but the fixed expression is best retained.
- source_word: הֲלֹא
  chosen: has not
  alternatives:
  - have not
  - did not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Has
    not' fits the singular addressee ('to you') and works idiomatically in English.
- source_word: אָמְרוּ
  chosen: said
  alternatives:
  - spoken
  - asked
  lexicon: HALOT
  rationale: The verb is the common 'say.' Although the content is interrogative,
    the governing verb remains 'said,' with the quoted speech supplying the question.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - to you personally
  lexicon: HALOT
  rationale: Direct object of speech addressed to Ezekiel; straightforward prepositional
    rendering.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  - Israel
  lexicon: HALOT
  rationale: Retains the prophetic covenantal collective expression rather than flattening
    it to 'people of Israel.'
- source_word: בֵּית הַמֶּרִי
  chosen: that rebellious house
  alternatives:
  - the rebellious house
  - that house of rebellion
  - that rebellious people
  lexicon: HALOT
  rationale: The phrase appositionally identifies 'the house of Israel.' 'Rebellious'
    is the natural adjectival rendering of מֶרִי in context. Adding 'that' reflects
    the demonstrative force often conveyed in English apposition and preserves prophetic
    sharpness.
- source_word: מָה אַתָּה עֹשֶׂה
  chosen: What are you doing?
  alternatives:
  - What do you do?
  - What are you making?
  lexicon: HALOT
  rationale: The participle עֹשֶׂה with pronoun naturally conveys ongoing action in
    context, hence English progressive. 'Doing' is the broad and contextually appropriate
    gloss for עשה.
