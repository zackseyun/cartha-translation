id: EZK.12.17
reference: Ezekiel 12:17
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as standard narrative/sequential
    introduction. In English, the idiom is best carried by a simple connective plus
    the main verbal sense in the clause rather than a wooden 'and it happened.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'the word' is the established
    and semantically precise rendering, referring to a specific divine communication
    rather than an indefinite 'word.' 'Message' is possible but less formally tied
    to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention
    reflecting the Hebrew name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly indicates
    direction toward Ezekiel as recipient of revelation. 'To me' is natural modern
    English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech in prophetic
    formulas. 'Saying' preserves the formal structure and anticipates the following
    quotation in the next verse.
