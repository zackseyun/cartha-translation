id: EZK.12.14
reference: Ezekiel 12:14
source:
  edition: WLC
  text: וְ/כֹל֩ אֲשֶׁ֨ר סְבִיבֹתָ֥י/ו עזר/ה וְ/כָל אֲגַפָּ֖י/ו אֱזָרֶ֣ה לְ/כָל ר֑וּחַ
    וְ/חֶ֖רֶב אָרִ֥יק אַחֲרֵי/הֶֽם־־׃
translation:
  text: And all who are around him—his help and all his troops—I will scatter to every
    wind, and I will draw out a sword after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his helpers' for 'his help'; the Hebrew uses a collective expression
      that may refer to those assisting him.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to every wind,' that is, in every direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: סְבִיבֹתָיו
  chosen: who are around him
  alternatives:
  - who surround him
  - those around him
  lexicon: HALOT
  rationale: The noun from סביב with 3ms suffix denotes those in the area around the
    prince/leader. Rendering as a relative clause gives natural English while preserving
    the relational sense.
- source_word: עֶזְרָה
  chosen: his help
  alternatives:
  - his helpers
  - his support
  lexicon: HALOT
  rationale: The consonantal text points to עזרה with 3fs suffix in construct-like
    relation after 'all who are around him.' In context it refers collectively to
    those who help him. 'His help' is a formally close rendering; the collective sense
    is clear from context. An alternative more explicit English gloss is preserved
    in a footnote.
- source_word: אֲגַפָּיו
  chosen: his troops
  alternatives:
  - his wings
  - his bands
  - his divisions
  lexicon: HALOT
  rationale: Though literally related to 'wings/extremities,' in military/political
    context the term refers to attached companies or troops. 'His troops' best conveys
    the idiomatic sense in readable English.
- source_word: אֱזָרֶה
  chosen: I will scatter
  alternatives:
  - I will disperse
  - I will winnow
  lexicon: HALOT
  rationale: From זרה in the Piel, commonly 'scatter' or 'winnow.' Here the object
    is people, so 'scatter' is the most natural and contextually fitting rendering.
- source_word: לְכָל רוּחַ
  chosen: to every wind
  alternatives:
  - to every direction
  lexicon: HALOT
  rationale: Literally 'to every wind,' a Hebrew idiom for scattering in all directions.
    The literal image is retained in the main text because it is intelligible in English
    and preserves the prophetic force.
- source_word: חֶרֶב אָרִיק אַחֲרֵיהֶם
  chosen: I will draw out a sword after them
  alternatives:
  - I will unsheathe a sword after them
  - I will draw a sword against them
  lexicon: HALOT
  rationale: The Hiphil of ריק with 'sword' is an idiom meaning to draw out or unsheathe
    the sword. 'After them' preserves the pursuit nuance of אַחֲרֵיהֶם rather than
    flattening it to merely hostile stance.
