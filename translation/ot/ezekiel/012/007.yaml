id: EZK.12.7
reference: Ezekiel 12:7
source:
  edition: WLC
  text: וָ/אַ֣עַשׂ כֵּן֮ כַּ/אֲשֶׁ֣ר צֻוֵּיתִי֒ כֵּ֠לַ/י הוֹצֵ֜אתִי כִּ/כְלֵ֤י גוֹלָה֙
    יוֹמָ֔ם וּ/בָ/עֶ֛רֶב חָתַֽרְתִּי לִ֥/י בַ/קִּ֖יר בְּ/יָ֑ד בָּ/עֲלָטָ֥ה הוֹצֵ֛אתִי
    עַל כָּתֵ֥ף נָשָׂ֖אתִי לְ/עֵינֵי/הֶֽם־־׃פ
translation:
  text: 'So I did as I was commanded: by day I brought out my baggage like the baggage
    of exile, and in the evening I dug through the wall for myself by hand. In the
    dark I brought it out; I carried it on my shoulder before their eyes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the baggage of a deportee.' The Hebrew phrase refers to belongings
      prepared for going into exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the gloom' or 'at dusk.' The Hebrew term denotes darkness and may
      imply concealment as well as low light.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַעַשׂ כֵּן
  chosen: So I did
  alternatives:
  - And I did so
  - Thus I did
  lexicon: HALOT
  rationale: A straightforward rendering of the narrative sequence plus demonstrative
    adverb. 'So I did' is idiomatic modern English and preserves the responsive action.
- source_word: כַּאֲשֶׁר צֻוֵּיתִי
  chosen: as I was commanded
  alternatives:
  - just as I had been commanded
  lexicon: HALOT
  rationale: Passive sense is preserved. English simple past passive is natural here;
    pluperfect is possible but not necessary in context.
- source_word: כֵּלַי
  chosen: my baggage
  alternatives:
  - my things
  - my equipment
  - my vessels
  lexicon: HALOT
  rationale: כְּלִי is broad ('article, vessel, implement, gear'). In this enacted-exile
    context, 'baggage' best conveys portable belongings prepared for deportation.
- source_word: כִּכְלֵי גוֹלָה
  chosen: like the baggage of exile
  alternatives:
  - as exile's baggage
  - like the सामान of an exile
  - like the baggage of a deportee
  lexicon: HALOT
  rationale: The phrase describes items suitable for going into exile. 'Baggage of
    exile' keeps the Hebrew imagery and links to the sign-act. 'Deportee' is possible
    but less natural in this collocation.
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - during the day
  lexicon: HALOT
  rationale: Concise temporal adverb matching the Hebrew adverbial form.
- source_word: וּבָעֶרֶב
  chosen: and in the evening
  alternatives:
  - then in the evening
  - at evening
  lexicon: HALOT
  rationale: Maintains the temporal progression from day to evening.
- source_word: חָתַרְתִּי לִי בַקִּיר
  chosen: I dug through the wall for myself
  alternatives:
  - I broke through the wall for myself
  - I dug into the wall for myself
  lexicon: HALOT
  rationale: חתר commonly means dig through/break through, especially a wall. 'For
    myself' reflects לִי, indicating Ezekiel's own action in making the opening for
    the sign-act.
- source_word: בְּיָד
  chosen: by hand
  alternatives:
  - with my hand
  - manually
  lexicon: HALOT
  rationale: Idiomatic rendering of the instrumental phrase, emphasizing personal,
    physical action.
- source_word: בָּעֲלָטָה
  chosen: In the dark
  alternatives:
  - at dusk
  - in the gloom
  - in secret
  lexicon: HALOT
  rationale: The noun denotes darkness/gloom. 'In the dark' is the clearest natural
    English rendering. 'In secret' is interpretive and secondary, though the darkness
    contributes concealment.
- source_word: הוֹצֵאתִי
  chosen: I brought it out
  alternatives:
  - I took it out
  - I brought them out
  lexicon: HALOT
  rationale: The verb repeats the earlier action of bringing out the baggage. English
    singular 'it' treats 'baggage' as a collective mass noun; this is more idiomatic
    than 'them'.
- source_word: עַל כָּתֵף נָשָׂאתִי
  chosen: I carried it on my shoulder
  alternatives:
  - I lifted it onto my shoulder
  - I bore it on my shoulder
  lexicon: HALOT
  rationale: Natural English for the idiom, preserving the physical image of a person
    departing with belongings.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - where they could see
  lexicon: HALOT
  rationale: A transparent rendering of the Hebrew idiom that highlights the public,
    demonstrative nature of the prophetic sign-act.
