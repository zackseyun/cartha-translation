theological_decisions:
- issue: Nature of Ezekiel's enacted sign
  chosen_reading: Render the actions concretely and publicly without allegorizing
    within the verse.
  alternative_readings:
  - Translate more interpretively to foreground symbolic exile
  rationale: The verse narrates a prophetic sign-act whose symbolism is explained
    in the surrounding context. The translation should preserve the concrete actions
    ('brought out,' 'dug through,' 'carried') and let the text's own interpretation
    emerge from context rather than importing it here.
  doctrine_reference: Translation philosophy §1, §3
