id: EZK.12.5
reference: Ezekiel 12:5
source:
  edition: WLC
  text: לְ/עֵינֵי/הֶ֖ם חֲתָר לְ/ךָ֣ בַ/קִּ֑יר וְ/הוֹצֵאתָ֖ בּֽ/וֹ־׃
translation:
  text: Before their eyes, dig through the wall for yourself, and bring your baggage
    out through it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In their sight, dig through the wall and take your baggage out through
      it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵינֵיהֶם
  chosen: Before their eyes
  alternatives:
  - In their sight
  - Before them
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning in their visible presence. 'Before
    their eyes' preserves the concrete imagery and public nature of the sign-act better
    than the more abstract 'before them.'
- source_word: חֲתָר
  chosen: dig through
  alternatives:
  - break through
  - dig
  lexicon: HALOT
  rationale: The verb denotes digging or breaking through, especially through a wall.
    'Dig through' best matches the physical action implied by the following phrase
    'through the wall.'
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - yourself
  lexicon: HALOT
  rationale: The dative pronoun marks the action as performed by the addressee on
    his own behalf within the enacted sign. 'For yourself' is natural English and
    preserves the reflexive nuance.
- source_word: בַקִּיר
  chosen: the wall
  alternatives:
  - a wall
  lexicon: HALOT
  rationale: With the article, the phrase refers to the wall in view within the enacted
    scene. English naturally renders this as 'the wall.'
- source_word: וְהוֹצֵאתָ
  chosen: bring ... out
  alternatives:
  - take ... out
  - carry ... out
  lexicon: HALOT
  rationale: From יצא in the Hiphil, causative 'bring out' or 'take out.' 'Bring ...
    out' works smoothly with the following prepositional phrase and keeps the imperative
    force of the instruction.
- source_word: בּוֹ
  chosen: through it
  alternatives:
  - by it
  - through that opening
  lexicon: HALOT
  rationale: The preposition with pronominal suffix most naturally refers back to
    the wall, meaning through it, i.e., through the hole made in it. English requires
    this to be made explicit idiomatically.
