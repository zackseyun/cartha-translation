id: EZK.12.10
reference: Ezekiel 12:10
source:
  edition: WLC
  text: אֱמֹ֣ר אֲלֵי/הֶ֔ם כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהֹוִ֑ה הַ/נָּשִׂ֞יא הַ/מַּשָּׂ֤א
    הַ/זֶּה֙ בִּ/יר֣וּשָׁלִַ֔ם וְ/כָל בֵּ֥ית יִשְׂרָאֵ֖ל אֲשֶׁר הֵ֥מָּה בְ/תוֹכָֽ/ם־־׃
translation:
  text: 'Say to them, ‘Thus says the Lord GOD: This burden concerns the prince in
    Jerusalem and all the house of Israel who are in their midst.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This oracle is about the prince in Jerusalem and all the house of Israel
      who are among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר אֲלֵיהֶם
  chosen: Say to them
  alternatives:
  - Tell them
  lexicon: HALOT
  rationale: Imperative of אמר with אל marks direct speech introduction. 'Say to them'
    is the standard and sufficiently natural rendering.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says' preserves the formal
    prophetic tone without unnecessary paraphrase.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: For יְהוָה, DOCTRINE.md specifies the default 'the LORD.' In the compound
    אֲדֹנָי יְהוִה, standard English practice avoids 'Lord LORD'; 'the Lord GOD' best
    represents the Hebrew title combination while honoring the project's default treatment
    of the divine name.
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the ruler
  - the leader
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a leader or prince. In Ezekiel it often functions
    as a political title; 'prince' preserves that title-like nuance better than the
    flatter 'leader.'
- source_word: הַמַּשָּׂא הַזֶּה
  chosen: This burden concerns
  alternatives:
  - This oracle is about
  - This pronouncement concerns
  lexicon: HALOT
  rationale: מַשָּׂא can mean 'burden' and by extension an oracle/pronouncement. Here
    the verbless clause is compressed and difficult; rendering it as 'This burden
    concerns ...' preserves the lexical force of מַשָּׂא while making the English
    intelligible. 'Oracle' is possible, but 'burden' better retains the Hebrew imagery
    and prophetic weight.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  alternatives:
  - against Jerusalem
  lexicon: HALOT
  rationale: The preposition is plainly בְּ, locative 'in,' modifying 'the prince.'
    There is no warrant here for the more interpretive 'against Jerusalem.'
- source_word: וְכָל בֵּית יִשְׂרָאֵל
  chosen: and all the house of Israel
  alternatives:
  - and the whole house of Israel
  - and all Israel's house
  lexicon: HALOT
  rationale: A standard covenantal-national expression. 'House of Israel' should be
    retained rather than flattened to simply 'Israel' because it is a meaningful biblical
    idiom.
- source_word: אֲשֶׁר הֵמָּה בְתוֹכָם
  chosen: who are in their midst
  alternatives:
  - who are among them
  - who are in the midst of them
  lexicon: HALOT
  rationale: The relative clause most naturally modifies 'all the house of Israel.'
    The suffix in 'their midst' is somewhat awkward in English because the Hebrew
    is compact; 'who are in their midst' preserves the syntax closely, likely referring
    to those Israelites present among the Jerusalem population.
