theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default for יְהוָה is 'the LORD,' but in the compound אֲדֹנָי
    יְהוִה English convention and clarity favor 'the Lord GOD' to avoid the awkward
    'Lord LORD.' This is a translation-form decision, not a doctrinal alteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of מַשָּׂא
  chosen_reading: burden
  alternative_readings:
  - oracle
  - pronouncement
  rationale: The Hebrew term can denote a prophetic utterance/oracle, but its basic
    sense 'burden' is still intelligible and preserves prophetic texture. Because
    the phrase is syntactically compressed, the English adds 'concerns' to express
    the relation without over-paraphrasing.
