id: EZK.12.26
reference: Ezekiel 12:26
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as standard narrative/sequential introduction. In English, the idiomatic sense is best carried by folding it into the clause 'And the word ... came' rather than the more wooden 'And it happened,' which is possible but stylistically cumbersome in this formulaic prophetic introduction.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: דבר in the construct phrase דְבַר יְהוָה is the standard prophetic formula 'the word of YHWH.' 'The word' preserves the established lexical and theological force better than 'the message,' which is interpretive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix straightforwardly means 'to me.' 'Unto me' is unnecessarily archaic.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This infinitive construct introduces the following divine speech in standard Hebrew style. 'Saying' is the natural and sufficiently formal English equivalent in prophetic discourse.
