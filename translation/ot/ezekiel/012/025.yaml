id: EZK.12.25
reference: Ezekiel 12:25
source:
  edition: WLC
  text: כִּ֣י אֲנִ֣י יְהוָ֗ה אֲדַבֵּר֙ אֵת֩ אֲשֶׁ֨ר אֲדַבֵּ֤ר דָּבָר֙ וְ/יֵ֣עָשֶׂ֔ה לֹ֥א תִמָּשֵׁ֖ךְ ע֑וֹד כִּ֣י בִֽ/ימֵי/כֶ֞ם בֵּ֣ית הַ/מֶּ֗רִי אֲדַבֵּ֤ר דָּבָר֙ וַ/עֲשִׂיתִ֔י/ו נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׀׃פ
translation:
  text: For I am Yahweh; the word that I speak will be done. It will no longer be delayed, for in your days, O rebellious house, I will speak a word and do it, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word that I speak.' The Hebrew expression is emphatic and can be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: Or 'It will no longer be prolonged' or 'drawn out any longer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲדַבֵּר
  chosen: I will speak
  alternatives:
  - I speak
  - I am speaking
  lexicon: HALOT
  rationale: The imperfect here is best rendered as future in context, expressing YHWH's imminent and certain action in contrast to delayed fulfillment.
- source_word: אֵת אֲשֶׁר אֲדַבֵּר דָּבָר
  chosen: whatever word I speak
  alternatives:
  - the word that I speak
  - what I speak
  lexicon: HALOT
  rationale: This construction is somewhat emphatic and idiomatic. 'Whatever word I speak' preserves both the relative construction and the explicit noun דָּבָר without sounding wooden. It also conveys the force that any utterance from YHWH is effective.
- source_word: וְיֵעָשֶׂה
  chosen: and it will be done
  alternatives:
  - and it shall be done
  - and it will happen
  lexicon: HALOT
  rationale: Passive/Niphal sense is retained. 'Be done' preserves the strong link between divine speech and accomplishment better than the more general 'happen.'
- source_word: לֹא תִמָּשֵׁךְ עוֹד
  chosen: It will no longer be delayed
  alternatives:
  - it will no longer be prolonged
  - it will not be drawn out any longer
  lexicon: HALOT
  rationale: The feminine verb likely refers to the matter/word/fulfillment being prolonged. 'Be delayed' is idiomatic modern English and fits the context of postponed judgment/fulfillment.
- source_word: בֵּית הַמֶּרִי
  chosen: O rebellious house
  alternatives:
  - house of rebellion
  - rebellious people
  lexicon: HALOT
  rationale: A direct address is appropriate in context. 'House' preserves the Hebrew metaphor and covenantal/corporate sense, while 'rebellious' renders the adjectival force naturally.
- source_word: דָּבָר
  chosen: word
  alternatives:
  - thing
  - matter
  lexicon: HALOT
  rationale: In this prophetic context, 'word' best captures a spoken divine pronouncement whose fulfillment is then emphasized. 'Thing' or 'matter' would weaken the speech-act connection.
- source_word: וַעֲשִׂיתִיו
  chosen: and do it
  alternatives:
  - and I will do it
  - and accomplish it
  lexicon: HALOT
  rationale: Though formally a waw-consecutive perfect, in this context it carries future certainty following the preceding imperfect. 'Do it' keeps the concise force and parallels the earlier 'it will be done.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: '''Declares'' is the standard natural English rendering for the prophetic formula נְאֻם. אֲדֹנָי יְהוִה is rendered ''the Lord GOD,'' preserving the distinction from the earlier standalone YHWH while following established English convention.'
