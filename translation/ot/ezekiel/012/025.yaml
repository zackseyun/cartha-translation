  alternative_readings:
  - Yahweh ... Lord Yahweh
  - the LORD ... the Lord LORD
  rationale: This follows the project's stated default for YHWH while also distinguishing the compound title אֲדֹנָי יְהוִה in readable English. It avoids awkward repetition and preserves the solemn prophetic formula.
