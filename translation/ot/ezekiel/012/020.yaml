id: EZK.12.20
reference: Ezekiel 12:20
source:
  edition: WLC
  text: וְ/הֶ/עָרִ֤ים הַ/נּֽוֹשָׁבוֹת֙ תֶּחֱרַ֔בְנָה וְ/הָ/אָ֖רֶץ שְׁמָמָ֣ה תִֽהְיֶ֑ה
    וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־׃פ
translation:
  text: And the inhabited cities will be laid waste, and the land will become a desolation;
    then you will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city/town. 'Cities' is the standard and sufficiently
    broad rendering in prophetic judgment contexts.
- source_word: הַנּוֹשָׁבוֹת
  chosen: inhabited
  alternatives:
  - settled
  - occupied
  lexicon: HALOT
  rationale: Participle from ישׁב, 'to dwell/sit/live.' Here it qualifies the cities
    as populated or inhabited. 'Inhabited' is natural English and preserves the contrast
    with coming devastation.
- source_word: תֶּחֱרַבְנָה
  chosen: will be laid waste
  alternatives:
  - will be ruined
  - will become desolate
  lexicon: HALOT
  rationale: From חרב in the sense of becoming ruined/desolate. 'Will be laid waste'
    captures the passive-result sense in idiomatic English and fits prophetic judgment
    diction.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or country. In this immediate context of
    cities and territorial devastation, 'the land' best fits the regional judgment
    oracle.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  lexicon: HALOT
  rationale: The noun denotes desolation, devastation, or waste. Rendering it as the
    predicate nominative 'a desolation' preserves the nominal force better than an
    adjective alone.
- source_word: תִהְיֶה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Though היה often simply means 'be,' in this context with שְׁמָמָה it
    conveys transition into a state. 'Will become a desolation' expresses that development
    clearly.
- source_word: וִידַעְתֶּם
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect with vav in prophetic sequence often carries
    consequential force. 'Then you will know' makes the result relationship explicit
    without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
