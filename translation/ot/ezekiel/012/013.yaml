id: EZK.12.13
reference: Ezekiel 12:13
source:
  edition: WLC
  text: וּ/פָרַשְׂתִּ֤י אֶת רִשְׁתִּ/י֙ עָלָ֔י/ו וְ/נִתְפַּ֖שׂ בִּ/מְצֽוּדָתִ֑/י וְ/הֵבֵאתִ֨י
    אֹת֤/וֹ בָבֶ֨לָ/ה֙ אֶ֣רֶץ כַּשְׂדִּ֔ים וְ/אוֹתָ֥/הּ לֹֽא יִרְאֶ֖ה וְ/שָׁ֥ם יָמֽוּת־־׃
translation:
  text: I will spread my net over him, and he will be caught in my snare. Then I will
    bring him to Babylon, the land of the Chaldeans; yet he will not see it, and there
    he will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''my trap.'' The Hebrew uses two related hunting terms: ''my net'' and
      ''my snare.'''
    reason: lexical_alternative
  - marker: b
    text: The statement that he will be brought to Babylon yet not see it is often
      understood in light of 2 Kings 25:7 and Jeremiah 39:7; 52:11.
    reason: cross_reference
lexical_decisions:
- source_word: וּפָרַשְׂתִּי
  chosen: I will spread
  alternatives:
  - I will spread out
  - I will cast
  lexicon: HALOT
  rationale: The verb פָּרַשׂ commonly means 'spread out' or 'stretch out.' 'Spread'
    is natural English and preserves the image of laying a net over someone. 'Cast'
    is possible in context of a net but is less directly tied to the Hebrew verb's
    core sense.
- source_word: רִשְׁתִּי
  chosen: my net
  alternatives:
  - my mesh
  - my network
  lexicon: HALOT
  rationale: רֶשֶׁת is the standard word for a net, especially in hunting/trapping
    imagery. 'My net' is the clear and idiomatic rendering.
- source_word: עָלָיו
  chosen: over him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: The preposition עַל with the pronominal suffix is spatial here. 'Over
    him' fits the trapping metaphor in contemporary English.
- source_word: וְנִתְפַּשׂ
  chosen: he will be caught
  alternatives:
  - he will be seized
  - he will be captured
  lexicon: HALOT
  rationale: The Niphal form conveys passive/resultative force. 'He will be caught'
    best matches the net/snare imagery; 'seized' or 'captured' are possible but less
    tightly linked to the trap metaphor.
- source_word: בִּמְצוּדָתִי
  chosen: in my snare
  alternatives:
  - in my trap
  - in my hunting net
  lexicon: HALOT
  rationale: מְצוּדָה can denote a net, snare, or trap. Since רִשְׁתִּי has already
    been rendered 'my net,' varying this as 'my snare' preserves the parallelism without
    awkward repetition while keeping the trapping image.
- source_word: וְהֵבֵאתִי אֹתוֹ
  chosen: Then I will bring him
  alternatives:
  - and I will bring him
  - and I will cause him to come
  lexicon: HALOT
  rationale: The Hiphil of בוא means 'bring.' The conjunction can be rendered simply
    'and,' but 'Then' gives natural English sequence without overstating the Hebrew.
- source_word: בָבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Babylon. Standard English
    expresses this as 'to Babylon.'
- source_word: אֶרֶץ כַּשְׂדִּים
  chosen: the land of the Chaldeans
  alternatives:
  - the land of the Babylonians
  lexicon: HALOT
  rationale: This appositional phrase identifies Babylon more fully. 'Chaldeans' is
    the more direct rendering of כַּשְׂדִּים and preserves the historical-ethnic designation
    in the Hebrew.
- source_word: וְאוֹתָהּ לֹא יִרְאֶה
  chosen: yet he will not see it
  alternatives:
  - but he will not see it
  - though he will not see it
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the land/Babylon. 'Yet' captures
    the irony of being brought there but not seeing it. This likely alludes to Zedekiah's
    blinding, but the translation should preserve the text's wording rather than import
    the historical explanation into the main text.
- source_word: וְשָׁם יָמוּת
  chosen: and there he will die
  alternatives:
  - there he will die
  lexicon: HALOT
  rationale: A straightforward rendering of the clause. In the final English sentence,
    'and there he will die' preserves the Hebrew sequence and emphasis on location.
