theological_decisions:
- issue: Implicit historical irony in 'he will not see it'
  chosen_reading: Retain the literal statement without explicating the cause in the
    main text.
  alternative_readings:
  - Interpretively expand to 'he will not see it because he will be blinded'
  rationale: The verse itself states only that he will be brought to Babylon but not
    see it. While the broader canonical context explains this, optimal equivalence
    and doctrinal restraint require preserving the text's own wording and tension
    rather than resolving it in translation.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
