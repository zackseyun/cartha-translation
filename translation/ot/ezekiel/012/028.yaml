theological_decisions:
- issue: Rendering the divine name יְהוָה within the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine file sets the default rendering of יְהוָה as 'the LORD.'
    In the fixed combination אֲדֹנָי יְהוִה, however, standard English translation
    practice uses 'the Lord GOD' to avoid the awkward 'Lord LORD' while still distinguishing
    the divine name component. This is a translation-form decision, not a doctrinal
    reinterpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
