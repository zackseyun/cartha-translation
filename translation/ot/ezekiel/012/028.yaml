id: EZK.12.28
reference: Ezekiel 12:28
source:
  edition: WLC
  text: לָ/כֵ֞ן אֱמֹ֣ר אֲלֵי/הֶ֗ם כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה לֹא תִמָּשֵׁ֥ךְ ע֖וֹד
    כָּל דְּבָרָ֑/י אֲשֶׁ֨ר אֲדַבֵּ֤ר דָּבָר֙ וְ/יֵ֣עָשֶׂ֔ה נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃ס
translation:
  text: 'Therefore say to them, ‘Thus says the Lord GOD: None of my words will be
    delayed any longer, but the word that I speak will be done,’ declares the Lord
    GOD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''will not be prolonged/drawn out any longer.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the conclusion/application
    of the preceding oracle.
- source_word: אֱמֹר אֲלֵיהֶם
  chosen: say to them
  alternatives:
  - tell them
  lexicon: HALOT
  rationale: Direct imperative plus prepositional object; 'say to them' preserves
    the prophetic speech formula.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; retained in familiar but still
    natural English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: For יְהוָה, DOCTRINE.md specifies the default 'the LORD.' In the compound
    title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD'; 'the Lord GOD' best
    represents the title while signaling the divine name.
- source_word: לֹא תִמָּשֵׁךְ עוֹד
  chosen: will be delayed any longer
  alternatives:
  - will be prolonged any longer
  - will be drawn out any longer
  lexicon: HALOT
  rationale: Nifal of משׁך here refers to something being extended/prolonged. In context
    of deferred fulfillment, 'be delayed any longer' communicates the sense clearly
    in modern English.
- source_word: כָּל דְּבָרַי
  chosen: None of my words
  alternatives:
  - all my words ... not one will be delayed
  - any of my words
  lexicon: HALOT
  rationale: Hebrew literally 'all my words' under negation. English idiomatically
    expresses the distributive force as 'None of my words,' preserving the totality
    under negation.
- source_word: אֲשֶׁר אֲדַבֵּר
  chosen: that I speak
  alternatives:
  - that I will speak
  - which I speak
  lexicon: HALOT
  rationale: Imperfect can be rendered with present/future nuance. Here the clause
    is generic and immediately tied to fulfillment; present 'I speak' is natural in
    English and fits the prophetic declaration.
- source_word: דָּבָר
  chosen: the word
  alternatives:
  - a word
  - what
  lexicon: HALOT
  rationale: Though formally singular and somewhat appositional/emphatic ('a word'),
    English idiom is best served by 'the word that I speak,' referring to any utterance
    God gives.
- source_word: וְיֵעָשֶׂה
  chosen: will be done
  alternatives:
  - will be accomplished
  - will happen
  lexicon: HALOT
  rationale: Nifal/passive-like sense of עשה here emphasizes realization of the spoken
    word. 'Will be done' is close to the Hebrew and suitably weighty; 'accomplished'
    is possible but slightly more interpretive.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - says the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic affirmation formula. 'Declares' is idiomatic
    and preserves solemnity without archaic stiffness.
