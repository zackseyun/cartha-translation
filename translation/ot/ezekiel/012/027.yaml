theological_decisions:
- issue: Rendering of אָדָם within the address בֶּן אָדָם
  chosen_reading: Son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The phrase is an established divine address to Ezekiel and should be
    preserved consistently. This also aligns with the doctrine's gender-accurate principle
    and the default handling of אדם as 'man' where context supports it.
