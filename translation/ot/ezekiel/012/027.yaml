id: EZK.12.27
reference: Ezekiel 12:27
source:
  edition: WLC
  text: בֶּן אָדָ֗ם הִנֵּ֤ה בֵֽית יִשְׂרָאֵל֙ אֹֽמְרִ֔ים הֶ/חָז֛וֹן אֲשֶׁר ה֥וּא חֹזֶ֖ה
    לְ/יָמִ֣ים רַבִּ֑ים וּ/לְ/עִתִּ֥ים רְחוֹק֖וֹת ה֥וּא נִבָּֽא־־־׃
translation:
  text: Son of man, look, the house of Israel is saying, ‘The vision that he sees
    is for many days from now, and he prophesies about distant times.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for many days' / 'for far-off times.' The Hebrew emphasizes that the
      people think Ezekiel's vision concerns a remote future.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A fixed address to Ezekiel throughout the book. 'Son of man' preserves
    the Hebrew idiom and its literary continuity better than more interpretive alternatives.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - indeed
  lexicon: HALOT
  rationale: Introduces attention-getting emphasis. 'Look' is natural modern English
    and preserves the deictic force without archaic tone.
- source_word: בֵית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: Retains the covenantal/corporate expression of the Hebrew rather than
    flattening it to a generic collective.
- source_word: אֹמְרִים
  chosen: is saying
  alternatives:
  - are saying
  - says
  lexicon: HALOT
  rationale: Although morphologically plural, 'house' is a collective singular in
    English; singular agreement yields more natural English while preserving the ongoing
    speech sense.
- source_word: הֶחָזוֹן
  chosen: the vision
  alternatives:
  - this vision
  - the prophetic vision
  lexicon: HALOT
  rationale: Definite noun referring to Ezekiel's prophetic message/vision. Simple
    'the vision' is sufficiently precise and closest to the source.
- source_word: אֲשֶׁר הוּא חֹזֶה
  chosen: that he sees
  alternatives:
  - which he is seeing
  - that he beholds
  lexicon: HALOT
  rationale: Directly reflects the relative clause and verbal link to 'vision.' 'Sees'
    is idiomatic and avoids archaic diction.
- source_word: לְיָמִים רַבִּים
  chosen: for many days from now
  alternatives:
  - for many days
  - for the distant future
  - for many days ahead
  lexicon: HALOT
  rationale: The phrase indicates remoteness into the future, not merely duration.
    'From now' makes the temporal force explicit in natural English.
- source_word: וּלְעִתִּים רְחוֹקוֹת
  chosen: about distant times
  alternatives:
  - for distant times
  - concerning far-off times
  lexicon: HALOT
  rationale: Parallel to the previous phrase and clarifies that the prophecy concerns
    a remote future. 'About' is idiomatic with 'prophesies' in English.
- source_word: הוּא נִבָּא
  chosen: he prophesies
  alternatives:
  - he is prophesying
  - he speaks prophetically
  lexicon: HALOT
  rationale: Niphal of נבא here functions as the standard verb for prophetic speech.
    Present tense fits the quoted accusation.
