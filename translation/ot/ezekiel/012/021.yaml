id: EZK.12.21
reference: Ezekiel 12:21
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: 'The waw-consecutive form of היה functions here as standard narrative/sequential introduction. In English, the idiomatic prophetic formula is best represented by carrying the sense into the following clause: ''And the word ... came.'' ''And it happened'' is more formally literal but less natural in modern English and redundant in this formulaic context.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: דבר in this prophetic formula commonly denotes the divine word/message. 'The word' preserves the established formula and the concrete sense of a received utterance better than the more interpretive 'message.' The construct with the divine name supports 'the word of the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means 'to me.' 'Unto me' is archaic and less suitable for readable modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  - 'with these words:'
  lexicon: HALOT
  rationale: The infinitive construct introduces direct speech in standard Hebrew narrative and prophetic style. 'Saying,' is the most transparent and conventional English equivalent, preserving the expectation of the following oracle in the next verse.
