theological_decisions:
- issue: Rendering of אָדָם in the prophetic address
  chosen_reading: Son of man
  alternative_readings:
  - Mortal
  - Human one
  rationale: The phrase is not a doctrinally contested christological title here but
    Ezekiel’s recurring divine address. Retaining 'Son of man' preserves the literary
    form and intertextual resonance without importing later doctrinal claims.
