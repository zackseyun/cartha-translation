id: EZK.12.22
reference: Ezekiel 12:22
source:
  edition: WLC
  text: בֶּן אָדָ֗ם מָֽה הַ/מָּשָׁ֤ל הַ/זֶּה֙ לָ/כֶ֔ם עַל אַדְמַ֥ת יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר
    יַֽאַרְכוּ֙ הַ/יָּמִ֔ים וְ/אָבַ֖ד כָּל חָזֽוֹן־־־־׃
translation:
  text: Son of man, what is this proverb that you have in the land of Israel, saying,
    ‘The days drag on, and every vision comes to nothing’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The days are prolonged, and every vision fails.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional and contextually appropriate rendering of Ezekiel’s address
    formula. Although idiomatically it can mean 'human' or 'mortal,' 'Son of man'
    preserves the repeated prophetic form of address and its literary consistency.
- source_word: מָה הַמָּשָׁל הַזֶּה
  chosen: what is this proverb
  alternatives:
  - what is this saying
  - what is this parable
  lexicon: HALOT
  rationale: מָשָׁל here denotes a proverbial saying or popular maxim, not a narrative
    parable. 'Proverb' best fits the dismissive slogan being quoted.
- source_word: לָכֶם
  chosen: that you have
  alternatives:
  - among you
  - for you
  lexicon: HALOT
  rationale: The preposition with pronoun is idiomatic in context, referring to a
    proverb current among the people. 'That you have' is natural English while retaining
    possession/use.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  chosen: in the land of Israel
  alternatives:
  - upon the soil of Israel
  lexicon: HALOT
  rationale: אַדְמָה is literally 'ground/soil,' but in this collocation it refers
    to the territory of Israel. 'In the land of Israel' is idiomatic and accurate.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - which says
  lexicon: HALOT
  rationale: Standard quotative introducing the content of the proverb.
- source_word: יַאַרְכוּ הַיָּמִים
  chosen: The days drag on
  alternatives:
  - The days are prolonged
  - The days grow long
  lexicon: HALOT
  rationale: The verb means 'be long/prolonged.' 'Drag on' captures the proverb’s
    skeptical tone in readable modern English, while still reflecting the sense of
    delay.
- source_word: וְאָבַד כָּל חָזוֹן
  chosen: and every vision comes to nothing
  alternatives:
  - and every vision perishes
  - and every vision fails
  lexicon: HALOT
  rationale: אָבַד means 'perish/be lost/come to ruin.' In context of prophetic fulfillment,
    'comes to nothing' clearly conveys the claim that prophetic visions prove empty
    or fail.
