id: EZK.12.11
reference: Ezekiel 12:11
source:
  edition: WLC
  text: אֱמֹ֖ר אֲנִ֣י מֽוֹפֶתְ/כֶ֑ם כַּ/אֲשֶׁ֣ר עָשִׂ֗יתִי כֵּ֚ן יֵעָשֶׂ֣ה לָ/הֶ֔ם
    בַּ/גּוֹלָ֥ה בַ/שְּׁבִ֖י יֵלֵֽכוּ׃
translation:
  text: 'Say, ‘I am a sign for you: just as I have done, so it shall be done to them;
    into exile, into captivity they shall go.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am your sign' or 'I am a portent for you.' The Hebrew מוֹפֵת can denote
      a sign, portent, or symbolic wonder.
    reason: lexical_alternative
  - marker: b
    text: The paired expressions 'into exile' and 'into captivity' are both retained
      to reflect the Hebrew's emphatic doubling.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: Imperative singular from אמר introducing the prophet's quoted declaration;
    'Say' is the natural direct English imperative.
- source_word: מוֹפֶתְכֶם
  chosen: a sign for you
  alternatives:
  - your sign
  - an omen for you
  - a portent for you
  lexicon: HALOT
  rationale: מוֹפֵת can denote a sign, portent, or symbolic wonder. In this context
    Ezekiel's enacted behavior functions as a symbolic sign-act for the audience,
    so 'a sign for you' communicates the representative function clearly. The suffix
    is best taken as directed to the audience ('for you') rather than possessive in
    a wooden sense ('your sign').
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  chosen: just as I have done
  alternatives:
  - as I did
  - according to what I have done
  lexicon: HALOT
  rationale: The comparison formula links Ezekiel's enacted sign to the coming reality.
    Perfect aspect is naturally rendered with English present perfect here to stress
    completed prophetic action with present relevance.
- source_word: כֵּן יֵעָשֶׂה לָהֶם
  chosen: so it shall be done to them
  alternatives:
  - so shall it be done to them
  - thus it will be done to them
  lexicon: HALOT
  rationale: Niphal imperfect of עשה is passive/reflexive in sense here. English passive
    preserves the Hebrew focus on what will happen to them rather than on an explicit
    agent.
- source_word: בַּגּוֹלָה
  chosen: into exile
  alternatives:
  - in exile
  - as exiles
  lexicon: HALOT
  rationale: גּוֹלָה denotes exile/exiled community. With the following verb 'they
    shall go,' English idiom favors directional 'into exile' rather than static 'in
    exile.'
- source_word: בַשְּׁבִי
  chosen: into captivity
  alternatives:
  - into captivity as captives
  - as prisoners
  lexicon: HALOT
  rationale: שְׁבִי refers to captivity/captive state. Paired with גּוֹלָה it intensifies
    the judgment. Rendering both terms distinctly preserves the Hebrew's rhetorical
    doubling rather than collapsing them into one idea.
- source_word: יֵלֵכוּ
  chosen: they shall go
  alternatives:
  - they will go
  lexicon: HALOT
  rationale: Simple imperfect of הלך indicating future result. 'Shall' fits the prophetic
    tone without becoming archaic in this context.
