theological_decisions:
- issue: Nature of Ezekiel's enacted role
  chosen_reading: I am a sign for you
  alternative_readings:
  - I am your portent
  - I am an omen for you
  rationale: The verse presents Ezekiel's action as a prophetic sign-act, not merely
    a prediction. 'Sign' avoids importing superstitious connotations that 'omen' may
    carry while preserving the symbolic and revelatory force of מוֹפֵת.
