theological_decisions:
- issue: Rendering the divine name יְהוָה within אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default renders יְהוָה as 'the LORD.' In the compound title,
    English convention uses 'Lord GOD' to avoid the awkward repetition 'Lord LORD'
    while still signaling the covenant name behind the title.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
