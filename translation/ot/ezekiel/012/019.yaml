id: EZK.12.19
reference: Ezekiel 12:19
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֶל עַ֣ם הָ/אָ֡רֶץ כֹּֽה אָמַר֩ אֲדֹנָ֨/י יְהוִ֜ה לְ/יוֹשְׁבֵ֤י
    יְרוּשָׁלִַ֨ם֙ אֶל אַדְמַ֣ת יִשְׂרָאֵ֔ל לַחְמָ/ם֙ בִּ/דְאָגָ֣ה יֹאכֵ֔לוּ וּ/מֵֽימֵי/הֶ֖ם
    בְּ/שִׁמָּמ֣וֹן יִשְׁתּ֑וּ לְמַ֜עַן תֵּשַׁ֤ם אַרְצָ/הּ֙ מִ/מְּלֹאָ֔/הּ מֵ/חֲמַ֖ס
    כָּֽל הַ/יֹּשְׁבִ֥ים בָּֽ/הּ־־־־׃
translation:
  text: 'And say to the people of the land, ‘Thus says the Lord GOD concerning the
    inhabitants of Jerusalem in the land of Israel: They will eat their bread with
    anxiety and drink their water in desolation, so that her land may be laid desolate
    of its fullness because of the violence of all who dwell in it.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drink their water with horror' or 'in dismay'; the Hebrew term can denote
      appalled desolation as well as devastation.
    reason: lexical_alternative
  - marker: b
    text: Or 'that its land may be laid desolate, stripped of all that fills it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the common people of the land
  lexicon: HALOT
  rationale: A formally close rendering fits the Hebrew phrase here. In Ezekiel this
    likely refers to the people remaining in the land rather than a technical social
    class, so 'the people of the land' preserves the wording without over-interpreting.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the
    combined title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD'
    by rendering 'the Lord GOD,' which preserves the sense of the double divine title.
- source_word: לְיוֹשְׁבֵי יְרוּשָׁלַם אֶל אַדְמַת יִשְׂרָאֵל
  chosen: concerning the inhabitants of Jerusalem in the land of Israel
  alternatives:
  - to the inhabitants of Jerusalem in the land of Israel
  - about the inhabitants of Jerusalem upon the soil of Israel
  lexicon: HALOT
  rationale: The preposition אֶל after the divine speech formula can function as 'concerning'
    or 'to.' Here 'concerning' reads more naturally in English because the message
    is spoken to 'the people of the land' about Jerusalem's inhabitants. אַדְמַת is
    rendered 'land' rather than 'soil' for natural English.
- source_word: לַחְמָם
  chosen: their bread
  alternatives:
  - their food
  lexicon: HALOT
  rationale: '''Bread'' is the direct lexical equivalent and should be retained unless
    context clearly broadens it. Here the prophetic sign-act imagery favors the concrete
    term.'
- source_word: בִּדְאָגָה
  chosen: with anxiety
  alternatives:
  - with worry
  - in anxiousness
  lexicon: HALOT
  rationale: The noun denotes anxious concern or dread. 'With anxiety' is idiomatic
    and preserves the emotional force of fearful scarcity.
- source_word: וּמֵימֵיהֶם
  chosen: their water
  alternatives:
  - their waters
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, English idiom prefers the mass noun
    'water' in this context.
- source_word: בְּשִׁמָּמוֹן
  chosen: in desolation
  alternatives:
  - with horror
  - in dismay
  - in appallment
  lexicon: HALOT
  rationale: The noun can convey devastation, horror, or appalled desolation. Because
    the following clause speaks of the land being laid desolate, 'in desolation' preserves
    the lexical connection and the atmosphere of ruin.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - because
  lexicon: HALOT
  rationale: This introduces purpose/result. 'So that' communicates the connection
    clearly in modern English.
- source_word: תֵּשַׁם אַרְצָהּ
  chosen: her land may be laid desolate
  alternatives:
  - its land may become desolate
  - her land may be devastated
  lexicon: HALOT
  rationale: The verb שׁמם here denotes becoming desolate. 'Be laid desolate' is a
    natural English passive-like rendering that matches prophetic judgment language.
    'Her land' preserves the feminine pronominal suffix tied to the land/city imagery.
- source_word: מִמְּלֹאָהּ
  chosen: of its fullness
  alternatives:
  - of all that fills it
  - of its abundance
  lexicon: HALOT
  rationale: The noun denotes that which fills the land, its fullness. 'Of its fullness'
    is concise and preserves the Hebrew image; the following causal phrase explains
    why that fullness is removed.
- source_word: מֵחֲמַס
  chosen: because of the violence
  alternatives:
  - from the violence
  - because of the wrongdoing
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, oppression, or ruthless wrongdoing.
    'Because of the violence' best fits Ezekiel's judgment context and the causal
    force of מִן here.
- source_word: כָּל הַיֹּשְׁבִים בָּהּ
  chosen: all who dwell in it
  alternatives:
  - all its inhabitants
  - everyone living in it
  lexicon: HALOT
  rationale: This keeps the participial force ('those dwelling') while remaining natural
    English. 'It' refers back to the land.
