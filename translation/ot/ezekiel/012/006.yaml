id: EZK.12.6
reference: Ezekiel 12:6
source:
  edition: WLC
  text: לְ/עֵ֨ינֵי/הֶ֜ם עַל כָּתֵ֤ף תִּשָּׂא֙ בָּ/עֲלָטָ֣ה תוֹצִ֔יא פָּנֶ֣י/ךָ תְכַסֶּ֔ה
    וְ/לֹ֥א תִרְאֶ֖ה אֶת הָ/אָ֑רֶץ כִּֽי מוֹפֵ֥ת נְתַתִּ֖י/ךָ לְ/בֵ֥ית יִשְׂרָאֵֽל־־־׃
translation:
  text: Before their eyes you shall carry it on your shoulder; in the dark you shall
    bring it out. You shall cover your face so that you do not see the land, for I
    have made you a sign for the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the twilight.' The Hebrew term can denote gloom or dim light; here
      it likely refers to moving under cover of darkness.
    reason: lexical_alternative
  - marker: b
    text: Or 'a portent.' The term can refer to a symbolic sign that also carries
      ominous significance.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֵינֵיהֶם
  chosen: Before their eyes
  alternatives:
  - In their sight
  - Before them
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning in their visible presence. 'Before
    their eyes' preserves the vividness of the enacted sign better than the flatter
    'before them.'
- source_word: עַל כָּתֵף תִּשָּׂא
  chosen: you shall carry it on your shoulder
  alternatives:
  - you shall lift it onto your shoulder
  - you shall bear it on the shoulder
  lexicon: HALOT
  rationale: The verb נשׂא with 'shoulder' indicates bearing a load. 'Carry it on
    your shoulder' is natural English and matches the acted symbolism from the surrounding
    context; 'it' is supplied from context because the Hebrew verb here leaves the
    object implicit.
- source_word: בָּעֲלָטָה
  chosen: in the dark
  alternatives:
  - in the twilight
  - in secret
  - in gloom
  lexicon: HALOT
  rationale: The noun עלטה denotes darkness/gloom. 'In the dark' is the most straightforward
    rendering. 'In the twilight' is possible in context, but the lexical sense leans
    more toward darkness than dusk.
- source_word: תוֹצִיא
  chosen: you shall bring it out
  alternatives:
  - you shall take it out
  - you shall lead it out
  lexicon: HALOT
  rationale: Hiphil of יצא here is causative, 'bring out' or 'take out.' 'Bring it
    out' fits the enacted movement of baggage/exile gear and reads smoothly with the
    implied object from context.
- source_word: פָּנֶיךָ תְכַסֶּה
  chosen: You shall cover your face
  alternatives:
  - veil your face
  - hide your face
  lexicon: HALOT
  rationale: Literal action in the sign-act. 'Cover your face' is transparent and
    avoids overinterpreting whether the covering is a veil or some other means.
- source_word: וְלֹא תִרְאֶה אֶת הָאָרֶץ
  chosen: so that you do not see the land
  alternatives:
  - and you shall not see the land
  - so that you may not look on the land
  lexicon: HALOT
  rationale: Although formally coordinate, the clause expresses the purpose/result
    of covering the face. 'So that you do not see the land' communicates the relation
    clearly in English without distorting the Hebrew sequence.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the ground
  - the earth
  lexicon: HALOT
  rationale: In Ezekiel's exilic context, הארץ most naturally refers to the land of
    Israel/Judah rather than the earth in general. 'The land' preserves that likely
    reference while remaining formally close.
- source_word: מוֹפֵת
  chosen: a sign
  alternatives:
  - a portent
  - a wonder
  - an omen
  lexicon: HALOT
  rationale: מופת can denote a sign or portent. Here it refers to Ezekiel as an enacted
    symbolic sign to Israel. 'Sign' is the clearest English choice; 'portent' is possible
    but sounds more ominous and less accessible.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have given you
  - I have set you
  lexicon: HALOT
  rationale: Literally 'I have given you,' but in English with predicate noun 'sign'
    the idiomatic sense is 'made you' or 'set you as.' 'I have made you a sign' best
    conveys the Hebrew construction.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - to the house of Israel
  - for Israel's house
  lexicon: HALOT
  rationale: '''House of Israel'' is a standard prophetic designation and should be
    preserved. The preposition here is well rendered ''for,'' indicating the sign''s
    intended audience/reference.'
