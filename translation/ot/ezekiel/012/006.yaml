theological_decisions:
- issue: Referent of 'the land' in the sign-act
  chosen_reading: Rendered generically as 'the land' without specifying 'of Israel'
    in the main text
  alternative_readings:
  - the land of Israel
  - the ground
  - the earth
  rationale: The context strongly suggests the homeland from which exile is occurring,
    but the Hebrew text itself says only 'the land.' The translation preserves the
    source wording and leaves the contextual identification implicit rather than importing
    an explicit interpretive expansion into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
