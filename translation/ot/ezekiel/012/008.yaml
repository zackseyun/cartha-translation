id: EZK.12.8
reference: Ezekiel 12:8
source:
  edition: WLC
  text: וַ/יְהִ֧י דְבַר יְהוָ֛ה אֵלַ֖/י בַּ/בֹּ֥קֶר לֵ/אמֹֽר־׃
translation:
  text: And in the morning the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as standard narrative progression introducing the prophetic formula. In English, folding the existential sense into the idiomatic clause 'the word of the LORD came' is more natural than the wooden 'it happened,' while preserving the temporal-narrative force with 'And.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Word' preserves the lexical form דבר and the formulaic resonance better than the more interpretive 'message.' Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה, following the stated doctrine and established English Bible convention.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct and natural rendering of the preposition plus first-person suffix; 'to me' fits modern readable English.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning light
  - at morning
  lexicon: HALOT
  rationale: The phrase marks the time when the word came. 'In the morning' is the most straightforward and idiomatic rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. 'Saying' preserves the formal transition to the following divine speech in the next verse.
