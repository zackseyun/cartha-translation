id: EZK.12.4
reference: Ezekiel 12:4
source:
  edition: WLC
  text: וְ/הוֹצֵאתָ֨ כֵלֶ֜י/ךָ כִּ/כְלֵ֥י גוֹלָ֛ה יוֹמָ֖ם לְ/עֵֽינֵי/הֶ֑ם וְ/אַתָּ֗ה
    תֵּצֵ֤א בָ/עֶ֨רֶב֙ לְ/עֵ֣ינֵי/הֶ֔ם כְּ/מוֹצָאֵ֖י גּוֹלָֽה׃
translation:
  text: And you shall bring out your baggage like the baggage of exile by day before
    their eyes, and you yourself shall go out in the evening before their eyes like
    those going out into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'like the baggage of an exile.' The Hebrew expression can be understood
      either collectively ('baggage of exile') or with an individualized sense ('baggage
      of an exile').
    reason: lexical_alternative
  - marker: b
    text: Or, 'like people going out into exile' or 'as exiles go out.' The Hebrew
      literally reads 'like the goings-out of exile/exiles,' an idiom referring to
      the manner of deportation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתָ
  chosen: you shall bring out
  alternatives:
  - you shall carry out
  - you shall take out
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, meaning to cause something to go out or bring
    it out. 'Bring out' is natural English and preserves the commanded action without
    overinterpreting the manner.
- source_word: כֵלֶיךָ
  chosen: your baggage
  alternatives:
  - your equipment
  - your belongings
  - your vessels
  lexicon: HALOT
  rationale: כְּלִי can mean vessel, implement, article, or gear. In this enacted-exile
    context, it refers to the items one takes when deported. 'Baggage' best conveys
    portable belongings for departure in readable modern English.
- source_word: כִּכְלֵי גוֹלָה
  chosen: like the baggage of exile
  alternatives:
  - like exile's baggage
  - like the baggage of an exile
  - like deportation gear
  lexicon: HALOT
  rationale: The comparison is to the belongings associated with exile/deportation.
    'Baggage of exile' keeps the Hebrew genitive compact and thematic, while avoiding
    an overly individualized reading where the Hebrew may be collective.
- source_word: גוֹלָה
  chosen: exile
  alternatives:
  - captivity
  - deportation
  - exiles
  lexicon: HALOT
  rationale: גוֹלָה can denote exile as a state, the exilic community, or deportation.
    Here it modifies baggage and later the act of going out; 'exile' preserves the
    thematic force and avoids the older, potentially misleading 'captivity.'
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - during the day
  lexicon: HALOT
  rationale: The adverb marks the daytime setting in contrast with 'in the evening'
    later in the verse. 'By day' is concise and idiomatic.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - where they can see
  lexicon: HALOT
  rationale: Literally 'to/for their eyes,' an idiom for visible public action. 'Before
    their eyes' preserves the vividness and repeated emphasis of the Hebrew.
- source_word: וְאַתָּה
  chosen: and you yourself
  alternatives:
  - and you
  - but you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'You yourself' reflects that emphasis
    better than a simple 'you.'
- source_word: תֵּצֵא
  chosen: shall go out
  alternatives:
  - shall depart
  - shall come out
  lexicon: HALOT
  rationale: Qal of יצא here describes Ezekiel's own movement. 'Go out' is the straightforward
    equivalent and matches the enacted sign.
- source_word: בָּעֶרֶב
  chosen: in the evening
  alternatives:
  - at evening
  - toward evening
  lexicon: HALOT
  rationale: The phrase contrasts with the earlier daytime action. 'In the evening'
    is clear modern English.
- source_word: כְּמוֹצָאֵי גוֹלָה
  chosen: like those going out into exile
  alternatives:
  - like people going out into exile
  - like the departure of exiles
  - as exiles go out
  lexicon: HALOT
  rationale: מוֹצָאֵי is a plural construct from 'going out/departure.' In context
    it most naturally refers to persons going out as deportees rather than an abstract
    'departure.' 'Those going out into exile' makes the implied human referent explicit
    in idiomatic English.
