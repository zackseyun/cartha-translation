theological_decisions:
- issue: Nature of the condemned prophetic speech
  chosen_reading: The verse condemns both false visionary claims and deceptive divinatory
    pronouncements among Israel.
  alternative_readings:
  - The second phrase could be taken more literally as 'smooth divination' rather
    than interpreted as 'flattering divination.'
  rationale: The text itself is not a major doctrinal crux, but it does pair two forms
    of illegitimate revelation. Rendering חָלָק as 'flattering' preserves the moral-prophetic
    critique without overinterpreting beyond the idiomatic sense of 'smooth' speech.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
