id: EZK.12.24
reference: Ezekiel 12:24
source:
  edition: WLC
  text: כִּ֠י לֹ֣א יִֽהְיֶ֥ה ע֛וֹד כָּל חֲז֥וֹן שָׁ֖וְא וּ/מִקְסַ֣ם חָלָ֑ק בְּ/ת֖וֹךְ
    בֵּ֥ית יִשְׂרָאֵֽל־׃
translation:
  text: For there will no longer be any false vision or flattering divination within
    the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'smooth divination.' The Hebrew adjective literally means 'smooth,' here
      likely in the sense of flattering or deceptively reassuring speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding statement. 'For'
    fits natural English while preserving the causal/explanatory force.
- source_word: לֹא ... עוֹד
  chosen: no longer
  alternatives:
  - not again
  - not any more
  lexicon: HALOT
  rationale: The combination expresses cessation from this point onward. 'No longer'
    is the most idiomatic concise English rendering.
- source_word: יִהְיֶה
  chosen: there will ... be
  alternatives:
  - it will be
  - there shall be
  lexicon: HALOT
  rationale: 'Existential היה is best rendered with English existential syntax: ''there
    will be.'''
- source_word: כָּל
  chosen: any
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: Under negation, כָּל often has the sense 'any.' 'There will no longer
    be any...' is idiomatic and preserves the total negation.
- source_word: חֲזוֹן שָׁוְא
  chosen: false vision
  alternatives:
  - vain vision
  - empty vision
  - lying vision
  lexicon: HALOT
  rationale: שָׁוְא denotes falsity, emptiness, or worthlessness. 'False vision' communicates
    the prophetic context clearly in modern English better than the more archaic 'vain
    vision.'
- source_word: מִקְסַם
  chosen: divination
  alternatives:
  - oracle
  - soothsaying
  lexicon: HALOT
  rationale: Standard rendering for קסם-related terminology in prophetic denunciations;
    it refers to illicit mantic practice.
- source_word: חָלָק
  chosen: flattering
  alternatives:
  - smooth
  - deceptively smooth
  lexicon: HALOT
  rationale: The adjective literally relates to smoothness, but in context it describes
    speech or prediction that is smooth in the sense of flattering and deceptive.
    'Flattering' best conveys the idiomatic force in English.
- source_word: בְּתוֹךְ
  chosen: within
  alternatives:
  - in the midst of
  - among
  lexicon: HALOT
  rationale: Marks location/internal sphere. 'Within' is concise and natural with
    'the house of Israel.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the household of Israel
  lexicon: HALOT
  rationale: A standard prophetic collective designation for the people/nation. Preserving
    'house of Israel' maintains the source imagery and prophetic register.
