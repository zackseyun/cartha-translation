id: EZK.12.1
reference: Ezekiel 12:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as standard narrative/sequential
    introduction. In English, the idiomatic prophetic formula is best represented
    by beginning with 'And' and carrying the verbal force into 'came' with 'the word
    of the LORD' as subject, rather than the wooden 'and it happened.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'word' is the established and
    semantically precise rendering, preserving both revelatory and verbal force better
    than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following the project's default for the Tetragrammaton.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple prepositional phrase indicating direction of revelation; 'to me'
    is clear modern English without archaic coloring.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. 'Saying,'
    preserves the formal prophetic cadence and signals that the following verse contains
    the content of the divine word.
