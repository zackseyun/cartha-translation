theological_decisions:
- issue: Implied object with 'will lift onto his shoulder'
  chosen_reading: Supplied 'his baggage' in the main text
  alternative_readings:
  - will carry on his shoulder (without explicit object)
  rationale: The Hebrew verb lacks an explicit object in this verse, but the surrounding
    enacted prophecy repeatedly refers to exile baggage. Supplying 'his baggage' clarifies
    the sense for English readers while remaining tightly controlled by the immediate
    context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of יַעַן אֲשֶׁר in the final clause
  chosen_reading: 'Rendered as purpose/result: ''so that he may not see'''
  alternative_readings:
  - 'Rendered causally: ''because he will not see'''
  rationale: The sequence 'he will cover his face' followed by the clause naturally
    reads as the intended result of the covering. This also coheres with the historical
    fulfillment in the ruler's blinded or prevented sight of the land, while not importing
    that later detail into the translation itself.
  doctrine_reference: Translation philosophy §3
