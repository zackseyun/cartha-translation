id: EZK.12.12
reference: Ezekiel 12:12
source:
  edition: WLC
  text: וְ/הַ/נָּשִׂ֨יא אֲשֶׁר בְּ/תוֹכָ֜/ם אֶל כָּתֵ֤ף יִשָּׂא֙ בָּ/עֲלָטָ֣ה וְ/יֵצֵ֔א
    בַּ/קִּ֥יר יַחְתְּר֖וּ לְ/ה֣וֹצִיא ב֑/וֹ פָּנָ֣י/ו יְכַסֶּ֔ה יַ֗עַן אֲשֶׁ֨ר לֹא
    יִרְאֶ֥ה לַ/עַ֛יִן ה֖וּא אֶת הָ/אָֽרֶץ־־־־׃
translation:
  text: And the prince who is among them will lift his baggage onto his shoulder in
    the dark and go out. They will dig through the wall to bring him out through it.
    He will cover his face so that he may not see the land with his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the twilight' for 'in the dark.' The Hebrew term can denote gloom
      or dim light, with the broader sense of concealment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'will lift onto the shoulder.' 'His baggage' is supplied from
      the immediate context of the exile sign-act in the surrounding verses.
    reason: cross_reference
  - marker: c
    text: Or, 'because he will not see the land with his eyes.' The Hebrew conjunction
      may be understood as causal rather than purposive/resultative.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנָּשִׂיא
  chosen: the prince
  alternatives:
  - the leader
  - the ruler
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a lifted-up one, i.e., a prince, chief, or leader.
    In Ezekiel 12 the referent is the ruling figure in Jerusalem, traditionally Zedekiah.
    'Prince' preserves the political title without over-specifying 'king,' which the
    Hebrew does not use here.
- source_word: בְּתוֹכָם
  chosen: who is among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: The phrase literally means 'in their midst/among them.' 'Among them'
    is natural modern English and preserves the relational sense.
- source_word: אֶל כָּתֵף יִשָּׂא
  chosen: will lift his baggage onto his shoulder
  alternatives:
  - will carry on his shoulder
  - will bear on the shoulder
  lexicon: HALOT
  rationale: The idiom is literally 'will lift/carry onto shoulder.' In context of
    exile-sign action and flight, the implied object is the exile load or baggage,
    supplied from the surrounding passage (vv. 6–7). Adding 'his baggage' makes the
    English intelligible without changing the sense.
- source_word: בָּעֲלָטָה
  chosen: in the dark
  alternatives:
  - in the twilight
  - secretly
  lexicon: HALOT
  rationale: The noun denotes darkness/gloom, often associated with concealment. 'In
    the dark' best fits the immediate context of furtive escape. 'In the twilight'
    is possible, but the emphasis here is concealment rather than a precise time of
    day.
- source_word: וְיֵצֵא
  chosen: and go out
  alternatives:
  - and depart
  lexicon: HALOT
  rationale: Straightforward rendering of יצא. 'Go out' matches the physical movement
    described.
- source_word: בַּקִּיר יַחְתְּרוּ
  chosen: They will dig through the wall
  alternatives:
  - They will break through the wall
  lexicon: HALOT
  rationale: חתר means to dig through or break through, especially a wall. 'Dig through'
    preserves the concrete imagery and matches the sign-act context.
- source_word: לְהוֹצִיא בוֹ
  chosen: to bring him out through it
  alternatives:
  - to bring out through it
  - to take him out by it
  lexicon: HALOT
  rationale: 'The infinitive of יצא in the causative means ''to bring out.'' The pronoun
    בוֹ is best taken instrumentally/locatively with the wall opening: ''through it.''
    The object ''him'' is contextually the prince.'
- source_word: פָּנָיו יְכַסֶּה
  chosen: He will cover his face
  alternatives:
  - He will veil his face
  lexicon: HALOT
  rationale: A direct rendering of the clause. 'Cover his face' is idiomatic and preserves
    the physical action.
- source_word: יַעַן אֲשֶׁר לֹא יִרְאֶה
  chosen: so that he may not see
  alternatives:
  - because he will not see
  - with the result that he will not see
  lexicon: HALOT
  rationale: 'The conjunction can introduce reason or result/purpose. In this context,
    after covering the face, the sense is most naturally purposive/resultative: he
    covers his face so as not to see.'
- source_word: לַעַיִן
  chosen: with his eyes
  alternatives:
  - with the eye
  - plainly
  lexicon: HALOT
  rationale: Literally 'to/with the eye.' In English, 'with his eyes' conveys the
    concrete bodily sense and avoids awkwardness.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the ground
  - the country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land he is leaving, not merely soil. 'The land'
    is the standard and contextually appropriate rendering.
