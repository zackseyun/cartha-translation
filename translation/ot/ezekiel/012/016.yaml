id: EZK.12.16
reference: Ezekiel 12:16
source:
  edition: WLC
  text: וְ/הוֹתַרְתִּ֤י מֵ/הֶם֙ אַנְשֵׁ֣י מִסְפָּ֔ר מֵ/חֶ֖רֶב מֵ/רָעָ֣ב וּ/מִ/דָּ֑בֶר
    לְמַ֨עַן יְסַפְּר֜וּ אֶת כָּל תּוֹעֲבֽוֹתֵי/הֶ֗ם בַּ/גּוֹיִם֙ אֲשֶׁר בָּ֣אוּ שָׁ֔ם
    וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־־־־׃פ
translation:
  text: But I will spare from among them a few men from the sword, from famine, and
    from pestilence, so that they may recount all their abominations among the nations
    where they go; and they will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where they have gone.' The Hebrew verb is formally perfect, but the
      clause can be rendered more idiomatically in English as future-oriented in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתַרְתִּי
  chosen: I will spare
  alternatives:
  - I will leave
  - I will preserve
  - I will let remain
  lexicon: HALOT
  rationale: The hiphil of יתר here means to leave over or preserve survivors. 'I
    will spare' communicates purposeful preservation in idiomatic English while retaining
    the sense that only some are left alive.
- source_word: מֵהֶם
  chosen: from among them
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The preposition with pronoun marks selection out of the group; 'from
    among them' makes that partitive sense explicit.
- source_word: אַנְשֵׁי מִסְפָּר
  chosen: a few men
  alternatives:
  - men of number
  - a small number of men
  - a handful of men
  lexicon: HALOT
  rationale: This idiom denotes a small, countable remnant. 'A few men' is natural
    English and preserves the masculine reference present in the Hebrew.
- source_word: מֵחֶרֶב
  chosen: from the sword
  alternatives:
  - from war
  - from violence
  lexicon: HALOT
  rationale: '''Sword'' is the standard metonym for death by warfare or violent judgment
    and should be preserved rather than generalized.'
- source_word: מֵרָעָב
  chosen: from famine
  alternatives:
  - from hunger
  lexicon: HALOT
  rationale: In prophetic judgment contexts רָעָב refers to famine as a covenant curse,
    not merely personal hunger.
- source_word: וּמִדָּבֶר
  chosen: and from pestilence
  alternatives:
  - and from plague
  - and from disease
  lexicon: HALOT
  rationale: דָּבֶר in judgment formulas commonly denotes pestilence. 'Pestilence'
    preserves the formal prophetic triad 'sword, famine, and pestilence.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: This introduces purpose, not mere result.
- source_word: יְסַפְּרוּ
  chosen: they may recount
  alternatives:
  - they may tell
  - they may declare
  lexicon: HALOT
  rationale: The piel of ספר here means to tell or recount in detail. 'Recount' fits
    the sense of verbalizing their deeds among the nations.
- source_word: אֵת כָּל תּוֹעֲבוֹתֵיהֶם
  chosen: all their abominations
  alternatives:
  - all their detestable deeds
  - all their abominable acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong moral-religious term in Ezekiel, often tied to
    idolatrous offenses. 'Abominations' preserves that theological weight better than
    a softer paraphrase.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: In Ezekiel גּוֹיִם refers to the foreign nations. 'Among the nations'
    is the most natural and contextually accurate rendering in English.
- source_word: אֲשֶׁר בָּאוּ שָׁם
  chosen: where they go
  alternatives:
  - where they have gone
  - where they come
  lexicon: HALOT
  rationale: Although the Hebrew verb is formally perfect ('have come'), in this future-oriented
    context after a purpose clause it functions naturally as destination relative
    to the survivors' exile. English idiom prefers 'where they go' rather than the
    stiffer 'where they have gone.'
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - then they will know
  lexicon: HALOT
  rationale: This is Ezekiel's recurring recognition formula. 'Will know' preserves
    the covenant-judicial force without overexpansion.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated project
    standard.
