theological_decisions:
- issue: Gendered expression in אַנְשֵׁי מִסְפָּר
  chosen_reading: a few men
  alternative_readings:
  - a few people
  - a small number of persons
  rationale: The Hebrew is grammatically masculine and refers to male persons. Per
    the project's gender-accurate policy, the translation preserves 'men' rather than
    neutralizing the expression.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD'; no contextual factor here
    requires variance.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
