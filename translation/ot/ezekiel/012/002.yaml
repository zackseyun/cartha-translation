theological_decisions:
- issue: Corporate metaphor of 'house' for Israel
  chosen_reading: Retain 'house' rather than replacing it with 'people' in the main
    text
  alternative_readings:
  - people
  - household
  rationale: The metaphor is important in Ezekiel and should be preserved unless English
    becomes misleading. Here 'rebellious house' is understandable and keeps the prophetic
    idiom and repetition intact.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
