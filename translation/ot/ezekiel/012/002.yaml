id: EZK.12.2
reference: Ezekiel 12:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם בְּ/ת֥וֹךְ בֵּית הַ/מֶּ֖רִי אַתָּ֣ה יֹשֵׁ֑ב אֲשֶׁ֣ר עֵינַיִם֩
    לָ/הֶ֨ם לִ/רְא֜וֹת וְ/לֹ֣א רָא֗וּ אָזְנַ֨יִם לָ/הֶ֤ם לִ/שְׁמֹ֨עַ֙ וְ/לֹ֣א שָׁמֵ֔עוּ
    כִּ֛י בֵּ֥ית מְרִ֖י הֵֽם־־׃
translation:
  text: Son of man, you dwell in the midst of a rebellious house, who have eyes to
    see but do not see, ears to hear but do not hear, for they are a rebellious house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a house of rebellion' or 'a rebellious people.' The Hebrew 'house' is
      a corporate term for the people as a whole.
    reason: lexical_alternative
  - marker: b
    text: Literally 'eyes are to them to see, and they do not see; ears are to them
      to hear, and they do not hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Conventional and contextually appropriate rendering of Ezekiel’s address
    formula. Although the Hebrew is literally 'son of man,' in Ezekiel it functions
    as a vocative title for the prophet. 'Son of man' preserves the source form and
    intertextual resonance better than more interpretive alternatives.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: HALOT
  rationale: This preposition+noun idiom denotes being situated within a group. 'In
    the midst of' preserves the vividness and slightly formal prophetic tone.
- source_word: בֵּית הַמֶּרִי / בֵּית מְרִי
  chosen: a rebellious house
  alternatives:
  - a rebellious people
  - a house of rebellion
  - a rebellious household
  lexicon: HALOT
  rationale: Hebrew 'house' often denotes a corporate group or people. Here it refers
    to the community of Israel in rebellion. 'Rebellious house' is a natural yet close
    rendering and preserves the repeated phrase in the verse. The article in the first
    instance is not pressed in English because the phrase is qualitative and generic
    in prophetic address.
- source_word: יֹשֵׁב
  chosen: dwell
  alternatives:
  - sit
  - live
  lexicon: HALOT
  rationale: The participle from ישׁב can mean 'sit,' 'remain,' or 'dwell.' In context
    of residing among a people, 'dwell' best captures the sense without sounding wooden.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - among whom
  lexicon: HALOT
  rationale: Introduces a relative clause describing the rebellious house. 'Who' is
    idiomatic for a people-group in English. 'Among whom' would make explicit the
    relation to Ezekiel, but the Hebrew more directly modifies 'house.'
- source_word: עֵינַיִם לָהֶם לִרְאוֹת וְלֹא רָאוּ
  chosen: have eyes to see but do not see
  alternatives:
  - have eyes for seeing, yet they do not see
  lexicon: HALOT
  rationale: The Hebrew literally says 'eyes are to them to see, and they have not
    seen.' English idiom is best represented by 'have eyes to see but do not see.'
    Present tense fits the general characterization of the people.
- source_word: אָזְנַיִם לָהֶם לִשְׁמֹעַ וְלֹא שָׁמֵעוּ
  chosen: ears to hear but do not hear
  alternatives:
  - have ears for hearing, yet they do not hear
  lexicon: HALOT
  rationale: Parallel to the previous clause. 'Hear' in prophetic literature often
    implies responsive understanding, but the basic sensory verb should be retained
    in translation rather than expanded interpretively.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי gives the reason for their failure to see and hear. 'For' preserves
    the explanatory force and suits the prophetic register.
- source_word: הֵם
  chosen: they are
  alternatives:
  - they
  lexicon: HALOT
  rationale: The independent pronoun is expressed in Hebrew for emphasis. English
    requires the copula with the predicate noun phrase, yielding 'they are a rebellious
    house.'
