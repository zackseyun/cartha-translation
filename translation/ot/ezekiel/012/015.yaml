id: EZK.12.15
reference: Ezekiel 12:15
source:
  edition: WLC
  text: וְ/יָדְע֖וּ כִּֽי אֲנִ֣י יְהוָ֑ה בַּ/הֲפִיצִ֤/י אוֹתָ/ם֙ בַּ/גּוֹיִ֔ם וְ/זֵרִיתִ֥י אוֹתָ֖/ם בָּ/אֲרָצֽוֹת־׃
translation:
  text: And they will know that I am Yahweh when I scatter them among the nations and disperse them through the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project’s default practice of rendering the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And they will know
  alternatives:
  - And they shall know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries future/resultative force in English. 'Will know' is natural modern English while preserving the recognition formula common in Ezekiel.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: Standard covenant formula. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'That' appropriately introduces the content of what they will know.
- source_word: בַּהֲפִיצִי
  chosen: when I scatter
  alternatives:
  - in my scattering
  - as I scatter
  lexicon: HALOT
  rationale: 'The preposition ב plus Hiphil infinitive construct with 1cs suffix is best rendered temporally here: ''when I scatter.'' The Hiphil of פוץ conveys causing to be scattered.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign peoples/nations among whom Israel will be exiled. 'Nations' is the standard contextual rendering in the Hebrew Bible; 'Gentiles' would sound more NT-specific.
- source_word: וְזֵרִיתִי
  chosen: and disperse
  alternatives:
  - and scatter
  - and winnow
  lexicon: HALOT
  rationale: זרה can mean scatter/disperse, sometimes with imagery of winnowing. Here, paired with the previous scattering verb, 'disperse' provides readable English variation while preserving the sense of broad distribution.
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - through the countries
  - in the lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is plural 'lands/countries.' 'Through the lands' fits the dispersal imagery and avoids implying modern nation-states too strongly.
