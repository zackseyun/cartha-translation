theological_decisions:
- issue: Rendering of אָדָם in prophetic address
  chosen_reading: son of man
  alternative_readings:
  - mortal
  - human one
  rationale: The doctrine calls for gender-accurate rendering matching source intent.
    Here the idiom is a direct address to Ezekiel and is best preserved literally
    rather than neutralized.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Interpretive force of יִרְאוּ
  chosen_reading: see
  alternative_readings:
  - understand
  - take notice
  rationale: The verse emphasizes visible sign-action ('before their eyes' twice).
    Preserving 'see' maintains the theological tension between physical sight and
    possible spiritual perception without resolving it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
