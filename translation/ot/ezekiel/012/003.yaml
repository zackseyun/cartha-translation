id: EZK.12.3
reference: Ezekiel 12:3
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם עֲשֵׂ֤ה לְ/ךָ֙ כְּלֵ֣י גוֹלָ֔ה וּ/גְלֵ֥ה יוֹמָ֖ם לְ/עֵֽינֵי/הֶ֑ם
    וְ/גָלִ֨יתָ מִ/מְּקוֹמְ/ךָ֜ אֶל מָק֤וֹם אַחֵר֙ לְ/עֵ֣ינֵי/הֶ֔ם אוּלַ֣י יִרְא֔וּ
    כִּ֛י בֵּ֥ית מְרִ֖י הֵֽמָּה־־׃
translation:
  text: And you, son of man, prepare for yourself baggage for exile, and go into exile
    by day before their eyes. You shall go into exile from your place to another place
    before their eyes. Perhaps they will see, though they are a rebellious house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'equipment for exile' or 'articles of exile.' The Hebrew refers to the
      belongings an exile would carry.
    reason: lexical_alternative
  - marker: b
    text: Or 'Perhaps they will understand'; the Hebrew verb is literally 'see,' but
      can extend to perception.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Retains the established prophetic address and matches the Hebrew idiom
    literally. Although 'mortal' can fit in Ezekiel, 'son of man' is more transparent
    to the source wording and preserves intertextual resonance.
- source_word: עֲשֵׂה לְךָ
  chosen: prepare for yourself
  alternatives:
  - make for yourself
  lexicon: HALOT
  rationale: The verb עשה is broad ('make/do'), but in context of assembling travel
    items, 'prepare for yourself' is the most natural English while staying close
    to the action commanded.
- source_word: כְּלֵי גוֹלָה
  chosen: baggage for exile
  alternatives:
  - articles of exile
  - exile's baggage
  - equipment for captivity
  lexicon: HALOT
  rationale: כְּלִי can mean vessel, article, implement, or gear; with גוֹלָה it refers
    to the belongings one takes into deportation. 'Baggage for exile' is idiomatic
    modern English and preserves the enacted-sign context.
- source_word: וּגְלֵה
  chosen: go into exile
  alternatives:
  - depart as an exile
  - remove yourself
  lexicon: HALOT
  rationale: From גלה in the Qal, here functioning as the enacted movement of deportation.
    'Go into exile' best captures the verbal force without reducing it to mere travel.
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - during the day
  lexicon: HALOT
  rationale: A concise temporal adverb; 'by day' is natural and preserves the contrastive
    public visibility implied in the sign-act.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  lexicon: HALOT
  rationale: A literal and vivid rendering that fits the repeated emphasis on public
    observation.
- source_word: וְגָלִיתָ מִמְּקוֹמְךָ אֶל מָקוֹם אַחֵר
  chosen: You shall go into exile from your place to another place
  alternatives:
  - You shall depart from your place to another place
  - You shall be carried away from your place to another place
  lexicon: HALOT
  rationale: Keeps the repetition of גלה for rhetorical effect and preserves the movement
    from one location to another as part of the symbolic action.
- source_word: אוּלַי יִרְאוּ
  chosen: Perhaps they will see
  alternatives:
  - Perhaps they will understand
  - Maybe they will perceive
  lexicon: HALOT
  rationale: The verb is literally 'see.' In prophetic contexts it can imply perception,
    but the enacted sign and repeated 'before their eyes' favor preserving the visual
    language in the main text.
- source_word: כִּי
  chosen: though
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces a concessive nuance after ''perhaps they will see'':
    despite the fact that they are rebellious. English ''though'' best conveys the
    discourse sense in context.'
- source_word: בֵּית מְרִי
  chosen: a rebellious house
  alternatives:
  - a house of rebellion
  - a rebellious people
  lexicon: HALOT
  rationale: A frequent Ezekiel expression for Israel/Judah in covenant rebellion.
    'Rebellious house' is both literal and idiomatic enough for modern English.
