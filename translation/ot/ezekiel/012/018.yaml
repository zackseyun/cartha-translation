id: EZK.12.18
reference: Ezekiel 12:18
source:
  edition: WLC
  text: בֶּן אָדָ֕ם לַחְמְ/ךָ֖ בְּ/רַ֣עַשׁ תֹּאכֵ֑ל וּ/מֵימֶ֕י/ךָ בְּ/רָגְזָ֥ה וּ/בִ/דְאָגָ֖ה
    תִּשְׁתֶּֽה־׃
translation:
  text: Son of man, eat your bread with trembling, and drink your water with shaking
    and anxiety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with quaking' for 'with trembling'; the Hebrew noun רַעַשׁ can denote
      shaking or trembling.
    reason: lexical_alternative
  - marker: b
    text: Or 'with trembling and anxiety'; the two Hebrew nouns for the manner of
      drinking overlap in the sense of agitation and fear.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal man
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. 'Son of man' preserves the
    literal Hebrew and the recurring prophetic formula better than a more interpretive
    rendering such as 'human one' or 'mortal.' The masculine singular matches the
    source and addresses Ezekiel directly.
- source_word: לַחְמְךָ
  chosen: your bread
  alternatives:
  - your food
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' though it can extend to food generally.
    Here 'bread' is retained because the prophetic sign-act is concrete and vivid,
    and English readers readily understand bread as staple food.
- source_word: בְּרַעַשׁ
  chosen: with trembling
  alternatives:
  - with quaking
  - with shaking
  lexicon: HALOT
  rationale: רַעַשׁ denotes shaking, quaking, or trembling. 'With trembling' fits
    the idiom of fearful eating in English while preserving the bodily sense of agitation.
- source_word: תֹּאכֵל
  chosen: eat
  lexicon: HALOT
  rationale: Simple Qal imperfect/jussive-like instruction in context; English imperative
    sense is supplied naturally from the prophetic command.
- source_word: וּמֵימֶיךָ
  chosen: and your water
  alternatives:
  - and your drink
  lexicon: HALOT
  rationale: The Hebrew is literally 'your waters,' an idiomatic/plural form for water.
    Singular 'water' is the natural English equivalent while preserving the concrete
    image.
- source_word: בְּרָגְזָה
  chosen: with shaking
  alternatives:
  - with trembling
  - with quaking
  - in agitation
  lexicon: HALOT
  rationale: רָגְזָה conveys agitation, quaking, or shaking. To avoid flattening it
    into the same English word as רַעַשׁ while preserving overlap, 'with shaking'
    gives a slightly distinct but related expression.
- source_word: וּבִדְאָגָה
  chosen: and anxiety
  alternatives:
  - and fear
  - and worry
  lexicon: HALOT
  rationale: דְאָגָה denotes anxious care, worry, or apprehension. 'Anxiety' is concise,
    natural modern English, and captures the inward distress paired with the outward
    shaking.
- source_word: תִּשְׁתֶּה
  chosen: drink
  lexicon: HALOT
  rationale: Simple Qal imperfect with imperative force in context; 'drink' is the
    direct and natural rendering.
