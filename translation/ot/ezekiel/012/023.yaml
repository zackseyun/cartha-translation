id: EZK.12.23
reference: Ezekiel 12:23
source:
  edition: WLC
  text: לָ/כֵ֞ן אֱמֹ֣ר אֲלֵי/הֶ֗ם כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ הִשְׁבַּ֨תִּי֙ אֶת הַ/מָּשָׁ֣ל הַ/זֶּ֔ה וְ/לֹֽא יִמְשְׁל֥וּ אֹת֛/וֹ ע֖וֹד בְּ/יִשְׂרָאֵ֑ל כִּ֚י אִם דַּבֵּ֣ר אֲלֵי/הֶ֔ם קָֽרְבוּ֙ הַ/יָּמִ֔ים וּ/דְבַ֖ר כָּל חָזֽוֹן־־־־־׃
translation:
  text: 'Therefore say to them, ‘Thus says the Lord GOD: I will put an end to this proverb, and they will no longer use it as a proverb in Israel. But say to them, “The days have drawn near, and the word of every vision.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the word of every vision'; here 'word' is rendered as 'fulfillment' because the context concerns whether prophetic visions will actually come to pass without delay.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential connective introducing the consequence of the preceding argument.
- source_word: אֱמֹר אֲלֵיהֶם
  chosen: say to them
  alternatives:
  - tell them
  - speak to them
  lexicon: HALOT
  rationale: Direct prophetic commission formula; 'say to them' preserves the speech-act force without unnecessary expansion.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - This is what the Lord GOD says
  - Thus says the Lord Yahweh
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Lord GOD' reflects אֲדֹנָי יְהוִה, and 'the LORD' as default for YHWH is adapted here to avoid the awkward 'Lord LORD'; 'GOD' signals the divine name in line with established English convention.
- source_word: הִשְׁבַּתִּי
  chosen: I will put an end to
  alternatives:
  - I have caused to cease
  - I will stop
  lexicon: HALOT
  rationale: 'Hiphil of שבת means to cause to cease/end. Although morphologically perfect, in prophetic speech it functions performatively/futuristically here: God declares the imminent ending of the proverb''s use.'
- source_word: הַמָּשָׁל הַזֶּה
  chosen: this proverb
  alternatives:
  - this saying
  - this taunt
  lexicon: HALOT
  rationale: מָשָׁל here refers to the popular proverb cited in the context (v. 22), not a parable in the later literary sense.
- source_word: וְלֹא יִמְשְׁלוּ אֹתוֹ עוֹד בְּיִשְׂרָאֵל
  chosen: and they will no longer use it as a proverb in Israel
  alternatives:
  - and they will no longer quote it in Israel
  - and they will no longer speak it proverbially in Israel
  lexicon: HALOT
  rationale: The verb from משל in the Qal here means to utter/use a proverb, not 'rule.' The object pronoun refers back to the proverb itself; English idiom requires expansion to 'use it as a proverb.'
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Instead
  lexicon: HALOT
  rationale: Adversative exceptive expression marking contrast with the abolished proverb; 'But' is the most natural concise English transition.
- source_word: דַּבֵּר אֲלֵיהֶם
  chosen: say to them
  alternatives:
  - tell them
  - declare to them
  lexicon: HALOT
  rationale: Imperative resumes the prophetic address. Repeating 'say to them' preserves the Hebrew structure.
- source_word: קָרְבוּ הַיָּמִים
  chosen: The days have drawn near
  alternatives:
  - The days are near
  - The time has come near
  lexicon: HALOT
  rationale: Perfect verb expresses imminent arrival. 'Have drawn near' preserves the completed-nearness nuance better than a simple present.
- source_word: וּדְבַר כָּל חָזוֹן
  chosen: and the fulfillment of every vision
  alternatives:
  - and the word of every vision
  - and every vision's matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In context, contrasted with the proverb about delay, it refers to the actual realization/content of prophetic visions coming to pass. 'Fulfillment' makes the sense explicit in natural English while staying within contextual warrant.
