id: EZK.41.26
reference: Ezekiel 41:26
source:
  edition: WLC
  text: וְ/חַלּוֹנִ֨ים אֲטֻמ֤וֹת וְ/תִֽמֹרִים֙ מִ/פּ֣וֹ וּ/מִ/פּ֔וֹ אֶל כִּתְפ֖וֹת
    הָֽ/אוּלָ֑ם וְ/צַלְע֥וֹת הַ/בַּ֖יִת וְ/הָ/עֻבִּֽים־׃
translation:
  text: And there were shuttered windows and palm trees on this side and on that,
    along the sidewalls of the vestibule, and on the side chambers of the temple and
    the canopies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'closed windows'; the Hebrew describes windows that were shut or screened
      in some way.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'palm trees,' likely meaning palm-tree decorative motifs in the temple
      architecture.
    reason: cultural_note
  - marker: c
    text: The meaning of the final term is uncertain; it may refer to projecting roofs,
      eaves, or other overhanging architectural features.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלּוֹנִים
  chosen: windows
  alternatives:
  - openings
  lexicon: HALOT
  rationale: Standard rendering for the plural noun referring to architectural windows/openings;
    'windows' is the natural English equivalent in this temple-description context.
- source_word: אֲטֻמוֹת
  chosen: shuttered
  alternatives:
  - closed
  - blocked
  - recessed
  lexicon: HALOT
  rationale: The passive participial form describes windows that are closed off in
    some way. 'Shuttered' preserves the architectural sense better than the vaguer
    'closed,' while avoiding overprecision about construction.
- source_word: תִמֹרִים
  chosen: palm trees
  alternatives:
  - palm-tree carvings
  - palms
  lexicon: HALOT
  rationale: In Ezekiel's temple vision this term refers to palm-tree decorative motifs.
    'Palm trees' is concise and idiomatic; the decorative sense is supplied by the
    architectural context.
- source_word: מִפּוֹ וּמִפּוֹ
  chosen: on this side and on that
  alternatives:
  - here and there
  - on either side
  lexicon: HALOT
  rationale: This distributive expression indicates placement on both sides. 'On this
    side and on that' closely follows the Hebrew while remaining readable.
- source_word: אֶל כִּתְפוֹת הָאוּלָם
  chosen: along the sidewalls of the vestibule
  alternatives:
  - toward the shoulders/sides of the vestibule
  - against the side parts of the portico
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder/side,' and in architecture refers to
    side sections or sidewalls. 'Vestibule' is a good rendering of אוּלָם in temple
    architecture. 'Along' captures the spatial relation naturally in English.
- source_word: צַלְעוֹת הַבַּיִת
  chosen: the side chambers of the temple
  alternatives:
  - the ribs/sides of the house
  - the side rooms of the house
  lexicon: HALOT
  rationale: In temple-building contexts צֵלָע commonly denotes side chambers/side
    structures. 'Temple' clarifies that הַבַּיִת here is the sanctuary building, not
    a domestic house.
- source_word: הָעֻבִּים
  chosen: the canopies
  alternatives:
  - the projecting roofs
  - the thick beams
  - the eaves
  lexicon: HALOT
  rationale: This rare architectural term is difficult. Many understand it as projecting
    structural elements or roofed overhangs. 'Canopies' gives a cautious, readable
    architectural rendering without claiming more precision than the evidence allows.
