id: EZK.41.21
reference: Ezekiel 41:21
source:
  edition: WLC
  text: הַֽ/הֵיכָ֖ל מְזוּזַ֣ת רְבֻעָ֑ה וּ/פְנֵ֣י הַ/קֹּ֔דֶשׁ הַ/מַּרְאֶ֖ה כַּ/מַּרְאֶֽה׃
translation:
  text: The nave had a square doorframe, and the front of the sanctuary had the same
    appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The temple hall had a square doorframe.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the appearance like the appearance,' an elliptical expression
      meaning that the front of the sanctuary matched it in appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיכָל
  chosen: nave
  alternatives:
  - temple hall
  - main hall
  - palace
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, הֵיכָל refers to the main hall/outer room
    before the inner sanctuary, not the entire temple complex. 'Nave' is a concise
    architectural term that fits the room-level sense, though 'main hall' is a viable
    alternative.
- source_word: מְזוּזַת
  chosen: doorframe
  alternatives:
  - doorpost
  - doorjamb
  lexicon: HALOT
  rationale: מְזוּזָה denotes a doorpost/doorframe element. Because the predicate
    describes its shape as square, 'doorframe' naturally conveys the architectural
    feature in English better than the singular 'doorpost'.
- source_word: רְבֻעָה
  chosen: square
  alternatives:
  - four-sided
  lexicon: HALOT
  rationale: The adjective indicates a square or four-cornered shape. 'Square' is
    the most natural architectural rendering in English.
- source_word: וּפְנֵי
  chosen: and the front of
  alternatives:
  - and the face of
  - and the surface of
  lexicon: HALOT
  rationale: פָּנִים literally means 'face,' but in architectural context it commonly
    refers to the front or facing side. 'The front of' best fits the description of
    the sanctuary's visible aspect.
- source_word: הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy room
  lexicon: HALOT
  rationale: In this temple context, קֹדֶשׁ refers to the holy place/sanctuary area.
    'Sanctuary' is clear modern English and preserves the sacred architectural sense.
- source_word: הַמַּרְאֶה כַּמַּרְאֶה
  chosen: had the same appearance
  alternatives:
  - appearance was like the appearance
  - looked alike
  lexicon: HALOT
  rationale: The Hebrew is elliptical and repetitive, literally 'the appearance like
    the appearance,' expressing visual correspondence. 'Had the same appearance' captures
    the comparison in idiomatic English without over-paraphrasing.
