id: EZK.41.11
reference: Ezekiel 41:11
source:
  edition: WLC
  text: וּ/פֶ֤תַח הַ/צֵּלָע֙ לַ/מֻּנָּ֔ח פֶּ֤תַח אֶחָד֙ דֶּ֣רֶךְ הַ/צָּפ֔וֹן וּ/פֶ֥תַח
    אֶחָ֖ד לַ/דָּר֑וֹם וְ/רֹ֨חַב֙ מְק֣וֹם הַ/מֻּנָּ֔ח חָמֵ֥שׁ אַמּ֖וֹת סָבִ֥יב סָבִֽיב׀׃
translation:
  text: And the doorway of the side chamber opened to the free space, one doorway
    toward the north and one doorway toward the south; and the width of the free space
    was five cubits all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'open space' or 'vacant area' for 'free space' (Hebrew מֻנָּח), referring
      to the area left open around the structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶתַח
  chosen: doorway
  alternatives:
  - entrance
  - opening
  lexicon: HALOT
  rationale: Rendered as 'doorway' to denote an architectural opening in this temple-vision
    context. 'Entrance' is possible, but 'doorway' better matches the concrete building
    description.
- source_word: הַצֵּלָע
  chosen: the side chamber
  alternatives:
  - the side room
  - the side structure
  lexicon: HALOT
  rationale: In Ezekiel's temple descriptions צֵלָע refers to a side chamber/side
    room attached to the main structure. 'Side chamber' is a standard and clear architectural
    rendering.
- source_word: לַמֻּנָּח
  chosen: to the free space
  alternatives:
  - to the open space
  - to the vacant area
  - to the resting place
  lexicon: HALOT
  rationale: The noun-like passive participle from נוח here denotes the space left
    open around the structure, not a 'resting place' in a devotional sense. 'Free
    space' captures the reserved/open area in the architectural layout.
- source_word: פֶּתַח אֶחָד דֶּרֶךְ הַצָּפוֹן
  chosen: one doorway toward the north
  alternatives:
  - one entrance facing north
  - one doorway by way of the north
  lexicon: HALOT
  rationale: דֶּרֶךְ in this construction indicates direction/orientation. 'Toward
    the north' is idiomatic English and fits the spatial description.
- source_word: וּפֶתַח אֶחָד לַדָּרוֹם
  chosen: and one doorway toward the south
  alternatives:
  - and one entrance facing south
  - and one doorway to the south
  lexicon: HALOT
  rationale: Parallel to the previous clause; 'toward the south' preserves the directional
    sense and keeps the symmetry of the Hebrew.
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: Standard architectural term in English for a measured horizontal dimension.
- source_word: מְקוֹם הַמֻּנָּח
  chosen: the free space
  alternatives:
  - the place left open
  - the open area
  lexicon: HALOT
  rationale: The construct phrase refers to the area reserved/open around the building.
    Rendering the whole phrase smoothly as 'the free space' avoids awkward literalism
    while preserving sense.
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  alternatives:
  - five cubits wide
  lexicon: HALOT
  rationale: Kept the ancient unit 'cubits' for formal accuracy in temple measurements;
    the width relation is already supplied by the clause.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled form intensifies/completes the circumferential sense. 'All
    around' is natural modern English and preserves the repeated idea.
