id: EZK.41.23
reference: Ezekiel 41:23
source:
  edition: WLC
  text: וּ/שְׁתַּ֧יִם דְּלָת֛וֹת לַֽ/הֵיכָ֖ל וְ/לַ/קֹּֽדֶשׁ׃
translation:
  text: And the nave and the sanctuary each had two doors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the main hall and the Holy Place each had two doors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁתַּיִם
  chosen: two
  alternatives:
  - a pair of
  lexicon: HALOT
  rationale: Cardinal feminine numeral modifying the feminine plural noun 'doors.'
    Rendered simply as 'two' in natural English.
- source_word: דְּלָתוֹת
  chosen: doors
  alternatives:
  - door leaves
  - double doors
  lexicon: HALOT
  rationale: The plural noun denotes doors. Because the verse states 'two doors' for
    each destination, the straightforward rendering is 'doors'; more interpretive
    options like 'double doors' are possible but go beyond the bare lexical sense
    and are better left implicit.
- source_word: הֵיכָל
  chosen: nave
  alternatives:
  - temple hall
  - main hall
  lexicon: HALOT
  rationale: In this temple-vision context, הֵיכָל refers to the main hall of the
    temple building, distinct from the inner sanctuary. 'Nave' is a concise architectural
    equivalent used in many Ezekiel temple contexts, though 'main hall' is a viable
    alternative.
- source_word: קֹּדֶשׁ
  chosen: sanctuary
  alternatives:
  - Holy Place
  - holy place
  lexicon: HALOT
  rationale: Here קֹדֶשׁ designates the sacred inner area paired with הֵיכָל. 'Sanctuary'
    is clear modern English and preserves the sacred sense without overcommitting
    to a technical label. 'Holy Place' is possible, but in this context could create
    confusion with more specialized tabernacle/temple terminology.
- source_word: לַ/הֵיכָל וְ/לַ/קֹּדֶשׁ
  chosen: the nave and the sanctuary each had
  alternatives:
  - for the nave and for the sanctuary there were
  - to the nave and to the sanctuary belonged
  lexicon: HALOT
  rationale: The Hebrew is verbless and literally gives 'and two doors for the nave
    and for the sanctuary.' English idiom requires supplying a copular/existential
    sense. 'Each had' makes explicit that both the nave and the sanctuary had two
    doors, which is the natural sense of the distributive construction.
