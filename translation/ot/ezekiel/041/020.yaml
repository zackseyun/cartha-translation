id: EZK.41.20
reference: Ezekiel 41:20
source:
  edition: WLC
  text: מֵ/הָ/אָ֨רֶץ֙ עַד מֵ/עַ֣ל הַ/פֶּ֔תַח הַ/כְּרוּבִ֥ים וְ/הַ/תִּֽמֹרִ֖ים עֲשׂוּיִ֑ם
    וְ/קִ֖יר הַׄ/הֵׄיׄכָֽׄלׄ־׃
translation:
  text: From the floor to above the entrance, cherubim and palm trees were made, and
    on the wall of the nave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the ground' or 'from the earth,' if taken more literally; in this
      architectural setting the sense is the floor level.
    reason: lexical_alternative
  - marker: b
    text: Hebrew heikhal here likely refers specifically to the main hall or nave,
      not the whole temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵהָאָרֶץ
  chosen: From the floor
  alternatives:
  - from the الأرض/earth
  - from the ground
  lexicon: HALOT
  rationale: Although אֶרֶץ commonly means 'earth/land,' in architectural context
    within the temple vision it refers to the lower surface of the room; 'floor' gives
    the plain sense in idiomatic English.
- source_word: עַד מֵעַל הַפֶּתַח
  chosen: to above the entrance
  alternatives:
  - up to above the doorway
  - as far as above the door
  lexicon: HALOT
  rationale: The phrase marks the vertical extent of the decorative work. 'Entrance'
    is smoother modern English than 'doorway' here, while preserving the architectural
    reference.
- source_word: הַכְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional biblical term for these composite
    throne-guardian beings and fits temple imagery better than the more colloquial
    ''cherubs''.'
- source_word: וְהַתִּמֹרִים
  chosen: and palm trees
  alternatives:
  - and palm motifs
  - and palm figures
  lexicon: HALOT
  rationale: The noun denotes palm-tree forms in the carved decoration. 'Palm trees'
    is the most direct rendering; the decorative sense is supplied by the context
    and verb.
- source_word: עֲשׂוּיִם
  chosen: were made
  alternatives:
  - were fashioned
  - were carved
  lexicon: HALOT
  rationale: The passive participle indicates that these features were made/executed.
    'Were made' is broad and faithful; 'were carved' is possible but slightly more
    specific than the Hebrew itself states in this clause.
- source_word: וְקִיר הַהֵיכָל
  chosen: and on the wall of the nave
  alternatives:
  - and the wall of the temple
  - also the wall of the nave
  lexicon: HALOT
  rationale: הֵיכָל here refers to the main hall/temple nave rather than the entire
    temple complex. Rendering with supplied 'on' makes good English from the verbless
    final phrase and reflects that the decorations were on that wall as well.
