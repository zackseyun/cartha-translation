theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relationship between 'altar' and 'table' in the verse
  chosen_reading: Preserve both terms in the main text
  alternative_readings:
  - Harmonize both as 'altar'
  - Harmonize both as 'table'
  - Render as 'altar-table' throughout
  rationale: The Hebrew intentionally uses both מִזְבֵּחַ and שֻׁלְחָן. Preserving the tension is preferable to resolving it, since the object appears to function as an altar-like table before the LORD.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
