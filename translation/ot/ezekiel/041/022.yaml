id: EZK.41.22
reference: Ezekiel 41:22
source:
  edition: WLC
  text: הַ/מִּזְבֵּ֡חַ עֵ֣ץ שָׁלוֹשׁ֩ אַמּ֨וֹת גָּבֹ֜הַּ וְ/אָרְכּ֣/וֹ שְׁתַּֽיִם
    אַמּ֗וֹת וּ/מִקְצֹֽעוֹתָי/ו֙ ל֔/וֹ וְ/אָרְכּ֥/וֹ וְ/קִֽירֹתָ֖י/ו עֵ֑ץ וַ/יְדַבֵּ֣ר
    אֵלַ֔/י זֶ֚ה הַ/שֻּׁלְחָ֔ן אֲשֶׁ֖ר לִ/פְנֵ֥י יְהוָֽה־׃
translation:
  text: The altar was of wood, three cubits high and two cubits long; its corners,
    its length, and its sides were of wood. And he said to me, “This is the table
    that is before the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew begins with “the altar” but then identifies it as “the table,” likely
      reflecting the furnishing’s altar-like and table-like function.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  alternatives:
  - the altar-table
  lexicon: HALOT
  rationale: The noun normally means 'altar.' Although the following identification
    as 'the table' creates overlap in function, the source text explicitly begins
    with 'the altar,' so the main text preserves that term rather than harmonizing
    it away.
- source_word: עֵץ
  chosen: of wood
  alternatives:
  - wooden
  lexicon: HALOT
  rationale: 'Predicative/material use: the object is made of wood. ''Of wood'' is
    slightly more formal and fits the descriptive sequence.'
- source_word: שָׁלוֹשׁ אַמּוֹת גָּבֹהַּ
  chosen: three cubits high
  alternatives:
  - three cubits in height
  lexicon: HALOT
  rationale: Standard dimensional rendering in clear modern English.
- source_word: וְאָרְכּוֹ שְׁתַּיִם אַמּוֹת
  chosen: and two cubits long
  alternatives:
  - and its length was two cubits
  lexicon: HALOT
  rationale: Smooth English rendering of the measurement while preserving the explicit
    dimension.
- source_word: וּמִקְצֹעוֹתָיו לוֹ
  chosen: its corners
  alternatives:
  - its corner-posts
  - it had corners
  lexicon: HALOT
  rationale: מִקְצֹעוֹת commonly refers to corners or corner-parts. The attached לוֹ
    is awkward in English and likely functions idiomatically ('belonging to it' /
    'it had'); this is absorbed rather than translated woodenly.
- source_word: וְקִירֹתָיו
  chosen: its sides
  alternatives:
  - its walls
  lexicon: HALOT
  rationale: Although the noun often means 'walls,' for a small wooden altar/table
    'sides' is more idiomatic in English while still reflecting the structural surfaces
    of the object.
- source_word: וַיְדַבֵּר אֵלַי
  chosen: And he said to me
  alternatives:
  - And he spoke to me
  lexicon: HALOT
  rationale: Common narrative formula. 'Said' is natural English in direct-speech
    introduction.
- source_word: זֶה הַשֻּׁלְחָן
  chosen: This is the table
  alternatives:
  - This is the altar-table
  lexicon: HALOT
  rationale: The text itself shifts from 'altar' to 'table.' The translation preserves
    both terms rather than collapsing them, allowing the reader to see the conceptual
    overlap in this temple furnishing.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal/spatial expression. Per doctrine, יְהוָה is rendered
    'the LORD.'
