theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, in continuity
    with Jewish reverence practice and longstanding English Bible convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Relationship between 'altar' and 'table' in the verse
  chosen_reading: Preserve both terms in the main text
  alternative_readings:
  - Harmonize both as 'altar'
  - Harmonize both as 'table'
  - Render as 'altar-table' throughout
  rationale: The Hebrew intentionally uses both מִזְבֵּחַ and שֻׁלְחָן. Preserving
    the tension is preferable to resolving it, since the object appears to function
    as an altar-like table before the LORD.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
