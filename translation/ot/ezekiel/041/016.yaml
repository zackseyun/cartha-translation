id: EZK.41.16
reference: Ezekiel 41:16
source:
  edition: WLC
  text: הַ/סִּפִּ֡ים וְ/הַ/חַלּוֹנִ֣ים הָ֠/אֲטֻמוֹת וְ/הָ/אַתִּיקִ֤ים סָבִיב֙ לִ/שְׁלָשְׁתָּ֔/ם
    נֶ֧גֶד הַ/סַּ֛ף שְׂחִ֥יף עֵ֖ץ סָבִ֣יב סָבִ֑יב וְ/הָ/אָ֨רֶץ֙ עַד הַֽ/חַלֹּנ֔וֹת
    וְ/הַֽ/חַלֹּנ֖וֹת מְכֻסּֽוֹת׀׀־׃
translation:
  text: the thresholds, the recessed windows, and the galleries all around on their
    three sides, opposite the threshold, were paneled with wood all around, from the
    floor up to the windows; and the windows were covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'closed windows,' 'shuttered windows,' or 'latticed windows'; the Hebrew
      likely describes a fixed architectural type rather than merely windows that
      were shut at the moment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'galleries' is rare and may refer to ledges, colonnades,
      or upper walkways.
    reason: lexical_alternative
  - marker: c
    text: Or 'a wood facing' / 'wooden sheathing'; the Hebrew expression is rare and
      refers to wooden covering or paneling.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּפִּים / הַסַּף
  chosen: the thresholds / the threshold
  alternatives:
  - doorposts
  - sills
  lexicon: HALOT
  rationale: סַף can denote threshold, sill, or door-related structural element. In
    this temple-architecture context, 'threshold' best fits the repeated architectural
    reference and reads naturally in English while preserving the concrete building
    feature.
- source_word: הַחַלּוֹנִים הָאֲטֻמוֹת
  chosen: the recessed windows
  alternatives:
  - the closed windows
  - the shuttered windows
  - the latticed windows
  lexicon: HALOT
  rationale: The participle אֲטֻמוֹת literally suggests 'closed/shut.' In Ezekiel's
    temple description, the phrase likely refers to fixed, narrowed, or recessed windows
    rather than simply windows currently shut. 'Recessed windows' captures the architectural
    sense in idiomatic English, while alternatives are preserved in a footnote because
    the exact construction is debated.
- source_word: הָאַתִּיקִים
  chosen: the galleries
  alternatives:
  - the ledges
  - the colonnades
  - the upper walkways
  lexicon: HALOT
  rationale: אַתִּיקִים is a rare architectural term in Ezekiel. 'Galleries' is a
    common contextual rendering in temple descriptions and fits the surrounding structural
    inventory, though the precise feature is uncertain.
- source_word: סָבִיב לִשְׁלָשְׁתָּם
  chosen: all around on their three sides
  alternatives:
  - round about for the three of them
  - around on all three levels
  lexicon: HALOT
  rationale: The phrase most naturally refers to the three sides associated with the
    structures just named, not necessarily three stories. 'On their three sides' preserves
    the spatial sense without over-interpreting.
- source_word: נֶגֶד הַסַּף
  chosen: opposite the threshold
  alternatives:
  - facing the threshold
  - in front of the threshold
  lexicon: HALOT
  rationale: נֶגֶד commonly means 'in front of' or 'opposite.' 'Opposite the threshold'
    is a clear architectural relation in English.
- source_word: שְׂחִיף עֵץ
  chosen: were paneled with wood
  alternatives:
  - a wood facing
  - wooden sheathing
  - wood overlay
  lexicon: HALOT
  rationale: שְׂחִיף is a rare term, likely denoting a covering, paneling, or facing.
    Rendering the phrase verbally as 'were paneled with wood' makes good English and
    reflects the probable sense of wooden cladding.
- source_word: וְהָאָרֶץ
  chosen: from the floor
  alternatives:
  - and the ground
  - and the lower part
  lexicon: HALOT
  rationale: Although אֶרֶץ usually means 'earth/land,' in this interior architectural
    context it likely refers to the lower surface, i.e., the floor or ground level.
    'From the floor' best fits the construction 'up to the windows.'
- source_word: עַד הַחַלּוֹנוֹת
  chosen: up to the windows
  alternatives:
  - as far as the windows
  lexicon: HALOT
  rationale: A straightforward spatial limit marking the extent of the wooden paneling.
- source_word: וְהַחַלּוֹנוֹת מְכֻסּוֹת
  chosen: and the windows were covered
  alternatives:
  - and the windows were screened
  - and the windows were concealed
  lexicon: HALOT
  rationale: מְכֻסּוֹת means 'covered.' Because the nature of the covering is unspecified,
    the simple rendering should be retained in the main text.
