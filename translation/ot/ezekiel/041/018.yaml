theological_decisions:
- issue: Nature of the cherub imagery in temple decoration
  chosen_reading: Render as literal decorative cherubim and palm-tree motifs without
    allegorical expansion.
  alternative_readings:
  - Symbolic or typological interpretations of the imagery
  rationale: The verse is descriptive of temple ornamentation. The translation should
    not import theological symbolism beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
