id: EZK.41.18
reference: Ezekiel 41:18
source:
  edition: WLC
  text: וְ/עָשׂ֥וּי כְּרוּבִ֖ים וְ/תִֽמֹרִ֑ים וְ/תִֽמֹרָה֙ בֵּין כְּר֣וּב לִ/כְר֔וּב
    וּ/שְׁנַ֥יִם פָּנִ֖ים לַ/כְּרֽוּב־׃
translation:
  text: Cherubim and palm trees were made on it, with a palm tree between cherub and
    cherub; and each cherub had two faces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were carved'; the Hebrew says literally 'made,' and in this architectural
      context it likely refers to worked or carved decoration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשׂוּי
  chosen: were made on it
  alternatives:
  - was made
  - was carved
  - was fashioned
  lexicon: HALOT
  rationale: Passive participial form from עשה indicates something made/worked. In
    this temple-decoration context, English idiom prefers a plural sense with the
    following plural items ('cherubim and palm trees were made'), and 'on it' is supplied
    from context to reflect the surface being described in the surrounding verses.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: Standard transliteration for the plural of כְּרוּב. 'Cherubim' preserves
    the architectural/visionary register better than the more colloquial 'cherubs'.
- source_word: וְתִמֹרִים
  chosen: and palm trees
  alternatives:
  - and palms
  - and palm-tree figures
  lexicon: HALOT
  rationale: תמרים here refers to palm-tree motifs in the temple ornamentation. 'Palm
    trees' is clear modern English and fits the decorative context.
- source_word: וְתִמֹרָה
  chosen: a palm tree
  alternatives:
  - a palm
  - a palm-tree figure
  lexicon: HALOT
  rationale: 'Singular form used distributively in the next clause: one palm tree
    between each cherub and cherub.'
- source_word: בֵּין כְּרוּב לִכְרוּב
  chosen: between cherub and cherub
  alternatives:
  - between one cherub and another
  - between each pair of cherubim
  lexicon: HALOT
  rationale: The Hebrew construction is singular distributive. Retaining 'cherub and
    cherub' keeps the repetitive pattern of the source while remaining understandable
    in English.
- source_word: וּשְׁנַיִם פָּנִים לַכְּרוּב
  chosen: each cherub had two faces
  alternatives:
  - and the cherub had two faces
  - with two faces for each cherub
  lexicon: HALOT
  rationale: Literally, 'and two faces to the cherub.' English requires smoothing.
    The sense is that every cherub figure was represented with two faces, as clarified
    by the following verse.
