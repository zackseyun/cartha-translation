id: EZK.41.8
reference: Ezekiel 41:8
source:
  edition: WLC
  text: וְ/רָאִ֧יתִי לַ/בַּ֛יִת גֹּ֖בַהּ סָבִ֣יב סָבִ֑יב מיסדות הַ/צְּלָעוֹת֙ מְל֣וֹ
    הַ/קָּנֶ֔ה שֵׁ֥שׁ אַמּ֖וֹת אַצִּֽילָה׀׃
translation:
  text: And I saw that the house had a raised platform all around; the foundations
    of the side chambers were a full reed of six cubits to the offset.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the joining place,' 'to the ledge,' or possibly 'at the base.' The
      Hebrew term here is architecturally obscure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  chosen: And I saw
  alternatives:
  - Then I saw
  - And I looked
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה, straightforward narrative first-person observation.
    'And I saw' preserves the prophet's report without adding interpretive nuance.
- source_word: לַבַּיִת
  chosen: the house
  alternatives:
  - the temple building
  lexicon: HALOT
  rationale: בַּיִת here refers to the temple structure in context. 'House' is the
    direct lexical equivalent and preserves Ezekiel's temple terminology; 'temple
    building' is interpretive and less concise.
- source_word: גֹּבַהּ
  chosen: had a raised platform
  alternatives:
  - height
  - elevation
  lexicon: HALOT
  rationale: Literally 'height/elevation.' In this architectural context, with the
    following description of foundations around the structure, the sense is not abstract
    height alone but an elevated base or raised structure. Rendering as 'raised platform'
    communicates the architectural feature in readable English while staying close
    to the contextual sense.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled adverb intensifies the encircling sense. 'All around' is
    natural modern English and adequately reflects the repetition.
- source_word: מיסדות
  chosen: the foundations
  alternatives:
  - the foundation supports
  - the substructure
  lexicon: HALOT
  rationale: Plural of יסוד/מסד-type noun, denoting foundations or foundation structures.
    'Foundations' is the most transparent rendering.
- source_word: הַצְּלָעוֹת
  chosen: the side chambers
  alternatives:
  - the side rooms
  - the ribs/sides
  lexicon: HALOT
  rationale: In temple architecture צלע commonly denotes side structures/chambers
    attached to the main building. 'Side chambers' is the established architectural
    sense here.
- source_word: מְלֹא הַקָּנֶה
  chosen: a full reed
  alternatives:
  - the full measure of a reed
  - one full reed
  lexicon: HALOT
  rationale: מְלֹא conveys fullness/full measure; paired with קָנֶה it indicates the
    complete measuring reed. 'A full reed' is concise and idiomatic enough, with the
    exact measure clarified by the following apposition 'of six cubits.'
- source_word: שֵׁשׁ אַמּוֹת
  chosen: of six cubits
  alternatives:
  - six cubits
  lexicon: HALOT
  rationale: Appositional specification of the reed's length. 'Of six cubits' links
    naturally to 'a full reed.'
- source_word: אַצִּילָה
  chosen: to the offset
  alternatives:
  - to the joining place
  - to the ledge
  - at the base
  lexicon: HALOT
  rationale: This is a difficult architectural term with uncertain precise referent.
    Many take it as indicating an offset, ledge, or joining/projection associated
    with the foundation level. 'Offset' best fits the architectural context without
    overcommitting to a more specific reconstruction. Because the term is uncertain,
    alternatives are preserved in a footnote.
