id: EZK.41.14
reference: Ezekiel 41:14
source:
  edition: WLC
  text: וְ/רֹחַב֩ פְּנֵ֨י הַ/בַּ֧יִת וְ/הַ/גִּזְרָ֛ה לַ/קָּדִ֖ים מֵאָ֥ה אַמָּֽה׃
translation:
  text: And the width of the front of the temple and of the separate area on the east
    side was a hundred cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "breadth" instead of "width."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "the house"; in this temple-vision context, this refers to the temple
      building.
    reason: lexical_alternative
  - marker: c
    text: Or "to the east" or "eastward."
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: The noun denotes a horizontal measurement. 'Width' is the most natural
    modern English rendering in an architectural measurement context; 'breadth' is
    possible but less idiomatic here.
- source_word: פְּנֵי
  chosen: front of
  alternatives:
  - face of
  - surface of
  lexicon: HALOT
  rationale: Literally 'face(s) of,' but in spatial/architectural usage it refers
    to the front aspect. 'Front of' communicates the intended orientation clearly
    in English.
- source_word: הַבַּיִת
  chosen: the temple
  alternatives:
  - the house
  - the building
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, 'the house' commonly refers to the temple
    structure. Rendering it as 'the temple' makes the referent clear for modern readers
    without over-paraphrasing.
- source_word: הַגִּזְרָה
  chosen: the separate area
  alternatives:
  - the separate place
  - the restricted area
  lexicon: HALOT
  rationale: This term in Ezekiel's temple description refers to the distinct area
    set apart adjacent to the temple complex. 'Separate area' is a standard, clear
    rendering in this architectural context.
- source_word: לַקָּדִים
  chosen: on the east side
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The phrase marks eastern orientation. 'On the east side' fits the measurement
    context better than the more adverbial 'eastward.'
- source_word: מֵאָה אַמָּה
  chosen: a hundred cubits
  alternatives:
  - one hundred cubits
  lexicon: HALOT
  rationale: This is the straightforward measurement expression. 'A hundred cubits'
    is idiomatic and preserves the ancient unit rather than converting it.
