id: EZK.41.17
reference: Ezekiel 41:17
source:
  edition: WLC
  text: עַל מֵ/עַ֣ל הַ/פֶּ֡תַח וְ/עַד הַ/בַּיִת֩ הַ/פְּנִימִ֨י וְ/לַ/ח֜וּץ וְ/אֶל
    כָּל הַ/קִּ֨יר סָבִ֧יב סָבִ֛יב בַּ/פְּנִימִ֥י וּ/בַ/חִיצ֖וֹן מִדּֽוֹת־־־־׀׃
translation:
  text: above the doorway, and as far as the inner house, and outside, and on all
    the wall all around, in the inner part and in the outer part, were measurements.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dimensions.' The Hebrew noun can denote measurements or dimensional
      specifications in an architectural context.
    reason: lexical_alternative
  - marker: b
    text: '''Inner house'' may also be rendered ''inner temple,'' since ''house''
      in Ezekiel''s temple vision often refers to the temple structure.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַל הַפֶּתַח
  chosen: above the doorway
  alternatives:
  - from above the doorway
  - over the entrance
  lexicon: HALOT
  rationale: The compound preposition מֵעַל with פֶּתַח indicates the area above the
    entrance/opening. 'Doorway' is more natural in English than repeating 'opening'
    here, while preserving the architectural sense.
- source_word: וְעַד הַבַּיִת הַפְּנִימִי
  chosen: and as far as the inner house
  alternatives:
  - and up to the inner temple
  - and to the inner room
  lexicon: HALOT
  rationale: בַּיִת in temple-vision contexts often refers to the temple structure/house.
    'Inner house' keeps the Hebrew imagery and avoids over-specifying beyond the text,
    though 'inner temple' is a plausible contextual alternative.
- source_word: וְלַחוּץ
  chosen: and outside
  alternatives:
  - and outward
  - and on the outside
  lexicon: HALOT
  rationale: The term marks the exterior area in contrast with the inner part. 'Outside'
    is concise and idiomatic.
- source_word: וְאֶל כָּל הַקִּיר סָבִיב סָבִיב
  chosen: and on all the wall all around
  alternatives:
  - and toward every wall all around
  - and on the entire wall round about
  lexicon: HALOT
  rationale: אֶל can mark direction or relation; in this architectural description,
    English 'on' best fits the sense of features/measurements applying to the wall
    surface. The repeated סָבִיב is retained with 'all around' to preserve the emphatic
    encircling sense.
- source_word: בַּפְּנִימִי וּבַחִיצוֹן
  chosen: in the inner part and in the outer part
  alternatives:
  - inside and outside
  - on the interior and on the exterior
  lexicon: HALOT
  rationale: The paired adjectives function substantivally, distinguishing interior
    and exterior zones. 'Inner part' / 'outer part' preserves the formal distinction
    without forcing a more technical architectural term.
- source_word: מִדּוֹת
  chosen: were measurements
  alternatives:
  - were measured areas
  - were dimensions
  - was measurement
  lexicon: HALOT
  rationale: The plural noun means 'measurements' or 'dimensions.' Because the Hebrew
    here is elliptical, English supplies 'were' to make a complete sentence. 'Measurements'
    is broad enough to fit the context of marked/measured architectural surfaces.
