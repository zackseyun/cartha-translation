theological_decisions:
- issue: Rendering of the sanctuary term קֹדֶשׁ הַקֳּדָשִׁים
  chosen_reading: the Most Holy Place
  alternative_readings:
  - the Holy of Holies
  rationale: This is not a doctrinally disputed term in the excerpt, but it is theologically
    weighty and traditionally rendered 'Holy of Holies.' The chosen rendering communicates
    the meaning in accessible modern English while preserving the traditional expression
    in a footnote for recognizability and intertextual continuity.
  doctrine_reference: Translation philosophy §6; §5
