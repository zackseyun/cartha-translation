id: EZK.41.4
reference: Ezekiel 41:4
source:
  edition: WLC
  text: וַ/יָּ֨מָד אֶת אָרְכּ֜/וֹ עֶשְׂרִ֣ים אַמָּ֗ה וְ/רֹ֛חַב עֶשְׂרִ֥ים אַמָּ֖ה
    אֶל פְּנֵ֣י הַֽ/הֵיכָ֑ל וַ/יֹּ֣אמֶר אֵלַ֔/י זֶ֖ה קֹ֥דֶשׁ הַ/קֳּדָשִֽׁים־־׃
translation:
  text: 'Then he measured its length: twenty cubits, and the width: twenty cubits,
    in front of the nave; and he said to me, “This is the Most Holy Place.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “the Holy of Holies.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  lexicon: HALOT
  rationale: Wayyiqtol of מדד narrates the next action in sequence. 'Then' gives natural
    English narrative flow while preserving the consecutive sense.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - the length of it
  - his length
  lexicon: HALOT
  rationale: The 3ms suffix refers to the inner room being measured. English idiom
    prefers 'its length.'
- source_word: עֶשְׂרִים אַמָּה
  chosen: twenty cubits
  alternatives:
  - twenty cubit(s)
  lexicon: HALOT
  rationale: אַמָּה is the standard linear measure 'cubit.' Retaining the ancient
    unit is more transparent than converting it.
- source_word: וְרֹחַב
  chosen: and the width
  alternatives:
  - and its width
  - and breadth
  lexicon: HALOT
  rationale: רֹחַב denotes width/breadth. 'Width' is the clearest modern English equivalent.
    The possessive is implicit from context and need not be repeated.
- source_word: אֶל־פְּנֵי הַהֵיכָל
  chosen: in front of the nave
  alternatives:
  - before the temple hall
  - facing the temple
  - toward the nave
  lexicon: HALOT
  rationale: פְּנֵי with אֶל here marks spatial relation, indicating the measured
    room lies before or in front of the הֵיכָל. In this temple-vision context, הֵיכָל
    refers specifically to the main sanctuary room, not the whole temple complex;
    'nave' best distinguishes it from the inner sanctuary.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: and he said to me
  alternatives:
  - then he said to me
  lexicon: HALOT
  rationale: Standard narrative formula; rendered straightforwardly.
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: English requires the copula for a natural predication.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  chosen: the Most Holy Place
  alternatives:
  - the Holy of Holies
  - the holiest place
  lexicon: HALOT
  rationale: The Hebrew superlative construction literally means 'holy of holies'
    and denotes the innermost sanctuary. 'Most Holy Place' is clear modern English;
    the traditional form is preserved in a footnote.
