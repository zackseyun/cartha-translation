id: EZK.41.2
reference: Ezekiel 41:2
source:
  edition: WLC
  text: וְ/רֹ֣חַב הַ/פֶּתַח֮ עֶ֣שֶׂר אַמּוֹת֒ וְ/כִתְפ֣וֹת הַ/פֶּ֔תַח חָמֵ֤שׁ אַמּוֹת֙
    מִ/פּ֔וֹ וְ/חָמֵ֥שׁ אַמּ֖וֹת מִ/פּ֑וֹ וַ/יָּ֤מָד אָרְכּ/וֹ֙ אַרְבָּעִ֣ים אַמָּ֔ה
    וְ/רֹ֖חַב עֶשְׂרִ֥ים אַמָּֽה׃
translation:
  text: 'And the width of the entrance was ten cubits, and the sidewalls of the entrance
    were five cubits on this side and five cubits on that side. Then he measured its
    length: forty cubits, and the width: twenty cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'shoulders of the entrance'; that is, the side sections flanking
      the entrance.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹחַב
  chosen: width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: Standard architectural term here; 'width' is the most natural modern
    English rendering in a measurement context.
- source_word: הַפֶּתַח
  chosen: the entrance
  alternatives:
  - the opening
  - the doorway
  lexicon: HALOT
  rationale: Refers to the architectural opening being measured. 'Entrance' reads
    naturally in context and avoids implying only the door itself rather than the
    opening.
- source_word: עֶשֶׂר אַמּוֹת
  chosen: ten cubits
  alternatives:
  - ten cubits wide
  lexicon: HALOT
  rationale: Retains the source unit and keeps the measurement formally close to the
    Hebrew.
- source_word: כִתְפוֹת
  chosen: sidewalls
  alternatives:
  - shoulders
  - side jambs
  - side projections
  lexicon: HALOT
  rationale: Literally 'shoulders,' but in architectural context it denotes the side
    sections flanking the entrance. 'Sidewalls' communicates the function clearly
    in modern English without overtechnical jargon.
- source_word: מִפּוֹ ... מִפּוֹ
  chosen: on this side ... on that side
  alternatives:
  - here ... there
  - on one side ... on the other side
  lexicon: HALOT
  rationale: Idiomatic rendering of the distributive spatial expression, preserving
    the bilateral layout of the entrance.
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - and he measured
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he measured' gives
    natural English sequence while preserving the action.
- source_word: אָרְכּוֹ
  chosen: its length
  alternatives:
  - the length of it
  lexicon: HALOT
  rationale: The pronominal suffix refers to the structure/room under discussion.
    'Its length' is concise and natural.
- source_word: אַרְבָּעִים אַמָּה
  chosen: forty cubits
  lexicon: HALOT
  rationale: Direct rendering of the measurement.
- source_word: וְרֹחַב עֶשְׂרִים אַמָּה
  chosen: 'and the width: twenty cubits'
  alternatives:
  - and a width of twenty cubits
  - and its width was twenty cubits
  lexicon: HALOT
  rationale: The Hebrew is elliptical in measurement style. The colon-like punctuation
    in English reflects the concise measuring formula while remaining readable.
