id: EZK.41.12
reference: Ezekiel 41:12
source:
  edition: WLC
  text: וְ/הַ/בִּנְיָ֡ן אֲשֶׁר֩ אֶל פְּנֵ֨י הַ/גִּזְרָ֜ה פְּאַ֣ת דֶּֽרֶךְ הַ/יָּ֗ם
    רֹ֚חַב שִׁבְעִ֣ים אַמָּ֔ה וְ/קִ֧יר הַ/בִּנְיָ֛ן חָֽמֵשׁ אַמּ֥וֹת רֹ֖חַב סָבִ֣יב
    סָבִ֑יב וְ/אָרְכּ֖/וֹ תִּשְׁעִ֥ים אַמָּֽה־־־׀׃
translation:
  text: And the building that faced the separate area on the side toward the west
    was seventy cubits wide, and the wall of the building was five cubits wide all
    around, and its length was ninety cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'on the side of the way of the sea'; that is, on the west side.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּנְיָן
  chosen: the building
  alternatives:
  - the structure
  lexicon: HALOT
  rationale: בִּנְיָן denotes a constructed building/edifice. 'Building' is the most
    natural and sufficiently formal rendering in this architectural description.
- source_word: אֲשֶׁר אֶל־פְּנֵי הַגִּזְרָה
  chosen: that faced the separate area
  alternatives:
  - that was in front of the separate area
  - that was opposite the separate area
  lexicon: HALOT
  rationale: אֶל־פְּנֵי commonly expresses spatial orientation 'in front of/opposite/facing.'
    In context, 'faced' gives clear modern English while preserving the directional
    relation. הַגִּזְרָה in Ezekiel's temple vision refers to the designated/separate
    area behind the temple complex; 'separate area' is the standard transparent rendering.
- source_word: פְּאַת דֶּרֶךְ הַיָּם
  chosen: on the side toward the west
  alternatives:
  - at the western side
  - on the side in the direction of the sea
  lexicon: HALOT
  rationale: פְּאַת is 'side/edge/corner,' and דֶּרֶךְ הַיָּם literally 'way of the
    sea.' In geographical orientation in the land of Israel, 'the sea' refers to the
    Mediterranean and thus the west. Rendering 'toward the west' communicates the
    idiom's sense rather than preserving a potentially opaque literalism.
- source_word: רֹחַב שִׁבְעִים אַמָּה
  chosen: was seventy cubits wide
  alternatives:
  - had a width of seventy cubits
  lexicon: HALOT
  rationale: רֹחַב denotes width/breadth. Predicate-style English ('was seventy cubits
    wide') is idiomatic and accurately reflects the measurement statement.
- source_word: קִיר הַבִּנְיָן
  chosen: the wall of the building
  alternatives:
  - the building's wall
  lexicon: HALOT
  rationale: Construct chain straightforwardly indicates the wall belonging to the
    building.
- source_word: חָמֵשׁ אַמּוֹת רֹחַב
  chosen: was five cubits wide
  alternatives:
  - had a width of five cubits
  lexicon: HALOT
  rationale: Again, רֹחַב is rendered as a width measurement in natural English.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled adverb intensifies the encircling sense. 'All around' captures
    the repetition's force in contemporary English without awkwardness.
- source_word: וְאָרְכּוֹ תִּשְׁעִים אַמָּה
  chosen: and its length was ninety cubits
  alternatives:
  - and it was ninety cubits long
  lexicon: HALOT
  rationale: אָרֶךְ means length. The explicit noun 'length' matches the architectural
    style of the passage and pairs well with the preceding width measurements.
