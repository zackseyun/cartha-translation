id: EZK.41.13
reference: Ezekiel 41:13
source:
  edition: WLC
  text: וּ/מָדַ֣ד אֶת הַ/בַּ֔יִת אֹ֖רֶךְ מֵאָ֣ה אַמָּ֑ה וְ/הַ/גִּזְרָ֤ה וְ/הַ/בִּנְיָה֙
    וְ/קִ֣ירוֹתֶ֔י/הָ אֹ֖רֶךְ מֵאָ֥ה אַמָּֽה־׃
translation:
  text: 'Then he measured the temple: its length was a hundred cubits; and the separate
    area, the building, and its walls also had a length of a hundred cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the separate place.' The Hebrew term refers to a distinct area set apart
      in the temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָדַד
  chosen: Then he measured
  alternatives:
  - And he measured
  - He measured
  lexicon: HALOT
  rationale: The waw-consecutive with qatal advances the narrative. 'Then he measured'
    gives natural English sequence while preserving the action.
- source_word: הַבַּיִת
  chosen: the temple
  alternatives:
  - the house
  - the building
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, בַּיִת commonly refers to the temple structure
    rather than a generic house. 'Temple' best communicates the referent in context.
- source_word: אֹרֶךְ מֵאָה אַמָּה
  chosen: its length was a hundred cubits
  alternatives:
  - a length of a hundred cubits
  - one hundred cubits long
  lexicon: HALOT
  rationale: This renders the measurement idiom clearly in English while retaining
    the ancient unit 'cubits' rather than converting it.
- source_word: הַגִּזְרָה
  chosen: the separate area
  alternatives:
  - the separate place
  - the courtyard area
  lexicon: HALOT
  rationale: In Ezekiel 41 this term denotes the distinct area set apart behind/west
    of the temple building. 'Separate area' is a standard, contextually precise rendering
    without over-specifying.
- source_word: הַבִּנְיָה
  chosen: the building
  alternatives:
  - the structure
  - the edifice
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for a constructed structure.
    'Building' is clear modern English and fits the architectural context.
- source_word: קִירוֹתֶיהָ
  chosen: its walls
  alternatives:
  - its wall-surfaces
  - its enclosing walls
  lexicon: HALOT
  rationale: The plural with 3fs suffix refers back to the preceding feminine complex/area.
    'Its walls' is the natural English equivalent.
- source_word: אֹרֶךְ מֵאָה אַמָּה
  chosen: also had a length of a hundred cubits
  alternatives:
  - was a hundred cubits long
  - had a length of one hundred cubits
  lexicon: HALOT
  rationale: The second measurement clause is rendered smoothly by supplying 'also
    had' to connect the coordinated subjects with the repeated predicate in idiomatic
    English.
