id: EZK.41.24
reference: Ezekiel 41:24
source:
  edition: WLC
  text: וּ/שְׁתַּ֥יִם דְּלָת֖וֹת לַ/דְּלָת֑וֹת שְׁ֚תַּיִם מוּסַבּ֣וֹת דְּלָת֔וֹת שְׁ֚תַּיִם
    לְ/דֶ֣לֶת אֶחָ֔ת וּ/שְׁתֵּ֥י דְלָת֖וֹת לָ/אַחֶֽרֶת׃
translation:
  text: 'And the doors had two leaves each, two turning leaves: two leaves for the
    one door and two leaves for the other.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'two pivoting leaves' or 'two folding leaves.' The Hebrew term describes
      leaves that turn, without specifying the exact mechanism.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּלָתוֹת / דֶּלֶת
  chosen: doors / door / leaves
  alternatives:
  - panels
  - door-leaves
  - folding sections
  lexicon: HALOT
  rationale: The noun דלת can refer to a door or a door-leaf/panel depending on context.
    Because the verse distinguishes the larger set of 'doors' from the component parts
    counted in pairs, the translation uses 'doors' for the overall structures and
    'leaves' for the individual movable sections.
- source_word: מוּסַבּוֹת
  chosen: turning
  alternatives:
  - pivoting
  - folding
  - swinging
  lexicon: HALOT
  rationale: מוּסַבּוֹת describes the leaves as able to turn. 'Turning' is broad enough
    to preserve the architectural sense without over-specifying the mechanism. 'Folding'
    is possible in context, but the Hebrew more directly indicates turning/pivoting.
- source_word: שְׁתַּיִם ... שְׁתַּיִם ... שְׁתַּיִם ... וּשְׁתֵּי
  chosen: two ... two ... two ... two
  lexicon: HALOT
  rationale: The repeated numerals are retained explicitly to mirror the measured,
    architectural style of the Hebrew and to preserve the verse's emphasis on paired
    construction.
- source_word: לַדְּלָתוֹת
  chosen: the doors had
  alternatives:
  - for the doors
  - belonging to the doors
  lexicon: HALOT
  rationale: The prefixed ל here is rendered idiomatically in English as possession
    or specification ('the doors had'), since a literal 'for the doors' would be awkward
    and less clear in the architectural description.
- source_word: לְדֶלֶת אֶחָת ... לָאַחֶרֶת
  chosen: for the one door ... for the other
  alternatives:
  - for one leaf ... for the other
  - for one side ... for the other
  lexicon: HALOT
  rationale: 'The singular דלת with ''one'' and then ''the other'' most naturally
    refers to each of the two doors already mentioned. This preserves the distributive
    sense: each door had two leaves.'
