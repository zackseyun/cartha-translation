id: EZK.41.25
reference: Ezekiel 41:25
source:
  edition: WLC
  text: וַ/עֲשׂוּיָ֨ה אֲלֵי/הֶ֜ן אֶל דַּלְת֤וֹת הַֽ/הֵיכָל֙ כְּרוּבִ֣ים וְ/תִֽמֹרִ֔ים
    כַּ/אֲשֶׁ֥ר עֲשׂוּיִ֖ם לַ/קִּיר֑וֹת וְ/עָ֥ב עֵ֛ץ אֶל פְּנֵ֥י הָ/אוּלָ֖ם מֵ/הַ/חֽוּץ־־׃
translation:
  text: And cherubim and palm trees were made on them, on the doors of the nave, just
    as they were made on the walls; and there was a wooden canopy on the front of
    the vestibule outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were carved on them' for the passive verb 'were made,' since the context
      is decorative temple work.
    reason: lexical_alternative
  - marker: b
    text: Or 'the doors of the temple hall' or 'the sanctuary.' The Hebrew הֵיכָל
      here refers to the main hall of the temple building.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'wooden canopy' is uncertain; it may refer to a
      wooden projection, overhang, or similar architectural feature at the front of
      the vestibule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשׂוּיָה אֲלֵיהֶן
  chosen: were made on them
  alternatives:
  - were carved on them
  - were fashioned on them
  lexicon: HALOT
  rationale: Passive participial form from עשה with feminine reference to the doors;
    'were made on them' preserves the Hebrew's broad verb while allowing the context
    of decorative work. 'Carved' is plausible but slightly more specific than the
    verb itself states.
- source_word: דַּלְתוֹת הַהֵיכָל
  chosen: the doors of the nave
  alternatives:
  - the doors of the temple hall
  - the doors of the sanctuary
  lexicon: HALOT
  rationale: הֵיכָל here refers to the main hall/temple nave rather than the whole
    temple complex. 'Nave' is concise and architectural, fitting the temple-room context
    in Ezekiel 40–41.
- source_word: כְּרוּבִים
  chosen: cherubim
  alternatives:
  - cherubs
  lexicon: HALOT
  rationale: '''Cherubim'' preserves the conventional transliterated plural for the
    heavenly composite beings in temple imagery.'
- source_word: וְתִמֹרִים
  chosen: and palm trees
  alternatives:
  - and palm designs
  - and palm motifs
  lexicon: HALOT
  rationale: The noun denotes palm-tree figures in decorative context. 'Palm trees'
    is the most direct rendering; the architectural/decorative sense is clear from
    context.
- source_word: כַּאֲשֶׁר עֲשׂוּיִם לַקִּירוֹת
  chosen: just as they were made on the walls
  alternatives:
  - like those made on the walls
  - as was done on the walls
  lexicon: HALOT
  rationale: This comparative clause links the door decorations to the same decorative
    scheme already present on the walls. 'Just as' preserves the explicit comparison.
- source_word: וְעָב עֵץ
  chosen: a wooden canopy
  alternatives:
  - a wooden threshold
  - a wooden beamwork
  - a wooden awning
  lexicon: HALOT
  rationale: עָב is a difficult architectural term. In this context at the front of
    the vestibule, it likely denotes a projecting wooden structure. 'Canopy' best
    captures a wooden overhang/projection without overcommitting to a more technical
    identification.
- source_word: אֶל פְּנֵי הָאוּלָם
  chosen: on the front of the vestibule
  alternatives:
  - before the vestibule
  - at the face of the portico
  lexicon: HALOT
  rationale: פְּנֵי in architectural description commonly means the front face/surface.
    אוּלָם is the vestibule/portico area before the main hall. 'On the front of the
    vestibule' fits the spatial description.
- source_word: מֵהַחוּץ
  chosen: outside
  alternatives:
  - on the outside
  - externally
  lexicon: HALOT
  rationale: The phrase specifies the exterior side of the vestibule front. 'Outside'
    is natural English and preserves the spatial contrast.
