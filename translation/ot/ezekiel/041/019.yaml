theological_decisions:
- issue: Rendering אָדָם in a decorative-vision context
  chosen_reading: human
  alternative_readings:
  - man
  rationale: The term can mean 'man' or 'humankind/human' depending on context. Here
    it describes one of the carved faces paired with a lion, so 'human face' best
    conveys the contrast without importing unnecessary male specificity.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    man / humankind (context)'
