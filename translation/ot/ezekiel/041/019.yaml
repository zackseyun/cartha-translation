id: EZK.41.19
reference: Ezekiel 41:19
source:
  edition: WLC
  text: וּ/פְנֵ֨י אָדָ֤ם אֶל הַ/תִּֽמֹרָה֙ מִ/פּ֔וֹ וּ/פְנֵֽי כְפִ֥יר אֶל הַ/תִּֽמֹרָ֖ה
    מִ/פּ֑וֹ עָשׂ֥וּי אֶל כָּל הַ/בַּ֖יִת סָבִ֥יב סָבִֽיב־־־־־׀׃
translation:
  text: with a human face toward the palm tree on one side, and a young lion’s face
    toward the palm tree on the other side. It was made all around the whole temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the face of a man … the face of a young lion.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פְנֵי אָדָם
  chosen: a human face
  alternatives:
  - the face of a man
  - a man's face
  lexicon: HALOT
  rationale: Construct phrase literally 'face of man.' In this decorative vision context,
    'human face' is natural English and avoids implying a specific male individual,
    while remaining gender-accurate to the representational sense of אָדָם.
- source_word: הַתִּמֹרָה
  chosen: the palm tree
  alternatives:
  - the palm
  - the palm decoration
  lexicon: HALOT
  rationale: Refers to the carved palm-tree motif in the temple paneling described
    in the surrounding verses. 'Palm tree' is the clearest direct rendering.
- source_word: מִפּוֹ
  chosen: on one side / on the other side
  alternatives:
  - from here
  - from this side
  lexicon: HALOT
  rationale: The adverbial expression indicates opposite sides of the palm-tree carving.
    Idiomatic English requires specifying the two sides rather than a wooden 'from
    here' repetition.
- source_word: פְנֵי כְפִיר
  chosen: a young lion’s face
  alternatives:
  - the face of a young lion
  - a lion cub's face
  lexicon: HALOT
  rationale: כְפִיר denotes a young lion. 'Young lion' preserves the lexical nuance
    better than simply 'lion.'
- source_word: עָשׂוּי
  chosen: It was made
  alternatives:
  - it was fashioned
  - it was worked
  lexicon: HALOT
  rationale: Passive participle summarizing the workmanship of the decorative scheme.
    Singular is retained, likely referring collectively to the carved work/paneling
    pattern.
- source_word: אֶל כָּל הַבַּיִת
  chosen: the whole temple
  alternatives:
  - all the house
  - the entire house
  lexicon: HALOT
  rationale: בַּיִת in this temple vision commonly refers to the temple structure/house.
    'Temple' communicates the referent clearly in context.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - on every side
  lexicon: HALOT
  rationale: The doubled form intensifies the idea of surrounding extent. 'All around'
    captures the repetition idiomatically in modern English.
