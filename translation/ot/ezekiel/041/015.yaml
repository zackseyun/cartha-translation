id: EZK.41.15
reference: Ezekiel 41:15
source:
  edition: WLC
  text: וּ/מָדַ֣ד אֹֽרֶךְ הַ֠/בִּנְיָן אֶל פְּנֵ֨י הַ/גִּזְרָ֜ה אֲשֶׁ֨ר עַל אַחֲרֶ֧י/הָ
    ו/אתוקי/הא מִ/פּ֥וֹ וּ/מִ/פּ֖וֹ מֵאָ֣ה אַמָּ֑ה וְ/הַֽ/הֵיכָל֙ הַ/פְּנִימִ֔י וְ/אֻֽלַמֵּ֖י
    הֶ/חָצֵֽר־־־׃
translation:
  text: 'Then he measured the length of the building facing the separate area that
    was behind it, with its galleries on this side and on that side: one hundred cubits;
    and the inner nave and the porches of the court.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its colonnades' or another architectural side-structure; the Hebrew
      term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the inner temple' or 'the inner sanctuary' for 'the inner nave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָדַד
  chosen: Then he measured
  alternatives:
  - And he measured
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative sequence. 'Then he measured' gives natural
    English while preserving the consecutive sense.
- source_word: אֹרֶךְ
  chosen: the length
  lexicon: HALOT
  rationale: Standard architectural measurement term; straightforwardly denotes length.
- source_word: הַבִּנְיָן
  chosen: the building
  alternatives:
  - the structure
  lexicon: HALOT
  rationale: Generic architectural term. 'Building' is clear modern English and fits
    the temple-complex context.
- source_word: אֶל־פְּנֵי
  chosen: facing
  alternatives:
  - in front of
  - toward the front of
  lexicon: HALOT
  rationale: The idiom indicates orientation toward or in front of something. 'Facing'
    is concise and idiomatic in an architectural description.
- source_word: הַגִּזְרָה
  chosen: the separate area
  alternatives:
  - the separate place
  - the yard
  lexicon: HALOT
  rationale: In Ezekiel's temple vision this term refers to the distinct restricted
    area behind/west of the temple building. 'Separate area' preserves the lexical
    sense without overinterpreting the exact architectural feature.
- source_word: אֲשֶׁר עַל אַחֲרֶיהָ
  chosen: that was behind it
  alternatives:
  - which was at its rear
  - that was behind it/them
  lexicon: HALOT
  rationale: The phrase locates the separate area at the rear of the building. 'Behind
    it' is the most natural English rendering of the spatial relation.
- source_word: וְאֲתִיקֶיהָ
  chosen: with its galleries
  alternatives:
  - and its colonnades
  - and its ledges
  lexicon: HALOT
  rationale: The architectural term אֲתִיק/אֲתִיקִים in Ezekiel is difficult, but
    'galleries' is a common and plausible rendering for elevated architectural side-structures.
    Because the exact feature is uncertain, an alternative is preserved in a footnote.
- source_word: מִפּוֹ וּמִפּוֹ
  chosen: on this side and on that side
  alternatives:
  - here and there
  - on both sides
  lexicon: HALOT
  rationale: The paired deictics indicate the two sides of the structure. This fuller
    rendering preserves the spatial vividness better than the compressed 'on both
    sides.'
- source_word: מֵאָה אַמָּה
  chosen: one hundred cubits
  alternatives:
  - a hundred cubits
  lexicon: HALOT
  rationale: Formal measurement should be retained in temple-vision contexts. 'Cubits'
    preserves the ancient unit rather than converting it.
- source_word: הַהֵיכָל הַפְּנִימִי
  chosen: the inner nave
  alternatives:
  - the inner temple
  - the inner sanctuary
  lexicon: HALOT
  rationale: הֵיכָל can denote the main temple hall rather than the entire temple
    complex. 'Inner nave' fits the architectural context and distinguishes it from
    broader 'temple,' though the exact nuance is debated; an alternative is footnoted.
- source_word: וְאֻלַמֵּי הֶחָצֵר
  chosen: and the porches of the court
  alternatives:
  - and the vestibules of the court
  - and the porticos of the court
  lexicon: HALOT
  rationale: אוּלָם denotes a porch/vestibule-like architectural feature. The plural
    construct with 'court' is best rendered 'the porches of the court' in accessible
    English.
