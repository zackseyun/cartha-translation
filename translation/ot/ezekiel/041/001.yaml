id: EZK.41.1
reference: Ezekiel 41:1
source:
  edition: WLC
  text: וַ/יְבִיאֵ֖/נִי אֶל הַ/הֵיכָ֑ל וַ/יָּ֣מָד אֶת הָ/אֵילִ֗ים שֵׁשׁ אַמּ֨וֹת רֹ֧חַב
    מִ/פּ֛וֹ וְ/שֵׁשׁ אַמּֽוֹת רֹ֥חַב מִ/פּ֖וֹ רֹ֥חַב הָ/אֹֽהֶל־־־־־־׃
translation:
  text: 'Then he brought me into the nave and measured the jambs: six cubits wide
    on one side and six cubits wide on the other side—the width of the tent.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'main hall' or 'sanctuary'; the Hebrew refers to the principal room of
      the temple building, not the whole temple complex.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'tent.' In this temple-vision context, some understand it as a technical
      architectural designation and render it 'tabernacle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיכָל
  chosen: nave
  alternatives:
  - temple nave
  - main hall
  - sanctuary
  lexicon: HALOT
  rationale: In Ezekiel's temple vision, הֵיכָל refers specifically to the main hall
    of the temple building, distinct from the inner sanctuary. 'Nave' is a concise
    architectural term for the main hall and avoids the ambiguity of 'temple,' which
    could suggest the whole complex. 'Sanctuary' is possible but can blur the distinction
    with the inner room.
- source_word: אֵילִים
  chosen: jambs
  alternatives:
  - pilasters
  - side pillars
  - posts
  lexicon: HALOT
  rationale: In this architectural context, אֵילִים denotes the structural side elements
    at the entrance. 'Jambs' best fits the immediate context of measured entrance
    supports. 'Pillars' would suggest freestanding columns, which is less precise
    here.
- source_word: אַמּוֹת
  chosen: cubits
  lexicon: HALOT
  rationale: Standard rendering of the ancient linear measure; retaining 'cubits'
    preserves the source-culture measurement rather than converting to modern units.
- source_word: רֹחַב
  chosen: wide / width
  alternatives:
  - breadth
  lexicon: HALOT
  rationale: The noun denotes width or breadth. In the repeated measurements it is
    most natural in English as 'wide,' while the final construct phrase is best rendered
    'the width of...' to preserve the Hebrew structure.
- source_word: מִפּוֹ ... מִפּוֹ
  chosen: on one side ... on the other side
  alternatives:
  - from here ... from there
  - on this side ... on that side
  lexicon: HALOT
  rationale: The paired deictic expressions indicate the two corresponding sides of
    the entrance. Idiomatic English expresses this as 'on one side and on the other
    side.'
- source_word: אֹהֶל
  chosen: tent
  alternatives:
  - tabernacle
  lexicon: HALOT
  rationale: The plain lexical sense is 'tent.' Although some English versions smooth
    this to 'tabernacle' or treat it as a technical architectural label, the Hebrew
    word itself is אֹהֶל. Retaining 'tent' preserves the source wording, while the
    footnote notes the architectural sense in context.
- source_word: וַיְבִיאֵנִי
  chosen: Then he brought me
  alternatives:
  - And he brought me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: וַיָּמָד
  chosen: measured
  lexicon: HALOT
  rationale: Straightforward rendering of the measuring action in the vision.
