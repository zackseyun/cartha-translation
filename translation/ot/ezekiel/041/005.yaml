id: EZK.41.5
reference: Ezekiel 41:5
source:
  edition: WLC
  text: וַ/יָּ֥מָד קִֽיר הַ/בַּ֖יִת שֵׁ֣שׁ אַמּ֑וֹת וְ/רֹ֣חַב הַ/צֵּלָע֩ אַרְבַּ֨ע
    אַמּ֜וֹת סָבִ֧יב סָבִ֛יב לַ/בַּ֖יִת סָבִֽיב־׀׃
translation:
  text: 'Then he measured the wall of the house: six cubits; and the width of the
    side chamber was four cubits, all around the house on every side.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the side room' or 'the side structure.' The Hebrew term refers to the
      chambers built along the sides of the temple building.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Then he measured
  alternatives:
  - And he measured
  lexicon: HALOT
  rationale: Wayyiqtol of מדד introduces the next action in the vision report. 'Then
    he measured' gives natural English narrative sequence while preserving the simple
    verbal sense.
- source_word: קִיר
  chosen: wall
  lexicon: HALOT
  rationale: The noun denotes a wall, here the structural wall of the temple building.
    'Wall' is the plain architectural sense.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת in Ezekiel's temple vision often refers specifically to the temple
    structure. 'House' preserves the Hebrew term directly, while the temple sense
    remains clear from context.
- source_word: שֵׁשׁ אַמּוֹת
  chosen: six cubits
  lexicon: HALOT
  rationale: A straightforward measurement phrase. 'Cubits' preserves the ancient
    unit rather than converting it.
- source_word: וְרֹחַב
  chosen: and the width
  alternatives:
  - and width
  lexicon: HALOT
  rationale: The conjunction plus noun introduces a second measured dimension. Supplying
    'the' yields idiomatic English without changing sense.
- source_word: הַצֵּלָע
  chosen: the side chamber
  alternatives:
  - the side room
  - the side structure
  lexicon: HALOT
  rationale: צֵלָע in temple architecture refers to a side chamber/side room attached
    to the main structure. 'Side chamber' is a standard and clear architectural rendering.
- source_word: אַרְבַּע אַמּוֹת
  chosen: four cubits
  lexicon: HALOT
  rationale: Straightforward measurement phrase; the ancient unit is retained.
- source_word: סָבִיב סָבִיב לַבַּיִת סָבִיב
  chosen: all around the house on every side
  alternatives:
  - round about the house all around
  - surrounding the house on all sides
  lexicon: HALOT
  rationale: The repeated סָבִיב intensifies the encircling arrangement of the side
    chambers around the building. The chosen rendering preserves the repetition's
    force in natural English without wooden redundancy.
