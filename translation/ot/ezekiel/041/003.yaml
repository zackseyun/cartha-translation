id: EZK.41.3
reference: Ezekiel 41:3
source:
  edition: WLC
  text: וּ/בָ֣א לִ/פְנִ֔ימָה וַ/יָּ֥מָד אֵֽיל הַ/פֶּ֖תַח שְׁתַּ֣יִם אַמּ֑וֹת וְ/הַ/פֶּ֨תַח֙
    שֵׁ֣שׁ אַמּ֔וֹת וְ/רֹ֥חַב הַ/פֶּ֖תַח שֶׁ֥בַע אַמּֽוֹת־׃
translation:
  text: 'Then he went inside and measured the jambs of the entrance: two cubits; the
    entrance itself: six cubits; and the width of the entrance: seven cubits.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pilasters of the doorway' for 'the jambs of the entrance.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the width of the entrance, seven cubits.' The architectural reference
      may be difficult; some understand a related structural width rather than the
      clear opening alone.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָא
  chosen: Then he went
  alternatives:
  - And he entered
  - Then he came
  lexicon: HALOT
  rationale: The waw-consecutive with בוא advances the narrative. 'Then he went' gives
    natural English sequence in context, referring to the measuring guide moving farther
    inward.
- source_word: לִפְנִימָה
  chosen: inside
  alternatives:
  - inward
  - to the inner room
  lexicon: HALOT
  rationale: The adverb indicates movement to the interior. 'Inside' is concise and
    natural; 'to the inner room' is interpretive beyond the adverb itself.
- source_word: וַיָּמָד
  chosen: measured
  alternatives:
  - took the measurement of
  lexicon: HALOT
  rationale: Straightforward rendering of the measuring action in this temple-vision
    context.
- source_word: אֵיל הַפֶּתַח
  chosen: the jambs of the entrance
  alternatives:
  - the pilasters of the doorway
  - the side pillars of the entrance
  lexicon: HALOT
  rationale: אֵיל in architectural contexts refers to a projecting support or jamb/pilaster.
    'Jambs' is the clearest modern architectural term here and fits the paired measurement
    of two cubits.
- source_word: שְׁתַּיִם אַמּוֹת
  chosen: two cubits
  lexicon: HALOT
  rationale: Direct rendering of the measurement.
- source_word: וְהַפֶּתַח
  chosen: the entrance itself
  alternatives:
  - the doorway
  - the opening
  lexicon: HALOT
  rationale: Since 'entrance' has already been used in the prior phrase, adding 'itself'
    clarifies that this second measurement concerns the opening proper, not its jambs.
- source_word: שֵׁשׁ אַמּוֹת
  chosen: six cubits
  lexicon: HALOT
  rationale: Direct rendering of the measurement.
- source_word: וְרֹחַב הַפֶּתַח
  chosen: the width of the entrance
  alternatives:
  - the breadth of the entrance
  - the sidewalls of the entrance
  lexicon: HALOT
  rationale: The Hebrew most naturally reads as a width measurement associated with
    the entrance. Although the resulting dimensions are somewhat difficult architecturally,
    this preserves the plain lexical sense without over-resolving the spatial problem.
- source_word: שֶׁבַע אַמּוֹת
  chosen: seven cubits
  lexicon: HALOT
  rationale: Direct rendering of the measurement.
