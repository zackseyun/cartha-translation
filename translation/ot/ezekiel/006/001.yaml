id: EZK.6.1
reference: Ezekiel 6:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project''s standard rendering
      of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה functions here as standard narrative/sequential
    introduction. In English, the idiomatic sense is best carried by folding the existential
    verb into the clause 'the word ... came' rather than the wooden 'it happened.'
    'And' preserves the discourse continuity.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר־יְהוָה, 'word' is the standard and sufficiently
    transparent rendering, preserving the formal prophetic idiom better than the more
    interpretive 'message.' The construct relation with the divine name is reflected
    in 'the word of the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern. Small-caps convention is represented here as LORD.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly indicates
    direction toward the prophet. 'To me' is natural modern English and fully adequate.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive construct introduces the following divine speech in a
    conventional Hebrew formula. 'Saying' preserves the formal structure and prepares
    for the speech in the next verse without over-interpreting.
