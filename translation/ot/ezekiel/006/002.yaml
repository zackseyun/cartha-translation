id: EZK.6.2
reference: Ezekiel 6:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם שִׂ֥ים פָּנֶ֖י/ךָ אֶל הָרֵ֣י יִשְׂרָאֵ֑ל וְ/הִנָּבֵ֖א אֲלֵי/הֶֽם־־׃
translation:
  text: Son of man, set your face toward the mountains of Israel, and prophesy against
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''prophesy to them.'' The Hebrew preposition can be read more neutrally,
      but in this judgment context the sense is effectively adversative: ''against
      them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal man
  lexicon: HALOT
  rationale: A fixed address for Ezekiel. The Hebrew is literally 'son of man'; retaining
    it preserves the idiom and its prophetic force better than smoothing to 'human'
    or 'mortal.' It also accords with the doctrine's gender-accurate principle for
    אָדָם in context.
- source_word: שִׂים
  chosen: set
  alternatives:
  - direct
  - turn
  lexicon: HALOT
  rationale: The imperative commonly means 'set, place.' In the idiom with 'face,'
    'set' is the most natural and sufficiently formal English rendering.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your attention
  - your gaze
  lexicon: HALOT
  rationale: Literal 'your face' should be preserved because it is a common prophetic
    idiom signaling directed confrontation or orientation. Dynamic alternatives would
    weaken the imagery.
- source_word: אֶל
  chosen: toward
  alternatives:
  - against
  - to
  lexicon: HALOT
  rationale: 'With ''set your face,'' אֶל is spatially directional: ''toward.'' The
    adversative sense is carried more explicitly by the following prophetic action,
    so ''toward'' best reflects the Hebrew sequence.'
- source_word: הָרֵי יִשְׂרָאֵל
  chosen: the mountains of Israel
  alternatives:
  - the hill country of Israel
  lexicon: HALOT
  rationale: The construct phrase is straightforwardly 'the mountains of Israel.'
    Although it can function metonymically for the land or its high places, the concrete
    wording should remain in the main text.
- source_word: וְהִנָּבֵא
  chosen: and prophesy
  alternatives:
  - and speak prophetically
  lexicon: HALOT
  rationale: Standard rendering of the Niphal imperative of נבא. 'Prophesy' is clear,
    idiomatic, and preserves the prophetic register.
- source_word: אֲלֵיהֶם
  chosen: against them
  alternatives:
  - to them
  - concerning them
  lexicon: HALOT
  rationale: 'Although the preposition can mean ''to'' or ''toward,'' in this judgment
    context the sense is adversative: Ezekiel is to announce judgment directed at
    the mountains. English ''against them'' best captures the force in context.'
