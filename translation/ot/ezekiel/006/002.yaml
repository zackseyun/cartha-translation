theological_decisions:
- issue: Rendering of אָדָם in the prophetic address בֶּן אָדָם
  chosen_reading: Son of man
  alternative_readings:
  - Human one
  - Mortal
  rationale: The phrase is an established divine address to Ezekiel and should be
    preserved as such rather than neutralized. This follows the doctrine's guidance
    to be gender-accurate over gender-neutral where the source intent is represented
    by masculine wording.
