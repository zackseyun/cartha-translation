id: EZK.6.14
reference: Ezekiel 6:14
source:
  edition: WLC
  text: וְ/נָטִ֤יתִי אֶת יָדִ/י֙ עֲלֵי/הֶ֔ם וְ/נָתַתִּ֨י אֶת הָ/אָ֜רֶץ שְׁמָמָ֤ה וּ/מְשַׁמָּה֙ מִ/מִּדְבַּ֣ר דִּבְלָ֔תָ/ה בְּ/כֹ֖ל מוֹשְׁבֽוֹתֵי/הֶ֑ם וְ/יָדְע֖וּ כִּֽי אֲנִ֥י יְהוָֽה־־־׃פ
translation:
  text: So I will stretch out my hand against them and make the land a desolation and a waste, from the wilderness to Diblah, throughout all their settlements. Then they will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the wilderness toward Diblath.'' The place name is uncertain; some understand ''from the wilderness to Diblath,'' and some textual proposals relate it to Riblah.'
    reason: textual_variant
  - marker: b
    text: Or 'in all their dwelling places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָטִיתִי
  chosen: I will stretch out
  alternatives:
  - I will extend
  - I will turn
  lexicon: HALOT
  rationale: In judgment contexts with 'hand' as object, the idiom means to extend or stretch out the hand against someone in action, especially punitive action. 'Stretch out' is natural English and preserves the prophetic idiom.
- source_word: יָדִי עֲלֵיהֶם
  chosen: my hand against them
  alternatives:
  - my hand over them
  lexicon: HALOT
  rationale: The phrase is a standard idiom for hostile divine action. 'Against them' makes the adversative force of עַל clear in context.
- source_word: וְנָתַתִּי אֶת־הָאָרֶץ
  chosen: and make the land
  alternatives:
  - and give the land over
  - and set the land
  lexicon: HALOT
  rationale: נתן with a predicate complement here expresses causing the land to become something. English 'make the land' best captures the causative sense without wooden literalism.
- source_word: שְׁמָמָה וּמְשַׁמָּה
  chosen: a desolation and a waste
  alternatives:
  - desolate and devastated
  - an appalling desolation
  - desolation and horror
  lexicon: HALOT
  rationale: The paired nouns intensify devastation. 'Desolation and a waste' preserves the doublet and remains readable. מְשַׁמָּה can carry the nuance of devastation or object of horror; 'waste' fits the land-focused context without overinterpreting emotional response.
- source_word: מִמִּדְבַּר דִּבְלָתָה
  chosen: from the wilderness toward Diblath
  alternatives:
  - from the wilderness to Diblath
  - more desolate than the wilderness toward Diblath
  - from the wilderness of Diblath
  lexicon: HALOT
  rationale: The phrase is textually and geographically difficult. The most straightforward reading treats it as a geographic extent formula. 'Toward Diblath' avoids overstating certainty about the exact referent while preserving the place name. A more traditional 'to Diblath' is possible.
- source_word: בְּכֹל מוֹשְׁבוֹתֵיהֶם
  chosen: throughout all their settlements
  alternatives:
  - in all their dwelling places
  - through all their habitations
  lexicon: HALOT
  rationale: מוֹשָׁב refers to places of habitation or settlement. 'Settlements' is clear modern English and suits the judgment-on-the-land context.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  chosen: Then they will know that I am the LORD
  alternatives:
  - and they will know that I am the LORD
  lexicon: HALOT
  rationale: This recurring Ezekiel formula expresses the result of judgment. 'Then' brings out the consequential force naturally in English. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
