  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and avoids introducing a denominationally loaded preference. The covenantal identity claim remains intact in the recognition formula.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the difficult geographic phrase מִמִּדְבַּר דִּבְלָתָה
  chosen_reading: 'a geographic extent: ''from the wilderness toward Diblath'''
  alternative_readings:
  - '''from the wilderness to Diblath'''
  - emendations connecting the phrase to Riblah or treating it adverbially as an extreme desolation formula
