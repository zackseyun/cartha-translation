id: EZK.6.11
reference: Ezekiel 6:11
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנָ֣/י יְהוִ֗ה הַכֵּ֨ה בְ/כַפְּ/ךָ֜ וּ/רְקַ֤ע בְּ/רַגְלְ/ךָ֙
    וֶֽ/אֱמָר אָ֔ח אֶ֛ל כָּל תּוֹעֲב֥וֹת רָע֖וֹת בֵּ֣ית יִשְׂרָאֵ֑ל אֲשֶׁ֗ר בַּ/חֶ֛רֶב
    בָּ/רָעָ֥ב וּ/בַ/דֶּ֖בֶר יִפֹּֽלוּ־־־׃
translation:
  text: 'Thus says the Lord GOD: Strike your hand and stamp your foot, and say, “Alas!”
    because of all the evil abominations of the house of Israel, who will fall by
    the sword, by famine, and by pestilence.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Clap your hands.” The Hebrew may refer to striking the palm as an emphatic
      gesture.
    reason: lexical_alternative
  - marker: b
    text: Hebrew אָח can be rendered “Alas!” or “Ah!”; here it expresses lament over
      coming judgment.
    reason: lexical_alternative
  - marker: c
    text: Or “over all the evil abominations of the house of Israel.”
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Rendered the title-plus-divine-name formula in standard English prophetic
    style as 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in this
    fixed collocation with אֲדֹנָי, small-caps cannot be represented in plain text,
    so 'GOD' distinguishes the divine name from 'Lord.'
- source_word: הַכֵּה בְכַפְּךָ
  chosen: Strike your hand
  alternatives:
  - Clap your hands
  - Strike with your hand
  lexicon: HALOT
  rationale: The imperative of נכה with 'your palm/hand' denotes a striking gesture.
    'Strike your hand' preserves the vivid prophetic sign-act more directly than the
    more interpretive 'clap your hands,' though the latter is a plausible idiomatic
    understanding.
- source_word: וּרְקַע בְרַגְלְךָ
  chosen: stamp your foot
  alternatives:
  - stamp with your foot
  - stomp your foot
  lexicon: HALOT
  rationale: רקע here refers to stamping/beating with the foot as a gesture of emphatic
    lament or denunciation. 'Stamp your foot' is natural modern English and keeps
    the physical action.
- source_word: וֶאֱמָר אָח
  chosen: say, “Alas!”
  alternatives:
  - say, 'Aha!'
  - say, 'Ah!'
  lexicon: HALOT
  rationale: The interjection אָח in prophetic contexts commonly expresses grief or
    woe rather than triumph. 'Alas!' best conveys lament here, fitting the coming
    judgment. 'Ah!' is possible but less explicit in English.
- source_word: אֶל כָּל תּוֹעֲבוֹת רָעוֹת
  chosen: because of all the evil abominations
  alternatives:
  - over all the evil abominations
  - concerning all the evil abominations
  lexicon: HALOT
  rationale: 'The preposition אֶל after an exclamation can mark the object/cause of
    lament. ''Because of'' makes the sense clear in English: the lament is occasioned
    by Israel''s abominations. ''Abominations'' preserves the strong cultic-moral
    force of תּוֹעֲבוֹת.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retained the covenantal collective expression 'house of Israel' rather
    than flattening to 'Israel.'
- source_word: אֲשֶׁר ... יִפֹּלוּ
  chosen: who will fall
  alternatives:
  - because they will fall
  - for they will fall
  lexicon: HALOT
  rationale: The relative particle links 'house of Israel' with the coming fate. 'Who
    will fall' preserves the syntax straightforwardly in English.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדֶּבֶר
  chosen: by the sword, by famine, and by pestilence
  alternatives:
  - by sword, famine, and plague
  - by the sword, by hunger, and by plague
  lexicon: HALOT
  rationale: This is a standard judgment triad in prophetic literature. 'Sword, famine,
    and pestilence' is both accurate and recognizable. 'Pestilence' preserves the
    formal gravity of דֶּבֶר better than the broader 'plague'.
