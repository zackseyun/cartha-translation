theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies יְהוָה → 'the LORD.' In the Hebrew collocation
    with אֲדֹנָי, English convention uses 'GOD' to avoid 'Lord LORD' while still signaling
    the divine name. This is a translation-form decision, not a doctrinal reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
