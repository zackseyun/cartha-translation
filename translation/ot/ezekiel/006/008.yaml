theological_decisions:
- issue: Remnant language in a judgment oracle
  chosen_reading: Yet I will leave a remnant
  alternative_readings:
  - Yet I will spare some
  - But I will leave survivors
  rationale: 'The verse introduces mercy within judgment: not total annihilation,
    but preservation of some survivors. ''Remnant'' is theologically resonant and
    textually warranted by the idea of those left over, without importing later doctrinal
    elaboration beyond the verse.'
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
