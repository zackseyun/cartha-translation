id: EZK.6.8
reference: Ezekiel 6:8
source:
  edition: WLC
  text: וְ/הוֹתַרְתִּ֗י בִּ/הְי֥וֹת לָ/כֶ֛ם פְּלִ֥יטֵי חֶ֖רֶב בַּ/גּוֹיִ֑ם בְּ/הִזָּרֽוֹתֵי/כֶ֖ם
    בָּ/אֲרָצֽוֹת׃
translation:
  text: Yet I will leave a remnant, when some of you become escapees from the sword
    among the nations, when you are scattered through the lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'survivors of the sword' or 'those who escape the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתַרְתִּי
  chosen: Yet I will leave a remnant
  alternatives:
  - And I will leave over
  - But I will spare
  lexicon: HALOT
  rationale: The Hiphil of יתר means to leave over, spare, or preserve. In this judgment
    context, the sense is that God will preserve survivors. 'Yet' captures the adversative
    force in context after announced destruction, and 'leave a remnant' expresses
    the idiomatic result clearly in English.
- source_word: בִּהְיוֹת
  chosen: when
  alternatives:
  - in that there are
  - while there are
  lexicon: HALOT
  rationale: The infinitive construct of היה with prefixed ב commonly introduces a
    temporal clause. 'When' gives natural English and fits the sequence of events.
- source_word: לָכֶם
  chosen: some of you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: 'The dative pronoun marks possession/existence: ''there being for you.''
    In idiomatic English, ''some of you'' best conveys that survivors will remain
    from among the people addressed.'
- source_word: פְּלִיטֵי חֶרֶב
  chosen: escapees from the sword
  alternatives:
  - survivors of the sword
  - those who escape the sword
  lexicon: HALOT
  rationale: פְּלִיטִים denotes fugitives or escapees; with 'sword' it refers to those
    who survive warfare. 'Escapees from the sword' is vivid and close to the Hebrew,
    though the more idiomatic alternative 'survivors of the sword' is also possible.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign peoples among whom Israel will be dispersed.
    'Nations' is the standard, contextually appropriate rendering in the Hebrew Bible.
- source_word: בְּהִזָּרוֹתֵיכֶם
  chosen: when you are scattered
  alternatives:
  - in your being scattered
  - when I scatter you
  lexicon: HALOT
  rationale: From זרה, 'to scatter.' The infinitive construct with second person suffix
    yields a temporal clause referring to the people's dispersion. The passive English
    'when you are scattered' communicates the event naturally without over-specifying
    agency in the clause itself.
- source_word: בָּאֲרָצוֹת
  chosen: through the lands
  alternatives:
  - throughout the countries
  - in the lands
  lexicon: HALOT
  rationale: אֲרָצוֹת is plural, referring to various lands/countries of exile. 'Through
    the lands' conveys broad dispersion; 'countries' is possible but slightly more
    modern-political than the Hebrew requires.
