id: EZK.6.12
reference: Ezekiel 6:12
source:
  edition: WLC
  text: הָ/רָח֞וֹק בַּ/דֶּ֣בֶר יָמ֗וּת וְ/הַ/קָּרוֹב֙ בַּ/חֶ֣רֶב יִפּ֔וֹל וְ/הַ/נִּשְׁאָר֙
    וְ/הַ/נָּצ֔וּר בָּ/רָעָ֖ב יָמ֑וּת וְ/כִלֵּיתִ֥י חֲמָתִ֖/י בָּֽ/ם׃
translation:
  text: The one far away will die by pestilence, and the one nearby will fall by the
    sword, and the one left and besieged will die by famine; and I will spend my wrath
    on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one left and shut up'; the Hebrew term may denote one hemmed in
      under siege, which fits the following 'by famine.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will exhaust my wrath on them.' The Hebrew verb conveys bringing wrath
      to its full end in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָחוֹק
  chosen: the one far away
  alternatives:
  - he who is far off
  - the distant one
  lexicon: HALOT
  rationale: Substantival adjective with article, singular collective in context.
    'The one far away' preserves the individualizing Hebrew while reading naturally
    in English.
- source_word: בַּדֶּבֶר
  chosen: by pestilence
  alternatives:
  - by plague
  - of pestilence
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence/plague as a covenant judgment. 'By
    pestilence' fits the instrumental beth and keeps the prophetic/judgment register.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: Simple future rendering of the imperfect in prophetic announcement.
- source_word: הַקָּרוֹב
  chosen: the one nearby
  alternatives:
  - he who is near
  - the near one
  lexicon: HALOT
  rationale: Parallel to הָרָחוֹק. 'Nearby' is idiomatic modern English and preserves
    the spatial contrast.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare/judgment; retains the concrete image
    rather than abstracting to 'violence'.
- source_word: יִפּוֹל
  chosen: will fall
  alternatives:
  - will be struck down
  lexicon: HALOT
  rationale: נפל with sword is a conventional expression for falling in battle or
    violent death. 'Will fall' preserves the Hebrew imagery.
- source_word: הַנִּשְׁאָר
  chosen: the one left
  alternatives:
  - the remnant
  - the one remaining
  lexicon: HALOT
  rationale: Passive participle from שׁאר, 'remain/be left over.' 'The one left' keeps
    the singular distributive pattern of the verse. 'Remnant' would sound more technical
    and collective than the immediate syntax suggests.
- source_word: הַנָּצוּר
  chosen: besieged
  alternatives:
  - shut up
  - blockaded
  - preserved
  lexicon: HALOT
  rationale: From צור in the sense of being under siege/hemmed in. In this judgment
    context, 'besieged' best fits the pairing with famine. Although the form has been
    taken by some as 'preserved/spared,' the immediate context of siege conditions
    leading to famine favors 'besieged'.
- source_word: בָּרָעָב
  chosen: by famine
  alternatives:
  - in famine
  - of hunger
  lexicon: HALOT
  rationale: Instrumental beth again; 'by famine' matches the preceding judgments
    and is idiomatic.
- source_word: וְכִלֵּיתִי
  chosen: I will spend
  alternatives:
  - I will exhaust
  - I will complete
  - I will pour out fully
  lexicon: HALOT
  rationale: כלה in the Piel can mean bring to an end, finish, expend. With 'my wrath'
    and the preposition בָּם, 'I will spend my wrath on them' conveys the idea of
    wrath being fully executed, matching Ezekiel's repeated judgment formula.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'Wrath' is weighty but standard and
    readable.
- source_word: בָּם
  chosen: on them
  alternatives:
  - against them
  - in them
  lexicon: HALOT
  rationale: With verbs of wrath/judgment, English idiom prefers 'on them.' This communicates
    the target of the completed judgment.
