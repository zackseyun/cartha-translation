theological_decisions:
- issue: Rendering divine judgment language without softening its force
  chosen_reading: I will spend my wrath on them
  alternative_readings:
  - I will exhaust my fury upon them
  - I will satisfy my wrath against them
  rationale: The Hebrew depicts God's wrath as fully carried out in judgment. The
    translation preserves this severity without importing later doctrinal categories
    beyond the text itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
