id: EZK.6.4
reference: Ezekiel 6:4
source:
  edition: WLC
  text: וְ/נָשַׁ֨מּוּ֙ מִזְבְּח֣וֹתֵי/כֶ֔ם וְ/נִשְׁבְּר֖וּ חַמָּֽנֵי/כֶ֑ם וְ/הִפַּלְתִּי֙
    חַלְלֵי/כֶ֔ם לִ/פְנֵ֖י גִּלּוּלֵי/כֶֽם׃
translation:
  text: Your altars will be desolated, and your incense altars will be broken; and
    I will cast down your slain before your idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols; alternatively,
      'your filthy idols' or even 'your dung-idols.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your sun-pillars'; the Hebrew term חַמָּנִים refers to cultic objects
      associated with illicit worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשַׁמּוּ
  chosen: will be desolated
  alternatives:
  - will be laid waste
  - will become desolate
  lexicon: HALOT
  rationale: Niphal of שׁמם denotes becoming desolate or devastated. 'Will be desolated'
    preserves the passive/resultative force and the judgment tone without over-paraphrasing.
- source_word: מִזְבְּחוֹתֵיכֶם
  chosen: your altars
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ. No contextual reason to narrow beyond
    the general 'altars' here.
- source_word: נִשְׁבְּרוּ
  chosen: will be broken
  alternatives:
  - will be smashed
  - will be shattered
  lexicon: HALOT
  rationale: Niphal of שׁבר means to be broken. 'Will be broken' is the most direct
    and transparent rendering; stronger English options are possible but slightly
    more interpretive.
- source_word: חַמָּנֵיכֶם
  chosen: your incense altars
  alternatives:
  - your sun-pillars
  - your incense stands
  lexicon: HALOT
  rationale: חַמָּנִים refers to cultic objects associated with illicit worship, often
    linked with incense or solar imagery. 'Incense altars' is a clear, idiomatic rendering
    that fits the cultic context and common usage in Ezekiel, while preserving the
    sense of a worship installation rather than a generic image.
- source_word: הִפַּלְתִּי
  chosen: I will cast down
  alternatives:
  - I will make fall
  - I will throw down
  lexicon: HALOT
  rationale: 'Hiphil of נפל is causative: ''cause to fall.'' ''I will cast down''
    communicates deliberate divine action and fits the violent judgment context.'
- source_word: חַלְלֵיכֶם
  chosen: your slain
  alternatives:
  - your slain men
  - your corpses
  lexicon: HALOT
  rationale: חָלָל commonly denotes those slain or pierced. 'Your slain' is concise
    and faithful; 'corpses' emphasizes the bodies, while 'slain men' adds gender not
    explicit in the form.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of.' 'Before' is natural
    English and preserves the spatial/judicial irony of the slain lying before the
    idols.
- source_word: גִּלּוּלֵיכֶם
  chosen: your idols
  alternatives:
  - your dung-idols
  - your filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's strongly pejorative term for idols. 'Idols'
    is the standard clear rendering; the derogatory nuance is real but difficult to
    carry idiomatically in the main text without sounding interpretive, so an alternative
    is preserved in a footnote.
