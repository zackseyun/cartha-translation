theological_decisions:
- issue: Pejorative force of Ezekiel's term for idols
  chosen_reading: Render גִּלּוּלִים as 'idols' in the main text
  alternative_readings:
  - filthy idols
  - dung-idols
  rationale: The verse is a judgment oracle against idolatry, and the Hebrew term
    is intentionally contemptuous. For readable modern English, the main text uses
    the standard 'idols,' while a footnote preserves the sharper derogatory nuance
    so the rhetoric is not lost.
  doctrine_reference: Translation philosophy §§1, 5, 6
