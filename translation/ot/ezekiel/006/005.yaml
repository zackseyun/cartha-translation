theological_decisions:
- issue: Retention of the ethnic covenant expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The phrase is a conventional covenantal designation. Retaining 'sons
    of Israel' follows the project's gender-accurate policy and keeps the Hebrew texture,
    while not implying only males are in view.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering Ezekiel's polemical term גִּלּוּלִים
  chosen_reading: idols
  alternative_readings:
  - dung-idols
  - filthy idols
  rationale: The verse condemns idolatry, but the translation should not over-interpret
    by forcing an English insult into the main text where the Hebrew pejorative nuance
    is somewhat lexicalized. The contemptuous nuance is preserved in a footnote for
    transparency.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
