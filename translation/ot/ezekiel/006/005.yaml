id: EZK.6.5
reference: Ezekiel 6:5
source:
  edition: WLC
  text: וְ/נָתַתִּ֗י אֶת פִּגְרֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לִ/פְנֵ֖י גִּלּֽוּלֵי/הֶ֑ם
    וְ/זֵרִיתִי֙ אֶת עַצְמ֣וֹתֵי/כֶ֔ם סְבִיב֖וֹת מִזְבְּחוֹתֵי/כֶֽם־־׃
translation:
  text: And I will place the corpses of the sons of Israel before their idols, and
    I will scatter your bones around your altars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is Ezekiel’s scornful term for idols; it may carry a
      contemptuous nuance such as 'filthy idols' or even 'dung-idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will place
  alternatives:
  - And I will set
  - And I will give
  lexicon: HALOT
  rationale: נתן is broad ('give, put, set'). In this judgment context with a direct
    object of dead bodies and a locative phrase 'before,' 'place' is natural modern
    English and preserves the concrete action without sounding wooden.
- source_word: פִּגְרֵי
  chosen: the corpses
  alternatives:
  - the carcasses
  - the dead bodies
  lexicon: HALOT
  rationale: פגר denotes a corpse/carcass. 'Corpses' best conveys human dead bodies
    with the verse's grim force; 'carcasses' can sound more animal-oriented, while
    'dead bodies' is accurate but less concise.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the people of Israel
  - of the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per gender-accurate philosophy,
    the masculine form is retained where it reflects the source expression. 'Sons
    of Israel' is also a standard covenantal ethnonym here, not merely a male-only
    reference.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - before the face of
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in front of.' 'Before' is idiomatic and
    preserves the sacrificial-ironic scene of bodies laid before idols.
- source_word: גִּלּוּלֵיהֶם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. The base sense
    likely carries a pejorative nuance, but standard English main text should remain
    readable. 'Idols' gives the referent clearly; the contemptuous force is worth
    preserving in a footnote.
- source_word: וְזֵרִיתִי
  chosen: and I will scatter
  alternatives:
  - and I will disperse
  - and I will winnow
  lexicon: HALOT
  rationale: זרה in this stem can mean scatter/winnow. With bones as object and altars
    as surrounding location, 'scatter' is the clearest contextual rendering.
- source_word: עַצְמוֹתֵיכֶם
  chosen: your bones
  alternatives:
  - your skeletal remains
  lexicon: HALOT
  rationale: The noun straightforwardly means 'bones.' The second-person plural suffix
    addresses the audience directly in prophetic judgment; this should be preserved.
- source_word: סְבִיבוֹת
  chosen: around
  alternatives:
  - all around
  - surrounding
  lexicon: HALOT
  rationale: The term denotes surrounding area/circuit. 'Around' is concise and idiomatic
    with the following noun phrase.
- source_word: מִזְבְּחוֹתֵיכֶם
  chosen: your altars
  alternatives:
  - the altars belonging to you
  lexicon: HALOT
  rationale: מִזְבֵּחַ is 'altar.' The second-person plural suffix is important because
    the altars are those of the addressed people, associated with their illicit worship.
