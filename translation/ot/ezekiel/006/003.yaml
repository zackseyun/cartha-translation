id: EZK.6.3
reference: Ezekiel 6:3
source:
  edition: WLC
  text: וְ/אָ֣מַרְתָּ֔ הָרֵי֙ יִשְׂרָאֵ֔ל שִׁמְע֖וּ דְּבַר אֲדֹנָ֣/י יְהוִ֑ה כֹּה
    אָמַ֣ר אֲדֹנָ֣/י יְ֠הוִה לֶ/הָרִ֨ים וְ/לַ/גְּבָע֜וֹת לָ/אֲפִיקִ֣ים ו/ל/גאית הִנְ/נִ֨י
    אֲנִ֜י מֵבִ֤יא עֲלֵי/כֶם֙ חֶ֔רֶב וְ/אִבַּדְתִּ֖י בָּמֽוֹתֵי/כֶֽם־־׃
translation:
  text: 'and say, ‘Mountains of Israel, hear the word of the Lord GOD. Thus says the
    Lord GOD to the mountains and to the hills, to the ravines and to the valleys:
    Behold, I—I am bringing a sword upon you, and I will destroy your high places.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the channels” or “to the wadis” for “to the ravines.”
    reason: lexical_alternative
  - marker: b
    text: “High places” refers to elevated worship sites, often associated with illicit
      or idolatrous worship.
    reason: cultural_note
lexical_decisions:
- source_word: הָרֵי יִשְׂרָאֵל
  chosen: Mountains of Israel
  alternatives:
  - mountains of Israel
  lexicon: HALOT
  rationale: Construct phrase addressing the physical highlands of the land personified
    as hearers. Capitalized 'Mountains' because it functions as a direct vocative
    opening the speech, not as a proper name.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons formula
    and matches the direct address.
- source_word: דְּבַר אֲדֹנָי יְהוִה
  chosen: the word of the Lord GOD
  alternatives:
  - the word of the Lord Yahweh
  lexicon: HALOT
  rationale: דְּבַר is singular 'word.' For יְהוָה, the doctrine default is 'the LORD.'
    Because אֲדֹנָי precedes it, English convention uses 'Lord GOD' to avoid 'Lord
    LORD' while still signaling the divine name.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - This is what the Lord GOD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' is concise, natural,
    and preserves the formal prophetic register.
- source_word: לֶהָרִים וְלַגְּבָעוֹת
  chosen: to the mountains and to the hills
  alternatives:
  - to the mountains and the hills
  lexicon: HALOT
  rationale: Retains repeated preposition for rhetorical cadence in the divine address.
- source_word: לָאֲפִיקִים
  chosen: to the ravines
  alternatives:
  - to the channels
  - to the wadis
  - to the streams
  lexicon: HALOT
  rationale: אֲפִיקִים denotes watercourses, channels, or ravines. In this topographical
    list paired with mountains, hills, and valleys, 'ravines' best conveys the landform
    in idiomatic English.
- source_word: וְלַגֵּאָיוֹת
  chosen: to the valleys
  alternatives:
  - to the gorges
  lexicon: HALOT
  rationale: Refers to low-lying valleys. 'Valleys' is the broad, natural English
    equivalent and balances 'ravines' in the preceding term.
- source_word: הִנְנִי אֲנִי
  chosen: Behold, I—I
  alternatives:
  - Behold, I myself
  - Look, I myself
  lexicon: HALOT
  rationale: The doubled first-person expression is emphatic. 'Behold, I—I' preserves
    the abrupt force and solemnity better than smoothing it away.
- source_word: מֵבִיא
  chosen: am bringing
  alternatives:
  - bring
  - am about to bring
  lexicon: HALOT
  rationale: Participle with הִנְנִי often conveys imminent action. 'Am bringing'
    preserves the vivid present-future force without overinterpreting as strictly
    futurate.
- source_word: חֶרֶב
  chosen: a sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: Indefinite in English is natural here and conveys an instrument of war/judgment
    coming upon the land.
- source_word: וְאִבַּדְתִּי
  chosen: and I will destroy
  alternatives:
  - and I will wipe out
  - and I will make perish
  lexicon: HALOT
  rationale: The verb expresses causing to perish/destroy. 'Destroy' is the clearest
    modern English rendering in this judgment context.
- source_word: בָּמוֹתֵיכֶם
  chosen: your high places
  alternatives:
  - your cultic high places
  - your shrines on the heights
  lexicon: HALOT
  rationale: בָּמוֹת refers to elevated worship sites, often illicit in prophetic
    critique. 'High places' is the standard concise rendering and preserves the cultic
    sense familiar in the Hebrew Bible.
