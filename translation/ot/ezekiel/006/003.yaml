theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default for יְהוָה is 'the LORD.' In the fixed combination
    אֲדֹנָי יְהוִה, English translations commonly use 'Lord GOD' to avoid the awkward
    'Lord LORD' while still distinguishing the divine name typographically through
    'GOD.' This follows the stated policy while preserving readability.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
