id: EZK.6.6
reference: Ezekiel 6:6
source:
  edition: WLC
  text: בְּ/כֹל֙ מוֹשְׁב֣וֹתֵי/כֶ֔ם הֶ/עָרִ֣ים תֶּחֱרַ֔בְנָה וְ/הַ/בָּמ֖וֹת תִּישָׁ֑מְנָה
    לְמַעַן֩ יֶחֶרְב֨וּ וְ/יֶאְשְׁמ֜וּ מִזְבְּחֽוֹתֵי/כֶ֗ם וְ/נִשְׁבְּר֤וּ וְ/נִשְׁבְּתוּ֙
    גִּלּ֣וּלֵי/כֶ֔ם וְ/נִגְדְּעוּ֙ חַמָּ֣נֵי/כֶ֔ם וְ/נִמְח֖וּ מַעֲשֵׂי/כֶֽם׃
translation:
  text: In all your dwelling places, the cities will be laid waste and the high places
    will be desolated, so that your altars may be laid waste and made desolate, and
    your idols broken and brought to an end, and your incense altars cut down, and
    your works wiped out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a contemptuous term for idols, possibly carrying the
      sense of 'filthy' or 'dungy' idols.
    reason: lexical_alternative
  - marker: b
    text: Or 'your sun pillars' / 'your sun-images' for 'your incense altars'; the
      Hebrew term refers to a debated type of cultic object, possibly associated with
      solar worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹשְׁבֹתֵיכֶם
  chosen: your dwelling places
  alternatives:
  - your settlements
  - your habitations
  lexicon: HALOT
  rationale: The noun denotes places of habitation or settlement. 'Dwelling places'
    is natural English and preserves the broad sense better than the more administrative
    'settlements.'
- source_word: הֶעָרִים תֶּחֱרַבְנָה
  chosen: the cities will be laid waste
  alternatives:
  - the cities will be ruined
  - the cities will become desolate
  lexicon: HALOT
  rationale: The verb חרב in this context denotes devastation or ruin. 'Laid waste'
    captures the force of judgment and pairs well with the repeated devastation language
    in the verse.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the hill shrines
  lexicon: HALOT
  rationale: '''High places'' is the standard rendering for cultic sites and is sufficiently
    transparent in English Bible usage. It preserves the technical sense of illicit
    worship locations.'
- source_word: תִּישָׁמְנָה
  chosen: will be desolated
  alternatives:
  - will be made desolate
  - will be deserted
  lexicon: HALOT
  rationale: The verb conveys becoming desolate. 'Will be desolated' keeps the formal
    parallel with the surrounding judgment verbs and avoids flattening the cultic-judicial
    tone.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: This marks purpose/result. 'So that' is idiomatic modern English while
    preserving the logical connection.
- source_word: יֶחֶרְבוּ וְיֶאְשְׁמוּ מִזְבְּחוֹתֵיכֶם
  chosen: your altars may be laid waste and made desolate
  alternatives:
  - your altars may be ruined and desolated
  - your altars may be devastated and left desolate
  lexicon: HALOT
  rationale: The paired verbs intensify the judgment on the altars. Rendering both
    avoids omission of the second verb and preserves the emphatic parallelism.
- source_word: גִּלּוּלֵיכֶם
  chosen: your idols
  alternatives:
  - your dung-idols
  - your filthy idols
  lexicon: HALOT
  rationale: The term is a strongly pejorative word for idols. 'Idols' is the clear
    main-text rendering; the more vivid derogatory nuance is worth preserving in a
    footnote rather than overloading the main text.
- source_word: וְנִשְׁבְּרוּ וְנִשְׁבְּתוּ
  chosen: broken and brought to an end
  alternatives:
  - shattered and abolished
  - broken and destroyed
  lexicon: HALOT
  rationale: The first verb denotes breaking; the second from שבת conveys ceasing
    or being put to an end. 'Brought to an end' preserves the distinct force of the
    second verb better than repeating 'destroyed.'
- source_word: חַמָּנֵיכֶם
  chosen: your incense altars
  alternatives:
  - your sun pillars
  - your sun-images
  lexicon: HALOT
  rationale: The term likely refers to cultic objects associated with incense or solar
    worship. 'Incense altars' fits the broader cultic context and common usage in
    Ezekiel, while the possible solar nuance is preserved in a footnote because the
    referent is debated.
- source_word: מַעֲשֵׂיכֶם
  chosen: your works
  alternatives:
  - your deeds
  - what you have made
  lexicon: HALOT
  rationale: In this idolatry context the term likely refers to the products of their
    hands, especially cultic works. 'Your works' is concise and preserves the ambiguity
    between deeds and manufactured objects.
- source_word: וְנִמְחוּ
  chosen: wiped out
  alternatives:
  - blotted out
  - effaced
  lexicon: HALOT
  rationale: The verb conveys erasure or obliteration. 'Wiped out' is readable modern
    English and suitably forceful.
