theological_decisions:
- issue: Rendering of cultic condemnation terms without softening the anti-idolatry
    force
  chosen_reading: Use direct judgment language ('high places,' 'altars,' 'idols,'
    'incense altars') and preserve the pejorative nuance of גִּלּוּלִים in a footnote
    rather than paraphrasing.
  alternative_readings:
  - Use more interpretive renderings such as 'filthy idols' in the main text
  - Generalize the verse as condemnation of false religion without specific cultic
    terms
  rationale: The verse is a concrete denunciation of Israel's idolatrous worship sites
    and objects. The translation should preserve that specificity and severity without
    importing extra rhetoric beyond the Hebrew.
  doctrine_reference: Translation philosophy items 1, 3, 5, 6
