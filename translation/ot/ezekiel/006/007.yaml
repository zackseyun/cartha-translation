id: EZK.6.7
reference: Ezekiel 6:7
source:
  edition: WLC
  text: וְ/נָפַ֥ל חָלָ֖ל בְּ/תֽוֹכְ/כֶ֑ם וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־׃
translation:
  text: The slain will fall in your midst, and you will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָפַל
  chosen: will fall
  alternatives:
  - shall fall
  - will lie fallen
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse is naturally
    rendered as a future/resultative statement in English. 'Will fall' is idiomatic
    and preserves the eventive force.
- source_word: חָלָל
  chosen: the slain
  alternatives:
  - the wounded
  - a slain one
  - corpse
  lexicon: HALOT
  rationale: In judgment contexts this noun commonly denotes one who has been slain,
    not merely wounded. The collective/singular Hebrew is best rendered generically
    as 'the slain' in English.
- source_word: בְּתוֹכְכֶם
  chosen: in your midst
  alternatives:
  - among you
  - within you
  lexicon: HALOT
  rationale: The phrase indicates location among the people. 'In your midst' is a
    natural English rendering that preserves the solemn prophetic tone.
- source_word: וִידַעְתֶּם
  chosen: you will know
  alternatives:
  - you shall know
  - then you will know
  lexicon: HALOT
  rationale: The verb expresses the recognition formula common in Ezekiel. 'You will
    know' is clear modern English and preserves the future/resultative sense.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: This is Ezekiel's covenant-recognition formula. Per doctrine guidelines,
    יְהוָה is rendered 'the LORD' in the main text, while 'Yahweh' is preserved as
    an alternative in a footnote-worthy note.
