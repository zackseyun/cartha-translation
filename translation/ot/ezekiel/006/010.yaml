id: EZK.6.10
reference: Ezekiel 6:10
source:
  edition: WLC
  text: וְ/יָדְע֖וּ כִּֽי אֲנִ֣י יְהוָ֑ה לֹ֤א אֶל חִנָּם֙ דִּבַּ֔רְתִּי לַ/עֲשׂ֥וֹת לָ/הֶ֖ם הָ/רָעָ֥ה הַ/זֹּֽאת־־׃פ
translation:
  text: Then they will know that I am Yahweh; I did not speak in vain when I said I would bring this disaster upon them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I did not speak for nothing' or 'I did not speak without cause.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'this evil'; here the word refers to calamity or disaster brought as judgment, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries future/resultative sense after preceding judgment statements. 'Then' brings out the consequential force in context, while 'know' preserves the covenant-recognition formula.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I am Yahweh
  lexicon: HALOT
  rationale: Standard recognition formula in Ezekiel. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'That I am' is retained formally to preserve the formula's theological weight.
- source_word: לֹא אֶל חִנָּם
  chosen: not in vain
  alternatives:
  - not for nothing
  - not without cause
  lexicon: HALOT
  rationale: The idiom conveys that YHWH's speech was not empty, idle, or without effect. 'In vain' is concise and idiomatic in English while preserving the sense of non-empty speech.
- source_word: דִּבַּרְתִּי
  chosen: I did not speak
  alternatives:
  - I have not spoken
  - I did not say
  lexicon: HALOT
  rationale: The verb is 'speak,' and retaining it preserves the emphasis on the efficacy and seriousness of divine speech. English past tense fits the prophetic retrospective framing.
- source_word: לַעֲשׂוֹת לָהֶם
  chosen: when I said I would bring ... upon them
  alternatives:
  - to do to them
  - to inflict on them
  lexicon: HALOT
  rationale: Literally 'to do to them,' but in English this is awkward with the following object. The infinitive expresses intended action resulting from the prior speech; 'bring ... upon them' is a natural equivalent that keeps the causative sense without over-paraphrasing.
- source_word: הָרָעָה הַזֹּאת
  chosen: this disaster
  alternatives:
  - this evil
  - this calamity
  lexicon: HALOT
  rationale: רָעָה here refers to covenant judgment/disaster, not moral evil committed by God. 'Disaster' communicates punitive calamity clearly in modern English and avoids implying moral evil in God's action.
