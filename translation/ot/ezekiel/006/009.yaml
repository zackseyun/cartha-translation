id: EZK.6.9
reference: Ezekiel 6:9
source:
  edition: WLC
  text: וְ/זָכְר֨וּ פְלִֽיטֵי/כֶ֜ם אוֹתִ֗/י בַּ/גּוֹיִם֮ אֲשֶׁ֣ר נִשְׁבּוּ שָׁם֒ אֲשֶׁ֨ר
    נִשְׁבַּ֜רְתִּי אֶת לִבָּ֣/ם הַ/זּוֹנֶ֗ה אֲשֶׁר סָר֙ מֵֽ/עָלַ֔/י וְ/אֵת֙ עֵֽינֵי/הֶ֔ם
    הַ/זֹּנ֕וֹת אַחֲרֵ֖י גִּלּֽוּלֵי/הֶ֑ם וְ/נָקֹ֨טּוּ֙ בִּ/פְנֵי/הֶ֔ם אֶל הָֽ/רָעוֹת֙
    אֲשֶׁ֣ר עָשׂ֔וּ לְ/כֹ֖ל תּוֹעֲבֹתֵי/הֶֽם־־־־׃
translation:
  text: Then your survivors will remember me among the nations where they were taken
    captive, when I have broken their whoring heart that turned away from me, and
    their eyes that whored after their idols; and they will loathe themselves for
    the evils they committed in all their abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when I was broken by their whoring heart that turned away from me.'
      The Hebrew verb can be understood this way by some interpreters, emphasizing
      the LORD's grief over their unfaithfulness.
    reason: alternative_reading
  - marker: b
    text: The Hebrew uses prostitution imagery ('whoring heart,' 'eyes that whored')
      as a metaphor for covenant unfaithfulness and idolatry.
    reason: cultural_note
  - marker: c
    text: '''Idols'' translates a contemptuous Hebrew term often used by Ezekiel for
      false gods; it may carry a pejorative nuance such as ''filthy idols.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכְרוּ
  chosen: Then ... will remember
  alternatives:
  - and ... will remember
  lexicon: HALOT
  rationale: The waw with qatal in prophetic discourse can advance the sequence/result.
    'Then' brings out the consequential sense in context without over-paraphrasing,
    while preserving the basic meaning 'remember'.
- source_word: פְלִיטֵיכֶם
  chosen: your survivors
  alternatives:
  - your fugitives
  - those of you who escape
  lexicon: HALOT
  rationale: The noun denotes those who have escaped destruction. 'Survivors' is natural
    modern English and fits the judgment context.
- source_word: בגוים
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים here refers to foreign peoples/lands of exile. 'Among the nations'
    is idiomatic and avoids importing NT-era 'Gentiles' nuance.
- source_word: אשר נשבו שם
  chosen: where they were taken captive
  alternatives:
  - where they were carried away captive
  - where they were exiled there
  lexicon: HALOT
  rationale: The Niphal of שבה indicates being taken captive. 'Where they were taken
    captive' is clear, natural, and faithful.
- source_word: אשר נשברתי
  chosen: when I have broken
  alternatives:
  - when I was broken
  - because I was broken over
  lexicon: HALOT
  rationale: 'The form is best taken as first person singular with God as subject:
    ''I have broken.'' This yields coherent sense in context: God breaks their adulterous
    heart in judgment leading to repentance. Some construe it as passive/reflexive
    (''I was broken/grieved''), but the active reading better fits the syntax with
    direct object ''their heart'' and the Masoretic pointing.'
- source_word: לבם הזונה
  chosen: their whoring heart
  alternatives:
  - their adulterous heart
  - their prostitute heart
  - their unfaithful heart
  lexicon: HALOT
  rationale: זנה is Ezekiel's recurring metaphor for covenantal infidelity expressed
    as sexual unfaithfulness. 'Whoring heart' preserves the metaphor's shock and concreteness
    better than the softened 'unfaithful heart.'
- source_word: אשר סר מעלי
  chosen: that turned away from me
  alternatives:
  - that departed from me
  - that turned aside from me
  lexicon: HALOT
  rationale: סר conveys turning aside/departing. 'Turned away from me' is idiomatic
    and preserves relational apostasy.
- source_word: עיניהם הזנות אחרי גלוליהם
  chosen: their eyes that whored after their idols
  alternatives:
  - their eyes that played the prostitute after their idols
  - their eyes that lusted after their idols
  lexicon: HALOT
  rationale: The phrase continues the prostitution metaphor, now with 'eyes' as the
    organ of desire. 'Whored after' keeps the metaphor consistent and vivid. גלולים
    is Ezekiel's contemptuous term for idols; 'idols' is the standard clear rendering.
- source_word: גלוליהם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their filthy idols
  lexicon: HALOT
  rationale: Though the Hebrew term is pejorative and possibly carries a contemptuous
    nuance, 'idols' is the established core sense. The stronger pejorative possibilities
    are better noted in a footnote than forced into the main text.
- source_word: ונקטו בפניהם
  chosen: they will loathe themselves
  alternatives:
  - they will feel disgust in their own sight
  - they will be disgusted before themselves
  lexicon: HALOT
  rationale: The idiom expresses self-loathing or revulsion. 'Loathe themselves' captures
    the sense in natural English; the reflexive force is supplied from the idiom and
    context.
- source_word: אל הרעות
  chosen: for the evils
  alternatives:
  - because of the evils
  - over the evils
  lexicon: HALOT
  rationale: The preposition here marks the object/cause of their loathing. 'For the
    evils' is concise and idiomatic in English.
- source_word: לכל תועבותיהם
  chosen: in all their abominations
  alternatives:
  - all their abominable deeds
  - all their detestable practices
  lexicon: HALOT
  rationale: תועבות is a weighty covenantal term for detestable practices, especially
    idolatrous ones. 'Abominations' preserves that theological and rhetorical force.
