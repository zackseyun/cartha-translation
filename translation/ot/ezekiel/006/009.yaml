theological_decisions:
- issue: Meaning of 'I have broken their whoring heart'
  chosen_reading: God is the subject who breaks their adulterous heart in judgment,
    leading to remembrance and self-loathing.
  alternative_readings:
  - God says he was broken by their whoring heart
  - The verb is read as passive/reflexive expressing divine grief
  rationale: 'The Masoretic vocalization and direct object marker favor the active
    reading ''I have broken their heart.'' This also fits the flow of the verse: exile,
    divine breaking, remembrance, and repentance. The alternative of divine grief
    is ancient and interpretively significant, so it is preserved in a footnote rather
    than adopted in the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it; document
    alternatives where ambiguity is genuine.
