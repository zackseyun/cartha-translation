theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Pejorative nuance of גִּלּוּלִים
  chosen_reading: idols in the main text, with pejorative nuance preserved in a footnote
  alternative_readings:
  - dung-idols
  - filthy idols
  rationale: The Hebrew term is contemptuous, but a highly literal pejorative gloss in the main text would sound unnatural in English. A footnote preserves the rhetorical force without sacrificing readability.
