id: EZK.6.13
reference: Ezekiel 6:13
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּם֙ כִּֽי אֲנִ֣י יְהוָ֔ה בִּֽ/הְי֣וֹת חַלְלֵי/הֶ֗ם בְּ/תוֹךְ֙ גִּלּ֣וּלֵי/הֶ֔ם סְבִיב֖וֹת מִזְבְּחֽוֹתֵי/הֶ֑ם אֶל֩ כָּל גִּבְעָ֨ה רָמָ֜ה בְּ/כֹ֣ל רָאשֵׁ֣י הֶ/הָרִ֗ים וְ/תַ֨חַת כָּל עֵ֤ץ רַֽעֲנָן֙ וְ/תַ֨חַת֙ כָּל אֵלָ֣ה עֲבֻתָּ֔ה מְק֗וֹם אֲשֶׁ֤ר נָֽתְנוּ שָׁם֙ רֵ֣יחַ נִיחֹ֔חַ לְ/כֹ֖ל גִּלּוּלֵי/הֶֽם־־׀־־־׃
translation:
  text: Then you will know that I am Yahweh, when their slain lie among their idols, all around their altars, on every high hill, on all the mountaintops, and under every green tree and under every leafy terebinth—the places where they offered a pleasing aroma to all their idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a strongly contemptuous term for idols, sometimes rendered more literally as 'dung-idols' or 'filthy idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  - So you will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries a future/result sense. 'Then' fits the consequential force in context without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and standard English Bible practice.
- source_word: בִּהְיוֹת
  chosen: when
  alternatives:
  - in the being of
  - as
  lexicon: HALOT
  rationale: The infinitive construct with beth introduces the circumstance/time in which they will know; idiomatic English is 'when'.
- source_word: חַלְלֵיהֶם
  chosen: their slain
  alternatives:
  - their pierced
  - their dead
  lexicon: HALOT
  rationale: Refers to those killed violently. 'Slain' preserves the judgment context more sharply than the broader 'dead'.
- source_word: בְּתוֹךְ גִּלּוּלֵיהֶם
  chosen: among their idols
  alternatives:
  - in the midst of their idols
  lexicon: HALOT
  rationale: Idiomatic rendering of spatial relation. 'Among' is natural English and preserves the image of corpses lying amidst cult objects.
- source_word: גִּלּוּלֵיהֶם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their filthy idols
  lexicon: HALOT
  rationale: The term is a strongly pejorative word for idols. Main text uses the standard 'idols' for readability; the pejorative nuance is worth preserving in a footnote.
- source_word: סְבִיבוֹת מִזְבְּחוֹתֵיהֶם
  chosen: all around their altars
  alternatives:
  - around their altars
  - surrounding their altars
  lexicon: HALOT
  rationale: Expresses location encircling the altars. 'All around' captures the distributive fullness of the scene.
- source_word: אֶל כָּל גִּבְעָה רָמָה
  chosen: on every high hill
  alternatives:
  - at every high hill
  lexicon: HALOT
  rationale: Though אֶל often means 'to/toward,' here in a locative listing it functions idiomatically with the following cult-site locations. 'On every high hill' is the most natural English in context.
- source_word: בְּכֹל רָאשֵׁי הֶהָרִים
  chosen: on all the mountaintops
  alternatives:
  - on every mountain summit
  - at all the heads of the mountains
  lexicon: HALOT
  rationale: '''Heads of the mountains'' is a Hebrew idiom for summits. ''Mountaintops'' is clear modern English.'
- source_word: תַחַת כָּל עֵץ רַעֲנָן
  chosen: under every green tree
  alternatives:
  - under every leafy tree
  - under every flourishing tree
  lexicon: HALOT
  rationale: This is a stock phrase for illicit worship sites. 'Green tree' preserves the familiar prophetic idiom and the literal imagery.
- source_word: תַחַת כָּל אֵלָה עֲבֻתָּה
  chosen: under every leafy terebinth
  alternatives:
  - under every thick terebinth
  - under every spreading oak
  lexicon: HALOT
  rationale: אֵלָה most likely denotes the terebinth rather than a generic oak. 'Leafy' renders the dense/luxuriant sense of עֲבֻתָּה in accessible English.
- source_word: מְקוֹם אֲשֶׁר
  chosen: the places where
  alternatives:
  - the place where
  lexicon: HALOT
  rationale: Although מְקוֹם is singular in form, it functions collectively after a series of plural locations. English plural smooths the syntax and matches the distributive sense.
- source_word: נָתְנוּ שָׁם
  chosen: they offered there
  alternatives:
  - they placed there
  - they gave there
  lexicon: HALOT
  rationale: נתן with sacrificial object in cultic context means to present/offer, not merely to place.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling savor
  lexicon: HALOT
  rationale: Standard sacrificial idiom. 'Pleasing aroma' is clear modern English and preserves the cultic sense without archaic phrasing.
- source_word: לְכֹל גִּלּוּלֵיהֶם
  chosen: to all their idols
  alternatives:
  - for all their idols
  lexicon: HALOT
  rationale: The preposition marks the recipient/beneficiary of the offerings. 'To' is the most direct rendering.
