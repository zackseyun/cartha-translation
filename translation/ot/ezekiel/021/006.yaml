id: EZK.21.6
reference: Ezekiel 21:6
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the prophetic formula ויהי דבר־יהוה אלי, English idiom is best represented by 'came' rather than the more wooden 'was.' This preserves the standard sense of the revelatory formula without unnecessary stiffness.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר in this formula refers to the divine word/message. 'The word' preserves the established prophetic formula and keeps the connection to revelatory speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition and pronominal suffix straightforwardly indicate direction toward the prophet; 'to me' is natural modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces the following divine speech. 'Saying,' is the standard and clear English rendering.
