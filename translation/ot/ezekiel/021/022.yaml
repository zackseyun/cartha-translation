theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Idiomatic expression of divine wrath coming to rest
  chosen_reading: I will satisfy my wrath
  alternative_readings:
  - I will cause my wrath to rest
  - I will appease my fury
  rationale: The Hebrew idiom expresses wrath being brought to rest through execution of judgment, not emotional self-soothing. 'Satisfy my wrath' preserves the judicial force without over-paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense without flattening theological weight'
