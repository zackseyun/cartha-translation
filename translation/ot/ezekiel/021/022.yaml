id: EZK.21.22
reference: Ezekiel 21:22
source:
  edition: WLC
  text: וְ/גַם אֲנִ֗י אַכֶּ֤ה כַפִּ/י֙ אֶל כַּפִּ֔/י וַ/הֲנִחֹתִ֖י חֲמָתִ֑/י אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי־־׃פ
translation:
  text: And I too will strike my hands together, and I will satisfy my wrath. I, Yahweh, have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'I will strike my hand to my hand,' an idiom for striking or clapping the hands together in emphatic judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will cause my wrath to rest.' The Hebrew idiom means that the LORD's wrath will be brought to rest by being fully carried out.
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: And I too
  alternatives:
  - And also I
  - Moreover I
  lexicon: HALOT
  rationale: Conveys both the conjunction and the additive/emphatic force of גַם with the pronoun אֲנִי. 'Too' is natural modern English and preserves the emphasis.
- source_word: אַכֶּה
  chosen: will strike
  alternatives:
  - will clap
  - will smite
  lexicon: HALOT
  rationale: Hiphil of נכה here denotes a striking action. Because the object is 'my hand ... to my hand,' English can express the idiom as striking the hands together. 'Clap' is possible, but may sound celebratory; 'strike' better preserves the forceful, judicial context.
- source_word: כַפִּי אֶל כַּפִּי
  chosen: my hands together
  alternatives:
  - my hand against my hand
  - the palm of my hand against the palm of my hand
  lexicon: HALOT
  rationale: Literally 'my palm/hand to my palm/hand,' an idiom for striking one's hands together. 'My hands together' gives idiomatic English while retaining the physical image.
- source_word: וַהֲנִחֹתִי
  chosen: I will satisfy
  alternatives:
  - I will cause to rest
  - I will appease
  - I will quiet
  lexicon: HALOT
  rationale: 'From נוח in a causative sense: to cause something to rest or settle. With ''my wrath'' as object, the sense is that divine fury is brought to rest by being fully expended. ''Satisfy'' communicates this idiom clearly in English.'
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  - my indignation
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning anger or wrath. 'Wrath' fits prophetic judgment language in readable modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  - spoke
  lexicon: HALOT
  rationale: The perfect here functions as a solemn divine declaration formula. 'Have spoken' is the standard and weighty English rendering in prophetic speech.
