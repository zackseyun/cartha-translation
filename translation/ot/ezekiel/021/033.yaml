id: EZK.21.33
reference: Ezekiel 21:33
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם הִנָּבֵ֤א וְ/אָֽמַרְתָּ֙ כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהֹוִ֔ה אֶל בְּנֵ֥י עַמּ֖וֹן וְ/אֶל חֶרְפָּתָ֑/ם וְ/אָמַרְתָּ֗ חֶ֣רֶב חֶ֤רֶב פְּתוּחָה֙ לְ/טֶ֣בַח מְרוּטָ֔ה לְ/הָכִ֖יל לְמַ֥עַן בָּרָֽק־־־׃
translation:
  text: 'And you, son of man, prophesy and say, ‘Thus says the Lord GOD concerning the sons of Ammon and concerning their reproach’: And you shall say, ‘A sword, a sword, drawn for slaughter, polished for devouring, so that it flashes like lightning.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ammonites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their taunt' or 'their reviling.'
    reason: lexical_alternative
  - marker: c
    text: Or 'unsheathed for slaughter, burnished to devour, to flash like lightning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. A relatively formal rendering preserves the recurring idiom and its literary force better than a more interpretive alternative.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD' in general; in the compound אֲדֹנָי יְהוִה, standard English convention uses 'Lord GOD' to avoid 'Lord LORD' while preserving both elements.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: A more formal rendering keeps the Hebrew filial expression. 'Ammonites' is idiomatic English, but 'sons of Ammon' better reflects the source and remains understandable.
- source_word: חֶרְפָּתָם
  chosen: their reproach
  alternatives:
  - their taunt
  - their disgrace
  - their reviling
  lexicon: HALOT
  rationale: The noun can denote reproach, insult, or taunting scorn. 'Their reproach' stays close to the Hebrew and can encompass the hostile contempt directed against Israel/Judah in context.
- source_word: חֶרֶב חֶרֶב
  chosen: A sword, a sword
  alternatives:
  - Sword, sword
  - A sword! A sword!
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved rather than smoothed out. Including the article in English yields natural syntax while retaining the force of the doubled noun.
- source_word: פְּתוּחָה
  chosen: drawn
  alternatives:
  - unsheathed
  - opened
  lexicon: HALOT
  rationale: In sword imagery the participle refers to being drawn/unsheathed. 'Drawn' is idiomatic modern English and fits the martial context.
- source_word: לְטֶבַח
  chosen: for slaughter
  alternatives:
  - for the slaughter
  - for killing
  lexicon: HALOT
  rationale: This prepositional phrase expresses purpose. 'For slaughter' is concise and preserves the severity of the image.
- source_word: מְרוּטָה
  chosen: polished
  alternatives:
  - sharpened
  - burnished
  lexicon: HALOT
  rationale: Elsewhere in this sword oracle the term carries the sense of being polished/burnished to gleam. 'Polished' best fits the following reference to flashing.
- source_word: לְהָכִיל
  chosen: to consume
  alternatives:
  - to devour
  - to contain
  lexicon: HALOT
  rationale: In this violent context the sense is not 'contain' but destructive consumption/devouring. 'To consume' is natural English and suits sword imagery.
- source_word: לְמַעַן בָּרָק
  chosen: so that it flashes like lightning
  alternatives:
  - for flashing
  - so that there may be lightning-like flashing
  - to flash
  lexicon: HALOT
  rationale: The phrase is terse and elliptical. בָּרָק denotes lightning/flash; the sense is that the polished sword gleams with lightning-like brilliance. This rendering makes the Hebrew idiom intelligible in English without overexpanding it.
