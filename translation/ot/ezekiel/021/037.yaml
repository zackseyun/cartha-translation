id: EZK.21.37
reference: Ezekiel 21:37
source:
  edition: WLC
  text: לָ/אֵ֤שׁ תִּֽהְיֶה֙ לְ/אָכְלָ֔ה דָּמֵ֥/ךְ יִהְיֶ֖ה בְּ/ת֣וֹךְ הָ/אָ֑רֶץ לֹ֣א תִזָּכֵ֔רִי כִּ֛י אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי׃פ
translation:
  text: You will be fuel for the fire; your blood will be in the midst of the land. You will not be remembered, for I, Yahweh, have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your bloodguilt will be in the midst of the land.' The Hebrew literally reads 'your blood,' which in context may imply bloodshed or bloodguilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאֵשׁ
  chosen: for the fire
  alternatives:
  - to the fire
  - as fire
  lexicon: HALOT
  rationale: 'The prefixed ל marks destination/result: the addressee is consigned to fire. In idiomatic English with the following לְאָכְלָה, ''for the fire'' works naturally and preserves the judgment imagery.'
- source_word: תִּהְיֶה
  chosen: you will be
  alternatives:
  - you shall be
  lexicon: HALOT
  rationale: Qal imperfect of היה with 2fs sense from context addresses the feminine singular city/personified entity. 'Will be' is straightforward modern English.
- source_word: לְאָכְלָה
  chosen: fuel
  alternatives:
  - for consumption
  - to be devoured
  - for food
  lexicon: HALOT
  rationale: אָכְלָה literally denotes something for eating/consumption. In the collocation with fire, idiomatic English is 'fuel for the fire,' conveying destruction by burning without awkward literalism.
- source_word: דָּמֵךְ
  chosen: your blood
  alternatives:
  - your bloodguilt
  lexicon: HALOT
  rationale: The noun is literally 'your blood.' In judgment contexts it can imply bloodshed or bloodguilt, but the direct rendering 'your blood' best preserves the Hebrew image while allowing the context of violent guilt to remain implicit.
- source_word: בְּתוֹךְ הָאָרֶץ
  chosen: in the midst of the land
  alternatives:
  - in the middle of the land
  - within the land
  lexicon: HALOT
  rationale: בְּתוֹךְ is more vivid than simple 'in'; 'in the midst of the land' preserves the solemn, public sense of blood being exposed within the land.
- source_word: לֹא תִזָּכֵרִי
  chosen: you will not be remembered
  alternatives:
  - you will not be mentioned
  - you will not be brought to remembrance
  lexicon: HALOT
  rationale: 'Niphal of זכר here is passive/reflexive: the city/entity will pass into oblivion. ''Remembered'' is the clearest natural English equivalent.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  - spoke
  lexicon: HALOT
  rationale: Perfect of דבר in prophetic judgment formulas often carries performative finality. 'Have spoken' preserves the solemn formula and echoes common prophetic idiom.
