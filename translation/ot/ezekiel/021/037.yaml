theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make explicit the implied bloodguilt in דָּמֵךְ
  chosen_reading: your blood
  alternative_readings:
  - your bloodguilt
  rationale: The Hebrew text says 'your blood.' Although the context of judgment may imply bloodguilt, making that implication explicit in the main text would over-interpret. The more literal rendering preserves the image and theological force without importing an explanatory gloss.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
