id: EZK.21.18
reference: Ezekiel 21:18
source:
  edition: WLC
  text: כִּ֣י בֹ֔חַן וּ/מָ֕ה אִם גַּם שֵׁ֥בֶט מֹאֶ֖סֶת לֹ֣א יִֽהְיֶ֑ה נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃פ
translation:
  text: For there is a testing; and what if even the scepter that despises will not remain? declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For there is a testing; and what if even the despising scepter will be no more?' The Hebrew of this verse is notably difficult, especially the clause about the scepter.
    reason: alternative_reading
  - marker: b
    text: Hebrew שֵׁבֶט can mean 'scepter,' 'rod,' or 'tribe.' Here 'scepter' is chosen because the context favors royal/judicial imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation or grounding statement from the preceding context. 'For' best preserves the connective force in readable English.
- source_word: בֹחַן
  chosen: there is a testing
  alternatives:
  - it is a test
  - a testing comes
  - an assaying
  lexicon: HALOT
  rationale: From בחן, 'to test/examine/assay.' The form is terse and elliptical; 'there is a testing' preserves the nominal/verbal ambiguity without over-specifying the subject.
- source_word: וּמָה
  chosen: and what if
  alternatives:
  - and what?
  - but what if
  - and how?
  lexicon: HALOT
  rationale: The phrase introduces a difficult rhetorical question. 'And what if' best captures the forward-looking, conditional force in context.
- source_word: אִם גַּם
  chosen: even
  alternatives:
  - if also
  - indeed even
  - if even
  lexicon: HALOT
  rationale: Taken together with וּמָה, the particles intensify the rhetorical question. 'Even' is concise English that preserves the emphasis.
- source_word: שֵׁבֶט
  chosen: scepter
  alternatives:
  - rod
  - tribe
  - staff
  lexicon: HALOT
  rationale: In this judgment context, שֵׁבֶט most naturally refers to a ruler's rod/scepter rather than 'tribe.' 'Scepter' fits the royal/judicial imagery and the nearby sword oracle.
- source_word: מֹאֶסֶת
  chosen: that despises
  alternatives:
  - that rejects
  - that scorns
  - despising
  lexicon: HALOT
  rationale: From מאס, 'reject/despise.' Rendered as a relative clause modifying 'scepter' to make the Hebrew participial construction intelligible in English while preserving the active sense.
- source_word: לֹא יִהְיֶה
  chosen: will not remain
  alternatives:
  - will not be
  - shall cease to exist
  - will not continue
  lexicon: HALOT
  rationale: Literally 'will not be,' but in context the sense is that the despising scepter will not endure. 'Will not remain' expresses the implied result more naturally without excessive paraphrase.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic modern English for נְאֻם. Per doctrine, יְהוָה is rendered 'the LORD'; because אֲדֹנָי precedes it, 'Lord GOD' avoids 'Lord LORD' and follows established English convention.
