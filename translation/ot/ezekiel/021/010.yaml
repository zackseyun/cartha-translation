id: EZK.21.10
reference: Ezekiel 21:10
source:
  edition: WLC
  text: וְ/יָֽדְעוּ֙ כָּל בָּשָׂ֔ר כִּ֚י אֲנִ֣י יְהוָ֔ה הוֹצֵ֥אתִי חַרְבִּ֖/י מִ/תַּעְרָ֑/הּ לֹ֥א תָשׁ֖וּב עֽוֹד־׃ס
translation:
  text: And all flesh will know that I, Yahweh, have drawn my sword from its sheath; it will not return again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity' or 'all people'; literally 'all flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And ... will know
  alternatives:
  - and ... shall know
  - and ... must know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries a future/result sense. 'Will know' is natural modern English and preserves the recognition formula common in Ezekiel.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - everyone
  - all humanity
  - all people
  lexicon: HALOT
  rationale: Literally 'all flesh.' Kept in the main text because it is a common biblical idiom with rhetorical force, broader than merely Israel, and remains understandable in modern English.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I, the LORD,
  alternatives:
  - that I am the LORD
  - for I, the LORD,
  lexicon: HALOT
  rationale: The clause identifies the speaker emphatically. English supplies commas for apposition. 'the LORD' follows the project's required rendering of יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הוֹצֵאתִי
  chosen: have drawn
  alternatives:
  - have brought out
  - have taken out
  - have unsheathed
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'bring out/cause to go out.' With 'sword' and 'from its sheath,' idiomatic English is 'have drawn.' This preserves the martial image without unnecessary stiffness.
- source_word: חַרְבִּי
  chosen: my sword
  lexicon: HALOT
  rationale: Straightforward possessive noun; no reason to vary from the standard gloss.
- source_word: מִתַּעְרָהּ
  chosen: from its sheath
  alternatives:
  - out of its scabbard
  lexicon: HALOT
  rationale: '''Sheath'' is the most natural modern English equivalent for the container of a sword. ''Its'' reflects the feminine singular suffix referring back to ''sword'' as a grammatical antecedent in Hebrew, rendered idiomatically in English.'
- source_word: לֹא תָשׁוּב עוֹד
  chosen: it will not return again
  alternatives:
  - it will not return anymore
  - it will never return
  lexicon: HALOT
  rationale: The feminine singular verb refers to the sword. 'Will not return again' preserves both the negation and עוֹד ('again/any longer'). 'Never return' would slightly overstate the temporal force.
