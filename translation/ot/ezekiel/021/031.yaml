  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpreting the elliptical phrase זֹאת לֹא זֹאת
  chosen_reading: This will not remain the same
  alternative_readings:
  - This shall be no more
  - This is not this
  - This will not be as it was
  rationale: The phrase is syntactically compressed and functions as a declaration that the current state/order is overturned. The chosen rendering preserves the prophetic force of discontinuity without forcing a narrower interpretation than the Hebrew warrants.
