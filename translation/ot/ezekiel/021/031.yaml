id: EZK.21.31
reference: Ezekiel 21:31
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הָסִיר֙ הַ/מִּצְנֶ֔פֶת וְ/הָרִ֖ים הָֽ/עֲטָרָ֑ה זֹ֣את לֹא זֹ֔את הַ/שָּׁפָ֣לָה הַגְבֵּ֔הַ וְ/הַ/גָּבֹ֖הַ הַשְׁפִּֽיל־׃
translation:
  text: 'Thus says the Lord GOD: Remove the turban, and take off the crown. This will not remain the same: exalt the lowly, and humble the exalted.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This shall be no more,' or 'This will not be as it was.' The Hebrew is terse and elliptical, emphasizing that the present order is being overturned.
    reason: alternative_reading
  - marker: b
    text: '''Turban'' may specifically refer to a priestly headdress; ''crown'' refers to royal authority. The verse announces the removal of established leadership symbols.'
    reason: cultural_note
lexical_decisions:
- source_word: הָסִיר
  chosen: Remove
  alternatives:
  - Take away
  lexicon: HALOT
  rationale: Hiphil imperative of סור/סיר gives a causative command to remove or take away. 'Remove' is concise and fits the direct prophetic command.
- source_word: הַמִּצְנֶפֶת
  chosen: the turban
  alternatives:
  - the mitre
  - the headdress
  lexicon: HALOT
  rationale: מִצְנֶפֶת denotes a wrapped headpiece, often a priestly turban. 'Turban' is the plain English equivalent; 'mitre' is traditional but archaic/ecclesiastical.
- source_word: וְהָרִים
  chosen: and take off
  alternatives:
  - and lift up
  - and remove
  lexicon: HALOT
  rationale: Hiphil imperative of רום literally means 'raise/lift up,' but with an object like a crown in this removal context it idiomatically means to lift off/remove. 'Take off' communicates the action naturally in English while preserving the command.
- source_word: הָעֲטָרָה
  chosen: the crown
  alternatives:
  - the diadem
  lexicon: HALOT
  rationale: עֲטָרָה is a crown or wreath. 'Crown' is the broad, natural rendering. 'Diadem' is possible but less accessible and more specialized.
- source_word: זֹאת לֹא זֹאת
  chosen: This will not remain the same
  alternatives:
  - This is not this
  - This shall be no more
  - This will not be as it was
  lexicon: HALOT
  rationale: The Hebrew is terse and elliptical. It signals radical reversal or discontinuity in the present order. 'This will not remain the same' captures the sense in readable English without over-paraphrasing.
- source_word: הַשָּׁפָלָה הַגְבֵּהַ
  chosen: exalt the lowly
  alternatives:
  - raise up the low
  - make high the lowly
  lexicon: HALOT
  rationale: The adjective שָׁפָל means low/lowly/humble. The following verb in Hiphil means make high/exalt. 'Exalt the lowly' preserves the reversal motif and reads naturally.
- source_word: וְהַגָּבֹהַ הַשְׁפִּיל
  chosen: and humble the exalted
  alternatives:
  - and bring low the high
  - and abase the lofty
  lexicon: HALOT
  rationale: גָּבֹהַ means high/exalted, and the Hiphil of שׁפל means make low/humble. 'Humble the exalted' mirrors the previous clause and preserves the reversal theme.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'the Lord GOD,' preserving both elements idiomatically.
