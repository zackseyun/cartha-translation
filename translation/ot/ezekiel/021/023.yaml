id: EZK.21.23
reference: Ezekiel 21:23
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Then ... came
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential introduction. In English, the idiomatic prophetic formula is best rendered by carrying the conjunction forward and expressing the event through the following verb 'came' rather than the wooden 'and it happened.'
- source_word: דְבַר
  chosen: the word of
  alternatives:
  - a word of
  - the message of
  lexicon: HALOT
  rationale: In the construct phrase דְבַר יְהוָה, the established and contextually precise sense is 'the word of.' 'Message' is possible dynamically, but 'word' preserves the prophetic formula and its theological resonance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: 'The preposition plus first-person singular suffix straightforwardly indicates direction toward the prophet: ''to me.'' ''Unto me'' is unnecessarily archaic.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct introducing direct speech is idiomatically rendered 'saying' in English prophetic discourse.
