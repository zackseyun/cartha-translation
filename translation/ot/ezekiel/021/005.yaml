id: EZK.21.5
reference: Ezekiel 21:5
source:
  edition: WLC
  text: וָ/אֹמַ֕ר אֲהָ֖הּ אֲדֹנָ֣/י יְהוִ֑ה הֵ֚מָּה אֹמְרִ֣ים לִ֔/י הֲ/לֹ֛א מְמַשֵּׁ֥ל מְשָׁלִ֖ים הֽוּא׃פ
translation:
  text: Then I said, “Ah, Lord GOD! They are saying of me, ‘Is he not a speaker of parables?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are saying to me, “Is he not speaking parables?”' The Hebrew may be taken either as what they say to Ezekiel or as what they say about him.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'mashal mashalim,' literally 'one who speaks parables/proverbs.' The phrase can also suggest figurative or enigmatic speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive with first person singular verb advances the narrative. 'Then I said' gives natural English narrative flow while preserving sequence.
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Aha
  - Alas
  lexicon: HALOT
  rationale: An interjection of distress or lament. 'Ah' is idiomatic and restrained in modern English; 'alas' is possible but more archaic, while 'aha' can sound triumphant in English, which is not the sense here.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines 'Adonai' with the divine name YHWH. Following the doctrine default for יְהוָה as 'the LORD' and standard English convention in this collocation, 'Lord GOD' avoids the awkward 'Lord LORD' while signaling the underlying title-name combination.
- source_word: הֵמָּה אֹמְרִים לִי
  chosen: They are saying of me
  alternatives:
  - They are saying to me
  - They say about me
  lexicon: HALOT
  rationale: Although לִי often means 'to me,' in this context the complaint is about how the people characterize Ezekiel, not merely what they say in his hearing. 'Of me' best captures the idiomatic force in context; 'to me' is possible but less likely.
- source_word: הֲלֹא
  chosen: Is he not
  alternatives:
  - Isn't he
  - Does he not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is he not' preserves the rhetorical force in a slightly more formal register suitable to prophetic discourse.
- source_word: מְמַשֵּׁל מְשָׁלִים
  chosen: just speaking parables
  alternatives:
  - uttering parables
  - speaking in riddles
  - making allegories
  lexicon: HALOT
  rationale: The verbal-nominal pairing from משל emphasizes speaking in figurative sayings. 'Speaking parables' is the most transparent rendering in biblical English; adding 'just' reflects the dismissive tone of the people's complaint. 'Riddles' is too narrow, and 'allegories' too interpretive.
- source_word: הוּא
  chosen: he
  alternatives:
  - this man
  lexicon: HALOT
  rationale: The pronoun refers to Ezekiel in the quoted speech. 'He' is the direct and sufficient rendering.
