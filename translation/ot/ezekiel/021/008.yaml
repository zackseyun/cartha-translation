theological_decisions:
- issue: Scope of judgment in 'cut off from you both righteous and wicked'
  chosen_reading: The verse states that the coming sword-judgment will affect both righteous and wicked within the land, without explaining here how this relates to broader biblical themes of individual justice.
  alternative_readings:
  - The phrase could be taken rhetorically or corporately rather than as a denial of distinctions in God's justice.
  rationale: The translation preserves the stark tension of the Hebrew rather than softening it. The text explicitly names both categories, and the translation should not resolve the theological difficulty by paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
