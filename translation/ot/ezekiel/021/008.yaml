id: EZK.21.8
reference: Ezekiel 21:8
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֞ לְ/אַדְמַ֣ת יִשְׂרָאֵ֗ל כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֣י אֵלַ֔יִ/ךְ וְ/הוֹצֵאתִ֥י חַרְבִּ֖/י מִ/תַּעְרָ֑/הּ וְ/הִכְרַתִּ֥י מִמֵּ֖/ךְ צַדִּ֥יק וְ/רָשָֽׁע׃
translation:
  text: 'And say to the land of Israel, ‘Thus says Yahweh: Behold, I am against you, and I will draw my sword from its sheath and cut off from you both righteous and wicked.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the righteous and the wicked.' The Hebrew names both groups explicitly, underscoring the sweeping scope of the announced judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - the soil of Israel
  - the ground of Israel
  lexicon: HALOT
  rationale: אַדְמָה denotes ground/land; in prophetic address to the territory and its inhabitants, 'the land of Israel' is the most natural and idiomatic English rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנְנִי אֵלַיִךְ
  chosen: Behold, I am against you
  alternatives:
  - Look, I am against you
  - Here I am against you
  lexicon: HALOT
  rationale: The idiom הִנְנִי + אֶל conveys emphatic divine opposition or confrontation. 'Behold, I am against you' preserves both the deictic force and the adversative sense.
- source_word: וְהוֹצֵאתִי
  chosen: I will draw
  alternatives:
  - I will bring out
  - I will take out
  lexicon: HALOT
  rationale: With 'sword' and 'from its sheath,' the idiomatic English equivalent is 'draw,' though the underlying verb is literally 'bring out' or 'take out.'
- source_word: חַרְבִּי
  chosen: my sword
  lexicon: HALOT
  rationale: Straightforward possessive construction; the sword functions as an image of divine judgment.
- source_word: מִתַּעְרָהּ
  chosen: from its sheath
  alternatives:
  - out of its scabbard
  lexicon: HALOT
  rationale: תַּעַר refers to a sheath/scabbard for a sword. 'Sheath' is more common modern English while preserving the image.
- source_word: וְהִכְרַתִּי
  chosen: and cut off
  alternatives:
  - and destroy
  - and wipe out
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means 'cut off,' especially in judgment contexts. This preserves the concrete force of the Hebrew better than a more generalized 'destroy.'
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - out of you
  lexicon: HALOT
  rationale: Because the addressee is the land personified as feminine singular, 'from you' is the natural English rendering.
- source_word: צַדִּיק וְרָשָׁע
  chosen: both righteous and wicked
  alternatives:
  - the righteous and the wicked
  - righteous and evil-doer
  lexicon: HALOT
  rationale: The pair denotes the full scope of those affected by the coming judgment. 'Both righteous and wicked' makes the distributive force explicit and reads naturally in English.
