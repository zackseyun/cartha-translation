id: EZK.21.29
reference: Ezekiel 21:29
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ יַ֗עַן הַזְכַּרְ/כֶם֙ עֲוֺ֣נְ/כֶ֔ם בְּ/הִגָּל֣וֹת פִּשְׁעֵי/כֶ֗ם לְ/הֵֽרָאוֹת֙ חַטֹּ֣אותֵי/כֶ֔ם בְּ/כֹ֖ל עֲלִילֽוֹתֵי/כֶ֑ם יַ֚עַן הִזָּ֣כֶרְ/כֶ֔ם בַּ/כַּ֖ף תִּתָּפֵֽשׂוּ־׃פ
translation:
  text: 'Therefore thus says the Lord GOD: Because you have brought your guilt to remembrance by uncovering your transgressions, so that your sins are seen in all your deeds, because you have come to remembrance, you will be seized by the hand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have caused your guilt to be remembered.' The Hebrew uses repeated forms of 'remember' (זכר) for rhetorical effect throughout the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be captured in the hand,' that is, taken into an enemy's grasp.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.' Per doctrine, YHWH is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English tradition commonly avoids 'Lord LORD' by using 'Lord GOD.' This preserves the divine title distinction while remaining readable.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: Causal conjunction introducing the grounds for judgment; 'because' is the clearest modern equivalent.
- source_word: הַזְכַּרְכֶם
  chosen: you have brought ... to remembrance
  alternatives:
  - you have caused ... to be remembered
  - you have reminded
  lexicon: HALOT
  rationale: Hiphil of זכר is causative. The object is 'your guilt,' so the sense is that their conduct has caused their guilt to be remembered or called to mind. 'Brought ... to remembrance' preserves the causative nuance and echoes the repeated זכר wordplay in the verse.
- source_word: עֲוֺנְכֶם
  chosen: your guilt
  alternatives:
  - your iniquity
  - your punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or guilt-bearing consequence. Here, in parallel with transgressions and sins being exposed, 'guilt' best captures the state now brought into remembrance.
- source_word: בְּהִגָּלוֹת
  chosen: by uncovering
  alternatives:
  - when ... were uncovered
  - by revealing
  lexicon: HALOT
  rationale: Niphal infinitive construct of גלה with prefixed ב marks means or circumstance. 'By uncovering' preserves the exposure imagery and links their remembered guilt to the disclosure of their rebellion.
- source_word: פִּשְׁעֵיכֶם
  chosen: your transgressions
  alternatives:
  - your rebellions
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or transgression against authority. 'Transgressions' is idiomatic and fits the triad with guilt and sins.
- source_word: לְהֵרָאוֹת
  chosen: so that ... are seen
  alternatives:
  - to make ... appear
  - to show
  lexicon: HALOT
  rationale: 'Niphal infinitive of ראה here expresses result/purpose: their sins become visible. ''So that your sins are seen'' is natural English and preserves the passive sense.'
- source_word: חַטֹּאותֵיכֶם
  chosen: your sins
  alternatives:
  - your offenses
  lexicon: HALOT
  rationale: Standard rendering for חטאות in this moral context.
- source_word: עֲלִילוֹתֵיכֶם
  chosen: your deeds
  alternatives:
  - your acts
  - your practices
  lexicon: HALOT
  rationale: The term can denote deeds or actions, often with a negative coloring in prophetic contexts. 'Deeds' is concise and broad enough to cover all their conduct.
- source_word: הִזָּכֶרְכֶם
  chosen: you have come to remembrance
  alternatives:
  - you have been remembered
  - you have been brought to mind
  lexicon: HALOT
  rationale: 'Infinitive construct/passive-reflexive form from זכר continues the wordplay: not only their guilt but they themselves have come into remembrance before God/judgment. The English keeps the repetition audible.'
- source_word: בַּכַּף
  chosen: by the hand
  alternatives:
  - in the hand
  - by force
  lexicon: HALOT
  rationale: כַּף literally means palm/hand. In this idiom with נתפשׂ/תפשׂ, it conveys being taken into someone's grasp. 'By the hand' is a fairly literal rendering that preserves the image of capture.
- source_word: תִּתָּפֵשׂוּ
  chosen: you will be seized
  alternatives:
  - you will be captured
  - you will be taken
  lexicon: HALOT
  rationale: Niphal/imperfect of תפשׂ denotes being caught or seized. 'Seized' fits the judicial-military tone and works well with the hand imagery.
