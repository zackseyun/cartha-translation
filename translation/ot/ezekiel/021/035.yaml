id: EZK.21.35
reference: Ezekiel 21:35
source:
  edition: WLC
  text: הָשַׁ֖ב אֶל תַּעְרָ֑/הּ בִּ/מְק֧וֹם אֲשֶׁר נִבְרֵ֛את בְּ/אֶ֥רֶץ מְכֻרוֹתַ֖יִ/ךְ
    אֶשְׁפֹּ֥ט אֹתָֽ/ךְ־־׃
translation:
  text: Return to your sheath. In the place where you were created, in the land of
    your origins, I will judge you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Put back into its sheath.' The Hebrew directly says 'Return to her/its
      sheath,' with the sword personified.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the land of your birth' or 'nativity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָשַׁב
  chosen: Return
  alternatives:
  - Put back
  - Turn back
  lexicon: HALOT
  rationale: Imperative of שוב addressed to the sword personified as feminine in context.
    'Return' is concise and fits the command to go back.
- source_word: תַּעְרָהּ
  chosen: your sheath
  alternatives:
  - its sheath
  lexicon: HALOT
  rationale: תער means 'sheath/scabbard.' Because the imperative is 2ms but the object
    suffix is 3fs, the broader context personifies the sword; English idiom is best
    served by 'your sheath' to preserve the direct address rather than the awkward
    'its sheath.'
- source_word: בִּמְקוֹם
  chosen: In the place
  alternatives:
  - At the place
  lexicon: HALOT
  rationale: Straightforward locative phrase introducing the place of judgment.
- source_word: נִבְרֵאת
  chosen: you were created
  alternatives:
  - you were formed
  lexicon: HALOT
  rationale: Nifal of ברא normally means 'be created.' Though unusual for a sword,
    the metaphor likely refers to its being fashioned/prepared; 'created' preserves
    the Hebrew wording most directly.
- source_word: בְּאֶרֶץ מְכֻרוֹתַיִךְ
  chosen: in the land of your origins
  alternatives:
  - in the land of your birth
  - in the land of your nativity
  lexicon: HALOT
  rationale: מכורות can denote origins, birth, or nativity. 'Origins' is natural modern
    English and suits the metaphorical address to the sword or the nation represented
    by it.
- source_word: אֶשְׁפֹּט אֹתָךְ
  chosen: I will judge you
  alternatives:
  - I will execute judgment on you
  lexicon: HALOT
  rationale: שפט in first person singular with direct object is well rendered 'I will
    judge you.' The stronger judicial nuance is possible but not required in English
    main text.
