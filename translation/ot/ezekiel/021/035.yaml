theological_decisions:
- issue: Referent of the feminine addressee in the verse
  chosen_reading: The command is addressed to the sword personified, continuing the
    immediate context, while the judgment ultimately falls on the people/entity symbolized
    by the sword.
  alternative_readings:
  - The addressee is directly the Ammonite nation or its ruler rather than the sword
  rationale: The lexical items 'sheath' and the feminine suffixes strongly support
    the sword as the immediate grammatical referent. Retaining the metaphor preserves
    the prophetic imagery without prematurely resolving it into a purely literal addressee.
  doctrine_reference: Preserve theological tension rather than resolve it
