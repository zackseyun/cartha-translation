id: EZK.21.12
reference: Ezekiel 21:12
source:
  edition: WLC
  text: וְ/הָיָה֙ כִּֽי יֹאמְר֣וּ אֵלֶ֔י/ךָ עַל מָ֖ה אַתָּ֣ה נֶאֱנָ֑ח וְ/אָמַרְתָּ֡ אֶל שְׁמוּעָ֣ה כִֽי בָאָ֡ה וְ/נָמֵ֣ס כָּל לֵב֩ וְ/רָפ֨וּ כָל יָדַ֜יִם וְ/כִהֲתָ֣ה כָל ר֗וּחַ וְ/כָל בִּרְכַּ֨יִם֙ תֵּלַ֣כְנָה מַּ֔יִם הִנֵּ֤ה בָאָה֙ וְ/נִֽהְיָ֔תָה נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־־־־־־׃פ
translation:
  text: And it shall be, when they say to you, ‘Why are you groaning?’ that you shall say, ‘Because of the news, for it is coming.’ Then every heart will melt, all hands will grow weak, every spirit will faint, and all knees will run with water. Look, it is coming, and it will happen, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all knees will run with water,'' a vivid idiom for terror and collapse; some understand it as knees becoming weak like water, others as loss of bodily control from fear.'
    reason: cultural_note
  - marker: b
    text: Or 'because of the report' for 'Because of the news.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱנָח
  chosen: groaning
  alternatives:
  - sighing
  - moaning
  lexicon: HALOT
  rationale: The Niphal participle from אנח denotes audible lament or groaning. 'Groaning' preserves the physical and emotional force better than the lighter 'sighing.'
- source_word: שְׁמוּעָה
  chosen: the news
  alternatives:
  - report
  - tidings
  lexicon: HALOT
  rationale: In context this is the dreaded report of impending disaster. 'The news' is natural modern English while still conveying an incoming report; 'report' is possible but slightly stiffer.
- source_word: בָאָה
  chosen: it is coming
  alternatives:
  - it comes
  - she is coming
  lexicon: HALOT
  rationale: The feminine verb agrees with שְׁמוּעָה ('news/report'), but English idiom uses impersonal 'it.' Progressive 'is coming' conveys imminent arrival of the report/disaster.
- source_word: וְנָמֵס כָּל לֵב
  chosen: every heart will melt
  alternatives:
  - every heart melts
  - every courage will melt away
  lexicon: HALOT
  rationale: A common idiom for loss of courage. 'Heart' should be retained rather than interpreted away as 'courage,' preserving the Hebrew image while remaining intelligible.
- source_word: וְרָפוּ כָל יָדַיִם
  chosen: all hands will grow weak
  alternatives:
  - all hands will droop
  - all hands will be feeble
  lexicon: HALOT
  rationale: The idiom refers to loss of strength and ability to act. 'Grow weak' is clear modern English and preserves the bodily metaphor.
- source_word: וְכִהֲתָה כָל רוּחַ
  chosen: every spirit will faint
  alternatives:
  - every spirit will grow dim
  - every breath will fail
  lexicon: HALOT
  rationale: רוּחַ here refers to inner spirit/courage rather than wind or breath. 'Will faint' communicates collapse of resolve more clearly than the more literal but opaque 'grow dim.'
- source_word: וְכָל בִּרְכַּיִם תֵּלַכְנָה מַּיִם
  chosen: all knees will run with water
  alternatives:
  - all knees will become like water
  - all knees will drip with water
  lexicon: HALOT
  rationale: This is a vivid idiom for terror-induced weakness, possibly trembling or loss of bodily control. 'Run with water' stays close to the Hebrew image without over-interpreting it.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: '''Look'' is a readable modern equivalent of the deictic particle, preserving urgency without archaic tone.'
- source_word: וְנִהְיָתָה
  chosen: it will happen
  alternatives:
  - it will come to pass
  - it will be
  lexicon: HALOT
  rationale: The verb confirms fulfillment of the announced event. 'It will happen' is idiomatic modern English and avoids archaic phrasing.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine's default, יְהוָה is rendered 'the LORD.' In the compound אֲדֹנָי יְהוִה, standard English convention is 'the Lord GOD' to avoid 'Lord LORD' while signaling the divine name.
