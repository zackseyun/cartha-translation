id: EZK.21.3
reference: Ezekiel 21:3
source:
  edition: WLC
  text: וְ/אָֽמַרְתָּ֙ לְ/יַ֣עַר הַ/נֶּ֔גֶב שְׁמַ֖ע דְּבַר יְהוָ֑ה כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֡ה הִנְ/נִ֣י מַֽצִּית בְּ/ךָ֣ אֵ֡שׁ וְ/אָכְלָ֣ה בְ/ךָ֣ כָל עֵֽץ לַח֩ וְ/כָל עֵ֨ץ יָבֵ֤שׁ לֹֽא תִכְבֶּה֙ לַהֶ֣בֶת שַׁלְהֶ֔בֶת וְ/נִצְרְבוּ בָ֥/הּ כָּל פָּנִ֖ים מִ/נֶּ֥גֶב צָפֽוֹנָ/ה־־־׀־־־־־־׃
translation:
  text: 'And say to the forest of the Negev, ‘Hear the word of Yahweh. Thus says the Lord GOD: Behold, I am kindling a fire in you, and it will consume in you every green tree and every dry tree. The blazing flame will not be quenched, and by it every face from south to north will be scorched.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the forest of the southland.” Hebrew negev can mean “south/southland” or refer more specifically to the Negev region.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the LORD”; the divine name YHWH is rendered “the LORD” in keeping with the project’s standard practice.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַר הַנֶּגֶב
  chosen: the forest of the Negev
  alternatives:
  - the forest of the southland
  - the forest of the south
  lexicon: HALOT
  rationale: יַעַר is literally 'forest/woodland.' הַנֶּגֶב can denote the Negev region or more generally the south/southland. Because Ezekiel is using a geographic image tied to Judah's southern region, 'the Negev' preserves the place-like force while remaining natural English.
- source_word: שְׁמַע דְּבַר יְהוָה
  chosen: Hear the word of the LORD
  alternatives:
  - Listen to the word of the LORD
  lexicon: HALOT
  rationale: A standard prophetic summons. 'Hear' preserves the imperative force and biblical register without becoming archaic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: The compound title combines אֲדֹנָי with the divine name. 'The Lord GOD' is the conventional English equivalent that distinguishes the title from the following covenant name rendered as GOD in small-caps style.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: This deictic particle introduces a solemn divine announcement. 'Behold' best preserves the prophetic force, though slightly elevated.
- source_word: מַצִּית
  chosen: I am kindling
  alternatives:
  - I am setting
  - I am igniting
  lexicon: HALOT
  rationale: From יצת/יצת in the causative sense 'to kindle, set on fire.' The participial/adjectival force after הִנְנִי is well represented by the progressive 'I am kindling.'
- source_word: אֵשׁ
  chosen: a fire
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the image is metaphorical for judgment but should remain concrete in translation.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it will devour
  lexicon: HALOT
  rationale: The feminine verb agrees with 'fire.' 'Consume' is idiomatic in English for fire imagery and preserves the destructive sense.
- source_word: כָל עֵץ לַח וְכָל עֵץ יָבֵשׁ
  chosen: every green tree and every dry tree
  alternatives:
  - every fresh tree and every dry tree
  lexicon: HALOT
  rationale: לַח means moist/fresh/green. In the context of trees and fire, 'green tree' is the most natural English expression and preserves the contrast that even what is not ready fuel will be consumed.
- source_word: לֹא תִכְבֶּה
  chosen: will not be quenched
  alternatives:
  - will not go out
  lexicon: HALOT
  rationale: Passive-style English 'be quenched' matches the idiom of an unextinguished judgment fire and preserves the solemn tone.
- source_word: לַהֶבֶת שַׁלְהֶבֶת
  chosen: the blazing flame
  alternatives:
  - the flame of fire
  - the flaming blaze
  lexicon: HALOT
  rationale: This is an emphatic collocation intensifying the image of flame. 'Blazing flame' is concise, natural, and preserves the heightened rhetoric without awkward literalism.
- source_word: וְנִצְרְבוּ בָהּ
  chosen: and by it ... will be scorched
  alternatives:
  - and in it ... will be burned
  - and by it ... will be seared
  lexicon: HALOT
  rationale: The verb conveys being scorched/burned by intense heat. 'Scorched' fits the context of faces affected by the fire's heat and avoids overtranslation.
- source_word: כָל פָּנִים
  chosen: every face
  alternatives:
  - all faces
  - everyone
  lexicon: HALOT
  rationale: Literally 'all/every face.' Retaining 'every face' preserves the vivid corporeal imagery of universal exposure to judgment better than the interpretive 'everyone.'
- source_word: מִנֶּגֶב צָפוֹנָה
  chosen: from south to north
  alternatives:
  - from the Negev to the north
  - from southward to northward
  lexicon: HALOT
  rationale: This idiom marks total geographic extent. 'From south to north' is clear, natural English and communicates the comprehensive sweep of the judgment.
