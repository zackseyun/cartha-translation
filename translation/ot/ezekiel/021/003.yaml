theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical judgment imagery
  chosen_reading: Retain the concrete fire/forest imagery in the main text
  alternative_readings:
  - Explicitly interpret the forest as Judah in the translation
  rationale: The prophetic metaphor is explained in the surrounding context, but this verse itself speaks in image. Optimal equivalence here preserves the metaphor rather than importing its interpretation into the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve what the text says without importing doctrinal claims'
