id: EZK.21.4
reference: Ezekiel 21:4
source:
  edition: WLC
  text: וְ/רָאוּ֙ כָּל בָּשָׂ֔ר כִּ֛י אֲנִ֥י יְהוָ֖ה בִּֽעַרְתִּ֑י/הָ לֹ֖א תִּכְבֶּֽה־׃
translation:
  text: And all flesh will see that I, Yahweh, have kindled it; it will not be quenched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all people' for the idiom 'all flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאוּ
  chosen: will see
  alternatives:
  - shall see
  - will perceive
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions futurally after the preceding judgment context; 'will see' is natural modern English and preserves the concrete force of ראה.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all people
  - all humanity
  lexicon: HALOT
  rationale: Literally 'all flesh.' Retaining 'flesh' preserves the prophetic idiom for all living humanity and echoes broader biblical usage. Dynamic alternatives are possible, but the literal phrase remains clear enough in English here.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Introduces the content of what all flesh will see: ''that I, the LORD, have kindled it.'' ''That'' fits the clause better than a causal rendering in English.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: בִּעַרְתִּיהָ
  chosen: have kindled it
  alternatives:
  - have set it ablaze
  - have burned it
  lexicon: HALOT
  rationale: From בער, 'to burn/kindle/consume.' The 3fs suffix refers back to the sword/fire imagery in the immediate context. 'Have kindled it' preserves the causative nuance without overinterpreting the degree of destruction.
- source_word: לֹא תִּכְבֶּה
  chosen: it will not be quenched
  alternatives:
  - it will not go out
  - it will not be extinguished
  lexicon: HALOT
  rationale: Passive-like English best conveys the intransitive Hebrew verb in context of an ongoing fire. 'Quenched' is idiomatic for fire and matches prophetic diction.
