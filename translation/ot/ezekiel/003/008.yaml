theological_decisions:
- issue: Metaphorical force of divinely strengthened face/forehead
  chosen_reading: Render as concrete bodily imagery ('face,' 'forehead') expressing
    God-given firmness in prophetic confrontation.
  alternative_readings:
  - Interpret more dynamically as 'I have made you stubborn against them'
  rationale: The Hebrew uses bodily imagery that should be preserved rather than flattened
    into an abstract paraphrase. This keeps the literary connection with the surrounding
    context of hardness while avoiding attributing sinful stubbornness to Ezekiel.
  doctrine_reference: 'Translation philosophy: preserve source-text sense; do not
    paraphrase beyond what the source warrants.'
