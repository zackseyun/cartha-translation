id: EZK.3.8
reference: Ezekiel 3:8
source:
  edition: WLC
  text: הִנֵּ֨ה נָתַ֧תִּי אֶת פָּנֶ֛י/ךָ חֲזָקִ֖ים לְ/עֻמַּ֣ת פְּנֵי/הֶ֑ם וְ/אֶֽת
    מִצְחֲ/ךָ֥ חָזָ֖ק לְ/עֻמַּ֥ת מִצְחָֽ/ם־־׃
translation:
  text: Behold, I have made your face strong against their faces, and your forehead
    strong against their foreheads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hard' instead of 'strong' in both clauses; the Hebrew conveys firmness
      or hardness in the face of opposition.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces emphatic divine declaration. 'Behold' preserves the solemn,
    attention-directing force better than the more colloquial 'look' or 'see'.
- source_word: נָתַתִּי
  chosen: I have made
  alternatives:
  - I have given
  - I have set
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given,' in this construction with
    body parts plus adjective it idiomatically conveys causing or making them to be
    a certain way. 'I have made' is clearer English while staying close to the Hebrew
    sense.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your faces
  - your countenance
  lexicon: HALOT
  rationale: Hebrew פָּנִים is morphologically plural but often singular in meaning
    when referring to one person's face. 'Your face' is the natural English equivalent.
- source_word: חֲזָקִים
  chosen: strong
  alternatives:
  - hard
  - firm
  - stubborn
  lexicon: HALOT
  rationale: The adjective denotes strength or hardness. In this context of prophetic
    resolve against opposition, 'strong' best captures divinely granted firmness without
    importing the negative connotation of 'stubborn.'
- source_word: לְעֻמַּת
  chosen: against
  alternatives:
  - opposite
  - in front of
  - corresponding to
  lexicon: HALOT
  rationale: The preposition indicates facing or being set over against. In context
    of confrontation with a resistant audience, 'against' communicates the adversative
    force most clearly.
- source_word: פְּנֵיהֶם
  chosen: their faces
  alternatives:
  - their face
  - their countenances
  lexicon: HALOT
  rationale: Plural reference to the people Ezekiel faces; 'their faces' preserves
    the Hebrew image and parallelism.
- source_word: מִצְחֲךָ
  chosen: your forehead
  alternatives:
  - your brow
  lexicon: HALOT
  rationale: Concrete anatomical term. 'Forehead' is standard modern English and preserves
    the metaphor of visible firmness.
- source_word: חָזָק
  chosen: strong
  alternatives:
  - hard
  - firm
  lexicon: HALOT
  rationale: Repeated from the previous clause; retaining 'strong' preserves the parallel
    structure and consistency of the Hebrew repetition.
- source_word: מִצְחָם
  chosen: their foreheads
  alternatives:
  - their brows
  lexicon: HALOT
  rationale: Maintains the exact metaphor and the balanced parallelism of the verse.
