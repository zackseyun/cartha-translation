theological_decisions:
- issue: Rendering of אָדָם within the address בֶּן אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - human
  rationale: Following the doctrine's gender-accurate principle, the idiom is preserved
    as 'Son of man' because this is the established literal form of the Hebrew address
    and reflects the source wording rather than a gender-neutral paraphrase.
