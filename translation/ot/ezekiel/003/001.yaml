id: EZK.3.1
reference: Ezekiel 3:1
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י בֶּן אָדָ֕ם אֵ֥ת אֲשֶׁר תִּמְצָ֖א אֱכ֑וֹל אֱכוֹל֙ אֶת
    הַ/מְּגִלָּ֣ה הַ/זֹּ֔את וְ/לֵ֥ךְ דַּבֵּ֖ר אֶל בֵּ֥ית יִשְׂרָאֵֽל־־־־׃
translation:
  text: Then he said to me, “Son of man, eat what you find; eat this scroll, and go,
    speak to the house of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “whatever you find, eat.” The Hebrew expression can be rendered either
      way; the sense is that Ezekiel is to consume what is set before him.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of man
  lexicon: HALOT
  rationale: A conventional and transparent rendering of the Hebrew address in Ezekiel.
    It preserves the literal imagery and the representative human sense of אָדָם without
    flattening it to a paraphrase such as 'human being.' Capitalized here as direct
    address.
- source_word: אֵת אֲשֶׁר תִּמְצָא
  chosen: what you find
  alternatives:
  - that which you find
  - whatever you find
  lexicon: HALOT
  rationale: This idiom naturally means 'what/whatever you find.' 'What you find'
    is idiomatic modern English while remaining close to the Hebrew construction.
- source_word: אֱכֹל אֱכוֹל
  chosen: eat ... eat
  alternatives:
  - surely eat
  - eat, yes eat
  - eat repeatedly
  lexicon: HALOT
  rationale: The repetition intensifies the imperative. English can preserve this
    best by retaining the repeated command rather than collapsing it into a single
    verb or an adverbial paraphrase.
- source_word: מְגִלָּה
  chosen: scroll
  alternatives:
  - book scroll
  - roll
  lexicon: HALOT
  rationale: '''Scroll'' is the standard and clearest rendering for an ancient written
    roll. It is more precise than ''book'' and more natural in modern English than
    ''roll.'''
- source_word: וְלֵךְ
  chosen: go
  alternatives:
  - go on
  - depart
  lexicon: HALOT
  rationale: A simple imperative of movement. 'Go' preserves the sequence of commands
    without adding nuance.
- source_word: דַּבֵּר
  chosen: speak
  alternatives:
  - speak out
  - declare
  lexicon: HALOT
  rationale: '''Speak'' is the direct equivalent and fits the prophetic commission
    context. ''Declare'' would add a slightly more interpretive force not explicit
    in the verb itself.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  - Israel
  lexicon: HALOT
  rationale: This preserves the covenantal and collective idiom of the Hebrew. 'People
    of Israel' is interpretive and less formally tied to the source expression.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'And' would be more formally wooden
    in this context.
