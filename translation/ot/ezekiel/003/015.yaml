id: EZK.3.15
reference: Ezekiel 3:15
source:
  edition: WLC
  text: וָ/אָב֨וֹא אֶל הַ/גּוֹלָ֜ה תֵּ֣ל אָ֠בִיב הַ/יֹּשְׁבִ֤ים אֶֽל נְהַר כְּבָר֙
    ו/אשר הֵ֖מָּה יוֹשְׁבִ֣ים שָׁ֑ם וָ/אֵשֵׁ֥ב שָׁ֛ם שִׁבְעַ֥ת יָמִ֖ים מַשְׁמִ֥ים
    בְּ/תוֹכָֽ/ם־־־׃
translation:
  text: Then I came to the exiles at Tel-abib, who were living by the Kebar River,
    where they were living; and I sat there among them for seven days, appalled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'astonished' or 'stunned.' The Hebrew term conveys a state of shock or
      devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹלָה
  chosen: the exiles
  alternatives:
  - the captivity
  - the deportees
  lexicon: HALOT
  rationale: Refers to the community of people in exile rather than the abstract state
    of captivity. 'Exiles' is natural modern English and fits the context of Ezekiel
    among the deported Judeans.
- source_word: תֵּל אָבִיב
  chosen: Tel-abib
  alternatives:
  - Tel Aviv
  lexicon: HALOT
  rationale: A place name, so transliterated per philosophy. Hyphenation helps signal
    a compound toponym and distinguishes the ancient site from the modern city Tel
    Aviv.
- source_word: הַיֹּשְׁבִים אֶל־נְהַר כְּבָר
  chosen: who were living by the Kebar River
  alternatives:
  - who dwelt by the river Chebar
  - who were settled at the Kebar Canal
  lexicon: HALOT
  rationale: יֹשְׁבִים here denotes settled residence. 'Living' is readable modern
    English; 'by' captures the locative relation naturally. 'Kebar' is the standard
    transliteration of כְּבָר.
- source_word: וַאֲשֶׁר הֵמָּה יוֹשְׁבִים שָׁם
  chosen: where they were living
  alternatives:
  - and where they were dwelling
  - and I saw where they were living
  lexicon: HALOT
  rationale: 'The clause is syntactically difficult. The most straightforward sense
    is resumptive/appositional: Ezekiel came to the place where they were living.
    I avoid adding ''I saw,'' which is not in the Hebrew, and render the clause in
    a way that preserves the repetition without becoming unintelligible.'
- source_word: וָאֵשֵׁב שָׁם
  chosen: and I sat there
  alternatives:
  - and I remained there
  - and I stayed there
  lexicon: HALOT
  rationale: The verb is literally 'sat,' and the physical/postural sense likely contributes
    to the scene of stunned silence. 'Sat there' preserves that concreteness better
    than the more interpretive 'remained' or 'stayed.'
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: Standard idiomatic rendering of duration in English.
- source_word: מַשְׁמִים
  chosen: appalled
  alternatives:
  - astonished
  - desolate
  - stunned
  lexicon: HALOT
  rationale: The term conveys being devastated, appalled, or stunned into silence.
    'Appalled' best captures the emotional shock in context, while avoiding a merely
    cognitive sense like 'astonished.'
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: Idiomatic English for physical presence within the group. 'In their midst'
    is possible but less natural in contemporary style.
