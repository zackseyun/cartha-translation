id: EZK.3.22
reference: Ezekiel 3:22
source:
  edition: WLC
  text: וַ/תְּהִ֥י עָלַ֛/י שָׁ֖ם יַד יְהוָ֑ה וַ/יֹּ֣אמֶר אֵלַ֗/י ק֥וּם צֵא֙ אֶל הַ/בִּקְעָ֔ה
    וְ/שָׁ֖ם אֲדַבֵּ֥ר אוֹתָֽ/ךְ־־׃
translation:
  text: And there the hand of the LORD was upon me, and he said to me, “Rise, go out
    to the valley, and there I will speak with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the plain” for “the valley.”
    reason: lexical_alternative
  - marker: b
    text: Or “I will speak to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי עָלַי
  chosen: was upon me
  alternatives:
  - came upon me
  lexicon: HALOT
  rationale: The idiom with היה + על conveys a state of divine power or influence
    resting on the prophet. 'Was upon me' preserves the Hebrew imagery more formally
    than 'came upon me,' which would add an ingressive nuance not explicit in the
    verb.
- source_word: שָׁם
  chosen: there
  alternatives:
  - at that place
  lexicon: HALOT
  rationale: A straightforward locative adverb. Retained as 'there' both at the beginning
    and later in the verse for consistency and to preserve the spatial emphasis.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  - the power of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic idiom for divine power or compelling influence.
    'The hand of the LORD' preserves the concrete metaphor rather than interpreting
    it as mere 'power.' 'the LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: וַיֹּאמֶר אֵלַי
  chosen: and he said to me
  alternatives:
  - and he told me
  lexicon: HALOT
  rationale: Standard rendering of אמר. The subject is understood from context as
    the LORD; the pronoun is kept lowercase in normal English narrative style while
    preserving the referent.
- source_word: קוּם
  chosen: Rise
  alternatives:
  - Get up
  - Arise
  lexicon: HALOT
  rationale: An imperative of standing up. 'Rise' is concise, natural, and suitably
    elevated without sounding archaic like 'Arise.'
- source_word: צֵא
  chosen: go out
  alternatives:
  - go forth
  - leave
  lexicon: HALOT
  rationale: The verb means to go out. 'Go out' is the most direct modern equivalent;
    'leave' would under-specify the outward movement.
- source_word: הַבִּקְעָה
  chosen: the valley
  alternatives:
  - the plain
  lexicon: HALOT
  rationale: בִּקְעָה can denote a valley plain or broad depression. 'Valley' is the
    most idiomatic and contextually fitting English rendering here, though 'plain'
    is lexically possible.
- source_word: אֲדַבֵּר אוֹתָךְ
  chosen: I will speak with you
  alternatives:
  - I will speak to you
  lexicon: HALOT
  rationale: The idiom דבר + את can mean 'speak with' or 'speak to.' 'With you' best
    reflects the preposition-like force of את here and preserves the Hebrew construction
    without overinterpreting the exchange as merely one-directional.
