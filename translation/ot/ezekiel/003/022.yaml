theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in the prophetic formula 'the hand
    of YHWH.' Following the doctrinal standard, it is rendered 'the LORD' rather than
    transliterated.
