id: EZK.3.10
reference: Ezekiel 3:10
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑/י בֶּן אָדָ֕ם אֶת כָּל דְּבָרַ/י֙ אֲשֶׁ֣ר אֲדַבֵּ֣ר אֵלֶ֔י/ךָ
    קַ֥ח בִּֽ/לְבָבְ/ךָ֖ וּ/בְ/אָזְנֶ֥י/ךָ שְׁמָֽע־־־׃
translation:
  text: Then he said to me, “Son of man, receive in your heart all my words that I
    speak to you, and hear with your ears.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take into your heart'; the Hebrew verb is literally 'take,' used here
      for inward reception of God's words.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of Adam
  - mortal
  lexicon: HALOT
  rationale: The expression is Ezekiel’s standard form of address. 'Son of man' preserves
    the Hebrew wording and its representative masculine form better than interpretive
    alternatives like 'human one' or 'mortal.' This follows the gender-accurate principle
    and avoids flattening a recurring prophetic title/formula.
- source_word: אֶת כָּל דְּבָרַי
  chosen: all my words
  alternatives:
  - all my sayings
  - everything I say
  lexicon: HALOT
  rationale: דְּבָרִים commonly means 'words' or 'matters.' Here the direct object
    of both receiving and hearing is best kept as 'words' to preserve the concrete
    verbal emphasis of the Hebrew.
- source_word: אֲדַבֵּר אֵלֶיךָ
  chosen: that I speak to you
  alternatives:
  - that I will speak to you
  - which I speak to you
  lexicon: HALOT
  rationale: The imperfect can be rendered with present or near-future force in context.
    English idiom works naturally with 'that I speak to you' after 'all my words,'
    while still conveying ongoing divine speech.
- source_word: קַח
  chosen: receive
  alternatives:
  - take
  - accept
  lexicon: HALOT
  rationale: Literally 'take,' but in the idiom 'take in your heart' English 'receive'
    better conveys internal appropriation rather than physical taking, while remaining
    close to the source.
- source_word: בִּלְבָבְךָ
  chosen: in your heart
  alternatives:
  - into your heart
  - in your mind
  lexicon: HALOT
  rationale: לֵבָב in Hebrew denotes the inner person, including thought and will.
    'In your heart' preserves the biblical anthropology and avoids reducing it merely
    to intellect ('mind').
- source_word: וּבְאָזְנֶיךָ שְׁמָע
  chosen: and hear with your ears
  alternatives:
  - and listen with your ears
  - and hear in your ears
  lexicon: HALOT
  rationale: The Hebrew is emphatic and bodily concrete. 'Hear with your ears' preserves
    the explicit mention of ears rather than smoothing it away to simply 'listen.'
