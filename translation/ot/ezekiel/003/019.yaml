theological_decisions:
- issue: Whether the verse implies eternal condemnation for the wicked or immediate
    covenantal/judicial death
  chosen_reading: Render the Hebrew in its own terms as death 'in his iniquity' without
    specifying eternal destiny.
  alternative_readings:
  - He will die for his sin in a temporal sense
  - He will die under guilt with possible broader theological implications
  rationale: The verse states that the wicked person will die in his iniquity if he
    does not turn, but it does not explicitly define the full scope of that death.
    The translation preserves the text's moral accountability without importing a
    more developed doctrinal conclusion than the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether נַפְשְׁךָ should be rendered 'soul' or 'life/self'
  chosen_reading: Render as 'your life.'
  alternative_readings:
  - your soul
  - yourself
  rationale: In this context נֶפֶשׁ refers to Ezekiel's own life or person in relation
    to accountability. 'Soul' in modern English could suggest a narrower immaterial
    sense not required by the Hebrew. 'Life' communicates the idiom more clearly while
    preserving the gravity of personal deliverance.
  doctrine_reference: Readable modern English, not archaic or academic.
