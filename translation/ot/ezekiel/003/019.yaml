id: EZK.3.19
reference: Ezekiel 3:19
source:
  edition: WLC
  text: וְ/אַתָּה֙ כִּֽי הִזְהַ֣רְתָּ רָשָׁ֔ע וְ/לֹא שָׁב֙ מֵֽ/רִשְׁע֔/וֹ וּ/מִ/דַּרְכּ֖/וֹ
    הָ/רְשָׁעָ֑ה ה֚וּא בַּ/עֲוֺנ֣/וֹ יָמ֔וּת וְ/אַתָּ֖ה אֶֽת נַפְשְׁ/ךָ֥ הִצַּֽלְתָּ־־־׃ס
translation:
  text: But if you warn a wicked man and he does not turn from his wickedness and
    from his wicked way, he will die in his iniquity, but you will have delivered
    your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he does not turn from his wickedness or from his evil way.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have saved yourself' or 'you have delivered your soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִזְהַרְתָּ
  chosen: warn
  alternatives:
  - admonish
  - give warning to
  lexicon: HALOT
  rationale: The Hiphil of זהר here means to warn or give warning. 'Warn' is concise,
    natural English, and fits the watchman context established in the surrounding
    passage.
- source_word: רָשָׁע
  chosen: wicked man
  alternatives:
  - wicked person
  - guilty man
  lexicon: HALOT
  rationale: The singular adjective used substantivally refers to an individual characterized
    as wicked. 'Wicked man' preserves the masculine singular form and matches the
    source's gendered grammar per the translation philosophy.
- source_word: שָׁב
  chosen: turn
  alternatives:
  - return
  - repent
  lexicon: HALOT
  rationale: שׁוּב fundamentally means 'turn/return.' In this moral context 'repent'
    is interpretive; 'turn' preserves the Hebrew imagery while allowing the ethical
    force to remain clear.
- source_word: מֵרִשְׁעוֹ
  chosen: from his wickedness
  alternatives:
  - from his evil
  - from his guilt
  lexicon: HALOT
  rationale: The noun רֶשַׁע denotes wickedness or evil-doing. 'Wickedness' best matches
    the moral quality in view and pairs naturally with the following phrase.
- source_word: וּמִדַּרְכּוֹ הָרְשָׁעָה
  chosen: and from his wicked way
  alternatives:
  - and from his evil way
  - and from his wicked path
  lexicon: HALOT
  rationale: דֶּרֶךְ often functions metaphorically for one's course of life or conduct.
    'Way' preserves the biblical metaphor, and 'wicked' renders the attributive adjective
    straightforwardly.
- source_word: בַּעֲוֺנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - in his guilt
  - because of his sin
  lexicon: HALOT
  rationale: The preposition ב plus עָוֹן can indicate the sphere or culpable condition
    in which death occurs. 'In his iniquity' is a standard, sufficiently transparent
    rendering that preserves the moral-legal weight of עָוֹן without over-specifying
    causation.
- source_word: הִצַּלְתָּ אֶת־נַפְשְׁךָ
  chosen: you will have delivered your life
  alternatives:
  - you have saved your life
  - you have rescued yourself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life/self. 'Delivered your life' preserves
    the idiom's seriousness and avoids implying eternal salvation; the perfect is
    rendered with future-perfect force in context after the preceding future verb.
