theological_decisions:
- issue: Nature of the death/life language in the warning
  chosen_reading: Render the terms straightforwardly as 'die' and 'live' without specifying
    physical-only or spiritual-only death/life.
  alternative_readings:
  - Interpret primarily as physical death
  - Interpret primarily as spiritual death
  rationale: The verse's warning formula carries covenantal and moral force and may
    encompass more than one dimension of judgment. The translation preserves the textual
    tension rather than resolving it beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Gender rendering of רָשָׁע
  chosen_reading: Use 'wicked man' in the main text.
  alternative_readings:
  - wicked person
  - wicked one
  rationale: The Hebrew is grammatically masculine singular and addresses an individual
    case. Following the gender-accurate policy, the masculine form is retained rather
    than neutralized.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
