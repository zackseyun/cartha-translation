id: EZK.3.18
reference: Ezekiel 3:18
source:
  edition: WLC
  text: בְּ/אָמְרִ֤/י לָֽ/רָשָׁע֙ מ֣וֹת תָּמ֔וּת וְ/לֹ֣א הִזְהַרְתּ֗/וֹ וְ/לֹ֥א דִבַּ֛רְתָּ
    לְ/הַזְהִ֥יר רָשָׁ֛ע מִ/דַּרְכּ֥/וֹ הָ/רְשָׁעָ֖ה לְ/חַיֹּת֑/וֹ ה֤וּא רָשָׁע֙ בַּ/עֲוֺנ֣/וֹ
    יָמ֔וּת וְ/דָמ֖/וֹ מִ/יָּדְ/ךָ֥ אֲבַקֵּֽשׁ׃
translation:
  text: When I say to the wicked man, ‘You shall surely die,’ and you do not warn
    him, and you do not speak to warn the wicked man from his wicked way so that he
    may live, that wicked man shall die in his iniquity, but I will require his blood
    from your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will hold you accountable for his blood.' The Hebrew more literally
      says, 'I will require his blood from your hand,' a judicial idiom of responsibility.
    reason: lexical_alternative
  - marker: b
    text: '''In his iniquity'' may also be rendered ''for his iniquity'' or ''because
      of his sin.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָמְרִי
  chosen: When I say
  alternatives:
  - In my saying
  - When I speak
  lexicon: HALOT
  rationale: The preposition ב with infinitive/construct-like verbal form introduces
    a temporal clause. 'When I say' is idiomatic English and preserves the conditional-temporal
    force.
- source_word: לָרָשָׁע
  chosen: to the wicked man
  alternatives:
  - to the wicked one
  - to the wicked person
  lexicon: HALOT
  rationale: רָשָׁע denotes a wicked/guilty person. 'Wicked man' preserves the singular
    masculine form in line with the gender-accurate policy; here it refers to an individual
    addressee, not humanity in general.
- source_word: מוֹת תָּמוּת
  chosen: You shall surely die
  alternatives:
  - you will certainly die
  - dying you shall die
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'You shall
    surely die' is a clear English equivalent that preserves the solemn certainty
    without woodenly reproducing the Hebrew form.
- source_word: הִזְהַרְתּוֹ
  chosen: warn him
  alternatives:
  - admonish him
  - give him warning
  lexicon: HALOT
  rationale: The Hiphil of זהר in Ezekiel regularly carries the sense of giving warning.
    'Warn him' is concise, natural, and contextually precise.
- source_word: דִבַּרְתָּ לְהַזְהִיר
  chosen: you do not speak to warn
  alternatives:
  - you do not speak in order to warn
  - you do not tell him to warn
  lexicon: HALOT
  rationale: The construction emphasizes not merely silence but failure to speak for
    the purpose of warning. 'Speak to warn' preserves both verbs and their purposive
    relationship.
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked one
  - the wicked person
  lexicon: HALOT
  rationale: Repeated with the same gloss for consistency. The repetition is rhetorically
    important in the verse and should be preserved.
- source_word: מִדַּרְכּוֹ הָרְשָׁעָה
  chosen: from his wicked way
  alternatives:
  - from his evil way
  - from his guilty course
  lexicon: HALOT
  rationale: דֶּרֶךְ here is metaphorical for conduct. 'Way' preserves the biblical
    idiom, and 'wicked' matches the repeated רשע word-group in the verse more closely
    than 'evil'.
- source_word: לְחַיֹּתוֹ
  chosen: so that he may live
  alternatives:
  - to keep him alive
  - for his life
  lexicon: HALOT
  rationale: The infinitive with suffix expresses purpose/result. 'So that he may
    live' is natural and keeps the moral-spiritual consequence open without over-specifying
    physical or spiritual life.
- source_word: הוּא רָשָׁע
  chosen: that wicked man
  alternatives:
  - he, being wicked
  - that wicked one
  lexicon: HALOT
  rationale: The pronoun plus predicate adjective is resumptive and emphatic. 'That
    wicked man' captures the resumptive force in idiomatic English.
- source_word: בַּעֲוֺנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - in his guilt
  - because of his sin
  lexicon: HALOT
  rationale: The preposition ב can indicate circumstance or attendant condition. 'In
    his iniquity' preserves the Hebrew wording and the moral weight of עָוֹן, while
    avoiding an interpretive narrowing to mere consequence.
- source_word: דָּמוֹ
  chosen: his blood
  alternatives:
  - his lifeblood
  - responsibility for his death
  lexicon: HALOT
  rationale: '''Blood'' should be retained because it is the concrete covenantal/judicial
    idiom in the Hebrew. More interpretive renderings flatten the legal imagery.'
- source_word: מִיָּדְךָ אֲבַקֵּשׁ
  chosen: I will require his blood from your hand
  alternatives:
  - I will demand his blood from your hand
  - I will hold you accountable for his blood
  lexicon: HALOT
  rationale: בקשׁ with 'from your hand' is a judicial idiom of accountability. 'Require
    his blood from your hand' preserves the metaphor and legal solemnity; a more explicit
    paraphrase is preserved as an alternative.
