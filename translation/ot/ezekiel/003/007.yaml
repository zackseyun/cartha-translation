id: EZK.3.7
reference: Ezekiel 3:7
source:
  edition: WLC
  text: וּ/בֵ֣ית יִשְׂרָאֵ֗ל לֹ֤א יֹאבוּ֙ לִ/שְׁמֹ֣עַ אֵלֶ֔י/ךָ כִּֽי אֵינָ֥/ם אֹבִ֖ים
    לִ/שְׁמֹ֣עַ אֵלָ֑/י כִּ֚י כָּל בֵּ֣ית יִשְׂרָאֵ֔ל חִזְקֵי מֵ֥צַח וּ/קְשֵׁי לֵ֖ב
    הֵֽמָּה־־־־׃
translation:
  text: But the house of Israel will not be willing to listen to you, because they
    are not willing to listen to me; for all the house of Israel are hard of forehead
    and stubborn of heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hard-faced' or 'stiff-foreheaded'; the Hebrew idiom pictures shameless
      obstinacy.
    reason: lexical_alternative
  - marker: b
    text: Or 'hard of heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֵית יִשְׂרָאֵל
  chosen: But the house of Israel
  alternatives:
  - And the house of Israel
  - But Israel's house
  lexicon: HALOT
  rationale: The conjunction ו here is rendered adversatively as 'But' because the
    clause contrasts Israel with the foreign peoples in the preceding context who
    might listen. 'House of Israel' preserves the covenantal/corporate expression
    better than a simplified 'Israel'.
- source_word: יֹאבוּ / אֹבִים
  chosen: will not be willing / are not willing
  alternatives:
  - will not consent
  - will not want
  - refuse
  lexicon: HALOT
  rationale: אָבָה denotes willingness or consent. Rendering with 'be willing' preserves
    the volitional nuance better than the more interpretive 'refuse,' while still
    reading naturally in English. The finite/imperfect and participial forms are reflected
    as future-like 'will not be willing' and present-state 'are not willing'.
- source_word: לִשְׁמֹעַ אֵלֶיךָ
  chosen: to listen to you
  alternatives:
  - to hear you
  - to obey you
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to.' 'Hear' is possible but weaker
    in English; 'obey' overstates the sense here, though obedience is an implication
    in prophetic context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: 'The first כִּי gives the reason Israel will not listen to Ezekiel: they
    do not listen to God. ''Because'' makes the causal relation explicit in clear
    modern English.'
- source_word: לִשְׁמֹעַ אֵלַי
  chosen: to listen to me
  alternatives:
  - to hear me
  - to obey me
  lexicon: HALOT
  rationale: For consistency with the prior occurrence, the same gloss is retained.
    This preserves the rhetorical parallel between refusal to hear the prophet and
    refusal to hear God.
- source_word: כִּי כָּל בֵּית יִשְׂרָאֵל
  chosen: for all the house of Israel
  alternatives:
  - because the whole house of Israel
  - for the entire house of Israel
  lexicon: HALOT
  rationale: The second כִּי introduces an explanatory ground. 'All the house of Israel'
    closely follows the Hebrew and preserves the collective force.
- source_word: חִזְקֵי מֵצַח
  chosen: hard of forehead
  alternatives:
  - hard-faced
  - stiff-foreheaded
  - impudent
  lexicon: HALOT
  rationale: Literally 'strong/hard of forehead.' This idiom conveys obstinacy or
    shameless defiance. 'Hard of forehead' keeps the vivid Hebrew image without flattening
    it into a purely interpretive adjective.
- source_word: וּקְשֵׁי לֵב
  chosen: stubborn of heart
  alternatives:
  - hard of heart
  - obstinate in heart
  lexicon: HALOT
  rationale: The phrase denotes inner stubbornness. 'Stubborn of heart' is idiomatic
    enough in English while preserving the metaphor of the heart as the seat of will.
    'Hard of heart' is possible, but using 'stubborn' avoids repetitive 'hard ...
    hard' while still conveying resistance.
- source_word: הֵמָּה
  chosen: are
  alternatives:
  - they are
  lexicon: HALOT
  rationale: The independent pronoun is represented by the English copular clause.
    English does not require an explicit final 'they' here, though the predicate remains
    emphatic by position and wording.
