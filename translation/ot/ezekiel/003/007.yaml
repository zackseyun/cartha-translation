theological_decisions:
- issue: Corporate characterization of Israel
  chosen_reading: Retain the collective expression 'all the house of Israel' without
    softening the universal statement.
  alternative_readings:
  - many in the house of Israel
  - the leaders of Israel
  rationale: The Hebrew explicitly states a comprehensive corporate indictment in
    this prophetic setting. The translation should preserve the force of the text
    rather than narrow it to a subgroup not named in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
