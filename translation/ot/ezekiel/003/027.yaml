theological_decisions:
- issue: Rendering the divine name in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Sovereign LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Representative masculine in הַשֹּׁמֵעַ ... וְהֶחָדֵל
  chosen_reading: The one who hears, let him hear; and the one who refuses, let him refuse
  alternative_readings:
  - Whoever hears, let them hear; whoever refuses, let them refuse
  rationale: The Hebrew uses grammatically masculine singular forms with representative force. Per doctrine, the translation remains gender-accurate rather than shifting to gender-neutral plurals or singular 'they.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
