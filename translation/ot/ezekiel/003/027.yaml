id: EZK.3.27
reference: Ezekiel 3:27
source:
  edition: WLC
  text: וּֽ/בְ/דַבְּרִ֤/י אֽוֹתְ/ךָ֙ אֶפְתַּ֣ח אֶת פִּ֔י/ךָ וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהֹוִ֑ה הַ/שֹּׁמֵ֤עַ יִשְׁמָע֙ וְ/הֶ/חָדֵ֣ל יֶחְדָּ֔ל כִּ֛י בֵּ֥ית מְרִ֖י הֵֽמָּה־׀׀׃ס
translation:
  text: 'But when I speak with you, I will open your mouth, and you shall say to them, ‘Thus says the Lord GOD: The one who hears, let him hear; and the one who refrains, let him refrain, for they are a rebellious house.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The one who hears will hear, and the one who refuses will refuse.' The Hebrew forms can be taken as either permissive/volitive ('let him hear/refuse') or predictive ('will hear/refuse').
    reason: alternative_reading
  - marker: b
    text: Hebrew 'a rebellious house,' a recurring Ezekiel expression for the people of Israel in their stubborn rebellion.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְדַבְּרִי
  chosen: But when I speak with you
  alternatives:
  - And when I speak with you
  - when I speak to you
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered 'and' or, contextually, 'but'; here 'but' marks the contrast with the prior imposed muteness. The preposition ב with the infinitive construct is temporal, 'when ... speaking.' With אֹתְךָ, English idiom supports 'speak with you' or 'speak to you'; 'with you' preserves the direct Hebrew construction without overinterpreting.
- source_word: אֶפְתַּח אֶת פִּיךָ
  chosen: I will open your mouth
  alternatives:
  - I will open up your mouth
  lexicon: HALOT
  rationale: A straightforward future expression. 'Open your mouth' is both literal and idiomatic in English and preserves the divine enabling of Ezekiel's speech.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: and you shall say to them
  alternatives:
  - and you will say to them
  lexicon: HALOT
  rationale: The qatal after the preceding future functions sequentially. 'Shall' suitably conveys commissioned speech in elevated but still readable English.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence and present force.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Sovereign LORD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, traditional English convention avoids 'Lord LORD' by rendering as 'Lord GOD.' This preserves both elements of the Hebrew title while remaining natural English.
- source_word: הַשֹּׁמֵעַ יִשְׁמָע
  chosen: The one who hears, let him hear
  alternatives:
  - Whoever hears, let him hear
  - He who hears will hear
  lexicon: HALOT
  rationale: The participle plus imperfect forms a volitive or permissive expression. 'The one who hears, let him hear' preserves the Hebrew structure and rhetorical force. The masculine singular is retained as gender-accurate representative language per doctrine.
- source_word: וְהֶחָדֵל יֶחְדָּל
  chosen: and the one who refuses, let him refuse
  alternatives:
  - and the one who refrains, let him refrain
  - and whoever will forbear, let him forbear
  - and the one who neglects, let him neglect
  lexicon: HALOT
  rationale: The adjective/participle-like form with the cognate verb conveys one who desists or refuses. In context of responding to prophetic warning, 'refuses' best captures deliberate non-response better than the archaic 'forbears' or the weaker 'refrains.' The volitive 'let him refuse' matches the parallel clause.
- source_word: כִּי בֵּית מְרִי הֵמָּה
  chosen: for they are a rebellious house
  alternatives:
  - for they are a house of rebellion
  - for they are a rebellious people
  lexicon: HALOT
  rationale: בֵּית מְרִי is a stock Ezekiel expression. 'Rebellious house' preserves the metaphor and covenantal indictment better than smoothing to 'people,' while remaining intelligible in English.
