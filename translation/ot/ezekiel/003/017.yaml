id: EZK.3.17
reference: Ezekiel 3:17
source:
  edition: WLC
  text: בֶּן אָדָ֕ם צֹפֶ֥ה נְתַתִּ֖י/ךָ לְ/בֵ֣ית יִשְׂרָאֵ֑ל וְ/שָׁמַעְתָּ֤ מִ/פִּ/י֙
    דָּבָ֔ר וְ/הִזְהַרְתָּ֥ אוֹתָ֖/ם מִמֶּֽ/נִּי־׃
translation:
  text: Son of man, I have made you a watchman for the house of Israel; when you hear
    a word from my mouth, you shall warn them from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mortal' or 'Human one' for 'Son of man.' The Hebrew idiom is a recurring
      form of address to Ezekiel.
    reason: lexical_alternative
  - marker: b
    text: Or more formally, 'and you shall hear a word from my mouth and warn them
      from me.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: A direct rendering of the Hebrew vocative, preserving the idiom used
    throughout Ezekiel. Per doctrine, אָדָם is rendered gender-accurately according
    to context; here the address is to the male prophet and the established idiom
    is singular 'son of man,' not a generic reference to humanity.
- source_word: צֹפֶה
  chosen: watchman
  alternatives:
  - sentinel
  - lookout
  lexicon: HALOT
  rationale: The noun denotes one who keeps watch and gives warning. 'Watchman' best
    preserves both the surveillance and warning function that is central to the surrounding
    context.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have appointed you
  - I have given you
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given you,' English idiom with
    the predicate noun 'watchman' is better expressed as 'I have made you' or 'appointed
    you.' 'Made' preserves the resultative force without sounding bureaucratic.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - to the house of Israel
  - over the house of Israel
  lexicon: HALOT
  rationale: The preposition לְ here marks assignment with reference to Israel. 'For
    the house of Israel' communicates that Ezekiel is appointed on their behalf/in
    relation to them, while remaining natural English.
- source_word: וְשָׁמַעְתָּ
  chosen: when you hear
  alternatives:
  - and you shall hear
  - so you must hear
  lexicon: HALOT
  rationale: 'The prefixed conjunction plus perfect in this instructional context
    is best rendered with a temporal sense: upon hearing a divine message, Ezekiel
    must act. ''When you hear'' fits the sequence of commission and response.'
- source_word: מִפִּי
  chosen: from my mouth
  alternatives:
  - from me
  lexicon: HALOT
  rationale: The Hebrew is concrete and personal. 'From my mouth' preserves the vivid
    anthropomorphic expression of direct divine speech.
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a message
  - anything
  lexicon: HALOT
  rationale: '''Word'' is the standard and sufficiently broad rendering for דָּבָר
    here, referring to a spoken divine communication. ''Message'' is possible but
    less formally tied to the Hebrew wording.'
- source_word: וְהִזְהַרְתָּ
  chosen: you shall warn
  alternatives:
  - you must warn
  - you are to warn
  lexicon: HALOT
  rationale: The Hiphil carries a causative-warning sense. 'You shall warn' preserves
    the commission's force in straightforward English.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Refers back to the house of Israel collectively.
- source_word: מִמֶּנִּי
  chosen: from me
  alternatives:
  - on my behalf
  - at my warning
  lexicon: HALOT
  rationale: 'This indicates the source of the warning: Ezekiel warns as the bearer
    of God''s own warning. ''From me'' is the most direct and transparent rendering.'
