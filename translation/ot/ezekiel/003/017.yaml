theological_decisions:
- issue: Rendering the commission formula with temporal or coordinate force
  chosen_reading: when you hear a word from my mouth, you shall warn them from me
  alternative_readings:
  - and you shall hear a word from my mouth and warn them from me
  rationale: 'The Hebrew sequence can be rendered more formally with repeated ''and,''
    but in context the sense is instructional and conditional/temporal: upon receiving
    God''s word, Ezekiel must pass on the warning. This preserves the prophetic responsibility
    without adding doctrinal content.'
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Retention of the idiom 'Son of man'
  chosen_reading: Son of man
  alternative_readings:
  - Mortal
  - Human one
  rationale: The phrase in Ezekiel is a recurring divine address to the prophet. Retaining
    the traditional but still intelligible idiom preserves intertextual continuity
    and the Hebrew expression's force better than flattening it to a generic modern
    substitute.
  doctrine_reference: 'Contested terms: אָדָם; Translation philosophy §4, §5'
