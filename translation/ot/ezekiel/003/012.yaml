id: EZK.3.12
reference: Ezekiel 3:12
source:
  edition: WLC
  text: וַ/תִּשָּׂאֵ֣/נִי ר֔וּחַ וָ/אֶשְׁמַ֣ע אַחֲרַ֔/י ק֖וֹל רַ֣עַשׁ גָּד֑וֹל בָּר֥וּךְ כְּבוֹד יְהוָ֖ה מִ/מְּקוֹמֽ/וֹ־׃
translation:
  text: 'Then the Spirit lifted me up, and I heard behind me the sound of a great rumbling: “Blessed be the glory of Yahweh from his place.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great shaking,' 'a loud rushing noise,' or 'an earthquake-like sound.' The Hebrew רַעַשׁ can denote both physical shaking and the noise associated with it.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Blessed be the glory of the LORD from his place.' The phrase may mean that the LORD's glory is being blessed as it goes forth from his place, or that the blessing is uttered from the place where his glory dwells.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּשָּׂאֵנִי
  chosen: lifted me up
  alternatives:
  - carried me
  - took me up
  lexicon: HALOT
  rationale: From נשׂא, here with the Spirit as subject and Ezekiel as object. 'Lifted me up' is the most natural English rendering in Ezekiel's visionary context and matches the physical/visionary force without over-specifying transport.
- source_word: רוּחַ
  chosen: the Spirit
  alternatives:
  - a spirit
  - wind
  lexicon: HALOT
  rationale: In Ezekiel's call/vision context, רוּחַ most plausibly refers to the divine Spirit rather than an indefinite spirit or literal wind. The anarthrous Hebrew can still be definite in context. Capitalization reflects this contextual identification, not a doctrinal import beyond the passage's usage.
- source_word: אַחֲרַי
  chosen: behind me
  alternatives:
  - after me
  lexicon: HALOT
  rationale: 'Spatial sense fits the auditory scene: Ezekiel hears a sound coming from behind him. ''After me'' would be less idiomatic and could suggest temporal sequence rather than location.'
- source_word: קוֹל
  chosen: a sound
  alternatives:
  - a voice
  - a noise
  lexicon: HALOT
  rationale: קוֹל can mean 'voice,' 'sound,' or 'noise.' Because it is followed by רַעַשׁ גָּדוֹל and then a quoted acclamation, the immediate referent is the audible phenomenon as a whole. 'Sound' preserves breadth better than 'voice' at this point.
- source_word: רַעַשׁ גָּדוֹל
  chosen: a great rumbling
  alternatives:
  - a great earthquake-like noise
  - a loud rushing noise
  - a great shaking
  lexicon: HALOT
  rationale: רַעַשׁ denotes shaking, quaking, rattling, or tumultuous noise. Here, since Ezekiel hears it, an auditory rendering is required. 'Great rumbling' captures the loud, reverberating character without forcing 'earthquake' where the text does not explicitly say that.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - May ... be blessed
  lexicon: HALOT
  rationale: A conventional doxological/passive participial formula. 'Blessed be' is idiomatic English for this kind of acclamation and preserves the elevated liturgical tone.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: Construct phrase rendered transparently. 'The LORD' follows the project's default for יְהוָה. Retaining 'glory' preserves the theological weight of כבוד in Ezekiel's vision language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמְּקוֹמוֹ
  chosen: from his place
  alternatives:
  - from his dwelling place
  - from his location
  lexicon: HALOT
  rationale: 'The preposition מִן is best taken as source: the blessing/acclamation concerns the LORD''s glory as proceeding ''from his place.'' ''From his place'' is concise and leaves the exact referent open, fitting the visionary ambiguity.'
