theological_decisions:
- issue: Identification of רוּחַ
  chosen_reading: the Spirit refers to the divine Spirit in Ezekiel's visionary experience
  alternative_readings:
  - a spirit
  - wind
  rationale: The immediate literary context repeatedly features supernatural transport and empowerment by God's Spirit in Ezekiel. Rendering as 'the Spirit' best fits the context while avoiding unnecessary paraphrase.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relation of the doxology to the preceding sound
  chosen_reading: The quoted blessing is presented as the content associated with the sound Ezekiel hears behind him
  alternative_readings:
  - The final clause is an unquoted narrator comment
  - The phrase is an exclamation without explicit quotation marks
  rationale: English punctuation benefits from marking the acclamatory content as speech, and the sequence 'I heard ... a sound ... Blessed be ...' naturally invites quotation. This clarifies rather than expands the Hebrew.
  doctrine_reference: Translation philosophy §6
