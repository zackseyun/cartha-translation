id: EZK.3.13
reference: Ezekiel 3:13
source:
  edition: WLC
  text: וְ/ק֣וֹל כַּנְפֵ֣י הַ/חַיּ֗וֹת מַשִּׁיקוֹת֙ אִשָּׁ֣ה אֶל אֲחוֹתָ֔/הּ וְ/ק֥וֹל
    הָ/אוֹפַנִּ֖ים לְ/עֻמָּתָ֑/ם וְ/ק֖וֹל רַ֥עַשׁ גָּדֽוֹל׀־׃
translation:
  text: and the sound of the wings of the living creatures touching one another, and
    the sound of the wheels beside them, and the sound of a great rumbling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'touching, each one to her sister'—a Hebrew idiom meaning corresponding
      to or touching one another.
    reason: lexical_alternative
  - marker: b
    text: Or 'opposite them' for 'beside them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a great noise' or 'a great rattling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: קוֹל can denote voice, sound, or noise. Here it introduces three auditory
    elements in a visionary scene, not speech, so 'sound' is the most natural and
    sufficiently broad rendering.
- source_word: כַּנְפֵי
  chosen: wings
  lexicon: HALOT
  rationale: The construct plural clearly refers to the wings belonging to the living
    creatures.
- source_word: הַחַיּוֹת
  chosen: the living creatures
  alternatives:
  - the living beings
  lexicon: HALOT
  rationale: Consistent with Ezekiel 1 and 3, חַיּוֹת refers to the animated heavenly
    beings of the vision. 'Living creatures' is idiomatic and established without
    overinterpreting their identity.
- source_word: מַשִּׁיקוֹת
  chosen: touching
  alternatives:
  - brushing against
  - joining
  - kissing
  lexicon: HALOT
  rationale: From נשׁק in the sense of touching/joining. In context of wings 'touching
    one another' best fits the imagery and parallels Ezekiel 1:9, 23. 'Kissing' would
    be overly literal and misleading in English.
- source_word: אִשָּׁה אֶל אֲחוֹתָהּ
  chosen: one another
  alternatives:
  - each to her sister
  - each one to the other
  lexicon: HALOT
  rationale: Literally 'a woman to her sister,' a Hebrew idiom for correspondence
    or mutual relation. Since the referent is the wings, not female persons, idiomatic
    English 'one another' conveys the sense while avoiding confusion. The more literal
    alternative is preserved in a footnote.
- source_word: הָאוֹפַנִּים
  chosen: the wheels
  lexicon: HALOT
  rationale: אוֹפַנִּים in Ezekiel's throne vision refers to the wheels associated
    with the living creatures.
- source_word: לְעֻמָּתָם
  chosen: beside them
  alternatives:
  - opposite them
  - corresponding to them
  - alongside them
  lexicon: HALOT
  rationale: The prepositional phrase indicates spatial relation to the living creatures.
    'Beside them' is clear modern English and fits the scene; 'opposite them' is possible
    but less natural here.
- source_word: רַעַשׁ גָּדוֹל
  chosen: a great rumbling
  alternatives:
  - a great earthquake-like noise
  - a loud crashing
  - a great noise
  lexicon: HALOT
  rationale: רַעַשׁ denotes shaking, rattling, or tumultuous noise. In this auditory
    context, 'rumbling' captures the deep, powerful sound without importing a specific
    seismic event.
