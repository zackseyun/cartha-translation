theological_decisions:
- issue: Meaning of 'deliver your life' in the watchman context
  chosen_reading: The phrase refers to preserving the prophet from bloodguilt or accountability
    before God, not teaching salvation by personal merit.
  alternative_readings:
  - You save yourself spiritually
  - You merely preserve your physical life
  rationale: 'In Ezekiel''s watchman passages, the prophet''s responsibility is covenantal
    and judicial: warning the wicked or righteous affects whether their blood is required
    from his hand. The wording should preserve that gravity without importing a doctrine
    of self-salvation.'
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
