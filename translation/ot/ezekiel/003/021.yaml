id: EZK.3.21
reference: Ezekiel 3:21
source:
  edition: WLC
  text: וְ/אַתָּ֞ה כִּ֧י הִזְהַרְתּ֣/וֹ צַדִּ֗יק לְ/בִלְתִּ֥י חֲטֹ֛א צַדִּ֖יק וְ/ה֣וּא
    לֹא חָטָ֑א חָי֤וֹ יִֽחְיֶה֙ כִּ֣י נִזְהָ֔ר וְ/אַתָּ֖ה אֶֽת נַפְשְׁ/ךָ֥ הִצַּֽלְתָּ־־׃ס
translation:
  text: But if you warn a righteous man not to sin, and he does not sin, he will surely
    live because he took warning, and you will have delivered your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he was warned' or 'he heeded the warning.' The Hebrew verb can emphasize
      either receiving the warning or responding to it.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  - indeed
  lexicon: HALOT
  rationale: 'In this conditional construction following וְאַתָּה, כִּי introduces
    the protasis: ''if you warn...''. ''If'' best reflects the syntax and parallels
    the preceding context.'
- source_word: הִזְהַרְתּוֹ
  chosen: you warn him
  alternatives:
  - you have warned him
  - you admonish him
  lexicon: HALOT
  rationale: The Hiphil of זהר means to warn or admonish. English present 'warn' works
    naturally in the conditional sequence. The object suffix is represented by 'him,'
    though English style does not require repeating it after 'righteous man.'
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - a righteous person
  - the righteous man
  lexicon: HALOT
  rationale: The adjective functions substantivally for an individual male singular.
    Per gender-accurate policy, 'man' is retained rather than neutralizing to 'person.'
    The indefinite sense fits the conditional scenario better than 'the righteous
    man.'
- source_word: לְבִלְתִּי חֲטֹא
  chosen: not to sin
  alternatives:
  - so that he does not sin
  - against sinning
  lexicon: HALOT
  rationale: 'This infinitival construction expresses purpose or prevention: the warning
    is given with the aim that he not sin. ''Not to sin'' is concise and accurate.'
- source_word: וְהוּא לֹא חָטָא
  chosen: and he does not sin
  alternatives:
  - and he has not sinned
  - and he did not sin
  lexicon: HALOT
  rationale: Though the Hebrew perfect can be rendered past, in this conditional-result
    context English present fits the general principle being stated. It also pairs
    naturally with the preceding infinitive 'not to sin.'
- source_word: חָיוֹ יִחְיֶה
  chosen: he will surely live
  alternatives:
  - he shall surely live
  - living he will live
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'Will surely
    live' conveys the emphatic force in clear modern English.
- source_word: נִזְהָר
  chosen: he took warning
  alternatives:
  - he was warned
  - he was careful
  - he heeded the warning
  lexicon: HALOT
  rationale: The Niphal of זהר can be understood as receiving and responding to warning.
    'Took warning' captures both the passive and responsive nuance better than the
    flatter 'was warned.'
- source_word: נַפְשְׁךָ
  chosen: your life
  alternatives:
  - your soul
  - yourself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life rather than an immaterial soul
    in a later theological sense. 'Your life' best fits the idiom 'deliver your life'
    in this watchman context.
- source_word: הִצַּלְתָּ
  chosen: you will have delivered
  alternatives:
  - you have delivered
  - you rescued
  - you saved
  lexicon: HALOT
  rationale: 'The Hiphil of נצל means deliver/rescue. ''Will have delivered'' reflects
    the resultative force in English after the conditional sequence: by warning him,
    you will have preserved your own life from liability.'
