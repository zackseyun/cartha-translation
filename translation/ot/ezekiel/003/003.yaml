theological_decisions:
- issue: Rendering of אָדָם within the address בֶּן אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - Adam
  rationale: Per the doctrine's gender-accurate principle, the singular masculine
    idiom here is retained as 'man' within the fixed address 'Son of man.' The phrase
    identifies Ezekiel in his human frailty rather than making a generic statement
    about humanity.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
