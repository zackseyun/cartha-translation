id: EZK.3.3
reference: Ezekiel 3:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י בֶּן אָדָם֙ בִּטְנְ/ךָ֤ תַֽאֲכֵל֙ וּ/מֵעֶ֣י/ךָ תְמַלֵּ֔א
    אֵ֚ת הַ/מְּגִלָּ֣ה הַ/זֹּ֔את אֲשֶׁ֥ר אֲנִ֖י נֹתֵ֣ן אֵלֶ֑י/ךָ וָ/אֹ֣כְלָ֔/ה וַ/תְּהִ֥י
    בְּ/פִ֖/י כִּ/דְבַ֥שׁ לְ/מָתֽוֹק־׃פ
translation:
  text: And he said to me, “Son of man, feed your belly and fill your inward parts
    with this scroll that I am giving you.” So I ate it, and it was in my mouth as
    sweet as honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “human one,” “mortal.” The Hebrew idiom “son of man” is retained here
      as Ezekiel’s repeated form of address.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of Adam
  - mortal
  lexicon: HALOT
  rationale: Retains the established prophetic address and reflects the Hebrew idiom
    literally enough without flattening its force. Although the phrase marks Ezekiel's
    humanity, 'Son of man' is the most transparent and textually faithful rendering
    here.
- source_word: בִּטְנְךָ
  chosen: your belly
  alternatives:
  - your stomach
  - your abdomen
  lexicon: HALOT
  rationale: בֶּטֶן commonly denotes belly/womb/inner body. 'Belly' preserves the
    concrete bodily imagery of eating the scroll better than the more clinical 'abdomen'
    or narrower 'stomach'.
- source_word: תַאֲכֵל
  chosen: feed
  alternatives:
  - eat
  - cause to eat
  lexicon: HALOT
  rationale: The Hiphil form is causative, so 'feed your belly' better reflects the
    verbal stem than a simple 'eat.' It also pairs naturally with the following command
    to fill the inward parts.
- source_word: וּמֵעֶיךָ
  chosen: your inward parts
  alternatives:
  - your insides
  - your bowels
  lexicon: HALOT
  rationale: מֵעֶה refers to inner organs/inner parts. 'Inward parts' preserves the
    embodied Hebrew expression without the archaic or potentially distracting English
    'bowels.'
- source_word: תְמַלֵּא
  chosen: fill
  alternatives:
  - make full
  - satisfy
  lexicon: HALOT
  rationale: A straightforward rendering of מלא in the Piel, matching the concrete
    image of internal fullness.
- source_word: הַמְּגִלָּה
  chosen: scroll
  alternatives:
  - roll
  - book scroll
  lexicon: HALOT
  rationale: The object is a written roll, best rendered 'scroll' in modern English.
- source_word: נֹתֵן
  chosen: I am giving
  alternatives:
  - I give
  - I am about to give
  lexicon: HALOT
  rationale: The participle conveys ongoing or immediate action; 'I am giving' fits
    the scene naturally in English.
- source_word: וָאֹכְלָה
  chosen: So I ate it
  alternatives:
  - and I ate
  - then I ate it
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Supplying 'it' is natural
    in English because the object is contextually explicit.
- source_word: וַתְּהִי בְּפִי
  chosen: it was in my mouth
  alternatives:
  - it became in my mouth
  - it was on my tongue
  lexicon: HALOT
  rationale: A natural English rendering of the clause that preserves the sensory
    focus of the Hebrew.
- source_word: כִּדְבַשׁ לְמָתוֹק
  chosen: as sweet as honey
  alternatives:
  - like honey for sweetness
  - like honey, sweet
  lexicon: HALOT
  rationale: This idiomatic English expression captures both comparison and quality.
    The Hebrew literally says 'like honey for sweetness,' meaning honey-sweet.
