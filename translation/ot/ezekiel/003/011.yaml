  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered kinship phrase בְּנֵי עַמֶּךָ
  chosen_reading: the sons of your people
  alternative_readings:
  - the children of your people
  rationale: Per doctrine, gender-accurate renderings are preferred over flattening to gender-neutral language. The Hebrew is grammatically masculine plural in a representative corporate expression, so the main text keeps 'sons,' with a footnote noting the broader idiomatic sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
