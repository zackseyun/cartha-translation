id: EZK.3.11
reference: Ezekiel 3:11
source:
  edition: WLC
  text: וְ/לֵ֨ךְ בֹּ֤א אֶל הַ/גּוֹלָה֙ אֶל בְּנֵ֣י עַמֶּ֔/ךָ וְ/דִבַּרְתָּ֤ אֲלֵי/הֶם֙ וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהֹוִ֑ה אִֽם יִשְׁמְע֖וּ וְ/אִם יֶחְדָּֽלוּ־־־־׃
translation:
  text: And go, come to the exiles, to the sons of your people, and speak to them and say to them, ‘Thus says the Lord GOD,’ whether they hear or whether they refuse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of your people'; the Hebrew literally says 'sons,' a representative kinship expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'whether they hear or whether they forbear'; the Hebrew literally contrasts hearing with ceasing/refraining, here in the sense of refusing to heed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֵךְ
  chosen: And go
  alternatives:
  - Go
  lexicon: HALOT
  rationale: Qal imperative/volitive force from הלך with prefixed conjunction. Retaining 'and' reflects the Hebrew sequencing and urgency in the commission.
- source_word: בֹּא
  chosen: come
  alternatives:
  - go in
  - enter
  lexicon: HALOT
  rationale: בוא commonly means 'come/go in/enter.' Here, paired with 'go,' it forms a two-step command of movement toward a destination. 'Come' preserves the Hebrew idiom without over-specifying entry.
- source_word: הַגּוֹלָה
  chosen: the exiles
  alternatives:
  - the exile community
  - the captives
  lexicon: HALOT
  rationale: The noun refers collectively to the deported community, not merely the abstract state of exile. 'The exiles' is natural modern English and fits the collective sense.
- source_word: בְּנֵי עַמֶּךָ
  chosen: the sons of your people
  alternatives:
  - the children of your people
  - your people
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew kinship expression and its masculine plural form. 'Your people' alone would omit a significant lexical element. Because the phrase is representative/corporate, a footnote preserves the broader sense.
- source_word: וְדִבַּרְתָּ אֲלֵיהֶם
  chosen: and speak to them
  alternatives:
  - and you shall speak to them
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction in instruction sequence carries imperative/future force. English imperative style is smoother while preserving command force.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: and say to them
  alternatives:
  - and you shall say to them
  lexicon: HALOT
  rationale: This continues the commission sequence. 'Say to them' keeps the repetition present in Hebrew rather than collapsing it into a single speech verb.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic register.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following doctrine, יְהוָה is rendered 'the LORD' by default; in the compound אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering as 'Lord GOD.' This preserves the title-plus-divine-name distinction in readable English.
- source_word: אִם יִשְׁמְעוּ
  chosen: whether they hear
  alternatives:
  - if they hear
  - whether they listen
  lexicon: HALOT
  rationale: In this prophetic formula, אִם ... וְאִם introduces alternatives ('whether ... or whether ...'), not a simple condition. 'Hear' preserves the Hebrew verb and its covenantal resonance.
- source_word: וְאִם יֶחְדָּלוּ
  chosen: or whether they refuse
  alternatives:
  - or whether they forbear
  - or whether they cease
  lexicon: HALOT
  rationale: חדל literally means 'cease/refrain,' but in this Ezekiel formula it idiomatically contrasts with hearing, meaning refusal to heed. 'Refuse' communicates the sense in clear modern English; a footnote preserves the more literal alternative.
