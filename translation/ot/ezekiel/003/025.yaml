theological_decisions:
- issue: Identity of the unnamed plural subject
  chosen_reading: Rendered as indefinite 'they' without specifying who performs the
    binding.
  alternative_readings:
  - God's agents
  - the people
  - a passive-like impersonal sense
  rationale: The Hebrew uses an unspecified third person plural. The translation preserves
    that ambiguity rather than resolving it to divine or human agency where the text
    itself does not explicitly identify the actors.
  doctrine_reference: Preserve theological tension rather than resolve it.
