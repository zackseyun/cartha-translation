id: EZK.3.25
reference: Ezekiel 3:25
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם הִנֵּ֨ה נָתְנ֤וּ עָלֶ֨י/ךָ֙ עֲבוֹתִ֔ים וַ/אֲסָר֖וּ/ךָ
    בָּ/הֶ֑ם וְ/לֹ֥א תֵצֵ֖א בְּ/תוֹכָֽ/ם־׃
translation:
  text: But you, son of man, behold, they will put ropes on you and bind you with
    them, so that you will not go out among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cords' or 'bands.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in their midst.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: A fixed address to Ezekiel throughout the book. 'Son of man' preserves
    the Hebrew idiom and its literary consistency better than smoothing to 'human
    one' or 'mortal.' Although אָדָם can mean 'man' or 'humankind,' here the construct
    phrase functions as a vocative title.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retained as an attention marker. 'Behold' preserves the prophetic force
    and solemnity better than the more colloquial 'look' or 'see.'
- source_word: נָתְנוּ
  chosen: they will put
  alternatives:
  - they have put
  - one will put
  lexicon: HALOT
  rationale: Although morphologically perfect, in this prophetic context it naturally
    carries a future sense in English after הִנֵּה. An indefinite plural subject is
    best represented as 'they,' preserving the Hebrew's unspecified agents without
    over-interpreting.
- source_word: עֲבוֹתִים
  chosen: ropes
  alternatives:
  - cords
  - bands
  lexicon: HALOT
  rationale: The noun denotes binding implements. 'Ropes' is clear modern English
    and fits the following verb 'bind.' 'Cords' is possible but slightly less natural
    here; 'bands' may sound too vague.
- source_word: וַאֲסָרוּךָ
  chosen: and bind you
  alternatives:
  - and tie you up
  - and imprison you
  lexicon: HALOT
  rationale: The verb אסר means to bind or tie. 'Bind you' is the most direct rendering
    and avoids importing the more interpretive sense 'imprison you.'
- source_word: בָּהֶם
  chosen: with them
  alternatives:
  - by them
  - in them
  lexicon: HALOT
  rationale: 'Instrumental sense is most natural: the ropes are the means by which
    Ezekiel is bound.'
- source_word: וְלֹא תֵצֵא
  chosen: so that you will not go out
  alternatives:
  - and you will not go out
  - and you cannot go out
  lexicon: HALOT
  rationale: The sequence expresses result/purpose of the binding. 'So that you will
    not go out' makes the relation clear in English without overstating inability
    as 'cannot.'
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - from among them
  lexicon: HALOT
  rationale: The phrase literally means 'in their midst.' Given the motion verb 'go
    out,' English idiom is best captured by 'go out among them,' meaning he will not
    go out into the people's midst. 'From among them' would reverse the direction.
