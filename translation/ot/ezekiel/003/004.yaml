theological_decisions:
- issue: Rendering of אָדָם within the address בֶּן אָדָם
  chosen_reading: Son of man
  alternative_readings:
  - Mortal
  - Human one
  rationale: Following the doctrine's gender-accurate principle and the idiomatic
    force of the Hebrew, 'Son of man' best preserves the form and recurring prophetic
    address without importing a distinct Christological claim from later usage.
