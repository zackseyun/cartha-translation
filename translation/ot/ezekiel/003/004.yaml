id: EZK.3.4
reference: Ezekiel 3:4
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑/י בֶּן אָדָ֗ם לֶךְ בֹּא֙ אֶל בֵּ֣ית יִשְׂרָאֵ֔ל וְ/דִבַּרְתָּ֥
    בִ/דְבָרַ֖/י אֲלֵי/הֶֽם־־־׃
translation:
  text: Then he said to me, “Son of man, go, come to the house of Israel, and speak
    my words to them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mortal' or 'human one' for 'Son of man.' The Hebrew idiom is Ezekiel's
      recurring form of address.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. The Hebrew is literally 'son
    of man/man.' Per doctrine, gender-accurate rendering is preferred. 'Son of man'
    preserves the idiom and its literary/theological resonance better than the more
    interpretive 'mortal' or 'human one'.
- source_word: לֶךְ בֹּא
  chosen: go, come
  alternatives:
  - go in
  - go to
  - come
  lexicon: HALOT
  rationale: The paired imperatives are both present in the Hebrew and should both
    be represented. 'Go, come to' sounds slightly marked in English but preserves
    the emphatic two-verb command better than collapsing them into a single verb.
- source_word: אֶל בֵּית יִשְׂרָאֵל
  chosen: to the house of Israel
  alternatives:
  - to Israel
  - to the people of Israel
  lexicon: HALOT
  rationale: '''House of Israel'' is a standard prophetic expression referring to
    the people/nation of Israel. Retaining the idiom preserves prophetic diction and
    covenantal nuance.'
- source_word: וְדִבַּרְתָּ
  chosen: and speak
  alternatives:
  - and you shall speak
  - and you must speak
  lexicon: HALOT
  rationale: The perfect with prefixed waw following imperatives functions as a consequent
    command/instruction. 'And speak' is concise, natural, and adequately imperative
    in context.
- source_word: בִּדְבָרַי
  chosen: my words
  alternatives:
  - with my words
  - my message
  lexicon: HALOT
  rationale: The preposition beth here is best taken instrumentally or as complement
    with דבר, yielding 'speak my words' / 'speak with my words.' 'My words' is more
    direct and formal enough without paraphrasing to 'my message.'
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - to the house of Israel
  lexicon: HALOT
  rationale: The pronoun refers back to the house of Israel. English naturally uses
    'to them' after the explicit antecedent.
