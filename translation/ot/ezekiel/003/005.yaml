id: EZK.3.5
reference: Ezekiel 3:5
source:
  edition: WLC
  text: כִּ֡י לֹא֩ אֶל עַ֨ם עִמְקֵ֥י שָׂפָ֛ה וְ/כִבְדֵ֥י לָשׁ֖וֹן אַתָּ֣ה שָׁל֑וּחַ
    אֶל בֵּ֖ית יִשְׂרָאֵֽל־־׃
translation:
  text: For you are not being sent to a people of obscure speech and difficult language,
    but to the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'deep of lip and heavy of tongue,' a Hebrew idiom for speech
      that is difficult to understand.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding commission. 'For' best preserves
    the causal/explanatory force in natural English.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation of the destination clause.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: With verbs of sending, English idiom prefers 'to.'
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  lexicon: HALOT
  rationale: Refers to an ethnic-linguistic group rather than a political state; 'people'
    fits the context of speech and language.
- source_word: עִמְקֵי שָׂפָה
  chosen: of obscure speech
  alternatives:
  - of deep lip
  - of unintelligible speech
  - of strange speech
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'deep of lip,' describing speech that
    is hard to grasp. 'Obscure speech' communicates unintelligibility without over-literal
    awkwardness.
- source_word: וְכִבְדֵי לָשׁוֹן
  chosen: and difficult language
  alternatives:
  - and heavy tongue
  - and hard language
  - and difficult tongue
  lexicon: HALOT
  rationale: The idiom literally 'heavy of tongue' denotes language that is hard to
    understand. 'Difficult language' pairs naturally with the previous phrase and
    conveys the sense clearly.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun addressed to Ezekiel; English 'you'
    is sufficient without adding emphasis.
- source_word: שָׁלוּחַ
  chosen: are being sent
  alternatives:
  - are sent
  - have been sent
  lexicon: HALOT
  rationale: Passive participle functioning predicatively in the present commission
    context. 'Are being sent' captures the ongoing force of the commissioning scene
    in idiomatic English.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: A standard prophetic designation that should be preserved consistently.
    'House of Israel' retains the covenantal and corporate nuance of the Hebrew expression.
