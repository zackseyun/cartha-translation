id: EZK.3.2
reference: Ezekiel 3:2
source:
  edition: WLC
  text: וָ/אֶפְתַּ֖ח אֶת פִּ֑/י וַ/יַּ֣אֲכִלֵ֔/נִי אֵ֖ת הַ/מְּגִלָּ֥ה הַ/זֹּֽאת־׃
translation:
  text: So I opened my mouth, and he fed me this scroll.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and he caused me to eat this scroll' or 'and he made
      me eat this scroll.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶפְתַּח
  chosen: So I opened
  alternatives:
  - And I opened
  - Then I opened
  lexicon: HALOT
  rationale: Qal wayyiqtol of פתח, narrating the next action in sequence. 'So I opened'
    gives natural English narrative flow while preserving the consecutive sense.
- source_word: אֶת־פִּי
  chosen: my mouth
  alternatives:
  - my mouth itself
  lexicon: HALOT
  rationale: Direct-object marker plus 'my mouth' is idiomatically rendered simply
    as 'my mouth' in English.
- source_word: וַיַּאֲכִלֵנִי
  chosen: and he fed me
  alternatives:
  - and he caused me to eat
  - and he made me eat
  lexicon: HALOT
  rationale: Hiphil of אכל with 1cs suffix literally means 'caused me to eat.' In
    this context, where the scroll is given to Ezekiel to consume, 'fed me' is smoother
    English and still preserves the causative idea. The more formal alternative is
    preserved in a footnote because it is a significant lexical nuance.
- source_word: אֵת־הַמְּגִלָּה הַזֹּאת
  chosen: this scroll
  alternatives:
  - this roll
  - this written scroll
  lexicon: HALOT
  rationale: מְגִלָּה denotes a scroll/roll. 'Scroll' is standard, clear modern English
    and fits the ancient writing medium. The demonstrative is naturally rendered attributively
    as 'this scroll'.
