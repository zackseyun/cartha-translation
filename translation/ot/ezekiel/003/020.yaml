id: EZK.3.20
reference: Ezekiel 3:20
source:
  edition: WLC
  text: וּ/בְ/שׁ֨וּב צַדִּ֤יק מִ/צִּדְק/וֹ֙ וְ/עָ֣שָׂה עָ֔וֶל וְ/נָתַתִּ֥י מִכְשׁ֛וֹל
    לְ/פָנָ֖י/ו ה֣וּא יָמ֑וּת כִּ֣י לֹ֤א הִזְהַרְתּ/וֹ֙ בְּ/חַטָּאת֣/וֹ יָמ֔וּת וְ/לֹ֣א
    תִזָּכַ֗רְןָ צִדְקֹתָ/ו֙ אֲשֶׁ֣ר עָשָׂ֔ה וְ/דָמ֖/וֹ מִ/יָּדְ/ךָ֥ אֲבַקֵּֽשׁ׃
translation:
  text: And when a righteous man turns from his righteousness and does injustice,
    and I place a stumbling block before him, he will die. Because you did not warn
    him, he will die in his sin, and his righteous deeds that he did will not be remembered;
    and I will require his blood from your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'commits iniquity' / 'does wrong.' The Hebrew term carries the sense
      of wrongdoing or injustice.
    reason: lexical_alternative
  - marker: b
    text: Or 'I set an obstacle before him.' The Hebrew literally says 'a stumbling
      block.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his acts of righteousness will not be remembered.'
    reason: lexical_alternative
  - marker: d
    text: That is, God will hold the watchman accountable for the man's bloodguilt.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְשׁוּב
  chosen: And when ... turns
  alternatives:
  - And if ... turns
  - And in turning
  lexicon: HALOT
  rationale: The prefixed conjunction plus infinitive construct of שוב introduces
    a temporal circumstance. 'And when ... turns' is natural English and preserves
    the conditional-temporal force without overformal awkwardness.
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - a righteous person
  - the righteous man
  lexicon: HALOT
  rationale: The singular masculine adjective functions substantivally. 'Man' preserves
    the gendered singular form per the gender-accurate policy, while still carrying
    representative force in context.
- source_word: מִצִּדְקוֹ
  chosen: from his righteousness
  alternatives:
  - from his justice
  - from his righteous conduct
  lexicon: HALOT
  rationale: The noun denotes righteousness/right conduct here, not forensic status
    alone. 'Righteousness' is the most direct and consistent rendering.
- source_word: וְעָשָׂה עָוֶל
  chosen: and does injustice
  alternatives:
  - and commits iniquity
  - and does wrong
  lexicon: HALOT
  rationale: עָוֶל denotes wrong, injustice, unrighteousness. 'Does injustice' preserves
    the moral-judicial weight better than the flatter 'does wrong,' while avoiding
    archaic 'iniquity' in the main text.
- source_word: וְנָתַתִּי מִכְשׁוֹל לְפָנָיו
  chosen: and I place a stumbling block before him
  alternatives:
  - and I set an obstacle before him
  - and I put a stumbling block in front of him
  lexicon: HALOT
  rationale: מִכְשׁוֹל is literally a stumbling block/occasion for stumbling. 'Place
    a stumbling block before him' is idiomatic and preserves the metaphor. Present
    tense in English within the conditional sequence reads naturally though the Hebrew
    perfect is prophetic/resultative.
- source_word: הוּא יָמוּת
  chosen: he will die
  alternatives:
  - that man will die
  - he shall die
  lexicon: HALOT
  rationale: The pronoun adds emphasis; English can convey this adequately with simple
    'he will die' in context without overemphatic expansion.
- source_word: כִּי לֹא הִזְהַרְתּוֹ
  chosen: Because you did not warn him
  alternatives:
  - Since you did not warn him
  - For you did not warn him
  lexicon: HALOT
  rationale: כִּי here gives explanatory/causal force. 'Because' best signals the
    reason for the accountability statement that follows.
- source_word: בְּחַטָּאתוֹ
  chosen: in his sin
  alternatives:
  - for his sin
  - in his sinful state
  lexicon: HALOT
  rationale: The preposition ב plus חטאת is most naturally rendered 'in his sin,'
    indicating the sphere/state in which death occurs, and matches common prophetic
    idiom.
- source_word: וְלֹא תִזָּכַרְןָ צִדְקֹתָיו אֲשֶׁר עָשָׂה
  chosen: and his righteous deeds that he did will not be remembered
  alternatives:
  - and the righteous things he did will not be remembered
  - and his acts of righteousness will not be remembered
  lexicon: HALOT
  rationale: The plural צִדְקֹתָיו refers to concrete righteous acts/deeds, not abstract
    righteousness alone. 'Righteous deeds' makes the plural concrete and preserves
    the sense of prior acts.
- source_word: וְדָמוֹ מִיָּדְךָ אֲבַקֵּשׁ
  chosen: and I will require his blood from your hand
  alternatives:
  - and I will demand his blood from your hand
  - and I will hold you accountable for his blood
  lexicon: HALOT
  rationale: This is covenantal/judicial bloodguilt language. 'Require his blood from
    your hand' stays close to the Hebrew idiom while remaining understandable; the
    accountability sense is preserved without paraphrasing away the metaphor.
