theological_decisions:
- issue: Meaning of God placing a 'stumbling block' before the righteous man
  chosen_reading: Retain the concrete metaphor 'stumbling block' without softening
    or resolving the theological tension of divine agency.
  alternative_readings:
  - Render more interpretively as 'an obstacle to make him fall'
  - Treat as merely providential consequence rather than divine action
  rationale: The Hebrew explicitly attributes the placing of the stumbling block to
    God. In keeping with the translation philosophy, the draft preserves the tension
    rather than resolving questions of causation or moral responsibility beyond what
    the text states.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Whether prior righteousness continues to count after apostasy
  chosen_reading: Translate that his prior righteous deeds 'will not be remembered'
    without importing a systematic-theological conclusion about perseverance or loss
    of salvation.
  alternative_readings:
  - Interpret as loss of covenant standing
  - Interpret as merely rhetorical warning
  rationale: The verse states the non-remembrance of prior righteous deeds in this
    judgment context. The translation should preserve that warning as written without
    forcing a denominational reading on perseverance/apostasy debates.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it
