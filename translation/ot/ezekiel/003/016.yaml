id: EZK.3.16
reference: Ezekiel 3:16
source:
  edition: WLC
  text: וַ/יְהִ֕י מִ/קְצֵ֖ה שִׁבְעַ֣ת יָמִ֑ים וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽרפ־׃
translation:
  text: And at the end of seven days, the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened ...'' The clause is a standard narrative formula,
      rendered here in smoother English as ''And at the end of seven days.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'a word from the LORD came to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions as narrative progression. In English,
    a simple connective plus the following event verb reads naturally while preserving
    the temporal advance. The second occurrence is represented in 'the word of the
    LORD came.'
- source_word: מִקְצֵה
  chosen: at the end of
  alternatives:
  - from the end of
  - after
  lexicon: HALOT
  rationale: With מן prefixed to קצה, the idiom marks the point reached after a period
    has elapsed. 'At the end of' is the most natural and sufficiently formal rendering.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward cardinal-plus-noun construction; no reason to expand
    or paraphrase.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - a word from the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. The construct chain is best preserved
    as 'the word of the LORD.' The divine name follows the project's default rendering
    'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering for the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding biblical English
    convention.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the preposition plus first-person singular
    suffix.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in standard Hebrew
    narrative style. 'Saying' preserves the formula without unnecessary expansion.
