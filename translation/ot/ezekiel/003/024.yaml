id: EZK.3.24
reference: Ezekiel 3:24
source:
  edition: WLC
  text: וַ/תָּבֹא בִ֣/י ר֔וּחַ וַ/תַּעֲמִדֵ֖/נִי עַל רַגְלָ֑/י וַ/יְדַבֵּ֤ר אֹתִ/י֙
    וַ/יֹּ֣אמֶר אֵלַ֔/י בֹּ֥א הִסָּגֵ֖ר בְּ/ת֥וֹךְ בֵּיתֶֽ/ךָ־־׃
translation:
  text: Then the Spirit entered into me and set me on my feet, and he spoke with me
    and said to me, “Go, shut yourself inside your house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a spirit entered into me.”
    reason: alternative_reading
  - marker: b
    text: Hebrew literally “Come, shut yourself inside your house.” English idiom
      prefers “Go” in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֔וּחַ
  chosen: the Spirit
  alternatives:
  - a spirit
  - wind
  - breath
  lexicon: HALOT
  rationale: In Ezekiel, רוּחַ in prophetic empowerment contexts commonly refers to
    the divine Spirit rather than an indefinite spirit or literal wind/breath. The
    absence of the article in Hebrew does not prevent a definite rendering in English
    when the referent is contextually specific. Capitalization reflects this contextual
    identification.
- source_word: וַ/תָּבֹא בִ֣/י
  chosen: entered into me
  alternatives:
  - came into me
  - came upon me
  lexicon: HALOT
  rationale: בוא + ב with a personal object naturally conveys entry into the person.
    'Entered into me' is the most direct English equivalent and matches Ezekiel's
    recurring idiom better than the less precise 'came upon me'.
- source_word: וַ/תַּעֲמִדֵ֖/נִי עַל רַגְלָ֑/י
  chosen: set me on my feet
  alternatives:
  - made me stand on my feet
  - caused me to stand on my feet
  lexicon: HALOT
  rationale: The Hiphil of עמד is causative. 'Set me on my feet' is natural modern
    English that preserves the causative sense without sounding wooden.
- source_word: וַ/יְדַבֵּ֤ר אֹתִ/י֙
  chosen: he spoke with me
  alternatives:
  - he spoke to me
  lexicon: HALOT
  rationale: Though the construction is unusual with אֹתִי, in context it introduces
    direct speech addressed to Ezekiel. 'Spoke with me' preserves the personal engagement
    and avoids flattening the idiom, while remaining idiomatic English.
- source_word: בֹּ֥א
  chosen: Go
  alternatives:
  - Come
  lexicon: HALOT
  rationale: Although the verb literally means 'come,' Hebrew often uses בוא idiomatically
    where English prefers 'go,' especially when followed by an instruction directing
    someone to another location. Here English idiom strongly favors 'Go' before 'shut
    yourself inside your house.'
- source_word: הִסָּגֵ֖ר
  chosen: shut yourself inside
  alternatives:
  - shut yourself in
  - be shut in
  - confine yourself
  lexicon: HALOT
  rationale: The Niphal imperative of סגר here is reflexive/passive in force. 'Shut
    yourself inside' clearly conveys the command to withdraw and remain enclosed,
    while sounding natural in contemporary English.
- source_word: בְּ/ת֥וֹךְ בֵּיתֶֽ/ךָ
  chosen: inside your house
  alternatives:
  - within your house
  - in the midst of your house
  lexicon: HALOT
  rationale: בְּתוֹךְ literally means 'in the midst/middle of,' but in this command
    the idiomatic sense is simply being inside the house. 'Inside your house' is accurate
    and readable.
