theological_decisions:
- issue: Identification of רוּחַ
  chosen_reading: the Spirit refers to the divine Spirit empowering Ezekiel
  alternative_readings:
  - a spirit entered into me
  rationale: The immediate context in Ezekiel repeatedly depicts prophetic enablement
    by God's Spirit. Rendering it as 'the Spirit' best fits the literary and theological
    context without importing more than the text suggests.
