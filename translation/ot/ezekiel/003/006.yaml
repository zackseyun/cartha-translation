id: EZK.3.6
reference: Ezekiel 3:6
source:
  edition: WLC
  text: לֹ֣א אֶל עַמִּ֣ים רַבִּ֗ים עִמְקֵ֤י שָׂפָה֙ וְ/כִבְדֵ֣י לָשׁ֔וֹן אֲשֶׁ֥ר לֹֽא
    תִשְׁמַ֖ע דִּבְרֵי/הֶ֑ם אִם לֹ֤א אֲלֵי/הֶם֙ שְׁלַחְתִּ֔י/ךָ הֵ֖מָּה יִשְׁמְע֥וּ
    אֵלֶֽי/ךָ׀־־־׃
translation:
  text: not to many peoples of obscure speech and difficult language, whose words
    you cannot understand. Surely, if I had sent you to them, they would listen to
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'deep of lip and heavy of tongue,' an idiom for speech
      that is difficult to understand.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples groups
  lexicon: HALOT
  rationale: עַמִּים is broader than a single 'people' and naturally plural here;
    'peoples' preserves the ethnic/national plurality better than 'nations' in this
    context.
- source_word: עִמְקֵי שָׂפָה
  chosen: of obscure speech
  alternatives:
  - deep of lip
  - of unintelligible speech
  - of strange speech
  lexicon: HALOT
  rationale: The idiom literally means 'deep of lip,' referring to speech that is
    hard to grasp. 'Obscure speech' communicates the sense in readable English while
    staying close to the metaphor.
- source_word: וְכִבְדֵי לָשׁוֹן
  chosen: and difficult language
  alternatives:
  - and heavy tongue
  - and difficult tongue
  - and hard language
  lexicon: HALOT
  rationale: Literally 'heavy of tongue,' an idiom for speech/language that is difficult
    to follow. 'Difficult language' is natural English and pairs well with the previous
    phrase.
- source_word: אֲשֶׁר לֹא תִשְׁמַע דִּבְרֵיהֶם
  chosen: whose words you cannot understand
  alternatives:
  - whose words you cannot hear
  - whose speech you cannot comprehend
  lexicon: HALOT
  rationale: שׁמע can mean hear or understand depending on context. Since the issue
    is foreign speech, 'understand' best captures the communicative point rather than
    mere auditory hearing.
- source_word: אִם לֹא
  chosen: Surely, if
  alternatives:
  - if not
  - indeed if
  - surely if
  lexicon: HALOT
  rationale: 'Here אִם לֹא introduces a strong asseverative conditional: ''surely,
    if I had sent you...'' This reflects the rhetorical force better than a wooden
    ''if not.'''
- source_word: שְׁלַחְתִּיךָ
  chosen: I had sent you
  alternatives:
  - I sent you
  - I were to send you
  lexicon: HALOT
  rationale: The perfect in this conditional setting is well represented in English
    by a past perfect, expressing the unreal or emphatic hypothetical sense in context.
- source_word: הֵמָּה יִשְׁמְעוּ אֵלֶיךָ
  chosen: they would listen to you
  alternatives:
  - they would hear you
  - they would obey you
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to someone, often with responsiveness.
    'Listen to you' preserves the irony of the verse without overtranslating to 'obey.'
