theological_decisions:
- issue: Corporate designation of Israel in prophetic rebuke
  chosen_reading: a rebellious house
  alternative_readings:
  - a rebellious people
  - the house of rebellion
  rationale: The Hebrew uses the corporate term 'house,' a significant covenantal
    and familial designation in Ezekiel. Retaining 'house' preserves the prophetic
    force and avoids interpretive flattening.
