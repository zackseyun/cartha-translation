id: EZK.3.9
reference: Ezekiel 3:9
source:
  edition: WLC
  text: כְּ/שָׁמִ֛יר חָזָ֥ק מִ/צֹּ֖ר נָתַ֣תִּי מִצְחֶ֑/ךָ לֹֽא תִירָ֤א אוֹתָ/ם֙ וְ/לֹא
    תֵחַ֣ת מִ/פְּנֵי/הֶ֔ם כִּ֛י בֵּֽית מְרִ֖י הֵֽמָּה־־־׃פ
translation:
  text: Like diamond, harder than flint, I have made your forehead. Do not fear them,
    and do not be dismayed before them, for they are a rebellious house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adamant, harder than flint'; the Hebrew שָׁמִיר may denote a very hard
      stone or substance.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמִיר
  chosen: diamond
  alternatives:
  - adamant
  - emery
  - thorn
  lexicon: HALOT
  rationale: In this context of hardness in parallel with 'harder than flint,' the
    term denotes an extremely hard substance, not a plant. 'Diamond' communicates
    the comparison naturally in modern English, while 'adamant' is a traditional but
    less accessible option.
- source_word: חָזָק
  chosen: harder than
  alternatives:
  - stronger than
  - hard
  lexicon: HALOT
  rationale: Used adjectivally in a comparative construction with מִן, it expresses
    superior hardness/strength relative to flint. 'Harder than' fits the imagery of
    an unyielding forehead better than the broader 'stronger than.'
- source_word: צֹר
  chosen: flint
  alternatives:
  - rock
  - stone
  lexicon: HALOT
  rationale: The noun commonly refers to flint or a hard rock. Given the hardness
    imagery, 'flint' is the most precise and idiomatic rendering.
- source_word: מִצְחֶךָ
  chosen: your forehead
  alternatives:
  - your brow
  lexicon: HALOT
  rationale: The word denotes the forehead. 'Forehead' is straightforward modern English
    and preserves the bodily metaphor of resoluteness.
- source_word: תִירָא
  chosen: do not fear
  alternatives:
  - you shall not fear
  - do not be afraid of
  lexicon: HALOT
  rationale: Though morphologically imperfect, in this commissioning context it functions
    as an exhortation/assurance. 'Do not fear' is concise and natural.
- source_word: תֵחַת
  chosen: do not be dismayed
  alternatives:
  - do not be shattered
  - do not be intimidated
  - do not be broken down
  lexicon: HALOT
  rationale: The Niphal of חתת often conveys being broken, shattered, or dismayed.
    In parallel with 'do not fear,' 'do not be dismayed' best captures the emotional
    effect without over-literal awkwardness.
- source_word: מִפְּנֵיהֶם
  chosen: before them
  alternatives:
  - at their presence
  - because of them
  lexicon: HALOT
  rationale: Literally 'from before their face/presence.' 'Before them' preserves
    the idiom in readable English and fits the warning against intimidation in their
    presence.
- source_word: בֵּית מְרִי
  chosen: a rebellious house
  alternatives:
  - a house of rebellion
  - a rebellious people
  lexicon: HALOT
  rationale: A recurring Ezekiel expression for Israel as a corporate community characterized
    by rebellion. 'A rebellious house' preserves the metaphor and prophetic diction
    better than flattening it to 'people'.
