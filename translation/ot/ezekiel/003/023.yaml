theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding כְּבוֹד יְהוָה
  chosen_reading: the glory of Yahweh
  alternative_readings:
  - the LORD's glory
  rationale: The phrase refers to the visible manifestation of God's glory/presence in Ezekiel's vision. The translation preserves the biblical-theological weight of the expression without over-interpreting it beyond the text.
