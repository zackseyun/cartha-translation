id: EZK.3.23
reference: Ezekiel 3:23
source:
  edition: WLC
  text: וָ/אָקוּם֮ וָ/אֵצֵ֣א אֶל הַ/בִּקְעָה֒ וְ/הִנֵּה שָׁ֤ם כְּבוֹד יְהוָה֙ עֹמֵ֔ד כַּ/כָּב֕וֹד אֲשֶׁ֥ר רָאִ֖יתִי עַל נְהַר כְּבָ֑ר וָ/אֶפֹּ֖ל עַל פָּנָֽ/י־־־־־־׃
translation:
  text: So I arose and went out to the valley, and behold, the glory of Yahweh was standing there, like the glory that I had seen by the Kebar River; and I fell on my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plain' for 'the valley' (Hebrew biq'ah).
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אָקוּם
  chosen: So I arose
  alternatives:
  - Then I arose
  - And I arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום marks sequential narrative action. 'So I arose' gives natural English narrative progression without losing the consecutive force.
- source_word: וָ/אֵצֵא
  chosen: went out
  alternatives:
  - went forth
  - went out
  lexicon: HALOT
  rationale: יצא commonly means 'go out.' 'Went out' is idiomatic modern English and preserves the movement from his prior location to the specified place.
- source_word: הַ/בִּקְעָה
  chosen: the valley
  alternatives:
  - the plain
  lexicon: HALOT
  rationale: בִּקְעָה can denote a valley plain or broad depression. 'Valley' fits standard English usage here and coheres with the immediate scene, while 'plain' remains a viable lexical alternative.
- source_word: וְ/הִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a striking sight. 'Behold' preserves the vividness and solemnity of the prophetic narrative better than flatter alternatives.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifest divine glory/presence. The divine name follows the project's default rendering 'the LORD' for יְהוָה. The genitival form 'the glory of the LORD' preserves the Hebrew structure and solemnity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - standing
  lexicon: HALOT
  rationale: The participle presents the glory as in a standing/present posture. 'Was standing' conveys the durative scene-setting force in idiomatic English better than the simple past 'stood.'
- source_word: כַּ/כָּבוֹד
  chosen: like the glory
  alternatives:
  - according to the glory
  - as the glory
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like the glory' is the clearest English expression of the comparison with Ezekiel's earlier vision.
- source_word: אֲשֶׁר רָאִיתִי
  chosen: that I had seen
  alternatives:
  - which I saw
  - that I saw
  lexicon: HALOT
  rationale: English past perfect best reflects the prior event relative to the current scene, making the temporal relationship explicit and natural.
- source_word: עַל נְהַר כְּבָר
  chosen: by the Kebar River
  alternatives:
  - at the Kebar River
  - upon the river Chebar
  lexicon: HALOT
  rationale: עַל with a waterway in narrative context is naturally rendered 'by.' 'Kebar' is a standard transliteration of the proper name; 'River' clarifies נְהַר.
- source_word: וָ/אֶפֹּל עַל פָּנָי
  chosen: and I fell on my face
  alternatives:
  - and I fell facedown
  - and I fell upon my face
  lexicon: HALOT
  rationale: This is a conventional expression of prostration before divine glory. 'I fell on my face' is both literal and idiomatic, preserving the physical and reverential sense.
