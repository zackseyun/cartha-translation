theological_decisions:
- issue: Nature of Ezekiel's inability to speak
  chosen_reading: A divinely imposed muteness that prevents prophetic rebuke except
    when God later opens his mouth.
  alternative_readings:
  - A purely metaphorical silencing
  - A general social inability to persuade
  rationale: The concrete bodily imagery ('tongue' and 'roof of your mouth') indicates
    an enacted divine restraint on speech, not merely a metaphor for ineffective ministry.
    The translation preserves the physical language without expanding beyond the verse.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of בֵּית מְרִי
  chosen_reading: a rebellious house
  alternative_readings:
  - a rebellious people
  rationale: The phrase identifies the covenant community corporately in Ezekiel's
    idiom. Preserving 'house' avoids interpretive flattening and maintains the prophetic
    texture of the book.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gendered language in לְאִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The referent is the male prophet Ezekiel himself, so masculine wording
    is not merely generic but contextually accurate. This follows the gender-accurate
    principle.
  doctrine_reference: Translation philosophy §4
