id: EZK.3.26
reference: Ezekiel 3:26
source:
  edition: WLC
  text: וּ/לְשֽׁוֹנְ/ךָ֙ אַדְבִּ֣יק אֶל חִכֶּ֔/ךָ וְ/נֶֽאֱלַ֔מְתָּ וְ/לֹא תִֽהְיֶ֥ה
    לָ/הֶ֖ם לְ/אִ֣ישׁ מוֹכִ֑יחַ כִּ֛י בֵּ֥ית מְרִ֖י הֵֽמָּה־־׃
translation:
  text: And I will make your tongue cling to the roof of your mouth, and you will
    be mute and will not be for them a man who rebukes, for they are a rebellious
    house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to your palate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be silenced' or 'you will be speechless.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a man who rebukes'; that is, one who reproves or corrects them.
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'a rebellious house,' a common Ezekiel expression for the people
      as a corporate household in rebellion.
    reason: cultural_note
lexical_decisions:
- source_word: אַדְבִּיק
  chosen: I will make ... cling
  alternatives:
  - I will cause ... to stick
  - I will make ... cleave
  lexicon: HALOT
  rationale: 'Hiphil of דבק is causative: YHWH causes Ezekiel''s tongue to adhere.
    ''Make ... cling'' is natural modern English while preserving the causative force.'
- source_word: לְשׁוֹנְךָ
  chosen: your tongue
  lexicon: HALOT
  rationale: Concrete bodily image should be retained literally; it is central to
    the sign-act of imposed muteness.
- source_word: אֶל חִכֶּךָ
  chosen: to the roof of your mouth
  alternatives:
  - to your palate
  lexicon: HALOT
  rationale: חֵךְ can mean palate/roof of the mouth. 'Roof of your mouth' is the clearest
    idiomatic English equivalent.
- source_word: נֶאֱלַמְתָּ
  chosen: you will be mute
  alternatives:
  - you will be silenced
  - you will be speechless
  lexicon: HALOT
  rationale: The Niphal conveys becoming unable to speak. 'Mute' preserves the result
    state and fits the physical imagery of the preceding clause.
- source_word: לֹא תִהְיֶה לָהֶם
  chosen: you will not be for them
  alternatives:
  - you will not become to them
  - you will not serve for them
  lexicon: HALOT
  rationale: Retains the Hebrew existential/relational construction rather than over-interpreting
    it. Slightly formal English is acceptable here to preserve structure.
- source_word: לְאִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers specifically
    to Ezekiel. Per translation philosophy, gender-accurate rendering is preferred
    over neutralizing.
- source_word: מוֹכִיחַ
  chosen: who rebukes
  alternatives:
  - who reproves
  - who corrects
  - a reprover
  lexicon: HALOT
  rationale: From יכח in the Hiphil participial sense of reproving/rebuking. 'Who
    rebukes' is clear modern English and preserves the prophetic confrontational force
    better than the less common 'reprover.'
- source_word: בֵּית מְרִי
  chosen: a rebellious house
  alternatives:
  - a rebellious people
  - a house of rebellion
  lexicon: HALOT
  rationale: A stock expression in Ezekiel. 'House' should be preserved because it
    reflects the Hebrew idiom for the people of Israel as a corporate household, while
    'rebellious' captures מְרִי well.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Ezekiel's muteness. 'For' is concise and natural
    in this prophetic register.
