theological_decisions:
- issue: Referent of the initial רוּחַ
  chosen_reading: the divine Spirit
  alternative_readings:
  - a spirit
  - wind
  rationale: The surrounding context describes prophetic transport and revelation, making the divine Spirit the most coherent referent. This avoids flattening the text into mere meteorological imagery while not importing later doctrinal precision beyond the context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
