id: EZK.3.14
reference: Ezekiel 3:14
source:
  edition: WLC
  text: וְ/ר֥וּחַ נְשָׂאַ֖תְ/נִי וַ/תִּקָּחֵ֑/נִי וָ/אֵלֵ֥ךְ מַר֙ בַּ/חֲמַ֣ת רוּחִ֔/י וְ/יַד יְהוָ֥ה עָלַ֖/י חָזָֽקָה־׃
translation:
  text: And the Spirit lifted me up and took me away, and I went in bitterness, in the heat of my spirit, while the hand of Yahweh was strong upon me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit lifted me up'; 'wind' is also possible for the Hebrew word translated 'Spirit.'
    reason: alternative_reading
  - marker: b
    text: The phrase 'in the heat of my spirit' may also be understood as 'in the rage of my spirit' or 'in the wrath of my spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְר֥וּחַ
  chosen: the Spirit
  alternatives:
  - a spirit
  - wind
  lexicon: HALOT
  rationale: רוּחַ can mean 'spirit,' 'wind,' or 'breath.' In this immediate prophetic context, following the visionary transport language of the surrounding verses, the referent is best understood as the divine Spirit rather than an indefinite spirit or literal wind.
- source_word: נְשָׂאַתְנִי
  chosen: lifted me up
  alternatives:
  - carried me
  - bore me
  lexicon: HALOT
  rationale: The verb נשׂא commonly means 'lift, carry, bear.' 'Lifted me up' fits the visionary movement context and preserves the concrete imagery.
- source_word: וַתִּקָּחֵנִי
  chosen: took me away
  alternatives:
  - seized me
  - took me
  lexicon: HALOT
  rationale: לקח is broadly 'take.' 'Took me away' makes explicit the motion implied by the sequence with 'lifted me up' and avoids overreading coercion with 'seized,' though the action is clearly forceful.
- source_word: וָאֵלֵךְ
  chosen: I went
  alternatives:
  - I walked
  - I departed
  lexicon: HALOT
  rationale: הלך is the standard verb 'go/walk.' 'I went' is the most natural English rendering in this narrative sequence.
- source_word: מַר
  chosen: in bitterness
  alternatives:
  - bitter
  - grieved
  lexicon: HALOT
  rationale: The adjective functions adverbially here. Rendering it with the prepositional phrase 'in bitterness' produces idiomatic English while preserving the emotional state.
- source_word: בַּחֲמַת
  chosen: in the heat of
  alternatives:
  - in the wrath of
  - in the rage of
  lexicon: HALOT
  rationale: חֵמָה can denote heat, wrath, or rage. Because it is linked with 'my spirit,' the phrase likely expresses intense inner agitation. 'Heat of' preserves the metaphor and leaves open whether the emotion is anger, fervor, or turmoil.
- source_word: רוּחִי
  chosen: my spirit
  alternatives:
  - my mind
  - my inner being
  lexicon: HALOT
  rationale: רוּחַ here refers to Ezekiel's inner spirit/disposition, distinct from the initial divine Spirit. 'My spirit' preserves the lexical repetition and the tension between divine action and human response.
- source_word: וְיַד יְהוָה עָלַי חָזָקָה
  chosen: while the hand of the LORD was strong upon me
  alternatives:
  - and the hand of the LORD was strong on me
  - with the hand of the LORD strong upon me
  lexicon: HALOT
  rationale: '''Hand of the LORD'' is a standard idiom for divine power or compulsion in prophetic contexts and should be preserved rather than paraphrased. ''Was strong upon me'' reflects חָזָקָה and conveys the force of divine influence. ''The LORD'' follows the project''s default rendering for יְהוָה.'
