id: EZK.8.13
reference: Ezekiel 8:13
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑/י ע֣וֹד תָּשׁ֥וּב תִּרְאֶ֛ה תּוֹעֵב֥וֹת גְּדֹל֖וֹת אֲשֶׁר
    הֵ֥מָּה עֹשִֽׂים־׃
translation:
  text: Then he said to me, “You will again see greater abominations that they are
    doing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “great abominations.” The Hebrew adjective can be read simply as “great,”
      but in this context of escalating offenses in Ezekiel 8, “greater” brings out
      the likely comparative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'And' is possible but less idiomatic
    in modern English.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  - further
  lexicon: HALOT
  rationale: 'In context, the word signals an additional stage in the visionary tour:
    Ezekiel will see more. ''Again'' best captures repeated/further seeing in natural
    English.'
- source_word: תָּשׁוּב תִּרְאֶה
  chosen: you will ... see
  alternatives:
  - you will return and see
  - you will turn again and see
  lexicon: HALOT
  rationale: The idiom with שוב + another verb commonly functions adverbially ('do
    again/continue'), here 'you will again see.' A more literal 'return and see' is
    possible, but the sense is not primarily physical movement in English; the adverbial
    force is clearer.
- source_word: תּוֹעֵבוֹת
  chosen: abominations
  alternatives:
  - detestable things
  lexicon: HALOT
  rationale: This term is a standard prophetic label for idolatrous and ritually abhorrent
    practices. 'Abominations' preserves the strong moral-religious force and matches
    common biblical usage.
- source_word: גְּדֹלוֹת
  chosen: greater
  alternatives:
  - great
  lexicon: HALOT
  rationale: 'Given the progression in the chapter from one offense to worse ones,
    the comparative sense is contextually appropriate in English: he will see abominations
    greater than those already shown.'
- source_word: אֲשֶׁר הֵמָּה עֹשִׂים
  chosen: that they are doing
  alternatives:
  - which they do
  - that they do
  lexicon: HALOT
  rationale: The relative clause identifies the abominations as ongoing actions. 'That
    they are doing' conveys the participial/imperfective sense naturally in English.
