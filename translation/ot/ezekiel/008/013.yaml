theological_decisions:
- issue: Moral-religious force of תּוֹעֵבוֹת in an idolatry context
  chosen_reading: abominations
  alternative_readings:
  - detestable things
  rationale: The verse condemns practices shown in Ezekiel's temple vision without
    specifying them here. 'Abominations' preserves the prophetic theological weight
    of covenantal offense and ritual/moral revulsion without adding interpretive detail
    beyond the text.
  doctrine_reference: Translation philosophy §1, §5
