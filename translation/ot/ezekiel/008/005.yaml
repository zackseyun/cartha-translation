theological_decisions:
- issue: How explicitly to interpret סֵמֶל הַקִּנְאָה
  chosen_reading: Render as 'this image of jealousy' in the main text, leaving the
    provoking function implicit in the phrase itself.
  alternative_readings:
  - this idol of jealousy
  - this image that provokes jealousy
  rationale: The context clearly concerns idolatry that provokes the LORD’s jealousy,
    but the Hebrew wording is compact and does not explicitly include a verbal clause
    such as 'that provokes.' To preserve theological tension and avoid importing more
    interpretation than the text states, the main text keeps the nominal phrase, while
    alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3; §5
