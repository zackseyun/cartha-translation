id: EZK.8.5
reference: Ezekiel 8:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י בֶּן אָדָ֕ם שָׂא נָ֥א עֵינֶ֖י/ךָ דֶּ֣רֶךְ צָפ֑וֹנָ/ה וָ/אֶשָּׂ֤א
    עֵינַ/י֙ דֶּ֣רֶךְ צָפ֔וֹנָ/ה וְ/הִנֵּ֤ה מִ/צָּפוֹן֙ לְ/שַׁ֣עַר הַ/מִּזְבֵּ֔חַ
    סֵ֛מֶל הַ/קִּנְאָ֥ה הַ/זֶּ֖ה בַּ/בִּאָֽה־־׃
translation:
  text: Then he said to me, “Son of man, please lift up your eyes toward the north.”
    So I lifted up my eyes toward the north, and behold, north of the gate of the
    altar was this image of jealousy at the entrance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this idol of jealousy,” or “this image that provokes jealousy.” The
      Hebrew phrase is compact and may denote either the image’s character or its
      effect in provoking divine jealousy.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of Adam
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. 'Son of man' preserves the
    idiom and its literary/theological resonance better than a flattening paraphrase
    such as 'human one.' It is also gender-accurate to the Hebrew form.
- source_word: שָׂא נָא עֵינֶיךָ
  chosen: please lift up your eyes
  alternatives:
  - please raise your eyes
  - look up
  lexicon: HALOT
  rationale: The Hebrew idiom is more literally 'lift up your eyes.' Retaining 'lift
    up' preserves the vividness of the command, while 'please' reflects נָא as a particle
    of entreaty/politeness.
- source_word: דֶּרֶךְ צָפוֹנָה
  chosen: toward the north
  alternatives:
  - in the direction of the north
  - northward
  lexicon: HALOT
  rationale: The phrase indicates direction. 'Toward the north' is natural modern
    English and accurately reflects the directional sense of דֶּרֶךְ with the directional
    ending.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: '''Behold'' preserves the deictic force and visionary vividness of the
    Hebrew particle in prophetic narrative.'
- source_word: מִצָּפוֹן
  chosen: north of
  alternatives:
  - from the north
  - on the north side of
  lexicon: HALOT
  rationale: In context this marks location relative to the gate rather than movement.
    'North of' best fits the spatial description.
- source_word: לְשַׁעַר הַמִּזְבֵּחַ
  chosen: the gate of the altar
  alternatives:
  - the altar gate
  - the gate leading to the altar
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the construct relationship. The exact
    architectural referent is not fully explicit, so a transparent translation is
    preferable to an interpretive paraphrase.
- source_word: סֵמֶל
  chosen: image
  alternatives:
  - idol
  - figure
  lexicon: HALOT
  rationale: סֵמֶל denotes an image/figure, often cultic. 'Image' is broad enough
    to preserve the lexical sense without over-specifying beyond the word itself;
    the idolatrous character is supplied by context.
- source_word: הַקִּנְאָה
  chosen: of jealousy
  alternatives:
  - that provokes jealousy
  - of provocation to jealousy
  lexicon: HALOT
  rationale: A formally close rendering preserves the genitival ambiguity. In context
    it refers to an image associated with provoking divine jealousy, but the Hebrew
    expression itself is tersely nominal.
- source_word: בַּבִּאָה
  chosen: at the entrance
  alternatives:
  - in the entry
  - at the gateway
  lexicon: HALOT
  rationale: The noun denotes an entrance/entryway. 'At the entrance' is idiomatic
    English and fits the spatial description.
