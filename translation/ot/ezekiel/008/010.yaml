theological_decisions:
- issue: Pejorative force of Ezekiel's idol terminology
  chosen_reading: Render גִּלּוּלֵי as 'idols' in the main text while preserving the
    contemptuous nuance in a footnote.
  alternative_readings:
  - dung-idols
  - filthy idols
  rationale: The Hebrew term is intentionally scornful, but a highly literal pejorative
    gloss in the main text would sound unnatural in contemporary English and could
    distract from the vision's content. A footnote preserves the rhetorical force
    transparently.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception) and §6 (readable modern English)
