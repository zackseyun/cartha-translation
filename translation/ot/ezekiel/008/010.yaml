id: EZK.8.10
reference: Ezekiel 8:10
source:
  edition: WLC
  text: וָ/אָבוֹא֮ וָֽ/אֶרְאֶה֒ וְ/הִנֵּ֨ה כָל תַּבְנִ֜ית רֶ֤מֶשׂ וּ/בְהֵמָה֙ שֶׁ֔קֶץ
    וְ/כָל גִּלּוּלֵ֖י בֵּ֣ית יִשְׂרָאֵ֑ל מְחֻקֶּ֥ה עַל הַ/קִּ֖יר סָבִ֥יב סָבִֽיב־־־׀׃
translation:
  text: So I went in and looked, and behold, every form of creeping thing and beast—detestable
    things—and all the idols of the house of Israel were engraved on the wall all
    around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלֵי ('idols') is a strongly contemptuous term; alternatively,
      'dung-idols' or 'filthy idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אָבוֹא
  chosen: So I went in
  alternatives:
  - And I went in
  - Then I entered
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Went in' is natural English
    in context of entering the chamber shown to Ezekiel; 'So' reflects narrative progression
    without overstating contrast.
- source_word: וָֽ/אֶרְאֶה
  chosen: looked
  alternatives:
  - saw
  - looked and saw
  lexicon: HALOT
  rationale: ראה here follows the entry and introduces what Ezekiel observes. 'Looked'
    avoids redundancy with the following 'behold' while preserving the act of visual
    inspection.
- source_word: וְ/הִנֵּה
  chosen: behold
  alternatives:
  - there was
  - and behold
  - look
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation of the scene. 'Behold' preserves the
    prophetic immediacy better than a flatter 'there was.'
- source_word: כָל תַּבְנִית
  chosen: every form of
  alternatives:
  - every image of
  - every likeness of
  - every pattern of
  lexicon: HALOT
  rationale: תַּבְנִית denotes form, likeness, or representation. In this context
    of wall engravings, 'every form of' captures representational imagery without
    prematurely specifying whether they are statues or drawings.
- source_word: רֶמֶשׂ
  chosen: creeping thing
  alternatives:
  - creeping creature
  - swarming thing
  lexicon: HALOT
  rationale: רֶמֶשׂ commonly refers to creeping or small crawling creatures. 'Creeping
    thing' is a standard, intelligible rendering and fits the catalog of impure imagery.
- source_word: וּ/בְהֵמָה
  chosen: beast
  alternatives:
  - animal
  - cattle
  lexicon: HALOT
  rationale: בְּהֵמָה can mean beast/animal. 'Beast' suits the broad, somewhat ominous
    catalog here better than the domesticated sense 'cattle.'
- source_word: שֶׁקֶץ
  chosen: detestable things
  alternatives:
  - abomination
  - detestable creatures
  - unclean things
  lexicon: HALOT
  rationale: שֶׁקֶץ denotes something detestable, often ritually abhorrent. Here it
    most naturally qualifies the preceding animal imagery as loathsome or impure;
    rendering it appositionally as 'detestable things' preserves the evaluative force
    without importing later technical terminology.
- source_word: גִּלּוּלֵי
  chosen: idols
  alternatives:
  - dung-idols
  - fetishes
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. 'Idols' is the
    clear main-text rendering; the pejorative nuance is important but too woodenly
    reproduced by 'dung-idols' for main text English.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is retained because it is a frequent prophetic designation
    for the covenant people and should not be flattened unnecessarily.
- source_word: מְחֻקֶּה
  chosen: were engraved
  alternatives:
  - were carved
  - were inscribed
  - was engraved
  lexicon: HALOT
  rationale: Passive participle from חקק indicates something carved/engraved. Because
    the subject is a collective series of images, plural English agreement ('were
    engraved') is idiomatic.
- source_word: עַל הַ/קִּיר
  chosen: on the wall
  alternatives:
  - upon the wall
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'on the wall' is natural modern English.
- source_word: סָבִיב סָבִיב
  chosen: all around
  alternatives:
  - round about
  - all around on every side
  lexicon: HALOT
  rationale: The repetition intensifies the surrounding extent of the engravings.
    'All around' captures the sense idiomatically; the comprehensiveness is already
    reinforced by the doubled Hebrew and the context.
