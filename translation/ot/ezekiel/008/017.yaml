id: EZK.8.17
reference: Ezekiel 8:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ/י֮ הֲ/רָאִ֣יתָ בֶן אָדָם֒ הֲ/נָקֵל֙ לְ/בֵ֣ית יְהוּדָ֔ה מֵ/עֲשׂ֕וֹת
    אֶת הַ/תּוֹעֵב֖וֹת אֲשֶׁ֣ר עָֽשׂוּ פֹ֑ה כִּֽי מָלְא֨וּ אֶת הָ/אָ֜רֶץ חָמָ֗ס וַ/יָּשֻׁ֨בוּ֙
    לְ/הַכְעִיסֵ֔/נִי וְ/הִנָּ֛/ם שֹׁלְחִ֥ים אֶת הַ/זְּמוֹרָ֖ה אֶל אַפָּֽ/ם־־־־־־־׃
translation:
  text: Then he said to me, “Have you seen, son of man? Is it too trivial a thing
    for the house of Judah to do the abominations that they have done here, that they
    should also fill the land with violence and turn again to provoke me? And look,
    they are putting the branch to their nose.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following some ancient witnesses, “they are putting the branch to my
      nose.” The Hebrew text reads “their nose.”
    reason: textual_variant
  - marker: b
    text: The phrase “putting the branch to their nose” is obscure and may refer to
      an idolatrous ritual gesture.
    reason: cultural_note
lexical_decisions:
- source_word: הֲרָאִיתָ
  chosen: Have you seen
  alternatives:
  - Do you see
  - Have you observed
  lexicon: HALOT
  rationale: Qal perfect 2ms with interrogative הֲ in direct address; rendered as
    a rhetorical question referring to what Ezekiel has just been shown.
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Standard prophetic address in Ezekiel. A more literal rendering preserves
    the repeated idiom and its literary force; alternatives are possible but less
    consistent with the book's usage.
- source_word: הֲנָקֵל
  chosen: Is it too trivial a thing
  alternatives:
  - Is it a trivial thing
  - Is it too light a thing
  lexicon: HALOT
  rationale: 'The adjective/verb from קל conveys lightness or insignificance. English
    idiom ''too trivial a thing'' captures the rhetorical force: Judah treats these
    abominations as something negligible.'
- source_word: לְבֵית יְהוּדָה
  chosen: for the house of Judah
  alternatives:
  - for Judah
  - for the people of Judah
  lexicon: HALOT
  rationale: Retains the collective covenantal expression 'house of Judah' rather
    than flattening it to the geographic or ethnic shorthand alone.
- source_word: הַתּוֹעֵבוֹת
  chosen: the abominations
  alternatives:
  - the detestable things
  lexicon: HALOT
  rationale: Established rendering for תועבות in idolatry contexts; preserves the
    strong moral-religious sense.
- source_word: פֹה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple deictic adverb referring to the temple setting of the vision.
- source_word: מָלְאוּ אֶת הָאָרֶץ חָמָס
  chosen: fill the land with violence
  alternatives:
  - fill the הארץ with wrong
  - fill the land with injustice
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, wrongdoing, or ruthless injustice. 'Violence'
    is the most direct and common rendering in prophetic judgment contexts.
- source_word: וַיָּשֻׁבוּ לְהַכְעִיסֵנִי
  chosen: turn again to provoke me
  alternatives:
  - return to provoke me
  - turn back to anger me
  lexicon: HALOT
  rationale: 'The sequence conveys repeated action: after prior offenses they again
    engage in conduct that provokes God. ''Provoke'' is idiomatic for הכעיס in divine-anger
    contexts.'
- source_word: וְהִנָּם
  chosen: And look
  alternatives:
  - And behold
  - See
  lexicon: HALOT
  rationale: Introduces a vivid, attention-directing clause. 'And look' is readable
    modern English while preserving the demonstrative force.
- source_word: שֹׁלְחִים
  chosen: they are putting
  alternatives:
  - they are sending
  - they are extending
  lexicon: HALOT
  rationale: Although the verb is literally 'sending/stretching out,' the idiom with
    the following object is obscure. 'Putting' communicates the physical gesture without
    overinterpreting the ritual meaning.
- source_word: הַזְּמוֹרָה
  chosen: the branch
  alternatives:
  - the vine-shoot
  - the twig
  lexicon: HALOT
  rationale: זְמוֹרָה denotes a branch, especially a vine shoot or twig. 'Branch'
    is broad and natural in English; the more specific 'vine-shoot' is possible but
    less certain in this difficult idiom.
- source_word: אֶל אַפָּם
  chosen: to their nose
  alternatives:
  - to their nostril
  - to my nose
  lexicon: HALOT
  rationale: The Masoretic Text reads 'their nose' (3mp suffix). This difficult phrase
    is best translated transparently rather than emended in the main text. Because
    the idiom is obscure and some ancient versions/readings support 'my nose,' that
    alternative is preserved in a footnote.
