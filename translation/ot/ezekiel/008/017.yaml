theological_decisions:
- issue: Obscure final gesture/idiom in the verse
  chosen_reading: Translate the Masoretic Text transparently as 'they are putting
    the branch to their nose'
  alternative_readings:
  - they are putting the branch to my nose
  - they are putting the vine-shoot to their nose as a pagan ritual gesture
  rationale: The final clause is textually and interpretively difficult. Optimal equivalence
    here favors preserving the Hebrew wording as directly as possible without importing
    a specific ritual explanation into the main text. Because an alternative pronominal
    reading ('my nose') has ancient support and affects interpretation, it is preserved
    in a footnote rather than adopted silently.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
