id: EZK.8.11
reference: Ezekiel 8:11
source:
  edition: WLC
  text: וְ/שִׁבְעִ֣ים אִ֣ישׁ מִ/זִּקְנֵ֣י בֵֽית יִ֠שְׂרָאֵל וְ/יַאֲזַנְיָ֨הוּ בֶן
    שָׁפָ֜ן עֹמֵ֤ד בְּ/תוֹכָ/ם֙ עֹמְדִ֣ים לִ/פְנֵי/הֶ֔ם וְ/אִ֥ישׁ מִקְטַרְתּ֖/וֹ בְּ/יָד֑/וֹ
    וַ/עֲתַ֥ר עֲנַֽן הַ/קְּטֹ֖רֶת עֹלֶֽה־־־׃
translation:
  text: And seventy men from the elders of the house of Israel, with Jaazaniah the
    son of Shaphan standing among them, were standing before them, each man with his
    censer in his hand; and the thick cloud of incense was going up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standing in their midst.'
    reason: lexical_alternative
  - marker: b
    text: That is, before the images portrayed on the wall in the chamber (see v.
      10).
    reason: cross_reference
  - marker: c
    text: Or 'incense burner.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the dense cloud of incense was rising.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעִים אִישׁ
  chosen: seventy men
  alternatives:
  - seventy persons
  lexicon: HALOT
  rationale: אִישׁ here is masculine plural by sense with a counted group; 'men' preserves
    the gendered reference and matches the representative group of elders.
- source_word: מִזִּקְנֵי בֵית יִשְׂרָאֵל
  chosen: from the elders of the house of Israel
  alternatives:
  - of the elders of the house of Israel
  - from the elders of Israel
  lexicon: HALOT
  rationale: The preposition מִן is retained as 'from,' indicating these seventy are
    drawn from the elders. 'House of Israel' is preserved rather than simplified to
    'Israel' because it is the Hebrew expression used.
- source_word: יַאֲזַנְיָהוּ בֶן שָׁפָן
  chosen: Jaazaniah the son of Shaphan
  rationale: Personal names are transliterated per project philosophy; filial identification
    is translated straightforwardly.
- source_word: עֹמֵד בְּתוֹכָם
  chosen: standing among them
  alternatives:
  - standing in their midst
  lexicon: HALOT
  rationale: בְּתוֹךְ denotes being in the middle/midst; 'among them' is natural modern
    English while preserving the spatial sense.
- source_word: עֹמְדִים לִפְנֵיהֶם
  chosen: were standing before them
  alternatives:
  - stood before them
  lexicon: HALOT
  rationale: The participle is rendered progressively to reflect the visionary scene
    in progress. 'Before them' is retained literally, referring to the idol-images
    previously described.
- source_word: מִקְטַרְתּוֹ
  chosen: his censer
  alternatives:
  - his incense burner
  lexicon: HALOT
  rationale: The noun denotes an implement for burning incense. 'Censer' is concise
    and standard; 'incense burner' is possible but less idiomatic in this register.
- source_word: וַעֲתַר עֲנַן הַקְּטֹרֶת
  chosen: the thick cloud of incense
  alternatives:
  - the abundance of the cloud of incense
  - the dense cloud of incense
  lexicon: HALOT
  rationale: עֲתַר conveys abundance or thickness. Rendering the phrase as 'the thick
    cloud of incense' captures the intensified visual effect without awkward literalism.
- source_word: עֹלֶה
  chosen: was going up
  alternatives:
  - was rising
  - rose
  lexicon: HALOT
  rationale: The participle depicts ongoing action in the vision. 'Was going up' preserves
    the concrete upward motion of the smoke/cloud.
