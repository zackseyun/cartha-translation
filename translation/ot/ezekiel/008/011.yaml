theological_decisions:
- issue: Referent of 'before them' (לִפְנֵיהֶם)
  chosen_reading: Retained as 'before them,' referring contextually to the portrayed
    idols/creeping things in the chamber.
  alternative_readings:
  - before it
  - in front of them without specifying the referent
  rationale: The plural suffix most naturally points back to the multiple depicted
    abominations in the preceding verse. The translation preserves the pronoun rather
    than resolving it interpretively in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
