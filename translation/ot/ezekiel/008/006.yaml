id: EZK.8.6
reference: Ezekiel 8:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י בֶּן אָדָ֕ם הֲ/רֹאֶ֥ה אַתָּ֖ה מ/הם עֹשִׂ֑ים תּוֹעֵב֨וֹת
    גְּדֹל֜וֹת אֲשֶׁ֥ר בֵּֽית יִשְׂרָאֵ֣ל עֹשִׂ֣ים פֹּ֗ה לְ/רָֽחֳקָה֙ מֵ/עַ֣ל מִקְדָּשִׁ֔/י
    וְ/עוֹד֙ תָּשׁ֣וּב תִּרְאֶ֔ה תּוֹעֵב֖וֹת גְּדֹלֽוֹת־־׀׃ס
translation:
  text: And he said to me, “Son of man, do you see what they are doing—the great abominations
    that the house of Israel is doing here, to drive me far from my sanctuary? But
    you will see still greater abominations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “to make me go far from my sanctuary,” or possibly, “far from my sanctuary.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats “great abominations”; English renders the second occurrence
      as “greater abominations” to reflect the sense of escalation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of Adam
  - mortal
  lexicon: HALOT
  rationale: Retains the established prophetic address and reflects the Hebrew phrase
    literally. Although idiomatically it can mean a human being or mortal, in Ezekiel
    this functions as a repeated form of address and is best preserved formally.
- source_word: הֲרֹאֶה אַתָּה
  chosen: do you see
  alternatives:
  - are you seeing
  - have you seen
  lexicon: HALOT
  rationale: An idiomatic English present question best reflects the Hebrew interrogative
    with participial form addressed directly to Ezekiel.
- source_word: תּוֹעֵבוֹת גְּדֹלוֹת
  chosen: great abominations
  alternatives:
  - great detestable things
  - great abominable acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה commonly denotes something detestable, especially in cultic
    or moral-religious contexts. 'Abominations' preserves the strong covenantal and
    prophetic force here.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the people of Israel
  lexicon: HALOT
  rationale: A formally close rendering that preserves the collective covenantal designation
    used in prophetic discourse.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple deictic adverb; 'here' is natural and sufficient in English.
- source_word: לְרָחֳקָה מֵעַל מִקְדָּשִׁי
  chosen: to drive me far from my sanctuary
  alternatives:
  - to make me go far from my sanctuary
  - for distancing from my sanctuary
  - to remove me from my sanctuary
  lexicon: HALOT
  rationale: The infinitive of רחק with the preposition expresses causing distance.
    Because the sanctuary is God's, the sense is that these abominations provoke his
    withdrawal from it. 'Drive me far from my sanctuary' captures the causative force
    and the personal suffix on 'my sanctuary' without over-paraphrasing.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple
  lexicon: HALOT
  rationale: '''Sanctuary'' is the more precise term for מִקְדָּשׁ, while ''temple''
    would be somewhat narrower and more interpretive.'
- source_word: וְעוֹד תָּשׁוּב תִּרְאֶה
  chosen: But you will see still
  alternatives:
  - And again you will see
  - You will turn and see yet more
  lexicon: HALOT
  rationale: The idiom combines 'turn/return' with 'see' to introduce the next vision
    scene. 'You will see still' communicates continuation naturally; the adversative
    'But' fits the discourse movement toward something worse.
- source_word: תּוֹעֵבוֹת גְּדֹלוֹת
  chosen: greater abominations
  alternatives:
  - great abominations
  - even greater abominations
  lexicon: HALOT
  rationale: Though the Hebrew repeats 'great abominations,' English idiom in this
    comparative context is best expressed as 'greater abominations,' since the clause
    signals escalation from what has just been shown.
