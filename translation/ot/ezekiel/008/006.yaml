theological_decisions:
- issue: Whether the clause לְרָחֳקָה מֵעַל מִקְדָּשִׁי refers to the people's distancing
    themselves from the sanctuary or to their actions causing God's withdrawal from
    it
  chosen_reading: their abominations are described as driving God far from his sanctuary
  alternative_readings:
  - their abominations are done far from my sanctuary
  - their abominations are done to keep people far from my sanctuary
  rationale: The first-person suffix on 'my sanctuary' and the verbal idea of causing
    distance favor the sense that these acts provoke Yahweh's departure, a theme developed
    in Ezekiel. This is a translational and contextual decision, not an imported doctrinal
    claim.
  doctrine_reference: Translation philosophy §1, §3
