id: EZK.8.15
reference: Ezekiel 8:15
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלַ֖/י הֲ/רָאִ֣יתָ בֶן אָדָ֑ם ע֣וֹד תָּשׁ֥וּב תִּרְאֶ֛ה תּוֹעֵב֥וֹת
    גְּדֹל֖וֹת מֵ/אֵֽלֶּה־׃
translation:
  text: Then he said to me, “Have you seen this, son of man? You will see again still
    greater abominations than these.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “You will turn/return and see abominations greater than
      these.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    sequence while preserving the discourse flow; 'And' is possible but less idiomatic
    here.
- source_word: הֲרָאִיתָ
  chosen: Have you seen this
  alternatives:
  - Have you seen
  - Did you see
  lexicon: HALOT
  rationale: Interrogative plus perfect 2ms asks whether Ezekiel has observed what
    was just shown. Adding 'this' makes the deictic sense explicit in English from
    the immediate context, though it is not a separate Hebrew word in this clause.
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. 'Son of man' preserves the
    established idiom and its literary continuity in the book better than more interpretive
    alternatives.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - again
  - further
  lexicon: HALOT
  rationale: עוֹד marks continuation/intensification. 'Still' works naturally with
    'greater' to express that what follows exceeds the previous abominations.
- source_word: תָּשׁוּב תִּרְאֶה
  chosen: You will see again
  alternatives:
  - You will turn and see
  - You will return and see
  lexicon: HALOT
  rationale: The idiom literally combines 'turn/return' with 'see' to introduce another
    visionary scene. 'See again' communicates the discourse function in clear English
    without over-literal awkwardness.
- source_word: תּוֹעֵבוֹת
  chosen: abominations
  alternatives:
  - detestable things
  lexicon: HALOT
  rationale: A strong term for ritually and morally abhorrent practices, especially
    idolatrous acts in Ezekiel. 'Abominations' preserves the prophetic severity and
    established semantic weight.
- source_word: גְּדֹלוֹת
  chosen: greater
  alternatives:
  - great
  - more severe
  lexicon: HALOT
  rationale: 'In comparison with מֵאֵלֶּה, the adjective is best rendered comparatively:
    these coming abominations are greater than the previous ones.'
- source_word: מֵאֵלֶּה
  chosen: than these
  alternatives:
  - than these things
  lexicon: HALOT
  rationale: The comparative min points back to the abominations already shown. 'Than
    these' is concise and clear.
