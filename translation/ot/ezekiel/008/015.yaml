theological_decisions:
- issue: Rendering of בֶן אָדָם in Ezekiel
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The phrase here is a prophetic address to Ezekiel, not a messianic title
    claim. Retaining 'son of man' preserves the book's repeated idiom and avoids flattening
    its literary texture. This also aligns with the doctrine's gender-accurate principle
    by keeping the masculine singular form present in the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
