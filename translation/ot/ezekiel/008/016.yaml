theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with the reverential convention reflected in the doctrine excerpt.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic action of מִשְׁתַּחֲוִיתֶם
  chosen_reading: bowing down ... to the sun
  alternative_readings:
  - worshiping the sun
  rationale: The Hebrew verb can denote worshipful prostration, but the translation keeps the more concrete physical action in the main text and lets the object 'to the sun' convey the idolatrous act without adding interpretive weight beyond the wording.
