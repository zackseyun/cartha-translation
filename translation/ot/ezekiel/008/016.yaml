id: EZK.8.16
reference: Ezekiel 8:16
source:
  edition: WLC
  text: וַ/יָּבֵ֣א אֹתִ֗/י אֶל חֲצַ֣ר בֵּית יְהוָה֮ הַ/פְּנִימִית֒ וְ/הִנֵּה פֶ֜תַח הֵיכַ֣ל יְהוָ֗ה בֵּ֤ין הָֽ/אוּלָם֙ וּ/בֵ֣ין הַ/מִּזְבֵּ֔חַ כְּ/עֶשְׂרִ֥ים וַ/חֲמִשָּׁ֖ה אִ֑ישׁ אֲחֹ֨רֵי/הֶ֜ם אֶל הֵיכַ֤ל יְהוָה֙ וּ/פְנֵי/הֶ֣ם קֵ֔דְמָ/ה וְ/הֵ֛מָּה מִשְׁתַּחֲוִיתֶ֥ם קֵ֖דְמָ/ה לַ/שָּֽׁמֶשׁ־־־־׃
translation:
  text: Then he brought me into the inner court of the house of Yahweh, and behold, at the entrance of the temple of Yahweh, between the porch and the altar, were about twenty-five men, with their backs toward the temple of Yahweh and their faces toward the east; and they were bowing down toward the east to the sun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their backs to the temple of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb denotes prostrating oneself in worship; thus, 'they were worshiping the sun' is a possible fuller sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: Then he brought me
  alternatives:
  - And he brought me
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in narrative sequence; 'Then' captures the progression naturally in English while preserving the consecutive force.
- source_word: חֲצַר בֵּית־יְהוָה הַפְּנִימִית
  chosen: the inner court of the house of the LORD
  alternatives:
  - the inner courtyard of the house of the LORD
  - the inner court of the temple of the LORD
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard'; בֵּית־יְהוָה is literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression, while 'inner court' is standard and clear.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Marks a vivid deictic shift in the vision report; 'behold' preserves the force without paraphrase.
- source_word: פֶּתַח הֵיכַל יְהוָה
  chosen: at the entrance of the temple of the LORD
  alternatives:
  - at the entrance of the house of the LORD
  - at the doorway of the temple of the LORD
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening'; הֵיכָל here refers to the temple sanctuary complex. 'Entrance of the temple' is idiomatic and contextually precise.
- source_word: בֵּין הָאוּלָם וּבֵין הַמִּזְבֵּחַ
  chosen: between the porch and the altar
  alternatives:
  - between the vestibule and the altar
  - between the portico and the altar
  lexicon: HALOT
  rationale: אוּלָם denotes the temple porch/vestibule. 'Porch' is accessible modern English; 'altar' is straightforward for מִזְבֵּחַ.
- source_word: כְּעֶשְׂרִים וַחֲמִשָּׁה אִישׁ
  chosen: about twenty-five men
  alternatives:
  - some twenty-five men
  - approximately twenty-five men
  lexicon: HALOT
  rationale: The prefixed כ on the number gives an approximate sense, so 'about' is warranted. אִישׁ here is a collective singular after the number, best rendered 'men' in English.
- source_word: אֲחֹרֵיהֶם אֶל הֵיכַל יְהוָה
  chosen: with their backs toward the temple of the LORD
  alternatives:
  - their backs to the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'their backs toward the temple of YHWH.' The phrase indicates deliberate orientation away from the sanctuary; 'with their backs toward' is natural and preserves the image.
- source_word: וּפְנֵיהֶם קֵדְמָה
  chosen: and their faces toward the east
  alternatives:
  - and their faces eastward
  lexicon: HALOT
  rationale: קֵדְמָה is directional 'eastward/toward the east.' The phrase contrasts with their backs toward the temple.
- source_word: מִשְׁתַּחֲוִיתֶם
  chosen: they were bowing down
  alternatives:
  - they were worshiping
  - they were prostrating themselves
  lexicon: HALOT
  rationale: The Hishtaphel/Hithpael form of שׁחה denotes prostration/bowing in worship. 'Bowing down' preserves the physical act without over-interpreting, while the object 'to the sun' makes the cultic sense clear.
- source_word: קֵדְמָה לַשָּׁמֶשׁ
  chosen: toward the east to the sun
  alternatives:
  - eastward to the sun
  - toward the east, toward the sun
  lexicon: HALOT
  rationale: 'The Hebrew gives both direction and object of worship. Rendering both explicitly preserves the rhetorical emphasis: they face east and bow to the sun.'
