id: EZK.8.14
reference: Ezekiel 8:14
source:
  edition: WLC
  text: וַ/יָּבֵ֣א אֹתִ֗/י אֶל פֶּ֨תַח֙ שַׁ֣עַר בֵּית יְהוָ֔ה אֲשֶׁ֖ר אֶל הַ/צָּפ֑וֹנָ/ה וְ/הִנֵּה שָׁם֙ הַ/נָּשִׁ֣ים יֹֽשְׁב֔וֹת מְבַכּ֖וֹת אֶת הַ/תַּמּֽוּז־־־־־׃ס
translation:
  text: Then he brought me to the entrance of the gate of the house of Yahweh that faces north, and behold, there the women were sitting, weeping for Tammuz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tammuz was a Mesopotamian deity associated with seasonal mourning rites; the women are depicted participating in that lament.
    reason: cultural_note
  - marker: b
    text: Or 'mourning for Tammuz.' The Hebrew verb literally means 'weeping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא אֹתִי
  chosen: Then he brought me
  alternatives:
  - Then he led me
  - And he brought me
  lexicon: HALOT
  rationale: The Hiphil of בוא here means to cause someone to come, hence 'brought me.' 'Then' captures the narrative waw in smooth English; 'led me' is possible but slightly less direct than the causative sense.
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - opening
  - doorway
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'Entrance' fits the architectural context naturally in English and works well with the following construct chain.
- source_word: שַׁעַר
  chosen: gate
  alternatives:
  - gateway
  lexicon: HALOT
  rationale: Standard rendering in temple architecture. 'Gate' is concise and idiomatic.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Formally, the Hebrew says 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' preserves the source wording better than the more interpretive 'temple,' though the referent is the temple.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר אֶל הַצָּפוֹנָה
  chosen: that faces north
  alternatives:
  - which was toward the north
  - that is on the north side
  lexicon: HALOT
  rationale: This relative phrase identifies the gate by its orientation. 'That faces north' is natural modern English and preserves the directional sense.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Behold' preserves the vividness and prophetic tone without paraphrase.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the direct equivalent.
- source_word: הַנָּשִׁים
  chosen: the women
  alternatives:
  - women
  lexicon: HALOT
  rationale: The article is present and should be reflected. 'The women' points to a visible group in the vision.
- source_word: יֹשְׁבוֹת
  chosen: were sitting
  alternatives:
  - sat
  - were seated
  lexicon: HALOT
  rationale: The participle describes ongoing posture/action in the scene. 'Were sitting' conveys the durative visual aspect in idiomatic English.
- source_word: מְבַכּוֹת
  chosen: weeping for
  alternatives:
  - mourning for
  - lamenting for
  lexicon: HALOT
  rationale: בכה means to weep/cry. In this cultic mourning context, 'weeping for' is both literal and clear; 'mourning for' is interpretive but possible.
- source_word: אֶת הַתַּמּוּז
  chosen: Tammuz
  alternatives: []
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated per translation philosophy. The direct-object marker is not translated. The phrase indicates ritual mourning directed toward the deity/personage Tammuz.
