theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identifying תַּמּוּז as a proper name rather than translating descriptively
  chosen_reading: Tammuz
  alternative_readings:
  - the god Tammuz
  rationale: The Hebrew uses the proper name with the article, but English normally transliterates the name without adding an explanatory noun in the main text. The cultic significance can be clarified in a footnote rather than expanded in translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Translate titles; transliterate names'
