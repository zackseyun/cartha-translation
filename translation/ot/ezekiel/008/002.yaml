id: EZK.8.2
reference: Ezekiel 8:2
source:
  edition: WLC
  text: וָ/אֶרְאֶ֗ה וְ/הִנֵּ֤ה דְמוּת֙ כְּ/מַרְאֵה אֵ֔שׁ מִ/מַּרְאֵ֥ה מָתְנָ֛י/ו וּ/לְ/מַ֖טָּה
    אֵ֑שׁ וּ/מִ/מָּתְנָ֣י/ו וּ/לְ/מַ֔עְלָ/ה כְּ/מַרְאֵה זֹ֖הַר כְּ/עֵ֥ין הַ/חַשְׁמַֽלָ/ה־־׃
translation:
  text: 'Then I looked, and behold, a form with the appearance of fire: from what
    appeared to be his waist and downward, fire; and from his waist and upward, like
    the appearance of brightness, like gleaming amber.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the look of electrum' or 'like glowing metal'; the Hebrew term
      is rare and denotes a brilliant shining substance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  chosen: Then I looked
  alternatives:
  - And I saw
  lexicon: HALOT
  rationale: The waw-consecutive advances the vision narrative. 'Then I looked' is
    natural modern English while preserving the first-person visual report.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Retains the deictic force and suddenness of the visionary scene. 'Behold'
    is slightly elevated but still readable and fitting for prophetic vision discourse.
- source_word: דְמוּת
  chosen: a form
  alternatives:
  - a likeness
  - a figure
  lexicon: HALOT
  rationale: The term indicates something seen in visionary resemblance rather than
    a straightforward identification. 'Form' is readable and avoids overprecision,
    while the following phrases continue to mark resemblance.
- source_word: כְּמַרְאֵה אֵשׁ
  chosen: with the appearance of fire
  alternatives:
  - like the appearance of fire
  - like fire in appearance
  lexicon: HALOT
  rationale: Preserves the comparison language signaled by כ and מראה. This avoids
    stating that the figure simply was fire, maintaining Ezekiel's careful visionary
    language.
- source_word: מִמַּרְאֵה מָתְנָיו
  chosen: from what appeared to be his waist
  alternatives:
  - from the appearance of his loins
  - from the appearance of his waist
  lexicon: HALOT
  rationale: The Hebrew is difficult and elliptical. 'What appeared to be his waist'
    best reflects the repeated language of appearance and avoids the archaic 'loins'
    while keeping anatomical reference.
- source_word: וּלְמַטָּה
  chosen: and downward
  alternatives:
  - and below
  - downward from there
  lexicon: HALOT
  rationale: A concise directional rendering matching the spatial description of the
    figure.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the verbless clause is preserved tersely
    for vividness.
- source_word: וּמִמָּתְנָיו וּלְמַעְלָה
  chosen: and from his waist and upward
  alternatives:
  - and from his loins upward
  - and above his waist
  lexicon: HALOT
  rationale: Maintains the parallel structure with the previous clause and uses contemporary
    anatomical language.
- source_word: כְּמַרְאֵה זֹהַר
  chosen: like the appearance of brightness
  alternatives:
  - like the appearance of radiance
  - like bright splendor
  lexicon: HALOT
  rationale: זֹהַר denotes shining brightness or radiance. 'Brightness' is clear and
    preserves the comparison formula.
- source_word: כְּעֵין הַחַשְׁמַלָה
  chosen: like gleaming amber
  alternatives:
  - like the look of electrum
  - like the appearance of glowing metal
  lexicon: HALOT
  rationale: חַשְׁמַל is a rare term, traditionally understood as a shining metal
    substance, often 'electrum.' 'Gleaming amber' is established in Ezekiel tradition
    and communicates luminous brilliance accessibly, while the more technical alternative
    is preserved in a footnote.
