theological_decisions:
- issue: Visionary description of the figure
  chosen_reading: Use repeated 'appearance' language rather than direct ontological
    identification
  alternative_readings:
  - Render more directly as if the being itself is fire or radiant metal
  rationale: Ezekiel repeatedly qualifies what he sees with terms of likeness and
    appearance. Preserving that restraint avoids overstating what the prophet claims
    to have seen and maintains the theological tension of the vision.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
