theological_decisions:
- issue: Rendering of אָדָם in the address בֶּן אָדָם
  chosen_reading: Son of man
  alternative_readings:
  - human one
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where they match the source's intent. Here the Hebrew idiom is singular masculine
    and is the established form of address to Ezekiel; retaining 'man' best reflects
    the source wording and literary pattern without importing later christological
    claims.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy, point 4; Contested terms:
    אָדָם'
