id: EZK.8.8
reference: Ezekiel 8:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י בֶּן אָדָ֖ם חֲתָר נָ֣א בַ/קִּ֑יר וָ/אֶחְתֹּ֣ר בַּ/קִּ֔יר
    וְ/הִנֵּ֖ה פֶּ֥תַח אֶחָֽד־־׃
translation:
  text: Then he said to me, “Son of man, please dig into the wall.” So I dug into
    the wall, and behold, there was one opening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “break through the wall.” The Hebrew verb can mean to dig through or
      breach a wall.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of man
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. 'Son of man' preserves the
    literal Hebrew and the book’s recurring idiom better than a dynamic rendering
    such as 'human one.' The phrase here is vocational/addressive, not a messianic
    title claim.
- source_word: חֲתָר
  chosen: dig
  alternatives:
  - break through
  - bore through
  lexicon: HALOT
  rationale: The verb denotes digging or breaking through, especially into a wall.
    'Dig' is natural English and fits the repeated use with 'wall' in this verse,
    while still allowing the sense of making an opening.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  lexicon: HALOT
  rationale: The particle softens the imperative. In direct speech, 'please' best
    reflects its polite or urging force in contemporary English; 'now' would sound
    more temporal than modal here.
- source_word: קִּיר
  chosen: wall
  lexicon: HALOT
  rationale: Standard rendering for קִיר in this context of a structural wall.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and there was
  lexicon: HALOT
  rationale: The discourse marker signals sudden discovery. 'Behold' preserves the
    vividness and abruptness of the Hebrew better than flattening it to simple narration.
- source_word: פֶּתַח אֶחָד
  chosen: one opening
  alternatives:
  - an opening
  - a doorway
  lexicon: HALOT
  rationale: פֶּתַח is an opening/entrance. Because אֶחָד is explicit, 'one opening'
    preserves the Hebrew detail. 'Doorway' could imply a finished door structure,
    which the text does not require.
