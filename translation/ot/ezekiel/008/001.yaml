theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: DOCTRINE.md sets the default rendering of יְהוָה as 'the LORD.' In the
    fixed Hebrew combination אֲדֹנָי יְהוִה, standard English practice uses 'Lord
    GOD' to reflect the title-plus-name construction without producing 'Lord LORD.'
    This is a translation convention driven by the source form, not a doctrinal expansion.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
