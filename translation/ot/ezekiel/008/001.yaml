id: EZK.8.1
reference: Ezekiel 8:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/שָּׁנָ֣ה הַ/שִּׁשִּׁ֗ית בַּ/שִּׁשִּׁי֙ בַּ/חֲמִשָּׁ֣ה לַ/חֹ֔דֶשׁ
    אֲנִי֙ יוֹשֵׁ֣ב בְּ/בֵיתִ֔/י וְ/זִקְנֵ֥י יְהוּדָ֖ה יוֹשְׁבִ֣ים לְ/פָנָ֑/י וַ/תִּפֹּ֤ל
    עָלַ/י֙ שָׁ֔ם יַ֖ד אֲדֹנָ֥/י יְהֹוִֽה׀׃
translation:
  text: And it happened in the sixth year, in the sixth month, on the fifth day of
    the month, as I was sitting in my house and the elders of Judah were sitting before
    me, that there the hand of the Lord GOD fell upon me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''there the hand of the Lord GOD fell upon me.'' Some translations
      render ''there'' as ''then,'' but the Hebrew adverb is literally locative.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord Yahweh'; Hebrew אֲדֹנָי יְהוִה, a title-plus-divine-name combination
      traditionally rendered 'Lord GOD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new scene. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: בַּשָּׁנָה הַשִּׁשִּׁית
  chosen: in the sixth year
  alternatives:
  - in the sixth year [of the exile]
  lexicon: HALOT
  rationale: The Hebrew gives the date formula tersely. 'Year' is left without expansion
    in the main text since 'of the exile' is contextual rather than explicit here.
- source_word: בַּשִּׁשִּׁי בַּחֲמִשָּׁה לַחֹדֶשׁ
  chosen: in the sixth month, on the fifth day of the month
  alternatives:
  - in the sixth month, on the fifth of the month
  lexicon: HALOT
  rationale: A formal date expression. The fuller English phrasing is natural and
    precise.
- source_word: אֲנִי יוֹשֵׁב בְּבֵיתִי
  chosen: as I was sitting in my house
  alternatives:
  - I was sitting in my house
  - while I sat in my house
  lexicon: HALOT
  rationale: The verbless-participial construction gives background circumstance.
    'As I was sitting' conveys ongoing background action in idiomatic English.
- source_word: וְזִקְנֵי יְהוּדָה
  chosen: and the elders of Judah
  alternatives:
  - and Judah's elders
  lexicon: HALOT
  rationale: זִקְנֵי denotes the recognized leaders/elders. 'Of Judah' is the most
    transparent rendering of the construct phrase.
- source_word: יוֹשְׁבִים לְפָנַי
  chosen: were sitting before me
  alternatives:
  - were sitting in front of me
  - sat before me
  lexicon: HALOT
  rationale: The participle again marks ongoing circumstance. 'Before me' can denote
    physical presence in audience and fits prophetic setting.
- source_word: וַתִּפֹּל עָלַי
  chosen: fell upon me
  alternatives:
  - came upon me
  - fell on me
  lexicon: HALOT
  rationale: נפל with עַל is literally 'fell upon.' In prophetic contexts this idiom
    describes overpowering divine action. 'Fell upon me' preserves the vividness of
    the Hebrew.
- source_word: שָׁם
  chosen: there
  alternatives:
  - then
  lexicon: HALOT
  rationale: שָׁם normally means 'there.' Though some English versions smooth it to
    a temporal sense, the Hebrew adverb is locative; retaining 'there' respects the
    source text's wording.
- source_word: יַד
  chosen: the hand
  alternatives:
  - the power
  lexicon: HALOT
  rationale: In the idiom 'the hand of YHWH,' 'hand' should be preserved rather than
    interpreted away, since it is a standard prophetic expression for divine power
    or compulsion.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English
    when אֲדֹנָי stands with the divine name. This avoids the awkward 'Lord LORD'
    while still signaling the underlying title + name combination.
