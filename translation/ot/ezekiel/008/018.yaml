theological_decisions:
- issue: Rendering divine judgment language without softening anthropomorphic force
  chosen_reading: Retain 'wrath,' 'my eye will not spare,' and 'nor will I have compassion'
    as direct divine speech
  alternative_readings:
  - Use softer idioms such as 'I will punish them fiercely' or 'I will show no mercy'
  rationale: The Hebrew presents God's judgment in stark, personal, anthropomorphic
    terms. Optimal equivalence here should preserve that severity rather than paraphrase
    it into abstract judicial language.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Concessive nuance before the final refusal
  chosen_reading: Translate וְקָרְאוּ ... וְלֹא אֶשְׁמַע as 'Though they cry ... I
    will not hear them'
  alternative_readings:
  - '''And they will cry ... but I will not hear them'''
  rationale: The Hebrew conjunction is formally simple, but the discourse relation
    is concessive/contrastive. Making that relation explicit improves readability
    while staying within the source sense.
  doctrine_reference: Translation philosophy §6
