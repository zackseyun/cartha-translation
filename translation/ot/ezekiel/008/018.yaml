id: EZK.8.18
reference: Ezekiel 8:18
source:
  edition: WLC
  text: וְ/גַם אֲנִי֙ אֶעֱשֶׂ֣ה בְ/חֵמָ֔ה לֹֽא תָח֥וֹס עֵינִ֖/י וְ/לֹ֣א אֶחְמֹ֑ל וְ/קָרְא֤וּ
    בְ/אָזְנַ/י֙ ק֣וֹל גָּד֔וֹל וְ/לֹ֥א אֶשְׁמַ֖ע אוֹתָֽ/ם־־׃
translation:
  text: But as for me, I also will act in wrath; my eye will not spare, nor will I
    have compassion. Though they cry in my ears with a loud voice, I will not hear
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And they will cry in my ears with a loud voice, but I will not hear
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: But ... also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: The conjunction plus additive particle continues the judgment speech
    while adding emphasis. 'But ... also' captures both continuity and adversative
    force in English discourse better than a flat 'and also.'
- source_word: אֲנִי
  chosen: as for me
  alternatives:
  - I
  - I myself
  lexicon: HALOT
  rationale: The explicit pronoun is emphatic. 'As for me' brings out the contrastive
    emphasis naturally in English without overloading the sentence.
- source_word: אֶעֱשֶׂה
  chosen: will act
  alternatives:
  - will do
  - will act accordingly
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'), but in this judgment context 'will
    act' is idiomatic and conveys decisive divine action without adding content.
- source_word: בְחֵמָה
  chosen: in wrath
  alternatives:
  - with wrath
  - in fury
  lexicon: HALOT
  rationale: חֵמָה denotes burning anger/wrath. 'In wrath' is concise and preserves
    the affective force; 'fury' is possible but slightly more interpretive.
- source_word: לֹא תָחוֹס עֵינִי
  chosen: my eye will not spare
  alternatives:
  - my eye will not pity
  - my eye will not look with compassion
  lexicon: HALOT
  rationale: The idiom of the eye not sparing is common in judgment contexts. 'Spare'
    is the most natural English equivalent and preserves the anthropomorphic imagery.
- source_word: וְלֹא אֶחְמֹל
  chosen: nor will I have compassion
  alternatives:
  - nor will I spare
  - nor will I pity
  lexicon: HALOT
  rationale: חמל overlaps with חס but adds the sense of pity/compassion. Rendering
    it differently from 'spare' avoids flattening the parallelism and preserves the
    emotional nuance.
- source_word: וְקָרְאוּ
  chosen: Though they cry
  alternatives:
  - And they will call
  - And they will cry out
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction after the prior future sequence is
    best rendered as a future-like action in context. 'Cry' fits the following 'with
    a loud voice'; 'though' makes explicit the concessive sense implied by the contrast
    with 'I will not hear them.'
- source_word: בְאָזְנַי
  chosen: in my ears
  alternatives:
  - in my hearing
  - into my ears
  lexicon: HALOT
  rationale: The Hebrew is literally 'in my ears.' Retaining the concrete expression
    preserves the vividness of the appeal while remaining understandable in English.
- source_word: קוֹל גָּדוֹל
  chosen: with a loud voice
  alternatives:
  - with a great voice
  - loudly
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for loud crying. 'With a loud voice'
    is idiomatic and preserves the concrete noun 'voice' better than the adverb 'loudly.'
- source_word: וְלֹא אֶשְׁמַע אוֹתָם
  chosen: I will not hear them
  alternatives:
  - I will not listen to them
  - I will not heed them
  lexicon: HALOT
  rationale: שמע can mean hear/listen/heed. 'Hear them' is the most direct rendering
    and in this context naturally implies refusal to respond.
