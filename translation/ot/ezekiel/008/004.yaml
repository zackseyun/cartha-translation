theological_decisions:
- issue: Nature of the divine manifestation in 'the glory of the God of Israel'
  chosen_reading: Render straightforwardly as a visible manifestation of God's glory
    without adding explanatory language.
  alternative_readings:
  - the visible splendor representing God's presence
  - a technical theophanic manifestation
  rationale: The Hebrew states that the glory of the God of Israel was there and compares
    it to a prior appearance. The translation should preserve the text's theophanic
    force without importing a fuller theological explanation not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
