id: EZK.8.4
reference: Ezekiel 8:4
source:
  edition: WLC
  text: וְ/הִ֨נֵּה שָׁ֔ם כְּב֖וֹד אֱלֹהֵ֣י יִשְׂרָאֵ֑ל כַּ/מַּרְאֶ֕ה אֲשֶׁ֥ר רָאִ֖יתִי
    בַּ/בִּקְעָֽה־׃
translation:
  text: And behold, there was the glory of the God of Israel, like the appearance
    that I had seen in the valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the plain.' The Hebrew בִּקְעָה can refer to a broad valley or plain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: Retains the discourse-marking and vivid deictic force of הִנֵּה. 'Behold'
    is slightly elevated but still natural in prophetic narrative and preserves the
    suddenness of the vision better than a flatter 'there was' alone.
- source_word: שָׁם
  chosen: there was
  alternatives:
  - there
  - in that place
  lexicon: HALOT
  rationale: The adverb means 'there,' but in English idiom it is best carried into
    the existential expression 'there was' to make a complete and natural clause while
    preserving the locative sense.
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - splendor
  - manifest glory
  lexicon: HALOT
  rationale: Standard rendering for כבוד in contexts of divine manifestation. 'Glory'
    preserves both the visible radiance and theological weight without over-interpreting.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct chain, preserving the
    covenantal identification of Israel's God.
- source_word: כַּ/מַּרְאֶה
  chosen: like the appearance
  alternatives:
  - like the vision
  - according to the appearance
  lexicon: HALOT
  rationale: מראה here refers to visible form/appearance. 'Like the appearance' closely
    reflects the comparative כ and links back to Ezekiel's prior visionary experience
    without collapsing it into the more interpretive 'vision.'
- source_word: אֲשֶׁר רָאִיתִי
  chosen: that I had seen
  alternatives:
  - which I saw
  - that I saw
  lexicon: HALOT
  rationale: English past perfect fits the retrospective reference to an earlier vision
    and reads naturally in context.
- source_word: בַּ/בִּקְעָה
  chosen: in the valley
  alternatives:
  - on the plain
  lexicon: HALOT
  rationale: בִּקְעָה can denote a valley plain or broad plain. 'Valley' is chosen
    because it is a common, natural rendering and fits the likely allusion to Ezekiel's
    earlier experience (cf. 3:22–23), while 'plain' remains a viable lexical alternative
    worth preserving.
