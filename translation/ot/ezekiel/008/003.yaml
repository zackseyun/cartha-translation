theological_decisions:
- issue: Whether רוּחַ in the visionary transport is impersonal 'wind' or personal/divine
    'Spirit'
  chosen_reading: the Spirit
  alternative_readings:
  - wind
  - a spirit
  rationale: The immediate context is prophetic vision and supernatural transport,
    making a divine-agent reading most likely. This also coheres with Ezekiel's broader
    usage where God's Spirit transports the prophet. The translation preserves the
    possibility of nuance in a footnote rather than flattening the term's semantic
    range.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence with documented rationale.
