id: EZK.8.3
reference: Ezekiel 8:3
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ תַּבְנִ֣ית יָ֔ד וַ/יִּקָּחֵ֖/נִי בְּ/צִיצִ֣ת רֹאשִׁ֑/י וַ/תִּשָּׂ֣א
    אֹתִ֣/י ר֣וּחַ בֵּֽין הָ/אָ֣רֶץ וּ/בֵ֣ין הַ/שָּׁמַ֡יִם וַ/תָּבֵא֩ אֹתִ֨/י יְרוּשָׁלְַ֜מָ/ה
    בְּ/מַרְא֣וֹת אֱלֹהִ֗ים אֶל פֶּ֜תַח שַׁ֤עַר הַ/פְּנִימִית֙ הַ/פּוֹנֶ֣ה צָפ֔וֹנָ/ה
    אֲשֶׁר שָׁ֣ם מוֹשַׁ֔ב סֵ֖מֶל הַ/קִּנְאָ֥ה הַ/מַּקְנֶֽה׀־־־׃
translation:
  text: Then he stretched out what looked like a hand and took me by a lock of my
    head, and the Spirit lifted me up between the earth and the heavens and brought
    me to Jerusalem in visions of God, to the entrance of the inner gate that faces
    north, where the seat of the image of jealousy that provokes jealousy was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the likeness of a hand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'wind' or 'a spirit' for 'the Spirit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּבְנִית יָד
  chosen: what looked like a hand
  alternatives:
  - the form of a hand
  - the likeness of a hand
  lexicon: HALOT
  rationale: תַּבְנִית denotes a form, pattern, or likeness rather than necessarily
    a literal hand. Because the vision context is explicit, 'what looked like a hand'
    communicates visible resemblance without over-literalizing the manifestation.
- source_word: בְּצִיצִת רֹאשִׁי
  chosen: by a lock of my head
  alternatives:
  - by the tuft of my hair
  - by the forelock of my head
  lexicon: HALOT
  rationale: צִיצִת here refers to a tuft, lock, or fringe-like portion of hair. 'Lock
    of my head' is idiomatic enough for modern English while preserving the concrete
    image.
- source_word: רוּחַ
  chosen: the Spirit
  alternatives:
  - a spirit
  - wind
  lexicon: HALOT
  rationale: In Ezekiel's visionary transport contexts, רוּחַ can denote wind, spirit,
    or the divine Spirit. The feminine verbal agreement fits the noun grammatically,
    and the larger context of prophetic transport favors 'the Spirit' rather than
    an impersonal wind.
- source_word: בֵּין הָאָרֶץ וּבֵין הַשָּׁמַיִם
  chosen: between the earth and the heavens
  alternatives:
  - between earth and heaven
  lexicon: HALOT
  rationale: The Hebrew uses the plural שָׁמַיִם, commonly rendered 'heavens.' Retaining
    'the heavens' preserves the Hebrew form and the elevated visionary tone.
- source_word: בְּמַרְאוֹת אֱלֹהִים
  chosen: in visions of God
  alternatives:
  - in divine visions
  - in a vision from God
  lexicon: HALOT
  rationale: The plural 'visions' matches the Hebrew and echoes Ezekiel's recurring
    visionary formula. 'Of God' is left formally open, allowing either source ('from
    God') or quality ('divine') without collapsing the ambiguity.
- source_word: פֶּתַח שַׁעַר הַפְּנִימִית
  chosen: the entrance of the inner gate
  alternatives:
  - the doorway of the inner gate
  - the entrance to the inner gate
  lexicon: HALOT
  rationale: פֶּתַח is an opening or entrance, and שַׁעַר is gate. 'Entrance of the
    inner gate' is a natural rendering that preserves the construct relationship.
- source_word: הַפּוֹנֶה צָפוֹנָה
  chosen: that faces north
  alternatives:
  - that turns northward
  lexicon: HALOT
  rationale: A straightforward directional participial phrase; 'faces north' is idiomatic
    modern English.
- source_word: מוֹשַׁב
  chosen: the seat of
  alternatives:
  - the place of
  - the dwelling of
  lexicon: HALOT
  rationale: מוֹשַׁב often denotes seat, dwelling place, or location. 'Seat of' preserves
    the sense of a fixed emplacement for the idol/image.
- source_word: סֵמֶל
  chosen: image
  alternatives:
  - idol
  - figure
  lexicon: HALOT
  rationale: סֵמֶל denotes an image or idol. 'Image' is slightly more formal and lets
    the following genitive explain its offensive character, while avoiding importing
    a stronger polemical term than the noun itself requires.
- source_word: הַקִּנְאָה
  chosen: jealousy
  alternatives:
  - envy
  lexicon: HALOT
  rationale: In covenantal contexts קִנְאָה commonly refers to jealousy/zeal, especially
    provoking divine jealousy. 'Jealousy' best fits the likely allusion.
- source_word: הַמַּקְנֶה
  chosen: that provokes jealousy
  alternatives:
  - which provokes to jealousy
  - that causes jealousy
  lexicon: HALOT
  rationale: 'The participle from קנא is causative in sense here: the image arouses
    or provokes jealousy. Rendering both noun and participle with ''jealousy'' preserves
    the wordplay in Hebrew.'
