id: EZK.8.9
reference: Ezekiel 8:9
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אֵלָ֑/י בֹּ֤א וּ/רְאֵה֙ אֶת הַ/תּוֹעֵב֣וֹת הָ/רָע֔וֹת אֲשֶׁ֛ר
    הֵ֥ם עֹשִׂ֖ים פֹּֽה־׃
translation:
  text: And he said to me, “Come and see the evil abominations that they are doing
    here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the detestable things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - Then he said to me
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And' preserves Hebrew narrative
    flow without overinterpreting temporal sequence as 'then.'
- source_word: בֹּא
  chosen: Come
  alternatives:
  - Go in
  - Enter
  lexicon: HALOT
  rationale: The imperative of בוא commonly means 'come.' Although context implies
    movement into a space, 'come' is the most direct and natural rendering here, with
    the spatial nuance supplied by context.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look
  - and behold
  lexicon: HALOT
  rationale: '''See'' is the plain sense of ראה and pairs naturally with ''come.''
    ''Behold'' is too archaic for the stated style, and ''look'' is slightly less
    weighty than the prophetic summons here.'
- source_word: הַתּוֹעֵבוֹת
  chosen: the abominations
  alternatives:
  - the detestable things
  - the abhorrent acts
  lexicon: HALOT
  rationale: תּוֹעֵבוֹת is a strong cultic-moral term in Ezekiel, often used for idolatrous
    offenses. 'Abominations' preserves that gravity and maintains consistency with
    common prophetic usage.
- source_word: הָרָעוֹת
  chosen: evil
  alternatives:
  - wicked
  - terrible
  lexicon: HALOT
  rationale: The adjective modifies 'abominations' and intensifies their moral character.
    'Evil' is the most direct and theologically weighty rendering; 'terrible' could
    shift toward mere severity rather than moral corruption.
- source_word: אֲשֶׁר הֵם עֹשִׂים
  chosen: that they are doing
  alternatives:
  - which they do
  - that they do
  lexicon: HALOT
  rationale: The participial construction conveys ongoing action. 'Are doing' captures
    the progressive sense in idiomatic English better than a simple present.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  - here
  lexicon: HALOT
  rationale: פֹּה is a deictic adverb meaning 'here.' 'In this place' is possible
    but more expansive than the Hebrew requires.
