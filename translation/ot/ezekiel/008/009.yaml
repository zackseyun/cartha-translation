theological_decisions:
- issue: Moral-cultic force of תּוֹעֵבוֹת in a temple-vision context
  chosen_reading: abominations
  alternative_readings:
  - detestable things
  rationale: The verse exposes idolatrous practices within the temple complex. 'Abominations'
    preserves the strong covenantal and cultic condemnation without adding interpretive
    detail beyond the text.
