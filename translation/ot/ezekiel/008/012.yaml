id: EZK.8.12
reference: Ezekiel 8:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ/י֮ הֲ/רָאִ֣יתָ בֶן אָדָם֒ אֲשֶׁ֨ר זִקְנֵ֤י בֵֽית יִשְׂרָאֵל֙
    עֹשִׂ֣ים בַּ/חֹ֔שֶׁךְ אִ֖ישׁ בְּ/חַדְרֵ֣י מַשְׂכִּית֑/וֹ כִּ֣י אֹמְרִ֗ים אֵ֤ין
    יְהוָה֙ רֹאֶ֣ה אֹתָ֔/נוּ עָזַ֥ב יְהוָ֖ה אֶת הָ/אָֽרֶץ־־־׃
translation:
  text: Then he said to me, “Have you seen, son of man, what the elders of the house
    of Israel are doing in the darkness, each man in the rooms of his carved image?
    For they are saying, ‘The LORD does not see us; the LORD has abandoned the land.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the chambers of his imagery” or “in the rooms of his image.” The
      Hebrew term can refer to figured or carved representations, likely idolatrous
      images.
    reason: lexical_alternative
  - marker: b
    text: Or “the LORD has forsaken the land.”
    reason: lexical_alternative
  - marker: c
    text: “The land” may mean the land of Israel/Judah; some translate “the earth.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: הֲרָאִיתָ
  chosen: Have you seen
  alternatives:
  - Do you see
  - Have you looked
  lexicon: HALOT
  rationale: 'The interrogative with qatal naturally looks to what has been shown
    in the vision: ''Have you seen?'' fits the immediate visionary context better
    than a simple present.'
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A more formal rendering preserves
    the repeated prophetic title and its literary force. Although אדם can mean 'man/humankind,'
    here the idiom is a fixed address to the prophet.
- source_word: זִקְנֵי בֵית יִשְׂרָאֵל
  chosen: the elders of the house of Israel
  alternatives:
  - the elders of Israel
  lexicon: HALOT
  rationale: Retains the full construct phrase בֵית יִשְׂרָאֵל rather than compressing
    it, since 'house of Israel' is a significant Ezekiel expression.
- source_word: עֹשִׂים בַּחֹשֶׁךְ
  chosen: are doing in the darkness
  alternatives:
  - are doing in secret
  - are doing in the dark
  lexicon: HALOT
  rationale: A close rendering preserves both literal darkness in the vision and the
    moral sense of secrecy, without paraphrasing to 'in secret' in the main text.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the source's singular distributive
    masculine. The context refers specifically to the male elders.
- source_word: בְּחַדְרֵי מַשְׂכִּיתוֹ
  chosen: in the rooms of his carved image
  alternatives:
  - in the chambers of his imagery
  - in the rooms of his image
  - in his painted chambers
  lexicon: HALOT
  rationale: חַדְרֵי means inner rooms/chambers. מַשְׂכִּית can denote figured representation,
    image, or carved depiction. 'Carved image' communicates idolatrous imagery clearly
    in modern English while staying close to the likely sense. The singular suffix
    is preserved with 'his.'
- source_word: כִּי אֹמְרִים
  chosen: For they are saying
  alternatives:
  - because they say
  - for they say
  lexicon: HALOT
  rationale: Introduces the reason for their hidden actions. Progressive English fits
    the ongoing attitude expressed in the vision.
- source_word: אֵין יְהוָה רֹאֶה אֹתָנוּ
  chosen: The LORD does not see us
  alternatives:
  - The LORD is not seeing us
  lexicon: HALOT
  rationale: Idiomatic English rendering of the negated participial clause. The covenant
    name follows project policy as 'the LORD.'
- source_word: עָזַב יְהוָה אֶת הָאָרֶץ
  chosen: the LORD has abandoned the land
  alternatives:
  - the LORD has forsaken the land
  - the LORD has left the הארץ
  lexicon: HALOT
  rationale: עָזַב commonly means 'forsake/abandon.' 'Abandoned' is readable modern
    English and preserves the force of divine withdrawal. הָאָרֶץ here is best rendered
    'the land,' likely referring to the land of Israel/Judah rather than the whole
    earth.
