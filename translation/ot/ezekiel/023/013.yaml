id: EZK.23.13
reference: Ezekiel 23:13
source:
  edition: WLC
  text: וָ/אֵ֖רֶא כִּ֣י נִטְמָ֑אָה דֶּ֥רֶךְ אֶחָ֖ד לִ/שְׁתֵּי/הֶֽן׃
translation:
  text: And I saw that she had defiled herself; both of them followed the same way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'she was defiled.' The Hebrew verb can be read more statively, but the
      context suggests defilement incurred through her own conduct.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'one way for both of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  chosen: And I saw
  alternatives:
  - Then I saw
  - And I looked and saw
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of ראה introduces the prophet's observation in narrative
    sequence. 'And I saw' preserves both the conjunction and the first-person perception.
- source_word: כִּי
  chosen: that
  alternatives:
  - indeed
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Ezekiel saw rather than giving
    a causal sense. 'That' is the most natural English complementizer.
- source_word: נִטְמָאָה
  chosen: she had defiled herself
  alternatives:
  - she was defiled
  - she had become unclean
  lexicon: HALOT
  rationale: Nifal perfect 3fs of טמא can be rendered statively ('was defiled') or
    reflexively/resultatively ('defiled herself / became unclean'). In this chapter's
    metaphor of sexual and cultic infidelity, the sense is not merely passive condition
    but incurred defilement through her conduct. 'Had defiled herself' best captures
    that nuance in idiomatic English.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: דֶּרֶךְ is used metaphorically for manner of life or conduct. 'Way' is
    concise, natural, and preserves the metaphor common in biblical usage.
- source_word: אֶחָד
  chosen: the same
  alternatives:
  - one
  - single
  lexicon: HALOT
  rationale: With דֶּרֶךְ and followed by לִשְׁתֵּיהֶן, אֶחָד expresses one shared
    course for the two sisters. English idiom prefers 'the same' over the more wooden
    'one way' in this context.
- source_word: לִשְׁתֵּיהֶן
  chosen: both of them
  alternatives:
  - for the two of them
  - for both
  lexicon: HALOT
  rationale: The phrase marks that the one way belonged to both sisters. Rendering
    it as 'both of them' makes the distributive/shared sense clear in English.
