theological_decisions:
- issue: Metaphorical defilement in the allegory of Oholah and Oholibah
  chosen_reading: Render the language as moral/cultic defilement without softening
    the sexual-infidelity metaphor.
  alternative_readings:
  - Render more passively as 'she was defiled'
  - Render more literally but less idiomatically as 'one way was for both of them'
  rationale: The chapter uses shocking marital and sexual imagery to describe covenant
    unfaithfulness and idolatry. The translation should preserve that gravity without
    importing extra doctrinal interpretation. 'She had defiled herself; both of them
    followed the same way' communicates the metaphor clearly and naturally.
  doctrine_reference: Translation philosophy §§1, 3, 6
