id: EZK.23.27
reference: Ezekiel 23:27
source:
  edition: WLC
  text: וְ/הִשְׁבַּתִּ֤י זִמָּתֵ/ךְ֙ מִמֵּ֔/ךְ וְ/אֶת זְנוּתֵ֖/ךְ מֵ/אֶ֣רֶץ מִצְרָ֑יִם
    וְ/לֹֽא תִשְׂאִ֤י עֵינַ֨יִ/ךְ֙ אֲלֵי/הֶ֔ם וּ/מִצְרַ֖יִם לֹ֥א תִזְכְּרִי עֽוֹד־־־׃ס
translation:
  text: So I will put an end to your lewdness from you, and to your prostitution from
    the land of Egypt; and you will not lift up your eyes to them, and you will remember
    Egypt no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will not look to them'—the Hebrew idiom 'lift up your eyes to' can
      imply desire, attention, or dependence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end to
  alternatives:
  - I will cause to cease
  - I will stop
  lexicon: HALOT
  rationale: 'Hiphil of שׁבת here is causative: YHWH will cause the behavior to cease.
    ''Put an end to'' is idiomatic modern English while preserving the causative force
    better than a bare ''stop.'''
- source_word: זִמָּתֵךְ
  chosen: your lewdness
  alternatives:
  - your wickedness
  - your obscene conduct
  lexicon: HALOT
  rationale: זִמָּה in Ezekiel's sexualized judgment context refers to shameless sexual
    depravity or lewd conduct, not generic evil. 'Lewdness' best fits the immediate
    metaphorical and moral context.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - out of you
  - away from you
  lexicon: HALOT
  rationale: The preposition marks removal from the woman/personified city. 'From
    you' preserves the Hebrew image of the behavior being removed from her.
- source_word: וְאֶת זְנוּתֵךְ
  chosen: and your prostitution
  alternatives:
  - and your whoring
  - and your harlotry
  lexicon: HALOT
  rationale: זְנוּת denotes acts of prostitution/whoredom. 'Prostitution' is clear
    modern English and preserves the sexual metaphor without archaic tone. 'Whoring'
    is possible but harsher and less standard in contemporary translation style.
- source_word: מֵאֶרֶץ מִצְרָיִם
  chosen: from the land of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' and retaining it preserves the
    source phrasing and the historical reference to origins in Egypt.
- source_word: לֹא תִשְׂאִי עֵינַיִךְ אֲלֵיהֶם
  chosen: you will not lift up your eyes to them
  alternatives:
  - you will not look to them
  - you will not gaze at them
  lexicon: HALOT
  rationale: The idiom literally means to raise the eyes toward someone, often with
    desire, dependence, or attention. The more literal rendering preserves the imagery;
    the context implies longing or turning toward former lovers/allies.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - toward them
  lexicon: HALOT
  rationale: The masculine plural pronoun most naturally refers to the Egyptians/foreign
    lovers just mentioned. 'To them' is the straightforward rendering.
- source_word: וּמִצְרַיִם לֹא תִזְכְּרִי עוֹד
  chosen: and you will remember Egypt no more
  alternatives:
  - and Egypt you will no longer remember
  - and you will not remember Egypt anymore
  lexicon: HALOT
  rationale: This clause states cessation of remembrance, likely in the sense of longing
    for or turning back to Egypt. 'Remember Egypt no more' is natural and preserves
    the emphatic final עוֹד.
