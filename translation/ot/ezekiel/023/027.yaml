theological_decisions:
- issue: Nature of the sexual language in prophetic discourse
  chosen_reading: Retain the sexualized metaphor in direct form ('lewdness,' 'prostitution')
    as covenantal/judgment language about Jerusalem's unfaithfulness.
  alternative_readings:
  - Soften to more generic moral language such as 'immorality' or 'unfaithfulness'
  rationale: The Hebrew text intentionally uses explicit sexual imagery to portray
    idolatry and political-religious infidelity. Softening it would undertranslate
    the prophetic rhetoric and obscure the force of the judgment oracle.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of 'lift up your eyes to them'
  chosen_reading: Preserve the idiom rather than interpret it fully as political dependence
    or sexual desire.
  alternative_readings:
  - '''look to them for help'''
  - '''long for them'''
  rationale: The idiom can carry nuances of desire, attention, or reliance. The text
    itself does not force a single interpretive narrowing, so preserving the Hebrew
    image best maintains the text's tension.
  doctrine_reference: Translation philosophy §3
