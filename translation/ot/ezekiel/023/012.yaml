id: EZK.23.12
reference: Ezekiel 23:12
source:
  edition: WLC
  text: אֶל בְּנֵי֩ אַשּׁ֨וּר עָגָ֜בָה פַּח֨וֹת וּ/סְגָנִ֤ים קְרֹבִים֙ לְבֻשֵׁ֣י מִכְל֔וֹל
    פָּרָשִׁ֖ים רֹכְבֵ֣י סוּסִ֑ים בַּח֥וּרֵי חֶ֖מֶד כֻּלָּֽ/ם־׃
translation:
  text: She lusted after the sons of Assyria—governors and officials, warriors clothed
    in full attire, horsemen riding horses, all of them desirable young men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men at hand' / 'those nearby' for 'warriors' (קְרֹבִים); the Hebrew
      term is difficult here, and may refer more broadly to attendants or men in close
      service rather than explicitly to fighters.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָגָבָה
  chosen: lusted after
  alternatives:
  - doted on
  - was infatuated with
  - desired
  lexicon: HALOT
  rationale: The verb carries strong erotic desire in this context of sexualized metaphor.
    'Lusted after' preserves the force better than the traditional but milder 'doted
    on.'
- source_word: בְּנֵי אַשּׁוּר
  chosen: the sons of Assyria
  alternatives:
  - the Assyrians
  - the men of Assyria
  lexicon: HALOT
  rationale: Literally 'sons of Assyria.' This can idiomatically mean Assyrians, but
    retaining 'sons of Assyria' preserves the Hebrew expression while remaining understandable.
- source_word: פַּחוֹת
  chosen: governors
  alternatives:
  - provincial governors
  - satraps
  lexicon: HALOT
  rationale: A standard administrative title for regional rulers. 'Governors' is clear
    modern English without over-specifying Persian-era terminology.
- source_word: וּסְגָנִים
  chosen: officials
  alternatives:
  - deputies
  - prefects
  - rulers
  lexicon: HALOT
  rationale: Another governmental title paired with פַּחוֹת. 'Officials' is broad
    but accurate and readable; 'deputies' is possible but less natural here.
- source_word: קְרֹבִים
  chosen: warriors
  alternatives:
  - near ones
  - men at hand
  - nobles
  lexicon: HALOT
  rationale: In this descriptive list of attractive military elites, the term likely
    denotes those who are in close attendance or high-ranking attendants; 'warriors'
    captures the martial context created by horsemen and attire. The exact nuance
    is uncertain, so an alternative is preserved in a footnote.
- source_word: לְבֻשֵׁי מִכְלֹל
  chosen: clothed in full attire
  alternatives:
  - wearing splendid garments
  - dressed perfectly
  - arrayed in full dress
  lexicon: HALOT
  rationale: The phrase describes impressive, complete, or splendid dress. 'Clothed
    in full attire' keeps the sense of complete/elegant military dress without sounding
    archaic.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalrymen
  lexicon: HALOT
  rationale: The noun commonly refers to mounted troops. 'Horsemen' is natural and
    fits the parallel with 'riding horses,' even if somewhat repetitive in English
    as in Hebrew.
- source_word: רֹכְבֵי סוּסִים
  chosen: riding horses
  alternatives:
  - mounted on horses
  lexicon: HALOT
  rationale: This participial phrase reinforces the mounted military image. The apparent
    redundancy with 'horsemen' is retained because it is present in the Hebrew and
    heightens the description.
- source_word: בַּחוּרֵי חֶמֶד
  chosen: desirable young men
  alternatives:
  - handsome young men
  - choice young men
  lexicon: HALOT
  rationale: The phrase denotes young men marked by desirability or attractiveness.
    'Desirable young men' preserves the erotic evaluative tone of the verse.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - every one of them
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the summarizing emphasis at
    the end of the verse.
