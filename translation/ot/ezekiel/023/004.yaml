theological_decisions:
- issue: Meaning of 'They became mine' in prophetic allegory
  chosen_reading: Covenantal belonging/relationship is expressed without specifying
    marriage terminology in the main text.
  alternative_readings:
  - They became my wives
  - They were mine
  rationale: The broader allegory is marital, but this clause itself simply says 'they
    became mine.' Rendering it that way preserves the metaphorical and covenantal
    force without importing a more explicit marital term not present in the Hebrew
    of this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
