id: EZK.23.4
reference: Ezekiel 23:4
source:
  edition: WLC
  text: וּ/שְׁמוֹתָ֗/ן אָהֳלָ֤ה הַ/גְּדוֹלָה֙ וְ/אָהֳלִיבָ֣ה אֲחוֹתָ֔/הּ וַ/תִּֽהְיֶ֣ינָה
    לִ֔/י וַ/תֵּלַ֖דְנָה בָּנִ֣ים וּ/בָנ֑וֹת וּ/שְׁמוֹתָ֕/ן שֹׁמְר֣וֹן אָהֳלָ֔ה וִ/ירוּשָׁלִַ֖ם
    אָהֳלִיבָֽה׃
translation:
  text: 'Their names were Oholah the elder and Oholibah her sister. They became mine
    and bore sons and daughters. As for their names: Samaria is Oholah, and Jerusalem
    is Oholibah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The names Oholah and Oholibah likely echo Hebrew words meaning 'her tent'
      and 'my tent is in her,' reinforcing the allegory.
    reason: cultural_note
  - marker: b
    text: Or 'They were mine'; the Hebrew can be understood as stating possession/relationship,
      and in context the larger allegory is marital.
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁמוֹתָן
  chosen: Their names were
  alternatives:
  - And their names were
  - Now their names were
  lexicon: HALOT
  rationale: Introduces the naming of the two women. English idiom prefers 'Their
    names were' rather than a more wooden 'And their names.'
- source_word: אָהֳלָה
  chosen: Oholah
  lexicon: HALOT
  rationale: Proper name is transliterated per translation philosophy. The name likely
    carries wordplay ('her tent'), but names are transliterated in the main text rather
    than translated.
- source_word: הַגְּדוֹלָה
  chosen: the elder
  alternatives:
  - the greater
  - the older
  lexicon: HALOT
  rationale: In context of two sisters, the adjective denotes seniority/older status
    rather than size. 'The elder' is natural English and fits the sibling comparison.
- source_word: וְאָהֳלִיבָה אֲחוֹתָהּ
  chosen: and Oholibah her sister
  alternatives:
  - and her sister Oholibah
  lexicon: HALOT
  rationale: Keeps the appositional relation clear while preserving the Hebrew sequence
    closely.
- source_word: וַתִּהְיֶינָה לִי
  chosen: They became mine
  alternatives:
  - They were mine
  - They became belonging to me
  lexicon: HALOT
  rationale: The phrase marks covenantal possession/relationship. 'Became mine' reflects
    the verbal sense of entering that state better than the flatter 'were mine.'
- source_word: וַתֵּלַדְנָה
  chosen: bore
  alternatives:
  - gave birth to
  lexicon: HALOT
  rationale: '''Bore'' is concise, natural, and preserves the maternal sense of the
    Hebrew verb ילד.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes male and female offspring, so the
    gendered pair should be preserved rather than generalized to 'children,' in keeping
    with gender-accurate translation philosophy.
- source_word: וּשְׁמוֹתָן
  chosen: 'As for their names:'
  alternatives:
  - 'And their names were:'
  - 'Their names were:'
  lexicon: HALOT
  rationale: The second occurrence functions resumptively to identify the allegorical
    referents. 'As for their names:' signals this explanatory turn in readable English.
- source_word: שֹׁמְרוֹן אָהֳלָה
  chosen: Samaria is Oholah
  alternatives:
  - Samaria, Oholah
  - Oholah is Samaria
  lexicon: HALOT
  rationale: The clause identifies the symbolic woman with the city/kingdom. Supplying
    'is' makes the equation explicit in English.
- source_word: וִירוּשָׁלִַם אָהֳלִיבָה
  chosen: and Jerusalem is Oholibah
  alternatives:
  - Jerusalem, Oholibah
  - Oholibah is Jerusalem
  lexicon: HALOT
  rationale: As with Samaria/Oholah, English requires an explicit copula for clarity.
