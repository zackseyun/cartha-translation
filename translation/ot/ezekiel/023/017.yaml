theological_decisions:
- issue: Sexual and moral imagery in prophetic allegory
  chosen_reading: Retain the explicit sexual metaphor and defilement language as part
    of the prophetic portrayal of Jerusalem/Oholibah's political-spiritual infidelity.
  alternative_readings:
  - Soften the imagery into purely political alliance language
  rationale: The Hebrew text intentionally uses sexualized language to depict covenantal
    unfaithfulness and foreign entanglement. Softening it would omit a significant
    feature of the prophetic rhetoric.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
