id: EZK.23.17
reference: Ezekiel 23:17
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ אֵלֶ֤י/הָ בְנֵֽי בָבֶל֙ לְ/מִשְׁכַּ֣ב דֹּדִ֔ים וַ/יְטַמְּא֥וּ
    אוֹתָ֖/הּ בְּ/תַזְנוּתָ֑/ם וַ/תִּ֨טְמָא בָ֔/ם וַ/תֵּ֥קַע נַפְשָׁ֖/הּ מֵ/הֶֽם־־׃
translation:
  text: Then the sons of Babylon came to her, to the bed of love, and they defiled
    her with their prostitution; and she was defiled by them, and she became disgusted
    with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians' or 'the men of Babylon.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to a bed of lovemaking.'
    reason: lexical_alternative
  - marker: c
    text: Or 'she loathed them' or 'her soul was alienated from them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי בָבֶל
  chosen: the sons of Babylon
  alternatives:
  - the Babylonians
  - the men of Babylon
  lexicon: HALOT
  rationale: Formally, the construct phrase is 'sons of Babylon.' This preserves the
    Hebrew expression while remaining intelligible in English. 'Babylonians' is smoother
    but less transparent to the source wording; 'men of Babylon' is interpretive.
- source_word: לְמִשְׁכַּב דֹּדִים
  chosen: to the bed of love
  alternatives:
  - for a bed of lovemaking
  - to the bed of lovers
  lexicon: HALOT
  rationale: מִשְׁכָּב is 'bed/lying place,' and דֹּדִים often denotes love or love-making
    in erotic contexts. 'Bed of love' keeps the metaphorical and sexual sense without
    becoming overly paraphrastic. 'Lovemaking' is possible but more explicit than
    the Hebrew idiom requires.
- source_word: וַיְטַמְּאוּ אֹתָהּ
  chosen: they defiled her
  alternatives:
  - they made her unclean
  lexicon: HALOT
  rationale: טמא in sexual and cultic-moral contexts commonly carries the sense 'defile/make
    unclean.' 'Defiled' is the more natural English choice here and preserves the
    moral-ritual force.
- source_word: בְּתַזְנוּתָם
  chosen: with their prostitution
  alternatives:
  - by their whoring
  - with their harlotry
  lexicon: HALOT
  rationale: זְנוּת denotes prostitution/whoredom/sexual immorality, and in Ezekiel
    it also functions metaphorically for political-religious infidelity. 'Prostitution'
    is clear modern English and preserves the sexual metaphor. 'Whoring' is vivid
    but less natural for many readers; 'harlotry' is archaic.
- source_word: וַתִּטְמָא בָם
  chosen: she was defiled by them
  alternatives:
  - she became unclean through them
  - she was made unclean by them
  lexicon: HALOT
  rationale: The passive-like/resultative sense in context is best represented by
    'she was defiled by them.' The preposition ב can indicate agency/instrumentality
    here ('by/through them').
- source_word: וַתֵּקַע נַפְשָׁהּ מֵהֶם
  chosen: she became disgusted with them
  alternatives:
  - her soul was alienated from them
  - she was estranged from them
  - she loathed them
  lexicon: HALOT
  rationale: The idiom with נֶפֶשׁ and this verb in Ezekiel expresses revulsion, alienation,
    or loathing. 'Became disgusted with them' communicates the emotional recoil in
    clear modern English. 'Loathed them' is possible, but the Hebrew idiom suggests
    a movement into estrangement/disgust rather than only a static emotion.
