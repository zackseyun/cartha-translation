id: EZK.23.15
reference: Ezekiel 23:15
source:
  edition: WLC
  text: חֲגוֹרֵ֨י אֵז֜וֹר בְּ/מָתְנֵי/הֶ֗ם סְרוּחֵ֤י טְבוּלִים֙ בְּ/רָ֣אשֵׁי/הֶ֔ם
    מַרְאֵ֥ה שָׁלִשִׁ֖ים כֻּלָּ֑/ם דְּמ֤וּת בְּנֵֽי בָבֶל֙ כַּשְׂדִּ֔ים אֶ֖רֶץ מוֹלַדְתָּֽ/ם־׃
translation:
  text: with belts fastened at their waists, with flowing turbans on their heads,
    all of them having the appearance of officers, resembling the sons of Babylon,
    Chaldeans, the land of their birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'captains.' The Hebrew שָׁלִשִׁים can denote elite military men or high-ranking
      officers; 'officers' is used here as a broader rendering.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Babylon,' a filial expression for Babylonians.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲגוֹרֵי אֵזוֹר
  chosen: with belts fastened
  alternatives:
  - girded with a belt
  - wearing belts
  lexicon: HALOT
  rationale: The participial construction describes attire. 'With belts fastened'
    is natural English while preserving the concrete image of being girded with a
    belt.
- source_word: בְּמָתְנֵיהֶם
  chosen: at their waists
  alternatives:
  - on their loins
  - around their waists
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the waist/loins. 'At their waists' is readable modern
    English and retains the bodily location without archaic tone.
- source_word: סְרוּחֵי טְבוּלִים
  chosen: with flowing turbans
  alternatives:
  - with hanging turbans
  - with trailing headwraps
  lexicon: HALOT
  rationale: The phrase refers to headgear that hangs or flows. 'Turbans' is the standard
    rendering for טְבוּלִים here, and 'flowing' captures the sense of סְרוּחֵי as
    extended or trailing.
- source_word: בְּרָאשֵׁיהֶם
  chosen: on their heads
  alternatives:
  - upon their heads
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'on their heads' is idiomatic and precise.
- source_word: מַרְאֵה שָׁלִשִׁים
  chosen: having the appearance of officers
  alternatives:
  - looking like captains
  - having the appearance of adjutants
  lexicon: HALOT
  rationale: שָׁלִשִׁים often denotes high-ranking military men or officers. 'Officers'
    best conveys rank without over-specifying a debated ancient title.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: Included explicitly to preserve the distributive emphasis in the Hebrew.
- source_word: דְּמוּת בְּנֵי בָבֶל
  chosen: resembling the sons of Babylon
  alternatives:
  - in the likeness of Babylonians
  - like the men of Babylon
  lexicon: HALOT
  rationale: דְּמוּת is 'likeness/resemblance.' 'Sons of Babylon' preserves the Hebrew
    filial idiom more closely than flattening it to 'Babylonians,' while remaining
    understandable.
- source_word: כַּשְׂדִּים
  chosen: Chaldeans
  alternatives:
  - Babylonians
  lexicon: HALOT
  rationale: The ethnic designation is distinct in the Hebrew and should be retained
    rather than merged into the previous Babylon reference.
- source_word: אֶרֶץ מוֹלַדְתָּם
  chosen: the land of their birth
  alternatives:
  - their native land
  - the land of their origin
  lexicon: HALOT
  rationale: This appositional phrase identifies Chaldea/Babylon as their homeland.
    'The land of their birth' is transparent and close to the Hebrew.
