theological_decisions:
- issue: Nature of the judgment executed by the attackers
  chosen_reading: The invaders are portrayed as instruments through whom God hands
    over judicial action.
  alternative_readings:
  - The phrase could be read more abstractly as God merely allowing them to judge
    without formally delegating judgment.
  rationale: The wording 'I will set judgment before them' suggests divine initiative
    in placing the matter into their hands, but the translation avoids over-specifying
    legal delegation beyond what the Hebrew states.
  doctrine_reference: Preserve theological tension rather than resolve it.
