id: EZK.23.24
reference: Ezekiel 23:24
source:
  edition: WLC
  text: וּ/בָ֣אוּ עָלַ֡יִ/ךְ הֹ֠צֶן רֶ֤כֶב וְ/גַלְגַּל֙ וּ/בִ/קְהַ֣ל עַמִּ֔ים צִנָּ֤ה
    וּ/מָגֵן֙ וְ/קוֹבַ֔ע יָשִׂ֥ימוּ עָלַ֖יִ/ךְ סָבִ֑יב וְ/נָתַתִּ֤י לִ/פְנֵי/הֶם֙
    מִשְׁפָּ֔ט וּ/שְׁפָט֖וּ/ךְ בְּ/מִשְׁפְּטֵי/הֶֽם׃
translation:
  text: They will come against you with troops, chariots, and wagons, and with an
    assembly of peoples. They will set shield and buckler and helmet against you on
    every side, and I will set judgment before them, and they will judge you by their
    judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term rendered 'troops' is rare and uncertain; it may also be
      understood as 'host,' 'army,' or possibly military equipment.
    reason: lexical_alternative
  - marker: b
    text: Or 'wheels'; the Hebrew likely refers to wheeled military vehicles, hence
      'wagons.'
    reason: lexical_alternative
  - marker: c
    text: 'The two Hebrew shield terms are distinct: ''shield'' and ''buckler'' render
      different kinds of defensive gear.'
    reason: lexical_alternative
  - marker: d
    text: Or 'they will judge you according to their laws/standards.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֹצֶן
  chosen: troops
  alternatives:
  - host
  - weaponry
  - army
  lexicon: HALOT
  rationale: The noun is rare and difficult. In context with chariots, wagons, and
    a multinational assembly, it most plausibly refers to a military force or massed
    contingent rather than a specific item of equipment. 'Troops' gives a clear military
    sense in natural English while preserving the uncertainty better than an overly
    specific rendering.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariotry
  lexicon: HALOT
  rationale: Standard military term for chariots or chariot forces. 'Chariots' is
    the most natural modern English rendering.
- source_word: גַלְגַּל
  chosen: wagons
  alternatives:
  - wheels
  - rolling things
  lexicon: HALOT
  rationale: Literally related to 'wheel,' but in this military list it likely denotes
    wheeled vehicles accompanying the army. 'Wagons' communicates the referent more
    clearly in English than the bare 'wheels.'
- source_word: בִּקְהַל עַמִּים
  chosen: with an assembly of peoples
  alternatives:
  - with a company of nations
  - with a gathered multitude of peoples
  lexicon: HALOT
  rationale: קהל is an assembled group; עמים is plural 'peoples.' The phrase emphasizes
    a multinational force. 'Assembly of peoples' preserves both the collective and
    ethnic-plural sense.
- source_word: צִנָּה
  chosen: shield
  alternatives:
  - large shield
  lexicon: HALOT
  rationale: A type of shield, often larger than מָגֵן. Since English lacks a common
    everyday distinction, 'shield' is used here and differentiated from מָגֵן by rendering
    the latter 'buckler.'
- source_word: מָגֵן
  chosen: buckler
  alternatives:
  - shield
  - small shield
  lexicon: HALOT
  rationale: A second shield term distinct from צנה. 'Buckler' preserves the lexical
    distinction in English, even if somewhat traditional, and fits the military inventory.
- source_word: קוֹבַע
  chosen: helmet
  alternatives:
  - headpiece
  lexicon: HALOT
  rationale: Standard rendering for military headgear.
- source_word: יָשִׂימוּ עָלַיִךְ סָבִיב
  chosen: They will set ... against you on every side
  alternatives:
  - They will array ... against you all around
  - They will place ... around you
  lexicon: HALOT
  rationale: The idiom conveys hostile deployment surrounding the city/personified
    woman. 'Against you on every side' makes the adversarial force explicit from context.
- source_word: וְנָתַתִּי לִפְנֵיהֶם מִשְׁפָּט
  chosen: I will set judgment before them
  alternatives:
  - I will commit judgment to them
  - I will place the case before them
  lexicon: HALOT
  rationale: The phrase indicates handing over judicial authority or a judicial matter
    to the invaders. 'Set judgment before them' stays close to the Hebrew while remaining
    intelligible.
- source_word: וּשְׁפָטוּךְ בְּמִשְׁפְּטֵיהֶם
  chosen: they will judge you by their judgments
  alternatives:
  - they will sentence you according to their laws
  - they will execute judgment on you by their own standards
  lexicon: HALOT
  rationale: The Hebrew repeats the משפט root. 'Judge you by their judgments' preserves
    the repetition and the sense that the foreign attackers will apply their own judicial
    procedures or penalties.
