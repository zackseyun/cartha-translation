id: EZK.23.2
reference: Ezekiel 23:2
source:
  edition: WLC
  text: בֶּן אָדָ֑ם שְׁתַּ֣יִם נָשִׁ֔ים בְּנ֥וֹת אֵם אַחַ֖ת הָיֽוּ־־׃
translation:
  text: Son of man, there were two women, daughters of one mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'of the same mother.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Son of Adam
  lexicon: HALOT
  rationale: This is Ezekiel’s standard vocative address. 'Son of man' preserves the
    Hebrew idiom and its established force in this prophetic book better than a more
    interpretive rendering such as 'human one.' The doctrine excerpt also prefers
    gender-accurate renderings where the source is masculine and representative.
- source_word: שְׁתַּיִם
  chosen: two
  lexicon: HALOT
  rationale: Straightforward cardinal numeral modifying 'women.'
- source_word: נָשִׁים
  chosen: women
  alternatives:
  - wives
  lexicon: HALOT
  rationale: The ordinary sense is 'women.' Although the broader allegory concerns
    Samaria and Jerusalem as women in a marital metaphor with YHWH, this verse itself
    introduces them simply as 'two women,' so 'wives' would import contextual interpretation
    too early.
- source_word: בְּנוֹת
  chosen: daughters
  lexicon: HALOT
  rationale: Construct form with 'mother'; 'daughters of one mother' is the natural
    and literal rendering.
- source_word: אֵם אַחַת
  chosen: of one mother
  alternatives:
  - of the same mother
  lexicon: HALOT
  rationale: Literally 'of one mother.' This is idiomatic and clear in English. 'Of
    the same mother' is possible, but 'of one mother' stays closer to the Hebrew wording
    while remaining readable.
- source_word: הָיוּ
  chosen: there were
  alternatives:
  - were
  lexicon: HALOT
  rationale: 'The existential use of היה is well represented by ''there were'' in
    English, yielding a natural sentence: ''there were two women.'''
