id: EZK.23.35
reference: Ezekiel 23:35
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֚עַן שָׁכַ֣חַתְּ אוֹתִ֔/י וַ/תַּשְׁלִ֥יכִי אוֹתִ֖/י אַחֲרֵ֣י גַוֵּ֑/ךְ וְ/גַם אַ֛תְּ שְׂאִ֥י זִמָּתֵ֖/ךְ וְ/אֶת תַּזְנוּתָֽיִ/ךְ־־׃ס
translation:
  text: 'Therefore thus says the Lord GOD: Because you have forgotten me and cast me behind your back, you also must bear your lewdness and your prostitutions.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and threw me behind your back.' The Hebrew idiom expresses deliberate rejection or disregard.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the divine title pair in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English tradition commonly uses 'Lord GOD' to avoid 'Lord LORD' while preserving both elements.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment statement. 'Because' is the clearest modern English equivalent.
- source_word: שָׁכַחַתְּ אֹתִי
  chosen: you have forgotten me
  alternatives:
  - you forgot me
  lexicon: HALOT
  rationale: The perfect is naturally rendered in English as present perfect here, expressing completed action with present relevance in the accusation.
- source_word: וַתַּשְׁלִיכִי אֹתִי אַחֲרֵי גַוֵּךְ
  chosen: and cast me behind your back
  alternatives:
  - and threw me behind your back
  - and flung me behind your body
  lexicon: HALOT
  rationale: A vivid idiom of rejection or disregard. 'Cast me behind your back' preserves the metaphor closely while remaining idiomatic in English.
- source_word: גַוֵּךְ
  chosen: your back
  alternatives:
  - your body
  - your person
  lexicon: HALOT
  rationale: Though the noun can refer more broadly to the body or back, in this idiom 'behind your back' is the most natural and contextually fitting rendering.
- source_word: וְגַם אַתְּ
  chosen: you also
  alternatives:
  - therefore you too
  - and you also
  lexicon: HALOT
  rationale: Marks emphatic inclusion of the addressee in the consequence. 'You also' is concise and preserves the emphasis.
- source_word: שְׂאִי
  chosen: must bear
  alternatives:
  - bear
  - carry
  - suffer
  lexicon: HALOT
  rationale: The imperative here functions as a judicial pronouncement of consequence rather than a simple command. 'Must bear' communicates the inevitability of punishment in natural English.
- source_word: זִמָּתֵךְ
  chosen: your lewdness
  alternatives:
  - your wickedness
  - your depravity
  - your obscene conduct
  lexicon: HALOT
  rationale: In Ezekiel's sexualized judgment language, זִמָּה often denotes gross sexual wickedness or lewd conduct. 'Lewdness' best matches the immediate context.
- source_word: תַּזְנוּתָיִךְ
  chosen: your acts of prostitution
  alternatives:
  - your prostitutions
  - your whorings
  - your harlotries
  lexicon: HALOT
  rationale: The plural denotes repeated acts of sexual immorality, metaphorically tied to covenant unfaithfulness. 'Acts of prostitution' is readable modern English that preserves the force without archaic diction.
