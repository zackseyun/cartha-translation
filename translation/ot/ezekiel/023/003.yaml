theological_decisions:
- issue: Nature of the sexual language in prophetic metaphor
  chosen_reading: Retain explicit sexual imagery in the main text as part of the prophetic
    accusation, without euphemistic softening.
  alternative_readings:
  - Use milder euphemisms such as 'lovers' caressed them' or 'they were defiled there'
  rationale: The Hebrew is deliberately graphic to portray Israel and Samaria/Jerusalem's
    unfaithfulness. Optimal equivalence here requires preserving the force and offensiveness
    of the metaphor rather than sanitizing it.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not paraphrase'
