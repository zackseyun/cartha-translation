id: EZK.23.3
reference: Ezekiel 23:3
source:
  edition: WLC
  text: וַ/תִּזְנֶ֣ינָה בְ/מִצְרַ֔יִם בִּ/נְעוּרֵי/הֶ֖ן זָנ֑וּ שָׁ֚מָּ/ה מֹעֲכ֣וּ
    שְׁדֵי/הֶ֔ן וְ/שָׁ֣ם עִשּׂ֔וּ דַּדֵּ֖י בְּתוּלֵי/הֶֽן׃
translation:
  text: They prostituted themselves in Egypt; in their youth they committed prostitution
    there. There their breasts were fondled, and there their virgin bosoms were handled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They played the prostitute in Egypt; in their youth they committed
      whoredom there.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses explicit sexual imagery to depict early unfaithfulness and
      defilement.
    reason: cultural_note
  - marker: c
    text: Or, 'there they squeezed their breasts, and there they handled the breasts
      of their virginity.' The Hebrew expressions are graphic and difficult; the translation
      aims to preserve the sense in natural English.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּזְנֶינָה
  chosen: they prostituted themselves
  alternatives:
  - they played the prostitute
  - they committed whoredom
  lexicon: HALOT
  rationale: From זנה, used metaphorically and sexually for illicit prostitution.
    'Prostituted themselves' is clear modern English and preserves the reflexive sense
    better than the archaic 'played the harlot.'
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative rendering of the place name.
- source_word: בִּנְעוּרֵיהֶן
  chosen: in their youth
  alternatives:
  - when they were young
  lexicon: HALOT
  rationale: נְעוּרִים denotes youth/young age. 'In their youth' is idiomatic and
    preserves the temporal force.
- source_word: זָנוּ
  chosen: they committed prostitution
  alternatives:
  - they prostituted themselves
  - they committed whoredom
  lexicon: HALOT
  rationale: A second use of זנה intensifies and restates the charge. I rendered it
    explicitly rather than collapsing it into the first clause, preserving the Hebrew
    repetition.
- source_word: שָׁמָּה
  chosen: there
  lexicon: HALOT
  rationale: Locative adverb; repeated in the verse for emphasis, so retained both
    times.
- source_word: מֹעֲכוּ
  chosen: were fondled
  alternatives:
  - were squeezed
  - were pressed
  - were handled
  lexicon: HALOT
  rationale: The verb מעך literally involves pressing/crushing, but in this sexual
    context a less mechanically literal English term is preferable. 'Fondled' conveys
    sexual handling without understating the violation.
- source_word: שְׁדֵיהֶן
  chosen: their breasts
  alternatives:
  - their breasts/chests
  lexicon: HALOT
  rationale: Standard anatomical term in this context.
- source_word: עִשּׂוּ
  chosen: were handled
  alternatives:
  - were caressed
  - were pressed
  - they treated/made
  lexicon: HALOT
  rationale: עשה here functions idiomatically with the following object in a sexual
    context. 'Were handled' preserves the passive sense in English and avoids overinterpreting
    the exact manner.
- source_word: דַּדֵּי
  chosen: bosoms
  alternatives:
  - breasts
  - nipples
  lexicon: HALOT
  rationale: דַּד can denote breast/bosom/teat. Since שָׁד already appeared as 'breasts,'
    varying here to 'bosoms' avoids awkward repetition while preserving the bodily
    reference.
- source_word: בְּתוּלֵיהֶן
  chosen: their virgin
  alternatives:
  - their youthful
  - their maiden
  lexicon: HALOT
  rationale: From בְּתוּלִים/בְּתוּלָה, denoting virginity/maidenhood. In construct
    with דַּדֵּי, 'their virgin bosoms' preserves the Hebrew's emphasis on premarital
    sexual violation.
