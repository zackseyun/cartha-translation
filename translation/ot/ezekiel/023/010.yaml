id: EZK.23.10
reference: Ezekiel 23:10
source:
  edition: WLC
  text: הֵמָּה֮ גִּלּ֣וּ עֶרְוָתָ/הּ֒ בָּנֶ֤י/הָ וּ/בְנוֹתֶ֨י/הָ֙ לָקָ֔חוּ וְ/אוֹתָ֖/הּ
    בַּ/חֶ֣רֶב הָרָ֑גוּ וַ/תְּהִי שֵׁם֙ לַ/נָּשִׁ֔ים וּ/שְׁפוּטִ֖ים עָ֥שׂוּ בָֽ/הּ־׃ס
translation:
  text: They uncovered her nakedness; they took her sons and her daughters, and they
    killed her with the sword. So she became a byword among women, and they executed
    judgments on her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laid bare her nakedness'; the Hebrew idiom can also carry the sense
      of exposing shame publicly.
    reason: lexical_alternative
  - marker: b
    text: Or 'she became notorious among women'; literally, 'she became a name among
      women.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they carried out judgments against her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלּוּ עֶרְוָתָהּ
  chosen: uncovered her nakedness
  alternatives:
  - laid bare her nakedness
  - uncovered her shame
  lexicon: HALOT
  rationale: The idiom גלה ערוה literally means 'uncover nakedness' and in sexual/judicial
    contexts can imply public exposure and humiliation. 'Uncovered her nakedness'
    preserves the Hebrew idiom while remaining understandable in English; 'shame'
    is interpretive and less concrete.
- source_word: בָּנֶיהָ וּבְנוֹתֶיהָ לָקָחוּ
  chosen: they took her sons and her daughters
  alternatives:
  - they carried off her sons and daughters
  - they seized her sons and daughters
  lexicon: HALOT
  rationale: לקח is broadly 'take.' In this conquest context it likely implies capture/deportation,
    but the verb itself is not more specific. 'Took' preserves the source wording
    without over-interpreting; the familial terms are rendered explicitly and gender-accurately.
- source_word: וְאוֹתָהּ בַּחֶרֶב הָרָגוּ
  chosen: they killed her with the sword
  alternatives:
  - they slew her by the sword
  - they put her to death with the sword
  lexicon: HALOT
  rationale: הרג is the standard verb 'kill/slay.' 'Killed her with the sword' is
    clear modern English and preserves the instrumental phrase בחרב.
- source_word: וַתְּהִי שֵׁם לַנָּשִׁים
  chosen: she became a byword among women
  alternatives:
  - she became notorious among women
  - she became a name among women
  lexicon: HALOT
  rationale: שֵׁם literally means 'name,' but in this idiom it denotes reputation
    or proverbial notoriety. 'Byword' best captures the negative exemplary sense in
    context; 'name' would be too opaque in English.
- source_word: לַנָּשִׁים
  chosen: among women
  alternatives:
  - for women
  lexicon: HALOT
  rationale: The preposition ל here is best rendered idiomatically as 'among' in the
    expression 'a byword among women,' indicating the sphere in which her reputation
    circulated.
- source_word: וּשְׁפוּטִים עָשׂוּ בָהּ
  chosen: they executed judgments on her
  alternatives:
  - they carried out judgments against her
  - they inflicted punishments on her
  lexicon: HALOT
  rationale: שְׁפוּטִים are acts of judgment/judicial punishments. 'Executed judgments
    on her' preserves the judicial force and the plural noun, while sounding natural
    in English. 'Punishments' is possible but narrows the legal nuance.
