theological_decisions:
- issue: Metaphorical sexual language for Samaria/Oholah
  chosen_reading: Retain the exposure/nakedness idiom rather than replacing it with
    an abstract term like 'shame.'
  alternative_readings:
  - Render more dynamically as 'they publicly shamed her'
  rationale: The verse uses sexualized judgment imagery central to Ezekiel 23's prophetic
    metaphor. Preserving the idiom maintains the text's rhetorical force and theological
    portrayal of covenant unfaithfulness and judgment without softening it.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of judicial language in the final clause
  chosen_reading: Translate as 'they executed judgments on her.'
  alternative_readings:
  - '''they punished her'''
  - '''they made an example of her'''
  rationale: The Hebrew explicitly uses the noun for judgments, not merely a generic
    punishment term. Retaining judicial language preserves the theological emphasis
    that her fate is presented as judgment, not only military violence.
  doctrine_reference: Translation philosophy §§1, 5
