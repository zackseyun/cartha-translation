theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse contains the compound divine title אֲדֹנָי יְהוִה. Following
    the doctrinal default, YHWH is not transliterated but represented reverentially.
    In this compound, standard English idiom uses 'Lord GOD' to avoid the awkward
    'Lord LORD' while still signaling the divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
