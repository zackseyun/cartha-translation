id: EZK.23.34
reference: Ezekiel 23:34
source:
  edition: WLC
  text: וְ/שָׁתִ֨ית אוֹתָ֜/הּ וּ/מָצִ֗ית וְ/אֶת חֲרָשֶׂ֛י/הָ תְּגָרֵ֖מִי וְ/שָׁדַ֣יִ/ךְ
    תְּנַתֵּ֑קִי כִּ֚י אֲנִ֣י דִבַּ֔רְתִּי נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃ס
translation:
  text: You will drink it and drain it dry, and you will gnaw its shards, and tear
    off your breasts; for I have spoken, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'potsherds' for 'shards.' The Hebrew refers to the broken pieces of a
      clay vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁתִית אֹתָהּ
  chosen: You will drink it
  alternatives:
  - you shall drink it
  lexicon: HALOT
  rationale: Qal perfect 2fs with vav in prophetic discourse functions futurally.
    Direct object suffix is feminine singular, referring to the cup in context.
- source_word: וּמָצִית
  chosen: and drain it dry
  alternatives:
  - and suck it out
  - and drain it out
  lexicon: HALOT
  rationale: From מצה in the sense of draining or squeezing out completely. 'Drain
    it dry' captures the idiom of consuming the cup to the dregs in natural English.
- source_word: חֲרָשֶׂיהָ
  chosen: its shards
  alternatives:
  - its potsherds
  - its fragments
  lexicon: HALOT
  rationale: Plural of חֶרֶשׂ, here referring to broken pieces of the cup/vessel.
    'Shards' is more readable modern English than 'potsherds' while preserving the
    image.
- source_word: תְּגָרֵמִי
  chosen: you will gnaw
  alternatives:
  - you will chew
  - you will crunch
  lexicon: HALOT
  rationale: Piel 2fs of גרם conveys gnawing/crunching on bones or hard pieces. With
    'shards' as object, 'gnaw' best preserves the violent, grotesque imagery.
- source_word: וְשָׁדַיִךְ תְּנַתֵּקִי
  chosen: and tear off your breasts
  alternatives:
  - and pluck off your breasts
  - and rip your breasts away
  lexicon: HALOT
  rationale: נתק in Piel means pull away, tear off. The phrase is intentionally shocking
    and should not be softened; it depicts self-mutilation in judgment imagery.
- source_word: כִּי אֲנִי דִבַּרְתִּי
  chosen: for I have spoken
  alternatives:
  - because I have spoken
  - for I myself have spoken
  lexicon: HALOT
  rationale: Standard divine speech formula grounding the certainty of the judgment.
    'For' fits the causal force in English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the prophetic formula 'declares.' אֲדֹנָי יְהוִה is conventionally
    rendered 'Lord GOD' in English to reflect Adonai + YHWH without producing 'Lord
    LORD.' This also follows the doctrine default of rendering YHWH as 'the LORD.'
