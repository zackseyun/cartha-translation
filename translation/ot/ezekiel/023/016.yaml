theological_decisions:
- issue: Sexualized metaphor for political-religious unfaithfulness
  chosen_reading: Retain explicit erotic language with 'lusted after' rather than
    soften it.
  alternative_readings:
  - she admired them
  - she doted on them
  rationale: Ezekiel 23 intentionally uses shocking sexual imagery to portray Jerusalem/Samaria's
    unfaithfulness. Softening the language would under-translate the prophetic rhetoric
    and obscure the theological force of the metaphor.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
