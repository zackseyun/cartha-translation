id: EZK.23.16
reference: Ezekiel 23:16
source:
  edition: WLC
  text: ו/תעגב עֲלֵי/הֶ֖ם לְ/מַרְאֵ֣ה עֵינֶ֑י/הָ וַ/תִּשְׁלַ֧ח מַלְאָכִ֛ים אֲלֵי/הֶ֖ם
    כַּשְׂדִּֽימָ/ה׃
translation:
  text: When she saw them, she lusted after them and sent messengers to them in Chaldea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the sight of them'; literally, 'to/at the sight of her eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sent messengers to them toward Chaldea' / 'to Chaldea.' The Hebrew form
      has a directional ending.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעְגַּב
  chosen: she lusted after
  alternatives:
  - she doted on
  - she became infatuated with
  - she desired
  lexicon: HALOT
  rationale: The verb עגב in this context of Ezekiel 23 carries strong erotic/desirous
    force, not mere admiration. 'Lusted after' best conveys the sexualized metaphor
    of political-religious infidelity in accessible modern English. 'Doted on' reflects
    some traditional renderings but is too weak or archaic for the context.
- source_word: עֲלֵיהֶם
  chosen: after them
  alternatives:
  - for them
  - upon them
  lexicon: HALOT
  rationale: With עגב, the preposition עַל idiomatically marks the object of desire.
    English 'lusted after them' is the most natural equivalent.
- source_word: לְמַרְאֵה עֵינֶיהָ
  chosen: When she saw them
  alternatives:
  - at the sight of them
  - according to what her eyes saw
  - by the appearance before her eyes
  lexicon: HALOT
  rationale: Literally, the phrase is 'to/at the sight of her eyes.' In idiomatic
    English, 'When she saw them' captures the sense clearly while preserving the causal
    connection between seeing and desiring. A more formal rendering like 'at the sight
    of her eyes' would be unnatural in English.
- source_word: וַתִּשְׁלַח מַלְאָכִים
  chosen: and sent messengers
  alternatives:
  - and sent envoys
  - and sent ambassadors
  lexicon: HALOT
  rationale: מַלְאָכִים broadly means 'messengers' and can include diplomatic envoys.
    'Messengers' is the base lexical sense and fits the context without over-specifying
    official status, though diplomatic nuance is possible.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward the recipients of the messengers;
    'to them' is the straightforward rendering.
- source_word: כַּשְׂדִּימָה
  chosen: in Chaldea
  alternatives:
  - to Chaldea
  - toward the Chaldeans
  - to the land of the Chaldeans
  lexicon: HALOT
  rationale: The directional ending on כַּשְׂדִּים indicates movement toward Chaldea/the
    Chaldeans. In English, attached to 'sent messengers,' either 'to Chaldea' or 'in
    Chaldea' is possible. 'In Chaldea' best reflects that the messengers were sent
    to them there, matching the preceding 'to them' and avoiding awkward repetition.
    The destination nuance is preserved in the footnote.
