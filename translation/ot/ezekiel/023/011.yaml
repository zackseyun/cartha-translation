theological_decisions:
- issue: Sexual-infidelity metaphor for covenant unfaithfulness
  chosen_reading: Retain explicit sexual language ('lust,' 'prostitutions') rather
    than soften to generic 'unfaithfulness.'
  alternative_readings:
  - more abstract renderings such as 'infidelity' or 'idolatry'
  rationale: The Hebrew intentionally uses graphic sexual vocabulary as a prophetic
    metaphor for Samaria's and Jerusalem's covenant betrayal. Preserving the metaphor
    maintains the rhetorical force and theological tension without prematurely interpreting
    every term as only metaphorical.
  doctrine_reference: Translation philosophy §§1, 3, 6
