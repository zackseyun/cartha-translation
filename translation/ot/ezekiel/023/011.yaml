id: EZK.23.11
reference: Ezekiel 23:11
source:
  edition: WLC
  text: וַ/תֵּ֨רֶא֙ אֲחוֹתָ֣/הּ אָהֳלִיבָ֔ה וַ/תַּשְׁחֵ֥ת עַגְבָתָ֖/הּ מִמֶּ֑/נָּה
    וְ/אֶת תַּ֨זְנוּתֶ֔י/הָ מִ/זְּנוּנֵ֖י אֲחוֹתָֽ/הּ־׃
translation:
  text: When her sister Oholibah saw this, she became more corrupt in her lust than
    she was, and in her prostitutions more than the prostitutions of her sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she corrupted herself with more lust than her sister, and with more
      acts of prostitution than her sister.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: When ... saw this
  alternatives:
  - and ... saw
  - then ... saw
  lexicon: HALOT
  rationale: The verb means 'saw.' English supplies 'this' to make the object of perception
    explicit from context, since the Hebrew leaves it implicit. 'When' captures the
    narrative-temporal force smoothly in English.
- source_word: אֲחוֹתָהּ אָהֳלִיבָה
  chosen: her sister Oholibah
  alternatives:
  - Oholibah her sister
  lexicon: HALOT
  rationale: Retains the proper name by transliteration per translation philosophy
    and preserves the appositional relationship.
- source_word: וַתַּשְׁחֵת
  chosen: she became more corrupt
  alternatives:
  - she corrupted herself
  - she acted corruptly
  - she ruined
  lexicon: HALOT
  rationale: In this context of moral and sexual degradation, the Hiphil conveys corrupting/acting
    ruinously. 'Became more corrupt' fits the comparative construction with מִמֶּנָּה
    and reads naturally in English.
- source_word: עַגְבָתָהּ
  chosen: her lust
  alternatives:
  - her passion
  - her lewd desire
  lexicon: HALOT
  rationale: The noun denotes lustful passion or inordinate desire, especially sexual
    craving in this chapter. 'Lust' best conveys the moral-sexual force without euphemism.
- source_word: מִמֶּנָּה
  chosen: than she was
  alternatives:
  - more than her sister
  - beyond her
  lexicon: HALOT
  rationale: The preposition marks comparison with the sister just mentioned. English
    requires an explicit comparative phrase; 'than she was' refers back to the sister
    and avoids awkward repetition.
- source_word: וְאֶת תַּזְנוּתֶיהָ
  chosen: and in her prostitutions
  alternatives:
  - and her prostitutions
  - and her whorings
  lexicon: HALOT
  rationale: תַּזְנוּתִים language in Ezekiel often refers both literally and metaphorically
    to sexual immorality/idolatrous unfaithfulness. 'Prostitutions' preserves the
    concrete metaphor more transparently than the archaic 'whorings.' The preposition
    'in' is supplied to complete the comparison idiom in English.
- source_word: מִזְּנוּנֵי אֲחוֹתָהּ
  chosen: more than the prostitutions of her sister
  alternatives:
  - beyond her sister's whorings
  - than her sister's acts of prostitution
  lexicon: HALOT
  rationale: זְנוּנִים denotes acts of prostitution/whoredom. 'Prostitutions' keeps
    lexical consistency with תַּזְנוּתֶיהָ and preserves the comparative sense introduced
    by מִן.
