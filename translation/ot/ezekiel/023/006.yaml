id: EZK.23.6
reference: Ezekiel 23:6
source:
  edition: WLC
  text: לְבֻשֵׁ֤י תְכֵ֨לֶת֙ פַּח֣וֹת וּ/סְגָנִ֔ים בַּח֥וּרֵי חֶ֖מֶד כֻּלָּ֑/ם פָּרָשִׁ֕ים
    רֹכְבֵ֖י סוּסִֽים׃
translation:
  text: clothed in blue, governors and officials, all of them desirable young men,
    horsemen riding horses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wearing violet' or 'clothed in purple-blue,' since תְכֵלֶת can denote
      a blue-violet dyed fabric.
    reason: lexical_alternative
  - marker: b
    text: Or 'handsome young men' or 'choice young men'; the Hebrew emphasizes youthful
      attractiveness.
    reason: lexical_alternative
  - marker: c
    text: '''Officials'' may also be rendered ''deputies'' or ''prefects.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבֻשֵׁי
  chosen: clothed in
  alternatives:
  - wearing
  lexicon: HALOT
  rationale: Passive participial form from לבשׁ describing their attire. 'Clothed
    in' is natural English and preserves the adjectival force modifying the men described.
- source_word: תְכֵלֶת
  chosen: blue
  alternatives:
  - violet
  - purple-blue
  lexicon: HALOT
  rationale: Refers to a blue or blue-purple dyed fabric/color. 'Blue' is the most
    standard and readable rendering in English; more specific shade nuances are possible
    but not required by the context.
- source_word: פַּחוֹת
  chosen: governors
  alternatives:
  - provincial governors
  - satraps
  lexicon: HALOT
  rationale: Denotes imperial officials or governors. 'Governors' is clear modern
    English and fits the Assyrian/Babylonian administrative context without over-specifying
    a technical title.
- source_word: וּסְגָנִים
  chosen: officials
  alternatives:
  - deputies
  - prefects
  - rulers
  lexicon: HALOT
  rationale: Refers to high-ranking subordinate rulers or officials. 'Officials' pairs
    well with 'governors' and avoids false precision where English administrative
    equivalents are uncertain.
- source_word: בַּח֥וּרֵי חֶמֶד
  chosen: desirable young men
  alternatives:
  - handsome young men
  - choice young men
  lexicon: HALOT
  rationale: בַּחוּרִים are young men in their prime; חֶמֶד adds desirability/delightfulness.
    'Desirable young men' best reflects the erotic and attractive nuance in the chapter's
    imagery.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: Explicitly includes the pronominal suffix; 'all of them' preserves the
    emphasis more fully than a bare 'all'.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalrymen
  lexicon: HALOT
  rationale: Standard term for mounted warriors. 'Horsemen' is direct and idiomatic,
    while 'cavalrymen' is somewhat more technical and anachronistic in tone.
- source_word: רֹכְבֵי סוּסִים
  chosen: riding horses
  alternatives:
  - mounted on horses
  lexicon: HALOT
  rationale: A participial phrase further describing the horsemen. Although somewhat
    appositional to 'horsemen,' retaining 'riding horses' reflects the Hebrew wording
    rather than collapsing it entirely.
