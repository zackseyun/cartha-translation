theological_decisions:
- issue: Prophetic 'cup' imagery as judgment metaphor
  chosen_reading: Retain 'cup' literally in the main text
  alternative_readings:
  - portion of judgment
  - judgment-cup
  rationale: The Hebrew uses the concrete image of a cup to depict divinely allotted
    judgment. Preserving the metaphor maintains intertextual resonance with prophetic
    judgment language and avoids interpretive paraphrase.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
