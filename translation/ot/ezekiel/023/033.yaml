id: EZK.23.33
reference: Ezekiel 23:33
source:
  edition: WLC
  text: שִׁכָּר֥וֹן וְ/יָג֖וֹן תִּמָּלֵ֑אִי כּ֚וֹס שַׁמָּ֣ה וּ/שְׁמָמָ֔ה כּ֖וֹס אֲחוֹתֵ֥/ךְ
    שֹׁמְרֽוֹן׃
translation:
  text: You will be filled with drunkenness and grief, with a cup of horror and desolation,
    the cup of your sister Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cup of astonishment and desolation.' The noun rendered 'horror' can
      also denote the appalled astonishment produced by catastrophic judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁכָּרוֹן
  chosen: drunkenness
  alternatives:
  - drunkenness
  - intoxication
  lexicon: HALOT
  rationale: The noun denotes a state of intoxication. 'Drunkenness' is the most natural
    English equivalent and preserves the metaphor of judgment as something imbibed.
- source_word: יָגוֹן
  chosen: grief
  alternatives:
  - sorrow
  - anguish
  lexicon: HALOT
  rationale: The term refers to sorrow or grief. 'Grief' is concise and idiomatic
    alongside 'drunkenness,' preserving the pairing of emotional and physical devastation.
- source_word: תִּמָּלֵאִי
  chosen: you will be filled
  alternatives:
  - you will be full
  - you will be filled up
  lexicon: HALOT
  rationale: Niphal imperfect 2fs of מלא, here functioning as a future/passive statement
    addressed to the feminine singular city/personified woman. 'You will be filled'
    is both accurate and natural.
- source_word: כּוֹס
  chosen: cup
  alternatives:
  - goblet
  lexicon: HALOT
  rationale: The repeated noun is a standard prophetic metaphor for an allotted portion
    of judgment. 'Cup' preserves the biblical imagery and should remain consistent
    in both occurrences.
- source_word: שַׁמָּה
  chosen: horror
  alternatives:
  - astonishment
  - appallment
  lexicon: HALOT
  rationale: The noun can denote horror or appalled astonishment. In a judgment context
    modifying 'cup,' 'horror' communicates the dreadful effect more clearly in modern
    English while retaining the semantic force.
- source_word: שְׁמָמָה
  chosen: desolation
  alternatives:
  - waste
  - ruin
  lexicon: HALOT
  rationale: A common prophetic term for devastation or desolation. 'Desolation' is
    the standard and fitting rendering, especially paired with 'horror'.
- source_word: אֲחוֹתֵךְ
  chosen: your sister
  lexicon: HALOT
  rationale: The feminine singular pronominal form matches the extended allegory of
    Jerusalem and Samaria as sisters. The familial metaphor should be preserved literally.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Proper place name, transliterated according to standard English convention
    as required by the translation philosophy.
