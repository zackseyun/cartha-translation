id: EZK.23.30
reference: Ezekiel 23:30
source:
  edition: WLC
  text: עָשֹׂ֥ה אֵ֖לֶּה לָ֑/ךְ בִּ/זְנוֹתֵ/ךְ֙ אַחֲרֵ֣י גוֹיִ֔ם עַ֥ל אֲשֶׁר נִטְמֵ֖את
    בְּ/גִלּוּלֵי/הֶֽם־׃
translation:
  text: These things are done to you because of your prostitution after the nations,
    because you defiled yourself with their idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a contemptuous term for idols, sometimes paraphrased
      'dung-idols' or 'filthy idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשֹׂה
  chosen: are done
  alternatives:
  - has done
  - is doing
  - done
  lexicon: HALOT
  rationale: 'The Qal form of עשה here functions idiomatically with אֵלֶּה לָךְ to
    indicate what is being brought upon the woman: ''these things are done to you''
    or ''this is done to you.'' English passive best captures the sense in context,
    where the preceding judgment actions are in view, without forcing an explicit
    subject not stated in this clause.'
- source_word: אֵלֶּה
  chosen: These things
  alternatives:
  - these
  - this
  lexicon: HALOT
  rationale: Plural demonstrative, referring back to the punishments/judgments just
    described. 'These things' is slightly fuller and clearer in English than bare
    'these.'
- source_word: לָךְ
  chosen: to you
  alternatives:
  - for you
  - against you
  lexicon: HALOT
  rationale: The preposition ל with second feminine singular pronoun is most naturally
    rendered 'to you' in this passive construction. 'Against you' would over-interpret
    hostility already implied by context rather than by the preposition itself.
- source_word: בִּזְנוֹתֵךְ
  chosen: because of your prostitution
  alternatives:
  - for your whoring
  - in your prostitution
  - because of your harlotry
  lexicon: HALOT
  rationale: 'זנה language in Ezekiel is metaphorical for covenantal unfaithfulness
    expressed through idolatry and foreign alliances, but the sexualized metaphor
    should be preserved. ''Prostitution'' is clear modern English and retains the
    force of the metaphor without archaic diction like ''harlotry.'' The prefixed
    ב is taken causally in context: ''because of.'''
- source_word: אַחֲרֵי גוֹיִם
  chosen: after the nations
  alternatives:
  - after the Gentiles
  - with the nations
  - following the nations
  lexicon: HALOT
  rationale: אַחֲרֵי literally means 'after,' often in the sense of going after or
    pursuing. 'After the nations' preserves the metaphor of pursuit. 'Gentiles' is
    possible, but in Ezekiel 'nations' better fits the political-idolatrous context.
- source_word: גוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - foreign nations
  lexicon: HALOT
  rationale: גוֹיִם commonly means 'nations.' Here it refers to the surrounding peoples
    whose practices Israel/Judah pursued. 'The nations' is the most direct and contextually
    natural rendering.
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - for that
  - on account of which
  - inasmuch as
  lexicon: HALOT
  rationale: The combination introduces the reason for judgment. Smooth English 'because'
    captures the causal force without awkward literalism.
- source_word: נִטְמֵאת
  chosen: you defiled yourself
  alternatives:
  - you became unclean
  - you were defiled
  lexicon: HALOT
  rationale: The Niphal of טמא can be rendered either statively ('became unclean')
    or reflexively/passively ('defiled yourself'/'were defiled'). In this context
    of culpable idolatry, 'you defiled yourself' best conveys both the resulting impurity
    and the woman's responsibility.
- source_word: בְּגִלּוּלֵיהֶם
  chosen: with their idols
  alternatives:
  - by their idols
  - with their dung-idols
  - through their idols
  lexicon: HALOT
  rationale: 'גִּלּוּלִים is Ezekiel''s contemptuous term for idols. The basic translation
    ''idols'' is clear and readable; the pejorative nuance is difficult to preserve
    in the main text without awkwardness. The preposition ב is instrumental/associative
    here: ''with their idols.'' The contemptuous nuance is worth preserving in a footnote.'
