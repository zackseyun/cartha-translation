theological_decisions:
- issue: Retention of the sexual metaphor for covenant unfaithfulness
  chosen_reading: because of your prostitution
  alternative_readings:
  - because of your unfaithfulness
  - because of your idolatry
  rationale: Ezekiel intentionally uses sexualized imagery to portray Jerusalem/Samaria's
    covenant breach. A flattened rendering like 'unfaithfulness' or 'idolatry' would
    explain the metaphor rather than translate it. The main text therefore preserves
    the metaphor while allowing the idolatrous referent to be clarified by the second
    clause.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
- issue: Rendering of גִּלּוּלִים
  chosen_reading: idols
  alternative_readings:
  - dung-idols
  - filthy idols
  rationale: The Hebrew term is a deliberately scornful word for idols. For readable
    modern English, the main text uses 'idols,' while a footnote preserves the contemptuous
    nuance rather than importing an interpretive paraphrase into the main line.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic'
