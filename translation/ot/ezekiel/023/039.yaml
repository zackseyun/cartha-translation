theological_decisions:
- issue: Rendering of cultic desecration language for God's sanctuary
  chosen_reading: to defile it
  alternative_readings:
  - to profane it
  rationale: The verse condemns the pollution of God's sanctuary by those who participated
    in child sacrifice and then entered the temple. 'Defile' communicates the holiness
    violation in accessible English while preserving the theological gravity of sacrilege.
  doctrine_reference: Translation philosophy §6; §3 preserve theological tension where
    present
