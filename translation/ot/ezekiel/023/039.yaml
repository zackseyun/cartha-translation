id: EZK.23.39
reference: Ezekiel 23:39
source:
  edition: WLC
  text: וּֽ/בְ/שַׁחֲטָ֤/ם אֶת בְּנֵי/הֶם֙ לְ/גִלּ֣וּלֵי/הֶ֔ם וַ/יָּבֹ֧אוּ אֶל מִקְדָּשִׁ֛/י
    בַּ/יּ֥וֹם הַ/ה֖וּא לְ/חַלְּל֑/וֹ וְ/הִנֵּה כֹ֥ה עָשׂ֖וּ בְּ/ת֥וֹךְ בֵּיתִֽ/י־־־׃
translation:
  text: For when they slaughtered their sons for their idols, they came into my sanctuary
    on that same day to defile it. Look—this is what they did within my house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to profane it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשַׁחֲטָם
  chosen: For when they slaughtered
  alternatives:
  - And when they slaughtered
  - when they killed
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition introduces a temporal-causal
    setting. 'For when' fits the discourse flow, explaining the charge just made,
    while preserving the temporal sense. 'Slaughtered' is stronger and more cultically
    charged than 'killed,' matching the sacrificial context.
- source_word: בְּנֵיהֶם
  chosen: their sons
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not the more general 'children.'
    This preserves the gendered wording of the source in line with the gender-accurate
    policy.
- source_word: לְגִלּוּלֵיהֶם
  chosen: for their idols
  alternatives:
  - to their idols
  - for their filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's common term for idols, often pejorative. 'Idols'
    is the clearest base rendering; the pejorative nuance is real but not easily represented
    without overtranslation. 'For' fits the sacrificial sense better than 'to' in
    English.
- source_word: וַיָּבֹאוּ אֶל מִקְדָּשִׁי
  chosen: they came into my sanctuary
  alternatives:
  - they entered my sanctuary
  - they came to my sanctuary
  lexicon: HALOT
  rationale: '''Came into'' naturally conveys movement into the sacred space. מִקְדָּשׁ
    is best rendered ''sanctuary'' here rather than ''holy place'' or ''temple,''
    since the focus is on the sacred character of God''s dwelling.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that same day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: The phrase marks the shocking immediacy of the profanation after the
    child sacrifice. 'That same day' brings out the force more clearly in idiomatic
    English without adding new content.
- source_word: לְחַלְּלוֹ
  chosen: to defile it
  alternatives:
  - to profane it
  lexicon: HALOT
  rationale: The verb חלל in this context means to desecrate/profane what is holy.
    'Defile' is accessible modern English and communicates ritual-moral pollution
    well; 'profane' is a viable alternative but slightly less natural for the target
    audience.
- source_word: וְהִנֵּה
  chosen: Look—
  alternatives:
  - Behold,
  - And behold,
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look—' preserves the
    force in readable modern English better than the archaic 'Behold.'
- source_word: כֹה עָשׂוּ
  chosen: this is what they did
  alternatives:
  - thus they did
  - so they acted
  lexicon: HALOT
  rationale: The idiom points to the manner of their action just described. 'This
    is what they did' is idiomatic and clear in English.
- source_word: בְּתוֹךְ בֵּיתִי
  chosen: within my house
  alternatives:
  - in the midst of my house
  - inside my house
  lexicon: HALOT
  rationale: '''Within my house'' preserves both the spatial sense of בְּתוֹךְ and
    the covenantal-sacral force of ''my house,'' referring to the temple as God''s
    own dwelling.'
