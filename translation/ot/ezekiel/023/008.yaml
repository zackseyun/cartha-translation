id: EZK.23.8
reference: Ezekiel 23:8
source:
  edition: WLC
  text: וְ/אֶת תַּזְנוּתֶ֤י/הָ מִ/מִּצְרַ֨יִם֙ לֹ֣א עָזָ֔בָה כִּ֤י אוֹתָ/הּ֙ שָׁכְב֣וּ
    בִ/נְעוּרֶ֔י/הָ וְ/הֵ֥מָּה עִשּׂ֖וּ דַּדֵּ֣י בְתוּלֶ֑י/הָ וַ/יִּשְׁפְּכ֥וּ תַזְנוּתָ֖/ם
    עָלֶֽי/הָ־׃
translation:
  text: Yet she did not abandon her prostitutions from Egypt, for in her youth they
    had lain with her, and they handled her virgin breasts and poured out their prostitution
    upon her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her whorings from Egypt.' The Hebrew uses the same prostitution imagery
      throughout the verse for covenantal unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they made/handled the breasts of her virginity,' an explicit
      sexual image referring to her youthful exploitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּזְנוּתֶיהָ
  chosen: her prostitutions
  alternatives:
  - her whorings
  - her acts of prostitution
  - her harlotries
  lexicon: HALOT
  rationale: The plural abstract noun denotes repeated acts of sexual immorality and,
    in Ezekiel's metaphor, covenantal unfaithfulness. 'Prostitutions' preserves the
    concrete and shocking force better than softer alternatives.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - learned in Egypt
  - originating in Egypt
  lexicon: HALOT
  rationale: The preposition מן is most naturally rendered 'from,' indicating source/origin
    of these prostitutions rather than merely location.
- source_word: עָזָבָה
  chosen: did not abandon
  alternatives:
  - did not leave
  - did not forsake
  - did not give up
  lexicon: HALOT
  rationale: '''Abandon'' fits the idiom with prior practices and reads naturally
    in English while retaining the force of ceasing to continue them.'
- source_word: שָׁכְבוּ אוֹתָהּ
  chosen: they had lain with her
  alternatives:
  - they slept with her
  - they lay with her
  lexicon: HALOT
  rationale: שׁכב in this context is a sexual euphemism. 'Had lain with her' is idiomatic,
    clear, and preserves the sexual sense without unnecessary vulgarity.
- source_word: בִּנְעוּרֶיהָ
  chosen: in her youth
  alternatives:
  - when she was young
  - in her girlhood
  lexicon: HALOT
  rationale: This temporal phrase refers to the early period of the woman's life,
    metaphorically Israel's early history. 'In her youth' is concise and natural.
- source_word: עִשּׂוּ דַּדֵּי בְתוּלֶיהָ
  chosen: they handled her virgin breasts
  alternatives:
  - they fondled her virgin bosom
  - they pressed her maiden breasts
  lexicon: HALOT
  rationale: The idiom is explicitly sexual and violent/objectifying. 'Handled' conveys
    physical sexual contact without adding interpretive detail beyond the Hebrew;
    'virgin breasts' preserves בְתוּלֶיהָ and the emphasis on youthful virginity.
- source_word: וַיִּשְׁפְּכוּ
  chosen: poured out
  alternatives:
  - lavished
  - emptied out
  lexicon: HALOT
  rationale: The verb literally means 'poured out' and is used metaphorically here
    for the outworking of lust/prostitution. Retaining the image preserves Ezekiel's
    rhetoric.
- source_word: תַזְנוּתָם
  chosen: their prostitution
  alternatives:
  - their lust
  - their whoring
  lexicon: HALOT
  rationale: Although the possessive could suggest lustful acts more broadly, using
    'their prostitution' keeps lexical consistency with תַּזְנוּת and preserves the
    metaphorical field of the passage.
- source_word: עָלֶיהָ
  chosen: upon her
  alternatives:
  - on her
  - over her
  lexicon: HALOT
  rationale: '''Upon her'' matches the force of עַל in this vivid metaphor and fits
    the elevated prophetic style.'
