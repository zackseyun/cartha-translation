theological_decisions:
- issue: Sexualized prophetic metaphor for idolatry and political alliances
  chosen_reading: Retain the explicit sexual imagery in translation rather than soften
    it into abstract unfaithfulness.
  alternative_readings:
  - Use euphemistic language such as 'immorality' or 'unfaithfulness' throughout
  rationale: Ezekiel intentionally uses graphic sexual language to portray Jerusalem/Samaria's
    covenant infidelity and foreign entanglements. Softening the imagery would undertranslate
    the rhetoric and obscure the prophetic shock value.
  doctrine_reference: Translation philosophy §§1, 6
