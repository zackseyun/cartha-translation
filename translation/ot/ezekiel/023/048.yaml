theological_decisions:
- issue: Referent and function of 'all women' in a judgment oracle using female imagery
  chosen_reading: Render the phrase straightforwardly as 'all women' within the prophetic
    rhetoric, without expanding it to 'all people' or restricting it to only the two
    symbolic sisters.
  alternative_readings:
  - all the women of the land
  - all people represented by women
  rationale: The Hebrew explicitly says 'all women,' and the surrounding chapter uses
    female imagery for Samaria and Jerusalem while also presenting them as examples
    to others. The translation preserves the rhetoric without resolving the broader
    interpretive scope beyond what the text states.
  doctrine_reference: Gender-accurate over gender-neutral; preserve theological tension
    rather than resolve it.
