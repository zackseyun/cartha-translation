id: EZK.23.48
reference: Ezekiel 23:48
source:
  edition: WLC
  text: וְ/הִשְׁבַּתִּ֥י זִמָּ֖ה מִן הָ/אָ֑רֶץ וְ/נִֽוַּסְּרוּ֙ כָּל הַ/נָּשִׁ֔ים
    וְ/לֹ֥א תַעֲשֶׂ֖ינָה כְּ/זִמַּתְ/כֶֽנָה־־׃
translation:
  text: Thus I will put an end to lewdness in the land, and all women will be warned,
    and they will not act according to your lewdness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be disciplined' or 'will be chastened.' The Hebrew verb can denote
      correction through punishment as well as warning by example.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end
  alternatives:
  - I will cause to cease
  - I will stop
  lexicon: HALOT
  rationale: Hiphil of שׁבת conveys causing something to cease. 'Put an end' is idiomatic
    modern English while preserving the causative force better than a bare 'stop.'
- source_word: זִמָּה
  chosen: lewdness
  alternatives:
  - wickedness
  - obscenity
  - depravity
  lexicon: HALOT
  rationale: In Ezekiel 23 the term is used in a sexual-moral context tied to prostitution/adultery
    imagery. 'Lewdness' preserves the sexual and shameful nuance better than the broader
    'wickedness.'
- source_word: מִן הָאָרֶץ
  chosen: in the land
  alternatives:
  - from the land
  - out of the land
  lexicon: HALOT
  rationale: Although מִן often means 'from,' with הִשְׁבִּיתִי plus an abstract object
    the sense is effectively removal from within the land. 'In the land' is smoother
    English and communicates the sphere from which the lewdness is removed.
- source_word: וְנִוַּסְּרוּ
  chosen: will be warned
  alternatives:
  - will be disciplined
  - will be instructed
  - will be chastened
  lexicon: HALOT
  rationale: Pual of יסר can mean to be disciplined, chastened, or instructed by correction.
    Here the result clause points to deterrence for 'all women,' so 'will be warned'
    captures the exemplary, cautionary effect of judgment without losing the corrective
    sense.
- source_word: כָּל הַנָּשִׁים
  chosen: all women
  alternatives:
  - all the women
  lexicon: HALOT
  rationale: The phrase is grammatically feminine plural and should be rendered gender-accurately.
    'All women' is natural English and likely generic beyond a narrowly defined local
    subset.
- source_word: וְלֹא תַעֲשֶׂינָה
  chosen: and they will not act
  alternatives:
  - and they will not do
  - so that they will not do
  lexicon: HALOT
  rationale: עשה is broad, but 'act' fits the moral-behavioral context better than
    the more wooden 'do.' The conjunction is retained as coordinate/resultative in
    context.
- source_word: כְּזִמַּתְכֶנָה
  chosen: according to your lewdness
  alternatives:
  - like your lewdness
  - according to your depravity
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: they will not behave in the manner
    of the addressees'' lewd conduct. ''According to your lewdness'' is slightly formal
    but preserves the comparative force and the repetition of זִמָּה.'
