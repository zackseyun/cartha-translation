theological_decisions:
- issue: Number shift in the opening verb
  chosen_reading: 'Render the clause with a plural English subject: ''They went in
    to her'''
  alternative_readings:
  - He came to her ... so they went in to Oholah and to Oholibah
  rationale: The Hebrew opens with a singular wayyiqtol but immediately continues
    with plural forms and a plural comparison. In context the subject is the group
    of lovers/men described in the surrounding passage. Rendering the sense in plural
    avoids a misleading shift in English while preserving the collective action described.
