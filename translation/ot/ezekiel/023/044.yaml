id: EZK.23.44
reference: Ezekiel 23:44
source:
  edition: WLC
  text: וַ/יָּב֣וֹא אֵלֶ֔י/הָ כְּ/ב֖וֹא אֶל אִשָּׁ֣ה זוֹנָ֑ה כֵּ֣ן בָּ֗אוּ אֶֽל אָֽהֳלָה֙
    וְ/אֶל אָ֣הֳלִיבָ֔ה אִשֹּׁ֖ת הַ/זִּמָּֽה־־־׃
translation:
  text: They went in to her as men go in to a prostitute; so they went in to Oholah
    and to Oholibah, women of depravity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'He came to her as one goes in to a prostitute; so they
      came to Oholah and to Oholibah.' The Hebrew opens with a singular verb before
      shifting to plural.
    reason: textual_variant
  - marker: b
    text: Or 'lewd women.' The Hebrew expression literally reads 'women of depravity/lewdness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא / בָּאוּ
  chosen: they went in
  alternatives:
  - he came / they came
  - they went to
  lexicon: HALOT
  rationale: The verb בוא with אֶל in this sexual context is idiomatically 'go in
    to.' Although the first form is singular in the consonantal text, the following
    plural verb and the comparison with how men approach a prostitute support rendering
    the sense collectively in smooth English. 'Went in' preserves the sexual idiom
    without paraphrase.
- source_word: אֵלֶיהָ
  chosen: to her
  alternatives:
  - into her
  lexicon: HALOT
  rationale: The preposition plus pronoun is literally 'to her.' In English, with
    'went in,' the idiomatic expression becomes 'went in to her,' preserving the sexual
    sense while staying close to the Hebrew construction.
- source_word: כְּבוֹא אֶל
  chosen: as men go in to
  alternatives:
  - as one goes in to
  - like going in to
  lexicon: HALOT
  rationale: 'The infinitive construct with comparative כ expresses manner: ''as/like
    going in to.'' English normally supplies an implied subject; ''as men go in to''
    makes the simile natural and matches the context of sexual approach.'
- source_word: אִשָּׁה זוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a whore
  lexicon: HALOT
  rationale: זוֹנָה denotes a prostitute/fornicating woman. 'Prostitute' is the clearest
    modern English equivalent; 'harlot' is archaic and 'whore' is more pejorative
    than necessary for translation.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: כֵּן marks the comparison's conclusion. 'So' is concise, natural, and
    preserves the logical correspondence.
- source_word: אָהֳלָה ... אָהֳלִיבָה
  chosen: Oholah ... Oholibah
  lexicon: HALOT
  rationale: These are proper names and should be transliterated per project philosophy
    rather than translated.
- source_word: אִשֹּׁת הַזִּמָּה
  chosen: women of depravity
  alternatives:
  - lewd women
  - women of lewdness
  - women of wickedness
  lexicon: HALOT
  rationale: זִמָּה in Ezekiel often denotes lewd, depraved, or outrageous sexual
    wickedness. 'Women of depravity' preserves the genitival force and moral weight
    without sounding archaic. 'Lewd women' is possible but slightly narrows the term
    to sexual brazenness alone.
