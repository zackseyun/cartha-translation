id: EZK.23.47
reference: Ezekiel 23:47
source:
  edition: WLC
  text: וְ/רָגְמ֨וּ עֲלֵי/הֶ֥ן אֶ֨בֶן֙ קָהָ֔ל וּ/בָרֵ֥א אוֹתְ/הֶ֖ן בְּ/חַרְבוֹתָ֑/ם
    בְּנֵי/הֶ֤ם וּ/בְנֽוֹתֵי/הֶם֙ יַהֲרֹ֔גוּ וּ/בָתֵּי/הֶ֖ן בָּ/אֵ֥שׁ יִשְׂרֹֽפוּ׃
translation:
  text: And the assembly will stone them with stones and cut them down with their
    swords. They will kill their sons and their daughters, and burn their houses with
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hew them down' or 'hack them to pieces' with their swords.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָגְמוּ
  chosen: will stone
  alternatives:
  - will pelt
  - will cast stones at
  lexicon: HALOT
  rationale: The verb רגם denotes execution or assault by stoning. 'Will stone' is
    the most direct and idiomatic English rendering in this judicial-violence context.
- source_word: עֲלֵיהֶן
  chosen: them
  alternatives:
  - against them
  - upon them
  lexicon: HALOT
  rationale: 'The preposition על with the verb ''stone'' is naturally absorbed into
    English as a direct object: ''stone them,'' rather than the less idiomatic ''stone
    against them.'' The feminine plural refers to the two women of the allegory.'
- source_word: אֶבֶן
  chosen: with stones
  alternatives:
  - with stone
  lexicon: HALOT
  rationale: Although singular in Hebrew, אבן after רגם functions collectively/instrumentally.
    English idiom prefers the plural 'with stones' in this construction.
- source_word: קָהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the crowd
  lexicon: HALOT
  rationale: קהל denotes an assembled group. 'Assembly' preserves the formal, judicial
    sense better than 'crowd,' and is more natural in modern English than 'congregation'
    in this punitive context.
- source_word: וּבָרֵא
  chosen: and cut them down
  alternatives:
  - and hew them down
  - and hack them to pieces
  lexicon: HALOT
  rationale: From ברא in the Piel, the sense is cutting down or hewing. In context
    of sword violence, 'cut them down' is clear modern English and avoids over-paraphrase
    while fitting the imagery.
- source_word: בְּחַרְבוֹתָם
  chosen: with their swords
  alternatives:
  - by their swords
  lexicon: HALOT
  rationale: Instrumental beth is best rendered 'with,' and the plural with 3mp suffix
    points to the weapons of the attacking assembly.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  chosen: their sons and their daughters
  alternatives:
  - their children, sons and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes sons and daughters; the translation
    preserves that gendered pair rather than collapsing it into 'children' alone.
- source_word: יַהֲרֹגוּ
  chosen: they will kill
  alternatives:
  - they will slay
  lexicon: HALOT
  rationale: הרג is the common verb for killing. 'Kill' is straightforward modern
    English; 'slay' is possible but more elevated and less natural.
- source_word: וּבָתֵּיהֶן
  chosen: their houses
  alternatives:
  - their homes
  lexicon: HALOT
  rationale: בתי refers literally to houses. 'Houses' preserves the concrete image
    and avoids softening the destruction.
- source_word: בָּאֵשׁ יִשְׂרֹפוּ
  chosen: burn their houses with fire
  alternatives:
  - set their houses on fire
  - burn up their houses with fire
  lexicon: HALOT
  rationale: The phrase is a standard Hebrew expression for destruction by burning.
    'Burn ... with fire' keeps the emphatic Hebrew wording while remaining readable.
