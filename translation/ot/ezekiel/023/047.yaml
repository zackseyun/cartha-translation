theological_decisions:
- issue: Referent of the feminine plural pronouns
  chosen_reading: Rendered as 'them' without re-identifying the women in the main
    text
  alternative_readings:
  - Rendered explicitly as 'these women' for clarity
  rationale: The Hebrew uses feminine plural pronouns referring back to Oholah and
    Oholibah in the allegory. Keeping 'them' preserves the source cohesion and avoids
    adding interpretive material not present in the verse itself.
