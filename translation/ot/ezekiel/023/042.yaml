id: EZK.23.42
reference: Ezekiel 23:42
source:
  edition: WLC
  text: וְ/ק֣וֹל הָמוֹן֮ שָׁלֵ֣ו בָ/הּ֒ וְ/אֶל אֲנָשִׁים֙ מֵ/רֹ֣ב אָדָ֔ם מוּבָאִ֥ים
    סובאים מִ/מִּדְבָּ֑ר וַֽ/יִּתְּנ֤וּ צְמִידִים֙ אֶל יְדֵי/הֶ֔ן וַ/עֲטֶ֥רֶת תִּפְאֶ֖רֶת
    עַל רָאשֵׁי/הֶֽן־־־׃
translation:
  text: And the sound of a carefree crowd was in her; and with the men from the mass
    of mankind, drunkards were brought in from the wilderness. Then they put bracelets
    on their hands and a beautiful crown on their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound of a multitude at ease' or 'the sound of a complacent crowd.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the middle clause is difficult. It may also be understood
      along the lines of 'and to the men from the multitude of mankind, drunkards
      were brought from the wilderness.'
    reason: alternative_reading
  - marker: c
    text: '''A beautiful crown'' is literally ''a crown of beauty'' or ''a splendid
      crown.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: Here קוֹל introduces the audible scene; 'sound' is broad enough to cover
    the festive/noisy atmosphere without overcommitting to a single nuance like 'voice'
    or 'noise'.
- source_word: הָמוֹן
  chosen: crowd
  alternatives:
  - multitude
  - tumult
  lexicon: HALOT
  rationale: הָמוֹן can denote a multitude or noisy throng. 'Crowd' fits the social
    setting and pairs naturally with 'sound.' The possible nuance of noise/tumult
    is carried by the phrase as a whole.
- source_word: שָׁלֵו
  chosen: carefree
  alternatives:
  - at ease
  - complacent
  lexicon: HALOT
  rationale: The adjective conveys ease, security, or complacent tranquility. 'Carefree'
    captures the morally lax, self-indulgent atmosphere in context better than the
    more neutral 'at ease.'
- source_word: בָהּ
  chosen: in her
  alternatives:
  - within her
  lexicon: HALOT
  rationale: The feminine singular pronoun refers to the woman/city imagery in the
    chapter. 'In her' preserves the metaphorical personification.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural, and the context concerns
    male sexual partners/visitors. Per translation philosophy, gender-accurate rendering
    is preferred.
- source_word: מֵרֹב אָדָם
  chosen: from the mass of mankind
  alternatives:
  - from the multitude of humanity
  - from the common people
  lexicon: HALOT
  rationale: This phrase is difficult, but it appears to distinguish these men as
    drawn from the broad human throng. 'Mankind' preserves the אדם element while sounding
    natural in English. The phrase remains somewhat formal to reflect the Hebrew's
    compressed expression.
- source_word: מוּבָאִים
  chosen: were brought in
  alternatives:
  - were brought
  lexicon: HALOT
  rationale: Passive participle from בוא in a causative/passive sense. 'Were brought
    in' fits the scene of outsiders being introduced into her company.
- source_word: סובאים
  chosen: drunkards
  alternatives:
  - drunken men
  lexicon: HALOT
  rationale: The ketiv/qere tradition here is difficult, but the common sense in context
    is intoxicated revelers. 'Drunkards' is concise and idiomatic, matching the debauched
    setting.
- source_word: מִמִּדְבָּר
  chosen: from the wilderness
  alternatives:
  - from the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness/desert. 'Wilderness' is slightly broader
    and avoids over-specifying terrain while preserving the outsider origin.
- source_word: וַיִּתְּנוּ
  chosen: they put
  alternatives:
  - they placed
  - they gave
  lexicon: HALOT
  rationale: In context of adornment, English idiom prefers 'put' rather than the
    more wooden 'gave.'
- source_word: צְמִידִים
  chosen: bracelets
  alternatives:
  - armlets
  - bands
  lexicon: HALOT
  rationale: The item is jewelry placed on the hands/arms. 'Bracelets' is the clearest
    modern English equivalent.
- source_word: אֶל יְדֵיהֶן
  chosen: on their hands
  alternatives:
  - on their wrists
  - on their arms
  lexicon: HALOT
  rationale: Literally 'to/on their hands.' Since the object is bracelets, idiomatic
    English uses 'on their hands,' while allowing the jewelry sense to imply wrist/arm
    placement.
- source_word: עֲטֶרֶת תִּפְאֶרֶת
  chosen: a beautiful crown
  alternatives:
  - a splendid crown
  - a crown of beauty
  lexicon: HALOT
  rationale: The construct phrase literally means 'a crown of beauty/splendor.' 'A
    beautiful crown' is natural English while preserving the adornment imagery.
- source_word: עַל רָאשֵׁיהֶן
  chosen: on their heads
  lexicon: HALOT
  rationale: Straightforward locative phrase; plural feminine suffix refers to the
    women being adorned.
