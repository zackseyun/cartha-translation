theological_decisions:
- issue: Referent of the feminine suffixes in לְפָנֶיהָ and עָלֶיהָ
  chosen_reading: The suffixes refer to the couch/table furnishing arrangement, rendered
    impersonally as 'before it' and 'on it.'
  alternative_readings:
  - The suffixes refer to the woman, yielding 'before you/her' and 'upon it/the table'
    with shifted antecedents.
  rationale: 'The verse depicts a staged scene of luxury and cultic misuse. Taking
    the first suffix with the couch gives the most coherent spatial image: a table
    set before the couch; the final suffix then naturally refers to the table, on
    which the incense and oil are placed. This avoids unnecessary ambiguity in English
    while staying close to the Hebrew sequence.'
  doctrine_reference: Preserve theological tension rather than resolve it; ambiguity
    is handled by main-text choice with alternative preserved in footnote.
