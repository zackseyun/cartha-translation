id: EZK.23.41
reference: Ezekiel 23:41
source:
  edition: WLC
  text: וְ/יָשַׁבְתְּ֙ עַל מִטָּ֣ה כְבוּדָּ֔ה וְ/שֻׁלְחָ֥ן עָר֖וּךְ לְ/פָנֶ֑י/הָ וּ/קְטָרְתִּ֥/י
    וְ/שַׁמְנִ֖/י שַׂ֥מְתְּ עָלֶֽי/הָ־׃
translation:
  text: You sat on a splendid couch, with a table set before it, and on it you placed
    my incense and my oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew feminine suffixes in 'before it' and 'on it' are somewhat ambiguous;
      they may be understood differently, such as 'before her' for the woman rather
      than for the couch/table arrangement.
    reason: alternative_reading
lexical_decisions:
- source_word: יָשַׁבְתְּ
  chosen: you sat
  alternatives:
  - you sat down
  - you were seated
  lexicon: HALOT
  rationale: Qal perfect 2fs of ישׁב, straightforward past narrative addressed to
    the feminine singular figure. 'You sat' is the plain sense and fits the sequence
    of actions.
- source_word: מִטָּה
  chosen: couch
  alternatives:
  - bed
  - divan
  lexicon: HALOT
  rationale: The noun can denote a bed or couch. In this context of luxurious, adulterous
    banquet imagery, 'couch' better conveys a furnished lounging place rather than
    a sleeping bed.
- source_word: כְבוּדָּה
  chosen: splendid
  alternatives:
  - honorable
  - glorious
  - luxurious
  lexicon: HALOT
  rationale: From a root associated with weight/honor/glory; here it describes the
    couch as impressive and sumptuous. 'Splendid' communicates the opulent sense in
    natural English.
- source_word: שֻׁלְחָן עָרוּךְ
  chosen: a table set
  alternatives:
  - a prepared table
  - a table arranged
  lexicon: HALOT
  rationale: The passive participle עָרוּךְ means arranged/prepared. 'A table set'
    is idiomatic English and preserves the banquet/preparation imagery.
- source_word: לְפָנֶיהָ
  chosen: before it
  alternatives:
  - before her
  - in front of it
  lexicon: HALOT
  rationale: 'The suffix is 3fs and could grammatically refer to the couch/table arrangement.
    Given the immediate antecedent ''couch'' (feminine), ''before it'' best reflects
    the spatial setup: a table set before the couch. Rendering ''before her'' would
    shift the focus to the woman rather than the furnishing arrangement.'
- source_word: קְטָרְתִּי
  chosen: my incense
  alternatives:
  - my fragrant incense
  lexicon: HALOT
  rationale: With 1cs suffix, this refers to incense belonging to or designated by
    God. 'My incense' is the direct and theologically important wording, highlighting
    misuse of what belongs to the LORD.
- source_word: שַׁמְנִי
  chosen: my oil
  alternatives:
  - my anointing oil
  lexicon: HALOT
  rationale: The noun means oil, here with 1cs suffix. 'My oil' keeps the Hebrew concise.
    'Anointing oil' is possible by context, but the text itself does not specify that
    nuance, so the simpler rendering is preferable.
- source_word: שַׂמְתְּ עָלֶיהָ
  chosen: you placed ... on it
  alternatives:
  - you set ... on it
  - you put ... on it
  lexicon: HALOT
  rationale: Qal perfect 2fs of שׂים with עַל + 3fs suffix indicates placing the items
    upon the feminine antecedent. 'Placed ... on it' is natural and preserves the
    concrete action.
