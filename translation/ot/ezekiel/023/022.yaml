id: EZK.23.22
reference: Ezekiel 23:22
source:
  edition: WLC
  text: לָ/כֵ֣ן אָהֳלִיבָ֗ה כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ הִנְ/נִ֨י מֵעִ֤יר אֶת מְאַהֲבַ֨יִ/ךְ֙ עָלַ֔יִ/ךְ אֵ֛ת אֲשֶׁר נָקְעָ֥ה נַפְשֵׁ֖/ךְ מֵ/הֶ֑ם וַ/הֲבֵאתִ֥י/ם עָלַ֖יִ/ךְ מִ/סָּבִֽיב־־־׃
translation:
  text: 'Therefore, Oholibah, thus says the Lord GOD: Behold, I am stirring up your lovers against you, those from whom your soul has turned away, and I will bring them against you from every side.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those whom your soul loathed' / 'those from whom you became alienated.' The Hebrew verb can convey revulsion or estrangement.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Introduces the consequence of the preceding indictment; 'Therefore' preserves the prophetic judicial force.
- source_word: אָהֳלִיבָה
  chosen: Oholibah
  rationale: Proper name is transliterated per project philosophy rather than translated.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: thus says the Lord GOD
  alternatives:
  - thus says the Lord Yahweh
  - thus says the Lord GOD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine; because אֲדֹנָי precedes it, English convention uses 'Lord GOD' to distinguish the two divine titles without producing 'Lord LORD.'
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Marks solemn divine announcement. 'Behold' retains the elevated prophetic tone and the deictic force.
- source_word: מֵעִיר
  chosen: stirring up
  alternatives:
  - rousing
  - awakening
  lexicon: HALOT
  rationale: The Hiphil participle of עור here conveys causing someone to arise or be aroused to action against another. 'Stirring up' fits the hostile mobilization context.
- source_word: מְאַהֲבַיִךְ
  chosen: your lovers
  alternatives:
  - those who loved you
  lexicon: HALOT
  rationale: In Ezekiel 23 the term refers metaphorically to illicit political/sexual partners. 'Your lovers' preserves the metaphor and the accusatory tone.
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: With hostile action in context, the preposition is best rendered idiomatically as 'against you' rather than the more literal but less natural 'upon you.'
- source_word: אֵת אֲשֶׁר נָקְעָה נַפְשֵׁךְ מֵהֶם
  chosen: those from whom your soul has turned away
  alternatives:
  - those whom you have become alienated from
  - those whom you loathed
  lexicon: HALOT
  rationale: The clause identifies the lovers now estranged from Oholibah. נקע in this context conveys being torn away, alienated, or turned away in revulsion. 'Your soul has turned away from' preserves the Hebrew subject 'your soul' and avoids overinterpreting the emotional nuance as simple hatred, while still conveying estrangement.
- source_word: וַהֲבֵאתִים
  chosen: and I will bring them
  alternatives:
  - and I will bring them in
  lexicon: HALOT
  rationale: Straightforward causative/future sense in context of military/judicial action.
- source_word: מִסָּבִיב
  chosen: from every side
  alternatives:
  - from all around
  - all around
  lexicon: HALOT
  rationale: Expresses encirclement. 'From every side' is idiomatic and vivid in English.
