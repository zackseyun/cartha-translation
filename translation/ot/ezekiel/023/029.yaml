theological_decisions:
- issue: Sexualized metaphor for Jerusalem/Samaria's unfaithfulness
  chosen_reading: Retain the explicit prostitution imagery rather than softening it into generic 'unfaithfulness.'
  alternative_readings:
  - Render with softened metaphor such as 'immorality' or 'infidelity'
  rationale: Ezekiel intentionally uses shocking sexual language to portray covenant betrayal and coming shame. Softening the imagery would mute the prophetic rhetoric and import interpretation beyond the lexical data.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Readable modern English, not euphemistic flattening.'
revisions:
- timestamp: '2026-04-21T01:27:49Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/ezekiel/023/029.json
  category: awkward_english
  tier: 1
  from: along with your lewdness and your acts of prostitution
  to: —your lewdness and your acts of prostitution
  rationale: The Hebrew syntax features a singular verb (וְנִגְלָה) with a singular subject (עֶרְוַת), strongly suggesting the following nouns (זִמָּתֵךְ וְתַזְנוּתָיִךְ) are in apposition to the subject phrase, clarifying its meaning. The current rendering 'along with' is syntactically loose and obscures this relationship, making the nouns seem like separate items rather than an explanation. Using an em-dash to set them off as an appositive phrase ('...will be uncovered—your lewdness...') would more accurately reflect the Hebrew grammar and is a clear, common convention in modern English.
