id: EZK.23.29
reference: Ezekiel 23:29
source:
  edition: WLC
  text: וְ/עָשׂ֨וּ אוֹתָ֜/ךְ בְּ/שִׂנְאָ֗ה וְ/לָקְחוּ֙ כָּל יְגִיעֵ֔/ךְ וַ/עֲזָב֖וּ/ךְ עֵירֹ֣ם וְ/עֶרְיָ֑ה וְ/נִגְלָה֙ עֶרְוַ֣ת זְנוּנַ֔יִ/ךְ וְ/זִמָּתֵ֖/ךְ וְ/תַזְנוּתָֽיִ/ךְ־׃
translation:
  text: They will deal with you in hatred, and they will take all your labor, and leave you naked and bare; and the nakedness of your prostitutions will be uncovered, —your lewdness and your acts of prostitution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all you have worked for.' The Hebrew 'your labor' can refer to the fruit or gain of one's toil.
    reason: lexical_alternative
  - marker: b
    text: Or 'the shame of your prostitutions will be exposed.' 'Nakedness' here carries the sense of shameful exposure.
    reason: lexical_alternative
  - marker: c
    text: Or 'along with your lewdness and your acts of prostitution'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְעָשׂוּ אֹתָךְ בְּשִׂנְאָה
  chosen: They will deal with you in hatred
  alternatives:
  - They will act against you with hatred
  - They will treat you hatefully
  lexicon: HALOT
  rationale: The idiom עשה + object + בְּ expresses how someone is treated or dealt with. 'Deal with you in hatred' preserves the Hebrew construction and the hostile manner indicated by בְּשִׂנְאָה without over-paraphrasing.
- source_word: וְלָקְחוּ כָּל יְגִיעֵךְ
  chosen: they will take all your labor
  alternatives:
  - they will take all your wealth
  - they will take all you have worked for
  lexicon: HALOT
  rationale: יְגִיעַ denotes toil, labor, and by extension what one has gained by labor. 'All your labor' is formally close and preserves the concrete sense of the fruit of her toil; the more idiomatic implication can be inferred from context.
- source_word: וַעֲזָבוּךְ עֵירֹם וְעֶרְיָה
  chosen: leave you naked and bare
  alternatives:
  - leave you naked and exposed
  - leave you stripped naked
  lexicon: HALOT
  rationale: The paired terms intensify exposure and destitution. 'Naked and bare' is a natural English doublet that preserves the emphatic pairing without collapsing it into a single adjective.
- source_word: וְנִגְלָה
  chosen: will be uncovered
  alternatives:
  - will be exposed
  - will be revealed
  lexicon: HALOT
  rationale: Although morphologically a perfect with prefixed conjunction, in context it continues the future sequence. 'Will be uncovered' fits the shame/exposure imagery and links naturally with 'nakedness.'
- source_word: עֶרְוַת זְנוּנַיִךְ
  chosen: the nakedness of your prostitutions
  alternatives:
  - the shame of your prostitutions
  - your nakedness in prostitution
  lexicon: HALOT
  rationale: עֶרְוָה is literally 'nakedness,' often with connotations of shameful exposure. זְנוּנִים in Ezekiel's metaphor refers to acts of prostitution/whoredom, both literal imagery and spiritual infidelity. 'The nakedness of your prostitutions' keeps the metaphorical and lexical force.
- source_word: זְנוּנַיִךְ
  chosen: prostitutions
  alternatives:
  - whorings
  - acts of prostitution
  - harlotries
  lexicon: HALOT
  rationale: A plural abstract/intensive form. 'Prostitutions' is modern, readable English that preserves the sexual metaphor more transparently than archaic 'whoredoms,' while avoiding euphemism.
- source_word: וְזִמָּתֵךְ
  chosen: your lewdness
  alternatives:
  - your wicked scheme
  - your depravity
  lexicon: HALOT
  rationale: In this context זִמָּה refers to sexual depravity or lewd conduct, not merely a plan or scheme. 'Lewdness' best matches the surrounding sexual-shame imagery.
- source_word: וְתַזְנוּתָיִךְ
  chosen: your acts of prostitution
  alternatives:
  - your fornications
  - your prostitutions
  lexicon: HALOT
  rationale: This noun overlaps with זְנוּנִים but is not identical in form; rendering it as 'acts of prostitution' preserves the repetition while giving slightly differentiated English to reflect the Hebrew accumulation of near-synonyms.
