id: EZK.23.38
reference: Ezekiel 23:38
source:
  edition: WLC
  text: ע֥וֹד זֹ֖את עָ֣שׂוּ לִ֑/י טִמְּא֤וּ אֶת מִקְדָּשִׁ/י֙ בַּ/יּ֣וֹם הַ/ה֔וּא
    וְ/אֶת שַׁבְּתוֹתַ֖/י חִלֵּֽלוּ־־׃
translation:
  text: 'Moreover, they did this to me: they defiled my sanctuary on that same day,
    and they profaned my Sabbaths.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עוֹד זֹאת
  chosen: Moreover, ... this
  alternatives:
  - Also, ... this
  - Yet this also
  lexicon: HALOT
  rationale: The combination introduces an additional accusation, not merely a temporal
    'still.' 'Moreover' captures the additive force in natural English while preserving
    the emphasis of 'this also.'
- source_word: עָשׂוּ לִי
  chosen: they did this to me
  alternatives:
  - they did this against me
  - they did this for me
  lexicon: HALOT
  rationale: 'With ל plus first-person suffix in this context of offense, the sense
    is adversative/personal involvement: an act done to or against God. ''To me''
    is idiomatic and preserves the personal affront without over-interpreting.'
- source_word: טִמְּאוּ
  chosen: they defiled
  alternatives:
  - they made unclean
  - they polluted
  lexicon: HALOT
  rationale: The Piel of טמא here denotes rendering something ritually impure. 'Defiled'
    is the most natural English equivalent in sanctuary context and retains cultic
    weight better than the more wooden 'made unclean.'
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple
  lexicon: HALOT
  rationale: מקדש refers broadly to the holy sanctuary. 'Sanctuary' is preferable
    to 'temple' because it preserves the sacred-space sense without narrowing the
    term unnecessarily.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that same day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: In context, the phrase points to the very day of the previously described
    abominations. 'That same day' brings out the contextual force more clearly than
    the flatter 'that day' while remaining faithful.
- source_word: שַׁבְּתוֹתַי
  chosen: my Sabbaths
  alternatives:
  - my Sabbath days
  lexicon: HALOT
  rationale: The plural form is explicit and should be preserved. 'Sabbaths' is the
    standard concise rendering and reflects repeated violations of sacred times.
- source_word: חִלֵּלוּ
  chosen: they profaned
  alternatives:
  - they desecrated
  - they treated as common
  lexicon: HALOT
  rationale: חלל in Piel commonly means to profane or desecrate what is holy. 'Profaned'
    is the established and precise rendering for violation of holy times, matching
    the cultic register of the verse.
