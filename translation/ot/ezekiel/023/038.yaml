theological_decisions:
- issue: Cultic terminology for sacred space and sacred time
  chosen_reading: Retain 'sanctuary' and 'Sabbaths' with explicitly holiness-violation
    language ('defiled,' 'profaned').
  alternative_readings:
  - Use more general terms such as 'temple' and 'dishonored'
  rationale: The verse's force lies in covenantal and cultic violation. More general
    language would flatten the theological gravity of impurity and profanation in
    relation to God's holy things.
  doctrine_reference: Translation philosophy §§1, 5, 6
