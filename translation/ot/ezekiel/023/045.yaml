id: EZK.23.45
reference: Ezekiel 23:45
source:
  edition: WLC
  text: וַ/אֲנָשִׁ֣ים צַדִּיקִ֗ם הֵ֚מָּה יִשְׁפְּט֣וּ אֽוֹתְ/הֶ֔ם מִשְׁפַּט֙ נֹֽאֲפ֔וֹת
    וּ/מִשְׁפַּ֖ט שֹׁפְכ֣וֹת דָּ֑ם כִּ֤י נֹֽאֲפֹת֙ הֵ֔נָּה וְ/דָ֖ם בִּֽ/ידֵי/הֶֽן׃ס
translation:
  text: But righteous men will judge them with the judgment of adulteresses and with
    the judgment of women who shed blood, because they are adulteresses, and blood
    is on their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to the judgment for adulteresses and for women who shed blood.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'blood is in their hands'; the English idiom 'blood is on their
      hands' expresses guilt for bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲנָשִׁים
  chosen: But ... men
  alternatives:
  - And ... men
  - But ... people
  lexicon: HALOT
  rationale: אֲנָשִׁים is the common plural for 'men.' The prefixed conjunction ו
    can be rendered 'and' or, in context, adversatively as 'but.' Here 'but' fits
    the transition from prior divine speech to the announced judgment. 'Men' is retained
    rather than a gender-neutral term because the Hebrew is explicitly masculine and
    the phrase likely evokes judicial agents.
- source_word: צַדִּיקִם
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: צַדִּיקִים denotes those who are righteous/just. 'Righteous' preserves
    the moral-judicial sense and aligns with common biblical usage.
- source_word: הֵמָּה
  chosen: (implicit in 'righteous men will judge')
  alternatives:
  - they
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''they themselves.'' English
    does not require an explicit pronoun here, so the emphasis is absorbed into the
    clause naturally.'
- source_word: יִשְׁפְּטוּ
  chosen: will judge
  alternatives:
  - shall judge
  lexicon: HALOT
  rationale: 'Imperfect verb in prophetic context is naturally future: ''will judge.'''
- source_word: אֹתְהֶם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring to the two women/cities treated together;
    English idiomatically uses 'them.'
- source_word: מִשְׁפַּט נֹאֲפוֹת
  chosen: with the judgment of adulteresses
  alternatives:
  - according to the judgment for adulteresses
  - as adulteresses are judged
  lexicon: HALOT
  rationale: Construct phrase literally 'judgment of adulteresses.' 'With the judgment
    of adulteresses' is clear and fairly formal, preserving the legal tone. 'Adulteresses'
    is preferable to the more abstract 'adulterous women' because the Hebrew participle
    functions substantivally.
- source_word: וּמִשְׁפַּט שֹׁפְכוֹת דָּם
  chosen: and with the judgment of women who shed blood
  alternatives:
  - and with the judgment of bloodshedders
  - and with the judgment for women who shed blood
  lexicon: HALOT
  rationale: שֹׁפְכוֹת דָּם is a feminine plural participial expression, literally
    'shedders of blood.' 'Women who shed blood' makes the feminine reference explicit
    in English and matches the context of the two sisters/cities.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'כִּי here gives the reason for the sentence: ''because they are adulteresses...''
    ''Because'' is clearer in modern English than ''for.'''
- source_word: נֹאֲפֹת הֵנָּה
  chosen: they are adulteresses
  alternatives:
  - they are adulterous women
  lexicon: HALOT
  rationale: Predicate construction with feminine plural pronoun. 'Adulteresses' is
    concise and preserves the legal-moral category.
- source_word: וְדָם בִּידֵיהֶן
  chosen: and blood is on their hands
  alternatives:
  - and blood is in their hands
  - and they have blood on their hands
  lexicon: HALOT
  rationale: Literally 'and blood [is] in their hands.' The idiomatic English 'blood
    is on their hands' best conveys culpability while preserving the metaphor.
