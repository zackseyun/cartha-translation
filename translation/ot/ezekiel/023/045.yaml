theological_decisions:
- issue: Identity of the judging agents
  chosen_reading: righteous men refers to human judicial agents invoked in the prophetic
    image, not a direct identification of God as the judge in this clause
  alternative_readings:
  - righteous men could symbolize heavenly or idealized agents of divine judgment
  rationale: The Hebrew plainly says 'righteous men' and the immediate context uses
    legal imagery for the punishment of the two women/cities. The translation keeps
    the human-language imagery without expanding it into a more specific theological
    claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
