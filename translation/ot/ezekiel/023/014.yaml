theological_decisions:
- issue: Metaphorical sexual language for covenantal infidelity
  chosen_reading: Retain 'acts of prostitution' in the main text
  alternative_readings:
  - acts of harlotry
  - unfaithfulness
  rationale: Ezekiel intentionally uses shocking sexualized imagery to portray idolatrous
    and political infidelity. Rendering it literally preserves the prophetic force
    and does not soften the metaphor into a mere abstraction like 'unfaithfulness.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
