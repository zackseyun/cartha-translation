id: EZK.23.14
reference: Ezekiel 23:14
source:
  edition: WLC
  text: וַ/תּ֖וֹסֶף אֶל תַּזְנוּתֶ֑י/הָ וַ/תֵּ֗רֶא אַנְשֵׁי֙ מְחֻקֶּ֣ה עַל הַ/קִּ֔יר
    צַלְמֵ֣י כשדיים חֲקֻקִ֖ים בַּ/שָּׁשַֽׁר־־׃
translation:
  text: Then she added to her acts of prostitution, and she saw men portrayed on the
    wall, images of Chaldeans engraved in vermilion,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'images of Babylonians'; the Hebrew says 'Chaldeans,' the people associated
      with Babylon.
    reason: lexical_alternative
  - marker: b
    text: '''Vermilion'' refers to a bright red pigment; alternatively, ''red pigment''
      or possibly ''cinnabar.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתּוֹסֶף
  chosen: Then she added
  alternatives:
  - And she added
  - She continued
  lexicon: HALOT
  rationale: The waw-consecutive with יסף advances the narrative. 'Added' preserves
    the Hebrew idiom more closely than a freer 'continued,' while 'Then' reflects
    sequential movement.
- source_word: אֶל תַּזְנוּתֶיהָ
  chosen: to her acts of prostitution
  alternatives:
  - to her prostitutions
  - to her whorings
  lexicon: HALOT
  rationale: תַּזְנוּת denotes acts of harlotry/prostitution in Ezekiel's metaphor
    for covenantal unfaithfulness. 'Acts of prostitution' is clear modern English
    and preserves the plural nuance better than a singular abstraction.
- source_word: וַתֵּרֶא
  chosen: and she saw
  alternatives:
  - and she looked at
  lexicon: HALOT
  rationale: The verb ראה is straightforward here; 'saw' is the plain sense and fits
    the narrative sequence.
- source_word: אַנְשֵׁי
  chosen: men
  alternatives:
  - figures of men
  lexicon: HALOT
  rationale: אַנְשֵׁי is the construct plural of 'men.' Because the following participle
    and appositional phrase already indicate these are depicted figures, 'men' is
    sufficient in the main text.
- source_word: מְחֻקֶּה
  chosen: portrayed
  alternatives:
  - carved
  - depicted
  - drawn
  lexicon: HALOT
  rationale: The passive participial form from חקה conveys something inscribed/depicted.
    Since the medium is 'on the wall,' 'portrayed' best captures visual representation
    without overcommitting to carving into stone.
- source_word: עַל הַקִּיר
  chosen: on the wall
  alternatives:
  - upon the wall
  lexicon: HALOT
  rationale: A direct, natural rendering of the prepositional phrase.
- source_word: צַלְמֵי כשדיים
  chosen: images of Chaldeans
  alternatives:
  - images of Babylonians
  lexicon: HALOT
  rationale: כשדיים refers to Chaldeans, the ethnic/political group associated with
    Babylon. 'Chaldeans' preserves the source term more precisely; 'Babylonians' is
    a contextual alternative worth preserving.
- source_word: חֲקֻקִים
  chosen: engraved
  alternatives:
  - carved
  - inscribed
  lexicon: HALOT
  rationale: This participle again comes from the root for engraving/inscribing. 'Engraved'
    keeps the lexical connection with the previous depiction language while sounding
    natural in English.
- source_word: בַּשָּׁשַׁר
  chosen: in vermilion
  alternatives:
  - in red pigment
  - with cinnabar
  lexicon: HALOT
  rationale: שָׁשַׁר denotes a bright red coloring substance/pigment. 'Vermilion'
    is a standard concise rendering in English Bible tradition and remains understandable;
    alternatives are preserved in a footnote because the exact pigment identification
    is not certain.
