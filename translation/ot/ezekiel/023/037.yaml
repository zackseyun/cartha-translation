id: EZK.23.37
reference: Ezekiel 23:37
source:
  edition: WLC
  text: כִּ֣י נִאֵ֗פוּ וְ/דָם֙ בִּֽ/ידֵי/הֶ֔ן וְ/אֶת גִּלּֽוּלֵי/הֶ֖ן נִאֵ֑פוּ וְ/גַ֤ם
    אֶת בְּנֵי/הֶן֙ אֲשֶׁ֣ר יָֽלְדוּ לִ֔/י הֶעֱבִ֥ירוּ לָ/הֶ֖ם לְ/אָכְלָֽה־־־׃
translation:
  text: For they have committed adultery, and blood is on their hands; they have committed
    adultery with their idols, and they even made their sons, whom they bore to me,
    pass through the fire for them as food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'made pass through'; in this context the idiom refers
      to child sacrifice, traditionally understood as passing through the fire.
    reason: cultural_note
  - marker: b
    text: Or 'for food.' The phrase depicts the children as consumed in sacrificial
      offering to the idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִאֵפוּ
  chosen: have committed adultery
  alternatives:
  - have been adulterous
  - have committed sexual immorality
  lexicon: HALOT
  rationale: The verb נאף literally denotes adultery. In Ezekiel it often carries
    both literal and metaphorical force for covenant unfaithfulness through idolatry.
    'Committed adultery' preserves the prophetic metaphor and the repeated verbal
    parallelism in the verse.
- source_word: דָם בִּידֵיהֶן
  chosen: blood is on their hands
  alternatives:
  - blood is in their hands
  - their hands are full of blood
  lexicon: HALOT
  rationale: This idiom conveys bloodguilt for murder. 'Blood is on their hands' is
    natural modern English and preserves the legal-moral force of culpability.
- source_word: גִּלּוּלֵיהֶן
  chosen: their idols
  alternatives:
  - their dung-idols
  - their filthy idols
  lexicon: HALOT
  rationale: The noun is Ezekiel's contemptuous term for idols. 'Idols' is the clear
    base meaning in English; the pejorative nuance is real but difficult to preserve
    without sounding interpretive or awkward in the main text.
- source_word: וְאֶת גִּלּוּלֵיהֶן נִאֵפוּ
  chosen: they have committed adultery with their idols
  alternatives:
  - they have committed adultery by means of their idols
  - they have adulterized themselves with their idols
  lexicon: HALOT
  rationale: Using 'with' makes explicit the relational/idolatrous object of the adultery
    metaphor and matches the prophetic accusation of spiritual infidelity.
- source_word: בְּנֵיהֶן אֲשֶׁר יָלְדוּ לִי
  chosen: their sons, whom they bore to me
  alternatives:
  - their children, whom they bore for me
  - their sons, whom they bore for my sake
  lexicon: HALOT
  rationale: בנים is specifically 'sons,' not the more general 'children.' The phrase
    'bore to me' preserves the possessive/covenantal claim of God over these children
    without overexplaining it.
- source_word: הֶעֱבִירוּ
  chosen: made ... pass through the fire
  alternatives:
  - caused ... to pass through
  - offered up
  lexicon: HALOT
  rationale: In this cultic context the idiom refers to child sacrifice associated
    with passing children through fire. The added words 'the fire' are warranted by
    the established idiom and make the sense clear in English.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The pronoun most naturally refers to the idols/false gods just mentioned.
    'For them' fits the sacrificial sense better than a bare 'to them' in English.
- source_word: לְאָכְלָה
  chosen: as food
  alternatives:
  - for food
  - to be devoured
  lexicon: HALOT
  rationale: The noun means food/consumption. 'As food' communicates the horrifying
    sacrificial imagery succinctly and idiomatically.
