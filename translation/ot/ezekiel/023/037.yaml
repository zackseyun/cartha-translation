theological_decisions:
- issue: Whether to make explicit that the passing through was child sacrifice
  chosen_reading: made their sons ... pass through the fire for them as food
  alternative_readings:
  - made their sons pass through for them as food
  - offered their sons to them as food
  rationale: The Hebrew uses the established sacrificial idiom 'cause to pass through'
    in a context of bloodguilt and idolatry. Making 'the fire' explicit clarifies
    the historical-cultic sense without substantially paraphrasing beyond what the
    idiom warrants.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense without flattening theological weight.'
