id: EZK.23.20
reference: Ezekiel 23:20
source:
  edition: WLC
  text: וַֽ/תַּעְגְּבָ֔/ה עַ֖ל פִּֽלַגְשֵׁי/הֶ֑ם אֲשֶׁ֤ר בְּשַׂר חֲמוֹרִים֙ בְּשָׂרָ֔/ם
    וְ/זִרְמַ֥ת סוּסִ֖ים זִרְמָתָֽ/ם־׃
translation:
  text: She lusted after their lovers, whose flesh was like the flesh of donkeys,
    and whose emission was like the emission of horses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'their concubines.' In context the term is commonly understood
      metaphorically of sexual partners or lovers.
    reason: lexical_alternative
  - marker: b
    text: '''Flesh'' here likely functions as a sexual euphemism, that is, ''members.'''
    reason: lexical_alternative
  - marker: c
    text: Or more explicitly, 'semen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעְגְּבָה
  chosen: She lusted
  alternatives:
  - She doted
  - She desired passionately
  lexicon: HALOT
  rationale: The verb עגב in this context denotes strong erotic desire. 'Lusted' conveys
    the sexual force more clearly in modern English than the traditional 'doted,'
    which can sound emotionally mild or antiquated.
- source_word: עַל
  chosen: after
  alternatives:
  - for
  - over
  lexicon: HALOT
  rationale: With עגב, the preposition עַל idiomatically marks the object of desire.
    English 'lusted after' is a natural equivalent.
- source_word: פִּלַגְשֵׁיהֶם
  chosen: their lovers
  alternatives:
  - their concubines
  lexicon: HALOT
  rationale: Although the form is from פִּלֶגֶשׁ ('concubine'), the context is a sexual
    metaphor for foreign paramours, and many interpreters understand the sense here
    as male sexual partners/lovers rather than literal 'concubines.' Rendering 'their
    lovers' best fits the immediate imagery and avoids a misleadingly literal sense
    in English. The more literal alternative is preserved in a footnote because the
    lexical form is unusual.
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - who
  - for whom
  lexicon: HALOT
  rationale: The relative particle introduces descriptive clauses about the lovers.
    'Whose' makes the possessive relationship in the following predicates smooth in
    English.
- source_word: בְּשַׂר חֲמוֹרִים בְּשָׂרָם
  chosen: whose flesh was like the flesh of donkeys
  alternatives:
  - whose members were like those of donkeys
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In this sexual context it likely functions
    euphemistically for genital endowment, but the Hebrew itself uses 'flesh.' The
    main text preserves the literal wording while a footnote notes the euphemistic
    alternative.
- source_word: וְזִרְמַת סוּסִים זִרְמָתָם
  chosen: and whose emission was like the emission of horses
  alternatives:
  - and whose semen was like that of horses
  lexicon: HALOT
  rationale: זִרְמָה refers to a flowing discharge; in this context it denotes seminal
    emission. 'Emission' preserves the concrete but somewhat euphemistic register
    of the Hebrew, while 'semen' is a possible more explicit alternative.
