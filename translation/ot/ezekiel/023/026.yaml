id: EZK.23.26
reference: Ezekiel 23:26
source:
  edition: WLC
  text: וְ/הִפְשִׁיט֖וּ/ךְ אֶת בְּגָדָ֑יִ/ךְ וְ/לָקְח֖וּ כְּלֵ֥י תִפְאַרְתֵּֽ/ךְ־׃
translation:
  text: They will strip you of your garments and take your beautiful jewelry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "your splendid ornaments" or more literally "the articles of your beauty/splendor."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְשִׁיטוּךְ
  chosen: they will strip you
  alternatives:
  - they will undress you
  - they will strip you bare
  lexicon: HALOT
  rationale: The Hiphil of פשט with 2fs suffix means to strip someone of clothing.
    'Strip you' is direct and natural English; 'strip you bare' slightly overstates
    what is explicit here, since the object 'your garments' follows.
- source_word: בְּגָדָיִךְ
  chosen: your garments
  alternatives:
  - your clothes
  - your clothing
  lexicon: HALOT
  rationale: בגד is the standard term for garments/clothing. 'Garments' preserves
    the slightly elevated register appropriate to prophetic judgment language while
    remaining readable.
- source_word: וְלָקְחוּ
  chosen: and take
  alternatives:
  - and seize
  - and carry off
  lexicon: HALOT
  rationale: לקח is the common verb 'take.' In context it implies removal by force,
    but 'take' is sufficient and avoids adding nuance not explicitly present in the
    verb itself.
- source_word: כְּלֵי
  chosen: jewelry
  alternatives:
  - articles
  - vessels
  - ornaments
  lexicon: HALOT
  rationale: כְּלִי broadly means article, vessel, implement, or item. In the construct
    phrase with תפארת ('beauty/splendor'), the sense is personal adornments or ornaments.
    'Jewelry' communicates the likely referent in idiomatic modern English better
    than the overly broad 'articles' or the less natural 'vessels'.
- source_word: תִפְאַרְתֵּךְ
  chosen: beautiful
  alternatives:
  - splendid
  - glorious
  - of your beauty
  lexicon: HALOT
  rationale: תפארת denotes beauty, splendor, or glory. In construct with כְּלֵי it
    describes adornments associated with the woman's beauty/splendor. Rendering the
    phrase as 'your beautiful jewelry' is smoother English than the more literal 'the
    articles of your splendor' while preserving the sense.
