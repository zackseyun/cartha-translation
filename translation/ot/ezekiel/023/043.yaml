theological_decisions:
- issue: Sexual-infidelity metaphor for covenant unfaithfulness
  chosen_reading: Retain the explicit language of adultery/prostitution rather than
    soften it.
  alternative_readings:
  - Use softened metaphorical language such as 'unfaithfulness'
  rationale: Ezekiel intentionally uses graphic sexual language to portray Judah/Samaria's
    covenantal and political infidelity. Softening the imagery would undertranslate
    the prophetic rhetoric and obscure the theological force of the metaphor.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
