id: EZK.23.43
reference: Ezekiel 23:43
source:
  edition: WLC
  text: וָ/אֹמַ֕ר לַ/בָּלָ֖ה נִֽאוּפִ֑ים עת יזנה תַזְנוּתֶ֖/הָ וָ/הִֽיא׃
translation:
  text: Then I said of her, worn out by adulteries, ‘Now they will commit her prostitution
    with her, and she herself as well.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: the clause after ''worn out by adulteries'' may also
      be understood more literally, ''Now will her prostitution commit prostitution,
      even she,'' or with a singular subject, ''Now he will commit prostitution with
      her.'''
    reason: alternative_reading
  - marker: b
    text: The imagery of adultery/prostitution continues Ezekiel's metaphor for covenantal
      and political unfaithfulness.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר is naturally rendered as a past narrative
    advance. 'Then I said' gives smooth English while preserving sequence.
- source_word: לַבָּלָה
  chosen: of her, worn out
  alternatives:
  - to the worn-out woman
  - concerning the one worn out
  - to decay
  lexicon: HALOT
  rationale: בלה as an adjective/noun conveys being worn out, used up, or consumed.
    In context of sexual corruption, 'worn out' captures the image of one exhausted
    by vice. The prefixed ל is taken as reference ('of/concerning') rather than direct
    address, which fits the clause better in English.
- source_word: נִאֻפִים
  chosen: by adulteries
  alternatives:
  - by adulterous acts
  - with adulteries
  lexicon: HALOT
  rationale: Plural noun from נאף denotes repeated acts of adultery. 'By adulteries'
    preserves the plural and the cumulative sense tied to her worn-out condition.
- source_word: עַת
  chosen: Now
  alternatives:
  - still
  - at this time
  lexicon: HALOT
  rationale: The particle is difficult, but here it most naturally marks the present
    moment or a rhetorical 'now then.' 'Now' is concise and idiomatic.
- source_word: יזנה
  chosen: they will commit
  alternatives:
  - he will commit fornication
  - one will commit prostitution
  lexicon: HALOT
  rationale: The ketiv/qere and syntax are difficult in this verse. Given the surrounding
    context of men going in to the sisters (vv. 44ff), an indefinite/plural sense
    in English best conveys the expected action without overcommitting to a singular
    male subject. 'Commit' is supplied to make the verbal idea explicit in English.
- source_word: תַזְנוּתֶהָ
  chosen: her prostitution
  alternatives:
  - her whoredom
  - her harlotry
  lexicon: HALOT
  rationale: From תזנות, the sense is prostitution/whoredom. 'Her prostitution' is
    strong but readable modern English and avoids archaic 'whoredom' while preserving
    the sexual-moral metaphor.
- source_word: וָהִיא
  chosen: and she herself as well
  alternatives:
  - and she
  - even she
  lexicon: HALOT
  rationale: The pronoun is emphatic. 'She herself as well' preserves the emphasis
    and the shocking inclusion of the woman in the statement.
