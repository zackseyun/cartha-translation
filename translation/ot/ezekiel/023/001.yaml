id: EZK.23.1
reference: Ezekiel 23:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה functions here as standard narrative/sequential
    introduction. In English, rendering the idiom with a simple connective plus the
    main verb ('And ... came') is more natural than the wooden 'it happened' while
    preserving the discourse flow.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: דבר in the prophetic formula regularly denotes a divine word/message.
    'The word' preserves the established prophetic idiom and the construct relationship
    with the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX pattern.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly indicates
    direction toward the prophet. 'To me' is accurate and idiomatic modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: The infinitive construct introduces the following divine speech. 'Saying'
    is the standard concise English equivalent and preserves the expectation of quoted
    speech in the next verse.
