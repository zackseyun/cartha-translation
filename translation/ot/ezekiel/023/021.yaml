theological_decisions:
- issue: Explicit sexual metaphor in prophetic judgment language
  chosen_reading: Retain the explicit imagery ('breasts,' 'lewdness') without euphemistic
    softening.
  alternative_readings:
  - Use softened language such as 'charms' or 'immorality'
  rationale: The verse uses deliberately graphic sexual imagery to portray Jerusalem's
    covenant unfaithfulness. Softening the language would mute the rhetorical force
    of the prophetic indictment and go beyond the source text.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source warrants.'
