id: EZK.23.21
reference: Ezekiel 23:21
source:
  edition: WLC
  text: וַֽ/תִּפְקְדִ֔י אֵ֖ת זִמַּ֣ת נְעוּרָ֑יִ/ךְ בַּ/עְשׂ֤וֹת מִ/מִּצְרַ֨יִם֙ דַּדַּ֔יִ/ךְ
    לְמַ֖עַן שְׁדֵ֥י נְעוּרָֽיִ/ךְ׃ס
translation:
  text: Thus you revisited the lewdness of your youth, when in Egypt they handled
    your breasts, for the breasts of your youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you remembered the lewdness of your youth.' The Hebrew verb can mean
      'visit,' 'attend to,' or 'call to mind'; here it likely includes the sense of
      returning to former behavior.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from Egypt'; the phrase is rendered idiomatically as 'in Egypt'
      because the clause refers to what was done there.
    reason: lexical_alternative
  - marker: c
    text: Or 'fondled your breasts.' The Hebrew expression is sexually explicit and
      refers to erotic handling in Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפְקְדִי
  chosen: you revisited
  alternatives:
  - you remembered
  - you sought again
  - you attended to
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend to, visit, call to mind,
    or seek. In this context of renewed sexual-political infidelity, 'revisited' captures
    both recollection and renewed engagement without over-paraphrasing.
- source_word: זִמַּת
  chosen: lewdness
  alternatives:
  - wickedness
  - lust
  - depravity
  lexicon: HALOT
  rationale: זִמָּה in sexual contexts commonly denotes lewd or sexually depraved
    conduct. 'Lewdness' preserves the sexual-moral force better than the broader 'wickedness'.
- source_word: נְעוּרַיִךְ
  chosen: your youth
  alternatives:
  - your young days
  lexicon: HALOT
  rationale: A standard rendering meaning the period of youth; repeated in the verse
    for emphasis and retained consistently.
- source_word: בַּעֲשׂוֹת
  chosen: when ... handled
  alternatives:
  - in the doing of
  - when ... made
  - when ... fondled
  lexicon: HALOT
  rationale: The infinitive construct of עשה with the following object phrase is idiomatic
    here. A wooden 'in making' is unclear in English. 'When ... handled' expresses
    the action implied by the clause in context while staying close to the sexual
    imagery.
- source_word: מִמִּצְרַיִם
  chosen: in Egypt
  alternatives:
  - from Egypt
  - by the Egyptians
  lexicon: HALOT
  rationale: Although formally the preposition is 'from,' in this idiom the sense
    is locative/agentive with the following clause referring to Egypt as the setting
    and source of the action. 'In Egypt' is the most natural and contextually clear
    rendering; the agent is then supplied by English 'they'.
- source_word: דַּדַּיִךְ
  chosen: your breasts
  alternatives:
  - your bosom
  lexicon: HALOT
  rationale: A concrete anatomical term. 'Breasts' is direct and matches the explicit
    sexual metaphor of the passage.
- source_word: לְמַעַן
  chosen: for
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: Here לְמַעַן introduces purpose/result related to the breasts of youth.
    'For' is concise and preserves the connection without over-specifying.
- source_word: שְׁדֵי נְעוּרַיִךְ
  chosen: the breasts of your youth
  alternatives:
  - your youthful breasts
  lexicon: HALOT
  rationale: Retaining the genitival construction mirrors the Hebrew repetition and
    keeps the poetic force. 'Your youthful breasts' is smoother but slightly less
    formal.
