theological_decisions:
- issue: Prophetic sexual metaphor for idolatry and political infidelity
  chosen_reading: Retain the prostitution language explicitly in English
  alternative_readings:
  - Soften to 'unfaithfulness' or 'immorality'
  rationale: Ezekiel intentionally uses shocking sexualized imagery to portray Jerusalem/Samaria's
    covenantal and political apostasy. Softening the metaphor would undertranslate
    the rhetoric and obscure the prophetic force. The wording remains metaphorical
    without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5, 6
