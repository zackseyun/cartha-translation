id: EZK.23.19
reference: Ezekiel 23:19
source:
  edition: WLC
  text: וַ/תַּרְבֶּ֖ה אֶת תַּזְנוּתֶ֑י/הָ לִ/זְכֹּר֙ אֶת יְמֵ֣י נְעוּרֶ֔י/הָ אֲשֶׁ֥ר
    זָנְתָ֖ה בְּ/אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: Yet she multiplied her prostitutions, remembering the days of her youth, when
    she prostituted herself in the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And she increased her acts of prostitution.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּרְבֶּה
  chosen: Yet she multiplied
  alternatives:
  - And she increased
  - Then she multiplied
  lexicon: HALOT
  rationale: From רבה in the Hiphil/causative sense of making many or increasing.
    'Multiplied' preserves the concrete verbal force better than a looser 'became
    more promiscuous.' 'Yet' captures the adversative/narrative force in context,
    where her conduct continues despite prior judgment language.
- source_word: תַּזְנוּתֶיהָ
  chosen: her prostitutions
  alternatives:
  - her whorings
  - her acts of prostitution
  - her harlotries
  lexicon: HALOT
  rationale: The plural abstract/concrete noun from זנה denotes repeated acts of sexual
    immorality and, in Ezekiel's prophetic metaphor, covenantal unfaithfulness. 'Prostitutions'
    is direct, modern, and preserves the repeated-act sense of the plural without
    archaic tone.
- source_word: לִזְכֹּר
  chosen: remembering
  alternatives:
  - to remember
  - as she remembered
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses attendant circumstance or purpose/result.
    'Remembering' reads naturally in English while preserving the connection between
    her multiplying prostitutions and her recollection of earlier behavior.
- source_word: יְמֵי נְעוּרֶיהָ
  chosen: the days of her youth
  alternatives:
  - her youthful days
  - the days of her girlhood
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the idiom and the temporal
    reference to her early national history. 'Youth' is preferable to 'girlhood' because
    it is less interpretively narrow and more idiomatic in English Bible style.
- source_word: אֲשֶׁר זָנְתָה
  chosen: when she prostituted herself
  alternatives:
  - in which she played the whore
  - when she committed prostitution
  lexicon: HALOT
  rationale: זנה is the key verb in the verse and should be rendered consistently
    with the prostitution metaphor. 'Prostituted herself' makes explicit the reflexive
    sense in English and avoids archaic idiom like 'played the whore.'
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains the Hebrew phrase 'land of Egypt,' which is a common biblical
    geographic expression and carries historical resonance. It is only slightly more
    formal than 'in Egypt' and remains readable.
