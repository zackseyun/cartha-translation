theological_decisions:
- issue: Rendering of covenantal punitive emotion in קִנְאָה
  chosen_reading: my jealousy
  alternative_readings:
  - my zeal
  rationale: The verse depicts judgment on covenantal infidelity using marital imagery.
    'Jealousy' preserves that theological tension and relational context better than
    the more generalized 'zeal.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
