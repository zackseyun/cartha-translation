id: EZK.23.25
reference: Ezekiel 23:25
source:
  edition: WLC
  text: וְ/נָתַתִּ֨י קִנְאָתִ֜/י בָּ֗/ךְ וְ/עָשׂ֤וּ אוֹתָ/ךְ֙ בְּ/חֵמָ֔ה אַפֵּ֤/ךְ
    וְ/אָזְנַ֨יִ/ךְ֙ יָסִ֔ירוּ וְ/אַחֲרִיתֵ֖/ךְ בַּ/חֶ֣רֶב תִּפּ֑וֹל הֵ֗מָּה בָּנַ֤יִ/ךְ
    וּ/בְנוֹתַ֨יִ/ךְ֙ יִקָּ֔חוּ וְ/אַחֲרִיתֵ֖/ךְ תֵּאָכֵ֥ל בָּ/אֵֽשׁ׃
translation:
  text: I will set my jealousy against you, and they will deal with you in wrath.
    They will remove your nose and your ears, and your survivors will fall by the
    sword. They will take your sons and your daughters, and your remnant will be consumed
    by the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cut off your nose and your ears.' The Hebrew verb more literally means
      'remove,' while the context may imply mutilation.
    reason: lexical_alternative
  - marker: b
    text: Or 'your latter end' or 'what remains of you.' Here the Hebrew likely refers
      to those left after the initial devastation, hence 'your survivors' / 'your
      remnant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will set
  alternatives:
  - I will give
  - I will place
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' In this idiom with קִנְאָה and בְּ,
    'set ... against' is natural English and preserves the force of directing jealousy
    toward the addressee.
- source_word: קִנְאָתִי
  chosen: my jealousy
  alternatives:
  - my zeal
  lexicon: HALOT
  rationale: קִנְאָה can denote jealousy or zeal. In this judgment context involving
    punitive passion against unfaithfulness, 'jealousy' best preserves the covenantal
    and relational force.
- source_word: בָּךְ
  chosen: against you
  alternatives:
  - on you
  - in you
  lexicon: HALOT
  rationale: The preposition with the idiom 'set my jealousy' is adversative in sense
    here; 'against you' communicates directed hostility more clearly than a more literal
    but less idiomatic 'in you'.
- source_word: וְעָשׂוּ אֹתָךְ בְּחֵמָה
  chosen: they will deal with you in wrath
  alternatives:
  - they will act toward you in fury
  - they will treat you with rage
  lexicon: HALOT
  rationale: עשה with object plus בְחֵמָה is idiomatic for acting against someone
    in fury. 'Deal with you in wrath' is idiomatic English without over-paraphrasing.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - fury
  - rage
  lexicon: HALOT
  rationale: '''Wrath'' fits prophetic judgment diction and keeps the gravity of divine
    and mediated punishment.'
- source_word: אַפֵּךְ וְאָזְנַיִךְ יָסִירוּ
  chosen: They will remove your nose and your ears
  alternatives:
  - cut off your nose and your ears
  lexicon: HALOT
  rationale: סור in Hiphil means 'remove/take away.' 'Remove' is the more literal
    lexical value; 'cut off' is an interpretive specification of method and is therefore
    preserved as an alternative rather than placed in the main text.
- source_word: וְאַחֲרִיתֵךְ
  chosen: your survivors / your remnant
  alternatives:
  - your latter end
  - what remains of you
  - your posterity
  lexicon: HALOT
  rationale: אַחֲרִית often means 'end' or 'future,' but in this context, especially
    with parallel judgments and the second occurrence followed by destruction by fire,
    it refers to what remains after prior devastation. To make the two occurrences
    readable in English while preserving the sense, the first is rendered 'your survivors'
    and the second 'your remnant.'
- source_word: בַּחֶרֶב תִּפּוֹל
  chosen: will fall by the sword
  alternatives:
  - will fall to the sword
  lexicon: HALOT
  rationale: Standard idiom for death in warfare or execution; preserves the passive/resultative
    sense without adding agents.
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - those men
  - these
  lexicon: HALOT
  rationale: The independent pronoun is emphatic and resumes the hostile agents. English
    normally does not require separate representation beyond an explicit subject pronoun;
    'They' is sufficient.
- source_word: יִקָּחוּ
  chosen: will take
  alternatives:
  - will seize
  - will carry off
  lexicon: HALOT
  rationale: לקח broadly means 'take.' In context of conquest and captivity, 'take'
    is broad enough and avoids over-specifying whether the focus is seizure or deportation.
- source_word: תֵּאָכֵל בָּאֵשׁ
  chosen: will be consumed by the fire
  alternatives:
  - will be devoured by fire
  - will be burned up in the fire
  lexicon: HALOT
  rationale: The Niphal of אכל here is passive, 'be eaten/consumed.' 'Consumed by
    the fire' is idiomatic and preserves the destructive image.
