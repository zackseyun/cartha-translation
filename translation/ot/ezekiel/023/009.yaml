theological_decisions:
- issue: Prophetic sexual metaphor for Samaria/Oholah's foreign alliances
  chosen_reading: Retain the metaphorical language of 'lovers' and 'lusted for' rather
    than softening it into purely political terminology.
  alternative_readings:
  - Translate more interpretively as 'allies' and 'desired'
  rationale: The Hebrew intentionally uses adultery/sexual-desire imagery to portray
    covenant unfaithfulness through foreign entanglements. Preserving that imagery
    maintains the prophetic force without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
