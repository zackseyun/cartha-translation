id: EZK.23.9
reference: Ezekiel 23:9
source:
  edition: WLC
  text: לָ/כֵ֥ן נְתַתִּ֖י/הָ בְּ/יַד מְאַֽהֲבֶ֑י/הָ בְּ/יַד֙ בְּנֵ֣י אַשּׁ֔וּר אֲשֶׁ֥ר
    עָגְבָ֖ה עֲלֵי/הֶֽם־׃
translation:
  text: Therefore I gave her into the hand of her lovers, into the hand of the sons
    of Assyria, for whom she lusted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Assyrians.'' Hebrew: ''the sons of Assyria.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'she doted on them.' The Hebrew verb conveys strong desire; here it carries
      the force of lustful infatuation in Ezekiel's adultery metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding accusation to the
    announced judgment. 'Therefore' preserves the formal inferential force in clear
    modern English.
- source_word: נְתַתִּיהָ
  chosen: I gave her
  alternatives:
  - I handed her over
  - I delivered her
  lexicon: HALOT
  rationale: נתן with object suffix is a common idiom for giving over into another's
    power. 'I gave her' stays close to the Hebrew while allowing the following 'into
    the hand' phrase to carry the sense of transfer of control.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is retained because it is transparent in
    English and preserves the concrete judicial/hostile imagery of being delivered
    into another's power.
- source_word: מְאַהֲבֶיהָ
  chosen: her lovers
  alternatives:
  - those who loved her
  - her paramours
  lexicon: HALOT
  rationale: In Ezekiel's extended adultery metaphor, 'lovers' is the established
    and contextually appropriate rendering, referring metaphorically to illicit political
    partners rather than affectionate companions.
- source_word: בְּנֵי אַשּׁוּר
  chosen: the sons of Assyria
  alternatives:
  - the Assyrians
  - the people of Assyria
  lexicon: HALOT
  rationale: A more formal rendering of בְּנֵי is preserved here as 'sons of Assyria.'
    While 'Assyrians' is idiomatic, the construct phrase is straightforward enough
    in English and keeps the Hebrew texture.
- source_word: אֲשֶׁר
  chosen: for whom
  alternatives:
  - whom
  - with whom
  lexicon: HALOT
  rationale: The relative clause links the Assyrians to the object of her desire.
    Rendering together with עליהם as 'for whom' gives natural English while reflecting
    the directional sense of the Hebrew expression.
- source_word: עָגְבָה עֲלֵיהֶם
  chosen: she lusted for
  alternatives:
  - she doted on
  - she was infatuated with
  - she desired
  lexicon: HALOT
  rationale: עגב in this context denotes strong illicit desire, especially in Ezekiel's
    sexualized metaphor for political unfaithfulness. 'Lusted for' best conveys the
    intensity and moral coloring of the Hebrew more clearly than the traditional but
    weaker 'doted on'.
