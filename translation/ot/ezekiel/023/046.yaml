id: EZK.23.46
reference: Ezekiel 23:46
source:
  edition: WLC
  text: כִּ֛י כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה הַעֲלֵ֤ה עֲלֵי/הֶם֙ קָהָ֔ל וְ/נָתֹ֥ן אֶתְ/הֶ֖ן לְ/זַעֲוָ֥ה וְ/לָ/בַֽז׃
translation:
  text: 'For thus says the Lord GOD: Bring up an assembly against them, and give them over to terror and plunder.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'give them over for horror and for plunder.' The Hebrew noun זַעֲוָה can also be rendered 'horror,' emphasizing that they become an object of dread.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the compound divine title in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; however, in the fixed combination אֲדֹנָי יְהוִה, English translations commonly avoid 'Lord LORD' by using 'Lord GOD,' which preserves reverence and distinguishes the two elements.
- source_word: הַעֲלֵה
  chosen: Bring up
  alternatives:
  - Cause to come up
  - Bring
  lexicon: HALOT
  rationale: Hiphil imperative of עלה here is a command to summon or bring up a hostile force. 'Bring up' preserves the verbal imagery while remaining natural English.
- source_word: קָהָל
  chosen: an assembly
  alternatives:
  - a company
  - a host
  - a crowd
  lexicon: HALOT
  rationale: קָהָל denotes an assembled group. In this judgment context it refers to a gathered attacking body. 'Assembly' is broad enough to preserve the Hebrew term without over-specifying military nuance not explicit in the noun itself.
- source_word: וְנָתֹן
  chosen: and give
  alternatives:
  - and hand over
  - and set
  lexicon: HALOT
  rationale: Qal with imperative force continuing the divine command sequence. 'Give' is retained, with the idiomatic complement 'give them over' in English to express transfer into judgment.
- source_word: לְזַעֲוָה
  chosen: to terror
  alternatives:
  - for horror
  - for trembling
  - for an object of horror
  lexicon: HALOT
  rationale: The noun can denote horror, terror, or a state causing dread. In parallel with plunder and in a judgment context, 'to terror' communicates the result of being delivered over to dreadful devastation. The alternative 'for horror' is viable and worth preserving.
- source_word: לָבַז
  chosen: and plunder
  alternatives:
  - and spoil
  - for plunder
  lexicon: HALOT
  rationale: בז refers to spoil/plunder. Because the preposition ל governs both nouns, English idiom is best expressed as 'to terror and plunder' or 'to be plundered.' 'Plunder' is concise and contemporary.
- source_word: עֲלֵיהֶם / אֶתְהֶן
  chosen: against them ... them
  alternatives:
  - against them ... them (the women)
  lexicon: HALOT
  rationale: The verse shifts from masculine plural in עֲלֵיהֶם to feminine plural object אֶתְהֶן, reflecting the prophetic portrayal of Oholah and Oholibah. English cannot easily preserve this gender shift in the main text without awkwardness, so 'them' is used, with the referent understood from context.
