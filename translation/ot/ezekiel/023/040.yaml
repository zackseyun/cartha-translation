id: EZK.23.40
reference: Ezekiel 23:40
source:
  edition: WLC
  text: וְ/אַ֗ף כִּ֤י תִשְׁלַ֨חְנָה֙ לַֽ/אֲנָשִׁ֔ים בָּאִ֖ים מִ/מֶּרְחָ֑ק אֲשֶׁ֨ר
    מַלְאָ֜ךְ שָׁל֤וּחַ אֲלֵי/הֶם֙ וְ/הִנֵּה בָ֔אוּ לַ/אֲשֶׁ֥ר רָחַ֛צְתְּ כָּחַ֥לְתְּ
    עֵינַ֖יִ/ךְ וְ/עָ֥דִית עֶֽדִי־׃
translation:
  text: And moreover, they sent for men coming from far away, to whom a messenger
    had been sent; and behold, they came—to the one who had washed herself, painted
    her eyes, and adorned herself with jewelry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lined her eyes with kohl.' The Hebrew verb refers to applying dark eye
      cosmetic.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף כִּי
  chosen: And moreover
  alternatives:
  - And furthermore
  - And even
  lexicon: HALOT
  rationale: The combination intensifies and advances the accusation. 'And moreover'
    preserves the additive, emphatic force without sounding overly wooden.
- source_word: תִשְׁלַחְנָה
  chosen: they sent for
  alternatives:
  - you sent
  - they sent
  lexicon: HALOT
  rationale: The form is 3rd feminine plural, matching the two sisters/cities personified
    in the context. 'Sent for' fits the idiom with לַאֲנָשִׁים better than the more
    literal 'sent to men,' conveying invitation/summons.
- source_word: לַאֲנָשִׁים בָּאִים מִמֶּרְחָק
  chosen: for men coming from far away
  alternatives:
  - to men who came from afar
  - for men from a distant place
  lexicon: HALOT
  rationale: Retains the participial sense 'coming' and the spatial phrase 'from far
    away.' 'Men' is gender-accurate to the Hebrew and contextually appropriate.
- source_word: אֲשֶׁר מַלְאָךְ שָׁלוּחַ אֲלֵיהֶם
  chosen: to whom a messenger had been sent
  alternatives:
  - for whom a messenger was sent
  - to whom an envoy had been dispatched
  lexicon: HALOT
  rationale: The clause explains the prior sending action. 'Messenger' is the normal
    rendering of מַלְאָךְ here in a human, not angelic, sense. The passive participle
    is naturally rendered with an English pluperfect/passive sense.
- source_word: וְהִנֵּה בָאוּ
  chosen: and behold, they came
  alternatives:
  - and look, they came
  - and indeed they came
  lexicon: HALOT
  rationale: '''Behold'' preserves the vivid deictic force of וְהִנֵּה in prophetic
    discourse.'
- source_word: לַאֲשֶׁר
  chosen: to the one who
  alternatives:
  - to whom
  - for whom
  lexicon: HALOT
  rationale: This introduces the woman being addressed in the singular feminine. 'To
    the one who' makes the shift from plural actors to singular addressee clear in
    English.
- source_word: רָחַצְתְּ
  chosen: had washed herself
  alternatives:
  - washed
  - bathed
  lexicon: HALOT
  rationale: In context of seduction/adornment, the reflexive sense is implied in
    English though not separately marked in Hebrew. 'Had washed herself' fits the
    preparatory sequence before the visitors' arrival.
- source_word: כָּחַלְתְּ עֵינַיִךְ
  chosen: painted her eyes
  alternatives:
  - lined her eyes with kohl
  - darkened her eyes
  lexicon: HALOT
  rationale: The verb refers specifically to applying eye cosmetic, traditionally
    kohl. 'Painted her eyes' is readable modern English; the more specific cosmetic
    term is worth preserving in a footnote.
- source_word: וְעָדִית עֶדִי
  chosen: and adorned herself with jewelry
  alternatives:
  - and decked herself with ornaments
  - and put on adornment
  lexicon: HALOT
  rationale: The verb-object pairing is idiomatic for putting on ornaments. 'Jewelry'
    is natural modern English and conveys personal adornment in this context.
