theological_decisions:
- issue: Referent of the feminine plural and singular shifts in the verse
  chosen_reading: Render the opening verb as plural ('they sent for') and the grooming
    actions as singular feminine ('the one who had washed herself ...')
  alternative_readings:
  - Flatten the verse into all singulars for smoother English
  - Flatten the verse into all plurals to match the sisters collectively
  rationale: The Hebrew intentionally shifts between the two women/cities collectively
    and the woman addressed individually. Preserving the shift maintains the prophetic
    rhetoric and avoids interpretive smoothing beyond the source text.
  doctrine_reference: 'Translation philosophy #3, #5'
