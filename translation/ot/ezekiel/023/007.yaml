id: EZK.23.7
reference: Ezekiel 23:7
source:
  edition: WLC
  text: וַ/תִּתֵּ֤ן תַּזְנוּתֶ֨י/הָ֙ עֲלֵי/הֶ֔ם מִבְחַ֥ר בְּנֵֽי אַשּׁ֖וּר כֻּלָּ֑/ם
    וּ/בְ/כֹ֧ל אֲשֶׁר עָֽגְבָ֛ה בְּ/כָל גִּלּוּלֵי/הֶ֖ם נִטְמָֽאָה־־־׃
translation:
  text: She lavished her prostitutions on them, all the choicest sons of Assyria;
    and with all those for whom she lusted, with all their idols she defiled herself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the choice men of Assyria' or 'all the best of the Assyrians.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses explicit sexual imagery ('prostitutions,' 'lusted') as a
      prophetic metaphor for political-religious unfaithfulness and idolatry.
    reason: cultural_note
  - marker: c
    text: '''Idols'' translates Ezekiel''s strongly derogatory term for idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  chosen: she lavished
  alternatives:
  - she gave
  - she bestowed
  lexicon: HALOT
  rationale: Literally 'she gave,' but in the idiom with 'her prostitutions' and the
    preposition 'on/upon them,' English needs a more natural verb that still preserves
    the sense of actively offering herself. 'Lavished' conveys deliberate, abundant
    giving without excessive paraphrase.
- source_word: תַּזְנוּתֶיהָ
  chosen: her prostitutions
  alternatives:
  - her whorings
  - her acts of prostitution
  - her harlotries
  lexicon: HALOT
  rationale: The noun from זנה denotes acts of sexual unfaithfulness/prostitution.
    'Prostitutions' is direct, modern, and preserves the metaphorical force used throughout
    Ezekiel for covenantal infidelity. 'Whorings' is vivid but less natural for contemporary
    readers.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  - to them
  lexicon: HALOT
  rationale: The preposition is literally 'upon/on.' In English, with the chosen verb
    'lavished,' 'on them' best reflects the directional force while sounding idiomatic.
- source_word: מִבְחַר בְּנֵי אַשּׁוּר כֻּלָּם
  chosen: all the choicest sons of Assyria
  alternatives:
  - all the choice men of Assyria
  - all the elite sons of Assyria
  - all the best of the Assyrians
  lexicon: HALOT
  rationale: מבחר means 'choice, select, best.' 'Sons of Assyria' is retained rather
    than flattening to 'Assyrians,' since בני is present in the Hebrew and the phrase
    likely refers to Assyrian men in a representative sense. 'Choicest' captures the
    superlative/select nuance.
- source_word: וּבְכֹל אֲשֶׁר עָגְבָה
  chosen: and with all those for whom she lusted
  alternatives:
  - and with everyone she lusted after
  - and with all whom she desired passionately
  lexicon: HALOT
  rationale: עגב conveys lustful desire, often with erotic overtones. 'Lusted' preserves
    the strong sexualized metaphor. The relative phrase is expanded slightly with
    'those for whom' for clear English syntax.
- source_word: בְּכָל גִּלּוּלֵיהֶם
  chosen: with all their idols
  alternatives:
  - by all their idols
  - through all their idols
  - with all their filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's derogatory term for idols. The base meaning
    is clearly 'idols'; the pejorative force is inherent but difficult to reproduce
    without overtranslation. 'With all their idols' best matches the preposition and
    the instrumental/associative sense in context.
- source_word: נִטְמָאָה
  chosen: she defiled herself
  alternatives:
  - she became unclean
  - she was defiled
  lexicon: HALOT
  rationale: 'The Niphal of טמא here is reflexive/resultative in context: through
    idolatrous involvement she became defiled. ''Defiled herself'' makes explicit
    her participation and fits the moral-cultic metaphor of the passage.'
