theological_decisions:
- issue: Sexual metaphor for covenantal and cultic infidelity
  chosen_reading: Retain explicit sexual language ('prostitutions,' 'lusted') while
    allowing the broader prophetic metaphor of idolatry and political-religious unfaithfulness
    to stand implicit.
  alternative_readings:
  - Soften to 'unfaithfulness' or 'infidelity' in the main text
  rationale: Ezekiel intentionally uses shocking sexualized imagery to portray Samaria's
    alliances and idolatry. Softening the language would mute the prophetic rhetoric
    and import interpretation into the translation rather than preserving the text's
    force.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering בני as 'sons' rather than a neutral collective
  chosen_reading: Use 'sons of Assyria' in the main text.
  alternative_readings:
  - men of Assyria
  - Assyrians
  rationale: The Hebrew explicitly uses a masculine kinship term. Per the gender-accurate
    principle, the translation should preserve that form unless context clearly demands
    a generic abstraction. Here the referents are male Assyrians in the metaphorical
    sexual context, so 'sons' is appropriate.
  doctrine_reference: Translation philosophy §4
