theological_decisions:
- issue: Judgment-cup metaphor
  chosen_reading: Retain the metaphor 'her cup' without explicating it as wrath in
    the main text.
  alternative_readings:
  - her cup of judgment
  - the cup of her punishment
  rationale: The immediate literary context makes the cup a symbol of judgment, but
    the Hebrew text itself states only 'her cup.' Preserving the metaphor avoids importing
    explanatory wording not present in the verse while maintaining the prophetic imagery.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; never paraphrase beyond what the source text warrants.'
