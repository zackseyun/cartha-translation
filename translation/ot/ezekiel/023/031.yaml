id: EZK.23.31
reference: Ezekiel 23:31
source:
  edition: WLC
  text: בְּ/דֶ֥רֶךְ אֲחוֹתֵ֖/ךְ הָלָ֑כְתְּ וְ/נָתַתִּ֥י כוֹסָ֖/הּ בְּ/יָדֵֽ/ךְ׃ס
translation:
  text: You have walked in the way of your sister, so I will put her cup into your
    hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the cup allotted to your sister as a figure of judgment.
    reason: cultural_note
lexical_decisions:
- source_word: בְּ/דֶרֶךְ
  chosen: in the way
  alternatives:
  - on the path
  - in the path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes way, road, or course of conduct. In this prophetic
    context it is metaphorical for manner of life or behavior. 'In the way' preserves
    the Hebrew idiom while remaining natural English.
- source_word: אֲחוֹתֵךְ
  chosen: your sister
  lexicon: HALOT
  rationale: Literal kinship term retained. In context the 'sister' is the allegorical
    counterpart city/nation from the surrounding oracle, but the verse itself uses
    the familial metaphor directly, so the translation preserves it.
- source_word: הָלָכְתְּ
  chosen: you have walked
  alternatives:
  - you walked
  - you went
  lexicon: HALOT
  rationale: הלך in the Qal commonly means 'walk/go.' Here it functions idiomatically
    for conduct. 'You have walked' reflects the completed action with present relevance
    and pairs naturally with the ensuing judgment.
- source_word: וְנָתַתִּי
  chosen: so I will put
  alternatives:
  - and I will give
  - therefore I will give
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/place.' With 'cup' and 'into your hand,' English
    idiom favors 'put' over the more wooden 'give.' The conjunction is rendered 'so'
    to make the consequential force clear in English without over-paraphrasing.
- source_word: כוֹסָהּ
  chosen: her cup
  lexicon: HALOT
  rationale: Literal 'her cup' is retained. In prophetic judgment language, the cup
    signifies allotted wrath or judgment; the metaphor is important and should not
    be flattened into an interpretive paraphrase.
- source_word: בְּיָדֵךְ
  chosen: into your hand
  alternatives:
  - in your hand
  lexicon: HALOT
  rationale: Although the preposition is literally 'in,' with נתן plus hand English
    normally says 'into your hand.' This preserves the sense of something being placed
    in the recipient's possession.
