id: EZK.23.23
reference: Ezekiel 23:23
source:
  edition: WLC
  text: בְּנֵ֧י בָבֶ֣ל וְ/כָל כַּשְׂדִּ֗ים פְּק֤וֹד וְ/שׁ֨וֹעַ֙ וְ/ק֔וֹעַ כָּל בְּנֵ֥י
    אַשּׁ֖וּר אוֹתָ֑/ם בַּח֨וּרֵי חֶ֜מֶד פַּח֤וֹת וּ/סְגָנִים֙ כֻּלָּ֔/ם שָֽׁלִשִׁים֙
    וּ/קְרוּאִ֔ים רֹכְבֵ֥י סוּסִ֖ים כֻּלָּֽ/ם־־׃
translation:
  text: the sons of Babylon and all the Chaldeans, Pekod and Shoa and Koa, all the
    sons of Assyria with them—desirable young men, all of them governors and officials,
    officers and men of renown, all of them riding on horses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pekod, Shoa, and Koa are likely names of peoples or regions allied with
      Babylon; some take them instead as descriptive labels such as officials, nobles,
      or warriors.
    reason: alternative_reading
  - marker: b
    text: Or 'distinguished men' or more literally 'called ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי בָבֶל
  chosen: the sons of Babylon
  alternatives:
  - the people of Babylon
  - the Babylonians
  lexicon: HALOT
  rationale: Rendered formally as 'sons of Babylon' to preserve the Hebrew idiom and
    parallelism with 'sons of Assyria,' while still being understandable in English.
- source_word: כַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - Babylonians
  lexicon: HALOT
  rationale: Kept 'Chaldeans' as the conventional ethnic designation distinct from
    'Babylon,' since the text lists related groups in apposition rather than collapsing
    them into one label.
- source_word: פְּקוֹד וְשׁוֹעַ וְקוֹעַ
  chosen: Pekod and Shoa and Koa
  alternatives:
  - officials and nobles and warriors
  lexicon: HALOT
  rationale: Treated as proper names of peoples or districts, following the morphology
    as proper nouns and the list structure of nations/peoples. Because some interpreters
    take them as appellatives or symbolic labels, that alternative is preserved in
    a footnote.
- source_word: כָּל בְּנֵי אַשּׁוּר אֹתָם
  chosen: all the sons of Assyria with them
  alternatives:
  - all the Assyrians with them
  - all the sons of Asshur with them
  lexicon: HALOT
  rationale: Rendered with 'sons of Assyria' to mirror the Hebrew construction and
    maintain the ethnic/genealogical idiom. 'With them' reflects אֹתָם in context
    as accompaniment.
- source_word: בַּחוּרֵי חֶמֶד
  chosen: desirable young men
  alternatives:
  - handsome young men
  - choice young men
  lexicon: HALOT
  rationale: בַּחוּרֵי denotes young men; חֶמֶד conveys desirability or attractiveness.
    'Desirable young men' preserves the erotic and evaluative nuance fitting the chapter's
    imagery.
- source_word: פַּחוֹת
  chosen: governors
  alternatives:
  - provincial governors
  lexicon: HALOT
  rationale: A standard administrative title in imperial contexts; 'governors' is
    clear modern English without over-specifying bureaucracy.
- source_word: סְגָנִים
  chosen: officials
  alternatives:
  - deputies
  - prefects
  lexicon: HALOT
  rationale: An administrative rank paired with פַּחוֹת. 'Officials' is readable modern
    English and broad enough to fit the term's range.
- source_word: שָׁלִשִׁים
  chosen: officers
  alternatives:
  - captains
  - adjutants
  lexicon: HALOT
  rationale: The term can denote elite military officers, historically perhaps 'third
    men' or chariot officers. 'Officers' best conveys rank without importing uncertain
    technical detail.
- source_word: קְרוּאִים
  chosen: men of renown
  alternatives:
  - summoned men
  - called ones
  - distinguished men
  lexicon: HALOT
  rationale: In this honorific list, the passive participle likely denotes those called/invited
    because of status, hence 'men of renown.' A more literal rendering would be less
    clear in English, so the lexical alternative is footnoted.
- source_word: רֹכְבֵי סוּסִים
  chosen: riding on horses
  alternatives:
  - horsemen
  - mounted on horses
  lexicon: HALOT
  rationale: Rendered as a participial phrase to preserve the descriptive flow of
    the Hebrew while remaining natural English.
- source_word: כֻּלָּם ... כֻּלָּם ... כֻּלָּם
  chosen: all of them ... all of them ... all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: Repeated in English to reflect the Hebrew's emphatic repetition and cumulative
    portrayal of the invading force.
