id: EZK.23.36
reference: Ezekiel 23:36
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י בֶּן אָדָ֕ם הֲ/תִשְׁפּ֥וֹט אֶֽת אָהֳלָ֖ה וְ/אֶת אָהֳלִיבָ֑ה וְ/הַגֵּ֣ד לָ/הֶ֔ן אֵ֖ת תוֹעֲבוֹתֵי/הֶֽן־־־׃
translation:
  text: Then Yahweh said to me, “Son of man, will you judge Oholah and Oholibah? Then declare to them their abominations.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence better than a bare 'and.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct and standard rendering of the preposition with first-person singular suffix.
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of humanity
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. 'Son of man' preserves the established idiom and the Hebrew wording more closely than interpretive alternatives.
- source_word: הֲתִשְׁפּוֹט
  chosen: will you judge
  alternatives:
  - would you judge
  - are you going to judge
  lexicon: HALOT
  rationale: The interrogative with imperfect second masculine singular is well represented by 'will you judge,' preserving both the question form and the prophetic commission nuance.
- source_word: אָהֳלָה
  chosen: Oholah
  lexicon: HALOT
  rationale: Proper name is transliterated in keeping with the translation philosophy for personal names.
- source_word: אָהֳלִיבָה
  chosen: Oholibah
  lexicon: HALOT
  rationale: Proper name is transliterated in keeping with the translation philosophy for personal names.
- source_word: וְהַגֵּד
  chosen: Then declare
  alternatives:
  - and declare
  - make known
  lexicon: HALOT
  rationale: The imperative/command sense after the rhetorical question is best conveyed by 'declare.' Adding 'Then' reflects the connective and clarifies the sequence in idiomatic English.
- source_word: לָהֶן
  chosen: to them
  lexicon: HALOT
  rationale: Although grammatically feminine plural, English 'them' naturally refers back to Oholah and Oholibah without awkwardness.
- source_word: תוֹעֲבוֹתֵיהֶן
  chosen: their abominations
  alternatives:
  - their detestable acts
  - their abhorrent deeds
  lexicon: HALOT
  rationale: '''Abominations'' is the standard and weighty rendering for תועבות in prophetic denunciation, preserving the moral and cultic force of the Hebrew.'
