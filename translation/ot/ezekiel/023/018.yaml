id: EZK.23.18
reference: Ezekiel 23:18
source:
  edition: WLC
  text: וַ/תְּגַל֙ תַּזְנוּתֶ֔י/הָ וַ/תְּגַ֖ל אֶת עֶרְוָתָ֑/הּ וַ/תֵּ֤קַע נַפְשִׁ/י֙
    מֵֽ/עָלֶ֔י/הָ כַּ/אֲשֶׁ֛ר נָקְעָ֥ה נַפְשִׁ֖/י מֵ/עַ֥ל אֲחוֹתָֽ/הּ־׃
translation:
  text: She uncovered her prostitutions and uncovered her nakedness; then my soul
    was repulsed by her, just as my soul had been repulsed by her sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'revealed her acts of prostitution' for 'uncovered her prostitutions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my soul was alienated from her'; the Hebrew expresses a strong recoil
      or revulsion.
    reason: lexical_alternative
  - marker: c
    text: The comparison is to her sister Samaria (Oholah) in the surrounding allegory.
    reason: cross_reference
lexical_decisions:
- source_word: וַתְּגַל
  chosen: uncovered
  alternatives:
  - revealed
  - laid bare
  lexicon: HALOT
  rationale: From גלה in the sense of uncovering/revealing. 'Uncovered' preserves
    the concrete metaphor and matches the parallel with 'nakedness' better than the
    more abstract 'revealed'.
- source_word: תַּזְנוּתֶיהָ
  chosen: her prostitutions
  alternatives:
  - her whorings
  - her acts of prostitution
  - her harlotries
  lexicon: HALOT
  rationale: From זְנוּת, denoting acts of sexual immorality/prostitution and, in
    Ezekiel's prophetic metaphor, covenantal unfaithfulness. 'Prostitutions' keeps
    the plural and the shocking force without archaic diction.
- source_word: עֶרְוָתָהּ
  chosen: her nakedness
  alternatives:
  - her genitals
  - her shame
  lexicon: HALOT
  rationale: עֶרְוָה often means nakedness, sometimes with sexual exposure implied.
    'Her nakedness' is the most direct and idiomatic rendering here, preserving the
    sexualized metaphor without over-specifying anatomy in the main text.
- source_word: וַתֵּקַע
  chosen: was repulsed
  alternatives:
  - was alienated
  - was disgusted
  - was estranged
  lexicon: HALOT
  rationale: The verb here expresses a violent emotional recoil or severing of attachment.
    'Was repulsed' captures the visceral rejection better than the flatter 'was alienated'
    and fits the context of divine revulsion.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I
  - myself
  - my being
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes the speaker's inner self/desire. 'My soul' preserves
    the Hebrew idiom and rhetorical intensity; reducing it to 'I' would flatten the
    expression.
- source_word: מֵעָלֶיהָ
  chosen: by her
  alternatives:
  - from her
  - away from her
  lexicon: HALOT
  rationale: Literally 'from upon her,' but in English after 'was repulsed' the idiomatic
    complement is 'by her.' This preserves the sense of recoil occasioned by her.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: Introduces a comparison with the prior rejection of her sister. 'Just
    as' clearly marks the parallel.
- source_word: נָקְעָה
  chosen: had been repulsed
  alternatives:
  - was repulsed
  - had recoiled
  lexicon: HALOT
  rationale: Perfect verb in comparative clause referring back to prior action regarding
    the sister. English past perfect best conveys the prior completed action relative
    to the main clause.
- source_word: אֲחוֹתָהּ
  chosen: her sister
  lexicon: HALOT
  rationale: Straightforward familial term within the allegory of the two sisters
    (Oholah and Oholibah).
