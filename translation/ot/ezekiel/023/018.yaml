theological_decisions:
- issue: Rendering the sexual metaphor for covenant unfaithfulness
  chosen_reading: Retain explicit sexual language ('prostitutions,' 'nakedness') in
    the main text
  alternative_readings:
  - Soften to 'unfaithfulness' or 'shame'
  rationale: Ezekiel intentionally uses graphic sexual imagery to portray idolatry
    and political infidelity. Softening the language would mute the prophetic rhetoric
    and import interpretation into translation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Anthropopathic language for God's response
  chosen_reading: Preserve 'my soul was repulsed'
  alternative_readings:
  - I turned away from her
  - I was alienated from her
  rationale: The Hebrew attributes intense personal revulsion to God in anthropopathic
    terms. Preserving 'my soul' maintains the text's force and theological tension
    rather than smoothing it into less vivid prose.
  doctrine_reference: Translation philosophy §3
