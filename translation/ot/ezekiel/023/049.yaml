id: EZK.23.49
reference: Ezekiel 23:49
source:
  edition: WLC
  text: וְ/נָתְנ֤וּ זִמַּתְ/כֶ֨נָה֙ עֲלֵי/כֶ֔ן וַ/חֲטָאֵ֥י גִלּוּלֵי/כֶ֖ן תִּשֶּׂ֑אינָה
    וִ/ידַעְתֶּ֕ם כִּ֥י אֲנִ֖י אֲדֹנָ֥/י יְהוִֽה׃פ
translation:
  text: They will put your lewdness upon you, and you will bear the sins of your idols;
    then you will know that I am the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִלּוּלִים is a strongly contemptuous term for idols, sometimes rendered
      more vividly as 'filthy idols' or 'dung-idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  chosen: They will put
  alternatives:
  - They will set
  - They will inflict
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally/consecutively here. 'Put' preserves the concrete force of נתן with the
    following עֲלֵיכֶן ('upon you').
- source_word: זִמַּתְכֶנָה
  chosen: your lewdness
  alternatives:
  - your wickedness
  - your obscene conduct
  lexicon: HALOT
  rationale: זִמָּה in Ezekiel 23 is used in a sexual-moral context, so 'lewdness'
    best captures the shameless sexual depravity in view without over-paraphrasing.
- source_word: עֲלֵיכֶן
  chosen: upon you
  alternatives:
  - on you
  - against you
  lexicon: HALOT
  rationale: The preposition עַל with 2fp suffix is retained with the idiomatic English
    'upon you,' matching the judicial sense that the punishment/consequence is placed
    on them.
- source_word: וַחֲטָאֵי
  chosen: and ... the sins of
  alternatives:
  - and ... the offenses of
  - and ... the guilt of
  lexicon: HALOT
  rationale: חטאים normally means 'sins.' 'Guilt' is possible in some contexts, but
    here the object borne is best rendered as the sins associated with idolatry.
- source_word: גִלּוּלֵיכֶן
  chosen: your idols
  alternatives:
  - your dung-idols
  - your filthy idols
  lexicon: HALOT
  rationale: גִלּוּלִים is Ezekiel's common derogatory term for idols. 'Idols' is
    the clearest main-text rendering; the pejorative nuance can be preserved in a
    footnote.
- source_word: תִּשֶּׂאינָה
  chosen: you will bear
  alternatives:
  - you will carry
  - you will suffer
  lexicon: HALOT
  rationale: נשא in this construction commonly means to bear or carry guilt/sin. 'Bear'
    preserves the judicial and covenantal weight better than the more interpretive
    'suffer.'
- source_word: וִידַעְתֶּם
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction links consequence/result after judgment. 'Then' makes
    the sequence natural in English while preserving the prophetic formula.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the project's doctrine, יְהוָה is rendered 'the LORD.' In the
    compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD';
    'the Lord GOD' communicates the title naturally while preserving reverence tradition.
