theological_decisions:
- issue: Rendering the divine name in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In this fixed Hebrew title, English convention uses 'the Lord GOD' to avoid the
    awkward repetition 'Lord LORD' while still signaling the divine name behind the
    second element.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
