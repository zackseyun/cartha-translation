id: EZK.23.5
reference: Ezekiel 23:5
source:
  edition: WLC
  text: וַ/תִּ֥זֶן אָהֳלָ֖ה תַּחְתָּ֑/י וַ/תַּעְגַּב֙ עַֽל מְאַהֲבֶ֔י/הָ אֶל אַשּׁ֖וּר
    קְרוֹבִֽים־־׃
translation:
  text: Oholah played the prostitute while under me, and she lusted after her lovers,
    after the Assyrians, who were nearby.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under me.' The phrase evokes Oholah's status under the LORD in the marriage
      metaphor.
    reason: lexical_alternative
  - marker: b
    text: Or 'doted on' or 'was infatuated with.' The Hebrew verb expresses strong
      lustful desire.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Assyrians, nearby ones' / 'the Assyrians, who were near.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּזֶן
  chosen: played the prostitute
  alternatives:
  - whored
  - committed prostitution
  - was unfaithful
  lexicon: HALOT
  rationale: זנה in prophetic metaphor commonly denotes sexual immorality/adultery
    as an image of covenant unfaithfulness. 'Played the prostitute' is idiomatic modern
    English that preserves the sexual metaphor without archaic 'whored.'
- source_word: אָהֳלָה
  chosen: Oholah
  rationale: Proper name is transliterated per translation philosophy rather than
    translated.
- source_word: תַּחְתַּי
  chosen: while under me
  alternatives:
  - under me
  - while belonging to me
  lexicon: HALOT
  rationale: תחת with 1cs suffix here indicates being under Yahweh's authority/protection
    in the marriage metaphor. 'While under me' preserves the metaphor and temporal-covenantal
    sense better than a flatter possessive paraphrase.
- source_word: וַתַּעְגַּב
  chosen: lusted after
  alternatives:
  - doted on
  - was infatuated with
  - desired passionately
  lexicon: HALOT
  rationale: עגב conveys strong lustful desire, especially in Ezekiel's sexualized
    metaphor. 'Lusted after' best reflects the intensity and negative moral coloring.
- source_word: מְאַהֲבֶיהָ
  chosen: her lovers
  alternatives:
  - those who loved her
  lexicon: HALOT
  rationale: In this context the participial form functions substantivally for illicit
    partners/allies in the adultery metaphor; 'her lovers' is the natural English
    equivalent.
- source_word: אֶל אַשּׁוּר
  chosen: after the Assyrians
  alternatives:
  - toward Assyria
  - to Assyria
  lexicon: HALOT
  rationale: Though the preposition is אֶל ('to/toward'), after a verb of lusting
    in English 'after' is idiomatic and preserves the directional sense toward Assyria/Assyrians.
    The ethnic plural 'the Assyrians' is contextually implied by the following plural
    adjective.
- source_word: קְרוֹבִים
  chosen: who were nearby
  alternatives:
  - neighbors
  - near ones
  - close at hand
  lexicon: HALOT
  rationale: The masculine plural adjective likely describes the Assyrians as geographically
    near. 'Who were nearby' is clear modern English and avoids overinterpreting as
    'neighbors,' which can sound more relational than spatial.
