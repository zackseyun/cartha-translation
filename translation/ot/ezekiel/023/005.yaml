theological_decisions:
- issue: Prophetic marriage/adultery metaphor for Samaria's covenant infidelity and
    foreign alliances
  chosen_reading: Retain the sexual metaphor explicitly ('played the prostitute,'
    'lusted after her lovers') rather than soften it into merely political alliance
    language.
  alternative_readings:
  - was unfaithful
  - desired foreign allies
  rationale: Ezekiel intentionally uses shocking sexual imagery to portray idolatry
    and political dependence. Preserving that metaphor maintains the force of the
    Hebrew and avoids importing a reduction to purely diplomatic categories.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
