id: EZK.23.28
reference: Ezekiel 23:28
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִי֙ נֹֽתְנָ֔/ךְ בְּ/יַ֖ד אֲשֶׁ֣ר
    שָׂנֵ֑את בְּ/יַ֛ד אֲשֶׁר נָקְעָ֥ה נַפְשֵׁ֖/ךְ מֵ/הֶֽם־׃
translation:
  text: 'For thus says the Lord GOD: Behold, I am giving you into the hand of those
    whom you hate, into the hand of those from whom your soul has turned away.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those whom your soul loathes,' or 'those from whom your soul has been
      torn away.' The Hebrew expression is vivid and can denote deep estrangement
      or revulsion.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with YHWH. Following the doctrine
    default, יְהוָה is rendered 'the LORD'; in this fixed Ezekiel formula, standard
    English convention is 'the Lord GOD' to reflect the qere-based reading without
    awkward repetition ('Lord LORD').
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Deictic particle marking solemn divine announcement. 'Behold' preserves
    the prophetic register and gravity better than more colloquial options.
- source_word: נֹתְנָךְ
  chosen: I am giving you
  alternatives:
  - I will give you
  - I am handing you over
  lexicon: HALOT
  rationale: The participial form with הִנְנִי conveys imminent action. 'I am giving
    you' preserves the Hebrew aspect and avoids over-interpreting with the more idiomatic
    but slightly stronger 'handing you over.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This is a common idiom for delivery into another's control. 'Into the
    hand of' keeps the metaphor visible while remaining understandable in English.
- source_word: אֲשֶׁר שָׂנֵאת
  chosen: those whom you hate
  alternatives:
  - the ones you hated
  lexicon: HALOT
  rationale: Second feminine singular perfect in context addresses Oholibah/Jerusalem
    directly. Present English 'whom you hate' best conveys the relational force in
    this judgment oracle.
- source_word: נָקְעָה נַפְשֵׁךְ מֵהֶם
  chosen: those from whom your soul has turned away
  alternatives:
  - those from whom you have become alienated
  - those whom you loathe
  - those from whom your desire has been torn away
  lexicon: HALOT
  rationale: The verb נקע here conveys being estranged, torn loose, or turned away
    in disgust. Retaining 'your soul' reflects נֶפֶשׁ and preserves the visceral,
    personal dimension of the Hebrew rather than flattening it to mere emotion.
