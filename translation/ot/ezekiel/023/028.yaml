theological_decisions:
- issue: Rendering the divine name in the Ezekiel formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default for יְהוָה is 'the LORD.' In the compound title
    with אֲדֹנָי, English convention 'the Lord GOD' best represents the reverential
    substitution pattern and avoids the confusing 'Lord LORD.' This is a translation-form
    decision, not a doctrinal reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
