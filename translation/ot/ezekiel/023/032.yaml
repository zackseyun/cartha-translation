id: EZK.23.32
reference: Ezekiel 23:32
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהֹוִ֔ה כּ֤וֹס אֲחוֹתֵ/ךְ֙ תִּשְׁתִּ֔י הָ/עֲמֻקָּ֖ה וְ/הָ/רְחָבָ֑ה תִּהְיֶ֥ה לִ/צְחֹ֛ק וּ/לְ/לַ֖עַג מִרְבָּ֥ה לְ/הָכִֽיל׃
translation:
  text: 'Thus says the Lord GOD: You will drink your sister’s cup, deep and wide; it will be for laughter and for mockery, for it holds much.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'deep and broad.'
    reason: lexical_alternative
  - marker: b
    text: The 'cup' is a prophetic image for an allotted portion of judgment.
    reason: cross_reference
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - Lord YHWH
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered with the standard English convention 'the Lord GOD' for אֲדֹנָי יְהוִה. This preserves the distinction between the title אֲדֹנָי ('Lord') and the divine name יְהוָה, which per doctrine is rendered 'the LORD'; in this compound, conventional English capitalization 'GOD' avoids 'Lord LORD' while signaling the divine name.
- source_word: כּוֹס אֲחוֹתֵךְ
  chosen: your sister’s cup
  alternatives:
  - the cup of your sister
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Cup' is retained literally because in prophetic literature it carries the metaphor of allotted judgment; no paraphrase is needed.
- source_word: תִּשְׁתִּי
  chosen: you will drink
  alternatives:
  - you shall drink
  lexicon: HALOT
  rationale: Imperfect 2fs rendered as future in context of prophetic declaration. 'Will' is natural modern English while preserving the force of inevitability.
- source_word: הָעֲמֻקָּה וְהָרְחָבָה
  chosen: deep and wide
  alternatives:
  - deep and broad
  lexicon: HALOT
  rationale: Both adjectives modify 'cup.' 'Wide' is more idiomatic in modern English than 'broad' for a vessel, while still conveying large capacity.
- source_word: תִּהְיֶה לִצְחֹק וּלְלַעַג
  chosen: it will become a laughingstock and a mockery
  alternatives:
  - it will be for laughter and for derision
  - it will be for ridicule and mockery
  lexicon: HALOT
  rationale: The feminine verb refers back to 'cup.' The Hebrew idiom 'be for laughter and mockery' is rendered idiomatically as resulting in public scorn. 'Laughingstock' captures לִצְחֹק well in context, and 'mockery' captures לַעַג.
- source_word: מִרְבָּה לְהָכִיל
  chosen: for it holds much
  alternatives:
  - it contains much
  - it is abundant to contain
  - holding much
  lexicon: HALOT
  rationale: 'This clause explains why the cup becomes an object of scorn: it is exceptionally large in capacity. The infinitive לְהָכִיל conveys containing/holding. ''For it holds much'' is concise, natural, and preserves the causal sense.'
