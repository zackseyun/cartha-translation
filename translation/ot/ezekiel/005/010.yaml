theological_decisions:
- issue: Rendering of שְׁאֵרִית in a judgment context
  chosen_reading: remnant
  alternative_readings:
  - survivors
  - what remains
  rationale: Although 'remnant' can carry positive restoration overtones elsewhere,
    here the immediate context is punitive scattering. Retaining 'remnant' preserves
    the Hebrew term's broader biblical resonance without importing hope the verse
    itself does not state; the context makes clear this remnant is subject to judgment.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
