id: EZK.5.10
reference: Ezekiel 5:10
source:
  edition: WLC
  text: לָ/כֵ֗ן אָב֞וֹת יֹאכְל֤וּ בָנִים֙ בְּ/תוֹכֵ֔/ךְ וּ/בָנִ֖ים יֹאכְל֣וּ אֲבוֹתָ֑/ם
    וְ/עָשִׂ֤יתִי בָ/ךְ֙ שְׁפָטִ֔ים וְ/זֵרִיתִ֥י אֶת כָּל שְׁאֵרִיתֵ֖/ךְ לְ/כָל רֽוּחַ־־־׃פ
translation:
  text: Therefore fathers will eat sons in your midst, and sons will eat their fathers;
    and I will execute judgments on you and scatter all your remnant to every wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all your survivors' or 'all that remains of you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to every wind,' an idiom meaning total dispersal in all directions.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential conclusion from the preceding indictment and judgment
    announcement; 'Therefore' preserves the formal inferential force in natural English.
- source_word: אָבוֹת
  chosen: fathers
  alternatives:
  - parents
  lexicon: HALOT
  rationale: The Hebrew specifically names male parents, not a gender-neutral category.
    'Fathers' preserves the shocking reversal of family bonds.
- source_word: יֹאכְלוּ ... בָנִים
  chosen: will eat sons
  alternatives:
  - will devour sons
  - will eat children
  lexicon: HALOT
  rationale: The verb אכל is the ordinary verb 'eat'; in this famine/judgment context
    it denotes cannibalism. 'Sons' matches בנים and keeps the gender-accurate familial
    language of the Hebrew.
- source_word: בְּתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  - inside you
  lexicon: HALOT
  rationale: An idiomatic expression for what happens within the city/community addressed
    as feminine singular. 'In your midst' is the standard natural rendering.
- source_word: וּבָנִים יֹאכְלוּ אֲבוֹתָם
  chosen: and sons will eat their fathers
  alternatives:
  - and children will eat their fathers
  lexicon: HALOT
  rationale: Preserves the reciprocal horror and the specific kinship terms of the
    Hebrew.
- source_word: וְעָשִׂיתִי בָךְ שְׁפָטִים
  chosen: and I will execute judgments on you
  alternatives:
  - and I will carry out judgments against you
  - and I will inflict punishments on you
  lexicon: HALOT
  rationale: The idiom עשה + שפטים means to carry out judicial acts. 'Execute judgments
    on you' preserves both the legal/judicial tone and the force of divine punishment.
- source_word: שְׁפָטִים
  chosen: judgments
  alternatives:
  - acts of judgment
  - punishments
  lexicon: HALOT
  rationale: Keeps the judicial nuance central to Ezekiel's prophetic rhetoric; 'punishments'
    is interpretive and narrower.
- source_word: וְזֵרִיתִי
  chosen: and scatter
  alternatives:
  - and disperse
  - and winnow away
  lexicon: HALOT
  rationale: The verb זרה commonly conveys scattering/dispersing. 'Scatter' is clear,
    direct, and fits exile imagery.
- source_word: כָּל שְׁאֵרִיתֵךְ
  chosen: all your remnant
  alternatives:
  - all that remains of you
  - all your survivors
  lexicon: HALOT
  rationale: שְׁאֵרִית often means 'remnant,' especially those left after judgment.
    Here it refers to those remaining in Jerusalem after devastation. 'Remnant' preserves
    the lexical and theological resonance, though in this context it is a remnant
    for further scattering.
- source_word: לְכָל רוּחַ
  chosen: to every wind
  alternatives:
  - to all the winds
  - in every direction
  lexicon: HALOT
  rationale: A Hebrew idiom for total dispersal in all directions. 'To every wind'
    is concise and preserves the metaphor better than the flattened 'in every direction'.
