theological_decisions:
- issue: Nature of the judgment language
  chosen_reading: Retain the absolute, unprecedented language without softening or
    qualifying it.
  alternative_readings:
  - Paraphrase as merely 'very severe judgment'
  rationale: The verse emphasizes that YHWH's judgment on Jerusalem is without precedent
    and without future parallel. The translation preserves that rhetorical and theological
    force rather than reducing it to a general statement of severity.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of divine action with בָךְ
  chosen_reading: Translate literally as 'in you' rather than interpretively as 'against
    you.'
  alternative_readings:
  - against you
  - to you
  rationale: The Hebrew preposition does not require the more interpretive 'against
    you.' Preserving 'in you' maintains source-language primacy and leaves the imagery
    of judgment enacted within the city intact.
  doctrine_reference: Translation philosophy §§1, 5
