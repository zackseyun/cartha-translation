id: EZK.5.9
reference: Ezekiel 5:9
source:
  edition: WLC
  text: וְ/עָשִׂ֣יתִי בָ֗/ךְ אֵ֚ת אֲשֶׁ֣ר לֹֽא עָשִׂ֔יתִי וְ/אֵ֛ת אֲשֶֽׁר לֹֽא אֶעֱשֶׂ֥ה
    כָמֹ֖/הוּ ע֑וֹד יַ֖עַן כָּל תּוֹעֲבֹתָֽיִ/ךְ־־־־׃ס
translation:
  text: And I will do in you what I have never done, and the like of which I will
    never do again, because of all your abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'against you' or 'to you' for 'in you.' The Hebrew preposition is literally
      'in,' but some translations render it more interpretively in this judgment context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  chosen: And I will do
  alternatives:
  - And I will act
  - And I will execute
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). Here, with God as subject and Jerusalem
    as object, 'do' preserves the stark, judicial force without over-specifying the
    action beyond the Hebrew.
- source_word: בָךְ
  chosen: in you
  alternatives:
  - against you
  - to you
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' or 'with.' In judgment contexts
    English often smooths to 'against you' or 'to you,' but 'in you' best reflects
    the Hebrew wording and the sense that the judgment is carried out within Jerusalem.
- source_word: אֵת אֲשֶׁר לֹא עָשִׂיתִי
  chosen: what I have never done
  alternatives:
  - that which I have not done
  - what I have not done
  lexicon: HALOT
  rationale: English idiom favors 'what I have never done' to express the Hebrew relative
    clause naturally. The perfect verb points to prior action denied up to this point.
- source_word: וְאֵת אֲשֶׁר לֹא אֶעֱשֶׂה
  chosen: and the like of which I will never do again
  alternatives:
  - and what I will not do again
  - and such as I will never do again
  lexicon: HALOT
  rationale: Taken together with כָמֹהוּ עוֹד, the clause means not merely 'I will
    not do [it] again' but 'I will never again do anything like it.' The chosen rendering
    brings that comparative force into clear English.
- source_word: כָמֹהוּ
  chosen: the like of which
  alternatives:
  - like it
  - its like
  lexicon: HALOT
  rationale: The comparative phrase is central to the verse's emphasis on unprecedented
    judgment. 'The like of which' is slightly elevated but clear and preserves the
    force better than a flatter 'like it' in this construction.
- source_word: עוֹד
  chosen: again
  alternatives:
  - any longer
  - any more
  lexicon: HALOT
  rationale: In this context עוֹד marks future repetition, so 'again' is the most
    natural English equivalent.
- source_word: יַעַן
  chosen: because of
  alternatives:
  - because
  - on account of
  lexicon: HALOT
  rationale: יַעַן introduces the reason for the announced judgment. 'Because of'
    fits smoothly with the following noun phrase.
- source_word: כָל תּוֹעֲבֹתָיִךְ
  chosen: all your abominations
  alternatives:
  - all your detestable things
  - all your abhorrent practices
  lexicon: HALOT
  rationale: תּוֹעֵבָה regularly denotes something abhorrent, especially idolatrous
    or morally repulsive acts. 'Abominations' preserves the prophetic and theological
    weight of the term.
