theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of divine judgment in אֶגְרַע
  chosen_reading: I also will withdraw
  alternative_readings:
  - I also will cut you down
  - I also will diminish you
  rationale: The Hebrew verb can suggest diminishing, cutting off, or withdrawing. Because the object is implicit and the immediate context emphasizes removal of pity and protective favor, 'withdraw' best preserves the terseness without importing a specific object. An alternative is preserved in a footnote due to the lexical uncertainty.
