id: EZK.5.11
reference: Ezekiel 5:11
source:
  edition: WLC
  text: לָ/כֵ֣ן חַי אָ֗נִי נְאֻם֮ אֲדֹנָ֣/י יְהוִה֒ אִם לֹ֗א יַ֚עַן אֶת מִקְדָּשִׁ֣/י טִמֵּ֔את בְּ/כָל שִׁקּוּצַ֖יִ/ךְ וּ/בְ/כָל תּוֹעֲבֹתָ֑יִ/ךְ וְ/גַם אֲנִ֤י אֶגְרַע֙ וְ/לֹא תָח֣וֹס עֵינִ֔/י וְ/גַם אֲנִ֖י לֹ֥א אֶחְמֽוֹל־־־־־־־־׃
translation:
  text: Therefore, as I live, declares the Lord GOD, surely because you have defiled my sanctuary with all your detestable things and with all your abominations, I also will diminish you; my eye will not spare, and I also will show no pity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I also will diminish/cut down.' The Hebrew verb is terse and its object is left implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the judgment announced from the preceding context.
- source_word: חַי אָ֗נִי
  chosen: as I live
  alternatives:
  - by my life
  - I live
  lexicon: HALOT
  rationale: This is the conventional divine oath formula. 'As I live' preserves the solemn self-oath idiom in natural English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: '''נְאֻם'' is a prophetic declaration formula best rendered ''declares.'' For יְהוָה the doctrine default is ''the LORD''; because אֲדֹנָי precedes, ''Lord GOD'' is the standard English representation that avoids ''Lord LORD'' while preserving both titles.'
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration rather than a literal conditional, so 'surely' best conveys the force in English.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of the fact that
  lexicon: HALOT
  rationale: Causal conjunction introducing the grounds for judgment.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple
  lexicon: HALOT
  rationale: '''Sanctuary'' best matches the cultic sense of the holy place without narrowing too specifically to the building as a whole.'
- source_word: טִמֵּאת
  chosen: have defiled
  alternatives:
  - have made unclean
  - have polluted
  lexicon: HALOT
  rationale: The verb denotes rendering something ritually/morally unclean. 'Defiled' is idiomatic and weighty in this temple context.
- source_word: שִׁקּוּצַיִךְ
  chosen: your detestable things
  alternatives:
  - your vile images
  - your abominations
  lexicon: HALOT
  rationale: The noun often refers to detestable idols or objects. 'Detestable things' preserves the broad lexical sense here, especially since תּוֹעֲבוֹתַיִךְ follows and is better rendered 'abominations' to avoid flattening the pair into identical English.
- source_word: תּוֹעֲבוֹתַיִךְ
  chosen: your abominations
  alternatives:
  - your detestable acts
  - your abhorrent practices
  lexicon: HALOT
  rationale: A strong term for abhorrent religious/moral offenses. 'Abominations' preserves the established biblical register and distinguishes it from the preceding noun.
- source_word: אֶגְרַע
  chosen: will withdraw
  alternatives:
  - will cut down
  - will diminish
  - will shave away
  lexicon: HALOT
  rationale: The verb literally means 'diminish/withdraw.' In this judgment context, with the object left implicit, 'will withdraw' conveys God's removal of favor/protection without over-specifying. A more literal alternative is preserved in a footnote because the exact nuance is debated.
- source_word: לֹא תָחוֹס עֵינִי
  chosen: my eye will not spare
  alternatives:
  - my eye will not look with pity
  - I will not spare
  lexicon: HALOT
  rationale: This idiom is common in judgment texts. Preserving 'my eye' retains the Hebrew imagery while remaining clear in English.
- source_word: לֹא אֶחְמוֹל
  chosen: I also will show no pity
  alternatives:
  - I will not have compassion
  - I will not relent
  lexicon: HALOT
  rationale: The verb denotes compassion or pity. 'Show no pity' fits the parallelism with 'my eye will not spare' while avoiding redundant repetition of 'spare'.
