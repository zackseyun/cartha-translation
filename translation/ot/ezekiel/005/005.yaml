id: EZK.5.5
reference: Ezekiel 5:5
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהֹוִ֔ה זֹ֚את יְר֣וּשָׁלִַ֔ם בְּ/ת֥וֹךְ הַ/גּוֹיִ֖ם שַׂמְתִּ֑י/הָ וּ/סְבִיבוֹתֶ֖י/הָ אֲרָצֽוֹת׃
translation:
  text: 'Thus says the Lord GOD: This is Jerusalem. I have set her in the midst of the nations, with lands all around her.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Lord YHWH'' (traditionally represented in English as ''the Lord GOD'' to avoid ''Lord LORD'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is how
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the formal prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Though morphologically perfect, in the formula כֹּה אָמַר it is idiomatically rendered as present in English prophetic speech: ''Thus says''.'
- source_word: אֲדֹנָי יְהֹוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי is rendered 'Lord' and יְהֹוִה follows the project's default as 'the LORD.' In the combined title אֲדֹנָי יְהֹוִה, standard English convention avoids 'Lord LORD'; 'the Lord GOD' best preserves the distinction and sense while remaining readable. This aligns with the doctrine's default treatment of YHWH as 'the LORD,' adapted here for the compound title.
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  - Here is
  lexicon: HALOT
  rationale: The demonstrative introduces and identifies Jerusalem emphatically. 'This is Jerusalem' is idiomatic and preserves the deictic force.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - in the middle of
  - among
  lexicon: HALOT
  rationale: Conveys central placement more strongly than simple 'among,' fitting the imagery of Jerusalem set centrally among the nations.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In prophetic literature גוים commonly refers to the surrounding peoples/nations. 'Nations' is the most contextually appropriate and standard rendering here.
- source_word: שַׂמְתִּיהָ
  chosen: I have set her
  alternatives:
  - I set her
  - I placed her
  lexicon: HALOT
  rationale: The verb means 'set/place.' Present perfect English ('I have set') fits divine declaration of an established state. The feminine suffix refers to Jerusalem, naturally rendered 'her' for the city.
- source_word: וּסְבִיבוֹתֶיהָ
  chosen: with lands around her
  alternatives:
  - and around her are lands
  - and countries around her
  lexicon: HALOT
  rationale: 'The conjunction plus noun ''surroundings/regions around her'' is rendered smoothly in English with the following noun: ''with lands around her.'' This preserves the sense that other lands encircle Jerusalem.'
- source_word: אֲרָצוֹת
  chosen: lands
  alternatives:
  - countries
  - earths
  - territories
  lexicon: HALOT
  rationale: Plural of 'land/earth'; here 'lands' fits the geopolitical context of surrounding regions better than the more modern-political 'countries.'
