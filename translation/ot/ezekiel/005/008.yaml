id: EZK.5.8
reference: Ezekiel 5:8
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֥י עָלַ֖יִ/ךְ גַּם אָ֑נִי וְ/עָשִׂ֧יתִי בְ/תוֹכֵ֛/ךְ מִשְׁפָּטִ֖ים לְ/עֵינֵ֥י הַ/גּוֹיִֽם־׃
translation:
  text: 'Therefore thus says the Lord GOD: Behold, I myself am against you, and I will execute judgments in your midst before the eyes of the nations.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Lord YHWH'' (traditionally rendered ''the Lord GOD'' to avoid ''Lord LORD'').'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding indictment; 'Therefore' is natural and sufficiently formal.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: Prophetic messenger formula is conventionally and accurately rendered 'thus says' in present-tense English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי is rendered 'Lord' and יְהוָה follows the project's default as 'the LORD.' In the compound title אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD' while still signaling the divine name. This preserves meaning and aligns with the doctrine's default for YHWH.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: Deictic particle marking solemn divine announcement. 'Behold' preserves the prophetic gravity better than the more colloquial 'Look' or 'See.'
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  - against you
  lexicon: HALOT
  rationale: With הִנְנִי in a judgment context, the idiom means hostile opposition rather than mere spatial relation; 'against you' best conveys the force.
- source_word: גַּם אֲנִי
  chosen: I myself
  alternatives:
  - I also
  - even I
  - I myself
  lexicon: HALOT
  rationale: The combination adds emphasis. 'I myself' communicates the emphatic divine involvement more idiomatically than the wooden 'even I,' while retaining the stress.
- source_word: וְעָשִׂיתִי ... מִשְׁפָּטִים
  chosen: I will execute judgments
  alternatives:
  - I will do judgments
  - I will carry out judgments
  - I will execute acts of judgment
  lexicon: HALOT
  rationale: The Hebrew literally says 'do judgments,' but in English the idiomatic equivalent in judicial context is 'execute judgments.' Plural 'judgments' reflects the Hebrew plural and the concrete acts of punishment in context.
- source_word: בְּתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  - in the middle of you
  - among you
  lexicon: HALOT
  rationale: Addressed to Jerusalem as a feminine singular entity; 'in your midst' is the most natural English rendering for judgment occurring within the city.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This phrase emphasizes public visibility. 'Before the eyes of' is slightly more vivid and formally close to the Hebrew.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the surrounding nations. 'The nations' is the standard and least misleading rendering; 'Gentiles' would import later Jewish/Christian usage.
