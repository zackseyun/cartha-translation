theological_decisions:
- issue: Speaker shift in the final clause
  chosen_reading: 'Retain the first-person divine speech: ''I will draw out a sword
    after them.'''
  alternative_readings:
  - Flatten the clause into impersonal judgment language
  rationale: 'The Hebrew verb אָרִיק is first person singular, marking a deliberate
    shift from commands to Ezekiel into direct divine action. Preserving this shift
    is important to the theology of the sign-act: the coming sword is ultimately the
    LORD''s judgment, not merely human warfare.'
