id: EZK.5.2
reference: Ezekiel 5:2
source:
  edition: WLC
  text: שְׁלִשִׁ֗ית בָּ/א֤וּר תַּבְעִיר֙ בְּ/ת֣וֹךְ הָ/עִ֔יר כִּ/מְלֹ֖את יְמֵ֣י הַ/מָּצ֑וֹר
    וְ/לָֽקַחְתָּ֣ אֶת הַ/שְּׁלִשִׁ֗ית תַּכֶּ֤ה בַ/חֶ֨רֶב֙ סְבִ֣יבוֹתֶ֔י/הָ וְ/הַ/שְּׁלִשִׁית֙
    תִּזְרֶ֣ה לָ/ר֔וּחַ וְ/חֶ֖רֶב אָרִ֥יק אַחֲרֵי/הֶֽם־׃
translation:
  text: A third you shall burn in the fire in the midst of the city, when the days
    of the siege are completed; and you shall take a third and strike it with the
    sword all around it, and a third you shall scatter to the wind, and I will draw
    out a sword after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the days of the siege have been fulfilled.'
    reason: lexical_alternative
  - marker: b
    text: Or 'scatter to the winds'; Hebrew has singular 'wind.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I will unsheathe a sword after them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלִשִׁית / הַשְּׁלִשִׁית
  chosen: a third
  alternatives:
  - one third
  - a third part
  lexicon: HALOT
  rationale: The feminine singular ordinal/noun is used substantivally for one portion
    of the divided hair. 'A third' is idiomatic modern English and preserves the repeated
    tripartite structure.
- source_word: בָּאוּר
  chosen: in the fire
  alternatives:
  - with fire
  - in fire
  lexicon: HALOT
  rationale: The preposition ב plus 'fire' is best rendered locatively/instrumentally
    here. 'In the fire' fits the action 'burn' naturally in English and reflects the
    Hebrew construction.
- source_word: תַּבְעִיר
  chosen: you shall burn
  alternatives:
  - you shall set on fire
  - you shall consume by fire
  lexicon: HALOT
  rationale: Hiphil of בער here denotes causing to burn. 'You shall burn' is concise
    and natural while preserving the imperative-prophetic force.
- source_word: בְּתוֹךְ הָעִיר
  chosen: in the midst of the city
  alternatives:
  - inside the city
  - within the city
  lexicon: HALOT
  rationale: '''In the midst of'' preserves the vivid spatial imagery of the sign-act
    more closely than the flatter ''inside.'''
- source_word: כִּמְלֹאת יְמֵי הַמָּצוֹר
  chosen: when the days of the siege are completed
  alternatives:
  - at the completion of the days of the siege
  - when the siege days are fulfilled
  lexicon: HALOT
  rationale: The infinitive construct with כ expresses temporal circumstance. 'When
    ... are completed' gives clear modern English while retaining the sense of the
    appointed siege period reaching its full measure.
- source_word: הַמָּצוֹר
  chosen: the siege
  alternatives:
  - the besiegement
  lexicon: HALOT
  rationale: Standard and natural rendering for the noun referring to siege conditions
    in the enacted prophecy.
- source_word: תַּכֶּה
  chosen: strike
  alternatives:
  - smite
  - beat
  lexicon: HALOT
  rationale: Hiphil/Qal usage of נכה in this context refers to striking down with
    a weapon. 'Strike' is contemporary and sufficiently forceful.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' The singular 'sword'
    is idiomatic for weaponry and judgment.
- source_word: סְבִיבוֹתֶיהָ
  chosen: all around it
  alternatives:
  - around it
  - all around her
  lexicon: HALOT
  rationale: Refers to the city (feminine in Hebrew). English commonly uses 'it' for
    a city in this context. 'All around it' captures the plural/intensive adverbial
    form.
- source_word: תִּזְרֶה לָרוּחַ
  chosen: you shall scatter to the wind
  alternatives:
  - you shall winnow to the wind
  - you shall scatter to the winds
  lexicon: HALOT
  rationale: זרה means scatter/winnow. 'Scatter to the wind' is the clearest idiomatic
    English and preserves the image of dispersal. Singular 'wind' follows the Hebrew.
- source_word: וְחֶרֶב אָרִיק אַחֲרֵיהֶם
  chosen: and I will draw out a sword after them
  alternatives:
  - and I will unsheathe a sword after them
  - and I will draw a sword behind them
  lexicon: HALOT
  rationale: The first-person verb shifts the speaker to God. 'Draw out a sword' reflects
    the idiom of unsheathing for pursuit/judgment. 'After them' preserves the sense
    of following in hostile pursuit.
