theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Explicating the sense of שׁכל as loss of children
  chosen_reading: bereave you of children
  alternative_readings:
  - bereave you
  - make you childless
  rationale: The Hebrew verb often carries the sense of bereavement through loss of
    offspring. Making 'of children' explicit clarifies the judgment without importing
    foreign theology; it reflects the lexical force already present in the verb.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Rendering דָם as 'bloodshed' rather than literal 'blood'
  chosen_reading: bloodshed
  alternative_readings:
  - blood
  - slaughter
  rationale: In this covenant-judgment sequence, the term most plausibly denotes violent
    bloodshed. This avoids an opaque literalism while preserving the text's severity.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
