id: EZK.5.17
reference: Ezekiel 5:17
source:
  edition: WLC
  text: וְ/שִׁלַּחְתִּ֣י עֲ֠לֵי/כֶם רָעָ֞ב וְ/חַיָּ֤ה רָעָה֙ וְ/שִׁכְּלֻ֔/ךְ וְ/דֶ֥בֶר
    וָ/דָ֖ם יַעֲבָר בָּ֑/ךְ וְ/חֶ֨רֶב֙ אָבִ֣יא עָלַ֔יִ/ךְ אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי־׃פ
translation:
  text: And I will send famine and wild beasts against you, and they will bereave
    you of children; and pestilence and bloodshed will pass through you, and I will
    bring a sword upon you. I, the LORD, have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evil beasts' or 'savage animals.' The Hebrew phrase is literally 'bad/evil
      beast.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and they will make you childless.' The Hebrew verb commonly refers to
      bereavement through loss of children.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'blood'; here likely meaning bloodshed.
    reason: lexical_alternative
  - marker: d
    text: Or 'I, Yahweh, have spoken.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: And I will send
  alternatives:
  - And I will let loose
  - And I will dispatch
  lexicon: HALOT
  rationale: The Piel perfect with prefixed conjunction continues the divine judgment
    sequence with future force in context. 'Send' is the most natural and sufficiently
    formal rendering for YHWH's active bringing of covenant curses.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - upon you
  - on you
  lexicon: HALOT
  rationale: Although literally 'upon you' (2mp), English idiom with hostile judgments
    is better expressed as 'against you.' This also matches the adversative force
    of the preposition in context.
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In prophetic judgment contexts the noun denotes famine as a covenant
    curse, not merely the subjective experience of hunger.
- source_word: וְחַיָּה רָעָה
  chosen: and wild beasts
  alternatives:
  - and evil beasts
  - and savage animals
  lexicon: HALOT
  rationale: The phrase refers to dangerous animals sent as judgment. 'Wild beasts'
    is idiomatic modern English and captures the menace better than the wooden 'evil
    beasts.'
- source_word: וְשִׁכְּלֻךְ
  chosen: and they will bereave you of children
  alternatives:
  - and they will make you childless
  - and they will bereave you
  lexicon: HALOT
  rationale: The verb שׁכל in this stem commonly means to bereave, especially of children.
    Because the Hebrew object suffix is 2fs ('you') and the implied loss is children,
    English benefits from making the sense explicit. The plural subject is naturally
    the preceding famine and wild beasts, especially the latter.
- source_word: וְדֶבֶר
  chosen: and pestilence
  alternatives:
  - and plague
  lexicon: HALOT
  rationale: דבר in judgment lists often denotes epidemic disease. 'Pestilence' preserves
    the formal prophetic register and pairs well with famine and sword.
- source_word: וָדָם
  chosen: and bloodshed
  alternatives:
  - and blood
  - and slaughter
  lexicon: HALOT
  rationale: While literally 'blood,' in a judgment catalogue with pestilence and
    sword the sense is violent bloodshed rather than blood as a substance. This avoids
    ambiguity in English.
- source_word: יַעֲבָר בָּךְ
  chosen: will pass through you
  alternatives:
  - will sweep through you
  - will pass through your midst
  lexicon: HALOT
  rationale: The singular verb with the paired nouns can function collectively. 'Pass
    through you' is close to the Hebrew and evokes judgment moving through the city/personified
    Jerusalem. 'Sweep through' is possible but slightly more interpretive.
- source_word: וְחֶרֶב אָבִיא עָלַיִךְ
  chosen: and I will bring a sword upon you
  alternatives:
  - and I will bring the sword against you
  - and I will bring war upon you
  lexicon: HALOT
  rationale: '''Sword'' is retained rather than generalized to ''war'' because the
    Hebrew uses the concrete covenant-judgment image חרב. ''Upon you'' is idiomatic
    here and echoes prophetic diction.'
- source_word: אֲנִי יְהוָה
  chosen: I, the LORD
  alternatives:
  - I, Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' The pronoun is retained
    for emphasis: the speaker himself guarantees the judgment.'
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  lexicon: HALOT
  rationale: The perfect here is performative and solemn, marking the certainty of
    the oracle. 'Have spoken' preserves the prophetic formula's gravity better than
    'have said.'
