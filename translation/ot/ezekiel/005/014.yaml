id: EZK.5.14
reference: Ezekiel 5:14
source:
  edition: WLC
  text: וְ/אֶתְּנֵ/ךְ֙ לְ/חָרְבָּ֣ה וּ/לְ/חֶרְפָּ֔ה בַּ/גּוֹיִ֖ם אֲשֶׁ֣ר סְבִיבוֹתָ֑יִ/ךְ
    לְ/עֵינֵ֖י כָּל עוֹבֵֽר־׃
translation:
  text: And I will make you a ruin and a reproach among the nations that are around
    you, in the sight of everyone who passes by.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'desolation' for 'ruin.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an object of scorn' for 'a reproach.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶתְּנֵךְ
  chosen: And I will make you
  alternatives:
  - And I will set you
  - And I will give you over to become
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set,' but with the complement לְחָרְבָּה
    it idiomatically means to make or render Jerusalem into a certain state. 'Make
    you' is natural English and preserves the causative force without over-literal
    awkwardness.
- source_word: לְחָרְבָּה
  chosen: a ruin
  alternatives:
  - desolation
  - waste
  lexicon: HALOT
  rationale: חָרְבָּה denotes a devastated or ruined condition. 'A ruin' is concise,
    concrete, and idiomatic in English. 'Desolation' is possible, but 'ruin' better
    matches the image of a city laid waste.
- source_word: וּלְחֶרְפָּה
  chosen: and a reproach
  alternatives:
  - and an object of scorn
  - and disgrace
  lexicon: HALOT
  rationale: חֶרְפָּה commonly means reproach, disgrace, or taunt. 'Reproach' preserves
    the covenantal/judgment nuance and keeps close to the Hebrew; more interpretive
    options like 'object of scorn' are possible but less direct.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the surrounding peoples/nations, not specifically
    a Jew-Gentile theological contrast. 'Among the nations' is the most contextually
    appropriate and natural rendering.
- source_word: אֲשֶׁר סְבִיבוֹתָיִךְ
  chosen: that are around you
  alternatives:
  - that surround you
  - around you
  lexicon: HALOT
  rationale: The phrase identifies the nations as those surrounding Jerusalem. 'That
    are around you' is clear and preserves the relative-clause structure; 'that surround
    you' would also be acceptable.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before the eyes of
  - before
  lexicon: HALOT
  rationale: Literally 'to the eyes of,' this idiom means openly or visibly before
    others. 'In the sight of' is idiomatic English that retains the visual/public
    aspect.
- source_word: כָּל עוֹבֵר
  chosen: everyone who passes by
  alternatives:
  - all who pass by
  - every passerby
  lexicon: HALOT
  rationale: עוֹבֵר is a participle meaning one passing by. 'Everyone who passes by'
    is natural modern English and conveys the distributive force of כָּל. 'Every passerby'
    is slightly more compressed but less direct.
