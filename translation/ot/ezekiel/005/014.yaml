theological_decisions:
- issue: Personification of Jerusalem in feminine singular address
  chosen_reading: Retained singular 'you' throughout, referring to Jerusalem/city
    as addressed in the prophecy.
  alternative_readings:
  - Explicitly supplying 'Jerusalem' in the main text
  rationale: The Hebrew second feminine singular continues the prophetic personification
    of the city. Keeping 'you' preserves the rhetoric and directness of divine judgment
    without adding an explicit noun not present in this verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not paraphrase
    beyond the source text.'
