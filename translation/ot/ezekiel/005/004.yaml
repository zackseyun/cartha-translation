id: EZK.5.4
reference: Ezekiel 5:4
source:
  edition: WLC
  text: וּ/מֵ/הֶם֙ ע֣וֹד תִּקָּ֔ח וְ/הִשְׁלַכְתָּ֤ אוֹתָ/ם֙ אֶל תּ֣וֹךְ הָ/אֵ֔שׁ וְ/שָׂרַפְתָּ֥
    אֹתָ֖/ם בָּ/אֵ֑שׁ מִמֶּ֥/נּוּ תֵצֵא אֵ֖שׁ אֶל כָּל בֵּ֥ית יִשְׂרָאֵֽל־־־־׃פ
translation:
  text: And from them you shall take some more, and throw them into the midst of the
    fire and burn them in the fire. From it a fire will go out against all the house
    of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'From there fire will go out,' with the singular suffix likely referring
      to the fire just mentioned; some understand, less likely, 'From them fire will
      go out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵהֶם
  chosen: And from them
  alternatives:
  - And out of them
  - Then from them
  lexicon: HALOT
  rationale: Combines conjunction ו with preposition מן + pronoun. 'From them' is
    the plain spatial/partitive sense, referring back to the small number previously
    set aside.
- source_word: עוֹד
  chosen: some more
  alternatives:
  - again
  - still
  - yet more
  lexicon: HALOT
  rationale: Here עוֹד modifies the action as an additional taking from the previously
    spared group. 'Some more' best conveys the partitive/additional sense in natural
    English.
- source_word: תִּקָּח
  chosen: you shall take
  alternatives:
  - you are to take
  - you will take
  lexicon: HALOT
  rationale: Imperfect 2ms in prophetic sign-act instruction is well rendered with
    modal future 'you shall take,' preserving the directive tone.
- source_word: וְהִשְׁלַכְתָּ
  chosen: and throw
  alternatives:
  - and cast
  - and hurl
  lexicon: HALOT
  rationale: The Hiphil of שלך means to throw/cast. 'Throw' is modern and clear; 'cast'
    is possible but more traditional/archaic.
- source_word: אֶל־תּוֹךְ הָאֵשׁ
  chosen: into the midst of the fire
  alternatives:
  - into the fire
  - into the middle of the fire
  lexicon: HALOT
  rationale: תּוֹךְ explicitly means 'midst/interior.' Retaining 'midst' preserves
    the vividness and intensity of the sign-act better than the flatter 'into the
    fire.'
- source_word: וְשָׂרַפְתָּ אֹתָם בָּאֵשׁ
  chosen: and burn them in the fire
  alternatives:
  - and burn them with fire
  - and set them on fire
  lexicon: HALOT
  rationale: The verb שרף means 'burn.' The beth with אֵשׁ is naturally rendered 'in
    the fire' here, matching the immediate context and avoiding unnecessary paraphrase.
- source_word: מִמֶּנּוּ
  chosen: From it
  alternatives:
  - From there
  - From them
  lexicon: HALOT
  rationale: 'The singular pronominal suffix most naturally points back to the fire
    as a collective source: from that burning/fire. ''From them'' would not match
    the singular form.'
- source_word: תֵצֵא אֵשׁ
  chosen: a fire will go out
  alternatives:
  - fire will come out
  - a fire will spread out
  lexicon: HALOT
  rationale: יצא is literally 'go out/come out.' 'A fire will go out' preserves the
    Hebrew image of fire proceeding from the sign-act as judgment.
- source_word: אֶל כָּל בֵּית יִשְׂרָאֵל
  chosen: against all the house of Israel
  alternatives:
  - to all the house of Israel
  - upon all the house of Israel
  lexicon: HALOT
  rationale: Although אֶל is often 'to,' in judgment contexts English 'against' better
    conveys hostile direction. 'House of Israel' is retained as a covenantal-national
    expression, not reduced to merely 'Israel.'
