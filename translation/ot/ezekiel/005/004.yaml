theological_decisions:
- issue: Referent of the fire proceeding from the burned remnant
  chosen_reading: The verse depicts judgment spreading from this act to the whole
    house of Israel.
  alternative_readings:
  - The fire proceeds specifically from the remnant taken and burned
  - The fire proceeds from the symbolic fire itself rather than from the burned hairs
  rationale: The singular suffix in מִמֶּנּוּ most naturally refers to the immediately
    preceding fire, while the overall sign-act communicates that judgment extends
    outward to all Israel. The translation preserves the imagery without over-specifying
    the symbolic mechanics.
  doctrine_reference: Preserve theological tension rather than resolve it.
