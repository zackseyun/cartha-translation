id: EZK.5.6
reference: Ezekiel 5:6
source:
  edition: WLC
  text: וַ/תֶּ֨מֶר אֶת מִשְׁפָּטַ֤/י לְ/רִשְׁעָה֙ מִן הַ/גּוֹיִ֔ם וְ/אֶ֨ת חֻקּוֹתַ֔/י
    מִן הָ/אֲרָצ֖וֹת אֲשֶׁ֣ר סְבִיבוֹתֶ֑י/הָ כִּ֤י בְ/מִשְׁפָּטַ/י֙ מָאָ֔סוּ וְ/חֻקּוֹתַ֖/י
    לֹא הָלְכ֥וּ בָ/הֶֽם־־־־־׃ס
translation:
  text: And she rebelled against my judgments into wickedness, more than the nations,
    and against my statutes more than the lands that are around her; for they rejected
    my judgments, and they did not walk in my statutes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she changed my judgments into wickedness, more than the nations.' The
      verb can be understood as rebellion or as a corrupt alteration of what God gave;
      the main text follows the covenantal sense 'rebelled.'
    reason: lexical_alternative
  - marker: b
    text: '''Walk in'' is a Hebrew idiom meaning to live according to or follow.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתֶּמֶר
  chosen: she rebelled
  alternatives:
  - she changed
  - she was rebellious
  lexicon: HALOT
  rationale: From מרה, the dominant sense in covenantal contexts is rebellion/disobedience
    rather than mere change. The subject is the city/personified Jerusalem (feminine
    singular), so 'she rebelled' preserves both grammar and prophetic personification.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my ordinances
  - my rules
  lexicon: HALOT
  rationale: מִשְׁפָּט often denotes legal judgments/ordinances. 'Judgments' preserves
    the juridical force and matches the parallel with 'my statutes.'
- source_word: לְרִשְׁעָה
  chosen: into wickedness
  alternatives:
  - for wickedness
  - wickedly
  lexicon: HALOT
  rationale: The ל plus noun expresses result or direction. 'Into wickedness' reflects
    the movement/result nuance and keeps the noun 'wickedness' explicit.
- source_word: מִן הַגּוֹיִם
  chosen: more than the nations
  alternatives:
  - beyond the nations
  - from the nations
  lexicon: HALOT
  rationale: With comparative force after the preceding phrase, מִן is best rendered
    'more than' rather than a literal separative 'from.' The sense is that Jerusalem's
    rebellion exceeded that of the nations.
- source_word: חֻקּוֹתַי
  chosen: my statutes
  alternatives:
  - my decrees
  - my prescriptions
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and suitably formal rendering for חֻקִּים,
    preserving the legal-covenantal register and the distinction from מִשְׁפָּטִים.'
- source_word: מִן הָאֲרָצוֹת אֲשֶׁר סְבִיבוֹתֶיהָ
  chosen: more than the lands that are around her
  alternatives:
  - more than the countries around her
  - beyond the lands surrounding her
  lexicon: HALOT
  rationale: אֲרָצוֹת can mean lands/countries. 'Lands' keeps the broader territorial
    sense and avoids over-specifying modern nation-states. The feminine suffix refers
    to Jerusalem.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding accusation; 'for' is concise
    and natural in English.
- source_word: מָאָסוּ
  chosen: they rejected
  alternatives:
  - they despised
  - they refused
  lexicon: HALOT
  rationale: מאס conveys rejection with contempt. 'Rejected' is clear modern English
    and fits the legal-covenantal context without overstating emotional nuance.
- source_word: לֹא הָלְכוּ בָהֶם
  chosen: they did not walk in my statutes
  alternatives:
  - they did not follow them
  - they did not live by them
  lexicon: HALOT
  rationale: הלך ב with laws is a common idiom for conduct according to them. 'Walk
    in' preserves the biblical metaphor and remains understandable in modern English.
