theological_decisions:
- issue: Personified feminine subject
  chosen_reading: Retain 'she' for Jerusalem rather than replacing with 'it' or explicit
    'Jerusalem.'
  alternative_readings:
  - it rebelled
  - Jerusalem rebelled
  rationale: The Hebrew verb is feminine singular, reflecting the prophetic personification
    of the city. Preserving 'she' maintains the literary force of the oracle while
    remaining clear from context.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English).
- issue: Legal terminology distinction
  chosen_reading: Differentiate מִשְׁפָּטַי as 'judgments' and חֻקּוֹתַי as 'statutes.'
  alternative_readings:
  - render both with a single term such as 'laws'
  rationale: The Hebrew uses two distinct covenant-law terms in parallel. Preserving
    the distinction avoids flattening the legal texture of the accusation.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception).
