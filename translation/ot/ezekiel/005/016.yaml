id: EZK.5.16
reference: Ezekiel 5:16
source:
  edition: WLC
  text: בְּֽ/שַׁלְּחִ֡/י אֶת חִצֵּי֩ הָ/רָעָ֨ב הָ/רָעִ֤ים בָּ/הֶם֙ אֲשֶׁ֣ר הָי֣וּ
    לְ/מַשְׁחִ֔ית אֲשֶׁר אֲשַׁלַּ֥ח אוֹתָ֖/ם לְ/שַֽׁחֶתְ/כֶ֑ם וְ/רָעָב֙ אֹסֵ֣ף עֲלֵי/כֶ֔ם
    וְ/שָׁבַרְתִּ֥י לָ/כֶ֖ם מַטֵּה לָֽחֶם־־־׃
translation:
  text: When I send against them the deadly arrows of famine, which are for destruction,
    which I will send to destroy you, then I will add famine upon you and break for
    you the staff of bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the harmful/disastrous arrows of famine.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the staff of bread,' an idiom for the supply or support of bread.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׁלְּחִי
  chosen: When I send
  alternatives:
  - As I send
  - In my sending
  lexicon: HALOT
  rationale: The prefixed ב with infinitive construct of שׁלח introduces a temporal
    clause. 'When I send' is idiomatic English and preserves the forward-looking force
    in context.
- source_word: חִצֵּי הָרָעָב
  chosen: the arrows of famine
  alternatives:
  - the famine arrows
  lexicon: HALOT
  rationale: 'A construct chain: literally ''arrows of the famine.'' ''Arrows of famine''
    preserves the metaphor of famine as a weapon sent by God.'
- source_word: הָרָעִים
  chosen: deadly
  alternatives:
  - evil
  - harmful
  - disastrous
  lexicon: HALOT
  rationale: Though רַע often means 'evil' or 'bad,' here it modifies the famine-arrows
    as instruments of calamity. 'Deadly' communicates their destructive effect in
    natural English without moralizing the adjective.
- source_word: בָּהֶם
  chosen: against them
  alternatives:
  - among them
  - on them
  lexicon: HALOT
  rationale: With the verb 'send,' the pronoun refers to the target of the arrows.
    'Against them' best conveys hostile direction in English; the referent is Jerusalem's
    inhabitants from context.
- source_word: לְמַשְׁחִית
  chosen: for destruction
  alternatives:
  - as destruction
  - to be destructive
  - for ruin
  lexicon: HALOT
  rationale: The noun מַשְׁחִית denotes destructive effect or ruin. 'For destruction'
    preserves the purpose/result nuance and matches the following infinitive 'to destroy
    you.'
- source_word: לְשַׁחֶתְכֶם
  chosen: to destroy you
  alternatives:
  - to ruin you
  - to bring you to ruin
  lexicon: HALOT
  rationale: The infinitive of שׁחת with 2mp suffix expresses purpose. 'Destroy you'
    is the most direct and contextually fitting rendering in a judgment oracle.
- source_word: וְרָעָב אֹסֵף עֲלֵיכֶם
  chosen: then I will add famine upon you
  alternatives:
  - and I will increase famine against you
  - and famine I will heap upon you
  lexicon: HALOT
  rationale: אָסַף in Hiphil means 'add, increase.' The explicit subject is carried
    from the first-person verbal context, so English supplies 'I will.' 'Upon you'
    preserves עַל imagery of burden/judgment.
- source_word: וְשָׁבַרְתִּי לָכֶם
  chosen: and break for you
  alternatives:
  - and break against you
  - and break
  lexicon: HALOT
  rationale: The idiom takes ל plus indirect object. Retaining 'for you' keeps the
    Hebrew structure, though the sense is adversative in context. This prepares for
    the idiom 'break the staff of bread.'
- source_word: מַטֵּה לָחֶם
  chosen: the staff of bread
  alternatives:
  - the supply of bread
  - the support of bread
  lexicon: HALOT
  rationale: This is a known Hebrew idiom for the sustaining supply of food. The main
    text keeps the metaphor 'staff of bread' for transparency to the source; a footnote
    preserves the idiomatic sense.
