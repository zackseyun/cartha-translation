theological_decisions:
- issue: Divine agency in judgment imagery
  chosen_reading: Retain first-person divine action ('I send,' 'I will add,' 'I will
    break') without softening.
  alternative_readings:
  - Use impersonal expressions such as 'famine will come'
  rationale: The Hebrew repeatedly attributes the judgment directly to God. The translation
    preserves this theological force rather than diluting agency.
  doctrine_reference: Translation philosophy §1, §3
- issue: Retention of metaphor in judgment language
  chosen_reading: Preserve the metaphors 'arrows of famine' and 'staff of bread' in
    the main text.
  alternative_readings:
  - Replace with fully interpreted renderings such as 'deadly famine' and 'food supply'
  rationale: Optimal equivalence here favors keeping the source imagery while remaining
    readable. Because 'staff of bread' may be opaque, its idiomatic sense is preserved
    in a footnote rather than replacing the metaphor in the main text.
  doctrine_reference: Translation philosophy §1, §5, §6
