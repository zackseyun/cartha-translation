theological_decisions:
- issue: Rendering of divine emotional language for judgment
  chosen_reading: 'Retain anthropopathic terms straightforwardly: ''anger,'' ''wrath,''
    ''jealousy,'' and ''I will be comforted.'''
  alternative_readings:
  - Soften to less personal judicial abstractions such as 'indignation' or 'justice
    satisfied'
  rationale: The Hebrew explicitly uses affective language for the LORD's covenant
    judgment. Preserving these terms maintains the prophetic force and theological
    tension without importing later systematic qualifiers. 'I will be comforted' is
    kept rather than paraphrased away, while context prevents misunderstanding it
    as fickle emotional instability.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
