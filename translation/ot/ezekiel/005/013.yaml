id: EZK.5.13
reference: Ezekiel 5:13
source:
  edition: WLC
  text: וְ/כָלָ֣ה אַפִּ֗/י וַ/הֲנִחוֹתִ֧י חֲמָתִ֛/י בָּ֖/ם וְ/הִנֶּחָ֑מְתִּי וְֽ/יָדְע֞וּ
    כִּי אֲנִ֣י יְהוָ֗ה דִּבַּ֨רְתִּי֙ בְּ/קִנְאָתִ֔/י בְּ/כַלּוֹתִ֥/י חֲמָתִ֖/י בָּֽ/ם־׃
translation:
  text: So my anger will be spent, and I will satisfy my wrath against them, and I
    will be comforted. Then they will know that I, the LORD, have spoken in my jealousy,
    when I spend my wrath against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will be appeased' for 'I will be comforted'; the Hebrew verb can carry
      the sense of being consoled or finding relief after judgment is completed.
    reason: lexical_alternative
  - marker: b
    text: Or 'in my zeal' for 'in my jealousy.' The Hebrew term can denote either
      jealousy or zeal; here 'jealousy' preserves the covenantal relational force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָלָה
  chosen: will be spent
  alternatives:
  - will be finished
  - will be exhausted
  - will come to an end
  lexicon: HALOT
  rationale: כלה with אַף expresses the completion/exhaustion of anger. 'Will be spent'
    is idiomatic modern English that preserves the sense of anger having run its full
    course.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my nose
  - my wrath
  lexicon: HALOT
  rationale: אַף literally refers to nose/nostril but commonly denotes anger. 'My
    anger' is the natural contextual sense here; 'wrath' is reserved for חֵמָה/חֲמָה
    in this verse to preserve lexical distinction.
- source_word: וַהֲנִחוֹתִי
  chosen: I will satisfy
  alternatives:
  - I will cause to rest
  - I will set down
  - I will appease
  lexicon: HALOT
  rationale: From נוח in the Hiphil, the sense is causing wrath to come to rest upon/against
    them, i.e., to satisfy or settle it. 'I will satisfy my wrath against them' communicates
    the judicial completion of wrath in intelligible English.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  - my heat
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה often denotes burning wrath or fury. 'Wrath' fits prophetic
    judgment diction and distinguishes it from אַף rendered 'anger'.
- source_word: בם
  chosen: against them
  alternatives:
  - on them
  - in them
  lexicon: HALOT
  rationale: The preposition ב can mark the object/target in contexts of judgment.
    'Against them' best conveys hostile judicial direction in English.
- source_word: וְהִנֶּחָמְתִּי
  chosen: I will be comforted
  alternatives:
  - I will be appeased
  - I will relent
  - I will be consoled
  lexicon: HALOT
  rationale: From נחם in the Niphal, the sense here is not repentance from judgment
    but being comforted/appeased after wrath is fully executed. 'I will be comforted'
    is more transparent to the Hebrew, while the judicial nuance is clarified by context.
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - and they will know
  lexicon: HALOT
  rationale: The conjunction plus perfective sequence is naturally rendered as a result
    clause in English. 'Then' makes the consequence explicit without adding content.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: English present perfect works well after 'they will know that...' to
    express the force of the completed divine utterance with abiding validity.
- source_word: בְּקִנְאָתִי
  chosen: in my jealousy
  alternatives:
  - in my zeal
  - with my jealousy
  - in my zealously protective anger
  lexicon: HALOT
  rationale: קִנְאָה can mean jealousy or zeal. In divine covenant-judgment contexts,
    'jealousy' preserves the relational and covenantal force better than the more
    generalized 'zeal'.
- source_word: בְּכַלּוֹתִי
  chosen: when I spend
  alternatives:
  - when I finish
  - when I exhaust
  - in my completing
  lexicon: HALOT
  rationale: The infinitive construct of כלה marks the circumstance/time of the action.
    'When I spend' echoes the earlier 'will be spent' and preserves the completion
    motif.
