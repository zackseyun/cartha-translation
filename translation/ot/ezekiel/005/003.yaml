id: EZK.5.3
reference: Ezekiel 5:3
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֥ מִ/שָּׁ֖ם מְעַ֣ט בְּ/מִסְפָּ֑ר וְ/צַרְתָּ֥ אוֹתָ֖/ם בִּ/כְנָפֶֽי/ךָ׃
translation:
  text: And you shall take from there a few in number and bind them in the edges of
    your garment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your skirts' or 'in the folds of your robe'; Hebrew 'in your wings/edges,'
      a term used for the extremity of a garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: And you shall take
  alternatives:
  - And take
  - Then you shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic instruction is naturally
    rendered as a future-like imperative sequence in English. 'You shall take' preserves
    the directive force without sounding abrupt.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from among them
  - from that place
  lexicon: HALOT
  rationale: The adverb literally means 'from there.' In context it refers back to
    the previously treated hair, but the more literal 'from there' best preserves
    the Hebrew wording while remaining clear.
- source_word: מְעַט בְּמִסְפָּר
  chosen: a few in number
  alternatives:
  - a small number
  - a few
  lexicon: HALOT
  rationale: The combination intensifies the idea of smallness quantitatively. 'A
    few in number' is idiomatic English that preserves both elements rather than flattening
    to simply 'a few.'
- source_word: וְצַרְתָּ
  chosen: bind
  alternatives:
  - wrap
  - tie up
  - enclose
  lexicon: HALOT
  rationale: The verb conveys binding or enclosing. 'Bind' fits the symbolic action
    with the hairs and is more precise than the broader 'wrap.'
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The pronoun refers to the few hairs taken from the larger group. English
    requires only the pronoun here.
- source_word: בִּכְנָפֶיךָ
  chosen: in the edges of your garment
  alternatives:
  - in your skirts
  - in the folds of your robe
  - in your wings
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' or the extremity/edge of a garment. In
    this enacted-sign context, a garment edge is intended. 'Edges of your garment'
    is clear modern English; 'skirts' is traditional but less natural today, while
    'wings' would mislead.
