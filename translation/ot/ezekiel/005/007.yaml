theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt sets the default for יְהוָה as 'the LORD.' In the
    compound אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid the awkward
    'Lord LORD' while still signaling the covenant name through small-caps 'GOD.'
    This is a translation convention rather than a doctrinal claim.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
