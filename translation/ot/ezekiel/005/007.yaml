id: EZK.5.7
reference: Ezekiel 5:7
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה יַ֤עַן הֲמָנְ/כֶם֙ מִן הַ/גּוֹיִם֙
    אֲשֶׁ֣ר סְבִיבֽוֹתֵי/כֶ֔ם בְּ/חֻקּוֹתַ/י֙ לֹ֣א הֲלַכְתֶּ֔ם וְ/אֶת מִשְׁפָּטַ֖/י
    לֹ֣א עֲשִׂיתֶ֑ם וּֽ/כְ/מִשְׁפְּטֵ֧י הַ/גּוֹיִ֛ם אֲשֶׁ֥ר סְבִיבוֹתֵי/כֶ֖ם לֹ֥א
    עֲשִׂיתֶֽם־׀־־׃ס
translation:
  text: 'Therefore thus says the Lord GOD: Because you have been more turbulent than
    the nations that are around you, you have not walked in my statutes, and you have
    not carried out my judgments; and you have not even acted according to the judgments
    of the nations that are around you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have raged more,' 'you have been more rebellious,' or possibly 'you
      have been more numerous' than the nations around you. The Hebrew term is difficult,
      and the main text chooses a sense of excessive disorder that best fits the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered as 'the Lord GOD' to reflect the combined title אֲדֹנָי יְהוִה
    in standard readable English. Per doctrine, יְהוָה is represented as 'the LORD';
    in this fixed prophetic collocation, 'Lord GOD' is the conventional equivalent
    that avoids 'Lord LORD' while preserving the divine title force.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment oracle; 'Because' is the
    clearest modern English equivalent.
- source_word: הֲמָנְכֶם
  chosen: you have been more turbulent
  alternatives:
  - you have raged more
  - you have been more numerous
  - you have been more rebellious
  lexicon: HALOT
  rationale: The noun/verb family here is difficult and has been understood in multiple
    ways. In context, the sense is not simple population size but excess disorder
    or agitation beyond the surrounding nations, fitting the following accusations.
    'More turbulent' captures comparative excess without overinterpreting as a specific
    moral category like 'rebellious.'
- source_word: מִן הַגּוֹיִם אֲשֶׁר סְבִיבוֹתֵיכֶם
  chosen: than the nations that are around you
  alternatives:
  - more than the nations around you
  - beyond the nations around you
  lexicon: HALOT
  rationale: The preposition מִן marks comparison after the preceding term; 'than
    the nations that are around you' makes the comparative relation explicit in English.
- source_word: בְּחֻקּוֹתַי לֹא הֲלַכְתֶּם
  chosen: you have not walked in my statutes
  alternatives:
  - you have not lived by my statutes
  - you have not followed my statutes
  lexicon: HALOT
  rationale: '''Walked in'' preserves the Hebrew idiom while remaining understandable
    in English, and ''statutes'' is a consistent rendering for חֻקּוֹת.'
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my rules
  - my ordinances
  lexicon: HALOT
  rationale: Kept 'judgments' for consistency with מִשְׁפָּט and because the verse
    later contrasts these with the 'judgments' of the nations. This preserves the
    lexical link across the verse.
- source_word: לֹא עֲשִׂיתֶם
  chosen: you have not carried out
  alternatives:
  - you have not done
  - you have not practiced
  lexicon: HALOT
  rationale: For God's judgments, 'carried out' expresses enacted obedience more naturally
    than the bare 'done' while staying close to the Hebrew verb עשה.
- source_word: וּכְמִשְׁפְּטֵי הַגּוֹיִם... לֹא עֲשִׂיתֶם
  chosen: and you have not even acted according to the judgments of the nations that
    are around you
  alternatives:
  - nor have you acted according to the ordinances of the nations around you
  - and according to the judgments of the nations around you you have not done
  lexicon: HALOT
  rationale: 'The prefixed כ marks conformity: ''according to.'' ''Even'' is supplied
    to bring out the rhetorical force: Judah has failed not only to keep God''s standards
    but not even matched surrounding nations. ''Acted according to'' is idiomatic
    and preserves the contrast.'
