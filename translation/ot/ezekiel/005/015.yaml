theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of מוּסָר in a judgment list
  chosen_reading: a warning
  alternative_readings:
  - instruction
  - discipline
  - correction
  rationale: The verse presents Jerusalem as an example to surrounding nations after divine judgments. Rendering מוּסָר as 'warning' preserves the exemplary, admonitory force without importing a softer pedagogical sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Nuance of מְשַׁמָּה
  chosen_reading: a horror
  alternative_readings:
  - desolation
  - astonishment
  rationale: Because the noun appears in a sequence of what Jerusalem becomes 'to the nations,' the emphasis is on the nations' shocked reaction rather than only the city's ruined condition. 'A horror' best preserves that effect in readable English.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
