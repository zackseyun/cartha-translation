id: EZK.5.15
reference: Ezekiel 5:15
source:
  edition: WLC
  text: וְֽ/הָ֨יְתָ֜ה חֶרְפָּ֤ה וּ/גְדוּפָה֙ מוּסָ֣ר וּ/מְשַׁמָּ֔ה לַ/גּוֹיִ֖ם אֲשֶׁ֣ר סְבִיבוֹתָ֑יִ/ךְ בַּ/עֲשׂוֹתִ/י֩ בָ֨/ךְ שְׁפָטִ֜ים בְּ/אַ֤ף וּ/בְ/חֵמָה֙ וּ/בְ/תֹכְח֣וֹת חֵמָ֔ה אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי׃
translation:
  text: And you shall become a reproach and a taunt, a warning and a horror, to the nations that are around you, when I execute judgments on you in anger and in wrath and with wrathful rebukes. I am Yahweh; I have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a warning' could be rendered 'instruction,' 'discipline,' or 'correction'; here it refers to Jerusalem becoming an object lesson to the surrounding nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'a horror' may also be understood as 'an object of horror,' 'desolation,' or 'astonishment.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'with rebukes of wrath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: you shall become
  alternatives:
  - it shall become
  - you shall be
  lexicon: HALOT
  rationale: The verb is 3fs, agreeing with the implied feminine singular addressee (Jerusalem). English naturally renders the direct address as 'you shall become' rather than the more impersonal 'it shall become.'
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - disgrace
  - scorn
  lexicon: HALOT
  rationale: '''Reproach'' preserves both shame and public contempt, fitting prophetic judgment language.'
- source_word: גְדוּפָה
  chosen: a taunt
  alternatives:
  - an object of reviling
  - insult
  lexicon: HALOT
  rationale: The noun denotes abusive speech or reviling; 'taunt' is concise, readable, and pairs well with 'reproach' without collapsing the distinction.
- source_word: מוּסָר
  chosen: a warning
  alternatives:
  - instruction
  - discipline
  - correction
  lexicon: HALOT
  rationale: In this judgment context the sense is not positive instruction alone but an object lesson to others; 'warning' best conveys the exemplary force for the surrounding nations.
- source_word: מְשַׁמָּה
  chosen: a horror
  alternatives:
  - an object of horror
  - desolation
  - astonishment
  lexicon: HALOT
  rationale: The term can denote desolation or appalled astonishment. Here, in a list of what Jerusalem becomes to the nations, 'a horror' captures the reaction provoked by the devastation.
- source_word: לַגּוֹיִם אֲשֶׁר סְבִיבוֹתָיִךְ
  chosen: to the nations that are around you
  alternatives:
  - for the nations around you
  - to the nations surrounding you
  lexicon: HALOT
  rationale: This keeps the relational sense of the preposition and the concrete geographic reference to neighboring peoples.
- source_word: בַּעֲשׂוֹתִי בָךְ שְׁפָטִים
  chosen: when I execute judgments on you
  alternatives:
  - when I carry out judgments against you
  - when I inflict punishments on you
  lexicon: HALOT
  rationale: The infinitive construct with preposition is temporal ('when'). 'Execute judgments' preserves the judicial character of שְׁפָטִים better than the more interpretive 'punishments.'
- source_word: בְּאַף
  chosen: in anger
  alternatives:
  - with anger
  lexicon: HALOT
  rationale: אַף in divine judgment contexts commonly denotes anger. 'In anger' reads naturally in English while preserving the emotional force.
- source_word: וּבְחֵמָה
  chosen: and in wrath
  alternatives:
  - and in fury
  - and with wrath
  lexicon: HALOT
  rationale: Using 'wrath' distinguishes חֵמָה from אַף and preserves the intensification of divine judgment.
- source_word: וּבְתוֹכְחוֹת חֵמָה
  chosen: and with wrathful rebukes
  alternatives:
  - and with furious chastisements
  - and with rebukes of wrath
  lexicon: HALOT
  rationale: תוֹכְחוֹת are reproofs/rebukes, and the following חֵמָה qualifies them. 'Wrathful rebukes' is idiomatic and preserves both elements without over-paraphrase.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I, the LORD
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering 'the LORD' for יְהוָה. Including 'am' yields a complete emphatic clause in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I have said
  - I spoke
  lexicon: HALOT
  rationale: The perfect here functions as a solemn divine declaration of certainty. 'I have spoken' is the standard prophetic closure and carries that force well.
