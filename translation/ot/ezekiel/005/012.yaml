id: EZK.5.12
reference: Ezekiel 5:12
source:
  edition: WLC
  text: שְׁלִשִׁתֵ֞/יךְ בַּ/דֶּ֣בֶר יָמ֗וּתוּ וּ/בָֽ/רָעָב֙ יִכְל֣וּ בְ/תוֹכֵ֔/ךְ
    וְ/הַ֨/שְּׁלִשִׁ֔ית בַּ/חֶ֖רֶב יִפְּל֣וּ סְבִיבוֹתָ֑יִ/ךְ וְ/הַ/שְּׁלִישִׁית֙
    לְ/כָל ר֣וּחַ אֱזָרֶ֔ה וְ/חֶ֖רֶב אָרִ֥יק אַחֲרֵי/הֶֽם־׃
translation:
  text: A third of you will die by pestilence and be consumed by famine in your midst,
    and a third will fall by the sword all around you, and a third I will scatter
    to every wind, and I will draw out a sword after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to every wind,' an idiom meaning in every direction.
    reason: cultural_note
  - marker: b
    text: Or 'I will unsheathe a sword after them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלִשִׁתֵיךְ / הַשְּׁלִשִׁית / הַשְּׁלִישִׁית
  chosen: a third
  alternatives:
  - one third
  - a third part
  lexicon: HALOT
  rationale: The repeated fractional expression structures the judgment into three
    equal parts. 'A third' is idiomatic modern English and preserves the repetition.
- source_word: דֶּבֶר
  chosen: pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: In prophetic judgment contexts this term commonly denotes epidemic disease
    sent as divine judgment. 'Pestilence' preserves that formal prophetic sense better
    than the broader 'disease' and is more precise than 'plague' here.
- source_word: יָמוּתוּ
  chosen: will die
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: Simple future in English best reflects the imperfect here in a prophetic
    announcement.
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: The noun denotes famine conditions rather than the subjective feeling
    of hunger.
- source_word: יִכְלוּ
  chosen: be consumed
  alternatives:
  - come to an end
  - perish
  lexicon: HALOT
  rationale: The verb conveys being finished off or consumed. 'Be consumed' pairs
    naturally with famine and preserves the severity of the judgment.
- source_word: בְּתוֹכֵךְ
  chosen: in your midst
  alternatives:
  - within you
  - inside you
  lexicon: HALOT
  rationale: Addressed to Jerusalem personified as feminine singular; 'in your midst'
    is the natural English idiom for events occurring within the city.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - sword
  - war
  lexicon: HALOT
  rationale: The noun is a standard metonym for violent death in warfare. Retaining
    'the sword' preserves the concrete prophetic diction.
- source_word: יִפְּלוּ
  chosen: will fall
  alternatives:
  - will be struck down
  - will die
  lexicon: HALOT
  rationale: '''Fall'' is the conventional and sufficiently transparent rendering
    in battle/judgment contexts, especially with ''by the sword.'''
- source_word: סְבִיבוֹתָיִךְ
  chosen: all around you
  alternatives:
  - around you
  - surrounding you
  lexicon: HALOT
  rationale: The plural form intensifies the surrounding sense. 'All around you' captures
    the distributive force idiomatically.
- source_word: לְכָל רוּחַ
  chosen: to every wind
  alternatives:
  - to every direction
  - to all winds
  lexicon: HALOT
  rationale: Literally 'to every wind,' a Hebrew idiom for scattering in every direction.
    The literal image is preserved in the main text.
- source_word: אֱזָרֶה
  chosen: I will scatter
  alternatives:
  - I will winnow
  - I will disperse
  lexicon: HALOT
  rationale: The verb denotes scattering, often with a winnowing image. 'Scatter'
    is the clearest main-text rendering; the winnowing nuance is secondary here.
- source_word: אָרִיק
  chosen: I will draw out
  alternatives:
  - I will unsheathe
  - I will empty out
  lexicon: HALOT
  rationale: With 'sword' and the following phrase 'after them,' the idiom refers
    to drawing out or unsheathing a sword in pursuit. 'Draw out' is both literal and
    readable.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - behind them
  - in pursuit of them
  lexicon: HALOT
  rationale: The preposition indicates pursuit following after the scattered group.
    'After them' is literal; the pursuit sense is supplied by the sword idiom.
