theological_decisions:
- issue: Personified addressee and referent of judgment
  chosen_reading: Retain second-person feminine singular ('you/your') addressing Jerusalem
    as a personified city.
  alternative_readings:
  - Explicitly identify the referent as 'Jerusalem' in the verse
  rationale: The Hebrew directly addresses the city in feminine singular forms. Preserving
    the personification maintains the prophetic rhetoric without adding an explicit
    noun absent from this verse.
- issue: Idiomatic judgment language
  chosen_reading: Preserve concrete images ('pestilence,' 'the sword,' 'to every wind')
    rather than flattening them into abstract paraphrase.
  alternative_readings:
  - Render more dynamically as 'disease,' 'war,' and 'in every direction'
  rationale: Optimal equivalence here favors retaining the prophetic imagery because
    it is clear in English and carries the text's rhetorical force.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
