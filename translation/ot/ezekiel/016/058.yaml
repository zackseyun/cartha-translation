theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether נשׂא here should be made explicit as bearing guilt or punishment
  chosen_reading: have borne
  alternative_readings:
  - have borne your punishment
  - have borne your guilt
  rationale: The Hebrew permits the judicial sense of bearing the consequences of
    one's sin, but the object is 'your lewdness and your abominations,' so a more
    literal 'have borne' preserves the text's compact ambiguity rather than resolving
    it interpretively.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
