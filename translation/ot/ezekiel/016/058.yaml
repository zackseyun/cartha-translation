theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether נשׂא here should be made explicit as bearing guilt or punishment
  chosen_reading: have borne
  alternative_readings:
  - have borne your punishment
  - have borne your guilt
  rationale: The Hebrew permits the judicial sense of bearing the consequences of one's sin, but the object is 'your lewdness and your abominations,' so a more literal 'have borne' preserves the text's compact ambiguity rather than resolving it interpretively.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
