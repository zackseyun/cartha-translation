id: EZK.16.58
reference: Ezekiel 16:58
source:
  edition: WLC
  text: אֶת זִמָּתֵ֥/ךְ וְ/אֶת תּוֹעֲבוֹתַ֖יִ/ךְ אַ֣תְּ נְשָׂאתִ֑י/ם נְאֻ֖ם יְהוָֽה־־׃ס
translation:
  text: You yourself have borne your lewdness and your abominations, declares the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have borne your punishment' or 'have borne your guilt.' The Hebrew verb
      can carry judicial overtones in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִמָּתֵךְ
  chosen: your lewdness
  alternatives:
  - your wickedness
  - your depravity
  - your obscene conduct
  lexicon: HALOT
  rationale: זִמָּה in Ezekiel often denotes morally shameless, sexually charged wickedness
    rather than generic evil. 'Lewdness' preserves the sexual-moral force in the chapter's
    extended adultery/prostitution imagery better than the broader 'wickedness'.
- source_word: תּוֹעֲבוֹתַיִךְ
  chosen: your abominations
  alternatives:
  - your detestable acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה commonly denotes something abhorrent or detestable, often in
    cultic and moral contexts. 'Abominations' is a standard, weighty rendering that
    fits Ezekiel's rhetoric and preserves the plural intensity.
- source_word: אַתְּ
  chosen: you yourself
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal form. 'You yourself'
    brings out the emphatic force and the direct assignment of responsibility.
- source_word: נְשָׂאתִם
  chosen: have borne
  alternatives:
  - have carried
  - must bear
  - have suffered
  lexicon: HALOT
  rationale: From נשׂא, 'to bear/carry.' In judgment contexts it can mean bearing
    guilt or punishment. 'Have borne' keeps the metaphorical breadth without over-interpreting
    as either guilt alone or punishment alone; English readers can hear both responsibility
    and consequence.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD'
    in clear modern English. For יְהוָה, the project default is 'the LORD' per doctrine
    guidance.
