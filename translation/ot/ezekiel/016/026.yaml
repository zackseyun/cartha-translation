id: EZK.16.26
reference: Ezekiel 16:26
source:
  edition: WLC
  text: וַ/תִּזְנִ֧י אֶל בְּנֵֽי מִצְרַ֛יִם שְׁכֵנַ֖יִ/ךְ גִּדְלֵ֣י בָשָׂ֑ר וַ/תַּרְבִּ֥י
    אֶת תַּזְנֻתֵ֖/ךְ לְ/הַכְעִיסֵֽ/נִי־־־׃
translation:
  text: You prostituted yourself with the sons of Egypt, your neighbors, great of
    flesh, and multiplied your prostitution to provoke me to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Egyptians.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'great of flesh,' a crude sexual description; some translations render
      more interpretively, such as 'lustful' or 'well-endowed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּזְנִי
  chosen: You prostituted yourself
  alternatives:
  - You played the whore
  - You committed prostitution
  - You committed harlotry
  lexicon: HALOT
  rationale: זנה in prophetic metaphor commonly denotes sexual immorality as a figure
    for covenantal unfaithfulness. 'Prostituted yourself' preserves the sexual metaphor
    clearly in modern English without archaic phrasing like 'played the whore.'
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/toward,' in English idiom with
    זנה and a sexual object, 'with' best conveys the relational sense.
- source_word: בְּנֵי מִצְרַיִם
  chosen: the sons of Egypt
  alternatives:
  - the Egyptians
  - the people of Egypt
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew expression while remaining
    intelligible. 'Sons of Egypt' keeps the concrete wording better than the more
    interpretive 'Egyptians.'
- source_word: שְׁכֵנַיִךְ
  chosen: your neighbors
  alternatives:
  - those near you
  lexicon: HALOT
  rationale: Straightforward rendering of the participial/nominal form indicating
    proximity; it also fits the political-geographical sense in context.
- source_word: גִּדְלֵי בָשָׂר
  chosen: great of flesh
  alternatives:
  - large of flesh
  - well-endowed
  - lustful
  lexicon: HALOT
  rationale: The phrase is a crude sexual description. 'Great of flesh' preserves
    the metaphor and shock of the Hebrew without overinterpreting it into a specific
    modern euphemism. More explicit paraphrases are possible but go beyond the wording.
- source_word: וַתַּרְבִּי
  chosen: and multiplied
  alternatives:
  - and increased
  - and made many
  lexicon: HALOT
  rationale: רבה in the Hiphil here means to increase or multiply. 'Multiplied' is
    concise and matches the object 'your prostitution.'
- source_word: תַּזְנֻתֵךְ
  chosen: your prostitution
  alternatives:
  - your whorings
  - your acts of prostitution
  - your harlotry
  lexicon: HALOT
  rationale: A noun cognate with זנה; 'your prostitution' keeps the lexical connection
    with the earlier verb and is readable modern English.
- source_word: לְהַכְעִיסֵנִי
  chosen: to provoke me to anger
  alternatives:
  - to anger me
  - to provoke me
  lexicon: HALOT
  rationale: The Hiphil of כעס means to vex or provoke to anger. 'To provoke me to
    anger' preserves both causation and the emotional result.
