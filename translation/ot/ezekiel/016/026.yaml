theological_decisions:
- issue: Prophetic sexual metaphor for idolatry and foreign alliances
  chosen_reading: Retain the explicit prostitution imagery in the main text
  alternative_readings:
  - Soften to 'were unfaithful' or 'committed adultery'
  rationale: The chapter's rhetoric intentionally uses shocking sexualized language
    to portray Jerusalem's covenant infidelity. Softening the metaphor would mute
    the force of the Hebrew and import interpretation beyond the text's chosen imagery.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of בְּנֵי מִצְרַיִם
  chosen_reading: the sons of Egypt
  alternative_readings:
  - the Egyptians
  rationale: The Hebrew literally says 'sons of Egypt.' Because the phrase is transparent
    in English and preserves the source texture, it is preferred in the main text,
    while a smoother alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 5
