theological_decisions:
- issue: Sense of 'you justified your sisters'
  chosen_reading: comparative appearance of righteousness, not actual moral acquittal
  alternative_readings:
  - you justified your sisters
  - you declared your sisters righteous
  rationale: 'In context Ezekiel is using shocking comparative rhetoric: Jerusalem''s
    greater abominations make Samaria and Sodom look righteous by comparison. Rendering
    this as actual justification could import a theological claim the text is not
    making.'
  doctrine_reference: 'Translation philosophy items 1 and 3: original-language primacy
    and preserving tension without importing doctrinal claims'
