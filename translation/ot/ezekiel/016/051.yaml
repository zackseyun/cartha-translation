id: EZK.16.51
reference: Ezekiel 16:51
source:
  edition: WLC
  text: וְ/שֹׁ֣מְר֔וֹן כַּ/חֲצִ֥י חַטֹּאתַ֖יִ/ךְ לֹ֣א חָטָ֑אָה וַ/תַּרְבִּ֤י אֶת תּוֹעֲבוֹתַ֨יִ/ךְ֙
    מֵ/הֵ֔נָּה וַ/תְּצַדְּקִי֙ אֶת אחות/ך בְּ/כָל תּוֹעֲבוֹתַ֖יִ/ךְ אֲשֶׁ֥ר עשיתי־־־׃
translation:
  text: And Samaria did not sin even half as much as you; you multiplied your abominations
    more than they, and by all your abominations that you committed, you made your
    sisters appear righteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you justified your sisters.' The Hebrew can be rendered more literally
      this way, but the sense in context is that Jerusalem's greater wickedness made
      them seem righteous by comparison.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  alternatives:
  - Shomron
  lexicon: HALOT
  rationale: Proper place-name/personified city; standard English transliteration
    is 'Samaria.' In context the city stands for the northern kingdom and is addressed
    as one of Jerusalem's 'sisters.'
- source_word: כַּחֲצִי
  chosen: even half as much
  alternatives:
  - half
  - like half of
  lexicon: HALOT
  rationale: The comparative כ plus 'half' idiomatically means 'not even half' in
    this clause. 'Even half as much' brings out the comparison naturally in English
    while preserving the force of the Hebrew.
- source_word: חַטֹּאתַיִךְ
  chosen: as you
  alternatives:
  - your sins
  - your sin
  lexicon: HALOT
  rationale: 'The noun is explicitly present in Hebrew (''your sins''), but English
    comparison after ''did not sin even half as much'' can omit the repeated noun
    without loss. The sense remains comparative: Samaria''s sin was less than Jerusalem''s.'
- source_word: לֹא חָטָאָה
  chosen: did not sin
  alternatives:
  - has not sinned
  lexicon: HALOT
  rationale: Simple verbal rendering of חטא. English preterite fits the prophetic
    retrospective context better than present perfect here.
- source_word: וַתַּרְבִּי
  chosen: you multiplied
  alternatives:
  - you increased
  - you made many
  lexicon: HALOT
  rationale: רבה in Hiphil/causative sense here conveys increase in quantity. 'Multiplied'
    is both natural and close to the Hebrew.
- source_word: תּוֹעֲבוֹתַיִךְ
  chosen: your abominations
  alternatives:
  - your detestable acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה is a strong moral-religious term in Ezekiel, often for idolatrous
    and abhorrent practices. 'Abominations' preserves the prophetic severity better
    than a softer paraphrase.
- source_word: מֵהֵנָּה
  chosen: more than they
  alternatives:
  - more than them
  - beyond them
  lexicon: HALOT
  rationale: Feminine plural pronoun refers to the sisters/cities. 'More than they'
    is slightly formal but clear and keeps the comparative force.
- source_word: וַתְּצַדְּקִי
  chosen: you made ... appear righteous
  alternatives:
  - you justified
  - you made ... seem righteous
  - you proved ... righteous
  lexicon: HALOT
  rationale: 'The Piel of צדק here is comparative/forensic: Jerusalem''s greater wickedness
    makes her sisters look righteous by comparison, not that she actually morally
    justified them before God. ''Made ... appear righteous'' best conveys this idiomatic
    sense in English.'
- source_word: אֶת אֲחוֹתַיִךְ
  chosen: your sisters
  alternatives:
  - your sister-cities
  lexicon: HALOT
  rationale: Plural sense is required by context, referring to Samaria and Sodom as
    the two sisters in the surrounding passage. English should reflect the contextual
    plural even though the consonantal form as presented is defective.
- source_word: בְּכָל תּוֹעֲבוֹתַיִךְ
  chosen: by all your abominations
  alternatives:
  - through all your abominations
  - in all your abominations
  lexicon: HALOT
  rationale: 'ב here is instrumental: Jerusalem''s abominations are the means by which
    the sisters are shown comparatively righteous.'
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: that you committed
  alternatives:
  - that you did
  - which you have done
  lexicon: HALOT
  rationale: 'Though the orthography shown is irregular, the sense is clearly second
    feminine singular from context: the deeds Jerusalem performed. ''Committed'' fits
    the moral weight of ''abominations'' better than the generic ''did.'''
