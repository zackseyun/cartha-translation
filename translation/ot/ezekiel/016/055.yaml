id: EZK.16.55
reference: Ezekiel 16:55
source:
  edition: WLC
  text: וַ/אֲחוֹתַ֗יִ/ךְ סְדֹ֤ם וּ/בְנוֹתֶ֨י/הָ֙ תָּשֹׁ֣בְןָ לְ/קַדְמָתָ֔/ן וְ/שֹֽׁמְרוֹן֙
    וּ/בְנוֹתֶ֔י/הָ תָּשֹׁ֖בְןָ לְ/קַדְמָתָ֑/ן וְ/אַתְּ֙ וּ/בְנוֹתַ֔יִ/ךְ תְּשֻׁבֶ֖ינָה
    לְ/קַדְמַתְ/כֶֽן׃
translation:
  text: And your sisters, Sodom and her daughters, will return to their former state,
    and Samaria and her daughters will return to their former state, and you and your
    daughters will return to your former state.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be restored to their former condition.' The Hebrew more literally
      says 'will return to their former state.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲחוֹתַיִךְ
  chosen: your sisters
  alternatives:
  - your sister-cities
  - your sisters [i.e., related cities]
  lexicon: HALOT
  rationale: Literal familial language is retained. In Ezekiel 16 the cities are personified
    as sisters, so 'your sisters' preserves the metaphor better than an explanatory
    paraphrase.
- source_word: סְדֹם
  chosen: Sodom
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: בְנוֹתֶיהָ / בְנוֹתַיִךְ
  chosen: her daughters / your daughters
  alternatives:
  - her towns / your towns
  - her dependent cities / your dependent cities
  lexicon: HALOT
  rationale: The Hebrew literally says 'daughters.' In prophetic usage this can denote
    dependent towns or communities, but retaining 'daughters' preserves the personified-city
    imagery and the familial metaphor of the chapter.
- source_word: תָּשֹׁבְנָה / תְּשֻׁבֶינָה
  chosen: will return
  alternatives:
  - will be restored
  - will turn back
  lexicon: HALOT
  rationale: The basic sense of שוב is 'return.' Although the context implies restoration,
    'will return' stays closer to the Hebrew and allows the reader to hear the repeated
    verbal pattern across all three clauses.
- source_word: לְקַדְמָתָן / לְקַדְמַתְכֶן
  chosen: to their former state / to your former state
  alternatives:
  - to their former condition / to your former condition
  - to what they were before / to what you were before
  lexicon: HALOT
  rationale: The noun from קדם refers to an earlier or former condition. 'Former state'
    is natural English and fits the restoration context better than a more wooden
    'former things' or 'former status.'
- source_word: וְ
  chosen: and
  alternatives:
  - then
  lexicon: HALOT
  rationale: Simple coordination best reflects the Hebrew sequence of three parallel
    clauses without adding temporal nuance beyond the conjunction.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
