theological_decisions:
- issue: Nature of the promised reversal for Sodom, Samaria, and Jerusalem
  chosen_reading: Rendered as a return to a former state without specifying the mechanism
    or theological implications of restoration.
  alternative_readings:
  - Rendered more interpretively as 'will be restored'
  rationale: The verse states a reversal/restoration using the verb 'return' and the
    phrase 'former state.' Because the broader theological implications of Sodom's
    restoration are debated, the translation preserves the wording of the text rather
    than resolving the issue interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
