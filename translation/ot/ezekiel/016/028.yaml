theological_decisions:
- issue: Retention of the prostitution metaphor for Jerusalem's covenantal/political
    infidelity
  chosen_reading: Preserve the explicit sexual metaphor in the main text
  alternative_readings:
  - Soften to 'you were unfaithful' or 'you pursued alliances'
  rationale: Ezekiel 16 intentionally uses shocking sexual imagery to portray Jerusalem's
    idolatry and foreign alliances. Softening the metaphor would undertranslate the
    prophetic rhetoric and obscure the theological force of covenant infidelity.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
