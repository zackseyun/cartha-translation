id: EZK.16.28
reference: Ezekiel 16:28
source:
  edition: WLC
  text: וַ/תִּזְנִי֙ אֶל בְּנֵ֣י אַשּׁ֔וּר מִ/בִּלְתִּ֖י שָׂבְעָתֵ֑/ךְ וַ/תִּזְנִ֕י/ם
    וְ/גַ֖ם לֹ֥א שָׂבָֽעַתְּ־׃
translation:
  text: You prostituted yourself with the sons of Assyria because you were not satisfied;
    you prostituted yourself with them, and even then you were not satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Assyrians.'' Hebrew: ''the sons of Assyria.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew uses the repeated metaphor of prostitution/whoredom for Jerusalem's
      unfaithfulness in alliances and idolatry.
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּזְנִי
  chosen: you prostituted yourself
  alternatives:
  - you played the whore
  - you committed prostitution
  - you were unfaithful sexually
  lexicon: HALOT
  rationale: זנה in Ezekiel's metaphor of Jerusalem's infidelity is a strong sexualized
    term for prostitution/whoredom, used figuratively for political-religious unfaithfulness.
    'You prostituted yourself' preserves the metaphor's force in readable modern English
    without archaic 'played the whore.'
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' with זנה it idiomatically marks
    the party with whom the illicit relation is pursued. English 'with' is the natural
    equivalent in this construction.
- source_word: בְּנֵי אַשּׁוּר
  chosen: the sons of Assyria
  alternatives:
  - the Assyrians
  - the children of Assyria
  lexicon: HALOT
  rationale: A more formal rendering would be 'the sons of Assyria.' This keeps the
    Hebrew expression while remaining intelligible. It likely denotes the Assyrians
    collectively, but retaining 'sons of Assyria' preserves the source texture.
- source_word: מִבִּלְתִּי שָׂבְעָתֵךְ
  chosen: because you were not satisfied
  alternatives:
  - without being satisfied
  - from not being satisfied
  - for lack of satisfaction
  lexicon: HALOT
  rationale: The phrase expresses lack of satiation as the motive/circumstance of
    her prostitution. 'Because you were not satisfied' communicates the sense clearly
    in English, while preserving the causal nuance better than a bare literalism.
- source_word: וַתִּזְנִים
  chosen: you prostituted yourself with them
  alternatives:
  - you whored with them
  - you committed prostitution with them
  lexicon: HALOT
  rationale: The 3mp suffix on the verb points back to the Assyrians ('with them').
    Making the pronoun explicit in English reflects the suffix and avoids losing a
    significant detail.
- source_word: וְגַם
  chosen: and even then
  alternatives:
  - and also
  - yet even so
  - and moreover
  lexicon: HALOT
  rationale: 'In context the phrase heightens the irony: despite further prostitution,
    satisfaction still did not come. ''And even then'' captures the adversative-intensifying
    force more naturally than the wooden ''and also.'''
- source_word: לֹא שָׂבָעַתְּ
  chosen: you were not satisfied
  alternatives:
  - you were not filled
  - you were not sated
  lexicon: HALOT
  rationale: שׂבע here refers metaphorically to being satiated or content. 'Satisfied'
    is idiomatic modern English and fits the repeated refrain in the verse.
