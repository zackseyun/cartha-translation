theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default for יְהוָה is 'the LORD.' In the fixed compound אֲדֹנָי
    יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD' while still distinguishing
    the two Hebrew elements. This follows the doctrine's contested-terms guidance
    for YHWH while preserving readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpreting the oath construction חַי־אני ... אִם
  chosen_reading: 'a solemn negated assertion: ''As I live ... has not done'''
  alternative_readings:
  - a more literal but opaque 'As I live ... if Sodom has done'
  rationale: Hebrew oath syntax commonly uses אִם after an oath to express emphatic
    denial. Rendering the negation in English preserves the plain sense rather than
    reproducing a misleading literalism.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy
    over translation tradition'
