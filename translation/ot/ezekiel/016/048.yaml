id: EZK.16.48
reference: Ezekiel 16:48
source:
  edition: WLC
  text: חַי אָ֗נִי נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה אִם עָֽשְׂתָה֙ סְדֹ֣ם אֲחוֹתֵ֔/ךְ הִ֖יא
    וּ/בְנוֹתֶ֑י/הָ כַּ/אֲשֶׁ֣ר עָשִׂ֔ית אַ֖תְּ וּ/בְנוֹתָֽיִ/ךְ־־׃
translation:
  text: As I live, declares the Lord GOD, your sister Sodom, she and her daughters,
    has not done as you and your daughters have done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: literally, ''As I live ... if Sodom your sister has
      done ...'' The construction expresses a strong negation.'
    reason: lexical_alternative
  - marker: b
    text: '''Daughters'' refers to the towns or communities associated with Sodom
      and with Jerusalem.'
    reason: cultural_note
lexical_decisions:
- source_word: חַי אָ֗נִי
  chosen: As I live
  alternatives:
  - As surely as I live
  - By my life
  lexicon: HALOT
  rationale: Idiomatic oath formula introducing a solemn divine declaration. 'As I
    live' preserves the Hebrew form while remaining natural English.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic speech formula. 'Declares' is clear modern English
    and fits optimal equivalence.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי is rendered 'Lord' and יְהוָה follows the project default 'the
    LORD.' In the compound title, conventional English capitalization 'Lord GOD' best
    reflects the Hebrew distinction without awkwardness.
- source_word: אִם
  chosen: has not
  alternatives:
  - surely not
  - if ...
  lexicon: HALOT
  rationale: Following an oath formula, אִם functions as a strong negative in elliptical
    oath syntax rather than a simple conditional 'if.' English must supply the implied
    negation for sense.
- source_word: עָשְׂתָה
  chosen: has done
  alternatives:
  - did
  - acted
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make'). 'Has done' matches the comparison
    with the following clause and preserves the accusation's force.
- source_word: סְדֹם אֲחוֹתֵךְ
  chosen: your sister Sodom
  alternatives:
  - Sodom your sister
  lexicon: HALOT
  rationale: Keeps the familial metaphor central to the chapter while using natural
    English word order.
- source_word: הִיא וּבְנוֹתֶיהָ
  chosen: she and her daughters
  alternatives:
  - she herself and her daughters
  lexicon: HALOT
  rationale: Explicit pronoun הִיא is retained for emphasis. 'Daughters' refers to
    dependent towns/communities associated with Sodom, a common prophetic metaphor.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - according as
  - like what
  lexicon: HALOT
  rationale: Simple comparative particle introducing the standard of comparison.
- source_word: עָשִׂית אַתְּ וּבְנוֹתָיִךְ
  chosen: you and your daughters have done
  alternatives:
  - you and your daughters did
  lexicon: HALOT
  rationale: Retains the direct second-person feminine singular address to Jerusalem
    and the comparison with her associated communities.
