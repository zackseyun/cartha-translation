theological_decisions:
- issue: Metaphorical portrayal of Jerusalem's unfaithfulness through marital infidelity
  chosen_reading: 'Retain the marital/adultery imagery directly: ''The adulterous
    wife takes strangers instead of her husband.'''
  alternative_readings:
  - The wife who commits adultery receives other men instead of her husband.
  rationale: The verse is part of Ezekiel's extended metaphor of covenant unfaithfulness.
    The translation preserves the sharpness of the accusation without softening the
    sexual imagery or over-paraphrasing it into purely spiritual terms.
  doctrine_reference: Translation philosophy §§1, 3, 6
