id: EZK.16.32
reference: Ezekiel 16:32
source:
  edition: WLC
  text: הָ/אִשָּׁ֖ה הַ/מְּנָאָ֑פֶת תַּ֣חַת אִישָׁ֔/הּ תִּקַּ֖ח אֶת זָרִֽים־׃
translation:
  text: The adulterous wife takes strangers instead of her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The woman who commits adultery takes other men in place of her husband.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: Although the noun can mean either 'woman' or 'wife,' the following phrase
    'instead of her husband' makes the marital sense explicit, so 'wife' best reflects
    the context.
- source_word: הַמְּנָאָפֶת
  chosen: adulterous
  alternatives:
  - who commits adultery
  - adulteress
  lexicon: HALOT
  rationale: The participle describes her as characterized by adultery. 'Adulterous'
    is concise, natural English and preserves the attributive force. 'Adulteress'
    is possible but sounds more archaic and less natural for the target style.
- source_word: תַּחַת
  chosen: instead of
  alternatives:
  - under
  - in place of
  lexicon: HALOT
  rationale: Here the preposition marks substitution or exchange, not spatial position.
    'Instead of' best conveys the sense that she takes others in place of her husband.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In marital context אִישׁ with 3fs suffix is most naturally 'her husband.'
    This makes explicit the covenantal betrayal in the metaphor.
- source_word: תִּקַּח
  chosen: takes
  alternatives:
  - receives
  - accepts
  lexicon: HALOT
  rationale: The verb לקח commonly means 'take.' Present-tense English fits the prophetic
    denunciation and keeps the action vivid.
- source_word: אֶת
  chosen: '[direct object marker omitted in translation]'
  lexicon: Hebrew grammar
  rationale: אֶת marks the definite direct object in Hebrew and is not represented
    by a separate English word.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - strange men
  - others
  lexicon: HALOT
  rationale: The term denotes outsiders/strangers. In this sexual and covenantal metaphor,
    'strangers' preserves both the literal and figurative force without over-specifying
    ethnicity. 'Foreigners' is possible but may imply nationality more strongly than
    the context requires.
