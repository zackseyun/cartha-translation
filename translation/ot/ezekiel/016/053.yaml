id: EZK.16.53
reference: Ezekiel 16:53
source:
  edition: WLC
  text: וְ/שַׁבְתִּי֙ אֶת שְׁבִ֣יתְ/הֶ֔ן אֶת שבית סְדֹם֙ וּ/בְנוֹתֶ֔י/הָ וְ/אֶת שבית
    שֹׁמְר֖וֹן וּ/בְנוֹתֶ֑י/הָ ו/שבית שְׁבִיתַ֖יִ/ךְ בְּ/תוֹכָֽ/הְנָה־־־׃
translation:
  text: And I will restore their fortunes—the fortunes of Sodom and her daughters,
    and the fortunes of Samaria and her daughters—and your fortunes among them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'restore their captivity' / 'bring back their captives.' The Hebrew idiom
      often means to reverse a people's condition and so can be rendered 'restore
      fortunes.'
    reason: lexical_alternative
  - marker: b
    text: '''Daughters'' here refers to dependent towns or surrounding settlements
      associated with Sodom and Samaria.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשַׁבְתִּי
  chosen: And I will restore
  alternatives:
  - And I will bring back
  - And I will return
  lexicon: HALOT
  rationale: From שוב in the Hiphil/causative sense here, introducing reversal/restoration.
    In this idiom with שְׁבִית/שבות, English 'restore' best captures the sense of
    reversing a condition rather than merely physical movement.
- source_word: שְׁבִיתְהֶן / שבית / שְׁבִיתַיִךְ
  chosen: fortunes
  alternatives:
  - captivity
  - captives
  lexicon: HALOT
  rationale: The idiom שׁוּב שְׁבוּת/שְׁבִית commonly means 'restore fortunes' or
    'reverse captivity.' Since Sodom is in view, a strictly literal 'bring back the
    captivity/captives' is awkward and likely not the intended idiomatic force. 'Fortunes'
    preserves the broader restoration sense in readable English while remaining faithful
    to the Hebrew idiom.
- source_word: סְדֹם
  chosen: Sodom
  rationale: Standard transliteration of the place name.
- source_word: וּבְנוֹתֶיהָ
  chosen: and her daughters
  alternatives:
  - and her towns
  - and her dependent villages
  lexicon: HALOT
  rationale: Literally 'daughters.' In prophetic/geographical usage this refers to
    dependent towns or surrounding settlements. The literal rendering is retained
    because it is standard biblical imagery and preserves the metaphorical relationship;
    the geographic sense can be clarified in a footnote.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  rationale: Standard English form of the place name.
- source_word: בְּתוֹכָהְנָה
  chosen: among them
  alternatives:
  - in their midst
  - in the midst of them
  lexicon: HALOT
  rationale: The preposition plus 'midst' idiomatically means being situated among
    or in the midst of the others. 'Among them' is natural modern English and fits
    the comparative/restorative context.
