theological_decisions:
- issue: Meaning of the restoration idiom in a judgment-restoration oracle
  chosen_reading: Render the idiom as restoration of fortunes rather than a narrowly
    literal return from captivity.
  alternative_readings:
  - restore their captivity
  - bring back their captives
  rationale: The verse uses a standard Hebrew restoration formula. In this context,
    including Sodom, the idiom likely signals reversal/restoration more broadly rather
    than a simple historical repatriation. This preserves the prophetic force without
    over-specifying the mechanism of restoration.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referent of 'daughters' for Sodom and Samaria
  chosen_reading: Keep the familial metaphor in the main text.
  alternative_readings:
  - towns
  - villages
  rationale: The Hebrew uses the metaphorical term 'daughters' for dependent communities.
    Retaining it preserves the imagery and inter-city familial language of the chapter,
    while a footnote can explain the geographic sense.
  doctrine_reference: Translation philosophy §1, §6
