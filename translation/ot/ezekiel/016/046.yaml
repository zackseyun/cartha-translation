theological_decisions:
- issue: Geographical language of left/right in relation to Jerusalem
  chosen_reading: Preserve the relational spatial terms 'to your left' and 'to your
    right' in the main text.
  alternative_readings:
  - Interpret as 'north of you' and 'south of you'
  rationale: The Hebrew uses body-oriented spatial language, not explicit compass
    terms. Preserving 'left/right' maintains the source imagery and avoids importing
    an interpretive geographic explanation into the text itself. Because the geographic
    implication may help readers, it is suitable for a footnote rather than the main
    translation.
  doctrine_reference: Translation philosophy §1, §3, §6
