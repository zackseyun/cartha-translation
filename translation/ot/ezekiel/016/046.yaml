id: EZK.16.46
reference: Ezekiel 16:46
source:
  edition: WLC
  text: וַ/אֲחוֹתֵ֨/ךְ הַ/גְּדוֹלָ֤ה שֹֽׁמְרוֹן֙ הִ֣יא וּ/בְנוֹתֶ֔י/הָ הַ/יּוֹשֶׁ֖בֶת
    עַל שְׂמֹאולֵ֑/ךְ וַ/אֲחוֹתֵ֞/ךְ הַ/קְּטַנָּ֣ה מִמֵּ֗/ךְ הַ/יּוֹשֶׁ֨בֶת֙ מִֽ/ימִינֵ֔/ךְ
    סְדֹ֖ם וּ/בְנוֹתֶֽי/הָ־׃
translation:
  text: Your older sister is Samaria, she and her daughters, who dwell to your left;
    and your younger sister than you, who dwells to your right, is Sodom and her daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, from Jerusalem's perspective, Samaria is to the north and Sodom
      to the south.
    reason: cultural_note
lexical_decisions:
- source_word: אֲחוֹתֵךְ
  chosen: your sister
  alternatives:
  - your kinswoman
  lexicon: HALOT
  rationale: Literal kinship term used metaphorically for related cities/peoples in
    this allegory. 'Sister' preserves the familial imagery central to the chapter.
- source_word: הַגְּדוֹלָה
  chosen: older
  alternatives:
  - greater
  - larger
  lexicon: HALOT
  rationale: Though literally 'great/big,' in relation to sisters English idiom prefers
    'older sister.' This fits the comparative family metaphor better than 'greater
    sister.'
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וּבְנוֹתֶיהָ
  chosen: she and her daughters
  alternatives:
  - and her daughter towns
  - and her dependent towns
  lexicon: HALOT
  rationale: '''Daughters'' is the literal term and commonly refers to dependent towns/cities.
    Retaining ''daughters'' preserves the metaphor; adding ''she and'' reflects the
    appositional structure with Samaria as the principal city and its satellite communities.'
- source_word: הַיּוֹשֶׁבֶת
  chosen: who dwell
  alternatives:
  - who live
  - who sit
  lexicon: HALOT
  rationale: The participle of ישׁב commonly means 'dwell/live.' Plural English is
    used in the first clause because the referent is Samaria together with her daughters.
- source_word: עַל שְׂמֹאולֵךְ
  chosen: to your left
  alternatives:
  - on your left
  - north of you
  lexicon: HALOT
  rationale: Literally 'on your left.' 'To your left' is natural English and preserves
    the spatial metaphor without over-interpreting it as a compass direction in the
    main text.
- source_word: הַקְּטַנָּה מִמֵּךְ
  chosen: your younger sister than you
  alternatives:
  - your smaller sister than you
  - your lesser sister than you
  lexicon: HALOT
  rationale: The adjective literally means 'small,' but in sibling comparison English
    idiom prefers 'younger.' The comparative phrase מִמֵּךְ is preserved with 'than
    you,' making explicit the comparison present in Hebrew.
- source_word: מִימִינֵךְ
  chosen: to your right
  alternatives:
  - on your right
  - south of you
  lexicon: HALOT
  rationale: Literally 'from/on your right.' 'To your right' is idiomatic and preserves
    the spatial orientation without forcing a geographic gloss into the main text.
- source_word: סְדֹם
  chosen: Sodom
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וּבְנוֹתֶיהָ
  chosen: and her daughters
  alternatives:
  - and her daughter towns
  - and her dependent towns
  lexicon: HALOT
  rationale: Literal rendering retained for consistency with the first occurrence
    and to preserve the city-family metaphor.
