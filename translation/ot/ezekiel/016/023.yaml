id: EZK.16.23
reference: Ezekiel 16:23
source:
  edition: WLC
  text: וַ/יְהִ֕י אַחֲרֵ֖י כָּל רָעָתֵ֑/ךְ א֣וֹי א֣וֹי לָ֔/ךְ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃
translation:
  text: And it came about, after all your wickedness—woe, woe to you! declares the Lord GOD—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''woe, woe to you,'' a doubled cry intensifying the lament and judgment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'And it happened, after all your evil.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it came about
  alternatives:
  - And it happened
  - Then it was
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces the next development in the discourse. 'And it came about' preserves the narrative/discourse transition in readable modern English without sounding overly wooden.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Standard temporal preposition meaning 'after' in this context.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew.
- source_word: רָעָתֵךְ
  chosen: your wickedness
  alternatives:
  - your evil
  - your wrongdoing
  lexicon: HALOT
  rationale: רָעָה here refers to moral evil rather than merely misfortune. 'Wickedness' best conveys the ethical weight in Ezekiel's indictment.
- source_word: אוֹי אוֹי לָךְ
  chosen: woe, woe to you!
  alternatives:
  - alas, alas for you!
  - woe to you, woe to you!
  lexicon: HALOT
  rationale: The doubled interjection intensifies lament/judgment. 'Woe, woe to you!' preserves both repetition and prophetic force in natural English.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: In prophetic formulae, 'declares' is idiomatic modern English and accurately conveys the divine pronouncement formula.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound divine title אֲדֹנָי יְהוִה is conventionally rendered 'the Lord GOD' in English. This also aligns with the doctrine guideline to render יְהוָה as 'the LORD'; in this compound, 'GOD' avoids the awkward 'Lord LORD' while signaling the divine name.
