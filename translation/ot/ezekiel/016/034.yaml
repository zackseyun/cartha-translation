id: EZK.16.34
reference: Ezekiel 16:34
source:
  edition: WLC
  text: וַ/יְהִי בָ֨/ךְ הֵ֤פֶךְ מִן הַ/נָּשִׁים֙ בְּ/תַזְנוּתַ֔יִ/ךְ וְ/אַחֲרַ֖יִ/ךְ
    לֹ֣א זוּנָּ֑ה וּ/בְ/תִתֵּ֣/ךְ אֶתְנָ֗ן וְ/אֶתְנַ֛ן לֹ֥א נִתַּן לָ֖/ךְ וַ/תְּהִ֥י
    לְ/הֶֽפֶךְ־־־׃
translation:
  text: 'And in your prostitution you were the opposite of other women: no one solicited
    you, but you gave payment, and no payment was given to you; so you became the
    opposite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'after you no one prostituted himself'; the sense is that unlike
      ordinary prostitutes, you were not sought out by clients.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵפֶךְ / לְהֶפֶךְ
  chosen: the opposite / the opposite
  alternatives:
  - a reversal
  - contrary
  - perverse opposite
  lexicon: HALOT
  rationale: The noun denotes an inversion or reversal. Rendering it as 'the opposite'
    preserves the repeated framing at both the beginning and end of the verse and
    communicates the ironic inversion of normal prostitution practice in context.
- source_word: תַזְנוּתַיִךְ
  chosen: your prostitution
  alternatives:
  - your whorings
  - your harlotry
  lexicon: HALOT
  rationale: The term refers to acts of prostitution, here in Ezekiel's extended metaphor
    for Jerusalem's unfaithfulness. 'Prostitution' is clear modern English and avoids
    archaic diction while retaining the sexualized force of the metaphor.
- source_word: וְאַחֲרַיִךְ לֹא זוּנָּה
  chosen: no one solicited you
  alternatives:
  - no one went whoring after you
  - none sought you for prostitution
  - after you no one played the prostitute
  lexicon: HALOT
  rationale: Literally, 'after you one did not prostitute oneself.' In context this
    means men were not pursuing her as a prostitute in the ordinary way. 'No one solicited
    you' captures the idiomatic sense in readable English without flattening the shame
    rhetoric.
- source_word: אֶתְנָן
  chosen: payment
  alternatives:
  - wages
  - fee
  - prostitute's pay
  lexicon: HALOT
  rationale: The noun is the payment associated with prostitution. 'Payment' is natural
    in English and works in both clauses, preserving the contrast between giving and
    receiving.
- source_word: וּבְתִתֵּךְ אֶתְנָן
  chosen: but you gave payment
  alternatives:
  - while you gave wages
  - in that you gave a fee
  lexicon: HALOT
  rationale: 'The infinitive construct with preposition marks the circumstance that
    made her conduct inverted: instead of receiving payment, she gave it. ''But''
    brings out the adversative force in context.'
- source_word: וְאֶתְנַן לֹא נִתַּן לָךְ
  chosen: and no payment was given to you
  alternatives:
  - and wages were not given to you
  - and you were not paid
  lexicon: HALOT
  rationale: A passive rendering closely follows the Hebrew and preserves the explicit
    repetition of the prostitution-payment term.
- source_word: וַתְּהִי
  chosen: so you became
  alternatives:
  - and you were
  - and you came to be
  lexicon: HALOT
  rationale: The verb marks the resulting state. 'So you became' makes the conclusion
    of the verse explicit and idiomatic in English.
