theological_decisions:
- issue: Metaphorical sexual language for Jerusalem's unfaithfulness
  chosen_reading: Retain the prostitution metaphor directly
  alternative_readings:
  - Soften to 'unfaithfulness' or 'idolatry' in the main text
  rationale: Ezekiel intentionally uses shocking sexualized imagery to portray Jerusalem's
    covenant infidelity. The translation should preserve that rhetoric rather than
    resolve it into a less offensive abstraction.
  doctrine_reference: Translation philosophy §§1, 6
