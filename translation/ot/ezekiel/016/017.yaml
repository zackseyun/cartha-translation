theological_decisions:
- issue: Prophetic sexual metaphor for idolatry
  chosen_reading: Retain explicit sexualized language ('prostituted yourself') rather
    than soften to a generic statement of unfaithfulness.
  alternative_readings:
  - were unfaithful with them
  - committed idolatry with them
  rationale: Ezekiel intentionally uses shocking sexual imagery to portray Jerusalem's
    covenant breach. Preserving that metaphor reflects the Hebrew's rhetorical force
    and avoids importing a less vivid theological interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nature of צַלְמֵי זָכָר
  chosen_reading: Translate as 'male images' in the main text, leaving the idolatrous
    implication to context.
  alternative_readings:
  - male idols
  - images of males used for illicit worship
  rationale: The broader context clearly concerns idolatry, but the noun itself is
    'images.' Using 'male images' keeps closer to the source text while allowing readers
    to see the sexualized and cultic dimensions together.
  doctrine_reference: Translation philosophy §§1, 5
