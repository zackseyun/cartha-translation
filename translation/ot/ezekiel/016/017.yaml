id: EZK.16.17
reference: Ezekiel 16:17
source:
  edition: WLC
  text: וַ/תִּקְחִ֞י כְּלֵ֣י תִפְאַרְתֵּ֗/ךְ מִ/זְּהָבִ֤/י וּ/מִ/כַּסְפִּ/י֙ אֲשֶׁ֣ר
    נָתַ֣תִּי לָ֔/ךְ וַ/תַּעֲשִׂי לָ֖/ךְ צַלְמֵ֣י זָכָ֑ר וַ/תִּזְנִי בָֽ/ם־־׃
translation:
  text: You took your beautiful jewels from my gold and my silver, which I had given
    to you, and made for yourself male images, and you prostituted yourself with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your splendid ornaments' or 'your beautiful articles.' The Hebrew term
      can refer broadly to objects or articles, but here likely means ornamental items
      made from precious metals.
    reason: lexical_alternative
  - marker: b
    text: Or 'male idols' or 'images in the form of males.'
    reason: alternative_reading
  - marker: c
    text: The expression 'prostituted yourself' renders a recurring prophetic metaphor
      for covenant unfaithfulness expressed through idolatry.
    reason: cultural_note
lexical_decisions:
- source_word: כְּלֵי תִפְאַרְתֵּךְ
  chosen: your beautiful jewels
  alternatives:
  - your splendid vessels
  - your beautiful ornaments
  - your glorious articles
  lexicon: HALOT
  rationale: כְּלִי is a broad term for article/object/vessel, but in this context
    of adornment from gold and silver, 'jewels' or 'ornaments' best captures the referent
    in natural English. תִפְאַרְתֵּךְ adds the sense of beauty/splendor, so 'beautiful
    jewels' conveys both the material and ornamental force.
- source_word: מִזְּהָבִי וּמִכַּסְפִּי
  chosen: from my gold and my silver
  alternatives:
  - made of my gold and my silver
  - with my gold and my silver
  lexicon: HALOT
  rationale: 'The preposition מִן with the materials naturally indicates source material.
    ''From my gold and my silver'' preserves the possessive emphasis: these precious
    materials belonged to the speaker and had been given to Jerusalem.'
- source_word: אֲשֶׁר נָתַתִּי לָךְ
  chosen: which I had given to you
  alternatives:
  - which I gave you
  lexicon: HALOT
  rationale: The clause identifies the gold and silver as gifts from the speaker.
    English past perfect fits the retrospective accusation in context, though simple
    past would also be possible.
- source_word: וַתַּעֲשִׂי לָךְ
  chosen: and made for yourself
  alternatives:
  - and made for yourself out of them
  - and fashioned for yourself
  lexicon: HALOT
  rationale: 'The reflexive sense of לָךְ is important: Jerusalem used the gifts for
    her own illicit purposes. ''Made for yourself'' preserves that self-directed force.'
- source_word: צַלְמֵי זָכָר
  chosen: male images
  alternatives:
  - images of a male
  - male idols
  - images in the form of males
  lexicon: HALOT
  rationale: צֶלֶם means image/figure. זָכָר is explicitly 'male.' 'Male images' is
    concise and preserves the shocking sexualized idolatry of the Hebrew without over-interpreting
    beyond the text. 'Idols' is interpretive and therefore left as an alternative.
- source_word: וַתִּזְנִי בָם
  chosen: and you prostituted yourself with them
  alternatives:
  - and you played the whore with them
  - and you committed whoredom with them
  - and you were sexually immoral with them
  lexicon: HALOT
  rationale: זנה is a key metaphor in prophetic literature for covenantal unfaithfulness
    expressed as sexual infidelity. 'Prostituted yourself' preserves the sexual and
    metaphorical force in readable modern English better than the archaic 'played
    the whore,' while avoiding the flattening of merely 'were unfaithful.' The preposition
    בָם is rendered 'with them.'
