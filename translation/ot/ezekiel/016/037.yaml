theological_decisions:
- issue: Prophetic sexual-shame metaphor for Jerusalem's judgment
  chosen_reading: Retain the concrete language of 'lovers' and 'nakedness' rather
    than softening into purely political terms.
  alternative_readings:
  - Render more abstractly as allies/partners and shame/disgrace
  rationale: The chapter intentionally uses marital and sexual imagery to portray
    covenant unfaithfulness and public judgment. Preserving the metaphor maintains
    the text's theological and rhetorical force without importing additional doctrinal
    claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
