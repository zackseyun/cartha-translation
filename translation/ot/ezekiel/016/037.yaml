id: EZK.16.37
reference: Ezekiel 16:37
source:
  edition: WLC
  text: לָ֠/כֵן הִנְ/נִ֨י מְקַבֵּ֤ץ אֶת כָּל מְאַהֲבַ֨יִ/ךְ֙ אֲשֶׁ֣ר עָרַ֣בְתְּ עֲלֵי/הֶ֔ם
    וְ/אֵת֙ כָּל אֲשֶׁ֣ר אָהַ֔בְתְּ עַ֖ל כָּל אֲשֶׁ֣ר שָׂנֵ֑את וְ/קִבַּצְתִּי֩ אֹתָ֨/ם
    עָלַ֜יִ/ךְ מִ/סָּבִ֗יב וְ/גִלֵּיתִ֤י עֶרְוָתֵ/ךְ֙ אֲלֵ/הֶ֔ם וְ/רָא֖וּ אֶת כָּל
    עֶרְוָתֵֽ/ךְ־־־־־־׃
translation:
  text: Therefore, behold, I am gathering all your lovers with whom you found pleasure,
    and all whom you loved, along with all whom you hated; and I will gather them
    against you from every side, and I will uncover your nakedness to them, and they
    will see all your nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in whom you delighted.' The Hebrew verb can denote taking pleasure or
      delight.
    reason: lexical_alternative
  - marker: b
    text: That is, all categories of her illicit partners and enemies alike are summoned
      for judgment.
    reason: cultural_note
  - marker: c
    text: '''Uncover your nakedness'' is prophetic shame language for public exposure
      and humiliation.'
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    indictment; 'Therefore' preserves prophetic judicial force.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - see, I am
  lexicon: HALOT
  rationale: The particle plus pronoun heightens immediacy and solemnity. Retaining
    'behold' preserves the prophetic announcement tone without excessive paraphrase.
- source_word: מְקַבֵּץ
  chosen: am gathering
  alternatives:
  - am about to gather
  - gather
  lexicon: HALOT
  rationale: Participial form with הִנְנִי conveys imminent or certain action. 'Am
    gathering' reflects the Hebrew aspect while remaining natural English.
- source_word: מְאַהֲבַיִךְ
  chosen: your lovers
  alternatives:
  - those who love you
  - your paramours
  lexicon: HALOT
  rationale: In Ezekiel 16 the metaphor is explicitly sexual and covenantal; 'lovers'
    best matches the accusatory imagery of illicit alliances/adulterous partners.
- source_word: אֲשֶׁר עָרַבְתְּ עֲלֵיהֶם
  chosen: with whom you found pleasure
  alternatives:
  - in whom you delighted
  - with whom you were pleasing yourself
  lexicon: HALOT
  rationale: ערב in this context denotes taking pleasure/delight. 'With whom you found
    pleasure' fits the relational construction and preserves the sexualized metaphor.
- source_word: וְאֵת כָּל אֲשֶׁר אָהַבְתְּ
  chosen: and all whom you loved
  alternatives:
  - even all whom you loved
  lexicon: HALOT
  rationale: Straightforward rendering of the second group, preserving the personal
    object and emotional attachment.
- source_word: עַל כָּל אֲשֶׁר שָׂנֵאת
  chosen: along with all whom you hated
  alternatives:
  - as well as all whom you hated
  - against all whom you hated
  lexicon: HALOT
  rationale: The preposition here functions inclusively/comparatively, extending the
    list to include both loved and hated parties. 'Along with' communicates that all
    categories are included.
- source_word: וְקִבַּצְתִּי אֹתָם עָלַיִךְ מִסָּבִיב
  chosen: and I will gather them against you from every side
  alternatives:
  - and I will assemble them against you all around
  - and I will gather them to you from all around
  lexicon: HALOT
  rationale: עָלַיִךְ in a judgment context is adversative ('against you'), not merely
    directional. מִסָּבִיב is idiomatically 'from every side'/'all around.'
- source_word: וְגִלֵּיתִי עֶרְוָתֵךְ
  chosen: and I will uncover your nakedness
  alternatives:
  - and I will expose your nakedness
  - and I will lay bare your nakedness
  lexicon: HALOT
  rationale: This is standard shame/judgment language in prophetic sexual metaphor.
    'Uncover' is slightly more formal and preserves the idiomatic connection to Hebrew
    usage.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - before them
  - in their sight
  lexicon: HALOT
  rationale: The preposition is literally 'to them'; in English this naturally conveys
    exposure in their presence. A more interpretive rendering is unnecessary in the
    main text.
- source_word: וְרָאוּ אֶת כָּל עֶרְוָתֵךְ
  chosen: and they will see all your nakedness
  alternatives:
  - and they will see your whole nakedness
  - and they will look on all your nakedness
  lexicon: HALOT
  rationale: Retains the repetition of עֶרְוָה for rhetorical force and shame imagery.
    'All your nakedness' is literal and emphatic.
