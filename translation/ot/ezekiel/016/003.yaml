theological_decisions:
- issue: Figurative ancestry of Jerusalem
  chosen_reading: Render the genealogy language straightforwardly as metaphorical
    accusation without adding interpretive explanation into the main text.
  alternative_readings:
  - Expand the sense to 'your ancestry is Canaanite'
  - Interpret more explicitly as moral/spiritual resemblance rather than origin
  rationale: The verse uses shocking familial imagery to indict Jerusalem by associating
    her with the pre-Israelite peoples of the land. The translation should preserve
    the force of the metaphor without softening it or importing a doctrinal explanation
    not stated in the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: This preserves the distinction between אֲדֹנָי and יְהוָה while honoring
    the project's default treatment of YHWH as 'the LORD' in a form that reads naturally
    in English.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
