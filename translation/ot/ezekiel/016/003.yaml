id: EZK.16.3
reference: Ezekiel 16:3
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֞ כֹּה אָמַ֨ר אֲדֹנָ֤/י יְהוִה֙ לִ/יר֣וּשָׁלִַ֔ם מְכֹרֹתַ֨יִ/ךְ֙
    וּ/מֹ֣לְדֹתַ֔יִ/ךְ מֵ/אֶ֖רֶץ הַֽ/כְּנַעֲנִ֑י אָבִ֥י/ךְ הָ/אֱמֹרִ֖י וְ/אִמֵּ֥/ךְ
    חִתִּֽית־׃
translation:
  text: 'and say, ‘Thus says the Lord GOD to Jerusalem: Your origin and your birth
    are from the land of the Canaanite; your father was an Amorite, and your mother
    a Hittite.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, “from the land of Canaan.” The Hebrew more literally
      reads “from the land of the Canaanite,” preserving the ethnic emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered by the project default 'the LORD,'
    but in the fixed Hebrew combination אֲדֹנָי יְהוִה, standard English avoids 'Lord
    LORD.' 'the Lord GOD' preserves both elements distinctly and communicates the
    title-name combination naturally in English.
- source_word: לִירוּשָׁלִַם
  chosen: to Jerusalem
  lexicon: HALOT
  rationale: Directional ל marks the addressee. The city name is transliterated as
    a proper name per translation philosophy.
- source_word: מְכֹרֹתַיִךְ
  chosen: your origin
  alternatives:
  - your source
  - your extraction
  - your ancestry
  lexicon: HALOT
  rationale: This noun refers to source or origin, not merely commercial 'sale.' In
    parallel with 'your birth,' it points to Jerusalem's figurative ethnic provenance.
    'Origin' is idiomatic and preserves the metaphor of derivation.
- source_word: מוֹלְדֹתַיִךְ
  chosen: your birth
  alternatives:
  - your nativity
  - your begetting
  - your lineage
  lexicon: HALOT
  rationale: The term denotes birth or nativity. 'Birth' is the clearest modern English
    rendering and pairs naturally with 'origin' in the parallel structure.
- source_word: מֵאֶרֶץ הַכְּנַעֲנִי
  chosen: from the land of the Canaanite
  alternatives:
  - from the land of Canaan
  - from Canaanite land
  lexicon: HALOT
  rationale: The Hebrew uses the gentilic singular with 'land,' literally 'the land
    of the Canaanite.' Retaining 'Canaanite' rather than smoothing to 'Canaan' preserves
    the ethnic force that prepares for 'Amorite' and 'Hittite' in the next clause.
- source_word: אָבִיךְ הָאֱמֹרִי
  chosen: your father was an Amorite
  alternatives:
  - your father, the Amorite
  - your father is the Amorite
  lexicon: HALOT
  rationale: A verbless clause in Hebrew is naturally rendered with 'was' in English.
    The phrase is metaphorical/taunting genealogy, not literal parentage. 'An Amorite'
    is idiomatic English for the gentilic.
- source_word: וְאִמֵּךְ חִתִּית
  chosen: and your mother a Hittite
  alternatives:
  - and your mother was a Hittite
  lexicon: HALOT
  rationale: The second verbless clause is rendered elliptically in English for style,
    with the implied 'was' understood from the previous clause. 'Hittite' is the standard
    gentilic rendering.
- source_word: וְאָמַרְתָּ ... כֹּה אָמַר
  chosen: and say, ‘Thus says
  alternatives:
  - and say, ‘Thus said
  - and you shall say, ‘Thus says
  lexicon: HALOT
  rationale: The sequence introduces prophetic speech. English present 'Thus says'
    is the conventional and contextually appropriate rendering for the prophetic messenger
    formula.
