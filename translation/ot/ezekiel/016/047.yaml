id: EZK.16.47
reference: Ezekiel 16:47
source:
  edition: WLC
  text: וְ/לֹ֤א בְ/דַרְכֵי/הֶן֙ הָלַ֔כְתְּ וּ/בְ/תוֹעֲבֽוֹתֵי/הֶ֖ן עשיתי כִּ/מְעַ֣ט
    קָ֔ט וַ/תַּשְׁחִ֥תִי מֵ/הֵ֖ן בְּ/כָל דְּרָכָֽיִ/ךְ־׃
translation:
  text: Yet you did not walk in their ways or act according to their abominations;
    as if that were too little, you became more corrupt than they in all your ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'and you did/committed their abominations.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''as a very little thing,'' meaning that even matching their
      sins was not enough; Jerusalem went beyond them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּדַרְכֵיהֶן ... הָלַכְתְּ
  chosen: walk in their ways
  alternatives:
  - followed their ways
  - walked in their paths
  lexicon: HALOT
  rationale: The idiom הלך בְּדֶרֶךְ commonly means to conduct oneself according to
    a pattern of life. 'Walk in their ways' preserves the Hebrew metaphor while remaining
    natural English.
- source_word: וּבְתוֹעֲבוֹתֵיהֶן עָשִׂיתִי
  chosen: act according to their abominations
  alternatives:
  - did their abominations
  - committed their abominations
  lexicon: HALOT
  rationale: The ketiv-like form in the provided text reflects 2fs sense in context
    ('you did'). Because עשה with תועבות can mean to practice/commit abominations,
    'act according to their abominations' keeps the verbal link while avoiding awkward
    English. A more literal alternative is preserved in a footnote.
- source_word: תּוֹעֵבָה
  chosen: abominations
  alternatives:
  - detestable things
  lexicon: HALOT
  rationale: '''Abominations'' is the established and semantically weighty rendering
    for Ezekiel''s cultic-moral denunciations, matching the strong force of the Hebrew.'
- source_word: כִּמְעַט קָט
  chosen: as if that were too little
  alternatives:
  - as a very little thing
  - almost a little
  lexicon: HALOT
  rationale: 'The phrase is idiomatic and elliptical. In context it introduces escalation:
    not only did Jerusalem match others, she exceeded them. ''As if that were too
    little'' captures the rhetorical force better than a wooden rendering.'
- source_word: וַתַּשְׁחִתִי
  chosen: you became more corrupt
  alternatives:
  - you acted more corruptly
  - you corrupted yourself more
  lexicon: HALOT
  rationale: From שׁחת in this context of moral degradation, the sense is intransitive/reflexive
    corruption. 'You became more corrupt' is clear modern English and fits the comparison
    with Samaria and Sodom.
- source_word: מֵהֵן
  chosen: than they
  alternatives:
  - than them
  lexicon: HALOT
  rationale: The comparative מן after a corruption verb yields 'more ... than they.'
    'Than they' is slightly more formal but reads well in this elevated prophetic
    context.
- source_word: בְּכָל דְּרָכָיִךְ
  chosen: in all your ways
  alternatives:
  - in all your conduct
  - in all your paths
  lexicon: HALOT
  rationale: Retains the repeated דרך motif and conveys comprehensive conduct. 'Ways'
    also echoes the earlier phrase for rhetorical cohesion.
