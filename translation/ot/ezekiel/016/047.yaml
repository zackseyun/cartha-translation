theological_decisions:
- issue: Degree of Jerusalem's guilt relative to Samaria and Sodom
  chosen_reading: Jerusalem is portrayed as surpassing them in corruption, not merely
    imitating them.
  alternative_readings:
  - Jerusalem only slightly deviated before becoming corrupt
  - Jerusalem did not walk in their ways but still became corrupt in a different sense
  rationale: 'The syntax of כִּמְעַט קָט followed by וַתַּשְׁחִתִי מֵהֵן בְּכָל דְּרָכָיִךְ
    is best taken as rhetorical escalation: their sins were ''too little'' for Jerusalem,
    who exceeded them in corruption. This preserves the prophetic indictment without
    importing later doctrinal categories.'
  doctrine_reference: Translation philosophy §3 (preserve tension where ambiguity
    exists)
