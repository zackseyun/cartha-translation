id: EZK.16.62
reference: Ezekiel 16:62
source:
  edition: WLC
  text: וַ/הֲקִימוֹתִ֥י אֲנִ֛י אֶת בְּרִיתִ֖/י אִתָּ֑/ךְ וְ/יָדַ֖עַתְּ כִּֽי אֲנִ֥י יְהוָֽה־־׃
translation:
  text: And I myself will establish my covenant with you, and you will know that I am Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַהֲקִימוֹתִי
  chosen: will establish
  alternatives:
  - will confirm
  - will uphold
  lexicon: HALOT
  rationale: Hiphil of קום here conveys causing the covenant to stand or be established. 'Establish' is natural English and fits covenantal context better than the more ambiguous 'raise up.' Future sense is appropriate in context.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - I indeed
  lexicon: HALOT
  rationale: The explicit independent pronoun adds emphasis beyond the verbal form. 'I myself' preserves that emphasis in idiomatic English.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  - my treaty
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term in biblical Hebrew, especially in divine-human relationship contexts. 'Covenant' preserves the theological and literary weight.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - with you (feminine singular)
  lexicon: HALOT
  rationale: The preposition simply marks covenant relation. English does not normally mark the feminine singular addressee in the main text; the context already identifies Jerusalem as the feminine addressee.
- source_word: וְיָדַעַתְּ
  chosen: and you will know
  alternatives:
  - then you will know
  - and you shall know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries a future/result sense. 'Will know' is clear modern English; 'then' is interpretive and not required in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
