theological_decisions:
- issue: Nature of the punishment imagery
  chosen_reading: Render the verse as a public, violent judgment against Jerusalem
    personified as a woman, without softening the legal-execution imagery.
  alternative_readings:
  - Render more generally as military attack without judicial overtones
  rationale: The sequence of assembling a group, stoning, and sword violence evokes
    formal communal punishment as well as conquest. The translation preserves that
    tension rather than reducing it to either purely legal or purely military imagery.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
