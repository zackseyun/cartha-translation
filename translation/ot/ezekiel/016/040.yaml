id: EZK.16.40
reference: Ezekiel 16:40
source:
  edition: WLC
  text: וְ/הֶעֱל֤וּ עָלַ֨יִ/ךְ֙ קָהָ֔ל וְ/רָגְמ֥וּ אוֹתָ֖/ךְ בָּ/אָ֑בֶן וּ/בִתְּק֖וּ/ךְ
    בְּ/חַרְבוֹתָֽ/ם׃
translation:
  text: They will bring up an assembly against you, and they will stone you with stones
    and cut you down with their swords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring an assembly against you.' The Hebrew verb can be rendered more
      idiomatically in English with 'bring against' rather than the more literal 'bring
      up.'
    reason: lexical_alternative
  - marker: b
    text: Or 'hack you to pieces with their swords.' The Hebrew verb suggests violent
      cutting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱלוּ
  chosen: they will bring up
  alternatives:
  - they will bring against
  - they will summon
  lexicon: HALOT
  rationale: Hiphil of עלה here has a causative sense, introducing hostile action
    taken against Jerusalem personified as a woman. 'Bring up' preserves the verbal
    imagery while fitting the idiom with the following עָלַיִךְ and object קָהָל.
- source_word: עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With hostile judicial or military action, עַל commonly carries adversative
    force. 'Against you' communicates the sense naturally in English.
- source_word: קָהָל
  chosen: an assembly
  alternatives:
  - a crowd
  - a congregation
  lexicon: HALOT
  rationale: קָהָל denotes an assembled group. 'Assembly' preserves the formal gathered
    sense and fits the punitive public setting better than the more religiously loaded
    'congregation' or the looser 'crowd'.
- source_word: וְרָגְמוּ
  chosen: they will stone
  alternatives:
  - they will pelt
  lexicon: HALOT
  rationale: רגם is the standard verb for execution or assault by stoning. 'Stone'
    is the direct and established English equivalent.
- source_word: בָּאָבֶן
  chosen: with stones
  alternatives:
  - with stone
  lexicon: HALOT
  rationale: Although morphologically singular with the article, the phrase functions
    idiomatically after 'stone' to express the means of stoning. English prefers the
    plural 'with stones' in this collocation.
- source_word: וּבִתְּקוּךְ
  chosen: cut you down
  alternatives:
  - hack you to pieces
  - cut you up
  lexicon: HALOT
  rationale: בתק conveys violent cutting or dismembering. 'Cut you down' communicates
    lethal sword violence in readable English without over-paraphrasing; 'hack you
    to pieces' is possible but more interpretive and vivid than necessary.
- source_word: בְּחַרְבוֹתָם
  chosen: with their swords
  alternatives:
  - by their swords
  lexicon: HALOT
  rationale: The preposition marks instrument. 'With their swords' is the most natural
    English rendering and preserves the plural possessive.
