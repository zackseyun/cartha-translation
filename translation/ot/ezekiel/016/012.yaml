id: EZK.16.12
reference: Ezekiel 16:12
source:
  edition: WLC
  text: וָ/אֶתֵּ֥ן נֶ֨זֶם֙ עַל אַפֵּ֔/ךְ וַ/עֲגִילִ֖ים עַל אָזְנָ֑יִ/ךְ וַ/עֲטֶ֥רֶת
    תִּפְאֶ֖רֶת בְּ/רֹאשֵֽׁ/ךְ־־׃
translation:
  text: And I put a ring on your nose, earrings on your ears, and a beautiful crown
    on your head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a nose-ring on your nose.' The Hebrew נֶזֶם often refers specifically
      to a nose ornament in such contexts.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a crown of beauty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  chosen: And I put
  alternatives:
  - And I gave
  - Then I put
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put/set.' In this adornment context
    with items placed on body parts, 'put' is the most natural English rendering while
    preserving the concrete action.
- source_word: נֶזֶם
  chosen: a ring
  alternatives:
  - a nose-ring
  - a jewel
  lexicon: HALOT
  rationale: נזם denotes a ring-like ornament, often for the nose in Hebrew usage.
    Because the following phrase specifies placement 'on your nose,' 'a ring' is sufficient
    in the main text without redundancy, while the body-part phrase clarifies the
    type.
- source_word: עַל אַפֵּךְ
  chosen: on your nose
  alternatives:
  - in your nose
  lexicon: HALOT
  rationale: אַף here refers to the nose. The preposition עַל is most straightforwardly
    'on.' English idiom for nose jewelry can be 'in,' but 'on your nose' stays closer
    to the Hebrew wording.
- source_word: וַעֲגִילִים
  chosen: earrings
  alternatives:
  - rings
  - hoop earrings
  lexicon: HALOT
  rationale: עגילים are ear ornaments; 'earrings' is the clear modern equivalent and
    fits the following phrase 'on your ears.'
- source_word: עַל אָזְנָיִךְ
  chosen: on your ears
  alternatives:
  - in your ears
  lexicon: HALOT
  rationale: The Hebrew again uses עַל ('on'). Although English may idiomatically
    say earrings are 'in' the ears, 'on your ears' is acceptable and more formally
    aligned with the source.
- source_word: וַעֲטֶרֶת תִּפְאֶרֶת
  chosen: a beautiful crown
  alternatives:
  - a splendid crown
  - a crown of beauty
  - a glorious crown
  lexicon: HALOT
  rationale: עטרת is 'crown,' and תפארת adds the sense of beauty, splendor, or glory.
    'A beautiful crown' is readable modern English that conveys the attributive force
    without sounding wooden.
- source_word: בְּרֹאשֵׁךְ
  chosen: on your head
  alternatives:
  - upon your head
  lexicon: HALOT
  rationale: With a crown, English idiom prefers 'on your head.' Though the Hebrew
    preposition is ב ('in/on/at'), the sense in context is placement upon the head.
