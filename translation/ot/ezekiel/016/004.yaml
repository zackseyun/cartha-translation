id: EZK.16.4
reference: Ezekiel 16:4
source:
  edition: WLC
  text: וּ/מוֹלְדוֹתַ֗יִ/ךְ בְּ/י֨וֹם הוּלֶּ֤דֶת אֹתָ/ךְ֙ לֹֽא כָרַּ֣ת שָׁרֵּ֔/ךְ
    וּ/בְ/מַ֥יִם לֹֽא רֻחַ֖צְתְּ לְ/מִשְׁעִ֑י וְ/הָמְלֵ֨חַ֙ לֹ֣א הֻמְלַ֔חַתְּ וְ/הָחְתֵּ֖ל
    לֹ֥א חֻתָּֽלְתְּ־־׃
translation:
  text: And as for your birth, on the day you were born your cord was not cut, and
    you were not washed with water to cleanse you; you were not rubbed with salt,
    and you were not wrapped in cloths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to rub you clean' or 'to smooth you.' The Hebrew term is rare, and interpreters
      differ on whether it emphasizes cleansing or rubbing the newborn's skin.
    reason: lexical_alternative
  - marker: b
    text: That is, according to an ancient newborn-care practice, the infant was rubbed
      with salt.
    reason: cultural_note
  - marker: c
    text: Or 'you were not swaddled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלְדוֹתַיִךְ
  chosen: your birth
  alternatives:
  - your origins
  - your nativity
  lexicon: HALOT
  rationale: The plural form functions idiomatically for circumstances of birth/origin.
    'Your birth' is the most natural English rendering here and fits the following
    temporal phrase 'on the day you were born.' 'Origins' is possible but sounds broader
    than the immediate childbirth imagery.
- source_word: בְּיוֹם הוּלֶּדֶת אֹתָךְ
  chosen: on the day you were born
  alternatives:
  - in the day you were born
  lexicon: HALOT
  rationale: A straightforward temporal clause. Modern English prefers 'on the day'
    rather than the more literal but less natural 'in the day.'
- source_word: שָׁרֵךְ
  chosen: your cord
  alternatives:
  - your navel cord
  - your umbilical cord
  lexicon: HALOT
  rationale: The referent is the newborn's umbilical cord. 'Your cord' is concise
    and natural in context; 'umbilical cord' is more explicit but slightly more clinical
    than the surrounding style.
- source_word: כָרַּת
  chosen: was not cut
  alternatives:
  - was not severed
  lexicon: HALOT
  rationale: Passive English best reflects the Hebrew verbal sense with the cord as
    subject. 'Cut' is plain and idiomatic.
- source_word: רֻחַצְתְּ בְמַיִם
  chosen: you were not washed with water
  alternatives:
  - you were not bathed in water
  lexicon: HALOT
  rationale: This refers to post-birth washing. 'Washed with water' preserves the
    Hebrew wording and avoids overinterpreting the extent of the action.
- source_word: לְמִשְׁעִי
  chosen: to cleanse you
  alternatives:
  - for cleansing
  - to make you clean
  - to smooth you
  lexicon: HALOT
  rationale: The noun is rare and contextually tied to washing a newborn. 'To cleanse
    you' captures the likely purpose/result in clear English. Some take it as 'to
    rub/smooth,' but in context the broader cleansing sense is preferable in the main
    text.
- source_word: הָמְלֵחַ ... הֻמְלַחַתְּ
  chosen: you were not rubbed with salt
  alternatives:
  - you were not salted
  - you were not cleansed with salt
  lexicon: HALOT
  rationale: The Hebrew refers to the ancient practice of salting a newborn. 'Rubbed
    with salt' communicates the action more clearly than the bare 'salted,' which
    could sound culinary in English.
- source_word: הָחְתֵּל ... חֻתָּלְתְּ
  chosen: you were not wrapped in cloths
  alternatives:
  - you were not swaddled
  - you were not swaddled with bands
  lexicon: HALOT
  rationale: The verb denotes swaddling/binding a newborn. 'Wrapped in cloths' is
    accessible modern English; 'swaddled' is accurate but less immediately transparent
    for some readers.
