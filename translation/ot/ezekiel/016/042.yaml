theological_decisions:
- issue: Rendering divine emotional terms in a covenant-judicial context
  chosen_reading: Use 'wrath' and 'jealousy' as real covenantal terms without softening
    them into mere displeasure or abstract zeal.
  alternative_readings:
  - Use 'fury' for חֵמָה
  - Use 'zeal' for קִנְאָה
  rationale: The verse depicts Yahweh's response to covenant unfaithfulness using
    marital and judicial imagery. 'Jealousy' should be preserved rather than generalized
    to 'zeal,' because the chapter's metaphor is explicitly spousal. Likewise, 'wrath'
    retains the moral and judicial force of divine anger without importing uncontrolled
    passion.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
