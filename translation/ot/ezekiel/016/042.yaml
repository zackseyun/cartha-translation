id: EZK.16.42
reference: Ezekiel 16:42
source:
  edition: WLC
  text: וַ/הֲנִחֹתִ֤י חֲמָתִ/י֙ בָּ֔/ךְ וְ/סָ֥רָה קִנְאָתִ֖/י מִמֵּ֑/ךְ וְ/שָׁ֣קַטְתִּ֔י
    וְ/לֹ֥א אֶכְעַ֖ס עֽוֹד׃
translation:
  text: So I will satisfy my wrath against you, and my jealousy will turn away from
    you; then I will be quiet and no longer be angry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my zeal will depart from you.' The Hebrew קִנְאָה can mean either 'jealousy'
      or 'zeal'; 'jealousy' fits the marital-covenant imagery of this chapter best.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will cause my wrath to rest in you.' The translation 'I will
      satisfy my wrath against you' expresses the sense that the wrath is spent or
      settled.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲנִחֹתִי
  chosen: I will satisfy
  alternatives:
  - I will cause to rest
  - I will set down
  - I will appease
  lexicon: HALOT
  rationale: From נוח in the Hiphil, here with חֲמָתִי as object, the sense is causing
    wrath to come to rest or be spent. 'Satisfy' communicates that the wrath is fully
    expended/settled in context better than the more wooden 'cause to rest.'
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning wrath or fury. 'Wrath' preserves the judicial
    and covenantal force without sounding overly colloquial.
- source_word: בָּךְ
  chosen: against you
  alternatives:
  - on you
  - in you
  lexicon: HALOT
  rationale: Although literally 'in/with you,' English idiom with wrath requires 'against
    you' to express hostile direction clearly.
- source_word: וְסָרָה
  chosen: will turn away
  alternatives:
  - will depart
  - will be removed
  lexicon: HALOT
  rationale: From סור, the verb indicates departure or turning aside. 'Will turn away'
    is natural English and preserves the image of jealousy ceasing its focus on the
    addressee.
- source_word: קִנְאָתִי
  chosen: my jealousy
  alternatives:
  - my zeal
  lexicon: HALOT
  rationale: קִנְאָה can mean jealousy or zeal. In this marital-infidelity context
    of Ezekiel 16, 'jealousy' best matches the covenantal/spousal metaphor and the
    emotional force of the passage.
- source_word: מִמֵּךְ
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: Marks separation of the jealousy from the addressee. Rendered straightforwardly
    in English.
- source_word: וְשָׁקַטְתִּי
  chosen: I will be quiet
  alternatives:
  - I will be at rest
  - I will be calm
  - I will be still
  lexicon: HALOT
  rationale: שקט denotes quietness, rest, or calm after disturbance. 'I will be quiet'
    preserves the verbal parallel with wrath and jealousy subsiding, while remaining
    readable.
- source_word: וְלֹא אֶכְעַס עוֹד
  chosen: and no longer be angry
  alternatives:
  - and not be provoked anymore
  - and not be vexed again
  lexicon: HALOT
  rationale: כעס means to be angry or provoked to anger. 'No longer be angry' is clear,
    idiomatic, and fits the culmination of divine wrath being exhausted.
