theological_decisions:
- issue: Interpretation of בַּעֲדִי עֲדָיִים in the maturation metaphor
  chosen_reading: A reference to reaching full adornment / mature beauty, without
    making an explicit marriage claim in the main text.
  alternative_readings:
  - a reference to the age for ornaments
  - a reference to menstrual/puberty maturity
  - a reference to bridal adornment
  rationale: The verse uses extended personification of Jerusalem as a girl maturing
    into womanhood. The Hebrew phrase is idiomatic and debated. To preserve theological
    and interpretive restraint, the main text keeps the adornment language and avoids
    importing a more specific sexual or marital interpretation than the wording requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
