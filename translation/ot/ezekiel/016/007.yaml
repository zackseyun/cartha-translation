id: EZK.16.7
reference: Ezekiel 16:7
source:
  edition: WLC
  text: רְבָבָ֗ה כְּ/צֶ֤מַח הַ/שָּׂדֶה֙ נְתַתִּ֔י/ךְ וַ/תִּרְבִּי֙ וַֽ/תִּגְדְּלִ֔י
    וַ/תָּבֹ֖אִי בַּ/עֲדִ֣י עֲדָיִ֑ים שָׁדַ֤יִם נָכֹ֨נוּ֙ וּ/שְׂעָרֵ֣/ךְ צִמֵּ֔חַ
    וְ/אַ֖תְּ עֵרֹ֥ם וְ/עֶרְיָֽה׃
translation:
  text: I made you countless like the growth of the field, and you multiplied and
    grew up and came to the finest ornament. Your breasts were formed and your hair
    had grown, yet you were naked and bare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the plants/vegetation of the field.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'came to ornament of ornaments'; the phrase likely refers to reaching
      full beauty or maturity, possibly the age for adornment.
    reason: alternative_reading
  - marker: c
    text: Or 'your breasts developed.'
    reason: lexical_alternative
  - marker: d
    text: The paired expression 'naked and bare' intensifies the image of complete
      exposure.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְבָבָה
  chosen: countless
  alternatives:
  - myriads
  - ten-thousandfold
  - multitudes
  lexicon: HALOT
  rationale: The noun denotes a very great number. In English, 'countless' communicates
    abundance naturally without forcing a specific numeric sense. 'Myriads' is possible
    but less idiomatic for modern readers.
- source_word: כְּצֶמַח הַשָּׂדֶה
  chosen: like the growth of the field
  alternatives:
  - like the plants of the field
  - like the vegetation of the field
  lexicon: HALOT
  rationale: צֶמַח refers to sprouting/growth/vegetation. 'Growth of the field' preserves
    the agricultural image while remaining readable. It also fits the metaphor of
    rapid development.
- source_word: נְתַתִּיךְ
  chosen: I made you
  alternatives:
  - I gave you
  - I set you
  lexicon: HALOT
  rationale: Although נתן is literally 'give,' in this construction with רְבָבָה it
    idiomatically means causing or making someone become numerous. 'I made you' best
    reflects the sense in English.
- source_word: וַתִּרְבִּי
  chosen: you multiplied
  alternatives:
  - you became many
  - you increased
  lexicon: HALOT
  rationale: רבה here describes increase in number. 'You multiplied' is concise and
    preserves the growth imagery.
- source_word: וַתִּגְדְּלִי
  chosen: grew up
  alternatives:
  - grew great
  - became large
  lexicon: HALOT
  rationale: גדל in this context refers to maturing/developing, not merely physical
    size. 'Grew up' fits the personified female metaphor.
- source_word: וַתָּבֹאִי בַּעֲדִי עֲדָיִים
  chosen: came to the finest ornament
  alternatives:
  - came to full adornment
  - reached the age of ornaments
  - came into beautiful adornment
  lexicon: HALOT
  rationale: This phrase is difficult and idiomatic. It likely marks arrival at the
    stage of full beauty/marriageable maturity. 'Came to the finest ornament' preserves
    the adornment language without over-interpreting the metaphor as explicitly marital
    in the main text.
- source_word: שָׁדַיִם נָכֹנוּ
  chosen: Your breasts were formed
  alternatives:
  - your breasts were developed
  - your breasts were fashioned
  lexicon: HALOT
  rationale: כון in the Niphal can mean established/prepared/formed. In context of
    puberty imagery, 'were formed' is natural and sufficiently literal.
- source_word: וּשְׂעָרֵךְ צִמֵּחַ
  chosen: your hair had grown
  alternatives:
  - your hair sprouted
  - your hair grew
  lexicon: HALOT
  rationale: צמח literally means sprout/grow. 'Had grown' is idiomatic English and
    matches the developmental sequence.
- source_word: עֵרֹם וְעֶרְיָה
  chosen: naked and bare
  alternatives:
  - naked and exposed
  - bare and naked
  lexicon: HALOT
  rationale: The paired terms intensify the condition of exposure. 'Naked and bare'
    preserves the double expression in natural English without reducing it to a single
    term.
