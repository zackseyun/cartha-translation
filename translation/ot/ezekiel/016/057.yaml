id: EZK.16.57
reference: Ezekiel 16:57
source:
  edition: WLC
  text: בְּ/טֶרֶם֮ תִּגָּלֶ֣ה רָעָתֵ/ךְ֒ כְּמ֗וֹ עֵ֚ת חֶרְפַּ֣ת בְּנוֹת אֲרָ֔ם וְ/כָל
    סְבִיבוֹתֶ֖י/הָ בְּנ֣וֹת פְּלִשְׁתִּ֑ים הַ/שָּׁאט֥וֹת אוֹתָ֖/ךְ מִ/סָּבִֽיב־־׃
translation:
  text: before your wickedness was uncovered, as at the time of the reproach of the
    daughters of Aram and all those around her, the daughters of the Philistines,
    who despise you from every side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was revealed' or 'was exposed' for 'was uncovered.'
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' is traditionally rendered ''Syria.'' The Hebrew reads ''daughters
      of Aram.'''
    reason: alternative_reading
  - marker: c
    text: '''The daughters of the Philistines'' is a Hebrew idiom for the Philistine
      people or cities.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - before that
  - prior to
  lexicon: HALOT
  rationale: Temporal preposition/conjunction introducing what preceded the exposure
    of Jerusalem's evil; 'before' is the most natural concise English equivalent.
- source_word: תִּגָּלֶה
  chosen: was uncovered
  alternatives:
  - was revealed
  - was exposed
  lexicon: HALOT
  rationale: Nifal of גלה here is passive/reflexive, referring to evil becoming publicly
    known. 'Uncovered' preserves the metaphor of exposure and fits the shame context.
- source_word: רָעָתֵךְ
  chosen: your wickedness
  alternatives:
  - your evil
  - your badness
  lexicon: HALOT
  rationale: רעה in prophetic indictment commonly denotes moral evil rather than mere
    misfortune. 'Wickedness' communicates ethical culpability clearly.
- source_word: כְּמוֹ עֵת
  chosen: as at the time of
  alternatives:
  - like the time of
  - as in the time of
  lexicon: HALOT
  rationale: The phrase compares the present situation to a known period of reproach.
    'As at the time of' preserves the comparative-temporal force without over-paraphrase.
- source_word: חֶרְפַּת
  chosen: the reproach of
  alternatives:
  - the disgrace of
  - the taunt against
  lexicon: HALOT
  rationale: חרפה denotes shame, scorn, or reproach. 'Reproach' best preserves both
    the shame and the public contempt in a prophetic register.
- source_word: בְּנוֹת אֲרָם
  chosen: the daughters of Aram
  alternatives:
  - the daughters of Syria
  - the women of Aram
  lexicon: HALOT
  rationale: Following the translation philosophy, names are transliterated rather
    than translated where possible. 'Daughters of Aram' is the idiomatic Hebrew way
    of referring to the people/cities of Aram and should be retained rather than flattened
    to 'Syria'.
- source_word: וְכָל סְבִיבוֹתֶיהָ
  chosen: and all those around her
  alternatives:
  - and all her surroundings
  - and all around her
  lexicon: HALOT
  rationale: The feminine singular suffix most naturally refers back to Aram, i.e.,
    surrounding peoples/regions. 'Those around her' makes the implied inhabitants
    explicit in readable English.
- source_word: בְּנוֹת פְּלִשְׁתִּים
  chosen: the daughters of the Philistines
  alternatives:
  - the daughters of Philistia
  - the women of the Philistines
  lexicon: HALOT
  rationale: The Hebrew idiom 'daughters of' for peoples/cities is preserved. 'Philistines'
    follows the consonantal text directly, while keeping the metaphorical collective
    sense.
- source_word: הַשָּׁאטוֹת
  chosen: who despise you
  alternatives:
  - who mock you
  - who treat you with contempt
  lexicon: HALOT
  rationale: The participle from a verb of disdain/contempt describes ongoing hostile
    scorn. 'Despise' is concise and captures the attitudinal force better than the
    narrower 'mock'.
- source_word: מִסָּבִיב
  chosen: from every side
  alternatives:
  - all around
  - from all around
  lexicon: HALOT
  rationale: This adverbial phrase intensifies the surrounding hostility. 'From every
    side' is idiomatic English and preserves the sense of encirclement.
