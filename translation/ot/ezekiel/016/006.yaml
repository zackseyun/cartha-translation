id: EZK.16.6
reference: Ezekiel 16:6
source:
  edition: WLC
  text: וָ/אֶעֱבֹ֤ר עָלַ֨יִ/ךְ֙ וָֽ/אֶרְאֵ֔/ךְ מִתְבּוֹסֶ֖סֶת בְּ/דָמָ֑יִ/ךְ וָ/אֹ֤מַר
    לָ/ךְ֙ בְּ/דָמַ֣יִ/ךְ חֲיִ֔י וָ/אֹ֥מַר לָ֖/ךְ בְּ/דָמַ֥יִ/ךְ חֲיִֽי׃
translation:
  text: And I passed by you and saw you thrashing about in your blood, and I said
    to you, ‘In your blood, live!’ Yes, I said to you, ‘In your blood, live!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Though you were in your blood, live!' The Hebrew preposition can be
      understood with a concessive nuance in context.
    reason: alternative_reading
  - marker: b
    text: The line 'In your blood, live!' is repeated in Hebrew for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱבֹר
  chosen: I passed by
  alternatives:
  - I passed over
  - I came by
  lexicon: HALOT
  rationale: The verb עבר in this narrative context denotes passing by or alongside.
    'Passed by' is the most natural modern English rendering and preserves the scene's
    movement without adding interpretive nuance.
- source_word: עָלַיִךְ
  chosen: by you
  alternatives:
  - over you
  - past you
  lexicon: HALOT
  rationale: With עבר, על can idiomatically express movement in relation to a person.
    In English, 'passed by you' best conveys the sense.
- source_word: וָאֶרְאֵךְ
  chosen: and saw you
  alternatives:
  - and looked at you
  lexicon: HALOT
  rationale: ראה is straightforwardly 'see.' 'Saw you' is both accurate and idiomatic.
- source_word: מִתְבּוֹסֶסֶת
  chosen: thrashing about
  alternatives:
  - wallowing
  - squirming
  - kicking about
  lexicon: HALOT
  rationale: The reflexive participle from בוס/בסס here depicts a newborn lying and
    moving in blood. 'Wallowing' can imply moral disgust or deliberate action; 'thrashing
    about' better fits an abandoned infant struggling helplessly while preserving
    the vividness.
- source_word: בְּדָמָיִךְ
  chosen: in your blood
  alternatives:
  - in your bloodshed
  - covered in your blood
  lexicon: HALOT
  rationale: The plural form 'bloods' is idiomatically rendered 'blood' in English.
    'In your blood' preserves the Hebrew preposition and the stark imagery without
    overinterpreting whether this is birth blood or bloodshed.
- source_word: וָאֹמַר לָךְ
  chosen: and I said to you
  alternatives:
  - and I told you
  lexicon: HALOT
  rationale: אמר plus indirect object is naturally 'said to.' This keeps the repeated
    divine speech formula visible.
- source_word: בְּדָמַיִךְ חֲיִי
  chosen: In your blood, live!
  alternatives:
  - Live in your blood!
  - Though in your blood, live!
  - In your blood, keep living!
  lexicon: HALOT
  rationale: 'The Hebrew is terse and forceful: prepositional phrase plus imperative
    feminine singular. Retaining ''In your blood, live!'' preserves the abruptness
    and poetic shock. It avoids smoothing the syntax into an explanatory paraphrase.
    The preposition ב is left as ''in'' rather than interpreted concessively in the
    main text.'
- source_word: וָאֹמַר לָךְ ... חֲיִי (repeated)
  chosen: Yes, I said to you, ‘In your blood, live!’
  alternatives:
  - and again I said to you, 'In your blood, live!'
  - I said to you, 'In your blood, live!'
  lexicon: HALOT
  rationale: The Hebrew repeats the clause for emphasis. Rendering the second occurrence
    with 'Yes, I said to you' preserves the repetition's rhetorical force while remaining
    readable in English.
