theological_decisions:
- issue: Force of ב in בְּדָמַיִךְ חֲיִי
  chosen_reading: Locative/instrumental wording preserved literally as 'In your blood,
    live!'
  alternative_readings:
  - 'Concessive sense: ''Though you were in your blood, live!'''
  - 'Contextual expansion: ''Even in your blood, live!'''
  rationale: The phrase is syntactically compressed and can be understood in more
    than one way. Following the translation philosophy, the main text preserves the
    Hebrew's tension rather than resolving it into a smoother interpretive paraphrase.
    The concessive nuance is worth preserving in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
