id: EZK.16.16
reference: Ezekiel 16:16
source:
  edition: WLC
  text: וַ/תִּקְחִ֣י מִ/בְּגָדַ֗יִ/ךְ וַ/תַּֽעֲשִׂי לָ/ךְ֙ בָּמ֣וֹת טְלֻא֔וֹת וַ/תִּזְנִ֖י
    עֲלֵי/הֶ֑ם לֹ֥א בָא֖וֹת וְ/לֹ֥א יִהְיֶֽה־׃
translation:
  text: You took some of your garments and made for yourself colorful high places,
    and you prostituted yourself on them—such things should not come about, nor should
    they happen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'patched high places,' 'variegated high places,' or 'multi-colored shrines.'
      The Hebrew adjective is difficult and likely refers to the decorated appearance
      made from the garments.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult Hebrew. It may mean 'such things should not
      happen,' or more literally, 'they should not come, and it should not be.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקְחִי
  chosen: You took
  alternatives:
  - And you took
  lexicon: HALOT
  rationale: Qal wayyiqtol 2fs of לקח, straightforward past narrative addressed to
    Jerusalem as a woman. English omits the conjunction for natural style while preserving
    sequence.
- source_word: מִבְּגָדַיִךְ
  chosen: some of your garments
  alternatives:
  - from your garments
  - your garments
  lexicon: HALOT
  rationale: The preposition מִן indicates taking from among her garments rather than
    merely repeating 'your garments' without nuance. 'Some of' captures the partitive
    sense idiomatically.
- source_word: וַתַּעֲשִׂי לָךְ
  chosen: made for yourself
  alternatives:
  - made yourself
  - fashioned for yourself
  lexicon: HALOT
  rationale: עשה with לָךְ expresses making something for one's own use. 'Made for
    yourself' preserves the reflexive-benefactive nuance.
- source_word: בָּמוֹת
  chosen: high places
  alternatives:
  - shrines
  - cultic heights
  lexicon: HALOT
  rationale: בָּמוֹת commonly refers to illicit worship sites. 'High places' is the
    standard and sufficiently transparent rendering, especially in prophetic polemic.
- source_word: טְלֻאוֹת
  chosen: colorful
  alternatives:
  - patched
  - variegated
  - multi-colored
  lexicon: HALOT
  rationale: From the idea of patching/variegation; in context of garments repurposed
    into cultic sites or coverings, the sense is decorated or many-colored rather
    than merely mended. 'Colorful' is readable modern English and fits the imagery.
- source_word: וַתִּזְנִי
  chosen: you prostituted yourself
  alternatives:
  - you played the prostitute
  - you committed whoredom
  lexicon: HALOT
  rationale: זנה in Ezekiel's metaphor denotes sexualized covenant unfaithfulness.
    'Prostituted yourself' is direct, modern, and preserves the force better than
    softened alternatives.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  - with them
  lexicon: HALOT
  rationale: The preposition עַל is best kept literally here, referring back to the
    high places or their coverings. 'On them' preserves the vivid metaphor.
- source_word: לֹא בָאוֹת וְלֹא יִהְיֶה
  chosen: such things should not come about, nor should they happen
  alternatives:
  - which should not come, and should not be
  - they did not come, and it shall not be
  - never should this have happened, nor should it ever be
  lexicon: HALOT
  rationale: This closing clause is notoriously difficult and elliptical. The feminine
    plural participle בָאוֹת likely refers to such acts/things, expressing abnormality
    or impropriety rather than simple futurity. The paired negative with היה reinforces
    'this ought not to occur.' The chosen rendering preserves the denunciatory force
    in idiomatic English without over-resolving the syntax.
