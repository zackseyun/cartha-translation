theological_decisions:
- issue: Prophetic sexual metaphor for idolatry
  chosen_reading: Retain the explicit prostitution language as a metaphor for covenant
    unfaithfulness
  alternative_readings:
  - Use softened language such as 'were unfaithful'
  rationale: Ezekiel intentionally uses shocking sexual imagery to portray idolatry
    and apostasy. Softening it would mute the prophetic rhetoric and import interpretation
    beyond the text's chosen metaphor.
  doctrine_reference: Translation philosophy §§1, 6
