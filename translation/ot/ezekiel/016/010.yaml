id: EZK.16.10
reference: Ezekiel 16:10
source:
  edition: WLC
  text: וָ/אַלְבִּישֵׁ֣/ךְ רִקְמָ֔ה וָ/אֶנְעֲלֵ֖/ךְ תָּ֑חַשׁ וָ/אֶחְבְּשֵׁ֣/ךְ בַּ/שֵּׁ֔שׁ
    וַ/אֲכַסֵּ֖/ךְ מֶֽשִׁי׃
translation:
  text: I clothed you with embroidered cloth, put fine leather sandals on you, wrapped
    you in fine linen, and covered you with silk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a costly fabric' for 'silk'; the precise identification of the Hebrew
      term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew תָּחַשׁ refers to a material used for fine footwear; its exact
      animal/source is uncertain, so 'fine leather' is used here rather than a more
      speculative identification such as 'porpoise skin' or 'dugong skin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רִקְמָה
  chosen: embroidered cloth
  alternatives:
  - embroidered garment
  - embroidered work
  lexicon: HALOT
  rationale: The noun denotes embroidered material or work. 'Embroidered cloth' is
    natural English and preserves the textile imagery without over-specifying a garment
    type not stated in the Hebrew.
- source_word: תָּחַשׁ
  chosen: fine leather
  alternatives:
  - porpoise skin
  - dugong skin
  - goatskin
  lexicon: HALOT
  rationale: The precise animal/source behind תחש is uncertain. In clothing/footwear
    context, the sense is best conveyed as high-quality leather rather than a speculative
    zoological identification. This preserves the luxury sense in context while avoiding
    false precision.
- source_word: וָאֶנְעֲלֵךְ תָּחַשׁ
  chosen: put fine leather sandals on you
  alternatives:
  - shod you with fine leather
  - put tahash leather on your feet
  lexicon: HALOT
  rationale: The verb from נעל in Hiphil means to put footwear on someone. English
    idiom prefers 'put ... sandals on you.' 'Sandals' is implied by the footwear verb
    and makes the line readable.
- source_word: שֵׁשׁ
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: שש commonly refers to fine linen, often in high-status or cultic contexts.
    'Fine linen' preserves the luxurious nuance appropriate to the adornment imagery.
- source_word: וָאֶחְבְּשֵׁךְ בַּשֵּׁשׁ
  chosen: wrapped you in fine linen
  alternatives:
  - girded you with fine linen
  - bound you with fine linen
  lexicon: HALOT
  rationale: The verb חבש can mean bind, wrap, or gird. In this clothing sequence,
    'wrapped you in' communicates dressing/adornment naturally in English without
    implying medical bandaging.
- source_word: מֶשִׁי
  chosen: silk
  alternatives:
  - fine fabric
  - silken cloth
  lexicon: HALOT
  rationale: The term denotes a costly fabric; 'silk' is the traditional and likely
    sense in this luxury context. Because some uncertainty remains, an alternative
    is preserved in a footnote.
- source_word: וָאֲכַסֵּךְ
  chosen: covered you
  alternatives:
  - clothed you
  - veiled you
  lexicon: HALOT
  rationale: The verb כסה means cover/conceal. 'Covered you' is the most direct rendering
    and fits the progression of dressing with successive luxurious layers.
