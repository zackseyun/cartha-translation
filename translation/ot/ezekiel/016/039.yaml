id: EZK.16.39
reference: Ezekiel 16:39
source:
  edition: WLC
  text: וְ/נָתַתִּ֨י אוֹתָ֜/ךְ בְּ/יָדָ֗/ם וְ/הָרְס֤וּ גַבֵּ/ךְ֙ וְ/נִתְּצ֣וּ רָמֹתַ֔יִ/ךְ
    וְ/הִפְשִׁ֤יטוּ אוֹתָ/ךְ֙ בְּגָדַ֔יִ/ךְ וְ/לָקְח֖וּ כְּלֵ֣י תִפְאַרְתֵּ֑/ךְ וְ/הִנִּיח֖וּ/ךְ
    עֵירֹ֥ם וְ/עֶרְיָֽה׃
translation:
  text: I will give you into their hand, and they will tear down your vaulted chamber
    and demolish your high places. They will strip off your clothes, take your beautiful
    jewelry, and leave you naked and bare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your mound,' 'your shrine,' or 'your arch'; the Hebrew term is rare
      and likely refers to a built structure associated with Jerusalem's illicit worship
      imagery in this chapter.
    reason: lexical_alternative
  - marker: b
    text: Or 'your splendid ornaments' or 'the articles of your splendor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will give
  alternatives:
  - I will hand over
  lexicon: HALOT
  rationale: נתן in this context introduces judicial delivery into the power of others.
    'I will give' is formally close and natural in English; the following phrase 'into
    their hand' carries the sense of handing over.
- source_word: בְּיָדָם
  chosen: into their hand
  alternatives:
  - into their power
  - over to them
  lexicon: HALOT
  rationale: The idiom 'into the hand of' denotes being delivered into someone's power.
    Retaining 'hand' preserves the Hebrew imagery while remaining intelligible.
- source_word: הָרְסוּ
  chosen: tear down
  alternatives:
  - break down
  - destroy
  lexicon: HALOT
  rationale: הרס commonly means to pull down or tear down structures. 'Tear down'
    fits the architectural object that follows.
- source_word: גַבֵּךְ
  chosen: your vaulted chamber
  alternatives:
  - your mound
  - your shrine
  - your arch
  lexicon: HALOT
  rationale: In Ezekiel 16 this term refers to a built structure associated with the
    woman's illicit cultic-sexual imagery. 'Vaulted chamber' best reflects an architectural
    feature without overinterpreting it as exclusively cultic, while matching common
    scholarly understanding of the term in this context.
- source_word: נִתְּצוּ
  chosen: demolish
  alternatives:
  - break down
  - pull down
  lexicon: HALOT
  rationale: נתץ is used for smashing or demolishing structures, often cultic ones.
    'Demolish' gives a strong but readable English equivalent and distinguishes it
    slightly from the previous verb.
- source_word: רָמֹתַיִךְ
  chosen: your high places
  alternatives:
  - your shrines on the heights
  lexicon: HALOT
  rationale: במה/רמות in prophetic literature commonly denotes cultic high places.
    'High places' is the standard and sufficiently transparent rendering.
- source_word: הִפְשִׁיטוּ
  chosen: strip off
  alternatives:
  - strip
  - remove
  lexicon: HALOT
  rationale: The verb means to strip someone of clothing. 'Strip off your clothes'
    is idiomatic and preserves the force of public humiliation.
- source_word: בְּגָדַיִךְ
  chosen: your clothes
  alternatives:
  - your garments
  lexicon: HALOT
  rationale: '''Clothes'' is modern and clear; ''garments'' is possible but slightly
    more formal without adding meaning.'
- source_word: לָקְחוּ
  chosen: take
  alternatives:
  - seize
  lexicon: HALOT
  rationale: לקח is the ordinary verb 'take.' In context it implies plunder, but 'take'
    is sufficient and lets the context supply the hostile nuance.
- source_word: כְּלֵי תִפְאַרְתֵּךְ
  chosen: your beautiful jewelry
  alternatives:
  - the vessels of your splendor
  - your splendid ornaments
  - your beautiful things
  lexicon: HALOT
  rationale: כְּלִי can mean article/object/item, and with תפארת here refers to adornments
    previously given to the woman. 'Beautiful jewelry' communicates the likely referent
    in context better than the overly literal 'articles of your beauty/splendor.'
- source_word: הִנִּיחוּךְ
  chosen: leave you
  alternatives:
  - set you down
  - abandon you
  lexicon: HALOT
  rationale: The causative of נוח here means to leave or let remain in a resulting
    state. 'Leave you' is the most natural English in context.
- source_word: עֵירֹם וְעֶרְיָה
  chosen: naked and bare
  alternatives:
  - naked and exposed
  - stripped naked
  lexicon: HALOT
  rationale: The paired terms intensify the state of complete exposure. 'Naked and
    bare' preserves the double expression in concise English.
