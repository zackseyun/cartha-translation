id: EZK.16.31
reference: Ezekiel 16:31
source:
  edition: WLC
  text: בִּ/בְנוֹתַ֤יִ/ךְ גַּבֵּ/ךְ֙ בְּ/רֹ֣אשׁ כָּל דֶּ֔רֶךְ וְ/רָמָתֵ֥/ךְ עשיתי
    בְּ/כָל רְח֑וֹב וְ/לֹא הייתי כַּ/זּוֹנָ֖ה לְ/קַלֵּ֥ס אֶתְנָֽן־־־׃
translation:
  text: When you built your mound at the head of every road and made your high place
    in every square, you were not like a prostitute, because you scorned payment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your vaulted chamber' or 'your shrine-platform'; the Hebrew term refers
      to a raised structure associated with the chapter's prostitution imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'at every street corner.' Literally, 'at the head of every road.'
    reason: lexical_alternative
  - marker: c
    text: That is, unlike an ordinary prostitute, Jerusalem did not act for pay; the
      following verses explain that she gave gifts instead of receiving them.
    reason: cross_reference
lexical_decisions:
- source_word: בִּבְנוֹתַיִךְ
  chosen: when you built
  alternatives:
  - in your building
  - as you built
  lexicon: HALOT
  rationale: 'The prefixed ב plus infinitive construct of בנה introduces a temporal
    clause here: ''when/in your building.'' English idiom is best served by ''when
    you built,'' preserving the circumstantial force without awkwardness.'
- source_word: גַּבֵּךְ
  chosen: your mound
  alternatives:
  - your vaulted chamber
  - your shrine-platform
  lexicon: HALOT
  rationale: The noun refers to an elevated cultic/sexual structure in this chapter's
    prostitution metaphor. 'Mound' is concrete and avoids over-interpreting the exact
    architecture, while fitting the imagery of a raised illicit site.
- source_word: בְּרֹאשׁ כָּל־דֶּרֶךְ
  chosen: at the head of every road
  alternatives:
  - at every street corner
  - at the top of every way
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head, top, beginning.' Combined with דרך, it denotes
    a prominent point along public routes. 'At the head of every road' keeps the metaphorical
    spatial language more closely than the idiomatic but less literal 'at every street
    corner.'
- source_word: וְרָמָתֵךְ
  chosen: your high place
  alternatives:
  - your height
  - your shrine
  lexicon: HALOT
  rationale: רָמָה in this context refers to a cultic high place. 'High place' preserves
    the established biblical term and the likely idolatrous setting in Ezekiel.
- source_word: עשיתי
  chosen: made
  alternatives:
  - set up
  - fashioned
  lexicon: HALOT
  rationale: The Qal perfect 2fs of עשה is straightforwardly 'you made.' 'Set up'
    is possible contextually, but 'made' stays closer to the Hebrew while remaining
    natural.
- source_word: בְּכָל רְחוֹב
  chosen: in every square
  alternatives:
  - in every open place
  - in every street
  lexicon: HALOT
  rationale: רְחוֹב commonly denotes a broad public place or plaza rather than a narrow
    street. 'Square' captures the urban public-space sense in readable English.
- source_word: וְלֹא הָיִית כַּזּוֹנָה
  chosen: you were not like a prostitute
  alternatives:
  - you were not as a prostitute
  lexicon: HALOT
  rationale: The comparison is explicit with כ. The verse paradoxically says Jerusalem
    was unlike an ordinary prostitute in a specific respect explained by the next
    clause; the translation should preserve that rhetorical shock.
- source_word: לְקַלֵּס
  chosen: because you scorned
  alternatives:
  - in scorning
  - to disdain
  - to make light of
  lexicon: HALOT
  rationale: The infinitive expresses the manner or reason for the comparison. The
    verb carries the sense of treating with contempt or disdain. 'Because you scorned'
    makes the logic clear in English.
- source_word: אֶתְנָן
  chosen: payment
  alternatives:
  - wages
  - fee
  - hire
  lexicon: HALOT
  rationale: In prostitution imagery, אֶתְנָן is the prostitute's pay. 'Payment' is
    clear modern English and avoids sounding overly commercial or archaic; 'wages'
    is possible but less idiomatic here.
