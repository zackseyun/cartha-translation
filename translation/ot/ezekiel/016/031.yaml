theological_decisions:
- issue: Metaphorical prostitution language for Jerusalem's idolatry
  chosen_reading: Retain the sexualized metaphor directly ('prostitute,' 'payment')
    rather than softening it into purely religious language.
  alternative_readings:
  - idolater
  - unfaithful woman
  rationale: Ezekiel intentionally uses shocking sexual imagery to portray covenant
    unfaithfulness. Softening the metaphor would omit a significant feature of the
    prophetic rhetoric and flatten the force of the accusation.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Interpretation of the final clause
  chosen_reading: Render the clause as Jerusalem being unlike a normal prostitute
    because she despised payment.
  alternative_readings:
  - you were not like a prostitute who solicits payment
  - you were not like a prostitute in accepting wages
  rationale: The immediate context in Ezekiel 16 contrasts Jerusalem with ordinary
    prostitutes because she gives gifts rather than receiving them (vv. 32–34). 'Because
    you scorned payment' preserves that irony and prepares for the following verses.
  doctrine_reference: Translation philosophy §§1, 3, 5
