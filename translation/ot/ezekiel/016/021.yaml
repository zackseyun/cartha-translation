id: EZK.16.21
reference: Ezekiel 16:21
source:
  edition: WLC
  text: וַֽ/תִּשְׁחֲטִ֖י אֶת בָּנָ֑/י וַֽ/תִּתְּנִ֔י/ם בְּ/הַעֲבִ֥יר אוֹתָ֖/ם לָ/הֶֽם־׃
translation:
  text: You slaughtered my sons and gave them up to them by making them pass through
    the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'by making them pass through them/to them.' In context this idiom
      refers to making children pass through the fire as a sacrificial act to idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁחֲטִי
  chosen: you slaughtered
  alternatives:
  - you killed
  - you butchered
  lexicon: HALOT
  rationale: שָׁחַט commonly denotes slaughtering, especially in sacrificial contexts.
    'Slaughtered' preserves the violent and cultic overtones better than the more
    general 'killed.'
- source_word: בָּנַי
  chosen: my sons
  alternatives:
  - my children
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'my sons,' not a gender-neutral term. This
    preserves both the possessive divine claim and the gendered wording of the source.
- source_word: וַתִּתְּנִים
  chosen: gave them up
  alternatives:
  - gave them
  - delivered them
  lexicon: HALOT
  rationale: The verb נתן with object suffix here means to hand over. 'Gave them up'
    conveys surrender into another party's power and fits the accusatory tone.
- source_word: בְּהַעֲבִיר אוֹתָם
  chosen: by making them pass through the fire
  alternatives:
  - when making them pass through
  - by causing them to pass through
  lexicon: HALOT
  rationale: The Hiphil of עבר with children in this cultic context is the established
    idiom for causing children to pass through fire in sacrificial rites. 'Through
    the fire' is not explicit in this clause but is strongly implied by the idiom
    and immediate context in Ezekiel; supplying it in English makes the sense clear
    without distorting the meaning.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The pronoun refers back to the idols/false gods addressed in the surrounding
    context. 'To them' is the most direct rendering; 'for them' is possible but less
    natural here.
