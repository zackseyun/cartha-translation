theological_decisions:
- issue: Whether to make explicit the sacrificial-fire sense of the idiom 'make them
    pass through'
  chosen_reading: 'Included ''the fire'' in the main text: ''by making them pass through
    the fire'''
  alternative_readings:
  - by making them pass through
  - by causing them to pass over to them
  rationale: In Ezekiel and related prophetic texts, this idiom refers to child sacrifice
    associated with fire. Leaving it as merely 'pass through' would obscure the accusation
    for modern readers. The addition is interpretive but firmly grounded in the idiom
    and context, not a doctrinal import.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition; preserve the source text''s plain sense'
