theological_decisions:
- issue: Force of the verse's rhetorical statement about Sodom
  chosen_reading: 'Rendered as a rhetorical question: ''Was not Sodom your sister
    a byword in your mouth...?'''
  alternative_readings:
  - 'Rendered as a flat statement: ''Sodom your sister was not a byword in your mouth...'''
  rationale: The Hebrew word order with initial negation and perfect verb naturally
    lends itself to a rhetorical question in English, especially in prophetic rebuke.
    This preserves the confrontational force without adding doctrinal interpretation.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    force in readable modern English.'
