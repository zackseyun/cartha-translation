id: EZK.16.56
reference: Ezekiel 16:56
source:
  edition: WLC
  text: וְ/ל֤וֹא הָֽיְתָה֙ סְדֹ֣ם אֲחוֹתֵ֔/ךְ לִ/שְׁמוּעָ֖ה בְּ/פִ֑י/ךְ בְּ/י֖וֹם
    גְּאוֹנָֽיִ/ךְ׃
translation:
  text: Was not Sodom your sister a byword in your mouth in the day of your pride?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a report,' 'something spoken of,' or 'an object of talk.' The Hebrew
      likely refers to Sodom as a notorious example on Jerusalem's lips.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: Was not
  alternatives:
  - And was not
  - And not
  lexicon: HALOT
  rationale: The conjunction plus negation introduces a rhetorical question in context.
    English idiom is best served by rendering it as 'Was not' rather than preserving
    a wooden 'And not was.'
- source_word: הָיְתָה
  chosen: was
  alternatives:
  - became
  lexicon: HALOT
  rationale: 'Qal perfect of היה here expresses simple past existence/state: Sodom
    ''was'' something in Jerusalem''s speech.'
- source_word: סְדֹם
  chosen: Sodom
  rationale: Proper name transliterated according to standard English convention.
- source_word: אֲחוֹתֵךְ
  chosen: your sister
  lexicon: HALOT
  rationale: Literal kinship term retained. In Ezekiel 16 the metaphor of sister-cities
    is central and should not be flattened.
- source_word: לִשְׁמוּעָה
  chosen: a byword
  alternatives:
  - a report
  - a thing spoken of
  - an object of talk
  lexicon: HALOT
  rationale: The noun שְׁמוּעָה can denote something heard, a report, or a matter
    of common talk. In the idiom with 'in your mouth,' the sense is not merely 'news'
    but something spoken about proverbially or scornfully; 'a byword' captures that
    force in natural English.
- source_word: בְּפִיךְ
  chosen: in your mouth
  alternatives:
  - on your lips
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom and remains intelligible
    in English. 'On your lips' is possible but slightly more interpretive.
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - at the time of
  - when
  lexicon: HALOT
  rationale: This temporal phrase is common in Hebrew. 'In the day of' preserves the
    formal texture while remaining understandable.
- source_word: גְּאוֹנָיִךְ
  chosen: your pride
  alternatives:
  - your arrogance
  - your exaltation
  - your haughtiness
  lexicon: HALOT
  rationale: From גאון, the sense here is arrogant self-exaltation. 'Pride' is concise
    and idiomatic, while the context already makes the negative sense clear.
