id: EZK.16.25
reference: Ezekiel 16:25
source:
  edition: WLC
  text: אֶל כָּל רֹ֣אשׁ דֶּ֗רֶךְ בָּנִית֙ רָֽמָתֵ֔/ךְ וַ/תְּתַֽעֲבִי֙ אֶת יָפְיֵ֔/ךְ
    וַ/תְּפַשְּׂקִ֥י אֶת רַגְלַ֖יִ/ךְ לְ/כָל עוֹבֵ֑ר וַ/תַּרְבִּ֖י אֶת תזנת/ך־־־־־־׃
translation:
  text: At every street corner you built your high place, and you made your beauty
    detestable. You spread your legs to every passerby and multiplied your prostitution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At every road junction' (literally, 'at every head of the way').
    reason: lexical_alternative
  - marker: b
    text: Or 'multiplied your whoring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ דֶּרֶךְ
  chosen: street corner
  alternatives:
  - head of every road
  - every road junction
  lexicon: HALOT
  rationale: Literally 'head of a way/road,' an idiom for the prominent point where
    roads meet. 'Street corner' is natural modern English and preserves the public,
    shameless setting.
- source_word: רָמָה
  chosen: high place
  alternatives:
  - height
  - shrine
  lexicon: HALOT
  rationale: In Ezekiel's idolatry metaphor this refers to an elevated cultic site.
    'High place' preserves the established cultic sense better than the more generic
    'height,' while still fitting the sexual-idolatrous imagery.
- source_word: תְּתַעֲבִי
  chosen: made ... detestable
  alternatives:
  - abhorred
  - made ... abominable
  - defiled
  lexicon: HALOT
  rationale: From תעב, 'to make abominable/detestable.' The object is 'your beauty,'
    so the sense is that she turned what was beautiful into something loathsome. 'Made
    your beauty detestable' is both faithful and idiomatic.
- source_word: יָפְיֵךְ
  chosen: your beauty
  alternatives:
  - your fairness
  - your loveliness
  lexicon: HALOT
  rationale: A straightforward rendering of the noun for beauty/beautyfulness; 'beauty'
    is the clearest modern equivalent.
- source_word: תְּפַשְּׂקִי אֶת רַגְלַיִךְ
  chosen: spread your legs
  alternatives:
  - opened your feet
  - spread yourself
  lexicon: HALOT
  rationale: The Hebrew is a blunt sexual image. 'Spread your legs' preserves the
    force and shame of the metaphor without euphemistic softening.
- source_word: לְכָל עוֹבֵר
  chosen: to every passerby
  alternatives:
  - for everyone who passed by
  - to every one passing by
  lexicon: HALOT
  rationale: עוֹבֵר is a participle meaning one passing by. 'Every passerby' is concise
    and natural.
- source_word: תַרְבִּי
  chosen: multiplied
  alternatives:
  - increased
  - made abundant
  lexicon: HALOT
  rationale: The hiphil/waw-consecutive form conveys causing to become many. 'Multiplied'
    preserves the intensifying sense.
- source_word: תַּזְנוּתֵךְ
  chosen: your prostitution
  alternatives:
  - your whoring
  - your harlotry
  - your fornication
  lexicon: HALOT
  rationale: The noun denotes prostitution/whoredom, here in the prophetic metaphor
    for idolatrous unfaithfulness. 'Prostitution' is direct, contemporary, and avoids
    archaic 'whoredom' while retaining the sexual-commercial force.
