theological_decisions:
- issue: Rendering the sexual-idolatrous metaphor with explicit language
  chosen_reading: Use direct sexual language ('spread your legs,' 'prostitution')
    in the main text
  alternative_readings:
  - Use softened euphemisms such as 'offered yourself' or 'played the harlot'
  rationale: The Hebrew intentionally uses shocking sexual imagery to portray Jerusalem's
    public idolatry and unfaithfulness. Optimal equivalence here requires preserving
    the offensiveness and concreteness rather than muting it with traditional euphemism.
  doctrine_reference: Translation philosophy §§1, 6
