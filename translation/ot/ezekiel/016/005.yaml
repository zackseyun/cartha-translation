id: EZK.16.5
reference: Ezekiel 16:5
source:
  edition: WLC
  text: לֹא חָ֨סָה עָלַ֜יִ/ךְ עַ֗יִן לַ/עֲשׂ֥וֹת לָ֛/ךְ אַחַ֥ת מֵ/אֵ֖לֶּה לְ/חֻמְלָ֣ה
    עָלָ֑יִ/ךְ וַֽ/תֻּשְׁלְכִ֞י אֶל פְּנֵ֤י הַ/שָּׂדֶה֙ בְּ/גֹ֣עַל נַפְשֵׁ֔/ךְ בְּ/י֖וֹם
    הֻלֶּ֥דֶת אֹתָֽ/ךְ־־׃
translation:
  text: No eye pitied you enough to do for you even one of these things, to have compassion
    on you; instead, you were thrown out into the open field in loathing for your
    life on the day you were born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because your life was abhorred.' The Hebrew phrase בְּגֹעַל נַפְשֵׁךְ
      is compact and may be rendered more literally as an expression of abhorrence
      directed toward the newborn herself.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָסָה עָלַיִךְ עַיִן
  chosen: No eye pitied you
  alternatives:
  - No eye had pity on you
  - No eye spared you
  lexicon: HALOT
  rationale: The idiom literally says 'an eye did not pity/have compassion on you.'
    English 'No eye pitied you' preserves the anthropomorphic idiom while remaining
    natural. 'Spared' is less fitting here because the following clauses concern neglected
    infant care rather than deliverance from judgment.
- source_word: לַעֲשׂוֹת לָךְ אַחַת מֵאֵלֶּה
  chosen: to do for you even one of these things
  alternatives:
  - to do for you one of these things
  - to do any one of these things for you
  lexicon: HALOT
  rationale: The phrase refers back to the care actions listed in the previous verse.
    'Even one' brings out the minimization implied by אַחַת מֵאֵלֶּה.
- source_word: לְחֻמְלָה עָלָיִךְ
  chosen: to have compassion on you
  alternatives:
  - out of compassion for you
  - to show mercy to you
  lexicon: HALOT
  rationale: 'This infinitival/result phrase explains the motive: compassionate concern.
    ''Compassion'' best matches the noun חֻמְלָה and avoids importing covenantal overtones
    that ''mercy'' can carry.'
- source_word: וַתֻּשְׁלְכִי
  chosen: you were thrown out
  alternatives:
  - you were cast out
  - you were flung out
  lexicon: HALOT
  rationale: The Hophal is passive/causative passive. 'Thrown out' is vivid and idiomatic
    in modern English; 'cast out' is possible but sounds more traditional and may
    suggest excommunication rather than physical abandonment.
- source_word: אֶל־פְּנֵי הַשָּׂדֶה
  chosen: into the open field
  alternatives:
  - onto the surface of the field
  - out into the field
  lexicon: HALOT
  rationale: Literally 'to the face/surface of the field.' 'Open field' conveys exposure
    and abandonment more naturally than a wooden rendering.
- source_word: בְּגֹעַל נַפְשֵׁךְ
  chosen: in loathing for your life
  alternatives:
  - because your life was abhorred
  - with loathing for you
  - in disgust at your person
  lexicon: HALOT
  rationale: גֹעַל denotes abhorrence/loathing. With נֶפֶשׁ in this context, 'your
    life' is a natural rendering, referring to the infant herself as a living being.
    The phrase expresses the contempt motivating the abandonment. This is preferable
    to the more interpretive 'because you were abhorred' while still making sense
    in English.
- source_word: בְּיוֹם הֻלֶּדֶת אֹתָךְ
  chosen: on the day you were born
  alternatives:
  - on the day of your birth
  - when you were born
  lexicon: HALOT
  rationale: A straightforward temporal clause. 'On the day you were born' is clear,
    idiomatic, and preserves the immediacy of the Hebrew.
