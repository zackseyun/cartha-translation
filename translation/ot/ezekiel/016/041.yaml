theological_decisions:
- issue: Metaphorical sexual language for Jerusalem's unfaithfulness
  chosen_reading: Retain the prostitution metaphor explicitly
  alternative_readings:
  - Soften to 'unfaithfulness' or 'idolatry' in the main text
  rationale: Ezekiel intentionally uses sexualized covenant-infidelity imagery. The
    translation preserves that metaphor rather than resolving it into a purely abstract
    theological term, while using readable modern English.
  doctrine_reference: Translation philosophy §§1, 3, 6
