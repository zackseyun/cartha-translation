id: EZK.16.41
reference: Ezekiel 16:41
source:
  edition: WLC
  text: וְ/שָׂרְפ֤וּ בָתַּ֨יִ/ךְ֙ בָּ/אֵ֔שׁ וְ/עָשׂוּ בָ֣/ךְ שְׁפָטִ֔ים לְ/עֵינֵ֖י
    נָשִׁ֣ים רַבּ֑וֹת וְ/הִשְׁבַּתִּי/ךְ֙ מִ/זּוֹנָ֔ה וְ/גַם אֶתְנַ֖ן לֹ֥א תִתְּנִי
    עֽוֹד־־־׃
translation:
  text: They will burn your houses with fire and execute judgments against you before
    the eyes of many women. I will put a stop to your prostitution, and you will no
    longer give payment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sight of many women.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your prostitution'; alternatively, 'from being a prostitute.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term refers to payment associated with prostitution; some render
      it 'harlot’s pay' or 'fee.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂרְפוּ
  chosen: they will burn
  alternatives:
  - and they burned
  - and they shall burn
  lexicon: HALOT
  rationale: 'Qal wayyiqtol 3cp from שׂרף in prophetic judgment context is best rendered
    as a future sequence in English: ''they will burn.'''
- source_word: בָתַּיִךְ
  chosen: your houses
  alternatives:
  - your houses/buildings
  lexicon: HALOT
  rationale: Plural construct of בַּיִת with 2fs suffix. 'Houses' is the plain lexical
    sense and fits the imagery of urban devastation.
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  - by fire
  lexicon: HALOT
  rationale: Beth preposition with אֵשׁ here expresses means/instrument. 'With fire'
    is idiomatic and preserves the concrete image.
- source_word: וְעָשׂוּ בָךְ שְׁפָטִים
  chosen: execute judgments against you
  alternatives:
  - carry out judgments on you
  - do judgments against you
  lexicon: HALOT
  rationale: The idiom עשה + שְׁפָטִים means to carry out judicial punishments. 'Execute
    judgments against you' is natural English and preserves the legal force.
- source_word: לְעֵינֵי נָשִׁים רַבּוֹת
  chosen: before the eyes of many women
  alternatives:
  - in the sight of many women
  - before many women
  lexicon: HALOT
  rationale: Literally 'to the eyes of many women.' The fuller rendering preserves
    the public-shame motif in Ezekiel while remaining readable.
- source_word: וְהִשְׁבַּתִּיךְ
  chosen: I will put a stop to you
  alternatives:
  - I will cause you to cease
  - I will stop you
  lexicon: HALOT
  rationale: 'Hiphil of שׁבת means cause to cease. In context it governs the following
    prepositional phrase, so idiomatic English requires expansion: ''I will put a
    stop to...'' rather than the overly literal ''I will stop you.'''
- source_word: מִזּוֹנָה
  chosen: your prostitution
  alternatives:
  - from being a prostitute
  - your whoring
  lexicon: HALOT
  rationale: מן + participial/noun form from זנה denotes cessation from harlotry.
    'Your prostitution' communicates the metaphorical and moral force without archaic
    diction; 'whoring' is possible but less suitable for the target register.
- source_word: וְגַם
  chosen: and
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: Adds an emphatic continuation. English can absorb the force with simple
    'and' without sounding wooden.
- source_word: אֶתְנַן
  chosen: payment
  alternatives:
  - harlot's pay
  - wages
  - fee
  lexicon: HALOT
  rationale: אֶתְנַן is payment given in connection with prostitution. 'Payment' is
    clear modern English; the prostitution context is already explicit in the previous
    clause.
- source_word: לֹא תִתְּנִי עוֹד
  chosen: you will no longer give
  alternatives:
  - you will not give anymore
  - you will give no more
  lexicon: HALOT
  rationale: Imperfect 2fs with negation and עוֹד expresses future cessation. 'No
    longer give' is idiomatic and concise.
