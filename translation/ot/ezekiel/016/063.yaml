id: EZK.16.63
reference: Ezekiel 16:63
source:
  edition: WLC
  text: לְמַ֤עַן תִּזְכְּרִי֙ וָ/בֹ֔שְׁתְּ וְ/לֹ֨א יִֽהְיֶה לָּ֥/ךְ עוֹד֙ פִּתְח֣וֹן
    פֶּ֔ה מִ/פְּנֵ֖י כְּלִמָּתֵ֑/ךְ בְּ/כַפְּרִ/י לָ/ךְ֙ לְ/כָל אֲשֶׁ֣ר עָשִׂ֔ית נְאֻ֖ם
    אֲדֹנָ֥/י יְהוִֽה־־־׃ס
translation:
  text: so that you may remember and be ashamed, and no longer have any opening of
    the mouth because of your disgrace, when I make atonement for you for all that
    you have done, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any occasion to open your mouth'; the Hebrew idiom literally says 'opening
      of the mouth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when I atone for you.' The Hebrew verb carries atonement/reconciliation
      language, not merely general forgiveness.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - so that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: תִּזְכְּרִי
  chosen: you may remember
  alternatives:
  - you will remember
  - you remember
  lexicon: HALOT
  rationale: Imperfect 2fs after לְמַעַן is well rendered as a purpose clause, 'you
    may remember.' The feminine singular is addressed to Jerusalem personified.
- source_word: וָבֹשְׁתְּ
  chosen: and be ashamed
  alternatives:
  - and be put to shame
  - and feel shame
  lexicon: HALOT
  rationale: בוש commonly denotes shame/being ashamed. 'Be ashamed' is concise and
    idiomatic; 'be put to shame' would suggest a more passive nuance than required
    here.
- source_word: וְלֹא יִהְיֶה לָּךְ עוֹד
  chosen: and no longer have
  alternatives:
  - and there will no longer be for you
  - and it will no longer be yours
  lexicon: HALOT
  rationale: The Hebrew is literally existential ('there will not be to you anymore'),
    but English idiom prefers 'you no longer have.' This preserves sense without awkwardness.
- source_word: פִּתְחוֹן פֶּה
  chosen: any opening of the mouth
  alternatives:
  - occasion to open your mouth
  - room to speak
  - opening of mouth
  lexicon: HALOT
  rationale: A Hebrew idiom for having grounds or boldness to speak. I kept the image
    fairly closely with 'opening of the mouth' rather than fully paraphrasing it away,
    while adding 'any' for natural English.
- source_word: מִפְּנֵי כְּלִמָּתֵךְ
  chosen: because of your disgrace
  alternatives:
  - from before your humiliation
  - because of your shame
  lexicon: HALOT
  rationale: מִפְּנֵי here gives causal force in context. כְּלִמָּה overlaps with
    shame/disgrace; 'disgrace' avoids repetition with בוש and conveys public dishonor.
- source_word: בְּכַפְּרִי לָךְ
  chosen: when I make atonement for you
  alternatives:
  - when I atone for you
  - when I cover for you
  - when I appease concerning you
  lexicon: HALOT
  rationale: 'כפר is a theologically weighty verb. ''Make atonement for'' is the clearest
    established English equivalent and preserves sacrificial/reconciliatory force
    better than the vaguer ''cover.'' The prefixed ב is taken temporally here: ''when
    I make atonement.'''
- source_word: לְכָל אֲשֶׁר עָשִׂית
  chosen: for all that you have done
  alternatives:
  - for everything that you did
  - concerning all that you have done
  lexicon: HALOT
  rationale: Captures the comprehensive scope of Jerusalem's guilt. Present perfect
    in English fits the retrospective force.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  - declares the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula, naturally rendered 'declares.'
    Following doctrine, יְהוָה is rendered 'the LORD'; in the compound title אֲדֹנָי
    יְהוִה, standard English convention is 'Lord GOD' to avoid 'Lord LORD'.
