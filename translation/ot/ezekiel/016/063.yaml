theological_decisions:
- issue: Rendering of כפר in a context of divine forgiveness/restoration
  chosen_reading: make atonement for you
  alternative_readings:
  - forgive you
  - cover you
  - pardon you
  rationale: The Hebrew verb כפר should retain its atonement/reconciliation force
    rather than be flattened to mere forgiveness. In this restoration oracle, the
    text presents YHWH's gracious dealing with Jerusalem in terms of atonement, which
    should be preserved even if the precise mechanism is not specified in the verse
    itself.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Sovereign LORD
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD.'
    In the compound title with אֲדֹנָי, English convention 'Lord GOD' best preserves
    both elements without the awkward 'Lord LORD.' 'Sovereign LORD' is interpretive
    and not required by the Hebrew here.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
