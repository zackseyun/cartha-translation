id: EZK.16.60
reference: Ezekiel 16:60
source:
  edition: WLC
  text: וְ/זָכַרְתִּ֨י אֲנִ֧י אֶת בְּרִיתִ֛/י אוֹתָ֖/ךְ בִּ/ימֵ֣י נְעוּרָ֑יִ/ךְ וַ/הֲקִמוֹתִ֥י
    לָ֖/ךְ בְּרִ֥ית עוֹלָֽם־׃
translation:
  text: But I myself will remember my covenant with you in the days of your youth,
    and I will establish for you an everlasting covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eternal covenant.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'my covenant with you in the days of your youth,' recalling
      the earlier covenant relationship without specifying here which covenant administration
      is in view.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/זָכַרְתִּי
  chosen: But I ... will remember
  alternatives:
  - And I ... will remember
  - Yet I ... will remember
  lexicon: HALOT
  rationale: זכר in the qatal with prefixed conjunction here carries a future sense
    in context, following the preceding judgment/restoration movement. The conjunction
    is rendered adversatively as 'But' because the verse turns from Jerusalem's shame
    to Yahweh's gracious action.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal suffix; 'I myself'
    preserves that emphasis in natural English.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of ברית. The possessive suffix is retained explicitly.
- source_word: אֶת ... אוֹתָךְ
  chosen: with you
  alternatives:
  - concerning you
  - toward you
  lexicon: HALOT
  rationale: The construction 'remember my covenant [with] you' is idiomatic; English
    requires the relational sense 'with you' rather than a wooden retention of both
    object markers.
- source_word: בִּימֵי נְעוּרַיִךְ
  chosen: in the days of your youth
  alternatives:
  - in your youthful days
  - when you were young
  lexicon: HALOT
  rationale: This preserves the Hebrew temporal idiom and echoes the covenantal history
    alluded to in the chapter.
- source_word: וַהֲקִמוֹתִי
  chosen: and I will establish
  alternatives:
  - and I will confirm
  - and I will uphold
  lexicon: HALOT
  rationale: Hiphil of קום with covenant language commonly means to establish or confirm
    a covenant. 'Establish' is clear and idiomatic here.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The preposition is literally 'for/to you.' 'For you' preserves the dative
    sense while remaining natural in English. 'With you' would over-assimilate it
    to common English covenant phrasing.
- source_word: בְּרִית עוֹלָם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  lexicon: HALOT
  rationale: This is a standard covenantal expression. 'Everlasting' fits biblical
    English usage well and communicates enduring permanence without unnecessary archaism.
