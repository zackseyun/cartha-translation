theological_decisions:
- issue: Rendering the divine name יְהוָה in the prophetic formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: Per DOCTRINE.md, the default rendering of יְהוָה is 'the LORD.' In the
    compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by rendering as
    'Lord GOD,' which preserves reverential distinction and readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
