id: EZK.16.43
reference: Ezekiel 16:43
source:
  edition: WLC
  text: יַ֗עַן אֲשֶׁ֤ר לֹֽא זכרתי אֶת יְמֵ֣י נְעוּרַ֔יִ/ךְ וַ/תִּרְגְּזִי לִ֖/י בְּ/כָל
    אֵ֑לֶּה וְ/גַם אֲנִ֨י הֵ֜א דַּרְכֵּ֣/ךְ בְּ/רֹ֣אשׁ נָתַ֗תִּי נְאֻם֙ אֲדֹנָ֣/י
    יְהוִ֔ה וְ/לֹ֤א עשיתי אֶת הַ/זִּמָּ֔ה עַ֖ל כָּל תּוֹעֲבֹתָֽיִ/ךְ־־־־־׀־־׃
translation:
  text: Because you did not remember the days of your youth, but enraged me with all
    these things, therefore I also have put your way on your own head, declares the
    Lord GOD, and you have not committed lewdness beyond all your abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and you did not do this lewdness in addition to all your abominations.'
      The Hebrew of the final clause is difficult, and some take it as saying Jerusalem's
      lewdness was committed along with, or on top of, all her abominations.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because that
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment. 'Because' is natural modern
    English and preserves the causal force without unnecessary stiffness.
- source_word: לֹא זכרתי
  chosen: you did not remember
  alternatives:
  - you did not call to mind
  lexicon: HALOT
  rationale: The verb זכר in Qal commonly means 'remember.' Although the morphology
    table tags the form unusually, the context clearly requires second feminine singular
    addressing Jerusalem. 'Remember' best preserves the covenantal/moral sense.
- source_word: יְמֵי נְעוּרַיִךְ
  chosen: the days of your youth
  alternatives:
  - your youthful days
  lexicon: HALOT
  rationale: A standard idiom referring to Jerusalem's earlier condition and origins.
    The more literal phrase is clear and idiomatic in English.
- source_word: וַתִּרְגְּזִי לִי
  chosen: but enraged me
  alternatives:
  - and provoked me
  - and made me tremble/quake
  lexicon: HALOT
  rationale: רגז can denote agitation or provocation. In this context of divine offense,
    'enraged me' captures the personal provocation more strongly than the traditional
    but somewhat blander 'provoked me.' The conjunction is rendered 'but' to reflect
    the adversative sense in context.
- source_word: בְּכָל אֵלֶּה
  chosen: with all these things
  alternatives:
  - by all these things
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with' here, referring back to
    Jerusalem's acts just described.
- source_word: וְגַם אֲנִי הֵא
  chosen: therefore I also
  alternatives:
  - and I also—behold—
  - so I too
  lexicon: HALOT
  rationale: The particle sequence marks emphatic divine response. 'Therefore I also'
    conveys responsive consequence in smooth English; the deictic/interjection הֵא
    is absorbed into the emphasis rather than translated woodenly.
- source_word: דַּרְכֵּךְ בְּרֹאשׁ נָתַתִּי
  chosen: have put your way on your own head
  alternatives:
  - have brought your conduct down on your head
  - have placed your ways upon your head
  lexicon: HALOT
  rationale: A judicial idiom meaning to repay someone according to her conduct. 'Your
    way' keeps the singular Hebrew and preserves the metaphor; 'your own head' makes
    explicit the reflexive sense natural in English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is standard readable
    English. Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes
    it, 'Lord GOD' follows established English convention for אֲדֹנָי יְהוִה.
- source_word: וְלֹא עשיתי
  chosen: and you have not committed
  alternatives:
  - and you did not do
  lexicon: HALOT
  rationale: The consonantal text points to עשה, but the form is best understood contextually
    as second feminine singular, continuing the address to Jerusalem. English 'committed'
    fits the object 'lewdness' better than the generic 'did.'
- source_word: הַזִּמָּה
  chosen: lewdness
  alternatives:
  - wickedness
  - licentiousness
  - this outrageous act
  lexicon: HALOT
  rationale: זִמָּה in sexual-moral contexts often denotes lewd or depraved conduct.
    'Lewdness' preserves the sexual-ethical force present throughout the chapter.
- source_word: עַל כָּל תּוֹעֲבֹתָיִךְ
  chosen: beyond all your abominations
  alternatives:
  - in addition to all your abominations
  - along with all your abominations
  lexicon: HALOT
  rationale: The phrase is difficult. Here עַל is taken in a comparative/additive
    sense, yielding the sense that Jerusalem did not merely commit one act on top
    of all her abominations. 'Beyond all your abominations' preserves the awkward
    intensification while remaining intelligible.
