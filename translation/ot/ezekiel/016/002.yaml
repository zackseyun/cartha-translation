id: EZK.16.2
reference: Ezekiel 16:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הוֹדַ֥ע אֶת יְרוּשָׁלִַ֖ם אֶת תּוֹעֲבֹתֶֽי/הָ־־־׃
translation:
  text: Son of man, make Jerusalem know her abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make known to Jerusalem her abominations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: The Hebrew vocative literally means 'son of man/man.' In Ezekiel this
    is a recurring divine address to the prophet. 'Son of man' preserves the established
    idiom and the source-text form better than more interpretive alternatives like
    'mortal.' It is gender-accurate and matches the singular masculine address.
- source_word: הוֹדַע
  chosen: make ... know
  alternatives:
  - inform
  - declare to
  - make known to
  lexicon: HALOT
  rationale: Hiphil imperative of ידע carries a causative sense, 'cause to know' or
    'make known.' Because the construction is הוֹדַע אֶת יְרוּשָׁלִַם אֶת תּוֹעֲבוֹתֶיהָ,
    English 'make Jerusalem know' best reflects the causative force and the double-object
    structure, while remaining natural.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy
    to transliterate names.
- source_word: תּוֹעֲבֹתֶיהָ
  chosen: her abominations
  alternatives:
  - her detestable acts
  - her abominable deeds
  lexicon: HALOT
  rationale: תּוֹעֵבָה denotes something abhorrent or detestable, often with strong
    covenantal and cultic-moral force in prophetic literature. 'Abominations' preserves
    that weight and the plural form. The 3fs suffix is rendered 'her,' referring to
    Jerusalem personified as feminine.
