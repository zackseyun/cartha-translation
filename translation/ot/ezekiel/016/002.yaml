theological_decisions:
- issue: Personification of Jerusalem with feminine suffix
  chosen_reading: Render the suffix explicitly as 'her' in 'her abominations.'
  alternative_readings:
  - its abominations
  rationale: The Hebrew uses a feminine singular suffix because Jerusalem is grammatically
    and rhetorically personified as a woman throughout the chapter. Rendering 'her'
    preserves the literary setup for the allegory that follows better than the more
    impersonal 'its.'
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
