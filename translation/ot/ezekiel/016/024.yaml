id: EZK.16.24
reference: Ezekiel 16:24
source:
  edition: WLC
  text: וַ/תִּבְנִי לָ֖/ךְ גֶּ֑ב וַ/תַּעֲשִׂי לָ֥/ךְ רָמָ֖ה בְּ/כָל רְחֽוֹב־־־׃
translation:
  text: You built for yourself a mound and made for yourself a high place in every
    square.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arched chamber,' 'platform,' or possibly a structure associated with
      prostitution; the Hebrew term is rare and uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּב
  chosen: mound
  alternatives:
  - arched chamber
  - vaulted place
  - platform
  - brothel mound
  lexicon: HALOT
  rationale: The noun is rare and contextually tied to illicit cultic/prostitution
    imagery in this chapter. 'Mound' preserves the concrete sense of a built raised
    structure without over-interpreting it as a specific architectural form. More
    interpretive options such as 'brothel' or 'shrine' go beyond the lexical data
    of the word itself.
- source_word: רָמָה
  chosen: high place
  alternatives:
  - height
  - elevated shrine
  lexicon: HALOT
  rationale: In prophetic literature this commonly denotes a cultic high place. Here
    the surrounding context of spiritual prostitution supports the established cultic
    sense rather than a merely topographical 'height'.
- source_word: רְחֹוב
  chosen: square
  alternatives:
  - street
  - open place
  - plaza
  lexicon: HALOT
  rationale: The term often refers to an open public place within a city rather than
    a roadway alone. 'Square' fits the urban setting and the idea of public visibility
    in Ezekiel's accusation.
- source_word: וַתִּבְנִי לָךְ
  chosen: You built for yourself
  alternatives:
  - You built yourself
  lexicon: HALOT
  rationale: The reflexive-benefactive sense of לָךְ is retained with natural English
    phrasing, emphasizing that Jerusalem constructed these things for her own purposes.
- source_word: וַתַּעֲשִׂי לָךְ
  chosen: made for yourself
  alternatives:
  - made yourself
  - fashioned for yourself
  lexicon: HALOT
  rationale: As with the previous clause, the benefactive pronoun is represented.
    'Made' is straightforward and idiomatic.
- source_word: בְּכָל
  chosen: in every
  alternatives:
  - at every
  - throughout every
  lexicon: HALOT
  rationale: 'This conveys distributive force: these structures were set up ubiquitously
    throughout the city''s public spaces.'
