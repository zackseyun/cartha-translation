theological_decisions:
- issue: Whether to render the architectural terms with explicitly sexual or cult-prostitution
    language in the main text
  chosen_reading: Retain relatively literal architectural language ('mound' and 'high
    place') and allow the broader chapter context to supply the metaphorical force.
  alternative_readings:
  - Render גֶּב as 'brothel' or 'shrine for prostitution'
  rationale: Ezekiel 16 uses sexualized metaphor for idolatry, but this verse itself
    names built structures. A more explicit sexual rendering would import interpretation
    from the context into a lexically uncertain noun. Optimal equivalence here favors
    a concrete translation with a footnote preserving the stronger contextual possibility.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
