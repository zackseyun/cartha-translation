id: EZK.16.33
reference: Ezekiel 16:33
source:
  edition: WLC
  text: לְ/כָל זֹנ֖וֹת יִתְּנוּ נֵ֑דֶה וְ/אַ֨תְּ נָתַ֤תְּ אֶת נְדָנַ֨יִ/ךְ֙ לְ/כָל
    מְאַֽהֲבַ֔יִ/ךְ וַ/תִּשְׁחֳדִ֣י אוֹתָ֗/ם לָ/ב֥וֹא אֵלַ֛יִ/ךְ מִ/סָּבִ֖יב בְּ/תַזְנוּתָֽיִ/ךְ־־־־׃
translation:
  text: Men give a prostitute her payment, but you gave your gifts to all your lovers,
    and you bribed them to come to you from all around for your prostitutions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'prostitutes' (plural); the English singular is generic.
    reason: lexical_alternative
  - marker: b
    text: Or 'fee' or 'wages' for a prostitute.
    reason: lexical_alternative
  - marker: c
    text: Or 'you hired them.' The Hebrew verb commonly means 'to bribe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹנוֹת
  chosen: a prostitute
  alternatives:
  - prostitutes
  - whores
  lexicon: HALOT
  rationale: The Hebrew is plural ('prostitutes') in a general statement, but idiomatic
    English often uses the singular generically after 'men give.' 'Prostitute' is
    clear modern English; 'whore' is harsher and less suitable for the translation's
    register.
- source_word: נֵדֶה
  chosen: payment
  alternatives:
  - gift
  - fee
  - wages
  lexicon: HALOT
  rationale: In this context the noun refers to what is given to a prostitute. 'Payment'
    best captures the transactional sense in natural English without over-specifying.
- source_word: נְדָנַיִךְ
  chosen: your gifts
  alternatives:
  - your payments
  - your presents
  lexicon: HALOT
  rationale: This term denotes gifts or presents given by the woman to her lovers.
    'Your gifts' preserves the irony that she gives what prostitutes normally receive.
    'Payments' is possible but would flatten the lexical distinction from נֵדֶה.
- source_word: מְאַהֲבַיִךְ
  chosen: your lovers
  alternatives:
  - those who love you
  - your paramours
  lexicon: HALOT
  rationale: In Ezekiel's metaphor this term refers to illicit partners/allies. 'Your
    lovers' is the standard, natural rendering and fits the sexualized prophetic imagery.
- source_word: וַתִּשְׁחֳדִי
  chosen: you bribed
  alternatives:
  - you enticed with gifts
  - you hired
  lexicon: HALOT
  rationale: 'The verb שׁחד commonly means ''to bribe.'' Here it intensifies the reversal:
    instead of being paid, she pays others to come. ''Bribed'' preserves the moral
    corruption implied by the Hebrew.'
- source_word: מִסָּבִיב
  chosen: from all around
  alternatives:
  - from every side
  - from around about
  lexicon: HALOT
  rationale: The phrase indicates approach from surrounding regions/directions. 'From
    all around' is idiomatic modern English and preserves the spatial sense.
- source_word: בְּתַזְנוּתָיִךְ
  chosen: for your prostitutions
  alternatives:
  - for your acts of prostitution
  - in your whorings
  lexicon: HALOT
  rationale: The plural abstract noun conveys repeated acts of harlotry. 'For your
    prostitutions' keeps the plural force and the purpose/result sense of the preposition
    in context.
- source_word: לְכָל ... יִתְּנוּ
  chosen: Men give
  alternatives:
  - To every prostitute they give
  - Everyone gives
  lexicon: HALOT
  rationale: The Hebrew has an impersonal plural verb ('they give') with a generalizing
    sense. 'Men give' is idiomatic English for a general statement in this sexual
    context, without claiming maleness as the only possible subject.
