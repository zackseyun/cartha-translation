theological_decisions:
- issue: Prophetic sexual metaphor for Jerusalem's unfaithfulness
  chosen_reading: Retain the prostitution imagery directly
  alternative_readings:
  - Soften to 'unfaithfulness' or 'idolatry' in the main text
  rationale: The Hebrew explicitly uses prostitution language, and the translation
    philosophy forbids paraphrasing beyond what the source warrants. The metaphor
    carries the prophetic force of covenantal betrayal and should remain visible in
    the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
