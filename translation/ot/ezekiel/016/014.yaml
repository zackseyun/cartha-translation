id: EZK.16.14
reference: Ezekiel 16:14
source:
  edition: WLC
  text: וַ/יֵּ֨צֵא לָ֥/ךְ שֵׁ֛ם בַּ/גּוֹיִ֖ם בְּ/יָפְיֵ֑/ךְ כִּ֣י כָּלִ֣יל ה֗וּא בַּֽ/הֲדָרִ/י֙ אֲשֶׁר שַׂ֣מְתִּי עָלַ֔יִ/ךְ נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׀־׃
translation:
  text: And your fame went out among the nations because of your beauty, for it was perfect through my splendor that I had set upon you, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your name went out among the nations'; that is, your reputation or fame spread abroad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - spread
  - went forth
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' In this idiom with 'name,' 'went out' preserves the Hebrew image of reputation going abroad, while remaining natural English.
- source_word: שֵׁם
  chosen: fame
  alternatives:
  - name
  - reputation
  lexicon: HALOT
  rationale: Although literally 'name,' in context 'your name went out among the nations' is idiomatic for renown or reputation. 'Fame' captures the sense succinctly in modern English.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to the surrounding nations, not specifically 'Gentiles' in a later technical sense. 'Among the nations' is the most contextually appropriate and standard rendering.
- source_word: בְּיָפְיֵךְ
  chosen: because of your beauty
  alternatives:
  - for your beauty
  - in your beauty
  lexicon: HALOT
  rationale: 'The preposition ב here is causal/instrumental in context: her renown spread on account of her beauty. ''Because of your beauty'' makes the relation clear in English.'
- source_word: כָּלִיל
  chosen: perfect
  alternatives:
  - complete
  - flawless
  - finished
  lexicon: HALOT
  rationale: כָּלִיל conveys completeness or perfection. In the context of beauty and adornment, 'perfect' is the most idiomatic and fitting English choice.
- source_word: בַּהֲדָרִי
  chosen: through my splendor
  alternatives:
  - by my majesty
  - with my adornment
  - through my majesty
  lexicon: HALOT
  rationale: הָדָר denotes splendor, majesty, or adornment. Here God explains that Jerusalem's beauty derived from the splendor he bestowed. 'Through my splendor' best captures both source and means.
- source_word: שַׂמְתִּי עָלַיִךְ
  chosen: that I had set upon you
  alternatives:
  - which I placed on you
  - that I bestowed on you
  lexicon: HALOT
  rationale: The verb שׂים with עַל is literally 'set/place upon.' 'Had set upon you' preserves the concrete metaphor of bestowed adornment while fitting the English clause.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is clear modern English. אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD'; per doctrine, YHWH is rendered 'the LORD,' but in this fixed combination English convention uses 'Lord GOD' to avoid 'Lord LORD.'
