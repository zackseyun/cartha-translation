theological_decisions:
- issue: Rendering the divine name יְהוָה in the prophetic formula
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic phrase applied to idolatry
  chosen_reading: as a pleasing aroma
  alternative_readings:
  - for a soothing aroma
  rationale: The phrase is standard sacrificial language, here used with bitter irony for offerings made to idols. The translation preserves the cultic wording without softening the indictment or importing additional theological explanation into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
