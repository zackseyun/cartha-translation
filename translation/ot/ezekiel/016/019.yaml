id: EZK.16.19
reference: Ezekiel 16:19
source:
  edition: WLC
  text: וְ/לַחְמִ/י֩ אֲשֶׁר נָתַ֨תִּי לָ֜/ךְ סֹ֣לֶת וָ/שֶׁ֤מֶן וּ/דְבַשׁ֙ הֶֽאֱכַלְתִּ֔י/ךְ וּ/נְתַתִּ֧י/הוּ לִ/פְנֵי/הֶ֛ם לְ/רֵ֥יחַ נִיחֹ֖חַ וַ/יֶּ֑הִי נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃
translation:
  text: And my bread that I gave you—fine flour, oil, and honey with which I fed you—you set before them as a pleasing aroma, and so it was, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my food that I gave you.' Hebrew 'bread' can sometimes stand more broadly for food.
    reason: lexical_alternative
  - marker: b
    text: '''A pleasing aroma'' is standard sacrificial language, here used ironically of what was offered before idols.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'Lord GOD' represents אֲדֹנָי יְהוִה; the divine name יְהוָה is rendered 'the LORD' by translation policy.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחְמִי
  chosen: my bread
  alternatives:
  - my food
  lexicon: HALOT
  rationale: לֶחֶם commonly means 'bread,' but can extend to 'food.' Here 'bread' preserves the concrete imagery while the following apposition specifies the food given.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine meal
  lexicon: HALOT
  rationale: Standard rendering for the refined flour used in quality food and offerings; 'fine flour' is clear modern English and preserves cultic resonance.
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The Hebrew is simply 'oil.' While olive oil is culturally likely, specifying 'olive' would add information not explicit in the text.
- source_word: דְבַשׁ
  chosen: honey
  alternatives:
  - date syrup
  lexicon: HALOT
  rationale: The usual gloss is 'honey.' In some contexts it may denote a sweet syrup, but 'honey' is the standard and sufficiently transparent rendering.
- source_word: הֶאֱכַלְתִּיךְ
  chosen: I fed you
  alternatives:
  - I caused you to eat
  - I nourished you
  lexicon: HALOT
  rationale: The Hiphil of אכל is causative, literally 'I caused you to eat.' 'I fed you' is the natural English equivalent and preserves the sense of divine provision.
- source_word: וּנְתַתִּיהוּ
  chosen: you even set
  alternatives:
  - and you set it
  - you placed it
  lexicon: HALOT
  rationale: Contextually the subject shifts to the woman/Jerusalem, despite the morphology table's irregularity. The sense in context is that she took what God gave and placed it before idols. 'Even' brings out the accusatory force of the sequence without adding new content.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: A straightforward rendering. In context 'them' refers to the idols/lovers previously mentioned; the pronoun is left as in the Hebrew rather than made explicit in the main text.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - as a sweet-smelling savor
  lexicon: HALOT
  rationale: This is sacrificial language used ironically here for offerings presented to idols. 'Pleasing aroma' is idiomatic modern English and preserves the cultic allusion.
- source_word: וַיֶּהִי
  chosen: and so it was
  alternatives:
  - and it happened
  - and it was so
  lexicon: HALOT
  rationale: This confirms the reality of the accusation. 'And so it was' reads naturally in English while retaining the emphatic confirmation.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Lord GOD' is the conventional English representation of אֲדֹנָי יְהוִה and avoids the awkward 'Lord LORD.'
