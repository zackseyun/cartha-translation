id: EZK.16.44
reference: Ezekiel 16:44
source:
  edition: WLC
  text: הִנֵּה֙ כָּל הַ/מֹּשֵׁ֔ל עָלַ֥יִ/ךְ יִמְשֹׁ֖ל לֵ/אמֹ֑ר כְּ/אִמָּ֖/ה בִּתָּֽ/הּ־׃
translation:
  text: Look, everyone who uses proverbs about you will use this proverb, saying,
    ‘Like mother, like daughter.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew uses the root משל here in the sense of speaking or using a proverb,
      not ruling.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the statement with attention-getting force. 'Look' is natural
    modern English while preserving the deictic emphasis.
- source_word: כָּל
  chosen: everyone
  alternatives:
  - all
  - every one
  lexicon: HALOT
  rationale: 'With the following participle functioning substantivally, the sense
    is distributive: every person of the relevant kind. ''Everyone'' is idiomatic
    English.'
- source_word: הַמֹּשֵׁל
  chosen: who uses proverbs
  alternatives:
  - who speaks in proverbs
  - who quotes proverbs
  - the proverb-maker
  lexicon: HALOT
  rationale: From משל in the sense 'to use/speak a proverb,' not the more common unrelated
    sense 'to rule.' Context and the following cognate verb ימשל plus לאמר show proverbial
    speech is intended.
- source_word: עָלַיִךְ
  chosen: about you
  alternatives:
  - against you
  - concerning you
  - over you
  lexicon: HALOT
  rationale: With proverbial speech, על commonly marks the object/topic. 'About you'
    best fits English idiom here. 'Against you' is possible given the taunting context,
    but the preposition itself need not encode hostility.
- source_word: יִמְשֹׁל
  chosen: will use this proverb
  alternatives:
  - will speak a proverb
  - will quote a proverb
  - will make a proverb
  lexicon: HALOT
  rationale: Same root as המשל, here finite verb. Rendering with 'use this proverb'
    captures the idiomatic force and avoids confusion with 'rule.' 'This' is supplied
    in English because the content of the proverb immediately follows.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard introduction to direct speech.
- source_word: כְאִמָּה בִּתָּהּ
  chosen: Like mother, like daughter
  alternatives:
  - As the mother, so her daughter
  - Like her mother, her daughter
  lexicon: HALOT
  rationale: This is a compact proverbial comparison. The English proverb 'Like mother,
    like daughter' preserves both the terseness and rhetorical punch of the Hebrew.
