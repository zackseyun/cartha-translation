id: EZK.16.15
reference: Ezekiel 16:15
source:
  edition: WLC
  text: וַ/תִּבְטְחִ֣י בְ/יָפְיֵ֔/ךְ וַ/תִּזְנִ֖י עַל שְׁמֵ֑/ךְ וַ/תִּשְׁפְּכִ֧י אֶת
    תַּזְנוּתַ֛יִ/ךְ עַל כָּל עוֹבֵ֖ר ל/וֹ יֶֽהִי־־־־־׃
translation:
  text: But you trusted in your beauty, and you prostituted yourself because of your
    name, and you poured out your prostitutions on every passerby; they became his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of your fame' / 'because of your reputation'; Hebrew 'name'
      often carries the sense of renown here.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is terse in Hebrew: ''to him let it be'' or ''it became
      his,'' expressing that what she offered was given over to each passerby.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְטְחִי
  chosen: you trusted
  alternatives:
  - you became confident
  - you relied
  lexicon: HALOT
  rationale: The verb בטח denotes trusting or relying. 'You trusted' is the most direct
    rendering and preserves the accusatory force of misplaced confidence.
- source_word: בְיָפְיֵךְ
  chosen: in your beauty
  alternatives:
  - because of your beauty
  - in your attractiveness
  lexicon: HALOT
  rationale: The preposition ב with בטח naturally yields 'trust in.' 'Beauty' is the
    standard rendering of יֹפִי and fits the metaphor of Jerusalem's attractiveness.
- source_word: וַתִּזְנִי
  chosen: you prostituted yourself
  alternatives:
  - you played the whore
  - you committed prostitution
  - you were unfaithful
  lexicon: HALOT
  rationale: זנה in prophetic metaphor refers to sexual prostitution and covenantal
    infidelity. 'You prostituted yourself' preserves the sexual imagery without archaic
    idiom; 'were unfaithful' is too interpretive for the main text.
- source_word: עַל שְׁמֵךְ
  chosen: because of your name
  alternatives:
  - on account of your fame
  - because of your reputation
  lexicon: HALOT
  rationale: שֵׁם here refers to renown or reputation established in the preceding
    context. 'Because of your name' is formally close, while still intelligible in
    English; the sense of fame is preserved in a footnote.
- source_word: וַתִּשְׁפְּכִי
  chosen: you poured out
  alternatives:
  - you lavished
  - you spread abroad
  lexicon: HALOT
  rationale: שׁפך literally means 'pour out.' Retaining the concrete metaphor matches
    Ezekiel's vivid style better than smoothing it to 'lavished.'
- source_word: אֶת תַּזְנוּתַיִךְ
  chosen: your prostitutions
  alternatives:
  - your acts of prostitution
  - your whorings
  lexicon: HALOT
  rationale: The plural abstract/concrete noun intensifies repeated acts. 'Your prostitutions'
    is literal and readable; 'whorings' is more traditional but less natural in modern
    English.
- source_word: עַל כָּל עוֹבֵר
  chosen: on every passerby
  alternatives:
  - with every passerby
  - upon everyone who passed by
  lexicon: HALOT
  rationale: The phrase is idiomatic in context for indiscriminate sexual availability.
    'On every passerby' keeps the Hebrew preposition and the shocking imagery.
- source_word: לוֹ יְהִי
  chosen: they became his
  alternatives:
  - it was his
  - to him it belonged
  - for him it was
  lexicon: HALOT
  rationale: This terse clause is difficult, but the sense is that her prostitutions/beauty
    were yielded to each passerby. 'They became his' best reflects the plural antecedent
    and the idea of surrender to each one.
