id: EZK.16.13
reference: Ezekiel 16:13
source:
  edition: WLC
  text: וַ/תַּעְדִּ֞י זָהָ֣ב וָ/כֶ֗סֶף וּ/מַלְבּוּשֵׁ/ךְ֙ ששי וָ/מֶ֨שִׁי֙ וְ/רִקְמָ֔ה
    סֹ֧לֶת וּ/דְבַ֛שׁ וָ/שֶׁ֖מֶן אכלתי וַ/תִּ֨יפִי֙ בִּ/מְאֹ֣ד מְאֹ֔ד וַֽ/תִּצְלְחִ֖י
    לִ/מְלוּכָֽה׃
translation:
  text: You adorned yourself with gold and silver, and your clothing was fine linen,
    silk, and embroidered cloth. You ate fine flour, honey, and oil, and you became
    exceedingly beautiful and advanced to royalty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prospered into a kingdom' or 'came to queenship.' The Hebrew expression
      can denote successful advancement into royal status more generally.
    reason: alternative_reading
  - marker: b
    text: The precise identification of the textile rendered 'silk' is uncertain;
      it refers to a luxurious fabric.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעְדִּי
  chosen: You adorned yourself
  alternatives:
  - You decked yourself
  - You were adorned
  lexicon: HALOT
  rationale: From עדה in the sense of adorning oneself with ornaments. The reflexive
    sense fits the direct objects 'gold and silver' and the broader bridal imagery
    in the context.
- source_word: זָהָב וָכֶסֶף
  chosen: gold and silver
  lexicon: HALOT
  rationale: Straightforward material terms; retained literally as the objects of
    adornment.
- source_word: וּמַלְבּוּשֵׁךְ
  chosen: and your clothing was
  alternatives:
  - and your garment was
  - and your attire was
  lexicon: HALOT
  rationale: Collective singular with 2fs suffix. 'Clothing' is natural modern English
    and introduces the list of luxurious fabrics.
- source_word: שֵׁשִׁי
  chosen: fine linen
  alternatives:
  - linen
  lexicon: HALOT
  rationale: שֵׁשׁ commonly denotes fine linen, especially in luxury/cultic contexts.
    'Fine linen' preserves the elevated sense.
- source_word: מֶשִׁי
  chosen: silk
  alternatives:
  - fine cloth
  lexicon: HALOT
  rationale: Traditional and likely sense in this luxury list. Though the exact textile
    identification is debated, 'silk' is the standard concise rendering in English
    versions.
- source_word: רִקְמָה
  chosen: embroidered cloth
  alternatives:
  - embroidered work
  - embroidered fabric
  lexicon: HALOT
  rationale: Refers to embroidered material/textile. 'Cloth' reads naturally in the
    clothing list while preserving the craftsmanship nuance.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for high-quality flour, fitting the abundance imagery.
- source_word: דְבַשׁ
  chosen: honey
  lexicon: HALOT
  rationale: Literal food item; no contextual reason to paraphrase.
- source_word: שֶׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: Hebrew is simply 'oil.' 'Olive oil' is culturally likely but more specific
    than the text states, so 'oil' is preferred.
- source_word: אכלתי
  chosen: You ate
  alternatives:
  - you were fed
  lexicon: HALOT
  rationale: Qal perfect 2fs, straightforward active sense. The direct address continues
    the portrayal of lavish provision.
- source_word: וַתִּיפִי
  chosen: you became exceedingly beautiful
  alternatives:
  - you grew very beautiful
  - you became beautiful beyond measure
  lexicon: HALOT
  rationale: From יפה, 'to be beautiful.' The following בִּמְאֹד מְאֹד intensifies
    strongly; 'exceedingly beautiful' captures the superlative force in idiomatic
    English.
- source_word: בִּמְאֹד מְאֹד
  chosen: exceedingly
  alternatives:
  - very, very much
  - to a very great degree
  lexicon: HALOT
  rationale: Hebrew intensifier literally 'with very, very [much].' Compressed into
    natural English adverbial intensification.
- source_word: וַתִּצְלְחִי
  chosen: advanced
  alternatives:
  - prospered
  - succeeded
  lexicon: HALOT
  rationale: From צלח, to prosper/succeed/advance. In context with לִמְלוּכָה, the
    sense is not generic prosperity but rising successfully into royal status.
- source_word: לִמְלוּכָה
  chosen: to royalty
  alternatives:
  - to a kingdom
  - into queenship
  - for royal dignity
  lexicon: HALOT
  rationale: The noun denotes kingship/royal rule/royalty. Given the feminine addressee
    and metaphor of Jerusalem as a woman elevated in status, 'to royalty' best conveys
    accession to royal standing without over-specifying 'queenship,' which the Hebrew
    noun itself does not explicitly mark.
