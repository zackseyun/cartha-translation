theological_decisions:
- issue: Metaphorical elevation of Jerusalem's status in covenantal-marital imagery
  chosen_reading: advanced to royalty
  alternative_readings:
  - prospered into a kingdom
  - came to queenship
  rationale: The verse describes Jerusalem as a woman lavishly adorned and elevated.
    'To royalty' preserves the metaphorical and political elevation without forcing
    a narrower institutional reading or importing later doctrinal symbolism beyond
    the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
