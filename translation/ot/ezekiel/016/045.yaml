theological_decisions:
- issue: Ethnic parentage language ('your mother was a Hittite, and your father an
    Amorite')
  chosen_reading: Retained as metaphorical/taunting ancestry language within Ezekiel's
    prophetic indictment, not as a literal genealogical statement about Jerusalem's
    biological origins.
  alternative_readings:
  - Literal ethnic genealogy of Jerusalem/Israel's inhabitants
  rationale: In context (Ezekiel 16), the prophet uses familial and marital imagery
    to characterize Jerusalem's origins and behavior. The translation preserves the
    literal wording of the metaphor without importing a historical claim beyond what
    the rhetoric requires.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
