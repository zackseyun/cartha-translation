id: EZK.16.45
reference: Ezekiel 16:45
source:
  edition: WLC
  text: בַּת אִמֵּ֣/ךְ אַ֔תְּ גֹּעֶ֥לֶת אִישָׁ֖/הּ וּ/בָנֶ֑י/הָ וַ/אֲח֨וֹת אֲחוֹתֵ֜/ךְ
    אַ֗תְּ אֲשֶׁ֤ר גָּֽעֲ֨לוּ֙ אַנְשֵׁי/הֶ֣ן וּ/בְנֵי/הֶ֔ן אִמְּ/כֶ֣ן חִתִּ֔ית וַ/אֲבִי/כֶ֖ן
    אֱמֹרִֽי־׃
translation:
  text: You are the daughter of your mother, who loathed her husband and her children;
    and you are the sister of your sisters, who loathed their husbands and their children.
    Your mother was a Hittite, and your father an Amorite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'despised' / 'abhorred' for 'loathed' (Hebrew געל), a verb of strong
      revulsion.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת אִמֵּךְ
  chosen: the daughter of your mother
  alternatives:
  - your mother's daughter
  lexicon: HALOT
  rationale: A literal filial expression introducing resemblance by lineage. 'The
    daughter of your mother' preserves the Hebrew idiom more transparently than the
    more colloquial 'your mother's daughter.'
- source_word: גֹּעֶלֶת
  chosen: who loathed
  alternatives:
  - who despised
  - who abhorred
  lexicon: HALOT
  rationale: From געל, expressing strong revulsion or rejection. 'Loathed' conveys
    the emotional force without sounding overly archaic; it fits the accusatory rhetoric
    of the chapter.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: Though אִישׁ can mean 'man,' with the 3fs suffix in this domestic context
    it naturally means 'her husband.' This is the idiomatic and contextually precise
    English rendering.
- source_word: וּבָנֶיהָ
  chosen: and her children
  alternatives:
  - and her sons
  lexicon: HALOT
  rationale: While בנים can be rendered 'sons,' it often functions inclusively for
    offspring. 'Children' best reflects likely collective sense here and avoids narrowing
    beyond the Hebrew's probable intent.
- source_word: וַאֲחוֹת אֲחוֹתֵךְ
  chosen: and the sister of your sisters
  alternatives:
  - and a sister to your sisters
  lexicon: HALOT
  rationale: The construction emphasizes kinship and likeness with the other symbolic
    cities/sisters in the chapter. 'The sister of your sisters' keeps the Hebrew structure
    while remaining intelligible.
- source_word: אֲשֶׁר גָּעֲלוּ
  chosen: who loathed
  alternatives:
  - who despised
  - who abhorred
  lexicon: HALOT
  rationale: Same verb as earlier in the verse; rendered consistently as 'loathed'
    in keeping with the project's consistency principle.
- source_word: אַנְשֵׁיהֶן
  chosen: their husbands
  alternatives:
  - their men
  lexicon: HALOT
  rationale: Plural of אִישׁ in marital context; 'their husbands' is the natural English
    equivalent.
- source_word: וּבְנֵיהֶן
  chosen: and their children
  alternatives:
  - and their sons
  lexicon: HALOT
  rationale: As with וּבָנֶיהָ, the plural likely refers to offspring generally. 'Children'
    preserves the collective familial sense.
- source_word: אִמְּכֶן חִתִּית
  chosen: Your mother was a Hittite
  alternatives:
  - Your mother, a Hittite woman
  lexicon: HALOT
  rationale: Predicate nominal identifying symbolic ancestry. Supplying 'was' is required
    in English. 'Hittite' is retained as the ethnic designation.
- source_word: וַאֲבִיכֶן אֱמֹרִי
  chosen: and your father an Amorite
  alternatives:
  - and your father was an Amorite
  lexicon: HALOT
  rationale: Parallel predicate nominal. The slightly compressed English after the
    prior clause is natural and preserves the terse force of the Hebrew accusation.
