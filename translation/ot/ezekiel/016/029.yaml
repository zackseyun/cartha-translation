id: EZK.16.29
reference: Ezekiel 16:29
source:
  edition: WLC
  text: וַ/תַּרְבִּ֧י אֶת תַּזְנוּתֵ֛/ךְ אֶל אֶ֥רֶץ כְּנַ֖עַן כַּשְׂדִּ֑ימָ/ה וְ/גַם
    בְּ/זֹ֖את לֹ֥א שָׂבָֽעַתְּ־־־׃
translation:
  text: You multiplied your prostitution toward the land of Canaan, to Chaldea; and
    even with this, you were not satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the land of Canaan, to the Chaldeans,' or 'to the land of Canaan—Chaldea.'
      The Hebrew syntax is compressed, and the phrase may identify Canaan figuratively
      with Chaldea/Babylonia or describe an extension from Canaan as far as Chaldea.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּרְבִּי
  chosen: You multiplied
  alternatives:
  - You increased
  - You made great
  lexicon: HALOT
  rationale: The Hiphil of רבה here is causative/intensive, describing the increase
    of Jerusalem's illicit behavior. 'You multiplied' is idiomatic and preserves the
    direct force better than the more abstract 'you increased.'
- source_word: תַּזְנוּתֵךְ
  chosen: your prostitution
  alternatives:
  - your whoredom
  - your harlotry
  - your sexual immorality
  lexicon: HALOT
  rationale: The noun from זנה in Ezekiel's prophetic metaphor denotes prostitution/whoredom
    as a figure for covenantal unfaithfulness. 'Prostitution' is clear modern English
    and preserves the sexualized metaphor without archaic diction. 'Sexual immorality'
    is too general and weakens the metaphor.
- source_word: אֶל
  chosen: toward
  alternatives:
  - to
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction/extension. 'Toward' captures the movement
    of extending prostitution in relation to the following place names, while avoiding
    overprecision where the Hebrew is somewhat compressed.
- source_word: אֶרֶץ כְּנַעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the country of Canaan
  lexicon: HALOT
  rationale: Retaining 'land' reflects אֶרֶץ explicitly and preserves the geographic
    expression in the Hebrew.
- source_word: כַּשְׂדִּימָה
  chosen: to Chaldea
  alternatives:
  - toward the Chaldeans
  - as far as Chaldea
  - to the land of the Chaldeans
  lexicon: HALOT
  rationale: 'The directional ending indicates movement/extension. In context it likely
    apposes or intensifies the previous geographic phrase: extending prostitution
    even to Chaldea/Babylonia. ''To Chaldea'' is concise and natural. Because the
    syntax is compressed and somewhat difficult, alternatives are preserved in a footnote.'
- source_word: וְגַם
  chosen: and even
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: The combination adds emphasis, not mere coordination. 'And even' preserves
    the climactic force.
- source_word: בְּזֹאת
  chosen: with this
  alternatives:
  - in this
  - by this
  - even in this
  lexicon: HALOT
  rationale: 'The phrase points to what has just been described: despite this further
    extension of prostitution, satisfaction still did not come. ''With this'' is idiomatic
    in English for that concessive sense.'
- source_word: לֹא שָׂבָעַתְּ
  chosen: you were not satisfied
  alternatives:
  - you were not sated
  - you were not filled
  - you were not content
  lexicon: HALOT
  rationale: The verb שבע means to be sated/satisfied. In this metaphorical context,
    'you were not satisfied' is natural modern English and preserves the sense of
    insatiable desire. 'Content' is too weak; 'sated' is less accessible.
