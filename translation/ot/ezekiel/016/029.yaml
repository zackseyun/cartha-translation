theological_decisions:
- issue: Prophetic sexual metaphor for covenant unfaithfulness
  chosen_reading: Retain the explicit metaphor as 'prostitution' rather than softening
    it to a generic moral term.
  alternative_readings:
  - your unfaithfulness
  - your sexual immorality
  rationale: Ezekiel intentionally uses shocking sexual imagery to portray Jerusalem's
    idolatry and political-religious infidelity. Softening the metaphor would mute
    the rhetoric and import interpretation beyond the lexical force of the Hebrew.
  doctrine_reference: Translation philosophy §§1, 6
