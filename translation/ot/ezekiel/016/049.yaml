theological_decisions:
- issue: Nature of Sodom's sin in this verse
  chosen_reading: Render the verse as listing social and moral sins—pride, abundance,
    ease, and neglect of the poor—without importing later interpretive debates into
    the translation.
  alternative_readings:
  - Translate in a way that foregrounds only sexual sin by implication
  rationale: The Hebrew text here explicitly names arrogance, abundance, complacent
    ease, and failure to aid the poor. The translation should preserve what this verse
    itself states and not narrow or expand it doctrinally beyond the text.
  doctrine_reference: Translation philosophy items 1 and 3
