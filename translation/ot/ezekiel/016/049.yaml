id: EZK.16.49
reference: Ezekiel 16:49
source:
  edition: WLC
  text: הִנֵּה זֶ֣ה הָיָ֔ה עֲוֺ֖ן סְדֹ֣ם אֲחוֹתֵ֑/ךְ גָּא֨וֹן שִׂבְעַת לֶ֜חֶם וְ/שַׁלְוַ֣ת
    הַשְׁקֵ֗ט הָ֤יָה לָ/הּ֙ וְ/לִ/בְנוֹתֶ֔י/הָ וְ/יַד עָנִ֥י וְ/אֶבְי֖וֹן לֹ֥א הֶחֱזִֽיקָה־־־׃
translation:
  text: 'Look, this was the guilt of your sister Sodom: pride, plenty of food, and
    prosperous ease belonged to her and to her daughters, but she did not strengthen
    the hand of the poor and needy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'her daughters'—that is, the towns or settlements associated with
      Sodom.
    reason: cultural_note
  - marker: b
    text: Or 'fullness of bread.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'did not strengthen the hand of the poor and needy,' an idiom meaning
      she did not support or help them.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote guilt, iniquity, or the culpable offense itself. Here,
    introducing a list of Sodom's offenses, 'guilt' captures both culpability and
    wrongdoing in natural English.
- source_word: אֲחוֹתֵךְ
  chosen: your sister
  lexicon: HALOT
  rationale: The familial metaphor is explicit and important in Ezekiel's comparison
    of Jerusalem with Samaria and Sodom; it should be preserved literally.
- source_word: גָּאוֹן
  chosen: pride
  alternatives:
  - arrogance
  - haughtiness
  lexicon: HALOT
  rationale: The noun denotes exaltation or arrogance in a negative moral sense here.
    'Pride' is the most direct and idiomatic rendering in this vice list.
- source_word: שִׂבְעַת לֶחֶם
  chosen: plenty of food
  alternatives:
  - fullness of bread
  - abundance of bread
  lexicon: HALOT
  rationale: Literally 'fullness of bread.' In English, 'plenty of food' communicates
    material abundance more naturally while preserving the sense of excess provision.
- source_word: שַׁלְוַת הַשְׁקֵט
  chosen: prosperous ease
  alternatives:
  - carefree tranquility
  - complacent ease
  - secure prosperity
  lexicon: HALOT
  rationale: The phrase combines prosperity/well-being with quiet ease or undisturbed
    security. 'Prosperous ease' preserves both affluence and complacent comfort without
    sounding wooden.
- source_word: בְנוֹתֶיהָ
  chosen: her daughters
  alternatives:
  - her towns
  - her dependent cities
  lexicon: HALOT
  rationale: Literally 'her daughters.' In prophetic city-language this refers to
    dependent towns or surrounding settlements, but the metaphor is standard and should
    be retained in the main text.
- source_word: יָד ... לֹא הֶחֱזִיקָה
  chosen: she did not strengthen the hand of
  alternatives:
  - she did not support
  - she did not help
  - she did not uphold
  lexicon: HALOT
  rationale: The idiom literally speaks of strengthening the hand, meaning to support
    or assist. Retaining 'strengthen the hand' preserves the Hebrew imagery while
    remaining understandable in English.
- source_word: עָנִי וְאֶבְיוֹן
  chosen: the poor and needy
  alternatives:
  - the afflicted and needy
  lexicon: HALOT
  rationale: This common pair denotes the materially vulnerable and socially powerless.
    'The poor and needy' is the standard, clear English equivalent.
- source_word: הִנֵּה זֶה
  chosen: Look, this was
  alternatives:
  - Behold, this was
  - See, this was
  lexicon: HALOT
  rationale: The discourse marker introduces an emphatic explanation. 'Look' is a
    readable modern equivalent to 'behold' without losing force.
- source_word: הָיָה לָהּ וְלִבְנוֹתֶיהָ
  chosen: belonged to her and to her daughters
  alternatives:
  - was hers and her daughters'
  - she and her daughters had
  lexicon: HALOT
  rationale: The clause states that these conditions characterized Sodom and her daughters.
    'Belonged to her and to her daughters' is clear and preserves the possessive sense.
