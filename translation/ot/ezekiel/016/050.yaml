id: EZK.16.50
reference: Ezekiel 16:50
source:
  edition: WLC
  text: וַֽ/תִּגְבְּהֶ֔ינָה וַ/תַּעֲשֶׂ֥ינָה תוֹעֵבָ֖ה לְ/פָנָ֑/י וָ/אָסִ֥יר אֶתְ/הֶ֖ן
    כַּ/אֲשֶׁ֥ר רָאִֽיתִי׃ס
translation:
  text: They became haughty and committed an abomination before me, so I removed them
    when I saw it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they grew proud' or 'they became arrogant.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'when/as I saw'; the object ('it') is implied from the preceding
      clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְבְּהֶינָה
  chosen: they became haughty
  alternatives:
  - they were exalted
  - they grew proud
  - they became arrogant
  lexicon: HALOT
  rationale: From גבהּ, here describing pride/exaltation in a moral sense. 'Became
    haughty' preserves the elevated/proud nuance in idiomatic English and fits the
    indictment context better than the more wooden 'were exalted.'
- source_word: וַתַּעֲשֶׂינָה
  chosen: committed
  alternatives:
  - did
  - performed
  - practiced
  lexicon: HALOT
  rationale: Though עשה is broadly 'do/make,' English idiom with תועבה is better rendered
    'commit an abomination' rather than 'do an abomination.' This is a documented
    contextual smoothing, not paraphrase.
- source_word: תוֹעֵבָה
  chosen: an abomination
  alternatives:
  - something detestable
  - a detestable thing
  lexicon: HALOT
  rationale: Standard rendering for תועבה, preserving the strong moral-religious force
    of the Hebrew. 'Abomination' remains understandable and weighty in modern English.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  - in front of me
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the covenantal/judicial sense
    of action done in God's sight.
- source_word: וָאָסִיר אֶתְהֶן
  chosen: so I removed them
  alternatives:
  - and I took them away
  - and I removed them
  lexicon: HALOT
  rationale: From סור in the causative sense, indicating removal. 'Removed them' is
    concise and fits the judgment context. The conjunction is rendered 'so' to reflect
    consequential force in English.
- source_word: כַּאֲשֶׁר רָאִיתִי
  chosen: when I saw it
  alternatives:
  - as I saw
  - when I saw
  - according to what I saw
  lexicon: HALOT
  rationale: The Hebrew literally reads 'as/when I saw.' In context, the clause explains
    the occasion for judgment. Supplying 'it' makes the English natural, with the
    object understood from the preceding abomination. 'When I saw it' best captures
    the temporal-causal sense without overinterpreting.
