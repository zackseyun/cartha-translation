theological_decisions:
- issue: Divine judgment wording
  chosen_reading: so I removed them
  alternative_readings:
  - so I took them away
  - therefore I removed them
  rationale: The verse states God's judicial action against the women/cities represented.
    The translation preserves the directness of divine judgment without importing
    later theological categories or softening the action.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
