theological_decisions:
- issue: Rendering the divine name in the compound אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies יְהוָה → 'the LORD.' In this fixed compound, 'the
    Lord GOD' is the clearest English equivalent that preserves reverence and avoids
    awkward duplication.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Meaning of אָלָה in covenant context
  chosen_reading: oath
  alternative_readings:
  - curse
  - oath-curse
  rationale: The verse accuses Jerusalem of despising the binding covenantal oath
    and thereby breaking the covenant. Because אָלָה can also carry the sense of a
    curse sanction attached to an oath, that alternative is preserved in a footnote
    rather than resolved absolutely.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
