id: EZK.16.59
reference: Ezekiel 16:59
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה ו/עשית אוֹתָ֖/ךְ כַּ/אֲשֶׁ֣ר עָשִׂ֑ית
    אֲשֶׁר בָּזִ֥ית אָלָ֖ה לְ/הָפֵ֥ר בְּרִֽית־׃
translation:
  text: 'For thus says the Lord GOD: I will deal with you as you have done, because
    you despised the oath by breaking the covenant.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the curse'; the Hebrew term can denote an oath, especially one carrying
      covenantal curse-sanctions.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Renders the title-plus-divine-name combination in standard English prophetic
    style. Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה,
    English convention uses 'the Lord GOD' to avoid 'Lord LORD' while preserving both
    elements.
- source_word: וְעָשִׂית אוֹתָךְ
  chosen: I will deal with you
  alternatives:
  - I will do to you
  - I will act toward you
  lexicon: HALOT
  rationale: The idiom עשה + object can mean 'do to/deal with.' 'I will deal with
    you' is natural English and preserves the judicial force in context without over-paraphrase.
- source_word: כַּאֲשֶׁר עָשִׂית
  chosen: as you have done
  alternatives:
  - just as you did
  - according to what you did
  lexicon: HALOT
  rationale: Keeps the comparative force of כַּאֲשֶׁר and the direct reference to
    Jerusalem's prior actions.
- source_word: בָּזִית
  chosen: you despised
  alternatives:
  - you scorned
  - you treated with contempt
  lexicon: HALOT
  rationale: בזה commonly denotes despising or holding in contempt. 'Despised' is
    concise and strong, fitting the covenantal accusation.
- source_word: אָלָה
  chosen: the oath
  alternatives:
  - the curse
  - the sworn oath
  lexicon: HALOT
  rationale: In covenant contexts אָלָה can denote an oath, often with curse-sanction.
    Here, with 'to break the covenant,' 'oath' best fits the immediate syntax and
    sense, while the curse nuance is worth preserving in a footnote.
- source_word: לְהָפֵר בְּרִית
  chosen: by breaking the covenant
  alternatives:
  - to break the covenant
  - in order to break the covenant
  lexicon: HALOT
  rationale: הפר ברית is a standard expression for violating or breaking a covenant.
    Rendering the infinitive with 'by breaking' makes good English after 'despised
    the oath' and expresses the manner/result relation.
