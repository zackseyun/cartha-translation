id: EZK.16.30
reference: Ezekiel 16:30
source:
  edition: WLC
  text: מָ֤ה אֲמֻלָה֙ לִבָּתֵ֔/ךְ נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה בַּ/עֲשׂוֹתֵ/ךְ֙ אֶת כָּל אֵ֔לֶּה מַעֲשֵׂ֥ה אִשָּֽׁה זוֹנָ֖ה שַׁלָּֽטֶת־־־׃
translation:
  text: How weak your heart is, declares the Lord GOD, when you do all these things, the deeds of a brazen prostitute,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the deeds of a domineering prostitute'; the Hebrew adjective can convey bold, overbearing, or shameless behavior.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: How
  alternatives:
  - How greatly
  - How
  lexicon: HALOT
  rationale: Introduces an exclamatory/interrogative expression. In context it functions idiomatically as an exclamation of degree rather than a request for information, best carried by English 'How'.
- source_word: אֲמֻלָה
  chosen: weak
  alternatives:
  - sick
  - languishing
  - feeble
  lexicon: HALOT
  rationale: From אמל, conveying weakness, languishing, or wasting away. 'Weak' is clear modern English and fits the rebuke directed at Jerusalem's inner condition. 'Sick' is possible, but could suggest physical illness too strongly.
- source_word: לִבָּתֵךְ
  chosen: your heart
  alternatives:
  - your mind
  - your inner self
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner person, will, and affections. Retaining 'heart' preserves the source imagery and biblical idiom.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula, naturally rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'Lord GOD' is the standard English equivalent for אֲדֹנָי יְהוִה.
- source_word: בַּעֲשׂוֹתֵךְ
  chosen: when you do
  alternatives:
  - in your doing
  - by doing
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב can be rendered temporally or circumstantially. 'When you do' is idiomatic and fits the flow of accusation.
- source_word: אֶת כָּל אֵלֶּה
  chosen: all these things
  alternatives:
  - all these
  - all this
  lexicon: HALOT
  rationale: A straightforward rendering preserving the demonstrative force and comprehensiveness.
- source_word: מַעֲשֵׂה
  chosen: the deeds of
  alternatives:
  - the work of
  - the behavior of
  lexicon: HALOT
  rationale: Construct form introducing a characterization of the actions just mentioned. 'Deeds of' is natural English and preserves the moral force.
- source_word: אִשָּׁה זוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a whore
  lexicon: HALOT
  rationale: זוֹנָה denotes a prostitute/fornicating woman. 'Prostitute' is accurate, contemporary, and avoids archaic ('harlot') or overly coarse ('whore') diction while preserving the sexual-moral metaphor.
- source_word: שַׁלָּטֶת
  chosen: brazen
  alternatives:
  - domineering
  - shameless
  - imperious
  lexicon: HALOT
  rationale: The adjective suggests bold, overbearing, or shamelessly assertive conduct. In this context of sexual infidelity, 'brazen' captures the sense of shameless audacity in idiomatic English. 'Domineering' is lexically possible and worth preserving in a footnote.
