id: EZK.16.11
reference: Ezekiel 16:11
source:
  edition: WLC
  text: וָ/אֶעְדֵּ֖/ךְ עֶ֑דִי וָ/אֶתְּנָ֤/ה צְמִידִים֙ עַל יָדַ֔יִ/ךְ וְ/רָבִ֖יד עַל
    גְּרוֹנֵֽ/ךְ־־׃
translation:
  text: I adorned you with jewelry, and I put bracelets on your hands and a necklace
    on your neck.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with ornaments' or 'with finery.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'on your hands'; bracelets would idiomatically be worn on the wrists
      or arms.
    reason: lexical_alternative
  - marker: c
    text: Or 'a chain' on your neck.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעְדֵּךְ
  chosen: I adorned you
  alternatives:
  - I decked you
  - I clothed you with ornaments
  lexicon: HALOT
  rationale: From עדה in the sense of adorning or decking with ornaments. 'Adorned'
    is natural modern English and fits the following list of jewelry items better
    than a more wooden 'decked.'
- source_word: עֶדִי
  chosen: with jewelry
  alternatives:
  - with ornaments
  - with finery
  lexicon: HALOT
  rationale: The noun denotes adornment/ornamentation. 'Jewelry' communicates the
    concrete sense in this context, where specific items are immediately named. 'With'
    is supplied idiomatically in English after 'adorned.'
- source_word: צְמִידִים
  chosen: bracelets
  alternatives:
  - armlets
  - bands
  lexicon: HALOT
  rationale: The plural noun refers to ornamental bands worn on the arms or wrists.
    'Bracelets' is the clearest contemporary equivalent.
- source_word: עַל יָדַיִךְ
  chosen: on your hands
  alternatives:
  - on your wrists
  - on your arms
  lexicon: HALOT
  rationale: Hebrew יָד can cover hand/arm. Because צְמִידִים are bracelets, English
    could specify 'wrists,' but the text literally says 'hands.' To preserve source
    wording while remaining intelligible, 'on your hands' is retained in the main
    text, with the idiomatic sense noted by alternatives.
- source_word: רָבִיד
  chosen: a necklace
  alternatives:
  - a chain
  - a pendant necklace
  lexicon: HALOT
  rationale: The noun denotes an ornament worn around the neck, often a chain or necklace.
    'Necklace' is the most natural modern rendering in this context.
- source_word: עַל גְּרוֹנֵךְ
  chosen: on your neck
  alternatives:
  - around your neck
  - on your throat
  lexicon: HALOT
  rationale: גָּרוֹן is throat/neck. In English, jewelry is normally worn 'on' or
    'around' the neck; 'on your neck' keeps closer to the Hebrew preposition while
    sounding acceptable.
