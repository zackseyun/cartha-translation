theological_decisions:
- issue: Metaphorical portrayal of Jerusalem as a woman adorned by God
  chosen_reading: Retain the literal imagery of adornment without allegorical expansion
    in the translation.
  alternative_readings:
  - Interpretively expand the adornment as covenantal blessing or bridal preparation
    in the main text
  rationale: The verse is part of Ezekiel's extended allegory, but the translation
    should preserve the concrete imagery and not import theological interpretation
    into the wording itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
