theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, preserving reverential convention and alignment with the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Metaphorical sexual language for Jerusalem
  chosen_reading: prostitute
  alternative_readings:
  - harlot
  - whore
  rationale: The verse addresses Jerusalem under the metaphor of sexual unfaithfulness.
    'Prostitute' preserves the metaphor's severity while remaining readable modern
    English and avoiding either archaic or needlessly inflammatory English choices.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English,
    not archaic or academic'
