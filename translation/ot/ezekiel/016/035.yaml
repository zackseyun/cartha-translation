id: EZK.16.35
reference: Ezekiel 16:35
source:
  edition: WLC
  text: לָ/כֵ֣ן זוֹנָ֔ה שִׁמְעִ֖י דְּבַר יְהוָֽה־׃פ
translation:
  text: Therefore, prostitute, hear the word of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'harlot' or 'whore'; the Hebrew noun is a direct, severe metaphor for Jerusalem's unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore then
  lexicon: HALOT
  rationale: Introduces the consequence or conclusion of the preceding accusations. 'Therefore' is the most natural concise English discourse marker here.
- source_word: זוֹנָה
  chosen: prostitute
  alternatives:
  - whore
  - harlot
  lexicon: HALOT
  rationale: The noun literally denotes a prostitute. 'Prostitute' is clear modern English and preserves the force of the metaphorical accusation without archaic ('harlot') or overly coarse ('whore') diction. Because the address is singular feminine, the bare vocative 'prostitute' fits the direct speech.
- source_word: שִׁמְעִי
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: Second feminine singular imperative from שׁמע. 'Hear' is idiomatic in prophetic address and pairs naturally with 'the word of the LORD'; 'listen' is possible but slightly less conventional in this formula.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: In prophetic formulas, דְּבַר יְהוָה is standardly rendered 'the word of the LORD.' 'Message' is possible dynamically, but 'word' better preserves the established prophetic idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
