id: EZK.16.18
reference: Ezekiel 16:18
source:
  edition: WLC
  text: וַ/תִּקְחִ֛י אֶת בִּגְדֵ֥י רִקְמָתֵ֖/ךְ וַ/תְּכַסִּ֑י/ם וְ/שַׁמְנִ/י֙ וּ/קְטָרְתִּ֔/י
    נתתי לִ/פְנֵי/הֶֽם־׃
translation:
  text: You took your embroidered garments and covered them, and you set my oil and
    my incense before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clothed them.' The Hebrew verb literally means 'covered them,' but in
      context it may imply dressing the idols with the garments.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי רִקְמָתֵךְ
  chosen: your embroidered garments
  alternatives:
  - your embroidered clothes
  - your woven garments
  lexicon: HALOT
  rationale: בִּגְדֵי is 'garments/clothes,' and רִקְמָה denotes embroidered or richly
    worked fabric. 'Embroidered garments' is natural English and preserves the luxury
    implied in the Hebrew.
- source_word: וַתְּכַסִּים
  chosen: covered them
  alternatives:
  - clothed them
  - spread them over them
  lexicon: HALOT
  rationale: כסה commonly means 'cover.' The 3mp suffix refers back to the idols/images
    in the context. 'Covered them' is the most direct rendering; 'clothed them' is
    interpretive and therefore left as an alternative.
- source_word: וְשַׁמְנִי
  chosen: my oil
  alternatives:
  - my olive oil
  lexicon: HALOT
  rationale: שֶׁמֶן is 'oil,' often olive oil in Israelite context, but the Hebrew
    here does not specify olive. 'My oil' preserves both the possessive and the likely
    cultic sense.
- source_word: וּקְטָרְתִּי
  chosen: my incense
  alternatives:
  - my fragrant incense
  lexicon: HALOT
  rationale: קְטֹרֶת refers to incense used in offering. 'My incense' is concise and
    cultically accurate, preserving the possessive that underscores misuse of what
    belonged to God.
- source_word: נתתי לִפְנֵיהֶם
  chosen: you set ... before them
  alternatives:
  - you placed ... before them
  - you gave ... before them
  lexicon: HALOT
  rationale: נתתי is morphologically a perfect 2fs form here in context ('you gave/set').
    In idiomatic English with offerings, 'set before them' best conveys placing oil
    and incense before the idols as offerings.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' 'Before them' fits both
    the literal and cultic-offering sense in English.
