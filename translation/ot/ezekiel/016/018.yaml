theological_decisions:
- issue: Referent of the masculine plural suffixes ('them')
  chosen_reading: The pronouns refer to the idols/images described in the immediate
    context.
  alternative_readings:
  - The pronouns could be left more implicit as unspecified objects.
  rationale: The broader context of Ezekiel 16 indicts Jerusalem for adorning and
    serving idols with gifts that belonged to the LORD. Retaining 'them' without replacing
    it with 'idols' keeps the translation close to the Hebrew while allowing the context
    to identify the referent.
