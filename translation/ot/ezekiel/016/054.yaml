theological_decisions:
- issue: Sense of Jerusalem's relation to the other women/cities in the restoration
    context
  chosen_reading: Jerusalem's shame is intensified in the circumstance that she becomes
    a comfort to them.
  alternative_readings:
  - Jerusalem is ashamed because she had formerly comforted them
  - Jerusalem is ashamed by the act of comforting them
  rationale: 'In context (Ezek 16:53-55), the verse looks forward to restoration of
    Jerusalem together with Sodom and Samaria. The clause with בְּנַחֲמֵךְ is best
    taken as circumstantial/temporal within that future setting: Jerusalem becomes
    a source of comfort to them, and this very reversal deepens her shame. The translation
    preserves that forward-looking sense without overexplaining it.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
