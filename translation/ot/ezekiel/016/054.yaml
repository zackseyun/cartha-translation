id: EZK.16.54
reference: Ezekiel 16:54
source:
  edition: WLC
  text: לְמַ֨עַן֙ תִּשְׂאִ֣י כְלִמָּתֵ֔/ךְ וְ/נִכְלַ֕מְתְּ מִ/כֹּ֖ל אֲשֶׁ֣ר עָשִׂ֑ית
    בְּ/נַחֲמֵ֖/ךְ אֹתָֽ/ן׃
translation:
  text: so that you may bear your disgrace and be ashamed of all that you have done,
    when you have been a comfort to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when you comfort them,' or 'by comforting them.' The Hebrew expression
      can be understood in more than one closely related way.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the clause's purposive force.
- source_word: תִּשְׂאִי
  chosen: you may bear
  alternatives:
  - you may carry
  - you may endure
  lexicon: HALOT
  rationale: From נשׂא, here idiomatically with 'disgrace' meaning to bear or carry
    shame. 'Bear' is the most idiomatic English collocation with disgrace/shame.
- source_word: כְלִמָּתֵךְ
  chosen: your disgrace
  alternatives:
  - your shame
  - your humiliation
  lexicon: HALOT
  rationale: כְּלִמָּה denotes disgrace, reproach, or shame. 'Disgrace' fits the public-honor
    dimension well, while the following verb already expresses subjective shame.
- source_word: וְנִכְלַמְתְּ
  chosen: and be ashamed
  alternatives:
  - and be humiliated
  - and be put to shame
  lexicon: HALOT
  rationale: The Niphal of כלם commonly means to be ashamed or humiliated. 'Be ashamed'
    is clear and preserves the emotional/resultative sense.
- source_word: מִכֹּל אֲשֶׁר עָשִׂית
  chosen: of all that you have done
  alternatives:
  - because of all that you have done
  - from all that you have done
  lexicon: HALOT
  rationale: The preposition מִן after a shame verb can mark cause or occasion. In
    English, 'ashamed of all that you have done' is idiomatic and conveys the causal
    sense.
- source_word: בְּנַחֲמֵךְ
  chosen: when you have been a comfort
  alternatives:
  - in your comforting
  - when you comfort
  - by your consoling
  lexicon: HALOT
  rationale: 'From נחם in the Piel/inflected form with prefixed ב, likely temporal/circumstantial:
    ''when/in that you comfort.'' The perfective nuance in context points to the future
    circumstance tied to the restoration oracle; ''when you have been a comfort''
    captures that relation in English.'
- source_word: אֹתָן
  chosen: to them
  alternatives:
  - them
  lexicon: HALOT
  rationale: Direct object pronoun referring back to the feminine plural cities/sisters
    in context. English idiom with 'comfort' normally takes 'comfort them' or 'be
    a comfort to them'; the latter suits the chosen rendering of נחם.
