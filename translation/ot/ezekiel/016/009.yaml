id: EZK.16.9
reference: Ezekiel 16:9
source:
  edition: WLC
  text: וָ/אֶרְחָצֵ֣/ךְ בַּ/מַּ֔יִם וָ/אֶשְׁטֹ֥ף דָּמַ֖יִ/ךְ מֵֽ/עָלָ֑יִ/ךְ וָ/אֲסֻכֵ֖/ךְ
    בַּ/שָּֽׁמֶן׃
translation:
  text: Then I washed you with water, rinsed your blood off you, and anointed you
    with oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bathed you with water.'
    reason: lexical_alternative
  - marker: b
    text: Or 'washed your blood away from upon you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְחָצֵךְ
  chosen: I washed you
  alternatives:
  - I bathed you
  lexicon: HALOT
  rationale: רחץ commonly means to wash or bathe. 'Washed you' is natural modern English
    and fits the direct object construction, while preserving the concrete cleansing
    imagery.
- source_word: בַּמַּיִם
  chosen: with water
  alternatives:
  - in water
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'with' or 'in' here. English idiom
    favors 'washed you with water' for the means/instrument of washing.
- source_word: וָאֶשְׁטֹף
  chosen: rinsed
  alternatives:
  - washed away
  - flooded away
  lexicon: HALOT
  rationale: שטף can denote washing off or rinsing away. In this context of cleansing
    an abandoned infant/bride figure, 'rinsed' best captures the practical action
    without overstating the verb.
- source_word: דָּמַיִךְ
  chosen: your blood
  alternatives:
  - your bloodstains
  lexicon: HALOT
  rationale: The plural form is a common Hebrew plural of blood. 'Your blood' is the
    most direct rendering; 'bloodstains' is interpretive and therefore left as an
    alternative only.
- source_word: מֵעָלַיִךְ
  chosen: off you
  alternatives:
  - from upon you
  - from you
  lexicon: HALOT
  rationale: The phrase literally means 'from upon you.' 'Off you' is the most natural
    English equivalent and preserves the physical imagery of blood being removed from
    her body.
- source_word: וָאֲסֻכֵךְ
  chosen: anointed you
  alternatives:
  - rubbed you
  - smeared you
  lexicon: HALOT
  rationale: סוך means to anoint or smear with oil. Because oiling the body in biblical
    contexts often carries dignifying and caring connotations, 'anointed you' best
    reflects the action and tone here.
- source_word: בַּשָּׁמֶן
  chosen: with oil
  alternatives:
  - with olive oil
  lexicon: HALOT
  rationale: שמן is simply 'oil' in the Hebrew text. 'With oil' is sufficiently precise;
    specifying 'olive' would add detail not explicit in the verse.
