theological_decisions:
- issue: Nature of the cleansing imagery in the allegory
  chosen_reading: Render the actions as literal bodily care within the metaphor, without
    importing sacramental or doctrinal symbolism into the translation.
  alternative_readings:
  - Interpret the washing and anointing more overtly as covenantal or cultic acts
    in the main text
  rationale: Ezekiel 16 uses extended allegory for Jerusalem. The verse itself describes
    washing, removing blood, and anointing. The translation should preserve the concrete
    imagery and allow theological implications to arise from context rather than embedding
    them in the wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
