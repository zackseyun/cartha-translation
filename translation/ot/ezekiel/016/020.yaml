id: EZK.16.20
reference: Ezekiel 16:20
source:
  edition: WLC
  text: וַ/תִּקְחִ֞י אֶת בָּנַ֤יִ/ךְ וְ/אֶת בְּנוֹתַ֨יִ/ךְ֙ אֲשֶׁ֣ר יָלַ֣דְתְּ לִ֔/י
    וַ/תִּזְבָּחִ֥י/ם לָ/הֶ֖ם לֶ/אֱכ֑וֹל הַ/מְעַ֖ט מ/תזנת/ך־־׃
translation:
  text: And you took your sons and your daughters, whom you had borne to me, and sacrificed
    them to them as food. Was your prostitution too small a thing?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for them'; the pronoun refers to the false gods/idols in the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'your whoring' or 'your harlotry.' The Hebrew keeps the sexual metaphor
      for covenant unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְחִי
  chosen: you took
  alternatives:
  - you seized
  lexicon: HALOT
  rationale: Qal wayyiqtol 2fs of לקח, the normal narrative verb 'take.' 'You took'
    is the plain sense and fits the accusatives that follow.
- source_word: בָּנַיִךְ ... בְּנוֹתַיִךְ
  chosen: your sons and your daughters
  alternatives:
  - your children, both sons and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters; the translation
    preserves that gendered specificity rather than collapsing to 'children.'
- source_word: אֲשֶׁר יָלַדְתְּ לִי
  chosen: whom you had borne to me
  alternatives:
  - whom you bore for me
  - whom you gave birth to for me
  lexicon: HALOT
  rationale: ילד with לִי indicates children borne in relation to the speaker; 'borne
    to me' preserves the covenantal/marital claim implied in the metaphor better than
    the more ambiguous 'for me.' The pluperfect English sense ('had borne') fits the
    prior action relative to the subsequent sacrifice.
- source_word: וַתִּזְבָּחִים
  chosen: and sacrificed them
  alternatives:
  - and slaughtered them as sacrifices
  lexicon: HALOT
  rationale: זבח in sacrificial contexts means 'sacrifice/slaughter for sacrifice.'
    'Sacrificed them' is concise and preserves the cultic force; the 3mp suffix is
    represented by 'them.'
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The pronoun refers to the illicit recipients of the sacrifice, i.e.,
    the idols/false gods in context. 'To them' keeps the Hebrew preposition and the
    shocking personal direction of the act.
- source_word: לֶאֱכֹל
  chosen: as food
  alternatives:
  - to be devoured
  - for eating
  lexicon: HALOT
  rationale: The infinitive 'to eat' here expresses purpose/result in sacrificial
    language. 'As food' is idiomatic English and conveys that the children were offered
    up as something consumed by the idols.
- source_word: הַמְעַט
  chosen: too small a thing
  alternatives:
  - a small thing
  - too little
  lexicon: HALOT
  rationale: Used rhetorically, often in the idiom 'is it too small a thing...?' The
    interrogative force is supplied in English to make the Hebrew rhetorical question
    natural and clear.
- source_word: מִתַּזְנוּתֵךְ
  chosen: your prostitution
  alternatives:
  - your whoring
  - your harlotry
  - your sexual immorality
  lexicon: HALOT
  rationale: From זְנוּת, in Ezekiel's extended metaphor for covenant unfaithfulness
    expressed through idolatry. 'Prostitution' preserves the sexualized metaphor and
    the moral gravity without becoming either archaic ('harlotry') or overly colloquial
    ('whoring').
