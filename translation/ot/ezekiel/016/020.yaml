theological_decisions:
- issue: Metaphorical language for Israel/Jerusalem's idolatry
  chosen_reading: Retain the sexual-infidelity metaphor as 'prostitution' rather than
    flattening it to 'idolatry' in the main text.
  alternative_readings:
  - your idolatry
  - your unfaithfulness
  rationale: The Hebrew deliberately uses sexualized covenantal imagery. Preserving
    the metaphor maintains the prophetic force and does not import additional doctrinal
    interpretation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rhetorical question at the end of the verse
  chosen_reading: 'Render the final clause as a rhetorical question: ''Was your prostitution
    too small a thing?'''
  alternative_readings:
  - Your prostitution was a small thing.
  - As if your prostitution were too small a thing...
  rationale: Although the Hebrew lacks an explicit interrogative particle here, הַמְעַט
    + מן commonly functions rhetorically in context. The question best reflects the
    prophetic rebuke and the flow into the surrounding accusations.
  doctrine_reference: Translation philosophy §6
