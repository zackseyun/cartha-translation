theological_decisions:
- issue: Judgment imagery in prophetic metaphor
  chosen_reading: Retain the first-person divine judgment language and the sexual-moral
    metaphor without softening either element.
  alternative_readings:
  - Paraphrase the imagery into abstract punishment language
  - Reduce the sexualized metaphor to generic wickedness
  rationale: The verse is part of a sustained covenant-unfaithfulness allegory. Preserving
    the imagery maintains the force of the prophetic accusation and divine judgment
    while avoiding doctrinal overstatement beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
