id: EZK.16.27
reference: Ezekiel 16:27
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה נָטִ֤יתִי יָדִ/י֙ עָלַ֔יִ/ךְ וָ/אֶגְרַ֖ע חֻקֵּ֑/ךְ וָ/אֶתְּנֵ֞/ךְ
    בְּ/נֶ֤פֶשׁ שֹׂנְאוֹתַ֨יִ/ךְ֙ בְּנ֣וֹת פְּלִשְׁתִּ֔ים הַ/נִּכְלָמ֖וֹת מִ/דַּרְכֵּ֥/ךְ
    זִמָּֽה׃
translation:
  text: And look, I stretched out my hand against you, and I reduced your allotted
    portion, and gave you over to the desire of those who hate you, the daughters
    of the Philistines, who are ashamed of your lewd way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your due,' 'your allowance,' or 'your share' for 'your allotted portion.'
      The Hebrew term can denote what is prescribed or allotted.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the will of those who hate you.' The Hebrew expression literally
      includes 'soul,' here meaning desire, appetite, or will.
    reason: lexical_alternative
  - marker: c
    text: '''The daughters of the Philistines'' preserves the prophetic personification
      of peoples or cities as daughters.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - See
  lexicon: HALOT
  rationale: Introduces a vivid, attention-directing statement. 'And look' is natural
    modern English while preserving the deictic force better than omitting it.
- source_word: נָטִיתִי יָדִי עָלַיִךְ
  chosen: I stretched out my hand against you
  alternatives:
  - I extended my hand against you
  - I struck out my hand against you
  lexicon: HALOT
  rationale: A common idiom for decisive action in judgment. 'Stretched out my hand
    against you' preserves the Hebrew image without over-interpreting the action.
- source_word: וָאֶגְרַע
  chosen: I reduced
  alternatives:
  - I diminished
  - I withdrew
  - I cut down
  lexicon: HALOT
  rationale: The verb conveys diminishing or taking away. 'Reduced' fits the context
    of curtailing what had been granted.
- source_word: חֻקֵּךְ
  chosen: your allotted portion
  alternatives:
  - your due
  - your allowance
  - your share
  - your boundary
  lexicon: HALOT
  rationale: In this context the noun is best understood as what was prescribed or
    allotted to Jerusalem, likely her provision or due. 'Allotted portion' preserves
    the sense of an assigned share without narrowing too specifically to food or territory.
- source_word: וָאֶתְּנֵךְ
  chosen: gave you over
  alternatives:
  - gave you
  - handed you over
  - delivered you
  lexicon: HALOT
  rationale: The context is punitive and hostile, so 'gave you over' communicates
    judicial abandonment more clearly than the bare 'gave you'.
- source_word: בְּנֶפֶשׁ שֹׂנְאוֹתַיִךְ
  chosen: to the desire of those who hate you
  alternatives:
  - to the will of those who hate you
  - to the appetite of those who hate you
  - into the power of those who hate you
  lexicon: HALOT
  rationale: נֶפֶשׁ here idiomatically expresses desire, appetite, or will. 'Desire'
    is concise and idiomatic in English, conveying subjection to hostile intent.
- source_word: בְּנוֹת פְּלִשְׁתִּים
  chosen: the daughters of the Philistines
  alternatives:
  - the Philistine women
  - the towns of the Philistines
  lexicon: HALOT
  rationale: A literal rendering preserves the prophetic personification of peoples/cities
    as daughters. 'Philistine women' would over-literalize the metaphor into individual
    females.
- source_word: הַנִּכְלָמוֹת
  chosen: who are ashamed
  alternatives:
  - who are humiliated
  - who are embarrassed
  lexicon: HALOT
  rationale: The participle describes their reaction to Jerusalem's conduct. 'Ashamed'
    best captures moral revulsion in context.
- source_word: מִדַּרְכֵּךְ זִמָּה
  chosen: of your lewd way
  alternatives:
  - of your obscene conduct
  - of your promiscuous way
  - of your depraved path
  lexicon: HALOT
  rationale: דֶּרֶךְ plus זִמָּה refers to a course of conduct marked by sexual and
    moral depravity. 'Lewd way' is compact, readable, and preserves the sexualized
    moral charge of the metaphor.
