id: EZK.16.22
reference: Ezekiel 16:22
source:
  edition: WLC
  text: וְ/אֵ֤ת כָּל תּוֹעֲבֹתַ֨יִ/ךְ֙ וְ/תַזְנֻתַ֔יִ/ךְ לֹ֥א זכרתי אֶת יְמֵ֣י נְעוּרָ֑יִ/ךְ
    בִּֽ/הְיוֹתֵ/ךְ֙ עֵרֹ֣ם וְ/עֶרְיָ֔ה מִתְבּוֹסֶ֥סֶת בְּ/דָמֵ֖/ךְ הָיִֽית־־׃
translation:
  text: And in all your abominations and your prostitutions, you did not remember
    the days of your youth, when you were naked and bare, wallowing in your blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your acts of prostitution'; the Hebrew uses prostitution imagery for
      Jerusalem's covenantal and idolatrous unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'naked and exposed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'squirming in your blood' or 'kicking about in your blood'; the Hebrew
      verb depicts a helpless, blood-covered condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹעֲבֹתַיִךְ
  chosen: your abominations
  alternatives:
  - your detestable acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה commonly denotes something abhorrent or detestable, often with
    cultic or moral offensiveness. 'Abominations' preserves the prophetic severity
    and established semantic range without softening the charge.
- source_word: תַזְנֻתַיִךְ
  chosen: your prostitutions
  alternatives:
  - your whorings
  - your acts of prostitution
  lexicon: HALOT
  rationale: From זְנוּנִים/זְנוּת language for sexual immorality and, in prophetic
    literature, covenantal unfaithfulness/idolatry. 'Prostitutions' keeps the concrete
    sexual metaphor and plural form better than a more abstract 'unfaithfulness.'
- source_word: לֹא זכרתי
  chosen: you did not remember
  alternatives:
  - you did not call to mind
  lexicon: HALOT
  rationale: The verb is Qal perfect 2fs, 'you remembered.' With לֹא, the straightforward
    sense is 'you did not remember.' This fits the accusation that Jerusalem failed
    to recall her former helplessness.
- source_word: יְמֵי נְעוּרָיִךְ
  chosen: the days of your youth
  alternatives:
  - your youthful days
  lexicon: HALOT
  rationale: A natural and close rendering of the construct phrase, preserving the
    temporal reference to Jerusalem's early condition.
- source_word: עֵרֹם וְעֶרְיָה
  chosen: naked and bare
  alternatives:
  - naked and exposed
  lexicon: HALOT
  rationale: The paired terms intensify vulnerability and exposure. 'Naked and bare'
    preserves the rhetorical doubling in idiomatic English.
- source_word: מִתְבּוֹסֶסֶת בְּדָמֵךְ
  chosen: wallowing in your blood
  alternatives:
  - squirming in your blood
  - kicking about in your blood
  lexicon: HALOT
  rationale: The Hitpolel/iterative-reflexive form conveys being smeared, trampling,
    or writhing in blood. 'Wallowing in your blood' is the most established and vivid
    English equivalent in this context, matching the imagery already used in Ezekiel
    16:6.
- source_word: הָיִית
  chosen: you were
  lexicon: HALOT
  rationale: 'Completes the temporal clause with a simple past state: ''when you were...''
    This is the most natural English rendering of the 2fs perfect of היה here.'
- source_word: וְאֵת כָּל ... וְ...
  chosen: And in all your abominations and your prostitutions
  alternatives:
  - And with all your abominations and your prostitutions
  - And despite all your abominations and your prostitutions
  lexicon: HALOT
  rationale: 'The opening syntax is elliptical and somewhat difficult. Rendering with
    ''in all'' reflects the accusative marker introducing attendant circumstances:
    amid/in the course of all these acts, she failed to remember. This yields coherent
    English while staying close to the Hebrew.'
