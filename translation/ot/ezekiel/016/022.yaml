theological_decisions:
- issue: Prophetic sexual imagery for covenant unfaithfulness
  chosen_reading: Retain the concrete metaphor 'prostitutions' rather than replacing
    it with an abstract theological term like 'unfaithfulness.'
  alternative_readings:
  - your unfaithfulness
  - your idolatry
  rationale: Ezekiel intentionally uses shocking sexualized imagery to depict Jerusalem's
    covenant breach. Translating more abstractly would mute the force of the prophetic
    indictment and import interpretation into the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
