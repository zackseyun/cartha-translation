  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse identifies Israel's God through covenantal judgment. Following
    the project's doctrine, the Tetragrammaton is rendered 'the LORD' rather than
    transliterated forms.
