id: EZK.33.29
reference: Ezekiel 33:29
source:
  edition: WLC
  text: וְ/יָדְע֖וּ כִּֽי אֲנִ֣י יְהוָ֑ה בְּ/תִתִּ֤/י אֶת הָ/אָ֨רֶץ֙ שְׁמָמָ֣ה וּ/מְשַׁמָּ֔ה
    עַ֥ל כָּל תּוֹעֲבֹתָ֖/ם אֲשֶׁ֥ר עָשֽׂוּ־־־׃ס
translation:
  text: Then they will know that I am the LORD, when I make the land a desolation
    and a waste because of all their abominations that they have committed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they will know.' The Hebrew conjunction can be rendered simply 'and,'
      but here it likely carries the sense of result in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'a desolation and an astonishment/horror.' The second Hebrew noun can
      emphasize not only ruin but the appalling effect of that ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: The waw with qatal continues the result sequence from the preceding context;
    'Then they will know' brings out the consequential force in natural English while
    preserving the cognitive/recognitional sense of ידע.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what they will know, not a causal
    clause, so 'that' best fits the syntax.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the pattern reflected in the
    Septuagint.
- source_word: בְּתִתִּי
  chosen: when I make
  alternatives:
  - in my making
  - when I give
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive construct marks temporal circumstance
    here: ''when I make.'' Although נתן is literally ''give,'' in this idiom with
    the object ''the land'' and predicate nouns of devastation, English ''make'' communicates
    the resulting state more clearly.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the land of Israel/Judah in covenant-judgment
    context, so 'the land' is preferable to the broader 'earth.'
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - horror
  lexicon: HALOT
  rationale: The noun denotes a state of devastation or desolation. Rendering it as
    a noun preserves the Hebrew construction and pairs naturally with the following
    noun.
- source_word: וּמְשַׁמָּה
  chosen: and a waste
  alternatives:
  - and an astonishment
  - and a horror
  - and a desolation
  lexicon: HALOT
  rationale: This noun is closely related semantically to שְׁמָמָה and intensifies
    the devastation. 'And a waste' avoids awkward repetition of 'desolation and desolation'
    while preserving the sense of ruin. Alternatives such as 'astonishment' reflect
    the term's possible nuance of appalled devastation, but here the land's ruined
    condition is primary.
- source_word: עַל כָּל תּוֹעֲבֹתָם
  chosen: because of all their abominations
  alternatives:
  - for all their abominations
  - on account of all their detestable acts
  lexicon: HALOT
  rationale: עַל here expresses cause or basis for judgment. 'Abominations' is the
    standard and suitably weighty rendering for תּוֹעֵבָה in prophetic denunciation.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they have committed
  alternatives:
  - that they have done
  - which they did
  lexicon: HALOT
  rationale: For עשה with 'abominations,' English idiom prefers 'commit' over the
    more wooden 'do,' while still accurately conveying the action.
