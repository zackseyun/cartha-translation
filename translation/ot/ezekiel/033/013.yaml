id: EZK.33.13
reference: Ezekiel 33:13
source:
  edition: WLC
  text: בְּ/אָמְרִ֤/י לַ/צַּדִּיק֙ חָיֹ֣ה יִֽחְיֶ֔ה וְ/הֽוּא בָטַ֥ח עַל צִדְקָת֖/וֹ
    וְ/עָ֣שָׂה עָ֑וֶל כָּל צדקת/ו לֹ֣א תִזָּכַ֔רְנָה וּ/בְ/עַוְל֥/וֹ אֲשֶׁר עָשָׂ֖ה
    בּ֥/וֹ יָמֽוּת־־־־׃
translation:
  text: When I say to the righteous man, ‘He shall surely live,’ and he trusts in
    his righteousness and does injustice, none of his righteous deeds will be remembered,
    but in the injustice that he has done, by it he shall die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all his righteousness shall not be remembered.' The Hebrew plural can
      denote his righteous acts collectively.
    reason: lexical_alternative
  - marker: b
    text: Or, 'in it he shall die' or 'because of it he shall die,' referring to the
      injustice he has done.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָמְרִי
  chosen: When I say
  alternatives:
  - In my saying
  - When I declare
  lexicon: HALOT
  rationale: The preposition ב with infinitive/construct-like form plus 1cs suffix
    introduces a temporal clause. 'When I say' is idiomatic English and preserves
    the first-person divine speech setting.
- source_word: לַצַּדִּיק
  chosen: to the righteous man
  alternatives:
  - to the righteous one
  - to the righteous person
  lexicon: HALOT
  rationale: צַדִּיק denotes a righteous person. 'Man' preserves the masculine singular
    form in line with the gender-accurate policy, while still functioning representatively
    in context.
- source_word: חָיֹה יִחְיֶה
  chosen: He shall surely live
  alternatives:
  - he will certainly live
  - he shall indeed live
  lexicon: HALOT
  rationale: The infinitive absolute with imperfect intensifies the verb. 'Shall surely
    live' is a natural English way to preserve the emphatic force.
- source_word: בָטַח עַל צִדְקָתוֹ
  chosen: he trusts in his righteousness
  alternatives:
  - he relies on his righteousness
  - he becomes confident in his righteousness
  lexicon: HALOT
  rationale: בָטַח with עַל conveys reliance or trust placed upon something. 'Trusts
    in' is clear and preserves the moral/spiritual sense of misplaced reliance.
- source_word: וְעָשָׂה עָוֶל
  chosen: and does injustice
  alternatives:
  - and commits iniquity
  - and does wrong
  lexicon: HALOT
  rationale: עָוֶל refers to wrong, injustice, or unrighteousness. 'Does injustice'
    keeps lexical connection with the noun later in the verse and avoids importing
    a narrower sense than the Hebrew warrants.
- source_word: כָּל צִדְקֹתָו
  chosen: none of his righteous deeds
  alternatives:
  - all his righteousness
  - any of his righteous acts
  lexicon: HALOT
  rationale: Though formally 'all his righteousnesses/righteous acts,' the plural
    points to concrete acts of righteousness. In English, under negation, 'none of
    his righteous deeds' best conveys that not one of them will count in remembrance.
- source_word: לֹא תִזָּכַרְנָה
  chosen: will be remembered
  alternatives:
  - will be brought to mind
  - will be taken into account
  lexicon: HALOT
  rationale: 'The Niphal of זכר is passive/reflexive: ''be remembered.'' This preserves
    the judicial flavor without overinterpreting it as explicit accounting language,
    though that nuance is present.'
- source_word: וּבְעַוְלוֹ אֲשֶׁר עָשָׂה
  chosen: but in the injustice that he has done
  alternatives:
  - but for the wrong that he has done
  - but in his iniquity which he has committed
  lexicon: HALOT
  rationale: The phrase identifies the sphere or basis of his death. 'In the injustice
    that he has done' preserves the repeated עָוֶל vocabulary and the relative clause.
- source_word: בּוֹ
  chosen: by it
  alternatives:
  - in it
  - because of it
  lexicon: HALOT
  rationale: The pronominal phrase most naturally refers back to the injustice and
    marks the means/basis connected with his death. 'By it' is concise and preserves
    the Hebrew linkage, though English readers may also hear causal force.
- source_word: יָמוּת
  chosen: he shall die
  alternatives:
  - he will die
  lexicon: HALOT
  rationale: Simple imperfect of מות. 'He shall die' matches the solemn judicial tone
    and balances the earlier 'he shall surely live.'
