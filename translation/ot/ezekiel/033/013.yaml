theological_decisions:
- issue: Whether the verse should be rendered in a way that implies a specific doctrinal
    system regarding perseverance/apostasy
  chosen_reading: Translate the warning straightforwardly as a conditional judicial
    statement about the righteous person who turns to injustice, without importing
    later systematic-theology categories.
  alternative_readings:
  - A reading emphasizing loss of covenant standing
  - A reading minimizing the warning as merely hypothetical
  rationale: 'The Hebrew presents a real warning in covenantal/judicial terms: prior
    righteous deeds are not remembered if the righteous person trusts in his righteousness
    and does injustice. The translation preserves this tension and does not resolve
    debates about perseverance beyond what the text itself states.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
