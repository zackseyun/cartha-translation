theological_decisions:
- issue: Sense of 'life' and 'death' in the covenant warning/promise
  chosen_reading: Retain the text's direct promise and warning as 'he shall surely
    live; he shall not die' without specifying whether the reference is temporal,
    covenantal, or eschatological.
  alternative_readings:
  - physical survival
  - covenantal restoration
  - eschatological life
  rationale: The verse affirms life for the repentant wicked person in language that
    may carry overlapping covenantal and existential dimensions. The translation preserves
    the theological tension rather than narrowing the sense beyond what the Hebrew
    explicitly states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
