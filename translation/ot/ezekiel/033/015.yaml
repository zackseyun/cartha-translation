id: EZK.33.15
reference: Ezekiel 33:15
source:
  edition: WLC
  text: חֲבֹ֨ל יָשִׁ֤יב רָשָׁע֙ גְּזֵלָ֣ה יְשַׁלֵּ֔ם בְּ/חֻקּ֤וֹת הַֽ/חַיִּים֙ הָלַ֔ךְ
    לְ/בִלְתִּ֖י עֲשׂ֣וֹת עָ֑וֶל חָי֥וֹ יִֽחְיֶ֖ה לֹ֥א יָמֽוּת׃
translation:
  text: if the wicked man restores the pledge, repays what he has stolen, walks in
    the statutes of life without doing injustice, he shall surely live; he shall not
    die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returns what was taken in pledge'—the Hebrew refers to restoring an
      item held as security for a loan.
    reason: lexical_alternative
  - marker: b
    text: Or 'walks in life-giving statutes' or 'walks by the statutes that give life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבֹל
  chosen: the pledge
  alternatives:
  - what was taken in pledge
  - collateral
  lexicon: HALOT
  rationale: The noun refers to an item taken as security for a loan. 'The pledge'
    is concise and idiomatic in English while preserving the legal-economic sense.
    'Collateral' is possible but more modern and less biblical in register.
- source_word: יָשִׁיב
  chosen: restores
  alternatives:
  - returns
  - gives back
  lexicon: HALOT
  rationale: In context of restitution, 'restores' conveys returning something wrongfully
    retained and fits the legal tone better than the more generic 'returns'.
- source_word: רָשָׁע
  chosen: the wicked man
  alternatives:
  - the wicked
  - the guilty man
  lexicon: HALOT
  rationale: The adjective is substantival and singular. 'The wicked man' preserves
    the masculine singular form in line with the gender-accurate policy and matches
    the representative individual in this legal-prophetic scenario.
- source_word: גְּזֵלָה
  chosen: what he has stolen
  alternatives:
  - robbery
  - stolen goods
  lexicon: HALOT
  rationale: The noun denotes something taken by robbery or theft. Rendering it as
    'what he has stolen' makes natural English with the following verb 'repays' and
    clarifies the object of restitution.
- source_word: יְשַׁלֵּם
  chosen: repays
  alternatives:
  - makes restitution for
  - restores
  lexicon: HALOT
  rationale: The piel form commonly carries the sense of making payment or restitution.
    'Repays' is concise and preserves the compensatory force.
- source_word: בְּחֻקּוֹת הַחַיִּים
  chosen: in the statutes of life
  alternatives:
  - by the statutes of life
  - in the statutes that give life
  - in life-giving statutes
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. A relatively formal rendering preserves
    the Hebrew imagery and avoids over-interpreting whether the statutes are characterized
    by life or lead to life. The preposition is rendered 'in' with 'walks' as a standard
    English equivalent for conduct according to statutes.
- source_word: הָלַךְ
  chosen: walks
  alternatives:
  - lives
  - conducts himself
  lexicon: HALOT
  rationale: Though the Hebrew form is qatal, in this conditional sequence it functions
    with the preceding and following verbs to describe the wicked person's course
    of conduct. 'Walks' preserves the common biblical metaphor of manner of life.
- source_word: לְבִלְתִּי עֲשׂוֹת עָוֶל
  chosen: without doing injustice
  alternatives:
  - so as not to do wrong
  - without committing iniquity
  lexicon: HALOT
  rationale: This infinitival construction expresses refraining from wrongdoing. 'Without
    doing injustice' is clear modern English and keeps the ethical-legal nuance of
    עָוֶל.
- source_word: עָוֶל
  chosen: injustice
  alternatives:
  - wrong
  - iniquity
  lexicon: HALOT
  rationale: The term often denotes unjust or wrongful conduct. 'Injustice' fits the
    legal-restorative context better than the more abstract 'iniquity'.
- source_word: חָיוֹ יִחְיֶה
  chosen: he shall surely live
  alternatives:
  - he shall indeed live
  - living he shall live
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the certainty. 'He
    shall surely live' is the standard and natural English way to preserve that emphasis.
- source_word: לֹא יָמוּת
  chosen: he shall not die
  alternatives:
  - he will not die
  lexicon: HALOT
  rationale: This straightforward negated imperfect is best rendered directly. 'Shall'
    matches the legal-prophetic register and the preceding emphatic future.
