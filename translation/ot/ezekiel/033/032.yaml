theological_decisions:
- issue: Moral nuance of עֲגָבִים
  chosen_reading: sensual song
  alternative_readings:
  - love song
  - erotic song
  rationale: The verse rebukes the audience for treating prophetic speech as pleasing
    entertainment rather than obeying it. Rendering עֲגָבִים as 'sensual' preserves
    the alluring, morally suspect nuance without overstating beyond the Hebrew. This
    is a lexical-contextual decision rather than a doctrinally contested term.
  doctrine_reference: Translation philosophy §§1, 6
