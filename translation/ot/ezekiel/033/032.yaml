id: EZK.33.32
reference: Ezekiel 33:32
source:
  edition: WLC
  text: וְ/הִנְּ/ךָ֤ לָ/הֶם֙ כְּ/שִׁ֣יר עֲגָבִ֔ים יְפֵ֥ה ק֖וֹל וּ/מֵטִ֣ב נַגֵּ֑ן וְ/שָֽׁמְעוּ֙
    אֶת דְּבָרֶ֔י/ךָ וְ/עֹשִׂ֥ים אֵינָ֖/ם אוֹתָֽ/ם־׃
translation:
  text: Look, you are to them like a sensual song, with a beautiful voice and skillful
    playing; they hear your words, but they do not do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a love song.' The Hebrew expression can denote passionate or sensual
      desire; the phrase emphasizes that they treat the prophet's message as attractive
      entertainment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנְּךָ
  chosen: Look, you are
  alternatives:
  - Behold, you are
  - Indeed, you are
  lexicon: HALOT
  rationale: הִנֵּה functions as an attention-getting particle. 'Look' gives natural
    modern English while preserving the deictic force; the attached pronoun supplies
    'you are.'
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: 'The preposition ל marks relation from the audience''s perspective: Ezekiel
    is ''to them'' like something perceived in a certain way.'
- source_word: כְּשִׁיר עֲגָבִים
  chosen: like a sensual song
  alternatives:
  - like a love song
  - like a song of lustful desires
  - like an erotic song
  lexicon: HALOT
  rationale: שִׁיר is 'song.' עֲגָבִים denotes passionate or sensual loves/desires,
    often with a negative or lustful nuance. 'Sensual song' preserves the alluring
    quality without becoming overly explicit or anachronistic. 'Love song' is possible
    but can sound too neutral or romantic in modern English.
- source_word: יְפֵה קוֹל
  chosen: with a beautiful voice
  alternatives:
  - beautiful of voice
  - having a lovely voice
  lexicon: HALOT
  rationale: The phrase describes attractiveness of vocal sound. 'With a beautiful
    voice' is idiomatic English that preserves the descriptive force.
- source_word: וּמֵטִב נַגֵּן
  chosen: and skillful playing
  alternatives:
  - and playing well
  - and one who plays skillfully
  - and good at playing music
  lexicon: HALOT
  rationale: The Hiphil participle of יטב with נגן conveys doing well in musical performance.
    'Skillful playing' captures the participial descriptive sense in concise English.
- source_word: וְשָׁמְעוּ אֶת־דְּבָרֶיךָ
  chosen: they hear your words
  alternatives:
  - they listen to your words
  lexicon: HALOT
  rationale: שׁמע here denotes auditory reception, with implied listening. 'Hear your
    words' keeps the verbal link with the following failure to act.
- source_word: וְעֹשִׂים אֵינָם אוֹתָם
  chosen: but they do not do them
  alternatives:
  - but they do not act on them
  - but they do not practice them
  lexicon: HALOT
  rationale: עשה with the object referring to Ezekiel's words means carrying them
    out. 'Do them' is more formally aligned with the Hebrew and preserves the prophetic
    contrast between hearing and obeying.
