id: EZK.33.21
reference: Ezekiel 33:21
source:
  edition: WLC
  text: וַ/יְהִ֞י בִּ/שְׁתֵּ֧י עֶשְׂרֵ֣ה שָׁנָ֗ה בָּ/עֲשִׂרִ֛י בַּ/חֲמִשָּׁ֥ה לַ/חֹ֖דֶשׁ
    לְ/גָלוּתֵ֑/נוּ בָּא אֵלַ֨/י הַ/פָּלִ֧יט מִ/ירוּשָׁלִַ֛ם לֵ/אמֹ֖ר הֻכְּתָ֥ה הָ/עִֽיר־׃
translation:
  text: And it happened in the twelfth year, in the tenth month, on the fifth day
    of the month of our exile, that the fugitive from Jerusalem came to me, saying,
    “The city has been struck down.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the survivor from Jerusalem.”
    reason: lexical_alternative
  - marker: b
    text: Or “The city has fallen.” The Hebrew more literally says “has been struck
      down.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a new episode. 'And it happened' preserves
    the Hebrew discourse function without archaic English.
- source_word: בִּשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: in the twelfth year
  alternatives:
  - in year twelve
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew date formula.
- source_word: בָּעֲשִׂרִי
  chosen: in the tenth month
  alternatives:
  - in the tenth
  lexicon: HALOT
  rationale: Although 'month' is not repeated here, English date style requires supplying
    it from the following phrase for clarity.
- source_word: בַּחֲמִשָּׁה לַחֹדֶשׁ
  chosen: on the fifth day of the month
  alternatives:
  - on the fifth of the month
  lexicon: HALOT
  rationale: This is the normal Hebrew dating expression; 'day' is supplied idiomatically
    in English.
- source_word: לְגָלוּתֵנוּ
  chosen: of our exile
  alternatives:
  - of our captivity
  lexicon: HALOT
  rationale: '''Exile'' is the clearer modern English rendering for the state of deportation
    and displacement indicated by גָּלוּת.'
- source_word: הַפָּלִיט
  chosen: the fugitive
  alternatives:
  - the escapee
  - the survivor
  - the refugee
  lexicon: HALOT
  rationale: The noun denotes one who has escaped from disaster. 'Fugitive' best matches
    the lexical sense and common prophetic usage, though 'survivor' is a plausible
    contextual alternative.
- source_word: מִירוּשָׁלַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Straightforward source-oriented rendering of the place name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: הֻכְּתָה
  chosen: has been struck down
  alternatives:
  - has fallen
  - has been taken
  - has been defeated
  lexicon: HALOT
  rationale: Hophal of נכה means 'was struck/smitten.' 'Has been struck down' preserves
    the passive verbal force better than the more interpretive 'has fallen.'
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun referring contextually to Jerusalem, but the Hebrew says
    'the city,' so the translation preserves that wording.
