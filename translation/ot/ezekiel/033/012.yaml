theological_decisions:
- issue: Whether to make the verse teach irrevocable loss or guaranteed perseverance
  chosen_reading: 'Preserve the prophetic principle stated in the text: prior righteousness
    does not protect a righteous person who sins, and prior wickedness does not cause
    a wicked person to stumble when he turns from it.'
  alternative_readings:
  - A doctrinal statement about loss of salvation
  - A doctrinal statement about perseverance of the saints
  rationale: The verse addresses divine judgment in terms of present moral state and
    repentance, not later systematic categories. The translation therefore stays close
    to the Hebrew and does not import denominational conclusions.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Referent of בָּהּ in the final clause
  chosen_reading: Keep the pronoun implicit as 'by it,' referring most naturally to
    the righteous person's righteousness.
  alternative_readings:
  - Make the referent explicit as 'by his righteousness'
  - Take the pronoun more loosely as referring to his prior status generally
  rationale: The feminine singular pronoun grammatically aligns with צִדְקָה/רִשְׁעָה
    in the verse's parallel structure. Retaining 'by it' preserves the Hebrew cohesion
    and the rhetorical symmetry.
  doctrine_reference: Translation philosophy §1, §3
