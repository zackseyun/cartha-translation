theological_decisions:
- issue: Metonymic force of 'the sword' in prophetic warning
  chosen_reading: Retain the literal image 'the sword' in the main text while allowing
    readers to infer invading war/judgment from context.
  alternative_readings:
  - Translate interpretively as 'war' or 'an invading army'
  rationale: The Hebrew uses the concrete term חֶרֶב, and the translation philosophy
    prioritizes original-language primacy over smoothing paraphrase. Keeping the image
    preserves prophetic texture and theological gravity without over-interpreting.
  doctrine_reference: Translation philosophy §1, §6
