id: EZK.33.3
reference: Ezekiel 33:3
source:
  edition: WLC
  text: וְ/רָאָ֥ה אֶת הַ/חֶ֖רֶב בָּאָ֣ה עַל הָ/אָ֑רֶץ וְ/תָקַ֥ע בַּ/שּׁוֹפָ֖ר וְ/הִזְהִ֥יר
    אֶת הָ/עָֽם־־־׃
translation:
  text: and he sees the sword coming against the land, and he blows the trumpet and
    warns the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'horn' or 'ram’s horn' for 'trumpet' (Hebrew shofar).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָה
  chosen: and he sees
  alternatives:
  - and he saw
  - and he looks and sees
  lexicon: HALOT
  rationale: The form is a waw-consecutive/qatal in narrative sequence. In this conditional/legal-style
    context, present-tense English ('sees') communicates the protasis more naturally
    than simple past while preserving the sequential sense.
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  - the battle sword
  lexicon: HALOT
  rationale: חֶרֶב is literally 'sword' and in prophetic discourse commonly metonymic
    for invading warfare or judgment. The concrete image should be retained rather
    than paraphrased as 'war' in the main text.
- source_word: בָּאָה עַל הָאָרֶץ
  chosen: coming against the land
  alternatives:
  - coming upon the land
  - coming against the country
  lexicon: HALOT
  rationale: בוא + עַל conveys movement against/upon a place. 'Coming against the
    land' preserves the threatening force better than the flatter 'coming upon.' 'Land'
    is preferred over 'country' for biblical register and possible covenantal-territorial
    resonance.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the earth
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the territorial land under threat,
    not the whole earth. 'Land' is the most contextually precise and consistent rendering.
- source_word: וְתָקַע בַּשּׁוֹפָר
  chosen: and he blows the trumpet
  alternatives:
  - and he sounds the horn
  - and he blows the ram's horn
  lexicon: HALOT
  rationale: תקע בשופר is the standard idiom for sounding an alarm. 'Trumpet' is idiomatic
    modern English and sufficiently established for שופר here; more specific renderings
    like 'ram's horn' are possible but less natural in the flow of the warning scene.
- source_word: שׁוֹפָר
  chosen: trumpet
  alternatives:
  - horn
  - ram's horn
  lexicon: HALOT
  rationale: Although שופר is technically a horn, 'trumpet' best conveys its signaling
    function in English Bible style. The more literal alternatives are worth preserving
    in a footnote.
- source_word: וְהִזְהִיר
  chosen: and warns
  alternatives:
  - and gives warning to
  - and warns beforehand
  lexicon: HALOT
  rationale: The Hiphil of זהר here means to warn or give warning. 'Warns' is concise,
    natural English and preserves the causative sense without unnecessary expansion.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  - the nation
  lexicon: HALOT
  rationale: עָם here refers to the people collectively who are to receive the warning.
    'The people' is the standard and most natural rendering.
