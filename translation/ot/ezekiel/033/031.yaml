theological_decisions:
- issue: Moral characterization of the people's speech and desire
  chosen_reading: The verse depicts hypocritical hearers whose verbal expression is
    driven by sensual/self-serving desire while their inner loyalty is directed toward
    unjust gain.
  alternative_readings:
  - The phrase may refer to affectionate speech or flattering devotion rather than
    explicitly sensual language.
  - The phrase may describe them treating Ezekiel's words like a love song in anticipation
    of v.32.
  rationale: 'The immediate context emphasizes hypocrisy: they hear but do not obey.
    The paired clauses contrast mouth and heart. Rendering עֲגָבִים in a way that
    signals disordered desire preserves the prophetic indictment without importing
    a narrower doctrinal claim.'
  doctrine_reference: Translation philosophy §§1, 3, 6
