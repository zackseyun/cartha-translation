id: EZK.33.10
reference: Ezekiel 33:10
source:
  edition: WLC
  text: וְ/אַתָּ֣ה בֶן אָדָ֗ם אֱמֹר֙ אֶל בֵּ֣ית יִשְׂרָאֵ֔ל כֵּ֤ן אֲמַרְתֶּם֙ לֵ/אמֹ֔ר
    כִּֽי פְשָׁעֵ֥י/נוּ וְ/חַטֹּאתֵ֖י/נוּ עָלֵ֑י/נוּ וּ/בָ֛/ם אֲנַ֥חְנוּ נְמַקִּ֖ים
    וְ/אֵ֥יךְ נִֽחְיֶֽה־־־׃
translation:
  text: 'And you, son of man, say to the house of Israel, ‘This is what you have said:
    “Surely our transgressions and our sins are upon us, and in them we are wasting
    away; so how can we live?”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rotting away' / 'pining away' for 'we are wasting away.' The Hebrew
      verb suggests wasting, decay, or languishing under the weight of guilt and judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: Retains the familiar prophetic address and matches the Hebrew idiom literally.
    Although the sense is 'human/mortal one,' the expression is a fixed form of address
    in Ezekiel, so a more formal rendering is preferable.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: A standard covenantal collective expression; preserving 'house' maintains
    the Hebrew imagery and prophetic register.
- source_word: כֵּן
  chosen: This is what
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: Introduces the content of what Israel has been saying. 'This is what'
    is natural modern English while preserving the demonstrative force.
- source_word: פְשָׁעֵינוּ
  chosen: our transgressions
  alternatives:
  - our rebellions
  - our offenses
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or willful breach. 'Transgressions'
    is a standard English equivalent that preserves moral seriousness without over-paraphrase.
- source_word: חַטֹּאתֵינוּ
  chosen: our sins
  alternatives:
  - our offenses
  lexicon: HALOT
  rationale: A straightforward rendering of חטאות. Keeping both 'transgressions' and
    'sins' preserves the Hebrew pairing rather than collapsing them into one term.
- source_word: עָלֵינוּ
  chosen: are upon us
  alternatives:
  - are on us
  - rest on us
  lexicon: HALOT
  rationale: The idiom conveys burden, liability, or consequence resting on the speakers.
    'Are upon us' preserves the metaphor and solemn tone.
- source_word: וּבָם
  chosen: in them
  alternatives:
  - because of them
  - under them
  lexicon: HALOT
  rationale: The preposition ב is most directly 'in.' Here it likely expresses the
    sphere or condition in which they are perishing. A more interpretive causal rendering
    is possible, but 'in them' best preserves the Hebrew while remaining intelligible.
- source_word: נְמַקִּים
  chosen: we are wasting away
  alternatives:
  - we are rotting away
  - we are pining away
  - we melt away
  lexicon: HALOT
  rationale: The verb conveys wasting, decaying, or languishing under judgment. 'Wasting
    away' is idiomatic modern English and communicates ongoing deterioration without
    sounding overly graphic.
- source_word: וְאֵיךְ נִחְיֶה
  chosen: so how can we live?
  alternatives:
  - and how shall we live?
  - how then can we live?
  lexicon: HALOT
  rationale: The question expresses despair about survival in light of guilt. 'Can
    we live' captures the modal force in natural English; 'so' reflects the inferential
    connection.
