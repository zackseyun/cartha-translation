theological_decisions:
- issue: Whether the people's statement should sound like confession alone or despair
    under judgment
  chosen_reading: 'Rendered as a despairing acknowledgment of guilt and its consequences:
    ''Surely our transgressions and our sins are upon us ... so how can we live?'''
  alternative_readings:
  - A more purely confessional reading without emphasis on hopelessness
  rationale: The final question and the participle 'wasting away' show that the statement
    is not merely repentance but anguished hopelessness. The translation preserves
    that tension without importing a doctrinal conclusion about repentance or forgiveness
    beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
