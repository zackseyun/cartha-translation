id: EZK.33.9
reference: Ezekiel 33:9
source:
  edition: WLC
  text: וְ֠/אַתָּה כִּֽי הִזְהַ֨רְתָּ רָשָׁ֤ע מִ/דַּרְכּ/וֹ֙ לָ/שׁ֣וּב מִמֶּ֔/נָּה
    וְ/לֹא שָׁ֖ב מִ/דַּרְכּ֑/וֹ ה֚וּא בַּ/עֲוֺנ֣/וֹ יָמ֔וּת וְ/אַתָּ֖ה נַפְשְׁ/ךָ֥
    הִצַּֽלְתָּ־־׃ס
translation:
  text: But if you warn a wicked man to turn from his way, and he does not turn from
    his way, he will die in his iniquity; but you will have delivered your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have saved your soul.' Here 'life' renders Hebrew nephesh in the
      sense of one's life/self, not necessarily the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: '''He will die in his iniquity'' may also be understood as ''he will die
      for his iniquity.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הִזְהַרְתָּ
  chosen: warn
  alternatives:
  - admonish
  - give warning to
  lexicon: HALOT
  rationale: The Hiphil of זהר here means to warn or give warning. 'Warn' is concise,
    natural English, and fits the watchman context in Ezekiel.
- source_word: רָשָׁע
  chosen: wicked man
  alternatives:
  - wicked person
  - guilty man
  lexicon: HALOT
  rationale: The singular masculine adjective functions substantivally for an individual
    male referent in direct address. 'Wicked man' preserves the moral sense and the
    gendered singular form better than a neutral paraphrase.
- source_word: מִדַּרְכּוֹ ... לָשׁוּב מִמֶּנָּה
  chosen: to turn from his way
  alternatives:
  - to turn from it
  - to turn from his path
  lexicon: HALOT
  rationale: דֶּרֶךְ often carries ethical-conduct sense in prophetic literature.
    'Way' preserves the metaphor and moral nuance. The infinitive phrase expresses
    the content/purpose of the warning.
- source_word: וְלֹא שָׁב מִדַּרְכּוֹ
  chosen: and he does not turn from his way
  alternatives:
  - and he does not turn from it
  - and he does not turn back from his way
  lexicon: HALOT
  rationale: Repeating 'from his way' mirrors the Hebrew repetition and keeps the
    ethical metaphor explicit rather than replacing it with a pronoun.
- source_word: בַּעֲוֺנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - in his guilt
  - because of his iniquity
  lexicon: HALOT
  rationale: The beth preposition with עָוֹן can denote the sphere or circumstance
    in which death occurs, with causal overtones. 'In his iniquity' is a standard
    and sufficiently transparent rendering that preserves the Hebrew compactness.
- source_word: הִצַּלְתָּ
  chosen: will have delivered
  alternatives:
  - have saved
  - have rescued
  lexicon: HALOT
  rationale: נצל in Hiphil means deliver/rescue. 'Delivered' avoids importing soteriological
    overtones stronger than the immediate context requires, while fitting the watchman's
    responsibility motif.
- source_word: נַפְשְׁךָ
  chosen: your life
  alternatives:
  - your soul
  - yourself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life rather than the immaterial soul
    in a later theological sense. 'Your life' is the clearest contextual rendering
    in English.
- source_word: כִּי
  chosen: if
  alternatives:
  - but if
  - indeed if
  lexicon: HALOT
  rationale: In this conditional setting, כִּי introduces the protasis with the sense
    'if.' Because the verse contrasts with the previous one, the English sentence
    begins with 'But if' to reflect discourse flow, though the adversative force comes
    mainly from context and the initial pronoun.
- source_word: וְאַתָּה ... וְאַתָּה
  chosen: But if you ... but you
  alternatives:
  - and you ... and you
  - as for you ... you
  lexicon: HALOT
  rationale: The repeated pronoun is emphatic. Rendering the first with 'But if you'
    and the second with 'but you' brings out the contrast between the wicked man's
    fate and the watchman's accountability in idiomatic English.
