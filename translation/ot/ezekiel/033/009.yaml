theological_decisions:
- issue: Meaning of נֶפֶשׁ in the closing clause
  chosen_reading: physical life/accountability preserved rather than 'soul' in a later
    metaphysical sense
  alternative_readings:
  - your soul you have saved
  rationale: The context concerns the watchman's liability for bloodguilt and survival
    under divine judgment, not a developed anthropology of soul versus body. Rendering
    נַפְשְׁךָ as 'your life' preserves the Hebrew sense and avoids importing later
    doctrinal categories the text does not require.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Moral responsibility in 'he will die in his iniquity'
  chosen_reading: the wicked man's death is tied to his own iniquity, while the watchman
    is cleared if he warned him
  alternative_readings:
  - he will die for his iniquity
  rationale: The verse maintains the text's tension between individual responsibility
    and the watchman's duty without expanding into a broader doctrinal system. 'In
    his iniquity' preserves the Hebrew wording while allowing the causal sense to
    be heard.
  doctrine_reference: Translation philosophy §3
