id: EZK.33.4
reference: Ezekiel 33:4
source:
  edition: WLC
  text: וְ/שָׁמַ֨ע הַ/שֹּׁמֵ֜עַ אֶת ק֤וֹל הַ/שּׁוֹפָר֙ וְ/לֹ֣א נִזְהָ֔ר וַ/תָּ֥בוֹא
    חֶ֖רֶב וַ/תִּקָּחֵ֑/הוּ דָּמ֥/וֹ בְ/רֹאשׁ֖/וֹ יִֽהְיֶֽה־׃
translation:
  text: then if the one who hears hears the sound of the trumpet and does not take
    warning, and the sword comes and takes him away, his blood will be on his own
    head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his blood will be on his head,'' an idiom meaning he bears responsibility
      for his own death.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁמַע
  chosen: then if ... hears
  alternatives:
  - and hears
  - and he hears
  lexicon: HALOT
  rationale: In context this continues the conditional case begun in the previous
    verse; English idiom supplies 'if' to make the protasis clear. The verb itself
    is 'hear,' but the conjunction is carried forward contextually as a conditional
    continuation rather than a simple narrative 'and.'
- source_word: הַשֹּׁמֵעַ
  chosen: the one who hears
  alternatives:
  - the hearer
  - whoever hears
  lexicon: HALOT
  rationale: The participle with article functions substantivally. 'The one who hears'
    is natural modern English and preserves the individualizing force better than
    the less idiomatic 'the hearer.'
- source_word: קוֹל הַשּׁוֹפָר
  chosen: the sound of the trumpet
  alternatives:
  - the voice of the trumpet
  - the trumpet blast
  lexicon: HALOT
  rationale: קוֹל here refers to the audible signal, not a literal 'voice.' 'Sound
    of the trumpet' is clear and suitably formal; 'trumpet blast' is possible but
    slightly more interpretive.
- source_word: נִזְהָר
  chosen: take warning
  alternatives:
  - be warned
  - take heed
  lexicon: HALOT
  rationale: The Niphal conveys being warned or taking warning. 'Take warning' fits
    the watchman context and preserves the person's responsibility to respond to the
    alarm.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  lexicon: HALOT
  rationale: In prophetic judgment contexts 'the sword' is a conventional metonym
    for violent invasion or death. Retaining 'the sword' preserves the Hebrew imagery
    and the repeated motif in the passage.
- source_word: וַתִּקָּחֵהוּ
  chosen: takes him away
  alternatives:
  - takes him
  - sweeps him away
  lexicon: HALOT
  rationale: לקח literally means 'take.' 'Takes him away' makes the lethal result
    intelligible in English without overparaphrasing; 'sweeps him away' is more vivid
    but less literal.
- source_word: דָּמוֹ בְרֹאשׁוֹ יִהְיֶה
  chosen: his blood will be on his own head
  alternatives:
  - his blood will be on his head
  - his bloodguilt will be upon his head
  lexicon: HALOT
  rationale: This idiom assigns responsibility for one's death to oneself. 'On his
    own head' preserves the Hebrew idiom and clarifies reflexive responsibility. 'Bloodguilt'
    is interpretive and stronger than the Hebrew wording here.
