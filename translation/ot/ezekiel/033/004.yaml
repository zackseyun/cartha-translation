theological_decisions:
- issue: Responsibility idiom in judgment context
  chosen_reading: his blood will be on his own head
  alternative_readings:
  - he will bear responsibility for his own death
  - his bloodguilt will be upon him
  rationale: The verse emphasizes personal accountability for ignoring the warning.
    The Hebrew idiom is preserved rather than reduced to an abstract explanation,
    maintaining the theological and rhetorical force without importing later doctrinal
    categories.
  doctrine_reference: 'Translation philosophy #3, #6'
