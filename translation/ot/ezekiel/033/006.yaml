id: EZK.33.6
reference: Ezekiel 33:6
source:
  edition: WLC
  text: וְ֠/הַ/צֹּפֶה כִּֽי יִרְאֶ֨ה אֶת הַ/חֶ֜רֶב בָּאָ֗ה וְ/לֹֽא תָקַ֤ע בַּ/שּׁוֹפָר֙
    וְ/הָ/עָ֣ם לֹֽא נִזְהָ֔ר וַ/תָּב֣וֹא חֶ֔רֶב וַ/תִּקַּ֥ח מֵ/הֶ֖ם נָ֑פֶשׁ ה֚וּא
    בַּ/עֲוֺנ֣/וֹ נִלְקָ֔ח וְ/דָמ֖/וֹ מִ/יַּֽד הַ/צֹּפֶ֥ה אֶדְרֹֽשׁ־־־־־׃ס
translation:
  text: But if the watchman sees the sword coming and does not blow the trumpet, and
    the people are not warned, and the sword comes and takes a life from among them,
    that one is taken away in his iniquity, but I will require his blood from the
    watchman's hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not take warning.' The Hebrew can be understood either as the people
      not being warned or as their not heeding warning; the main text follows the
      causal emphasis created by the watchman's failure to sound the trumpet.
    reason: lexical_alternative
  - marker: b
    text: '''His blood ... from the watchman''s hand'' is a legal idiom of accountability
      for a death.'
    reason: cultural_note
lexical_decisions:
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the sentinel
  - the lookout
  lexicon: HALOT
  rationale: צֹפֶה denotes one who keeps watch or stands guard. 'Watchman' is the
    most natural English rendering in this prophetic context and matches the established
    metaphor in Ezekiel 33.
- source_word: כִּי יִרְאֶה
  chosen: if ... sees
  alternatives:
  - when ... sees
  - that ... sees
  lexicon: HALOT
  rationale: Here כִּי introduces a conditional scenario in a casuistic sequence.
    'If' best fits the logic of the warning-responsibility case being described.
- source_word: הַחֶרֶב בָּאָה
  chosen: the sword coming
  alternatives:
  - the sword coming upon them
  - the sword approaching
  lexicon: HALOT
  rationale: חֶרֶב 'sword' functions metonymically for violent judgment or invasion,
    but the concrete image should be preserved in translation. 'Coming' reflects בָּאָה
    straightforwardly without over-interpreting.
- source_word: תָקַע בַּשּׁוֹפָר
  chosen: blow the trumpet
  alternatives:
  - sound the horn
  lexicon: HALOT
  rationale: The idiom means to sound a warning instrument. 'Trumpet' is conventional
    for שׁוֹפָר in English Bible usage and remains understandable to modern readers.
- source_word: וְהָעָם לֹא נִזְהָר
  chosen: and the people are not warned
  alternatives:
  - and the people are not warned in time
  - and the people do not take warning
  lexicon: HALOT
  rationale: The Niphal of זהר can mean 'be warned' or 'take warning.' In this context,
    because the watchman's failure to sound the trumpet is foregrounded, the passive
    'are not warned' best captures the causal sense.
- source_word: וַתִּקַּח מֵהֶם נָפֶשׁ
  chosen: takes a life from among them
  alternatives:
  - takes a person from among them
  - takes one of them
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to an individual life/person. 'Takes a life' preserves
    the idiomatic force while sounding natural in English.
- source_word: הוּא
  chosen: that one
  alternatives:
  - he
  - that person
  lexicon: HALOT
  rationale: The pronoun resumes the individual just mentioned. 'That one' avoids
    awkward ambiguity after the collective 'people' while still reflecting the singular
    Hebrew.
- source_word: בַּעֲוֺנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - in his guilt
  - because of his sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. 'In his iniquity'
    preserves the Hebrew's compact moral-covenantal expression and echoes Ezekiel's
    recurring wording.
- source_word: נִלְקָח
  chosen: is taken away
  alternatives:
  - is taken
  - is swept away
  lexicon: HALOT
  rationale: The Niphal of לקח here indicates being taken off by judgment/death. 'Taken
    away' communicates the passive result clearly in idiomatic English.
- source_word: דָּמוֹ
  chosen: his blood
  alternatives:
  - his lifeblood
  - the bloodguilt for him
  lexicon: HALOT
  rationale: '''Blood'' in this legal-moral context signifies accountability for a
    death. The literal term should be retained, with the idiom clarified by the following
    phrase.'
- source_word: מִיַּד הַצֹּפֶה אֶדְרֹשׁ
  chosen: I will require ... from the watchman's hand
  alternatives:
  - I will demand ... from the watchman
  - I will hold the watchman accountable for ...
  lexicon: HALOT
  rationale: דרשׁ with מִיַּד is a legal idiom for requiring or demanding accountability.
    Retaining 'from the watchman's hand' preserves the Hebrew imagery and juridical
    force.
