theological_decisions:
- issue: Nature of the watchman's accountability
  chosen_reading: The verse teaches real divine accountability for the watchman's
    failure to warn, while still affirming that the slain person is taken in his own
    iniquity.
  alternative_readings:
  - The watchman bears the victim's guilt in place of the victim
  - The victim dies solely because of the watchman's failure
  rationale: 'The Hebrew explicitly holds both truths together: ''he is taken away
    in his iniquity'' and ''his blood I will require from the watchman''s hand.''
    The translation preserves this tension rather than collapsing it into either substitutionary
    guilt-transfer or mere procedural negligence.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
