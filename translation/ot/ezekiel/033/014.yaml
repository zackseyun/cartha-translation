id: EZK.33.14
reference: Ezekiel 33:14
source:
  edition: WLC
  text: וּ/בְ/אָמְרִ֥/י לָֽ/רָשָׁ֖ע מ֣וֹת תָּמ֑וּת וְ/שָׁב֙ מֵֽ/חַטָּאת֔/וֹ וְ/עָשָׂ֥ה
    מִשְׁפָּ֖ט וּ/צְדָקָֽה׃
translation:
  text: And when I say to the wicked man, ‘You shall surely die,’ but he turns from
    his sin and does justice and righteousness,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he returns from his sin and does what is just and right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאָמְרִי
  chosen: And when I say
  alternatives:
  - And in my saying
  - And when I tell
  lexicon: HALOT
  rationale: 'The conjunction plus preposition with infinitive construct/1cs is naturally
    temporal here: ''and when I say.'' This is smoother in English than a more wooden
    ''and in my saying'' while preserving the temporal force.'
- source_word: לָרָשָׁע
  chosen: to the wicked man
  alternatives:
  - to the wicked
  - to the guilty man
  lexicon: HALOT
  rationale: רָשָׁע denotes a wicked person, not merely someone unfortunate. 'Wicked
    man' preserves the singular masculine form and representative force, in line with
    the gender-accurate policy.
- source_word: מוֹת תָּמוּת
  chosen: You shall surely die
  alternatives:
  - you will certainly die
  - dying you shall die
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the certainty of
    death. 'You shall surely die' is a standard and accurate English rendering that
    preserves the emphasis without excessive literalism.
- source_word: וְשָׁב
  chosen: but he turns
  alternatives:
  - and he turns
  - but he returns
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' English idiom and the conditional
    contrast in context favor 'but he turns.' שׁוּב here means turning back/repenting
    from prior wrongdoing, not merely physical return.
- source_word: מֵחַטָּאתוֹ
  chosen: from his sin
  alternatives:
  - from his sinful way
  - from his offense
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix is best rendered straightforwardly
    as 'from his sin.' The broader ethical sense is already carried by the following
    actions, so no expansion is needed.
- source_word: וְעָשָׂה
  chosen: and does
  alternatives:
  - and practices
  - and acts with
  lexicon: HALOT
  rationale: עשה is broad and common; 'does' is the most direct equivalent and fits
    the collocation with the following nouns.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - what is just
  - judgment
  lexicon: HALOT
  rationale: In this ethical context, מִשְׁפָּט refers to just conduct or justice,
    not merely a legal verdict. 'Justice' is concise and natural.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - what is right
  - justice
  lexicon: HALOT
  rationale: צְדָקָה commonly denotes righteousness/right conduct. Rendering it as
    'righteousness' preserves the distinction from מִשְׁפָּט while keeping the ethical-theological
    weight of the Hebrew term.
