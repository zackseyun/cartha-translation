theological_decisions:
- issue: Representative masculine singular in address to the wicked person
  chosen_reading: the wicked man
  alternative_readings:
  - the wicked person
  - the wicked one
  rationale: The Hebrew is grammatically masculine singular and functions representatively.
    Per doctrine, gender-accurate rendering is preferred over flattening to a neutral
    form unless context requires otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering the ethical pair מִשְׁפָּט וּצְדָקָה distinctly
  chosen_reading: justice and righteousness
  alternative_readings:
  - what is just and right
  rationale: The pair is theologically significant in the Hebrew Bible and should
    be preserved with two distinct English terms rather than collapsed into a single
    idiom. This maintains lexical transparency and theological texture.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
