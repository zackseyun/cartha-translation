id: EZK.33.24
reference: Ezekiel 33:24
source:
  edition: WLC
  text: בֶּן אָדָ֗ם יֹ֠שְׁבֵי הֶ/חֳרָב֨וֹת הָ/אֵ֜לֶּה עַל אַדְמַ֤ת יִשְׂרָאֵל֙ אֹמְרִ֣ים
    לֵ/אמֹ֔ר אֶחָד֙ הָיָ֣ה אַבְרָהָ֔ם וַ/יִּירַ֖שׁ אֶת הָ/אָ֑רֶץ וַ/אֲנַ֣חְנוּ רַבִּ֔ים
    לָ֛/נוּ נִתְּנָ֥ה הָ/אָ֖רֶץ לְ/מוֹרָשָֽׁה־־־׃ס
translation:
  text: Son of man, the inhabitants of these ruins on the land of Israel are saying,
    ‘Abraham was only one man, yet he possessed the land; but we are many—the land
    has been given to us as a possession.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Abraham was but one, and he inherited the land; but we are many; the
      land has been given to us for an inheritance.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard rendering of Ezekiel’s address formula. It preserves the Hebrew
    idiom and its repeated prophetic force better than a more interpretive alternative.
- source_word: יֹשְׁבֵי הֶחֳרָבוֹת הָאֵלֶּה
  chosen: the inhabitants of these ruins
  alternatives:
  - those dwelling in these waste places
  - those living among these ruins
  lexicon: HALOT
  rationale: יֹשְׁבֵי is literally 'dwellers/inhabitants of.' חֳרָבוֹת denotes ruins,
    devastated places. 'Inhabitants of these ruins' is natural English while retaining
    the concrete image of people occupying devastated sites.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  chosen: on the land of Israel
  alternatives:
  - upon the soil of Israel
  - in the land of Israel
  lexicon: HALOT
  rationale: אַדְמָה is more literally 'ground/soil/land' than אֶרֶץ in some contexts.
    'On the land of Israel' keeps the territorial sense without over-specifying 'soil';
    'in the land' is possible but slightly less tied to עַל.
- source_word: אֹמְרִים לֵאמֹר
  chosen: are saying
  alternatives:
  - are saying, saying
  - say
  lexicon: HALOT
  rationale: The infinitive לֵאמֹר introduces direct speech. In English it is normally
    absorbed into the reporting verb rather than rendered woodenly.
- source_word: אֶחָד הָיָה אַבְרָהָם
  chosen: Abraham was only one man
  alternatives:
  - Abraham was one
  - Abraham was but one
  lexicon: HALOT
  rationale: The point is numerical contrast with 'we are many.' Adding 'man' makes
    the comparison explicit in idiomatic English, and 'only' captures the rhetorical
    force without adding new content.
- source_word: וַיִּירַשׁ אֶת הָאָרֶץ
  chosen: yet he possessed the land
  alternatives:
  - and he inherited the land
  - and he took possession of the land
  lexicon: HALOT
  rationale: ירשׁ can mean inherit, possess, or take possession. Here the speakers
    appeal to Abraham’s obtaining the land as precedent. 'Possessed' communicates
    the result clearly in English; 'inherited' is possible but can sound overly technical
    or imply a narrower legal nuance.
- source_word: וַאֲנַחְנוּ רַבִּים
  chosen: but we are many
  alternatives:
  - and we are many
  - while we are many
  lexicon: HALOT
  rationale: 'The waw here is contrastive in sense within the argument: Abraham was
    one, but we are many. ''But'' best conveys the logic in English.'
- source_word: לָנוּ נִתְּנָה הָאָרֶץ
  chosen: the land has been given to us
  alternatives:
  - to us the land was given
  - the land was given to us
  lexicon: HALOT
  rationale: 'The Niphal of נתן is passive: ''was given.'' Present perfect English
    (''has been given'') fits the speakers’ claim of present entitlement based on
    a completed grant.'
- source_word: לְמוֹרָשָׁה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  lexicon: HALOT
  rationale: מוֹרָשָׁה denotes a possession, often hereditary. 'As a possession' is
    clear modern English and avoids overloading the line with legal terminology, while
    'inheritance' remains a viable lexical alternative.
