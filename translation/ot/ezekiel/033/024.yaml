theological_decisions:
- issue: Whether to render Abraham’s claim in inheritance language or possession language
  chosen_reading: possessed the land ... given to us as a possession
  alternative_readings:
  - inherited the land ... given to us as an inheritance
  rationale: The verse reports the presumptuous reasoning of the survivors, not a
    doctrinal statement about covenant legitimacy. Rendering both ירשׁ and מוֹרָשָׁה
    with possession language preserves the land-tenure argument without importing
    stronger covenantal overtones than the Hebrew requires in this context.
  doctrine_reference: Translation philosophy §§1, 3, 5
