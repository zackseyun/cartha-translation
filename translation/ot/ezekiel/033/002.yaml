theological_decisions:
- issue: Gendered representative language
  chosen_reading: Retain 'sons' and 'man' where the Hebrew is explicitly masculine
  alternative_readings:
  - your people
  - one person
  rationale: The verse uses masculine forms בְּנֵי and אִישׁ. Following the translation
    philosophy's gender-accurate principle, the draft preserves the source-language
    gender rather than neutralizing it, while understanding the collective function
    contextually.
