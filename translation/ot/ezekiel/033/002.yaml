id: EZK.33.2
reference: Ezekiel 33:2
source:
  edition: WLC
  text: בֶּן אָדָ֗ם דַּבֵּ֤ר אֶל בְּנֵֽי עַמְּ/ךָ֙ וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם אֶ֕רֶץ
    כִּֽי אָבִ֥יא עָלֶ֖י/הָ חָ֑רֶב וְ/לָקְח֨וּ עַם הָ/אָ֜רֶץ אִ֤ישׁ אֶחָד֙ מִ/קְצֵי/הֶ֔ם
    וְ/נָתְנ֥וּ אֹת֛/וֹ לָ/הֶ֖ם לְ/צֹפֶֽה־־־־־׃
translation:
  text: Son of man, speak to the sons of your people and say to them, ‘If I bring
    a sword upon a land, and the people of the land take one man from among them and
    appoint him as their watchman,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If I bring the sword upon a land.' The Hebrew 'sword' is a conventional
      image for warfare or judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. Retaining the familiar singular
    expression preserves the idiom and its literary function better than smoothing
    to 'human' or 'mortal.' Although אָדָם can mean 'humankind' in some contexts,
    here the vocative addresses the individual prophet.
- source_word: דַּבֵּר
  chosen: speak
  alternatives:
  - declare
  lexicon: HALOT
  rationale: A straightforward imperative. 'Speak' is the plain sense and fits the
    following indirect discourse.
- source_word: בְּנֵי עַמְּךָ
  chosen: the sons of your people
  alternatives:
  - your people
  - the children of your people
  lexicon: HALOT
  rationale: The Hebrew is explicitly filial/plural masculine. Per the gender-accurate
    policy, the translation preserves 'sons' rather than flattening to 'people,' while
    still reflecting the collective sense.
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - the land
  - a country
  lexicon: HALOT
  rationale: Here אֶרֶץ lacks the article and introduces a general case in a hypothetical
    scenario, so 'a land' is preferable to 'the land.' 'Country' is possible but 'land'
    better preserves the biblical register.
- source_word: כִּי
  chosen: If
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this context כִּי introduces a hypothetical case rather than a causal
    clause. 'If' best captures the conditional force in the scenario being described.
- source_word: אָבִיא עָלֶיהָ חָרֶב
  chosen: I bring a sword upon a land
  alternatives:
  - I bring the sword against it
  - I bring war upon it
  lexicon: HALOT
  rationale: '''Sword'' is retained as the concrete Hebrew image, commonly signifying
    warfare or judgment. Rendering it as ''war'' would interpret rather than translate.
    The singular indefinite matches the Hebrew well in English idiom.'
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the populace of the land
  lexicon: HALOT
  rationale: This is the ordinary collective expression here, not a technical title.
    'People of the land' is the standard and transparent rendering.
- source_word: אִישׁ אֶחָד
  chosen: one man
  alternatives:
  - a single man
  - one person
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per the gender-accurate
    policy, 'one man' is preferred over the more generic 'one person.'
- source_word: מִקְצֵיהֶם
  chosen: from among them
  alternatives:
  - from their number
  - from their extremities
  lexicon: HALOT
  rationale: Though the noun can literally relate to 'ends' or 'extremities,' in this
    idiom it means selecting someone out of their group. 'From among them' gives the
    intended sense in natural English.
- source_word: וְנָתְנוּ אֹתוֹ לָהֶם לְצֹפֶה
  chosen: appoint him as their watchman
  alternatives:
  - set him for themselves as a watchman
  - make him their sentinel
  lexicon: HALOT
  rationale: The idiom literally says 'give/set him to them for a watchman.' 'Appoint
    him as their watchman' conveys the institutional action clearly while preserving
    the role term צֹפֶה as 'watchman,' which is important in Ezekiel’s surrounding
    context.
