theological_decisions:
- issue: Whether the verse implies loss of salvation or addresses covenantal/judicial
    accountability in temporal terms
  chosen_reading: 'The translation remains text-immanent: a righteous man who turns
    from righteousness and does injustice will die because of those wrongful acts.'
  alternative_readings:
  - The verse teaches apostasy from saving righteousness
  - The verse speaks only of temporal death/judgment within covenant life
  rationale: The Hebrew states the moral reversal and resulting death without specifying
    later doctrinal categories. Per doctrine, the translation must preserve the tension
    and not import denominational conclusions beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
