id: EZK.33.18
reference: Ezekiel 33:18
source:
  edition: WLC
  text: בְּ/שׁוּב צַדִּ֥יק מִ/צִּדְקָת֖/וֹ וְ/עָ֣שָׂה עָ֑וֶל וּ/מֵ֖ת בָּ/הֶֽם־׃
translation:
  text: When a righteous man turns from his righteousness and does injustice, he shall
    die because of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wrong,' 'iniquity,' or 'unrighteousness' for 'injustice.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in them' or 'by them'; the sense is that he dies on account of
      those wrongful deeds.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּב
  chosen: When ... turns
  alternatives:
  - In turning
  - When ... returns
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of שוב introduces a temporal
    clause: ''when/in the turning of.'' In context, ''when ... turns'' is idiomatic
    modern English and preserves the conditional-temporal force.'
- source_word: צַדִּיק
  chosen: a righteous man
  alternatives:
  - a righteous person
  - the righteous man
  lexicon: HALOT
  rationale: The singular masculine adjective used substantivally refers to an individual
    righteous person. Per gender-accurate policy, 'man' is retained rather than neutralizing
    to 'person.' The indefinite sense fits the proverb-like conditional statement.
- source_word: מִצִּדְקָתוֹ
  chosen: from his righteousness
  alternatives:
  - from his righteous conduct
  - from his justice
  lexicon: HALOT
  rationale: The noun צדקה here denotes the state/practice of righteousness belonging
    to the righteous man. 'Righteousness' is the most direct and consistent rendering;
    'justice' is possible in some contexts but less fitting here, where moral standing/conduct
    is in view.
- source_word: וְעָשָׂה
  chosen: and does
  alternatives:
  - and commits
  - and practices
  lexicon: HALOT
  rationale: עשה plus the object עָוֶל is a common Hebrew expression for doing/committing
    wrong. Present-tense English within the conditional clause reads naturally and
    matches the generic force.
- source_word: עָוֶל
  chosen: injustice
  alternatives:
  - wrong
  - iniquity
  - unrighteousness
  lexicon: HALOT
  rationale: עָוֶל denotes wrong, injustice, or iniquity. 'Injustice' preserves the
    ethical/judicial weight and pairs well with the contrast to 'righteousness.' 'Wrong'
    is weaker; 'iniquity' is more traditional but less accessible.
- source_word: וּמֵת
  chosen: he shall die
  alternatives:
  - and he dies
  - then he will die
  lexicon: HALOT
  rationale: The qatal here carries the result in this conditional formulation. 'He
    shall die' preserves the solemn judicial consequence and matches the style of
    the surrounding discourse.
- source_word: בָּהֶם
  chosen: because of them
  alternatives:
  - for them
  - in them
  - by them
  lexicon: HALOT
  rationale: The plural pronominal suffix most naturally refers back to the acts of
    injustice just mentioned (or the wrongful deeds collectively). English requires
    an explicit causal sense here; 'because of them' best conveys that he dies on
    account of those deeds. A more literal 'in them' is possible but less clear in
    English.
