id: EZK.33.16
reference: Ezekiel 33:16
source:
  edition: WLC
  text: כָּל חטאת/ו אֲשֶׁ֣ר חָטָ֔א לֹ֥א תִזָּכַ֖רְנָה ל֑/וֹ מִשְׁפָּ֧ט וּ/צְדָקָ֛ה
    עָשָׂ֖ה חָי֥וֹ יִֽחְיֶֽה־׃
translation:
  text: None of the sins that he committed will be remembered against him; he has
    practiced justice and righteousness; he shall surely live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not be counted against him.' The Hebrew literally says 'will not
      be remembered to him,' with a judicial sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: None of
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'With the following singular noun plus relative clause, the sense is
    distributive: not a collective ''all his sin'' but ''none of the sins'' individually
    counted against him.'
- source_word: חטאתו
  chosen: the sins
  alternatives:
  - his sin
  - his offenses
  lexicon: HALOT
  rationale: Though morphologically singular with suffix ('his sin'), in context with
    כָּל and the feminine plural verb תִזָּכַרְנָה, it functions collectively/distributively,
    best rendered in English as plural 'the sins.'
- source_word: אֲשֶׁר חָטָא
  chosen: that he committed
  alternatives:
  - which he sinned
  - that he did
  lexicon: HALOT
  rationale: Idiomatic English requires an explicit verb object construction; 'committed'
    naturally conveys prior sinful acts without awkward literalism.
- source_word: לֹא תִזָּכַרְנָה לוֹ
  chosen: will be remembered against him
  alternatives:
  - will not be remembered to him
  - will not be brought to mind for him
  - will not be counted against him
  lexicon: HALOT
  rationale: The Niphal of זכר with ל conveys being remembered with reference to someone,
    here in a judicial context. 'Remembered against him' preserves the forensic force
    better than a bare 'remembered.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In the ethical pair 'justice and righteousness,' מִשְׁפָּט refers to
    just conduct rather than a courtroom verdict. 'Justice' is the natural English
    equivalent here.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - what is right
  - justice
  lexicon: HALOT
  rationale: In this common prophetic pairing, צְדָקָה denotes uprightness/right conduct.
    'Righteousness' preserves the moral-theological weight and pairs well with 'justice.'
- source_word: עָשָׂה
  chosen: has practiced
  alternatives:
  - has done
  - has acted with
  lexicon: HALOT
  rationale: English 'has practiced justice and righteousness' communicates sustained
    ethical conduct more naturally than the wooden 'has done justice and righteousness,'
    while staying within the semantic range of עשה.
- source_word: חָיוֹ יִחְיֶה
  chosen: he shall surely live
  alternatives:
  - he will surely live
  - living he shall live
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'He shall
    surely live' preserves the emphatic certainty in elevated but still readable English.
