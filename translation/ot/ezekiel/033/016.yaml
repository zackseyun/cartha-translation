theological_decisions:
- issue: Forensic force of divine non-remembrance of sins
  chosen_reading: will be remembered against him
  alternative_readings:
  - will not be remembered to him
  - will not be counted against him
  rationale: 'The verse speaks in judicial-moral terms: former sins are no longer
    held against the repentant person. ''Remembered against him'' preserves that forensic
    nuance without importing later doctrinal formulations beyond the text.'
  doctrine_reference: Preserve theological tension rather than resolve it.
