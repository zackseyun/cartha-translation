id: EZK.33.1
reference: Ezekiel 33:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project''s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - Now ... came
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces a new narrative unit. In English, the idiomatic force is best carried by beginning with 'And' and letting 'came' express the event, rather than the more wooden 'and it happened.' 'Now' is possible as a discourse marker, but 'And' better reflects the Hebrew connective without sounding overly paraphrastic.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר־יְהוָה, 'the word' is the standard and sufficiently transparent rendering. 'Message' is possible dynamically, but 'word' preserves the formulaic and theological resonance of divine revelation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means 'to me.' 'Unto me' is archaic and less suitable for readable modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר in this formula is conventionally and accurately rendered 'saying,' introducing the divine speech that follows in the next verse. This preserves the formal prophetic style without awkwardness.
