id: EZK.33.25
reference: Ezekiel 33:25
source:
  edition: WLC
  text: לָ/כֵן֩ אֱמֹ֨ר אֲלֵי/הֶ֜ם כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה עַל הַ/דָּ֧ם תֹּאכֵ֛לוּ
    וְ/עֵינֵ/כֶ֛ם תִּשְׂא֥וּ אֶל גִּלּוּלֵי/כֶ֖ם וְ/דָ֣ם תִּשְׁפֹּ֑כוּ וְ/הָ/אָ֖רֶץ
    תִּירָֽשׁוּ־׀־׀־׃
translation:
  text: 'Therefore say to them, ‘Thus says the Lord GOD: You eat with the blood, and
    you lift up your eyes to your idols, and you shed blood. Shall you then possess
    the land?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “You eat over/with the blood,” likely referring to eating
      meat in violation of the prohibition concerning blood.
    reason: lexical_alternative
  - marker: b
    text: Or “and yet would you possess the land?” The Hebrew final clause may be
      read as an indignant rhetorical challenge.
    reason: alternative_reading
  - marker: c
    text: Hebrew גִּלּוּלִים is a contemptuous term for idols.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the conclusion from the preceding
    accusation and response.
- source_word: אֱמֹר אֲלֵיהֶם
  chosen: say to them
  alternatives:
  - tell them
  lexicon: HALOT
  rationale: Direct prophetic commission formula; 'say to them' preserves the speech-act
    wording.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - This is what the Lord GOD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. יְהוָה is rendered 'the LORD'
    per doctrine; אֲדֹנָי + YHWH is represented as 'Lord GOD' in readable English.
- source_word: יְהוִה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: עַל הַדָּם תֹּאכֵלוּ
  chosen: You eat with the blood
  alternatives:
  - You eat over the blood
  - You eat blood
  lexicon: HALOT
  rationale: The preposition עַל with 'the blood' is idiomatic and likely refers to
    eating meat with the blood still in it or in violation of the blood prohibition.
    'With the blood' is clear English that preserves the concrete imagery without
    over-interpreting.
- source_word: וְעֵינֵיכֶם תִּשְׂאוּ אֶל גִּלּוּלֵיכֶם
  chosen: and you lift up your eyes to your idols
  alternatives:
  - and you look to your idols
  - and you set your eyes on your idols
  lexicon: HALOT
  rationale: The idiom 'lift up the eyes to' can denote directed regard or devotion.
    Retaining the idiom preserves the Hebrew imagery while remaining understandable.
- source_word: גִּלּוּלֵיכֶם
  chosen: your idols
  alternatives:
  - your dung-idols
  lexicon: HALOT
  rationale: The noun is Ezekiel's contemptuous term for idols. 'Idols' is the natural
    English equivalent; the pejorative force is real but too woodenly reproduced by
    'dung-idols' in main text.
- source_word: וְדָם תִּשְׁפֹּכוּ
  chosen: and you shed blood
  alternatives:
  - and you pour out blood
  lexicon: HALOT
  rationale: Common Hebrew expression for bloodshed/violence; 'shed blood' is the
    established and accurate English idiom.
- source_word: וְהָאָרֶץ תִּירָשׁוּ
  chosen: Shall you then possess the land?
  alternatives:
  - and shall you possess the land?
  - yet you would possess the land?
  lexicon: HALOT
  rationale: 'Although formally a conjunction plus imperfect, in context it functions
    rhetorically as an indignant challenge: after these abominations, can they expect
    to inherit the land? Rendering it as a rhetorical question best captures the discourse
    force.'
