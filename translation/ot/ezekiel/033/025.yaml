theological_decisions:
- issue: Rendering the divine name in the prophetic formula
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord Jehovah
  rationale: The project default is to render YHWH as 'the LORD.' In combination with
    אֲדֹנָי, English convention 'Lord GOD' avoids 'Lord LORD' while preserving the
    title-name pairing.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the final clause וְהָאָרֶץ תִּירָשׁוּ
  chosen_reading: rhetorical question ('Shall you then possess the land?')
  alternative_readings:
  - declarative statement ('and you possess the land')
  rationale: The immediate context is a rebuke exposing the contradiction between
    their sinful practices and their claim to the land. The rhetorical question makes
    explicit the implied divine rejection without adding new content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense in
    readable modern English'
