id: EZK.33.33
reference: Ezekiel 33:33
source:
  edition: WLC
  text: וּ/בְ/בֹאָ֑/הּ הִנֵּ֣ה בָאָ֔ה וְ/יָ֣דְע֔וּ כִּ֥י נָבִ֖יא הָיָ֥ה בְ/תוֹכָֽ/ם׃ס
translation:
  text: When it comes—and look, it is coming—then they will know that a prophet has
    been among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'When she comes—and look, she has come/is coming.' The
      Hebrew uses feminine forms, likely referring to the foretold event or message
      coming to pass.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְבֹאָהּ
  chosen: When it comes
  alternatives:
  - And when it comes
  - When she comes
  - When it happens
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus 3fs suffix gives a temporal
    sense, 'when it comes.' The feminine suffix most naturally refers back to the
    foretold event/judgment implied by the context rather than a female personal referent,
    so idiomatic English uses 'it.'
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - indeed
  - surely
  lexicon: HALOT
  rationale: הִנֵּה is a deictic/interjection drawing attention. 'Look' preserves
    the immediacy in readable modern English better than archaic 'behold.'
- source_word: בָאָה
  chosen: it is coming
  alternatives:
  - it comes
  - it has come
  - she is coming
  lexicon: HALOT
  rationale: 'The qatal after הִנֵּה can function with present/imminent force in context:
    ''look, it is coming.'' This preserves the prophetic vividness and explains the
    sequence with the prior temporal clause.'
- source_word: וְיָדְעוּ
  chosen: then they will know
  alternatives:
  - and they will know
  - they shall know
  lexicon: HALOT
  rationale: 'The conjunction here is rendered inferentially in English as ''then''
    to reflect the sequence: once the announced event arrives, recognition follows.
    Future sense fits the prophetic context.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the content of what they will know: ''that a prophet has
    been among them.'''
- source_word: נָבִיא
  chosen: a prophet
  alternatives:
  - prophet
  lexicon: HALOT
  rationale: 'Anarthrous noun is naturally indefinite in English here: they will recognize
    Ezekiel''s status as ''a prophet.'''
- source_word: הָיָה
  chosen: has been
  alternatives:
  - was
  - had been
  lexicon: HALOT
  rationale: 'English present perfect best conveys the completed reality with present
    relevance: after fulfillment, they will know that a prophet has been in their
    midst.'
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  - in the midst of them
  lexicon: HALOT
  rationale: '''Among them'' is natural modern English and preserves the sense of
    presence within the community.'
