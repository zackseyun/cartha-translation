theological_decisions:
- issue: Referent of the feminine suffix and verb ('it/she')
  chosen_reading: The feminine forms refer to the foretold message/event of judgment
    coming to pass, rendered impersonally as 'it.'
  alternative_readings:
  - The feminine could be rendered more literally as 'she,' leaving the referent implicit.
  rationale: The verse points to the fulfillment of Ezekiel's prophetic word; English
    normally uses 'it' for such an event. This avoids obscurity without adding doctrinal
    content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
