theological_decisions:
- issue: Rendering the divine name in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default renders יְהוָה as 'the LORD.' In combination with
    אֲדֹנָי, English convention uses 'Lord GOD' to represent both title and divine
    name without producing 'Lord LORD.' This is a translation-policy decision, not
    a theological reinterpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
