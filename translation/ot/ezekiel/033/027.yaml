id: EZK.33.27
reference: Ezekiel 33:27
source:
  edition: WLC
  text: כֹּֽה תֹאמַ֨ר אֲלֵ/הֶ֜ם כֹּה אָמַ֨ר אֲדֹנָ֣/י יְהוִה֮ חַי אָנִי֒ אִם לֹ֞א
    אֲשֶׁ֤ר בֶּֽ/חֳרָבוֹת֙ בַּ/חֶ֣רֶב יִפֹּ֔לוּ וַֽ/אֲשֶׁר֙ עַל פְּנֵ֣י הַ/שָּׂדֶ֔ה
    לַ/חַיָּ֥ה נְתַתִּ֖י/ו לְ/אָכְל֑/וֹ וַ/אֲשֶׁ֛ר בַּ/מְּצָד֥וֹת וּ/בַ/מְּעָר֖וֹת
    בַּ/דֶּ֥בֶר יָמֽוּתוּ־־־־־׃
translation:
  text: 'Thus you shall say to them, ‘Thus says the Lord GOD: As I live, surely those
    who are in the ruins will fall by the sword, and whoever is on the open field
    I have given to the wild animals to be devoured, and those who are in the strongholds
    and in the caves will die by pestilence.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'waste places' or 'desolate places'; rendered 'ruins' for clear modern
      English in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have given him for food to the wild animals.' The Hebrew uses a singular
      suffix, likely with distributive force.
    reason: lexical_alternative
  - marker: c
    text: Or 'plague.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה תֹאמַר ... כֹּה אָמַר
  chosen: Thus you shall say ... Thus says
  alternatives:
  - This is what you shall say ... This is what ... says
  - So you shall say ... So says
  lexicon: HALOT
  rationale: Retains the prophetic messenger formula with natural modern English.
    'Thus says' preserves the formal prophetic cadence better than the more expanded
    'This is what ... says.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Follows the project's default for יְהוָה as 'the LORD.' In the compound
    title אֲדֹנָי יְהוִה, rendering as 'the Lord GOD' avoids the awkward 'Lord LORD'
    while preserving both elements of the Hebrew title in standard English Bible style.
- source_word: חַי אָנִי
  chosen: As I live
  alternatives:
  - By my life
  - As surely as I live
  lexicon: HALOT
  rationale: This is the standard oath formula. 'As I live' is concise and idiomatic;
    the following אִם לֹא supplies the emphatic force carried in English by 'surely.'
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - certainly
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration
    rather than a literal conditional 'if not.' 'Surely' best conveys the force in
    readable English.
- source_word: אֲשֶׁר בֶּחֳרָבוֹת
  chosen: those who are in the ruins
  alternatives:
  - those in the waste places
  - those in the desolate places
  lexicon: HALOT
  rationale: חֳרָבוֹת refers to ruined/desolated places. 'Ruins' is concrete, natural
    English and fits the post-judgment setting.
- source_word: בַּחֶרֶב יִפֹּלוּ
  chosen: will fall by the sword
  alternatives:
  - will be struck down by the sword
  - will die by the sword
  lexicon: HALOT
  rationale: '''Fall by the sword'' preserves the idiomatic biblical expression while
    remaining clear to modern readers.'
- source_word: אֲשֶׁר עַל פְּנֵי הַשָּׂדֶה
  chosen: whoever is on the open field
  alternatives:
  - whoever is in the field
  - those on the surface of the field
  lexicon: HALOT
  rationale: עַל־פְּנֵי with שָׂדֶה suggests exposure in the open country. 'Open field'
    brings out the sense of being exposed, not sheltered.
- source_word: לַחַיָּה
  chosen: to the wild animals
  alternatives:
  - to the beasts
  - to the wild beasts
  lexicon: HALOT
  rationale: חַיָּה here refers to wild animals as agents of judgment. 'Wild animals'
    is clearer for modern readers than 'beasts' while preserving the sense.
- source_word: נְתַתִּיו לְאָכְלוֹ
  chosen: I have given to be devoured
  alternatives:
  - I have given him for food
  - I have given over to be eaten
  lexicon: HALOT
  rationale: 'The singular pronominal suffix likely has a collective/distributive
    force with the relative clause. English smooths this naturally by expressing the
    result: ''given to be devoured.'''
- source_word: בַּמְּצָדוֹת
  chosen: in the strongholds
  alternatives:
  - in the fortresses
  - in the mountain strongholds
  lexicon: HALOT
  rationale: מְצָדוֹת denotes strongholds or fortified refuges. 'Strongholds' is broad
    enough to include defensive hideouts without over-specifying architecture.
- source_word: וּבַמְּעָרוֹת
  chosen: and in the caves
  alternatives:
  - and in the caverns
  lexicon: HALOT
  rationale: Straightforward rendering of מְעָרוֹת; 'caves' is the most natural modern
    equivalent.
- source_word: בַּדֶּבֶר יָמוּתוּ
  chosen: will die by pestilence
  alternatives:
  - will die of plague
  - will die by disease
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence/plague as a covenantal judgment term.
    'Pestilence' preserves the biblical register and breadth better than the narrower
    'disease.'
