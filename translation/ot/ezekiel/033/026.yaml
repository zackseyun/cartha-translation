theological_decisions:
- issue: Force of the final clause
  chosen_reading: 'Rendered as a rhetorical question: ''Shall you then possess the
    land?'''
  alternative_readings:
  - 'Rendered as a statement: ''and you will possess the land'''
  rationale: In the broader context, the prophet rebukes those claiming entitlement
    to the land despite violence and impurity. The interrogative sense best captures
    the prophetic challenge and is widely reflected in translation tradition, even
    though the Hebrew form itself is not explicitly marked by an interrogative particle.
  doctrine_reference: Translation philosophy §1, §3
- issue: Gendered distributive language
  chosen_reading: '''each of you ... his neighbor’s wife'''
  alternative_readings:
  - '''each man ... his neighbor’s wife'''
  rationale: The Hebrew uses איש with distributive masculine force. Because the audience
    here is specifically the accused group and the offense named is adultery with
    another man's wife, preserving masculine reference is more accurate than neutralizing
    it. 'Each of you' keeps the plural address readable, while 'his neighbor’s wife'
    preserves the masculine singular distributive element.
  doctrine_reference: Translation philosophy §4
