id: EZK.33.26
reference: Ezekiel 33:26
source:
  edition: WLC
  text: עֲמַדְתֶּ֤ם עַֽל חַרְבְּ/כֶם֙ עֲשִׂיתֶ֣ן תּוֹעֵבָ֔ה וְ/אִ֛ישׁ אֶת אֵ֥שֶׁת
    רֵעֵ֖/הוּ טִמֵּאתֶ֑ם וְ/הָ/אָ֖רֶץ תִּירָֽשׁוּ־־׃ס
translation:
  text: You rely on your sword, you commit abominations, and each of you defiles his
    neighbor’s wife. Shall you then possess the land?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'You stand on your sword.' The expression likely means relying
      on violence or armed power.
    reason: lexical_alternative
  - marker: b
    text: Or 'Will you inherit the land?'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמַדְתֶּם עַל חַרְבְּכֶם
  chosen: You rely on your sword
  alternatives:
  - You stand on your sword
  - You take your stand on your sword
  lexicon: HALOT
  rationale: The idiom literally reads 'you stand upon your sword,' but in context
    it denotes dependence on violent power rather than mere physical posture. 'Rely
    on your sword' preserves the metaphor's force in natural English and fits the
    accusation of violent self-assertion.
- source_word: חַרְבְּכֶם
  chosen: your sword
  alternatives:
  - your weapon
  lexicon: HALOT
  rationale: חרב is specifically 'sword,' not a generic weapon. Retaining 'sword'
    preserves the concrete imagery and likely allusion to violence.
- source_word: עֲשִׂיתֶן תּוֹעֵבָה
  chosen: you commit abominations
  alternatives:
  - you do an abomination
  - you practice detestable things
  lexicon: HALOT
  rationale: תועבה often denotes something detestable or abominable, especially in
    moral and cultic contexts. The plural English 'abominations' best conveys repeated
    or characteristic acts, even though the Hebrew noun is singular collective.
- source_word: וְאִישׁ
  chosen: and each of you
  alternatives:
  - and a man
  - and each man
  lexicon: HALOT
  rationale: 'איש here has distributive force in context: ''each man'' among the addressed
    group. ''Each of you'' communicates that distributive sense naturally in English
    while matching the second-person plural frame.'
- source_word: אֵשֶׁת רֵעֵהוּ
  chosen: his neighbor’s wife
  alternatives:
  - the wife of his companion
  lexicon: HALOT
  rationale: רֵעַ commonly means neighbor, companion, or fellow. 'Neighbor' is idiomatic
    and preserves the interpersonal and covenantal-social dimension of the offense.
- source_word: טִמֵּאתֶם
  chosen: defiles
  alternatives:
  - makes unclean
  - pollutes
  lexicon: HALOT
  rationale: The Piel of טמא means to make unclean/defile. 'Defiles' is concise, morally
    weighty, and idiomatic in the context of sexual violation.
- source_word: וְהָאָרֶץ תִּירָשׁוּ
  chosen: Shall you then possess the land?
  alternatives:
  - And shall you possess the land?
  - Will you inherit the land?
  lexicon: HALOT
  rationale: The clause is best read as an indignant rhetorical question in context,
    matching the surrounding rebuke. ירש can mean possess or inherit; 'possess' fits
    the immediate claim to occupancy, while 'land' preserves the covenantal territorial
    sense.
