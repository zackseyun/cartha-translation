id: EZK.33.11
reference: Ezekiel 33:11
source:
  edition: WLC
  text: אֱמֹ֨ר אֲלֵי/הֶ֜ם חַי אָ֣נִי נְאֻ֣ם אֲדֹנָ֣/י יְהוִ֗ה אִם אֶחְפֹּץ֙ בְּ/מ֣וֹת
    הָ/רָשָׁ֔ע כִּ֣י אִם בְּ/שׁ֥וּב רָשָׁ֛ע מִ/דַּרְכּ֖/וֹ וְ/חָיָ֑ה שׁ֣וּבוּ שׁ֜וּבוּ
    מִ/דַּרְכֵי/כֶ֧ם הָ/רָעִ֛ים וְ/לָ֥/מָּה תָמ֖וּתוּ בֵּ֥ית יִשְׂרָאֵֽל־׀׀־־׃פ
translation:
  text: Say to them, ‘As I live,’ declares the Lord GOD, ‘I take no pleasure in the
    death of the wicked, but rather that the wicked turn from his way and live. Turn
    back, turn back from your evil ways! Why will you die, O house of Israel?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I do not delight in the death of the wicked.' The Hebrew verb can denote
      pleasure, delight, or desire.
    reason: lexical_alternative
  - marker: b
    text: The repeated command 'Turn back, turn back' is emphatic; the Hebrew verb
      is the same one used earlier for the wicked person 'turning' from his way.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֣נִי
  chosen: As I live
  alternatives:
  - As surely as I live
  - By my life
  lexicon: HALOT
  rationale: Idiomatic oath formula introducing a solemn divine declaration. 'As I
    live' preserves the compact force of the Hebrew while remaining natural English.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula well rendered 'declares.' Per
    doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'Lord GOD' is
    the standard way to avoid 'Lord LORD' while preserving both titles.
- source_word: אִם אֶחְפֹּץ בְּמוֹת הָרָשָׁע
  chosen: I take no pleasure in the death of the wicked
  alternatives:
  - I do not delight in the death of the wicked
  - I have no desire for the death of the wicked
  lexicon: HALOT
  rationale: In this oath context, אִם introduces a negated assertion ('surely not
    / not that'). חפץ conveys delight, pleasure, or desire. 'Take no pleasure' is
    clear modern English and preserves the affective sense without overstating it.
- source_word: כִּי אִם
  chosen: but rather that
  alternatives:
  - but instead that
  - except that
  lexicon: HALOT
  rationale: 'The pair marks contrast: not X, but Y. ''But rather that'' captures
    the adversative force and smoothly introduces the content of God''s desire.'
- source_word: בְּשׁוּב רָשָׁע מִדַּרְכּוֹ
  chosen: that the wicked turn from his way
  alternatives:
  - that a wicked man turn from his way
  - that the wicked person turn from his path
  lexicon: HALOT
  rationale: שׁוּב is the key verb 'turn/return.' The singular רָשָׁע is representative/generic;
    'the wicked' in English can carry that force naturally. 'Way' preserves the metaphor
    of conduct.
- source_word: וְחָיָה
  chosen: and live
  alternatives:
  - and so live
  - and he may live
  lexicon: HALOT
  rationale: Simple continuation of result/purpose after turning. 'And live' is concise
    and faithful; adding 'so' would be interpretive.
- source_word: שׁוּבוּ שׁוּבוּ
  chosen: Turn back, turn back
  alternatives:
  - Turn, turn
  - Repent, repent
  lexicon: HALOT
  rationale: The doubled imperative is emphatic. 'Turn back' preserves the verbal
    link with earlier שׁוּב and avoids importing the fuller theological term 'repent'
    where the Hebrew image is specifically turning.
- source_word: מִדַּרְכֵיכֶם הָרָעִים
  chosen: from your evil ways
  alternatives:
  - from your wicked ways
  - from your bad ways
  lexicon: HALOT
  rationale: Common prophetic idiom for sinful conduct. 'Evil ways' is idiomatic and
    retains moral weight.
- source_word: וְלָמָּה תָמ֖וּתוּ
  chosen: Why will you die
  alternatives:
  - Why should you die
  - Why do you insist on dying
  lexicon: HALOT
  rationale: Imperfect can be rendered futurally in this exhortative context. 'Will
    you die' preserves the direct rhetorical appeal without adding interpretive nuance.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  - people of Israel
  lexicon: HALOT
  rationale: Vocative address to the covenant people. Retaining 'house' preserves
    the prophetic idiom and corporate sense better than flattening to 'people'.
