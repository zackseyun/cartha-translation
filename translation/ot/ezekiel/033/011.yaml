theological_decisions:
- issue: Divine disposition toward the wicked's death
  chosen_reading: Render the statement as God's lack of pleasure in the wicked's death,
    contrasted with his desire that the wicked turn and live, without resolving broader
    debates about divine will or predestination.
  alternative_readings:
  - Render חפץ more strongly as 'desire'
  - Infer a systematic distinction between God's revealed will and secret will
  rationale: The verse plainly states God's disposition in prophetic appeal. The translation
    should preserve that tension and not import later theological systems beyond the
    Hebrew wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic singular רָשָׁע
  chosen_reading: Use 'the wicked' with singular pronoun 'his' in the first instance,
    then address the plural audience directly.
  alternative_readings:
  - a wicked man ... his way
  - the wicked person ... their way
  rationale: The Hebrew moves from representative singular to direct plural exhortation.
    This rendering preserves the source pattern and follows the project's gender-accurate
    policy rather than flattening to gender-neutral phrasing.
  doctrine_reference: Gender-accurate over gender-neutral.
