id: EZK.33.19
reference: Ezekiel 33:19
source:
  edition: WLC
  text: וּ/בְ/שׁ֤וּב רָשָׁע֙ מֵֽ/רִשְׁעָת֔/וֹ וְ/עָשָׂ֥ה מִשְׁפָּ֖ט וּ/צְדָקָ֑ה עֲלֵי/הֶ֖ם
    ה֥וּא יִֽחְיֶֽה׃
translation:
  text: And when a wicked man turns from his wickedness and does justice and righteousness,
    by them he shall live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of them' or 'upon them'; the Hebrew phrase refers back to 'justice
      and righteousness' as the basis on which he lives.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/שׁוּב
  chosen: And when ... turns
  alternatives:
  - But when ... turns
  - and in turning
  lexicon: HALOT
  rationale: The conjunction plus preposition with infinitive construct introduces
    a temporal clause. 'And when' is natural English and preserves the sequence from
    the Hebrew without over-literal awkwardness.
- source_word: רָשָׁע
  chosen: a wicked man
  alternatives:
  - the wicked man
  - a wicked person
  lexicon: HALOT
  rationale: The singular adjective functions substantivally. 'A wicked man' preserves
    the masculine singular form in line with the gender-accurate policy and matches
    the representative singular usage in this legal-prophetic context.
- source_word: מֵרִשְׁעָתוֹ
  chosen: from his wickedness
  alternatives:
  - from his wrongdoing
  - from his guilt
  lexicon: HALOT
  rationale: The noun denotes wickedness or criminality. 'Wickedness' keeps the lexical
    connection with רָשָׁע ('wicked') and preserves the moral force of the Hebrew.
- source_word: וְעָשָׂה
  chosen: and does
  alternatives:
  - and practices
  - and acts with
  lexicon: HALOT
  rationale: עשה is broad ('do, make'). Here 'does' is idiomatic with the following
    objects and keeps the concrete ethical emphasis.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: In this ethical pairing with צדקה, the sense is not courtroom 'judgment'
    but just conduct. 'Justice' is the clearest modern equivalent.
- source_word: וּצְדָקָה
  chosen: and righteousness
  alternatives:
  - and what is right
  - and rightness
  lexicon: HALOT
  rationale: The common ethical-religious term is best rendered 'righteousness.' In
    this collocation with משפט, it denotes upright conduct alongside justice.
- source_word: עֲלֵיהֶם
  chosen: by them
  alternatives:
  - because of them
  - upon them
  - through them
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix here points back to the just
    and righteous deeds as the basis on which life is granted. 'By them' is concise
    and reflects the instrumental/basis sense in context.
- source_word: הוּא יִחְיֶה
  chosen: he shall live
  alternatives:
  - he will live
  - he shall remain alive
  lexicon: HALOT
  rationale: 'The pronoun adds emphasis: ''he himself/he.'' English need not reproduce
    the emphasis separately here. ''He shall live'' fits the prophetic-legal register
    and expresses the result promised.'
