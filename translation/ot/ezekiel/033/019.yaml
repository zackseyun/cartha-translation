theological_decisions:
- issue: Relationship between repentance, ethical action, and life
  chosen_reading: The verse states that when the wicked man turns from wickedness
    and practices justice and righteousness, he shall live by these deeds.
  alternative_readings:
  - A more interpretive rendering could make the life explicitly contingent on repentance
    alone or on covenant faithfulness more broadly.
  rationale: The translation preserves the text's own formulation without importing
    later doctrinal systems. It keeps the ethical terms and the instrumental phrase
    'by them' so the theological tension remains as stated in the Hebrew.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
