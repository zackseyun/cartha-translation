theological_decisions:
- issue: Connotation of גְּאוֹן in a judgment context
  chosen_reading: negative 'pride' rather than neutral 'majesty'
  alternative_readings:
  - majesty
  rationale: The oracle announces judgment on the land and the end of what the people
    boast in. Rendering the term as 'pride' preserves the moral and rhetorical force
    of the passage without importing extra doctrine.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
