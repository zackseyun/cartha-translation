id: EZK.33.28
reference: Ezekiel 33:28
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י אֶת הָ/אָ֨רֶץ֙ שְׁמָמָ֣ה וּ/מְשַׁמָּ֔ה וְ/נִשְׁבַּ֖ת גְּא֣וֹן
    עֻזָּ֑/הּ וְ/שָֽׁמְמ֛וּ הָרֵ֥י יִשְׂרָאֵ֖ל מֵ/אֵ֥ין עוֹבֵֽר־׃
translation:
  text: And I will make the land a desolation and a waste, and the pride of its strength
    will cease, and the mountains of Israel will be desolate, with no one passing
    through.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an astonishment' for 'a waste'; the Hebrew term can carry the sense
      of something so ruined that it causes horror or astonishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the majesty of its strength.' The Hebrew phrase can be read more neutrally,
      but in this judgment context 'the pride of its strength' best fits.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will make
  alternatives:
  - I will set
  - I will give
  lexicon: HALOT
  rationale: Though the verb is literally 'give/set,' in this construction with the
    object 'the land' plus predicates of ruin, idiomatic English is 'make.' This preserves
    the causative force without wooden wording.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the land of Israel/Judah in covenant-judgment
    context, not the whole earth. 'Land' is the most natural and contextually precise
    rendering.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - a horror
  lexicon: HALOT
  rationale: The noun denotes a state of devastation/desolation. Rendering it as a
    noun preserves the Hebrew pairing of two near-synonymous nouns.
- source_word: וּמְשַׁמָּה
  chosen: and a waste
  alternatives:
  - and an astonishment
  - and a horror
  - and a desolation
  lexicon: HALOT
  rationale: This term overlaps with שְׁמָמָה but is not identical. 'Waste' keeps
    the parallelism while avoiding an awkward exact repetition in English. An alternative
    nuance such as 'astonishment' is possible in some contexts, but here the emphasis
    is on ruin.
- source_word: וְנִשְׁבַּת
  chosen: will cease
  alternatives:
  - will be brought to an end
  - will be cut off
  lexicon: HALOT
  rationale: From שבת in the Niphal/Qal passive-like sense, the idea is cessation.
    'Will cease' is concise and natural.
- source_word: גְּאוֹן
  chosen: the pride
  alternatives:
  - the majesty
  - the arrogance
  lexicon: HALOT
  rationale: The noun can denote exaltation, pride, or majesty. In a judgment oracle
    against false confidence, 'pride' best captures the negative sense.
- source_word: עֻזָּהּ
  chosen: of its strength
  alternatives:
  - of its might
  - of its stronghold
  lexicon: HALOT
  rationale: The suffix refers back to the land. The phrase גאון עזהּ is well rendered
    'the pride of its strength/might.' 'Strength' is straightforward modern English.
- source_word: וְשָׁמְמוּ
  chosen: will be desolate
  alternatives:
  - will be laid waste
  - will be appalled
  lexicon: HALOT
  rationale: In context of devastated geography, 'will be desolate' fits better than
    the experiential sense 'be appalled.'
- source_word: הָרֵי יִשְׂרָאֵל
  chosen: the mountains of Israel
  alternatives:
  - Israel's mountains
  lexicon: HALOT
  rationale: This is a recurring Ezekiel expression and should be kept fairly literal
    for consistency and thematic resonance.
- source_word: מֵאֵין עוֹבֵר
  chosen: with no one passing through
  alternatives:
  - so that no one passes through
  - because there is no passerby
  lexicon: HALOT
  rationale: The phrase expresses depopulation and abandonment. 'With no one passing
    through' is idiomatic and preserves the resultative sense without overinterpreting
    the syntax.
