theological_decisions:
- issue: Divine accountability for the watchman's failure
  chosen_reading: The verse teaches that the wicked dies for his own iniquity, while
    the watchman is also held accountable for failing to warn him.
  alternative_readings:
  - The watchman bears the wicked person's guilt in place of the wicked
  - The phrase is merely rhetorical and implies no real accountability
  rationale: 'The Hebrew maintains both truths in tension: ''he shall die in his iniquity''
    and ''his blood I will require from your hand.'' The translation preserves both
    clauses without collapsing one into the other.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
