id: EZK.33.8
reference: Ezekiel 33:8
source:
  edition: WLC
  text: בְּ/אָמְרִ֣/י לָ/רָשָׁ֗ע רָשָׁע֙ מ֣וֹת תָּמ֔וּת וְ/לֹ֣א דִבַּ֔רְתָּ לְ/הַזְהִ֥יר
    רָשָׁ֖ע מִ/דַּרְכּ֑/וֹ ה֤וּא רָשָׁע֙ בַּ/עֲוֺנ֣/וֹ יָמ֔וּת וְ/דָמ֖/וֹ מִ/יָּדְ/ךָ֥
    אֲבַקֵּֽשׁ׃
translation:
  text: When I say to the wicked, ‘Wicked one, you shall surely die,’ and you do not
    speak to warn the wicked from his way, that wicked man shall die in his iniquity,
    but I will require his blood from your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will hold you accountable for his blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָמְרִי
  chosen: When I say
  alternatives:
  - In my saying
  - When I speak
  lexicon: HALOT
  rationale: The preposition ב with infinitive/construct-like verbal form introduces
    a temporal clause here. 'When I say' is natural English and preserves the conditional-temporal
    force.
- source_word: לָרָשָׁע
  chosen: to the wicked
  alternatives:
  - to the wicked man
  - to the guilty
  lexicon: HALOT
  rationale: רָשָׁע denotes a wicked person, not merely someone legally guilty in
    this context. 'The wicked' keeps the moral category prominent.
- source_word: רָשָׁע
  chosen: Wicked one
  alternatives:
  - wicked man
  - you wicked one
  lexicon: HALOT
  rationale: Used vocatively. 'Wicked one' preserves the direct address and rhetorical
    force without over-specifying gender in the vocative.
- source_word: מוֹת תָּמוּת
  chosen: you shall surely die
  alternatives:
  - you will certainly die
  - dying you shall die
  lexicon: HALOT
  rationale: Infinitive absolute + imperfect intensifies certainty. 'You shall surely
    die' is a standard, accurate English rendering that preserves solemnity.
- source_word: וְלֹא דִבַּרְתָּ
  chosen: and you do not speak
  alternatives:
  - and you have not spoken
  - but you do not speak
  lexicon: HALOT
  rationale: The perfect in this conditional setting is well represented by English
    present 'do not speak' after 'When I say,' yielding a natural warning scenario.
    The conjunction is kept as 'and' rather than interpretive 'but' at this point.
- source_word: לְהַזְהִיר
  chosen: to warn
  alternatives:
  - to admonish
  - to give warning to
  lexicon: HALOT
  rationale: The Hiphil of זהר here means to warn or give warning. 'Warn' is concise
    and idiomatic.
- source_word: מִדַּרְכּוֹ
  chosen: from his way
  alternatives:
  - about his way
  - from his path
  lexicon: HALOT
  rationale: The preposition מִן after 'warn' naturally conveys warning someone away
    from a course of conduct. 'Way' preserves the common biblical metaphor for manner
    of life.
- source_word: הוּא רָשָׁע
  chosen: that wicked man
  alternatives:
  - he, the wicked one
  - that wicked one
  lexicon: HALOT
  rationale: The pronoun plus noun is emphatic. 'That wicked man' brings out the resumptive
    emphasis in idiomatic English and matches the masculine singular reference.
- source_word: בַּעֲוֺנוֹ
  chosen: in his iniquity
  alternatives:
  - for his iniquity
  - in his guilt
  - because of his sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity/guilt. 'In his iniquity' preserves the Hebrew
    wording and moral weight without flattening it to a generic 'sin.'
- source_word: וְדָמוֹ
  chosen: his blood
  alternatives:
  - his lifeblood
  - bloodguilt for him
  lexicon: HALOT
  rationale: The idiom concerns accountability for the man's death. 'His blood' is
    the standard biblical expression and should be retained in the main text.
- source_word: מִיָּדְךָ אֲבַקֵּשׁ
  chosen: I will require his blood from your hand
  alternatives:
  - I will demand his blood from your hand
  - I will hold you accountable for his blood
  lexicon: HALOT
  rationale: This is a stock idiom of divine accountability. 'Require ... from your
    hand' preserves the forensic-biblical imagery; a more interpretive alternative
    is preserved in a footnote.
