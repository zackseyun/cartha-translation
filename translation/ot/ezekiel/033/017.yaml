theological_decisions:
- issue: Moral evaluation of God's 'way'
  chosen_reading: Translate יִתָּכֵן as 'is not just' in both clauses
  alternative_readings:
  - is not right
  - is not fair
  rationale: The context centers on divine justice and human accountability (cf. the
    repeated argument in Ezekiel 18 and 33). 'Just' best preserves the theological
    charge of the accusation without importing extra doctrinal explanation.
  doctrine_reference: Translation philosophy §§1, 3, 5
