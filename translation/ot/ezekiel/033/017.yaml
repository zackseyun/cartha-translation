id: EZK.33.17
reference: Ezekiel 33:17
source:
  edition: WLC
  text: וְ/אָמְרוּ֙ בְּנֵ֣י עַמְּ/ךָ֔ לֹ֥א יִתָּכֵ֖ן דֶּ֣רֶךְ אֲדֹנָ֑/י וְ/הֵ֖מָּה
    דַּרְכָּ֥/ם לֹֽא יִתָּכֵֽן־׃
translation:
  text: Yet the sons of your people say, ‘The way of the Lord is not just,’ though
    it is their own way that is not just.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is not right' or 'is not fair' in both occurrences of 'is not just.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: Yet ... say
  alternatives:
  - And ... say
  - But ... say
  lexicon: HALOT
  rationale: The conjunction plus qatal continues the discourse with mild contrast
    to the preceding divine explanation. 'Yet' captures the adversative force in context
    better than a simple 'and,' while keeping the speech report natural in English.
- source_word: בְּנֵי עַמְּךָ
  chosen: the sons of your people
  alternatives:
  - your people
  - the children of your people
  lexicon: HALOT
  rationale: Formally, the Hebrew says 'sons of your people.' Following the gender-accurate
    principle, this is retained rather than flattened to 'your people,' while still
    functioning idiomatically for the members of the people as a whole.
- source_word: לֹא יִתָּכֵן
  chosen: is not just
  alternatives:
  - is not right
  - is not fair
  - is not measured rightly
  lexicon: HALOT
  rationale: The Niphal of תכן here conveys being right, proper, or just. 'Is not
    just' fits the forensic/moral context of Ezekiel 33, where the people accuse the
    Lord's way of injustice. 'Fair' is possible but can sound colloquial and weaker;
    'right' is broader but less pointed.
- source_word: דֶּרֶךְ אֲדֹנָי
  chosen: the way of the Lord
  alternatives:
  - the Lord's way
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'The way of the
    Lord' preserves the Hebrew order and echoes the repeated wording in the surrounding
    passage.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: Rendered 'the Lord' in keeping with standard English treatment of the
    divine title אֲדֹנָי. This verse uses אֲדֹנָי, not the Tetragrammaton, so the
    contested-term rule for YHWH does not apply directly.
- source_word: וְהֵמָּה
  chosen: though it is they
  alternatives:
  - but they
  - while they
  lexicon: HALOT
  rationale: 'The pronoun is emphatic and contrastive. English brings out the emphasis
    by making the contrast explicit: the accusation rebounds on them.'
- source_word: דַּרְכָּם
  chosen: their own way
  alternatives:
  - their way
  lexicon: HALOT
  rationale: Adding 'own' reflects the emphatic contrast introduced by וְהֵמָּה and
    clarifies that the fault lies with them, not with the Lord.
- source_word: לֹא יִתָּכֵן
  chosen: is not just
  alternatives:
  - is not right
  - is not fair
  lexicon: HALOT
  rationale: 'Repeated with the same English gloss for consistency within the verse
    and to preserve the rhetorical reversal: what they allege about the Lord actually
    applies to themselves.'
