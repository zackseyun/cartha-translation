id: EZK.33.23
reference: Ezekiel 33:23
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהֹוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential introduction. In this formulaic prophetic expression, idiomatic English is best achieved by folding the existential verb into the clause 'the word ... came' rather than preserving a wooden 'and it happened.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the construct phrase דְבַר יְהוָה, 'word' is the standard and sufficiently transparent rendering for prophetic revelation. 'Message' is possible but less formally tied to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means 'to me.' 'Unto me' is archaic and less suitable for readable modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. Since the next verse supplies the content, 'saying' preserves the formal linkage without over-interpretation.
