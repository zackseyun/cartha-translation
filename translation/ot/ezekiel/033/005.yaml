id: EZK.33.5
reference: Ezekiel 33:5
source:
  edition: WLC
  text: אֵת֩ ק֨וֹל הַ/שּׁוֹפָ֤ר שָׁמַע֙ וְ/לֹ֣א נִזְהָ֔ר דָּמ֖/וֹ בּ֣/וֹ יִֽהְיֶ֑ה
    וְ/ה֥וּא נִזְהָ֖ר נַפְשׁ֥/וֹ מִלֵּֽט׃
translation:
  text: He heard the sound of the trumpet and did not take warning; his blood will
    be on himself. But if he takes warning, he will save his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his blood will be upon him'—a Hebrew idiom meaning he bears responsibility
      for his own death.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he will deliver his soul/self.' Here 'life' fits the context of escaping
      death.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל הַשּׁוֹפָר
  chosen: the sound of the trumpet
  alternatives:
  - the trumpet sound
  - the sound of the ram's horn
  lexicon: HALOT
  rationale: קוֹל is 'sound/voice,' and שׁוֹפָר denotes a horn used as a warning instrument.
    'Trumpet' is idiomatic modern English and fits the watchman context; 'sound of
    the trumpet' preserves the Hebrew construction.
- source_word: שָׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb here denotes auditory reception of the warning signal. 'Heard'
    is the plain and sufficient rendering in context.
- source_word: נִזְהָר
  chosen: take warning
  alternatives:
  - be warned
  - heed the warning
  lexicon: HALOT
  rationale: The Niphal of זהר in this context means to be warned or to take warning.
    'Take warning' works well in both occurrences in the verse and preserves the person's
    responsibility to respond.
- source_word: דָּמוֹ בּוֹ יִהְיֶה
  chosen: his blood will be on himself
  alternatives:
  - his blood will be upon him
  - he will bear responsibility for his own blood
  lexicon: HALOT
  rationale: This idiom assigns responsibility for one's death to oneself. 'His blood
    will be on himself' is clear modern English while preserving the metaphor and
    legal-moral force of the Hebrew.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean life, self, or soul depending on context. Here the issue
    is physical preservation from impending death, so 'his life' best matches the
    sense.
- source_word: מִלֵּט
  chosen: will save
  alternatives:
  - will deliver
  - will escape with
  lexicon: HALOT
  rationale: The Piel conveys causing escape or deliverance. In English, 'will save
    his life' is natural and accurately expresses successful preservation.
- source_word: וְהוּא
  chosen: But if he
  alternatives:
  - and he
  - but he
  lexicon: HALOT
  rationale: Though literally 'and he,' the clause is contrastive with the previous
    statement. Rendering with 'But if he' makes the implied conditional contrast explicit
    in natural English without adding foreign meaning, since the participle-like construction
    contrasts the warned responder with the non-responder.
