theological_decisions:
- issue: Responsibility formula in judgment language
  chosen_reading: his blood will be on himself
  alternative_readings:
  - his blood will be upon him
  - he alone is responsible for his death
  rationale: The Hebrew idiom expresses personal accountability for refusing a warning.
    The translation preserves the idiom rather than reducing it to an interpretive
    paraphrase, maintaining the text's moral and judicial force.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
