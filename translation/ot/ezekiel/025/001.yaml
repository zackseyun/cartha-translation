- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the doctrine's
    contested-terms table, the default rendering is 'the LORD' rather than a transliteration.
    This preserves consistency with the project's stated practice and with longstanding
    English Bible convention.
