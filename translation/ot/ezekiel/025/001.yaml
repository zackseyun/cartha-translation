id: EZK.25.1
reference: Ezekiel 25:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - Now ... came
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next prophetic unit. In English,
    rendering the clause idiomatically with 'And ... came' preserves the narrative
    progression without the wooden 'and it happened,' while still reflecting the Hebrew
    discourse marker.
- source_word: דְבַר
  chosen: the word of
  alternatives:
  - the message of
  lexicon: HALOT
  rationale: In prophetic formulae, דָּבָר commonly denotes the divine word/message.
    'The word of' is the standard and most transparent rendering here, preserving
    the formal prophetic idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated default for this contested
    term.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition אֶל with first person singular suffix straightforwardly
    means 'to me.' 'Unto me' is unnecessarily archaic for the project's modern-English
    aim.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct speech. 'Saying,'
    is concise, conventional, and prepares for the following oracle in the next verse.
