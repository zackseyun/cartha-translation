- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default renders YHWH as 'the LORD.' In the compound title
    with Adonai, standard English convention uses 'the Lord GOD' to represent both
    elements distinctly while preserving reverence and readability.
