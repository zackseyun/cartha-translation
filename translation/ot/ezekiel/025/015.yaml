id: EZK.25.15
reference: Ezekiel 25:15
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֛עַן עֲשׂ֥וֹת פְּלִשְׁתִּ֖ים בִּ/נְקָמָ֑ה וַ/יִּנָּקְמ֤וּ נָקָם֙ בִּ/שְׁאָ֣ט בְּ/נֶ֔פֶשׁ לְ/מַשְׁחִ֖ית אֵיבַ֥ת עוֹלָֽם׃
translation:
  text: 'Thus says the Lord GOD: Because the Philistines acted in vengeance and took revenge with contempt in the soul, to destroy with everlasting enmity,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with scorn in the soul,' 'with contempt from the heart.' The Hebrew expression combines contempt with an inner, whole-person disposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'with ancient enmity' or 'with perpetual hostility.' The Hebrew עוֹלָם can denote long-standing antiquity or enduring perpetuity depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine title combines אֲדֹנָי with YHWH. Per doctrine, YHWH is rendered 'the LORD'; in the fixed English convention for אֲדֹנָי יְהוִה, 'the Lord GOD' avoids 'Lord LORD' and reflects standard sense without transliterating the divine name.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment. 'Because' is clear modern English and preserves the causal force.
- source_word: עֲשׂוֹת
  chosen: acted
  alternatives:
  - did
  - dealt
  lexicon: HALOT
  rationale: With the following prepositional phrase בִּנְקָמָה, the idiom means to act/deal in vengeance. 'Acted' is more idiomatic than a wooden 'did'.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration of the people-group name.
- source_word: בִּנְקָמָה
  chosen: in vengeance
  alternatives:
  - with vengeance
  - vengefully
  lexicon: HALOT
  rationale: Keeps the noun 'vengeance' explicit and mirrors the Hebrew prepositional construction.
- source_word: וַיִּנָּקְמוּ נָקָם
  chosen: took revenge
  alternatives:
  - avenged themselves
  - executed vengeance
  lexicon: HALOT
  rationale: The verb-noun combination intensifies the action. 'Took revenge' is natural English and preserves the retaliatory sense.
- source_word: בִּשְׁאָט
  chosen: with utter contempt
  alternatives:
  - with scorn
  - with despite
  lexicon: HALOT
  rationale: שְׁאָט conveys contemptuous hostility or scorn. 'Utter contempt' captures the emotional force in readable English.
- source_word: בְּנֶפֶשׁ
  chosen: of soul
  alternatives:
  - in soul
  - from the heart
  - inwardly
  lexicon: HALOT
  rationale: Literally 'in/with soul.' Here it intensifies the inner disposition behind the revenge. 'Of soul' preserves the anthropological term without over-paraphrasing to 'heart'.
- source_word: לְמַשְׁחִית
  chosen: to destroy
  alternatives:
  - for destruction
  - to ruin
  lexicon: HALOT
  rationale: Expresses purpose/result of the Philistines' revenge. 'To destroy' is the clearest verbal rendering.
- source_word: אֵיבַת עוֹלָם
  chosen: with everlasting enmity
  alternatives:
  - ancient enmity
  - perpetual hostility
  - eternal hatred
  lexicon: HALOT
  rationale: אֵיבָה is enmity/hostility; עוֹלָם can denote long-standing or perpetual duration depending on context. 'Everlasting enmity' preserves the strong, enduring sense while remaining idiomatic.
