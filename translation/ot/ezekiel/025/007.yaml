id: EZK.25.7
reference: Ezekiel 25:7
source:
  edition: WLC
  text: לָ/כֵ֡ן הִנְ/נִי֩ נָטִ֨יתִי אֶת יָדִ֜/י עָלֶ֗י/ךָ וּ/נְתַתִּ֤י/ךָֽ ל/בג לַ/גּוֹיִ֔ם
    וְ/הִכְרַתִּ֨י/ךָ֙ מִן הָ֣/עַמִּ֔ים וְ/הַאֲבַדְתִּ֖י/ךָ מִן הָ/אֲרָצ֑וֹת אַשְׁמִ֣ידְ/ךָ֔
    וְ/יָדַעְתָּ֖ כִּֽי אֲנִ֥י יְהוָֽה־־־־־׃ס
translation:
  text: Therefore, behold, I have stretched out my hand against you, and I will give
    you as plunder to the nations. I will cut you off from the peoples and destroy
    you from the lands; I will annihilate you, and you will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for spoil' or 'as booty to the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the judgment consequence from
    the preceding accusation.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see, I am
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. 'Behold' is still
    readable here and preserves the heightened announcement formula.
- source_word: נָטִיתִי אֶת־יָדִי עָלֶיךָ
  chosen: I have stretched out my hand against you
  alternatives:
  - I have extended my hand against you
  - I stretch out my hand against you
  lexicon: HALOT
  rationale: A common judgment idiom in prophetic literature. 'Stretched out my hand'
    preserves the metaphor of active divine intervention in punishment. Perfect rendered
    as present-result English perfect.
- source_word: וּנְתַתִּיךָ לְבַג לַגּוֹיִם
  chosen: I will give you as plunder to the nations
  alternatives:
  - I will hand you over for spoil to the nations
  - I will make you booty for the nations
  lexicon: HALOT
  rationale: בַּג/בז in context denotes spoil/plunder taken by conquerors. 'As plunder'
    is natural modern English and preserves the military-conquest sense.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In this judgment oracle the term refers broadly to foreign nations, not
    specifically 'Gentiles' in a later Jewish-Christian contrast.
- source_word: וְהִכְרַתִּיךָ מִן־הָעַמִּים
  chosen: I will cut you off from the peoples
  alternatives:
  - I will cut you off from among the peoples
  - I will wipe you out from the peoples
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means to cut off/exterminate. 'From the peoples'
    reflects separation by removal from the community of nations.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: Varied from 'nations' to reflect the distinct Hebrew term and preserve
    some lexical differentiation between גוים and עמים.
- source_word: וְהַאֲבַדְתִּיךָ מִן־הָאֲרָצוֹת
  chosen: destroy you from the lands
  alternatives:
  - make you perish from the lands
  - eliminate you from the countries
  lexicon: HALOT
  rationale: אבד in Hiphil conveys causing to perish/destroy. 'From the lands' keeps
    the spatial sense of removal from territories/lands.
- source_word: הָאֲרָצוֹת
  chosen: the lands
  alternatives:
  - the countries
  - the earth
  lexicon: HALOT
  rationale: Plural of ארץ here refers to lands/territories rather than the whole
    earth.
- source_word: אַשְׁמִידְךָ
  chosen: I will annihilate you
  alternatives:
  - I will destroy you
  - I will exterminate you
  lexicon: HALOT
  rationale: שׁמד is a strong term of utter destruction. 'Annihilate' preserves the
    climactic intensification after the preceding destruction verbs.
- source_word: וְיָדַעְתָּ כִּי אֲנִי יְהוָה
  chosen: and you will know that I am the LORD
  alternatives:
  - then you will know that I am the LORD
  lexicon: HALOT
  rationale: Formulaic recognition statement in Ezekiel. YHWH rendered 'the LORD'
    per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    covenantal force while aligning with established English convention.
