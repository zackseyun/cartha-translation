theological_decisions:
- issue: Rendering of the ethnonym phrase בְּנֵי עַמּוֹן
  chosen_reading: the sons of Ammon
  alternative_readings:
  - the Ammonites
  - the people of Ammon
  rationale: The translation keeps the literal kinship expression rather than replacing
    it with the smoother English ethnonym. This follows the project's gender-accurate
    principle and preserves the Hebrew texture without obscuring meaning.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; consistency
    of key terms, or documented exception.'
