id: EZK.25.2
reference: Ezekiel 25:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם שִׂ֥ים פָּנֶ֖י/ךָ אֶל בְּנֵ֣י עַמּ֑וֹן וְ/הִנָּבֵ֖א עֲלֵי/הֶֽם־־׃
translation:
  text: Son of man, set your face toward the sons of Ammon, and prophesy against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Ammonites.'' Hebrew: ''the sons of Ammon.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: This is Ezekiel’s standard divine address. 'Son of man' preserves the
    Hebrew idiom בן־אדם closely and maintains consistency with its repeated use in
    the book. Although 'mortal' captures the sense, the idiomatic form is important
    here.
- source_word: שִׂים
  chosen: set
  alternatives:
  - direct
  - turn
  lexicon: HALOT
  rationale: The imperative of שׂים literally means 'set' or 'place.' In the expression
    'set your face,' a more formal rendering preserves the prophetic idiom better
    than a freer paraphrase.
- source_word: פָּנֶיךָ
  chosen: your face
  alternatives:
  - your gaze
  - your attention
  lexicon: HALOT
  rationale: The noun פנים in this idiom refers literally to the face and figuratively
    to directed opposition or attention. 'Your face' keeps the Hebrew imagery intact.
- source_word: אֶל
  chosen: toward
  alternatives:
  - against
  - to
  lexicon: HALOT
  rationale: The preposition אֶל most basically means 'to' or 'toward.' Since the
    hostile force is made explicit in the following clause ('prophesy against them'),
    'toward' avoids importing antagonism too early while remaining natural English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Ammon.' This preserves the ethnonym’s
    form and aligns with the translation philosophy of gender-accurate rendering.
    'Ammonites' is idiomatic English but less transparent to the source wording.
- source_word: וְהִנָּבֵא
  chosen: and prophesy
  alternatives:
  - and speak prophetically
  lexicon: HALOT
  rationale: The Niphal imperative of נבא is the standard verb for prophetic proclamation.
    'Prophesy' is the natural and accurate English equivalent.
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - concerning them
  - over them
  lexicon: HALOT
  rationale: In prophetic judgment contexts, על commonly carries an adversative sense.
    'Against them' best reflects the oracle’s hostile orientation in context.
