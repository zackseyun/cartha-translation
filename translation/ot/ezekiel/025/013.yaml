id: EZK.25.13
reference: Ezekiel 25:13
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה וְ/נָטִ֤תִי יָדִ/י֙ עַל אֱד֔וֹם וְ/הִכְרַתִּ֥י
    מִמֶּ֖/נָּה אָדָ֣ם וּ/בְהֵמָ֑ה וּ/נְתַתִּ֤י/הָ חָרְבָּה֙ מִ/תֵּימָ֔ן וּ/דְדָ֖נֶ/ה
    בַּ/חֶ֥רֶב יִפֹּֽלוּ־׃
translation:
  text: 'Therefore thus says the Lord GOD: I will stretch out my hand against Edom,
    and I will cut off from it man and beast, and I will make it a desolation; from
    Teman even to Dedan they will fall by the sword.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as far as Dedan.' The Hebrew phrase indicates the extent of Edom's devastation
      from Teman to Dedan.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the divine title pair in the conventional English form 'the
    Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; however, in the fixed
    combination אֲדֹנָי יְהוִה, English translations commonly avoid 'Lord LORD' by
    using 'Lord GOD,' which preserves the distinction and readability.
- source_word: וְנָטִתִי יָדִי
  chosen: I will stretch out my hand
  alternatives:
  - I will extend my hand
  lexicon: HALOT
  rationale: This is a standard idiom for active intervention in judgment. 'Stretch
    out my hand' preserves the Hebrew imagery and is natural English.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will destroy
  - I will wipe out
  lexicon: HALOT
  rationale: '''Cut off'' closely reflects the covenant-judgment idiom of כרת while
    remaining understandable. Stronger paraphrases like ''destroy'' flatten the lexical
    texture.'
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Here אָדָם is paired with 'beast' and refers to human inhabitants in
    contrast to animals. Per doctrine, gender-accurate rendering is preferred; 'man
    and beast' is the established and contextually precise expression.
- source_word: בְהֵמָה
  chosen: beast
  alternatives:
  - animal
  - livestock
  lexicon: HALOT
  rationale: In the judgment formula 'man and beast,' 'beast' best preserves the idiomatic
    pairing and solemn register. 'Animal' is possible but less idiomatic here.
- source_word: וּנְתַתִּיהָ חָרְבָּה
  chosen: I will make it a desolation
  alternatives:
  - I will make it desolate
  - I will give it over to desolation
  lexicon: HALOT
  rationale: The construction means to render the land desolate. 'Make it a desolation'
    preserves the nominal force of חָרְבָּה and reads clearly in English.
- source_word: מִתֵּימָן
  chosen: from Teman
  alternatives:
  - from the south
  lexicon: HALOT
  rationale: Teman is a place name in Edom and should be transliterated, not translated,
    per project philosophy. Although the name is related to 'south,' the geographic
    reference is primary here.
- source_word: וּדְדָנֶה
  chosen: even to Dedan
  alternatives:
  - and to Dedan
  - as far as Dedan
  lexicon: HALOT
  rationale: The phrase marks extent from one location to another. 'Even to Dedan'
    communicates the range idiomatically; 'as far as Dedan' is also possible.
- source_word: בַּחֶרֶב יִפֹּלוּ
  chosen: they will fall by the sword
  alternatives:
  - they will fall by sword
  - they will be slain by the sword
  lexicon: HALOT
  rationale: A standard judgment expression. 'Fall by the sword' preserves the Hebrew
    idiom without over-paraphrasing to 'be slain,' though that is the sense.
