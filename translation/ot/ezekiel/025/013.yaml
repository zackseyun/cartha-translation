theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default for יְהוָה is 'the LORD,' but in the compound title
    with אֲדֹנָי, rendering 'the Lord LORD' is awkward and obscures the Hebrew distinction.
    'The Lord GOD' is the standard English equivalent that preserves reverence and
    readability without introducing a transliterated divine name.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)
    and Translation philosophy §6'
