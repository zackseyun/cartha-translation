id: EZK.25.17
reference: Ezekiel 25:17
source:
  edition: WLC
  text: וְ/עָשִׂ֤יתִי בָ/ם֙ נְקָמ֣וֹת גְּדֹל֔וֹת בְּ/תוֹכְח֖וֹת חֵמָ֑ה וְ/יָֽדְעוּ֙ כִּֽי אֲנִ֣י יְהוָ֔ה בְּ/תִתִּ֥/י אֶת נִקְמָתִ֖/י בָּֽ/ם־־׃ס
translation:
  text: And I will execute great acts of vengeance on them with wrathful rebukes, and they will know that I am Yahweh when I lay my vengeance on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with rebukes of wrath' or 'with wrathful punishments.' The Hebrew phrase combines 'rebukes/corrections' with 'wrath/fury,' and the exact nuance may include both verbal reproof and punitive chastisement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתִי
  chosen: I will execute
  alternatives:
  - I will do
  - I will act
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'), but in a judgment context with נְקָמוֹת it idiomatically means to carry out or execute vengeance. 'Execute' preserves the force without over-paraphrasing.
- source_word: נְקָמוֹת גְּדֹלוֹת
  chosen: great acts of vengeance
  alternatives:
  - great vengeance
  - great avenges
  lexicon: HALOT
  rationale: The plural נְקָמוֹת is best represented explicitly rather than flattened to a singular abstract noun. 'Acts of vengeance' conveys repeated/intensive punitive acts; 'great' renders גְּדֹלוֹת straightforwardly.
- source_word: בְּתוֹכְחוֹת חֵמָה
  chosen: with furious rebukes
  alternatives:
  - with rebukes of wrath
  - with wrathful punishments
  - with chastisements of fury
  lexicon: HALOT
  rationale: תוֹכֵחָה commonly denotes rebuke/reproof, but in prophetic judgment contexts it can shade into punitive correction. 'Furious rebukes' keeps the lexical core of rebuke while reflecting the attached חֵמָה ('wrath/fury').
- source_word: חֵמָה
  chosen: furious
  alternatives:
  - wrathful
  - of fury
  lexicon: HALOT
  rationale: Rendered adjectivally in English to produce natural syntax with 'rebukes.' The semantic content of burning wrath/fury is preserved.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  chosen: and they will know that I am the LORD
  alternatives:
  - then they will know that I am the LORD
  lexicon: HALOT
  rationale: This is a standard Ezekiel recognition formula. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּתִתִּי אֶת־נִקְמָתִי בָּם
  chosen: when I lay my vengeance on them
  alternatives:
  - when I put my vengeance on them
  - when I inflict my vengeance on them
  lexicon: HALOT
  rationale: The infinitive construct of נתן with 'my vengeance' is idiomatically rendered as laying/inflicting vengeance upon them. 'Lay my vengeance on them' is vivid and close to the Hebrew construction.
- source_word: נִקְמָתִי
  chosen: my vengeance
  alternatives:
  - my avenging
  - my retribution
  lexicon: HALOT
  rationale: The noun directly denotes vengeance/vengeance-taking. 'Vengeance' is the most transparent and contextually fitting rendering.
