id: EZK.25.9
reference: Ezekiel 25:9
source:
  edition: WLC
  text: לָ/כֵן֩ הִנְ/נִ֨י פֹתֵ֜חַ אֶת כֶּ֤תֶף מוֹאָב֙ מֵ/הֶ֣/עָרִ֔ים מֵֽ/עָרָ֖י/ו
    מִ/קָּצֵ֑/הוּ צְבִ֗י אֶ֚רֶץ בֵּ֣ית הַיְשִׁימֹ֔ת בַּ֥עַל מְע֖וֹן ו/קריתמ/ה־׃
translation:
  text: 'therefore, behold, I am opening the flank of Moab from its cities, from its
    frontier cities—the glory of the land: Beth-jeshimoth, Baal-meon, and Kiriathaim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the side of Moab' or more literally 'the shoulder of Moab.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the beauty of the land.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew text has a spelling form for the final place name corresponding to
      Kiriathaim, a known Moabite city.
    reason: textual_variant
lexical_decisions:
- source_word: פֹתֵחַ
  chosen: I am opening
  alternatives:
  - I will open
  - I am laying open
  lexicon: HALOT
  rationale: The participle with הִנְנִי gives an imminent/future sense expressed
    vividly in English as 'I am opening.' This preserves the prophetic immediacy better
    than a simple future while remaining natural.
- source_word: כֶּתֶף מוֹאָב
  chosen: the flank of Moab
  alternatives:
  - the side of Moab
  - the shoulder of Moab
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in geographical/military context
    it refers to a side or flank. 'Flank' best conveys the metaphor of exposing a
    vulnerable side of the territory.
- source_word: מֵהֶעָרִים
  chosen: from its cities
  alternatives:
  - away from the cities
  - starting from the cities
  lexicon: HALOT
  rationale: The מן phrase marks the point from which Moab is being opened/exposed.
    Because the following phrase specifies 'its frontier cities,' rendering this first
    phrase as the broader 'from its cities' preserves the Hebrew progression.
- source_word: מֵעָרָיו מִקָּצֵהוּ
  chosen: from its frontier cities
  alternatives:
  - from its cities at its extremity
  - from its farthest cities
  - from the cities on its border
  lexicon: HALOT
  rationale: The combination points to cities located at the edge/border of Moab.
    'Frontier cities' is concise, idiomatic, and captures the territorial sense of
    קָצֶה.
- source_word: צְבִי אֶרֶץ
  chosen: the glory of the land
  alternatives:
  - the beauty of the land
  - the splendor of the land
  lexicon: HALOT
  rationale: צְבִי can denote beauty, splendor, or glory. Here it appositionally introduces
    the notable cities as the prized glory of the land. 'Glory' preserves the elevated
    prophetic tone.
- source_word: בֵּית הַיְשִׁימֹת
  chosen: Beth-jeshimoth
  alternatives:
  - Beth Jeshimoth
  lexicon: HALOT
  rationale: Place name is transliterated per project policy to transliterate names
    rather than translate them.
- source_word: בַּעַל מְעוֹן
  chosen: Baal-meon
  alternatives:
  - Baal Meon
  - Baal-meon
  lexicon: HALOT
  rationale: Place name is transliterated. Hyphenation helps modern readability while
    preserving the recognizable Hebrew form.
- source_word: וקריתמה
  chosen: and Kiriathaim
  alternatives:
  - and Kiriathim
  lexicon: HALOT
  rationale: The ketiv points to the known place name Kiriathaim. Standard English
    transliteration uses 'Kiriathaim.'
