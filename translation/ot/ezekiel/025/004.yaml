theological_decisions:
- issue: Referent of the feminine singular pronouns
  chosen_reading: Addressed to Ammon/Rabbah as a personified land or nation, rendered
    with 'you' throughout
  alternative_readings:
  - Addressed specifically to the city alone
  - Addressed to the territory alone
  rationale: The Hebrew uses feminine singular suffixes, common for cities/lands personified.
    English 'you/your' preserves the direct address without forcing a narrower identification
    than the context requires.
