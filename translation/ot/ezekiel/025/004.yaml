id: EZK.25.4
reference: Ezekiel 25:4
source:
  edition: WLC
  text: לָ/כֵ֡ן הִנְ/נִי֩ נֹתְנָ֨/ךְ לִ/בְנֵי קֶ֜דֶם לְ/מֽוֹרָשָׁ֗ה וְ/יִשְּׁב֤וּ
    טִירֽוֹתֵי/הֶם֙ בָּ֔/ךְ וְ/נָ֥תְנוּ בָ֖/ךְ מִשְׁכְּנֵי/הֶ֑ם הֵ֚מָּה יֹאכְל֣וּ
    פִרְיֵ֔/ךְ וְ/הֵ֖מָּה יִשְׁתּ֥וּ חֲלָבֵֽ/ךְ־׃
translation:
  text: Therefore, look, I am giving you to the sons of the east as a possession,
    and they will set their encampments in you and place their dwellings in you. They
    will eat your fruit, and they will drink your milk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of the east' or 'the easterners'; Hebrew 'sons of the east.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the announced judgment as a
    consequence of the prior accusation.
- source_word: הִנְנִי
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle marking emphatic divine announcement. 'Look' preserves
    the force in readable modern English better than archaic 'behold.'
- source_word: נֹתְנָךְ
  chosen: I am giving you
  alternatives:
  - I give you
  - I will give you
  lexicon: HALOT
  rationale: The participial form with first-person subject conveys imminent or certain
    action; English progressive best captures the vividness without overformal stiffness.
- source_word: לִבְנֵי קֶדֶם
  chosen: to the sons of the east
  alternatives:
  - to the people of the east
  - to the easterners
  lexicon: HALOT
  rationale: Literally 'sons of the east,' a common designation for eastern desert
    peoples. The more literal rendering preserves the Hebrew idiom and its ethnic-geographical
    flavor; a smoother alternative is preserved in a footnote.
- source_word: לְמוֹרָשָׁה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  lexicon: HALOT
  rationale: The noun denotes something taken or held as a possession. 'As a possession'
    fits the conquest context better in English than 'inheritance,' which can imply
    lawful familial succession not foregrounded here.
- source_word: וְיִשְׁבוּ
  chosen: they will set
  alternatives:
  - they will place
  - they will dwell
  lexicon: HALOT
  rationale: Though the verb often means 'sit' or 'dwell,' with the object 'their
    encampments' it refers to establishing or setting them up.
- source_word: טִירוֹתֵיהֶם
  chosen: their encampments
  alternatives:
  - their camps
  - their settlements
  - their tent-villages
  lexicon: HALOT
  rationale: The noun refers to camps or tent-settlements, especially of nomadic groups.
    'Encampments' captures the semi-nomadic military/pastoral sense.
- source_word: מִשְׁכְּנֵיהֶם
  chosen: their dwellings
  alternatives:
  - their tabernacles
  - their habitations
  - their tents
  lexicon: HALOT
  rationale: A general term for dwelling places. 'Dwellings' is natural English and
    avoids over-specifying tents, since the previous term already conveys encampment
    imagery.
- source_word: פִרְיֵךְ
  chosen: your fruit
  alternatives:
  - your produce
  lexicon: HALOT
  rationale: Literal agricultural metaphor for the land's yield. 'Fruit' preserves
    the imagery and is sufficiently clear in context.
- source_word: חֲלָבֵךְ
  chosen: your milk
  alternatives:
  - the milk of your land
  lexicon: HALOT
  rationale: Literally 'your milk,' likely metonymic for the produce and richness
    of the land or flocks. The literal rendering preserves the image without interpretive
    expansion in the main text.
