id: EZK.25.3
reference: Ezekiel 25:3
source:
  edition: WLC
  text: וְ/אָֽמַרְתָּ֙ לִ/בְנֵ֣י עַמּ֔וֹן שִׁמְע֖וּ דְּבַר אֲדֹנָ֣/י יְהוִ֑ה כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֡ה יַעַן֩ אָמְרֵ֨/ךְ הֶאָ֜ח אֶל מִקְדָּשִׁ֣/י כִֽי נִחָ֗ל וְ/אֶל אַדְמַ֤ת יִשְׂרָאֵל֙ כִּ֣י נָשַׁ֔מָּה וְ/אֶל בֵּ֣ית יְהוּדָ֔ה כִּ֥י הָלְכ֖וּ בַּ/גּוֹלָֽה־־־־־־׃
translation:
  text: 'And say to the sons of Ammon, ‘Hear the word of the Lord GOD. Thus says the Lord GOD: Because you said, “Aha!” against my sanctuary when it was profaned, and against the land of Israel when it was made desolate, and against the house of Judah when they went into exile,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew interjection of gloating or malicious triumph: ''Aha!''; alternatively, ''Ha!'' or ''Ah!'''
    reason: lexical_alternative
  - marker: b
    text: Or 'when it was defiled' / 'when it was desecrated.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they went into captivity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the children of Ammon
  lexicon: HALOT
  rationale: Formally, the Hebrew is 'sons of Ammon.' This preserves the ethnonym's literal form while remaining natural English. 'Ammonites' is idiomatic and possible, but the construct phrase is transparent and worth retaining here.
- source_word: דְּבַר אֲדֹנָי יְהוִה
  chosen: the word of the Lord GOD
  alternatives:
  - the word of the Lord Yahweh
  - the word of the Sovereign LORD
  lexicon: HALOT
  rationale: אֲדֹנָי + יְהוִה is conventionally rendered 'Lord GOD' in English to avoid 'Lord LORD' while preserving both divine titles. Per doctrine, יְהוָה is rendered 'the LORD' in general; in this compound, 'Lord GOD' is the clearest established equivalent.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - This is what the Lord GOD says
  lexicon: HALOT
  rationale: A standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence without becoming archaic beyond normal biblical style.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for judgment. 'Because' is the most natural modern equivalent.
- source_word: אָמְרֵךְ
  chosen: you said
  alternatives:
  - your saying
  lexicon: HALOT
  rationale: 'The infinitive/construct-like form with suffix functions causally after יַעַן: ''because of your saying.'' In English, finite ''you said'' is the most natural and accurate rendering.'
- source_word: הֶאָח
  chosen: Aha!
  alternatives:
  - Ha!
  - Ah!
  lexicon: HALOT
  rationale: An interjection of malicious gloating. 'Aha!' best captures the taunting force in readable English.
- source_word: אֶל
  chosen: against
  alternatives:
  - over
  - concerning
  lexicon: HALOT
  rationale: Though literally 'to/toward,' in this hostile context the preposition marks the object of Ammon's gloating. 'Against' brings out the adversative sense required by context.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place/sanctuary. 'My sanctuary' is broad enough to preserve the Hebrew term without over-specifying 'temple,' though the Jerusalem temple is in view.
- source_word: נִחָל
  chosen: it was profaned
  alternatives:
  - it was defiled
  - it was desecrated
  lexicon: HALOT
  rationale: From חלל in the Niphal, the sense is being profaned or defiled. 'Profaned' best matches the cultic/theological register of a sanctuary being violated.
- source_word: אַדְמַת יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - the soil of Israel
  - the ground of Israel
  lexicon: HALOT
  rationale: אַדְמָה can mean ground/land; in geopolitical context 'land of Israel' is the natural English rendering.
- source_word: נָשַׁמָּה
  chosen: it was made desolate
  alternatives:
  - it was laid waste
  - it was desolated
  lexicon: HALOT
  rationale: The verb denotes devastation/desolation. 'Was made desolate' is clear and preserves the passive/resultative sense.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  - the people of Judah
  lexicon: HALOT
  rationale: A standard collective designation for the kingdom/people. 'House of Judah' preserves the covenantal-national idiom.
- source_word: הָלְכוּ בַּגּוֹלָה
  chosen: they went into exile
  alternatives:
  - they went into captivity
  - they were carried away into exile
  lexicon: HALOT
  rationale: Literally 'they went into the exile.' English idiom prefers 'went into exile.' 'Captivity' is possible but 'exile' better matches גּוֹלָה in prophetic literature.
