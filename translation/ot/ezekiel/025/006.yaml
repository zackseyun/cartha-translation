id: EZK.25.6
reference: Ezekiel 25:6
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֚עַן מַחְאֲ/ךָ֣ יָ֔ד וְ/רַקְעֲ/ךָ֖ בְּ/רָ֑גֶל וַ/תִּשְׂמַ֤ח בְּ/כָל שָֽׁאטְ/ךָ֙ בְּ/נֶ֔פֶשׁ אֶל אַדְמַ֖ת יִשְׂרָאֵֽל־־׃
translation:
  text: 'For thus says the Lord GOD: Because you clapped your hands and stamped your feet, and rejoiced with all the contempt in your soul against the land of Israel,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with all your scorn' or 'with all your malice in your soul against the land of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English when אֲדֹנָי precedes YHWH, avoiding the awkward 'Lord LORD.' Per doctrine, YHWH is rendered 'the LORD'; in this fixed combination, 'GOD' represents the divine name in small-caps tradition.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - inasmuch as
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment. 'Because' is clear modern English and preserves the causal force.
- source_word: מַחְאֲךָ יָד
  chosen: you clapped your hands
  alternatives:
  - your striking of the hand
  - you struck the hand
  lexicon: HALOT
  rationale: The infinitive construct plus object literally refers to striking/clapping the hand. In context it is an expressive gesture of malicious delight, best rendered idiomatically as 'you clapped your hands.'
- source_word: וְרַקְעֲךָ בְּרָגֶל
  chosen: and stamped your feet
  alternatives:
  - and stamped with the foot
  - and pounded your foot
  lexicon: HALOT
  rationale: The Hebrew is singular 'foot,' but English idiom naturally uses the plural in this gesture. 'Stamped your feet' communicates the physical action and emotional force.
- source_word: וַתִּשְׂמַח
  chosen: and rejoiced
  alternatives:
  - and exulted
  - and were glad
  lexicon: HALOT
  rationale: Simple past narrative verb. 'Rejoiced' preserves the irony of taking joy in Israel's downfall.
- source_word: בְּכָל שָׁאטְךָ
  chosen: with all the contempt
  alternatives:
  - with all your scorn
  - with all your malice
  lexicon: HALOT
  rationale: שָׁאט conveys disdainful hostility or contempt. 'Contempt' best captures the emotional and moral tone here; 'malice' is possible but less directly tied to the lexical sense of scorn.
- source_word: בְּנֶפֶשׁ
  chosen: in your soul
  alternatives:
  - from your heart
  - with your whole being
  lexicon: HALOT
  rationale: נֶפֶשׁ denotes the inner self/person. 'In your soul' is more literal and preserves the anthropological texture; the phrase modifies the depth of contempt.
- source_word: אֶל אַדְמַת יִשְׂרָאֵל
  chosen: against the land of Israel
  alternatives:
  - toward the land of Israel
  - against the soil of Israel
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this hostile context English 'against' better conveys the adversative sense. אַדְמָה here refers to the land/ground of Israel; 'land' is the natural rendering.
