theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies יְהוָה normally as 'the LORD'. In the compound
    אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to preserve both title and
    name without awkward repetition. This is a translation-form decision, not a doctrinal
    reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → the LORD'
