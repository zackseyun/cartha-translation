id: EZK.25.12
reference: Ezekiel 25:12
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֣עַן עֲשׂ֥וֹת אֱד֛וֹם בִּ/נְקֹ֥ם נָקָ֖ם לְ/בֵ֣ית יְהוּדָ֑ה וַ/יֶּאְשְׁמ֥וּ אָשׁ֖וֹם וְ/נִקְּמ֥וּ בָ/הֶֽם׃
translation:
  text: 'Thus says the Lord GOD: Because Edom acted vengefully against the house of Judah, and incurred grievous guilt, and took vengeance on them,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in avenging vengeance,' an emphatic expression for acting vengefully or taking full vengeance.
    reason: lexical_alternative
  - marker: b
    text: Or 'incurred guilt greatly' / 'were found very guilty.' The Hebrew uses an emphatic guilt expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English to reflect אֲדֹנָי plus the divine name. Per doctrine, יְהוָה is rendered 'the LORD'; in this fixed combination, 'Lord GOD' is the standard equivalent that avoids 'Lord LORD' and preserves the distinction of the two elements.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment; 'Because' is clear modern English and fits the causal force.
- source_word: עֲשׂוֹת
  chosen: acted
  alternatives:
  - did
  - dealt
  lexicon: HALOT
  rationale: Used idiomatically with the following infinitive phrase; 'acted' gives natural English without over-paraphrasing.
- source_word: בִּנְקֹם נָקָם
  chosen: in vengeance
  alternatives:
  - vengefully
  - by taking vengeance
  lexicon: HALOT
  rationale: The infinitive plus cognate noun intensifies the idea of vengeance. 'Acted in vengeance' preserves the Hebrew emphasis while remaining readable.
- source_word: לְבֵית יְהוּדָה
  chosen: against the house of Judah
  alternatives:
  - toward the house of Judah
  lexicon: HALOT
  rationale: The context is hostile action, so 'against' makes the directional sense explicit in idiomatic English while retaining 'house of Judah' as a covenantal/national designation.
- source_word: וַיֶּאְשְׁמוּ אָשׁוֹם
  chosen: became very guilty
  alternatives:
  - incurred guilt
  - were found guilty
  - became guilty indeed
  lexicon: HALOT
  rationale: The verb אשם with cognate infinitive/accusative intensifies culpability. 'Became very guilty' communicates both the state of guilt and the emphatic construction.
- source_word: וְנִקְּמוּ בָהֶם
  chosen: and took vengeance on them
  alternatives:
  - and avenged themselves on them
  - and exacted vengeance on them
  lexicon: HALOT
  rationale: The Niphal here carries a reflexive/passive nuance in context of retaliatory action. 'Took vengeance on them' is the most natural English rendering and matches the repeated vengeance motif.
