theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agency of Israel in Edom's judgment
  chosen_reading: Israel is the human instrument of God's own vengeance
  alternative_readings:
  - God alone acts without human instrumentality
  - Israel acts independently
  rationale: The phrase 'by the hand of my people Israel' explicitly presents Israel as the means by which God sets his vengeance on Edom. The translation preserves both divine agency ('I will set my vengeance') and human instrumentality ('by the hand of my people Israel') without collapsing either.
