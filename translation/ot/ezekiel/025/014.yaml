id: EZK.25.14
reference: Ezekiel 25:14
source:
  edition: WLC
  text: וְ/נָתַתִּ֨י אֶת נִקְמָתִ֜/י בֶּ/אֱד֗וֹם בְּ/יַד֙ עַמִּ֣/י יִשְׂרָאֵ֔ל וְ/עָשׂ֣וּ בֶ/אֱד֔וֹם כְּ/אַפִּ֖/י וְ/כַ/חֲמָתִ֑/י וְ/יָֽדְעוּ֙ אֶת נִקְמָתִ֔/י נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃פ
translation:
  text: And I will set my vengeance on Edom by the hand of my people Israel, and they will deal with Edom according to my anger and according to my wrath; and they will know my vengeance, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against Edom' for 'on Edom.' The Hebrew preposition can be rendered either way in a hostile context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the hand of my people Israel,' an idiom meaning 'through my people Israel.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''they will act against Edom.'' The Hebrew verb is broad: ''do, make, act.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will set
  alternatives:
  - I will place
  - I will give
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' In this judgment context with 'my vengeance on Edom,' 'set' is idiomatic English that preserves the concrete force without sounding awkward like 'give my vengeance on.'
- source_word: נִקְמָתִי
  chosen: my vengeance
  alternatives:
  - my avenging
  - my vindication
  lexicon: HALOT
  rationale: נקמה denotes vengeance/vengeance-taking. 'Vengeance' best matches the judicial retribution context in Ezekiel. 'Vindication' is too weak here, and 'avenging' is less natural in this syntax.
- source_word: בֶּאֱדוֹם
  chosen: on Edom
  alternatives:
  - against Edom
  - in Edom
  lexicon: HALOT
  rationale: The preposition ב with hostile action can be rendered idiomatically as 'on' or 'against.' 'On Edom' fits well with 'set my vengeance on Edom' and preserves the direct object of judgment.
- source_word: בְּיַד עַמִּי יִשְׂרָאֵל
  chosen: by the hand of my people Israel
  alternatives:
  - through my people Israel
  - by means of my people Israel
  lexicon: HALOT
  rationale: ביד is a standard instrumental idiom, literally 'by the hand of.' Retaining 'by the hand of' preserves the Hebrew imagery and clearly marks Israel as the instrument of divine judgment.
- source_word: וְעָשׂוּ בֶאֱדוֹם
  chosen: they will deal with Edom
  alternatives:
  - they will act against Edom
  - they will execute judgment on Edom
  lexicon: HALOT
  rationale: עשה with a hostile prepositional phrase is broad ('do/act'). 'Deal with Edom' is natural English that preserves the open-ended force without over-specifying 'execute judgment,' which is implied but not explicit in the verb alone.
- source_word: כְּאַפִּי
  chosen: according to my anger
  alternatives:
  - in keeping with my anger
  - as my anger dictates
  lexicon: HALOT
  rationale: אף here refers to anger. 'According to my anger' closely reflects the comparative כ and keeps the divine emotion/judgment language explicit.
- source_word: וְכַחֲמָתִי
  chosen: and according to my wrath
  alternatives:
  - and according to my fury
  - and according to my rage
  lexicon: HALOT
  rationale: חמה overlaps with wrath/fury. Rendering it as 'wrath' alongside 'anger' preserves the paired intensification without collapsing both terms into one English gloss.
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - and they will come to know
  - and they will recognize
  lexicon: HALOT
  rationale: ידע commonly means 'know,' and in Ezekiel often carries experiential recognition. 'They will know' is concise and standard; the fuller nuance is contextually evident.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declaration of the Lord GOD
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נאם is a prophetic formula best rendered 'declares.' For אֲדֹנָי יְהוִה, the project default renders YHWH as 'the LORD.' Because אֲדֹנָי precedes YHWH, English convention uses 'Lord GOD' to avoid 'Lord LORD' while still signaling the divine name behind GOD.
