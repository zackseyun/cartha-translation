theological_decisions:
- issue: Force of the judgment formula regarding Ammon's disappearance
  chosen_reading: Rendered as loss of remembrance/status among the nations without
    importing total metaphysical erasure.
  alternative_readings:
  - Rendered more strongly as complete annihilation
  - Rendered more weakly as merely loss of fame
  rationale: The Hebrew states that the Ammonites will not be remembered among the
    nations. The translation preserves the judicial outcome of national obliteration
    from international memory/status while avoiding speculative theological expansion
    beyond the text.
  doctrine_reference: Translation philosophy §1, §3
