id: EZK.25.10
reference: Ezekiel 25:10
source:
  edition: WLC
  text: לִ/בְנֵי קֶ֨דֶם֙ עַל בְּנֵ֣י עַמּ֔וֹן וּ/נְתַתִּ֖י/הָ לְ/מֽוֹרָשָׁ֑ה לְמַ֛עַן
    לֹֽא תִזָּכֵ֥ר בְּנֵֽי עַמּ֖וֹן בַּ/גּוֹיִֽם־־־־׃
translation:
  text: to the people of the east against the Ammonites; and I will give it as a possession,
    so that the Ammonites may no longer be remembered among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the sons of the east.' The Hebrew expression refers to eastern peoples
      or tribes.
    reason: lexical_alternative
  - marker: b
    text: Or 'as an inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי קֶדֶם
  chosen: to the people of the east
  alternatives:
  - to the sons of the east
  - for the easterners
  lexicon: HALOT
  rationale: בני קדם is an idiomatic ethnogeographic expression for eastern peoples/tribes.
    'People of the east' preserves the sense in natural English while avoiding an
    overly literal 'sons' that would mislead modern readers.
- source_word: עַל
  chosen: against
  alternatives:
  - over
  - upon
  lexicon: HALOT
  rationale: In this context of territorial transfer and judgment, על conveys movement
    or assignment over/against the Ammonites. 'Against' best captures the hostile
    judicial sense in readable English.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: This is the standard ethnic designation. 'Ammonites' is idiomatic English
    and accurately represents the collective people group.
- source_word: וּנְתַתִּיהָ
  chosen: and I will give it
  alternatives:
  - and I will hand it over
  - and I will set it
  lexicon: HALOT
  rationale: נתן with 3fs suffix refers back to the land/territory in context from
    the preceding verse. 'Give it' is the plain and sufficiently formal rendering.
- source_word: לְמוֹרָשָׁה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  lexicon: HALOT
  rationale: מורשה denotes something possessed or inherited. 'As a possession' fits
    the judgment-oracle context of territorial takeover better than 'inheritance,'
    which can sound overly familial in English.
- source_word: לְמַעַן לֹא
  chosen: so that ... no longer
  alternatives:
  - in order that ... not
  - so that ... not
  lexicon: HALOT
  rationale: 'This expresses purpose/result. Adding ''no longer'' brings out the idiomatic
    force in context: the Ammonites will cease to have standing or remembrance among
    the nations.'
- source_word: תִזָּכֵר
  chosen: may ... be remembered
  alternatives:
  - be mentioned
  - be brought to remembrance
  lexicon: HALOT
  rationale: 'The Niphal of זכר is naturally passive/reflexive: ''be remembered.''
    This preserves the lexical link to remembrance without overinterpreting it as
    mere verbal mention.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים here refers broadly to the surrounding peoples/nations, not specifically
    'Gentiles' in a later theological sense. 'Among the nations' is the clearest contextual
    rendering.
