id: EZK.25.5
reference: Ezekiel 25:5
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י אֶת רַבָּה֙ לִ/נְוֵ֣ה גְמַלִּ֔ים וְ/אֶת בְּנֵ֥י עַמּ֖וֹן לְ/מִרְבַּץ צֹ֑אן וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־־־־׃ס
translation:
  text: And I will make Rabbah a pasture for camels, and the Ammonites a resting place for flocks; then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a habitation of camels' or 'a dwelling place for camels.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Ammon.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a lying-down place for flocks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will make
  alternatives:
  - I will give
  - I will set
  lexicon: HALOT
  rationale: Though the verb is literally 'give,' in this construction with a place and result phrase it idiomatically means to make or turn into. 'I will make' is natural English and preserves the causative-result sense.
- source_word: רַבָּה
  chosen: Rabbah
  alternatives:
  - Rabbah of the Ammonites
  lexicon: HALOT
  rationale: This is the proper name of the Ammonite capital, so it is transliterated rather than translated, following the policy to transliterate names.
- source_word: לִנְוֵה
  chosen: a pasture for
  alternatives:
  - for a habitation of
  - for a dwelling place of
  lexicon: HALOT
  rationale: The noun denotes a habitation, abode, or pastureland, especially in pastoral contexts. Because it is immediately qualified by 'camels,' 'a pasture for' best captures the likely sense in clear modern English.
- source_word: גְמַלִּים
  chosen: camels
  lexicon: HALOT
  rationale: Straightforward plural noun; 'camels' is the direct lexical equivalent.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: The Hebrew literally reads 'sons of Ammon,' but in idiomatic English the ethnic designation 'the Ammonites' best conveys the referent without unnecessary woodenness.
- source_word: לְמִרְבַּץ
  chosen: a resting place
  alternatives:
  - a fold
  - a lying-down place
  lexicon: HALOT
  rationale: The noun refers to a place where animals lie down or rest. 'Resting place' is clear and fits the pastoral imagery. 'Fold' is possible but can imply an enclosure not explicit in the Hebrew.
- source_word: צֹאן
  chosen: flocks
  alternatives:
  - sheep
  - small livestock
  lexicon: HALOT
  rationale: The term can denote small livestock collectively, often sheep and goats. 'Flocks' preserves the collective pastoral sense and reads naturally with 'resting place.'
- source_word: וִידַעְתֶּם
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect in prophetic discourse often carries a consequential sense. 'Then you will know' makes the result relationship explicit in natural English without adding new content.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
