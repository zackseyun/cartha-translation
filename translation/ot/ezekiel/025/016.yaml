id: EZK.25.16
reference: Ezekiel 25:16
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֨י נוֹטֶ֤ה יָדִ/י֙ עַל פְּלִשְׁתִּ֔ים וְ/הִכְרַתִּ֖י אֶת כְּרֵתִ֑ים וְ/הַ֣אֲבַדְתִּ֔י אֶת שְׁאֵרִ֖ית ח֥וֹף הַ/יָּֽם־־־׃
translation:
  text: 'Therefore thus says the Lord GOD: Behold, I am stretching out my hand against the Philistines, and I will cut off the Cherethites, and I will destroy the remnant of the seacoast.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Cretans' for 'the Cherethites'; the Hebrew term may refer to a people associated with Crete, but the main text preserves the ethnonym by transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the divine name YHWH. Following the doctrine default for יְהוָה as 'the LORD,' English convention in this specific doubled form commonly avoids 'Lord LORD' by rendering 'Lord GOD.' Small caps cannot be represented in plain text here, so 'GOD' signals the underlying YHWH.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: An attention-getting particle introducing imminent divine action. 'Behold' preserves the prophetic register and solemnity better than the more colloquial 'look' or 'see.'
- source_word: נוֹטֶה יָדִי
  chosen: I am stretching out my hand
  alternatives:
  - I stretch out my hand
  - I will stretch out my hand
  lexicon: HALOT
  rationale: The participle with הִנְנִי conveys imminent or already-begun action. 'I am stretching out my hand' captures the vividness and immediacy of the Hebrew while remaining natural English.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard transliteration for the people group; definite article supplied naturally in English for the ethnic/national referent.
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will wipe out
  - I will destroy
  lexicon: HALOT
  rationale: כרת in judgment contexts often means 'cut off,' a standard and semantically transparent rendering that preserves the idiomatic force without over-paraphrase.
- source_word: כְּרֵתִים
  chosen: the Cherethites
  alternatives:
  - the Cretans
  - the Kerethites
  lexicon: HALOT
  rationale: The Hebrew ethnonym is best transliterated as 'Cherethites.' Although some connect the term with Cretans, the text presents it as a named group, and transliteration avoids over-interpreting the identification in the main text.
- source_word: וְהַאֲבַדְתִּי
  chosen: I will destroy
  alternatives:
  - I will make perish
  - I will wipe out
  lexicon: HALOT
  rationale: אבד in the Hiphil here denotes causing to perish/destroy. 'Destroy' is clear, forceful, and idiomatic in English.
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - the survivors
  - what remains
  lexicon: HALOT
  rationale: '''Remnant'' is the most direct lexical equivalent. In this judgment context it refers to those remaining, without importing the positive theological sense the term can have elsewhere.'
- source_word: חוֹף הַיָּם
  chosen: the seacoast
  alternatives:
  - the coast of the sea
  - the shoreline
  lexicon: HALOT
  rationale: The construct phrase literally means 'coast of the sea.' 'Seacoast' is the most natural concise English equivalent and fits the Philistine coastal setting.
