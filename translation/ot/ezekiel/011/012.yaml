id: EZK.11.12
reference: Ezekiel 11:12
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּם֙ כִּֽי אֲנִ֣י יְהוָ֔ה אֲשֶׁ֤ר בְּ/חֻקַּ/י֙ לֹ֣א הֲלַכְתֶּ֔ם וּ/מִשְׁפָּטַ֖/י לֹ֣א עֲשִׂיתֶ֑ם וּֽ/כְ/מִשְׁפְּטֵ֧י הַ/גּוֹיִ֛ם אֲשֶׁ֥ר סְבִיבוֹתֵי/כֶ֖ם עֲשִׂיתֶֽם־׃
translation:
  text: Then you will know that I am Yahweh, in whose statutes you have not walked, and whose judgments you have not carried out, but you have acted according to the judgments of the nations that are around you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but you have acted according to the customs of the nations that are around you.' The Hebrew word rendered 'judgments' can, in this context, also refer to the practices or customs followed by those nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  - So you will know
  lexicon: HALOT
  rationale: Qal perfect 2mp with prefixed conjunction in prophetic discourse commonly has future/resultative force after preceding judgment events. 'Then' makes the consequential sense explicit in natural English while preserving the basic meaning 'you will know.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal force in standard English small-caps convention.
- source_word: בְּחֻקַּי לֹא הֲלַכְתֶּם
  chosen: in whose statutes you have not walked
  alternatives:
  - you have not walked in my statutes
  - you have not lived by my statutes
  lexicon: HALOT
  rationale: The Hebrew idiom 'walk in statutes' is retained in recognizable English because it is a significant covenantal expression in Ezekiel. 'Whose' links back to 'the LORD' through אֲשֶׁר and keeps the sentence cohesive.
- source_word: חֻקַּי
  chosen: statutes
  alternatives:
  - decrees
  - ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a conventional and suitably precise rendering for חֻקִּים in legal-covenantal contexts, distinguishing it from מִשְׁפָּטִים in the next clause.'
- source_word: וּמִשְׁפָּטַי לֹא עֲשִׂיתֶם
  chosen: and whose judgments you have not carried out
  alternatives:
  - and you have not done my judgments
  - and you have not kept my rules
  lexicon: HALOT
  rationale: מִשְׁפָּטִים here refers to the LORD's legal requirements or judicial ordinances. 'Carried out' is more idiomatic than 'done' while remaining close to עשה. 'Judgments' preserves lexical continuity with the final clause.
- source_word: מִשְׁפָּטַי / כְמִשְׁפְּטֵי
  chosen: judgments
  alternatives:
  - ordinances
  - rules
  - customs
  lexicon: HALOT
  rationale: Using 'judgments' in both occurrences preserves the lexical repetition of מִשְׁפָּט. In the final clause the term can shade toward practices/customs, but consistency is preferable here and the comparative phrase clarifies the sense.
- source_word: וּכְמִשְׁפְּטֵי הַגּוֹיִם
  chosen: but you have acted according to the judgments of the nations
  alternatives:
  - but you have done according to the ordinances of the nations
  - but you have acted according to the customs of the nations
  lexicon: HALOT
  rationale: The prefixed conjunction here is adversative in context, contrasting Israel's failure to obey the LORD with conformity to surrounding peoples. 'Acted according to' renders עשה + כ in natural English.
- source_word: הַגּוֹיִם אֲשֶׁר סְבִיבוֹתֵיכֶם
  chosen: the nations that are around you
  alternatives:
  - the nations around you
  - the surrounding nations
  lexicon: HALOT
  rationale: '''Nations'' is the standard rendering of גּוֹיִם here, referring to neighboring peoples. The relative clause is kept explicitly rather than compressed, preserving the Hebrew structure.'
