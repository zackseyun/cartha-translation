theological_decisions:
- issue: Rendering of the divine name in the compound אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Lord the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Ezekiel's final clause
  chosen_reading: will you make a complete end of the remnant of Israel?
  alternative_readings:
  - are you making a complete end of the remnant of Israel?
  - you are making a complete end of the remnant of Israel!
  rationale: The Hebrew lacks an explicit interrogative particle, but in context Ezekiel's cry is a plea of alarm addressed to God, naturally read as a question. This preserves the prophet's intercessory tone without overstating certainty.
