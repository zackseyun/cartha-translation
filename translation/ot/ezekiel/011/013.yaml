id: EZK.11.13
reference: Ezekiel 11:13
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כְּ/הִנָּ֣בְאִ֔/י וּ/פְלַטְיָ֥הוּ בֶן בְּנָיָ֖ה מֵ֑ת וָ/אֶפֹּ֨ל עַל פָּנַ֜/י וָ/אֶזְעַ֣ק קוֹל גָּד֗וֹל וָ/אֹמַר֙ אֲהָהּ֙ אֲדֹנָ֣/י יְהוִ֔ה כָּלָה֙ אַתָּ֣ה עֹשֶׂ֔ה אֵ֖ת שְׁאֵרִ֥ית יִשְׂרָאֵֽל־־־׃פ
translation:
  text: And it happened, as I was prophesying, that Pelatiah son of Benaiah died. Then I fell on my face and cried out with a loud voice and said, “Ah, Lord GOD, will you make a complete end of the remnant of Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'are you making a complete end of the remnant of Israel?' The Hebrew can be read with present or imminent force.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Lord GOD' represents אֲדֹנָי יְהוִה, literally 'Lord YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: כְּהִנָּבְאִי
  chosen: as I was prophesying
  alternatives:
  - while I prophesied
  - as I prophesied
  lexicon: HALOT
  rationale: The prefixed כ plus infinitive construct with 1cs suffix gives a temporal sense, 'as/when I was prophesying.' The progressive English best captures the ongoing action during which the death occurred.
- source_word: וּפְלַטְיָהוּ בֶן־בְּנָיָה
  chosen: that Pelatiah son of Benaiah
  alternatives:
  - and Pelatiah son of Benaiah
  lexicon: HALOT
  rationale: Proper names are transliterated per project philosophy. After 'it happened, as I was prophesying,' English idiom naturally supplies 'that' to introduce the content of the event.
- source_word: מֵת
  chosen: died
  alternatives:
  - was dead
  - dropped dead
  lexicon: HALOT
  rationale: Qal perfect of מות here reports the event of death. 'Died' is the plain and natural rendering.
- source_word: וָאֶפֹּל עַל־פָּנַי
  chosen: Then I fell on my face
  alternatives:
  - and I fell on my face
  - I fell facedown
  lexicon: HALOT
  rationale: A conventional gesture of shock, grief, or supplication. 'On my face' preserves the Hebrew idiom more directly than 'facedown,' while remaining clear.
- source_word: וָאֶזְעַק קוֹל גָּדוֹל
  chosen: and cried out with a loud voice
  alternatives:
  - and shouted loudly
  - and cried out loudly
  lexicon: HALOT
  rationale: זעק denotes a strong cry, often in distress. The object phrase 'with a loud voice' closely reflects קול גדול and preserves the emotional intensity.
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  - Oh no
  lexicon: HALOT
  rationale: An interjection of lament or alarm. 'Ah' is concise and natural in modern literary English; 'Alas' is possible but more archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - Lord the LORD
  lexicon: HALOT
  rationale: The phrase combines אֲדֹנָי with the divine name YHWH. Following the doctrine file, YHWH is rendered 'the LORD'; in the conventional compound אֲדֹנָי יְהוִה, English 'Lord GOD' avoids the awkward 'Lord LORD' and reflects established differentiation of the divine name in this collocation.
- source_word: כָּלָה ... עֹשֶׂה
  chosen: will you make a complete end
  alternatives:
  - are you making a complete end
  - will you completely destroy
  - are you bringing to an end
  lexicon: HALOT
  rationale: כָּלָה as an accusative-like noun with עשה forms the idiom 'make a full end/complete end.' The interrogative force is supplied by context and intonation in Ezekiel's plea. Future English best conveys the sense of impending total destruction in the prophet's question.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  chosen: the remnant of Israel
  alternatives:
  - Israel's remnant
  - what remains of Israel
  lexicon: HALOT
  rationale: שְׁאֵרִית is a key theological term for those left surviving. 'Remnant' preserves that lexical and theological resonance better than a paraphrase.
