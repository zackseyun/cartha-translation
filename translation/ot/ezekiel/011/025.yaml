id: EZK.11.25
reference: Ezekiel 11:25
source:
  edition: WLC
  text: וָ/אֲדַבֵּ֖ר אֶל הַ/גּוֹלָ֑ה אֵ֛ת כָּל דִּבְרֵ֥י יְהוָ֖ה אֲשֶׁ֥ר הֶרְאָֽ/נִי־־׃פ
translation:
  text: Then I spoke to the exiles all the words of Yahweh that he had shown me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the exile,' a collective term for the community of exiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲדַבֵּר
  chosen: Then I spoke
  alternatives:
  - And I spoke
  - So I spoke
  lexicon: HALOT
  rationale: Wayyiqtol of דבר advances the narrative. 'Then I spoke' preserves the sequential force in natural English better than a bare 'And I spoke,' while remaining close to the Hebrew.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English equivalent.
- source_word: הַגּוֹלָה
  chosen: the exiles
  alternatives:
  - the exilic community
  - the captives
  - the exile
  lexicon: HALOT
  rationale: The noun can denote the community of deportees/exiles collectively. 'The exiles' is clear modern English and fits Ezekiel's audience. 'The exile' is more formally literal as a collective singular, but less natural here.
- source_word: אֵת כָּל דִּבְרֵי
  chosen: all the words of
  alternatives:
  - everything that
  - all the matters of
  lexicon: HALOT
  rationale: The direct-object marker plus 'all the words of' is retained fairly literally. 'Words' preserves the verbal-revelatory character better than the more dynamic 'everything that'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר הֶרְאַנִי
  chosen: that he had shown me
  alternatives:
  - which he showed me
  - that he caused me to see
  lexicon: HALOT
  rationale: 'The relative clause modifies ''all the words of the LORD.'' The Hiphil of ראה here conveys showing/revealing. English past perfect (''had shown me'') fits the sequence: after the vision, Ezekiel reported it to the exiles.'
