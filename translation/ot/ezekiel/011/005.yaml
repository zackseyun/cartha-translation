id: EZK.11.5
reference: Ezekiel 11:5
source:
  edition: WLC
  text: וַ/תִּפֹּ֣ל עָלַ/י֮ ר֣וּחַ יְהוָה֒ וַ/יֹּ֣אמֶר אֵלַ֗/י אֱמֹר֙ כֹּה אָמַ֣ר יְהוָ֔ה כֵּ֥ן אֲמַרְתֶּ֖ם בֵּ֣ית יִשְׂרָאֵ֑ל וּ/מַעֲל֥וֹת רֽוּחֲ/כֶ֖ם אֲנִ֥י יְדַעְתִּֽי/הָ־׃
translation:
  text: 'And the Spirit of Yahweh fell upon me, and he said to me, “Say, ‘Thus says Yahweh: So you have said, O house of Israel, and I know the things that come up in your spirit.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what comes into your mind”; Hebrew “the things that come up in your spirit.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּפֹּל עָלַי
  chosen: fell upon me
  alternatives:
  - came upon me
  - fell on me
  lexicon: HALOT
  rationale: נפל with עַל literally denotes falling upon. In prophetic contexts it can describe the Spirit's overpowering arrival. 'Fell upon me' preserves the vividness of the Hebrew better than the smoother 'came upon me.'
- source_word: רוּחַ יְהוָה
  chosen: the Spirit of the LORD
  alternatives:
  - the רוח of the LORD
  - the wind/spirit of the LORD
  lexicon: HALOT
  rationale: רוּחַ here is best understood as God's Spirit in a prophetic empowerment context, not wind or mere disposition. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name through the traditional English small-caps equivalent.
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Speak
  lexicon: HALOT
  rationale: A direct imperative to the prophet. 'Say' is the most natural English equivalent in prophetic speech formulas.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says the LORD' is both accurate and idiomatic.
- source_word: כֵּן אֲמַרְתֶּם
  chosen: This is what you have said
  alternatives:
  - So you have said
  - Thus you have said
  lexicon: HALOT
  rationale: כֵּן plus the verb of saying points back to the content of their speech. 'This is what you have said' is clear modern English while preserving the force.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is retained rather than flattened to 'Israel,' since it is a common covenantal address formula with rhetorical weight.
- source_word: וּמַעֲלוֹת רוּחֲכֶם
  chosen: the things that come up in your spirit
  alternatives:
  - the risings of your spirit
  - what comes into your mind
  - the thoughts that arise in your spirit
  lexicon: HALOT
  rationale: מַעֲלוֹת literally refers to things going up/ascents. In context it denotes inner thoughts or schemes arising within them. 'The things that come up in your spirit' preserves the metaphor while remaining intelligible. 'Mind' is interpretive and possible, but 'spirit' better matches the Hebrew term and keeps the anthropological texture.
- source_word: רוּחֲכֶם
  chosen: your spirit
  alternatives:
  - your mind
  - your heart
  lexicon: HALOT
  rationale: Although contextually it refers to inner thoughts, the Hebrew uses רוּחַ, so 'spirit' is retained in the main text to preserve lexical consistency and avoid over-interpretation.
- source_word: אֲנִי יְדַעְתִּיהָ
  chosen: I know
  alternatives:
  - I have known it
  - I know them
  lexicon: HALOT
  rationale: The suffix likely refers collectively to the preceding plural notion ('the things that come up'), a common Hebrew usage where English smooths the agreement. 'I know' with the object expressed in the preceding phrase yields natural English without obscuring the sense.
