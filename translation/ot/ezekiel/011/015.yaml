id: EZK.11.15
reference: Ezekiel 11:15
source:
  edition: WLC
  text: בֶּן אָדָ֗ם אַחֶ֤י/ךָ אַחֶ֨י/ךָ֙ אַנְשֵׁ֣י גְאֻלָּתֶ֔/ךָ וְ/כָל בֵּ֥ית יִשְׂרָאֵ֖ל כֻּלֹּ֑/ה אֲשֶׁר֩ אָמְר֨וּ לָ/הֶ֜ם יֹשְׁבֵ֣י יְרוּשָׁלִַ֗ם רַֽחֲקוּ֙ מֵ/עַ֣ל יְהוָ֔ה לָ֥/נוּ הִ֛יא נִתְּנָ֥ה הָ/אָ֖רֶץ לְ/מוֹרָשָֽׁה־־׃ס
translation:
  text: Son of man, your brothers, your brothers, the men of your redemption, and all the house of Israel, all of it—these are the ones to whom the inhabitants of Jerusalem have said, ‘Go far away from Yahweh; this land has been given to us as a possession.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men of your kindred,' 'your fellow exiles,' or 'your kinsmen with redemption rights.' The Hebrew phrase is difficult and uses the root for redemption/kinsman-redeemer.
    reason: lexical_alternative
  - marker: b
    text: Or 'as an inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard rendering of Ezekiel’s address formula. It preserves the idiomatic force and established prophetic usage better than a flatter alternative like 'mortal,' while still reflecting Hebrew אָדָם per context.
- source_word: אַחֶיךָ אַחֶיךָ
  chosen: your brothers, your brothers
  alternatives:
  - your brothers and your kinsmen
  - your brothers—your brothers
  lexicon: HALOT
  rationale: The repetition is present in the Hebrew and should be preserved rather than harmonized away. It likely heightens emphasis before the appositional clarification that follows.
- source_word: אַנְשֵׁי גְאֻלָּתֶךָ
  chosen: the men of your redemption
  alternatives:
  - the men of your kinship redemption
  - your fellow exiles
  - the men of your kindred
  lexicon: HALOT
  rationale: גְאֻלָּה language is tied to redemption/kinsman-redeemer concepts. 'Men of your redemption' keeps the lexical connection visible, even though the phrase is difficult. Smoother interpretive renderings like 'fellow exiles' or 'kindred' are possible but import more interpretation than the Hebrew explicitly states.
- source_word: וְכָל בֵּית יִשְׂרָאֵל כֻּלֹּה
  chosen: and all the house of Israel, all of it
  alternatives:
  - and the whole house of Israel, all of them
  - indeed, the entire house of Israel
  lexicon: HALOT
  rationale: Retains the collective singular force of בֵּית with כֻּלֹּה. 'House of Israel' is a standard covenantal expression and should be preserved.
- source_word: אֲשֶׁר
  chosen: these are the ones to whom
  alternatives:
  - who
  - of whom
  lexicon: HALOT
  rationale: The relative clause links the preceding group with the indirect object pronoun לָהֶם. This fuller English rendering makes the syntax clear without changing the sense.
- source_word: יֹשְׁבֵי יְרוּשָׁלַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: A natural English rendering of the participial construction that preserves the contrast between those in Jerusalem and those outside/exiled.
- source_word: רַחֲקוּ מֵעַל יְהוָה
  chosen: Go far away from the LORD
  alternatives:
  - Keep far from the LORD
  - They are far from the LORD
  lexicon: HALOT
  rationale: 'The form is best taken as an imperative/plural command in direct speech: the Jerusalemites tell them to stay away. This fits the quoted taunt. YHWH is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal guideline for the divine name.
- source_word: לָנוּ הִיא נִתְּנָה הָאָרֶץ
  chosen: this land has been given to us
  alternatives:
  - the land has been given to us
  - to us the land was given
  lexicon: HALOT
  rationale: English fronting of 'this land' clarifies the referent in context. The passive preserves the Hebrew Niphal sense.
- source_word: לְמוֹרָשָׁה
  chosen: as a possession
  alternatives:
  - for a possession
  - as an inheritance
  lexicon: HALOT
  rationale: מוֹרָשָׁה denotes a possessed inheritance/holding. 'As a possession' is idiomatic and preserves the claim of ownership being asserted by Jerusalem’s inhabitants.
