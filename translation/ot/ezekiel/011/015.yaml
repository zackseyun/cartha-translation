- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of אַנְשֵׁי גְאֻלָּתֶךָ
  chosen_reading: the men of your redemption
  alternative_readings:
  - your fellow exiles
  - the men of your kindred
  - your kinsmen with redemption rights
  rationale: The phrase is lexically difficult and may point to kinship/redeemer relations. To preserve theological and lexical transparency, the main text keeps the redemption-root visible rather than collapsing it into a purely interpretive social label.
