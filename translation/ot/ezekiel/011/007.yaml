theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphor of flesh/meat and pot
  chosen_reading: 'Retained the metaphor directly: ''they are the meat, and it is the pot'''
  alternative_readings:
  - they are the flesh, and it is the pot
  rationale: The verse overturns the leaders' earlier proverb by identifying the slain as the contents of the pot and Jerusalem as the pot itself. The translation preserves the metaphor rather than interpreting it away.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological tension rather than resolve it
