id: EZK.11.7
reference: Ezekiel 11:7
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ חַלְלֵי/כֶם֙ אֲשֶׁ֣ר שַׂמְתֶּ֣ם בְּ/תוֹכָ֔/הּ הֵ֥מָּה הַ/בָּשָׂ֖ר וְ/הִ֣יא הַ/סִּ֑יר וְ/אֶתְ/כֶ֖ם הוֹצִ֥יא מִ/תּוֹכָֽ/הּ־׃
translation:
  text: 'Therefore thus says the Lord GOD: Your slain whom you have placed in its midst—they are the meat, and it is the pot; but you I will bring out from its midst.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are the flesh.' Hebrew בָּשָׂר can mean 'flesh' or 'meat'; here 'meat' fits the cooking-pot metaphor more naturally in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the divine title pair in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English tradition commonly uses 'Lord GOD' to avoid 'Lord LORD' while still signaling the divine name.
- source_word: חַלְלֵיכֶם
  chosen: your slain
  alternatives:
  - your slain ones
  - your dead
  - your corpses
  lexicon: HALOT
  rationale: The noun refers specifically to those killed or pierced, not merely the dead in general. 'Your slain' is concise and preserves the violent sense better than 'your dead,' while avoiding the crudeness of 'corpses' in the main text.
- source_word: שַׂמְתֶּם
  chosen: have placed
  alternatives:
  - have put
  - have set
  lexicon: HALOT
  rationale: A common verb meaning 'put/set/place.' 'Have placed' fits the solemn tone and works naturally with 'in its midst.'
- source_word: בְּתוֹכָהּ / מִתּוֹכָהּ
  chosen: in its midst / from its midst
  alternatives:
  - inside it / out of it
  - within it / from within it
  lexicon: HALOT
  rationale: The feminine singular suffix refers to the city, personified as a feminine noun. 'Its midst' preserves the metaphorical and spatial force more formally than simply 'inside it.'
- source_word: הֵמָּה הַבָּשָׂר
  chosen: they are the meat
  alternatives:
  - they are the flesh
  lexicon: HALOT
  rationale: In the cooking-pot metaphor, בָּשָׂר refers to edible flesh/meat. 'Meat' communicates the image more clearly in modern English than 'flesh,' which could sound overly literal or evoke different theological associations.
- source_word: הַסִּיר
  chosen: the pot
  alternatives:
  - the cooking pot
  - the cauldron
  lexicon: HALOT
  rationale: The term denotes a pot used for cooking. 'The pot' is simple and clear, and it preserves the metaphor already introduced in the surrounding context. 'Cauldron' is possible but sounds more archaic or stylized.
- source_word: הוֹצִיא
  chosen: I will bring out
  alternatives:
  - he will bring out
  - I will take out
  - I will lead out
  lexicon: HALOT
  rationale: 'Although the Hebrew form is third masculine singular, with divine speech introduced by ''thus says,'' English naturally renders the speaker''s action in the first person: ''I will bring out.'' This reflects standard prophetic discourse and avoids awkwardness. ''Bring out'' is a natural rendering of יצא in the causative.'
