id: EZK.11.8
reference: Ezekiel 11:8
source:
  edition: WLC
  text: חֶ֖רֶב יְרֵאתֶ֑ם וְ/חֶ֨רֶב֙ אָבִ֣יא עֲלֵי/כֶ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: You have feared the sword, and I will bring the sword upon you, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sword.'' The repeated phrase may also carry the broader sense of warfare or violent judgment.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You feared the sword, and a sword I will bring upon you.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - a sword
  - war
  lexicon: HALOT
  rationale: The noun literally denotes 'sword.' In prophetic judgment language it often stands metonymically for violent warfare or execution, but 'the sword' preserves the concrete Hebrew image and the repeated emphasis in this verse.
- source_word: יְרֵאתֶם
  chosen: you have feared
  alternatives:
  - you feared
  - you were afraid of
  lexicon: HALOT
  rationale: Qal perfect 2mp of ירא. 'You have feared' reflects the completed verbal form while remaining natural in English. 'You feared' is possible, but the present-result nuance fits the accusation well.
- source_word: וְחֶרֶב
  chosen: and I will bring the sword
  alternatives:
  - and a sword I will bring
  - and I will bring a sword
  lexicon: HALOT
  rationale: The conjunction links the consequence to the prior clause. Repeating 'the sword' mirrors the Hebrew repetition and gives rhetorical force. Using the definite article in English is idiomatic for the repeated judgment image.
- source_word: אָבִיא עֲלֵיכֶם
  chosen: I will bring upon you
  alternatives:
  - I will bring against you
  - I will bring over you
  lexicon: HALOT
  rationale: Hiphil of בוא with עַל commonly means to bring something upon someone, especially judgment. 'Upon you' is the most direct and preserves the prophetic register; 'against you' is interpretive but possible.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: In the formula נְאֻם אֲדֹנָי יְהוִה, 'declares' is a standard, natural English rendering that conveys prophetic solemnity without archaic stiffness.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD Yahweh
  lexicon: HALOT
  rationale: Following the doctrine guideline, יְהוָה is rendered 'the LORD.' In the fixed combination אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD' while still signaling the divine name behind the second term.
