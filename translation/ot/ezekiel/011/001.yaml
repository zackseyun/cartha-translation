theological_decisions:
- issue: Identification of רוּחַ in Ezekiel's visionary transport
  chosen_reading: the Spirit refers to the divine Spirit
  alternative_readings:
  - a spirit
  - wind
  rationale: The immediate literary context of Ezekiel's visions repeatedly uses רוח for the divine agent who transports or empowers the prophet. Rendering it as 'the Spirit' preserves that theological force without over-specifying beyond the context.
  doctrine_reference: Preserve theological tension rather than resolve it; here the context sufficiently supports a specific reading.
