id: EZK.11.1
reference: Ezekiel 11:1
source:
  edition: WLC
  text: וַ/תִּשָּׂ֨א אֹתִ֜/י ר֗וּחַ וַ/תָּבֵ֣א אֹ֠תִ/י אֶל שַׁ֨עַר בֵּית יְהוָ֤ה הַ/קַּדְמוֹנִי֙ הַ/פּוֹנֶ֣ה קָדִ֔ימָ/ה וְ/הִנֵּה֙ בְּ/פֶ֣תַח הַ/שַּׁ֔עַר עֶשְׂרִ֥ים וַ/חֲמִשָּׁ֖ה אִ֑ישׁ וָ/אֶרְאֶ֨ה בְ/תוֹכָ֜/ם אֶת יַאֲזַנְיָ֧ה בֶן עַזֻּ֛ר וְ/אֶת פְּלַטְיָ֥הוּ בֶן בְּנָיָ֖הוּ שָׂרֵ֖י הָ/עָֽם־־־־־־׃פ
translation:
  text: Then the Spirit lifted me up and brought me to the east gate of the house of Yahweh, which faces eastward. And behold, at the entrance of the gate were twenty-five men, and I saw among them Jaazaniah son of Azzur and Pelatiah son of Benaiah, leaders of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit lifted me up'; Hebrew רוּחַ can also mean 'wind' or 'spirit,' but in Ezekiel's vision context it most likely refers to the divine Spirit.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the gate of the house of the LORD'; that is, the temple gate.
    reason: cultural_note
  - marker: c
    text: Or 'princes of the people' or 'officials of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחַ
  chosen: the Spirit
  alternatives:
  - a spirit
  - wind
  lexicon: HALOT
  rationale: In Ezekiel's vision context, the feminine singular subject that lifts and transports the prophet refers most naturally to the divine Spirit rather than an indefinite spirit or literal wind. The definite article is supplied in English for naturalness and because the referent is contextually specific.
- source_word: וַתִּשָּׂא אֹתִי
  chosen: lifted me up
  alternatives:
  - carried me
  - raised me
  lexicon: HALOT
  rationale: נשא with the prophet as object in visionary transport contexts is well rendered 'lifted me up,' preserving the vivid motion without over-paraphrase.
- source_word: וַתָּבֵא אֹתִי
  chosen: brought me
  alternatives:
  - took me
  - carried me
  lexicon: HALOT
  rationale: בוא in the Hiphil commonly means 'bring.' This keeps the sequence of transport clear and idiomatic in English.
- source_word: שַׁעַר בֵּית יְהוָה
  chosen: the gate of the house of the LORD
  alternatives:
  - the gate of the temple of the LORD
  - the gate of the LORD's house
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the Hebrew expression 'house of the LORD' rather than immediately interpreting it as 'temple,' though the referent is the temple complex.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance with the doctrine table.
- source_word: הַקַּדְמוֹנִי
  chosen: east
  alternatives:
  - eastern
  - front
  lexicon: HALOT
  rationale: With 'gate,' English idiom prefers 'east gate.' The adjective denotes the eastern gate specifically.
- source_word: הַפּוֹנֶה קָדִימָה
  chosen: which faces eastward
  alternatives:
  - facing east
  - which looks eastward
  lexicon: HALOT
  rationale: This participial phrase is retained to reflect the Hebrew's descriptive redundancy and spatial precision.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - and there
  lexicon: HALOT
  rationale: '''Behold'' preserves the discourse marker''s vividness and prophetic style better than flatter alternatives.'
- source_word: בְּפֶתַח הַשַּׁעַר
  chosen: at the entrance of the gate
  alternatives:
  - in the opening of the gate
  - at the gateway
  lexicon: HALOT
  rationale: This gives a natural but still fairly literal rendering of the location.
- source_word: עֶשְׂרִים וַחֲמִשָּׁה אִישׁ
  chosen: twenty-five men
  alternatives:
  - twenty-five persons
  lexicon: HALOT
  rationale: איש is masculine singular used collectively here; 'men' is gender-accurate and matches the source better than a neutral term.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: Idiomatic English for the collective setting while preserving the sense of being within the group.
- source_word: שָׂרֵי הָעָם
  chosen: leaders of the people
  alternatives:
  - princes of the people
  - officials of the people
  lexicon: HALOT
  rationale: שׂרים denotes rulers or officials. 'Leaders' is accessible modern English and broad enough to cover civic authority without implying hereditary nobility as 'princes' might.
