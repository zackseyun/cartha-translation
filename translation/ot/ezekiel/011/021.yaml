id: EZK.11.21
reference: Ezekiel 11:21
source:
  edition: WLC
  text: וְ/אֶל לֵ֧ב שִׁקּוּצֵי/הֶ֛ם וְ/תוֹעֲבוֹתֵי/הֶ֖ם לִבָּ֣/ם הֹלֵ֑ךְ דַּרְכָּ/ם֙ בְּ/רֹאשָׁ֣/ם נָתַ֔תִּי נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃
translation:
  text: But as for those whose heart goes after their detestable things and their abominations, I have brought their way upon their own heads, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'their heart goes to the heart of their detestable things and their abominations,' an idiom meaning they are inwardly devoted to them.
    reason: lexical_alternative
  - marker: b
    text: Or 'their idols' for 'their detestable things'; the Hebrew term often refers to abhorrent cult objects.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֶל
  chosen: But as for
  alternatives:
  - and to
  - but toward
  - but as for those directed toward
  lexicon: HALOT
  rationale: The phrase introduces a contrast with the preceding promise to the obedient/remnant in v. 19–20. A wooden 'and to' is awkward in English; 'But as for' captures the adversative and topical force in context.
- source_word: לֵב ... לִבָּם הֹלֵךְ
  chosen: whose heart goes after
  alternatives:
  - whose heart walks toward
  - their heart is going after
  - whose mind follows
  lexicon: HALOT
  rationale: Hebrew literally has 'to the heart of ... their heart is going.' The idiom expresses inward devotion or pursuit. 'Whose heart goes after' preserves the heart-language and the metaphor of following without over-paraphrasing.
- source_word: שִׁקּוּצֵיהֶם
  chosen: their detestable things
  alternatives:
  - their idols
  - their vile things
  - their abominations
  lexicon: HALOT
  rationale: שִׁקּוּץ often denotes a detestable object, frequently an idol, but the noun itself is broader than 'idol.' 'Detestable things' preserves the lexical force while allowing the paired term תּוֹעֵבָה to retain its own nuance.
- source_word: וְתוֹעֲבוֹתֵיהֶם
  chosen: their abominations
  alternatives:
  - their abhorrent things
  - their detestable practices
  lexicon: HALOT
  rationale: A common prophetic term for ritually/morally abhorrent things. 'Abominations' is traditional but still understandable and preserves the gravity and distinction from שִׁקּוּצִים.
- source_word: דַּרְכָּם
  chosen: their way
  alternatives:
  - their conduct
  - their path
  - their deeds
  lexicon: HALOT
  rationale: '''Way'' is a standard Hebrew metaphor for conduct and is concise. It also fits the idiom ''bring one''s way on one''s head'' better than a more interpretive gloss.'
- source_word: בְּרֹאשָׁם
  chosen: upon their own heads
  alternatives:
  - on their heads
  - back on their heads
  lexicon: HALOT
  rationale: This idiom conveys recompense returning upon the person. 'Their own heads' makes the reflexive sense explicit in natural English.
- source_word: נָתַתִּי
  chosen: I have brought
  alternatives:
  - I have put
  - I have set
  - I have given
  lexicon: HALOT
  rationale: In the idiom 'put/set their way on their head,' English 'brought' communicates enacted recompense more naturally than the overly literal 'put' while staying close to the source.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  - declares the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula best rendered 'declares.' אֲדֹנָי יְהוִה is conventionally 'Lord GOD' in English to reflect Adonai + YHWH without the awkward 'Lord LORD.' Per doctrine, YHWH is rendered 'the LORD'; in this fixed combination, 'Lord GOD' is the standard equivalent preserving reverential distinction.
