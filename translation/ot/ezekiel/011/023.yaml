id: EZK.11.23
reference: Ezekiel 11:23
source:
  edition: WLC
  text: וַ/יַּ֨עַל֙ כְּב֣וֹד יְהוָ֔ה מֵ/עַ֖ל תּ֣וֹךְ הָ/עִ֑יר וַֽ/יַּעֲמֹד֙ עַל הָ/הָ֔ר אֲשֶׁ֖ר מִ/קֶּ֥דֶם לָ/עִֽיר־׃
translation:
  text: And the glory of Yahweh went up from the midst of the city and stood on the mountain that is east of the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "ascended" for "went up."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "which is east of the city"; possibly "which is in front of the city," depending on spatial orientation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - rose up
  lexicon: HALOT
  rationale: The verb עלה commonly means 'go up/ascend.' 'Went up' preserves the concrete motion in readable English and fits the visionary movement of the glory departing the city.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: A standard rendering that preserves the construct relationship and the theological weight of כבוד as manifested divine glory. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵעַל תּוֹךְ הָעִיר
  chosen: from the midst of the city
  alternatives:
  - from over the middle of the city
  - from within the city
  lexicon: HALOT
  rationale: The phrase combines מֵעַל ('from upon/above') with תּוֹךְ ('midst, middle'). In context, idiomatic English is best served by 'from the midst of the city,' conveying departure from the city's interior/center without awkward literalism.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - came to stand
  - stopped
  lexicon: HALOT
  rationale: עמד straightforwardly means 'stand.' 'Stood' preserves the simple narrative sequence and avoids over-interpretation.
- source_word: עַל הָהָר
  chosen: on the mountain
  alternatives:
  - upon the mountain
  - on the hill
  lexicon: HALOT
  rationale: הַר normally denotes 'mountain/hill country'; here 'mountain' is the more natural rendering in this well-known topographical reference and matches the solemn tone.
- source_word: אֲשֶׁר מִקֶּדֶם לָעִיר
  chosen: that is east of the city
  alternatives:
  - which is before the city on the east
  - which is to the east of the city
  lexicon: HALOT
  rationale: מִקֶּדֶם can denote 'east of' or 'in front of' depending on orientation. In geographical description, 'east of the city' is the clearest and most likely sense.
