id: EZK.11.17
reference: Ezekiel 11:17
source:
  edition: WLC
  text: לָ/כֵ֣ן אֱמֹ֗ר כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ וְ/קִבַּצְתִּ֤י אֶתְ/כֶם֙ מִן הָ֣/עַמִּ֔ים וְ/אָסַפְתִּ֣י אֶתְ/כֶ֔ם מִן הָ֣/אֲרָצ֔וֹת אֲשֶׁ֥ר נְפֹצוֹתֶ֖ם בָּ/הֶ֑ם וְ/נָתַתִּ֥י לָ/כֶ֖ם אֶת אַדְמַ֥ת יִשְׂרָאֵֽל־־־־׃
translation:
  text: 'Therefore say, ‘Thus says the Lord GOD: I will gather you from the peoples and assemble you from the lands where you have been scattered, and I will give you the land of Israel.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the peoples''; alternatively, ''the nations.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the Lord GOD'' represents אֲדֹנָי יְהוִה; alternatively, ''the Lord Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding oracle; 'Therefore' preserves the formal prophetic linkage.
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - declare
  lexicon: HALOT
  rationale: Imperative to the prophet; 'say' is the plain and idiomatic rendering in prophetic speech formulas.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says' preserves the solemnity and recognizable form without unnecessary archaism.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The phrase combines אֲדֹנָי with the divine name YHWH. Per doctrine, יְהוָה is rendered 'the LORD'; in the compound title, standard English convention 'the Lord GOD' avoids the awkward 'Lord LORD' while still translating both elements.
- source_word: וְקִבַּצְתִּי
  chosen: I will gather
  alternatives:
  - I will collect
  lexicon: HALOT
  rationale: קבץ commonly denotes gathering dispersed persons. 'Gather' is the natural English equivalent and fits restoration-from-exile context.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים is more literally 'peoples.' 'Nations' is possible, but 'peoples' better reflects the lexical form here and avoids flattening the distinction with the next term.
- source_word: וְאָסַפְתִּי
  chosen: assemble
  alternatives:
  - gather
  - bring together
  lexicon: HALOT
  rationale: אָסַף overlaps with קבץ, but varying the English to 'assemble' preserves readability while still conveying near-synonymous restoration language. The semantic distinction is slight, so this is a documented stylistic variance rather than a change in meaning.
- source_word: הָאֲרָצוֹת
  chosen: the lands
  alternatives:
  - the countries
  - the earths
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to multiple territories/countries of dispersion. 'Lands' is broad and natural in English, fitting exile geography.
- source_word: אֲשֶׁר נְפֹצוֹתֶם בָּהֶם
  chosen: where you have been scattered
  alternatives:
  - into which you were scattered
  - among which you were scattered
  lexicon: HALOT
  rationale: The clause modifies 'lands' and expresses the state resulting from dispersion. 'Where you have been scattered' is idiomatic and captures the passive/resultative sense without overcomplication.
- source_word: וְנָתַתִּי לָכֶם
  chosen: and I will give you
  alternatives:
  - and I will grant to you
  lexicon: HALOT
  rationale: Simple future of נתן with indirect object; 'give you' is direct and natural.
- source_word: אַדְמַת יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - the soil of Israel
  - Israel's ground
  lexicon: HALOT
  rationale: אַדְמָה can mean ground/soil/land. In a restoration oracle about return from exile, 'the land of Israel' best conveys territorial inheritance rather than merely soil.
