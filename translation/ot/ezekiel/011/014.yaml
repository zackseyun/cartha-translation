id: EZK.11.14
reference: Ezekiel 11:14
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Then ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential introduction. In English, the idiomatic prophetic formula is best rendered by folding the existential verb into the clause 'the word ... came' rather than the wooden 'and it happened.' This preserves sense while maintaining the formal prophetic cadence.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the construct phrase דְבַר יְהוָה, 'word' is the standard and contextually precise rendering for prophetic revelation. 'Message' is possible but less formally tied to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition with first-person singular suffix straightforwardly indicates direction toward the prophet. 'To me' is accurate modern English; 'unto me' is unnecessarily archaic.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech in Hebrew narrative and prophetic discourse. 'Saying' is the conventional and natural English equivalent.
