id: EZK.37.19
reference: Ezekiel 37:19
source:
  edition: WLC
  text: דַּבֵּ֣ר אֲלֵ/הֶ֗ם כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ הִנֵּה֩ אֲנִ֨י לֹקֵ֜חַ אֶת עֵ֤ץ יוֹסֵף֙ אֲשֶׁ֣ר בְּ/יַד אֶפְרַ֔יִם וְ/שִׁבְטֵ֥י יִשְׂרָאֵ֖ל חבר/ו וְ/נָתַתִּי֩ אוֹתָ֨/ם עָלָ֜י/ו אֶת עֵ֣ץ יְהוּדָ֗ה וַֽ/עֲשִׂיתִ/ם֙ לְ/עֵ֣ץ אֶחָ֔ד וְ/הָי֥וּ אֶחָ֖ד בְּ/יָדִֽ/י־־־־׃
translation:
  text: 'tell them, ‘Thus says the Lord GOD: Behold, I am taking the stick of Joseph, which is in the hand of Ephraim, and the tribes of Israel associated with him, and I will place them with it, with the stick of Judah, and make them one stick, and they will be one in my hand.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the tribes of Israel his companions” or “the tribes of Israel joined to him.” The Hebrew form likely refers to the tribes associated with Joseph/Ephraim.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “I will put them upon it, with the stick of Judah.” The wording depicts the symbolic joining of the two sticks into one.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר אֲלֵהֶם
  chosen: tell them
  alternatives:
  - speak to them
  - say to them
  lexicon: HALOT
  rationale: Imperative of דבר with אל commonly introduces direct prophetic address. 'Tell them' is natural modern English while preserving the command force.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord Yahweh
  - This is what the Lord GOD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. אֲדֹנָי יְהוִה is rendered 'the Lord GOD' to distinguish Adonai + YHWH and to follow the doctrine default of rendering YHWH as 'the LORD'; in this combined title, 'GOD' conventionally represents YHWH.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Marks solemn divine attention. 'Behold' preserves prophetic weight better than the more colloquial alternatives.
- source_word: לֹקֵחַ
  chosen: I am taking
  alternatives:
  - I take
  - I will take
  lexicon: HALOT
  rationale: The participle with הִנֵּה often has imminent or vivid present force. 'I am taking' captures the enacted-sign immediacy.
- source_word: עֵץ
  chosen: stick
  alternatives:
  - wood
  - piece of wood
  - tree
  lexicon: HALOT
  rationale: In this symbolic action context, the object is a wooden stick/rod used as a writing surface or sign-object, not a living tree. 'Stick' is the clearest contextual rendering and matches the repeated imagery in the passage.
- source_word: עֵץ יוֹסֵף
  chosen: the stick of Joseph
  alternatives:
  - the wood of Joseph
  lexicon: HALOT
  rationale: Construct phrase identifying the symbolic stick representing Joseph/the northern kingdom.
- source_word: אֲשֶׁר בְּיַד אֶפְרַיִם
  chosen: which is in the hand of Ephraim
  alternatives:
  - which belongs to Ephraim
  - which is for Ephraim
  lexicon: HALOT
  rationale: ביד literally means 'in the hand of.' Here it likely denotes possession/representation, but the literal image is important because 'hand' recurs at the end of the verse.
- source_word: וְשִׁבְטֵי יִשְׂרָאֵל חברו
  chosen: and the tribes of Israel associated with him
  alternatives:
  - and the tribes of Israel his companions
  - and the tribes of Israel joined to him
  lexicon: HALOT
  rationale: The ketiv-like form חברו is understood from חבר, 'associate/join,' with 3ms suffix. 'Associated with him' communicates the relational sense in clear English; 'his companions' is possible but less natural in this political-tribal context.
- source_word: וְנָתַתִּי אוֹתָם עָלָיו
  chosen: and I will place them with it
  alternatives:
  - and I will put them upon it
  - and I will join them to it
  lexicon: HALOT
  rationale: Literally 'I will put them on/upon it.' Because the action concerns combining symbolic sticks, 'place them with it' expresses the joining action in idiomatic English without over-paraphrasing. The plural object refers to Joseph/Ephraim and the associated tribes as represented collectively.
- source_word: אֶת עֵץ יְהוּדָה
  chosen: with the stick of Judah
  alternatives:
  - namely, the stick of Judah
  - even the stick of Judah
  lexicon: HALOT
  rationale: The את here marks the additional object in apposition/association. Rendering with 'with' makes the combining action explicit in English syntax.
- source_word: וַעֲשִׂיתִם לְעֵץ אֶחָד
  chosen: and make them one stick
  alternatives:
  - and make them into one stick
  - and fashion them as one stick
  lexicon: HALOT
  rationale: עשה + ל expresses making into something. 'Make them one stick' is concise and natural.
- source_word: וְהָיוּ אֶחָד בְּיָדִי
  chosen: and they will be one in my hand
  alternatives:
  - and they will become one in my hand
  lexicon: HALOT
  rationale: 'Retains the important hand imagery: formerly in Ephraim''s hand, finally one in God''s hand. Singular ''one'' reflects the Hebrew predicate.'
