id: EZK.37.1
reference: Ezekiel 37:1
source:
  edition: WLC
  text: הָיְתָ֣ה עָלַ/י֮ יַד יְהוָה֒ וַ/יּוֹצִאֵ֤/נִי בְ/ר֨וּחַ֙ יְהוָ֔ה וַ/יְנִיחֵ֖/נִי בְּ/ת֣וֹךְ הַ/בִּקְעָ֑ה וְ/הִ֖יא מְלֵאָ֥ה עֲצָמֽוֹת־׃
translation:
  text: The hand of Yahweh was upon me, and he brought me out by the Spirit of Yahweh and set me down in the middle of the valley; it was full of bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the Spirit of the LORD.' The Hebrew phrase can express either instrument ('by the Spirit') or sphere/state ('in the Spirit').
    reason: lexical_alternative
  - marker: b
    text: '''Valley'' may also be rendered ''plain'' or ''broad valley.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the LORD's hand
  lexicon: HALOT
  rationale: A standard prophetic idiom for the LORD's power or compelling influence coming upon the prophet. Retaining 'hand' preserves the concrete Hebrew imagery rather than paraphrasing it as 'power' or 'presence'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיּוֹצִאֵנִי
  chosen: he brought me out
  alternatives:
  - he led me out
  - he took me out
  lexicon: HALOT
  rationale: The hiphil of יצא commonly means 'bring out' or 'lead out.' 'Brought me out' is natural English and preserves the causative sense without overinterpreting the mode of movement.
- source_word: בְּרוּחַ יְהוָה
  chosen: by the Spirit of the LORD
  alternatives:
  - in the Spirit of the LORD
  - by the wind of the LORD
  lexicon: HALOT
  rationale: רוּחַ can mean 'spirit,' 'wind,' or 'breath.' In this prophetic transport context, 'Spirit of the LORD' best fits the idiom and preserves the theological force of divine agency. 'By' is chosen to express instrumental agency in idiomatic English.
- source_word: וַיְנִיחֵנִי
  chosen: and set me down
  alternatives:
  - and placed me
  - and caused me to rest
  lexicon: HALOT
  rationale: The hiphil of נוח here describes causing Ezekiel to come to rest at a location. 'Set me down' is vivid and natural, matching the movement sequence of being brought out and then positioned.
- source_word: בְּתוֹךְ הַבִּקְעָה
  chosen: in the middle of the valley
  alternatives:
  - in the midst of the valley
  - in the middle of the plain
  lexicon: HALOT
  rationale: בִּקְעָה can denote a valley plain or broad valley. 'Valley' fits the immediate imagery and common English expectation for this passage, while 'in the middle of' renders בְּתוֹךְ clearly and naturally.
- source_word: מְלֵאָה עֲצָמוֹת
  chosen: full of bones
  alternatives:
  - filled with bones
  lexicon: HALOT
  rationale: A straightforward adjectival clause. 'Full of bones' is concise and preserves the starkness of the Hebrew image.
