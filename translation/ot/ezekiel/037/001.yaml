theological_decisions:
- issue: Meaning of רוּחַ in prophetic transport
  chosen_reading: Spirit of the LORD
  alternative_readings:
  - wind of the LORD
  rationale: Although רוּחַ is semantically broad, the context of prophetic experience and divine action favors 'Spirit' rather than a merely meteorological 'wind.' This preserves the text's theological tension without reducing it to impersonal force.
