theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Semantic choice for רוּחַ
  chosen_reading: breath
  alternative_readings:
  - spirit
  - wind
  rationale: The verse depicts the impartation of life to dry bones, so 'breath' best matches the immediate image. However, the Hebrew intentionally resonates with 'spirit' and 'wind' elsewhere in the chapter, so alternatives are preserved in a footnote rather than collapsed dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
