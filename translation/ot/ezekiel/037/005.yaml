id: EZK.37.5
reference: Ezekiel 37:5
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה לָ/עֲצָמ֖וֹת הָ/אֵ֑לֶּה הִנֵּ֨ה אֲנִ֜י מֵבִ֥יא בָ/כֶ֛ם ר֖וּחַ וִ/חְיִיתֶֽם׃
translation:
  text: 'Thus says the Lord GOD to these bones: Behold, I am bringing breath into you, and you shall live.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew רוּחַ can also mean 'spirit' or 'wind.' Here 'breath' fits the immediate image of lifeless bones receiving life, but the broader ambiguity is significant in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is how
  - So
  lexicon: HALOT
  rationale: Standard prophetic discourse marker introducing a divine declaration; 'Thus' preserves the formal prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in prophetic messenger formulas it functions performatively/presently in English: ''Thus says...'' rather than ''Thus said...''.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD Yahweh
  lexicon: HALOT
  rationale: The compound divine title is conventionally and accurately rendered 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; in the fixed combination אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by using 'Lord GOD.' This preserves the distinction without awkwardness.
- source_word: לָעֲצָמוֹת הָאֵלֶּה
  chosen: to these bones
  alternatives:
  - concerning these bones
  lexicon: HALOT
  rationale: The preposition ל marks the addressee of the speech in context; 'to these bones' is the plain sense.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retained as 'Behold' to preserve the solemn, attention-directing force of the divine announcement. It remains understandable in modern literary English.
- source_word: מֵבִיא
  chosen: am bringing
  alternatives:
  - will bring
  - am about to bring
  lexicon: HALOT
  rationale: The participle with הִנֵּה and אֲנִי gives an imminent/presently initiated sense. 'I am bringing' preserves that aspect better than a simple future.
- source_word: בָכֶם
  chosen: into you
  alternatives:
  - in you
  lexicon: HALOT
  rationale: With the motion verb 'bring,' English idiom prefers 'into you.' This also highlights the impartation of life to the bones.
- source_word: רוּחַ
  chosen: breath
  alternatives:
  - spirit
  - wind
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or spirit. In the immediate context of lifeless bones being made alive, 'breath' best fits the animation imagery and echoes Genesis-like life impartation, while preserving the concrete sense. The broader polyvalence is worth preserving in a footnote.
- source_word: וִחְיִיתֶם
  chosen: and you shall live
  alternatives:
  - and you will live
  - and you shall come to life
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this prophetic sequence carries future/result sense. 'You shall live' is concise, solemn, and fitting for the restoration oracle.
