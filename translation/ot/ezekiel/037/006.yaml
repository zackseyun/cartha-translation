id: EZK.37.6
reference: Ezekiel 37:6
source:
  edition: WLC
  text: וְ/נָתַתִּי֩ עֲלֵי/כֶ֨ם גִּדִ֜ים וְֽ/הַעֲלֵתִ֧י עֲלֵי/כֶ֣ם בָּשָׂ֗ר וְ/קָרַמְתִּ֤י עֲלֵי/כֶם֙ ע֔וֹר וְ/נָתַתִּ֥י בָ/כֶ֛ם ר֖וּחַ וִ/חְיִיתֶ֑ם וִ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־׃
translation:
  text: I will put sinews on you, and I will bring flesh up over you, and I will cover you with skin, and I will put breath in you, and you will live. Then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirit' or 'wind'; the Hebrew word רוּחַ can carry all three senses, and Ezekiel 37 plays on that range.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּדִים
  chosen: sinews
  alternatives:
  - tendons
  lexicon: HALOT
  rationale: Refers to the connective tissues joining the bones in this resurrection vision. 'Sinews' is the traditional and still intelligible anatomical term; 'tendons' is possible but slightly narrower and more clinical.
- source_word: וְהַעֲלֵתִי עֲלֵיכֶם בָּשָׂר
  chosen: I will bring flesh up over you
  alternatives:
  - I will put flesh on you
  - I will cause flesh to come upon you
  lexicon: HALOT
  rationale: The Hiphil of עלה is causative, literally 'cause to come up.' 'Bring flesh up over you' preserves the vivid sequential imagery of re-formation better than the flatter 'put flesh on you,' while remaining natural English.
- source_word: וְקָרַמְתִּי עֲלֵיכֶם עוֹר
  chosen: I will cover you with skin
  alternatives:
  - I will spread skin over you
  - I will put skin on you
  lexicon: HALOT
  rationale: The verb conveys covering or overlaying. 'Cover you with skin' is clear, idiomatic, and fits the bodily restoration sequence.
- source_word: רוּחַ
  chosen: breath
  alternatives:
  - spirit
  - wind
  lexicon: HALOT
  rationale: In this immediate clause, the result is bodily animation ('and you will live'), so 'breath' best fits the life-giving sense in context. The broader passage intentionally plays on the semantic range of רוּחַ, but here 'breath' is the most precise local rendering.
- source_word: וִחְיִיתֶם
  chosen: you will live
  alternatives:
  - you will come to life
  lexicon: HALOT
  rationale: A straightforward future/result clause. 'You will live' is concise and faithful; 'come to life' is interpretive and slightly more expansive.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  chosen: Then you will know that I am the LORD
  alternatives:
  - and you will know that I am the LORD
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English 'Then' appropriately conveys the sequence and result after restoration. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving reverential convention and alignment with the doctrine guidelines.
