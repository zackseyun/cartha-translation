theological_decisions:
- issue: Rendering of רוּחַ in a context where the term can mean breath, spirit, or wind
  chosen_reading: breath
  alternative_readings:
  - spirit
  - wind
  rationale: 'The immediate context emphasizes the reanimation of bodies: sinews, flesh, skin, then רוּחַ, followed by ''you will live.'' This favors ''breath'' in the main text. Because Ezekiel 37 as a whole exploits the multivalence of רוּחַ, the alternatives are preserved in a footnote rather than being collapsed into a doctrinally loaded choice.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
