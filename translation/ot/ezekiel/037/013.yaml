id: EZK.37.13
reference: Ezekiel 37:13
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֣י יְהוָ֑ה בְּ/פִתְחִ֣/י אֶת קִבְרֽוֹתֵי/כֶ֗ם וּ/בְ/הַעֲלוֹתִ֥/י אֶתְ/כֶ֛ם מִ/קִּבְרוֹתֵי/כֶ֖ם עַמִּֽ/י־־׃
translation:
  text: Then you will know that I am Yahweh, when I open your graves and bring you up from your graves, O my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And you will know that I am the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and raise you up from your graves.' The Hebrew verb literally means 'cause to go up' or 'bring up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in prophetic discourse commonly carries a future/result sense. 'Then' brings out the consequential force in context, while 'will know' reflects the expected future meaning.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּפִתְחִי
  chosen: when I open
  alternatives:
  - in my opening
  - as I open
  lexicon: HALOT
  rationale: 'The preposition ב with infinitive construct plus suffix is best rendered temporally here: ''when I open.'' This is more natural English while preserving the temporal force of the Hebrew construction.'
- source_word: קִבְרוֹתֵיכֶם
  chosen: your graves
  alternatives:
  - your tombs
  - your burial places
  lexicon: HALOT
  rationale: קבר denotes a grave or burial place. 'Graves' is the most direct and idiomatic rendering in this resurrection-restoration context.
- source_word: וּבְהַעֲלוֹתִי
  chosen: and bring you up
  alternatives:
  - and raise you up
  - and cause you to come up
  lexicon: HALOT
  rationale: The Hiphil of עלה means 'cause to go up/bring up.' 'Bring you up' preserves the concrete movement out of the graves. 'Raise you up' is possible, but could over-specify a theological nuance beyond the verb's basic causative sense.
- source_word: מִקִּבְרוֹתֵיכֶם
  chosen: from your graves
  alternatives:
  - out of your graves
  lexicon: HALOT
  rationale: The preposition מן marks source. 'From your graves' is straightforward and pairs naturally with 'bring you up'; 'out of' is also possible but not necessary in the main text.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Direct address appositionally identifies the audience as God's covenant people. 'My people' preserves both the relational and covenantal force.
