theological_decisions:
- issue: Whether the verse should be rendered in a way that resolves the vision as purely metaphorical national restoration or as language evocative of bodily resurrection
  chosen_reading: Retain the grave-opening and bringing-up language directly without interpretive narrowing
  alternative_readings:
  - Render more metaphorically as national restoration from exile
  - Render more explicitly as bodily resurrection
  rationale: The Hebrew uses concrete resurrection-like imagery within Ezekiel's restoration vision. To preserve theological tension, the translation keeps the literal imagery ('open your graves,' 'bring you up from your graves') and does not force either a purely metaphorical or fully eschatological reading in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
