theological_decisions:
- issue: Whether רוּחִי should be rendered impersonally ('breath') or personally/theologically ('Spirit')
  chosen_reading: my Spirit
  alternative_readings:
  - my breath
  - my spirit
  rationale: The immediate chapter plays on the semantic range of רוח, but in this verse the possessive 'my' and the covenant-restoration context support a divine-gift reading rather than merely animating breath. Rendering 'my Spirit' preserves the theological force without denying the chapter's wordplay.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
