id: EZK.37.14
reference: Ezekiel 37:14
source:
  edition: WLC
  text: וְ/נָתַתִּ֨י רוּחִ֤/י בָ/כֶם֙ וִ/חְיִיתֶ֔ם וְ/הִנַּחְתִּ֥י אֶתְ/כֶ֖ם עַל אַדְמַתְ/כֶ֑ם וִ/ידַעְתֶּ֞ם כִּי אֲנִ֧י יְהוָ֛ה דִּבַּ֥רְתִּי וְ/עָשִׂ֖יתִי נְאֻם יְהוָֽה־־־׃פ
translation:
  text: I will put my Spirit within you, and you will live, and I will settle you on your own land. Then you will know that I am Yahweh. I have spoken, and I have done it, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my breath' or 'my spirit'; the Hebrew word can also mean 'wind.' Ezekiel 37 intentionally echoes this range of meaning.
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחִי
  chosen: my Spirit
  alternatives:
  - my breath
  - my wind
  - my spirit
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In Ezekiel 37 the term intentionally resonates with breath/spirit, but here the 1cs suffix and divine action favor 'my Spirit' as the most natural rendering in context, while preserving the broader semantic field in a footnote-worthy alternative list.
- source_word: וִחְיִיתֶם
  chosen: you will live
  alternatives:
  - you will come to life
  - you will revive
  lexicon: HALOT
  rationale: The verb חיה denotes living or coming to life. 'You will live' is concise and natural, and it fits both the immediate resurrection imagery and the broader restoration promise without overinterpreting the mode.
- source_word: וְהִנַּחְתִּי אֶתְכֶם עַל אַדְמַתְכֶם
  chosen: I will settle you on your own land
  alternatives:
  - I will place you on your land
  - I will set you on your land
  - I will cause you to rest on your land
  lexicon: HALOT
  rationale: The Hiphil of נוח/נחה-related form here conveys causing to rest, placing, or settling. In restoration context, 'settle you' captures both placement and secure repose. 'Your own land' makes the possessive force of אַדְמַתְכֶם idiomatic in English.
- source_word: אַדְמַתְכֶם
  chosen: your own land
  alternatives:
  - your land
  - your soil
  - your ground
  lexicon: HALOT
  rationale: אדמה is literally ground/soil/land. In prophetic restoration context it refers to Israel's land. 'Your own land' is idiomatic and emphasizes restored possession without adding content beyond the possessive suffix.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  chosen: Then you will know that I am the LORD
  alternatives:
  - and you will know that I am the LORD
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in English 'Then' clarifies the resultative sequence after restoration. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבַּרְתִּי וְעָשִׂיתִי
  chosen: I have spoken, and I have done it
  alternatives:
  - I spoke and I did it
  - I have spoken and acted
  - I have said it and done it
  lexicon: HALOT
  rationale: The perfects present the certainty and completeness of YHWH's word and action. English present perfect communicates this well in prophetic declaration. 'Done it' supplies the implied object naturally in English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: This standard prophetic formula is best rendered idiomatically as 'declares the LORD' in readable modern English, while preserving prophetic authority.
