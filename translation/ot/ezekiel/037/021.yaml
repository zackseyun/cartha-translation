id: EZK.37.21
reference: Ezekiel 37:21
source:
  edition: WLC
  text: וְ/דַבֵּ֣ר אֲלֵי/הֶ֗ם כֹּֽה אָמַר֮ אֲדֹנָ֣/י יְהוִה֒ הִנֵּ֨ה אֲנִ֤י לֹקֵ֨חַ֙ אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל מִ/בֵּ֥ין הַ/גּוֹיִ֖ם אֲשֶׁ֣ר הָֽלְכוּ שָׁ֑ם וְ/קִבַּצְתִּ֤י אֹתָ/ם֙ מִ/סָּבִ֔יב וְ/הֵבֵאתִ֥י אוֹתָ֖/ם אֶל אַדְמָתָֽ/ם־־־־׃
translation:
  text: 'Then say to them, ‘Thus says the Lord GOD: Behold, I am taking the children of Israel from among the nations where they have gone, and I will gather them from all around and bring them to their own land.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the children of Israel''; alternatively, ''the sons of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'from every side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדַבֵּר אֲלֵיהֶם
  chosen: Then say to them
  alternatives:
  - And speak to them
  - And say to them
  lexicon: HALOT
  rationale: The conjunction plus imperative continues the prophetic instruction. 'Then say to them' reads naturally in English while preserving the sequential force of the Hebrew.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic register without unnecessary archaism.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD'; 'the Lord GOD' is the established and accurate rendering that distinguishes Adonai from the divine name while preserving reverence.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: '''Behold'' preserves the solemn, attention-directing force of the prophetic announcement. Though somewhat elevated, it remains understandable and suits the register.'
- source_word: לֹקֵחַ
  chosen: I am taking
  alternatives:
  - I will take
  - I take
  lexicon: HALOT
  rationale: The participle with הִנֵּה often has imminent or vivid future force. 'I am taking' preserves the vividness of divine action better than a simple future, while the following finite verbs continue the promise.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the people of Israel
  - the sons of Israel
  lexicon: HALOT
  rationale: Literally 'sons/children of Israel.' 'Children of Israel' is a clear, established English rendering that preserves the familial-covenantal sense better than the more flattened 'people of Israel.'
- source_word: מִבֵּין הַגּוֹיִם
  chosen: from among the nations
  alternatives:
  - from among the Gentiles
  - out from among the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign nations among whom Israel was scattered, not specifically 'Gentiles' as a later Jewish/Christian contrast term. 'From among the nations' is contextually precise.
- source_word: אֲשֶׁר הָלְכוּ שָׁם
  chosen: where they have gone
  alternatives:
  - where they went
  - to which they went
  lexicon: HALOT
  rationale: This relative clause identifies the places of dispersion. 'Where they have gone' is idiomatic and reflects the present relevance of their scattered condition.
- source_word: וְקִבַּצְתִּי אֹתָם מִסָּבִיב
  chosen: and I will gather them from all around
  alternatives:
  - and I will gather them from every side
  - and I will gather them from around
  lexicon: HALOT
  rationale: מִסָּבִיב conveys gathering from surrounding directions. 'From all around' is natural English and preserves the image of comprehensive regathering.
- source_word: וְהֵבֵאתִי אוֹתָם אֶל אַדְמָתָם
  chosen: and bring them into their own land
  alternatives:
  - and bring them to their land
  - and bring them into their land
  lexicon: HALOT
  rationale: אַדְמָה is 'ground/land.' Here it denotes Israel's homeland. 'Their own land' makes the possessive force explicit and idiomatic in English without adding new content.
