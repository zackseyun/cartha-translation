- issue: Rendering the divine name יְהוָה within the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Lord the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering בֶּן אָדָם in Ezekiel
  chosen_reading: Son of man
  alternative_readings:
  - Human one
  - Mortal
  rationale: The phrase is a recurring divine address to Ezekiel and should be translated consistently. Retaining 'Son of man' preserves the Hebrew idiom and literary resonance without importing later christological claims into this prophetic context.
