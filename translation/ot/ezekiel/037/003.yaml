id: EZK.37.3
reference: Ezekiel 37:3
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י בֶּן אָדָ֕ם הֲ/תִחְיֶ֖ינָה הָ/עֲצָמ֣וֹת הָ/אֵ֑לֶּה וָ/אֹמַ֕ר אֲדֹנָ֥/י יְהוִ֖ה אַתָּ֥ה יָדָֽעְתָּ־׃
translation:
  text: And he said to me, “Son of man, can these bones live?” And I said, “Lord GOD, you know.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Lord Yahweh.'' The translation ''Lord GOD'' reflects the customary English rendering of the title אֲדֹנָי יְהוִה, avoiding the awkward repetition ''Lord LORD'' while preserving the divine-name element.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: And he said to me
  alternatives:
  - Then he said to me
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And' preserves Hebrew narrative flow without overinterpreting sequence; 'to me' directly renders אֵלַי.
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal man
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. 'Son of man' preserves the idiom and its established literary force better than more interpretive alternatives. It is also gender-accurate to the Hebrew wording.
- source_word: הֲתִחְיֶינָה
  chosen: can ... live
  alternatives:
  - will ... live
  - shall ... live
  - come to life
  lexicon: HALOT
  rationale: The interrogative with the imperfect here asks about possibility or prospective outcome. 'Can these bones live?' is natural English and fits Ezekiel's deferential response. 'Will' could imply prediction more than possibility.
- source_word: הָעֲצָמוֹת הָאֵלֶּה
  chosen: these bones
  alternatives:
  - these dry bones
  lexicon: HALOT
  rationale: The Hebrew in this verse says only 'these bones'; 'dry' belongs to the wider context but is not present here, so it should not be imported.
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: Again, the waw-consecutive is represented with simple narrative 'And,' maintaining Hebrew style without unnecessary temporal sharpening.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Because יְהוָה is rendered 'the LORD' by doctrinal default, the compound title אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD' in English to avoid 'Lord LORD.' Small caps 'GOD' signals the divine name behind the translation. 'Lord Yahweh' is a possible more transparent alternative, but the doctrine default for יְהוָה is 'the LORD.'
- source_word: אַתָּה יָדָעְתָּ
  chosen: you know
  alternatives:
  - you alone know
  - you have known
  lexicon: HALOT
  rationale: The Hebrew simply states 'you know.' Adding 'alone' would interpret the force of Ezekiel's reply beyond the explicit wording. The perfect functions naturally as a present stative in English.
