id: EZK.37.4
reference: Ezekiel 37:4
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י הִנָּבֵ֖א עַל הָ/עֲצָמ֣וֹת הָ/אֵ֑לֶּה וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם הָ/עֲצָמוֹת֙ הַ/יְבֵשׁ֔וֹת שִׁמְע֖וּ דְּבַר יְהוָֽה־־׃
translation:
  text: Then he said to me, “Prophesy over these bones, and say to them, ‘Dry bones, hear the word of Yahweh.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence; 'and' is possible but less idiomatic here.
- source_word: הִנָּבֵא
  chosen: Prophesy
  alternatives:
  - Prophesy as a prophet
  - Speak prophetically
  lexicon: HALOT
  rationale: Imperative of נבא in the Niphal is the standard prophetic command. 'Prophesy' is the established and precise English equivalent without unnecessary expansion.
- source_word: עַל
  chosen: over
  alternatives:
  - to
  - concerning
  - against
  lexicon: HALOT
  rationale: With נבא, עַל can mean 'against,' 'concerning,' or more broadly indicate the object addressed. In this visionary context, Ezekiel is commanded to speak over the bones themselves; 'over' preserves the Hebrew preposition and fits the scene better than 'against,' which would imply denunciation.
- source_word: הָעֲצָמוֹת הָאֵלֶּה
  chosen: these bones
  alternatives:
  - these dry bones
  lexicon: HALOT
  rationale: The demonstrative phrase is rendered directly as 'these bones.' The adjective 'dry' appears explicitly in the vocative that follows, so it is not imported here to avoid redundancy.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: and say to them
  alternatives:
  - and speak to them
  lexicon: HALOT
  rationale: אמר is the ordinary verb 'say.' 'Say to them' is straightforward and preserves the directness of the command.
- source_word: הָעֲצָמוֹת הַיְבֵשׁוֹת
  chosen: Dry bones
  alternatives:
  - O dry bones
  - you dry bones
  lexicon: HALOT
  rationale: This is a direct address to the bones. English can convey the vocative naturally as 'Dry bones' without adding 'O,' though 'O dry bones' is possible in a more formal style.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: The imperative 'hear' is the standard rendering of שמע in covenantal and prophetic contexts and preserves the biblical resonance better than the more colloquial 'listen to.'
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר here is best rendered 'word' in a prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
