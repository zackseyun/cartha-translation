id: EZK.37.15
reference: Ezekiel 37:15
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened, the word of the LORD came to me, saying.'' The English smooths the Hebrew prophetic formula.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Yahweh' for 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the clause literally begins 'and it was,' in the prophetic formula ויהי דבר־יהוה... the idiomatic sense in English is that the word 'came.' This preserves the standard Hebrew revelatory formula without wooden English.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: דבר here refers to the divine communication itself. 'The word' preserves the formal prophetic formula and its theological weight better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix straightforwardly indicates direction toward the prophet. 'To me' is accurate and natural modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in standard Hebrew narrative style. 'Saying' is the conventional and sufficiently transparent rendering.
