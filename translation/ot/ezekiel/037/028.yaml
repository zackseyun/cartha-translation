id: EZK.37.28
reference: Ezekiel 37:28
source:
  edition: WLC
  text: וְ/יָֽדְעוּ֙ הַ/גּוֹיִ֔ם כִּ֚י אֲנִ֣י יְהוָ֔ה מְקַדֵּ֖שׁ אֶת יִשְׂרָאֵ֑ל בִּ/הְי֧וֹת מִקְדָּשִׁ֛/י בְּ/תוֹכָ֖/ם לְ/עוֹלָֽם־׃ס
translation:
  text: Then the nations will know that I am Yahweh who sanctifies Israel, when my sanctuary is in their midst forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the nations will know.' The Hebrew conjunction can be rendered simply 'and,' but here it likely carries a consequential sense from the preceding restoration promises.
    reason: lexical_alternative
  - marker: b
    text: Or 'who makes Israel holy.'
    reason: lexical_alternative
  - marker: c
    text: Or 'among them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: Then ... will know
  alternatives:
  - And ... will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries future/result sense. 'Then' brings out the consequential force from the preceding promises, while 'will know' is the standard rendering of ידע here.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם in Ezekiel regularly denotes the nations/peoples outside Israel. 'Nations' is the most natural English rendering in this prophetic context.
- source_word: כִּי אֲנִי יְהוָה
  chosen: that I am the LORD
  alternatives:
  - that I, the LORD, am
  lexicon: HALOT
  rationale: This is the standard recognition formula in Ezekiel. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: מְקַדֵּשׁ
  chosen: who sanctifies
  alternatives:
  - who makes holy
  - who consecrates
  lexicon: HALOT
  rationale: The participle presents YHWH's characteristic action toward Israel. 'Sanctifies' preserves the covenantal-holiness theme and matches the verbal connection to holy space in the verse better than the flatter 'makes holy.'
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the people of Israel
  lexicon: HALOT
  rationale: The direct object is simply the proper name. No expansion is needed in English.
- source_word: בִּהְיוֹת
  chosen: when ... is
  alternatives:
  - in the being of
  - as ... is
  lexicon: HALOT
  rationale: The infinitive construct of היה with prefixed ב marks the circumstance/time under which the nations know YHWH. 'When' is idiomatic and accurate.
- source_word: מִקְדָּשִׁי
  chosen: my sanctuary
  alternatives:
  - my holy place
  - my temple
  lexicon: HALOT
  rationale: מִקְדָּשׁ denotes a holy place/sanctuary. 'Sanctuary' is preferable to 'temple' because the term is broader and fits Ezekiel's visionary/restorative context without over-specifying a building alone.
- source_word: בְּתוֹכָם
  chosen: in their midst
  alternatives:
  - among them
  - within them
  lexicon: HALOT
  rationale: The phrase most naturally means presence among the people. 'In their midst' preserves the corporate, locative sense and echoes biblical covenant-presence language.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for the age
  - perpetually
  lexicon: HALOT
  rationale: In this restoration context, לְעוֹלָם is best rendered with the straightforward temporal term 'forever' in modern English.
