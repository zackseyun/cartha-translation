theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of מְקַדֵּשׁ in relation to Israel
  chosen_reading: who sanctifies Israel
  alternative_readings:
  - who makes Israel holy
  - who consecrates Israel
  rationale: The verse emphasizes YHWH as the one who sets Israel apart as holy, especially in connection with his sanctuary dwelling among them. 'Sanctifies' preserves this theological linkage without narrowing the sense to ritual consecration alone.
