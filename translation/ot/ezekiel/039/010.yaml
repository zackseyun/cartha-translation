id: EZK.39.10
reference: Ezekiel 39:10
source:
  edition: WLC
  text: וְ/לֹֽא יִשְׂא֨וּ עֵצִ֜ים מִן הַ/שָּׂדֶ֗ה וְ/לֹ֤א יַחְטְבוּ֙ מִן הַ/יְּעָרִ֔ים כִּ֥י בַ/נֶּ֖שֶׁק יְבַֽעֲרוּ אֵ֑שׁ וְ/שָׁלְל֣וּ אֶת שֹׁלְלֵי/הֶ֗ם וּ/בָֽזְזוּ֙ אֶת בֹּ֣זְזֵי/הֶ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־־־־׃ס
translation:
  text: They will not carry wood from the field, nor cut it from the forests, for they will make fires with the weapons. They will plunder those who plundered them and loot those who looted them, declares the Lord Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for with the weapons they will burn fire,' that is, they will use the invaders' weapons as fuel.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats cognate terms: ''they will plunder their plunderers and loot their looters,'' emphasizing reversal and recompense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂאוּ עֵצִים
  chosen: carry wood
  alternatives:
  - gather wood
  - take wood
  lexicon: HALOT
  rationale: נשא with עֵצִים here refers to bringing or carrying wood for fuel. 'Carry wood' is natural English and preserves the concrete action without overinterpreting it as 'gather'.
- source_word: מִן הַשָּׂדֶה
  chosen: from the field
  alternatives:
  - from the countryside
  - from the open country
  lexicon: HALOT
  rationale: שָׂדֶה is singular with the article, literally 'the field.' In context it functions collectively, but the singular is retained in English for closeness to the Hebrew.
- source_word: יַחְטְבוּ
  chosen: cut it
  alternatives:
  - chop wood
  - hew
  lexicon: HALOT
  rationale: The verb means to cut/chop, especially wood. Because 'wood' has just been mentioned, 'cut it' avoids redundancy while preserving the sense. 'Hew' is too archaic for the stated style.
- source_word: מִן הַיְּעָרִים
  chosen: from the forests
  alternatives:
  - from the woods
  lexicon: HALOT
  rationale: The plural יערים is best rendered 'forests.' 'Woods' is possible but slightly less direct.
- source_word: כִּי בַנֶּשֶׁק יְבַעֲרוּ אֵשׁ
  chosen: because they will make fires with the weapons
  alternatives:
  - for they will burn fire with the weapons
  - for they will use the weapons as fuel
  lexicon: HALOT
  rationale: The phrase means the weapons will serve as fuel. 'Make fires with the weapons' is idiomatic modern English that preserves the instrumental sense of ב and the plural subject.
- source_word: בַנֶּשֶׁק
  chosen: with the weapons
  alternatives:
  - with weaponry
  - with arms
  lexicon: HALOT
  rationale: נשק here refers collectively to weapons from the defeated invaders. 'Weapons' is the clearest common English rendering.
- source_word: וְשָׁלְלוּ אֶת שֹׁלְלֵיהֶם
  chosen: They will plunder those who plundered them
  alternatives:
  - They will despoil those who despoiled them
  lexicon: HALOT
  rationale: The Hebrew uses a cognate verb-participle construction for rhetorical reversal. Repeating 'plunder' in English preserves the wordplay and the justice motif.
- source_word: וּבָזְזוּ אֶת בֹּזְזֵיהֶם
  chosen: and loot those who looted them
  alternatives:
  - and seize spoil from those who seized spoil from them
  - and rob those who robbed them
  lexicon: HALOT
  rationale: As with the previous clause, the cognate repetition is preserved. 'Loot' is vivid, natural English and distinct enough from 'plunder' to reflect the paired Hebrew verbs.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'Lord GOD' follows standard English convention to distinguish the two divine titles without producing 'Lord LORD'.
