id: EZK.39.22
reference: Ezekiel 39:22
source:
  edition: WLC
  text: וְ/יָֽדְעוּ֙ בֵּ֣ית יִשְׂרָאֵ֔ל כִּ֛י אֲנִ֥י יְהוָ֖ה אֱלֹֽהֵי/הֶ֑ם מִן הַ/יּ֥וֹם הַ/ה֖וּא וָ/הָֽלְאָה־׃
translation:
  text: And the house of Israel will know that I am Yahweh their God from that day onward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "from that day on".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And ... will know
  alternatives:
  - and ... shall know
  - and ... will acknowledge
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries future/resultative force in English. 'Will know' is the most natural rendering and preserves the covenant-recognition sense without overinterpreting it as mere cognition or as explicit confession.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is a standard collective designation for the people; retaining 'house of Israel' preserves the Hebrew idiom and corporate emphasis better than the simplified 'Israel'.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what Israel will know. English 'that' best marks the object clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - God of them
  lexicon: HALOT
  rationale: The plural form with 3mp suffix functions as the singular referent 'their God' in covenantal usage. This is the natural English equivalent.
- source_word: מִן הַיּוֹם הַהוּא
  chosen: from that day
  alternatives:
  - from that day on
  - since that day
  lexicon: HALOT
  rationale: The prepositional phrase marks the starting point of an enduring state. 'From that day' is kept in the main clause, with the continuing sense completed by the following adverb.
- source_word: וָהָלְאָה
  chosen: onward
  alternatives:
  - and beyond
  - thereafter
  - from then on
  lexicon: HALOT
  rationale: This adverb extends the time reference into the future. 'Onward' is concise, idiomatic, and pairs naturally with 'from that day'.
