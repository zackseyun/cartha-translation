theological_decisions:
- issue: Meaning of God's 'glory' among the nations
  chosen_reading: God's manifested majesty/reputation displayed through his acts of
    judgment
  alternative_readings:
  - God's honor alone in an abstract sense
  rationale: The immediate context emphasizes the nations seeing God's judicial action
    and hand. Thus 'glory' is not merely internal divine honor but glory made visible
    through historical judgment.
- issue: Force of 'my hand'
  chosen_reading: A metaphor for God's active power in judgment, retained literally
    as 'hand'
  alternative_readings:
  - Explicitly interpret as 'power' in the main text
  rationale: The Hebrew idiom is theologically rich and should be preserved rather
    than flattened. The context makes the judicial sense clear without replacing the
    metaphor.
  doctrine_reference: Translation philosophy §3, §5
