id: EZK.39.21
reference: Ezekiel 39:21
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י אֶת כְּבוֹדִ֖/י בַּ/גּוֹיִ֑ם וְ/רָא֣וּ כָל הַ/גּוֹיִ֗ם אֶת מִשְׁפָּטִ/י֙
    אֲשֶׁ֣ר עָשִׂ֔יתִי וְ/אֶת יָדִ֖/י אֲשֶׁר שַׂ֥מְתִּי בָ/הֶֽם־־־־־׃
translation:
  text: And I will set my glory among the nations, and all the nations will see my
    judgment that I have executed, and my hand that I have laid on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my justice that I have done/carried out.'
    reason: lexical_alternative
  - marker: b
    text: '''My hand'' is a Hebrew idiom for God''s active power or action, especially
      in judgment.'
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: I will set
  alternatives:
  - I will give
  - I will place
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' In this context with 'my glory among
    the nations,' 'set' is idiomatic and preserves the concrete force better than
    the more abstract 'give.'
- source_word: כְּבוֹדִי
  chosen: my glory
  alternatives:
  - my honor
  - my splendor
  lexicon: HALOT
  rationale: כבוד commonly denotes glory, honor, or weightiness. 'My glory' is the
    standard and most theologically fitting rendering here, referring to God's manifested
    majesty among the nations.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גוים here refers to the foreign nations collectively. 'Among the nations'
    is natural English and avoids importing later NT-specific connotations of 'Gentiles.'
- source_word: וְרָאוּ כָל־הַגּוֹיִם
  chosen: and all the nations will see
  alternatives:
  - and all the nations shall see
  lexicon: HALOT
  rationale: Straightforward future rendering of the qatal with prefixed conjunction
    in prophetic discourse. 'Will see' is readable modern English.
- source_word: מִשְׁפָּטִי
  chosen: my judgment
  alternatives:
  - my justice
  - my sentence
  lexicon: HALOT
  rationale: משפט can mean judgment, justice, legal decision, or ordinance. Here it
    refers to God's judicial act against the nations in context, so 'judgment' best
    captures the punitive-judicial sense.
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: that I have executed
  alternatives:
  - that I have done
  - which I carried out
  lexicon: HALOT
  rationale: Although עשה is broadly 'do/make,' English commonly speaks of 'executing
    judgment.' This rendering brings out the judicial object without adding content
    beyond the Hebrew context.
- source_word: יָדִי
  chosen: my hand
  alternatives:
  - my power
  lexicon: HALOT
  rationale: יד literally means 'hand' and often metaphorically denotes power or action.
    The literal image should be preserved in the main text because it is vivid and
    common in prophetic literature.
- source_word: אֲשֶׁר שַׂמְתִּי בָהֶם
  chosen: that I have laid on them
  alternatives:
  - that I have set against them
  - that I have inflicted on them
  lexicon: HALOT
  rationale: שׂים with 'hand' and ב can express placing one's hand upon someone in
    judgment. 'Laid on them' preserves the idiom while remaining understandable in
    English.
