theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    of YHWH, preserving reverential convention without making a sectarian claim about
    pronunciation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of God's action in וְלֹא אַחֵל אֶת שֵׁם קָדְשִׁי עוֹד
  chosen_reading: I will no longer let my holy name be profaned
  alternative_readings:
  - I will no longer profane my holy name
  rationale: Although the Hebrew form could be rendered more woodenly as God's own
    action, the broader context of Ezekiel's vindication-of-the-name theme often carries
    the sense that God will no longer allow his name to be treated as common among
    the nations. This preserves the theological emphasis on divine vindication without
    implying moral fault in God.
