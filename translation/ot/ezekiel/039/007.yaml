id: EZK.39.7
reference: Ezekiel 39:7
source:
  edition: WLC
  text: וְ/אֶת שֵׁ֨ם קָדְשִׁ֜/י אוֹדִ֗יעַ בְּ/תוֹךְ֙ עַמִּ֣/י יִשְׂרָאֵ֔ל וְ/לֹֽא
    אַחֵ֥ל אֶת שֵׁם קָדְשִׁ֖/י ע֑וֹד וְ/יָדְע֤וּ הַ/גּוֹיִם֙ כִּי אֲנִ֣י יְהוָ֔ה קָד֖וֹשׁ
    בְּ/יִשְׂרָאֵֽל־־־־־׃
translation:
  text: And I will make my holy name known in the midst of my people Israel, and I
    will no longer let my holy name be profaned; and the nations will know that I
    am the LORD, the Holy One in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I will no longer profane my holy name.' The Hebrew
      verb can be rendered this way, though in context it likely means that the LORD
      will no longer allow his name to be profaned.
    reason: alternative_reading
  - marker: b
    text: Or, 'that I am the LORD, holy in Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם קָדְשִׁי
  chosen: my holy name
  alternatives:
  - the name of my holiness
  lexicon: HALOT
  rationale: The construct phrase idiomatically means 'my holy name,' a standard Hebrew
    expression for God's revealed reputation and sanctity, not merely a label.
- source_word: אוֹדִיעַ
  chosen: I will make known
  alternatives:
  - I will cause to know
  - I will make myself known
  lexicon: HALOT
  rationale: Hiphil of ידע is causative, so 'make known' best reflects the verbal
    force. 'Make myself known' is possible in context, but the direct object here
    is specifically 'my holy name.'
- source_word: בְּתוֹךְ
  chosen: in the midst of
  alternatives:
  - among
  lexicon: HALOT
  rationale: The phrase denotes presence within the community. 'In the midst of' preserves
    the concrete Hebrew imagery while remaining natural English.
- source_word: עַמִּי יִשְׂרָאֵל
  chosen: my people Israel
  alternatives:
  - my people, Israel
  lexicon: HALOT
  rationale: This appositional expression identifies Israel as God's covenant people.
    The unpunctuated English keeps the Hebrew compactness.
- source_word: אַחֵל
  chosen: I will no longer let ... be profaned
  alternatives:
  - I will no longer profane
  - I will no longer allow ... to be defiled
  lexicon: HALOT
  rationale: From חלל in the Hiphil, the sense can be either active ('profane') or
    permissive/causative ('let be profaned'). In this context, where God vindicates
    his name before Israel and the nations, English 'I will no longer let my holy
    name be profaned' best captures the idiomatic sense that he will no longer permit
    its desecration.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - anymore
  - again
  lexicon: HALOT
  rationale: With the negation, עוֹד naturally yields 'no longer,' expressing cessation
    of a prior state.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In Ezekiel this term commonly refers to the nations broadly, not specifically
    to Gentiles in a later Jewish-Christian contrast. 'The nations' is the clearer
    contextual rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: קָדוֹשׁ בְּיִשְׂרָאֵל
  chosen: the Holy One in Israel
  alternatives:
  - holy in Israel
  - holy among Israel
  lexicon: HALOT
  rationale: The Hebrew predicate can be read as 'I am the LORD, holy in Israel,'
    but in English this sounds awkward and may underplay the titular force. 'The Holy
    One in Israel' communicates both God's holiness and his manifested relation to
    Israel. The more formally literal alternative is preserved in a footnote.
