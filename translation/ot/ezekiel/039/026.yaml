theological_decisions:
- issue: Sense of וְנָשׂוּ in context of restoration and prior guilt
  chosen_reading: retain the plain Hebrew sense 'they will bear' rather than interpretively
    rendering 'they will forget'
  alternative_readings:
  - they will forget their shame and all their unfaithfulness
  rationale: 'The immediate Hebrew wording most naturally reads as bearing/carrying
    shame, not forgetting it. Although the broader context of restoration has led
    some translators to adopt ''forget,'' doing so moves beyond the plain lexical
    sense. Preserving ''bear'' maintains transparency to the source text and leaves
    the theological tension intact: restored Israel still bears awareness of former
    shame.'
  doctrine_reference: Translation philosophy §§1, 3, 5
