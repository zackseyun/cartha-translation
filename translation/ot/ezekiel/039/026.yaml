id: EZK.39.26
reference: Ezekiel 39:26
source:
  edition: WLC
  text: וְ/נָשׂוּ֙ אֶת כְּלִמָּתָ֔/ם וְ/אֶת כָּל מַעֲלָ֖/ם אֲשֶׁ֣ר מָעֲלוּ בִ֑/י בְּ/שִׁבְתָּ֧/ם
    עַל אַדְמָתָ֛/ם לָ/בֶ֖טַח וְ/אֵ֥ין מַחֲרִֽיד־־־־־׃
translation:
  text: They will bear their shame and all their unfaithfulness by which they were
    unfaithful to me, when they dwell securely on their land with no one to make them
    afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They will forget their shame and all their unfaithfulness.' Some ancient-version-informed
      translations take the verb here in that contextual sense, but the Hebrew most
      directly reads 'bear.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָשׂוּ
  chosen: they will bear
  alternatives:
  - they will carry
  - they will forget
  lexicon: HALOT
  rationale: The verb נשׂא commonly means 'lift, carry, bear.' In this context with
    'shame' and 'unfaithfulness,' 'bear' naturally conveys enduring or carrying the
    consequence/reproach. Some versions render the sense more idiomatically as 'forget,'
    likely influenced by context and ancient versions, but the Hebrew form itself
    most directly supports 'bear.'
- source_word: כְּלִמָּתָם
  chosen: their shame
  alternatives:
  - their disgrace
  - their humiliation
  lexicon: HALOT
  rationale: כְּלִמָּה denotes shame/disgrace. 'Shame' is the most direct and natural
    English equivalent here.
- source_word: מַעֲלָם / מָעֲלוּ
  chosen: their unfaithfulness ... they were unfaithful
  alternatives:
  - their treachery ... they acted treacherously
  - their trespass ... they trespassed
  lexicon: HALOT
  rationale: The noun and cognate verb from מעל carry the idea of breach of faith,
    acting unfaithfully, often in covenantal contexts. 'Unfaithfulness' preserves
    that relational/covenantal force better than the more technical 'trespass' or
    the somewhat narrower 'treachery.'
- source_word: בִּי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: With מעל, the preposition ב can indicate the party against whom the unfaithfulness
    is committed. 'To me' keeps the relational orientation of covenant breach in idiomatic
    English, though 'against me' is also possible.
- source_word: בְּשִׁבְתָּם
  chosen: when they dwell
  alternatives:
  - in their dwelling
  - while they live
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב marks circumstance/time: ''when/while
    they dwell.'' This is smoother and more precise than a nominal rendering.'
- source_word: עַל אַדְמָתָם
  chosen: on their land
  alternatives:
  - on their soil
  - in their land
  lexicon: HALOT
  rationale: אֲדָמָה is 'ground, land, soil.' 'On their land' is a natural English
    rendering and preserves the restoration-to-land theme in Ezekiel.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - safely
  lexicon: HALOT
  rationale: The noun בטח in this adverbial construction expresses secure, safe dwelling.
    'Securely' is concise and idiomatic.
- source_word: וְאֵין מַחֲרִיד
  chosen: with no one to make them afraid
  alternatives:
  - and there is no one frightening them
  - with none to terrify them
  lexicon: HALOT
  rationale: This common expression denotes the absence of any threat or one causing
    terror. 'With no one to make them afraid' is idiomatic and preserves the personal-agent
    nuance of מחריד.
