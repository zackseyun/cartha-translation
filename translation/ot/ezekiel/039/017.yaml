id: EZK.39.17
reference: Ezekiel 39:17
source:
  edition: WLC
  text: וְ/אַתָּ֨ה בֶן אָדָ֜ם כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה אֱמֹר֩ לְ/צִפּ֨וֹר כָּל כָּנָ֜ף וּ/לְ/כֹ֣ל חַיַּ֣ת הַ/שָּׂדֶ֗ה הִקָּבְצ֤וּ וָ/בֹ֨אוּ֙ הֵאָסְפ֣וּ מִ/סָּבִ֔יב עַל זִבְחִ֗/י אֲשֶׁ֨ר אֲנִ֜י זֹבֵ֤חַ לָ/כֶם֙ זֶ֣בַח גָּד֔וֹל עַ֖ל הָרֵ֣י יִשְׂרָאֵ֑ל וַ/אֲכַלְתֶּ֥ם בָּשָׂ֖ר וּ/שְׁתִ֥יתֶם דָּֽם־־׀־׀־׃
translation:
  text: 'And you, son of man, thus says the Lord GOD: Say to every bird of every wing and to every beast of the field, ‘Gather yourselves and come; assemble from all around to my sacrifice that I am sacrificing for you, a great sacrifice on the mountains of Israel, and you shall eat flesh and drink blood.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to every bird of every wing,' an idiom meaning all birds.
    reason: lexical_alternative
  - marker: b
    text: Or 'to my sacrificial feast that I am preparing for you'; the Hebrew uses the noun 'sacrifice' with a cognate verb, emphasizing the sacrificial scene.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard form of address. A relatively formal rendering preserves the repeated prophetic title and its resonance, while alternatives such as 'mortal' are possible but less transparent to the Hebrew wording here.
- source_word: אֲדֹנָי יְהֹוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with YHWH. Per doctrine, YHWH is rendered 'the LORD'; in this fixed combination, conventional English capitalization yields 'the Lord GOD' to distinguish the two elements without producing the awkward 'Lord LORD.'
- source_word: צִפּוֹר כָּל כָּנָף
  chosen: every kind of bird
  alternatives:
  - every bird of every wing
  - every winged bird
  lexicon: HALOT
  rationale: Literally 'bird, every wing.' The idiom refers broadly to birds. 'Every kind of bird' communicates the distributive force naturally in English while preserving the universal summons.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: every beast of the field
  alternatives:
  - every wild animal of the field
  - all the animals of the open country
  lexicon: HALOT
  rationale: A standard Hebrew expression for wild land animals. 'Beast of the field' is understandable and preserves the biblical register without excessive archaism.
- source_word: הִקָּבְצוּ ... הֵאָסְפוּ
  chosen: Gather yourselves ... assemble
  alternatives:
  - assemble ... gather
  - gather together ... collect yourselves
  lexicon: HALOT
  rationale: Two near-synonymous imperatives are used in sequence for rhetorical force. Rendering them with two distinct but related English verbs preserves the piling up of commands.
- source_word: מִסָּבִיב
  chosen: from all around
  alternatives:
  - from around
  - from every side
  lexicon: HALOT
  rationale: The phrase indicates approach from every surrounding direction. 'From all around' is idiomatic and captures the comprehensive scope.
- source_word: עַל זִבְחִי אֲשֶׁר אֲנִי זֹבֵחַ לָכֶם
  chosen: to my sacrifice that I am sacrificing for you
  alternatives:
  - to my sacrificial feast that I am preparing for you
  - against my sacrifice which I sacrifice for you
  lexicon: HALOT
  rationale: The noun and cognate verb are intentionally repeated in Hebrew. Keeping 'sacrifice ... sacrificing' preserves the emphatic sacrificial imagery. The preposition עַל after verbs of gathering/coming can be rendered directionally here as 'to' in natural English.
- source_word: זֶבַח גָּדוֹל
  chosen: a great sacrifice
  alternatives:
  - a great sacrificial feast
  - a huge sacrifice
  lexicon: HALOT
  rationale: זֶבַח can denote both sacrifice and the meal associated with it. 'Sacrifice' keeps the cultic frame explicit; the feast aspect is implied by the following eating and drinking.
- source_word: הָרֵי יִשְׂרָאֵל
  chosen: the mountains of Israel
  alternatives:
  - the hills of Israel
  lexicon: HALOT
  rationale: A common Ezekiel expression. 'Mountains' is the straightforward lexical equivalent and preserves the prophetic geographic motif.
- source_word: וַאֲכַלְתֶּם בָּשָׂר וּשְׁתִיתֶם דָּם
  chosen: and you shall eat flesh and drink blood
  alternatives:
  - and you will eat meat and drink blood
  lexicon: HALOT
  rationale: Addressed to the birds and beasts, this grim imagery should remain stark. 'Flesh' better preserves the visceral force of בָּשָׂר in this judgment context than the more ordinary 'meat.'
