id: EZK.39.11
reference: Ezekiel 39:11
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַ/יּ֣וֹם הַ/ה֡וּא אֶתֵּ֣ן לְ/גוֹג֩ מְקֽוֹם שָׁ֨ם קֶ֜בֶר בְּ/יִשְׂרָאֵ֗ל
    גֵּ֤י הָ/עֹֽבְרִים֙ קִדְמַ֣ת הַ/יָּ֔ם וְ/חֹסֶ֥מֶת הִ֖יא אֶת הָ/עֹֽבְרִ֑ים וְ/קָ֣בְרוּ
    שָׁ֗ם אֶת גּוֹג֙ וְ/אֶת כָּל הֲמוֹנֹ֔/ה וְ/קָ֣רְא֔וּ גֵּ֖יא הֲמ֥וֹן גּֽוֹג׀־־־־־׃
translation:
  text: And it will be in that day that I will give Gog a burial place there in Israel,
    the Valley of the Travelers, east of the sea; and it will block the travelers.
    There they will bury Gog and all his multitude, and they will call it the Valley
    of Hamon-gog.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the valley of those who pass by' / 'the valley of the passersby.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in front of the sea'; the Hebrew expression may denote orientation rather
      than strict eastward direction.
    reason: lexical_alternative
  - marker: c
    text: Hamon-gog likely means 'multitude of Gog.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקוֹם שָׁם קֶבֶר
  chosen: a burial place there
  alternatives:
  - a place there for a grave
  - a place there, a grave-site
  lexicon: HALOT
  rationale: The phrase combines 'place,' 'there,' and 'grave/burial.' 'Burial place
    there' is natural English while preserving the locative שָׁם and the funerary
    sense of קֶבֶר without over-paraphrasing.
- source_word: גֵּי הָעֹבְרִים
  chosen: the Valley of the Travelers
  alternatives:
  - the valley of those who pass by
  - the valley of the passersby
  lexicon: HALOT
  rationale: עֹבְרִים is a participial substantive from עבר, 'those passing through/by.'
    'Travelers' is smoother modern English, while the capitalized phrase reflects
    a place designation. A more formal alternative is preserved in a footnote because
    the expression may be either descriptive or toponymic.
- source_word: קִדְמַת הַיָּם
  chosen: east of the sea
  alternatives:
  - in front of the sea
  - toward the east of the sea
  lexicon: HALOT
  rationale: קִדְמַת commonly denotes 'east of' or 'in front of,' depending on orientation.
    In geographic description, 'east of the sea' is the most idiomatic and likely
    sense. The more literal spatial alternative is preserved in a footnote because
    the exact referent/orientation is debated.
- source_word: וְחֹסֶמֶת הִיא אֶת הָעֹבְרִים
  chosen: and it will block the travelers
  alternatives:
  - and it will stop up those who pass by
  - and it will obstruct the passersby
  lexicon: HALOT
  rationale: חסם means 'to block, stop up, shut off.' The feminine verb agrees with
    the valley. 'It will block the travelers' preserves the straightforward sense
    that the burial site obstructs passage, without importing an explanatory object
    not present in the Hebrew.
- source_word: הֲמוֹנוֹ
  chosen: his multitude
  alternatives:
  - his hordes
  - his crowd
  lexicon: HALOT
  rationale: הָמוֹן often denotes a multitude, mass, or throng. 'His multitude' is
    broad enough to include Gog's forces without adding militarized nuance beyond
    the context. 'Hordes' is possible but more interpretive.
- source_word: גֵּיא הֲמוֹן גּוֹג
  chosen: the Valley of Hamon-gog
  alternatives:
  - the Valley of Gog's Multitude
  lexicon: HALOT
  rationale: Because this is a place-name formed from הֲמוֹן ('multitude') + Gog,
    transliteration best preserves the toponymic force while avoiding awkwardness.
    The meaning is preserved in a footnote.
- source_word: וְהָיָה בַיּוֹם הַהוּא
  chosen: And it will be in that day
  alternatives:
  - And it shall come to pass in that day
  - And on that day it will happen
  lexicon: HALOT
  rationale: This is a common prophetic formula. The chosen rendering is readable
    modern English while retaining the formal prophetic cadence.
- source_word: אֶתֵּן לְגוֹג
  chosen: I will give Gog
  alternatives:
  - I will appoint for Gog
  - I will grant Gog
  lexicon: HALOT
  rationale: נתן with ל marks giving/assigning to someone. 'Give Gog' is the plain
    sense; context clarifies that what is given is a burial place.
