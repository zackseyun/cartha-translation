theological_decisions:
- issue: Whether to render the final place-name semantically or by transliteration
  chosen_reading: Transliterate as 'Hamon-gog' in the main text
  alternative_readings:
  - translate as 'Gog's Multitude'
  rationale: The translation philosophy prefers transliterating names. Since the phrase
    functions as a newly assigned place-name, transliteration preserves that status
    while a footnote can expose the underlying meaning.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
