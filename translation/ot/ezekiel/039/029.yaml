theological_decisions:
- issue: Rendering the divine name יְהוָה in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The project default renders YHWH as 'the LORD.' In combination with אֲדֹנָי,
    English convention uses 'the Lord GOD' to avoid the awkward repetition 'Lord LORD'
    while still signaling the covenant name. This follows the doctrinally specified
    default for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether רוּחִי should be rendered 'Spirit' or a less personal term
  chosen_reading: my Spirit
  alternative_readings:
  - my spirit
  - my breath
  - my wind
  rationale: The context is covenant restoration and divine self-giving to Israel,
    not meteorological or merely animating breath imagery. 'My Spirit' preserves the
    theological weight without importing more than the text states.
