id: EZK.39.29
reference: Ezekiel 39:29
source:
  edition: WLC
  text: וְ/לֹֽא אַסְתִּ֥יר ע֛וֹד פָּנַ֖/י מֵ/הֶ֑ם אֲשֶׁ֨ר שָׁפַ֤כְתִּי אֶת רוּחִ/י֙
    עַל בֵּ֣ית יִשְׂרָאֵ֔ל נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־׃פ
translation:
  text: And I will no longer hide my face from them, when I have poured out my Spirit
    on the house of Israel, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because I have poured out my Spirit on the house of Israel.' The Hebrew
      relative particle can be understood causally as well as temporally here.
    reason: alternative_reading
  - marker: b
    text: Literally 'my face,' a Hebrew idiom for favorable presence or relational
      openness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: And ... no longer
  alternatives:
  - and not
  - for not
  lexicon: HALOT
  rationale: The conjunction links this promise to the preceding context, and לֹא
    with עוֹד is best expressed idiomatically in English as 'no longer' rather than
    a wooden 'not again.'
- source_word: אַסְתִּיר
  chosen: I will ... hide
  alternatives:
  - conceal
  lexicon: HALOT
  rationale: Hiphil of סתר here means 'hide/conceal.' 'Hide' is the more natural modern
    English choice and fits the covenantal idiom of God hiding his face.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - anymore
  - again
  lexicon: HALOT
  rationale: 'With the negation and imperfect verb, עוֹד marks cessation of a prior
    state: ''no longer.'''
- source_word: פָּנַי
  chosen: my face
  alternatives:
  - my presence
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'my face.' Retaining 'face' preserves
    the biblical imagery and theological resonance of divine favor/disfavor, while
    'presence' is a possible interpretive gloss better left to a footnote if needed.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - away from them
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating the people from whom
    God had hidden his face.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - because
  - that
  - after
  lexicon: HALOT
  rationale: Although אֲשֶׁר often means 'which/that,' in this context it introduces
    the circumstance/time associated with the promise. English 'when I have poured
    out' best captures the sense in context and avoids the awkwardness of a bare relative
    clause. A causal sense ('because') is possible and worth preserving in a footnote.
- source_word: שָׁפַכְתִּי
  chosen: I have poured out
  alternatives:
  - I poured out
  - I will pour out
  lexicon: HALOT
  rationale: The perfect can be rendered as a future perfect in English after 'when,'
    expressing the completed action that grounds the promise. This fits the prophetic
    perspective and the immediate context of restoration. A simple past is less natural
    in English here, and a future ('I will pour out') would over-interpret the Hebrew
    form.
- source_word: רוּחִי
  chosen: my Spirit
  alternatives:
  - my spirit
  - my breath
  - my wind
  lexicon: HALOT
  rationale: רוּחַ can mean spirit, breath, or wind, but in this restoration context
    with divine outpouring on Israel, 'my Spirit' is the most contextually and theologically
    appropriate rendering.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: '''On'' is natural modern English for the idiom of pouring out the Spirit
    upon a people.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  - Israel
  lexicon: HALOT
  rationale: Retaining 'house of Israel' preserves the covenantal corporate expression
    of the Hebrew.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: Prophetic formula נְאֻם is idiomatically rendered 'declares' in contemporary
    English while preserving solemnity.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the project's default, יְהוָה is rendered 'the LORD.' In the
    compound title אֲדֹנָי יְהוִה, standard English convention is 'the Lord GOD' to
    avoid 'Lord LORD' while preserving both elements of the title.
