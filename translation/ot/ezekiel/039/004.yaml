id: EZK.39.4
reference: Ezekiel 39:4
source:
  edition: WLC
  text: עַל הָרֵ֨י יִשְׂרָאֵ֜ל תִּפּ֗וֹל אַתָּה֙ וְ/כָל אֲגַפֶּ֔י/ךָ וְ/עַמִּ֖ים אֲשֶׁ֣ר
    אִתָּ֑/ךְ לְ/עֵ֨יט צִפּ֧וֹר כָּל כָּנָ֛ף וְ/חַיַּ֥ת הַ/שָּׂדֶ֖ה נְתַתִּ֥י/ךָ לְ/אָכְלָֽה־־־׃
translation:
  text: On the mountains of Israel you will fall—you and all your troops and the peoples
    who are with you. I have given you as food to every kind of bird of prey and to
    the wild animals of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all your wings,' likely a metaphor for Gog's military
      divisions or attached forces.
    reason: lexical_alternative
  - marker: b
    text: Or 'to birds of prey of every wing'; the Hebrew expression emphasizes all
      kinds of scavenging birds.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפּוֹל
  chosen: you will fall
  alternatives:
  - you will fall down
  - you will perish
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall.' In this judgment context it implies
    defeat and death, but 'you will fall' preserves the concrete imagery without over-interpreting.
- source_word: אֲגַפֶּיךָ
  chosen: your troops
  alternatives:
  - your wings
  - your bands
  - your divisions
  lexicon: HALOT
  rationale: Though the noun can literally mean 'wings,' in military context it refers
    metaphorically to attached forces, flanks, or divisions. 'Troops' communicates
    the sense clearly in modern English.
- source_word: עַמִּים אֲשֶׁר אִתָּךְ
  chosen: the peoples who are with you
  alternatives:
  - the nations with you
  - the troops with you
  lexicon: HALOT
  rationale: עַמִּים is broader than a single army unit and commonly means 'peoples'
    or 'nations.' Since Gog is accompanied by multiple groups, 'the peoples who are
    with you' best preserves the plural ethnic sense.
- source_word: לְעֵיט צִפּוֹר כָּל כָּנָף
  chosen: to every kind of bird of prey
  alternatives:
  - to birds of prey of every wing
  - to every winged bird of prey
  lexicon: HALOT
  rationale: The phrase combines עֵיט ('bird of prey, carrion bird') with צִפּוֹר
    כָּל כָּנָף ('bird of every wing'). The Hebrew is idiomatic and expansive; 'every
    kind of bird of prey' conveys the totality of scavenging birds in natural English.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - the animals of the open country
  lexicon: HALOT
  rationale: A standard Hebrew expression for wild land animals. 'Wild animals of
    the field' is clear, contemporary, and preserves the image.
- source_word: נְתַתִּיךָ לְאָכְלָה
  chosen: I have given you as food
  alternatives:
  - I have given you for food
  - I have given you to be devoured
  lexicon: HALOT
  rationale: The construction means handing someone over as something to be eaten.
    'As food' is idiomatic English and keeps the grim sacrificial/judgment imagery.
