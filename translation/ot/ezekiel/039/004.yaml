theological_decisions:
- issue: Divine agency in judgment imagery
  chosen_reading: I have given you as food
  alternative_readings:
  - I will give you as food
  rationale: The Hebrew form נְתַתִּיךָ is perfect 1cs, literally 'I have given you.'
    In prophetic discourse the perfect can express the certainty of a future act,
    but retaining the perfect-like English form preserves the force of a decreed judgment
    already determined by God.
  doctrine_reference: Translation philosophy §1, §3
