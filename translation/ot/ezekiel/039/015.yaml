id: EZK.39.15
reference: Ezekiel 39:15
source:
  edition: WLC
  text: וְ/עָבְר֤וּ הָ/עֹֽבְרִים֙ בָּ/אָ֔רֶץ וְ/רָאָה֙ עֶ֣צֶם אָדָ֔ם וּ/בָנָ֥ה אֶצְל֖/וֹ
    צִיּ֑וּן עַ֣ד קָבְר֤וּ אֹת/וֹ֙ הַֽ/מְקַבְּרִ֔ים אֶל גֵּ֖יא הֲמ֥וֹן גּֽוֹג־׃
translation:
  text: And those who pass through the land will pass through, and when one sees a
    human bone, he will set up a marker beside it until the buriers have buried it
    in the Valley of Hamon-gog.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a man's bone.' The Hebrew uses adam, which can mean 'man' or refer generically
      to a human being; here the generic sense best fits the burial procedure.
    reason: lexical_alternative
  - marker: b
    text: Hamon-gog likely means 'the multitude of Gog' or 'Gog's multitude,' but
      it is retained here as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבְרוּ הָעֹבְרִים
  chosen: And those who pass through the land will pass through
  alternatives:
  - And passersby will pass through
  - And those passing through will traverse
  lexicon: HALOT
  rationale: The construction uses the verb עבר followed by the participial substantive
    'the ones passing through,' creating an emphatic or iterative sense. Rendering
    both elements preserves the Hebrew repetition rather than collapsing it to a single
    English verb.
- source_word: בָּאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/earth
  - the country
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the land/territory in view, not the
    whole earth. 'Land' is the most natural contextual rendering.
- source_word: וְרָאָה
  chosen: when one sees
  alternatives:
  - and he sees
  - and someone sees
  lexicon: HALOT
  rationale: 'Though morphologically singular masculine, the verb functions generically
    with the preceding plural group: any individual passerby who sees. ''When one
    sees'' communicates the procedural sense in idiomatic English.'
- source_word: עֶצֶם אָדָם
  chosen: a human bone
  alternatives:
  - a man's bone
  - a human skeleton bone
  lexicon: HALOT
  rationale: עֶצֶם is 'bone'; אָדָם here is generic human reference, not specifically
    male. Per doctrine on אָדָם, 'human' fits the context better than 'man'.
- source_word: וּבָנָה אֶצְלוֹ צִיּוּן
  chosen: he will set up a marker beside it
  alternatives:
  - he will build a sign beside it
  - he will erect a monument near it
  lexicon: HALOT
  rationale: בנה literally means 'build,' but with ציון in this burial-marking context
    it refers to erecting or setting up a marker. ציון here is a sign/marker, not
    'Zion.' 'Beside it' reflects אצלו.
- source_word: עַד קָבְרוּ אֹתוֹ הַמְקַבְּרִים
  chosen: until the buriers have buried it
  alternatives:
  - until the gravediggers bury it
  - until those assigned to bury have buried it
  lexicon: HALOT
  rationale: The participle הַמְקַבְּרִים denotes the designated buriers. Retaining
    the cognate relation with קבר preserves the Hebrew's procedural tone. 'Buriers'
    is slightly unusual but transparent and closer than paraphrastic alternatives.
- source_word: אֶל גֵּיא הֲמוֹן גּוֹג
  chosen: in the Valley of Hamon-gog
  alternatives:
  - to the Valley of Hamon-gog
  - into the valley of Gog's multitude
  lexicon: HALOT
  rationale: The place name from the previous context is best transliterated as a
    proper name. Although אֶל often means 'to,' English idiom after 'bury' prefers
    'in.' 'Hamon-gog' is preserved as a transliterated toponym rather than translated.
