theological_decisions:
- issue: Rendering אָדָם in a generic human context
  chosen_reading: human
  alternative_readings:
  - man
  rationale: The verse refers to discovered remains of any person, not specifically
    a male individual. This follows the doctrine's guidance to render אָדָם as 'man'
    or 'humankind' according to context, with gender-accurate intent.
  doctrine_reference: 'Contested terms: אָדָם adam → man / humankind (context)'
