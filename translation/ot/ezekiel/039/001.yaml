theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - Lord Yahweh
  - the Lord Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether רֹאשׁ in 'נְשִׂיא רֹאשׁ מֶשֶׁךְ וְתֻבָל' is a title adjective/noun ('chief') or a proper name ('Rosh')
  chosen_reading: chief prince of Meshech and Tubal
  alternative_readings:
  - prince of Rosh, Meshech, and Tubal
  rationale: The Hebrew syntax naturally supports רֹאשׁ as a common noun in apposition/modification to נְשִׂיא, yielding 'chief prince.' Since 'Rosh' as a proper name remains a known interpretive option, it is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document alternatives in footnotes where ambiguity is genuine'
