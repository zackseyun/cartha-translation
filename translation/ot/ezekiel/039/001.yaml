id: EZK.39.1
reference: Ezekiel 39:1
source:
  edition: WLC
  text: וְ/אַתָּ֤ה בֶן אָדָם֙ הִנָּבֵ֣א עַל גּ֔וֹג וְ/אָ֣מַרְתָּ֔ כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה הִנְ/נִ֤י אֵלֶ֨י/ךָ֙ גּ֔וֹג נְשִׂ֕יא רֹ֖אשׁ מֶ֥שֶׁךְ וְ/תֻבָֽל־־׃
translation:
  text: 'And you, son of man, prophesy against Gog, and say: Thus says the Lord GOD: Behold, I am against you, Gog, prince of Rosh, Meshech, and Tubal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'prince of Rosh, Meshech, and Tubal.' The Hebrew word rosh can be read as 'chief' or taken as a proper name.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A relatively formal rendering preserves the idiom and its literary continuity in the book better than a flattening paraphrase such as 'human being' or 'mortal.'
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - prophesy as a prophet
  lexicon: HALOT
  rationale: The Niphal imperative/command is naturally rendered 'prophesy.' This keeps the prophetic force without unnecessary expansion.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - about
  lexicon: HALOT
  rationale: In prophetic judgment contexts, עַל with a target commonly carries an adversative sense. 'Against' best fits the oracle's hostile stance toward Gog.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine guideline, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English Bible convention avoids 'Lord LORD' by rendering 'the Lord GOD,' which preserves reverence and distinguishes the double divine title.
- source_word: הִנְנִי אֵלֶיךָ
  chosen: Behold, I am against you
  alternatives:
  - Look, I am against you
  - See, I am against you
  lexicon: HALOT
  rationale: הִנְנִי introduces emphatic divine action; 'Behold' preserves the solemn prophetic register. With אֶל in this judgment formula, 'against you' is the idiomatic English sense.
- source_word: נְשִׂיא
  chosen: prince
  alternatives:
  - leader
  - chief
  lexicon: HALOT
  rationale: נְשִׂיא commonly denotes a ruler or prince. 'Prince' preserves the elevated political title without over-specifying monarchy.
- source_word: רֹאשׁ
  chosen: chief
  alternatives:
  - Rosh
  lexicon: HALOT
  rationale: 'Here רֹאשׁ is best taken as a common noun modifying נְשִׂיא: ''chief prince.'' This yields the most natural syntax in Hebrew and avoids treating ''Rosh'' as a place-name without necessity. Because the alternative has a long translation history, it is preserved in a footnote.'
- source_word: מֶשֶׁךְ וְתֻבָל
  chosen: Meshech and Tubal
  lexicon: HALOT
  rationale: These are proper names and should be transliterated rather than translated, in keeping with the translation philosophy for names.
