theological_decisions:
- issue: Rendering the divine name in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: DOCTRINE.md sets the default rendering of יְהוָה as 'the LORD.' In the
    fixed combination with אֲדֹנָי, English translations commonly use 'the Lord GOD'
    to avoid the awkward duplication 'Lord LORD.' This preserves reverential convention
    without importing extra theology.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
