id: EZK.39.5
reference: Ezekiel 39:5
source:
  edition: WLC
  text: עַל פְּנֵ֥י הַ/שָּׂדֶ֖ה תִּפּ֑וֹל כִּ֚י אֲנִ֣י דִבַּ֔רְתִּי נְאֻ֖ם אֲדֹנָ֥/י
    יְהוִֽה־׃
translation:
  text: You will fall on the open field, for I have spoken, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''on the face of the field,'' an idiom meaning out on the open
      field.'
    reason: lexical_alternative
  - marker: b
    text: Or 'You shall fall on the field.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'the Lord GOD' represents אֲדֹנָי יְהוִה; the second term is the
      divine name YHWH, often rendered 'the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פְּנֵי הַשָּׂדֶה
  chosen: on the open field
  alternatives:
  - on the face of the field
  - upon the field
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי with a land noun commonly means 'on the surface
    of' or 'out in/open on.' 'Open field' is natural English and preserves the exposed
    setting better than the overly literal 'face of the field.'
- source_word: תִּפּוֹל
  chosen: you will fall
  alternatives:
  - you shall fall
  lexicon: HALOT
  rationale: Second masculine singular imperfect of נפל, addressed to Gog in the singular.
    'Will fall' is clear modern English; 'shall' is possible but less natural.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground for the preceding declaration: Gog will
    fall because Yahweh has spoken. ''For'' fits the prophetic register well.'
- source_word: דִבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I have said
  - I spoke
  lexicon: HALOT
  rationale: The perfect verb in prophetic speech often underscores the certainty
    and finality of the divine utterance. 'I have spoken' is the standard and weighty
    English equivalent.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - utterance of
  - oracle of
  lexicon: HALOT
  rationale: In the formula נְאֻם אֲדֹנָי יְהוִה, 'declares' gives idiomatic English
    while preserving the prophetic authority of the speech formula.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the
    compound title אֲדֹנָי יְהוִה, standard English convention is 'the Lord GOD' to
    avoid 'Lord LORD' while still signaling the divine name behind the second element.
