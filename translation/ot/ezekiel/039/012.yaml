theological_decisions:
- issue: Nature of the cleansing of the land
  chosen_reading: Render the verb in a way that preserves the ritual/defilement dimension
    without importing later doctrinal categories.
  alternative_readings:
  - purify the land
  - make the land clean
  rationale: The context concerns corpse defilement and restoration of the land's
    cleanness. 'Cleanse' preserves the ceremonial and physical sense without over-specifying
    a theological mechanism.
  doctrine_reference: Translation philosophy §3, §6
