id: EZK.39.12
reference: Ezekiel 39:12
source:
  edition: WLC
  text: וּ/קְבָרוּ/ם֙ בֵּ֣ית יִשְׂרָאֵ֔ל לְמַ֖עַן טַהֵ֣ר אֶת הָ/אָ֑רֶץ שִׁבְעָ֖ה חֳדָשִֽׁים־׃
translation:
  text: The house of Israel will bury them for seven months, in order to cleanse the
    land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purify the land.' The Hebrew verb can denote making something clean
      in a ritual sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְבָרוּם
  chosen: will bury them
  alternatives:
  - and they will bury them
  - shall bury them
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction and 3mp suffix from קבר, functioning
    here with future sense in the prophetic sequence. English supplies the explicit
    subject from the following noun phrase. 'Bury them' preserves the object suffix
    referring to the fallen enemy corpses in context.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: The house of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: A standard collective designation. 'The house of Israel' is retained
    because it is a frequent prophetic expression and preserves the covenantal-corporate
    force better than the more flattened 'Israelites.'
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: Marks purpose. 'In order to' is natural modern English and clearly conveys
    purposive force.
- source_word: טַהֵר
  chosen: cleanse
  alternatives:
  - purify
  - make clean
  lexicon: HALOT
  rationale: From טהר in the piel, denoting ritual or ceremonial cleansing. 'Cleanse'
    works well in English for both ritual and physical defilement contexts and fits
    the land-purification theme in this passage.
- source_word: אֶת־הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the earth
  lexicon: HALOT
  rationale: In Ezekiel this commonly refers to the land/territory rather than the
    whole earth. 'The land' best fits the immediate context of defilement from corpses
    and subsequent burial within Israel's territory.
- source_word: שִׁבְעָה חֳדָשִׁים
  chosen: for seven months
  alternatives:
  - seven months
  lexicon: HALOT
  rationale: Accusative of duration; English idiom naturally uses 'for seven months'
    to express the time span of the burial activity.
