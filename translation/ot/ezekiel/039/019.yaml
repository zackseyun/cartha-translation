theological_decisions:
- issue: Sacrificial imagery applied to divine judgment
  chosen_reading: Retain explicit sacrificial language ('my sacrifice that I have
    sacrificed for you') rather than softening to 'feast' in the main text.
  alternative_readings:
  - my sacrificial feast that I have prepared for you
  rationale: The verse depicts God's judgment on Gog's armies under the metaphor of
    a sacrifice consumed by birds and beasts. Preserving the repeated sacrifice language
    maintains the theological force of divine judgment without importing later doctrinal
    categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
