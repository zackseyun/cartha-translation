id: EZK.39.19
reference: Ezekiel 39:19
source:
  edition: WLC
  text: וַ/אֲכַלְתֶּם חֵ֣לֶב לְ/שָׂבְעָ֔ה וּ/שְׁתִ֥יתֶם דָּ֖ם לְ/שִׁכָּר֑וֹן מִ/זִּבְחִ֖/י
    אֲשֶׁר זָבַ֥חְתִּי לָ/כֶֽם־־׃
translation:
  text: You will eat fat until you are full, and you will drink blood until drunkenness,
    from my sacrifice that I have sacrificed for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from my sacrificial feast that I have prepared for you.' The Hebrew
      uses sacrificial language literally ('my sacrifice ... I sacrificed'), while
      the broader context makes clear it is a feast on the slain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  chosen: you will eat
  alternatives:
  - and you ate
  - then you shall eat
  lexicon: HALOT
  rationale: Wayyiqtol 2mp in prophetic discourse is naturally rendered as a future
    in English, continuing the divine address about what the birds and beasts will
    do.
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - fat portions
  - suet
  lexicon: HALOT
  rationale: The noun denotes fat. 'Fat' is the plain lexical equivalent and preserves
    the sacrificial imagery; 'fat portions' is interpretive and unnecessary in the
    main text.
- source_word: לְשָׂבְעָה
  chosen: until you are full
  alternatives:
  - to fullness
  - to satisfaction
  lexicon: HALOT
  rationale: The preposition with the noun expresses result/extent. 'Until you are
    full' is idiomatic modern English that preserves the sense of satiation.
- source_word: וּשְׁתִיתֶם
  chosen: and you will drink
  alternatives:
  - and you shall drink
  lexicon: HALOT
  rationale: Parallel to the previous wayyiqtol; future English best fits the prophetic
    announcement.
- source_word: דָּם
  chosen: blood
  lexicon: HALOT
  rationale: Direct lexical equivalent; the shocking sacrificial/judgment imagery
    should remain explicit.
- source_word: לְשִׁכָּרוֹן
  chosen: until drunkenness
  alternatives:
  - to drunkenness
  - until you are drunk
  lexicon: HALOT
  rationale: The noun means drunkenness/intoxication. 'Until drunkenness' preserves
    the nominal form and the parallel with 'until you are full,' while remaining understandable.
- source_word: מִזִּבְחִי
  chosen: from my sacrifice
  alternatives:
  - from my sacrificial feast
  - from the sacrifice for me
  lexicon: HALOT
  rationale: The noun is 'sacrifice' with 1cs suffix. Because the context is a great
    sacrificial meal (vv. 17–20), 'from my sacrifice' is the most direct rendering.
    'Sacrificial feast' captures context but adds interpretation beyond the noun itself.
- source_word: אֲשֶׁר זָבַחְתִּי לָכֶם
  chosen: that I have sacrificed for you
  alternatives:
  - that I have prepared for you as a sacrifice
  - which I sacrificed for you
  lexicon: HALOT
  rationale: The relative clause repeats the sacrificial verb זבח. Retaining 'sacrificed'
    preserves the deliberate repetition and the grim irony of God preparing this sacrificial
    slaughter for the summoned creatures. 'For you' reflects לָכֶם straightforwardly.
