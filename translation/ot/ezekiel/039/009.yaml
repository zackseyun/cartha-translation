id: EZK.39.9
reference: Ezekiel 39:9
source:
  edition: WLC
  text: וְֽ/יָצְא֞וּ יֹשְׁבֵ֣י עָרֵ֣י יִשְׂרָאֵ֗ל וּ/בִעֲר֡וּ וְ֠/הִשִּׂיקוּ בְּ/נֶ֨שֶׁק
    וּ/מָגֵ֤ן וְ/צִנָּה֙ בְּ/קֶ֣שֶׁת וּ/בְ/חִצִּ֔ים וּ/בְ/מַקֵּ֥ל יָ֖ד וּ/בְ/רֹ֑מַח
    וּ/בִעֲר֥וּ בָ/הֶ֛ם אֵ֖שׁ שֶׁ֥בַע שָׁנִֽים׀׃
translation:
  text: Then the inhabitants of the cities of Israel will go out and make fires from
    the weapons and burn them—the small shield and the large shield, the bow and the
    arrows, the hand-club and the spear—and they will make fires with them for seven
    years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and kindle with the weapons'; the Hebrew verb in this
      clause is difficult, but the context indicates that the weapons are used as
      fuel for fire.
    reason: lexical_alternative
  - marker: b
    text: Hebrew distinguishes two kinds of shields here, likely a smaller shield
      (magen) and a larger body shield (tsinnah).
    reason: cultural_note
  - marker: c
    text: Or 'hand-staff.' The Hebrew expression is literally 'staff of hand' and
      likely refers to a handheld weapon in this military list.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצְאוּ
  chosen: will go out
  alternatives:
  - will come out
  lexicon: HALOT
  rationale: Basic sense of יצא is 'go out/come out.' 'Will go out' fits the future
    narrative sequence and keeps the movement from the cities explicit.
- source_word: יֹשְׁבֵי עָרֵי יִשְׂרָאֵל
  chosen: the inhabitants of the cities of Israel
  alternatives:
  - those who dwell in the cities of Israel
  - the residents of Israel's cities
  lexicon: HALOT
  rationale: The construct phrase literally means 'the dwellers of the cities of Israel.'
    'Inhabitants' is natural modern English while preserving the concrete reference
    to city residents.
- source_word: וּבִעֲרוּ
  chosen: make fires
  alternatives:
  - burn
  - kindle
  lexicon: HALOT
  rationale: בער in the Piel commonly means to burn or consume, but here it is paired
    with אש later and followed by a list of weapons used as fuel. Rendering it as
    'make fires' avoids awkward repetition while preserving the idea of kindling/burning.
- source_word: וְהִשִּׂיקוּ
  chosen: from the weapons
  alternatives:
  - with weapons
  - set on fire the weapons
  - kindle from the weapons
  lexicon: HALOT
  rationale: This verb is difficult and contextually tied to fuel for fire. The clause
    as a whole indicates using captured weapons as combustible material. 'Make fires
    from the weapons' communicates the sense in idiomatic English without overcommitting
    to a narrower technical nuance.
- source_word: נֶשֶׁק
  chosen: weapons
  alternatives:
  - weaponry
  - arms
  lexicon: HALOT
  rationale: נשק is a collective term for weaponry. 'Weapons' is clear and contemporary.
- source_word: מָגֵן
  chosen: the small shield
  alternatives:
  - shield
  lexicon: HALOT
  rationale: In distinction from צִנָּה, מָגֵן is commonly the smaller shield. Rendering
    both distinctly preserves the Hebrew pairing.
- source_word: צִנָּה
  chosen: the large shield
  alternatives:
  - buckler
  - shield
  lexicon: HALOT
  rationale: צנה is the larger body shield, contrasted with מגן. 'Large shield' is
    more accessible than 'buckler' and preserves the distinction.
- source_word: קֶשֶׁת
  chosen: the bow
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: חִצִּים
  chosen: the arrows
  lexicon: HALOT
  rationale: Standard rendering of the plural noun.
- source_word: מַקֵּל יָד
  chosen: the hand-club
  alternatives:
  - hand-staff
  - club
  - staff
  lexicon: HALOT
  rationale: The phrase literally means 'staff/rod of hand.' In a weapons list, it
    likely denotes a handheld striking weapon rather than an ordinary walking staff.
    'Hand-club' preserves the martial context and the literal hand element.
- source_word: רֹמַח
  chosen: the spear
  alternatives:
  - lance
  lexicon: HALOT
  rationale: Standard military term; 'spear' is the most natural English equivalent.
- source_word: וּבִעֲרוּ בָהֶם אֵשׁ
  chosen: and they will make fires with them
  alternatives:
  - and they will burn fires with them
  - and they will burn them as fuel
  lexicon: HALOT
  rationale: The phrase explicitly states that the weapons serve as the material for
    the fire. 'Make fires with them' is idiomatic and preserves the instrumental sense
    of בהם.
- source_word: שֶׁבַע שָׁנִים
  chosen: for seven years
  lexicon: HALOT
  rationale: Straightforward temporal expression.
