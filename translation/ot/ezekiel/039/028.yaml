id: EZK.39.28
reference: Ezekiel 39:28
source:
  edition: WLC
  text: וְ/יָדְע֗וּ כִּ֣י אֲנִ֤י יְהוָה֙ אֱלֹ֣הֵי/הֶ֔ם בְּ/הַגְלוֹתִ֤/י אֹתָ/ם֙ אֶל הַ/גּוֹיִ֔ם וְ/כִנַּסְתִּ֖י/ם עַל אַדְמָתָ֑/ם וְ/לֹֽא אוֹתִ֥יר ע֛וֹד מֵ/הֶ֖ם שָֽׁם־־־׃
translation:
  text: Then they will know that I am Yahweh their God, when I exiled them among the nations and then gathered them to their own land, and I left none of them there any longer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And they will know that I am the LORD their God, by exiling them among the nations and gathering them onto their own land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: Then they will know
  alternatives:
  - And they will know
  lexicon: HALOT
  rationale: The verb means 'know' or 'come to know.' The prefixed conjunction can be rendered simply 'and,' but 'then' fits the discourse flow in English by marking the result of God's actions without adding meaning beyond the narrative sequence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: 'Construct form with pronominal suffix: ''the God of them'' = ''their God.'' Standard, natural English.'
- source_word: בְּהַגְלוֹתִי אֹתָם אֶל־הַגּוֹיִם
  chosen: when I exiled them among the nations
  alternatives:
  - when I sent them into exile among the nations
  - by exiling them to the nations
  lexicon: HALOT
  rationale: The infinitive construct of גלה with first-person suffix expresses God's action of causing exile. 'Exiled' is more direct and natural than a wooden 'in my exiling.' 'Among the nations' captures the sense of dispersion in context, though 'to the nations' is also possible.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In Ezekiel this refers to the foreign nations generally, not specifically to a Jew/Gentile theological contrast, so 'nations' is preferable.
- source_word: וְכִנַּסְתִּים
  chosen: and then gathered them
  alternatives:
  - and gathered them
  - and assembled them
  lexicon: HALOT
  rationale: כנס means 'gather, collect, assemble.' 'Gathered' is the most idiomatic in restoration contexts. 'Then' helps reflect the sequence after exile.
- source_word: עַל אַדְמָתָם
  chosen: onto their own land
  alternatives:
  - upon their land
  - to their land
  lexicon: HALOT
  rationale: אַדָמָה here means land/ground, specifically Israel's land. 'Their own land' makes the possessive force explicit and reads naturally. 'Onto' reflects עַל reasonably in this restoration setting.
- source_word: וְלֹא אוֹתִיר עוֹד מֵהֶם שָׁם
  chosen: and I will leave none of them there any longer
  alternatives:
  - and I will no longer leave any of them there
  - and I will not leave any of them behind there anymore
  lexicon: HALOT
  rationale: הותיר in Hiphil means 'leave over, leave remaining.' The clause promises that none of the exiles will remain there, i.e., among the nations. 'There' refers back to the place of exile. 'Any longer' conveys עוֹד naturally.
