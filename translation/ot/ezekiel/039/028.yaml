- issue: Referent of 'there' (שָׁם)
  chosen_reading: '''There'' refers to the nations/the place of exile, not the land of Israel.'
  alternative_readings:
  - '''There'' as a more general locative without explicit antecedent'
  rationale: The immediate context contrasts exile among the nations with regathering onto their land. The promise is that none of them will remain in exile.
