theological_decisions:
- issue: Interpretation of וְשִׁשֵּׁאתִיךָ in a difficult Hebrew clause
  chosen_reading: 'A movement verb: ''drive you on'''
  alternative_readings:
  - 'A remnant/fraction reading: ''leave only a sixth of you'''
  rationale: The immediate context strings together verbs of divine movement ('turn,'
    'bring up,' 'bring'). Reading this difficult form as another movement verb best
    preserves the flow and avoids importing a numerically specific judgment not clearly
    demanded by the Hebrew form here. Because the alternative has substantial translation
    history, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
