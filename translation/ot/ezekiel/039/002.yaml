id: EZK.39.2
reference: Ezekiel 39:2
source:
  edition: WLC
  text: וְ/שֹׁבַבְתִּ֨י/ךָ֙ וְ/שִׁשֵּׁאתִ֔י/ךָ וְ/הַעֲלִיתִ֖י/ךָ מִ/יַּרְכְּתֵ֣י צָפ֑וֹן
    וַ/הֲבִאוֹתִ֖/ךָ עַל הָרֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: I will turn you around, drive you on, bring you up from the far north, and
    bring you against the mountains of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the remotest parts of the north.'
    reason: lexical_alternative
  - marker: b
    text: The difficult verb rendered 'drive you on' has also been understood by some
      translations as 'leave only a sixth of you.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשֹׁבַבְתִּיךָ
  chosen: I will turn you around
  alternatives:
  - I will turn you back
  - I will lead you back
  lexicon: HALOT
  rationale: From שוב in a causative/turning sense with 2ms object. In this judgment-oracle
    context, the sense is that God redirects Gog's movement. 'Turn you around' is
    natural English and preserves the idea of divinely controlling his course without
    overcommitting to 'back' if the nuance is not strictly reversal to a prior location.
- source_word: וְשִׁשֵּׁאתִיךָ
  chosen: drive you on
  alternatives:
  - lead you along
  - draw you onward
  - leave only a sixth of you
  lexicon: HALOT
  rationale: The verb is difficult and has been variously understood. The consonantal
    form is commonly taken from a verb meaning to lead/drive onward, fitting the sequence
    of divine actions moving Gog southward. The traditional rendering 'leave but the
    sixth part of you' depends on a different understanding reflected in some older
    versions/translations, but that sense is lexically uncertain and does not fit
    the immediate movement sequence as well. 'Drive you on' captures compelled movement
    and the hostile-oracular tone.
- source_word: וְהַעֲלִיתִיךָ
  chosen: bring you up
  alternatives:
  - cause you to come up
  - lead you up
  lexicon: HALOT
  rationale: Hiphil of עלה regularly means cause to go up/bring up. 'Bring you up'
    is concise and idiomatic, preserving the directional sense.
- source_word: מִיַּרְכְּתֵי צָפוֹן
  chosen: from the far north
  alternatives:
  - from the remotest parts of the north
  - from the uttermost north
  lexicon: HALOT
  rationale: The construct phrase literally denotes the remote extremities/flanks
    of the north. 'Far north' communicates the geographic extremity in readable modern
    English; the fuller literal alternative is preserved in a footnote.
- source_word: וַהֲבִאוֹתִיךָ
  chosen: and bring you against
  alternatives:
  - and bring you to
  - and bring you upon
  lexicon: HALOT
  rationale: With על following, the sense is movement against/upon the mountains of
    Israel in a military context. 'Against' better conveys hostile approach than the
    more neutral 'to'.
- source_word: עַל הָרֵי יִשְׂרָאֵל
  chosen: the mountains of Israel
  alternatives:
  - the mountains of Isra'el
  lexicon: HALOT
  rationale: A standard geographic expression in Ezekiel. 'Mountains of Israel' preserves
    the prophetic territorial language.
