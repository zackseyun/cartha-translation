id: EZK.39.3
reference: Ezekiel 39:3
source:
  edition: WLC
  text: וְ/הִכֵּיתִ֥י קַשְׁתְּ/ךָ֖ מִ/יַּ֣ד שְׂמֹאולֶ֑/ךָ וְ/חִצֶּ֕י/ךָ מִ/יַּ֥ד יְמִינְ/ךָ֖
    אַפִּֽיל׃
translation:
  text: And I will strike your bow from your left hand, and I will make your arrows
    fall from your right hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I will cause your arrows to fall from your right hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכֵּיתִי
  chosen: And I will strike
  alternatives:
  - And I will knock
  - And I will smite
  lexicon: HALOT
  rationale: From נכה in the Hiphil, here with the sense of striking a weapon so as
    to disable or dislodge it. 'Strike' is natural modern English and preserves the
    force without archaic tone. The prefixed conjunction is carried as 'And.'
- source_word: קַשְׁתְּךָ
  chosen: your bow
  lexicon: HALOT
  rationale: Standard rendering of קֶשֶׁת as the weapon 'bow.' The 2ms suffix is represented
    by 'your.'
- source_word: מִיַּד שְׂמֹאולֶךָ
  chosen: from your left hand
  alternatives:
  - out of your left hand
  lexicon: HALOT
  rationale: Literally 'from the hand of your left.' In English, 'from your left hand'
    is the most idiomatic equivalent while preserving the concrete imagery.
- source_word: וְחִצֶּיךָ
  chosen: and your arrows
  lexicon: HALOT
  rationale: Plural noun 'arrows' with 2ms suffix. The conjunction is retained.
- source_word: מִיַּד יְמִינְךָ
  chosen: from your right hand
  alternatives:
  - out of your right hand
  lexicon: HALOT
  rationale: Literally 'from the hand of your right.' Rendered idiomatically in English
    while preserving the bodily imagery and parallelism with the previous phrase.
- source_word: אַפִּיל
  chosen: I will make ... fall
  alternatives:
  - I will cause ... to fall
  - I will cast down
  lexicon: HALOT
  rationale: 'Hiphil of נפל, causative: not merely ''fall'' but ''cause to fall.''
    In English, ''I will make your arrows fall'' is both clear and faithful. This
    also preserves the image of God causing the arrows to drop from Gog''s hand rather
    than necessarily destroying them directly.'
