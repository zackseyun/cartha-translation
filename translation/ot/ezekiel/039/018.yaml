id: EZK.39.18
reference: Ezekiel 39:18
source:
  edition: WLC
  text: בְּשַׂ֤ר גִּבּוֹרִים֙ תֹּאכֵ֔לוּ וְ/דַם נְשִׂיאֵ֥י הָ/אָ֖רֶץ תִּשְׁתּ֑וּ אֵילִ֨ים
    כָּרִ֤ים וְ/עַתּוּדִים֙ פָּרִ֔ים מְרִיאֵ֥י בָשָׁ֖ן כֻּלָּֽ/ם־׃
translation:
  text: You will eat the flesh of mighty men, and you will drink the blood of the
    princes of the earth—rams, lambs, male goats, and bulls, all of them fattened
    ones of Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The animal terms ('rams, lambs, male goats, and bulls') are metaphorical
      sacrificial imagery for the slain rulers and warriors.
    reason: cultural_note
  - marker: b
    text: Or 'fatlings of Bashan.' Bashan was known for rich pasture and well-fed
      livestock.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׂר
  chosen: flesh
  alternatives:
  - meat
  lexicon: HALOT
  rationale: The noun denotes flesh in a literal bodily sense. 'Flesh' preserves the
    stark sacrificial/feasting imagery better than the softer 'meat.'
- source_word: גִּבּוֹרִים
  chosen: mighty men
  alternatives:
  - warriors
  - mighty ones
  - heroes
  lexicon: HALOT
  rationale: In context of defeated armies, the term refers to powerful fighting men.
    'Mighty men' is natural English and preserves the masculine plural force of the
    Hebrew.
- source_word: תֹּאכֵלוּ
  chosen: you will eat
  alternatives:
  - eat
  lexicon: HALOT
  rationale: Imperfect 2mp here functions as a future-like invitation/announcement
    to the summoned guests. 'You will eat' matches the prophetic declaration.
- source_word: דַם
  chosen: blood
  lexicon: HALOT
  rationale: Literal blood is intended in the grotesque sacrificial battle image;
    no softening is warranted.
- source_word: נְשִׂיאֵי הָאָרֶץ
  chosen: the princes of the earth
  alternatives:
  - leaders of the land
  - chiefs of the land
  lexicon: HALOT
  rationale: נְשִׂיאִים commonly means princes, chiefs, or leaders. 'Princes of the
    earth' keeps the elevated register and mirrors the construct phrase closely. 'Earth'
    is retained rather than 'land' because the phrase is not limited to Israel's land
    here and has a broad, international sense in context.
- source_word: תִּשְׁתּוּ
  chosen: you will drink
  alternatives:
  - drink
  lexicon: HALOT
  rationale: As with תֹּאכֵלוּ, the imperfect is rendered as a future-like declaration
    in prophetic discourse.
- source_word: אֵילִים
  chosen: rams
  alternatives:
  - leaders
  lexicon: HALOT
  rationale: Although the noun can metaphorically denote strong leaders, here it stands
    in a list of sacrificial animals (rams, lambs, goats, bulls), so the literal animal
    sense is required.
- source_word: כָּרִים
  chosen: lambs
  alternatives:
  - rams
  - young rams
  lexicon: HALOT
  rationale: The term denotes young sheep/fattened lambs. 'Lambs' fits the animal
    catalog and avoids redundancy with אֵילִים already rendered 'rams.'
- source_word: עַתּוּדִים
  chosen: male goats
  alternatives:
  - goats
  - he-goats
  lexicon: HALOT
  rationale: The word specifically denotes male goats. 'Male goats' is clear modern
    English without archaic tone.
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: The plural refers to bovines in sacrificial imagery; 'bulls' is the most
    straightforward rendering here.
- source_word: מְרִיאֵי בָשָׁן
  chosen: fattened ones of Bashan
  alternatives:
  - fatlings of Bashan
  - well-fed ones of Bashan
  lexicon: HALOT
  rationale: The phrase evokes the famed rich pastureland of Bashan and its well-fed
    livestock. 'Fattened ones' preserves the metaphorical force applied to the slain
    rulers while remaining readable.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all of them alike
  - every one of them
  lexicon: HALOT
  rationale: This summarizes the preceding animal images collectively; 'all of them'
    is direct and idiomatic.
