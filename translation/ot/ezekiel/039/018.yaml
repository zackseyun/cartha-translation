theological_decisions:
- issue: Whether to render the animal list as literal livestock only or as metaphorical
    apposition for the slain rulers
  chosen_reading: Render the animal terms literally in the main text while preserving
    their metaphorical function through punctuation and context.
  alternative_readings:
  - Render the whole clause dynamically as titles for human rulers, e.g., 'the rams,
    lambs, goats, and bulls—that is, all the fattened leaders of Bashan'
  rationale: The Hebrew presents a literal list of sacrificial animals as metaphorical
    imagery for the human victims. Keeping the animal names in the main text best
    preserves Ezekiel's sacrificial-battle metaphor without flattening it into explanation.
  doctrine_reference: Translation philosophy §1, §3, §6
