id: EZK.39.14
reference: Ezekiel 39:14
source:
  edition: WLC
  text: וְ/אַנְשֵׁ֨י תָמִ֤יד יַבְדִּ֨ילוּ֙ עֹבְרִ֣ים בָּ/אָ֔רֶץ מְקַבְּרִ֣ים אֶת הָ/עֹבְרִ֗ים
    אֶת הַ/נּוֹתָרִ֛ים עַל פְּנֵ֥י הָ/אָ֖רֶץ לְ/טַֽהֲרָ֑/הּ מִ/קְצֵ֥ה שִׁבְעָֽה חֳדָשִׁ֖ים
    יַחְקֹֽרוּ־־־־׃
translation:
  text: And they will set apart men continually, who will pass through the land burying
    those who passed through—those left on the surface of the land—to cleanse it.
    At the end of seven months they will make a search.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'men regularly appointed'; the Hebrew literally has 'men of continuality,'
      indicating an ongoing assignment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew repeats the verb 'pass through' ('burying those who passed through').
      In context this likely refers to the dead left lying in the land, but the wording
      is difficult and may intentionally echo the searchers' passing through the land.
    reason: lexical_alternative
  - marker: c
    text: Or 'they will search thoroughly' or 'they will investigate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי תָמִיד
  chosen: men continually
  alternatives:
  - men regularly
  - men permanently
  - continual men
  lexicon: HALOT
  rationale: אַנְשֵׁי is construct 'men of,' with תָמִיד functioning adverbially to
    indicate an ongoing or continual appointment. English idiom is best captured by
    'men continually' within the clause 'set apart men continually,' i.e., men appointed
    on a continuing basis.
- source_word: יַבְדִּילוּ
  chosen: they will set apart
  alternatives:
  - they will separate
  - they will appoint
  lexicon: HALOT
  rationale: Hiphil of בדל commonly means 'separate, set apart.' In this administrative
    context it implies designation for a task; 'set apart' preserves the formal sense
    while allowing the implied appointment.
- source_word: עֹבְרִים בָּאָרֶץ
  chosen: who will pass through the land
  alternatives:
  - who travel through the land
  - passers through the land
  lexicon: HALOT
  rationale: Qal participle of עבר denotes moving through. Here it describes the assigned
    searchers moving throughout the land. Relative-clause rendering is clearer in
    English than a bare participle.
- source_word: מְקַבְּרִים
  chosen: burying
  alternatives:
  - and burying
  - to bury
  lexicon: HALOT
  rationale: Participle of קבר expresses attendant action of those traversing the
    land. 'Burying' naturally links to the preceding participial phrase.
- source_word: הָעֹבְרִים
  chosen: those who passed through
  alternatives:
  - the passersby
  - those passing through
  lexicon: HALOT
  rationale: The repeated עבר is difficult. In context of corpse disposal after battle,
    this likely refers to those who have 'passed on' or are encountered in passing.
    To preserve the lexical repetition without overinterpreting, 'those who passed
    through' is retained in the main text, with the contextual sense clarified by
    the following apposition.
- source_word: הַנּוֹתָרִים עַל־פְּנֵי הָאָרֶץ
  chosen: those left on the surface of the land
  alternatives:
  - those remaining on the face of the earth
  - those left lying on the ground
  lexicon: HALOT
  rationale: נותרים means 'those left/remain.' עַל־פְּנֵי הָאָרֶץ here refers to bodies
    left exposed on the ground/land. 'Surface of the land' is a fairly formal but
    clear rendering that avoids globalizing 'earth'.
- source_word: לְטַהֲרָהּ
  chosen: to cleanse it
  alternatives:
  - to purify it
  lexicon: HALOT
  rationale: טהר in this context concerns ritual and physical cleansing of the land
    from corpse defilement. 'Cleanse' is accessible modern English and broad enough
    to preserve both aspects.
- source_word: מִקְצֵה שִׁבְעָה חֳדָשִׁים
  chosen: At the end of seven months
  alternatives:
  - From the end of seven months
  - After seven months
  lexicon: HALOT
  rationale: The preposition מן with קצה can mark the point at which the next action
    begins. 'At the end of seven months' best fits the sequence from the prior verse
    and the following verb.
- source_word: יַחְקֹרוּ
  chosen: they will make a search
  alternatives:
  - they will search
  - they will investigate
  lexicon: HALOT
  rationale: חקר means search out, investigate thoroughly. 'Make a search' conveys
    a deliberate, organized inspection after the seven-month burial period.
