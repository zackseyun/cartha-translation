theological_decisions:
- issue: Nature of the cleansing of the land
  chosen_reading: Render in a way that preserves both ritual and practical cleansing
    without narrowing to a purely ceremonial or purely sanitary sense.
  alternative_readings:
  - purely ritual purification
  - purely physical cleanup
  rationale: The burial of exposed corpses in Ezekiel carries defilement implications,
    but the text itself does not force a reduction to one category. 'To cleanse it'
    preserves the theological and practical dimensions together.
  doctrine_reference: Preserve theological tension rather than resolve it.
