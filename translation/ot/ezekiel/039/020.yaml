id: EZK.39.20
reference: Ezekiel 39:20
source:
  edition: WLC
  text: וּ/שְׂבַעְתֶּ֤ם עַל שֻׁלְחָנִ/י֙ ס֣וּס וָ/רֶ֔כֶב גִּבּ֖וֹר וְ/כָל אִ֣ישׁ מִלְחָמָ֑ה
    נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: And you will be filled at my table with horse and chariot, with mighty man
    and every man of war, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'horse and chariot'; the singular forms likely function collectively
      for military forces and equipment.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty one' or 'warrior' for 'mighty man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂבַעְתֶּם
  chosen: you will be filled
  alternatives:
  - you will be satisfied
  - you will eat your fill
  lexicon: HALOT
  rationale: The verb שׂבע in this context denotes being sated from eating. 'Be filled'
    preserves the passive/resultative sense and fits the sacrificial-feast imagery
    of the surrounding context, while remaining natural English.
- source_word: עַל שֻׁלְחָנִי
  chosen: at my table
  alternatives:
  - upon my table
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' the idiomatic English expression
    with table fellowship is 'at my table.' This preserves the image without wooden
    phrasing.
- source_word: סוּס וָרֶכֶב
  chosen: horse and chariot
  alternatives:
  - horses and chariots
  - horse and rider
  lexicon: HALOT
  rationale: The Hebrew nouns are singular collectives here, likely representing military
    assets generally. 'Horse and chariot' is a close rendering. 'Horse and rider'
    is not supported by the consonantal text, and pluralizing would be interpretive.
- source_word: גִּבּוֹר
  chosen: mighty man
  alternatives:
  - warrior
  - mighty one
  lexicon: HALOT
  rationale: The adjective/substantive גִּבּוֹר often means 'mighty man' or 'warrior.'
    Here, because it is coordinated with 'every man of war,' 'mighty man' preserves
    the lexical distinction rather than collapsing both into 'warrior.'
- source_word: וְכָל אִישׁ מִלְחָמָה
  chosen: and every man of war
  alternatives:
  - and every warrior
  - and all fighting men
  lexicon: HALOT
  rationale: This phrase is literally 'every man of war.' Per the gender-accurate
    policy, 'man' is retained because the referent is specifically combatants in an
    ancient military context, not generic humanity.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: In prophetic formulae, נְאֻם is well rendered by 'declares,' which is
    idiomatic modern English and preserves the solemn divine speech formula.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: Following the doctrine's default, יְהוָה is rendered 'the LORD.' In the
    compound title אֲדֹנָי יְהוִה, standard English convention is 'the Lord GOD' to
    avoid 'Lord LORD' while preserving both divine titles.
