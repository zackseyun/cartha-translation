theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The doctrinal guideline sets the default rendering of יְהוָה as 'the
    LORD.' In the fixed combination אֲדֹנָי יְהוִה, English translations commonly
    use 'the Lord GOD' to represent both elements without awkward duplication. This
    preserves reverential convention and the distinction of the double title.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
