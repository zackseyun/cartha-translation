theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In the compound title אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid
    'Lord LORD' while still signaling the divine name distinctly.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → ''the LORD'''
- issue: Meaning of the restoration idiom אֶת שבית יעקב
  chosen_reading: restore the fortunes of Jacob
  alternative_readings:
  - bring back the captives of Jacob
  - restore Jacob from captivity
  rationale: The Hebrew idiom can refer broadly to restoration, though it historically
    arose from captivity language. Given the context of national restoration, the
    broader idiomatic sense is preferable in the main text, while the captivity-oriented
    alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
- issue: Nuance of divine קנאה
  chosen_reading: I will be jealous for my holy name
  alternative_readings:
  - I will be zealous for my holy name
  rationale: The Hebrew expresses God's covenantal jealousy/zeal concerning his holy
    name. 'Jealous' is lexically closer and preserves the theological force, while
    'zealous' is preserved as an alternative because English readers may hear 'jealous'
    narrowly as sinful envy.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
