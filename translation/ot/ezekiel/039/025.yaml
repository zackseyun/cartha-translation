id: EZK.39.25
reference: Ezekiel 39:25
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה עַתָּ֗ה אָשִׁיב֙ אֶת שבית יַֽעֲקֹ֔ב
    וְ/רִֽחַמְתִּ֖י כָּל בֵּ֣ית יִשְׂרָאֵ֑ל וְ/קִנֵּאתִ֖י לְ/שֵׁ֥ם קָדְשִֽׁ/י־־׃
translation:
  text: 'Therefore thus says the Lord GOD: Now I will restore the fortunes of Jacob,
    and I will have compassion on the whole house of Israel, and I will be jealous
    for my holy name.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will bring back the captives of Jacob.' The Hebrew idiom can refer
      specifically to return from captivity or more broadly to restoring a people's
      fortunes.
    reason: alternative_reading
  - marker: b
    text: Or, 'I will be zealous for my holy name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding context; 'therefore'
    preserves the logical connection clearly in English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' is both natural and
    formally transparent.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Renders אֲדֹנָי as 'Lord' and, per doctrine, יְהוָה as 'the LORD.' In
    the combined title, conventional English capitalization 'Lord GOD' distinguishes
    the two elements without using the divine name transliteration.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Signals a decisive transition to present/future divine action; 'now'
    is concise and natural.
- source_word: אָשִׁיב אֶת שבית יַעֲקֹב
  chosen: I will restore the fortunes of Jacob
  alternatives:
  - I will restore Jacob from captivity
  - I will bring back the captives of Jacob
  lexicon: HALOT
  rationale: The idiom שׁוּב + שְׁבוּת/שבית often denotes restoration from a state
    of calamity, not only literal return of captives. 'Restore the fortunes' best
    captures the idiomatic force in readable English while preserving the restoration
    theme.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The source text uses the patriarchal name Jacob; it should be preserved
    rather than harmonized to Israel.
- source_word: וְרִחַמְתִּי
  chosen: and I will have compassion
  alternatives:
  - and I will show mercy
  - and I will be compassionate
  lexicon: HALOT
  rationale: רחם conveys deep compassion/mercy. 'Have compassion' is natural English
    and avoids overly ecclesiastical diction while retaining emotional and covenantal
    weight.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  chosen: the whole house of Israel
  alternatives:
  - all the house of Israel
  - the entire house of Israel
  lexicon: HALOT
  rationale: Preserves the collective covenantal expression 'house of Israel'; 'the
    whole house' is idiomatic and reflects כָּל.
- source_word: וְקִנֵּאתִי
  chosen: and I will be jealous
  alternatives:
  - and I will be zealous
  - and I will act with jealousy
  lexicon: HALOT
  rationale: קנא in relation to God's name can denote jealous zeal. 'Jealous' is the
    more direct lexical equivalent and preserves the covenantal intensity; 'zealous'
    is a viable interpretive alternative preserved in a footnote.
- source_word: לְשֵׁם קָדְשִׁי
  chosen: for my holy name
  alternatives:
  - for the sake of my holy name
  - on behalf of my holy name
  lexicon: HALOT
  rationale: The preposition ל here expresses concern/zeal directed toward God's holy
    name. 'For my holy name' is concise and faithful; the fuller idiomatic expansion
    'for the sake of' is possible but not required.
