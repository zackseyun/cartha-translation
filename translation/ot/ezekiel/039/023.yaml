id: EZK.39.23
reference: Ezekiel 39:23
source:
  edition: WLC
  text: וְ/יָדְע֣וּ הַ֠/גּוֹיִם כִּ֣י בַ/עֲוֺנָ֞/ם גָּל֣וּ בֵֽית יִשְׂרָאֵ֗ל עַ֚ל
    אֲשֶׁ֣ר מָֽעֲלוּ בִ֔/י וָ/אַסְתִּ֥ר פָּנַ֖/י מֵ/הֶ֑ם וָֽ/אֶתְּנֵ/ם֙ בְּ/יַ֣ד צָרֵי/הֶ֔ם
    וַ/יִּפְּל֥וּ בַ/חֶ֖רֶב כֻּלָּֽ/ם־־׃
translation:
  text: And the nations will know that the house of Israel went into exile for their
    iniquity, because they acted unfaithfully against me; so I hid my face from them
    and gave them into the hand of their adversaries, and they all fell by the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they trespassed against me' / 'they dealt treacherously with me.' The
      Hebrew verb carries the sense of covenant unfaithfulness or breach of faith.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'into the hand of their adversaries,' a Hebrew idiom for being
      delivered into another's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: And ... will know
  alternatives:
  - And ... shall know
  - Then ... will know
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries future/resultative force in English. 'Will know' is natural modern English
    and preserves the recognition theme central to Ezekiel.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם in Ezekiel regularly refers to the foreign nations. 'Nations'
    is the standard, contextually clear rendering; 'Gentiles' would sound overly NT-specific.
- source_word: בַעֲוֺנָם
  chosen: for their iniquity
  alternatives:
  - because of their guilt
  - for their wrongdoing
  lexicon: HALOT
  rationale: עָוֺן carries the sense of iniquity/guilt, often with culpable moral
    crookedness. 'For their iniquity' preserves the moral and judicial weight better
    than the flatter 'wrongdoing.'
- source_word: גָּלוּ
  chosen: went into exile
  alternatives:
  - were exiled
  - were carried away captive
  lexicon: HALOT
  rationale: The verb denotes going into exile. 'Went into exile' preserves the state/result
    without importing a more passive nuance than the Hebrew form itself requires;
    the passive sense is implicit in the historical context but need not be made explicit
    here.
- source_word: בֵית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the people of Israel
  lexicon: HALOT
  rationale: This covenantal collective expression is important in Ezekiel and should
    be retained rather than flattened to simply 'Israel.'
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - on account of which
  - for that
  lexicon: HALOT
  rationale: The phrase introduces the reason for exile. 'Because' gives the causal
    force in clear English.
- source_word: מָעֲלוּ בִי
  chosen: they acted unfaithfully against me
  alternatives:
  - they trespassed against me
  - they were faithless to me
  - they dealt treacherously with me
  lexicon: HALOT
  rationale: מעל denotes breach of faith, treachery, or unfaithfulness, especially
    in covenantal contexts. 'Acted unfaithfully against me' communicates covenant
    violation clearly in modern English.
- source_word: וָאַסְתִּר פָּנַי מֵהֶם
  chosen: so I hid my face from them
  alternatives:
  - and I hid my face from them
  - I concealed my face from them
  lexicon: HALOT
  rationale: The idiom 'hide my face' is a significant biblical expression for withdrawing
    favor/presence and should be preserved literally. 'So' makes the consequence relation
    explicit in smooth English without over-paraphrasing.
- source_word: וָאֶתְּנֵם בְּיַד צָרֵיהֶם
  chosen: and gave them into the hand of their adversaries
  alternatives:
  - and handed them over to their enemies
  - and gave them into the power of their foes
  lexicon: HALOT
  rationale: '''Into the hand of'' is a common Hebrew idiom for power/control. Retaining
    ''hand'' preserves the idiom''s texture while remaining understandable. צָרִים
    are hostile opponents; ''adversaries'' is slightly broader and fits the context
    well.'
- source_word: וַיִּפְּלוּ בַחֶרֶב
  chosen: and they all fell by the sword
  alternatives:
  - and they all fell by sword
  - and they all were slain by the sword
  lexicon: HALOT
  rationale: '''Fell by the sword'' is a natural English equivalent for the idiom
    of death in battle/judgment and preserves the solemn register of the Hebrew.'
- source_word: כֻּלָּם
  chosen: they all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Placed with the verb in English as 'they all' for natural flow while
    preserving the totalizing force of the Hebrew.
