theological_decisions:
- issue: Causal relationship between Israel's sin, divine hiddenness, and exile/judgment
  chosen_reading: The verse presents exile and military defeat as divine judgment
    for Israel's iniquity and covenant unfaithfulness, without softening either human
    culpability or divine agency.
  alternative_readings:
  - A more passive rendering that foregrounds only historical exile without explicit
    divine judgment
  rationale: The Hebrew explicitly links exile to Israel's iniquity, states that they
    acted unfaithfully against God, and then attributes God's hiding of his face and
    giving them into enemies' power as consequent acts. The translation preserves
    this theological sequence without adding interpretive material beyond the text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
