id: EZK.39.24
reference: Ezekiel 39:24
source:
  edition: WLC
  text: כְּ/טֻמְאָתָ֥/ם וּ/כְ/פִשְׁעֵי/הֶ֖ם עָשִׂ֣יתִי אֹתָ֑/ם וָ/אַסְתִּ֥ר פָּנַ֖/י
    מֵ/הֶֽם׃ס
translation:
  text: According to their uncleanness and according to their transgressions I dealt
    with them, and I hid my face from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'According to their impurity and according to their rebellions I treated
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּטֻמְאָתָם
  chosen: According to their uncleanness
  alternatives:
  - In keeping with their uncleanness
  - According to their impurity
  lexicon: HALOT
  rationale: The prefixed כ conveys conformity or measure ('according to/in keeping
    with'). טֻמְאָה commonly denotes ritual or moral uncleanness/impurity. 'Uncleanness'
    preserves the biblical-theological register and matches prophetic usage better
    than the more flattened 'impurity.'
- source_word: וּכְפִשְׁעֵיהֶם
  chosen: and according to their transgressions
  alternatives:
  - and in keeping with their rebellions
  - and according to their offenses
  lexicon: HALOT
  rationale: פֶּשַׁע often carries the sense of rebellion or transgression against
    God. 'Transgressions' is a clear, established English equivalent that preserves
    moral and covenantal force without overinterpreting every instance as overt rebellion.
- source_word: עָשִׂיתִי אֹתָם
  chosen: I dealt with them
  alternatives:
  - I acted toward them
  - I treated them
  lexicon: HALOT
  rationale: The idiom עשה + object here does not mean 'made them' but 'dealt with/treated
    them.' 'I dealt with them' is idiomatic English and best reflects the contextual
    sense of divine action in judgment.
- source_word: וָאַסְתִּר פָּנַי מֵהֶם
  chosen: and I hid my face from them
  alternatives:
  - and I concealed my face from them
  lexicon: HALOT
  rationale: The expression 'hide my face' is a standard Hebrew idiom for withdrawing
    favor or presence in judgment. It should be preserved rather than paraphrased,
    since the metaphor is theologically significant and intelligible in English.
- source_word: פָּנַי
  chosen: my face
  lexicon: HALOT
  rationale: Though 'face' can metonymically imply presence or favor, the Hebrew image
    is important and should remain explicit in the main text.
