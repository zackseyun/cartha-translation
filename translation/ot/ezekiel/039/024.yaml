theological_decisions:
- issue: Whether to paraphrase the idiom 'I hid my face' as divine withdrawal of favor
  chosen_reading: Retain the idiom 'I hid my face from them' in the main text
  alternative_readings:
  - I turned away from them
  - I withdrew my favor from them
  rationale: The Hebrew idiom is both understandable in English and theologically
    weighty in prophetic literature, expressing covenant judgment without reducing
    it to a single interpretive gloss. Preserving the idiom maintains the text's imagery
    and tension.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it'
- issue: Sense of טֻמְאָה in prophetic context
  chosen_reading: Render as 'uncleanness'
  alternative_readings:
  - impurity
  rationale: In Ezekiel, the term can encompass both ritual and moral defilement.
    'Uncleanness' preserves that broader biblical category better than a narrower
    or more modernized term.
  doctrine_reference: 'Translation philosophy #1, original-language primacy over translation
    tradition'
