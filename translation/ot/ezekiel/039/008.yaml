id: EZK.39.8
reference: Ezekiel 39:8
source:
  edition: WLC
  text: הִנֵּ֤ה בָאָה֙ וְ/נִֽהְיָ֔תָה נְאֻ֖ם אֲדֹנָ֣/י יְהוִ֑ה ה֥וּא הַ/יּ֖וֹם אֲשֶׁ֥ר דִּבַּֽרְתִּי׃
translation:
  text: Behold, it is coming, and it will happen, declares the Lord GOD. This is the day of which I have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Behold, it has come and it has happened'; the Hebrew uses forms that can present the future as so certain that it is spoken of as already accomplished.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - Surely
  lexicon: HALOT
  rationale: Retains the prophetic deictic/interjection that calls attention to the certainty and immediacy of the announcement. 'Behold' preserves the elevated prophetic tone better than 'Look,' while remaining understandable.
- source_word: בָאָה
  chosen: it is coming
  alternatives:
  - it has come
  - she has come
  lexicon: HALOT
  rationale: Although morphologically perfect 3fs, in prophetic discourse the perfect can express a future event as certain ('prophetic perfect'). English present-progressive 'is coming' captures imminent certainty naturally. The feminine form likely agrees with an implied feminine subject such as the foretold calamity/judgment rather than requiring 'she.'
- source_word: וְנִהְיָתָה
  chosen: and it will happen
  alternatives:
  - and it shall be
  - and it has happened
  lexicon: HALOT
  rationale: From היה in a form expressing coming-to-pass. 'It will happen' gives clear modern English and fits the sequence with 'is coming.' 'It shall be' is more literal but less idiomatic here.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic English for introducing a divine pronouncement and avoids overly technical wording.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord the LORD
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, conventional English avoids 'Lord LORD' by rendering 'Lord GOD,' preserving reverence and readability.
- source_word: הוּא
  chosen: This is
  alternatives:
  - It is
  - That is
  lexicon: HALOT
  rationale: The pronoun is emphatic, identifying the foretold event/day. 'This is' works naturally with 'the day' in English and conveys the demonstrative force in context.
- source_word: הַיּוֹם
  chosen: the day
  alternatives:
  - that day
  lexicon: HALOT
  rationale: Definite 'the day' is the direct sense. 'That day' would be interpretive; the Hebrew uses the article, and the following relative clause specifies it.
- source_word: אֲשֶׁר
  chosen: of which
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: With 'the day,' English idiom favors 'of which I have spoken' or 'that I spoke of.' 'Of which' preserves the relation with a slightly more formal prophetic register.
- source_word: דִּבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I spoke
  - I said
  lexicon: HALOT
  rationale: '''Spoken'' preserves the verbal connection to prophetic speech and the present relevance of prior divine announcement. ''Said'' is too generic.'
