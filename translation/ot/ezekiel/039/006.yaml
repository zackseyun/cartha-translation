id: EZK.39.6
reference: Ezekiel 39:6
source:
  edition: WLC
  text: וְ/שִׁלַּחְתִּי אֵ֣שׁ בְּ/מָג֔וֹג וּ/בְ/יֹשְׁבֵ֥י הָ/אִיִּ֖ים לָ/בֶ֑טַח וְ/יָדְע֖וּ
    כִּי אֲנִ֥י יְהוָֽה־־׃
translation:
  text: And I will send fire on Magog and on those who live securely in the coastlands,
    and they will know that I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands.' The Hebrew term can refer to islands or, more broadly
      in prophetic usage, to distant coastlands.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: And I will send
  alternatives:
  - And I will dispatch
  - And I will let loose
  lexicon: HALOT
  rationale: The Hiphil perfect with prefixed conjunction in prophetic discourse is
    naturally rendered as a future from the divine speaker. 'Send' is the most direct
    and idiomatic equivalent for שלח here, especially with 'fire' as the object.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: Literal 'fire' fits both the lexical sense and the prophetic judgment
    imagery. No expansion such as 'judgment' should be imported into the main text.
- source_word: בְּמָגוֹג
  chosen: on Magog
  alternatives:
  - against Magog
  - in Magog
  lexicon: HALOT
  rationale: The preposition ב with verbs of sending destructive fire can be rendered
    idiomatically in English as 'on' to express the target of judgment. 'Magog' is
    transliterated as a proper name per translation philosophy.
- source_word: וּבְיֹשְׁבֵי הָאִיִּים
  chosen: and on those who live securely in the coastlands
  alternatives:
  - and on the inhabitants of the coastlands who live securely
  - and on those dwelling securely in the islands
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial construct, 'those who dwell/live.' הָאִיִּים
    can denote islands or coastlands; in prophetic geography 'coastlands' is often
    the broader and more natural English rendering for distant maritime regions. The
    phrase לָבֶטַח modifies the inhabitants, not Magog, so it is brought into the
    clause as 'who live securely.'
- source_word: הָאִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  lexicon: HALOT
  rationale: Although the noun can mean 'islands,' prophetic usage frequently refers
    more broadly to maritime lands/coastlands. 'Coastlands' better captures the Hebrew
    idiom for distant seafaring regions without over-specifying literal islands.
- source_word: לָבֶטַח
  chosen: securely
  alternatives:
  - in safety
  - carefree
  lexicon: HALOT
  rationale: לָבֶטַח expresses a state of security/safety. 'Securely' is concise,
    idiomatic, and preserves the adverbial force in context.
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - then they will know
  lexicon: HALOT
  rationale: Simple future preserves the Hebrew sequence. 'Then' is interpretive and
    not required, though contextually possible.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated project
    standard.
