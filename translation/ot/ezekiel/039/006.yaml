theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms table specifies 'the LORD' as the default
    rendering for YHWH. This preserves consistency with the translation's doctrinal
    and stylistic policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of לָבֶטַח
  chosen_reading: attached to the inhabitants of the coastlands ('those who live securely')
  alternative_readings:
  - attached more loosely to the whole clause as 'in safety'
  rationale: Syntactically לָבֶטַח most naturally qualifies the participial phrase
    'those who dwell/live,' describing their sense of security before judgment. This
    avoids ambiguity in English and best reflects the Hebrew construction.
