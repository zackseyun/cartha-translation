id: EZK.39.27
reference: Ezekiel 39:27
source:
  edition: WLC
  text: בְּ/שׁוֹבְבִ֤/י אוֹתָ/ם֙ מִן הָ֣/עַמִּ֔ים וְ/קִבַּצְתִּ֣י אֹתָ֔/ם מֵֽ/אַרְצ֖וֹת
    אֹֽיְבֵי/הֶ֑ם וְ/נִקְדַּ֣שְׁתִּי בָ֔/ם לְ/עֵינֵ֖י הַ/גּוֹיִ֥ם רַבִּֽים־׃
translation:
  text: when I bring them back from the peoples and gather them from the lands of
    their enemies, and I show myself holy through them before the eyes of many nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and I am sanctified in them' or 'and I will be hallowed
      in them.' The sense is that the Lord's holiness is publicly displayed through
      what he does with them.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוֹבְבִי
  chosen: when I bring ... back
  alternatives:
  - in my bringing ... back
  - when I restore
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil/causative sense, ''cause to return, bring back.''
    The prefixed ב plus infinitive construct with 1cs suffix is temporal here: ''when
    I bring back,'' not merely a noun phrase. ''Restore'' is possible in some contexts,
    but here the following geographic phrases favor literal return from exile.'
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עמים commonly means 'peoples' in contrast with גוים. Since the verse
    later uses גוים, rendering this as 'peoples' preserves the lexical distinction
    in English.
- source_word: וְקִבַּצְתִּי
  chosen: and gather
  alternatives:
  - and I will gather
  - and collect
  lexicon: HALOT
  rationale: 'קבץ means ''gather, assemble.'' Although morphologically perfect with
    prefixed conjunction, in this sequence after the temporal infinitive it is naturally
    rendered in English coordinate with the first clause: ''and gather.'''
- source_word: מֵאַרְצוֹת אֹיְבֵיהֶם
  chosen: from the lands of their enemies
  alternatives:
  - from their enemies' lands
  - from the countries of their enemies
  lexicon: HALOT
  rationale: ארצות is plural 'lands/countries.' 'Lands of their enemies' is a clear,
    natural rendering that preserves the genitive relationship and the plural geography
    of exile.
- source_word: וְנִקְדַּשְׁתִּי בָם
  chosen: and I show myself holy through them
  alternatives:
  - and I am sanctified in them
  - and I prove myself holy in them
  lexicon: HALOT
  rationale: קדש in the Niphal with God as subject often means to be shown/proved
    holy, i.e., to manifest holiness publicly. The preposition בם can be rendered
    'in/through them'; 'through them' best conveys that God's holiness is displayed
    by what he does with Israel, while avoiding the misleading English sense that
    God becomes holy.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: A standard idiom meaning public visibility. 'Before the eyes of' is slightly
    more formal but preserves the Hebrew imagery.
- source_word: הַגּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - the many nations
  - many Gentiles
  lexicon: HALOT
  rationale: גוים here refers to nations in the international sense, not specifically
    'Gentiles' as a theological category. The anarthrous adjective after the article-bearing
    noun is well represented by 'many nations.'
