theological_decisions:
- issue: Rendering of divine self-sanctification language
  chosen_reading: I show myself holy through them
  alternative_readings:
  - I am sanctified in them
  - I will be hallowed in them
  rationale: The Hebrew speaks of God's holiness being manifested among the nations
    through his action regarding Israel. The chosen rendering preserves the theological
    point of public vindication of God's holiness without implying any change in God's
    intrinsic holiness. Alternatives are preserved because 'sanctified' is a traditional
    formal rendering.
  doctrine_reference: Translation philosophy §3, §6
