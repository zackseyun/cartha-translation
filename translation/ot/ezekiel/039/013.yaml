id: EZK.39.13
reference: Ezekiel 39:13
source:
  edition: WLC
  text: וְ/קָֽבְרוּ֙ כָּל עַ֣ם הָ/אָ֔רֶץ וְ/הָיָ֥ה לָ/הֶ֖ם לְ/שֵׁ֑ם י֚וֹם הִכָּ֣בְדִ֔/י
    נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃
translation:
  text: All the people of the land will bury them, and it will be to their renown
    on the day I glorify myself, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will be a name for them'; the Hebrew idiom means that this will bring
      them honor or renown.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the day I am glorified' or 'on the day I show my glory.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְקָבְרוּ
  chosen: will bury
  alternatives:
  - shall bury
  - bury
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally in context; 'will bury' gives natural English while preserving the concrete
    action.
- source_word: כָּל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the הארץ
  - all the people of the earth
  lexicon: HALOT
  rationale: The phrase most naturally refers to the inhabitants of the land in this
    local burial context, not humanity worldwide. 'People' reflects collective עַם,
    and 'of the land' preserves the genitive.
- source_word: וְהָיָה לָהֶם לְשֵׁם
  chosen: it will be to their renown
  alternatives:
  - it will be a name for them
  - it will bring them fame
  - it will be for a memorial to them
  lexicon: HALOT
  rationale: לְשֵׁם literally means 'for a name,' an idiom for reputation or renown.
    'To their renown' preserves the idiomatic sense without wooden English. The singular
    verb with implicit subject refers to the burial action/result.
- source_word: יוֹם הִכָּבְדִי
  chosen: on the day I glorify myself
  alternatives:
  - on the day of my glorifying myself
  - on the day I show my glory
  - on the day I am glorified
  lexicon: HALOT
  rationale: The Niphal-inflected nominal form with 1cs suffix is best taken in context
    as God's self-manifestation in glory. 'I glorify myself' preserves the reflexive/divine
    self-vindication sense better than a passive 'I am glorified,' while remaining
    idiomatic.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic speech formula 'declares.' Per doctrine,
    יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'Lord GOD' is the
    conventional and clear English equivalent for אֲדֹנָי יְהוִה.
