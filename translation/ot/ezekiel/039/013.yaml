theological_decisions:
- issue: Rendering of the divine name יְהוָה in the prophetic formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The doctrine specifies the default rendering of יְהוָה as 'the LORD.'
    In the compound title אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid
    'Lord LORD' while still signaling the divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
