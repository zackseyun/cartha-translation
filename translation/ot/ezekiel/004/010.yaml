id: EZK.4.10
reference: Ezekiel 4:10
source:
  edition: WLC
  text: וּ/מַאֲכָֽלְ/ךָ֙ אֲשֶׁ֣ר תֹּאכֲלֶ֔/נּוּ בְּ/מִשְׁק֕וֹל עֶשְׂרִ֥ים שֶׁ֖קֶל
    לַ/יּ֑וֹם מֵ/עֵ֥ת עַד עֵ֖ת תֹּאכֲלֶֽ/נּוּ־׃
translation:
  text: And your food that you shall eat shall be by weight, twenty shekels a day;
    from time to time you shall eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at set times'; the Hebrew idiom literally reads 'from time to time.'
    reason: lexical_alternative
  - marker: b
    text: A shekel was a unit of weight, not necessarily a coin here.
    reason: cultural_note
lexical_decisions:
- source_word: מַאֲכָלְךָ
  chosen: your food
  alternatives:
  - your meal
  - what you eat
  lexicon: HALOT
  rationale: מַאֲכָל denotes food or something eaten. 'Your food' is the most natural
    and sufficiently formal rendering in context.
- source_word: אֲשֶׁר תֹּאכֲלֶנּוּ
  chosen: that you shall eat
  alternatives:
  - which you eat
  - that you are to eat
  lexicon: HALOT
  rationale: The relative clause specifies the food in view. English future 'shall
    eat' fits the instructional context and preserves the Hebrew imperfect's directive
    force.
- source_word: בְּמִשְׁקוֹל
  chosen: by weight
  alternatives:
  - by measure of weight
  - weighed out
  lexicon: HALOT
  rationale: מִשְׁקוֹל refers specifically to weight. 'By weight' is concise, idiomatic,
    and preserves the concrete sense better than a broader 'by measure.'
- source_word: עֶשְׂרִים שֶׁקֶל
  chosen: twenty shekels
  alternatives:
  - twenty shekels in weight
  lexicon: HALOT
  rationale: The phrase gives the daily ration in a standard ancient weight unit.
    Retaining 'shekels' preserves the historical measure rather than converting into
    a modern unit in the main text.
- source_word: לַיּוֹם
  chosen: a day
  alternatives:
  - per day
  - for the day
  lexicon: HALOT
  rationale: In English rationing language, 'a day' is natural and accurately conveys
    the distributive sense of לַיּוֹם.
- source_word: מֵעֵת עַד עֵת
  chosen: from time to time
  alternatives:
  - at set times
  - from one time to another
  - at one time and another
  lexicon: HALOT
  rationale: The idiom indicates eating at intervals or at appointed times rather
    than continuously. 'From time to time' preserves the temporal spacing without
    over-specifying the schedule.
- source_word: תֹּאכֲלֶנּוּ
  chosen: you shall eat it
  alternatives:
  - you are to eat it
  lexicon: HALOT
  rationale: The repeated verb closes the instruction emphatically. 'You shall eat
    it' keeps the directive tone and mirrors the Hebrew repetition.
