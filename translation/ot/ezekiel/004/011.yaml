id: EZK.4.11
reference: Ezekiel 4:11
source:
  edition: WLC
  text: וּ/מַ֛יִם בִּ/מְשׂוּרָ֥ה תִשְׁתֶּ֖ה שִׁשִּׁ֣ית הַ/הִ֑ין מֵ/עֵ֥ת עַד עֵ֖ת תִּשְׁתֶּֽה־׃
translation:
  text: And you shall drink water by measure, a sixth of a hin; from time to time
    you shall drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at set times you shall drink.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַיִם
  chosen: And ... water
  alternatives:
  - And water
  lexicon: HALOT
  rationale: מַיִם means 'water.' The prefixed conjunction ו is rendered 'And' to
    continue the sequence of commands in the context.
- source_word: בִּמְשׂוּרָה
  chosen: by measure
  alternatives:
  - in measured quantity
  - according to measure
  lexicon: HALOT
  rationale: The noun מְשׂוּרָה denotes a measured amount or fixed measure. 'By measure'
    is concise, natural English and preserves the sense of rationing.
- source_word: תִשְׁתֶּה
  chosen: you shall drink
  alternatives:
  - you are to drink
  - you must drink
  lexicon: HALOT
  rationale: Qal imperfect 2ms in this instructional context functions as an imperative/future
    command. 'You shall drink' preserves the directive tone without over-paraphrasing.
- source_word: שִׁשִּׁית הַהִין
  chosen: a sixth of a hin
  alternatives:
  - one-sixth of a hin
  lexicon: HALOT
  rationale: This phrase specifies the rationed quantity. 'A sixth of a hin' is idiomatic
    and keeps the ancient unit rather than converting it, preserving source-text concreteness.
- source_word: מֵעֵת עַד עֵת
  chosen: from time to time
  alternatives:
  - at set times
  - from one time to another
  lexicon: HALOT
  rationale: The idiom literally means 'from time to time' and here indicates periodic
    drinking rather than continuous access. This rendering is natural English while
    staying close to the Hebrew idiom.
- source_word: תִּשְׁתֶּה
  chosen: you shall drink
  alternatives:
  - you are to drink
  lexicon: HALOT
  rationale: The repeated verb is retained in English to reflect the Hebrew repetition
    and to emphasize the regulated nature of the action.
