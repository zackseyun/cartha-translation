id: EZK.4.1
reference: Ezekiel 4:1
source:
  edition: WLC
  text: וְ/אַתָּ֤ה בֶן אָדָם֙ קַח לְ/ךָ֣ לְבֵנָ֔ה וְ/נָתַתָּ֥ה אוֹתָ֖/הּ לְ/פָנֶ֑י/ךָ
    וְ/חַקּוֹתָ֥ עָלֶ֛י/הָ עִ֖יר אֶת יְרוּשָׁלִָֽם־־־׃
translation:
  text: And you, son of man, take for yourself a brick, set it before you, and engrave
    on it a city—Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inscribe on it' or 'draw on it.' The Hebrew verb can refer to engraving
      or inscribing; here it describes making a representation of Jerusalem on the
      brick.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: The Hebrew address is literally 'son of man.' In Ezekiel this is a recurring
    divine address to the prophet. Following the project's gender-accurate policy
    and original-language primacy, the literal form is retained rather than a more
    interpretive 'human one' or 'mortal'.
- source_word: לְבֵנָה
  chosen: a brick
  alternatives:
  - brick tile
  - clay tablet
  lexicon: HALOT
  rationale: The noun denotes a brick. 'Brick' is the plain lexical sense; 'brick
    tile' is possible in context because it is used as a surface for drawing, but
    the Hebrew itself does not specify 'tile.'
- source_word: וְנָתַתָּה אֹתָהּ לְפָנֶיךָ
  chosen: set it before you
  alternatives:
  - place it before you
  - put it in front of you
  lexicon: HALOT
  rationale: The verb נתן with the phrase 'before you' naturally means to place or
    set the object in front of oneself. 'Set' is idiomatic and suitably concise in
    English.
- source_word: וְחַקּוֹתָ עָלֶיהָ
  chosen: engrave on it
  alternatives:
  - inscribe on it
  - draw on it
  lexicon: HALOT
  rationale: חקק commonly means to engrave or inscribe. Because the object is a brick
    and the action is making a representation upon it, 'engrave' preserves the concrete
    force better than the looser 'draw,' while remaining understandable.
- source_word: עִיר אֶת יְרוּשָׁלָם
  chosen: a city—Jerusalem
  alternatives:
  - the city, Jerusalem
  - a city, namely Jerusalem
  lexicon: HALOT
  rationale: 'The sequence is appositional: ''a city, Jerusalem.'' The dash reflects
    the explanatory apposition naturally in English. ''The city'' would over-specify
    the Hebrew, which uses an indefinite noun followed by the direct-object marker
    and proper name.'
- source_word: יְרוּשָׁלָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
