theological_decisions:
- issue: Rendering of masculine representative language in אִישׁ וְאָחִיו
  chosen_reading: each man and his brother
  alternative_readings:
  - each person and his brother
  - each one and his neighbor
  rationale: The source uses masculine singular nouns with distributive force. Per
    doctrine, gender-accurate renderings are preferred over neutralizing language
    unless context demands otherwise. 'Brother' is also lexically more precise than
    'neighbor.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Semantic range of עָוֹן
  chosen_reading: iniquity
  alternative_readings:
  - guilt
  - punishment for iniquity
  rationale: The Hebrew term can carry multiple related senses. The main text preserves
    the morally charged term 'iniquity' rather than resolving the ambiguity into either
    internal guilt or external punishment. This maintains theological tension appropriate
    to the source.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
