id: EZK.4.17
reference: Ezekiel 4:17
source:
  edition: WLC
  text: לְמַ֥עַן יַחְסְר֖וּ לֶ֣חֶם וָ/מָ֑יִם וְ/נָשַׁ֨מּוּ֙ אִ֣ישׁ וְ/אָחִ֔י/ו וְ/נָמַ֖קּוּ
    בַּ/עֲוֺנָֽ/ם׃פ
translation:
  text: so that they may lack bread and water, and each man and his brother may be
    appalled, and waste away in their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be desolated,' 'be horrified,' or 'be stunned' for 'may be appalled.'
      The Hebrew verb can express either desolation or the shocked state produced
      by it.
    reason: lexical_alternative
  - marker: b
    text: Or 'in their guilt' or 'for the punishment of their iniquity.' The Hebrew
      word can denote iniquity, guilt, or the punishment resulting from iniquity.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - so that as a result
  lexicon: HALOT
  rationale: Introduces purpose/result flowing from the preceding sign-act instructions.
    'So that' is natural modern English and preserves the telic force.
- source_word: יַחְסְרוּ
  chosen: they may lack
  alternatives:
  - they may be in want of
  - they may be deprived of
  lexicon: HALOT
  rationale: From חסר, 'to lack, be lacking.' The imperfect fits a projected consequence.
    'May lack' preserves the modal/result nuance without overtranslating.
- source_word: לֶחֶם וָמָיִם
  chosen: bread and water
  alternatives:
  - food and water
  lexicon: HALOT
  rationale: A common concrete pair denoting basic sustenance. Retaining 'bread and
    water' is more faithful than generalizing to 'food and water.'
- source_word: וְנָשַׁמּוּ
  chosen: may be appalled
  alternatives:
  - may be desolated
  - may be horrified
  - may be stunned
  lexicon: HALOT
  rationale: From שמם in the Niphal, often expressing being appalled/astonished or
    desolated. Here, with persons as subject and in parallel with deprivation and
    wasting away, 'be appalled' best captures the human experiential sense in idiomatic
    English while preserving the severity.
- source_word: אִישׁ וְאָחִיו
  chosen: each man and his brother
  alternatives:
  - a man and his brother
  - each one and his brother
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine and distributive. Following the
    project's gender-accurate policy, 'each man and his brother' preserves the source
    form and representative force better than a neutral paraphrase.
- source_word: וְנָמַקּוּ
  chosen: and waste away
  alternatives:
  - and rot away
  - and pine away
  - and decay
  lexicon: HALOT
  rationale: From מקק, conveying wasting/rotting away. 'Waste away' is idiomatic modern
    English and fits the judgment context without sounding overly physical or grotesque.
- source_word: בַּעֲוֺנָם
  chosen: in their iniquity
  alternatives:
  - in their guilt
  - because of their iniquity
  - for their punishment
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for iniquity depending
    on context. Here the moral-causal sense is prominent in Ezekiel's judgment language.
    'In their iniquity' preserves the Hebrew compactness and theological weight without
    prematurely narrowing to either subjective guilt or penal consequence alone.
