id: EZK.4.12
reference: Ezekiel 4:12
source:
  edition: WLC
  text: וְ/עֻגַ֥ת שְׂעֹרִ֖ים תֹּֽאכֲלֶ֑/נָּה וְ/הִ֗יא בְּ/גֶֽלְלֵי֙ צֵאַ֣ת הָֽ/אָדָ֔ם
    תְּעֻגֶ֖/נָה לְ/עֵינֵי/הֶֽם׃ס
translation:
  text: You shall eat it as a barley cake, and you shall bake it over human dung in
    their sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with human dung'—the Hebrew preposition can be rendered more literally,
      but the sense is baking over a fire fueled by human dung.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֻגַת שְׂעֹרִים
  chosen: a barley cake
  alternatives:
  - a cake of barley
  - a barley loaf
  lexicon: HALOT
  rationale: עֻגָה denotes a round cake or flat loaf; with שְׂעֹרִים the sense is
    a cake made from barley. 'Barley cake' is natural English and preserves the concrete
    image.
- source_word: תֹּאכֲלֶנָּה
  chosen: you shall eat it
  alternatives:
  - you are to eat it
  lexicon: HALOT
  rationale: Second masculine singular verb with 3fs suffix refers back to the feminine
    noun עֻגָה, 'cake.' The imperfect here carries directive/future force in the prophetic
    sign-act context, well rendered by 'you shall eat it.'
- source_word: בְּגֶלְלֵי
  chosen: over
  alternatives:
  - with
  - 'on'
  lexicon: HALOT
  rationale: The preposition ב plus 'dung-cakes' in this cooking context indicates
    the fuel used for baking rather than mixture into the dough. 'Over' communicates
    baking over a fire fueled by the specified material more clearly than a wooden
    'with'.
- source_word: גֶלְלֵי צֵאַת הָאָדָם
  chosen: human dung
  alternatives:
  - dung of man
  - human excrement
  lexicon: HALOT
  rationale: The phrase literally means 'dung of the excrement of man/human.' English
    idiom is best served by 'human dung,' which is vivid and accurate without unnecessary
    awkwardness. Because הָאָדָם here refers to human beings generically, 'human'
    fits the doctrine's guidance on אָדָם as 'man / humankind' by context.
- source_word: תְּעֻגֶנָה
  chosen: you shall bake it
  alternatives:
  - you shall prepare it as a cake
  - you shall bake it into a cake
  lexicon: HALOT
  rationale: From עוג in the sense of baking/preparing a cake. Since the object is
    already identified as a cake, simple 'bake it' avoids redundancy while preserving
    the action.
- source_word: לְעֵינֵיהֶם
  chosen: in their sight
  alternatives:
  - before their eyes
  - in front of them
  lexicon: HALOT
  rationale: This idiom emphasizes public visibility of the sign-act. 'In their sight'
    is concise, natural, and slightly more formal, fitting prophetic narration.
