theological_decisions:
- issue: Rendering of הָאָדָם
  chosen_reading: human
  alternative_readings:
  - man
  rationale: The noun here is generic rather than male-specific, referring to human
    excrement in contrast to animal dung in the following verse. Per doctrine, אָדָם
    is rendered according to context as 'man' or 'humankind'; here 'human' best matches
    the sense in idiomatic English.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, אָדָם → man / humankind
    (context); gender-accurate over gender-neutral'
