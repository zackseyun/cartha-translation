id: EZK.4.6
reference: Ezekiel 4:6
source:
  edition: WLC
  text: וְ/כִלִּיתָ֣ אֶת אֵ֗לֶּה וְ/שָׁ֨כַבְתָּ֜ עַל צִדְּ/ךָ֤ ה/ימיני שֵׁנִ֔ית וְ/נָשָׂ֖אתָ
    אֶת עֲוֺ֣ן בֵּית יְהוּדָ֑ה אַרְבָּעִ֣ים י֔וֹם י֧וֹם לַ/שָּׁנָ֛ה י֥וֹם לַ/שָּׁנָ֖ה
    נְתַתִּ֥י/ו לָֽ/ךְ־־־־׃
translation:
  text: When you have finished these, you shall lie down a second time on your right
    side, and you shall bear the iniquity of the house of Judah for forty days. I
    have assigned you a day for each year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a day for a year, a day for a year.'' The repeated wording emphasizes
      the symbolic correspondence between the days Ezekiel lies down and the years
      represented.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלִּיתָ אֶת־אֵלֶּה
  chosen: When you have finished these
  alternatives:
  - And you shall complete these
  - When you finish these things
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction is rendered temporally in context,
    introducing the next symbolic action after the prior period is completed. 'These'
    refers to the preceding enacted signs/days.
- source_word: וְשָׁכַבְתָּ עַל־צִדְּךָ הַיְמָנִי שֵׁנִית
  chosen: you shall lie down a second time on your right side
  alternatives:
  - you shall lie on your right side again
  - you shall lie down on your right side a second time
  lexicon: HALOT
  rationale: שֵׁנִית modifies the repeated action, so 'a second time' is explicit.
    'Lie down' is natural English for the enacted posture.
- source_word: וְנָשָׂאתָ אֶת־עֲוֺן
  chosen: you shall bear the iniquity
  alternatives:
  - you shall carry the punishment for
  - you shall bear the guilt of
  lexicon: HALOT
  rationale: נשא עון can denote bearing guilt/iniquity or its consequence. Here the
    prophet symbolically carries Judah's iniquity in an enacted sign. 'Bear the iniquity'
    preserves the Hebrew's theological breadth without over-resolving to either guilt
    or punishment alone.
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  - the household of Judah
  lexicon: HALOT
  rationale: The construct phrase is retained formally as 'house of Judah,' a standard
    prophetic designation for the southern kingdom/people.
- source_word: אַרְבָּעִים יוֹם
  chosen: for forty days
  alternatives:
  - forty days
  lexicon: HALOT
  rationale: English idiom naturally supplies 'for' with a duration of time.
- source_word: יוֹם לַשָּׁנָה יוֹם לַשָּׁנָה
  chosen: a day for each year
  alternatives:
  - a day for a year, a day for a year
  - day for year, day for year
  lexicon: HALOT
  rationale: The repeated formula emphasizes proportional correspondence. In English,
    'a day for each year' communicates the sense clearly while avoiding awkward literal
    repetition in the main text.
- source_word: נְתַתִּיו לָךְ
  chosen: I have assigned you
  alternatives:
  - I have given it to you
  - I have appointed it for you
  lexicon: HALOT
  rationale: The suffix likely refers to the day-year measure/period imposed on Ezekiel.
    'Assigned' fits the context of divinely appointed symbolic duration better than
    the more generic 'given.'
