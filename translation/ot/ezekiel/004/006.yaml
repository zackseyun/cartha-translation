theological_decisions:
- issue: Meaning of עָוֺן in the symbolic action
  chosen_reading: Retain 'iniquity' rather than specifying only guilt or punishment
  alternative_readings:
  - guilt
  - punishment for sin
  rationale: In prophetic sign-acts, עָוֺן can encompass both the people's wrongdoing
    and the burden/consequence associated with it. Preserving 'iniquity' maintains
    the theological tension rather than narrowing the sense beyond what the Hebrew
    requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
