theological_decisions:
- issue: Force of prophetic speech toward Jerusalem
  chosen_reading: The prophecy is rendered as directed 'against' Jerusalem in keeping
    with the judgment context.
  alternative_readings:
  - The phrase could be rendered more neutrally as 'concerning it.'
  rationale: The preposition עַל can be broader than adversative English 'against,'
    but in Ezekiel's sign-act announcing siege and judgment, the hostile/judicial
    nuance is contextually primary. This preserves the text's severity without adding
    doctrinal interpretation beyond the immediate context.
  doctrine_reference: Translation philosophy §1, §3
