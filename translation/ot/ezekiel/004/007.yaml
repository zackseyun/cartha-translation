id: EZK.4.7
reference: Ezekiel 4:7
source:
  edition: WLC
  text: וְ/אֶל מְצ֤וֹר יְרוּשָׁלִַ֨ם֙ תָּכִ֣ין פָּנֶ֔י/ךָ וּֽ/זְרֹעֲ/ךָ֖ חֲשׂוּפָ֑ה
    וְ/נִבֵּאתָ֖ עָלֶֽי/הָ־׃
translation:
  text: And toward the siege of Jerusalem you shall set your face, with your arm bared,
    and you shall prophesy against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning it.' The Hebrew preposition can be broader, but here the
      context of siege and judgment supports 'against it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְצוֹר
  chosen: siege
  alternatives:
  - besieging
  - siegeworks
  lexicon: HALOT
  rationale: The noun denotes a siege or state of besiegement. In this enacted-sign
    context, 'toward the siege of Jerusalem' is the most natural English rendering.
    'Siegeworks' is possible in some contexts but is too concrete here without explicit
    reference to ramps or fortifications.
- source_word: תָּכִין פָּנֶיךָ
  chosen: you shall set your face
  alternatives:
  - you shall direct your face
  - you shall fix your gaze
  lexicon: HALOT
  rationale: The Hiphil of כון with 'face' conveys directing or setting oneself resolutely
    toward something. 'Set your face' preserves the idiomatic force and prophetic
    solemnity better than a flatter paraphrase.
- source_word: זְרֹעֲךָ חֲשׂוּפָה
  chosen: with your arm bared
  alternatives:
  - and your arm uncovered
  - with your bare arm
  lexicon: HALOT
  rationale: The phrase is verbless, literally 'and your arm exposed/uncovered.' 'With
    your arm bared' gives natural English while preserving the image of readiness
    for action or judgment.
- source_word: וְנִבֵּאתָ עָלֶיהָ
  chosen: and you shall prophesy against it
  alternatives:
  - and you shall prophesy concerning it
  - and you shall speak prophetically against it
  lexicon: HALOT
  rationale: With נבא plus עַל, the sense commonly carries an adversative force in
    judgment contexts. Since the sign-act concerns Jerusalem under judgment, 'against
    it' best reflects the contextual force. The pronoun refers back to Jerusalem,
    rendered as 'it' in English for natural style.
