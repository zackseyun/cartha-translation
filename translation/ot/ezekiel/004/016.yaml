theological_decisions:
- issue: Retention of the metaphor in מַטֵּה לֶחֶם
  chosen_reading: Keep the metaphor 'staff of bread' in the main text and explain
    the idiomatic sense in a footnote.
  alternative_readings:
  - Render directly as 'food supply' or 'bread supply' in the main text.
  rationale: Optimal equivalence here favors preserving the prophetic imagery while
    still making the sense auditable through a footnote. The phrase communicates divine
    judgment by depicting bread as the support that God breaks.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
