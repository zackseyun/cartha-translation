id: EZK.4.16
reference: Ezekiel 4:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י בֶּן אָדָם֙ הִנְ/נִ֨י שֹׁבֵ֤ר מַטֵּה לֶ֨חֶם֙ בִּ/יר֣וּשָׁלִַ֔ם
    וְ/אָכְלוּ לֶ֥חֶם בְּ/מִשְׁקָ֖ל וּ/בִ/דְאָגָ֑ה וּ/מַ֕יִם בִּ/מְשׂוּרָ֥ה וּ/בְ/שִׁמָּמ֖וֹן
    יִשְׁתּֽוּ־־־׃
translation:
  text: Then he said to me, “Son of man, behold, I am breaking the staff of bread
    in Jerusalem, and they will eat bread by weight and with anxiety, and they will
    drink water by measure and in horror.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the staff of bread,' an idiom for the supply of bread or food support.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of man
  lexicon: HALOT
  rationale: Conventional rendering of Ezekiel’s address that preserves the Hebrew
    idiom and its solemn force. Although more idiomatic English could be 'human one,'
    the traditional phrase closely reflects the source and is not a christological
    title here.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - see, I am
  lexicon: HALOT
  rationale: Retains the deictic and emphatic force of the particle rather than omitting
    it. 'Behold' is slightly elevated but still transparent and fitting for prophetic
    speech.
- source_word: שֹׁבֵר
  chosen: am breaking
  alternatives:
  - am about to break
  - break
  lexicon: HALOT
  rationale: The participle with הִנְנִי conveys imminent or certain action. 'Am breaking'
    preserves the vividness while allowing the prophetic present to imply impending
    judgment.
- source_word: מַטֵּה לֶחֶם
  chosen: the staff of bread
  alternatives:
  - the supply of bread
  - the support of bread
  lexicon: HALOT
  rationale: A Hebrew idiom for the sustaining supply of food. The main text keeps
    the metaphor 'staff' for transparency to the source; a footnote preserves the
    more idiomatic sense 'supply of bread.'
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering of the place name.
- source_word: וְאָכְלוּ לֶחֶם בְּמִשְׁקָל
  chosen: they will eat bread by weight
  alternatives:
  - they will eat rationed bread
  - they will eat bread weighed out
  lexicon: HALOT
  rationale: Preserves the concrete image of food being weighed, signaling scarcity.
    'By weight' is concise and natural enough in English.
- source_word: וּבִדְאָגָה
  chosen: with anxiety
  alternatives:
  - in anxiety
  - with fear
  lexicon: HALOT
  rationale: דְאָגָה denotes anxious care or worry. 'With anxiety' best captures the
    emotional state accompanying the rationing.
- source_word: וּמַיִם בִּמְשׂוּרָה
  chosen: water by measure
  alternatives:
  - water in measured amounts
  - rationed water
  lexicon: HALOT
  rationale: Keeps the parallelism with 'bread by weight' and reflects the concrete
    image of measured scarcity.
- source_word: וּבְשִׁמָּמוֹן
  chosen: in horror
  alternatives:
  - in dismay
  - in desolation
  - in astonishment
  lexicon: HALOT
  rationale: The noun conveys appalled desolation or horror. 'In horror' fits the
    emotional parallel with 'with anxiety' and the judgment context, while remaining
    readable.
- source_word: יִשְׁתּוּ
  chosen: they will drink
  lexicon: HALOT
  rationale: Simple imperfect rendered as future in context, parallel to 'they will
    eat.'
