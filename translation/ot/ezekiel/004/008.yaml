theological_decisions:
- issue: Referent of 'your siege'
  chosen_reading: The phrase refers to the symbolic siege Ezekiel is enacting, not
    a literal siege against Ezekiel personally.
  alternative_readings:
  - A more wooden reading could leave the referent unexplained as 'your siege' without
    contextual clarification.
  rationale: The suffix is retained in translation, but the wording must still make
    sense in English. The context of Ezekiel 4 is a prophetic sign-act in which the
    prophet bears and depicts Jerusalem's siege. Rendering 'your siege' preserves
    the Hebrew form while allowing the contextual referent to remain implicit rather
    than over-explained.
