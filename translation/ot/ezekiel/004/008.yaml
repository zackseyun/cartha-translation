id: EZK.4.8
reference: Ezekiel 4:8
source:
  edition: WLC
  text: וְ/הִנֵּ֛ה נָתַ֥תִּי עָלֶ֖י/ךָ עֲבוֹתִ֑ים וְ/לֹֽא תֵהָפֵ֤ךְ מִֽ/צִּדְּ/ךָ֙
    אֶל צִדֶּ֔/ךָ עַד כַּלּוֹתְ/ךָ֖ יְמֵ֥י מְצוּרֶֽ/ךָ־־־׃
translation:
  text: And behold, I have put ropes on you, so that you cannot turn yourself from
    one side to the other until you have completed the days of your siege.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cords' or 'bands.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from your side to your side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And see
  - Look
  lexicon: HALOT
  rationale: Retains the attention-getting deictic force of the Hebrew while preserving
    prophetic solemnity. 'Behold' is slightly formal but still readable and matches
    the marked discourse function.
- source_word: נָתַתִּי
  chosen: I have put
  alternatives:
  - I have placed
  - I have set
  lexicon: HALOT
  rationale: The perfect verb presents YHWH's action as effected. 'Put' is natural
    English with עַל in this context and avoids over-formality.
- source_word: עָלֶיךָ
  chosen: on you
  alternatives:
  - upon you
  lexicon: HALOT
  rationale: Direct and idiomatic with the verb 'put'; 'upon' would be more formal
    without adding meaning.
- source_word: עֲבוֹתִים
  chosen: ropes
  alternatives:
  - cords
  - bands
  lexicon: HALOT
  rationale: The noun denotes binding implements. 'Ropes' is the clearest modern English
    rendering; 'cords' is possible but less vivid, and 'bands' could sound metaphorical.
- source_word: וְלֹא תֵהָפֵךְ
  chosen: so that you cannot turn yourself
  alternatives:
  - and you shall not turn
  - and you will not be able to turn yourself
  lexicon: HALOT
  rationale: The Niphal here conveys being turned/turning oneself over from side to
    side in context. Rendering with inability ('cannot') best reflects the effect
    of the ropes in natural English, while 'turn yourself' preserves the bodily action.
- source_word: מִצִּדְּךָ אֶל צִדֶּךָ
  chosen: from one side to the other
  alternatives:
  - from your side to your side
  - from one of your sides to the other
  lexicon: HALOT
  rationale: This idiomatic English captures the Hebrew expression of changing bodily
    position from side to side. A more literal rendering would sound awkward in English.
- source_word: עַד כַּלּוֹתְךָ
  chosen: until you have completed
  alternatives:
  - until you finish
  - until the completion of your acting out
  lexicon: HALOT
  rationale: The infinitive construct with suffix marks the endpoint of Ezekiel's
    assigned action. 'Have completed' preserves the sense of finishing an appointed
    period with slightly greater gravity than 'finish'.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - the period of
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct chain; 'days of'
    preserves the temporal concreteness of the sign-act.
- source_word: מְצוּרֶךָ
  chosen: your siege
  alternatives:
  - your siegeworks
  - your besieging
  lexicon: HALOT
  rationale: In context of Ezekiel's enacted sign against Jerusalem, this refers to
    the siege represented by the prophet's action. 'Your siege' is the most natural
    and sufficiently precise rendering.
