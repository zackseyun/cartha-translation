id: EZK.4.13
reference: Ezekiel 4:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה כָּ֣כָה יֹאכְל֧וּ בְנֵֽי יִשְׂרָאֵ֛ל אֶת לַחְמָ֖/ם טָמֵ֑א
    בַּ/גּוֹיִ֕ם אֲשֶׁ֥ר אַדִּיחֵ֖/ם שָֽׁם־־׃
translation:
  text: And the LORD said, “So the sons of Israel will eat their bread unclean among
    the nations where I will drive them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the people of Israel.' The Hebrew is literally 'the
      sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'defiled.' The term carries ritual impurity overtones, especially in
      the context of exile among foreign nations.
    reason: lexical_alternative
  - marker: c
    text: Or 'where I will banish them' or 'where I will scatter them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name through the small-caps convention in English rather than transliteration.
- source_word: כָּכָה
  chosen: So
  alternatives:
  - Thus
  - Like this
  lexicon: HALOT
  rationale: Introduces the manner/result of what follows. 'So' is natural modern
    English and preserves the deictic force without sounding archaic like 'Thus.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with the gender-accurate
    principle, the familial expression is retained rather than flattened to 'people
    of Israel,' while still functioning corporately.
- source_word: לַחְמָם
  chosen: their bread
  alternatives:
  - their food
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' and in this context the concrete image
    matters because the surrounding sign-act concerns bread baked under defiling conditions.
    'Food' would overgeneralize.
- source_word: טָמֵא
  chosen: unclean
  alternatives:
  - defiled
  - impure
  lexicon: HALOT
  rationale: '''Unclean'' best preserves the ritual/covenantal sense in Ezekiel. ''Defiled''
    is possible, but ''unclean'' more directly reflects impurity language tied to
    exile among the nations.'
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign peoples/nations among whom Israel will
    be scattered. 'Among the nations' is idiomatic and avoids importing later NT-specific
    associations of 'Gentiles' while preserving the exile setting.
- source_word: אַדִּיחֵם
  chosen: I will drive them
  alternatives:
  - I will banish them
  - I will scatter them
  lexicon: HALOT
  rationale: The Hiphil of נדח conveys causing to be driven away/dispersed. 'Drive
    them' preserves the force of expulsion. 'Scatter' is contextually related but
    less directly tied to the verb's causative thrust here.
- source_word: שָׁם
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: Although literally 'there,' English idiom after 'the nations' prefers
    'where I will drive them.' This is a minimal syntactic adjustment for naturalness
    without changing sense.
