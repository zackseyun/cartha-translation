theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the divine name, and the project default is to render
    it as 'the LORD' rather than transliterate it. This follows the stated doctrine
    and standard English Bible convention while signaling the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Corporate expression בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew expression is grammatically masculine plural and corporately
    representative. Per the gender-accurate principle, the translation keeps the familial
    wording rather than neutralizing it, while recognizing the corporate referent
    is the nation as a whole.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
