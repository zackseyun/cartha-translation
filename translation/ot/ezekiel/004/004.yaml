id: EZK.4.4
reference: Ezekiel 4:4
source:
  edition: WLC
  text: וְ/אַתָּ֤ה שְׁכַב֙ עַל צִדְּ/ךָ֣ הַ/שְּׂמָאלִ֔י וְ/שַׂמְתָּ֛ אֶת עֲוֺ֥ן בֵּֽית
    יִשְׂרָאֵ֖ל עָלָ֑י/ו מִסְפַּ֤ר הַ/יָּמִים֙ אֲשֶׁ֣ר תִּשְׁכַּ֣ב עָלָ֔י/ו תִּשָּׂ֖א
    אֶת עֲוֺנָֽ/ם־־־־׃
translation:
  text: And you, lie on your left side, and place the iniquity of the house of Israel
    upon it; for the number of the days that you lie on it, you shall bear their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guilt' or 'punishment for iniquity' for 'iniquity' (Hebrew עָוֹן) in
      both occurrences; the term can include the sin itself, its guilt, or its consequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁכַב
  chosen: lie
  alternatives:
  - lie down
  lexicon: HALOT
  rationale: Imperative of שׁכב in a physical posture command. 'Lie' is natural English
    and sufficiently direct; 'lie down' is possible but slightly more expansive than
    the Hebrew.
- source_word: צִדְּךָ הַשְּׂמָאלִי
  chosen: your left side
  alternatives:
  - your left flank
  lexicon: HALOT
  rationale: צַד commonly means 'side.' 'Your left side' is the most idiomatic and
    precise rendering for the commanded posture.
- source_word: וְשַׂמְתָּ
  chosen: place
  alternatives:
  - set
  - put
  lexicon: HALOT
  rationale: שׂים has a broad semantic range including 'put/set/place.' 'Place' fits
    the symbolic-action context and avoids overly colloquial wording.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the burden/consequence of sin. In
    this enacted sign, Ezekiel symbolically carries Israel's sinful burden. 'Iniquity'
    preserves the moral dimension while allowing the bearing imagery to stand. The
    broader semantic possibility is preserved in a footnote.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is a standard collective designation. 'The house
    of Israel' preserves the covenantal-corporate wording of the Hebrew.
- source_word: עָלָיו
  chosen: upon it
  alternatives:
  - on it
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to 'side' in the symbolic action.
    'Upon it' keeps the slightly formal, spatial sense and clarifies the object borne
    on the side.
- source_word: מִסְפַּר הַיָּמִים אֲשֶׁר
  chosen: for the number of the days that
  alternatives:
  - according to the number of the days that
  - the number of days that
  lexicon: HALOT
  rationale: This phrase marks duration measured by a counted number of days. 'For
    the number of the days that' is readable while preserving the quantitative force
    of מִסְפַּר.
- source_word: תִּשָּׂא
  chosen: you shall bear
  alternatives:
  - you shall carry
  lexicon: HALOT
  rationale: נשא with עָוֹן commonly means 'bear' iniquity/guilt. 'Bear' is the established
    and semantically apt English equivalent in moral-burden contexts.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their punishment
  lexicon: HALOT
  rationale: The suffix is plural ('their'), referring to the house of Israel corporately.
    'Their iniquity' matches the earlier עָוֹן and preserves lexical consistency within
    the verse.
