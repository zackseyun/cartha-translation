theological_decisions:
- issue: Meaning of Ezekiel's symbolic bearing of Israel's עָוֹן
  chosen_reading: Retain 'bear their iniquity' as a symbolic prophetic sign-act without
    importing substitutionary atonement language.
  alternative_readings:
  - bear their guilt
  - bear their punishment
  rationale: The verse describes Ezekiel's enacted prophetic representation of Israel's
    burden. The Hebrew permits a range around sin/guilt/punishment, but the text itself
    does not require a developed atonement reading. Preserving 'bear their iniquity'
    maintains the theological tension and leaves interpretation open within the verse's
    symbolic context.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
