theological_decisions:
- issue: Prophetic sign-act imagery
  chosen_reading: Retain the concrete imagery of an 'iron wall' and the formula 'house
    of Israel' rather than interpretively paraphrasing the symbolism.
  alternative_readings:
  - Render more dynamically as 'iron barrier' and 'Israel'
  rationale: The verse describes a symbolic action whose theological force depends
    on the concrete imagery. Preserving the enacted-sign language allows readers to
    perceive the prophetic symbolism without the translation resolving it for them.
  doctrine_reference: Translation philosophy 1, 3, 5
