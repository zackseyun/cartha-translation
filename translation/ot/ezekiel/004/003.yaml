id: EZK.4.3
reference: Ezekiel 4:3
source:
  edition: WLC
  text: וְ/אַתָּ֤ה קַח לְ/ךָ֙ מַחֲבַ֣ת בַּרְזֶ֔ל וְ/נָתַתָּ֤ה אוֹתָ/הּ֙ קִ֣יר בַּרְזֶ֔ל
    בֵּינְ/ךָ֖ וּ/בֵ֣ין הָ/עִ֑יר וַ/הֲכִינֹתָה֩ אֶת פָּנֶ֨י/ךָ אֵלֶ֜י/הָ וְ/הָיְתָ֤ה
    בַ/מָּצוֹר֙ וְ/צַרְתָּ֣ עָלֶ֔י/הָ א֥וֹת הִ֖יא לְ/בֵ֥ית יִשְׂרָאֵֽל־־׃ס
translation:
  text: And you, take for yourself an iron griddle and set it as an iron wall between
    yourself and the city, and set your face toward it; and it will be under siege,
    and you shall besiege it. It is a sign for the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an iron plate' or 'an iron pan.' The Hebrew term refers to a metal cooking
      implement, here used symbolically as a barrier.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲבַת בַּרְזֶל
  chosen: an iron griddle
  alternatives:
  - an iron plate
  - an iron pan
  lexicon: HALOT
  rationale: מַחֲבַת denotes a flat cooking implement, commonly a griddle or pan.
    'Griddle' best captures the likely object while remaining natural English. Because
    the object is then used symbolically as a barrier, 'plate' is possible, but the
    culinary sense of the noun should be preserved.
- source_word: קִיר בַּרְזֶל
  chosen: an iron wall
  alternatives:
  - an iron barrier
  lexicon: HALOT
  rationale: קִיר ordinarily means 'wall.' Although the griddle functions as a barrier,
    the Hebrew uses the concrete noun 'wall,' which should be retained in the main
    text for the enacted-sign imagery.
- source_word: וַהֲכִינֹתָה אֶת־פָּנֶיךָ אֵלֶיהָ
  chosen: set your face toward it
  alternatives:
  - direct your face toward it
  - fix your gaze on it
  lexicon: HALOT
  rationale: The idiom of setting one's face conveys deliberate orientation or determination.
    'Set your face toward it' preserves the Hebrew idiom in readable English and fits
    prophetic sign-act language.
- source_word: וְהָיְתָה בַמָּצוֹר
  chosen: it will be under siege
  alternatives:
  - it will be in a state of siege
  - it will be besieged
  lexicon: HALOT
  rationale: מָצוֹר refers to siege or siege-conditions. 'Under siege' is idiomatic
    modern English and clearly expresses the city's condition.
- source_word: וְצַרְתָּ עָלֶיהָ
  chosen: you shall besiege it
  alternatives:
  - you shall lay siege to it
  lexicon: HALOT
  rationale: The verb צור in this context means to besiege. 'You shall besiege it'
    is concise and closely reflects the Hebrew verbal force.
- source_word: אוֹת הִיא
  chosen: It is a sign
  alternatives:
  - This is a sign
  lexicon: HALOT
  rationale: אוֹת means 'sign' in the sense of a symbolic indicator. 'It is a sign'
    naturally refers back to the enacted object and action as a prophetic sign-act.
- source_word: לְבֵית יִשְׂרָאֵל
  chosen: for the house of Israel
  alternatives:
  - to the house of Israel
  lexicon: HALOT
  rationale: The preposition ל here is well rendered 'for,' indicating the sign's
    intended audience or referent. 'House of Israel' preserves the covenantal collective
    expression.
