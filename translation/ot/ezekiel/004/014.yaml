id: EZK.4.14
reference: Ezekiel 4:14
source:
  edition: WLC
  text: וָ/אֹמַ֗ר אֲהָהּ֙ אֲדֹנָ֣/י יְהוִ֔ה הִנֵּ֥ה נַפְשִׁ֖/י לֹ֣א מְטֻמָּאָ֑ה וּ/נְבֵלָ֨ה
    וּ/טְרֵפָ֤ה לֹֽא אָכַ֨לְתִּי֙ מִ/נְּעוּרַ֣/י וְ/עַד עַ֔תָּה וְ/לֹא בָ֥א בְּ/פִ֖/י
    בְּשַׂ֥ר פִּגּֽוּל־־־׃ס
translation:
  text: Then I said, “Ah, Lord GOD! Look, I have never defiled myself. From my youth
    until now I have not eaten anything found dead or torn by beasts, and no defiled
    meat has entered my mouth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my soul/life is not defiled''—an idiom meaning ''I have not made
      myself unclean.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'carcass and torn flesh'; that is, animals that died naturally or were
      killed by predators, both forbidden as food under Israel's purity laws.
    reason: cultural_note
  - marker: c
    text: Or 'abominable flesh.' The Hebrew term refers to meat rendered ritually
      unacceptable or defiled.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  - Ah, alas
  lexicon: HALOT
  rationale: An interjection of distress or protest. 'Ah' is natural modern English
    and preserves Ezekiel's alarm without sounding overly archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English
    when אֲדֹנָי stands with the divine name. This preserves the title-plus-name distinction
    while following the project's default of rendering YHWH as 'the LORD'; in this
    fixed collocation, 'GOD' avoids 'Lord LORD.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A discourse marker drawing attention to Ezekiel's plea. 'Look' is readable
    modern English and preserves the force better than archaic 'Behold.'
- source_word: נַפְשִׁי לֹא מְטֻמָּאָה
  chosen: I have never defiled myself
  alternatives:
  - my soul is not defiled
  - I am not defiled
  lexicon: HALOT
  rationale: Though literally 'my soul/life is not defiled,' in context נֶפֶשׁ refers
    to Ezekiel himself as a person. The idiomatic English 'I have never defiled myself'
    communicates the personal ritual purity claim without awkward literalism.
- source_word: נְבֵלָה
  chosen: anything found dead
  alternatives:
  - carcass
  - an animal that died naturally
  lexicon: HALOT
  rationale: Refers to an animal carcass, especially one not properly slaughtered.
    'Anything found dead' is clear and fits the dietary-purity context.
- source_word: טְרֵפָה
  chosen: torn by beasts
  alternatives:
  - torn
  - mauled prey
  lexicon: HALOT
  rationale: Standard dietary term for an animal torn by predators. 'Torn by beasts'
    preserves the likely agent and echoes biblical legal language intelligibly.
- source_word: מִנְּעוּרַי וְעַד עַתָּה
  chosen: From my youth until now
  alternatives:
  - from my youth even until now
  - since my youth until now
  lexicon: HALOT
  rationale: A temporal expression emphasizing lifelong practice. This rendering is
    natural and complete.
- source_word: וְלֹא בָא בְּפִי
  chosen: and no ... has entered my mouth
  alternatives:
  - and ... has not come into my mouth
  - nor has ... entered my mouth
  lexicon: HALOT
  rationale: The Hebrew idiom 'come into my mouth' means to be eaten. 'Has entered
    my mouth' keeps the concrete imagery while sounding natural in English.
- source_word: בְּשַׂר פִּגּוּל
  chosen: defiled meat
  alternatives:
  - abominable flesh
  - tainted meat
  - unclean meat
  lexicon: HALOT
  rationale: פִּגּוּל denotes ritually offensive or defiled flesh, especially meat
    rendered unacceptable for sacred or dietary reasons. 'Defiled meat' is accessible
    and preserves the cultic impurity sense better than the vaguer 'unclean meat.'
