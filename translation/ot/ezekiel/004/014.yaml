theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Lord the LORD
  rationale: The project default is to render YHWH as 'the LORD.' In the fixed combination
    with אֲדֹנָי, English convention uses 'Lord GOD' to avoid the awkward 'Lord LORD'
    while still signaling the divine name. This is a translation convention, not a
    doctrinal alteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
