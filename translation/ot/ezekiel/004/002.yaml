id: EZK.4.2
reference: Ezekiel 4:2
source:
  edition: WLC
  text: וְ/נָתַתָּ֨ה עָלֶ֜י/הָ מָצ֗וֹר וּ/בָנִ֤יתָ עָלֶ֨י/הָ֙ דָּיֵ֔ק וְ/שָׁפַכְתָּ֥
    עָלֶ֖י/הָ סֹֽלְלָ֑ה וְ/נָתַתָּ֨ה עָלֶ֧י/הָ מַחֲנ֛וֹת וְ/שִׂים עָלֶ֥י/הָ כָּרִ֖ים
    סָבִֽיב־׃
translation:
  text: And set a siege against it, and build a siege wall against it, and heap up
    a ramp against it, and set camps against it, and place battering rams against
    it all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'siege tower' for 'siege wall' (דָּיֵק); the Hebrew term denotes a siege
      structure and may refer to a raised fortification used in assault.
    reason: lexical_alternative
  - marker: b
    text: Or 'siege ramp' for 'ramp' (סֹלְלָה), referring to an embankment heaped
      up against a city wall.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצוֹר
  chosen: a siege
  alternatives:
  - siegeworks
  - blockade
  lexicon: HALOT
  rationale: The noun denotes siege or siege-encirclement in military context. 'Set
    a siege against it' is idiomatic enough in English while preserving the directness
    of the Hebrew command sequence.
- source_word: דָּיֵק
  chosen: a siege wall
  alternatives:
  - siege tower
  - bulwark
  lexicon: HALOT
  rationale: The term refers to a siege structure raised against a city. 'Siege wall'
    best fits the likely sense here in context with the other siege implements; 'siege
    tower' is possible but less certain, so preserved as an alternative.
- source_word: סֹלְלָה
  chosen: a ramp
  alternatives:
  - siege ramp
  - mound
  lexicon: HALOT
  rationale: This is the earthen embankment or ramp built up for assault. 'Ramp' is
    concise modern English; 'siege ramp' is more explicit but slightly heavier, and
    'mound' is possible though less precise.
- source_word: מַחֲנוֹת
  chosen: camps
  alternatives:
  - encampments
  - army camps
  lexicon: HALOT
  rationale: The plural denotes military camps set around the city. 'Camps' is natural
    English and sufficiently clear in the siege context.
- source_word: כָּרִים
  chosen: battering rams
  alternatives:
  - rams
  lexicon: HALOT
  rationale: In siege contexts this noun refers to battering rams rather than literal
    lambs or rams. The military sense is required by the surrounding vocabulary.
- source_word: עָלֶיהָ
  chosen: against it
  alternatives:
  - upon it
  - over against it
  lexicon: HALOT
  rationale: The repeated prepositional phrase in this military context indicates
    hostile action directed toward the city representation. 'Against it' communicates
    the adversarial force more clearly than the more wooden 'upon it.'
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: The adverb marks surrounding encirclement. 'All around' gives the full
    force of the siege imagery in readable English.
- source_word: וְנָתַתָּה / וּבָנִיתָ / וְשָׁפַכְתָּ / וְשִׂים
  chosen: set / build / heap up / set / place
  alternatives:
  - put / build / pour out / put / set
  lexicon: HALOT
  rationale: The verse is a sequence of direct imperatives/instructions. The chosen
    English verbs preserve the concrete military actions while avoiding awkward repetition
    where English style benefits from slight variation.
