id: EZK.4.5
reference: Ezekiel 4:5
source:
  edition: WLC
  text: וַ/אֲנִ֗י נָתַ֤תִּֽי לְ/ךָ֙ אֶת שְׁנֵ֣י עֲוֺנָ֔/ם לְ/מִסְפַּ֣ר יָמִ֔ים שְׁלֹשׁ
    מֵא֥וֹת וְ/תִשְׁעִ֖ים י֑וֹם וְ/נָשָׂ֖אתָ עֲוֺ֥ן בֵּֽית יִשְׂרָאֵֽל־־־׃
translation:
  text: And I have assigned to you the years of their iniquity according to the number
    of days, three hundred and ninety days, and you shall bear the iniquity of the
    house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the punishment of their iniquity' or 'their guilt'; the Hebrew word
      can refer to iniquity, guilt, or the punishment resulting from guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַתִּי
  chosen: have assigned
  alternatives:
  - have given
  - have appointed
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given,' in this context of imposing
    a symbolic period on Ezekiel, 'have assigned' communicates the sense of appointing
    or allotting a burdened duration without paraphrasing beyond the Hebrew.
- source_word: שְׁנֵי עֲוֺנָם
  chosen: the years of their iniquity
  alternatives:
  - the years of their punishment
  - the years of their guilt
  lexicon: HALOT
  rationale: The construct phrase literally reads 'the years of their iniquity.' In
    context, the following phrase 'according to the number of days' shows that years
    are being represented by days. Rendering עָוֹן as 'iniquity' preserves the moral
    sense of guilt rather than collapsing it into mere penalty, though the term can
    include the consequence of guilt.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment borne for guilt. 'Iniquity'
    is retained in both occurrences to preserve lexical consistency and the theological
    weight of Israel's sin, while the bearing language allows the consequence-bearing
    nuance to remain implicit.
- source_word: לְמִסְפַּר יָמִים
  chosen: according to the number of days
  alternatives:
  - for a number of days
  - equal to the number of days
  lexicon: HALOT
  rationale: This phrase explains the symbolic correspondence between years and days.
    'According to the number of days' is a natural English rendering that preserves
    the formal relationship indicated by לְ plus מִסְפָּר.
- source_word: שְׁלֹשׁ מֵאוֹת וְתִשְׁעִים יוֹם
  chosen: three hundred and ninety days
  lexicon: HALOT
  rationale: Straightforward cardinal number plus noun; rendered idiomatically in
    standard English number form.
- source_word: וְנָשָׂאתָ
  chosen: you shall bear
  alternatives:
  - you shall carry
  - you shall endure
  lexicon: HALOT
  rationale: נשא with עָוֹן commonly means 'bear' iniquity/guilt. 'Bear' preserves
    the established biblical idiom and the symbolic-prophetic force of Ezekiel's enacted
    sign.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct expression is a standard covenantal-national designation.
    'The house of Israel' preserves the Hebrew form and its corporate sense better
    than the simpler 'Israel'.
