theological_decisions:
- issue: Meaning of עָוֹן in a prophetic sign-act
  chosen_reading: Rendered as 'iniquity' in both occurrences, while allowing the context
    of bearing to imply guilt and its burdened consequence.
  alternative_readings:
  - punishment
  - guilt
  rationale: The verse concerns Ezekiel symbolically bearing Israel's sin over a set
    period. Translating עָוֹן as 'iniquity' avoids over-resolving whether the emphasis
    is on the sin itself, the guilt incurred, or the punishment borne; the Hebrew
    can encompass these related senses.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
