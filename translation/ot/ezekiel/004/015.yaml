id: EZK.4.15
reference: Ezekiel 4:15
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֔/י רְאֵ֗ה נָתַ֤תִּֽי לְ/ךָ֙ אֶת צפועי הַ/בָּקָ֔ר תַּ֖חַת
    גֶּלְלֵ֣י הָֽ/אָדָ֑ם וְ/עָשִׂ֥יתָ אֶֽת לַחְמְ/ךָ֖ עֲלֵי/הֶֽם־־׃ס
translation:
  text: Then he said to me, “See, I have given you cow dung instead of human excrement,
    and you shall prepare your bread over it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “human dung” / “man's dung.” The Hebrew literally uses a term for dung/excrement
      and says “the האדם,” here meaning humans in general, contrasted with cattle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'he' refers to God from the prior context.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: Imperative of ראה used as an attention-getter. 'See' is concise and natural;
    'behold' is more traditional but archaic for the stated style.
- source_word: נָתַתִּי לְךָ
  chosen: I have given you
  alternatives:
  - I give you
  - I have allowed you
  lexicon: HALOT
  rationale: The perfect naturally renders as a completed grant in context. 'Have
    given' communicates divine provision/permission already decided.
- source_word: צפועי הַבָּקָר
  chosen: cow dung
  alternatives:
  - cattle dung
  - cow manure
  lexicon: HALOT
  rationale: Refers to bovine droppings used as fuel. 'Cow dung' is direct, idiomatic,
    and matches the concrete, defiling contrast with human excrement. 'Manure' can
    sound euphemistic in this context.
- source_word: תַּחַת
  chosen: instead of
  alternatives:
  - in place of
  - under
  lexicon: HALOT
  rationale: Here תַּחַת marks substitution, not spatial position. 'Instead of' best
    conveys the exchange God grants in response to Ezekiel's objection.
- source_word: גֶּלְלֵי הָאָדָם
  chosen: human excrement
  alternatives:
  - human dung
  - man's dung
  lexicon: HALOT
  rationale: גֶּלֶל denotes dung/excrement. Because הָאָדָם here refers to humans
    generically rather than a specific male, 'human' fits the context and aligns with
    the doctrine note on אָדָם as 'man / humankind' depending on context. 'Excrement'
    is slightly more explicit and natural in modern English than repeating 'dung'
    twice.
- source_word: וְעָשִׂיתָ אֶת לַחְמְךָ
  chosen: and you shall prepare your bread
  alternatives:
  - and you shall make your bread
  - and you shall bake your bread
  lexicon: HALOT
  rationale: עשה is broad ('make/do'). In this cooking context, 'prepare' preserves
    the generality without over-specifying the exact stage; 'bake' is possible but
    narrower than the Hebrew.
- source_word: עֲלֵיהֶם
  chosen: over it
  alternatives:
  - on it
  - over them
  lexicon: HALOT
  rationale: The Hebrew suffix is plural, referring grammatically to the dung pieces/droppings,
    but English idiom with a mass noun prefers singular 'it' after 'cow dung.' 'Over
    it' conveys use as fuel for baking.
