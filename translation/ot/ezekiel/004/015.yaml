theological_decisions:
- issue: Rendering of הָאָדָם
  chosen_reading: human
  alternative_readings:
  - man
  rationale: The term here denotes human beings generically in contrast with cattle,
    not a male individual. Rendering it as 'human' preserves the contrast and follows
    the doctrine guidance that אָדָם may be translated 'man' or 'humankind' according
    to context.
