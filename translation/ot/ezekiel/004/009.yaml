id: EZK.4.9
reference: Ezekiel 4:9
source:
  edition: WLC
  text: וְ/אַתָּ֣ה קַח לְ/ךָ֡ חִטִּ֡ין וּ֠/שְׂעֹרִים וּ/פ֨וֹל וַ/עֲדָשִׁ֜ים וְ/דֹ֣חַן
    וְ/כֻסְּמִ֗ים וְ/נָתַתָּ֤ה אוֹתָ/ם֙ בִּ/כְלִ֣י אֶחָ֔ד וְ/עָשִׂ֧יתָ אוֹתָ֛/ם לְ/ךָ֖
    לְ/לָ֑חֶם מִסְפַּ֨ר הַ/יָּמִ֜ים אֲשֶׁר אַתָּ֣ה שׁוֹכֵ֣ב עַֽל צִדְּ/ךָ֗ שְׁלֹשׁ
    מֵא֧וֹת וְ/תִשְׁעִ֛ים י֖וֹם תֹּאכֲלֶֽ/נּוּ־־׀־־׃
translation:
  text: And you, take for yourself wheat and barley, beans and lentils, millet and
    spelt, and put them into one vessel, and make them into bread for yourself. For
    the number of the days that you lie on your side—three hundred and ninety days—you
    shall eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'emmer' or 'a kind of wheat' for 'spelt'; the exact identification of
      the ancient grain כֻסְּמִים is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח לְךָ
  chosen: take for yourself
  alternatives:
  - take
  - get for yourself
  lexicon: HALOT
  rationale: The imperative plus dative pronoun is naturally reflexive/benefactive.
    'Take for yourself' preserves the Hebrew force without sounding unnatural.
- source_word: חִטִּין
  chosen: wheat
  lexicon: HALOT
  rationale: Standard rendering for the grain named here.
- source_word: שְׂעֹרִים
  chosen: barley
  lexicon: HALOT
  rationale: Standard rendering for the cereal grain.
- source_word: פּוֹל
  chosen: beans
  alternatives:
  - broad beans
  - fava beans
  lexicon: HALOT
  rationale: A general English term is best in the main text; the more specific identification
    as broad/fava beans is plausible but too narrow for the main line without necessity.
- source_word: עֲדָשִׁים
  chosen: lentils
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: דֹחַן
  chosen: millet
  lexicon: HALOT
  rationale: The term is commonly identified as millet; this is the clearest modern
    equivalent.
- source_word: כֻסְּמִים
  chosen: spelt
  alternatives:
  - emmer
  - a kind of wheat
  lexicon: HALOT
  rationale: Traditional and still plausible rendering for this grain term. Because
    exact ancient grain taxonomy is debated, alternatives are preserved in a footnote.
- source_word: בִּכְלִי אֶחָד
  chosen: into one vessel
  alternatives:
  - in one container
  - into a single jar
  lexicon: HALOT
  rationale: '''Vessel'' preserves the concrete sense of כְּלִי while remaining readable.
    ''One'' is retained to reflect the Hebrew emphasis on combining them together.'
- source_word: וְעָשִׂיתָ אֹתָם לְךָ לְלָחֶם
  chosen: make them into bread for yourself
  alternatives:
  - make bread from them for yourself
  - prepare them as bread for yourself
  lexicon: HALOT
  rationale: The Hebrew literally has 'make them for yourself for bread.' 'Make them
    into bread for yourself' is idiomatic English that preserves both the transformation
    and the benefactive sense.
- source_word: מִסְפַּר הַיָּמִים
  chosen: for the number of the days
  alternatives:
  - according to the number of the days
  - for as many days as
  lexicon: HALOT
  rationale: This phrase introduces duration measured by the specified days. 'For
    the number of the days' keeps the formal structure while remaining understandable.
- source_word: שׁוֹכֵב עַל צִדְּךָ
  chosen: you lie on your side
  alternatives:
  - you are lying on your side
  lexicon: HALOT
  rationale: The participle denotes the ongoing state in the enacted sign. English
    simple present works naturally in this instruction context.
- source_word: שְׁלֹשׁ מֵאוֹת וְתִשְׁעִים יוֹם
  chosen: three hundred and ninety days
  alternatives:
  - 390 days
  lexicon: HALOT
  rationale: The full written-out number suits Bible style and reflects the Hebrew
    wording.
- source_word: תֹּאכֲלֶנּוּ
  chosen: you shall eat it
  alternatives:
  - you are to eat it
  lexicon: HALOT
  rationale: The suffix is singular, referring back to the bread as a collective/singular
    item. 'You shall eat it' preserves the directive force.
