theological_decisions:
- issue: Identity of 'David' in 'my servant David'
  chosen_reading: Retain 'David' in the main text without interpretive expansion.
  alternative_readings:
  - the historical David resurrected
  - a Davidic ruler
  - the Messiah as David's greater son
  rationale: The Hebrew text says 'David' and should not be paraphrased as 'the Messiah' in the main text. Because the phrase carries recognized messianic significance in Ezekiel's context, the translation preserves the literal wording and notes the interpretive alternative in a footnote rather than resolving the theological question in translation.
  doctrine_reference: Translation philosophy §§1, 3, and 5; affirmations within historic Christian orthodoxy without importing claims beyond the text.
