id: EZK.34.24
reference: Ezekiel 34:24
source:
  edition: WLC
  text: וַ/אֲנִ֣י יְהוָ֗ה אֶהְיֶ֤ה לָ/הֶם֙ לֵֽ/אלֹהִ֔ים וְ/עַבְדִּ֥/י דָוִ֖ד נָשִׂ֣יא בְ/תוֹכָ֑/ם אֲנִ֥י יְהוָ֖ה דִּבַּֽרְתִּי׃
translation:
  text: And I, Yahweh, will be their God, and my servant David will be prince among them. I, Yahweh, have spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''My servant David'' may refer typologically or prophetically to the coming Davidic ruler, that is, the Messiah; the Hebrew text itself reads ''David.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Qal imperfect 1cs of היה here expresses future covenant relation; 'will be' is natural modern English and preserves the verbal force.
- source_word: לֵאלֹהִים
  chosen: their God
  alternatives:
  - God to them
  lexicon: HALOT
  rationale: The idiom היה + ל + אלהים is standard covenant language meaning 'be God to/for them.' 'Their God' is idiomatic English and preserves the covenantal sense.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although the project sometimes prefers 'slave' where bonded status is salient, in royal-Davidic and prophetic covenant contexts עבד commonly functions as an honorific title for one in loyal service to God. 'My servant' best fits the register and established biblical usage here without loss of meaning.
- source_word: דָוִד
  chosen: David
  rationale: Personal names are transliterated by standard conventions. The Hebrew proper name is rendered 'David.'
- source_word: נָשִׂיא
  chosen: prince
  alternatives:
  - leader
  - ruler
  lexicon: HALOT
  rationale: נָשִׂיא often denotes a chief, leader, or prince. 'Prince' preserves the specific Ezekiel usage, especially in contrast to 'king' elsewhere, and avoids over-interpreting the exact political nuance.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: '''Among them'' is clear modern English for the locative idiom ''in their midst,'' while preserving the communal setting.'
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  - spoke
  lexicon: HALOT
  rationale: The perfect here functions as a solemn divine declaration formula. 'Have spoken' is the conventional and weighty English equivalent, fitting prophetic discourse.
