id: EZK.34.11
reference: Ezekiel 34:11
source:
  edition: WLC
  text: כִּ֛י כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה הִנְ/נִי אָ֕נִי וְ/דָרַשְׁתִּ֥י אֶת צֹאנִ֖/י וּ/בִקַּרְתִּֽי/ם־־׃
translation:
  text: 'For thus says the Lord GOD: Behold, I myself will search for my sheep and seek them out.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and attend to them,' 'and inspect them,' or 'and care for them.' The Hebrew verb can carry the sense of personally looking after the sheep as well as seeking them out.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English when אֲדֹנָי precedes YHWH, avoiding the awkward 'Lord LORD.' This also aligns with the doctrine default of rendering YHWH as 'the LORD,' while preserving the distinct double title in readable English.
- source_word: הִנְנִי אָנִי
  chosen: Behold, I myself
  alternatives:
  - Look, I myself
  - Here I am, I myself
  lexicon: HALOT
  rationale: The combination intensifies divine self-involvement. 'Behold' preserves the prophetic register of הִנְנִי, while 'I myself' reflects the emphatic pronoun אָנִי. This keeps the force without over-paraphrasing.
- source_word: וְדָרַשְׁתִּי
  chosen: will search for
  alternatives:
  - will seek
  - will require
  lexicon: HALOT
  rationale: In the shepherding context with 'my sheep' as object, דרש conveys active seeking/searching rather than demanding or inquiring. 'Search for' is natural English and fits the restoration context.
- source_word: צֹאנִי
  chosen: my sheep
  alternatives:
  - my flock
  lexicon: HALOT
  rationale: Although צאן can denote small livestock collectively or a flock, 'my sheep' fits the immediate metaphor and pairs naturally with the following verbs. It preserves the pastoral imagery more concretely than 'my flock.'
- source_word: וּבִקַּרְתִּים
  chosen: and seek them out
  alternatives:
  - and attend to them
  - and inspect them
  - and care for them
  lexicon: HALOT
  rationale: The verb בקר in this stem can mean to attend, inspect, or look after. In parallel with 'will search for my sheep,' the sense is of personally locating and taking account of them. 'Seek them out' captures the movement toward the scattered sheep and reads idiomatically in English, while preserving the parallelism.
