id: EZK.34.8
reference: Ezekiel 34:8
source:
  edition: WLC
  text: חַי אָ֜נִי נְאֻ֣ם אֲדֹנָ֣/י יְהוִ֗ה אִם לֹ֣א יַ֣עַן הֱיֽוֹת צֹאנִ֣/י לָ/בַ֡ז וַ/תִּֽהְיֶינָה֩ צֹאנִ֨/י לְ/אָכְלָ֜ה לְ/כָל חַיַּ֤ת הַ/שָּׂדֶה֙ מֵ/אֵ֣ין רֹעֶ֔ה וְ/לֹֽא דָרְשׁ֥וּ רֹעַ֖/י אֶת צֹאנִ֑/י וַ/יִּרְע֤וּ הָֽ/רֹעִים֙ אוֹתָ֔/ם וְ/אֶת צֹאנִ֖/י לֹ֥א רָעֽוּ־׀־־׀־־־־׃ס
translation:
  text: As I live, declares the Lord GOD, surely because my flock has become plunder and my flock has become food for every wild beast of the field, since there was no shepherd, and my shepherds did not seek my flock, but the shepherds fed themselves and did not feed my flock—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'prey' is also possible for 'plunder.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the shepherds pastured themselves.' The Hebrew idiom means they cared for their own interests rather than the flock.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָ֜נִי
  chosen: As I live
  alternatives:
  - Surely as I live
  - By my life
  lexicon: HALOT
  rationale: Standard oath formula in prophetic speech. 'As I live' preserves the solemn self-oath without unnecessary expansion.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is well rendered 'declares' in prophetic formulae. אֲדֹנָי יְהוִה is translated 'Lord GOD'; for יְהוָה the doctrinal default is 'the LORD,' but in the compound title with אֲדֹנָי, English convention uses 'Lord GOD' to avoid 'Lord LORD' while still signaling the divine name.
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: Following an oath formula, אִם לֹא functions idiomatically as a strong asseveration rather than a conditional, so 'surely' best captures the force in natural English.
- source_word: יַעַן הֱיוֹת
  chosen: because ... has become
  alternatives:
  - because
  - inasmuch as ... was
  lexicon: HALOT
  rationale: יַעַן introduces the reason for the coming judgment; pairing it with the infinitive הֱיוֹת yields a causal sense. English supplies 'has become' smoothly from the infinitive construction.
- source_word: צֹאנִי
  chosen: my flock
  alternatives:
  - my sheep
  lexicon: HALOT
  rationale: צֹאן can denote small livestock/sheep collectively. In this shepherding metaphor, 'flock' is the most natural collective rendering and fits repeated usage in the verse.
- source_word: לָבַז
  chosen: plunder
  alternatives:
  - prey
  - spoil
  lexicon: HALOT
  rationale: The noun denotes something taken by force. 'Plunder' communicates the idea of being despoiled; 'prey' is possible, but the next clause already uses an eating image, so varying the English helps preserve both aspects.
- source_word: לְאָכְלָה
  chosen: food
  alternatives:
  - for food
  - something to be devoured
  lexicon: HALOT
  rationale: The noun means food/that which is eaten. 'Food' is concise and idiomatic with 'for every wild beast of the field.'
- source_word: לְכָל חַיַּת הַשָּׂדֶה
  chosen: for every wild beast of the field
  alternatives:
  - for every beast of the field
  - for all the animals of the open country
  lexicon: HALOT
  rationale: חַיַּת הַשָּׂדֶה is a common expression for wild animals. 'Wild beast of the field' preserves the elevated prophetic register and the danger implied.
- source_word: מֵאֵין רֹעֶה
  chosen: since there was no shepherd
  alternatives:
  - because there was no shepherd
  - without a shepherd
  lexicon: HALOT
  rationale: The phrase gives the circumstance/cause of the flock's vulnerability. 'Since there was no shepherd' fits the causal flow of the sentence.
- source_word: דָרְשׁוּ
  chosen: did not seek
  alternatives:
  - did not search for
  - did not care for
  lexicon: HALOT
  rationale: דרשׁ commonly means seek/inquire after. 'Did not seek' is the more literal choice; 'care for' would be interpretive and broader than the lexical sense.
- source_word: רֹעַי
  chosen: my shepherds
  alternatives:
  - the shepherds appointed over my flock
  lexicon: HALOT
  rationale: The possessive marks those responsible before God for his people. 'My shepherds' preserves the covenantal accountability implied.
- source_word: וַיִּרְעוּ הָרֹעִים אוֹתָם
  chosen: the shepherds fed themselves
  alternatives:
  - the shepherds pastured themselves
  - the shepherds shepherded themselves
  lexicon: HALOT
  rationale: The object pronoun likely refers reflexively to the shepherds themselves in sense, as the contrast is with failing to feed the flock. 'Fed themselves' expresses the idiom clearly in English.
- source_word: וְאֶת צֹאנִי לֹא רָעוּ
  chosen: and did not feed my flock
  alternatives:
  - and did not shepherd my flock
  lexicon: HALOT
  rationale: רעה in this context carries the pastoral sense 'feed/shepherd.' Because the previous clause already used 'fed themselves,' 'did not feed my flock' preserves the sharp contrast and the economic exploitation theme.
