id: EZK.34.2
reference: Ezekiel 34:2
source:
  edition: WLC
  text: בֶּן אָדָ֕ם הִנָּבֵ֖א עַל רוֹעֵ֣י יִשְׂרָאֵ֑ל הִנָּבֵ֣א וְ/אָמַרְתָּ֩ אֲלֵי/הֶ֨ם לָ/רֹעִ֜ים כֹּ֥ה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה ה֤וֹי רֹעֵֽי יִשְׂרָאֵל֙ אֲשֶׁ֤ר הָיוּ֙ רֹעִ֣ים אוֹתָ֔/ם הֲ/ל֣וֹא הַ/צֹּ֔אן יִרְע֖וּ הָ/רֹעִֽים־־׀־׃
translation:
  text: 'Son of man, prophesy against the shepherds of Israel; prophesy and say to them, to the shepherds, ‘Thus says the Lord GOD: Woe to the shepherds of Israel who have been shepherding themselves! Should not the shepherds shepherd the flock?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who feed themselves.' The Hebrew verb is the same shepherding verb used throughout the verse; the sense is that Israel’s leaders were caring for themselves instead of the flock.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sheep'; rendered 'the flock' here for the collective sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - human one
  - son of Adam
  lexicon: HALOT
  rationale: Conventional and contextually appropriate rendering of Ezekiel’s address formula. It preserves the Hebrew idiom and the singular vocative force without flattening it to a generic expression.
- source_word: הִנָּבֵא
  chosen: prophesy
  alternatives:
  - speak prophetically
  lexicon: HALOT
  rationale: Standard rendering of the Niphal imperative of נבא. Repetition is preserved in English because the Hebrew repeats the command for emphasis.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - about
  lexicon: HALOT
  rationale: In prophetic judgment contexts, עַל commonly carries an adversative sense. Here the following woe oracle confirms that the prophecy is directed against the shepherds, not merely about them.
- source_word: רוֹעֵי יִשְׂרָאֵל / לָרֹעִים / הָרֹעִים
  chosen: the shepherds of Israel / the shepherds / the shepherds
  alternatives:
  - the leaders of Israel
  - the pastors of Israel
  lexicon: HALOT
  rationale: The shepherd metaphor should be retained rather than interpreted as 'leaders,' since the verse itself develops the metaphor with 'flock' and 'shepherd.' This preserves the literary coherence and prophetic imagery.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - Thus says the Lord Yahweh
  - Thus says the Lord GOD
  lexicon: HALOT
  rationale: אֲדֹנָי יְהוִה is the standard Ezekiel formula. Following the doctrine guideline for יְהוָה, the covenant name is rendered 'the LORD'; because אֲדֹנָי is also present, 'Lord GOD' is the clearest idiomatic English equivalent and avoids 'Lord LORD.'
- source_word: יְהוִה
  chosen: GOD
  alternatives:
  - the LORD
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: In the compound title אֲדֹנָי יְהוִה, English convention renders יְהוָה as 'GOD' in small caps to distinguish it from אֲדֹנָי ('Lord'). This is consistent with the doctrinal default of rendering YHWH as 'the LORD' while adapting in this fixed collocation for clarity.
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a denunciation oracle. 'Woe' best captures the prophetic judgment force in contemporary readable English.
- source_word: אֲשֶׁר הָיוּ רֹעִים אוֹתָם
  chosen: who have been shepherding themselves
  alternatives:
  - who feed themselves
  - who shepherd themselves
  lexicon: HALOT
  rationale: The object pronoun refers back to the shepherds themselves, yielding the reflexive sense. 'Shepherding themselves' preserves the verbal metaphor more closely than 'feeding themselves,' while still conveying self-serving leadership.
- source_word: הֲלוֹא
  chosen: Should not
  alternatives:
  - Is it not
  - Ought not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Should not' is natural English and preserves the rebuking force.
- source_word: הַצֹּאן
  chosen: the flock
  alternatives:
  - the sheep
  lexicon: HALOT
  rationale: Though literally 'the sheep/small livestock,' 'the flock' fits the collective sense and pairs naturally with 'shepherds shepherd.' It preserves the pastoral metaphor in idiomatic English.
- source_word: יִרְעוּ
  chosen: shepherd
  alternatives:
  - feed
  - pasture
  lexicon: HALOT
  rationale: The verb רעה can mean 'pasture/feed' or more broadly 'shepherd.' Because the surrounding clause repeatedly uses shepherd language, 'shepherd' best preserves the wordplay and metaphorical consistency.
