theological_decisions:
- issue: Rendering the divine name in the formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to interpret 'shepherds' as leaders in the main text
  chosen_reading: Retain 'shepherds' metaphor in the main text
  alternative_readings:
  - leaders of Israel
  rationale: The verse is built on an extended shepherd/flock metaphor. Interpreting the metaphor in the main text would reduce literary and theological texture. The referent is Israel’s leaders, but the source text intentionally speaks metaphorically.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
