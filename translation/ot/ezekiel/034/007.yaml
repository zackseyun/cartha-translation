id: EZK.34.7
reference: Ezekiel 34:7
source:
  edition: WLC
  text: לָ/כֵ֣ן רֹעִ֔ים שִׁמְע֖וּ אֶת דְּבַ֥ר יְהוָֽה־׃
translation:
  text: 'Therefore, shepherds, hear the word of Yahweh:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: HALOT
  rationale: Marks a logical conclusion from the preceding indictment. 'Therefore' is a natural and sufficiently formal English discourse marker here.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  lexicon: HALOT
  rationale: The Hebrew literally means 'shepherds.' In Ezekiel 34 the term functions metaphorically for Israel's leaders, but the metaphor is central to the chapter and should be preserved rather than interpreted as 'leaders' or ecclesiastically as 'pastors.'
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural from שׁמע. 'Hear' preserves the prophetic summons and covenantal resonance of the verb better than the more colloquial 'listen to.'
- source_word: אֶת
  chosen: '[not translated separately]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent.
- source_word: דְּבַר
  chosen: the word of
  alternatives:
  - the message of
  lexicon: HALOT
  rationale: Construct form of דָּבָר. 'The word of' is the standard prophetic expression and preserves both lexical form and biblical register. 'Message' is possible but less textually transparent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
