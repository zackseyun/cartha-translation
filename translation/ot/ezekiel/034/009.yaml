theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to interpret הָרֹעִים as leaders rather than preserve the metaphor
  chosen_reading: shepherds
  alternative_readings:
  - leaders
  - rulers
  rationale: The chapter's sustained shepherd imagery is theologically and rhetorically important. Preserving the metaphor avoids importing an interpretive gloss into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve source meaning unless context demands otherwise'
