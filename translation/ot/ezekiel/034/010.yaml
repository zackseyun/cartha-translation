id: EZK.34.10
reference: Ezekiel 34:10
source:
  edition: WLC
  text: כֹּה אָמַ֞ר אֲדֹנָ֣/י יְהוִ֗ה הִנְ/נִ֨י אֶֽל הָ/רֹעִ֜ים וְֽ/דָרַשְׁתִּ֧י אֶת צֹאנִ֣/י מִ/יָּדָ֗/ם וְ/הִשְׁבַּתִּי/ם֙ מֵ/רְע֣וֹת צֹ֔אן וְ/לֹא יִרְע֥וּ ע֛וֹד הָ/רֹעִ֖ים אוֹתָ֑/ם וְ/הִצַּלְתִּ֤י צֹאנִ/י֙ מִ/פִּי/הֶ֔ם וְ/לֹֽא תִהְיֶ֥יןָ לָ/הֶ֖ם לְ/אָכְלָֽה־־־־־׃ס
translation:
  text: 'Thus says the Lord GOD: Behold, I am against the shepherds, and I will require my flock from their hand, and I will stop them from shepherding the flock. The shepherds will no longer shepherd them, and I will rescue my flock from their mouth, and it will no longer be food for them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from their hand,' an idiom of accountability and repossession.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will demand my flock from them' / 'I will call them to account for my flock.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'from their mouth,' preserving the image of the shepherds as devourers rather than protectors.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered as 'the Lord GOD' to reflect the combined title אֲדֹנָי יְהוִה in standard readable English. Per doctrine, YHWH is represented as 'the LORD'; however, in the conventional English rendering of this compound title, 'Lord GOD' avoids the awkward 'Lord LORD' while preserving both elements.
- source_word: הִנְנִי אֶל
  chosen: Behold, I am against
  alternatives:
  - Look, I am against
  - See, I am against
  lexicon: HALOT
  rationale: The idiom הִנְנִי אֶל introduces divine opposition. 'Behold' preserves prophetic force and solemnity; 'against' captures אֶל in this hostile stance context.
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the pastors
  - the leaders
  lexicon: HALOT
  rationale: Literally 'the shepherds.' In Ezekiel 34 the metaphor refers to Israel's leaders, but the text itself sustains the shepherd imagery, so it is preserved rather than interpreted away.
- source_word: וְדָרַשְׁתִּי אֶת־צֹאנִי מִיָּדָם
  chosen: I will require my flock from their hand
  alternatives:
  - I will demand my flock from them
  - I will call them to account for my flock
  lexicon: HALOT
  rationale: דָּרַשׁ with מִיָּד conveys demanding back or requiring accountability. 'Require ... from their hand' preserves the judicial nuance and Hebrew imagery while remaining intelligible.
- source_word: וְהִשְׁבַּתִּים מֵרְעוֹת צֹאן
  chosen: I will stop them from shepherding the flock
  alternatives:
  - I will cause them to cease from feeding the flock
  - I will remove them from tending sheep
  lexicon: HALOT
  rationale: הִשְׁבִּית means cause to cease/stop; רְעוֹת צֹאן is the activity of shepherding. 'Stop them from shepherding the flock' is natural English that preserves the verbal force.
- source_word: וְלֹא יִרְעוּ עוֹד הָרֹעִים אוֹתָם
  chosen: The shepherds will no longer shepherd them
  alternatives:
  - The shepherds will no longer feed them
  - The shepherds will not pasture them anymore
  lexicon: HALOT
  rationale: Repetition of רעה is retained with 'shepherd' as both noun and verb to preserve the Hebrew wordplay and thematic emphasis. 'Feed' is possible but narrower than the broader shepherding sense.
- source_word: וְהִצַּלְתִּי צֹאנִי מִפִּיהֶם
  chosen: I will rescue my flock from their mouth
  alternatives:
  - I will deliver my flock from their mouth
  - I will snatch my sheep from their jaws
  lexicon: HALOT
  rationale: The image is predatory and metaphorical. 'From their mouth' preserves the vivid metaphor rather than flattening it to a generic rescue.
- source_word: וְלֹא תִהְיֶיןָ לָהֶם לְאָכְלָה
  chosen: they will no longer be food for them
  alternatives:
  - they will no longer be prey for them
  - they will no longer serve as food for them
  lexicon: HALOT
  rationale: לְאָכְלָה denotes something for eating/food. 'Food' is direct and keeps the devouring imagery linked to 'from their mouth.' 'Prey' is interpretive and less literal.
