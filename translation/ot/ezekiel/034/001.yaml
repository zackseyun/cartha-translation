id: EZK.34.1
reference: Ezekiel 34:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - Now ... came
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential introduction. In English, rendering the full idiom woodenly as 'and it happened' is possible but less natural; the sense is carried by 'And ... came,' which preserves the discourse flow without unnecessary paraphrase.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר־יְהוָה, 'the word' is the established and semantically precise rendering, referring to a specific divine communication. 'Message' is possible but less formally tied to the recurring prophetic formula.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly means 'to me.' 'Unto me' is archaic and less suitable for readable modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech in prophetic discourse. 'Saying' is concise, conventional, and preserves the formal structure of the Hebrew.
