id: EZK.34.20
reference: Ezekiel 34:20
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֥ה אָמַ֛ר אֲדֹנָ֥/י יְהוִ֖ה אֲלֵי/הֶ֑ם הִנְ/נִי אָ֕נִי וְ/שָֽׁפַטְתִּי֙ בֵּֽין שֶׂ֣ה בִרְיָ֔ה וּ/בֵ֥ין שֶׂ֖ה רָזָֽה־־׃
translation:
  text: 'Therefore thus says the Lord GOD to them: Behold, I myself will judge between the fat sheep and the lean sheep.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between a fat sheep and a lean sheep''; the singular nouns likely represent classes within the flock, hence the natural English collective ''the fat sheep and the lean sheep.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding indictment; 'Therefore' preserves the formal prophetic logic.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; 'thus says' is natural and preserves the solemn register.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: For יְהוָה, DOCTRINE.md specifies the default 'the LORD.' In the compound title אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by rendering as 'Lord GOD,' which preserves both elements reverently and idiomatically.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - against them
  lexicon: HALOT
  rationale: The preposition אֶל commonly means 'to/toward.' Here it introduces the addressees of the divine speech, not yet the object of judgment.
- source_word: הִנְנִי אָנִי
  chosen: Behold, I myself
  alternatives:
  - Look, I myself
  - Here am I, I myself
  lexicon: HALOT
  rationale: The doubled first-person expression is emphatic. 'Behold, I myself' preserves both the deictic force and the emphatic subject without sounding overly wooden.
- source_word: וְשָׁפַטְתִּי
  chosen: will judge
  alternatives:
  - will vindicate
  - will govern
  lexicon: HALOT
  rationale: In this context of distinguishing and deciding between groups within the flock, 'judge' best matches the legal/discriminating sense of שׁפט.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and ...
  alternatives:
  - between ... and between ...
  lexicon: HALOT
  rationale: English idiom normally compresses the repeated preposition while preserving the contrastive structure.
- source_word: שֶׂה
  chosen: sheep
  alternatives:
  - one sheep
  - lamb
  lexicon: HALOT
  rationale: Though morphologically singular, שֶׂה here functions collectively/class-wise in the contrast between types within the flock. 'Sheep' in English naturally covers this representative singular usage.
- source_word: בִרְיָה
  chosen: fat
  alternatives:
  - healthy
  - well-fed
  lexicon: HALOT
  rationale: The adjective denotes fatness or stoutness. 'Fat' fits the immediate pastoral metaphor and matches the contrast with 'lean' in the next phrase.
- source_word: רָזָה
  chosen: lean
  alternatives:
  - thin
  - gaunt
  lexicon: HALOT
  rationale: The adjective means thin or emaciated. 'Lean' is idiomatic in contrast with 'fat' and suits the flock imagery.
