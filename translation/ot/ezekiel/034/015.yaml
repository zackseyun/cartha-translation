id: EZK.34.15
reference: Ezekiel 34:15
source:
  edition: WLC
  text: אֲנִ֨י אֶרְעֶ֤ה צֹאנִ/י֙ וַ/אֲנִ֣י אַרְבִּיצֵ֔/ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: I myself will shepherd my flock, and I myself will make them lie down, declares the Lord Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my sheep''; rendered ''my flock'' to preserve the collective sense of the noun in this shepherding context.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will feed my flock.' The Hebrew verb can include the sense of tending or pasturing, not only feeding.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew title: ''Lord Yahweh'' or ''the Lord Yahweh.'' The main text uses the conventional English rendering ''the Lord GOD'' for אֲדֹנָי יְהוִה.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - I alone
  lexicon: HALOT
  rationale: The independent pronoun is explicit before the verb and again after the conjunction, adding emphasis. 'I myself' preserves that emphatic force in natural English better than a bare 'I'.
- source_word: אֶרְעֶה
  chosen: will shepherd
  alternatives:
  - will feed
  - will pasture
  lexicon: HALOT
  rationale: From רעה in the shepherding sense. 'Will shepherd' best captures the pastoral/governing imagery in context, not merely feeding.
- source_word: צֹאנִי
  chosen: my flock
  alternatives:
  - my sheep
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, especially sheep/goats. In this shepherd discourse, 'my flock' is idiomatic and preserves the collective sense.
- source_word: וַאֲנִי
  chosen: and I myself
  alternatives:
  - and I
  - I myself
  lexicon: HALOT
  rationale: The repeated pronoun after waw is again emphatic. Rendering it explicitly maintains the parallelism and divine self-assertion of the Hebrew.
- source_word: אַרְבִּיצֵם
  chosen: will make them lie down
  alternatives:
  - will let them lie down
  - will give them rest
  lexicon: HALOT
  rationale: Hiphil of רבץ means to cause to lie down or settle. 'Will make them lie down' is the most direct rendering and evokes the shepherd image of secure rest.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is clear modern English and preserves the authoritative speech-act sense.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord Yahweh
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering as 'Lord GOD,' preserving both titles while respecting the default treatment of the divine name.
