id: EZK.34.17
reference: Ezekiel 34:17
source:
  edition: WLC
  text: וְ/אַתֵּ֣נָה צֹאנִ֔/י כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה הִנְ/נִ֤י שֹׁפֵט֙ בֵּֽין שֶׂ֣ה לָ/שֶׂ֔ה לָ/אֵילִ֖ים וְ/לָ/עַתּוּדִֽים־׃
translation:
  text: 'And as for you, my flock, thus says the Lord GOD: Behold, I am judging between sheep and sheep, between the rams and the male goats.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between sheep and sheep''; that is, between one sheep and another within the flock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֵּנָה
  chosen: And as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: Fronted independent pronoun with conjunction gives marked address to the flock; 'And as for you' preserves the shift in focus better than a bare 'And you.'
- source_word: צֹאנִי
  chosen: my flock
  alternatives:
  - my sheep
  lexicon: HALOT
  rationale: Though the noun can denote sheep/small livestock, in this shepherding context 'flock' naturally renders the collective singular with the 1cs suffix and reads well in English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' is concise and idiomatic while remaining formally close.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - Lord Yahweh
  lexicon: HALOT
  rationale: For יְהוָה, the doctrinal default is 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'the Lord GOD,' which preserves the title distinction without awkwardness.
- source_word: הִנְנִי
  chosen: Behold, I
  alternatives:
  - Look, I
  - See, I am
  lexicon: HALOT
  rationale: Deictic particle of emphatic self-presentation; 'Behold' preserves the solemn prophetic force.
- source_word: שֹׁפֵט
  chosen: am judging
  alternatives:
  - will judge
  - judge
  lexicon: HALOT
  rationale: The participle expresses ongoing or imminent action from the speaker's standpoint; 'am judging' best reflects the Hebrew aspect here.
- source_word: בֵּין שֶׂה לָשֶׂה
  chosen: between one sheep and another
  alternatives:
  - between sheep and sheep
  - between ewe and ewe
  lexicon: HALOT
  rationale: The idiom means distinguishing within the flock, not between species. 'Between one sheep and another' makes the distributive sense natural in English. 'Ewe' is too specific, since שֶׂה is a generic small-livestock term here.
- source_word: לָאֵילִים
  chosen: the rams
  alternatives:
  - the strong ones
  lexicon: HALOT
  rationale: אֵילִים literally denotes rams; while metaphorical overtones of strength may be present, the animal imagery remains active and should be retained.
- source_word: וְלָעַתּוּדִים
  chosen: the male goats
  alternatives:
  - the he-goats
  - the goats
  lexicon: HALOT
  rationale: The term specifically denotes male goats. 'Male goats' is clear modern English; 'he-goats' is accurate but less natural.
