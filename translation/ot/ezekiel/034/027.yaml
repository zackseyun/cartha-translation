theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Strength of oppression in הָעֹבְדִים בָּהֶם
  chosen_reading: those who enslaved them
  alternative_readings:
  - those who worked them
  - those who made them serve
  rationale: The immediate context is deliverance from a yoke, so a stronger oppression term is warranted. This does not import later doctrinal claims; it reflects the liberation imagery already present in the verse.
