id: EZK.34.27
reference: Ezekiel 34:27
source:
  edition: WLC
  text: וְ/נָתַן֩ עֵ֨ץ הַ/שָּׂדֶ֜ה אֶת פִּרְי֗/וֹ וְ/הָ/אָ֨רֶץ֙ תִּתֵּ֣ן יְבוּלָ֔/הּ וְ/הָי֥וּ עַל אַדְמָתָ֖/ם לָ/בֶ֑טַח וְֽ/יָדְע֞וּ כִּי אֲנִ֣י יְהוָ֗ה בְּ/שִׁבְרִ/י֙ אֶת מֹט֣וֹת עֻלָּ֔/ם וְ/הִ֨צַּלְתִּ֔י/ם מִ/יַּ֖ד הָ/עֹבְדִ֥ים בָּ/הֶֽם־־־־׃
translation:
  text: The tree of the field will give its fruit, and the land will give its produce, and they will be secure on their land. Then they will know that I am Yahweh, when I break the bars of their yoke and deliver them from the hand of those who enslaved them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who made them serve' or 'those who worked them.' The Hebrew participle can be rendered more literally, but the context of a broken yoke supports the stronger sense 'enslaved them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  chosen: will give
  alternatives:
  - shall give
  - gives
  lexicon: HALOT
  rationale: נתן commonly means 'give.' With the prophetic perfect sequence, future sense in English is most natural in context of promised restoration.
- source_word: עֵץ הַשָּׂדֶה
  chosen: the tree of the field
  alternatives:
  - the trees of the field
  - the field tree
  lexicon: HALOT
  rationale: Singular collective is idiomatic in Hebrew; English can preserve it naturally as 'the tree of the field' while implying vegetation generally. The plural alternative is possible as a smoothing translation but less formally aligned.
- source_word: פִּרְיוֹ
  chosen: its fruit
  lexicon: HALOT
  rationale: 'Straightforward possessive: the tree yields its own fruit.'
- source_word: יְבוּלָהּ
  chosen: its produce
  alternatives:
  - its yield
  - its increase
  lexicon: HALOT
  rationale: יבול refers to agricultural produce/yield. 'Produce' is clear modern English and fits the agrarian context.
- source_word: וְהָיוּ עַל אַדְמָתָם לָבֶטַח
  chosen: they will be secure on their land
  alternatives:
  - they will dwell securely on their soil
  - they will be on their land in safety
  lexicon: HALOT
  rationale: לבטח conveys security/safety. 'On their land' reflects על אדמתם closely; 'secure' is concise and idiomatic. 'Dwell' is not explicit in the Hebrew here, so it was avoided.
- source_word: וְיָדְעוּ כִּי אֲנִי יְהוָה
  chosen: Then they will know that I am the LORD
  alternatives:
  - and they will know that I am the LORD
  lexicon: HALOT
  rationale: Standard covenant-recognition formula. 'The LORD' follows the doctrinal default for YHWH. 'Then' makes the resultative sequence explicit in natural English without adding new content.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּשִׁבְרִי
  chosen: when I break
  alternatives:
  - in my breaking
  - as I break
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct is temporal here. 'When I break' best fits the syntax and English flow.
- source_word: מֹטוֹת עֻלָּם
  chosen: the bars of their yoke
  alternatives:
  - the poles of their yoke
  - the yoke-bars upon them
  lexicon: HALOT
  rationale: מוטות are bars/poles; with עול 'yoke,' the image is of the wooden bars of oppression. 'Bars of their yoke' preserves the metaphor clearly in English.
- source_word: וְהִצַּלְתִּים מִיַּד
  chosen: and deliver them from the hand of
  alternatives:
  - and rescue them from the power of
  - and snatch them from the hand of
  lexicon: HALOT
  rationale: נצל means rescue/deliver. 'From the hand of' is a common Hebrew idiom for power/control and is preserved here because it remains intelligible in English.
- source_word: הָעֹבְדִים בָּהֶם
  chosen: those who enslaved them
  alternatives:
  - those who made use of them
  - those who worked them
  - those who served themselves by them
  lexicon: HALOT
  rationale: The participle of עבד with ב can denote treating persons as laborers/servants under domination. In this liberation context, 'enslaved them' best captures the oppressive force of the phrase more clearly than the wooden 'worked them.'
