id: EZK.14.20
reference: Ezekiel 14:20
source:
  edition: WLC
  text: וְ/נֹ֨חַ דנאל וְ/אִיּוֹב֮ בְּ/תוֹכָ/הּ֒ חַי אָ֗נִי נְאֻם֙ אֲדֹנָ֣/י יְהוִ֔ה
    אִם בֵּ֥ן אִם בַּ֖ת יַצִּ֑ילוּ הֵ֥מָּה בְ/צִדְקָתָ֖/ם יַצִּ֥ילוּ נַפְשָֽׁ/ם־־־׃פ
translation:
  text: Even if Noah, Daniel, and Job were in it, as I live, declares the Lord GOD,
    they would deliver neither son nor daughter; by their righteousness they would
    deliver only themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew דנאל may also be read 'Danel,' possibly referring to an ancient righteous
      figure rather than the better-known Daniel.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּתוֹכָהּ
  chosen: in it
  alternatives:
  - in her midst
  - within it
  lexicon: HALOT
  rationale: Refers back to the land/city under judgment in the surrounding context.
    English 'in it' is natural and preserves the locative sense without over-literal
    awkwardness.
- source_word: חַי אָנִי נְאֻם אֲדֹנָי יְהוִה
  chosen: as I live, declares the Lord GOD
  alternatives:
  - as surely as I live, declares the Lord GOD
  - I live, declares the Lord GOD
  lexicon: HALOT
  rationale: This is the standard divine oath formula. 'As I live' preserves the solemn
    oath force. 'Lord GOD' renders אֲדֹנָי יְהוִה, with יְהוָה following the project's
    default as 'the LORD'; in this compound title, conventional English capitalization
    'Lord GOD' clearly distinguishes the two elements.
- source_word: אִם בֵּן אִם בַּת
  chosen: neither son nor daughter
  alternatives:
  - whether son or daughter
  lexicon: HALOT
  rationale: After the oath formula, אִם...אִם introduces the scope of what would
    not be delivered. In idiomatic English, 'neither son nor daughter' best conveys
    the emphatic exclusion.
- source_word: יַצִּילוּ
  chosen: would deliver
  alternatives:
  - would rescue
  - would save
  lexicon: HALOT
  rationale: The Hiphil of נצל here means to cause escape or rescue from judgment.
    'Deliver' fits the prophetic/judgment context and matches the repeated use in
    the verse.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The pronoun is emphatic, highlighting that the righteous men alone would
    be spared. The emphasis is carried in English by the later phrase 'only themselves,'
    so a simple 'they' avoids redundancy.
- source_word: בְצִדְקָתָם
  chosen: by their righteousness
  alternatives:
  - through their righteousness
  - because of their righteousness
  lexicon: HALOT
  rationale: The preposition ב marks means or basis. 'By their righteousness' preserves
    the instrumental nuance and keeps the wording close to the Hebrew.
- source_word: נַפְשָׁם
  chosen: themselves
  alternatives:
  - their lives
  - their own lives
  - their souls
  lexicon: HALOT
  rationale: נֶפֶשׁ in this judgment context refers to life/person rather than the
    immaterial soul. 'Themselves' is idiomatic with 'deliver' and communicates that
    only their own persons/lives would be spared.
- source_word: דנאל
  chosen: Daniel
  alternatives:
  - Danel
  lexicon: HALOT
  rationale: The consonantal form lacks the expected yod of the canonical Daniel spelling,
    and some take it as 'Danel' (possibly the ancient righteous figure known from
    Ugaritic literature). However, standard English readers will recognize 'Daniel,'
    and this is the traditional transliteration in this context; the alternative is
    preserved in a footnote as a lexical option.
