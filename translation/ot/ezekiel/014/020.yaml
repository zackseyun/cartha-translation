theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The doctrine file sets the default rendering of יְהוָה as 'the LORD.'
    In the compound title אֲדֹנָי יְהוִה, English convention commonly uses 'Lord GOD'
    to avoid 'Lord LORD' while preserving both title elements.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Identity of דנאל
  chosen_reading: Daniel
  alternative_readings:
  - Danel
  rationale: The Hebrew spelling permits the reading 'Danel,' and some interpreters
    connect the name to an ancient Near Eastern righteous figure rather than the biblical
    Daniel. Because the text itself does not settle the identification and English
    tradition strongly recognizes 'Daniel,' the main text uses 'Daniel' while preserving
    'Danel' in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve theological
    tension rather than resolve it)
