id: EZK.14.21
reference: Ezekiel 14:21
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֜ר אֲדֹנָ֣/י יְהֹוִ֗ה אַ֣ף כִּֽי אַרְבַּ֣עַת שְׁפָטַ֣/י הָ/רָעִ֡ים
    חֶ֠רֶב וְ/רָעָ֞ב וְ/חַיָּ֤ה רָעָה֙ וָ/דֶ֔בֶר שִׁלַּ֖חְתִּי אֶל יְרוּשָׁלִָ֑ם לְ/הַכְרִ֥ית
    מִמֶּ֖/נָּה אָדָ֥ם וּ/בְהֵמָֽה־׀־׃
translation:
  text: 'For thus says the Lord GOD: How much more when I send my four disastrous
    judgments against Jerusalem—sword and famine and wild beasts and plague—to cut
    off from it man and beast!'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my four severe judgments.' The Hebrew adjective can mean 'bad,' 'harmful,'
      or 'disastrous' in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'pestilence' for 'plague.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהֹוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord GOD
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.'
    Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהֹוִה,
    English convention commonly uses 'Lord GOD' to avoid 'Lord LORD' while preserving
    both divine titles.
- source_word: אַף כִּי
  chosen: How much more when
  alternatives:
  - even if
  - indeed when
  - how much more if
  lexicon: HALOT
  rationale: In context this introduces an a fortiori statement from the prior verse,
    not a simple conditional. 'How much more when' best captures the rhetorical force
    in readable English.
- source_word: אַרְבַּעַת שְׁפָטַי הָרָעִים
  chosen: my four disastrous judgments
  alternatives:
  - my four severe judgments
  - my four evil judgments
  - my four harmful judgments
  lexicon: HALOT
  rationale: שְׁפָטִים here refers to punitive acts/judgments sent by God. הָרָעִים
    literally 'evil/bad' in this context describes calamity or disaster, not moral
    evil in God. 'Disastrous judgments' communicates the sense clearly without implying
    moral defect.
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - war
  - the sword
  lexicon: HALOT
  rationale: Kept the concrete covenant-judgment term 'sword' rather than abstracting
    to 'war.'
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: Standard rendering for covenantal disaster language.
- source_word: חַיָּה רָעָה
  chosen: wild beasts
  alternatives:
  - evil beasts
  - dangerous animals
  - wild animals
  lexicon: HALOT
  rationale: The phrase denotes harmful predatory animals. 'Wild beasts' is idiomatic
    and preserves the menace better than the overly literal 'evil beasts,' which could
    suggest moral agency.
- source_word: דֶבֶר
  chosen: plague
  alternatives:
  - pestilence
  - disease
  lexicon: HALOT
  rationale: '''Plague'' is accessible modern English and fits prophetic judgment
    contexts; ''pestilence'' is more traditional but less natural for the target reader.'
- source_word: שִׁלַּחְתִּי
  chosen: I send
  alternatives:
  - I have sent
  - I sent
  lexicon: HALOT
  rationale: 'Although morphologically perfect, the verb in this prophetic declaration
    functions naturally as a present/future-like statement in English: ''when I send.''
    This fits the rhetorical force of the oracle.'
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to wipe out
  lexicon: HALOT
  rationale: '''Cut off'' preserves the covenant-judgment idiom more closely than
    the more generalized ''destroy.'''
- source_word: אָדָם וּבְהֵמָה
  chosen: man and beast
  alternatives:
  - humankind and animals
  - people and animals
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered gender-accurately according to context.
    In this stock judgment formula paired with 'beast,' 'man and beast' is the most
    natural and faithful English equivalent, expressing human beings and animals together.
