theological_decisions:
- issue: Rendering of divine name יְהוָה within the compound title אֲדֹנָי יְהֹוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine specifies the default rendering of YHWH as 'the LORD.' In
    this fixed compound, English Bible style commonly renders אֲדֹנָי יְהוָה as 'Lord
    GOD' to preserve reverential distinction and avoid awkward repetition. This is
    a translational convention, not a theological alteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)'
