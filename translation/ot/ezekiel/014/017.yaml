theological_decisions:
- issue: Rendering of אָדָם in a representative/generic judgment formula
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The phrase 'man and beast' is a conventional Hebrew judgment expression
    covering human and animal life in the land. Following the doctrine's gender-accurate
    principle and the default rendering for אָדָם, 'man' best matches the source form
    and idiom here, while still functioning generically.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
