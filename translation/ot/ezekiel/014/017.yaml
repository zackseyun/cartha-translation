id: EZK.14.17
reference: Ezekiel 14:17
source:
  edition: WLC
  text: א֛וֹ חֶ֥רֶב אָבִ֖יא עַל הָ/אָ֣רֶץ הַ/הִ֑יא וְ/אָמַרְתִּ֗י חֶ֚רֶב תַּעֲבֹ֣ר
    בָּ/אָ֔רֶץ וְ/הִכְרַתִּ֥י מִמֶּ֖/נָּה אָדָ֥ם וּ/בְהֵמָֽה־׃
translation:
  text: Or if I bring a sword against that land and say, ‘Let the sword pass through
    the land,’ and I cut off from it man and beast,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'man and beast,' a stock expression for the removal of both human
      and animal life from the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: א֛וֹ
  chosen: Or if
  alternatives:
  - Or
  lexicon: HALOT
  rationale: Introduces another conditional case in the sequence of judgments in this
    passage. English 'Or if' makes the conditional force explicit and natural in context.
- source_word: חֶ֥רֶב
  chosen: a sword
  alternatives:
  - the sword
  lexicon: HALOT
  rationale: Here 'sword' is a common prophetic metonym for war or violent judgment.
    The first occurrence is indefinite in Hebrew sense, so 'a sword' is appropriate
    when introducing the calamity.
- source_word: אָבִ֖יא
  chosen: I bring
  alternatives:
  - I cause to come
  - I bring in
  lexicon: HALOT
  rationale: Hiphil of בוא means 'bring' or 'cause to come.' 'I bring' is concise,
    natural English and preserves divine agency.
- source_word: עַל הָאָרֶץ הַהִיא
  chosen: against that land
  alternatives:
  - upon that land
  - on that land
  lexicon: HALOT
  rationale: עַל with a judgment object often carries adversative force in context;
    'against' communicates hostile judgment more clearly than the more spatial 'upon.'
- source_word: וְאָמַרְתִּי
  chosen: and say
  alternatives:
  - and I say
  - and I declare
  lexicon: HALOT
  rationale: Converted perfect in narrative-prophetic sequence is well represented
    by English present/future-like 'and say' after the conditional protasis. It keeps
    the immediacy of divine decree.
- source_word: חֶרֶב תַּעֲבֹר בָּאָרֶץ
  chosen: Let the sword pass through the land
  alternatives:
  - May the sword pass through the land
  - The sword shall pass through the land
  lexicon: HALOT
  rationale: The clause expresses a divine command/decree. 'Let the sword pass through
    the land' captures the jussive-like force in idiomatic English while preserving
    the imagery of sweeping devastation.
- source_word: וְהִכְרַתִּי
  chosen: and I cut off
  alternatives:
  - and I wipe out
  - and I destroy
  lexicon: HALOT
  rationale: כרת in this judgment formula often means 'cut off' in the sense of removing
    or exterminating. 'Cut off' preserves the covenant-judgment idiom better than
    a flatter dynamic equivalent.
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - from her
  - out of it
  lexicon: HALOT
  rationale: Refers back to the feminine noun 'land.' English normally uses 'it' for
    land rather than 'her' in this context.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man' or 'humankind' by context. In the
    fixed judgment pair 'man and beast,' 'man' is the most natural and traditional
    English equivalent, representing human inhabitants generally.
- source_word: וּבְהֵמָה
  chosen: and beast
  alternatives:
  - and animals
  - and livestock
  lexicon: HALOT
  rationale: In the recurring biblical phrase 'man and beast,' 'beast' preserves the
    formal pairing and broad reference to animal life better than the narrower 'livestock'.
