theological_decisions:
- issue: Metaphor of divine action toward Israel's inner life
  chosen_reading: so that I may seize the house of Israel by their heart
  alternative_readings:
  - so that I may take hold of the house of Israel in their hearts
  - so that I may capture the house of Israel by means of their hearts
  rationale: The Hebrew is compact and somewhat idiomatic. The translation preserves
    the metaphor of God forcefully laying hold of Israel at the level of the heart,
    without softening it into mere persuasion or importing later theological categories.
    This keeps the judicial and covenantal force of the context.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it'
- issue: Nature of Israel's apostasy
  chosen_reading: have turned away from me through their idols
  alternative_readings:
  - have become estranged from me by their idols
  rationale: The verse describes covenantal alienation caused by idolatry. 'Turned
    away' is clearer in modern English, while the alternative 'estranged' is preserved
    in a footnote because it captures the passive/resultative nuance of the Niphal.
  doctrine_reference: 'Translation philosophy #6, readable modern English, not archaic
    or academic'
