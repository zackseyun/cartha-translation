id: EZK.14.5
reference: Ezekiel 14:5
source:
  edition: WLC
  text: לְמַ֛עַן תְּפֹ֥שׂ אֶת בֵּֽית יִשְׂרָאֵ֖ל בְּ/לִבָּ֑/ם אֲשֶׁ֤ר נָזֹ֨רוּ֙ מֵֽ/עָלַ֔/י
    בְּ/גִלּֽוּלֵי/הֶ֖ם כֻּלָּֽ/ם־־׃ס
translation:
  text: so that I may seize the house of Israel by their heart, because all of them
    have turned away from me through their idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “in their heart” or “through their heart.” The Hebrew expression is
      difficult and may indicate the sphere or means by which the LORD takes hold
      of Israel.
    reason: lexical_alternative
  - marker: b
    text: Or, “have become estranged from me by their idols.”
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - to the end that
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: תְּפֹשׂ
  chosen: I may seize
  alternatives:
  - I may catch
  - I may take hold of
  lexicon: HALOT
  rationale: From תפשׂ, 'to seize/catch.' 'Seize' preserves the forceful metaphor
    of God taking hold of Israel. The first-person sense is supplied from the surrounding
    divine speech context.
- source_word: אֶת בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retains the covenantal corporate expression rather than flattening it
    to simply 'Israel.'
- source_word: בְּלִבָּם
  chosen: by their heart
  alternatives:
  - in their heart
  - through their heart
  - in their hearts
  lexicon: HALOT
  rationale: The preposition ב with 'heart' is difficult here. 'By their heart' best
    preserves the instrumental/sphere nuance and the singular collective noun with
    3mp suffix. It conveys that the point of seizure is the inner person, not merely
    external action.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - who
  - in that
  - inasmuch as
  lexicon: HALOT
  rationale: Here the relative particle introduces the reason or circumstance explaining
    the judgment. 'Because' communicates the sense clearly in English.
- source_word: נָזֹרוּ
  chosen: have turned away
  alternatives:
  - are estranged
  - have withdrawn themselves
  - have become alienated
  lexicon: HALOT
  rationale: From זור in the Niphal, conveying estrangement or turning aside. 'Have
    turned away' is idiomatic and clear, while still reflecting covenantal alienation.
- source_word: מֵעָלַי
  chosen: from me
  alternatives:
  - away from me
  - from following me
  lexicon: HALOT
  rationale: The preposition marks separation from the LORD. 'From me' is concise;
    the prior verb already carries the 'away' sense.
- source_word: בְּגִלּוּלֵיהֶם
  chosen: through their idols
  alternatives:
  - by their idols
  - with their idols
  - because of their idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is Ezekiel's contemptuous term for idols. 'Through their
    idols' reflects the instrumental use of ב, indicating the means or occasion of
    their estrangement.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all of them alike
  - every one of them
  lexicon: HALOT
  rationale: Emphasizes the totality of Israel's estrangement; retained explicitly
    for force.
