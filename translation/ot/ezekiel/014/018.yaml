theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - 'Lord GOD with footnoted ''Hebrew: Adonai YHWH'''
  rationale: The doctrine default is יְהוָה → 'the LORD.' In the compound אֲדֹנָי
    יְהוִה, however, a literal 'Lord LORD' is intolerable in English. 'the Lord GOD'
    is the standard contextual rendering that preserves reverence and readability
    without importing extra theology.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)'
- issue: Scope of deliverance
  chosen_reading: deliver/delivered
  alternative_readings:
  - save/saved
  - rescue/rescued
  rationale: The verse concerns temporal preservation from judgment in context, not
    explicitly eternal salvation. 'Deliver' preserves the seriousness of divine judgment
    while avoiding doctrinal overreading into soteriology.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1, #3'
