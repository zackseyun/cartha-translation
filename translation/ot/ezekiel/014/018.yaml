id: EZK.14.18
reference: Ezekiel 14:18
source:
  edition: WLC
  text: וּ/שְׁלֹ֨שֶׁת הָ/אֲנָשִׁ֣ים הָ/אֵלֶּה֮ בְּ/תוֹכָ/הּ֒ חַי אָ֗נִי נְאֻם֙ אֲדֹנָ֣/י
    יְהוִ֔ה לֹ֥א יַצִּ֖ילוּ בָּנִ֣ים וּ/בָנ֑וֹת כִּ֛י הֵ֥ם לְ/בַדָּ֖/ם יִנָּצֵֽלוּ־׃
translation:
  text: And if these three men were in its midst, as I live, declares the Lord GOD,
    they would not deliver sons or daughters; they alone would be delivered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons and daughters.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'would not save' ... 'they alone would be saved'; the Hebrew verb can
      mean 'deliver,' 'rescue,' or 'save,' but here refers to escape from judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁלֹשֶׁת
  chosen: And if these three
  alternatives:
  - And these three
  - Even if these three
  lexicon: HALOT
  rationale: The conjunction ו here links with the repeated hypothetical pattern in
    the surrounding verses (vv. 14, 16, 18, 20). In English, 'And if' best brings
    out the implied conditional force in context, even though the particle 'if' is
    not separately expressed in this verse.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  chosen: men
  alternatives:
  - persons
  - people
  lexicon: HALOT
  rationale: אֲנָשִׁים is the ordinary masculine plural 'men.' Per gender-accurate
    philosophy, 'men' is preferable to a gender-neutral substitute, especially since
    the referents are the named male exemplars Noah, Daniel, and Job in context.
- source_word: בְּתוֹכָהּ
  chosen: in its midst
  alternatives:
  - in it
  - within it
  lexicon: HALOT
  rationale: The phrase literally means 'in its midst,' referring to the land/city
    under judgment in the surrounding context. 'In its midst' preserves the concrete
    Hebrew idiom while remaining natural English.
- source_word: חַי אָנִי
  chosen: as I live
  alternatives:
  - surely as I live
  - by my life
  lexicon: HALOT
  rationale: This is the standard divine oath formula. 'As I live' is the clearest
    idiomatic English equivalent and preserves the solemnity of the oath.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula best rendered 'declares.' אֲדֹנָי
    יְהוִה is conventionally 'Lord GOD' in English; this also follows the doctrine
    default of rendering יְהוָה as 'the LORD,' though in this compound title 'Lord
    GOD' is the established natural equivalent.
- source_word: יְהוִה
  chosen: GOD
  alternatives:
  - the LORD
  - Yahweh
  lexicon: HALOT
  rationale: Within the fixed compound אֲדֹנָי יְהוִה, English convention uses 'Lord
    GOD' to avoid 'Lord LORD.' This is a contextual exception to the default 'the
    LORD,' documented here.
- source_word: לֹא יַצִּילוּ
  chosen: they would not deliver
  alternatives:
  - they would not save
  - they would not rescue
  lexicon: HALOT
  rationale: The Hiphil of נצל means 'deliver, rescue.' 'Deliver' fits the repeated
    wording in this passage and preserves the judicial-salvific nuance without overinterpreting
    it as eternal salvation.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons or daughters
  alternatives:
  - children
  - sons and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes. 'Sons or daughters' is idiomatic
    after a negated verb in English and preserves the gendered pair better than the
    generic 'children.'
- source_word: כִּי
  chosen: they alone
  alternatives:
  - but they alone
  - for they alone
  lexicon: HALOT
  rationale: 'כִּי here introduces the emphatic contrast/result: only the three righteous
    men themselves would escape. English can convey this naturally by fronting ''they
    alone'' without a wooden ''for.'''
- source_word: לְבַדָּם
  chosen: alone
  alternatives:
  - by themselves
  - only
  lexicon: HALOT
  rationale: 'The term emphasizes exclusivity. ''Alone'' is concise and works well
    with the pronoun for emphasis: ''they alone.'''
- source_word: יִנָּצֵלוּ
  chosen: would be delivered
  alternatives:
  - would escape
  - would be rescued
  lexicon: HALOT
  rationale: The Niphal of נצל is the passive/reflexive counterpart to the earlier
    Hiphil. Rendering both with 'deliver/delivered' preserves the lexical connection
    in Hebrew across the clause.
