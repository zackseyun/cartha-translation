id: EZK.14.12
reference: Ezekiel 14:12
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential introduction. In English, the idiom is best carried by beginning with 'And' and expressing the event through 'came' with the following subject, rather than the wooden 'it happened.' This preserves the discourse flow without archaic phrasing.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In prophetic formulae, דָּבָר commonly denotes the divine word/message. 'The word' preserves the established prophetic idiom and the text's formal register better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus 1cs suffix straightforwardly indicates direction toward the prophet. 'To me' is accurate and natural modern English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive construct introduces the forthcoming divine speech. 'Saying' is the standard and sufficiently transparent rendering in English prophetic discourse.
