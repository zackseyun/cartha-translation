id: EZK.14.16
reference: Ezekiel 14:16
source:
  edition: WLC
  text: שְׁלֹ֨שֶׁת הָ/אֲנָשִׁ֣ים הָ/אֵלֶּה֮ בְּ/תוֹכָ/הּ֒ חַי אָ֗נִי נְאֻם֙ אֲדֹנָ֣/י
    יְהוִ֔ה אִם בָּנִ֥ים וְ/אִם בָּנ֖וֹת יַצִּ֑ילוּ הֵ֤מָּה לְ/בַדָּ/ם֙ יִנָּצֵ֔לוּ
    וְ/הָ/אָ֖רֶץ תִּהְיֶ֥ה שְׁמָמָֽה־־־׃
translation:
  text: Even if these three men were in its midst, as I live, declares the Lord GOD,
    they would deliver neither sons nor daughters; they alone would be delivered,
    and the land would become a desolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''if sons and if daughters they would deliver''—an idiom in this
      oath context meaning they would deliver neither sons nor daughters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים הָאֵלֶּה
  chosen: these three men
  alternatives:
  - these three persons
  - these three men here
  lexicon: HALOT
  rationale: Formal rendering of the demonstrative phrase. 'Men' matches אֲנָשִׁים
    and follows the gender-accurate policy; the context refers to exemplary male figures
    named in the surrounding passage.
- source_word: בְּתוֹכָהּ
  chosen: in its midst
  alternatives:
  - within it
  - in the middle of it
  lexicon: HALOT
  rationale: Retains the idiomatic Hebrew sense of being present within the land/city
    under judgment. 'Its' refers back to the land/city context.
- source_word: חַי אָנִי
  chosen: as I live
  alternatives:
  - by my life
  - I live
  lexicon: HALOT
  rationale: Standard oath formula in prophetic speech. 'As I live' is natural English
    and preserves the solemn self-oath.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula best rendered 'declares.' Following
    doctrine, יְהוָה is rendered 'the LORD.' 'GOD' in small caps-like convention reflects
    אֲדֹנָי יְהוִה and avoids 'Lord LORD' in English.
- source_word: אִם בָּנִים וְאִם בָּנוֹת יַצִּילוּ
  chosen: they would deliver neither sons nor daughters
  alternatives:
  - they would save neither sons nor daughters
  - whether sons or daughters, they would not deliver them
  lexicon: HALOT
  rationale: 'The conditional particle אִם here functions idiomatically in an oath
    context to deny the possibility: they would not rescue even sons or daughters.
    ''Deliver'' fits נצל in judgment contexts and keeps consistency with the following
    passive form.'
- source_word: הֵמָּה לְבַדָּם יִנָּצֵלוּ
  chosen: they alone would be delivered
  alternatives:
  - they alone would escape
  - only they would be rescued
  lexicon: HALOT
  rationale: The emphatic pronoun plus לְבַדָּם stresses exclusivity. Passive 'would
    be delivered' mirrors the Niphal and maintains lexical linkage with the previous
    clause.
- source_word: וְהָאָרֶץ תִּהְיֶה שְׁמָמָה
  chosen: and the land would become a desolation
  alternatives:
  - and the land would be desolate
  - while the land would become desolate
  lexicon: HALOT
  rationale: שְׁמָמָה denotes desolation/wasteland condition under judgment. 'Become
    a desolation' preserves the nominal force and the resultative sense of תִּהְיֶה.
