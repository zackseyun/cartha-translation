theological_decisions:
- issue: Rendering the divine name יְהוָה in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' In the compound title with
    אֲדֹנָי, English convention uses 'Lord GOD' to avoid awkward repetition while
    still signaling the underlying divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implication of individual righteousness not extending to children
  chosen_reading: the three righteous men could not deliver even their own sons or
    daughters, only themselves
  alternative_readings:
  - the phrase refers only to unspecified children in general
  rationale: The verse emphasizes the limits of representative deliverance under divine
    judgment. The translation preserves the stark individual accountability without
    importing broader doctrinal conclusions beyond the immediate judgment oracle.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
