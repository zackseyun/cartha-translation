id: EZK.14.11
reference: Ezekiel 14:11
source:
  edition: WLC
  text: לְ֠מַעַן לֹֽא יִתְע֨וּ ע֤וֹד בֵּֽית יִשְׂרָאֵל֙ מֵ/אַֽחֲרַ֔/י וְ/לֹֽא יִטַּמְּא֥וּ ע֖וֹד בְּ/כָל פִּשְׁעֵי/הֶ֑ם וְ/הָ֥יוּ לִ֣/י לְ/עָ֗ם וַֽ/אֲנִי֙ אֶהְיֶ֤ה לָ/הֶם֙ לֵֽ/אלֹהִ֔ים נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־־־׃פ
translation:
  text: so that the house of Israel may no longer go astray from me, and may no longer defile themselves with all their transgressions, but may be my people, and I may be their God, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'go astray from me.' The Hebrew literally says 'wander from after me,' an idiom for turning away from following the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - to the end that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves the purposive force.
- source_word: יִתְעוּ
  chosen: may ... wander
  alternatives:
  - go astray
  - err
  lexicon: HALOT
  rationale: From תעה, 'to wander/go astray.' 'Wander' fits the imagery and works smoothly with the following phrase 'from following me,' preserving both literal and covenantal sense.
- source_word: מֵאַחֲרַי
  chosen: from following me
  alternatives:
  - from after me
  - away from me
  lexicon: HALOT
  rationale: Literally 'from after me.' In English, 'from following me' best conveys covenantal loyalty imagery without awkwardness.
- source_word: יִטַּמְּאוּ
  chosen: may ... defile themselves
  alternatives:
  - become unclean
  - make themselves unclean
  lexicon: HALOT
  rationale: The hitpael/reflexive sense is important. 'Defile themselves' clearly expresses self-incurred impurity, both moral and cultic.
- source_word: בְּכָל פִּשְׁעֵיהֶם
  chosen: with all their transgressions
  alternatives:
  - by all their rebellions
  - through all their offenses
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion/transgression. 'Transgressions' is clear and suitably weighty; 'with' reflects the beth instrumentally/associatively in context of defilement.
- source_word: וְהָיוּ לִי לְעָם
  chosen: may be my people
  alternatives:
  - shall be my people
  - become a people to me
  lexicon: HALOT
  rationale: This is covenant formula language. 'May be my people' matches the preceding purpose sequence and keeps the relational covenant sense.
- source_word: וַאֲנִי אֶהְיֶה לָהֶם לֵאלֹהִים
  chosen: and I may be their God
  alternatives:
  - and I will be their God
  lexicon: HALOT
  rationale: Also covenant formula language. Because the verse is governed by לְמַעַן and coordinated purpose clauses, 'may be' preserves the purposive nuance better than a simple future, while still echoing the standard covenant expression.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. 'Declares' is idiomatic in English prophetic style. Per doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, 'Lord GOD' is the conventional way to avoid 'Lord LORD' while preserving both titles.
