theological_decisions:
- issue: Rendering the covenant formula
  chosen_reading: my people ... their God
  alternative_readings:
  - a people to me ... God to them
  rationale: The Hebrew uses the standard covenant relationship formula. Rendering it in familiar covenantal English preserves the theological resonance without adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering the divine name יְהוָה in the title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
