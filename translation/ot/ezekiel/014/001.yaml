id: EZK.14.1
reference: Ezekiel 14:1
source:
  edition: WLC
  text: וַ/יָּב֤וֹא אֵלַ/י֙ אֲנָשִׁ֔ים מִ/זִּקְנֵ֖י יִשְׂרָאֵ֑ל וַ/יֵּשְׁב֖וּ לְ/פָנָֽ/י׃פ
translation:
  text: Then men from the elders of Israel came to me and sat before me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some of the elders of Israel came to me,' since the Hebrew expression
      can indicate men drawn from among the elders rather than the whole body.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - came in
  - approached
  lexicon: HALOT
  rationale: Though morphologically singular, the verb precedes a plural subject (אֲנָשִׁים),
    a common Hebrew construction. English requires plural agreement, so 'came' is
    used. 'Then' reflects the narrative waw.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: Standard directional sense of אֶל with 1cs suffix; 'to me' is the most
    natural English rendering.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - some men
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred by project philosophy. The Hebrew
    specifically denotes men, not a mixed or unspecified group.
- source_word: מִזִּקְנֵי יִשְׂרָאֵל
  chosen: from the elders of Israel
  alternatives:
  - some of the elders of Israel
  - from among the elders of Israel
  lexicon: HALOT
  rationale: The מן construction indicates source/selection from a larger group. 'From
    the elders of Israel' is concise and natural, while preserving that these men
    belonged to that body rather than exhausting it.
- source_word: וַיֵּשְׁבוּ
  chosen: sat
  alternatives:
  - took their seats
  - remained seated
  lexicon: HALOT
  rationale: Basic narrative sense of ישׁב in context is physical sitting. 'Sat' is
    direct and sufficiently formal without overinterpreting posture as prolonged residence.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in front of me
  - in my presence
  lexicon: HALOT
  rationale: '''Before me'' preserves the idiomatic Hebrew sense of being in someone''s
    presence and fits prophetic audience language well.'
