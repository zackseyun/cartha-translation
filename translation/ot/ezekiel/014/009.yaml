theological_decisions:
- issue: Divine agency in the prophet's deception
  chosen_reading: Retain the direct statement 'I, the LORD, have deceived that prophet'
    in the main text.
  alternative_readings:
  - I have allowed that prophet to be deceived
  - I have enticed that prophet
  rationale: The Hebrew explicitly attributes the action to the LORD using the same
    verbal root as the prophet's deception. In keeping with the translation philosophy,
    the rendering preserves the theological tension rather than resolving it by paraphrase.
    Because readers may understand the verb with different nuances in context, an
    alternative is preserved in a footnote rather than imported into the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for יְהוָה
