id: EZK.14.9
reference: Ezekiel 14:9
source:
  edition: WLC
  text: וְ/הַ/נָּבִ֤יא כִֽי יְפֻתֶּה֙ וְ/דִבֶּ֣ר דָּבָ֔ר אֲנִ֤י יְהוָה֙ פִּתֵּ֔יתִי
    אֵ֖ת הַ/נָּבִ֣יא הַ/ה֑וּא וְ/נָטִ֤יתִי אֶת יָדִ/י֙ עָלָ֔י/ו וְ/הִ֨שְׁמַדְתִּ֔י/ו
    מִ/תּ֖וֹךְ עַמִּ֥/י יִשְׂרָאֵֽל־־׃
translation:
  text: And if the prophet is deceived and speaks a word, I, the LORD, have deceived
    that prophet; and I will stretch out my hand against him and destroy him from
    the midst of my people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have enticed that prophet'; some understand the sense more permissively
      as 'have allowed that prophet to be deceived.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְפֻתֶּה
  chosen: is deceived
  alternatives:
  - is enticed
  - is persuaded
  lexicon: HALOT
  rationale: The Pual form of פתה is passive, indicating that the prophet comes under
    deception/enticement. 'Is deceived' is the clearest modern English rendering and
    matches the judicial context better than the softer 'is persuaded.'
- source_word: וְדִבֶּר דָּבָר
  chosen: and speaks a word
  alternatives:
  - and speaks a message
  - and utters a word
  lexicon: HALOT
  rationale: The Hebrew is literally 'and speaks a word.' Retaining 'word' preserves
    the terseness and prophetic diction of the source, while still reading naturally
    in English.
- source_word: אֲנִי יְהוָה
  chosen: I, the LORD
  alternatives:
  - I, Yahweh
  lexicon: HALOT
  rationale: The explicit pronoun plus divine name is emphatic. 'I, the LORD' preserves
    the emphasis and follows the project's default rendering of YHWH as 'the LORD.'
- source_word: פִּתֵּיתִי
  chosen: have deceived
  alternatives:
  - have enticed
  - have allowed to be deceived
  lexicon: HALOT
  rationale: 'The verb is the same root פתה, here in the Piel with first-person subject.
    The plain sense is causative: ''I have deceived/enticed.'' To preserve the theological
    tension rather than soften it, the main text keeps the direct wording. ''Have
    allowed to be deceived'' is interpretive and goes beyond the explicit Hebrew.'
- source_word: וְנָטִיתִי אֶת יָדִי עָלָיו
  chosen: and I will stretch out my hand against him
  alternatives:
  - and I will extend my hand against him
  lexicon: HALOT
  rationale: This is a common idiom for divine action in judgment. 'Stretch out my
    hand against him' is both literal and idiomatic in English, preserving the biblical
    imagery.
- source_word: וְהִשְׁמַדְתִּיו
  chosen: and destroy him
  alternatives:
  - and annihilate him
  - and wipe him out
  lexicon: HALOT
  rationale: The Hiphil of שׁמד denotes destruction/extermination. 'Destroy him' is
    strong without becoming colloquial or overstated.
- source_word: מִתּוֹךְ עַמִּי יִשְׂרָאֵל
  chosen: from the midst of my people Israel
  alternatives:
  - from among my people Israel
  lexicon: HALOT
  rationale: '''From the midst of'' closely reflects the Hebrew while remaining understandable.
    It conveys removal from within the covenant community.'
