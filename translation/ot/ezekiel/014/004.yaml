theological_decisions:
- issue: Rendering the divine name יְהוָה within אֲדֹנָי יְהוִה and again in אֲנִי
    יְהוָה
  chosen_reading: the LORD / Lord GOD
  alternative_readings:
  - Yahweh
  - Jehovah
  - Lord Yahweh
  rationale: Per doctrine, YHWH is rendered 'the LORD.' In the compound title אֲדֹנָי
    יְהוִה, English convention distinguishes the second element as 'GOD' to avoid
    'Lord LORD' while still signaling the divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered representative language in אִישׁ אִישׁ
  chosen_reading: Any man
  alternative_readings:
  - Anyone
  - Each person
  - Every one
  rationale: The Hebrew is grammatically masculine singular used distributively. Following
    the gender-accurate policy, the translation preserves 'man' rather than neutralizing
    to 'person,' while the sense remains representative of any individual Israelite
    male in the wording of the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of divine response clause נַעֲנֵיתִי לוֹ בָהּ בְּרֹב גִּלּוּלָיו
  chosen_reading: I, the LORD, will answer him in accordance with the multitude of
    his idols
  alternative_readings:
  - I, the LORD, have answered him by it according to the multitude of his idols
  - I, the LORD, will let myself be consulted by him despite the multitude of his
    idols
  rationale: 'The Hebrew clause is syntactically difficult, especially בָהּ. The chosen
    rendering preserves the dominant contextual sense: God''s answer corresponds judicially
    to the man''s idolatry. This avoids softening the warning while not overcommitting
    to a highly obscure literalism.'
