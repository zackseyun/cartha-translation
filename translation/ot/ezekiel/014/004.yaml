id: EZK.14.4
reference: Ezekiel 14:4
source:
  edition: WLC
  text: לָ/כֵ֣ן דַּבֵּר א֠וֹתָ/ם וְ/אָמַרְתָּ֨ אֲלֵי/הֶ֜ם כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה
    אִ֣ישׁ אִ֣ישׁ מִ/בֵּ֣ית יִשְׂרָאֵ֡ל אֲשֶׁר֩ יַעֲלֶ֨ה אֶת גִּלּוּלָ֜י/ו אֶל לִבּ֗/וֹ
    וּ/מִכְשׁ֤וֹל עֲוֺנ/וֹ֙ יָשִׂים֙ נֹ֣כַח פָּנָ֔י/ו וּ/בָ֖א אֶל הַ/נָּבִ֑יא אֲנִ֣י
    יְהוָ֗ה נַעֲנֵ֧יתִי ל֦/וֹ ב/ה בְּ/רֹ֥ב גִּלּוּלָֽי/ו־־׀־־־׃
translation:
  text: 'Therefore speak to them and say to them, ‘Thus says the Lord GOD: Any man
    of the house of Israel who brings up his idols into his heart, and sets the stumbling
    block of his iniquity before his face, and then comes to the prophet—I, the LORD,
    will answer him in accordance with the multitude of his idols.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Any man, any man,' a distributive expression meaning 'each' or 'every'
      man.
    reason: lexical_alternative
  - marker: b
    text: Or 'raises his idols into his heart.' The Hebrew vividly pictures inwardly
      enthroning idols.
    reason: lexical_alternative
  - marker: c
    text: The clause 'I, the LORD, will answer him in accordance with the multitude
      of his idols' is difficult in Hebrew; alternatives include 'by it' or 'through
      it' instead of 'in accordance with.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding context; 'Therefore'
    preserves the formal logical connection in natural English.
- source_word: דַּבֵּר ... וְאָמַרְתָּ אֲלֵיהֶם
  chosen: speak to them and say to them
  alternatives:
  - speak with them and tell them
  lexicon: HALOT
  rationale: Retains the Hebrew verbal pairing for emphasis rather than collapsing
    it into a single English verb.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  chosen: Thus says the Lord GOD
  alternatives:
  - This is what the Lord GOD says
  - Thus says the Lord Yahweh
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Lord GOD' reflects אֲדֹנָי יְהוִה, with
    YHWH rendered according to doctrine as 'the LORD.' Small caps cannot be represented
    in the tool payload, so 'GOD' is used to distinguish the divine name in this compound
    title.
- source_word: אִישׁ אִישׁ
  chosen: Any man
  alternatives:
  - Each man
  - Every man
  lexicon: HALOT
  rationale: The distributive repetition means 'each/every individual.' 'Any man'
    is idiomatic and preserves the masculine singular representative force in line
    with the gender-accurate policy.
- source_word: מִבֵּית יִשְׂרָאֵל
  chosen: of the house of Israel
  alternatives:
  - from the house of Israel
  - among the house of Israel
  lexicon: HALOT
  rationale: A covenantal/familial expression best preserved with 'house of Israel'
    rather than flattened to merely 'Israelite.'
- source_word: יַעֲלֶה אֶת גִּלּוּלָיו אֶל לִבּוֹ
  chosen: brings up his idols into his heart
  alternatives:
  - raises his idols into his heart
  - takes his idols into his heart
  lexicon: HALOT
  rationale: The Hiphil of עלה literally suggests causing to go up. 'Brings up ...
    into his heart' preserves the vivid metaphor of inward enthronement of idols better
    than a more interpretive paraphrase.
- source_word: גִּלּוּלָיו
  chosen: his idols
  alternatives:
  - his filthy idols
  lexicon: HALOT
  rationale: Though the Hebrew term is pejorative, 'idols' is the clearest core sense
    in English. The contemptuous nuance is real but not easily carried without overtranslation.
- source_word: וּמִכְשׁוֹל עֲוֺנוֹ
  chosen: the stumbling block of his iniquity
  alternatives:
  - the stumbling block of his guilt
  - the obstacle of his sin
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the metaphor and moral weight. 'Iniquity'
    better matches עָוֹן than the broader 'sin' here.
- source_word: יָשִׂים נֹכַח פָּנָיו
  chosen: sets ... before his face
  alternatives:
  - places ... in front of himself
  - sets ... before himself
  lexicon: HALOT
  rationale: Keeps the concrete imagery of deliberate placement directly before oneself.
- source_word: וּבָא אֶל הַנָּבִיא
  chosen: and then comes to the prophet
  alternatives:
  - and comes to the prophet
  lexicon: HALOT
  rationale: 'The sequence implies hypocrisy: after inwardly embracing idolatry, he
    nevertheless comes to consult the prophet. ''Then'' makes the progression explicit
    without adding new content.'
- source_word: אֲנִי יְהוָה
  chosen: I, the LORD,
  alternatives:
  - I am the LORD
  lexicon: HALOT
  rationale: Here the pronoun plus divine name functions emphatically before the verb
    of response. 'I, the LORD,' preserves the emphasis better than reading it as a
    simple copular clause.
- source_word: נַעֲנֵיתִי לוֹ
  chosen: will answer him
  alternatives:
  - have answered him
  - am answering him
  lexicon: HALOT
  rationale: Though the form is morphologically perfect/passive-reflexive in appearance,
    in context it functions as a divine declaration of response. English future best
    fits the prophetic legal pronouncement in context.
- source_word: בָּהּ
  chosen: in accordance with
  alternatives:
  - by it
  - through it
  - in it
  lexicon: HALOT
  rationale: The preposition with feminine suffix is difficult and elliptical. In
    context it points to the manner/measure of God's answer, clarified by the following
    phrase. 'In accordance with' communicates the sense without forcing an opaque
    literalism.
- source_word: בְּרֹב גִּלּוּלָיו
  chosen: the multitude of his idols
  alternatives:
  - the abundance of his idols
  - his many idols
  lexicon: HALOT
  rationale: רֹב denotes abundance/multitude. 'The multitude of his idols' preserves
    the formal weight and explains the measure according to which the answer comes.
