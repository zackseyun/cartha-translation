theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identification of דנאל
  chosen_reading: Daniel
  alternative_readings:
  - Danel
  rationale: The Hebrew spelling without yod has led some to identify the figure with the ancient righteous hero Danel known from Ugaritic literature rather than the biblical Daniel. Since the text itself simply gives the name and English Bible convention strongly recognizes 'Daniel,' the main text uses 'Daniel' while preserving 'Danel' in a footnote as an alternative identification.
  doctrine_reference: 'DOCTRINE.md Translation philosophy 3: preserve theological tension rather than resolve it'
