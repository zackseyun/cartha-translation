id: EZK.14.14
reference: Ezekiel 14:14
source:
  edition: WLC
  text: וְ֠/הָיוּ שְׁלֹ֨שֶׁת הָ/אֲנָשִׁ֤ים הָ/אֵ֨לֶּה֙ בְּ/תוֹכָ֔/הּ נֹ֖חַ דנאל וְ/אִיּ֑וֹב הֵ֤מָּה בְ/צִדְקָתָ/ם֙ יְנַצְּל֣וּ נַפְשָׁ֔/ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה׃
translation:
  text: even if these three men were in its midst—Noah, Daniel, and Job—they would deliver only themselves by their righteousness, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew דנאל may also be rendered 'Danel'; some understand this as the ancient Near Eastern figure Danel rather than the biblical Daniel.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיוּ
  chosen: even if ... were
  alternatives:
  - and were
  - if ... were
  lexicon: HALOT
  rationale: 'Though formally ''and they were,'' in context within a conditional/judgment oracle the waw + qatal carries a concessive/conditional sense: ''even if ... were.'' This best reflects the discourse flow from the surrounding verses without woodenly preserving the conjunction.'
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים הָאֵלֶּה
  chosen: these three men
  alternatives:
  - these three persons
  lexicon: HALOT
  rationale: אָדָם/אִישׁ here is represented by אֲנָשִׁים, plainly 'men.' Per gender-accurate policy, 'men' is retained rather than a neutral substitute.
- source_word: בְּתוֹכָהּ
  chosen: in its midst
  alternatives:
  - in the midst of it
  - within it
  lexicon: HALOT
  rationale: The feminine singular suffix refers to the land/city under judgment in context. 'In its midst' is idiomatic modern English while preserving the locative force.
- source_word: נֹחַ
  chosen: Noah
  rationale: Standard English transliteration of the personal name.
- source_word: דנאל
  chosen: Daniel
  alternatives:
  - Danel
  rationale: Standard English biblical transliteration is 'Daniel.' The consonantal spelling here lacks yod and has prompted discussion of 'Danel,' but in Ezekiel the traditional identification with Daniel is the most natural English rendering; the alternative is preserved in a footnote for auditability.
- source_word: וְאִיּוֹב
  chosen: and Job
  rationale: Standard English transliteration of the personal name with conjunction preserved.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. English can convey this adequately through sentence structure; explicit 'themselves' is not required here because the following 'only themselves' captures the exclusivity.
- source_word: בְצִדְקָתָם
  chosen: by their righteousness
  alternatives:
  - through their righteousness
  - by their justice
  lexicon: HALOT
  rationale: צְדָקָה commonly denotes righteousness; 'justice' is possible in some contexts, but here personal uprightness is in view. 'By' expresses instrumental means naturally in English.
- source_word: יְנַצְּלוּ
  chosen: would deliver
  alternatives:
  - would rescue
  - would save
  lexicon: HALOT
  rationale: נצל means to snatch away, rescue, deliver. 'Deliver' fits prophetic judgment language and avoids importing soteriological overtones that 'save' might suggest.
- source_word: נַפְשָׁם
  chosen: only themselves
  alternatives:
  - their lives
  - their own lives
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the persons/lives of the three men. In context the point is that they could rescue no one but themselves, so 'only themselves' makes the exclusivity explicit and idiomatic; 'their own lives' is possible but slightly less direct.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic formula 'declares/oracle of.' 'Declares' is idiomatic in running English. Following doctrine, יְהוָה is rendered 'the LORD'; with אֲדֹנָי preceding, the conventional English representation is 'Lord GOD' to avoid 'Lord LORD' while signaling the divine name.
