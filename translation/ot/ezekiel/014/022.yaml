theological_decisions:
- issue: Rendering הָרָעָה with reference to divine judgment
  chosen_reading: disaster
  alternative_readings:
  - calamity
  - evil
  rationale: Because the verse speaks of what God brought upon Jerusalem in judgment,
    the noun refers to calamity rather than moral evil. This avoids suggesting that
    God performed moral evil while preserving the text's assertion of divine agency
    in judgment.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text says without importing doctrinal claims.'
