id: EZK.14.22
reference: Ezekiel 14:22
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה נֽוֹתְרָה בָּ֜/הּ פְּלֵטָ֗ה הַֽ/מּוּצָאִים֮ בָּנִ֣ים וּ/בָנוֹת֒
    הִנָּ/ם֙ יוֹצְאִ֣ים אֲלֵי/כֶ֔ם וּ/רְאִיתֶ֥ם אֶת דַּרְכָּ֖/ם וְ/אֶת עֲלִֽילוֹתָ֑/ם
    וְ/נִחַמְתֶּ֗ם עַל הָֽ/רָעָה֙ אֲשֶׁ֤ר הֵבֵ֨אתִי֙ עַל יְר֣וּשָׁלִַ֔ם אֵ֛ת כָּל
    אֲשֶׁ֥ר הֵבֵ֖אתִי עָלֶֽי/הָ־־־־־־׃
translation:
  text: Yet behold, a remnant will be left in it—those brought out, sons and daughters.
    Behold, they are coming out to you, and you will see their way and their deeds;
    and you will be comforted concerning the disaster that I brought upon Jerusalem,
    all that I brought upon it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an escape will remain in it' or 'survivors will be left in it.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons and daughters'; the text explicitly names both rather than
      using a generic term like 'children.'
    reason: lexical_alternative
  - marker: c
    text: '''Disaster'' here refers to calamity/judgment brought on Jerusalem, not
      moral evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: Yet behold
  alternatives:
  - And behold
  - But behold
  - Look
  lexicon: HALOT
  rationale: Introduces an emphatic turn after the preceding judgment context. 'Yet
    behold' captures both the conjunction's adversative force in context and the deictic
    emphasis of הִנֵּה.
- source_word: נֽוֹתְרָה ... פְּלֵטָה
  chosen: a remnant will be left
  alternatives:
  - an escape will remain
  - survivors will be left
  lexicon: HALOT
  rationale: The combination of יתר/נותר with פְּלֵטָה denotes a surviving remnant
    or escaped group. 'Remnant' preserves the compact Hebrew sense and fits prophetic
    usage, while 'will be left' reflects the passive/resultative nuance.
- source_word: בָּהּ
  chosen: in it
  alternatives:
  - in her
  lexicon: HALOT
  rationale: The pronoun refers to Jerusalem, grammatically feminine. English can
    naturally use 'it' for a city without loss of meaning; this avoids overpersonalizing
    while remaining accurate.
- source_word: הַמּוּצָאִים
  chosen: those brought out
  alternatives:
  - those who are brought out
  - the ones being led out
  lexicon: HALOT
  rationale: 'Hophal participle of יצא is causative-passive: they are caused to go
    out, i.e., brought out. This is more precise than a simple active ''those going
    out'' and distinguishes it from the later active participle.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the explicit Hebrew pair rather than
    flattening to 'children,' in keeping with the translation philosophy.
- source_word: הִנָּם יֹצְאִים אֲלֵיכֶם
  chosen: Behold, they are coming out to you
  alternatives:
  - they are going out to you
  - look, they are coming to you
  lexicon: HALOT
  rationale: The active participle יֹצְאִים describes their movement toward the audience.
    'Coming out to you' is idiomatic in English and preserves both the outward movement
    and the direction toward the hearers.
- source_word: דַּרְכָּם
  chosen: their way
  alternatives:
  - their conduct
  - their path
  lexicon: HALOT
  rationale: דֶּרֶךְ in prophetic moral contexts often means manner of life or conduct.
    'Way' preserves the metaphor and allows the following 'deeds' to specify behavior
    concretely.
- source_word: עֲלִילוֹתָם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: Refers to acts or doings, often with moral coloring. 'Deeds' is concise
    and suitably weighty in prophetic indictment contexts.
- source_word: וְנִחַמְתֶּם
  chosen: you will be comforted
  alternatives:
  - you will be consoled
  - you will relent
  lexicon: HALOT
  rationale: In context the hearers are reassured or consoled when they see the survivors'
    conduct and understand Jerusalem's judgment was warranted. 'Be comforted' best
    fits the Niphal nuance here.
- source_word: עַל הָרָעָה
  chosen: concerning the disaster
  alternatives:
  - about the calamity
  - over the evil
  lexicon: HALOT
  rationale: רָעָה here denotes calamity/disaster brought in judgment, not moral evil.
    'Concerning the disaster' communicates the object of their consolation without
    implying God committed moral evil.
- source_word: הֵבֵאתִי עַל יְרוּשָׁלִַם
  chosen: that I brought upon Jerusalem
  alternatives:
  - that I brought against Jerusalem
  lexicon: HALOT
  rationale: The idiom בוא על commonly means 'bring upon' in judgment contexts. This
    is standard and clear English.
- source_word: אֵת כָּל אֲשֶׁר הֵבֵאתִי עָלֶיהָ
  chosen: all that I brought upon it
  alternatives:
  - everything that I brought upon her
  lexicon: HALOT
  rationale: 'Retains the Hebrew resumptive emphasis: the totality of the judgment
    previously mentioned. ''It'' matches the earlier treatment of Jerusalem as a city.'
