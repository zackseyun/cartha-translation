id: EZK.14.2
reference: Ezekiel 14:2
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew YHWH; traditionally rendered ''the LORD'' in English versions. Alternative:
      ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential
    introduction. In English, the idiomatic sense is best carried by folding it into
    the clause 'And the word ... came' rather than the more wooden 'And it happened,'
    which is less natural and adds no distinct content in this formulaic prophetic
    introduction.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: דבר in the construct phrase דְבַר יְהוָה is the standard prophetic formula
    'the word of YHWH.' 'Word' preserves the established lexical and theological force
    better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following Jewish reverence tradition and longstanding English convention reflecting
    the Hebrew divine name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition אֶל with first person singular suffix straightforwardly
    means 'to me.' 'Unto me' is unnecessarily archaic for the project's modern-English
    aims.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר in direct-speech introduction is idiomatically
    rendered 'saying' in English prophetic narrative. This preserves the formal transition
    to the following divine speech.
