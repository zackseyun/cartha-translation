theological_decisions:
- issue: Rendering of אָדָם in a generic/judgment formula
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The phrase 'man and beast' is a conventional Hebrew judgment expression
    denoting comprehensive devastation of human and animal life. Following the doctrine's
    gender-accurate principle, 'man' best matches the source idiom here without implying
    maleness only.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
