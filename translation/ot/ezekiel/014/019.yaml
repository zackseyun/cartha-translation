id: EZK.14.19
reference: Ezekiel 14:19
source:
  edition: WLC
  text: א֛וֹ דֶּ֥בֶר אֲשַׁלַּ֖ח אֶל הָ/אָ֣רֶץ הַ/הִ֑יא וְ/שָׁפַכְתִּ֨י חֲמָתִ֤/י עָלֶ֨י/הָ֙
    בְּ/דָ֔ם לְ/הַכְרִ֥ית מִמֶּ֖/נָּה אָדָ֥ם וּ/בְהֵמָֽה־׃
translation:
  text: Or if I send a plague against that land and pour out my wrath on it in blood,
    to cut off from it man and beast,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by bloodshed.' The Hebrew reads literally 'in blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  chosen: Or if
  alternatives:
  - Or
  lexicon: HALOT
  rationale: In this sequence of conditional judgments (vv. 13, 15, 17, 19), the conjunction
    introduces another hypothetical case. 'Or if' makes the conditional force clear
    in natural English.
- source_word: דֶּבֶר
  chosen: plague
  alternatives:
  - pestilence
  - disease
  lexicon: HALOT
  rationale: The noun denotes epidemic pestilence sent as divine judgment. 'Plague'
    is clear modern English; 'pestilence' is more traditional but less natural for
    the target audience.
- source_word: אֲשַׁלַּח
  chosen: I send
  alternatives:
  - I send out
  lexicon: HALOT
  rationale: Straightforward rendering of the Piel verb 'send.' No expansion beyond
    the Hebrew is needed.
- source_word: אֶל הָאָרֶץ הַהִיא
  chosen: against that land
  alternatives:
  - to that land
  - upon that land
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' in judgment contexts English idiom
    commonly uses 'against' to convey hostile action directed at the land.
- source_word: וְשָׁפַכְתִּי חֲמָתִי
  chosen: and pour out my wrath
  alternatives:
  - and pour out my fury
  - and pour out my anger
  lexicon: HALOT
  rationale: A standard idiom for divine judgment. 'Wrath' preserves the gravity of
    חֵמָה/חֲמָה better than the flatter 'anger'.
- source_word: עָלֶיהָ
  chosen: on it
  alternatives:
  - upon it
  lexicon: HALOT
  rationale: Refers back to the feminine noun 'land'; English uses neuter 'it' for
    land.
- source_word: בְּדָם
  chosen: in blood
  alternatives:
  - with blood
  - by bloodshed
  lexicon: HALOT
  rationale: The preposition plus 'blood' is terse and vivid. 'In blood' preserves
    the Hebrew image of wrath expressed in bloodshed. 'By bloodshed' is interpretive
    and is preserved as an alternative.
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to wipe out
  - to destroy
  lexicon: HALOT
  rationale: The Hiphil infinitive of כרת in judgment contexts often means to cut
    off/exterminate. 'Cut off' preserves the covenant-judgment resonance better than
    the more generic 'destroy.'
- source_word: מִמֶּנָּה
  chosen: from it
  alternatives:
  - from it completely
  lexicon: HALOT
  rationale: Simple prepositional rendering referring to the land. No intensifying
    adverb is warranted by the Hebrew alone.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man' or 'humankind' by context. Here
    it is paired distributively with 'beast' in a judgment formula, and 'man and beast'
    is the most natural and faithful English equivalent.
- source_word: וּבְהֵמָה
  chosen: and beast
  alternatives:
  - and animals
  - and livestock
  lexicon: HALOT
  rationale: In this stock phrase of total devastation, 'man and beast' is the established
    and accurate rendering. 'Animals' is possible but loses the compact force of the
    Hebrew pairing.
