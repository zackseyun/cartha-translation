theological_decisions:
- issue: Sense of עון in a judgment formula
  chosen_reading: Rendered as 'punishment' rather than 'iniquity' or 'guilt' in the
    main text.
  alternative_readings:
  - And they will bear their guilt; like the guilt of the one who inquires, so will
    be the guilt of the prophet.
  - And they will bear their iniquity; the iniquity of the inquirer shall be like
    the iniquity of the prophet.
  rationale: The Hebrew term עון is semantically broad, but in the idiom 'bear עון'
    within a judicial pronouncement it often refers to suffering the consequence of
    guilt. Using 'punishment' communicates the legal outcome clearly in English while
    preserving the verse's symmetry between inquirer and prophet. The alternatives
    are worth preserving because the Hebrew also retains the moral sense of guilt/iniquity.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented
    exception.'
