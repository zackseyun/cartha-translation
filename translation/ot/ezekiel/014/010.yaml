id: EZK.14.10
reference: Ezekiel 14:10
source:
  edition: WLC
  text: וְ/נָשְׂא֖וּ עֲוֺנָ֑/ם כַּֽ/עֲוֺן֙ הַ/דֹּרֵ֔שׁ כַּ/עֲוֺ֥ן הַ/נָּבִ֖יא יִֽהְיֶֽה׃
translation:
  text: And they will bear their punishment; the punishment of the one who inquires
    will be the same as the punishment of the prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And they will bear their guilt/iniquity; the guilt of the one who inquires
      will be like the guilt of the prophet.' The Hebrew word can refer to iniquity,
      guilt, or the punishment resulting from guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשְׂאוּ
  chosen: And they will bear
  alternatives:
  - and they shall carry
  - and they will bear away
  lexicon: HALOT
  rationale: נשא with עון commonly means to bear guilt or bear punishment for guilt.
    'Bear' preserves the idiom while remaining natural in English.
- source_word: עֲוֺנָם
  chosen: their punishment
  alternatives:
  - their guilt
  - their iniquity
  lexicon: HALOT
  rationale: עון can denote iniquity, guilt, or the punishment resulting from guilt.
    In this judicial context, 'bear their punishment' best conveys the idiomatic sense
    in English without obscuring the consequence aspect.
- source_word: כַּעֲוֺן
  chosen: the punishment ... will be the same as the punishment
  alternatives:
  - like the guilt of
  - according to the iniquity of
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: the fate of one party corresponds to
    that of the other. Rendering with ''will be the same as'' makes the comparison
    explicit and readable in English.'
- source_word: הַדֹּרֵשׁ
  chosen: the one who inquires
  alternatives:
  - the seeker
  - the one who consults
  lexicon: HALOT
  rationale: דרש here refers to the person seeking an oracle or consultation. 'The
    one who inquires' is clear and fits the immediate context of consulting a prophet.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נביא. The context concerns the prophet who gives
    an answer and the inquirer who seeks it.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future/copular sense; 'will be' is natural modern English.
