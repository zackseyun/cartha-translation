id: EZK.14.15
reference: Ezekiel 14:15
source:
  edition: WLC
  text: לֽוּ חַיָּ֥ה רָעָ֛ה אַעֲבִ֥יר בָּ/אָ֖רֶץ וְ/שִׁכְּלָ֑תָּ/ה וְ/הָיְתָ֤ה שְׁמָמָה֙
    מִ/בְּלִ֣י עוֹבֵ֔ר מִ/פְּנֵ֖י הַ/חַיָּֽה־׃
translation:
  text: If I cause dangerous wild animals to pass through the land, and they bereave
    it, and it becomes a desolation, without anyone passing through because of the
    animals,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wild beasts'; literally 'a bad/evil animal,' a collective expression
      for dangerous wild animals.
    reason: lexical_alternative
  - marker: b
    text: Or 'and they make it childless.' The Hebrew personifies the land as bereaved
      of its inhabitants.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֽוּ
  chosen: If
  alternatives:
  - Suppose
  - Were I to
  lexicon: HALOT
  rationale: Introduces a hypothetical condition in this judgment sequence. 'If' is
    the most natural English conditional marker here.
- source_word: חַיָּה רָעָה
  chosen: dangerous wild animals
  alternatives:
  - evil beast
  - wild beasts
  - harmful animals
  lexicon: HALOT
  rationale: The singular collective noun with adjective refers to harmful wild animals
    as a class. 'Dangerous wild animals' communicates the threat clearly in modern
    English without the archaic 'evil beast.'
- source_word: אַעֲבִיר
  chosen: I cause ... to pass through
  alternatives:
  - I send through
  - I bring through
  lexicon: HALOT
  rationale: 'Hiphil of עבר is causative: God causes the animals to move through the
    land. ''Cause to pass through'' preserves the verbal imagery more closely than
    the more interpretive ''send.'''
- source_word: בָּאָרֶץ
  chosen: through the land
  alternatives:
  - in the land
  - across the land
  lexicon: HALOT
  rationale: With עבר, English idiom favors 'through the land,' expressing movement
    across the territory under judgment.
- source_word: וְשִׁכְּלָתָּהּ
  chosen: and they bereave it
  alternatives:
  - and they make it childless
  - and they depopulate it
  lexicon: HALOT
  rationale: The verb שׁכל fundamentally denotes bereavement or deprivation of offspring.
    Applied to the land, it personifies the land as stripped of its inhabitants. 'Bereave
    it' preserves the metaphor and severity better than flattening to 'depopulate
    it.'
- source_word: וְהָיְתָה שְׁמָמָה
  chosen: and it becomes a desolation
  alternatives:
  - and it becomes desolate
  - and it becomes a wasteland
  lexicon: HALOT
  rationale: The noun שְׁמָמָה is best rendered as 'desolation,' a standard prophetic
    judgment term. Using the noun preserves the Hebrew structure.
- source_word: מִבְּלִי עוֹבֵר
  chosen: without anyone passing through
  alternatives:
  - so that no one passes through
  - with no passerby
  lexicon: HALOT
  rationale: Expresses the result that travel ceases entirely. 'Anyone' makes the
    indefinite participle natural in English.
- source_word: מִפְּנֵי הַחַיָּה
  chosen: because of the animals
  alternatives:
  - from before the animals
  - because of the wild animals
  lexicon: HALOT
  rationale: מִפְּנֵי here gives the reason or cause. 'Because of the animals' is
    idiomatic and clear; the article points back to the previously mentioned class
    of wild animals.
