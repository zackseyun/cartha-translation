theological_decisions:
- issue: Agency in divine judgment
  chosen_reading: 'Retain explicit divine causation: ''If I cause dangerous wild animals
    to pass through the land'''
  alternative_readings:
  - If I send wild animals into the land
  rationale: The Hebrew Hiphil verb presents God as the active agent in the judgment
    scenario. The translation preserves that agency without softening it into mere
    permission.
  doctrine_reference: Translation philosophy §1, §3
