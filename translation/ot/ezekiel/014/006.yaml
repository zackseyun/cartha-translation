theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine default renders YHWH as 'the LORD.' In the compound with
    אֲדֹנָי, English convention uses 'the Lord GOD' to avoid awkward duplication while
    preserving reverence and recognizability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Repentance language for שׁוּב
  chosen_reading: Turn back
  alternative_readings:
  - Repent
  - Return
  rationale: The verse is a prophetic summons to covenantal repentance, but the Hebrew
    imagery is concretely directional. 'Turn back' preserves theological force without
    narrowing the term to a later technical sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
