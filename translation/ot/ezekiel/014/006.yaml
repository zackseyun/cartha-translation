id: EZK.14.6
reference: Ezekiel 14:6
source:
  edition: WLC
  text: לָ/כֵ֞ן אֱמֹ֣ר אֶל בֵּ֣ית יִשְׂרָאֵ֗ל כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה שׁ֣וּבוּ
    וְ/הָשִׁ֔יבוּ מֵ/עַ֖ל גִּלּֽוּלֵי/כֶ֑ם וּ/מֵ/עַ֥ל כָּל תּוֹעֲבֹתֵי/כֶ֖ם הָשִׁ֥יבוּ
    פְנֵי/כֶֽם׀־־׃
translation:
  text: 'Therefore say to the house of Israel, ‘Thus says the Lord GOD: Turn back,
    and turn away from your idols, and turn your faces away from all your abominations.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Repent, and turn away from your idols.' The Hebrew verb שׁוּב can carry
      the sense of returning or repenting.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Lord GOD' represents אֲדֹנָי יְהוִה, combining the title 'Lord'
      with the divine name YHWH.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding
    indictment; 'Therefore' preserves the prophetic logic clearly.
- source_word: אֱמֹר אֶל־בֵּית יִשְׂרָאֵל
  chosen: say to the house of Israel
  alternatives:
  - speak to the house of Israel
  lexicon: HALOT
  rationale: Direct prophetic commission formula. 'House of Israel' is retained formally
    as a covenantal-national designation, not reduced to 'Israelites.'
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; 'Thus says' is both accurate
    and idiomatic in English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine title combines Adonai with YHWH. Following the doctrine default,
    YHWH is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, standard English
    convention is 'the Lord GOD' to avoid 'Lord LORD' while still signaling the divine
    name.
- source_word: שׁוּבוּ
  chosen: Turn back
  alternatives:
  - Repent
  - Return
  lexicon: HALOT
  rationale: שׁוּב in prophetic calls often carries the sense of repentance/return.
    'Turn back' preserves the concrete verbal imagery while conveying repentance without
    importing later theological jargon.
- source_word: וְהָשִׁיבוּ מֵעַל גִּלּוּלֵיכֶם
  chosen: and turn away from your idols
  alternatives:
  - and turn yourselves away from your idols
  - and remove yourselves from your idols
  lexicon: HALOT
  rationale: 'The Hiphil of שׁוּב here is causative: cause yourselves to turn away/remove
    from. ''Turn away from your idols'' is natural English and preserves the separation
    from idolatry. גִּלּוּלִים is the common pejorative term for idols.'
- source_word: גִּלּוּלֵיכֶם
  chosen: your idols
  alternatives:
  - your filthy idols
  - your dung-idols
  lexicon: HALOT
  rationale: Though the Hebrew term is contemptuous, 'idols' is the stable contextual
    meaning. More graphic renderings may over-specify etymological force in a way
    not required by the immediate context.
- source_word: וּמֵעַל כָּל תּוֹעֲבֹתֵיכֶם
  chosen: from all your abominations
  alternatives:
  - from all your detestable things
  - from all your abominable practices
  lexicon: HALOT
  rationale: תּוֹעֵבָה often denotes something detestable, especially in covenantal/religious
    offense. 'Abominations' preserves the moral and cultic gravity and matches prophetic
    diction.
- source_word: הָשִׁיבוּ פְנֵיכֶם
  chosen: turn your faces away
  alternatives:
  - set your faces away
  - turn your faces
  lexicon: HALOT
  rationale: Literally 'turn your faces.' Adding 'away' in English makes explicit
    the directional force already implied by the preceding מֵעַל phrases and the context
    of renunciation. Retaining 'faces' preserves the embodied Hebrew idiom of deliberate
    orientation.
