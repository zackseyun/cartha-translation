id: EZK.14.7
reference: Ezekiel 14:7
source:
  edition: WLC
  text: כִּי֩ אִ֨ישׁ אִ֜ישׁ מִ/בֵּ֣ית יִשְׂרָאֵ֗ל וּ/מֵ/הַ/גֵּר֮ אֲשֶׁר יָג֣וּר בְּ/יִשְׂרָאֵל֒
    וְ/יִנָּזֵ֣ר מֵֽ/אַחֲרַ֗/י וְ/יַ֤עַל גִּלּוּלָי/ו֙ אֶל לִבּ֔/וֹ וּ/מִכְשׁ֣וֹל
    עֲוֺנ֔/וֹ יָשִׂ֖ים נֹ֣כַח פָּנָ֑י/ו וּ/בָ֤א אֶל הַ/נָּבִיא֙ לִ/דְרָשׁ ל֣/וֹ בִ֔/י
    אֲנִ֣י יְהוָ֔ה נַֽעֲנֶה לּ֖/וֹ בִּֽ/י־־־־־׃
translation:
  text: For any man from the house of Israel, or from the foreigner who sojourns in
    Israel, who separates himself from following me and brings up his idols into his
    heart, and sets the stumbling block of his iniquity before his face, and then
    comes to the prophet to inquire of me through him, I, the LORD, will answer him
    myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'each man' or 'anyone.' The Hebrew repeats 'man' for distributive emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Foreigner who sojourns'' refers to a non-Israelite residing among Israel;
      traditionally, ''resident alien.'''
    reason: cultural_note
  - marker: c
    text: Hebrew literally, 'separates himself from after me,' that is, turns away
      from following the LORD.
    reason: lexical_alternative
  - marker: d
    text: Or, 'I, the LORD, will answer him by myself' / 'in my own person.' The Hebrew
      is compact and emphatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אִישׁ
  chosen: any man
  alternatives:
  - each man
  - anyone
  lexicon: HALOT
  rationale: The doubled noun gives a distributive sense, indicating each individual
    case. 'Any man' preserves the masculine singular form and representative force,
    in line with the gender-accurate policy; 'anyone' would flatten the masculine
    form.
- source_word: מִבֵּית יִשְׂרָאֵל
  chosen: from the house of Israel
  alternatives:
  - of the house of Israel
  - from Israel
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the covenantal-national expression
    'house of Israel' rather than reducing it to simply 'Israel'.
- source_word: הַגֵּר ... יָגוּר
  chosen: the foreigner who sojourns
  alternatives:
  - the resident alien who resides
  - the stranger who lives as a foreigner
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living among Israel. 'Foreigner who
    sojourns' is readable modern English while preserving the resident-foreigner nuance
    better than the more technical 'resident alien'.
- source_word: וְיִנָּזֵר מֵאַחֲרַי
  chosen: who separates himself from following me
  alternatives:
  - who estranges himself from me
  - who keeps himself apart from me
  lexicon: HALOT
  rationale: The Niphal of נזר here conveys separation/alienation from allegiance
    to YHWH. 'Separates himself from following me' captures both the reflexive force
    and the idiom מֵאַחֲרַי ('from after me' = from following me).
- source_word: וְיַעַל גִּלּוּלָיו אֶל לִבּוֹ
  chosen: and brings up his idols into his heart
  alternatives:
  - and lifts his idols up into his heart
  - and sets his idols in his heart
  lexicon: HALOT
  rationale: The verb עלה literally means 'bring up/go up.' Here it is idiomatic for
    elevating idols internally. 'Brings up ... into his heart' preserves the metaphor
    without over-paraphrasing.
- source_word: מִכְשׁוֹל עֲוֺנוֹ
  chosen: the stumbling block of his iniquity
  alternatives:
  - the stumbling block of his guilt
  - the obstacle of his sin
  lexicon: HALOT
  rationale: This is a recurring Ezekiel phrase. 'Stumbling block' is the established
    and semantically precise rendering for מִכְשׁוֹל; עָוֹן here is rendered 'iniquity'
    to preserve its moral weight and likely culpability nuance.
- source_word: יָשִׂים נֹכַח פָּנָיו
  chosen: sets ... before his face
  alternatives:
  - places ... before himself
  - sets ... in front of himself
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the vivid image of deliberately
    placing the cause of downfall directly before oneself.
- source_word: וּבָא אֶל הַנָּבִיא
  chosen: and then comes to the prophet
  alternatives:
  - and comes to the prophet
  lexicon: HALOT
  rationale: 'The sequence implies hypocrisy: after doing these things, he comes to
    the prophet. ''Then'' lightly marks the progression without adding content.'
- source_word: לִדְרָשׁ לוֹ בִי
  chosen: to inquire of me through him
  alternatives:
  - to seek for himself an answer from me through him
  - to consult him about me
  lexicon: HALOT
  rationale: דרשׁ with ב can mean inquire of/seek from. In context the person approaches
    the prophet as intermediary, so 'to inquire of me through him' best captures the
    syntax and sense.
- source_word: אֲנִי יְהוָה
  chosen: I, the LORD,
  alternatives:
  - I am the LORD
  lexicon: HALOT
  rationale: The pronoun is emphatic before the divine name. The main clause continues
    with the participle/verb, so 'I, the LORD,' fits the syntax better than making
    it a separate verbless assertion. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: נַעֲנֶה לוֹ בִּי
  chosen: will answer him myself
  alternatives:
  - will answer him by myself
  - will answer him in my own person
  lexicon: HALOT
  rationale: The form and final בִּי are difficult, but the sense is that YHWH himself,
    not merely the prophet, will answer. 'Myself' conveys the emphatic/instrumental
    nuance in natural English.
