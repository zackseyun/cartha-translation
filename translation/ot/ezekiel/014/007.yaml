theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered singular אִישׁ אִישׁ
  chosen_reading: any man
  alternative_readings:
  - anyone
  - each person
  rationale: The source uses masculine singular with distributive force. Per translation
    philosophy, gender-accurate rendering is preferred over gender-neutral flattening
    unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
