theological_decisions:
- issue: Meaning of the survivors' effect on the exiles
  chosen_reading: The survivors' observable conduct will vindicate God's judgment and thereby bring consolation to the audience.
  alternative_readings:
  - The survivors themselves are a comfort merely by surviving
  - The audience will comfort themselves upon seeing the survivors
  rationale: 'The verse''s logic is explanatory: seeing the survivors'' ways and deeds leads to knowledge that God''s acts against Jerusalem were not gratuitous. Thus the comfort is not sentimental but judicial-theological.'
  doctrine_reference: Preserve theological tension rather than resolve it; render according to the source text's plain sense.
- issue: Rendering of the divine name in אֲדֹנָי יְהוָה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - the Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
