id: EZK.14.23
reference: Ezekiel 14:23
source:
  edition: WLC
  text: וְ/נִחֲמ֣וּ אֶתְ/כֶ֔ם כִּֽי תִרְא֥וּ אֶת דַּרְכָּ֖/ם וְ/אֶת עֲלִֽילוֹתָ֑/ם וִֽ/ידַעְתֶּ֗ם כִּי֩ לֹ֨א חִנָּ֤ם עָשִׂ֨יתִי֙ אֵ֣ת כָּל אֲשֶׁר עָשִׂ֣יתִי בָ֔/הּ נְאֻ֖ם אֲדֹנָ֥/י יְהֹוִֽה־־־־־׃פ
translation:
  text: And they will comfort you when you see their ways and their deeds, and you will know that I have not done without cause all that I did in it, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you will be comforted by them' or 'they will console you.' The Hebrew form allows the sense that the survivors become the means of your consolation when their conduct is seen.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I did not do all that I did in her without reason.'
    reason: alternative_reading
  - marker: c
    text: That is, in Jerusalem.
    reason: cross_reference
lexical_decisions:
- source_word: וְנִחֲמוּ אֶתְכֶם
  chosen: they will comfort you
  alternatives:
  - you will be comforted by them
  - they will console you
  lexicon: HALOT
  rationale: 'The Niphal of נחם here is best taken with the survivors as the subject (''they'') and the elders/exiles as the object (''you''): seeing the survivors'' conduct will bring consolation by explaining Jerusalem''s judgment. ''Comfort'' is natural modern English and preserves the causative/result sense without overparaphrase.'
- source_word: כִּי תִרְאוּ
  chosen: when you see
  alternatives:
  - for you will see
  - because you see
  lexicon: HALOT
  rationale: כִּי can mark cause or circumstance; in this context it introduces the occasion on which consolation comes. 'When you see' fits the flow better than a strictly causal 'for' in English.
- source_word: דַּרְכָּם
  chosen: their ways
  alternatives:
  - their conduct
  - their manner of life
  lexicon: HALOT
  rationale: דֶּרֶךְ often metaphorically denotes conduct or course of life. 'Ways' preserves the Hebrew idiom while remaining understandable.
- source_word: עֲלִילוֹתָם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: עֲלִילוֹת refers to acts/deeds, often with moral coloring. 'Deeds' is concise and pairs well with 'ways' without collapsing the distinction between disposition/course and concrete acts.
- source_word: וִידַעְתֶּם
  chosen: and you will know
  alternatives:
  - then you will know
  lexicon: HALOT
  rationale: Simple future/resultive sense. 'And you will know' keeps the Hebrew coordination; the inferential force is clear from context without adding 'then' in the main text.
- source_word: לֹא חִנָּם
  chosen: not done without cause
  alternatives:
  - not done in vain
  - not done for nothing
  - not done without reason
  lexicon: HALOT
  rationale: חִנָּם means gratuitously, for nothing, without cause. In context the point is that Jerusalem's destruction was not arbitrary. 'Without cause' is slightly more formal and judicial, fitting Ezekiel's rhetoric.
- source_word: עָשִׂיתִי אֵת כָּל אֲשֶׁר עָשִׂיתִי
  chosen: I have not done without cause all that I did
  alternatives:
  - I did not do all that I did without cause
  - I have not acted without cause in all that I did
  lexicon: HALOT
  rationale: The repetition of עשה is retained rather than smoothed away, since it emphasizes the totality of God's actions. The chosen English is readable while preserving the Hebrew's emphatic structure.
- source_word: בָהּ
  chosen: in it
  alternatives:
  - against it
  - to it
  - in her
  lexicon: HALOT
  rationale: The feminine singular pronoun refers to the city, Jerusalem. 'In it' is the most literal rendering of ב + pronoun; 'against it' is interpretive, though contextually plausible. Because the referent is a city, English 'it' is natural modern usage.
- source_word: נְאֻם אֲדֹנָי יְהוָה
  chosen: declares the Lord GOD
  alternatives:
  - declares the Lord Yahweh
  - oracle of the Lord GOD
  lexicon: HALOT
  rationale: נְאֻם is the standard prophetic formula 'declares.' For אֲדֹנָי יְהוָה, the project default renders YHWH as 'the LORD.' In this compound title, traditional English capitalization 'Lord GOD' distinguishes אֲדֹנָי from YHWH and preserves meaning.
