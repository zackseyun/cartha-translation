theological_decisions:
- issue: Rendering the judgment formula involving the divine face
  chosen_reading: set my face against that man
  alternative_readings:
  - turn my face against that man
  rationale: The chosen wording preserves the anthropomorphic and covenant-judgment force of the Hebrew without softening it into a mere attitude. It communicates active divine opposition while remaining idiomatic English.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering מְשָׁלִים in a judgment context
  chosen_reading: a proverb
  alternative_readings:
  - a byword
  rationale: The context suggests the man becomes a public example of judgment. 'Byword' captures disgrace more explicitly, but 'proverb' stays closer to the lexical base of מָשָׁל and avoids importing a narrower nuance not demanded by the text. The alternative is preserved in a footnote because the context makes it plausible.
  doctrine_reference: Translation philosophy §3, §5
