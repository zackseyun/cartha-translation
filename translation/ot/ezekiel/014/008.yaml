id: EZK.14.8
reference: Ezekiel 14:8
source:
  edition: WLC
  text: וְ/נָתַתִּ֨י פָנַ֜/י בָּ/אִ֣ישׁ הַ/ה֗וּא וַ/הֲשִֽׂמֹתִ֨י/הוּ֙ לְ/א֣וֹת וְ/לִ/מְשָׁלִ֔ים וְ/הִכְרַתִּ֖י/ו מִ/תּ֣וֹךְ עַמִּ֑/י וִֽ/ידַעְתֶּ֖ם כִּֽי אֲנִ֥י יְהוָֽה־׃ס
translation:
  text: And I will set my face against that man, and I will make him a sign and a proverb, and I will cut him off from the midst of my people. Then you will know that I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a byword.' The Hebrew term can denote a proverb, taunt, or public saying about someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי פָנַי בָּאִישׁ הַהוּא
  chosen: I will set my face against that man
  alternatives:
  - I will turn my face against that man
  - I will direct my face against that man
  lexicon: HALOT
  rationale: The idiom 'set my face against' is a well-established Hebrew expression of determined opposition and judgment. Retaining 'face' preserves the concrete Hebrew imagery while remaining natural English. 'Against that man' correctly brings out the hostile force of בְּ in this idiom.
- source_word: הָאִישׁ הַהוּא
  chosen: that man
  alternatives:
  - that האיש/person
  - that person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and refers back to the individual in view. Per the translation philosophy, gender-accurate rendering is preferred over gender-neutral language, so 'that man' is retained rather than 'that person'.
- source_word: וַהֲשִׂמֹתִיהוּ
  chosen: I will make him
  alternatives:
  - I will set him
  - I will appoint him
  lexicon: HALOT
  rationale: In context the verb means to place or make someone into a certain status or function. 'Make him' is the most natural English with the following predicate nouns 'a sign and a proverb.'
- source_word: לְאוֹת
  chosen: a sign
  alternatives:
  - a warning sign
  - an omen
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' or 'token.' Here it denotes an object lesson of divine judgment. 'Sign' is sufficiently broad and preserves the lexical link without over-interpreting.
- source_word: וְלִמְשָׁלִים
  chosen: and a proverb
  alternatives:
  - and a byword
  - and a proverb among people
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb, taunt, or byword. In this judgment context 'byword' is possible, but 'proverb' stays closer to the lexical core while still conveying that the man becomes a memorable example. Singular English is used idiomatically after the singular object 'him,' though the Hebrew plural may be intensive or collective.
- source_word: וְהִכְרַתִּיו
  chosen: I will cut him off
  alternatives:
  - I will destroy him
  - I will eliminate him
  lexicon: HALOT
  rationale: כרת in the Hiphil commonly means 'cut off,' especially in covenantal/judgment contexts. This preserves the Hebrew idiom and its severity better than the more interpretive 'destroy.'
- source_word: מִתּוֹךְ עַמִּי
  chosen: from the midst of my people
  alternatives:
  - from among my people
  lexicon: HALOT
  rationale: The phrase literally means 'from the midst of my people.' This more formal rendering preserves the Hebrew imagery, though 'from among my people' would also be acceptable. The chosen wording fits the solemn tone of the verse.
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: 'The conjunction can be rendered simply ''and,'' but in English ''Then'' clarifies the resultative force in context: the judgment leads to recognition of the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
