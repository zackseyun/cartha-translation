theological_decisions:
- issue: Nature of the offense described by מַעַל
  chosen_reading: covenantal unfaithfulness toward God
  alternative_readings:
  - general sinfulness
  - treachery in a narrower legal sense
  rationale: The combination 'sins against me' with the cognate construction לִמְעָל
    מַעַל intensifies the idea beyond a generic wrongdoing and points to faithless
    breach against God. The translation preserves that covenantal dimension without
    over-specifying the exact form of apostasy.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; readable modern English, not archaic or academic.'
