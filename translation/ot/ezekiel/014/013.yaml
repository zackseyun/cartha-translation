id: EZK.14.13
reference: Ezekiel 14:13
source:
  edition: WLC
  text: בֶּן אָדָ֗ם אֶ֚רֶץ כִּ֤י תֶחֱטָא לִ/י֙ לִ/מְעָל מַ֔עַל וְ/נָטִ֤יתִי יָדִ/י֙
    עָלֶ֔י/הָ וְ/שָׁבַ֥רְתִּי לָ֖/הּ מַטֵּה לָ֑חֶם וְ/הִשְׁלַחְתִּי בָ֣/הּ רָעָ֔ב
    וְ/הִכְרַתִּ֥י מִמֶּ֖/נָּה אָדָ֥ם וּ/בְהֵמָֽה־־־־־׃
translation:
  text: Son of man, if a land sins against me by acting unfaithfully, and I stretch
    out my hand against it and break its supply of bread, and send famine into it,
    and cut off from it man and beast,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'break its staff of bread,' a Hebrew idiom for cutting off the
      food supply.
    reason: lexical_alternative
  - marker: b
    text: Or 'people and animals.' The Hebrew reads 'man and beast,' a standard expression
      for all living inhabitants, human and animal alike.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard address formula in Ezekiel. A relatively formal rendering preserves
    the prophetic idiom and directness better than a more interpretive alternative.
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - the land
  - a country
  lexicon: HALOT
  rationale: Anarthrous and generic in this conditional statement; 'a land' fits the
    indefinite sense better than 'the land.' 'Land' also preserves the broad semantic
    range without narrowing to modern nation-state language.
- source_word: תֶחֱטָא לִי
  chosen: sins against me
  alternatives:
  - sins against me
  - offends against me
  lexicon: HALOT
  rationale: The verb חטא with ל marks sin directed against God; 'sins against me'
    is the plain and natural English equivalent.
- source_word: לִמְעָל מַעַל
  chosen: by acting unfaithfully
  alternatives:
  - by committing a trespass
  - by acting treacherously
  lexicon: HALOT
  rationale: The infinitive + cognate noun intensifies the idea of breach of faith.
    'Acting unfaithfully' communicates covenantal disloyalty in readable English without
    importing overly technical jargon.
- source_word: וְנָטִיתִי יָדִי עָלֶיהָ
  chosen: and I stretch out my hand against it
  alternatives:
  - and I extend my hand against it
  lexicon: HALOT
  rationale: A common judgment idiom. 'Stretch out my hand against it' is both idiomatic
    in English and close to the Hebrew imagery.
- source_word: וְשָׁבַרְתִּי לָהּ מַטֵּה לָחֶם
  chosen: and break its supply of bread
  alternatives:
  - and break its staff of bread
  - and cut off its food supply
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'staff of bread,' meaning the support
    or supply of food. The main text uses a clear modern equivalent, while the literal
    image is worth preserving in a footnote.
- source_word: וְהִשְׁלַחְתִּי בָהּ רָעָב
  chosen: and send famine into it
  alternatives:
  - and send famine on it
  - and send hunger into it
  lexicon: HALOT
  rationale: רָעָב here denotes famine as covenant judgment. 'Into it' reflects בָהּ
    naturally in context of famine entering the land.
- source_word: וְהִכְרַתִּי מִמֶּנָּה
  chosen: and cut off from it
  alternatives:
  - and wipe out from it
  - and destroy from it
  lexicon: HALOT
  rationale: כרת in judgment contexts often means to cut off or remove decisively.
    'Cut off' preserves the severity and biblical resonance.
- source_word: אָדָם וּבְהֵמָה
  chosen: man and beast
  alternatives:
  - humankind and animals
  - people and animals
  lexicon: HALOT
  rationale: This is a conventional merism in judgment language. Per doctrine, gender-accurate
    rendering is preferred where the source uses אדם representatively; 'man and beast'
    preserves the idiom and register, with a footnote noting the broader sense.
