id: EZK.14.3
reference: Ezekiel 14:3
source:
  edition: WLC
  text: בֶּן אָדָ֗ם הָ/אֲנָשִׁ֤ים הָ/אֵ֨לֶּה֙ הֶעֱל֤וּ גִלּֽוּלֵי/הֶם֙ עַל לִבָּ֔/ם
    וּ/מִכְשׁ֣וֹל עֲוֺנָ֔/ם נָתְנ֖וּ נֹ֣כַח פְּנֵי/הֶ֑ם הַ/אִדָּרֹ֥שׁ אִדָּרֵ֖שׁ לָ/הֶֽם־־׃ס
translation:
  text: Son of man, these men have set up their idols in their hearts and have placed
    the stumbling block of their iniquity before their faces. Should I indeed let
    myself be consulted by them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִלּוּלִים is a strongly contemptuous term for idols.
    reason: lexical_alternative
  - marker: b
    text: Or 'Should I really be inquired of by them?' The Hebrew intensifies the
      question and implies a negative answer.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  chosen: Son of man
  alternatives:
  - Human one
  - Mortal
  lexicon: HALOT
  rationale: Standard Ezekiel address formula. A more literal/traditional rendering
    preserves the prophetic idiom and its resonance in the book better than smoothing
    to 'human' or 'mortal'.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  chosen: these men
  alternatives:
  - these people
  lexicon: HALOT
  rationale: אֲנָשִׁים is grammatically and semantically 'men' here, referring to
    the male elders in context. Per gender-accurate policy, masculine wording is retained
    rather than neutralized.
- source_word: הֶעֱלוּ
  chosen: have set up
  alternatives:
  - have brought up
  - have raised
  lexicon: HALOT
  rationale: Though the verb literally means 'bring up/raise,' with idols and the
    following phrase 'in their hearts' it idiomatically conveys establishing or installing
    them internally.
- source_word: גִלּוּלֵיהֶם
  chosen: their idols
  alternatives:
  - their dung-idols
  - their images
  lexicon: HALOT
  rationale: The noun is Ezekiel's contemptuous term for idols. 'Idols' gives the
    clear sense in readable English; the pejorative nuance is real but too awkward
    to foreground in the main text.
- source_word: עַל לִבָּם
  chosen: in their hearts
  alternatives:
  - upon their hearts
  - over their hearts
  lexicon: HALOT
  rationale: English idiom favors 'in their hearts' for internal allegiance. This
    captures the metaphorical sense without woodenly preserving the preposition.
- source_word: מִכְשׁוֹל עֲוֺנָם
  chosen: the stumbling block of their iniquity
  alternatives:
  - the stumbling block of their guilt
  - the obstacle of their sin
  lexicon: HALOT
  rationale: מִכְשׁוֹל is a stumbling block or cause of downfall; עָוֹן can denote
    iniquity/guilt. 'Iniquity' preserves the moral weight and traditional prophetic
    register.
- source_word: נָתְנוּ נֹכַח פְּנֵיהֶם
  chosen: have placed ... before their faces
  alternatives:
  - have set ... in front of themselves
  lexicon: HALOT
  rationale: The phrase is spatially vivid and should remain so. 'Before their faces'
    preserves the Hebrew image of deliberate confrontation and orientation toward
    the idol.
- source_word: הַאִדָּרֹשׁ אִדָּרֵשׁ לָהֶם
  chosen: Should I indeed let myself be consulted by them?
  alternatives:
  - Should I really be inquired of by them?
  - Shall I allow myself to be sought by them at all?
  lexicon: HALOT
  rationale: The infinitive absolute + imperfect intensifies the rhetorical question.
    Niphal of דרש here means being consulted/inquired of, especially in seeking an
    oracle from God. 'Let myself be consulted' brings out the divine refusal implied
    by the form and context.
