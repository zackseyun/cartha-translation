theological_decisions:
- issue: Divine response to idolaters seeking prophetic guidance
  chosen_reading: 'The clause is rendered as a rhetorical refusal: ''Should I indeed
    let myself be consulted by them?'''
  alternative_readings:
  - Should I be consulted by them at all?
  - Should I allow them to inquire of me?
  rationale: The Hebrew infinitive absolute with Niphal imperfect intensifies the
    question and, in context, expects a negative answer. The translation preserves
    the rhetorical force without overstating it into an explicit 'No' not present
    in the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
