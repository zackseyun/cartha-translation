id: EZK.47.15
reference: Ezekiel 47:15
source:
  edition: WLC
  text: וְ/זֶ֖ה גְּב֣וּל הָ/אָ֑רֶץ לִ/פְאַ֨ת צָפ֜וֹנָ/ה מִן הַ/יָּ֧ם הַ/גָּד֛וֹל הַ/דֶּ֥רֶךְ
    חֶתְלֹ֖ן לְב֥וֹא צְדָֽדָ/ה־׃
translation:
  text: 'And this shall be the boundary of the land: on the north side, from the Great
    Sea by the way of Hethlon, as one goes to Zedad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And this is the boundary of the land.' The Hebrew verb is implied rather
      than explicitly stated.
    reason: lexical_alternative
  - marker: b
    text: '''The Great Sea'' refers to the Mediterranean Sea.'
    reason: cultural_note
  - marker: c
    text: Or 'along the road to Hethlon.'
    reason: lexical_alternative
  - marker: d
    text: The phrase rendered 'as one goes to Zedad' may also be understood more literally
      as 'to the approach of Zedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/זֶה
  chosen: And this shall be
  alternatives:
  - And this is
  lexicon: HALOT
  rationale: Introduces the specification that follows. 'Shall be' fits the formal
    boundary-description style in context, though the Hebrew can also be rendered
    as a simple present.
- source_word: גְּבוּל
  chosen: boundary
  alternatives:
  - border
  - territory line
  lexicon: HALOT
  rationale: '''Boundary'' is the standard geographic sense here in a land-allotment
    context and is more precise than the broader ''border''.'
- source_word: הָ/אָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land territory
  lexicon: HALOT
  rationale: Refers to the land under description in Ezekiel's territorial vision;
    'the land' is the natural English rendering.
- source_word: לִ/פְאַת צָפוֹנָה
  chosen: on the north side
  alternatives:
  - toward the north side
  - at the northern edge
  lexicon: HALOT
  rationale: The phrase denotes the northern side/edge of the land. 'On the north
    side' is idiomatic and preserves the directional-geographic force.
- source_word: מִן הַ/יָּם הַ/גָּדוֹל
  chosen: from the Great Sea
  alternatives:
  - from the great sea
  - from the Mediterranean Sea
  lexicon: HALOT
  rationale: '''Great Sea'' is a conventional biblical geographic designation. Capitalization
    reflects its function as a recognized place designation, while avoiding interpretive
    substitution with ''Mediterranean Sea'' in the main text.'
- source_word: הַ/דֶּרֶךְ חֶתְלֹן
  chosen: by the way of Hethlon
  alternatives:
  - along the road to Hethlon
  - the route of Hethlon
  lexicon: HALOT
  rationale: הדרך can denote a road/route/way. 'By the way of Hethlon' preserves the
    concise boundary-list style and leaves the exact topographical nuance open.
- source_word: לְבֹא
  chosen: as one goes to
  alternatives:
  - toward the entrance to
  - to the approach of
  - to Lebo-
  lexicon: HALOT
  rationale: In boundary formulas, לבוא often functions idiomatically for 'as one
    goes to' or 'toward the approach to' a place. This avoids over-literal 'entrance
    of' in English while preserving the directional sense. Some take it as part of
    a place name ('Lebo-hamath' elsewhere), but here the following toponym is Zedad.
- source_word: צְדָדָה
  chosen: Zedad
  alternatives:
  - Zedadah
  lexicon: HALOT
  rationale: Rendered as a transliterated place name in keeping with the translation
    philosophy to transliterate names. 'Zedad' is the standard English form.
