id: EZK.47.1
reference: Ezekiel 47:1
source:
  edition: WLC
  text: וַ/יְשִׁבֵ/נִי֮ אֶל פֶּ֣תַח הַ/בַּיִת֒ וְ/הִנֵּה מַ֣יִם יֹצְאִ֗ים מִ/תַּ֨חַת
    מִפְתַּ֤ן הַ/בַּ֨יִת֙ קָדִ֔ימָ/ה כִּֽי פְנֵ֥י הַ/בַּ֖יִת קָדִ֑ים וְ/הַ/מַּ֣יִם
    יֹרְדִ֗ים מִ/תַּ֜חַת מִ/כֶּ֤תֶף הַ/בַּ֨יִת֙ הַ/יְמָנִ֔ית מִ/נֶּ֖גֶב לַ/מִּזְבֵּֽחַ־־־׃
translation:
  text: Then he brought me back to the entrance of the house, and behold, water was
    coming out from under the threshold of the house eastward, because the front of
    the house faced east; and the water was flowing down from under the south side
    of the house, on the right side, south of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple' for 'the house'; the Hebrew text literally reads 'the house,'
      referring to the temple building in Ezekiel's vision.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from under the shoulder of the house, the right side'; 'shoulder'
      is an idiom for the side of a structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשִׁבֵנִי
  chosen: Then he brought me back
  alternatives:
  - Then he returned me
  - Then he caused me to return
  lexicon: HALOT
  rationale: 'From שוב in the Hiphil with 1cs suffix: causative ''caused me to return/brought
    me back.'' ''Brought me back'' is idiomatic modern English while preserving the
    causative sense.'
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - doorway
  - opening
  lexicon: HALOT
  rationale: Refers to the entry area of the temple structure. 'Entrance' is natural
    English and broad enough to include the doorway area.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Hebrew literally says 'the house.' In Ezekiel's temple vision this refers
    to the temple building, but the translation keeps the source term 'house' rather
    than interpreting more specifically in the main text.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force of the Hebrew discourse
    marker in a suitably elevated but still readable style.
- source_word: מַיִם יֹצְאִים
  chosen: water was coming out
  alternatives:
  - waters were going out
  - water was issuing out
  lexicon: HALOT
  rationale: Though מַיִם is formally plural, English normally uses singular 'water'
    for a flow. The participle indicates ongoing action, well represented by 'was
    coming out.'
- source_word: מִתַּחַת מִפְתַּן
  chosen: from under the threshold
  alternatives:
  - beneath the threshold
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'Threshold' accurately renders
    מִפְתָּן as the sill/threshold at the entrance.
- source_word: קָדִימָה
  chosen: eastward
  alternatives:
  - toward the east
  lexicon: HALOT
  rationale: Adverbial directional form. 'Eastward' is concise and natural.
- source_word: כִּי פְנֵי הַבַּיִת קָדִים
  chosen: because the front of the house faced east
  alternatives:
  - for the front of the house was toward the east
  lexicon: HALOT
  rationale: Explains the preceding directional note. 'Faced east' expresses the orientation
    clearly in idiomatic English.
- source_word: יֹרְדִים
  chosen: was flowing down
  alternatives:
  - was going down
  - was descending
  lexicon: HALOT
  rationale: For water, 'flowing down' captures both the motion and the natural sense
    better than the more wooden 'descending.'
- source_word: מִכֶּתֶף
  chosen: from under the south side
  alternatives:
  - from under the shoulder
  - from under the flank
  - from under the side
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder,' but in architectural/topographical
    usage it denotes a side. Because the following phrase specifies orientation relative
    to the altar, 'south side' best conveys the intended spatial sense in context.
- source_word: הַיְמָנִית
  chosen: on the right side
  alternatives:
  - the southern side
  lexicon: HALOT
  rationale: ימין means 'right' and by extension can imply south when facing east.
    Here retaining 'right side' preserves the lexical value, while the following 'south
    of the altar' clarifies the compass orientation.
- source_word: מִנֶּגֶב לַמִּזְבֵּחַ
  chosen: south of the altar
  alternatives:
  - on the south side of the altar
  - to the south of the altar
  lexicon: HALOT
  rationale: נֶגֶב here is directional 'south.' This phrase locates the watercourse
    relative to the altar.
