id: EZK.47.20
reference: Ezekiel 47:20
source:
  edition: WLC
  text: וּ/פְאַת יָם֙ הַ/יָּ֣ם הַ/גָּד֔וֹל מִ/גְּב֕וּל עַד נֹ֖כַח לְב֣וֹא חֲמָ֑ת זֹ֖את
    פְּאַת יָֽם־־־׃
translation:
  text: And the west side shall be the Great Sea, from the border up to opposite Lebo-hamath.
    This is the west side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Lebo-hamath, traditionally understood as 'the entrance of Hamath,'
      likely functioning here as a place-name in the northern extent of the land.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sea side'; in Israel's geography this denotes the west side,
      facing the Mediterranean ('the Great Sea').
    reason: cultural_note
lexical_decisions:
- source_word: וּ/פְאַת יָם
  chosen: And the west side
  alternatives:
  - And the western side
  - And the sea side
  lexicon: HALOT
  rationale: פְּאָה means 'side, edge, border, corner.' With יָם ('sea') in boundary
    descriptions, the idiom denotes the western side, since the Mediterranean lies
    to Israel's west. 'West side' communicates the directional sense naturally in
    English while preserving the boundary-list style.
- source_word: הַ/יָּם הַ/גָּדוֹל
  chosen: the Great Sea
  alternatives:
  - the great sea
  - the Mediterranean Sea
  lexicon: HALOT
  rationale: The phrase is the standard Hebrew designation for the Mediterranean.
    'The Great Sea' preserves the source expression more closely than the interpretive
    gloss 'Mediterranean Sea,' while remaining understandable.
- source_word: מִ/גְּבוּל
  chosen: from the border
  alternatives:
  - from the boundary
  lexicon: HALOT
  rationale: גְּבוּל denotes a border or boundary line. 'Border' is concise and idiomatic
    in a territorial description.
- source_word: עַד נֹכַח
  chosen: up to opposite
  alternatives:
  - as far as opposite
  - to a point opposite
  lexicon: HALOT
  rationale: נֹכַח here has the spatial sense 'in front of, opposite.' Combined with
    עַד, it marks the extent of the border. 'Up to opposite' is slightly compressed
    but reflects the Hebrew construction without over-expansion.
- source_word: לְבֹא חֲמָת
  chosen: Lebo-hamath
  alternatives:
  - the entrance of Hamath
  - toward Lebo-hamath
  lexicon: HALOT
  rationale: This expression can function as a place-name ('Lebo-hamath') in boundary
    formulas, though literally it means 'the entrance of Hamath.' Because it is a
    recognized geographical designation, transliteration best fits the translation
    philosophy of transliterating names while preserving the geographic reference.
- source_word: זֹאת פְּאַת יָם
  chosen: This is the west side
  alternatives:
  - That is the west side
  - This shall be the west side
  lexicon: HALOT
  rationale: The clause summarizes the boundary just described. Again, פְּאַת יָם
    is rendered by sense as 'west side' rather than the more opaque literal 'sea side.'
    'This is' matches the demonstrative summary formula.
