id: EZK.47.8
reference: Ezekiel 47:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֵלַ֗/י הַ/מַּ֤יִם הָ/אֵ֨לֶּה֙ יוֹצְאִ֗ים אֶל הַ/גְּלִילָה֙ הַ/קַּדְמוֹנָ֔ה וְ/יָרְד֖וּ עַל הָֽ/עֲרָבָ֑ה וּ/בָ֣אוּ הַ/יָּ֔מָּ/ה אֶל הַ/יָּ֥מָּ/ה הַ/מּֽוּצָאִ֖ים ו/נרפאו הַ/מָּֽיִם־־־׃
translation:
  text: Then he said to me, “These waters flow out toward the eastern district and go down into the Arabah; then they enter the sea, and when they are brought out into the sea, and the waters are healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Dead Sea.' The Hebrew expression is difficult and is commonly understood as referring to the salt sea east of Judah.
    reason: alternative_reading
  - marker: b
    text: Or 'the waters become fresh.' The Hebrew says literally, 'the waters are healed.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the sea of stagnant waters'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַמַּיִם הָאֵלֶּה
  chosen: these waters
  alternatives:
  - this water
  lexicon: HALOT
  rationale: The Hebrew uses the plural noun מַיִם with the demonstrative, naturally rendered 'these waters.' English idiom can use singular 'water,' but the plural better reflects the source.
- source_word: יוֹצְאִים
  chosen: flow out
  alternatives:
  - go out
  - are going out
  lexicon: HALOT
  rationale: The participle of יצא describes ongoing movement from the temple stream. 'Flow out' fits the context of water better than the more wooden 'go out.'
- source_word: הַגְּלִילָה הַקַּדְמוֹנָה
  chosen: the eastern district
  alternatives:
  - the eastern region
  - the eastern circle
  lexicon: HALOT
  rationale: גְּלִילָה can denote a district/region. In this geographical context, 'eastern district' is a clear modern rendering of the area eastward from the temple.
- source_word: וְיָרְדוּ עַל הָעֲרָבָה
  chosen: go down into the Arabah
  alternatives:
  - descend to the Arabah
  - go down upon the Arabah
  lexicon: HALOT
  rationale: ירד commonly means 'go down/descend.' עֲרָבָה is best kept as the proper geographical term 'the Arabah' rather than generalized as 'the plain,' since it refers to the Jordan rift valley region.
- source_word: וּבָאוּ הַיָּמָּה
  chosen: then they enter the sea
  alternatives:
  - and they come to the sea
  lexicon: HALOT
  rationale: בוא with directional ending on יָם indicates arrival/entry. 'Enter the sea' is natural in English and suits the river imagery.
- source_word: אֶל הַיָּמָּה הַמּוּצָאִים
  chosen: the sea of stagnant waters
  alternatives:
  - the sea where the waters flow out
  - the sea, the outlets
  - the Dead Sea
  lexicon: HALOT
  rationale: The phrase is difficult. The traditional sense connects it with the terminal sea receiving outflow, commonly understood as the Dead Sea. Rendering 'the sea of stagnant waters' captures the idea of a sea characterized by standing/issued waters without importing the later proper name directly into the main text. The more interpretive identification 'Dead Sea' is preserved in a footnote.
- source_word: וְנרפאו הַמָּיִם
  chosen: and the waters are healed
  alternatives:
  - and the waters become fresh
  - and the waters are made wholesome
  lexicon: HALOT
  rationale: רפא literally means 'heal.' Because the verse personifies the sea's condition, 'healed' preserves the metaphor better than flattening it to 'fresh,' though that sense is contextually implied.
