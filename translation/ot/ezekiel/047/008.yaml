  from: the sea of stagnant waters
  to: and when they are brought out into the sea
  rationale: The Hebrew הַמּוּצָאִים is a Hophal participle of יצא, meaning 'brought out' or 'made to go out' (referring to the waters emptying into the sea). Translating it as 'stagnant waters' is an interpretive gloss (likely influenced by the NRSV or an emendation) that departs from the MT. An optimal-equivalence translation should reflect the action of the waters emptying or being brought out into the sea.
