id: EZK.47.4
reference: Ezekiel 47:4
source:
  edition: WLC
  text: וַ/יָּ֣מָד אֶ֔לֶף וַ/יַּעֲבִרֵ֥/נִי בַ/מַּ֖יִם מַ֣יִם בִּרְכָּ֑יִם וַ/יָּ֣מָד
    אֶ֔לֶף וַ/יַּעֲבִרֵ֖/נִי מֵ֥י מָתְנָֽיִם׃
translation:
  text: Again he measured a thousand, and led me through the water—water up to the
    knees. Again he measured a thousand, and led me through water up to the waist.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a thousand'; the unit 'cubits' is supplied from the previous
      verse's context.
    reason: cross_reference
  - marker: b
    text: Or 'water up to the loins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: he measured
  alternatives:
  - he measured off
  lexicon: HALOT
  rationale: Qal wayyiqtol of מדד, referring to the measuring activity of the man
    in the vision. 'He measured' is the most direct and natural rendering; 'measured
    off' is possible but not necessary in English here.
- source_word: אֶלֶף
  chosen: a thousand
  alternatives:
  - one thousand cubits
  lexicon: HALOT
  rationale: The Hebrew text says simply 'a thousand.' Because the previous verse
    establishes the measuring unit as cubits, English can retain the literal wording
    here without adding 'cubits' in the main text. The fuller alternative is worth
    preserving as an interpretive clarification.
- source_word: וַיַּעֲבִרֵנִי
  chosen: led me through
  alternatives:
  - caused me to pass through
  - brought me through
  lexicon: HALOT
  rationale: Hiphil of עבר with 1cs suffix means he caused the prophet to pass through
    the water. 'Led me through' expresses the causative sense in idiomatic modern
    English without over-paraphrasing.
- source_word: בַמַּיִם
  chosen: through the water
  alternatives:
  - in the water
  lexicon: HALOT
  rationale: With the preceding causative verb, the phrase indicates movement through
    the water rather than mere location. 'Through the water' best reflects the action
    in context.
- source_word: מַיִם בִּרְכָּיִם
  chosen: water up to the knees
  alternatives:
  - knee-deep water
  - waters of knees
  lexicon: HALOT
  rationale: The repeated noun + body-part construction indicates water reaching knee
    level. 'Water up to the knees' is clear, readable, and close to the Hebrew sense.
    'Knee-deep water' is idiomatic but slightly more interpretive in form.
- source_word: מֵי מָתְנָיִם
  chosen: water up to the waist
  alternatives:
  - water up to the loins
  - waist-deep water
  lexicon: HALOT
  rationale: מָתְנַיִם commonly refers to the loins/waist area. For readable modern
    English, 'waist' is preferable in the main text; 'loins' is more formal/literal
    and is preserved as an alternative.
