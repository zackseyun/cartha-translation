id: EZK.47.19
reference: Ezekiel 47:19
source:
  edition: WLC
  text: וּ/פְאַת֙ נֶ֣גֶב תֵּימָ֔נָ/ה מִ/תָּמָ֗ר עַד מֵי֙ מְרִיב֣וֹת קָדֵ֔שׁ נַחֲלָ֖ה
    אֶל הַ/יָּ֣ם הַ/גָּד֑וֹל וְ/אֵ֥ת פְּאַת תֵּימָ֖נָ/ה נֶֽגְבָּ/ה־־־׃
translation:
  text: And the south side, southward, shall run from Tamar to the waters of Meriboth-kadesh,
    along the wadi to the Great Sea. This is the south side, southward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the waters of Meribah-kadesh.' The Hebrew here reads 'Meriboth-kadesh,'
      a related place-name form.
    reason: alternative_reading
  - marker: b
    text: Or, 'wadi'; the Hebrew term refers to a streambed or watercourse, often
      seasonal.
    reason: lexical_alternative
  - marker: c
    text: That is, the Mediterranean Sea.
    reason: cultural_note
lexical_decisions:
- source_word: פְאַת
  chosen: side
  alternatives:
  - border
  - edge
  lexicon: HALOT
  rationale: In this boundary-description context, the noun denotes the side or boundary
    edge of the land. 'Side' is natural English and fits the repeated formula in this
    passage.
- source_word: נֶגֶב / תֵּימָנָה
  chosen: south side, southward
  alternatives:
  - Negeb side, toward the south
  - southern side, to the south
  lexicon: HALOT
  rationale: 'The paired terms intensify and specify direction. נֶגֶב can denote the
    south/Negeb, but here in a border formula it functions directionally rather than
    as the regional proper name. Rendering both preserves the Hebrew emphasis: ''the
    south side, southward.'''
- source_word: מִתָּמָר
  chosen: from Tamar
  lexicon: HALOT
  rationale: Proper place name; transliterated according to the translation philosophy.
- source_word: מֵי מְרִיבוֹת קָדֵשׁ
  chosen: the waters of Meriboth-kadesh
  alternatives:
  - the waters of Meribah-kadesh
  lexicon: HALOT
  rationale: A place name phrase. The consonantal form here supports 'Meriboth-kadesh';
    the more familiar related form 'Meribah-kadesh' is worth preserving as an alternative
    because of usage elsewhere and translation tradition.
- source_word: נַחֲלָה
  chosen: along the wadi
  alternatives:
  - wadi
  - brook
  - valley
  - torrent-bed
  lexicon: HALOT
  rationale: In boundary lists this term can denote a wadi or watercourse rather than
    an inheritance. 'Along the wadi' best fits the topographical sequence from Kadesh
    to the sea and avoids the misleading sense 'inheritance.'
- source_word: הַיָּם הַגָּדוֹל
  chosen: the Great Sea
  alternatives:
  - the Mediterranean Sea
  - the great sea
  lexicon: HALOT
  rationale: A conventional biblical geographical designation. 'Great Sea' preserves
    the source expression; identifying it as the Mediterranean would be interpretive
    expansion better left unstated in the main text.
- source_word: וְאֵת פְּאַת תֵּימָנָה נֶגְבָּה
  chosen: This is the south side, southward
  alternatives:
  - and the south side is southward
  - namely, the southern side on the south
  lexicon: HALOT
  rationale: The closing phrase is elliptical and resumptive, restating the boundary
    just described. Supplying 'This is' makes the Hebrew formula intelligible in English
    while preserving its summarizing function.
