id: EZK.47.14
reference: Ezekiel 47:14
source:
  edition: WLC
  text: וּ/נְחַלְתֶּ֤ם אוֹתָ/הּ֙ אִ֣ישׁ כְּ/אָחִ֔י/ו אֲשֶׁ֤ר נָשָׂ֨אתִי֙ אֶת יָדִ֔/י
    לְ/תִתָּ֖/הּ לַ/אֲבֹֽתֵי/כֶ֑ם וְ/נָ֨פְלָ֜ה הָ/אָ֧רֶץ הַ/זֹּ֛את לָ/כֶ֖ם בְּ/נַחֲלָֽה־׃
translation:
  text: You shall inherit it, each man like his brother, which I raised my hand to
    give to your fathers; and this land shall fall to you as an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'raised my hand,' an oath idiom; that is, 'swore.'
    reason: lexical_alternative
  - marker: b
    text: Or 'each equally with his brother.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'shall fall to you,' an idiom for being allotted as an inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְחַלְתֶּם
  chosen: You shall inherit
  alternatives:
  - and you shall apportion as an inheritance
  - and you shall possess as an inheritance
  lexicon: HALOT
  rationale: From נחל in the Qal with second masculine plural, here denoting receiving/holding
    the land as an allotted inheritance. 'Inherit' is the most natural English rendering
    in this land-allotment context.
- source_word: אוֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: Feminine singular object pronoun referring to the land. English idiom
    uses 'it' for land here.
- source_word: אִישׁ כְּאָחִיו
  chosen: each man like his brother
  alternatives:
  - each equally with his brother
  - each one as his brother
  lexicon: HALOT
  rationale: Literally 'a man like his brother.' The phrase expresses equal distribution
    among members of the people. Following the project's gender-accurate principle,
    'man' is retained because the Hebrew is grammatically masculine and distributive.
    The sense of equality is preserved by 'like his brother' rather than paraphrasing
    more freely.
- source_word: אֲשֶׁר נָשָׂאתִי אֶת יָדִי
  chosen: which I raised my hand
  alternatives:
  - which I swore
  - for which I lifted up my hand
  lexicon: HALOT
  rationale: This is the Hebrew oath idiom of raising the hand. The main text preserves
    the concrete image rather than collapsing it into the interpretation 'swore,'
    which can be conveyed by context.
- source_word: לְתִתָּהּ
  chosen: to give
  alternatives:
  - to grant
  lexicon: HALOT
  rationale: Infinitive of נתן with feminine suffix referring to the land. 'To give'
    is the standard and sufficiently clear rendering.
- source_word: לַאֲבֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: Literally 'to your fathers.' Retained for formal correspondence and because
    it naturally evokes the patriarchal promise tradition. 'Ancestors' is possible
    but less textually specific.
- source_word: וְנָפְלָה
  chosen: shall fall
  alternatives:
  - shall be allotted
  - shall come
  lexicon: HALOT
  rationale: From נפל, literally 'fall,' used idiomatically of a lot or inheritance
    falling to someone. The main text keeps the idiom, which remains understandable
    in English in inheritance contexts.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase referring to the land under discussion.
- source_word: לָכֶם בְּנַחֲלָה
  chosen: to you as an inheritance
  alternatives:
  - for you as a possession
  - to you for an inheritance
  lexicon: HALOT
  rationale: בְּנַחֲלָה marks the land's status as inherited property. 'As an inheritance'
    is idiomatic and preserves the covenantal-land nuance.
