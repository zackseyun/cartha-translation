theological_decisions:
- issue: Rendering the oath idiom נָשָׂאתִי אֶת יָדִי
  chosen_reading: which I raised my hand to give to your fathers
  alternative_readings:
  - which I swore to give to your fathers
  rationale: The Hebrew idiom denotes an oath, but the translation philosophy favors
    preserving source-language imagery where understandable rather than importing
    the interpreted sense into the main text. The oath sense is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Gendered distributive phrase אִישׁ כְּאָחִיו
  chosen_reading: each man like his brother
  alternative_readings:
  - each one equally with his brother
  rationale: The Hebrew is grammatically masculine and distributive. Per the project's
    gender-accurate policy, the masculine form is retained rather than neutralized,
    while the distributive/equal sense is preserved.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
