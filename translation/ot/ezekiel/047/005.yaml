id: EZK.47.5
reference: Ezekiel 47:5
source:
  edition: WLC
  text: וַ/יָּ֣מָד אֶ֔לֶף נַ֕חַל אֲשֶׁ֥ר לֹֽא אוּכַ֖ל לַ/עֲבֹ֑ר כִּֽי גָא֤וּ הַ/מַּ֨יִם֙
    מֵ֣י שָׂ֔חוּ נַ֖חַל אֲשֶׁ֥ר לֹֽא יֵעָבֵֽר־־־׃
translation:
  text: Again he measured a thousand, and it was a river that I could not cross, because
    the waters had risen—waters to swim in, a river that could not be crossed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the waters had swelled.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'waters of swimming,' that is, water deep enough to swim in.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  chosen: Again he measured
  alternatives:
  - Then he measured
  - And he measured
  lexicon: HALOT
  rationale: The wayyiqtol continues the narrative sequence. 'Again he measured' brings
    out the repeated measuring in the immediate context more naturally than a bare
    'and he measured.'
- source_word: אֶלֶף
  chosen: a thousand
  alternatives:
  - one thousand
  lexicon: HALOT
  rationale: A straightforward numerical measure. English idiom prefers 'a thousand'
    here.
- source_word: נַחַל
  chosen: river
  alternatives:
  - wadi
  - stream
  - torrent
  lexicon: HALOT
  rationale: Although נחל can denote a wadi or torrent valley, in this visionary context
    the watercourse has become deep, flowing water that one swims in, so 'river' best
    matches the scene in natural English.
- source_word: אֲשֶׁר לֹא אוּכַל לַעֲבֹר
  chosen: that I could not cross
  alternatives:
  - which I was not able to pass through
  - that I could not pass over
  lexicon: HALOT
  rationale: אוּכַל expresses ability, and לעבר means to cross/pass through. 'Could
    not cross' is concise and accurate.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason the river could not be crossed.
- source_word: גָאוּ הַמַּיִם
  chosen: the waters had risen
  alternatives:
  - the waters had become high
  - the waters had swelled
  lexicon: HALOT
  rationale: The verb conveys rising or swelling. 'Had risen' is clear modern English
    and fits the progressive deepening of the river.
- source_word: מֵי שָׂחוּ
  chosen: waters to swim in
  alternatives:
  - swimming waters
  - waters of swimming
  lexicon: HALOT
  rationale: A construct expression describing water deep enough for swimming. 'Waters
    to swim in' preserves the sense while remaining readable.
- source_word: נַחַל אֲשֶׁר לֹא יֵעָבֵר
  chosen: a river that could not be crossed
  alternatives:
  - a river that could not be passed through
  - an uncrossable river
  lexicon: HALOT
  rationale: The Niphal gives a passive sense, 'could not be crossed.' Repeating 'river'
    reflects the Hebrew's emphatic restatement.
