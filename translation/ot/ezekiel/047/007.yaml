id: EZK.47.7
reference: Ezekiel 47:7
source:
  edition: WLC
  text: בְּ/שׁוּבֵ֕/נִי וְ/הִנֵּה֙ אֶל שְׂפַ֣ת הַ/נַּ֔חַל עֵ֖ץ רַ֣ב מְאֹ֑ד מִ/זֶּ֖ה
    וּ/מִ/זֶּֽה־׃
translation:
  text: When I returned, behold, on the bank of the stream were very many trees, on
    this side and on that side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more compactly, 'on both sides.' The Hebrew idiom is literally 'from
      this side and from that side.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוּבֵנִי
  chosen: When I returned
  alternatives:
  - As I returned
  - When he brought me back
  lexicon: HALOT
  rationale: 'Qal infinitive construct of שוב with 1cs suffix, functioning temporally:
    ''when I returned'' or ''when my returning occurred.'' The first-person suffix
    favors the prophet''s own return. ''As I returned'' is possible, but ''When I
    returned'' is smoother and adequately temporal. ''When he brought me back'' reflects
    the broader narrative context but is less directly tied to the form here.'
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: The particle marks sudden perception or attention. 'Behold' preserves
    the vivid deictic force and prophetic style better than the more colloquial 'look'
    or the flatter 'there was.'
- source_word: אֶל שְׂפַת הַנַּחַל
  chosen: on the bank of the stream
  alternatives:
  - at the edge of the wadi
  - by the bank of the river
  lexicon: HALOT
  rationale: שָׂפָה here means 'edge, bank, lip.' נַחַל can denote a wadi, torrent-bed,
    or stream. In this visionary context with flowing water, 'stream' is more natural
    English than 'wadi' and avoids overstating with 'river,' which may suggest a larger
    watercourse than the Hebrew term itself requires.
- source_word: עֵץ רַב מְאֹד
  chosen: very many trees
  alternatives:
  - a great many trees
  - trees in great abundance
  lexicon: HALOT
  rationale: Although עֵץ is formally singular, it can function collectively. Given
    the adjective רַב and the distributive phrase that follows, the sense is plural
    abundance. 'Very many trees' reflects the collective singular plus intensifier
    מְאֹד in clear modern English.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that side
  alternatives:
  - on both sides
  - from here and from there
  lexicon: HALOT
  rationale: The idiom is distributive, indicating both sides of the stream. 'On this
    side and on that side' preserves the Hebrew spatial vividness more fully than
    the compressed 'on both sides,' though the latter is a valid interpretive equivalent.
