id: EZK.47.16
reference: Ezekiel 47:16
source:
  edition: WLC
  text: חֲמָ֤ת בֵּר֨וֹתָה֙ סִבְרַ֔יִם אֲשֶׁר֙ בֵּין גְּב֣וּל דַּמֶּ֔שֶׂק וּ/בֵ֖ין
    גְּב֣וּל חֲמָ֑ת חָצֵר֙ הַתִּיכ֔וֹן אֲשֶׁ֖ר אֶל גְּב֥וּל חַוְרָֽן׀־־׃
translation:
  text: Hamath, Berothah, Sibraim—which is between the border of Damascus and the
    border of Hamath—Hazer-hattikon, which is by the border of Hauran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Berothah; some compare the related place name 'Berothai' in 2 Samuel
      8:8.
    reason: alternative_reading
  - marker: b
    text: Hazer-hattikon is likely a place name; literally, the components mean something
      like 'middle enclosure/settlement.'
    reason: lexical_alternative
  - marker: c
    text: Or 'which is toward the border of Hauran.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמָת
  chosen: Hamath
  alternatives:
  - Lebo-hamath
  lexicon: HALOT
  rationale: Proper place name transliterated by standard English convention. In this
    boundary list it most naturally refers to Hamath, not the fuller expression 'Lebo-hamath,'
    which is not present here.
- source_word: בֵּרוֹתָה
  chosen: Berothah
  alternatives:
  - Berothai
  lexicon: HALOT
  rationale: Proper place name transliterated directly from the Hebrew form. 'Berothai'
    reflects a variant/traditional form known from related passages, but the MT here
    reads Berothah.
- source_word: סִבְרַיִם
  chosen: Sibraim
  alternatives:
  - Sibriam
  lexicon: HALOT
  rationale: Proper place name transliterated from Hebrew. English spelling varies
    slightly; 'Sibraim' closely reflects the consonants and common scholarly convention.
- source_word: אֲשֶׁר בֵּין גְּבוּל דַּמֶּשֶׂק וּבֵין גְּבוּל חֲמָת
  chosen: which is between the border of Damascus and the border of Hamath
  alternatives:
  - which lies between the territory of Damascus and the territory of Hamath
  - that is between the boundary of Damascus and the boundary of Hamath
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the immediately preceding
    place name, Sibraim. גְּבוּל is rendered 'border' in this geographic delimitation
    context. Repeating 'the border of' preserves the Hebrew structure.
- source_word: חָצֵר הַתִּיכוֹן
  chosen: Hazer-hattikon
  alternatives:
  - Middle Hazer
  - Hazar-hatticon
  lexicon: HALOT
  rationale: Treated as a compound place name and transliterated, since the verse
    is a boundary itinerary of toponyms. Although the components mean something like
    'middle settlement/court,' translating them would obscure that this functions
    as a proper name.
- source_word: אֲשֶׁר אֶל גְּבוּל חַוְרָן
  chosen: which is by the border of Hauran
  alternatives:
  - which is toward the border of Hauran
  - which reaches to the border of Hauran
  lexicon: HALOT
  rationale: אֶל in boundary descriptions can indicate direction or proximity. 'By
    the border of Hauran' gives natural English while preserving the geographic sense
    without overstating extension. 'Hauran' is the standard English transliteration
    of the region name.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: In this land-boundary context, 'border' is the clearest modern English
    rendering. 'Boundary' is possible but slightly less natural in a place-name list;
    'territory' would shift the sense from line/limit to region.
