theological_decisions:
- issue: Status of the גֵּר in the restored-land allotment
  chosen_reading: The verse grants resident sojourners with established families inheritance
    rights alongside native Israelites.
  alternative_readings:
  - The verse merely grants protection or residence, not land inheritance.
  - The verse applies only symbolically, not to actual land allotment.
  rationale: The repeated inheritance language (נַחֲלָה; תַּפִּלוּ; יִפְּלוּ) and
    the comparison 'like a native among the sons of Israel' indicate real inclusion
    in the land allotment, not merely social tolerance. The translation should preserve
    this force without importing later theological systems.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Rendering of בָנִים in 'have fathered children among you'
  chosen_reading: Generic offspring is intended, rendered 'children.'
  alternative_readings:
  - '''sons'' as a more formally literal rendering'
  rationale: Although בָנִים is formally 'sons,' in this context the emphasis is on
    multigenerational establishment within the community. Rendering 'children' communicates
    the social-legal point without overstating male specificity, while the lexical
    decision documents the formal alternative.
  doctrine_reference: Gender-accurate over gender-neutral.
