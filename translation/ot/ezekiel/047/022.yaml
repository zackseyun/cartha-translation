id: EZK.47.22
reference: Ezekiel 47:22
source:
  edition: WLC
  text: וְ/הָיָ֗ה תַּפִּ֣לוּ אוֹתָ/הּ֮ בְּ/נַחֲלָה֒ לָ/כֶ֗ם וּ/לְ/הַ/גֵּרִים֙ הַ/גָּרִ֣ים
    בְּ/תוֹכְ/כֶ֔ם אֲשֶׁר הוֹלִ֥דוּ בָנִ֖ים בְּ/תֽוֹכְ/כֶ֑ם וְ/הָי֣וּ לָ/כֶ֗ם כְּ/אֶזְרָח֙
    בִּ/בְנֵ֣י יִשְׂרָאֵ֔ל אִתְּ/כֶם֙ יִפְּל֣וּ בְ/נַחֲלָ֔ה בְּ/ת֖וֹךְ שִׁבְטֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And it shall be that you shall allot it as an inheritance for yourselves and
    for the sojourners who sojourn among you, who have fathered children among you;
    and they shall be to you like a native among the sons of Israel. With you they
    shall receive an inheritance among the tribes of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners' or 'resident aliens'; Hebrew גֵּר refers to a non-native
      residing among Israel with recognized standing.
    reason: lexical_alternative
  - marker: b
    text: Literally 'have begotten sons.'
    reason: lexical_alternative
  - marker: c
    text: Or 'as a native-born.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּפִּלוּ / יִפְּלוּ (נפל in Hiphil/Qal with נַחֲלָה)
  chosen: allot / receive an inheritance
  alternatives:
  - divide
  - assign
  - fall by lot
  - have an allotment
  lexicon: HALOT
  rationale: The idiom concerns apportioning land as inheritance. In the first clause
    the Hiphil is causative ('you shall allot'), while in the later clause the Qal
    expresses the resulting receipt of inheritance ('they shall receive an inheritance').
    This preserves the Hebrew wordplay while using natural English.
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - heritage
  - allotted possession
  lexicon: HALOT
  rationale: In Ezekiel's land-distribution context, נַחֲלָה refers specifically to
    inherited land allotment. 'Inheritance' is the most standard and contextually
    precise rendering.
- source_word: הַגֵּרִים
  chosen: sojourners
  alternatives:
  - foreigners
  - resident aliens
  - strangers
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel with recognized social
    standing, not merely a passing foreigner. 'Sojourners' preserves the covenantal-legal
    nuance better than the more modern but bureaucratic 'resident aliens'.
- source_word: הַגָּרִים בְּתוֹכְכֶם
  chosen: who sojourn among you
  alternatives:
  - who reside among you
  - living in your midst
  lexicon: HALOT
  rationale: This renders the participial phrase with verbal force and keeps the lexical
    connection to גֵּר. 'Among you' is idiomatic for בְּתוֹכְכֶם.
- source_word: הוֹלִדוּ בָנִים
  chosen: have fathered children
  alternatives:
  - have begotten sons
  - have had children
  lexicon: HALOT
  rationale: The Hiphil of ילד here naturally refers to begetting/fathering. 'Children'
    is preferable to 'sons' because בָנִים can function generically for offspring
    in context, and the point is settled family continuity within the land rather
    than male offspring specifically.
- source_word: כְּאֶזְרָח
  chosen: like a native
  alternatives:
  - as a native-born
  - like a citizen
  lexicon: HALOT
  rationale: אֶזְרָח denotes a native member of the land/community. 'Like a native'
    is clear modern English and preserves the comparative force of כְּ.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the children of Israel
  - among the Israelites
  lexicon: HALOT
  rationale: This keeps the familial-national expression of the Hebrew. 'Sons of Israel'
    is more formally transparent than 'Israelites,' while remaining understandable.
- source_word: אִתְּכֶם
  chosen: With you
  alternatives:
  - along with you
  - beside you
  lexicon: HALOT
  rationale: The term emphasizes co-participation in the allotment. 'With you' is
    concise and preserves the inclusion of the sojourners alongside Israel.
- source_word: בְּתוֹךְ שִׁבְטֵי יִשְׂרָאֵל
  chosen: among the tribes of Israel
  alternatives:
  - in the midst of the tribes of Israel
  lexicon: HALOT
  rationale: This phrase specifies the location of the inheritance distribution within
    Israel's tribal structure. 'Among' is natural and accurate.
