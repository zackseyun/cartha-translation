theological_decisions:
- issue: Visionary healing imagery of the waters
  chosen_reading: 'Retain the healing language as metaphorically real within the vision:
    ''these waters go there and are healed.'''
  alternative_readings:
  - Render more interpretively as 'the waters become fresh' or 'the waters are made
    wholesome'
  rationale: The text uses healing language for waters, and preserving that imagery
    maintains the theological symbolism of restoration without importing later doctrinal
    claims.
  doctrine_reference: Translation philosophy §1, §3
