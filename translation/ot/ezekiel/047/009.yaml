id: EZK.47.9
reference: Ezekiel 47:9
source:
  edition: WLC
  text: וְ/הָיָ֣ה כָל נֶ֣פֶשׁ חַיָּ֣ה אֲֽשֶׁר יִשְׁרֹ֡ץ אֶ֣ל כָּל אֲשֶׁר֩ יָב֨וֹא
    שָׁ֤ם נַחֲלַ֨יִם֙ יִֽחְיֶ֔ה וְ/הָיָ֥ה הַ/דָּגָ֖ה רַבָּ֣ה מְאֹ֑ד כִּי֩ בָ֨אוּ שָׁ֜מָּ/ה
    הַ/מַּ֣יִם הָ/אֵ֗לֶּה וְ/יֵרָֽפְאוּ֙ וָ/חָ֔י כֹּ֛ל אֲשֶׁר יָ֥בוֹא שָׁ֖מָּ/ה הַ/נָּֽחַל־׀־־־׃
translation:
  text: And every living creature that swarms, wherever the two streams go, will live.
    And there will be very many fish, because these waters go there and are healed;
    everything will live wherever the river goes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a dual/plural form, literally 'streams' or 'rivers'; many translations
      smooth this to the singular 'river.'
    reason: lexical_alternative
  - marker: b
    text: Or 'these waters go there, so that the waters there are healed.' The Hebrew
      healing imagery is explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ חַיָּה
  chosen: living creature
  alternatives:
  - living being
  - living soul
  lexicon: HALOT
  rationale: The phrase denotes animate life generally, not specifically human 'soul.'
    'Living creature' is natural English and fits the aquatic context.
- source_word: יִשְׁרֹץ
  chosen: swarms
  alternatives:
  - teems
  - moves abundantly
  lexicon: HALOT
  rationale: The verb commonly describes swarming/teeming creatures, especially in
    water. 'Swarms' preserves the vivid biological sense.
- source_word: נַחֲלַיִם
  chosen: the two streams
  alternatives:
  - the rivers
  - the river channels
  lexicon: HALOT
  rationale: The form is dual/plural in this verse, likely referring to the divided
    flow of the temple river. Rendering it as 'the two streams' reflects the morphology
    more closely than the traditional singular.
- source_word: יִחְיֶה
  chosen: will live
  alternatives:
  - will come to life
  - will thrive
  lexicon: HALOT
  rationale: Simple future 'will live' best matches the Hebrew and avoids over-interpretation.
- source_word: הַדָּגָה
  chosen: fish
  alternatives:
  - fishing stock
  - sea life
  lexicon: HALOT
  rationale: Collective noun for fish population. 'Fish' is idiomatic English for
    the collective sense.
- source_word: רַבָּה מְאֹד
  chosen: very many
  alternatives:
  - very great
  - exceedingly abundant
  lexicon: HALOT
  rationale: This expresses abundance of fish; 'very many' is clear, natural, and
    contextually precise.
- source_word: וְיֵרָפְאוּ
  chosen: are healed
  alternatives:
  - are made fresh
  - are restored to health
  lexicon: HALOT
  rationale: The Niphal of רפא means 'be healed.' Keeping 'healed' preserves the metaphor
    of restoration in the waters rather than flattening it to a merely physical process.
- source_word: וָחָי כֹּל
  chosen: everything will live
  alternatives:
  - every living thing will live
  - all will live
  lexicon: HALOT
  rationale: The clause is comprehensive and summarizes the life-giving effect of
    the river. 'Everything will live' is concise and faithful.
- source_word: הַנָּחַל
  chosen: the river
  alternatives:
  - the stream
  - the wadi
  lexicon: HALOT
  rationale: Though נחל can mean seasonal torrent/wadi, in this visionary context
    it is a sustained life-giving watercourse; 'river' is the clearest English rendering.
