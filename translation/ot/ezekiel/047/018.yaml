id: EZK.47.18
reference: Ezekiel 47:18
source:
  edition: WLC
  text: וּ/פְאַ֣ת קָדִ֡ים מִ/בֵּ֣ין חַוְרָ֣ן וּ/מִ/בֵּין דַּמֶּשֶׂק֩ וּ/מִ/בֵּ֨ין
    הַ/גִּלְעָ֜ד וּ/מִ/בֵּ֨ין אֶ֤רֶץ יִשְׂרָאֵל֙ הַ/יַּרְדֵּ֔ן מִ/גְּב֛וּל עַל הַ/יָּ֥ם
    הַ/קַּדְמוֹנִ֖י תָּמֹ֑דּוּ וְ/אֵ֖ת פְּאַ֥ת קָדִֽימָ/ה־־׃
translation:
  text: And the eastern side shall be from between Hauran and Damascus, and from between
    Gilead and the land of Israel, the Jordan, from the border to the eastern sea;
    you shall measure the eastern side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more specifically, ''the Dead Sea''; Hebrew: ''the eastern sea.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פְאַת
  chosen: side
  alternatives:
  - border
  - edge
  - corner
  lexicon: HALOT
  rationale: In this boundary-description context, פאה refers to a territorial side
    or boundary line rather than a geometric 'corner.' 'Side' reads naturally in English
    while preserving the land-allotment sense.
- source_word: קָדִים / קָדִימָה
  chosen: eastern
  alternatives:
  - east
  - eastward
  lexicon: HALOT
  rationale: The phrase פאת קדים denotes the eastern side/border. The final קָדִימָה
    repeats and reinforces the directional designation; rendering both with 'eastern'
    keeps the boundary formula clear in English.
- source_word: מִבֵּין ... וּמִבֵּין ...
  chosen: from between ... and ...
  alternatives:
  - between ... and ...
  - from the area between ... and ...
  lexicon: HALOT
  rationale: The repeated מן + בין construction marks the boundary as lying between
    named regions. Retaining 'from between' reflects the Hebrew structure more closely,
    though somewhat idiomatically smoothed in the full sentence.
- source_word: חַוְרָן
  chosen: Hauran
  alternatives:
  - Hawran
  rationale: Standard English transliteration of the place name.
- source_word: דַּמֶּשֶׂק
  chosen: Damascus
  rationale: Conventional English form of the place name.
- source_word: הַגִּלְעָד
  chosen: Gilead
  rationale: Conventional English form of the regional name.
- source_word: אֶרֶץ יִשְׂרָאֵל
  chosen: the land of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase explicitly includes 'land,' and retaining it helps
    distinguish the territory from the people.
- source_word: הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  rationale: The Hebrew names the river directly. 'The Jordan' is standard English
    and sufficiently clear in a boundary list.
- source_word: מִגְּבוּל
  chosen: from the border
  alternatives:
  - from the boundary
  lexicon: HALOT
  rationale: גְּבוּל is a standard term for border/boundary. 'Border' is concise and
    natural in this geographic context.
- source_word: הַיָּם הַקַּדְמוֹנִי
  chosen: the eastern sea
  alternatives:
  - the eastern sea
  - the Dead Sea
  lexicon: HALOT
  rationale: Literally 'the eastern sea.' Because the Hebrew uses the descriptive
    title rather than the later conventional name, the main text preserves the source
    wording; the likely referent can be noted in a footnote.
- source_word: תָּמֹדּוּ
  chosen: you shall measure
  alternatives:
  - you shall mark off
  - you shall delimit
  lexicon: HALOT
  rationale: From מדד, 'measure.' In context it refers to laying out or marking the
    boundary. 'You shall measure' preserves the verbal form and echoes the chapter's
    measuring language.
