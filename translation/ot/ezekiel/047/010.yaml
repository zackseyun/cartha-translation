id: EZK.47.10
reference: Ezekiel 47:10
source:
  edition: WLC
  text: וְ/הָיָה֩ יעמדו עָלָ֜י/ו דַּוָּגִ֗ים מֵ/עֵ֥ין גֶּ֨דִי֙ וְ/עַד עֵ֣ין עֶגְלַ֔יִם
    מִשְׁט֥וֹחַ לַֽ/חֲרָמִ֖ים יִהְי֑וּ לְ/מִינָ/ה֙ תִּהְיֶ֣ה דְגָתָ֔/ם כִּ/דְגַ֛ת
    הַ/יָּ֥ם הַ/גָּד֖וֹל רַבָּ֥ה מְאֹֽד־׃
translation:
  text: And it will happen that fishermen will stand beside it; from En-gedi even
    to En-eglaim there will be a place for spreading nets. Their fish will be of many
    kinds, like the fish of the Great Sea, very many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'their fish will be according to its kind,' expressing
      a great variety of species.
    reason: lexical_alternative
  - marker: b
    text: '''The Great Sea'' refers to the Mediterranean Sea.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall be
  - Then it will be
  lexicon: HALOT
  rationale: Introduces a future-result scene in prophetic narrative. 'And it will
    happen' preserves the Hebrew discourse marker without sounding archaic.
- source_word: יעמדו
  chosen: will stand
  alternatives:
  - will station themselves
  - will be standing
  lexicon: HALOT
  rationale: The verb עמד commonly means 'stand' or 'take one's stand.' Here it depicts
    fishermen positioned along the waters.
- source_word: עָלָיו
  chosen: beside it
  alternatives:
  - upon it
  - by it
  - along it
  lexicon: HALOT
  rationale: With the river/waters in view, English idiom favors 'beside it' rather
    than the more wooden 'upon it.' 'Along it' is possible, but 'beside it' best matches
    fishermen standing at the water's edge.
- source_word: דַּוָּגִים
  chosen: fishermen
  alternatives:
  - fishers
  lexicon: HALOT
  rationale: Standard, natural English for those who catch fish. 'Fishers' is possible
    but less natural in contemporary prose.
- source_word: מֵעֵין גֶּדִי
  chosen: from En-gedi
  alternatives:
  - from En Gedi
  lexicon: HALOT
  rationale: Place name is transliterated per translation policy. Hyphenated conventional
    English form retained.
- source_word: וְעַד עֵין עֶגְלַיִם
  chosen: even to En-eglaim
  alternatives:
  - to En-eglaim
  lexicon: HALOT
  rationale: Marks the extent of the shoreline/region. 'Even to' reflects the full
    range indicated by מִן...וְעַד.
- source_word: מִשְׁטוֹחַ לַחֲרָמִים
  chosen: there will be a place for spreading nets
  alternatives:
  - it will be a spreading place for nets
  - a place to spread nets
  lexicon: HALOT
  rationale: מִשְׁטוֹחַ denotes a spreading-out place/surface, and חֲרָמִים are fishing
    nets. The supplied 'a place for' makes the Hebrew nominal clause natural in English.
- source_word: לְמִינָה
  chosen: of many kinds
  alternatives:
  - according to its kind
  - by their kinds
  lexicon: HALOT
  rationale: Although literally 'according to its kind,' the sense here is variety
    of species. 'Of many kinds' communicates the distributive idea idiomatically in
    context.
- source_word: דְגָתָם
  chosen: Their fish
  alternatives:
  - its fish
  lexicon: HALOT
  rationale: The suffix is plural masculine, referring to the waters/region just described
    in a collective sense. 'Their fish' follows the morphology most directly, though
    English could smooth to 'its fish.'
- source_word: כִּדְגַת הַיָּם הַגָּדוֹל
  chosen: like the fish of the Great Sea
  alternatives:
  - like the fish of the Mediterranean Sea
  - like the fish of the great sea
  lexicon: HALOT
  rationale: '''The Great Sea'' is the conventional biblical designation and preserves
    the source expression. Identifying it as the Mediterranean is interpretively correct
    but better left implicit in the main text.'
- source_word: רַבָּה מְאֹד
  chosen: very many
  alternatives:
  - exceedingly many
  - very abundant
  lexicon: HALOT
  rationale: Expresses great abundance of fish. 'Very many' is concise and natural
    in English.
