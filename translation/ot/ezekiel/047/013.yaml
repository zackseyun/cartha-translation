id: EZK.47.13
reference: Ezekiel 47:13
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה גֵּ֤ה גְבוּל֙ אֲשֶׁ֣ר תִּתְנַחֲל֣וּ אֶת הָ/אָ֔רֶץ לִ/שְׁנֵ֥י עָשָׂ֖ר שִׁבְטֵ֣י יִשְׂרָאֵ֑ל יוֹסֵ֖ף חֲבָלִֽים־׃
translation:
  text: 'Thus says the Lord GOD: This is the boundary by which you shall apportion the land as an inheritance among the twelve tribes of Israel; Joseph shall have two portions.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Joseph, portions'—that is, Joseph is to receive a double territorial share.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered according to the doctrinal default as 'the LORD'; in the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'Lord GOD.' This preserves the title sense while respecting the default treatment of the Tetragrammaton.
- source_word: גֵּה גְבוּל
  chosen: This is the boundary
  alternatives:
  - This is the territory boundary
  - This is the border
  lexicon: HALOT
  rationale: The deictic particle plus noun introduces the delineation that follows. 'Boundary' fits the land-allotment context and is more natural than a hyper-literal rendering while remaining close to the Hebrew.
- source_word: תִּתְנַחֲלוּ
  chosen: you shall apportion ... as an inheritance
  alternatives:
  - you shall inherit
  - you shall divide for inheritance
  lexicon: HALOT
  rationale: The Hitpael of נחל in this context refers not merely to receiving inheritance but to taking/distributing the land as inherited allotments. 'Apportion ... as an inheritance' captures both the distributive and inheritance sense better than simply 'inherit'.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Ezekiel's restoration-land context, 'the land' is the natural and sufficiently formal rendering.
- source_word: לִשְׁנֵי עָשָׂר שִׁבְטֵי יִשְׂרָאֵל
  chosen: among the twelve tribes of Israel
  alternatives:
  - for the twelve tribes of Israel
  - to the twelve tribes of Israel
  lexicon: HALOT
  rationale: The preposition marks the relation of the apportionment to the tribes. 'Among' communicates distribution clearly in idiomatic English.
- source_word: יוֹסֵף חֲבָלִים
  chosen: Joseph shall have two portions
  alternatives:
  - 'Joseph: portions'
  - Joseph, two allotments
  - Joseph shall receive portions
  lexicon: HALOT
  rationale: חֲבָלִים literally denotes measuring lines/tracts/portions. In this allotment context it refers to territorial shares. Because Joseph historically receives a double share through Ephraim and Manasseh, 'two portions' makes explicit the idiomatic force that would otherwise be obscure in English.
