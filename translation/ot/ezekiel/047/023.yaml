theological_decisions:
- issue: Rendering of the covenant name יְהוָה in the divine formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD.' In the compound title אֲדֹנָי יְהוִה, English convention commonly uses
    'Lord GOD' to represent both elements distinctly and reverently. This preserves
    the source's double divine title while aligning with the project's stated handling
    of YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
