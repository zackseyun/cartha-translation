id: EZK.47.23
reference: Ezekiel 47:23
source:
  edition: WLC
  text: וְ/הָיָ֣ה בַ/שֵּׁ֔בֶט אֲשֶׁר גָּ֥ר הַ/גֵּ֖ר אִתּ֑/וֹ שָׁ֚ם תִּתְּנ֣וּ נַחֲלָת֔/וֹ
    נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־׃ס
translation:
  text: And it shall be that in the tribe with which the sojourner resides, there
    you shall give him his inheritance, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resident alien' for 'sojourner'; the Hebrew גֵּר refers to a non-native
      person settled among Israel under its communal order, not merely a temporary
      traveler.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be that
  alternatives:
  - And it shall come to pass
  - And it shall be
  lexicon: HALOT
  rationale: Formulaic future-oriented discourse marker introducing a legal stipulation.
    'And it shall be that' preserves the formal force without archaic excess.
- source_word: בַשֵּׁבֶט
  chosen: in the tribe
  alternatives:
  - within the tribe
  - among the tribe
  lexicon: HALOT
  rationale: שֵׁבֶט here refers to a tribal territorial unit in the land-allotment
    context, not a rod/scepter. 'In the tribe' is the most natural legal-geographical
    rendering.
- source_word: אֲשֶׁר גָּר הַגֵּר אִתּוֹ
  chosen: with which the sojourner resides
  alternatives:
  - where the foreigner sojourns with him
  - with whom the resident alien dwells
  lexicon: HALOT
  rationale: גֵּר denotes a resident outsider living among Israel, not merely a passing
    foreigner. 'Sojourner' preserves the covenant-legal category with readable English.
    The singular pronominal suffix in אִתּוֹ is best taken distributively with the
    tribe/tribesman context; English 'with which' smooths the construction while keeping
    the sense that the sojourner lives in association with that tribe.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Adverb of location emphasizing that the inheritance is to be assigned
    in the very tribe where the sojourner lives.
- source_word: תִּתְּנוּ
  chosen: you shall give
  alternatives:
  - you shall assign
  - you shall grant
  lexicon: HALOT
  rationale: Second person plural legal imperative/future. 'Give' is straightforward
    and preserves the directness of נתן in allotment language.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his allotted inheritance
  - his property share
  lexicon: HALOT
  rationale: נַחֲלָה in this context is inherited land allotment. 'His inheritance'
    is the standard and sufficiently precise rendering.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: Prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD.'
    Because אֲדֹנָי precedes it, 'Lord GOD' follows standard English convention to
    distinguish the two divine titles without producing 'Lord LORD.'
