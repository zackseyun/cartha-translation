id: EZK.47.11
reference: Ezekiel 47:11
source:
  edition: WLC
  text: בצאת/ו וּ/גְבָאָ֛י/ו וְ/לֹ֥א יֵרָפְא֖וּ לְ/מֶ֥לַח נִתָּֽנוּ׃
translation:
  text: But its swamps and marshes will not be healed; they are left for salt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they are given over for salt.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'be healed,' continuing the chapter's imagery of waters
      being healed or made fresh.
    reason: lexical_alternative
lexical_decisions:
- source_word: בצאתו
  chosen: its swamps
  alternatives:
  - its marshland
  - its bogs
  lexicon: HALOT
  rationale: The noun from יצא in this topographical context refers to places where
    water flows out or stands in low, marshy areas. English 'swamps' captures the
    sense naturally. The 3ms suffix refers back to the river/sea region in context,
    so 'its' is retained.
- source_word: וגבאיו
  chosen: and marshes
  alternatives:
  - and pools
  - and stagnant places
  lexicon: HALOT
  rationale: 'גבא denotes pools, pits, or marshy depressions. In parallel with בצאתו,
    a wetland term is preferable to a more generic ''pools,'' since the verse contrasts
    these areas with waters that become fresh. ''Marshes'' gives a natural English
    pairing: ''swamps and marshes.'''
- source_word: ולא
  chosen: will not
  alternatives:
  - shall not
  lexicon: HALOT
  rationale: Standard negation of the following verb. 'Will not' is readable modern
    English.
- source_word: ירפאו
  chosen: be healed
  alternatives:
  - be made fresh
  - be restored
  lexicon: HALOT
  rationale: The Niphal of רפא literally means 'be healed.' In the immediate context
    of waters being healed/freshened, 'be healed' preserves the metaphor used throughout
    the passage better than flattening it to 'be made fresh,' though that sense is
    contextually implied.
- source_word: למלח
  chosen: for salt
  alternatives:
  - to salt
  - as salt land
  lexicon: HALOT
  rationale: 'The preposition ל marks purpose/result: these areas are given over for
    salt. ''For salt'' is concise and idiomatic enough in context.'
- source_word: נתנו
  chosen: they are left
  alternatives:
  - they are given over
  - they are given
  lexicon: HALOT
  rationale: The passive sense indicates designation of these marshy areas for salt.
    'They are left for salt' communicates both the passive form and the contextual
    idea that these places remain unhealed, while avoiding awkward English in the
    main text.
