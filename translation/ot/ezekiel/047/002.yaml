id: EZK.47.2
reference: Ezekiel 47:2
source:
  edition: WLC
  text: וַ/יּוֹצִאֵ/נִי֮ דֶּֽרֶךְ שַׁ֣עַר צָפוֹנָ/ה֒ וַ/יְסִבֵּ֨/נִי֙ דֶּ֣רֶךְ ח֔וּץ
    אֶל שַׁ֣עַר הַ/ח֔וּץ דֶּ֖רֶךְ הַ/פּוֹנֶ֣ה קָדִ֑ים וְ/הִנֵּה מַ֣יִם מְפַכִּ֔ים
    מִן הַ/כָּתֵ֖ף הַ/יְמָנִֽית־־־־׃
translation:
  text: Then he brought me out by way of the north gate, and led me around by the
    outside way to the outer gate, the one facing east; and behold, water was trickling
    from the right side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'water was bubbling out' or 'water was flowing out'; the Hebrew verb
      suggests a small emerging flow rather than a large current.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the right shoulder'; here 'shoulder' refers to the side
      or flank of the structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִאֵנִי
  chosen: he brought me out
  alternatives:
  - he led me out
  lexicon: HALOT
  rationale: The hiphil of יצא means to cause someone to go out, hence 'bring out'
    or 'lead out.' 'Brought me out' fits the movement from the inner area to outside
    the gate and reads naturally in English.
- source_word: דֶּרֶךְ שַׁעַר צָפוֹנָה
  chosen: by way of the north gate
  alternatives:
  - through the north gate
  - by the way of the gate toward the north
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, path, route.' Here it marks the route taken.
    'By way of the north gate' preserves the directional sense without over-literal
    awkwardness. צָפוֹנָה is directional, 'northward/to the north,' idiomatically
    rendered 'north gate.'
- source_word: וַיְסִבֵּנִי
  chosen: led me around
  alternatives:
  - brought me around
  - caused me to go around
  lexicon: HALOT
  rationale: The verb סבב in hiphil conveys causing someone to go around or circuit
    around. 'Led me around' is idiomatic and matches the guided temple-tour context.
- source_word: דֶּרֶךְ חוּץ
  chosen: by the outside way
  alternatives:
  - by the outer way
  - by way of the outside
  lexicon: HALOT
  rationale: חוּץ denotes the outside/exterior. The phrase indicates the route ran
    externally around the structure. 'By the outside way' keeps the spatial force
    while remaining readable.
- source_word: אֶל שַׁעַר הַחוּץ
  chosen: to the outer gate
  alternatives:
  - to the outside gate
  - to the exterior gate
  lexicon: HALOT
  rationale: הַחוּץ functions adjectivally with 'gate' in context, referring to the
    outer gate of the temple complex. 'Outer gate' is the standard and clearest English
    rendering.
- source_word: דֶּרֶךְ הַפּוֹנֶה קָדִים
  chosen: the one facing east
  alternatives:
  - by way of the gate facing east
  - which faces east
  lexicon: HALOT
  rationale: The participle פנה with קָדִים describes orientation. Since it modifies
    the outer gate, 'the one facing east' is concise and clear in English.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a new visual detail.
    'Behold' preserves the vividness and prophetic register better than flatter alternatives.
- source_word: מַיִם מְפַכִּים
  chosen: water was trickling
  alternatives:
  - water was flowing out
  - water was bubbling out
  lexicon: HALOT
  rationale: פכה denotes a small, gushing or trickling flow rather than a full stream.
    The singular English mass noun 'water was trickling' best captures the incipient
    flow seen at this stage of the vision.
- source_word: מִן הַכָּתֵף הַיְמָנִית
  chosen: from the right side
  alternatives:
  - from the right shoulder
  - from the right flank
  lexicon: HALOT
  rationale: כָּתֵף literally means 'shoulder,' but in architectural/topographical
    usage it refers to a side or flank. 'Right side' is the natural contextual rendering
    for the side of the temple/gate structure, avoiding an overly anatomical English
    expression.
