id: EZK.47.21
reference: Ezekiel 47:21
source:
  edition: WLC
  text: וְ/חִלַּקְתֶּ֞ם אֶת הָ/אָ֧רֶץ הַ/זֹּ֛את לָ/כֶ֖ם לְ/שִׁבְטֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: So you shall divide this land among yourselves according to the tribes of
    Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And you shall divide this land for yourselves, for the tribes of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִלַּקְתֶּם
  chosen: So you shall divide
  alternatives:
  - And you shall divide
  - you shall apportion
  lexicon: HALOT
  rationale: The verb from חלק in the Piel means to divide/apportion. English 'divide'
    is the most direct rendering here. The prefixed conjunction ו is rendered 'So'
    rather than a bare 'And' to reflect the inferential/continuative force from the
    preceding boundary description while remaining natural in English.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Hebrew direct object marker has no independent English equivalent and
    is not represented in the translation.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this territory
  lexicon: HALOT
  rationale: The phrase literally means 'this land.' 'Land' is the standard and sufficiently
    broad rendering for אֶרֶץ in this territorial-allotment context; 'territory' is
    possible but less direct.
- source_word: לָכֶם
  chosen: among yourselves
  alternatives:
  - for yourselves
  - to yourselves
  lexicon: HALOT
  rationale: The preposition plus pronoun literally means 'for/to yourselves.' In
    context of distributing the land to the community, 'among yourselves' best conveys
    reciprocal/internal distribution in idiomatic English without adding meaning beyond
    the allotment context.
- source_word: לְשִׁבְטֵי יִשְׂרָאֵל
  chosen: according to the tribes of Israel
  alternatives:
  - to the tribes of Israel
  - for the tribes of Israel
  lexicon: HALOT
  rationale: The ל preposition here marks relation or distribution with respect to
    the tribal divisions. 'According to the tribes of Israel' makes explicit that
    the division is structured by tribal allotment, which fits the immediate context
    better than the more ambiguous 'to/for the tribes of Israel.'
