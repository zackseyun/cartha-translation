id: EZK.47.12
reference: Ezekiel 47:12
source:
  edition: WLC
  text: וְ/עַל הַ/נַּ֣חַל יַעֲלֶ֣ה עַל שְׂפָת֣/וֹ מִ/זֶּ֣ה וּ/מִ/זֶּ֣ה כָּל עֵֽץ מַ֠אֲכָל
    לֹא יִבּ֨וֹל עָלֵ֜/הוּ וְ/לֹֽא יִתֹּ֣ם פִּרְי֗/וֹ לָֽ/חֳדָשָׁי/ו֙ יְבַכֵּ֔ר כִּ֣י
    מֵימָ֔י/ו מִן הַ/מִּקְדָּ֖שׁ הֵ֣מָּה יֽוֹצְאִ֑ים ו/היו פִרְי/וֹ֙ לְ/מַֽאֲכָ֔ל
    וְ/עָלֵ֖/הוּ לִ/תְרוּפָֽה־־׀׀־־־־־׃ס
translation:
  text: Along the river, on its bank, on this side and on that side, every kind of
    tree for food will grow. Its leaf will not wither, and its fruit will not fail;
    every month it will bear first-ripe fruit, because its waters are coming out from
    the sanctuary. Its fruit will be for food, and its leaf for healing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on both sides.' The Hebrew literally says 'from this side and from that
      side.'
    reason: lexical_alternative
  - marker: b
    text: Or 'every month it will bear fresh fruit.' The Hebrew verb carries the sense
      of producing early or first-ripe fruit.
    reason: lexical_alternative
  - marker: c
    text: Or 'for medicine' or 'for remedy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲלֶה
  chosen: will grow
  alternatives:
  - will go up
  - will spring up
  lexicon: HALOT
  rationale: The verb literally means 'go up/ascend,' but in context of vegetation
    appearing along the riverbank, idiomatic English is 'will grow' or 'spring up.'
    'Will grow' is natural and preserves the future sense without over-paraphrase.
- source_word: שְׂפָתוֹ
  chosen: its bank
  alternatives:
  - its lip
  - its shore
  lexicon: HALOT
  rationale: The noun literally denotes 'lip/edge'; for a river, 'bank' is the standard
    contextual equivalent in English.
- source_word: מִזֶּה וּמִזֶּה
  chosen: on this side and on that side
  alternatives:
  - on both sides
  - from here and from there
  lexicon: HALOT
  rationale: This expression marks both sides of the river. The fuller rendering preserves
    the Hebrew spatial vividness better than the compressed 'on both sides,' though
    that is a valid alternative.
- source_word: כָּל עֵץ מַאֲכָל
  chosen: every kind of tree for food
  alternatives:
  - every food tree
  - every tree for food
  - all kinds of food trees
  lexicon: HALOT
  rationale: The phrase denotes trees whose fruit is edible. 'Every kind of tree for
    food' preserves the distributive force of כָּל and the purpose nuance of מַאֲכָל.
- source_word: לֹא יִבּוֹל עָלֵהוּ
  chosen: Its leaf will not wither
  alternatives:
  - its foliage will not fade
  - its leaf will not droop
  lexicon: HALOT
  rationale: נבל in this stem commonly refers to withering/fading vegetation. Singular
    'leaf' follows the Hebrew collective singular and reads naturally in English.
- source_word: וְלֹא יִתֹּם פִּרְיוֹ
  chosen: its fruit will not fail
  alternatives:
  - its fruit will not be exhausted
  - its fruit will not come to an end
  lexicon: HALOT
  rationale: The verb means to be finished, complete, or come to an end. 'Will not
    fail' is concise, idiomatic, and captures the sense of unceasing productivity.
- source_word: לָחֳדָשָׁיו
  chosen: every month
  alternatives:
  - according to its months
  - month by month
  lexicon: HALOT
  rationale: The phrase indicates regular monthly production. 'Every month' communicates
    the temporal force clearly in modern English.
- source_word: יְבַכֵּר
  chosen: it will bear first-ripe fruit
  alternatives:
  - it will bring forth fresh fruit
  - it will produce early fruit
  - it will ripen firstfruits
  lexicon: HALOT
  rationale: The piel of בכר is related to first/early ripening. Many English versions
    flatten this to 'bear fresh fruit,' but 'first-ripe fruit' better preserves the
    lexical connection to early or first produce while remaining understandable.
- source_word: מֵימָיו
  chosen: its waters
  alternatives:
  - its water
  lexicon: HALOT
  rationale: The plural form is common in Hebrew for 'water/waters.' 'Its waters'
    preserves the form and fits the image of the river's life-giving flow.
- source_word: מִן הַמִּקְדָּשׁ
  chosen: from the sanctuary
  alternatives:
  - from the holy place
  - from the temple sanctuary
  lexicon: HALOT
  rationale: מקדש refers to the sanctuary/holy place. 'Sanctuary' is the most direct
    and contextually fitting rendering in Ezekiel's temple vision.
- source_word: לִתְרוּפָה
  chosen: for healing
  alternatives:
  - for medicine
  - for remedy
  lexicon: HALOT
  rationale: The noun denotes healing or medicinal use. 'For healing' is clear, natural,
    and preserves the restorative sense without narrowing it to pharmaceutical 'medicine'
    alone.
