theological_decisions:
- issue: Nature of the river's life-giving abundance in temple vision
  chosen_reading: 'Render the imagery straightforwardly without allegorical expansion:
    the trees'' fruit is for food and their leaves for healing because the waters
    come from the sanctuary.'
  alternative_readings:
  - Explicitly interpret the verse sacramentally or eschatologically in the translation
  rationale: The verse is richly theological within Ezekiel's vision, but the translation
    should not import later interpretive frameworks into the main text. The wording
    preserves the source imagery and causal connection while leaving broader theological
    synthesis to readers and notes.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Rendering of יְבַכֵּר
  chosen_reading: Preserve the lexical nuance of early/first-ripe produce in the main
    text.
  alternative_readings:
  - Render more interpretively as 'fresh fruit'
  rationale: The Hebrew verb carries a nuance tied to first or early ripening. Retaining
    that nuance avoids flattening the text and better reflects original-language primacy,
    even if 'fresh fruit' is smoother in English.
  doctrine_reference: Translation philosophy items 1 and 5
