id: EZK.47.6
reference: Ezekiel 47:6
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלַ֖/י הֲ/רָאִ֣יתָ בֶן אָדָ֑ם וַ/יּוֹלִכֵ֥/נִי וַ/יְשִׁבֵ֖/נִי
    שְׂפַ֥ת הַ/נָּֽחַל־׃
translation:
  text: Then he said to me, “Have you seen this, son of man?” Then he led me and brought
    me back to the bank of the stream.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Have you seen?”
    reason: lexical_alternative
  - marker: b
    text: Hebrew son of man.
    reason: lexical_alternative
  - marker: c
    text: Or “the edge of the stream”; Hebrew literally “the lip of the stream.”
    reason: lexical_alternative
  - marker: d
    text: Or “wadi” or “river,” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  chosen: Then he said to me
  alternatives:
  - And he said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    sequence while preserving the Hebrew flow.
- source_word: הֲרָאִיתָ
  chosen: Have you seen this
  alternatives:
  - Have you seen
  - Did you see
  lexicon: HALOT
  rationale: The interrogative with perfect 2ms asks whether Ezekiel has observed
    what was shown. 'Have you seen this' is idiomatic English and makes the implied
    object explicit from context without adding new content.
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human one
  - mortal
  lexicon: HALOT
  rationale: This is Ezekiel's standard divine address. A formal rendering preserves
    the recurring title and its literary/theological resonance. Although אדם can mean
    'man/humankind,' here the fixed vocative expression is best kept as 'son of man.'
- source_word: וַיּוֹלִכֵנִי
  chosen: he led me
  alternatives:
  - he caused me to go
  lexicon: HALOT
  rationale: The Hiphil of הלך is causative, but in context idiomatic English is 'led
    me.' This preserves the sense without wooden phrasing.
- source_word: וַיְשִׁבֵנִי
  chosen: brought me back
  alternatives:
  - returned me
  - caused me to return
  lexicon: HALOT
  rationale: The Hiphil of שוב is causative. 'Brought me back' is natural English
    and accurately conveys the movement back to a prior location.
- source_word: שְׂפַת
  chosen: bank
  alternatives:
  - edge
  - shore
  - lip
  lexicon: HALOT
  rationale: Literally 'lip/edge'; with a watercourse in view, 'bank' is the clearest
    contextual equivalent in modern English.
- source_word: הַנָּחַל
  chosen: the stream
  alternatives:
  - the wadi
  - the river
  - the torrent valley
  lexicon: HALOT
  rationale: נחל often denotes a wadi or streambed, but in this vision the watercourse
    is flowing and substantial. 'Stream' fits the immediate context better than 'wadi'
    while avoiding overstatement if rendered 'river.'
