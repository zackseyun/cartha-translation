theological_decisions:
- issue: Rendering of אדם within the vocative title בֶן אָדָם
  chosen_reading: son of man
  alternative_readings:
  - human one
  - mortal
  rationale: The doctrine calls for gender-accurate rendering and preserving source
    intent. Here the phrase functions as Ezekiel's repeated prophetic address, so
    the traditional but still transparent 'son of man' best preserves the Hebrew form
    and literary pattern.
