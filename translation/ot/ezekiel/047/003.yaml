id: EZK.47.3
reference: Ezekiel 47:3
source:
  edition: WLC
  text: בְּ/צֵאת הָ/אִ֥ישׁ קָדִ֖ים וְ/קָ֣ו בְּ/יָד֑/וֹ וַ/יָּ֤מָד אֶ֨לֶף֙ בָּֽ/אַמָּ֔ה
    וַ/יַּעֲבִרֵ֥/נִי בַ/מַּ֖יִם מֵ֥י אָפְסָֽיִם־׃
translation:
  text: As the man went out eastward with a measuring line in his hand, he measured
    a thousand cubits and led me through the water, water up to the ankles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'waters of ankles,' that is, water reaching the ankles.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/צֵאת
  chosen: As ... went out
  alternatives:
  - When ... went out
  - In the going out of
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks a temporal clause. 'As
    ... went out' gives natural English while preserving the temporal sense.
- source_word: הָ/אִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: אִישׁ is straightforwardly 'man' here, referring to the previously introduced
    male figure. This follows the gender-accurate policy and the narrative specificity.
- source_word: קָדִים
  chosen: eastward
  alternatives:
  - to the east
  - east
  lexicon: HALOT
  rationale: קָדִים here functions adverbially/directionally. 'Eastward' is concise
    and idiomatic in English.
- source_word: וְ/קָו
  chosen: with a measuring line
  alternatives:
  - and a line
  - and a measuring cord
  lexicon: HALOT
  rationale: קָו in this context is a measuring line/cord. Rendering the instrumental
    sense with 'with' reflects the following phrase 'in his hand' and clarifies function.
- source_word: בְּ/יָד/וֹ
  chosen: in his hand
  alternatives:
  - in his possession
  lexicon: HALOT
  rationale: A literal rendering fits the concrete visionary scene and is natural
    English.
- source_word: וַ/יָּמָד
  chosen: he measured
  alternatives:
  - and he measured
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. English need not repeat 'and' before
    every verb; 'he measured' is clear and readable.
- source_word: אֶלֶף
  chosen: a thousand
  lexicon: HALOT
  rationale: Standard cardinal number.
- source_word: בָּ/אַמָּה
  chosen: cubits
  alternatives:
  - by the cubit
  lexicon: HALOT
  rationale: 'In context of measuring distance, the phrase denotes the unit measured:
    ''a thousand cubits.'' This is the conventional and contextually clear sense.'
- source_word: וַ/יַּעֲבִרֵ/נִי
  chosen: led me through
  alternatives:
  - caused me to pass through
  - brought me through
  lexicon: HALOT
  rationale: The Hiphil of עבר means 'cause to pass through.' 'Led me through' is
    natural English that preserves the causative movement without sounding wooden.
- source_word: בַ/מַּיִם
  chosen: through the water
  alternatives:
  - through the waters
  - in the water
  lexicon: HALOT
  rationale: Though morphologically plural, מַיִם commonly takes singular English
    'water.' 'Through the water' fits the action of being led across/through it.
- source_word: מֵי אָפְסָיִם
  chosen: water up to the ankles
  alternatives:
  - ankle-deep water
  - waters of the ankles
  lexicon: HALOT
  rationale: The construct phrase literally denotes 'waters of ankles,' an idiom for
    water reaching the ankles. 'Water up to the ankles' is clear, accurate modern
    English.
