theological_decisions:
- issue: Metaphorical force of 'the chariots of Israel and its horsemen'
  chosen_reading: Retained as a direct exclamation addressed to Elisha, implying that
    the prophet is Israel's true strength and defense.
  alternative_readings:
  - Taken as a lament merely comparing Elisha to military power
  - Taken as a vision report of heavenly chariots
  rationale: The wording echoes 2 Kings 2:12 and functions as a recognition of prophetic
    significance rather than a doctrinal statement requiring interpretive expansion.
    The translation preserves the metaphor without resolving it into paraphrase.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
