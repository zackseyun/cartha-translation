id: 2KI.13.14
reference: 2 Kings 13:14
source:
  edition: WLC
  text: וֶֽ/אֱלִישָׁע֙ חָלָ֣ה אֶת חָלְי֔/וֹ אֲשֶׁ֥ר יָמ֖וּת בּ֑/וֹ וַ/יֵּ֨רֶד אֵלָ֜י/ו
    יוֹאָ֣שׁ מֶֽלֶךְ יִשְׂרָאֵ֗ל וַ/יֵּ֤בְךְּ עַל פָּנָי/ו֙ וַ/יֹּאמַ֔ר אָבִ֣/י אָבִ֔/י
    רֶ֥כֶב יִשְׂרָאֵ֖ל וּ/פָרָשָֽׁי/ו־־־׀׃
translation:
  text: Now Elisha had become sick with the illness from which he would die. And Joash
    king of Israel went down to him and wept over his face and said, “My father, my
    father! The chariots of Israel and its horsemen!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'wept over him.' The Hebrew reads literally, 'wept
      over his face.'
    reason: lexical_alternative
  - marker: b
    text: This cry echoes 2 Kings 2:12, where Elisha used the same words for Elijah.
    reason: cross_reference
lexical_decisions:
- source_word: חָלָה
  chosen: had become sick
  alternatives:
  - was sick
  - fell ill
  lexicon: HALOT
  rationale: The verb denotes becoming ill. 'Had become sick' fits the narrative background
    sense before Joash's arrival and reads naturally in English.
- source_word: חָלְיוֹ
  chosen: the illness
  alternatives:
  - his sickness
  - his disease
  lexicon: HALOT
  rationale: 'Using the cognate noun explicitly preserves the Hebrew emphasis: Elisha
    was sick with the illness that would prove fatal. ''Illness'' is natural modern
    English.'
- source_word: אֲשֶׁר יָמוּת בּוֹ
  chosen: from which he would die
  alternatives:
  - of which he died
  - by which he would die
  lexicon: HALOT
  rationale: The relative clause identifies this as the illness that would cause his
    death. 'Would die' preserves the forward-looking sense from the narrative standpoint.
- source_word: וַיֵּרֶד אֵלָיו
  chosen: went down to him
  alternatives:
  - came down to him
  lexicon: HALOT
  rationale: ירד is literally 'went down.' Retaining 'down' preserves the directional
    detail, likely geographical, without overexplaining it.
- source_word: וַיֵּבְךְּ עַל־פָּנָיו
  chosen: wept over his face
  alternatives:
  - wept over him
  - wept before him
  lexicon: HALOT
  rationale: The Hebrew is literally 'over his face.' This likely describes Joash
    bending over Elisha in grief. The more literal rendering is preserved in the main
    text because it is intelligible in English and keeps the vividness of the scene.
- source_word: אָבִי אָבִי
  chosen: My father, my father!
  alternatives:
  - Father, father!
  lexicon: HALOT
  rationale: This is a cry of respect and grief toward Elisha as Israel's spiritual
    father, echoing 2 Kings 2:12. 'My father' preserves the possessive suffix and
    emotional force.
- source_word: רֶכֶב יִשְׂרָאֵל וּפָרָשָׁיו
  chosen: The chariots of Israel and its horsemen
  alternatives:
  - Israel's chariots and horsemen
  - the chariot of Israel and its horsemen
  lexicon: HALOT
  rationale: The phrase is metaphorical, identifying Elisha as Israel's true defense.
    'The chariots of Israel and its horsemen' stays close to the Hebrew form and preserves
    the allusion to Elijah/Elisha tradition.
