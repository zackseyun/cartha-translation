id: 2KI.13.18
reference: 2 Kings 13:18
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר קַ֥ח הַ/חִצִּ֖ים וַ/יִּקָּ֑ח וַ/יֹּ֤אמֶר לְ/מֶֽלֶךְ יִשְׂרָאֵל֙
    הַךְ אַ֔רְצָ/ה וַ/יַּ֥ךְ שָֽׁלֹשׁ פְּעָמִ֖ים וַֽ/יַּעֲמֹֽד־־־׃
translation:
  text: Then he said, “Take the arrows,” and he took them. And he said to the king
    of Israel, “Strike the ground,” and he struck it three times and stopped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and stood still”; the Hebrew verb is literally “stood,” here functioning
      idiomatically to mean that he stopped after striking three times.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Get
  lexicon: HALOT
  rationale: Imperative of לקח in direct speech; 'take' is the plain, natural English
    equivalent and preserves the command's immediacy.
- source_word: הַחִצִּים
  chosen: the arrows
  alternatives:
  - arrows
  lexicon: HALOT
  rationale: Definite plural noun; rendered with the article to match the Hebrew.
- source_word: וַיִּקָּח
  chosen: and he took them
  alternatives:
  - and he took
  lexicon: HALOT
  rationale: English idiom naturally supplies the object pronoun from context ('the
    arrows'). This avoids awkwardness while preserving the action.
- source_word: לְמֶלֶךְ יִשְׂרָאֵל
  chosen: to the king of Israel
  alternatives:
  - to Israel's king
  lexicon: HALOT
  rationale: Straightforward rendering of the indirect object phrase; the fuller form
    preserves the narrative dignity and standard biblical style.
- source_word: הַךְ
  chosen: Strike
  alternatives:
  - Hit
  - Shoot
  lexicon: HALOT
  rationale: נכה here is a command for a forceful action. 'Strike' is more fitting
    than 'hit' in elevated narrative style. 'Shoot' is too interpretive, since the
    object named is the ground, not an arrow explicitly.
- source_word: אַרְצָה
  chosen: the ground
  alternatives:
  - to the ground
  - earth
  - land
  lexicon: HALOT
  rationale: The directional form of אֶרֶץ here refers to striking downward at the
    ground. 'The ground' communicates the sense clearly in idiomatic English. The
    article is supplied in English because the action presumes a definite surface
    being struck.
- source_word: וַיַּךְ
  chosen: and he struck it
  alternatives:
  - and he struck
  - and he hit it
  lexicon: HALOT
  rationale: English normally requires an object; 'it' refers back to the ground.
    This keeps the verbal link with the command 'Strike the ground.'
- source_word: שָׁלֹשׁ פְּעָמִים
  chosen: three times
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the numeral plus 'times/occurrences'
    construction.
- source_word: וַיַּעֲמֹד
  chosen: and stopped
  alternatives:
  - and stood still
  - and ceased
  lexicon: HALOT
  rationale: Although the verb literally means 'stood,' in this context after repeated
    striking it idiomatically means he stopped/ceased. 'And stopped' best conveys
    the narrative sense in natural English without obscuring the action.
