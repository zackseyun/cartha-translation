id: 2KI.13.9
reference: 2 Kings 13:9
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יְהֽוֹאָחָז֙ עִם אֲבֹתָ֔י/ו וַֽ/יִּקְבְּרֻ֖/הוּ בְּ/שֹׁמְר֑וֹן
    וַ/יִּמְלֹ֛ךְ יוֹאָ֥שׁ בְּנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Jehoahaz lay down with his fathers, and they buried him in Samaria. Then
    Joash his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Joash is also rendered 'Jehoash' in some English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - rested
  - died
  lexicon: HALOT
  rationale: The idiom שׁכב with 'with his fathers' is a conventional royal death
    formula. 'Lay down' preserves the Hebrew imagery more transparently than the interpretive
    'died,' while avoiding the potentially misleading English idiom 'slept with'.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard Hebrew burial/death formula for kings. 'Fathers'
    is retained for formal correspondence and because it reflects the source wording;
    'ancestors' is possible but less literal.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The verb is 3rd person plural with object suffix, an indefinite plural
    ('they buried him'). Rendering it actively preserves the Hebrew form better than
    converting to passive.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב commonly indicates location here. 'In Samaria' is the
    natural English rendering for the burial location.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: In succession notices, מלך can denote accession and reign. 'Reigned'
    is concise and idiomatic in English royal formulas, while still covering the succession
    sense in context.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The phrase marks dynastic succession. 'In his place' is idiomatic English
    and preserves the sense of replacement more clearly than the more wooden 'under
    him' or the less precise 'after him'.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: יוֹאָשׁ
  chosen: Joash
  alternatives:
  - Jehoash
  rationale: The Hebrew form here is יוֹאָשׁ. 'Joash' is the standard English transliteration
    in this context; 'Jehoash' is a known variant in English tradition and worth preserving
    as an alternative.
