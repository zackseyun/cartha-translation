theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the project's
    doctrine, the tetragrammaton is rendered 'the LORD' rather than transliterated
    forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of covenant motivation in divine mercy
  chosen_reading: because of his covenant with Abraham, Isaac, and Jacob
  alternative_readings:
  - for the sake of his covenant with Abraham, Isaac, and Jacob
  rationale: The text grounds God's gracious restraint in covenant faithfulness to
    the patriarchs. The translation preserves that theological connection without
    expanding it into later doctrinal formulations.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
