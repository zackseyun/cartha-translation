id: 2KI.13.23
reference: 2 Kings 13:23
source:
  edition: WLC
  text: וַ/יָּחָן֩ יְהוָ֨ה אֹתָ֤/ם וַֽ/יְרַחֲמֵ/ם֙ וַ/יִּ֣פֶן אֲלֵי/הֶ֔ם לְמַ֣עַן
    בְּרִית֔/וֹ אֶת אַבְרָהָ֖ם יִצְחָ֣ק וְ/יַֽעֲקֹ֑ב וְ/לֹ֤א אָבָה֙ הַשְׁחִיתָ֔/ם
    וְ/לֹֽא הִשְׁלִיכָ֥/ם מֵֽ/עַל פָּנָ֖י/ו עַד עָֽתָּה־־־־׃
translation:
  text: But the LORD was gracious to them and had compassion on them, and he turned
    toward them because of his covenant with Abraham, Isaac, and Jacob. He was not
    willing to destroy them, and he did not cast them from his presence until now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the sake of his covenant with Abraham, Isaac, and Jacob.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחָן
  chosen: was gracious
  alternatives:
  - showed favor
  - was favorable
  lexicon: HALOT
  rationale: From חנן, expressing gracious favor or mercy. 'Was gracious' is idiomatic
    English and preserves the theological sense of unmerited favor better than the
    flatter 'showed favor.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: וַיְרַחֲמֵם
  chosen: had compassion on them
  alternatives:
  - had mercy on them
  - pitied them
  lexicon: HALOT
  rationale: From רחם, denoting deep compassion or mercy. 'Had compassion on them'
    communicates the affective nuance more clearly in modern English than 'had mercy,'
    while remaining faithful to the source.
- source_word: וַיִּפֶן אֲלֵיהֶם
  chosen: he turned toward them
  alternatives:
  - he turned to them
  - he looked toward them
  lexicon: HALOT
  rationale: The idiom literally involves turning toward someone, here signaling favorable
    regard and renewed attention. 'Turned toward them' preserves the imagery without
    overinterpreting it.
- source_word: לְמַעַן בְּרִיתוֹ
  chosen: because of his covenant
  alternatives:
  - for the sake of his covenant
  - on account of his covenant
  lexicon: HALOT
  rationale: למען here gives the motive or basis for divine action. 'Because of his
    covenant' is natural English and accurately conveys causation grounded in covenant
    commitment.
- source_word: אֶת אַבְרָהָם יִצְחָק וְיַעֲקֹב
  chosen: with Abraham, Isaac, and Jacob
  alternatives:
  - to Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: Though the Hebrew construction is compact, the covenant is understood
    as the covenant made with the patriarchs. 'With' is the most idiomatic and contextually
    precise English preposition here.
- source_word: וְלֹא אָבָה הַשְׁחִיתָם
  chosen: He was not willing to destroy them
  alternatives:
  - he would not destroy them
  - he did not consent to destroy them
  lexicon: HALOT
  rationale: אָבָה conveys willingness or consent. 'Was not willing to destroy them'
    preserves the volitional nuance better than the simpler 'would not,' while remaining
    readable.
- source_word: וְלֹא הִשְׁלִיכָם מֵעַל פָּנָיו
  chosen: he did not cast them from his presence
  alternatives:
  - he did not throw them away from before him
  - he did not banish them from before him
  lexicon: HALOT
  rationale: The phrase literally means to cast them away from before his face/presence.
    'From his presence' is the clearest idiomatic rendering and preserves the relational-covenantal
    sense.
- source_word: עַד עָתָּה
  chosen: until now
  alternatives:
  - to this day
  - up to that time
  lexicon: HALOT
  rationale: The phrase marks the situation as continuing to the narrator's present
    standpoint. 'Until now' is the most direct and contextually appropriate rendering.
