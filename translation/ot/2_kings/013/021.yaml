theological_decisions:
- issue: Nature of the miracle associated with Elisha's bones
  chosen_reading: Translate the event straightforwardly as an actual restoration to
    life upon contact with Elisha's bones.
  alternative_readings:
  - Render more vaguely as recovery or revival without explicit miraculous force
  rationale: The Hebrew sequence ויגע ... ויחי ויקם plainly narrates a miraculous
    return to life. The translation should neither downplay nor embellish the miracle
    beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
