id: 2KI.13.21
reference: 2 Kings 13:21
source:
  edition: WLC
  text: וַ/יְהִ֞י הֵ֣ם קֹבְרִ֣ים אִ֗ישׁ וְ/הִנֵּה֙ רָא֣וּ אֶֽת הַ/גְּד֔וּד וַ/יַּשְׁלִ֥יכוּ
    אֶת הָ/אִ֖ישׁ בְּ/קֶ֣בֶר אֱלִישָׁ֑ע וַ/יֵּ֜לֶךְ וַ/יִּגַּ֤ע הָ/אִישׁ֙ בְּ/עַצְמ֣וֹת
    אֱלִישָׁ֔ע וַ/יְחִ֖י וַ/יָּ֥קָם עַל רַגְלָֽי/ו׀־־־׃פ
translation:
  text: And it happened, as they were burying a man, that behold, they saw the raiding
    band; so they threw the man into Elisha’s grave. And when the man went and touched
    Elisha’s bones, he came to life and stood up on his feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the marauding band' or 'the troop.' The Hebrew refers to a hostile raiding
      group.
    reason: lexical_alternative
  - marker: b
    text: Or 'tomb.' The Hebrew word can refer broadly to a grave or burial place.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew literally says 'and the man went and touched Elisha’s bones,'
      likely describing the body's movement within the grave before contact.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: קֹבְרִים אִישׁ
  chosen: they were burying a man
  alternatives:
  - they were burying someone
  - they buried a man
  lexicon: HALOT
  rationale: The participle with pronoun הֵם gives ongoing action in past narrative
    context; 'were burying' best reflects the progressive sense. אִישׁ here is an
    individual male/person, naturally rendered 'a man'.
- source_word: וְהִנֵּה
  chosen: that behold
  alternatives:
  - and behold
  - when suddenly
  lexicon: HALOT
  rationale: Marks suddenness and vividness. Retained in translation rather than omitted,
    but slightly smoothed into English syntax with 'that behold' after the introductory
    clause.
- source_word: הַגְּדוּד
  chosen: the raiding band
  alternatives:
  - the band
  - the marauding band
  - the troop
  lexicon: HALOT
  rationale: In this context the word refers to a hostile group making incursions,
    not a formal military unit. 'Raiding band' conveys the sense more precisely than
    the generic 'troop'.
- source_word: וַיַּשְׁלִיכוּ
  chosen: they threw
  alternatives:
  - they cast
  - they hurled
  lexicon: HALOT
  rationale: A forceful verb appropriate to the urgency of the scene. 'Threw' is natural
    modern English and fits the context of quickly disposing of the body.
- source_word: בְּקֶבֶר אֱלִישָׁע
  chosen: into Elisha’s grave
  alternatives:
  - into the grave of Elisha
  - into Elisha's tomb
  lexicon: HALOT
  rationale: קבר can mean grave or tomb. 'Grave' is the broad, accessible choice and
    does not over-specify the burial structure.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - moved
  - was let down
  lexicon: HALOT
  rationale: The verb is literally 'went.' In context it likely describes the body's
    movement within the grave before contact with the bones. Retaining 'went' preserves
    the Hebrew wording, though it is somewhat idiomatic in English.
- source_word: וַיִּגַּע ... בְּעַצְמוֹת
  chosen: touched Elisha’s bones
  alternatives:
  - came into contact with Elisha's bones
  lexicon: HALOT
  rationale: נגע with ב marks physical contact. 'Touched' is direct and idiomatic.
- source_word: וַיְחִי
  chosen: he came to life
  alternatives:
  - he revived
  - he lived
  lexicon: HALOT
  rationale: The verb denotes restoration to life in this context. 'Came to life'
    is clear modern English; 'revived' is possible but slightly more interpretive.
- source_word: וַיָּקָם עַל רַגְלָיו
  chosen: stood up on his feet
  alternatives:
  - rose to his feet
  - stood on his feet
  lexicon: HALOT
  rationale: A vivid idiom indicating full restoration. 'Stood up on his feet' preserves
    the concreteness of the Hebrew.
