id: 2KI.13.15
reference: 2 Kings 13:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ אֱלִישָׁ֔ע קַ֖ח קֶ֣שֶׁת וְ/חִצִּ֑ים וַ/יִּקַּ֥ח אֵלָ֖י/ו
    קֶ֥שֶׁת וְ/חִצִּֽים׃
translation:
  text: Then Elisha said to him, “Take a bow and arrows.” So he took a bow and arrows
    to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “So he took for himself a bow and arrows,” though the Hebrew
      more naturally reads “to him,” referring to Elisha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: לּוֹ
  chosen: to him
  lexicon: HALOT
  rationale: Standard rendering of the preposition ל with 3ms suffix, indicating the
    indirect object of Elisha's speech.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: קַח
  chosen: Take
  alternatives:
  - Get
  lexicon: HALOT
  rationale: Imperative of לקח. 'Take' is the most direct and standard English equivalent
    in this command context.
- source_word: קֶשֶׁת
  chosen: a bow
  lexicon: HALOT
  rationale: The noun denotes a bow as a weapon. The English indefinite article is
    natural though absent in Hebrew.
- source_word: וְחִצִּים
  chosen: and arrows
  lexicon: HALOT
  rationale: Plural noun meaning 'arrows.' Coordinated directly with 'bow' by waw.
- source_word: וַיִּקַּח
  chosen: So he took
  alternatives:
  - And he took
  - Then he took
  lexicon: HALOT
  rationale: Narrative waw-consecutive again marks the next action. 'So he took' reads
    naturally and reflects responsive action to the command.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - for himself
  lexicon: HALOT
  rationale: The preposition אֶל with 3ms suffix most naturally means 'to him,' i.e.,
    he took them to Elisha. Some might smooth the sense differently in English, but
    the directional force should be preserved.
- source_word: קֶשֶׁת וְחִצִּים
  chosen: a bow and arrows
  lexicon: HALOT
  rationale: Repeated object retained in translation rather than reduced, since the
    Hebrew explicitly restates it.
