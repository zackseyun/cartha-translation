id: 2KI.13.4
reference: 2 Kings 13:4
source:
  edition: WLC
  text: וַ/יְחַ֥ל יְהוֹאָחָ֖ז אֶת פְּנֵ֣י יְהוָ֑ה וַ/יִּשְׁמַ֤ע אֵלָי/ו֙ יְהוָ֔ה כִּ֤י
    רָאָה֙ אֶת לַ֣חַץ יִשְׂרָאֵ֔ל כִּֽי לָחַ֥ץ אֹתָ֖/ם מֶ֥לֶךְ אֲרָֽם־־־׃
translation:
  text: Then Jehoahaz sought the favor of the LORD, and the LORD listened to him,
    for he saw the oppression of Israel, because the king of Aram oppressed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'entreated the LORD'; literally, 'softened/appeased the face of the LORD,'
      an idiom for seeking his favor.
    reason: lexical_alternative
  - marker: b
    text: Aram is the Hebrew name often rendered 'Syria' in older English translations.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְחַל
  chosen: sought the favor of
  alternatives:
  - entreated
  - pleaded with
  - implored
  lexicon: HALOT
  rationale: The idiom חלה את־פני commonly means to seek favor or entreat someone,
    not merely 'begin.' With אֶת־פְּנֵי יְהוָה, 'sought the favor of' captures the
    idiomatic sense in natural English while preserving the relational nuance of appeal.
- source_word: פְּנֵי יְהוָה
  chosen: the LORD
  alternatives:
  - the face of the LORD
  lexicon: HALOT
  rationale: In the idiom with חלה, 'face' is not best carried woodenly into English.
    The object of appeal is the LORD himself. YHWH is rendered 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the stated default
    for יְהוָה.
- source_word: וַיִּשְׁמַע אֵלָיו
  chosen: listened to him
  alternatives:
  - heard him
  - responded to him
  lexicon: HALOT
  rationale: שׁמע with אֶל can mean to listen to or heed. 'Listened to him' preserves
    the personal response without overstating the result. 'Heard him' is possible
    but can sound merely auditory in modern English.
- source_word: כִּי רָאָה
  chosen: for he saw
  alternatives:
  - because he saw
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the LORD's listening. 'For he saw'
    is idiomatic and keeps the causal connection.
- source_word: לַחַץ
  chosen: the oppression
  alternatives:
  - the affliction
  - the pressure
  lexicon: HALOT
  rationale: The noun denotes oppression or distress caused by a hostile power. 'Oppression'
    fits the political-military context and corresponds well with the following verb
    from the same root.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Here the term refers to the northern kingdom/people collectively; 'Israel'
    is the standard transliteration.
- source_word: כִּי לָחַץ אֹתָם
  chosen: because ... oppressed them
  alternatives:
  - for ... was oppressing them
  - because ... was pressing them hard
  lexicon: HALOT
  rationale: The clause explains the oppression just mentioned. English past tense
    'oppressed' is natural in narrative summary; progressive aspect is possible but
    not required.
- source_word: מֶלֶךְ אֲרָם
  chosen: the king of Aram
  alternatives:
  - the king of Syria
  lexicon: HALOT
  rationale: Aram is the Hebrew place-name and should be transliterated rather than
    replaced with the later geopolitical label 'Syria,' in keeping with original-language
    primacy and the policy to transliterate names.
