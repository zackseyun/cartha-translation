theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    doctrine table and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Idiomatic appeal to God in ויחל את פני יהוה
  chosen_reading: sought the favor of the LORD
  alternative_readings:
  - entreated the LORD
  - sought the face of the LORD
  rationale: The phrase describes supplication to God. 'Sought the favor of' preserves
    the idiomatic meaning without importing a stronger theological claim than the
    Hebrew states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source plain sense over tradition'
