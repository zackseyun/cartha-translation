theological_decisions:
- issue: Referent and sense of הָאֲשֵׁרָה
  chosen_reading: Rendered as 'the Asherah' in the main text, understood as the cult
    object associated with Asherah worship.
  alternative_readings:
  - the Asherah pole
  - the goddess Asherah
  rationale: The term can refer to the deity or her cult symbol. In this historical
    narrative, the statement that it 'remained standing in Samaria' strongly favors
    a standing cult object. The main text keeps the Hebrew term to avoid falsely narrowing
    the sense, while the footnote explains the likely referent.
