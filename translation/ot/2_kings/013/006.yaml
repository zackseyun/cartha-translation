id: 2KI.13.6
reference: 2 Kings 13:6
source:
  edition: WLC
  text: אַ֠ךְ לֹֽא סָ֜רוּ מֵ/חַטֹּ֧אות בֵּית יָרָבְעָ֛ם אֲשֶׁר החטי אֶת יִשְׂרָאֵ֖ל
    בָּ֣/הּ הָלָ֑ךְ וְ/גַם֙ הָ/אֲשֵׁרָ֔ה עָמְדָ֖ה בְּ/שֹׁמְרֽוֹן־־־־׃
translation:
  text: Yet they did not turn away from the sins of the house of Jeroboam, by which
    he caused Israel to sin; he walked in them, and even the Asherah remained standing
    in Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah pole'; the Hebrew term can refer to the Canaanite goddess
      Asherah or, as likely here, the cult object associated with her worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Nevertheless
  - Only
  lexicon: HALOT
  rationale: Marks a concessive/adversative transition from the preceding deliverance
    to Israel's continued sin. 'Yet' is natural modern English and preserves the contrast.
- source_word: סָרוּ
  chosen: did not turn away
  alternatives:
  - did not depart
  - did not turn aside
  lexicon: HALOT
  rationale: With מִן, the verb means to turn aside/away from something. 'Turn away'
    is idiomatic and preserves the moral-religious sense of abandoning sinful practice.
- source_word: מֵחַטֹּאות
  chosen: from the sins
  alternatives:
  - from the sin offerings
  - from the offenses
  lexicon: HALOT
  rationale: In this context חטאות clearly refers to sinful acts/practices, not sin
    offerings. The plural is retained as 'sins'.
- source_word: בֵּית יָרָבְעָם
  chosen: the house of Jeroboam
  alternatives:
  - the dynasty of Jeroboam
  lexicon: HALOT
  rationale: Formally 'house of Jeroboam.' Although it can denote dynasty, here it
    functions as the established expression for Jeroboam's cultic-political legacy;
    the more literal rendering is preferable.
- source_word: אֲשֶׁר החטי אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - with which he made Israel sin
  - which led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא means 'cause to sin.' The feminine singular pronominal
    reference in the next phrase points back to the sinful pattern/system; 'by which'
    captures the instrumental sense naturally.
- source_word: בָּהּ הָלָךְ
  chosen: he walked in them
  alternatives:
  - he continued in them
  - he followed it
  lexicon: HALOT
  rationale: 'הלך with ב conveys conduct/lifestyle: to walk in, follow, persist in.
    English requires plural agreement with ''sins,'' so ''them'' is used, even though
    the Hebrew suffix is singular and may refer collectively to the sinful way.'
- source_word: וְגַם
  chosen: and even
  alternatives:
  - also
  - moreover
  lexicon: HALOT
  rationale: 'Adds emphasis to the final clause: not only did the sins continue, but
    even the cult object remained.'
- source_word: הָאֲשֵׁרָה
  chosen: the Asherah
  alternatives:
  - the Asherah pole
  - the sacred pole
  lexicon: HALOT
  rationale: Asherah may denote either the goddess or, in many contexts, her cult
    symbol/object. The Hebrew has the definite noun without an explicit word for 'pole.'
    To avoid over-specifying beyond the text, 'the Asherah' is retained, with a cultural
    footnote noting the likely cult object sense.
- source_word: עָמְדָה
  chosen: remained standing
  alternatives:
  - stood
  - remained
  lexicon: HALOT
  rationale: The verb literally means 'stood,' but in context it conveys continued
    presence. 'Remained standing' preserves both the literal image and the durative
    implication.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Standard locative rendering for the capital city.
