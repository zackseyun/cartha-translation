id: 2KI.13.7
reference: 2 Kings 13:7
source:
  edition: WLC
  text: כִּ֣י לֹא֩ הִשְׁאִ֨יר לִ/יהוֹאָחָ֜ז עָ֗ם כִּ֣י אִם חֲמִשִּׁ֤ים פָּֽרָשִׁים֙
    וַ/עֲשָׂ֣רָה רֶ֔כֶב וַ/עֲשֶׂ֥רֶת אֲלָפִ֖ים רַגְלִ֑י כִּ֤י אִבְּדָ/ם֙ מֶ֣לֶךְ אֲרָ֔ם
    וַ/יְשִׂמֵ֥/ם כֶּֽ/עָפָ֖ר לָ/דֻֽשׁ־׃
translation:
  text: For he left Jehoahaz no army except fifty horsemen, ten chariots, and ten
    thousand foot soldiers, because the king of Aram had destroyed them and made them
    like dust for trampling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made them like dust for threshing.' The Hebrew verb can evoke trampling
      in threshing imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשְׁאִיר
  chosen: left
  alternatives:
  - caused to remain
  - spared
  lexicon: HALOT
  rationale: The Hiphil of שׁאר here means to leave remaining. 'Left' is natural English
    and preserves the causative-result sense without awkwardness.
- source_word: עָם
  chosen: army
  alternatives:
  - people
  - troops
  lexicon: HALOT
  rationale: Although עָם commonly means 'people,' the immediate specification of
    cavalry, chariots, and infantry shows a military sense here. 'Army' best captures
    the contextual meaning in readable English.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless
  lexicon: HALOT
  rationale: The idiom introduces the sole remainder after a negation. 'Except' is
    concise and idiomatic in English.
- source_word: פָּרָשִׁים
  chosen: horsemen
  alternatives:
  - cavalrymen
  - mounted troops
  lexicon: HALOT
  rationale: The term denotes mounted soldiers. 'Horsemen' is a clear, conventional
    rendering that fits the numeric listing.
- source_word: רֶכֶב
  chosen: chariots
  alternatives:
  - chariot force
  lexicon: HALOT
  rationale: Though the singular form can function collectively, with the numeral
    it refers to ten chariots as military units. 'Chariots' is the most straightforward
    rendering.
- source_word: רַגְלִי
  chosen: foot soldiers
  alternatives:
  - infantry
  - footmen
  lexicon: HALOT
  rationale: The adjective/noun denotes troops on foot. 'Foot soldiers' is more transparent
    to modern readers than 'footmen' and less technical than 'infantry.'
- source_word: אִבְּדָם
  chosen: had destroyed them
  alternatives:
  - had wiped them out
  - had made them perish
  lexicon: HALOT
  rationale: The Piel of אבד conveys destruction. The object suffix refers to Jehoahaz's
    forces. 'Had destroyed them' is strong but not overstated, and it explains the
    severe reduction in troops.
- source_word: וַיְשִׂמֵם
  chosen: made them
  alternatives:
  - set them
  - reduced them
  lexicon: HALOT
  rationale: שׂים with a comparative phrase means to make or render something into
    a given condition. 'Made them' works naturally with the following simile.
- source_word: כֶּעָפָר
  chosen: like dust
  alternatives:
  - as dust
  lexicon: HALOT
  rationale: The comparative particle plus עָפָר forms a simile. 'Like dust' is idiomatic
    and preserves the image of utter pulverization and insignificance.
- source_word: לָדוּשׁ
  chosen: for trampling
  alternatives:
  - to be trampled
  - for threshing
  lexicon: HALOT
  rationale: The infinitive from דושׁ refers to trampling/threshing. In this simile,
    'for trampling' best conveys the image of being reduced to dust underfoot; 'for
    threshing' is possible but less clear in English without explanation.
