id: 2KI.13.22
reference: 2 Kings 13:22
source:
  edition: WLC
  text: וַֽ/חֲזָאֵל֙ מֶ֣לֶךְ אֲרָ֔ם לָחַ֖ץ אֶת יִשְׂרָאֵ֑ל כֹּ֖ל יְמֵ֥י יְהוֹאָחָֽז־׃
translation:
  text: Now Hazael king of Aram oppressed Israel all the days of Jehoahaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Aram'; traditionally 'Syria' in some English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/חֲזָאֵל
  chosen: Now Hazael
  alternatives:
  - And Hazael
  - Then Hazael
  lexicon: HALOT
  rationale: The prefixed waw here advances the narrative. In English, 'Now' gives
    a natural narrative transition without over-literal repetition of 'and.' 'Hazael'
    is transliterated as a personal name per translation philosophy.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - the king of Aram
  - king of Syria
  lexicon: HALOT
  rationale: '''Aram'' is preferred over ''Syria'' because the Hebrew proper name
    is אֲרָם and the project favors original-language primacy over inherited English
    tradition. The construct phrase is rendered straightforwardly as a title.'
- source_word: לָחַץ
  chosen: oppressed
  alternatives:
  - pressed
  - afflicted
  - harassed
  lexicon: HALOT
  rationale: The verb denotes pressing hard, oppressing, or afflicting. 'Oppressed'
    best captures sustained political-military pressure in clear modern English and
    fits the broader context of Aramean domination.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct-object marker plus the national name; rendered simply as 'Israel.'
    In context this refers to the northern kingdom rather than the patriarch.
- source_word: כֹּל יְמֵי
  chosen: all the days of
  alternatives:
  - throughout the days of
  - all during the days of
  lexicon: HALOT
  rationale: This idiom is naturally rendered 'all the days of,' expressing the full
    duration of Jehoahaz's lifetime or reign in context.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
