  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Moral evaluation formula in Kings
  chosen_reading: what was evil in the sight of the LORD
  alternative_readings:
  - evil in the eyes of the LORD
  rationale: This preserves the narrator's theological judgment without softening it or expanding it beyond the stock Deuteronomistic formula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source meaning without paraphrase'
