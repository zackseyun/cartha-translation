id: 2KI.13.11
reference: 2 Kings 13:11
source:
  edition: WLC
  text: וַ/יַּֽעֲשֶׂ֥ה הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה לֹ֣א סָ֗ר מִ/כָּל חַטֹּ֞אות יָרָבְעָ֧ם בֶּן נְבָ֛ט אֲשֶׁר הֶחֱטִ֥יא אֶת יִשְׂרָאֵ֖ל בָּ֥/הּ הָלָֽךְ־־־־׃
translation:
  text: He did what was evil in the sight of Yahweh. He did not turn away from any of the sins of Jeroboam son of Nebat, by which he caused Israel to sin; he walked in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he walked in it,' with the singular pronoun referring collectively to Jeroboam's sinful way.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשֶׂה
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה advances the narrative. English can omit the conjunction for natural style while preserving the sequential sense.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: The idiom עשה הרע is a standard evaluative formula in Kings, best rendered idiomatically as 'did what was evil' rather than the more wooden 'did the evil.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for divine evaluation. 'In the sight of the LORD' is clear, natural, and preserves the metaphor. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default for יְהוָה.
- source_word: לֹא סָר
  chosen: He did not turn away
  alternatives:
  - He did not depart
  - He did not turn aside
  lexicon: HALOT
  rationale: סור here means to turn aside or depart from a course. 'Turn away' is natural modern English and fits the moral sense.
- source_word: מִכָּל חַטֹּאות
  chosen: from all the sins
  alternatives:
  - from any of the sins
  - from all the sinful acts
  lexicon: HALOT
  rationale: The phrase indicates complete failure to abandon Jeroboam's pattern of sin. 'From all the sins' preserves the Hebrew wording and scope.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Standard English rendering of the patronymic, keeping the personal names transliterated.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - with which he made Israel sin
  - who caused Israel to sin
  lexicon: HALOT
  rationale: The relative clause most naturally refers to Jeroboam's sins/practices as the means by which he led Israel into sin. 'Caused Israel to sin' reflects the Hiphil of חטא.
- source_word: בָּהּ
  chosen: in them
  alternatives:
  - in it
  lexicon: HALOT
  rationale: 'Although the suffix is formally singular feminine, it refers collectively to the antecedent ''sins'' and is best rendered idiomatically in English as plural: ''in them.'''
- source_word: הָלָךְ
  chosen: he walked in them
  alternatives:
  - he walked in it
  - he followed them
  - he continued in them
  lexicon: HALOT
  rationale: הלך in this idiom means to conduct oneself according to a pattern. 'Walked in them' preserves the biblical metaphor and the connection to Jeroboam's sins.
