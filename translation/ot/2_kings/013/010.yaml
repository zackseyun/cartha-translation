id: 2KI.13.10
reference: 2 Kings 13:10
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת שְׁלֹשִׁ֤ים וָ/שֶׁ֨בַע֙ שָׁנָ֔ה לְ/יוֹאָ֖שׁ מֶ֣לֶךְ יְהוּדָ֑ה
    מָ֠לַךְ יְהוֹאָ֨שׁ בֶּן יְהוֹאָחָ֤ז עַל יִשְׂרָאֵל֙ בְּ/שֹׁ֣מְר֔וֹן שֵׁ֥שׁ עֶשְׂרֵ֖ה
    שָׁנָֽה־־׃
translation:
  text: In the thirty-seventh year of Joash king of Judah, Jehoash son of Jehoahaz
    became king over Israel in Samaria, and he reigned sixteen years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew distinguishes the Judean king יוֹאָשׁ (Joash) from the Israelite
      king יְהוֹאָשׁ (Jehoash); English tradition sometimes renders both as 'Joash.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁלֹשִׁים וָ/שֶׁבַע שָׁנָה
  chosen: In the thirty-seventh year
  alternatives:
  - In the thirty-seven year
  - In year thirty-seven
  lexicon: HALOT
  rationale: The Hebrew dating formula uses ב + שְׁנַת with a cardinal number expression
    to mark the regnal year. Standard idiomatic English is 'In the thirty-seventh
    year.'
- source_word: לְ/יוֹאָשׁ מֶלֶךְ יְהוּדָה
  chosen: of Joash king of Judah
  alternatives:
  - of Jehoash king of Judah
  lexicon: HALOT
  rationale: 'The preposition ל marks the reference point for the regnal synchronism:
    the year belonging to Joash''s reign. ''Joash'' is the conventional English transliteration
    for יוֹאָשׁ here; ''king of Judah'' appositionally identifies him.'
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: Qal perfect of מלך in regnal formulas often denotes accession rather
    than the whole duration of rule. 'Became king' captures the ingressive sense,
    while the later phrase gives the reign length.
- source_word: יְהוֹאָשׁ בֶּן יְהוֹאָחָז
  chosen: Jehoash son of Jehoahaz
  alternatives:
  - Joash son of Jehoahaz
  lexicon: HALOT
  rationale: The northern king's name is spelled יְהוֹאָשׁ, distinct from the Judean
    יוֹאָשׁ earlier in the verse. Rendering them as 'Jehoash' and 'Joash' helps preserve
    the Hebrew distinction in English without overburdening the reader.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - in Israel
  lexicon: HALOT
  rationale: עַל with מלך expresses rule over a people or territory. 'Over Israel'
    is the most direct and idiomatic rendering.
- source_word: בְּ/שֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Samaria' is natural English and
    indicates the capital city where the northern king reigned.
- source_word: שֵׁשׁ עֶשְׂרֵה שָׁנָה
  chosen: sixteen years
  alternatives:
  - for sixteen years
  lexicon: HALOT
  rationale: This numeral phrase gives the duration of the reign. In English regnal
    notices, 'and he reigned sixteen years' is idiomatic and clear.
