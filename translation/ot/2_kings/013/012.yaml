id: 2KI.13.12
reference: 2 Kings 13:12
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֤י יוֹאָשׁ֙ וְ/כָל אֲשֶׁ֣ר עָשָׂ֔ה וּ/גְב֣וּרָת֔/וֹ אֲשֶׁ֣ר
    נִלְחַ֔ם עִ֖ם אֲמַצְיָ֣ה מֶֽלֶךְ יְהוּדָ֑ה הֲ/לֽוֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר
    דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: Now the rest of the acts of Joash, and all that he did, and his might, how
    he fought with Amaziah king of Judah—are they not written in the Book of the Chronicles
    of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'how he fought against Amaziah king of Judah.' The Hebrew preposition
      is literally 'with,' but in this military context it denotes hostile engagement.
    reason: lexical_alternative
  - marker: b
    text: This 'Book of the Chronicles of the Kings of Israel' refers to a royal annalistic
      source cited in Kings, not the biblical book of Chronicles.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר in this formulaic regnal-summary context means 'the rest/remainder.'
    'Now' smoothly renders the prefixed conjunction in English narrative style while
    preserving the transition.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Although literally 'words/matters,' in the recurring royal annal formula
    'the rest of the words of X' it idiomatically refers to the king's acts/deeds.
    'Acts' is natural English and fits the historiographic formula.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of the clause, preserving the comprehensive
    force of כָל and the broad verb עשה.
- source_word: וּגְבוּרָתוֹ
  chosen: and his might
  alternatives:
  - and his mighty deeds
  - and his valor
  - and his strength
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, valor, or mighty deeds. Here it introduces
    the following relative clause about warfare, so 'might' preserves the abstract
    noun while allowing the next clause to specify its expression in battle.
- source_word: אֲשֶׁר נִלְחַם עִם
  chosen: how he fought with
  alternatives:
  - with which he fought against
  - that he fought against
  lexicon: HALOT
  rationale: The relative clause explains the content of his might. English idiom
    prefers 'how he fought.' The preposition עִם literally means 'with,' but in battle
    contexts can indicate engagement against an opponent; the object 'Amaziah king
    of Judah' makes the adversarial sense clear.
- source_word: אֲמַצְיָה מֶלֶךְ יְהוּדָה
  chosen: Amaziah king of Judah
  alternatives:
  - Amaziah, the king of Judah
  lexicon: HALOT
  rationale: Standard rendering of the proper name and royal title, with transliteration
    of the personal name per project philosophy.
- source_word: הֲלוֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - surely they are written
  lexicon: HALOT
  rationale: This is the standard rhetorical formula introducing the annalistic source
    citation. 'Are they not written' preserves both the interrogative form and the
    passive participle.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the Book of the Chronicles
  alternatives:
  - on the book of the events of the days
  - in the book of the annals
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' English idiom for written sources
    is 'in.' סֵפֶר דִּבְרֵי הַיָּמִים is the conventional title for an annalistic
    record; 'Book of the Chronicles' is the clearest established equivalent here without
    implying the canonical book of Chronicles.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - belonging to the kings of Israel
  - for the kings of Israel
  lexicon: HALOT
  rationale: The לְ marks relation in this source-title formula. 'Of the Kings of
    Israel' is the most idiomatic English rendering of the title.
