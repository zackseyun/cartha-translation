id: 2KI.13.1
reference: 2 Kings 13:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת עֶשְׂרִ֤ים וְ/שָׁלֹשׁ֙ שָׁנָ֔ה לְ/יוֹאָ֥שׁ בֶּן אֲחַזְיָ֖הוּ מֶ֣לֶךְ
    יְהוּדָ֑ה מָ֠לַךְ יְהוֹאָחָ֨ז בֶּן יֵה֤וּא עַל יִשְׂרָאֵל֙ בְּ/שֹׁ֣מְר֔וֹן שְׁבַ֥ע
    עֶשְׂרֵ֖ה שָׁנָֽה־־־׃
translation:
  text: In the twenty-third year of Joash son of Ahaziah, king of Judah, Jehoahaz
    son of Jehu began to reign over Israel in Samaria, and he reigned seventeen years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת עֶשְׂרִים וְ/שָׁלֹשׁ שָׁנָה
  chosen: In the twenty-third year
  alternatives:
  - In the twenty and third year
  lexicon: HALOT
  rationale: The Hebrew dating formula is idiomatically rendered in English as 'In
    the twenty-third year.' This preserves the regnal-year construction without woodenly
    reproducing Hebrew number syntax.
- source_word: לְ/יוֹאָשׁ
  chosen: of Joash
  alternatives:
  - for Joash
  lexicon: HALOT
  rationale: The preposition ל in regnal formulas marks reference to the reigning
    king's year count; 'of Joash' is the natural English equivalent in this chronological
    context.
- source_word: בֶּן אֲחַזְיָהוּ
  chosen: son of Ahaziah
  lexicon: HALOT
  rationale: Standard filial designation. Personal names are transliterated per project
    philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Joash's royal office and
    realm.
- source_word: מָלַךְ
  chosen: began to reign
  alternatives:
  - became king
  - reigned
  lexicon: HALOT
  rationale: In this accession formula, the qatal of מלך commonly denotes the start
    of a reign rather than the whole duration. 'Began to reign' makes the narrative
    function explicit and avoids confusion with the later duration statement.
- source_word: יְהוֹאָחָז בֶּן יֵהוּא
  chosen: Jehoahaz son of Jehu
  lexicon: HALOT
  rationale: Personal names are transliterated; the filial phrase identifies the northern
    king by dynasty.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: עַל with מלך is the standard expression for ruling over a people; 'over
    Israel' is idiomatic and accurate.
- source_word: בְּ/שֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The phrase locates the seat of rule in the capital city. 'In Samaria'
    is the most natural English rendering.
- source_word: שְׁבַע עֶשְׂרֵה שָׁנָה
  chosen: seventeen years
  lexicon: HALOT
  rationale: Standard cardinal number plus noun, expressing the duration of Jehoahaz's
    reign.
