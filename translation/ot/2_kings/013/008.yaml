id: 2KI.13.8
reference: 2 Kings 13:8
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֧י יְהוֹאָחָ֛ז וְ/כָל אֲשֶׁ֥ר עָשָׂ֖ה וּ/גְבוּרָת֑/וֹ הֲ/לוֹא
    הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Now the rest of the acts of Jehoahaz, and all that he did, and his might—are
    they not written in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''His might'' may also be rendered ''his power,'' ''his valor,'' or ''his
      mighty deeds.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The rest of
  lexicon: HALOT
  rationale: יֶתֶר introduces the remaining matters concerning the king. 'Now' reflects
    the common narrative formula in English without obscuring the conjunction, while
    'the rest of' preserves the substantive sense.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the regnal-summary formula, דִּבְרֵי often refers broadly to the recorded
    matters/deeds of a king, not merely his spoken words. 'Acts' is idiomatic and
    fits the historical context.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause; 'did' is broad and
    natural, preserving the Hebrew's scope.
- source_word: וּגְבוּרָתוֹ
  chosen: and his might
  alternatives:
  - and his power
  - and his mighty deeds
  - and his valor
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, valor, or mighty acts. Here it summarizes
    the king's notable strength or exploits. 'Might' preserves the compactness of
    the Hebrew and avoids over-specifying military valor alone.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  lexicon: HALOT
  rationale: This interrogative particle introduces the standard rhetorical question
    formula in the regnal notices. 'Are they not' is the natural English equivalent.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The passive participle means 'written' or 'recorded.' 'Written' keeps
    closer to the Hebrew while remaining idiomatic with the following book reference.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival formula English
    idiom prefers 'written in the Book.' 'Book' is conventional and understandable
    for סֵפֶר in this context.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the annals
  - the events of the days
  lexicon: HALOT
  rationale: This expression in royal-source citations refers to an annalistic record.
    'Chronicles' is the established and accurate rendering in this formula, especially
    when paired with 'Book of the Chronicles.'
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - belonging to the kings of Israel
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this source-title formula, ל marks relation rather than purpose. 'Of
    the Kings of Israel' is the most natural English title rendering.
