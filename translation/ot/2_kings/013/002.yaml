id: 2KI.13.2
reference: 2 Kings 13:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה וַ֠/יֵּלֶךְ אַחַ֨ר חַטֹּ֜את יָרָבְעָ֧ם בֶּן נְבָ֛ט אֲשֶׁר הֶחֱטִ֥יא אֶת יִשְׂרָאֵ֖ל לֹא סָ֥ר מִמֶּֽ/נָּה־־־־׃
translation:
  text: He did what was evil in the eyes of Yahweh and walked after the sins of Jeroboam son of Nebat, who caused Israel to sin; he did not turn away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he did not turn away from it.' The Hebrew has a feminine singular suffix, likely referring collectively to Jeroboam's sin-pattern.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of עשה introducing the king's conduct; English omits the conjunction for natural style while preserving the verbal action.
- source_word: הָרַע בְּעֵינֵי יְהוָה
  chosen: what was evil in the eyes of the LORD
  alternatives:
  - the evil in the sight of the LORD
  - what was evil in the sight of the LORD
  lexicon: HALOT
  rationale: This is a stock evaluative formula in Kings. 'What was evil' is idiomatic in modern English while retaining the Hebrew sense of moral evaluation before YHWH. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּלֶךְ אַחַר
  chosen: walked after
  alternatives:
  - followed
  - went after
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'walked after' in the sense of following a pattern or allegiance. 'Walked after' preserves the metaphor and is still understandable in English.
- source_word: חַטֹּאת
  chosen: sins
  alternatives:
  - sin
  - sinful ways
  lexicon: HALOT
  rationale: Plural form here refers to Jeroboam's sinful practices/patterns. 'Sins' keeps the formal correspondence and matches the plural morphology.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Names are transliterated; 'son of' is retained as the standard Hebrew patronymic.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: who caused Israel to sin
  alternatives:
  - who made Israel sin
  - who led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' is a direct and transparent rendering of the causative force.
- source_word: לֹא סָר מִמֶּנָּה
  chosen: he did not turn away from them
  alternatives:
  - he did not depart from it
  - he did not turn aside from it
  lexicon: HALOT
  rationale: סור means to turn aside/depart. The pronominal suffix is feminine singular, likely referring collectively to the sinful pattern just mentioned; English 'them' clarifies the antecedent as the sins/practices of Jeroboam. This is a documented contextual adjustment for readability.
