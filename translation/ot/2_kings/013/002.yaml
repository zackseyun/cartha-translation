theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the feminine singular suffix in מִמֶּנָּה
  chosen_reading: rendered idiomatically as plural 'from them' referring to Jeroboam's sins/practices
  alternative_readings:
  - from it
  - from that
  rationale: Although the Hebrew suffix is singular feminine, the nearest salient antecedent is חַטֹּאת, which can function collectively. English plural better communicates the sense without changing the underlying meaning.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: consistency of key terms, or documented exception'
