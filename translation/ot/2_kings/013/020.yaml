id: 2KI.13.20
reference: 2 Kings 13:20
source:
  edition: WLC
  text: וַ/יָּ֥מָת אֱלִישָׁ֖ע וַֽ/יִּקְבְּרֻ֑/הוּ וּ/גְדוּדֵ֥י מוֹאָ֛ב יָבֹ֥אוּ בָ/אָ֖רֶץ
    בָּ֥א שָׁנָֽה׃
translation:
  text: Then Elisha died, and they buried him. Now raiding bands of Moab used to come
    into the land at the coming of the year.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the spring of the year'; the Hebrew literally says 'at the coming
      of the year,' an idiom for the turn of the year, often associated with the campaigning
      season.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: Then ... died
  alternatives:
  - and ... died
  - so ... died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... died' gives natural
    English narrative sequence without losing the simple verbal sense of מות, 'to
    die'.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: and they buried him
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: The Hebrew is active plural with 3ms object suffix, literally 'and they
    buried him.' English commonly uses an indefinite plural here; this is more transparent
    to the source than converting to a passive.
- source_word: גְדוּדֵי מוֹאָב
  chosen: raiding bands of Moab
  alternatives:
  - bands of Moab
  - Moabite raiders
  - troops of Moab
  lexicon: HALOT
  rationale: גְדוּד often denotes a marauding band or raiding party rather than a
    formal army. 'Raiding bands of Moab' preserves both the construct relation and
    the likely military nuance.
- source_word: יָבֹאוּ
  chosen: used to come
  alternatives:
  - came
  - would come
  lexicon: HALOT
  rationale: Although formally imperfect, in this context it describes customary repeated
    action. 'Used to come' communicates the habitual sense clearly in modern English.
- source_word: בָאָרֶץ
  chosen: into the land
  alternatives:
  - in the land
  - into the country
  lexicon: HALOT
  rationale: 'With בוא (''come/enter''), the phrase naturally carries ingress: ''come
    into the land.'' ''Land'' is retained as the more literal and biblically consistent
    term.'
- source_word: בָּא שָׁנָה
  chosen: at the coming of the year
  alternatives:
  - in the spring of the year
  - when the year came in
  - year by year
  lexicon: HALOT
  rationale: Literally 'at the coming of the year.' In context this idiom likely refers
    to the turn of the year, often springtime when military campaigns resumed. The
    main text keeps the more transparent literal expression, while a footnote preserves
    the idiomatic alternative.
