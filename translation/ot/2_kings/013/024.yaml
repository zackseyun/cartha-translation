id: 2KI.13.24
reference: 2 Kings 13:24
source:
  edition: WLC
  text: וַ/יָּ֖מָת חֲזָאֵ֣ל מֶֽלֶךְ אֲרָ֑ם וַ/יִּמְלֹ֛ךְ בֶּן הֲדַ֥ד בְּנ֖/וֹ תַּחְתָּֽי/ו־־׃
translation:
  text: Then Hazael king of Aram died, and Ben-hadad his son became king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'king of Syria.' The Hebrew reads 'Aram,' the name of the kingdom traditionally
      rendered 'Syria' in older English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - Then ... died
  lexicon: HALOT
  rationale: 'Qal wayyiqtol of מות, straightforward narrative preterite: ''died.''
    The prefixed waw is represented in English by sequencing with ''Then'' at the
    clause level rather than by over-literal ''and died.'''
- source_word: חֲזָאֵל
  chosen: Hazael
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: אֲרָם refers to Aram, the historical polity; 'Aram' preserves the Hebrew
    proper name more directly than the traditional but interpretive 'Syria.'
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: מלך in the causally sequential accession context is best rendered 'became
    king,' which is natural English and accurately conveys enthronement/succession
    rather than the broader duration implied by 'reigned.'
- source_word: בֶּן־הֲדַד
  chosen: Ben-hadad
  alternatives:
  - Benhadad
  rationale: Dynastic/personal name transliterated in standard English form with hyphen.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: The pronominal suffix refers back to Hazael; explicit filial relation
    should be retained in English.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  - in place of him
  lexicon: HALOT
  rationale: תחת with pronominal suffix in succession formula denotes replacement/succession.
    'In his place' is idiomatic and precise in royal context.
