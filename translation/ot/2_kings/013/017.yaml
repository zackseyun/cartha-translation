theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the divine name, aligning with
    the doctrine excerpt's contested terms table.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of תְּשׁוּעָה in a military oracle
  chosen_reading: victory
  alternative_readings:
  - salvation
  - deliverance
  rationale: The term can carry broader theological meaning, but in this immediate
    context of symbolic archery and promised military success against Aram, 'victory'
    best conveys the concrete sense without denying that the victory is granted by
    the LORD.
