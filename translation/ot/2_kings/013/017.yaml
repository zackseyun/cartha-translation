id: 2KI.13.17
reference: 2 Kings 13:17
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר פְּתַ֧ח הַ/חַלּ֛וֹן קֵ֖דְמָ/ה וַ/יִּפְתָּ֑ח וַ/יֹּ֤אמֶר אֱלִישָׁ֤ע
    יְרֵה֙ וַ/יּ֔וֹר וַ/יֹּ֗אמֶר חֵץ תְּשׁוּעָ֤ה לַֽ/יהוָה֙ וְ/חֵ֣ץ תְּשׁוּעָ֣ה בַֽ/אֲרָ֔ם
    וְ/הִכִּיתָ֧ אֶת אֲרָ֛ם בַּ/אֲפֵ֖ק עַד כַּלֵּֽה־־־׃
translation:
  text: Then he said, “Open the window eastward,” and he opened it. Then Elisha said,
    “Shoot,” and he shot. And he said, “The LORD’s arrow of victory, even the arrow
    of victory over Aram! For you will strike Aram at Aphek until you have destroyed
    it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an arrow of salvation from the LORD, an arrow of salvation against Aram.”
      The Hebrew term can also mean “salvation” or “deliverance.”
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתַח
  chosen: Open
  alternatives:
  - Uncover
  lexicon: HALOT
  rationale: Qal imperative of פתח in straightforward command sense; 'open' is the
    natural modern English equivalent for a window.
- source_word: הַחַלּוֹן קֵדְמָה
  chosen: the window eastward
  alternatives:
  - the east window
  - the window toward the east
  lexicon: HALOT
  rationale: קֵדְמָה is directional ('eastward/toward the east'). Rendering it adverbially
    preserves the Hebrew command structure rather than converting it into an attributive
    phrase.
- source_word: יְרֵה
  chosen: Shoot
  alternatives:
  - Shoot an arrow
  - Fire
  lexicon: HALOT
  rationale: Imperative of ירה in archery context. 'Shoot' is concise and idiomatic;
    'fire' would be anachronistic, and 'shoot an arrow' adds an object not explicit
    in the Hebrew.
- source_word: חֵץ תְּשׁוּעָה לַיהוָה
  chosen: The LORD’s arrow of victory
  alternatives:
  - An arrow of salvation from the LORD
  - The arrow of deliverance of the LORD
  lexicon: HALOT
  rationale: תְּשׁוּעָה can mean 'salvation,' 'deliverance,' or 'victory.' In this
    military sign-act context, 'victory' best communicates concrete battlefield deliverance.
    The lamed with YHWH is rendered possessively ('the LORD’s') to express source/agency
    in natural English.
- source_word: וְחֵץ תְּשׁוּעָה בַאֲרָם
  chosen: even the arrow of victory over Aram
  alternatives:
  - and an arrow of victory against Aram
  - and the arrow of deliverance from Aram
  lexicon: HALOT
  rationale: The second phrase appositionally explains the first. ב with Aram is best
    taken adversatively in context ('over/against Aram'). 'Even' captures the explicative
    force of waw here.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than replaced by traditional geopolitical equivalents. 'Aram' preserves
    the Hebrew designation.
- source_word: וְהִכִּיתָ אֶת אֲרָם
  chosen: For you will strike Aram
  alternatives:
  - And you shall strike Aram
  - You will defeat Aram
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means 'strike/smite.' 'Strike' preserves the verbal
    imagery without overinterpreting as total defeat at this point in the sentence.
    'For' makes explicit the explanatory force linking the sign to its meaning.
- source_word: בַּאֲפֵק
  chosen: at Aphek
  alternatives:
  - in Aphek
  lexicon: HALOT
  rationale: ב with a place name in battle narrative is naturally rendered 'at' in
    English.
- source_word: עַד כַּלֵּה
  chosen: until you have destroyed it
  alternatives:
  - until you have made an end of it
  - until annihilation
  - until completion
  lexicon: HALOT
  rationale: כלה in this construction denotes bringing to an end, here in military
    destruction. English requires an object; 'it' refers back to Aram as the enemy
    force. This is smoother than the archaic 'make an end of' while preserving the
    sense of complete defeat.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD,'
    with alternatives preserved only if needed.
