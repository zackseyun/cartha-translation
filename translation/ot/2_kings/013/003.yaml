id: 2KI.13.3
reference: 2 Kings 13:3
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בְּ/יִשְׂרָאֵ֑ל וַֽ/יִּתְּנֵ֞/ם בְּ/יַ֣ד חֲזָאֵ֣ל מֶֽלֶךְ אֲרָ֗ם וּ/בְ/יַ֛ד בֶּן הֲדַ֥ד בֶּן חֲזָאֵ֖ל כָּל הַ/יָּמִֽים־׀־־־־׃
translation:
  text: So Yahweh’s anger burned against Israel, and he gave them into the hand of Hazael king of Aram, and into the hand of Ben-hadad son of Hazael, all those days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the days'—that is, throughout that period.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of,' an idiom meaning into the power or control of.
    reason: lexical_alternative
  - marker: c
    text: Aram is the Hebrew name often rendered 'Syria' in older English translations.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: anger burned
  alternatives:
  - became angry
  - his anger was kindled
  lexicon: HALOT
  rationale: The idiom literally involves the nose/anger burning. 'Anger burned' preserves the vivid Hebrew metaphor in natural English better than the flatter 'became angry.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  - at Israel
  lexicon: HALOT
  rationale: With verbs of anger, the preposition here is best rendered idiomatically as 'against,' expressing hostility directed toward Israel.
- source_word: וַיִּתְּנֵם
  chosen: he gave them
  alternatives:
  - he delivered them
  - he handed them over
  lexicon: HALOT
  rationale: The basic sense of נתן is 'give.' In this military-judgment context, 'gave them into the hand of' is a transparent and biblically recognizable idiom; 'delivered' is possible but slightly more interpretive.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for being placed under another's control. Retaining 'hand' preserves the source imagery while remaining understandable in English.
- source_word: חֲזָאֵל מֶלֶךְ אֲרָם
  chosen: Hazael king of Aram
  alternatives:
  - Hazael, king of Syria
  lexicon: HALOT
  rationale: Personal names are transliterated, and אֲרָם is rendered 'Aram' rather than the traditional 'Syria' to reflect the Hebrew toponym more directly.
- source_word: בֶּן־הֲדַד בֶּן־חֲזָאֵל
  chosen: Ben-hadad son of Hazael
  alternatives:
  - Benhadad son of Hazael
  lexicon: HALOT
  rationale: The proper name is transliterated in a standard English form with hyphenation for readability; the appositional genealogy is kept explicit as in the Hebrew.
- source_word: כָּל הַיָּמִים
  chosen: all those days
  alternatives:
  - all the days
  - continually
  lexicon: HALOT
  rationale: The phrase refers to the duration of the oppression in the narrative context. 'All those days' is natural English that preserves the temporal force without over-paraphrasing.
