id: 2KI.13.13
reference: 2 Kings 13:13
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יוֹאָשׁ֙ עִם אֲבֹתָ֔י/ו וְ/יָרָבְעָ֖ם יָשַׁ֣ב עַל כִּסְא֑/וֹ
    וַ/יִּקָּבֵ֤ר יוֹאָשׁ֙ בְּ/שֹׁ֣מְר֔וֹן עִ֖ם מַלְכֵ֥י יִשְׂרָאֵֽל־־׃פ
translation:
  text: And Joash slept with his fathers, and Jeroboam sat on his throne. And Joash
    was buried in Samaria with the kings of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lay down with his fathers'; the Hebrew idiom is a conventional formula
      for a king's death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom שׁכב עם־אבות regularly functions as a royal death formula.
    'Slept with his fathers' preserves the Hebrew idiom and its conventional narrative
    force better than flattening it to 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A standard dynastic formula. 'Fathers' is the conventional and more literal
    rendering; 'ancestors' is possible but less textually transparent.
- source_word: יָשַׁב עַל כִּסְאוֹ
  chosen: sat on his throne
  alternatives:
  - took his seat on his throne
  - became king in his place
  lexicon: HALOT
  rationale: The Hebrew literally says 'sat on his throne,' a standard accession expression.
    This preserves the imagery while clearly indicating succession.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - they buried
  lexicon: HALOT
  rationale: The form is best rendered as passive here in English, matching the conventional
    notice of burial without supplying an unspecified subject.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב here is naturally locative. 'In Samaria' is idiomatic
    English for the burial location.
- source_word: עִם מַלְכֵי יִשְׂרָאֵל
  chosen: with the kings of Israel
  alternatives:
  - among the kings of Israel
  lexicon: HALOT
  rationale: '''With the kings of Israel'' closely follows the Hebrew and conveys
    burial in the company of prior Israelite kings.'
