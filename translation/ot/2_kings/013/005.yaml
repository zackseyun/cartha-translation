theological_decisions:
- issue: Whether מוֹשִׁיעַ should be rendered 'deliverer' or 'savior'
  chosen_reading: deliverer
  alternative_readings:
  - savior
  rationale: The verse refers to temporal rescue from Aramean domination. 'Deliverer'
    best matches the immediate historical sense and avoids suggesting a messianic
    identification not stated by the text, while still preserving the saving action
    of God through an agent.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than import doctrinal claims the text does not make.'
- issue: Whether to preserve the familial phrase בְנֵי יִשְׂרָאֵל literally
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew expression is grammatically masculine and functions as Israel's
    covenantal/familial designation. Per the project's gender-accurate policy, the
    masculine form is retained rather than neutralized.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
