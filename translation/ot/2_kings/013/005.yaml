id: 2KI.13.5
reference: 2 Kings 13:5
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן יְהוָ֤ה לְ/יִשְׂרָאֵל֙ מוֹשִׁ֔יעַ וַ/יֵּ֣צְא֔וּ מִ/תַּ֖חַת יַד
    אֲרָ֑ם וַ/יֵּשְׁב֧וּ בְנֵֽי יִשְׂרָאֵ֛ל בְּ/אָהֳלֵי/הֶ֖ם כִּ/תְמ֥וֹל שִׁלְשֽׁוֹם־־׃
translation:
  text: And the LORD gave Israel a deliverer, so that they went out from under the
    hand of Aram; and the sons of Israel lived in their tents as formerly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a savior.' The Hebrew word denotes one who brings rescue or deliverance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from under the hand of Aram,' an idiom for release from Aram's power.
    reason: cultural_note
  - marker: c
    text: Or 'as before' / 'as in former times.' Literally, 'as yesterday, three days
      ago,' a Hebrew idiom for former days.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name in standard English small-caps style rather than transliteration.
- source_word: מוֹשִׁיעַ
  chosen: a deliverer
  alternatives:
  - a savior
  - one who saves
  lexicon: HALOT
  rationale: The participial noun from ישׁע denotes one who brings rescue/deliverance.
    'Deliverer' fits the historical-political context of relief from Aramean oppression
    without importing later christological overtones that 'savior' may carry in English.
- source_word: מִתַּחַת יַד אֲרָם
  chosen: from under the hand of Aram
  alternatives:
  - from the power of Aram
  - from under Aram's control
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for oppressive power or domination. The
    main text keeps the concrete image 'under the hand' while remaining intelligible
    in English.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Uses the transliterated historical name rather than the later geographical
    equivalent 'Syria,' in keeping with original-language primacy and standard rendering
    of the biblical polity.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Per the project's gender-accurate
    principle, the familial expression is retained rather than flattened to a neutral
    collective. It also preserves the literary cadence of the historical books.
- source_word: בְּאָהֳלֵיהֶם
  chosen: in their tents
  alternatives:
  - in their homes
  - in their dwellings
  lexicon: HALOT
  rationale: Although 'tents' can function idiomatically for household dwellings,
    the concrete term is retained because it is the actual Hebrew wording and remains
    understandable in English.
- source_word: כִּתְמוֹל שִׁלְשׁוֹם
  chosen: as formerly
  alternatives:
  - as before
  - as in former times
  - as yesterday and the day before
  lexicon: HALOT
  rationale: The idiom literally evokes 'as yesterday, three days ago,' meaning formerly
    or as in earlier times. 'As formerly' communicates the idiomatic sense naturally
    without wooden obscurity.
- source_word: וַיֵּצְאוּ
  chosen: they went out
  alternatives:
  - they escaped
  - they came out
  lexicon: HALOT
  rationale: A straightforward rendering of the verb יצא. In context it describes
    emergence from subjugation; the following idiom supplies that nuance.
- source_word: וַיֵּשְׁבוּ
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: While the verb literally means 'sat/dwelt,' 'lived' is idiomatic modern
    English in this context and pairs naturally with 'in their tents.'
