id: 2KI.13.16
reference: 2 Kings 13:16
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר לְ/מֶ֣לֶךְ יִשְׂרָאֵ֗ל הַרְכֵּ֤ב יָֽדְ/ךָ֙ עַל הַ/קֶּ֔שֶׁת וַ/יַּרְכֵּ֖ב
    יָד֑/וֹ וַ/יָּ֧שֶׂם אֱלִישָׁ֛ע יָדָ֖י/ו עַל יְדֵ֥י הַ/מֶּֽלֶךְ׀־־׃
translation:
  text: Then he said to the king of Israel, “Put your hand on the bow.” So he put
    his hand on it, and Elisha laid his hands on the king’s hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'put your hand upon the bow.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְכֵּב
  chosen: Put
  alternatives:
  - Mount
  - Place
  lexicon: HALOT
  rationale: Hiphil imperative of רכב here means to cause the hand to rest/be placed
    on the bow. 'Put' is natural modern English and fits the physical action better
    than the more literal but awkward 'mount.'
- source_word: יָדְךָ עַל־הַקֶּשֶׁת
  chosen: your hand on the bow
  alternatives:
  - your hand upon the bow
  lexicon: HALOT
  rationale: A straightforward spatial expression. 'On' is idiomatic modern English;
    'upon' is unnecessarily archaic.
- source_word: וַיַּרְכֵּב יָדוֹ
  chosen: So he put his hand on it
  alternatives:
  - So he put his hand
  - So he placed his hand on the bow
  lexicon: HALOT
  rationale: The object 'the bow' is not repeated in Hebrew, but English benefits
    from 'on it' to make the action explicit without overtranslating. The pronoun
    naturally refers back to the bow.
- source_word: וַיָּשֶׂם
  chosen: laid
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: '''Laid his hands on'' is idiomatic English for placing hands upon someone/something
    and preserves the solemnity of the prophetic gesture.'
- source_word: יָדָיו עַל יְדֵי הַמֶּלֶךְ
  chosen: his hands on the king’s hands
  alternatives:
  - his hands upon the king's hands
  lexicon: HALOT
  rationale: The Hebrew explicitly uses plural 'hands' for Elisha and dual/plural
    form for the king's hands. Rendering both preserves the physical image of Elisha
    covering or guiding the king's hands.
- source_word: וַיֹּאמֶר לְמֶלֶךְ יִשְׂרָאֵל
  chosen: Then he said to the king of Israel
  alternatives:
  - And he said to the king of Israel
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
