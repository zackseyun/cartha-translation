id: 2KI.18.8
reference: 2 Kings 18:8
source:
  edition: WLC
  text: הֽוּא הִכָּ֧ה אֶת פְּלִשְׁתִּ֛ים עַד עַזָּ֖ה וְ/אֶת גְּבוּלֶ֑י/הָ מִ/מִּגְדַּ֥ל
    נוֹצְרִ֖ים עַד עִ֥יר מִבְצָֽר־־־־־׃פ
translation:
  text: He struck the Philistines as far as Gaza and its territory, from watchtower
    to fortified city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from watchtower to fortified city,'' an idiom meaning from the
      smallest outpost to the largest defended settlement.'
    reason: cultural_note
  - marker: b
    text: Or 'and its borders.' The Hebrew word can denote either boundary lines or
      the territory belonging to a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  chosen: He
  lexicon: HALOT
  rationale: Explicit subject pronoun retained for clarity and emphasis in Hebrew
    narrative style.
- source_word: הִכָּה
  chosen: struck
  alternatives:
  - defeated
  - smote
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite' and can extend to military defeat.
    'Struck' preserves the verbal imagery while fitting the military context without
    overinterpreting.
- source_word: פְּלִשְׁתִּים
  chosen: the Philistines
  lexicon: HALOT
  rationale: Standard ethnic designation.
- source_word: עַד עַזָּה
  chosen: as far as Gaza
  alternatives:
  - up to Gaza
  lexicon: HALOT
  rationale: עַד marks extent; 'as far as' is natural English for territorial reach.
- source_word: וְאֶת גְּבוּלֶיהָ
  chosen: and its territory
  alternatives:
  - and its borders
  - and its territory around it
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. Here with Gaza and the
    following extent formula, it likely refers to the territory belonging to Gaza,
    not merely the boundary line.
- source_word: מִמִּגְדַּל נוֹצְרִים
  chosen: from watchtower
  alternatives:
  - from tower of watchmen
  - from lookout tower
  lexicon: HALOT
  rationale: This idiom denotes the smallest or most exposed settlement point in a
    region. The participle נוֹצְרִים ('watching/guarding ones') functions attributively
    with מגדל, yielding the sense of a watchtower or lookout tower. Singular is retained
    as in Hebrew.
- source_word: עַד עִיר מִבְצָר
  chosen: to fortified city
  alternatives:
  - to fortified town
  - to fortress city
  lexicon: HALOT
  rationale: This is a merism with the previous phrase, expressing the whole range
    from minor outpost to major defended urban center. 'Fortified city' is the most
    standard rendering of עִיר מִבְצָר.
