id: 2KI.18.18
reference: 2 Kings 18:18
source:
  edition: WLC
  text: וַֽ/יִּקְרְאוּ֙ אֶל הַ/מֶּ֔לֶךְ וַ/יֵּצֵ֧א אֲלֵ/הֶ֛ם אֶלְיָקִ֥ים בֶּן חִלְקִיָּ֖הוּ
    אֲשֶׁ֣ר עַל הַ/בָּ֑יִת וְ/שֶׁבְנָה֙ הַ/סֹּפֵ֔ר וְ/יוֹאָ֥ח בֶּן אָסָ֖ף הַ/מַּזְכִּֽיר־־־־׃
translation:
  text: And they called for the king, and Eliakim son of Hilkiah, who was over the
    household, came out to them, along with Shebna the scribe and Joah son of Asaph,
    the recorder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went out to them.'
    reason: lexical_alternative
  - marker: b
    text: '''Who was over the household'' is an administrative title; alternatively,
      ''who was over the palace.'''
    reason: cultural_note
  - marker: c
    text: Or 'the secretary' for 'the scribe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  chosen: they called for
  alternatives:
  - they called out
  - they summoned
  lexicon: HALOT
  rationale: The verb קרא with אֶל can mean to call to or call for someone. In this
    diplomatic setting, 'called for' fits the sense of requesting the king's appearance
    without overstating it as a formal summons.
- source_word: אֶל הַמֶּלֶךְ
  chosen: for the king
  alternatives:
  - to the king
  lexicon: HALOT
  rationale: Although literally 'to the king,' English idiom after 'called' is better
    expressed as 'called for the king.' This preserves the action's sense in natural
    English.
- source_word: וַיֵּצֵא אֲלֵהֶם
  chosen: came out to them
  alternatives:
  - went out to them
  lexicon: HALOT
  rationale: יצא commonly means 'go out/come out.' From the narrator's perspective
    in English, 'came out to them' reads naturally and conveys that the Judean officials
    emerged from the city/palace area to meet the Assyrian delegation.
- source_word: אֶלְיָקִים בֶּן חִלְקִיָּהוּ
  chosen: Eliakim son of Hilkiah
  rationale: Personal names are transliterated per project philosophy; 'son of' preserves
    the standard Hebrew patronymic construction.
- source_word: אֲשֶׁר עַל הַבָּיִת
  chosen: who was over the household
  alternatives:
  - who was over the palace
  - who was in charge of the house
  lexicon: HALOT
  rationale: This is an administrative title. 'Over the household' is a close rendering
    that preserves the metaphor of בית while communicating official oversight. 'Palace'
    is possible contextually, but 'household' better reflects the Hebrew and leaves
    the title's scope broad.
- source_word: וְשֶׁבְנָה
  chosen: along with Shebna
  alternatives:
  - and Shebna
  rationale: The conjunction simply means 'and'; 'along with' is used in English to
    clarify that Shebna accompanied Eliakim rather than being the subject of a separate
    clause.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר denotes an official scribe/secretary. 'Scribe' is the more transparent
    and traditional administrative term, while still understandable in modern English.
- source_word: וְיוֹאָח בֶּן אָסָף
  chosen: and Joah son of Asaph
  rationale: Names are transliterated; the patronymic is preserved straightforwardly.
- source_word: הַמַּזְכִּיר
  chosen: the recorder
  alternatives:
  - the remembrancer
  - the chronicler
  lexicon: HALOT
  rationale: This refers to a royal official, likely responsible for records and state
    memoranda. 'Recorder' is the clearest established English equivalent without archaic
    wording.
