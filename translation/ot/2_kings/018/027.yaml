id: 2KI.18.27
reference: 2 Kings 18:27
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵי/הֶ֜ם רַב שָׁקֵ֗ה הַ/עַ֨ל אֲדֹנֶ֤י/ךָ וְ/אֵלֶ֨י/ךָ֙ שְׁלָחַ֣/נִי
    אֲדֹנִ֔/י לְ/דַבֵּ֖ר אֶת הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה הֲ/לֹ֣א עַל הָ/אֲנָשִׁ֗ים הַ/יֹּֽשְׁבִים֙
    עַל הַ֣/חֹמָ֔ה לֶ/אֱכֹ֣ל אֶת חרי/הם וְ/לִ/שְׁתּ֛וֹת אֶת שיני/הם עִמָּ/כֶֽם־־־־־׃
translation:
  text: Then the Rabshakeh said to them, “Has my master sent me to speak these words
    only to your master and to you? Has he not also sent me to the men sitting on
    the wall, who are destined to eat their own dung and drink their own urine with
    you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally uses coarse siege imagery: ''eat their dung and drink
      their urine.'' Some manuscripts/traditions preserve euphemistic wording for
      the second expression, often rendered ''drink the water of their feet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: Although the Akkadian-derived title originally referred to a high Assyrian
    official, in Kings it functions almost like a title/name for this spokesman. Retaining
    the conventional transliteration avoids over-specifying the office in English
    while matching narrative usage.
- source_word: הַעַל ... שְׁלָחַנִי אֲדֹנִי
  chosen: Has my master sent me
  alternatives:
  - Is it to ... that my master has sent me
  lexicon: HALOT
  rationale: The interrogative הַ with עַל introduces a rhetorical question. English
    idiom is best served by rendering the clause as 'Has my master sent me...?' while
    preserving the force of the challenge.
- source_word: אֲדֹנֶיךָ
  chosen: your master
  alternatives:
  - your lord
  lexicon: HALOT
  rationale: Here the referent is the Judean king/master in political discourse, not
    a divine title. 'Master' fits the social-political context better than 'lord'
    in modern English.
- source_word: וְאֵלֶיךָ
  chosen: and to you
  alternatives:
  - and to you personally
  lexicon: HALOT
  rationale: Direct second-person singular reference to Eliakim and his companions
    is preserved straightforwardly.
- source_word: לְדַבֵּר אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: to speak these words
  alternatives:
  - to say these things
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the concrete wording of the Hebrew
    without sounding archaic.
- source_word: הֲלֹא עַל הָאֲנָשִׁים הַיֹּשְׁבִים עַל הַחֹמָה
  chosen: Has he not also sent me to the men sitting on the wall
  alternatives:
  - Is it not to the men who sit on the wall
  lexicon: HALOT
  rationale: 'The rhetorical particle הֲלֹא expects an affirmative answer. ''Also''
    makes explicit the implied contrast: not only to the officials, but also to the
    defenders on the wall.'
- source_word: לֶאֱכֹל
  chosen: who are destined to eat
  alternatives:
  - to eat
  - so that they may eat
  lexicon: HALOT
  rationale: The infinitive expresses the grim consequence of siege conditions for
    the men on the wall. 'Who are destined to eat' brings out the prospective/resultative
    force in natural English without adding theology.
- source_word: חרי/הם
  chosen: their own dung
  alternatives:
  - their excrement
  lexicon: HALOT
  rationale: The ketiv points to a crude term traditionally understood as excrement/dung.
    'Dung' is vivid, idiomatic, and appropriately harsh for the taunt.
- source_word: וְלִשְׁתּוֹת אֶת שיני/הם
  chosen: and drink their own urine
  alternatives:
  - and drink the water of their feet
  lexicon: HALOT
  rationale: The written form here is a well-known euphemistic/deflective expression.
    In this verse the plain sense is urine, and rendering it directly communicates
    the siege-taunt clearly in modern English.
- source_word: עִמָּכֶם
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: 'Simple accompaniment is intended: the men on the wall will suffer the
    same fate together with the addressed officials/people.'
