id: 2KI.18.26
reference: 2 Kings 18:26
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶלְיָקִ֣ים בֶּן חִ֠לְקִיָּהוּ וְ/שֶׁבְנָ֨ה וְ/יוֹאָ֜ח אֶל רַב
    שָׁקֵ֗ה דַּבֶּר נָ֤א אֶל עֲבָדֶ֨י/ךָ֙ אֲרָמִ֔ית כִּ֥י שֹׁמְעִ֖ים אֲנָ֑חְנוּ וְ/אַל
    תְּדַבֵּ֤ר עִמָּ֨/נוּ֙ יְהוּדִ֔ית בְּ/אָזְנֵ֣י הָ/עָ֔ם אֲשֶׁ֖ר עַל הַ/חֹמָֽה־־־־־־־׃
translation:
  text: Then Eliakim son of Hilkiah, and Shebna, and Joah said to the Rabshakeh, “Please
    speak to your servants in Aramaic, for we understand it. And do not speak with
    us in Judean within the hearing of the people who are on the wall.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Hebrew.' The Hebrew term is יְהוּדִית, literally 'Judean,' referring
      to the language of Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: Although the title likely originated as an Assyrian office, English Bible
    tradition commonly treats it as a title/name. Retaining 'Rabshakeh' avoids overconfident
    reconstruction of the exact office while preserving recognizability.
- source_word: דַּבֶּר נָא
  chosen: Please speak
  alternatives:
  - Speak, please
  lexicon: HALOT
  rationale: The imperative plus particle נָא expresses a polite request. 'Please
    speak' is natural modern English while preserving the request force.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your servants/slaves
  - us your servants
  lexicon: HALOT
  rationale: In this courtly diplomatic setting, עבד is a conventional self-humbling
    term rather than emphasizing chattel status. 'Your servants' best reflects the
    register without importing the stronger bonded sense.
- source_word: אֲרָמִית
  chosen: Aramaic
  alternatives:
  - in Aramaic
  - the Aramaic language
  lexicon: HALOT
  rationale: The feminine form functions adverbially/language-wise here. English idiom
    prefers 'in Aramaic'; the main text uses 'in Aramaic' with 'speak' to make the
    sense explicit.
- source_word: כִּי שֹׁמְעִים אֲנָחְנוּ
  chosen: for we understand it
  alternatives:
  - for we hear
  - for we are listening
  lexicon: HALOT
  rationale: שׁמע can mean 'hear' or 'understand' depending on context. Since the
    request concerns language competence, 'understand it' conveys the intended sense
    more clearly than the more literal 'hear.'
- source_word: יְהוּדִית
  chosen: Judean
  alternatives:
  - Hebrew
  - the language of Judah
  - Judean language
  lexicon: HALOT
  rationale: The term denotes the language/dialect of Judah, not necessarily classical
    Hebrew as a technical linguistic label. 'Judean' follows the source more closely
    and avoids anachronistic precision.
- source_word: בְּאָזְנֵי
  chosen: within the hearing of
  alternatives:
  - in the ears of
  - before
  lexicon: HALOT
  rationale: The idiom literally means 'in the ears of' and refers to what the people
    can hear. 'Within the hearing of' is idiomatic English that preserves the auditory
    emphasis.
- source_word: הָעָם אֲשֶׁר עַל הַחֹמָה
  chosen: the people who are on the wall
  alternatives:
  - the people on the wall
  - the troops on the wall
  lexicon: HALOT
  rationale: The Hebrew says 'the people,' not specifically soldiers. 'Who are on
    the wall' preserves the relative clause and the scene without narrowing the referent.
- source_word: וַיֹּאמֶר ... אֶל
  chosen: Then ... said to
  alternatives:
  - And ... said to
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
