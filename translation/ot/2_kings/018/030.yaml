theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per DOCTRINE.md contested
    terms table, the default rendering is 'the LORD.' This preserves established reverential
    convention without obscuring that the same divine name appears in both instances.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
