id: 2KI.18.30
reference: 2 Kings 18:30
source:
  edition: WLC
  text: וְ/אַל יַבְטַ֨ח אֶתְ/כֶ֤ם חִזְקִיָּ֨הוּ֙ אֶל יְהוָ֣ה לֵ/אמֹ֔ר הַצֵּ֥ל יַצִּילֵ֖/נוּ
    יְהוָ֑ה וְ/לֹ֤א תִנָּתֵן֙ אֶת הָ/עִ֣יר הַ/זֹּ֔את בְּ/יַ֖ד מֶ֥לֶךְ אַשּֽׁוּר־־־׃
translation:
  text: And do not let Hezekiah make you trust in the LORD, saying, ‘The LORD will
    surely deliver us, and this city will not be given into the hand of the king of
    Assyria.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The LORD delivering will deliver us,'' an emphatic form meaning
      ''The LORD will surely deliver us.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל יַבְטַח אֶתְ/כֶם
  chosen: do not let ... make you trust
  alternatives:
  - do not let ... persuade you to trust
  - do not trust
  lexicon: HALOT
  rationale: 'The Hiphil of בטח with object suffix conveys causative force: Hezekiah
    is not merely trusting himself, but causing/persuading the people to trust. English
    ''make you trust'' preserves that causative sense more directly than the flatter
    ''do not trust,'' while remaining natural.'
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל יְהוָה
  chosen: in the LORD
  alternatives:
  - on the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: Though the preposition is אֶל ('to/toward'), with בטח the idiomatic sense
    in English is 'trust in.' The divine name is rendered 'the LORD' per doctrinal
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for the divine
    name, following Jewish reverence tradition and the LXX pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing Hezekiah's reported claim.
- source_word: הַצֵּל יַצִּילֵנוּ
  chosen: will surely deliver us
  alternatives:
  - will certainly rescue us
  - delivering, he will deliver us
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of נצל intensifies the verbal
    idea. 'Will surely deliver us' captures the emphatic force in idiomatic English.
    'Deliver' fits both military and theological context well.
- source_word: וְלֹא תִנָּתֵן
  chosen: and ... will not be given
  alternatives:
  - and ... will not be handed over
  lexicon: HALOT
  rationale: Passive of נתן here means being given over into enemy control. 'Will
    not be given' is formally close and clear; 'handed over' is possible but slightly
    more interpretive.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city, this one
  lexicon: HALOT
  rationale: Natural English rendering of noun plus demonstrative.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - under the control of
  lexicon: HALOT
  rationale: '''Into the hand of'' preserves the common Hebrew idiom and its concrete
    force; it remains understandable in English in this military context.'
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  rationale: Standard historical designation; 'Assyria' is the conventional English
    form of אַשּׁוּר in this geopolitical context.
