id: 2KI.18.7
reference: 2 Kings 18:7
source:
  edition: WLC
  text: וְ/הָיָ֤ה יְהוָה֙ עִמּ֔/וֹ בְּ/כֹ֥ל אֲשֶׁר יֵצֵ֖א יַשְׂכִּ֑יל וַ/יִּמְרֹ֥ד בְּ/מֶֽלֶךְ אַשּׁ֖וּר וְ/לֹ֥א עֲבָדֽ/וֹ־־׃
translation:
  text: And Yahweh was with him; wherever he went, he prospered. And he rebelled against the king of Assyria and did not serve him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in everything he undertook, he succeeded' / 'he acted wisely in all that he did.' The Hebrew combines the ideas of wisdom and success.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH.
- source_word: וְהָיָה ... עִמּוֹ
  chosen: was with him
  alternatives:
  - came to be with him
  lexicon: HALOT
  rationale: The idiom expresses ongoing divine presence and favor. English 'was with him' is the natural equivalent.
- source_word: בְּכֹל אֲשֶׁר יֵצֵא
  chosen: wherever he went out
  alternatives:
  - in everything that he undertook
  - wherever he went
  lexicon: HALOT
  rationale: Literally 'in all that he went out'; in context this idiom refers broadly to his undertakings or campaigns. 'Wherever he went out' preserves the Hebrew imagery while remaining intelligible.
- source_word: יַשְׂכִּיל
  chosen: he prospered
  alternatives:
  - he acted wisely
  - he succeeded
  lexicon: HALOT
  rationale: The Hiphil of שׂכל can denote acting wisely or having success/prospering as the result of wise action. In this royal narrative context, the emphasis is outcome, so 'he prospered' best fits.
- source_word: וַיִּמְרֹד
  chosen: he rebelled
  alternatives:
  - he revolted
  lexicon: HALOT
  rationale: Standard rendering for מרד in political context; it denotes rebellion against imperial authority.
- source_word: בְּמֶלֶךְ אַשּׁוּר
  chosen: against the king of Assyria
  alternatives:
  - against Assyria's king
  lexicon: HALOT
  rationale: Direct and natural rendering of the political object of rebellion.
- source_word: וְלֹא עֲבָדוֹ
  chosen: did not serve him
  alternatives:
  - did not become his servant
  - did not submit to him
  lexicon: HALOT
  rationale: עבד with a personal object commonly means to serve. In this political context it refers to vassal service/tribute, but 'serve him' preserves the Hebrew and allows the political sense to stand from context.
