id: 2KI.18.15
reference: 2 Kings 18:15
source:
  edition: WLC
  text: וַ/יִּתֵּן֙ חִזְקִיָּ֔ה אֶת כָּל הַ/כֶּ֖סֶף הַ/נִּמְצָ֣א בֵית יְהוָ֑ה וּ/בְ/אֹצְר֖וֹת
    בֵּ֥ית הַ/מֶּֽלֶךְ־־־׃
translation:
  text: So Hezekiah gave all the silver that was found in the house of the LORD and
    in the treasuries of the king's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the money'; Hebrew 'the silver.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of the LORD'; literally 'the house of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the royal palace'; literally 'the king's house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - handed over
  - paid
  lexicon: HALOT
  rationale: The verb נתן broadly means 'give, hand over, put.' In this tribute context,
    'gave' is the most natural and sufficiently broad English rendering, without over-specifying
    the transaction as a formal payment in the main text.
- source_word: חִזְקִיָּה
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: The quantifier is comprehensive and is best represented straightforwardly
    as 'all.'
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: כֶּסֶף can denote either silver as metal or money by extension. Because
    the Hebrew explicitly says 'silver' and the context concerns temple and royal
    treasuries, 'silver' preserves the concrete wording while still making sense contextually.
- source_word: הַנִּמְצָא
  chosen: that was found
  alternatives:
  - that was available
  - that was present
  lexicon: HALOT
  rationale: The Niphal participle of מצא means 'be found.' 'That was found' is the
    most direct rendering and preserves the passive/resultative sense of what was
    on hand in those locations.
- source_word: בֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression;
    'temple' is a possible contextual gloss but is less formally aligned with the
    source.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: וּבְאֹצְרוֹת
  chosen: and in the treasuries
  alternatives:
  - and in the storehouses
  - and in the treasury chambers
  lexicon: HALOT
  rationale: אֹצָר can refer to a treasury or storehouse. In parallel with temple
    wealth and royal holdings, 'treasuries' best fits the financial context.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king's house
  alternatives:
  - the royal palace
  - the house of the king
  lexicon: HALOT
  rationale: Literally 'house of the king.' The construct phrase is preserved as 'the
    king's house.' Although this likely refers to the palace complex, the more literal
    rendering maintains the Hebrew wording and parallelism with 'the house of the
    LORD.'
