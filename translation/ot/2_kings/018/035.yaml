id: 2KI.18.35
reference: 2 Kings 18:35
source:
  edition: WLC
  text: מִ֚י בְּ/כָל אֱלֹהֵ֣י הָֽ/אֲרָצ֔וֹת אֲשֶׁר הִצִּ֥ילוּ אֶת אַרְצָ֖/ם מִ/יָּדִ֑/י
    כִּי יַצִּ֧יל יְהוָ֛ה אֶת יְרוּשָׁלִַ֖ם מִ/יָּדִֽ/י־־־־־׃
translation:
  text: Who among all the gods of the lands has delivered their land from my hand,
    that the LORD should deliver Jerusalem from my hand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who among all the gods of the countries ... that the LORD will deliver
      Jerusalem from my hand?'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Which one
  lexicon: HALOT
  rationale: Interrogative pronoun introducing Rabshakeh's rhetorical question; 'Who'
    is the natural English equivalent.
- source_word: בְּכָל אֱלֹהֵי הָאֲרָצוֹת
  chosen: among all the gods of the lands
  alternatives:
  - of all the gods of the countries
  - among all the gods of the earth/lands
  lexicon: HALOT
  rationale: The preposition ב with כָל in this idiom is best represented as partitive
    'among.' אֱלֹהֵי is plural 'gods,' and הָאֲרָצוֹת here refers to the various lands/nations
    rather than the whole earth.
- source_word: אֲשֶׁר
  chosen: '[implicit in English relative clause]'
  alternatives:
  - who
  - that
  lexicon: HALOT
  rationale: The relative particle is absorbed into idiomatic English syntax in 'has
    delivered their land...' without requiring a separate explicit gloss beyond the
    clause structure.
- source_word: הִצִּילוּ
  chosen: has delivered
  alternatives:
  - have delivered
  - rescued
  - saved
  lexicon: HALOT
  rationale: From נצל, 'deliver/rescue.' Singular English agreement is used because
    the head of the rhetorical question is effectively singular 'Who among... has
    delivered...?' rather than emphasizing the plural 'gods' as subject. 'Delivered'
    fits the military context well.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - its land
  - their country
  lexicon: HALOT
  rationale: The 3mp suffix refers distributively to the lands associated with the
    various gods. 'Their land' preserves the Hebrew form while sounding natural in
    English; 'its land' would force a singularizing interpretation.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - from my power
  lexicon: HALOT
  rationale: The idiom 'from my hand' is transparent and preserves the metaphor of
    power/control present in Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - that therefore
  - for that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content of the rhetorical challenge:
    ''that the LORD should deliver...?'' This is more idiomatic than a wooden ''for''
    in English.'
- source_word: יַצִּיל
  chosen: should deliver
  alternatives:
  - will deliver
  - might deliver
  - could deliver
  lexicon: HALOT
  rationale: In this rhetorical question, the imperfect expresses expected or supposed
    action under challenge. 'Should deliver' captures the taunting force better than
    a simple future.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: יְרוּשָׁלַםִ
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
