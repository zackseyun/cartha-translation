theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse quotes Hezekiah's claim about Israel's God. Following the project's
    stated default for יְהוָה, the main text uses 'the LORD'; alternatives are preserved
    only as lexical possibilities, not adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
