id: 2KI.18.32
reference: 2 Kings 18:32
source:
  edition: WLC
  text: עַד בֹּאִ/י֩ וְ/לָקַחְתִּ֨י אֶתְ/כֶ֜ם אֶל אֶ֣רֶץ כְּ/אַרְצְ/כֶ֗ם אֶרֶץ֩ דָּגָ֨ן
    וְ/תִיר֜וֹשׁ אֶ֧רֶץ לֶ֣חֶם וּ/כְרָמִ֗ים אֶ֣רֶץ זֵ֤ית יִצְהָר֙ וּ/דְבַ֔שׁ וִֽ/חְי֖וּ
    וְ/לֹ֣א תָמֻ֑תוּ וְ/אַֽל תִּשְׁמְעוּ֙ אֶל חִזְקִיָּ֔הוּ כִּֽי יַסִּ֤ית אֶתְ/כֶם֙
    לֵ/אמֹ֔ר יְהוָ֖ה יַצִּילֵֽ/נוּ־־־־־׃
translation:
  text: until I come and take you away to a land like your own land, a land of grain
    and new wine, a land of bread and vineyards, a land of olive oil and honey, so
    that you may live and not die. And do not listen to Hezekiah, for he is misleading
    you by saying, ‘The LORD will deliver us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a land of grain and wine”; “new wine” reflects the specific sense of
      תִּירוֹשׁ.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “a land of olive oil and honey,” with a compressed expression involving
      olive produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד בֹּאִי
  chosen: until I come
  alternatives:
  - until I arrive
  lexicon: HALOT
  rationale: The idiom marks a future point up to which the hearers are to comply.
    'Come' is the plain sense of בוא in first person; 'arrive' is possible but less
    direct.
- source_word: וְלָקַחְתִּי אֶתְכֶם
  chosen: and take you away
  alternatives:
  - and take you
  - and carry you off
  lexicon: HALOT
  rationale: לקח means 'take'; in this deportation context, English 'take you away'
    makes the forced relocation explicit without overparaphrasing.
- source_word: אֶל אֶרֶץ כְּאַרְצְכֶם
  chosen: to a land like your own land
  alternatives:
  - to a land like your land
  lexicon: HALOT
  rationale: כְ marks comparison, not identity. 'Like your own land' preserves the
    propagandistic appeal that the destination will resemble Judah.
- source_word: אֶרֶץ דָּגָן וְתִירוֹשׁ
  chosen: a land of grain and new wine
  alternatives:
  - a land of grain and wine
  - a land of corn and new wine
  lexicon: HALOT
  rationale: דגן is grain/cereal produce broadly, not specifically 'corn' in modern
    English. תירוש commonly denotes fresh wine/new wine rather than wine in general.
- source_word: אֶרֶץ לֶחֶם וּכְרָמִים
  chosen: a land of bread and vineyards
  alternatives:
  - a land of food and vineyards
  lexicon: HALOT
  rationale: לחם is literally 'bread' and should be retained; כרמים are vineyards,
    not merely grapes, emphasizing agricultural abundance.
- source_word: אֶרֶץ זֵית יִצְהָר וּדְבַשׁ
  chosen: a land of olive oil and honey
  alternatives:
  - a land of olive trees, oil, and honey
  - a land of olives and honey
  lexicon: HALOT
  rationale: The construct phrase is somewhat compressed. יִצְהָר denotes fresh oil/olive
    oil; rendering the whole as 'olive oil and honey' gives the natural sense in English
    without forcing an awkward literalism.
- source_word: וִחְיוּ וְלֹא תָמֻתוּ
  chosen: so that you may live and not die
  alternatives:
  - and live, and not die
  - then you will live and not die
  lexicon: HALOT
  rationale: The sequence functions as an exhortational result/purpose statement in
    context. 'So that you may live and not die' captures the appeal while remaining
    close to the Hebrew.
- source_word: וְאַל תִּשְׁמְעוּ אֶל חִזְקִיָּהוּ
  chosen: And do not listen to Hezekiah
  alternatives:
  - And do not obey Hezekiah
  lexicon: HALOT
  rationale: שׁמע אל here means to heed/listen to. 'Listen to' is the more direct
    and idiomatic English equivalent.
- source_word: כִּי יַסִּית אֶתְכֶם
  chosen: for he is misleading you
  alternatives:
  - for he is inciting you
  - for he is deceiving you
  - for he is persuading you
  lexicon: HALOT
  rationale: סות in the Hiphil means to entice, incite, or mislead. In this speech
    of psychological pressure, 'misleading' best fits the accusation without overstating
    to outright deception.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the LXX pattern.
- source_word: יַצִּילֵנוּ
  chosen: will deliver us
  alternatives:
  - will save us
  - will rescue us
  lexicon: HALOT
  rationale: נצל in the Hiphil commonly means deliver/rescue from danger. 'Deliver
    us' fits the military context and preserves the theological resonance of divine
    deliverance.
