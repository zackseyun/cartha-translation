id: 2KI.18.3
reference: 2 Kings 18:3
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה דָּוִ֥ד אָבִֽי/ו־׃
translation:
  text: He did what was right in the eyes of Yahweh, according to all that David his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'father' here means ancestor in the Davidic line, not immediate parent.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה introduces the narrative action. English normally omits the conjunction in smooth narrative, so 'He did' best reflects the sense in readable modern English.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: 'The adjective ישר with the article functions substantivally: ''the right/upright thing.'' In idiomatic English, ''what was right'' best captures the moral evaluation.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for evaluation from Yahweh's perspective. 'In the eyes of the LORD' preserves the idiom transparently while remaining natural English. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as all that
  - in accordance with everything that
  lexicon: HALOT
  rationale: The comparative כ plus כל and relative אשר expresses conformity to a pattern. 'According to all that' preserves the formal comparison without sounding wooden.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: The perfect refers to David's prior actions as the standard for Hezekiah. English past perfect clarifies the temporal relationship naturally.
- source_word: דָּוִד אָבִיו
  chosen: David his father
  alternatives:
  - his father David
  - David his ancestor
  lexicon: HALOT
  rationale: Hebrew 'father' can denote an ancestor, not necessarily immediate parent. In royal formulae, 'David his father' is the conventional and sufficiently clear rendering; the dynastic sense can be preserved in a footnote.
