theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of 'father' in 'David his father'
  chosen_reading: Retain the literal dynastic formula 'David his father' in the main text
  alternative_readings:
  - David his ancestor
  rationale: The Hebrew royal formula intentionally links the king to Davidic lineage and pattern. Keeping 'father' preserves the source wording and biblical-theological resonance, while an explanatory footnote can note the broader ancestral sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
