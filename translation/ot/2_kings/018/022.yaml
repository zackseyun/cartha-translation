theological_decisions:
- issue: Representation of Hezekiah's reform in the Assyrian spokesman's accusation
  chosen_reading: Translate the accusation as the speaker's polemical misunderstanding that the removed high places and altars belonged to the LORD.
  alternative_readings:
  - Translate more neutrally without possessive force, potentially obscuring the speaker's claim
  rationale: 'The Hebrew suffixes on ''high places'' and ''altars'' are significant and show the Rabshakeh''s argument: if Judah claims to trust the LORD, this is the very God whose worship sites Hezekiah removed. The translation should preserve the rhetoric without endorsing its theology.'
  doctrine_reference: Preserve theological tension rather than resolve it.
