id: 2KI.18.22
reference: 2 Kings 18:22
source:
  edition: WLC
  text: וְ/כִי תֹאמְר֣וּ/ן אֵלַ֔/י אֶל יְהוָ֥ה אֱלֹהֵ֖י/נוּ בָּטָ֑חְנוּ הֲ/לוֹא ה֗וּא אֲשֶׁ֨ר הֵסִ֤יר חִזְקִיָּ֨הוּ֙ אֶת בָּמֹתָ֣י/ו וְ/אֶת מִזְבְּחֹתָ֔י/ו וַ/יֹּ֤אמֶר לִֽ/יהוּדָה֙ וְ/לִ/יר֣וּשָׁלִַ֔ם לִ/פְנֵי֙ הַ/מִּזְבֵּ֣חַ הַ/זֶּ֔ה תִּֽשְׁתַּחֲו֖וּ בִּ/ירוּשָׁלִָֽם־־־־־׃
translation:
  text: But if you say to me, ‘We trust in Yahweh our God,’ is it not he whose high places and whose altars Hezekiah has removed, and said to Judah and to Jerusalem, ‘You shall worship before this altar in Jerusalem’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “You shall bow down before this altar in Jerusalem.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - But when
  lexicon: HALOT
  rationale: In this argumentative context, the conjunction introduces a conditional objection anticipated by the speaker. 'But if' captures both the adversative force and the conditional sense more naturally than a simple 'and if'.
- source_word: תֹאמְרוּן אֵלַי
  chosen: you say to me
  alternatives:
  - you say to me all
  - you say to me, saying
  lexicon: HALOT
  rationale: Straightforward second person plural plus preposition with 1cs suffix. English idiom does not require any expansion beyond 'you say to me.'
- source_word: אֶל יְהוָה אֱלֹהֵינוּ בָּטָחְנוּ
  chosen: ‘We trust in the LORD our God,’
  alternatives:
  - ‘In the LORD our God we have trusted,’
  - ‘We have put our trust in the LORD our God,’
  lexicon: HALOT
  rationale: בטח conveys trust/reliance. Present 'we trust' is idiomatic in English for a stated basis of confidence, though the Hebrew perfect could also be rendered 'have trusted.' YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested terms table for the divine name.
- source_word: הֲלוֹא הוּא
  chosen: is it not he
  alternatives:
  - is it not this one
  - surely he is
  lexicon: HALOT
  rationale: This rhetorical question expects agreement and points back to the LORD just mentioned. 'Is it not he' preserves the polemical force.
- source_word: אֲשֶׁר הֵסִיר חִזְקִיָּהוּ
  chosen: whose ... Hezekiah has removed
  alternatives:
  - whom Hezekiah removed from
  - which Hezekiah took away
  lexicon: HALOT
  rationale: 'The relative clause modifies the LORD in the Assyrian spokesman''s polemical framing: he is speaking as though Hezekiah removed the LORD''s cultic sites. English ''whose ... Hezekiah has removed'' best reflects the possessive suffixes on the following nouns.'
- source_word: בָּמֹתָיו
  chosen: his high places
  alternatives:
  - his shrines
  - his hilltop sanctuaries
  lexicon: HALOT
  rationale: במות commonly refers to local elevated worship sites. 'High places' is the standard and sufficiently transparent rendering in this historical context.
- source_word: מִזְבְּחֹתָיו
  chosen: his altars
  alternatives:
  - his sacrificial altars
  lexicon: HALOT
  rationale: The noun directly denotes altars. The possessive 'his' is retained because the Assyrian speaker rhetorically attributes them to the God of Judah.
- source_word: וַיֹּאמֶר
  chosen: saying
  alternatives:
  - and said
  - when he said
  lexicon: HALOT
  rationale: 'English can compress the Hebrew wayyiqtol into a participial connection after ''has removed'' without loss of meaning: Hezekiah removed them, saying... This improves readability while preserving sequence.'
- source_word: לִיהוּדָה וְלִירוּשָׁלַם
  chosen: to Judah and to Jerusalem
  alternatives:
  - to Judah and Jerusalem
  lexicon: HALOT
  rationale: The repeated preposition is lightly preserved for emphasis and clarity. 'Jerusalem' here stands metonymically for its inhabitants, but the literal place name is retained.
- source_word: לִפְנֵי הַמִּזְבֵּחַ הַזֶּה
  chosen: before this altar
  alternatives:
  - in front of this altar
  - at this altar
  lexicon: HALOT
  rationale: לפני is spatially 'before/in front of.' 'Before this altar' is natural and preserves the worship setting.
- source_word: תִּשְׁתַּחֲווּ
  chosen: You shall worship
  alternatives:
  - You shall bow down
  - You shall prostrate yourselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing down/prostration, often in worship. Here 'worship' best conveys the cultic sense in readable English; the more literal alternative is worth preserving in a footnote.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative phrase retained directly. It specifies the central sanctuary location.
