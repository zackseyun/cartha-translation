id: 2KI.18.16
reference: 2 Kings 18:16
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗יא קִצַּ֨ץ חִזְקִיָּ֜ה אֶת דַּלְת֨וֹת הֵיכַ֤ל יְהוָה֙ וְ/אֶת
    הָ/אֹ֣מְנ֔וֹת אֲשֶׁ֣ר צִפָּ֔ה חִזְקִיָּ֖ה מֶ֣לֶךְ יְהוּדָ֑ה וַֽ/יִּתְּנֵ֖/ם לְ/מֶ֥לֶךְ
    אַשּֽׁוּר־־׃פ
translation:
  text: At that time Hezekiah cut off the doors of the temple of the LORD and the
    doorposts that Hezekiah king of Judah had overlaid, and gave them to the king
    of Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the doorframes' or 'the pillars'; the Hebrew term is rare and may refer
      more broadly to structural supports associated with the temple doors.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that time
  - In that time
  lexicon: HALOT
  rationale: Standard temporal idiom introducing the event in narrative sequence;
    'At that time' is natural modern English and sufficiently formal.
- source_word: קִצַּץ
  chosen: cut off
  alternatives:
  - cut down
  - cut away
  - stripped off
  lexicon: HALOT
  rationale: The verb denotes cutting/chopping off. 'Cut off' preserves the concrete
    action without overinterpreting it as merely 'stripping,' though the context implies
    removal for tribute.
- source_word: דַּלְתוֹת
  chosen: the doors
  alternatives:
  - the door leaves
  - the doors
  lexicon: HALOT
  rationale: Common term for doors or door-panels. 'Doors' is the clearest idiomatic
    rendering.
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the palace of the LORD
  - the sanctuary of the LORD
  lexicon: HALOT
  rationale: הֵיכָל can denote a palace or temple, but in this context it clearly
    refers to the Jerusalem temple. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: הָאֹמְנוֹת
  chosen: the doorposts
  alternatives:
  - the doorframes
  - the pillars
  - the supports
  lexicon: HALOT
  rationale: The noun is relatively rare and contextually refers to architectural
    elements associated with the doors. 'Doorposts' best fits the immediate context
    of temple doors and the subsequent removal of overlaying material.
- source_word: צִפָּה
  chosen: had overlaid
  alternatives:
  - had covered
  - had plated
  lexicon: HALOT
  rationale: The verb refers to overlaying or plating a surface, often with metal.
    'Had overlaid' preserves the likely sense without specifying the material, which
    is supplied by context from the surrounding passage.
- source_word: וַיִּתְּנֵם
  chosen: and gave them
  alternatives:
  - and delivered them
  - and handed them over
  lexicon: HALOT
  rationale: Simple narrative verb 'gave' is adequate and matches the Hebrew directly;
    'them' refers to the removed temple materials.
- source_word: לְמֶלֶךְ אַשּׁוּר
  chosen: to the king of Assyria
  alternatives:
  - to the Assyrian king
  lexicon: HALOT
  rationale: A straightforward construct phrase; 'the king of Assyria' is the standard
    and most transparent English rendering.
