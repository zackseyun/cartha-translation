id: 2KI.18.34
reference: 2 Kings 18:34
source:
  edition: WLC
  text: אַיֵּה֩ אֱלֹהֵ֨י חֲמָ֜ת וְ/אַרְפָּ֗ד אַיֵּ֛ה אֱלֹהֵ֥י סְפַרְוַ֖יִם הֵנַ֣ע
    וְ/עִוָּ֑ה כִּֽי הִצִּ֥ילוּ אֶת שֹׁמְר֖וֹן מִ/יָּדִֽ/י־־׃
translation:
  text: Where are the gods of Hamath and Arpad? Where are the gods of Sepharvaim,
    Hena, and Ivvah? Have they delivered Samaria from my hand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew place-name spellings vary in English tradition: ''Ivvah'' is also
      rendered ''Avva'' or ''Ivvah/Avvah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Interrogative of location. Rendered 'Where are' because the implied subject
    is plural ('the gods'), producing natural English while preserving the taunting
    rhetorical question.
- source_word: אֱלֹהֵי
  chosen: the gods of
  alternatives:
  - the god of
  lexicon: HALOT
  rationale: Construct plural of אֱלֹהִים with place names; in this context it refers
    to the deities of the listed nations/cities, so 'the gods of' is the plain sense.
- source_word: חֲמָת וְאַרְפָּד
  chosen: Hamath and Arpad
  rationale: These are place names and are therefore transliterated by standard English
    conventions, per translation philosophy.
- source_word: סְפַרְוַיִם הֵנַע וְעִוָּה
  chosen: Sepharvaim, Hena, and Ivvah
  alternatives:
  - Sepharvaim, Hena, and Avva
  - Sepharvaim, Hena, and Ivvah
  rationale: These are place names and are transliterated. English spellings vary
    in tradition; 'Ivvah' reflects the consonantal form עוה more directly, while alternatives
    are preserved in a footnote.
- source_word: כִּי
  chosen: Have
  alternatives:
  - Indeed
  - For
  - That
  lexicon: HALOT
  rationale: 'Here כִּי introduces a rhetorical question tied to the preceding taunt.
    In idiomatic English the sense is best conveyed by beginning the clause as a question:
    ''Have they delivered...?'' rather than a wooden ''Indeed/for they delivered...'''
- source_word: הִצִּילוּ
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: The verb נצל in the Hiphil commonly means 'deliver' or 'rescue' from
    danger or power. 'Delivered' fits the military-political context and matches the
    boast about inability to escape Assyria's power.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  rationale: Standard English transliteration of the city/kingdom name.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - from my power
  lexicon: HALOT
  rationale: The idiom 'from my hand' is preserved because it is clear in modern English
    and retains the concrete force of the Hebrew expression for power/control.
