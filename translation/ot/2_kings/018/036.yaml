id: 2KI.18.36
reference: 2 Kings 18:36
source:
  edition: WLC
  text: וְ/הֶחֱרִ֣ישׁוּ הָ/עָ֔ם וְ/לֹֽא עָנ֥וּ אֹת֖/וֹ דָּבָ֑ר כִּי מִצְוַ֨ת הַ/מֶּ֥לֶךְ
    הִ֛יא לֵ/אמֹ֖ר לֹ֥א תַעֲנֻֽ/הוּ־־׃
translation:
  text: But the people kept silent and did not answer him a word, for the king’s command
    was, “Do not answer him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''did not answer him a word,'' an idiom meaning they gave no reply
      at all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶחֱרִישׁוּ
  chosen: kept silent
  alternatives:
  - were silent
  - fell silent
  - said nothing
  lexicon: HALOT
  rationale: Hiphil of חרשׁ here denotes remaining silent or keeping quiet. 'Kept
    silent' captures the verbal force and the continuing restraint in context better
    than the more stative 'were silent.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people there
  - the populace
  lexicon: HALOT
  rationale: עם commonly means 'people.' In this narrative it refers to the Judean
    people on the wall/listening, and 'the people' is the natural English rendering
    without over-specifying.
- source_word: וְלֹא עָנוּ אֹתוֹ דָבָר
  chosen: did not answer him a word
  alternatives:
  - did not answer him at all
  - did not reply to him with a word
  lexicon: HALOT
  rationale: ענה with object pronoun means 'answer/respond to.' דָבָר after the verb
    functions idiomatically as 'a word/anything.' 'Did not answer him a word' preserves
    the Hebrew idiom with readable English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the people's silence. 'For' fits
    the narrative explanation smoothly and preserves the causal sense.
- source_word: מִצְוַת הַמֶּלֶךְ
  chosen: the king’s command
  alternatives:
  - the command of the king
  - the king’s order
  lexicon: HALOT
  rationale: מִצְוָה is 'command, order.' 'The king’s command' is both accurate and
    idiomatic. 'Order' is possible, but 'command' better reflects the formal authority
    conveyed.
- source_word: הִיא לֵאמֹר
  chosen: was
  alternatives:
  - was this
  - was as follows
  lexicon: HALOT
  rationale: 'The pronoun plus infinitive of אמר introduces quoted content: literally,
    ''it was, saying.'' In English this is best represented simply by ''was'' before
    the quotation, since the content follows directly.'
- source_word: לֹא תַעֲנֻהוּ
  chosen: Do not answer him
  alternatives:
  - You must not answer him
  - Do not reply to him
  lexicon: HALOT
  rationale: Second masculine plural imperfect with negation gives the king's prohibition
    to the group. 'Do not answer him' is a direct and natural rendering that matches
    the repeated verb ענה in the verse.
