id: 2KI.18.10
reference: 2 Kings 18:10
source:
  edition: WLC
  text: וַֽ/יִּלְכְּדֻ֗/הָ מִ/קְצֵה֙ שָׁלֹ֣שׁ שָׁנִ֔ים בִּ/שְׁנַת שֵׁ֖שׁ לְ/חִזְקִיָּ֑ה
    הִ֣יא שְׁנַת תֵּ֗שַׁע לְ/הוֹשֵׁ֨עַ֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל נִלְכְּדָ֖ה שֹׁמְרֽוֹן־־׃
translation:
  text: At the end of three years they captured it. In the sixth year of Hezekiah,
    which was the ninth year of Hoshea king of Israel, Samaria was captured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'After three years they took it.' The Hebrew idiom is more literally
      'at the end of three years.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדֻהָ
  chosen: they captured it
  alternatives:
  - they took it
  - they seized it
  lexicon: HALOT
  rationale: Qal wayyiqtol 3mp with 3fs suffix from לכד, referring back to Samaria
    from the previous context. Active plural is retained in English rather than smoothing
    immediately to passive, preserving the Hebrew narrative sequence.
- source_word: מִקְצֵה שָׁלֹשׁ שָׁנִים
  chosen: At the end of three years
  alternatives:
  - after three years
  - from the end of three years
  lexicon: HALOT
  rationale: The idiom מקצה + time period means 'at the end of' that span. 'At the
    end of three years' is more precise than the looser 'after three years.'
- source_word: בִּשְׁנַת שֵׁשׁ לְחִזְקִיָּה
  chosen: In the sixth year of Hezekiah
  alternatives:
  - in year six of Hezekiah
  lexicon: HALOT
  rationale: Standard regnal-year formula. 'Of Hezekiah' communicates the lamed marking
    reference to his reign in idiomatic English.
- source_word: הִיא
  chosen: which was
  alternatives:
  - that is
  - it was
  lexicon: HALOT
  rationale: The pronoun links the two regnal datings appositionally. 'Which was'
    is natural English and preserves the synchronizing function of the Hebrew.
- source_word: שְׁנַת תֵּשַׁע לְהוֹשֵׁעַ מֶלֶךְ יִשְׂרָאֵל
  chosen: the ninth year of Hoshea king of Israel
  alternatives:
  - year nine of Hoshea, the king of Israel
  lexicon: HALOT
  rationale: Rendered as a second regnal synchronism. 'King of Israel' is kept explicit
    as in the Hebrew.
- source_word: נִלְכְּדָה שֹׁמְרוֹן
  chosen: Samaria was captured
  alternatives:
  - Samaria was taken
  lexicon: HALOT
  rationale: Niphal perfect 3fs gives a passive/resultative statement. The repetition
    of לכד from the first clause is preserved with the same core English verb 'captured'
    for consistency.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration for the city name; here it is the feminine
    singular referent of both verbal forms.
