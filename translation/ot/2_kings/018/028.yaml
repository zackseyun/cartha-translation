id: 2KI.18.28
reference: 2 Kings 18:28
source:
  edition: WLC
  text: וַֽ/יַּעֲמֹד֙ רַב שָׁקֵ֔ה וַ/יִּקְרָ֥א בְ/קוֹל גָּד֖וֹל יְהוּדִ֑ית וַ/יְדַבֵּ֣ר
    וַ/יֹּ֔אמֶר שִׁמְע֛וּ דְּבַר הַ/מֶּ֥לֶךְ הַ/גָּד֖וֹל מֶ֥לֶךְ אַשּֽׁוּר־־־׃
translation:
  text: Then the Rabshakeh stood and called out in a loud voice in Judean, and he
    spoke and said, “Hear the word of the great king, the king of Assyria.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Hebrew.” The Hebrew term more specifically denotes the language of
      Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - stood up
  lexicon: HALOT
  rationale: The verb עמד in the wayyiqtol narrative sequence is straightforwardly
    rendered 'stood.' 'Took his stand' is possible, but 'stood' is the clearest natural
    English without adding interpretive force.
- source_word: רַב־שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the Rab-shakeh
  lexicon: HALOT
  rationale: This is best treated here as the known Assyrian title/name-form used
    in the narrative. Transliteration preserves the historical designation more naturally
    than translating it as an office title in this context.
- source_word: וַיִּקְרָא
  chosen: called out
  alternatives:
  - cried out
  - proclaimed
  lexicon: HALOT
  rationale: קרא with בְקוֹל גָּדוֹל denotes raising the voice publicly. 'Called out'
    is idiomatic modern English and fits the public address setting.
- source_word: בְקוֹל גָּדוֹל
  chosen: in a loud voice
  alternatives:
  - with a great voice
  - loudly
  lexicon: HALOT
  rationale: This phrase is an idiom for volume/intensity. 'In a loud voice' preserves
    the concrete imagery while remaining natural English.
- source_word: יְהוּדִית
  chosen: in Judean
  alternatives:
  - in Hebrew
  - in the language of Judah
  lexicon: HALOT
  rationale: The term refers specifically to the language/dialect of Judah, not Hebrew
    in the broader later conventional sense. 'In Judean' better reflects the source
    text's historical-linguistic specificity.
- source_word: וַיְדַבֵּר וַיֹּאמֶר
  chosen: and he spoke and said
  alternatives:
  - and said
  - and spoke, saying
  lexicon: HALOT
  rationale: The Hebrew uses a doubled speech introduction. Retaining both verbs reflects
    the emphatic/narrative style without becoming awkward in English.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  - Hear now
  lexicon: HALOT
  rationale: The imperative is direct and plural. 'Hear' is concise and preserves
    the formal heraldic tone.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  - the statement
  lexicon: HALOT
  rationale: דבר here introduces an official pronouncement. 'Word' preserves the formal
    register and common biblical usage; 'message' is possible but slightly more interpretive.
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  chosen: the great king
  alternatives:
  - the mighty king
  lexicon: HALOT
  rationale: This reflects royal Assyrian titulary. 'Great king' is the most direct
    and historically fitting rendering.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard construct rendering; 'the king of Assyria' is clear, formal,
    and idiomatic.
