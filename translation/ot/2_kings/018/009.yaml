id: 2KI.18.9
reference: 2 Kings 18:9
source:
  edition: WLC
  text: וַֽ/יְהִ֞י בַּ/שָּׁנָ֤ה הָֽ/רְבִיעִית֙ לַ/מֶּ֣לֶךְ חִזְקִיָּ֔הוּ הִ֚יא הַ/שָּׁנָ֣ה
    הַ/שְּׁבִיעִ֔ית לְ/הוֹשֵׁ֥עַ בֶּן אֵלָ֖ה מֶ֣לֶךְ יִשְׂרָאֵ֑ל עָלָ֞ה שַׁלְמַנְאֶ֧סֶר
    מֶֽלֶךְ אַשּׁ֛וּר עַל שֹׁמְר֖וֹן וַ/יָּ֥צַר עָלֶֽי/הָ־־־׃
translation:
  text: And it happened in the fourth year of King Hezekiah—which was the seventh
    year of Hoshea son of Elah, king of Israel—that Shalmaneser king of Assyria came
    up against Samaria and besieged it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'came to pass' for 'it happened.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'went up against Samaria and laid siege to it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of היה introducing a historical event. 'And
    it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בַּשָּׁנָה הָרְבִיעִית
  chosen: in the fourth year
  alternatives:
  - in year four
  lexicon: HALOT
  rationale: Standard regnal-year dating formula; idiomatic English requires 'in the
    fourth year.'
- source_word: לַמֶּלֶךְ חִזְקִיָּהוּ
  chosen: of King Hezekiah
  alternatives:
  - of Hezekiah the king
  - for King Hezekiah
  lexicon: HALOT
  rationale: The lamed marks reference to the king's regnal year. 'Of King Hezekiah'
    is the natural English rendering in a dating formula.
- source_word: הִיא
  chosen: which was
  alternatives:
  - it was
  lexicon: HALOT
  rationale: Resumptive pronoun linking the two regnal synchronisms. 'Which was' fits
    smoothly in English when set off by dashes.
- source_word: הַשָּׁנָה הַשְּׁבִיעִית לְהוֹשֵׁעַ בֶּן־אֵלָה מֶלֶךְ יִשְׂרָאֵל
  chosen: the seventh year of Hoshea son of Elah, king of Israel
  alternatives:
  - the seventh year for Hoshea son of Elah, king of Israel
  lexicon: HALOT
  rationale: Another regnal synchronism. 'Of' communicates the dating relationship
    more idiomatically than a wooden 'for.'
- source_word: עָלָה
  chosen: came up against
  alternatives:
  - went up against
  - marched up against
  lexicon: HALOT
  rationale: עלה in military contexts commonly means to go up in campaign against
    a city or land. 'Came up against' is idiomatic and preserves the military sense.
- source_word: שַׁלְמַנְאֶסֶר
  chosen: Shalmaneser
  lexicon: HALOT
  rationale: Standard English transliteration of the Assyrian royal name.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Construct chain identifying Shalmaneser by title and realm; rendered
    with standard English historical phrasing.
- source_word: עַל שֹׁמְרוֹן
  chosen: against Samaria
  alternatives:
  - to Samaria
  - upon Samaria
  lexicon: HALOT
  rationale: With a military verb, על marks hostile movement toward a target. 'Against
    Samaria' makes the adversative force explicit in English.
- source_word: וַיָּצַר עָלֶיהָ
  chosen: and besieged it
  alternatives:
  - and laid siege to it
  - and pressed upon it
  lexicon: HALOT
  rationale: צור in this stem denotes besieging a city. 'Besieged it' is concise,
    accurate, and natural modern English.
