theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per project doctrine, the
    default rendering is 'the LORD,' following Jewish reverence tradition and longstanding
    English convention while remaining transparent in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to specify the referent of 'this place' or 'this land' as Jerusalem/Judah
    in translation
  chosen_reading: Retain 'this place' and 'this land' without interpretive substitution
  alternative_readings:
  - this city
  - Jerusalem
  - Judah
  rationale: The Hebrew uses two different nouns, מָקוֹם and אֶרֶץ. Preserving both
    avoids importing a narrower or more explicit referent than the text states, while
    still communicating the military threat.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Never paraphrase beyond what the source text warrants.'
