id: 2KI.18.25
reference: 2 Kings 18:25
source:
  edition: WLC
  text: עַתָּה֙ הֲ/מִ/בַּלְעֲדֵ֣י יְהוָ֔ה עָלִ֛יתִי עַל הַ/מָּק֥וֹם הַ/זֶּ֖ה לְ/הַשְׁחִת֑/וֹ
    יְהוָה֙ אָמַ֣ר אֵלַ֔/י עֲלֵ֛ה עַל הָ/אָ֥רֶץ הַ/זֹּ֖את וְ/הַשְׁחִיתָֽ/הּ־־׃
translation:
  text: Now, was it apart from the LORD that I came up against this place to destroy
    it? The LORD said to me, ‘Go up against this land and destroy it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without the LORD' or 'independently of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִבַּלְעֲדֵי
  chosen: was it apart from
  alternatives:
  - without
  - independently of
  lexicon: HALOT
  rationale: 'The interrogative הֲ with מִבַּלְעֲדֵי introduces a rhetorical question:
    ''Was it apart from/without...?'' ''Apart from'' is natural English and preserves
    the claim that the speaker did not act independently of the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project default for the divine name YHWH per DOCTRINE.md,
    preserving standard English Bible convention while signaling the covenant name.
- source_word: עָלִיתִי
  chosen: I came up
  alternatives:
  - I went up
  - I marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' 'Came up' fits the speaker's perspective
    in direct speech and keeps the military movement sense without over-specifying.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this site
  lexicon: HALOT
  rationale: מָקוֹם is broadly 'place.' In context Rabshakeh refers to Jerusalem,
    but 'this place' best matches the Hebrew without interpretive expansion.
- source_word: לְהַשְׁחִיתוֹ
  chosen: to destroy it
  alternatives:
  - to ruin it
  - to lay it waste
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here conveys destructive action against the place.
    'Destroy it' is the most direct and idiomatic rendering.
- source_word: אָמַר אֵלַי
  chosen: said to me
  alternatives:
  - spoke to me
  lexicon: HALOT
  rationale: A straightforward rendering of the common speech formula, preserving
    the direct claim of divine authorization.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Come up
  - Advance against
  lexicon: HALOT
  rationale: Imperative of עלה. 'Go up' is the most standard English equivalent and
    matches the military command context.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/country/earth. In this invasion context, 'this land'
    is the most natural and sufficiently broad, likely referring to Judah rather than
    only the city.
- source_word: וְהַשְׁחִיתָהּ
  chosen: and destroy it
  alternatives:
  - and lay it waste
  - and ruin it
  lexicon: HALOT
  rationale: The feminine suffix refers back to אֶרֶץ ('land'). English idiom uses
    'it' for land/country. Repeating 'destroy' preserves the lexical link with the
    earlier שׁחת form.
