theological_decisions:
- issue: Gendered distributive noun אִישׁ repeated three times
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew uses grammatically masculine singular אִישׁ distributively.
    Per doctrine, gender-accurate rendering is preferred where it matches the source's
    representative force. Here 'each man' preserves the form without implying exclusion
    beyond the idiom's generic usage.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Idiomatic political expression עֲשׂוּ אִתִּי בְרָכָה
  chosen_reading: Make peace with me
  alternative_readings:
  - Make a blessing with me
  - Come to terms with me
  rationale: This is not a theological term in the creedal sense, but it is interpretively
    significant. The chosen rendering communicates the Assyrian envoy's offer of favorable
    surrender terms while a more literal alternative is preserved in a footnote to
    maintain auditability and lexical transparency.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
