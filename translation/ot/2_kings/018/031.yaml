id: 2KI.18.31
reference: 2 Kings 18:31
source:
  edition: WLC
  text: אַֽל תִּשְׁמְע֖וּ אֶל חִזְקִיָּ֑הוּ כִּי֩ כֹ֨ה אָמַ֜ר מֶ֣לֶךְ אַשּׁ֗וּר עֲשֽׂוּ
    אִתִּ֤/י בְרָכָה֙ וּ/צְא֣וּ אֵלַ֔/י וְ/אִכְל֤וּ אִישׁ גַּפְנ/וֹ֙ וְ/אִ֣ישׁ תְּאֵֽנָת֔/וֹ
    וּ/שְׁת֖וּ אִ֥ישׁ מֵֽי בוֹרֽ/וֹ־־־־־׃
translation:
  text: 'Do not listen to Hezekiah, for this is what the king of Assyria says: Make
    peace with me and come out to me, and let each man eat from his own vine and each
    from his own fig tree, and let each man drink the water of his own cistern,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Make with me a blessing,' an idiom for making peace or
      coming to terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמְעוּ אֶל
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' In this propaganda
    context, 'listen to' preserves the immediate sense without over-interpreting as
    full 'obey,' though obedience is implied.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: כִּי כֹה אָמַר
  chosen: for this is what ... says
  alternatives:
  - for thus says
  - because this is what ... says
  lexicon: HALOT
  rationale: This formula introduces direct speech. 'This is what ... says' is natural
    modern English while remaining close to the Hebrew.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - the Assyrian king
  rationale: Construct chain rendered straightforwardly; this is the most transparent
    English equivalent.
- source_word: עֲשׂוּ אִתִּי בְרָכָה
  chosen: Make peace with me
  alternatives:
  - Make a blessing with me
  - Come to terms with me
  - Make an agreement with me
  lexicon: HALOT
  rationale: The idiom literally involves 'make ... blessing,' but in context it refers
    to entering favorable terms or peace with the Assyrian king. 'Make peace with
    me' best captures the idiomatic force in readable English. The more literal alternative
    is preserved in a footnote because the Hebrew wording is unusual and semantically
    rich.
- source_word: וּצְאוּ אֵלַי
  chosen: and come out to me
  alternatives:
  - and surrender to me
  - and come over to me
  lexicon: HALOT
  rationale: יצא means 'go/come out.' In siege context this implies leaving the city
    to submit, but 'come out to me' preserves the concrete wording without importing
    the fuller interpretation into the main text.
- source_word: וְאִכְלוּ
  chosen: and let ... eat
  alternatives:
  - and eat
  lexicon: HALOT
  rationale: English idiom benefits from supplying 'let' with the distributive אִישׁ
    repeated afterward, conveying the permissive promise embedded in the Assyrian
    speech.
- source_word: אִישׁ גַּפְנוֹ
  chosen: each man eat from his own vine
  alternatives:
  - each one from his vine
  - every man from his own vine
  lexicon: HALOT
  rationale: אִישׁ is distributive here. 'Each man' preserves the masculine singular
    form and representative force, in line with the gender-accurate policy.
- source_word: תְּאֵנָתוֹ
  chosen: his own fig tree
  alternatives:
  - his fig tree
  lexicon: HALOT
  rationale: The idiom 'vine and fig tree' is conventional in Hebrew for settled security
    and agricultural peace; 'fig tree' is the natural English rendering.
- source_word: וּשְׁתוּ אִישׁ מֵי בוֹרוֹ
  chosen: and let each man drink the water of his own cistern
  alternatives:
  - and each drink water from his own well
  - and each man drink from his own pit
  lexicon: HALOT
  rationale: בּוֹר here refers to a water-storage pit/cistern rather than a spring
    well. 'Cistern' is more precise than 'well' in this context.
