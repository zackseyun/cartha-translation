id: 2KI.18.2
reference: 2 Kings 18:2
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ הָיָ֣ה בְ/מָלְכ֔/וֹ וְ/עֶשְׂרִ֤ים וָ/תֵ֨שַׁע֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ אֲבִ֖י בַּת זְכַרְיָֽה־־׃
translation:
  text: He was twenty-five years old when he began to reign, and he reigned twenty-nine
    years in Jerusalem. His mother’s name was Abi daughter of Zechariah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: twenty-five years old
  alternatives:
  - a son of twenty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A literal rendering ('son of twenty-five
    years') is unnatural in English, so the idiomatic equivalent 'twenty-five years
    old' best reflects the sense without paraphrase.
- source_word: הָיָה בְמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: The construction literally means 'he was in his reigning' and idiomatically
    marks the age at accession. 'When he began to reign' is a natural English rendering
    commonly used for this Hebrew formula and preserves the temporal sense.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely
    holding the title. 'He reigned' is the most precise and conventional rendering.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use indicating the seat of his reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: The Hebrew formula introduces the queen mother by name. The chosen rendering
    is natural modern English while preserving the formal notice.
- source_word: אֲבִי
  chosen: Abi
  alternatives:
  - Abi
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Abi' is the conventional English transliteration of the Hebrew name
    here.
- source_word: בַּת זְכַרְיָה
  chosen: daughter of Zechariah
  alternatives:
  - the daughter of Zechariah
  lexicon: HALOT
  rationale: The construct phrase indicates parentage. 'Daughter of Zechariah' is
    direct and clear; the article is not required in English.
