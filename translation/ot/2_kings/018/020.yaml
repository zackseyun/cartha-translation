id: 2KI.18.20
reference: 2 Kings 18:20
source:
  edition: WLC
  text: אָמַ֨רְתָּ֙ אַךְ דְּבַר שְׂפָתַ֔יִם עֵצָ֥ה וּ/גְבוּרָ֖ה לַ/מִּלְחָמָ֑ה עַתָּה֙
    עַל מִ֣י בָטַ֔חְתָּ כִּ֥י מָרַ֖דְתָּ בִּֽ/י־־־׃
translation:
  text: You say, ‘It is only a word of the lips’—but counsel and strength are for
    war. Now in whom have you trusted, that you have rebelled against me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You have said, ‘Only a word of the lips!’ Counsel and strength are
      needed for war.” The Hebrew clause after “You say” is syntactically compressed
      and has been understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתָּ
  chosen: You say
  alternatives:
  - You have said
  lexicon: HALOT
  rationale: Qal perfect 2ms of אמר can be rendered as a present in direct discourse
    to reflect vivid speech in context. English present reads naturally in taunt/speech
    material while preserving the force.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - indeed
  - merely
  lexicon: HALOT
  rationale: Here אַךְ limits what follows, giving the sense of 'only/merely' rather
    than asseverative 'surely.'
- source_word: דְּבַר שְׂפָתַיִם
  chosen: a word of the lips
  alternatives:
  - mere words
  - lip-service
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom's imagery. 'Mere words'
    captures the sense but loses the Hebrew expression; 'lip-service' is too interpretive
    and idiomatic in English.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - plan
  - strategy
  lexicon: HALOT
  rationale: עֵצָה denotes counsel/advice/plan. 'Counsel' preserves the lexical range
    and pairs well with 'strength' in a war context.
- source_word: וּגְבוּרָה
  chosen: strength
  alternatives:
  - might
  - power
  - valor
  lexicon: HALOT
  rationale: In military context גְבוּרָה refers to strength/might. 'Strength' is
    natural modern English and fits the collocation with counsel for warfare.
- source_word: לַמִּלְחָמָה
  chosen: for war
  alternatives:
  - for battle
  - for warfare
  lexicon: HALOT
  rationale: The phrase indicates what counsel and strength are needed for. 'For war'
    is concise and direct.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - therefore now
  lexicon: HALOT
  rationale: Marks the rhetorical turn to the challenge question. 'Now' is sufficient
    in English.
- source_word: עַל מִי
  chosen: in whom
  alternatives:
  - on whom
  lexicon: HALOT
  rationale: With בטח, English idiom prefers 'trust in' rather than 'trust on,' though
    Hebrew uses על.
- source_word: בָטַחְתָּ
  chosen: have you trusted
  alternatives:
  - do you trust
  - did you trust
  lexicon: HALOT
  rationale: Perfect form in the rhetorical question can be rendered as English present
    perfect, highlighting the basis on which rebellion has been undertaken.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content linked to the prior question:
    ''that you have rebelled.'' ''Because'' is possible, but ''that'' better fits
    the rhetorical construction in English.'
- source_word: מָרַדְתָּ בִּי
  chosen: you have rebelled against me
  alternatives:
  - you have revolted against me
  lexicon: HALOT
  rationale: מרד with ב conveys rebellion against a superior ruler. 'Rebelled against
    me' is standard, clear English.
