id: 2KI.18.5
reference: 2 Kings 18:5
source:
  edition: WLC
  text: בַּ/יהוָ֥ה אֱלֹהֵֽי יִשְׂרָאֵ֖ל בָּטָ֑ח וְ/אַחֲרָ֞י/ו לֹא הָיָ֣ה כָמֹ֗/הוּ בְּ/כֹל֙ מַלְכֵ֣י יְהוּדָ֔ה וַ/אֲשֶׁ֥ר הָי֖וּ לְ/פָנָֽי/ו־־׃
translation:
  text: He trusted in Yahweh, the God of Israel. After him there was none like him among all the kings of Judah, nor among those who were before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in Yahweh.'' The divine name is rendered ''the LORD'' in keeping with the translation''s standard practice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: The preposition ב marks the object of trust ('in'). The divine name יְהוָה is rendered 'the LORD' per doctrine guidance for YHWH.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain straightforwardly identifies the LORD as Israel's God; appositional in English after 'the LORD'.
- source_word: בָּטָח
  chosen: trusted
  alternatives:
  - put his trust
  lexicon: HALOT
  rationale: Qal perfect of בטח commonly means 'trust, rely on.' 'Trusted' is concise, natural English and preserves the verbal force.
- source_word: וְאַחֲרָיו
  chosen: After him
  alternatives:
  - and after him
  lexicon: HALOT
  rationale: Temporal expression meaning 'after him.' English omits the conjunction for smoother style while preserving sense.
- source_word: לֹא הָיָה כָמֹהוּ
  chosen: there was none like him
  alternatives:
  - no one was like him
  lexicon: HALOT
  rationale: Idiomatic Hebrew comparison expressing uniqueness. 'There was none like him' preserves the superlative force in natural English.
- source_word: בְּכֹל מַלְכֵי יְהוּדָה
  chosen: among all the kings of Judah
  alternatives:
  - in all the kings of Judah
  lexicon: HALOT
  rationale: The preposition ב with a group here is best rendered 'among' in English, indicating comparison within the class of Judah's kings.
- source_word: וַאֲשֶׁר הָיוּ לְפָנָיו
  chosen: nor among those who were before him
  alternatives:
  - including those who were before him
  - or those who were before him
  lexicon: HALOT
  rationale: This relative clause extends the comparison to earlier kings. 'Nor among those who were before him' makes explicit the implied continuation of the comparison and reads clearly in English.
