theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render שׁמע as explicit 'obey'
  chosen_reading: listen to / would not listen
  alternative_readings:
  - obey / would not obey
  rationale: The Hebrew idiom includes obedience, but the verse already states covenant
    transgression explicitly. Retaining 'listen' preserves the Hebrew wording and
    the rhetorical repetition without collapsing both clauses into the same English
    concept.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
