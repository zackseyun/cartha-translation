id: 2KI.18.12
reference: 2 Kings 18:12
source:
  edition: WLC
  text: עַ֣ל אֲשֶׁ֣ר לֹֽא שָׁמְע֗וּ בְּ/קוֹל֙ יְהוָ֣ה אֱלֹהֵי/הֶ֔ם וַ/יַּעַבְרוּ֙
    אֶת בְּרִית֔/וֹ אֵ֚ת כָּל אֲשֶׁ֣ר צִוָּ֔ה מֹשֶׁ֖ה עֶ֣בֶד יְהוָ֑ה וְ/לֹ֥א שָׁמְע֖וּ
    וְ/לֹ֥א עָשֽׂוּ׀־־־׃פ
translation:
  text: because they did not listen to the voice of the LORD their God, but transgressed
    his covenant—all that Moses the servant of the LORD commanded—and they would not
    listen or do it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'obeyed the voice of the LORD their God.' The Hebrew idiom 'listen to
      the voice' often carries the sense of obedience.
    reason: lexical_alternative
  - marker: b
    text: Or 'violated his covenant.'
    reason: lexical_alternative
  - marker: c
    text: The repeated 'did not listen' / 'would not listen' echoes the Hebrew for
      emphasis, stressing persistent refusal rather than a single act of disobedience.
    reason: cultural_note
lexical_decisions:
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - on account of which
  - because that
  lexicon: HALOT
  rationale: The phrase introduces the reason for the exile described in the previous
    verse. 'Because' gives the causal force naturally in English.
- source_word: שָׁמְעוּ בְּקוֹל
  chosen: listen to the voice of
  alternatives:
  - obey
  - hear the voice of
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל can mean both hearing and obeying. Rendering 'listen
    to the voice of' preserves the concrete Hebrew expression and leaves the obedience
    nuance implicit rather than over-resolving it.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: וַיַּעַבְרוּ
  chosen: transgressed
  alternatives:
  - crossed over
  - violated
  - went beyond
  lexicon: HALOT
  rationale: In covenant context עבר with בְּרִית means to violate or transgress a
    covenant. 'Transgressed' is concise and preserves covenantal/moral force.
- source_word: בְּרִיתוֹ
  chosen: his covenant
  alternatives:
  - his treaty
  - his pact
  lexicon: HALOT
  rationale: בְּרִית in Israel's relationship with God is best rendered 'covenant,'
    preserving the theological and canonical resonance.
- source_word: אֵת כָּל אֲשֶׁר צִוָּה
  chosen: all that ... commanded
  alternatives:
  - everything that ... commanded
  lexicon: HALOT
  rationale: This marks the full scope of what was commanded. 'All that' is natural
    and sufficiently formal.
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  chosen: Moses the servant of the LORD
  alternatives:
  - Moses, the servant of the LORD
  lexicon: HALOT
  rationale: This is a standard biblical title for Moses. 'Servant' fits עֶבֶד here
    better than 'slave,' since the emphasis is honorific and official rather than
    bonded-status imagery.
- source_word: וְלֹא שָׁמְעוּ
  chosen: they would not listen
  alternatives:
  - they did not listen
  - they did not obey
  lexicon: HALOT
  rationale: The repetition is rhetorically emphatic. 'Would not listen' captures
    stubborn refusal, not mere failure to hear.
- source_word: וְלֹא עָשׂוּ
  chosen: or do it
  alternatives:
  - or act
  - or perform them
  - or carry it out
  lexicon: HALOT
  rationale: The verb refers to carrying out what was commanded. Singular 'it' treats
    the commanded corpus collectively; this reads naturally after 'all that Moses
    ... commanded.'
