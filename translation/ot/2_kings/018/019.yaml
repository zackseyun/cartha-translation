id: 2KI.18.19
reference: 2 Kings 18:19
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ רַב שָׁקֵ֔ה אִמְרוּ נָ֖א אֶל חִזְקִיָּ֑הוּ כֹּֽה אָמַ֞ר
    הַ/מֶּ֤לֶךְ הַ/גָּדוֹל֙ מֶ֣לֶךְ אַשּׁ֔וּר מָ֧ה הַ/בִּטָּח֛וֹן הַ/זֶּ֖ה אֲשֶׁ֥ר
    בָּטָֽחְתָּ־־־־׃
translation:
  text: 'Then the Rabshakeh said to them, "Please say to Hezekiah, ''Thus says the
    great king, the king of Assyria: What is this confidence that you have trusted
    in?''"'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabshakeh is likely an Assyrian official title rather than a personal name;
      possible renderings include 'chief cupbearer' or another high-ranking court/military
      office.
    reason: cultural_note
lexical_decisions:
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: Although the title likely originated as an Assyrian official designation,
    it functions here as a recognized title/name in the narrative. Transliteration
    preserves the historical flavor and matches its use as a specific office-holder.
    Alternatives reflect possible functional translations of the title.
- source_word: אִמְרוּ נָא
  chosen: Please say
  alternatives:
  - Say, please
  - Kindly say
  lexicon: HALOT
  rationale: The particle נָא adds a polite or urging nuance rather than simple command.
    'Please say' gives natural modern English while preserving the imperative force.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula in Hebrew. 'Thus says' preserves
    the formal heraldic tone.
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  chosen: the great king
  alternatives:
  - the mighty king
  lexicon: HALOT
  rationale: Formal royal titulary used by Near Eastern emperors. 'Great king' is
    the conventional and most precise rendering.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Construct phrase identifying the speaker's sovereign. The full phrase
    preserves the formal title.
- source_word: מָה
  chosen: What
  alternatives:
  - What sort of
  - What is
  lexicon: HALOT
  rationale: Introduces a rhetorical question. Combined with the following noun phrase,
    English idiom is best expressed as 'What is this confidence...?' preserving the
    interrogative force.
- source_word: הַבִּטָּחוֹן
  chosen: confidence
  alternatives:
  - trust
  - security
  lexicon: HALOT
  rationale: The noun denotes confidence/trust as the basis of reliance. 'Confidence'
    fits the rhetorical challenge and avoids awkward repetition with the following
    verb from the same semantic field.
- source_word: בָּטָחְתָּ
  chosen: you have trusted in
  alternatives:
  - you trust in
  - you have relied on
  lexicon: HALOT
  rationale: The verb בָּטַח commonly means to trust/rely on. Rendering it as 'have
    trusted in' preserves the completed aspect nuance and the wordplay with the preceding
    noun. The added 'in' is required by natural English for the object of trust, though
    the Hebrew object is implicit in the relative clause construction.
