id: 2KI.18.33
reference: 2 Kings 18:33
source:
  edition: WLC
  text: הַ/הַצֵּ֥ל הִצִּ֛ילוּ אֱלֹהֵ֥י הַ/גּוֹיִ֖ם אִ֣ישׁ אֶת אַרְצ֑/וֹ מִ/יַּ֖ד מֶ֥לֶךְ
    אַשּֽׁוּר־׃
translation:
  text: Have the gods of the nations ever delivered, each one, his land from the hand
    of the king of Assyria?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses an emphatic construction: literally, ''Have the gods of the
      nations surely delivered...?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהַצֵּל הִצִּילוּ
  chosen: Have ... ever delivered
  alternatives:
  - Did ... at all deliver
  - Have ... really delivered
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of נצל intensifies the verbal
    idea and in this interrogative context conveys emphatic challenge. English 'Have
    ... ever delivered' captures the rhetorical force naturally without awkward literal
    repetition such as 'delivering, have they delivered.'
- source_word: אֱלֹהֵי הַגּוֹיִם
  chosen: the gods of the nations
  alternatives:
  - the gods of the peoples
  - the national gods
  lexicon: HALOT
  rationale: אֱלֹהֵי is plural construct, and הַגּוֹיִם refers to the nations/peoples.
    'The gods of the nations' is the most direct and idiomatic rendering in context,
    preserving the Assyrian speaker's contrast between local deities and Assyria's
    power.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - any one
  - a man
  lexicon: HALOT
  rationale: Here אִישׁ functions distributively rather than referring to a male individual.
    'Each one' best reflects the distributive sense attached to the subject 'the gods
    of the nations' without introducing misleading gendered wording.
- source_word: אֶת אַרְצוֹ
  chosen: his land
  alternatives:
  - its land
  - his country
  lexicon: HALOT
  rationale: 'The singular suffix after distributive אִישׁ yields a distributive singular:
    each god its respective land. ''His land'' follows the Hebrew grammar closely
    and matches the personified treatment of each god in the taunt; ''its land'' is
    possible in English but less natural in this construction.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the grasp of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common biblical language for deliverance
    from someone's power. It is transparent enough in modern English and preserves
    the source imagery.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: This is the standard construct expression and is best rendered straightforwardly
    as 'the king of Assyria.'
