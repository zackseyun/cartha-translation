id: 2KI.18.6
reference: 2 Kings 18:6
source:
  edition: WLC
  text: וַ/יִּדְבַּק֙ בַּֽ/יהוָ֔ה לֹא סָ֖ר מֵ/אַֽחֲרָ֑י/ו וַ/יִּשְׁמֹר֙ מִצְוֺתָ֔י/ו
    אֲשֶׁר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־׃
translation:
  text: He held fast to the LORD; he did not turn away from following him, and he
    kept his commandments, which the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'clung to' or 'held fast to'; the verb conveys strong covenant loyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדְבַּק
  chosen: held fast
  alternatives:
  - clung
  - was joined
  - stuck close
  lexicon: HALOT
  rationale: דבק in covenantal contexts often conveys strong attachment or loyalty,
    not merely physical adhesion. 'Held fast' preserves the relational and covenantal
    force in natural English.
- source_word: בַּיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition with YHWH indicates attachment directed toward Israel's
    God. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: לֹא סָר מֵאַחֲרָיו
  chosen: he did not turn away from following him
  alternatives:
  - he did not depart from after him
  - he did not turn aside from him
  lexicon: HALOT
  rationale: סור with מן + אחר conveys ceasing to follow or deviating from allegiance.
    'Turn away from following him' is idiomatic English that preserves the discipleship/allegiance
    nuance.
- source_word: וַיִּשְׁמֹר
  chosen: he kept
  alternatives:
  - he observed
  - he guarded
  lexicon: HALOT
  rationale: שׁמר with commandments commonly means to keep/observe them. 'Kept' is
    the most natural and standard rendering here.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מצוה denotes commandment/command. 'Commandments' preserves the covenantal
    and legal register appropriate to Deuteronomistic history.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: which the LORD had commanded Moses
  alternatives:
  - which the LORD commanded Moses
  - that the LORD had commanded Moses
  lexicon: HALOT
  rationale: The clause identifies the commandments as those given by the LORD to
    Moses. English past perfect ('had commanded') clarifies sequence relative to Hezekiah's
    keeping them.
