id: 2KI.18.14
reference: 2 Kings 18:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח חִזְקִיָּ֣ה מֶֽלֶךְ יְהוּדָ֣ה אֶל מֶֽלֶךְ אַשּׁוּר֩ לָכִ֨ישָׁ/ה
    לֵ/אמֹ֤ר חָטָ֨אתִי֙ שׁ֣וּב מֵֽ/עָלַ֔/י אֵ֛ת אֲשֶׁר תִּתֵּ֥ן עָלַ֖/י אֶשָּׂ֑א וַ/יָּ֨שֶׂם
    מֶֽלֶךְ אַשּׁ֜וּר עַל חִזְקִיָּ֣ה מֶֽלֶךְ יְהוּדָ֗ה שְׁלֹ֤שׁ מֵאוֹת֙ כִּכַּר כֶּ֔סֶף
    וּ/שְׁלֹשִׁ֖ים כִּכַּ֥ר זָהָֽב־־־׀׀׀־־־־־׃
translation:
  text: Then Hezekiah king of Judah sent to the king of Assyria at Lachish, saying,
    “I have sinned. Withdraw from me. Whatever you impose on me, I will bear.” So
    the king of Assyria imposed on Hezekiah king of Judah three hundred talents of
    silver and thirty talents of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Lachish'; the Hebrew form can mark motion toward Lachish, though
      here it likely identifies where the king of Assyria was located.
    reason: lexical_alternative
  - marker: b
    text: Or 'Whatever you lay on me, I will carry/pay.' The Hebrew speaks of bearing
      whatever burden or levy is placed on him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - dispatched
  lexicon: HALOT
  rationale: The verb שלח in this narrative context most naturally means 'sent' with
    an implied message or envoys. 'Sent' is concise and idiomatic, while the following
    direct speech makes the communicative content explicit.
- source_word: לָכִישָׁה
  chosen: at Lachish
  alternatives:
  - to Lachish
  lexicon: HALOT
  rationale: 'The directional he can indicate motion toward a place (''to Lachish''),
    but in English the phrase modifies ''the king of Assyria'' more naturally as his
    location: Hezekiah sent to the king of Assyria, who was at Lachish. This best
    reflects the syntax and narrative setting.'
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I have done wrong
  - I am at fault
  lexicon: HALOT
  rationale: The verb חטא is the standard term 'sin.' Even in a political context,
    retaining 'sinned' preserves the moral force of Hezekiah's admission rather than
    softening it to mere diplomatic fault.
- source_word: שׁוּב מֵעָלַי
  chosen: Withdraw from me
  alternatives:
  - Turn back from me
  - Go away from me
  lexicon: HALOT
  rationale: שוב plus מעל conveys turning back or withdrawing from hostile pressure.
    'Withdraw from me' fits the military-political context better than the more wooden
    'turn back from me.'
- source_word: אֵת אֲשֶׁר תִּתֵּן עָלַי
  chosen: Whatever you impose on me
  alternatives:
  - What you put on me
  - Whatever you lay upon me
  lexicon: HALOT
  rationale: נתן על in this context refers to placing a burden, levy, or penalty upon
    someone. 'Impose on me' communicates the sense clearly in modern English without
    over-specifying tribute or fine in the main text.
- source_word: אֶשָּׂא
  chosen: I will bear
  alternatives:
  - I will carry
  - I will pay
  lexicon: HALOT
  rationale: נשא literally means 'bear/carry.' Here it idiomatically means to bear
    the imposed burden, likely by payment. 'I will bear' preserves the Hebrew image
    while remaining understandable; 'I will pay' would interpret more narrowly than
    the wording itself.
- source_word: וַיָּשֶׂם ... עַל
  chosen: imposed on
  alternatives:
  - set on
  - laid on
  - assessed against
  lexicon: HALOT
  rationale: שׂים על here denotes placing an obligation or tribute upon Hezekiah.
    'Imposed on' is natural English and matches the earlier 'impose on me,' preserving
    lexical coherence across the verse.
- source_word: כִּכַּר
  chosen: talents
  alternatives:
  - talent-weight units
  lexicon: HALOT
  rationale: ככר is a standard ancient weight measure conventionally rendered 'talent.'
    This is established English Bible usage and sufficiently transparent for readers;
    a more explanatory gloss would be cumbersome in the main text.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: The term literally denotes silver, here as tribute measured by weight.
    'Silver' is more precise than 'money' because the text specifies a metal by weight.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: The straightforward lexical sense is 'gold,' likewise measured by talents.
