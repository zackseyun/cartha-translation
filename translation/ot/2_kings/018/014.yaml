theological_decisions:
- issue: Moral force of Hezekiah's confession
  chosen_reading: Rendered חָטָאתִי as 'I have sinned'
  alternative_readings:
  - I have done wrong
  - I am at fault
  rationale: Although the setting is diplomatic, the Hebrew uses the ordinary verb
    for sin. The translation preserves that moral-religious weight rather than reducing
    it to a merely political admission.
  doctrine_reference: Translation philosophy §1, §6
- issue: Degree of interpretation in tribute language
  chosen_reading: Kept broader wording 'Whatever you impose on me, I will bear' rather
    than specifying 'tribute' or 'fine' in the main text
  alternative_readings:
  - Whatever tribute you assess, I will pay
  - Whatever fine you set, I will pay
  rationale: Optimal equivalence favors clear English while avoiding interpretive
    narrowing beyond the Hebrew. The following clause clarifies that a monetary levy
    is in view.
  doctrine_reference: Translation philosophy §1, §5
