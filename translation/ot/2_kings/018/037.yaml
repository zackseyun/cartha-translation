id: 2KI.18.37
reference: 2 Kings 18:37
source:
  edition: WLC
  text: וַ/יָּבֹ֣א אֶלְיָקִ֣ים בֶּן חִלְקִיָּ֣ה אֲשֶׁר עַל הַ֠/בַּיִת וְ/שֶׁבְנָ֨א
    הַ/סֹּפֵ֜ר וְ/יוֹאָ֨ח בֶּן אָסָ֧ף הַ/מַּזְכִּ֛יר אֶל חִזְקִיָּ֖הוּ קְרוּעֵ֣י בְגָדִ֑ים
    וַ/יַּגִּ֣דוּ ל֔/וֹ דִּבְרֵ֖י רַב שָׁקֵֽה־־־־־־׃
translation:
  text: Then Eliakim son of Hilkiah, who was over the household, and Shebna the scribe,
    and Joah son of Asaph, the recorder, came to Hezekiah with their clothes torn
    and told him the words of the Rabshakeh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabshakeh is an Assyrian official title, possibly referring to a high-ranking
      officer such as a chief cupbearer or spokesman.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - and ... came
  lexicon: HALOT
  rationale: The singular verb is followed by a compound subject, a common Hebrew
    construction where the first named figure can govern the verb before the full
    group is specified. English idiom requires a plural sense once the full subject
    is expressed, so 'came' is retained with the full compound subject. 'Then' captures
    the narrative waw in smooth English.
- source_word: אֲשֶׁר עַל הַבַּיִת
  chosen: who was over the household
  alternatives:
  - who was over the palace
  - who was in charge of the house
  lexicon: HALOT
  rationale: This is an official title indicating oversight of the royal household/palace
    administration. 'Over the household' preserves the Hebrew structure and official
    nuance without over-paraphrasing.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: The term denotes an official scribe/secretary. 'Scribe' is the more transparent
    and traditional rendering and fits the court setting.
- source_word: הַמַּזְכִּיר
  chosen: the recorder
  alternatives:
  - the chronicler
  - the remembrancer
  lexicon: HALOT
  rationale: This court title refers to an official recorder or memorializer. 'Recorder'
    is clear modern English and preserves the administrative sense.
- source_word: קְרוּעֵי בְגָדִים
  chosen: with their clothes torn
  alternatives:
  - with torn clothes
  - their garments torn
  lexicon: HALOT
  rationale: The participial phrase describes their condition on arrival, signaling
    grief/distress. 'With their clothes torn' is natural English and preserves the
    idiomatic force without losing the concrete image.
- source_word: וַיַּגִּדוּ לוֹ
  chosen: and told him
  alternatives:
  - and reported to him
  - and declared to him
  lexicon: HALOT
  rationale: '''Told him'' is straightforward and readable; the context already supplies
    the formal report setting.'
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - what ... had said
  - the message of
  lexicon: HALOT
  rationale: A relatively formal rendering is appropriate here because they are relaying
    a speech. 'The words of' stays close to the Hebrew while remaining natural.
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the Rab-shakeh
  lexicon: HALOT
  rationale: The term is an Assyrian official title used here as a designation. Retaining
    the established transliterated form avoids overconfidently narrowing the office
    and matches common English Bible usage; an explanatory alternative is worth preserving
    in a footnote.
