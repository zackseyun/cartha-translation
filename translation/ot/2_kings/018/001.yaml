id: 2KI.18.1
reference: 2 Kings 18:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בִּ/שְׁנַ֣ת שָׁלֹ֔שׁ לְ/הוֹשֵׁ֥עַ בֶּן אֵלָ֖ה מֶ֣לֶךְ יִשְׂרָאֵ֑ל
    מָלַ֛ךְ חִזְקִיָּ֥ה בֶן אָחָ֖ז מֶ֥לֶךְ יְהוּדָֽה־־׃
translation:
  text: Now in the third year of Hoshea son of Elah, king of Israel, Hezekiah son
    of Ahaz became king of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'began to reign.' The Hebrew verb in this regnal formula
      marks Hezekiah's accession to the throne.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as a narrative transition introducing
    a new section. 'Now' preserves the discourse function in readable modern English
    better than the more wooden 'and it happened' or archaic 'came to pass.'
- source_word: בִּשְׁנַת שָׁלֹשׁ
  chosen: in the third year
  alternatives:
  - during the third year
  lexicon: HALOT
  rationale: This is the standard regnal-year dating formula. 'In the third year'
    is the most natural and sufficiently formal rendering.
- source_word: לְהוֹשֵׁעַ בֶּן אֵלָה
  chosen: of Hoshea son of Elah
  alternatives:
  - belonging to Hoshea son of Elah
  lexicon: HALOT
  rationale: The preposition ל marks the reference point for the regnal year in dating
    formulas. English idiom expresses this simply as 'of Hoshea son of Elah.' Personal
    names are transliterated per project philosophy.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Hoshea's office and realm.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: In regnal formulas, מלך often denotes accession rather than the full
    duration of rule. 'Became king' communicates the ingressive sense clearly in modern
    English. 'Began to reign' is possible but slightly less natural; 'reigned' can
    obscure the accession point.
- source_word: חִזְקִיָּה
  chosen: Hezekiah
  alternatives:
  - Hizkiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶן אָחָז
  chosen: son of Ahaz
  lexicon: HALOT
  rationale: Standard filial identification in royal notices.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Although appositional to Hezekiah in Hebrew, English idiom is smoother
    with 'became king of Judah,' which preserves the sense without unnecessary repetition
    such as 'Hezekiah ... king of Judah became king.'
