theological_decisions:
- issue: Referent of 'his hand' in מִיָּדוֹ
  chosen_reading: Rendered literally as 'from his hand,' referring to the king just
    mentioned.
  alternative_readings:
  - from my hand (as reflected in the parallel in Isaiah 36:14 and some versions)
  - from his power
  rationale: The supplied Hebrew text reads third masculine singular suffix ('his
    hand'), and the translation follows the given text rather than harmonizing to
    the Isaiah parallel. The idiom is preserved literally because it is intelligible
    in English and retains the force of personal power.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §5
    (consistency/documented exception)
