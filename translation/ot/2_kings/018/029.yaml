id: 2KI.18.29
reference: 2 Kings 18:29
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר הַ/מֶּ֔לֶךְ אַל יַשִּׁ֥יא לָ/כֶ֖ם חִזְקִיָּ֑הוּ כִּי לֹ֣א יוּכַ֔ל
    לְ/הַצִּ֥יל אֶתְ/כֶ֖ם מִ/יָּדֽ/וֹ־־׃
translation:
  text: 'Thus says the king: Do not let Hezekiah deceive you, for he will not be able
    to deliver you from his hand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mislead you.' The Hebrew verb can mean to lead astray or deceive.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from his hand,' an idiom for being under someone's power. The parallel
      in Isaiah 36:14 reads 'from my hand.'
    reason: textual_variant
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a formal royal proclamation. 'Thus' preserves the elevated
    messenger-formula style better than the more colloquial 'This is what,' while
    remaining natural in English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although the Hebrew perfect can be rendered as past, in prophetic and
    proclamation formulas English idiom commonly uses the present: ''Thus says...''
    This preserves the conventional force of an official declaration.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun. In context this refers
    to the Assyrian king, but the Hebrew uses the title rather than the personal name,
    so the translation does the same.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Let not
  lexicon: HALOT
  rationale: Natural English negative imperative. 'Let not' is more formal but less
    readable for modern readers.
- source_word: יַשִּׁיא
  chosen: let Hezekiah deceive you
  alternatives:
  - mislead you
  - beguile you
  lexicon: HALOT
  rationale: From נשׁא in the causative sense of leading astray or deceiving. 'Deceive'
    best captures the Rabshakeh's accusation that Hezekiah is giving false confidence.
    'Mislead' is possible but slightly weaker.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name, following the
    translation policy to transliterate names rather than translate them.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' fits the formal discourse
    and reads smoothly after the imperative.
- source_word: לֹא יוּכַל
  chosen: he will not be able
  alternatives:
  - he cannot
  lexicon: HALOT
  rationale: The imperfect of יכל expresses inability. 'Will not be able' preserves
    the modal nuance and the future-oriented claim being made by the speaker.
- source_word: לְהַצִּיל
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: HALOT
  rationale: הציל commonly means to snatch away or deliver from danger. 'Deliver'
    fits the military-political context and echoes common biblical usage without sounding
    archaic.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct object marker plus second person plural pronoun; English simply
    uses 'you.' The plural is addressed to the people collectively, which English
    leaves implicit.
- source_word: מִיָּדוֹ
  chosen: from his hand
  alternatives:
  - from his power
  - from his grasp
  lexicon: HALOT
  rationale: The Hebrew idiom 'from his hand' is clear and vivid in English and should
    be preserved. In context the referent is the king just mentioned, so 'his hand'
    most naturally points to the king's power.
