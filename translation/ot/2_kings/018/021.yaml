id: 2KI.18.21
reference: 2 Kings 18:21
source:
  edition: WLC
  text: עַתָּ֡ה הִנֵּ֣ה בָטַ֣חְתָּ לְּ/ךָ֡ עַל מִשְׁעֶנֶת֩ הַ/קָּנֶ֨ה הָ/רָצ֤וּץ הַ/זֶּה֙
    עַל מִצְרַ֔יִם אֲשֶׁ֨ר יִסָּמֵ֥ךְ אִישׁ֙ עָלָ֔י/ו וּ/בָ֥א בְ/כַפּ֖/וֹ וּ/נְקָבָ֑/הּ
    כֵּ֚ן פַּרְעֹ֣ה מֶֽלֶךְ מִצְרַ֔יִם לְ/כָֽל הַ/בֹּטְחִ֖ים עָלָֽי/ו־־־־׃
translation:
  text: Now look, you are trusting in Egypt, that broken reed of a staff, which, if
    a man leans on it, will go into his palm and pierce it. So is Pharaoh king of
    Egypt to all who trust in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that crushed reed of a staff.' The Hebrew adjective can denote something
      crushed, bruised, or broken; 'broken' best fits the image of a support that
      splinters and injures the hand.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'if a man leans on it.' The singular masculine is used generically
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָטַחְתָּ לְּךָ
  chosen: you are trusting
  alternatives:
  - you trust
  - you have trusted
  lexicon: HALOT
  rationale: בטח denotes reliance or confidence. The perfect in this taunt has present
    force in context ('you are trusting'), which reads naturally in English while
    preserving the accusation of current reliance.
- source_word: מִשְׁעֶנֶת
  chosen: staff
  alternatives:
  - support
  - walking stick
  lexicon: HALOT
  rationale: The noun denotes something leaned on for support. 'Staff' is idiomatic
    in English and fits the metaphor of a reed used as support.
- source_word: הַקָּנֶה הָרָצוּץ
  chosen: that broken reed
  alternatives:
  - that crushed reed
  - that bruised reed
  lexicon: HALOT
  rationale: קנה is 'reed'; רצוץ conveys something crushed, broken, or splintered.
    In this context of a support that injures the one leaning on it, 'broken reed'
    is the clearest natural rendering, though 'bruised' is possible in other contexts.
- source_word: עַל מִצְרַיִם
  chosen: in Egypt
  alternatives:
  - on Egypt
  lexicon: HALOT
  rationale: The preposition על after בטח is naturally rendered 'trust in' in English.
    The phrase identifies Egypt as the object represented by the metaphorical reed.
- source_word: אֲשֶׁר יִסָּמֵךְ אִישׁ עָלָיו
  chosen: which, if a man leans on it
  alternatives:
  - on which a man leans
  - if anyone leans on it
  lexicon: HALOT
  rationale: סמך in the Niphal here expresses leaning for support. The conditional
    sense is implicit in the relative clause and is best brought out in English. 'A
    man' preserves the singular masculine generic in line with the gender-accurate
    policy.
- source_word: וּבָא בְכַפּוֹ
  chosen: will go into his palm
  alternatives:
  - will enter his hand
  - will come into his palm
  lexicon: HALOT
  rationale: The verb בוא literally means 'come/enter.' Here the image is of the splintered
    reed penetrating the hand. 'Go into his palm' is vivid and idiomatic while staying
    close to the Hebrew imagery.
- source_word: וּנְקָבָהּ
  chosen: and pierce it
  alternatives:
  - and puncture it
  - and bore through it
  lexicon: HALOT
  rationale: נקב means to pierce or perforate. The feminine suffix refers back to
    the palm/hand. 'Pierce it' is concise and natural.
- source_word: כֵּן
  chosen: So is
  alternatives:
  - Thus is
  - So also is
  lexicon: HALOT
  rationale: כֵּן marks the comparison between the metaphor and Pharaoh. 'So is' preserves
    the proverbial force.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: A straightforward rendering of the royal title. The appositional English
    without article is natural and preserves the formal tone.
- source_word: לְכָל הַבֹּטְחִים עָלָיו
  chosen: to all who trust in him
  alternatives:
  - for all who trust in him
  - to everyone trusting in him
  lexicon: HALOT
  rationale: 'The lamed here expresses relation or effect: this is what Pharaoh is
    ''to'' those who rely on him. ''To all who trust in him'' preserves the Hebrew
    structure and the generalizing force of the participle.'
