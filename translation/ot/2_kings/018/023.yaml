id: 2KI.18.23
reference: 2 Kings 18:23
source:
  edition: WLC
  text: וְ/עַתָּה֙ הִתְעָ֣רֶב נָ֔א אֶת אֲדֹנִ֖/י אֶת מֶ֣לֶךְ אַשּׁ֑וּר וְ/אֶתְּנָ֤ה
    לְ/ךָ֙ אַלְפַּ֣יִם סוּסִ֔ים אִם תּוּכַ֕ל לָ֥/תֶת לְ/ךָ֖ רֹכְבִ֥ים עֲלֵי/הֶֽם־־־׃
translation:
  text: Now then, please make a wager with my master, the king of Assyria, and I will
    give you two thousand horses, if you are able to provide riders for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make a pledge with my master' or 'strike a bargain with my master.'
      The Hebrew verb can denote entering an agreement or staking oneself, but here
      likely carries the sense of a mocking wager or challenge.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְעָרֶב
  chosen: make a wager
  alternatives:
  - pledge yourself
  - make an agreement
  - enter into a contest
  lexicon: HALOT, BDB
  rationale: In this taunting diplomatic context, the hitpael of ערב carries the sense
    of entering a wager or challenge rather than a simple friendly agreement. 'Make
    a wager' best captures the mocking offer tied to the conditional clause about
    supplying riders.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: BDB
  rationale: Polite particle softening the imperative. 'Please' is natural modern
    English and preserves the rhetorical form without archaic diction.
- source_word: אֶת אֲדֹנִי
  chosen: with my master
  alternatives:
  - with my lord
  lexicon: HALOT, BDB
  rationale: The preposition-like use of אֶת after התערב is best rendered 'with.'
    אֲדֹנִי here refers to the Rabshakeh's superior, not a divine title. 'My master'
    is clearer in modern English than 'my lord' and avoids unintended theological
    resonance.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - the Assyrian king
  lexicon: HALOT, BDB
  rationale: Standard construct rendering; both are possible, but 'the king of Assyria'
    is the more direct and familiar English equivalent.
- source_word: וְאֶתְּנָה לְךָ
  chosen: and I will give you
  alternatives:
  - and let me give you
  lexicon: HALOT, BDB
  rationale: Simple first-person cohortative/future-like offer in context. 'I will
    give you' fits the taunt and the sequence of the challenge.
- source_word: אַלְפַּיִם סוּסִים
  chosen: two thousand horses
  lexicon: HALOT, BDB
  rationale: Straightforward numeric phrase; no reason to paraphrase.
- source_word: אִם תּוּכַל
  chosen: if you are able
  alternatives:
  - if you can
  lexicon: HALOT, BDB
  rationale: Expresses capability in a taunting conditional. 'If you are able' slightly
    heightens the mocking tone while remaining natural.
- source_word: לָתֵת לְךָ רֹכְבִים עֲלֵיהֶם
  chosen: to provide riders for them
  alternatives:
  - to put riders on them
  - to supply horsemen for them
  lexicon: HALOT, BDB
  rationale: Literally 'to give for yourself riders upon them.' Idiomatic English
    requires smoothing. 'Provide riders for them' preserves the sense that Judah lacks
    sufficient cavalrymen. 'Horsemen' is possible, but 'riders' is more accessible
    and still accurate.
