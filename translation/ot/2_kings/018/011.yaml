id: 2KI.18.11
reference: 2 Kings 18:11
source:
  edition: WLC
  text: וַ/יֶּ֧גֶל מֶֽלֶךְ אַשּׁ֛וּר אֶת יִשְׂרָאֵ֖ל אַשּׁ֑וּרָ/ה וַ/יַּנְחֵ֞/ם בַּ/חְלַ֧ח
    וּ/בְ/חָב֛וֹר נְהַ֥ר גּוֹזָ֖ן וְ/עָרֵ֥י מָדָֽי־־׃
translation:
  text: And the king of Assyria exiled Israel to Assyria and settled them in Halah,
    and on the Habor, the river of Gozan, and in the cities of the Medes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deported Israel to Assyria and placed them in Halah, and by the Habor
      River, in Gozan, and in the cities of Media.'
    reason: lexical_alternative
  - marker: b
    text: '''Israel'' here refers to the northern kingdom and its people taken into
      exile.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּגֶל
  chosen: exiled
  alternatives:
  - carried away
  - deported
  lexicon: HALOT
  rationale: The Hiphil of גלה here denotes forced removal into exile. 'Exiled' is
    concise, natural English and preserves the political sense better than the more
    traditional 'carried away.'
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and idiomatic in English.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The object is the northern kingdom as a corporate entity. 'Israel' preserves
    the political-national reference of the Hebrew without over-specifying the population.
- source_word: אַשּׁוּרָה
  chosen: to Assyria
  alternatives:
  - into Assyria
  lexicon: HALOT
  rationale: The directional suffix indicates motion toward Assyria. 'To Assyria'
    is the most straightforward rendering.
- source_word: וַיַּנְחֵם
  chosen: settled them
  alternatives:
  - placed them
  - caused them to rest
  - led them
  lexicon: HALOT
  rationale: From נוח/נחה in causative usage, the sense here is causing the exiles
    to dwell in assigned locations. 'Settled them' best fits the deportation context.
- source_word: בַּחְלַח
  chosen: in Halah
  lexicon: HALOT
  rationale: Toponym transliterated according to standard English convention.
- source_word: וּבְחָבוֹר
  chosen: and on the Habor
  alternatives:
  - and in Habor
  - and by the Habor
  lexicon: HALOT
  rationale: Because the following apposition identifies it as a river, 'on the Habor'
    fits English geographical usage better than a bare 'in Habor.'
- source_word: נְהַר גּוֹזָן
  chosen: the river of Gozan
  alternatives:
  - the river Gozan
  - the river at Gozan
  lexicon: HALOT
  rationale: Construct chain rendered transparently. This likely identifies the Habor
    more specifically as the river associated with Gozan.
- source_word: וְעָרֵי מָדָי
  chosen: and in the cities of the Medes
  alternatives:
  - and the cities of Media
  lexicon: HALOT
  rationale: מָדָי refers to the Medes/Media. 'Cities of the Medes' is a direct and
    natural rendering of the construct phrase.
