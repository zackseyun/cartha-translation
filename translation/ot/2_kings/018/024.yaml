id: 2KI.18.24
reference: 2 Kings 18:24
source:
  edition: WLC
  text: וְ/אֵ֣יךְ תָּשִׁ֗יב אֵ֠ת פְּנֵ֨י פַחַ֥ת אַחַ֛ד עַבְדֵ֥י אֲדֹנִ֖/י הַ/קְּטַנִּ֑ים
    וַ/תִּבְטַ֤ח לְ/ךָ֙ עַל מִצְרַ֔יִם לְ/רֶ֖כֶב וּ/לְ/פָרָשִֽׁים־׃
translation:
  text: How then can you repulse a single captain among the least of my master's servants,
    when you trust in Egypt for chariots and horsemen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back the face of,' a Hebrew idiom meaning 'repel' or 'withstand.'
    reason: lexical_alternative
  - marker: b
    text: '''Captain'' could also be rendered ''governor'' or ''official''; the Hebrew
      term can denote a provincial ruler or military officer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשִׁיב
  chosen: can you repulse
  alternatives:
  - can you turn back
  - can you defeat
  - can you withstand
  lexicon: HALOT
  rationale: The Hiphil of שוב with אֵת פְּנֵי idiomatically means to turn back, repel,
    or repulse someone. 'Repulse' captures the military sense in context while preserving
    the image of forcing back an opponent.
- source_word: אֵת פְּנֵי
  chosen: repulse
  alternatives:
  - turn back the face of
  - withstand
  lexicon: HALOT
  rationale: The phrase 'turn back the face of' is a Hebrew idiom for repelling or
    resisting someone. In English the idiom is not natural, so the sense is brought
    into the verb phrase.
- source_word: פַחַת
  chosen: captain
  alternatives:
  - governor
  - official
  - commander
  lexicon: HALOT
  rationale: In this military taunt, the term refers to a subordinate Assyrian ruler
    or officer. 'Captain' best fits the immediate martial context, though 'governor'
    is a common broader gloss.
- source_word: אַחַד
  chosen: a single
  alternatives:
  - one
  lexicon: HALOT
  rationale: '''A single'' heightens the rhetorical force: even one such officer would
    be too much.'
- source_word: עַבְדֵי אֲדֹנִי
  chosen: my master's servants
  alternatives:
  - the servants of my lord
  lexicon: HALOT
  rationale: The phrase denotes subordinates of the Assyrian king or speaker's superior.
    'My master' is the natural English rendering of the 1cs suffix on אֲדֹנִי here,
    not a divine title.
- source_word: הַקְּטַנִּים
  chosen: the least
  alternatives:
  - the smallest
  - the lowliest
  - the lesser
  lexicon: HALOT
  rationale: The adjective marks lower rank or lesser importance among the servants.
    'The least' communicates status rather than physical size.
- source_word: וַתִּבְטַח לְךָ עַל מִצְרַיִם
  chosen: when you trust in Egypt
  alternatives:
  - while you rely on Egypt
  - and you put your trust in Egypt
  lexicon: HALOT
  rationale: בטח על commonly means to trust in or rely on. 'When you trust in Egypt'
    fits the rhetorical structure following the initial question.
- source_word: לְרֶכֶב וּלְפָרָשִׁים
  chosen: for chariots and horsemen
  alternatives:
  - for chariots and cavalry
  - for chariots and riders
  lexicon: HALOT
  rationale: The preposition expresses the military resources expected from Egypt.
    'Horsemen' is a clear, traditional, and accurate rendering for mounted troops.
