id: 2KI.18.13
reference: 2 Kings 18:13
source:
  edition: WLC
  text: וּ/בְ/אַרְבַּע֩ עֶשְׂרֵ֨ה שָׁנָ֜ה לַ/מֶּ֣לֶךְ חִזְקִיָּ֗ה עָלָ֞ה סַנְחֵרִ֤יב
    מֶֽלֶךְ אַשּׁוּר֙ עַ֣ל כָּל עָרֵ֧י יְהוּדָ֛ה הַ/בְּצֻר֖וֹת וַֽ/יִּתְפְּשֵֽׂ/ם־־׃
translation:
  text: Now in the fourteenth year of King Hezekiah, Sennacherib king of Assyria came
    up against all the fortified cities of Judah and captured them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְאַרְבַּע עֶשְׂרֵה שָׁנָה
  chosen: Now in the fourteenth year
  alternatives:
  - And in the fourteenth year
  - In the fourteenth year
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/in the
    fourteenth year.' English narrative style can render the conjunction as 'now'
    to mark continuation smoothly without losing the sequential sense.
- source_word: לַמֶּלֶךְ חִזְקִיָּה
  chosen: of King Hezekiah
  alternatives:
  - of the king Hezekiah
  - of Hezekiah the king
  lexicon: HALOT
  rationale: This is a regnal-year formula, naturally expressed in English as 'of
    King Hezekiah.'
- source_word: עָלָה
  chosen: came up against
  alternatives:
  - went up against
  - marched up against
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' and in military contexts with עַל it idiomatically
    means to advance against or attack. 'Came up against' preserves the Hebrew idiom
    while remaining natural English.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  rationale: Standard English transliteration of the Assyrian royal name.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Construct chain identifying Sennacherib's royal office and realm; English
    omits the article naturally in apposition.
- source_word: עַל כָּל עָרֵי יְהוּדָה הַבְּצֻרוֹת
  chosen: against all the fortified cities of Judah
  alternatives:
  - against all Judah's fortified cities
  - against all the defended cities of Judah
  lexicon: HALOT
  rationale: הַבְּצֻרוֹת denotes fortified/defended cities. 'Fortified cities' is
    the standard and clearest military sense.
- source_word: וַיִּתְפְּשֵׂם
  chosen: and captured them
  alternatives:
  - and seized them
  - and took them
  lexicon: HALOT
  rationale: The verb denotes taking possession of cities in conquest. 'Captured'
    best fits the military context and the plural pronominal suffix 'them' refers
    to the cities.
