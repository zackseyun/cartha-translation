id: 2KI.18.4
reference: 2 Kings 18:4
source:
  edition: WLC
  text: ה֣וּא הֵסִ֣יר אֶת הַ/בָּמ֗וֹת וְ/שִׁבַּר֙ אֶת הַ/מַּצֵּבֹ֔ת וְ/כָרַ֖ת אֶת
    הָֽ/אֲשֵׁרָ֑ה וְ/כִתַּת֩ נְחַ֨שׁ הַ/נְּחֹ֜שֶׁת אֲשֶׁר עָשָׂ֣ה מֹשֶׁ֗ה כִּ֣י עַד
    הַ/יָּמִ֤ים הָ/הֵ֨מָּה֙ הָי֤וּ בְנֵֽי יִשְׂרָאֵל֙ מְקַטְּרִ֣ים ל֔/וֹ וַ/יִּקְרָא
    ל֖/וֹ נְחֻשְׁתָּֽן׀־־־־־־־׃
translation:
  text: He removed the high places, shattered the pillars, cut down the Asherah, and
    crushed to pieces the bronze serpent that Moses had made, because until those
    days the sons of Israel had been burning incense to it; and it was called Nehushtan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cut down the Asherah pole' or 'cut down the sacred pole.'
    reason: lexical_alternative
  - marker: b
    text: Nehushtan is likely a wordplay on 'bronze' and may mean something like 'a
      mere piece of bronze.'
    reason: cultural_note
  - marker: c
    text: Or 'he called it Nehushtan.' The Hebrew does not make the subject explicit
      in a way that must be carried over into English.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵסִיר
  chosen: removed
  alternatives:
  - took away
  lexicon: HALOT
  rationale: Common verb for removing or taking away. 'Removed' is natural modern
    English and fits the reform context.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the hill shrines
  lexicon: HALOT
  rationale: Standard term for local elevated worship sites. 'High places' preserves
    the established cultic sense without over-paraphrase.
- source_word: שִׁבַּר
  chosen: shattered
  alternatives:
  - broke
  - smashed
  lexicon: HALOT
  rationale: The verb denotes forceful breaking. 'Shattered' conveys decisive destruction
    more vividly than simple 'broke' while remaining faithful.
- source_word: הַמַּצֵּבֹת
  chosen: the pillars
  alternatives:
  - the sacred pillars
  - the standing stones
  lexicon: HALOT
  rationale: Refers to cultic standing stones/pillars. 'Pillars' is concise in the
    main text; the more explicit cultic nuance is preserved as an alternative.
- source_word: כָרַת ... הָאֲשֵׁרָה
  chosen: cut down the Asherah
  alternatives:
  - cut down the Asherah pole
  - cut down the sacred pole
  lexicon: HALOT
  rationale: The term may refer to the cult object associated with Asherah, and possibly
    by extension the goddess in some contexts. Here the object sense is primary because
    it is something physically cut down. 'Asherah' is retained to avoid flattening
    the term; 'pole' is preserved as an alternative in a footnote-worthy lexical note.
- source_word: כִתַּת
  chosen: crushed to pieces
  alternatives:
  - broke in pieces
  - pulverized
  lexicon: HALOT
  rationale: The verb intensifies the destruction beyond ordinary breaking. 'Crushed
    to pieces' captures the thoroughness.
- source_word: נְחַשׁ הַנְּחֹשֶׁת
  chosen: the bronze serpent
  alternatives:
  - the bronze snake
  - the copper serpent
  lexicon: HALOT
  rationale: The phrase literally denotes a serpent of bronze/copper. 'Bronze serpent'
    is idiomatic and echoes the Pentateuchal background while remaining clear.
- source_word: מְקַטְּרִים לוֹ
  chosen: had been burning incense to it
  alternatives:
  - were offering incense to it
  lexicon: HALOT
  rationale: The idiom refers specifically to making sacrificial smoke/incense. 'Burning
    incense' is the clearest natural rendering. The pronoun refers to the serpent,
    so 'it' is preferable in English.
- source_word: וַיִּקְרָא לוֹ נְחֻשְׁתָּן
  chosen: it was called Nehushtan
  alternatives:
  - one called it Nehushtan
  - he called it Nehushtan
  lexicon: HALOT
  rationale: The Hebrew singular verb with pronominal object is syntactically terse
    and can be rendered impersonally in English. 'It was called Nehushtan' avoids
    overcommitting to whether Hezekiah or people generally supplied the name. The
    proper name likely plays on 'bronze' and may be pejorative.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural familial expression
    is preserved as 'sons of Israel' rather than neutralizing to 'Israelites,' while
    remaining understandable in context.
- source_word: עַד הַיָּמִים הָהֵמָּה
  chosen: until those days
  alternatives:
  - until that time
  lexicon: HALOT
  rationale: A temporal expression pointing up to Hezekiah's era. 'Until those days'
    is a close and readable rendering.
