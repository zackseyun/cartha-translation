theological_decisions:
- issue: Rendering of אֲשֵׁרָה
  chosen_reading: the Asherah
  alternative_readings:
  - the Asherah pole
  - the sacred pole
  rationale: The Hebrew term can denote the cultic object and is often left transliterated
    in modern translations to preserve the ancient religious referent. Because the
    verse describes physical destruction, the object sense is clear, but transliteration
    avoids prematurely narrowing the term in the main text. A lexical alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy 3, 5
- issue: Subject of וַיִּקְרָא לוֹ נְחֻשְׁתָּן
  chosen_reading: 'impersonal English: ''it was called Nehushtan'''
  alternative_readings:
  - '''he called it Nehushtan'' with Hezekiah as subject'
  - '''one called it Nehushtan'''
  rationale: The Hebrew permits different ways of representing the naming statement
    in English. The impersonal passive best preserves the ambiguity without importing
    an unnecessary interpretive decision about whether Hezekiah coined the label at
    that moment.
  doctrine_reference: Translation philosophy 3
