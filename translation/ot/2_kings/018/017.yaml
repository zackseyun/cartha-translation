id: 2KI.18.17
reference: 2 Kings 18:17
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח מֶֽלֶךְ אַשּׁ֡וּר אֶת תַּרְתָּ֥ן וְ/אֶת רַב סָרִ֣יס וְ/אֶת רַב
    שָׁקֵ֨ה מִן לָכִ֜ישׁ אֶל הַ/מֶּ֧לֶךְ חִזְקִיָּ֛הוּ בְּ/חֵ֥יל כָּבֵ֖ד יְרוּשָׁלִָ֑ם
    וַֽ/יַּעֲלוּ֙ וַ/יָּבֹ֣אוּ יְרוּשָׁלִַ֔ם וַ/יַּעֲל֣וּ וַ/יָּבֹ֗אוּ וַ/יַּֽעַמְדוּ֙
    בִּ/תְעָלַת֙ הַ/בְּרֵכָ֣ה הָֽ/עֶלְיוֹנָ֔ה אֲשֶׁ֕ר בִּ/מְסִלַּ֖ת שְׂדֵ֥ה כוֹבֵֽס־־־־׀־־־־׃
translation:
  text: Then the king of Assyria sent the Tartan, the Rab-saris, and the Rab-shakeh
    from Lachish to King Hezekiah at Jerusalem with a heavy force. They went up and
    came to Jerusalem; they went up and came and stood by the conduit of the upper
    pool, which is on the highway of the washer’s field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The titles 'Tartan,' 'Rab-saris,' and 'Rab-shakeh' are likely Assyrian official
      titles rather than personal names; possible functional renderings include 'commander-in-chief,'
      'chief official/eunuch,' and 'chief cupbearer' or another high officer.
    reason: cultural_note
  - marker: b
    text: Or 'with a great army' / 'with a large military force.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'the fuller’s field.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּרְתָּן
  chosen: the Tartan
  alternatives:
  - the commander-in-chief
  lexicon: HALOT
  rationale: Likely an Assyrian official title rather than a personal name. I preserved
    the conventional transliteration in the main text because the exact office is
    specialized and uncertain in English, while an explanatory alternative is preserved
    in a footnote-worthy note.
- source_word: רַב סָרִיס
  chosen: the Rab-saris
  alternatives:
  - the chief eunuch
  - the chief official
  lexicon: HALOT
  rationale: This is an Assyrian court title. Transliteration preserves the foreign
    administrative term without overcommitting to 'eunuch,' since סָרִיס can denote
    either a literal eunuch or a court official.
- source_word: רַב שָׁקֵה
  chosen: the Rab-shakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: Best treated as an Assyrian title. Traditional English often transliterates
    it; proposed functional equivalents vary, so the transliteration is the most auditable
    main-text choice.
- source_word: בְּחֵיל כָּבֵד
  chosen: with a heavy force
  alternatives:
  - with a great army
  - with a large military force
  lexicon: HALOT
  rationale: חַיִל here denotes military force, and כָּבֵד intensifies size/weight.
    'Heavy force' stays close to the Hebrew while remaining intelligible; alternatives
    are smoother but slightly more interpretive.
- source_word: וַיַּעֲלוּ ... וַיָּבֹאוּ יְרוּשָׁלַםִ
  chosen: They went up and came to Jerusalem
  alternatives:
  - They marched up and came to Jerusalem
  lexicon: HALOT
  rationale: עלה is the standard 'go up,' often used for ascent to Jerusalem; בוא
    is 'come/enter.' I retained the Hebrew sequence rather than compressing it.
- source_word: וַיַּעֲלוּ וַיָּבֹאוּ וַיַּעַמְדוּ
  chosen: they went up and came and stood
  alternatives:
  - they advanced and arrived and took their stand
  lexicon: HALOT
  rationale: The repetition appears deliberate in the Hebrew narrative style. I preserved
    it rather than smoothing it away, while using natural English verbs.
- source_word: תְעָלַת
  chosen: conduit
  alternatives:
  - channel
  - aqueduct
  lexicon: HALOT
  rationale: Refers to a watercourse/channel associated with the pool. 'Conduit' is
    a standard and suitably precise rendering in this setting.
- source_word: הַבְּרֵכָה הָעֶלְיוֹנָה
  chosen: the upper pool
  alternatives:
  - the upper reservoir
  lexicon: HALOT
  rationale: בְּרֵכָה commonly denotes a pool/reservoir. 'Pool' is the more familiar
    English term and fits the topographical reference.
- source_word: מְסִלַּת
  chosen: the highway
  alternatives:
  - the road
  - the causeway
  lexicon: HALOT
  rationale: Denotes a built road or highway. 'Highway' reflects the more formal route
    sense without sounding archaic.
- source_word: שְׂדֵה כוֹבֵס
  chosen: the washer’s field
  alternatives:
  - the fuller’s field
  - the field of the launderer
  lexicon: HALOT
  rationale: כּוֹבֵס is one who washes/bleaches cloth. 'Washer' is more accessible
    modern English than 'fuller,' while preserving the occupational sense.
