id: 2KI.8.27
reference: 2 Kings 8:27
source:
  edition: WLC
  text: וַ/יֵּ֗לֶךְ בְּ/דֶ֨רֶךְ֙ בֵּ֣ית אַחְאָ֔ב וַ/יַּ֧עַשׂ הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָ֖ה כְּ/בֵ֣ית אַחְאָ֑ב כִּ֛י חֲתַ֥ן בֵּית אַחְאָ֖ב הֽוּא־׃
translation:
  text: He walked in the way of the house of Ahab and did what was evil in the sight of Yahweh, like the house of Ahab, for he was a son-in-law of the house of Ahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'related by marriage to the house of Ahab.' The Hebrew term can denote a marriage relationship more broadly, though 'son-in-law' is the most specific fit here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He followed
  lexicon: HALOT
  rationale: הלך literally means 'to go/walk.' In this idiom with 'in the way of,' 'walked' preserves the Hebrew metaphor of conduct rather than flattening it to mere movement.
- source_word: בְּדֶרֶךְ
  chosen: in the way of
  alternatives:
  - in the path of
  - according to the manner of
  lexicon: HALOT
  rationale: דֶּרֶךְ here is idiomatic for manner of life or conduct. 'In the way of' is a natural English rendering that preserves the metaphor and its moral force.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - Ahab's house
  - the dynasty of Ahab
  lexicon: HALOT
  rationale: בַּיִת with a personal name commonly denotes household or dynasty. 'House of Ahab' preserves the biblical idiom and can include both family and royal line.
- source_word: וַיַּעַשׂ הָרַע
  chosen: did what was evil
  alternatives:
  - did evil
  - acted wickedly
  lexicon: HALOT
  rationale: This is a standard evaluative formula in Kings. 'Did what was evil' is idiomatic modern English and preserves the objectified Hebrew construction.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'in the eyes of.' 'In the sight of' is a smooth English equivalent that retains the sense of divine evaluation. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default for יְהוָה.
- source_word: כְּבֵית אַחְאָב
  chosen: like the house of Ahab
  alternatives:
  - as the house of Ahab did
  - like Ahab's house
  lexicon: HALOT
  rationale: The comparative כְּ marks similarity. 'Like the house of Ahab' keeps the comparison concise and close to the Hebrew.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: כִּי introduces the reason for the preceding evaluation. 'For' fits the explanatory relation and reads naturally in narrative prose.
- source_word: חֲתַן
  chosen: a son-in-law
  alternatives:
  - related by marriage
  - an in-law
  lexicon: HALOT
  rationale: חָתָן most directly means 'son-in-law' or marriage relation. Given the masculine singular subject and the historical context of marriage into Ahab's family, 'a son-in-law' is the most precise rendering.
- source_word: הוּא
  chosen: he was
  alternatives:
  - he himself was
  lexicon: HALOT
  rationale: The pronoun serves as the clause subject/copular expression in English. 'He was' is sufficient without overemphasis.
