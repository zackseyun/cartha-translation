theological_decisions:
- issue: Rendering the difficult clause לא חיה תחיה
  chosen_reading: Translate the main text as an instruction to report recovery, while preserving the literal negative reading in a footnote.
  alternative_readings:
  - '''You shall surely not live'' (taking לא as the negative particle)'
  - '''Say, “You shall surely live,”'' (understanding a textual issue such as לוֹ for לא)'
  rationale: The Masoretic consonants as pointed yield a statement of non-recovery, but this sits awkwardly with the immediate contrast introduced by the next clause and with the broader narrative, where Hazael is told Ben-hadad may recover from the illness yet will in fact die. Optimal equivalence favors the sense most likely intended in context, while transparency requires preserving the difficult literal reading in a footnote rather than silently erasing it.
  doctrine_reference: Translation philosophy §§1, 3, 5; Contested terms table for יְהוָה
