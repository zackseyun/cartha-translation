id: 2KI.8.10
reference: 2 Kings 8:10
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ אֱלִישָׁ֔ע לֵ֥ךְ אֱמָר לא חָיֹ֣ה תִחְיֶ֑ה וְ/הִרְאַ֥/נִי יְהוָ֖ה כִּֽי מ֥וֹת יָמֽוּת־־׃
translation:
  text: And Elisha said to him, “Go, say to him, ‘You will certainly recover’; but Yahweh has shown me that he will certainly die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'You shall surely not live.' The Hebrew text here is difficult; many understand the sense to be, 'You will certainly recover,' in contrast to the following revelation that he will in fact die.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: And Elisha said to him
  alternatives:
  - And he said to him
  lexicon: HALOT
  rationale: 'The subject is explicitly named by the following proper noun אֱלִישָׁע, so English idiom naturally brings the name into the clause: ''And Elisha said to him.'''
- source_word: לֵךְ אֱמָר
  chosen: Go, say to him
  alternatives:
  - Go, tell him
  - Go and say
  lexicon: HALOT
  rationale: Two imperatives in sequence are preserved. 'Say to him' is slightly more formal than 'tell him' and stays closer to אמר while remaining natural English.
- source_word: לא חָיֹה תִחְיֶה
  chosen: You will certainly recover
  alternatives:
  - You shall surely live
  - You will surely survive
  lexicon: HALOT
  rationale: The consonantal text has לא ('not'), yielding the difficult sense 'you shall surely not live,' which conflicts with the following clause and the narrative context. Many understand this as לוֹ ('to him') or otherwise construe the line as an instruction to say, 'You will certainly recover.' The infinitive absolute + imperfect of חיה intensifies certainty. 'Recover' fits the illness context better than the more wooden 'live.' The alternative is preserved in a footnote because the Hebrew form is textually and interpretively difficult.
- source_word: וְהִרְאַנִי יְהוָה
  chosen: but the LORD has shown me
  alternatives:
  - and the LORD has shown me
  lexicon: HALOT
  rationale: The conjunction is rendered 'but' to express the adversative sense required by the contrast between the reported message and the prophetic revelation. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default rendering for the divine name.
- source_word: כִּי מוֹת יָמוּת
  chosen: that he will certainly die
  alternatives:
  - that he shall surely die
  - for he will surely die
  lexicon: HALOT
  rationale: The infinitive absolute + imperfect of מות expresses emphatic certainty. 'Will certainly die' is clear modern English and preserves the force of the Hebrew.
