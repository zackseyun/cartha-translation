id: 2KI.8.1
reference: 2 Kings 8:1
source:
  edition: WLC
  text: וֶ/אֱלִישָׁ֡ע דִּבֶּ֣ר אֶל הָ/אִשָּׁה֩ אֲשֶׁר הֶחֱיָ֨ה אֶת בְּנָ֜/הּ לֵ/אמֹ֗ר ק֤וּמִי וּ/לְכִי֙ אתי וּ/בֵיתֵ֔/ךְ וְ/ג֖וּרִי בַּ/אֲשֶׁ֣ר תָּג֑וּרִי כִּֽי קָרָ֤א יְהוָה֙ לָֽ/רָעָ֔ב וְ/גַם בָּ֥א אֶל הָ/אָ֖רֶץ שֶׁ֥בַע שָׁנִֽים־־־־־־׃
translation:
  text: Now Elisha had spoken to the woman whose son he had restored to life, saying, “Arise, and go, you and your household, and sojourn wherever you can sojourn, for Yahweh has called for a famine, and it has also come upon the land for seven years.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sojourn' / 'reside' for 'stay' and 'wherever you can stay'; the Hebrew verb גור often carries the sense of living as a temporary resident.
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶאֱלִישָׁע
  chosen: Now Elisha
  alternatives:
  - And Elisha
  - Elisha
  lexicon: HALOT
  rationale: The prefixed conjunction can be rendered simply as 'and,' but in narrative English 'now' often better signals a scene shift while preserving the connective force. The personal name is transliterated per project philosophy.
- source_word: דִּבֶּר
  chosen: had spoken
  alternatives:
  - spoke
  - was speaking
  lexicon: HALOT
  rationale: The form is perfect 3ms. In context, English past perfect best reflects that this speech occurred prior to the events narrated in the surrounding passage.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  - the lady
  lexicon: HALOT
  rationale: The noun straightforwardly means 'woman' here, referring back to the Shunammite woman. No contextual basis requires 'wife' as the main rendering.
- source_word: אֲשֶׁר הֶחֱיָה אֶת־בְּנָהּ
  chosen: whose son he had restored to life
  alternatives:
  - whose son he had revived
  - whose son he had made alive
  lexicon: HALOT
  rationale: The relative clause identifies the woman by Elisha's prior miracle. 'Restored to life' is idiomatic modern English that accurately conveys the causative sense of החיה without sounding wooden.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' is natural in English narrative.
- source_word: קוּמִי
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative to a singular female. 'Arise' preserves the urgency and elevated narrative tone; 'get up' is possible but less fitting to the register.
- source_word: וּלְכִי
  chosen: go
  alternatives:
  - leave
  - depart
  lexicon: HALOT
  rationale: Simple imperative of הלך. 'Go' is the most direct equivalent.
- source_word: אַתִּי/אתי
  chosen: you
  alternatives:
  - with your family
  lexicon: HALOT
  rationale: The ketiv-like form here functions adverbially/appositionally with the following phrase, effectively 'you and your household.' Rendering it as 'you' preserves the direct address without overcomplicating the English.
- source_word: וּבֵיתֵךְ
  chosen: and your household
  alternatives:
  - and your house
  - and your family
  lexicon: HALOT
  rationale: Although literally 'your house,' in this context it refers to the members/dependents of her household traveling with her. 'Household' best captures the social sense in readable English.
- source_word: וְגוּרִי
  chosen: and stay
  alternatives:
  - and sojourn
  - and reside
  lexicon: HALOT
  rationale: גור often denotes residing as a temporary resident or sojourner. 'Stay' is natural modern English; the more formal nuance is preserved by the following clause and can be noted as an alternative.
- source_word: בַּאֲשֶׁר תָּגוּרִי
  chosen: wherever you can stay
  alternatives:
  - wherever you may sojourn
  - wherever you can reside
  lexicon: HALOT
  rationale: The phrase is idiomatic, indicating any place available for temporary residence. 'Wherever you can stay' communicates the practical force in contemporary English.
- source_word: כִּי קָרָא יְהוָה לָרָעָב
  chosen: for the LORD has called for a famine
  alternatives:
  - for the LORD has summoned a famine
  - for the LORD has proclaimed a famine
  lexicon: HALOT
  rationale: קרא with ל can mean to call for or summon. 'Called for a famine' preserves the metaphorical agency of God over the event. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: וְגַם בָּא אֶל־הָאָרֶץ
  chosen: and it has also come upon the land
  alternatives:
  - and it has also come to the land
  - and it is also coming upon the land
  lexicon: HALOT
  rationale: The subject is the famine. 'Come upon the land' is idiomatic English for a calamity affecting a region. Perfect aspect is rendered as present-resultative past perfective in context.
- source_word: שֶׁבַע שָׁנִים
  chosen: for seven years
  alternatives:
  - seven years
  lexicon: HALOT
  rationale: English idiom normally includes 'for' with duration in this clause.
