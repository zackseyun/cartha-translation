id: 2KI.8.8
reference: 2 Kings 8:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ אֶל חֲזָהאֵ֗ל קַ֤ח בְּ/יָֽדְ/ךָ֙ מִנְחָ֔ה וְ/לֵ֕ךְ לִ/קְרַ֖את אִ֣ישׁ הָ/אֱלֹהִ֑ים וְ/דָרַשְׁתָּ֨ אֶת יְהוָ֤ה מֵֽ/אוֹת/וֹ֙ לֵ/אמֹ֔ר הַ/אֶחְיֶ֖ה מֵ/חֳלִ֥י זֶֽה־־׃
translation:
  text: And the king said to Hazael, “Take a gift in your hand, and go to meet the man of God, and inquire of Yahweh through him, saying, ‘Will I recover from this sickness?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Will I live from this sickness?' The Hebrew verb is literally 'live,' here used in the sense of surviving or recovering.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  chosen: gift
  alternatives:
  - present
  - offering
  - tribute
  lexicon: HALOT
  rationale: In this narrative context, the item brought to the prophet is a present accompanying an inquiry, not a cultic offering. 'Gift' is natural modern English and preserves the sense without implying temple sacrifice.
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to go to meet
  - to encounter
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose after ''go'': Hazael is to go for the purpose of meeting the man of God. ''To meet'' is the most straightforward English equivalent.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: This is a standard Hebrew designation for a prophet, but the source text uses the title literally. Retaining 'the man of God' preserves the idiom and its narrative/theological resonance.
- source_word: וְדָרַשְׁתָּ אֶת־יְהוָה מֵאֹתוֹ
  chosen: inquire of the LORD through him
  alternatives:
  - seek the LORD from him
  - consult the LORD by him
  lexicon: HALOT
  rationale: דרשׁ with YHWH here means to seek an oracle or answer from the LORD, and מֵאֹתוֹ indicates mediation through Elisha. 'Inquire of the LORD through him' makes the relationship clear in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַאֶחְיֶה
  chosen: Will I recover
  alternatives:
  - Will I live
  - Will I revive
  lexicon: HALOT
  rationale: Although the verb is literally 'live,' in context it asks whether the king will survive and recover from his illness. 'Will I recover' best conveys the idiomatic sense in English while remaining faithful to the context.
- source_word: מֵחֳלִי זֶה
  chosen: from this sickness
  alternatives:
  - from this illness
  - from this disease
  lexicon: HALOT
  rationale: '''Sickness'' is clear, natural English for the king''s present malady. ''From this sickness'' fits the recovery question smoothly.'
- source_word: בְּיָדְךָ
  chosen: in your hand
  alternatives:
  - with you
  lexicon: HALOT
  rationale: 'The Hebrew idiom is literal, and English can preserve it naturally here: ''Take a gift in your hand.'' It conveys personal carrying without unnecessary paraphrase.'
