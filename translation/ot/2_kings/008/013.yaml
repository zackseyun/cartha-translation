id: 2KI.8.13
reference: 2 Kings 8:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חֲזָהאֵ֔ל כִּ֣י מָ֤ה עַבְדְּ/ךָ֙ הַ/כֶּ֔לֶב כִּ֣י יַעֲשֶׂ֔ה הַ/דָּבָ֥ר הַ/גָּד֖וֹל הַ/זֶּ֑ה וַ/יֹּ֣אמֶר אֱלִישָׁ֔ע הִרְאַ֧/נִי יְהוָ֛ה אֹתְ/ךָ֖ מֶ֥לֶךְ עַל אֲרָֽם־׃
translation:
  text: Hazael said, “But what is your servant, this dog, that he should do this great thing?” And Elisha said, “Yahweh has shown me that you will be king over Aram.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'king of Aram'; Hebrew literally 'king over Aram.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי מָה
  chosen: But what
  alternatives:
  - For what
  - What
  lexicon: HALOT
  rationale: Introduces Hazael’s incredulous objection. Rendering with 'But what' captures the adversative/discourse force in context better than a bare 'for what' or simple 'what.'
- source_word: עַבְדְּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: A conventional self-humbling court expression. Although the underlying term can denote a slave/servant, here 'your servant' best reflects deferential speech without overstating legal status.
- source_word: הַכֶּלֶב
  chosen: this dog
  alternatives:
  - the dog
  - a dog
  lexicon: HALOT
  rationale: The noun is definite, but in English the idiomatic self-deprecating force is best conveyed by apposition, 'this dog,' rather than the stiffer 'the dog.' It preserves the insult/humility imagery.
- source_word: כִּי יַעֲשֶׂה
  chosen: that he should do
  alternatives:
  - that he could do
  - that he would do
  lexicon: HALOT
  rationale: This construction expresses incredulity about capacity or likelihood. 'Should do' preserves the rhetorical force without overcommitting to either mere ability ('could') or simple futurity ('would').
- source_word: הַדָּבָר הַגָּדוֹל הַזֶּה
  chosen: this great thing
  alternatives:
  - this great deed
  - this great matter
  lexicon: HALOT
  rationale: דבר is broad ('thing/matter/deed'). In context Elisha has just described shocking acts Hazael will commit; 'thing' is natural English and leaves the phrase slightly open-ended, as in the Hebrew.
- source_word: הִרְאַנִי
  chosen: has shown me
  alternatives:
  - showed me
  - has caused me to see
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English. 'Has shown me' fits prophetic revelation naturally and connects the revealed vision to the immediate statement that follows.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project’s default rendering for the divine name per DOCTRINE.md.
- source_word: מֶלֶךְ עַל אֲרָם
  chosen: king over Aram
  alternatives:
  - king of Aram
  - king over Syria
  lexicon: HALOT
  rationale: The preposition עַל is most directly 'over.' 'Aram' is preferred over 'Syria' to reflect the Hebrew proper name more closely and avoid anachronistic associations.
