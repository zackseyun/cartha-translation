id: 2KI.8.19
reference: 2 Kings 8:19
source:
  edition: WLC
  text: וְ/לֹֽא אָבָ֤ה יְהוָה֙ לְ/הַשְׁחִ֣ית אֶת יְהוּדָ֔ה לְמַ֖עַן דָּוִ֣ד עַבְדּ֑/וֹ כַּ/אֲשֶׁ֣ר אָֽמַר ל֗/וֹ לָ/תֵ֨ת ל֥/וֹ נִ֛יר לְ/בָנָ֖י/ו כָּל הַ/יָּמִֽים־־־־׃
translation:
  text: Yet Yahweh was not willing to destroy Judah, for the sake of David his servant, just as he had said to him that he would give him a lamp for his sons all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'promised him.'
    reason: lexical_alternative
  - marker: b
    text: '''Lamp'' is a royal image for the continuing Davidic line or dynasty.'
    reason: cultural_note
lexical_decisions:
- source_word: וְלֹא
  chosen: Yet ... not
  alternatives:
  - And ... not
  - But ... not
  lexicon: HALOT
  rationale: The conjunction plus negation links this verse adversatively to the prior judgment context. 'Yet' captures the contrast smoothly in modern English without overstating it.
- source_word: אָבָה
  chosen: was not willing
  alternatives:
  - did not consent
  - was unwilling
  - would not
  lexicon: HALOT
  rationale: The verb denotes willingness or consent rather than mere future refusal. 'Was not willing' preserves the nuance of divine intention better than the flatter 'would not.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהַשְׁחִית
  chosen: to destroy
  alternatives:
  - to bring to ruin
  - to wipe out
  lexicon: HALOT
  rationale: The Hiphil infinitive of שׁחת here refers to destructive judgment against Judah. 'Destroy' is the most natural and sufficiently strong rendering in context.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the kingdom/people name.
- source_word: לְמַעַן
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: This preposition expresses motive grounded in regard for David. 'For the sake of' best conveys covenantal consideration rather than simple causation.
- source_word: דָּוִד עַבְדּוֹ
  chosen: David his servant
  alternatives:
  - David, his servant
  lexicon: HALOT
  rationale: The appositional phrase identifies David by his covenantal role before God. Keeping 'his servant' preserves the theological significance of David's status.
- source_word: כַּאֲשֶׁר אָמַר לוֹ
  chosen: just as he had said to him
  alternatives:
  - as he had promised him
  - according as he said to him
  lexicon: HALOT
  rationale: The Hebrew says 'said,' but in this covenant context the speech functions as promise. I retained the more literal 'said' in the main text and preserved 'promised' as a lexical alternative.
- source_word: לָתֵת לוֹ
  chosen: that he would give him
  alternatives:
  - to give him
  lexicon: HALOT
  rationale: English idiom requires an explicit finite clause after 'said to him' to make the promise clear and readable.
- source_word: נִיר
  chosen: a lamp
  alternatives:
  - a light
  lexicon: HALOT
  rationale: In royal/dynastic contexts ניר/נר is an idiom for an enduring line or continuing rule. 'Lamp' is the standard concrete image and should be preserved in the main text rather than interpreted away.
- source_word: לְבָנָיו
  chosen: through his sons
  alternatives:
  - for his sons
  - to his sons
  - for his children
  lexicon: HALOT
  rationale: The preposition with 'his sons' most naturally indicates the continuation of David's lamp by means of his descendants. 'Through his sons' makes the dynastic sense explicit while staying close to the Hebrew. 'Sons' is retained rather than gender-neutral 'children' because the royal succession context is specifically masculine.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - continually
  - forever
  lexicon: HALOT
  rationale: The phrase is literally 'all the days.' Although it can imply enduring continuity, 'forever' would over-interpret; the literal phrase preserves the covenantal idiom.
