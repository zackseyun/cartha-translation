theological_decisions:
- issue: Rendering the dynastic promise image נִיר
  chosen_reading: a lamp
  alternative_readings:
  - a light
  rationale: The verse recalls the Davidic covenant by using the concrete royal image of a 'lamp' rather than an abstract paraphrase such as 'dynasty' or 'line.' Preserving the metaphor maintains intertextual and theological continuity while allowing readers to infer the dynastic meaning.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance explicitly sets 'the LORD' as the default rendering for יְהוָה. This preserves consistency and reverential convention.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
