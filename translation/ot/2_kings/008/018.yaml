id: 2KI.8.18
reference: 2 Kings 8:18
source:
  edition: WLC
  text: וַ/יֵּ֜לֶךְ בְּ/דֶ֣רֶךְ מַלְכֵ֣י יִשְׂרָאֵ֗ל כַּ/אֲשֶׁ֤ר עָשׂוּ֙ בֵּ֣ית אַחְאָ֔ב כִּ֚י בַּת אַחְאָ֔ב הָֽיְתָה לּ֖/וֹ לְ/אִשָּׁ֑ה וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה׀־־׃
translation:
  text: He walked in the way of the kings of Israel, as the house of Ahab had done, for Ahab’s daughter was his wife, and he did what was evil in the eyes of Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He lived
  lexicon: HALOT
  rationale: הלך with בְּדֶרֶךְ is an idiom for conducting oneself or following a pattern of life. 'Walked' preserves the Hebrew metaphor and remains natural English.
- source_word: בְּדֶרֶךְ
  chosen: in the way of
  alternatives:
  - according to the way of
  - in the path of
  lexicon: HALOT
  rationale: דֶּרֶךְ here is metaphorical for manner or course of conduct. 'In the way of' is a standard, transparent rendering that preserves the idiom.
- source_word: מַלְכֵי יִשְׂרָאֵל
  chosen: the kings of Israel
  lexicon: HALOT
  rationale: Straightforward genitive construction referring to the northern kingdom's rulers as a moral-political pattern.
- source_word: כַּאֲשֶׁר עָשׂוּ בֵּית אַחְאָב
  chosen: as the house of Ahab had done
  alternatives:
  - just as the house of Ahab did
  lexicon: HALOT
  rationale: The clause compares Jehoram's conduct with the established behavior of Ahab's dynasty. 'Had done' fits the comparative sense smoothly in English.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - the dynasty of Ahab
  lexicon: HALOT
  rationale: בַּיִת in royal contexts often means dynasty or household. 'House of Ahab' preserves the Hebrew expression while remaining intelligible.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for his imitation of Ahab's house. 'For' is concise and fits the explanatory flow.
- source_word: בַּת אַחְאָב
  chosen: Ahab’s daughter
  alternatives:
  - the daughter of Ahab
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. The phrase identifies the dynastic-marital influence behind his conduct.
- source_word: הָיְתָה לּוֹ לְאִשָּׁה
  chosen: was his wife
  alternatives:
  - became his wife
  - was a wife to him
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'was to him for a wife.' In context it denotes existing marital status, so 'was his wife' is the clearest natural rendering.
- source_word: וַיַּעַשׂ הָרַע
  chosen: he did what was evil
  alternatives:
  - he did evil
  - he acted wickedly
  lexicon: HALOT
  rationale: This common evaluative formula is rendered with 'what was evil' to reflect the presence of the article on רַע and to sound natural in modern English.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A standard Hebrew idiom for divine evaluation. 'In the eyes of' preserves the imagery. יְהוָה follows the doctrinal default 'the LORD' rather than 'Yahweh'.
