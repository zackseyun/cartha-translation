id: 2KI.5.23
reference: 2 Kings 5:23
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר נַעֲמָ֔ן הוֹאֵ֖ל קַ֣ח כִּכָּרָ֑יִם וַ/יִּפְרָץ בּ֗/וֹ וַ/יָּצַר֩
    כִּכְּרַ֨יִם כֶּ֜סֶף בִּ/שְׁנֵ֣י חֲרִטִ֗ים וּ/שְׁתֵּי֙ חֲלִפ֣וֹת בְּגָדִ֔ים וַ/יִּתֵּן֙
    אֶל שְׁנֵ֣י נְעָרָ֔י/ו וַ/יִּשְׂא֖וּ לְ/פָנָֽי/ו־־׃
translation:
  text: Naaman said, “Please, take two talents.” And he urged him, and tied up two
    talents of silver in two bags, with two changes of clothes, and gave them to two
    of his servants, and they carried them before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he pressed him” / “he insisted with him.”
    reason: lexical_alternative
  - marker: b
    text: That is, two bags or purses containing the silver.
    reason: cultural_note
  - marker: c
    text: Or “ahead of him.” The sense is that Naaman’s servants carried the gifts
      in front of Gehazi.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹאֵל
  chosen: Please
  alternatives:
  - Be willing
  - Pray
  lexicon: HALOT
  rationale: Polite particle of entreaty before the imperative קַח. In natural modern
    English, 'Please' best conveys the courteous urging without archaic tone.
- source_word: קַח
  chosen: take
  alternatives:
  - accept
  - receive
  lexicon: HALOT
  rationale: Direct imperative from לקח. 'Take' is the plainest rendering; in context
    it implies accepting Naaman's gift, but 'take' stays closer to the Hebrew.
- source_word: כִּכָּרָיִם
  chosen: two talents
  alternatives:
  - two talent-weight measures
  lexicon: HALOT
  rationale: כִּכָּר is a standard weight unit commonly rendered 'talent.' This is
    idiomatic and recognizable in English Bible translation.
- source_word: וַיִּפְרָץ בּוֹ
  chosen: he urged him
  alternatives:
  - he pressed him
  - he insisted with him
  lexicon: HALOT
  rationale: The idiom means Naaman pressed Gehazi to accept more than requested.
    'Urged him' is clear modern English; 'pressed him' is possible but slightly less
    natural here.
- source_word: וַיָּצַר
  chosen: tied up
  alternatives:
  - wrapped
  - bound
  lexicon: HALOT
  rationale: The verb conveys binding or securing the silver into containers. 'Tied
    up' fits the physical action and the following phrase 'in two bags.'
- source_word: כִּכְּרַיִם כֶּסֶף
  chosen: two talents of silver
  alternatives:
  - two silver talents
  lexicon: HALOT
  rationale: Construct-like sequence indicating the material of the weight amount.
    'Two talents of silver' is standard and clear.
- source_word: חֲרִטִים
  chosen: bags
  alternatives:
  - purses
  - bundles
  lexicon: HALOT
  rationale: The term denotes containers for money or valuables. 'Bags' is the broad,
    natural rendering; 'purses' may sound too small or specific.
- source_word: שְׁתֵּי חֲלִפוֹת בְּגָדִים
  chosen: two changes of clothes
  alternatives:
  - two sets of garments
  - two changes of garments
  lexicon: HALOT
  rationale: This idiom refers to complete sets of clothing. 'Two changes of clothes'
    is idiomatic modern English and accurately conveys the sense.
- source_word: שְׁנֵי נְעָרָיו
  chosen: two of his servants
  alternatives:
  - two of his young men
  - two of his attendants
  lexicon: HALOT
  rationale: נַעַר can mean young man, servant, or attendant depending on context.
    Here these are Naaman's subordinates tasked with carrying the gifts, so 'servants'
    best captures function.
- source_word: וַיִּשְׂאוּ לְפָנָיו
  chosen: they carried them before him
  alternatives:
  - they carried them ahead of him
  - they bore them in front of him
  lexicon: HALOT
  rationale: The phrase indicates the servants carried the items in front of Gehazi
    as they went. 'Before him' is a fairly literal and still understandable rendering;
    the object 'them' is supplied from context.
