id: 2KI.5.9
reference: 2 Kings 5:9
source:
  edition: WLC
  text: וַ/יָּבֹ֥א נַעֲמָ֖ן ב/סוס/ו וּ/בְ/רִכְבּ֑/וֹ וַ/יַּעֲמֹ֥ד פֶּֽתַח הַ/בַּ֖יִת
    לֶ/אֱלִישָֽׁע־׃
translation:
  text: So Naaman came with his horses and chariots, and stood at the entrance of
    Elisha’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'with his horse and with his chariot'; the singular forms
      likely function collectively, hence 'horses and chariots.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The verb בוא in the wayyiqtol narrative sequence is most naturally rendered
    'came' here, marking Naaman's arrival at Elisha's location. 'Arrived' is possible
    but slightly more interpretive; 'came' preserves the simple narrative movement.
- source_word: נַעֲמָן
  chosen: Naaman
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: בְּסוּסוֹ
  chosen: with his horses
  alternatives:
  - on his horse
  - with his horse
  lexicon: HALOT
  rationale: Although the form is morphologically singular with suffix ('with his
    horse'), the collective sense in context with 'chariots' favors idiomatic English
    plural 'with his horses.' This reflects the retinue and military dignity implied
    by the scene better than the overly specific singular.
- source_word: וּבְרִכְבּוֹ
  chosen: and chariots
  alternatives:
  - and his chariot
  - and his cavalry
  lexicon: HALOT
  rationale: רֶכֶב can denote chariotry collectively as well as a singular chariot.
    In parallel with 'horses' and in this royal-military context, the collective plural
    'chariots' is the most natural English rendering. 'Cavalry' is too interpretive
    for this context.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - stopped
  - stationed himself
  lexicon: HALOT
  rationale: The verb עמד commonly means 'stand' and here describes Naaman taking
    his position outside the house. 'Stopped' weakens the visual force; 'stationed
    himself' overstates intentionality.
- source_word: פֶּתַח הַבַּיִת
  chosen: at the entrance of ... house
  alternatives:
  - at the doorway of ... house
  - at the door of ... house
  lexicon: HALOT
  rationale: פֶּתַח is 'opening, entrance.' 'Entrance' is slightly broader and more
    natural in modern English than 'doorway,' while still accurately reflecting the
    physical threshold area.
- source_word: לֶאֱלִישָׁע
  chosen: of Elisha
  alternatives:
  - to Elisha
  lexicon: HALOT
  rationale: 'The preposition ל with ''house'' here indicates possession/association
    in context: the house belonging to Elisha. Rendering it woodenly as ''to Elisha''
    would be awkward in English and obscure the sense.'
