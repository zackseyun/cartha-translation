id: 2KI.5.21
reference: 2 Kings 5:21
source:
  edition: WLC
  text: וַ/יִּרְדֹּ֥ף גֵּיחֲזִ֖י אַחֲרֵ֣י נַֽעֲמָ֑ן וַ/יִּרְאֶ֤ה נַֽעֲמָן֙ רָ֣ץ אַחֲרָ֔י/ו
    וַ/יִּפֹּ֞ל מֵ/עַ֧ל הַ/מֶּרְכָּבָ֛ה לִ/קְרָאת֖/וֹ וַ/יֹּ֥אמֶר הֲ/שָׁלֽוֹם׃
translation:
  text: So Gehazi pursued Naaman. When Naaman saw him running after him, he got down
    from the chariot to meet him and said, “Is everything well?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Is all well?'' The expression uses shalom as a greeting or inquiry
      about well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדֹּף
  chosen: pursued
  alternatives:
  - ran after
  - chased
  lexicon: HALOT
  rationale: רדף commonly means 'pursue, chase.' 'Pursued' is concise and natural
    in context, preserving the sense of intentional following without overstating
    hostility.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - behind
  lexicon: HALOT
  rationale: The preposition marks movement in pursuit behind someone. 'After' is
    the most idiomatic English with 'pursued.'
- source_word: וַיִּרְאֶה ... רָץ אַחֲרָיו
  chosen: saw him running after him
  alternatives:
  - saw him running behind him
  - saw that he was running after him
  lexicon: HALOT
  rationale: 'The Hebrew construction is compact: Naaman saw Gehazi as one running
    after him. The English rendering preserves both the visual perception and the
    ongoing action.'
- source_word: וַיִּפֹּל מֵעַל הַמֶּרְכָּבָה
  chosen: got down from the chariot
  alternatives:
  - jumped down from the chariot
  - fell from the chariot
  lexicon: HALOT
  rationale: Although נפל literally means 'fall,' in contexts of dismounting it idiomatically
    describes getting down quickly. 'Got down' communicates the intended action in
    natural English without implying an accidental fall.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to greet him
  - toward him
  lexicon: HALOT
  rationale: לקראת commonly means going to meet someone. 'To meet him' is the standard
    and contextually appropriate rendering.
- source_word: הֲשָׁלוֹם
  chosen: Is everything well?
  alternatives:
  - Is it well?
  - Is all well?
  - Peace?
  lexicon: HALOT
  rationale: שלום here functions as a conventional inquiry about well-being rather
    than a statement about peace. 'Is everything well?' conveys the idiomatic sense
    in clear modern English.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  - Then
  lexicon: Hebrew waw-consecutive usage
  rationale: The initial waw advances the narrative. 'So' gives smooth English narrative
    flow while preserving sequence.
