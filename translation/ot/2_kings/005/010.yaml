theological_decisions:
- issue: Whether to render בשר as 'flesh' or smooth it to 'body' in a healing context
  chosen_reading: flesh
  alternative_readings:
  - body
  rationale: The Hebrew uses the concrete term 'flesh,' and there is no need to flatten
    it to a more generic anatomical term. This preserves the vividness of the restoration
    while remaining understandable in English.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether טהר here should be rendered with ritual language ('cleansed') or
    plain-result language ('clean')
  chosen_reading: you will be clean
  alternative_readings:
  - you will be cleansed
  rationale: The context is Naaman's skin disease and healing, yet the Hebrew verb
    also carries purity associations. 'You will be clean' preserves both physical
    and purity resonance without over-specifying one dimension.
  doctrine_reference: Translation philosophy §3, §6
