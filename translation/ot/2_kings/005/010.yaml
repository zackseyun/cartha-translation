id: 2KI.5.10
reference: 2 Kings 5:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח אֵלָ֛י/ו אֱלִישָׁ֖ע מַלְאָ֣ךְ לֵ/אמֹ֑ר הָל֗וֹךְ וְ/רָחַצְתָּ֤
    שֶֽׁבַע פְּעָמִים֙ בַּ/יַּרְדֵּ֔ן וְ/יָשֹׁ֧ב בְּשָׂרְ/ךָ֛ לְ/ךָ֖ וּ/טְהָֽר־׃
translation:
  text: So Elisha sent a messenger to him, saying, “Go and wash in the Jordan seven
    times, and your flesh will be restored to you, and you will be clean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your flesh will return to you.' The Hebrew idiom expresses restoration
      to a former healthy condition.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be cleansed.' The verb can denote becoming clean or pure, with
      both physical and ritual overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative context. 'Sent' is natural modern
    English and preserves the causative action without overtranslation.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Direct pronominal object of direction; refers to Naaman in context. 'To
    him' is the plain sense.
- source_word: מַלְאָךְ
  chosen: messenger
  alternatives:
  - envoy
  - angel
  lexicon: HALOT
  rationale: In this human narrative setting, the word clearly refers to a human intermediary,
    not a heavenly being. 'Messenger' is the most transparent English equivalent.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with this message
  lexicon: HALOT
  rationale: Conventional Hebrew speech-introduction formula. 'Saying' keeps the formal
    linkage to the quoted command.
- source_word: הָלוֹךְ וְרָחַצְתָּ
  chosen: Go and wash
  alternatives:
  - Go, wash yourself
  - Go wash
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb gives an imperative force. 'Go
    and wash' is idiomatic and preserves the sequence of commands without unnecessary
    expansion.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Straightforward numerical expression; no reason to paraphrase.
- source_word: בַּיַּרְדֵּן
  chosen: in the Jordan
  alternatives:
  - in the Jordan River
  lexicon: HALOT
  rationale: The proper name is well known in English as 'the Jordan.' Adding 'River'
    is possible but not necessary; the Hebrew simply has the name with the article.
- source_word: וְיָשֹׁב
  chosen: will be restored
  alternatives:
  - will return
  - will come back
  lexicon: HALOT
  rationale: Although the verb's basic sense is 'return,' in context with 'your flesh'
    it denotes restoration to a former healthy state. 'Will be restored' communicates
    the idiomatic sense in clear English.
- source_word: בְּשָׂרְךָ לְךָ
  chosen: your flesh ... to you
  alternatives:
  - your body ... to you
  - your flesh
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Retaining 'flesh' preserves the concrete
    bodily language of the Hebrew. The phrase לְךָ is kept as 'to you' to reflect
    the dative nuance of restoration back to Naaman himself.
- source_word: וּטְהָר
  chosen: and you will be clean
  alternatives:
  - and be clean
  - and you will be cleansed
  lexicon: HALOT
  rationale: The verb טהר can mean become clean/pure. In this healing context, 'you
    will be clean' is natural and preserves the resultative sense without importing
    extra ritual terminology, though ritual overtones remain possible.
