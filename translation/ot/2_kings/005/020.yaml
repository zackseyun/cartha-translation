id: 2KI.5.20
reference: 2 Kings 5:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר גֵּיחֲזִ֗י נַעַר֮ אֱלִישָׁ֣ע אִישׁ הָ/אֱלֹהִים֒ הִנֵּ֣ה חָשַׂ֣ךְ אֲדֹנִ֗/י אֶֽת נַעֲמָ֤ן הָֽ/אֲרַמִּי֙ הַ/זֶּ֔ה מִ/קַּ֥חַת מִ/יָּד֖/וֹ אֵ֣ת אֲשֶׁר הֵבִ֑יא חַי יְהוָה֙ כִּֽי אִם רַ֣צְתִּי אַחֲרָ֔י/ו וְ/לָקַחְתִּ֥י מֵ/אִתּ֖/וֹ מְאֽוּמָה־׀־־־־־׃
translation:
  text: But Gehazi, the servant of Elisha the man of God, said, “Look, my master has spared this Aramean, Naaman, by refusing to take from his hand what he brought. As the LORD lives, I will run after him and take something from him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''this Aramean, Naaman''; the appositional order is retained in sense but smoothed in English.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has held back from taking from his hand what he brought.'
    reason: alternative_reading
  - marker: c
    text: 'Hebrew oath formula: ''As the LORD lives.'''
    reason: cultural_note
  - marker: d
    text: Or 'has spared this Aramean, Naaman, by not taking from his hand'.
    reason: previous_rendering
lexical_decisions:
- source_word: נַעַר
  chosen: servant
  alternatives:
  - young man
  - attendant
  lexicon: HALOT
  rationale: In this court/household context for Gehazi's role under Elisha, 'servant' best conveys functional status without over-literalizing age. 'Young man' is possible lexically but is not the point here.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is a standard prophetic title and should be translated transparently rather than paraphrased.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces Gehazi's reaction emphatically. 'Look' preserves the discourse force in readable modern English; 'Behold' would sound archaic.
- source_word: חָשַׂךְ
  chosen: has spared
  alternatives:
  - has held back from
  - has refrained from taking from
  lexicon: HALOT
  rationale: With the following infinitive phrase 'from taking from his hand,' the sense is that Elisha refrained and thus spared Naaman from payment. 'Has spared' captures the idiomatic force concisely.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: Refers to Gehazi's human superior Elisha, not to God. 'My master' is the natural English equivalent in this servant-master relationship.
- source_word: הָאֲרַמִּי
  chosen: Aramean
  alternatives:
  - Syrian
  lexicon: HALOT
  rationale: '''Aramean'' reflects the Hebrew ethnicity/geopolitical term more directly than the traditional but anachronizing ''Syrian.'''
- source_word: מִקַּחַת מִיָּדוֹ
  chosen: by not taking from his hand
  alternatives:
  - from taking from him
  - from receiving from his hand
  lexicon: HALOT
  rationale: The preposition plus infinitive construct expresses the action Elisha refrained from doing. 'From his hand' is retained because it is idiomatic in Hebrew for receiving what someone offers.
- source_word: אֵת אֲשֶׁר הֵבִיא
  chosen: what he brought
  alternatives:
  - that which he brought
  lexicon: HALOT
  rationale: Natural English rendering of the relative clause while preserving the object's indefiniteness.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: Standard oath formula. The divine name follows project doctrine as 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.'
- source_word: רַצְתִּי אַחֲרָיו
  chosen: I will run after him
  alternatives:
  - I will hurry after him
  - I will chase after him
  lexicon: HALOT
  rationale: Given the oath and ensuing action, the verb expresses Gehazi's immediate pursuit. 'Run after' is vivid and natural.
- source_word: וְלָקַחְתִּי מֵאִתּוֹ מְאוּמָה
  chosen: and take something from him
  alternatives:
  - and get something from him
  - and take anything from him
  lexicon: HALOT
  rationale: מְאוּמָה here means 'something/anything.' In context Gehazi intends to obtain some gift, so 'something' fits the pragmatic sense better than the more abstract 'anything'.
