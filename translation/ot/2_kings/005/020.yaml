theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains an oath formula with the covenant name. Per project doctrine, YHWH is rendered 'the LORD' in the main text, preserving the traditional reverential convention while remaining transparent in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
revisions:
- timestamp: '2026-04-21T19:59:24Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_kings/005/020.job-11405.json
  category: awkward_english
  tier: 1
  from: has spared this Aramean, Naaman, by not taking from his hand
  to: has spared this Aramean, Naaman, by refusing to take from his hand
  rationale: The Hebrew construction `ḥāśaḵ...miqqạḥat` ('refrained from taking') is rendered here as 'has spared...by not taking'. This phrasing is slightly redundant and awkward in English, as the act of sparing someone implies the 'not doing' of an action. The current rendering is understandable but clunky. Changing 'by not taking' to the more active 'by refusing to take' improves the sentence's flow while respecting the translator's choice of 'spared' as the main verb.
