id: 2KI.5.5
reference: 2 Kings 5:5
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֶֽלֶךְ אֲרָם֙ לֶךְ בֹּ֔א וְ/אֶשְׁלְחָ֥ה סֵ֖פֶר אֶל מֶ֣לֶךְ יִשְׂרָאֵ֑ל
    וַ/יֵּלֶךְ֩ וַ/יִּקַּ֨ח בְּ/יָד֜/וֹ עֶ֣שֶׂר כִּכְּרֵי כֶ֗סֶף וְ/שֵׁ֤שֶׁת אֲלָפִים֙
    זָהָ֔ב וְ/עֶ֖שֶׂר חֲלִיפ֥וֹת בְּגָדִֽים־־־־׃
translation:
  text: Then the king of Aram said, “Go, come, and I will send a letter to the king
    of Israel.” So he went and took in his hand ten talents of silver, six thousand
    pieces of gold, and ten changes of clothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go ahead'; the Hebrew preserves two imperatives, literally 'Go, come,'
      likely expressing prompt permission or encouragement.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'six thousand gold'; the specific counted unit is not stated explicitly,
      so 'pieces of gold' is supplied for natural English.
    reason: lexical_alternative
  - marker: c
    text: '''Aram'' is the Hebrew name; traditionally rendered ''Syria'' in some English
      versions.'
    reason: alternative_reading
lexical_decisions:
- source_word: לֶךְ בֹּא
  chosen: Go, come
  alternatives:
  - Go ahead
  - Come, go
  lexicon: HALOT
  rationale: The paired imperatives are somewhat idiomatic and convey urgent permission/commission.
    Rendering both verbs preserves the Hebrew wording rather than collapsing them
    into a single English command.
- source_word: סֵפֶר
  chosen: a letter
  alternatives:
  - a document
  - a scroll
  lexicon: HALOT
  rationale: In this diplomatic context, סֵפֶר refers to a written communication sent
    from one king to another; 'letter' is the most natural and precise English rendering.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - with him
  - in his possession
  lexicon: HALOT
  rationale: The Hebrew is literally 'in his hand.' This can idiomatically mean possession,
    but the literal expression is clear and natural enough in English here, while
    still implying that he carried these items with him.
- source_word: כִּכְּרֵי כֶסֶף
  chosen: talents of silver
  alternatives:
  - silver talents
  lexicon: HALOT
  rationale: כִּכָּר is a large unit of weight commonly rendered 'talent.' Retaining
    the ancient unit avoids speculative conversion and matches standard biblical usage.
- source_word: שֵׁשֶׁת אֲלָפִים זָהָב
  chosen: six thousand pieces of gold
  alternatives:
  - six thousand gold pieces
  - six thousand of gold
  lexicon: HALOT
  rationale: The Hebrew gives a number with 'gold' but no explicit noun such as shekels.
    'Pieces of gold' supplies the implied countable unit in readable English without
    over-specifying beyond the text.
- source_word: חֲלִיפוֹת בְּגָדִים
  chosen: changes of clothing
  alternatives:
  - sets of garments
  - changes of garments
  lexicon: HALOT
  rationale: The phrase denotes replacement outfits or sets of clothes, often valuable
    gifts. 'Changes of clothing' is idiomatic modern English and preserves the sense
    of multiple complete outfits.
- source_word: מֶלֶךְ אֲרָם
  chosen: the king of Aram
  alternatives:
  - the king of Syria
  lexicon: HALOT
  rationale: Following original-language primacy, the proper name אֲרָם is transliterated
    as 'Aram' rather than replaced with the later geographical equivalent 'Syria.'
