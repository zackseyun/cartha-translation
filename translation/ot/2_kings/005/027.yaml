theological_decisions:
- issue: Rendering of צָרַעַת / מְצֹרָע
  chosen_reading: skin disease / diseased
  alternative_readings:
  - leprosy / leprous
  rationale: The text describes a divinely imposed affliction and its hereditary continuation,
    but it does not require identification with modern leprosy. To avoid importing
    a specific medical diagnosis not warranted by the Hebrew, the main text uses broader
    disease language. The traditional rendering is preserved in a footnote for reader
    familiarity.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Readable modern English, not archaic or academic.'
