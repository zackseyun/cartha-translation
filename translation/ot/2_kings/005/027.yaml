id: 2KI.5.27
reference: 2 Kings 5:27
source:
  edition: WLC
  text: וְ/צָרַ֤עַת נַֽעֲמָן֙ תִּֽדְבַּק בְּ/ךָ֔ וּֽ/בְ/זַרְעֲ/ךָ לְ/עוֹלָ֑ם וַ/יֵּצֵ֥א
    מִ/לְּ/פָנָ֖י/ו מְצֹרָ֥ע כַּ/שָּֽׁלֶג־׃ס
translation:
  text: So Naaman’s skin disease will cling to you and to your offspring forever.”
    And he went out from his presence diseased, white as snow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditionally, 'Naaman’s leprosy will cling to you ... and he went out leprous,
      white as snow.' The Hebrew terms צָרַעַת / מְצֹרָע refer more broadly to a serious
      skin disease or condition, not necessarily modern leprosy.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרַעַת
  chosen: skin disease
  alternatives:
  - leprosy
  - defiling skin disease
  lexicon: HALOT
  rationale: The Hebrew term refers to a range of serious skin afflictions/ritual
    conditions, not specifically Hansen’s disease. 'Skin disease' avoids anachronistic
    medical precision while remaining natural English. Because the following predicate
    uses מְצֹרָע, the disease language is maintained consistently.
- source_word: נַעֲמָן
  chosen: Naaman
  rationale: Personal names are transliterated by standard English convention.
- source_word: תִּדְבַּק
  chosen: will cling
  alternatives:
  - will stick
  - will cleave
  lexicon: HALOT
  rationale: The verb דבק commonly conveys close attachment or sticking. 'Will cling'
    preserves the vividness of the curse formula in idiomatic modern English.
- source_word: בְּךָ
  chosen: to you
  alternatives:
  - on you
  - in you
  lexicon: HALOT
  rationale: With דבק, English idiom prefers 'cling to you' rather than a more wooden
    'cling in/on you.'
- source_word: וּבְזַרְעֲךָ
  chosen: and to your offspring
  alternatives:
  - and to your descendants
  - and to your seed
  lexicon: HALOT
  rationale: זֶרַע here denotes posterity. 'Offspring' is natural and sufficiently
    formal; 'seed' would be overly literal in this context.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: In a judgment context this denotes enduring continuance. 'Forever' is
    the clearest contemporary rendering.
- source_word: וַיֵּצֵא
  chosen: he went out
  alternatives:
  - he departed
  - he left
  lexicon: HALOT
  rationale: A straightforward narrative wayyiqtol; 'went out' preserves the concrete
    movement.
- source_word: מִלְּפָנָיו
  chosen: from his presence
  alternatives:
  - from before him
  lexicon: HALOT
  rationale: Literally 'from before his face/presence.' 'From his presence' is idiomatic
    and preserves the relational force of leaving Elisha's presence.
- source_word: מְצֹרָע
  chosen: diseased
  alternatives:
  - leprous
  - afflicted with a skin disease
  lexicon: HALOT
  rationale: Derived from the same semantic field as צָרַעַת. 'Leprous' is traditional
    but medically misleading in modern English; 'diseased' keeps the connection to
    the prior clause while reading smoothly. The specific comparison 'white as snow'
    supplies the visible symptom.
- source_word: כַּשָּׁלֶג
  chosen: white as snow
  alternatives:
  - like snow
  lexicon: HALOT
  rationale: The Hebrew says 'like the snow.' In English, with a skin condition in
    view, 'white as snow' makes explicit the implied point of comparison and matches
    common biblical idiom without adding new content.
