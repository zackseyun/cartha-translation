id: 2KI.5.14
reference: 2 Kings 5:14
source:
  edition: WLC
  text: וַ/יֵּ֗רֶד וַ/יִּטְבֹּ֤ל בַּ/יַּרְדֵּן֙ שֶׁ֣בַע פְּעָמִ֔ים כִּ/דְבַ֖ר אִ֣ישׁ
    הָ/אֱלֹהִ֑ים וַ/יָּ֣שָׁב בְּשָׂר֗/וֹ כִּ/בְשַׂ֛ר נַ֥עַר קָטֹ֖ן וַ/יִּטְהָֽר׃
translation:
  text: So he went down and dipped himself in the Jordan seven times, according to
    the word of the man of God; and his flesh was restored like the flesh of a little
    boy, and he was clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'immersed himself.' The Hebrew verb can denote dipping or immersing.
    reason: lexical_alternative
  - marker: b
    text: Or 'he was cleansed.' The Hebrew can be rendered either as a state ('he
      was clean') or as the result of cleansing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: So he went down
  alternatives:
  - Then he went down
  - And he went down
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Went down' preserves the
    concrete motion of ירד, while 'So' captures the resultative connection to the
    prior command and Naaman's response.
- source_word: וַיִּטְבֹּל
  chosen: dipped himself
  alternatives:
  - immersed himself
  - bathed
  lexicon: HALOT
  rationale: טבל commonly means to dip/immerse. Because the verb is active with Naaman
    as subject and the context is ritual washing in the river, 'dipped himself' is
    a natural English rendering that preserves the physical action without over-specifying
    mode.
- source_word: בַּיַּרְדֵּן
  chosen: in the Jordan
  alternatives:
  - in the Jordan River
  lexicon: HALOT
  rationale: The proper name is transliterated as 'Jordan' per the translation philosophy
    for names. English idiom commonly says 'in the Jordan' without needing 'River,'
    though that remains a viable alternative.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: A straightforward numerical expression; 'times' is the natural rendering
    of פעמים in this repeated-action context.
- source_word: כִּדְבַר
  chosen: according to the word of
  alternatives:
  - according to the instruction of
  - according to the command of
  lexicon: HALOT
  rationale: דבר can denote word, matter, or command. 'According to the word of' stays
    close to the Hebrew while still conveying that Naaman acted in conformity with
    Elisha's spoken directive.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is a standard prophetic title in the Hebrew Bible. Rendering it
    literally preserves both idiom and theological weight.
- source_word: וַיָּשָׁב בְּשָׂרוֹ
  chosen: his flesh was restored
  alternatives:
  - his flesh returned
  - his body was restored
  lexicon: HALOT
  rationale: שׁוב literally means 'return,' but in English 'his flesh was restored'
    best conveys the resultative sense in context. 'Flesh' is retained rather than
    'skin' or 'body' to reflect בשר and to preserve the concrete bodily imagery.
- source_word: כִּבְשַׂר נַעַר קָטֹן
  chosen: like the flesh of a little boy
  alternatives:
  - like the flesh of a young boy
  - like the flesh of a small child
  lexicon: HALOT
  rationale: נער denotes a boy/youth, and קטן adds smallness/youngness. 'Little boy'
    is idiomatic and preserves the comparison's vividness. 'Flesh' is repeated for
    lexical consistency with the prior בשר.
- source_word: וַיִּטְהָר
  chosen: he was clean
  alternatives:
  - he was cleansed
  - he became clean
  lexicon: HALOT
  rationale: טהר can mean become clean/pure. In the context of healing from a skin
    disease with ritual overtones, 'he was clean' is concise and echoes biblical cleanliness
    language without importing later technical terminology. 'He was cleansed' is possible,
    but the Hebrew verb here is stative/resultative enough for 'was clean.'
