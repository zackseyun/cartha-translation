theological_decisions:
- issue: Nature of Naaman's restoration
  chosen_reading: Render the result in terms of bodily restoration and cleanliness
    without importing sacramental or typological claims into the main text.
  alternative_readings:
  - Use 'cleansed' to foreground ritual purity
  - Use more medical language such as 'healed'
  rationale: The verse itself describes both physical restoration ('his flesh was
    restored') and purity ('he was clean'). The translation preserves both dimensions
    without collapsing the statement into only ritual or only medical categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
