theological_decisions:
- issue: Elisha's response to Naaman after Naaman's request concerning worship in
    the house of Rimmon
  chosen_reading: Render the Hebrew benediction/dismissal simply as 'Go in peace'
    without expanding it into explicit approval or disapproval.
  alternative_readings:
  - Interpret as explicit approval of Naaman's proposed conduct
  - Interpret as a mere polite dismissal with no ethical implication
  rationale: The Hebrew text states only a conventional blessing/dismissal. To add
    explicit moral endorsement or condemnation would import interpretation beyond
    the wording. Preserving the concise formula maintains the text's theological tension
    rather than resolving a debated issue.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
