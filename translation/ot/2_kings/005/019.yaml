id: 2KI.5.19
reference: 2 Kings 5:19
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר ל֖/וֹ לֵ֣ךְ לְ/שָׁל֑וֹם וַ/יֵּ֥לֶךְ מֵ/אִתּ֖/וֹ כִּבְרַת אָֽרֶץ־׃ס
translation:
  text: And he said to him, “Go in peace.” So he went from him a considerable distance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “some distance.” The Hebrew expression denotes a span of travel without
      specifying an exact measure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר, advancing the story. 'And he
    said' preserves the Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: לּוֹ
  chosen: to him
  lexicon: HALOT
  rationale: Indirect object pronoun referring to Naaman in context; straightforwardly
    rendered 'to him'.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  - Depart
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is the natural concise English equivalent and
    fits the dismissive/blessing formula that follows.
- source_word: לְשָׁלוֹם
  chosen: in peace
  alternatives:
  - for peace
  - peacefully
  lexicon: HALOT
  rationale: The idiom לך לשלום is a conventional benedictory dismissal meaning 'go
    in peace.' This preserves both the lexical sense of שָׁלוֹם and the idiomatic
    force.
- source_word: וַיֵּלֶךְ
  chosen: So he went
  alternatives:
  - And he went
  - Then he went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך continuing the sequence. 'So he went' gives smooth English
    while retaining the resultative narrative progression from Elisha's words.
- source_word: מֵאִתּוֹ
  chosen: from him
  alternatives:
  - away from him
  lexicon: HALOT
  rationale: Preposition plus pronominal suffix indicating departure from Elisha's
    presence. 'From him' is formally close and sufficient in context.
- source_word: כִּבְרַת אָרֶץ
  chosen: a considerable distance
  alternatives:
  - some distance
  - a stretch of land
  - a certain distance
  lexicon: HALOT
  rationale: This expression denotes a measure of distance traveled, though not a
    precise unit. 'A considerable distance' communicates that he had gone on from
    Elisha by a notable span without forcing a technical measurement.
