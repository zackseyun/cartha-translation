id: 2KI.5.25
reference: 2 Kings 5:25
source:
  edition: WLC
  text: וְ/הוּא בָא֙ וַ/יַּעֲמֹ֣ד אֶל אֲדֹנָ֔י/ו וַ/יֹּ֤אמֶר אֵלָי/ו֙ אֱלִישָׁ֔ע מ/אן
    גֵּחֲזִ֑י וַ/יֹּ֕אמֶר לֹֽא הָלַ֥ךְ עַבְדְּ/ךָ֖ אָ֥נֶה וָ/אָֽנָה־־־׃
translation:
  text: But he went in and stood before his master, and Elisha said to him, “Where
    have you been, Gehazi?” And he said, “Your servant did not go anywhere.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''From where, Gehazi?'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''Your servant did not go here or there.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּא
  chosen: But he
  alternatives:
  - And he
  - Now he
  lexicon: HALOT
  rationale: The conjunction plus pronoun advances the narrative with mild contrast
    after Gehazi's secret actions; 'But he' captures the turn naturally in English.
- source_word: בָא
  chosen: went in
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: Although the verb is simply 'came,' in context Gehazi returns into Elisha's
    presence; 'went in' makes the movement into the house/room explicit in idiomatic
    English without overparaphrasing.
- source_word: וַיַּעֲמֹד אֶל אֲדֹנָיו
  chosen: stood before his master
  alternatives:
  - stood by his master
  - presented himself to his master
  lexicon: HALOT
  rationale: The idiom 'stood before' is a standard English rendering for עמד אל/לפני
    in attendance contexts. אֲדֹנָיו here refers to Elisha as Gehazi's human superior,
    so 'master' fits better than 'lord'.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: This is not a divine title but a social relation between servant and
    superior. 'Master' best reflects the household/service setting.
- source_word: מֵאָן
  chosen: Where have you been
  alternatives:
  - From where
  - Where from
  lexicon: HALOT
  rationale: The interrogative with מן literally asks 'from where,' but idiomatic
    English in this context is 'Where have you been?' which conveys the same sense
    of origin/recent whereabouts.
- source_word: גֵּחֲזִי
  chosen: Gehazi
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: לֹא הָלַךְ עַבְדְּךָ
  chosen: Your servant did not go
  alternatives:
  - Your servant has not gone
  - I did not go
  lexicon: HALOT
  rationale: The Hebrew uses the self-referential 'your servant,' which should be
    preserved rather than flattened to 'I' because it reflects deferential speech.
- source_word: אָ֥נֶה וָאָֽנָה
  chosen: anywhere
  alternatives:
  - here or there
  - to this place or that
  - in any direction
  lexicon: HALOT
  rationale: The idiom means 'anywhere at all' or 'here or there.' 'Anywhere' is concise,
    natural English that preserves the denial's force.
