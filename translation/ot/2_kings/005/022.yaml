id: 2KI.5.22
reference: 2 Kings 5:22
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר שָׁל֗וֹם אֲדֹנִ/י֮ שְׁלָחַ֣/נִי לֵ/אמֹר֒ הִנֵּ֣ה עַתָּ֡ה זֶ֠ה
    בָּ֣אוּ אֵלַ֧/י שְׁנֵֽי נְעָרִ֛ים מֵ/הַ֥ר אֶפְרַ֖יִם מִ/בְּנֵ֣י הַ/נְּבִיאִ֑ים
    תְּנָ/ה נָּ֤א לָ/הֶם֙ כִּכַּר כֶּ֔סֶף וּ/שְׁתֵּ֖י חֲלִפ֥וֹת בְּגָדִֽים׀־־־׃
translation:
  text: And he said, “All is well. My master has sent me to say, ‘Look, just now two
    young men from the hill country of Ephraim, from among the sons of the prophets,
    have come to me. Please give them a talent of silver and two changes of clothes.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Peace” / “It is well.” The Hebrew shalom here functions idiomatically
      as reassurance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “sons of the prophets,” a standard expression for members of a prophetic
      community or guild.
    reason: cultural_note
  - marker: c
    text: A “talent” was a large unit of weight for precious metal.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁל֗וֹם
  chosen: All is well
  alternatives:
  - Peace
  - It is well
  lexicon: HALOT
  rationale: In this dialogue, the term functions idiomatically as an assurance that
    nothing is wrong, not as a greeting or abstract 'peace.' 'All is well' best conveys
    the pragmatic sense in natural English.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: Here Gehazi addresses Naaman and refers to Elisha as the one who sent
    him. In this servant-master context, 'my master' is clearer for modern readers
    than 'my lord' and avoids sounding overly honorific or divine.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: The perfect verb reports a completed action with present relevance in
    direct speech. English present perfect fits the discourse naturally.
- source_word: הִנֵּה עַתָּה זֶה
  chosen: Look, just now
  alternatives:
  - Behold, now
  - See, at this time
  lexicon: HALOT
  rationale: This cluster is deictic and attention-getting. 'Look, just now' preserves
    both the discourse marker and the immediacy without archaic diction.
- source_word: נְעָרִים
  chosen: young men
  alternatives:
  - servants
  - boys
  lexicon: HALOT
  rationale: The word can denote youths, attendants, or servants depending on context.
    Since these are identified as members of the prophetic community, 'young men'
    is the least misleading and most natural choice.
- source_word: מֵהַר אֶפְרַיִם
  chosen: from the hill country of Ephraim
  alternatives:
  - from Mount Ephraim
  lexicon: HALOT
  rationale: The expression commonly denotes the highland region of Ephraim rather
    than a single mountain. 'Hill country' reflects standard geographic usage in English
    Bible translation.
- source_word: מִבְּנֵי הַנְּבִיאִים
  chosen: from among the sons of the prophets
  alternatives:
  - from the company of the prophets
  - from among the prophetic disciples
  lexicon: HALOT
  rationale: The Hebrew idiom is preserved fairly literally because it is a recognizable
    technical expression in Kings for a prophetic guild or community. A more interpretive
    rendering is possible, but the literal form remains readable.
- source_word: תְּנָה נָּא
  chosen: Please give
  alternatives:
  - Give, please
  - Kindly give
  lexicon: HALOT
  rationale: The imperative plus particle נָא expresses a polite request. 'Please
    give' is natural modern English and preserves the request tone.
- source_word: כִּכַּר כֶּסֶף
  chosen: a talent of silver
  alternatives:
  - a silver talent
  lexicon: HALOT
  rationale: כִּכַּר is a large unit of weight conventionally rendered 'talent.' Keeping
    the traditional metrological term is more precise than paraphrasing as a generic
    amount of money.
- source_word: חֲלִפוֹת בְּגָדִים
  chosen: changes of clothes
  alternatives:
  - sets of garments
  - changes of garments
  lexicon: HALOT
  rationale: The phrase refers to replacement outfits or sets of clothing. 'Changes
    of clothes' is idiomatic modern English and fits the narrative context.
