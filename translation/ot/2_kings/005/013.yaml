theological_decisions:
- issue: Nuance of טהר in Naaman's healing
  chosen_reading: and be clean
  alternative_readings:
  - and be cleansed
  rationale: The verse concerns healing from skin disease with overtones of purity.
    'Be clean' preserves both physical and purity-related resonance without importing
    later theological language. 'Be cleansed' is viable and worth preserving as a
    lexical alternative.
  doctrine_reference: Translation philosophy §3, §6
