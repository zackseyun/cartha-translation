id: 2KI.5.13
reference: 2 Kings 5:13
source:
  edition: WLC
  text: וַ/יִּגְּשׁ֣וּ עֲבָדָי/ו֮ וַ/יְדַבְּר֣וּ אֵלָי/ו֒ וַ/יֹּאמְר֗וּ אָבִי֙ דָּבָ֣ר
    גָּד֗וֹל הַ/נָּבִ֛יא דִּבֶּ֥ר אֵלֶ֖י/ךָ הֲ/ל֣וֹא תַעֲשֶׂ֑ה וְ/אַ֛ף כִּֽי אָמַ֥ר
    אֵלֶ֖י/ךָ רְחַ֥ץ וּ/טְהָֽר־׃
translation:
  text: Then his servants came near and spoke to him and said, “My father, if the
    prophet had spoken to you some great thing, would you not do it? How much more,
    then, when he says to you, ‘Wash, and be clean’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and be cleansed.” The Hebrew can denote becoming clean or purified.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: נגשׁ commonly denotes approaching or drawing near. 'Came near' is natural
    modern English and preserves the physical/social movement toward Naaman.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his slaves
  lexicon: HALOT
  rationale: עבד can mean servant or slave depending on context. Here these are Naaman's
    subordinate household/military retainers speaking respectfully; 'servants' fits
    idiomatic narrative English without making bonded status the focus.
- source_word: וַיְדַבְּרוּ אֵלָיו
  chosen: spoke to him
  alternatives:
  - talked with him
  lexicon: HALOT
  rationale: Straightforward rendering of דבר אל. 'Spoke to him' is both accurate
    and readable.
- source_word: אָבִי
  chosen: My father
  alternatives:
  - Father
  - My master
  lexicon: HALOT
  rationale: Used here as a respectful form of address from inferiors to a superior,
    not indicating literal paternity. 'My father' preserves the metaphor and tone
    better than flattening it to 'master.'
- source_word: דָּבָר גָּדוֹל
  chosen: some great thing
  alternatives:
  - a great thing
  - something difficult
  lexicon: HALOT
  rationale: The phrase refers to an impressive or demanding command. 'Some great
    thing' captures the idiom in smooth English and fits the rhetorical comparison
    with the simple command to wash.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite reference to Elisha; standard rendering.
- source_word: דִּבֶּר אֵלֶיךָ
  chosen: had spoken to you
  alternatives:
  - spoke to you
  lexicon: HALOT
  rationale: 'English pluperfect fits the rhetorical conditional in context: if the
    prophet had told you something great, you would have done it.'
- source_word: הֲלוֹא תַעֲשֶׂה
  chosen: would you not do it?
  alternatives:
  - would you not do so?
  - surely you would do it
  lexicon: HALOT
  rationale: הֲלוֹא introduces a rhetorical question expecting a positive answer.
    'Would you not do it?' preserves that force naturally.
- source_word: וְאַף כִּי
  chosen: How much more, then,
  alternatives:
  - how much rather
  - indeed when
  lexicon: HALOT
  rationale: This idiom strengthens the argument from greater to lesser. 'How much
    more, then,' clearly conveys the logic in contemporary English.
- source_word: אָמַר אֵלֶיךָ
  chosen: when he says to you
  alternatives:
  - when he said to you
  lexicon: HALOT
  rationale: The Hebrew perfect after the idiom can be rendered with present in English
    direct rhetorical framing. 'When he says to you' keeps the quoted command vivid
    and idiomatic; the past sense is still clear from context.
- source_word: רְחַץ
  chosen: Wash
  alternatives:
  - Bathe
  lexicon: HALOT
  rationale: Simple imperative matching the prophet's command. 'Wash' is the most
    direct and contextually appropriate choice.
- source_word: וּטְהָר
  chosen: and be clean
  alternatives:
  - and be cleansed
  - and become clean
  lexicon: HALOT
  rationale: טהר can mean become clean/pure, including ritual and physical cleansing.
    In this healing context, 'be clean' is concise and preserves the result without
    over-specifying ritual nuance.
