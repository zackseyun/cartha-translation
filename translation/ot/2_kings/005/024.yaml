id: 2KI.5.24
reference: 2 Kings 5:24
source:
  edition: WLC
  text: וַ/יָּבֹא֙ אֶל הָ/עֹ֔פֶל וַ/יִּקַּ֥ח מִ/יָּדָ֖/ם וַ/יִּפְקֹ֣ד בַּ/בָּ֑יִת
    וַ/יְשַׁלַּ֥ח אֶת הָ/אֲנָשִׁ֖ים וַ/יֵּלֵֽכוּ־־׃
translation:
  text: When he came to the hill, he took them from their hand and deposited them
    in the house. Then he sent the men away, and they went.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mound' or 'the fortified hill'; Hebrew 'the Ophel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'from their hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'stored them' or 'put them away in the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֹפֶל
  chosen: the hill
  alternatives:
  - the mound
  - the fortified hill
  - Ophel
  lexicon: HALOT
  rationale: עֹפֶל can denote a raised place, mound, or fortified hill. In this narrative
    setting, a topographical sense fits best. 'The hill' is clear modern English and
    avoids importing the proper-name sense 'Ophel,' which is more associated with
    Jerusalem and is not required here.
- source_word: מִיָּדָם
  chosen: from their hand
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The Hebrew is singular 'hand' with 3mp suffix, an idiom for receiving
    something directly from someone. The main text keeps the concrete expression 'from
    their hand' to preserve the Hebrew imagery while remaining natural enough in English.
- source_word: וַיִּפְקֹד
  chosen: deposited
  alternatives:
  - stored
  - put away
  - laid up
  lexicon: HALOT
  rationale: The verb פקד has a broad semantic range including attend to, appoint,
    entrust, or deposit. In context, Gehazi is handling the goods he has just received
    and placing them in safekeeping inside the house. 'Deposited' best captures that
    contextual sense without overtranslating.
- source_word: בַּבָּיִת
  chosen: in the house
  alternatives:
  - in the household
  - at the house
  lexicon: HALOT
  rationale: The noun בית here most naturally refers to the physical house as the
    place where the items were put. 'In the house' is the straightforward locative
    rendering.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the servants
  lexicon: HALOT
  rationale: The Hebrew says 'the men.' Although contextually these are Naaman's attendants,
    the text does not use a more specific servant term here, so the translation preserves
    the lexical form.
