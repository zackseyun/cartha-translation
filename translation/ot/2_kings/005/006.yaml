id: 2KI.5.6
reference: 2 Kings 5:6
source:
  edition: WLC
  text: וַ/יָּבֵ֣א הַ/סֵּ֔פֶר אֶל מֶ֥לֶךְ יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר וְ/עַתָּ֗ה כְּ/ב֨וֹא
    הַ/סֵּ֤פֶר הַ/זֶּה֙ אֵלֶ֔י/ךָ הִנֵּ֨ה שָׁלַ֤חְתִּי אֵלֶ֨י/ךָ֙ אֶת נַעֲמָ֣ן עַבְדִּ֔/י
    וַ/אֲסַפְתּ֖/וֹ מִ/צָּרַעְתּֽ/וֹ־־׃
translation:
  text: And he brought the letter to the king of Israel, saying, “And now, when this
    letter comes to you, behold, I have sent Naaman my servant to you, so that you
    may gather him in from his skin disease.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “cure him of his leprosy.” The Hebrew literally says “gather him in from
      his skin disease,” using an unusual expression for removing the affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: And he brought
  alternatives:
  - And he came with
  - And he delivered
  lexicon: HALOT
  rationale: The Hiphil of בוא here takes 'the letter' as its object, so 'brought'
    best reflects the causative sense in idiomatic English. 'Delivered' is possible
    but slightly more interpretive.
- source_word: הַסֵּפֶר
  chosen: the letter
  alternatives:
  - the document
  - the scroll
  lexicon: HALOT
  rationale: In this diplomatic context, סֵפֶר refers to a written communication sent
    from one king to another. 'Letter' is the most natural modern equivalent.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - which said
  - with these words
  lexicon: HALOT
  rationale: Standard introductory formula for quoted speech; 'saying' preserves the
    Hebrew structure without awkwardness.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  - So now
  lexicon: HALOT
  rationale: Retains the discourse marker and the formal tone of royal correspondence.
- source_word: כְּבוֹא ... אֵלֶיךָ
  chosen: when this letter comes to you
  alternatives:
  - upon the coming of this letter to you
  - when this letter arrives to you
  lexicon: HALOT
  rationale: The infinitive construct with כ expresses temporal sense. 'When this
    letter comes to you' is clear and close to the Hebrew.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: Preserves the formal, attention-directing force of the Hebrew particle
    in a royal message. Though somewhat elevated, it remains readable here.
- source_word: שָׁלַחְתִּי
  chosen: I have sent
  alternatives:
  - I sent
  lexicon: HALOT
  rationale: 'The perfect can be rendered as a present-result perfect in English in
    epistolary context: the sender has dispatched Naaman and the recipient is now
    receiving the message.'
- source_word: נַעֲמָן
  chosen: Naaman
  rationale: Personal names are transliterated by standard convention.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  - my officer
  lexicon: HALOT
  rationale: Although עבד can denote a slave or servant, in royal court language it
    commonly refers to an official subordinate. 'My servant' preserves the source
    term without over-specifying status; 'my officer' would be too interpretive.
- source_word: וַאֲסַפְתּוֹ
  chosen: so that you may gather him in
  alternatives:
  - and you shall recover him
  - and you shall cure him
  - and you shall remove him
  lexicon: HALOT
  rationale: The verb אסף normally means 'gather, collect, take in.' In this context
    it is an unusual idiom with מן + disease. Rather than flattening it to 'cure'
    in the main text, the translation preserves the concrete imagery while signaling
    purpose with 'so that you may.' A lexical alternative is worth preserving in a
    footnote because many translations render the sense as healing.
- source_word: מִצָּרַעְתּוֹ
  chosen: from his skin disease
  alternatives:
  - from his leprosy
  - from his defiling skin condition
  lexicon: HALOT
  rationale: צָרַעַת in the Hebrew Bible does not map neatly onto modern Hansen's
    disease. 'Skin disease' avoids misleading medical specificity while preserving
    the affliction's nature. 'Leprosy' is traditional and worth preserving in a footnote.
