theological_decisions:
- issue: Rendering of צָרַעַת
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  rationale: This is not a doctrinally contested term in the excerpt, but it carries
    interpretive weight. The Hebrew term covers a broader range than modern leprosy,
    so the main text avoids anachronistic precision while preserving the traditional
    rendering in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
