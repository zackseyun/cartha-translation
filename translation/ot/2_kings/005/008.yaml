theological_decisions:
- issue: Prophetic title and theological force of אִישׁ הָאֱלֹהִים
  chosen_reading: Rendered as 'the man of God' as an established prophetic designation.
  alternative_readings:
  - the godly man
  - the man belonging to God
  rationale: The phrase is not merely descriptive of piety but functions as a title
    marking Elisha's role as God's prophetic representative. The chosen rendering
    preserves that theological and literary function without paraphrase.
  doctrine_reference: 'Translation philosophy: preserve source meaning; readable modern
    English.'
