id: 2KI.5.8
reference: 2 Kings 5:8
source:
  edition: WLC
  text: וַ/יְהִ֞י כִּ/שְׁמֹ֣עַ אֱלִישָׁ֣ע אִישׁ הָ/אֱלֹהִ֗ים כִּֽי קָרַ֤ע מֶֽלֶךְ
    יִשְׂרָאֵל֙ אֶת בְּגָדָ֔י/ו וַ/יִּשְׁלַח֙ אֶל הַ/מֶּ֣לֶךְ לֵ/אמֹ֔ר לָ֥/מָּה קָרַ֖עְתָּ
    בְּגָדֶ֑י/ךָ יָבֹֽא נָ֣א אֵלַ֔/י וְ/יֵדַ֕ע כִּ֛י יֵ֥שׁ נָבִ֖יא בְּ/יִשְׂרָאֵֽל׀־־־־־־׃
translation:
  text: Now when Elisha, the man of God, heard that the king of Israel had torn his
    clothes, he sent to the king, saying, “Why have you torn your clothes? Please
    let him come to me, and he will know that there is a prophet in Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tore his garments.' The Hebrew refers to the customary act of tearing
      one's clothing as a sign of distress or mourning.
    reason: lexical_alternative
  - marker: b
    text: '''Please let him come to me'' refers to Naaman, not the king of Israel.'
    reason: cross_reference
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: Now when ... heard
  alternatives:
  - And it happened when ... heard
  - When ... heard
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. In modern English,
    'Now when ... heard' preserves the temporal transition without sounding wooden,
    while still reflecting the waw-consecutive plus infinitive construct structure.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the godly man
  - the man belonging to God
  lexicon: HALOT
  rationale: This is a recognized prophetic title in the Hebrew Bible. 'The man of
    God' is the most transparent and established rendering, preserving both lexical
    form and prophetic force.
- source_word: קָרַע ... אֶת בְּגָדָיו
  chosen: had torn his clothes
  alternatives:
  - tore his garments
  - had ripped his clothes
  lexicon: HALOT
  rationale: קָרַע means 'tear/rend.' 'Had torn his clothes' fits the prior action
    relative to Elisha's hearing and uses accessible modern English. 'Garments' is
    possible but 'clothes' is more natural while retaining the mourning/distress gesture.
- source_word: וַיִּשְׁלַח אֶל הַמֶּלֶךְ
  chosen: he sent to the king
  alternatives:
  - he sent word to the king
  - he sent a messenger to the king
  lexicon: HALOT
  rationale: The Hebrew states simply that he 'sent to the king,' with the message
    supplied by לֵאמֹר. English idiom can support 'sent to the king' without adding
    an explicit object not present in the text. The content of the message follows
    directly.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with this message
  - to say
  lexicon: HALOT
  rationale: Standard rendering for introducing direct speech; concise and formally
    close.
- source_word: לָמָּה קָרַעְתָּ בְּגָדֶיךָ
  chosen: Why have you torn your clothes?
  alternatives:
  - Why did you tear your clothes?
  - Why have you torn your garments?
  lexicon: HALOT
  rationale: The direct question is preserved straightforwardly. Present perfect in
    English fits the recent action with present relevance. 'Clothes' remains consistent
    with the earlier rendering of בְּגָדִים.
- source_word: יָבֹא נָא אֵלַי
  chosen: Please let him come to me
  alternatives:
  - Let him come to me, please
  - Please have him come to me
  lexicon: HALOT
  rationale: נָא adds a particle of entreaty/politeness. Because the verb is third
    person singular ('let him come'), the English should preserve that Elisha is speaking
    about Naaman, not directly to the king as the one coming.
- source_word: וְיֵדַע
  chosen: and he will know
  alternatives:
  - so that he may know
  - and let him know
  lexicon: HALOT
  rationale: The imperfect here expresses expected result. 'And he will know' is natural
    and preserves the sense of consequence without over-specifying purpose.
- source_word: כִּי יֵשׁ נָבִיא בְּיִשְׂרָאֵל
  chosen: that there is a prophet in Israel
  alternatives:
  - that a prophet is in Israel
  - that Israel has a prophet
  lexicon: HALOT
  rationale: יֵשׁ marks existence. 'There is a prophet in Israel' is the clearest
    English equivalent and preserves the emphasis that Israel truly has a prophetic
    representative of God.
