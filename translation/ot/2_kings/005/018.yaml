theological_decisions:
- issue: Whether הִשְׁתַּחֲוָה should be rendered as 'worship' or the more physical
    'bow down' in a pagan temple context
  chosen_reading: bow down
  alternative_readings:
  - worship
  - prostrate oneself
  rationale: The Hebrew verb can denote either worship or the bodily act of prostration.
    Here Naaman is asking pardon for the external act required by his office while
    accompanying his master into Rimmon's shrine. Rendering it 'bow down' preserves
    the narrative and theological tension without deciding more than the text states
    about Naaman's inward allegiance.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
