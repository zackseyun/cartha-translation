id: 2KI.5.18
reference: 2 Kings 5:18
source:
  edition: WLC
  text: לַ/דָּבָ֣ר הַ/זֶּ֔ה יִסְלַ֥ח יְהוָ֖ה לְ/עַבְדֶּ֑/ךָ בְּ/ב֣וֹא אֲדֹנִ֣/י בֵית
    רִמּוֹן֩ לְ/הִשְׁתַּחֲוֺ֨ת שָׁ֜מָּ/ה וְ/ה֣וּא נִשְׁעָ֣ן עַל יָדִ֗/י וְ/הִֽשְׁתַּחֲוֵ֨יתִי֙
    בֵּ֣ית רִמֹּ֔ן בְּ/הִשְׁתַּחֲוָיָ֨תִ/י֙ בֵּ֣ית רִמֹּ֔ן יִסְלַח נא יְהוָ֥ה לְ/עַבְדְּ/ךָ֖
    בַּ/דָּבָ֥ר הַ/זֶּֽה־׀־־׃
translation:
  text: 'In this matter, may the LORD pardon your servant: when my master goes into
    the house of Rimmon to bow down there, and he is leaning on my hand, so that I
    also bow down in the house of Rimmon—when I bow down in the house of Rimmon, may
    the LORD please pardon your servant in this matter.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to worship there'; the Hebrew verb can denote both the bodily act of
      bowing and the act of worship.
    reason: lexical_alternative
  - marker: b
    text: '''House of Rimmon'' refers to the temple or shrine of the Syrian god Rimmon.'
    reason: cultural_note
lexical_decisions:
- source_word: יִסְלַח
  chosen: may ... pardon
  alternatives:
  - forgive
  lexicon: HALOT
  rationale: The jussive/request sense fits Naaman's plea. 'Pardon' suits a request
    for divine forgiveness in a specific matter and reads naturally in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render as 'the LORD' rather
    than transliterating the Tetragrammaton.
- source_word: לְעַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: In this courtly self-reference, 'servant' is the natural English equivalent;
    the bonded nature of 'slave' is not foregrounded here.
- source_word: בְּבוֹא אֲדֹנִי
  chosen: when my master goes
  alternatives:
  - in my master's going
  - when my lord goes
  lexicon: HALOT
  rationale: The infinitive construct with ב marks temporal circumstance. 'My master'
    best reflects Naaman's reference to the king he serves, avoiding confusion with
    divine 'Lord'.
- source_word: בֵית רִמּוֹן
  chosen: the house of Rimmon
  alternatives:
  - the temple of Rimmon
  lexicon: HALOT
  rationale: Literally 'house of Rimmon.' 'House' preserves the Hebrew wording while
    still clearly denoting a shrine/temple context.
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to bow down
  alternatives:
  - to worship
  - to prostrate himself
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration. 'Bow down' preserves the physical
    act without over-interpreting whether Naaman's own act is inward worship or compelled
    court protocol.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the natural equivalent.
- source_word: נִשְׁעָן עַל יָדִי
  chosen: he is leaning on my hand
  alternatives:
  - he leans on my arm
  lexicon: HALOT
  rationale: The participle expresses attendant circumstance. 'Hand' is more literal
    than 'arm,' though English readers will understand the supportive gesture.
- source_word: וְהִשְׁתַּחֲוֵיתִי
  chosen: so that I also bow down
  alternatives:
  - and I bow myself
  - and I prostrate myself
  lexicon: HALOT
  rationale: The waw plus perfect here continues the scenario/result of supporting
    his master. 'Also' makes explicit Naaman's participation by necessity, implied
    by context.
- source_word: בְּהִשְׁתַּחֲוָיָתִי
  chosen: when I bow down
  alternatives:
  - in my bowing down
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב resumes and emphasizes the specific
    act under discussion. 'When I bow down' is idiomatic and preserves the temporal
    nuance.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  lexicon: HALOT
  rationale: Polite particle intensifying the plea; 'please' is clear modern English.
