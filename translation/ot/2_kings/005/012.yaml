id: 2KI.5.12
reference: 2 Kings 5:12
source:
  edition: WLC
  text: הֲ/לֹ֡א טוֹב֩ אבנה וּ/פַרְפַּ֜ר נַהֲר֣וֹת דַּמֶּ֗שֶׂק מִ/כֹּל֙ מֵימֵ֣י יִשְׂרָאֵ֔ל
    הֲ/לֹֽא אֶרְחַ֥ץ בָּ/הֶ֖ם וְ/טָהָ֑רְתִּי וַ/יִּ֖פֶן וַ/יֵּ֥לֶךְ בְּ/חֵמָֽה־׃
translation:
  text: Are not Abanah and Pharpar, the rivers of Damascus, better than all the waters
    of Israel? Could I not wash in them and be clean?” So he turned and went away
    in a rage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abanah is rendered by some as 'Amana,' following an alternative traditional
      form of the river's name.
    reason: alternative_reading
  - marker: b
    text: Or 'and become clean' / 'and be purified'; the Hebrew can express both physical
      cleansing and a broader notion of cleanness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Are not / Could I not
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: Used as an interrogative particle expecting an affirmative answer. Rendered
    idiomatically in English with two corresponding rhetorical questions.
- source_word: טוֹב
  chosen: better
  alternatives:
  - good
  - superior
  lexicon: HALOT
  rationale: In the comparative construction with מִכֹּל ('than all'), English requires
    the comparative 'better' rather than the bare adjective 'good'.
- source_word: אבנה
  chosen: Abanah
  alternatives:
  - Amana
  lexicon: HALOT
  rationale: Transliterated as a personal/geographical name according to the Hebrew
    form in the MT. An alternative traditional identification/rendering 'Amana' is
    worth preserving in a footnote.
- source_word: וּפַרְפַּר
  chosen: Pharpar
  alternatives:
  - Parpar
  lexicon: HALOT
  rationale: Transliterated from the Hebrew proper name. English tradition commonly
    has 'Pharpar'; the simpler transliteration 'Parpar' is possible but less familiar.
- source_word: נַהֲרוֹת דַּמֶּשֶׂק
  chosen: the rivers of Damascus
  alternatives:
  - Damascus's rivers
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English while preserving the genitival
    relationship.
- source_word: מִכֹּל מֵימֵי יִשְׂרָאֵל
  chosen: than all the waters of Israel
  alternatives:
  - than any of the waters of Israel
  lexicon: HALOT
  rationale: Keeps the Hebrew totalizing expression 'all the waters of Israel.' 'Waters'
    is retained rather than specifying 'rivers,' since the Hebrew uses a broader term.
- source_word: אֶרְחַץ
  chosen: wash
  alternatives:
  - bathe
  lexicon: HALOT
  rationale: The verb רחץ commonly means to wash/bathe. 'Wash' fits the immediate
    context and echoes Elisha's earlier instruction.
- source_word: בָּהֶם
  chosen: in them
  alternatives:
  - in those rivers
  lexicon: HALOT
  rationale: A straightforward pronominal rendering that refers back to the two named
    rivers without unnecessary expansion.
- source_word: וְטָהָרְתִּי
  chosen: and be clean
  alternatives:
  - and become clean
  - and be purified
  lexicon: HALOT
  rationale: Although formally first person ('and I would be clean/cleansed'), idiomatic
    English after 'Could I not' is 'and be clean.' 'Clean' preserves the physical/ritual
    overlap without over-theologizing as 'purified.'
- source_word: וַיִּפֶן
  chosen: he turned
  alternatives:
  - he turned away
  lexicon: HALOT
  rationale: Rendered with the simple motion verb; the following 'went away' supplies
    the fuller sense of departure.
- source_word: וַיֵּלֶךְ
  chosen: went away
  alternatives:
  - went off
  - left
  lexicon: HALOT
  rationale: Combined with the previous verb to convey Naaman's departure in natural
    English.
- source_word: בְּחֵמָה
  chosen: in a rage
  alternatives:
  - in wrath
  - furiously
  - in anger
  lexicon: HALOT
  rationale: Conveys intense anger in readable modern English. 'Rage' better captures
    the force of חֵמָה than the milder 'anger.'
