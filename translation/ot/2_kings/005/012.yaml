theological_decisions:
- issue: Nature of cleansing language
  chosen_reading: be clean
  alternative_readings:
  - be purified
  - be cleansed
  rationale: The context is Naaman's skin disease and Elisha's instruction to wash;
    the Hebrew can carry both physical and ritual overtones. 'Be clean' preserves
    that overlap without importing a more explicitly cultic or theological sense than
    the verse itself states.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
