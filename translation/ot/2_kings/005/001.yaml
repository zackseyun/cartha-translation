id: 2KI.5.1
reference: 2 Kings 5:1
source:
  edition: WLC
  text: וְ֠/נַעֲמָן שַׂר צְבָ֨א מֶֽלֶךְ אֲרָ֜ם הָיָ֣ה אִישׁ֩ גָּד֨וֹל לִ/פְנֵ֤י אֲדֹנָי/ו֙
    וּ/נְשֻׂ֣א פָנִ֔ים כִּֽי ב֛/וֹ נָֽתַן יְהוָ֥ה תְּשׁוּעָ֖ה לַ/אֲרָ֑ם וְ/הָ/אִ֗ישׁ
    הָיָ֛ה גִּבּ֥וֹר חַ֖יִל מְצֹרָֽע־־־־׃
translation:
  text: Now Naaman, commander of the army of the king of Aram, was a great man before
    his master and highly esteemed, because through him the LORD had given victory
    to Aram. The man was a mighty warrior, but he was leprous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliverance' or 'salvation' for 'victory'; the Hebrew term can carry
      a broader sense, but here it refers to military success.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'leprous.' The term refers to a serious skin affliction in the ancient
      context and may not correspond exactly to modern clinical leprosy.
    reason: cultural_note
  - marker: c
    text: Traditionally 'Syria'; Hebrew 'Aram.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנַעֲמָן
  chosen: Now Naaman
  alternatives:
  - And Naaman
  lexicon: HALOT
  rationale: The conjunction ו introduces the new episode. 'Now' is natural English
    discourse marking, while preserving the narrative transition. The personal name
    is transliterated per translation philosophy.
- source_word: שַׂר צְבָא
  chosen: commander of the army
  alternatives:
  - captain of the host
  - army commander
  lexicon: HALOT
  rationale: שַׂר denotes a ruler/official/commander, and צָבָא here refers to the
    military force. 'Commander of the army' is clear modern English and preserves
    the military office.
- source_word: מֶלֶךְ אֲרָם
  chosen: of the king of Aram
  alternatives:
  - of the king of Syria
  lexicon: HALOT
  rationale: אֲרָם is rendered 'Aram' rather than the traditional 'Syria' because
    the Hebrew refers to the Aramean kingdom specifically; this follows original-language
    primacy over translation tradition.
- source_word: הָיָה אִישׁ גָּדוֹל
  chosen: was a great man
  alternatives:
  - was a great האיש/man
  - was an important man
  lexicon: HALOT
  rationale: אִישׁ גָּדוֹל is an idiom for social stature and significance. 'Great
    man' preserves the idiomatic force and the masculine singular form.
- source_word: לִפְנֵי אֲדֹנָיו
  chosen: before his master
  alternatives:
  - in the sight of his master
  - with his lord
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before his master'
    preserves the relational and courtly sense. 'Master' fits אֲדֹנָיו here as Naaman's
    royal superior, not a divine title.
- source_word: וּנְשֻׂא פָנִים
  chosen: highly esteemed
  alternatives:
  - held in honor
  - favored
  - lifted up in face
  lexicon: HALOT
  rationale: This idiom literally refers to being 'lifted of face,' conveying honor
    or favor. 'Highly esteemed' gives the idiomatic sense in natural English without
    wooden literalism.
- source_word: כִּי בוֹ נָתַן יְהוָה תְּשׁוּעָה לַאֲרָם
  chosen: because through him the LORD had given victory to Aram
  alternatives:
  - because by him the LORD had given deliverance to Aram
  - for through him the LORD had given salvation to Aram
  lexicon: HALOT
  rationale: תְּשׁוּעָה can mean deliverance, salvation, or victory; in this military
    context 'victory' best conveys the concrete sense. בוֹ is instrumental/mediated,
    hence 'through him.' יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering 'the LORD' per
    DOCTRINE.md.
- source_word: וְהָאִישׁ
  chosen: The man
  alternatives:
  - And the man
  - Now the man
  lexicon: HALOT
  rationale: The clause resumes focus on Naaman. 'The man' preserves the Hebrew article
    and rhetorical emphasis.
- source_word: גִּבּוֹר חַיִל
  chosen: a mighty warrior
  alternatives:
  - a mighty man of valor
  - a valiant warrior
  lexicon: HALOT
  rationale: The phrase denotes proven martial strength and valor. 'Mighty warrior'
    is idiomatic modern English and suits the military context.
- source_word: מְצֹרָע
  chosen: leprous
  alternatives:
  - had a skin disease
  - was afflicted with a skin disease
  lexicon: HALOT
  rationale: The participle denotes one afflicted with צָרַעַת. 'Leprous' preserves
    the traditional lexical link and narrative recognition, while the exact medical
    referent in the ancient context may be broader than modern Hansen's disease.
