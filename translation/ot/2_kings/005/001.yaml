theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    Jewish reverence tradition and longstanding biblical English convention while
    remaining transparent in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Depicting the LORD as granting victory to Aram, a foreign nation
  chosen_reading: because through him the LORD had given victory to Aram
  alternative_readings:
  - because through him the LORD had given deliverance to Aram
  rationale: The Hebrew explicitly attributes Aram's military success to the LORD.
    The translation preserves this theological claim without softening it, maintaining
    the text's portrayal of the LORD's sovereignty over nations beyond Israel.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
