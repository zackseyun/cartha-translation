id: 2KI.5.16
reference: 2 Kings 5:16
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר חַי יְהוָ֛ה אֲשֶׁר עָמַ֥דְתִּי לְ/פָנָ֖י/ו אִם אֶקָּ֑ח וַ/יִּפְצַר
    בּ֥/וֹ לָ/קַ֖חַת וַ/יְמָאֵֽן־־־־׃
translation:
  text: But he said, “As the LORD lives, before whom I stand, I will not take it.”
    And he urged him to take it, but he refused.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: literally, ''As the LORD lives ... if I take [it],''
      where ''if'' expresses a strong negation: ''I will certainly not take it.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'in whose presence I stand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. 'As the LORD lives' is idiomatic,
    natural English that preserves the solemn force of the oath without archaic excess.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֲשֶׁר עָמַדְתִּי לְפָנָיו
  chosen: before whom I stand
  alternatives:
  - in whose presence I stand
  - whom I serve
  lexicon: HALOT
  rationale: Literally 'before whom I have stood/stand.' 'Before whom I stand' preserves
    the courtly-prophetic idiom of ministering in God's presence without over-paraphrasing
    to 'whom I serve,' though that sense is implicit.
- source_word: אִם אֶקָּח
  chosen: I will not take it
  alternatives:
  - surely I will not take anything
  - if I take it
  lexicon: HALOT
  rationale: 'The particle אִם in oath contexts functions elliptically as a strong
    negation: ''surely not'' or ''I will not.'' English requires the implied negation
    to be made explicit. ''It'' is supplied from context, referring to Naaman''s gift.'
- source_word: וַיִּפְצַר בּוֹ
  chosen: he urged him
  alternatives:
  - he pressed him
  - he entreated him strongly
  lexicon: HALOT
  rationale: פצר conveys strong urging or pressing. 'He urged him' is clear modern
    English and fits the narrative flow.
- source_word: לָקַחַת
  chosen: to take it
  alternatives:
  - to accept it
  - to take
  lexicon: HALOT
  rationale: The infinitive complements 'urged him.' 'Take it' keeps the verbal link
    with לקח earlier in the verse and makes the object explicit in English from context.
- source_word: וַיְמָאֵן
  chosen: he refused
  alternatives:
  - he was unwilling
  - he declined
  lexicon: HALOT
  rationale: מאן denotes refusal. 'He refused' is the most direct and natural rendering
    in context.
