id: 2KI.5.7
reference: 2 Kings 5:7
source:
  edition: WLC
  text: וַ/יְהִ֡י כִּ/קְרֹא֩ מֶֽלֶךְ יִשְׂרָאֵ֨ל אֶת הַ/סֵּ֜פֶר וַ/יִּקְרַ֣ע בְּגָדָ֗י/ו
    וַ/יֹּ֨אמֶר֙ הַ/אֱלֹהִ֥ים אָ֨נִי֙ לְ/הָמִ֣ית וּֽ/לְ/הַחֲי֔וֹת כִּֽי זֶה֙ שֹׁלֵ֣חַ
    אֵלַ֔/י לֶ/אֱסֹ֥ף אִ֖ישׁ מִ/צָּֽרַעְתּ֑/וֹ כִּ֤י אַךְ דְּעֽוּ נָא֙ וּ/רְא֔וּ כִּֽי
    מִתְאַנֶּ֥ה ה֖וּא לִֽ/י־־־־־־׃
translation:
  text: And when the king of Israel read the letter, he tore his clothes and said,
    “Am I God, to put to death and to make alive, that this man sends word to me to
    cure a man of his leprosy? Only take note, please, and see how he is seeking a
    quarrel with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צָרַעַת can refer more broadly to a serious skin disease, not necessarily
      Hansen’s disease specifically.
    reason: lexical_alternative
  - marker: b
    text: Or “he is seeking an occasion against me” / “he is looking for a pretext
      against me.”
    reason: alternative_reading
lexical_decisions:
- source_word: הַסֵּפֶר
  chosen: the letter
  alternatives:
  - the document
  - the scroll
  lexicon: HALOT
  rationale: In this narrative context, סֵפֶר refers to the written communication
    sent by the king of Aram, best rendered 'letter' in natural English rather than
    the broader 'book/document.'
- source_word: וַיִּקְרַע בְּגָדָיו
  chosen: he tore his clothes
  alternatives:
  - he tore his garments
  lexicon: HALOT
  rationale: This is the standard idiom of distress or alarm. 'Clothes' is more readable
    modern English than 'garments' while preserving the action literally.
- source_word: הַאֱלֹהִים אָנִי
  chosen: Am I God
  alternatives:
  - Am I a god
  lexicon: HALOT
  rationale: The king speaks in Israelite theological context, contrasting himself
    with the true God who alone has power over life and death. English idiom favors
    'Am I God' here.
- source_word: לְהָמִית וּלְהַחֲיוֹת
  chosen: to put to death and to make alive
  alternatives:
  - to kill and to make alive
  - to kill and to give life
  lexicon: HALOT
  rationale: This pair echoes divine prerogative language. 'Put to death and make
    alive' preserves the formal balance and gravity better than the more colloquial
    'kill and give life.'
- source_word: שֹׁלֵחַ אֵלַי
  chosen: sends word to me
  alternatives:
  - sends to me
  - is sending to me
  lexicon: HALOT
  rationale: Given the object is a letter already mentioned, English naturally expresses
    the sense as 'sends word to me,' making explicit the communicative act without
    adding content beyond the context.
- source_word: לֶאֱסֹף אִישׁ מִצָּרַעְתּוֹ
  chosen: to cure a man of his leprosy
  alternatives:
  - to gather in a man from his skin disease
  - to recover a man from his leprosy
  - to heal a man of his skin disease
  lexicon: HALOT
  rationale: אָסַף with מן + condition idiomatically means remove/recover from a condition.
    In Naaman's case, the referent is the disease traditionally rendered 'leprosy.'
    'Cure ... of his leprosy' communicates the idiomatic sense clearly.
- source_word: צָּרַעַת
  chosen: leprosy
  alternatives:
  - skin disease
  lexicon: HALOT
  rationale: Traditional 'leprosy' is retained because it is the established narrative
    term in English and fits the immediate context of Naaman. However, the Hebrew
    term can denote a broader range of serious skin conditions, so the alternative
    is preserved in a footnote.
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Indeed
  - Just
  lexicon: HALOT
  rationale: 'Here אַךְ marks an emphatic narrowing of attention: the king urges his
    attendants to notice the real motive. ''Only'' captures that discourse function
    well.'
- source_word: דְּעוּ נָא וּרְאוּ
  chosen: take note, please, and see
  alternatives:
  - know, please, and see
  - consider, please, and see
  lexicon: HALOT
  rationale: The imperative pair calls for careful recognition. 'Take note ... and
    see' is idiomatic modern English that preserves the force of the two verbs.
- source_word: מִתְאַנֶּה
  chosen: seeking a quarrel
  alternatives:
  - picking a fight
  - looking for a pretext
  - seeking an occasion
  lexicon: HALOT
  rationale: The Hitpael here conveys provoking or seeking an occasion against someone.
    'Seeking a quarrel' is natural, suitably formal, and fits the king's suspicion
    of hostile intent.
- source_word: לִי
  chosen: with me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: English idiom with 'quarrel' takes 'with me.' The underlying sense is
    adversative, and 'against me' is preserved as an alternative nuance in the footnote.
