theological_decisions:
- issue: Rendering of הָאֱלֹהִים in the king's rhetorical question
  chosen_reading: Am I God
  alternative_readings:
  - Am I a god
  rationale: Within Israel's covenantal narrative, the king invokes the unique divine
    prerogative over life and death rather than speaking generically of deity. This
    avoids weakening the monotheistic force of the statement while not importing claims
    beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Rendering of צָּרַעַת
  chosen_reading: leprosy
  alternative_readings:
  - skin disease
  rationale: The traditional rendering is retained for readability and continuity
    in this well-known narrative, but the broader semantic range of the Hebrew term
    is preserved in a footnote to avoid overstating medical specificity.
  doctrine_reference: Translation philosophy §1, §5
