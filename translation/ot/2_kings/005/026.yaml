theological_decisions:
- issue: Rendering of social-status terms עֲבָדִים וּשְׁפָחוֹת
  chosen_reading: male servants and female servants
  alternative_readings:
  - male slaves and female slaves
  rationale: Per translation philosophy, terms in the semantic range of bonded service
    may be rendered 'servant' or 'slave' context-dependently. Here the passage is
    a prophetic rebuke listing wealth and acquisitions; preserving the gendered pair
    is more important than foregrounding the institution's bonded nature. The alternative
    is noted for auditability.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent);
    principle applied analogically to Hebrew service terms.'
