id: 2KI.5.26
reference: 2 Kings 5:26
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ לֹא לִבִּ֣/י הָלַ֔ךְ כַּ/אֲשֶׁ֧ר הָֽפַךְ אִ֛ישׁ מֵ/עַ֥ל
    מֶרְכַּבְתּ֖/וֹ לִ/קְרָאתֶ֑/ךָ הַ/עֵ֞ת לָ/קַ֤חַת אֶת הַ/כֶּ֨סֶף֙ וְ/לָ/קַ֣חַת
    בְּגָדִ֔ים וְ/זֵיתִ֤ים וּ/כְרָמִים֙ וְ/צֹ֣אן וּ/בָקָ֔ר וַ/עֲבָדִ֖ים וּ/שְׁפָחֽוֹת־־־׃
translation:
  text: But he said to him, “Did not my heart go when the man turned from his chariot
    to meet you? Is this the time to take silver, and to take garments, and olive
    groves and vineyards, and sheep and cattle, and male servants and female servants?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “Was I not there in spirit when the man turned
      from his chariot to meet you?”
    reason: lexical_alternative
  - marker: b
    text: Or “male slaves and female slaves.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי הָלַךְ
  chosen: my heart go
  alternatives:
  - I was there in spirit
  - my mind went
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom expressing Elisha's
    inward awareness/presence without over-paraphrasing. 'My heart' is retained rather
    than smoothing to 'I' so the vividness of the source remains.
- source_word: כַּאֲשֶׁר הָפַךְ אִישׁ מֵעַל מֶרְכַּבְתּוֹ לִקְרָאתֶךָ
  chosen: when the man turned from his chariot to meet you
  alternatives:
  - when a man got down from his chariot to meet you
  - when he turned back from his chariot to meet you
  lexicon: HALOT
  rationale: הָפַךְ basically means 'turn/turn about.' In context Naaman descends/turns
    from his chariot to meet Gehazi. 'Turned from his chariot' stays close to the
    Hebrew while remaining intelligible. 'The man' reflects אִישׁ as an indefinite/specific
    reference, likely to Naaman, without importing the name into the text.
- source_word: הָעֵת
  chosen: Is this the time
  alternatives:
  - Is it a time
  - Was it the time
  lexicon: HALOT
  rationale: The interrogative force is idiomatic in context though no explicit interrogative
    particle appears; English naturally supplies it. 'Is this the time' captures Elisha's
    rebuke that the moment is inappropriate for gain.
- source_word: לָקַחַת אֶת־הַכֶּסֶף
  chosen: to take silver
  alternatives:
  - to accept money
  - to take the silver
  lexicon: HALOT
  rationale: כֶּסֶף is literally 'silver,' often functioning as money. 'Silver' preserves
    the lexical form and avoids over-interpretation, while still being understandable
    as wealth/payment.
- source_word: בְּגָדִים
  chosen: garments
  alternatives:
  - clothes
  - changes of clothes
  lexicon: HALOT
  rationale: '''Garments'' is a natural but slightly elevated term that fits the list
    of valuables and remains closer to the Hebrew than the more colloquial ''clothes.'''
- source_word: זֵיתִים
  chosen: olive groves
  alternatives:
  - olive trees
  - olives
  lexicon: HALOT
  rationale: In a list with vineyards, flocks, and servants, the sense is productive
    property rather than harvested fruit. 'Olive groves' best conveys landed wealth
    in idiomatic English.
- source_word: כְרָמִים
  chosen: vineyards
  alternatives:
  - vineyards/fields of vines
  lexicon: HALOT
  rationale: Standard rendering for agricultural property; pairs naturally with 'olive
    groves.'
- source_word: צֹאן וּבָקָר
  chosen: sheep and cattle
  alternatives:
  - flocks and herds
  lexicon: HALOT
  rationale: A direct rendering preserves the concrete nouns rather than summarizing
    them.
- source_word: עֲבָדִים וּשְׁפָחוֹת
  chosen: male servants and female servants
  alternatives:
  - servants and maidservants
  - male slaves and female slaves
  lexicon: HALOT
  rationale: Gender distinction is explicit in the Hebrew and should be preserved.
    'Servants' is preferred here because the verse lists household dependents/property
    in a broad social register, and the bonded nature is not the central theological
    point; the more literal 'slaves' is preserved as an alternative.
