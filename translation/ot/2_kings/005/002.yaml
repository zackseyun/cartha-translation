id: 2KI.5.2
reference: 2 Kings 5:2
source:
  edition: WLC
  text: וַ/אֲרָם֙ יָצְא֣וּ גְדוּדִ֔ים וַ/יִּשְׁבּ֛וּ מֵ/אֶ֥רֶץ יִשְׂרָאֵ֖ל נַעֲרָ֣ה
    קְטַנָּ֑ה וַ/תְּהִ֕י לִ/פְנֵ֖י אֵ֥שֶׁת נַעֲמָֽן׃
translation:
  text: Now bands of Arameans had gone out and taken captive from the land of Israel
    a small girl, and she served Naaman’s wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a little girl.' The Hebrew phrase נַעֲרָה קְטַנָּה emphasizes her youth
      and smallness.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and she was before Naaman’s wife,' that is, she attended or
      served her.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲרָם
  chosen: Now bands of Arameans
  alternatives:
  - Now Aram
  lexicon: HALOT
  rationale: The conjunction plus proper noun introduces the subject of the clause.
    Although formally 'and Aram,' the sense here is the people/forces of Aram, not
    the territory itself. Rendering with 'Arameans' makes explicit the human agents
    implied by the following plural verb.
- source_word: יָצְאוּ
  chosen: had gone out
  alternatives:
  - went out
  - came out
  lexicon: HALOT
  rationale: 'The perfect with the following wayyiqtol can be represented in English
    as a prior/background action. ''Had gone out'' gives natural narrative sequence:
    raiding bands had gone out and then took captive.'
- source_word: גְדוּדִים
  chosen: bands
  alternatives:
  - raiding bands
  - troops
  - marauding bands
  lexicon: HALOT
  rationale: The noun denotes military bands or raiding parties. 'Bands' is concise
    and natural; the raiding sense is already conveyed by the context of taking captives.
- source_word: וַיִּשְׁבּוּ
  chosen: taken captive
  alternatives:
  - captured
  - carried off as captive
  lexicon: HALOT
  rationale: The verb specifically denotes taking captives, not merely seizing. 'Taken
    captive' preserves that nuance clearly in modern English.
- source_word: מֵאֶרֶץ יִשְׂרָאֵל
  chosen: from the land of Israel
  alternatives:
  - from Israel
  lexicon: HALOT
  rationale: Retaining 'the land of Israel' reflects the Hebrew expression and keeps
    the geographic sense explicit.
- source_word: נַעֲרָה קְטַנָּה
  chosen: a small girl
  alternatives:
  - a little girl
  - a young girl
  - a young servant girl
  lexicon: HALOT
  rationale: The phrase denotes a girl who is both young and socially insignificant/small.
    'Small girl' preserves the adjective's plain sense without importing servant status
    into the noun phrase itself.
- source_word: וַתְּהִי לִפְנֵי
  chosen: and she served
  alternatives:
  - and she was before
  - and she attended
  lexicon: HALOT
  rationale: Literally 'and she was before' Naaman's wife, an idiom for being in attendance/service.
    'She served' communicates the functional sense in idiomatic English.
- source_word: אֵשֶׁת נַעֲמָן
  chosen: Naaman’s wife
  alternatives:
  - the wife of Naaman
  lexicon: HALOT
  rationale: Standard English possessive is the most natural rendering and preserves
    the construct relationship.
