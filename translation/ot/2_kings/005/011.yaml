theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צָרַעַת-related language
  chosen_reading: leprous skin disease
  alternative_readings:
  - leprosy
  - skin disease
  rationale: To avoid importing a specific modern medical diagnosis while preserving the traditional semantic field, the translation uses 'leprous skin disease.' This is a lexical-theological caution rather than a doctrinal dispute.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
revisions:
- timestamp: '2026-04-21T19:57:00Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/weighted_vocab/ot/2_kings/005/011.job-11399.json
  category: awkward_english
  tier: 1
  from: gather in the leprous skin disease
  to: remove the leprous skin disease
  rationale: The verb אסף (ʾāsap̄) can mean 'gather,' but in contexts where the object is a negative condition (like a disease or reproach), it commonly means 'remove' or 'take away.' The current rendering 'gather in' is unidiomatic when paired with 'skin disease' and creates an awkward phrase that may confuse the reader. Using 'remove' is a valid lexical choice that is much more natural in English and clearly conveys the intended meaning of healing without resorting to a paraphrase like 'cure'.
