id: 2KI.5.11
reference: 2 Kings 5:11
source:
  edition: WLC
  text: וַ/יִּקְצֹ֥ף נַעֲמָ֖ן וַ/יֵּלַ֑ךְ וַ/יֹּאמֶר֩ הִנֵּ֨ה אָמַ֜רְתִּי אֵלַ֣/י יֵצֵ֣א יָצ֗וֹא וְ/עָמַד֙ וְ/קָרָא֙ בְּ/שֵׁם יְהוָ֣ה אֱלֹהָ֔י/ו וְ/הֵנִ֥יף יָד֛/וֹ אֶל הַ/מָּק֖וֹם וְ/אָסַ֥ף הַ/מְּצֹרָֽע׀־־׃
translation:
  text: But Naaman became angry and went away, and he said, “Look, I said to myself, ‘Surely he will come out to me and stand and call on the name of the LORD his God, and wave his hand over the place and remove the leprous skin disease.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “and cure the leprosy” or “and heal the leper.” The Hebrew verb literally means “gather in/remove,” and the final term refers to a leprous condition or the one afflicted by it.
    reason: lexical_alternative
  - marker: b
    text: Or 'gather in the leprous skin disease'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקְצֹף
  chosen: became angry
  alternatives:
  - was furious
  - was enraged
  lexicon: HALOT
  rationale: The verb קצף denotes anger/wrath. 'Became angry' is natural modern English and preserves the ingressive sense of the wayyiqtol in context without overstating intensity.
- source_word: וַיֵּלַךְ
  chosen: went away
  alternatives:
  - went
  - left
  lexicon: HALOT
  rationale: הלך here follows Naaman's anger and conveys departure from Elisha's house. 'Went away' captures the dismissive departure better than the bare 'went.'
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic direct speech. 'Look' preserves the discourse force in readable modern English; 'Behold' would sound archaic.
- source_word: אָמַרְתִּי אֵלַי
  chosen: I said to myself
  alternatives:
  - I thought
  - I said within myself
  lexicon: HALOT
  rationale: The idiom literally means 'I said to myself.' This is more transparent to the Hebrew than the smoother but more interpretive 'I thought.'
- source_word: יֵצֵא יָצוֹא
  chosen: Surely he will come out
  alternatives:
  - He will certainly come out
  - He will indeed come out
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Surely he will come out' conveys the emphatic expectation idiomatically.
- source_word: וְעָמַד
  chosen: stand
  alternatives:
  - take his stand
  lexicon: HALOT
  rationale: Simple sequential action in Naaman's expectation. 'Stand' is sufficient and idiomatic in the quoted sequence.
- source_word: וְקָרָא בְּשֵׁם יְהוָה אֱלֹהָיו
  chosen: call on the name of the LORD his God
  alternatives:
  - invoke the name of the LORD his God
  lexicon: HALOT
  rationale: The idiom קרא בשם commonly means to invoke/call on a deity. 'Call on the name of' preserves the biblical idiom while remaining clear. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering for יְהוָה.
- source_word: וְהֵנִיף יָדוֹ
  chosen: wave his hand
  alternatives:
  - move his hand back and forth
  - raise his hand
  lexicon: HALOT
  rationale: הניף often denotes a waving motion. In this healing-ritual expectation, 'wave his hand' best reflects Naaman's imagined dramatic gesture; 'raise his hand' is too weak.
- source_word: אֶל הַמָּקוֹם
  chosen: over the place
  alternatives:
  - toward the place
  - over the spot
  lexicon: HALOT
  rationale: Given the expected healing gesture, English idiom favors 'over the place' rather than the more spatially neutral 'toward the place.' 'Place' is retained over 'spot' for slightly more formal narrative tone.
- source_word: וְאָסַף
  chosen: gather in
  alternatives:
  - remove
  - take away
  - heal
  lexicon: HALOT
  rationale: The verb אסף basically means gather, take in, remove. Here it refers to the removal of the affliction. To avoid paraphrasing directly as 'heal,' the rendering keeps the underlying imagery with 'gather in,' though the object must then be expressed carefully.
- source_word: הַמְּצֹרָע
  chosen: the leprous skin disease
  alternatives:
  - the leper
  - the leprosy
  - the skin disease
  lexicon: HALOT
  rationale: The form is a substantivized participle/adjectival term from צרע, literally 'the leprous one/thing.' Since Naaman expects the diseased condition to be removed from the affected place, rendering it as the condition rather than the person fits the syntax better. 'Leprosy' is traditional but potentially misleading medically; 'leprous skin disease' preserves the biblical category without implying Hansen's disease.
