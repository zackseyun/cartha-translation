id: 2KI.5.4
reference: 2 Kings 5:4
source:
  edition: WLC
  text: וַ/יָּבֹ֕א וַ/יַּגֵּ֥ד לַ/אדֹנָ֖י/ו לֵ/אמֹ֑ר כָּ/זֹ֤את וְ/כָ/זֹאת֙ דִּבְּרָ֣ה
    הַֽ/נַּעֲרָ֔ה אֲשֶׁ֖ר מֵ/אֶ֥רֶץ יִשְׂרָאֵֽל׃
translation:
  text: So he went in and told his master, saying, “This and that is what the girl
    from the land of Israel said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''Thus and thus'' or ''such and such,'' summarizing what
      she said without repeating it word for word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: he went in
  alternatives:
  - he came
  - he went
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go/enter' depending on viewpoint. In
    narrative sequence here, with the following report to his master, 'went in' naturally
    conveys entering to make the report.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, report, or make known. 'Told' is natural
    modern English; the reporting sense is preserved by context.
- source_word: לַאדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: אָדוֹן can mean lord, master, or owner depending on context. Since this
    refers to Naaman's superior in a courtly/master-servant setting, 'his master'
    is the clearest idiomatic rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introduces direct discourse. 'Saying'
    preserves the Hebrew structure without awkwardness.
- source_word: כָּזֹאת וְכָזֹאת
  chosen: This and that
  alternatives:
  - Thus and thus
  - Such and such
  lexicon: HALOT
  rationale: The idiom summarizes speech without repeating it verbatim. 'This and
    that' is readable modern English; 'thus and thus' is more traditional but less
    natural today.
- source_word: דִּבְּרָה
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: דבר is the standard verb for speaking. 'Said' fits the English clause
    smoothly.
- source_word: הַנַּעֲרָה
  chosen: the girl
  alternatives:
  - the young woman
  - the servant girl
  lexicon: HALOT
  rationale: נַעֲרָה denotes a girl/young woman. In this context she is the Israelite
    captive servant, but since the Hebrew term itself does not explicitly mark servile
    status here, 'the girl' is the most direct rendering.
- source_word: מֵאֶרֶץ יִשְׂרָאֵל
  chosen: from the land of Israel
  alternatives:
  - from Israel
  lexicon: HALOT
  rationale: אֶרֶץ explicitly means land/country. Retaining 'land' reflects the Hebrew
    wording and the geopolitical sense.
