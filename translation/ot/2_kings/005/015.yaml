id: 2KI.5.15
reference: 2 Kings 5:15
source:
  edition: WLC
  text: וַ/יָּשָׁב֩ אֶל אִ֨ישׁ הָ/אֱלֹהִ֜ים ה֣וּא וְ/כָֽל מַחֲנֵ֗/הוּ וַ/יָּבֹא֮ וַ/יַּעֲמֹ֣ד
    לְ/פָנָי/ו֒ וַ/יֹּ֗אמֶר הִנֵּה נָ֤א יָדַ֨עְתִּי֙ כִּ֣י אֵ֤ין אֱלֹהִים֙ בְּ/כָל
    הָ/אָ֔רֶץ כִּ֖י אִם בְּ/יִשְׂרָאֵ֑ל וְ/עַתָּ֛ה קַח נָ֥א בְרָכָ֖ה מֵ/אֵ֥ת עַבְדֶּֽ/ךָ־־־־־־׃
translation:
  text: Then he returned to the man of God, he and all his company, and he came and
    stood before him and said, “See now, I know that there is no God in all the earth
    except in Israel. So now, please accept a gift from your servant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'a blessing.' Here the Hebrew term refers to a gift or
      present.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: A standard Hebrew title for a prophet or divine spokesman. 'Man of God'
    preserves the idiom and its literary resonance better than the interpretive gloss
    'prophet of God'.
- source_word: מַחֲנֵהוּ
  chosen: his company
  alternatives:
  - his camp
  - his entourage
  lexicon: HALOT
  rationale: Literally 'his camp,' but in this narrative context it refers to Naaman's
    accompanying retinue. 'His company' is natural English that preserves the collective
    sense without implying a literal military encampment in the immediate scene.
- source_word: וַיַּעֲמֹד לְפָנָיו
  chosen: stood before him
  alternatives:
  - presented himself before him
  lexicon: HALOT
  rationale: A conventional expression of appearing in someone's presence. 'Stood
    before him' is sufficiently literal and readable.
- source_word: הִנֵּה נָא
  chosen: See now
  alternatives:
  - Behold now
  - Look now
  lexicon: HALOT
  rationale: This combination marks emphatic attention. 'See now' preserves the discourse
    force in contemporary English without archaic tone.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have come to know
  lexicon: HALOT
  rationale: The perfect here expresses a present state resulting from realization.
    'I know' is idiomatic English while retaining the force of newly acquired recognition
    in context.
- source_word: אֵין אֱלֹהִים בְּכָל הָאָרֶץ כִּי אִם בְּיִשְׂרָאֵל
  chosen: there is no God in all the earth except in Israel
  alternatives:
  - there is no god in all the land except in Israel
  lexicon: HALOT
  rationale: '''Earth'' best reflects הָאָרֶץ in this broad claim. The singular ''God''
    is retained because the statement concerns the true deity, though Hebrew אֱלֹהִים
    can be rendered ''god'' in a more generic sense; capitalization in English signals
    Naaman''s confession of Israel''s God.'
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - except the God of Israel
  lexicon: HALOT
  rationale: The Hebrew says 'in Israel,' locating the true God's known presence/covenantal
    revelation there. It should not be expanded to 'the God of Israel' in the main
    text, since that adds wording not present in this clause.
- source_word: בְרָכָה
  chosen: a gift
  alternatives:
  - a blessing
  - a present
  lexicon: HALOT
  rationale: Although literally 'blessing,' in gift-giving contexts this noun commonly
    denotes a present or gift. 'Gift' communicates the idiomatic sense clearly in
    modern English; the more literal alternative is preserved in a footnote.
- source_word: עַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: While the noun can denote slave/servant, here it functions as a deferential
    self-designation in direct address. The bonded-status nuance is not foregrounded,
    so 'servant' best fits the social register and the project's context-dependent
    policy.
- source_word: קַח נָא
  chosen: please accept
  alternatives:
  - please take
  lexicon: HALOT
  rationale: The imperative 'take, please' in context is an offer of reception. 'Please
    accept' expresses the intended force naturally in English.
