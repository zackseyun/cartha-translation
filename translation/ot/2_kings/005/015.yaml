theological_decisions:
- issue: Naaman's confession that there is no God except in Israel
  chosen_reading: Render as a straightforward confession of the uniqueness of Israel's
    God without softening or systematizing it.
  alternative_readings:
  - Render 'no god' with lowercase to emphasize Naaman's pre-Israelite perspective
  - Paraphrase as 'no God except the God of Israel'
  rationale: The Hebrew presents a strong exclusivist confession. The translation
    preserves that force while avoiding expansion beyond the wording. Capitalizing
    'God' in English reflects the referent as the true God in context, not a denial
    that Naaman is speaking from within the narrative's theological framework.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
