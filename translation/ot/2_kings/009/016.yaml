id: 2KI.9.16
reference: 2 Kings 9:16
source:
  edition: WLC
  text: וַ/יִּרְכַּ֤ב יֵהוּא֙ וַ/יֵּ֣לֶךְ יִזְרְעֶ֔אלָ/ה כִּ֥י יוֹרָ֖ם שֹׁכֵ֣ב שָׁ֑מָּ/ה
    וַֽ/אֲחַזְיָה֙ מֶ֣לֶךְ יְהוּדָ֔ה יָרַ֖ד לִ/רְא֥וֹת אֶת יוֹרָֽם־׃
translation:
  text: So Jehu mounted up and went to Jezreel, because Joram was lying there, and
    Ahaziah king of Judah had gone down to see Joram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rode.' The Hebrew distinguishes Jehu's mounting from his going to Jezreel.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to see Joram'; that is, to visit him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְכַּב
  chosen: mounted up
  alternatives:
  - mounted
  - rode
  lexicon: HALOT
  rationale: From רכב, 'to ride/mount.' 'Mounted up' preserves the concrete action
    of getting onto the chariot/horse rather than merely the travel that follows.
    'Rode' is possible but can blur with the next verb 'went.'
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - traveled
  lexicon: HALOT
  rationale: הלך is the standard verb 'to go.' 'Went' is the most natural and sufficiently
    formal rendering; the destination is supplied by the following place name.
- source_word: יִזְרְעֶאלָה
  chosen: to Jezreel
  alternatives:
  - Jezreel-ward
  lexicon: HALOT
  rationale: The directional he on the place name indicates motion toward Jezreel.
    English idiom is best served by 'to Jezreel.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for Jehu's going. 'Because' communicates the
    causal force clearly in modern English.
- source_word: שֹׁכֵב
  chosen: was lying
  alternatives:
  - was laid up
  - was bedridden
  lexicon: HALOT
  rationale: The participle of שׁכב literally means 'lying down/lying.' In context
    of Joram recovering from wounds, 'was lying there' preserves the literal wording
    without over-interpreting the medical condition.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the natural equivalent.
- source_word: יָרַד
  chosen: had gone down
  alternatives:
  - went down
  - came down
  lexicon: HALOT
  rationale: 'The qatal after the clause about Joram is well rendered as a prior action
    relative to Jehu''s departure: Ahaziah ''had gone down'' to visit Joram. ''Gone
    down'' also preserves the topographical nuance of ירד.'
- source_word: לִרְאוֹת אֶת
  chosen: to see
  alternatives:
  - to visit
  lexicon: HALOT
  rationale: Literally 'to see.' In context it carries the sense of visiting an injured
    king, but the translation keeps the more direct lexical value 'to see' and lets
    context imply the visit.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Standard construct chain; translated directly.
- source_word: יֵהוּא / יוֹרָם / אֲחַזְיָה / יִזְרְעֶאל / יְהוּדָה
  chosen: Jehu / Joram / Ahaziah / Jezreel / Judah
  alternatives:
  - Jehoram for Joram
  rationale: Personal and place names are transliterated per project philosophy. 'Joram'
    is retained as the conventional English form for יוֹרָם in this context; 'Jehoram'
    is an alternative English representation of the same Hebrew name.
