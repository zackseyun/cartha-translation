id: 2KI.9.29
reference: 2 Kings 9:29
source:
  edition: WLC
  text: וּ/בִ/שְׁנַת֙ אַחַ֣ת עֶשְׂרֵ֣ה שָׁנָ֔ה לְ/יוֹרָ֖ם בֶּן אַחְאָ֑ב מָלַ֥ךְ אֲחַזְיָ֖ה
    עַל יְהוּדָֽה־־׃
translation:
  text: In the eleventh year of Joram son of Ahab, Ahaziah became king over Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Chronological notices involving the reigns of Joram and Ahaziah are difficult
      to harmonize across Kings and Chronicles; this translation renders the Hebrew
      as written without attempting to resolve the chronology in the main text.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בִ/שְׁנַת
  chosen: In the ... year
  alternatives:
  - And in the ... year
  - Now in the ... year
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/in the
    year of.' In English, the conjunction is not necessary for a natural verse-initial
    chronological notice, so 'In the ... year' best reflects the temporal sense without
    awkwardness.
- source_word: אַחַת עֶשְׂרֵה שָׁנָה
  chosen: eleventh year
  alternatives:
  - eleven years
  - year eleven
  lexicon: HALOT
  rationale: This is the standard Hebrew regnal-year expression, literally 'one ten
    year,' idiomatically 'the eleventh year.' Singular 'year' is correct in English
    for ordinal dating.
- source_word: לְיוֹרָם
  chosen: of Joram
  alternatives:
  - for Joram
  - belonging to Joram
  lexicon: HALOT
  rationale: The preposition ל in regnal formulas marks the reference point of another
    king's reign, best rendered 'of Joram' in English chronological style.
- source_word: בֶּן אַחְאָב
  chosen: son of Ahab
  lexicon: HALOT
  rationale: A straightforward patronymic identifying which Joram is meant.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  - was king
  lexicon: HALOT
  rationale: In this context the verb marks accession to the throne rather than the
    full duration of rule. 'Became king' is clear modern English and matches the ingressive
    sense of the Hebrew perfect in regnal notices.
- source_word: אֲחַזְיָה
  chosen: Ahaziah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: עַל יְהוּדָה
  chosen: over Judah
  alternatives:
  - in Judah
  - upon Judah
  lexicon: HALOT
  rationale: With מלך, על indicates rule over a realm or people. 'Over Judah' is the
    most natural rendering for kingship.
