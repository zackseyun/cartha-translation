theological_decisions:
- issue: Divine vengeance language
  chosen_reading: and I will avenge
  alternative_readings:
  - and I will take vengeance for
  rationale: The verse explicitly attributes just retribution to God; the translation preserves that claim without softening it or expanding it beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
