id: 2KI.9.7
reference: 2 Kings 9:7
source:
  edition: WLC
  text: וְ/הִ֨כִּיתָ֔ה אֶת בֵּ֥ית אַחְאָ֖ב אֲדֹנֶ֑י/ךָ וְ/נִקַּמְתִּ֞י דְּמֵ֣י עֲבָדַ֣/י הַ/נְּבִיאִ֗ים וּ/דְמֵ֛י כָּל עַבְדֵ֥י יְהוָ֖ה מִ/יַּ֥ד אִיזָֽבֶל־׀־׃
translation:
  text: And you shall strike down the house of Ahab your master, and I will avenge the blood of my servants the prophets and the blood of all the servants of Yahweh from the hand of Jezebel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the hand of Jezebel,'' an idiom meaning ''at Jezebel’s hand'' or ''for which Jezebel is responsible.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכִּיתָה
  chosen: you shall strike down
  alternatives:
  - you shall smite
  - you shall strike
  - you shall kill
  lexicon: HALOT
  rationale: נכה in this context of judgment against a dynasty carries the sense of striking down decisively, not merely hitting. 'Strike down' is idiomatic modern English and preserves the lethal force better than the archaic 'smite'.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - the household of Ahab
  - the dynasty of Ahab
  lexicon: HALOT
  rationale: '''House'' is the standard rendering for בַּיִת in royal/familial-political contexts and preserves the biblical idiom of a ruling line or household.'
- source_word: אֲדֹנֶיךָ
  chosen: your master
  alternatives:
  - your lord
  lexicon: HALOT
  rationale: Here the term refers to Jehu's human superior, not to God. 'Master' avoids confusion with divine 'Lord' and fits the court/military setting.
- source_word: וְנִקַּמְתִּי
  chosen: and I will avenge
  alternatives:
  - and I will take vengeance for
  - and I will exact vengeance for
  lexicon: HALOT
  rationale: The verb נקם here expresses divine retributive justice on behalf of those wronged. 'Avenge' is concise and natural while retaining judicial force.
- source_word: דְּמֵי
  chosen: the blood of
  alternatives:
  - the bloodshed of
  lexicon: HALOT
  rationale: The plural construct 'bloods of' is a Hebrew idiom for bloodguilt/bloodshed. In English, 'the blood of' is the most natural equivalent in a vengeance context.
- source_word: עֲבָדַי הַנְּבִיאִים
  chosen: my servants the prophets
  alternatives:
  - my servants, the prophets
  lexicon: HALOT
  rationale: The phrase identifies the prophets as God's servants. The appositional rendering without a comma is smooth and faithful.
- source_word: כָּל עַבְדֵי יְהוָה
  chosen: all the servants of the LORD
  alternatives:
  - all the LORD's servants
  lexicon: HALOT
  rationale: This preserves the construct relationship and follows the project's default rendering of יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִיַּד אִיזָבֶל
  chosen: from the hand of Jezebel
  alternatives:
  - at the hand of Jezebel
  - from Jezebel
  lexicon: HALOT
  rationale: The idiom 'from the hand of' preserves the Hebrew expression for agency/responsibility in the shedding of blood. It is understandable in English and keeps the biblical texture.
