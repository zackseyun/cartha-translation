id: 2KI.9.12
reference: 2 Kings 9:12
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ שֶׁ֔קֶר הַגֶּד נָ֖א לָ֑/נוּ וַ/יֹּ֗אמֶר כָּ/זֹ֤את וְ/כָ/זֹאת֙
    אָמַ֤ר אֵלַ/י֙ לֵ/אמֹ֔ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה מְשַׁחְתִּ֥י/ךָֽ לְ/מֶ֖לֶךְ אֶל יִשְׂרָאֵֽל־־׃
translation:
  text: 'And they said, “That is a lie. Please tell us.” So he said, “He said this
    and that to me, saying, ‘Thus says the LORD: I have anointed you king over Israel.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: “this and that,” an idiom meaning an indefinite or partial summary;
      alternatively, “such and such.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁקֶר
  chosen: That is a lie
  alternatives:
  - Lies
  - Falsehood
  - You are lying
  lexicon: HALOT
  rationale: 'The noun means ''lie/falsehood.'' In this abrupt dialogue, idiomatic
    English requires supplying the copular sense: ''That is a lie.'' This preserves
    the accusation that Jehu is concealing the message.'
- source_word: הַגֶּד נָא לָנוּ
  chosen: Please tell us
  alternatives:
  - Tell us, please
  - Declare it to us, please
  lexicon: HALOT
  rationale: הגּד is the Hiphil imperative of נגד, 'tell/declare'; נָא adds politeness
    or urgency. 'Please tell us' is natural modern English while retaining the force
    of the request.
- source_word: כָּזֹאת וְכָזֹאת
  chosen: this and that
  alternatives:
  - such and such
  - thus and so
  lexicon: HALOT
  rationale: This idiom refers to an indefinite summary rather than a verbatim quotation.
    'This and that' is readable modern English; 'such and such' is possible but slightly
    more stilted. The phrase signals that Jehu initially gives a vague report before
    the direct quotation.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says the LORD' preserves
    the formal prophetic cadence. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default
    for יְהוָה.
- source_word: מְשַׁחְתִּיךָ
  chosen: I have anointed you
  alternatives:
  - I anoint you
  - I have consecrated you
  lexicon: HALOT
  rationale: From משׁח, 'anoint.' The perfect with direct speech can be rendered as
    a present perfect in English, highlighting the completed commissioning just announced.
    'Anointed' preserves the royal and theological significance better than a more
    generic term like 'consecrated.'
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: The preposition ל marks appointment to office. English expresses this
    naturally as 'anointed you king,' though 'as king' would also be possible.
- source_word: אֶל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - to Israel
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in enthronement contexts English idiom
    requires 'over Israel' to express rule. This is an optimal-equivalence adjustment
    for clear sense.
