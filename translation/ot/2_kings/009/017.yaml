id: 2KI.9.17
reference: 2 Kings 9:17
source:
  edition: WLC
  text: וְ/הַ/צֹּפֶה֩ עֹמֵ֨ד עַֽל הַ/מִּגְדָּ֜ל בְּ/יִזְרְעֶ֗אל וַ/יַּ֞רְא אֶת שִׁפְעַ֤ת
    יֵהוּא֙ בְּ/בֹא֔/וֹ וַ/יֹּ֕אמֶר שִׁפְעַ֖ת אֲנִ֣י רֹאֶ֑ה וַ/יֹּ֣אמֶר יְהוֹרָ֗ם
    קַ֥ח רַכָּ֛ב וּֽ/שְׁלַ֥ח לִ/קְרָאתָ֖/ם וְ/יֹאמַ֥ר הֲ/שָׁלֽוֹם־־׃
translation:
  text: Now the watchman was standing on the tower in Jezreel, and he saw the company
    of Jehu as he came and said, “I see a company.” And Jehoram said, “Take a horseman
    and send him to meet them, and let him say, ‘Is it peace?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “Is all well?”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the lookout
  - the sentinel
  lexicon: HALOT
  rationale: The noun denotes one who keeps watch. 'Watchman' is the most natural
    and established English equivalent in this narrative setting, without implying
    prophetic overtones.
- source_word: עֹמֵד
  chosen: was standing
  alternatives:
  - stood
  - was stationed
  lexicon: HALOT
  rationale: The participle gives a durative/background sense. 'Was standing' preserves
    the ongoing posture as scene-setting better than the simple preterite 'stood.'
- source_word: הַמִּגְדָּל
  chosen: the tower
  alternatives:
  - the watchtower
  lexicon: HALOT
  rationale: The basic sense is 'tower.' 'Watchtower' is possible from context, but
    the Hebrew noun itself is simply 'tower,' so the plainer rendering is preferred.
- source_word: בְּיִזְרְעֶאל
  chosen: in Jezreel
  lexicon: HALOT
  rationale: Standard transliteration of the place name, following the translation
    philosophy of transliterating names.
- source_word: שִׁפְעַת
  chosen: the company
  alternatives:
  - the multitude
  - the troop
  - the mass
  lexicon: HALOT
  rationale: The noun refers to an abundance or mass of people. In this military-travel
    context, 'company' idiomatically conveys a visible group without overstating its
    size.
- source_word: יֵהוּא
  chosen: Jehu
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בְּבֹאוֹ
  chosen: as he came
  alternatives:
  - in his coming
  - as he was coming
  - when he came
  lexicon: HALOT
  rationale: The infinitive construct with preposition and suffix marks the time of
    Jehu's approach. 'As he came' is natural English and preserves the temporal relation.
- source_word: שִׁפְעַת אֲנִי רֹאֶה
  chosen: I see a company
  alternatives:
  - I see a multitude
  - I see a troop
  lexicon: HALOT
  rationale: This repeats the earlier noun for emphasis/report. 'I see a company'
    keeps the repetition and remains idiomatic.
- source_word: קַח רַכָּב
  chosen: Take a horseman
  alternatives:
  - Take a rider
  - Take cavalry
  lexicon: HALOT
  rationale: Although רכב can relate broadly to riding/chariotry, here the singular
    with the following singular verbs indicates a single mounted messenger. 'Horseman'
    best fits the context.
- source_word: וּשְׁלַח לִקְרָאתָם
  chosen: and send him to meet them
  alternatives:
  - and send him to meet him
  lexicon: HALOT
  rationale: The Masoretic suffix is plural ('them'), matching the visible company.
    Although Jehu is the named leader, the watchman sees a group, so the plural should
    be retained in translation.
- source_word: וְיֹאמַר
  chosen: and let him say
  alternatives:
  - and he shall say
  - and say
  lexicon: HALOT
  rationale: 'Following the imperative sequence, the imperfect/jussive sense is naturally
    rendered in English as an indirect command: ''let him say.'''
- source_word: הֲשָׁלוֹם
  chosen: Is it peace?
  alternatives:
  - Is all well?
  - Do you come in peace?
  lexicon: HALOT
  rationale: The Hebrew is tersely 'peace?' used as an inquiry about well-being or
    peaceful intent. 'Is it peace?' preserves the compactness and recurring motif
    in the passage; a more idiomatic alternative is worth preserving in a footnote.
