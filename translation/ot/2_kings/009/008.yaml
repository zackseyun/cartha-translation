theological_decisions:
- issue: Rendering of the dynastic judgment formula
  chosen_reading: Retain 'house of Ahab' and 'cut off' language while expressing the
    male-targeting idiom as 'every male' in the main text.
  alternative_readings:
  - Paraphrase more dynamically as 'I will wipe out Ahab's entire family'
  - Render the idiom woodenly as 'him who urinates against a wall' in the main text
  rationale: The verse is a royal judgment oracle. Preserving 'house' and 'cut off'
    maintains the biblical and theological texture of covenantal judgment, while 'every
    male' avoids unnecessary obscurity in the main text. The literal idiom is preserved
    in a footnote to keep the translation transparent and auditable.
  doctrine_reference: Translation philosophy §§1, 5, 6
