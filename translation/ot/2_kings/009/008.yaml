id: 2KI.9.8
reference: 2 Kings 9:8
source:
  edition: WLC
  text: וְ/אָבַ֖ד כָּל בֵּ֣ית אַחְאָ֑ב וְ/הִכְרַתִּ֤י לְ/אַחְאָב֙ מַשְׁתִּ֣ין בְּ/קִ֔יר
    וְ/עָצ֥וּר וְ/עָז֖וּב בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: And all the house of Ahab shall perish, and I will cut off from Ahab every
    male, both bond and free in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'everyone who urinates against a wall,' a coarse idiom
      meaning 'every male.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָבַד
  chosen: shall perish
  alternatives:
  - will perish
  - shall be destroyed
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic speech functions futurally.
    'Shall perish' preserves the predictive/judgment sense without over-specifying
    agency beyond the context.
- source_word: כָּל בֵּית אַחְאָב
  chosen: all the house of Ahab
  alternatives:
  - the whole house of Ahab
  - all Ahab's house
  lexicon: HALOT
  rationale: '''House'' is retained as the standard idiom for dynasty/household, important
    in royal judgment contexts.'
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will wipe out
  - I will destroy
  lexicon: HALOT
  rationale: Hiphil of כרת commonly means 'cut off' in covenantal/judgment contexts.
    This more formal rendering preserves the idiomatic force and intertextual resonance
    of divine judgment formulas.
- source_word: לְאַחְאָב
  chosen: from Ahab
  alternatives:
  - belonging to Ahab
  - for Ahab
  lexicon: HALOT
  rationale: The lamed marks relation/possession in this formula; 'from Ahab' is idiomatic
    in English after 'cut off,' meaning from Ahab's line/house.
- source_word: מַשְׁתִּין בְּקִיר
  chosen: every male
  alternatives:
  - everyone who urinates against a wall
  - every man-child
  lexicon: HALOT
  rationale: This Hebrew idiom refers to males. For main text, 'every male' communicates
    the referent clearly in readable modern English. The more literal and coarse idiom
    is preserved in a footnote for auditability.
- source_word: וְעָצוּר וְעָזוּב
  chosen: both bond and free
  alternatives:
  - both slave and free
  - both restrained and left free
  - both protected and abandoned
  lexicon: HALOT
  rationale: In this recurring extermination formula, the pair is widely understood
    as a merism for all social conditions/dependents, conventionally rendered 'bond
    and free.' 'Slave and free' is possible, but 'bond and free' better matches the
    idiomatic pair here without implying a precise legal classification the Hebrew
    itself does not fully specify.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - from Israel
  lexicon: HALOT
  rationale: 'The preposition is best rendered locatively: the judgment concerns Ahab''s
    line within Israel.'
