id: 2KI.9.21
reference: 2 Kings 9:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוֹרָם֙ אֱסֹ֔ר וַ/יֶּאְסֹ֖ר רִכְבּ֑/וֹ וַ/יֵּצֵ֣א יְהוֹרָ֣ם
    מֶֽלֶךְ יִ֠שְׂרָאֵל וַ/אֲחַזְיָ֨הוּ מֶֽלֶךְ יְהוּדָ֜ה אִ֣ישׁ בְּ/רִכְבּ֗/וֹ וַ/יֵּֽצְאוּ֙
    לִ/קְרַ֣את יֵה֔וּא וַ/יִּמְצָאֻ֔/הוּ בְּ/חֶלְקַ֖ת נָב֥וֹת הַ/יִּזְרְעֵאלִֽי־־׃
translation:
  text: Then Jehoram said, “Harness!” and they harnessed his chariot. Then Jehoram
    king of Israel and Ahaziah king of Judah went out, each in his chariot, to meet
    Jehu, and they found him in the plot of land of Naboth the Jezreelite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew formally reads 'and he harnessed his chariot'; the sense is likely
      that the order was carried out by attendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱסֹר
  chosen: Harness!
  alternatives:
  - Yoke!
  - Hitch up!
  - Prepare the chariot!
  lexicon: HALOT
  rationale: Imperative of אסר in chariot context refers to binding/harnessing the
    team to the chariot. 'Harness!' is concise, natural English and preserves the
    military/royal urgency better than the vaguer 'prepare.'
- source_word: וַיֶּאְסֹר רִכְבּוֹ
  chosen: they harnessed his chariot
  alternatives:
  - he harnessed his chariot
  - his chariot was harnessed
  lexicon: HALOT
  rationale: The verb is 3ms, formally 'and he harnessed his chariot,' but in English
    the idiom naturally allows an impersonal/passive-like sense with attendants carrying
    out the order. Because the preceding imperative is singular and directed to a
    subordinate, 'they harnessed his chariot' best reflects the narrative sense without
    woodenly implying the king personally did the work.
- source_word: אִישׁ בְּרִכְבּוֹ
  chosen: each in his chariot
  alternatives:
  - each in his own chariot
  - man in his chariot
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each' here, indicating that both kings rode
    separately. 'Each in his chariot' is idiomatic and preserves the distributive
    force.
- source_word: לִקְרַאת יֵהוּא
  chosen: to meet Jehu
  alternatives:
  - to encounter Jehu
  - toward Jehu
  lexicon: HALOT
  rationale: לקראת commonly means going out to meet someone. 'To meet Jehu' is the
    standard and clearest rendering.
- source_word: וַיִּמְצָאֻהוּ
  chosen: they found him
  alternatives:
  - they encountered him
  - they came upon him
  lexicon: HALOT
  rationale: מצא in narrative can mean 'find' or 'encounter.' 'Found him' is straightforward
    and leaves the context to supply the sense of encounter.
- source_word: בְּחֶלְקַת נָבוֹת
  chosen: in the plot of land of Naboth
  alternatives:
  - on the property of Naboth
  - in Naboth's field
  lexicon: HALOT
  rationale: חלקה denotes a parcel/plot of land. 'Plot of land' is more precise than
    simply 'field' and preserves the legal-property nuance important in the Naboth
    narrative background.
- source_word: הַיִּזְרְעֵאלִי
  chosen: the Jezreelite
  alternatives:
  - of Jezreel
  lexicon: HALOT
  rationale: The gentilic identifies Naboth as 'the Jezreelite.' Retaining the gentilic
    preserves the established designation from the earlier narrative.
