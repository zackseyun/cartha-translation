id: 2KI.9.24
reference: 2 Kings 9:24
source:
  edition: WLC
  text: וְ/יֵה֞וּא מִלֵּ֧א יָד֣/וֹ בַ/קֶּ֗שֶׁת וַ/יַּ֤ךְ אֶת יְהוֹרָם֙ בֵּ֣ין זְרֹעָ֔י/ו
    וַ/יֵּצֵ֥א הַ/חֵ֖צִי מִ/לִּבּ֑/וֹ וַ/יִּכְרַ֖ע בְּ/רִכְבּֽ/וֹ־׃
translation:
  text: And Jehu drew his bow full and struck Jehoram between his arms, and the arrow
    came out through his heart, and he collapsed in his chariot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'between his shoulders' / 'between his shoulder blades.' The Hebrew literally
      says 'between his arms,' which may idiomatically refer to the upper back or
      shoulder area.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלֵּא יָדוֹ בַקֶּשֶׁת
  chosen: drew his bow full
  alternatives:
  - filled his hand with the bow
  - drew the bow to its full extent
  lexicon: HALOT
  rationale: The idiom literally reads 'filled his hand with the bow' and refers to
    drawing the bow fully for a shot. 'Drew his bow full' preserves the vividness
    while expressing the Hebrew idiom in natural English.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - hit
  - shot
  lexicon: HALOT
  rationale: נכה is a broad verb meaning 'strike/smite.' Here the action is by arrow,
    but 'struck' keeps the Hebrew verb's force without over-specifying beyond the
    text.
- source_word: בֵּין זְרֹעָיו
  chosen: between his arms
  alternatives:
  - between his shoulders
  - between his shoulder blades
  lexicon: HALOT
  rationale: זְרוֹעַ normally means 'arm.' The phrase is somewhat idiomatic in a battle
    context and may indicate the upper torso area. The more literal 'between his arms'
    is retained in the main text; a more interpretive anatomical alternative is preserved
    in a footnote.
- source_word: וַיֵּצֵא הַחֵצִי מִלִּבּוֹ
  chosen: the arrow came out through his heart
  alternatives:
  - the arrow went out from his heart
  - the arrow came out of his heart
  lexicon: HALOT
  rationale: לֵב can denote the physical heart here in a mortal-wound context. 'Came
    out through his heart' communicates that the arrow passed through the chest/heart
    region in idiomatic English.
- source_word: וַיִּכְרַע
  chosen: he collapsed
  alternatives:
  - he sank down
  - he crumpled
  - he bowed down
  lexicon: HALOT
  rationale: כרע literally means 'bend/kneel,' but in this narrative context it describes
    the body giving way after the fatal shot. 'Collapsed' conveys the event naturally
    in English.
- source_word: בְּרִכְבּוֹ
  chosen: in his chariot
  alternatives:
  - in the chariot
  lexicon: HALOT
  rationale: The pronominal suffix indicates possession, referring to Jehoram's chariot.
    'In his chariot' is the most direct rendering.
