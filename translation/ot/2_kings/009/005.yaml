id: 2KI.9.5
reference: 2 Kings 9:5
source:
  edition: WLC
  text: וַ/יָּבֹ֗א וְ/הִנֵּ֨ה שָׂרֵ֤י הַ/חַ֨יִל֙ יֹֽשְׁבִ֔ים וַ/יֹּ֕אמֶר דָּבָ֥ר לִ֛/י
    אֵלֶ֖י/ךָ הַ/שָּׂ֑ר וַ/יֹּ֤אמֶר יֵהוּא֙ אֶל מִ֣י מִ/כֻּלָּ֔/נוּ וַ/יֹּ֖אמֶר אֵלֶ֥י/ךָ
    הַ/שָּֽׂר־׃
translation:
  text: So he came, and behold, the commanders of the army were sitting. And he said,
    “I have a word for you, commander.” And Jehu said, “For which one of us?” And
    he said, “For you, commander.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I have a message for you, commander.” Hebrew literally, “A word is
      to me for you, commander.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: So he came
  alternatives:
  - And he came
  - Then he came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'So he came' gives natural English
    narrative flow while preserving sequence.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation or sudden attention. 'Behold' preserves
    the deictic force better than a flatter rendering, while remaining understandable
    in context.
- source_word: שָׂרֵי הַחַיִל
  chosen: the commanders of the army
  alternatives:
  - the captains of the host
  - the officers of the army
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials; with הַחַיִל in this military setting,
    'commanders of the army' is the clearest modern rendering. 'Captains' may sound
    too rank-specific; 'host' is archaic.
- source_word: יֹשְׁבִים
  chosen: were sitting
  alternatives:
  - were seated
  - sat
  lexicon: HALOT
  rationale: The participle describes their ongoing posture/state. 'Were sitting'
    preserves the scene-setting aspect.
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a message
  - something to say
  lexicon: HALOT
  rationale: דָּבָר literally means 'word' and often idiomatically 'message' or 'matter.'
    'A word' preserves the Hebrew idiom and suits the formal address.
- source_word: לִי אֵלֶיךָ
  chosen: for you
  alternatives:
  - to you
  - for me to you
  lexicon: HALOT
  rationale: 'The phrase is elliptical and idiomatic in context: the speaker has a
    communication directed to the addressee. English naturally expresses this as ''for
    you.'' The 1cs element in לִי likely functions idiomatically with דָּבָר (''I
    have a word'') rather than requiring a wooden ''for me to you.'''
- source_word: הַשַּׂר
  chosen: commander
  alternatives:
  - captain
  - officer
  - prince
  lexicon: HALOT
  rationale: Here the singular is a direct form of address to a military leader. 'Commander'
    fits the military context and avoids the ambiguity of 'officer' or the archaic/nobility
    sense of 'prince.'
- source_word: אֶל־מִי מִכֻּלָּנוּ
  chosen: For which one of us?
  alternatives:
  - To whom of all of us?
  - For whom among all of us?
  lexicon: HALOT
  rationale: Jehu asks which of the assembled commanders is being addressed. 'Which
    one of us' is idiomatic and preserves the partitive sense of מִכֻּלָּנוּ.
- source_word: אֵלֶיךָ הַשָּׂר
  chosen: For you, commander
  alternatives:
  - To you, commander
  - You, commander
  lexicon: HALOT
  rationale: This repeats and clarifies the intended addressee. 'For you, commander'
    matches the earlier idiom and preserves the direct address.
