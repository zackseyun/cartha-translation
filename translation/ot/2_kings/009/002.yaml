id: 2KI.9.2
reference: 2 Kings 9:2
source:
  edition: WLC
  text: וּ/בָ֖אתָ שָׁ֑מָּ/ה וּ/רְאֵֽה שָׁ֠ם יֵה֨וּא בֶן יְהוֹשָׁפָ֜ט בֶּן נִמְשִׁ֗י
    וּ/בָ֨אתָ֙ וַ/הֲקֵֽמֹת/וֹ֙ מִ/תּ֣וֹך אֶחָ֔י/ו וְ/הֵבֵיאתָ֥ אֹת֖/וֹ חֶ֥דֶר בְּ/חָֽדֶר־־־׃
translation:
  text: When you arrive there, look for Jehu son of Jehoshaphat, son of Nimshi. Go
    in, get him up from among his brothers, and bring him into an inner room.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a room within a room,' that is, a private inner chamber.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ שָׁמָּה
  chosen: When you arrive there
  alternatives:
  - and you shall go there
  - and you shall come there
  lexicon: HALOT
  rationale: בוא commonly means 'come/go/arrive' depending on viewpoint. In English,
    'arrive there' naturally conveys the completed motion before the next command.
- source_word: וּרְאֵה שָׁם
  chosen: look for
  alternatives:
  - see there
  - look there and see
  lexicon: HALOT
  rationale: ראה literally means 'see,' but in this directive context with the named
    person following, the sense is to locate or identify him. 'Look for' is idiomatic
    and fits optimal equivalence.
- source_word: יֵהוּא בֶן יְהוֹשָׁפָט בֶּן נִמְשִׁי
  chosen: Jehu son of Jehoshaphat, son of Nimshi
  alternatives:
  - Jehu the son of Jehoshaphat, the son of Nimshi
  rationale: Personal names are transliterated, and בן in genealogical sequence is
    naturally rendered 'son of' in English.
- source_word: וּבָאתָ
  chosen: Go in
  alternatives:
  - go
  - come
  lexicon: HALOT
  rationale: A second use of בוא follows the instruction to find Jehu and precedes
    actions done in his presence. 'Go in' makes the movement into the gathering explicit
    in natural English, without overtranslating.
- source_word: וַהֲקֵמֹתוֹ
  chosen: get him up
  alternatives:
  - raise him up
  - make him arise
  - have him stand
  lexicon: HALOT
  rationale: קום in Hiphil means to cause to rise/stand up. 'Get him up' is natural
    modern English and suits the immediate action of separating him from the group.
- source_word: מִתּוֹךְ אֶחָיו
  chosen: from among his brothers
  alternatives:
  - from among his kinsmen
  - from among his companions
  lexicon: HALOT
  rationale: אחים literally means 'brothers.' In this military/social setting it could
    denote close associates or fellow countrymen, but the translation philosophy prefers
    gender-accurate rendering matching the source form unless context clearly demands
    otherwise.
- source_word: וְהֵבֵיאתָ אֹתוֹ
  chosen: and bring him
  alternatives:
  - and lead him
  - and take him
  lexicon: HALOT
  rationale: Hiphil of בוא often means bring/lead. 'Bring him' is the most straightforward
    rendering here.
- source_word: חֶדֶר בְּחָדֶר
  chosen: into an inner room
  alternatives:
  - into a room within a room
  - into an innermost chamber
  - into a private room
  lexicon: HALOT
  rationale: The doubled expression intensifies privacy/interiority. 'Inner room'
    captures the idiom in clear English; the more literal 'room within a room' is
    preserved in a footnote as a lexical alternative.
