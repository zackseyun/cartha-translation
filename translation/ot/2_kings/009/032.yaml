id: 2KI.9.32
reference: 2 Kings 9:32
source:
  edition: WLC
  text: וַ/יִּשָּׂ֤א פָנָי/ו֙ אֶל הַ֣/חַלּ֔וֹן וַ/יֹּ֕אמֶר מִ֥י אִתִּ֖/י מִ֑י וַ/יַּשְׁקִ֣יפוּ
    אֵלָ֔י/ו שְׁנַ֥יִם שְׁלֹשָׁ֖ה סָרִיסִֽים־׃
translation:
  text: He lifted up his face toward the window and said, “Who is with me? Who?” Then
    two or three eunuchs looked down at him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “court officials” for “eunuchs”; the Hebrew term can denote either, though
      in a royal palace setting “eunuchs” is most likely.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא פָנָיו
  chosen: He lifted up his face
  alternatives:
  - He looked up
  - He raised his eyes
  lexicon: HALOT
  rationale: Literally 'he lifted his face.' This idiom means to direct one's gaze
    upward, but 'lifted up his face' preserves the Hebrew imagery while remaining
    understandable in English. A more idiomatic 'looked up' is possible, but the chosen
    rendering keeps closer to the source.
- source_word: הַחַלּוֹן
  chosen: the window
  lexicon: HALOT
  rationale: Standard rendering for the architectural opening from which Jezebel and
    the attendants are above Jehu.
- source_word: מִי אִתִּי מִי
  chosen: Who is with me? Who?
  alternatives:
  - Who is on my side? Who?
  - Who is with me—who?
  lexicon: HALOT
  rationale: The repeated interrogative intensifies the appeal. 'With me' is the most
    direct rendering of אִתִּי; 'on my side' is interpretive and therefore left as
    an alternative.
- source_word: וַיַּשְׁקִיפוּ אֵלָיו
  chosen: looked down at him
  alternatives:
  - looked out at him
  - leaned out toward him
  lexicon: HALOT
  rationale: The verb שׁקף commonly denotes looking out/down from an elevated place.
    Since the speakers are at a window above Jehu, 'looked down at him' best captures
    the spatial sense implicit in the scene.
- source_word: שְׁנַיִם שְׁלֹשָׁה
  chosen: two or three
  alternatives:
  - two, three
  - a couple or three
  lexicon: HALOT
  rationale: This Hebrew number pairing is an idiomatic way of indicating a small
    number, naturally rendered 'two or three' in English.
- source_word: סָרִיסִים
  chosen: eunuchs
  alternatives:
  - officials
  - court officials
  lexicon: HALOT
  rationale: The term often refers to eunuchs, especially in royal court settings,
    though it can broaden to court officials. In this palace context, 'eunuchs' is
    the most likely and traditional sense; the broader administrative sense is preserved
    as an alternative.
