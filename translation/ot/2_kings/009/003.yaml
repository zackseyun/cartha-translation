id: 2KI.9.3
reference: 2 Kings 9:3
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֤ פַךְ הַ/שֶּׁ֨מֶן֙ וְ/יָצַקְתָּ֣ עַל רֹאשׁ֔/וֹ וְ/אָֽמַרְתָּ֙
    כֹּֽה אָמַ֣ר יְהוָ֔ה מְשַׁחְתִּ֥י/ךָֽ לְ/מֶ֖לֶךְ אֶל יִשְׂרָאֵ֑ל וּ/פָתַחְתָּ֥
    הַ/דֶּ֛לֶת וְ/נַ֖סְתָּה וְ/לֹ֥א תְחַכֶּֽה־־־־׃
translation:
  text: 'Then take the flask of oil, pour it on his head, and say, ‘Thus says the
    LORD: I have anointed you king over Israel.’ Then open the door and flee; do not
    wait.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Israel''; the sense in this royal appointment formula is ''over
      Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פַךְ
  chosen: flask
  alternatives:
  - vial
  - jar
  lexicon: HALOT
  rationale: פַךְ denotes a small container for liquids. 'Flask' is natural modern
    English and fits the anointing context better than the more archaic 'vial' or
    less specific 'jar'.
- source_word: הַשֶּׁמֶן
  chosen: the oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: The noun is simply 'the oil.' In context it is anointing oil, but the
    Hebrew does not explicitly say 'olive,' so 'oil' preserves the source wording
    while remaining clear.
- source_word: וְיָצַקְתָּ עַל רֹאשׁוֹ
  chosen: pour it on his head
  alternatives:
  - pour it over his head
  lexicon: HALOT
  rationale: יצק with עַל conveys pouring onto/upon. 'On his head' is a straightforward
    rendering; 'over' is possible but slightly more interpretive.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says the LORD'
    preserves the formal prophetic tone. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project's contested-terms guidance specifies 'the LORD' as the default
    rendering for the divine name.
- source_word: מְשַׁחְתִּיךָ
  chosen: I have anointed you
  alternatives:
  - I anoint you
  lexicon: HALOT
  rationale: The perfect form naturally renders as a completed act, especially in
    the performative context of anointing. 'I have anointed you' reflects the Hebrew
    form while fitting the ritual speech act.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: The preposition ל marks appointment to office. English idiom works well
    with 'anointed you king'; 'as king' is possible but less direct.
- source_word: אֶל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - to Israel
  lexicon: HALOT
  rationale: Although the preposition is אֶל, in royal appointment formulas the sense
    is rulership with respect to the people. 'Over Israel' communicates the intended
    relation in idiomatic English better than the wooden 'to Israel'.
- source_word: וּפָתַחְתָּ הַדֶּלֶת
  chosen: Then open the door
  alternatives:
  - and open the door
  lexicon: HALOT
  rationale: The sequence of waw-consecutive verbs gives a chain of instructions.
    'Then open the door' communicates the next step clearly in natural English.
- source_word: וְנַסְתָּה
  chosen: and flee
  alternatives:
  - and escape
  - and run away
  lexicon: HALOT
  rationale: From נוס, the command is to depart quickly for safety. 'Flee' best preserves
    the urgency and danger implied.
- source_word: וְלֹא תְחַכֶּה
  chosen: do not wait
  alternatives:
  - do not linger
  - do not delay
  lexicon: HALOT
  rationale: חכה in the piel means to wait/tarry. 'Do not wait' is the most direct
    and transparent rendering; 'linger' or 'delay' are interpretive expansions.
