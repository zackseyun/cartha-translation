id: 2KI.9.6
reference: 2 Kings 9:6
source:
  edition: WLC
  text: וַ/יָּ֨קָם֙ וַ/יָּבֹ֣א הַ/בַּ֔יְתָ/ה וַ/יִּצֹ֥ק הַ/שֶּׁ֖מֶן אֶל רֹאשׁ֑/וֹ
    וַ/יֹּ֣אמֶר ל֗/וֹ כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל מְשַׁחְתִּ֧י/ךָֽ לְ/מֶ֛לֶךְ
    אֶל עַ֥ם יְהוָ֖ה אֶל יִשְׂרָאֵֽל־־־־׃
translation:
  text: 'So he got up and went into the house, and he poured the oil on his head and
    said to him, “Thus says the LORD, the God of Israel: I have anointed you king
    over the people of the LORD, over Israel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I anoint you king over the LORD’s people, over Israel.” The Hebrew
      perfect may be understood as performative in this anointing formula.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּקָם
  chosen: he got up
  alternatives:
  - he arose
  - he stood up
  lexicon: HALOT
  rationale: Wayyiqtol of קום in narrative sequence; 'got up' is natural modern English
    and preserves the action without archaic tone.
- source_word: וַיָּבֹא הַבַּיְתָה
  chosen: went into the house
  alternatives:
  - came into the house
  - went inside the house
  lexicon: HALOT
  rationale: בוא with directional ה on בַּיִת indicates movement into the house. 'Went
    into' fits the narrative viewpoint better than 'came into' in English.
- source_word: וַיִּצֹק הַשֶּׁמֶן אֶל רֹאשׁוֹ
  chosen: poured the oil on his head
  alternatives:
  - poured oil on his head
  lexicon: HALOT
  rationale: יצק commonly means 'pour.' Retaining the article in 'the oil' reflects
    the Hebrew and suits the specific anointing act.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic
    in English for divine speech introductions.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md
    contested terms table.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase straightforwardly rendered; preserves covenantal identification.
- source_word: מְשַׁחְתִּיךָ
  chosen: I have anointed you
  alternatives:
  - I anoint you
  - I have consecrated you
  lexicon: HALOT
  rationale: Perfect first common singular with second masculine singular object.
    'Have anointed' captures the completed act just performed and its performative
    force.
- source_word: לְמֶלֶךְ
  chosen: king
  alternatives:
  - as king
  lexicon: HALOT
  rationale: Predicate/result sense after משׁח; English can express this compactly
    as 'anointed you king.'
- source_word: אֶל עַם יְהוָה
  chosen: over the people of the LORD
  alternatives:
  - for the people of the LORD
  - to the people of the LORD
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in royal appointment contexts here it
    functions idiomatically for sphere/authority. 'Over' best conveys enthronement
    sense in English.
- source_word: אֶל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - that is, Israel
  - namely, Israel
  lexicon: HALOT
  rationale: The second אֶל + proper noun appositionally clarifies the referent of
    'the people of the LORD.' Rendering with repeated 'over' preserves the parallel
    structure and the sense of rule.
