theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD' rather than transliterating
    the name, following the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the anointing declaration מְשַׁחְתִּיךָ
  chosen_reading: I have anointed you
  alternative_readings:
  - I anoint you
  rationale: The Hebrew perfect can be understood performatively in this ritual context,
    but 'I have anointed you' best matches the just-completed pouring of oil while
    preserving the commissioning force.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source-text sense without paraphrase'
