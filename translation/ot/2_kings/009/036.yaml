id: 2KI.9.36
reference: 2 Kings 9:36
source:
  edition: WLC
  text: וַ/יָּשֻׁבוּ֮ וַ/יַּגִּ֣ידוּ ל/וֹ֒ וַ/יֹּ֨אמֶר֙ דְּבַר יְהוָ֣ה ה֔וּא אֲשֶׁ֣ר דִּבֶּ֗ר בְּ/יַד עַבְדּ֛/וֹ אֵלִיָּ֥הוּ הַ/תִּשְׁבִּ֖י לֵ/אמֹ֑ר בְּ/חֵ֣לֶק יִזְרְעֶ֔אל יֹאכְל֥וּ הַ/כְּלָבִ֖ים אֶת בְּשַׂ֥ר אִיזָֽבֶל־־־׃
translation:
  text: So they returned and told him, and he said, “It is the word of Yahweh, which he spoke by the hand of his servant Elijah the Tishbite, saying, ‘In the territory of Jezreel the dogs will eat the flesh of Jezebel.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “In the plot/portion of Jezreel”; the Hebrew term can refer to a tract or parcel of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: So they returned
  alternatives:
  - Then they returned
  - And they returned
  lexicon: HALOT
  rationale: Wayyiqtol narrative sequence from שוב; 'returned' is the plain sense. 'So' gives natural English narrative linkage without over-paraphrasing.
- source_word: וַיַּגִּידוּ לוֹ
  chosen: told him
  alternatives:
  - reported to him
  - informed him
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means to tell/report. 'Told him' is concise, natural English and fits the immediate narrative context.
- source_word: דְּבַר יְהוָה הוּא
  chosen: It is the word of the LORD
  alternatives:
  - This is the word of the LORD
  - It is the LORD's word
  lexicon: HALOT
  rationale: Retains the verbless-clause emphasis and the covenant name rendering required by doctrine. 'It is the word of the LORD' sounds idiomatic while preserving the demonstrative force of הוּא.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: which he spoke
  alternatives:
  - that he spoke
  - which he said
  lexicon: HALOT
  rationale: Maintains the relative clause and keeps the verbal connection to the prophetic utterance.
- source_word: בְּיַד עַבְדּוֹ
  chosen: by the hand of his servant
  alternatives:
  - through his servant
  - by his servant
  lexicon: HALOT
  rationale: ביד is a standard Hebrew idiom for agency in prophetic mediation. 'By the hand of' preserves the idiom in readable English; 'through' is possible but less transparent to the source.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic service to God 'servant' is the most natural and established English equivalent; the bonded-status nuance is not foregrounded here.
- source_word: אֵלִיָּהוּ הַתִּשְׁבִּי
  chosen: Elijah the Tishbite
  lexicon: HALOT
  rationale: Personal name is transliterated; gentilicial/title is rendered straightforwardly.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' is idiomatic in English biblical narrative.
- source_word: בְּחֵלֶק יִזְרְעֶאל
  chosen: In the territory of Jezreel
  alternatives:
  - In the portion of Jezreel
  - In the plot of Jezreel
  - In the field of Jezreel
  lexicon: HALOT
  rationale: חלק can mean portion/tract/parcel. Here it refers to the area/domain associated with Jezreel. 'Territory' communicates the geographic sense clearly in modern English without narrowing it to a single small plot.
- source_word: יֹאכְלוּ הַכְּלָבִים
  chosen: the dogs will eat
  alternatives:
  - dogs will devour
  lexicon: HALOT
  rationale: Simple future sense from imperfect; 'eat' is the direct lexical equivalent and preserves the starkness of the prophecy.
- source_word: בְּשַׂר אִיזָבֶל
  chosen: the flesh of Jezebel
  alternatives:
  - Jezebel's flesh
  - the body of Jezebel
  lexicon: HALOT
  rationale: בשר is specifically 'flesh,' not merely 'body.' Retaining 'flesh' preserves the gruesome concreteness of the judgment oracle.
