id: 2KI.9.35
reference: 2 Kings 9:35
source:
  edition: WLC
  text: וַ/יֵּלְכ֖וּ לְ/קָבְרָ֑/הּ וְ/לֹא מָ֣צְאוּ בָ֗/הּ כִּ֧י אִם הַ/גֻּלְגֹּ֛לֶת
    וְ/הָ/רַגְלַ֖יִם וְ/כַפּ֥וֹת הַ/יָּדָֽיִם־־׃
translation:
  text: So they went to bury her, but they found nothing of her except the skull,
    the feet, and the palms of the hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but they found nothing in her except the skull, the feet, and the palms
      of the hands.' The Hebrew expression with 'in her' is idiomatic in context for
      what remained of her body.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: So they went
  alternatives:
  - Then they went
  - And they went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך advances the narrative. 'So they went' gives natural
    English narrative flow while preserving the sequential force.
- source_word: לְקָבְרָהּ
  chosen: to bury her
  alternatives:
  - to bury it/her remains
  lexicon: HALOT
  rationale: Infinitive construct of קבר with 3fs suffix refers to Jezebel. English
    idiom prefers 'to bury her' rather than a more wooden 'for burying her.'
- source_word: וְלֹא מָצְאוּ בָהּ
  chosen: but they found nothing of her
  alternatives:
  - and they did not find in her
  - but they found nothing in her
  lexicon: HALOT
  rationale: The adversative sense fits the context after their intent to bury her.
    בָהּ is idiomatically rendered with reference to what remained of her body; 'nothing
    of her' is clearer in English than the overly literal 'in her.'
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - save
  lexicon: HALOT
  rationale: The paired particles form an exceptive expression. 'Except' is the most
    natural concise rendering in modern English.
- source_word: הַגֻּלְגֹּלֶת
  chosen: the skull
  alternatives:
  - the head
  - the cranium
  lexicon: HALOT
  rationale: גֻּלְגֹּלֶת denotes skull rather than the whole head in this context
    of bodily remains. 'Skull' preserves the starkness of the scene.
- source_word: וְהָרַגְלַיִם
  chosen: the feet
  alternatives:
  - the legs
  lexicon: HALOT
  rationale: רַגְלַיִם commonly means 'feet' (dual form). 'Feet' is the straightforward
    anatomical sense here.
- source_word: וְכַפּוֹת הַיָּדָיִם
  chosen: the palms of the hands
  alternatives:
  - the hands
  - the soles of the hands
  lexicon: HALOT
  rationale: כַּף refers to the palm or hollow of the hand. Rendering the phrase as
    'the palms of the hands' preserves the specificity of the Hebrew better than simply
    'the hands.'
