id: 2KI.9.22
reference: 2 Kings 9:22
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ/רְא֤וֹת יְהוֹרָם֙ אֶת יֵה֔וּא וַ/יֹּ֖אמֶר הֲ/שָׁל֣וֹם יֵה֑וּא
    וַ/יֹּ֨אמֶר֙ מָ֣ה הַ/שָּׁל֔וֹם עַד זְנוּנֵ֞י אִיזֶ֧בֶל אִמְּ/ךָ֛ וּ/כְשָׁפֶ֖י/הָ
    הָ/רַבִּֽים־־׃
translation:
  text: And it happened, when Jehoram saw Jehu, that he said, “Is it peace, Jehu?”
    And he said, “What peace can there be, so long as the prostitutions of Jezebel
    your mother and her many sorceries continue?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whorings of Jezebel your mother.' The Hebrew term can carry both
      literal and figurative overtones, including moral and cultic unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'What peace?' The Hebrew repeats 'peace' from Jehoram's question for
      rhetorical effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּרְאוֹת
  chosen: And it happened, when ... saw
  alternatives:
  - When ... saw
  - And when ... saw
  lexicon: HALOT
  rationale: The Hebrew narrative formula וַיְהִי + infinitive construct is retained
    in a natural but still formally transparent way. 'And it happened, when' preserves
    the sequential narrative feel without excessive paraphrase.
- source_word: הֲשָׁלוֹם
  chosen: Is it peace
  alternatives:
  - Is it well
  - Do you come in peace
  lexicon: HALOT
  rationale: שָׁלוֹם here is the standard greeting/inquiry about peaceful intent.
    'Is it peace' keeps the Hebrew noun explicit and prepares for Jehu's wordplay
    in the reply with מָה הַשָּׁלוֹם.
- source_word: מָה הַשָּׁלוֹם
  chosen: What peace can there be
  alternatives:
  - What peace
  - How can there be peace
  lexicon: HALOT
  rationale: The phrase is rhetorical, denying the possibility of peace under present
    conditions. 'What peace can there be' communicates the force in idiomatic English
    while preserving the repeated noun 'peace.'
- source_word: עַד
  chosen: so long as
  alternatives:
  - while
  - until
  lexicon: HALOT
  rationale: In context עַד introduces the continuing condition that makes peace impossible.
    'So long as' best captures the durative sense rather than a simple temporal 'until.'
- source_word: זְנוּנֵי
  chosen: the prostitutions
  alternatives:
  - the whorings
  - the harlotries
  - the sexual immoralities
  lexicon: HALOT
  rationale: The plural noun often carries both literal and figurative force, especially
    in prophetic and royal-apostasy contexts. 'Prostitutions' preserves the shocking
    metaphor and can encompass Jezebel's moral and cultic unfaithfulness without flattening
    it to a generic abstraction.
- source_word: אִיזֶבֶל אִמְּךָ
  chosen: Jezebel your mother
  alternatives:
  - your mother Jezebel
  lexicon: HALOT
  rationale: A straightforward rendering of the construct plus apposition/pronominal
    suffix, preserving the accusatory directness of Jehu's response.
- source_word: וּכְשָׁפֶיהָ
  chosen: and her sorceries
  alternatives:
  - and her witchcrafts
  - and her acts of sorcery
  lexicon: HALOT
  rationale: כֶּשֶׁף refers to sorcery/magical practices. 'Sorceries' is clear modern
    English and preserves the plural form.
- source_word: הָרַבִּים
  chosen: many
  alternatives:
  - numerous
  - abundant
  lexicon: HALOT
  rationale: The adjective intensifies the extent of Jezebel's sorceries. 'Many' is
    simple and natural.
