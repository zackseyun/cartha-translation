theological_decisions:
- issue: Whether זְנוּנֵי should be rendered literally or softened to a more general
    moral/religious term
  chosen_reading: Rendered literally as 'prostitutions'
  alternative_readings:
  - whorings
  - harlotries
  - sexual immoralities
  - idolatries
  rationale: The Hebrew uses a deliberately shocking term that in this historical-theological
    context likely carries both sexual/moral and cultic overtones. A literal rendering
    preserves the prophetic rhetoric and avoids importing a narrower interpretive
    gloss such as 'idolatries' into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether שָׁלוֹם should be translated as 'peace' or generalized as 'well-being'/'safety'
  chosen_reading: Rendered consistently as 'peace' in both occurrences
  alternative_readings:
  - well-being
  - all well
  rationale: Keeping 'peace' in both Jehoram's question and Jehu's reply preserves
    the lexical repetition and rhetorical contrast in the Hebrew. A more idiomatic
    but varied rendering would obscure the wordplay.
  doctrine_reference: Translation philosophy §§1, 5
