theological_decisions:
- issue: Interpretation of Jezebel's address 'Zimri, murderer of his master'
  chosen_reading: Treat as a sarcastic taunt identifying Jehu with the earlier usurper
    Zimri rather than as a literal naming.
  alternative_readings:
  - 'Render more woodenly without signaling the taunt: ''Is it peace, Zimri, killer
    of his master?'''
  rationale: The Hebrew apposition naturally allows Jezebel to mock Jehu by comparing
    him to Zimri (1 Kgs 16), who assassinated his master. The translation preserves
    the allusive insult without overexplaining it in the main text.
