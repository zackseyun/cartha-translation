id: 2KI.9.31
reference: 2 Kings 9:31
source:
  edition: WLC
  text: וְ/יֵה֖וּא בָּ֣א בַ/שָּׁ֑עַר וַ/תֹּ֣אמֶר הֲ/שָׁל֔וֹם זִמְרִ֖י הֹרֵ֥ג אֲדֹנָֽי/ו׃
translation:
  text: As Jehu came into the gate, she said, “Is it peace, Zimri, murderer of his
    master?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jezebel calls Jehu 'Zimri' as a taunt, comparing him to Zimri, who killed
      his master and seized the throne (see 1 Kings 16:9–20).
    reason: cross_reference
  - marker: b
    text: Or 'Is all well?'
    reason: lexical_alternative
  - marker: c
    text: Literally 'killer of his master.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  chosen: came into
  alternatives:
  - entered
  - came
  lexicon: HALOT
  rationale: The verb means 'came' or 'entered.' With the following prepositional
    phrase 'into the gate,' 'came into' is natural modern English and preserves the
    motion toward/into the city gate area.
- source_word: בַשָּׁעַר
  chosen: the gate
  alternatives:
  - the city gate
  - the entrance
  lexicon: HALOT
  rationale: שַׁעַר is literally 'gate,' often the city gate. The simple 'the gate'
    stays close to the Hebrew while remaining clear in context.
- source_word: וַתֹּאמֶר
  chosen: she said
  alternatives:
  - and she said
  lexicon: HALOT
  rationale: The feminine singular verb refers to Jezebel from the context. English
    requires the explicit pronoun for clarity.
- source_word: הֲשָׁלוֹם
  chosen: Is it peace
  alternatives:
  - Is all well
  - Do you come in peace
  - Is it well
  lexicon: HALOT
  rationale: שָׁלוֹם here is the standard inquiry about well-being/peace. 'Is it peace'
    preserves the terse, idiomatic force and the rhetorical sharpness of Jezebel's
    question better than a smoother paraphrase.
- source_word: זִמְרִי
  chosen: Zimri
  rationale: Personal names are transliterated by standard convention. Jezebel uses
    'Zimri' as a taunt, alluding to the earlier usurper who killed his master.
- source_word: הֹרֵג
  chosen: murderer of
  alternatives:
  - killer of
  - slayer of
  - who killed
  lexicon: HALOT
  rationale: The participle literally means 'killing' or 'killer.' In this taunting
    apposition to 'Zimri,' 'murderer of' captures the accusatory force in idiomatic
    English.
- source_word: אֲדֹנָיו
  chosen: his master
  alternatives:
  - his lord
  lexicon: HALOT
  rationale: אדון commonly means 'lord' or 'master.' Here it refers to a human superior/king,
    so 'master' avoids confusion with the divine title 'Lord' and fits the historical
    allusion.
