id: 2KI.9.15
reference: 2 Kings 9:15
source:
  edition: WLC
  text: וַ/יָּשָׁב֩ יְהוֹרָ֨ם הַ/מֶּ֜לֶךְ לְ/הִתְרַפֵּ֣א בִ/יְזְרְעֶ֗אל מִן הַ/מַּכִּים֙
    אֲשֶׁ֣ר יַכֻּ֣/הוּ אֲרַמִּ֔ים בְּ/הִלָּ֣חֲמ֔/וֹ אֶת חֲזָאֵ֖ל מֶ֣לֶךְ אֲרָ֑ם וַ/יֹּ֤אמֶר
    יֵהוּא֙ אִם יֵ֣שׁ נַפְשְׁ/כֶ֔ם אַל יֵצֵ֤א פָלִיט֙ מִן הָ/עִ֔יר לָ/לֶ֖כֶת ל/גיד
    בְּ/יִזְרְעֶֽאל־־־־־׃
translation:
  text: Now King Jehoram had returned to Jezreel to recover from the wounds that the
    Arameans had inflicted on him when he fought against Hazael king of Aram. And
    Jehu said, “If this is your mind, let no fugitive leave the city to go tell it
    in Jezreel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If this is your desire” or “If you are willing.” The Hebrew idiom is
      literally, “If there is your soul.”
    reason: lexical_alternative
  - marker: b
    text: 'Traditionally, “the Syrians.” Hebrew: “Arameans.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: had returned
  alternatives:
  - returned
  - went back
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative, but in English a past perfect fits
    the flow because the next clause explains why Jehoram was in Jezreel before Jehu
    speaks. 'Returned' is the plain sense of שוב here.
- source_word: לְהִתְרַפֵּא
  chosen: to recover
  alternatives:
  - to be healed
  - to heal himself
  lexicon: HALOT
  rationale: The hitpael of רפא here denotes recovering/healing from wounds. 'To recover'
    is idiomatic modern English and avoids implying self-healing.
- source_word: מִן הַמַּכִּים
  chosen: from the wounds
  alternatives:
  - from the blows
  - from the injuries
  lexicon: HALOT
  rationale: Though the noun can denote blows/strikes, in context it refers to battle
    injuries from which Jehoram is recuperating. 'Wounds' is the most natural contextual
    rendering.
- source_word: יַכֻּהוּ
  chosen: had inflicted on him
  alternatives:
  - had struck him
  - had wounded him
  lexicon: HALOT
  rationale: The verb נכה literally means strike/smite, but with 'wounds' as the object
    in English, 'inflicted on him' yields a natural construction while preserving
    causation.
- source_word: אֲרַמִּים
  chosen: the Arameans
  alternatives:
  - the Syrians
  lexicon: HALOT
  rationale: The Hebrew ethnonym refers to Aram and its people. 'Arameans' preserves
    the source-language historical setting better than the traditional but anachronistic
    'Syrians.'
- source_word: בְּהִלָּחֲמוֹ אֶת חֲזָאֵל
  chosen: when he fought against Hazael
  alternatives:
  - in his fighting with Hazael
  - when he was fighting Hazael
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks the circumstance/time.
    'Fought against' makes the adversarial sense explicit in natural English.
- source_word: אִם יֵשׁ נַפְשְׁכֶם
  chosen: If this is your mind
  alternatives:
  - If it is your desire
  - If you are willing
  - If it is your wish
  lexicon: HALOT
  rationale: Literally 'if there is your soul/mind,' an idiom expressing will or desire.
    'If this is your mind' stays relatively close to the Hebrew while remaining intelligible.
- source_word: פָלִיט
  chosen: fugitive
  alternatives:
  - escapee
  - survivor
  - one who escapes
  lexicon: HALOT
  rationale: The noun denotes one who escapes. 'Fugitive' is concise and fits the
    military-political context of preventing news from escaping the city.
- source_word: לָלֶכֶת לְהַגִּיד
  chosen: to go tell it
  alternatives:
  - to go and report
  - to go announce it
  lexicon: HALOT
  rationale: 'The paired infinitives express purpose: leaving the city in order to
    report the news. ''Tell it'' is direct and natural; the object ''it'' is implied
    by context and idiomatic in English.'
- source_word: בְּיִזְרְעֶאל
  chosen: in Jezreel
  alternatives:
  - at Jezreel
  lexicon: HALOT
  rationale: The preposition ב is locative here. 'In Jezreel' is the most straightforward
    rendering for the destination of the report.
