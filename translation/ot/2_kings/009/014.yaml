id: 2KI.9.14
reference: 2 Kings 9:14
source:
  edition: WLC
  text: וַ/יִּתְקַשֵּׁ֗ר יֵה֛וּא בֶּן יְהוֹשָׁפָ֥ט בֶּן נִמְשִׁ֖י אֶל יוֹרָ֑ם וְ/יוֹרָם֩
    הָיָ֨ה שֹׁמֵ֜ר בְּ/רָמֹ֣ת גִּלְעָ֗ד ה֚וּא וְ/כָל יִשְׂרָאֵ֔ל מִ/פְּנֵ֥י חֲזָאֵ֖ל
    מֶֽלֶךְ אֲרָֽם־־־־־׃
translation:
  text: So Jehu son of Jehoshaphat, son of Nimshi, conspired against Joram. Now Joram
    had been guarding Ramoth-gilead, he and all Israel, because of Hazael king of
    Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was keeping watch at Ramoth-gilead.' The Hebrew verb can denote guarding,
      watching, or defending in a military setting.
    reason: lexical_alternative
  - marker: b
    text: That is, the kingdom/forces of Israel; the text literally says 'all Israel.'
    reason: cultural_note
  - marker: c
    text: 'Traditionally ''Syria''; Hebrew: ''Aram.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְקַשֵּׁר
  chosen: conspired against
  alternatives:
  - formed a conspiracy against
  - bound himself against
  lexicon: HALOT
  rationale: The hitpael of קשר in this context denotes entering into a conspiracy
    or plotting revolt. 'Conspired against' is idiomatic modern English and preserves
    the hostile political sense signaled by אֶל with Joram as the target.
- source_word: בֶּן ... בֶּן
  chosen: son of ... son of
  alternatives:
  - descendant of ... descendant of
  lexicon: HALOT
  rationale: The repeated בן gives Jehu's immediate and grand paternal lineage. 'Son
    of ... son of' is the natural formal rendering and preserves the genealogical
    specificity.
- source_word: אֶל יוֹרָם
  chosen: against Joram
  alternatives:
  - concerning Joram
  - toward Joram
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' with קשר in conspiracy contexts
    it marks the object of the plot. English requires 'against' to make the adversative
    force clear.
- source_word: הָיָה שֹׁמֵר
  chosen: had been guarding
  alternatives:
  - was keeping watch at
  - was defending
  lexicon: HALOT
  rationale: The qatal + participle construction gives backgrounded past action. 'Had
    been guarding' fits the narrative flow by supplying the circumstance in which
    Jehu's conspiracy arose. 'Guarding' preserves the military watch/defense sense
    of שמר.
- source_word: בְּרָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth in Gilead
  lexicon: HALOT
  rationale: The place name is conventionally represented in English as 'Ramoth-gilead.'
    This is a transliterated toponym rather than a translated phrase.
- source_word: הוּא וְכָל יִשְׂרָאֵל
  chosen: he and all Israel
  alternatives:
  - he and all the army of Israel
  - he and all Israel with him
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'he and all Israel.' In this military context
    it refers to Israel's forces under the king, but the text itself uses the national
    designation, so the translation preserves it without narrowing the referent in
    the main text.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - against
  - for fear of
  - in the face of
  lexicon: HALOT
  rationale: Here מִפְּנֵי introduces the reason or occasion for the guarding action
    in relation to Hazael's threat. 'Because of' is clear and natural; 'in the face
    of' is possible but less direct.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: Following original-language primacy, אֲרָם is rendered 'Aram' rather
    than the traditional but historically later 'Syria.' This preserves the Hebrew
    ethnogeographic term.
