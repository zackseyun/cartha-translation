id: 2KI.9.37
reference: 2 Kings 9:37
source:
  edition: WLC
  text: ו/הית נִבְלַ֣ת אִיזֶ֗בֶל כְּ/דֹ֛מֶן עַל פְּנֵ֥י הַ/שָּׂדֶ֖ה בְּ/חֵ֣לֶק יִזְרְעֶ֑אל
    אֲשֶׁ֥ר לֹֽא יֹאמְר֖וּ זֹ֥את אִיזָֽבֶל־־׃פ
translation:
  text: And Jezebel’s corpse will be like dung on the surface of the field in the
    territory of Jezreel, so that they will not say, “This is Jezebel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the plot of Jezreel.” The Hebrew חֵלֶק can denote a specific tract
      or parcel of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And ... will be
  alternatives:
  - and it shall be
  - and it became
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context functions
    futuristically, continuing the prior oracle; English future best reflects the
    sense here.
- source_word: נִבְלַת
  chosen: corpse
  alternatives:
  - carcass
  - dead body
  lexicon: HALOT
  rationale: The noun denotes a dead body/carcass. 'Corpse' is natural modern English
    and preserves the grim force without sounding overly zoological.
- source_word: אִיזֶבֶל
  chosen: Jezebel
  rationale: Personal name is transliterated per translation philosophy.
- source_word: כְּדֹמֶן
  chosen: like dung
  alternatives:
  - as manure
  - like refuse
  lexicon: HALOT
  rationale: דֹּמֶן refers to dung/manure. 'Like dung' is the most direct and vivid
    comparison, matching the Hebrew simile.
- source_word: עַל־פְּנֵי הַשָּׂדֶה
  chosen: on the surface of the field
  alternatives:
  - on the face of the field
  - upon the open field
  lexicon: HALOT
  rationale: Literally 'on the face of the field.' 'On the surface of the field' preserves
    the spatial image in idiomatic English.
- source_word: בְּחֵלֶק יִזְרְעֶאל
  chosen: in the territory of Jezreel
  alternatives:
  - in the plot of Jezreel
  - in the portion of Jezreel
  lexicon: HALOT
  rationale: חֵלֶק can mean portion, tract, or plot of land. 'Territory' communicates
    a land-area naturally in English; 'plot' is possible but may sound too narrow
    here.
- source_word: אֲשֶׁר לֹא יֹאמְרוּ
  chosen: so that they will not say
  alternatives:
  - such that no one will say
  - where they will not say
  lexicon: HALOT
  rationale: 'The relative particle introduces result here: her remains will be so
    unrecognizable that people cannot identify them. ''So that they will not say''
    captures that result.'
- source_word: זֹאת אִיזָבֶל
  chosen: This is Jezebel
  alternatives:
  - This is that Jezebel
  - Here is Jezebel
  lexicon: HALOT
  rationale: Simple deictic identification formula; straightforward English is best.
