id: 2KI.9.23
reference: 2 Kings 9:23
source:
  edition: WLC
  text: וַ/יַּהֲפֹ֧ךְ יְהוֹרָ֛ם יָדָ֖י/ו וַ/יָּנֹ֑ס וַ/יֹּ֥אמֶר אֶל אֲחַזְיָ֖הוּ מִרְמָ֥ה
    אֲחַזְיָֽה־׃
translation:
  text: Then Jehoram turned his hands and fled, and said to Ahaziah, “Treachery, Ahaziah!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “turned about his hands”; the expression likely refers to turning the
      chariot by the use of his hands, but the Hebrew does not explicitly mention
      reins or chariot here.
    reason: lexical_alternative
  - marker: b
    text: Or “Deceit, Ahaziah!”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  chosen: turned
  alternatives:
  - reined around
  - turned about
  - wheeled around
  lexicon: HALOT
  rationale: The verb הפך literally means 'turn/overturn.' In this chariot-flight
    context, English 'turned' is the most natural core rendering without over-specifying
    the vehicle. More interpretive options like 'reined around' or 'wheeled around'
    fit the scene but go beyond the explicit wording.
- source_word: יָדָיו
  chosen: his hands
  alternatives:
  - his hand
  - the reins
  lexicon: HALOT
  rationale: The Hebrew is literally 'his hands' (plural with 3ms suffix). Retaining
    'hands' preserves the concrete expression. In context it likely refers to handling
    the reins, but translating 'reins' would import an implied object not present
    in the text.
- source_word: וַיָּנֹס
  chosen: fled
  alternatives:
  - escaped
  - ran away
  lexicon: HALOT
  rationale: A standard rendering of נוס in narrative flight contexts. 'Fled' is concise
    and suitably urgent.
- source_word: מִרְמָה
  chosen: Treachery
  alternatives:
  - deceit
  - betrayal
  - treason
  lexicon: HALOT
  rationale: מִרְמָה denotes deceit or treachery. Here it is an alarmed exclamation
    in response to Jehu's hostile action. 'Treachery' best captures the sharp, accusatory
    force in idiomatic English. 'Treason' is possible in a royal setting but is more
    politically specific than the Hebrew requires.
- source_word: אֲחַזְיָהוּ / אֲחַזְיָה
  chosen: Ahaziah
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The verse addresses Ahaziah directly at the end.
- source_word: וַיֹּאמֶר אֶל אֲחַזְיָהוּ ... אֲחַזְיָה
  chosen: said to Ahaziah, “Treachery, Ahaziah!”
  alternatives:
  - said to Ahaziah, “Deceit, Ahaziah!”
  lexicon: HALOT
  rationale: The syntax presents direct speech addressed to Ahaziah, with his name
    repeated vocatively after the exclamation. Preserving the repetition reflects
    the Hebrew's urgency and direct address.
