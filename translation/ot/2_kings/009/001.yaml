id: 2KI.9.1
reference: 2 Kings 9:1
source:
  edition: WLC
  text: וֶ/אֱלִישָׁע֙ הַ/נָּבִ֔יא קָרָ֕א לְ/אַחַ֖ד מִ/בְּנֵ֣י הַ/נְּבִיאִ֑ים וַ/יֹּ֨אמֶר
    ל֜/וֹ חֲגֹ֣ר מָתְנֶ֗י/ךָ וְ֠/קַח פַּ֣ךְ הַ/שֶּׁ֤מֶן הַ/זֶּה֙ בְּ/יָדֶ֔/ךָ וְ/לֵ֖ךְ
    רָמֹ֥ת גִּלְעָֽד׃
translation:
  text: Then Elisha the prophet called one of the sons of the prophets and said to
    him, “Tuck up your cloak, take this flask of oil in your hand, and go to Ramoth-gilead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “Gird up your loins,” an idiom meaning to prepare for action
      or travel by tucking up one’s garments.
    reason: lexical_alternative
  - marker: b
    text: “Sons of the prophets” refers to members of a prophetic group or guild,
      not necessarily biological sons.
    reason: cultural_note
lexical_decisions:
- source_word: וֶאֱלִישָׁע
  chosen: Then Elisha
  alternatives:
  - And Elisha
  - Now Elisha
  lexicon: HALOT
  rationale: The prefixed conjunction commonly advances the narrative. 'Then' gives
    natural English narrative flow while preserving sequential force; 'Elisha' is
    transliterated as a personal name per philosophy.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite appositional title identifying Elisha's role; straightforwardly
    rendered 'the prophet'.
- source_word: קָרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: Basic sense is 'call.' 'Called' is sufficiently natural and does not
    overstate the force as 'summoned' might.
- source_word: לְאַחַד
  chosen: one
  alternatives:
  - one man
  lexicon: HALOT
  rationale: The phrase means 'to one' or 'one of.' English idiom requires 'one of'
    with the following partitive phrase.
- source_word: מִבְּנֵי הַנְּבִיאִים
  chosen: of the sons of the prophets
  alternatives:
  - of the prophetic disciples
  - of the company of prophets
  lexicon: HALOT
  rationale: Formally the Hebrew reads 'sons of the prophets,' a recognized expression
    for members of a prophetic guild. The main text preserves the idiom for transparency;
    more interpretive alternatives are possible but less formally aligned.
- source_word: וַיֹּאמֶר לוֹ
  chosen: and said to him
  alternatives:
  - and told him
  lexicon: HALOT
  rationale: Standard narrative speech introduction; 'said to him' is the most direct
    rendering.
- source_word: חֲגֹר מָתְנֶיךָ
  chosen: Tuck up your cloak
  alternatives:
  - Gird up your loins
  - Prepare yourself for action
  lexicon: HALOT
  rationale: Literally 'gird your loins.' Because the idiom refers to tucking garments
    up for readiness or rapid movement, 'Tuck up your cloak' preserves the concrete
    image in readable modern English. The more literal traditional form is preserved
    in a footnote.
- source_word: וְקַח
  chosen: take
  lexicon: HALOT
  rationale: Simple imperative with no need for expansion.
- source_word: פַּךְ הַשֶּׁמֶן הַזֶּה
  chosen: this flask of oil
  alternatives:
  - this vial of oil
  - this jar of oil
  lexicon: HALOT
  rationale: פַּךְ denotes a small flask or vial, especially suitable for oil. 'Flask'
    is natural modern English and fits the likely vessel better than the broader 'jar'.
- source_word: בְּיָדֶךָ
  chosen: in your hand
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The Hebrew is concrete and should be preserved rather than generalized
    to 'with you.'
- source_word: וְלֵךְ
  chosen: and go
  alternatives:
  - then go
  lexicon: HALOT
  rationale: Direct imperative continuation.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, commonly hyphenated.
