id: 2KI.9.13
reference: 2 Kings 9:13
source:
  edition: WLC
  text: וַֽ/יְמַהֲר֗וּ וַ/יִּקְחוּ֙ אִ֣ישׁ בִּגְד֔/וֹ וַ/יָּשִׂ֥ימוּ תַחְתָּ֖י/ו אֶל
    גֶּ֣רֶם הַֽ/מַּעֲל֑וֹת וַֽ/יִּתְקְעוּ֙ בַּ/שּׁוֹפָ֔ר וַ/יֹּאמְר֖וּ מָלַ֥ךְ יֵהֽוּא־׃
translation:
  text: Then they hurried, and each man took his garment and put it under him on the
    bare steps, and they blew the ram's horn and said, “Jehu has become king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on the top of the steps” or “on the stairway landing”; the Hebrew expression
      is rare and its precise sense is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn used for signaling; traditionally rendered “trumpet.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֲרוּ
  chosen: Then they hurried
  alternatives:
  - So they hurried
  - They quickly
  lexicon: HALOT
  rationale: The verb from מהר denotes acting quickly or hastening. 'Then they hurried'
    preserves the narrative sequence of the waw-consecutive and the sense of immediate
    response.
- source_word: אִישׁ בִּגְדוֹ
  chosen: each man took his garment
  alternatives:
  - every man took his cloak
  - each took his outer garment
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man' here. בגד commonly refers to a
    garment or cloak. 'Garment' is broad and natural English, while retaining the
    individual action.
- source_word: וַיָּשִׂימוּ תַחְתָּיו
  chosen: put it under him
  alternatives:
  - placed it beneath him
  - spread it under him
  lexicon: HALOT
  rationale: The object is each man's garment, and תחתיו most naturally refers to
    Jehu in this enthronement-like gesture. 'Put it under him' is straightforward
    and avoids overinterpreting the exact manner of arranging the garments.
- source_word: אֶל גֶּרֶם הַמַּעֲלוֹת
  chosen: on the bare steps
  alternatives:
  - on the top step
  - on the stairway landing
  - on the bared steps
  lexicon: HALOT
  rationale: גרם is a difficult term, often understood as the bare surface/back/top
    of the steps or stairway. Given the context of spreading garments on a stair approach,
    'on the bare steps' best captures the likely sense in idiomatic English while
    acknowledging lexical uncertainty.
- source_word: וַיִּתְקְעוּ בַּשּׁוֹפָר
  chosen: they blew the ram's horn
  alternatives:
  - they blew the trumpet
  - they sounded the shofar
  lexicon: HALOT
  rationale: שופר is specifically a horn instrument, often a ram's horn. 'Ram's horn'
    communicates the concrete referent better than the more generic 'trumpet'; 'shofar'
    is possible but less immediately accessible in running text.
- source_word: מָלַךְ יֵהוּא
  chosen: Jehu has become king
  alternatives:
  - Jehu is king
  - Jehu reigns
  - Jehu has been made king
  lexicon: HALOT
  rationale: The perfect verb marks Jehu's accession as accomplished. 'Has become
    king' reflects the eventive force better than the flatter 'is king,' while remaining
    natural in English.
