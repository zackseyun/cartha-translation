id: 2KI.9.30
reference: 2 Kings 9:30
source:
  edition: WLC
  text: וַ/יָּב֥וֹא יֵה֖וּא יִזְרְעֶ֑אלָ/ה וְ/אִיזֶ֣בֶל שָׁמְעָ֗ה וַ/תָּ֨שֶׂם בַּ/פּ֤וּךְ
    עֵינֶ֨י/הָ֙ וַ/תֵּ֣יטֶב אֶת רֹאשָׁ֔/הּ וַ/תַּשְׁקֵ֖ף בְּעַ֥ד הַ/חַלּֽוֹן־׃
translation:
  text: When Jehu came to Jezreel, Jezebel heard of it. She painted her eyes with
    kohl, adorned her head, and looked out through the window.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'she put kohl on her eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'arranged her hair'; the Hebrew literally says 'made her head good/beautiful.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: הלך/בוא motion verb here introduces Jehu's arrival at Jezreel. 'Came'
    is natural English and preserves the narrative movement without over-specifying
    'entered.'
- source_word: יִזְרְעֶאלָה
  chosen: to Jezreel
  alternatives:
  - Jezreel-ward
  - into Jezreel
  lexicon: HALOT
  rationale: The directional he marks motion toward the place. English idiom is best
    represented by 'to Jezreel.'
- source_word: שָׁמְעָה
  chosen: heard of it
  alternatives:
  - heard
  - got word
  lexicon: HALOT
  rationale: The verb 'heard' has an implied object from context, namely Jehu's arrival.
    'Heard of it' makes the implicit object explicit in idiomatic English without
    adding new information.
- source_word: וַתָּשֶׂם בַּפּוּךְ עֵינֶיהָ
  chosen: painted her eyes with kohl
  alternatives:
  - put kohl on her eyes
  - painted her eyes
  lexicon: HALOT
  rationale: פּוּךְ refers specifically to a dark cosmetic, traditionally antimony/kohl,
    applied to the eyes. 'Painted her eyes with kohl' preserves the concrete cultural
    practice better than the vaguer 'painted her face.'
- source_word: וַתֵּיטֶב אֶת רֹאשָׁהּ
  chosen: adorned her head
  alternatives:
  - arranged her hair
  - made her head beautiful
  lexicon: HALOT
  rationale: The idiom literally says 'made her head good/beautiful.' In context it
    refers to grooming or arranging the head/hair. 'Adorned her head' keeps the broader
    Hebrew expression without narrowing it too specifically to hair alone.
- source_word: וַתַּשְׁקֵף
  chosen: looked out
  alternatives:
  - peered out
  - gazed out
  lexicon: HALOT
  rationale: The verb denotes looking out/down from an elevated opening. 'Looked out'
    is straightforward and fits the scene.
- source_word: בְּעַד הַחַלּוֹן
  chosen: through the window
  alternatives:
  - from the window
  - at the window
  lexicon: HALOT
  rationale: בְּעַד commonly means 'through' in this construction. 'Through the window'
    best matches the spatial sense of looking out from behind/through the opening.
