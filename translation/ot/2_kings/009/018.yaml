id: 2KI.9.18
reference: 2 Kings 9:18
source:
  edition: WLC
  text: וַ/יֵּלֶךְ֩ רֹכֵ֨ב הַ/סּ֜וּס לִ/קְרָאת֗/וֹ וַ/יֹּ֨אמֶר֙ כֹּֽה אָמַ֤ר הַ/מֶּ֨לֶךְ֙
    הֲ/שָׁל֔וֹם וַ/יֹּ֧אמֶר יֵה֛וּא מַה לְּ/ךָ֥ וּ/לְ/שָׁל֖וֹם סֹ֣ב אֶֽל אַחֲרָ֑/י
    וַ/יַּגֵּ֤ד הַ/צֹּפֶה֙ לֵ/אמֹ֔ר בָּֽא הַ/מַּלְאָ֥ךְ עַד הֵ֖ם וְ/לֹֽא שָֽׁב־־־־־־׃
translation:
  text: 'So the horseman went to meet him and said, “Thus says the king: Is it peace?”
    But Jehu said, “What do you have to do with peace? Turn behind me.” And the watchman
    reported, saying, “The messenger reached them, but he has not returned.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Is all well?” The Hebrew uses shalom, repeated throughout the exchange.
    reason: lexical_alternative
  - marker: b
    text: Or “Fall in behind me.” The Hebrew literally says “Turn behind me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹכֵב הַסּוּס
  chosen: the horseman
  alternatives:
  - the rider of the horse
  - the chariotman
  lexicon: HALOT
  rationale: The phrase literally means 'rider of the horse.' In idiomatic English,
    'the horseman' is the natural equivalent and fits the military-messenger context.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - toward him
  - to encounter him
  lexicon: HALOT
  rationale: The infinitive with preposition expresses movement to meet someone. 'To
    meet him' is the clearest natural rendering.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  chosen: Thus says the king
  alternatives:
  - This is what the king says
  lexicon: HALOT
  rationale: This is a standard messenger formula. 'Thus says' preserves the formal
    royal speech pattern without sounding archaic beyond normal biblical style.
- source_word: הֲשָׁלוֹם
  chosen: Is it peace?
  alternatives:
  - Is all well?
  - Peace?
  lexicon: HALOT
  rationale: שָׁלוֹם here asks about well-being or peaceful conditions. 'Is it peace?'
    preserves the repeated keyword in the exchange, which is important for the narrative
    rhetoric. A smoother English alternative is preserved in a footnote.
- source_word: מַה לְּךָ וּלְשָׁלוֹם
  chosen: What do you have to do with peace?
  alternatives:
  - What is peace to you?
  - What have you to do with peace?
  lexicon: HALOT
  rationale: This idiom dismisses the messenger's concern with the matter of peace.
    The chosen rendering communicates the rebuff clearly while retaining the repeated
    term 'peace.'
- source_word: סֹב אֶל אַחֲרָי
  chosen: Turn behind me
  alternatives:
  - Fall in behind me
  - Turn and follow me
  lexicon: HALOT
  rationale: Literally, Jehu commands the rider to turn to/behind him. 'Turn behind
    me' stays close to the Hebrew while remaining intelligible. The more idiomatic
    military sense 'fall in behind me' is preserved in a footnote.
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the lookout
  - the sentinel
  lexicon: HALOT
  rationale: The participial noun denotes one who watches from a vantage point. 'Watchman'
    is the standard and most recognizable narrative term.
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the envoy
  - the angel
  lexicon: HALOT
  rationale: In this historical narrative context, מַלְאָךְ refers to a human messenger,
    not an angelic being. 'Messenger' avoids confusion.
- source_word: בָּא ... עַד הֵם
  chosen: reached them
  alternatives:
  - came as far as them
  - came up to them
  lexicon: HALOT
  rationale: The expression means the messenger arrived up to their location. 'Reached
    them' is concise and natural English.
- source_word: וְלֹא שָׁב
  chosen: but he has not returned
  alternatives:
  - and he did not return
  - but he did not come back
  lexicon: HALOT
  rationale: The clause reports the observable result from the watchman's perspective.
    'Has not returned' reads naturally in English narrative while conveying the same
    sense.
