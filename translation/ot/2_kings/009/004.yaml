id: 2KI.9.4
reference: 2 Kings 9:4
source:
  edition: WLC
  text: וַ/יֵּ֧לֶךְ הַ/נַּ֛עַר הַ/נַּ֥עַר הַ/נָּבִ֖יא רָמֹ֥ת גִּלְעָֽד׃
translation:
  text: So the young man, the young prophet, went to Ramoth-gilead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''the young man'' for emphasis: ''the young man, the young
      prophet.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So ... went
  alternatives:
  - and ... went
  - then ... went
  lexicon: HALOT
  rationale: The waw-consecutive on הלך advances the narrative. 'So ... went' gives
    natural English narrative flow while preserving the sequential sense.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the servant
  - the attendant
  - the youth
  lexicon: HALOT
  rationale: נַעַר commonly denotes a young man or youth; in this context it identifies
    the messenger sent by Elisha. 'Young man' is the most natural and sufficiently
    specific rendering.
- source_word: הַנַּעַר הַנָּבִיא
  chosen: the young prophet
  alternatives:
  - the prophet's young man
  - the servant-prophet
  - the young man, the prophet
  lexicon: HALOT
  rationale: The repeated הַנַּעַר followed by הַנָּבִיא is appositional/emphatic.
    Rendering it as 'the young man, the young prophet' preserves the repetition and
    clarifies that he is a prophetic messenger, not merely a generic youth.
- source_word: רָמֹת גִּלְעָד
  chosen: Ramoth-gilead
  alternatives:
  - Ramoth Gilead
  lexicon: HALOT
  rationale: This is a place name and should be transliterated. The hyphenated conventional
    English form clearly represents the compound toponym.
