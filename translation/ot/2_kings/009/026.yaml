id: 2KI.9.26
reference: 2 Kings 9:26
source:
  edition: WLC
  text: אִם לֹ֡א אֶת דְּמֵ֣י נָבוֹת֩ וְ/אֶת דְּמֵ֨י בָנָ֜י/ו רָאִ֤יתִי אֶ֨מֶשׁ֙ נְאֻם
    יְהוָ֔ה וְ/שִׁלַּמְתִּ֥י לְ/ךָ֛ בַּ/חֶלְקָ֥ה הַ/זֹּ֖את נְאֻם יְהוָ֑ה וְ/עַתָּ֗ה
    שָׂ֧א הַשְׁלִכֵ֛/הוּ בַּ/חֶלְקָ֖ה כִּ/דְבַ֥ר יְהוָֽה־־־־־׃
translation:
  text: ‘Surely I saw yesterday the blood of Naboth and the blood of his sons,’ declares
    the LORD, ‘and I will repay you on this plot of land,’ declares the LORD. ‘So
    now, lift him up and throw him on the plot, according to the word of the LORD.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Indeed, I saw yesterday the blood of Naboth and the blood of his sons.'
      The opening Hebrew idiom is an emphatic oath-like assertion.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - Indeed
  - If not
  lexicon: HALOT
  rationale: The idiom אִם לֹא functions here as a strong asseveration/oath-like affirmation
    rather than a conditional clause. 'Surely' captures the emphatic force in natural
    English.
- source_word: דְּמֵי
  chosen: blood
  alternatives:
  - bloodshed
  lexicon: HALOT
  rationale: Plural construct 'bloods of' is a Hebrew idiom for bloodguilt or violent
    death. English normally renders this as singular 'blood' while preserving the
    sense of shed blood.
- source_word: נָבוֹת
  chosen: Naboth
  rationale: Personal name transliterated by standard English convention.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not the more general 'children.'
    Gender-accurate rendering is preferred.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: Qal perfect 1cs. In prophetic/judicial speech, simple past works well
    in English and fits the temporal marker 'yesterday.'
- source_word: אֶמֶשׁ
  chosen: yesterday
  alternatives:
  - last night
  lexicon: HALOT
  rationale: The adverb can refer to the previous day/night period. 'Yesterday' is
    the standard and least interpretively loaded rendering here.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is idiomatic, weighty,
    and readable. YHWH is rendered 'the LORD' per doctrine.
- source_word: וְשִׁלַּמְתִּי לְךָ
  chosen: I will repay you
  alternatives:
  - I will requite you
  - I will pay you back
  lexicon: HALOT
  rationale: The piel of שלם here conveys repayment/retribution. 'Repay you' preserves
    the judicial sense without sounding colloquial.
- source_word: בַּחֶלְקָה הַזֹּאת
  chosen: on this plot of land
  alternatives:
  - in this field
  - on this property
  lexicon: HALOT
  rationale: חֶלְקָה denotes a parcel/plot. 'Plot of land' is precise and natural,
    and suits the narrative setting of Naboth's vineyard parcel.
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now then
  lexicon: HALOT
  rationale: Marks the transition from divine pronouncement to Jehu's command. 'So
    now' reflects the consequential force in context.
- source_word: שָׂא
  chosen: lift him up
  alternatives:
  - take him up
  - pick him up
  lexicon: HALOT
  rationale: The imperative of נשׂא literally means 'lift/carry.' In context, Jehu
    commands the body to be taken up for disposal. 'Lift him up' stays close to the
    Hebrew.
- source_word: הַשְׁלִכֵהוּ
  chosen: throw him
  alternatives:
  - cast him
  - hurl him
  lexicon: HALOT
  rationale: 'Hiphil imperative with object suffix: cause him to be thrown/cast. ''Throw
    him'' is direct, natural, and fits the narrative action.'
- source_word: בַּחֶלְקָה
  chosen: on the plot
  alternatives:
  - into the plot
  - in the field
  lexicon: HALOT
  rationale: Repeats the earlier location. 'On the plot' matches the preposition and
    keeps the wording consistent.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the LORD's word
  - as the LORD said
  lexicon: HALOT
  rationale: This phrase grounds the action in fulfillment of the divine pronouncement.
    'According to the word of the LORD' preserves the formal resonance of fulfillment
    language.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD.'
