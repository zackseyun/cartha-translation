id: 2KI.9.9
reference: 2 Kings 9:9
source:
  edition: WLC
  text: וְ/נָֽתַתִּי֙ אֶת בֵּ֣ית אַחְאָ֔ב כְּ/בֵ֖ית יָרָבְעָ֣ם בֶּן נְבָ֑ט וּ/כְ/בֵ֖ית
    בַּעְשָׁ֥א בֶן אֲחִיָּֽה־־־׃
translation:
  text: And I will make the house of Ahab like the house of Jeroboam son of Nebat
    and like the house of Baasha son of Ahijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ahab’s dynasty ... Jeroboam’s dynasty ... Baasha’s dynasty.' Hebrew
      'house' here refers to a royal house or line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נָתַתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will give over
  lexicon: HALOT
  rationale: The verb נתן literally means 'give/put/set,' but in this judgment formula
    with a direct object ('the house of Ahab') and comparison clauses, idiomatic English
    is best conveyed by 'make,' i.e., 'make [it] like' the destroyed dynasties named
    afterward. This preserves the causative force without woodenly rendering 'give.'
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: Hebrew אֶת marks the definite direct object and is not represented by
    a standalone English word.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - Ahab's house
  - Ahab's dynasty
  lexicon: HALOT
  rationale: '''House'' is the standard rendering of בַּיִת in dynastic contexts and
    preserves the Hebrew metaphor. ''Dynasty'' is interpretive and therefore left
    as an alternative rather than the main text.'
- source_word: כְּ/בֵית
  chosen: like the house of
  alternatives:
  - as the house of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like the house of' is natural English
    and keeps the explicit comparison.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Personal names are transliterated, and the filial construction is rendered
    straightforwardly in modern English.
- source_word: וּ/כְ/בֵית
  chosen: and like the house of
  alternatives:
  - and as the house of
  lexicon: HALOT
  rationale: The conjunction plus comparative prefix is best rendered 'and like,'
    maintaining the parallel structure of the two comparison clauses.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  chosen: Baasha son of Ahijah
  alternatives:
  - Baasha the son of Ahijah
  lexicon: HALOT
  rationale: Names are transliterated; the filial phrase is rendered in clear modern
    English. Retaining the names preserves the historical allusion to prior judged
    dynasties.
