theological_decisions:
- issue: Rendering of dynastic judgment formula
  chosen_reading: the house of Ahab ... like the house of Jeroboam ... and like the
    house of Baasha
  alternative_readings:
  - Ahab's dynasty ... like Jeroboam's dynasty ... and Baasha's dynasty
  rationale: The verse announces covenantal-historical judgment on a royal house by
    comparison with earlier destroyed houses. Retaining 'house' preserves the biblical
    idiom and intertextual resonance without importing extra interpretation beyond
    the Hebrew.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception.'
