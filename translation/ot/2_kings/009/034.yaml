id: 2KI.9.34
reference: 2 Kings 9:34
source:
  edition: WLC
  text: וַ/יָּבֹ֖א וַ/יֹּ֣אכַל וַ/יֵּ֑שְׁתְּ וַ/יֹּ֗אמֶר פִּקְדוּ נָ֞א אֶת הָ/אֲרוּרָ֤ה
    הַ/זֹּאת֙ וְ/קִבְר֔וּ/הָ כִּ֥י בַת מֶ֖לֶךְ הִֽיא־־־׃
translation:
  text: Then he went in and ate and drank, and he said, “Please attend to this cursed
    woman and bury her, for she is a king’s daughter.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Please see to this accursed one and bury her.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then he went in
  alternatives:
  - Then he came in
  - Then he entered
  lexicon: HALOT
  rationale: The verb בוא in this narrative context refers to Jehu going into the
    house/palace after Jezebel’s death. 'Went in' is natural English and preserves
    the directional sense better than the less specific 'came in'.
- source_word: וַיֹּאכַל וַיֵּשְׁתְּ
  chosen: ate and drank
  alternatives:
  - ate and drank wine
  lexicon: HALOT
  rationale: The paired verbs are straightforward narrative wayyiqtol forms. No object
    is supplied in Hebrew, so the simple English rendering is best.
- source_word: פִּקְדוּ נָא
  chosen: Please attend to
  alternatives:
  - Please see to
  - Take care of
  - Look after
  lexicon: HALOT
  rationale: פקד here carries the sense of giving attention to or taking charge of
    a matter. In context Jehu is ordering that Jezebel’s remains be dealt with. 'Please
    attend to' preserves the imperative plus particle נָא without sounding archaic.
- source_word: הָאֲרוּרָה הַזֹּאת
  chosen: this cursed woman
  alternatives:
  - this cursed one
  - this accursed woman
  lexicon: HALOT
  rationale: The feminine singular participial/adjectival form refers to Jezebel.
    English normally requires an explicit personal referent, so 'woman' is supplied
    for clarity. 'Cursed' is more readable than 'accursed' while preserving the force
    of the Hebrew.
- source_word: וְקִבְרֻהָ
  chosen: and bury her
  alternatives:
  - and give her burial
  lexicon: HALOT
  rationale: A direct imperative with 3fs suffix; 'bury her' is the plain and natural
    rendering.
- source_word: כִּי בַת מֶלֶךְ הִיא
  chosen: for she is a king’s daughter
  alternatives:
  - for she is the daughter of a king
  - because she is a king’s daughter
  lexicon: HALOT
  rationale: The clause gives the reason for burial. The anarthrous construct is idiomatically
    rendered 'a king’s daughter,' emphasizing royal status rather than identifying
    a specific king in the wording.
