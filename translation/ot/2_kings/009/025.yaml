id: 2KI.9.25
reference: 2 Kings 9:25
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר אֶל בִּדְקַר֙ שלשה שָׂ֚א הַשְׁלִכֵ֔/הוּ בְּ/חֶלְקַ֕ת שְׂדֵ֖ה נָב֣וֹת הַ/יִּזְרְעֵאלִ֑י כִּֽי זְכֹ֞ר אֲנִ֣י וָ/אַ֗תָּה אֵ֣ת רֹכְבִ֤ים צְמָדִים֙ אַֽחֲרֵי֙ אַחְאָ֣ב אָבִ֔י/ו וַֽ/יהוָה֙ נָשָׂ֣א עָלָ֔י/ו אֶת הַ/מַּשָּׂ֖א הַ/זֶּֽה־־־׃
translation:
  text: 'Then he said to Bidkar his officer, “Lift him up and throw him onto the plot of the field of Naboth the Jezreelite, for remember: you and I were riding side by side behind Ahab his father when Yahweh laid this pronouncement against him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his third man,' possibly a technical designation for Bidkar’s rank or position.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'riding pairs'; the phrase likely means Jehu and Bidkar were riding together behind Ahab.
    reason: lexical_alternative
  - marker: c
    text: Or 'oracle' or 'burden.' The Hebrew term refers to a weighty prophetic pronouncement.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּדְקַר
  chosen: Bidkar
  rationale: Proper name; transliterated according to the translation philosophy for personal names.
- source_word: שלשה
  chosen: his officer
  alternatives:
  - third man
  - adjutant
  - captain
  lexicon: HALOT
  rationale: The ketiv/qere tradition and context indicate a designation for Bidkar rather than a numeral in a bare sense. In context Bidkar is Jehu’s aide/chariot officer, so 'his officer' communicates the role in readable English without overcommitting to a technical military rank.
- source_word: שָׂא
  chosen: Lift him up
  alternatives:
  - Take him up
  - Pick him up
  lexicon: HALOT
  rationale: Imperative of נשׂא, here in the sense of taking up/removing the corpse from the chariot before disposal.
- source_word: הַשְׁלִכֵהוּ
  chosen: throw him
  alternatives:
  - cast him
  - hurl him
  lexicon: HALOT
  rationale: Imperative with 3ms suffix from שלך; 'throw him' is direct, natural English and preserves the force of the command.
- source_word: בְּחֶלְקַת שְׂדֵה
  chosen: onto the plot of the field
  alternatives:
  - into the portion of the field
  - on the tract of land
  lexicon: HALOT
  rationale: חלקה denotes a parcel/plot; שדה specifies it as field-land. 'Plot of the field' preserves both nouns without sounding overly wooden.
- source_word: נָבוֹת הַיִּזְרְעֵאלִי
  chosen: Naboth the Jezreelite
  rationale: Standard transliteration of the personal name and gentilic.
- source_word: זְכֹר
  chosen: remember
  alternatives:
  - call to mind
  - recall
  lexicon: HALOT
  rationale: Imperative introducing the reason for the command; 'remember' is concise and idiomatic.
- source_word: רֹכְבִים צְמָדִים
  chosen: were riding side by side
  alternatives:
  - were riding in pairs
  - were team-riders
  - were riding as a pair
  lexicon: HALOT
  rationale: Literally 'riding teams/pairs.' In chariot context this likely refers to Jehu and Bidkar riding together in paired formation. 'Side by side' conveys the sense naturally in English while avoiding an opaque literalism.
- source_word: אַחֲרֵי אַחְאָב אָבִיו
  chosen: behind Ahab his father
  alternatives:
  - following Ahab his father
  lexicon: HALOT
  rationale: Spatial/attendant sense of אחרי. 'His father' refers to Joram’s father Ahab, not Bidkar’s or Jehu’s.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD.'
- source_word: נָשָׂא עָלָיו אֶת־הַמַּשָּׂא הַזֶּה
  chosen: laid this pronouncement against him
  alternatives:
  - uttered this oracle against him
  - pronounced this burden against him
  lexicon: HALOT
  rationale: מַשָּׂא can mean an utterance/oracle, often weighty or ominous. 'Pronouncement' is clear modern English; 'against him' preserves the hostile judicial sense. 'Laid' reflects נשׂא in this idiom.
