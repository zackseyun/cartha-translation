id: 2KI.9.20
reference: 2 Kings 9:20
source:
  edition: WLC
  text: וַ/יַּגֵּ֤ד הַ/צֹּפֶה֙ לֵ/אמֹ֔ר בָּ֥א עַד אֲלֵי/הֶ֖ם וְ/לֹֽא שָׁ֑ב וְ/הַ/מִּנְהָ֗ג
    כְּ/מִנְהַג֙ יֵה֣וּא בֶן נִמְשִׁ֔י כִּ֥י בְ/שִׁגָּע֖וֹן יִנְהָֽג־־־׃
translation:
  text: And the watchman reported, saying, “He came up to them, but he has not returned;
    and the driving is like the driving of Jehu son of Nimshi, for he drives like
    a madman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for he drives madly” or “for he drives with madness.” The Hebrew emphasizes
      Jehu’s frenzied, reckless manner of driving.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: reported
  alternatives:
  - told
  - announced
  lexicon: HALOT
  rationale: Narrative wayyiqtol of נגד introducing the watchman's message. 'Reported'
    fits the military/watch context slightly better than the more generic 'told.'
- source_word: הַצֹּפֶה
  chosen: the watchman
  alternatives:
  - the lookout
  - the sentinel
  lexicon: HALOT
  rationale: צפה here denotes the person stationed to observe approaching movement.
    'Watchman' is idiomatic and natural in this royal/military setting.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' preserves
    the Hebrew discourse structure cleanly.
- source_word: בָּא עַד אֲלֵיהֶם
  chosen: He came up to them
  alternatives:
  - He reached them
  - He came as far as them
  lexicon: HALOT
  rationale: בוא with עַד and אֶל conveys arrival up to the group. 'Came up to them'
    is idiomatic English and preserves the sense of approach and contact.
- source_word: וְלֹא שָׁב
  chosen: but he has not returned
  alternatives:
  - and he did not return
  - but he has not come back
  lexicon: HALOT
  rationale: שוב means 'return.' The perfect can be rendered with present relevance
    in English because the watchman is describing the current situation after the
    messenger reached them. 'Has not returned' communicates that ongoing result.
- source_word: הַמִּנְהָג כְּמִנְהַג
  chosen: the driving is like the driving
  alternatives:
  - the manner of driving is like the manner of driving
  - the way he drives is like the way Jehu drives
  lexicon: HALOT
  rationale: מִנְהָג can mean manner/custom, but in this immediate context with נהג
    ('drive/lead') and chariot movement, it specifically refers to driving style.
    Repeating 'driving' reflects the Hebrew repetition and keeps the image concrete.
- source_word: יֵהוּא בֶן נִמְשִׁי
  chosen: Jehu son of Nimshi
  alternatives:
  - Jehu the son of Nimshi
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard rendering of the patronymic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for identifying the driver as Jehu. 'For'
    is concise and natural after the preceding observation.
- source_word: בְשִׁגָּעוֹן
  chosen: like a madman
  alternatives:
  - madly
  - with madness
  - furiously
  lexicon: HALOT
  rationale: The noun denotes madness/crazed behavior. In context it describes reckless,
    frenzied driving. 'Like a madman' preserves the simile-like force in idiomatic
    English better than the abstract 'with madness.' 'Furiously' captures intensity
    but loses the stronger sense of deranged recklessness.
- source_word: יִנְהָג
  chosen: he drives
  alternatives:
  - he leads
  - he drives on
  lexicon: HALOT
  rationale: נהג can mean lead/drive, but in this chariot context 'drives' is the
    precise sense.
