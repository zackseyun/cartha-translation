id: 2KI.9.11
reference: 2 Kings 9:11
source:
  edition: WLC
  text: וְ/יֵה֗וּא יָצָא֙ אֶל עַבְדֵ֣י אֲדֹנָ֔י/ו וַ/יֹּ֤אמֶר ל/וֹ֙ הֲ/שָׁל֔וֹם מַדּ֛וּעַ
    בָּֽא הַ/מְשֻׁגָּ֥ע הַ/זֶּ֖ה אֵלֶ֑י/ךָ וַ/יֹּ֣אמֶר אֲלֵי/הֶ֔ם אַתֶּ֛ם יְדַעְתֶּ֥ם
    אֶת הָ/אִ֖ישׁ וְ/אֶת שִׂיחֽ/וֹ־־־־׃
translation:
  text: Then Jehu went out to the servants of his master, and one said to him, “Is
    everything well? Why did this madman come to you?” And he said to them, “You know
    the man and his talk.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Is all well?” Hebrew literally asks, “Is it peace?”
    reason: lexical_alternative
  - marker: b
    text: Or, “this insane man” or “this crazy fellow.” The Hebrew is a contemptuous
      label.
    reason: lexical_alternative
  - marker: c
    text: Or, “his babble” / “his manner of speaking.” The Hebrew can refer broadly
      to a person's speech or discourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי אֲדֹנָיו
  chosen: the servants of his master
  alternatives:
  - the servants of his lord
  lexicon: HALOT
  rationale: עֶבֶד commonly means servant/slave; here these are military attendants/officers
    under Jehu's superior, so 'servants' is natural English without importing the
    bonded sense. אֲדֹנָיו refers to Jehu's master, i.e., the king, but the Hebrew
    does not specify 'king' in this clause, so 'his master' stays closer to the text.
- source_word: הֲשָׁלוֹם
  chosen: Is everything well?
  alternatives:
  - Is it peace?
  - Is all well?
  lexicon: HALOT
  rationale: The idiom asks about well-being/peace. 'Is everything well?' gives idiomatic
    modern English while preserving the sense of inquiry about whether matters are
    okay.
- source_word: מַדּוּעַ בָּא
  chosen: Why did ... come
  alternatives:
  - Why has ... come
  lexicon: HALOT
  rationale: 'The qatal after the inquiry is naturally rendered as a simple past in
    narrative dialogue: they ask why the visitor came.'
- source_word: הַמְשֻׁגָּע הַזֶּה
  chosen: this madman
  alternatives:
  - this crazy fellow
  - this insane man
  lexicon: HALOT
  rationale: The term is a derogatory label meaning one who is mad/crazed. 'Madman'
    preserves the insult and matches the masculine singular form without softening
    it.
- source_word: אַתֶּם יְדַעְתֶּם אֶת הָאִישׁ
  chosen: You know the man
  alternatives:
  - You know that man
  lexicon: HALOT
  rationale: Jehu responds evasively, implying they know what kind of person he is.
    'The man' is a natural rendering of the definite noun and fits the dismissive
    tone.
- source_word: שִׂיחוֹ
  chosen: his talk
  alternatives:
  - his babble
  - his manner of speaking
  - his message
  lexicon: HALOT
  rationale: שִׂיחַ can denote speech, talk, or discourse. In this context Jehu is
    dismissive and elliptical, so 'his talk' preserves the ambiguity and slightly
    contemptuous tone better than the more specific 'message.'
- source_word: וַיֹּאמֶר לוֹ
  chosen: and one said to him
  alternatives:
  - and they said to him
  - and he said to him
  lexicon: HALOT
  rationale: 'The singular verb with plural antecedent ''servants'' is best understood
    distributively: one of the servants spoke for the group. Rendering ''one said''
    avoids awkward ambiguity in English while respecting the singular Hebrew verb.'
