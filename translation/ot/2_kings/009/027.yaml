id: 2KI.9.27
reference: 2 Kings 9:27
source:
  edition: WLC
  text: וַ/אֲחַזְיָ֤ה מֶֽלֶךְ יְהוּדָה֙ רָאָ֔ה וַ/יָּ֕נָס דֶּ֖רֶךְ בֵּ֣ית הַגָּ֑ן
    וַ/יִּרְדֹּ֨ף אַחֲרָ֜י/ו יֵה֗וּא וַ֠/יֹּאמֶר גַּם אֹת֞/וֹ הַכֻּ֣/הוּ אֶל הַ/מֶּרְכָּבָ֗ה
    בְּ/מַֽעֲלֵה גוּר֙ אֲשֶׁ֣ר אֶֽת יִבְלְעָ֔ם וַ/יָּ֥נָס מְגִדּ֖וֹ וַ/יָּ֥מָת שָֽׁם־־־־־׃
translation:
  text: When Ahaziah king of Judah saw this, he fled by the way of Beth-haggan. And
    Jehu pursued after him and said, “Strike him too, in the chariot!” So they struck
    him at the ascent of Gur, which is by Ibleam. But he fled to Megiddo and died
    there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-haggan may mean 'house of the garden,' but here it is likely a place-name,
      so it is transliterated.
    reason: cultural_note
  - marker: b
    text: Or 'Strike him too in the chariot'; the Hebrew preposition is somewhat flexible
      here and may indicate location or direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאָה
  chosen: saw this
  alternatives:
  - saw
  - saw it
  lexicon: HALOT
  rationale: The Hebrew verb simply means 'saw,' but English idiom benefits from an
    explicit object. 'This' captures the implied event he witnessed, namely Jehoram's
    downfall, without over-specifying.
- source_word: דֶּרֶךְ בֵּית הַגָּן
  chosen: by the way of Beth-haggan
  alternatives:
  - on the road to Beth-haggan
  - by way of the garden house
  lexicon: HALOT
  rationale: דֶּרֶךְ is 'way/road.' Because בֵּית הַגָּן appears to function as a
    place-name here, it is transliterated as 'Beth-haggan' rather than translated
    literally. 'By the way of' preserves the Hebrew construction naturally.
- source_word: וַיִּרְדֹּף אַחֲרָיו
  chosen: pursued after him
  alternatives:
  - pursued him
  - chased after him
  lexicon: HALOT
  rationale: The combination of רדף with אַחַר explicitly conveys pursuit 'after'
    someone. 'Pursued after him' keeps the Hebrew emphasis, though slightly more formal
    than simple 'pursued him.'
- source_word: גַּם אֹתוֹ
  chosen: him too
  alternatives:
  - also him
  - him also
  lexicon: HALOT
  rationale: 'גַּם marks addition: Ahaziah is to be struck as well. ''Him too'' is
    concise, natural English and preserves the additive force.'
- source_word: הַכֻּהוּ
  chosen: Strike him
  alternatives:
  - Kill him
  - Wound him
  lexicon: HALOT
  rationale: The imperative from נכה broadly means 'strike/smite.' 'Strike him' is
    the most textually restrained rendering; 'kill him' would over-interpret the command's
    immediate lexical force.
- source_word: אֶל הַמֶּרְכָּבָה
  chosen: in the chariot
  alternatives:
  - at the chariot
  - into the chariot
  lexicon: HALOT
  rationale: 'The preposition אֶל literally means ''to/toward,'' but in this command
    it likely indicates the location/target context of the attack. ''In the chariot''
    gives the most coherent sense in English: Ahaziah is to be struck while in his
    chariot.'
- source_word: בְּמַעֲלֵה גוּר
  chosen: at the ascent of Gur
  alternatives:
  - on the way up to Gur
  - at Gur's ascent
  lexicon: HALOT
  rationale: מַעֲלֶה denotes an ascent or uphill pass. 'At the ascent of Gur' is a
    clear, fairly formal rendering that preserves the topographical note.
- source_word: אֲשֶׁר אֶת יִבְלְעָם
  chosen: which is by Ibleam
  alternatives:
  - which is near Ibleam
  - which is at Ibleam
  lexicon: HALOT
  rationale: The phrase locates Gur in relation to Ibleam. 'By Ibleam' is idiomatic
    and sufficiently precise without forcing a more technical spatial nuance.
- source_word: וַיָּנָס מְגִדּוֹ
  chosen: he fled to Megiddo
  alternatives:
  - he escaped to Megiddo
  - he fled toward Megiddo
  lexicon: HALOT
  rationale: The verb means 'fled.' With the place-name following, 'to Megiddo' is
    the natural English destination sense.
- source_word: וַיָּמָת שָׁם
  chosen: died there
  alternatives:
  - and he died there
  lexicon: HALOT
  rationale: The clause is straightforward. In the full sentence, 'and died there'
    or 'died there' both work; the final text uses 'died there' after 'But he fled
    to Megiddo' for smooth English flow while preserving the sequence.
