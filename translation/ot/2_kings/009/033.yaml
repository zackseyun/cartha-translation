id: 2KI.9.33
reference: 2 Kings 9:33
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר שמט/הו וַֽ/יִּשְׁמְט֑וּ/הָ וַ/יִּ֨ז מִ/דָּמָ֧/הּ אֶל הַ/קִּ֛יר
    וְ/אֶל הַ/סּוּסִ֖ים וַֽ/יִּרְמְסֶֽ/נָּה־־׃
translation:
  text: And he said, “Throw her down!” So they threw her down, and some of her blood
    spattered on the wall and on the horses, and he trampled her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and her blood splashed on the wall and on the horses.” The Hebrew literally
      says “and it spattered from her blood onto the wall and onto the horses.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שמטהו
  chosen: Throw her down!
  alternatives:
  - Drop her!
  - Cast her down!
  lexicon: HALOT
  rationale: The imperative from שמט in this context is a command to cause Jezebel
    to fall from the window. 'Throw her down' is idiomatic, forceful English that
    matches the violent action better than the less natural 'let her drop' or the
    more archaic 'cast her down.'
- source_word: וישמטוה
  chosen: So they threw her down
  alternatives:
  - So they dropped her
  - So they cast her down
  lexicon: HALOT
  rationale: The verb repeats the same root as the command and narrates compliance.
    Using the same English verb preserves the lexical connection and the immediacy
    of the action.
- source_word: ויז
  chosen: some of her blood spattered
  alternatives:
  - her blood splashed
  - her blood spurted
  lexicon: HALOT
  rationale: The verb denotes spattering/splashing. 'Spattered' fits the image of
    blood striking nearby surfaces. 'Some of her blood' is supplied naturally in English
    because the Hebrew construction 'from her blood' is partitive in effect.
- source_word: מדמה
  chosen: of her blood
  alternatives:
  - from her blood
  lexicon: HALOT
  rationale: 'The preposition מן with ''blood'' is most naturally rendered in English
    as a partitive expression here: some of her blood reached the wall and horses.
    This avoids awkward literalism while preserving the sense.'
- source_word: הקיר
  chosen: the wall
  lexicon: HALOT
  rationale: קיר is the ordinary term for a wall. No special nuance requires expansion.
- source_word: הסוסים
  chosen: the horses
  lexicon: HALOT
  rationale: A straightforward rendering. The plural likely refers to the horses associated
    with Jehu's chariot or entourage.
- source_word: וירמסנה
  chosen: and he trampled her
  alternatives:
  - and he ran over her
  - and he trampled on her
  lexicon: HALOT
  rationale: רמס means to trample. The singular verb points to Jehu as the subject,
    not the horses as grammatical subject. 'He trampled her' preserves the Hebrew
    syntax and the brutality of the act; the means are implied by the presence of
    the horses and context.
