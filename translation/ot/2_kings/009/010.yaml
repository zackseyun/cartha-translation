id: 2KI.9.10
reference: 2 Kings 9:10
source:
  edition: WLC
  text: וְ/אֶת אִיזֶ֜בֶל יֹאכְל֧וּ הַ/כְּלָבִ֛ים בְּ/חֵ֥לֶק יִזְרְעֶ֖אל וְ/אֵ֣ין קֹבֵ֑ר
    וַ/יִּפְתַּ֥ח הַ/דֶּ֖לֶת וַ/יָּנֹֽס־׃
translation:
  text: And the dogs will eat Jezebel in the territory of Jezreel, and there will
    be no one to bury her.” Then he opened the door and fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the plot/portion of Jezreel.' The Hebrew חֵלֶק refers to a tract
      or parcel of land.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאכְלוּ
  chosen: will eat
  alternatives:
  - shall eat
  - will devour
  lexicon: HALOT
  rationale: Simple future sense of אכל in prophetic judgment context. 'Will eat'
    is direct and natural; 'devour' is possible but slightly more interpretive/intensive
    than the Hebrew requires.
- source_word: הַכְּלָבִים
  chosen: the dogs
  alternatives:
  - dogs
  lexicon: HALOT
  rationale: Definite article is present in Hebrew. English can retain 'the dogs'
    naturally here, preserving the vivid specificity of the judgment oracle.
- source_word: בְּחֵלֶק יִזְרְעֶאל
  chosen: in the territory of Jezreel
  alternatives:
  - in the portion of Jezreel
  - in the plot of Jezreel
  - in Jezreel's tract
  lexicon: HALOT
  rationale: חֵלֶק can denote a tract, portion, or parcel of land. 'Territory' communicates
    a land-area sense in clear modern English without over-specifying a small field
    or plot.
- source_word: וְאֵין קֹבֵר
  chosen: and there will be no one to bury her
  alternatives:
  - and none will bury her
  - with no one burying her
  lexicon: HALOT
  rationale: The Hebrew is literally 'and there is no burying one/burier.' English
    idiom requires an explicit object, supplied from context as Jezebel. Future sense
    fits the prophetic announcement.
- source_word: וַיִּפְתַּח הַדֶּלֶת
  chosen: Then he opened the door
  alternatives:
  - And he opened the door
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative after the oracle. 'Then' reflects sequential
    action smoothly in English.
- source_word: וַיָּנֹס
  chosen: and fled
  alternatives:
  - and ran away
  - and escaped
  lexicon: HALOT
  rationale: נוס commonly means flee. 'Fled' preserves the terseness and urgency of
    the Hebrew better than the more colloquial 'ran away'.
- source_word: אִיזֶבֶל
  chosen: Jezebel
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
