id: 2KI.9.28
reference: 2 Kings 9:28
source:
  edition: WLC
  text: וַ/יַּרְכִּ֧בוּ אֹת֛/וֹ עֲבָדָ֖י/ו יְרוּשָׁלְָ֑מָ/ה וַ/יִּקְבְּר֨וּ אֹת֧/וֹ
    בִ/קְבֻרָת֛/וֹ עִם אֲבֹתָ֖י/ו בְּ/עִ֥יר דָּוִֽד־׃פ
translation:
  text: His servants carried him to Jerusalem and buried him in his tomb with his
    fathers in the city of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'transported him to Jerusalem'; the Hebrew verb literally means 'caused
      him to ride' or 'had him carried.'
    reason: lexical_alternative
  - marker: b
    text: '''With his fathers'' is a Hebrew burial idiom meaning among his royal forefathers.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְכִּבוּ
  chosen: carried
  alternatives:
  - made ride
  - transported
  lexicon: HALOT
  rationale: The hiphil of רכב literally means 'caused to ride' or 'mounted/transported.'
    In context of moving Ahaziah's body after his death, idiomatic English 'carried'
    best conveys the action without implying he was alive and riding. 'Transported'
    is possible but less natural.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his servants/officials
  - his attendants
  lexicon: HALOT
  rationale: עבד commonly means 'servant' and can denote royal servants or officials.
    Here it refers to those in the king's service who handled his body. 'Servants'
    is the most direct rendering; the broader nuance of attendants/officials is possible
    but not necessary in the main text.
- source_word: יְרוּשָׁלָמָה
  chosen: to Jerusalem
  alternatives:
  - Jerusalemward
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Jerusalem. Standard English
    expresses this as 'to Jerusalem.'
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: and buried him
  alternatives:
  - and they buried him
  lexicon: HALOT
  rationale: A straightforward rendering of the waw-consecutive verb plus object marker.
    English does not require the explicit subject pronoun because 'his servants' remains
    the natural antecedent.
- source_word: בִּקְבֻרָתוֹ
  chosen: in his tomb
  alternatives:
  - in his burial place
  - in his grave
  lexicon: HALOT
  rationale: The noun from קבר here denotes the place of burial. 'Tomb' fits the royal
    context and sounds natural in English. 'Burial place' is more formal but less
    idiomatic.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for burial among one's royal forebears.
    'With his fathers' preserves the idiom and its dynastic resonance better than
    the more interpretive 'ancestors.'
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  lexicon: HALOT
  rationale: Conventional and direct rendering of the place name phrase.
