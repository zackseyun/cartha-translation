id: 2KI.20.7
reference: 2 Kings 20:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְשַֽׁעְיָ֔הוּ קְח֖וּ דְּבֶ֣לֶת תְּאֵנִ֑ים וַ/יִּקְח֛וּ וַ/יָּשִׂ֥ימוּ
    עַֽל הַ/שְּׁחִ֖ין וַ/יֶּֽחִי־׃
translation:
  text: And Isaiah said, “Take a cake of figs.” So they took it and laid it on the
    boil, and he recovered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a fig cake” or “a pressed mass of figs.”
    reason: lexical_alternative
  - marker: b
    text: Or “the inflamed sore” or “the ulcer.”
    reason: lexical_alternative
  - marker: c
    text: Literally “and he lived”; in context, this means he recovered.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is natural
    modern English and preserves the sequential flow without overinterpreting temporal
    nuance.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name, following the
    policy to transliterate personal names.
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Bring
  - Fetch
  lexicon: HALOT
  rationale: Imperative plural from לקח. 'Take' is the most direct equivalent; 'bring'
    or 'fetch' are possible in context but add directional nuance not explicit in
    the Hebrew.
- source_word: דְּבֶלֶת תְּאֵנִים
  chosen: a cake of figs
  alternatives:
  - a fig cake
  - a pressed mass of figs
  lexicon: HALOT
  rationale: דְּבֶלֶת denotes a pressed cake/mass, often of dried figs, and תְּאֵנִים
    specifies the fruit. 'A cake of figs' is clear, idiomatic, and preserves the concrete
    sense better than a looser paraphrase.
- source_word: וַיִּקְחוּ
  chosen: So they took it
  alternatives:
  - And they took it
  lexicon: HALOT
  rationale: The Hebrew verb is plural with an implied object from the previous command.
    English naturally supplies 'it.' 'So' reflects the responsive action to Isaiah's
    command.
- source_word: וַיָּשִׂימוּ
  chosen: and laid it
  alternatives:
  - and put it
  - and placed it
  lexicon: HALOT
  rationale: שׂים is a broad placement verb. 'Laid it' fits the medical application
    of a poultice-like fig cake onto a sore better than the more generic 'put it.'
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple spatial preposition; 'on' is the natural modern equivalent.
- source_word: הַשְּׁחִין
  chosen: the boil
  alternatives:
  - the inflamed sore
  - the ulcer
  lexicon: HALOT
  rationale: שְׁחִין commonly refers to a boil or inflamed skin eruption. 'Boil' is
    the standard concise rendering and fits the immediate healing context.
- source_word: וַיֶּחִי
  chosen: and he recovered
  alternatives:
  - and he lived
  - and he revived
  - and he became well
  lexicon: HALOT
  rationale: From חיה, literally 'lived' or 'came to life,' but in this healing context
    it idiomatically means recovery/restoration to health. 'He recovered' communicates
    the sense in natural English without implying resurrection.
