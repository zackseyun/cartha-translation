theological_decisions:
- issue: Nature of the healing outcome in וַיֶּחִי
  chosen_reading: physical recovery from illness
  alternative_readings:
  - he lived
  - he revived
  rationale: The verb חיה can be rendered more literally as 'lived' or 'revived,'
    but in the narrative context of applying a fig cake to Hezekiah's skin affliction,
    the intended sense is recovery from sickness. This avoids overstating the event
    while preserving the text's plain meaning.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    plain sense without importing doctrinal claims.'
