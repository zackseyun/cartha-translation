id: 2KI.20.13
reference: 2 Kings 20:13
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע עֲלֵי/הֶם֮ חִזְקִיָּהוּ֒ וַ/יַּרְאֵ֣/ם אֶת כָּל בֵּ֣ית נְכֹתֹ֡/ה
    אֶת הַ/כֶּסֶף֩ וְ/אֶת הַ/זָּהָ֨ב וְ/אֶת הַ/בְּשָׂמִ֜ים וְ/אֵ֣ת שֶׁ֣מֶן הַ/טּ֗וֹב
    וְ/אֵת֙ בֵּ֣ית כֵּלָ֔י/ו וְ/אֵ֛ת כָּל אֲשֶׁ֥ר נִמְצָ֖א בְּ/אֽוֹצְרֹתָ֑י/ו לֹֽא
    הָיָ֣ה דָבָ֗ר אֲ֠שֶׁר לֹֽא הֶרְאָ֧/ם חִזְקִיָּ֛הוּ בְּ/בֵית֖/וֹ וּ/בְ/כָל מֶמְשַׁלְתּֽ/וֹ־־־־־׀־־־־׃
translation:
  text: And Hezekiah listened to them and showed them all his treasure house—the silver,
    the gold, the spices, the fine oil, his armory, and everything that was found
    in his storehouses. There was nothing in his house or in all his realm that Hezekiah
    did not show them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard them' or 'received them favorably'; the Hebrew idiom can carry
      the sense of giving audience or heed.
    reason: lexical_alternative
  - marker: b
    text: Or 'his storehouse' for 'his treasure house.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his arsenal' or more literally 'the house of his equipment.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in all his dominion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע עֲלֵיהֶם
  chosen: listened to them
  alternatives:
  - heard them
  - listened concerning them
  lexicon: HALOT
  rationale: The idiom שׁמע על can mean to listen favorably or give audience/heed.
    In context, after the Babylonian envoys arrive, the sense is that Hezekiah received
    or listened to them, not merely that he physically heard about them.
- source_word: וַיַּרְאֵם
  chosen: showed them
  alternatives:
  - caused them to see
  - let them see
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'show.' This is the natural English rendering
    and matches the repeated הֶרְאָם later in the verse.
- source_word: בֵּית נְכֹתֹה
  chosen: his treasure house
  alternatives:
  - the house of his precious things
  - his storehouse
  lexicon: HALOT
  rationale: The phrase denotes the place where valuable goods were kept. 'Treasure
    house' is idiomatic English and fits the following inventory of valuables. The
    suffix on נְכֹתֹה is represented by 'his.'
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - silver
  - money
  lexicon: HALOT
  rationale: Here the term refers to stored precious metal, not currency in a narrow
    modern sense, so 'the silver' is best.
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: Straightforward reference to stored gold among royal treasures.
- source_word: הַבְּשָׂמִים
  chosen: the spices
  alternatives:
  - the balsam
  - the perfumes
  - the aromatics
  lexicon: HALOT
  rationale: The plural denotes aromatic substances of value. 'Spices' is the most
    natural broad rendering in this treasury context, though perfumed/aromatic goods
    are in view.
- source_word: שֶׁמֶן הַטּוֹב
  chosen: the fine oil
  alternatives:
  - the good oil
  - the precious oil
  lexicon: HALOT
  rationale: Literally 'the good oil,' likely high-quality or precious oil. 'Fine
    oil' conveys quality in natural English without over-specifying its use.
- source_word: בֵּית כֵּלָיו
  chosen: his armory
  alternatives:
  - the house of his vessels
  - his house of equipment
  - his arsenal
  lexicon: HALOT
  rationale: In this royal inventory context, כֵּלִים often refers to weapons or equipment,
    and the phrase is commonly understood as the armory/arsenal. 'Armory' is concise
    and idiomatic.
- source_word: אֲשֶׁר נִמְצָא בְּאֹצְרֹתָיו
  chosen: everything that was found in his storehouses
  alternatives:
  - all that was found in his treasuries
  lexicon: HALOT
  rationale: אֹצָר can mean treasury or storehouse. Since 'treasure house' has already
    been used for בֵּית נְכֹתֹה, 'storehouses' avoids awkward repetition while preserving
    the sense of stored wealth.
- source_word: לֹא הָיָה דָבָר אֲשֶׁר לֹא הֶרְאָם
  chosen: There was nothing ... that Hezekiah did not show them
  alternatives:
  - There was not a thing ... that he did not show them
  lexicon: HALOT
  rationale: This double-negative Hebrew construction is best rendered as an emphatic
    total statement in English.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - in his palace
  lexicon: HALOT
  rationale: Literally 'in his house.' Since the context is royal, 'palace' is possible,
    but 'house' preserves the Hebrew wording and still reads naturally.
- source_word: בְכָל מֶמְשַׁלְתּוֹ
  chosen: in all his realm
  alternatives:
  - throughout all his dominion
  - in all his kingdom
  lexicon: HALOT
  rationale: מֶמְשָׁלָה denotes dominion, rule, or realm. 'Realm' is natural English
    and captures the breadth of what was under Hezekiah's rule without implying only
    the political entity.
