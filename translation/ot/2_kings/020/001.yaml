id: 2KI.20.1
reference: 2 Kings 20:1
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם חָלָ֥ה חִזְקִיָּ֖הוּ לָ/מ֑וּת וַ/יָּבֹ֣א אֵ֠לָי/ו יְשַׁעְיָ֨הוּ
    בֶן אָמ֜וֹץ הַ/נָּבִ֗יא וַ/יֹּ֨אמֶר אֵלָ֜י/ו כֹּֽה אָמַ֤ר יְהוָה֙ צַ֣ו לְ/בֵיתֶ֔/ךָ
    כִּ֛י מֵ֥ת אַתָּ֖ה וְ/לֹ֥א תִֽחְיֶֽה־־׃
translation:
  text: 'In those days Hezekiah became sick, near to death. And Isaiah son of Amoz
    the prophet came to him and said to him, “Thus says the LORD: Set your house in
    order, for you are about to die; you will not live.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for you are dying” or “for you are dead”; the Hebrew
      expression announces certain, imminent death.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Standard temporal idiom introducing the narrative setting; 'In those
    days' is natural and sufficiently formal.
- source_word: חָלָה
  chosen: became sick
  alternatives:
  - was sick
  - fell ill
  lexicon: HALOT
  rationale: The verb denotes becoming ill. 'Became sick' preserves the ingressive
    sense better than simple stative 'was sick.'
- source_word: לָמוּת
  chosen: near to death
  alternatives:
  - to die
  - mortally ill
  lexicon: HALOT
  rationale: The infinitive with חלה expresses the severity/result of the illness.
    In English, 'became sick, near to death' communicates the idiomatic sense without
    overstating that death had already begun.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ הַנָּבִיא
  chosen: Isaiah son of Amoz the prophet
  alternatives:
  - the prophet Isaiah son of Amoz
  lexicon: HALOT
  rationale: Personal names are transliterated; filial identification and title are
    retained in source order with readable English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'The LORD' follows the project's
    default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering for the divine name is 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: צַו לְבֵיתֶךָ
  chosen: Set your house in order
  alternatives:
  - Give orders to your household
  - Command your house
  lexicon: HALOT
  rationale: The idiom means to give necessary instructions regarding one's household/affairs
    in view of impending death. 'Set your house in order' is the established and accurate
    English idiom.
- source_word: כִּי מֵת אַתָּה
  chosen: for you are about to die
  alternatives:
  - for you are dying
  - for you are dead man
  lexicon: HALOT
  rationale: Though literally 'for dead you are,' the predicative participle here
    announces imminent death, not completed death. 'About to die' best captures the
    force in idiomatic English.
- source_word: וְלֹא תִחְיֶה
  chosen: you will not live
  alternatives:
  - and you will not recover
  - and you shall not live
  lexicon: HALOT
  rationale: The clause straightforwardly denies continued life. 'You will not live'
    is more literal than 'recover,' while still natural in modern English.
