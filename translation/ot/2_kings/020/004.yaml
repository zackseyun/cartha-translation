id: 2KI.20.4
reference: 2 Kings 20:4
source:
  edition: WLC
  text: וַ/יְהִ֣י יְשַׁעְיָ֔הוּ לֹ֣א יָצָ֔א ה/עיר הַ/תִּֽיכֹנָ֑ה וּ/דְבַר יְהוָ֔ה הָיָ֥ה אֵלָ֖י/ו לֵ/אמֹֽר־׃
translation:
  text: And it happened, before Isaiah had gone out into the middle court, that the word of Yahweh came to him, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the middle city.'' The phrase is traditionally understood here as a palace area or court; hence ''the middle court.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new development in the story. 'And it happened' preserves the Hebrew discourse function without archaic excess.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the personal name, following the translation philosophy to transliterate names.
- source_word: לֹא יָצָא
  chosen: had gone out
  alternatives:
  - had not yet gone out
  - did not go out
  lexicon: HALOT
  rationale: 'With לֹא plus perfect after ויהי, the sense is temporal: Isaiah had not yet completed his departure when the next event occurred. English pluperfect best conveys the sequence. The negative force is represented by the broader clause ''before Isaiah had gone out...'' rather than a wooden ''Isaiah had not gone out.'''
- source_word: הָעִיר הַתִּיכֹנָה
  chosen: the middle court
  alternatives:
  - the middle city
  - the inner court
  lexicon: HALOT
  rationale: Though עיר normally means 'city,' in this context the phrase is widely understood as a palace/court area, likely by textual or idiomatic usage reflected in ancient versions and context. 'Middle court' is the most natural contextual rendering in English and fits the palace setting of Hezekiah's illness. 'Inner court' overinterprets תיכונה, while 'middle city' is possible more formally but less likely in context.
- source_word: וּדְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - a word from the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יהוה is rendered 'the LORD.' The construct phrase is best represented by the established English expression 'the word of the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinally specified default rendering for the divine name.
- source_word: הָיָה אֵלָיו
  chosen: came to him
  alternatives:
  - was to him
  lexicon: HALOT
  rationale: Idiomatic rendering of the prophetic formula היה אל + person. 'Came to him' is natural English and accurately conveys reception of divine speech.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: Standard introduction to direct speech. 'Saying' preserves the formal linkage to the following quotation in the next verse.
