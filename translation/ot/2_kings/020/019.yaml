id: 2KI.20.19
reference: 2 Kings 20:19
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר חִזְקִיָּ֨הוּ֙ אֶֽל יְשַֽׁעְיָ֔הוּ ט֥וֹב דְּבַר יְהוָ֖ה אֲשֶׁ֣ר
    דִּבַּ֑רְתָּ וַ/יֹּ֕אמֶר הֲ/ל֛וֹא אִם שָׁל֥וֹם וֶ/אֱמֶ֖ת יִהְיֶ֥ה בְ/יָמָֽ/י־־־׃
translation:
  text: Then Hezekiah said to Isaiah, “The word of the LORD that you have spoken is
    good.” For he thought, “Will there not be peace and stability in my days?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peace and truth in my days.' The Hebrew אֱמֶת can mean 'truth,' 'faithfulness,'
      or, in context, dependable stability.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - acceptable
  - favorable
  lexicon: HALOT
  rationale: The adjective straightforwardly evaluates the announced word as 'good.'
    'Favorable' would over-interpret Hezekiah's motive, while 'good' preserves the
    terseness and possible moral ambiguity of his response.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: '''Word'' is the standard rendering for דָּבָר in prophetic contexts
    and preserves the formal link to prophetic speech. YHWH is rendered ''the LORD''
    per doctrine.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with the doctrine table.
- source_word: דִּבַּרְתָּ
  chosen: you have spoken
  alternatives:
  - you spoke
  - you have said
  lexicon: HALOT
  rationale: The perfect with direct address to Isaiah is naturally rendered 'you
    have spoken.' This keeps the focus on Isaiah as the prophetic mouthpiece without
    flattening the verbal aspect.
- source_word: הֲלוֹא אִם
  chosen: For he thought, “Will there not be
  alternatives:
  - And he said, “Is it not so, if
  - “Surely, if
  lexicon: HALOT
  rationale: The Hebrew construction is elliptical and idiomatic. In context it introduces
    Hezekiah's reasoning after hearing judgment deferred beyond his lifetime. Rendering
    the sense as an internal rationale makes coherent English while preserving the
    rhetorical force of הֲלוֹא ('is it not?/surely').
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: '''Peace'' is the broad and standard gloss, retaining both social calm
    and personal well-being without narrowing the term to material prosperity.'
- source_word: אֱמֶת
  chosen: stability
  alternatives:
  - truth
  - faithfulness
  - security
  lexicon: HALOT
  rationale: In this royal-national context, אֱמֶת likely carries the sense of reliability/steadiness
    rather than abstract 'truth.' 'Stability' communicates the practical condition
    of secure order in Hezekiah's lifetime. Because 'truth' is a traditional rendering,
    it is preserved in a footnote.
- source_word: בְיָמָי
  chosen: in my days
  alternatives:
  - during my lifetime
  lexicon: HALOT
  rationale: A direct and idiomatic rendering of the temporal phrase, preserving Hezekiah's
    self-referential concern.
