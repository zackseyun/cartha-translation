id: 2KI.20.2
reference: 2 Kings 20:2
source:
  edition: WLC
  text: וַ/יַּסֵּ֥ב אֶת פָּנָ֖י/ו אֶל הַ/קִּ֑יר וַ/יִּ֨תְפַּלֵּ֔ל אֶל יְהוָ֖ה לֵ/אמֹֽר־־־׃
translation:
  text: Then he turned his face to the wall and prayed to the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Yahweh.'' The main text follows the project''s standard rendering
      of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּסֵּב
  chosen: Then he turned
  alternatives:
  - And he turned
  - he turned
  lexicon: HALOT
  rationale: From סבב in the Hiphil/wayyiqtol narrative form, indicating a completed
    past action in sequence. 'Turned' is the plain sense; 'Then' reflects the narrative
    progression of the waw-consecutive in readable English.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his face around
  - his countenance
  lexicon: HALOT
  rationale: פנים commonly means 'face' or 'presence.' Here with the verb 'turned'
    and the preposition 'to/toward,' 'his face' is the natural idiomatic rendering
    and preserves the concrete imagery.
- source_word: אֶל הַקִּיר
  chosen: to the wall
  alternatives:
  - toward the wall
  lexicon: HALOT
  rationale: אֶל marks direction toward, and קִיר means 'wall.' English idiom after
    'turned his face' commonly uses 'to the wall,' though 'toward the wall' is also
    possible. The chosen rendering is natural and sufficiently precise.
- source_word: וַיִּתְפַּלֵּל
  chosen: and prayed
  alternatives:
  - and he prayed
  lexicon: HALOT
  rationale: Hitpael of פלל in this context means 'to pray.' The simple past 'prayed'
    best fits the narrative sequence.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל is straightforwardly 'to.' Per doctrine, יְהוָה is
    rendered 'the LORD' rather than transliterated, following the project's stated
    default for the divine name.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  - 'these words:'
  lexicon: HALOT
  rationale: The infinitive construct of אמר after a speech-introducing verb is conventionally
    rendered 'saying,' introducing the content of the prayer in the next verse.
