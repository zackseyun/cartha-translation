id: 2KI.20.12
reference: 2 Kings 20:12
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֡יא שָׁלַ֡ח בְּרֹאדַ֣ךְ בַּ֠לְאֲדָן בֶּֽן בַּלְאֲדָ֧ן מֶֽלֶךְ
    בָּבֶ֛ל סְפָרִ֥ים וּ/מִנְחָ֖ה אֶל חִזְקִיָּ֑הוּ כִּ֣י שָׁמַ֔ע כִּ֥י חָלָ֖ה חִזְקִיָּֽהוּ־־־׃
translation:
  text: At that time Merodach-baladan son of Baladan, king of Babylon, sent letters
    and a gift to Hezekiah, because he had heard that Hezekiah had been sick.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'Berodach-baladan'; many English translations render the name
      'Merodach-baladan,' likely reflecting a variant form preserved in Isaiah 39:1
      and ancient tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that moment
  - At that season
  lexicon: HALOT
  rationale: Standard temporal discourse marker; 'At that time' is natural modern
    English and preserves the narrative setting without over-specifying duration.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The common verb for sending; 'sent' is the plain and sufficient rendering
    in this diplomatic context.
- source_word: בְּרֹאדַךְ בַּלְאֲדָן
  chosen: Merodach-baladan
  alternatives:
  - Berodach-baladan
  rationale: A personal name, so transliteration is required by the translation philosophy.
    'Merodach-baladan' follows common English convention and aligns with the parallel
    in Isaiah 39:1, while the consonantal form here can also support 'Berodach-baladan.'
    The alternative is worth preserving in a footnote.
- source_word: בֶּן בַּלְאֲדָן
  chosen: son of Baladan
  lexicon: HALOT
  rationale: A straightforward patronymic construction; 'son of' is the normal formal
    rendering.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Construct chain identifying royal office and realm; standard English
    rendering.
- source_word: סְפָרִים
  chosen: letters
  alternatives:
  - documents
  - writings
  lexicon: HALOT
  rationale: In a diplomatic exchange, 'letters' best captures the likely sense of
    written correspondence rather than generic books or documents.
- source_word: וּמִנְחָה
  chosen: and a gift
  alternatives:
  - and a present
  - and tribute
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift, offering, or tribute depending on context.
    Here, in conjunction with letters sent to a foreign king, 'gift' is the most contextually
    appropriate and least interpretively loaded choice.
- source_word: אֶל חִזְקִיָּהוּ
  chosen: to Hezekiah
  rationale: Simple prepositional phrase marking the recipient.
- source_word: כִּי שָׁמַע
  chosen: because he had heard
  alternatives:
  - for he heard
  - since he heard
  lexicon: HALOT
  rationale: The first כִּי introduces the reason for the diplomatic gesture. English
    past perfect ('had heard') fits the narrative sequence.
- source_word: כִּי חָלָה חִזְקִיָּהוּ
  chosen: that Hezekiah had been sick
  alternatives:
  - that Hezekiah was sick
  - that Hezekiah had become sick
  lexicon: HALOT
  rationale: The second כִּי introduces the content of what was heard. Given the surrounding
    narrative after Hezekiah's illness and recovery, 'had been sick' communicates
    prior illness naturally in English, while remaining faithful to the Hebrew perfect.
