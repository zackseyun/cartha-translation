id: 2KI.20.14
reference: 2 Kings 20:14
source:
  edition: WLC
  text: וַ/יָּבֹא֙ יְשַֽׁעְיָ֣הוּ הַ/נָּבִ֔יא אֶל הַ/מֶּ֖לֶךְ חִזְקִיָּ֑הוּ וַ/יֹּ֨אמֶר
    אֵלָ֜י/ו מָ֥ה אָמְר֣וּ הָ/אֲנָשִׁ֣ים הָ/אֵ֗לֶּה וּ/מֵ/אַ֨יִן֙ יָבֹ֣אוּ אֵלֶ֔י/ךָ
    וַ/יֹּ֨אמֶר֙ חִזְקִיָּ֔הוּ מֵ/אֶ֧רֶץ רְחוֹקָ֛ה בָּ֖אוּ מִ/בָּבֶֽל־׀׃
translation:
  text: Then Isaiah the prophet came to King Hezekiah and said to him, “What did these
    men say, and where did they come from to you?” And Hezekiah said, “They came to
    me from a distant land, from Babylon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “and from where do they come to you?” The Hebrew uses
      an imperfect form that can be rendered more formally, but the past sense fits
      the narrative context.
    reason: lexical_alternative
  - marker: b
    text: “From a distant land” is then specified as “from Babylon,” preserving Hezekiah’s
      emphasis on the visitors’ far-off origin before naming the place.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the personal name.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title identifying Isaiah's role; straightforwardly rendered.
- source_word: אֶל־הַמֶּלֶךְ חִזְקִיָּהוּ
  chosen: to King Hezekiah
  alternatives:
  - to the king, Hezekiah
  lexicon: HALOT
  rationale: English idiom prefers apposition without repeating the article awkwardly;
    meaning is unchanged.
- source_word: מָה אָמְרוּ
  chosen: What did ... say
  alternatives:
  - What have ... said
  lexicon: HALOT
  rationale: Simple past fits the Hebrew perfect in this narrative inquiry context.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  chosen: these men
  alternatives:
  - these people
  lexicon: HALOT
  rationale: אֲנָשִׁים is masculine plural 'men'; per gender-accurate philosophy,
    'men' is preferred over a neutral term.
- source_word: וּמֵאַיִן יָבֹאוּ
  chosen: and where did they come from
  alternatives:
  - and from where do they come
  lexicon: HALOT
  rationale: Though the imperfect can be rendered more literally, in reported past
    events English idiom prefers past tense. 'Where ... from' is natural and accurate.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - to you here
  lexicon: HALOT
  rationale: Direct rendering of the preposition plus pronoun; retained in the question
    because it is explicit in Hebrew.
- source_word: מֵאֶרֶץ רְחוֹקָה
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: Idiomatic English equivalent preserving the sense of geographical remoteness
    without archaic diction.
- source_word: בָּאוּ מִבָּבֶל
  chosen: They came to me ... from Babylon
  alternatives:
  - They came ... from Babylon
  lexicon: HALOT
  rationale: The Hebrew first states the general origin ('from a distant land') and
    then specifies it ('from Babylon'). Repeating 'to me' in English reflects the
    explicit addressee implied by the prior exchange and matches the MT sense.
- source_word: בָּבֶל
  chosen: Babylon
  rationale: Standard English form of the place name.
