id: 2KI.20.21
reference: 2 Kings 20:21
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֥ב חִזְקִיָּ֖הוּ עִם אֲבֹתָ֑י/ו וַ/יִּמְלֹ֛ךְ מְנַשֶּׁ֥ה בְנ֖/וֹ
    תַּחְתָּֽי/ו־׃פ
translation:
  text: And Hezekiah lay down with his fathers, and Manasseh his son became king in
    his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slept with his fathers.' The Hebrew uses a standard royal death formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - died
  lexicon: HALOT
  rationale: The verb שׁכב literally means 'lie down' and is a standard idiom for
    death/burial in royal notices when followed by 'with his fathers.' 'Lay down'
    preserves the Hebrew imagery without over-paraphrasing to 'died,' while avoiding
    the potentially misleading modern English perfective nuance of 'slept.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the conventional Hebrew burial/death formula. 'Fathers' is retained
    as the gender-accurate and idiomatic rendering of the source, in keeping with
    the translation philosophy; 'ancestors' is possible but less formally tied to
    the Hebrew expression.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: In succession formulas, מלך commonly marks accession to the throne. 'Became
    king' communicates enthronement more precisely than 'reigned,' which can suggest
    the duration of rule rather than the act of succession.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בְנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly because it is
    part of the succession notice.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: The preposition תחת in royal succession contexts means 'in place of'
    or 'instead of.' 'In his place' is natural modern English and clearly expresses
    succession.
