id: 2KI.20.9
reference: 2 Kings 20:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְשַׁעְיָ֗הוּ זֶה לְּ/ךָ֤ הָ/אוֹת֙ מֵ/אֵ֣ת יְהוָ֔ה כִּ֚י יַעֲשֶׂ֣ה
    יְהוָ֔ה אֶת הַ/דָּבָ֖ר אֲשֶׁ֣ר דִּבֵּ֑ר הָלַ֤ךְ הַ/צֵּל֙ עֶ֣שֶׂר מַֽעֲל֔וֹת אִם
    יָשׁ֖וּב עֶ֥שֶׂר מַעֲלֽוֹת־־־׃
translation:
  text: 'And Isaiah said, “This is the sign for you from the LORD, that the LORD will
    do the thing that he has spoken: shall the shadow go forward ten steps, or shall
    it turn back ten steps?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “ten degrees.” The Hebrew word literally means “steps” or “ascents,”
      but it has traditionally been rendered “degrees” in this context because of
      the shadow’s movement on the device associated with Ahaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  chosen: the sign
  alternatives:
  - the proof
  - the token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or confirming sign. In this context it is
    a confirming miracle given to Hezekiah, so 'the sign' is the most natural and
    standard rendering.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: The phrase indicates source/origin. Per doctrine, יְהוָה is rendered
    'the LORD' rather than transliterated.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of the sign: namely, that the LORD
    will do what he said. English ''that'' best fits this explanatory/content clause.'
- source_word: יַעֲשֶׂה ... אֶת־הַדָּבָר אֲשֶׁר דִּבֵּר
  chosen: will do the thing that he has spoken
  alternatives:
  - will do the word that he has spoken
  - will carry out what he has said
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' In this fulfillment context,
    'the thing that he has spoken' preserves the concrete sense without sounding unnatural.
    'Has spoken' reflects the completed prior speech.
- source_word: הָלַךְ הַצֵּל
  chosen: shall the shadow go forward
  alternatives:
  - has the shadow gone forward
  - will the shadow advance
  lexicon: HALOT
  rationale: 'Though הָלַךְ is formally perfect, in this interrogative option-setting
    context it functions idiomatically as part of the proposed sign: whether the shadow
    should move onward. ''Go forward'' is clear modern English and preserves the motion
    contrast with ''turn back.'''
- source_word: מַעֲלוֹת
  chosen: steps
  alternatives:
  - degrees
  - stairway-steps
  lexicon: HALOT
  rationale: The noun literally refers to steps or stair-steps. Because the context
    likely involves the shadow on the stairway/steps of Ahaz, 'steps' is more source-near
    than the traditional but interpretive 'degrees.'
- source_word: אִם
  chosen: or
  alternatives:
  - whether
  lexicon: HALOT
  rationale: In this disjunctive question, אִם introduces the second option. English
    idiom expresses the pair as 'shall X ... or shall Y ...'.
- source_word: יָשׁוּב
  chosen: shall it turn back
  alternatives:
  - shall it return
  - shall it go back
  lexicon: HALOT
  rationale: שׁוּב means return/turn back. 'Turn back' fits the image of the shadow
    reversing direction and reads naturally in English.
