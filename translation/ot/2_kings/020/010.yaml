id: 2KI.20.10
reference: 2 Kings 20:10
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יְחִזְקִיָּ֔הוּ נָקֵ֣ל לַ/צֵּ֔ל לִ/נְט֖וֹת עֶ֣שֶׂר מַעֲל֑וֹת
    לֹ֣א כִ֔י יָשׁ֥וּב הַ/צֵּ֛ל אֲחֹרַנִּ֖ית עֶ֥שֶׂר מַעֲלֽוֹת׃
translation:
  text: And Hezekiah said, “It is an easy thing for the shadow to stretch forward
    ten steps. No, but let the shadow go back ten steps.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten degrees.' The Hebrew word means 'steps' or 'ascents' and may refer
      to the steps or gradations of Ahaz's shadow device.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָקֵל
  chosen: it is an easy thing
  alternatives:
  - it is a light thing
  - it is easy
  lexicon: HALOT
  rationale: The adjective conveys ease/lightness. The idiomatic English clause 'it
    is an easy thing' preserves the sense naturally while retaining the evaluative
    force of Hezekiah's statement.
- source_word: הַצֵּל / לַצֵּל
  chosen: the shadow
  lexicon: HALOT
  rationale: Standard rendering of צֵל. The article is represented in English by 'the
    shadow.' In context this is the shadow on the stairway/sundial sign.
- source_word: לִנְטוֹת
  chosen: to stretch forward
  alternatives:
  - to decline
  - to extend
  - to turn
  lexicon: HALOT
  rationale: The verb נטה commonly means 'stretch out, extend, turn.' In context of
    a shadow moving naturally along the steps, 'stretch forward' communicates the
    shadow's advancing movement more clearly than the less idiomatic 'decline' while
    staying close to the Hebrew image.
- source_word: מַעֲלוֹת
  chosen: steps
  alternatives:
  - degrees
  - stairs
  lexicon: HALOT
  rationale: The noun literally denotes 'steps/ascents.' Although traditionally rendered
    'degrees' in connection with the stairway of Ahaz, 'steps' better reflects the
    Hebrew term directly. The possible interpretive connection to a sundial is preserved
    in a footnote rather than imported into the main text.
- source_word: לֹא כִּי
  chosen: No, but
  alternatives:
  - No; rather
  - Not so, but
  lexicon: HALOT
  rationale: This combination functions as a rejection followed by a preferred alternative.
    'No, but' is concise, natural English that preserves the contrast.
- source_word: יָשׁוּב
  chosen: let ... go back
  alternatives:
  - return
  - turn back
  lexicon: HALOT
  rationale: The verb means 'return/turn back.' Because this is Hezekiah's requested
    sign, English idiom is best expressed with a jussive-like 'let the shadow go back.'
- source_word: אֲחֹרַנִּית
  chosen: back
  alternatives:
  - backward
  - rearward
  lexicon: HALOT
  rationale: The adverb indicates backward motion. 'Back' is the most natural modern
    English equivalent; 'backward' is possible but slightly stiffer.
