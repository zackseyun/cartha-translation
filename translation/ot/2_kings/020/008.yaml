id: 2KI.20.8
reference: 2 Kings 20:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר חִזְקִיָּ֨הוּ֙ אֶֽל יְשַׁעְיָ֔הוּ מָ֣ה א֔וֹת כִּֽי יִרְפָּ֥א יְהוָ֖ה לִ֑/י וְ/עָלִ֛יתִי בַּ/יּ֥וֹם הַ/שְּׁלִישִׁ֖י בֵּ֥ית יְהוָֽה־־׃
translation:
  text: And Hezekiah said to Isaiah, “What is the sign that Yahweh will heal me and that I will go up to the house of Yahweh on the third day?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the temple of the LORD.” Literally, “the house of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite. 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition introducing the addressee.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Personal name transliterated by standard English convention.
- source_word: מָה
  chosen: What
  alternatives:
  - What kind of
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the request for confirmation.
- source_word: אוֹת
  chosen: sign
  alternatives:
  - token
  - proof
  lexicon: HALOT
  rationale: '''Sign'' is the normal rendering for אות in contexts of confirming divine promise; it preserves the sense of a confirming indicator without narrowing it to mere evidence.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of the requested sign: that the LORD will heal and that Hezekiah will go up. ''That'' best fits English syntax.'
- source_word: יִרְפָּא
  chosen: will heal
  alternatives:
  - is healing
  - shall heal
  lexicon: HALOT
  rationale: Imperfect verb expressing future result in the content of the sign. 'Will heal' is natural modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִי
  chosen: me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: 'English idiom with ''heal'' takes a direct object: ''heal me.'' The Hebrew preposition is naturally absorbed in translation.'
- source_word: וְעָלִיתִי
  chosen: and that I will go up
  alternatives:
  - and I will go up
  - and that I may go up
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' especially for ascent to the temple. Repeating 'that' in English clarifies that this clause is coordinated with the previous content clause under the requested sign.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on day three
  lexicon: HALOT
  rationale: Standard temporal expression. 'On the third day' is idiomatic and formally close.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' This preserves the Hebrew expression while remaining clear; 'temple' is interpretive and slightly less formal.
