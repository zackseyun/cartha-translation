theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD' in keeping with the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of the sign involving מַעֲלוֹת אָחָז
  chosen_reading: steps of Ahaz
  alternative_readings:
  - stairway of Ahaz
  - stair-dial of Ahaz
  - dial of Ahaz
  rationale: The Hebrew text itself speaks of 'steps/ascents' and does not explicitly
    identify a dial. The translation preserves the textual wording rather than resolving
    the historical reconstruction in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
