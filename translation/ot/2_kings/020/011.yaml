id: 2KI.20.11
reference: 2 Kings 20:11
source:
  edition: WLC
  text: וַ/יִּקְרָ֛א יְשַׁעְיָ֥הוּ הַ/נָּבִ֖יא אֶל יְהוָ֑ה וַ/יָּ֣שֶׁב אֶת הַ/צֵּ֗ל
    בַּֽ֠/מַּעֲלוֹת אֲשֶׁ֨ר יָרְדָ֜ה בְּ/מַעֲל֥וֹת אָחָ֛ז אֲחֹֽרַנִּ֖ית עֶ֥שֶׂר מַעֲלֽוֹת־־׃פ
translation:
  text: And Isaiah the prophet cried out to the LORD, and he brought the shadow back
    ten steps, by which it had gone down on the steps of Ahaz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten degrees.' The Hebrew says 'ten steps/ascents' (ma'alot), traditionally
      understood by some as part of a shadow-measuring device, hence 'dial of Ahaz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: cried out
  alternatives:
  - called
  - prayed
  lexicon: HALOT
  rationale: קרא with אֶל־יְהוָה commonly denotes calling out to God in prayer. 'Cried
    out' preserves the verbal vividness better than the flatter 'called,' while avoiding
    over-interpretive expansion to 'prayed' in the main text.
- source_word: יְשַׁעְיָהוּ הַנָּבִיא
  chosen: Isaiah the prophet
  rationale: Standard transliteration of the personal name, with the title translated
    as instructed by the translation philosophy.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: וַיָּשֶׁב
  chosen: he brought ... back
  alternatives:
  - he turned ... back
  - he caused ... to return
  lexicon: HALOT
  rationale: Hiphil of שוב is causative. 'Brought back' is natural modern English
    and preserves the causative sense without sounding wooden.
- source_word: אֶת הַצֵּל
  chosen: the shadow
  lexicon: HALOT
  rationale: Direct object of the causative verb; the miracle concerns the movement
    of the shadow.
- source_word: בַּמַּעֲלוֹת
  chosen: ten steps
  alternatives:
  - ten degrees
  lexicon: HALOT
  rationale: מַעֲלוֹת literally means 'steps/ascents.' In this context it refers to
    the stepped device or stairway associated with Ahaz. 'Steps' is more textually
    grounded than the traditional but interpretive 'degrees.' The numeral phrase is
    brought forward in English for clarity.
- source_word: אֲשֶׁר יָרְדָה
  chosen: by which it had gone down
  alternatives:
  - where it had gone down
  - which had descended
  lexicon: HALOT
  rationale: The relative clause modifies the steps and describes the prior downward
    movement of the shadow. 'By which it had gone down' communicates instrument/location
    naturally in English.
- source_word: בְּמַעֲלוֹת אָחָז
  chosen: on the steps of Ahaz
  alternatives:
  - on the stairway of Ahaz
  - on the stair-dial of Ahaz
  lexicon: HALOT
  rationale: The phrase likely refers to a structure associated with Ahaz, traditionally
    understood as a stairway or shadow-measuring device. 'Steps of Ahaz' stays close
    to the Hebrew and avoids importing a more specific reconstruction into the main
    text.
- source_word: אֲחֹרַנִּית
  chosen: back
  alternatives:
  - backward
  lexicon: HALOT
  rationale: Adverb indicating reverse movement. 'Back' is idiomatic modern English;
    'backward' is possible but slightly stiffer.
- source_word: עֶשֶׂר מַעֲלוֹת
  chosen: ten steps
  alternatives:
  - ten degrees
  lexicon: HALOT
  rationale: Repeated phrase specifying the extent of the reversal. Rendered consistently
    with the earlier occurrence as 'ten steps.'
