id: 2KI.20.6
reference: 2 Kings 20:6
source:
  edition: WLC
  text: וְ/הֹסַפְתִּ֣י עַל יָמֶ֗י/ךָ חֲמֵ֤שׁ עֶשְׂרֵה֙ שָׁנָ֔ה וּ/מִ/כַּ֤ף מֶֽלֶךְ
    אַשּׁוּר֙ אַצִּ֣ילְ/ךָ֔ וְ/אֵ֖ת הָ/עִ֣יר הַ/זֹּ֑את וְ/גַנּוֹתִי֙ עַל הָ/עִ֣יר
    הַ/זֹּ֔את לְמַֽעֲנִ֔/י וּ/לְמַ֖עַן דָּוִ֥ד עַבְדִּֽ/י־־־׃
translation:
  text: And I will add fifteen years to your days, and I will deliver you and this
    city from the hand of the king of Assyria, and I will defend this city for my
    own sake and for the sake of my servant David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the power of the king of Assyria'; literally 'from the hand of
      the king of Assyria.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will protect this city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֹסַפְתִּי
  chosen: I will add
  alternatives:
  - I will increase
  - I will add on
  lexicon: HALOT
  rationale: Hiphil of יסף commonly means to add or increase. 'I will add' is the
    most direct rendering and fits the idiom with 'to your days'.
- source_word: עַל יָמֶיךָ
  chosen: to your days
  alternatives:
  - to your life
  - to your lifespan
  lexicon: HALOT
  rationale: Literally 'upon your days.' In English, 'to your days' preserves the
    Hebrew image while remaining understandable. More idiomatic alternatives like
    'to your life' are possible but less formally transparent.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  chosen: fifteen years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus noun construction.
- source_word: וּמִכַּף מֶלֶךְ אַשּׁוּר
  chosen: from the hand of the king of Assyria
  alternatives:
  - from the power of the king of Assyria
  - from the grasp of the king of Assyria
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power or control. Retaining ''hand''
    preserves the source idiom and is natural enough in English biblical style.'
- source_word: אַצִּילְךָ
  chosen: I will deliver you
  alternatives:
  - I will rescue you
  - I will save you
  lexicon: HALOT
  rationale: Hiphil of נצל means to snatch away, rescue, or deliver. 'Deliver' fits
    the military-political context and pairs well with 'from the hand of.'
- source_word: וְאֵת הָעִיר הַזֹּאת
  chosen: and this city
  alternatives:
  - and this city also
  lexicon: HALOT
  rationale: Direct-object marker plus noun phrase. 'And this city' is the natural
    English rendering in coordination with 'you.'
- source_word: וְגַנּוֹתִי עַל הָעִיר הַזֹּאת
  chosen: and I will defend this city
  alternatives:
  - and I will protect this city
  - and I will shield this city
  lexicon: HALOT
  rationale: From גנן, to cover/protect/defend. 'Defend' best suits the siege and
    royal-deliverance context, while still reflecting protective action.
- source_word: לְמַעֲנִי
  chosen: for my own sake
  alternatives:
  - for my sake
  lexicon: HALOT
  rationale: The prepositional phrase indicates motive or purpose grounded in God's
    own name and concern. 'My own sake' brings out the emphatic possessive nuance
    naturally.
- source_word: וּלְמַעַן דָּוִד עַבְדִּי
  chosen: and for the sake of my servant David
  alternatives:
  - and on account of my servant David
  lexicon: HALOT
  rationale: This preserves the covenantal rationale stated in the Hebrew without
    expanding its theological implications beyond the text.
