theological_decisions:
- issue: Divine motive in delivering Jerusalem
  chosen_reading: for my own sake and for the sake of my servant David
  alternative_readings:
  - for my sake and for David's sake
  rationale: The Hebrew explicitly grounds God's defense of the city in regard for
    himself and for David his servant. The translation preserves this covenantal and
    theocentric rationale without importing later doctrinal formulations.
  doctrine_reference: Preserve theological tension rather than resolve it.
