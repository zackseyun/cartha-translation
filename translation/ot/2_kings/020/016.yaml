id: 2KI.20.16
reference: 2 Kings 20:16
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְשַׁעְיָ֖הוּ אֶל חִזְקִיָּ֑הוּ שְׁמַ֖ע דְּבַר יְהוָֽה־־׃
translation:
  text: Then Isaiah said to Hezekiah, “Hear the word of the LORD:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. English commonly
    renders this idiomatically as 'Then ... said' rather than wooden 'And ... said,'
    while preserving sequential force.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction of speech; 'to' is the natural modern
    English equivalent.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name.
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative of שמע. 'Hear' is concise and preserves the prophetic summons
    formula; 'listen to' is possible but slightly more expansive.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: דבר in prophetic formulae often means a spoken message from God. 'The
    word' preserves the established biblical idiom and the weight of prophetic revelation;
    'message' is a possible dynamic alternative.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention
    while signaling the covenant name.
