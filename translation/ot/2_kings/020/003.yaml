id: 2KI.20.3
reference: 2 Kings 20:3
source:
  edition: WLC
  text: אָנָּ֣ה יְהוָ֗ה זְכָר נָ֞א אֵ֣ת אֲשֶׁ֧ר הִתְהַלַּ֣כְתִּי לְ/פָנֶ֗י/ךָ בֶּֽ/אֱמֶת֙ וּ/בְ/לֵבָ֣ב שָׁלֵ֔ם וְ/הַ/טּ֥וֹב בְּ/עֵינֶ֖י/ךָ עָשִׂ֑יתִי וַ/יֵּ֥בְךְּ חִזְקִיָּ֖הוּ בְּכִ֥י גָדֽוֹל־׃ס
translation:
  text: “Please, O Yahweh, remember, I pray, how I have walked before you in faithfulness and with a whole heart, and have done what is good in your eyes.” And Hezekiah wept bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in truth.” The Hebrew can denote truthfulness or faithfulness; here it refers to Hezekiah’s faithful conduct before God.
    reason: lexical_alternative
  - marker: b
    text: Or “with an undivided heart.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנָּה
  chosen: Please
  alternatives:
  - Ah
  - I pray
  lexicon: HALOT
  rationale: Polite particle of entreaty in prayer. 'Please' conveys earnest appeal in natural modern English without archaic tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: זְכָר נָא
  chosen: remember
  alternatives:
  - please remember
  - call to mind
  lexicon: HALOT
  rationale: Imperative plus entreaty particle expresses urgent petition. The force of נָא is carried by 'Please' earlier in the clause, avoiding redundancy while preserving the plea.
- source_word: הִתְהַלַּכְתִּי לְפָנֶיךָ
  chosen: I have walked before you
  alternatives:
  - I have lived before you
  - I have conducted myself before you
  lexicon: HALOT
  rationale: Idiomatic Hebrew for one's manner of life in God's presence. 'Walked before you' preserves the biblical metaphor while remaining understandable.
- source_word: בֶּאֱמֶת
  chosen: in faithfulness
  alternatives:
  - in truth
  - truly
  lexicon: HALOT
  rationale: Here אֱמֶת describes covenantal reliability/integrity in conduct, not merely factual truth. 'Faithfulness' best fits the ethical context.
- source_word: וּבְלֵבָב שָׁלֵם
  chosen: with a whole heart
  alternatives:
  - with a perfect heart
  - with an undivided heart
  - with a complete heart
  lexicon: HALOT
  rationale: שָׁלֵם denotes completeness/wholeness, especially undivided loyalty. 'Whole heart' is idiomatic modern English and avoids misleading perfectionism in 'perfect heart.'
- source_word: וְהַטּוֹב בְּעֵינֶיךָ עָשִׂיתִי
  chosen: have done what is good in your eyes
  alternatives:
  - have done the good in your sight
  - have done what was good in your sight
  lexicon: HALOT
  rationale: Common Hebrew evaluative expression. 'What is good in your eyes' is a transparent rendering that preserves the God-centered standard of judgment.
- source_word: וַיֵּבְךְּ ... בְּכִי גָדוֹל
  chosen: And Hezekiah wept greatly
  alternatives:
  - And Hezekiah wept bitterly
  - And Hezekiah wept with great weeping
  lexicon: HALOT
  rationale: Cognate construction intensifies the verb. 'Wept greatly' preserves the emphasis without awkward literalism; 'bitterly' would add an emotional nuance not explicit in גָדוֹל.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
