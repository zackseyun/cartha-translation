theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse is a direct prayer to Israel's covenant God. The main text follows the project's default rendering for YHWH rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of שָׁלֵם in Hezekiah's self-description
  chosen_reading: with a whole heart
  alternative_readings:
  - with a perfect heart
  - with an undivided heart
  rationale: This preserves the text's claim of wholehearted devotion without overstating sinless perfection. The Hebrew speaks of completeness/integrity of loyalty.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
