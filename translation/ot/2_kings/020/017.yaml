id: 2KI.20.17
reference: 2 Kings 20:17
source:
  edition: WLC
  text: הִנֵּה֮ יָמִ֣ים בָּאִים֒ וְ/נִשָּׂ֣א כָּל אֲשֶׁ֣ר בְּ/בֵיתֶ֗/ךָ וַ/אֲשֶׁ֨ר
    אָצְר֧וּ אֲבֹתֶ֛י/ךָ עַד הַ/יּ֥וֹם הַ/זֶּ֖ה בָּבֶ֑לָ/ה לֹֽא יִוָּתֵ֥ר דָּבָ֖ר
    אָמַ֥ר יְהוָֽה׀־־־׃
translation:
  text: Look, days are coming when all that is in your house, and what your fathers
    have stored up until this day, will be carried to Babylon. Not a thing will be
    left, says the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors' instead of 'your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces a solemn prophetic announcement. 'Look' preserves the deictic
    force in readable modern English better than the more archaic 'Behold.'
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: A standard prophetic idiom announcing future judgment. 'Days are coming'
    is natural English and preserves the Hebrew aspect and tone.
- source_word: וְנִשָּׂא
  chosen: will be carried
  alternatives:
  - will be taken
  - will be borne away
  lexicon: HALOT
  rationale: The Niphal of נשׂא here is passive, referring to removal into exile/plunder.
    'Will be carried' captures the passive sense and the movement of goods to Babylon.
- source_word: כָּל אֲשֶׁר בְּבֵיתֶךָ
  chosen: all that is in your house
  alternatives:
  - everything in your house
  - all that is in your palace
  lexicon: HALOT
  rationale: '''House'' is the direct sense of בַּיִת. While the royal setting could
    justify ''palace,'' ''house'' better preserves the Hebrew wording without over-interpreting.'
- source_word: וַאֲשֶׁר אָצְרוּ אֲבֹתֶיךָ
  chosen: what your fathers have stored up
  alternatives:
  - what your fathers have treasured up
  - what your ancestors have laid up
  lexicon: HALOT
  rationale: אָצְרוּ denotes storing up treasure or provisions. 'Stored up' is clear,
    idiomatic, and broad enough to include royal treasures.
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'your fathers.' In context it refers to prior
    generations of Judah's kings/forebears. The literal rendering is retained; the
    broader sense is straightforward in context.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  - up to this day
  lexicon: HALOT
  rationale: A common temporal expression. 'Until this day' fits the forward-looking
    sentence structure well.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Babylon. 'To Babylon'
    is the most natural English rendering.
- source_word: לֹא יִוָּתֵר דָּבָר
  chosen: Not a thing will be left
  alternatives:
  - Nothing will remain
  - Not anything will be left
  lexicon: HALOT
  rationale: This expresses totality of loss. 'Not a thing will be left' is emphatic
    and idiomatic, preserving the force of the Hebrew negation plus singular noun.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: Prophetic speech formulas are often rendered with the English present
    for immediacy. Per doctrine, יְהוָה is rendered 'the LORD.' 'Declares' is possible,
    but 'says' is closer to אמר.
