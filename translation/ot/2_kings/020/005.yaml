theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Aspect of רֹפֶא in divine promise
  chosen_reading: I am healing you
  alternative_readings:
  - I will heal you
  rationale: The Hebrew uses a participle rather than a simple finite future. The chosen rendering preserves the immediacy of God's declared action without overstating a doctrinal nuance; the future-oriented alternative is preserved in a footnote because many English versions render it that way and the context supports that sense.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
