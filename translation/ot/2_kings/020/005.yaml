id: 2KI.20.5
reference: 2 Kings 20:5
source:
  edition: WLC
  text: שׁ֣וּב וְ/אָמַרְתָּ֞ אֶל חִזְקִיָּ֣הוּ נְגִיד עַמִּ֗/י כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵי֙ דָּוִ֣ד אָבִ֔י/ךָ שָׁמַ֨עְתִּי֙ אֶת תְּפִלָּתֶ֔/ךָ רָאִ֖יתִי אֶת דִּמְעָתֶ֑/ךָ הִנְ/נִי֙ רֹ֣פֶא לָ֔/ךְ בַּ/יּוֹם֙ הַ/שְּׁלִישִׁ֔י תַּעֲלֶ֖ה בֵּ֥ית יְהוָֽה־־־־־׃
translation:
  text: 'Go back and say to Hezekiah, the leader of my people, ‘Thus says Yahweh, the God of David your father: I have heard your prayer; I have seen your tears. Behold, I will heal you. On the third day you shall go up to the house of Yahweh.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will heal you.' The Hebrew reads more literally, 'Look, I am healing you,' using a participle that can express imminent action.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּב
  chosen: Go back
  alternatives:
  - Return
  - Turn back
  lexicon: HALOT
  rationale: Imperative to Isaiah to reverse course and go back to Hezekiah. 'Go back' is natural modern English and preserves the directional sense.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you shall say
  - and tell
  lexicon: HALOT
  rationale: Simple sequential command following the imperative. 'Say' is more direct and formally closer than 'tell.'
- source_word: נְגִיד עַמִּי
  chosen: the leader of my people
  alternatives:
  - the prince of my people
  - the ruler of my people
  lexicon: HALOT
  rationale: נָגִיד denotes a leader/ruler, often one appointed over a people. 'Leader' is clear modern English and avoids the potentially misleading aristocratic nuance of 'prince.'
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: אֱלֹהֵי דָּוִד אָבִיךָ
  chosen: the God of David your father
  alternatives:
  - the God of your father David
  lexicon: HALOT
  rationale: Both are possible in English; the chosen order closely follows the Hebrew while remaining natural.
- source_word: שָׁמַעְתִּי אֶת תְּפִלָּתֶךָ
  chosen: I have heard your prayer
  alternatives:
  - I heard your prayer
  lexicon: HALOT
  rationale: English present perfect conveys a past action with present relevance, fitting the divine response now being announced.
- source_word: רָאִיתִי אֶת דִּמְעָתֶךָ
  chosen: I have seen your tears
  alternatives:
  - I saw your tears
  lexicon: HALOT
  rationale: Parallel to 'I have heard'; present perfect preserves the immediacy and continuing significance of God's response.
- source_word: הִנְנִי
  chosen: Look,
  alternatives:
  - Behold,
  - See,
  lexicon: HALOT
  rationale: Introduces emphatic divine action. 'Look' is readable modern English; 'behold' would be overly archaic for project style.
- source_word: רֹפֶא לָךְ
  chosen: I am healing you
  alternatives:
  - I will heal you
  - I am about to heal you
  lexicon: HALOT
  rationale: The participle רֹפֶא with הִנְנִי expresses imminent or ongoing action. 'I am healing you' best reflects the Hebrew form while allowing the following time reference to specify when recovery is manifest.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: On the third day
  alternatives:
  - On the third day from now
  - By the third day
  lexicon: HALOT
  rationale: Straightforward temporal phrase. No need to expand beyond the Hebrew.
- source_word: תַּעֲלֶה
  chosen: you will go up
  alternatives:
  - you shall go up
  - you will ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up,' especially for going up to the temple. 'Go up' is idiomatic and preserves the cultic/topographical nuance.
- source_word: בֵּית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' This preserves the Hebrew expression; 'temple' is interpretive though contextually correct.
