id: 2KI.20.20
reference: 2 Kings 20:20
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֤י חִזְקִיָּ֨הוּ֙ וְ/כָל גְּב֣וּרָת֔/וֹ וַ/אֲשֶׁ֣ר עָשָׂ֗ה
    אֶת הַ/בְּרֵכָה֙ וְ/אֶת הַ/תְּעָלָ֔ה וַ/יָּבֵ֥א אֶת הַ/מַּ֖יִם הָ/עִ֑ירָ/ה הֲ/לֹא
    הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־־־־׃
translation:
  text: Now the rest of the acts of Hezekiah, and all his might, and how he made the
    pool and the conduit and brought the water into the city—are they not written
    in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reservoir' for 'pool'; the Hebrew term can denote a constructed water
      basin.
    reason: lexical_alternative
  - marker: b
    text: Or 'channel' for 'conduit'; the Hebrew refers to a watercourse or engineered
      water channel.
    reason: lexical_alternative
  - marker: c
    text: This likely refers to Hezekiah's well-known waterworks in Jerusalem; compare
      2 Chronicles 32:30.
    reason: cross_reference
lexical_decisions:
- source_word: יֶתֶר דִּבְרֵי
  chosen: the rest of the acts
  alternatives:
  - the rest of the deeds
  - the remainder of the matters
  lexicon: HALOT
  rationale: A standard historiographic formula in Kings. 'Acts' is idiomatic modern
    English for royal accomplishments and records, while still reflecting the broad
    sense of דְּבָרִים in this context.
- source_word: גְּבוּרָתוֹ
  chosen: his might
  alternatives:
  - his power
  - his mighty deeds
  lexicon: HALOT
  rationale: The noun can denote strength, valor, or mighty achievement. 'His might'
    preserves the abstract noun in Hebrew while allowing the following concrete accomplishments
    to exemplify it.
- source_word: וַאֲשֶׁר עָשָׂה
  chosen: and how he made
  alternatives:
  - and what he did
  - and that he made
  lexicon: HALOT
  rationale: Introduces a specific example of Hezekiah's accomplishments. 'How he
    made' reads naturally in English and connects the relative clause to the engineering
    works that follow.
- source_word: הַבְּרֵכָה
  chosen: the pool
  alternatives:
  - the reservoir
  lexicon: HALOT
  rationale: בְּרֵכָה commonly refers to a pool or reservoir. 'Pool' is the more straightforward
    rendering in English; the likely reference is Hezekiah's waterworks, but the translation
    should not over-specify in the main text.
- source_word: הַתְּעָלָה
  chosen: the conduit
  alternatives:
  - the channel
  - the canal
  lexicon: HALOT
  rationale: The term denotes a water channel or conduit. 'Conduit' fits the engineering
    context and pairs well with 'pool' in a readable but fairly formal rendering.
- source_word: וַיָּבֵא אֶת־הַמַּיִם הָעִירָה
  chosen: and brought the water into the city
  alternatives:
  - and brought water into the city
  - and caused the water to come into the city
  lexicon: HALOT
  rationale: The directional ending on עִירָה indicates movement into the city. 'Brought
    the water into the city' preserves the definite object and the sense of directed
    transfer.
- source_word: הֲלֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: This is the conventional closing formula in Kings. 'Are they not written'
    keeps the rhetorical question and stays close to the Hebrew style.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the annals
  - the book of the events of the days
  lexicon: HALOT
  rationale: A technical title for a royal record source. 'Chronicles' is the established
    and natural English equivalent here, while capitalization signals a source title
    rather than the canonical book.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - for the kings of Judah
  lexicon: HALOT
  rationale: In this source-title formula, English idiom favors 'of the Kings of Judah'
    to indicate the annals pertaining to Judah's kings.
