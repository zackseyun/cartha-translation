id: 2KI.20.18
reference: 2 Kings 20:18
source:
  edition: WLC
  text: וּ/מִ/בָּנֶ֜י/ךָ אֲשֶׁ֨ר יֵצְא֧וּ מִמְּ/ךָ֛ אֲשֶׁ֥ר תּוֹלִ֖יד יקח וְ/הָיוּ֙
    סָֽרִיסִ֔ים בְּ/הֵיכַ֖ל מֶ֥לֶךְ בָּבֶֽל׃
translation:
  text: And some of your sons who will come from you, whom you will father, will be
    taken, and they will become eunuchs in the palace of the king of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'court officials' or 'palace officials'; the Hebrew term can refer either
      to literal eunuchs or, in some contexts, to royal officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבָּנֶיךָ
  chosen: And some of your sons
  alternatives:
  - And from your sons
  - And some of your descendants
  lexicon: HALOT
  rationale: The partitive מן with 'your sons' naturally yields 'some of your sons'
    rather than a bare 'from your sons.' 'Sons' is retained rather than 'descendants'
    because the Hebrew is specifically בנים, though the context clearly points to
    royal offspring.
- source_word: אֲשֶׁר יֵצְאוּ מִמְּךָ
  chosen: who will come from you
  alternatives:
  - who will issue from you
  - who will be born to you
  lexicon: HALOT
  rationale: The idiom literally speaks of sons 'going out from' Hezekiah, a common
    way to denote physical descent. 'Come from you' is readable modern English that
    preserves the genealogical sense without over-paraphrasing.
- source_word: אֲשֶׁר תּוֹלִיד
  chosen: whom you will father
  alternatives:
  - whom you will beget
  - whom you will have
  lexicon: HALOT
  rationale: The Hiphil of ילד here is causative/begetting language addressed to a
    male subject. 'Father' is natural modern English and preserves the specifically
    paternal sense better than the broader 'have.'
- source_word: יִקַּח
  chosen: will be taken
  alternatives:
  - he will take
  - one will take them
  lexicon: HALOT
  rationale: 'Although the Hebrew verb is formally singular active (''he will take''),
    the subject is indefinite/impersonal in context, so English passive is the most
    natural equivalent: the sons ''will be taken.'' This avoids supplying an explicit
    subject not present in the text.'
- source_word: וְהָיוּ
  chosen: and they will become
  alternatives:
  - and they will be
  lexicon: HALOT
  rationale: With a predicate noun, היה can mean either 'be' or 'become.' In this
    context of deported royal sons entering a new status, 'become' better conveys
    the resulting condition.
- source_word: סָרִיסִים
  chosen: eunuchs
  alternatives:
  - court officials
  - palace officials
  lexicon: HALOT
  rationale: The primary sense is 'eunuchs,' and in this context of captive royal
    sons in a foreign court the literal sense is plausible and traditional. Because
    the term can also denote court officials in some contexts, that alternative is
    preserved in a footnote rather than adopted in the main text.
- source_word: בְּהֵיכַל
  chosen: in the palace
  alternatives:
  - in the temple
  - in the court
  lexicon: HALOT
  rationale: Though היכל can denote a temple/palace complex, with 'king of Babylon'
    it clearly refers to the royal palace, not a temple.
- source_word: מֶלֶךְ בָּבֶל
  chosen: of the king of Babylon
  alternatives:
  - of Babylon's king
  lexicon: HALOT
  rationale: A straightforward construct chain. 'King of Babylon' is the standard
    and clearest English rendering.
