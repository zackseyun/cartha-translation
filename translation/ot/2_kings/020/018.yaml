theological_decisions:
- issue: Meaning of סָרִיסִים in a court setting
  chosen_reading: literal 'eunuchs' in the main text
  alternative_readings:
  - court officials
  - palace officials
  rationale: The Hebrew term can denote either literal eunuchs or, by extension, high
    court officials. Here the prophecy concerns Hezekiah's own sons being taken into
    Babylonian royal service, and the literal reading fits both the lexical core and
    the gravity of the judgment. To preserve interpretive tension, the official/courtier
    sense is retained in a footnote rather than resolved away.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
