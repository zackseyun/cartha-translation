id: 2KI.20.15
reference: 2 Kings 20:15
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר מָ֥ה רָא֖וּ בְּ/בֵיתֶ֑/ךָ וַ/יֹּ֣אמֶר חִזְקִיָּ֗הוּ אֵ֣ת כָּל
    אֲשֶׁ֤ר בְּ/בֵיתִ/י֙ רָא֔וּ לֹא הָיָ֥ה דָבָ֛ר אֲשֶׁ֥ר לֹֽא הִרְאִיתִ֖/ם בְּ/אֹצְרֹתָֽ/י־־־׃
translation:
  text: And he said, “What did they see in your house?” And Hezekiah said, “They saw
    everything that is in my house. There was nothing that I did not show them in
    my treasuries.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in your palace.” Hebrew “in your house.”
    reason: lexical_alternative
  - marker: b
    text: Or “storehouses.” The Hebrew term can refer to places where valuables or
      supplies are kept.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What
  alternatives:
  - What thing
  lexicon: HALOT
  rationale: Direct interrogative pronoun introducing Isaiah's question; simple 'What'
    is natural and sufficiently formal.
- source_word: רָאוּ
  chosen: did they see / saw
  alternatives:
  - have they seen
  - looked at
  lexicon: HALOT
  rationale: From ראה, ordinary verb of seeing. English uses past tense in both clauses
    to match the Hebrew narrative context.
- source_word: בְּבֵיתֶךָ
  chosen: in your house
  alternatives:
  - in your palace
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In royal context it can imply palace,
    but the verse contrasts 'my house' with 'my treasuries,' and 'house' preserves
    the Hebrew wording without over-interpreting.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name.
- source_word: אֵת כָּל אֲשֶׁר בְּבֵיתִי
  chosen: everything that is in my house
  alternatives:
  - all that is in my house
  - everything in my house
  lexicon: HALOT
  rationale: אֵת marks the direct object; כָּל אֲשֶׁר gives a comprehensive sense.
    'Everything that is in my house' preserves the fullness and the relative clause.
- source_word: לֹא הָיָה דָבָר
  chosen: There was nothing
  alternatives:
  - Not a thing existed
  - There was not a thing
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew existential negative construction.
- source_word: אֲשֶׁר לֹא הִרְאִיתִם
  chosen: that I did not show them
  alternatives:
  - that I did not let them see
  - that I did not display to them
  lexicon: HALOT
  rationale: Hiphil of ראה means 'cause to see,' hence 'show.' The 3mp suffix is explicit,
    so 'them' is retained.
- source_word: בְּאֹצְרֹתָי
  chosen: in my treasuries
  alternatives:
  - among my treasuries
  - in my storehouses
  lexicon: HALOT
  rationale: אֹצָר denotes treasury/storehouse. 'Treasuries' fits the royal context
    and the immediate narrative about displayed wealth better than the broader 'storehouses.'
