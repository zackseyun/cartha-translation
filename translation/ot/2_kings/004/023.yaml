id: 2KI.4.23
reference: 2 Kings 4:23
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר מַ֠דּוּעַ אתי הלכתי אֵלָי/ו֙ הַ/יּ֔וֹם לֹֽא חֹ֖דֶשׁ וְ/לֹ֣א שַׁבָּ֑ת
    וַ/תֹּ֖אמֶר שָׁלֽוֹם־׃
translation:
  text: And he said, “Why are you going to him today? It is neither new moon nor Sabbath.”
    And she said, “Peace.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “It is well” or “All is well.” Hebrew “Peace.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Interrogative asking reason or cause. 'Why' is the natural modern English
    equivalent.
- source_word: אתי הלכתי
  chosen: are you going
  alternatives:
  - will you go
  - do you go
  lexicon: HALOT
  rationale: The ketiv/qere-like irregularity reflects the sense 'you are going' addressed
    to a feminine singular subject. In English, present progressive best fits the
    immediate situation and common narrative idiom.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Elisha
  lexicon: HALOT
  rationale: The pronoun refers to Elisha from context. The text itself uses a pronoun,
    so 'to him' preserves the Hebrew wording without over-specifying.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Idiomatic temporal adverb in context; 'today' is clear modern English.
- source_word: לֹא חֹדֶשׁ וְלֹא שַׁבָּת
  chosen: It is neither new moon nor Sabbath
  alternatives:
  - It is not a new moon or a Sabbath
  - Neither new moon nor Sabbath
  lexicon: HALOT
  rationale: 'The construction gives the reason for his question: this is not a customary
    sacred occasion for visiting the prophet. ''Neither...nor...'' is the most natural
    English rendering.'
- source_word: חֹדֶשׁ
  chosen: new moon
  alternatives:
  - month
  lexicon: HALOT
  rationale: In this cultic/calendar context, חֹדֶשׁ refers to the new moon observance,
    not merely 'month.'
- source_word: שַׁבָּת
  chosen: Sabbath
  alternatives:
  - rest day
  lexicon: HALOT
  rationale: Standard rendering for the Israelite holy day; preserves the recognized
    biblical term.
- source_word: שָׁלוֹם
  chosen: Peace
  alternatives:
  - It is well
  - All is well
  - Well
  lexicon: HALOT
  rationale: The noun literally means 'peace,' but in brief reply it functions idiomatically
    as an assurance that all is well. Main text keeps the lexical transparency with
    a footnote preserving the idiomatic alternative.
