theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological term נֶפֶשׁ in an expression of distress
  chosen_reading: her soul is bitter within her
  alternative_readings:
  - she is in bitter distress
  - her life is bitter to her
  rationale: The Hebrew uses נפשׁ rather than a simple pronoun. To preserve the source's
    anthropological texture and emotional force without flattening it into paraphrase,
    'soul' is retained in the main text, with the idiom clarified by 'within her.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
