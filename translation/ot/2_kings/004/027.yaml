id: 2KI.4.27
reference: 2 Kings 4:27
source:
  edition: WLC
  text: וַ/תָּבֹ֞א אֶל אִ֤ישׁ הָֽ/אֱלֹהִים֙ אֶל הָ/הָ֔ר וַֽ/תַּחֲזֵ֖ק בְּ/רַגְלָ֑י/ו
    וַ/יִּגַּ֨שׁ גֵּֽיחֲזִ֜י לְ/הָדְפָ֗/הּ וַ/יֹּאמֶר֩ אִ֨ישׁ הָ/אֱלֹהִ֤ים הַרְפֵּֽה
    לָ/הּ֙ כִּֽי נַפְשָׁ֣/הּ מָֽרָה לָ֔/הּ וַֽ/יהוָה֙ הֶעְלִ֣ים מִמֶּ֔/נִּי וְ/לֹ֥א
    הִגִּ֖יד לִֽ/י־־־־־׃
translation:
  text: When she came to the man of God at the mountain, she seized his feet. Gehazi
    came near to push her away, but the man of God said, “Leave her alone, for her
    soul is bitter within her, and the LORD has hidden it from me and has not told
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “she took hold of his feet.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “her soul is bitter to her,” an idiom expressing deep inner anguish.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  - the holy man
  lexicon: HALOT
  rationale: A standard Hebrew title for a prophet; translated literally to preserve
    the source expression rather than replacing it with the interpretive label 'prophet.'
- source_word: אֶל הָהָר
  chosen: at the mountain
  alternatives:
  - to the mountain
  - on the mountain
  - at the hill
  lexicon: HALOT
  rationale: The preposition plus noun can be rendered spatially in several ways.
    Since she is arriving where Elisha is located, 'at the mountain' gives natural
    English while preserving the setting without over-specifying motion or elevation.
- source_word: וַתַּחֲזֵק בְּרַגְלָיו
  chosen: she seized his feet
  alternatives:
  - she took hold of his feet
  - she grasped his feet
  lexicon: HALOT
  rationale: חזק with ב can denote taking hold firmly. 'Seized' conveys the urgency
    and physicality of the act in concise modern English.
- source_word: וַיִּגַּשׁ
  chosen: came near
  alternatives:
  - approached
  - came forward
  lexicon: HALOT
  rationale: A common verb of approach. 'Came near' is straightforward and fits the
    narrative flow.
- source_word: לְהָדְפָהּ
  chosen: to push her away
  alternatives:
  - to drive her away
  - to thrust her away
  lexicon: HALOT
  rationale: The infinitive from הדף conveys forceful repelling. 'Push her away' is
    idiomatic modern English and preserves the dismissive action.
- source_word: הַרְפֵּה לָהּ
  chosen: Leave her alone
  alternatives:
  - Let her be
  - Release her
  lexicon: HALOT
  rationale: The imperative of רפה here means to desist from interfering with her.
    'Leave her alone' is the most natural contextual rendering in English.
- source_word: נַפְשָׁהּ
  chosen: her soul
  alternatives:
  - her life
  - her inner being
  - she herself
  lexicon: HALOT
  rationale: נפשׁ can mean life, self, or inner person. Here it refers to her inward
    state of anguish. 'Soul' preserves the Hebrew anthropological term and the emotional
    depth of the statement.
- source_word: מָרָה לָהּ
  chosen: is bitter within her
  alternatives:
  - is bitter to her
  - is in bitter distress
  - is embittered
  lexicon: HALOT
  rationale: The idiom expresses deep personal anguish. 'Is bitter within her' makes
    the inward distress explicit in natural English while staying close to the Hebrew
    image.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: הֶעְלִים מִמֶּנִּי
  chosen: has hidden it from me
  alternatives:
  - has concealed it from me
  - has kept it from me
  lexicon: HALOT
  rationale: The hiphil of עלם means to hide or conceal. 'Has hidden it from me' is
    direct and preserves Elisha's acknowledgment that this matter was not disclosed
    to him by God.
- source_word: וְלֹא הִגִּיד לִי
  chosen: and has not told me
  alternatives:
  - and did not tell me
  - and has not made it known to me
  lexicon: HALOT
  rationale: The clause parallels the previous verb and clarifies the hidden matter
    as undisclosed revelation. Present perfect English fits the immediate narrative
    context and current relevance.
