id: 2KI.4.26
reference: 2 Kings 4:26
source:
  edition: WLC
  text: עַתָּה֮ רֽוּץ נָ֣א לִ/קְרָאתָ/הּ֒ וֶ/אֱמָר לָ֗/הּ הֲ/שָׁל֥וֹם לָ֛/ךְ הֲ/שָׁל֥וֹם
    לְ/אִישֵׁ֖/ךְ הֲ/שָׁל֣וֹם לַ/יָּ֑לֶד וַ/תֹּ֖אמֶר שָׁלֽוֹם־־׃
translation:
  text: Now please run to meet her and say to her, ‘Is it well with you? Is it well
    with your husband? Is it well with the child?’ And she said, ‘It is well.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew shalom, repeated four times in this verse, can denote peace, wholeness,
      or well-being. Here it refers to welfare: ''Is it well...?'' / ''It is well.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Is the boy well?' The Hebrew yeled can mean 'child' or 'boy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At once
  - Immediately
  lexicon: HALOT
  rationale: Temporal adverb introducing urgent instruction. 'Now' is natural and
    sufficiently immediate in context.
- source_word: רֽוּץ נָא
  chosen: please run
  alternatives:
  - run now
  - run, please
  lexicon: HALOT
  rationale: Imperative of רוץ with particle נָא softens the command or adds urgency/politeness.
    'Please run' preserves both imperative force and the nuance of נָא better than
    a bare 'run.'
- source_word: לִקְרָאתָהּ
  chosen: to meet her
  alternatives:
  - toward her
  - to meet with her
  lexicon: HALOT
  rationale: The idiom לקראת commonly means going out to meet someone. 'To meet her'
    is idiomatic English and reflects the directional sense.
- source_word: וֶאֱמָר לָהּ
  chosen: and say to her
  alternatives:
  - and tell her
  lexicon: HALOT
  rationale: אמר is the common verb 'say.' 'Say to her' stays closer to the Hebrew
    than 'tell her'.
- source_word: הֲשָׁלוֹם לָךְ
  chosen: Is it well with you?
  alternatives:
  - Are you well?
  - Is there peace for you?
  lexicon: HALOT
  rationale: The interrogative plus שָׁלוֹם asks about welfare or well-being. 'Is
    it well with you?' preserves the repeated Hebrew structure and the broader sense
    of welfare beyond mere health.
- source_word: הֲשָׁלוֹם לְאִישֵׁךְ
  chosen: Is it well with your husband?
  alternatives:
  - Is your husband well?
  lexicon: HALOT
  rationale: אִישׁ here means 'husband' in relation to the woman addressed. Repeating
    'Is it well with...' mirrors the Hebrew pattern.
- source_word: הֲשָׁלוֹם לַיָּלֶד
  chosen: Is it well with the child?
  alternatives:
  - Is the boy well?
  - Is it well with your child?
  lexicon: HALOT
  rationale: יֶּלֶד means 'child' or 'boy.' 'Child' is broader and fits the narrative
    without over-specifying sex in English, though the referent is the woman's son.
    The article is preserved as 'the child,' reflecting the known child in context.
- source_word: וַתֹּאמֶר שָׁלוֹם
  chosen: And she said, ‘It is well.’
  alternatives:
  - And she said, 'Well.'
  - And she said, 'Peace.'
  lexicon: HALOT
  rationale: The one-word reply שָׁלוֹם here means 'all is well' or 'it is well,'
    not merely 'peace.' Expanding slightly in English is necessary for intelligibility
    while preserving the semantic content and likely intentional brevity.
