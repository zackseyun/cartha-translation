id: 2KI.4.3
reference: 2 Kings 4:3
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לְכִ֨י שַׁאֲלִי לָ֤/ךְ כֵּלִים֙ מִן הַ/ח֔וּץ מֵ/אֵ֖ת כָּל שכנ/כי
    כֵּלִ֥ים רֵקִ֖ים אַל תַּמְעִֽיטִי־־־־׃
translation:
  text: Then he said, “Go, borrow vessels for yourself from outside, from all your
    neighbors—empty vessels. Do not gather only a few.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ask for vessels'; the Hebrew verb can mean 'ask' more generally, but
      here likely implies borrowing from neighbors for temporary use.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Do not make few' or 'Do not diminish.' The sense in context
      is not to collect only a small number of vessels.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכִי
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: Imperative feminine singular of הלך used to send the woman to act. 'Go'
    is the natural English imperative here.
- source_word: שַׁאֲלִי
  chosen: borrow
  alternatives:
  - ask for
  - request
  lexicon: HALOT
  rationale: In context of obtaining containers from neighbors for temporary use,
    'borrow' best captures the practical sense of שאל. 'Ask for' is possible more
    literally, but English context favors 'borrow'.
- source_word: כֵּלִים
  chosen: vessels
  alternatives:
  - containers
  - jars
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles/utensils/containers. Here the objects
    are to hold oil, so 'vessels' preserves breadth without over-specifying. 'Jars'
    is too narrow; 'containers' is more colloquial but less idiomatic in biblical
    narrative.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The dative pronoun marks personal involvement/benefit. 'For yourself'
    brings out the reflexive-benefactive nuance naturally in English.
- source_word: מִן הַחוּץ
  chosen: from outside
  alternatives:
  - from outside your house
  - outdoors
  lexicon: HALOT
  rationale: Literally 'from the outside.' In context it points to going outside to
    obtain vessels from others, not from within her own house. The concise rendering
    preserves the Hebrew expression without over-expanding.
- source_word: מֵאֵת כָּל שכנכי
  chosen: from all your neighbors
  alternatives:
  - from all those who live near you
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the prepositional phrase. The plural
    with 2fs suffix refers to her neighbors collectively.
- source_word: כֵּלִים רֵקִים
  chosen: empty vessels
  alternatives:
  - empty containers
  lexicon: HALOT
  rationale: The adjective specifies that the borrowed vessels must be empty. Repeating
    'vessels' reflects the Hebrew repetition and keeps the instruction emphatic.
- source_word: אַל תַּמְעִיטִי
  chosen: Do not gather only a few
  alternatives:
  - Do not make it few
  - Do not get too few
  - Do not limit the number
  lexicon: HALOT
  rationale: The verb מעט in Hiphil with אַל conveys not reducing or making small
    in number. In this context the sense is not to collect too few vessels. 'Do not
    gather only a few' expresses the intended force clearly in modern English.
