id: 2KI.4.30
reference: 2 Kings 4:30
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֵ֣ם הַ/נַּ֔עַר חַי יְהוָ֥ה וְ/חֵֽי נַפְשְׁ/ךָ֖ אִם אֶעֶזְבֶ֑/ךָּ וַ/יָּ֖קָם וַ/יֵּ֥לֶךְ אַחֲרֶֽי/הָ־־־׃
translation:
  text: Then the boy’s mother said, “As Yahweh lives, and as your soul lives, I will not leave you.” So he arose and went after her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: ''As the LORD lives, and as your life lives''; that is, ''As surely as the LORD lives and as you live.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵם הַנַּעַר
  chosen: the boy’s mother
  alternatives:
  - the mother of the boy
  - the child's mother
  lexicon: HALOT
  rationale: Construct phrase literally means 'mother of the boy.' 'The boy’s mother' is natural modern English and preserves the specific maternal identification in context.
- source_word: חַי יְהוָה וְחֵי נַפְשְׁךָ
  chosen: As the LORD lives, and as you yourself live
  alternatives:
  - By the life of the LORD and by your life
  - As surely as the LORD lives and as you live
  lexicon: HALOT
  rationale: This is a standard oath formula invoking the life of YHWH and the addressee. 'As the LORD lives' is idiomatic and established; 'you yourself live' brings out the 2ms suffix on 'your life' without sounding archaic. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִם אֶעֶזְבֶךָּ
  chosen: I will not leave you
  alternatives:
  - surely I will not leave you
  - if I leave you
  lexicon: HALOT
  rationale: After an oath, אִם functions idiomatically as a negative asseveration ('surely not'). English expresses the sense directly as 'I will not leave you' rather than preserving the formally conditional 'if I leave you,' which would obscure the meaning.
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he got up
  - he stood up
  lexicon: HALOT
  rationale: Refers to Elisha's response. 'Arose' preserves the narrative dignity and matches the Hebrew verb קום in sequential narrative.
- source_word: וַיֵּלֶךְ אַחֲרֶיהָ
  chosen: went after her
  alternatives:
  - followed her
  - went behind her
  lexicon: HALOT
  rationale: Literally 'went after her.' This can mean 'followed her,' but 'went after her' preserves the Hebrew imagery while remaining clear in English.
