- issue: Rendering of the divine name יְהוָה in an oath formula
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a conventional oath. Per DOCTRINE.md,
    the default rendering is 'the LORD,' following Jewish reverence tradition and
    the Septuagintal pattern.
