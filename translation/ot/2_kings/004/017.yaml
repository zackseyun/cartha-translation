id: 2KI.4.17
reference: 2 Kings 4:17
source:
  edition: WLC
  text: וַ/תַּ֥הַר הָ/אִשָּׁ֖ה וַ/תֵּ֣לֶד בֵּ֑ן לַ/מּוֹעֵ֤ד הַ/זֶּה֙ כָּ/עֵ֣ת חַיָּ֔ה
    אֲשֶׁר דִּבֶּ֥ר אֵלֶ֖י/הָ אֱלִישָֽׁע־׃
translation:
  text: So the woman conceived and bore a son at that appointed time, about this time
    next year, just as Elisha had spoken to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''at this appointed time, at the time of life''; an idiom meaning
      roughly the same season next year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  chosen: conceived
  alternatives:
  - became pregnant
  lexicon: HALOT
  rationale: The verb הרה in the qal/waw-consecutive narrative form denotes becoming
    pregnant. 'Conceived' is concise, idiomatic, and fits the fulfillment context.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean 'woman' or 'wife'; here the narrative focus remains
    on the Shunammite woman as previously identified, so 'the woman' best matches
    the discourse reference.
- source_word: וַתֵּלֶד בֵּן
  chosen: bore a son
  alternatives:
  - gave birth to a son
  lexicon: HALOT
  rationale: ילד + בן is the standard idiom for childbirth. 'Bore a son' is natural
    English and slightly more formal, fitting the narrative style.
- source_word: לַמּוֹעֵד הַזֶּה
  chosen: at that appointed time
  alternatives:
  - at this appointed time
  - at the set time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed or fixed time. Although the Hebrew has 'this,'
    English idiom in retrospective narration often prefers 'that' when referring back
    to a previously specified future point. 'Appointed time' preserves the sense better
    than a bare 'time.'
- source_word: כָּעֵת חַיָּה
  chosen: about this time next year
  alternatives:
  - at this time of life
  - when the time came round
  lexicon: HALOT
  rationale: This idiom, also found in promise-birth contexts, refers to the same
    season/time in the following year. 'About this time next year' communicates the
    temporal sense clearly in modern English. The more literal 'at this time of life'
    is obscure in English and is better preserved in a footnote.
- source_word: אֲשֶׁר דִּבֶּר אֵלֶיהָ
  chosen: just as Elisha had spoken to her
  alternatives:
  - as Elisha had said to her
  - which Elisha had spoken to her
  lexicon: HALOT
  rationale: The relative clause marks fulfillment of Elisha's prior word. 'Just as'
    makes the correspondence explicit and natural in English; the pluperfect 'had
    spoken' reflects prior action relative to the birth.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
