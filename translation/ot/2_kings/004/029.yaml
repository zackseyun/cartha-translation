id: 2KI.4.29
reference: 2 Kings 4:29
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר לְ/גֵיחֲזִ֜י חֲגֹ֣ר מָתְנֶ֗י/ךָ וְ/קַ֨ח מִשְׁעַנְתִּ֣/י בְ/יָדְ/ךָ֮
    וָ/לֵךְ֒ כִּֽי תִמְצָ֥א אִישׁ֙ לֹ֣א תְבָרְכֶ֔/נּוּ וְ/כִֽי יְבָרֶכְ/ךָ֥ אִ֖ישׁ
    לֹ֣א תַעֲנֶ/נּ֑וּ וְ/שַׂמְתָּ֥ מִשְׁעַנְתִּ֖/י עַל פְּנֵ֥י הַ/נָּֽעַר־־־׃
translation:
  text: Then he said to Gehazi, “Tuck up your garment, take my staff in your hand,
    and go. If you meet anyone, do not greet him; and if anyone greets you, do not
    answer him. Then place my staff on the boy’s face.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Gird up your loins,' an idiom for preparing quickly for
      action.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not bless him' / 'if anyone blesses you'; here the verb likely refers
      to exchanging greetings on the road.
    reason: lexical_alternative
  - marker: c
    text: '''Anyone'' renders Hebrew ''man'' with generic force in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲגֹר מָתְנֶיךָ
  chosen: Tuck up your garment
  alternatives:
  - Gird up your loins
  - Belt your waist
  lexicon: HALOT
  rationale: Literally 'gird your loins,' an idiom for preparing for urgent action
    by securing one's robe. 'Tuck up your garment' communicates the action in readable
    modern English without archaic idiom, while preserving the sense of haste and
    readiness.
- source_word: מִשְׁעַנְתִּי
  chosen: my staff
  alternatives:
  - my walking stick
  - my rod
  lexicon: HALOT
  rationale: The noun denotes a staff or support. 'Staff' is the most natural narrative
    rendering here and fits the prophetic object being carried and later laid on the
    child.
- source_word: וָלֵךְ
  chosen: and go
  alternatives:
  - and be on your way
  - go
  lexicon: HALOT
  rationale: A straightforward imperative of motion. 'And go' preserves the sequence
    of commands and the urgency of the scene.
- source_word: כִּי תִמְצָא אִישׁ
  chosen: If you meet anyone
  alternatives:
  - When you find a man
  - If you encounter a man
  lexicon: HALOT
  rationale: Although אִישׁ is formally 'man,' in this instruction it functions generically
    for any person encountered on the road. 'Anyone' best conveys the intended scope
    in idiomatic English while reflecting representative masculine usage.
- source_word: לֹא תְבָרְכֶנּוּ
  chosen: do not greet him
  alternatives:
  - do not bless him
  - do not salute him
  lexicon: HALOT
  rationale: ברך in meeting contexts commonly refers to giving a greeting or salutation
    rather than a formal blessing. 'Do not greet him' fits the travel context and
    explains the urgency of Elisha's command.
- source_word: וְכִי יְבָרֶכְךָ אִישׁ
  chosen: and if anyone greets you
  alternatives:
  - and if a man blesses you
  - and if anyone salutes you
  lexicon: HALOT
  rationale: For consistency with the previous clause and the social context, the
    same verb is rendered 'greets.' 'Anyone' again reflects the generic force of אִישׁ.
- source_word: לֹא תַעֲנֶנּוּ
  chosen: do not answer him
  alternatives:
  - do not respond to him
  - do not reply to him
  lexicon: HALOT
  rationale: ענה here means to answer or respond. 'Do not answer him' is direct and
    preserves the terse urgency of the Hebrew.
- source_word: וְשַׂמְתָּ ... עַל פְּנֵי הַנָּעַר
  chosen: Then place my staff on the boy’s face
  alternatives:
  - and lay my staff on the lad's face
  - put my staff upon the child's face
  lexicon: HALOT
  rationale: שׂים means 'put/place/set.' 'Place' is natural English, and 'boy' is
    a fitting rendering of נַעַר in this narrative context. 'Face' is retained literally
    rather than generalized.
- source_word: הַנָּעַר
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, servant, or young male. In this context
    of the Shunammite's son, 'the boy' is clear, natural, and contextually appropriate.
