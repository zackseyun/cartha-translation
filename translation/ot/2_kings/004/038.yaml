theological_decisions:
- issue: Rendering the idiom בְנֵי הַנְּבִיאִים
  chosen_reading: the sons of the prophets
  alternative_readings:
  - the disciples of the prophets
  - the prophetic guild
  rationale: The phrase is not a doctrinally contested term, but it carries institutional
    meaning. The main text preserves the Hebrew idiom in line with source-language
    primacy, while an explanatory alternative is preserved in a footnote for readers
    who may not recognize the idiom.
  doctrine_reference: Translation philosophy §§1, 4, 5
