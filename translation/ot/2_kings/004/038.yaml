id: 2KI.4.38
reference: 2 Kings 4:38
source:
  edition: WLC
  text: וֶ/אֱלִישָׁ֞ע שָׁ֤ב הַ/גִּלְגָּ֨לָ/ה֙ וְ/הָ/רָעָ֣ב בָּ/אָ֔רֶץ וּ/בְנֵי֙ הַ/נְּבִיאִ֔ים
    יֹשְׁבִ֖ים לְ/פָנָ֑י/ו וַ/יֹּ֣אמֶר לְ/נַעֲר֗/וֹ שְׁפֹת֙ הַ/סִּ֣יר הַ/גְּדוֹלָ֔ה
    וּ/בַשֵּׁ֥ל נָזִ֖יד לִ/בְנֵ֥י הַ/נְּבִיאִֽים׃
translation:
  text: And Elisha returned to Gilgal, and there was a famine in the land. Now the
    sons of the prophets were sitting before him, and he said to his servant, “Put
    on the large pot and boil stew for the sons of the prophets.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the disciples of the prophets,” referring to a prophetic community or
      guild.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  chosen: returned
  alternatives:
  - came back
  lexicon: HALOT
  rationale: Qal perfect of שוב commonly denotes returning to a prior location. 'Returned'
    is the most natural concise English rendering here.
- source_word: הַגִּלְגָּלָה
  chosen: to Gilgal
  alternatives:
  - Gilgalward
  lexicon: HALOT
  rationale: Directional he indicates motion toward the place name. Standard English
    expresses this as 'to Gilgal.'
- source_word: וְהָרָעָב בָּאָרֶץ
  chosen: and there was a famine in the land
  alternatives:
  - while the famine was in the land
  - and the famine was in the land
  lexicon: HALOT
  rationale: The verbless clause gives circumstantial background. English idiom prefers
    supplying 'there was' to make the clause natural while preserving the setting.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering and fits biblical narrative register
    better than ''country.'''
- source_word: בְנֵי הַנְּבִיאִים
  chosen: the sons of the prophets
  alternatives:
  - the disciples of the prophets
  - the prophetic guild
  lexicon: HALOT
  rationale: Literally 'sons of the prophets.' This expression refers to a prophetic
    community, but the translation preserves the Hebrew familial idiom in the main
    text rather than interpretively flattening it.
- source_word: יֹשְׁבִים לְפָנָיו
  chosen: were sitting before him
  alternatives:
  - were seated before him
  - were sitting in front of him
  lexicon: HALOT
  rationale: The participle gives ongoing scene description. 'Before him' preserves
    the relational nuance of being in his presence, likely as pupils before a master.
- source_word: לְנַעֲרוֹ
  chosen: to his servant
  alternatives:
  - to his young man
  - to his attendant
  lexicon: HALOT
  rationale: נַעַר can mean youth, servant, or attendant depending on context. Here
    the person is given a task in household service, so 'servant' best fits.
- source_word: שְׁפֹת
  chosen: Put on
  alternatives:
  - Set on
  - Place on the fire
  lexicon: HALOT
  rationale: The imperative from שפת in this context means to set a pot on the fire.
    'Put on' is idiomatic modern English and leaves the object explicit in the next
    words.
- source_word: הַסִּיר הַגְּדוֹלָה
  chosen: the large pot
  alternatives:
  - the big cooking pot
  - the great pot
  lexicon: HALOT
  rationale: סִיר is a cooking pot. 'Large pot' is clear modern English; 'great pot'
    sounds archaic.
- source_word: וּבַשֵּׁל
  chosen: and boil
  alternatives:
  - and cook
  lexicon: HALOT
  rationale: The verb means to boil/cook. Since the object is stew, 'boil' preserves
    the more specific culinary sense.
- source_word: נָזִיד
  chosen: stew
  alternatives:
  - pottage
  - soup
  lexicon: HALOT
  rationale: נָזִיד denotes boiled food or stew. 'Stew' is the clearest contemporary
    equivalent; 'pottage' is archaic.
