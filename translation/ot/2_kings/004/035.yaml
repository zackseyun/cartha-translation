theological_decisions:
- issue: Nature of Elisha's action over the child
  chosen_reading: Render the physical action descriptively without implying a sacramental
    or magical mechanism.
  alternative_readings:
  - Translate more literally as 'bent over him'
  - Translate more expansively as 'lay on him again'
  rationale: The Hebrew narrates Elisha's bodily action as part of the miracle account
    but does not explain the mechanism. The translation should preserve the event
    without importing theological interpretation beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
