id: 2KI.4.35
reference: 2 Kings 4:35
source:
  edition: WLC
  text: וַ/יָּ֜שָׁב וַ/יֵּ֣לֶךְ בַּ/בַּ֗יִת אַחַ֥ת הֵ֨נָּה֙ וְ/אַחַ֣ת הֵ֔נָּה וַ/יַּ֖עַל
    וַ/יִּגְהַ֣ר עָלָ֑י/ו וַ/יְזוֹרֵ֤ר הַ/נַּ֨עַר֙ עַד שֶׁ֣בַע פְּעָמִ֔ים וַ/יִּפְקַ֥ח
    הַ/נַּ֖עַר אֶת עֵינָֽי/ו־־׃
translation:
  text: Then he returned and walked in the house, once here and once there; then he
    went up and stretched himself over him, and the boy sneezed seven times, and the
    boy opened his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'back and forth' / 'to and fro.' The Hebrew literally says 'once here
      and once there.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bent over him.' The Hebrew verb can denote bending or bowing over someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Then he returned
  alternatives:
  - And he returned
  - So he turned back
  lexicon: HALOT
  rationale: שׁוּב in the wayyiqtol commonly advances the narrative with the sense
    'return.' 'Then' reflects the sequential force naturally in English.
- source_word: וַיֵּלֶךְ בַּבַּיִת
  chosen: walked in the house
  alternatives:
  - went about in the house
  - paced in the house
  lexicon: HALOT
  rationale: הלך with the locative phrase indicates movement within the house. 'Walked'
    is straightforward; 'paced' is possible but slightly interpretive, so it is kept
    as an alternative.
- source_word: אַחַת הֵנָּה וְאַחַת הֵנָּה
  chosen: once here and once there
  alternatives:
  - back and forth
  - to and fro
  lexicon: HALOT
  rationale: The idiom literally marks movement one way and then the other. 'Once
    here and once there' preserves the Hebrew imagery more closely than the smoother
    idiom 'back and forth.'
- source_word: וַיַּעַל
  chosen: then he went up
  alternatives:
  - and he went up
  lexicon: HALOT
  rationale: עלה likely refers to going up to the upper room/bed where the child lay.
    'Went up' preserves the spatial sense.
- source_word: וַיִּגְהַר עָלָיו
  chosen: stretched himself over him
  alternatives:
  - bent over him
  - lay upon him
  lexicon: HALOT
  rationale: The verb גהר denotes bending or bowing over. In this narrative context,
    following the earlier physical action over the child, 'stretched himself over
    him' best conveys the intended bodily posture without being wooden.
- source_word: וַיְזוֹרֵר
  chosen: sneezed
  alternatives:
  - gave a sneeze
  lexicon: HALOT
  rationale: The rare verb is traditionally and lexically understood as 'sneeze.'
    The following count 'seven times' confirms repeated sneezing.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the lad
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, servant, or child depending on context. Here
    it refers to the Shunammite's son; 'the boy' is natural and specific.
- source_word: עַד שֶׁבַע פְּעָמִים
  chosen: seven times
  alternatives:
  - up to seven times
  lexicon: HALOT
  rationale: 'Though עַד can suggest ''up to/until,'' in this idiom with a number
    of occurrences the sense is simply the completed total: ''seven times.'''
- source_word: וַיִּפְקַח ... אֶת עֵינָיו
  chosen: opened his eyes
  alternatives:
  - opened up his eyes
  lexicon: HALOT
  rationale: פקח עיניים is the standard idiom 'open the eyes.' The simple English
    expression is sufficient and idiomatic.
