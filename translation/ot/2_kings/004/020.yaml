id: 2KI.4.20
reference: 2 Kings 4:20
source:
  edition: WLC
  text: וַ/יִּשָּׂאֵ֔/הוּ וַ/יְבִיאֵ֖/הוּ אֶל אִמּ֑/וֹ וַ/יֵּ֧שֶׁב עַל בִּרְכֶּ֛י/הָ
    עַד הַֽ/צָּהֳרַ֖יִם וַ/יָּמֹֽת־־־׃
translation:
  text: And he carried him and brought him to his mother, and he sat on her knees
    until noon; then he died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on her lap'; the Hebrew reads 'on her knees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂאֵהוּ
  chosen: carried him
  alternatives:
  - picked him up
  - lifted him
  lexicon: HALOT
  rationale: The verb נשׂא commonly means 'lift, carry, bear.' In this narrative context,
    'carried him' best conveys sustained movement rather than merely the initial act
    of lifting.
- source_word: וַיְבִיאֵהוּ
  chosen: brought him
  alternatives:
  - took him
  lexicon: HALOT
  rationale: ביא in the Hiphil regularly means 'bring.' 'Brought him' preserves the
    directional sense toward the mother.
- source_word: אֶל אִמּוֹ
  chosen: to his mother
  alternatives:
  - to his mom
  lexicon: HALOT
  rationale: A straightforward relational phrase. 'Mother' fits the register of the
    narrative better than the more colloquial 'mom.'
- source_word: וַיֵּשֶׁב
  chosen: he sat
  alternatives:
  - he remained seated
  lexicon: HALOT
  rationale: ישׁב ordinarily means 'sit, dwell, remain.' Here the immediate physical
    setting with 'on her knees' favors the simple physical sense 'he sat.'
- source_word: עַל בִּרְכֶּיהָ
  chosen: on her knees
  alternatives:
  - on her lap
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'knees' (plural of בֶּרֶךְ). 'On her knees'
    is more formally accurate, while 'lap' is a possible idiomatic English equivalent.
    The more literal rendering is retained in the main text.
- source_word: עַד הַצָּהֳרַיִם
  chosen: until noon
  alternatives:
  - until midday
  lexicon: HALOT
  rationale: צהריים denotes midday/noon. 'Until noon' is natural modern English and
    preserves the temporal marker.
- source_word: וַיָּמֹת
  chosen: then he died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative sequence. 'Then he died' makes
    the progression clear in idiomatic English without adding content beyond the Hebrew.
