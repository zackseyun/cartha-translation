id: 2KI.4.4
reference: 2 Kings 4:4
source:
  edition: WLC
  text: וּ/בָ֗את וְ/סָגַ֤רְתְּ הַ/דֶּ֨לֶת֙ בַּעֲדֵ֣/ךְ וּ/בְעַד בָּנַ֔יִ/ךְ וְ/יָצַ֕קְתְּ
    עַ֥ל כָּל הַ/כֵּלִ֖ים הָ/אֵ֑לֶּה וְ/הַ/מָּלֵ֖א תַּסִּֽיעִי־־׃
translation:
  text: Then go in and shut the door behind yourself and behind your sons, and pour
    into all these containers; and set aside the full one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all these vessels.' The Hebrew term is broad and can refer to various
      kinds of containers.
    reason: lexical_alternative
  - marker: b
    text: Or 'remove the full one' / 'put the full one aside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאת
  chosen: Then go in
  alternatives:
  - And you shall come in
  - And go in
  lexicon: HALOT
  rationale: The verb בוא in this context means entering the house/room. English idiom
    prefers 'go in' rather than the more wooden 'come in,' since Elisha is directing
    her next action. 'Then' captures the sequential waw in natural English.
- source_word: וְסָגַרְתְּ הַדֶּלֶת
  chosen: shut the door
  alternatives:
  - close the door
  lexicon: HALOT
  rationale: סגר means to shut/close. 'Shut the door' is slightly more vivid and idiomatic
    in an instruction involving privacy.
- source_word: בַּעֲדֵךְ וּבְעַד בָּנַיִךְ
  chosen: behind yourself and behind your sons
  alternatives:
  - on yourself and on your sons
  - upon yourself and your sons
  - after you and your sons
  lexicon: HALOT
  rationale: The preposition בעד with 'door' idiomatically means 'behind' or 'upon
    behalf of/in front of' depending on context. Here, with shutting a door, the sense
    is that the door is closed behind them, excluding others. 'Behind yourself and
    behind your sons' preserves the repeated preposition and the concrete spatial
    sense.
- source_word: וְיָצַקְתְּ עַל
  chosen: and pour into
  alternatives:
  - and pour on
  - and pour out into
  lexicon: HALOT
  rationale: יצק is 'pour,' and with עַל plus vessels the English idiom is 'pour into'
    rather than the more literal 'pour on/over.' This reflects the intended action
    without paraphrasing.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  chosen: all these containers
  alternatives:
  - all these vessels
  - all these jars
  lexicon: HALOT
  rationale: כְּלִים is a broad term for articles/vessels/containers. Since the immediate
    context concerns borrowed empty receptacles for oil, 'containers' is accurate
    and accessible; 'vessels' is more traditional but less natural in modern English.
- source_word: וְהַמָּלֵא
  chosen: the full one
  alternatives:
  - what is full
  - the filled one
  - the full
  lexicon: HALOT
  rationale: 'The singular adjective with article functions substantivally: ''the
    full [one/container].'' Rendering it explicitly as ''the full one'' preserves
    the singular and avoids over-specifying beyond the Hebrew.'
- source_word: תַּסִּיעִי
  chosen: set aside
  alternatives:
  - remove
  - put aside
  - move away
  lexicon: HALOT
  rationale: The Hiphil of נסע here means to move/remove a filled vessel from the
    pouring area. 'Set aside' best fits the practical action in context and reads
    naturally in English.
