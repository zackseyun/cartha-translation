id: 2KI.4.19
reference: 2 Kings 4:19
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֶל אָבִ֖י/ו רֹאשִׁ֣/י רֹאשִׁ֑/י וַ/יֹּ֨אמֶר֙ אֶל הַ/נַּ֔עַר שָׂאֵ֖/הוּ
    אֶל אִמּֽ/וֹ־׀־־׃
translation:
  text: And he said to his father, “My head, my head!” Then he said to the young man,
    “Carry him to his mother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the servant” for “to the young man”; the Hebrew נַעַר can denote
      a youth, attendant, or servant depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - And he cried out
  - And he spoke
  lexicon: HALOT
  rationale: The verb אמר is the standard verb 'say.' Although the context is urgent,
    the Hebrew does not itself specify crying out, so 'said' preserves the source
    text while allowing the repeated exclamation to convey distress.
- source_word: אֶל אָבִיו
  chosen: to his father
  alternatives:
  - to his dad
  lexicon: HALOT
  rationale: Straightforward relational phrase; 'father' is the natural and appropriately
    dignified rendering in narrative context.
- source_word: רֹאשִׁי רֹאשִׁי
  chosen: My head, my head!
  alternatives:
  - My head! My head!
  - My head hurts!
  lexicon: HALOT
  rationale: The repeated noun with first-person suffix expresses acute distress.
    Rendering it literally preserves the terseness and emotional force without adding
    interpretive material such as 'hurts.' Punctuation conveys the cry.
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  - So he said
  lexicon: HALOT
  rationale: A second wayyiqtol advances the narrative. 'Then' gives natural English
    sequence while preserving the simple Hebrew progression.
- source_word: אֶל הַנַּעַר
  chosen: to the young man
  alternatives:
  - to the servant
  - to the boy
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, attendant, or servant depending on context.
    Here it refers to an accompanying male subordinate old enough to carry the child,
    so 'young man' is a balanced rendering that preserves age/gender without overcommitting
    to servant-status in the main text.
- source_word: שָׂאֵהוּ
  chosen: Carry him
  alternatives:
  - Lift him up
  - Take him
  lexicon: HALOT
  rationale: The imperative of נשׂא with object suffix here calls for physically bearing
    the child. 'Carry him' best fits the immediate context.
- source_word: אֶל אִמּוֹ
  chosen: to his mother
  alternatives:
  - to his mom
  lexicon: HALOT
  rationale: Simple kinship term; 'mother' matches the narrative register and parallels
    'father.'
