  from: shut the door behind him
  to: shut the door on him
  rationale: The Hebrew וַתִּסְגֹּר בַּעֲדוֹ (wattisgor baʿădô) means she shut the
    door to enclose him in the room. The English phrase 'shut the door behind him'
    is idiomatically awkward here; it typically means to close a door after someone
    has just walked through it. Since the boy is lying on the bed, this phrasing is
    spatially confusing. The alternative provided in the footnote, 'shut the door
    on him,' is a much clearer and more common English idiom for this action, accurately
    reflecting the sense of the Hebrew. The lexical decision note's claim that 'behind
    him' is the clearest option is debatable; 'on him' is superior.
