id: 2KI.4.21
reference: 2 Kings 4:21
source:
  edition: WLC
  text: וַ/תַּ֨עַל֙ וַ/תַּשְׁכִּבֵ֔/הוּ עַל מִטַּ֖ת אִ֣ישׁ הָ/אֱלֹהִ֑ים וַ/תִּסְגֹּ֥ר
    בַּעֲד֖/וֹ וַ/תֵּצֵֽא־׃
translation:
  text: Then she went up and laid him on the bed of the man of God, shut the door
    behind him, and went out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shut the door on him,' that is, closed the door with him inside the
      room.
    reason: lexical_alternative
  - marker: b
    text: Or 'shut the door behind him'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתַּעַל
  chosen: Then she went up
  alternatives:
  - And she went up
  - She went up
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' In narrative sequence, 'went up'
    preserves the spatial movement, likely to the upper room mentioned in the context.
    'Then' reflects the waw-consecutive as natural English narrative progression.
- source_word: וַתַּשְׁכִּבֵהוּ
  chosen: laid him
  alternatives:
  - made him lie down
  - placed him
  lexicon: HALOT
  rationale: From שׁכב in the causative sense, 'laid him' is the most natural concise
    English rendering for causing him to lie on the bed. It preserves the physical
    action without over-paraphrase.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Standard preposition meaning 'on/upon'; 'on' is idiomatic modern English.
- source_word: מִטַּת
  chosen: the bed
  alternatives:
  - the couch
  lexicon: HALOT
  rationale: מִטָּה commonly denotes a bed or sleeping place. 'Bed' fits both the
    immediate context and normal English usage.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard Hebrew title and should be translated directly rather
    than interpreted more specifically as 'prophet,' even though Elisha is a prophet.
    Direct rendering preserves the source expression.
- source_word: וַתִּסְגֹּר
  chosen: shut
  alternatives:
  - closed
  lexicon: HALOT
  rationale: סגר means 'shut/close.' 'Shut' is slightly more vivid and idiomatic with
    'door' in English narrative.
- source_word: בַּעֲדוֹ
  chosen: behind him
  alternatives:
  - on him
  - for him
  - after him
  lexicon: HALOT
  rationale: With סגר, בְּעַד commonly indicates shutting something behind or upon
    someone, i.e., closing the door with him inside. 'Behind him' best captures the
    idiom in clear English.
- source_word: וַתֵּצֵא
  chosen: and went out
  alternatives:
  - and left
  - and went out from there
  lexicon: HALOT
  rationale: יצא means 'go out.' 'Went out' preserves the concrete movement and avoids
    adding interpretive detail.
