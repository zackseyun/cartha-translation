id: 2KI.4.28
reference: 2 Kings 4:28
source:
  edition: WLC
  text: וַ/תֹּ֕אמֶר הֲ/שָׁאַ֥לְתִּי בֵ֖ן מֵ/אֵ֣ת אֲדֹנִ֑/י הֲ/לֹ֣א אָמַ֔רְתִּי לֹ֥א
    תַשְׁלֶ֖ה אֹתִֽ/י׃
translation:
  text: She said, “Did I ask my lord for a son? Did I not say, ‘Do not mislead me’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not deceive me” or “Do not give me false hope.” The Hebrew verb can
      denote misleading someone, here in the sense of raising hope that would prove
      empty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: She said
  alternatives:
  - And she said
  lexicon: HALOT
  rationale: Narrative waw-consecutive on אמר introduces her speech. English can omit
    the conjunction for natural style without loss of meaning.
- source_word: הֲשָׁאַלְתִּי
  chosen: Did I ask
  alternatives:
  - Have I asked
  - Did I request
  lexicon: HALOT
  rationale: The interrogative with שאל expresses a rhetorical question about whether
    she had requested the child. Simple past fits the narrative context.
- source_word: בֵן
  chosen: a son
  alternatives:
  - a child
  lexicon: HALOT
  rationale: בן specifically means 'son,' not merely 'child.' Gender-accurate rendering
    should be preserved.
- source_word: מֵאֵת אֲדֹנִי
  chosen: my lord
  alternatives:
  - from my lord
  - of my lord
  lexicon: HALOT
  rationale: 'The phrase literally includes the preposition ''from/with'' (''from
    my lord''), but idiomatic English with ''ask'' normally takes the indirect object
    directly: ''ask my lord for a son.'' ''My lord'' here is a respectful address
    to Elisha, not a divine title.'
- source_word: הֲלֹא אָמַרְתִּי
  chosen: Did I not say
  alternatives:
  - Did I not tell you
  - Have I not said
  lexicon: HALOT
  rationale: A second rhetorical question recalling her earlier protest. 'Say' is
    closer to אמר than the more interpretive 'tell you,' though the addressee is implied
    by context.
- source_word: לֹא תַשְׁלֶה אֹתִי
  chosen: Do not mislead me
  alternatives:
  - Do not deceive me
  - Do not give me false hope
  lexicon: HALOT
  rationale: The Hiphil of שלה here carries the sense of misleading or deceiving,
    especially by raising expectations falsely. 'Mislead me' is a balanced rendering;
    'deceive me' is possible but slightly stronger, while 'give me false hope' is
    interpretive.
