id: 2KI.4.12
reference: 2 Kings 4:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אֶל גֵּחֲזִ֣י נַעֲר֔/וֹ קְרָ֖א לַ/שּׁוּנַמִּ֣ית הַ/זֹּ֑את וַ/יִּקְרָא
    לָ֔/הּ וַֽ/תַּעֲמֹ֖ד לְ/פָנָֽי/ו־־׃
translation:
  text: Then he said to Gehazi his servant, “Call this Shunammite woman.” So he called
    her, and she stood before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “this Shunammite.” The Hebrew identifies her by origin; English
      may supply “woman” for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'And' is possible but less idiomatic
    in modern English.
- source_word: גֵּחֲזִי
  chosen: Gehazi
  rationale: Personal name is transliterated by standard convention, following the
    translation philosophy to transliterate names rather than translate them.
- source_word: נַעֲרוֹ
  chosen: his servant
  alternatives:
  - his attendant
  - his young man
  lexicon: HALOT
  rationale: נַעַר can mean 'young man,' 'servant,' or 'attendant' depending on context.
    Here it refers to Gehazi in his service role to Elisha, so 'his servant' best
    conveys function in clear English. 'Attendant' is possible, but 'servant' is more
    direct and common.
- source_word: קְרָא
  chosen: Call
  alternatives:
  - Summon
  lexicon: HALOT
  rationale: The imperative of קרא here means to call or summon someone into one's
    presence. 'Call' is the most straightforward rendering; 'summon' is slightly more
    formal and stronger than the context requires.
- source_word: לַשּׁוּנַמִּית הַזֹּאת
  chosen: this Shunammite woman
  alternatives:
  - this Shunammite
  - that Shunammite woman
  lexicon: HALOT
  rationale: The phrase identifies the woman by place association. English often needs
    'woman' for naturalness and clarity, since 'Shunammite' alone can sound adjectival
    or elliptical. 'This' reflects הַזֹּאת directly better than 'that' in this immediate
    deictic context.
- source_word: וַיִּקְרָא לָהּ
  chosen: So he called her
  alternatives:
  - And he called her
  - So he summoned her
  lexicon: HALOT
  rationale: This repeats the verb קרא in narrative sequence. 'So he called her' preserves
    the action and reads naturally in English, showing Gehazi's obedience to Elisha's
    command.
- source_word: וַתַּעֲמֹד
  chosen: and she stood
  alternatives:
  - and she came and stood
  - and she took her stand
  lexicon: HALOT
  rationale: The verb עמד means 'stand' or 'take one's stand.' The simple 'stood'
    matches the Hebrew without adding motion not explicitly stated.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in front of him
  - in his presence
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' spatially or in the presence of someone.
    'Before him' is the most concise and idiomatic rendering here.
