id: 2KI.4.33
reference: 2 Kings 4:33
source:
  edition: WLC
  text: וַ/יָּבֹ֕א וַ/יִּסְגֹּ֥ר הַ/דֶּ֖לֶת בְּעַ֣ד שְׁנֵי/הֶ֑ם וַ/יִּתְפַּלֵּ֖ל אֶל יְהוָֽה־׃
translation:
  text: He went in and shut the door behind the two of them, and prayed to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "shut the door upon the two of them," meaning he enclosed himself and the child alone in the room.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: He went in
  alternatives:
  - He entered
  - He came in
  lexicon: HALOT
  rationale: The wayyiqtol of בוא narrates the next action in sequence. 'Went in' is natural English in context and reflects movement into the room where the child lay. 'Entered' is possible but slightly more formal.
- source_word: וַיִּסְגֹּר
  chosen: shut
  alternatives:
  - closed
  lexicon: HALOT
  rationale: סגר means to shut/close. 'Shut' fits idiomatic English with 'the door' and preserves the concrete action.
- source_word: הַדֶּלֶת
  chosen: the door
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun דלת.
- source_word: בְּעַד שְׁנֵיהֶם
  chosen: behind the two of them
  alternatives:
  - upon the two of them
  - with the two of them shut inside
  lexicon: HALOT
  rationale: בְּעַד with shutting a door commonly indicates shutting it 'behind' someone or 'upon' them, i.e., enclosing them within. 'Behind the two of them' is idiomatic and conveys that only Elisha and the child were inside.
- source_word: וַיִּתְפַּלֵּל
  chosen: and prayed
  alternatives:
  - and he prayed
  lexicon: HALOT
  rationale: The hitpael of פלל here means to pray. English can omit the repeated subject naturally while preserving the narrative sequence.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated. The preposition אֶל is naturally rendered 'to' with the verb 'prayed'.
