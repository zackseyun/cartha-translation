id: 2KI.4.24
reference: 2 Kings 4:24
source:
  edition: WLC
  text: וַֽ/תַּחֲבֹשׁ֙ הָֽ/אָת֔וֹן וַ/תֹּ֥אמֶר אֶֽל נַעֲרָ֖/הּ נְהַ֣ג וָ/לֵ֑ךְ אַל
    תַּעֲצָר לִ֣/י לִ/רְכֹּ֔ב כִּ֖י אִם אָמַ֥רְתִּי לָֽ/ךְ־־־־׃
translation:
  text: Then she saddled the donkey and said to her servant, “Drive on and go; do
    not slow the riding for me unless I tell you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'do not restrain/stop for me to ride'; the sense is 'do not slow
      or stop on my account while I am riding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּחֲבֹשׁ הָאָתוֹן
  chosen: Then she saddled the donkey
  alternatives:
  - Then she bound the donkey
  - Then she saddled the she-donkey
  lexicon: HALOT
  rationale: חבש in this context refers to preparing an animal for riding, idiomatically
    'saddle.' אָתוֹן specifically denotes a female donkey, but English normally uses
    the generic 'donkey' unless the sex is contextually important.
- source_word: נַעֲרָהּ
  chosen: her servant
  alternatives:
  - her young man
  - her attendant
  lexicon: HALOT
  rationale: נַעַר commonly means a young male servant/attendant. In this narrative
    context the role is functional, so 'servant' best conveys both age/position without
    awkwardness. The masculine form indicates a male attendant, but English need not
    mark this in the main text.
- source_word: נְהַג וָלֵךְ
  chosen: Drive on and go
  alternatives:
  - Lead on and go
  - Guide and go on
  lexicon: HALOT
  rationale: נהג is used for driving or leading animals/vehicles onward. Combined
    with הלך, the sense is urgent forward movement. 'Drive on and go' captures the
    command to keep the animal moving.
- source_word: אַל תַּעֲצָר לִי לִרְכֹּב
  chosen: do not slow the riding for me
  alternatives:
  - do not restrain me from riding
  - do not stop on my account while riding
  - do not make me slow down in riding
  lexicon: HALOT
  rationale: עצר means hold back, restrain, or stop. With לִי and the infinitive לִרְכֹּב,
    the sense is not to hinder or slow her progress as she rides. 'Do not slow the
    riding for me' preserves the Hebrew construction while remaining intelligible.
- source_word: כִּי אִם אָמַרְתִּי לָךְ
  chosen: unless I tell you
  alternatives:
  - except if I say to you
  - unless I say so to you
  lexicon: HALOT
  rationale: 'כִּי אִם after a prohibition introduces an exception: ''unless'' or
    ''except.'' The idiomatic English rendering is ''unless I tell you.'''
