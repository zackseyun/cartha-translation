id: 2KI.4.42
reference: 2 Kings 4:42
source:
  edition: WLC
  text: וְ/אִ֨ישׁ בָּ֜א מִ/בַּ֣עַל שָׁלִ֗שָׁה וַ/יָּבֵא֩ לְ/אִ֨ישׁ הָ/אֱלֹהִ֜ים לֶ֤חֶם
    בִּכּוּרִים֙ עֶשְׂרִֽים לֶ֣חֶם שְׂעֹרִ֔ים וְ/כַרְמֶ֖ל בְּ/צִקְלֹנ֑/וֹ וַ/יֹּ֕אמֶר
    תֵּ֥ן לָ/עָ֖ם וְ/יֹאכֵֽלוּ־׃
translation:
  text: 'And a man came from Baal-shalishah and brought to the man of God bread of
    the firstfruits: twenty loaves of barley and fresh grain in his sack. And he said,
    “Give it to the people, so that they may eat.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'parched grain.' The Hebrew term may refer to grain prepared for eating
      rather than simply fresh grain.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'sack' is rare and uncertain; it may refer to a
      bag, wrapping, or possibly the grain in its husk.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun straightforwardly denotes an individual male person. 'A man'
    is the natural and sufficiently formal rendering here.
- source_word: מִבַּעַל שָׁלִשָׁה
  chosen: from Baal-shalishah
  alternatives:
  - from Baal Shalishah
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated,
    following the project's policy for names.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: This is a standard Hebrew title for a prophet, but the text itself says
    'man of God.' Retaining the idiom preserves the source wording and its literary
    resonance.
- source_word: לֶחֶם בִּכּוּרִים
  chosen: bread of the firstfruits
  alternatives:
  - firstfruits bread
  - bread from the firstfruits
  lexicon: HALOT
  rationale: The construct phrase most naturally means bread associated with firstfruits
    offering. 'Bread of the firstfruits' preserves the formal relationship without
    overinterpreting the cultic nuance.
- source_word: עֶשְׂרִים לֶחֶם שְׂעֹרִים
  chosen: twenty loaves of barley
  alternatives:
  - twenty barley loaves
  lexicon: HALOT
  rationale: Though literally 'twenty bread/loaves of barley,' idiomatic English prefers
    'twenty loaves of barley' or 'twenty barley loaves.' 'Loaves' is implied by לֶחֶם
    in counting contexts.
- source_word: כַרְמֶל
  chosen: fresh grain
  alternatives:
  - parched grain
  - ears of grain
  lexicon: HALOT
  rationale: In this context כַרְמֶל refers to grain in a fresh or prepared state,
    not Mount Carmel. 'Fresh grain' is a broad rendering that fits the firstfruits
    context without specifying a preparation method too narrowly. Because 'parched
    grain' is a common alternative, it is preserved in a footnote.
- source_word: בְּצִקְלֹנוֹ
  chosen: in his sack
  alternatives:
  - in his bag
  - in his cloak
  - in its husk
  lexicon: HALOT
  rationale: The noun is rare and uncertain. Many understand it as a container or
    wrapping in which the grain was carried. 'In his sack' gives a clear, plausible
    sense in context. Because the exact meaning is uncertain, alternatives are preserved
    in a footnote.
- source_word: תֵּן לָעָם וְיֹאכֵלוּ
  chosen: Give it to the people, so that they may eat
  alternatives:
  - Give it to the people and let them eat
  - Set it before the people, that they may eat
  lexicon: HALOT
  rationale: The imperative plus prefixed verb expresses purpose or intended result.
    'So that they may eat' is natural English and preserves the sense of the Hebrew
    construction.
