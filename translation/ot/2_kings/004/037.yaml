id: 2KI.4.37
reference: 2 Kings 4:37
source:
  edition: WLC
  text: וַ/תָּבֹא֙ וַ/תִּפֹּ֣ל עַל רַגְלָ֔י/ו וַ/תִּשְׁתַּ֖חוּ אָ֑רְצָ/ה וַ/תִּשָּׂ֥א
    אֶת בְּנָ֖/הּ וַ/תֵּצֵֽא־־׃פ
translation:
  text: Then she came and fell at his feet and bowed to the ground. Then she picked
    up her son and went out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostrated herself to the ground'; the Hebrew verb can also be rendered
      'worshiped' in some contexts, but here it most likely denotes an act of deep
      reverence before Elisha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: Then she came
  alternatives:
  - And she came
  - So she came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then she came' preserves
    the sequence in natural English without over-literal repetition of 'and.'
- source_word: וַתִּפֹּל עַל רַגְלָיו
  chosen: fell at his feet
  alternatives:
  - fell on his feet
  - threw herself at his feet
  lexicon: HALOT
  rationale: The idiom עַל רַגְלָיו in this context expresses prostration or supplication
    before Elisha. 'At his feet' is idiomatic English and avoids the awkwardly literal
    'on his feet.'
- source_word: וַתִּשְׁתַּחוּ אָרְצָה
  chosen: bowed to the ground
  alternatives:
  - bowed herself to the ground
  - prostrated herself to the ground
  - worshiped to the ground
  lexicon: HALOT
  rationale: The verb שׁחה commonly denotes bowing down or prostrating oneself. Here
    the action is directed toward Elisha in gratitude/respect, not necessarily divine
    worship, so 'bowed to the ground' best preserves the physical gesture without
    importing a theological claim.
- source_word: וַתִּשָּׂא אֶת בְּנָהּ
  chosen: picked up her son
  alternatives:
  - lifted up her son
  - took up her son
  lexicon: HALOT
  rationale: נשא means 'lift, carry, take.' In this narrative setting, after the child
    has been restored, 'picked up her son' is natural modern English and reflects
    the concrete action.
- source_word: וַתֵּצֵא
  chosen: went out
  alternatives:
  - left
  - departed
  lexicon: HALOT
  rationale: יצא is straightforwardly 'go out/come out.' 'Went out' preserves the
    simple narrative movement more closely than the more interpretive 'left' or formal
    'departed.'
