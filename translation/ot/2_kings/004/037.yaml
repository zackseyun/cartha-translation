theological_decisions:
- issue: Meaning of וַתִּשְׁתַּחוּ in relation to Elisha
  chosen_reading: Rendered as an act of bowing/prostration before Elisha in gratitude
    and reverence, not as explicit divine worship.
  alternative_readings:
  - Rendered as 'worshiped' in some English traditions
  rationale: The Hebrew verb can denote worship or obeisance depending on context.
    Since the object here is Elisha and the scene depicts thankful reverence after
    the restoration of her son, 'bowed to the ground' preserves the gesture without
    suggesting idolatrous worship or flattening the term's range.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
