id: 2KI.4.15
reference: 2 Kings 4:15
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר קְרָא לָ֑/הּ וַ/יִּקְרָא לָ֔/הּ וַֽ/תַּעֲמֹ֖ד בַּ/פָּֽתַח־־׃
translation:
  text: Then he said, “Call her.” So he called her, and she stood in the doorway.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the entrance.” The Hebrew term can refer to the doorway or entrance
      area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next action in sequence. 'Then he said'
    gives natural English narrative flow while preserving the consecutive sense; 'And
    he said' is possible but less idiomatic here.
- source_word: קְרָא
  chosen: Call
  alternatives:
  - Summon
  lexicon: HALOT
  rationale: Imperative of קרא addressed to a male singular servant/Gehazi. 'Call'
    is the plain, direct English equivalent and fits the immediate context.
- source_word: לָהּ
  chosen: her
  lexicon: HALOT
  rationale: Pronominal object clearly refers to the woman previously in context;
    simple object pronoun is sufficient.
- source_word: וַיִּקְרָא
  chosen: So he called
  alternatives:
  - And he called
  - So he summoned
  lexicon: HALOT
  rationale: Narrative continuation of קרא. 'So he called' reflects the responsive
    action to the command and reads naturally in English.
- source_word: וַתַּעֲמֹד
  chosen: and she stood
  alternatives:
  - and she came and stood
  lexicon: HALOT
  rationale: The verb עמד means 'stand, take one's stand.' The text does not explicitly
    say 'came,' so it should not be added to the main text.
- source_word: בַּפָּתַח
  chosen: in the doorway
  alternatives:
  - at the entrance
  - in the entrance
  lexicon: HALOT
  rationale: פתח denotes the opening/entrance. 'In the doorway' is natural modern
    English and conveys her position at the threshold without overformal wording.
