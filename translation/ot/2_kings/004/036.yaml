id: 2KI.4.36
reference: 2 Kings 4:36
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א אֶל גֵּיחֲזִ֗י וַ/יֹּ֨אמֶר֙ קְרָא֙ אֶל הַ/שֻּׁנַמִּ֣ית הַ/זֹּ֔את
    וַ/יִּקְרָאֶ֖/הָ וַ/תָּב֣וֹא אֵלָ֑י/ו וַ/יֹּ֖אמֶר שְׂאִ֥י בְנֵֽ/ךְ־־׃
translation:
  text: Then he called Gehazi and said, “Call this Shunammite woman.” So he called
    her, and she came to him. Then he said, “Take up your son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this Shunammite.” The Hebrew uses a feminine gentilic, literally “this
      Shunammite [woman].”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: Then he called
  alternatives:
  - And he called
  - So he called
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא introduces the next action in narrative sequence.
    'Then' gives natural English narrative flow while preserving the consecutive force.
- source_word: גֵּיחֲזִי
  chosen: Gehazi
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: קְרָא
  chosen: Call
  alternatives:
  - Summon
  lexicon: HALOT
  rationale: Imperative of קרא. 'Call' is the most direct and idiomatic rendering
    here; 'summon' is possible but slightly more formal than the context requires.
- source_word: הַשֻּׁנַמִּית הַזֹּאת
  chosen: this Shunammite woman
  alternatives:
  - this Shunammite
  - this woman from Shunem
  lexicon: HALOT
  rationale: The gentilic feminine singular refers to the woman from Shunem. English
    often needs 'woman' for clarity, though 'this Shunammite' would also be possible.
    'This' preserves הַזֹּאת.
- source_word: וַיִּקְרָאֶהָ
  chosen: So he called her
  alternatives:
  - And he called her
  lexicon: HALOT
  rationale: Repetition of קרא is retained rather than compressed, since the Hebrew
    explicitly narrates Gehazi's obedience.
- source_word: וַתָּבֹא אֵלָיו
  chosen: and she came to him
  alternatives:
  - and she came in to him
  lexicon: HALOT
  rationale: בוא + אֶל is straightforward motion toward a person. 'Came to him' is
    clear modern English; 'came in to him' may suggest entering a room but is not
    required by the Hebrew.
- source_word: שְׂאִי
  chosen: Take up
  alternatives:
  - Lift up
  - Carry
  lexicon: HALOT
  rationale: Imperative feminine singular of נשׂא. In context Elisha tells the mother
    to pick up her restored child. 'Take up' is idiomatic and fits the action well.
- source_word: בְנֵךְ
  chosen: your son
  alternatives:
  - your child
  lexicon: HALOT
  rationale: בן with 2fs suffix specifically means 'your son,' not the more general
    'your child.' This preserves the lexical specificity of the Hebrew.
