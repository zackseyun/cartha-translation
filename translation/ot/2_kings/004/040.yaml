id: 2KI.4.40
reference: 2 Kings 4:40
source:
  edition: WLC
  text: וַ/יִּֽצְק֥וּ לַ/אֲנָשִׁ֖ים לֶ/אֱכ֑וֹל וַ֠/יְהִי כְּ/אָכְלָ֨/ם מֵ/הַ/נָּזִ֜יד
    וְ/הֵ֣מָּה צָעָ֗קוּ וַ/יֹּֽאמְרוּ֙ מָ֤וֶת בַּ/סִּיר֙ אִ֣ישׁ הָ/אֱלֹהִ֔ים וְ/לֹ֥א
    יָכְל֖וּ לֶ/אֱכֹֽל׃
translation:
  text: So they poured it out for the men to eat. But as they were eating from the
    stew, they cried out and said, “There is death in the pot, man of God!” And they
    could not eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “death in the pot.” The phrase likely means the stew was deadly
      or poisonous.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְקוּ
  chosen: they poured it out
  alternatives:
  - they served
  - they poured
  lexicon: HALOT
  rationale: The verb יצק literally denotes pouring. In context of distributing cooked
    food, English may say 'served,' but 'poured it out' preserves the concrete action
    of ladling/pouring the stew while remaining natural enough.
- source_word: לַאֲנָשִׁים
  chosen: for the men
  alternatives:
  - to the men
  - for the people
  lexicon: HALOT
  rationale: The noun אֲנָשִׁים is the masculine plural of אִישׁ, here referring to
    the gathered men/disciples. Per gender-accurate policy, 'men' is preferred over
    a neutral expansion like 'people'.
- source_word: לֶאֱכֹל
  chosen: to eat
  lexicon: HALOT
  rationale: 'Straightforward infinitive of purpose: the food was poured out for them
    to eat.'
- source_word: כְּאָכְלָם
  chosen: as they were eating
  alternatives:
  - when they ate
  - as they ate
  lexicon: HALOT
  rationale: The construction marks contemporaneous action. 'As they were eating'
    communicates the unfolding discovery during the meal.
- source_word: מֵהַנָּזִיד
  chosen: from the stew
  alternatives:
  - from the boiled dish
  - from the pottage
  lexicon: HALOT
  rationale: נָזִיד refers to a boiled dish or stew. 'Stew' is clear modern English
    and avoids archaic 'pottage'.
- source_word: צָעָקוּ
  chosen: they cried out
  alternatives:
  - they shouted
  - they cried
  lexicon: HALOT
  rationale: The verb conveys a loud, urgent outcry. 'Cried out' best captures the
    alarmed reaction.
- source_word: מָוֶת בַּסִּיר
  chosen: There is death in the pot
  alternatives:
  - Death is in the pot
  - Poison is in the pot
  lexicon: HALOT
  rationale: The Hebrew is literally 'death in the pot.' This likely expresses deadly
    poison, but the vivid idiom should be preserved in the main text rather than interpreted
    away as 'poison.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: man of God
  alternatives:
  - O man of God
  lexicon: HALOT
  rationale: Standard title for Elisha. English can omit an explicit vocative particle
    because none is present; the direct address is clear from context and punctuation.
- source_word: וְלֹא יָכְלוּ לֶאֱכֹל
  chosen: And they could not eat it
  alternatives:
  - and they were unable to eat
  - and they could not eat
  lexicon: HALOT
  rationale: English idiom naturally supplies the object 'it' from context. This makes
    the sentence complete and readable without adding interpretive content.
