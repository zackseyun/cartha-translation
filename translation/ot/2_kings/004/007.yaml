id: 2KI.4.7
reference: 2 Kings 4:7
source:
  edition: WLC
  text: וַ/תָּבֹ֗א וַ/תַּגֵּד֙ לְ/אִ֣ישׁ הָ/אֱלֹהִ֔ים וַ/יֹּ֗אמֶר לְכִי֙ מִכְרִ֣י
    אֶת הַ/שֶּׁ֔מֶן וְ/שַׁלְּמִ֖י אֶת נשי/כי וְ/אַ֣תְּ בני/כי תִֽחְיִ֖י בַּ/נּוֹתָֽר־־׃פ
translation:
  text: Then she came and told the man of God, and he said, “Go, sell the oil, and
    pay your debt; and you and your sons can live on what is left.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pay your creditor,' if the underlying form is taken with reference to
      the person owed rather than the debt itself.
    reason: lexical_alternative
  - marker: b
    text: Literally 'you and your sons will live by the remainder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: Then she came
  alternatives:
  - So she came
  - And she came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Then' captures sequential movement
    in natural English without over-translating the conjunction.
- source_word: וַתַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: Hiphil of נגד means to tell/report. 'Told' is the most natural narrative
    rendering here.
- source_word: לְאִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  - the holy man
  lexicon: HALOT
  rationale: This is the standard Hebrew title for a prophet, but the text literally
    says 'man of God.' Following optimal equivalence and transparency, the title is
    translated rather than interpreted as merely 'the prophet.'
- source_word: לְכִי
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: Imperative feminine singular of הלך addressed to the woman. English does
    not mark feminine imperative, so 'Go' is sufficient.
- source_word: מִכְרִי
  chosen: sell
  alternatives:
  - go sell
  lexicon: HALOT
  rationale: Imperative feminine singular of מכר. Since 'Go' already renders the previous
    imperative, 'sell' is the direct and uncluttered equivalent.
- source_word: אֶת הַשֶּׁמֶן
  chosen: the oil
  alternatives:
  - the olive oil
  lexicon: HALOT
  rationale: שמן here refers to oil, likely olive oil in context, but 'the oil' preserves
    the Hebrew wording without adding specificity not explicit in the text.
- source_word: וְשַׁלְּמִי
  chosen: pay
  alternatives:
  - repay
  - settle
  lexicon: HALOT
  rationale: Piel imperative of שלם in a financial context means to pay/repay. 'Pay'
    is idiomatic with the following object.
- source_word: אֶת נִשְׁיֵךְ
  chosen: your debt
  alternatives:
  - your creditor
  - what you owe
  lexicon: HALOT
  rationale: The ketiv/qere-like written form points to נשה/נשי in a debt context.
    Given the narrative of the creditor in the preceding verses and the direct object
    marker, the sense is the obligation owed. 'Pay your debt' is the clearest English
    rendering. 'Pay your creditor' is possible conceptually but less likely as the
    direct sense of the form here.
- source_word: וְאַתְּ וּבָנַיִךְ
  chosen: you and your sons
  alternatives:
  - you and your children
  lexicon: HALOT
  rationale: The Hebrew explicitly specifies 'sons,' not a gender-neutral term. Per
    gender-accurate policy, this should be preserved.
- source_word: תִּחְיִי
  chosen: can live
  alternatives:
  - shall live
  - will live
  - may live
  lexicon: HALOT
  rationale: Imperfect of חיה here expresses resulting ability/provision rather than
    merely future existence. 'Can live' communicates that the remaining proceeds will
    sustain them.
- source_word: בַּנּוֹתָר
  chosen: on what is left
  alternatives:
  - from the remainder
  - on the rest
  lexicon: HALOT
  rationale: The participial/substantival form means 'the remaining thing/what remains.'
    'Live on what is left' is idiomatic English that preserves the sense of subsistence
    from the remainder.
