id: 2KI.4.13
reference: 2 Kings 4:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר ל֗/וֹ אֱמָר נָ֣א אֵלֶי/הָ֮ הִנֵּ֣ה חָרַ֣דְתְּ אֵלֵי/נוּ֮ אֶת כָּל
    הַ/חֲרָדָ֣ה הַ/זֹּאת֒ מֶ֚ה לַ/עֲשׂ֣וֹת לָ֔/ךְ הֲ/יֵ֤שׁ לְ/דַבֶּר לָ/ךְ֙ אֶל הַ/מֶּ֔לֶךְ
    א֖וֹ אֶל שַׂ֣ר הַ/צָּבָ֑א וַ/תֹּ֕אמֶר בְּ/ת֥וֹךְ עַמִּ֖/י אָנֹכִ֥י יֹשָֽׁבֶת־׀־־־־־׃
translation:
  text: And he said to him, “Please say to her, ‘Look, you have taken all this trouble
    for us. What is to be done for you? Is there something to be spoken for you to
    the king or to the commander of the army?’” And she said, “I am living among my
    own people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “you have trembled/been anxious for us with all this
      anxiety,” an idiom here meaning she has shown great care and gone to much trouble
      for them.
    reason: lexical_alternative
  - marker: b
    text: Or, “Is there anything to say on your behalf to the king or to the commander
      of the army?”
    reason: lexical_alternative
  - marker: c
    text: “I am living among my own people” likely means she is settled securely within
      her community and does not seek special favor from royal or military authorities.
    reason: cultural_note
lexical_decisions:
- source_word: חָרַדְתְּ / חֲרָדָה
  chosen: you have taken all this trouble for us
  alternatives:
  - you have been anxious for us with all this anxiety
  - you have cared for us with all this care
  lexicon: HALOT
  rationale: The verb חרד and cognate noun חרדה literally involve trembling, anxiety,
    or concern. In this hospitality context, the idiom points to the woman's careful,
    solicitous effort on behalf of Elisha and his servant rather than internal fear.
    'Taken all this trouble' is natural English that preserves the sense of considerable
    effort without flattening the warmth of her care.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces attention to what follows. 'Look' is readable modern English
    and fits the translation philosophy better than archaic 'Behold.'
- source_word: מֶה לַעֲשׂוֹת לָךְ
  chosen: What is to be done for you?
  alternatives:
  - What can be done for you?
  - What should I do for you?
  lexicon: HALOT
  rationale: This infinitive construction asks what action may be taken on her behalf.
    'What is to be done for you?' preserves the somewhat formal, deferential tone
    and leaves the agent implicit as in Hebrew.
- source_word: הֲיֵשׁ לְדַבֶּר לָךְ
  chosen: Is there something to be spoken for you
  alternatives:
  - Is there anything to say on your behalf
  - Can I speak for you
  lexicon: HALOT
  rationale: The Hebrew is literally about speaking for her, i.e., interceding or
    making a request on her behalf. The chosen rendering stays close to the form while
    remaining intelligible; the fuller sense is clarified by the following objects
    'to the king or to the commander of the army.'
- source_word: שַׂר הַצָּבָא
  chosen: the commander of the army
  alternatives:
  - the captain of the army
  - the army commander
  lexicon: HALOT
  rationale: שַׂר denotes a ruler, chief, or commander. 'Commander of the army' is
    clear modern English and fits the likely military official in view.
- source_word: בְּתוֹךְ עַמִּי אָנֹכִי יֹשָׁבֶת
  chosen: I am living among my own people
  alternatives:
  - I dwell among my own people
  - I live in the midst of my people
  lexicon: HALOT
  rationale: The phrase expresses contentment, security, and social embeddedness within
    her community, implying she has no need of royal or military patronage. 'My own
    people' brings out the possessive nuance naturally in English.
- source_word: נָא
  chosen: Please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Polite particle softening the imperative. 'Please' is the natural modern
    equivalent.
