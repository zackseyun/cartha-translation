theological_decisions:
- issue: Nature of Elisha's action toward the dead child
  chosen_reading: Render the physical actions concretely without importing later medical
    or sacramental concepts.
  alternative_readings:
  - Describe it as mouth-to-mouth resuscitation
  - Use more euphemistic wording to avoid bodily concreteness
  rationale: The Hebrew narrates a prophetic bodily act associated with the child's
    restoration, but it does not explicitly explain the mechanism. The translation
    therefore preserves the concrete sequence of actions and avoids anachronistic
    interpretation.
  doctrine_reference: Translation philosophy §1, §3, §6
