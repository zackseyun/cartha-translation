id: 2KI.4.34
reference: 2 Kings 4:34
source:
  edition: WLC
  text: וַ/יַּ֜עַל וַ/יִּשְׁכַּ֣ב עַל הַ/יֶּ֗לֶד וַ/יָּשֶׂם֩ פִּ֨י/ו עַל פִּ֜י/ו וְ/עֵינָ֤י/ו
    עַל עֵינָי/ו֙ וְ/כַפָּ֣י/ו עַל כפ/ו וַ/יִּגְהַ֖ר עָלָ֑י/ו וַ/יָּ֖חָם בְּשַׂ֥ר
    הַ/יָּֽלֶד־־־־׃
translation:
  text: Then he went up and lay on the boy, and put his mouth on his mouth, his eyes
    on his eyes, and his palms on his palms; and he stretched himself over him, and
    the boy’s flesh became warm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he bent over him.' The Hebrew verb is rare and may describe bending
      or stretching oneself over the child.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: Then he went up
  alternatives:
  - Then he went up to the room
  - Then he went up again
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' In context Elisha goes up to the
    upper room, but 'to the room' is implied from context rather than explicit here,
    so the main text keeps the simple verbal sense.
- source_word: וַיִּשְׁכַּב עַל הַיֶּלֶד
  chosen: lay on the boy
  alternatives:
  - lay upon the boy
  lexicon: HALOT
  rationale: שׁכב means 'lie down/lie.' 'Lay on' is natural modern English and preserves
    the physical action without archaic diction.
- source_word: וַיָּשֶׂם פִּיו עַל פִּיו
  chosen: put his mouth on his mouth
  alternatives:
  - placed his mouth on his mouth
  lexicon: HALOT
  rationale: שׂים is a common verb meaning 'put/place/set.' 'Put' is idiomatic and
    direct. פֶּה is rendered 'mouth' rather than the more formal 'mouthpiece' or similar;
    the phrase describes bodily contact.
- source_word: וְעֵינָיו עַל עֵינָיו
  chosen: his eyes on his eyes
  alternatives:
  - his eyes upon his eyes
  lexicon: HALOT
  rationale: A verbless continuation dependent on וַיָּשֶׂם. Repeating 'his' preserves
    the Hebrew symmetry and clarifies the correspondence between Elisha and the child.
- source_word: וְכַפָּיו עַל כַּפָּיו
  chosen: his palms on his palms
  alternatives:
  - his hands on his hands
  lexicon: HALOT
  rationale: כַּף more specifically denotes the palm or hollow of the hand rather
    than the hand in general. 'Palms' preserves the bodily precision of the Hebrew
    better than the broader 'hands.'
- source_word: וַיִּגְהַר עָלָיו
  chosen: he stretched himself over him
  alternatives:
  - he bent over him
  - he bowed himself over him
  lexicon: HALOT
  rationale: The rare verb גהר conveys bending or arching over. In this context, after
    the description of matching body parts, 'stretched himself over him' best communicates
    the physical posture in clear English.
- source_word: וַיָּחָם בְּשַׂר הַיָּלֶד
  chosen: the boy’s flesh became warm
  alternatives:
  - the boy's body became warm
  - the flesh of the boy grew warm
  lexicon: HALOT
  rationale: חם here denotes becoming warm. בָּשָׂר is literally 'flesh'; retaining
    'flesh' preserves the concrete bodily language of the Hebrew, while 'became warm'
    is smoother than 'grew warm' in contemporary English.
- source_word: הַיֶּלֶד / הַיָּלֶד
  chosen: the boy
  alternatives:
  - the child
  lexicon: HALOT
  rationale: יֶלֶד can mean 'child' or 'boy.' Since the child is specifically a son
    and the narrative often presents him as a boy, 'boy' is a natural and sufficiently
    precise rendering here.
