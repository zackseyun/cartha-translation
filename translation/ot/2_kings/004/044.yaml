id: 2KI.4.44
reference: 2 Kings 4:44
source:
  edition: WLC
  text: וַ/יִּתֵּ֧ן לִ/פְנֵי/הֶ֛ם וַ/יֹּאכְל֥וּ וַ/יּוֹתִ֖רוּ כִּ/דְבַ֥ר יְהוָֽה׃פ
translation:
  text: So he set it before them, and they ate and had some left over, according to the word of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and there was some left over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: he set it
  alternatives:
  - he gave
  - he placed
  lexicon: HALOT
  rationale: The verb נתן literally means 'gave/put.' In this context with לִפְנֵיהֶם ('before them'), idiomatic English is 'set it before them,' which preserves the action naturally without over-paraphrase. 'It' is supplied from context, referring to the food from the previous verse.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in front of them
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before them' or 'in front of them.' 'Before them' is the standard idiomatic rendering in meal-serving contexts and fits the narrative flow.
- source_word: וַיֹּאכְלוּ
  chosen: they ate
  alternatives:
  - they ate of it
  lexicon: HALOT
  rationale: A straightforward rendering of אכל in the wayyiqtol narrative sequence. No expansion is needed in English.
- source_word: וַיּוֹתִרוּ
  chosen: had some left over
  alternatives:
  - left over
  - had leftovers
  - there was some left
  lexicon: HALOT
  rationale: From יתר in the Hiphil, meaning to leave over/remain over. 'Had some left over' communicates that after eating, a surplus remained, matching the miracle context and reading smoothly in English.
- source_word: כִּדְבַר
  chosen: according to the word of
  alternatives:
  - according to what ... had said
  - as ... had spoken
  lexicon: HALOT
  rationale: This construction means 'according to the word of' or 'in accordance with the word of.' Retaining 'word' preserves the formal link to prophetic/divine speech rather than reducing it to a mere paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
