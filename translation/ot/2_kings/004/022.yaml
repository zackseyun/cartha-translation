id: 2KI.4.22
reference: 2 Kings 4:22
source:
  edition: WLC
  text: וַ/תִּקְרָא֮ אֶל אִישָׁ/הּ֒ וַ/תֹּ֗אמֶר שִׁלְחָ֨/ה נָ֥א לִ/י֙ אֶחָ֣ד מִן הַ/נְּעָרִ֔ים
    וְ/אַחַ֖ת הָ/אֲתֹנ֑וֹת וְ/אָר֛וּצָה עַד אִ֥ישׁ הָ/אֱלֹהִ֖ים וְ/אָשֽׁוּבָה־־־׃
translation:
  text: Then she called to her husband and said, “Please send me one of the young
    men and one of the female donkeys, so that I may run to the man of God and return.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'so that I may hurry to the man of God and return.' The Hebrew verb
      literally means 'run,' expressing urgency.
    reason: lexical_alternative
  - marker: b
    text: '''Female donkeys'' renders a specifically feminine Hebrew noun; some translations
      simply have ''donkey'' or ''ass.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  chosen: Then she called
  alternatives:
  - And she called
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline. 'Then' gives natural
    English narrative flow while preserving sequential force.
- source_word: אֶל אִישָׁהּ
  chosen: to her husband
  alternatives:
  - to her man
  lexicon: HALOT
  rationale: אִישׁ with 3fs suffix in this domestic context clearly means 'husband,'
    not merely 'man.' This is the idiomatic and contextually precise English rendering.
- source_word: שִׁלְחָה נָא לִי
  chosen: Please send me
  alternatives:
  - Send for me, please
  - Do send me
  lexicon: HALOT
  rationale: Imperative with enclitic/paragogic ה and particle נָא expresses a polite
    request. 'Please send me' captures both the command and the courteous tone.
- source_word: אֶחָד מִן הַנְּעָרִים
  chosen: one of the young men
  alternatives:
  - one of the servants
  - one of the boys
  lexicon: HALOT
  rationale: נַעַר can denote a youth, attendant, or servant. Here the household-travel
    context suggests an attendant, but 'young men' preserves the lexical sense without
    over-specifying servile status.
- source_word: וְאַחַת הָאֲתֹנוֹת
  chosen: and one of the female donkeys
  alternatives:
  - and one donkey
  - and one of the she-donkeys
  lexicon: HALOT
  rationale: אָתוֹן specifically denotes a female donkey. The feminine distinction
    is present in the Hebrew and should be preserved in translation.
- source_word: וְאָרוּצָה
  chosen: so that I may run
  alternatives:
  - and I will run
  - that I may hurry
  lexicon: HALOT
  rationale: Cohortative 1cs expresses the speaker's intended action/purpose following
    the request. In English, 'so that I may run' best conveys purpose. 'Run' is retained
    rather than weakened to 'go' because the Hebrew verb is specific and conveys urgency.
- source_word: עַד אִישׁ הָאֱלֹהִים
  chosen: to the man of God
  alternatives:
  - as far as the man of God
  lexicon: HALOT
  rationale: עַד can mean 'up to/as far as,' but in motion contexts it often functions
    idiomatically as the destination. 'To the man of God' is the most natural English
    equivalent here.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is the standard Hebrew title for a prophet, here Elisha. It should
    be translated literally rather than paraphrased as 'the prophet' in order to preserve
    the source expression.
- source_word: וְאָשׁוּבָה
  chosen: and return
  alternatives:
  - and come back
  - then I will return
  lexicon: HALOT
  rationale: Cohortative 1cs continues the speaker's intended action. 'Return' is
    concise and fits the formal register of the narrative.
