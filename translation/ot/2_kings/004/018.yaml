id: 2KI.4.18
reference: 2 Kings 4:18
source:
  edition: WLC
  text: וַ/יִּגְדַּ֖ל הַ/יָּ֑לֶד וַ/יְהִ֣י הַ/יּ֔וֹם וַ/יֵּצֵ֥א אֶל אָבִ֖י/ו אֶל הַ/קֹּצְרִֽים־־׃
translation:
  text: And the boy grew, and one day he went out to his father, to the reapers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the child' instead of 'the boy.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''and the day happened,'' meaning ''one day'' or ''when the
      day came.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  chosen: grew
  alternatives:
  - became great
  - grew up
  lexicon: HALOT
  rationale: From גדל, here describing the child's physical maturation. 'Grew' is
    the most natural English rendering; 'grew up' is possible but slightly more interpretive
    than the Hebrew alone requires.
- source_word: הַיָּלֶד
  chosen: the boy
  alternatives:
  - the child
  lexicon: HALOT
  rationale: ילד can mean 'child' or 'boy.' In this narrative context, after mention
    of growth and his going out to the field, 'boy' fits idiomatic English and likely
    age implication better than the more neutral 'child'.
- source_word: וַיְהִי הַיּוֹם
  chosen: one day
  alternatives:
  - when the day came
  - and it happened on a day
  lexicon: HALOT
  rationale: This idiom introduces a particular occasion in narrative. 'One day' captures
    the Hebrew sense in clear modern English without unnecessary literal awkwardness.
- source_word: וַיֵּצֵא
  chosen: he went out
  alternatives:
  - he went
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' 'Went out' preserves the directional
    nuance, likely from the house/town to the field.
- source_word: אֶל אָבִיו
  chosen: to his father
  alternatives:
  - out to his father
  lexicon: HALOT
  rationale: אֶל marks movement toward. 'To his father' is straightforward; the outward
    motion is already conveyed by 'went out.'
- source_word: אֶל הַקֹּצְרִים
  chosen: to the reapers
  alternatives:
  - to the harvesters
  lexicon: HALOT
  rationale: קֹצְרִים are those cutting grain. 'Reapers' is the standard concise English
    equivalent and suits the agricultural setting. The repeated אֶל likely indicates
    that his father was among the reapers, so retaining both phrases reflects the
    Hebrew structure.
