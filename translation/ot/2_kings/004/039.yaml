id: 2KI.4.39
reference: 2 Kings 4:39
source:
  edition: WLC
  text: וַ/יֵּצֵ֨א אֶחָ֣ד אֶל הַ/שָּׂדֶה֮ לְ/לַקֵּ֣ט אֹרֹת֒ וַ/יִּמְצָא֙ גֶּ֣פֶן שָׂדֶ֔ה
    וַ/יְלַקֵּ֥ט מִמֶּ֛/נּוּ פַּקֻּעֹ֥ת שָׂדֶ֖ה מְלֹ֣א בִגְד֑/וֹ וַ/יָּבֹ֗א וַ/יְפַלַּ֛ח
    אֶל סִ֥יר הַ/נָּזִ֖יד כִּֽי לֹ֥א יָדָֽעוּ־־־׃
translation:
  text: Then one man went out into the field to gather herbs, and he found a wild
    vine and gathered from it wild gourds, filling his garment. Then he came and sliced
    them into the pot of stew, though they did not know what they were.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'greens' for 'herbs.' The Hebrew refers broadly to edible plants gathered
      from the field.
    reason: lexical_alternative
  - marker: b
    text: Literally 'a vine of the field' ... 'gourds of the field'; that is, a wild
      vine bearing wild gourds.
    reason: lexical_alternative
  - marker: c
    text: Or 'for they did not know' / 'because they did not know.' The Hebrew conjunction
      can be read as explanatory.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָד
  chosen: one man
  alternatives:
  - one
  - someone
  lexicon: HALOT
  rationale: In context the numeral functions substantivally for an individual member
    of the group. 'One man' is natural English and preserves the masculine singular
    reference.
- source_word: לְלַקֵּט אֹרֹת
  chosen: to gather herbs
  alternatives:
  - to gather greens
  - to pick herbs
  lexicon: HALOT
  rationale: The noun אֹרֹת refers to edible plants/greens gathered from the field.
    'Herbs' fits the food-preparation context, while 'greens' is possible but slightly
    less idiomatic here.
- source_word: גֶּפֶן שָׂדֶה
  chosen: a wild vine
  alternatives:
  - a vine of the field
  - a field vine
  lexicon: HALOT
  rationale: The construct-like phrase denotes a vine growing uncultivated in the
    open country. 'Wild vine' conveys the sense more clearly in modern English than
    the more literal but awkward 'vine of the field.'
- source_word: פַּקֻּעֹת שָׂדֶה
  chosen: wild gourds
  alternatives:
  - field gourds
  - wild colocynths
  lexicon: HALOT
  rationale: The phrase refers to gourds from the wild vine, likely colocynth or a
    similar wild gourd. 'Wild gourds' is clear and avoids overprecision; 'colocynths'
    is too technical for the main text.
- source_word: מְלֹא בִגְדוֹ
  chosen: filling his garment
  alternatives:
  - his garment full
  - a garmentful
  lexicon: HALOT
  rationale: The Hebrew idiom indicates the quantity gathered, enough to fill his
    outer garment used as a container. 'Filling his garment' preserves the image and
    reads naturally.
- source_word: וַיְפַלַּח
  chosen: sliced them
  alternatives:
  - cut them up
  - split them
  lexicon: HALOT
  rationale: The verb means to split or slice. Since the object is implicit from the
    previously gathered gourds, 'sliced them' makes the action explicit in idiomatic
    English.
- source_word: סִיר הַנָּזִיד
  chosen: the pot of stew
  alternatives:
  - the stew pot
  - the pot of pottage
  lexicon: HALOT
  rationale: נָזִיד is a cooked stew. 'Pot of stew' is clear modern English; 'pottage'
    is archaic.
- source_word: כִּי לֹא יָדָעוּ
  chosen: though they did not know what they were
  alternatives:
  - for they did not know
  - because they did not know
  - not knowing
  lexicon: HALOT
  rationale: The clause explains the ignorance of the gathered plant's nature. Supplying
    'what they were' makes explicit the implied object in English. 'Though' fits the
    narrative flow after the slicing action, though the Hebrew כִּי can also be explanatory
    ('for/because').
