id: 2KI.4.43
reference: 2 Kings 4:43
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ מְשָׁ֣רְת֔/וֹ מָ֚ה אֶתֵּ֣ן זֶ֔ה לִ/פְנֵ֖י מֵ֣אָה אִ֑ישׁ וַ/יֹּ֗אמֶר תֵּ֤ן לָ/עָם֙ וְ/יֹאכֵ֔לוּ כִּ֣י כֹ֥ה אָמַ֛ר יְהוָ֖ה אָכֹ֥ל וְ/הוֹתֵֽר׃
translation:
  text: 'But his servant said, “How am I to set this before a hundred men?” And he said, “Give it to the people, and let them eat, for thus says Yahweh: ‘They shall eat and have some left over.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'How can I give this to a hundred men?' The Hebrew literally says, 'What shall I give this before a hundred men?'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''eat and leave over,'' an idiom meaning that food will remain after they have eaten.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשָׁרְתוֹ
  chosen: his servant
  alternatives:
  - his attendant
  - his minister
  lexicon: HALOT
  rationale: מְשָׁרֵת denotes one who serves in a personal or official capacity. 'Servant' is the most natural contextual rendering in narrative English and fits the subordinate role to Elisha here better than the more formal 'minister' or the more modern 'attendant'.
- source_word: מָה אֶתֵּן זֶה לִפְנֵי מֵאָה אִישׁ
  chosen: How am I to set this before a hundred men?
  alternatives:
  - What shall I give this before a hundred men?
  - How can I give this to a hundred men?
  lexicon: HALOT
  rationale: The Hebrew is literally 'What shall I give this before a hundred man/men?' In context, the idiom means setting the food before them for eating. 'Set this before' preserves the concrete image better than the flatter 'give this to,' while 'How am I to' conveys the servant's incredulity.
- source_word: אִישׁ
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The source is grammatically masculine singular used distributively after 'a hundred.' Per gender-accurate policy, 'men' best matches the Hebrew form and likely referent here, rather than neutralizing to 'people'.
- source_word: תֵּן לָעָם
  chosen: Give it to the people
  alternatives:
  - Give it to the folk
  - Give it to the men
  lexicon: HALOT
  rationale: עָם here refers to the gathered group as a collective. 'People' is idiomatic and broad enough to reflect the collective noun, while avoiding unnecessary narrowing to 'men' in this clause where the Hebrew itself shifts from אִישׁ to עָם.
- source_word: וְיֹאכֵלוּ
  chosen: and let them eat
  alternatives:
  - that they may eat
  - and they shall eat
  lexicon: HALOT
  rationale: The prefixed verb after the imperative functions as a jussive/resultative continuation. 'Let them eat' captures the command force in smooth English better than a wooden future.
- source_word: כִּי כֹה אָמַר יְהוָה
  chosen: for thus says the LORD
  alternatives:
  - for this is what the LORD says
  - for thus has the LORD said
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says the LORD' preserves its recognizable force. Per doctrine guidance, יְהוָה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name as specified in DOCTRINE.md.
- source_word: אָכֹל וְהוֹתֵר
  chosen: They will eat and have some left over
  alternatives:
  - Eating and leaving over
  - They shall eat and leave some over
  - There will be eating and leftover
  lexicon: HALOT
  rationale: The infinitive absolute plus Hiphil infinitive/verb sequence expresses the certainty of the outcome promised by the LORD. English requires an explicit subject; 'They will eat and have some left over' communicates the prophetic assurance naturally. 'Have some left over' makes explicit that surplus remains after eating.
