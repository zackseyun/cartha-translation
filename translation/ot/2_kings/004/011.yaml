id: 2KI.4.11
reference: 2 Kings 4:11
source:
  edition: WLC
  text: וַ/יְהִ֥י הַ/יּ֖וֹם וַ/יָּ֣בֹא שָׁ֑מָּ/ה וַ/יָּ֥סַר אֶל הָ/עֲלִיָּ֖ה וַ/יִּשְׁכַּב
    שָֽׁמָּ/ה־־׃
translation:
  text: One day he came there, turned aside into the upper room, and lay down there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and slept there.' The Hebrew verb can denote lying down or sleeping;
      the context does not require the more specific sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  chosen: One day
  alternatives:
  - And it happened one day
  - Now the day came
  lexicon: HALOT
  rationale: This idiom introduces a narrative occasion rather than emphasizing the
    mere occurrence of a day. 'One day' is natural modern English and preserves the
    temporal sense without woodenly reproducing the Hebrew narrative formula.
- source_word: וַיָּבֹא שָׁמָּה
  chosen: he came there
  alternatives:
  - he went there
  - he came back there
  lexicon: HALOT
  rationale: בוא commonly means 'come/enter.' 'Came there' fits the deictic sense
    of the narrative and matches the repeated שָׁמָּה ('there'). 'Went there' is possible
    in English but less direct to the Hebrew wording.
- source_word: וַיָּסַר
  chosen: turned aside
  alternatives:
  - went aside
  - withdrew
  - entered
  lexicon: HALOT
  rationale: סור here conveys turning aside from the main course into a particular
    place. 'Turned aside' is a standard and contextually precise rendering, especially
    for entering a lodging space prepared for him.
- source_word: אֶל הָעֲלִיָּה
  chosen: into the upper room
  alternatives:
  - to the upper room
  - into the upstairs room
  - into the chamber
  lexicon: HALOT
  rationale: עֲלִיָּה denotes an upper chamber/room. 'Upper room' is clear, idiomatic,
    and preserves the architectural sense. Although אֶל is formally 'to,' English
    idiom with 'turned aside' naturally takes 'into' to express entry.
- source_word: וַיִּשְׁכַּב שָׁמָּה
  chosen: and lay down there
  alternatives:
  - and lay there
  - and slept there
  - and reclined there
  lexicon: HALOT
  rationale: שׁכב can mean lie down, sleep, or recline depending on context. Here
    the immediate sense is that he lay down in the room; 'lay down there' preserves
    the action without over-specifying sleep.
