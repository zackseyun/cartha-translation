id: 2KI.4.31
reference: 2 Kings 4:31
source:
  edition: WLC
  text: וְ/גֵחֲזִ֞י עָבַ֣ר לִ/פְנֵי/הֶ֗ם וַ/יָּ֤שֶׂם אֶת הַ/מִּשְׁעֶ֨נֶת֙ עַל פְּנֵ֣י
    הַ/נַּ֔עַר וְ/אֵ֥ין ק֖וֹל וְ/אֵ֣ין קָ֑שֶׁב וַ/יָּ֤שָׁב לִ/קְרָאת/וֹ֙ וַ/יַּגֶּד
    ל֣/וֹ לֵ/אמֹ֔ר לֹ֥א הֵקִ֖יץ הַ/נָּֽעַר־־־׃
translation:
  text: And Gehazi went on ahead of them and laid the staff on the boy’s face, but
    there was no sound and no response. So he returned to meet him and told him, saying,
    “The boy has not awakened.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'there was no voice and no attentiveness/hearing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבַר לִפְנֵיהֶם
  chosen: went on ahead of them
  alternatives:
  - passed before them
  - went before them
  lexicon: HALOT
  rationale: The idiom means Gehazi proceeded in front of Elisha and the woman. 'Went
    on ahead of them' is natural English and preserves the directional sense better
    than the more wooden 'passed before them.'
- source_word: הַמִּשְׁעֶנֶת
  chosen: the staff
  alternatives:
  - the walking stick
  - the rod
  lexicon: HALOT
  rationale: In this narrative context Elisha's implement is best rendered 'staff,'
    the standard and most recognizable term in English for a prophet's staff. 'Rod'
    could suggest a different object, and 'walking stick' is too colloquial.
- source_word: עַל פְּנֵי הַנַּעַר
  chosen: on the boy’s face
  alternatives:
  - upon the lad's face
  - on the child’s face
  lexicon: HALOT
  rationale: פָּנִים here refers literally to the face. 'Boy' fits נַעַר in this context
    better than 'child' or the archaic 'lad,' and keeps the scene concrete.
- source_word: וְאֵין קוֹל
  chosen: there was no sound
  alternatives:
  - there was no voice
  - there was no sign of life
  lexicon: HALOT
  rationale: קוֹל literally means 'sound/voice.' 'No sound' is the most direct rendering.
    'No sign of life' interprets beyond the lexical data.
- source_word: וְאֵין קָשֶׁב
  chosen: no response
  alternatives:
  - no attention
  - no hearing
  lexicon: HALOT
  rationale: קָשֶׁב denotes attentiveness or responsive hearing. In context, paired
    with 'no sound,' it indicates the boy gave no response. This is clearer in English
    than the more literal but awkward 'no attention' or 'no hearing.'
- source_word: וַיָּשָׁב לִקְרָאתוֹ
  chosen: he returned to meet him
  alternatives:
  - he turned back to meet him
  - he came back to meet him
  lexicon: HALOT
  rationale: The phrase indicates Gehazi went back in order to meet Elisha. 'Returned
    to meet him' is concise and natural while preserving the motion.
- source_word: וַיַּגֶּד לוֹ לֵאמֹר
  chosen: and told him, saying
  alternatives:
  - and reported to him, saying
  - and told him
  lexicon: HALOT
  rationale: The Hebrew uses a common reporting formula. Retaining 'saying' reflects
    the formal introduction to direct speech without sounding overly stiff.
- source_word: לֹא הֵקִיץ הַנַּעַר
  chosen: The boy has not awakened
  alternatives:
  - The boy did not wake up
  - The boy has not woken
  lexicon: HALOT
  rationale: הֵקִיץ means 'awaken, wake up.' The perfect here reports the result of
    the attempted action; 'has not awakened' preserves that state/result nuance slightly
    better than the simple past, while remaining readable.
