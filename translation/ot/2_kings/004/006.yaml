id: 2KI.4.6
reference: 2 Kings 4:6
source:
  edition: WLC
  text: וַ/יְהִ֣י כִּ/מְלֹ֣את הַ/כֵּלִ֗ים וַ/תֹּ֤אמֶר אֶל בְּנָ/הּ֙ הַגִּ֨ישָׁ/ה אֵלַ֥/י
    עוֹד֙ כֶּ֔לִי וַ/יֹּ֣אמֶר אֵלֶ֔י/הָ אֵ֥ין ע֖וֹד כֶּ֑לִי וַֽ/יַּעֲמֹ֖ד הַ/שָּֽׁמֶן׀־׃
translation:
  text: And when the containers were full, she said to her son, “Bring me another
    container.” But he said to her, “There is not another container.” Then the oil
    stopped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “vessels” instead of “containers.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “the oil stood.” The sense is that it stopped flowing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְלֹאת
  chosen: when ... were full
  alternatives:
  - as ... were filled
  - when the filling of ... was complete
  lexicon: HALOT
  rationale: The infinitive construct with כ marks a temporal clause, naturally rendered
    'when.' English idiom prefers making the vessels the subject ('the containers
    were full') rather than a more wooden 'when the filling of the containers was
    complete.'
- source_word: הַכֵּלִים / כֶּלִי
  chosen: containers / container
  alternatives:
  - vessels
  - jars
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article or vessel. In this context of borrowed
    receptacles for oil, 'container' is clear modern English and suitably broad. 'Vessel'
    is more traditional but less natural; 'jar' is too specific for the Hebrew.
- source_word: הַגִּישָׁה
  chosen: Bring
  alternatives:
  - Bring near
  - Hand
  lexicon: HALOT
  rationale: The Hiphil imperative of נגשׁ means to bring near/present. In context
    the son is to pass another receptacle to her, so 'Bring' communicates the action
    naturally without overtranslation.
- source_word: עוֹד
  chosen: another
  alternatives:
  - more
  - yet another
  lexicon: HALOT
  rationale: With singular כֶּלִי, עוֹד idiomatically means an additional item of
    the same kind. 'Another container' is more natural English than 'more container'
    and less emphatic than 'yet another.'
- source_word: אֵין עוֹד כֶּלִי
  chosen: There is not another container
  alternatives:
  - There is no more container
  - There is no other container left
  lexicon: HALOT
  rationale: אֵין expresses nonexistence. The clause reports that no additional receptacle
    remains available. 'There is not another container' is faithful and idiomatic;
    'left' is interpretive though contextually implied.
- source_word: וַיַּעֲמֹד הַשָּׁמֶן
  chosen: the oil stopped
  alternatives:
  - the oil stood still
  - the oil ceased flowing
  lexicon: HALOT
  rationale: עמד literally means 'stood,' but in this narrative context it denotes
    cessation of flow. 'The oil stopped' gives the plain sense in natural English
    without adding the more explicit 'flowing,' though that is the implied idea.
