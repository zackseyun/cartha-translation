id: 2KI.4.14
reference: 2 Kings 4:14
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר וּ/מֶ֖ה לַ/עֲשׂ֣וֹת לָ֑/הּ וַ/יֹּ֣אמֶר גֵּיחֲזִ֗י אֲבָ֛ל בֵּ֥ן
    אֵֽין לָ֖/הּ וְ/אִישָׁ֥/הּ זָקֵֽן־׃
translation:
  text: So he said, “What then is to be done for her?” And Gehazi said, “Well, she
    has no son, and her husband is old.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What should be done for her?”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “there is no son for her.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: So he said
  alternatives:
  - And he said
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he said' gives natural
    modern English while preserving sequence.
- source_word: וּמֶה
  chosen: What then
  alternatives:
  - And what
  - What
  lexicon: HALOT
  rationale: Interrogative 'what' with prefixed conjunction; 'then' captures the discourse
    flow idiomatically in English.
- source_word: לַעֲשׂוֹת לָהּ
  chosen: is to be done for her
  alternatives:
  - to do for her
  - should be done for her
  lexicon: HALOT
  rationale: The infinitive construct with ל plus pronoun expresses what ought or
    is intended to be done on her behalf. Passive English sounds more natural here
    than a wooden 'to do for her.'
- source_word: גֵּיחֲזִי
  chosen: Gehazi
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: אֲבָל
  chosen: Well
  alternatives:
  - Indeed
  - But actually
  - Surely
  lexicon: HALOT
  rationale: Here the particle introduces Gehazi's considered response rather than
    a strong contrast. 'Well' reflects the conversational nuance in readable English.
- source_word: בֵּן אֵין לָהּ
  chosen: she has no son
  alternatives:
  - there is no son for her
  - she has no child
  lexicon: HALOT
  rationale: בן specifically means 'son,' not merely 'child.' The idiomatic English
    possession construction best conveys the Hebrew existential phrase.
- source_word: וְאִישָׁהּ
  chosen: and her husband
  alternatives:
  - and her man
  lexicon: HALOT
  rationale: In this context אִישׁ with pronominal suffix refers to her husband; 'her
    husband' is the natural contextual rendering.
- source_word: זָקֵן
  chosen: is old
  alternatives:
  - is elderly
  - is advanced in years
  lexicon: HALOT
  rationale: The adjective/participle states his aged condition. 'Is old' is direct
    and faithful without unnecessary expansion.
