id: 2KI.4.16
reference: 2 Kings 4:16
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לַ/מּוֹעֵ֤ד הַ/זֶּה֙ כָּ/עֵ֣ת חַיָּ֔ה אתי חֹבֶ֣קֶת בֵּ֑ן וַ/תֹּ֗אמֶר
    אַל אֲדֹנִ/י֙ אִ֣ישׁ הָ/אֱלֹהִ֔ים אַל תְּכַזֵּ֖ב בְּ/שִׁפְחָתֶֽ/ךָ־־׃
translation:
  text: Then he said, "At this appointed time next year, you will be embracing a son."
    But she said, "No, my lord, man of God; do not deceive your servant."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, "about this time of life"; that is, at this same time next year.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמּוֹעֵד הַזֶּה
  chosen: at this appointed time
  alternatives:
  - at this season
  - at this set time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed or fixed time. 'Appointed time' preserves
    the sense of a designated season without sounding overly technical.
- source_word: כָּעֵת חַיָּה
  chosen: next year
  alternatives:
  - when the time revives
  - at the time of life
  - about this time of life
  lexicon: HALOT
  rationale: This idiom in context refers to the same season in the following year,
    as in annunciation/birth contexts. 'Next year' gives the plain sense in natural
    English; a more literal rendering is preserved in a footnote.
- source_word: אתי
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but English does not require explicit
    representation here. The emphasis is adequately conveyed by the predictive statement.
- source_word: חֹבֶקֶת
  chosen: embracing
  alternatives:
  - holding
  - clasping
  lexicon: HALOT
  rationale: The participle literally means 'embracing' or 'holding in the arms.'
    'Embracing' is vivid and idiomatic with a newborn child.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - a child, a son
  lexicon: HALOT
  rationale: The Hebrew specifically says 'son,' not merely 'child,' so the gender-specific
    term should be preserved.
- source_word: אַל
  chosen: 'No'
  alternatives:
  - please, no
  - do not
  lexicon: HALOT
  rationale: The first אַל is an emotional negative interjection in her reply, best
    rendered as 'No' in English rather than as a prohibition.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: As a respectful address to Elisha, 'my lord' preserves the deferential
    tone without implying deity.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: man of God
  alternatives:
  - God's man
  lexicon: HALOT
  rationale: This is the standard Hebrew title for a prophet or holy man. 'Man of
    God' is the established and accurate rendering.
- source_word: תְּכַזֵּב
  chosen: do not deceive
  alternatives:
  - do not lie to
  - do not disappoint
  lexicon: HALOT
  rationale: The verb means to lie, deceive, or prove false. In this context she pleads
    that he not raise a hope that will be false. 'Do not deceive' captures both the
    literal and emotional force.
- source_word: בְּשִׁפְחָתֶךָ
  chosen: your servant
  alternatives:
  - your maidservant
  - your female servant
  lexicon: HALOT
  rationale: The term is specifically feminine, but in direct address 'your servant'
    is natural English and preserves the humility of her self-reference. The more
    explicit 'maidservant' is possible but less natural in contemporary English.
