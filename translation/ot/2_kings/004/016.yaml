theological_decisions:
- issue: Rendering of deferential human title אֲדֹנִי
  chosen_reading: my lord
  alternative_readings:
  - my master
  - sir
  rationale: The address is to Elisha, not to God. 'My lord' preserves the social
    honorific without importing divine significance.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (consistency
    of key terms, documented exception)
