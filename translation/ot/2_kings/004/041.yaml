id: 2KI.4.41
reference: 2 Kings 4:41
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ וּ/קְחוּ קֶ֔מַח וַ/יַּשְׁלֵ֖ךְ אֶל הַ/סִּ֑יר וַ/יֹּ֗אמֶר צַ֤ק
    לָ/עָם֙ וְ/יֹאכֵ֔לוּ וְ/לֹ֥א הָיָ֛ה דָּבָ֥ר רָ֖ע בַּ/סִּֽיר־־׃ס
translation:
  text: Then he said, “Bring some flour.” And he threw it into the pot and said, “Serve
    it to the people so that they may eat.” And there was nothing harmful in the pot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Pour it out for the people.” The Hebrew verb is more literally “pour,”
      but here it refers to serving the prepared food.
    reason: lexical_alternative
  - marker: b
    text: Literally, “there was not a bad/evil thing in the pot,” meaning the stew
      was no longer harmful.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural
    English narrative flow while preserving sequence.
- source_word: וּקְחוּ
  chosen: Bring
  alternatives:
  - Take
  - Get
  lexicon: HALOT
  rationale: Imperative plural from לקח. In context Elisha is directing others to
    obtain flour for immediate use; 'Bring' fits the situational sense better than
    the more literal but less idiomatic 'Take.'
- source_word: קֶמַח
  chosen: some flour
  alternatives:
  - flour
  - meal
  lexicon: HALOT
  rationale: Refers to flour/meal. 'Flour' is the clearest modern English term; 'some'
    is idiomatic in English for an unspecified quantity.
- source_word: וַיַּשְׁלֵךְ אֶל־הַסִּיר
  chosen: he threw it into the pot
  alternatives:
  - he cast it into the pot
  - he threw it into the cooking pot
  lexicon: HALOT
  rationale: The verb שלך commonly means 'throw/cast.' 'Into the pot' expresses the
    directional sense naturally in English.
- source_word: הַסִּיר
  chosen: the pot
  alternatives:
  - the cooking pot
  - the kettle
  lexicon: HALOT
  rationale: A vessel for cooking stew in context. 'Pot' is simple and natural; 'cooking
    pot' is possible but unnecessary in the main text.
- source_word: צַק לָעָם
  chosen: Serve it to the people
  alternatives:
  - Pour out for the people
  - Set it before the people
  lexicon: HALOT
  rationale: The imperative of יצק literally involves pouring, but in this food-serving
    context 'Serve it' communicates the intended action in readable English. The object
    'it' is supplied naturally from context.
- source_word: וְיֹאכֵלוּ
  chosen: so that they may eat
  alternatives:
  - and let them eat
  - that they may eat
  lexicon: HALOT
  rationale: The prefixed conjunction with imperfect expresses purpose/result following
    the command. 'So that they may eat' makes that relation explicit in idiomatic
    English.
- source_word: וְלֹא הָיָה דָבָר רָע בַּסִּיר
  chosen: And there was nothing harmful in the pot
  alternatives:
  - and there was no evil thing in the pot
  - and there was nothing bad in the pot
  - and there was no harm in the pot
  lexicon: HALOT
  rationale: דָבָר רָע literally 'evil/bad thing,' but in this immediate context of
    poisoned stew the sense is harmfulness, not moral evil. 'Nothing harmful' best
    conveys the practical meaning.
