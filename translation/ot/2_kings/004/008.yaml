id: 2KI.4.8
reference: 2 Kings 4:8
source:
  edition: WLC
  text: וַ/יְהִ֨י הַ/יּ֜וֹם וַ/יַּעֲבֹ֧ר אֱלִישָׁ֣ע אֶל שׁוּנֵ֗ם וְ/שָׁם֙ אִשָּׁ֣ה
    גְדוֹלָ֔ה וַ/תַּחֲזֶק בּ֖/וֹ לֶ/אֱכָל לָ֑חֶם וַֽ/יְהִי֙ מִ/דֵּ֣י עָבְר֔/וֹ יָסֻ֥ר
    שָׁ֖מָּ/ה לֶ/אֱכָל לָֽחֶם־־־־׃
translation:
  text: And one day Elisha passed through Shunem, where there was a prominent woman,
    and she urged him to eat food. So whenever he passed by, he would turn in there
    to eat food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a great woman'; the phrase likely refers to social prominence or
      means.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to eat bread,' an idiom for taking a meal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  chosen: And one day
  alternatives:
  - And it happened on a day
  - Now one day
  lexicon: HALOT
  rationale: Idiomatic narrative opener in Hebrew. A more literal 'and it happened,
    the day' is unnatural in English; 'one day' preserves the temporal sense without
    wooden style.
- source_word: וַיַּעֲבֹר
  chosen: passed through
  alternatives:
  - passed by
  - went over
  lexicon: HALOT
  rationale: עבר with אֶל שׁוּנֵם in this travel context refers to Elisha's journeying
    through/to the place. 'Passed through' fits the narrative and prepares for the
    later repeated passing.
- source_word: שׁוּנֵם
  chosen: Shunem
  rationale: Personal/place names are transliterated by standard convention per translation
    philosophy.
- source_word: אִשָּׁה גְדוֹלָה
  chosen: a prominent woman
  alternatives:
  - a great woman
  - a wealthy woman
  lexicon: HALOT
  rationale: גְדוֹלָה here likely denotes social standing and substance rather than
    moral greatness or physical size. 'Prominent woman' communicates status in natural
    English while avoiding overcommitting to wealth alone; 'great woman' is too opaque
    in modern English.
- source_word: וַתַּחֲזֶק בּוֹ
  chosen: she urged him
  alternatives:
  - she prevailed upon him
  - she constrained him
  lexicon: HALOT
  rationale: The idiom literally involves taking hold/being strong with someone, but
    in context means pressing hospitality on him. 'Urged him' is idiomatic modern
    English and preserves the force without awkward literalism.
- source_word: לֶאֱכָל לָחֶם
  chosen: to eat food
  alternatives:
  - to eat bread
  - to have a meal
  lexicon: HALOT
  rationale: לֶחֶם literally means 'bread,' but in many contexts stands metonymically
    for a meal/food. Because the phrase occurs twice in the verse, 'eat food' preserves
    the concrete act without sounding overly interpretive; 'eat bread' could mislead
    modern readers into thinking bread specifically is in view.
- source_word: מִדֵּי עָבְרוֹ
  chosen: whenever he passed by
  alternatives:
  - as often as he passed by
  - whenever he passed through
  lexicon: HALOT
  rationale: The construction expresses repeated occasion. 'Whenever he passed by'
    captures the iterative sense naturally in English.
- source_word: יָסֻר שָׁמָּה
  chosen: he would turn in there
  alternatives:
  - he would stop there
  - he would turn aside there
  lexicon: HALOT
  rationale: סור in this context means turning aside or stopping off. 'Turn in there'
    preserves the directional nuance and reads naturally in narrative English.
