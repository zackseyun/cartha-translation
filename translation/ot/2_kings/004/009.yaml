id: 2KI.4.9
reference: 2 Kings 4:9
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר֙ אֶל אִישָׁ֔/הּ הִנֵּה נָ֣א יָדַ֔עְתִּי כִּ֛י אִ֥ישׁ אֱלֹהִ֖ים
    קָד֣וֹשׁ ה֑וּא עֹבֵ֥ר עָלֵ֖י/נוּ תָּמִֽיד־־׃
translation:
  text: And she said to her husband, “Look now, I know that this is a holy man of
    God who regularly passes by us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who continually passes by us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  - So she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'And she said' preserves the
    straightforward narrative sequence without overinterpreting the conjunction.
- source_word: אֶל אִישָׁהּ
  chosen: to her husband
  alternatives:
  - to her man
  lexicon: HALOT
  rationale: אִישׁ with 3fs suffix in this domestic context idiomatically means 'her
    husband,' not merely 'her man.' This is the natural and contextually precise English
    rendering.
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - Behold, please
  - See now
  lexicon: HALOT
  rationale: The combination functions as an attention-getting discourse marker. 'Look
    now' preserves both the deictic force of הִנֵּה and the softening/emphatic nuance
    of נָא in readable modern English.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I have come to know
  - I perceive
  lexicon: HALOT
  rationale: The perfect here expresses present settled recognition based on repeated
    observation. 'I know' is idiomatic English; 'I perceive' is possible but slightly
    more interpretive.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the content of what she knows. 'That' best fits English complement-clause
    usage here.
- source_word: אִישׁ אֱלֹהִים
  chosen: man of God
  alternatives:
  - godly man
  - man belonging to God
  lexicon: HALOT
  rationale: This is a recognized Hebrew title for a prophet or divinely commissioned
    figure. 'Man of God' preserves the title and its biblical resonance better than
    paraphrastic alternatives.
- source_word: קָדוֹשׁ
  chosen: holy
  alternatives:
  - sacred
  lexicon: HALOT
  rationale: קָדוֹשׁ denotes holiness/set-apartness. 'Holy' is the standard and theologically
    appropriate rendering; 'sacred' is weaker and less personal.
- source_word: הוּא
  chosen: this is
  alternatives:
  - he is
  lexicon: HALOT
  rationale: The pronoun identifies the man under discussion. English often supplies
    'this is' naturally after 'I know that' when pointing out a recognized person;
    it clarifies the referent without changing the sense.
- source_word: עֹבֵר עָלֵינוּ
  chosen: passes by us
  alternatives:
  - passes over us
  - comes by us
  lexicon: HALOT
  rationale: עבר על in this travel context refers to passing by or along near someone's
    place. 'Passes by us' is idiomatic and fits the narrative setting of Elisha's
    repeated travel.
- source_word: תָּמִיד
  chosen: regularly
  alternatives:
  - continually
  - always
  lexicon: HALOT
  rationale: In context, the sense is habitual recurrence rather than uninterrupted
    action. 'Regularly' communicates repeated customary passing more naturally than
    the potentially overstated 'continually' or 'always'.
