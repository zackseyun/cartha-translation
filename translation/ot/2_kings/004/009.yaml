theological_decisions:
- issue: Rendering the title אִישׁ אֱלֹהִים
  chosen_reading: man of God
  alternative_readings:
  - godly man
  - man belonging to God
  rationale: The phrase is a recognized title in the Former Prophets for a prophet
    or divinely commissioned figure. Retaining the title preserves its theological
    and literary force without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5; Affirmations (do not import claims
    beyond the text)
