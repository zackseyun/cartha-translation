id: 2KI.4.32
reference: 2 Kings 4:32
source:
  edition: WLC
  text: וַ/יָּבֹ֥א אֱלִישָׁ֖ע הַ/בָּ֑יְתָ/ה וְ/הִנֵּ֤ה הַ/נַּ֨עַר֙ מֵ֔ת מֻשְׁכָּ֖ב
    עַל מִטָּתֽ/וֹ־׃
translation:
  text: When Elisha came into the house, behold, the boy was dead, laid on his bed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lying on his bed.' The Hebrew participle can be rendered more literally
      as a state of being stretched out or lying there.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came into
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: The wayyiqtol of בוא advances the narrative with simple past force. 'Came
    into' captures motion toward and into the house, slightly more explicit than bare
    'came' and more natural in English than the more formal 'entered' in this context.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names.
- source_word: הַבָּיְתָה
  chosen: the house
  alternatives:
  - home
  - into the house
  lexicon: HALOT
  rationale: The noun בית with directional he indicates movement toward/into the house.
    In English, the directional nuance is best carried by the verb phrase 'came into
    the house' rather than by translating the noun itself differently. 'The house'
    is preferred over 'home' because the Hebrew specifies the building/location.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - and behold
  - there was
  - look
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation and draws attention to what Elisha sees.
    'Behold' preserves the discourse force with suitable gravity; 'and' is omitted
    in English for smoother style while retaining the exclamatory marker.
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the lad
  - the youth
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, servant, or attendant depending on context.
    Here it refers to the Shunammite's son, so 'the boy' is the most natural and specific
    rendering in context.
- source_word: מֵת
  chosen: was dead
  alternatives:
  - dead
  - had died
  lexicon: HALOT
  rationale: As a predicate adjective/participle, מֵת describes the boy's state when
    Elisha arrives. 'Was dead' best reflects the stative sense in context; 'had died'
    would shift toward the prior event rather than the observed condition.
- source_word: מֻשְׁכָּב
  chosen: laid
  alternatives:
  - lying
  - placed
  - laid out
  lexicon: HALOT
  rationale: From שׁכב, this passive participial form describes the boy as being laid/placed
    on the bed. 'Laid' communicates the passive-resultative sense more clearly than
    'lying,' which can sound active in English.
- source_word: עַל מִטָּתוֹ
  chosen: on his bed
  alternatives:
  - upon his bed
  lexicon: HALOT
  rationale: Straightforward prepositional phrase. 'On his bed' is idiomatic modern
    English; 'upon' is unnecessarily elevated.
