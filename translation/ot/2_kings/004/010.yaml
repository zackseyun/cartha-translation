id: 2KI.4.10
reference: 2 Kings 4:10
source:
  edition: WLC
  text: נַֽעֲשֶׂה נָּ֤א עֲלִיַּת קִיר֙ קְטַנָּ֔ה וְ/נָשִׂ֨ים ל֥/וֹ שָׁ֛ם מִטָּ֥ה וְ/שֻׁלְחָ֖ן
    וְ/כִסֵּ֣א וּ/מְנוֹרָ֑ה וְ/הָיָ֛ה בְּ/בֹא֥/וֹ אֵלֵ֖י/נוּ יָס֥וּר שָֽׁמָּ/ה־־׃
translation:
  text: Please let us make a small upper room on the wall, and let us put there for
    him a bed, a table, a chair, and a lampstand; then whenever he comes to us, he
    can turn in there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a small upper chamber with a wall' or simply 'a small upper room.' The
      Hebrew phrase is somewhat compact, and 'on the wall' preserves its concrete
      wording.
    reason: lexical_alternative
  - marker: b
    text: Or 'he may turn aside there.' The Hebrew verb often means 'turn aside' and
      here refers to stopping there for lodging.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲשֶׂה נָּא
  chosen: Please let us make
  alternatives:
  - Let us make, please
  - Please, let us make
  lexicon: HALOT
  rationale: Cohortative first person plural with particle נָא expresses a polite
    proposal/request. 'Please let us make' captures both the volitional sense and
    the courtesy particle in natural English.
- source_word: עֲלִיַּת קִיר קְטַנָּה
  chosen: a small upper room on the wall
  alternatives:
  - a little walled upper room
  - a small upper chamber with a wall
  - a small upper room
  lexicon: HALOT
  rationale: עֲלִיָּה denotes an upper room/chamber. קִיר literally means 'wall';
    in this construction it likely describes a chamber built against/on the wall,
    not merely any upstairs room. 'On the wall' preserves the concrete Hebrew better
    than smoothing it away, while remaining intelligible. קְטַנָּה is rendered 'small'.
- source_word: וְנָשִׂים לוֹ שָׁם
  chosen: and let us put there for him
  alternatives:
  - and let us set there for him
  - and we will place there for him
  lexicon: HALOT
  rationale: שִׂים commonly means 'put, set, place.' The cohortative sequence continues
    the woman's proposal, so 'let us put' matches the volitional force. 'There for
    him' preserves both adverb and indirect object.
- source_word: מִטָּה
  chosen: a bed
  alternatives:
  - a couch
  lexicon: HALOT
  rationale: The ordinary sense here is a bed or sleeping place furnished for lodging.
    'Bed' is the clearest modern equivalent.
- source_word: שֻׁלְחָן
  chosen: a table
  lexicon: HALOT
  rationale: Standard furnishing term; 'table' is straightforward.
- source_word: כִסֵּא
  chosen: a chair
  alternatives:
  - a seat
  lexicon: HALOT
  rationale: The term denotes a seat/chair. 'Chair' fits the domestic furnishing context
    better than the broader 'seat.'
- source_word: מְנוֹרָה
  chosen: a lampstand
  alternatives:
  - a lamp
  lexicon: HALOT
  rationale: מְנוֹרָה is more specifically a lampstand than merely a lamp. 'Lampstand'
    preserves the lexical specificity, even in a domestic setting.
- source_word: וְהָיָה בְּבֹאוֹ אֵלֵינוּ
  chosen: then whenever he comes to us
  alternatives:
  - and it shall be, when he comes to us
  - and when he comes to us
  lexicon: HALOT
  rationale: וְהָיָה introduces the result or future circumstance. 'Then whenever
    he comes to us' renders the idiom naturally in English while preserving the prospective
    sense.
- source_word: יָסוּר שָׁמָּה
  chosen: he can turn in there
  alternatives:
  - he may turn aside there
  - he can go in there
  - he can stay there
  lexicon: HALOT
  rationale: סוּר means to turn aside/deviate, and in travel/lodging contexts often
    means to stop off or turn in. 'Turn in there' is idiomatic English for taking
    lodging without overstating duration as 'stay there' might.
