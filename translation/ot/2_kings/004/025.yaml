id: 2KI.4.25
reference: 2 Kings 4:25
source:
  edition: WLC
  text: וַ/תֵּ֗לֶךְ וַ/תָּב֛וֹא אֶל אִ֥ישׁ הָ/אֱלֹהִ֖ים אֶל הַ֣ר הַ/כַּרְמֶ֑ל וַ֠/יְהִי
    כִּ/רְא֨וֹת אִישׁ הָ/אֱלֹהִ֤ים אֹתָ/הּ֙ מִ/נֶּ֔גֶד וַ/יֹּ֨אמֶר֙ אֶל גֵּיחֲזִ֣י
    נַעֲר֔/וֹ הִנֵּ֖ה הַ/שּׁוּנַמִּ֥ית הַלָּֽז־־־־׃
translation:
  text: So she went and came to the man of God at Mount Carmel. And when the man of
    God saw her from a distance, he said to Gehazi his servant, “Look, that Shunammite
    woman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from afar.” The Hebrew expression indicates that he saw her while she
      was still some distance away.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  chosen: So she went
  alternatives:
  - And she went
  - Then she went
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative with a sequential sense. 'So she went'
    gives natural English narrative flow while preserving the action.
- source_word: וַתָּבֹא
  chosen: and came
  alternatives:
  - and arrived
  - and went
  lexicon: HALOT
  rationale: בוא commonly means 'come/arrive.' Paired with 'went,' 'came' preserves
    the Hebrew sequence without overinterpreting destination arrival as merely 'arrived.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is the standard Hebrew title and should be translated directly rather
    than interpreted as 'prophet,' even though Elisha is a prophet.
- source_word: אֶל הַר הַכַּרְמֶל
  chosen: at Mount Carmel
  alternatives:
  - to Mount Carmel
  - to the hill country of Carmel
  lexicon: HALOT
  rationale: The first אֶל marks motion toward the man of God; the second locates
    him at Mount Carmel. English idiom prefers 'came to the man of God at Mount Carmel'
    rather than repeating 'to' awkwardly.
- source_word: וַיְהִי כִּרְאוֹת
  chosen: And when ... saw
  alternatives:
  - And it happened, when ... saw
  - Now when ... saw
  lexicon: HALOT
  rationale: This construction introduces a temporal clause. Rendering it as 'And
    when' preserves the narrative transition in readable modern English without the
    wooden 'and it happened.'
- source_word: מִנֶּגֶד
  chosen: from a distance
  alternatives:
  - opposite him
  - in front of him
  - from afar
  lexicon: HALOT
  rationale: In context it indicates that Elisha saw her while she was still some
    distance away, not merely spatially 'opposite.' 'From a distance' communicates
    the narrative sense clearly.
- source_word: נַעֲרוֹ
  chosen: his servant
  alternatives:
  - his young man
  - his attendant
  lexicon: HALOT
  rationale: Though literally 'his young man,' in this context it denotes Gehazi's
    role as Elisha's personal attendant/servant. 'His servant' is natural and contextually
    precise.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' is readable modern
    English and preserves the immediacy better than archaic 'Behold.'
- source_word: הַשּׁוּנַמִּית הַלָּז
  chosen: that Shunammite woman
  alternatives:
  - this Shunammite
  - that woman from Shunem
  lexicon: HALOT
  rationale: The demonstrative הַלָּז points out a specific woman at some remove.
    'That Shunammite woman' preserves both the ethnic/geographic designation and the
    demonstrative force in idiomatic English.
