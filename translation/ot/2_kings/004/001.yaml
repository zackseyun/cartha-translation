id: 2KI.4.1
reference: 2 Kings 4:1
source:
  edition: WLC
  text: וְ/אִשָּׁ֣ה אַחַ֣ת מִ/נְּשֵׁ֣י בְנֵֽי הַ֠/נְּבִיאִים צָעֲקָ֨ה אֶל אֱלִישָׁ֜ע לֵ/אמֹ֗ר עַבְדְּ/ךָ֤ אִישִׁ/י֙ מֵ֔ת וְ/אַתָּ֣ה יָדַ֔עְתָּ כִּ֣י עַבְדְּ/ךָ֔ הָיָ֥ה יָרֵ֖א אֶת יְהוָ֑ה וְ/הַ֨/נֹּשֶׁ֔ה בָּ֗א לָ/קַ֜חַת אֶת שְׁנֵ֧י יְלָדַ֛/י ל֖/וֹ לַ/עֲבָדִֽים־־־־׃
translation:
  text: Now a certain woman from the wives of the sons of the prophets cried out to Elisha, saying, “Your servant, my husband, has died, and you know that your servant feared Yahweh. And the creditor has come to take my two children for himself as slaves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my two sons.' The Hebrew says 'my two children,' which can be understood more specifically from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשָּׁה אַחַת
  chosen: Now one woman
  alternatives:
  - And one woman
  - A certain woman
  lexicon: HALOT
  rationale: Introduces a new episode with an indefinite female subject. 'Now' captures the narrative transition value of initial וְ in readable English; 'one woman' preserves the indefiniteness of אַחַת without over-specifying.
- source_word: מִנְּשֵׁי בְנֵי הַנְּבִיאִים
  chosen: from the wives of the sons of the prophets
  alternatives:
  - from among the wives of the sons of the prophets
  - from the wives of the prophetic guild
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew social designation. 'Sons of the prophets' is a recognized expression for a prophetic community; 'wives' is retained rather than smoothing to 'widows' because the woman is identified by group membership before her husband's death is stated.
- source_word: צָעֲקָה
  chosen: cried out
  alternatives:
  - called out
  - pleaded
  lexicon: HALOT
  rationale: '''Cried out'' preserves the urgency and distress conveyed by the verb better than the flatter ''said'' or ''called.'''
- source_word: עַבְדְּךָ אִישִׁי
  chosen: Your servant, my husband
  alternatives:
  - my husband, your servant
  lexicon: HALOT
  rationale: 'Keeps both relational elements explicit: the deceased man is Elisha''s ''servant'' in the sense of subordinate/member of the prophetic circle, and also the speaker''s husband. The appositional English punctuation reflects the Hebrew sequence naturally.'
- source_word: מֵת
  chosen: has died
  alternatives:
  - is dead
  - died
  lexicon: HALOT
  rationale: 'English present perfect fits the discourse situation: his death is a completed event with present consequences for the widow.'
- source_word: יָדַעְתָּ
  chosen: you know
  alternatives:
  - you knew
  lexicon: HALOT
  rationale: Present tense is idiomatic in direct address and reflects the speaker's appeal to Elisha's existing knowledge.
- source_word: הָיָה יָרֵא אֶת יְהוָה
  chosen: feared the LORD
  alternatives:
  - was one who feared the LORD
  - revered the LORD
  lexicon: HALOT
  rationale: '''Feared the LORD'' is the standard biblical idiom and preserves the covenantal/theological weight of ירא in this construction. ''The LORD'' follows the project''s default for יְהוָה.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: הַנֹּשֶׁה
  chosen: the creditor
  alternatives:
  - the moneylender
  lexicon: HALOT
  rationale: The participial form denotes the one to whom the debt is owed. 'Creditor' is the most direct and broadly understandable legal-economic term in context.
- source_word: בָּא לָקַחַת
  chosen: has come to take
  alternatives:
  - is coming to take
  - came to take
  lexicon: HALOT
  rationale: Present perfect conveys an imminent threatening arrival with current force in English.
- source_word: שְׁנֵי יְלָדַי
  chosen: my two children
  alternatives:
  - my two sons
  lexicon: HALOT
  rationale: יַלֶד/יְלָדִים can denote children broadly, and the Hebrew here does not explicitly use 'sons.' 'Children' preserves the lexical form without narrowing beyond the text, even though the broader context may imply males.
- source_word: לוֹ
  chosen: for himself
  alternatives:
  - to himself
  - for him
  lexicon: HALOT
  rationale: 'Makes explicit the beneficiary nuance of לּוֹ in idiomatic English: the creditor intends to appropriate them for his own use.'
- source_word: לַעֲבָדִים
  chosen: as slaves
  alternatives:
  - for slaves
  - as servants
  lexicon: HALOT
  rationale: The bonded status is salient in debt-servitude context, so 'slaves' better reflects the severity than 'servants,' in line with the project's preference to avoid softening bonded terms where the social reality is central.
