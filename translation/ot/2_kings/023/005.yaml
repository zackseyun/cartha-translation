id: 2KI.23.5
reference: 2 Kings 23:5
source:
  edition: WLC
  text: וְ/הִשְׁבִּ֣ית אֶת הַ/כְּמָרִ֗ים אֲשֶׁ֤ר נָֽתְנוּ֙ מַלְכֵ֣י יְהוּדָ֔ה וַ/יְקַטֵּ֤ר
    בַּ/בָּמוֹת֙ בְּ/עָרֵ֣י יְהוּדָ֔ה וּ/מְסִבֵּ֖י יְרוּשָׁלִָ֑ם וְ/אֶת הַֽ/מְקַטְּרִ֣ים
    לַ/בַּ֗עַל לַ/שֶּׁ֤מֶשׁ וְ/לַ/יָּרֵ֨חַ֙ וְ/לַ/מַּזָּל֔וֹת וּ/לְ/כֹ֖ל צְבָ֥א הַ/שָּׁמָֽיִם־־׃
translation:
  text: And he put an end to the idolatrous priests whom the kings of Judah had appointed
    to burn incense at the high places in the cities of Judah and around Jerusalem,
    and also those who burned incense to Baal, to the sun, to the moon, to the constellations,
    and to all the host of the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pagan priests.' The Hebrew term refers to priests associated with
      illegitimate or idolatrous worship, not the lawful priests of the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'the zodiac signs.' The Hebrew term likely refers to constellations or
      astral groupings.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the host of the heavens'; also commonly rendered 'the host of heaven'
      or 'the heavenly host.' Here it refers to celestial bodies worshiped in astral
      religion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבִּית
  chosen: he put an end to
  alternatives:
  - he abolished
  - he removed
  - he caused to cease
  lexicon: HALOT
  rationale: Hiphil of שׁבת here means to cause to cease or put a stop to. 'Put an
    end to' is natural English and preserves the causative force without over-specifying
    the exact mechanism.
- source_word: הַכְּמָרִים
  chosen: the idolatrous priests
  alternatives:
  - the priests
  - the pagan priests
  lexicon: HALOT
  rationale: כְּמָרִים refers not to legitimate Levitical priests but to priests associated
    with illicit or foreign worship. 'Idolatrous priests' makes that distinction explicit
    from context and common usage of the term in Kings.
- source_word: אֲשֶׁר נָתְנוּ מַלְכֵי יְהוּדָה
  chosen: whom the kings of Judah had appointed
  alternatives:
  - whom the kings of Judah had ordained
  - whom the kings of Judah had set up
  lexicon: HALOT
  rationale: נתן in this construction means to appoint or install. 'Had appointed'
    fits the prior action relative to Josiah's reform.
- source_word: וַיְקַטֵּר
  chosen: to burn incense
  alternatives:
  - to make offerings by fire
  - to offer incense
  lexicon: HALOT
  rationale: קטר commonly refers to burning incense or making smoke offerings. Here,
    with the following objects of worship, 'burn incense' is the clearest idiomatic
    rendering.
- source_word: בַּבָּמוֹת
  chosen: at the high places
  alternatives:
  - on the high places
  - at the shrines
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for local elevated cult sites. 'High places'
    is the established and accurate rendering.
- source_word: בְּעָרֵי יְהוּדָה וּמְסִבֵּי יְרוּשָׁלִָם
  chosen: in the cities of Judah and around Jerusalem
  alternatives:
  - in the cities of Judah and in the surroundings of Jerusalem
  - in the cities of Judah and all around Jerusalem
  lexicon: HALOT
  rationale: מְסִבֵּי denotes surrounding areas. 'Around Jerusalem' is concise and
    accurate.
- source_word: וְאֶת הַמְקַטְּרִים
  chosen: and also those who burned incense
  alternatives:
  - and those burning incense
  - and the ones who offered incense
  lexicon: HALOT
  rationale: The participle identifies an additional group characterized by incense-burning.
    'Also those who burned incense' makes the coordination with the previous object
    clear in English.
- source_word: לַבַּעַל
  chosen: to Baal
  lexicon: HALOT
  rationale: Proper name of the deity; transliterated according to standard convention.
- source_word: לַשֶּׁמֶשׁ וְלַיָּרֵחַ
  chosen: to the sun, to the moon
  alternatives:
  - to the sun and the moon
  lexicon: HALOT
  rationale: The repeated preposition marks distinct objects of worship; preserving
    the repetition reflects the Hebrew list.
- source_word: וְלַמַּזָּלוֹת
  chosen: to the constellations
  alternatives:
  - to the zodiac signs
  - to the stars
  lexicon: HALOT
  rationale: מַזָּלוֹת likely refers to constellations or zodiacal bodies rather than
    stars in general. 'Constellations' is accurate while avoiding over-precision if
    the exact ancient referent is debated.
- source_word: וּלְכֹל צְבָא הַשָּׁמָיִם
  chosen: and to all the host of the heavens
  alternatives:
  - and to all the host of heaven
  - and to all the heavenly host
  lexicon: HALOT
  rationale: צְבָא הַשָּׁמַיִם is a stock phrase for the heavenly bodies conceived
    as an array. 'Host of the heavens' is a transparent rendering of the Hebrew plural,
    though 'host of heaven' is also possible.
