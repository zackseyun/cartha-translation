theological_decisions:
- issue: Whether כְּמָרִים should be rendered neutrally as 'priests' or marked as
    illegitimate/idolatrous
  chosen_reading: idolatrous priests
  alternative_readings:
  - priests
  - pagan priests
  rationale: The context is Josiah's purge of illicit worship, and כְּמָרִים in the
    Hebrew Bible commonly denotes non-Yahwistic or illegitimate cultic priests. The
    chosen rendering prevents confusion with legitimate priests of the LORD without
    importing more than the context warrants.
