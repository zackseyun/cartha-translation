theological_decisions:
- issue: Royal anointing language
  chosen_reading: anointed him
  alternative_readings:
  - appointed him
  rationale: The Hebrew explicitly uses the verb for anointing, which carries political
    and ceremonial significance in Israel's monarchy. The translation preserves that
    act rather than reducing it to a generic appointment.
