id: 2KI.23.30
reference: 2 Kings 23:30
source:
  edition: WLC
  text: וַ/יַּרְכִּבֻ֨/הוּ עֲבָדָ֥י/ו מֵת֙ מִ/מְּגִדּ֔וֹ וַ/יְבִאֻ֨/הוּ֙ יְר֣וּשָׁלִַ֔ם
    וַֽ/יִּקְבְּרֻ֖/הוּ בִּ/קְבֻֽרָת֑/וֹ וַ/יִּקַּ֣ח עַם הָ/אָ֗רֶץ אֶת יְהֽוֹאָחָז֙
    בֶּן יֹ֣אשִׁיָּ֔הוּ וַ/יִּמְשְׁח֥וּ אֹת֛/וֹ וַ/יַּמְלִ֥יכוּ אֹת֖/וֹ תַּ֥חַת אָבִֽי/ו־־־׃פ
translation:
  text: His servants carried him dead from Megiddo and brought him to Jerusalem, and
    they buried him in his tomb. Then the people of the land took Jehoahaz the son
    of Josiah, anointed him, and made him king in place of his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'made him ride'; the Hebrew verb is literally 'caused him to ride,' here
      referring to transporting Josiah's body.
    reason: lexical_alternative
  - marker: b
    text: '''The people of the land'' is a formal Hebrew expression for the local
      populace acting as a political body.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְכִּבֻהוּ
  chosen: carried him
  alternatives:
  - made him ride
  - transported him
  lexicon: HALOT
  rationale: The Hiphil of רכב literally means 'cause to ride,' often by placing someone
    on an animal or chariot. In this context, with the following 'dead from Megiddo,'
    idiomatic English prefers 'carried him' to express transport of a corpse without
    awkward literalism.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his servants/officials
  - his attendants
  lexicon: HALOT
  rationale: עבד can denote servants or royal officials/attendants. Here it refers
    to Josiah's court personnel who handled his body. 'Servants' is the most direct
    rendering, while the royal context is clear from the narrative.
- source_word: מֵת
  chosen: dead
  alternatives:
  - as a dead man
  - having died
  lexicon: HALOT
  rationale: The adjective/participle marks Josiah's condition during transport. 'Dead'
    is concise and natural in English, preserving the sense that he was brought back
    as a corpse.
- source_word: מִמְּגִדּוֹ
  chosen: from Megiddo
  alternatives:
  - out of Megiddo
  lexicon: HALOT
  rationale: Simple locative source; 'from Megiddo' is standard and clear.
- source_word: וַיְבִאֻהוּ יְרוּשָׁלַם
  chosen: brought him to Jerusalem
  alternatives:
  - brought him into Jerusalem
  lexicon: HALOT
  rationale: בוא with a destination commonly means 'bring to.' 'Into Jerusalem' is
    possible but unnecessary in English here.
- source_word: וַיִּקְבְּרֻהוּ
  chosen: they buried him
  alternatives:
  - and buried him
  lexicon: HALOT
  rationale: Straightforward rendering of קבר in the plural, referring back to the
    servants or burial party.
- source_word: בִּקְבֻרָתוֹ
  chosen: in his tomb
  alternatives:
  - in his burial place
  - in his grave
  lexicon: HALOT
  rationale: The noun denotes burial place. 'Tomb' fits a royal burial context better
    than the more generic 'grave' and is idiomatic English.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the common people
  lexicon: HALOT
  rationale: This is a recognized socio-political expression in the Hebrew Bible.
    'The people of the land' preserves the formal phrase and avoids over-interpreting
    it as merely 'common people,' though it likely refers to the local populace with
    political agency.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - selected
  - seized
  lexicon: HALOT
  rationale: לקח is literally 'take.' In context it means they took Jehoahaz for royal
    installation. 'Took' preserves the Hebrew wording without importing more interpretation
    than necessary.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: the son of Josiah
  alternatives:
  - Josiah's son
  rationale: A transparent filial identification; 'the son of Josiah' stays close
    to the Hebrew and reads naturally.
- source_word: וַיִּמְשְׁחוּ אֹתוֹ
  chosen: anointed him
  lexicon: HALOT
  rationale: משׁח is the standard verb for ritual/political anointing, especially
    in royal accession contexts. 'Anointed him' preserves the formal act of investiture.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  chosen: made him king
  alternatives:
  - appointed him king
  - caused him to reign
  lexicon: HALOT
  rationale: The Hiphil of מלך means to make someone king. 'Made him king' is both
    accurate and idiomatic.
- source_word: תַּחַת אָבִיו
  chosen: in place of his father
  alternatives:
  - instead of his father
  - after his father
  lexicon: HALOT
  rationale: תחת here indicates succession/substitution. 'In place of his father'
    clearly expresses royal succession without flattening the substitution nuance.
