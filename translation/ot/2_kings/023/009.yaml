id: 2KI.23.9
reference: 2 Kings 23:9
source:
  edition: WLC
  text: אַ֗ךְ לֹ֤א יַֽעֲלוּ֙ כֹּהֲנֵ֣י הַ/בָּמ֔וֹת אֶל מִזְבַּ֥ח יְהוָ֖ה בִּ/ירוּשָׁלִָ֑ם
    כִּ֛י אִם אָכְל֥וּ מַצּ֖וֹת בְּ/ת֥וֹךְ אֲחֵי/הֶֽם־־׃
translation:
  text: However, the priests of the high places did not go up to the altar of the
    LORD in Jerusalem, but they ate unleavened bread among their brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the high-place priests.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among their brothers,' likely referring to their fellow priests
      or priestly kinsmen.
    reason: cultural_note
  - marker: c
    text: The divine name is YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: Marks a limitation or exception to the preceding reform actions; 'However'
    communicates the adversative nuance naturally in English.
- source_word: יַעֲלוּ
  chosen: did not go up
  alternatives:
  - did not ascend
  - did not come up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In cultic and Jerusalem-oriented contexts,
    'go up' preserves the idiom without sounding overly wooden.
- source_word: כֹּהֲנֵי הַבָּמוֹת
  chosen: the priests of the high places
  alternatives:
  - the high-place priests
  lexicon: HALOT
  rationale: A transparent rendering of the construct phrase. 'High places' is the
    standard and recognizable term for bamot, referring to local cult sites.
- source_word: מִזְבַּח יְהוָה
  chosen: the altar of the LORD
  alternatives:
  - the LORD's altar
  lexicon: HALOT
  rationale: Formal enough to preserve the construct relationship while remaining
    natural English. The divine name follows the doctrinal default as 'the LORD' for
    יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except that
  - rather
  lexicon: HALOT
  rationale: 'Here the pair introduces the contrasting circumstance: they did not
    officiate at the Jerusalem altar, but instead shared in priestly provisions. ''But''
    gives the sense clearly in idiomatic English.'
- source_word: אָכְלוּ מַצּוֹת
  chosen: they ate unleavened bread
  alternatives:
  - they ate unleavened cakes
  - they ate matzot
  lexicon: HALOT
  rationale: מַצּוֹת refers to unleavened bread; this is the clearest modern English
    rendering and fits priestly food regulations.
- source_word: בְּתוֹךְ אֲחֵיהֶם
  chosen: among their brothers
  alternatives:
  - in the midst of their brothers
  - with their brothers
  - among their fellow priests
  lexicon: HALOT
  rationale: Literally 'in the midst of their brothers.' 'Among their brothers' is
    natural and preserves the masculine kinship term. In context the brothers are
    their fellow priests/kinsmen, but the Hebrew does not explicitly add 'priests,'
    so the more literal wording is retained.
