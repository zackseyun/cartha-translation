theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered kinship term אֲחֵיהֶם
  chosen_reading: their brothers
  alternative_readings:
  - their brothers and fellow priests
  - their kinsmen
  rationale: The Hebrew is grammatically masculine plural and refers to a male priestly
    group in context. Per the translation philosophy, gender-accurate rendering is
    preferred over neutralization.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
