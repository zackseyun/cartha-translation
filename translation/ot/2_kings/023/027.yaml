theological_decisions:
- issue: Temporal force of וּמָאַסְתִּי in a prophetic judgment declaration
  chosen_reading: 'Render future-oriented: ''and I will reject'''
  alternative_readings:
  - and I have rejected
  rationale: Although the Hebrew perfect can be read as completed action, the surrounding speech is a declaration of impending judgment ('I will also remove Judah... just as I removed Israel'). Rendering the second verb futurally preserves the discourse flow and avoids implying that the rejection had already been fully enacted at the moment of speaking. Theologically, this maintains the announced judgment without overstating realized abandonment beyond the verse's rhetoric.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence
- issue: Rendering הַבַּיִת
  chosen_reading: Use 'the house' in the main text
  alternative_readings:
  - the temple
  rationale: The Hebrew says 'house,' a standard designation for the temple. Keeping 'house' preserves the source wording and intertextual resonance with temple theology, while context makes the meaning intelligible. The alternative 'temple' is worth preserving for clarity.
  doctrine_reference: Original-language primacy over translation tradition; consistency of key terms
