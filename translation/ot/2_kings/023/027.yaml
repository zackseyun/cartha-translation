id: 2KI.23.27
reference: 2 Kings 23:27
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֗ה גַּ֤ם אֶת יְהוּדָה֙ אָסִיר֙ מֵ/עַ֣ל פָּנַ֔/י כַּ/אֲשֶׁ֥ר הֲסִרֹ֖תִי אֶת יִשְׂרָאֵ֑ל וּ֠/מָאַסְתִּי אֶת הָ/עִ֨יר הַ/זֹּ֤את אֲשֶׁר בָּחַ֨רְתִּי֙ אֶת יְר֣וּשָׁלִַ֔ם וְ/אֶת הַ/בַּ֔יִת אֲשֶׁ֣ר אָמַ֔רְתִּי יִהְיֶ֥ה שְׁמִ֖/י שָֽׁם־־־־־־׃
translation:
  text: And Yahweh said, “I will also remove Judah from before me, just as I removed Israel; and I will reject this city that I chose—Jerusalem—and the house of which I said, ‘My name will be there.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple.' Hebrew 'the house,' referring to the temple in Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Or 'and I have rejected this city that I chose—Jerusalem.' The Hebrew verb can be read as a completed action, though here it is rendered with future force to match the surrounding judgment declaration.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English Bible convention.
- source_word: אָסִיר / הֲסִרֹתִי (סור in Hiphil)
  chosen: remove / removed
  alternatives:
  - put away
  - cast off
  - take away
  lexicon: HALOT
  rationale: The Hiphil conveys causing to depart or removing. 'Remove' is natural modern English and preserves the parallel between Judah and Israel in this judgment saying.
- source_word: מֵעַל פָּנַי
  chosen: from before me
  alternatives:
  - from my presence
  - from before my face
  lexicon: HALOT
  rationale: Literally 'from upon my face/before me.' 'From before me' preserves the idiom's relational and covenantal force without over-paraphrasing. 'From my presence' is possible but slightly more interpretive.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - too
  lexicon: HALOT
  rationale: Marks Judah's fate as corresponding to Israel's; 'also' is the clearest contextual equivalent.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Signals explicit comparison between the removal of Judah and the prior removal of Israel.
- source_word: וּמָאַסְתִּי
  chosen: I will reject
  alternatives:
  - I have rejected
  - I will cast off
  - I will despise
  lexicon: HALOT
  rationale: Though morphologically a qatal form, in this prophetic/judgment context it continues the future-oriented divine declaration alongside 'I will remove.' 'Reject' best captures מאס here as covenantal repudiation without the overly emotive English 'despise.'
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - this city here
  lexicon: HALOT
  rationale: Straightforward rendering of the demonstrative phrase.
- source_word: אֲשֶׁר בָּחַרְתִּי
  chosen: that I chose
  alternatives:
  - which I chose
  - that I have chosen
  lexicon: HALOT
  rationale: Simple past fits the reference to God's prior election of Jerusalem. English relative 'that' is more natural than 'which' in running prose.
- source_word: אֶת יְרוּשָׁלִַם
  chosen: —Jerusalem—
  alternatives:
  - ', Jerusalem,'
  - namely Jerusalem
  lexicon: HALOT
  rationale: The appositional accusative identifies 'this city.' Dashes cleanly mark the apposition in modern English without adding words not in the Hebrew.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: Literally 'the house.' While it refers to the temple, retaining 'house' preserves the Hebrew diction and its theological resonance; the referent remains clear from context.
- source_word: יִהְיֶה שְׁמִי שָׁם
  chosen: My name will be there
  alternatives:
  - my name shall be there
  - there my name will be
  lexicon: HALOT
  rationale: A direct and natural rendering of the clause, preserving the biblical theme of God's name dwelling in the chosen sanctuary.
