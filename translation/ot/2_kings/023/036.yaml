id: 2KI.23.36
reference: 2 Kings 23:36
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָ֨ה יְהוֹיָקִ֣ים בְּ/מָלְכ֔/וֹ וְ/אַחַ֤ת עֶשְׂרֵה֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ זבידה בַת פְּדָיָ֖ה מִן רוּמָֽה־־־׃
translation:
  text: Jehoiakim was twenty-five years old when he began to reign, and he reigned
    eleven years in Jerusalem. His mother’s name was Zebidah daughter of Pedaiah,
    from Rumah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Jehoiakim was a son of twenty-five years when he became
      king.”
    reason: lexical_alternative
  - marker: b
    text: Zebidah may also be spelled “Zebudah” in English transliteration traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: was twenty-five years old
  alternatives:
  - was a son of twenty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. Rendering it idiomatically in
    English preserves the meaning without woodenness.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  lexicon: HALOT
  rationale: The infinitive/construct-like expression with ב marks the time of accession.
    'When he began to reign' is natural English and matches the regnal formula context.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely
    holding the title in a static sense.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative phrase indicating the seat of his reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: A common genealogical formula. The chosen rendering is idiomatic while
    preserving the informational structure.
- source_word: זבידה
  chosen: Zebidah
  alternatives:
  - Zebudah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Zebidah'
    reflects the consonantal form here and common English usage for this verse.
- source_word: בַת פְּדָיָה
  chosen: daughter of Pedaiah
  lexicon: HALOT
  rationale: Straightforward filial designation.
- source_word: מִן רוּמָה
  chosen: from Rumah
  alternatives:
  - of Rumah
  lexicon: HALOT
  rationale: The preposition מִן most naturally indicates origin or hometown here;
    'from' is the clearest English equivalent.
