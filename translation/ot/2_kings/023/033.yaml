id: 2KI.23.33
reference: 2 Kings 23:33
source:
  edition: WLC
  text: וַ/יַּאַסְרֵ/הוּ֩ פַרְעֹ֨ה נְכֹ֤ה בְ/רִבְלָה֙ בְּ/אֶ֣רֶץ חֲמָ֔ת ב/מלך בִּ/ירוּשָׁלִָ֑ם
    וַ/יִּתֶּן עֹ֨נֶשׁ֙ עַל הָ/אָ֔רֶץ מֵאָ֥ה כִכַּר כֶּ֖סֶף וְ/כִכַּ֥ר זָהָֽב־־־׃
translation:
  text: And Pharaoh Neco imprisoned him at Riblah in the land of Hamath, so that he
    might not reign in Jerusalem; and he imposed on the land a tribute of a hundred
    talents of silver and a talent of gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bound him' or 'confined him.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression may be rendered 'so that he might not reign in Jerusalem'
      or 'from reigning in Jerusalem.'
    reason: alternative_reading
  - marker: c
    text: Or 'a penalty' or 'a fine' instead of 'a tribute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאַסְרֵהוּ
  chosen: imprisoned him
  alternatives:
  - bound him
  - confined him
  lexicon: HALOT
  rationale: The verb אסר commonly means to bind or imprison. In this royal-political
    context, 'imprisoned him' communicates the practical sense more clearly in modern
    English than the more literal 'bound him,' while preserving the coercive action.
- source_word: פַרְעֹה נְכֹה
  chosen: Pharaoh Neco
  alternatives:
  - Pharaoh Necho
  rationale: Personal names are transliterated. 'Neco' is a standard English form;
    'Necho' is also traditional. The title 'Pharaoh' is retained as part of the ruler's
    designation.
- source_word: בְרִבְלָה
  chosen: at Riblah
  alternatives:
  - in Riblah
  rationale: For a place name marking location, 'at Riblah' is idiomatic English for
    the site where the detention occurred.
- source_word: בְּאֶרֶץ חֲמָת
  chosen: in the land of Hamath
  alternatives:
  - in the territory of Hamath
  lexicon: HALOT
  rationale: אֶרֶץ here denotes a geographic region. 'Land of Hamath' is the conventional
    and sufficiently transparent rendering.
- source_word: במלך בִּירוּשָׁלָם
  chosen: so that he might not reign in Jerusalem
  alternatives:
  - from reigning in Jerusalem
  - when he reigned in Jerusalem
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב is idiomatic and contextually
    expresses prevention/result: Pharaoh detained him so that he would not continue
    or act as king in Jerusalem. This matches the narrative context better than a
    simple temporal reading.'
- source_word: וַיִּתֶּן עֹנֶשׁ
  chosen: he imposed ... a tribute
  alternatives:
  - he imposed ... a penalty
  - he set ... a fine
  lexicon: HALOT
  rationale: עֹנֶשׁ can denote a penalty, fine, or imposed payment. Because the payment
    is levied on the land in specified amounts of silver and gold, 'tribute' best
    captures the political-economic sense in context, though 'penalty' remains lexically
    possible.
- source_word: עַל הָאָרֶץ
  chosen: on the land
  alternatives:
  - on the country
  - on the people of the land
  lexicon: HALOT
  rationale: The phrase most naturally refers to the land/country of Judah as the
    entity burdened with the levy. 'On the land' preserves the Hebrew wording while
    remaining understandable.
- source_word: מֵאָה כִכַּר כֶּסֶף
  chosen: a hundred talents of silver
  lexicon: HALOT
  rationale: כִכָּר is a weight measure conventionally rendered 'talent.' Retaining
    the ancient unit is more transparent and less interpretively loaded than converting
    to modern weights.
- source_word: וְכִכַּר זָהָב
  chosen: and a talent of gold
  lexicon: HALOT
  rationale: The singular is preserved. As with silver, 'talent' is retained as the
    ancient unit of weight.
