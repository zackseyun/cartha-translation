id: 2KI.23.28
reference: 2 Kings 23:28
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י יֹאשִׁיָּ֖הוּ וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Josiah, and all that he did, are they not written
    in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recorded' for 'written'; the Hebrew passive participle means 'written,'
      but in this archival context it can also be understood as 'recorded.'
    reason: lexical_alternative
  - marker: b
    text: '''Book of the Chronicles'' refers to a royal record source cited in Kings,
      not necessarily the biblical books of 1–2 Chronicles in their final canonical
      form.'
    reason: cross_reference
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: יֶתֶר in this formulaic historiographic expression introduces what remains
    to be told about a king's deeds. 'The rest of' is standard, natural English and
    preserves the sense of remainder.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words' or 'matters,' in the royal-summary formula דִּבְרֵי
    often refers broadly to the recorded acts or affairs of a king. 'Acts' best fits
    the context and common English historiographic style.
- source_word: יֹאשִׁיָּהוּ
  chosen: Josiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  lexicon: HALOT
  rationale: This phrase straightforwardly summarizes the king's deeds. 'Did' is the
    plain and sufficiently broad rendering of עשה here.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  lexicon: HALOT
  rationale: The interrogative particle with negation introduces a rhetorical question
    expecting a positive answer. 'Are they not' preserves the rhetorical force in
    idiomatic English.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  lexicon: HALOT
  rationale: The passive participle means 'written.' Because the context is archival,
    'recorded' is possible, but 'written' stays closer to the Hebrew while remaining
    natural.
- source_word: עַל־סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival formula English
    idiom prefers 'written in the book.' 'Book' is retained as the conventional rendering
    of סֵפֶר in this context.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the events of the days
  - the historical record
  lexicon: HALOT
  rationale: This is the conventional title of the royal annals source cited throughout
    Kings. 'Chronicles' accurately reflects the established sense of a chronological
    record.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - concerning the kings of Judah
  lexicon: HALOT
  rationale: The ל here is part of the source-title formula. 'Of the Kings of Judah'
    is the most idiomatic English representation of the title.
