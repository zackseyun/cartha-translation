id: 2KI.23.23
reference: 2 Kings 23:23
source:
  edition: WLC
  text: כִּ֗י אִם בִּ/שְׁמֹנֶ֤ה עֶשְׂרֵה֙ שָׁנָ֔ה לַ/מֶּ֖לֶךְ יֹֽאשִׁיָּ֑הוּ נַעֲשָׂ֞ה
    הַ/פֶּ֧סַח הַ/זֶּ֛ה לַ/יהוָ֖ה בִּ/ירוּשָׁלִָֽם־׃
translation:
  text: but only in the eighteenth year of King Josiah was this Passover kept for
    the LORD in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''was done''; that is, ''was kept'' or ''was observed.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: but only
  alternatives:
  - except that
  - rather, only
  lexicon: HALOT
  rationale: In context this adversative-exceptive pair contrasts the preceding statement
    that such a Passover had not been kept; 'but only' communicates the restrictive
    contrast naturally in English.
- source_word: בִּשְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  chosen: in the eighteenth year
  alternatives:
  - in year eighteen
  - in the eighteenth year
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal expression with ordinal
    sense in English.
- source_word: לַמֶּלֶךְ יֹאשִׁיָּהוּ
  chosen: of King Josiah
  alternatives:
  - of the king, Josiah
  - belonging to King Josiah
  lexicon: HALOT
  rationale: The lamed marks reference to the regnal year; English idiom expresses
    this as 'of King Josiah.' The personal name is transliterated per project policy.
- source_word: נַעֲשָׂה
  chosen: was kept
  alternatives:
  - was made
  - was done
  - was observed
  lexicon: HALOT
  rationale: Although the verb is literally 'was done/made,' with Passover as subject
    the idiomatic sense is that the feast was celebrated or kept. 'Was kept' preserves
    the passive form while sounding natural.
- source_word: הַפֶּסַח הַזֶּה
  chosen: this Passover
  alternatives:
  - this Passover feast
  - this Pesach
  lexicon: HALOT
  rationale: Direct rendering of the demonstrative phrase. 'Passover' is the established
    English equivalent and sufficiently clear without adding 'feast' in the main text.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  - for Yahweh
  lexicon: HALOT
  rationale: The lamed here marks dedication/direction of the observance. 'For the
    LORD' reads naturally in English. Per doctrine, יְהוָה is rendered 'the LORD,'
    with 'Yahweh' preserved only as an alternative, not in the main text.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative rendering; the place name is transliterated
    by standard English convention.
