theological_decisions:
- issue: Fulfillment formula linking Josiah's action to prior prophecy
  chosen_reading: 'Render the clause as explicit fulfillment of prior divine speech:
    ''according to the word of the LORD that the man of God proclaimed.'''
  alternative_readings:
  - '''according to the word of the LORD which the man of God called out'''
  - Attaching the final relative clause differently so that only the man of God, not
    the LORD's word, is modified
  rationale: The syntax presents Josiah's action as fulfillment of YHWH's prior word
    mediated through the man of God. The translation preserves that theological connection
    without adding interpretive detail beyond the Hebrew.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with the
    reverential convention noted in DOCTRINE.md.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
