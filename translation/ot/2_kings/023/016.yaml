id: 2KI.23.16
reference: 2 Kings 23:16
source:
  edition: WLC
  text: וַ/יִּ֣פֶן יֹאשִׁיָּ֗הוּ וַ/יַּ֨רְא אֶת הַ/קְּבָרִ֤ים אֲשֶׁר שָׁם֙ בָּ/הָ֔ר
    וַ/יִּשְׁלַ֗ח וַ/יִּקַּ֤ח אֶת הָֽ/עֲצָמוֹת֙ מִן הַ/קְּבָרִ֔ים וַ/יִּשְׂרֹ֥ף עַל
    הַ/מִּזְבֵּ֖חַ וַֽ/יְטַמְּאֵ֑/הוּ כִּ/דְבַ֣ר יְהוָ֗ה אֲשֶׁ֤ר קָרָא֙ אִ֣ישׁ הָ/אֱלֹהִ֔ים
    אֲשֶׁ֣ר קָרָ֔א אֶת הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה־־־־־־׃
translation:
  text: Then Josiah turned and saw the tombs that were there on the mountain, and
    he sent and took the bones from the tombs and burned them on the altar and defiled
    it, according to the word of the LORD that the man of God proclaimed, who proclaimed
    these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the graves.' The Hebrew term can refer to burial places generally, not
      only constructed tombs.
    reason: lexical_alternative
  - marker: b
    text: Or 'cried out' / 'called out.' The Hebrew verb can emphasize a loud public
      proclamation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  chosen: turned
  alternatives:
  - turned aside
  - looked around
  lexicon: HALOT
  rationale: The verb פנה commonly means 'turn' or 'turn oneself.' 'Turned' is the
    most natural narrative rendering and preserves the physical movement before seeing
    the tombs.
- source_word: הַקְּבָרִים
  chosen: the tombs
  alternatives:
  - the graves
  - the burial places
  lexicon: HALOT
  rationale: קבר can mean grave or tomb. 'Tombs' fits the setting of identifiable
    burial sites on the mountain and reads naturally in English.
- source_word: בָּהָר
  chosen: on the mountain
  alternatives:
  - on the hill
  lexicon: HALOT
  rationale: הַר is broadly 'mountain/hill country/hill.' Here 'mountain' is a straightforward
    rendering of the definite noun and preserves the topographical note without overinterpreting
    the exact elevation.
- source_word: הָעֲצָמוֹת
  chosen: the bones
  alternatives:
  - the remains
  lexicon: HALOT
  rationale: עצמות literally means 'bones.' The concrete term is important because
    the defilement of the altar is effected by burning human bones.
- source_word: וַיִּשְׂרֹף עַל הַמִּזְבֵּחַ
  chosen: burned them on the altar
  alternatives:
  - burned them over the altar
  - burned them upon the altar
  lexicon: HALOT
  rationale: The direct object is the bones, and על with altar is idiomatically rendered
    'on the altar.' This preserves the shocking cultic desecration described.
- source_word: וַיְטַמְּאֵהוּ
  chosen: defiled it
  alternatives:
  - made it unclean
  lexicon: HALOT
  rationale: טמא in ritual contexts is well rendered 'defile.' The pronominal suffix
    refers most naturally to the altar, matching the immediate antecedent and the
    narrative purpose.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - in accordance with the word of the LORD
  lexicon: HALOT
  rationale: This formula signals fulfillment of prior divine speech. 'According to
    the word of the LORD' is idiomatic and preserves the fulfillment motif.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'man of God.' This is a standard prophetic
    title and should be translated rather than paraphrased.
- source_word: קָרָא
  chosen: proclaimed
  alternatives:
  - cried out
  - called out
  - announced
  lexicon: HALOT
  rationale: קרא can mean call, cry, proclaim. In this prophetic context, 'proclaimed'
    best conveys authoritative public utterance and works for both occurrences in
    the verse.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these things
  alternatives:
  - these words
  - these matters
  lexicon: HALOT
  rationale: דברים can mean words or matters. Since the reference is to the foretold
    acts now being fulfilled, 'these things' communicates the broader sense of the
    predicted events.
