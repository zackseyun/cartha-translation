id: 2KI.23.31
reference: 2 Kings 23:31
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/שָׁלֹ֤שׁ שָׁנָה֙ יְהוֹאָחָ֣ז בְּ/מָלְכ֔/וֹ וּ/שְׁלֹשָׁ֣ה
    חֳדָשִׁ֔ים מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ חֲמוּטַ֥ל בַּֽת יִרְמְיָ֖הוּ
    מִ/לִּבְנָֽה־־׃
translation:
  text: Jehoahaz was twenty-three years old when he began to reign, and he reigned
    three months in Jerusalem. His mother’s name was Hamutal daughter of Jeremiah
    of Libnah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְשָׁלֹשׁ שָׁנָה
  chosen: was twenty-three years old
  alternatives:
  - was a son of twenty-three years
  - was twenty-three years old when he became king
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom, rendered naturally in English
    rather than woodenly. 'Was twenty-three years old' preserves the sense accurately.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: The infinitive/construct-like expression with prefixed ב marks the time
    of accession. 'When he began to reign' is a natural and contextually precise rendering
    in regnal formulas.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  - he became king
  lexicon: HALOT
  rationale: Here the finite verb refers to the duration of his kingship, so 'he reigned'
    best matches the regnal notice.
- source_word: וּשְׁלֹשָׁה חֳדָשִׁים
  chosen: three months
  alternatives:
  - for three months
  lexicon: HALOT
  rationale: English idiom commonly supplies the duration sense with 'reigned three
    months'; the temporal accusative is naturally conveyed this way.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative phrase indicating the place of reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is a common formula in Kings. The chosen rendering is slightly smoother
    English while preserving the formal notice.
- source_word: חֲמוּטַל
  chosen: Hamutal
  alternatives:
  - Hamutal
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the policy to transliterate names.
- source_word: בַּת יִרְמְיָהוּ
  chosen: daughter of Jeremiah
  alternatives:
  - daughter of Yirmeyahu
  lexicon: HALOT
  rationale: בַּת marks filial relationship. The father's name is given in its standard
    English form 'Jeremiah' rather than a more phonetic transliteration, matching
    common English Bible convention for well-known names.
- source_word: מִלִּבְנָה
  chosen: of Libnah
  alternatives:
  - from Libnah
  lexicon: HALOT
  rationale: The preposition מן can mean 'from,' but in genealogical identification
    English commonly uses 'of' to indicate place of origin or association. 'Of Libnah'
    reads naturally in this formula.
