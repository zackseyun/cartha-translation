id: 2KI.23.7
reference: 2 Kings 23:7
source:
  edition: WLC
  text: וַ/יִּתֹּץ֙ אֶת בָּתֵּ֣י הַ/קְּדֵשִׁ֔ים אֲשֶׁ֖ר בְּ/בֵ֣ית יְהוָ֑ה אֲשֶׁ֣ר הַ/נָּשִׁ֗ים אֹרְג֥וֹת שָׁ֛ם בָּתִּ֖ים לָ/אֲשֵׁרָֽה־׃
translation:
  text: He tore down the houses of the cult prostitutes that were in the house of Yahweh, where the women were weaving hangings for the Asherah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the male cult prostitutes.' The Hebrew term is masculine plural and refers to persons involved in illicit cultic sexual practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'hangings' or, more literally, 'houses' for the Asherah. The phrase likely refers to woven cultic coverings or shrine-like textiles associated with Asherah worship.
    reason: alternative_reading
  - marker: c
    text: '''The Asherah'' may refer either to the goddess Asherah or to the cult object associated with her, often rendered ''Asherah pole.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֹּץ
  chosen: He tore down
  alternatives:
  - He broke down
  - He demolished
  lexicon: HALOT
  rationale: The verb נתץ in this stem commonly denotes tearing down or demolishing structures. 'Tore down' is natural modern English and preserves the force of dismantling physical structures.
- source_word: בָּתֵּי
  chosen: houses of
  alternatives:
  - rooms of
  - quarters of
  lexicon: HALOT
  rationale: The construct plural of בית literally means 'houses of.' Although these may have been chambers or quarters within the temple precincts, 'houses' keeps the lexical form while remaining understandable.
- source_word: הַקְּדֵשִׁים
  chosen: the cult prostitutes
  alternatives:
  - the male cult prostitutes
  - the consecrated ones
  lexicon: HALOT
  rationale: קָדֵשׁ in this context refers to persons associated with illicit cultic sexual practice, not to holiness in a positive sense. 'Cult prostitutes' communicates the referent clearly. Because the Hebrew form is masculine plural, 'male cult prostitutes' is a possible more explicit rendering, but the broader phrase is smoother in English; the masculine sense is preserved in documentation.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' closely reflects the Hebrew and is a standard transparent rendering. The divine name follows the doctrinal default ''the LORD'' for יְהוָה.'
- source_word: הַנָּשִׁים
  chosen: the women
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the feminine plural noun.
- source_word: אֹרְגוֹת
  chosen: were weaving
  alternatives:
  - wove
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action in the relative clause; 'were weaving' fits the narrative context naturally.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: The adverb is retained because it is present in the Hebrew text and may emphasize the shocking location within the LORD's house.
- source_word: בָּתִּים
  chosen: coverings
  alternatives:
  - hangings
  - garments
  - houses
  lexicon: HALOT
  rationale: Although the noun is literally 'houses,' in this idiom many understand it to refer to woven coverings, hangings, or tent-like shrines for Asherah. Rendering it woodenly as 'houses' would be misleading in English. 'Coverings' preserves the idea of woven cultic fabric structures without over-specifying.
- source_word: לָאֲשֵׁרָה
  chosen: for the Asherah
  alternatives:
  - for Asherah
  - for the Asherah pole
  lexicon: HALOT
  rationale: אֲשֵׁרָה can denote either the goddess Asherah or the cult object associated with her. In this immediate context of temple reform and destruction of cultic installations, 'the Asherah' preserves the Hebrew form's ambiguity between object and cultic symbol better than specifying 'goddess' or 'pole' in the main text.
