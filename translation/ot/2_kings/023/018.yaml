id: 2KI.23.18
reference: 2 Kings 23:18
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ הַנִּ֣יחוּ ל֔/וֹ אִ֖ישׁ אַל יָנַ֣ע עַצְמֹתָ֑י/ו וַֽ/יְמַלְּטוּ֙
    עַצְמֹתָ֔י/ו אֵ֚ת עַצְמ֣וֹת הַ/נָּבִ֔יא אֲשֶׁר בָּ֖א מִ/שֹּׁמְרֽוֹן־־׃
translation:
  text: And he said, “Leave him alone; let no man disturb his bones.” So they left
    his bones undisturbed, along with the bones of the prophet who had come from Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “So they spared his bones, together with the bones of the prophet who
      came from Samaria.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּיחוּ לוֹ
  chosen: Leave him alone
  alternatives:
  - Let him be
  - Leave him
  lexicon: HALOT
  rationale: The imperative plus pronominal object is an idiomatic command to refrain
    from further action against the dead man's remains. 'Leave him alone' is natural
    modern English and fits the context of stopping the exhumation or desecration.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - anyone
  lexicon: HALOT
  rationale: 'The singular noun in this prohibition has generic force: ''let no man.''
    This follows the gender-accurate policy while preserving the representative singular
    of the Hebrew.'
- source_word: אַל יָנַע
  chosen: let no man disturb
  alternatives:
  - let no man move
  - let no man shake
  lexicon: HALOT
  rationale: The verb נוע in this context refers to moving or disturbing the bones
    from their resting place. 'Disturb' communicates the intended sense in idiomatic
    English better than the more wooden 'move,' while still staying close to the source.
- source_word: עַצְמֹתָיו
  chosen: his bones
  alternatives:
  - his remains
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'bones,' and the repetition is significant
    in the verse. 'Remains' would be smoother but less concrete than the source text.
- source_word: וַיְמַלְּטוּ עַצְמֹתָיו
  chosen: So they left his bones undisturbed
  alternatives:
  - So they spared his bones
  - So they rescued his bones
  lexicon: HALOT
  rationale: The piel of מלט here means to preserve or spare from harm. Because the
    immediate context concerns not moving the bones, 'left his bones undisturbed'
    captures both the result and the sense of preservation in clear English. 'Spared'
    is possible but slightly less explicit for modern readers.
- source_word: אֵת עַצְמוֹת הַנָּבִיא
  chosen: along with the bones of the prophet
  alternatives:
  - together with the bones of the prophet
  lexicon: HALOT
  rationale: 'The direct-object marker introduces an additional object coordinated
    in sense with the first: they preserved this man''s bones and also those of the
    prophet. ''Along with'' makes the relationship clear in English.'
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נביא. The definite article is retained.
- source_word: אֲשֶׁר בָּא מִשֹּׁמְרוֹן
  chosen: who had come from Samaria
  alternatives:
  - who came from Samaria
  lexicon: HALOT
  rationale: The qatal verb refers to the prophet's prior coming relative to the narrative
    moment. English past perfect clarifies that prior action. 'Samaria' is the standard
    transliteration of the place name.
