id: 2KI.23.13
reference: 2 Kings 23:13
source:
  edition: WLC
  text: וְֽ/אֶת הַ/בָּמ֞וֹת אֲשֶׁ֣ר עַל פְּנֵ֣י יְרוּשָׁלִַ֗ם אֲשֶׁר֮ מִ/ימִ֣ין לְ/הַר
    הַ/מַּשְׁחִית֒ אֲשֶׁ֣ר בָּ֠נָה שְׁלֹמֹ֨ה מֶֽלֶךְ יִשְׂרָאֵ֜ל לְ/עַשְׁתֹּ֣רֶת שִׁקֻּ֣ץ
    צִידֹנִ֗ים וְ/לִ/כְמוֹשׁ֙ שִׁקֻּ֣ץ מוֹאָ֔ב וּ/לְ/מִלְכֹּ֖ם תּוֹעֲבַ֣ת בְּנֵֽי
    עַמּ֑וֹן טִמֵּ֖א הַ/מֶּֽלֶךְ־׀־־־׀־׃
translation:
  text: And the king defiled the high places that were east of Jerusalem, to the right
    of the Mount of Destruction, which Solomon king of Israel had built for Ashtoreth,
    the abomination of the Sidonians, and for Chemosh, the abomination of Moab, and
    for Milcom, the abomination of the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'south of the Mount of Destruction,' since 'to the right' can reflect
      directional orientation in Hebrew topography.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Mount of Destruction'; possibly the hill later identified with the
      Mount of Olives.
    reason: cross_reference
  - marker: c
    text: Hebrew reads 'Milcom'; some readers may associate this deity with 'Molech.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  lexicon: HALOT
  rationale: בָּמוֹת commonly refers to cultic high places or worship sites. 'High
    places' preserves the established cultic sense without over-specifying architecture.
- source_word: עַל פְּנֵי יְרוּשָׁלִַם
  chosen: east of Jerusalem
  alternatives:
  - before Jerusalem
  - in front of Jerusalem
  lexicon: HALOT
  rationale: The idiom 'upon the face of' with a place name can denote position in
    front of or opposite; in this topographical context, with the following directional
    phrase, 'east of Jerusalem' gives the plain geographical sense in natural English.
- source_word: מִימִין לְהַר הַמַּשְׁחִית
  chosen: to the right of the Mount of Destruction
  alternatives:
  - south of the Mount of Destruction
  - on the south side of the Mount of Destruction
  lexicon: HALOT
  rationale: מִימִין literally means 'from the right hand/right side.' Retaining 'to
    the right of' is more formally transparent to the Hebrew. Because orientation
    language can imply 'south' when facing east, that alternative is preserved in
    a footnote rather than adopted in the main text.
- source_word: הַר הַמַּשְׁחִית
  chosen: the Mount of Destruction
  alternatives:
  - the Mount of Corruption
  - the Mount of Olives
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'mountain of destruction/corruption.'
    It should be translated rather than harmonized to the better-known geographical
    name 'Mount of Olives.' 'Destruction' is clear modern English and fits the polemical
    context.
- source_word: לְעַשְׁתֹּרֶת
  chosen: for Ashtoreth
  alternatives:
  - for Astarte
  lexicon: HALOT
  rationale: This is a proper divine name, so transliteration is preferred per translation
    philosophy. 'Ashtoreth' follows common English biblical convention for this Hebrew
    form.
- source_word: שִׁקֻּץ צִידֹנִים
  chosen: the abomination of the Sidonians
  alternatives:
  - the detestable thing of the Sidonians
  lexicon: HALOT
  rationale: שִׁקּוּץ is a strong cultic pejorative for an idol or detestable object.
    'Abomination' preserves the severity and established biblical register while remaining
    understandable.
- source_word: לִכְמוֹשׁ
  chosen: for Chemosh
  lexicon: HALOT
  rationale: Proper divine name; transliterated in standard English form.
- source_word: שִׁקֻּץ מוֹאָב
  chosen: the abomination of Moab
  alternatives:
  - the detestable thing of Moab
  lexicon: HALOT
  rationale: Same lexeme as above; consistency favors 'abomination.' The genitive
    is rendered naturally as association with Moab's god.
- source_word: לְמִלְכֹּם
  chosen: for Milcom
  alternatives:
  - for Molech
  lexicon: HALOT
  rationale: The consonantal text here reads Milcom, the Ammonite deity. It should
    not be conflated in the main text with Molech; the alternative is worth preserving
    in a footnote because of historical and translational overlap.
- source_word: תּוֹעֲבַת בְּנֵי עַמּוֹן
  chosen: the abomination of the Ammonites
  alternatives:
  - the detestable thing of the sons of Ammon
  lexicon: HALOT
  rationale: תּוֹעֵבָה is another strong term of cultic abhorrence. 'Ammonites' is
    the natural English equivalent of 'sons of Ammon' in this ethnic reference.
- source_word: טִמֵּא
  chosen: defiled
  alternatives:
  - made unclean
  - rendered unclean
  lexicon: HALOT
  rationale: The piel of טמא here refers to Josiah's desecration of illicit cult sites
    so they could no longer function as worship places. 'Defiled' is the standard
    concise rendering in this cultic context.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: The subject is left as 'the king' in Hebrew; context identifies him as
    Josiah from the surrounding narrative, but the verse itself uses the title, so
    the translation preserves that.
