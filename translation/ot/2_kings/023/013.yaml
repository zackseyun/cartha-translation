theological_decisions:
- issue: Rendering polemical labels for foreign deities
  chosen_reading: Use 'abomination' in the main text for שִׁקּוּץ / תּוֹעֵבָה
  alternative_readings:
  - detestable thing
  rationale: The Hebrew intentionally uses theologically charged, condemnatory language
    for these idols. The translation should preserve that polemical force without
    softening it into a neutral term like 'god' or 'image.'
  doctrine_reference: 'Translation philosophy #1 and #5'
- issue: Topographical identification of הַר הַמַּשְׁחִית
  chosen_reading: Translate as 'the Mount of Destruction' rather than substitute 'Mount
    of Olives'
  alternative_readings:
  - Mount of Corruption
  - Mount of Olives
  rationale: The source text uses a pejorative designation, likely alluding to the
    site associated with idolatry. Translating the phrase preserves the Hebrew wording
    and theological tone better than replacing it with a harmonized place name.
  doctrine_reference: 'Translation philosophy #1'
