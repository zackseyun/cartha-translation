id: 2KI.23.14
reference: 2 Kings 23:14
source:
  edition: WLC
  text: וְ/שִׁבַּר֙ אֶת הַ/מַּצֵּב֔וֹת וַ/יִּכְרֹ֖ת אֶת הָ/אֲשֵׁרִ֑ים וַ/יְמַלֵּ֥א
    אֶת מְקוֹמָ֖/ם עַצְמ֥וֹת אָדָֽם־־־׃
translation:
  text: He shattered the pillars, cut down the Asherim, and filled their places with
    human bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah poles.' The Hebrew אֲשֵׁרִים can refer to cult objects associated
      with Asherah; the exact form is not specified by the term alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבַּר
  chosen: shattered
  alternatives:
  - broke
  - smashed
  lexicon: HALOT
  rationale: The verb denotes breaking in pieces. 'Shattered' conveys forceful destruction
    more vividly than the flatter 'broke' while remaining natural English.
- source_word: הַמַּצֵּבוֹת
  chosen: the pillars
  alternatives:
  - the sacred pillars
  - the standing stones
  lexicon: HALOT
  rationale: מַצֵּבָה refers to cultic standing stones/pillars. 'Pillars' is concise
    and idiomatic in context; 'sacred pillars' is interpretive, while 'standing stones'
    is more archaeological but less familiar.
- source_word: וַיִּכְרֹת
  chosen: cut down
  alternatives:
  - cut off
  - felled
  lexicon: HALOT
  rationale: With wooden cult objects, כרת is naturally rendered 'cut down.' This
    fits the likely physical action toward the Asherim.
- source_word: הָאֲשֵׁרִים
  chosen: the Asherim
  alternatives:
  - the Asherah poles
  - the Asherahs
  lexicon: HALOT
  rationale: The Hebrew plural can denote cult objects associated with Asherah. 'Asherim'
    preserves the specific term without over-deciding whether these were poles, trees,
    or other cult symbols; a lexical alternative is preserved in a footnote.
- source_word: וַיְמַלֵּא
  chosen: filled
  alternatives:
  - covered
  - made full
  lexicon: HALOT
  rationale: The verb's basic sense is 'fill.' Here it describes filling the sites
    with bones, likely as an act of defilement.
- source_word: מְקוֹמָם
  chosen: their places
  alternatives:
  - their sites
  - the places where they stood
  lexicon: HALOT
  rationale: The suffix refers back to the destroyed cult objects. 'Their places'
    is a natural rendering that preserves the possessive relation without overexpanding
    the text.
- source_word: עַצְמוֹת אָדָם
  chosen: human bones
  alternatives:
  - bones of man
  - human remains
  lexicon: HALOT
  rationale: אָדָם here is generic rather than male-specific, so 'human' best reflects
    the sense. 'Human bones' is idiomatic modern English and aligns with the project's
    gender-accurate principle.
