theological_decisions:
- issue: Rendering of אָדָם
  chosen_reading: human in the phrase 'human bones'
  alternative_readings:
  - man in the phrase 'bones of man'
  rationale: The noun here denotes a human being generically, not specifically an
    adult male. The translation therefore uses 'human' to reflect the contextual sense
    while honoring the doctrine guideline that אָדָם may be rendered 'man' or 'humankind'
    depending on context.
