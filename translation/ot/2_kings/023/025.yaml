id: 2KI.23.25
reference: 2 Kings 23:25
source:
  edition: WLC
  text: וְ/כָמֹ/הוּ֩ לֹֽא הָיָ֨ה לְ/פָנָ֜י/ו מֶ֗לֶךְ אֲשֶׁר שָׁ֤ב אֶל יְהוָה֙ בְּ/כָל לְבָב֤/וֹ וּ/בְ/כָל נַפְשׁ/וֹ֙ וּ/בְ/כָל מְאֹד֔/וֹ כְּ/כֹ֖ל תּוֹרַ֣ת מֹשֶׁ֑ה וְ/אַחֲרָ֖י/ו לֹֽא קָ֥ם כָּמֹֽ/הוּ־־־־־־־׃
translation:
  text: And before him there was no king like him, who turned to Yahweh with all his heart and with all his soul and with all his might, according to all the law of Moses; nor did any like him arise after him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned to the LORD.' The Hebrew verb can carry the sense of turning back in covenant loyalty and repentance.
    reason: lexical_alternative
  - marker: b
    text: '''With all his heart and with all his soul and with all his might'' echoes Deuteronomy 6:5.'
    reason: cross_reference
  - marker: c
    text: Or 'strength' for 'might.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָמֹהוּ
  chosen: And before him there was no king like him
  alternatives:
  - And there was no king like him before him
  lexicon: HALOT
  rationale: The verse opens with a fronted comparison ('and like him not was before him a king'). In idiomatic English, the sense is best carried by restructuring as 'And before him there was no king like him' while preserving the emphatic uniqueness.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - prior to him
  lexicon: HALOT
  rationale: 'Temporal sense is intended: no previous king matched Josiah.'
- source_word: שָׁב אֶל יְהוָה
  chosen: turned to the LORD
  alternatives:
  - returned to the LORD
  - repented before the LORD
  lexicon: HALOT
  rationale: שׁוּב with אֶל commonly denotes turning/returning to God in covenantal repentance and devotion. 'Turned to the LORD' is natural English and preserves the relational-covenantal sense without over-specifying repentance language.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכָל לְבָבוֹ
  chosen: with all his heart
  lexicon: HALOT
  rationale: Standard anthropological idiom for the inner will and affections; retained in familiar biblical English.
- source_word: וּבְכָל נַפְשׁוֹ
  chosen: and with all his soul
  alternatives:
  - and with all his life
  - and with all his self
  lexicon: HALOT
  rationale: נֶפֶשׁ here participates in the Deuteronomic formula. 'Soul' preserves the traditional triad and the text's covenantal resonance.
- source_word: וּבְכָל מְאֹדוֹ
  chosen: and with all his might
  alternatives:
  - and with all his strength
  lexicon: HALOT
  rationale: מְאֹד literally means 'muchness/very,' but in this formula denotes total capacity or force. 'Might' closely reflects the established Deuteronomic wording echoed here.
- source_word: כְּכֹל תּוֹרַת מֹשֶׁה
  chosen: according to all the law of Moses
  alternatives:
  - according to the whole law of Moses
  - in accordance with all the instruction of Moses
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction, but in this royal-evaluative context it refers to the Mosaic legal corpus. 'According to all the law of Moses' is clear and suitably formal.
- source_word: וְאַחֲרָיו לֹא קָם כָּמֹהוּ
  chosen: nor did any like him arise after him
  alternatives:
  - and after him none like him arose
  - nor did a king like him arise after him
  lexicon: HALOT
  rationale: קָם ('arose') in this context means that no subsequent comparable king appeared. Adding 'any' makes the English idiomatic while preserving the absolute comparison.
