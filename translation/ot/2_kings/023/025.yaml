theological_decisions:
- issue: Echo of Deuteronomy 6:5 in the description of Josiah's devotion
  chosen_reading: Retain the triad 'heart... soul... might' in the main text
  alternative_readings:
  - heart... soul... strength
  rationale: The wording intentionally echoes the Shema/Deuteronomic covenant ideal. Preserving the triad in recognizable form helps readers hear the intertextual connection without paraphrase.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
