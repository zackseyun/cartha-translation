id: 2KI.23.8
reference: 2 Kings 23:8
source:
  edition: WLC
  text: וַ/יָּבֵ֤א אֶת כָּל הַ/כֹּֽהֲנִים֙ מֵ/עָרֵ֣י יְהוּדָ֔ה וַ/יְטַמֵּ֣א אֶת הַ/בָּמ֗וֹת
    אֲשֶׁ֤ר קִטְּרוּ שָׁ֨מָּ/ה֙ הַ/כֹּ֣הֲנִ֔ים מִ/גֶּ֖בַע עַד בְּאֵ֣ר שָׁ֑בַע וְ/נָתַ֞ץ
    אֶת בָּמ֣וֹת הַ/שְּׁעָרִ֗ים אֲשֶׁר פֶּ֜תַח שַׁ֤עַר יְהוֹשֻׁ֨עַ֙ שַׂר הָ/עִ֔יר
    אֲשֶֽׁר עַל שְׂמֹ֥אול אִ֖ישׁ בְּ/שַׁ֥עַר הָ/עִֽיר־־־־־־־־־־׃
translation:
  text: He brought all the priests from the cities of Judah and defiled the high places
    where the priests had burned incense, from Geba to Beer-sheba. He also tore down
    the high places of the gates that were at the entrance of the gate of Joshua the
    governor of the city, which were on a man's left at the city gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'the shrines at the gates.' The Hebrew reads literally
      'the high places of the gates.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'which were on a man's left at the city gate' is difficult.
      It likely refers to the left side as one entered the gate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: He brought
  alternatives:
  - He brought in
  - He gathered
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to come.' 'He brought'
    is the most direct rendering and fits Josiah's action of summoning the priests
    from Judah's towns to Jerusalem or into his presence.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priestly personnel
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים. No contextual reason to narrow or expand
    beyond 'priests.'
- source_word: מֵעָרֵי יְהוּדָה
  chosen: from the cities of Judah
  alternatives:
  - from the towns of Judah
  lexicon: HALOT
  rationale: עָרִים can be rendered 'cities' or 'towns.' 'Cities' is conventional
    and sufficiently broad; the phrase denotes the various Judean localities from
    which the priests were brought.
- source_word: וַיְטַמֵּא
  chosen: defiled
  alternatives:
  - made unclean
  - rendered impure
  lexicon: HALOT
  rationale: טמא in the Piel means to make unclean/defile. 'Defiled' is concise and
    idiomatic in English, especially for cultic desecration of illicit worship sites.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines on the heights
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for local elevated cult sites. 'High places'
    preserves the established sense without over-paraphrasing.
- source_word: קִטְּרוּ שָׁמָּה
  chosen: had burned incense there
  alternatives:
  - burned incense there
  - made offerings of incense there
  lexicon: HALOT
  rationale: קטר in this stem refers to burning incense or making smoke offerings.
    The pluperfect-like 'had burned' fits the narrative retrospectively, though simple
    past would also be possible. 'There' renders שָׁמָּה explicitly.
- source_word: מִגֶּבַע עַד בְּאֵר שָׁבַע
  chosen: from Geba to Beer-sheba
  alternatives:
  - from Geba as far as Beer-sheba
  lexicon: HALOT
  rationale: This is a geographic merism indicating the full north-south extent of
    Judah. Standard transliteration is retained for place names.
- source_word: וְנָתַץ
  chosen: He also tore down
  alternatives:
  - and he broke down
  - and he demolished
  lexicon: HALOT
  rationale: נתץ means to pull down or demolish. 'Tore down' is vivid, natural English
    and suits the destruction of cultic structures. 'Also' makes the additive force
    of waw clear in English style.
- source_word: בָּמוֹת הַשְּׁעָרִים
  chosen: the high places of the gates
  alternatives:
  - the gate high places
  - the shrines at the gates
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed. A more interpretive rendering like
    'shrines at the gates' is possible, but 'the high places of the gates' stays closer
    to the source while remaining intelligible.
- source_word: פֶּתַח שַׁעַר יְהוֹשֻׁעַ
  chosen: the entrance of the gate of Joshua
  alternatives:
  - the entrance to the gate of Joshua
  lexicon: HALOT
  rationale: פֶּתַח is 'opening/entrance,' and the construct chain is preserved straightforwardly.
    The repetition of 'gate' reflects the Hebrew rather than smoothing it away.
- source_word: שַׂר הָעִיר
  chosen: the governor of the city
  alternatives:
  - the official of the city
  - the prince of the city
  lexicon: HALOT
  rationale: שַׂר can mean prince, chief, official, or commander. In this civic context,
    'governor' best conveys an administrative city official without implying royalty.
- source_word: אֲשֶׁר עַל שְׂמֹאול אִישׁ
  chosen: which were on a man's left
  alternatives:
  - which were on the left of a man
  - which were on the left side for one entering
  lexicon: HALOT
  rationale: The phrase is difficult and elliptical. Literally it is 'which [was/were]
    on the left of a man.' The chosen rendering preserves the Hebrew image without
    importing too much interpretation. It likely means on the left-hand side as one
    approached or entered the gate.
- source_word: בְּשַׁעַר הָעִיר
  chosen: at the city gate
  alternatives:
  - in the city gate
  lexicon: HALOT
  rationale: ב can be rendered flexibly here. 'At the city gate' is natural English
    for location and fits the architectural setting.
