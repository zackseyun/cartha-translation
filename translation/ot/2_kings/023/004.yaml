theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referent of אֲשֵׁרָה
  chosen_reading: Asherah
  alternative_readings:
  - Asherah pole
  - wooden image/pole associated with Asherah
  rationale: The Hebrew term can denote either the goddess or her cult symbol. In this verse the syntax 'made for Baal, for Asherah, and for all the host of heaven' favors preserving the recipient-oriented wording without collapsing the ambiguity into a specific cult object. The alternative is preserved in a footnote.
