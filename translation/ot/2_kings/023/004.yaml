id: 2KI.23.4
reference: 2 Kings 23:4
source:
  edition: WLC
  text: וַ/יְצַ֣ו הַ/מֶּ֡לֶךְ אֶת חִלְקִיָּהוּ֩ הַ/כֹּהֵ֨ן הַ/גָּד֜וֹל וְ/אֶת כֹּהֲנֵ֣י הַ/מִּשְׁנֶה֮ וְ/אֶת שֹׁמְרֵ֣י הַ/סַּף֒ לְ/הוֹצִיא֙ מֵ/הֵיכַ֣ל יְהוָ֔ה אֵ֣ת כָּל הַ/כֵּלִ֗ים הָֽ/עֲשׂוּיִם֙ לַ/בַּ֣עַל וְ/לָֽ/אֲשֵׁרָ֔ה וּ/לְ/כֹ֖ל צְבָ֣א הַ/שָּׁמָ֑יִם וַֽ/יִּשְׂרְפֵ֞/ם מִ/ח֤וּץ לִ/ירוּשָׁלִַ֨ם֙ בְּ/שַׁדְמ֣וֹת קִדְר֔וֹן וְ/נָשָׂ֥א אֶת עֲפָרָ֖/ם בֵּֽית אֵֽל־־־־־־׃
translation:
  text: Then the king commanded Hilkiah the high priest, the priests of the second order, and the keepers of the threshold to bring out from the temple of Yahweh all the vessels made for Baal, for Asherah, and for all the host of heaven. He burned them outside Jerusalem in the fields of the Kidron, and carried their dust to Bethel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Asherah pole'; the Hebrew אֲשֵׁרָה can refer either to the goddess Asherah or to a cult object associated with her.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  lexicon: HALOT
  rationale: The verb צוה in the waw-consecutive narrative form is well rendered by 'commanded,' preserving the authoritative force of the king's action without unnecessary expansion.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun; no reason to substitute the proper name since the Hebrew uses the title.
- source_word: חִלְקִיָּהוּ
  chosen: Hilkiah
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: This is the established and contextually accurate rendering for the chief priestly office; 'great priest' would be overly literal and less idiomatic in English.
- source_word: כֹּהֲנֵי הַמִּשְׁנֶה
  chosen: the priests of the second order
  alternatives:
  - the second-ranking priests
  - the deputy priests
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes a secondary rank or second level. 'Priests of the second order' preserves the formal structure and leaves the exact institutional nuance transparent. Alternatives are possible but more interpretive.
- source_word: שֹׁמְרֵי הַסַּף
  chosen: the keepers of the threshold
  alternatives:
  - the doorkeepers
  - the keepers of the door
  lexicon: HALOT
  rationale: Literally 'keepers of the threshold.' This preserves the temple-setting imagery and official role more closely than the smoother but slightly interpretive 'doorkeepers.'
- source_word: לְהוֹצִיא
  chosen: to bring out
  alternatives:
  - to remove
  - to take out
  lexicon: HALOT
  rationale: '''Bring out'' is a natural rendering of הוציא and fits the command to remove cultic objects from the temple.'
- source_word: מֵהֵיכַל יְהוָה
  chosen: from the temple of the LORD
  alternatives:
  - from the palace/temple of the LORD
  lexicon: HALOT
  rationale: הֵיכָל can denote palace or temple, but in this context with cultic vessels and priests it clearly refers to the temple. YHWH is rendered 'the LORD' per doctrine.
- source_word: כָּל הַכֵּלִים
  chosen: all the vessels
  alternatives:
  - all the articles
  - all the implements
  lexicon: HALOT
  rationale: '''Vessels'' is a standard and sufficiently broad rendering for cultic objects; it preserves the formal tone of the passage.'
- source_word: הָעֲשׂוּיִם
  chosen: made
  alternatives:
  - that had been made
  - fashioned
  lexicon: HALOT
  rationale: The passive participle describes the vessels as having been made for idolatrous use. 'Made' is concise and natural in English.
- source_word: לַבַּעַל
  chosen: for Baal
  alternatives:
  - for the Baal
  lexicon: HALOT
  rationale: Baal is treated as a proper divine name in English. Retaining the article would sound unnatural and is not required to convey the sense.
- source_word: לָאֲשֵׁרָה
  chosen: for Asherah
  alternatives:
  - for the Asherah pole
  - for Asherah-image
  lexicon: HALOT
  rationale: The Hebrew form can refer either to the goddess Asherah or to a cultic object associated with her. Here, because it appears in a list alongside Baal and the host of heaven as recipients of cultic vessels, the proper-name rendering 'Asherah' best preserves the ambiguity without over-interpreting toward 'pole.'
- source_word: וּלְכֹל צְבָא הַשָּׁמָיִם
  chosen: and for all the host of heaven
  alternatives:
  - and for all the army of heaven
  - and for all the heavenly host
  lexicon: HALOT
  rationale: This is a conventional rendering of the idiom for celestial bodies or heavenly powers worshiped idolatrously. 'Host of heaven' is both accurate and readable.
- source_word: וַיִּשְׂרְפֵם
  chosen: He burned them
  alternatives:
  - and he burned them
  lexicon: HALOT
  rationale: The singular verb with plural suffix refers back to the king as subject in the narrative sequence. English can begin a new sentence naturally here while preserving the action.
- source_word: מִחוּץ לִירוּשָׁלַם
  chosen: outside Jerusalem
  alternatives:
  - outside of Jerusalem
  lexicon: HALOT
  rationale: Concise and idiomatic rendering of the prepositional phrase.
- source_word: בְּשַׁדְמוֹת קִדְרוֹן
  chosen: in the fields of the Kidron
  alternatives:
  - in the terraces of Kidron
  - in the open country of Kidron
  lexicon: HALOT
  rationale: שַׁדְמוֹת commonly refers to fields or cultivated tracts. 'Fields of the Kidron' is the most transparent rendering, with Kidron understood as the valley/wadi area.
- source_word: וְנָשָׂא
  chosen: and carried
  alternatives:
  - and took
  - and bore
  lexicon: HALOT
  rationale: נשא here means to carry away/transport. 'Carried' fits the movement of the ashes to another location.
- source_word: עֲפָרָם
  chosen: their ashes
  alternatives:
  - their dust
  - their debris
  lexicon: HALOT
  rationale: Though עפר often means 'dust,' in the context of burned cultic objects the resulting substance is best rendered 'ashes' in idiomatic English, conveying the aftermath of burning more clearly.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  rationale: Standard English transliteration of the place name.
