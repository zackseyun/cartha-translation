id: 2KI.23.35
reference: 2 Kings 23:35
source:
  edition: WLC
  text: וְ/הַ/כֶּ֣סֶף וְ/הַ/זָּהָ֗ב נָתַ֤ן יְהוֹיָקִים֙ לְ/פַרְעֹ֔ה אַ֚ךְ הֶעֱרִ֣יךְ
    אֶת הָ/אָ֔רֶץ לָ/תֵ֥ת אֶת הַ/כֶּ֖סֶף עַל פִּ֣י פַרְעֹ֑ה אִ֣ישׁ כְּ/עֶרְכּ֗/וֹ
    נָגַ֞שׂ אֶת הַ/כֶּ֤סֶף וְ/אֶת הַ/זָּהָב֙ אֶת עַ֣ם הָ/אָ֔רֶץ לָ/תֵ֖ת לְ/פַרְעֹ֥ה
    נְכֹֽה־־־־־־׃ס
translation:
  text: And Jehoiakim gave the silver and the gold to Pharaoh, but he taxed the land
    to give the silver according to Pharaoh’s command. He exacted the silver and the
    gold from the people of the land, each according to his valuation, to give it
    to Pharaoh Neco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assessed the land' or 'levied the land.' The Hebrew verb can denote
      imposing an assessment for payment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'according to the mouth of Pharaoh,' that is, according to Pharaoh’s
      command.
    reason: lexical_alternative
  - marker: c
    text: Or 'each according to his assessment' or, more interpretively, 'each according
      to his means.'
    reason: lexical_alternative
  - marker: d
    text: '''Neco'' is also commonly spelled ''Necho'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶעֱרִיךְ
  chosen: taxed
  alternatives:
  - assessed
  - valued
  - levied
  lexicon: HALOT
  rationale: In this Hiphil context with 'the land' as object and followed by payment
    language, the verb denotes imposing an assessment/levy on the land rather than
    merely estimating value. 'Taxed' gives the fiscal sense in natural English.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: Retains the Hebrew term literally while fitting the political-territorial
    sense here. 'The land' also matches the repeated phrase 'people of the land' in
    the same verse.
- source_word: עַל־פִּי פַרְעֹה
  chosen: according to Pharaoh’s command
  alternatives:
  - at Pharaoh's mouth
  - by Pharaoh's order
  - according to Pharaoh
  lexicon: HALOT
  rationale: The idiom על פי means 'according to the command/word of.' Rendering the
    idiom explicitly avoids wooden English while preserving the sense of royal demand.
- source_word: אִישׁ כְּעֶרְכּוֹ
  chosen: each according to his valuation
  alternatives:
  - each according to his assessment
  - each according to his means
  - each according to his rate
  lexicon: HALOT
  rationale: The phrase indicates individualized assessment. 'Valuation' stays close
    to the cognate noun while showing that the exaction was proportioned person by
    person. 'His means' is interpretive and less textually explicit.
- source_word: נָגַשׂ
  chosen: exacted
  alternatives:
  - collected
  - demanded
  - pressed
  lexicon: HALOT
  rationale: The verb often carries the sense of pressing or exacting payment. 'Exacted'
    preserves the coercive nuance better than the more neutral 'collected.'
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the country
  lexicon: HALOT
  rationale: This expression can function as a social-political designation, but here
    a literal rendering is clear and preserves the Hebrew wording without over-interpreting
    social class implications.
- source_word: פַרְעֹה נְכֹה
  chosen: Pharaoh Neco
  alternatives:
  - Pharaoh Necho
  lexicon: standard transliteration
  rationale: Personal names are transliterated. 'Neco' reflects a standard modern
    English form; the alternative spelling 'Necho' is preserved in a footnote because
    it is familiar in many English Bibles.
- source_word: וְהַכֶּסֶף וְהַזָּהָב
  chosen: the silver and the gold
  alternatives:
  - the money and the gold
  lexicon: HALOT
  rationale: The Hebrew names the precious metals directly. 'Silver' may function
    as money, but retaining 'silver' preserves the concrete wording and parallelism
    with 'gold.'
- source_word: נָתַן
  chosen: gave
  alternatives:
  - paid
  lexicon: HALOT
  rationale: The basic verb is 'gave.' Although the context is tribute payment, 'gave'
    is the more textually direct rendering.
