id: 2KI.23.21
reference: 2 Kings 23:21
source:
  edition: WLC
  text: וַ/יְצַ֤ו הַ/מֶּ֨לֶךְ֙ אֶת כָּל הָ/עָ֣ם לֵ/אמֹ֔ר עֲשׂ֣וּ פֶ֔סַח לַֽ/יהוָ֖ה אֱלֹֽהֵי/כֶ֑ם כַּ/כָּת֕וּב עַ֛ל סֵ֥פֶר הַ/בְּרִ֖ית הַ/זֶּֽה־־׃
translation:
  text: Then the king commanded all the people, saying, “Keep the Passover to Yahweh your God, as it is written in this Book of the Covenant.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Celebrate/Observe the Passover.” The Hebrew idiom is literally “do/make Passover.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - gave command
  lexicon: HALOT
  rationale: The verb צוה denotes giving a command. 'Commanded' is the most direct and natural English rendering in narrative context.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to Josiah in context; standard rendering is appropriate.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the nation
  lexicon: HALOT
  rationale: עם here refers to the populace collectively. 'All the people' is the plain sense and fits the immediate command addressed broadly.
- source_word: עֲשׂוּ פֶסַח
  chosen: Keep the Passover
  alternatives:
  - Celebrate the Passover
  - Observe the Passover
  lexicon: HALOT
  rationale: Literally 'do/make Passover,' an idiom for observing the festival. 'Keep the Passover' is idiomatic English and preserves the covenantal/festal sense without woodenly rendering 'do'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל marks direction/dedication. 'To the LORD' is natural here and aligns with the project's default rendering of YHWH as 'the LORD'.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second person plural suffix; retained explicitly because it is present in the Hebrew and reinforces covenant address.
- source_word: כַּכָּתוּב
  chosen: as it is written
  alternatives:
  - according to what is written
  lexicon: HALOT
  rationale: Standard formula introducing conformity to written instruction. The passive English idiom matches the Hebrew participial form in context.
- source_word: עַל סֵפֶר הַבְּרִית הַזֶּה
  chosen: in this Book of the Covenant
  alternatives:
  - in the book of this covenant
  - upon this Book of the Covenant
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' with כתב formulas English normally uses 'in' for what is written in a document. 'This Book of the Covenant' preserves the demonstrative and likely refers to the covenant document discovered/read in Josiah's reform context.
