id: 2KI.23.1
reference: 2 Kings 23:1
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֖ח הַ/מֶּ֑לֶךְ וַ/יַּאַסְפ֣וּ אֵלָ֔י/ו כָּל זִקְנֵ֥י יְהוּדָ֖ה
    וִ/ירוּשָׁלִָֽם־׃
translation:
  text: Then the king sent, and all the elders of Judah and Jerusalem were gathered
    to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'Then the king sent for all the elders of Judah and
      Jerusalem, and they gathered to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - sent for
  lexicon: HALOT
  rationale: The verb שׁלח in this narrative construction commonly means 'sent' in
    the sense of dispatching messengers or issuing a summons. English 'sent' is concise
    and natural; 'sent for' is interpretive and possible from context, but the Hebrew
    does not explicitly include the object.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun with article; straightforwardly rendered 'the king.' The
    context identifies him as Josiah, but the verse itself uses the title, so the
    translation preserves that.
- source_word: וַיַּאַסְפוּ אֵלָיו
  chosen: were gathered to him
  alternatives:
  - assembled to him
  - gathered to him
  - assembled before him
  lexicon: HALOT
  rationale: 'Although the form is active plural (''they gathered''), the subject
    is indefinite/implicit, and English idiom is better served by a passive rendering:
    ''were gathered to him.'' This preserves the event sense without awkwardly supplying
    an unspecified agent. ''Before him'' is possible contextually, but אֶל more directly
    indicates movement ''to'' him.'
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Standard rendering of the quantifier, emphasizing the comprehensiveness
    of the assembly.
- source_word: זִקְנֵי
  chosen: the elders
  alternatives:
  - the leaders
  - the old men
  lexicon: HALOT
  rationale: In this governmental context, זקנים refers to recognized civic leaders
    or elders, not merely elderly males. 'The elders' is the established and contextually
    accurate rendering.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the kingdom/tribal territory; transliterated according
    to standard convention.
- source_word: וִירוּשָׁלִָם
  chosen: and Jerusalem
  lexicon: HALOT
  rationale: Proper place name joined to Judah, indicating the elders from both the
    broader territory and the capital city. Standard transliteration is appropriate.
