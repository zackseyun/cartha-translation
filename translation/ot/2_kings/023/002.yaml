id: 2KI.23.2
reference: 2 Kings 23:2
source:
  edition: WLC
  text: וַ/יַּ֣עַל הַ/מֶּ֣לֶךְ בֵּית יְהוָ֡ה וְ/כָל אִ֣ישׁ יְהוּדָה֩ וְ/כָל יֹשְׁבֵ֨י יְרוּשָׁלִַ֜ם אִתּ֗/וֹ וְ/הַ/כֹּֽהֲנִים֙ וְ/הַ/נְּבִיאִ֔ים וְ/כָל הָ/עָ֖ם לְ/מִ/קָּטֹ֣ן וְ/עַד גָּד֑וֹל וַ/יִּקְרָ֣א בְ/אָזְנֵי/הֶ֗ם אֶת כָּל דִּבְרֵי֙ סֵ֣פֶר הַ/בְּרִ֔ית הַ/נִּמְצָ֖א בְּ/בֵ֥ית יְהוָֽה־־־־־־־׃
translation:
  text: Then the king went up to the house of Yahweh, and with him all the men of Judah and all the inhabitants of Jerusalem, and the priests and the prophets, all the people from small to great; and he read in their hearing all the words of the Book of the Covenant that had been found in the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all the men of Judah.'' The expression may function representatively for the populace, but the masculine wording is retained in translation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the temple of the LORD.' Literally, 'the house of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the least to the greatest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - went
  - ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' preserves the directional nuance toward the temple without sounding overly wooden.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining natural English. 'Temple' is possible but less formally aligned to the source wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: כָל אִישׁ יְהוּדָה
  chosen: all the men of Judah
  alternatives:
  - every man of Judah
  - all the people of Judah
  lexicon: HALOT
  rationale: אִישׁ is singular in form but collective here. 'Men of Judah' keeps the gendered and representative force better than the more neutral 'people of Judah,' in line with the gender-accurate policy.
- source_word: כָל יֹשְׁבֵי יְרוּשָׁלַם
  chosen: all the inhabitants of Jerusalem
  alternatives:
  - all who lived in Jerusalem
  - all the residents of Jerusalem
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a participial form meaning those dwelling in a place. 'Inhabitants' is a standard and accurate rendering.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - together with him
  lexicon: HALOT
  rationale: Simple accompaniment marker; 'with him' is direct and idiomatic.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in this cultic context.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering of נְבִיאִים.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - the whole people
  lexicon: HALOT
  rationale: Natural rendering of the collective noun with כָל.
- source_word: לְמִקָּטֹן וְעַד גָּדוֹל
  chosen: from small to great
  alternatives:
  - from the least to the greatest
  - from young to old
  lexicon: HALOT
  rationale: This idiom denotes the full social range of the people. 'From small to great' stays close to the Hebrew while remaining intelligible. 'From the least to the greatest' is interpretive; 'from young to old' is too narrow.
- source_word: וַיִּקְרָא
  chosen: he read
  alternatives:
  - he proclaimed
  - he called out
  lexicon: HALOT
  rationale: In context, the object is the contents of a written book, so 'read' is the most precise English rendering.
- source_word: בְאָזְנֵיהֶם
  chosen: in their hearing
  alternatives:
  - in their ears
  - to them
  lexicon: HALOT
  rationale: Hebrew idiom literally 'in their ears'; 'in their hearing' is the natural equivalent that preserves the public-auditory sense.
- source_word: כָל דִּבְרֵי
  chosen: all the words of
  alternatives:
  - all the matters of
  - everything in
  lexicon: HALOT
  rationale: דִּבְרֵי can mean 'words' or 'matters'; with a written book being read aloud, 'words' is the more direct fit.
- source_word: סֵפֶר הַבְּרִית
  chosen: the Book of the Covenant
  alternatives:
  - the covenant book
  - the book of the covenant
  lexicon: HALOT
  rationale: A formal designation for the discovered scroll. Capitalization reflects its title-like function in context, not a claim about later canonical identification.
- source_word: הַנִּמְצָא
  chosen: that had been found
  alternatives:
  - which was found
  lexicon: HALOT
  rationale: The relative participle points back to the book and refers to the prior discovery narrated in context. English past perfect clarifies the sequence naturally.
