id: 2KI.23.12
reference: 2 Kings 23:12
source:
  edition: WLC
  text: וְ/אֶֽת הַֽ/מִּזְבְּח֡וֹת אֲשֶׁ֣ר עַל הַ/גָּג֩ עֲלִיַּ֨ת אָחָ֜ז אֲשֶׁר עָשׂ֣וּ מַלְכֵ֣י יְהוּדָ֗ה וְ/אֶת הַֽ/מִּזְבְּחוֹת֙ אֲשֶׁר עָשָׂ֣ה מְנַשֶּׁ֔ה בִּ/שְׁתֵּ֛י חַצְר֥וֹת בֵּית יְהוָ֖ה נָתַ֣ץ הַ/מֶּ֑לֶךְ וַ/יָּ֣רָץ מִ/שָּׁ֔ם וְ/הִשְׁלִ֥יךְ אֶת עֲפָרָ֖/ם אֶל נַ֥חַל קִדְרֽוֹן־־־׀־־־־־׃
translation:
  text: As for the altars on the roof of the upper chamber of Ahaz, which the kings of Judah had made, and the altars that Manasseh had made in the two courts of the house of Yahweh, the king tore them down, smashed them there, and threw their dust into the Kidron Valley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upper room of Ahaz.' The Hebrew עֲלִיָּה can refer to an upper chamber or upper room.
    reason: lexical_alternative
  - marker: b
    text: Or 'the brook Kidron.' Hebrew נַחַל can denote a streambed, ravine, or valley.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבְּחוֹת
  chosen: the altars
  alternatives:
  - the altar-sites
  lexicon: HALOT
  rationale: מִזְבֵּחַ straightforwardly denotes an altar. The plural is retained in both occurrences for formal accuracy.
- source_word: עַל הַגָּג עֲלִיַּת אָחָז
  chosen: on the roof of the upper chamber of Ahaz
  alternatives:
  - on the roof of the upper room of Ahaz
  - on the roof of the upper story of Ahaz
  lexicon: HALOT
  rationale: עֲלִיָּה commonly refers to an upper room/chamber. 'Upper chamber' is natural English and preserves the architectural sense without overinterpreting whether it is a room or story.
- source_word: אֲשֶׁר עָשׂוּ מַלְכֵי יְהוּדָה
  chosen: which the kings of Judah had made
  alternatives:
  - which the kings of Judah made
  lexicon: HALOT
  rationale: The relative clause modifies the altars. English past perfect helps show these were constructed prior to Josiah's actions in the narrative.
- source_word: בִּשְׁתֵּי חַצְרוֹת בֵּית יְהוָה
  chosen: in the two courts of the house of the LORD
  alternatives:
  - in the two courtyards of the house of the LORD
  - in the two courts of the temple of the LORD
  lexicon: HALOT
  rationale: חָצֵר means court/courtyard. 'House of the LORD' preserves the Hebrew idiom בֵּית יְהוָה rather than substituting 'temple,' though that is a possible contextual gloss.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נָתַץ
  chosen: tore them down
  alternatives:
  - broke down
  - demolished
  lexicon: HALOT
  rationale: נָתַץ often denotes pulling down or tearing down structures. 'Tore them down' is vivid, idiomatic, and fits altars.
- source_word: וַיָּרָץ מִשָּׁם
  chosen: smashed them there
  alternatives:
  - crushed them there
  - ran from there
  lexicon: HALOT
  rationale: The verb רצץ in this context is commonly understood as crushing/smashing the demolished materials on site. 'Ran from there' would derive from a different root sense and does not fit the sequence with throwing their dust into Kidron.
- source_word: עֲפָרָם
  chosen: their dust
  alternatives:
  - their debris
  - their powder
  lexicon: HALOT
  rationale: עָפָר is dust/loose earth. After smashing the altars, 'their dust' best reflects the image of pulverized remains.
- source_word: נַחַל קִדְרוֹן
  chosen: the Kidron Valley
  alternatives:
  - the brook Kidron
  - the wadi Kidron
  lexicon: HALOT
  rationale: נַחַל can denote a wadi, ravine, or torrent valley. 'Kidron Valley' is the clearest modern English rendering in this context.
- source_word: וְאֶת ... וְאֶת
  chosen: As for ... and ...
  alternatives:
  - And ... and ...
  lexicon: HALOT
  rationale: The fronted direct objects set up the sentence before the main verb. 'As for' helps signal this Hebrew topicalization in readable English.
