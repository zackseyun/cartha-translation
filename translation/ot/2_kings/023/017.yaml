id: 2KI.23.17
reference: 2 Kings 23:17
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר מָ֚ה הַ/צִּיּ֣וּן הַלָּ֔ז אֲשֶׁ֖ר אֲנִ֣י רֹאֶ֑ה וַ/יֹּאמְר֨וּ
    אֵלָ֜י/ו אַנְשֵׁ֣י הָ/עִ֗יר הַ/קֶּ֤בֶר אִישׁ הָֽ/אֱלֹהִים֙ אֲשֶׁר בָּ֣א מִֽ/יהוּדָ֔ה
    וַ/יִּקְרָ֗א אֶת הַ/דְּבָרִ֤ים הָ/אֵ֨לֶּה֙ אֲשֶׁ֣ר עָשִׂ֔יתָ עַ֖ל הַ/מִּזְבַּ֥ח
    בֵּֽית אֵֽל־־־־׃
translation:
  text: Then he said, “What is this monument that I see?” And the men of the city
    said to him, “It is the tomb of the man of God who came from Judah and proclaimed
    these things that you have done against the altar at Bethel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “marker,” “memorial stone,” or “grave marker” for “monument.”
    reason: lexical_alternative
  - marker: b
    text: Or “called out” or “cried out”; the verb refers to the man of God's prophetic
      declaration concerning the altar (cf. 1 Kgs 13:1–2).
    reason: alternative_reading
lexical_decisions:
- source_word: הַצִּיּוּן
  chosen: monument
  alternatives:
  - marker
  - memorial stone
  - grave marker
  lexicon: HALOT
  rationale: The noun denotes a marked sign or memorial marker. In this context Josiah
    is looking at a visible funerary marker associated with a tomb, so 'monument'
    is natural modern English while still broad enough not to over-specify the object.
- source_word: הַלָּז
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: Though often literally 'that/this there,' in idiomatic English with a
    visible nearby object the sense is deictic. 'This monument' fits the immediate
    visual context better than a stiffer 'that monument.'
- source_word: אֲנִי רֹאֶה
  chosen: I see
  alternatives:
  - I am seeing
  - I am looking at
  lexicon: HALOT
  rationale: Simple present best conveys the Hebrew participial construction in this
    direct question.
- source_word: הַקֶּבֶר
  chosen: the tomb
  alternatives:
  - the grave
  - the burial place
  lexicon: HALOT
  rationale: '''Tomb'' fits the context of a marked burial site and sounds more natural
    than ''grave'' when paired with a visible monument.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard Hebrew title and should be translated transparently
    rather than interpreted more narrowly as 'prophet,' though prophetic function
    is implied.
- source_word: מִיהוּדָה
  chosen: from Judah
  alternatives:
  - out of Judah
  lexicon: HALOT
  rationale: Standard geographic rendering.
- source_word: וַיִּקְרָא
  chosen: proclaimed
  alternatives:
  - cried out
  - called out
  - announced
  lexicon: HALOT
  rationale: In the allusion to 1 Kings 13, the verb refers to a public prophetic
    declaration against the altar. 'Proclaimed' communicates that force better than
    the more ambiguous 'called out,' while avoiding paraphrase.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these things
  alternatives:
  - these words
  - these matters
  lexicon: HALOT
  rationale: The phrase can mean either the spoken words or the matters foretold.
    Here it points to the prophetic pronouncement now fulfilled; 'these things' preserves
    that breadth.
- source_word: אֲשֶׁר עָשִׂיתָ
  chosen: that you have done
  alternatives:
  - that you did
  lexicon: HALOT
  rationale: English present perfect naturally links Josiah's recent actions with
    their present significance.
- source_word: עַל הַמִּזְבַּח
  chosen: against the altar
  alternatives:
  - concerning the altar
  - upon the altar
  lexicon: HALOT
  rationale: Given the context of denunciation and destruction, 'against the altar'
    best captures the adversative force intended by the prophecy.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
