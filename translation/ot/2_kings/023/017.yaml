theological_decisions:
- issue: Identification of the prophetic speech recalled here
  chosen_reading: Render וַיִּקְרָא in a way that preserves the man of God's prophetic
    proclamation without importing extra detail from 1 Kings 13.
  alternative_readings:
  - called out
  - cried against
  rationale: The verse alludes to the earlier prophecy against the altar at Bethel.
    'Proclaimed' communicates prophetic declaration clearly while avoiding unnecessary
    expansion beyond the Hebrew wording.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it unnecessarily.'
