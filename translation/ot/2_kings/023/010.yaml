id: 2KI.23.10
reference: 2 Kings 23:10
source:
  edition: WLC
  text: וְ/טִמֵּ֣א אֶת הַ/תֹּ֔פֶת אֲשֶׁ֖ר בְּ/גֵ֣י בני הִנֹּ֑ם לְ/בִלְתִּ֗י לְ/הַעֲבִ֨יר
    אִ֜ישׁ אֶת בְּנ֧/וֹ וְ/אֶת בִּתּ֛/וֹ בָּ/אֵ֖שׁ לַ/מֹּֽלֶךְ־־־־׃
translation:
  text: And he defiled Topheth, which is in the Valley of Ben-hinnom, so that no man
    could make his son or his daughter pass through the fire to Molech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''make his son or his daughter pass through the fire,'' a cultic
      idiom referring to offering children in a rite associated with Molech, likely
      child sacrifice.'
    reason: cultural_note
  - marker: b
    text: Or 'no one.' Hebrew 'man' is singular masculine with generic force here.
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'for Molech'; less likely, some understand the consonants as
      'to the king.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְטִמֵּא
  chosen: And he defiled
  alternatives:
  - And he made unclean
  - And he desecrated
  lexicon: HALOT
  rationale: The Piel of טמא means to make unclean/defile. In this context of Josiah
    rendering a cult site unusable, 'defiled' is both accurate and idiomatic; 'desecrated'
    is possible but slightly more interpretive.
- source_word: הַתֹּפֶת
  chosen: Topheth
  alternatives:
  - the Topheth
  lexicon: HALOT
  rationale: A place name is best transliterated per translation philosophy. English
    convention commonly uses 'Topheth.' The article is not naturally carried over
    in English with a proper place name.
- source_word: בְּגֵי בני הִנֹּם
  chosen: in the Valley of Ben-hinnom
  alternatives:
  - in the valley of the sons of Hinnom
  - in the Valley of Hinnom
  lexicon: HALOT
  rationale: גֵי is 'valley.' בני הִנֹּם is the traditional place name 'Ben-hinnom'
    (lit. 'sons of Hinnom'). Retaining 'Ben-hinnom' preserves the toponym while remaining
    readable. A more literal 'sons of Hinnom' is possible but less idiomatic as an
    English place name.
- source_word: לְבִלְתִּי
  chosen: so that no
  alternatives:
  - in order that not
  - so as not to allow
  lexicon: HALOT
  rationale: This construction introduces purpose/prevention. 'So that no' communicates
    the intended prevention naturally in English.
- source_word: לְהַעֲבִיר
  chosen: could make ... pass through
  alternatives:
  - could cause ... to pass through
  - could offer
  lexicon: HALOT
  rationale: The Hiphil of עבר is causative, 'cause/make pass through.' In this cultic
    context it refers to the child-sacrifice rite. The more explicit 'offer' captures
    the sense but moves beyond the wording; the main text preserves the Hebrew idiom.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - anyone
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the grammatically masculine singular
    generic is rendered 'man.' Here it has representative force ('no man'), not an
    exclusion of women from the broader prohibition.
- source_word: בְּנוֹ וְאֶת־בִּתּוֹ
  chosen: his son or his daughter
  alternatives:
  - his son and his daughter
  lexicon: HALOT
  rationale: English idiom after a negative purpose clause prefers 'or' to express
    either child being subjected to the rite, though the Hebrew conjunction is simply
    'and.' This is a natural optimal-equivalence rendering of distributive sense.
- source_word: בָּאֵשׁ
  chosen: through the fire
  alternatives:
  - in the fire
  - by fire
  lexicon: HALOT
  rationale: With the idiom 'make pass through,' English conventionally says 'through
    the fire.' This preserves the ritual expression better than the more wooden 'in
    the fire.'
- source_word: לַמֹּלֶךְ
  chosen: to Molech
  alternatives:
  - for Molech
  - to the king
  lexicon: HALOT
  rationale: In this context the proper name of the deity is the standard and most
    likely sense. A minority reading understands the consonants as 'to the king,'
    but the cultic context and established usage favor 'Molech.'
