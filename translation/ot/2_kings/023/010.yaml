theological_decisions:
- issue: Rendering the child-sacrifice idiom without either obscuring or over-interpreting
    it
  chosen_reading: Retain the Hebrew idiom 'make ... pass through the fire' in the
    main text
  alternative_readings:
  - sacrifice his son or daughter in the fire to Molech
  - burn his son or daughter as an offering to Molech
  rationale: The phrase clearly refers to a prohibited cultic rite involving children,
    likely child sacrifice, but the Hebrew wording itself is idiomatic rather than
    fully explicit. Preserving the idiom in the main text maintains transparency to
    the source while allowing a clarifying footnote.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Generic masculine אִישׁ
  chosen_reading: no man
  alternative_readings:
  - no one
  - anyone
  rationale: The source uses a grammatically masculine singular with generic force.
    Per the stated philosophy, gender-accurate rendering is preferred over flattening
    to a gender-neutral term, while the representative sense can be clarified in a
    footnote if needed.
  doctrine_reference: Translation philosophy §4
