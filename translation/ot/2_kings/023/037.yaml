id: 2KI.23.37
reference: 2 Kings 23:37
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשׂ֖וּ אֲבֹתָֽי/ו־׃
translation:
  text: And he did what was evil in the sight of the LORD, according to all that his
    fathers had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his ancestors' or 'his forefathers.' The Hebrew literally reads 'his
      fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he did
  alternatives:
  - He did
  - And he acted
  lexicon: HALOT
  rationale: The waw-consecutive with עשה advances the narrative, so 'And he did'
    preserves the sequential force typical in Hebrew narrative.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: The idiom עשה הרע is naturally rendered in English as 'did what was evil'
    rather than the more wooden 'did the evil.' This preserves the established evaluative
    formula without awkwardness.
- source_word: בְּעֵינֵי
  chosen: in the sight of
  alternatives:
  - in the eyes of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for evaluation from someone's perspective.
    'In the sight of' is clear, idiomatic, and slightly more natural in modern English
    than 'in the eyes of' while preserving the metaphor.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as all that
  - like everything that
  lexicon: HALOT
  rationale: This combination expresses conformity or correspondence with prior behavior.
    'According to all that' preserves the comparative force and fits the regnal-evaluation
    formula.
- source_word: עָשׂוּ
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect best conveys the prior action of his fathers relative
    to the king now being evaluated.
- source_word: אֲבֹתָיו
  chosen: his fathers
  alternatives:
  - his ancestors
  - his forefathers
  lexicon: HALOT
  rationale: The Hebrew literally says 'his fathers.' In royal contexts this can mean
    predecessors/ancestors, but 'his fathers' preserves the source wording and remains
    understandable. A lexical alternative is worth preserving in a footnote because
    modern readers may otherwise hear only immediate male parents.
