theological_decisions:
- issue: Pronoun ambiguity in the final clause and in 'he put him to death'
  chosen_reading: Retain the Hebrew ambiguity with repeated 'he/him' rather than specifying
    the subject by interpretation.
  alternative_readings:
  - And Pharaoh Neco killed him at Megiddo when Josiah confronted him
  - And he killed him at Megiddo as soon as he saw him
  rationale: The Hebrew sequence leaves the referents grammatically compressed and
    has generated discussion, especially in light of the parallel account in 2 Chronicles
    35:20–24. To preserve textual transparency and avoid importing harmonization,
    the main text keeps the ambiguity. A footnote records the more explicit interpretive
    option.
  doctrine_reference: Preserve theological tension rather than resolve it.
