id: 2KI.23.29
reference: 2 Kings 23:29
source:
  edition: WLC
  text: בְּ/יָמָ֡י/ו עָלָה֩ פַרְעֹ֨ה נְכֹ֧ה מֶֽלֶךְ מִצְרַ֛יִם עַל מֶ֥לֶךְ אַשּׁ֖וּר
    עַל נְהַר פְּרָ֑ת וַ/יֵּ֨לֶךְ הַ/מֶּ֤לֶךְ יֹאשִׁיָּ֨הוּ֙ לִ/קְרָאת֔/וֹ וַ/יְמִיתֵ֨/הוּ֙
    בִּ/מְגִדּ֔וֹ כִּ/רְאֹת֖/וֹ אֹתֽ/וֹ־־־־׃
translation:
  text: In his days Pharaoh Neco king of Egypt went up against the king of Assyria
    to the Euphrates River. And King Josiah went to meet him, and he put him to death
    at Megiddo when he saw him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Neco; traditionally, Necho.
    reason: lexical_alternative
  - marker: b
    text: Or, more explicitly by interpretation, 'Pharaoh Neco killed him at Megiddo
      when Josiah went to meet him.' The Hebrew uses ambiguous third-person pronouns.
    reason: alternative_reading
  - marker: c
    text: See also 2 Chronicles 35:20–24 for the parallel account of Josiah's death.
    reason: cross_reference
lexical_decisions:
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - During his reign
  - In his time
  lexicon: HALOT
  rationale: A standard temporal idiom referring to the period of Josiah's rule. 'In
    his days' is sufficiently literal and natural in English.
- source_word: עָלָה
  chosen: went up against
  alternatives:
  - marched up against
  - came up against
  lexicon: HALOT
  rationale: עלה commonly means 'go up' and in military contexts can denote advancing
    against an opponent. 'Went up against' preserves the Hebrew idiom without over-paraphrasing.
- source_word: פַרְעֹה נְכֹה
  chosen: Pharaoh Neco
  alternatives:
  - Pharaoh Necho
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention. 'Neco' reflects
    a common modern spelling; the alternative traditional spelling is worth preserving
    in a footnote.
- source_word: עַל מֶלֶךְ אַשּׁוּר
  chosen: against the king of Assyria
  alternatives:
  - to the king of Assyria
  - toward the king of Assyria
  lexicon: HALOT
  rationale: The preposition עַל after עלה in military narrative most naturally yields
    'against.' This is the plain sense of the Hebrew, though the historical situation
    has led some to construe it more loosely.
- source_word: עַל נְהַר פְּרָת
  chosen: to the Euphrates River
  alternatives:
  - by the Euphrates River
  - at the Euphrates River
  lexicon: HALOT
  rationale: The second עַל is locative. 'To the Euphrates River' communicates destination
    in smooth English while preserving the geographic reference.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to confront him
  - to encounter him
  lexicon: HALOT
  rationale: לקראת can mean going to meet someone, whether neutrally or confrontationally.
    'To meet him' preserves the lexical breadth without importing motive beyond the
    text.
- source_word: וַיְמִיתֵהוּ
  chosen: he put him to death
  alternatives:
  - he killed him
  lexicon: HALOT
  rationale: The Hiphil of מות is causative, 'cause to die/put to death.' This more
    closely reflects the verbal form than the simpler 'killed,' while remaining idiomatic.
- source_word: בִּמְגִדּוֹ
  chosen: at Megiddo
  alternatives:
  - in Megiddo
  lexicon: HALOT
  rationale: For a battle-site or location of encounter, English idiom prefers 'at
    Megiddo.'
- source_word: כִּרְאֹתוֹ אֹתוֹ
  chosen: when he saw him
  alternatives:
  - as soon as he saw him
  - when he encountered him
  lexicon: HALOT
  rationale: The phrase is formally ambiguous because both pronouns are third masculine
    singular. The most direct rendering is 'when he saw him,' preserving the ambiguity
    rather than resolving which party is subject beyond the grammar.
