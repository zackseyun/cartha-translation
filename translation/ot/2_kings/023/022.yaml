id: 2KI.23.22
reference: 2 Kings 23:22
source:
  edition: WLC
  text: כִּ֣י לֹ֤א נַֽעֲשָׂה֙ כַּ/פֶּ֣סַח הַ/זֶּ֔ה מִ/ימֵי֙ הַ/שֹּׁ֣פְטִ֔ים אֲשֶׁ֥ר
    שָׁפְט֖וּ אֶת יִשְׂרָאֵ֑ל וְ/כֹ֗ל יְמֵ֛י מַלְכֵ֥י יִשְׂרָאֵ֖ל וּ/מַלְכֵ֥י יְהוּדָֽה־׃
translation:
  text: For such a Passover had not been kept since the days of the judges who judged
    Israel, nor in all the days of the kings of Israel and the kings of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'this Passover'; the sense is 'a Passover like this one' or 'such
      a Passover.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement about Josiah's
    Passover; 'For' best preserves the causal/explanatory force in context.
- source_word: לֹא
  chosen: had not
  alternatives:
  - was not
  - did not
  lexicon: HALOT
  rationale: Combined with the passive verb to form an English pluperfect passive,
    matching the retrospective comparison with earlier periods.
- source_word: נַעֲשָׂה
  chosen: been kept
  alternatives:
  - been done
  - been observed
  - been celebrated
  lexicon: HALOT
  rationale: The verb עשה literally means 'done/made,' but with Passover as object
    idiomatic English is 'kept' or 'observed.' 'Been kept' is natural and preserves
    the cultic observance sense without over-paraphrase.
- source_word: כַּפֶּסַח הַזֶּה
  chosen: such a Passover
  alternatives:
  - this Passover
  - a Passover like this
  lexicon: HALOT
  rationale: The comparative כ plus 'this Passover' means 'like this Passover.' 'Such
    a Passover' is concise, idiomatic English that preserves the sense of unparalleled
    character.
- source_word: מִימֵי הַשֹּׁפְטִים
  chosen: since the days of the judges
  alternatives:
  - from the days of the judges
  lexicon: HALOT
  rationale: מִן with 'days' marks the starting point of the comparison. 'Since the
    days' is the most natural English rendering in this temporal construction.
- source_word: אֲשֶׁר שָׁפְטוּ אֶת יִשְׂרָאֵל
  chosen: who judged Israel
  alternatives:
  - who governed Israel
  - who ruled Israel
  lexicon: HALOT
  rationale: Retains the verbal link to 'judges' and reflects the historical office
    in Israel before the monarchy.
- source_word: וְכֹל יְמֵי מַלְכֵי יִשְׂרָאֵל וּמַלְכֵי יְהוּדָה
  chosen: nor in all the days of the kings of Israel and the kings of Judah
  alternatives:
  - or in all the days of the kings of Israel and Judah
  - nor during all the days of Israel's kings and Judah's kings
  lexicon: HALOT
  rationale: The conjunction continues the negated comparison. 'Nor in all the days'
    makes the English syntax explicit. Repeating 'the kings of' before both Israel
    and Judah reflects the Hebrew structure and keeps the divided-monarchy distinction
    clear.
