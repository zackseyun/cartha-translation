id: 2KI.23.3
reference: 2 Kings 23:3
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֣ד הַ֠/מֶּלֶךְ עַֽל הָ֨/עַמּ֜וּד וַ/יִּכְרֹ֥ת אֶֽת הַ/בְּרִ֣ית לִ/פְנֵ֣י יְהוָ֗ה לָ/לֶ֜כֶת אַחַ֤ר יְהוָה֙ וְ/לִ/שְׁמֹ֨ר מִצְוֺתָ֜י/ו וְ/אֶת עֵדְוֺתָ֤י/ו וְ/אֶת חֻקֹּתָי/ו֙ בְּ/כָל לֵ֣ב וּ/בְ/כָל נֶ֔פֶשׁ לְ/הָקִ֗ים אֶת דִּבְרֵי֙ הַ/בְּרִ֣ית הַ/זֹּ֔את הַ/כְּתֻבִ֖ים עַל הַ/סֵּ֣פֶר הַ/זֶּ֑ה וַ/יַּעֲמֹ֥ד כָּל הָ/עָ֖ם בַּ/בְּרִֽית־־׀־־־־־־־׃
translation:
  text: 'Then the king stood by the pillar and made the covenant before Yahweh: to walk after Yahweh, and to keep his commandments, his testimonies, and his statutes with all his heart and with all his soul, to carry out the words of this covenant that were written in this book. And all the people entered into the covenant.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'written in this scroll.' The Hebrew word can refer to a scroll or a book/document.
    reason: cultural_note
  - marker: b
    text: Literally, 'stood in the covenant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד ... עַל הָעַמּוּד
  chosen: stood by the pillar
  alternatives:
  - stood on the pillar
  - stood at the pillar
  lexicon: HALOT
  rationale: עָמַד is 'stand,' and עַל can mean 'on/upon' or more broadly indicate position at/by. In this royal-ceremonial setting, 'by the pillar' is the most natural English and fits the likely sense of standing at the designated royal place rather than literally atop a pillar.
- source_word: וַיִּכְרֹת אֶת־הַבְּרִית
  chosen: made the covenant
  alternatives:
  - cut the covenant
  - made a covenant
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant.' 'Made the covenant' preserves the definite article in Hebrew and reads naturally in English; 'cut' is more formally literal but less idiomatic for modern readers.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in the presence of.' 'Before the LORD' is concise, idiomatic, and preserves the covenantal solemnity. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָלֶכֶת אַחַר יְהוָה
  chosen: to walk after the LORD
  alternatives:
  - to follow the LORD
  - to walk in the way of the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'to walk after.' This preserves the covenantal metaphor while remaining understandable. 'Follow' is possible, but the walking imagery is prominent in Deuteronomic covenant language and worth retaining.
- source_word: לִשְׁמֹר
  chosen: to keep
  alternatives:
  - to observe
  - to guard
  lexicon: HALOT
  rationale: שׁמר in legal/covenantal contexts commonly means 'keep/observe.' 'Keep' is the most natural and established English rendering here.
- source_word: מִצְוֺתָיו
  chosen: his commandments
  alternatives:
  - his commands
  lexicon: HALOT
  rationale: מִצְוָה denotes commandment/command. 'Commandments' fits the covenant-law register and pairs well with the following legal terms.
- source_word: עֵדְוֺתָיו
  chosen: his testimonies
  alternatives:
  - his decrees
  - his covenant stipulations
  lexicon: HALOT
  rationale: עֵדוֹת is often rendered 'testimonies' in legal/covenantal contexts. Though less common in contemporary English, it preserves the distinct lexical category alongside commandments and statutes.
- source_word: חֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: חֻקִּים are fixed prescriptions; 'statutes' is the standard concise rendering and preserves distinction from commandments and testimonies.
- source_word: בְּכָל לֵב וּבְכָל נֶפֶשׁ
  chosen: with all his heart and with all his soul
  alternatives:
  - with his whole heart and whole being
  lexicon: HALOT
  rationale: This is a familiar covenantal formula. 'Heart' and 'soul' preserve the traditional anthropological terms without flattening נֶפֶשׁ into a vague paraphrase.
- source_word: לְהָקִים
  chosen: to carry out
  alternatives:
  - to establish
  - to confirm
  - to perform
  lexicon: HALOT
  rationale: In context, the infinitive expresses putting the covenant words into effect. 'Carry out' communicates practical enactment more clearly in modern English than the more wooden 'establish,' while staying close to the sense.
- source_word: דִּבְרֵי הַבְּרִית הַזֹּאת
  chosen: the words of this covenant
  alternatives:
  - the terms of this covenant
  lexicon: HALOT
  rationale: דִּבְרֵי is literally 'words of.' 'Terms' is interpretive; 'words' better preserves the textual emphasis, especially with the following reference to what is written in the book.
- source_word: הַכְּתֻבִים עַל הַסֵּפֶר הַזֶּה
  chosen: that were written in this book
  alternatives:
  - written on this scroll
  - written in this scroll
  lexicon: HALOT
  rationale: סֵפֶר can denote book/scroll/document. 'Book' is acceptable modern English, especially since the immediate context concerns a discovered written law collection. 'Scroll' is a viable cultural alternative and is preserved in a footnote.
- source_word: וַיַּעֲמֹד כָּל־הָעָם בַּבְּרִית
  chosen: And all the people entered into the covenant
  alternatives:
  - stood in the covenant
  - took their stand in the covenant
  lexicon: HALOT
  rationale: The Hebrew is literally 'stood in the covenant,' an idiom for covenant participation/commitment. 'Entered into the covenant' expresses the sense clearly in natural English; the more literal alternative is preserved in a footnote because it may suggest ratification or pledge rather than initial entry.
