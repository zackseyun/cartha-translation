  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Covenant commitment formula וַיַּעֲמֹד כָּל־הָעָם בַּבְּרִית
  chosen_reading: And all the people entered into the covenant
  alternative_readings:
  - And all the people stood in the covenant
  - And all the people took their stand in the covenant
  rationale: The phrase is idiomatic. Rendering it dynamically avoids obscurity while preserving the communal covenant ratification sense. A footnote preserves the more literal wording because it may carry the nuance of standing firm in covenant commitment.
