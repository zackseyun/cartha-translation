id: 2KI.23.20
reference: 2 Kings 23:20
source:
  edition: WLC
  text: וַ֠/יִּזְבַּח אֶת כָּל כֹּהֲנֵ֨י הַ/בָּמ֤וֹת אֲשֶׁר שָׁם֙ עַל הַֽ/מִּזְבְּח֔וֹת
    וַ/יִּשְׂרֹ֛ף אֶת עַצְמ֥וֹת אָדָ֖ם עֲלֵי/הֶ֑ם וַ/יָּ֖שָׁב יְרוּשָׁלִָֽם־־־־־׃
translation:
  text: He slaughtered all the priests of the high places who were there on the altars,
    and he burned human bones on them. Then he returned to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He sacrificed all the priests of the high places.' The Hebrew verb can
      carry sacrificial overtones, but here it likely emphasizes violent slaughter
      in the context of purging illicit worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: he slaughtered
  alternatives:
  - he sacrificed
  - he killed
  lexicon: HALOT
  rationale: The verb זבח can mean 'sacrifice/slaughter.' Here the object is the priests
    of the high places, and the context is Josiah's violent purge of illicit worship
    sites, not a legitimate sacrificial act to God. 'Slaughtered' preserves the grim
    cultic-overtoned violence without implying approved sacrifice.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Straightforward totalizing quantifier; no contextual reason to weaken
    it.
- source_word: כֹּהֲנֵי הַבָּמוֹת
  chosen: the priests of the high places
  alternatives:
  - the priests of the shrines
  - the priests of the hill sanctuaries
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for illicit local worship sites in Kings.
    'High places' is the established and accurate rendering in this historical-religious
    context.
- source_word: אֲשֶׁר שָׁם
  chosen: who were there
  alternatives:
  - who were there at that place
  lexicon: HALOT
  rationale: This relative clause identifies the priests present at those sites. 'Who
    were there' is natural English and preserves the locative force.
- source_word: עַל הַמִּזְבְּחוֹת
  chosen: on the altars
  alternatives:
  - upon the altars
  - atop the altars
  lexicon: HALOT
  rationale: עַל normally means 'on/upon.' Given the desecration scene and the following
    clause about burning bones on them, 'on the altars' is the most direct rendering.
- source_word: וַיִּשְׂרֹף
  chosen: he burned
  lexicon: HALOT
  rationale: Simple rendering of שרף in narrative sequence.
- source_word: עַצְמוֹת אָדָם
  chosen: human bones
  alternatives:
  - the bones of man
  - the bones of a human
  lexicon: HALOT
  rationale: אָדָם here denotes a human being generically, not a male specifically.
    Per doctrine, gender-accurate rendering in context favors 'human.' 'Human bones'
    is idiomatic and precise.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - on those altars
  - over them
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to the altars. 'On them' preserves
    the Hebrew cohesion; the antecedent is clear in English from the prior phrase.
- source_word: וַיָּשָׁב יְרוּשָׁלָם
  chosen: Then he returned to Jerusalem
  alternatives:
  - and he returned to Jerusalem
  lexicon: HALOT
  rationale: The waw-consecutive continues the narrative. 'Then' gives natural English
    sequencing while preserving the sense of progression.
