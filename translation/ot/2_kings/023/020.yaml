theological_decisions:
- issue: Potential sacrificial nuance of וַיִּזְבַּח in describing the killing of
    idolatrous priests
  chosen_reading: Render as 'slaughtered' rather than 'sacrificed'
  alternative_readings:
  - he sacrificed
  rationale: Although the Hebrew verb can denote sacrificial slaughter, translating
    'sacrificed' here could imply a legitimate cultic offering to the LORD, which
    the text does not explicitly state. The verse describes Josiah's judgment and
    desecration of illicit worship sites. 'Slaughtered' preserves the severity and
    possible cultic coloration without importing divine approval of the act as sacrifice.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it'
