id: 2KI.23.19
reference: 2 Kings 23:19
source:
  edition: WLC
  text: וְ/גַם֩ אֶת כָּל בָּתֵּ֨י הַ/בָּמ֜וֹת אֲשֶׁ֣ר בְּ/עָרֵ֣י שֹׁמְר֗וֹן אֲשֶׁ֨ר
    עָשׂ֜וּ מַלְכֵ֤י יִשְׂרָאֵל֙ לְ/הַכְעִ֔יס הֵסִ֖יר יֹֽאשִׁיָּ֑הוּ וַ/יַּ֣עַשׂ לָ/הֶ֔ם
    כְּ/כָל הַֽ/מַּעֲשִׂ֔ים אֲשֶׁ֥ר עָשָׂ֖ה בְּ/בֵֽית אֵֽל־־׀־־׃
translation:
  text: Josiah also removed all the houses of the high places that were in the cities
    of Samaria, which the kings of Israel had made to provoke to anger, and he did
    to them according to all the deeds that he had done at Bethel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly from the broader context, 'to provoke the LORD to anger.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: also
  alternatives:
  - and also
  - moreover
  lexicon: HALOT
  rationale: Adds this action to the preceding account; 'also' is natural English
    and preserves the additive force without over-formality.
- source_word: בָּתֵּי הַבָּמוֹת
  chosen: the houses of the high places
  alternatives:
  - the shrines of the high places
  - the temple-buildings of the high places
  lexicon: HALOT
  rationale: Literally 'houses of the high places.' Retaining 'houses' keeps the concrete
    Hebrew expression, while 'high places' preserves the established term for illicit
    worship sites. 'Shrines' is possible but slightly interpretive.
- source_word: בְּעָרֵי שֹׁמְרוֹן
  chosen: in the cities of Samaria
  alternatives:
  - in Samaria's cities
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase; 'Samaria' here denotes
    the region/territory associated with the former northern kingdom.
- source_word: לְהַכְעִיס
  chosen: to provoke to anger
  alternatives:
  - to provoke
  - to provoke the LORD to anger
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result of the kings' making these sites.
    The object of anger is implicit from context, but not stated in this clause, so
    it is not supplied in the main text.
- source_word: הֵסִיר
  chosen: removed
  alternatives:
  - took away
  - abolished
  lexicon: HALOT
  rationale: A common rendering for סור in the hiphil in reform contexts; 'removed'
    is clear and suitably concrete.
- source_word: וַיַּעַשׂ לָהֶם
  chosen: he did to them
  alternatives:
  - he dealt with them
  - he treated them
  lexicon: HALOT
  rationale: The Hebrew is idiomatic but direct. 'He did to them' preserves the verbal
    link with the following comparison clause and avoids over-interpreting the exact
    action beyond what the text states.
- source_word: כְּכָל הַמַּעֲשִׂים
  chosen: according to all the deeds
  alternatives:
  - just as all the things
  - according to everything
  lexicon: HALOT
  rationale: Keeps the plural noun 'deeds/acts' and the comparative force of כְּ.
    'According to all the deeds' is slightly formal but transparent and close to the
    source.
- source_word: בְּבֵית אֵל
  chosen: at Bethel
  alternatives:
  - in Bethel
  lexicon: HALOT
  rationale: With a place name, English idiom prefers 'at Bethel' for actions performed
    there. The phrase refers back to Josiah's actions at that location in the preceding
    context.
