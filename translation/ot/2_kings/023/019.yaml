theological_decisions:
- issue: Implicit object of divine provocation in לְהַכְעִיס
  chosen_reading: 'Leave the object unstated in the main text: ''to provoke to anger.'''
  alternative_readings:
  - to provoke the LORD to anger
  rationale: The broader context makes clear that the provocation is against the LORD,
    but the Hebrew clause itself leaves the object implicit. Preserving that implicitness
    avoids importing words not present while still conveying the idiom.
  doctrine_reference: Translation philosophy §1, §3
