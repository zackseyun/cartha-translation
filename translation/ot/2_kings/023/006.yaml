id: 2KI.23.6
reference: 2 Kings 23:6
source:
  edition: WLC
  text: וַ/יֹּצֵ֣א אֶת הָ/אֲשֵׁרָה֩ מִ/בֵּ֨ית יְהוָ֜ה מִ/ח֤וּץ לִ/ירוּשָׁלִַ֨ם֙ אֶל
    נַ֣חַל קִדְר֔וֹן וַ/יִּשְׂרֹ֥ף אֹתָ֛/הּ בְּ/נַ֥חַל קִדְר֖וֹן וַ/יָּ֣דֶק לְ/עָפָ֑ר
    וַ/יַּשְׁלֵךְ֙ אֶת עֲפָרָ֔/הּ עַל קֶ֖בֶר בְּנֵ֥י הָ/עָֽם־־־־׃
translation:
  text: He brought the Asherah out from the house of the LORD, outside Jerusalem,
    to the Kidron Valley, and burned it in the Kidron Valley, and crushed it to dust,
    and threw its dust on the graves of the common people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah pole' or 'the Asherah image.' The Hebrew term can refer
      to the Canaanite goddess Asherah or to the cult object associated with her worship;
      here it denotes the object removed and destroyed.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲשֵׁרָה
  chosen: the Asherah
  alternatives:
  - the Asherah pole
  - the Asherah image
  lexicon: HALOT
  rationale: Kept as 'Asherah' rather than reducing it to 'pole,' since the Hebrew
    term can denote either the goddess or her cult object, and here refers to the
    cultic object removed from the temple. Transliteration preserves the specific
    religious referent without over-interpreting the object's exact form; alternatives
    are preserved in a footnote.
- source_word: מִבֵּית יְהוָה
  chosen: from the house of the LORD
  alternatives:
  - from the temple of the LORD
  lexicon: HALOT
  rationale: Rendered formally as 'house of the LORD' to reflect the Hebrew expression
    while remaining natural in English. 'the LORD' follows the doctrinal default for
    יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: מִחוּץ לִירוּשָׁלַם
  chosen: outside Jerusalem
  alternatives:
  - from outside Jerusalem
  lexicon: HALOT
  rationale: This phrase marks movement to a location beyond the city. 'Outside Jerusalem'
    is concise and idiomatic while preserving the spatial sense.
- source_word: נַחַל קִדְרוֹן
  chosen: the Kidron Valley
  alternatives:
  - the Wadi Kidron
  - the Kidron Brook
  lexicon: HALOT
  rationale: נחל can denote a wadi, ravine, or valley with a seasonal watercourse.
    'Kidron Valley' is the clearest natural English rendering in this historical-geographical
    context.
- source_word: וַיִּשְׂרֹף אֹתָהּ
  chosen: and burned it
  alternatives:
  - and burned her
  lexicon: HALOT
  rationale: Although the suffix is grammatically feminine, English uses 'it' for
    the cult object rather than 'her,' which would misleadingly personify the object
    as the goddess herself.
- source_word: וַיָּדֶק לְעָפָר
  chosen: and crushed it to dust
  alternatives:
  - and beat it to dust
  - and ground it to powder
  lexicon: HALOT
  rationale: The verb conveys pulverizing or reducing to fine particles. 'Crushed
    it to dust' is vivid, natural, and fits the sequence of destruction after burning.
- source_word: עֲפָרָהּ
  chosen: its dust
  alternatives:
  - its ashes
  - its powder
  lexicon: HALOT
  rationale: עפר is 'dust' rather than specifically 'ashes.' Since the object was
    both burned and pulverized, 'dust' best reflects the Hebrew wording without narrowing
    it to combustion residue alone.
- source_word: עַל קֶבֶר בְּנֵי הָעָם
  chosen: on the graves of the common people
  alternatives:
  - on the graves of the people
  - on the graves of the sons of the people
  lexicon: HALOT
  rationale: The phrase likely refers not to the populace in general but to ordinary
    people in contrast to elites. 'Common people' captures the social nuance idiomatically;
    'sons of the people' would be overly literal and obscure in English.
