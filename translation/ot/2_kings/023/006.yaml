theological_decisions:
- issue: Rendering the cultic term אֲשֵׁרָה
  chosen_reading: the Asherah
  alternative_readings:
  - the Asherah pole
  - the Asherah image
  rationale: The text reports Josiah's removal and destruction of a prohibited cult
    object associated with Asherah worship. Transliteration avoids making a stronger
    archaeological claim about the object's form than the Hebrew itself requires,
    while still preserving the anti-idolatry force of the passage.
