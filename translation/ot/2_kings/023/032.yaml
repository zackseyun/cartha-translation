id: 2KI.23.32
reference: 2 Kings 23:32
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשׂ֖וּ אֲבֹתָֽי/ו־׃
translation:
  text: And he did what was evil in the eyes of Yahweh, according to all that his fathers had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his fathers''; that is, his forefathers or predecessors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he did
  alternatives:
  - And he acted
  - He did
  lexicon: HALOT
  rationale: 'The waw-consecutive with עשה advances the narrative: ''and he did.'' ''Did'' is the standard rendering and fits the idiom with the following object phrase.'
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: With the article, the phrase עשה הרע is an established idiom meaning 'do what is evil' rather than a wooden 'do the evil.' This preserves natural English while staying close to the Hebrew idiom.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a common Hebrew evaluative idiom. 'In the eyes of' is transparent and preserves the metaphor; 'in the sight of' is possible but slightly less direct here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as all that
  - like everything that
  lexicon: HALOT
  rationale: This combination introduces comparison with the full pattern of prior behavior. 'According to all that' is idiomatic and preserves the comprehensive force of כֹּל.
- source_word: עָשׂוּ
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect clarifies that the fathers' actions precede the king's actions in the narrative comparison, though Hebrew itself simply uses the perfect.
- source_word: אֲבֹתָיו
  chosen: his fathers
  alternatives:
  - his ancestors
  - his forefathers
  lexicon: HALOT
  rationale: The Hebrew literally says 'his fathers.' In royal-context formulae this refers to preceding paternal rulers/ancestors. 'His fathers' preserves the source wording and the gender-accurate principle better than the more interpretive 'ancestors.'
