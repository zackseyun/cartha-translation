id: 2KI.23.15
reference: 2 Kings 23:15
source:
  edition: WLC
  text: וְ/גַ֨ם אֶת הַ/מִּזְבֵּ֜חַ אֲשֶׁ֣ר בְּ/בֵֽית אֵ֗ל הַ/בָּמָה֙ אֲשֶׁ֨ר עָשָׂ֜ה
    יָרָבְעָ֤ם בֶּן נְבָט֙ אֲשֶׁ֣ר הֶחֱטִ֣יא אֶת יִשְׂרָאֵ֔ל גַּ֣ם אֶת הַ/מִּזְבֵּ֧חַ
    הַ/ה֛וּא וְ/אֶת הַ/בָּמָ֖ה נָתָ֑ץ וַ/יִּשְׂרֹ֧ף אֶת הַ/בָּמָ֛ה הֵדַ֥ק לְ/עָפָ֖ר
    וְ/שָׂרַ֥ף אֲשֵׁרָֽה־־־־־־־׃
translation:
  text: Also the altar that was at Bethel—the high place that Jeroboam son of Nebat
    had made, who caused Israel to sin—even that altar and the high place he tore
    down. He burned the high place, crushed it to dust, and burned the Asherah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Asherah pole'; the Hebrew term can refer to the cult object associated
      with Asherah worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  alternatives:
  - the sacrificial altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ as 'altar.' 'Sacrificial altar' is more
    explicit but unnecessarily expands the text.
- source_word: בְּבֵית אֵל
  chosen: at Bethel
  alternatives:
  - in Bethel
  lexicon: HALOT
  rationale: Idiomatic English for location. The Hebrew preposition plus place name
    indicates location; 'at Bethel' reads naturally while preserving sense.
- source_word: הַבָּמָה
  chosen: the high place
  alternatives:
  - the shrine
  lexicon: HALOT
  rationale: בָּמָה commonly refers to a cultic high place. 'High place' preserves
    the technical religious sense and is the standard transparent rendering; 'shrine'
    is possible but less specific.
- source_word: עָשָׂה
  chosen: had made
  alternatives:
  - made
  - built
  lexicon: HALOT
  rationale: The relative clause refers to Jeroboam's establishment of the cult site.
    'Had made' fits the English syntax and prior action; 'built' is interpretive since
    the verb is simply 'made/did.'
- source_word: הֶחֱטִיא אֶת־יִשְׂרָאֵל
  chosen: caused Israel to sin
  alternatives:
  - made Israel sin
  - led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' is a direct and
    clear rendering without softening the causative force.
- source_word: הַמִּזְבֵּחַ הַהוּא
  chosen: even that altar
  alternatives:
  - that very altar
  - that altar
  lexicon: HALOT
  rationale: The repeated גַּם plus demonstrative adds emphasis. 'Even that altar'
    captures the emphatic focus in natural English.
- source_word: נָתָץ
  chosen: he tore down
  alternatives:
  - he broke down
  - he demolished
  lexicon: HALOT
  rationale: A common verb for pulling down or demolishing structures. 'Tore down'
    is vivid and natural while remaining close to the Hebrew.
- source_word: וַיִּשְׂרֹף אֶת־הַבָּמָה
  chosen: He burned the high place
  alternatives:
  - He burned the shrine
  lexicon: HALOT
  rationale: Although 'high place' can denote the cult site broadly, here it likely
    includes its physical cultic installation(s). Retaining 'high place' preserves
    lexical consistency with בָּמָה in the verse.
- source_word: הֵדַק לְעָפָר
  chosen: crushed it to dust
  alternatives:
  - ground it to dust
  - beat it to dust
  lexicon: HALOT
  rationale: The verb conveys pulverizing, and לְעָפָר indicates the result. 'Crushed
    it to dust' is clear modern English; the object is implicit from the prior clause
    and naturally supplied in English.
- source_word: אֲשֵׁרָה
  chosen: the Asherah
  alternatives:
  - the Asherah pole
  - the sacred pole
  lexicon: HALOT
  rationale: אֲשֵׁרָה may refer either to the goddess or, in many contexts like this,
    to her cult object. 'The Asherah' preserves the Hebrew term transparently without
    overcommitting to 'pole,' which is interpretive; the likely cult-object sense
    is noted in a footnote.
