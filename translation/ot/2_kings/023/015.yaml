theological_decisions:
- issue: Rendering of אֲשֵׁרָה
  chosen_reading: the Asherah
  alternative_readings:
  - the Asherah pole
  - the sacred pole
  rationale: The term can denote the Canaanite goddess or the wooden cult object associated
    with her worship. In this destruction context, the referent is most likely the
    cult object, but the Hebrew term itself is retained in the main text to avoid
    collapsing the lexical ambiguity. A footnote preserves the more explicit alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
