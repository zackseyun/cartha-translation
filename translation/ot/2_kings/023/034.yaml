id: 2KI.23.34
reference: 2 Kings 23:34
source:
  edition: WLC
  text: וַ/יַּמְלֵךְ֩ פַּרְעֹ֨ה נְכֹ֜ה אֶת אֶלְיָקִ֣ים בֶּן יֹאשִׁיָּ֗הוּ תַּ֚חַת
    יֹאשִׁיָּ֣הוּ אָבִ֔י/ו וַ/יַּסֵּ֥ב אֶת שְׁמ֖/וֹ יְהוֹיָקִ֑ים וְ/אֶת יְהוֹאָחָ֣ז
    לָקָ֔ח וַ/יָּבֹ֥א מִצְרַ֖יִם וַ/יָּ֥מָת שָֽׁם־־־־׃
translation:
  text: And Pharaoh Neco made Eliakim son of Josiah king in place of Josiah his father,
    and changed his name to Jehoiakim. But he took Jehoahaz, and he came to Egypt
    and died there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he went to Egypt.' The Hebrew reads 'came to Egypt.'
    reason: lexical_alternative
  - marker: b
    text: That is, Pharaoh Neco renamed Eliakim as Jehoiakim.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּמְלֵךְ
  chosen: made ... king
  alternatives:
  - caused ... to reign
  - appointed ... king
  lexicon: HALOT
  rationale: 'Hiphil of מלך here is causative: Pharaoh installs Eliakim as king rather
    than merely noting that Eliakim reigned. ''Made ... king'' is natural English
    and preserves the causative force.'
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: In this succession context, תַּחַת indicates replacement/succession.
    'In place of' is the clearest idiomatic rendering.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: The suffix refers to Eliakim, identifying Josiah as his father. The phrase
    is retained explicitly in English for clarity.
- source_word: וַיַּסֵּב אֶת־שְׁמוֹ
  chosen: changed his name
  alternatives:
  - turned his name
  - renamed him
  lexicon: HALOT
  rationale: The idiom means to alter or rename. 'Changed his name' closely reflects
    the Hebrew while remaining idiomatic.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וְאֶת־יְהוֹאָחָז לָקָח
  chosen: But he took Jehoahaz
  alternatives:
  - And he took Jehoahaz
  - and he seized Jehoahaz
  lexicon: HALOT
  rationale: לקח is the ordinary verb 'take.' Here it likely implies removal/capture,
    but 'took' preserves the Hebrew's simplicity without over-interpreting. 'But'
    reflects the shift in action after Eliakim's installation.
- source_word: וַיָּבֹא מִצְרַיִם
  chosen: and he came to Egypt
  alternatives:
  - and he went to Egypt
  lexicon: HALOT
  rationale: The Hebrew verb is 'came.' Although English often prefers 'went' from
    the narrator's perspective, 'came to Egypt' more directly reflects the source
    text and avoids unnecessary smoothing.
- source_word: וַיָּמָת שָׁם
  chosen: and died there
  lexicon: HALOT
  rationale: A straightforward rendering of the final clause, preserving the terse
    narrative conclusion.
