id: 2KI.23.24
reference: 2 Kings 23:24
source:
  edition: WLC
  text: וְ/גַ֣ם אֶת הָ/אֹב֣וֹת וְ/אֶת הַ֠/יִּדְּעֹנִים וְ/אֶת הַ/תְּרָפִ֨ים וְ/אֶת
    הַ/גִּלֻּלִ֜ים וְ/אֵ֣ת כָּל הַ/שִּׁקֻּצִ֗ים אֲשֶׁ֤ר נִרְאוּ֙ בְּ/אֶ֤רֶץ יְהוּדָה֙
    וּ/בִ/יר֣וּשָׁלִַ֔ם בִּעֵ֖ר יֹֽאשִׁיָּ֑הוּ לְ֠מַעַן הָקִ֞ים אֶת דִּבְרֵ֤י הַ/תּוֹרָה֙
    הַ/כְּתֻבִ֣ים עַל הַ/סֵּ֔פֶר אֲשֶׁ֥ר מָצָ֛א חִלְקִיָּ֥הוּ הַ/כֹּהֵ֖ן בֵּ֥ית יְהוָֽה־־־־־־־׃
translation:
  text: Moreover, Josiah removed the mediums, the spiritists, the household gods,
    the idols, and all the abominations that were seen in the land of Judah and in
    Jerusalem, in order to establish the words of the law written in the book that
    Hilkiah the priest found in the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “written on the scroll.” The Hebrew word can refer to a written document
      in scroll form.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Moreover
  alternatives:
  - And also
  - Also
  lexicon: HALOT
  rationale: Introduces an additional reform action in a way that reads naturally
    in English while preserving the additive force.
- source_word: הָאֹבוֹת
  chosen: the mediums
  alternatives:
  - the ghosts
  - the necromancers
  lexicon: HALOT
  rationale: In this context the term refers to practitioners associated with consulting
    the dead, not merely spirits themselves. 'Mediums' is clear modern English and
    fits Josiah's removal of illicit practitioners.
- source_word: הַיִּדְּעֹנִים
  chosen: the spiritists
  alternatives:
  - the wizards
  - those with familiar spirits
  lexicon: HALOT
  rationale: A paired term with אֹבוֹת for occult practitioners. 'Spiritists' is accessible
    modern English and avoids archaic 'wizards' or opaque traditional phrasing.
- source_word: הַתְּרָפִים
  chosen: the household gods
  alternatives:
  - the teraphim
  - the household idols
  lexicon: HALOT
  rationale: Likely refers to domestic cult objects/deities. Translating the sense
    is preferable to transliteration here for readability; 'household gods' captures
    their function.
- source_word: הַגִּלֻּלִים
  chosen: the idols
  alternatives:
  - the dung-idols
  - the fetishes
  lexicon: HALOT
  rationale: A strongly pejorative term for idols. 'Idols' is the standard clear rendering;
    the contemptuous nuance is real but difficult to preserve idiomatically without
    awkwardness.
- source_word: כָּל הַשִּׁקֻּצִים
  chosen: all the abominations
  alternatives:
  - all the detestable things
  - all the abominable idols
  lexicon: HALOT
  rationale: Broad term for ritually detestable objects/practices. 'Abominations'
    preserves the moral-religious force and breadth better than a narrower term.
- source_word: נִרְאוּ
  chosen: were seen
  alternatives:
  - appeared
  - were found
  lexicon: HALOT
  rationale: The Niphal form is most naturally passive/reflexive, indicating these
    things were present/visible in the land. 'Were seen' stays close to the Hebrew.
- source_word: בִּעֵר
  chosen: removed
  alternatives:
  - burned away
  - purged
  - swept away
  lexicon: HALOT
  rationale: The verb can denote burning out or purging away. Since the listed objects
    and practitioners are varied, 'removed' communicates the comprehensive elimination
    without over-specifying method.
- source_word: לְמַעַן הָקִים
  chosen: in order to establish
  alternatives:
  - so that he might fulfill
  - to carry out
  lexicon: HALOT
  rationale: The phrase expresses purpose tied to making the law's words stand or
    be put into effect. 'Establish' is slightly more formal and closer to the Hebrew
    than 'fulfill,' which could imply prediction rather than implementation.
- source_word: דִּבְרֵי הַתּוֹרָה
  chosen: the words of the law
  alternatives:
  - the words of the instruction
  - the matters of the law
  lexicon: HALOT
  rationale: תּוֹרָה here refers to the covenantal legal instruction in the discovered
    book. 'Law' is the most idiomatic and contextually fitting rendering.
- source_word: הַכְּתֻבִים עַל הַסֵּפֶר
  chosen: written in the book
  alternatives:
  - written on the scroll
  - written in the scroll
  lexicon: HALOT
  rationale: סֵפֶר denotes a written document, often a scroll. 'Book' is acceptable
    modern English, but the physical form may have been a scroll; this is preserved
    in a footnote.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of YHWH.' Per doctrine, יְהוָה is rendered
    'the LORD.' 'House of the LORD' preserves the source wording better than the interpretive
    'temple.'
