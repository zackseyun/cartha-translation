id: 2KI.1.8
reference: 2 Kings 1:8
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו אִ֚ישׁ בַּ֣עַל שֵׂעָ֔ר וְ/אֵז֥וֹר ע֖וֹר אָז֣וּר בְּ/מָתְנָ֑י/ו
    וַ/יֹּאמַ֕ר אֵלִיָּ֥ה הַ/תִּשְׁבִּ֖י הֽוּא׃
translation:
  text: They said to him, “He was a hairy man, with a leather belt fastened around
    his waist.” And he said, “It is Elijah the Tishbite.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a man wearing a garment of hair.” The Hebrew expression literally says
      “a possessor/master of hair,” which may describe either a hairy man or hair-cloth
      attire.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  lexicon: HALOT
  rationale: The noun straightforwardly denotes an adult male here, matching the description
    of Elijah; 'man' is the natural and gender-accurate rendering.
- source_word: בַּעַל שֵׂעָר
  chosen: hairy
  alternatives:
  - owner of hair
  - wearing a garment of hair
  - a hairy man
  lexicon: HALOT
  rationale: The construct literally means 'master/possessor of hair.' In context
    it functions idiomatically as a physical description. English 'hairy man' best
    captures the plain sense. 'Wearing a garment of hair' is possible in light of
    prophetic attire elsewhere, but the Hebrew here does not explicitly mention a
    garment, so the main text keeps the more direct description while preserving the
    alternative in a footnote.
- source_word: וְאֵזוֹר עוֹר
  chosen: with a leather belt
  alternatives:
  - and a belt of leather
  - and a leather waistband
  lexicon: HALOT
  rationale: אֵזוֹר is a belt/girdle; עוֹר specifies the material as leather/skin.
    'Leather belt' is clear modern English and preserves the material detail.
- source_word: אָזוּר
  chosen: fastened
  alternatives:
  - girded
  - bound
  lexicon: HALOT
  rationale: The passive participle describes the belt as being worn/tied around the
    waist. 'Fastened' is readable modern English; 'girded' is more formal but less
    natural.
- source_word: בְּמָתְנָיו
  chosen: around his waist
  alternatives:
  - at his loins
  - around his hips
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the loins/waist region. 'Around his waist' communicates
    the sense idiomatically in contemporary English without archaic wording.
- source_word: אֵלִיָּה הַתִּשְׁבִּי
  chosen: Elijah the Tishbite
  lexicon: HALOT
  rationale: Personal name is transliterated per project philosophy, and the gentilic/title
    is translated in the conventional form 'the Tishbite.'
- source_word: הוּא
  chosen: It is
  alternatives:
  - He is
  lexicon: HALOT
  rationale: English idiom for identifying someone from a description prefers 'It
    is Elijah...' rather than the more wooden 'He is Elijah...'.
