theological_decisions:
- issue: Rendering the pagan deity's name
  chosen_reading: Baal-zebub
  alternative_readings:
  - Beelzebub
  rationale: The Hebrew text reads בַּעַל זְבוּב, so the main text follows the Hebrew
    form. The later and more familiar 'Beelzebub' is preserved in a footnote as a
    recognizable traditional form, but not adopted over the source-text spelling.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names.'
