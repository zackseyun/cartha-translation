id: 2KI.1.2
reference: 2 Kings 1:2
source:
  edition: WLC
  text: וַ/יִּפֹּ֨ל אֲחַזְיָ֜ה בְּעַ֣ד הַ/שְּׂבָכָ֗ה בַּ/עֲלִיָּת֛/וֹ אֲשֶׁ֥ר בְּ/שֹׁמְר֖וֹן
    וַ/יָּ֑חַל וַ/יִּשְׁלַ֣ח מַלְאָכִ֔ים וַ/יֹּ֤אמֶר אֲלֵ/הֶם֙ לְכ֣וּ דִרְשׁ֗וּ בְּ/בַ֤עַל
    זְבוּב֙ אֱלֹהֵ֣י עֶקְר֔וֹן אִם אֶחְיֶ֖ה מֵ/חֳלִ֥י זֶֽה־׃ס
translation:
  text: Now Ahaziah fell through the lattice in his upper room, which was in Samaria,
    and was injured. So he sent messengers and said to them, “Go, inquire of Baal-zebub,
    the god of Ekron, whether I will recover from this sickness.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baal-zebub is the Hebrew form of the name; the later form Beelzebub appears
      in Greek and in some English tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעַד הַשְּׂבָכָה
  chosen: through the lattice
  alternatives:
  - through the window lattice
  - through the screen
  lexicon: HALOT
  rationale: בְּעַד with שְׂבָכָה indicates movement through or by way of a latticed
    opening. 'Through the lattice' is concise, natural English and preserves the concrete
    image better than the vaguer 'through a window.'
- source_word: עֲלִיָּתוֹ
  chosen: his upper room
  alternatives:
  - his upper chamber
  - his upstairs room
  lexicon: HALOT
  rationale: עֲלִיָּה refers to an upper chamber/room. 'Upper room' is clear modern
    English and sufficiently formal.
- source_word: וַיָּחַל
  chosen: was injured
  alternatives:
  - became sick
  - was hurt
  - fell ill
  lexicon: HALOT
  rationale: In context following the fall, the verb denotes becoming ill or injured
    as a result. 'Was injured' best connects the sickness with the accident while
    avoiding an overly medical paraphrase.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - angels
  - envoys
  lexicon: HALOT
  rationale: In this narrative setting the referent is human agents sent by the king,
    so 'messengers' is the correct contextual rendering.
- source_word: דִרְשׁוּ
  chosen: inquire of
  alternatives:
  - seek
  - consult
  lexicon: HALOT
  rationale: דרשׁ in this context means to seek an oracle or consult a deity. 'Inquire
    of' preserves the religious-consultative sense without overparaphrasing.
- source_word: בַּעַל זְבוּב
  chosen: Baal-zebub
  alternatives:
  - Baal Zebub
  - Beelzebub
  lexicon: HALOT
  rationale: As a proper name, it is transliterated rather than translated, in keeping
    with the project's policy on names. 'Beelzebub' reflects later Greek-influenced
    form and is worth preserving as an alternative in a footnote.
- source_word: אֱלֹהֵי עֶקְרוֹן
  chosen: the god of Ekron
  alternatives:
  - Ekron's god
  lexicon: HALOT
  rationale: The construct phrase straightforwardly identifies Baal-zebub as the deity
    worshiped at Ekron. 'The god of Ekron' is the most natural English rendering.
- source_word: אִם אֶחְיֶה מֵחֳלִי זֶה
  chosen: whether I will recover from this sickness
  alternatives:
  - whether I will live from this illness
  - whether I shall get well from this disease
  lexicon: HALOT
  rationale: Literally, 'if I will live from this sickness,' but idiomatic English
    expresses the sense as recovery. 'Recover from this sickness' preserves the future
    uncertainty and the illness context.
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - had a fall
  lexicon: HALOT
  rationale: The simple narrative verb is best rendered directly as 'fell.'
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
