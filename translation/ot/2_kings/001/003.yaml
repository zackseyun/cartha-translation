theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Identity of מַלְאַךְ יְהוָה
  chosen_reading: angel of the LORD
  alternative_readings:
  - messenger of the LORD
  rationale: The translation preserves the lexical sense most natural in this narrative
    context without importing a specific theological claim about the angel's identity
    beyond the text itself.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
