id: 2KI.1.3
reference: 2 Kings 1:3
source:
  edition: WLC
  text: וּ/מַלְאַ֣ךְ יְהוָ֗ה דִּבֶּר֙ אֶל אֵלִיָּ֣ה הַ/תִּשְׁבִּ֔י ק֣וּם עֲלֵ֔ה לִ/קְרַ֖את
    מַלְאֲכֵ֣י מֶֽלֶךְ שֹׁמְר֑וֹן וְ/דַבֵּ֣ר אֲלֵ/הֶ֔ם הַֽ/מִ/בְּלִ֤י אֵין אֱלֹהִים֙
    בְּ/יִשְׂרָאֵ֔ל אַתֶּם֙ הֹֽלְכִ֔ים לִ/דְרֹ֕שׁ בְּ/בַ֥עַל זְב֖וּב אֱלֹהֵ֥י עֶקְרֽוֹן־־־׃
translation:
  text: But the angel of the LORD spoke to Elijah the Tishbite, “Get up, go up to
    meet the messengers of the king of Samaria, and say to them, ‘Is it because there
    is no God in Israel that you are going to inquire of Baal-zebub, the god of Ekron?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Is it for lack of a God in Israel that you are going to inquire of
      Baal-zebub, the god of Ekron?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַלְאַךְ יְהוָה
  chosen: But the angel of the LORD
  alternatives:
  - And the angel of the LORD
  - the messenger of the LORD
  lexicon: HALOT
  rationale: ו conjunction here is rendered 'But' to mark narrative contrast with
    the king's action in the previous verse. מַלְאַךְ can mean either 'messenger'
    or 'angel'; with יְהוָה in this narrative setting, 'angel of the LORD' is the
    most natural and established sense. יְהוָה follows doctrine default as 'the LORD.'
- source_word: דִּבֶּר אֶל
  chosen: spoke to
  alternatives:
  - said to
  lexicon: HALOT
  rationale: דבר אל commonly means 'speak to.' 'Spoke to' preserves the verbal form
    without overcompressing it to 'said.'
- source_word: אֵלִיָּה הַתִּשְׁבִּי
  chosen: Elijah the Tishbite
  lexicon: HALOT
  rationale: Personal name is transliterated; gentilic/title הַתִּשְׁבִּי is rendered
    conventionally as 'the Tishbite.'
- source_word: קוּם עֲלֵה
  chosen: Get up, go up
  alternatives:
  - Arise, go up
  - Get up, go
  lexicon: HALOT
  rationale: Two imperatives are preserved distinctly. 'Get up' for קום is idiomatic
    modern English; 'go up' retains the directional nuance of עלה rather than flattening
    to simply 'go.'
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to confront
  - toward
  lexicon: HALOT
  rationale: 'The infinitive with ל conveys purpose: Elijah is to go in order to meet
    them. ''Confront'' would overinterpret the tone.'
- source_word: מַלְאֲכֵי מֶלֶךְ שֹׁמְרוֹן
  chosen: the messengers of the king of Samaria
  alternatives:
  - the envoys of the king of Samaria
  lexicon: HALOT
  rationale: Here מַלְאָךְ clearly refers to human agents, so 'messengers' avoids
    confusion with the earlier heavenly 'angel.' 'King of Samaria' is retained as
    in the Hebrew, even though Samaria is the capital standing for the northern kingdom.
- source_word: וְדַבֵּר אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and speak to them
  lexicon: HALOT
  rationale: Although the same root דבר appears, English idiom favors 'say to them'
    before direct quoted speech.
- source_word: הֲמִבְּלִי אֵין אֱלֹהִים בְּיִשְׂרָאֵל
  chosen: Is it because there is no God in Israel
  alternatives:
  - Is it for lack of a God in Israel
  - Is it because there is not God in Israel
  lexicon: HALOT
  rationale: This idiom introduces a rhetorical question expressing rebuke. 'Is it
    because there is no God in Israel' is clear modern English and preserves the force.
    'For lack of a God' is possible and worth preserving as a lexical alternative.
- source_word: אַתֶּם הֹלְכִים
  chosen: you are going
  alternatives:
  - you go
  lexicon: HALOT
  rationale: The participial construction conveys ongoing/intended action; English
    progressive best captures the sense.
- source_word: לִדְרֹשׁ
  chosen: to inquire of
  alternatives:
  - to seek
  - to consult
  lexicon: HALOT
  rationale: In this divinatory/oracular context, דרש means to seek an answer from
    a deity. 'Inquire of' is precise and traditional without being archaic.
- source_word: בַּעַל זְבוּב
  chosen: Baal-zebub
  alternatives:
  - Baal Zebub
  lexicon: HALOT
  rationale: The proper name is transliterated. Hyphenation helps readers recognize
    the compound name.
- source_word: אֱלֹהֵי עֶקְרוֹן
  chosen: the god of Ekron
  alternatives:
  - god of Ekron
  lexicon: HALOT
  rationale: The construct phrase is definite in sense here; 'the god of Ekron' is
    natural English and identifies Baal-zebub's cultic association.
