id: 2KI.1.9
reference: 2 Kings 1:9
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֥ח אֵלָ֛י/ו שַׂר חֲמִשִּׁ֖ים וַ/חֲמִשָּׁ֑י/ו וַ/יַּ֣עַל אֵלָ֗י/ו
    וְ/הִנֵּה֙ יֹשֵׁב֙ עַל רֹ֣אשׁ הָ/הָ֔ר וַ/יְדַבֵּ֣ר אֵלָ֔י/ו אִ֚ישׁ הָֽ/אֱלֹהִ֔ים
    הַ/מֶּ֥לֶךְ דִּבֶּ֖ר רֵֽדָ/ה־־׃
translation:
  text: Then he sent to him a captain of fifty with his fifty men. He went up to him,
    and behold, he was sitting on the top of the hill. He spoke to him, “Man of God,
    the king says, ‘Come down.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “on the top of the mountain.” The Hebrew הַר can refer to a hill or a
      mountain depending on context.
    reason: lexical_alternative
  - marker: b
    text: 'Literally, “the king has spoken: ‘Come down.’” The Hebrew messenger formula
      uses “has spoken,” which is rendered idiomatically here as “says.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then he sent
  alternatives:
  - And he sent
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English narrative
    sequence while preserving the consecutive force.
- source_word: שַׂר חֲמִשִּׁים
  chosen: a captain of fifty
  alternatives:
  - a commander of fifty
  - an officer over fifty
  lexicon: HALOT
  rationale: The phrase denotes a military officer in charge of a unit of fifty. 'Captain
    of fifty' is concise and idiomatic in English, preserving the military rank-like
    sense.
- source_word: וַחֲמִשָּׁיו
  chosen: with his fifty men
  alternatives:
  - and his fifty
  - with the fifty under him
  lexicon: HALOT
  rationale: The pronominal suffix indicates the group attached to the captain. English
    normally supplies 'men' to make the military sense explicit.
- source_word: וַיַּעַל אֵלָיו
  chosen: He went up to him
  alternatives:
  - He came up to him
  - He ascended to him
  lexicon: HALOT
  rationale: '''עלה'' here reflects movement upward toward Elijah''s elevated location.
    ''Went up'' preserves the vertical nuance without sounding wooden.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there he was
  lexicon: HALOT
  rationale: The particle marks a vivid scene-setting observation. 'Behold' preserves
    the deictic force and narrative vividness.
- source_word: יֹשֵׁב
  chosen: he was sitting
  alternatives:
  - sitting
  - he sat
  lexicon: HALOT
  rationale: The participle describes Elijah's posture/state at the moment. 'He was
    sitting' communicates ongoing state in natural English.
- source_word: עַל רֹאשׁ הָהָר
  chosen: on the top of the hill
  alternatives:
  - on the top of the mountain
  - at the summit of the hill
  lexicon: HALOT
  rationale: '''ראש'' is ''top/summit.'' ''Har'' can mean mountain or hill depending
    on scale; in this narrative setting ''hill'' is natural and avoids overstating
    the terrain.'
- source_word: וַיְדַבֵּר אֵלָיו
  chosen: He spoke to him
  alternatives:
  - He said to him
  lexicon: HALOT
  rationale: The verb is דבר, 'speak,' introducing direct speech. 'Spoke to him' reflects
    the lexical choice more directly than simply 'said.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: Man of God
  alternatives:
  - man of God
  lexicon: HALOT
  rationale: A recognized title for a prophet. Capitalization reflects titular use
    in English without changing meaning.
- source_word: הַמֶּלֶךְ דִּבֶּר
  chosen: the king says
  alternatives:
  - the king has spoken
  - the king commands
  lexicon: HALOT
  rationale: Although the Hebrew form is literally 'has spoken,' in this messenger
    formula idiomatic English often uses the present, introducing the quoted royal
    message. 'Commands' would over-interpret the verb.
- source_word: רֵדָה
  chosen: Come down
  alternatives:
  - Go down
  - Descend
  lexicon: HALOT
  rationale: Imperative of ירד. Since the speaker is below Elijah and summons him
    downward toward himself, 'Come down' is the most natural English deictic equivalent.
