theological_decisions:
- issue: Rendering נֶפֶשׁ in a plea for survival
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: In this narrative context the speaker is pleading not to be killed like
    the previous companies. Rendering נֶפֶשׁ as 'life' best matches the concrete sense
    and avoids importing later dualistic connotations of 'soul' not demanded by the
    Hebrew.
