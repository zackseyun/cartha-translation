id: 2KI.1.14
reference: 2 Kings 1:14
source:
  edition: WLC
  text: הִ֠נֵּה יָ֤רְדָה אֵשׁ֙ מִן הַ/שָּׁמַ֔יִם וַ֠/תֹּאכַל אֶת שְׁנֵ֞י שָׂרֵ֧י הַ/חֲמִשִּׁ֛ים
    הָ/רִאשֹׁנִ֖ים וְ/אֶת חֲמִשֵּׁי/הֶ֑ם וְ/עַתָּ֕ה תִּיקַ֥ר נַפְשִׁ֖/י בְּ/עֵינֶֽי/ךָ־־־׃ס
translation:
  text: Look, fire came down from heaven and consumed the first two captains of fifty
    and their fifties. But now, let my life be precious in your sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the groups of fifty under them'; Hebrew literally 'their fifties.'
    reason: lexical_alternative
  - marker: b
    text: Or 'let my soul be precious in your sight'; here 'soul' refers to the speaker's
      life.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention to the evident fact just cited. 'Look'
    is natural modern English while preserving the deictic force better than omitting
    it.
- source_word: יָרְדָה אֵשׁ מִן הַשָּׁמַיִם
  chosen: fire came down from heaven
  alternatives:
  - fire descended from heaven
  lexicon: HALOT
  rationale: Combines the verb ירד with its subject and source phrase into idiomatic
    English. 'Came down' is more readable than 'descended' while remaining faithful.
- source_word: וַתֹּאכַל
  chosen: consumed
  alternatives:
  - ate up
  - devoured
  lexicon: HALOT
  rationale: The verb אכל is literally 'eat,' but with fire as subject English normally
    uses 'consume.' This preserves the destructive sense without awkward literalism.
- source_word: שְׁנֵי שָׂרֵי הַחֲמִשִּׁים
  chosen: the first two captains of fifty
  alternatives:
  - the two former captains of fifty
  - the first two commanders of fifty
  lexicon: HALOT
  rationale: שַׂר can mean chief, captain, ruler, or commander. In this military context
    'captain' is a standard and clear rendering. 'Of fifty' reflects the unit under
    their command.
- source_word: הָרִאשֹׁנִים
  chosen: the first
  alternatives:
  - the former
  - the earlier
  lexicon: HALOT
  rationale: Refers back to the two earlier officers already mentioned in the narrative.
    'The first' is concise and fits the sequence.
- source_word: וְאֶת חֲמִשֵּׁיהֶם
  chosen: and their fifties
  alternatives:
  - and their men
  - and the groups of fifty under them
  lexicon: HALOT
  rationale: The Hebrew literally refers to their groups of fifty. 'Their fifties'
    preserves the military structure more closely than the interpretive 'their men,'
    while remaining understandable in context.
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Marks a transition from recounting prior judgment to making a plea. 'But
    now' captures the contrastive force in context.
- source_word: תִּיקַר נַפְשִׁי בְּעֵינֶיךָ
  chosen: let my life be precious in your sight
  alternatives:
  - let my life be esteemed in your eyes
  - let my life be valued by you
  lexicon: HALOT
  rationale: יקר conveys being precious, weighty, or honored. נֶפֶשׁ here refers to
    the speaker's life, not an abstract 'soul.' 'In your sight' is the natural equivalent
    of 'in your eyes.'
