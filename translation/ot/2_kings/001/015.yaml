id: 2KI.1.15
reference: 2 Kings 1:15
source:
  edition: WLC
  text: וַ/יְדַבֵּ֞ר מַלְאַ֤ךְ יְהוָה֙ אֶל אֵ֣לִיָּ֔הוּ רֵ֣ד אוֹת֔/וֹ אַל תִּירָ֖א מִ/פָּנָ֑י/ו וַ/יָּ֛קָם וַ/יֵּ֥רֶד אוֹת֖/וֹ אֶל הַ/מֶּֽלֶךְ־־־׃
translation:
  text: Then the angel of Yahweh spoke to Elijah, “Go down with him; do not be afraid of him.” So he arose and went down with him to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “do not be afraid from before him,” that is, “do not fear because of his presence.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel,' but in this narrative formula and in this context of divine appearance and command, 'angel' is the most natural English rendering. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רֵד
  chosen: Go down
  alternatives:
  - Come down
  - Descend
  lexicon: HALOT
  rationale: Imperative of ירד. 'Go down' is idiomatic modern English and fits the directional movement from Elijah's current location to the king.
- source_word: אוֹתוֹ
  chosen: with him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: 'The object marker with pronominal suffix after ירד functions idiomatically here as accompaniment: Elijah is to go down in company with the captain/messenger. English ''with him'' best reflects the sense in context.'
- source_word: אַל תִּירָא
  chosen: do not be afraid
  alternatives:
  - do not fear
  lexicon: HALOT
  rationale: Standard negative imperative from ירא. 'Do not be afraid' is natural contemporary English while preserving the force of the command.
- source_word: מִפָּנָיו
  chosen: because of him
  alternatives:
  - before him
  - of his presence
  - from before him
  lexicon: HALOT
  rationale: 'Literally ''from his face/presence.'' In this idiom after ירא, the sense is causal/objective: Elijah is not to fear on account of this man. ''Because of him'' communicates the meaning clearly in English.'
- source_word: וַיָּקָם
  chosen: he arose
  alternatives:
  - he got up
  - he stood up
  lexicon: HALOT
  rationale: A common narrative verb marking responsive action. 'He arose' preserves the slightly elevated narrative cadence without sounding archaic in context.
- source_word: וַיֵּרֶד אֹתוֹ אֶל־הַמֶּלֶךְ
  chosen: went down with him to the king
  alternatives:
  - went down to the king with him
  lexicon: HALOT
  rationale: The repeated idiom with ירד + object suffix again indicates accompaniment. English word order is adjusted for readability while preserving the movement and destination.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun with the known royal referent in context.
