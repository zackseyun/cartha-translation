id: 2KI.1.13
reference: 2 Kings 1:13
source:
  edition: WLC
  text: וַ/יָּ֗שָׁב וַ/יִּשְׁלַ֛ח שַׂר חֲמִשִּׁ֥ים שְׁלִשִׁ֖ים וַ/חֲמִשָּׁ֑י/ו וַ/יַּ֡עַל
    וַ/יָּבֹא֩ שַׂר הַ/חֲמִשִּׁ֨ים הַ/שְּׁלִישִׁ֜י וַ/יִּכְרַ֥ע עַל בִּרְכָּ֣י/ו לְ/נֶ֣גֶד
    אֵלִיָּ֗הוּ וַ/יִּתְחַנֵּ֤ן אֵלָי/ו֙ וַ/יְדַבֵּ֣ר אֵלָ֔י/ו אִ֚ישׁ הָֽ/אֱלֹהִ֔ים
    תִּֽיקַר נָ֣א נַפְשִׁ֗/י וְ/נֶ֨פֶשׁ עֲבָדֶ֥י/ךָֽ אֵ֛לֶּה חֲמִשִּׁ֖ים בְּ/עֵינֶֽי/ךָ־־־׀־׃
translation:
  text: Again he sent a third captain of fifty with his fifty. He went up and came,
    and the third captain of fifty knelt on his knees before Elijah and pleaded with
    him and said to him, “Man of God, please let my life and the life of these fifty
    your servants be precious in your sight.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “let my soul and the soul of these fifty your servants be precious in
      your sight.” Hebrew nephesh can mean “life,” “self,” or “soul,” depending on
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Again
  alternatives:
  - He returned
  - He turned back
  lexicon: HALOT
  rationale: In this narrative sequence, the verb introduces repeated action by the
    king from the prior verse. English 'Again' captures the resumptive/repetitive
    force more naturally than a literal 'he returned,' while staying close to the
    discourse function.
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in a military/narrative context.
- source_word: שַׂר חֲמִשִּׁים שְׁלִשִׁים וַחֲמִשָּׁיו
  chosen: a third captain of fifty with his fifty
  alternatives:
  - the captain of fifty, a third one, and his fifty
  - another captain of fifty, a third, with his fifty men
  lexicon: HALOT
  rationale: 'The Hebrew apposition marks ordinal sequence: ''a captain of fifty,
    a third one, and his fifty.'' English idiom is best served by ''a third captain
    of fifty with his fifty.'' ''Men'' is implied but not explicit, so omitted in
    the main text.'
- source_word: וַיַּעַל וַיָּבֹא
  chosen: He went up and came
  alternatives:
  - He went up and came to him
  - He ascended and arrived
  lexicon: HALOT
  rationale: Both verbs are retained to preserve the Hebrew narrative movement. 'Went
    up and came' is slightly formal but reflects the two-step action without unnecessary
    paraphrase.
- source_word: שַׂר הַחֲמִשִּׁים הַשְּׁלִישִׁי
  chosen: the third captain of fifty
  alternatives:
  - the third captain over fifty
  lexicon: HALOT
  rationale: Definite and ordinal construction straightforwardly identifies this officer
    as the third in sequence.
- source_word: וַיִּכְרַע עַל בִּרְכָּיו
  chosen: knelt on his knees
  alternatives:
  - fell on his knees
  - bowed on his knees
  lexicon: HALOT
  rationale: כרע denotes kneeling/bending the knee. 'Knelt on his knees' preserves
    the bodily posture and humility. 'Fell on his knees' is possible but slightly
    stronger than the verb requires.
- source_word: לְנֶגֶד אֵלִיָּהוּ
  chosen: before Elijah
  alternatives:
  - in front of Elijah
  - opposite Elijah
  lexicon: HALOT
  rationale: '''Before'' is idiomatic and preserves the deferential spatial sense
    in context.'
- source_word: וַיִּתְחַנֵּן אֵלָיו
  chosen: pleaded with him
  alternatives:
  - begged him
  - implored him
  lexicon: HALOT
  rationale: The hitpael of חנן expresses earnest supplication. 'Pleaded' conveys
    urgency without overstatement.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: Man of God
  alternatives:
  - O man of God
  lexicon: HALOT
  rationale: Established title for a prophet; capitalized as a recognized designation.
    The vocative force is conveyed by punctuation in direct speech.
- source_word: תִּיקַר נָא
  chosen: please let ... be precious
  alternatives:
  - please let ... be valued
  - please let ... be esteemed
  lexicon: HALOT
  rationale: יקר in the qal/jussive expresses being precious/valuable. In context
    the captain asks that their lives be spared because they are precious in Elijah's
    sight. This preserves the metaphor rather than flattening it to 'spare,' though
    that is the practical implication.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: נפש here refers to the person's life, not an abstract immaterial soul.
    'My life' best fits the immediate danger context.
- source_word: וְנֶפֶשׁ עֲבָדֶיךָ אֵלֶּה חֲמִשִּׁים
  chosen: and the life of these fifty your servants
  alternatives:
  - and the lives of these fifty servants of yours
  - and the life of these your fifty servants
  lexicon: HALOT
  rationale: The singular נפש can function collectively with a plural genitive; idiomatic
    English may use singular or plural. The chosen wording stays close to the Hebrew
    structure while remaining understandable. 'Servants' reflects עבדים in relation
    to the addressed superior; 'soldiers' would be interpretive.
- source_word: בְּעֵינֶיךָ
  chosen: in your sight
  alternatives:
  - in your eyes
  - before you
  lexicon: HALOT
  rationale: Common Hebrew idiom for evaluation or regard. 'In your sight' is natural
    English and preserves the metaphor.
