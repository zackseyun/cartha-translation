theological_decisions:
- issue: Rendering of נֶפֶשׁ in a life-threatening narrative
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: To avoid importing later anthropological assumptions, נפש is rendered
    according to immediate context as 'life.' The captain is asking Elijah not to
    let him and his men die, not making a doctrinal statement about the soul.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
