id: 2KI.1.1
reference: 2 Kings 1:1
source:
  edition: WLC
  text: וַ/יִּפְשַׁ֤ע מוֹאָב֙ בְּ/יִשְׂרָאֵ֔ל אַחֲרֵ֖י מ֥וֹת אַחְאָֽב׃
translation:
  text: After the death of Ahab, Moab rebelled against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Moab revolted against Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשַׁע
  chosen: rebelled
  alternatives:
  - transgressed
  - revolted
  lexicon: HALOT
  rationale: The verb פשע in political contexts commonly denotes rebellion or revolt
    against an overlord rather than generic moral transgression. Here, with Moab as
    subject and Israel as the power against whom the action is directed, 'rebelled'
    best captures the geopolitical sense in natural English.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the nation/name, following the policy to
    transliterate names.
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  - in Israel
  lexicon: HALOT
  rationale: The preposition ב with פשע is idiomatic for rebelling against someone.
    Rendering it woodenly as 'in Israel' or 'with Israel' would obscure the political
    relationship. 'Against Israel' expresses the sense clearly in English.
- source_word: אַחֲרֵי
  chosen: After
  alternatives:
  - following
  lexicon: HALOT
  rationale: Straightforward temporal marker introducing the circumstance of the rebellion.
- source_word: מוֹת
  chosen: the death of
  alternatives:
  - the dying of
  lexicon: HALOT
  rationale: Construct form with the following proper name; idiomatic English requires
    'the death of Ahab.'
- source_word: אַחְאָב
  chosen: Ahab
  rationale: Standard English transliteration of the personal name.
