id: 2KI.1.11
reference: 2 Kings 1:11
source:
  edition: WLC
  text: וַ/יָּ֜שָׁב וַ/יִּשְׁלַ֥ח אֵלָ֛י/ו שַׂר חֲמִשִּׁ֥ים אַחֵ֖ר וַ/חֲמִשָּׁ֑י/ו
    וַ/יַּ֨עַן֙ וַ/יְדַבֵּ֣ר אֵלָ֔י/ו אִ֚ישׁ הָ/אֱלֹהִ֔ים כֹּֽה אָמַ֥ר הַ/מֶּ֖לֶךְ
    מְהֵרָ֥ה רֵֽדָ/ה־־׃
translation:
  text: 'Again he sent to him another captain of fifty with his fifty. He answered
    and said to him, “Man of God, thus says the king: ‘Come down quickly.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Go down quickly.” The Hebrew verb simply means “go down/descend”; “come
      down” reflects the command as spoken from the king’s representative to Elijah
      above him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Again
  alternatives:
  - He returned
  - He turned back
  lexicon: HALOT
  rationale: In this narrative sequence, the idiom וַיָּשָׁב + following verb functions
    adverbially to mark repetition rather than physical return. 'Again' is natural
    English and preserves the sense that the king repeated the action.
- source_word: וַיִּשְׁלַח אֵלָיו
  chosen: he sent to him
  alternatives:
  - he sent against him
  - he sent
  lexicon: HALOT
  rationale: The verb שלח with אֶל marks sending someone to Elijah. 'To him' is the
    most straightforward rendering in context.
- source_word: שַׂר חֲמִשִּׁים
  chosen: captain of fifty
  alternatives:
  - commander of fifty
  - chief of fifty
  lexicon: HALOT
  rationale: This military title denotes the officer over a unit of fifty men. 'Captain
    of fifty' is idiomatic and fits the repeated formula in the passage.
- source_word: אַחֵר
  chosen: another
  alternatives:
  - a different
  - one more
  lexicon: HALOT
  rationale: Marks replacement of the previous captain with a new one.
- source_word: וַחֲמִשָּׁיו
  chosen: with his fifty
  alternatives:
  - and his fifty
  lexicon: HALOT
  rationale: 'The conjunction here is best rendered idiomatically in English as accompaniment:
    the captain came together with the fifty men under him.'
- source_word: וַיַּעַן וַיְדַבֵּר
  chosen: He answered and said
  alternatives:
  - He responded and said
  - He spoke up and said
  lexicon: HALOT
  rationale: This common Hebrew narrative pair is preserved with a standard English
    equivalent. It introduces the captain's formal address.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: Man of God
  alternatives:
  - O man of God
  lexicon: HALOT
  rationale: A recognized title for Elijah. The vocative force is clear from context;
    English punctuation supplies direct address without requiring 'O'.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  chosen: thus says the king
  alternatives:
  - this is what the king says
  - the king says this
  lexicon: HALOT
  rationale: A formal messenger formula. 'Thus says' preserves the authoritative tone
    and mirrors biblical speech formulas.
- source_word: מְהֵרָה
  chosen: quickly
  alternatives:
  - hurry
  - at once
  lexicon: HALOT
  rationale: An adverbial accusative expressing urgency. 'Quickly' is clear modern
    English and fits the imperative that follows.
- source_word: רֵדָה
  chosen: Come down
  alternatives:
  - Go down
  - Descend
  lexicon: HALOT
  rationale: Given the speaker's command to Elijah from below, English idiom prefers
    'come down' for movement toward the speaker, even though the Hebrew verb itself
    simply means 'go down/descend.'
