theological_decisions:
- issue: Rendering the prophetic title אִישׁ הָאֱלֹהִים
  chosen_reading: man of God
  alternative_readings:
  - the man of God
  rationale: The expression is a recognized title for a prophet. Rendering it as 'man
    of God' preserves the title and does not import later doctrinal meaning; the article
    is not required in idiomatic English predicate usage.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering אֵשׁ אֱלֹהִים
  chosen_reading: the fire of God
  alternative_readings:
  - fire from God
  - divine fire
  rationale: The Hebrew explicitly links the fire to God. 'The fire of God' preserves
    that attribution without overinterpreting mechanism or adding theological commentary.
  doctrine_reference: Translation philosophy §§1, 5
