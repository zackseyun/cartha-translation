id: 2KI.1.12
reference: 2 Kings 1:12
source:
  edition: WLC
  text: וַ/יַּ֣עַן אֵלִיָּה֮ וַ/יְדַבֵּ֣ר אֲלֵי/הֶם֒ אִם אִ֤ישׁ הָֽ/אֱלֹהִים֙ אָ֔נִי
    תֵּ֤רֶד אֵשׁ֙ מִן הַ/שָּׁמַ֔יִם וְ/תֹאכַ֥ל אֹתְ/ךָ֖ וְ/אֶת חֲמִשֶּׁ֑י/ךָ וַ/תֵּ֤רֶד
    אֵשׁ אֱלֹהִים֙ מִן הַ/שָּׁמַ֔יִם וַ/תֹּ֥אכַל אֹת֖/וֹ וְ/אֶת חֲמִשָּֽׁי/ו־־־־־־׃
translation:
  text: Elijah answered and said to them, “If I am a man of God, let fire come down
    from heaven and consume you and your fifty.” Then the fire of God came down from
    heaven and consumed him and his fifty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If I am the man of God.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “your fifty,” that is, the captain’s company of fifty men.
    reason: cultural_note
  - marker: c
    text: Or “fire from God came down from heaven.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a reply; 'answered' is idiomatic
    and preserves the dialogical force.
- source_word: וַיְדַבֵּר אֲלֵיהֶם
  chosen: and said to them
  alternatives:
  - and spoke to them
  lexicon: HALOT
  rationale: The collocation 'answered and said' is conventional in Hebrew narrative.
    'Said' is more natural English here while still reflecting the speech introduction.
- source_word: אִם אִישׁ הָאֱלֹהִים אָנִי
  chosen: If I am a man of God
  alternatives:
  - If I am the man of God
  lexicon: HALOT
  rationale: The phrase functions predicatively and idiomatically as a claim to prophetic
    status. English normally omits the article in this idiom. 'Man of God' preserves
    the Hebrew title without softening it.
- source_word: תֵּרֶד אֵשׁ מִן הַשָּׁמַיִם
  chosen: let fire come down from heaven
  alternatives:
  - may fire come down from heaven
  - fire will come down from heaven
  lexicon: HALOT
  rationale: The jussive/imprecatory force is best represented by 'let fire come down,'
    expressing Elijah's invocation rather than a mere prediction.
- source_word: וְתֹאכַל
  chosen: and consume
  alternatives:
  - and devour
  lexicon: HALOT
  rationale: אכל with fire is idiomatically 'consume' in English; this preserves the
    destructive sense without sounding overly archaic.
- source_word: אֹתְךָ
  chosen: you
  lexicon: HALOT
  rationale: Direct singular address to the captain; retained explicitly.
- source_word: חֲמִשֶּׁיךָ
  chosen: your fifty
  alternatives:
  - your fifty men
  lexicon: HALOT
  rationale: Literally 'your fifty,' referring to the captain's contingent. The shorter
    rendering preserves the Hebrew terseness while remaining intelligible in context.
- source_word: וַתֵּרֶד אֵשׁ אֱלֹהִים
  chosen: Then the fire of God came down
  alternatives:
  - Then fire came down from God
  - Then divine fire came down
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the fire of God,' emphasizing
    that the fire is from God and not merely natural. This also mirrors the Hebrew
    more closely than a looser paraphrase.
- source_word: וַתֹּאכַל אֹתוֹ וְאֶת חֲמִשָּׁיו
  chosen: and consumed him and his fifty
  alternatives:
  - and consumed him and his fifty men
  lexicon: HALOT
  rationale: Maintains the concise Hebrew expression and the singular captain plus
    his troop. 'Consumed' matches the earlier verb for consistency.
