id: 2KI.1.17
reference: 2 Kings 1:17
source:
  edition: WLC
  text: וַ/יָּ֜מָת כִּ/דְבַ֥ר יְהוָ֣ה אֲשֶׁר דִּבֶּ֣ר אֵלִיָּ֗הוּ וַ/יִּמְלֹ֤ךְ יְהוֹרָם֙ תַּחְתָּ֔י/ו בִּ/שְׁנַ֣ת שְׁתַּ֔יִם לִ/יהוֹרָ֥ם בֶּן יְהוֹשָׁפָ֖ט מֶ֣לֶךְ יְהוּדָ֑ה כִּ֛י לֹֽא הָ֥יָה ל֖/וֹ בֵּֽן׀־פ־־׃
translation:
  text: So he died, according to the word of Yahweh that Elijah had spoken. And Jehoram became king in his place in the second year of Jehoram son of Jehoshaphat, king of Judah, because he had no son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And he died ... And Jehoram reigned in his place.' The Hebrew verbs are simple narrative forms; 'became king' highlights accession, while 'reigned' is a more formal alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: So he died
  alternatives:
  - And he died
  - Then he died
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So he died' gives natural English sequence while preserving the simple verbal sense 'died.'
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the word of Yahweh
  - according to the LORD's word
  lexicon: HALOT
  rationale: כִּדְבַר expresses conformity to what was spoken. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֲשֶׁר דִּבֶּר אֵלִיָּהוּ
  chosen: that Elijah had spoken
  alternatives:
  - which Elijah had spoken
  - that he spoke through Elijah
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the word previously spoken by Elijah. English past perfect clarifies prior action relative to the death. 'Through Elijah' would over-interpret the syntax.
- source_word: וַיִּמְלֹךְ יְהוֹרָם תַּחְתָּיו
  chosen: And Jehoram became king in his place
  alternatives:
  - And Jehoram reigned in his place
  - And Jehoram became king after him
  lexicon: HALOT
  rationale: מלך in the wayyiqtol here marks accession. 'Became king' is idiomatic for enthronement; תַּחְתָּיו is captured by 'in his place.'
- source_word: בִּשְׁנַת שְׁתַּיִם לִיהוֹרָם
  chosen: in the second year of Jehoram
  alternatives:
  - in year two of Jehoram
  lexicon: HALOT
  rationale: The construct phrase denotes regnal dating. Standard English idiom is 'in the second year of.'
- source_word: בֶּן יְהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  chosen: son of Jehoshaphat, king of Judah
  alternatives:
  - the son of Jehoshaphat, the king of Judah
  lexicon: HALOT
  rationale: This apposition identifies which Jehoram is meant, distinguishing him from the northern king. The comma structure preserves the Hebrew relation cleanly.
- source_word: כִּי לֹא הָיָה לוֹ בֵּן
  chosen: because he had no son
  alternatives:
  - for he had no son
  - since he had no son
  lexicon: HALOT
  rationale: כִּי here gives the reason for the succession by a brother rather than a son. 'Because' makes the causal force explicit in modern English.
