id: 2KI.1.18
reference: 2 Kings 1:18
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י אֲחַזְיָ֖הוּ אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֽוֹא הֵ֣מָּה כְתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־׃פ
translation:
  text: Now the rest of the acts of Ahaziah, what he did—are they not written in the
    Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'recorded' for 'written'; the Hebrew says literally 'written,' using
      a standard royal-archive formula.
    reason: lexical_alternative
  - marker: b
    text: '''The Book of the Chronicles of the Kings of Israel'' refers to a royal
      annalistic source cited in Kings, not necessarily the biblical book of Chronicles.'
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר commonly introduces a concluding formula meaning 'the rest/remainder
    of.' Rendering with 'Now' reflects the conventional narrative transition signaled
    by prefixed וְ without over-literalizing it as simple 'and.'
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the regnal-summary formula, דִּבְרֵי often refers broadly to the recorded
    matters or acts of a king, not merely his spoken words. 'Acts' is idiomatic and
    fits the historiographic context.
- source_word: אֲחַזְיָהוּ
  chosen: Ahaziah
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: אֲשֶׁר עָשָׂה
  chosen: what he did
  alternatives:
  - which he did
  - that he did
  lexicon: HALOT
  rationale: This relative clause specifies the content of the 'acts.' 'What he did'
    is natural modern English and preserves the sense without unnecessary stiffness.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - surely they are
  - behold, they are not?
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Are
    they not' preserves the formulaic force used throughout Kings.
- source_word: הֵמָּה כְתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: Passive participle כְתוּבִים means 'written.' 'Written' is retained in
    the main text for formal transparency, though 'recorded' would also fit the idiom.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival formula English
    idiom is best served by 'in the Book.' סֵפֶר can denote a scroll/book; 'Book'
    is the conventional and clear rendering here.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This expression in royal-source citations refers to an annalistic record.
    'Chronicles' is the established and accurate rendering in this formula, though
    it should not be confused with the canonical book by context alone.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - belonging to the kings of Israel
  - for the kings of Israel
  lexicon: HALOT
  rationale: The לְ here functions idiomatically in the title of the source document.
    'Of the Kings of Israel' is the standard and natural English rendering of the
    archival title.
