id: 2KI.1.7
reference: 2 Kings 1:7
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר אֲלֵ/הֶ֔ם מֶ֚ה מִשְׁפַּ֣ט הָ/אִ֔ישׁ אֲשֶׁ֥ר עָלָ֖ה לִ/קְרַאתְ/כֶ֑ם
    וַ/יְדַבֵּ֣ר אֲלֵי/כֶ֔ם אֶת הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה־׃
translation:
  text: Then he said to them, “What was the appearance of the man who came up to meet
    you and spoke these words to you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What kind of man was he?” Literally, “What was the mishpat of the man...?”
      The Hebrew term can denote manner, description, or appearance; here it likely
      refers to the identifying description of the man.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶה
  chosen: What was
  alternatives:
  - What kind of
  - How
  lexicon: HALOT
  rationale: Introduces a question about the man's identifying characteristics. In
    English, 'What was' naturally sets up the predicate 'the appearance of the man.'
- source_word: מִשְׁפַּט
  chosen: appearance
  alternatives:
  - manner
  - description
  - custom
  lexicon: HALOT
  rationale: Although often meaning 'judgment' or 'custom/manner,' in this context
    it asks for the identifying description of the man. 'Appearance' best fits the
    immediate reply in v. 8, which describes his clothing and bodily presentation.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - this man
  lexicon: HALOT
  rationale: Definite reference to the specific individual encountered by the messengers.
- source_word: עָלָה
  chosen: came up
  alternatives:
  - went up
  - came
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'went up/came up.' Since the man approached
    the messengers from their perspective, 'came up' preserves the directional nuance
    without awkwardness.
- source_word: לִקְרַאתְכֶם
  chosen: to meet you
  alternatives:
  - to encounter you
  lexicon: HALOT
  rationale: Standard idiomatic rendering for לקראת in encounter contexts.
- source_word: וַיְדַבֵּר אֲלֵיכֶם
  chosen: and spoke ... to you
  alternatives:
  - and said to you
  lexicon: HALOT
  rationale: The second דבר governs 'these words'; 'spoke these words to you' is slightly
    more natural than repeating 'said' while preserving the verbal sense.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: HALOT
  rationale: A close and natural rendering of the direct object phrase, preserving
    the concreteness of the reported speech.
