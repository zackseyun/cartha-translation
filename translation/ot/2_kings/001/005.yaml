id: 2KI.1.5
reference: 2 Kings 1:5
source:
  edition: WLC
  text: וַ/יָּשׁ֥וּבוּ הַ/מַּלְאָכִ֖ים אֵלָ֑י/ו וַ/יֹּ֥אמֶר אֲלֵי/הֶ֖ם מַה זֶּ֥ה שַׁבְתֶּֽם־׃
translation:
  text: The messengers returned to him, and he said to them, “Why have you returned?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “What is this—you have returned?” an idiom meaning “Why
      have you returned?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשׁוּבוּ
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: From שוב, here in narrative sequence with the sense of going back to
    the one who sent them. 'Returned' is natural modern English and preserves the
    directional sense without over-literal awkwardness.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the angels
  - the envoys
  lexicon: HALOT
  rationale: In this narrative context these are human agents sent by the king, not
    heavenly beings. 'Messengers' is the most direct and contextually accurate rendering
    of מלאכים here.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - back to him
  lexicon: HALOT
  rationale: The preposition marks direction toward the king. 'To him' is sufficient
    because the verb 'returned' already carries the sense of going back.
- source_word: וַיֹּאמֶר אֲלֵיהֶם
  chosen: and he said to them
  alternatives:
  - and he asked them
  lexicon: HALOT
  rationale: The Hebrew uses the common verb 'said'; although the content is a question,
    English can preserve the formal narrative style with 'said to them' rather than
    interpretively shifting to 'asked them'.
- source_word: מַה זֶּה
  chosen: Why
  alternatives:
  - What is this
  - For what reason
  lexicon: HALOT
  rationale: Literally 'What is this...?' but idiomatically introducing a question
    about the reason for their action. 'Why' best captures the sense in clear English
    while remaining faithful to the function of the Hebrew expression.
- source_word: שַׁבְתֶּם
  chosen: have you returned
  alternatives:
  - did you return
  - have you come back
  lexicon: HALOT
  rationale: Second masculine plural of שוב, matching the plural addressees. Present
    perfect English ('have you returned') fits the immediate-result question in dialogue
    and reads naturally.
