id: 2KI.1.6
reference: 2 Kings 1:6
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ אֵלָ֜י/ו אִ֣ישׁ עָלָ֣ה לִ/קְרָאתֵ֗/נוּ וַ/יֹּ֣אמֶר אֵלֵי/נוּ֮
    לְכ֣וּ שׁוּבוּ֮ אֶל הַ/מֶּ֣לֶךְ אֲשֶׁר שָׁלַ֣ח אֶתְ/כֶם֒ וְ/דִבַּרְתֶּ֣ם אֵלָ֗י/ו
    כֹּ֚ה אָמַ֣ר יְהוָ֔ה הַֽ/מִ/בְּלִ֤י אֵין אֱלֹהִים֙ בְּ/יִשְׂרָאֵ֔ל אַתָּ֣ה שֹׁלֵ֔חַ
    לִ/דְרֹ֕שׁ בְּ/בַ֥עַל זְב֖וּב אֱלֹהֵ֣י עֶקְר֑וֹן לָ֠/כֵן הַ/מִּטָּ֞ה אֲשֶׁר עָלִ֥יתָ
    שָּׁ֛ם לֹֽא תֵרֵ֥ד מִמֶּ֖/נָּה כִּֽי מ֥וֹת תָּמֽוּת׀־־־־־־׃
translation:
  text: 'And they said to him, “A man came up to meet us and said to us, ‘Go, return
    to the king who sent you, and speak to him: Thus says the LORD, “Is it because
    there is no God in Israel that you are sending to inquire of Baal-zebub, the god
    of Ekron? Therefore the bed on which you have gone up there—you will not come
    down from it, for you will surely die.”’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Is it for lack of a God in Israel that you are sending to inquire of
      Baal-zebub…?”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The common noun means 'man' or 'person.' Here the messengers do not yet
    identify Elijah by name, so 'a man' preserves the narrative perspective and the
    masculine singular form.
- source_word: עָלָה לִקְרָאתֵנוּ
  chosen: came up to meet us
  alternatives:
  - went up to meet us
  - came to meet us
  lexicon: HALOT
  rationale: עָלָה literally means 'go up/come up.' In narrative English, 'came up
    to meet us' preserves the motion toward the speakers without sounding wooden;
    retaining 'up' reflects the Hebrew verb rather than flattening it to simply 'came.'
- source_word: לְכוּ שׁוּבוּ
  chosen: Go, return
  alternatives:
  - Go back
  - Come, return
  lexicon: HALOT
  rationale: The paired imperatives are both preserved. 'Go, return' reflects the
    Hebrew sequence more closely than collapsing it into a single English command.
- source_word: וְדִבַּרְתֶּם אֵלָיו
  chosen: and speak to him
  alternatives:
  - and say to him
  - and tell him
  lexicon: HALOT
  rationale: The verb דבר is broader than the more specific אמר and commonly means
    'speak.' 'Speak to him' preserves the lexical distinction while fitting the direct
    quotation that follows.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    the divine name, following Jewish reverence tradition and the Septuagintal pattern.
- source_word: הֲמִבְּלִי אֵין אֱלֹהִים בְּיִשְׂרָאֵל
  chosen: Is it because there is no God in Israel
  alternatives:
  - Is it for lack of a God in Israel
  - Is it because there is not a God in Israel
  lexicon: HALOT
  rationale: 'The idiom expresses incredulous rebuke: ''Is it because there is no
    God in Israel...?'' This keeps the rhetorical force and natural English while
    staying close to the Hebrew structure.'
- source_word: שֹׁלֵחַ לִדְרֹשׁ
  chosen: you are sending to inquire of
  alternatives:
  - you send to seek
  - you are sending to consult
  lexicon: HALOT
  rationale: דרש in this context means seeking an oracle or consultation from a deity.
    'Inquire of' is idiomatic and preserves the religious-consultative sense.
- source_word: בַּעַל זְבוּב
  chosen: Baal-zebub
  alternatives:
  - Baal Zebub
  lexicon: HALOT
  rationale: This is a proper divine name, so it is transliterated rather than translated,
    in keeping with the philosophy to transliterate names.
- source_word: אֱלֹהֵי עֶקְרוֹן
  chosen: the god of Ekron
  alternatives:
  - god of Ekron
  lexicon: HALOT
  rationale: The construct phrase identifies Baal-zebub as the deity associated with
    Ekron. Including the article in English is natural and clarifies the apposition.
- source_word: הַמִּטָּה
  chosen: the bed
  alternatives:
  - the couch
  lexicon: HALOT
  rationale: מִטָּה can mean bed or couch. In this context of illness and impending
    death, 'bed' best fits the scene and common English usage.
- source_word: אֲשֶׁר עָלִיתָ שָּׁם
  chosen: on which you have gone up there
  alternatives:
  - which you have climbed into
  - to which you have gone up
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'gone up there,' likely referring to getting
    onto the sickbed or upper chamber setting. The translation keeps both the relative
    clause and the adverb 'there' rather than omitting them.
- source_word: לֹא תֵרֵד מִמֶּנָּה
  chosen: you will not come down from it
  alternatives:
  - you will not go down from it
  lexicon: HALOT
  rationale: ירד is literally 'go down.' 'Come down' is slightly more idiomatic in
    English for descending from a bed or chamber while preserving the image.
- source_word: כִּי מוֹת תָּמוּת
  chosen: for you will surely die
  alternatives:
  - for dying you shall die
  - for you shall certainly die
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the certainty of
    death. 'You will surely die' is the standard clear English equivalent.
