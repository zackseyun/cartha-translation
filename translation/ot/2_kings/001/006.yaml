  from: on which you have gone up there
  to: to which you have gone up
  rationale: The Hebrew construction with a relative clause followed by a resumptive adverb (אֲשֶׁר...שָּׁם) is common in Semitic languages but creates redundancy and awkwardness in English. The current rendering, 'on which you have gone up there,' is a literalism that sounds unnatural. A smoother, more idiomatic rendering that still captures the full meaning would be 'to which you have gone up' or 'that you have gone up onto.' This change would better align with the 'optimal-equivalence' philosophy by improving clarity and naturalness without sacrificing fidelity.
