theological_decisions:
- issue: Nature of Elijah's conditional statement
  chosen_reading: 'Rendered as an invocation/jussive: ''let fire come down from heaven'''
  alternative_readings:
  - 'Rendered as predictive future: ''fire will come down from heaven'''
  rationale: The Hebrew verb form תֵּרֶד is jussive in this context, expressing a
    call for divine confirmation/judgment rather than merely forecasting an event.
    This preserves the text's portrayal of prophetic authority without adding explanation.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
