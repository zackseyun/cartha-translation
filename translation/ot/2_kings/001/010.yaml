id: 2KI.1.10
reference: 2 Kings 1:10
source:
  edition: WLC
  text: וַ/יַּעֲנֶ֣ה אֵלִיָּ֗הוּ וַ/יְדַבֵּר֮ אֶל שַׂ֣ר הַ/חֲמִשִּׁים֒ וְ/אִם אִ֤ישׁ
    אֱלֹהִים֙ אָ֔נִי תֵּ֤רֶד אֵשׁ֙ מִן הַ/שָּׁמַ֔יִם וְ/תֹאכַ֥ל אֹתְ/ךָ֖ וְ/אֶת חֲמִשֶּׁ֑י/ךָ
    וַ/תֵּ֤רֶד אֵשׁ֙ מִן הַ/שָּׁמַ֔יִם וַ/תֹּ֥אכַל אֹת֖/וֹ וְ/אֶת חֲמִשָּֽׁי/ו־־־־־־׃
translation:
  text: Elijah answered and said to the captain of fifty, “But if I am a man of God,
    let fire come down from heaven and consume you and your fifty.” Then fire came
    down from heaven and consumed him and his fifty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fire will come down from heaven and consume you and your fifty.' The
      Hebrew can be taken as a predictive statement, though the main text renders
      it as a jussive invocation.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲנֶה
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a reply. 'Answered' preserves
    the formal dialogue structure common in Hebrew narrative.
- source_word: וַיְדַבֵּר
  chosen: and said
  alternatives:
  - and spoke
  lexicon: HALOT
  rationale: Although literally 'and spoke,' the idiom ענה...וידבר in direct speech
    is naturally rendered 'answered and said' in English.
- source_word: שַׂר הַחֲמִשִּׁים
  chosen: the captain of fifty
  alternatives:
  - the commander of fifty
  - the captain of the fifty
  lexicon: HALOT
  rationale: Refers to the officer over a unit of fifty men. 'Captain of fifty' is
    concise, idiomatic, and fits the military context.
- source_word: וְאִם
  chosen: But if
  alternatives:
  - If
  - And if
  lexicon: HALOT
  rationale: Introduces a conditional retort with adversative force in context. 'But
    if' captures Elijah's pointed response better than a bare 'if'.
- source_word: אִישׁ אֱלֹהִים
  chosen: a man of God
  alternatives:
  - God's man
  lexicon: HALOT
  rationale: Established Hebrew title for a prophet or divinely commissioned figure.
    'Man of God' preserves the title's recognizable force without paraphrase.
- source_word: תֵּרֶד אֵשׁ מִן הַשָּׁמַיִם
  chosen: let fire come down from heaven
  alternatives:
  - fire will come down from heaven
  - may fire come down from heaven
  lexicon: HALOT
  rationale: The jussive form is best represented as an imprecatory/jussive wish or
    invocation, not a simple future prediction. 'Let fire come down' captures the
    force naturally in English.
- source_word: וְתֹאכַל
  chosen: and consume
  alternatives:
  - and devour
  - and eat up
  lexicon: HALOT
  rationale: אכל with fire is idiomatically 'consume' in English. This preserves the
    destructive sense without overly vivid paraphrase.
- source_word: חֲמִשֶּׁיךָ
  chosen: your fifty
  alternatives:
  - your fifty men
  - your company of fifty
  lexicon: HALOT
  rationale: The suffix refers to the captain's contingent. 'Your fifty' is compact
    and closely follows the Hebrew; the military sense is already established by 'captain
    of fifty.'
- source_word: וַתֵּרֶד אֵשׁ מִן הַשָּׁמַיִם
  chosen: Then fire came down from heaven
  alternatives:
  - And fire came down from heaven
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative. 'Then' gives clear English narrative
    flow while preserving sequence.
- source_word: וַתֹּאכַל אֹתוֹ
  chosen: and consumed him
  alternatives:
  - and devoured him
  lexicon: HALOT
  rationale: Same fire-consumption idiom as above; 'consumed' maintains consistency
    and readability.
- source_word: וְאֶת חֲמִשָּׁיו
  chosen: and his fifty
  alternatives:
  - and his fifty men
  - and his company
  lexicon: HALOT
  rationale: Refers to the captain's troop. 'His fifty' mirrors the Hebrew closely
    and avoids unnecessary expansion.
