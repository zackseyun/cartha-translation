id: 2KI.1.4
reference: 2 Kings 1:4
source:
  edition: WLC
  text: וְ/לָ/כֵן֙ כֹּֽה אָמַ֣ר יְהוָ֔ה הַ/מִּטָּ֞ה אֲשֶׁר עָלִ֥יתָ שָּׁ֛ם לֹֽא תֵרֵ֥ד מִמֶּ֖/נָּה כִּ֣י מ֣וֹת תָּמ֑וּת וַ/יֵּ֖לֶךְ אֵלִיָּֽה־־־׃
translation:
  text: 'Therefore, this is what the LORD says: ‘You will not come down from the bed that you have gone up onto, for you will surely die.’ And Elijah went.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Thus says the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the bed that you went up there onto'; the wording preserves the Hebrew contrast between 'go up' and 'come down.'
    reason: lexical_alternative
  - marker: c
    text: Or 'that you went up there onto'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְלָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Therefore now
  lexicon: HALOT
  rationale: Marks the inferential consequence of the preceding rebuke and judgment; 'therefore' preserves the formal connection clearly in natural English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: this is what the LORD says
  alternatives:
  - thus says the LORD
  - thus has the LORD said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'This is what ... says' is readable modern English while preserving the force of the formula. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested terms table for the divine name.
- source_word: הַמִּטָּה
  chosen: the bed
  alternatives:
  - the couch
  - the sickbed
  lexicon: HALOT
  rationale: מִטָּה commonly means 'bed, couch.' In context Ahaziah is confined after injury, so 'bed' is the most natural and sufficiently specific; 'sickbed' is interpretive and stronger than the Hebrew explicitly states.
- source_word: אֲשֶׁר עָלִיתָ שָּׁם
  chosen: that you went up there onto
  alternatives:
  - which you have gone up on
  - that you climbed up there onto
  lexicon: HALOT
  rationale: The Hebrew uses עלה, 'go up/ascend,' with שׁם 'there.' Because the object is a bed, English needs 'onto' for idiomatic clarity. Retaining 'went up' preserves the Hebrew imagery better than flattening to 'got into'.
- source_word: לֹא תֵרֵד מִמֶּנָּה
  chosen: You will not come down from
  alternatives:
  - you shall not go down from
  - you will not get down from
  lexicon: HALOT
  rationale: ירד is the natural antonym to עלה. 'Come down from' is idiomatic and preserves the vertical contrast established in the Hebrew.
- source_word: כִּי מוֹת תָּמוּת
  chosen: for you will surely die
  alternatives:
  - for dying you shall die
  - for you shall certainly die
  lexicon: HALOT
  rationale: Infinitive absolute + finite verb intensifies certainty. 'You will surely die' is the standard clear English equivalent.
- source_word: וַיֵּלֶךְ אֵלִיָּה
  chosen: And Elijah went
  alternatives:
  - Then Elijah went
  - And Elijah departed
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Went' is the plain sense of הלך; 'departed' is possible but slightly more interpretive.
