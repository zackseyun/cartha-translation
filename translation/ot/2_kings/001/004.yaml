  category: awkward_english
  tier: 1
  from: that you went up there onto
  to: that you have gone up onto
  rationale: The current rendering is an overly literal translation of the Hebrew relative clause `אֲשֶׁר עָלִיתָ שָּׁם`. The word `שָּׁם` ('there') functions as a resumptive adverb, which is common in Hebrew syntax but creates an awkward and redundant phrase in English. A more natural rendering like 'that you have gone up onto' preserves the essential meaning and the important contrast between 'going up' (`עָלִיתָ`) and 'coming down' (`תֵרֵד`) without the clunky syntax.
