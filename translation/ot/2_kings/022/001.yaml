id: 2KI.22.1
reference: 2 Kings 22:1
source:
  edition: WLC
  text: בֶּן שְׁמֹנֶ֤ה שָׁנָה֙ יֹאשִׁיָּ֣הוּ בְ/מָלְכ֔/וֹ וּ/שְׁלֹשִׁ֤ים וְ/אַחַת֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ יְדִידָ֥ה בַת עֲדָ֖יָה מִ/בָּצְקַֽת־־׃
translation:
  text: Josiah was eight years old when he began to reign, and he reigned thirty-one
    years in Jerusalem. His mother’s name was Jedidah daughter of Adaiah, from Bozkath.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן שְׁמֹנֶה שָׁנָה
  chosen: was eight years old
  alternatives:
  - was a son of eight years
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'a son of eight years,' a standard age expression.
    Natural English requires 'was eight years old' while preserving the precise age.
- source_word: בְמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - when he became king
  - at his reigning
  lexicon: HALOT
  rationale: The preposition with the infinitive/verb form marks the time of accession.
    'When he began to reign' is a standard and clear English rendering in regnal formulas.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb denotes exercising kingship/reigning, not merely holding the
    title. 'He reigned' fits the regnal summary formula.
- source_word: וּשְׁלֹשִׁים וְאַחַת שָׁנָה
  chosen: thirty-one years
  alternatives:
  - thirty and one years
  lexicon: HALOT
  rationale: Standard English number expression; no meaning is lost by smoothing the
    Hebrew counting style.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative phrase indicating the seat of his reign.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is the conventional genealogical formula. The chosen rendering is
    idiomatic modern English while preserving the informational structure.
- source_word: יְדִידָה
  chosen: Jedidah
  lexicon: HALOT
  rationale: Personal names are transliterated by project policy rather than translated.
- source_word: בַת עֲדָיָה
  chosen: daughter of Adaiah
  lexicon: HALOT
  rationale: Standard filial expression; names are transliterated.
- source_word: מִבָּצְקַת
  chosen: from Bozkath
  alternatives:
  - of Bozkath
  lexicon: HALOT
  rationale: The prefixed preposition מ indicates origin. 'From Bozkath' is the most
    direct rendering, though 'of Bozkath' would also be acceptable in English genealogy
    style.
