id: 2KI.22.11
reference: 2 Kings 22:11
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כִּ/שְׁמֹ֣עַ הַ/מֶּ֔לֶךְ אֶת דִּבְרֵ֖י סֵ֣פֶר הַ/תּוֹרָ֑ה וַ/יִּקְרַ֖ע
    אֶת בְּגָדָֽי/ו־־׃
translation:
  text: And when the king heard the words of the Book of the Law, he tore his clothes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the scroll of the law.' The Hebrew סֵפֶר can refer to a written scroll
      or book document.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative development. In English,
    a simple connective 'And' with the following temporal clause conveys the progression
    naturally without the wooden 'it happened.'
- source_word: כִּשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - as ... heard
  - upon hearing
  lexicon: HALOT
  rationale: The preposition כ with infinitive construct of שמע marks temporal circumstance.
    'When the king heard' is idiomatic and preserves the sequence.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun with article.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the matters of
  - the contents of
  lexicon: HALOT
  rationale: דבר in construct here most naturally means 'words,' referring to the
    spoken reading/content of the discovered scroll. 'Words of' preserves the formal
    link to the Hebrew.
- source_word: סֵפֶר הַתּוֹרָה
  chosen: the Book of the Law
  alternatives:
  - the scroll of the law
  - the book of instruction
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/book document; 'Book' is the conventional and
    clear rendering in this historical context. תּוֹרָה here refers specifically to
    the covenantal law corpus, so 'Law' is the most contextually appropriate English
    equivalent. 'Scroll' is possible but not necessary in the main text.
- source_word: וַיִּקְרַע
  chosen: he tore
  alternatives:
  - he ripped
  lexicon: HALOT
  rationale: קרע means to tear/rend. 'Tore' is standard, dignified English for this
    gesture of grief and alarm.
- source_word: בְּגָדָיו
  chosen: his clothes
  alternatives:
  - his garments
  - his robes
  lexicon: HALOT
  rationale: בגד is clothing/garment. 'Clothes' is readable modern English; 'garments'
    is more formal but less natural. The plural possessive is preserved.
