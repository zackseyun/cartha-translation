theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered reference in אֲבֹתֵינוּ
  chosen_reading: our fathers
  alternative_readings:
  - our ancestors
  rationale: The source text is explicitly masculine plural and refers to the forefathers of the nation. Per the translation philosophy, gender-accurate rendering is preferred over neutralizing language unless context requires otherwise.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
