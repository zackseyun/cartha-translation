id: 2KI.22.13
reference: 2 Kings 22:13
source:
  edition: WLC
  text: לְכוּ֩ דִרְשׁ֨וּ אֶת יְהוָ֜ה בַּעֲדִ֣/י וּ/בְעַד הָ/עָ֗ם וּ/בְעַד֙ כָּל יְהוּדָ֔ה עַל דִּבְרֵ֛י הַ/סֵּ֥פֶר הַ/נִּמְצָ֖א הַ/זֶּ֑ה כִּֽי גְדוֹלָ֞ה חֲמַ֣ת יְהוָ֗ה אֲשֶׁר הִיא֙ נִצְּתָ֣ה בָ֔/נוּ עַל֩ אֲשֶׁ֨ר לֹֽא שָׁמְע֜וּ אֲבֹתֵ֗י/נוּ עַל דִּבְרֵי֙ הַ/סֵּ֣פֶר הַ/זֶּ֔ה לַ/עֲשׂ֖וֹת כְּ/כָל הַ/כָּת֥וּב עָלֵֽי/נוּ־־־־־־־־־׃
translation:
  text: Go, inquire of Yahweh for me, and for the people, and for all Judah, concerning the words of this book that has been found. For great is the wrath of Yahweh that has been kindled against us, because our fathers have not listened to the words of this book, to do according to all that is written concerning us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seek the LORD' or 'consult the LORD.' The Hebrew verb can denote seeking God generally or inquiring of him for guidance; here the context favors formal inquiry.
    reason: lexical_alternative
  - marker: b
    text: Or 'our ancestors.' Hebrew 'our fathers' is retained in the main text because the source is explicitly masculine and refers to the nation's forefathers.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִרְשׁוּ אֶת־יְהוָה
  chosen: inquire of the LORD
  alternatives:
  - seek the LORD
  - consult the LORD
  lexicon: HALOT
  rationale: דרשׁ with God as object in this context refers to seeking divine guidance or an oracle, not merely general devotion. 'Inquire of' best fits Josiah's command to consult YHWH about the discovered book.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and matching the stated doctrine guidance.
- source_word: בַּעֲדִי וּבְעַד הָעָם וּבְעַד כָּל־יְהוּדָה
  chosen: for me, and for the people, and for all Judah
  alternatives:
  - on behalf of me, and of the people, and of all Judah
  lexicon: HALOT
  rationale: בעד here expresses representation or intercession. 'For' is natural English and preserves the intercessory sense without overformal wording.
- source_word: עַל דִּבְרֵי הַסֵּפֶר הַנִּמְצָא הַזֶּה
  chosen: concerning the words of this book that has been found
  alternatives:
  - about the words of this found book
  - regarding the matters in this book that was found
  lexicon: HALOT
  rationale: עַל with דברי here introduces the subject matter of inquiry. 'Concerning the words' keeps the textual focus of Josiah's concern. The participle הנמצא is rendered as a relative clause in natural English.
- source_word: חֲמַת יְהוָה
  chosen: the wrath of the LORD
  alternatives:
  - the fury of the LORD
  - the anger of the LORD
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath or fury. 'Wrath' best preserves the covenantal and judicial force in this context.
- source_word: נִצְּתָה בָנוּ
  chosen: has been kindled against us
  alternatives:
  - has burned against us
  - has been poured out on us
  lexicon: HALOT
  rationale: The verb from יצת conveys being ignited or kindled. In idiomatic English with divine wrath, 'kindled against us' is both faithful and natural. 'Against us' brings out the hostile direction implied by the context better than a bare 'in us/upon us'.
- source_word: לֹא שָׁמְעוּ אֲבֹתֵינוּ
  chosen: our fathers have not listened
  alternatives:
  - our fathers have not obeyed
  - our ancestors have not listened
  lexicon: HALOT
  rationale: שׁמע can mean hear with obedience, but the immediate wording is auditory-receptive toward 'the words of this book.' 'Listened' preserves the lexical sense, while the following infinitive 'to do' supplies the obedience dimension. 'Fathers' is retained as gender-accurate and source-near.
- source_word: לַעֲשׂוֹת כְּכָל־הַכָּתוּב
  chosen: to do according to all that is written
  alternatives:
  - to act according to all that is written
  - to do all that is written
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result tied to listening: they failed to listen so as to do. ''According to all that is written'' preserves the comparative preposition כְּ and the comprehensive force.'
- source_word: עָלֵינוּ
  chosen: concerning us
  alternatives:
  - about us
  - against us
  - for us
  lexicon: HALOT
  rationale: The phrase likely refers to what is written as applying to the present community. 'Concerning us' preserves that applicability without prematurely narrowing it to blessing or judgment alone, though the context is ominous.
