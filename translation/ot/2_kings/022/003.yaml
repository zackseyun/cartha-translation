id: 2KI.22.3
reference: 2 Kings 22:3
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/שְׁמֹנֶ֤ה עֶשְׂרֵה֙ שָׁנָ֔ה לַ/מֶּ֖לֶךְ יֹאשִׁיָּ֑הוּ שָׁלַ֣ח הַ֠/מֶּלֶךְ אֶת שָׁפָ֨ן בֶּן אֲצַלְיָ֤הוּ בֶן מְשֻׁלָּם֙ הַ/סֹּפֵ֔ר בֵּ֥ית יְהוָ֖ה לֵ/אמֹֽר־־־׃
translation:
  text: Now in the eighteenth year of King Josiah, the king sent Shaphan son of Azaliah, son of Meshullam, the scribe, to the house of Yahweh, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD.' Literally, 'the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now in / And it happened in
  alternatives:
  - And it happened
  - Now it came about
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a new episode. In English, a simple temporal transition is more natural than the wooden 'and it happened,' while still signaling continuation in the narrative.
- source_word: בִּשְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  chosen: in the eighteenth year
  alternatives:
  - when eighteen years had passed
  lexicon: HALOT
  rationale: Standard regnal-year dating formula; 'in the eighteenth year' is the natural and sufficiently formal rendering.
- source_word: לַמֶּלֶךְ יֹאשִׁיָּהוּ
  chosen: of King Josiah
  alternatives:
  - of Josiah the king
  lexicon: HALOT
  rationale: Construct-like dating expression indicating the year of Josiah's reign. 'Of King Josiah' is idiomatic English and preserves the regnal sense.
- source_word: שָׁלַח הַמֶּלֶךְ
  chosen: the king sent
  alternatives:
  - King Josiah sent
  lexicon: HALOT
  rationale: The Hebrew explicitly repeats 'the king' after naming Josiah in the dating clause. Retaining 'the king sent' reflects the source structure without awkwardness.
- source_word: שָׁפָן
  chosen: Shaphan
  rationale: Standard transliteration of the personal name.
- source_word: בֶּן אֲצַלְיָהוּ בֶן מְשֻׁלָּם
  chosen: son of Azaliah, son of Meshullam
  rationale: Preserves the Hebrew patronymic chain straightforwardly.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the court secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary/official, but 'scribe' is the broad, transparent rendering and fits the historical setting. More specific bureaucratic nuances are possible but not required by the immediate context.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew while remaining clear.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'with this message:'
  - to say,
  lexicon: HALOT
  rationale: Standard speech introducer. Since the next verse gives the content of the commission, 'saying,' is the most direct and formally transparent rendering.
