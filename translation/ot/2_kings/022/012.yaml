id: 2KI.22.12
reference: 2 Kings 22:12
source:
  edition: WLC
  text: וַ/יְצַ֣ו הַ/מֶּ֡לֶךְ אֶת חִלְקִיָּ֣ה הַ/כֹּהֵ֡ן וְ/אֶת אֲחִיקָ֣ם בֶּן שָׁ֠פָן
    וְ/אֶת עַכְבּ֨וֹר בֶּן מִיכָיָ֜ה וְ/אֵ֣ת שָׁפָ֣ן הַ/סֹּפֵ֗ר וְ/אֵ֛ת עֲשָׂיָ֥ה
    עֶֽבֶד הַ/מֶּ֖לֶךְ לֵ/אמֹֽר־־־־־׀־׃
translation:
  text: Then the king commanded Hilkiah the priest, Ahikam son of Shaphan, Achbor
    son of Micaiah, Shaphan the scribe, and Asaiah the king’s servant, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Shaphan the secretary." The Hebrew term can refer to a royal scribe
      or administrative secretary.
    reason: lexical_alternative
  - marker: b
    text: Or "Asaiah the king’s official." The Hebrew literally reads "servant," which
      in a royal court can denote an official in the king’s service.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says "Hilkiah the priest," not explicitly "the high priest."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of צוה narrates a past action. "Commanded"
    best reflects the authoritative force of the verb in royal speech without overstating
    beyond the Hebrew.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward definite noun; rendered formally as the subject of the
    clause.
- source_word: חִלְקִיָּה הַכֹּהֵן
  chosen: Hilkiah the priest
  alternatives:
  - Hilkiah the high priest
  lexicon: HALOT
  rationale: The Hebrew here has simply "the priest" (הכהן), not explicitly "high
    priest." Although context may identify Hilkiah as chief priestly figure, the translation
    should not import a higher title not present in this verse.
- source_word: אֲחִיקָם בֶּן שָׁפָן
  chosen: Ahikam son of Shaphan
  alternatives:
  - Ahikam the son of Shaphan
  lexicon: HALOT
  rationale: '"Son of" is the standard, natural rendering of בן in genealogical identification.'
- source_word: עַכְבּוֹר בֶּן מִיכָיָה
  chosen: Achbor son of Micaiah
  alternatives:
  - Akbor son of Mikayah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English conventions. "Micaiah"
    is a familiar and transparent English form for מיכיה.
- source_word: שָׁפָן הַסֹּפֵר
  chosen: Shaphan the scribe
  alternatives:
  - Shaphan the secretary
  lexicon: HALOT
  rationale: ' ספר in royal administrative contexts can denote an official secretary
    or scribe. "Scribe" preserves the lexical form and remains understandable in modern
    English.'
- source_word: עֲשָׂיָה עֶבֶד הַמֶּלֶךְ
  chosen: Asaiah the king’s servant
  alternatives:
  - Asaiah the king’s official
  lexicon: HALOT
  rationale: ' עבד literally means "servant." In court contexts it can denote an official
    in royal service, but unlike cases where bonded status is theologically salient,
    here "servant" is the most direct and contextually suitable rendering.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This infinitive introduces the content of the command in the next verse.
    "Saying," is idiomatic English and preserves the forward linkage.
