id: 2KI.22.5
reference: 2 Kings 22:5
source:
  edition: WLC
  text: ו/יתנ/ה עַל יַד֙ עֹשֵׂ֣י הַ/מְּלָאכָ֔ה הַ/מֻּפְקָדִ֖ים ב/בית יְהוָ֑ה וְ/יִתְּנ֣וּ
    אֹת֗/וֹ לְ/עֹשֵׂ֤י הַ/מְּלָאכָה֙ אֲשֶׁר֙ בְּ/בֵ֣ית יְהוָ֔ה לְ/חַזֵּ֖ק בֶּ֥דֶק
    הַ/בָּֽיִת־׃
translation:
  text: and let him put it into the hands of the workmen who are appointed in the
    house of the LORD, and let them give it to the workmen who are in the house of
    the LORD to repair the damage to the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he shall give it into the hand of the workmen.' The Hebrew verb
      is 'give,' but the idiom means to place something into someone's custody.
    reason: lexical_alternative
  - marker: b
    text: '''Repair the damage'' is literally ''strengthen the breach/damage'' of
      the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתנה
  chosen: and let him put it
  alternatives:
  - and he shall give it
  - and let him give it
  lexicon: HALOT
  rationale: נתן commonly means 'give,' but with the idiom עַל־יַד ('into the hand[s]
    of') the sense is effectively 'place/put into the hands of.' The jussive form
    in context carries an instruction, so 'let him put it' best reflects both syntax
    and force in natural English.
- source_word: עַל יַד
  chosen: into the hands of
  alternatives:
  - by the hand of
  - to the hand of
  lexicon: HALOT
  rationale: The prepositional idiom עַל יַד with נתן indicates entrusting something
    to someone's control or custody. English plural 'hands' is idiomatic here.
- source_word: עֹשֵׂי הַמְּלָאכָה
  chosen: the workmen
  alternatives:
  - those doing the work
  - the workers
  lexicon: HALOT
  rationale: Literally 'doers of the work.' 'Workmen' is concise and fits the temple-repair
    context. It refers to laborers/overseers involved in the project, not generic
    servants.
- source_word: הַמֻּפְקָדִים
  chosen: who are appointed
  alternatives:
  - who are overseers
  - who are in charge
  - who are entrusted
  lexicon: HALOT
  rationale: From פקד in the Hophal/passive sense, indicating those who have been
    appointed or put in charge. 'Who are appointed' preserves the passive nuance without
    over-specifying their exact rank.
- source_word: בבית יהוה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Following doctrine, יהוה is rendered
    'the LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew
    while remaining clear.
- source_word: ויתנו אתו
  chosen: and let them give it
  alternatives:
  - and they shall give it
  - and let them hand it over
  lexicon: HALOT
  rationale: The verb remains נתן, now with plural subject. 'Give it' is the straightforward
    continuation of the chain of custody described in the verse.
- source_word: אשר בבית יהוה
  chosen: who are in the house of the LORD
  alternatives:
  - who are at the house of the LORD
  - who are working in the house of the LORD
  lexicon: HALOT
  rationale: The relative clause identifies the second group of workmen by location.
    'In the house of the LORD' is a close rendering and avoids adding 'working,' which
    is implied but not explicit.
- source_word: לחזק
  chosen: to repair
  alternatives:
  - to strengthen
  - to restore
  lexicon: HALOT
  rationale: חזק literally means 'strengthen,' but in a building-maintenance context
    it refers to making structurally sound, hence 'repair' is the best contextual
    English equivalent.
- source_word: בדק
  chosen: the damage
  alternatives:
  - the breach
  - the repairs needed
  lexicon: HALOT
  rationale: בדק הבית is an idiom for structural damage needing repair. 'Damage' communicates
    the object of repair more naturally than the archaic 'breach,' while staying faithful
    to the sense.
- source_word: הבית
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The final noun is literally 'the house,' referring contextually to the
    temple building. Retaining 'house' preserves the lexical link with earlier בית
    יהוה in the verse.
