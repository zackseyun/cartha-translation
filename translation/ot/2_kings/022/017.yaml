id: 2KI.22.17
reference: 2 Kings 22:17
source:
  edition: WLC
  text: תַּ֣חַת אֲשֶׁ֣ר עֲזָב֗וּ/נִי וַֽ/יְקַטְּרוּ֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים לְמַ֨עַן֙
    הַכְעִיסֵ֔/נִי בְּ/כֹ֖ל מַעֲשֵׂ֣ה יְדֵי/הֶ֑ם וְ/נִצְּתָ֧ה חֲמָתִ֛/י בַּ/מָּק֥וֹם
    הַ/זֶּ֖ה וְ/לֹ֥א תִכְבֶּֽה׀׃
translation:
  text: because they have forsaken me and have made offerings to other gods, so that
    they might provoke me to anger by all the work of their hands. Therefore my wrath
    has been kindled against this place, and it shall not be quenched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically, 'have burned incense to other gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - inasmuch as
  - for the reason that
  lexicon: HALOT
  rationale: The idiom תַּחַת אֲשֶׁר introduces the ground or reason for judgment.
    'Because' gives the causal force in natural English without over-literal awkwardness.
- source_word: עֲזָבוּנִי
  chosen: they have forsaken me
  alternatives:
  - they have abandoned me
  - they left me
  lexicon: HALOT
  rationale: 'עזב commonly means ''forsake, abandon.'' ''Forsaken'' preserves covenantal
    and relational weight better than the flatter ''left.'' The perfect is rendered
    with present relevance in English: ''have forsaken.'''
- source_word: וַיְקַטְּרוּ
  chosen: have made offerings
  alternatives:
  - have burned incense
  - have made sacrifices by burning
  lexicon: HALOT
  rationale: קטר in the piel often refers specifically to making an offering by burning,
    frequently incense but not always limited to incense. 'Have made offerings' captures
    the cultic act without narrowing the sense too much; the more specific traditional
    rendering is preserved in a footnote.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - to foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than YHWH. 'Other
    gods' is the standard and most direct rendering.
- source_word: לְמַעַן הַכְעִיסֵנִי
  chosen: so that they might provoke me to anger
  alternatives:
  - to provoke me
  - to anger me
  lexicon: HALOT
  rationale: לְמַעַן here expresses result or purpose from the divine perspective.
    הכעיס means 'provoke to anger.' The fuller phrase preserves the emotional and
    judicial force.
- source_word: בְּכֹל מַעֲשֵׂה יְדֵיהֶם
  chosen: by all the work of their hands
  alternatives:
  - with all the work of their hands
  - through everything their hands have made
  lexicon: HALOT
  rationale: This idiom refers to what they have produced or done, especially their
    idolatrous works. 'The work of their hands' preserves the Hebrew idiom and its
    polemical resonance.
- source_word: וְנִצְּתָה
  chosen: has been kindled
  alternatives:
  - has been ignited
  - burns
  lexicon: HALOT
  rationale: The verb from יצת is used of fire being kindled. With חמה, the metaphor
    is of wrath ignited. 'Has been kindled' preserves the fire imagery that prepares
    for 'shall not be quenched.'
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my anger
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath or fury. 'Wrath' best matches the judicial
    and covenantal tone here.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: against this place
  alternatives:
  - in this place
  - upon this place
  lexicon: HALOT
  rationale: Although the preposition is literally 'in,' English idiom with wrath
    naturally takes 'against.' This conveys the target of judgment while remaining
    faithful to the sense.
- source_word: וְלֹא תִכְבֶּה
  chosen: and it shall not be quenched
  alternatives:
  - and it will not go out
  - and it shall not be put out
  lexicon: HALOT
  rationale: The feminine verb agrees with the kindled wrath/fire imagery. 'Shall
    not be quenched' preserves the metaphor and solemnity of irreversible judgment.
