theological_decisions:
- issue: Anthropopathic language for divine anger
  chosen_reading: Retain the language of God being provoked to anger and his wrath
    being kindled
  alternative_readings:
  - Soften to impersonal judgment language
  rationale: The Hebrew explicitly uses relational and affective language for divine
    judgment. Per translation philosophy, the tension is preserved rather than softened
    into abstraction.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of divine judgment imagery
  chosen_reading: Preserve the fire metaphor in 'has been kindled' and 'shall not
    be quenched'
  alternative_readings:
  - Interpret metaphorically as a simple statement that punishment is certain
  rationale: The verse intentionally presents wrath under the image of an unquenchable
    fire. Preserving the metaphor maintains the text's theological force without importing
    later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3
