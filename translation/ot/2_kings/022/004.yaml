  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a standard temple formula. Per
    the doctrine excerpt, the default rendering is 'the LORD,' following Jewish reverence
    tradition and the Septuagintal pattern.
