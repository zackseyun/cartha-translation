id: 2KI.22.4
reference: 2 Kings 22:4
source:
  edition: WLC
  text: עֲלֵ֗ה אֶל חִלְקִיָּ֨הוּ֙ הַ/כֹּהֵ֣ן הַ/גָּד֔וֹל וְ/יַתֵּ֣ם אֶת הַ/כֶּ֔סֶף
    הַ/מּוּבָ֖א בֵּ֣ית יְהוָ֑ה אֲשֶׁ֥ר אָסְפ֛וּ שֹׁמְרֵ֥י הַ/סַּ֖ף מֵ/אֵ֥ת הָ/עָֽם־־׃
translation:
  text: Go up to Hilkiah the high priest, and let him total the silver that has been
    brought into the house of the LORD, which the keepers of the threshold have collected
    from the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the doorkeepers'; literally 'the keepers of the threshold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Go
  - Ascend
  lexicon: HALOT
  rationale: Qal imperative 2ms of עלה commonly means 'go up/ascend.' 'Go up' preserves
    the directional nuance and idiomatic force of the command.
- source_word: חִלְקִיָּהוּ
  chosen: Hilkiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: Established and accurate rendering of the title for the chief priestly
    office. 'High priest' is natural English and reflects the superlative sense of
    גדול in this collocation.
- source_word: וְיַתֵּם
  chosen: let him total
  alternatives:
  - let him sum up
  - let him complete
  - let him finish
  lexicon: HALOT
  rationale: Hiphil of תמם here means to bring to completion by reckoning or finishing
    the count of the money. In context of temple funds, 'let him total' best captures
    the administrative sense without over-paraphrase.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: Hebrew literally says 'the silver.' Since silver functions as money here,
    either is possible, but 'the silver' preserves the source wording while remaining
    clear in context.
- source_word: הַמּוּבָא
  chosen: that has been brought in
  alternatives:
  - that is brought in
  - being brought in
  lexicon: HALOT
  rationale: Hophal participle of בוא, functioning adjectivally with the silver. The
    perfect-like English passive 'has been brought in' fits the collected funds already
    present.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יהוה is rendered 'the
    LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew while
    remaining idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD.'
- source_word: אָסְפוּ
  chosen: have collected
  alternatives:
  - gathered
  - have gathered
  lexicon: HALOT
  rationale: The verb means gather/collect. 'Have collected' suits the financial context
    and the completed action relative to the present command.
- source_word: שֹׁמְרֵי הַסַּף
  chosen: the keepers of the threshold
  alternatives:
  - the doorkeepers
  - the guards of the doorway
  lexicon: HALOT
  rationale: Literally 'keepers of the threshold.' This likely refers to temple gatekeepers/door
    custodians. The more literal rendering is kept in the main text, with the more
    interpretive 'doorkeepers' preserved in a footnote.
- source_word: מֵאֵת הָעָם
  chosen: from the people
  alternatives:
  - from the populace
  - from the common people
  lexicon: HALOT
  rationale: Straightforward source-based rendering; no contextual reason to narrow
    or expand the referent beyond 'the people'.
