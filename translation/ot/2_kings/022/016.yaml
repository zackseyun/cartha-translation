theological_decisions:
- issue: Rendering of divine judgment term רָעָה
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The context is covenant judgment announced by the LORD against Jerusalem/Judah.
    Rendering רָעָה as 'disaster' communicates punitive calamity without suggesting
    moral evil in God, while remaining faithful to the semantic range in prophetic
    judgment contexts.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
