id: 2KI.22.16
reference: 2 Kings 22:16
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֨י מֵבִ֥יא רָעָ֛ה אֶל הַ/מָּק֥וֹם הַ/זֶּ֖ה וְ/עַל
    יֹֽשְׁבָ֑י/ו אֵ֚ת כָּל דִּבְרֵ֣י הַ/סֵּ֔פֶר אֲשֶׁ֥ר קָרָ֖א מֶ֥לֶךְ יְהוּדָֽה־־־׃
translation:
  text: 'Thus says the LORD: Behold, I am bringing disaster on this place and on its
    inhabitants—all the words of the book that the king of Judah has read.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity'; Hebrew רָעָה here refers to judgment or disaster, not moral
      evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic messenger formula. 'Thus' preserves the formal
    prophetic tone in natural English.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  lexicon: HALOT
  rationale: The prophetic formula is conventionally and naturally rendered in English
    present tense ('says') even with Hebrew qatal, reflecting direct divine speech.
    YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal force while aligning with established reverential convention.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: Marks solemn immediacy and divine announcement. 'Behold' best preserves
    the elevated prophetic register without adding content.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I will bring
  - I am about to bring
  lexicon: HALOT
  rationale: The participle conveys imminent or unfolding action. 'I am bringing'
    preserves that aspect better than a simple future.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In judgment contexts this noun refers to calamity or disaster rather
    than moral evil. 'Disaster' is clear modern English and avoids implying God commits
    moral evil.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: on this place
  alternatives:
  - against this place
  - to this place
  lexicon: HALOT
  rationale: With judgment language, English idiom prefers 'on this place.' It communicates
    directed judgment naturally.
- source_word: וְעַל יֹשְׁבָיו
  chosen: and on its inhabitants
  alternatives:
  - and on those who dwell in it
  - and on its residents
  lexicon: HALOT
  rationale: '''Inhabitants'' is a natural rendering of the participial noun ''those
    dwelling in it'' and matches the formal tone.'
- source_word: אֵת כָּל דִּבְרֵי הַסֵּפֶר
  chosen: all the words of the book
  alternatives:
  - everything written in the book
  - all the matters of the book
  lexicon: HALOT
  rationale: A formally close rendering preserves the wording of covenant-curse fulfillment
    language. 'Words' is preferable to the more interpretive 'things written.'
- source_word: אֲשֶׁר קָרָא
  chosen: that ... has read
  alternatives:
  - which ... read
  - that ... read aloud
  lexicon: HALOT
  rationale: The relative clause modifies 'the book.' English present perfect ('has
    read') fits the immediate prior action with present relevance. 'Read aloud' is
    possible contextually but not explicit in the Hebrew form itself.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: the king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: Standard, transparent rendering of the construct chain.
