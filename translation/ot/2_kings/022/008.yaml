id: 2KI.22.8
reference: 2 Kings 22:8
source:
  edition: WLC
  text: וַ֠/יֹּאמֶר חִלְקִיָּ֜הוּ הַ/כֹּהֵ֤ן הַ/גָּדוֹל֙ עַל שָׁפָ֣ן הַ/סֹּפֵ֔ר סֵ֧פֶר הַ/תּוֹרָ֛ה מָצָ֖אתִי בְּ/בֵ֣ית יְהוָ֑ה וַ/יִּתֵּ֨ן חִלְקִיָּ֧ה אֶת הַ/סֵּ֛פֶר אֶל שָׁפָ֖ן וַ/יִּקְרָאֵֽ/הוּ־־־׃
translation:
  text: Then Hilkiah the high priest said to Shaphan the scribe, “I have found the Book of the Law in the house of Yahweh.” And Hilkiah gave the book to Shaphan, and he read it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the scroll of the law.” The Hebrew סֵפֶר can refer to a scroll or book document.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “in the house of the LORD,” that is, in the temple.'
    reason: cultural_note
  - marker: c
    text: Or, less likely, “and he read from it.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence; 'and ... said' is possible but less idiomatic here.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the great priest
  - the chief priest
  lexicon: HALOT
  rationale: This is the standard sense of the title in context, referring to the chief priestly office. 'High priest' is the clear and established English equivalent without loss of meaning.
- source_word: עַל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: With verbs of speaking, עַל can function idiomatically for addressing someone. 'Said to Shaphan' is the natural English rendering.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the recorder
  lexicon: HALOT
  rationale: סֹפֵר commonly denotes a royal or administrative scribe. 'Scribe' preserves the lexical form and historical role better than the more interpretive 'secretary.'
- source_word: סֵפֶר הַתּוֹרָה
  chosen: the Book of the Law
  alternatives:
  - the scroll of the law
  - the book of instruction
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/book document; 'Book of the Law' is the most recognizable and contextually appropriate rendering for this discovered covenantal text. 'Law' for תּוֹרָה fits this legal-covenantal context better than the broader 'instruction.'
- source_word: מָצָאתִי
  chosen: I have found
  alternatives:
  - I found
  lexicon: HALOT
  rationale: The perfect can be rendered as a present perfect in English to convey a discovery with present relevance. This suits the announcement of a newly recovered text.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת יְהוָה is literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' preserves the Hebrew expression, though it refers to the temple.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּתֵּן ... אֶת־הַסֵּפֶר
  chosen: gave the book
  alternatives:
  - handed over the book
  lexicon: HALOT
  rationale: A straightforward rendering of נתן with the direct object marker. 'Gave the book' is simple and accurate.
- source_word: וַיִּקְרָאֵהוּ
  chosen: and he read it
  alternatives:
  - and he read from it
  lexicon: HALOT
  rationale: The verb קרא with the pronominal suffix most naturally means 'read it.' The subject is most plausibly Shaphan, the nearest masculine singular antecedent after Hilkiah gave him the book. English keeps the same ambiguity of the Hebrew subject only partially; the default narrative reading is that Shaphan read it.
