theological_decisions:
- issue: Whether to heighten Hilkiah's title to 'high priest'
  chosen_reading: the priest
  alternative_readings:
  - the high priest
  rationale: The verse itself uses only 'the priest.' In keeping with original-language
    primacy, the translation avoids importing a fuller title from context or tradition.
  doctrine_reference: Translation philosophy §1
- issue: Rendering the feminine prophetic title
  chosen_reading: prophetess
  alternative_readings:
  - prophet
  rationale: The Hebrew form is explicitly feminine, and the project prefers gender-accurate
    renderings over flattening grammatical gender.
  doctrine_reference: Translation philosophy §4
