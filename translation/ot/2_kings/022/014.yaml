id: 2KI.22.14
reference: 2 Kings 22:14
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ חִלְקִיָּ֣הוּ הַ֠/כֹּהֵן וַ/אֲחִיקָ֨ם וְ/עַכְבּ֜וֹר וְ/שָׁפָ֣ן
    וַ/עֲשָׂיָ֗ה אֶל חֻלְדָּ֨ה הַ/נְּבִיאָ֜ה אֵ֣שֶׁת שַׁלֻּ֣ם בֶּן תִּקְוָ֗ה בֶּן
    חַרְחַס֙ שֹׁמֵ֣ר הַ/בְּגָדִ֔ים וְ/הִ֛יא יֹשֶׁ֥בֶת בִּ/ירוּשָׁלִַ֖ם בַּ/מִּשְׁנֶ֑ה
    וַֽ/יְדַבְּר֖וּ אֵלֶֽי/הָ־׀־־׃
translation:
  text: Then Hilkiah the priest, Ahikam, Achbor, Shaphan, and Asaiah went to Huldah
    the prophetess, the wife of Shallum son of Tikvah, son of Harhas, keeper of the
    wardrobe. She lived in Jerusalem in the Second Quarter, and they spoke with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the second district'; the Hebrew likely refers to a particular quarter
      of Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Literally 'keeper of the garments.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they spoke to her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: Then ... went
  alternatives:
  - and ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... went' gives natural
    English narrative sequence while preserving the past action.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the high priest
  lexicon: HALOT
  rationale: The Hebrew here says simply 'the priest' modifying Hilkiah. Although
    Hilkiah is elsewhere high priest, this verse does not explicitly include 'high,'
    so it is not imported.
- source_word: חֻלְדָּה הַנְּבִיאָה
  chosen: Huldah the prophetess
  alternatives:
  - Huldah the prophet
  lexicon: HALOT
  rationale: The feminine noun specifically identifies her as a female prophet. 'Prophetess'
    is the most direct gender-accurate rendering.
- source_word: אֵשֶׁת שַׁלֻּם
  chosen: the wife of Shallum
  alternatives:
  - wife of Shallum
  lexicon: HALOT
  rationale: Construct phrase straightforwardly denotes marital relation.
- source_word: בֶּן תִּקְוָה בֶּן חַרְחַס
  chosen: son of Tikvah, son of Harhas
  lexicon: HALOT
  rationale: Genealogical chain is preserved formally and clearly in English.
- source_word: שֹׁמֵר הַבְּגָדִים
  chosen: keeper of the wardrobe
  alternatives:
  - keeper of the garments
  - keeper of the clothes
  lexicon: HALOT
  rationale: Literally 'keeper of the garments.' In context this is an official role,
    and 'keeper of the wardrobe' communicates the function idiomatically without undue
    paraphrase.
- source_word: וְהִיא יֹשֶׁבֶת
  chosen: She lived
  alternatives:
  - and she was living
  - and she dwelt
  - and she sat
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'dwell/live' for residence. 'She lived' is natural
    English and fits the locational notice.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering.
- source_word: בַּמִּשְׁנֶה
  chosen: in the Second Quarter
  alternatives:
  - in the second district
  - in the new quarter
  lexicon: HALOT
  rationale: Likely a specific district of Jerusalem. Capitalizing 'Second Quarter'
    signals a place designation while preserving the lexical sense. Alternative understandings
    are worth preserving in a footnote.
- source_word: וַיְדַבְּרוּ אֵלֶיהָ
  chosen: and they spoke with her
  alternatives:
  - and they spoke to her
  lexicon: HALOT
  rationale: The phrase indicates direct address/conversation. 'Spoke with her' reads
    naturally in English and suggests an actual consultation, though 'to her' is also
    possible.
