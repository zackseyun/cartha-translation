id: 2KI.22.7
reference: 2 Kings 22:7
source:
  edition: WLC
  text: אַ֚ךְ לֹא יֵחָשֵׁ֣ב אִתָּ֔/ם הַ/כֶּ֖סֶף הַ/נִּתָּ֣ן עַל יָדָ֑/ם כִּ֥י בֶ/אֱמוּנָ֖ה
    הֵ֥ם עֹשִֽׂים־־׃
translation:
  text: But the silver that is put into their hands is not to be counted with them,
    for they are acting faithfully.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the money.' Hebrew 'silver' commonly refers to money in financial contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'is not to be required from them'—that is, no accounting was demanded
      from the men handling the funds.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Only
  - However
  - Nevertheless
  lexicon: HALOT
  rationale: Introduces an exception or qualification to the preceding instruction.
    'But' is natural English and fits the adversative force here better than the more
    restrictive 'only.'
- source_word: יֵחָשֵׁב אִתָּם
  chosen: is not to be counted with them
  alternatives:
  - shall not be reckoned with them
  - shall not be accounted from them
  - shall not be required from them
  lexicon: HALOT
  rationale: The Niphal of חשׁב here conveys accounting/reckoning. With אֵת/אִתָּם
    in this financial context, the sense is that no accounting is to be demanded from
    these men regarding the money entrusted to them. 'Counted with them' preserves
    the Hebrew structure while remaining intelligible.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: Hebrew כסף literally means 'silver,' often functioning as money. 'Silver'
    preserves the lexical form and historical texture; the financial sense remains
    clear from context.
- source_word: הַנִּתָּן עַל יָדָם
  chosen: that is put into their hands
  alternatives:
  - that is given into their hands
  - entrusted to them
  lexicon: HALOT
  rationale: This passive participial phrase describes the money being handed over
    to them. 'Put into their hands' is a clear, idiomatic rendering that stays close
    to the Hebrew image.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for not requiring an accounting. 'For' is concise
    and fits the explanatory clause.
- source_word: בֶאֱמוּנָה
  chosen: faithfully
  alternatives:
  - honestly
  - with integrity
  - in faithfulness
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes trustworthiness or fidelity in conduct, not doctrinal
    faith. 'Faithfully' captures the adverbial sense and the moral quality of reliable
    stewardship.
- source_word: הֵם עֹשִׂים
  chosen: they are acting
  alternatives:
  - they do
  - they are working
  - they are carrying out the work
  lexicon: HALOT
  rationale: The Hebrew literally says 'they are doing,' but in context it refers
    to the manner of their conduct in handling the funds and work. 'They are acting'
    brings out that behavioral sense without over-paraphrasing.
