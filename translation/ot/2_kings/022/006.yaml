id: 2KI.22.6
reference: 2 Kings 22:6
source:
  edition: WLC
  text: לֶ/חָ֣רָשִׁ֔ים וְ/לַ/בֹּנִ֖ים וְ/לַ/גֹּֽדְרִ֑ים וְ/לִ/קְנ֤וֹת עֵצִים֙ וְ/אַבְנֵ֣י
    מַחְצֵ֔ב לְ/חַזֵּ֖ק אֶת הַ/בָּֽיִת־׃
translation:
  text: for the craftsmen, and for the builders, and for the masons, and for buying
    timber and quarried stone to strengthen the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the temple, the house of the LORD in context.
    reason: cross_reference
  - marker: b
    text: Or 'hewn stone' / 'cut stone.'
    reason: lexical_alternative
  - marker: c
    text: '''Masons'' renders a term that more literally refers to those who build
      or repair walls/enclosures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחָרָשִׁים
  chosen: for the craftsmen
  alternatives:
  - for the artisans
  - for the carpenters
  lexicon: HALOT
  rationale: חָרָשִׁים can denote skilled workers broadly, not only woodworkers. 'Craftsmen'
    preserves the wider sense in a construction context and fits the following occupational
    list.
- source_word: וְלַבֹּנִים
  chosen: and for the builders
  alternatives:
  - and for the workmen
  lexicon: HALOT
  rationale: From בנה, here a participial noun for those engaged in building. 'Builders'
    is the most direct and natural rendering.
- source_word: וְלַגֹּדְרִים
  chosen: and for the masons
  alternatives:
  - and for the stoneworkers
  - and for the wall-builders
  lexicon: HALOT
  rationale: From גדר, literally those who wall up or repair enclosures/walls. In
    this temple-repair context, 'masons' best conveys the construction trade in idiomatic
    English, though the underlying image is walling/repairing.
- source_word: וְלִקְנוֹת
  chosen: and for buying
  alternatives:
  - and to buy
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל continues the purpose/use-of-funds
    sequence. 'For buying' matches the repeated dative/purpose structure of the verse.
- source_word: עֵצִים
  chosen: timber
  alternatives:
  - wood
  - trees
  lexicon: HALOT
  rationale: In a building-supplies list, 'timber' is more precise than the broader
    'wood' and clearly not 'trees' as living plants.
- source_word: וְאַבְנֵי מַחְצֵב
  chosen: and quarried stone
  alternatives:
  - and hewn stone
  - and cut stone
  lexicon: HALOT
  rationale: The phrase denotes stone from a quarry, prepared for construction. 'Quarried
    stone' is slightly more transparent to modern readers than 'hewn stone' while
    preserving the sense.
- source_word: לְחַזֵּק
  chosen: to strengthen
  alternatives:
  - to repair
  - to reinforce
  lexicon: HALOT
  rationale: חזק fundamentally means 'make strong/strengthen.' In context this contributes
    to repair, but 'strengthen' preserves the lexical force without over-paraphrasing.
- source_word: אֶת־הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the house
    of the LORD, i.e., the temple, but the Hebrew here simply says 'the house.' The
    main text preserves that wording; the referent is clear from context.
