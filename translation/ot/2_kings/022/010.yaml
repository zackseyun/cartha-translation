id: 2KI.22.10
reference: 2 Kings 22:10
source:
  edition: WLC
  text: וַ/יַּגֵּ֞ד שָׁפָ֤ן הַ/סֹּפֵר֙ לַ/מֶּ֣לֶךְ לֵ/אמֹ֔ר סֵ֚פֶר נָ֣תַן לִ֔/י חִלְקִיָּ֖ה
    הַ/כֹּהֵ֑ן וַ/יִּקְרָאֵ֥/הוּ שָׁפָ֖ן לִ/פְנֵ֥י הַ/מֶּֽלֶךְ׃
translation:
  text: Then Shaphan the scribe told the king, saying, “Hilkiah the priest has given
    me a book.” And Shaphan read it before the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a scroll.” The Hebrew word can refer generally to a written document
      and does not itself specify the physical format.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: The verb נגד in the Hiphil commonly means to make known or tell. 'Told'
    is natural modern English and fits the narrative setting without overstating formality.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal official/secretary, but 'scribe' preserves the
    lexical form and the historical office while remaining understandable.
- source_word: סֵפֶר
  chosen: a book
  alternatives:
  - a scroll
  - the book
  lexicon: HALOT
  rationale: סֵפֶר is a general term for a written document/book. 'A book' follows
    the anarthrous Hebrew and avoids importing the later identification too strongly
    into this clause. 'Scroll' is possible culturally, but the Hebrew term itself
    is broader than the physical format.
- source_word: נָתַן לִי
  chosen: has given me
  alternatives:
  - gave me
  lexicon: HALOT
  rationale: The Hebrew perfect reports a completed action with present relevance
    in direct speech. English present perfect communicates that relevance naturally,
    though simple past would also be acceptable.
- source_word: וַיִּקְרָאֵהוּ
  chosen: read it
  alternatives:
  - proclaimed it
  - read from it
  lexicon: HALOT
  rationale: קרא with a written object commonly means to read aloud. 'Read it' in
    English adequately implies oral reading in this court setting, especially with
    'before the king' following.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - in the presence of the king
  lexicon: HALOT
  rationale: This is the standard idiom for doing something in someone's presence.
    'Before the king' is concise and idiomatic.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: שָׁפָן
  chosen: Shaphan
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
