id: 2KI.22.19
reference: 2 Kings 22:19
source:
  edition: WLC
  text: יַ֠עַן רַךְ לְבָ֨בְ/ךָ֜ וַ/תִּכָּנַ֣ע מִ/פְּנֵ֣י יְהוָ֗ה בְּֽ/שָׁמְעֲ/ךָ֡
    אֲשֶׁ֣ר דִּבַּרְתִּי֩ עַל הַ/מָּק֨וֹם הַ/זֶּ֜ה וְ/עַל יֹשְׁבָ֗י/ו לִ/הְי֤וֹת לְ/שַׁמָּה֙
    וְ/לִ/קְלָלָ֔ה וַ/תִּקְרַע֙ אֶת בְּגָדֶ֔י/ךָ וַ/תִּבְכֶּ֖ה לְ/פָנָ֑/י וְ/גַ֧ם
    אָנֹכִ֛י שָׁמַ֖עְתִּי נְאֻם יְהוָֽה־׀־־־־׃
translation:
  text: Because your heart was tender, and you humbled yourself before the LORD when
    you heard what I spoke against this place and against its inhabitants, that they
    would become a desolation and a curse, and because you tore your clothes and wept
    before me, I also have heard you, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an astonishment and a curse.' The Hebrew שַׁמָּה can denote desolation,
      horror, or an object of astonishment in judgment contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  lexicon: HALOT
  rationale: Introduces the causal ground for the divine response. 'Because' is natural
    modern English and preserves the causal force.
- source_word: רַךְ לְבָבְךָ
  chosen: your heart was tender
  alternatives:
  - your heart was soft
  - your heart was responsive
  lexicon: HALOT
  rationale: The idiom describes inward softness or receptivity rather than weakness.
    'Tender' preserves the metaphor and communicates Josiah's contrite responsiveness.
- source_word: וַתִּכָּנַע
  chosen: you humbled yourself
  alternatives:
  - you were humbled
  - you submitted yourself
  lexicon: HALOT
  rationale: The reflexive nuance fits the context of voluntary repentance before
    God. 'Humbled yourself' is idiomatic and theologically appropriate without overinterpreting.
- source_word: מִפְּנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before the face of the LORD
  - because of the LORD
  lexicon: HALOT
  rationale: The preposition with 'face' is a standard idiom for being in God's presence.
    'Before the LORD' is clear and faithful. 'the LORD' follows the stated default
    for יְהוָה.
- source_word: בְּשָׁמְעֲךָ
  chosen: when you heard
  alternatives:
  - upon your hearing
  - as you heard
  lexicon: HALOT
  rationale: Temporal-circumstantial use of the infinitive construct with preposition
    is best rendered naturally as 'when you heard'.
- source_word: אֲשֶׁר דִּבַּרְתִּי
  chosen: what I spoke
  alternatives:
  - what I said
  - that which I spoke
  lexicon: HALOT
  rationale: Refers to the content of the LORD's pronouncement. 'What I spoke' is
    slightly more formal than 'said' and suits prophetic speech.
- source_word: עַל הַמָּקוֹם הַזֶּה וְעַל יֹשְׁבָיו
  chosen: against this place and against its inhabitants
  alternatives:
  - concerning this place and its inhabitants
  lexicon: HALOT
  rationale: In judgment contexts עַל after דבר often carries an adversative sense.
    'Against' makes the threatening force explicit from context.
- source_word: לִהְיוֹת לְשַׁמָּה וְלִקְלָלָה
  chosen: that they would become a desolation and a curse
  alternatives:
  - to become an astonishment and a curse
  - to become a horror and a curse
  lexicon: HALOT
  rationale: The phrase expresses the announced result for the place and its people.
    'Desolation' fits שַׁמָּה well in judgment contexts; 'curse' preserves קְלָלָה
    straightforwardly. 'They' refers collectively to the place and its inhabitants
    as the object of the judgment saying.
- source_word: וַתִּקְרַע אֶת בְּגָדֶיךָ
  chosen: you tore your clothes
  alternatives:
  - you tore your garments
  lexicon: HALOT
  rationale: A conventional sign of grief and repentance. 'Clothes' is more readable
    modern English; 'garments' is possible but slightly more traditional.
- source_word: וַתִּבְכֶּה לְפָנַי
  chosen: wept before me
  alternatives:
  - cried before me
  lexicon: HALOT
  rationale: '''Wept'' better conveys mourning than the broader ''cried.'' ''Before
    me'' preserves the personal divine address.'
- source_word: וְגַם אָנֹכִי שָׁמַעְתִּי
  chosen: I also have heard you
  alternatives:
  - I too have heard you
  - I also heard
  lexicon: HALOT
  rationale: The emphatic pronoun plus גַם highlights divine response corresponding
    to Josiah's response. Including 'you' makes explicit the object implied by context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear, idiomatic,
    and preserves solemnity.
