id: 2KI.22.2
reference: 2 Kings 22:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה וַ/יֵּ֗לֶךְ בְּ/כָל דֶּ֨רֶךְ֙ דָּוִ֣ד אָבִ֔י/ו וְ/לֹא סָ֖ר יָמִ֥ין וּ/שְׂמֹֽאול־־׃פ
translation:
  text: He did what was right in the eyes of Yahweh and walked in all the way of David his father, and he did not turn aside to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'David his father' uses 'father' in the broader sense of ancestor or dynastic forefather.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative; English idiom does not require repeating 'and' at the start of the verse. 'Did' preserves the verbal action of עשׂה.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right thing
  - what was upright
  lexicon: HALOT
  rationale: The adjective with article functions substantivally. 'What was right' is natural English and preserves the moral evaluation without overformalizing.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of' keeps the imagery and is clear in English. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default for יְהוָה.
- source_word: וַיֵּלֶךְ
  chosen: walked
  alternatives:
  - went
  - lived
  lexicon: HALOT
  rationale: In this moral-context idiom with 'way,' 'walked' best preserves the metaphor of conduct and aligns with common biblical usage.
- source_word: בְּכָל דֶּרֶךְ
  chosen: in all the way
  alternatives:
  - in every way
  - in the whole path
  lexicon: HALOT
  rationale: The singular 'way' with 'all' is idiomatic in Hebrew for complete conformity to a pattern. 'In all the way' preserves the singular metaphor better than the more interpretive 'in every way.'
- source_word: דָּוִד אָבִיו
  chosen: David his father
  alternatives:
  - his father David
  - David his ancestor
  lexicon: HALOT
  rationale: Hebrew 'father' can denote ancestor, and David is not Josiah's immediate father. However, 'David his father' is the conventional dynastic expression and preserves the source wording; the ancestral sense can be clarified in a footnote.
- source_word: וְלֹא סָר
  chosen: and he did not turn aside
  alternatives:
  - and he did not depart
  - and he did not deviate
  lexicon: HALOT
  rationale: סור in this context denotes deviating from the proper path. 'Turn aside' is idiomatic and preserves the path metaphor.
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: HALOT
  rationale: This fixed expression denotes not deviating in either direction. Adding 'to the' makes the English idiomatic while preserving the metaphor.
