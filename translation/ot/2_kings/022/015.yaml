theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered noun אִישׁ
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The Hebrew noun is grammatically masculine singular and refers to a specific
    male individual. Following the gender-accurate principle, the translation preserves
    'man' rather than adopting a gender-neutral term.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
