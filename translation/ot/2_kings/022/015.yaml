id: 2KI.22.15
reference: 2 Kings 22:15
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר אֲלֵי/הֶ֔ם כֹּֽה אָמַ֥ר יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל אִמְר֣וּ
    לָ/אִ֔ישׁ אֲשֶׁר שָׁלַ֥ח אֶתְ/כֶ֖ם אֵלָֽ/י־־׃
translation:
  text: 'And she said to them, “Thus says the LORD, the God of Israel: Say to the
    man who sent you to me,”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: And she said
  alternatives:
  - Then she said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introducing Huldah's response. 'And she said' preserves
    the Hebrew narrative sequence without overinterpreting temporal nuance.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Directly renders the preposition plus pronominal suffix, indicating Huldah's
    speech is addressed to the delegation.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic
    in English for prophetic proclamation, even though Hebrew has a perfect form.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly; appositional to 'the LORD'
    and identifying Israel's covenant God.
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative plural addressed to the delegation. 'Say' keeps the formal
    prophetic instruction and matches the following indirect object.
- source_word: לָאִישׁ
  chosen: to the man
  alternatives:
  - to the האיש / person
  - to the king's man
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man.' Per gender-accurate philosophy,
    'man' is retained rather than neutralized to 'person.' Contextually this refers
    to the one who sent the delegation.
- source_word: אֲשֶׁר שָׁלַח אֶתְכֶם אֵלַי
  chosen: who sent you to me
  alternatives:
  - that sent you to me
  lexicon: HALOT
  rationale: Relative clause rendered in natural modern English. 'To me' preserves
    Huldah as the destination of the delegation.
