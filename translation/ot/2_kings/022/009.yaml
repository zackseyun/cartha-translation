id: 2KI.22.9
reference: 2 Kings 22:9
source:
  edition: WLC
  text: וַ/יָּבֹ֞א שָׁפָ֤ן הַ/סֹּפֵר֙ אֶל הַ/מֶּ֔לֶךְ וַ/יָּ֥שֶׁב אֶת הַ/מֶּ֖לֶךְ
    דָּבָ֑ר וַ/יֹּ֗אמֶר הִתִּ֤יכוּ עֲבָדֶ֨י/ךָ֙ אֶת הַ/כֶּ֨סֶף֙ הַ/נִּמְצָ֣א בַ/בַּ֔יִת
    וַֽ/יִּתְּנֻ֗/הוּ עַל יַד֙ עֹשֵׂ֣י הַ/מְּלָאכָ֔ה הַ/מֻּפְקָדִ֖ים בֵּ֥ית יְהוָֽה־־־־׃
translation:
  text: Then Shaphan the scribe came to the king and brought back word to the king,
    and said, “Your servants have poured out the silver that was found in the house
    and have put it into the hand of the workmen who are appointed over the house
    of the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have emptied out the silver'; the Hebrew verb can also be understood
      more literally as 'have poured out.'
    reason: lexical_alternative
  - marker: b
    text: That is, the temple; literally 'the house.'
    reason: cultural_note
  - marker: c
    text: Or 'have entrusted it to' or 'have delivered it to'; literally 'have put
      it into the hand of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary/official as well as a scribe. 'Scribe'
    preserves the lexical form and remains natural in English, while fitting the court
    context.
- source_word: וַיָּשֶׁב ... דָּבָר
  chosen: brought back word
  alternatives:
  - reported
  - answered with a message
  lexicon: HALOT
  rationale: The idiom שׁוּב + דָּבָר means to return with a report or bring back
    word. 'Brought back word' preserves the concrete Hebrew idiom better than the
    flatter 'reported' while remaining readable.
- source_word: הִתִּיכוּ
  chosen: have poured out
  alternatives:
  - have emptied out
  - have melted
  lexicon: HALOT
  rationale: In this context of handling collected money, the sense is not metallurgical
    'melt' but 'pour out/empty out,' likely from a container for counting or transfer.
    'Poured out' best reflects the Hebrew image and the administrative setting.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: כֶּסֶף literally means 'silver' and often by extension 'money.' Because
    temple funds are in view and the Hebrew explicitly says 'silver,' the more literal
    rendering is retained.
- source_word: הַנִּמְצָא בַּבַּיִת
  chosen: that was found in the house
  alternatives:
  - that was found in the temple
  lexicon: HALOT
  rationale: בַּיִת here refers contextually to the temple, but 'house' preserves
    the Hebrew wording and allows the following explicit phrase 'house of the LORD'
    to clarify the referent.
- source_word: וַיִּתְּנֻהוּ עַל יַד
  chosen: have put it into the hand of
  alternatives:
  - have entrusted it to
  - have delivered it to
  lexicon: HALOT
  rationale: The idiom נָתַן עַל־יַד means to place into someone's charge or hand.
    'Put it into the hand of' keeps the Hebrew imagery while remaining intelligible.
- source_word: עֹשֵׂי הַמְּלָאכָה
  chosen: the workmen
  alternatives:
  - those doing the work
  - the workers
  lexicon: HALOT
  rationale: The phrase refers to those carrying out the repair work. 'Workmen' is
    concise and idiomatic in context.
- source_word: הַמֻּפְקָדִים
  chosen: who are appointed over
  alternatives:
  - who are overseers of
  - who are in charge of
  lexicon: HALOT
  rationale: The passive participle from פקד indicates being appointed or put in charge.
    'Who are appointed over' preserves both the passive nuance and supervisory role.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The phrase is a standard designation for the temple. 'House of the LORD'
    is the more literal rendering, and YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per the doctrinal translation policy, the default rendering of the divine
    name is 'the LORD.'
