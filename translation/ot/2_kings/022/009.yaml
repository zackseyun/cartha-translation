  from: Then Shaphan the scribe came to the king and brought back word to the king, and said, “Your servants have poured out the silver that was found in the house and have put it into the hand of the workmen who are appointed over the house of the LORD.”
  to: Then Shaphan the scribe came to the king and brought back word to the king, and said, “Your servants have emptied out the silver that was found in the house and have delivered it into the hand of the workmen who are appointed over the house of the LORD.”
