id: 2KI.22.20
reference: 2 Kings 22:20
source:
  edition: WLC
  text: לָ/כֵן֩ הִנְ/נִ֨י אֹֽסִפְ/ךָ֜ עַל אֲבֹתֶ֗י/ךָ וְ/נֶאֱסַפְתָּ֣ אֶל קִבְרֹתֶי/ךָ֮
    בְּ/שָׁלוֹם֒ וְ/לֹא תִרְאֶ֣ינָה עֵינֶ֔י/ךָ בְּ/כֹל֙ הָֽ/רָעָ֔ה אֲשֶׁר אֲנִ֥י מֵבִ֖יא
    עַל הַ/מָּק֣וֹם הַ/זֶּ֑ה וַ/יָּשִׁ֥יבוּ אֶת הַ/מֶּ֖לֶךְ דָּבָֽר־־־־־־׃
translation:
  text: Therefore, behold, I am gathering you to your fathers, and you shall be gathered
    to your graves in peace, and your eyes shall not see all the disaster that I am
    bringing on this place.” And they brought back word to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peacefully.' The Hebrew says 'in peace,' which may mean that Josiah
      would die before seeing the coming judgment, rather than specifying the exact
      manner of his death.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the conclusion drawn from Josiah's humility and response in the
    preceding context; 'Therefore' preserves the inferential force in natural English.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the solemn deictic emphasis of the divine announcement. Though
    somewhat elevated, 'behold' fits prophetic speech and preserves gravity without
    paraphrase.
- source_word: אֹסִפְךָ / נֶאֱסַפְתָּ
  chosen: I am gathering you ... you shall be gathered
  alternatives:
  - I will gather you ... you will be gathered
  - I will take you away ... you will be taken
  lexicon: HALOT
  rationale: Both forms derive from אסף ('gather'). Keeping the same English root
    preserves the Hebrew wordplay and idiom of death/being joined to one's ancestors.
    The participial form with הִנְנִי is well represented by 'I am gathering' with
    imminent future force.
- source_word: עַל אֲבֹתֶיךָ
  chosen: to your fathers
  alternatives:
  - to your ancestors
  - to your forefathers
  lexicon: HALOT
  rationale: Although literally 'upon/onto your fathers,' in this idiom the sense
    is being joined to deceased forebears. 'To your fathers' is concise and preserves
    the familial, covenantal idiom better than the more interpretive 'ancestors.'
- source_word: קִבְרֹתֶיךָ
  chosen: your graves
  alternatives:
  - your tombs
  - your burial places
  lexicon: HALOT
  rationale: Plural in Hebrew should be preserved. 'Graves' is the most straightforward
    modern rendering; 'tombs' may sound too monumental for all contexts.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  - in well-being
  lexicon: HALOT
  rationale: Preserves the Hebrew noun שָׁלוֹם rather than reducing it to an adverb.
    In context it denotes a peaceful end, not necessarily every historical circumstance
    surrounding death.
- source_word: וְלֹא תִרְאֶינָה עֵינֶיךָ
  chosen: your eyes shall not see
  alternatives:
  - you shall not see
  lexicon: HALOT
  rationale: The Hebrew explicitly uses 'your eyes' as the subject; retaining it preserves
    the vividness and emphasis of the expression.
- source_word: הָרָעָה
  chosen: the disaster
  alternatives:
  - the evil
  - the calamity
  lexicon: HALOT
  rationale: In this judgment context, רָעָה refers to impending calamity/judgment
    rather than moral evil. 'Disaster' communicates the concrete sense clearly in
    modern English.
- source_word: מֵבִיא עַל
  chosen: I am bringing on
  alternatives:
  - I will bring upon
  - I am bringing upon
  lexicon: HALOT
  rationale: The participle conveys impending action. 'Bringing on' is idiomatic modern
    English and preserves the sense of judgment coming upon the place.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this site
  lexicon: HALOT
  rationale: Standard rendering for המקום הזה in judgment or temple/land contexts;
    broad enough to cover Jerusalem/Judah as intended by context.
- source_word: וַיָּשִׁיבוּ אֶת־הַמֶּלֶךְ דָּבָר
  chosen: And they brought back word to the king
  alternatives:
  - And they returned an answer to the king
  - And they reported the matter to the king
  lexicon: HALOT
  rationale: Idiomatic Hebrew reporting formula. 'Brought back word' preserves the
    sense of returning with a message while remaining natural English.
