theological_decisions:
- issue: Meaning of 'in peace' in light of Josiah's later death in battle (2 Kings
    23:29)
  chosen_reading: Render literally as 'in peace' without harmonizing away the tension.
  alternative_readings:
  - '''peacefully'' as a description of manner of death'
  - interpretive rendering such as 'before peace is taken away'
  rationale: 'The Hebrew says ''in peace,'' and the translation should preserve the
    textual wording rather than resolve the historical/theological tension. In context
    the following clause explains the sense: Josiah will not see the coming disaster
    on the place. This likely points to dying before the judgment falls, not necessarily
    to a tranquil death scene. The tension should be preserved, not flattened.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
