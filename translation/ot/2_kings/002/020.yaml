id: 2KI.2.20
reference: 2 Kings 2:20
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר קְחוּ לִ/י֙ צְלֹחִ֣ית חֲדָשָׁ֔ה וְ/שִׂ֥ימוּ שָׁ֖ם מֶ֑לַח וַ/יִּקְח֖וּ
    אֵלָֽי/ו־׃
translation:
  text: He said, “Bring me a new bowl, and put salt in it.” So they brought it to
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “jar” or “flask” for the vessel mentioned here; the Hebrew refers generally
      to a small container.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - Then he said
  - And he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form of אמר introducing Elisha's speech.
    English omits an explicit conjunction for natural narrative flow while preserving
    sequence.
- source_word: קְחוּ לִי
  chosen: Bring me
  alternatives:
  - Take for me
  - Get me
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this imperative request context with
    לִי the idiomatic English sense is 'bring me' or 'get me.' 'Bring me' best fits
    the action requested.
- source_word: צְלֹחִית
  chosen: bowl
  alternatives:
  - jar
  - flask
  - dish
  lexicon: HALOT
  rationale: The noun denotes a small vessel or container. 'Bowl' is clear modern
    English and fits the immediate use of holding salt. 'Jar' or 'flask' are possible
    but suggest narrower shapes not specified by the Hebrew.
- source_word: חֲדָשָׁה
  chosen: new
  lexicon: HALOT
  rationale: Straightforward adjective modifying the vessel; retained directly.
- source_word: וְשִׂימוּ שָׁם מֶלַח
  chosen: and put salt in it
  alternatives:
  - and place salt there
  - and put salt in there
  lexicon: HALOT
  rationale: שׂים means 'put/place.' Although שָׁם is literally 'there,' in English
    the referent is the bowl just mentioned, so 'in it' communicates the sense more
    naturally without loss.
- source_word: וַיִּקְחוּ אֵלָיו
  chosen: So they brought it to him
  alternatives:
  - And they took it to him
  - And they brought it to him
  lexicon: HALOT
  rationale: The verb is again לקח, but contextually the action is delivering the
    requested vessel to Elisha. 'Brought it to him' is the natural English rendering.
    The object 'it' is implicit from context and supplied in English.
