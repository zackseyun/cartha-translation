id: 2KI.2.18
reference: 2 Kings 2:18
source:
  edition: WLC
  text: וַ/יָּשֻׁ֣בוּ אֵלָ֔י/ו וְ/ה֖וּא יֹשֵׁ֣ב בִּ/ירִיח֑וֹ וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם
    הֲ/לֽוֹא אָמַ֥רְתִּי אֲלֵי/כֶ֖ם אַל תֵּלֵֽכוּ־־׃
translation:
  text: When they returned to him, he was staying in Jericho, and he said to them,
    “Did I not tell you, ‘Do not go’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “And they returned to him, while he was staying in Jericho.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: When they returned
  alternatives:
  - And they returned
  - So they returned
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Returned' is the plain sense
    of שוב. 'When they returned' smoothly reflects the temporal connection to the
    following clause in readable English.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Direct rendering of the preposition plus 3ms suffix; the referent is
    Elisha from context.
- source_word: וְהוּא יֹשֵׁב
  chosen: he was staying
  alternatives:
  - he was sitting
  - he was dwelling
  lexicon: HALOT
  rationale: ישב can mean sit, remain, dwell, or stay depending on context. Here the
    point is his continued presence in Jericho while they were away searching, so
    'was staying' communicates the situational sense better than the overly literal
    'was sitting.'
- source_word: בִּירִיחוֹ
  chosen: in Jericho
  lexicon: HALOT
  rationale: Standard transliteration of the place name with the preposition rendered
    normally.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  chosen: and he said to them
  alternatives:
  - and he told them
  lexicon: HALOT
  rationale: אמר is the standard verb of speech; 'said to them' is the most transparent
    rendering.
- source_word: הֲלוֹא
  chosen: Did I not
  alternatives:
  - Was it not so that I
  - Did I not indeed
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting agreement. 'Did
    I not' is idiomatic English and preserves the rebuking force.
- source_word: אָמַרְתִּי אֲלֵיכֶם
  chosen: tell you
  alternatives:
  - say to you
  lexicon: HALOT
  rationale: English idiom prefers 'tell you' in this construction, while still accurately
    reflecting אמר plus indirect object.
- source_word: אַל תֵּלֵכוּ
  chosen: Do not go
  alternatives:
  - Don't go
  - You must not go
  lexicon: HALOT
  rationale: אַל with the imperfect expresses prohibition. 'Do not go' is a clear,
    appropriately direct rendering and preserves the force of Elisha's prior command.
