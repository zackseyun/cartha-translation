id: 2KI.2.13
reference: 2 Kings 2:13
source:
  edition: WLC
  text: וַ/יָּ֨רֶם֙ אֶת אַדֶּ֣רֶת אֵלִיָּ֔הוּ אֲשֶׁ֥ר נָפְלָ֖ה מֵ/עָלָ֑י/ו וַ/יָּ֥שָׁב
    וַֽ/יַּעֲמֹ֖ד עַל שְׂפַ֥ת הַ/יַּרְדֵּֽן־־׃
translation:
  text: He picked up Elijah’s cloak, which had fallen from him, and returned and stood
    on the bank of the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mantle.' The Hebrew term refers to a distinctive outer garment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶם
  chosen: picked up
  alternatives:
  - took up
  - lifted up
  lexicon: HALOT
  rationale: The verb רום literally involves lifting/raising, but in this narrative
    context with a garment on the ground, idiomatic English is 'picked up.' 'Took
    up' is possible, but 'picked up' best conveys the physical action naturally without
    losing the concrete sense.
- source_word: אַדֶּרֶת
  chosen: cloak
  alternatives:
  - mantle
  - robe
  lexicon: HALOT
  rationale: אַדֶּרֶת refers to a distinctive outer garment. 'Cloak' is clear modern
    English and fits the narrative object associated with Elijah. 'Mantle' is traditional
    and contextually apt, but can sound archaic or overly idiomatic in modern English;
    it is preserved as an alternative.
- source_word: אֵלִיָּהוּ
  chosen: Elijah
  rationale: Personal names are transliterated by standard English convention.
- source_word: אֲשֶׁר נָפְלָה מֵעָלָיו
  chosen: which had fallen from him
  alternatives:
  - that fell from him
  - which had dropped from him
  lexicon: HALOT
  rationale: The relative clause identifies the cloak as the one that fell from Elijah
    at his ascent. 'Had fallen' reflects the prior action relative to the main verbs
    in English narrative style. 'From him' is the plain sense of מֵעָלָיו.
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: שׁוּב commonly means return/turn back. Here 'returned' is concise and
    natural in sequence with the following action at the Jordan.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  lexicon: HALOT
  rationale: The verb simply denotes standing. 'Stood' is the most direct rendering.
- source_word: עַל שְׂפַת הַיַּרְדֵּן
  chosen: on the bank of the Jordan
  alternatives:
  - by the edge of the Jordan
  - on the shore of the Jordan
  lexicon: HALOT
  rationale: שָׂפָה here means edge/bank. For a river, 'bank' is the most natural
    English equivalent. 'Jordan' is retained as the river name without adding 'River,'
    since the Hebrew simply has 'the Jordan' and this is standard English biblical
    usage.
