theological_decisions:
- issue: Meaning of Elisha's request for פִּי שְׁנַיִם בְּרוּחֲךָ
  chosen_reading: Elisha asks for a double portion/share of Elijah's spirit, likely
    echoing firstborn-inheritance language rather than asking to be twice as powerful
    as Elijah in an absolute sense.
  alternative_readings:
  - Elisha asks for twice as much spiritual power as Elijah had.
  rationale: The Hebrew idiom פִּי שְׁנַיִם most naturally denotes a double share/portion.
    Rendering it 'double portion' preserves the inheritance resonance and leaves the
    exact implication to context rather than resolving it into a claim about comparative
    power.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'your spirit'
  chosen_reading: Elijah's spirit/prophetic endowment is in view, not a direct technical
    reference to the Holy Spirit as such.
  alternative_readings:
  - The phrase directly names the Holy Spirit in a personal-trinitarian sense.
  rationale: The possessive suffix points to what belongs to or characterizes Elijah.
    The translation keeps 'your spirit' and avoids capitalization, which in English
    could force a more specific doctrinal reading than the Hebrew itself requires.
  doctrine_reference: Do not import doctrinal claims the text does not make.
