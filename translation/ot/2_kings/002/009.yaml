id: 2KI.2.9
reference: 2 Kings 2:9
source:
  edition: WLC
  text: וַ/יְהִ֣י כְ/עָבְרָ֗/ם וְ/אֵ֨לִיָּ֜הוּ אָמַ֤ר אֶל אֱלִישָׁע֙ שְׁאַל֙ מָ֣ה
    אֶֽעֱשֶׂה לָּ֔/ךְ בְּ/טֶ֖רֶם אֶלָּקַ֣ח מֵ/עִמָּ֑/ךְ וַ/יֹּ֣אמֶר אֱלִישָׁ֔ע וִֽ/יהִי
    נָ֛א פִּֽי שְׁנַ֥יִם בְּ/רוּחֲ/ךָ֖ אֵלָֽ/י־־־־׃
translation:
  text: And when they had crossed over, Elijah said to Elisha, “Ask what I should
    do for you before I am taken from you.” And Elisha said, “Please, let a double
    portion of your spirit be upon me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “let two shares of your spirit come to me.” The Hebrew idiom means “a
      double portion,” likely echoing the firstborn’s inheritance share.
    reason: lexical_alternative
  - marker: b
    text: “Your spirit” refers to the spirit associated with Elijah’s prophetic ministry;
      some understand this as a request for twice Elijah’s prophetic power.
    reason: alternative_reading
lexical_decisions:
- source_word: כְעָבְרָם
  chosen: when they had crossed over
  alternatives:
  - when they crossed
  - as they were crossing
  lexicon: HALOT
  rationale: From עבר with 3mp suffix, referring to Elijah and Elisha together. The
    clause marks completed action prior to the request, so 'when they had crossed
    over' captures the sequence naturally in English.
- source_word: שְׁאַל
  chosen: Ask
  alternatives:
  - Request
  lexicon: HALOT
  rationale: Direct imperative from שאל. 'Ask' is the plain and idiomatic rendering
    in this context.
- source_word: מָה אֶעֱשֶׂה לָּךְ
  chosen: what I should do for you
  alternatives:
  - what I may do for you
  - what I shall do for you
  lexicon: HALOT
  rationale: The idiom expresses Elijah's offer to grant a request. 'Should do' conveys
    deliberative nuance in natural English without overstating certainty.
- source_word: בְּטֶרֶם אֶלָּקַח מֵעִמָּךְ
  chosen: before I am taken from you
  alternatives:
  - before I am taken away from you
  - before I am taken from beside you
  lexicon: HALOT
  rationale: 'The Niphal of לקח is passive: Elijah is the one being taken. ''From
    you'' preserves the relational separation in the Hebrew. ''Taken away'' is possible
    but slightly more interpretive than necessary.'
- source_word: וִיהִי נָא
  chosen: Please, let ... be
  alternatives:
  - May ... please be
  - Let ... please become
  lexicon: HALOT
  rationale: A jussive/request formula softened by נָא. 'Please, let ... be' gives
    the polite force and petitionary tone.
- source_word: פִּי שְׁנַיִם
  chosen: a double portion
  alternatives:
  - two shares
  - twice as much
  lexicon: HALOT
  rationale: The construct literally means 'a mouth/measure of two,' an idiom for
    a double share or double portion, especially resonant with inheritance language.
    'Double portion' is the clearest idiomatic English equivalent.
- source_word: בְּרוּחֲךָ
  chosen: of your spirit
  alternatives:
  - of your Spirit
  - of your prophetic spirit
  lexicon: HALOT
  rationale: רוּחַ here refers to the spirit associated with Elijah and his prophetic
    ministry. Lowercase 'spirit' avoids importing a claim that Elisha asks for the
    Holy Spirit as a distinct person in a direct technical sense; the possessive 'your'
    is retained. 'Prophetic spirit' is interpretive and better left implicit.
- source_word: אֵלָי
  chosen: be upon me
  alternatives:
  - come to me
  - be mine
  lexicon: HALOT
  rationale: Although literally 'to me,' in English the request for a spirit is more
    naturally expressed as 'be upon me,' which reflects biblical idiom for the empowering
    spirit resting on someone and fits the implied verb with רוח.
