id: 2KI.2.3
reference: 2 Kings 2:3
source:
  edition: WLC
  text: וַ/יֵּצְא֨וּ בְנֵֽי הַ/נְּבִיאִ֥ים אֲשֶׁר בֵּֽית אֵל֮ אֶל אֱלִישָׁע֒ וַ/יֹּאמְר֣וּ
    אֵלָ֔י/ו הֲ/יָדַ֕עְתָּ כִּ֣י הַ/יּ֗וֹם יְהוָ֛ה לֹקֵ֥חַ אֶת אֲדֹנֶ֖י/ךָ מֵ/עַ֣ל
    רֹאשֶׁ֑/ךָ וַ/יֹּ֛אמֶר גַּם אֲנִ֥י יָדַ֖עְתִּי הֶחֱשֽׁוּ־־־־־־׃
translation:
  text: Then the sons of the prophets who were at Bethel came out to Elisha and said
    to him, “Do you know that today the LORD is taking your master from over your
    head?” And he said, “Yes, I know; be silent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from being over you'; the Hebrew literally says 'from over your head,'
      an idiom for the removal of one in authority over another.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הַנְּבִיאִים
  chosen: the sons of the prophets
  alternatives:
  - the company of the prophets
  - the disciples of the prophets
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the idiom and the likely guild/discipleship
    sense without over-interpreting it. 'Sons of' is a standard Hebrew relational
    expression and is transparent enough in English here.
- source_word: אֲשֶׁר בֵּית אֵל
  chosen: who were at Bethel
  alternatives:
  - who were in Bethel
  - who belonged to Bethel
  lexicon: HALOT
  rationale: The clause identifies this prophetic group by location. 'At Bethel' is
    natural English and fits the narrative setting better than the more wooden 'of
    Bethel.'
- source_word: הֲיָדַעְתָּ
  chosen: Do you know
  alternatives:
  - Have you known
  - Are you aware
  lexicon: HALOT
  rationale: An idiomatic present English question best matches the Hebrew interrogative
    with perfect verb in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: לֹקֵחַ
  chosen: is taking
  alternatives:
  - will take
  - is about to take
  lexicon: HALOT
  rationale: The participle conveys an imminent or unfolding action. 'Is taking' preserves
    the vividness of the Hebrew better than a simple future, while still fitting the
    context of an event occurring that day.
- source_word: אֲדֹנֶיךָ
  chosen: your master
  alternatives:
  - your lord
  lexicon: HALOT
  rationale: In this context the word refers to Elijah as Elisha's superior/teacher,
    not to the divine Lord. 'Master' communicates the human relationship clearly and
    avoids confusion.
- source_word: מֵעַל רֹאשֶׁךָ
  chosen: from over your head
  alternatives:
  - from above you
  - from being over you
  lexicon: HALOT
  rationale: The Hebrew is idiomatic for removal of one who stands in authority over
    another. Retaining 'from over your head' keeps the metaphor visible while remaining
    understandable in English.
- source_word: גַּם אֲנִי יָדַעְתִּי
  chosen: Yes, I know
  alternatives:
  - I also know
  - I know as well
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'also/I too.' In English dialogue, 'Yes,
    I know' conveys acknowledgment naturally; the sense of shared knowledge is implicit
    from the exchange. The more literal alternatives are possible but less idiomatic.
- source_word: הֶחֱשׁוּ
  chosen: be silent
  alternatives:
  - keep silent
  - be quiet
  lexicon: HALOT
  rationale: An imperative addressed to the group. 'Be silent' preserves the force
    and solemnity of the command better than the softer 'be quiet.'
