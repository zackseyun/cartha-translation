id: 2KI.2.15
reference: 2 Kings 2:15
source:
  edition: WLC
  text: וַ/יִּרְאֻ֨/הוּ בְנֵֽי הַ/נְּבִיאִ֤ים אֲשֶׁר בִּֽ/ירִיחוֹ֙ מִ/נֶּ֔גֶד וַ/יֹּ֣אמְר֔וּ
    נָ֛חָה ר֥וּחַ אֵלִיָּ֖הוּ עַל אֱלִישָׁ֑ע וַ/יָּבֹ֨אוּ֙ לִ/קְרָאת֔/וֹ וַ/יִּשְׁתַּחֲווּ
    ל֖/וֹ אָֽרְצָ/ה־־־־׃
translation:
  text: When the sons of the prophets who were at Jericho saw him from across from
    them, they said, “The spirit of Elijah rests on Elisha.” Then they came to meet
    him and bowed down to the ground before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at a distance” for “from across from them”; the Hebrew expression denotes
      being opposite or in view from across.
    reason: lexical_alternative
  - marker: b
    text: “The spirit of Elijah” refers to Elijah’s prophetic spirit or empowerment
      now recognized in Elisha.
    reason: cross_reference
  - marker: c
    text: Or “prostrated themselves before him.” The gesture expresses honor and submission,
      not necessarily worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאֻהוּ
  chosen: saw him
  alternatives:
  - caught sight of him
  lexicon: HALOT
  rationale: Standard rendering of ראה with 3ms object suffix; simple visual perception
    fits the narrative context.
- source_word: בְנֵי הַנְּבִיאִים
  chosen: the sons of the prophets
  alternatives:
  - the prophetic disciples
  - the members of the prophetic guild
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew idiom and the social
    grouping. Dynamic alternatives are possible, but the literal phrase is understandable
    in English and retains the text's texture.
- source_word: אֲשֶׁר בִּירִיחוֹ
  chosen: who were at Jericho
  alternatives:
  - who were in Jericho
  lexicon: HALOT
  rationale: This identifies which group of prophetic sons is in view. 'At Jericho'
    is natural English for location in narrative.
- source_word: מִנֶּגֶד
  chosen: from across from them
  alternatives:
  - at a distance
  - opposite them
  - from a position facing them
  lexicon: HALOT
  rationale: מִנֶּגֶד conveys spatial opposition or being in front of/at some distance
    opposite. 'From across from them' preserves the visual-spatial sense better than
    the vaguer 'at a distance.'
- source_word: נָחָה
  chosen: rests
  alternatives:
  - has come to rest
  - settles
  lexicon: HALOT
  rationale: The perfect of נוח here describes the settled abiding of Elijah's spirit
    upon Elisha. Present English 'rests' communicates the recognized state resulting
    from the event.
- source_word: רוּחַ אֵלִיָּהוּ
  chosen: the spirit of Elijah
  alternatives:
  - Elijah's spirit
  lexicon: HALOT
  rationale: The construct phrase is rendered straightforwardly. This refers to Elijah's
    prophetic spirit/power as recognized in Elisha, not Elijah's personal identity
    being transferred.
- source_word: עַל אֱלִישָׁע
  chosen: on Elisha
  alternatives:
  - upon Elisha
  lexicon: HALOT
  rationale: עַל with רוח commonly marks resting upon someone; 'on' is idiomatic modern
    English.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to greet him
  - to go out to meet him
  lexicon: HALOT
  rationale: The infinitive construct of קרא in this idiom means going to meet someone.
    'To meet him' is concise and accurate.
- source_word: וַיִּשְׁתַּחֲווּ לוֹ
  chosen: bowed down before him
  alternatives:
  - prostrated themselves before him
  - paid him homage
  lexicon: HALOT
  rationale: The verb שחה denotes bowing/prostration. 'Bowed down before him' preserves
    the gesture without overstating it as worship in a divine sense.
- source_word: אָרְצָה
  chosen: to the ground
  alternatives:
  - to the earth
  lexicon: HALOT
  rationale: The directional form intensifies the bowing gesture toward the ground.
    'To the ground' is natural English and conveys the physical posture.
