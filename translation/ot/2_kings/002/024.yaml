id: 2KI.2.24
reference: 2 Kings 2:24
source:
  edition: WLC
  text: וַ/יִּ֤פֶן אַֽחֲרָי/ו֙ וַ/יִּרְאֵ֔/ם וַֽ/יְקַלְלֵ֖/ם בְּ/שֵׁ֣ם יְהוָ֑ה וַ/תֵּצֶ֨אנָה
    שְׁתַּ֤יִם דֻּבִּים֙ מִן הַ/יַּ֔עַר וַ/תְּבַקַּ֣עְנָה מֵ/הֶ֔ם אַרְבָּעִ֥ים וּ/שְׁנֵ֖י
    יְלָדִֽים־׃
translation:
  text: He turned around and saw them, and he cursed them in the name of the LORD.
    Then two she-bears came out of the forest and tore apart forty-two of the boys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'tore' or 'split open.' The Hebrew verb is stronger and
      more graphic than the English 'mauled,' but 'mauled' best fits natural English
      for a bear attack.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'boys' or 'children' (יְלָדִים), a broad term that can refer
      to young people and does not by itself specify very small children.
    reason: lexical_alternative
  - marker: c
    text: Or 'He turned behind him'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּפֶן אַחֲרָיו
  chosen: He turned behind him
  alternatives:
  - He turned around
  - He turned back
  lexicon: HALOT
  rationale: The idiom literally indicates turning behind oneself. In natural English,
    'turned around' is possible, but 'turned behind him' preserves the directional
    sense before the following verb 'saw them.' The full clause is smoothed in English
    syntax while retaining the sequence.
- source_word: וַיִּרְאֵם
  chosen: and saw them
  alternatives:
  - and looked at them
  lexicon: HALOT
  rationale: ראה commonly means 'see.' 'Saw them' is the plain sense and fits the
    narrative sequence.
- source_word: וַיְקַלְלֵם
  chosen: and he cursed them
  alternatives:
  - and he pronounced a curse on them
  lexicon: HALOT
  rationale: קלל in the piel means to curse. The direct, ordinary English verb best
    matches the Hebrew without softening the severity.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - in the name of Yahweh
  lexicon: HALOT
  rationale: The prepositional phrase indicates agency/authority invoked in cursing.
    Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    the traditional reverential rendering.
- source_word: וַתֵּצֶאנָה שְׁתַּיִם דֻּבִּים
  chosen: Then two she-bears came out
  alternatives:
  - Then two bears came out
  lexicon: HALOT
  rationale: The feminine verb with the numeral indicates female bears. English can
    reflect this naturally as 'she-bears,' which preserves a detail present in the
    Hebrew.
- source_word: מִן הַיַּעַר
  chosen: of the forest
  alternatives:
  - from the forest
  - out of the woods
  lexicon: HALOT
  rationale: With the motion verb, English idiom prefers 'came out of the forest.'
    'Forest' is a straightforward rendering of יער.
- source_word: וַתְּבַקַּעְנָה
  chosen: mauled
  alternatives:
  - tore
  - ripped open
  lexicon: HALOT
  rationale: בקע literally means split/cleave, but with animal attack in context,
    a woodenly literal 'split' is misleading in English. 'Mauled' communicates a violent
    bear attack accurately without over-specifying the exact wounds. The more literal
    alternative is preserved in a footnote.
- source_word: מֵהֶם אַרְבָּעִים וּשְׁנֵי
  chosen: forty-two of
  alternatives:
  - forty-two among
  - forty-two from among
  lexicon: HALOT
  rationale: The מן construction indicates that forty-two were affected from the group,
    not necessarily the total number present. 'Of' is idiomatic and preserves that
    partitive sense.
- source_word: יְלָדִים
  chosen: the boys
  alternatives:
  - the youths
  - the children
  - the young lads
  lexicon: HALOT
  rationale: ילדים is a broad term for children/young people. In this context, 'boys'
    is a natural rendering that reflects male referents in the narrative without implying
    very small children. 'Youths' is possible but less natural in contemporary English;
    the lexical breadth is worth noting in a footnote.
