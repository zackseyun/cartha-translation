theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to soften the prophet's invocation of judgment
  chosen_reading: and he cursed them in the name of the LORD
  alternative_readings:
  - and he rebuked them in the name of the LORD
  rationale: The Hebrew explicitly says he cursed them; translating with 'rebuked'
    would import an interpretive softening not warranted by the text. The wording
    preserves the narrative's severity without adding theological explanation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Never paraphrase beyond what the source text warrants.'
