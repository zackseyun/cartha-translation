theological_decisions:
- issue: Miraculous division of the water
  chosen_reading: Render the event straightforwardly as a historical narrative miracle
    without naturalizing or embellishing it.
  alternative_readings:
  - Use more idiomatic 'the water parted'
  - Use more formal 'the waters were divided'
  rationale: The Hebrew plainly describes Elijah striking the water and the water
    dividing so the two cross on dry ground. The translation should preserve the miraculous
    action without minimizing it or adding theological commentary.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
