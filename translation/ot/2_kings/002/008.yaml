id: 2KI.2.8
reference: 2 Kings 2:8
source:
  edition: WLC
  text: וַ/יִּקַּח֩ אֵלִיָּ֨הוּ אֶת אַדַּרְתּ֤/וֹ וַ/יִּגְלֹם֙ וַ/יַּכֶּ֣ה אֶת הַ/מַּ֔יִם
    וַ/יֵּחָצ֖וּ הֵ֣נָּה וָ/הֵ֑נָּה וַ/יַּעַבְר֥וּ שְׁנֵי/הֶ֖ם בֶּ/חָרָבָֽה־־׃
translation:
  text: Then Elijah took his cloak, rolled it up, and struck the water; and it was
    divided this way and that, so that the two of them crossed over on dry ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his mantle.' The Hebrew refers to Elijah’s outer garment.
    reason: lexical_alternative
  - marker: b
    text: Literally 'were divided here and there,' that is, to opposite sides.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדַּרְתּוֹ
  chosen: his cloak
  alternatives:
  - his mantle
  - his robe
  lexicon: HALOT
  rationale: אַדֶּרֶת can denote a distinctive outer garment or mantle. 'Cloak' is
    clear modern English and fits the narrative action of taking, rolling, and striking
    with it. 'Mantle' is traditional but less natural for contemporary readers.
- source_word: וַיִּגְלֹם
  chosen: rolled it up
  alternatives:
  - wrapped it up
  - folded it together
  lexicon: HALOT
  rationale: The verb גלם here refers to winding or rolling the garment together for
    use as an instrument. 'Rolled it up' best matches the physical action in idiomatic
    English.
- source_word: וַיַּכֶּה אֶת־הַמַּיִם
  chosen: struck the water
  alternatives:
  - hit the water
  - struck the waters
  lexicon: HALOT
  rationale: נכה commonly means 'strike.' 'Struck the water' is natural English and
    preserves the force of the act without overinterpreting it.
- source_word: וַיֵּחָצוּ
  chosen: it was divided
  alternatives:
  - they were divided
  - the water parted
  lexicon: HALOT
  rationale: Though the Hebrew verb is plural, the implied subject is the waters.
    English idiom often treats 'water' as a mass noun, so 'it was divided' reads naturally
    while preserving the passive/resultative sense. 'The water parted' is possible
    but slightly more interpretive.
- source_word: הֵנָּה וָהֵנָּה
  chosen: this way and that
  alternatives:
  - here and there
  - to one side and to the other
  lexicon: HALOT
  rationale: The phrase indicates division to opposite sides. 'This way and that'
    is concise, idiomatic, and conveys separation in two directions.
- source_word: וַיַּעַבְרוּ שְׁנֵיהֶם
  chosen: the two of them crossed over
  alternatives:
  - both of them crossed over
  lexicon: HALOT
  rationale: This preserves the explicit dual emphasis of שְׁנֵיהֶם while remaining
    natural in English.
- source_word: בֶּחָרָבָה
  chosen: on dry ground
  alternatives:
  - on dry land
  - through the dry bed
  lexicon: HALOT
  rationale: חָרָבָה in miracle-crossing contexts denotes dry ground exposed where
    water had been. 'On dry ground' is the standard clear rendering and echoes similar
    biblical scenes without adding interpretation.
- source_word: וַיִּקַּח
  chosen: Then Elijah took
  alternatives:
  - And Elijah took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' communicates sequential
    action in readable modern English better than repeatedly using 'And' at the start
    of clauses.
