theological_decisions:
- issue: Rendering of אֲדֹנִי in address to Elisha
  chosen_reading: my lord
  alternative_readings:
  - my master
  rationale: This is a social honorific, not a divine title. 'My lord' preserves the
    respectful address in idiomatic English without implying deity.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
