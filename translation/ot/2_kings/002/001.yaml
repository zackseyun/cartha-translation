theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether הַשָּׁמַיִם should be rendered 'heaven' or 'the heavens'
  chosen_reading: into heaven
  alternative_readings:
  - into the heavens
  rationale: The Hebrew plural can denote the sky/heavens, but in English this ascent context is most naturally expressed as 'into heaven.' This is a translational idiom choice, not a doctrinal claim about cosmology.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
