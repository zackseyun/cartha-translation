id: 2KI.2.1
reference: 2 Kings 2:1
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/הַעֲל֤וֹת יְהוָה֙ אֶת אֵ֣לִיָּ֔הוּ בַּֽ/סְעָרָ֖ה הַ/שָּׁמָ֑יִם וַ/יֵּ֧לֶךְ אֵלִיָּ֛הוּ וֶ/אֱלִישָׁ֖ע מִן הַ/גִּלְגָּֽל־־׃
translation:
  text: Now it happened, when Yahweh was about to take Elijah up into heaven by a whirlwind, that Elijah and Elisha went on from Gilgal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in a whirlwind' or 'in the stormwind.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the heavens'; rendered 'heaven' here as natural English in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - Now it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'Now it happened' preserves the discourse function in readable modern English without archaic tone.
- source_word: בְּהַעֲלוֹת
  chosen: when ... was about to take ... up
  alternatives:
  - when ... took ... up
  - at the going up of
  lexicon: HALOT
  rationale: The infinitive construct with ב marks temporal circumstance, 'when/in the time of.' In context it introduces the impending event narrated in the chapter, so 'was about to take ... up' captures the prospective sense naturally in English while retaining the upward motion explicit in עלה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת אֵלִיָּהוּ
  chosen: Elijah
  lexicon: HALOT
  rationale: Direct-object marker plus proper name; transliterated personal name per translation philosophy.
- source_word: בַּסְעָרָה
  chosen: by a whirlwind
  alternatives:
  - in the whirlwind
  - in a stormwind
  lexicon: HALOT
  rationale: סערה denotes a storm, tempest, or whirlwind. Given the well-known mode of Elijah's ascent in the immediate context, 'whirlwind' is the most precise contextual rendering. The preposition ב is rendered instrumentally/associatively as 'by' in idiomatic English.
- source_word: הַשָּׁמָיִם
  chosen: into heaven
  alternatives:
  - to the heavens
  - heavenward
  lexicon: HALOT
  rationale: Though formally 'the heavens,' in this context English idiom prefers singular 'heaven' for the skyward/heavenward destination. 'Into heaven' best matches natural English and the narrative sense.
- source_word: וַיֵּלֶךְ
  chosen: went on
  alternatives:
  - went
  - set out
  - walked
  lexicon: HALOT
  rationale: הלך here narrates continued travel. 'Went on' conveys ongoing movement in the journey narrative slightly better than the bare 'went'.
- source_word: וֶאֱלִישָׁע
  chosen: and Elisha
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: מִן הַגִּלְגָּל
  chosen: from Gilgal
  alternatives:
  - out of Gilgal
  lexicon: HALOT
  rationale: מן marks source/origin. 'From Gilgal' is the straightforward geographic rendering.
