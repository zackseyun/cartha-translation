id: 2KI.2.14
reference: 2 Kings 2:14
source:
  edition: WLC
  text: וַ/יִּקַּח֩ אֶת אַדֶּ֨רֶת אֵלִיָּ֜הוּ אֲשֶׁר נָפְלָ֤ה מֵֽ/עָלָי/ו֙ וַ/יַּכֶּ֣ה אֶת הַ/מַּ֔יִם וַ/יֹּאמַ֕ר אַיֵּ֕ה יְהוָ֖ה אֱלֹהֵ֣י אֵלִיָּ֑הוּ אַף ה֣וּא וַ/יַּכֶּ֣ה אֶת הַ/מַּ֗יִם וַ/יֵּֽחָצוּ֙ הֵ֣נָּה וָ/הֵ֔נָּה וַֽ/יַּעֲבֹ֖ר אֱלִישָֽׁע־־־־׀־׃
translation:
  text: Then he took Elijah’s cloak, which had fallen from him, and struck the water and said, “Where is Yahweh, the God of Elijah?” Then he struck the water, and it was divided this way and that way, and Elisha crossed over.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Where is the LORD, the God of Elijah? He also …' The Hebrew phrase 'even he' is terse and may emphasize that the same God who was with Elijah is still present.
    reason: alternative_reading
lexical_decisions:
- source_word: אַדֶּרֶת
  chosen: cloak
  alternatives:
  - mantle
  - robe
  lexicon: HALOT
  rationale: Refers to Elijah’s distinctive outer garment. 'Cloak' is natural modern English and preserves the concrete image better than the more traditional but less common 'mantle.'
- source_word: נָפְלָה מֵעָלָיו
  chosen: had fallen from him
  alternatives:
  - fell from him
  lexicon: HALOT
  rationale: The perfect verb in the relative clause naturally refers back to the garment Elijah dropped at his ascent. English past perfect fits the narrative sequence clearly.
- source_word: וַיַּכֶּה אֶת־הַמַּיִם
  chosen: struck the water
  alternatives:
  - hit the water
  - struck the waters
  lexicon: HALOT
  rationale: '''Struck'' is the standard elevated but readable rendering for נכה in miracle narratives. Singular ''water'' is idiomatic in English though Hebrew is formally plural.'
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where now is
  lexicon: HALOT
  rationale: A direct interrogative of location/presence. The context is an appeal for divine action, but the wording should remain literal rather than paraphrased.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אֱלֹהֵי אֵלִיָּהוּ
  chosen: the God of Elijah
  alternatives:
  - Elijah’s God
  lexicon: HALOT
  rationale: This preserves the construct relationship transparently and matches common biblical English without sounding archaic.
- source_word: אַף הוּא
  chosen: even he
  alternatives:
  - indeed he
  - he also
  - is he not also here
  lexicon: HALOT
  rationale: The phrase is terse and somewhat difficult. 'Even he' preserves the emphatic force without over-interpreting. It likely underscores that the same God who empowered Elijah is still present for Elisha.
- source_word: וַיֵּחָצוּ הֵנָּה וָהֵנָּה
  chosen: it was divided here and there
  alternatives:
  - they were divided to one side and to the other
  - it split this way and that
  lexicon: HALOT
  rationale: The idiom describes the water parting in two directions. Singular 'it was divided' treats 'water' idiomatically in English; 'here and there' is a readable equivalent of the directional pair.
- source_word: וַיַּעֲבֹר
  chosen: crossed over
  alternatives:
  - passed over
  - crossed
  lexicon: HALOT
  rationale: '''Crossed over'' is the clearest narrative rendering for עבר in this river-crossing context.'
