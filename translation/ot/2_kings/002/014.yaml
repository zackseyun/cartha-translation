theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of אַף הוּא in Elisha’s cry
  chosen_reading: Retained as the terse expression 'even he' in the main text
  alternative_readings:
  - omitted as elliptical
  - expanded interpretively as 'is he not also here?'
  - rendered 'he also'
  rationale: The Hebrew is compressed and debated. To preserve theological tension rather than resolve it, the main text keeps a close rendering that suggests continuity of the LORD's presence and power without making Elisha say more than the text states. A footnote preserves the interpretive alternatives.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
