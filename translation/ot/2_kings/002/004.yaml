id: 2KI.2.4
reference: 2 Kings 2:4
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ ל֨/וֹ אֵלִיָּ֜הוּ אֱלִישָׁ֣ע שֵֽׁב נָ֣א פֹ֗ה כִּ֤י יְהוָה֙ שְׁלָחַ֣/נִי יְרִיח֔וֹ וַ/יֹּ֕אמֶר חַי יְהוָ֥ה וְ/חֵֽי נַפְשְׁ/ךָ֖ אִם אֶעֶזְבֶ֑/ךָּ וַ/יָּבֹ֖אוּ יְרִיחֽוֹ׀־־־־׃
translation:
  text: And Elijah said to him, "Elisha, please stay here, for Yahweh has sent me to Jericho." But he said, "As Yahweh lives, and as you yourself live, I will not leave you." So they came to Jericho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שֵׁב נָא
  chosen: please stay
  alternatives:
  - please sit
  - please remain
  lexicon: HALOT
  rationale: שֵׁב is the imperative of ישׁב, which can mean 'sit,' 'stay,' or 'remain' depending on context. Here Elijah is asking Elisha not to continue with him, so 'stay' best captures the situational sense in natural English. נָא adds politeness/entreaty, rendered as 'please.'
- source_word: פֹה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple locative adverb; 'here' is the natural English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: The perfect verb can be rendered simply as past, but in English 'has sent me' fits the present relevance of Elijah's commission as he speaks.
- source_word: יְרִיחוֹ
  chosen: Jericho
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' preserves both the idiom and its solemn force in readable English.
- source_word: וְחֵי נַפְשְׁךָ
  chosen: and as you yourself live
  alternatives:
  - and as your soul lives
  - and by your life
  lexicon: HALOT
  rationale: Literally 'and as your nephesh lives.' In oath formulas, this refers to the person's life, not specifically the immaterial soul. 'As you yourself live' communicates the idiomatic force clearly while preserving the parallelism with the preceding oath.
- source_word: אִם אֶעֶזְבֶךָּ
  chosen: I will not leave you
  alternatives:
  - surely I will not forsake you
  lexicon: HALOT
  rationale: 'In this oath construction, אִם introduces an elliptical negative sense: ''if I leave you'' meaning ''surely I will not leave you.'' English requires the implied negation to be made explicit. ''Leave'' fits the immediate travel context better than the weightier ''forsake.'''
- source_word: וַיָּבֹאוּ
  chosen: So they came
  alternatives:
  - and they came
  - then they came
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So they came' gives smooth English narrative flow while preserving sequence.
