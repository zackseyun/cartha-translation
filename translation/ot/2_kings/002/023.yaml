theological_decisions:
- issue: Possible allusive force of repeated 'go up' in the taunt
  chosen_reading: Retain the literal 'Go up' without making the allusion explicit
    in the main text
  alternative_readings:
  - Interpret as a taunt meaning 'Get out of here'
  - 'Interpret as an allusion to Elijah''s ascent: ''Go up like Elijah'''
  rationale: The Hebrew imperative plainly says 'go up.' Because the exact force of
    the mockery is debated, the translation preserves the lexical form and leaves
    possible allusive interpretations to a footnote rather than resolving them in
    the text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
- issue: Age and culpability implied by נְעָרִים קְטַנִּים
  chosen_reading: Translate as 'small boys' in the main text, while preserving the
    broader possibility 'young lads/youths' in a footnote
  alternative_readings:
  - young lads
  - youths
  - young men
  rationale: The phrase indicates young males, but English readers may over-associate
    'boys' with very small children. A footnote preserves the broader semantic range
    without flattening the Hebrew phrase in the main text.
  doctrine_reference: Translation philosophy §5, Consistency of key terms, or documented
    exception
