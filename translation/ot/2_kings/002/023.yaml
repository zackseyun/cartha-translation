id: 2KI.2.23
reference: 2 Kings 2:23
source:
  edition: WLC
  text: וַ/יַּ֥עַל מִ/שָּׁ֖ם בֵּֽית אֵ֑ל וְ/ה֣וּא עֹלֶ֣ה בַ/דֶּ֗רֶךְ וּ/נְעָרִ֤ים
    קְטַנִּים֙ יָצְא֣וּ מִן הָ/עִ֔יר וַ/יִּתְקַלְּסוּ ב/וֹ֙ וַ/יֹּ֣אמְרוּ ל֔/וֹ עֲלֵ֥ה
    קֵרֵ֖חַ עֲלֵ֥ה קֵרֵֽחַ־׀־־׃
translation:
  text: Then he went up from there to Bethel. And as he was going up on the way, small
    boys came out from the city and mocked him, and said to him, “Go up, baldhead!
    Go up, baldhead!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “young lads” or “youths”; the Hebrew phrase can refer to young males
      more broadly, not necessarily very small children.
    reason: lexical_alternative
  - marker: b
    text: The repeated “Go up” may simply be a jeer, but it may also allude to Elijah’s
      being taken up.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  chosen: Then he went up
  alternatives:
  - And he went up
  - So he went up
  lexicon: HALOT
  rationale: Qal wayyiqtol of עלה commonly advances the narrative with 'and/then he
    went up.' 'Then' gives natural English narrative flow while preserving the sequential
    sense.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name; names are transliterated
    rather than translated.
- source_word: וְהוּא עֹלֶה בַדֶּרֶךְ
  chosen: And as he was going up on the way
  alternatives:
  - while he was going up on the road
  - as he was going up along the road
  lexicon: HALOT
  rationale: The pronoun plus participle gives ongoing action concurrent with the
    main narrative. 'On the way' is a close rendering of בדרך and preserves the repeated
    עלה wordplay with the taunt that follows.
- source_word: נְעָרִים קְטַנִּים
  chosen: small boys
  alternatives:
  - young boys
  - little boys
  - young lads
  lexicon: HALOT
  rationale: נערים can denote youths broadly, but with קטנים the phrase indicates
    young males rather than adult men. 'Small boys' preserves the adjective's force
    without overstating infancy. Because the phrase can be understood more broadly
    as 'young lads/youths,' that alternative is preserved in a footnote.
- source_word: יָצְאוּ מִן הָעִיר
  chosen: came out from the city
  alternatives:
  - went out from the city
  - came out of the city
  lexicon: HALOT
  rationale: יצא means 'go/come out.' 'Came out from the city' is idiomatic in English
    and fits the narrator's perspective.
- source_word: וַיִּתְקַלְּסוּ בוֹ
  chosen: mocked him
  alternatives:
  - jeered at him
  - made fun of him
  - ridiculed him
  lexicon: HALOT
  rationale: The Hitpael of קלס conveys derision or mockery. 'Mocked him' is concise,
    natural, and weightier than the more colloquial 'made fun of him.'
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Get up
  - Go on up
  lexicon: HALOT
  rationale: Imperative of עלה. 'Go up' preserves the lexical repetition with Elisha's
    ascent and may echo Elijah's going up, so a more interpretive rendering was avoided
    in the main text.
- source_word: קֵרֵחַ
  chosen: baldhead
  alternatives:
  - bald one
  - bald man
  lexicon: HALOT
  rationale: An adjective/substantive meaning bald. 'Baldhead' best captures the taunting,
    insulting force in direct speech.
