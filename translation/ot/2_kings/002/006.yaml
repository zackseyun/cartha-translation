id: 2KI.2.6
reference: 2 Kings 2:6
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ ל֨/וֹ אֵלִיָּ֜הוּ שֵֽׁב נָ֣א פֹ֗ה כִּ֤י יְהוָה֙ שְׁלָחַ֣/נִי הַ/יַּרְדֵּ֔נָ/ה
    וַ/יֹּ֕אמֶר חַי יְהוָ֥ה וְ/חֵֽי נַפְשְׁ/ךָ֖ אִם אֶעֶזְבֶ֑/ךָּ וַ/יֵּלְכ֖וּ שְׁנֵי/הֶֽם־־־־׃
translation:
  text: Then Elijah said to him, “Please stay here, for the LORD has sent me to the
    Jordan.” But he said, “As the LORD lives, and as you yourself live, I will not
    leave you.” So the two of them went on.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to the Jordan River.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew oath formula: “As the LORD lives, and as your life lives, if I leave
      you …,” meaning “I will certainly not leave you.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁב נָא
  chosen: Please stay
  alternatives:
  - Please sit
  - Please remain
  lexicon: HALOT
  rationale: שֵׁב from ישׁב can mean sit, stay, or remain depending on context. Here
    Elijah is asking Elisha to stop and remain behind at this location, so 'stay'
    best captures the situational sense in natural English. נָא adds politeness/entreaty,
    rendered as 'Please'.
- source_word: פֹה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple locative adverb; 'here' is the natural English equivalent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliterating.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: The perfect verb in this narrative context naturally conveys completed
    commission with present relevance. English present perfect is idiomatic here and
    matches common narrative force.
- source_word: הַיַּרְדֵּנָה
  chosen: to the Jordan
  alternatives:
  - to the Jordan River
  - Jordanward
  lexicon: HALOT
  rationale: Directional he indicates motion toward the Jordan. 'To the Jordan' is
    concise and natural; 'Jordan River' is possible but not necessary in context.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' preserves both the
    idiom and solemn force in readable English.
- source_word: וְחֵי נַפְשְׁךָ
  chosen: and as you yourself live
  alternatives:
  - and as your soul lives
  - and by your life
  lexicon: HALOT
  rationale: Literally 'and as your נפש lives,' an oath formula invoking the addressee's
    life. 'As you yourself live' communicates the idiomatic sense clearly without
    importing a dualistic reading of 'soul' that would sound unnatural in English.
- source_word: אִם אֶעֶזְבֶךָּ
  chosen: I will not leave you
  alternatives:
  - surely I will not forsake you
  lexicon: HALOT
  rationale: In oath constructions, אִם can introduce an elliptical imprecation yielding
    the sense 'surely not' in English. Rendering the clause positively as 'if I leave
    you' would be misleading, so the idiomatic force is translated directly as a strong
    negation.
- source_word: וַיֵּלְכוּ שְׁנֵיהֶם
  chosen: So the two of them went on
  alternatives:
  - And both of them went
  - So both of them went on
  lexicon: HALOT
  rationale: The phrase emphasizes that Elijah and Elisha continued together. 'The
    two of them' preserves that emphasis, and 'went on' fits the ongoing journey context.
