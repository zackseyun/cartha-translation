theological_decisions:
- issue: Nature of the healing language for the water
  chosen_reading: 'Retain the healing metaphor in the main text: ''the waters were
    healed.'''
  alternative_readings:
  - the waters were restored
  - the water became wholesome
  rationale: The Hebrew uses רפא, the ordinary verb for healing. Keeping 'healed'
    preserves the text's theological portrayal of prophetic word bringing restoration,
    without adding doctrinal interpretation beyond the wording itself.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
