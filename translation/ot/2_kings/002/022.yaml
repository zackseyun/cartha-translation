id: 2KI.2.22
reference: 2 Kings 2:22
source:
  edition: WLC
  text: וַ/יֵּרָפ֣וּ הַ/מַּ֔יִם עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ/דְבַ֥ר אֱלִישָׁ֖ע אֲשֶׁ֥ר
    דִּבֵּֽר׃פ
translation:
  text: So the waters were healed to this day, according to the word that Elisha spoke.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were restored' or 'became wholesome.' The Hebrew verb is the usual word
      for 'heal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָפוּ
  chosen: were healed
  alternatives:
  - were restored
  - became wholesome
  lexicon: HALOT
  rationale: From רפא, commonly 'heal.' Here it describes the formerly bad water being
    made sound. 'Were healed' preserves the metaphorical/personified Hebrew and matches
    the miracle context better than a flatter 'were restored.'
- source_word: הַמַּיִם
  chosen: the waters
  alternatives:
  - the water
  lexicon: HALOT
  rationale: Hebrew uses the plural form מַיִם. 'The waters' keeps the source form
    and is natural enough in English, especially in a narrative about a spring or
    water supply.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiom meaning the condition continued up to the narrator's present.
    'To this day' is idiomatic modern English.
- source_word: כִּדְבַר
  chosen: according to the word
  alternatives:
  - according to the promise
  - in accordance with what
  lexicon: HALOT
  rationale: דבר here is best rendered 'word,' referring to Elisha's spoken declaration
    in the preceding verse. This preserves the concrete link between prophetic speech
    and fulfillment.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Standard English transliteration of the personal name.
- source_word: אֲשֶׁר דִּבֵּר
  chosen: that Elisha spoke
  alternatives:
  - which he spoke
  - that he had spoken
  lexicon: HALOT
  rationale: This relative clause identifies the specific prophetic utterance. 'That
    Elisha spoke' is clear modern English and avoids unnecessary archaism.
