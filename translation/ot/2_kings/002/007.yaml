id: 2KI.2.7
reference: 2 Kings 2:7
source:
  edition: WLC
  text: וַ/חֲמִשִּׁ֨ים אִ֜ישׁ מִ/בְּנֵ֤י הַ/נְּבִיאִים֙ הָֽלְכ֔וּ וַ/יַּעַמְד֥וּ מִ/נֶּ֖גֶד
    מֵ/רָח֑וֹק וּ/שְׁנֵי/הֶ֖ם עָמְד֥וּ עַל הַ/יַּרְדֵּֽן־׃
translation:
  text: And fifty men from the sons of the prophets went and stood opposite them at
    a distance, while the two of them stood by the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across from them' for 'opposite them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from afar' for 'at a distance.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of the prophets,' a recognized group or guild associated with
      prophetic ministry.
    reason: cultural_note
lexical_decisions:
- source_word: וַחֲמִשִּׁים אִישׁ
  chosen: And fifty men
  alternatives:
  - And fifty persons
  - Now fifty men
  lexicon: HALOT
  rationale: The idiom combines the numeral with אִישׁ to mean 'fifty men.' 'Men'
    is gender-accurate and natural in English; 'persons' would flatten the masculine
    form without contextual need.
- source_word: מִבְּנֵי הַנְּבִיאִים
  chosen: from the sons of the prophets
  alternatives:
  - from the company of the prophets
  - from the disciples of the prophets
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of,' and this expression is a recognized
    designation for prophetic guild members. Following the project's gender-accurate
    principle and original-language primacy, the literal form is retained rather than
    replacing it with an interpretive paraphrase like 'disciples.'
- source_word: הָלְכוּ
  chosen: went
  alternatives:
  - walked
  - proceeded
  lexicon: HALOT
  rationale: הלך here is the ordinary narrative verb 'went.' 'Walked' is possible
    but less idiomatic in this context, and 'proceeded' is too formal.
- source_word: וַיַּעַמְדוּ
  chosen: stood
  alternatives:
  - stationed themselves
  - took their stand
  lexicon: HALOT
  rationale: עמד in this narrative setting is best rendered simply as 'stood.' The
    more elaborate alternatives add emphasis not required by the Hebrew.
- source_word: מִנֶּגֶד
  chosen: opposite them
  alternatives:
  - facing them
  - across from them
  lexicon: HALOT
  rationale: מִנֶּגֶד conveys being in front of or opposite. Because the following
    phrase already gives distance, 'opposite them' preserves the spatial relation
    clearly.
- source_word: מֵרָחוֹק
  chosen: at a distance
  alternatives:
  - from afar
  - far off
  lexicon: HALOT
  rationale: The phrase indicates separation in space. 'At a distance' is clear modern
    English; 'from afar' is more literary/archaic.
- source_word: וּשְׁנֵיהֶם
  chosen: while the two of them
  alternatives:
  - and both of them
  - while both of them
  lexicon: HALOT
  rationale: Refers specifically to Elijah and Elisha. 'The two of them' preserves
    the explicit dual sense. 'While' helps the English reflect the contrast between
    the fifty observers and the two central figures.
- source_word: עָמְדוּ עַל הַיַּרְדֵּן
  chosen: stood by the Jordan
  alternatives:
  - stood at the Jordan
  - stood on the Jordan
  lexicon: HALOT
  rationale: Although עַל often means 'on,' with a river in context it commonly means
    at or by it. 'By the Jordan' is the most natural English expression and fits the
    scene immediately before the river crossing.
