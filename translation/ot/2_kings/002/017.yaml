id: 2KI.2.17
reference: 2 Kings 2:17
source:
  edition: WLC
  text: וַ/יִּפְצְרוּ ב֥/וֹ עַד בֹּ֖שׁ וַ/יֹּ֣אמֶר שְׁלָ֑חוּ וַֽ/יִּשְׁלְחוּ֙ חֲמִשִּׁ֣ים
    אִ֔ישׁ וַ/יְבַקְשׁ֥וּ שְׁלֹשָֽׁה יָמִ֖ים וְ/לֹ֥א מְצָאֻֽ/הוּ־־־׃
translation:
  text: But they urged him until he was ashamed, and he said, “Send them.” So they
    sent fifty men, and they searched for three days, but they did not find him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “until he was embarrassed.” The Hebrew says literally “until he was ashamed,”
      describing the social pressure created by their repeated urging.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְצְרוּ בוֹ
  chosen: they urged him
  alternatives:
  - they pressed him
  - they insisted with him
  lexicon: HALOT
  rationale: פצר conveys persistent urging or pressing someone. 'Urged him' is natural
    modern English and preserves the sense of repeated insistence directed toward
    Elisha.
- source_word: עַד בֹּשׁ
  chosen: until he was ashamed
  alternatives:
  - until he was embarrassed
  - until he was uncomfortable
  lexicon: HALOT
  rationale: בוש fundamentally denotes shame or embarrassment. The clause indicates
    their persistence continued to the point that Elisha felt social pressure or embarrassment.
    'Ashamed' is the more literal rendering; the softer nuance is preserved in alternatives.
- source_word: שְׁלָחוּ
  chosen: Send them
  alternatives:
  - Send
  - Go ahead, send them
  lexicon: HALOT
  rationale: Second masculine plural imperative from שלח. In context Elisha is granting
    permission to send the search party; 'Send them' makes the implied object explicit
    in idiomatic English.
- source_word: חֲמִשִּׁים אִישׁ
  chosen: fifty men
  alternatives:
  - fifty men of the sons of the prophets
  lexicon: HALOT
  rationale: The Hebrew here simply says 'fifty men.' The broader context identifies
    who they are, but this verse itself does not repeat that fuller description, so
    the translation stays with the immediate wording.
- source_word: וַיְבַקְשׁוּ
  chosen: they searched
  alternatives:
  - they sought
  - they looked for him
  lexicon: HALOT
  rationale: בקש commonly means seek/search for. 'They searched' fits the narrative
    action smoothly; the object is supplied by the following clause and context.
- source_word: שְׁלֹשָׁה יָמִים
  chosen: for three days
  alternatives:
  - three days
  lexicon: HALOT
  rationale: English idiom normally uses 'for' with a duration of searching. This
    is a straightforward temporal accusative rendered naturally.
- source_word: וְלֹא מְצָאֻהוּ
  chosen: but they did not find him
  alternatives:
  - and they did not find him
  lexicon: HALOT
  rationale: מצא means find. Rendering the conjunction as 'but' brings out the adversative
    sense in English after the report of a three-day search ending unsuccessfully,
    while remaining faithful to the narrative flow.
