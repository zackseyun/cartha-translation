id: 2KI.2.10
reference: 2 Kings 2:10
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר הִקְשִׁ֣יתָ לִ/שְׁא֑וֹל אִם תִּרְאֶ֨ה אֹתִ֜/י לֻקָּ֤ח מֵֽ/אִתָּ/ךְ֙
    יְהִֽי לְ/ךָ֣ כֵ֔ן וְ/אִם אַ֖יִן לֹ֥א יִהְיֶֽה־־־׃
translation:
  text: He said, “You have asked a hard thing. If you see me being taken from you,
    it will be so for you; but if not, it will not be.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If you see me when I am taken from you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשִׁיתָ
  chosen: You have asked a hard thing
  alternatives:
  - You have made difficult
  - You have asked something difficult
  lexicon: HALOT
  rationale: The Hiphil of קשׁה here idiomatically means to make a request difficult
    or demanding. In context Elijah is responding to Elisha's request, so English
    naturally expresses the sense as 'You have asked a hard thing' rather than a more
    wooden 'you have made difficult to ask.'
- source_word: לִשְׁאוֹל
  chosen: have asked
  alternatives:
  - to ask
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ל completes the idiom with הִקְשִׁיתָ.
    English smooths this into a finite verb: ''You have asked.'''
- source_word: אִם תִּרְאֶה אֹתִי לֻקָּח מֵאִתָּךְ
  chosen: If you see me being taken from you
  alternatives:
  - If you see me when I am taken from you
  - If you see me taken from you
  lexicon: HALOT
  rationale: 'לֻקָּח is a passive participial form from לקח, ''taken.'' The clause
    is temporal/conditional: Elisha''s seeing Elijah''s removal is the condition.
    ''Being taken'' preserves the passive process without over-specifying agency.'
- source_word: יְהִי לְךָ כֵן
  chosen: it will be so for you
  alternatives:
  - so shall it be for you
  - it shall happen for you accordingly
  lexicon: HALOT
  rationale: This idiom affirms that the requested outcome will be granted. 'It will
    be so for you' is clear modern English while staying close to the Hebrew wording.
- source_word: וְאִם אַיִן
  chosen: but if not
  alternatives:
  - but if there is not
  - and if not
  lexicon: HALOT
  rationale: 'אַיִן here functions elliptically: ''if not''—that is, if Elisha does
    not see Elijah taken. ''But if not'' captures the contrast with the previous condition.'
- source_word: לֹא יִהְיֶה
  chosen: it will not be
  alternatives:
  - it shall not happen
  - it will not be so
  lexicon: HALOT
  rationale: The implied subject is the requested outcome. 'It will not be' is concise
    and mirrors the Hebrew; the fuller sense is clear from context.
