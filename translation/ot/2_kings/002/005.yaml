id: 2KI.2.5
reference: 2 Kings 2:5
source:
  edition: WLC
  text: וַ/יִּגְּשׁ֨וּ בְנֵֽי הַ/נְּבִיאִ֥ים אֲשֶׁר בִּֽ/ירִיחוֹ֮ אֶל אֱלִישָׁע֒ וַ/יֹּאמְר֣וּ
    אֵלָ֔י/ו הֲ/יָדַ֕עְתָּ כִּ֣י הַ/יּ֗וֹם יְהוָ֛ה לֹקֵ֥חַ אֶת אֲדֹנֶ֖י/ךָ מֵ/עַ֣ל
    רֹאשֶׁ֑/ךָ וַ/יֹּ֛אמֶר גַּם אֲנִ֥י יָדַ֖עְתִּי הֶחֱשֽׁוּ־־־־־׃
translation:
  text: Then the sons of the prophets who were at Jericho came near to Elisha and
    said to him, “Do you know that today the LORD is taking your master from over
    your head?” And he said, “I also know; be silent.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from being over you'; the Hebrew literally says 'from over your head,'
      an idiom for the removal of one in authority over another.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ commonly denotes approaching or drawing near. 'Came near'
    is natural modern English and preserves the movement toward Elisha without overformal
    archaism.
- source_word: בְנֵי הַנְּבִיאִים
  chosen: the sons of the prophets
  alternatives:
  - the prophetic disciples
  - the members of the prophetic guild
  lexicon: HALOT
  rationale: A formally transparent rendering is preferred here. The phrase likely
    refers to a prophetic group or disciples, but the Hebrew idiom is preserved in
    the main text rather than interpreted away.
- source_word: אֲשֶׁר בִּירִיחוֹ
  chosen: who were at Jericho
  alternatives:
  - who were in Jericho
  - from Jericho
  lexicon: HALOT
  rationale: The relative clause identifies this group as the one located at Jericho.
    'At Jericho' is idiomatic and sufficiently precise.
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal name transliterated by standard English convention per project
    philosophy.
- source_word: הֲיָדַעְתָּ
  chosen: Do you know
  alternatives:
  - Have you known
  - Are you aware
  lexicon: HALOT
  rationale: An English present fits the Hebrew interrogative perfect in context,
    expressing present awareness rather than past acquisition of knowledge.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לֹקֵחַ
  chosen: is taking
  alternatives:
  - is about to take
  - takes
  lexicon: HALOT
  rationale: The participle conveys imminent or ongoing action. 'Is taking' preserves
    the vividness and immediacy of the Hebrew better than a simple future.
- source_word: אֲדֹנֶיךָ
  chosen: your master
  alternatives:
  - your lord
  lexicon: HALOT
  rationale: In this human relational context, 'master' is the clearest rendering,
    referring to Elijah as Elisha's superior/teacher rather than using the more theologically
    loaded 'lord.'
- source_word: מֵעַל רֹאשֶׁךָ
  chosen: from over your head
  alternatives:
  - from above you
  - from your head
  lexicon: HALOT
  rationale: The Hebrew idiom is somewhat unusual and likely reflects removal of one
    in authority over another. The main text keeps the concrete imagery rather than
    flattening it to interpretation.
- source_word: גַּם אֲנִי יָדַעְתִּי
  chosen: I also know
  alternatives:
  - I know too
  - Yes, I know
  lexicon: HALOT
  rationale: This preserves both the emphatic pronoun and the additive particle גַּם
    in natural English.
- source_word: הֶחֱשׁוּ
  chosen: be silent
  alternatives:
  - keep quiet
  - be still
  lexicon: HALOT
  rationale: An imperative plural meaning 'be silent/quiet.' 'Be silent' best matches
    the force and terseness of Elisha's response.
