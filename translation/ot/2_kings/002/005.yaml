theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidelines specify 'the LORD'
    as the default rendering of YHWH, following Jewish reverence tradition and longstanding
    biblical English usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret מֵעַל רֹאשֶׁךָ idiomatically in the main text
  chosen_reading: retain the concrete expression 'from over your head' in the main
    text
  alternative_readings:
  - from being over you
  - from your leadership
  - from above you
  rationale: The phrase likely refers to Elijah's removal from his position over Elisha,
    but the Hebrew image is preserved to avoid importing a more specific interpretation
    than the text explicitly states. An explanatory alternative is preserved in a
    footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
