id: 2KI.2.21
reference: 2 Kings 2:21
source:
  edition: WLC
  text: וַ/יֵּצֵא֙ אֶל מוֹצָ֣א הַ/מַּ֔יִם וַ/יַּשְׁלֶךְ שָׁ֖ם מֶ֑לַח וַ/יֹּ֜אמֶר כֹּֽה אָמַ֣ר יְהוָ֗ה רִפִּ֨אתִי֙ לַ/מַּ֣יִם הָ/אֵ֔לֶּה לֹֽא יִהְיֶ֥ה מִ/שָּׁ֛ם ע֖וֹד מָ֥וֶת וּ/מְשַׁכָּֽלֶת־־־־׃
translation:
  text: 'Then he went out to the source of the water and threw salt there, and said, “Thus says Yahweh: I have healed this water. No longer will there come from it death or miscarriage.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the spring of the water.”
    reason: lexical_alternative
  - marker: b
    text: Or “No longer will there come from it death or barrenness / causing miscarriage.” The Hebrew term refers to loss of offspring or unfruitfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹצָא
  chosen: source
  alternatives:
  - spring
  - outflow
  lexicon: HALOT
  rationale: In context of a city's water supply, the noun refers to the place where the water issues forth. 'Source' is natural English and broad enough to cover a springhead without over-specifying.
- source_word: הַמַּיִם
  chosen: the water
  alternatives:
  - the waters
  lexicon: HALOT
  rationale: Though formally plural in Hebrew, English commonly uses the mass noun 'water' for a specific supply. This is more idiomatic while preserving the referent.
- source_word: מֶלַח
  chosen: salt
  lexicon: HALOT
  rationale: Straightforward lexical equivalent; no contextual reason to expand or paraphrase.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: רִפִּאתִי
  chosen: I have healed
  alternatives:
  - I have restored
  - I have made wholesome
  lexicon: HALOT
  rationale: The verb רפא commonly means 'heal.' Here it is metaphorically applied to water made sound/potable. 'Healed' preserves the vivid personifying language and divine declaration.
- source_word: לַמַּיִם הָאֵלֶּה
  chosen: this water
  alternatives:
  - these waters
  lexicon: HALOT
  rationale: English idiom favors singular mass noun with proximal demonstrative in this context. It refers to the local water supply as a whole.
- source_word: לֹא יִהְיֶה מִשָּׁם עוֹד
  chosen: No longer will there come from it
  alternatives:
  - There shall no longer be from there
  - No more shall there be from it
  lexicon: HALOT
  rationale: This clause states that harmful effects will no longer proceed from the water source. 'Come from it' is idiomatic and preserves the source-oriented sense of מִשָּׁם.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Direct lexical equivalent; in context likely death caused by bad water, but the text itself simply says 'death,' so the translation should not narrow it.
- source_word: מְשַׁכָּלֶת
  chosen: miscarriage
  alternatives:
  - barrenness
  - causing miscarriage
  - bereavement
  lexicon: HALOT
  rationale: From the root שׁכל, the feminine participial/noun form here denotes causing loss of offspring. In the context of a cursed water supply affecting land and fertility, 'miscarriage' best captures the concrete harmful effect without overgeneralizing to all bereavement.
