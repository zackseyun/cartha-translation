id: 2KI.3.10
reference: 2 Kings 3:10
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר מֶ֣לֶךְ יִשְׂרָאֵ֑ל אֲהָ֕הּ כִּֽי קָרָ֣א יְהוָ֗ה לִ/שְׁלֹ֨שֶׁת֙ הַ/מְּלָכִ֣ים הָ/אֵ֔לֶּה לָ/תֵ֥ת אוֹתָ֖/ם בְּ/יַד מוֹאָֽב־־׃
translation:
  text: Then the king of Israel said, “Alas! Yahweh has called these three kings to give them into the hand of Moab.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “has summoned”; the Hebrew verb is literally “called.”
    reason: lexical_alternative
  - marker: b
    text: “Into the hand of Moab” is a Hebrew idiom meaning “into Moab’s power.”
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; the referent is not named in this verse, so the title should remain explicit.
- source_word: אֲהָהּ
  chosen: Alas!
  alternatives:
  - Ah!
  - Oh no!
  lexicon: HALOT
  rationale: An interjection of distress or lament. 'Alas!' preserves the gravity without becoming colloquial.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - because
  lexicon: HALOT
  rationale: Here it introduces the content/reason for the king's alarm. 'For' fits the explanatory force in direct speech.
- source_word: קָרָא
  chosen: has called
  alternatives:
  - called
  - summoned
  lexicon: HALOT
  rationale: The verb commonly means 'call' or 'summon.' In context it refers to the LORD's bringing these kings together for an outcome. 'Has called' preserves the Hebrew wording without over-interpreting as merely a military summons.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִשְׁלֹשֶׁת הַמְּלָכִים הָאֵלֶּה
  chosen: these three kings
  alternatives:
  - the three kings האלה
  lexicon: HALOT
  rationale: The preposition with numeral and demonstrative points to the specific coalition already in view. 'These three kings' is idiomatic and precise.
- source_word: לָתֵת אֹתָם
  chosen: to give them
  alternatives:
  - to hand them over
  lexicon: HALOT
  rationale: Infinitive of purpose with object suffix. 'To give them' is formally close; the hostile sense is clarified by the following idiom 'into the hand of.'
- source_word: בְּיַד מוֹאָב
  chosen: into the hand of Moab
  alternatives:
  - into Moab's hand
  - over to Moab
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering someone into another's power. Retaining 'hand' preserves the idiom and its biblical resonance while remaining understandable.
