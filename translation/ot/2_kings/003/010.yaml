theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether קָרָא implies divine summoning or providentially bringing together
  chosen_reading: has called
  alternative_readings:
  - has summoned
  - has brought together
  rationale: The Hebrew verb itself is 'called.' The king's statement interprets the situation pessimistically, but the translation should not expand the verb beyond its lexical sense. The hostile purpose is already expressed by 'to give them into the hand of Moab.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
