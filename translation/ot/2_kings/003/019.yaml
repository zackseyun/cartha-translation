id: 2KI.3.19
reference: 2 Kings 3:19
source:
  edition: WLC
  text: וְ/הִכִּיתֶ֞ם כָּל עִ֤יר מִבְצָר֙ וְ/כָל עִ֣יר מִבְח֔וֹר וְ/כָל עֵ֥ץ טוֹב֙
    תַּפִּ֔ילוּ וְ/כָל מַעְיְנֵי מַ֖יִם תִּסְתֹּ֑מוּ וְ/כֹל֙ הַ/חֶלְקָ֣ה הַ/טּוֹבָ֔ה
    תַּכְאִ֖בוּ בָּ/אֲבָנִֽים־־־־־׃
translation:
  text: And you shall strike every fortified city and every choice city, and you shall
    fell every good tree, and stop up all springs of water, and ruin every good field
    with stones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every select city' or 'every best city' for 'every choice city.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'make painful with stones'; the Hebrew idiom refers to ruining
      farmland by throwing stones over it.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִכִּיתֶם
  chosen: you shall strike
  alternatives:
  - you shall attack
  - you shall smite
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means to strike/smite, often in military contexts.
    'Strike' preserves the directness of the Hebrew and fits the following objects
    (cities) without over-paraphrasing to 'conquer.'
- source_word: עִיר מִבְצָר
  chosen: fortified city
  alternatives:
  - fortress city
  - stronghold city
  lexicon: HALOT
  rationale: מִבְצָר denotes a fortified place/fortification. 'Fortified city' is
    idiomatic English and preserves the military sense.
- source_word: עִיר מִבְחוֹר
  chosen: choice city
  alternatives:
  - select city
  - best city
  lexicon: HALOT
  rationale: מִבְחוֹר refers to what is chosen or choice. 'Choice city' is somewhat
    literal but clear, preserving the sense of a prominent or select city without
    importing a more interpretive gloss.
- source_word: תַּפִּילוּ
  chosen: you shall fell
  alternatives:
  - you shall cut down
  - you shall bring down
  lexicon: HALOT
  rationale: Hiphil of נפל here refers to causing trees to fall. 'Fell' is precise
    English for cutting down trees and avoids unnecessary expansion.
- source_word: כָּל עֵץ טוֹב
  chosen: every good tree
  alternatives:
  - every fruitful tree
  - every desirable tree
  lexicon: HALOT
  rationale: טוֹב broadly means good. In this context it likely refers to valuable/productive
    trees, but 'good tree' stays closer to the Hebrew while remaining understandable.
- source_word: מַעְיְנֵי מַיִם
  chosen: springs of water
  alternatives:
  - water springs
  - water sources
  - fountains
  lexicon: HALOT
  rationale: The phrase denotes natural water sources. 'Springs of water' is a natural,
    fairly formal rendering that preserves the Hebrew construction.
- source_word: תִּסְתֹּמוּ
  chosen: stop up
  alternatives:
  - block up
  - seal up
  lexicon: HALOT
  rationale: The verb means to stop/close up, especially wells or springs. 'Stop up'
    is idiomatic in English for disabling water sources.
- source_word: הַחֶלְקָה הַטּוֹבָה
  chosen: every good field
  alternatives:
  - every good piece of land
  - every fertile tract
  lexicon: HALOT
  rationale: חֶלְקָה is a plot/portion of land, often a field. 'Field' is concise
    and natural in context; 'good' preserves טוֹב without over-specifying fertility.
- source_word: תַּכְאִבוּ בָּאֲבָנִים
  chosen: ruin ... with stones
  alternatives:
  - mar ... with stones
  - make painful with stones
  - cover ... with stones
  lexicon: HALOT
  rationale: The Hiphil of כאב is unusual here and traditionally understood in context
    as damaging agricultural land by strewing it with stones. 'Ruin ... with stones'
    communicates the intended effect in clear English while acknowledging the idiomatic/culturally
    specific action.
