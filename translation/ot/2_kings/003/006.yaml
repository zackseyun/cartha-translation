id: 2KI.3.6
reference: 2 Kings 3:6
source:
  edition: WLC
  text: וַ/יֵּצֵ֞א הַ/מֶּ֧לֶךְ יְהוֹרָ֛ם בַּ/יּ֥וֹם הַ/ה֖וּא מִ/שֹּׁמְר֑וֹן וַ/יִּפְקֹ֖ד
    אֶת כָּל יִשְׂרָאֵֽל־־׃
translation:
  text: So King Jehoram went out from Samaria that day and mustered all Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'numbered all Israel' or 'reviewed all Israel.' The Hebrew verb can refer
      to taking a count or conducting a military muster; here the context favors a
      military sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - set out
  - marched out
  - went forth
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form commonly means 'go
    out' or 'set out.' 'Went out' preserves the straightforward narrative movement
    without over-specifying military nuance, which is supplied by the following verb.
- source_word: הַמֶּלֶךְ יְהוֹרָם
  chosen: King Jehoram
  alternatives:
  - the king, Jehoram
  rationale: English idiom naturally renders the appositional construction as 'King
    Jehoram.' The personal name is transliterated in keeping with the translation
    philosophy.
- source_word: בַּיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: The phrase literally means 'on that day.' In smooth modern English after
    the verb, 'that day' communicates the same temporal reference with natural style;
    the preposition is implicit in English temporal usage.
- source_word: מִשֹּׁמְרוֹן
  chosen: from Samaria
  alternatives:
  - out of Samaria
  rationale: The preposition מן marks source/origin. 'From Samaria' is the most natural
    rendering and preserves the geographic point of departure.
- source_word: וַיִּפְקֹד
  chosen: mustered
  alternatives:
  - numbered
  - reviewed
  - mobilized
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend to, appoint, number,
    and muster. In this military context preceding a campaign, 'mustered' best captures
    the sense of assembling and taking stock of troops, better than the more wooden
    'numbered.'
- source_word: אֶת כָּל יִשְׂרָאֵל
  chosen: all Israel
  alternatives:
  - all the Israelites
  - the whole of Israel
  lexicon: HALOT
  rationale: The phrase can denote the people/forces of the northern kingdom collectively.
    'All Israel' preserves the Hebrew expression and its corporate-political sense
    without unnecessarily expanding it.
