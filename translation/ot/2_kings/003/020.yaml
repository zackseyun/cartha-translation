id: 2KI.3.20
reference: 2 Kings 3:20
source:
  edition: WLC
  text: וַ/יְהִ֤י בַ/בֹּ֨קֶר֙ כַּ/עֲל֣וֹת הַ/מִּנְחָ֔ה וְ/הִנֵּה מַ֥יִם בָּאִ֖ים מִ/דֶּ֣רֶךְ
    אֱד֑וֹם וַ/תִּמָּלֵ֥א הָ/אָ֖רֶץ אֶת הַ/מָּֽיִם־־׃
translation:
  text: And in the morning, at the offering up of the grain offering, behold, water
    was coming from the direction of Edom, and the land was filled with the water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when the grain offering was offered.' The Hebrew literally says 'at
      the going up of the grain offering,' using sacrificial language for its presentation
      on the altar.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the way of Edom' / 'by way of Edom.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the land was filled with the water'; English may also be rendered
      more idiomatically, 'the land was filled with water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... it happened / And
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing the next event in sequence. In English,
    the idiom is best carried by a simple narrative 'And' plus the clause rather than
    the archaic 'it came to pass.'
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  lexicon: HALOT
  rationale: Straightforward temporal phrase marking when the event occurred.
- source_word: כַּעֲלוֹת
  chosen: at the offering up of
  alternatives:
  - when ... was offered
  - at the ascent of
  lexicon: HALOT
  rationale: Infinitive construct of עלה with prefixed כ, literally 'as/at the going
    up.' In sacrificial context it refers to the presentation/offering up of the sacrifice.
    'At the offering up of' preserves the cultic nuance without wooden literalism.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  - the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in cultic context commonly denotes the grain offering rather
    than a generic gift. 'Grain offering' is the clearest contextually specific rendering.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the surprising event. 'Behold'
    preserves the vividness and literary force better than flattening it to mere adverbial
    surprise.
- source_word: מַיִם בָּאִים
  chosen: water was coming
  alternatives:
  - waters were coming
  - water came
  lexicon: HALOT
  rationale: Though מַיִם is morphologically plural, English normally treats 'water'
    as a mass noun. The participle בָּאִים conveys ongoing or observable motion, hence
    'was coming' rather than simple past 'came.'
- source_word: מִדֶּרֶךְ אֱדוֹם
  chosen: from the direction of Edom
  alternatives:
  - by way of Edom
  - from the way of Edom
  - from Edom
  lexicon: HALOT
  rationale: דֶּרֶךְ literally means 'way/road/path,' but in this construction it
    idiomatically indicates the route or direction from which the water came. 'From
    the direction of Edom' is natural English and preserves the geographical sense.
- source_word: וַתִּמָּלֵא הָאָרֶץ אֶת הַמָּיִם
  chosen: the land was filled with the water
  alternatives:
  - the land was filled with water
  - the country filled with water
  lexicon: HALOT
  rationale: Passive/resultative sense from מלא. הָאָרֶץ here refers to the land/ground/region
    rather than the whole earth. Retaining the article in 'the water' reflects the
    Hebrew object, referring to the specific water just mentioned, though idiomatic
    English could omit it.
