theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following Jewish reverence
    tradition and the Septuagintal pattern, unless a special contextual reason requires
    otherwise. No such reason appears here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the king's reply אַל כִּי
  chosen_reading: 'The king protests Elisha''s dismissal: ''No, for the LORD has called
    these three kings...'''
  alternative_readings:
  - 'A plea: ''Please do not, for the LORD has called...'''
  - 'An exclamation of lament: ''Alas, for the LORD has called...'''
  rationale: The Hebrew is terse and somewhat elliptical. Context favors a rebuttal
    or protest rather than a command to Elisha not to speak. The chosen rendering
    preserves the king's alarm without importing more emotion than the text warrants.
