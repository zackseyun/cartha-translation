id: 2KI.3.13
reference: 2 Kings 3:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֱלִישָׁ֜ע אֶל מֶ֤לֶךְ יִשְׂרָאֵל֙ מַה לִּ֣/י וָ/לָ֔/ךְ לֵ֚ךְ
    אֶל נְבִיאֵ֣י אָבִ֔י/ךָ וְ/אֶל נְבִיאֵ֖י אִמֶּ֑/ךָ וַ/יֹּ֤אמֶר ל/וֹ֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל
    אַ֗ל כִּֽי קָרָ֤א יְהוָה֙ לִ/שְׁלֹ֨שֶׁת֙ הַ/מְּלָכִ֣ים הָ/אֵ֔לֶּה לָ/תֵ֥ת אוֹתָ֖/ם
    בְּ/יַד מוֹאָֽב־־־־־־׃
translation:
  text: And Elisha said to the king of Israel, “What do I have to do with you? Go
    to the prophets of your father and to the prophets of your mother.” But the king
    of Israel said to him, “No, for the LORD has called these three kings to give
    them into the hand of Moab.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''What is there to me and to you?''—a formula expressing
      distance or rejection.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Please do not, for the LORD has called these three kings to give them
      into the hand of Moab.' The Hebrew expression is difficult and may be read as
      a plea rather than a blunt objection.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה לִּי וָלָךְ
  chosen: What do I have to do with you?
  alternatives:
  - What is there between me and you?
  - What have I to do with you?
  lexicon: HALOT
  rationale: This idiom expresses distance or repudiation rather than a literal question
    about shared possession. 'What do I have to do with you?' is idiomatic modern
    English that preserves the rebuff without archaic phrasing.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Go on
  lexicon: HALOT
  rationale: Simple imperative retained directly; no expansion beyond the Hebrew is
    needed.
- source_word: נְבִיאֵי אָבִיךָ ... נְבִיאֵי אִמֶּךָ
  chosen: the prophets of your father and ... the prophets of your mother
  alternatives:
  - your father's prophets and your mother's prophets
  lexicon: HALOT
  rationale: A formally close rendering preserves the pointed reference to the royal
    house's idolatrous prophetic associations, likely Ahab and Jezebel.
- source_word: אַל כִּי
  chosen: No, for
  alternatives:
  - Do not say that, for
  - Alas, for
  - No indeed, because
  lexicon: HALOT
  rationale: The combination is difficult and idiomatic. In context the king is not
    issuing a prohibition to Elisha but objecting or protesting. 'No, for' captures
    the rebuttal succinctly in natural English without overinterpreting the syntax.
- source_word: קָרָא
  chosen: has called
  alternatives:
  - has summoned
  - called together
  lexicon: HALOT
  rationale: In this context YHWH has summoned or brought together the three kings.
    'Has called' is sufficiently broad and close to the Hebrew, while the following
    infinitive explains the outcome.
- source_word: לִשְׁלֹשֶׁת הַמְּלָכִים הָאֵלֶּה
  chosen: these three kings
  alternatives:
  - the three kings האלה
  - these three rulers
  lexicon: HALOT
  rationale: English naturally places the demonstrative before the numeral phrase.
    'Kings' should be retained rather than generalized to 'rulers.'
- source_word: לָתֵת אוֹתָם
  chosen: to give them
  alternatives:
  - to hand them over
  - to deliver them
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result after 'has called.' 'To give
    them' is the most direct rendering and works idiomatically with the following
    phrase 'into the hand of Moab.'
- source_word: בְּיַד מוֹאָב
  chosen: into the hand of Moab
  alternatives:
  - into Moab's hand
  - into the power of Moab
  lexicon: HALOT
  rationale: The idiom denotes being delivered into another's power. Retaining 'hand'
    preserves the Hebrew imagery while remaining understandable in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
