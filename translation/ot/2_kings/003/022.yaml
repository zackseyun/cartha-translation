id: 2KI.3.22
reference: 2 Kings 3:22
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֣ימוּ בַ/בֹּ֔קֶר וְ/הַ/שֶּׁ֖מֶשׁ זָרְחָ֣ה עַל הַ/מָּ֑יִם וַ/יִּרְא֨וּ
    מוֹאָ֥ב מִ/נֶּ֛גֶד אֶת הַ/מַּ֖יִם אֲדֻמִּ֥ים כַּ/דָּֽם־־׃
translation:
  text: They rose early in the morning, and the sun shone on the water; and Moab saw
    the water opposite them, red like blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Moabites saw the water across from them.' The Hebrew uses 'Moab'
      collectively for the people of Moab, and the spatial phrase can be rendered
      'opposite them' or 'across from them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּימוּ
  chosen: They rose early
  alternatives:
  - They got up early
  - They arose early
  lexicon: HALOT
  rationale: Hiphil wayyiqtol of שׁכם conveys rising early or setting out early. 'They
    rose early' is natural modern English and preserves the temporal emphasis without
    over-paraphrase.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - when morning came
  lexicon: HALOT
  rationale: The prepositional phrase marks the time of the action. 'In the morning'
    is idiomatic and sufficiently formal.
- source_word: וְהַשֶּׁמֶשׁ זָרְחָה
  chosen: and the sun shone
  alternatives:
  - and the sun had risen
  - and the sun flashed
  lexicon: HALOT
  rationale: זרח commonly denotes shining or rising. In context the emphasis is on
    sunlight falling on the water, producing the visual effect; 'shone' best captures
    that immediate sense better than the more merely temporal 'had risen.'
- source_word: עַל הַמָּיִם
  chosen: on the water
  alternatives:
  - upon the water
  - over the water
  lexicon: HALOT
  rationale: עַל here indicates the sun's rays falling on the water. 'On the water'
    is clear and idiomatic.
- source_word: וַיִּרְאוּ מוֹאָב
  chosen: and Moab saw
  alternatives:
  - and the Moabites saw
  lexicon: HALOT
  rationale: The singular proper noun מוֹאָב is often used collectively for the people
    of Moab. Rendering it as 'Moab' preserves the Hebrew's collective-national style
    while remaining understandable in English.
- source_word: מִנֶּגֶד
  chosen: opposite them
  alternatives:
  - from a distance
  - across from them
  - in front of them
  lexicon: HALOT
  rationale: מִנֶּגֶד denotes being opposite or in front of. In context it describes
    the Moabites viewing the water across from their position. 'Opposite them' preserves
    the spatial relation more precisely than the vaguer 'from a distance.'
- source_word: אֶת הַמַּיִם
  chosen: the water
  lexicon: HALOT
  rationale: Direct object marker plus noun; straightforwardly rendered 'the water.'
- source_word: אֲדֻמִּים
  chosen: red
  alternatives:
  - reddened
  - appearing red
  lexicon: HALOT
  rationale: 'The adjective means ''red.'' A simple predicate complement in English
    is best: the water was seen as ''red.'''
- source_word: כַּדָּם
  chosen: like blood
  alternatives:
  - as blood
  lexicon: HALOT
  rationale: The comparison particle כ plus 'blood' gives a simile. 'Like blood' is
    the most natural modern rendering and preserves the vividness of the image.
