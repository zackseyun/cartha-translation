id: 2KI.3.15
reference: 2 Kings 3:15
source:
  edition: WLC
  text: וְ/עַתָּ֖ה קְחוּ לִ֣/י מְנַגֵּ֑ן וְ/הָיָה֙ כְּ/נַגֵּ֣ן הַֽ/מְנַגֵּ֔ן וַ/תְּהִ֥י
    עָלָ֖י/ו יַד יְהוָֽה־־׃
translation:
  text: But now, bring me a musician. And as the musician played, the hand of the
    LORD came upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a minstrel' or 'an instrumental player.' The Hebrew refers generally
      to one who plays music, without specifying the instrument.
    reason: lexical_alternative
  - marker: b
    text: '''The hand of the LORD'' is a Hebrew idiom for divine power or prophetic
      influence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Introduces an immediate transition in discourse. 'But now' captures the
    turn from prior speech to the requested action, while remaining natural English.
- source_word: קְחוּ לִי
  chosen: bring me
  alternatives:
  - take for me
  - get me
  lexicon: HALOT
  rationale: The imperative plus dative pronoun idiomatically means to procure or
    bring someone/something for the speaker. 'Bring me' is the most natural English
    equivalent in context.
- source_word: מְנַגֵּן
  chosen: a musician
  alternatives:
  - a minstrel
  - a harpist
  - one who plays music
  lexicon: HALOT
  rationale: The participle from נגן denotes one who plays an instrument. 'Musician'
    is broad and accurate; 'minstrel' is archaic, and the specific instrument is not
    stated in the Hebrew.
- source_word: וְהָיָה כְּנַגֵּן הַמְנַגֵּן
  chosen: And as the musician played
  alternatives:
  - And it happened, when the musician played
  - And when the musician was playing
  lexicon: HALOT
  rationale: This construction marks the circumstance under which the next event occurred.
    'As the musician played' is smooth modern English and preserves the temporal sense
    without woodenly reproducing the Hebrew narrative formula.
- source_word: יַד יְהוָה
  chosen: the hand of the LORD
  alternatives:
  - the power of the LORD
  - the LORD's hand
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine power or prophetic influence. Retaining
    'hand' preserves the biblical imagery and avoids over-interpreting the exact mode
    of divine action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: וַתְּהִי עָלָיו
  chosen: came upon him
  alternatives:
  - was upon him
  - came over him
  lexicon: HALOT
  rationale: This idiom commonly describes the onset of prophetic inspiration or divine
    empowerment. 'Came upon him' is idiomatic English and reflects the eventive force
    of the verb.
