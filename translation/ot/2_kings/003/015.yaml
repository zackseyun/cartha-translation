theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering יַד יְהוָה as an idiom of prophetic empowerment without over-specification
  chosen_reading: the hand of the LORD came upon him
  alternative_readings:
  - the power of the LORD came upon him
  rationale: The phrase likely denotes prophetic inspiration or divine power enabling
    Elisha's oracle, but the translation preserves the Hebrew idiom rather than resolving
    it into a narrower theological explanation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
