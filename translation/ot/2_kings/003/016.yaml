id: 2KI.3.16
reference: 2 Kings 3:16
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר כֹּ֖ה אָמַ֣ר יְהוָ֑ה עָשֹׂ֛ה הַ/נַּ֥חַל הַ/זֶּ֖ה גֵּבִ֥ים גֵּבִֽים׀׃
translation:
  text: 'And he said, “Thus says Yahweh: Make this wadi full of pits.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''wadi'' can also be rendered ''valley,'' ''streambed,'' or ''brook,'' referring to a seasonal watercourse.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats ''pits'' for emphasis: literally, ''Make this wadi pits, pits,'' that is, many pits or pits throughout it.'
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative form introducing direct speech; 'And he said' preserves Hebrew narrative sequencing without overinterpreting temporal nuance.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says' preserves the formal prophetic register, and 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עָשֹׂה
  chosen: Make
  alternatives:
  - Prepare
  - Dig
  lexicon: HALOT
  rationale: Imperative of עשה is broad ('make/do'). Here it governs the result phrase about the wadi and its pits. 'Make' is the most direct rendering; 'dig' is interpretive and better preserved as an alternative since the object is not the pits directly but the wadi as characterized by them.
- source_word: הַנַּחַל
  chosen: wadi
  alternatives:
  - valley
  - streambed
  - brook
  lexicon: HALOT
  rationale: נחל often denotes a torrent-bed or seasonal watercourse rather than a permanently flowing stream. 'Wadi' best captures the geographical sense in this context of expected water flow in an arid setting.
- source_word: הַזֶּה
  chosen: this
  lexicon: HALOT
  rationale: Straightforward demonstrative modifying 'wadi'.
- source_word: גֵּבִים גֵּבִים
  chosen: full of pits
  alternatives:
  - pits upon pits
  - ditches
  - trenches
  lexicon: HALOT
  rationale: The repeated plural intensifies or distributes the noun, indicating many excavations. English idiom is smoother with 'full of pits,' while preserving the sense of multiplicity. 'Ditches' or 'trenches' are possible but somewhat more specific than the Hebrew noun requires.
