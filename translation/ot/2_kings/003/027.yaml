id: 2KI.3.27
reference: 2 Kings 3:27
source:
  edition: WLC
  text: וַ/יִּקַּח֩ אֶת בְּנ֨/וֹ הַ/בְּכ֜וֹר אֲשֶׁר יִמְלֹ֣ךְ תַּחְתָּ֗י/ו וַ/יַּעֲלֵ֤/הוּ
    עֹלָה֙ עַל הַ֣/חֹמָ֔ה וַ/יְהִ֥י קֶצֶף גָּד֖וֹל עַל יִשְׂרָאֵ֑ל וַ/יִּסְעוּ֙ מֵֽ/עָלָ֔י/ו
    וַ/יָּשֻׁ֖בוּ לָ/אָֽרֶץ־־־־־׃פ
translation:
  text: Then he took his firstborn son, who was to reign in his place, and offered
    him up as a burnt offering on the wall. And there came great wrath against Israel,
    so they withdrew from him and returned to their land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great indignation/anger against Israel.' The Hebrew does not specify
      whose wrath this was; interpreters differ on whether it refers to divine wrath,
      Moab's fury, or Israel's demoralization after the sacrifice.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנוֹ הַבְּכוֹר
  chosen: his firstborn son
  alternatives:
  - his eldest son
  lexicon: HALOT
  rationale: בְּכוֹר denotes the firstborn, not merely older in age. 'Firstborn son'
    preserves both familial and succession significance.
- source_word: אֲשֶׁר יִמְלֹךְ תַּחְתָּיו
  chosen: who was to reign in his place
  alternatives:
  - who would reign after him
  - who was to become king after him
  lexicon: HALOT
  rationale: The clause identifies the son as the designated successor. 'In his place'
    reflects תַּחְתָּיו naturally in English while preserving succession language.
- source_word: וַיַּעֲלֵהוּ עֹלָה
  chosen: offered him up as a burnt offering
  alternatives:
  - made him a burnt offering
  - offered him as an עולה
  lexicon: HALOT
  rationale: The hiphil of עלה with עֹלָה is sacrificial language. 'Offered him up
    as a burnt offering' preserves the cultic force and the horror of the act without
    euphemism.
- source_word: עַל הַחֹמָה
  chosen: on the wall
  alternatives:
  - upon the city wall
  - on the rampart
  lexicon: HALOT
  rationale: The phrase most naturally refers to the city wall. 'On the wall' is concise
    and faithful; 'city' is implied by context and need not be added in the main text.
- source_word: קֶצֶף גָּדוֹל
  chosen: great wrath
  alternatives:
  - great indignation
  - great anger
  lexicon: HALOT
  rationale: קֶצֶף commonly denotes wrath/indignation. 'Great wrath' is the most direct
    rendering and preserves the severity and ambiguity of the source.
- source_word: עַל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: With קצף, עַל is naturally rendered 'against' in English, indicating
    hostile force directed toward Israel.
- source_word: וַיִּסְעוּ מֵעָלָיו
  chosen: they withdrew from him
  alternatives:
  - they departed from him
  - they broke camp from against him
  lexicon: HALOT
  rationale: נסע can mean to pull up camp/set out. In military context, 'withdrew
    from him' communicates that the attacking forces ceased operations against the
    king of Moab.
- source_word: וַיָּשֻׁבוּ לָאָרֶץ
  chosen: returned to their land
  alternatives:
  - returned to the land
  - went back to their own land
  lexicon: HALOT
  rationale: The subject is the coalition forces, so 'their land' makes explicit the
    possessive sense implied in context while remaining natural English.
