theological_decisions:
- issue: Meaning of 'great wrath against Israel'
  chosen_reading: Retain the ambiguous expression 'great wrath' without specifying
    whether it is divine wrath, Moabite fury, or the psychological/military effect
    of the sacrifice.
  alternative_readings:
  - great divine wrath against Israel
  - great fury from Moab against Israel
  - great consternation fell upon Israel
  rationale: The Hebrew does not explicitly identify the source of the wrath. In keeping
    with the translation philosophy, the main text preserves the tension rather than
    resolving a debated interpretation. The ambiguity is significant and should remain
    visible to the reader.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
