theological_decisions:
- issue: Rendering the divine name YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Prophetic stance before God
  chosen_reading: before whom I stand
  alternative_readings:
  - whom I serve
  rationale: The phrase can imply prophetic service, but the translation preserves
    the literal standing imagery to avoid importing a more interpretive gloss into
    the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
