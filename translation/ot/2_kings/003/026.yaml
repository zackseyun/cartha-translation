id: 2KI.3.26
reference: 2 Kings 3:26
source:
  edition: WLC
  text: וַ/יַּרְא֙ מֶ֣לֶךְ מוֹאָ֔ב כִּֽי חָזַ֥ק מִמֶּ֖/נּוּ הַ/מִּלְחָמָ֑ה וַ/יִּקַּ֣ח
    א֠וֹת/וֹ שְׁבַע מֵא֨וֹת אִ֜ישׁ שֹׁ֣לֵֽף חֶ֗רֶב לְ/הַבְקִ֛יעַ אֶל מֶ֥לֶךְ אֱד֖וֹם
    וְ/לֹ֥א יָכֹֽלוּ־־־׃
translation:
  text: When the king of Moab saw that the battle was too strong for him, he took
    with him seven hundred men who drew the sword to break through to the king of
    Edom, but they could not.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to break through against the king of Edom.' The Hebrew preposition can
      be understood as directional ('to/toward') or hostile ('against') in this military
      context.
    reason: alternative_reading
lexical_decisions:
- source_word: חָזַק מִמֶּנּוּ הַמִּלְחָמָה
  chosen: the battle was too strong for him
  alternatives:
  - the battle prevailed against him
  - the fighting was stronger than he
  lexicon: HALOT
  rationale: The idiom uses חזק ('be strong') with מן + pronoun to express that the
    battle had become stronger than, or was overpowering, the king of Moab. 'Too strong
    for him' is idiomatic modern English and preserves the sense of military disadvantage
    without over-paraphrase.
- source_word: אֹתוֹ
  chosen: with him
  alternatives:
  - him
  lexicon: HALOT
  rationale: 'After וַיִּקַּח (''he took''), the object marker plus pronominal suffix
    can be rendered woodenly as ''he took him/it,'' but in this context the sense
    is reflexive/associative: he took along a force. English requires an explicit
    complement such as ''with him'' to make the clause intelligible.'
- source_word: שְׁבַע מֵאוֹת אִישׁ
  chosen: seven hundred men
  alternatives:
  - seven hundred soldiers
  lexicon: HALOT
  rationale: אִישׁ here is a counting noun for persons in a military context. 'Men'
    is the most direct rendering and fits the gender-accurate policy; 'soldiers' is
    interpretive though contextually true.
- source_word: שֹׁלֵף חֶרֶב
  chosen: who drew the sword
  alternatives:
  - sword-drawing men
  - armed with swords
  lexicon: HALOT
  rationale: Literally 'drawing sword.' The phrase denotes fighting men ready for
    combat. 'Who drew the sword' keeps the Hebrew imagery and military force better
    than the flatter 'armed with swords.'
- source_word: לְהַבְקִיעַ
  chosen: to break through
  alternatives:
  - to force a breach
  - to cut through
  lexicon: HALOT
  rationale: The Hiphil of בקע here refers to making a breach through enemy lines.
    'Break through' is natural military English and closely matches the Hebrew action.
- source_word: אֶל מֶלֶךְ אֱדוֹם
  chosen: to the king of Edom
  alternatives:
  - against the king of Edom
  lexicon: HALOT
  rationale: אֶל can mean 'to, toward, against' depending on context. Since the action
    is a military breakout directed at a hostile position, English readers may infer
    hostility from context without forcing 'against' into the text. 'To the king of
    Edom' preserves the preposition more formally while remaining clear.
- source_word: וְלֹא יָכֹלוּ
  chosen: but they could not
  alternatives:
  - but they were not able
  - but they did not succeed
  lexicon: HALOT
  rationale: The plural verb refers to the king and/or his men as a group failing
    in the attempted breakthrough. 'Could not' is concise and faithful; 'did not succeed'
    is slightly more interpretive.
