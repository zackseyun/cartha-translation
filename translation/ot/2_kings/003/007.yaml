id: 2KI.3.7
reference: 2 Kings 3:7
source:
  edition: WLC
  text: וַ/יֵּ֡לֶךְ וַ/יִּשְׁלַח֩ אֶל יְהוֹשָׁפָ֨ט מֶֽלֶךְ יְהוּדָ֜ה לֵ/אמֹ֗ר מֶ֤לֶךְ
    מוֹאָב֙ פָּשַׁ֣ע בִּ֔/י הֲ/תֵלֵ֥ךְ אִתִּ֛/י אֶל מוֹאָ֖ב לַ/מִּלְחָמָ֑ה וַ/יֹּ֣אמֶר
    אֶעֱלֶ֔ה כָּמ֧וֹ/נִי כָמ֛וֹ/ךָ כְּ/עַמִּ֥/י כְ/עַמֶּ֖/ךָ כְּ/סוּסַ֥/י כְּ/סוּסֶֽי/ךָ־־־׃
translation:
  text: So he went and sent word to Jehoshaphat king of Judah, saying, “The king of
    Moab has rebelled against me. Will you go with me to fight against Moab?” And
    he said, “I will go. I am as you are, my people as your people, my horses as your
    horses.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “has broken away from me.” The Hebrew verb can denote political revolt
      or breach of allegiance; here it refers to Moab’s rebellion against Israelite
      rule.
    reason: lexical_alternative
  - marker: b
    text: Hebrew, “I will go up.” The verb often reflects movement into battle or
      toward higher terrain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So he went
  alternatives:
  - Then he went
  - And he went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So he went' gives natural
    English sequence while preserving the action.
- source_word: וַיִּשְׁלַח אֶל
  chosen: and sent word to
  alternatives:
  - and sent to
  - and sent a message to
  lexicon: HALOT
  rationale: With אֶל plus a quoted message, the idiom means sending a message rather
    than physically sending an object. 'Sent word to' is concise and idiomatic.
- source_word: יְהוֹשָׁפָט
  chosen: Jehoshaphat
  rationale: Personal names are transliterated by standard English convention.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward construct rendering identifying Jehoshaphat's royal office.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard introduction to direct speech in English narrative.
- source_word: מֶלֶךְ מוֹאָב
  chosen: The king of Moab
  lexicon: HALOT
  rationale: Definite in sense in context; refers to the known ruler of Moab.
- source_word: פָּשַׁע בִּי
  chosen: has rebelled against me
  alternatives:
  - has broken away from me
  - has transgressed against me
  lexicon: HALOT
  rationale: In political context פשע denotes revolt or rebellion by a vassal. 'Has
    rebelled against me' best captures the historical-political sense.
- source_word: הֲתֵלֵךְ אִתִּי
  chosen: Will you go with me
  alternatives:
  - Will you come with me
  lexicon: HALOT
  rationale: הלך is 'go'; English could use 'come' from the speaker's perspective,
    but 'go with me' stays closer to the Hebrew wording.
- source_word: אֶל מוֹאָב לַמִּלְחָמָה
  chosen: to fight against Moab
  alternatives:
  - to Moab for battle
  - against Moab to war
  lexicon: HALOT
  rationale: The phrase expresses military action directed toward Moab. 'To fight
    against Moab' is natural English and preserves the hostile purpose.
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - And he replied
  lexicon: HALOT
  rationale: Simple narrative speech tag; no need to heighten beyond the Hebrew.
- source_word: אֶעֱלֶה
  chosen: I will go
  alternatives:
  - I will come up
  - I will march up
  lexicon: HALOT
  rationale: עלה literally means 'go up,' often for military movement. Here 'I will
    go' is smoother in English, while the military context is already clear from the
    request to fight.
- source_word: כָּמוֹנִי כָמוֹךָ
  chosen: I am as you are
  alternatives:
  - I am like you
  - I am as yourself
  lexicon: HALOT
  rationale: This elliptical pledge of solidarity is rendered as a complete English
    clause. 'I am as you are' preserves the mutual-identification force.
- source_word: כְּעַמִּי כְעַמֶּךָ
  chosen: my people as your people
  alternatives:
  - my people are as your people
  - my people like your people
  lexicon: HALOT
  rationale: The verbless parallelism is retained compactly in English. The phrase
    expresses political and military solidarity.
- source_word: כְּסוּסַי כְּסוּסֶיךָ
  chosen: my horses as your horses
  alternatives:
  - my horses are as your horses
  lexicon: HALOT
  rationale: Retains the terse parallel structure of the Hebrew and likely implies
    shared military resources, especially cavalry/chariot strength.
