id: 2KI.3.5
reference: 2 Kings 3:5
source:
  edition: WLC
  text: וַ/יְהִ֖י כְּ/מ֣וֹת אַחְאָ֑ב וַ/יִּפְשַׁ֥ע מֶֽלֶךְ מוֹאָ֖ב בְּ/מֶ֥לֶךְ יִשְׂרָאֵֽל־׃
translation:
  text: And it happened, when Ahab died, that the king of Moab rebelled against the
    king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'after the death of Ahab.' The Hebrew temporal expression
      can be rendered either way.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came about
  - And it was
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces the next event in narrative
    sequence. 'And it happened' preserves the Hebrew narrative transition in readable
    modern English without becoming overly wooden.
- source_word: כְּמוֹת
  chosen: when ... died
  alternatives:
  - at the death of
  - after the death of
  lexicon: HALOT
  rationale: The preposition כ with the infinitive construct of מות can mean 'when'
    or 'at the death of.' Here 'when Ahab died' is natural English and fits the temporal
    force. 'After the death of' is possible but slightly more interpretive than the
    Hebrew requires.
- source_word: אַחְאָב
  chosen: Ahab
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: וַיִּפְשַׁע
  chosen: rebelled
  alternatives:
  - revolted
  - acted rebelliously
  lexicon: HALOT
  rationale: פשע in this political context denotes rebellion or revolt against an
    overlord. 'Rebelled' is the clearest modern English equivalent and matches the
    covenant-political sense of breaking subjection.
- source_word: מֶלֶךְ מוֹאָב
  chosen: the king of Moab
  alternatives:
  - Moab's king
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. 'The king of Moab' is idiomatic
    and preserves the formal designation of the ruler.
- source_word: בְּמֶלֶךְ יִשְׂרָאֵל
  chosen: against the king of Israel
  alternatives:
  - from the king of Israel
  - with respect to the king of Israel
  lexicon: HALOT
  rationale: With פשע, the preposition ב marks the party against whom rebellion is
    directed. English idiom requires 'against,' making the political relationship
    explicit without adding content.
