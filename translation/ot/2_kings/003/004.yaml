id: 2KI.3.4
reference: 2 Kings 3:4
source:
  edition: WLC
  text: וּ/מֵישַׁ֥ע מֶֽלֶךְ מוֹאָ֖ב הָיָ֣ה נֹקֵ֑ד וְ/הֵשִׁ֤יב לְ/מֶֽלֶךְ יִשְׂרָאֵל֙
    מֵאָה אֶ֣לֶף כָּרִ֔ים וּ/מֵ֥אָה אֶ֖לֶף אֵילִ֥ים צָֽמֶר־־־׃
translation:
  text: Now Mesha king of Moab was a sheep breeder, and he used to pay the king of
    Israel a tribute of one hundred thousand lambs and the wool of one hundred thousand
    rams.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one hundred thousand rams, wool.' The phrase is elliptical;
      it may mean 'one hundred thousand rams with wool' or, more likely in context,
      'the wool of one hundred thousand rams.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹקֵד
  chosen: sheep breeder
  alternatives:
  - sheepmaster
  - sheep raiser
  - wool grower
  lexicon: HALOT
  rationale: The noun denotes one engaged in sheep raising/breeding. 'Sheep breeder'
    is clear modern English and fits the economic context better than the archaic
    'sheepmaster.'
- source_word: וְהֵשִׁיב
  chosen: used to pay
  alternatives:
  - rendered
  - paid
  - brought back
  lexicon: HALOT
  rationale: The Hiphil of שוב here idiomatically refers to rendering payment/tribute
    regularly. 'Used to pay' captures the customary sense in context better than a
    wooden 'caused to return.'
- source_word: מֵאָה אֶלֶף כָּרִים
  chosen: one hundred thousand lambs
  alternatives:
  - one hundred thousand young rams
  - one hundred thousand pasture lambs
  lexicon: HALOT
  rationale: כָּרִים commonly refers to lambs or young male sheep. 'Lambs' is the
    most natural English rendering in a tribute list.
- source_word: אֵילִים צָמֶר
  chosen: the wool of one hundred thousand rams
  alternatives:
  - one hundred thousand rams, wool
  - one hundred thousand wool-bearing rams
  lexicon: HALOT
  rationale: The Hebrew places 'wool' after 'rams,' yielding an elliptical expression.
    The sense is not likely that he delivered the animals themselves plus an additional
    appositive 'wool,' but that the tribute consisted of lambs and wool from rams.
    Supplying 'the wool of' makes the elliptical Hebrew idiomatic in English while
    preserving the economic meaning.
- source_word: מֶלֶךְ מוֹאָב / מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Moab / king of Israel
  rationale: Standard construct rendering; titles are translated and place names transliterated
    per project philosophy.
