id: 2KI.3.23
reference: 2 Kings 3:23
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ דָּ֣ם זֶ֔ה הָחֳרֵ֤ב נֶֽחֶרְבוּ֙ הַ/מְּלָכִ֔ים וַ/יַּכּ֖וּ אִ֣ישׁ
    אֶת רֵעֵ֑/הוּ וְ/עַתָּ֥ה לַ/שָּׁלָ֖ל מוֹאָֽב־׃
translation:
  text: And they said, “This is blood! The kings have surely fought each other and
    struck down one another. Now then, Moab, to the spoil!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “The kings have utterly destroyed one another.” The Hebrew uses an emphatic
      form of 'be destroyed/devastated'; in context it refers to the kings apparently
      turning on each other.
    reason: lexical_alternative
  - marker: b
    text: Or, “Moabites, to the plunder!”
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּם זֶה
  chosen: This is blood!
  alternatives:
  - This is blood.
  - Blood!
  lexicon: HALOT
  rationale: A verbless exclamation in Hebrew. 'This is blood!' preserves the demonstrative
    force of זֶה while sounding natural in English.
- source_word: הָחֳרֵב נֶחֶרְבוּ
  chosen: have surely fought each other
  alternatives:
  - have utterly destroyed one another
  - have surely been destroyed
  - have fought to destruction
  lexicon: HALOT
  rationale: The construction uses the infinitive absolute plus finite verb of חרב
    for emphasis. In context, the Moabites infer mutual slaughter among allied kings,
    so an idiomatic reciprocal rendering best conveys the sense rather than a wooden
    'have been utterly destroyed.'
- source_word: הַמְּלָכִים
  chosen: the kings
  lexicon: HALOT
  rationale: Definite plural referring to the coalition rulers previously mentioned;
    straightforwardly rendered 'the kings.'
- source_word: וַיַּכּוּ אִישׁ אֶת־רֵעֵהוּ
  chosen: and struck down one another
  alternatives:
  - and each man struck his companion
  - and each struck down his fellow
  lexicon: HALOT
  rationale: The idiom איש את־רעהו expresses reciprocal action. 'Struck down one another'
    fits the military context and complements the preceding inference of mutual combat.
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks an excited transition from observation to exhortation. 'Now then'
    captures the rhetorical urgency.
- source_word: לַשָּׁלָל
  chosen: to the spoil
  alternatives:
  - to the plunder
  - for spoil
  lexicon: HALOT
  rationale: A battle cry urging movement toward looting. 'To the spoil' is concise
    and vivid, preserving the directional force of ל.
- source_word: מוֹאָב
  chosen: Moab
  alternatives:
  - Moabites
  lexicon: HALOT
  rationale: The nation name is used vocatively or as an exclamatory address. 'Moab'
    preserves the Hebrew form and the sharpness of the cry; English can supply the
    vocative sense by punctuation.
