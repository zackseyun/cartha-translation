id: 2KI.3.3
reference: 2 Kings 3:3
source:
  edition: WLC
  text: רַ֠ק בְּ/חַטֹּ֞אות יָרָבְעָ֧ם בֶּֽן נְבָ֛ט אֲשֶׁר הֶחֱטִ֥יא אֶת יִשְׂרָאֵ֖ל
    דָּבֵ֑ק לֹא סָ֖ר מִמֶּֽ/נָּה־־־־׃ס
translation:
  text: Only, he clung to the sins of Jeroboam son of Nebat, by which he caused Israel
    to sin; he did not turn away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which made Israel sin' / 'with which he led Israel into sin.' The Hebrew
      causative verb means Jeroboam's actions brought Israel into sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: Marks a limitation or exception to the previous positive assessment of
    the king. 'Only' is concise and idiomatic in this evaluative narrative formula.
- source_word: בְּחַטֹּאות
  chosen: to the sins
  alternatives:
  - in the sins
  - with the sins
  lexicon: HALOT
  rationale: With דבק ('cling'), the preposition is best represented idiomatically
    in English as 'clung to the sins,' expressing adherence rather than mere location.
- source_word: חַטֹּאות
  chosen: sins
  alternatives:
  - sinful practices
  - offenses
  lexicon: HALOT
  rationale: Plural noun refers to Jeroboam's cultic transgressions/policies. 'Sins'
    preserves the moral-religious force without over-specifying.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  rationale: Standard transliteration of the personal name and patronymic; article
    omitted for smoother modern English while preserving the Hebrew identification
    formula.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - which made Israel sin
  - with which he led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. The relative clause most naturally refers
    to Jeroboam's sins/practices as the means by which he caused Israel to sin. 'Caused
    Israel to sin' preserves the standard Deuteronomistic formula.
- source_word: דָּבֵק
  chosen: he clung
  alternatives:
  - he held fast
  - he stuck fast
  lexicon: HALOT
  rationale: Qal of דבק conveys strong attachment or adherence. 'Clung' is natural
    English and preserves the sense of persistent attachment.
- source_word: לֹא סָר
  chosen: he did not turn away
  alternatives:
  - he did not depart
  - he did not remove himself
  lexicon: HALOT
  rationale: Common idiom for ceasing from a course of action. 'Turn away' is idiomatic
    and clear in modern English.
- source_word: מִמֶּנָּה
  chosen: from them
  alternatives:
  - from it
  lexicon: HALOT
  rationale: 'Although the suffix is formally singular feminine, its antecedent is
    the collective/plural ''sins.'' English idiom prefers plural agreement here: ''from
    them.'' This avoids awkwardness while preserving the referent.'
