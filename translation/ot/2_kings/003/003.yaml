theological_decisions:
- issue: Evaluation formula for royal apostasy
  chosen_reading: Retain explicit moral language ('sins,' 'caused Israel to sin')
    without softening into merely political or cultic deviation.
  alternative_readings:
  - Render more neutrally as 'practices' or 'errors'
  rationale: The Hebrew uses the standard Deuteronomistic theological evaluation of
    Jeroboam's idolatrous pattern. Translating with explicit sin language preserves
    the text's own theological judgment rather than muting it.
  doctrine_reference: Translation philosophy §§1, 3, 6
