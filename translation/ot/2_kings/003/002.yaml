id: 2KI.3.2
reference: 2 Kings 3:2
source:
  edition: WLC
  text: וַ/יַּעֲשֶׂ֤ה הָ/רַע֙ בְּ/עֵינֵ֣י יְהוָ֔ה רַ֕ק לֹ֥א כְ/אָבִ֖י/ו וּ/כְ/אִמּ֑/וֹ
    וַ/יָּ֨סַר֙ אֶת מַצְּבַ֣ת הַ/בַּ֔עַל אֲשֶׁ֥ר עָשָׂ֖ה אָבִֽי/ו־׃
translation:
  text: He did what was evil in the eyes of the LORD, though not like his father and
    his mother, for he removed the pillar of Baal that his father had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''only, not like his father and his mother.'' The Hebrew particle introduces
      a qualification: he was evil, but not to the same extent as his parents.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sacred pillar of Baal' or 'the standing stone of Baal.' The Hebrew
      refers to a cultic pillar associated with Baal worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשֶׂה הָרַע
  chosen: He did what was evil
  alternatives:
  - He did evil
  - He did the evil
  lexicon: HALOT
  rationale: The idiom עשה + הרע commonly means to act evilly or do what is evil.
    'He did what was evil' is natural modern English while preserving the evaluative
    force.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom meaning in Yahweh's evaluation. 'In the
    eyes of the LORD' preserves the imagery and is clear in English. Per doctrine,
    יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrinal guideline specifies the default rendering of the divine
    name as 'the LORD'.
- source_word: רַק
  chosen: though
  alternatives:
  - only
  - except that
  - nevertheless
  lexicon: HALOT
  rationale: Here רַק introduces a qualification to the previous judgment. 'Though'
    communicates the concessive force smoothly in context better than the more wooden
    'only'.
- source_word: לֹא כְאָבִיו וּכְאִמּוֹ
  chosen: not like his father and his mother
  alternatives:
  - not as his father and his mother
  - not like his father or his mother
  lexicon: HALOT
  rationale: The comparison is to both parents together, likely Ahab and Jezebel.
    'Not like his father and his mother' is the most direct rendering.
- source_word: וַיָּסַר
  chosen: for he removed
  alternatives:
  - and he removed
  - and he took away
  lexicon: HALOT
  rationale: The verb means remove/take away. Rendering with 'for' makes explicit
    the explanatory relation to the preceding qualification, which is contextually
    implied, while still staying close to the Hebrew narrative sequence.
- source_word: מַצְּבַת הַבַּעַל
  chosen: the pillar of Baal
  alternatives:
  - the sacred pillar of Baal
  - the image of Baal
  - the standing stone of Baal
  lexicon: HALOT
  rationale: מַצֵּבָה denotes a standing stone or cultic pillar. 'Pillar' is concise
    and accurate; 'sacred pillar' is possible but adds cultic interpretation already
    sufficiently implied by the Baal context.
- source_word: אֲשֶׁר עָשָׂה אָבִיו
  chosen: that his father had made
  alternatives:
  - which his father made
  lexicon: HALOT
  rationale: The relative clause identifies the pillar as one made by his father.
    The English pluperfect 'had made' fits the prior action relative to the main narrative.
