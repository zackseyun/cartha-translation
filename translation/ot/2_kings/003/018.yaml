id: 2KI.3.18
reference: 2 Kings 3:18
source:
  edition: WLC
  text: וְ/נָקַ֥ל זֹ֖את בְּ/עֵינֵ֣י יְהוָ֑ה וְ/נָתַ֥ן אֶת מוֹאָ֖ב בְּ/יֶדְ/כֶֽם־׃
translation:
  text: And this is a small thing in the eyes of Yahweh; he will also give Moab into your hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And this is easy in the sight of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָקַל
  chosen: is a small thing
  alternatives:
  - is light
  - is easy
  - is a trivial thing
  lexicon: HALOT
  rationale: The Niphal/Qal-like stative sense from קלל/קל conveys something being slight, easy, or of little weight. In idiomatic English, 'is a small thing' best captures the evaluative sense without sounding wooden. The prefixed conjunction is carried forward as 'And.'
- source_word: זֹאת
  chosen: this
  lexicon: HALOT
  rationale: Straightforward demonstrative referring to the just-mentioned provision of water in the preceding context.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: A common Hebrew idiom for evaluation or estimation. 'In the eyes of' preserves the metaphor and remains natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְנָתַן
  chosen: he will also give
  alternatives:
  - and he will give
  - then he will give
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction in prophetic speech has a future/resultative sense here. 'Will give' fits the predictive context. 'Also' appropriately conveys that this is an additional act beyond the water miracle, making the discourse flow explicit in English.
- source_word: אֶת מוֹאָב
  chosen: Moab
  alternatives:
  - the Moabites
  lexicon: HALOT
  rationale: The direct object is the nation/entity 'Moab.' Rendering it as 'Moab' preserves the Hebrew wording; the sense is the kingdom/people collectively.
- source_word: בְּיֶדְכֶם
  chosen: into your hand
  alternatives:
  - into your power
  - into your control
  lexicon: HALOT
  rationale: The idiom 'give into the hand' commonly denotes delivering someone into another's power. 'Into your hand' preserves the biblical idiom while remaining intelligible.
