id: 2KI.3.24
reference: 2 Kings 3:24
source:
  edition: WLC
  text: וַ/יָּבֹאוּ֮ אֶל מַחֲנֵ֣ה יִשְׂרָאֵל֒ וַ/יָּקֻ֤מוּ יִשְׂרָאֵל֙ וַ/יַּכּ֣וּ
    אֶת מוֹאָ֔ב וַ/יָּנֻ֖סוּ מִ/פְּנֵי/הֶ֑ם ו/יבו בָ֔/הּ וְ/הַכּ֖וֹת אֶת מוֹאָֽב־־־־׃
translation:
  text: When they came to the camp of Israel, Israel rose up and struck Moab, and
    they fled before them. Then they went into it and kept striking Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they entered the land' or 'they advanced into Moab.' The Hebrew has
      'they went into it,' with the feminine suffix likely referring to the land/territory
      rather than the people directly.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - encampment
  lexicon: HALOT
  rationale: The noun denotes a military camp in this narrative context. 'Camp' is
    the most natural modern English rendering and preserves the military setting.
- source_word: וַיָּקֻמוּ
  chosen: rose up
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: From קום, here marking decisive action in battle. 'Rose up' keeps the
    vivid narrative sequence without overinterpreting as merely 'attacked.'
- source_word: וַיַּכּוּ
  chosen: struck
  alternatives:
  - attacked
  - defeated
  - smote
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Struck' is a readable modern equivalent
    that preserves the concrete military action without importing the fuller result
    'defeated.'
- source_word: וַיָּנֻסוּ מִפְּנֵיהֶם
  chosen: they fled before them
  alternatives:
  - they fled from before them
  - they fled from them
  lexicon: HALOT
  rationale: The idiom literally involves fleeing from before someone's face/presence.
    'Fled before them' is concise, idiomatic, and preserves the sense of rout.
- source_word: וַיָּבֹאוּ בָהּ
  chosen: they went into it
  alternatives:
  - they entered it
  - they came into it
  lexicon: HALOT
  rationale: The ketiv-like form points to בוא, 'to come/go in.' The feminine singular
    suffix in בָהּ has an ambiguous antecedent. 'Into it' preserves the ambiguity
    rather than specifying 'the land' or 'Moab' too strongly in the main text.
- source_word: בָהּ
  chosen: it
  alternatives:
  - it (the land)
  - him/it (Moab as a people/territory)
  lexicon: HALOT
  rationale: The 3fs suffix most naturally refers to a feminine antecedent not explicitly
    restated, likely the land/territory. Because the text leaves the antecedent somewhat
    compressed, 'it' best preserves the Hebrew's terseness and ambiguity.
- source_word: וְהַכּוֹת
  chosen: kept striking
  alternatives:
  - striking
  - and struck
  - continued striking
  lexicon: HALOT
  rationale: The infinitive construct with prefixed conjunction after the wayyiqtol
    chain conveys continued or accompanying action. 'Kept striking' captures the durative
    force in natural English.
- source_word: מוֹאָב
  chosen: Moab
  alternatives:
  - the Moabites
  lexicon: HALOT
  rationale: The Hebrew uses the place/people name directly. 'Moab' preserves the
    source wording, allowing the collective sense of the nation/army to stand.
