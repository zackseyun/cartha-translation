id: 2KI.3.12
reference: 2 Kings 3:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יְה֣וֹשָׁפָ֔ט יֵ֥שׁ אוֹת֖/וֹ דְּבַר יְהוָ֑ה וַ/יֵּרְד֣וּ אֵלָ֗י/ו
    מֶ֧לֶךְ יִשְׂרָאֵ֛ל וִ/יהוֹשָׁפָ֖ט וּ/מֶ֥לֶךְ אֱדֽוֹם־׃
translation:
  text: Jehoshaphat said, “The word of the LORD is with him.” So the king of Israel,
    Jehoshaphat, and the king of Edom went down to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He has a word from the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - asked
  - spoke
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from אמר; simple past 'said' best fits
    the direct speech introduction.
- source_word: יֵשׁ אֹתוֹ
  chosen: is with him
  alternatives:
  - he has
  - there is in him/with him
  lexicon: HALOT
  rationale: The existential יֵשׁ with אֹתוֹ idiomatically indicates possession or
    presence. In context, Jehoshaphat is affirming that Elisha has access to or bears
    divine revelation, so 'is with him' is the most natural English expression while
    preserving the sense that the word belongs with him.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - a word from the LORD
  - the message of the LORD
  lexicon: HALOT
  rationale: A common prophetic expression. 'The word of the LORD' preserves the established
    biblical idiom and the likely sense that genuine prophetic revelation is available
    through Elisha. The divine name is rendered 'the LORD' per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrinal guideline for the divine name YHWH.
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - came down
  - descended
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Went down' is clear modern English
    and preserves the directional nuance, likely either topographical or movement
    to the prophet's location.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - down to him
  lexicon: HALOT
  rationale: The preposition means 'to/toward him.' Because English naturally carries
    the downward motion in the preceding verb, the phrase is rendered simply 'to him'
    in the lexical sense, though the full English sentence retains 'went down to him.'
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  alternatives:
  - Israel's king
  lexicon: HALOT
  rationale: Formal title preserved straightforwardly.
- source_word: וִיהוֹשָׁפָט
  chosen: Jehoshaphat
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: וּמֶלֶךְ אֱדוֹם
  chosen: and the king of Edom
  alternatives:
  - and Edom's king
  lexicon: HALOT
  rationale: Formal title preserved straightforwardly; coordinate structure in the
    Hebrew is maintained.
