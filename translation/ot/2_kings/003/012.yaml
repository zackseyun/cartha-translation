theological_decisions:
- issue: Prophetic formula דְּבַר יְהוָה in relation to Elisha
  chosen_reading: The phrase is rendered as indicating that genuine revelation from
    the LORD is available through him.
  alternative_readings:
  - He possesses a prophetic message from the LORD
  - The LORD's matter/word concerns him
  rationale: In context, Jehoshaphat is identifying Elisha as a true prophet whose
    counsel can be sought. The idiomatic English 'The word of the LORD is with him'
    preserves that theological function without over-expanding the text.
  doctrine_reference: 'Translation philosophy §§1, 3, 6; Contested terms: יְהוָה →
    the LORD'
