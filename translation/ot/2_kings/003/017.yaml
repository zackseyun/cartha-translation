id: 2KI.3.17
reference: 2 Kings 3:17
source:
  edition: WLC
  text: כִּֽי כֹ֣ה אָמַ֣ר יְהוָ֗ה לֹֽא תִרְא֥וּ ר֨וּחַ֙ וְ/לֹֽא תִרְא֣וּ גֶ֔שֶׁם וְ/הַ/נַּ֥חַל
    הַ/ה֖וּא יִמָּ֣לֵא מָ֑יִם וּ/שְׁתִיתֶ֛ם אַתֶּ֥ם וּ/מִקְנֵי/כֶ֖ם וּֽ/בְהֶמְתְּ/כֶֽם־׀־־׃
translation:
  text: 'For this is what the LORD says: You will not see wind, and you will not see
    rain, yet that wadi will be filled with water, and you and your livestock and
    your animals will drink.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that valley' or 'that streambed.' The Hebrew נחל often refers to a wadi,
      a seasonal watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD' rather than a transliteration.
- source_word: כִּי כֹה אָמַר
  chosen: For this is what ... says
  alternatives:
  - For thus says ...
  - Indeed, this is what ... says
  lexicon: HALOT
  rationale: This idiom introduces a divine declaration. 'For this is what ... says'
    preserves the explanatory force of כִּי and gives natural modern English while
    remaining close to the Hebrew formula.
- source_word: תִרְאוּ
  chosen: you will not see
  alternatives:
  - you do not see
  - you shall not see
  lexicon: HALOT
  rationale: The imperfect here is best rendered futurally in context, describing
    what will not be observed as the promised provision occurs.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In parallel with 'rain' and in this meteorological context, רוּחַ clearly
    refers to wind, not spirit.
- source_word: גֶשֶׁם
  chosen: rain
  alternatives:
  - downpour
  lexicon: HALOT
  rationale: Standard rendering in weather context; paired with 'wind' to stress the
    absence of visible natural causes.
- source_word: הַנַּחַל הַהוּא
  chosen: that wadi
  alternatives:
  - that valley
  - that streambed
  - that brook
  lexicon: HALOT
  rationale: נחל often denotes a wadi or seasonal watercourse rather than a permanently
    flowing stream. 'Wadi' best captures the geographical sense in this arid setting,
    though less familiar than 'valley' or 'streambed'.
- source_word: יִמָּלֵא מָיִם
  chosen: will be filled with water
  alternatives:
  - will fill with water
  - will be full of water
  lexicon: HALOT
  rationale: 'The Niphal form is naturally rendered as a passive/resultative: the
    wadi will come to be filled with water.'
- source_word: וּשְׁתִיתֶם
  chosen: will drink
  alternatives:
  - shall drink
  lexicon: HALOT
  rationale: Simple future fits the sequence of promised events and reads naturally
    in English.
- source_word: מִקְנֵיכֶם
  chosen: your livestock
  alternatives:
  - your cattle
  - your possessions
  lexicon: HALOT
  rationale: In this context the term refers to owned animals/herds rather than property
    in general. 'Livestock' is broad and natural.
- source_word: בְהֶמְתְּכֶם
  chosen: your animals
  alternatives:
  - your beasts
  - your cattle
  lexicon: HALOT
  rationale: Used alongside מִקְנֵיכֶם, this likely broadens the reference to beasts/animals
    generally. Rendering the pair as 'your livestock and your animals' preserves the
    Hebrew distinction without over-interpreting the exact categories.
