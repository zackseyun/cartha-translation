id: 2KI.3.1
reference: 2 Kings 3:1
source:
  edition: WLC
  text: וִ/יהוֹרָ֣ם בֶּן אַחְאָ֗ב מָלַ֤ךְ עַל יִשְׂרָאֵל֙ בְּ/שֹׁ֣מְר֔וֹן בִּ/שְׁנַת֙
    שְׁמֹנֶ֣ה עֶשְׂרֵ֔ה לִ/יהוֹשָׁפָ֖ט מֶ֣לֶךְ יְהוּדָ֑ה וַ/יִּמְלֹ֖ךְ שְׁתֵּים עֶשְׂרֵ֥ה
    שָׁנָֽה־־־׃
translation:
  text: Now Jehoram son of Ahab became king over Israel in Samaria in the eighteenth
    year of Jehoshaphat king of Judah, and he reigned twelve years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And Jehoram son of Ahab became king over Israel…' The
      Hebrew conjunction can be rendered simply as 'and.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִ/יהוֹרָם
  chosen: Now Jehoram
  alternatives:
  - And Jehoram
  - Jehoram
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered as discourse-continuing 'Now' rather
    than wooden 'And' to produce natural modern English while preserving narrative
    continuity. The personal name is transliterated per project policy.
- source_word: בֶּן אַחְאָב
  chosen: son of Ahab
  alternatives:
  - the son of Ahab
  lexicon: HALOT
  rationale: A straightforward filial designation; English omits the article for natural
    style.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: Here the qatal verb marks accession to kingship, not the duration of
    rule. 'Became king' distinguishes accession from the later וַיִּמְלֹךְ clause
    that summarizes the length of his reign.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - upon Israel
  lexicon: HALOT
  rationale: Standard idiom for royal rule; 'over' is natural and sufficiently formal.
- source_word: בְּ/שֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative beth is naturally rendered 'in.' Samaria here denotes the capital
    city from which he ruled.
- source_word: בִּ/שְׁנַת שְׁמֹנֶה עֶשְׂרֵה
  chosen: in the eighteenth year
  alternatives:
  - in year eighteen
  lexicon: HALOT
  rationale: Standard regnal-year formula in idiomatic English.
- source_word: לִ/יהוֹשָׁפָט מֶלֶךְ יְהוּדָה
  chosen: of Jehoshaphat king of Judah
  alternatives:
  - for Jehoshaphat king of Judah
  lexicon: HALOT
  rationale: The preposition ל in regnal synchronisms is idiomatically rendered 'of,'
    indicating the year of Jehoshaphat's reign.
- source_word: וַ/יִּמְלֹךְ שְׁתֵּים עֶשְׂרֵה שָׁנָה
  chosen: and he reigned twelve years
  alternatives:
  - and he was king twelve years
  lexicon: HALOT
  rationale: In this clause מלך refers to the duration of rule. 'Reigned twelve years'
    is the standard and clear English expression.
