id: 2KI.19.7
reference: 2 Kings 19:7
source:
  edition: WLC
  text: הִנְ/נִ֨י נֹתֵ֥ן בּ/וֹ֙ ר֔וּחַ וְ/שָׁמַ֥ע שְׁמוּעָ֖ה וְ/שָׁ֣ב לְ/אַרְצ֑/וֹ
    וְ/הִפַּלְתִּ֥י/ו בַּ/חֶ֖רֶב בְּ/אַרְצֽ/וֹ׃
translation:
  text: Look, I am putting a spirit in him, and he will hear a report and return to
    his own land, and I will make him fall by the sword in his own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a disposition'; the Hebrew word can also mean 'wind' or 'breath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'news' or 'a rumor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces divine announcement with attention-getting force. 'Look' is
    readable modern English and preserves the deictic emphasis better than leaving
    it untranslated.
- source_word: נֹתֵן
  chosen: I am putting
  alternatives:
  - I will put
  - I am about to put
  lexicon: HALOT
  rationale: The participle after הִנְנִי often conveys imminent action. 'I am putting'
    preserves the vivid immediacy while fitting the prophetic context.
- source_word: רוּחַ
  chosen: a spirit
  alternatives:
  - a wind
  - a disposition
  - a breath
  lexicon: HALOT
  rationale: Here רוּחַ refers to an inner impulse or divinely sent disposition affecting
    the Assyrian king's response, not literal wind. 'A spirit' is the most direct
    rendering and preserves the ambiguity of agency and effect.
- source_word: וְשָׁמַע
  chosen: and he will hear
  alternatives:
  - so that he hears
  - and he shall hear
  lexicon: HALOT
  rationale: The wayyiqtol continues the result sequence following God's action. Future
    English best conveys the predictive force in context.
- source_word: שְׁמוּעָה
  chosen: a report
  alternatives:
  - news
  - a rumor
  lexicon: HALOT
  rationale: The noun can mean report, news, or rumor. 'Report' is broad and neutral,
    fitting the context without overcommitting to whether the message is verified
    or merely heard.
- source_word: וְשָׁב
  chosen: and return
  alternatives:
  - and go back
  - and turn back
  lexicon: HALOT
  rationale: The verb means return/turn back. 'Return' is idiomatic with 'to his own
    land' and preserves the directional sense.
- source_word: לְאַרְצוֹ
  chosen: to his own land
  alternatives:
  - to his land
  - to his country
  lexicon: HALOT
  rationale: Adding 'own' reflects the pronominal suffix naturally in English and
    clarifies possession. 'Land' is preferred over 'country' for biblical geographic
    diction.
- source_word: וְהִפַּלְתִּיו
  chosen: and I will make him fall
  alternatives:
  - and I will cause him to fall
  - and I will strike him down
  lexicon: HALOT
  rationale: The Hiphil of נפל is causative. 'Make him fall' preserves the causative
    force more transparently than the more interpretive 'strike him down.'
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: An idiom for violent death in warfare or execution. 'By the sword' is
    standard English and preserves the instrumental sense.
- source_word: בְּאַרְצוֹ
  chosen: in his own land
  alternatives:
  - in his land
  lexicon: HALOT
  rationale: Repeating 'own' mirrors the suffix and highlights the irony that his
    downfall will occur back in his homeland.
