theological_decisions:
- issue: Meaning of רוּחַ in divine judgment oracle
  chosen_reading: a spirit
  alternative_readings:
  - a disposition
  - a wind
  rationale: The context concerns YHWH's sovereign action on the Assyrian king, leading
    him to hear a report and withdraw. Rendering as 'a spirit' preserves the Hebrew
    term's breadth and the theological sense of God directing events without overdefining
    the mechanism.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
