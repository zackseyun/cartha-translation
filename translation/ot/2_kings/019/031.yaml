theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's contested-terms policy specifies 'the LORD' as the default
    rendering of YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of קִנְאַת יְהוָה
  chosen_reading: The zeal of the LORD
  alternative_readings:
  - The jealousy of the LORD
  rationale: The Hebrew term can denote either jealousy or zeal. In this salvation
    context, the emphasis is on the LORD's fervent commitment to preserve his people
    and city, so 'zeal' better communicates the intended sense without importing a
    misleading emotional nuance.
