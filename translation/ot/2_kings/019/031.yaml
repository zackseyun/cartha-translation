id: 2KI.19.31
reference: 2 Kings 19:31
source:
  edition: WLC
  text: כִּ֤י מִ/ירוּשָׁלִַ֨ם֙ תֵּצֵ֣א שְׁאֵרִ֔ית וּ/פְלֵיטָ֖ה מֵ/הַ֣ר צִיּ֑וֹן קִנְאַ֛ת יְהוָ֥ה תַּֽעֲשֶׂה זֹּֽאת־׃ס
translation:
  text: For from Jerusalem a remnant will go out, and from Mount Zion survivors. The zeal of Yahweh will do this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The jealousy of the LORD will do this.' The Hebrew noun can mean either 'zeal' or 'jealousy'; here it refers to the LORD's passionate commitment to accomplish Jerusalem's deliverance.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or assurance for the preceding promise, best rendered 'For' in natural English.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. 'Jerusalem' is transliterated as a proper name.
- source_word: תֵּצֵא
  chosen: will go out
  alternatives:
  - will come out
  - shall go forth
  lexicon: HALOT
  rationale: Qal imperfect 3fs of יצא, agreeing with the feminine singular subject שְׁאֵרִית. 'Will go out' is clear modern English and preserves the movement imagery.
- source_word: שְׁאֵרִית
  chosen: a remnant
  alternatives:
  - the remnant
  - those left
  lexicon: HALOT
  rationale: The noun denotes what remains after judgment or crisis. 'Remnant' preserves the theological and prophetic resonance better than a paraphrase.
- source_word: וּפְלֵיטָה
  chosen: and survivors
  alternatives:
  - and escapees
  - and deliverance
  lexicon: HALOT
  rationale: The noun refers to those who have escaped or survived. 'Survivors' is idiomatic and fits the parallel with 'remnant.'
- source_word: מֵהַר צִיּוֹן
  chosen: from Mount Zion
  alternatives:
  - from the hill of Zion
  lexicon: HALOT
  rationale: The phrase marks source/location parallel to 'from Jerusalem.' 'Mount Zion' is the standard English form and preserves the proper-name force.
- source_word: קִנְאַת
  chosen: The zeal of
  alternatives:
  - The jealousy of
  - The ardor of
  lexicon: HALOT
  rationale: קִנְאָה can mean zeal or jealousy depending on context. Here it denotes YHWH's passionate commitment to accomplish deliverance, so 'zeal' best conveys the positive covenantal force in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: תַּעֲשֶׂה זֹּאת
  chosen: will do this
  alternatives:
  - will accomplish this
  - will make this happen
  lexicon: HALOT
  rationale: The verb עשה with demonstrative זאת expresses bringing about the stated outcome. 'Will do this' is direct and sufficiently formal; 'accomplish this' is possible but slightly more interpretive.
