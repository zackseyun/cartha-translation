id: 2KI.19.9
reference: 2 Kings 19:9
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֗ע אֶל תִּרְהָ֤קָה מֶֽלֶך כּוּשׁ֙ לֵ/אמֹ֔ר הִנֵּ֥ה יָצָ֖א לְ/הִלָּחֵ֣ם
    אִתָּ֑/ךְ וַ/יָּ֨שָׁב֙ וַ/יִּשְׁלַ֣ח מַלְאָכִ֔ים אֶל חִזְקִיָּ֖הוּ לֵ/אמֹֽר־־־׃
translation:
  text: When he heard concerning Tirhakah king of Cush, saying, “Look, he has come
    out to fight against you,” he turned back and sent messengers to Hezekiah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'king of Ethiopia.' The Hebrew reads 'Cush,' the ancient region south
      of Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: When he heard
  alternatives:
  - And he heard
  - Now he heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'When he heard'
    captures the temporal force in English and fits the sequence leading to the renewed
    message.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - about
  - of
  lexicon: HALOT
  rationale: With שמע, אֶל can introduce the matter heard. 'Concerning' is slightly
    more formal and precise than 'about' while remaining natural.
- source_word: תִּרְהָקָה
  chosen: Tirhakah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: מֶלֶךְ כּוּשׁ
  chosen: king of Cush
  alternatives:
  - king of Ethiopia
  lexicon: HALOT
  rationale: The Hebrew place name is כּוּשׁ. 'Cush' preserves the source term more
    directly than the traditional but potentially anachronistic 'Ethiopia.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: The infinitive introduces reported speech. 'Saying' preserves the Hebrew
    discourse structure.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: This deictic particle draws attention to the report. 'Look' is readable
    modern English; 'Behold' would be too archaic.
- source_word: יָצָא
  chosen: has come out
  alternatives:
  - has gone out
  - is marching out
  lexicon: HALOT
  rationale: The verb literally means 'go/come out.' In context of military movement
    toward confrontation, 'has come out' is idiomatic from the hearer's perspective
    without over-paraphrasing.
- source_word: לְהִלָּחֵם
  chosen: to fight
  alternatives:
  - to wage war
  - to battle
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם denotes engaging in battle. 'To fight' is
    the most direct and natural rendering.
- source_word: אִתָּךְ
  chosen: against you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Although the preposition can be rendered 'with,' in battle contexts English
    normally requires 'against you' to express hostile engagement clearly.
- source_word: וַיָּשָׁב
  chosen: he turned back
  alternatives:
  - he returned
  - he withdrew
  lexicon: HALOT
  rationale: The verb means 'return/turn back.' 'Turned back' preserves the motion
    without specifying more than the Hebrew states.
- source_word: וַיִּשְׁלַח מַלְאָכִים
  chosen: and sent messengers
  alternatives:
  - and sent envoys
  - and sent angels
  lexicon: HALOT
  rationale: מַלְאָכִים here clearly refers to human emissaries in a diplomatic/military
    setting, so 'messengers' is the appropriate gloss.
- source_word: אֶל חִזְקִיָּהוּ
  chosen: to Hezekiah
  alternatives:
  - unto Hezekiah
  rationale: Standard English directional rendering with transliterated personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'with this message:'
  lexicon: HALOT
  rationale: Repeated to preserve the Hebrew introduction to the next speech in the
    following verse.
