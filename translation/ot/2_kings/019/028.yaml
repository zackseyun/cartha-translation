theological_decisions:
- issue: Anthropomorphic language for God hearing and restraining the Assyrian king
  chosen_reading: Preserve the anthropomorphic imagery ('into my ears,' 'my hook,'
    'my bit') as stated in the Hebrew
  alternative_readings:
  - Flatten to idiomatic abstractions such as 'I have heard it' and 'I will control
    you'
  rationale: The verse uses vivid embodied imagery to communicate divine awareness
    and sovereign humiliation of the arrogant king. Preserving the imagery maintains
    the force of the prophetic taunt without importing speculative theology about
    God's nature.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Nuance of שַׁאֲנַנְךָ
  chosen_reading: Render as 'your complacency' in the main text
  alternative_readings:
  - your arrogance
  - your self-confidence
  rationale: The Hebrew term fundamentally denotes ease/security, but in context that
    ease is culpable and arrogant. 'Complacency' preserves the lexical base while
    allowing the context to supply the condemnatory tone; the stronger interpretive
    option 'arrogance' is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §5
