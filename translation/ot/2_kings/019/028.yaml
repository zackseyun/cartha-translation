id: 2KI.19.28
reference: 2 Kings 19:28
source:
  edition: WLC
  text: יַ֚עַן הִתְרַגֶּזְ/ךָ֣ אֵלַ֔/י וְ/שַׁאֲנַנְ/ךָ֖ עָלָ֣ה בְ/אָזְנָ֑/י וְ/שַׂמְתִּ֨י
    חַחִ֜/י בְּ/אַפֶּ֗/ךָ וּ/מִתְגִּ/י֙ בִּ/שְׂפָתֶ֔י/ךָ וַ/הֲשִׁ֣בֹתִ֔י/ךָ בַּ/דֶּ֖רֶךְ
    אֲשֶׁר בָּ֥אתָ בָּֽ/הּ־׃
translation:
  text: Because your raging against me and your complacency have come up into my ears,
    I will put my hook in your nose and my bit in your lips, and I will turn you back
    by the way by which you came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your arrogance' or 'your self-confidence.' The Hebrew term denotes ease
      or self-assured security, here in a hostile context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - On account of
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment. 'Because' is natural modern
    English and preserves the causal force.
- source_word: הִתְרַגֶּזְךָ אֵלַי
  chosen: your raging against me
  alternatives:
  - your raging at me
  - your agitation against me
  - your insolence against me
  lexicon: HALOT
  rationale: The hitpael of רָגַז conveys agitation/rage. In context, addressed to
    the Assyrian king's defiance of God, 'raging against me' best captures hostile
    fury without over-paraphrase.
- source_word: שַׁאֲנַנְךָ
  chosen: your complacency
  alternatives:
  - your arrogance
  - your self-confidence
  - your ease
  lexicon: HALOT
  rationale: From שׁאנן, denoting ease, security, or complacent self-assurance. In
    this taunt/judgment context it carries the sense of arrogant ease. 'Complacency'
    preserves the lexical core while fitting the rebuke.
- source_word: עָלָה בְאָזְנָי
  chosen: have come up into my ears
  alternatives:
  - has come up into my ears
  - has reached my ears
  lexicon: HALOT
  rationale: A Hebrew idiom for something being heard by God. The plural subject in
    English is handled with 'have.' Retaining 'come up into my ears' preserves the
    vivid imagery better than flattening to 'reached my ears.'
- source_word: חַחִי
  chosen: my hook
  alternatives:
  - my ring
  - my hook-ring
  lexicon: HALOT
  rationale: Refers to a hook or ring used to control an animal or captive. 'Hook'
    is the clearest and most common rendering in this judgment image.
- source_word: בְּאַפֶּךָ
  chosen: in your nose
  alternatives:
  - in your nostril
  lexicon: HALOT
  rationale: אַף literally means nose/nostril and can also mean anger in other contexts;
    here the physical sense is required by the restraint metaphor. 'In your nose'
    is idiomatic in English for the image.
- source_word: מִתְגִּי
  chosen: my bit
  alternatives:
  - my bridle
  - my muzzle
  lexicon: HALOT
  rationale: Refers to a bit or bridle implement used to control an animal. 'Bit'
    is more precise than 'bridle' and pairs well with 'hook' in the parallel imagery.
- source_word: בִּשְׂפָתֶיךָ
  chosen: in your lips
  alternatives:
  - in your mouth
  - on your lips
  lexicon: HALOT
  rationale: Literally 'in your lips.' Though a bit is functionally in the mouth,
    the Hebrew specifies lips, and the translation preserves that concrete wording.
- source_word: וַהֲשִׁבֹתִיךָ
  chosen: I will turn you back
  alternatives:
  - I will make you return
  - I will bring you back
  lexicon: HALOT
  rationale: 'Hiphil of שוב is causative: cause to return/turn back. ''I will turn
    you back'' is concise and preserves divine agency over the enemy''s retreat.'
- source_word: בַּדֶּרֶךְ אֲשֶׁר בָּאתָ בָּהּ
  chosen: by the way by which you came
  alternatives:
  - on the road by which you came
  - the same way you came
  lexicon: HALOT
  rationale: 'A fairly literal rendering of the phrase, preserving the formal symmetry
    of the judgment: the invader is sent back along his route of approach.'
