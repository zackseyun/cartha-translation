id: 2KI.19.2
reference: 2 Kings 19:2
source:
  edition: WLC
  text: וַ֠/יִּשְׁלַח אֶת אֶלְיָקִ֨ים אֲשֶׁר עַל הַ/בַּ֜יִת וְ/שֶׁבְנָ֣א הַ/סֹּפֵ֗ר
    וְ/אֵת֙ זִקְנֵ֣י הַ/כֹּֽהֲנִ֔ים מִתְכַּסִּ֖ים בַּ/שַּׂקִּ֑ים אֶל יְשַֽׁעְיָ֥הוּ
    הַ/נָּבִ֖יא בֶּן אָמֽוֹץ־־־־־׃
translation:
  text: And he sent Eliakim, who was over the household, and Shebna the scribe, and
    the elders of the priests, clothed in sackcloth, to Isaiah the prophet, the son
    of Amoz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covering themselves with sackcloth.' The Hebrew participle can emphasize
      the act or the resulting state.
    reason: lexical_alternative
  - marker: b
    text: '''Who was over the household'' refers to a high royal official in charge
      of the palace or royal household.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: And he sent
  alternatives:
  - Then he sent
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative; 'And he sent' preserves the Hebrew
    narrative flow without overinterpreting temporal nuance.
- source_word: אֲשֶׁר עַל הַבַּיִת
  chosen: who was over the household
  alternatives:
  - who was over the house
  - the palace administrator
  lexicon: HALOT
  rationale: The idiom denotes an official in charge of the royal household. 'Over
    the household' keeps the Hebrew structure while remaining clear; 'palace administrator'
    is interpretive and more dynamic.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the recorder
  lexicon: HALOT
  rationale: סֹפֵר commonly denotes a scribe or royal secretary. 'The scribe' is the
    more direct lexical equivalent and avoids narrowing the office beyond the Hebrew.
- source_word: זִקְנֵי הַכֹּהֲנִים
  chosen: the elders of the priests
  alternatives:
  - the elders of the priests'
  - the leading priests
  lexicon: HALOT
  rationale: The construct phrase is best represented straightforwardly. 'Leading
    priests' would collapse the distinct ideas of elders and priests into a single
    interpretive phrase.
- source_word: מִתְכַּסִּים בַּשַּׂקִּים
  chosen: clothed in sackcloth
  alternatives:
  - covering themselves with sackcloth
  - wearing sackcloth
  lexicon: HALOT
  rationale: The participle describes their state as they went. 'Clothed in sackcloth'
    is idiomatic English that preserves the mourning/humiliation imagery without awkwardness.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is natural modern English.
- source_word: יְשַׁעְיָהוּ הַנָּבִיא
  chosen: Isaiah the prophet
  alternatives:
  - Isaiah, the prophet
  lexicon: HALOT
  rationale: Appositional title translated directly; no need for added punctuation
    in the running text.
- source_word: בֶּן אָמוֹץ
  chosen: the son of Amoz
  alternatives:
  - son of Amoz
  lexicon: HALOT
  rationale: Including the article in English yields natural style while preserving
    the genealogical identification.
