id: 2KI.19.13
reference: 2 Kings 19:13
source:
  edition: WLC
  text: אַיּ֤/וֹ מֶֽלֶךְ חֲמָת֙ וּ/מֶ֣לֶךְ אַרְפָּ֔ד וּ/מֶ֖לֶךְ לָעִ֣יר סְפַרְוָ֑יִם
    הֵנַ֖ע וְ/עִוָּֽה־׃
translation:
  text: Where is the king of Hamath, and the king of Arpad, and the king of the city
    of Sepharvaim, of Hena, and of Ivvah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Henah' for Hena; English tradition varies in transliterating this place
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיּוֹ
  chosen: Where is
  alternatives:
  - Where now is
  lexicon: HALOT
  rationale: Interrogative adverb with 3ms suffix, idiomatically asking the present
    whereabouts or fate of the named kings. 'Where is' is the most natural English
    equivalent in this taunt context.
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - ruler
  lexicon: HALOT
  rationale: Standard rendering for מלך. Repeated three times in Hebrew, and the repetition
    is preserved in English for rhetorical force.
- source_word: חֲמָת
  chosen: Hamath
  rationale: 'Place name transliterated according to the translation philosophy: transliterate
    names rather than translate them.'
- source_word: אַרְפָּד
  chosen: Arpad
  rationale: Place name transliterated by standard English convention.
- source_word: לָעִיר
  chosen: the city of
  alternatives:
  - city of
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken as introducing apposition or relation
    with ''king'': ''the king of the city of Sepharvaim.'' Retaining ''the city of''
    reflects the Hebrew wording more fully than simply ''Sepharvaim.'''
- source_word: סְפַרְוָיִם
  chosen: Sepharvaim
  rationale: Place name transliterated. Combined with עִיר to yield 'the city of Sepharvaim.'
- source_word: הֵנַע
  chosen: Hena
  alternatives:
  - Henah
  rationale: Place name transliterated in a familiar English form. Some English traditions
    use 'Henah'; 'Hena' more directly reflects the consonantal form here.
- source_word: וְעִוָּה
  chosen: and of Ivvah
  alternatives:
  - and Ivvah
  rationale: The conjunction joins another place name under the scope of the preceding
    construction. Rendering 'and of Ivvah' makes explicit that these names continue
    the series dependent on 'king of,' matching the Hebrew list structure.
