id: 2KI.19.34
reference: 2 Kings 19:34
source:
  edition: WLC
  text: וְ/גַנּוֹתִ֛י אֶל הָ/עִ֥יר הַ/זֹּ֖את לְ/הֽוֹשִׁיעָ֑/הּ לְמַֽעֲנִ֔/י וּ/לְמַ֖עַן
    דָּוִ֥ד עַבְדִּֽ/י־׃
translation:
  text: For I will defend this city to save it, for my own sake and for the sake of
    my servant David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver it.' The Hebrew verb can mean 'save' or 'deliver' in contexts
      of rescue from danger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַנּוֹתִי
  chosen: I will defend
  alternatives:
  - I will protect
  - I will shield
  lexicon: HALOT
  rationale: From גנן in the sense of covering/protecting. 'Defend' fits the military
    context of Jerusalem under threat while remaining natural English.
- source_word: אֶל הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - against this city
  - over this city
  lexicon: HALOT
  rationale: With גנן, אֶל can mark the object toward which protective action is directed.
    In idiomatic English, 'defend this city' best conveys the sense without a wooden
    preposition.
- source_word: לְהוֹשִׁיעָהּ
  chosen: to save it
  alternatives:
  - to deliver it
  lexicon: HALOT
  rationale: From ישׁע, meaning save/deliver. 'Save it' is concise and idiomatic;
    'deliver it' is possible but slightly less direct in contemporary English.
- source_word: לְמַעֲנִי
  chosen: for my own sake
  alternatives:
  - for my sake
  lexicon: HALOT
  rationale: The phrase indicates motivation grounded in God's own name and purpose.
    'My own sake' brings out the emphatic possessive naturally in English.
- source_word: וּלְמַעַן דָּוִד עַבְדִּי
  chosen: for the sake of my servant David
  alternatives:
  - and for David my servant's sake
  lexicon: HALOT
  rationale: This preserves the covenantal rationale and the appositional title 'my
    servant David' in clear modern English.
