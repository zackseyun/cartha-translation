theological_decisions:
- issue: Divine motivation in delivering Jerusalem
  chosen_reading: The verse states that the LORD will save the city both for his own
    sake and for the sake of David, reflecting divine concern for his own name and
    covenant commitment to David.
  alternative_readings:
  - The Davidic reference could be read more narrowly as appeal to past promises without
    broader covenantal emphasis.
  rationale: The Hebrew explicitly gives two grounds introduced by לְמַעַן. The translation
    preserves both without expanding into doctrinal paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it.
