id: 2KI.19.5
reference: 2 Kings 19:5
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ עַבְדֵ֛י הַ/מֶּ֥לֶךְ חִזְקִיָּ֖הוּ אֶל יְשַֽׁעַיָֽהוּ־׃
translation:
  text: So the servants of King Hezekiah came to Isaiah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: So ... came
  alternatives:
  - And ... came
  - Then ... came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא narrates the next event in sequence. 'So' gives natural
    English narrative progression without overstating causation; 'came' is the plain
    sense.
- source_word: עַבְדֵי
  chosen: servants of
  alternatives:
  - officials of
  - servants
  lexicon: HALOT
  rationale: Construct plural of עבד can denote servants or royal attendants/officials.
    In this court setting, these are the king's attendants, but 'servants of' preserves
    the lexical form and remains natural English. 'Officials' is possible but slightly
    more interpretive.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Definite noun in construct with the proper name identifies Hezekiah's
    royal status. English idiom prefers 'King Hezekiah' rather than the more wooden
    'the king Hezekiah.'
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks movement directed to a person; 'to' is the normal
    English rendering here.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name.
