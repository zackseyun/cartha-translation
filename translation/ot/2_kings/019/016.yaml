theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of לְחָרֵף in relation to God
  chosen_reading: to reproach the living God
  alternative_readings:
  - to defy the living God
  - to mock the living God
  rationale: The Hebrew emphasizes insulting or taunting God. 'Reproach' keeps the lexical force without narrowing the act to military rebellion alone. An alternative is worth preserving because many English versions use 'defy,' highlighting the confrontational aspect.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
