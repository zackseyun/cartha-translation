id: 2KI.19.16
reference: 2 Kings 19:16
source:
  edition: WLC
  text: הַטֵּ֨ה יְהוָ֤ה אָזְנְ/ךָ֙ וּֽ/שֲׁמָ֔ע פְּקַ֧ח יְהוָ֛ה עֵינֶ֖י/ךָ וּ/רְאֵ֑ה וּ/שְׁמַ֗ע אֵ֚ת דִּבְרֵ֣י סַנְחֵרִ֔יב אֲשֶׁ֣ר שְׁלָח֔/וֹ לְ/חָרֵ֖ף אֱלֹהִ֥ים חָֽי׀׃
translation:
  text: Incline your ear, O Yahweh, and hear; open your eyes, O Yahweh, and see; and hear the words of Sennacherib, which he has sent to reproach the living God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to defy the living God"; the Hebrew verb can carry the sense of taunting, reviling, or defying.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטֵּה
  chosen: Incline
  alternatives:
  - Turn
  - Bend down
  lexicon: HALOT
  rationale: Imperative of נטה used idiomatically with 'ear' for attentive listening. 'Incline' preserves the prayerful, elevated idiom without excessive archaism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָזְנְךָ
  chosen: your ear
  alternatives:
  - your ears
  lexicon: HALOT
  rationale: Singular in Hebrew and idiomatic in English in this expression; retained as singular.
- source_word: וּשֲׁמָע
  chosen: and hear
  alternatives:
  - so hear
  - listen
  lexicon: HALOT
  rationale: Simple imperative continuation. 'Hear' matches the Hebrew verb שמע and preserves the parallelism with the later repetition.
- source_word: פְּקַח
  chosen: open
  alternatives:
  - uncover
  lexicon: HALOT
  rationale: Common idiomatic use with 'eyes'; 'open' is the plain and natural equivalent.
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: Plural in Hebrew and English; retained straightforwardly.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - look
  lexicon: HALOT
  rationale: Maintains the imperative parallelism and solemn tone of the petition.
- source_word: דִּבְרֵי
  chosen: the words
  alternatives:
  - the message
  - the speech
  lexicon: HALOT
  rationale: Construct plural of דבר. 'Words' is the most direct rendering and fits the context of reported blasphemous speech.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  rationale: Standard English transliteration of the Assyrian king's name.
- source_word: אֲשֶׁר שְׁלָחוֹ
  chosen: which he has sent
  alternatives:
  - that he sent
  - which he sent him
  lexicon: HALOT
  rationale: The relative clause modifies 'words.' The suffix on 'sent' is awkwardly represented in English because the object is effectively the message/agent sent; idiomatic English expresses the sense as 'which he has sent.' Perfect rendered with present relevance in prayer context.
- source_word: לְחָרֵף
  chosen: to reproach
  alternatives:
  - to defy
  - to revile
  - to mock
  lexicon: HALOT
  rationale: The verb חרף denotes taunting/reproaching with contempt. 'Reproach' preserves the verbal link to insulting God without overinterpreting toward military 'defiance,' though that nuance is possible.
- source_word: אֱלֹהִים חָי
  chosen: the living God
  alternatives:
  - the living God himself
  lexicon: HALOT
  rationale: Standard biblical expression contrasting Israel's God with lifeless idols; definite in sense in context and natural in English.
