id: 2KI.19.32
reference: 2 Kings 19:32
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֤ר יְהוָה֙ אֶל מֶ֣לֶךְ אַשּׁ֔וּר לֹ֤א יָבֹא֙ אֶל הָ/עִ֣יר הַ/זֹּ֔את וְ/לֹֽא יוֹרֶ֥ה שָׁ֖ם חֵ֑ץ וְ/לֹֽא יְקַדְּמֶ֣/נָּה מָגֵ֔ן וְ/לֹֽא יִשְׁפֹּ֥ךְ עָלֶ֖י/הָ סֹלְלָֽה־־־־־־׃
translation:
  text: 'Therefore thus says Yahweh concerning the king of Assyria: He shall not come into this city, or shoot an arrow there, or come before it with a shield, or cast up a siege ramp against it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'advance against it with a shield.' The Hebrew likely refers to approaching the city under shield protection in siege warfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'heap up a siege mound against it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks the statement as the conclusion drawn from the preceding divine oracle; 'therefore' preserves the inferential force in natural English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  - thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense English ('says') is idiomatic in prophetic speech and reflects the formulaic force better than a simple past.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md, preserving established English convention while signaling the covenant name.
- source_word: אֶל מֶלֶךְ אַשּׁוּר
  chosen: concerning the king of Assyria
  alternatives:
  - to the king of Assyria
  - against the king of Assyria
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' after 'thus says' in prophetic discourse it can introduce the subject addressed or spoken about. Here 'concerning' best fits English style and the content of the oracle about the Assyrian king.
- source_word: לֹא יָבֹא אֶל הָעִיר הַזֹּאת
  chosen: He shall not come into this city
  alternatives:
  - He will not enter this city
  - He shall not come to this city
  lexicon: HALOT
  rationale: Future negation with יָבֹא is naturally rendered as a predictive 'shall not.' 'Come into' captures movement into the city more clearly than merely 'come to.'
- source_word: יוֹרֶה שָׁם חֵץ
  chosen: shoot an arrow there
  alternatives:
  - fire an arrow there
  - shoot there an arrow
  lexicon: HALOT
  rationale: The Hiphil of ירה here means to shoot/project. 'Shoot an arrow there' is idiomatic and preserves the military image.
- source_word: יְקַדְּמֶנָּה מָגֵן
  chosen: confront it with a shield
  alternatives:
  - come before it with a shield
  - advance against it with a shield
  lexicon: HALOT
  rationale: The verb קדמ in the Piel means to meet, confront, or come before. In siege context, the sense is approaching/attacking the city under shield protection. 'Confront it with a shield' is concise and preserves the imagery without over-specifying tactics.
- source_word: יִשְׁפֹּךְ עָלֶיהָ סֹלְלָה
  chosen: cast up a siege ramp against it
  alternatives:
  - heap up a siege mound against it
  - pour out a ramp against it
  lexicon: HALOT
  rationale: Although the verb literally means 'pour out,' in military context with סֹלְלָה it refers to building up an earthen siegework. 'Cast up a siege ramp' is a standard, readable military rendering.
- source_word: סֹלְלָה
  chosen: siege ramp
  alternatives:
  - siege mound
  - embankment
  lexicon: HALOT
  rationale: Refers to an earthen structure raised against a city for siege operations. 'Siege ramp' is clearer for modern readers than 'bank' or 'mount.'
