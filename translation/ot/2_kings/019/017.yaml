id: 2KI.19.17
reference: 2 Kings 19:17
source:
  edition: WLC
  text: אָמְנָ֖ם יְהוָ֑ה הֶחֱרִ֜יבוּ מַלְכֵ֥י אַשּׁ֛וּר אֶת הַ/גּוֹיִ֖ם וְ/אֶת אַרְצָֽ/ם־־׃
translation:
  text: Truly, O LORD, the kings of Assyria have laid waste the nations and their
    lands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Indeed' or 'Surely' for the opening affirmation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their land'; the singular likely has a collective/distributive sense,
      hence 'their lands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמְנָם
  chosen: Truly
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces an affirmation of the truth of the claim just made. 'Truly'
    is natural English and preserves the emphatic concessive force without sounding
    archaic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding English convention and the reverential substitution pattern.
- source_word: הֶחֱרִיבוּ
  chosen: have laid waste
  alternatives:
  - have devastated
  - have destroyed
  lexicon: HALOT
  rationale: The Hiphil of חרב here denotes causing ruin or devastation. 'Have laid
    waste' captures the military devastation sense well and fits the historical context
    better than the more generic 'destroyed.'
- source_word: מַלְכֵי אַשּׁוּר
  chosen: the kings of Assyria
  alternatives:
  - Assyria's kings
  lexicon: HALOT
  rationale: A straightforward construct chain; this is the most transparent and idiomatic
    rendering in English.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentile nations
  lexicon: HALOT
  rationale: In this geopolitical context, גוים refers to nations/peoples conquered
    by Assyria. 'The nations' is the standard and most natural rendering.
- source_word: אַרְצָם
  chosen: their lands
  alternatives:
  - their land
  - their countries
  lexicon: HALOT
  rationale: Although morphologically singular with a plural suffix, אֶרֶץ often functions
    collectively. Since the referent is plural ('the nations'), 'their lands' communicates
    the distributive sense in natural English.
