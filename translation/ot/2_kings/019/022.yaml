id: 2KI.19.22
reference: 2 Kings 19:22
source:
  edition: WLC
  text: אֶת מִ֤י חֵרַ֨פְתָּ֙ וְ/גִדַּ֔פְתָּ וְ/עַל מִ֖י הֲרִימ֣וֹתָ קּ֑וֹל וַ/תִּשָּׂ֥א
    מָר֛וֹם עֵינֶ֖י/ךָ עַל קְד֥וֹשׁ יִשְׂרָאֵֽל־־־׃
translation:
  text: Whom have you mocked and blasphemed? Against whom have you raised your voice
    and lifted your eyes on high? Against the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reproached and reviled.' The Hebrew verbs are near-synonyms for scornful,
      abusive speech; the second can specifically carry the sense of blaspheming God.
    reason: lexical_alternative
  - marker: b
    text: Literally 'lifted your eyes to the height,' an idiom expressing haughtiness
      or arrogant self-exaltation.
    reason: cultural_note
lexical_decisions:
- source_word: חֵרַפְתָּ
  chosen: mocked
  alternatives:
  - reproached
  - taunted
  - defied
  lexicon: HALOT
  rationale: The verb חרף in this context denotes scornful insult directed at God.
    'Mocked' is natural modern English and fits the parallel with the stronger following
    verb. 'Reproached' is more traditional but less idiomatic; 'defied' is interpretive
    and better left implicit in the context.
- source_word: גִדַּפְתָּ
  chosen: blasphemed
  alternatives:
  - reviled
  - spoken contemptuously
  lexicon: HALOT
  rationale: גדף often refers to abusive speech against God and is appropriately rendered
    'blasphemed' here, since the object is ultimately the Holy One of Israel. This
    preserves the theological seriousness of the offense.
- source_word: הֲרִימוֹתָ קּוֹל
  chosen: raised your voice
  alternatives:
  - lifted up your voice
  lexicon: HALOT
  rationale: The idiom literally means 'raised/lifted a voice.' 'Raised your voice'
    is the most natural modern equivalent while preserving the sense of arrogant,
    loud challenge.
- source_word: וַתִּשָּׂא מָרוֹם עֵינֶיךָ
  chosen: lifted your eyes on high
  alternatives:
  - lifted your eyes upward
  - raised your eyes arrogantly
  lexicon: HALOT
  rationale: The Hebrew is idiomatic and conveys haughty elevation. 'Lifted your eyes
    on high' preserves the imagery and allows the arrogance to emerge from context
    without over-paraphrasing.
- source_word: קְדֹושׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: This is a fixed divine title, especially prominent in Isaiah and appropriate
    here in Hezekiah's narrative context. It should be translated straightforwardly
    rather than paraphrased.
- source_word: עַל
  chosen: against
  alternatives:
  - at
  - toward
  lexicon: HALOT
  rationale: In both occurrences, על marks hostile direction. 'Against' best captures
    the adversarial force in English.
- source_word: מִי
  chosen: whom
  alternatives:
  - who
  lexicon: HALOT
  rationale: Because the pronoun is the object of the verbs and prepositions, 'whom'
    is the most grammatically precise rendering in elevated but still readable English.
