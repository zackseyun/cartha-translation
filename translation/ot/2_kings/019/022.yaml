theological_decisions:
- issue: Rendering speech against God in a way that preserves its theological gravity
  chosen_reading: Use 'blasphemed' for גִדַּפְתָּ and retain the climactic identification
    'Against the Holy One of Israel.'
  alternative_readings:
  - Use less explicit terms such as 'reviled' or 'insulted'
  rationale: The verse indicts Sennacherib not merely for political arrogance but
    for sacrilegious speech against Israel's God. 'Blasphemed' makes that explicit
    without importing extra doctrine beyond the lexical force of the Hebrew.
  doctrine_reference: Translation philosophy §§1, 6
