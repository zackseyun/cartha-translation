id: 2KI.19.36
reference: 2 Kings 19:36
source:
  edition: WLC
  text: וַ/יִּסַּ֣ע וַ/יֵּ֔לֶךְ וַ/יָּ֖שָׁב סַנְחֵרִ֣יב מֶֽלֶךְ אַשּׁ֑וּר וַ/יֵּ֖שֶׁב
    בְּ/נִֽינְוֵֽה־׃
translation:
  text: So Sennacherib king of Assyria departed and went and returned, and he lived
    in Nineveh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwelt in Nineveh.' The Hebrew verb can denote residing, remaining, or
      settling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: departed
  alternatives:
  - set out
  - broke camp
  lexicon: HALOT
  rationale: From נסע, in travel context meaning to pull up and depart. 'Departed'
    is natural English and preserves the movement sense without over-specifying encampment
    imagery.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - proceeded
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' Retaining 'went' preserves the Hebrew
    narrative sequence of successive actions.
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  lexicon: HALOT
  rationale: שׁוב here indicates return to his own place after the failed campaign.
    'Returned' is the clearest idiomatic rendering.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  rationale: Personal name is transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Construct chain identifying Sennacherib's royal office. The anarthrous
    Hebrew does not require the English article here; appositional 'Sennacherib king
    of Assyria' is concise and natural.
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - stayed
  - settled
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain, or reside. In this context of taking
    up residence in Nineveh after returning, 'lived' communicates ongoing residence
    in readable modern English better than the more archaic 'dwelt.'
- source_word: בְּנִינְוֵה
  chosen: in Nineveh
  rationale: Simple locative prepositional phrase; 'in Nineveh' is the direct and
    natural rendering.
