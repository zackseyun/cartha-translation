id: 2KI.19.14
reference: 2 Kings 19:14
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח חִזְקִיָּ֧הוּ אֶת הַ/סְּפָרִ֛ים מִ/יַּ֥ד הַ/מַּלְאָכִ֖ים וַ/יִּקְרָאֵ֑/ם
    וַ/יַּ֨עַל֙ בֵּ֣ית יְהוָ֔ה וַ/יִּפְרְשֵׂ֥/הוּ חִזְקִיָּ֖הוּ לִ/פְנֵ֥י יְהוָֽה־׃פ
translation:
  text: Then Hezekiah took the letters from the hand of the messengers and read them,
    and he went up to the house of the LORD, and Hezekiah spread it before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'documents' or 'scrolls'; the Hebrew term can denote written materials
      more broadly than personal letters.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the hand of the messengers,' an idiom meaning 'from the messengers.'
    reason: lexical_alternative
  - marker: c
    text: That is, he laid out the letter(s) before the LORD in prayer.
    reason: cultural_note
lexical_decisions:
- source_word: הַסְּפָרִים
  chosen: the letters
  alternatives:
  - the documents
  - the scrolls
  - the writings
  lexicon: HALOT
  rationale: סְפָרִים literally means 'writings/books/documents,' but in this narrative
    context it refers to the written message delivered by envoys. 'Letters' is the
    most natural and contextually precise English rendering.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the hand of
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'from the hand of.' Retaining it preserves
    the concrete style of the source while remaining clear in English.
- source_word: הַמַּלְאָכִים
  chosen: the messengers
  alternatives:
  - the envoys
  - the angels
  lexicon: HALOT
  rationale: In this historical context מַלְאָכִים refers to human bearers of a message,
    not heavenly beings. 'Messengers' is the broad, accurate rendering; 'envoys' is
    possible but slightly more interpretive.
- source_word: וַיִּקְרָאֵם
  chosen: and read them
  alternatives:
  - and read it
  lexicon: HALOT
  rationale: The pronominal suffix is plural, matching 'letters.' English naturally
    renders this as 'read them.'
- source_word: וַיַּעַל
  chosen: and he went up
  alternatives:
  - and he went
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Since ascent to the temple is both literal
    and conventional, 'went up' preserves the Hebrew nuance.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The phrase is literally 'house of YHWH.' 'House of the LORD' preserves
    the Hebrew expression while remaining idiomatic. 'Temple' is a valid contextual
    gloss but less formally transparent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding reverential convention and the pattern reflected
    in the Septuagint.
- source_word: וַיִּפְרְשֵׂהוּ
  chosen: spread it
  alternatives:
  - spread it out
  - unfolded it
  lexicon: HALOT
  rationale: פרשׂ here describes laying out the written message before God. 'Spread
    it' is a natural rendering that preserves the physical action; the singular suffix
    likely treats the collection as a unit.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This is the standard idiom for acting in God's presence. 'Before the
    LORD' is both literal and idiomatic in English.
