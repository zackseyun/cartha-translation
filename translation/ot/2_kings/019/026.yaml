id: 2KI.19.26
reference: 2 Kings 19:26
source:
  edition: WLC
  text: וְ/יֹֽשְׁבֵי/הֶן֙ קִצְרֵי יָ֔ד חַ֖תּוּ וַ/יֵּבֹ֑שׁוּ הָי֞וּ עֵ֤שֶׂב שָׂדֶה֙
    וִ֣/ירַק דֶּ֔שֶׁא חֲצִ֣יר גַּגּ֔וֹת וּ/שְׁדֵפָ֖ה לִ/פְנֵ֥י קָמָֽה־׃
translation:
  text: Therefore their inhabitants were short of strength; they were shattered and
    put to shame. They became like the grass of the field, like green growth, like
    grass on the housetops, and like scorched grain before it is grown.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'short of hand,' an idiom for lacking power or strength.
    reason: lexical_alternative
  - marker: b
    text: Or 'were dismayed' for 'were shattered.'
    reason: alternative_reading
  - marker: c
    text: Or 'blight before the standing grain' or 'scorched growth before it springs
      up.' The Hebrew of the final image is compact and agricultural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹשְׁבֵיהֶן
  chosen: their inhabitants
  alternatives:
  - those who lived in them
  - their dwellers
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the conquered cities/lands in context.
    'Inhabitants' is natural modern English and preserves the concrete sense of people
    dwelling in those places.
- source_word: קִצְרֵי יָד
  chosen: short of strength
  alternatives:
  - of short hand
  - powerless
  - weak-handed
  lexicon: HALOT
  rationale: This idiom literally means 'short of hand' and conveys inability or lack
    of power. 'Short of strength' communicates the idiomatic sense in readable English
    without over-literal obscurity.
- source_word: חַתּוּ
  chosen: were shattered
  alternatives:
  - were dismayed
  - were broken
  - were terrified
  lexicon: HALOT
  rationale: The verb denotes being broken down or dismayed. 'Were shattered' fits
    the parallel with shame and the imagery of collapse under judgment, while preserving
    the force of the Hebrew.
- source_word: וַיֵּבֹשׁוּ
  chosen: put to shame
  alternatives:
  - ashamed
  - disgraced
  lexicon: HALOT
  rationale: The verb commonly carries the sense of shame/disgrace. 'Put to shame'
    preserves the passive-result nuance better than the flatter 'ashamed.'
- source_word: הָיוּ
  chosen: became
  alternatives:
  - were
  lexicon: HALOT
  rationale: Here the verb introduces the comparison of what they came to be like.
    'Became' better reflects the resultant state in context than a simple stative
    'were.'
- source_word: עֵשֶׂב שָׂדֶה
  chosen: the grass of the field
  alternatives:
  - field grass
  - vegetation of the field
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'Grass of the field' is idiomatic
    biblical English and suits the poetic comparison.
- source_word: וִירַק דֶּשֶׁא
  chosen: green growth
  alternatives:
  - green herb
  - tender green
  - verdure
  lexicon: HALOT
  rationale: The phrase refers to fresh green vegetation. 'Green growth' is accessible
    and avoids archaic 'herb' while preserving the image of tender, flourishing plant
    life.
- source_word: חֲצִיר גַּגּוֹת
  chosen: grass on the housetops
  alternatives:
  - roof grass
  - grass of the rooftops
  lexicon: HALOT
  rationale: This image evokes shallow, fragile growth that quickly withers. 'Grass
    on the housetops' is clear and preserves the metaphor.
- source_word: וּשְׁדֵפָה
  chosen: like scorched grain
  alternatives:
  - blight
  - blasted growth
  - scorched vegetation
  lexicon: HALOT
  rationale: The noun denotes blight or scorching, especially from hot wind. Because
    it is paired with קָמָה ('standing grain'), 'scorched grain' makes the agricultural
    image explicit in English.
- source_word: לִפְנֵי קָמָה
  chosen: before it is grown
  alternatives:
  - before standing grain
  - before it stands
  - before it springs up
  lexicon: HALOT
  rationale: Literally 'before standing grain.' The sense is before the crop has fully
    come up or matured. 'Before it is grown' communicates the temporal idea naturally,
    though the agricultural image is retained by 'grain' in the preceding phrase.
