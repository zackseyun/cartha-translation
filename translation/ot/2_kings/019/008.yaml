id: 2KI.19.8
reference: 2 Kings 19:8
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב֙ רַב שָׁקֵ֔ה וַ/יִּמְצָא֙ אֶת מֶ֣לֶךְ אַשּׁ֔וּר נִלְחָ֖ם עַל לִבְנָ֑ה
    כִּ֣י שָׁמַ֔ע כִּ֥י נָסַ֖ע מִ/לָּכִֽישׁ־־־׃
translation:
  text: So the Rabshakeh returned and found the king of Assyria fighting against Libnah,
    for he had heard that he had departed from Lachish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had set out from Lachish.' The Hebrew verb can denote departing, setting
      out, or breaking camp in a military context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - went back
  - turned back
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and שׁוּב here denotes returning
    to a prior location or party. 'Returned' is natural modern English and preserves
    the movement sense without overparaphrase.
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the Rab-shakeh
  lexicon: HALOT
  rationale: This is best treated as the known Assyrian title/designation used as
    a name-like identifier in the narrative. Retaining 'Rabshakeh' follows standard
    English Bible convention and avoids a possibly misleading functional gloss in
    context.
- source_word: וַיִּמְצָא אֶת
  chosen: found
  alternatives:
  - came upon
  - met
  lexicon: HALOT
  rationale: מָצָא with the direct-object marker straightforwardly means 'found.'
    'Met' is possible in context, but 'found' more closely reflects the Hebrew wording.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  lexicon: HALOT
  rationale: A direct, formal rendering of the construct phrase. 'Assyria's king'
    would be less natural in this narrative register.
- source_word: נִלְחָם עַל
  chosen: fighting against
  alternatives:
  - waging war against
  - fighting at
  lexicon: HALOT
  rationale: The participle נִלְחָם gives ongoing action. With עַל and a city, the
    sense is hostile military action directed against it. 'Fighting against' is clear
    and suitably literal; 'at Libnah' could understate the adversative force.
- source_word: לִבְנָה
  chosen: Libnah
  rationale: Standard transliteration of the place name.
- source_word: כִּי שָׁמַע
  chosen: for he had heard
  alternatives:
  - because he had heard
  - for he heard
  lexicon: HALOT
  rationale: The clause gives the reason for the king's presence at Libnah. English
    past perfect helps show prior action relative to the main narrative sequence.
- source_word: כִּי נָסַע
  chosen: that he had departed
  alternatives:
  - that he had set out
  - that he had moved on
  lexicon: HALOT
  rationale: נָסַע commonly denotes breaking camp or setting out/departing. 'Departed'
    is concise and fits the military movement context. The subject is naturally the
    king of Assyria from the immediate context.
- source_word: מִלָּכִישׁ
  chosen: from Lachish
  rationale: Standard transliteration of the place name with the prefixed preposition
    rendered directly.
