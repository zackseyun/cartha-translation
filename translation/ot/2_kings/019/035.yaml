id: 2KI.19.35
reference: 2 Kings 19:35
source:
  edition: WLC
  text: וַ/יְהִי֮ בַּ/לַּ֣יְלָה הַ/הוּא֒ וַ/יֵּצֵ֣א מַלְאַ֣ךְ יְהוָ֗ה וַ/יַּךְ֙ בְּ/מַחֲנֵ֣ה
    אַשּׁ֔וּר מֵאָ֛ה שְׁמוֹנִ֥ים וַ/חֲמִשָּׁ֖ה אָ֑לֶף וַ/יַּשְׁכִּ֣ימוּ בַ/בֹּ֔קֶר
    וְ/הִנֵּ֥ה כֻלָּ֖/ם פְּגָרִ֥ים מֵתִֽים׀׃
translation:
  text: And that night the angel of the LORD went out and struck down one hundred
    eighty-five thousand in the camp of Assyria. When people rose early in the morning,
    behold, all of them were dead bodies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And they rose early in the morning.' The Hebrew leaves
      the subject indefinite.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''corpses, dead''—an emphatic expression for the slain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּלַּיְלָה הַהוּא
  chosen: And that night
  alternatives:
  - And it happened that night
  - And it came to pass that night
  lexicon: HALOT
  rationale: The Hebrew narrative formula literally includes 'and it happened,' but
    idiomatic modern English can compress this to 'And that night' without loss of
    meaning. This preserves temporal linkage while avoiding archaic style.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - an angel of the LORD
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this context of a supernatural
    destroying agent, 'angel' is the natural English rendering. יְהוָה follows the
    doctrinal default 'the LORD' rather than 'Yahweh.' The construct is rendered with
    the definite article as in standard English for this recurring biblical expression.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - went forth
  lexicon: HALOT
  rationale: The verb יצא is straightforwardly 'go out/come out.' 'Went out' fits
    the narrative movement and reads naturally in modern English.
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - struck
  - smote
  - killed
  lexicon: HALOT
  rationale: נכה often means 'strike' and in military/judgment contexts can imply
    lethal defeat. 'Struck down' captures both the act and its deadly result without
    over-paraphrasing.
- source_word: בְּמַחֲנֵה אַשּׁוּר
  chosen: in the camp of Assyria
  alternatives:
  - in the Assyrian camp
  - in Assyria's camp
  lexicon: HALOT
  rationale: The phrase is literally 'in the camp of Assyria.' This is retained with
    only minimal smoothing. 'Assyria' here stands metonymically for the Assyrian army/kingdom.
- source_word: מֵאָה שְׁמוֹנִים וַחֲמִשָּׁה אָלֶף
  chosen: one hundred eighty-five thousand
  alternatives:
  - a hundred and eighty-five thousand
  lexicon: HALOT
  rationale: This is the plain cardinal number. A standard contemporary English number
    style is used.
- source_word: וַיַּשְׁכִּימוּ בַבֹּקֶר
  chosen: When people rose early in the morning
  alternatives:
  - And they rose early in the morning
  - When they rose early in the morning
  lexicon: HALOT
  rationale: The Hebrew has an indefinite 3rd person plural ('and they rose early').
    English often uses an indefinite subject here. 'People' makes the clause intelligible
    without forcing a specific antecedent not supplied in the Hebrew. 'When' also
    smooths the sequence into natural English.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there were
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a startling sight.
    'Behold' preserves the rhetorical force better than flattening it away, and remains
    understandable in modern Bible style.
- source_word: כֻלָּם
  chosen: all of them
  alternatives:
  - all of them there
  - all
  lexicon: HALOT
  rationale: The pronoun refers to the slain Assyrians. 'All of them' preserves the
    totalizing force.
- source_word: פְּגָרִים מֵתִים
  chosen: dead bodies
  alternatives:
  - corpses
  - dead corpses
  lexicon: HALOT
  rationale: The Hebrew combines a noun ('corpses/bodies') with a participle ('dead'),
    an emphatic expression. English 'dead bodies' preserves the sense naturally. 'Dead
    corpses' would be redundant in English, while 'corpses' alone slightly reduces
    the emphatic double expression.
