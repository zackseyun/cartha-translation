theological_decisions:
- issue: Rendering אֲדֹנָי distinctly from YHWH
  chosen_reading: the Lord
  alternative_readings:
  - the LORD
  rationale: The source text uses אֲדֹנָי rather than the tetragrammaton. Following
    original-language primacy and the project's contested-terms guidance, the translation
    distinguishes this from YHWH, which would be rendered 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1; Contested terms table
    for יְהוָה'
