id: 2KI.19.23
reference: 2 Kings 19:23
source:
  edition: WLC
  text: בְּ/יַ֣ד מַלְאָכֶי/ךָ֮ חֵרַ֣פְתָּ אֲדֹנָ/י֒ וַ/תֹּ֗אמֶר ב/רכב רִכְבִּ֛/י אֲנִ֥י
    עָלִ֛יתִי מְר֥וֹם הָרִ֖ים יַרְכְּתֵ֣י לְבָנ֑וֹן וְ/אֶכְרֹ֞ת קוֹמַ֤ת אֲרָזָי/ו֙
    מִבְח֣וֹר בְּרֹשָׁ֔י/ו וְ/אָב֨וֹאָה֙ מְל֣וֹן קִצֹּ֔/ה יַ֖עַר כַּרְמִלּֽ/וֹ׀׃
translation:
  text: By the hand of your messengers you have mocked the Lord, and you have said,
    ‘With my many chariots I myself have gone up to the heights of the mountains,
    to the remotest parts of Lebanon; and I will cut down its tall cedars, its choicest
    cypresses, and I will enter its farthest lodging place, its forest garden.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its finest firs'; the Hebrew term for this tree species is not fully
      certain.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַד מַלְאָכֶיךָ
  chosen: By the hand of your messengers
  alternatives:
  - Through your messengers
  - By your messengers
  lexicon: HALOT
  rationale: The idiom בְּיַד commonly means 'by the hand of' in the sense of agency
    or instrumentality. 'By the hand of' preserves the Hebrew image while remaining
    intelligible; 'messengers' fits מַלְאָךְ in this political/military context better
    than 'angels'.
- source_word: חֵרַפְתָּ
  chosen: have mocked
  alternatives:
  - have reproached
  - have defied
  - have reviled
  lexicon: HALOT
  rationale: The verb חרף carries the sense of taunting, reproaching, or treating
    with contempt. 'Mocked' communicates the insulting defiance in natural English.
    'Reproached' is more traditional but less idiomatic for modern readers.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - the Lord GOD
  lexicon: HALOT
  rationale: Here the consonantal text has אֲדֹנָי, not the divine name YHWH. Therefore
    it should be rendered 'the Lord,' not 'the LORD.' This preserves the distinction
    required by the source text and the project's title-translation policy.
- source_word: בְּרֹב רִכְבִּי
  chosen: With my many chariots
  alternatives:
  - With the multitude of my chariots
  - With my chariotry
  lexicon: HALOT
  rationale: The phrase literally refers to the abundance or multitude of the speaker's
    chariots. 'With my many chariots' is clear modern English and preserves the boastful
    emphasis on military power.
- source_word: אֲנִי עָלִיתִי
  chosen: I myself have gone up
  alternatives:
  - I have ascended
  - I have gone up
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'I myself' reflects that emphasis
    naturally in English. 'Gone up' is preferred over 'ascended' for readability and
    because the context is military boasting, not exalted theological ascent.
- source_word: מְרוֹם הָרִים
  chosen: the heights of the mountains
  alternatives:
  - the mountain heights
  - the highest mountains
  lexicon: HALOT
  rationale: מְרוֹם denotes height or elevated place. 'The heights of the mountains'
    preserves the concrete imagery and the genitival structure.
- source_word: יַרְכְּתֵי לְבָנוֹן
  chosen: the remotest parts of Lebanon
  alternatives:
  - the far reaches of Lebanon
  - the recesses of Lebanon
  lexicon: HALOT
  rationale: יַרְכְּתֵי often means the farthest or remote parts, sometimes the recesses.
    'Remotest parts' communicates the sense of penetrating to the extreme limits of
    Lebanon.
- source_word: וְאֶכְרֹת
  chosen: and I will cut down
  alternatives:
  - and I will fell
  lexicon: HALOT
  rationale: כרת in this context refers to cutting down trees. 'Cut down' is straightforward
    and widely understood.
- source_word: קוֹמַת אֲרָזָיו
  chosen: its tall cedars
  alternatives:
  - the height of its cedars
  - its lofty cedars
  lexicon: HALOT
  rationale: קוֹמָה refers to height or stature. In context it describes the lofty
    growth of Lebanon's cedars. 'Its tall cedars' is idiomatic and preserves the possessive
    reference to Lebanon.
- source_word: מִבְחוֹר בְּרֹשָׁיו
  chosen: its choicest cypresses
  alternatives:
  - its finest firs
  - its select junipers
  lexicon: HALOT
  rationale: מִבְחוֹר means choice or best. בְּרוֹשׁ is a conifer term with debated
    species identification; 'cypress' is a common modern rendering, while 'fir' is
    traditional. Because the exact species is uncertain, the alternative is preserved
    in a footnote.
- source_word: וְאָבוֹאָה
  chosen: and I will enter
  alternatives:
  - and I will come into
  lexicon: HALOT
  rationale: The cohortative-like form here expresses the speaker's boastful intention.
    'I will enter' is natural and fits the sequence of boasts.
- source_word: מְלוֹן קִצֹּה
  chosen: its farthest lodging place
  alternatives:
  - its remotest shelter
  - its innermost retreat
  lexicon: HALOT
  rationale: מָלוֹן denotes a lodging place or stopping place. Combined with קִצּוֹ
    ('its end/extremity'), the phrase conveys the furthest place one can reach within
    Lebanon. 'Lodging place' preserves the lexical sense, though metaphorical overtones
    of retreat/shelter are possible.
- source_word: יַעַר כַּרְמִלּוֹ
  chosen: its forest garden
  alternatives:
  - its fruitful forest
  - its orchard-like forest
  lexicon: HALOT
  rationale: כַּרְמִל can denote fruitful land, orchard-land, or garden-like fertility.
    In apposition to 'forest,' the phrase likely depicts Lebanon's luxuriant wooded
    region. 'Forest garden' preserves both the forest imagery and the fertility nuance
    without over-paraphrasing.
