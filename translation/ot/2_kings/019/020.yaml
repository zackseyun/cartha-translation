theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of אֲשֶׁר in the clause introducing Hezekiah's prayer
  chosen_reading: 'causal/explanatory: ''Because you have prayed to me concerning
    Sennacherib...'''
  alternative_readings:
  - 'content-like: ''What you have prayed to me concerning Sennacherib...'''
  rationale: The Hebrew permits a relative-style introduction, but in English the
    causal/explanatory sense best conveys the connection between Hezekiah's prayer
    and God's response without awkwardness. This does not alter theology, only clarifies
    discourse relation.
