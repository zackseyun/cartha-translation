id: 2KI.19.20
reference: 2 Kings 19:20
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֙ יְשַֽׁעְיָ֣הוּ בֶן אָמ֔וֹץ אֶל חִזְקִיָּ֖הוּ לֵ/אמֹ֑ר כֹּֽה
    אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֨ר הִתְפַּלַּ֧לְתָּ אֵלַ֛/י אֶל סַנְחֵרִ֥ב
    מֶֽלֶךְ אַשּׁ֖וּר שָׁמָֽעְתִּי־־־־־׃
translation:
  text: 'Then Isaiah son of Amoz sent to Hezekiah, saying, “Thus says the LORD, the
    God of Israel: Because you have prayed to me concerning Sennacherib king of Assyria,
    I have heard.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “What you have prayed to me concerning Sennacherib king
      of Assyria—I have heard.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - sent a message
  lexicon: HALOT
  rationale: The verb simply means 'sent.' In context the object is implicit and the
    action is communicative, but English can naturally say 'sent to Hezekiah' without
    adding more than the Hebrew warrants.
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ
  chosen: Isaiah son of Amoz
  alternatives:
  - Isaiah the son of Amoz
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. 'Son of' is
    retained as the ordinary Hebrew patronymic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech; 'saying'
    preserves the Hebrew discourse flow.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is the conventional prophetic messenger formula. Present-tense 'says'
    is idiomatic in English for the formula and preserves its force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct phrase identifying YHWH covenantally as Israel's
    God.
- source_word: אֲשֶׁר
  chosen: Because
  alternatives:
  - that
  - which
  - as for what
  lexicon: HALOT
  rationale: 'Here the relative particle introduces the content/circumstance to which
    the response pertains. English reads most naturally with an explanatory conjunction:
    God is responding because Hezekiah prayed.'
- source_word: הִתְפַּלַּלְתָּ אֵלַי
  chosen: you have prayed to me
  alternatives:
  - you prayed to me
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect in this responsive
    context, highlighting the completed prayer with present relevance.
- source_word: אֶל סַנְחֵרִב מֶלֶךְ אַשּׁוּר
  chosen: concerning Sennacherib king of Assyria
  alternatives:
  - about Sennacherib king of Assyria
  - against Sennacherib king of Assyria
  lexicon: HALOT
  rationale: The preposition אֶל after 'pray' can mark the matter toward which the
    prayer is directed. 'Concerning' is idiomatic and broad enough to cover the sense
    without over-specifying hostility.
- source_word: שָׁמָעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: English present perfect fits the divine response to a recent petition
    and preserves the immediacy of answered prayer.
