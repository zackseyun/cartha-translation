id: 2KI.19.19
reference: 2 Kings 19:19
source:
  edition: WLC
  text: וְ/עַתָּה֙ יְהוָ֣ה אֱלֹהֵ֔י/נוּ הוֹשִׁיעֵ֥/נוּ נָ֖א מִ/יָּד֑/וֹ וְ/יֵֽדְעוּ֙ כָּל מַמְלְכ֣וֹת הָ/אָ֔רֶץ כִּ֥י אַתָּ֛ה יְהוָ֥ה אֱלֹהִ֖ים לְ/בַדֶּֽ/ךָ־׃ס
translation:
  text: And now, Yahweh our God, please save us from his hand, so that all the kingdoms of the earth may know that you alone are God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from his hand,'' an idiom for deliverance from his power.'
    reason: cultural_note
  - marker: b
    text: Or 'all the kingdoms of the land,' though in this context 'earth' best fits the international scope.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal-discourse marker introducing the climactic petition in Hezekiah's prayer. 'And now' preserves the connective force of ו plus the temporal adverb.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: 'Construct form with 1cp suffix; straightforward covenantal address: ''our God.'''
- source_word: הוֹשִׁיעֵנוּ נָא
  chosen: please save us
  alternatives:
  - save us, please
  - deliver us, please
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע with enclitic particle נָא expresses urgent plea. 'Save us' is the most direct rendering; 'please' captures נָא naturally in modern English.
- source_word: מִיָּדוֹ
  chosen: from his hand
  alternatives:
  - out of his hand
  - from his power
  lexicon: HALOT
  rationale: Hebrew idiom for deliverance from someone's power/control. 'From his hand' preserves the metaphor while remaining clear in English.
- source_word: וְיֵדְעוּ
  chosen: so that ... may know
  alternatives:
  - and ... will know
  - that ... may know
  lexicon: HALOT
  rationale: The prefixed verb after the imperative expresses purpose/result in context. Rendering with 'so that ... may know' best reflects the prayer's purpose clause in idiomatic English.
- source_word: כָּל מַמְלְכוֹת הָאָרֶץ
  chosen: all the kingdoms of the earth
  alternatives:
  - all the kingdoms of the land
  lexicon: HALOT
  rationale: In this international context involving Assyria and the nations, הָאָרֶץ is best taken globally as 'the earth,' not merely 'the land.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what the kingdoms are to know. 'That' is the most natural complementizer here.
- source_word: אַתָּה יְהוָה אֱלֹהִים
  chosen: you are the LORD God
  alternatives:
  - you, O LORD, are God
  - you are LORD, God
  lexicon: HALOT
  rationale: Predicate construction identifying YHWH as God. 'The LORD God' is natural English and preserves both divine titles.
- source_word: לְבַדֶּךָ
  chosen: alone
  alternatives:
  - by yourself
  - only you
  lexicon: HALOT
  rationale: 'Emphasizes exclusivity: YHWH alone is God. ''Alone'' is concise and idiomatic in this confessional statement.'
