theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of יְהוָה as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern. This
    also fits established English Bible style while remaining doctrinally neutral.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of לְבַדֶּךָ in the confession
  chosen_reading: you alone are the LORD God
  alternative_readings:
  - you are the LORD God, you alone
  rationale: The verse asserts the exclusive deity of YHWH in contrast to the gods
    of the nations. The chosen English places 'alone' where it most naturally modifies
    the whole confession without adding doctrinal content beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological
    tension rather than resolve it'
