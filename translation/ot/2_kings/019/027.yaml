id: 2KI.19.27
reference: 2 Kings 19:27
source:
  edition: WLC
  text: וְ/שִׁבְתְּ/ךָ֛ וְ/צֵאתְ/ךָ֥ וּ/בֹאֲ/ךָ֖ יָדָ֑עְתִּי וְ/אֵ֖ת הִֽתְרַגֶּזְ/ךָ֥
    אֵלָֽ/י׃
translation:
  text: But I know your sitting down, your going out, and your coming in, and your
    raging against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''your sitting down, your going out, and your coming in''
      expresses the totality of a person''s movements and conduct.'
    reason: cultural_note
  - marker: b
    text: Or 'your agitation' or 'your fury against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁבְתְּךָ
  chosen: your sitting down
  alternatives:
  - your dwelling
  - your staying
  - your sitting
  lexicon: HALOT
  rationale: From ישׁב, here a verbal noun-like form with 2ms suffix. In the triad
    with 'going out' and 'coming in,' it denotes the full scope of one's settled activity
    or residence. 'Sitting down' preserves the concrete Hebrew idiom better than the
    more interpretive 'dwelling.'
- source_word: וְצֵאתְךָ
  chosen: your going out
  alternatives:
  - your departure
  - your going forth
  lexicon: HALOT
  rationale: From יצא, paired idiomatically with 'coming in.' 'Going out' is the most
    natural modern English while remaining close to the Hebrew expression.
- source_word: וּבֹאֲךָ
  chosen: your coming in
  alternatives:
  - your entrance
  - your coming
  lexicon: HALOT
  rationale: From בוא, completing the common merism 'going out and coming in.' 'Coming
    in' preserves the idiom and balances the preceding phrase.
- source_word: יָדָעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: Qal perfect 1cs of ידע. In context, the perfect expresses God's settled,
    comprehensive knowledge. Present English 'I know' best conveys the force in direct
    speech.
- source_word: הִתְרַגֶּזְךָ
  chosen: your raging
  alternatives:
  - your raging fury
  - your agitation
  - your insolence
  lexicon: HALOT
  rationale: From רגז in the Hitpael/reflexive stem, denoting agitation or rage. In
    context of Assyria's defiance toward God, 'your raging' captures the hostile emotional
    force without overinterpreting it as a separate noun like 'insolence.'
- source_word: אֵלַי
  chosen: against me
  alternatives:
  - toward me
  - at me
  lexicon: HALOT
  rationale: Although אל commonly means 'to/toward,' with a hostile noun such as 'raging'
    English idiom requires 'against me' to express the adversative sense clearly.
- source_word: וְאֵת
  chosen: and
  alternatives:
  - also
  - namely
  lexicon: HALOT
  rationale: The conjunction plus object marker introduces the final object of 'I
    know.' It is not translated woodenly; simple 'and' naturally carries the syntax
    into English.
