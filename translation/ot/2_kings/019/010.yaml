theological_decisions:
- issue: Rendering אֱלֹהֶיךָ in the mouth of the Assyrian king
  chosen_reading: your God
  alternative_readings:
  - your god
  rationale: The Hebrew form itself does not mark capitalization. Because the referent
    is the God of Hezekiah/Judah, the main text uses 'God' as standard English reference
    to Israel's deity, while recognizing that the speaker is hostile and may intend
    a dismissive sense. The lowercase alternative is preserved in a footnote as a
    stylistic possibility, not a lexical difference.
