id: 2KI.19.10
reference: 2 Kings 19:10
source:
  edition: WLC
  text: כֹּ֣ה תֹאמְר֗וּ/ן אֶל חִזְקִיָּ֤הוּ מֶֽלֶךְ יְהוּדָה֙ לֵ/אמֹ֔ר אַל יַשִּׁאֲ/ךָ֣
    אֱלֹהֶ֔י/ךָ אֲשֶׁ֥ר אַתָּ֛ה בֹּטֵ֥חַ בּ֖/וֹ לֵ/אמֹ֑ר לֹ֤א תִנָּתֵן֙ יְר֣וּשָׁלִַ֔ם
    בְּ/יַ֖ד מֶ֥לֶךְ אַשּֽׁוּר־־־׃
translation:
  text: 'Thus you shall say to Hezekiah king of Judah: ‘Do not let your God, in whom
    you trust, deceive you by saying, “Jerusalem will not be given into the hand of
    the king of Assyria.”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your god”; Hebrew capitalization is not marked, and the Assyrian speaker
      is mocking Hezekiah’s trust.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces the quoted message with a formal deictic adverb. 'Thus' preserves
    the messenger-formula tone better than the more expansive 'This is what' in this
    compact context.
- source_word: תֹאמְרוּן
  chosen: you shall say
  alternatives:
  - you must say
  - say
  lexicon: HALOT
  rationale: Second masculine plural imperfect used instructionally. 'You shall say'
    preserves the directive force and formal tone of royal correspondence.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Appositional royal title identifying Hezekiah. The anarthrous Hebrew
    is naturally rendered in English without forcing an article.
- source_word: אַל
  chosen: Do not
  alternatives:
  - You must not
  lexicon: HALOT
  rationale: Standard negative particle for prohibition.
- source_word: יַשִּׁאֲךָ
  chosen: let ... deceive you
  alternatives:
  - mislead you
  - delude you
  lexicon: HALOT
  rationale: From נשׁא in the causative sense 'deceive, mislead.' Because the subject
    is 'your God,' English idiom requires 'Do not let your God deceive you' rather
    than the less natural 'May your God not deceive you.' 'Deceive' best matches the
    Assyrian taunt that Hezekiah's confidence is false.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Direct address to Hezekiah; singular possessive retained.
- source_word: אֲשֶׁר אַתָּה בֹּטֵחַ בּוֹ
  chosen: in whom you trust
  alternatives:
  - whom you trust
  - on whom you rely
  lexicon: HALOT
  rationale: בָּטַח with ב conveys trust/reliance in someone. 'In whom you trust'
    is idiomatic and preserves the prepositional sense.
- source_word: לֵאמֹר
  chosen: by saying
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The second לֵאמֹר introduces the content by which the deception supposedly
    occurs. 'By saying' makes the syntactic relationship clear in English.
- source_word: לֹא תִנָּתֵן
  chosen: will not be given
  alternatives:
  - shall not be given
  - will not be delivered
  lexicon: HALOT
  rationale: Niphal of נתן, passive sense. 'Be given' is the most direct rendering;
    'delivered' is possible but slightly more interpretive.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to
  lexicon: HALOT
  rationale: A common Hebrew idiom for being handed over to another's control. Rendering
    it literally preserves the metaphor and biblical diction while remaining understandable.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard construct chain rendered naturally in English with the article
    required by idiom.
