theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Strength of גִּדְּפוּ in reference to speech against God
  chosen_reading: have blasphemed me
  alternative_readings:
  - have reviled me
  - have mocked me
  rationale: Because the object is the LORD himself, the verb denotes sacrilegious defiance, not merely human insult. 'Blasphemed' preserves that theological gravity without overexpansion.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
