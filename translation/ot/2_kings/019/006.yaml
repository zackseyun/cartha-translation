id: 2KI.19.6
reference: 2 Kings 19:6
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ יְשַֽׁעְיָ֔הוּ כֹּ֥ה תֹאמְר֖וּ/ן אֶל אֲדֹֽנֵי/כֶ֑ם כֹּ֣ה אָמַ֣ר יְהוָ֗ה אַל תִּירָא֙ מִ/פְּנֵ֤י הַ/דְּבָרִים֙ אֲשֶׁ֣ר שָׁמַ֗עְתָּ אֲשֶׁ֧ר גִּדְּפ֛וּ נַעֲרֵ֥י מֶֽלֶךְ אַשּׁ֖וּר אֹתִֽ/י־׀־־׃
translation:
  text: 'Isaiah said to them, “Thus you shall say to your master: Thus says Yahweh, ‘Do not be afraid because of the words that you have heard, with which the servants of the king of Assyria have blasphemed me.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the young men of the king of Assyria.” The Hebrew term can denote youths, but here likely refers to royal attendants or officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר, best rendered with simple past 'said' in English narrative.
- source_word: אֲדֹנֵיכֶם
  chosen: your master
  alternatives:
  - your lord
  lexicon: HALOT
  rationale: Refers to Hezekiah as the superior of Isaiah's messengers. 'Master' communicates social relation without confusing this use of אדון with the divine title 'Lord'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אַל תִּירָא
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: Natural modern English for the negative jussive of ירא, preserving the force of divine reassurance.
- source_word: מִפְּנֵי הַדְּבָרִים
  chosen: because of the words
  alternatives:
  - from before the words
  - because of the things
  lexicon: HALOT
  rationale: The idiom מִפְּנֵי here expresses cause or occasion for fear. 'Words' fits דְּבָרִים in context as spoken taunts.
- source_word: שָׁמַעְתָּ
  chosen: you have heard
  alternatives:
  - you heard
  lexicon: HALOT
  rationale: English present perfect works well for the completed action with present relevance in the immediate context.
- source_word: גִּדְּפוּ
  chosen: have blasphemed
  alternatives:
  - have reviled
  - have mocked
  lexicon: HALOT
  rationale: גדף in this context is not mere insult but speech dishonoring God. 'Blasphemed' preserves the theological weight of the offense against the LORD.
- source_word: נַעֲרֵי מֶלֶךְ אַשּׁוּר
  chosen: the servants of the king of Assyria
  alternatives:
  - the young men of the king of Assyria
  - the attendants of the king of Assyria
  lexicon: HALOT
  rationale: Though נערים literally can mean 'young men,' in royal court context it commonly denotes officials or attendants. 'Servants' best captures their role as emissaries of the Assyrian king.
- source_word: אֹתִי
  chosen: me
  lexicon: HALOT
  rationale: Direct object referring to the LORD; retained explicitly to preserve the personal affront in the speech.
