id: 2KI.19.3
reference: 2 Kings 19:3
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר חִזְקִיָּ֔הוּ יוֹם צָרָ֧ה וְ/תוֹכֵחָ֛ה
    וּ/נְאָצָ֖ה הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֣י בָ֤אוּ בָנִים֙ עַד מַשְׁבֵּ֔ר וְ/כֹ֥חַ אַ֖יִן
    לְ/לֵדָֽה־־׃
translation:
  text: 'They said to him, “Thus says Hezekiah: This day is a day of distress, rebuke,
    and disgrace, for children have come to the point of birth, but there is no strength
    to give birth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''children have come to the point of birth.'' The image is of labor
      reaching the moment of delivery, yet strength failing.'
    reason: cultural_note
  - marker: b
    text: Or 'children have come to the birthstool.' The Hebrew term מַשְׁבֵּר is
      difficult and may refer more concretely to the place or moment of delivery.
    reason: lexical_alternative
  - marker: c
    text: Or 'contempt' or 'scorn' for 'disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic/messenger formula. Present-tense English ('says')
    best reflects the conventional force of the quoted royal message, even though
    the Hebrew verb form is qatal.
- source_word: יוֹם צָרָה
  chosen: a day of distress
  alternatives:
  - a day of trouble
  - a day of anguish
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress/trouble under pressure. 'Distress' is
    natural modern English and preserves the severity without overinterpreting.
- source_word: וְתוֹכֵחָה
  chosen: rebuke
  alternatives:
  - reproof
  - chastisement
  lexicon: HALOT
  rationale: The noun denotes reproach/rebuke/reproof. 'Rebuke' is concise and idiomatic
    in a triad with the surrounding nouns.
- source_word: וּנְאָצָה
  chosen: disgrace
  alternatives:
  - contempt
  - blasphemy
  - scorn
  lexicon: HALOT
  rationale: The term can denote contempt or scornful insult; in this context of national
    humiliation, 'disgrace' communicates the public shame without narrowing it to
    verbal blasphemy alone.
- source_word: הַיּוֹם הַזֶּה
  chosen: This day
  alternatives:
  - this day
  - today
  lexicon: HALOT
  rationale: Retains the emphatic demonstrative force of the Hebrew while remaining
    readable. 'This day' also fits the elevated tone of the royal message.
- source_word: בָאוּ בָנִים עַד מַשְׁבֵּר
  chosen: children have come to the point of birth
  alternatives:
  - children have come to the birthstool
  - children have come to the mouth of the womb
  lexicon: HALOT
  rationale: This is a childbirth metaphor for a crisis reaching its decisive moment.
    מַשְׁבֵּר is difficult and has been understood as the place/moment of breaking
    forth in labor. 'To the point of birth' communicates the idiom clearly in modern
    English without excessive paraphrase.
- source_word: וְכֹחַ אַיִן לְלֵדָה
  chosen: but there is no strength to give birth
  alternatives:
  - and there is no strength for giving birth
  - but there is no strength to deliver
  lexicon: HALOT
  rationale: 'Expresses the metaphor''s climax: the process has reached delivery,
    yet strength fails. ''Give birth'' is the most natural English rendering of לֵדָה
    here.'
- source_word: בָנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although formally masculine plural, in the childbirth metaphor the focus
    is offspring generally, not specifically male children. 'Children' best matches
    the idiomatic sense in English.
