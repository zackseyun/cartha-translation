id: 2KI.19.33
reference: 2 Kings 19:33
source:
  edition: WLC
  text: בַּ/דֶּ֥רֶךְ אֲשֶׁר יָבֹ֖א בָּ֣/הּ יָשׁ֑וּב וְ/אֶל הָ/עִ֥יר הַ/זֹּ֛את לֹ֥א יָבֹ֖א נְאֻם יְהוָֽה־־־׃
translation:
  text: By the way that he came, by it he will return, and he will not come to this city, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'By the same way that he came, he will return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּדֶּרֶךְ
  chosen: by the way
  alternatives:
  - on the road
  - by the road
  - by the route
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way, road, route.' In this idiom, 'by the way' best preserves the Hebrew sense of the same route being retraced, while remaining natural English.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - whereby
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'way.' English idiom prefers 'that' in 'the way that he came.'
- source_word: יָבֹא
  chosen: he came
  alternatives:
  - he comes
  - he entered
  lexicon: HALOT
  rationale: 'Although the form is imperfect, in this relative-clause context with the following return statement it refers to the invader''s approach as a complete event from the speaker''s perspective. English idiom naturally renders it as past: ''the way that he came.'''
- source_word: בָּהּ
  chosen: by it
  alternatives:
  - through it
  - on it
  - by that way
  lexicon: HALOT
  rationale: The feminine singular pronominal suffix refers back to 'way.' 'By it' keeps the anaphoric force explicit, though English could also absorb it into 'by the same way.'
- source_word: יָשׁוּב
  chosen: he will return
  alternatives:
  - he will go back
  - he shall return
  lexicon: HALOT
  rationale: שׁוּב here denotes returning/backtracking. 'He will return' is both accurate and suitably solemn.
- source_word: וְאֶל הָעִיר הַזֹּאת
  chosen: and he will not come to this city
  alternatives:
  - and to this city he will not come
  - and he will not enter this city
  lexicon: HALOT
  rationale: The prepositional phrase is fronted in Hebrew, but standard English places the verb earlier. 'Come to this city' is a straightforward rendering of the Hebrew without adding the stronger nuance 'enter' unless context demands it.
- source_word: לֹא יָבֹא
  chosen: he will not come
  alternatives:
  - he shall not come
  - he will not enter
  lexicon: HALOT
  rationale: Simple negated imperfect expressing future certainty. 'Will not come' is clear modern English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' This preserves both the solemnity and the covenant name convention.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
