id: 2KI.19.30
reference: 2 Kings 19:30
source:
  edition: WLC
  text: וְ/יָ֨סְפָ֜ה פְּלֵיטַ֧ת בֵּית יְהוּדָ֛ה הַ/נִּשְׁאָרָ֖ה שֹׁ֣רֶשׁ לְ/מָ֑טָּה
    וְ/עָשָׂ֥ה פְרִ֖י לְ/מָֽעְלָ/ה־׃
translation:
  text: And the surviving remnant of the house of Judah will again take root downward
    and bear fruit upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the remnant of the house of Judah that remains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָסְפָה
  chosen: will again
  alternatives:
  - will continue
  - will add
  lexicon: HALOT
  rationale: From יסף, here idiomatically expressing renewed or continued action with
    the following infinitive-like/resultative imagery. 'Will again' fits the sense
    of restoration in context better than a wooden 'will add.'
- source_word: פְּלֵיטַת
  chosen: the surviving remnant
  alternatives:
  - the escapees
  - the survivors
  - the remnant
  lexicon: HALOT
  rationale: פְּלֵיטָה denotes those who have escaped/survived. In this prophetic-restoration
    context, 'surviving remnant' captures both survival and the remnant motif without
    over-paraphrasing.
- source_word: בֵּית יְהוּדָה
  chosen: of the house of Judah
  alternatives:
  - of Judah
  lexicon: HALOT
  rationale: Retains the construct phrase explicitly. 'House of Judah' is a standard
    covenant-historical designation and should be preserved rather than reduced to
    simply 'Judah.'
- source_word: הַנִּשְׁאָרָה
  chosen: surviving
  alternatives:
  - that remains
  - left
  lexicon: HALOT
  rationale: The participial form further qualifies the remnant as what remains after
    devastation. Rendering it with 'surviving' avoids awkward repetition while preserving
    the idea.
- source_word: שֹׁרֶשׁ
  chosen: take root
  alternatives:
  - root
  - strike root
  lexicon: HALOT
  rationale: Although the noun is literally 'root,' English idiom requires a verbal
    expression with the preceding verb. 'Take root' naturally conveys the Hebrew image.
- source_word: לְמָטָּה
  chosen: downward
  alternatives:
  - below
  - beneath
  lexicon: HALOT
  rationale: Preserves the directional contrast with לְמַעְלָה in the next clause.
- source_word: וְעָשָׂה
  chosen: and bear
  alternatives:
  - and make
  - and produce
  lexicon: HALOT
  rationale: With פְּרִי, the idiom means to bear/produce fruit. 'Bear' is the most
    natural English collocation.
- source_word: פְרִי
  chosen: fruit
  alternatives:
  - produce
  lexicon: HALOT
  rationale: Keeps the agricultural metaphor intact; also resonates with biblical
    imagery of flourishing and restoration.
- source_word: לְמָעְלָה
  chosen: upward
  alternatives:
  - above
  - up
  lexicon: HALOT
  rationale: Matches 'downward' in balanced poetic contrast and preserves the vertical
    imagery of root below, fruit above.
