theological_decisions:
- issue: Remnant language in a restoration oracle
  chosen_reading: the surviving remnant
  alternative_readings:
  - the survivors
  - the remnant that remains
  rationale: The verse uses concrete agricultural imagery for Judah's restoration
    after judgment. 'Surviving remnant' preserves the theological motif of a preserved
    people without importing later doctrinal conclusions beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
