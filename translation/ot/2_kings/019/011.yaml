theological_decisions:
- issue: Rendering of חרם language in a military judgment context
  chosen_reading: devoting them to destruction
  alternative_readings:
  - utterly destroying them
  - putting them under the ban
  rationale: The Hebrew invokes the concept of ḥerem, not merely generic destruction.
    The chosen rendering preserves that theological-judicial nuance without importing
    later doctrinal claims or using opaque jargon in the main text.
  doctrine_reference: Translation philosophy §1, §5
