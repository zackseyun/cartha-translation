id: 2KI.19.11
reference: 2 Kings 19:11
source:
  edition: WLC
  text: הִנֵּ֣ה אַתָּ֣ה שָׁמַ֗עְתָּ אֵת֩ אֲשֶׁ֨ר עָשׂ֜וּ מַלְכֵ֥י אַשּׁ֛וּר לְ/כָל
    הָ/אֲרָצ֖וֹת לְ/הַֽחֲרִימָ֑/ם וְ/אַתָּ֖ה תִּנָּצֵֽל׀־׃
translation:
  text: Look, you have heard what the kings of Assyria have done to all the lands,
    devoting them to destruction—and will you be delivered?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utterly destroying them'; Hebrew 'putting them under the ban,' that
      is, devoting them to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention-getting discourse. 'Look' preserves the
    force in readable modern English better than the more archaic 'Behold.'
- source_word: שָׁמַעְתָּ
  chosen: have heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: Perfect verb addressed to second masculine singular; English present
    perfect fits the discourse sense of prior knowledge with present relevance.
- source_word: אֵת אֲשֶׁר עָשׂוּ
  chosen: what ... have done
  alternatives:
  - that which ... did
  lexicon: HALOT
  rationale: Natural English rendering of the object marker plus relative clause,
    preserving the content of the report without wooden phrasing.
- source_word: מַלְכֵי אַשּׁוּר
  chosen: the kings of Assyria
  alternatives:
  - Assyria's kings
  lexicon: HALOT
  rationale: Standard construct rendering; clear and idiomatic.
- source_word: לְכָל הָאֲרָצוֹת
  chosen: to all the lands
  alternatives:
  - to all the countries
  - to all the earths/lands
  lexicon: HALOT
  rationale: אָרֶץ here refers to territories/nations rather than the whole earth.
    'Lands' preserves the plural and political-geographical sense.
- source_word: לְהַחֲרִימָם
  chosen: devoting them to destruction
  alternatives:
  - utterly destroying them
  - putting them under the ban
  lexicon: HALOT
  rationale: From חרם in the causative stem with 3mp suffix. 'Devoting them to destruction'
    preserves the specific sense of placing under ḥerem, stronger and more precise
    than merely 'destroying,' while remaining understandable. The alternative 'under
    the ban' is more formal but less transparent to modern readers.
- source_word: וְאַתָּה תִּנָּצֵל
  chosen: and will you be delivered?
  alternatives:
  - and you will be rescued?
  - and will you escape?
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun creates rhetorical contrast:
    ''and you...?'' The Niphal of נצל here is best rendered as passive/reflexive deliverance.
    Framing it as a question captures the taunting rhetoric of the speaker.'
