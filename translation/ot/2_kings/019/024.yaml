id: 2KI.19.24
reference: 2 Kings 19:24
source:
  edition: WLC
  text: אֲנִ֣י קַ֔רְתִּי וְ/שָׁתִ֖יתִי מַ֣יִם זָרִ֑ים וְ/אַחְרִב֙ בְּ/כַף פְּעָמַ֔/י
    כֹּ֖ל יְאֹרֵ֥י מָצֽוֹר־׃
translation:
  text: I myself have dug and drunk foreign waters, and with the sole of my feet I
    dry up all the streams of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the canals/Nile channels of Egypt.' The Hebrew term can refer specifically
      to Nile waterways.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַרְתִּי
  chosen: have dug
  alternatives:
  - dug out
  - have dug a well
  lexicon: HALOT
  rationale: From קרה/כור in this context, the verb refers to digging, likely of wells
    or water sources. English 'have dug' preserves the terse first-person boast without
    adding 'well' explicitly, which is implied but not stated.
- source_word: מַיִם זָרִים
  chosen: foreign waters
  alternatives:
  - strange waters
  - waters of foreigners
  lexicon: HALOT
  rationale: זָרִים literally means 'strange/foreign.' In context of imperial conquest,
    'foreign waters' best conveys waters found in lands not one's own, preserving
    the boastful sense.
- source_word: וְאַחְרִב
  chosen: I dry up
  alternatives:
  - I devastate
  - I lay waste to
  lexicon: HALOT
  rationale: The Hiphil of חרב can mean 'make dry' or 'dry up.' Because the object
    is waterways, 'I dry up' is the most direct contextual sense.
- source_word: בְּכַף פְּעָמַי
  chosen: with the sole of my feet
  alternatives:
  - with the palm of my feet
  - by the tread of my feet
  lexicon: HALOT
  rationale: כַּף with feet refers to the sole or underside. 'With the sole of my
    feet' is idiomatic and concrete in English, preserving the image of effortless
    domination.
- source_word: יְאֹרֵי
  chosen: streams
  alternatives:
  - canals
  - Nile channels
  - rivers
  lexicon: HALOT
  rationale: יְאֹר often refers to Nile-related waterways or canals. 'Streams' is
    readable and broad enough, while a footnote preserves the more specific canal/Nile
    nuance.
- source_word: מָצוֹר
  chosen: Egypt
  alternatives:
  - Mazor
  - siege
  - fortress
  lexicon: HALOT
  rationale: In this collocation with יְאֹרֵי, מָצוֹר is best taken as a poetic name
    for Egypt, a common interpretation in this verse's context. Rendering it 'Egypt'
    makes the geographic reference clear in English.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis to the speaker's arrogant self-assertion.
    'I myself' reflects that emphasis better than a simple 'I'.
