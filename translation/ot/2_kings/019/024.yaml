theological_decisions:
- issue: Referent and rhetorical force of the first-person speech
  chosen_reading: Render as an arrogant royal boast without softening or theological
    interpretation in the translation itself.
  alternative_readings:
  - Treat as hyperbolic military propaganda only
  - Expand the line to make explicit that this is the Assyrian king speaking
  rationale: The verse is part of the Assyrian king's taunt. The translation should
    preserve the first-person boast and vivid imagery without importing explanatory
    material into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
