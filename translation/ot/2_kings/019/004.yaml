theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Translation of הַשְּׁאֵרִית
  chosen_reading: the remnant
  alternative_readings:
  - the survivors
  - those left
  rationale: Although 'survivors' is possible, 'remnant' preserves the biblical-theological resonance of a preserved people without importing more than the text states.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
