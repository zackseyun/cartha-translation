id: 2KI.19.4
reference: 2 Kings 19:4
source:
  edition: WLC
  text: אוּלַ֡י יִשְׁמַע֩ יְהוָ֨ה אֱלֹהֶ֜י/ךָ אֵ֣ת כָּל דִּבְרֵ֣י רַב שָׁקֵ֗ה אֲשֶׁר֩ שְׁלָח֨/וֹ מֶֽלֶךְ אַשּׁ֤וּר אֲדֹנָי/ו֙ לְ/חָרֵף֙ אֱלֹהִ֣ים חַ֔י וְ/הוֹכִ֨יחַ֙ בַּ/דְּבָרִ֔ים אֲשֶׁ֥ר שָׁמַ֖ע יְהוָ֣ה אֱלֹהֶ֑י/ךָ וְ/נָשָׂ֣אתָ תְפִלָּ֔ה בְּעַ֥ד הַ/שְּׁאֵרִ֖ית הַ/נִּמְצָאָֽה׀־־־׀׃
translation:
  text: Perhaps Yahweh your God will hear all the words of the Rabshakeh, whom his master the king of Assyria has sent to mock the living God, and will rebuke the words that Yahweh your God has heard. Therefore lift up a prayer for the remnant that remains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabshakeh is likely an Assyrian official title; alternatively, 'chief cupbearer' is sometimes proposed.
    reason: cultural_note
  - marker: b
    text: Or 'to reproach,' 'to defy,' or 'to taunt' the living God.
    reason: lexical_alternative
  - marker: c
    text: Or 'offer a prayer' or simply 'pray.' The Hebrew idiom is literally 'lift up a prayer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - It may be that
  - Maybe
  lexicon: HALOT
  rationale: Introduces possibility rather than certainty; 'Perhaps' is concise, natural English and preserves the tentative appeal.
- source_word: יִשְׁמַע
  chosen: will hear
  alternatives:
  - may hear
  - will listen to
  lexicon: HALOT
  rationale: The imperfect after אוּלַי expresses hoped-for possibility. English 'will hear' after 'Perhaps' conveys the sense smoothly without overstating certainty.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward construct with 2ms suffix, addressed to Isaiah: ''your God.'''
- source_word: כָּל דִּבְרֵי
  chosen: all the words
  alternatives:
  - everything said
  - all the statements
  lexicon: HALOT
  rationale: Retains the concrete plural 'words,' which fits the formal accusation and preserves the Hebrew expression.
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the Rab-shakeh
  lexicon: HALOT
  rationale: Used here as a title/name for the Assyrian official; transliteration is standard and avoids over-specifying a debated office-title nuance in the main text.
- source_word: לְחָרֵף
  chosen: to mock
  alternatives:
  - to reproach
  - to defy
  - to taunt
  lexicon: HALOT
  rationale: The verb denotes scornful reproach against God. 'Mock' is idiomatic and forceful in modern English; 'reproach' is possible but less natural.
- source_word: אֱלֹהִים חַי
  chosen: the living God
  alternatives:
  - God who lives
  lexicon: HALOT
  rationale: Established and accurate rendering of the phrase, preserving the contrast with idols.
- source_word: וְהוֹכִיחַ
  chosen: and will rebuke him
  alternatives:
  - and will reprove him
  - and will decide against him
  - and will expose him
  lexicon: HALOT
  rationale: In context, the sense is that God will answer the blasphemous words with judgment/reproof. Supplying 'him' clarifies the implied object in English.
- source_word: בַּדְּבָרִים אֲשֶׁר שָׁמַע
  chosen: for the words that ... has heard
  alternatives:
  - because of the words that ... has heard
  - concerning the words that ... has heard
  lexicon: HALOT
  rationale: 'Captures the beth-instrumental/causal nuance naturally in English: the rebuke is on account of the words heard.'
- source_word: וְנָשָׂאתָ תְפִלָּה
  chosen: Therefore lift up a prayer
  alternatives:
  - And lift up a prayer
  - offer a prayer
  - pray
  lexicon: HALOT
  rationale: נשא תפלה is an idiom meaning to offer or raise prayer. 'Lift up a prayer' preserves the Hebrew imagery while remaining readable. 'Therefore' makes the exhortational transition explicit from context.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  lexicon: HALOT
  rationale: Denotes intercession on behalf of others; 'for' is concise and sufficient in the main text.
- source_word: הַשְּׁאֵרִית
  chosen: the remnant
  alternatives:
  - the survivors
  - those left
  lexicon: HALOT
  rationale: '''Remnant'' is theologically and literarily important in prophetic/historical contexts and should be preserved.'
- source_word: הַנִּמְצָאָה
  chosen: that remains
  alternatives:
  - that is left
  - that is found
  lexicon: HALOT
  rationale: Here the participle refers to those still left alive/present. 'That remains' is idiomatic and pairs well with 'remnant' without sounding redundant in English.
