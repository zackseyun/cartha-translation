id: 2KI.19.29
reference: 2 Kings 19:29
source:
  edition: WLC
  text: וְ/זֶה לְּ/ךָ֣ הָ/א֔וֹת אָכ֤וֹל הַ/שָּׁנָה֙ סָפִ֔יחַ וּ/בַ/שָּׁנָ֥ה הַ/שֵּׁנִ֖ית
    סָחִ֑ישׁ וּ/בַ/שָּׁנָ֣ה הַ/שְּׁלִישִׁ֗ית זִרְע֧וּ וְ/קִצְר֛וּ וְ/נִטְע֥וּ כְרָמִ֖ים
    וְ/אִכְל֥וּ פִרְיָֽ/ם־׃
translation:
  text: 'And this shall be the sign for you: this year eat what grows by itself, and
    in the second year what springs from that; but in the third year sow and reap,
    and plant vineyards and eat their fruit.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'volunteer growth' for 'what grows by itself'; the Hebrew term refers
      to produce that comes up without sowing.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word rendered 'what springs from that' is rare and may mean 'second
      growth'—produce arising in the second year from the previous year's unsown crop.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  chosen: the sign
  alternatives:
  - the token
  lexicon: HALOT
  rationale: אוֹת commonly denotes a sign or confirming token. 'Sign' is the most
    natural modern English rendering in prophetic assurance contexts.
- source_word: אָכוֹל
  chosen: eat
  alternatives:
  - you shall eat
  lexicon: HALOT
  rationale: The infinitive absolute functions imperativally/predictively here in
    the sign formula. English 'eat' captures the directive force succinctly; the future
    sense is carried by the surrounding context.
- source_word: סָפִיחַ
  chosen: what grows by itself
  alternatives:
  - volunteer growth
  - aftergrowth
  lexicon: HALOT
  rationale: The noun refers to produce that comes up of itself without sowing. 'What
    grows by itself' is clearer for modern readers than the more technical 'volunteer
    growth' or archaic 'aftergrowth'.
- source_word: סָחִישׁ
  chosen: what springs from that
  alternatives:
  - second growth
  - volunteer growth of the second year
  lexicon: HALOT
  rationale: This rare term likely denotes the spontaneous growth arising in the second
    year from the previous year's volunteer crop. 'What springs from that' preserves
    the sequential sense without overtechnical wording.
- source_word: זִרְעוּ
  chosen: sow
  alternatives:
  - you shall sow
  lexicon: HALOT
  rationale: A straightforward imperative/plural command in the third-year sequence.
    English imperative style fits the list of actions.
- source_word: וְקִצְרוּ
  chosen: and reap
  alternatives:
  - and harvest
  lexicon: HALOT
  rationale: קצר is the standard verb for reaping grain. 'Reap' keeps the agricultural
    parallel with 'sow' and is idiomatic in English.
- source_word: וְנִטְעוּ כְרָמִים
  chosen: and plant vineyards
  alternatives:
  - and plant vine-gardens
  lexicon: HALOT
  rationale: כְרָמִים are vineyards. The phrase is a normal agricultural expression
    and 'plant vineyards' is natural English.
- source_word: וְאִכְלוּ פִרְיָם
  chosen: and eat their fruit
  alternatives:
  - and eat its fruit
  - and enjoy their fruit
  lexicon: HALOT
  rationale: The plural suffix most naturally refers to the vineyards. 'Eat their
    fruit' is literal and clear; 'enjoy' would add interpretive nuance not explicit
    in the Hebrew.
