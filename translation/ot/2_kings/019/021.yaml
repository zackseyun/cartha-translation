id: 2KI.19.21
reference: 2 Kings 19:21
source:
  edition: WLC
  text: זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁר דִּבֶּ֥ר יְהוָ֖ה עָלָ֑י/ו בָּזָ֨ה לְ/ךָ֜ לָעֲגָ֣ה לְ/ךָ֗
    בְּתוּלַת֙ בַּת צִיּ֔וֹן אַחֲרֶ֨י/ךָ֙ רֹ֣אשׁ הֵנִ֔יעָה בַּ֖ת יְרוּשָׁלִָֽם־־׃
translation:
  text: 'This is the word that the LORD has spoken concerning him: ‘Virgin Daughter
    Zion despises you; she mocks you. Daughter Jerusalem shakes her head behind you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the virgin daughter of Zion despises you; she derides you.'
    reason: lexical_alternative
  - marker: b
    text: '''Shakes her head'' is an idiom of scorn or mockery.'
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the message
  - the saying
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word, matter, message.' In prophetic-introductory
    formulae, 'the word' is the most natural and transparent English rendering and
    preserves the formal force of a divine utterance.
- source_word: דִּבֶּר יְהוָה עָלָיו
  chosen: the LORD has spoken concerning him
  alternatives:
  - the LORD spoke against him
  - the LORD has spoken about him
  lexicon: HALOT
  rationale: The preposition עַל with דבר here indicates the subject matter of the
    oracle, 'concerning him,' rather than necessarily hostile direction 'against him,'
    though the context is judgment. 'Has spoken' reflects the prophetic perfect naturally
    in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: בָּזָה
  chosen: despises
  alternatives:
  - has despised
  - scorns
  lexicon: HALOT
  rationale: The verb denotes treating with contempt. 'Despises' gives a strong present-force
    English equivalent in the taunt context; 'scorns' is possible but slightly less
    direct.
- source_word: לָעֲגָה
  chosen: mocks
  alternatives:
  - derides
  - laughs at
  lexicon: HALOT
  rationale: The verb means to mock or deride. 'Mocks' is idiomatic modern English
    and pairs well with 'despises' without becoming archaic.
- source_word: בְּתוּלַת בַּת צִיּוֹן
  chosen: Virgin Daughter Zion
  alternatives:
  - the virgin daughter of Zion
  - Fair Maiden Zion
  lexicon: HALOT
  rationale: This is a personified city-title. 'Virgin Daughter Zion' preserves both
    nouns and the appositional poetic force. Capitalization signals the personified
    proper designation. 'Virgin' is retained rather than softened, since it is present
    in the Hebrew and contributes to the imagery of inviolate Zion.
- source_word: אַחֲרֶיךָ
  chosen: behind you
  alternatives:
  - after you
  - at your back
  lexicon: HALOT
  rationale: Spatially, the phrase means 'behind you' or 'after you.' In this taunt
    scene, 'behind you' best conveys the image of Jerusalem dismissively shaking her
    head as the enemy retreats.
- source_word: רֹאשׁ הֵנִיעָה
  chosen: shakes her head
  alternatives:
  - has shaken her head
  - tosses her head
  lexicon: HALOT
  rationale: This idiom expresses scorn or derision. 'Shakes her head' is the standard
    clear English equivalent.
- source_word: בַּת יְרוּשָׁלִָם
  chosen: Daughter Jerusalem
  alternatives:
  - the daughter of Jerusalem
  - daughter Jerusalem
  lexicon: HALOT
  rationale: Like 'Daughter Zion,' this is a poetic personification of the city. Capitalization
    preserves its title-like force and keeps the parallelism compact.
