theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Exclusive monotheistic force of the prayer
  chosen_reading: you alone are God over all the kingdoms of the earth
  alternative_readings:
  - you are God, you alone, of all the kingdoms of the earth
  - you alone are the God for all the kingdoms of the earth
  rationale: The Hebrew affirms the LORD's unique deity and universal sovereignty. The chosen rendering preserves that theological force in clear English without adding later doctrinal formulation beyond the text itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
