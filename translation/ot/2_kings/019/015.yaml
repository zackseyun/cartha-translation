id: 2KI.19.15
reference: 2 Kings 19:15
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּ֨ל חִזְקִיָּ֜הוּ לִ/פְנֵ֣י יְהוָה֮ וַ/יֹּאמַר֒ יְהוָ֞ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ יֹשֵׁ֣ב הַ/כְּרֻבִ֔ים אַתָּה ה֤וּא הָֽ/אֱלֹהִים֙ לְ/בַדְּ/ךָ֔ לְ/כֹ֖ל מַמְלְכ֣וֹת הָ/אָ֑רֶץ אַתָּ֣ה עָשִׂ֔יתָ אֶת הַ/שָּׁמַ֖יִם וְ/אֶת הָ/אָֽרֶץ־־־׃
translation:
  text: And Hezekiah prayed before Yahweh and said, “Yahweh, God of Israel, enthroned above the cherubim, you alone are God over all the kingdoms of the earth. You made the heavens and the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who sits enthroned over the cherubim”; the Hebrew literally says “sitting/dwelling [among/over] the cherubim,” a royal-cultic image of the LORD’s enthronement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - interceded
  lexicon: HALOT
  rationale: Basic sense is 'to pray.' 'Prayed' is the most direct and natural English rendering here.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD' is idiomatic, concise, and preserves the relational/spatial sense of prayer offered in God's presence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: God of Israel
  alternatives:
  - God, the God of Israel
  lexicon: HALOT
  rationale: Construct phrase straightforwardly means 'God of Israel.' The simpler rendering fits the vocative prayer address.
- source_word: יֹשֵׁב הַכְּרֻבִים
  chosen: enthroned above the cherubim
  alternatives:
  - who sits enthroned over the cherubim
  - dwelling between the cherubim
  lexicon: HALOT
  rationale: The participle יֹשֵׁב with cherubim in royal-cultic contexts conveys enthronement, not mere sitting. 'Above' reflects the imagery of God enthroned over the ark's cherubim without overcommitting to a wooden spatial gloss like 'between,' which is interpretive and not explicit in the Hebrew here.
- source_word: אַתָּה הוּא הָאֱלֹהִים
  chosen: you alone are God
  alternatives:
  - you are God
  - you are the God
  lexicon: HALOT
  rationale: The clause emphasizes exclusive deity, especially in combination with לְבַדְּךָ. Rendering as 'you alone are God' captures the force in natural English without awkward literalism.
- source_word: לְבַדְּךָ
  chosen: alone
  alternatives:
  - by yourself
  - only
  lexicon: HALOT
  rationale: This adverbial expression marks exclusivity. 'Alone' is the clearest idiomatic English equivalent.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  chosen: over all the kingdoms of the earth
  alternatives:
  - for all the kingdoms of the earth
  - among all the kingdoms of the earth
  lexicon: HALOT
  rationale: The phrase expresses God's sovereignty in relation to all earthly kingdoms. 'Over' best communicates dominion in English, even though the Hebrew preposition is formally broader.
- source_word: עָשִׂיתָ
  chosen: made
  alternatives:
  - created
  lexicon: HALOT
  rationale: עָשָׂה commonly means 'make/do.' 'Made' is the direct lexical equivalent. 'Created' is theologically true in context but would import ברא-style wording not used here.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  chosen: the heavens and the earth
  alternatives:
  - heaven and earth
  lexicon: HALOT
  rationale: The Hebrew uses the plural form for 'heavens.' 'The heavens and the earth' preserves the source wording and the stock creation formula.
