id: 2KI.19.37
reference: 2 Kings 19:37
source:
  edition: WLC
  text: וַ/יְהִי֩ ה֨וּא מִֽשְׁתַּחֲוֶ֜ה בֵּ֣ית נִסְרֹ֣ךְ אֱלֹהָ֗י/ו וְֽ/אַדְרַמֶּ֨לֶךְ
    וְ/שַׂרְאֶ֤צֶר הִכֻּ֣/הוּ בַ/חֶ֔רֶב וְ/הֵ֥מָּה נִמְלְט֖וּ אֶ֣רֶץ אֲרָרָ֑ט וַ/יִּמְלֹ֛ךְ
    אֵֽסַר חַדֹּ֥ן בְּנ֖/וֹ תַּחְתָּֽי/ו׀־׃פ
translation:
  text: And it happened that, as he was worshiping in the house of Nisrok his god,
    Adrammelek and Sharezer struck him down with the sword, and they escaped to the
    land of Ararat. And Esar-haddon his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Nisrok'; traditionally rendered 'Nisroch.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened that
  alternatives:
  - And it came to pass
  - Now it happened that
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the event. 'And it happened that'
    preserves the Hebrew discourse function without archaic English.
- source_word: מִשְׁתַּחֲוֶה
  chosen: was worshiping
  alternatives:
  - was bowing down
  - was prostrating himself
  lexicon: HALOT
  rationale: The hitpael of שׁחה in a cultic setting with 'his god' clearly denotes
    worship, not merely physical bowing. Progressive English reflects the participial
    construction with הוּא.
- source_word: בֵּית
  chosen: in the house of
  alternatives:
  - in the temple of
  lexicon: HALOT
  rationale: Literally 'house of.' Although it refers to a deity's sanctuary and could
    be rendered 'temple,' 'house of' stays closer to the Hebrew while remaining natural.
- source_word: נִסְרֹךְ
  chosen: Nisrok
  alternatives:
  - Nisroch
  lexicon: HALOT
  rationale: Personal/divine name is transliterated per project philosophy. 'Nisrok'
    follows a direct transliteration from the pointed Hebrew; the more familiar 'Nisroch'
    is preserved as an alternative.
- source_word: אֱלֹהָיו
  chosen: his god
  alternatives:
  - his deity
  lexicon: HALOT
  rationale: Singular with 3ms suffix referring to Sennacherib's god. 'His god' is
    the plain and idiomatic rendering.
- source_word: הִכֻּהוּ
  chosen: struck him down
  alternatives:
  - killed him
  - smote him
  lexicon: HALOT
  rationale: נכה commonly means 'strike' and in this context results in death. 'Struck
    him down' preserves the verbal image while allowing the following 'with the sword'
    to carry the lethal specificity.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' Singular 'sword' is idiomatic
    in English for death by bladed weaponry.
- source_word: נִמְלְטוּ
  chosen: escaped
  alternatives:
  - fled
  - were delivered
  lexicon: HALOT
  rationale: The nifal of מלט here denotes successful escape after the assassination.
    'Escaped' best captures the result.
- source_word: אֶרֶץ אֲרָרָט
  chosen: to the land of Ararat
  alternatives:
  - into the land of Ararat
  lexicon: HALOT
  rationale: Geographical destination. 'Land of Ararat' is the standard and transparent
    rendering of the construct phrase.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: מלך in narrative succession commonly means 'reigned' or 'became king.'
    'Reigned' is concise and idiomatic, with succession clarified by the following
    phrase.
- source_word: אֵסַר חַדֹּן
  chosen: Esar-haddon
  alternatives:
  - Esarhaddon
  lexicon: HALOT
  rationale: Royal name transliterated from Hebrew. Hyphenation aids readability while
    preserving the two-part Hebrew form.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The idiom indicates dynastic succession. 'In his place' is the most natural
    English equivalent.
