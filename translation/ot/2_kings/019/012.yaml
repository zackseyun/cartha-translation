id: 2KI.19.12
reference: 2 Kings 19:12
source:
  edition: WLC
  text: הַ/הִצִּ֨ילוּ אֹתָ֜/ם אֱלֹהֵ֤י הַ/גּוֹיִם֙ אֲשֶׁ֣ר שִׁחֲת֣וּ אֲבוֹתַ֔/י אֶת
    גּוֹזָ֖ן וְ/אֶת חָרָ֑ן וְ/רֶ֥צֶף וּ/בְנֵי עֶ֖דֶן אֲשֶׁ֥ר בִּ/תְלַאשָּֽׂר־־־׃
translation:
  text: Did the gods of the nations that my fathers destroyed deliver them—Gozan,
    Haran, Rezeph, and the people of Eden who were in Tel-assar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sons of Eden who were in Tel-assar.' The Hebrew literally reads
      'sons of Eden,' which may denote the people or inhabitants of Eden.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהִצִּילוּ
  chosen: Did ... deliver
  alternatives:
  - Have ... delivered
  - rescued
  lexicon: HALOT
  rationale: Hiphil perfect 3cp of נצל used in an interrogative rhetorical question.
    English simple past fits the historical taunt context naturally; 'deliver' preserves
    the common biblical sense of rescue without over-paraphrase.
- source_word: אֹתָם
  chosen: them
  lexicon: Hebrew grammar
  rationale: Direct-object pronoun referring to the peoples/cities named; retained
    as 'them' before the appositional list.
- source_word: אֱלֹהֵי הַגּוֹיִם
  chosen: the gods of the nations
  alternatives:
  - the national gods
  - the gods of those nations
  lexicon: HALOT
  rationale: Construct phrase straightforwardly denotes the deities worshiped by the
    nations. 'Gods of the nations' is the most direct and idiomatic rendering.
- source_word: אֲשֶׁר שִׁחֲתוּ אֲבוֹתַי
  chosen: that my fathers destroyed
  alternatives:
  - that my fathers ruined
  - that my fathers laid waste
  lexicon: HALOT
  rationale: שׁחת in the Piel commonly means destroy/corrupt/ruin. In this military
    context, 'destroyed' best matches the Assyrian king's claim about conquered peoples
    and places.
- source_word: אֲבוֹתַי
  chosen: my fathers
  alternatives:
  - my ancestors
  lexicon: HALOT
  rationale: Literally 'my fathers,' a common royal way of referring to predecessors.
    Kept literal for transparency and biblical style.
- source_word: אֶת גּוֹזָן וְאֶת חָרָן וְרֶצֶף
  chosen: Gozan, Haran, Rezeph
  lexicon: Proper names
  rationale: These are place names and are transliterated per project philosophy.
    Standard English form 'Rezeph' reflects the Hebrew רֶצֶף.
- source_word: וּבְנֵי עֶדֶן
  chosen: the people of Eden
  alternatives:
  - the sons of Eden
  - the descendants of Eden
  lexicon: HALOT
  rationale: בני literally 'sons of,' but here denotes the inhabitants/people associated
    with Eden rather than a narrow filial sense. 'People of Eden' is clear modern
    English while preserving the referent.
- source_word: אֲשֶׁר בִּתְלַאשָּׂר
  chosen: who were in Tel-assar
  alternatives:
  - who were at Tel-assar
  lexicon: HALOT
  rationale: Relative clause identifies the people of Eden by location. 'In Tel-assar'
    is the most natural rendering for ב + place name.
