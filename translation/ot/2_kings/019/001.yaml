id: 2KI.19.1
reference: 2 Kings 19:1
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ/שְׁמֹ֨עַ֙ הַ/מֶּ֣לֶךְ חִזְקִיָּ֔הוּ וַ/יִּקְרַ֖ע אֶת בְּגָדָ֑י/ו וַ/יִּתְכַּ֣ס בַּ/שָּׂ֔ק וַ/יָּבֹ֖א בֵּ֥ית יְהוָֽה־׃
translation:
  text: And when King Hezekiah heard it, he tore his clothes, covered himself with sackcloth, and went into the house of Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  chosen: And when ... heard
  alternatives:
  - Now when ... heard
  - And it happened, when ... heard
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces the next event. In idiomatic modern English, 'And when ... heard' preserves the temporal sequence without woodenly reproducing 'and it happened.'
- source_word: הַמֶּלֶךְ חִזְקִיָּהוּ
  chosen: King Hezekiah
  alternatives:
  - the king, Hezekiah
  lexicon: HALOT
  rationale: English naturally places the royal title before the personal name. The definite article on 'king' is not separately represented because the title-name construction is idiomatic in English.
- source_word: וַיִּקְרַע אֶת בְּגָדָיו
  chosen: he tore his clothes
  alternatives:
  - he tore his garments
  lexicon: HALOT
  rationale: '''Tore his clothes'' is clear modern English and preserves the mourning gesture. ''Garments'' is more formal but less natural for the target audience.'
- source_word: וַיִּתְכַּס בַּשָּׂק
  chosen: covered himself with sackcloth
  alternatives:
  - clothed himself in sackcloth
  - wrapped himself in sackcloth
  lexicon: HALOT
  rationale: The hitpael/reflexive sense is well conveyed by 'covered himself with.' 'Sackcloth' is retained as the conventional and accurate term for the mourning fabric.
- source_word: וַיָּבֹא בֵּית יְהוָה
  chosen: and went into the house of the LORD
  alternatives:
  - and entered the house of the LORD
  - and went to the house of the LORD
  lexicon: HALOT
  rationale: '''Went into'' best reflects the motion into a place signaled by בוא plus ''house of.'' ''House of the LORD'' preserves the temple idiom rather than flattening it to simply ''temple.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָּׂק
  chosen: sackcloth
  alternatives:
  - coarse cloth
  - mourning cloth
  lexicon: HALOT
  rationale: The traditional term remains the most precise and recognizable for the specific material associated with mourning and humiliation.
