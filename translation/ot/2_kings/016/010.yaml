id: 2KI.16.10
reference: 2 Kings 16:10
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ הַ/מֶּ֣לֶךְ אָחָ֡ז לִ֠/קְרַאת תִּגְלַ֨ת פִּלְאֶ֤סֶר מֶֽלֶךְ אַשּׁוּר֙
    דּוּמֶּ֔שֶׂק וַ/יַּ֥רְא אֶת הַ/מִּזְבֵּ֖חַ אֲשֶׁ֣ר בְּ/דַמָּ֑שֶׂק וַ/יִּשְׁלַח֩
    הַ/מֶּ֨לֶךְ אָחָ֜ז אֶל אוּרִיָּ֣ה הַ/כֹּהֵ֗ן אֶת דְּמ֧וּת הַ/מִּזְבֵּ֛חַ וְ/אֶת
    תַּבְנִית֖/וֹ לְ/כָֽל מַעֲשֵֽׂ/הוּ־־־־־־׃
translation:
  text: Then King Ahaz went to meet Tiglath-pileser king of Assyria at Damascus, and
    he saw the altar that was at Damascus. And King Ahaz sent to Uriah the priest
    a model of the altar and its pattern, according to all its workmanship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a likeness of the altar and its design.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase 'according to all its workmanship' refers to the altar's
      full construction details.
    reason: cultural_note
lexical_decisions:
- source_word: לִקְרַאת
  chosen: to meet
  alternatives:
  - to encounter
  - to greet
  lexicon: HALOT
  rationale: The infinitive construct of קרא with ל here indicates going out for an
    encounter with someone. 'To meet' is the most natural and contextually precise
    English rendering.
- source_word: דּוּמֶּשֶׂק / בְּדַמָּשֶׂק
  chosen: at Damascus
  alternatives:
  - to Damascus
  - in Damascus
  lexicon: HALOT
  rationale: The verse first gives Damascus appositionally after 'king of Assyria,'
    functioning as the location of the meeting, and then repeats it with בְּ. 'At
    Damascus' works idiomatically for both clauses in English and preserves the locative
    sense without awkward repetition.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: מִזְבֵּחַ is straightforwardly 'altar.' The definite article is retained.
    In context this is the foreign altar Ahaz observed in Damascus.
- source_word: דְּמוּת
  chosen: a model
  alternatives:
  - likeness
  - representation
  lexicon: HALOT
  rationale: דְּמוּת denotes a likeness or representation. Because Ahaz is sending
    something usable for construction, 'a model' best captures a practical representational
    copy in readable English.
- source_word: תַּבְנִיתוֹ
  chosen: its pattern
  alternatives:
  - its design
  - its plan
  lexicon: HALOT
  rationale: תַּבְנִית commonly refers to a pattern, form, or structural design. 'Its
    pattern' preserves the formal sense and pairs well with 'model' without collapsing
    the two nouns into one idea.
- source_word: לְכָל מַעֲשֵׂהוּ
  chosen: according to all its workmanship
  alternatives:
  - with all its details
  - in all its construction
  - according to all its work
  lexicon: HALOT
  rationale: The phrase indicates correspondence to the altar in all the particulars
    of its construction. 'According to all its workmanship' is slightly formal but
    accurately preserves the sense of comprehensive construction detail better than
    the looser 'with all its details.'
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: 'The title is definite in Hebrew and should remain so in English: ''Uriah
    the priest.'''
- source_word: וַיִּשְׁלַח ... אֶל
  chosen: sent to
  alternatives:
  - sent word to
  - sent
  lexicon: HALOT
  rationale: The verb plus אֶל marks the recipient of what was sent. Since the direct
    object is the model and pattern, 'sent to Uriah ... a model' is the most direct
    rendering.
