id: 2KI.16.5
reference: 2 Kings 16:5
source:
  edition: WLC
  text: אָ֣ז יַעֲלֶ֣ה רְצִ֣ין מֶֽלֶךְ אֲ֠רָם וּ/פֶ֨קַח בֶּן רְמַלְיָ֧הוּ מֶֽלֶךְ יִשְׂרָאֵ֛ל
    יְרוּשָׁלִַ֖ם לַ/מִּלְחָמָ֑ה וַ/יָּצֻ֨רוּ֙ עַל אָחָ֔ז וְ/לֹ֥א יָכְל֖וּ לְ/הִלָּחֵֽם־־־־׃
translation:
  text: Then Rezin king of Aram and Pekah son of Remaliah, king of Israel, came up
    to Jerusalem for war, and they besieged Ahaz, but they were not able to fight
    against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but they could not fight against it,' with 'it' referring to Jerusalem;
      the Hebrew does not repeat the object after 'fight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: יַעֲלֶה
  chosen: came up
  alternatives:
  - went up
  - marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up,' especially for military movement
    toward Jerusalem. English idiom favors 'came up' here in a narrative oriented
    toward Jerusalem.
- source_word: רְצִין מֶלֶךְ אֲרָם
  chosen: Rezin king of Aram
  alternatives:
  - Rezin, the king of Aram
  - Rezin king of Syria
  lexicon: HALOT
  rationale: Personal name transliterated; title translated. 'Aram' is preferred over
    traditional 'Syria' because it more directly reflects the Hebrew ethnogeographic
    term.
- source_word: וּפֶקַח בֶּן רְמַלְיָהוּ מֶלֶךְ יִשְׂרָאֵל
  chosen: and Pekah son of Remaliah, king of Israel
  alternatives:
  - and Pekah the son of Remaliah, king of Israel
  lexicon: HALOT
  rationale: Standard rendering of patronymic and royal title; keeps the appositional
    structure of the Hebrew.
- source_word: יְרוּשָׁלַםִ לַמִּלְחָמָה
  chosen: to Jerusalem for war
  alternatives:
  - against Jerusalem for war
  - to Jerusalem for battle
  - to Jerusalem to wage war
  lexicon: HALOT
  rationale: The phrase marks destination plus military purpose. 'For war' is concise
    and close to the Hebrew, while avoiding over-interpretation of the infinitive
    idea not present here.
- source_word: וַיָּצֻרוּ
  chosen: they besieged
  alternatives:
  - they laid siege to
  - they hemmed in
  lexicon: HALOT
  rationale: From צור in military context, the standard sense is to besiege or lay
    siege. 'They besieged' is compact and clear.
- source_word: עַל אָחָז
  chosen: Ahaz
  alternatives:
  - against Ahaz
  lexicon: HALOT
  rationale: With צור על, the object is the one under siege. English idiom after 'besieged'
    takes a direct object without repeating the preposition.
- source_word: וְלֹא יָכְלוּ
  chosen: but they were not able
  alternatives:
  - but they could not
  lexicon: HALOT
  rationale: Expresses inability. Expanded form is slightly more explicit, though
    equivalent in sense to 'could not.'
- source_word: לְהִלָּחֵם
  chosen: to fight against it
  alternatives:
  - to wage war
  - to prevail in battle
  - to fight
  lexicon: HALOT
  rationale: The infinitive of לחם means 'to fight/do battle.' Because the Hebrew
    object is not explicit after the infinitive, English supplies 'against it' to
    make sense of the military context, likely referring to the city under siege.
    This avoids the misleading sense that they were unable to engage in combat at
    all while preserving the statement of failed assault.
