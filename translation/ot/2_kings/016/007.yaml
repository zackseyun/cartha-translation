theological_decisions:
- issue: Diplomatic self-humbling language in Ahaz's appeal
  chosen_reading: Rendered literally as 'your servant and your son'
  alternative_readings:
  - Rendered interpretively as 'your vassal' or similar political terminology
  rationale: The verse expresses political submission, but the text itself uses kinship
    and servitude language. A literal rendering preserves the rhetoric without importing
    extra technical terminology into the main text.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Military-political sense of 'save me'
  chosen_reading: Retained 'save me' rather than narrowing to 'rescue me' in the main
    text
  alternative_readings:
  - deliver me
  - rescue me
  rationale: The Hebrew verb is theologically significant across Scripture, but here
    its immediate sense is political-military deliverance. Keeping 'save' preserves
    lexical continuity while context makes the non-soteriological sense clear.
  doctrine_reference: Translation philosophy §§1, 5
