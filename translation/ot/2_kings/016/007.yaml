id: 2KI.16.7
reference: 2 Kings 16:7
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח אָחָ֜ז מַלְאָכִ֗ים אֶל תִּ֠גְלַת פְּלֶ֤סֶר מֶֽלֶךְ אַשּׁוּר֙
    לֵ/אמֹ֔ר עַבְדְּ/ךָ֥ וּ/בִנְ/ךָ֖ אָ֑נִי עֲלֵ֨ה וְ/הוֹשִׁעֵ֜/נִי מִ/כַּ֣ף מֶֽלֶךְ
    אֲרָ֗ם וּ/מִ/כַּף֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל הַ/קּוֹמִ֖ים עָלָֽ/י־־־׃
translation:
  text: So Ahaz sent messengers to Tiglath-pileser king of Assyria, saying, “I am
    your servant and your son. Come up and save me from the hand of the king of Aram
    and from the hand of the king of Israel, who are rising up against me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your vassal and your son'; the Hebrew uses diplomatic language of submission
      literally, 'your servant and your son.'
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' is traditionally rendered ''Syria.'''
    reason: alternative_reading
  - marker: c
    text: Hebrew 'from the hand of,' an idiom meaning 'from the power of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from שלח; 'sent' is the natural English
    narrative equivalent.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In this political context the term refers to human emissaries, not angels;
    'messengers' is the broad, accurate rendering.
- source_word: תִּגְלַת פְּלֶסֶר
  chosen: Tiglath-pileser
  alternatives:
  - Tiglath-Pileser
  rationale: Standard English transliteration of the Assyrian royal name.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  lexicon: HALOT
  rationale: Construct phrase identifying Tiglath-pileser by title and realm; conventional
    and precise rendering.
- source_word: עַבְדְּךָ וּבִנְךָ
  chosen: your servant and your son
  alternatives:
  - your servant, your son
  - your vassal and your son
  lexicon: HALOT
  rationale: These are diplomatic submission terms. 'Servant' preserves the literal
    metaphor, while 'son' reflects subordinate treaty language. 'Vassal' captures
    the sense but is less literal, so it is kept as an alternative.
- source_word: עֲלֵה
  chosen: Come up
  alternatives:
  - Advance
  - March up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' In a request to a foreign king for
    military intervention, 'Come up' preserves the idiom without over-specifying military
    action.
- source_word: וְהוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - deliver me
  - rescue me
  lexicon: HALOT
  rationale: Hiphil of ישׁע means to save/deliver. 'Save me' is direct and preserves
    the lexical connection to broader biblical usage, though here it refers to military-political
    deliverance.
- source_word: מִכַּף
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: Hebrew idiom for power or control. The main text keeps the concrete idiom
    'hand' for transparency to the source.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Original-language primacy favors 'Aram' over the traditional but potentially
    anachronistic 'Syria.'
- source_word: הַקּוֹמִים עָלַי
  chosen: who are rising up against me
  alternatives:
  - who have risen against me
  - who are attacking me
  lexicon: HALOT
  rationale: The participle conveys ongoing hostile action; 'who are rising up against
    me' preserves the verbal imagery and aspect better than a simple finite verb.
