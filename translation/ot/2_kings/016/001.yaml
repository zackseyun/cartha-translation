id: 2KI.16.1
reference: 2 Kings 16:1
source:
  edition: WLC
  text: בִּ/שְׁנַת֙ שְׁבַֽע עֶשְׂרֵ֣ה שָׁנָ֔ה לְ/פֶ֖קַח בֶּן רְמַלְיָ֑הוּ מָלַ֛ךְ
    אָחָ֥ז בֶּן יוֹתָ֖ם מֶ֥לֶךְ יְהוּדָֽה־־־׃
translation:
  text: In the seventeenth year of Pekah son of Remaliah, Ahaz son of Jotham, king
    of Judah, began to reign.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year of
  alternatives:
  - In the year of
  - During the ... year of
  lexicon: HALOT
  rationale: The preposition ב plus שְׁנַת introduces a regnal-year synchronism. English
    idiom naturally renders this as 'In the ... year of'.
- source_word: שְׁבַע עֶשְׂרֵה שָׁנָה
  chosen: seventeenth year
  alternatives:
  - seventeen years
  lexicon: HALOT
  rationale: 'The numeral construction with שָׁנָה in this dating formula denotes
    an ordinal sense in context: ''the seventeenth year,'' not a duration of seventeen
    years.'
- source_word: לְ/פֶקַח בֶּן רְמַלְיָהוּ
  chosen: of Pekah son of Remaliah
  alternatives:
  - of Pekah the son of Remaliah
  lexicon: HALOT
  rationale: The ל preposition marks the person whose regnal year is being counted.
    'Son of' preserves the Hebrew patronymic construction in natural English.
- source_word: מָלַךְ
  chosen: began to reign
  alternatives:
  - reigned
  - became king
  lexicon: HALOT
  rationale: In regnal formulas, the qatal of מלך commonly marks accession to kingship
    rather than the whole duration of rule. 'Began to reign' makes the inception explicit
    and fits English historical style.
- source_word: אָחָז בֶּן יוֹתָם
  chosen: Ahaz son of Jotham
  alternatives:
  - Ahaz the son of Jotham
  lexicon: HALOT
  rationale: Standard transliteration of personal names, with the patronymic rendered
    directly.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: The appositional title identifies Ahaz. English omits the article naturally
    in this construction.
