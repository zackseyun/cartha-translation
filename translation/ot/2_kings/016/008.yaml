id: 2KI.16.8
reference: 2 Kings 16:8
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אָחָ֜ז אֶת הַ/כֶּ֣סֶף וְ/אֶת הַ/זָּהָ֗ב הַ/נִּמְצָא֙ בֵּ֣ית יְהוָ֔ה
    וּ/בְ/אֹֽצְר֖וֹת בֵּ֣ית הַ/מֶּ֑לֶךְ וַ/יִּשְׁלַ֥ח לְ/מֶֽלֶךְ אַשּׁ֖וּר שֹֽׁחַד־־־׃
translation:
  text: Ahaz took the silver and the gold that was found in the house of the LORD
    and in the treasuries of the king’s house, and sent it as a bribe to the king
    of Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tribute' or 'gift'; the Hebrew word commonly carries the sense of a
      bribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - collected
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of לקח, best rendered with the straightforward
    past 'took' in English narrative.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - silver money
  lexicon: HALOT
  rationale: Refers to silver as valuable material/wealth. 'The silver' preserves
    the concrete wording of the Hebrew.
- source_word: הַזָּהָב
  chosen: the gold
  lexicon: HALOT
  rationale: Concrete precious metal parallel to 'the silver'; retained formally.
- source_word: הַנִּמְצָא
  chosen: that was found
  alternatives:
  - that was present
  - available
  lexicon: HALOT
  rationale: Passive participle of מצא. 'That was found' is the most direct rendering,
    indicating what was on hand in those locations.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the
    LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew while
    remaining natural.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD.'
- source_word: וּבְאֹצְרוֹת
  chosen: and in the treasuries
  alternatives:
  - and in the storehouses
  - and in the treasury rooms
  lexicon: HALOT
  rationale: Plural of אוצר denotes treasury/storehouse repositories. 'Treasuries'
    fits the royal-financial context.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the palace
  lexicon: HALOT
  rationale: Literally 'house of the king.' Rendered as 'the king’s house' to preserve
    the repeated 'house' language with the temple, while remaining intelligible.
- source_word: וַיִּשְׁלַח
  chosen: and sent it
  alternatives:
  - and dispatched it
  lexicon: HALOT
  rationale: The Hebrew verb is singular, and English idiom naturally supplies 'it'
    for the collected silver and gold as a combined payment.
- source_word: לְמֶלֶךְ אַשּׁוּר
  chosen: to the king of Assyria
  alternatives:
  - to Assyria’s king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and idiomatic in English.
- source_word: שֹׁחַד
  chosen: as a bribe
  alternatives:
  - tribute
  - gift
  - present
  lexicon: HALOT
  rationale: שֹׁחַד normally denotes a bribe rather than neutral tribute. Rendering
    it 'bribe' preserves the negative moral-political sense of Ahaz's payment and
    avoids softening the Hebrew.
