id: 2KI.16.9
reference: 2 Kings 16:9
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע אֵלָי/ו֙ מֶ֣לֶךְ אַשּׁ֔וּר וַ/יַּעַל֩ מֶ֨לֶךְ אַשּׁ֤וּר אֶל
    דַּמֶּ֨שֶׂק֙ וַֽ/יִּתְפְּשֶׂ֔/הָ וַ/יַּגְלֶ֖/הָ קִ֑ירָ/ה וְ/אֶת רְצִ֖ין הֵמִֽית־־׃
translation:
  text: So the king of Assyria listened to him, and the king of Assyria went up against
    Damascus and captured it, and he deported its people to Kir, and he put Rezin
    to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heeded him.' The Hebrew verb can denote listening with responsive action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'deported it to Kir,' with the city standing for its inhabitants.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע אֵלָיו
  chosen: listened to him
  alternatives:
  - heeded him
  - obeyed him
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed someone. Here the sense
    is that the Assyrian king responded favorably to Ahaz's appeal. 'Listened to him'
    is natural English and leaves the response itself to be specified by the following
    actions.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - the Assyrian king
  lexicon: HALOT
  rationale: A straightforward construct chain. Repeating the full phrase both times
    reflects the Hebrew repetition and preserves the narrative emphasis.
- source_word: וַיַּעַל ... אֶל דַּמֶּשֶׂק
  chosen: went up against Damascus
  alternatives:
  - marched up to Damascus
  - went up to Damascus
  lexicon: HALOT
  rationale: עלה with אֶל in military narrative often carries the sense of advancing
    against a city. Because the next verbs are hostile ('captured,' 'deported,' 'put
    to death'), 'went up against' best conveys the military movement without over-paraphrasing.
- source_word: וַיִּתְפְּשֶׂהָ
  chosen: captured it
  alternatives:
  - seized it
  - took it
  lexicon: HALOT
  rationale: The verb תפשׂ in this context refers to taking control of the city. 'Captured
    it' is idiomatic military English and clearly refers back to Damascus, a feminine
    noun in Hebrew.
- source_word: וַיַּגְלֶהָ קִירָה
  chosen: he deported its people to Kir
  alternatives:
  - he exiled it to Kir
  - he carried it away to Kir
  lexicon: HALOT
  rationale: The suffix formally refers to the city, but in English the object of
    deportation is the population, not the city itself. 'Deported its people' makes
    explicit the metonymy required by idiomatic English while staying close to the
    Hebrew sense of forced exile. The directional suffix on קִירָה is represented
    by 'to Kir.'
- source_word: קִירָה
  chosen: Kir
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    following the project's policy for names.
- source_word: וְאֶת רְצִין הֵמִית
  chosen: and he put Rezin to death
  alternatives:
  - and he killed Rezin
  - and Rezin he killed
  lexicon: HALOT
  rationale: המית means to cause to die, hence 'put to death' or 'killed.' 'Put Rezin
    to death' slightly foregrounds the execution-like force in context while remaining
    natural English.
