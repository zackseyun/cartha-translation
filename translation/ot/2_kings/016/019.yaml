id: 2KI.16.19
reference: 2 Kings 16:19
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י אָחָ֖ז אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר
    דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־׃
translation:
  text: Now the rest of the acts of Ahaz, which he did—are they not written in the
    Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Annals of the Kings of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder' or 'rest.' With prefixed וְ in this recurring
    regnal-summary formula, 'Now the rest of' gives natural English while preserving
    the transitional force.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the formula 'the rest of the דברי
    of a king' it refers broadly to his recorded acts or affairs. 'Acts' is idiomatic
    and fits the historiographical context.
- source_word: אָחָז
  chosen: Ahaz
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: אֲשֶׁר עָשָׂה
  chosen: which he did
  alternatives:
  - that he did
  - which he accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'Which he did' preserves
    the Hebrew wording and the formulaic style of the source.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - surely they are
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting a positive answer. 'Are they
    not' is the standard concise English equivalent in this formula.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כְּתוּבִים is literally 'written.' 'Are they not written' preserves both
    the passive participial sense and the rhetorical formula. 'Recorded' is possible
    but less formally transparent.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but idiomatic English for documentary
    reference is 'in the Book.' 'Book' is conventional and understandable for סֵפֶר
    in this context.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the Events of the Days
  - the Annals
  lexicon: HALOT
  rationale: This expression is the conventional title-like designation for an annalistic
    record. 'Chronicles' is the most natural English equivalent here, while 'Annals'
    is also possible.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - for the kings of Judah
  lexicon: HALOT
  rationale: In this archival formula, לְ marks relation/reference. 'Of the Kings
    of Judah' is the most idiomatic English rendering of the title of the source document.
