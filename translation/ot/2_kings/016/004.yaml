id: 2KI.16.4
reference: 2 Kings 16:4
source:
  edition: WLC
  text: וַ/יְזַבֵּ֧חַ וַ/יְקַטֵּ֛ר בַּ/בָּמ֖וֹת וְ/עַל הַ/גְּבָע֑וֹת וְ/תַ֖חַת כָּל
    עֵ֥ץ רַעֲנָֽן־־׃
translation:
  text: He sacrificed and burned incense on the high places, on the hills, and under
    every green tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under every leafy tree' or 'under every luxuriant tree.' The Hebrew
      adjective can describe something green, fresh, or luxuriant.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְזַבֵּחַ
  chosen: He sacrificed
  alternatives:
  - He offered sacrifices
  lexicon: HALOT
  rationale: The verb זבח denotes offering sacrifice. 'He sacrificed' is concise and
    natural in English while preserving the cultic action without adding an explicit
    object not present in the Hebrew.
- source_word: וַיְקַטֵּר
  chosen: burned incense
  alternatives:
  - made offerings smoke
  - offered incense
  lexicon: HALOT
  rationale: The piel of קטר in cultic contexts commonly refers to burning incense
    or turning an offering into smoke. Here 'burned incense' fits the idiom and the
    common Deuteronomistic critique formula.
- source_word: בַּבָּמוֹת
  chosen: on the high places
  alternatives:
  - at the high places
  lexicon: HALOT
  rationale: בָּמוֹת refers to local elevated cult sites. 'High places' is the established
    and accurate rendering for these worship locations.
- source_word: וְעַל הַגְּבָעוֹת
  chosen: on the hills
  alternatives:
  - upon the hills
  lexicon: HALOT
  rationale: גְּבָעוֹת means hills. Rendering it distinctly from 'high places' preserves
    the difference between topographical hills and cultic sites.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  chosen: and under every green tree
  alternatives:
  - and under every leafy tree
  - and under every luxuriant tree
  lexicon: HALOT
  rationale: The phrase is a recurring idiom for illicit worship sites. רַעֲנָן literally
    denotes something fresh, luxuriant, or green. 'Green tree' preserves the familiar
    biblical idiom while remaining intelligible in modern English.
