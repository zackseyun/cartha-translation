theological_decisions:
- issue: Rendering of illicit worship formula
  chosen_reading: 'Retained the concrete cultic/topographical language: ''sacrificed
    and burned incense on the high places, on the hills, and under every green tree.'''
  alternative_readings:
  - Used a more interpretive rendering such as 'He practiced pagan worship at shrines
    on hills and under every leafy tree.'
  rationale: The Hebrew lists actions and locations without explicitly labeling them
    'pagan' in this verse. A less interpretive rendering preserves the text's own
    wording and lets the broader context supply the negative evaluation.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never import doctrinal claims the text does not make.'
