id: 2KI.16.20
reference: 2 Kings 16:20
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב אָחָז֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵ֥ר עִם אֲבֹתָ֖י/ו בְּ/עִ֣יר
    דָּוִ֑ד וַ/יִּמְלֹ֛ךְ חִזְקִיָּ֥הוּ בְנ֖/וֹ תַּחְתָּֽי/ו־־׃פ
translation:
  text: And Ahaz slept with his fathers and was buried with his fathers in the city
    of David, and Hezekiah his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew idiom 'slept with his fathers' is a conventional royal death
      notice, meaning that Ahaz died and joined his ancestors.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In royal death notices, שׁכב with 'with his fathers' is a conventional
    idiom for death. 'Slept' preserves the Hebrew idiom and its recurring formulaic
    character better than the more interpretive 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard royal formula. 'Fathers' is more formally aligned
    with the Hebrew and preserves the dynastic nuance; 'ancestors' is possible but
    less literal.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was interred
  lexicon: HALOT
  rationale: The Niphal form is naturally rendered as a passive, 'was buried.' 'Interred'
    is accurate but less natural in modern English.
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: This is the standard place-name expression. 'The city of David' is the
    established and transparent rendering.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in succession notices commonly denotes accession and reign.
    'Reigned' is concise and idiomatic in English for this formula.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  alternatives:
  - Hizqiyahu
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy. 'Hezekiah' is the conventional English form.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; retained explicitly to match the
    Hebrew succession formula.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: In succession contexts, תַּחַת commonly means replacement or succession.
    'In his place' is idiomatic and preserves the sense of royal succession.
