theological_decisions:
- issue: No major doctrinally contested theological term occurs in this verse; the
    main interpretive issue is architectural/historical rather than theological.
  chosen_reading: Use a minimally interpretive rendering that preserves uncertainty
    in the temple features and Ahaz's motive.
  alternative_readings:
  - Render מִפְּנֵי more specifically as 'for fear of the king of Assyria'
  - Render הֵסֵב more specifically as 'altered' or 'relocated'
  rationale: The verse describes Ahaz's modifications to temple structures under Assyrian
    pressure. The translation should not overstate either the exact architecture or
    the king's motive beyond what the Hebrew requires.
  doctrine_reference: Translation philosophy §§1, 3, 5
