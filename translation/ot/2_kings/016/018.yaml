id: 2KI.16.18
reference: 2 Kings 16:18
source:
  edition: WLC
  text: וְ/אֶת מיסך הַ/שַּׁבָּ֜ת אֲשֶׁר בָּנ֣וּ בַ/בַּ֗יִת וְ/אֶת מְב֤וֹא הַ/מֶּ֨לֶךְ֙
    הַֽ/חִיצ֔וֹנָ/ה הֵסֵ֖ב בֵּ֣ית יְהוָ֑ה מִ/פְּנֵ֖י מֶ֥לֶךְ אַשּֽׁוּר־־־׃
translation:
  text: He removed from the house of the LORD the Sabbath canopy that they had built
    in the house, and the outer entrance of the king, because of the king of Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Sabbath covered structure,' 'the Sabbath pavilion,' or 'the Sabbath
      portico.' The exact architectural sense of the Hebrew term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the king's outer entrance' or 'the outer entryway for the king.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he altered,' 'he turned aside,' or 'he relocated.' The Hebrew verb can
      denote turning aside or changing the placement of something, not only outright
      removal.
    reason: lexical_alternative
  - marker: d
    text: Or 'on account of the king of Assyria,' possibly 'for fear of the king of
      Assyria.'
    reason: alternative_reading
lexical_decisions:
- source_word: מיסך הַשבת
  chosen: the Sabbath canopy
  alternatives:
  - the Sabbath covered structure
  - the Sabbath pavilion
  - the Sabbath portico
  lexicon: HALOT
  rationale: מיסך is a rare architectural term, traditionally understood as a covered
    structure or canopy. 'Canopy' gives a natural modern English rendering while preserving
    the sense of a constructed covered feature associated with the Sabbath. Because
    the exact architecture is uncertain, alternatives are preserved in a footnote.
- source_word: אֲשֶׁר בָּנוּ בַבַּיִת
  chosen: that they had built in the house
  alternatives:
  - which had been built in the house
  lexicon: HALOT
  rationale: Retains the relative clause and the unspecified plural subject of בָּנוּ
    ('they built'). 'The house' in context refers to the temple precincts; in English
    the clause is kept close to the Hebrew wording.
- source_word: מְבוֹא הַמֶּלֶךְ הַחִיצוֹנָה
  chosen: the outer entrance of the king
  alternatives:
  - the king's outer entrance
  - the outer entryway for the king
  lexicon: HALOT
  rationale: מְבוֹא denotes an entrance or entryway. The phrase likely refers to a
    royal access point on the outside. 'The outer entrance of the king' stays close
    to the Hebrew while remaining intelligible.
- source_word: הֵסֵב
  chosen: He removed
  alternatives:
  - he turned
  - he diverted
  - he altered
  lexicon: HALOT
  rationale: The hiphil of סבב can mean to turn aside, redirect, or remove. In this
    architectural context, with the objects being temple structures and access points,
    'removed' best captures the practical effect in idiomatic English, though the
    underlying sense may be broader alteration or relocation.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is the standard expression for the temple. 'House of the LORD'
    preserves the Hebrew idiom, and 'the LORD' follows the project's required rendering
    of YHWH.
- source_word: מִפְּנֵי מֶלֶךְ אַשּׁוּר
  chosen: because of the king of Assyria
  alternatives:
  - on account of the king of Assyria
  - for fear of the king of Assyria
  lexicon: HALOT
  rationale: מִפְּנֵי can indicate causation ('because of') or motivation in the face
    of someone ('before, because of, out of fear of'). 'Because of' is the broadest
    and least interpretively loaded main-text rendering; the more specific nuance
    'for fear of' is preserved in a footnote.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
