theological_decisions:
- issue: Meaning of לְבַקֵּר regarding the bronze altar's reserved function
  chosen_reading: to inquire by
  alternative_readings:
  - to inspect
  - to consider
  - to seek an omen by
  rationale: The phrase is notoriously difficult. In context Ahaz distinguishes the
    new great altar for regular sacrificial use from the bronze altar reserved for
    his own future consultation. Rendering it 'to inquire by' preserves the likely
    cultic-consultative sense without specifying a technical divinatory practice beyond
    what the Hebrew explicitly states.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
