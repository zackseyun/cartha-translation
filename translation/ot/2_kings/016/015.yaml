id: 2KI.16.15
reference: 2 Kings 16:15
source:
  edition: WLC
  text: ו/יצו/הו הַ/מֶּֽלֶךְ אָ֠חָז אֶת אוּרִיָּ֨ה הַ/כֹּהֵ֜ן לֵ/אמֹ֗ר עַ֣ל הַ/מִּזְבֵּ֣חַ
    הַ/גָּד֡וֹל הַקְטֵ֣ר אֶת עֹֽלַת הַ/בֹּקֶר֩ וְ/אֶת מִנְחַ֨ת הָ/עֶ֜רֶב וְֽ/אֶת עֹלַ֧ת
    הַ/מֶּ֣לֶךְ וְ/אֶת מִנְחָת֗/וֹ וְ֠/אֵת עֹלַ֞ת כָּל עַ֤ם הָ/אָ֨רֶץ֙ וּ/מִנְחָתָ֣/ם
    וְ/נִסְכֵּי/הֶ֔ם וְ/כָל דַּ֥ם עֹלָ֛ה וְ/כָל דַּם זֶ֖בַח עָלָ֣י/ו תִּזְרֹ֑ק וּ/מִזְבַּ֧ח
    הַ/נְּחֹ֛שֶׁת יִֽהְיֶה לִּ֖/י לְ/בַקֵּֽר־־־־־־־־־־־־׃
translation:
  text: Then King Ahaz commanded Uriah the priest, saying, “On the great altar offer
    up the morning burnt offering and the evening grain offering, and the king’s burnt
    offering and his grain offering, and the burnt offering of all the people of the
    land and their grain offerings and their drink offerings; and throw on it all
    the blood of the burnt offering and all the blood of the sacrifice. But the bronze
    altar shall be for me to inquire by.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inspect,' 'to consider,' or possibly 'to seek guidance by.' The Hebrew
      expression is difficult, and the exact function Ahaz assigns to the bronze altar
      is uncertain.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמֶּלֶךְ אָחָז
  chosen: King Ahaz
  alternatives:
  - Ahaz the king
  lexicon: HALOT
  rationale: Standard English royal title order is more natural while preserving the
    Hebrew apposition.
- source_word: וַיְצַוֵּהוּ
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: צוה commonly denotes a command; 'commanded' preserves the authoritative
    force of the king's speech.
- source_word: אוּרִיָּה הַכֹּהֵן
  chosen: Uriah the priest
  lexicon: HALOT
  rationale: Personal name transliterated; title translated per project philosophy.
- source_word: עַל הַמִּזְבֵּחַ הַגָּדוֹל
  chosen: On the great altar
  alternatives:
  - Upon the large altar
  - On the main altar
  lexicon: HALOT
  rationale: Retains the spatial preposition and the adjective 'great'; 'great altar'
    likely distinguishes the newly made altar from the bronze altar.
- source_word: הַקְטֵר
  chosen: offer up
  alternatives:
  - burn
  - make smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר refers to causing an offering to go up in smoke on
    the altar. 'Offer up' is idiomatic and sacrificially clear without reducing the
    action merely to combustion.
- source_word: עֹלַת הַבֹּקֶר
  chosen: the morning burnt offering
  alternatives:
  - the burnt offering of the morning
  lexicon: HALOT
  rationale: עֹלָה is the standard whole burnt offering; this concise English order
    is natural and precise.
- source_word: מִנְחַת הָעֶרֶב
  chosen: the evening grain offering
  alternatives:
  - the evening offering
  - the evening tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts is best rendered 'grain offering'; this
    avoids the vagueness of simply 'offering'.
- source_word: עֹלַת הַמֶּלֶךְ וְאֶת מִנְחָתוֹ
  chosen: the king’s burnt offering and his grain offering
  lexicon: HALOT
  rationale: Possessive structure preserved; the pronoun on 'his grain offering' naturally
    refers to the king.
- source_word: עֹלַת כָּל עַם הָאָרֶץ
  chosen: the burnt offering of all the people of the land
  alternatives:
  - the burnt offering of all the people of the הארץ
  - the burnt offering of all the common people
  lexicon: HALOT
  rationale: עַם הָאָרֶץ here is rendered literally as a social-political collective,
    not specialized as 'common people,' since the immediate context concerns the populace
    generally.
- source_word: מִנְחָתָם וְנִסְכֵּיהֶם
  chosen: their grain offerings and their drink offerings
  alternatives:
  - their grain offering and their libations
  lexicon: HALOT
  rationale: Plural English matches the plural suffixes and the distributive sense
    across the people.
- source_word: וְכָל דַּם עֹלָה וְכָל דַּם זֶבַח
  chosen: all the blood of the burnt offering and all the blood of the sacrifice
  alternatives:
  - all burnt-offering blood and all sacrifice blood
  lexicon: HALOT
  rationale: Keeps the parallelism and distinguishes עֹלָה from זֶבַח. 'Sacrifice'
    is a broad but accurate rendering for זֶבַח here.
- source_word: עָלָיו תִּזְרֹק
  chosen: throw on it
  alternatives:
  - dash against it
  - sprinkle on it
  lexicon: HALOT
  rationale: זרק denotes throwing/tossing sacrificial blood rather than the lighter
    English 'sprinkle.' 'On it' refers to the great altar.
- source_word: וּמִזְבַּח הַנְּחֹשֶׁת
  chosen: But the bronze altar
  alternatives:
  - And the bronze altar
  lexicon: HALOT
  rationale: The conjunction marks a contrast between the use of the great altar and
    the reserved use of the bronze altar; 'bronze' is the standard rendering of נְחֹשֶׁת
    here.
- source_word: יִהְיֶה לִּי
  chosen: shall be for me
  alternatives:
  - shall belong to me
  - shall be mine
  lexicon: HALOT
  rationale: Preserves the Hebrew dative nuance without overinterpreting ownership
    alone.
- source_word: לְבַקֵּר
  chosen: to inquire by
  alternatives:
  - for inquiry
  - to inspect
  - to seek guidance by
  lexicon: HALOT
  rationale: In this context the verb is difficult, but the most likely sense is inquiry/divination/consultation
    rather than simple visual inspection. 'To inquire by' preserves the ambiguity
    of the means while reflecting the likely cultic use.
