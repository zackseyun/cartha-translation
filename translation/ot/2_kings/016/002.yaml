id: 2KI.16.2
reference: 2 Kings 16:2
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֤ים שָׁנָה֙ אָחָ֣ז בְּ/מָלְכ֔/וֹ וְ/שֵׁשׁ עֶשְׂרֵ֣ה שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/לֹא עָשָׂ֣ה הַ/יָּשָׁ֗ר בְּ/עֵינֵ֛י יְהוָ֥ה אֱלֹהָ֖י/ו כְּ/דָוִ֥ד אָבִֽי/ו־־־׃
translation:
  text: Ahaz was twenty years old when he began to reign, and he reigned sixteen years in Jerusalem. He did not do what was right in the eyes of Yahweh his God, as David his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'David his father'; in this royal context, 'father' means his forefather or dynastic ancestor, not his immediate parent.
    reason: cultural_note
  - marker: b
    text: Or 'did not do what was upright in the sight of the LORD his God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים שָׁנָה
  chosen: was twenty years old
  alternatives:
  - was a son of twenty years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A literal rendering would be unnatural in modern English, so the idiomatic equivalent best reflects the sense without loss.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  lexicon: HALOT
  rationale: The preposition plus infinitive/verb form marks the time of accession. 'When he began to reign' is a conventional and clear English rendering in regnal formulas.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely holding the title. 'He reigned' preserves the verbal force and matches the regnal context.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use indicating the seat of his reign.
- source_word: לֹא עָשָׂה הַיָּשָׁר
  chosen: did not do what was right
  alternatives:
  - did not do the right
  - did not do what was upright
  lexicon: HALOT
  rationale: This is a common evaluative formula in Kings. 'What was right' is idiomatic English and preserves the moral assessment conveyed by הַיָּשָׁר.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: The Hebrew idiom expresses evaluation from a person's perspective. 'In the eyes of' is transparent and traditional without being archaic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: The suffix is singular masculine referring to Ahaz. 'His God' preserves the covenantal phrasing of the evaluation formula.
- source_word: כְּדָוִד אָבִיו
  chosen: as David his father had done
  alternatives:
  - like David his father
  - as David his father
  lexicon: HALOT
  rationale: '''Father'' here means royal ancestor rather than immediate parent. The addition of ''had done'' makes the comparison explicit in natural English and matches the implied verbal idea from the preceding clause.'
