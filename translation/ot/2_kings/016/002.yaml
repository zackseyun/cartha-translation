- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'David his father'
  chosen_reading: retain 'father' language while understanding it as dynastic ancestor
  alternative_readings:
  - David his ancestor
  rationale: The Hebrew uses אָבִיו, which in royal contexts commonly refers to an ancestor/predecessor. The main text preserves the source term 'father' for transparency, while the sense is documented here rather than flattened in translation.
