id: 2KI.16.16
reference: 2 Kings 16:16
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ אוּרִיָּ֣ה הַ/כֹּהֵ֑ן כְּ/כֹ֥ל אֲשֶׁר צִוָּ֖ה הַ/מֶּ֥לֶךְ אָחָֽז־׃
translation:
  text: So Uriah the priest did according to all that King Ahaz had commanded.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - made
  - acted
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this context, with a following
    standard of conformity ('according to all that...'), 'did' is the most natural
    English rendering and preserves the straightforward narrative sense.
- source_word: אוּרִיָּה
  chosen: Uriah
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite noun identifying Uriah's office. 'The priest' is the plain sense
    and fits the narrative context.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as
  - in accordance with everything that
  lexicon: HALOT
  rationale: This combination expresses full conformity to what follows. 'According
    to all that' preserves the formal correspondence while remaining natural English.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  - ordered
  lexicon: HALOT
  rationale: 'The verb צוה means ''command.'' Rendering with English past perfect
    (''had commanded'') fits the sequence: Uriah''s action follows the king''s prior
    command. ''Ordered'' is possible but ''commanded'' better preserves the force
    of the Hebrew verb.'
- source_word: הַמֶּלֶךְ אָחָז
  chosen: King Ahaz
  alternatives:
  - the king, Ahaz
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name without
    the article. This preserves the referential force of the Hebrew while sounding
    natural in modern English.
