theological_decisions:
- issue: Whether to render הֶעֱבִיר בָּאֵשׁ as an explicit child sacrifice or as the more literal idiom
  chosen_reading: Retain the idiom 'made his son pass through the fire' in the main text
  alternative_readings:
  - '''burned his son in the fire'''
  - '''offered his son as a sacrifice in the fire'''
  rationale: The verse clearly condemns a pagan rite, but the Hebrew expression itself is idiomatic and does not by itself specify all ritual details. Preserving the idiom avoids importing a fuller reconstruction than the wording warrants, while a footnote can preserve the more explicit interpretive option.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
