id: 2KI.16.3
reference: 2 Kings 16:3
source:
  edition: WLC
  text: וַ/יֵּ֕לֶךְ בְּ/דֶ֖רֶךְ מַלְכֵ֣י יִשְׂרָאֵ֑ל וְ/גַ֤ם אֶת בְּנ/וֹ֙ הֶעֱבִ֣יר בָּ/אֵ֔שׁ כְּ/תֹֽעֲבוֹת֙ הַ/גּוֹיִ֔ם אֲשֶׁ֨ר הוֹרִ֤ישׁ יְהוָה֙ אֹתָ֔/ם מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: He walked in the way of the kings of Israel, and even made his son pass through the fire, according to the abominations of the nations whom Yahweh had driven out before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offered his son in the fire'; the Hebrew literally says 'made his son pass through the fire,' an idiom associated with a condemned pagan rite.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He followed
  lexicon: HALOT
  rationale: הלך with בְּדֶרֶךְ is an idiom for conduct or manner of life. 'Walked' preserves the Hebrew metaphor and is natural English in this moral-evaluative context.
- source_word: בְּדֶרֶךְ
  chosen: in the way of
  alternatives:
  - according to the way of
  - in the path of
  lexicon: HALOT
  rationale: דֶּרֶךְ here is figurative for pattern of behavior. 'In the way of' is a standard and transparent rendering that preserves the idiom.
- source_word: מַלְכֵי יִשְׂרָאֵל
  chosen: the kings of Israel
  lexicon: HALOT
  rationale: Straightforward genitive construction referring to the northern kingdom's rulers as a moral comparison.
- source_word: וְגַם
  chosen: and even
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: 'גַּם adds emphasis beyond simple coordination. ''And even'' captures the escalatory force: not only did he imitate Israel''s kings, but he also committed this further offense.'
- source_word: אֶת־בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Direct object marker plus noun with suffix; singular should be retained.
- source_word: הֶעֱבִיר בָּאֵשׁ
  chosen: made his son pass through the fire
  alternatives:
  - caused his son to pass through the fire
  - burned his son in the fire
  - offered his son in the fire
  lexicon: HALOT
  rationale: The Hiphil of עבר plus 'in/through the fire' is the conventional Hebrew expression used for this rite. The more literal 'made ... pass through the fire' preserves the wording without over-specifying whether the act was a completed child sacrifice or a fire rite, while still conveying grave cultic wrongdoing. More interpretive alternatives are possible but go beyond the phrase's explicit wording in this verse.
- source_word: כְּתֹעֲבוֹת
  chosen: according to the abominations of
  alternatives:
  - like the abominations of
  - following the abominations of
  lexicon: HALOT
  rationale: כְּ marks comparison or conformity. 'According to the abominations of' reflects his behavior as patterned after detestable pagan practices.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this historical context גּוֹיִם refers to the non-Israelite nations of the land. 'The nations' is the most neutral and contextually accurate rendering.
- source_word: אֲשֶׁר הוֹרִישׁ
  chosen: whom ... had driven out
  alternatives:
  - whom ... dispossessed
  - whom ... cast out
  lexicon: HALOT
  rationale: הורישׁ in this context means to dispossess or drive out inhabitants from the land. 'Had driven out' is idiomatic and fits the historical reference.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: The preposition here marks expulsion from before Israel. 'Before' is concise and idiomatic in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the project's gender-accurate principle, the masculine plural construct is retained as 'sons of Israel' rather than flattened to 'Israelites' or 'people of Israel.' The phrase is a standard covenantal ethnonym and remains understandable in English.
