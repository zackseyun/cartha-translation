id: 2KI.16.13
reference: 2 Kings 16:13
source:
  edition: WLC
  text: וַ/יַּקְטֵ֤ר אֶת עֹֽלָת/וֹ֙ וְ/אֶת מִנְחָת֔/וֹ וַ/יַּסֵּ֖ךְ אֶת נִסְכּ֑/וֹ
    וַ/יִּזְרֹ֛ק אֶת דַּֽם הַ/שְּׁלָמִ֥ים אֲשֶׁר ל֖/וֹ עַל הַ/מִּזְבֵּֽחַ־־־־־־־׃
translation:
  text: And he burned his burnt offering and his grain offering, and he poured out
    his drink offering, and he threw the blood of the peace offerings that were his
    against the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood of the fellowship offerings' or 'the blood of the offerings
      of well-being.' The Hebrew term refers to a specific sacrificial category (שְׁלָמִים).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְטֵר
  chosen: burned
  alternatives:
  - offered up in smoke
  - made smoke
  lexicon: HALOT
  rationale: The Hiphil of קטר in sacrificial context refers to causing an offering
    to go up in smoke on the altar. 'Burned' is natural modern English and fits optimal
    equivalence, while the sacrificial nuance is retained by the object 'burnt offering.'
- source_word: עֹלָתוֹ
  chosen: his burnt offering
  alternatives:
  - his whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for a burnt offering. 'Burnt offering'
    is the established and accurate rendering; 'whole burnt offering' is more explicit
    but less idiomatic here.
- source_word: מִנְחָתוֹ
  chosen: his grain offering
  alternatives:
  - his offering
  - his tribute offering
  lexicon: HALOT
  rationale: In cultic context מִנְחָה commonly denotes the cereal/grain offering
    rather than a generic gift. 'Grain offering' best communicates the sacrificial
    category in accessible English.
- source_word: וַיַּסֵּךְ
  chosen: poured out
  alternatives:
  - poured
  - offered by pouring
  lexicon: HALOT
  rationale: נסך in sacrificial usage refers to pouring out a libation. 'Poured out'
    is idiomatic and preserves the ritual action.
- source_word: נִסְכּוֹ
  chosen: his drink offering
  alternatives:
  - his libation
  lexicon: HALOT
  rationale: נֶסֶךְ is the libation accompanying sacrifice. 'Drink offering' is clearer
    for modern readers than 'libation,' while remaining precise.
- source_word: וַיִּזְרֹק
  chosen: threw
  alternatives:
  - splashed
  - sprinkled
  - dashed
  lexicon: HALOT
  rationale: זרק often denotes throwing or tossing sacrificial blood against/on the
    altar rather than a delicate sprinkling. 'Threw' is a direct rendering of the
    verb's force; 'splashed' or 'dashed' are possible but slightly more interpretive.
- source_word: דַּם הַשְּׁלָמִים
  chosen: the blood of the peace offerings
  alternatives:
  - the blood of the fellowship offerings
  - the blood of the offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial category often rendered 'peace
    offerings.' Because no doctrinally mandated alternative exists here, the traditional
    but still intelligible term is retained; alternatives are viable and preserved
    in a footnote.
- source_word: אֲשֶׁר לוֹ
  chosen: that were his
  alternatives:
  - belonging to him
  - for him
  lexicon: HALOT
  rationale: The phrase most naturally identifies these peace offerings as Ahaz's
    own. 'That were his' is concise and preserves the possessive sense without overexplaining.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: against the altar
  alternatives:
  - on the altar
  - upon the altar
  lexicon: HALOT
  rationale: With זרק plus עַל in sacrificial blood rites, the sense is blood thrown
    against or onto the altar. 'Against the altar' better reflects the physical action
    than the more ambiguous 'on the altar.'
