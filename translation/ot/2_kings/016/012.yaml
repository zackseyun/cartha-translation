theological_decisions:
- issue: Whether וַיַּעַל עָלָיו should be rendered as physical ascent or as sacrificial
    offering
  chosen_reading: 'physical ascent: ''went up on it'''
  alternative_readings:
  - '''offered on it'''
  - '''went up to it'''
  rationale: The immediate Hebrew syntax uses עלה with the preposition על plus pronominal
    suffix, which most naturally denotes going up onto/upon the altar. Rendering it
    as 'offered on it' imports sacrificial content not explicit in this clause and
    better stated in the following verse. The translation preserves the narrative
    action without over-interpreting it.
  doctrine_reference: Translation philosophy §1, §3
