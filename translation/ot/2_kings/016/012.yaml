id: 2KI.16.12
reference: 2 Kings 16:12
source:
  edition: WLC
  text: וַ/יָּבֹ֤א הַ/מֶּ֨לֶךְ֙ מִ/דַּמֶּ֔שֶׂק וַ/יַּ֥רְא הַ/מֶּ֖לֶךְ אֶת הַ/מִּזְבֵּ֑חַ
    וַ/יִּקְרַ֥ב הַ/מֶּ֛לֶךְ עַל הַ/מִּזְבֵּ֖חַ וַ/יַּ֥עַל עָלָֽי/ו־־׃
translation:
  text: When the king came from Damascus, the king saw the altar; and the king came
    near to the altar and went up on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached the altar and offered on it.' Some take 'went up on it' as
      shorthand for beginning sacrificial action, though the Hebrew more literally
      describes ascent onto the altar.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Basic narrative wayyiqtol of בוא, indicating the king's arrival. 'Came'
    is the most natural and sufficiently formal rendering in English narrative.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun repeated three times in Hebrew. The repetition is retained
    in English to reflect the source text's style and emphasis on Ahaz's personal
    action.
- source_word: מִדַּמֶּשֶׂק
  chosen: from Damascus
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. 'Damascus' is transliterated
    as a place name per translation philosophy.
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  lexicon: HALOT
  rationale: ראה here denotes straightforward visual perception. 'Saw' is the plain
    sense and keeps the narrative sequence concise.
- source_word: אֶת הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Direct object marker plus definite noun. 'Altar' is the standard and
    precise rendering for מִזְבֵּחַ.
- source_word: וַיִּקְרַב
  chosen: came near
  alternatives:
  - approached
  lexicon: HALOT
  rationale: קרב in the Qal commonly means to come near or approach. 'Came near' preserves
    the verbal imagery and pairs well with the following prepositional phrase.
- source_word: עַל הַמִּזְבֵּחַ
  chosen: to the altar
  alternatives:
  - toward the altar
  - upon the altar
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' after קרב it can function idiomatically
    in the sense of approaching toward an object. Rendering it 'to the altar' avoids
    awkward English while preserving the sense of movement toward it.
- source_word: וַיַּעַל עָלָיו
  chosen: went up on it
  alternatives:
  - offered on it
  - ascended it
  lexicon: HALOT
  rationale: עלה literally means 'went up/ascended.' With עָלָיו ('on it'), the most
    direct sense is physical movement onto or up to the altar structure. Some interpreters
    take the verb elliptically as beginning sacrificial action, but the Hebrew wording
    itself most plainly describes going up on it; sacrificial specifics are supplied
    in the next verse.
