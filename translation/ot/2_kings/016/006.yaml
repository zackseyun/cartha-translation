theological_decisions:
- issue: Ethnonym/text-critical difficulty in the final clause
  chosen_reading: the Arameans came to Elath
  alternative_readings:
  - the Edomites came to Elath
  rationale: The MT reads 'Arameans,' which should normally govern the translation.
    Because this creates historical tension and an alternative reading 'Edomites'
    is widely discussed, the alternative is preserved in a footnote rather than silently
    adopted. This follows the project's commitment to original-language primacy while
    preserving genuine ambiguity or notable alternatives for auditability.
  doctrine_reference: Translation philosophy §§1, 3
