id: 2KI.16.6
reference: 2 Kings 16:6
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗יא הֵ֠שִׁיב רְצִ֨ין מֶֽלֶךְ אֲרָ֤ם אֶת אֵילַת֙ לַֽ/אֲרָ֔ם וַ/יְנַשֵּׁ֥ל
    אֶת הַ/יְהוּדִ֖ים מֵֽ/אֵיל֑וֹת ו/ארמים בָּ֣אוּ אֵילַ֔ת וַ/יֵּ֣שְׁבוּ שָׁ֔ם עַ֖ד
    הַ/יּ֥וֹם הַ/זֶּֽה־־־׃פ
translation:
  text: At that time Rezin king of Aram restored Elath to Aram, and drove the Judeans
    out of Elath; and the Arameans came to Elath and have lived there to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Arameans.'' Some interpreters and ancient witnesses favor ''Edomites,''
      likely because that reading fits the broader context and the parallel account
      in 2 Chronicles 28:17.'
    reason: textual_variant
  - marker: b
    text: Elath is also spelled 'Eloth' in one form of the place name in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵשִׁיב
  chosen: restored
  alternatives:
  - returned
  - brought back
  lexicon: HALOT
  rationale: The Hiphil of שוב here indicates causing Elath to revert to Aramean control.
    'Restored' best fits the political/military context and idiomatic English.
- source_word: אֵילַת / אֵילוֹת
  chosen: Elath
  alternatives:
  - Eloth
  lexicon: HALOT
  rationale: The place name appears with orthographic variation in the verse. 'Elath'
    is a standard English transliteration; the variant 'Eloth' is preserved as an
    alternative because the Hebrew spelling differs in one occurrence.
- source_word: לַאֲרָם
  chosen: to Aram
  alternatives:
  - for Aram
  - to Syria
  lexicon: HALOT
  rationale: The phrase marks transfer of possession/control to Aram. 'Aram' is preferred
    over 'Syria' because the Hebrew proper name should be transliterated rather than
    replaced with the later conventional geopolitical label.
- source_word: וַיְנַשֵּׁל
  chosen: drove ... out
  alternatives:
  - expelled
  - dispossessed
  lexicon: HALOT
  rationale: The verb conveys removing inhabitants from possession of a place. 'Drove
    ... out' is vivid, natural English and preserves the force of expulsion.
- source_word: הַיְהוּדִים
  chosen: the Judeans
  alternatives:
  - the Jews
  - the men of Judah
  lexicon: HALOT
  rationale: In the monarchic setting this term refers to people of Judah rather than
    later ethnoreligious 'Jews' in the narrower postexilic/Second Temple sense. 'Judeans'
    best preserves the historical reference.
- source_word: וַאֲרָמִים
  chosen: the Arameans
  alternatives:
  - the Syrians
  - the Edomites
  lexicon: HALOT
  rationale: The consonantal text reads 'Arameans,' and transliteration of the ethnonym
    is preferred over 'Syrians.' A well-known textual issue exists because the parallel
    in Chronicles and some interpreters favor 'Edomites'; that alternative is preserved
    in a footnote rather than adopted in the main text.
- source_word: וַיֵּשְׁבוּ שָׁם עַד הַיּוֹם הַזֶּה
  chosen: have lived there to this day
  alternatives:
  - dwelt there to this day
  - settled there to this day
  lexicon: HALOT
  rationale: The Hebrew idiom indicates continued residence from the narrated event
    up to the writer's present. Present perfect English ('have lived') communicates
    that ongoing-result sense naturally.
