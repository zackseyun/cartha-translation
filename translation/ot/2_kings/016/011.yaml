id: 2KI.16.11
reference: 2 Kings 16:11
source:
  edition: WLC
  text: וַ/יִּ֛בֶן אוּרִיָּ֥ה הַ/כֹּהֵ֖ן אֶת הַ/מִּזְבֵּ֑חַ כְּ/כֹ֣ל אֲשֶׁר שָׁלַח֩
    הַ/מֶּ֨לֶךְ אָחָ֜ז מִ/דַּמֶּ֗שֶׂק כֵּ֤ן עָשָׂה֙ אוּרִיָּ֣ה הַ/כֹּהֵ֔ן עַד בּ֥וֹא
    הַ/מֶּֽלֶךְ אָחָ֖ז מִ/דַּמָּֽשֶׂק־־־־׃
translation:
  text: So Uriah the priest built the altar, according to all that King Ahaz had sent
    from Damascus; thus Uriah the priest did, until King Ahaz came from Damascus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did accordingly.' The Hebrew expression 'thus did' emphasizes that Uriah
      followed Ahaz's instructions exactly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: built
  alternatives:
  - constructed
  lexicon: HALOT
  rationale: From בנה, the standard verb for building. 'Built' is the most direct
    and natural English equivalent.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: כהן is straightforwardly 'priest.' The repeated apposition with Uriah
    is retained both times for fidelity and emphasis.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: מזבח is the normal term for an altar. The definite article is preserved.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - exactly as
  - in accordance with all that
  lexicon: HALOT
  rationale: This construction expresses conformity to what was sent or specified.
    'According to all that' preserves the formal sense without awkwardness.
- source_word: שָׁלַח
  chosen: had sent
  alternatives:
  - sent
  lexicon: HALOT
  rationale: The qatal after אֲשֶׁר refers to the prior action of Ahaz sending instructions/model
    from Damascus. English past perfect clarifies the sequence relative to Uriah's
    building.
- source_word: מִדַּמֶּשֶׂק
  chosen: from Damascus
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. 'From Damascus' is the plain
    sense in both occurrences.
- source_word: כֵּן עָשָׂה
  chosen: thus ... did
  alternatives:
  - so ... did
  - did accordingly
  lexicon: HALOT
  rationale: This idiom emphasizes correspondence with the king's instructions. 'Thus
    Uriah the priest did' preserves the Hebrew emphasis and cadence.
- source_word: עַד בּוֹא
  chosen: until ... came
  alternatives:
  - before ... came
  - until the coming of
  lexicon: HALOT
  rationale: 'The preposition עַד with infinitive construct בוא marks the endpoint
    of the action: Uriah acted in this way up to the time of the king''s arrival.'
- source_word: הַמֶּלֶךְ אָחָז
  chosen: King Ahaz
  alternatives:
  - the king, Ahaz
  lexicon: HALOT
  rationale: English idiom prefers 'King Ahaz' for מלך + proper name.
