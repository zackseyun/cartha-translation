id: 2KI.16.17
reference: 2 Kings 16:17
source:
  edition: WLC
  text: וַ/יְקַצֵּץ֩ הַ/מֶּ֨לֶךְ אָחָ֜ז אֶת הַ/מִּסְגְּר֣וֹת הַ/מְּכֹנ֗וֹת וַ/יָּ֤סַר
    מֵֽ/עֲלֵי/הֶם֙ ו/את הַ/כִּיֹּ֔ר וְ/אֶת הַ/יָּ֣ם הוֹרִ֔ד מֵ/עַ֛ל הַ/בָּקָ֥ר הַ/נְּחֹ֖שֶׁת
    אֲשֶׁ֣ר תַּחְתֶּ֑י/הָ וַ/יִּתֵּ֣ן אֹת֔/וֹ עַ֖ל מַרְצֶ֥פֶת אֲבָנִֽים־־־׃
translation:
  text: Then King Ahaz cut off the frames of the stands and removed the basin from
    them, and he took down the Sea from upon the bronze oxen that were under it and
    put it on a stone pavement.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'removed the laver from them.' The Hebrew כִּיּוֹר refers to a wash basin
      used in temple service; 'laver' is the traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: '''The Sea'' is the name of the large basin made for Solomon''s temple (see
      1 Kings 7:23–26).'
    reason: cross_reference
  - marker: c
    text: Or 'the bronze bulls.' The Hebrew term can refer broadly to cattle; 'oxen'
      is the conventional rendering in this temple context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַצֵּץ
  chosen: cut off
  alternatives:
  - cut away
  - cut down
  - trimmed
  lexicon: HALOT
  rationale: The verb from קצץ denotes cutting off or cutting away. 'Cut off' is direct
    and fits the likely dismantling of decorative or structural parts.
- source_word: הַמִּסְגְּרוֹת
  chosen: the frames
  alternatives:
  - the panels
  - the borders
  lexicon: HALOT
  rationale: מִסְגְּרוֹת refers to framed sections or border structures. 'Frames'
    is the most neutral rendering and suits the construction details of the stands
    described earlier.
- source_word: הַמְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  - the carts
  lexicon: HALOT
  rationale: מְכֹנוֹת in the temple furnishing context refers to the wheeled stands/bases
    for the lavers in Solomon's temple. 'Stands' is readable and sufficiently concrete;
    'bases' is possible but less natural in English here.
- source_word: וַיָּסַר מֵעֲלֵיהֶם וְאֶת הַכִּיּוֹר
  chosen: removed the basin from them
  alternatives:
  - removed the laver from them
  - took the basin off them
  lexicon: HALOT
  rationale: כִּיּוֹר is the wash basin/laver. 'Basin' is clearer for modern readers,
    while preserving the cultic object. The preposition phrase indicates removal from
    atop the stands.
- source_word: הַכִּיּוֹר
  chosen: the basin
  alternatives:
  - the laver
  lexicon: HALOT
  rationale: Although 'laver' is traditional, 'basin' is more accessible modern English
    and still accurate for the vessel.
- source_word: הַיָּם
  chosen: the Sea
  alternatives:
  - the large basin
  - the bronze sea
  lexicon: HALOT
  rationale: This is the established name of the large temple basin, so the capitalized
    'Sea' preserves its status as a named object rather than a generic sea.
- source_word: הוֹרִד
  chosen: took down
  alternatives:
  - brought down
  - lowered
  lexicon: HALOT
  rationale: The hiphil of ירד here means causing to go down from its support. 'Took
    down' is idiomatic and fits dismantling.
- source_word: הַבָּקָר הַנְּחֹשֶׁת
  chosen: the bronze oxen
  alternatives:
  - the bronze bulls
  - the oxen of bronze
  lexicon: HALOT
  rationale: בָּקָר can denote cattle broadly, but in this architectural setting 'oxen'
    is the conventional and likely sense for the supporting figures. 'Bronze' is standard
    for נְחֹשֶׁת in temple-furnishing contexts.
- source_word: אֲשֶׁר תַּחְתֶּיהָ
  chosen: that were under it
  alternatives:
  - which were beneath it
  lexicon: HALOT
  rationale: The feminine singular suffix refers back to the Sea, a grammatically
    feminine noun. English naturally uses 'it' for the object.
- source_word: וַיִּתֵּן אֹתוֹ
  chosen: put it
  alternatives:
  - set it
  - placed it
  lexicon: HALOT
  rationale: Simple placement is in view. 'Put it' is natural modern English.
- source_word: עַל מַרְצֶפֶת אֲבָנִים
  chosen: on a stone pavement
  alternatives:
  - on a pavement of stones
  - on a stone platform
  lexicon: HALOT
  rationale: מַרְצֶפֶת denotes a paved surface. 'Stone pavement' is idiomatic and
    likely more precise than 'platform,' which could imply elevation not stated in
    the text.
