id: 2KI.16.14
reference: 2 Kings 16:14
source:
  edition: WLC
  text: וְ/אֵ֨ת הַ/מִּזְבַּ֣ח הַ/נְּחֹשֶׁת֮ אֲשֶׁ֣ר לִ/פְנֵ֣י יְהוָה֒ וַ/יַּקְרֵ֗ב
    מֵ/אֵת֙ פְּנֵ֣י הַ/בַּ֔יִת מִ/בֵּין֙ הַ/מִּזְבֵּ֔חַ וּ/מִ/בֵּ֖ין בֵּ֣ית יְהוָ֑ה
    וַ/יִּתֵּ֥ן אֹת֛/וֹ עַל יֶ֥רֶךְ הַ/מִּזְבֵּ֖חַ צָפֽוֹנָ/ה־׃
translation:
  text: As for the bronze altar that was before the LORD, he brought it from the front
    of the house, from between the altar and the house of the LORD, and put it on
    the north side of the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the copper altar.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבַּח הַנְּחֹשֶׁת
  chosen: the bronze altar
  alternatives:
  - the copper altar
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote bronze or copper; 'bronze' is the conventional and
    likely material sense in temple-furnishing contexts, while remaining natural English.
- source_word: אֲשֶׁר לִפְנֵי יְהוָה
  chosen: that was before the LORD
  alternatives:
  - that was before Yahweh
  - that was in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatially 'before/in front of.' 'Before the LORD' preserves
    both the cultic location and the covenantal sense. Per doctrine, יְהוָה is rendered
    'the LORD,' not transliterated.
- source_word: וַיַּקְרֵב
  chosen: he brought it
  alternatives:
  - he moved it closer
  - he brought near
  lexicon: HALOT
  rationale: The verb קרב literally means 'bring near,' but in this relocation context
    idiomatic English 'brought it' communicates the action clearly without over-literal
    awkwardness.
- source_word: מֵאֵת פְּנֵי הַבַּיִת
  chosen: from the front of the house
  alternatives:
  - from before the house
  - away from the face of the house
  lexicon: HALOT
  rationale: פְּנֵי in this construction is a spatial idiom meaning the front/presence
    of the building. 'Front of the house' is clear modern English and fits the temple
    setting.
- source_word: מִבֵּין הַמִּזְבֵּחַ וּמִבֵּין בֵּית יְהוָה
  chosen: from between the altar and the house of the LORD
  alternatives:
  - from between the altar and the temple of the LORD
  lexicon: HALOT
  rationale: The repeated מִבֵּין marks the location from which the bronze altar was
    removed. 'House of the LORD' preserves the Hebrew wording and temple terminology
    better than the more interpretive 'temple.'
- source_word: וַיִּתֵּן אֹתוֹ
  chosen: and put it
  alternatives:
  - and set it
  - and placed it
  lexicon: HALOT
  rationale: נתן is broadly 'give/put/set.' In this physical-placement context, 'put
    it' is straightforward and natural.
- source_word: עַל יֶרֶךְ הַמִּזְבֵּחַ צָפוֹנָה
  chosen: on the north side of the altar
  alternatives:
  - at the flank of the altar, northward
  - on the northern side of the altar
  lexicon: HALOT
  rationale: יֶרֶךְ is literally 'side/flank,' and צָפוֹנָה gives directional force
    'northward/to the north.' 'On the north side of the altar' captures the spatial
    sense in idiomatic English.
- source_word: הַבַּיִת / בֵּית יְהוָה
  chosen: the house / the house of the LORD
  alternatives:
  - the temple / the temple of the LORD
  lexicon: HALOT
  rationale: Retaining 'house' reflects the Hebrew terminology and avoids unnecessary
    interpretive smoothing, while still being understandable in context.
