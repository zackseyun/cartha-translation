id: 2KI.7.8
reference: 2 Kings 7:8
source:
  edition: WLC
  text: וַ/יָּבֹאוּ֩ הַֽ/מְצֹרָעִ֨ים הָ/אֵ֜לֶּה עַד קְצֵ֣ה הַֽ/מַּחֲנֶ֗ה וַ/יָּבֹ֜אוּ
    אֶל אֹ֤הֶל אֶחָד֙ וַ/יֹּאכְל֣וּ וַ/יִּשְׁתּ֔וּ וַ/יִּשְׂא֣וּ מִ/שָּׁ֗ם כֶּ֤סֶף
    וְ/זָהָב֙ וּ/בְגָדִ֔ים וַ/יֵּלְכ֖וּ וַ/יַּטְמִ֑נוּ וַ/יָּשֻׁ֗בוּ וַ/יָּבֹ֨אוּ֙
    אֶל אֹ֣הֶל אַחֵ֔ר וַ/יִּשְׂא֣וּ מִ/שָּׁ֔ם וַ/יֵּלְכ֖וּ וַ/יַּטְמִֽנוּ־־־׃
translation:
  text: When these lepers came to the edge of the camp, they entered one tent and
    ate and drank, and they carried off silver and gold and clothing from there, and
    went and hid them. Then they returned and entered another tent, and carried things
    off from there, and went and hid them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'lepers' refers to persons afflicted with a skin disease traditionally
      rendered 'leprosy'; the ancient term may cover a broader range of conditions
      than the modern medical term.
    reason: cultural_note
lexical_decisions:
- source_word: הַמְצֹרָעִים
  chosen: lepers
  alternatives:
  - men with a skin disease
  - those with leprosy
  lexicon: HALOT
  rationale: The term denotes persons afflicted with צָרַעַת. 'Lepers' is the conventional
    concise rendering in narrative context, though the underlying condition is broader
    than modern Hansen's disease. A cultural note preserves that nuance.
- source_word: קְצֵה הַמַּחֲנֶה
  chosen: the edge of the camp
  alternatives:
  - the outskirts of the camp
  - the end of the camp
  lexicon: HALOT
  rationale: קָצֶה refers to an extremity or edge. 'Edge of the camp' is natural English
    and fits the spatial sense.
- source_word: אֹהֶל אֶחָד
  chosen: one tent
  alternatives:
  - a tent
  - one of the tents
  lexicon: HALOT
  rationale: The Hebrew is indefinite but numerically marked. 'One tent' preserves
    the sequential, concrete narrative force better than the more generic 'a tent.'
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  chosen: ate and drank
  alternatives:
  - began to eat and drink
  lexicon: HALOT
  rationale: Simple wayyiqtol sequence in narrative; straightforward past tense is
    sufficient without adding aspectual nuance not explicit in the Hebrew.
- source_word: וַיִּשְׂאוּ מִשָּׁם
  chosen: carried off from there
  alternatives:
  - took from there
  - carried away from there
  lexicon: HALOT
  rationale: נשא here means to lift/carry away goods. 'Carried off' conveys removal
    of plunder more vividly than the flatter 'took' while remaining faithful to the
    context.
- source_word: כֶּסֶף וְזָהָב וּבְגָדִים
  chosen: silver and gold and clothing
  alternatives:
  - silver, gold, and garments
  lexicon: HALOT
  rationale: '''Clothing'' is more readable modern English than ''garments,'' while
    still accurately representing בְּגָדִים. The repeated ''and'' reflects the Hebrew
    list structure.'
- source_word: וַיַּטְמִנוּ
  chosen: hid them
  alternatives:
  - concealed them
  - buried them
  lexicon: HALOT
  rationale: The verb means to hide or conceal. Because the direct object is implied
    by context, English naturally supplies 'them.' 'Buried' is possible in context
    but too specific for the Hebrew.
- source_word: וַיָּשֻׁבוּ
  chosen: Then they returned
  alternatives:
  - and they returned
  lexicon: HALOT
  rationale: The conjunction plus wayyiqtol continues the sequence; 'Then' gives smooth
    English narrative flow while preserving progression.
- source_word: אֹהֶל אַחֵר
  chosen: another tent
  alternatives:
  - a different tent
  lexicon: HALOT
  rationale: אַחֵר means 'other/another.' 'Another tent' is the most natural idiomatic
    rendering in this sequence.
- source_word: וַיִּשְׂאוּ מִשָּׁם
  chosen: carried things off from there
  alternatives:
  - carried off from there
  - took from there
  lexicon: HALOT
  rationale: In the second occurrence, the Hebrew leaves the object unstated. 'Carried
    things off' makes the ellipsis intelligible in English without over-specifying
    the items.
