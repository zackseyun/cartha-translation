id: 2KI.7.17
reference: 2 Kings 7:17
source:
  edition: WLC
  text: וְ/הַ/מֶּלֶךְ֩ הִפְקִ֨יד אֶת הַ/שָּׁלִ֜ישׁ אֲשֶׁר נִשְׁעָ֤ן עַל יָד/וֹ֙ עַל
    הַ/שַּׁ֔עַר וַ/יִּרְמְסֻ֧/הוּ הָ/עָ֛ם בַּ/שַּׁ֖עַר וַ/יָּמֹ֑ת כַּ/אֲשֶׁ֤ר דִּבֶּר֙
    אִ֣ישׁ הָ/אֱלֹהִ֔ים אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/רֶ֥דֶת הַ/מֶּ֖לֶךְ אֵלָֽי/ו־־־־׃
translation:
  text: Now the king had appointed the officer on whose hand he leaned to be in charge
    of the gate, but the people trampled him in the gate, and he died, just as the
    man of God had spoken when the king came down to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the captain' or 'the royal adjutant'; the Hebrew שָׁלִישׁ refers to
      a high-ranking officer close to the king.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on whose hand he leaned,' a Hebrew expression for a close royal
      attendant.
    reason: cultural_note
lexical_decisions:
- source_word: הִפְקִיד
  chosen: had appointed
  alternatives:
  - appointed
  - put in charge
  lexicon: HALOT
  rationale: Hiphil of פקד here denotes assigning responsibility or oversight. 'Had
    appointed' fits the narrative back-reference and reads naturally in English.
- source_word: הַשָּׁלִישׁ
  chosen: the officer
  alternatives:
  - the captain
  - the adjutant
  - the royal officer
  lexicon: HALOT
  rationale: שָׁלִישׁ can denote a high-ranking military aide or officer. 'Officer'
    is broad enough to avoid overprecision while matching the court context. 'Captain'
    may imply a specific rank not certain here.
- source_word: אֲשֶׁר נִשְׁעָן עַל יָדוֹ
  chosen: on whose hand he leaned
  alternatives:
  - on whose arm he leaned
  - his attendant on whose arm he relied
  lexicon: HALOT
  rationale: The idiom is retained fairly literally. 'Hand' reflects יָד, and the
    phrase identifies the close attendant previously mentioned. A more idiomatic 'arm'
    is possible, but 'hand' preserves the Hebrew image.
- source_word: עַל הַשַּׁעַר
  chosen: to be in charge of the gate
  alternatives:
  - over the gate
  - at the gate
  lexicon: HALOT
  rationale: With הִפְקִיד, עַל marks assigned oversight. Rendering the phrase together
    as 'to be in charge of the gate' communicates function rather than mere location.
- source_word: וַיִּרְמְסֻהוּ
  chosen: trampled him
  alternatives:
  - trampled over him
  - crushed him underfoot
  lexicon: HALOT
  rationale: The verb רמס denotes trampling. 'Trampled him' is direct and sufficient;
    'crushed underfoot' is interpretive expansion.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the crowd
  lexicon: HALOT
  rationale: The noun normally means 'the people.' In context it is the populace rushing
    through the gate. 'Crowd' is possible but less formally tied to the Hebrew term.
- source_word: בַּשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - in the gateway
  lexicon: HALOT
  rationale: The location is the gate area itself. 'In the gate' is a natural literal
    rendering and matches the repeated Hebrew phrase.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... had spoken
  alternatives:
  - as ... said
  - according to what ... had spoken
  lexicon: HALOT
  rationale: This formula marks fulfillment of prior prophetic speech. 'Just as ...
    had spoken' preserves the solemn fulfillment sense.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard title and should be preserved rather than flattened
    to 'prophet,' since the Hebrew expression is specific and recognizable.
- source_word: בְּרֶדֶת הַמֶּלֶךְ אֵלָיו
  chosen: when the king came down to him
  alternatives:
  - at the king's coming down to him
  - when the king went down to him
  lexicon: HALOT
  rationale: The infinitive construct with ב marks time. 'Came down' is idiomatic
    from the narrator's perspective and fits the earlier scene; 'went down' is also
    possible but less natural in English narrative here.
