id: 2KI.7.16
reference: 2 Kings 7:16
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א הָ/עָ֔ם וַ/יָּבֹ֕זּוּ אֵ֖ת מַחֲנֵ֣ה אֲרָ֑ם וַ/יְהִ֨י סְאָה סֹ֜לֶת בְּ/שֶׁ֗קֶל וְ/סָאתַ֧יִם שְׂעֹרִ֛ים בְּ/שֶׁ֖קֶל כִּ/דְבַ֥ר יְהוָֽה־׃
translation:
  text: Then the people went out and plundered the camp of Aram, and a seah of fine flour was sold for a shekel, and two seahs of barley for a shekel, according to the word of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew seah, a dry measure.
    reason: cultural_note
  - marker: b
    text: Or, 'the Aramean camp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא הָעָם
  chosen: Then the people went out
  alternatives:
  - And the people went out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence; 'the people' renders הָעָם straightforwardly.
- source_word: וַיָּבֹזּוּ
  chosen: plundered
  alternatives:
  - spoiled
  - looted
  lexicon: HALOT
  rationale: The verb בזז denotes taking spoil from an enemy. 'Plundered' is clear modern English and preserves the military sense better than the archaic 'spoiled.'
- source_word: מַחֲנֵה אֲרָם
  chosen: the camp of Aram
  alternatives:
  - the Aramean camp
  - the camp of Syria
  lexicon: HALOT
  rationale: The construct phrase is literally 'camp of Aram.' Per project philosophy, personal/place names are transliterated rather than replaced by traditional geopolitical equivalents, so 'Aram' is preferred over 'Syria.' 'Camp of Aram' is slightly more formal than 'Aramean camp' and stays close to the Hebrew.
- source_word: וַיְהִי
  chosen: was sold
  alternatives:
  - came to be
  - was
  lexicon: HALOT
  rationale: In this pricing formula, the idiomatic sense is that the commodity came to that market price. Supplying 'was sold' makes the English intelligible without over-paraphrasing and reflects the result described in context.
- source_word: סְאָה
  chosen: a seah
  alternatives:
  - one seah
  - a measure
  lexicon: HALOT
  rationale: The Hebrew names a specific dry measure. Retaining 'seah' preserves the source term more accurately than flattening it to 'measure.' The indefinite article gives natural English.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - flour
  lexicon: HALOT
  rationale: סֹלֶת refers to fine flour, not merely flour in general. 'Fine flour' is the standard precise rendering.
- source_word: בְּשֶׁקֶל
  chosen: for a shekel
  alternatives:
  - at a shekel
  - for one shekel
  lexicon: HALOT
  rationale: In a price statement, English idiom prefers 'for a shekel.' Retaining 'shekel' preserves the ancient weight/currency term.
- source_word: וְסָאתַיִם
  chosen: and two seahs
  alternatives:
  - and two measures
  lexicon: HALOT
  rationale: The dual form explicitly means 'two seahs.' Preserving the same unit as earlier maintains consistency.
- source_word: שְׂעֹרִים
  chosen: of barley
  alternatives:
  - barley grain
  lexicon: HALOT
  rationale: The plural noun in this pricing context is naturally rendered as the commodity 'barley' in English.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the LORD's word
  - as the LORD had said
  lexicon: HALOT
  rationale: This phrase signals fulfillment of the prior prophetic word. 'According to the word of the LORD' is both natural and close to the Hebrew. Per doctrine guidelines, יְהוָה is rendered 'the LORD'.
