id: 2KI.7.9
reference: 2 Kings 7:9
source:
  edition: WLC
  text: וַ/יֹּאמְרוּ֩ אִ֨ישׁ אֶל רֵעֵ֜/הוּ לֹֽא כֵ֣ן אֲנַ֣חְנוּ עֹשִׂ֗ים הַ/יּ֤וֹם
    הַ/זֶּה֙ יוֹם בְּשֹׂרָ֣ה ה֔וּא וַ/אֲנַ֣חְנוּ מַחְשִׁ֗ים וְ/חִכִּ֛ינוּ עַד א֥וֹר
    הַ/בֹּ֖קֶר וּ/מְצָאָ֣/נוּ עָו֑וֹן וְ/עַתָּה֙ לְכ֣וּ וְ/נָבֹ֔אָה וְ/נַגִּ֖ידָה
    בֵּ֥ית הַ/מֶּֽלֶךְ־־׀־־׃
translation:
  text: Then they said to one another, “What we are doing is not right. This day is
    a day of good news, and we are keeping silent. If we wait until the light of morning,
    guilt will overtake us. So now, come, let us go and report it to the king’s household.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “punishment will find us” or “we will incur guilt.” The Hebrew says
      literally, “guilt/iniquity will find us.”
    reason: lexical_alternative
  - marker: b
    text: “The king’s household” may also be rendered “the king’s house” or “the royal
      palace.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן אֲנַחְנוּ עֹשִׂים
  chosen: What we are doing is not right
  alternatives:
  - We are not doing right
  - This is not what we should be doing
  lexicon: HALOT
  rationale: The idiom literally reads 'not thus are we doing.' In natural English,
    'What we are doing is not right' preserves the moral evaluation without wooden
    phrasing.
- source_word: יוֹם בְּשֹׂרָה
  chosen: a day of good news
  alternatives:
  - a day of news
  - a day of glad tidings
  lexicon: HALOT
  rationale: בְּשֹׂרָה denotes news, especially good news or tidings of victory/deliverance.
    'Good news' is the clearest modern rendering and fits the context of the siege
    being relieved.
- source_word: מַחְשִׁים
  chosen: we are keeping silent
  alternatives:
  - we are silent
  - we are saying nothing
  lexicon: HALOT
  rationale: The Hifil participle of חרשׁ here conveys deliberate silence. 'Keeping
    silent' captures the ongoing, intentional withholding of information.
- source_word: וְחִכִּינוּ עַד אוֹר הַבֹּקֶר
  chosen: If we wait until the light of morning
  alternatives:
  - If we delay until morning light
  - Should we wait until daybreak
  lexicon: HALOT
  rationale: The conjunction plus perfect functions conditionally in context. 'The
    light of morning' reflects אוֹר הַבֹּקֶר more fully than simply 'morning' and
    preserves the vividness of daybreak.
- source_word: וּמְצָאנוּ עָוֹן
  chosen: guilt will overtake us
  alternatives:
  - punishment will find us
  - we will incur guilt
  - iniquity will find us
  lexicon: HALOT
  rationale: Literally, 'iniquity/guilt will find us.' In context this means they
    will become liable for wrongdoing if they conceal the news. 'Guilt will overtake
    us' communicates both the figurative verb and the moral consequence in idiomatic
    English.
- source_word: לְכוּ וְנָבֹאָה
  chosen: come, let us go
  alternatives:
  - come, let us enter
  - come, let us go in
  lexicon: HALOT
  rationale: הלך + cohortative בוא together urge immediate action. Since the destination
    is specified afterward, 'come, let us go' is natural English; 'enter' would be
    too spatially specific here.
- source_word: וְנַגִּידָה
  chosen: and report it
  alternatives:
  - and tell
  - and announce
  lexicon: HALOT
  rationale: נגד in the Hifil commonly means to tell or declare. 'Report it' fits
    the context of bringing urgent official news.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s household
  alternatives:
  - the king’s house
  - the royal palace
  lexicon: HALOT
  rationale: Literally 'the house of the king.' This can denote the royal household
    or palace establishment. 'The king’s household' preserves the broader institutional
    sense without overcommitting to the building alone.
