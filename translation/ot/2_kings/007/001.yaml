id: 2KI.7.1
reference: 2 Kings 7:1
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלִישָׁ֔ע שִׁמְע֖וּ דְּבַר יְהוָ֑ה כֹּ֣ה אָמַ֣ר יְהוָ֗ה כָּ/עֵ֤ת מָחָר֙ סְאָֽה סֹ֣לֶת בְּ/שֶׁ֗קֶל וְ/סָאתַ֧יִם שְׂעֹרִ֛ים בְּ/שֶׁ֖קֶל בְּ/שַׁ֥עַר שֹׁמְרֽוֹן־׀׀־׃
translation:
  text: 'Then Elisha said, “Hear the word of Yahweh. Thus says Yahweh: About this time tomorrow, a seah of fine flour will be for a shekel, and two seahs of barley for a shekel, at the gate of Samaria.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A seah was a dry measure; the Hebrew keeps the specific unit rather than a generic 'measure.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural modern English while preserving sequential force.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is concise and idiomatic in prophetic proclamation contexts, preserving the formal summons.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the covenantal-prophetic register better than the more interpretive 'message.' 'the LORD' follows the doctrine default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is a conventional prophetic messenger formula. 'Thus says the LORD' preserves its formal force and recognizable cadence.
- source_word: כָּעֵת מָחָר
  chosen: About this time tomorrow
  alternatives:
  - At this time tomorrow
  - Tomorrow about this time
  lexicon: HALOT
  rationale: Idiomatic temporal expression meaning roughly the same time on the next day. 'About this time tomorrow' is natural English and reflects the prefixed כ nuance.
- source_word: סְאָה
  chosen: seah
  alternatives:
  - measure
  lexicon: HALOT
  rationale: A specific dry measure is intended. Transliteration preserves the concrete economic detail better than the generic 'measure.'
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - flour
  lexicon: HALOT
  rationale: סֹלֶת refers to fine flour, not merely flour in general. 'Fine flour' is the clearest standard rendering.
- source_word: בְּשֶׁקֶל
  chosen: for a shekel
  alternatives:
  - at a shekel
  - for one shekel
  lexicon: HALOT
  rationale: In this market-pricing context, the preposition indicates price. 'For a shekel' is idiomatic English for cost.
- source_word: וְסָאתַיִם
  chosen: and two seahs
  alternatives:
  - and two measures
  lexicon: HALOT
  rationale: Dual form of סאה. Rendering with the same transliterated unit maintains consistency and preserves the contrast in quantities.
- source_word: שְׂעֹרִים
  chosen: barley
  lexicon: HALOT
  rationale: Standard rendering of the grain term in an economic context.
- source_word: בְּשַׁעַר שֹׁמְרוֹן
  chosen: at the gate of Samaria
  alternatives:
  - in the gate of Samaria
  lexicon: HALOT
  rationale: The city gate was the public place of commerce and civic activity. 'At the gate' is the most natural English rendering in this context.
