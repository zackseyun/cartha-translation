id: 2KI.7.3
reference: 2 Kings 7:3
source:
  edition: WLC
  text: וְ/אַרְבָּעָ֧ה אֲנָשִׁ֛ים הָי֥וּ מְצֹרָעִ֖ים פֶּ֣תַח הַ/שָּׁ֑עַר וַ/יֹּֽאמְרוּ֙
    אִ֣ישׁ אֶל רֵעֵ֔/הוּ מָ֗ה אֲנַ֛חְנוּ יֹשְׁבִ֥ים פֹּ֖ה עַד מָֽתְנוּ־־׃
translation:
  text: Now there were four men with a skin disease at the entrance of the gate, and
    they said to one another, “Why are we sitting here until we die?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “leprous.” The Hebrew refers to a skin condition associated
      with צָרַעַת and is not necessarily identical to modern leprosy (Hansen’s disease).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַרְבָּעָה
  chosen: Now there were four
  alternatives:
  - And four
  lexicon: HALOT
  rationale: The conjunction plus numeral introduces a new scene. 'Now there were
    four' is natural English narrative style while preserving the discourse shift
    signaled by waw.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The noun is masculine plural and refers to specific adult males in the
    narrative. 'Men' is gender-accurate per translation philosophy.
- source_word: הָיוּ
  chosen: there were
  alternatives:
  - were
  lexicon: HALOT
  rationale: Existential היה is best rendered 'there were' in English to express introduction
    of participants.
- source_word: מְצֹרָעִים
  chosen: with a skin disease
  alternatives:
  - leprous
  - having leprosy
  lexicon: HALOT
  rationale: The Hebrew term denotes a person afflicted with the condition associated
    with צָרַעַת, which does not map neatly onto modern Hansen's disease. 'With a
    skin disease' avoids misleading medical specificity while remaining readable.
    The traditional alternative 'leprous' is preserved in a footnote.
- source_word: פֶּתַח הַשָּׁעַר
  chosen: at the entrance of the gate
  alternatives:
  - at the gate entrance
  - at the opening of the gate
  lexicon: HALOT
  rationale: Construct phrase literally means 'opening/entrance of the gate.' 'At
    the entrance of the gate' is clear and sufficiently formal.
- source_word: וַיֹּאמְרוּ אִישׁ אֶל רֵעֵהוּ
  chosen: and they said to one another
  alternatives:
  - and each said to his companion
  lexicon: HALOT
  rationale: The distributive singular idiom means reciprocal speech among the group.
    'To one another' is idiomatic English that preserves the sense.
- source_word: מָה
  chosen: Why
  alternatives:
  - What is it that
  lexicon: HALOT
  rationale: In this rhetorical question, מָה functions idiomatically as 'why' rather
    than a wooden 'what.'
- source_word: יֹשְׁבִים
  chosen: are we sitting
  alternatives:
  - do we sit
  - are we staying
  lexicon: HALOT
  rationale: The participle expresses ongoing action. 'Are we sitting' preserves the
    vividness and literal posture, which also conveys inactivity.
- source_word: פֹּה
  chosen: here
  alternatives:
  - in this place
  lexicon: HALOT
  rationale: Simple locative adverb; 'here' is the natural equivalent.
- source_word: עַד מָתְנוּ
  chosen: until we die
  alternatives:
  - until we have died
  - while we die
  lexicon: HALOT
  rationale: The phrase expresses the endpoint of remaining there. 'Until we die'
    is the straightforward idiomatic rendering.
