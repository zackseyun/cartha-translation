id: 2KI.7.19
reference: 2 Kings 7:19
source:
  edition: WLC
  text: וַ/יַּ֨עַן הַ/שָּׁלִ֜ישׁ אֶת אִ֣ישׁ הָ/אֱלֹהִים֮ וַ/יֹּאמַר֒ וְ/הִנֵּ֣ה יְהוָ֗ה
    עֹשֶׂ֤ה אֲרֻבּוֹת֙ בַּ/שָּׁמַ֔יִם הֲ/יִהְיֶ֖ה כַּ/דָּבָ֣ר הַ/זֶּ֑ה וַ/יֹּ֗אמֶר
    הִנְּ/ךָ֤ רֹאֶה֙ בְּ/עֵינֶ֔י/ךָ וּ/מִ/שָּׁ֖ם לֹ֥א תֹאכֵֽל־׃
translation:
  text: Then the officer answered the man of God and said, “Even if the LORD were
    making windows in the heavens, could this thing happen?” And he said, “Look, you
    will see it with your own eyes, but you will not eat from it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “floodgates in the sky.” The Hebrew literally says “windows in the heavens,”
      an image for openings in heaven through which provision or judgment might come.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׁלִישׁ
  chosen: the officer
  alternatives:
  - the captain
  - the adjutant
  - the royal officer
  lexicon: HALOT
  rationale: שָׁלִישׁ denotes a high-ranking military or royal officer, traditionally
    'captain.' 'Officer' is clear modern English and fits the court context without
    over-specifying rank beyond the Hebrew.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is the standard prophetic title and should be preserved formally
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md
    contested terms table.
- source_word: עֹשֶׂה אֲרֻבּוֹת בַּשָּׁמַיִם
  chosen: were making windows in the heavens
  alternatives:
  - were opening floodgates in the sky
  - made windows in heaven
  lexicon: HALOT
  rationale: אֲרֻבּוֹת literally means 'windows' or 'sluices.' The phrase is idiomatic
    for heavenly openings through which provision or judgment might come. 'Windows
    in the heavens' keeps the imagery close to the Hebrew while remaining intelligible;
    the more interpretive 'floodgates' is preserved as an alternative.
- source_word: הֲיִהְיֶה כַּדָּבָר הַזֶּה
  chosen: could this thing happen?
  alternatives:
  - would this thing be?
  - could such a thing be?
  lexicon: HALOT
  rationale: The rhetorical question expresses skepticism about the prophecy's fulfillment.
    'Could this thing happen?' conveys the modal force naturally in English while
    staying close to the Hebrew sense.
- source_word: הִנְּךָ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: A deictic particle drawing attention to the pronouncement. 'Look' is
    readable modern English; 'Behold' is more traditional but archaic for the project's
    style.
- source_word: רֹאֶה בְּעֵינֶיךָ
  chosen: you will see it with your own eyes
  alternatives:
  - you are about to see with your eyes
  - you will see with your eyes
  lexicon: HALOT
  rationale: The participle with the pronoun functions predictively in context. Adding
    'it' makes the English idiomatic, and 'with your own eyes' captures the emphatic
    possessive.
- source_word: וּמִשָּׁם לֹא תֹאכֵל
  chosen: but you will not eat from it
  alternatives:
  - but from there you will not eat
  - but you will not eat any of it
  lexicon: HALOT
  rationale: מִשָּׁם literally 'from there' refers back to the promised provision/event.
    'From it' expresses the referent clearly in English without woodenly preserving
    an adverb that would sound obscure.
