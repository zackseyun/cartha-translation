id: 2KI.7.11
reference: 2 Kings 7:11
source:
  edition: WLC
  text: וַ/יִּקְרָ֖א הַ/שֹּֽׁעֲרִ֑ים וַ/יַּגִּ֕ידוּ בֵּ֥ית הַ/מֶּ֖לֶךְ פְּנִֽימָה׃
translation:
  text: Then the gatekeepers called out and reported it inside the king’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reported it to the king’s household inside'; the Hebrew literally reads
      'the house of the king inward/inside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called out
  alternatives:
  - called
  - proclaimed
  - cried out
  lexicon: HALOT
  rationale: From קרא, here singular with a collective/plural subject following. In
    context of gatekeepers announcing news, 'called out' captures the act of raising
    an alert or announcement better than the flatter 'called.'
- source_word: הַשֹּׁעֲרִים
  chosen: the gatekeepers
  alternatives:
  - the porters
  - the guards at the gate
  lexicon: HALOT
  rationale: שֹׁעֲרִים refers to those stationed at the gate. 'Gatekeepers' is the
    most direct and natural modern equivalent; 'porters' is archaic and potentially
    misleading.
- source_word: וַיַּגִּידוּ
  chosen: reported it
  alternatives:
  - told
  - announced
  - informed
  lexicon: HALOT
  rationale: נגד often means to make known or report. 'Reported it' fits the narrative
    sequence of relaying discovered information up the chain. The object is implicit
    from context, so 'it' is supplied in English for clarity.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal house
  - the king’s palace
  lexicon: HALOT
  rationale: Literally 'house of the king.' While this likely refers functionally
    to the palace or royal household, 'the king’s house' preserves the Hebrew expression
    without over-specifying architecture or institution.
- source_word: פְּנִימָה
  chosen: inside
  alternatives:
  - inward
  - to the inside
  - within
  lexicon: HALOT
  rationale: This adverb indicates movement or communication inward, likely from the
    gate into the interior of the royal residence. 'Inside' is concise, idiomatic,
    and preserves the directional sense.
