id: 2KI.7.14
reference: 2 Kings 7:14
source:
  edition: WLC
  text: וַ/יִּקְח֕וּ שְׁנֵ֖י רֶ֣כֶב סוּסִ֑ים וַ/יִּשְׁלַ֨ח הַ/מֶּ֜לֶךְ אַחֲרֵ֧י מַחֲנֵֽה
    אֲרָ֛ם לֵ/אמֹ֖ר לְכ֥וּ וּ/רְאֽוּ־׃
translation:
  text: So they took two chariots with horses, and the king sent them after the camp
    of Aram, saying, “Go and see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''two chariots of horses,'' a compressed expression likely referring
      to two horse-drawn chariots or two chariot teams.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: So they took
  alternatives:
  - Then they took
  - And they took
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'So' gives natural English narrative
    flow while preserving the consecutive sense.
- source_word: שְׁנֵי רֶכֶב סוּסִים
  chosen: two chariots with horses
  alternatives:
  - two chariot-horses
  - two chariot teams
  - two horse chariots
  lexicon: HALOT
  rationale: The Hebrew phrase is compressed and somewhat elliptical. רֶכֶב commonly
    refers to chariotry/chariots, and סוּסִים specifies horses. In context the king
    is dispatching a reconnaissance party; 'two chariots with horses' is the clearest
    natural rendering without over-paraphrasing. It avoids the less idiomatic literalism
    'two chariots of horses' while preserving the concrete image.
- source_word: וַיִּשְׁלַח הַמֶּלֶךְ
  chosen: and the king sent them
  alternatives:
  - and the king sent
  - then the king dispatched them
  lexicon: HALOT
  rationale: English requires an object for clarity, supplied from the immediately
    preceding selection of the chariots/party. 'Sent them' reflects the action implied
    in context.
- source_word: אַחֲרֵי מַחֲנֵה אֲרָם
  chosen: after the camp of Aram
  alternatives:
  - after the army of Aram
  - after the Aramean camp
  - in pursuit of the camp of Aram
  lexicon: HALOT
  rationale: אַחֲרֵי is spatial/directional, 'after' or 'behind.' מַחֲנֶה is 'camp.'
    'Aram' is retained as the proper name per the translation philosophy to transliterate
    names rather than convert to the adjectival 'Aramean,' though that remains a viable
    alternative.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: Personal/place names are transliterated by standard conventions. 'Syria'
    would be anachronizing and 'the Arameans' shifts from place/kingdom name to people
    group.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the order
  - telling them
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech; preserves
    the Hebrew discourse structure.
- source_word: לְכוּ וּרְאוּ
  chosen: Go and see
  alternatives:
  - Go and look
  - Go and inspect
  lexicon: HALOT
  rationale: Both imperatives are simple and direct. 'See' is the most basic equivalent
    of ראה here and keeps the terse military instruction.
