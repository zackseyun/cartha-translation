theological_decisions:
- issue: Gendered singular אִישׁ in a context meaning absence of any person
  chosen_reading: there was no man there
  alternative_readings:
  - there was no one there
  rationale: The Hebrew uses the masculine singular noun אִישׁ. Per the translation
    philosophy's gender-accurate principle, the main text preserves the gendered form
    where it reflects the source wording, even though the sense is generic. A more
    idiomatic inclusive alternative is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
