id: 2KI.7.5
reference: 2 Kings 7:5
source:
  edition: WLC
  text: וַ/יָּק֣וּמוּ בַ/נֶּ֔שֶׁף לָ/ב֖וֹא אֶל מַחֲנֵ֣ה אֲרָ֑ם וַ/יָּבֹ֗אוּ עַד קְצֵה֙
    מַחֲנֵ֣ה אֲרָ֔ם וְ/הִנֵּ֥ה אֵֽין שָׁ֖ם אִֽישׁ־־־׃
translation:
  text: So they arose at twilight to go to the camp of Aram. When they came to the
    edge of the camp of Aram, behold, there was no man there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'there was no one there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּק֣וּמוּ
  chosen: So they arose
  alternatives:
  - Then they rose
  - And they got up
  lexicon: HALOT
  rationale: Wayyiqtol of קום advances the narrative. 'Arose' preserves the slightly
    elevated narrative tone while remaining natural English; 'So' reflects the sequential
    force of the waw in context.
- source_word: בַנֶּשֶׁף
  chosen: at twilight
  alternatives:
  - at dusk
  - in the twilight
  lexicon: HALOT
  rationale: נֶשֶׁף denotes twilight/dusk in this context. 'At twilight' is natural
    modern English and fits the movement toward the camp in fading light.
- source_word: לָבוֹא
  chosen: to go
  alternatives:
  - to come
  - to enter
  lexicon: HALOT
  rationale: The infinitive of בוא after 'arose' expresses purpose. From the narratorial
    perspective in English, 'to go' is more idiomatic than 'to come' for movement
    toward the Aramean camp.
- source_word: מַחֲנֵה אֲרָם
  chosen: the camp of Aram
  alternatives:
  - the Aramean camp
  - the camp of the Arameans
  lexicon: HALOT
  rationale: The construct phrase is rendered transparently as 'the camp of Aram.'
    This preserves the proper name 'Aram' rather than converting it to the adjectival
    'Aramean,' in keeping with translating names by standard conventions.
- source_word: וַיָּבֹאוּ
  chosen: When they came
  alternatives:
  - and they came
  - they arrived
  lexicon: HALOT
  rationale: A second wayyiqtol continues the sequence. 'When they came' smooths the
    transition into the following clause in idiomatic English while preserving the
    temporal progression.
- source_word: עַד קְצֵה
  chosen: to the edge of
  alternatives:
  - as far as the outskirts of
  - to the extremity of
  lexicon: HALOT
  rationale: The phrase denotes reaching the outer limit or edge. 'To the edge of'
    is clear and natural; 'outskirts' is possible but slightly more interpretive.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: HALOT
  rationale: הִנֵּה marks sudden discovery and draws attention to the surprising scene.
    'Behold' preserves the discourse force better than a flatter omission.
- source_word: אֵין שָׁם אִישׁ
  chosen: there was no man there
  alternatives:
  - there was no one there
  - there was not a person there
  lexicon: HALOT
  rationale: Literally, 'there is no man there.' Because אִישׁ is singular and the
    Hebrew is gendered, 'no man' best preserves the source form under the project's
    gender-accurate principle, though idiomatic English could use 'no one.'
