id: 2KI.7.13
reference: 2 Kings 7:13
source:
  edition: WLC
  text: וַ/יַּעַן֩ אֶחָ֨ד מֵ/עֲבָדָ֜י/ו וַ/יֹּ֗אמֶר וְ/יִקְחוּ נָ֞א חֲמִשָּׁ֣ה מִן
    הַ/סּוּסִים֮ הַֽ/נִּשְׁאָרִים֮ אֲשֶׁ֣ר נִשְׁאֲרוּ בָ/הּ֒ הִנָּ֗/ם כְּ/כָל ה/המון
    יִשְׂרָאֵל֙ אֲשֶׁ֣ר נִשְׁאֲרוּ בָ֔/הּ הִנָּ֕/ם כְּ/כָל הֲמ֥וֹן יִשְׂרָאֵ֖ל אֲשֶׁר
    תָּ֑מּוּ וְ/נִשְׁלְחָ֖ה וְ/נִרְאֶֽה־־־־־־־׃
translation:
  text: Then one of his servants answered and said, “Please let them take five of
    the horses that remain, which are left in it. Look, they are like all the multitude
    of Israel who are left in it; look, they are like all the multitude of Israel
    who have perished. So let us send and see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew likely refers to the city of Samaria by the pronoun 'in it,'
      but the noun itself is not repeated in this verse.
    reason: lexical_alternative
  - marker: b
    text: 'The verse contains a difficult and repetitive Hebrew comparison: ''they
      are like all the multitude of Israel who are left in it ... like all the multitude
      of Israel who have perished.'' The translation preserves the repetition rather
      than smoothing it out.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing speech; 'answered' fits the
    Hebrew idiom and English narrative style.
- source_word: אֶחָד מֵעֲבָדָיו
  chosen: one of his servants
  alternatives:
  - one of his attendants
  - one of his officials
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave'; in a royal court context here,
    'servants' is the most natural and sufficiently broad rendering without overstating
    bonded status.
- source_word: וְיִקְחוּ נָא
  chosen: Please let them take
  alternatives:
  - Please let them get
  - Let them take, please
  lexicon: HALOT
  rationale: Jussive/request form with נָא expresses polite urging. 'Please let them
    take' captures both the volitional force and the politeness.
- source_word: חֲמִשָּׁה מִן הַסּוּסִים
  chosen: five of the horses
  alternatives:
  - five horses from among the horses
  lexicon: HALOT
  rationale: Partitive מן is naturally rendered 'of the horses' in English.
- source_word: הַנִּשְׁאָרִים אֲשֶׁר נִשְׁאֲרוּ בָהּ
  chosen: that remain, which are left in it
  alternatives:
  - that are left in the city
  - that survive there
  lexicon: HALOT
  rationale: The Hebrew repeats the root שׁאר for emphasis. I preserved the repetition
    with 'remain' / 'are left.' The feminine singular suffix likely refers to the
    city (Samaria), but the Hebrew uses only 'in it,' so the main text keeps the pronoun
    rather than supplying 'the city.'
- source_word: הִנָּם
  chosen: Look, they are
  alternatives:
  - Behold, they are
  - See, they are
  lexicon: HALOT
  rationale: Deictic particle drawing attention to the comparison. 'Look' is readable
    modern English and preserves the force.
- source_word: כְּכָל הֲמוֹן יִשְׂרָאֵל
  chosen: like all the multitude of Israel
  alternatives:
  - like all the crowd of Israel
  - like the whole multitude of Israel
  lexicon: HALOT
  rationale: הָמוֹן denotes a mass or multitude. 'Multitude' best preserves the collective
    sense without becoming too colloquial.
- source_word: אֲשֶׁר נִשְׁאֲרוּ בָהּ
  chosen: who are left in it
  alternatives:
  - who remain in it
  - who are left in the city
  lexicon: HALOT
  rationale: Again preserving the repeated שׁאר language and the unsupplied feminine
    pronoun.
- source_word: אֲשֶׁר תָּמּוּ
  chosen: who have perished
  alternatives:
  - who are consumed
  - who have come to an end
  lexicon: HALOT
  rationale: תם in this context refers to being finished or perishing, likely from
    famine or destruction. 'Have perished' is idiomatic and contextually clear.
- source_word: וְנִשְׁלְחָה וְנִרְאֶה
  chosen: So let us send and see
  alternatives:
  - and let us send and see
  - that we may send and see
  lexicon: HALOT
  rationale: First person cohortatives express proposal. 'So let us send and see'
    captures the deliberative force and the narrative progression.
