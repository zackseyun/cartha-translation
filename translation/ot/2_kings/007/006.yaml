id: 2KI.7.6
reference: 2 Kings 7:6
source:
  edition: WLC
  text: וַ/אדֹנָ֞/י הִשְׁמִ֣יעַ אֶת מַחֲנֵ֣ה אֲרָ֗ם ק֥וֹל רֶ֨כֶב֙ ק֣וֹל ס֔וּס ק֖וֹל
    חַ֣יִל גָּד֑וֹל וַ/יֹּאמְר֞וּ אִ֣ישׁ אֶל אָחִ֗י/ו הִנֵּ֣ה שָֽׂכַר עָלֵי/נוּ֩ מֶ֨לֶךְ
    יִשְׂרָאֵ֜ל אֶת מַלְכֵ֧י הַ/חִתִּ֛ים וְ/אֶת מַלְכֵ֥י מִצְרַ֖יִם לָ/ב֥וֹא עָלֵֽי/נוּ׀־־־־־׃
translation:
  text: For the Lord had caused the camp of Aram to hear the sound of chariots, the
    sound of horses, the sound of a great army, and they said to one another, “Look,
    the king of Israel has hired against us the kings of the Hittites and the kings
    of Egypt to come against us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Aramean camp."
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew repeats "the sound of": "the sound of chariots, the sound of horses,
      the sound of a great army."'
    reason: lexical_alternative
  - marker: c
    text: Literally, "each man said to his brother."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאדֹנָי
  chosen: the Lord
  alternatives:
  - the lord
  - the master
  lexicon: HALOT
  rationale: Rendered as the divine title "the Lord." Although this is אֲדֹנָי rather
    than the Tetragrammaton, in this narrative context it refers to Israel's God,
    and "the Lord" is the natural English equivalent for the title.
- source_word: הִשְׁמִיעַ
  chosen: had caused ... to hear
  alternatives:
  - made ... hear
  - caused ... to hear
  - let ... hear
  lexicon: HALOT
  rationale: 'Hiphil of שׁמע is causative: not merely that Aram heard, but that the
    Lord caused them to hear. The pluperfect-like English "had caused" fits the narrative
    explanation of why the Arameans fled in the surrounding context.'
- source_word: מַחֲנֵה אֲרָם
  chosen: the camp of Aram
  alternatives:
  - the Aramean camp
  - the camp of Syria
  lexicon: HALOT
  rationale: '"Aram" is preferred over "Syria" to reflect the Hebrew proper name directly
    and avoid anachronistic geopolitical associations. Construct relation is preserved
    with "camp of Aram."'
- source_word: קוֹל רֶכֶב
  chosen: the sound of chariots
  alternatives:
  - the noise of chariots
  - the sound of chariotry
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound/noise. "Sound of chariots" is idiomatic and
    preserves the repeated triad in Hebrew.
- source_word: קוֹל סוּס
  chosen: the sound of horses
  alternatives:
  - the noise of horses
  lexicon: HALOT
  rationale: Maintains the Hebrew repetition of קוֹל and the concrete military imagery.
- source_word: קוֹל חַיִל גָּדוֹל
  chosen: the sound of a great army
  alternatives:
  - the noise of a great army
  - the sound of a great force
  lexicon: HALOT
  rationale: חַיִל here refers to military force/army rather than wealth or valor.
    "Great army" is the clearest contextual rendering.
- source_word: וַיֹּאמְרוּ אִישׁ אֶל אָחִיו
  chosen: they said to one another
  alternatives:
  - each man said to his brother
  - they said, each to his brother
  lexicon: HALOT
  rationale: The idiom literally reads "a man to his brother," but in English "to
    one another" best conveys reciprocal speech naturally while preserving the sense.
    The masculine singular idiom is representative, not restricted to literal siblings.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Surely
  - See
  lexicon: HALOT
  rationale: '"Look" gives the deictic force in readable modern English without archaic
    tone.'
- source_word: שָׂכַר עָלֵינוּ
  chosen: has hired against us
  alternatives:
  - has hired for our ruin
  - has hired mercenaries against us
  - has hired over us
  lexicon: HALOT
  rationale: שׂכר means to hire. With עַל in this hostile context, "against us" captures
    the adversative sense. No explicit object such as "mercenaries" should be added
    beyond what the text states.
- source_word: מַלְכֵי הַחִתִּים
  chosen: the kings of the Hittites
  alternatives:
  - the Hittite kings
  lexicon: HALOT
  rationale: A straightforward genitival rendering. The plural "kings" likely reflects
    regional rulers rather than a single empire, so the Hebrew plural is retained.
- source_word: מַלְכֵי מִצְרַיִם
  chosen: the kings of Egypt
  alternatives:
  - the Egyptian kings
  lexicon: HALOT
  rationale: Retains the Hebrew plural as written. Though historically surprising
    to some readers, the translation should not smooth it into the singular "king
    of Egypt" against the source text.
- source_word: לָבוֹא עָלֵינוּ
  chosen: to come against us
  alternatives:
  - to attack us
  - to come upon us
  lexicon: HALOT
  rationale: The infinitive with עַל expresses hostile movement. "To come against
    us" is both literal and clear, avoiding over-interpretive "attack us" while preserving
    military threat.
