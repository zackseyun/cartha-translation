theological_decisions:
- issue: Rendering of the divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - the lord
  - the master
  rationale: The verse attributes the event to Israel's God. "The Lord" is the standard
    English rendering for the divine title here and aligns with the project's treatment
    of κύριος/Lord language without importing the Tetragrammaton where it is not present.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord) and translation
    philosophy on translating titles'
