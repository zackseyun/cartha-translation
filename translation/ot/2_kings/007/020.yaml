id: 2KI.7.20
reference: 2 Kings 7:20
source:
  edition: WLC
  text: וַ/יְהִי ל֖/וֹ כֵּ֑ן וַ/יִּרְמְס֨וּ אֹת֥/וֹ הָ/עָ֛ם בַּ/שַּׁ֖עַר וַ/יָּמֹֽת־׃ס
translation:
  text: 'And so it happened to him: the people trampled him in the gate, and he died.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And it was so for him,' meaning that events happened exactly as previously
      foretold.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the gate' or 'in the gateway.' The Hebrew term can refer to the city
      gate area or gateway complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ כֵן
  chosen: And so it happened to him
  alternatives:
  - And it was so for him
  - And it happened to him accordingly
  lexicon: HALOT
  rationale: The idiom combines היה with ל + pronoun and כֵן to indicate that events
    turned out exactly as previously declared. 'And so it happened to him' is natural
    English and preserves the sense of fulfillment/judgment without over-paraphrasing.
- source_word: וַיִּרְמְסוּ
  chosen: trampled
  alternatives:
  - trampled down
  - crushed underfoot
  lexicon: HALOT
  rationale: The verb רמס denotes trampling underfoot. 'Trampled' is the most direct
    and idiomatic rendering here; 'crushed underfoot' is interpretive, while 'trampled
    down' is slightly more expansive than needed.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the crowd
  lexicon: HALOT
  rationale: עם normally means 'people.' In context it refers to the populace rushing
    through the gate. 'The crowd' captures the scene but is less formally tied to
    the Hebrew noun, so 'the people' is preferred.
- source_word: בַּשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - in the gateway
  lexicon: HALOT
  rationale: שַׁעַר can denote the city gate area or gateway complex. 'In the gate'
    follows the Hebrew closely and fits the narrative setting where he had charge
    at the gate. 'At the gate' is possible but slightly less literal.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: The simple waw-consecutive verb is best rendered straightforwardly. English
    naturally reads the death as the result of the trampling from context, without
    needing an explicitly resultative paraphrase.
