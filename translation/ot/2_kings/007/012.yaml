id: 2KI.7.12
reference: 2 Kings 7:12
source:
  edition: WLC
  text: וַ/יָּ֨קָם הַ/מֶּ֜לֶךְ לַ֗יְלָה וַ/יֹּ֨אמֶר֙ אֶל עֲבָדָ֔י/ו אַגִּֽידָה נָּ֣א
    לָ/כֶ֔ם אֵ֛ת אֲשֶׁר עָ֥שׂוּ לָ֖/נוּ אֲרָ֑ם יָדְע֞וּ כִּי רְעֵבִ֣ים אֲנַ֗חְנוּ
    וַ/יֵּצְא֤וּ מִן הַֽ/מַּחֲנֶה֙ לְ/הֵחָבֵ֤ה ב/ה/שדה לֵ/אמֹ֔ר כִּֽי יֵצְא֤וּ מִן
    הָ/עִיר֙ וְ/נִתְפְּשֵׂ֣/ם חַיִּ֔ים וְ/אֶל הָ/עִ֖יר נָבֹֽא־־־־־־־־׃
translation:
  text: Then the king got up in the night and said to his servants, “Let me tell you,
    please, what Aram has done to us. They know that we are hungry, so they have gone
    out from the camp to hide themselves in the field, saying, ‘When they come out
    from the city, we will seize them alive, and we will enter the city.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Arameans.” The Hebrew uses the place/name Aram for the people or
      army of Aram.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: got up
  alternatives:
  - arose
  - stood up
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of קום in context of rising from bed/rest
    at night; 'got up' is natural modern English without losing the concrete action.
- source_word: לַיְלָה
  chosen: in the night
  alternatives:
  - at night
  - by night
  lexicon: HALOT
  rationale: Adverbial accusative indicating time. 'In the night' preserves the nocturnal
    setting with slightly more narrative vividness than the flatter 'at night.'
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: In royal court context עבד can denote royal servants/attendants. 'Servants'
    is the broad, transparent rendering and fits the immediate speech setting.
- source_word: אַגִּידָה נָּא לָכֶם
  chosen: Let me tell you, please
  alternatives:
  - I will tell you now
  - Please let me declare to you
  lexicon: HALOT
  rationale: Cohortative with particle נָא expresses a polite or urgent proposal.
    'Let me tell you, please' captures both the volitional force and the discourse
    particle in readable English.
- source_word: אֵת אֲשֶׁר עָשׂוּ לָנוּ אֲרָם
  chosen: what Aram has done to us
  alternatives:
  - what the Arameans have done to us
  - what Syria has done to us
  lexicon: HALOT
  rationale: אֲרָם is the national/geographical name. Per philosophy, names are transliterated
    rather than replaced with traditional geopolitical equivalents like 'Syria.' Singular
    'Aram' can stand for the Aramean force/state.
- source_word: יָדְעוּ כִּי רְעֵבִים אֲנַחְנוּ
  chosen: They know that we are hungry
  alternatives:
  - They knew that we were hungry
  lexicon: HALOT
  rationale: The qatal can be rendered as present within direct speech describing
    the enemy's current knowledge and plan. Present tense is idiomatic in English
    reported reasoning.
- source_word: וַיֵּצְאוּ מִן הַמַּחֲנֶה
  chosen: they have gone out from the camp
  alternatives:
  - they went out of the camp
  - they have left the camp
  lexicon: HALOT
  rationale: Within the king's explanation, English present perfect naturally conveys
    a recent completed action with present relevance. 'Camp' is the military encampment
    of Aram.
- source_word: לְהֵחָבֵה
  chosen: to hide themselves
  alternatives:
  - to hide
  - to conceal themselves
  lexicon: HALOT
  rationale: Infinitive of חבא in reflexive/passive stem conveys hiding oneself. 'Hide
    themselves' makes the reflexive sense explicit.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  - in the countryside
  lexicon: HALOT
  rationale: Singular with article can function collectively, but 'in the field' is
    the straightforward rendering and suits an ambush setting outside the city.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thinking
  - with the plan that
  lexicon: HALOT
  rationale: Introduces the content of the Arameans' supposed speech/plan. 'Saying'
    preserves the Hebrew discourse marker without overinterpreting.
- source_word: כִּי יֵצְאוּ מִן הָעִיר
  chosen: When they come out from the city
  alternatives:
  - If they come out of the city
  - For they will come out from the city
  lexicon: HALOT
  rationale: In context this expresses the anticipated circumstance for the ambush.
    'When' best fits the king's reconstruction of the enemy plan.
- source_word: וְנִתְפְּשֵׂם חַיִּים
  chosen: we will seize them alive
  alternatives:
  - we will capture them alive
  - we will take them alive
  lexicon: HALOT
  rationale: תפשׂ means seize/capture. 'Seize' keeps the sudden ambush force; חַיִּים
    is adverbial/predicative, 'alive.'
- source_word: וְאֶל הָעִיר נָבֹא
  chosen: and we will enter the city
  alternatives:
  - and we will come into the city
  - and then we will go into the city
  lexicon: HALOT
  rationale: בוא with אֶל marks movement into the city. 'Enter' is concise and idiomatic
    in military context.
