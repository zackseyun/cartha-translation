id: 2KI.7.4
reference: 2 Kings 7:4
source:
  edition: WLC
  text: אִם אָמַרְנוּ֩ נָב֨וֹא הָ/עִ֜יר וְ/הָ/רָעָ֤ב בָּ/עִיר֙ וָ/מַ֣תְנוּ שָׁ֔ם וְ/אִם
    יָשַׁ֥בְנוּ פֹ֖ה וָ/מָ֑תְנוּ וְ/עַתָּ֗ה לְכוּ֙ וְ/נִפְּלָה֙ אֶל מַחֲנֵ֣ה אֲרָ֔ם
    אִם יְחַיֻּ֣/נוּ נִֽחְיֶ֔ה וְ/אִם יְמִיתֻ֖/נוּ וָ/מָֽתְנוּ־־־־־׃
translation:
  text: If we say, ‘Let us enter the city,’ the famine is in the city, and we will
    die there. And if we sit here, we will die. So now, come, let us fall into the
    camp of Aram. If they let us live, we will live; and if they put us to death,
    we will die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or ‘let us surrender to the camp of Aram’ for ‘let us fall into the camp
      of Aram’; the Hebrew idiom נפל אל can carry the sense of going over or yielding
      to another force.
    reason: lexical_alternative
  - marker: b
    text: ‘Aram’ is the Hebrew name often rendered ‘Syria’ or ‘the Arameans.’
    reason: cultural_note
lexical_decisions:
- source_word: נָב֨וֹא
  chosen: let us enter
  alternatives:
  - we will enter
  - let us go into
  lexicon: HALOT
  rationale: 'First person plural imperfect after אִם אָמַרְנוּ functions as proposed
    speech: ‘If we say, “Let us enter...”’ English idiom is best captured with a cohortative-like
    ‘let us enter’ rather than a simple future.'
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: Standard rendering for עִיר. In context it refers to Samaria, but the
    Hebrew uses the common noun, so ‘the city’ preserves the wording.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: רָעָב here denotes famine conditions, not merely personal hunger. ‘The
    famine’ best fits the siege context.
- source_word: וָמַתְנוּ / וָמָתְנוּ
  chosen: we will die
  alternatives:
  - then we die
  - and we die
  lexicon: HALOT
  rationale: Though formally a qatal with conjunction, in this conditional sequence
    it expresses the expected result. English future ‘we will die’ communicates the
    consequence naturally and clearly.
- source_word: יָשַׁבְנוּ פֹה
  chosen: we sit here
  alternatives:
  - we stay here
  - we remain here
  lexicon: HALOT
  rationale: ישב literally means ‘sit/dwell/remain.’ ‘Sit here’ preserves the concrete
    force and fits the desperate deliberation.
- source_word: וְעַתָּה
  chosen: so now
  alternatives:
  - and now
  - now then
  lexicon: HALOT
  rationale: Marks transition from weighing options to urging action. ‘So now’ captures
    the inferential force in readable English.
- source_word: לְכוּ
  chosen: come
  alternatives:
  - go
  - come on
  lexicon: HALOT
  rationale: Though literally ‘go,’ in idiomatic exhortation with following cohortative
    it functions like ‘come’ or ‘come on.’ ‘Come’ is natural English without becoming
    colloquial.
- source_word: וְנִפְּלָה אֶל
  chosen: let us fall into
  alternatives:
  - let us surrender to
  - let us go over to
  lexicon: HALOT
  rationale: נפל אל in military context can mean to fall over to or surrender oneself
    to another side. ‘Fall into’ keeps the metaphor of the Hebrew while remaining
    intelligible; the sense of surrender is supplied by context.
- source_word: מַחֲנֵה אֲרָם
  chosen: the camp of Aram
  alternatives:
  - the Aramean camp
  - the camp of Syria
  lexicon: HALOT
  rationale: Following the translation philosophy to transliterate names, אֲרָם is
    rendered ‘Aram,’ not ‘Syria.’ Construct phrase is naturally ‘the camp of Aram.’
- source_word: יְחַיֻּנוּ
  chosen: they let us live
  alternatives:
  - they spare us
  - they keep us alive
  lexicon: HALOT
  rationale: Piel of חיה with object suffix means to preserve alive or let live. ‘Let
    us live’ is close to the Hebrew and pairs neatly with the following נִחְיֶה.
- source_word: נִחְיֶה
  chosen: we will live
  alternatives:
  - we shall live
  - we will stay alive
  lexicon: HALOT
  rationale: Simple result clause corresponding to the previous verb. ‘We will live’
    is direct and preserves the repetition.
- source_word: יְמִיתֻנוּ
  chosen: they put us to death
  alternatives:
  - they kill us
  - they cause us to die
  lexicon: HALOT
  rationale: Hiphil of מות is causative, ‘put to death/kill.’ ‘Put us to death’ preserves
    the causative nuance more clearly than the simpler ‘kill us.’
