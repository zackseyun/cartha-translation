id: 2KI.7.18
reference: 2 Kings 7:18
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/דַבֵּר֙ אִ֣ישׁ הָ/אֱלֹהִ֔ים אֶל הַ/מֶּ֖לֶךְ לֵ/אמֹ֑ר סָאתַ֨יִם
    שְׂעֹרִ֜ים בְּ/שֶׁ֗קֶל וּֽ/סְאָה סֹ֨לֶת֙ בְּ/שֶׁ֔קֶל יִהְיֶה֙ כָּ/עֵ֣ת מָחָ֔ר
    בְּ/שַׁ֖עַר שֹׁמְרֽוֹן־־׃
translation:
  text: And it happened just as the man of God had spoken to the king, saying, “Two
    seahs of barley for a shekel, and one seah of fine flour for a shekel, will be
    so about this time tomorrow in the gate of Samaria.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'A seah was an ancient dry measure. The Hebrew names the units directly:
      two seahs of barley and one seah of fine flour.'
    reason: cultural_note
  - marker: b
    text: Or “at the gate of Samaria.” The city gate was the public place of trade
      and judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing fulfillment. 'And it happened'
    preserves the Hebrew narrative force in readable modern English without archaic
    diction.
- source_word: כְּדַבֵּר
  chosen: just as ... had spoken
  alternatives:
  - when ... spoke
  - according to what ... said
  lexicon: HALOT
  rationale: 'The prefixed כ with infinitive construct marks correspondence: the event
    occurred in accordance with what the man of God said. English pluperfect fits
    the retrospective fulfillment context.'
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: This is the standard Hebrew title and should be translated directly rather
    than interpreted as 'the prophet,' preserving the source expression.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  - when he said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' keeps
    the formal structure naturally.
- source_word: סָאתַיִם
  chosen: Two seahs
  alternatives:
  - Two measures
  - About 14 liters
  lexicon: HALOT
  rationale: A dual form of the dry measure סאה. I preserved the unit as 'seahs' rather
    than flattening to 'measures,' since the verse's economic specificity matters.
    A modern equivalent could be explanatory but is better left out of the main text.
- source_word: שְׂעֹרִים
  chosen: barley
  lexicon: HALOT
  rationale: Straightforward grain term; 'barley' is the natural English equivalent.
- source_word: בְּשֶׁקֶל
  chosen: for a shekel
  alternatives:
  - at a shekel
  - by a shekel
  lexicon: HALOT
  rationale: In pricing formulas, ב marks the price paid. 'For a shekel' is idiomatic
    English for market value.
- source_word: וּסְאָה
  chosen: and one seah
  alternatives:
  - and a seah
  - and one measure
  lexicon: HALOT
  rationale: The singular contrasts with the preceding dual; rendering 'one seah'
    makes the numerical contrast explicit in English.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - flour
  lexicon: HALOT
  rationale: Refers to fine flour, not merely generic flour; 'fine flour' preserves
    the lexical distinction.
- source_word: יִהְיֶה
  chosen: will be so
  alternatives:
  - will be
  - shall be
  lexicon: HALOT
  rationale: Future statement of predicted market conditions. 'Will be so' captures
    the elliptical Hebrew after the quoted prices, where the sense is that these prices
    will obtain.
- source_word: כָּעֵת מָחָר
  chosen: about this time tomorrow
  alternatives:
  - at this time tomorrow
  - tomorrow about this time
  lexicon: HALOT
  rationale: Idiomatic temporal phrase meaning approximately the same time on the
    next day. 'About this time tomorrow' is natural English and reflects the כ comparative
    nuance.
- source_word: בְּשַׁעַר שֹׁמְרוֹן
  chosen: in the gate of Samaria
  alternatives:
  - at the gate of Samaria
  lexicon: HALOT
  rationale: The city gate was the public/commercial setting where such prices would
    be realized. 'In the gate' is a close rendering of the Hebrew preposition and
    common biblical idiom.
