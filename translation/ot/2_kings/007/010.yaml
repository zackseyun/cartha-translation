id: 2KI.7.10
reference: 2 Kings 7:10
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ וַֽ/יִּקְרְאוּ֮ אֶל שֹׁעֵ֣ר הָ/עִיר֒ וַ/יַּגִּ֤ידוּ לָ/הֶם֙ לֵ/אמֹ֔ר
    בָּ֚אנוּ אֶל מַחֲנֵ֣ה אֲרָ֔ם וְ/הִנֵּ֥ה אֵֽין שָׁ֛ם אִ֖ישׁ וְ/ק֣וֹל אָדָ֑ם כִּ֣י
    אִם הַ/סּ֤וּס אָסוּר֙ וְ/הַ/חֲמ֣וֹר אָס֔וּר וְ/אֹהָלִ֖ים כַּ/אֲשֶׁר הֵֽמָּה־־־־־׃
translation:
  text: So they came and called to the gatekeepers of the city, and they told them,
    saying, “We came to the camp of Aram, and behold, there was no one there, no human
    sound—only the horses tied, and the donkeys tied, and the tents as they were.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “no human voice.” The Hebrew phrase can refer specifically to voice or
      more broadly to any human sound.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the camp of Aram”; traditionally “the camp of the Syrians.”
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁעֵר הָעִיר
  chosen: the gatekeepers of the city
  alternatives:
  - the porter of the city
  - the gatekeeper of the city
  lexicon: HALOT
  rationale: Although שֹׁעֵר is morphologically singular, the following plural pronouns
    and verbs in context support a collective sense referring to the gatekeeping personnel.
    'Gatekeepers' is natural modern English and fits the narrative situation better
    than archaic 'porter.'
- source_word: וַיַּגִּידוּ לָהֶם לֵאמֹר
  chosen: and they told them, saying
  alternatives:
  - and they reported to them
  - and they declared to them, saying
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell or report. 'Told them, saying'
    preserves the Hebrew reporting formula without sounding overly stiff.
- source_word: מַחֲנֵה אֲרָם
  chosen: the camp of Aram
  alternatives:
  - the Aramean camp
  - the camp of Syria
  lexicon: HALOT
  rationale: The translation philosophy prefers transliterated names rather than traditional
    geopolitical substitutions where possible. 'Aram' preserves the Hebrew proper
    name more directly than 'Syria,' while still being understandable.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה marks vivid presentation. 'Behold' preserves the discourse force
    and solemnity better than flatter alternatives, while remaining acceptable in
    readable modern Bible English.
- source_word: אֵין שָׁם אִישׁ
  chosen: there was no one there
  alternatives:
  - there was no man there
  - there was nobody there
  lexicon: HALOT
  rationale: Although אִישׁ is literally 'man,' here it refers generically to any
    person present. 'No one' best conveys the sense in natural English without implying
    maleness.
- source_word: וְקוֹל אָדָם
  chosen: no human sound
  alternatives:
  - no sound of man
  - no human voice
  - no sound from anyone
  lexicon: HALOT
  rationale: קוֹל can mean sound or voice. In this context the point is total absence
    of human presence or activity, not merely speech, so 'human sound' captures the
    broader sense. This also reflects אָדָם as generic humanity rather than a male
    individual.
- source_word: כִּי אִם
  chosen: only
  alternatives:
  - except for
  - but only
  lexicon: HALOT
  rationale: The idiom introduces the sole exceptions to the absence just described.
    'Only' is concise and idiomatic in English.
- source_word: הַסּוּס אָסוּר ... וְהַחֲמוֹר אָסוּר
  chosen: the horses tied, and the donkeys tied
  alternatives:
  - the horses hitched, and the donkeys hitched
  - the horses bound, and the donkeys bound
  lexicon: HALOT
  rationale: אָסוּר from אסר means bound or tied. For animals in camp context, 'tied'
    is the clearest modern rendering. The singular nouns likely function collectively,
    so English pluralizes naturally.
- source_word: וְאֹהָלִים כַּאֲשֶׁר הֵמָּה
  chosen: and the tents as they were
  alternatives:
  - and the tents just as they were
  - and the tents in their place
  lexicon: HALOT
  rationale: The phrase emphasizes that the tents were left untouched, in the same
    condition as before. 'As they were' is concise and faithful; 'just as they were'
    is possible but slightly more interpretive.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם should be rendered according to context. Here it
    modifies 'sound' in a generic sense, so 'human' is the most accurate gender-appropriate
    rendering.
