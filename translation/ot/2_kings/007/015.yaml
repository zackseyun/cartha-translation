id: 2KI.7.15
reference: 2 Kings 7:15
source:
  edition: WLC
  text: וַ/יֵּלְכ֣וּ אַחֲרֵי/הֶם֮ עַד הַ/יַּרְדֵּן֒ וְ/הִנֵּ֣ה כָל הַ/דֶּ֗רֶךְ מְלֵאָ֤ה
    בְגָדִים֙ וְ/כֵלִ֔ים אֲשֶׁר הִשְׁלִ֥יכוּ אֲרָ֖ם ב/החפז/ם וַ/יָּשֻׁ֨בוּ֙ הַ/מַּלְאָכִ֔ים
    וַ/יַּגִּ֖דוּ לַ/מֶּֽלֶךְ־־־׃
translation:
  text: So they went after them as far as the Jordan, and behold, the whole road was
    full of garments and equipment that Aram had thrown away in their haste. Then
    the messengers returned and reported to the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'articles,' 'gear,' or 'supplies' for 'equipment' (Hebrew כֵלִים), a
      broad term for objects or implements.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally sometimes rendered 'the Arameans' or 'Syria'
      in English versions. The translation preserves the source name.
    reason: alternative_reading
  - marker: c
    text: Or 'the scouts returned.' Hebrew מַלְאָכִים more literally means 'messengers,'
      but in context these are the men sent out to investigate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: So they went
  alternatives:
  - And they went
  - Then they went
  lexicon: HALOT
  rationale: Wayyiqtol narrative verb from הלך. 'So they went' gives natural English
    narrative progression while preserving the sequential force.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - behind them
  - in pursuit of them
  lexicon: HALOT
  rationale: The preposition indicates following/pursuit. 'After them' is the most
    direct and idiomatic here.
- source_word: עַד הַיַּרְדֵּן
  chosen: as far as the Jordan
  alternatives:
  - to the Jordan
  lexicon: HALOT
  rationale: עַד marks extent. 'As far as the Jordan' better conveys the limit reached
    than the simpler 'to the Jordan.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Behold' preserves the
    vividness and suddenness of the Hebrew without over-paraphrase.
- source_word: כָל הַדֶּרֶךְ
  chosen: the whole road
  alternatives:
  - all the way
  - the entire الطريق/route
  lexicon: HALOT
  rationale: Literally 'all the road/way.' In context it refers to the route of pursuit.
    'The whole road' is concrete and natural English.
- source_word: מְלֵאָה
  chosen: was full of
  alternatives:
  - was filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the road. 'Was full of' is idiomatic and
    accurate.
- source_word: בְגָדִים
  chosen: garments
  alternatives:
  - clothes
  - clothing
  lexicon: HALOT
  rationale: Refers to articles of clothing left behind. 'Garments' preserves a slightly
    elevated but still readable register suitable to narrative Scripture.
- source_word: וְכֵלִים
  chosen: equipment
  alternatives:
  - vessels
  - articles
  - gear
  - supplies
  lexicon: HALOT
  rationale: כְּלִים is broad ('articles, utensils, gear, equipment'). In a fleeing
    army context, 'equipment' best captures military belongings without implying only
    containers.
- source_word: אֲשֶׁר הִשְׁלִיכוּ
  chosen: that ... had thrown away
  alternatives:
  - which ... threw down
  - that ... had cast off
  lexicon: HALOT
  rationale: The relative clause explains the items on the road. English pluperfect
    ('had thrown away') fits the prior action relative to the scouts' discovery.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - the Arameans
  - Syria
  lexicon: HALOT
  rationale: The Hebrew uses the national name singular/collective. Per philosophy,
    names are transliterated rather than replaced by later geopolitical labels; 'Aram'
    preserves the source term. The collective sense is carried by the singular subject
    with plural suffix in context.
- source_word: בְּחָפְזָם
  chosen: in their haste
  alternatives:
  - in their panic
  - as they hurried
  lexicon: HALOT
  rationale: The noun חפז denotes hurried haste, often under pressure. 'In their haste'
    is the most direct rendering; 'panic' would over-interpret.
- source_word: וַיָּשֻׁבוּ הַמַּלְאָכִים
  chosen: Then the messengers returned
  alternatives:
  - Then the scouts returned
  - Then the envoys returned
  lexicon: HALOT
  rationale: מַלְאָכִים broadly means messengers. In this context they are the men
    sent out to investigate, so 'messengers' is lexically faithful; 'scouts' is contextually
    possible but more interpretive.
- source_word: וַיַּגִּדוּ לַמֶּלֶךְ
  chosen: and reported to the king
  alternatives:
  - and told the king
  - and declared it to the king
  lexicon: HALOT
  rationale: נגד in Hiphil means to tell/report. 'Reported to the king' fits the reconnaissance
    context and reads naturally.
