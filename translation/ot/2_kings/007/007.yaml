id: 2KI.7.7
reference: 2 Kings 7:7
source:
  edition: WLC
  text: וַ/יָּקוּמוּ֮ וַ/יָּנ֣וּסוּ בַ/נֶּשֶׁף֒ וַ/יַּעַזְב֣וּ אֶת אָהֳלֵי/הֶ֗ם וְ/אֶת
    סֽוּסֵי/הֶם֙ וְ/אֶת חֲמֹ֣רֵי/הֶ֔ם הַֽ/מַּחֲנֶ֖ה כַּ/אֲשֶׁר הִ֑יא וַ/יָּנֻ֖סוּ
    אֶל נַפְשָֽׁ/ם־־־־־׃
translation:
  text: So they arose and fled at twilight, and they left their tents, their horses,
    their donkeys—the camp as it was—and fled for their lives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at dusk' / 'in the twilight.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the camp as it was,' that is, left just as they found it.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'fled to their life,' an idiom meaning 'fled for their lives.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַנֶּשֶׁף
  chosen: at twilight
  alternatives:
  - in the dusk
  - at dusk
  - in the twilight
  lexicon: HALOT
  rationale: נֶשֶׁף denotes twilight/dusk, the dim light between day and night. 'At
    twilight' is natural modern English and fits the narrative setting without over-specifying
    evening versus dawn.
- source_word: וַיַּעַזְבוּ
  chosen: they left
  alternatives:
  - they abandoned
  - they forsook
  lexicon: HALOT
  rationale: עזב commonly means 'leave, abandon, forsake.' Here the military flight
    context implies abandonment, but 'left' keeps the wording straightforward while
    the surrounding context of fleeing conveys the force.
- source_word: אָהֳלֵיהֶם
  chosen: their tents
  lexicon: HALOT
  rationale: Literal rendering of the plural construct with suffix; 'tents' is the
    ordinary sense in a military encampment.
- source_word: סוּסֵיהֶם
  chosen: their horses
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: חֲמֹרֵיהֶם
  chosen: their donkeys
  alternatives:
  - their asses
  lexicon: HALOT
  rationale: The basic meaning is domestic pack animals, 'donkeys.' This is standard
    contemporary English; 'asses' is archaic in modern Bible style.
- source_word: הַמַּחֲנֶה כַּאֲשֶׁר הִיא
  chosen: the camp as it was
  alternatives:
  - the camp just as it was
  - the camp intact
  lexicon: HALOT
  rationale: The phrase emphasizes that the camp was left in its existing condition,
    untouched in the haste of flight. 'As it was' is a close and idiomatic rendering;
    'intact' is interpretive and therefore kept as an alternative only.
- source_word: וַיָּנֻסוּ אֶל נַפְשָׁם
  chosen: fled for their lives
  alternatives:
  - fled to save themselves
  - fled for their own lives
  lexicon: HALOT
  rationale: The idiom אֶל־נֶפֶשׁ means fleeing to preserve one's life. 'Fled for
    their lives' is the standard idiomatic English equivalent and best captures the
    urgency.
- source_word: וַיָּקוּמוּ
  chosen: they arose
  alternatives:
  - they got up
  - they rose
  lexicon: HALOT
  rationale: קום in wayyiqtol here marks the beginning of urgent action. 'Arose' preserves
    the narrative cadence better than the more colloquial 'got up'.
- source_word: וַיָּנ֣וּסוּ ... וַיָּנֻסוּ
  chosen: fled ... fled
  alternatives:
  - ran away ... fled
  lexicon: HALOT
  rationale: The Hebrew repeats the same verb נוּס twice for emphasis. Preserving
    the repetition in English reflects the source text's urgency and style.
