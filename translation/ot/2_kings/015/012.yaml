id: 2KI.15.12
reference: 2 Kings 15:12
source:
  edition: WLC
  text: ה֣וּא דְבַר יְהוָ֗ה אֲשֶׁ֨ר דִּבֶּ֤ר אֶל יֵהוּא֙ לֵ/אמֹ֔ר בְּנֵ֣י רְבִיעִ֔ים יֵשְׁב֥וּ לְ/ךָ֖ עַל כִּסֵּ֣א יִשְׂרָאֵ֑ל וַֽ/יְהִי כֵֽן־־־־׃פ
translation:
  text: This was the word of Yahweh that he spoke to Jehu, saying, “Your sons to the fourth generation shall sit on the throne of Israel.” And so it happened.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הוּא
  chosen: This was
  alternatives:
  - It was
  - This is
  lexicon: HALOT
  rationale: The pronoun functions demonstratively, pointing back to the preceding event as the fulfillment of a prior word. English idiom prefers 'This was' rather than a bare 'It' here.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the promise of the LORD
  - the matter of the LORD
  lexicon: HALOT
  rationale: דבר here denotes a spoken divine declaration or promise. 'Word of the LORD' preserves the standard biblical idiom and the covenantal weight of the phrase. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר דִּבֶּר אֶל יֵהוּא
  chosen: that he spoke to Jehu
  alternatives:
  - which he had spoken to Jehu
  - that he said to Jehu
  lexicon: HALOT
  rationale: A straightforward relative clause. 'Spoke to' best matches דִּבֶּר אֶל and keeps the formal link to the quoted oracle.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when he said
  lexicon: HALOT
  rationale: Standard quotation introducer; 'saying' is concise and natural in English biblical narrative.
- source_word: בְּנֵי רְבִיעִים
  chosen: Your sons to the fourth generation
  alternatives:
  - Sons of the fourth generation for you
  - Your descendants to the fourth generation
  - Your sons, four generations deep
  lexicon: HALOT
  rationale: The Hebrew idiom refers to Jehu's line continuing through four generations. 'Your sons to the fourth generation' is clear, close to the source, and preserves the filial language rather than generalizing immediately to 'descendants.'
- source_word: יֵשְׁבוּ לְךָ
  chosen: shall sit
  alternatives:
  - will sit for you
  - shall reign for you
  lexicon: HALOT
  rationale: ישב with 'on the throne' is a standard enthronement idiom. 'Shall sit' preserves the metaphor; 'reign' would be interpretive and less formally tied to the throne language.
- source_word: עַל כִּסֵּא יִשְׂרָאֵל
  chosen: on the throne of Israel
  alternatives:
  - upon Israel's throne
  lexicon: HALOT
  rationale: A direct rendering of the royal idiom, preserving the concrete image of kingship.
- source_word: וַיְהִי כֵן
  chosen: And so it happened
  alternatives:
  - And it was so
  - And it came to pass so
  lexicon: HALOT
  rationale: This formula marks fulfillment. 'And so it happened' is natural modern English while retaining the narrative force of fulfillment.
