id: 2KI.15.25
reference: 2 Kings 15:25
source:
  edition: WLC
  text: וַ/יִּקְשֹׁ֣ר עָלָי/ו֩ פֶּ֨קַח בֶּן רְמַלְיָ֜הוּ שָׁלִישׁ֗/וֹ וַ/יַּכֵּ֨/הוּ
    בְ/שֹׁמְר֜וֹן בְּ/אַרְמ֤וֹן בֵּית מלך אֶת אַרְגֹּ֣ב וְ/אֶת הָ/אַרְיֵ֔ה וְ/עִמּ֛/וֹ
    חֲמִשִּׁ֥ים אִ֖ישׁ מִ/בְּנֵ֣י גִלְעָדִ֑ים וַ/יְמִיתֵ֖/הוּ וַ/יִּמְלֹ֥ךְ תַּחְתָּֽי/ו־־־־׃
translation:
  text: Then Pekah son of Remaliah, his officer, conspired against him and struck
    him down in Samaria, in the citadel of the king’s house, with Argob and Arieh,
    and with him were fifty men of the Gileadites. So he put him to death and reigned
    in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his captain.' The Hebrew שָׁלִישׁ refers to a high-ranking military
      officer, but the exact rank is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the palace of the king’s house.' The Hebrew אַרְמוֹן can denote a
      palace or fortified royal residence.
    reason: lexical_alternative
  - marker: c
    text: אַרְיֵה may be understood as the personal name 'Arieh'; lexically the word
      can also mean 'lion,' but here it is best read as a name alongside Argob.
    reason: lexical_alternative
  - marker: d
    text: Or 'and with him fifty men from the Gileadites.'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקְשֹׁר עָלָיו
  chosen: conspired against him
  alternatives:
  - formed a conspiracy against him
  - plotted against him
  lexicon: HALOT
  rationale: קשר in the political context of Kings commonly denotes conspiracy or
    treasonous plotting, not merely a private scheme. 'Conspired against him' is the
    most natural and contextually precise English rendering.
- source_word: שָׁלִישׁוֹ
  chosen: his officer
  alternatives:
  - his captain
  - his adjutant
  - his third man
  lexicon: HALOT
  rationale: שָׁלִישׁ can denote a high-ranking military officer, traditionally 'captain.'
    Because the precise rank is uncertain in English and likely refers to an officer
    attached to the king, 'his officer' preserves the relationship and status without
    over-specifying.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - attacked him
  - smote him
  - killed him
  lexicon: HALOT
  rationale: נכה is a broad verb meaning to strike, smite, or strike down. Since the
    verse later explicitly says 'he put him to death,' rendering this first verb as
    'struck him down' preserves the sequence without collapsing both verbs into one.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  lexicon: HALOT
  rationale: Straightforward locative use of the place name שֹׁמְרוֹן.
- source_word: בְּאַרְמוֹן בֵּית מֶלֶךְ
  chosen: in the citadel of the king’s house
  alternatives:
  - in the palace of the king’s house
  - in the fortress of the royal house
  lexicon: HALOT
  rationale: אַרְמוֹן can mean palace, citadel, or fortified residence. Because the
    phrase includes 'house of the king,' a simple 'palace' risks redundancy ('palace
    of the king's palace/house'). 'Citadel of the king’s house' captures the fortified
    royal complex sense.
- source_word: אֶת אַרְגֹּב וְאֶת הָאַרְיֵה
  chosen: along with Argob and Arieh
  alternatives:
  - Argob and the lion
  - Argob and Aryeh
  lexicon: HALOT
  rationale: Both are best taken as personal names in this narrative context. Although
    אַרְיֵה is lexically 'lion,' the direct-object marking and parallelism with Argob
    favor a second named individual.
- source_word: וְעִמּוֹ חֲמִשִּׁים אִישׁ מִבְּנֵי גִלְעָדִים
  chosen: and with him fifty men from the Gileadites
  alternatives:
  - with him were fifty men of the Gileadites
  - and fifty Gileadite men were with him
  lexicon: HALOT
  rationale: The phrase most naturally indicates that Pekah had fifty men from among
    the Gileadites with him in the conspiracy/assassination. 'From the Gileadites'
    preserves the partitive sense of מִן.
- source_word: וַיְמִיתֵהוּ
  chosen: So he put him to death
  alternatives:
  - and killed him
  - and caused him to die
  lexicon: HALOT
  rationale: מות in the Hiphil means to cause to die, i.e., put to death/kill. 'Put
    him to death' preserves the causative force and distinguishes it from the earlier
    נכה.
- source_word: וַיִּמְלֹךְ תַּחְתָּיו
  chosen: and reigned in his place
  alternatives:
  - and became king in his place
  - and reigned instead of him
  lexicon: HALOT
  rationale: This standard succession formula in Kings is idiomatically rendered 'reigned
    in his place.'
