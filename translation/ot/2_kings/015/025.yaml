  to: and with him were fifty men from the Gileadites.
  rationale: The Hebrew circumstantial clause (וְעִמּוֹ חֲמִשִּׁים אִישׁ) is verbless,
    but in English, appending 'and with him fifty men' to the end of a long sentence
    creates a disjointed fragment. Adding 'were' clarifies that this is an independent
    clause describing the forces accompanying Pekah.
