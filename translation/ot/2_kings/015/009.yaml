id: 2KI.15.9
reference: 2 Kings 15:9
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ הָ/רַע֙ בְּ/עֵינֵ֣י יְהוָ֔ה כַּ/אֲשֶׁ֥ר עָשׂ֖וּ אֲבֹתָ֑י/ו לֹ֣א סָ֗ר מֵֽ/חַטֹּאות֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־־׃
translation:
  text: He did what was evil in the sight of Yahweh, just as his fathers had done. He did not turn away from the sins of Jeroboam son of Nebat, with which he caused Israel to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who caused Israel to sin.' The Hebrew relative clause can be taken as referring either to Jeroboam himself or to the sins associated with him; the main text preserves the close connection between Jeroboam's sins and Israel's being led into sin.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of עשה; simple past 'He did' is natural English while preserving the verbal action.
- source_word: הָרַע בְּעֵינֵי יְהוָה
  chosen: what was evil in the sight of the LORD
  alternatives:
  - evil in the eyes of the LORD
  - what was evil in the eyes of the LORD
  lexicon: HALOT
  rationale: This is a standard Deuteronomistic formula. 'What was evil' makes the idiom natural in English while retaining the evaluative force. 'In the sight of' preserves the Hebrew idiom better than a flatter paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר עָשׂוּ אֲבֹתָיו
  chosen: just as his fathers had done
  alternatives:
  - as his fathers did
  - just as his ancestors had done
  lexicon: HALOT
  rationale: '''Just as'' captures the comparative force of כַּאֲשֶׁר. ''Fathers'' is retained as the more literal and contextually appropriate dynastic reference, rather than broadening to ''ancestors''.'
- source_word: לֹא סָר
  chosen: He did not turn away
  alternatives:
  - He did not depart
  - He did not turn aside
  lexicon: HALOT
  rationale: סור here denotes ceasing from or departing from a course. 'Turn away' is clear modern English and fits the moral-religious context.
- source_word: מֵחַטֹּאות
  chosen: from the sins
  alternatives:
  - from the sinful acts
  - from the sin
  lexicon: HALOT
  rationale: Plural noun is best preserved as 'sins,' referring to Jeroboam's cultic offenses as a pattern or set of acts.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Standard English transliteration of the personal names; appositional 'son of' is retained.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - who caused Israel to sin
  - with which he made Israel sin
  lexicon: HALOT
  rationale: The relative clause most naturally refers back to 'the sins' as the means or pattern by which Jeroboam led Israel into sin, hence 'by which.' This preserves the Hebrew syntax and avoids implying the clause must modify Jeroboam personally, though that sense is closely related.
