id: 2KI.15.3
reference: 2 Kings 15:3
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה אֲמַצְיָ֥הוּ אָבִֽי/ו־׃
translation:
  text: He did what was right in the eyes of Yahweh, according to all that Amaziah his father had done.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: The waw-consecutive with עשה introduces the narrative action. English narrative style normally omits the initial 'and' unless needed for flow, so 'He did' best reflects the sense in readable modern English.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: 'The adjective ישר with the article functions substantivally: ''the right/upright thing.'' In idiomatic English in this evaluative royal formula, ''what was right'' is the clearest rendering.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for evaluation from YHWH's perspective. 'In the eyes of' preserves the metaphor closely while remaining natural English. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - in accordance with all that
  lexicon: HALOT
  rationale: The combination expresses conformity or correspondence with the pattern of another's actions. 'According to all that' preserves the comparative force without over-paraphrasing.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect clarifies that Amaziah's actions preceded the present subject's conduct. The Hebrew perfect itself does not require pluperfect, but English style benefits from it in this comparison.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: The immediate genealogical context indicates literal father, not merely forefather, so 'his father' is the most straightforward rendering.
