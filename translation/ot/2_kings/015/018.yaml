id: 2KI.15.18
reference: 2 Kings 15:18
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה לֹ֣א סָ֠ר מֵ/עַ֨ל חַטֹּ֜אות יָרָבְעָ֧ם בֶּן נְבָ֛ט אֲשֶׁר הֶחֱטִ֥יא אֶת יִשְׂרָאֵ֖ל כָּל יָמָֽי/ו־־־־׃
translation:
  text: He did what was evil in the eyes of Yahweh. He did not turn away from the sins of Jeroboam son of Nebat, with which he caused Israel to sin, all his days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jeroboam son of Nebat, who caused Israel to sin.' The Hebrew relative clause can be taken with 'Jeroboam' rather than with 'the sins.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from עשה, rendered as simple past in English. The conjunction is absorbed into normal English narrative flow.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: 'Idiomatic expression with עשה in Kings: ''do what was evil'' communicates moral evaluation naturally in English while preserving the object sense.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: Common Hebrew idiom for divine evaluation. 'In the eyes of' is transparent and preserves the metaphor. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא סָר
  chosen: He did not turn away
  alternatives:
  - He did not depart
  - He did not turn aside
  lexicon: HALOT
  rationale: סור with negative in this evaluative formula indicates failure to abandon a sinful pattern. 'Turn away' is natural modern English and preserves the metaphor of departure.
- source_word: מֵעַל חַטֹּאות
  chosen: from the sins
  alternatives:
  - from the sinful acts
  - from the offenses
  lexicon: HALOT
  rationale: חטאות is the plural of 'sins' and in this royal formula refers to the cultic-political sins associated with Jeroboam. 'From the sins' is the most direct rendering.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Standard transliteration of the proper names; construct relationship rendered naturally in English.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - which he made Israel commit
  - with which he caused Israel to sin
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: Jeroboam caused Israel to sin. The relative clause most naturally refers to the sins just mentioned, hence ''by which he caused Israel to sin'' rather than making Jeroboam the direct grammatical subject in English.'
- source_word: כָּל יָמָיו
  chosen: all his days
  alternatives:
  - throughout his days
  - as long as he lived
  lexicon: HALOT
  rationale: Literal Hebrew idiom indicating the entirety of his reign/life. 'All his days' is concise and standard.
