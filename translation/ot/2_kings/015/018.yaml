theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the relative clause אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen_reading: 'The clause is rendered with the sins as the proximate antecedent: ''by which he caused Israel to sin.'''
  alternative_readings:
  - 'The clause could be rendered appositionally with Jeroboam as the antecedent: ''Jeroboam son of Nebat, who caused Israel to sin.'''
  rationale: Hebrew permits either a close syntactic link to 'sins' or a looser appositional link to Jeroboam. In the immediate wording, the relative clause follows 'Jeroboam son of Nebat' but semantically explains the sins associated with him. The chosen rendering preserves the causative force while keeping the English sentence clear. Because both readings are viable, the alternative is preserved in a footnote rather than treated as a doctrinally weighty distinction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
