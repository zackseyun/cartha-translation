id: 2KI.15.37
reference: 2 Kings 15:37
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם הֵחֵ֣ל יְהוָ֗ה לְ/הַשְׁלִ֨יחַ֙ בִּֽ/יהוּדָ֔ה רְצִ֖ין מֶ֣לֶךְ אֲרָ֑ם וְ/אֵ֖ת פֶּ֥קַח בֶּן רְמַלְיָֽהוּ־׃
translation:
  text: In those days Yahweh began to send against Judah Rezin king of Aram, and Pekah son of Remaliah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to send into Judah'; the Hebrew idiom here likely carries hostile force, hence 'against Judah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: A standard temporal idiom introducing a historical period rather than a single moment. 'In those days' preserves the Hebrew phrasing naturally in English.
- source_word: הֵחֵל
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: The Hiphil of חלל/החל here marks the inception of an action. 'Began' is the most natural and suitably formal English rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהַשְׁלִיחַ
  chosen: to send against
  alternatives:
  - to dispatch against
  - to unleash against
  lexicon: HALOT
  rationale: The Hiphil infinitive of שלח means 'to send.' In this military-political context, with hostile agents named and Judah as the target, English idiom requires 'send against' to make the adversative force explicit without overtranslating.
- source_word: בִּיהוּדָה
  chosen: against Judah
  alternatives:
  - into Judah
  - upon Judah
  lexicon: HALOT
  rationale: The preposition ב can be locally 'in/into,' but with hostile sending in context it functions idiomatically toward Judah as the object of aggression. 'Against Judah' best conveys the sense in clear English.
- source_word: רְצִין מֶלֶךְ אֲרָם
  chosen: Rezin king of Aram
  alternatives:
  - Rezin, the king of Aram
  - Rezin king of Syria
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Aram' is preferred over the traditional 'Syria' because it more directly reflects the Hebrew ethnogeographic term.
- source_word: וְאֵת פֶּקַח בֶּן רְמַלְיָהוּ
  chosen: and Pekah son of Remaliah
  alternatives:
  - and Pekah the son of Remaliah
  lexicon: HALOT
  rationale: The direct-object marker introduces a second hostile figure coordinated with Rezin. 'Son of' is the standard literal rendering of בן in genealogical identification.
