theological_decisions:
- issue: Nature of the king's condition denoted by מְצֹרָע
  chosen_reading: Retain the traditional rendering 'leprous' in the main text while acknowledging that the Hebrew term may refer more broadly to a serious skin disease.
  alternative_readings:
  - diseased with a skin disease
  - afflicted with a defiling skin disease
  rationale: The verse does not require a modern medical identification, and the translation should not over-resolve the term. The traditional rendering is recognizable and concise, while a footnote preserves the lexical caution.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
