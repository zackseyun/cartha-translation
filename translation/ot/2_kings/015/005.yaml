id: 2KI.15.5
reference: 2 Kings 15:5
source:
  edition: WLC
  text: וַ/יְנַגַּ֨ע יְהוָ֜ה אֶת הַ/מֶּ֗לֶךְ וַ/יְהִ֤י מְצֹרָע֙ עַד י֣וֹם מֹת֔/וֹ וַ/יֵּ֖שֶׁב בְּ/בֵ֣ית הַ/חָפְשִׁ֑ית וְ/יוֹתָ֤ם בֶּן הַ/מֶּ֨לֶךְ֙ עַל הַ/בַּ֔יִת שֹׁפֵ֖ט אֶת עַ֥ם הָ/אָֽרֶץ־־־־־׃
translation:
  text: And Yahweh struck the king, and he was leprous until the day of his death, and he lived in a separate house. And Jotham the king’s son was over the household, judging the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, “afflicted with a serious skin disease”; the Hebrew term does not necessarily refer to modern leprosy specifically.
    reason: lexical_alternative
  - marker: b
    text: Or “in a house of separation” / “in an isolated house”; the Hebrew phrase likely refers to a segregated residence.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute rather than transliteration.
- source_word: וַיְנַגַּע
  chosen: struck
  alternatives:
  - afflicted
  - plagued
  - touched
  lexicon: HALOT
  rationale: The verb נגע in this context denotes an afflicting blow from God rather than mere physical touch. 'Struck' is concise, idiomatic, and preserves divine agency without over-specifying the mechanism.
- source_word: מְצֹרָע
  chosen: leprous
  alternatives:
  - a leper
  - diseased with a skin disease
  lexicon: HALOT
  rationale: Traditional 'leprous' reflects the Hebrew term used for the condition associated with צרעת. While the exact medical diagnosis may not be Hansen's disease, 'leprous' is the most natural compact rendering in this narrative context; a footnote preserves the broader-skin-disease nuance.
- source_word: עַד יוֹם מֹתוֹ
  chosen: until the day of his death
  alternatives:
  - until his death
  lexicon: HALOT
  rationale: A fairly formal rendering that preserves the Hebrew idiom and its solemn cadence.
- source_word: בְּבֵית הַחָפְשִׁית
  chosen: in a separate house
  alternatives:
  - in the house of freedom
  - in a free house
  - in an isolated house
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it refers to a segregated residence due to ritual/social exclusion. 'Separate house' communicates the function in readable English without importing a misleadingly positive sense from the root idea of 'free'.
- source_word: עַל הַבַּיִת
  chosen: over the household
  alternatives:
  - over the palace
  - in charge of the house
  lexicon: HALOT
  rationale: This expression commonly denotes administrative oversight of the royal household/palace. 'Over the household' preserves the idiom while remaining intelligible.
- source_word: שֹׁפֵט
  chosen: judging
  alternatives:
  - governing
  - administering justice to
  lexicon: HALOT
  rationale: The participle indicates ongoing exercise of judicial/governing responsibility. 'Judging' is the most direct rendering and fits the syntax with the following object.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the people of the country
  - the populace
  lexicon: HALOT
  rationale: A formal rendering that preserves the Hebrew expression, which can denote the populace of the land. It avoids flattening the phrase into a purely modern political term.
