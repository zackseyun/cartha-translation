id: 2KI.15.28
reference: 2 Kings 15:28
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה לֹ֣א סָ֗ר מִן חַטֹּאות֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־־־׃
translation:
  text: He did what was evil in the eyes of Yahweh. He did not turn away from the sins of Jeroboam son of Nebat, who caused Israel to sin.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה introducing the standard regnal evaluation formula; simple past 'He did' is natural English, with the Hebrew narrative conjunction left implicit.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: 'In the idiom עשה הרע בעיני יהוה, English normally requires an object complement: ''did what was evil.'' This preserves the stock evaluative formula without wooden literalism.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common Hebrew idiom for divine evaluation. 'In the eyes of' is transparent and preserves the metaphor. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default for יְהוָה.
- source_word: לֹא סָר
  chosen: He did not turn away
  alternatives:
  - He did not depart
  - He did not deviate
  lexicon: HALOT
  rationale: סור with מן in this context means to turn aside from or depart from prior sinful practice. 'Turn away' is idiomatic modern English and fits the moral sense.
- source_word: מִן חַטֹּאות
  chosen: from the sins
  alternatives:
  - from the sinful acts
  - from the offenses
  lexicon: HALOT
  rationale: Plural חטאות is best rendered straightforwardly as 'sins' in this regnal formula.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Standard English rendering of the patronymic; names are transliterated.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: who caused Israel to sin
  alternatives:
  - who made Israel sin
  - who led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' is the clearest direct rendering and preserves Jeroboam's culpability.
