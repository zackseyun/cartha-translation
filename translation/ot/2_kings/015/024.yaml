id: 2KI.15.24
reference: 2 Kings 15:24
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה לֹ֣א סָ֗ר מֵֽ/חַטֹּאות֙ יָרָבְעָ֣ם בֶּן נְבָ֔ט אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־־׃
translation:
  text: He did what was evil in the eyes of Yahweh. He did not turn away from the sins of Jeroboam son of Nebat, who caused Israel to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He did not depart from the sins of Jeroboam son of Nebat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who made Israel sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: The waw-consecutive with עשה introduces the standard regnal evaluation formula. English normally omits the initial conjunction for readability, while preserving the verbal sense 'did.'
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: The idiom עשה הרע is best rendered naturally in English as 'did what was evil,' preserving the evaluative force of the Hebrew formula.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for divine evaluation. 'In the eyes of' is transparent and natural enough in English while staying close to the source. יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא סָר
  chosen: He did not turn away
  alternatives:
  - He did not depart
  - He did not turn aside
  lexicon: HALOT
  rationale: סור here denotes not departing from a pattern of conduct. 'Turn away' is idiomatic modern English and fits the moral-religious context.
- source_word: מֵחַטֹּאות
  chosen: from the sins
  alternatives:
  - from the sinful acts
  - from the offenses
  lexicon: HALOT
  rationale: The plural noun חטאות refers to the sinful practices associated with Jeroboam's cultic rebellion. 'Sins' is the most direct and standard rendering.
- source_word: יָרָבְעָם בֶּן נְבָט
  chosen: Jeroboam son of Nebat
  alternatives:
  - Jeroboam the son of Nebat
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Son of' is retained as the standard Hebrew patronymic expression.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: who caused Israel to sin
  alternatives:
  - who made Israel sin
  - who led Israel into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' most explicitly reflects the causative stem without overinterpreting the mechanism.
