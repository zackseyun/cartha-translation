id: 2KI.15.35
reference: 2 Kings 15:35
source:
  edition: WLC
  text: רַ֤ק הַ/בָּמוֹת֙ לֹ֣א סָ֔רוּ ע֗וֹד הָ/עָ֛ם מְזַבְּחִ֥ים וּֽ/מְקַטְּרִ֖ים בַּ/בָּמ֑וֹת ה֗וּא בָּנָ֛ה אֶת שַׁ֥עַר בֵּית יְהוָ֖ה הָ/עֶלְיֽוֹן־־׃
translation:
  text: Only the high places were not removed; the people still were sacrificing and burning incense on the high places. He built the upper gate of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning incense on the high places.' The Hebrew verb can refer more specifically to burning incense or more broadly to making an offering go up in smoke.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - Nevertheless
  - However
  - Except that
  lexicon: HALOT
  rationale: Introduces an exception to the positive evaluation of the king; 'Only' is a natural English adversative/exclusive marker in this formulaic Kings context.
- source_word: הַבָּמוֹת / בַּבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  - the cultic heights
  lexicon: HALOT
  rationale: Standard rendering for בָּמוֹת in Kings, referring to unauthorized local worship sites rather than merely elevated geography. Repeated consistently for both occurrences.
- source_word: לֹא סָרוּ
  chosen: were not removed
  alternatives:
  - did not depart
  - were not taken away
  lexicon: HALOT
  rationale: 'Passive-like English best conveys the idiom in context: the high places remained in place. ''Removed'' is the conventional and contextually clear rendering.'
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - continuing
  lexicon: HALOT
  rationale: Marks ongoing action despite the king's reforms; 'still' is concise and idiomatic.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Straightforward collective reference to the nation at large.
- source_word: מְזַבְּחִים
  chosen: were sacrificing
  alternatives:
  - were offering sacrifices
  lexicon: HALOT
  rationale: Participial form indicates ongoing customary action; progressive English captures this well.
- source_word: וּמְקַטְּרִים
  chosen: making offerings in smoke
  alternatives:
  - burning incense
  - burning offerings
  lexicon: HALOT
  rationale: The verb קטר can denote causing sacrificial smoke to ascend, not only incense in a narrow sense. 'Making offerings in smoke' preserves the broader cultic sense without over-specifying incense.
- source_word: הוּא
  chosen: He
  alternatives:
  - It was he who
  lexicon: HALOT
  rationale: Independent pronoun gives mild emphasis; simple 'He' is sufficient in English without overemphasis.
- source_word: בָּנָה
  chosen: built
  alternatives:
  - rebuilt
  - constructed
  lexicon: HALOT
  rationale: Basic sense of the verb; context does not require the more specific 'rebuilt,' though that is possible historically.
- source_word: שַׁעַר בֵּית יְהוָה
  chosen: the gate of the house of the LORD
  alternatives:
  - the gate of the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' preserves the Hebrew expression directly; the divine name follows the project''s default rendering ''the LORD'' for יְהוָה.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by project doctrine for the divine name.
- source_word: הָעֶלְיוֹן
  chosen: upper
  alternatives:
  - uppermost
  - higher
  lexicon: HALOT
  rationale: Likely distinguishes this gate by position; 'upper' is the most natural attributive rendering in English.
