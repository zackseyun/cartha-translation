id: 2KI.15.34
reference: 2 Kings 15:34
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הַ/יָּשָׁ֖ר בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֧ל אֲשֶׁר עָשָׂ֛ה עֻזִיָּ֥הוּ אָבִ֖י/ו עָשָֽׂה־׃
translation:
  text: He did what was right in the eyes of Yahweh, according to all that his father Uzziah had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Uzziah.'' Elsewhere this king is also called ''Azariah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: The waw-consecutive with עשה advances the narrative. English normally omits the initial 'and' in a standalone verse for readability while preserving the simple past narrative sense.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: The idiom עשה הישר commonly means 'do what is right/upright.' 'What was right' is natural modern English and preserves the evaluative force.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for divine evaluation. 'In the eyes of' preserves the metaphor closely. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as
  - in accordance with everything that
  lexicon: HALOT
  rationale: This comparative formula introduces conformity to a prior pattern. 'According to all that' is slightly more formal but accurately reflects the comprehensiveness of כֹּל.
- source_word: עֻזִיָּהוּ
  chosen: Uzziah
  alternatives:
  - Azariah
  lexicon: HALOT
  rationale: The Hebrew text here reads עֻזִיָּהוּ, so 'Uzziah' should be used rather than harmonizing to the alternate royal name 'Azariah' found elsewhere.
- source_word: אָבִיו
  chosen: his father
  alternatives:
  - his ancestor
  lexicon: HALOT
  rationale: The immediate genealogical sense is intended here; 'his father' is the straightforward rendering.
- source_word: עָשָׂה ... עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: The final verb refers to the prior actions of Uzziah relative to the current king's reign. English past perfect ('had done') clarifies the temporal relationship naturally.
