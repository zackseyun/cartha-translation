id: 2KI.10.34
reference: 2 Kings 10:34
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֥י יֵה֛וּא וְ/כָל אֲשֶׁ֥ר עָשָׂ֖ה וְ/כָל גְּבוּרָת֑/וֹ הֲ/לֽוֹא
    הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־־׃
translation:
  text: Now the rest of the acts of Jehu, and all that he did, and all his might—are
    they not written in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and all his mighty deeds' for 'and all his might.'
    reason: lexical_alternative
  - marker: b
    text: This refers to a royal annalistic source, not necessarily the canonical
      book of Chronicles.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: יֶתֶר in this formulaic regnal-summary context means 'the rest/remainder.'
    'Now' reflects the common narrative-summary force of initial וְ in readable English
    without over-literal repetition of 'and.'
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the stock expression 'the rest of
    the words/matters of X' in Kings it refers to the recorded acts or affairs of
    a king. 'Acts' is idiomatic and fits the historiographic formula.
- source_word: יֵהוּא
  chosen: Jehu
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and everything that he did
  lexicon: HALOT
  rationale: A straightforward rendering preserving the comprehensiveness of כָל and
    the relative clause.
- source_word: וְכָל גְּבוּרָתוֹ
  chosen: and all his might
  alternatives:
  - and all his mighty deeds
  - and all his valor
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, valor, or mighty acts. Here it summarizes
    Jehu's notable power/heroic exploits in royal annal style. 'Might' preserves the
    compactness of the Hebrew while allowing the sense of demonstrated power. An alternative
    is preserved in a footnote because 'mighty deeds' is also plausible.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - surely they are
  - are they not indeed
  lexicon: HALOT
  rationale: This interrogative particle introduces a rhetorical question expecting
    a positive answer; English preserves that form naturally with 'are they not.'
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: Passive participle meaning 'written'; 'written' is the most direct rendering,
    while the broader archival sense is conveyed by the following book title.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival formula English
    idiom prefers 'written in the book.' 'Book' is conventional and natural for סֵפֶר
    here, though historically a scroll is in view.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the annals
  - the book of the events of the days
  lexicon: HALOT
  rationale: This is the standard title for the royal record source cited in Kings.
    'Chronicles' is the established and accurate rendering of דִּבְרֵי הַיָּמִים in
    this context, though it refers to annalistic records rather than the canonical
    book of Chronicles.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this title formula, לְ marks relation/association, best rendered idiomatically
    as 'of.' This identifies the annals pertaining to Israel's kings.
