id: 2KI.10.30
reference: 2 Kings 10:30
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל יֵה֗וּא יַ֤עַן אֲשֶׁר הֱטִיבֹ֨תָ֙ לַ/עֲשׂ֤וֹת הַ/יָּשָׁר֙
    בְּ/עֵינַ֔/י כְּ/כֹל֙ אֲשֶׁ֣ר בִּ/לְבָבִ֔/י עָשִׂ֖יתָ לְ/בֵ֣ית אַחְאָ֑ב בְּנֵ֣י
    רְבִעִ֔ים יֵשְׁב֥וּ לְ/ךָ֖ עַל כִּסֵּ֥א יִשְׂרָאֵֽל־־־׃
translation:
  text: And the LORD said to Jehu, “Because you have done well in carrying out what
    is right in my eyes, and have done to the house of Ahab according to all that
    was in my heart, your sons to the fourth generation shall sit on the throne of
    Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your sons, sons of fourths,'' an idiom meaning a four-generation
      dynasty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal form rather than transliteration.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: This conjunction introduces the reason for the divine declaration. 'Because'
    is natural modern English and preserves the causal force.
- source_word: הֱטִיבֹתָ
  chosen: you have done well
  alternatives:
  - you have acted well
  - you have done good
  lexicon: HALOT
  rationale: The Hiphil of יטב here commends Jehu's action. 'Done well' is idiomatic
    and fits the following infinitive construction.
- source_word: לַעֲשׂוֹת הַיָּשָׁר בְּעֵינַי
  chosen: in carrying out what is right in my eyes
  alternatives:
  - to do what is right in my eyes
  - in doing the right in my sight
  lexicon: HALOT
  rationale: Combines the infinitive with the adjective phrase into smooth English
    while retaining the evaluative formula 'right in my eyes,' a common Hebrew idiom
    for divine approval.
- source_word: כְּכֹל אֲשֶׁר בִּלְבָבִי
  chosen: according to all that was in my heart
  alternatives:
  - according to everything in my heart
  - just as all that was in my mind
  lexicon: HALOT
  rationale: לֵבָב in Hebrew commonly denotes will, intention, or inner purpose, not
    merely emotion. 'In my heart' preserves the Hebrew metaphor while remaining intelligible.
- source_word: עָשִׂיתָ לְבֵית אַחְאָב
  chosen: have done to the house of Ahab
  alternatives:
  - have dealt with the house of Ahab
  - have done against the house of Ahab
  lexicon: HALOT
  rationale: The phrase refers to Jehu's executed judgment on Ahab's dynasty. 'Done
    to' is literal enough without over-interpreting the exact nuance.
- source_word: בְּנֵי רְבִעִים
  chosen: your sons to the fourth generation
  alternatives:
  - sons of the fourth generation
  - your descendants to the fourth generation
  lexicon: HALOT
  rationale: This idiom promises dynastic succession through four generations. 'Your
    sons' is closer to the Hebrew than the broader 'descendants,' while 'to the fourth
    generation' clarifies the idiom.
- source_word: יֵשְׁבוּ לְךָ עַל כִּסֵּא יִשְׂרָאֵל
  chosen: shall sit on the throne of Israel
  alternatives:
  - shall sit for you on Israel's throne
  - shall reign over Israel
  lexicon: HALOT
  rationale: '''Sit on the throne'' preserves the royal enthronement idiom. The dative
    לְךָ is naturally represented by making the promise dynastic (''your sons... shall
    sit'') rather than adding an awkward ''for you''.'
