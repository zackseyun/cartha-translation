id: 2KI.10.8
reference: 2 Kings 10:8
source:
  edition: WLC
  text: וַ/יָּבֹ֤א הַ/מַּלְאָךְ֙ וַ/יַּגֶּד ל֣/וֹ לֵ/אמֹ֔ר הֵבִ֖יאוּ רָאשֵׁ֣י בְנֵֽי
    הַ/מֶּ֑לֶךְ וַ/יֹּ֗אמֶר שִׂ֣ימוּ אֹתָ֞/ם שְׁנֵ֧י צִבֻּרִ֛ים פֶּ֥תַח הַ/שַּׁ֖עַר
    עַד הַ/בֹּֽקֶר־־־׃
translation:
  text: The messenger came and told him, saying, “They have brought the heads of the
    king’s sons.” And he said, “Put them in two heaps at the entrance of the gate
    until morning.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in two piles.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the messenger/agent
  - the angel
  lexicon: HALOT
  rationale: In narrative context this refers to a human bearer of news, not a supernatural
    being. 'Messenger' is the plain contextual sense and avoids misleading readers
    toward 'angel.'
- source_word: וַיַּגֶּד לוֹ לֵאמֹר
  chosen: told him, saying
  alternatives:
  - reported to him, saying
  - told him
  lexicon: HALOT
  rationale: The Hebrew combines the reporting verb with the infinitive 'saying.'
    Retaining 'saying' preserves the formal narrative style without sounding unnatural.
- source_word: הֵבִיאוּ
  chosen: They have brought
  alternatives:
  - They brought
  - They have delivered
  lexicon: HALOT
  rationale: The perfect in direct speech reports a completed action with present
    relevance. English present perfect communicates that the heads have now arrived
    before Jehu.
- source_word: רָאשֵׁי
  chosen: the heads
  alternatives:
  - the head(s)
  lexicon: HALOT
  rationale: The plural construct clearly refers to the severed heads just mentioned
    in the surrounding context. Explicitly rendering 'heads' is necessary and not
    interpretive overreach.
- source_word: בְנֵי הַמֶּלֶךְ
  chosen: the king’s sons
  alternatives:
  - the sons of the king
  - the royal sons
  lexicon: HALOT
  rationale: The construct chain is most naturally rendered 'the king’s sons.' This
    is more precise than 'children' and matches the male referents in context.
- source_word: שִׂימוּ אֹתָם
  chosen: Put them
  alternatives:
  - Place them
  - Set them
  lexicon: HALOT
  rationale: A straightforward imperative. 'Put' is idiomatic modern English and adequately
    formal.
- source_word: שְׁנֵי צִבֻּרִים
  chosen: in two heaps
  alternatives:
  - as two piles
  - in two mounds
  lexicon: HALOT
  rationale: צִבֻּרִים denotes heaps/piles. 'Heaps' is vivid and natural in English
    for stacked severed heads.
- source_word: פֶּתַח הַשַּׁעַר
  chosen: at the entrance of the gate
  alternatives:
  - at the gate entrance
  - by the opening of the gate
  lexicon: HALOT
  rationale: This phrase denotes the gateway/entrance area. 'At the entrance of the
    gate' preserves the concrete location with readable English.
- source_word: עַד הַבֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - by morning
  lexicon: HALOT
  rationale: The temporal phrase indicates duration up to the next morning. 'Until
    morning' is idiomatic and accurate.
