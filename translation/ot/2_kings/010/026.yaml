id: 2KI.10.26
reference: 2 Kings 10:26
source:
  edition: WLC
  text: וַ/יֹּצִ֛אוּ אֶת מַצְּב֥וֹת בֵּית הַ/בַּ֖עַל וַֽ/יִּשְׂרְפֽוּ/הָ־־׃
translation:
  text: Then they brought out the pillars of the house of Baal and burned them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a singular object suffix in 'and burned it,' though the preceding
      noun 'pillars' is plural; the sense is collective, hence 'burned them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'sacred pillars' or 'standing stones.' The Hebrew term refers to cultic
      stone pillars associated with worship.
    reason: lexical_alternative
  - marker: c
    text: Or 'the temple of Baal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצִאוּ
  chosen: Then they brought out
  alternatives:
  - And they brought out
  - Then they took out
  lexicon: HALOT
  rationale: From יצא in the Hiphil, 'cause to go out, bring out.' The waw-consecutive
    advances the narrative; 'Then' gives natural English narrative flow while preserving
    sequence.
- source_word: מַצְּבוֹת
  chosen: pillars
  alternatives:
  - sacred pillars
  - standing stones
  - images
  lexicon: HALOT
  rationale: מַצֵּבָה commonly denotes a standing stone or cultic pillar. In this
    context of Baal worship, 'pillars' is the most direct and readable rendering.
    'Sacred pillars' is interpretive but plausible; 'images' is too broad and less
    precise.
- source_word: בֵּית הַבַּעַל
  chosen: the house of Baal
  alternatives:
  - the temple of Baal
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' and in cultic context can refer to a
    temple. 'House of Baal' stays closer to the Hebrew while remaining idiomatic.
    'Temple of Baal' is a valid contextual alternative but slightly less formal to
    the source wording.
- source_word: וַיִּשְׂרְפוּהָ
  chosen: and burned them
  alternatives:
  - and burned it
  lexicon: HALOT
  rationale: The verb is singular-object marked with a 3fs suffix ('burned her/it'),
    while the apparent antecedent מַצְּבוֹת is plural. English smooths this to 'them'
    because the sense is that the pillars were burned. The singular suffix may reflect
    a collective sense or attraction to an implied singular noun, but a literal 'burned
    it' would sound misleading in English.
