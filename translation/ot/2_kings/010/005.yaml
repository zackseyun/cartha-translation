id: 2KI.10.5
reference: 2 Kings 10:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח אֲשֶׁר עַל הַ/בַּ֣יִת וַ/אֲשֶׁ֪ר עַל הָ/עִ֟יר וְ/הַ/זְּקֵנִים֩
    וְ/הָ/אֹמְנִ֨ים אֶל יֵה֤וּא לֵ/אמֹר֙ עֲבָדֶ֣י/ךָ אֲנַ֔חְנוּ וְ/כֹ֛ל אֲשֶׁר תֹּאמַ֥ר
    אֵלֵ֖י/נוּ נַעֲשֶׂ֑ה לֹֽא נַמְלִ֣יךְ אִ֔ישׁ הַ/טּ֥וֹב בְּ/עֵינֶ֖י/ךָ עֲשֵֽׂה־־־־׀־־׃
translation:
  text: So the one who was over the palace, and the one who was over the city, along
    with the elders and the guardians, sent to Jehu, saying, “We are your servants,
    and all that you say to us we will do. We will not make any man king. Do what
    is good in your eyes.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the foster fathers” or “the caretakers” for “the guardians.” The Hebrew
      term refers to those entrusted with the care of the royal sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר עַל הַבַּיִת
  chosen: the one who was over the palace
  alternatives:
  - the one over the household
  - the steward of the palace
  lexicon: HALOT
  rationale: The idiom refers to an official in charge of the royal house/palace.
    'Palace' fits the royal context better than the more domestic-sounding 'household,'
    while preserving the administrative sense of the Hebrew expression.
- source_word: וַאֲשֶׁר עַל הָעִיר
  chosen: the one who was over the city
  alternatives:
  - the governor of the city
  - the city overseer
  lexicon: HALOT
  rationale: The Hebrew is an office description rather than a formal title. A relatively
    literal rendering preserves that nuance without over-specifying the exact civic
    office.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the leaders
  lexicon: HALOT
  rationale: '''Elders'' is the standard rendering and preserves the social-political
    role indicated by the Hebrew term.'
- source_word: הָאֹמְנִים
  chosen: the guardians
  alternatives:
  - the foster fathers
  - the caretakers
  lexicon: HALOT
  rationale: In this context of Ahab's sons being under supervision, the term refers
    to those entrusted with their care. 'Guardians' is clear modern English and broad
    enough to include the custodial sense without implying only biological or adoptive
    parenthood.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it functions as a deferential
    self-designation in political correspondence rather than emphasizing bonded status.
    'Servants' best matches the discourse context.
- source_word: וְכֹל אֲשֶׁר תֹּאמַר אֵלֵינוּ נַעֲשֶׂה
  chosen: all that you say to us we will do
  alternatives:
  - whatever you tell us we will do
  lexicon: HALOT
  rationale: This keeps the straightforward pledge of obedience with a natural but
    still fairly formal English word order.
- source_word: לֹא נַמְלִיךְ אִישׁ
  chosen: We will not make any man king
  alternatives:
  - We will not appoint anyone king
  - We will not crown a man
  lexicon: HALOT
  rationale: The Hiphil of מלך means to cause to reign, install, or make king. 'Make
    any man king' is direct and preserves the causative force.
- source_word: הַטּוֹב בְּעֵינֶיךָ
  chosen: what is good in your eyes
  alternatives:
  - what seems good to you
  - what is right in your sight
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of what is good in someone's eyes.
    This rendering preserves the idiom while remaining understandable in English.
- source_word: עֲשֵׂה
  chosen: Do
  alternatives:
  - Act
  - Do it
  lexicon: HALOT
  rationale: A simple imperative best reflects the concise Hebrew command at the end
    of the message.
