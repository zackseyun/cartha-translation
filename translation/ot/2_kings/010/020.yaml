id: 2KI.10.20
reference: 2 Kings 10:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יֵה֗וּא קַדְּשׁ֧וּ עֲצָרָ֛ה לַ/בַּ֖עַל וַ/יִּקְרָֽאוּ׃
translation:
  text: Then Jehu said, “Consecrate a solemn assembly for Baal.” So they proclaimed
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “announce a sacred assembly for Baal.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural modern
    English narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: יֵהוּא
  chosen: Jehu
  rationale: Personal name is transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: קַדְּשׁוּ
  chosen: Consecrate
  alternatives:
  - Sanctify
  - Set apart
  lexicon: HALOT
  rationale: Imperative plural from קדשׁ, here calling for the formal setting apart
    of an event for cultic/religious use. 'Consecrate' best preserves the ritual sense
    in readable English. 'Sanctify' is more traditional but less natural; 'set apart'
    is accurate but weaker in cultic register.
- source_word: עֲצָרָה
  chosen: a solemn assembly
  alternatives:
  - an assembly
  - a sacred assembly
  lexicon: HALOT
  rationale: The noun denotes a formal religious gathering, often with a solemn/festal
    character. 'Solemn assembly' is the most established and precise English equivalent,
    preserving the cultic nuance better than the generic 'assembly'.
- source_word: לַבַּעַל
  chosen: for Baal
  alternatives:
  - to Baal
  lexicon: HALOT
  rationale: 'The preposition ל marks relation/purpose here: the assembly is being
    convened in honor of or for the worship of Baal. ''For Baal'' is the most natural
    English rendering in this context; ''to Baal'' is possible but less idiomatic.'
- source_word: וַיִּקְרָאוּ
  chosen: So they proclaimed it
  alternatives:
  - and they called it
  - and they announced it
  lexicon: HALOT
  rationale: קרא in this context means to make a public announcement or summons. 'Proclaimed
    it' captures the official public notice implied by convening an assembly. The
    object 'it' is supplied naturally in English from context.
