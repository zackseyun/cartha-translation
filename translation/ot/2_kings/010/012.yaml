id: 2KI.10.12
reference: 2 Kings 10:12
source:
  edition: WLC
  text: וַ/יָּ֨קָם֙ וַ/יָּבֹ֔א וַ/יֵּ֖לֶךְ שֹׁמְר֑וֹן ה֛וּא בֵּֽית עֵ֥קֶד הָרֹעִ֖ים
    בַּ/דָּֽרֶךְ־׃
translation:
  text: Then he arose and went and traveled to Samaria. He was at Beth-eked of the
    shepherds on the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-eked may mean something like 'house of gathering' or, in some interpretations
      of the place name, a site associated with shepherds' shearing or binding. The
      Hebrew is best treated as a place name in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: Then he arose
  alternatives:
  - Then he got up
  - Then he set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks the next action in narrative sequence.
    'Arose' preserves the formal narrative movement without over-paraphrasing.
- source_word: וַיָּבֹא
  chosen: went
  alternatives:
  - came
  - proceeded
  lexicon: HALOT
  rationale: בוא often means 'come' or 'go' depending on viewpoint. In English narrative
    from an external perspective, 'went' fits the sequence naturally alongside the
    destination Samaria.
- source_word: וַיֵּלֶךְ שֹׁמְרוֹן
  chosen: traveled to Samaria
  alternatives:
  - went to Samaria
  - journeyed to Samaria
  lexicon: HALOT
  rationale: הלך with the place name indicates movement toward Samaria. 'Traveled
    to' avoids the awkward repetition 'went ... went to' after the preceding verb
    while preserving the sense.
- source_word: הוּא
  chosen: He was
  alternatives:
  - and he was
  - now he was
  lexicon: HALOT
  rationale: The independent pronoun functions here to mark location or circumstance
    in the narrative. Rendering it as 'He was' makes the clause intelligible in English.
- source_word: בֵּית עֵקֶד
  chosen: Beth-eked
  alternatives:
  - Beth-eked house
  - house of binding/gathering
  lexicon: HALOT
  rationale: This appears to function as a place name. Per translation philosophy,
    names are transliterated rather than translated. The underlying sense of עקד is
    uncertain enough that a transliterated toponym is preferable in the main text.
- source_word: הָרֹעִים
  chosen: of the shepherds
  alternatives:
  - of the shepherds' shearing house
  - of the herdsmen
  lexicon: HALOT
  rationale: The noun רֹעִים straightforwardly means 'shepherds' or 'herdsmen.' 'Shepherds'
    is the most direct gloss. Because the exact force of the full place name is debated,
    the simpler genitival rendering is retained in the main text.
- source_word: בַּדָּרֶךְ
  chosen: on the way
  alternatives:
  - along the road
  - on the road
  lexicon: HALOT
  rationale: The phrase locates Beth-eked in relation to Jehu's route. 'On the way'
    is idiomatic and preserves the narrative sense.
