id: 2KI.10.18
reference: 2 Kings 10:18
source:
  edition: WLC
  text: וַ/יִּקְבֹּ֤ץ יֵהוּא֙ אֶת כָּל הָ/עָ֔ם וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם אַחְאָ֕ב עָבַ֥ד
    אֶת הַ/בַּ֖עַל מְעָ֑ט יֵה֖וּא יַעַבְדֶ֥/נּוּ הַרְבֵּֽה־־־׃
translation:
  text: Then Jehu gathered all the people and said to them, “Ahab served Baal a little;
    Jehu will serve him much.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Jehu''s statement is ironic in context: he says he will serve Baal ''much,''
      but the narrative shows this is a ruse to gather Baal''s worshipers.'
    reason: cross_reference
  - marker: b
    text: Or 'worshiped Baal' / 'will worship him'; the Hebrew verb 'served' is also
      used for religious service.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: The verb קבץ in the waw-consecutive narrative form denotes bringing people
    together. 'Gathered' is natural modern English and preserves the concrete action
    without overinterpreting the manner.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - all the populace
  lexicon: HALOT
  rationale: The phrase literally means 'all the people.' Retaining 'people' rather
    than narrowing to 'citizens' or 'crowd' preserves the broad reference in context.
- source_word: עָבַד אֶת הַבַּעַל
  chosen: served Baal
  alternatives:
  - worshiped Baal
  lexicon: HALOT
  rationale: עבד with a deity commonly means to serve in the sense of cultic devotion.
    'Served' is closer to the Hebrew and leaves the religious sense intact; 'worshiped'
    is a possible contextual gloss but is less formally aligned.
- source_word: מְעָט
  chosen: a little
  alternatives:
  - little
  - only a little
  lexicon: HALOT
  rationale: The adverbial accusative indicates degree. 'A little' is idiomatic and
    preserves the comparative setup with the following הַרְבֵּה.
- source_word: יַעַבְדֶנּוּ
  chosen: will serve him
  alternatives:
  - will serve Baal
  - will worship him
  lexicon: HALOT
  rationale: The suffix refers back to Baal. 'Will serve him' preserves the pronoun
    in the Hebrew and keeps the rhetorical force of Jehu's statement. The future sense
    fits the imperfect in direct speech.
- source_word: הַרְבֵּה
  chosen: much
  alternatives:
  - greatly
  - a lot
  - more
  lexicon: HALOT
  rationale: 'הַרְבֵּה functions adverbially here, contrasting with מְעָט. ''Much''
    preserves the terse parallelism: ''a little ... much.'' ''More'' would make the
    comparison more explicit than the Hebrew does.'
- source_word: יֵהוּא
  chosen: Jehu
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Although the Hebrew includes the article, English convention treats 'Baal'
    as a proper divine name without the article. This avoids awkward English while
    preserving the referent.
