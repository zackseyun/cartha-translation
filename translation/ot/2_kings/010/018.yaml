theological_decisions:
- issue: Jehu's declaration about serving Baal
  chosen_reading: Render the statement straightforwardly as Jehu's claim without signaling
    irony in the main text.
  alternative_readings:
  - Render with added cues such as 'pretended he would serve' or 'claimed he would
    serve'
  rationale: In context Jehu is deceiving the worshipers of Baal, but the Hebrew wording
    itself simply reports his speech. The translation should not import the narrative
    irony into the wording of the verse; that belongs to interpretation and broader
    context, not the main text of this verse.
  doctrine_reference: Translation philosophy §1, §3
