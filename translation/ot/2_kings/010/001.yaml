id: 2KI.10.1
reference: 2 Kings 10:1
source:
  edition: WLC
  text: וּ/לְ/אַחְאָ֛ב שִׁבְעִ֥ים בָּנִ֖ים בְּ/שֹׁמְר֑וֹן וַ/יִּכְתֹּב֩ יֵה֨וּא סְפָרִ֜ים
    וַ/יִּשְׁלַ֣ח שֹׁמְר֗וֹן אֶל שָׂרֵ֤י יִזְרְעֶאל֙ הַ/זְּקֵנִ֔ים וְ/אֶל הָ/אֹמְנִ֥ים
    אַחְאָ֖ב לֵ/אמֹֽר־־׃
translation:
  text: Now Ahab had seventy sons in Samaria. And Jehu wrote letters and sent them
    to Samaria, to the officials of Jezreel, the elders, and the guardians of Ahab's
    sons, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to the officials of Jezreel.'' Since the letters are said to
      be sent to Samaria, some understand this as referring to Jezreel-associated
      officials residing there, while some ancient versions and interpreters favor
      ''officials of Samaria.'' The main text preserves the Masoretic wording.'
    reason: textual_variant
  - marker: b
    text: Or 'foster fathers' or 'caretakers' for 'guardians.' The Hebrew refers to
      those responsible for rearing or overseeing Ahab's sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאַחְאָב
  chosen: Now Ahab had
  alternatives:
  - And Ahab had
  - Ahab had
  lexicon: HALOT
  rationale: The prefixed waw + lamed here introduces the circumstance/topic ('as
    for Ahab' / 'now Ahab had') rather than simple possession marked by an English
    'to.' 'Now Ahab had' gives natural English while preserving the discourse shift.
- source_word: שִׁבְעִים בָּנִים
  chosen: seventy sons
  alternatives:
  - seventy children
  lexicon: HALOT
  rationale: בָּנִים literally means 'sons.' In this royal succession context, the
    male sense is significant, so 'sons' is preferable to the more generic 'children.'
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב marks location. 'In Samaria' is the most natural rendering
    for the city as the place where Ahab's sons were residing.
- source_word: וַיִּכְתֹּב ... סְפָרִים
  chosen: wrote letters
  alternatives:
  - wrote documents
  - wrote messages
  lexicon: HALOT
  rationale: סְפָרִים here refers to written communications. 'Letters' best fits the
    narrative context of dispatching written correspondence.
- source_word: וַיִּשְׁלַח שֹׁמְרוֹן
  chosen: sent them to Samaria
  alternatives:
  - sent to Samaria
  - dispatched them to Samaria
  lexicon: HALOT
  rationale: The object 'letters' is implied from the previous clause and is naturally
    supplied in English as 'them.' This avoids awkwardness while preserving the sense.
- source_word: אֶל שָׂרֵי יִזְרְעֶאל
  chosen: to the officials of Jezreel
  alternatives:
  - to the rulers of Jezreel
  - to the princes of Jezreel
  lexicon: HALOT
  rationale: שָׂרִים denotes officials/leaders. 'Officials' is broad and readable.
    The phrase is textually difficult because the letters are sent to Samaria but
    addressed to 'the officials of Jezreel'; the translation preserves the Hebrew
    as given rather than harmonizing it.
- source_word: הַזְּקֵנִים
  chosen: the elders
  alternatives:
  - the older men
  lexicon: HALOT
  rationale: In civic context זְקֵנִים refers to recognized community leaders, not
    merely elderly persons. 'The elders' is the standard and accurate rendering.
- source_word: הָאֹמְנִים
  chosen: the guardians
  alternatives:
  - the foster fathers
  - the caretakers
  - the tutors
  lexicon: HALOT
  rationale: The participial form from אמן here refers to those entrusted with raising
    or caring for the royal sons. 'Guardians' communicates custodial responsibility
    in clear modern English without over-specifying gender or exact social role.
- source_word: אַחְאָב
  chosen: of Ahab's sons
  alternatives:
  - of Ahab
  lexicon: HALOT
  rationale: In English, attaching 'of Ahab' directly to 'guardians' could sound ambiguous.
    Expanding to 'guardians of Ahab's sons' makes explicit the relationship already
    implied by the Hebrew context.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: לֵאמֹר conventionally introduces the content of the message. 'Saying,'
    preserves the narrative flow into the next verse.
