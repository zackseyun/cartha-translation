id: 2KI.10.7
reference: 2 Kings 10:7
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/בֹ֤א הַ/סֵּ֨פֶר֙ אֲלֵי/הֶ֔ם וַ/יִּקְחוּ֙ אֶת בְּנֵ֣י הַ/מֶּ֔לֶךְ
    וַֽ/יִּשְׁחֲט֖וּ שִׁבְעִ֣ים אִ֑ישׁ וַ/יָּשִׂ֤ימוּ אֶת רָֽאשֵׁי/הֶם֙ בַּ/דּוּדִ֔ים
    וַ/יִּשְׁלְח֥וּ אֵלָ֖י/ו יִזְרְעֶֽאלָ/ה־־׃
translation:
  text: And when the letter came to them, they took the king’s sons and slaughtered
    seventy men, and put their heads in baskets and sent them to him at Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in pots' or 'in jars'; the Hebrew term denotes containers and is not
      limited with certainty to woven baskets.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסֵּפֶר
  chosen: the letter
  alternatives:
  - the document
  - the message
  lexicon: HALOT
  rationale: In this narrative context, סֵפֶר refers to the written communication
    Jehu had sent, so 'letter' is the most natural and specific English rendering.
- source_word: בְּנֵי הַמֶּלֶךְ
  chosen: the king’s sons
  alternatives:
  - the royal sons
  - the king’s descendants
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes male offspring of the king. 'Sons'
    preserves the familial and dynastic sense better than a broader term like 'descendants'.
- source_word: וַיִּשְׁחֲטוּ
  chosen: slaughtered
  alternatives:
  - killed
  - butchered
  lexicon: HALOT
  rationale: שָׁחַט commonly denotes slaughtering, often with violent or sacrificial
    overtones. 'Slaughtered' preserves the brutality more clearly than the flatter
    'killed'.
- source_word: שִׁבְעִים אִישׁ
  chosen: seventy men
  alternatives:
  - seventy persons
  lexicon: HALOT
  rationale: אִישׁ here counts individual males; 'men' is gender-accurate and fits
    the context of the king's sons.
- source_word: רָאשֵׁיהֶם
  chosen: their heads
  lexicon: HALOT
  rationale: Literal rendering is required by the context; no euphemism is warranted.
- source_word: בַּדּוּדִים
  chosen: in baskets
  alternatives:
  - in pots
  - in jars
  lexicon: HALOT
  rationale: דּוּד can denote a pot, kettle, or large container. In this context of
    transporting severed heads, 'baskets' is a conventional and plausible rendering
    that communicates portable containers in readable English, though the underlying
    term may be broader than woven baskets specifically.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Jehu
  lexicon: HALOT
  rationale: The pronoun refers to Jehu from the immediate context. The translation
    keeps the pronoun, matching the Hebrew, rather than replacing it with the name.
- source_word: יִזְרְעֶאלָה
  chosen: at Jezreel
  alternatives:
  - to Jezreel
  lexicon: HALOT
  rationale: The directional he indicates motion toward Jezreel. In English, because
    the verb 'sent' already expresses motion, 'at Jezreel' idiomatically conveys the
    destination where he was located; 'to Jezreel' would also be possible.
