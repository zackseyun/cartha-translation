id: 2KI.10.25
reference: 2 Kings 10:25
source:
  edition: WLC
  text: וַ/יְהִ֞י כְּ/כַלֹּת֣/וֹ לַ/עֲשׂ֣וֹת הָ/עֹלָ֗ה וַ/יֹּ֣אמֶר יֵ֠הוּא לָ/רָצִ֨ים
    וְ/לַ/שָּׁלִשִׁ֜ים בֹּ֤אוּ הַכּוּ/ם֙ אִ֣ישׁ אַל יֵצֵ֔א וַ/יַּכּ֖וּ/ם לְ/פִי חָ֑רֶב
    וַ/יַּשְׁלִ֗כוּ הָֽ/רָצִים֙ וְ/הַ/שָּׁ֣לִשִׁ֔ים וַ/יֵּלְכ֖וּ עַד עִ֥יר בֵּית הַ/בָּֽעַל׀־־־־׃
translation:
  text: And when he had finished offering the burnt offering, Jehu said to the runners
    and to the officers, “Go in; strike them down. Let no man come out.” So they struck
    them down with the edge of the sword, and the runners and the officers threw them
    out and went as far as the inner shrine of the house of Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'as far as the city/citadel of the house of Baal'; the phrase may
      refer to an inner fortified or inner sacred area of the temple complex.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכַלֹּתוֹ
  chosen: when he had finished
  alternatives:
  - as soon as he finished
  - when he finished
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed כ plus pronominal suffix marks
    temporal sequence: ''when/as he finished.'' The pluperfect-like English ''had
    finished'' fits the narrative flow before Jehu''s command.'
- source_word: לַעֲשׂוֹת הָעֹלָה
  chosen: offering the burnt offering
  alternatives:
  - making the burnt offering
  - performing the burnt offering
  lexicon: HALOT
  rationale: עָשָׂה with עֹלָה is sacrificial idiom. 'Offering the burnt offering'
    is natural English while preserving the cultic specificity of עֹלָה.
- source_word: הָעֹלָה
  chosen: the burnt offering
  alternatives:
  - the whole burnt offering
  lexicon: HALOT
  rationale: Standard cultic term for the עולה sacrifice. 'Burnt offering' is the
    established and accurate rendering in context.
- source_word: לָרָצִים
  chosen: to the runners
  alternatives:
  - to the guards
  - to the couriers
  lexicon: HALOT
  rationale: רָצִים literally means 'runners' and often refers to royal guards/messengers.
    'Runners' preserves the Hebrew term more transparently; their military function
    is clarified by context.
- source_word: לַשָּׁלִשִׁים
  chosen: to the officers
  alternatives:
  - to the captains
  - to the adjutants
  lexicon: HALOT
  rationale: שָׁלִישׁ can denote a military officer, originally perhaps a chariot
    officer. 'Officers' is broad enough for modern readers without overcommitting
    to a narrower reconstruction.
- source_word: בֹּאוּ
  chosen: Go in
  alternatives:
  - Come in
  - Enter
  lexicon: HALOT
  rationale: Given Jehu is commanding the execution squad to enter the temple precincts,
    'Go in' reflects the directional force from the speaker's standpoint in English
    narrative better than the more literal but potentially misleading 'Come in.'
- source_word: הַכּוּם
  chosen: strike them down
  alternatives:
  - kill them
  - smite them
  lexicon: HALOT
  rationale: נכה is a broad verb for striking, often lethally in military/judicial
    contexts. 'Strike them down' preserves the force without flattening it to the
    result-only 'kill.'
- source_word: אִישׁ אַל יֵצֵא
  chosen: Let no man come out
  alternatives:
  - Let no one come out
  lexicon: HALOT
  rationale: The singular אִישׁ with negative jussive has distributive force. 'No
    man' is gender-accurate to the source and fits the likely male cult personnel
    present; 'no one' is possible but less source-specific.
- source_word: לְפִי חָרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - with the sword's mouth
  lexicon: HALOT
  rationale: Hebrew idiom literally 'by the mouth of the sword.' 'With the edge of
    the sword' is the standard idiomatic English equivalent that preserves the vividness
    better than simply 'by the sword.'
- source_word: וַיַּשְׁלִכוּ
  chosen: threw them out
  alternatives:
  - cast them out
  - threw them
  lexicon: HALOT
  rationale: The verb means to throw/cast. In context, after the slaughter, the bodies
    are being disposed of or cast aside. 'Threw them out' makes the implied motion
    clear in English.
- source_word: עַד עִיר בֵּית־הַבָּעַל
  chosen: as far as the inner shrine of the house of Baal
  alternatives:
  - to the city of the house of Baal
  - to the citadel of the house of Baal
  lexicon: HALOT
  rationale: עִיר can mean 'city,' but in certain architectural contexts it can denote
    an inner fortified area or shrine-like inner structure. Given the immediate temple
    setting and the next verse's movement into the sacred space, 'inner shrine' best
    fits context. Because this is less transparent than the surface form 'city,' the
    alternative is preserved in a footnote.
