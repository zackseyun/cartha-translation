- issue: Rendering of אֲדֹנֵיכֶם
  chosen_reading: master
  alternative_readings:
  - lord
  rationale: The term refers to a human royal superior in this narrative context,
    not to YHWH. Following the doctrine's distinction, 'master' avoids confusion with
    the divine title 'Lord.'
