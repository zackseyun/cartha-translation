id: 2KI.10.3
reference: 2 Kings 10:3
source:
  edition: WLC
  text: וּ/רְאִיתֶ֞ם הַ/טּ֤וֹב וְ/הַ/יָּשָׁר֙ מִ/בְּנֵ֣י אֲדֹנֵי/כֶ֔ם וְ/שַׂמְתֶּ֖ם
    עַל כִּסֵּ֣א אָבִ֑י/ו וְ/הִֽלָּחֲמ֖וּ עַל בֵּ֥ית אֲדֹנֵי/כֶֽם־־׃
translation:
  text: Then choose the best and most upright of your master's sons, set him on his
    father's throne, and fight for your master's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look for the good and upright one from among your master's sons.' The
      Hebrew verb is literally 'see,' but here it carries the sense of selecting after
      consideration.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here means the royal household or dynasty, not merely a physical
      building.'
    reason: cultural_note
lexical_decisions:
- source_word: וּרְאִיתֶם
  chosen: choose
  alternatives:
  - see
  - look for
  - consider
  lexicon: HALOT
  rationale: Although the verb is literally 'and you shall see,' in this imperative-like
    context it carries the sense of selecting after inspection. 'Choose' communicates
    the intended action in natural English while remaining close to the Hebrew sense.
- source_word: הַטּוֹב וְהַיָּשָׁר
  chosen: the best and most upright
  alternatives:
  - the good and the upright
  - the good and right one
  lexicon: HALOT
  rationale: The paired adjectives describe the most suitable candidate in both quality
    and rectitude. 'Best and most upright' captures the superlative force implied
    by the context of choosing among the sons.
- source_word: מִבְּנֵי אֲדֹנֵיכֶם
  chosen: of your master's sons
  alternatives:
  - from the sons of your lord
  - from among your master's sons
  lexicon: HALOT
  rationale: אֲדֹנֵיכֶם here refers to the human ruler Ahab/Joram, not to God, so
    'master' is preferable to 'Lord.' The phrase indicates selection from among his
    sons.
- source_word: וְשַׂמְתֶּם עַל כִּסֵּא אָבִיו
  chosen: set him on his father's throne
  alternatives:
  - place him on his father's throne
  - put him on the throne of his father
  lexicon: HALOT
  rationale: The idiom means to install him as king in succession to his father. 'Set
    him on his father's throne' is clear, natural, and sufficiently formal.
- source_word: וְהִלָּחֲמוּ עַל בֵּית אֲדֹנֵיכֶם
  chosen: and fight for your master's house
  alternatives:
  - and fight for the house of your lord
  - and fight on behalf of your master's dynasty
  lexicon: HALOT
  rationale: '''House'' here refers to the ruling household or dynasty, not merely
    a building. ''Fight for your master''s house'' preserves the dynastic sense while
    remaining readable.'
