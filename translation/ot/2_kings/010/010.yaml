id: 2KI.10.10
reference: 2 Kings 10:10
source:
  edition: WLC
  text: דְּע֣וּ אֵפ֗וֹא כִּי֩ לֹ֨א יִפֹּ֜ל מִ/דְּבַ֤ר יְהוָה֙ אַ֔רְצָ/ה אֲשֶׁר דִּבֶּ֥ר
    יְהוָ֖ה עַל בֵּ֣ית אַחְאָ֑ב וַ/יהוָ֣ה עָשָׂ֔ה אֵ֚ת אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַ֖ד עַבְדּ֥/וֹ
    אֵלִיָּֽהוּ־־׃
translation:
  text: Know, then, that not a word of the LORD that he spoke against the house of
    Ahab will fall to the ground, and the LORD has done what he spoke by the hand
    of his servant Elijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''will not fall to the ground,'' an idiom meaning ''will not fail''
      or ''will not go unfulfilled.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'through his servant Elijah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּעוּ
  chosen: Know
  alternatives:
  - Recognize
  - Be assured
  lexicon: HALOT
  rationale: Imperative plural of ידע, calling the hearers to acknowledge or understand
    a fact. 'Know' is concise and direct, fitting the public declaration.
- source_word: אֵפוֹא
  chosen: then
  alternatives:
  - therefore
  - now
  lexicon: HALOT
  rationale: Discourse particle adding inferential force. 'Then' preserves the rhetorical
    transition naturally in English without overformalizing.
- source_word: יִפֹּל ... אַרצה
  chosen: will fall to the ground
  alternatives:
  - will fail
  - will fall earthward
  lexicon: HALOT
  rationale: The idiom literally says 'fall to the earth/ground' and conveys failure
    to come to pass. Retaining the image preserves the Hebrew vividness while remaining
    intelligible.
- source_word: מִדְּבַר יְהוָה
  chosen: a word of the LORD
  alternatives:
  - anything from the word of the LORD
  - a matter of the LORD
  lexicon: HALOT
  rationale: The partitive מן with דבר yields 'from/of the word of the LORD,' idiomatically
    'a word of the LORD' or 'anything of the LORD's word.' Singular 'a word' best
    reflects the Hebrew while conveying that no element of the prophecy fails.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' in keeping
    with established reverential convention and LXX-influenced English Bible practice.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה עַל בֵּית אַחְאָב
  chosen: that he spoke against the house of Ahab
  alternatives:
  - which the LORD spoke concerning the house of Ahab
  - that the LORD declared against Ahab's house
  lexicon: HALOT
  rationale: 'עַל here carries an adversative sense in context of judgment: the word
    spoken ''against'' Ahab''s house. This makes the prophetic threat explicit without
    adding content.'
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  alternatives:
  - Ahab's house
  - the dynasty of Ahab
  lexicon: HALOT
  rationale: '''House'' is the standard biblical idiom for family line or dynasty.
    Retaining it preserves intertextual resonance, while English readers can still
    understand it in context.'
- source_word: וַיהוָה עָשָׂה
  chosen: and the LORD has done
  alternatives:
  - and the LORD did
  - for the LORD has done
  lexicon: HALOT
  rationale: The perfect presents the action as accomplished. 'Has done' communicates
    completed fulfillment with present relevance in the speech situation.
- source_word: אֵת אֲשֶׁר דִּבֶּר
  chosen: what he spoke
  alternatives:
  - that which he spoke
  - what he said
  lexicon: HALOT
  rationale: '''What he spoke'' is a natural rendering of the object marker plus relative
    clause, preserving verbal linkage with the earlier ''spoke''.'
- source_word: בְּיַד עַבְדּוֹ אֵלִיָּהוּ
  chosen: by the hand of his servant Elijah
  alternatives:
  - through his servant Elijah
  - by his servant Elijah
  lexicon: HALOT
  rationale: ביד is a standard idiom for agency or instrumentality in prophetic mediation.
    'By the hand of' preserves the Hebrew expression; the sense 'through' is worth
    noting as an alternative.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in prophetic and royal service
    contexts 'servant' is the established and contextually appropriate rendering,
    emphasizing commissioned service rather than bonded status.
