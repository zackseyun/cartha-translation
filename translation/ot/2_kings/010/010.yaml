theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per the doctrine's contested
    terms table, the default rendering is 'the LORD,' preserving reverential convention
    without transliterating the name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Prophetic fulfillment idiom
  chosen_reading: not a word ... will fall to the ground
  alternative_readings:
  - not a word ... will fail
  rationale: The Hebrew idiom expresses the certainty that the LORD's announced judgment
    is fully fulfilled. The translation preserves the metaphor rather than flattening
    it into interpretation alone.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension and
    source texture where possible'
