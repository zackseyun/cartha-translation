id: 2KI.10.14
reference: 2 Kings 10:14
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ תִּפְשׂ֣וּ/ם חַיִּ֔ים וַֽ/יִּתְפְּשׂ֖וּ/ם חַיִּ֑ים וַֽ/יִּשְׁחָט֞וּ/ם
    אֶל בּ֣וֹר בֵּֽית עֵ֗קֶד אַרְבָּעִ֤ים וּ/שְׁנַ֨יִם֙ אִ֔ישׁ וְ/לֹֽא הִשְׁאִ֥יר
    אִ֖ישׁ מֵ/הֶֽם־־־׃ס
translation:
  text: And he said, “Capture them alive.” So they captured them alive and slaughtered
    them at the pit of Beth-eked, forty-two men; he left not a man of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “by the pit” or “into the pit.” The Hebrew preposition can be understood
      in more than one spatial sense here.
    reason: lexical_alternative
  - marker: b
    text: Beth-eked is a place name; the Hebrew may reflect an underlying meaning
      such as “house of binding/gathering,” but it functions here as a proper name.
    reason: cultural_note
  - marker: c
    text: Hebrew “he left not a man of them,” emphasizing that none survived.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְשׂוּם
  chosen: capture them
  alternatives:
  - seize them
  - take them
  lexicon: HALOT
  rationale: The verb תפשׂ commonly means to seize or capture. 'Capture' fits the
    context of apprehending a group on Jehu's order and pairs naturally with the following
    'alive.'
- source_word: חַיִּים
  chosen: alive
  alternatives:
  - living
  lexicon: HALOT
  rationale: Used adverbially here after the imperative and again after the narrative
    verb, it means they are to be taken alive rather than killed immediately.
- source_word: וַיִּשְׁחָטוּם
  chosen: slaughtered them
  alternatives:
  - killed them
  - butchered them
  lexicon: HALOT
  rationale: שׁחט is stronger and more specific than a generic 'kill,' often used
    for slaughtering. 'Slaughtered' preserves the brutality of the action without
    overparaphrase.
- source_word: אֶל־בּוֹר
  chosen: at the pit
  alternatives:
  - into the pit
  - by the pit
  lexicon: HALOT
  rationale: The preposition אֶל literally means 'to/toward,' but in this construction
    with a place of execution, idiomatic English is better served by 'at the pit.'
    'Into the pit' is possible but less certain from the syntax alone.
- source_word: בֵּית עֵקֶד
  chosen: Beth-eked
  alternatives:
  - Beth-eked of the shepherds
  - the house of binding
  lexicon: HALOT
  rationale: As a place name, it is best transliterated per project policy. Although
    the name may carry an underlying meaning, the text uses it as a toponym.
- source_word: אַרְבָּעִים וּשְׁנַיִם אִישׁ
  chosen: forty-two men
  alternatives:
  - forty-two persons
  lexicon: HALOT
  rationale: The numeral phrase with אִישׁ is a standard way to count adult males.
    'Men' is gender-accurate and natural English.
- source_word: וְלֹא הִשְׁאִיר אִישׁ מֵהֶם
  chosen: he left not a man of them
  alternatives:
  - he did not leave any of them
  - he left none of them
  lexicon: HALOT
  rationale: The singular verb הִשְׁאִיר has Jehu as the subject, so the clause is
    rendered with 'he,' not 'they.' 'Not a man of them' preserves the masculine singular
    אִישׁ and the totality of the destruction.
