id: 2KI.10.35
reference: 2 Kings 10:35
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יֵהוּא֙ עִם אֲבֹתָ֔י/ו וַ/יִּקְבְּר֥וּ אֹת֖/וֹ בְּ/שֹׁמְר֑וֹן
    וַ/יִּמְלֹ֛ךְ יְהוֹאָחָ֥ז בְּנ֖/וֹ תַּחְתָּֽי/ו־׃
translation:
  text: And Jehu lay down with his fathers, and they buried him in Samaria. And Jehoahaz
    his son became king in his place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - died
  lexicon: HALOT
  rationale: The verb שׁכב literally means 'lie down' and in royal death notices functions
    as a conventional idiom for death. 'Lay down with his fathers' preserves the Hebrew
    idiom more transparently than simply 'died,' while avoiding the potentially misleading
    English euphemism 'slept.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard Hebrew formula in regnal summaries. 'Fathers' is
    retained for formal accuracy and to preserve the dynastic/ancestral nuance of
    the idiom; 'ancestors' is possible but less literal.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: they buried him
  alternatives:
  - he was buried
  lexicon: HALOT
  rationale: The Hebrew uses an active 3mp verb with an unspecified subject. English
    can naturally mirror this with 'they buried him,' preserving the active form without
    inventing the agents.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב here is locative. 'In Samaria' is the most natural
    English rendering for the place of burial.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  - was king
  lexicon: HALOT
  rationale: In succession notices, מלך often marks accession rather than the whole
    duration of rule. 'Became king' communicates the transition of kingship more precisely
    than 'reigned' in this immediate context.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: The phrase indicates succession to office. 'In his place' is idiomatic
    English and closely matches the sense of replacing the previous king.
- source_word: יֵהוּא
  chosen: Jehu
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy.
