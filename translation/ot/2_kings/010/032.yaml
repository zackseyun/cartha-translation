id: 2KI.10.32
reference: 2 Kings 10:32
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם הֵחֵ֣ל יְהוָ֔ה לְ/קַצּ֖וֹת בְּ/יִשְׂרָאֵ֑ל וַ/יַּכֵּ֥/ם
    חֲזָאֵ֖ל בְּ/כָל גְּב֥וּל יִשְׂרָאֵֽל־׃
translation:
  text: In those days the LORD began to cut away at Israel, and Hazael struck them
    down throughout all the territory of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'began to cut off parts of Israel.' The Hebrew verb conveys the beginning
      of Israel's reduction, likely through territorial losses.
    reason: lexical_alternative
  - marker: b
    text: Or 'along the whole border of Israel.' The Hebrew phrase can denote border
      or territory; here it likely refers to the full extent of Israel's domain under
      attack.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: A standard temporal expression. 'In those days' preserves the Hebrew
    idiom naturally in English and matches the plural form.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: הֵחֵל
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: The Hiphil of חלל/החל here marks the inception of an action. 'Began'
    is the most natural and sufficiently formal English equivalent.
- source_word: לְקַצּוֹת
  chosen: to cut away at
  alternatives:
  - to cut off parts of
  - to reduce
  - to trim down
  lexicon: HALOT
  rationale: From קצה/קצץ in this context, the sense is not total destruction but
    the beginning of territorial reduction or diminution. 'To cut away at' preserves
    the metaphor of cutting while allowing the context of progressive loss rather
    than immediate annihilation.
- source_word: בְּיִשְׂרָאֵל
  chosen: at Israel
  alternatives:
  - from Israel
  - in Israel
  lexicon: HALOT
  rationale: The preposition ב here follows the infinitive and indicates the object
    affected. English idiom requires some adjustment; 'cut away at Israel' best conveys
    hostile diminution directed against Israel. 'From Israel' would over-specify territorial
    subtraction in the first clause, which is then made explicit in the second.
- source_word: וַיַּכֵּם
  chosen: struck them down
  alternatives:
  - defeated them
  - attacked them
  - struck them
  lexicon: HALOT
  rationale: נכה commonly means 'strike' and in military contexts can imply defeat
    or smiting. 'Struck them down' preserves the force of the verb and the 3mp suffix
    ('them' = Israelites) without flattening it to the weaker 'attacked.'
- source_word: חֲזָאֵל
  chosen: Hazael
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: בְּכָל גְּבוּל יִשְׂרָאֵל
  chosen: throughout all the territory of Israel
  alternatives:
  - in all the border of Israel
  - along the whole border of Israel
  - throughout all Israel's territory
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In this military-geographical
    context, the sense is the extent of Israel's domain, not merely the borderline
    itself. 'Throughout all the territory of Israel' communicates the breadth of Hazael's
    attacks in idiomatic English.
