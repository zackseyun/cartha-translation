id: 2KI.10.21
reference: 2 Kings 10:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יֵהוּא֙ בְּ/כָל יִשְׂרָאֵ֔ל וַ/יָּבֹ֨אוּ֙ כָּל עֹבְדֵ֣י הַ/בַּ֔עַל
    וְ/לֹֽא נִשְׁאַ֥ר אִ֖ישׁ אֲשֶׁ֣ר לֹֽא בָ֑א וַ/יָּבֹ֨אוּ֙ בֵּ֣ית הַ/בַּ֔עַל וַ/יִּמָּלֵ֥א
    בֵית הַ/בַּ֖עַל פֶּ֥ה לָ/פֶֽה־־־־־׃
translation:
  text: So Jehu sent throughout all Israel, and all the worshipers of Baal came; not
    a man was left who did not come. They entered the house of Baal, and the house
    of Baal was filled from end to end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'mouth to mouth,' an idiom meaning the house was completely
      filled, from one end to the other.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent throughout
  alternatives:
  - sent
  - sent word through
  lexicon: HALOT
  rationale: The verb שׁלח is simply 'send,' but with בְּכָל יִשְׂרָאֵל the sense
    is distributive, indicating Jehu sent a summons throughout all Israel rather than
    merely 'to' Israel.
- source_word: בְּכָל יִשְׂרָאֵל
  chosen: throughout all Israel
  alternatives:
  - in all Israel
  - to all Israel
  lexicon: HALOT
  rationale: The preposition ב with כָּל plus a territory naturally conveys scope
    within the land/population. 'Throughout all Israel' is idiomatic and preserves
    the comprehensive reach.
- source_word: עֹבְדֵי הַבַּעַל
  chosen: the worshipers of Baal
  alternatives:
  - the servants of Baal
  - those serving Baal
  lexicon: HALOT
  rationale: The participle from עבד can mean 'serve,' but in cultic context 'worshipers'
    best communicates religious devotion rather than household service.
- source_word: וְלֹא נִשְׁאַר אִישׁ אֲשֶׁר לֹא בָא
  chosen: not a man was left who did not come
  alternatives:
  - there was not left a man who had not come
  - no one remained who did not come
  lexicon: HALOT
  rationale: This clause emphasizes total attendance. 'Not a man was left' preserves
    the masculine singular אִישׁ in a representative sense, in line with the gender-accurate
    policy, while remaining natural English.
- source_word: וַיָּבֹאוּ בֵּית הַבַּעַל
  chosen: They entered the house of Baal
  alternatives:
  - they came into the house of Baal
  - they went into the temple of Baal
  lexicon: HALOT
  rationale: בוא with a building can be rendered 'enter' for natural English. 'House
    of Baal' is retained rather than 'temple of Baal' to stay closer to the Hebrew
    בֵּית while still understandable.
- source_word: בֵּית הַבַּעַל
  chosen: the house of Baal
  alternatives:
  - the temple of Baal
  lexicon: HALOT
  rationale: The Hebrew literally says 'house.' While it denotes a cultic shrine/temple,
    the more formal rendering preserves the source wording and biblical idiom.
- source_word: וַיִּמָּלֵא
  chosen: was filled
  alternatives:
  - filled up
  - became full
  lexicon: HALOT
  rationale: The Niphal of מלא is naturally passive/reflexive here. 'Was filled' is
    straightforward and idiomatic.
- source_word: פֶּה לָפֶה
  chosen: from end to end
  alternatives:
  - mouth to mouth
  - edge to edge
  - completely full
  lexicon: HALOT
  rationale: The idiom literally reads 'mouth to mouth' but denotes one extremity
    meeting the other, i.e., packed full across the whole space. 'From end to end'
    communicates the idiomatic sense in clear English.
