theological_decisions:
- issue: Gendered representative language in אִישׁ
  chosen_reading: not a man was left who did not come
  alternative_readings:
  - no one was left who did not come
  rationale: The Hebrew uses masculine singular אִישׁ representatively. Following
    the translation philosophy's gender-accurate principle, the draft preserves 'man'
    rather than neutralizing it, since the phrase is idiomatic and reflects the source
    form without creating doctrinal implications.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
