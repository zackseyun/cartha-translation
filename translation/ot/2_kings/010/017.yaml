id: 2KI.10.17
reference: 2 Kings 10:17
source:
  edition: WLC
  text: וַ/יָּבֹא֙ שֹֽׁמְר֔וֹן וַ֠/יַּךְ אֶת כָּל הַ/נִּשְׁאָרִ֧ים לְ/אַחְאָ֛ב בְּ/שֹׁמְר֖וֹן
    עַד הִשְׁמִיד֑/וֹ כִּ/דְבַ֣ר יְהוָ֔ה אֲשֶׁ֥ר דִּבֶּ֖ר אֶל אֵלִיָּֽהוּ־־־־׃פ
translation:
  text: When he came to Samaria, he struck down all who remained to Ahab in Samaria,
    until he had destroyed him, according to the word of the LORD that he had spoken
    to Elijah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until he had destroyed it,' with the suffix understood as referring
      collectively to Ahab's house rather than to Ahab personally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: When he came
  alternatives:
  - And he came
  - Then he came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'When he came' gives smooth
    modern English while preserving the temporal sense leading into the next action.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration for the place name.
- source_word: וַיַּךְ
  chosen: he struck down
  alternatives:
  - he killed
  - he attacked
  lexicon: HALOT
  rationale: נכה in this context refers to lethal violence. 'Struck down' is idiomatic
    and suitably grave without over-paraphrasing.
- source_word: כָּל הַנִּשְׁאָרִים
  chosen: all who remained
  alternatives:
  - all the survivors
  - all the remnant
  lexicon: HALOT
  rationale: The participle from שׁאר denotes those left remaining. 'All who remained'
    is natural English and avoids importing theological overtones of 'remnant' that
    are not foregrounded here.
- source_word: לְאַחְאָב
  chosen: to Ahab
  alternatives:
  - belonging to Ahab
  - of Ahab
  lexicon: HALOT
  rationale: The lamed marks relation/association. 'To Ahab' is a concise rendering
    that preserves the Hebrew linkage; in context it means those connected with Ahab's
    house.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  lexicon: HALOT
  rationale: Locative preposition; repeated from the Hebrew for fidelity, even though
    English could omit one occurrence for style.
- source_word: עַד הִשְׁמִידוֹ
  chosen: until he had destroyed him
  alternatives:
  - until he had wiped him out
  - until he had destroyed it
  lexicon: HALOT
  rationale: The verb שׁמד means destroy/exterminate. The singular suffix is formally
    'him,' likely a collective reference to Ahab/his house as represented in the remaining
    adherents. The singular is preserved rather than smoothing to a plural, because
    the Hebrew points to the eradication of Ahab's line as a unit.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the promise of the LORD
  - according to what the LORD had said
  lexicon: HALOT
  rationale: דבר here is best rendered 'word,' preserving the formulaic connection
    to prophetic fulfillment. YHWH is rendered 'the LORD' per doctrine.
- source_word: אֲשֶׁר דִּבֶּר אֶל אֵלִיָּהוּ
  chosen: that he had spoken to Elijah
  alternatives:
  - which he spoke to Elijah
  lexicon: HALOT
  rationale: Straightforward relative clause. 'Had spoken' fits the prior prophetic
    word fulfilled here.
