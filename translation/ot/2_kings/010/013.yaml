id: 2KI.10.13
reference: 2 Kings 10:13
source:
  edition: WLC
  text: וְ/יֵה֗וּא מָצָא֙ אֶת אֲחֵי֙ אֲחַזְיָ֣הוּ מֶֽלֶךְ יְהוּדָ֔ה וַ/יֹּ֖אמֶר מִ֣י
    אַתֶּ֑ם וַ/יֹּאמְר֗וּ אֲחֵ֤י אֲחַזְיָ֨הוּ֙ אֲנַ֔חְנוּ וַ/נֵּ֛רֶד לִ/שְׁל֥וֹם בְּנֵֽי
    הַ/מֶּ֖לֶךְ וּ/בְנֵ֥י הַ/גְּבִירָֽה־־־׃
translation:
  text: Jehu found the brothers of Ahaziah king of Judah and said, “Who are you?”
    They said, “We are the brothers of Ahaziah, and we have come down to ask about
    the welfare of the sons of the king and the sons of the queen mother.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'brothers of Ahaziah.' In royal narrative this can denote close relatives
      or kinsmen, not only literal brothers.
    reason: lexical_alternative
  - marker: b
    text: Or 'to see if all was well with the sons of the king and the sons of the
      queen mother.'
    reason: lexical_alternative
  - marker: c
    text: '''Queen mother'' renders Hebrew gebirah, a royal court title for the king''s
      mother.'
    reason: cultural_note
lexical_decisions:
- source_word: מָצָא
  chosen: found
  alternatives:
  - met
  - came upon
  lexicon: HALOT
  rationale: The verb plainly denotes encountering/finding them. 'Found' is the most
    direct and natural English rendering here.
- source_word: אֲחֵי אֲחַזְיָהוּ
  chosen: the brothers of Ahaziah
  alternatives:
  - the relatives of Ahaziah
  - the kinsmen of Ahaziah
  lexicon: HALOT
  rationale: Although in context these may be broader royal relatives rather than
    literal siblings, the Hebrew uses 'brothers,' and the translation philosophy prefers
    preserving the source term unless context requires otherwise. The broader sense
    is worth preserving in a footnote.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward royal title in construct with Ahaziah.
- source_word: מִי אַתֶּם
  chosen: Who are you?
  alternatives:
  - Who are you men?
  lexicon: HALOT
  rationale: Simple direct question; concise modern English best matches the Hebrew.
- source_word: וַנֵּרֶד
  chosen: we have come down
  alternatives:
  - we came down
  - we went down
  lexicon: HALOT
  rationale: The wayyiqtol reports their action of descending, likely geographically.
    'Have come down' reads naturally in English dialogue while preserving the motion.
    'Went down' is possible but less idiomatic from the speakers' perspective.
- source_word: לִשְׁלוֹם
  chosen: to ask about the welfare of
  alternatives:
  - to greet
  - for the well-being of
  - to see if all is well with
  lexicon: HALOT
  rationale: The idiom with ל plus שָׁלוֹם in this context means to inquire after
    someone's well-being, not merely to say hello. 'Ask about the welfare of' preserves
    the sense without paraphrasing too far.
- source_word: בְּנֵי הַמֶּלֶךְ
  chosen: the sons of the king
  alternatives:
  - the king's sons
  lexicon: HALOT
  rationale: A formally close rendering that remains natural in English. 'Sons' should
    be retained rather than generalized to 'children' because the Hebrew is specific.
- source_word: הַגְּבִירָה
  chosen: the queen mother
  alternatives:
  - the lady
  - the mistress
  - the great lady
  lexicon: HALOT
  rationale: In royal Judahite context, גְּבִירָה commonly refers to the king's mother
    as a court title. 'Queen mother' best conveys the institutional role, not merely
    a generic noblewoman.
- source_word: וּבְנֵי הַגְּבִירָה
  chosen: the sons of the queen mother
  alternatives:
  - the queen mother's sons
  lexicon: HALOT
  rationale: Kept parallel with 'the sons of the king.' Although the referent may
    overlap with royal family members already mentioned, the Hebrew presents them
    as a distinct phrase and should be translated as such.
