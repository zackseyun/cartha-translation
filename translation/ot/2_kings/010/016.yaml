id: 2KI.10.16
reference: 2 Kings 10:16
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ לְכָ֣/ה אִתִּ֔/י וּ/רְאֵ֖ה בְּ/קִנְאָתִ֣/י לַ/יהוָ֑ה וַ/יַּרְכִּ֥בוּ אֹת֖/וֹ בְּ/רִכְבּֽ/וֹ׃
translation:
  text: Then he said, “Come with me and see my zeal for Yahweh.” So they had him ride in his chariot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my jealousy for the LORD.' The Hebrew noun can denote either zeal or jealousy depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come along
  - Go
  lexicon: HALOT
  rationale: Imperative of הלך used idiomatically as an invitation or summons. 'Come' is the most natural English equivalent in this direct-speech context.
- source_word: אִתִּי
  chosen: with me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating accompaniment.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look at
  - and witness
  lexicon: HALOT
  rationale: Imperative of ראה. 'See' preserves the directness of the Hebrew; 'witness' is possible but slightly interpretive.
- source_word: בְּקִנְאָתִי
  chosen: my zeal
  alternatives:
  - my jealousy
  - my ardor
  lexicon: HALOT
  rationale: קִנְאָה can denote jealousy or zeal. In this context of claimed devotion to YHWH, 'zeal' best fits idiomatic English and avoids implying sinful envy.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  - for YHWH
  lexicon: HALOT
  rationale: 'The lamed marks direction/object of zeal: ''for the LORD.'' Per doctrine, יהוה is rendered ''the LORD'' in the main text.'
- source_word: וַיַּרְכִּבוּ אֹתוֹ
  chosen: they had him ride
  alternatives:
  - they made him ride
  - they took him up
  lexicon: HALOT
  rationale: 'Hiphil of רכב is causative: ''cause to ride.'' English idiom is best captured by ''had him ride,'' indicating that attendants placed or seated him for transport.'
- source_word: בְּרִכְבּוֹ
  chosen: in his chariot
  alternatives:
  - on his chariot
  lexicon: HALOT
  rationale: רֶכֶב here refers to a chariot/vehicle. 'In his chariot' is the natural English expression for riding as a passenger in this context.
