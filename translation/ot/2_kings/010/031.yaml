theological_decisions:
- issue: Evaluation of Jehu's covenant faithfulness
  chosen_reading: The verse presents Jehu as failing in wholehearted obedience to the LORD despite earlier reforms.
  alternative_readings:
  - The verse only criticizes incomplete political reform, not personal devotion.
  rationale: The explicit phrases 'with all his heart' and 'did not turn away from the sins of Jeroboam' frame the issue as covenantal and moral-religious, not merely political. The translation preserves that evaluative tension without overstating beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
