id: 2KI.10.31
reference: 2 Kings 10:31
source:
  edition: WLC
  text: וְ/יֵה֗וּא לֹ֥א שָׁמַ֛ר לָ/לֶ֛כֶת בְּ/תֽוֹרַת יְהוָ֥ה אֱלֹהֵֽי יִשְׂרָאֵ֖ל בְּ/כָל לְבָב֑/וֹ לֹ֣א סָ֗ר מֵ/עַל֙ חַטֹּ֣אות יָֽרָבְעָ֔ם אֲשֶׁ֥ר הֶחֱטִ֖יא אֶת יִשְׂרָאֵֽל־־־־׃
translation:
  text: But Jehu was not careful to walk in the law of Yahweh, the God of Israel, with all his heart. He did not turn away from the sins of Jeroboam, with which he caused Israel to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not keep to walking in the law of the LORD.' The Hebrew verb can emphasize careful observance.
    reason: lexical_alternative
  - marker: b
    text: That is, the cultic sins associated with Jeroboam's idolatrous system, a recurring formula in Kings.
    reason: cross_reference
lexical_decisions:
- source_word: שָׁמַר
  chosen: was not careful
  alternatives:
  - did not keep
  - did not take care
  lexicon: HALOT
  rationale: In the construction שָׁמַר + infinitive ('to keep/care to do'), the sense is not merely 'observe' but 'take care to' or 'be careful to.' This best reflects Jehu's failure of attentive obedience rather than only noncompliance.
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to live
  - to follow
  lexicon: HALOT
  rationale: '''Walk'' is a standard biblical metaphor for conduct and is natural English in this collocation (''walk in the law''). It preserves the Hebrew imagery without becoming wooden.'
- source_word: תּוֹרַת
  chosen: the law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: While תּוֹרָה can mean 'instruction,' in the covenantal phrase 'walk in the law of the LORD' the legal-covenantal sense is prominent. 'The law' is the most idiomatic and contextually fitting rendering here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּכָל לְבָבוֹ
  chosen: with all his heart
  alternatives:
  - with his whole heart
  lexicon: HALOT
  rationale: This is a conventional Hebrew expression for total inner devotion. 'With all his heart' is both accurate and idiomatic.
- source_word: סָר
  chosen: turn away
  alternatives:
  - depart
  - turn aside
  lexicon: HALOT
  rationale: The verb denotes removal or turning aside from something. 'Turn away' is clear modern English and fits the moral-religious context.
- source_word: חַטֹּאות
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: HALOT
  rationale: Plural 'sins' straightforwardly reflects the Hebrew plural and the Deuteronomistic formula concerning Jeroboam's cultic transgressions.
- source_word: הֶחֱטִיא
  chosen: caused ... to sin
  alternatives:
  - made ... sin
  - led ... into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' is the most direct and established rendering.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  chosen: by which he caused Israel to sin
  alternatives:
  - which he caused Israel to commit
  - with which he made Israel sin
  lexicon: HALOT
  rationale: The relative clause most naturally refers back to Jeroboam's sins as the means by which he caused Israel to sin. 'By which' makes that instrumental sense explicit in natural English.
- source_word: וְיֵהוּא
  chosen: But Jehu
  alternatives:
  - And Jehu
  - Now Jehu
  lexicon: HALOT
  rationale: The conjunction here is adversative in context, contrasting Jehu's zeal against Baal with his failure in covenant obedience. 'But' best conveys the discourse force.
