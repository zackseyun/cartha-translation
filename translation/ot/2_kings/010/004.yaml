id: 2KI.10.4
reference: 2 Kings 10:4
source:
  edition: WLC
  text: וַ/יִּֽרְאוּ֙ מְאֹ֣ד מְאֹ֔ד וַ/יֹּ֣אמְר֔וּ הִנֵּה֙ שְׁנֵ֣י הַ/מְּלָכִ֔ים לֹ֥א
    עָמְד֖וּ לְ/פָנָ֑י/ו וְ/אֵ֖יךְ נַעֲמֹ֥ד אֲנָֽחְנוּ׃
translation:
  text: But they were very, very afraid, and they said, “Look, the two kings could
    not stand before him; so how can we stand?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “could not withstand him … how can we withstand him?”
      The Hebrew uses the same verb, “stand,” in both clauses.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  chosen: they were afraid
  alternatives:
  - they feared
  - they became afraid
  lexicon: HALOT
  rationale: From ירא in the waw-consecutive narrative form. 'Were afraid' is natural
    modern English and preserves the emotional response without unnecessary archaism.
- source_word: מְאֹד מְאֹד
  chosen: very, very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: The doubled adverb intensifies the fear. Rendering both occurrences as
    'very, very' preserves the Hebrew repetition and rhetorical force better than
    collapsing to a single adverb.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  lexicon: HALOT
  rationale: הִנֵּה draws attention to what follows. 'Look' is readable modern English
    and keeps the deictic force; 'Behold' would be overly archaic.
- source_word: שְׁנֵי הַמְּלָכִים
  chosen: the two kings
  alternatives:
  - two kings
  lexicon: HALOT
  rationale: The construct numeral with article is most naturally rendered 'the two
    kings,' referring to the previously mentioned kings whose defeat is in view.
- source_word: לֹא עָמְדוּ לְפָנָיו
  chosen: could not stand before him
  alternatives:
  - did not stand before him
  - did not withstand him
  - could not hold their ground before him
  lexicon: HALOT
  rationale: עמד לפני in this context is idiomatic for being unable to withstand or
    oppose someone successfully. 'Could not stand before him' preserves the Hebrew
    image while making the implied inability explicit in context.
- source_word: וְאֵיךְ נַעֲמֹד אֲנָחְנוּ
  chosen: so how can we stand?
  alternatives:
  - and how shall we stand?
  - how can we withstand him?
  lexicon: HALOT
  rationale: The question is inferential from the prior clause. 'So how can we stand?'
    is concise and natural, preserving the same verb עמד for rhetorical parallelism
    with the previous clause.
