id: 2KI.10.2
reference: 2 Kings 10:2
source:
  edition: WLC
  text: וְ/עַתָּ֗ה כְּ/בֹ֨א הַ/סֵּ֤פֶר הַ/זֶּה֙ אֲלֵי/כֶ֔ם וְ/אִתְּ/כֶ֖ם בְּנֵ֣י אֲדֹנֵי/כֶ֑ם
    וְ/אִתְּ/כֶם֙ הָ/רֶ֣כֶב וְ/הַ/סּוּסִ֔ים וְ/עִ֥יר מִבְצָ֖ר וְ/הַ/נָּֽשֶׁק׃
translation:
  text: Now when this letter comes to you—since your master's sons are with you, and
    also the chariots and the horses, a fortified city, and the weapons—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when this document arrives to you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your master's sons'; that is, the sons of the king whom the recipients
      served.
    reason: cultural_note
  - marker: c
    text: Or 'a fortress city.' The phrase refers to a defensible city available to
      the recipients.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Discourse marker introducing the next step in Jehu's message. 'Now' is
    natural English; the prefixed conjunction can be absorbed without loss.
- source_word: כְּבֹא
  chosen: when ... comes
  alternatives:
  - at the coming of
  - when ... arrives
  lexicon: HALOT
  rationale: Infinitive construct of בוא with prefixed כ expresses temporal sense,
    'when/at the coming of.' With 'letter' as subject in English, 'when this letter
    comes' is idiomatic and faithful.
- source_word: הַסֵּפֶר הַזֶּה
  chosen: this letter
  alternatives:
  - this document
  - this scroll
  lexicon: HALOT
  rationale: In royal correspondence context, סֵפֶר refers to a written message/letter
    rather than a 'book.' 'This letter' best fits the narrative situation.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - to you all
  lexicon: HALOT
  rationale: Second person plural addressed to the rulers/elders/guardians in Samaria.
    Standard English 'to you' adequately carries the plural in context.
- source_word: וְאִתְּכֶם
  chosen: are with you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: The prepositional phrase is verbless in Hebrew within a circumstantial
    listing. English supplies 'are' for clarity.
- source_word: בְּנֵי אֲדֹנֵיכֶם
  chosen: your master's sons
  alternatives:
  - the sons of your lord
  - your lord's sons
  lexicon: HALOT
  rationale: אדון here refers to the recipients' royal master, Ahab. 'Master' is preferable
    to 'lord' in this political, non-divine setting and avoids confusion with divine
    title usage.
- source_word: הָרֶכֶב
  chosen: the chariots
  alternatives:
  - the chariot force
  - the chariotry
  lexicon: HALOT
  rationale: Collective noun for chariot resources. 'The chariots' is straightforward
    and readable; the military force sense is evident from context.
- source_word: וְהַסּוּסִים
  chosen: the horses
  alternatives:
  - the cavalry horses
  lexicon: HALOT
  rationale: Literal rendering of the accompanying military asset. No need to over-specify
    beyond the Hebrew.
- source_word: וְעִיר מִבְצָר
  chosen: a fortified city
  alternatives:
  - a fortified town
  - a strong city
  - a fortress city
  lexicon: HALOT
  rationale: Construct phrase meaning a fortified/fortress city. Indefinite in sense
    in English, referring to Samaria as a defensible urban center available to them.
- source_word: וְהַנָּשֶׁק
  chosen: the weapons
  alternatives:
  - the arms
  - the armor
  lexicon: HALOT
  rationale: נשק here denotes weaponry/arms generally. 'Weapons' is the clearest modern
    English choice; 'armor' would be too narrow.
