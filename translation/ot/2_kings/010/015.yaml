id: 2KI.10.15
reference: 2 Kings 10:15
source:
  edition: WLC
  text: וַ/יֵּ֣לֶךְ מִ/שָּׁ֡ם וַ/יִּמְצָ֣א אֶת יְהוֹנָדָב֩ בֶּן רֵכָ֨ב לִ/קְרָאת֜/וֹ
    וַֽ/יְבָרְכֵ֗/הוּ וַ/יֹּ֨אמֶר אֵלָ֜י/ו הֲ/יֵ֧שׁ אֶת לְבָבְ/ךָ֣ יָשָׁ֗ר כַּ/אֲשֶׁ֤ר
    לְבָבִ/י֙ עִם לְבָבֶ֔/ךָ וַ/יֹּ֨אמֶר יְהוֹנָדָ֥ב יֵ֛שׁ וָ/יֵ֖שׁ תְּנָ֣/ה אֶת יָדֶ֑/ךָ
    וַ/יִּתֵּ֣ן יָד֔/וֹ וַ/יַּעֲלֵ֥/הוּ אֵלָ֖י/ו אֶל הַ/מֶּרְכָּבָֽה־־־־־־׃
translation:
  text: He went on from there and found Jehonadab the son of Rechab coming to meet
    him. He greeted him and said to him, “Is your heart upright, as my heart is with
    your heart?” Jehonadab said, “It is, it is.” Jehu said, “Give me your hand.” So
    he gave him his hand, and Jehu took him up to himself into the chariot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He blessed him.' The Hebrew verb can mean 'bless,' but in this encounter
      setting it likely functions as a greeting or salutation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'Is your heart upright, as my heart is with your heart?' The wording
      expresses mutual loyalty or alignment of purpose.
    reason: lexical_alternative
  - marker: c
    text: Hebrew, 'It is, and it is'—an emphatic affirmation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ מִשָּׁם
  chosen: He went on from there
  alternatives:
  - He departed from there
  - He went from there
  lexicon: HALOT
  rationale: The wayyiqtol of הלך with מִשָּׁם marks continued movement from the previous
    location. 'Went on from there' gives natural English while preserving narrative
    progression.
- source_word: וַיִּמְצָא אֶת יְהוֹנָדָב בֶּן־רֵכָב
  chosen: found Jehonadab the son of Rechab
  alternatives:
  - met Jehonadab son of Rechab
  lexicon: HALOT
  rationale: מצא normally means 'find.' Although in context it functions like an encounter
    on the road, 'found' preserves the lexical sense better than the more interpretive
    'met.' Names are transliterated per project policy.
- source_word: לִקְרָאתוֹ
  chosen: coming to meet him
  alternatives:
  - to meet him
  - as he came to meet him
  lexicon: HALOT
  rationale: The preposition plus infinitive construct of קרא expresses motion for
    encounter. 'Coming to meet him' makes clear that Jehonadab was approaching Jehu.
- source_word: וַיְבָרְכֵהוּ
  chosen: He greeted him
  alternatives:
  - He blessed him
  - He saluted him
  lexicon: HALOT
  rationale: While ברך literally means 'bless,' in meeting scenes it can denote a
    greeting or salutation. 'Greeted' best fits the immediate social action without
    importing a formal blessing not explicit in context.
- source_word: הֲיֵשׁ אֶת־לְבָבְךָ יָשָׁר
  chosen: Is your heart upright
  alternatives:
  - Is your heart right
  - Is your heart honest
  lexicon: HALOT
  rationale: לֵבָב refers to the inner disposition or loyalty, and יָשָׁר means 'straight/upright.'
    'Upright' preserves both moral and relational integrity in Jehu's question.
- source_word: כַּאֲשֶׁר לְבָבִי עִם־לְבָבֶךָ
  chosen: as my heart is with your heart
  alternatives:
  - as my heart is toward your heart
  - as my heart is aligned with your heart
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic and relational. Retaining 'heart' on
    both sides preserves the metaphor of inward loyalty; 'with' reflects עִם without
    overinterpreting it.
- source_word: יֵשׁ וָיֵשׁ
  chosen: It is, it is
  alternatives:
  - Yes, it is
  - It is indeed
  lexicon: HALOT
  rationale: The repetition intensifies affirmation. 'It is, it is' preserves the
    emphatic duplication more transparently than smoothing it to a simple 'yes.'
- source_word: תְּנָה אֶת־יָדֶךָ
  chosen: Give me your hand
  alternatives:
  - Give your hand
  - Take my hand
  lexicon: HALOT
  rationale: The imperative of נתן plus 'your hand' is an idiom for extending the
    hand in pledge or assistance. 'Give me your hand' is idiomatic English and fits
    the subsequent action.
- source_word: וַיִּתֵּן יָדוֹ
  chosen: he gave him his hand
  alternatives:
  - he gave his hand
  - he extended his hand to him
  lexicon: HALOT
  rationale: This directly answers Jehu's request. Including 'him' clarifies the recipient
    in English though it is implicit from context.
- source_word: וַיַּעֲלֵהוּ אֵלָיו אֶל־הַמֶּרְכָּבָה
  chosen: Jehu took him up to himself into the chariot
  alternatives:
  - he brought him up to him into the chariot
  - he lifted him up to himself into the chariot
  lexicon: HALOT
  rationale: עלה in the Hiphil means 'cause to go up/bring up.' The phrase אֵלָיו
    adds the sense 'to himself,' likely into Jehu's own chariot. 'Took him up' is
    natural English while preserving the upward motion into the vehicle.
