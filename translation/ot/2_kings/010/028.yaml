id: 2KI.10.28
reference: 2 Kings 10:28
source:
  edition: WLC
  text: וַ/יַּשְׁמֵ֥ד יֵה֛וּא אֶת הַ/בַּ֖עַל מִ/יִּשְׂרָאֵֽל־׃
translation:
  text: So Jehu destroyed Baal from Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wiped out' / 'eliminated.' The Hebrew verb conveys causing destruction
      or removal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Baal'; English normally omits the article with the deity's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁמֵד
  chosen: destroyed
  alternatives:
  - wiped out
  - eliminated
  - eradicated
  lexicon: HALOT
  rationale: The Hiphil of שׁמד conveys causing destruction or extermination. 'Destroyed'
    is a clear, natural English rendering that preserves the force without over-specifying
    total eradication beyond the immediate context.
- source_word: יֵהוּא
  chosen: Jehu
  rationale: Personal names are transliterated by standard English convention.
- source_word: הַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  - Baal worship
  lexicon: HALOT
  rationale: Although the Hebrew has the article ('the Baal'), English idiom normally
    renders the deity's name simply as 'Baal.' The phrase refers to the Baal cult
    as represented in Israel; 'Baal' is concise and standard, while 'Baal worship'
    would be interpretive.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  lexicon: HALOT
  rationale: The preposition מִן marks separation/removal. 'From Israel' is the most
    direct and idiomatic rendering, indicating removal of Baal from the nation/kingdom
    of Israel.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  - Then
  rationale: The prefixed waw on the finite verb advances the narrative. 'So' gives
    smooth modern English narrative flow while preserving the consequential sense
    in context.
