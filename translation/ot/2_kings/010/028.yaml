theological_decisions:
- issue: Referent of 'Baal'
  chosen_reading: Baal is rendered as the name of the deity/cult removed from Israel,
    without expanding to a theological paraphrase.
  alternative_readings:
  - Baal worship
  - the worship of Baal
  rationale: The Hebrew object is simply 'the Baal.' Rendering it as 'Baal' preserves
    the source wording and lets the broader context supply that this entails suppression
    of Baal worship in Israel.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
