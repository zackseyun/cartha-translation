theological_decisions:
- issue: Narratorial evaluation of Jehu's action
  chosen_reading: But Jehu did it in deceit
  alternative_readings:
  - Now Jehu had done it with cunning
  - Jehu acted by trickery
  rationale: The Hebrew narrator explicitly identifies Jehu's summons as deceptive
    strategy. The translation preserves the moral and narrative tension without softening
    or justifying his conduct.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic masculine אִישׁ
  chosen_reading: let not a man be missing
  alternative_readings:
  - let no one be missing
  rationale: Following the gender-accurate principle, the singular masculine form
    is retained in English because it matches the source's representative usage. A
    more inclusive alternative is possible but would flatten the Hebrew form.
  doctrine_reference: Gender-accurate over gender-neutral.
