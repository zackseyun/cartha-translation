id: 2KI.10.19
reference: 2 Kings 10:19
source:
  edition: WLC
  text: וְ/עַתָּ֣ה כָל נְבִיאֵ֣י הַ/בַּ֡עַל כָּל עֹבְדָ֣י/ו וְ/כָל כֹּהֲנָי/ו֩ קִרְא֨וּ
    אֵלַ֜/י אִ֣ישׁ אַל יִפָּקֵ֗ד כִּי֩ זֶ֨בַח גָּד֥וֹל לִ/י֙ לַ/בַּ֔עַל כֹּ֥ל אֲשֶׁר
    יִפָּקֵ֖ד לֹ֣א יִֽחְיֶ֑ה וְ/יֵהוּא֙ עָשָׂ֣ה בְ/עָקְבָּ֔ה לְמַ֥עַן הַאֲבִ֖יד אֶת
    עֹבְדֵ֥י הַ/בָּֽעַל־־־־־־׃
translation:
  text: Now summon to me all the prophets of Baal, all his worshipers, and all his
    priests; let not a man be missing, for I have a great sacrifice for Baal. Whoever
    is missing shall not live.” But Jehu did it in deceit, in order to destroy the
    worshipers of Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “let no one be missing.” The Hebrew reads “let not a man be missing,”
      using a singular masculine form generically.
    reason: lexical_alternative
  - marker: b
    text: Or, “with cunning” / “by trickery.”
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאֵי הַבַּעַל
  chosen: the prophets of Baal
  alternatives:
  - Baal's prophets
  lexicon: HALOT
  rationale: Construct chain with proper name; 'prophets of Baal' is the most natural
    modern English rendering and preserves the cultic reference.
- source_word: עֹבְדָיו
  chosen: his worshipers
  alternatives:
  - his servants
  - those who serve him
  lexicon: HALOT
  rationale: From עבד in a cultic context, referring to those devoted to Baal's service.
    'Worshipers' communicates religious allegiance more clearly than the more ambiguous
    'servants'.
- source_word: כֹּהֲנָיו
  chosen: his priests
  lexicon: HALOT
  rationale: Standard rendering for cultic officials; the 3ms suffix refers back to
    Baal.
- source_word: קִרְאוּ אֵלַי
  chosen: summon to me
  alternatives:
  - call to me
  - gather to me
  lexicon: HALOT
  rationale: Imperative plural of קרא with אֶל conveys calling or summoning persons
    into Jehu's presence. 'Summon' fits the administrative tone.
- source_word: אִישׁ אַל יִפָּקֵד
  chosen: let not a man be missing
  alternatives:
  - let no one be absent
  - let not a single man be unaccounted for
  lexicon: HALOT
  rationale: The Niphal of פקד here means to be missing/absent from a muster. 'A man'
    reflects the singular אִישׁ and preserves the Hebrew's gendered form used generically
    for each individual attendee.
- source_word: זֶבַח גָּדוֹל
  chosen: a great sacrifice
  alternatives:
  - a great slaughter offering
  - a grand sacrifice
  lexicon: HALOT
  rationale: זבח is the ordinary term for a sacrifice/slaughter offering. 'Great sacrifice'
    is idiomatic and preserves the sacrificial setting without over-specifying the
    ritual type.
- source_word: כֹּל אֲשֶׁר יִפָּקֵד לֹא יִחְיֶה
  chosen: Whoever is missing shall not live
  alternatives:
  - Everyone who is absent shall die
  - Anyone who is missing will not remain alive
  lexicon: HALOT
  rationale: Reuses the same sense of פקד as 'be missing/absent.' 'Shall not live'
    closely reflects לֹא יִחְיֶה while preserving the threat's starkness.
- source_word: בְעָקְבָּה
  chosen: in deceit
  alternatives:
  - with cunning
  - by trickery
  lexicon: HALOT
  rationale: The noun denotes deceit or treachery. 'In deceit' is slightly formal
    but concise and matches the narrator's evaluative comment about Jehu's stratagem.
- source_word: לְמַעַן הַאֲבִיד
  chosen: in order to destroy
  alternatives:
  - so that he might wipe out
  - to exterminate
  lexicon: HALOT
  rationale: Purpose clause with Hiphil of אבד. 'Destroy' is strong and direct without
    importing a more technical nuance than the Hebrew requires.
- source_word: עֹבְדֵי הַבָּעַל
  chosen: the worshipers of Baal
  alternatives:
  - the servants of Baal
  - those serving Baal
  lexicon: HALOT
  rationale: As earlier in the verse, the cultic context favors 'worshipers' over
    the less specific 'servants,' and consistency is maintained within the verse.
