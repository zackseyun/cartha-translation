theological_decisions:
- issue: Rendering of the Baal sanctuary term
  chosen_reading: the house of Baal
  alternative_readings:
  - the temple of Baal
  rationale: No doctrinal issue is at stake, but retaining 'house' preserves the Hebrew
    wording and avoids over-interpreting the architectural term while still clearly
    referring to a cult site.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of the desecration term למחראות
  chosen_reading: a latrine
  alternative_readings:
  - a privy
  - a dung place
  rationale: The text emphasizes the complete profanation of Baal's cult site. 'Latrine'
    communicates this plainly in modern English without euphemism or archaic diction.
  doctrine_reference: Translation philosophy §6
