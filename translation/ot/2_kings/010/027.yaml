id: 2KI.10.27
reference: 2 Kings 10:27
source:
  edition: WLC
  text: וַֽ/יִּתְּצ֔וּ אֵ֖ת מַצְּבַ֣ת הַ/בָּ֑עַל וַֽ/יִּתְּצוּ֙ אֶת בֵּ֣ית הַ/בַּ֔עַל
    וַ/יְשִׂמֻ֥/הוּ ל/מחראות עַד הַ/יּֽוֹם־־׃
translation:
  text: They tore down the pillar of Baal, and they tore down the house of Baal, and
    made it a latrine to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of Baal.' Hebrew literally, 'the house of Baal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּצוּ
  chosen: they tore down
  alternatives:
  - they broke down
  - they demolished
  lexicon: HALOT
  rationale: The verb נתץ in the wayyiqtol plural denotes forceful destruction of
    a structure or cult object. 'Tore down' is natural modern English and fits both
    the pillar and the temple building.
- source_word: מַצְּבַת
  chosen: the pillar
  alternatives:
  - the sacred pillar
  - the standing stone
  lexicon: HALOT
  rationale: מַצֵּבָה commonly refers to a cultic standing stone or pillar. 'Pillar'
    is concise and readable in context; 'sacred pillar' is possible but the association
    with Baal already signals its cultic function.
- source_word: הַבָּעַל
  chosen: of Baal
  lexicon: HALOT
  rationale: בעל here is the proper name/title of the Canaanite deity, best transliterated
    as 'Baal' per the policy to transliterate names.
- source_word: בֵּית הַבַּעַל
  chosen: the house of Baal
  alternatives:
  - the temple of Baal
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In a cultic context it can mean temple,
    but 'house of Baal' preserves the Hebrew expression while remaining clear in English.
- source_word: וַיְשִׂמֻהוּ
  chosen: made it
  alternatives:
  - turned it into
  - set it as
  lexicon: HALOT
  rationale: שׂוּם with object suffix plus ל expresses appointing or making something
    into something else. 'Made it' is idiomatic and sufficiently direct.
- source_word: למחראות
  chosen: a latrine
  alternatives:
  - a privy
  - a place for refuse
  lexicon: HALOT
  rationale: The noun refers to a place for excrement or a latrine. 'Latrine' is the
    clearest modern rendering and preserves the deliberate desecration implied by
    the text.
- source_word: עַד הַיּוֹם
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom indicating the condition continued up
    to the narrator's present. 'To this day' is the conventional and natural English
    equivalent.
