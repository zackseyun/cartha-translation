id: 2KI.10.9
reference: 2 Kings 10:9
source:
  edition: WLC
  text: וַ/יְהִ֤י בַ/בֹּ֨קֶר֙ וַ/יֵּצֵ֣א וַֽ/יַּעֲמֹ֔ד וַ/יֹּ֨אמֶר֙ אֶל כָּל הָ/עָ֔ם
    צַדִּקִ֖ים אַתֶּ֑ם הִנֵּ֨ה אֲנִ֜י קָשַׁ֤רְתִּי עַל אֲדֹנִ/י֙ וָ/אֶהְרְגֵ֔/הוּ
    וּ/מִ֥י הִכָּ֖ה אֶת כָּל אֵֽלֶּה־־־־־׃
translation:
  text: And it happened in the morning that he went out and stood and said to all
    the people, “You are innocent. Look, I conspired against my master and killed
    him, but who struck down all these?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You are righteous” / “You are in the right.” The Hebrew can denote being
      just or being free from blame; here the public-judicial sense favors “innocent.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַבֹּקֶר
  chosen: And it happened in the morning
  alternatives:
  - In the morning
  - When morning came
  lexicon: HALOT
  rationale: Retains the common Hebrew narrative formula while keeping readable English.
    'And it happened' reflects וַיְהִי without over-wooden literalism.
- source_word: וַיֵּצֵא וַיַּעֲמֹד
  chosen: he went out and stood
  alternatives:
  - he came out and stood
  - he went out and took his stand
  lexicon: HALOT
  rationale: A straightforward rendering of the sequential wayyiqtol verbs; 'stood'
    preserves the public, formal posture before speaking.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  - all the crowd
  lexicon: HALOT
  rationale: Standard rendering for broad public address; 'people' is natural and
    sufficiently formal.
- source_word: צַדִּקִים אַתֶּם
  chosen: You are innocent
  alternatives:
  - You are righteous
  - You are in the right
  lexicon: HALOT
  rationale: In this judicial/public-defense context, the sense is forensic rather
    than moral excellence. Jehu is declaring the people free of blame, so 'innocent'
    best captures the force in idiomatic English.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention in readable modern English. 'Behold' would
    be more formal but less natural for the target style.
- source_word: קָשַׁרְתִּי עַל
  chosen: I conspired against
  alternatives:
  - I plotted against
  - I made a conspiracy against
  lexicon: HALOT
  rationale: The verb קשר with עַל commonly denotes conspiracy or plotting against
    someone. 'Conspired against' is concise and accurate.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: Here the referent is Jehu's royal superior/master, not the divine title.
    'My master' avoids confusion with 'Lord' and fits the political context.
- source_word: וָאֶהְרְגֵהוּ
  chosen: and killed him
  alternatives:
  - and slew him
  lexicon: HALOT
  rationale: Plain modern English for הרג with 3ms suffix; 'slew' is archaic for the
    stated translation philosophy.
- source_word: וּמִי הִכָּה
  chosen: but who struck down
  alternatives:
  - and who struck
  - but who killed
  lexicon: HALOT
  rationale: 'The conjunction is rendered adversatively in context to sharpen Jehu''s
    rhetorical contrast: he killed one man, but someone else killed the rest. ''Struck
    down'' reflects נכה idiomatically in a lethal context.'
- source_word: כָּל אֵלֶּה
  chosen: all these
  alternatives:
  - all of these
  - all these men
  lexicon: HALOT
  rationale: The demonstrative is left slightly open as in Hebrew; the immediate context
    makes the referent clear without adding 'men' to the text.
