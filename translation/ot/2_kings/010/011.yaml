id: 2KI.10.11
reference: 2 Kings 10:11
source:
  edition: WLC
  text: וַ/יַּ֣ךְ יֵה֗וּא אֵ֣ת כָּל הַ/נִּשְׁאָרִ֤ים לְ/בֵית אַחְאָב֙ בְּ/יִזְרְעֶ֔אל
    וְ/כָל גְּדֹלָ֖י/ו וּ/מְיֻדָּעָ֣י/ו וְ/כֹהֲנָ֑י/ו עַד בִּלְתִּ֥י הִשְׁאִֽיר ל֖/וֹ
    שָׂרִֽיד־־־־־׃
translation:
  text: So Jehu struck down all who remained of the house of Ahab in Jezreel, and
    all his great men, his close associates, and his priests, until he left him no
    survivor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his nobles' for 'his great men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his acquaintances' or 'his intimates' for 'his close associates.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'until he left him no survivor,' with 'him' referring to Ahab
      or to the house of Ahab.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: HALOT
  rationale: נכה in this narrative context denotes lethal violence. 'Struck down'
    is natural modern English and preserves the force without archaic 'smote.'
- source_word: הַנִּשְׁאָרִים
  chosen: who remained
  alternatives:
  - the survivors
  - those left
  lexicon: HALOT
  rationale: From שׁאר, referring to those still left alive from Ahab's house. Rendering
    as a relative clause reads naturally in English after 'all' while preserving the
    remnant sense.
- source_word: לְבֵית אַחְאָב
  chosen: of the house of Ahab
  alternatives:
  - belonging to the house of Ahab
  - from Ahab's house
  lexicon: HALOT
  rationale: The phrase identifies dynastic affiliation. 'Of the house of Ahab' is
    the standard and clear rendering for royal-house language.
- source_word: בְּיִזְרְעֶאל
  chosen: in Jezreel
  alternatives:
  - at Jezreel
  lexicon: HALOT
  rationale: Locative preposition is best rendered 'in' for the city setting.
- source_word: גְּדֹלָיו
  chosen: his great men
  alternatives:
  - his nobles
  - his leading men
  lexicon: HALOT
  rationale: גדולים here refers to socially or politically prominent figures attached
    to Ahab. 'Great men' is a fairly literal rendering; 'nobles' is possible but slightly
    more interpretive.
- source_word: מְיֻדָּעָיו
  chosen: his close associates
  alternatives:
  - his acquaintances
  - those known to him
  - his intimates
  lexicon: HALOT
  rationale: From ידע in the passive/participle sense of those known to someone; in
    context it likely means associates or intimates rather than mere acquaintances.
    'Close associates' conveys relational and political proximity.
- source_word: כֹהֲנָיו
  chosen: his priests
  alternatives:
  - his priestly officials
  lexicon: HALOT
  rationale: The plain sense is 'his priests,' likely priests associated with Ahab's
    royal/religious establishment. No need to narrow beyond the Hebrew.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לוֹ שָׂרִיד
  chosen: until he left him no survivor
  alternatives:
  - until he left him none remaining
  - until he left no survivor to him
  lexicon: HALOT
  rationale: This idiom expresses total annihilation of Ahab's line/supporters. 'No
    survivor' is idiomatic English for שָׂרִיד. The pronoun לוֹ most naturally refers
    to Ahab/the house of Ahab, retained as 'him' rather than expanded in the main
    text.
