id: 2KI.10.33
reference: 2 Kings 10:33
source:
  edition: WLC
  text: מִן הַ/יַּרְדֵּן֙ מִזְרַ֣ח הַ/שֶּׁ֔מֶשׁ אֵ֚ת כָּל אֶ֣רֶץ הַ/גִּלְעָ֔ד הַ/גָּדִ֥י
    וְ/הָ/רֻאובֵנִ֖י וְ/הַֽ/מְנַשִּׁ֑י מֵ/עֲרֹעֵר֙ אֲשֶׁ֣ר עַל נַ֣חַל אַרְנֹ֔ן וְ/הַ/גִּלְעָ֖ד
    וְ/הַ/בָּשָֽׁן־־־׃
translation:
  text: from the Jordan eastward, all the land of Gilead—the Gadites, the Reubenites,
    and the Manassites—from Aroer, which is by the Arnon Valley, even Gilead and Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is on the Arnon'; the Hebrew נַחַל can refer to a riverbed, wadi,
      or valley.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַיַּרְדֵּן
  chosen: from the Jordan
  alternatives:
  - from the Jordan River
  lexicon: HALOT
  rationale: הַיַּרְדֵּן is the proper name of the river; English commonly uses 'the
    Jordan' without repeating 'River.' The preposition מִן marks the territorial starting
    point.
- source_word: מִזְרַח הַשֶּׁמֶשׁ
  chosen: eastward
  alternatives:
  - toward the sunrise
  - to the east
  lexicon: HALOT
  rationale: Literally 'toward the rising of the sun.' In geographic description,
    idiomatic English 'eastward' best conveys the sense without unnecessary stiffness.
- source_word: אֵת כָּל אֶרֶץ הַגִּלְעָד
  chosen: all the land of Gilead
  alternatives:
  - the whole land of Gilead
  - all the territory of Gilead
  lexicon: HALOT
  rationale: אֵת marks the direct object of the preceding verb from v. 32 ('he began
    to cut off'). כָּל אֶרֶץ is naturally rendered 'all the land/territory.' 'Land
    of Gilead' preserves the regional designation.
- source_word: הַגָּדִי וְהָרֻאובֵנִי וְהַמְנַשִּׁי
  chosen: the Gadites, the Reubenites, and the Manassites
  alternatives:
  - Gad, Reuben, and Manasseh
  - the Gadite, the Reubenite, and the Manassite
  lexicon: HALOT
  rationale: These gentilics denote the tribal groups inhabiting Transjordan. English
    plural ethnics communicate the collective sense more clearly than singular gentilics.
- source_word: מֵעֲרֹעֵר
  chosen: from Aroer
  alternatives: []
  lexicon: HALOT
  rationale: Marks the southern boundary point of the territory. Standard transliteration
    of the place name is retained.
- source_word: אֲשֶׁר עַל נַחַל אַרְנֹן
  chosen: which is by the Arnon Valley
  alternatives:
  - which is on the Arnon
  - which is by the Wadi Arnon
  - which is beside the Arnon River
  lexicon: HALOT
  rationale: נַחַל can denote a wadi/valley/torrent-bed. In this geographic boundary
    formula, 'Arnon Valley' is a clear modern-English rendering. 'Which is by' reflects
    עַל in a locative sense.
- source_word: וְהַגִּלְעָד וְהַבָּשָׁן
  chosen: even Gilead and Bashan
  alternatives:
  - and Gilead and Bashan
  - including Gilead and Bashan
  lexicon: HALOT
  rationale: The repeated conjunction likely appends a fuller specification of the
    extent of the territory. 'Even' signals continuation/intensification in English
    and helps the sentence read naturally while preserving the additive force.
