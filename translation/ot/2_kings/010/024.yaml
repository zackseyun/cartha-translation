id: 2KI.10.24
reference: 2 Kings 10:24
source:
  edition: WLC
  text: וַ/יָּבֹ֕אוּ לַ/עֲשׂ֖וֹת זְבָחִ֣ים וְ/עֹל֑וֹת וְ/יֵה֞וּא שָׂם ל֤/וֹ בַ/חוּץ֙
    שְׁמֹנִ֣ים אִ֔ישׁ וַ/יֹּ֗אמֶר הָ/אִ֤ישׁ אֲשֶׁר יִמָּלֵט֙ מִן הָ/אֲנָשִׁ֗ים אֲשֶׁ֤ר
    אֲנִי֙ מֵבִ֣יא עַל יְדֵי/כֶ֔ם נַפְשׁ֖/וֹ תַּ֥חַת נַפְשֽׁ/וֹ־־־־׃
translation:
  text: And they went in to offer sacrifices and burnt offerings. Now Jehu had stationed
    for himself outside eighty men, and he said, “The man who lets any of the men
    whom I am delivering into your hands escape—his life for that man’s life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'his life instead of his life'; the sense is that the
      guard who allows an escape will forfeit his own life in place of the escapee’s
      life.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: they went in
  alternatives:
  - they entered
  - they came in
  lexicon: HALOT
  rationale: The verb בוא in narrative commonly means 'come/go/enter' depending on
    viewpoint. Here the movement is into the temple precincts for worship activity,
    so 'went in' is natural English and preserves the directional sense.
- source_word: לַעֲשׂוֹת
  chosen: to offer
  alternatives:
  - to do
  - to make
  lexicon: HALOT
  rationale: Although עשה is literally 'do/make,' with sacrificial objects it idiomatically
    means to perform or offer sacrifices. 'To offer' best reflects the cultic idiom
    in clear English without paraphrasing beyond the context.
- source_word: זְבָחִים
  chosen: sacrifices
  alternatives:
  - sacrificial offerings
  lexicon: HALOT
  rationale: Standard rendering for זבחים in sacrificial contexts. It is broad enough
    to pair naturally with the more specific 'burnt offerings' that follows.
- source_word: וְעֹלוֹת
  chosen: and burnt offerings
  alternatives:
  - and whole burnt offerings
  lexicon: HALOT
  rationale: עלה in cultic usage refers to the offering that goes up in smoke. 'Burnt
    offerings' is the established and accurate English equivalent.
- source_word: שָׂם לוֹ
  chosen: had stationed for himself
  alternatives:
  - set for himself
  - posted for himself
  - placed
  lexicon: HALOT
  rationale: שׂים means 'set/place,' but in a military/security context with men positioned
    outside, 'stationed' or 'posted' is the natural sense. The לּוֹ is retained with
    'for himself,' indicating Jehu personally arranged this guard detail.
- source_word: בַחוּץ
  chosen: outside
  alternatives:
  - on the outside
  lexicon: HALOT
  rationale: Simple locative adverb; 'outside' is the most idiomatic rendering.
- source_word: שְׁמֹנִים אִישׁ
  chosen: eighty men
  alternatives:
  - eighty soldiers
  lexicon: HALOT
  rationale: The Hebrew says 'eighty men' without specifying soldiers. Since they
    function as guards, 'soldiers' is possible but more specific than the text warrants,
    so 'eighty men' is retained.
- source_word: הָאִישׁ אֲשֶׁר יִמָּלֵט
  chosen: The man who lets any ... escape
  alternatives:
  - Whoever allows ... to escape
  - The man from whom ... escapes
  lexicon: HALOT
  rationale: 'The Niphal of מלט means ''escape.'' In context Jehu addresses the guards
    and warns them against allowing escape. English requires making explicit the causative
    responsibility implied by the situation: the guard who lets one escape. This best
    captures the force of the warning.'
- source_word: מִן הָאֲנָשִׁים
  chosen: any of the men
  alternatives:
  - one of the men
  - from the men
  lexicon: HALOT
  rationale: The singular warning applies to any individual among the group Jehu is
    handing over. 'Any of the men' conveys the distributive sense naturally.
- source_word: אֲשֶׁר אֲנִי מֵבִיא עַל יְדֵיכֶם
  chosen: whom I am delivering into your hands
  alternatives:
  - whom I am bringing into your hands
  - whom I am placing in your power
  lexicon: HALOT
  rationale: The idiom 'bring into the hand of' means to hand over or deliver into
    someone's power. 'Delivering into your hands' preserves the Hebrew idiom while
    remaining readable.
- source_word: נַפְשׁוֹ תַּחַת נַפְשׁוֹ
  chosen: his life for that man’s life
  alternatives:
  - his life in place of his life
  - his life for his life
  lexicon: HALOT
  rationale: נפש here means 'life,' not 'soul' in a narrow sense. Because English
    would be ambiguous with two identical pronouns, 'that man's' clarifies that the
    first life is the negligent guard's and the second is the escaped captive's. This
    preserves the lex talionis-style penalty formula.
