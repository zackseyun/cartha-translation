id: 2KI.10.29
reference: 2 Kings 10:29
source:
  edition: WLC
  text: רַ֠ק חֲטָאֵ֞י יָרָבְעָ֤ם בֶּן נְבָט֙ אֲשֶׁ֣ר הֶחֱטִ֣יא אֶת יִשְׂרָאֵ֔ל לֹֽא
    סָ֥ר יֵה֖וּא מֵ/אַֽחֲרֵי/הֶ֑ם עֶגְלֵי֙ הַ/זָּהָ֔ב אֲשֶׁ֥ר בֵּֽית אֵ֖ל וַ/אֲשֶׁ֥ר
    בְּ/דָֽן־־־־׃ס
translation:
  text: Only, Jehu did not turn away from following the sins of Jeroboam son of Nebat,
    by which he caused Israel to sin—the golden calves that were at Bethel and at
    Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not depart from them'; the Hebrew idiom is literally 'did not turn
      away from after them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: Only
  alternatives:
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: Introduces a limiting exception to Jehu's otherwise positive actions
    in the context. 'Only' is concise and idiomatic in English while preserving the
    adversative/restrictive force.
- source_word: חֲטָאֵי
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: HALOT
  rationale: The plural construct naturally refers to the specific sins associated
    with Jeroboam's cultic policy. 'Sins' is the most direct and transparent rendering.
- source_word: הֶחֱטִיא
  chosen: caused ... to sin
  alternatives:
  - made ... sin
  - led ... into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Israel to sin' preserves that
    causative force more explicitly than the smoother but slightly interpretive 'led
    into sin.'
- source_word: לֹא סָר
  chosen: did not turn away
  alternatives:
  - did not depart
  - did not turn aside
  lexicon: HALOT
  rationale: This idiom expresses ceasing from or abandoning a course. 'Did not turn
    away' is natural modern English and fits the following מן + אחרי idiom.
- source_word: מֵאַחֲרֵיהֶם
  chosen: from following
  alternatives:
  - from after them
  - away from them
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves going 'from after' something, meaning
    to stop following it. 'From following' best captures the sense in readable English.
- source_word: עֶגְלֵי הַזָּהָב
  chosen: the golden calves
  alternatives:
  - the calves of gold
  lexicon: HALOT
  rationale: This is the appositional specification of Jeroboam's sins. 'The golden
    calves' is standard, clear English and preserves the concrete cultic referent.
- source_word: אֲשֶׁר בֵּית אֵל וַאֲשֶׁר בְּדָן
  chosen: that were at Bethel and at Dan
  alternatives:
  - which were in Bethel and in Dan
  lexicon: HALOT
  rationale: The relative clauses identify the locations of the calves. 'At' is more
    idiomatic than 'in' for shrine locations in English narrative.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - Beth-el
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: דָּן
  chosen: Dan
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
