theological_decisions:
- issue: Relation of 'the sins of Jeroboam' to 'the golden calves'
  chosen_reading: The phrase 'the golden calves' is rendered appositionally, identifying
    the specific sins Jehu continued to follow.
  alternative_readings:
  - The phrase could be taken as a resumptive clarification after a break in syntax.
  rationale: The Hebrew moves from the abstract 'sins of Jeroboam' to the concrete
    cult objects. Rendering with an em dash preserves the explanatory force without
    overcomplicating the sentence.
