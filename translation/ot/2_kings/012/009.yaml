id: 2KI.12.9
reference: 2 Kings 12:9
source:
  edition: WLC
  text: וַ/יֵּאֹ֖תוּ הַ/כֹּֽהֲנִ֑ים לְ/בִלְתִּ֤י קְחַת כֶּ֨סֶף֙ מֵ/אֵ֣ת הָ/עָ֔ם וּ/לְ/בִלְתִּ֥י
    חַזֵּ֖ק אֶת בֶּ֥דֶק הַ/בָּֽיִת־־׃
translation:
  text: But the priests agreed not to take money from the people and not to repair
    the damage of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'not to strengthen the damage of the house,' an idiom
      meaning to repair the temple's damage.
    reason: lexical_alternative
  - marker: b
    text: '''House'' here refers to the house of the LORD, that is, the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּאֹתוּ
  chosen: agreed
  alternatives:
  - consented
  - were willing
  lexicon: HALOT
  rationale: The verb from אבה here denotes consent or willingness. 'Agreed' is natural
    modern English and fits the infinitive clauses that follow.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in this temple-administration context.
- source_word: לְבִלְתִּי קְחַת
  chosen: not to take
  alternatives:
  - to no longer take
  - to refrain from taking
  lexicon: HALOT
  rationale: לְבִלְתִּי with infinitive expresses negated purpose/result or agreement
    not to do something. 'Not to take' is concise and accurate.
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Though literally 'silver,' in administrative and payment contexts it
    commonly means money. 'Money' best conveys the sense in readable English.
- source_word: מֵאֵת הָעָם
  chosen: from the people
  alternatives:
  - from the populace
  lexicon: HALOT
  rationale: Straightforward source-based rendering of the prepositional phrase.
- source_word: וּלְבִלְתִּי חַזֵּק
  chosen: and not to repair
  alternatives:
  - and not to strengthen
  - and not to make repairs to
  lexicon: HALOT
  rationale: חזק literally means 'strengthen,' but with בדק הבית it refers to undertaking
    repairs/restoration. 'Repair' communicates the idiomatic sense without over-paraphrase.
- source_word: אֶת בֶּדֶק הַבָּיִת
  chosen: the damage of the house
  alternatives:
  - the damages of the temple
  - the needed repairs of the house
  lexicon: HALOT
  rationale: בדק denotes a breach, crack, or damage needing repair. 'House' here refers
    to the temple, but retaining 'house' preserves the Hebrew expression while 'damage'
    clarifies the object of repair.
