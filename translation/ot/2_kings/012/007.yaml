id: 2KI.12.7
reference: 2 Kings 12:7
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/שְׁנַ֨ת עֶשְׂרִ֧ים וְ/שָׁלֹ֛שׁ שָׁנָ֖ה לַ/מֶּ֣לֶךְ יְהוֹאָ֑שׁ
    לֹֽא חִזְּק֥וּ הַ/כֹּהֲנִ֖ים אֶת בֶּ֥דֶק הַ/בָּֽיִת־־׃
translation:
  text: Now it happened in the twenty-third year of King Jehoash that the priests
    had not repaired the damage of the house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the breaches of the house.' Here 'house' refers to the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now it happened
  alternatives:
  - And it happened
  - It came about
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new stage in the account. 'Now
    it happened' preserves the discourse function in readable modern English better
    than the more wooden 'And it happened.'
- source_word: בִּשְׁנַת עֶשְׂרִים וְשָׁלֹשׁ שָׁנָה
  chosen: in the twenty-third year
  alternatives:
  - in year twenty-three
  - in the twenty and third year
  lexicon: HALOT
  rationale: Standard regnal-year dating formula. English idiom naturally compresses
    the Hebrew number expression into the ordinal 'twenty-third year.'
- source_word: לַמֶּלֶךְ יְהוֹאָשׁ
  chosen: of King Jehoash
  alternatives:
  - for King Jehoash
  - belonging to King Jehoash
  lexicon: HALOT
  rationale: The lamed with 'king' in regnal formulas marks the reign reference point.
    'Of King Jehoash' is the natural English rendering.
- source_word: לֹא חִזְּקוּ
  chosen: had not repaired
  alternatives:
  - had not strengthened
  - had not restored
  lexicon: HALOT
  rationale: The verb חזק literally means 'strengthen,' but with בדק הבית it idiomatically
    refers to making structural repairs. 'Had not repaired' communicates the intended
    sense in context without wooden literalism.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the subject noun.
- source_word: בֶּדֶק הַבָּיִת
  chosen: the damage of the house
  alternatives:
  - the breaches of the house
  - the repairs of the house
  - the damage to the temple
  lexicon: HALOT
  rationale: בדק denotes a fissure, breach, or damaged condition requiring repair.
    Rendering it as 'damage' best fits the object of 'repair.' 'House' is retained
    rather than 'temple' because the Hebrew says 'house,' though in context it refers
    to the temple.
