id: 2KI.12.14
reference: 2 Kings 12:14
source:
  edition: WLC
  text: אַךְ֩ לֹ֨א יֵעָשֶׂ֜ה בֵּ֣ית יְהוָ֗ה סִפּ֥וֹת כֶּ֨סֶף֙ מְזַמְּר֤וֹת מִזְרָקוֹת֙ חֲצֹ֣צְר֔וֹת כָּל כְּלִ֥י זָהָ֖ב וּ/כְלִי כָ֑סֶף מִן הַ/כֶּ֖סֶף הַ/מּוּבָ֥א בֵית יְהוָֽה־־־־׃
translation:
  text: However, from the money brought into the house of Yahweh there were not made for the house of Yahweh silver basins, snuffers, sprinkling bowls, trumpets, or any vessel of gold or vessel of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silver bowls' for 'silver basins.'
    reason: lexical_alternative
  - marker: b
    text: Or 'trimmers' for 'snuffers.' The Hebrew term likely refers to an implement used in tending lamps.
    reason: lexical_alternative
  - marker: c
    text: Or simply 'bowls' for 'sprinkling bowls.' The fuller rendering makes the likely ritual function explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: However
  alternatives:
  - But
  - Only
  lexicon: HALOT
  rationale: Marks a contrast with the previous verse; 'However' conveys the adversative force smoothly in modern English.
- source_word: יֵעָשֶׂה
  chosen: there were not made
  alternatives:
  - was not made
  - they did not make
  lexicon: HALOT
  rationale: Nifal imperfect of עשה is passive; English existential passive best reflects the impersonal Hebrew construction with the following list of objects.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: Formal temple designation retained. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: סִפּוֹת כֶּסֶף
  chosen: silver basins
  alternatives:
  - silver bowls
  - silver cups
  lexicon: HALOT
  rationale: סִפּוֹת denotes vessels/basins; 'silver basins' fits temple utensil context and distinguishes it from the later מִזְרָקוֹת.
- source_word: מְזַמְּרוֹת
  chosen: snuffers
  alternatives:
  - trimmers
  - pruning knives
  lexicon: HALOT
  rationale: In temple-furnishing context this likely refers to implements for trimming lamp wicks; 'snuffers' is the conventional and contextually apt rendering.
- source_word: מִזְרָקוֹת
  chosen: sprinkling bowls
  alternatives:
  - basins
  - bowls
  lexicon: HALOT
  rationale: These are ritual bowls used in sacrificial service, often for tossing/sprinkling blood; 'sprinkling bowls' preserves cultic function better than a generic 'bowls'.
- source_word: חֲצֹצְרוֹת
  chosen: trumpets
  alternatives:
  - clarions
  lexicon: HALOT
  rationale: Standard rendering for the cultic metal trumpets.
- source_word: כָּל כְּלִי זָהָב וּכְלִי כָסֶף
  chosen: any vessel of gold or vessel of silver
  alternatives:
  - any article of gold or article of silver
  - any utensil of gold or silver
  lexicon: HALOT
  rationale: כְּלִי is broad ('vessel, implement, article'). 'Vessel' fits the temple-inventory context and preserves the singular distributive sense in Hebrew.
- source_word: מִן הַכֶּסֶף הַמּוּבָא
  chosen: from the money brought in
  alternatives:
  - from the silver that was brought
  - from the money being brought
  lexicon: HALOT
  rationale: כֶּסֶף here refers to money/silver funds. The passive participle הַמּוּבָא is naturally rendered 'brought in/brought into' in this administrative context.
