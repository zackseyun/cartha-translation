id: 2KI.12.11
reference: 2 Kings 12:11
source:
  edition: WLC
  text: וַֽ/יְהִי֙ כִּ/רְאוֹתָ֔/ם כִּֽי רַ֥ב הַ/כֶּ֖סֶף בָּֽ/אָר֑וֹן וַ/יַּ֨עַל סֹפֵ֤ר הַ/מֶּ֨לֶךְ֙ וְ/הַ/כֹּהֵ֣ן הַ/גָּד֔וֹל וַ/יָּצֻ֨רוּ֙ וַ/יִּמְנ֔וּ אֶת הַ/כֶּ֖סֶף הַ/נִּמְצָ֥א בֵית יְהוָֽה־־־׃
translation:
  text: And whenever they saw that there was much silver in the chest, the king’s scribe and the high priest came up and bagged and counted the silver found in the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bagged up' or 'bound up'; the Hebrew likely refers to securing the silver into bundles or bags before counting it.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּרְאוֹתָם
  chosen: whenever they saw
  alternatives:
  - when they saw
  - as they saw
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ plus pronominal suffix gives a temporal sense, 'when/whenever they saw.' Given the repeated administrative procedure in context, 'whenever' captures the iterative force better than a one-time 'when.'
- source_word: רַב הַכֶּסֶף
  chosen: there was much silver
  alternatives:
  - the silver was abundant
  - there was a large amount of money
  lexicon: HALOT
  rationale: רַב with the definite noun indicates abundance. 'Silver' is retained rather than generalized to 'money' because the Hebrew explicitly says silver, though in context it functions as money.
- source_word: בָּאָרוֹן
  chosen: in the chest
  alternatives:
  - in the ark
  - in the box
  lexicon: HALOT
  rationale: אָרוֹן here refers to the collection chest described in the surrounding passage, not the ark of the covenant. 'Chest' is natural modern English and avoids confusion that 'ark' would create.
- source_word: וַיַּעַל
  chosen: came up
  alternatives:
  - went up
  - ascended
  lexicon: HALOT
  rationale: עלה literally means 'go up.' In English narrative with the destination implied, 'came up' reads naturally and fits movement to the temple area or treasury process.
- source_word: סֹפֵר הַמֶּלֶךְ
  chosen: the king’s scribe
  alternatives:
  - the royal secretary
  - the king's secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a scribe or secretary. 'Scribe' preserves the official title more formally while remaining understandable.
- source_word: הַכֹּהֵן הַגָּדוֹל
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: HALOT
  rationale: Standard rendering for the established office; 'high priest' is the clearest equivalent in English.
- source_word: וַיָּצֻרוּ
  chosen: tied up
  alternatives:
  - bagged
  - bound up
  lexicon: HALOT
  rationale: The verb from צור in this context refers to securing the money, likely by tying it into bags or bundles before counting. 'Tied up' stays close to the concrete action without over-specifying.
- source_word: וַיִּמְנוּ
  chosen: counted
  alternatives:
  - numbered
  - measured out
  lexicon: HALOT
  rationale: מנה commonly means to count or number. 'Counted' is the natural administrative equivalent here.
- source_word: הַכֶּסֶף הַנִּמְצָא
  chosen: the silver found
  alternatives:
  - the silver that was found
  - the money that was found
  lexicon: HALOT
  rationale: A straightforward rendering of the noun plus passive participle. 'Silver' is retained for lexical transparency.
- source_word: בֵית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Following doctrine, יהוה is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression, though 'temple' is a possible contextual equivalent.
