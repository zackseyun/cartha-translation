id: 2KI.12.17
reference: 2 Kings 12:17
source:
  edition: WLC
  text: כֶּ֤סֶף אָשָׁם֙ וְ/כֶ֣סֶף חַטָּא֔וֹת לֹ֥א יוּבָ֖א בֵּ֣ית יְהוָ֑ה לַ/כֹּהֲנִ֖ים
    יִהְיֽוּ׃פ
translation:
  text: Money from a guilt offering and money from sin offerings was not to be brought
    into the house of the LORD; it belonged to the priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silver from a guilt offering and silver from sin offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Although the noun literally denotes 'silver,' in this administrative/temple-finance
    context it refers to monetary payment or funds. 'Money' communicates the functional
    sense in natural English.
- source_word: אָשָׁם
  chosen: guilt offering
  alternatives:
  - reparation offering
  - compensation offering
  lexicon: HALOT
  rationale: In sacrificial contexts אָשָׁם commonly denotes the guilt/reparation
    offering. 'Guilt offering' is the most established and clear English rendering.
- source_word: חַטָּאוֹת
  chosen: sin offerings
  alternatives:
  - sins
  - purification offerings
  lexicon: HALOT
  rationale: Here the plural refers to sacrificial offerings, not abstract sins. 'Sin
    offerings' is the conventional contextual sense. 'Purification offerings' is possible
    in priestly usage, but this verse concerns temple revenues tied to recognized
    sacrificial categories, so 'sin offerings' is preferable.
- source_word: לֹא יוּבָא
  chosen: was not to be brought
  alternatives:
  - shall not be brought
  - was not brought
  lexicon: HALOT
  rationale: The passive form with negation expresses prescribed handling of these
    funds. 'Was not to be brought' captures the rule in idiomatic English without
    sounding overly archaic; 'shall not be brought' is possible but less natural in
    this narrative context.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the
    LORD.' 'House of the LORD' preserves the Hebrew expression while remaining clear.
- source_word: לַכֹּהֲנִים יִהְיוּ
  chosen: it belonged to the priests
  alternatives:
  - they were for the priests
  - they shall be the priests'
  lexicon: HALOT
  rationale: The clause states possession/allocation. Because English treats 'money'
    as a mass noun, singular 'it belonged' is smoother than a wooden plural rendering,
    while accurately conveying that these funds were assigned to the priests.
