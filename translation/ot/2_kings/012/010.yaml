id: 2KI.12.10
reference: 2 Kings 12:10
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח יְהוֹיָדָ֤ע הַ/כֹּהֵן֙ אֲר֣וֹן אֶחָ֔ד וַ/יִּקֹּ֥ב חֹ֖ר בְּ/דַלְתּ֑/וֹ
    וַ/יִּתֵּ֣ן אֹת/וֹ֩ אֵ֨צֶל הַ/מִּזְבֵּ֜חַ ב/ימין בְּ/בֽוֹא אִישׁ֙ בֵּ֣ית יְהוָ֔ה
    וְ/נָֽתְנוּ שָׁ֤מָּ/ה הַ/כֹּֽהֲנִים֙ שֹׁמְרֵ֣י הַ/סַּ֔ף אֶת כָּל הַ/כֶּ֖סֶף הַ/מּוּבָ֥א
    בֵית יְהוָֽה־־־־־׃
translation:
  text: Then Jehoiada the priest took one chest, bored a hole in its lid, and set
    it beside the altar, on the right as a man enters the house of the LORD; and the
    priests who guarded the threshold put there all the silver that was brought into
    the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as one enters the house of the LORD.' The Hebrew reads literally 'as
      a man enters,' a generic singular orienting the reader to the right side from
      the entrant's perspective.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in its door.' In context this likely refers to the chest's lid or
      cover.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the money.' Hebrew 'silver' can also function as a term for money.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרוֹן
  chosen: chest
  alternatives:
  - box
  - ark
  lexicon: HALOT
  rationale: In this temple-fund context, a container for money is intended. 'Chest'
    is natural modern English and avoids the misleading covenantal associations of
    'ark.'
- source_word: וַיִּקֹּב חֹר
  chosen: bored a hole
  alternatives:
  - made a hole
  - pierced an opening
  lexicon: HALOT
  rationale: The verb נקב with חור denotes making or boring an opening. 'Bored a hole'
    fits the physical action done to the chest.
- source_word: בְּדַלְתּוֹ
  chosen: in its lid
  alternatives:
  - in its door
  - in its side
  lexicon: HALOT
  rationale: Although דלת commonly means 'door,' for a small chest the referent is
    best understood as its movable cover or lid. English 'door' would sound unnatural
    for a money chest.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  chosen: beside the altar
  alternatives:
  - next to the altar
  - at the altar
  lexicon: HALOT
  rationale: אצל indicates proximity. 'Beside' is concise and spatially clear.
- source_word: בימין
  chosen: on the right
  alternatives:
  - at the right side
  - to the right
  lexicon: HALOT
  rationale: A straightforward locative phrase indicating placement relative to the
    entrant.
- source_word: בְּבוֹא אִישׁ בֵּית יְהוָה
  chosen: as a man enters the house of the LORD
  alternatives:
  - when one enters the house of the LORD
  - at the entrance of a man into the house of the LORD
  lexicon: HALOT
  rationale: The phrase describes orientation from the perspective of someone entering.
    'As a man enters' preserves the singular איש and the gender-accurate policy, while
    functioning idiomatically in English.
- source_word: שֹׁמְרֵי הַסַּף
  chosen: who guarded the threshold
  alternatives:
  - keepers of the door
  - guardians of the entrance
  lexicon: HALOT
  rationale: Literally 'keepers/guards of the threshold.' 'Guarded the threshold'
    preserves the temple-gatekeeping role without archaic phrasing.
- source_word: כָּל הַכֶּסֶף
  chosen: all the silver
  alternatives:
  - all the money
  lexicon: HALOT
  rationale: כסף literally means 'silver' and often by extension money. Here the temple
    contributions are likely silver as the concrete medium, so the more literal rendering
    is preferred.
- source_word: הַמּוּבָא
  chosen: that was brought into
  alternatives:
  - being brought into
  - brought to
  lexicon: HALOT
  rationale: 'The Hophal participle of בוא is passive/causative-passive: money ''being
    brought in.'' The relative clause ''that was brought into'' is natural in English.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'house of the LORD.' This preserves
    the source wording while remaining clear in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
