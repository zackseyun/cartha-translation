theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered singular אִישׁ in an orienting expression
  chosen_reading: as a man enters
  alternative_readings:
  - as one enters
  - when anyone enters
  rationale: The source uses grammatically masculine singular איש. Per the translation
    philosophy, gender-accurate rendering is preferred over flattening to gender-neutral
    when the expression is representative/generic.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
