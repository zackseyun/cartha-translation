id: 2KI.12.21
reference: 2 Kings 12:21
source:
  edition: WLC
  text: וַ/יָּקֻ֥מוּ עֲבָדָ֖י/ו וַ/יִּקְשְׁרֽוּ קָ֑שֶׁר וַ/יַּכּוּ֙ אֶת יוֹאָ֔שׁ בֵּ֥ית
    מִלֹּ֖א הַ/יּוֹרֵ֥ד סִלָּֽא־־׃
translation:
  text: And his servants rose up and formed a conspiracy, and they struck down Joash
    at Beth-millo, on the descent to Silla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which goes down to Silla' / 'on the way down to Silla.' The Hebrew phrase
      describes the location more literally as the descending approach toward Silla.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave'; in a royal court context for
    the king's subordinates, 'servants' is the most natural and established rendering
    without implying domestic service only. 'Officials' is possible contextually but
    is more interpretive than the Hebrew requires.
- source_word: וַיִּקְשְׁרוּ קָשֶׁר
  chosen: formed a conspiracy
  alternatives:
  - conspired a conspiracy
  - made a conspiracy
  - plotted a plot
  lexicon: HALOT
  rationale: The verb קשׁר with the cognate noun קֶשֶׁר is an idiomatic Hebrew expression
    for conspiracy or treasonous plotting. 'Formed a conspiracy' preserves the force
    in idiomatic English better than a wooden cognate rendering.
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - killed
  - struck
  lexicon: HALOT
  rationale: נכה is broad ('strike, smite'). In this context the blow is fatal, but
    the verse itself says 'struck' rather than using the more specific verb for kill.
    'Struck down' preserves the violent action and likely result without overtranslating.
- source_word: בֵּית מִלֹּא
  chosen: Beth-millo
  alternatives:
  - the house of Millo
  - the Millo house
  lexicon: HALOT
  rationale: As a place name, this is best transliterated rather than translated,
    in keeping with the philosophy to transliterate names. 'House of Millo' is formally
    possible but may obscure that this is a known location.
- source_word: הַיּוֹרֵד סִלָּא
  chosen: on the descent to Silla
  alternatives:
  - which goes down to Silla
  - at the road going down to Silla
  - on the way down to Silla
  lexicon: HALOT
  rationale: The participle יֹרֵד with the article functions substantivally/adjectivally,
    describing a descent or downward approach associated with Silla. 'On the descent
    to Silla' is concise, natural English that preserves the topographical sense.
- source_word: סִלָּא
  chosen: Silla
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard convention.
