id: 2KI.12.13
reference: 2 Kings 12:13
source:
  edition: WLC
  text: וְ/לַ/גֹּֽדְרִים֙ וּ/לְ/חֹצְבֵ֣י הָ/אֶ֔בֶן וְ/לִ/קְנ֤וֹת עֵצִים֙ וְ/אַבְנֵ֣י מַחְצֵ֔ב לְ/חַזֵּ֖ק אֶת בֶּ֣דֶק בֵּית יְהוָ֑ה וּ/לְ/כֹ֛ל אֲשֶׁר יֵצֵ֥א עַל הַ/בַּ֖יִת לְ/חָזְקָֽה־־־־׃
translation:
  text: and for the masons, and for the stonecutters, and to buy timber and quarried stone to repair the damage of the house of Yahweh, and for all that is spent on the house to repair it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'builders' for 'masons.' The Hebrew term may refer more broadly to those doing masonry or wall-repair work.
    reason: lexical_alternative
  - marker: b
    text: Or 'hewn stone' or 'cut stone.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'to strengthen the damage/breach of the house of the LORD.'
    reason: lexical_alternative
  - marker: d
    text: Literally 'for all that goes out on the house,' that is, all expenses incurred for its repair.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּדְרִים
  chosen: masons
  alternatives:
  - builders
  - wall-builders
  lexicon: HALOT
  rationale: The participle from גדר in this construction refers to workers involved in building/repairing masonry structures. 'Masons' fits the temple-repair context better than the more generic 'builders' and is idiomatic alongside 'stonecutters.'
- source_word: חֹצְבֵי הָאֶבֶן
  chosen: stonecutters
  alternatives:
  - hewers of stone
  - stonecutters of the stone
  lexicon: HALOT
  rationale: The phrase denotes those who cut or quarry stone. 'Stonecutters' is concise modern English; 'hewers of stone' is more formal but less natural.
- source_word: לִקְנוֹת עֵצִים
  chosen: to buy timber
  alternatives:
  - to buy wood
  lexicon: HALOT
  rationale: In a construction context, עֵצִים refers to building wood rather than generic firewood; 'timber' better conveys construction material.
- source_word: אַבְנֵי מַחְצֵב
  chosen: quarried stone
  alternatives:
  - hewn stone
  - cut stone
  lexicon: HALOT
  rationale: The expression refers to stone from a quarry. 'Quarried stone' makes the source sense explicit and pairs naturally with purchased timber.
- source_word: לְחַזֵּק
  chosen: to strengthen
  alternatives:
  - to repair
  - to reinforce
  lexicon: HALOT
  rationale: The verb fundamentally means 'to make strong/strengthen.' Here it refers to structural repair, but retaining 'strengthen' preserves the lexical force while still fitting the context.
- source_word: בֶּדֶק
  chosen: the damage
  alternatives:
  - the breach
  - the repairs
  lexicon: HALOT
  rationale: בֶּדֶק denotes a gap, breach, or damage needing repair. 'The damage' communicates the object needing attention; 'repairs' would shift from the problem to the process.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' preserves the Hebrew expression, though in context it refers to the temple.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּלְכֹל אֲשֶׁר יֵצֵא עַל הַבַּיִת
  chosen: and for all that is spent on the house
  alternatives:
  - and for everything that goes out for the house
  - and for all expenses for the house
  lexicon: HALOT
  rationale: The idiom 'goes out upon the house' refers to expenditures incurred for the building. 'Is spent on the house' renders the idiom clearly in modern English without over-paraphrase.
- source_word: לְחָזְקָה
  chosen: to repair it
  alternatives:
  - for its repair
  - to strengthen it
  lexicon: HALOT
  rationale: 'Though cognate with חזק, this infinitive in context expresses the purpose of the expenditures: repair/restoration of the building. ''To repair it'' is the clearest English expression, while the earlier ''to strengthen'' preserves the lexical connection.'
