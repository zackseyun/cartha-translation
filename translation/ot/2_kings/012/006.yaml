id: 2KI.12.6
reference: 2 Kings 12:6
source:
  edition: WLC
  text: יִקְח֤וּ לָ/הֶם֙ הַ/כֹּ֣הֲנִ֔ים אִ֖ישׁ מֵ/אֵ֣ת מַכָּר֑/וֹ וְ/הֵ֗ם יְחַזְּקוּ֙
    אֶת בֶּ֣דֶק הַ/בַּ֔יִת לְ/כֹ֛ל אֲשֶׁר יִמָּצֵ֥א שָׁ֖ם בָּֽדֶק־־׃פ
translation:
  text: Let the priests take for themselves, each man from his donor, and let them
    repair the damage of the house, wherever any damage is found there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his acquaintance.' The Hebrew term can refer more literally to
      someone known to him, but in this collection context it likely means the person
      from whom each priest received contributions.
    reason: lexical_alternative
  - marker: b
    text: '''The house'' here refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: יִקְחוּ
  chosen: Let ... take
  alternatives:
  - they shall take
  - they may take
  lexicon: HALOT
  rationale: The jussive/imperfect in context functions as an instruction or directive.
    'Let ... take' captures the prescriptive force in natural English.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition plus pronoun indicates receipt or possession by the priests
    themselves; 'for themselves' makes the sense explicit in English.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the noun in this temple-administration context.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each priest
  lexicon: HALOT
  rationale: The distributive use of אִישׁ after a plural subject means 'each' individually.
    'Each man' preserves the masculine singular form and distributive force; the referent
    is the priests.
- source_word: מֵאֵת מַכָּרוֹ
  chosen: from his donor
  alternatives:
  - from his acquaintance
  - from the one known to him
  - from his assessor
  lexicon: HALOT
  rationale: מַכָּר can denote an acquaintance or one with whom one has dealings.
    In this collection context, it most plausibly refers to the person giving money
    to a priest. 'Donor' brings out the transactional sense in idiomatic English.
    Because the Hebrew could more literally mean 'acquaintance,' that alternative
    is preserved in a footnote.
- source_word: וְהֵם
  chosen: and let them
  alternatives:
  - and they
  lexicon: HALOT
  rationale: 'The pronoun is emphatic, marking the priests as the ones responsible
    for the next action. English smooths this as a continued directive: ''and let
    them...''.'
- source_word: יְחַזְּקוּ
  chosen: repair
  alternatives:
  - strengthen
  - restore
  - make secure
  lexicon: HALOT
  rationale: Though the verb literally means 'make strong/strengthen,' in building-maintenance
    context it refers to carrying out repairs. 'Repair' is the clearest natural rendering
    here.
- source_word: בֶּדֶק הַבַּיִת
  chosen: the damage of the house
  alternatives:
  - the repairs of the house
  - the breach of the house
  - the temple damages
  lexicon: HALOT
  rationale: בֶּדֶק refers to a defect, breach, or damaged condition requiring repair.
    Rendering it as 'damage' here fits the following clause about damage being found,
    while 'house' refers to the temple building.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'the house'; in Kings this commonly refers to the temple.
    The main text preserves the source wording, with the temple sense noted by context.
- source_word: לְכֹל אֲשֶׁר יִמָּצֵא שָׁם בָּדֶק
  chosen: wherever any damage is found there
  alternatives:
  - for all the damage that is found there
  - where any breach is found there
  lexicon: HALOT
  rationale: 'The phrase qualifies the scope of repairs: any place/instance in which
    damage is discovered in the temple. ''Wherever any damage is found there'' preserves
    the indefinite breadth and the repeated noun בֶּדֶק.'
