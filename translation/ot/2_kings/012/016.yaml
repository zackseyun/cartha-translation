id: 2KI.12.16
reference: 2 Kings 12:16
source:
  edition: WLC
  text: וְ/לֹ֧א יְחַשְּׁב֣וּ אֶת הָ/אֲנָשִׁ֗ים אֲשֶׁ֨ר יִתְּנ֤וּ אֶת הַ/כֶּ֨סֶף֙ עַל
    יָדָ֔/ם לָ/תֵ֖ת לְ/עֹשֵׂ֣י הַ/מְּלָאכָ֑ה כִּ֥י בֶ/אֱמֻנָ֖ה הֵ֥ם עֹשִֽׂים־־־׃
translation:
  text: But they did not reckon with the men into whose hand they gave the money to
    give to those doing the work, for they acted faithfully.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they did not require an accounting from the men.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into their hand,' an idiom for entrusting something to someone's
      charge.
    reason: cultural_note
  - marker: c
    text: '''Faithfully'' may also be rendered ''honestly'' or ''with integrity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַשְּׁבוּ
  chosen: did not reckon with
  alternatives:
  - did not account with
  - did not require an accounting from
  - did not count with
  lexicon: HALOT
  rationale: The piel of חשׁב here carries the sense of calculating/settling accounts
    with someone. 'Reckon with' preserves the accounting nuance while remaining natural
    English. 'Require an accounting from' is interpretive and slightly more expansive,
    though contextually valid.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The noun אישׁ in plural straightforwardly means 'men' here, referring
    to specific male officials/agents. This follows the gender-accurate principle
    rather than neutralizing to 'people'.
- source_word: יִתְּנוּ ... עַל יָדָם
  chosen: gave ... into whose hand
  alternatives:
  - put ... in their charge
  - entrusted ... to
  lexicon: HALOT
  rationale: The idiom על יד with נתן literally means giving into someone's hand,
    often with the sense of entrusting. The chosen rendering keeps the Hebrew image
    while remaining intelligible. Alternatives are smoother but less formally transparent.
- source_word: הַכֶּסֶף
  chosen: the money
  alternatives:
  - the silver
  lexicon: HALOT
  rationale: כסף can mean either 'silver' or 'money.' In this temple-repair funding
    context, the functional sense is monetary funds, so 'money' best communicates
    the referent in modern English.
- source_word: לְעֹשֵׂי הַמְּלָאכָה
  chosen: to those doing the work
  alternatives:
  - to the workmen
  - to the workers
  - to those who did the work
  lexicon: HALOT
  rationale: This participial expression denotes the laborers engaged in the repair
    work. 'Those doing the work' closely reflects the Hebrew construction without
    sounding archaic. 'Workmen' is traditional but less natural and potentially narrower.
- source_word: בֶאֱמֻנָה
  chosen: faithfully
  alternatives:
  - honestly
  - with integrity
  - in faithfulness
  lexicon: HALOT
  rationale: The phrase כי באמונה הם עשים indicates trustworthy conduct in handling
    funds. 'Faithfully' preserves the covenantal/ethical nuance of אֱמוּנָה better
    than the narrower 'honestly,' while still fitting the context.
- source_word: הֵם עֹשִׂים
  chosen: they acted
  alternatives:
  - they were doing
  - they worked
  lexicon: HALOT
  rationale: English idiom prefers a finite verbal expression summarizing conduct
    here. 'They acted faithfully' captures the sense of their manner of carrying out
    the task. A more literal 'they were doing' is awkward in English.
