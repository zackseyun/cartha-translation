id: 2KI.12.20
reference: 2 Kings 12:20
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י יוֹאָ֖שׁ וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לוֹא הֵ֣ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Joash, and all that he did—are they not written
    in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Judah.' The Hebrew expression can denote
      an official royal record or chronicle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר denotes what remains or is left over. In this recurring regnal-summary
    formula, 'the rest of' is the standard sense. Rendering the prefixed וְ as 'Now'
    gives natural English discourse flow at the start of a summary notice without
    changing meaning.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - matters
  - deeds
  - words
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the formula 'the rest of the words/matters
    of X, and all that he did,' English idiom is best served by 'acts,' which captures
    the historical record of a king's deeds. This is an optimal-equivalence rendering
    of the regnal formula.
- source_word: יוֹאָשׁ
  chosen: Joash
  alternatives:
  - Jehoash
  rationale: Standard English transliteration of the personal name. 'Joash' is the
    common form for this Judean king in English Bible tradition.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and everything that he did
  lexicon: HALOT
  rationale: A straightforward rendering preserving the comprehensiveness of כָל and
    the relative clause construction.
- source_word: הֲלוֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  lexicon: HALOT
  rationale: This interrogative particle introduces a rhetorical question expecting
    a positive answer. 'Are they not' matches the Hebrew idiom and the plural predicate
    with the implied subject ('the rest... and all that he did').
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: Passive participle construction meaning 'are written/recorded.' 'Written'
    stays close to the Hebrew while remaining natural in the archival formula.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but in English archival idiom 'written
    in the Book' is the natural equivalent. 'Book' is retained as the conventional
    rendering of סֵפֶר in this formula.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the annals
  - the events of the days
  lexicon: HALOT
  rationale: This expression in royal-source citations refers to the historical annals/chronicles.
    'Chronicles' is the established and accurate rendering here, especially in the
    title-like phrase 'Book of the Chronicles.'
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - for the kings of Judah
  lexicon: HALOT
  rationale: The לְ here functions idiomatically in the source-title formula. 'Of
    the Kings of Judah' is the most natural English rendering of the genitival relationship
    in this context.
