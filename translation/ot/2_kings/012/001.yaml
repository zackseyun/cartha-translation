id: 2KI.12.1
reference: 2 Kings 12:1
source:
  edition: WLC
  text: בֶּן שֶׁ֥בַע שָׁנִ֖ים יְהוֹאָ֥שׁ בְּ/מָלְכֽ/וֹ־׃פ
translation:
  text: Jehoash was seven years old when he began to reign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Jehoash; traditionally also rendered 'Joash.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן
  chosen: was ... years old
  alternatives:
  - son of
  lexicon: HALOT
  rationale: In age formulas, בֶּן + number + שָׁנִים is an idiom meaning someone
    was a given age, not literally 'son of.' English idiom is best represented by
    'was ... years old.'
- source_word: שֶׁבַע
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number straightforwardly denotes the age.
- source_word: שָׁנִים
  chosen: years old
  alternatives:
  - years
  lexicon: HALOT
  rationale: Combined with בֶּן and the numeral, this forms the standard Hebrew age
    expression; 'years old' is natural English.
- source_word: יְהוֹאָשׁ
  chosen: Jehoash
  alternatives:
  - Joash
  rationale: Personal names are transliterated by standard conventions. 'Jehoash'
    more directly reflects the Hebrew form יְהוֹאָשׁ, while 'Joash' is a common English
    simplification preserved as an alternative.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  - in his reigning
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of מלך with pronominal suffix
    is a standard temporal expression meaning 'when he became king' or 'when he began
    to reign.' 'Began to reign' is idiomatic in English royal formulas and fits the
    context.
