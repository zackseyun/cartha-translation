id: 2KI.12.4
reference: 2 Kings 12:4
source:
  edition: WLC
  text: רַ֥ק הַ/בָּמ֖וֹת לֹא סָ֑רוּ ע֥וֹד הָ/עָ֛ם מְזַבְּחִ֥ים וּֽ/מְקַטְּרִ֖ים בַּ/בָּמֽוֹת־׃
translation:
  text: However, the high places were not removed; the people still were sacrificing
    and burning incense on the high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shrines were not removed'; Hebrew 'the high places' refers to local
      elevated worship sites.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: However
  alternatives:
  - Only
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: Introduces an exception or limitation to the preceding positive assessment.
    'However' captures the adversative force in natural modern English better than
    the more wooden 'only.'
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  lexicon: HALOT
  rationale: בָּמוֹת refers to elevated cultic sites. 'High places' is the standard
    and sufficiently transparent rendering in this historical context; 'shrines' is
    possible but loses the topographical/cultic specificity.
- source_word: לֹא סָרוּ
  chosen: were not removed
  alternatives:
  - did not depart
  - were not taken away
  lexicon: HALOT
  rationale: 'With בָּמוֹת as subject, the passive sense in English best conveys the
    idiom: the high places remained in place. ''Were not removed'' is idiomatic and
    reflects the practical meaning of the Hebrew.'
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - continuing
  lexicon: HALOT
  rationale: Marks ongoing action despite the preceding reform note. 'Still' is concise
    and natural.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Straightforward rendering of the collective noun referring to the nation/common
    people.
- source_word: מְזַבְּחִים
  chosen: were sacrificing
  alternatives:
  - were offering sacrifices
  lexicon: HALOT
  rationale: The participle expresses ongoing customary action. 'Were sacrificing'
    preserves the verbal force and is concise; 'offering sacrifices' is slightly more
    explicit but less direct.
- source_word: וּמְקַטְּרִים
  chosen: and burning incense
  alternatives:
  - and making offerings smoke
  - and burning offerings
  lexicon: HALOT
  rationale: In cultic contexts קטר commonly refers to burning incense or turning
    an offering into smoke. Here, paired with sacrificing at high places, 'burning
    incense' is the most idiomatic and contextually likely rendering.
- source_word: בַּבָּמוֹת
  chosen: on the high places
  alternatives:
  - at the high places
  lexicon: HALOT
  rationale: Repeats the cultic location. 'On the high places' follows the Hebrew
    preposition and conventional English biblical usage, though 'at' would also be
    possible.
