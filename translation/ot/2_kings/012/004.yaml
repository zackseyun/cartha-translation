theological_decisions:
- issue: Evaluation of worship at the high places
  chosen_reading: Retain the historically descriptive term 'high places' without softening
    or explicating it in the main text.
  alternative_readings:
  - the shrines were not removed; the people still sacrificed and burned incense there
  rationale: The verse assumes the Deuteronomistic critique of unauthorized worship
    sites, but it does not itself add explicit theological commentary beyond reporting
    their continued existence and use. Preserving 'high places' maintains the text's
    historical-religious specificity without importing extra explanation into the
    translation.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
