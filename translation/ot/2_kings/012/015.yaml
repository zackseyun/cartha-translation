id: 2KI.12.15
reference: 2 Kings 12:15
source:
  edition: WLC
  text: כִּֽי לְ/עֹשֵׂ֥י הַ/מְּלָאכָ֖ה יִתְּנֻ֑/הוּ וְ/חִזְּקוּ ב֖/וֹ אֶת בֵּ֥ית יְהוָֽה־־־׃
translation:
  text: for they gave it to those doing the work, and with it they repaired the house
    of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the house of the LORD'; that is, the temple of the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for why no accounting was required in the
    previous verse. 'For' fits the causal/explanatory flow in English.
- source_word: לְעֹשֵׂי הַמְּלָאכָה
  chosen: to those doing the work
  alternatives:
  - to the workmen
  - to the doers of the work
  lexicon: HALOT
  rationale: Literally 'to the doers of the work.' The chosen rendering preserves
    the participial sense while remaining natural English. 'Workmen' is possible but
    slightly more interpretive and gender-specific than the Hebrew expression itself
    requires here.
- source_word: יִתְּנֻהוּ
  chosen: they gave it
  alternatives:
  - they would give it
  - it was given
  lexicon: HALOT
  rationale: Qal imperfect 3mp with 3ms object suffix from נתן. In context it describes
    customary or repeated past action; simple English past communicates this naturally
    in narrative.
- source_word: וְחִזְּקוּ
  chosen: they repaired
  alternatives:
  - they strengthened
  - they made firm
  lexicon: HALOT
  rationale: Though the verb basically means 'strengthen/make strong,' in building
    context it idiomatically refers to repairing or restoring structural soundness.
    'Repaired' best conveys the sense in contemporary English.
- source_word: בּוֹ
  chosen: with it
  alternatives:
  - by it
  - with that money
  lexicon: HALOT
  rationale: 'The preposition plus pronoun most naturally refers to the money just
    mentioned in context: they repaired the temple with it. ''With it'' is concise
    and faithful; ''with that money'' is interpretive expansion not required in the
    main text.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: '''House of the LORD'' preserves the Hebrew idiom בית יהוה while remaining
    clear. Per doctrine, יְהוָה is rendered ''the LORD,'' not ''Yahweh'' in the main
    text. ''Temple'' is a valid contextual gloss but less formally tied to the Hebrew
    wording.'
