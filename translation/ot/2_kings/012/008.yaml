id: 2KI.12.8
reference: 2 Kings 12:8
source:
  edition: WLC
  text: וַ/יִּקְרָא֩ הַ/מֶּ֨לֶךְ יְהוֹאָ֜שׁ לִ/יהוֹיָדָ֤ע הַ/כֹּהֵן֙ וְ/לַ/כֹּ֣הֲנִ֔ים
    וַ/יֹּ֣אמֶר אֲלֵ/הֶ֔ם מַדּ֛וּעַ אֵינְ/כֶ֥ם מְחַזְּקִ֖ים אֶת בֶּ֣דֶק הַ/בָּ֑יִת
    וְ/עַתָּ֗ה אַל תִּקְחוּ כֶ֨סֶף֙ מֵ/אֵ֣ת מַכָּֽרֵי/כֶ֔ם כִּֽי לְ/בֶ֥דֶק הַ/בַּ֖יִת
    תִּתְּנֻֽ/הוּ־־־־׃
translation:
  text: So King Jehoash called Jehoiada the priest and the priests and said to them,
    “Why are you not repairing the damage of the house? Now then, do not take money
    from your donors, but give it for the repair of the house.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the house,' referring to the temple.
    reason: cultural_note
  - marker: b
    text: Or 'the repairs of the house' / 'the breaches of the house' for 'the damage
      of the house.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'donors' is difficult; alternatives include 'contributors'
      or, more literally, 'those known to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative context means to call for or summon someone.
    'Called' is natural modern English and preserves the straightforward narrative
    force.
- source_word: הַמֶּלֶךְ יְהוֹאָשׁ
  chosen: King Jehoash
  alternatives:
  - the king, Jehoash
  rationale: English idiom normally places the royal title before the personal name.
    The name is transliterated rather than translated, per project policy on names.
- source_word: לִיהוֹיָדָע הַכֹּהֵן וְלַכֹּהֲנִים
  chosen: Jehoiada the priest and the priests
  alternatives:
  - Jehoiada the priest and the other priests
  lexicon: HALOT
  rationale: The Hebrew explicitly names Jehoiada and then adds 'the priests.' I preserved
    both elements without adding 'other,' since the Hebrew does not require that clarification.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: A direct interrogative is best represented by simple 'Why' in readable
    modern English.
- source_word: אֵינְכֶם מְחַזְּקִים
  chosen: are you not repairing
  alternatives:
  - are you not strengthening
  - are you not restoring
  lexicon: HALOT
  rationale: חזק literally means 'strengthen,' but with בדק הבית it refers to making
    structural repairs. 'Repairing' communicates the intended sense in idiomatic English.
- source_word: בֶּדֶק הַבָּיִת
  chosen: the damage of the house
  alternatives:
  - the repairs of the house
  - the breaches of the house
  - the temple damage
  lexicon: HALOT
  rationale: בדק denotes damage, breach, or needed repair. Rendering it as 'the damage
    of the house' preserves the object of repair more formally while remaining clear.
    'House' here refers to the temple, but I retained 'house' in the main text to
    reflect the Hebrew expression consistently.
- source_word: וְעַתָּה
  chosen: Now then
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: This marks a transition from rebuke to command. 'Now then' captures that
    discourse shift naturally.
- source_word: אַל תִּקְחוּ כֶסֶף
  chosen: do not take money
  alternatives:
  - you must not receive silver
  - do not collect money
  lexicon: HALOT
  rationale: כֶּסֶף can mean silver or money. In this administrative context it refers
    to funds, so 'money' is the clearest rendering.
- source_word: מֵאֵת מַכָּרֵיכֶם
  chosen: from your donors
  alternatives:
  - from your acquaintances
  - from your contributors
  - from your collectors
  lexicon: HALOT
  rationale: The noun is difficult and context-sensitive. In this temple-funding context
    it most plausibly refers to those from whom the priests were receiving funds,
    hence 'donors.' This avoids the misleadingly relational 'acquaintances' and fits
    the financial setting.
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: Although כִּי often means 'for,' here it introduces the corrective instruction
    contrasting with the previous prohibition. English 'but' best conveys the adversative
    force in context.
- source_word: לְבֶדֶק הַבַּיִת
  chosen: for the repair of the house
  alternatives:
  - for the house's repair
  - for repairing the house
  lexicon: HALOT
  rationale: Here the lamed marks purpose or destination. 'For the repair of the house'
    is clear and keeps the repeated Hebrew phrase visible.
- source_word: תִּתְּנֻהוּ
  chosen: give it
  alternatives:
  - you shall give it
  - hand it over
  lexicon: HALOT
  rationale: The suffix refers back to the money. 'Give it' is concise and natural,
    while preserving the direct object implied by the Hebrew suffix.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The immediate Hebrew term is 'the house,' a standard designation for
    the temple. I retained 'house' in the main text for source transparency, while
    the context makes clear that the temple is meant.
