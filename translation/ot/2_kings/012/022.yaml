id: 2KI.12.22
reference: 2 Kings 12:22
source:
  edition: WLC
  text: וְ/יוֹזָבָ֣ד בֶּן שִׁ֠מְעָת וִ/יהוֹזָבָ֨ד בֶּן שֹׁמֵ֤ר עֲבָדָי/ו֙ הִכֻּ֣/הוּ
    וַ/יָּמֹ֔ת וַ/יִּקְבְּר֥וּ אֹת֛/וֹ עִם אֲבֹתָ֖י/ו בְּ/עִ֣יר דָּוִ֑ד וַ/יִּמְלֹ֛ךְ
    אֲמַצְיָ֥ה בְנ֖/וֹ תַּחְתָּֽי/ו־־׀־׃פ
translation:
  text: And Jozabad son of Shimeath and Jehozabad son of Shomer, his servants, struck
    him down, and he died. And they buried him with his fathers in the city of David,
    and Amaziah his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his officials' for 'his servants'; the Hebrew עֲבָדָיו can refer to
      servants or court attendants depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹזָבָד
  chosen: And Jozabad
  alternatives:
  - And Jozabad
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention; conjunction
    carried forward as narrative 'And.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew; 'son of' is natural and
    sufficiently formal.
- source_word: שִׁמְעָת
  chosen: Shimeath
  lexicon: HALOT
  rationale: Proper name transliterated rather than translated, per philosophy for
    personal names.
- source_word: וִ/יהוֹזָבָד
  chosen: and Jehozabad
  alternatives:
  - and Jehozabad
  lexicon: HALOT
  rationale: Proper name transliterated; conjunction retained.
- source_word: שֹׁמֵר
  chosen: Shomer
  alternatives:
  - Shomer
  lexicon: HALOT
  rationale: Proper name transliterated by standard convention.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his slaves
  lexicon: HALOT
  rationale: עֶבֶד can denote servant, slave, or royal official depending on context.
    Here these men are court attendants/servants involved in a palace conspiracy.
    'His servants' is the most natural rendering and matches the narrative setting
    without overstating bonded status.
- source_word: הִכֻּהוּ
  chosen: struck him down
  alternatives:
  - struck him
  - killed him
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' or 'smite.' Because the following
    clause explicitly says 'and he died,' rendering it as 'struck him down' preserves
    the violent force without collapsing the next clause into the same verb by translating
    'killed him'.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: Simple wayyiqtol sequence; 'and he died' preserves the Hebrew narrative
    progression.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  chosen: And they buried him
  alternatives:
  - Then they buried him
  lexicon: HALOT
  rationale: Plural verb with object pronoun; straightforward narrative continuation.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: Traditional Hebrew idiom for royal burial among forebears. 'With his
    fathers' preserves the idiom and its dynastic resonance more closely than the
    flatter 'ancestors.'
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  alternatives:
  - in David's city
  lexicon: HALOT
  rationale: Established place-name expression in the historical books; this is the
    clearest standard English rendering.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in succession notices is idiomatically rendered 'reigned.'
    English often omits the ingressive nuance unless context requires emphasis.
- source_word: אֲמַצְיָה בְנוֹ
  chosen: Amaziah his son
  alternatives:
  - his son Amaziah
  lexicon: HALOT
  rationale: Both orders are possible in English; this order follows the Hebrew sequence
    closely while remaining natural.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: Standard succession formula. 'In his place' is idiomatic and clearly
    conveys royal replacement.
