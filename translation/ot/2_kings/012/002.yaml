id: 2KI.12.2
reference: 2 Kings 12:2
source:
  edition: WLC
  text: בִּ/שְׁנַת שֶׁ֤בַע לְ/יֵהוּא֙ מָלַ֣ךְ יְהוֹאָ֔שׁ וְ/אַרְבָּעִ֣ים שָׁנָ֔ה מָלַ֖ךְ
    בִּ/ירֽוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ צִבְיָ֖ה מִ/בְּאֵ֥ר שָֽׁבַע־׃
translation:
  text: In the seventh year of Jehu, Jehoash became king, and he reigned forty years
    in Jerusalem. His mother’s name was Zibiah of Beersheba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת שֶׁבַע לְיֵהוּא
  chosen: In the seventh year of Jehu
  alternatives:
  - In Jehu’s seventh year
  lexicon: HALOT
  rationale: The construct phrase with בְּ plus שְׁנַת and the dative-like לְ with
    the king’s name is the standard regnal dating formula. 'In the seventh year of
    Jehu' is natural English while preserving the chronological reference.
- source_word: מָלַךְ יְהוֹאָשׁ
  chosen: Jehoash became king
  alternatives:
  - Jehoash reigned
  - Jehoash began to reign
  lexicon: HALOT
  rationale: 'Though מָלַךְ literally means ''reigned/became king,'' in accession
    formulas the sense is ingressive: the subject began his reign. ''Became king''
    communicates accession clearly in modern English and avoids confusion with the
    later duration statement.'
- source_word: וְאַרְבָּעִים שָׁנָה מָלַךְ
  chosen: and he reigned forty years
  alternatives:
  - and he was king forty years
  lexicon: HALOT
  rationale: Here מָלַךְ refers to the duration of rule, so 'reigned' is the most
    idiomatic and precise English rendering.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of בְּ with the place name.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This preserves the Hebrew notice about maternal identity while using
    natural English word order.
- source_word: צִבְיָה
  chosen: Zibiah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: מִבְּאֵר שָׁבַע
  chosen: of Beersheba
  alternatives:
  - from Beersheba
  lexicon: HALOT
  rationale: The preposition מִן can be rendered 'from,' but in English genealogical/origin
    notices after a person’s name, 'of Beersheba' is smoother while still conveying
    place of origin.
