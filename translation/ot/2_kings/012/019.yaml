id: 2KI.12.19
reference: 2 Kings 12:19
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח יְהוֹאָ֣שׁ מֶֽלֶךְ יְהוּדָ֗ה אֵ֣ת כָּל הַ/קֳּדָשִׁ֡ים אֲשֶׁר הִקְדִּ֣ישׁוּ
    יְהוֹשָׁפָ֣ט וִ/יהוֹרָם֩ וַ/אֲחַזְיָ֨הוּ אֲבֹתָ֜י/ו מַלְכֵ֤י יְהוּדָה֙ וְ/אֶת
    קֳדָשָׁ֔י/ו וְ/אֵ֣ת כָּל הַ/זָּהָ֗ב הַ/נִּמְצָ֛א בְּ/אֹצְר֥וֹת בֵּית יְהוָ֖ה וּ/בֵ֣ית
    הַ/מֶּ֑לֶךְ וַ/יִּשְׁלַ֗ח לַֽ/חֲזָאֵל֙ מֶ֣לֶךְ אֲרָ֔ם וַ/יַּ֖עַל מֵ/עַ֥ל יְרוּשָׁלִָֽם־־־־־־׃
translation:
  text: Then Jehoash king of Judah took all the holy things that Jehoshaphat, Jehoram,
    and Ahaziah, his fathers, the kings of Judah, had dedicated, along with his own
    holy things, and all the gold found in the treasuries of the house of the LORD
    and of the king’s house, and sent it to Hazael king of Aram; so he went up away
    from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he withdrew from Jerusalem.' The Hebrew literally says, 'and he
      went up from upon Jerusalem,' an idiom indicating that Hazael ceased his advance
      against the city.
    reason: lexical_alternative
  - marker: b
    text: '''His fathers'' means his royal forefathers or ancestors.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - collected
  - seized
  lexicon: HALOT
  rationale: The verb לקח in this narrative context straightforwardly means 'took.'
    'Seized' would overstate hostility, and 'collected' is too interpretive.
- source_word: הַקֳּדָשִׁים
  chosen: the holy things
  alternatives:
  - the dedicated things
  - the sacred gifts
  - the consecrated things
  lexicon: HALOT
  rationale: קדשים here refers to items set apart for sacred use, likely temple valuables.
    'Holy things' is a transparent rendering that preserves the cultic sense without
    over-specifying the objects.
- source_word: הִקְדִּישׁוּ
  chosen: had dedicated
  alternatives:
  - had consecrated
  - had set apart
  lexicon: HALOT
  rationale: The hiphil of קדש means to dedicate or consecrate something to sacred
    use. 'Had dedicated' reads naturally in English and fits the context of temple
    treasures.
- source_word: אֲבֹתָיו
  chosen: his fathers
  alternatives:
  - his ancestors
  lexicon: HALOT
  rationale: The Hebrew literally says 'his fathers.' In royal genealogical context
    this means forefathers/ancestors, but the translation keeps the literal familial
    term while the appositive 'the kings of Judah' clarifies the sense.
- source_word: קֳדָשָׁיו
  chosen: his own holy things
  alternatives:
  - his own dedicated things
  - his own sacred gifts
  lexicon: HALOT
  rationale: The suffix marks these as items dedicated by Jehoash himself. 'His own
    holy things' preserves the lexical link with the earlier קדשים while making the
    possessive force explicit in idiomatic English.
- source_word: הַנִּמְצָא
  chosen: found
  alternatives:
  - that was found
  - available
  lexicon: HALOT
  rationale: The participle of מצא here describes what was present in the treasuries.
    'Found' is a direct rendering; 'available' is interpretive.
- source_word: בְּאֹצְרוֹת
  chosen: in the treasuries
  alternatives:
  - in the storehouses
  - in the treasury chambers
  lexicon: HALOT
  rationale: אוצרות refers to treasury/store rooms. 'Treasuries' is the conventional
    and contextually fitting rendering for temple and palace valuables.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Per doctrine, יהוה is rendered
    'the LORD.' 'House' preserves the Hebrew expression, though it refers to the temple.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the palace
  lexicon: HALOT
  rationale: Literally 'the house of the king.' This likely denotes the palace, but
    the more literal rendering preserves the parallel with 'the house of the LORD.'
- source_word: וַיִּשְׁלַח לַחֲזָאֵל
  chosen: sent it to Hazael
  alternatives:
  - sent them to Hazael
  lexicon: HALOT
  rationale: The verb 'sent' takes the collected valuables as its object. English
    idiom often summarizes the preceding list with singular 'it' as a collective;
    'them' is possible but less smooth.
- source_word: וַיַּעַל מֵעַל יְרוּשָׁלִָם
  chosen: so he went up away from Jerusalem
  alternatives:
  - and he withdrew from Jerusalem
  - and he went away from Jerusalem
  lexicon: HALOT
  rationale: The subject is Hazael, understood from context after the tribute was
    sent. עלה commonly means 'go up,' but with מעל ירושלים the sense is that he moved
    away/withdrew from attacking Jerusalem. The chosen rendering keeps the Hebrew
    motion verb while signaling departure.
