id: 2KI.12.12
reference: 2 Kings 12:12
source:
  edition: WLC
  text: וְ/נָתְנוּ֙ אֶת הַ/כֶּ֣סֶף הַֽ/מְתֻכָּ֔ן עַל יד עֹשֵׂ֣י הַ/מְּלָאכָ֔ה ה/פקדים בֵּ֣ית יְהוָ֑ה וַ/יּוֹצִיאֻ֜/הוּ לְ/חָרָשֵׁ֤י הָ/עֵץ֙ וְ/לַ/בֹּנִ֔ים הָ/עֹשִׂ֖ים בֵּ֥ית יְהוָֽה־־׃
translation:
  text: And they gave the weighed-out silver into the hand of the workmen who were appointed over the house of Yahweh, and they paid it out to the carpenters and the builders who were working on the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the measured silver' or 'the counted money.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'into the hand of.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH, traditionally rendered this way in English.
    reason: alternative_reading
lexical_decisions:
- source_word: הַכֶּסֶף הַמְתֻכָּן
  chosen: the weighed-out silver
  alternatives:
  - the measured silver
  - the assessed money
  - the counted money
  lexicon: HALOT
  rationale: מְתֻכָּן denotes something measured, weighed, or made ready in a quantified sense. In this temple-repair context, 'weighed-out silver' best captures the idea of money that has been carefully measured before disbursement, more concretely than the vaguer 'prepared money.'
- source_word: עַל יַד
  chosen: into the hand of
  alternatives:
  - to
  - into the care of
  lexicon: HALOT
  rationale: The idiom literally means 'into the hand of' and commonly conveys entrusting something to someone's charge. Retaining the hand idiom preserves the Hebrew texture while remaining natural in English.
- source_word: עֹשֵׂי הַמְּלָאכָה
  chosen: the workmen
  alternatives:
  - those doing the work
  - the workers
  lexicon: HALOT
  rationale: The phrase refers to those engaged in the repair labor. 'Workmen' is concise and fits the masculine plural form without unnecessary paraphrase.
- source_word: הַפְּקֻדִים בֵּית יְהוָה
  chosen: who were appointed over the house of the LORD
  alternatives:
  - who were overseers of the house of the LORD
  - who were assigned to the house of the LORD
  lexicon: HALOT
  rationale: The passive participial sense indicates persons appointed or commissioned in relation to the temple work. 'Appointed over' communicates delegated supervisory responsibility better than a flatter 'assigned to.'
- source_word: וַיּוֹצִיאֻהוּ
  chosen: and they paid it out
  alternatives:
  - and they brought it out
  - and they spent it
  - and they disbursed it
  lexicon: HALOT
  rationale: Although the verb is literally 'brought it out,' in financial context it refers to disbursing funds. 'Paid it out' is idiomatic modern English that preserves the transactional sense.
- source_word: לְחָרָשֵׁי הָעֵץ
  chosen: to the carpenters
  alternatives:
  - to the craftsmen of wood
  - to the woodworkers
  lexicon: HALOT
  rationale: The expression specifically denotes workers in wood. 'Carpenters' is the most natural and sufficiently precise English equivalent in this construction context.
- source_word: וְלַבֹּנִים
  chosen: and the builders
  alternatives:
  - and the masons
  - and the construction workers
  lexicon: HALOT
  rationale: בֹּנִים broadly means builders. Since the text does not explicitly specify stoneworkers here, 'builders' is preferable to the narrower 'masons.'
- source_word: הָעֹשִׂים בֵּית יְהוָה
  chosen: who were working on the house of the LORD
  alternatives:
  - who were doing the house of the LORD
  - who were repairing the house of the LORD
  lexicon: HALOT
  rationale: The participle plus object indicates active labor on the temple. 'Working on' is natural English and avoids over-specifying 'repairing,' though repair is the broader context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
