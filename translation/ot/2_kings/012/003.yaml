id: 2KI.12.3
reference: 2 Kings 12:3
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ יְהוֹאָ֧שׁ הַ/יָּשָׁ֛ר בְּ/עֵינֵ֥י יְהוָ֖ה כָּל יָמָ֑י/ו אֲשֶׁ֣ר הוֹרָ֔/הוּ יְהוֹיָדָ֖ע הַ/כֹּהֵֽן־׃
translation:
  text: Jehoash did what was right in the eyes of Yahweh all his days, because Jehoiada the priest instructed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'all his days that Jehoiada the priest instructed him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - performed
  lexicon: HALOT
  rationale: 'The common verb עשה here introduces conduct: ''did what was right.'' ''Did'' is the most natural English collocation with the following object phrase and preserves the idiom without paraphrase.'
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: 'With עשה, the adjective functions substantivally: ''did the right/right thing.'' ''What was right'' is idiomatic English and matches the moral evaluation formula used in Kings.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of the LORD' preserves the metaphor transparently; 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל יָמָיו
  chosen: all his days
  alternatives:
  - throughout his days
  - all the days of his life
  lexicon: HALOT
  rationale: A formally close rendering that is still natural English. It preserves the temporal scope while allowing the following relative clause to qualify it.
- source_word: אֲשֶׁר
  chosen: as long as
  alternatives:
  - which
  - when
  - during the time that
  lexicon: HALOT
  rationale: Although literally a relative particle, in this context it introduces the period during which the prior statement held true. 'As long as' best captures the sense reflected by the syntax and the broader narrative, where Jehoash's faithfulness is linked to Jehoiada's influence.
- source_word: הוֹרָהוּ
  chosen: instructed him
  alternatives:
  - taught him
  - directed him
  lexicon: HALOT
  rationale: From ירה in the Hiphil, meaning to teach/instruct/direct. 'Instructed him' fits the mentoring role of Jehoiada and avoids over-specifying either formal teaching or command.
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Standard English transliteration of the personal name.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward rendering of the title, retained appositionally after the name as in Hebrew.
