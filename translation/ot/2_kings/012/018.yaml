id: 2KI.12.18
reference: 2 Kings 12:18
source:
  edition: WLC
  text: אָ֣ז יַעֲלֶ֗ה חֲזָאֵל֙ מֶ֣לֶךְ אֲרָ֔ם וַ/יִּלָּ֥חֶם עַל גַּ֖ת וַֽ/יִּלְכְּדָ֑/הּ
    וַ/יָּ֤שֶׂם חֲזָאֵל֙ פָּנָ֔י/ו לַ/עֲל֖וֹת עַל יְרוּשָׁלִָֽם־־׃
translation:
  text: Then Hazael king of Aram went up and fought against Gath and captured it,
    and Hazael set his face to go up against Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set his mind' / 'determined' to go up against Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' is the Hebrew name often rendered traditionally as ''Syria.'''
    reason: cultural_note
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: יַעֲלֶה
  chosen: went up
  alternatives:
  - came up
  - marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend' and in military narrative can denote
    advancing against a place. 'Went up' preserves the Hebrew idiom without overinterpreting
    the military nuance.
- source_word: חֲזָאֵל מֶלֶךְ אֲרָם
  chosen: Hazael king of Aram
  alternatives:
  - Hazael, king of Syria
  lexicon: HALOT
  rationale: Personal name is transliterated; אֲרָם is rendered 'Aram' rather than
    traditional 'Syria' to reflect the Hebrew ethnogeographic term more directly.
- source_word: וַיִּלָּחֶם עַל
  chosen: fought against
  alternatives:
  - made war on
  - attacked
  lexicon: HALOT
  rationale: לחם with עַל in military context means to wage war against. 'Fought against'
    is clear, accurate, and not overly interpretive.
- source_word: גַּת
  chosen: Gath
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: וַיִּלְכְּדָהּ
  chosen: captured it
  alternatives:
  - took it
  - seized it
  lexicon: HALOT
  rationale: לכד in conquest context means capture/seize a city. 'Captured it' is
    idiomatic and specific.
- source_word: וַיָּשֶׂם ... פָּנָיו
  chosen: set his face
  alternatives:
  - turned his attention
  - determined
  lexicon: HALOT
  rationale: Hebrew idiom meaning to direct oneself resolutely toward an action. The
    idiom is sufficiently transparent in English and preserves the source texture.
- source_word: לַעֲלוֹת עַל יְרוּשָׁלִָם
  chosen: to go up against Jerusalem
  alternatives:
  - to march up against Jerusalem
  - to attack Jerusalem
  lexicon: HALOT
  rationale: עלה with עַל in military setting indicates advancing against a city.
    'Go up against' preserves both the ascent idiom and hostile direction without
    collapsing it into the final act of attack.
