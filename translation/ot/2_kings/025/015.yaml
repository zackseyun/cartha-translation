id: 2KI.25.15
reference: 2 Kings 25:15
source:
  edition: WLC
  text: וְ/אֶת הַ/מַּחְתּוֹת֙ וְ/אֶת הַ/מִּזְרָק֗וֹת אֲשֶׁ֤ר זָהָב֙ זָהָ֔ב וַ/אֲשֶׁר
    כֶּ֖סֶף כָּ֑סֶף לָקַ֖ח רַב טַבָּחִֽים־־־־׃
translation:
  text: And the firepans and the bowls—what was gold, gold, and what was silver, silver—the
    captain of the guard took.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the censers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the basins.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew repeats the material terms: ''what was gold, gold, and what was
      silver, silver,'' emphasizing classification by material.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the chief of the executioners' / 'the commander of the bodyguard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּחְתּוֹת
  chosen: the firepans
  alternatives:
  - the censers
  lexicon: HALOT
  rationale: מַחְתָּה refers to a pan used for carrying coals/incense in temple service.
    'Firepans' is a clear modern rendering that preserves the cultic object without
    over-specifying incense use in this verse. 'Censers' is possible and traditional,
    so it is preserved in a footnote-worthy alternative.
- source_word: הַמִּזְרָקוֹת
  chosen: the bowls
  alternatives:
  - the basins
  lexicon: HALOT
  rationale: מִזְרָק denotes a vessel used for sprinkling or holding sacrificial liquid.
    'Bowls' is natural English and fits temple vessels; 'basins' is also possible
    and common in formal translations.
- source_word: אֲשֶׁר זָהָב זָהָב
  chosen: what was gold, gold
  alternatives:
  - whatever was of gold
  - the gold things
  lexicon: HALOT
  rationale: The Hebrew repeats the material noun for emphasis and categorization.
    Rendering it literally as 'what was gold, gold' preserves the terse inventory
    style and the emphatic repetition better than smoothing it out entirely.
- source_word: וַאֲשֶׁר כֶּסֶף כָּסֶף
  chosen: and what was silver, silver
  alternatives:
  - and whatever was of silver
  - and the silver things
  lexicon: HALOT
  rationale: As with the gold phrase, the repetition marks classification by material.
    The chosen rendering keeps the Hebrew's repetitive style while remaining intelligible
    in English.
- source_word: לָקַח
  chosen: took
  alternatives:
  - carried off
  lexicon: HALOT
  rationale: The basic sense is 'took.' In context of plunder, 'carried off' is interpretive
    but possible; 'took' stays closer to the Hebrew while allowing the context to
    convey seizure.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the commander of the bodyguard
  lexicon: HALOT
  rationale: This title refers to the Babylonian official traditionally rendered 'captain
    of the guard.' Although the underlying expression is literally related to slaughterers/bodyguards,
    in context it functions as an official title. The chosen rendering is idiomatic
    and widely understood.
