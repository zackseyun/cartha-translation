id: 2KI.25.23
reference: 2 Kings 25:23
source:
  edition: WLC
  text: וַ/יִּשְׁמְעוּ֩ כָל שָׂרֵ֨י הַ/חֲיָלִ֜ים הֵ֣מָּה וְ/הָ/אֲנָשִׁ֗ים כִּֽי הִפְקִ֤יד
    מֶֽלֶךְ בָּבֶל֙ אֶת גְּדַלְיָ֔הוּ וַ/יָּבֹ֥אוּ אֶל גְּדַלְיָ֖הוּ הַ/מִּצְפָּ֑ה
    וְ/יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֡ה וְ/יוֹחָנָ֣ן בֶּן קָ֠רֵחַ וּ/שְׂרָיָ֨ה בֶן תַּנְחֻ֜מֶת
    הַ/נְּטֹפָתִ֗י וְ/יַֽאֲזַנְיָ֨הוּ֙ בֶּן הַ/מַּ֣עֲכָתִ֔י הֵ֖מָּה וְ/אַנְשֵׁי/הֶֽם־־־־־־־־־׃
translation:
  text: 'When all the commanders of the forces, they and their men, heard that the
    king of Babylon had appointed Gedaliah, they came to Gedaliah at Mizpah: Ishmael
    son of Nethaniah, and Johanan son of Kareah, and Seraiah son of Tanhumeth the
    Netophathite, and Jaazaniah son of the Maacathite, they and their men.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had put Gedaliah in charge'; the Hebrew verb can denote appointing someone
      to oversight or administration.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - the captains of the armies
  - the officers of the troops
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials; חַיִל in this context refers to military
    forces. 'Commanders of the forces' is clear modern English and preserves the military
    sense without over-specifying rank.
- source_word: הֵמָּה וְהָאֲנָשִׁים
  chosen: they and their men
  alternatives:
  - they and the men
  - they and their soldiers
  lexicon: HALOT
  rationale: The pronoun plus noun construction is resumptive/emphatic and distinguishes
    the commanders from the men attached to them. 'Their men' is the most natural
    English expression in this military context.
- source_word: הִפְקִיד
  chosen: had appointed
  alternatives:
  - had put in charge
  - had made governor
  lexicon: HALOT
  rationale: The verb means to appoint, assign, or place in oversight. 'Had appointed'
    is broad and accurate; the office itself is implied by context. 'Made governor'
    is interpretive and better left unstated in the main text.
- source_word: אֶל גְּדַלְיָהוּ הַמִּצְפָּה
  chosen: to Gedaliah at Mizpah
  alternatives:
  - to Gedaliah at the Mizpah
  - to Gedaliah in Mizpah
  lexicon: HALOT
  rationale: The place name is appositional after Gedaliah, indicating his location.
    English idiom prefers 'at Mizpah' here.
- source_word: הַנְּטֹפָתִי
  chosen: the Netophathite
  alternatives:
  - from Netophah
  lexicon: HALOT
  rationale: The gentilic is best preserved by transliteration as an ethnic/geographic
    designation attached to Tanhumeth.
- source_word: הַמַּעֲכָתִי
  chosen: the Maacathite
  alternatives:
  - from Maacah
  lexicon: HALOT
  rationale: As with other gentilics, the transliterated form preserves the source's
    designation without flattening it into a paraphrase.
- source_word: וַיָּבֹאוּ ... וְיִשְׁמָעֵאל ... וְיוֹחָנָן ...
  chosen: they came ... Ishmael ... and Johanan ... and Seraiah ... and Jaazaniah
  alternatives:
  - then Ishmael ... Johanan ... Seraiah ... Jaazaniah came
  lexicon: HALOT
  rationale: The named individuals are in apposition to the subject 'the commanders
    of the forces.' English can preserve this by introducing the list after 'they
    came' with a colon.
- source_word: וְאַנְשֵׁיהֶם
  chosen: and their men
  alternatives:
  - with their men
  lexicon: HALOT
  rationale: 'The conjunction plus noun phrase closes the appositional list: the named
    commanders are accompanied by their men. English can render this straightforwardly
    as ''they and their men,'' matching the earlier phrase.'
