id: 2KI.25.7
reference: 2 Kings 25:7
source:
  edition: WLC
  text: וְ/אֶת בְּנֵי֙ צִדְקִיָּ֔הוּ שָׁחֲט֖וּ לְ/עֵינָ֑י/ו וְ/אֶת עֵינֵ֤י צִדְקִיָּ֨הוּ֙
    עִוֵּ֔ר וַ/יַּאַסְרֵ֨/הוּ֙ בַֽ/נְחֻשְׁתַּ֔יִם וַ/יְבִאֵ֖/הוּ בָּבֶֽל־־׃ס
translation:
  text: They slaughtered Zedekiah’s sons before his eyes, and he put out Zedekiah’s
    eyes, bound him with bronze fetters, and brought him to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blinded Zedekiah.' The Hebrew verb means 'made blind,' but the wording
      here likely refers to the physical act of putting out his eyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁחֲטוּ
  chosen: slaughtered
  alternatives:
  - killed
  - slew
  lexicon: HALOT
  rationale: The verb commonly denotes slaughtering/killing, often with violent or
    butchering force. 'Slaughtered' preserves the brutality better than the flatter
    'killed' while remaining natural English.
- source_word: לְעֵינָיו
  chosen: before his eyes
  alternatives:
  - in his sight
  lexicon: HALOT
  rationale: This idiom means the act was done in his direct view. 'Before his eyes'
    is the most idiomatic and vivid English equivalent.
- source_word: עִוֵּר
  chosen: put out ... eyes
  alternatives:
  - blinded
  lexicon: HALOT
  rationale: Although the verb means 'blind,' the construction with 'eyes' in this
    violent narrative is more concretely rendered as 'put out Zedekiah’s eyes,' which
    reflects the physical act implied by the Hebrew and fits the context.
- source_word: וַיַּאַסְרֵהוּ
  chosen: bound him
  alternatives:
  - imprisoned him
  - shackled him
  lexicon: HALOT
  rationale: The verb means to bind or imprison. Here, followed by the instrument
    phrase 'with bronze fetters,' 'bound him' is the most direct and contextually
    precise rendering.
- source_word: בַנְחֻשְׁתַּיִם
  chosen: with bronze fetters
  alternatives:
  - with bronze chains
  - with bronze shackles
  lexicon: HALOT
  rationale: The dual/plural form refers to metal restraints. 'Bronze fetters' is
    a concise, formal but still understandable rendering that matches the likely sense
    of binding restraints better than the broader 'chains.'
- source_word: וַיְבִאֵהוּ בָּבֶל
  chosen: brought him to Babylon
  alternatives:
  - took him to Babylon
  lexicon: HALOT
  rationale: The verb is the common 'bring.' In narrative English, 'brought him to
    Babylon' is straightforward and sufficiently literal.
- source_word: בְּנֵי צִדְקִיָּהוּ
  chosen: Zedekiah’s sons
  alternatives:
  - the sons of Zedekiah
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered with the English possessive
    for readability without loss of meaning.
