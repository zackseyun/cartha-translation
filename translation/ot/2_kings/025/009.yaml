id: 2KI.25.9
reference: 2 Kings 25:9
source:
  edition: WLC
  text: וַ/יִּשְׂרֹ֥ף אֶת בֵּית יְהוָ֖ה וְ/אֶת בֵּ֣ית הַ/מֶּ֑לֶךְ וְ/אֵ֨ת כָּל בָּתֵּ֧י
    יְרוּשָׁלִַ֛ם וְ/אֶת כָּל בֵּ֥ית גָּד֖וֹל שָׂרַ֥ף בָּ/אֵֽשׁ־־־־־־׃
translation:
  text: He burned the house of the LORD, the king's house, all the houses of Jerusalem,
    and every great house with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the temple of the LORD.'' Hebrew: ''the house of the LORD.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'every large house' or 'every important house.' The Hebrew expression
      may refer to houses notable for size or prominence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרֹף
  chosen: He burned
  alternatives:
  - And he burned
  - He set fire to
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׂרף introduces the narrative action. 'He burned' is
    the most direct and natural English rendering; the conjunction is absorbed into
    normal English narrative style.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression
    while remaining clear; 'temple' is interpretive and therefore kept as an alternative
    rather than the main text. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible usage.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king's house
  alternatives:
  - the royal palace
  - the palace of the king
  lexicon: HALOT
  rationale: Literally 'the house of the king.' 'The king's house' keeps the parallelism
    with 'house of the LORD'; 'royal palace' is a plausible contextual gloss but less
    formally aligned.
- source_word: כָּל בָּתֵּי יְרוּשָׁלַםִ
  chosen: all the houses of Jerusalem
  alternatives:
  - all the houses in Jerusalem
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'Of Jerusalem' is
    slightly more formal and mirrors the Hebrew closely.
- source_word: כָּל בֵּית גָּדוֹל
  chosen: every great house
  alternatives:
  - every large house
  - every important house
  lexicon: HALOT
  rationale: The singular collective after כָּל is idiomatically rendered distributively
    in English. גָּדוֹל can denote size or social importance; 'great house' preserves
    the Hebrew's breadth and ambiguity better than narrowing to only physical size
    or status.
- source_word: שָׂרַף בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  - he burned with fire
  lexicon: HALOT
  rationale: The final verb plus prepositional phrase intensifies/specifies the burning.
    In English, 'with fire' naturally completes the sentence without awkward repetition,
    while still reflecting the Hebrew emphasis.
