id: 2KI.25.28
reference: 2 Kings 25:28
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר אִתּ֖/וֹ טֹב֑וֹת וַ/יִּתֵּן֙ אֶת כִּסְא֔/וֹ מֵ/עַ֗ל כִּסֵּ֧א
    הַ/מְּלָכִ֛ים אֲשֶׁ֥ר אִתּ֖/וֹ בְּ/בָבֶֽל־׃
translation:
  text: He spoke kindly to him and set his throne above the throne of the kings who
    were with him in Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He spoke good things to him,' an idiom meaning he addressed him favorably
      or kindly.
    reason: lexical_alternative
  - marker: b
    text: '''Throne'' may also be understood concretely as ''seat''; the sense is
      that Jehoiachin was given a rank above the other captive kings in Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתּוֹ טֹבוֹת
  chosen: He spoke kindly to him
  alternatives:
  - He spoke good things with him
  - He spoke favorably to him
  lexicon: HALOT
  rationale: The idiom 'speak good things' in context conveys kind or favorable speech
    rather than a literal content-focused 'good things.' 'Spoke kindly to him' is
    natural English and preserves the sense of benevolent treatment.
- source_word: וַיִּתֵּן אֶת כִּסְאוֹ
  chosen: set his throne
  alternatives:
  - gave him his throne
  - placed his seat
  lexicon: HALOT
  rationale: נתן with 'throne' here refers to assigning or positioning royal status/seating,
    not gifting a physical object. 'Set his throne' captures the act of establishing
    Jehoiachin's rank.
- source_word: כִּסְאוֹ
  chosen: his throne
  alternatives:
  - his seat
  lexicon: HALOT
  rationale: Although the immediate image may be a seat of honor, כיסא regularly denotes
    a throne and carries royal-status connotations important in context. 'Throne'
    best preserves both literal and symbolic force.
- source_word: מֵעַל כִּסֵּא הַמְּלָכִים
  chosen: above the throne of the kings
  alternatives:
  - higher than the seats of the kings
  - above the seats of the kings
  lexicon: HALOT
  rationale: מעל indicates elevation in rank or position. Retaining singular 'the
    throne of the kings' reflects the Hebrew construction while conveying comparative
    precedence over the other royal figures.
- source_word: הַמְּלָכִים אֲשֶׁר אִתּוֹ
  chosen: the kings who were with him
  alternatives:
  - the kings who were with him there
  - the kings in his presence
  lexicon: HALOT
  rationale: The phrase identifies other kings present in the Babylonian court. 'Who
    were with him' is a straightforward rendering of the relative clause.
- source_word: בְּבָבֶל
  chosen: in Babylon
  lexicon: HALOT
  rationale: Standard locative rendering; no contextual reason to expand beyond the
    place name.
