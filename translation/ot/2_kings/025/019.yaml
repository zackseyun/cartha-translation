id: 2KI.25.19
reference: 2 Kings 25:19
source:
  edition: WLC
  text: וּ/מִן הָ/עִ֡יר לָקַח֩ סָרִ֨יס אֶחָ֜ד אֲֽשֶׁר ה֥וּא פָקִ֣יד עַל אַנְשֵׁ֣י
    הַ/מִּלְחָמָ֗ה וַ/חֲמִשָּׁ֨ה אֲנָשִׁ֜ים מֵ/רֹאֵ֤י פְנֵֽי הַ/מֶּ֨לֶךְ֙ אֲשֶׁ֣ר
    נִמְצְא֣וּ בָ/עִ֔יר וְ/אֵ֗ת הַ/סֹּפֵר֙ שַׂ֣ר הַ/צָּבָ֔א הַ/מַּצְבִּ֖א אֶת עַ֣ם
    הָ/אָ֑רֶץ וְ/שִׁשִּׁ֥ים אִישׁ֙ מֵ/עַ֣ם הָ/אָ֔רֶץ הַֽ/נִּמְצְאִ֖ים בָּ/עִֽיר־־׀־־־׃
translation:
  text: And from the city he took one court official, who was appointed over the men
    of war, and five men from those who saw the king’s face, who were found in the
    city, and the scribe, the commander of the army, who mustered the people of the
    land, and sixty men from the people of the land who were found in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eunuch'; the Hebrew term can denote either a literal eunuch or a royal
      court officer.
    reason: lexical_alternative
  - marker: b
    text: '''Those who saw the king’s face'' is a Hebrew idiom for those with direct
      access to the king, likely royal attendants or courtiers.'
    reason: cultural_note
  - marker: c
    text: Or 'enrolled' or 'conscripted' the people of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָרִיס
  chosen: court official
  alternatives:
  - eunuch
  - officer
  lexicon: HALOT
  rationale: The term can denote a literal eunuch or, more broadly, a royal court
    officer. In this administrative and military context, 'court official' best fits
    the likely function without asserting physical status the text does not require.
- source_word: פָקִיד עַל אַנְשֵׁי הַמִּלְחָמָה
  chosen: appointed over the men of war
  alternatives:
  - officer over the fighting men
  - in charge of the soldiers
  lexicon: HALOT
  rationale: פָקִיד denotes one appointed or placed in charge. 'Men of war' preserves
    the military register of אַנְשֵׁי הַמִּלְחָמָה while remaining understandable
    in English.
- source_word: מֵרֹאֵי פְנֵי הַמֶּלֶךְ
  chosen: from those who saw the king’s face
  alternatives:
  - from the king's personal attendants
  - from those in the king's presence
  lexicon: HALOT
  rationale: The Hebrew idiom refers to those with direct access to the king, likely
    high-ranking attendants or courtiers. The more literal rendering preserves the
    idiom and allows readers to infer the courtly sense.
- source_word: הַסֹּפֵר שַׂר הַצָּבָא
  chosen: the scribe, the commander of the army
  alternatives:
  - the secretary of the army commander
  - the military scribe
  lexicon: HALOT
  rationale: The appositional relationship is somewhat compressed in Hebrew. This
    rendering keeps both titles visible and follows the syntax closely, while allowing
    the next clause to define his military role.
- source_word: הַמַּצְבִּא אֶת עַם הָאָרֶץ
  chosen: who mustered the people of the land
  alternatives:
  - who enrolled the people of the land
  - who conscripted the people of the land
  lexicon: HALOT
  rationale: The Hiphil participle of צבא here refers to organizing or calling up
    people for military service. 'Mustered' captures the military-administrative sense
    without overcommitting to forced conscription.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the country
  lexicon: HALOT
  rationale: This expression can refer to the populace of the land, sometimes especially
    the non-elite or landed citizenry. The more literal 'people of the land' preserves
    the phrase's possible social nuance without narrowing it prematurely.
- source_word: נִמְצְאוּ / הַנִּמְצְאִים
  chosen: were found
  alternatives:
  - were present
  - were discovered
  lexicon: HALOT
  rationale: The Niphal of מצא is straightforwardly 'be found.' 'Were found' preserves
    the passive sense and the narrative implication that these persons were located
    in the city after its fall.
- source_word: לָקַח
  chosen: he took
  alternatives:
  - he seized
  - he took away
  lexicon: HALOT
  rationale: The verb is the standard 'take.' In context it implies removal of captives,
    but 'took' is sufficiently precise and avoids adding force not explicit in the
    verb itself.
