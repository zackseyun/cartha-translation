id: 2KI.25.13
reference: 2 Kings 25:13
source:
  edition: WLC
  text: וְ/אֶת עַמּוּדֵ֨י הַ/נְּחֹ֜שֶׁת אֲשֶׁ֣ר בֵּית יְהוָ֗ה וְֽ/אֶת הַ/מְּכֹנ֞וֹת
    וְ/אֶת יָ֧ם הַ/נְּחֹ֛שֶׁת אֲשֶׁ֥ר בְּ/בֵית יְהוָ֖ה שִׁבְּר֣וּ כַשְׂדִּ֑ים וַ/יִּשְׂא֥וּ
    אֶת נְחֻשְׁתָּ֖/ם בָּבֶֽלָ/ה־־־־־־׃
translation:
  text: And the Chaldeans broke in pieces the bronze pillars that were in the house
    of the LORD, and the stands, and the bronze sea that was in the house of the LORD,
    and carried their bronze to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bases' for 'the stands' (Hebrew מְכֹנוֹת), referring to the supporting
      structures for the temple basins.
    reason: lexical_alternative
  - marker: b
    text: '''The Chaldeans'' refers to the Babylonian forces.'
    reason: cultural_note
lexical_decisions:
- source_word: עַמּוּדֵי הַנְּחֹשֶׁת
  chosen: the bronze pillars
  alternatives:
  - the pillars of bronze
  - the bronze columns
  lexicon: HALOT
  rationale: עַמּוּדִים denotes pillars/columns; 'pillars' is natural English and
    fits the temple furnishings context. הַנְּחֹשֶׁת is rendered 'bronze,' the standard
    modern rendering for נְחֹשֶׁת in tabernacle/temple metalwork contexts, rather
    than the older traditional 'brass.'
- source_word: אֲשֶׁר בֵּית יְהוָה
  chosen: that were in the house of the LORD
  alternatives:
  - which belonged to the house of the LORD
  - that were at the house of the LORD
  lexicon: HALOT
  rationale: The relative clause is verbless in Hebrew. In context it identifies location,
    not ownership alone, so 'that were in the house of the LORD' makes the implied
    sense explicit in idiomatic English.
- source_word: הַמְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  - the movable stands
  lexicon: HALOT
  rationale: מְכֹנוֹת refers to the stands/bases associated with the temple lavers.
    'Stands' is clear modern English; 'bases' is possible but less concrete for general
    readers.
- source_word: יָם הַנְּחֹשֶׁת
  chosen: the bronze sea
  alternatives:
  - the Sea of bronze
  - the bronze basin
  lexicon: HALOT
  rationale: יָם is literally 'sea' and is the established designation for the large
    temple basin. Retaining 'sea' preserves the source imagery and the specific temple
    furnishing name; 'basin' is interpretive.
- source_word: שִׁבְּרוּ
  chosen: broke in pieces
  alternatives:
  - broke up
  - shattered
  lexicon: HALOT
  rationale: The verb שׁבר here describes breaking large bronze objects down for transport.
    'Broke in pieces' captures the practical force better than the simpler 'broke'
    and is a common idiomatic equivalent.
- source_word: כַשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' While this often refers to
    the Babylonian imperial forces, the more direct rendering preserves the source
    wording; the broader identification can be inferred from context.
- source_word: וַיִּשְׂאוּ
  chosen: and carried
  alternatives:
  - and took away
  - and bore
  lexicon: HALOT
  rationale: נשא in this context means to lift/carry away as plunder. 'Carried' is
    concise and natural, with the destination supplied by the following phrase.
- source_word: נְחֻשְׁתָּם
  chosen: their bronze
  alternatives:
  - the bronze from them
  - their bronze metal
  lexicon: HALOT
  rationale: The 3mp suffix refers back to the broken bronze objects collectively.
    'Their bronze' is the most direct rendering, indicating the bronze belonging to
    those items.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - toward Babylon
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Babylon; in English 'to
    Babylon' is the normal idiomatic rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
