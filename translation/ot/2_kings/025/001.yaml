id: 2KI.25.1
reference: 2 Kings 25:1
source:
  edition: WLC
  text: וַ/יְהִי֩ בִ/שְׁנַ֨ת הַ/תְּשִׁיעִ֜ית לְ/מָלְכ֗/וֹ בַּ/חֹ֣דֶשׁ הָ/עֲשִׂירִי֮
    בֶּ/עָשׂ֣וֹר לַ/חֹדֶשׁ֒ בָּ֠א נְבֻכַדְנֶאצַּ֨ר מֶֽלֶךְ בָּבֶ֜ל ה֧וּא וְ/כָל חֵיל֛/וֹ
    עַל יְרוּשָׁלִַ֖ם וַ/יִּ֣חַן עָלֶ֑י/הָ וַ/יִּבְנ֥וּ עָלֶ֖י/הָ דָּיֵ֥ק סָבִֽיב־־־׃
translation:
  text: And it happened in the ninth year of his reign, in the tenth month, on the
    tenth day of the month, that Nebuchadnezzar king of Babylon came, he and all his
    army, against Jerusalem, and encamped against it and built a siege wall around
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'siegeworks' or 'siege rampart' for the Hebrew דָּיֵק, a term for military
      works built against a city during a siege.
    reason: lexical_alternative
  - marker: b
    text: The name may also be rendered 'Nebuchadrezzar' in some transliteration traditions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a historical episode. 'And it
    happened' preserves the Hebrew narrative transition without archaic English.
- source_word: בִּשְׁנַת הַתְּשִׁיעִית לְמָלְכוֹ
  chosen: in the ninth year of his reign
  alternatives:
  - in the ninth year of his kingship
  lexicon: HALOT
  rationale: Standard regnal-year formula. 'His reign' is idiomatic English for the
    king's period of rule.
- source_word: בַּחֹדֶשׁ הָעֲשִׂירִי
  chosen: in the tenth month
  lexicon: HALOT
  rationale: Straightforward calendrical expression; 'month' should be retained rather
    than converted to a modern month name not present in the text.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: on the tenth day of the month
  alternatives:
  - on the tenth of the month
  lexicon: HALOT
  rationale: Hebrew idiom literally 'on the tenth of the month'; expanded slightly
    for natural English while preserving the date formula.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  - advanced
  lexicon: HALOT
  rationale: Simple verb of motion. 'Came' is the most direct rendering in the narrative
    sequence.
- source_word: נְבֻכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration of the royal name. The WLC spelling
    here supports the familiar English form 'Nebuchadnezzar.'
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Royal title plus place name, rendered directly.
- source_word: הוּא וְכָל חֵילוֹ
  chosen: he and all his army
  alternatives:
  - he and all his forces
  lexicon: HALOT
  rationale: 'The pronoun adds emphasis/inclusion: Nebuchadnezzar personally, together
    with his full military force. ''Army'' is the most natural rendering of חַיִל
    in this siege context.'
- source_word: עַל יְרוּשָׁלַםִ
  chosen: against Jerusalem
  alternatives:
  - to Jerusalem
  - upon Jerusalem
  lexicon: HALOT
  rationale: 'With military movement and siege context, עַל is adversative: the army
    came against Jerusalem, not merely to it.'
- source_word: וַיִּחַן עָלֶיהָ
  chosen: and encamped against it
  alternatives:
  - and camped against it
  - and encamped by it
  lexicon: HALOT
  rationale: In siege context, חנה with עַל indicates taking up a military camp against
    the city. 'Encamped' fits the formal narrative register.
- source_word: וַיִּבְנוּ עָלֶיהָ
  chosen: and built ... around it
  alternatives:
  - and constructed ... against it
  lexicon: HALOT
  rationale: Plural verb likely refers to Nebuchadnezzar's forces. English keeps the
    plural action with an implied subject from 'he and all his army.'
- source_word: דָּיֵק
  chosen: a siege wall
  alternatives:
  - siegeworks
  - siege rampart
  - mound
  lexicon: HALOT
  rationale: The noun denotes siegeworks erected against a city. 'Siege wall' is concrete
    and readable; 'mound' may be too narrow, while 'siegeworks' is broader and less
    vivid.
- source_word: סָבִיב
  chosen: around it
  alternatives:
  - all around it
  - round about it
  lexicon: HALOT
  rationale: Adverb indicating encirclement. 'Around it' is clear modern English and
    conveys the city's being surrounded.
