id: 2KI.25.3
reference: 2 Kings 25:3
source:
  edition: WLC
  text: בְּ/תִשְׁעָ֣ה לַ/חֹ֔דֶשׁ וַ/יֶּחֱזַ֥ק הָ/רָעָ֖ב בָּ/עִ֑יר וְ/לֹא הָ֥יָה לֶ֖חֶם
    לְ/עַ֥ם הָ/אָֽרֶץ־׃
translation:
  text: On the ninth day of the month, the famine became severe in the city, and there
    was no bread for the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was no food,' since 'bread' can function more broadly as a term
      for sustenance.
    reason: lexical_alternative
  - marker: b
    text: '''People of the land'' can in some contexts refer more specifically to
      the common people or local populace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּתִשְׁעָה לַחֹדֶשׁ
  chosen: On the ninth day of the month
  alternatives:
  - On the ninth of the month
  lexicon: HALOT
  rationale: The Hebrew literally reads 'on the ninth, of the month.' English idiom
    normally supplies 'day.' This keeps the temporal reference clear without over-paraphrasing.
- source_word: וַיֶּחֱזַק
  chosen: became severe
  alternatives:
  - grew strong
  - prevailed
  - intensified
  lexicon: HALOT
  rationale: The verb חזק literally means 'to be strong/strengthen.' With 'the famine'
    as subject, idiomatic English is 'became severe' or 'intensified.' 'Became severe'
    best conveys the worsening condition in natural modern English.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: רָעָב in this context denotes famine rather than mere subjective hunger.
    'The famine' matches the historical siege setting.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In the city' is the most natural
    rendering.
- source_word: וְלֹא הָיָה לֶחֶם
  chosen: and there was no bread
  alternatives:
  - and there was no food
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread,' and in Hebrew can stand metonymically for
    food. The main text keeps the concrete term 'bread' to stay closer to the source;
    the broader sense is contextually understood.
- source_word: לְעַם הָאָרֶץ
  chosen: for the people of the land
  alternatives:
  - for the common people
  - for the people of the country
  - for the people of the land of Judah
  lexicon: HALOT
  rationale: The phrase literally means 'for the people of the land.' In some contexts
    it can denote the common people or landed populace, but here the literal rendering
    is preferable and sufficiently clear. It avoids importing a narrower sociological
    interpretation not demanded by the verse alone.
