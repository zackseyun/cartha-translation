id: 2KI.25.2
reference: 2 Kings 25:2
source:
  edition: WLC
  text: וַ/תָּבֹ֥א הָ/עִ֖יר בַּ/מָּצ֑וֹר עַ֚ד עַשְׁתֵּ֣י עֶשְׂרֵ֣ה שָׁנָ֔ה לַ/מֶּ֖לֶךְ
    צִדְקִיָּֽהוּ׃
translation:
  text: So the city remained under siege until the eleventh year of King Zedekiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the city came into siege,' a Hebrew idiom meaning that the city
      was in a besieged state.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: remained
  alternatives:
  - came
  - entered
  - continued
  lexicon: HALOT
  rationale: 'Although the verb is literally ''came''/''entered'' (from בוא), in the
    idiom ''the city came into siege'' the sense is stative/resultative: the city
    was in a state of siege. ''Remained'' communicates the ongoing condition naturally
    in English while staying close to the Hebrew sense in context.'
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר with the article.
- source_word: בַּמָּצוֹר
  chosen: under siege
  alternatives:
  - in the siege
  - in confinement
  - in the besieged state
  lexicon: HALOT
  rationale: מָצוֹר denotes siege/siegeworks. With the preposition and the idiom formed
    with בוא, idiomatic English is 'under siege' rather than the more wooden 'in the
    siege.'
- source_word: עַד
  chosen: until
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: Temporal marker introducing the endpoint of the siege.
- source_word: עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: the eleventh year
  alternatives:
  - year eleven
  - the eleven year
  lexicon: HALOT
  rationale: The Hebrew cardinal expression in regnal dating is most naturally rendered
    in English as the ordinal 'the eleventh year.' This is standard and preserves
    the chronological sense.
- source_word: לַמֶּלֶךְ
  chosen: of King
  alternatives:
  - for the king
  - belonging to the king
  lexicon: HALOT
  rationale: The preposition ל in regnal formulas marks the year of a king's reign;
    idiomatic English expresses this as 'of King ...' rather than 'to/for the king.'
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
