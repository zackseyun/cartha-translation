id: 2KI.25.6
reference: 2 Kings 25:6
source:
  edition: WLC
  text: וַֽ/יִּתְפְּשׂוּ֙ אֶת הַ/מֶּ֔לֶךְ וַ/יַּעֲל֥וּ אֹת֛/וֹ אֶל מֶ֥לֶךְ בָּבֶ֖ל
    רִבְלָ֑תָ/ה וַ/יְדַבְּר֥וּ אִתּ֖/וֹ מִשְׁפָּֽט־־׃
translation:
  text: Then they captured the king and brought him up to the king of Babylon at Riblah,
    and they passed sentence on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they spoke judgment with him,' an idiom meaning they
      pronounced judicial sentence on him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפְּשׂוּ
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: The verb תפשׂ in this context refers to apprehending a fleeing ruler.
    'Captured' is natural modern English and conveys successful seizure better than
    the more generic 'took.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the king already in view, Zedekiah. The text
    does not repeat his personal name here, so 'the king' preserves the Hebrew discourse
    form.
- source_word: וַיַּעֲלוּ אֹתוֹ
  chosen: brought him up
  alternatives:
  - took him up
  - brought him
  lexicon: HALOT
  rationale: עלה literally means 'go up/bring up.' Retaining 'up' reflects the Hebrew
    idiom and the directional sense without becoming awkward. 'Brought him' alone
    would lose that feature.
- source_word: אֶל מֶלֶךְ בָּבֶל
  chosen: to the king of Babylon
  alternatives:
  - before the king of Babylon
  lexicon: HALOT
  rationale: The preposition אֶל most straightforwardly means 'to.' 'Before' is interpretive
    and possible in context, but 'to the king of Babylon' is the more direct rendering.
- source_word: רִבְלָתָה
  chosen: at Riblah
  alternatives:
  - to Riblah
  lexicon: HALOT
  rationale: The directional he on the place name can indicate motion toward Riblah,
    but in English the phrase naturally functions as the location where the audience
    with the Babylonian king occurred. 'At Riblah' best fits the whole clause.
- source_word: וַיְדַבְּרוּ אִתּוֹ מִשְׁפָּט
  chosen: they passed sentence on him
  alternatives:
  - they spoke judgment with him
  - they pronounced judgment on him
  - they gave judgment against him
  lexicon: HALOT
  rationale: The idiom דבר + משפט here does not mean mere conversation but judicial
    pronouncement. 'Passed sentence on him' captures the legal force in clear modern
    English. More literal options are less idiomatic and may obscure the courtroom
    sense.
