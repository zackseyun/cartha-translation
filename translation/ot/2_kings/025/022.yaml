id: 2KI.25.22
reference: 2 Kings 25:22
source:
  edition: WLC
  text: וְ/הָ/עָ֗ם הַ/נִּשְׁאָר֙ בְּ/אֶ֣רֶץ יְהוּדָ֔ה אֲשֶׁ֣ר הִשְׁאִ֔יר נְבֽוּכַדְנֶאצַּ֖ר
    מֶ֣לֶךְ בָּבֶ֑ל וַ/יַּפְקֵ֣ד עֲלֵי/הֶ֔ם אֶת גְּדַלְיָ֖הוּ בֶּן אֲחִיקָ֥ם בֶּן
    שָׁפָֽן־־־׃פ
translation:
  text: As for the people who remained in the land of Judah, whom Nebuchadnezzar king
    of Babylon had left, he appointed Gedaliah son of Ahikam, son of Shaphan, over
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "who were left"; the Hebrew participle can be rendered either way, emphasizing
      those remaining in Judah after the deportations.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering of עָם in a collective national sense. 'The people'
    is natural English and fits the historical narrative context.
- source_word: הַנִּשְׁאָר
  chosen: who remained
  alternatives:
  - who were left
  - the remnant
  lexicon: HALOT
  rationale: Niphal participle of שׁאר denotes those left behind or remaining. 'Who
    remained' is clear and avoids importing the more theologically loaded noun 'remnant'
    where the text is simply descriptive.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in the country of Judah
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land'; this is the standard geographical expression
    and preserves the territorial sense.
- source_word: אֲשֶׁר הִשְׁאִיר
  chosen: whom ... had left
  alternatives:
  - whom ... had allowed to remain
  lexicon: HALOT
  rationale: The Hiphil of שׁאר here is causative, indicating those Nebuchadnezzar
    left behind in the land. The pluperfect 'had left' fits the narrative sequence
    in English.
- source_word: נְבוּכַדְנֶאצַּר מֶלֶךְ בָּבֶל
  chosen: Nebuchadnezzar king of Babylon
  alternatives:
  - Nebuchadnezzar, the king of Babylon
  rationale: Personal names are transliterated by standard convention per project
    philosophy. The appositional royal title is retained straightforwardly.
- source_word: וַיַּפְקֵד עֲלֵיהֶם
  chosen: he appointed ... over them
  alternatives:
  - he set ... over them
  - he put ... in charge of them
  lexicon: HALOT
  rationale: פקד with עַל in this administrative context means to appoint or place
    in oversight. 'Appointed ... over them' is idiomatic and preserves the official
    sense.
- source_word: גְּדַלְיָהוּ
  chosen: Gedaliah
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן אֲחִיקָם בֶּן שָׁפָן
  chosen: son of Ahikam, son of Shaphan
  rationale: Hebrew patronymic chain is preserved formally for historical specificity
    and readability.
- source_word: וְ
  chosen: As for
  alternatives:
  - Now
  - And
  lexicon: HALOT
  rationale: The initial conjunction introduces a shift to the status of the remaining
    population after the prior events. 'As for' captures the topical transition more
    naturally than a bare 'And' in English.
