id: 2KI.25.26
reference: 2 Kings 25:26
source:
  edition: WLC
  text: וַ/יָּקֻ֨מוּ כָל הָ/עָ֜ם מִ/קָּטֹ֤ן וְ/עַד גָּדוֹל֙ וְ/שָׂרֵ֣י הַ/חֲיָלִ֔ים
    וַ/יָּבֹ֖אוּ מִצְרָ֑יִם כִּ֥י יָרְא֖וּ מִ/פְּנֵ֥י כַשְׂדִּֽים־־׃פ
translation:
  text: Then all the people, from the least to the greatest, and the commanders of
    the forces, arose and went to Egypt, because they were afraid of the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the army officers' or 'the captains of the troops.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: arose
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום, here marking the people's decisive action. 'Arose'
    preserves the narrative sequence without over-interpreting it as merely physical
    standing or as departure alone.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - the whole people
  lexicon: HALOT
  rationale: Straightforward collective expression; 'all the people' is natural English
    and preserves the comprehensiveness of the Hebrew.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from the youngest to the oldest
  lexicon: HALOT
  rationale: An idiom expressing totality across social rank or significance, not
    necessarily age. 'From the least to the greatest' is the most idiomatic and semantically
    broad rendering.
- source_word: וְשָׂרֵי הַחֲיָלִים
  chosen: and the commanders of the forces
  alternatives:
  - and the army officers
  - and the captains of the troops
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials; חַיִל in this context refers to military
    forces. 'Commanders of the forces' is clear modern English and avoids the potentially
    too-specific or archaic 'captains.'
- source_word: וַיָּבֹאוּ מִצְרָיִם
  chosen: went to Egypt
  alternatives:
  - came to Egypt
  lexicon: HALOT
  rationale: Although בוא often literally means 'come,' English deictic usage favors
    'went to Egypt' from the narrator's perspective here.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their flight. 'Because' is clearer in contemporary
    English than the more formal 'for.'
- source_word: יָרְאוּ
  chosen: they were afraid
  alternatives:
  - they feared
  lexicon: HALOT
  rationale: The verb ירא here denotes fear. 'They were afraid' is natural modern
    English; 'they feared' is possible but slightly stiffer.
- source_word: מִפְּנֵי כַשְׂדִּים
  chosen: of the Chaldeans
  alternatives:
  - before the Chaldeans
  - because of the Chaldeans
  - from before the Chaldeans
  lexicon: HALOT
  rationale: מִפְּנֵי with ירא conveys fear in the face of someone. English idiom
    is simply 'afraid of the Chaldeans.' 'Chaldeans' is retained as the standard historical
    ethnonym in Kings.
