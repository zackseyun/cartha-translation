id: 2KI.25.8
reference: 2 Kings 25:8
source:
  edition: WLC
  text: וּ/בַ/חֹ֤דֶשׁ הַֽ/חֲמִישִׁי֙ בְּ/שִׁבְעָ֣ה לַ/חֹ֔דֶשׁ הִ֗יא שְׁנַת֙ תְּשַֽׁע
    עֶשְׂרֵ֣ה שָׁנָ֔ה לַ/מֶּ֖לֶךְ נְבֻכַדְנֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֑ל בָּ֞א נְבוּזַרְאֲדָ֧ן
    רַב טַבָּחִ֛ים עֶ֥בֶד מֶֽלֶךְ בָּבֶ֖ל יְרוּשָׁלִָֽם־־־־׃
translation:
  text: And in the fifth month, on the seventh day of the month—which was the nineteenth
    year of King Nebuchadnezzar, king of Babylon—Nebuzaradan, the captain of the guard,
    a servant of the king of Babylon, came to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'chief of the slaughterers'; the title likely refers to the commander
      of the royal guard or executioners.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹדֶשׁ הַחֲמִישִׁי
  chosen: And in the fifth month
  alternatives:
  - Now in the fifth month
  - In the fifth month
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition is most naturally rendered
    as a narrative continuation, 'And in.' 'Fifth month' is a straightforward calendrical
    expression and should remain formal.
- source_word: בְּשִׁבְעָה לַחֹדֶשׁ
  chosen: on the seventh day of the month
  alternatives:
  - on the seventh of the month
  lexicon: HALOT
  rationale: English idiom commonly supplies 'day' in date formulas. This makes the
    Hebrew date expression clear without adding interpretive content.
- source_word: הִיא שְׁנַת תְּשַׁע עֶשְׂרֵה שָׁנָה
  chosen: which was the nineteenth year
  alternatives:
  - it was the nineteenth year
  lexicon: HALOT
  rationale: The feminine pronoun הִיא refers back to the date/time expression and
    functions parenthetically. 'Which was' gives natural English while preserving
    the explanatory force of the clause.
- source_word: לַמֶּלֶךְ נְבֻכַדְנֶאצַּר
  chosen: of King Nebuchadnezzar
  alternatives:
  - for King Nebuchadnezzar
  - belonging to King Nebuchadnezzar
  lexicon: HALOT
  rationale: 'The lamed here marks regnal reckoning: the year is counted with reference
    to the king. English expresses this idiomatically as ''of King Nebuchadnezzar.'''
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Standard construct chain; retained formally both after Nebuchadnezzar
    and later in reference to his court.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: The common narrative verb בוא is best rendered 'came.' 'Arrived' is possible
    but less direct.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - chief of the executioners
  - chief butcher
  lexicon: HALOT
  rationale: Although the literal sense of טבחים relates to slaughterers/butchers
    and by extension royal bodyguards/executioners, the established contextual sense
    in royal court usage is an official over the guard. 'Captain of the guard' communicates
    the office clearly in modern English without wooden literalism.
- source_word: עֶבֶד מֶלֶךְ בָּבֶל
  chosen: a servant of the king of Babylon
  alternatives:
  - an officer of the king of Babylon
  - a slave of the king of Babylon
  lexicon: HALOT
  rationale: עֶבֶד can denote a servant, subject, or official subordinate. Here it
    identifies Nebuzaradan as in the service of the Babylonian king, likely in an
    official capacity. 'Servant' is broad enough to preserve the relation without
    overstating chattel status; 'slave' would be too specific in this courtly context.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
