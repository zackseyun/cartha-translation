id: 2KI.25.24
reference: 2 Kings 25:24
source:
  edition: WLC
  text: וַ/יִּשָּׁבַ֨ע לָ/הֶ֤ם גְּדַלְיָ֨הוּ֙ וּ/לְ/אַנְשֵׁי/הֶ֔ם וַ/יֹּ֣אמֶר לָ/הֶ֔ם
    אַל תִּֽירְא֖וּ מֵ/עַבְדֵ֣י הַ/כַּשְׂדִּ֑ים שְׁב֣וּ בָ/אָ֗רֶץ וְ/עִבְד֛וּ אֶת
    מֶ֥לֶךְ בָּבֶ֖ל וְ/יִטַ֥ב לָ/כֶֽם־־׃ס
translation:
  text: Gedaliah swore to them and to their men, and said to them, “Do not be afraid
    of the servants of the Chaldeans. Live in the land and serve the king of Babylon,
    and it will go well for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the officials of the Chaldeans.' The Hebrew reads 'the servants of the
      Chaldeans,' which may refer to Babylonian agents or administrators.
    reason: lexical_alternative
  - marker: b
    text: '''Chaldeans'' is the Hebrew term; it can also be rendered ''Babylonians''
      in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - gave his oath
  - swore an oath
  lexicon: HALOT
  rationale: The verb שׁבע in the Niphal commonly means 'to swear' or 'take an oath.'
    'Swore' is concise and natural English; the object 'to them and to their men'
    conveys the assurance/oath made to the group.
- source_word: וּלְאַנְשֵׁיהֶם
  chosen: and to their men
  alternatives:
  - and to their soldiers
  - and to their people
  lexicon: HALOT
  rationale: אַנְשֵׁי literally means 'men of.' In this narrative context it most
    naturally refers to the men associated with the leaders who came to Gedaliah,
    likely their retainers or troops. 'Their men' preserves the Hebrew wording without
    over-specifying.
- source_word: אַל־תִּירְאוּ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: A standard rendering of ירא in the negative imperative. 'Do not be afraid'
    is idiomatic modern English while preserving the force of the command.
- source_word: מֵעַבְדֵי הַכַּשְׂדִּים
  chosen: of the servants of the Chaldeans
  alternatives:
  - of the officials of the Chaldeans
  - because of the servants of the Chaldeans
  lexicon: HALOT
  rationale: עבדי literally means 'servants of.' Here it likely refers to Babylonian
    functionaries or agents. The preposition מִן after 'fear' is naturally rendered
    'be afraid of.' 'Servants' keeps the lexical form; 'officials' is interpretive
    and therefore left as an alternative.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: כשדים is the standard Hebrew ethnonym 'Chaldeans,' often referring to
    the Babylonian imperial power. The more literal ethnonym is retained in the main
    text; 'Babylonians' is a contextual alternative.
- source_word: שְׁבוּ בָאָרֶץ
  chosen: Live in the land
  alternatives:
  - Dwell in the land
  - Remain in the land
  lexicon: HALOT
  rationale: ישב can mean sit, dwell, remain, or live. In this settlement context,
    'Live in the land' is natural English and conveys continued residence under the
    new political order.
- source_word: וְעִבְדוּ אֶת־מֶלֶךְ בָּבֶל
  chosen: and serve the king of Babylon
  alternatives:
  - and work for the king of Babylon
  - and submit to the king of Babylon
  lexicon: HALOT
  rationale: עבד with a personal object commonly means 'serve.' In this political
    context it implies subjection/service to imperial rule. 'Serve' preserves the
    lexical sense without paraphrasing into the more interpretive 'submit.'
- source_word: וְיִטַב לָכֶם
  chosen: and it will go well for you
  alternatives:
  - and it will be well with you
  - and things will go well for you
  lexicon: HALOT
  rationale: יטב is an impersonal idiom meaning that matters will be good/well for
    someone. 'It will go well for you' is idiomatic modern English and preserves the
    promise of favorable outcome.
