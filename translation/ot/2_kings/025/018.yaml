id: 2KI.25.18
reference: 2 Kings 25:18
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח רַב טַבָּחִ֗ים אֶת שְׂרָיָה֙ כֹּהֵ֣ן הָ/רֹ֔אשׁ וְ/אֶת צְפַנְיָ֖הוּ
    כֹּהֵ֣ן מִשְׁנֶ֑ה וְ/אֶת שְׁלֹ֖שֶׁת שֹׁמְרֵ֥י הַ/סַּֽף־־־־׃
translation:
  text: The captain of the guard took Seraiah the chief priest, Zephaniah the second
    priest, and the three keepers of the threshold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'doorkeepers' or 'keepers of the temple entrance.' The Hebrew is literally
      'keepers of the threshold.'
    reason: lexical_alternative
  - marker: b
    text: '''Chief priest'' could also be rendered ''high priest.'' The Hebrew is
      literally ''the priest, the head/chief.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the captain of the bodyguard
  lexicon: HALOT
  rationale: This title refers to the Babylonian official Nebuzaradan. Although the
    literal components involve 'chief' and 'slaughterers/butchers,' in royal-military
    context the idiomatic sense is the commander of the royal guard/bodyguard. 'Captain
    of the guard' is clear modern English and fits the established narrative role
    without over-literalizing the title.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - captured
  lexicon: HALOT
  rationale: The verb לקח commonly means 'take.' Here it introduces the arrest/removal
    of named officials. 'Took' preserves the Hebrew wording while allowing the context
    to convey the coercive sense.
- source_word: כֹּהֵן הָרֹאשׁ
  chosen: the chief priest
  alternatives:
  - the high priest
  - the head priest
  lexicon: HALOT
  rationale: Literally 'the priest, the head/chief.' In this historical context it
    denotes the leading priestly official. 'Chief priest' closely reflects the Hebrew
    structure without importing later technical associations more strongly attached
    to 'high priest,' though that is a plausible alternative.
- source_word: כֹּהֵן מִשְׁנֶה
  chosen: the second priest
  alternatives:
  - the deputy priest
  - the second-ranking priest
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes second rank or deputy status. 'Second priest' is a natural,
    fairly literal rendering that preserves the hierarchical nuance.
- source_word: שֹׁמְרֵי הַסַּף
  chosen: keepers of the threshold
  alternatives:
  - doorkeepers
  - keepers of the temple entrance
  lexicon: HALOT
  rationale: Literally 'keepers/guards of the threshold.' The phrase likely refers
    to temple gatekeepers or guards stationed at the entrance. 'Keepers of the threshold'
    preserves the concrete Hebrew image while remaining intelligible; a more interpretive
    alternative is preserved in a footnote.
- source_word: שְׁלֹשֶׁת
  chosen: the three
  alternatives:
  - three
  lexicon: HALOT
  rationale: With the following definite phrase, English idiom naturally uses 'the
    three,' referring to a known group of three officials.
- source_word: שְׂרָיָה
  chosen: Seraiah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: צְפַנְיָהוּ
  chosen: Zephaniah
  rationale: Personal name transliterated according to the translation philosophy.
