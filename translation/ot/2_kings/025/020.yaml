id: 2KI.25.20
reference: 2 Kings 25:20
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אֹתָ֔/ם נְבוּזַרְאֲדָ֖ן רַב טַבָּחִ֑ים וַ/יֹּ֧לֶךְ אֹתָ֛/ם עַל
    מֶ֥לֶךְ בָּבֶ֖ל רִבְלָֽתָ/ה־־׃
translation:
  text: Nebuzaradan, the captain of the guard, took them and brought them to the king
    of Babylon at Riblah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought them before the king of Babylon at Riblah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'chief of the slaughterers'; likely a royal military/security title,
      traditionally rendered 'captain of the guard.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - captured
  lexicon: HALOT
  rationale: The verb לקח in this narrative context most naturally means 'took.' 'Seized'
    would add a nuance of force not explicit in the verb itself, and 'captured' would
    be redundant since these men are already prisoners in context.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - chief of the executioners
  - captain of the bodyguard
  lexicon: HALOT
  rationale: This title literally involves 'chief' and 'slaughterers/butchers,' but
    in Neo-Babylonian court context it denotes an official role commonly rendered
    'captain of the guard.' This communicates the office in natural English without
    over-literalizing the idiom. The more literal alternatives are preserved as lexical
    possibilities.
- source_word: וַיֹּלֶךְ
  chosen: brought
  alternatives:
  - led
  - took
  lexicon: HALOT
  rationale: Although the verb is from הלך ('go/walk') in a causative/narrative form,
    in this context with a direct object and destination it idiomatically means causing
    them to go, hence 'brought.' 'Led' is possible, but 'brought' reads more naturally
    with the destination phrase in English.
- source_word: עַל
  chosen: to
  alternatives:
  - before
  - unto
  lexicon: HALOT
  rationale: With verbs of movement and the following 'king of Babylon,' על here functions
    idiomatically as movement into the presence of someone. 'To' is the clearest modern
    English rendering. 'Before' is a viable interpretive alternative and is preserved
    in a footnote because it slightly sharpens the audience/judicial setting.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: A straightforward construct chain; no reason to depart from the standard
    rendering.
- source_word: רִבְלָתָה
  chosen: at Riblah
  alternatives:
  - to Riblah
  rationale: The place name with directional/locative ending can be represented in
    English by the simple location phrase 'at Riblah' because the phrase modifies
    where the king was when they were brought to him. 'To Riblah' is possible but
    less precise in the full clause 'to the king of Babylon at Riblah.'
