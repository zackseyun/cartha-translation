id: 2KI.25.11
reference: 2 Kings 25:11
source:
  edition: WLC
  text: וְ/אֵת֩ יֶ֨תֶר הָ/עָ֜ם הַ/נִּשְׁאָרִ֣ים בָּ/עִ֗יר וְ/אֶת הַ/נֹּֽפְלִים֙ אֲשֶׁ֤ר
    נָפְלוּ֙ עַל הַ/מֶּ֣לֶךְ בָּבֶ֔ל וְ/אֵ֖ת יֶ֣תֶר הֶ/הָמ֑וֹן הֶגְלָ֕ה נְבוּזַרְאֲדָ֖ן
    רַב טַבָּחִֽים־־־׃
translation:
  text: Nebuzaradan the captain of the guard carried into exile the rest of the people
    who remained in the city, the deserters who had defected to the king of Babylon,
    and the rest of the multitude.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the defectors who had gone over to the king of Babylon'; literally,
      'the ones who had fallen to the king of Babylon.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'chief of the slaughterers'; likely an official title for the commander
      of the royal guard.
    reason: cultural_note
  - marker: c
    text: Or 'the rest of the crowd' or 'the rest of the population' for 'the rest
      of the multitude.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: Signals those left over after prior deportations/slaughter; idiomatic
    English prefers 'the rest of'.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עָם in a civic/national sense here.
- source_word: הַנִּשְׁאָרִים
  chosen: who remained
  alternatives:
  - who were left
  - who were left behind
  lexicon: HALOT
  rationale: Niphal participle of שׁאר denotes those left remaining in the city after
    the siege; 'remained' is concise and natural.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: Locative phrase referring specifically to Jerusalem in context.
- source_word: הַנֹּפְלִים ... נָפְלוּ עַל
  chosen: the deserters who had defected to
  alternatives:
  - those who had fallen away to
  - the defectors who had gone over to
  lexicon: HALOT
  rationale: The idiom נפל על in this military-political context means to defect or
    go over to a ruler, not literal falling. 'Deserters ... defected' makes the sense
    explicit in modern English.
- source_word: הַמֶּלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Straightforward genitival construction referring to the Babylonian king.
- source_word: יֶתֶר הֶהָמוֹן
  chosen: the rest of the multitude
  alternatives:
  - the rest of the crowd
  - the rest of the population
  lexicon: HALOT
  rationale: הָמוֹן can denote a mass or multitude of people. 'Multitude' preserves
    the broad collective sense without over-specifying a social class. 'Population'
    is possible but slightly interpretive.
- source_word: הֶגְלָה
  chosen: carried into exile
  alternatives:
  - deported
  - took into exile
  lexicon: HALOT
  rationale: Hiphil of גלה commonly means to deport/exile. 'Carried into exile' preserves
    the forced-movement nuance and reads naturally.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Standard English transliteration of the personal name.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the captain of the bodyguard
  lexicon: HALOT
  rationale: Though literally 'chief of the slaughterers/butchers,' this is a Babylonian
    official title. 'Captain of the guard' is the established and contextually accurate
    functional rendering in English; more literal options can mislead modern readers.
