id: 2KI.25.16
reference: 2 Kings 25:16
source:
  edition: WLC
  text: הָ/עַמּוּדִ֣ים שְׁנַ֗יִם הַ/יָּ֤ם הָֽ/אֶחָד֙ וְ/הַ/מְּכֹנ֔וֹת אֲשֶׁר עָשָׂ֥ה
    שְׁלֹמֹ֖ה לְ/בֵ֣ית יְהוָ֑ה לֹא הָיָ֣ה מִשְׁקָ֔ל לִ/נְחֹ֖שֶׁת כָּל הַ/כֵּלִ֥ים
    הָ/אֵֽלֶּה׀־־־׃
translation:
  text: As for the two pillars, the one Sea, and the stands that Solomon had made
    for the house of the LORD, there was no weighing the bronze of all these vessels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there was no weight for the bronze of all these vessels,' that is,
      the bronze was not weighed because of its great quantity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעַמּוּדִים שְׁנַיִם
  chosen: the two pillars
  alternatives:
  - the two columns
  lexicon: HALOT
  rationale: עַמּוּדִים denotes structural pillars/columns. 'Pillars' is the more
    familiar temple-cultic term in English and matches the established referent in
    the temple furnishings.
- source_word: הַיָּם הָאֶחָד
  chosen: the one Sea
  alternatives:
  - the one basin called the Sea
  - the one sea
  lexicon: HALOT
  rationale: יָּם here is the technical name for the large bronze basin in the temple.
    Capitalizing 'Sea' signals that it is a named cultic object, while retaining the
    literal Hebrew term rather than paraphrasing it away.
- source_word: וְהַמְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  - the movable stands
  lexicon: HALOT
  rationale: מְכֹנוֹת refers to the bases/stands associated with the lavers in Solomon's
    temple. 'Stands' is clear modern English; 'bases' is possible but less immediately
    concrete.
- source_word: אֲשֶׁר עָשָׂה שְׁלֹמֹה
  chosen: that Solomon had made
  alternatives:
  - which Solomon made
  lexicon: HALOT
  rationale: The relative clause identifies these temple items as Solomon's workmanship.
    English past perfect ('had made') fits the narrative retrospectively, though simple
    past would also be acceptable.
- source_word: לְבֵית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  - for the house of Yahweh
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following doctrine, יְהוָה
    is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression; 'temple'
    is a valid contextual alternative but less formally transparent.
- source_word: לֹא הָיָה מִשְׁקָל
  chosen: there was no weighing
  alternatives:
  - there was no weight
  - the weight could not be determined
  lexicon: HALOT
  rationale: מִשְׁקָל can mean 'weight' or 'weighing.' In context the sense is that
    the bronze was so abundant that it was not weighed. Rendering it verbally as 'there
    was no weighing' best captures the idiom without overstating that the weight was
    unknown in principle.
- source_word: לִנְחֹשֶׁת
  chosen: the bronze
  alternatives:
  - the bronze weight
  - the copper-alloy
  lexicon: HALOT
  rationale: נְחֹשֶׁת in this context refers to bronze/brass-like metal used in temple
    furnishings. 'Bronze' is the standard modern rendering in temple contexts.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  chosen: of all these vessels
  alternatives:
  - of all these articles
  - of all these implements
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for objects/vessels/implements. Given the temple-furnishing
    context, 'vessels' is suitably concrete and traditional without being archaic.
