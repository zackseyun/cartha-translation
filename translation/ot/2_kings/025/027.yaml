id: 2KI.25.27
reference: 2 Kings 25:27
source:
  edition: WLC
  text: וַ/יְהִי֩ בִ/שְׁלֹשִׁ֨ים וָ/שֶׁ֜בַע שָׁנָ֗ה לְ/גָלוּת֙ יְהוֹיָכִ֣ין מֶֽלֶךְ
    יְהוּדָ֔ה בִּ/שְׁנֵ֤ים עָשָׂר֙ חֹ֔דֶשׁ בְּ/עֶשְׂרִ֥ים וְ/שִׁבְעָ֖ה לַ/חֹ֑דֶשׁ
    נָשָׂ֡א אֱוִ֣יל מְרֹדַךְ֩ מֶ֨לֶךְ בָּבֶ֜ל בִּ/שְׁנַ֣ת מָלְכ֗/וֹ אֶת רֹ֛אשׁ יְהוֹיָכִ֥ין
    מֶֽלֶךְ יְהוּדָ֖ה מִ/בֵּ֥ית כֶּֽלֶא־־־׃
translation:
  text: And it happened in the thirty-seventh year of the exile of Jehoiachin king
    of Judah, in the twelfth month, on the twenty-seventh day of the month, that Evil-merodach
    king of Babylon, in the year of his reign, lifted up the head of Jehoiachin king
    of Judah out of the prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''lifted up the head of,'' meaning he elevated Jehoiachin''s
      status or showed him favor, beginning with his release from prison.'
    reason: lexical_alternative
  - marker: b
    text: Evil-merodach is also known historically as Amel-Marduk.
    reason: cultural_note
  - marker: c
    text: '''In the year of his reign'' may mean ''in the first year of his reign.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: לְגָלוּת
  chosen: of the exile
  alternatives:
  - of the captivity
  lexicon: HALOT
  rationale: גָּלוּת denotes exile/deportation. 'Exile' is more natural modern English
    and accurately reflects the state resulting from deportation.
- source_word: יְהוֹיָכִין
  chosen: Jehoiachin
  rationale: Standard English transliteration of the personal name.
- source_word: בִּשְׁנֵים עָשָׂר חֹדֶשׁ
  chosen: in the twelfth month
  alternatives:
  - in month twelve
  lexicon: HALOT
  rationale: Idiomatic rendering of the date formula.
- source_word: בְּעֶשְׂרִים וְשִׁבְעָה לַחֹדֶשׁ
  chosen: on the twenty-seventh day of the month
  alternatives:
  - on the twenty-seventh of the month
  lexicon: HALOT
  rationale: Expands the Hebrew date expression slightly for clear English while preserving
    the formal structure.
- source_word: אֱוִיל מְרֹדַךְ
  chosen: Evil-merodach
  alternatives:
  - Amel-Marduk
  rationale: Uses the conventional biblical English form of the Babylonian royal name;
    the historically reconstructed Akkadian form is preserved as an alternative.
- source_word: בִּשְׁנַת מָלְכוֹ
  chosen: in the year of his reign
  alternatives:
  - in the year he began to reign
  - in the first year of his reign
  lexicon: HALOT
  rationale: The phrase literally means 'in the year of his reigning/reign.' It indicates
    the regnal year context without over-specifying 'first' in the main text, since
    that is inferential though likely.
- source_word: נָשָׂא ... אֶת רֹאשׁ
  chosen: lifted up the head of
  alternatives:
  - showed favor to
  - released
  lexicon: HALOT
  rationale: This idiom literally means 'lifted up the head of' and in context conveys
    elevation/restoration of status. The main text preserves the Hebrew idiom; the
    contextual sense is worth noting in a footnote.
- source_word: מִבֵּית כֶּלֶא
  chosen: out of the prison
  alternatives:
  - out of the house of confinement
  - out of the jail
  lexicon: HALOT
  rationale: The phrase denotes a place of confinement. 'Prison' is the clearest natural
    English equivalent.
