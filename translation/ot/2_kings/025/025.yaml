id: 2KI.25.25
reference: 2 Kings 25:25
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֗י בָּ֣א יִשְׁמָעֵ֣אל בֶּן נְ֠תַנְיָה בֶּן
    אֱלִ֨ישָׁמָ֜ע מִ/זֶּ֣רַע הַ/מְּלוּכָ֗ה וַ/עֲשָׂרָ֤ה אֲנָשִׁים֙ אִתּ֔/וֹ וַ/יַּכּ֥וּ
    אֶת גְּדַלְיָ֖הוּ וַ/יָּמֹ֑ת וְ/אֶת הַ/יְּהוּדִים֙ וְ/אֶת הַ/כַּשְׂדִּ֔ים אֲשֶׁר
    הָי֥וּ אִתּ֖/וֹ בַּ/מִּצְפָּֽה׀־־־־־־׃
translation:
  text: And it happened in the seventh month that Ishmael son of Nethaniah, son of
    Elishama, of the royal seed, came with ten men, and they struck down Gedaliah,
    and he died, along with the Judeans and the Chaldeans who were with him at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "of royal descent." The Hebrew literally says "of the royal seed," indicating
      Ishmael's lineage from the royal house.
    reason: lexical_alternative
  - marker: b
    text: '"Chaldeans" can also be rendered "Babylonians" in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of היה introducing a new event. 'And it
    happened' preserves the Hebrew discourse function without archaic English.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  alternatives:
  - during the seventh month
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'in the seventh month' is the
    most natural and sufficiently formal rendering.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple motion verb. 'Came' matches the Hebrew closely and fits the narrative
    sequence.
- source_word: מִזֶּרַע הַמְּלוּכָה
  chosen: of the royal seed
  alternatives:
  - of royal descent
  - from the royal family
  - of the king's offspring
  lexicon: HALOT
  rationale: The phrase denotes dynastic/royal lineage. 'Of the royal seed' is a relatively
    formal but clear rendering that preserves the genealogical nuance better than
    the broader 'royal family.'
- source_word: וַעֲשָׂרָה אֲנָשִׁים אִתּוֹ
  chosen: with ten men
  alternatives:
  - and ten men with him
  lexicon: HALOT
  rationale: 'English idiom prefers attaching the accompaniment phrase to the verb
    of motion: he came ''with ten men.'''
- source_word: וַיַּכּוּ
  chosen: they struck down
  alternatives:
  - they struck
  - they attacked
  - they killed
  lexicon: HALOT
  rationale: נכה can mean strike/smite and in this context results in death, confirmed
    by the following 'and he died.' 'Struck down' preserves the violent action without
    collapsing the two Hebrew verbs into one.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: The singular verb refers most naturally to Gedaliah. Rendering it explicitly
    as 'and he died' preserves the Hebrew sequence and avoids over-interpretation.
- source_word: הַיְּהוּדִים
  chosen: the Judeans
  alternatives:
  - the Jews
  lexicon: HALOT
  rationale: In this monarchic/exilic historical context, the ethnogeographic sense
    'Judeans' is more precise than the later, potentially anachronistic 'Jews.'
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' While it can refer to Babylonians
    more broadly, retaining 'Chaldeans' stays closer to the source and matches common
    usage in this historical setting.
- source_word: בַּמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - in Mizpah
  lexicon: HALOT
  rationale: For a named settlement, 'at Mizpah' is idiomatic English and fits the
    locative sense.
