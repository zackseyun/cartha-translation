id: 2KI.25.17
reference: 2 Kings 25:17
source:
  edition: WLC
  text: שְׁמֹנֶה֩ עֶשְׂרֵ֨ה אַמָּ֜ה קוֹמַ֣ת הָ/עַמּ֣וּד הָ/אֶחָ֗ד וְ/כֹתֶ֨רֶת עָלָ֥י/ו
    נְחֹשֶׁת֮ וְ/קוֹמַ֣ת הַ/כֹּתֶרֶת֮ שָׁלֹ֣שׁ אמה וּ/שְׂבָכָ֨ה וְ/רִמֹּנִ֧ים עַֽל
    הַ/כֹּתֶ֛רֶת סָבִ֖יב הַ/כֹּ֣ל נְחֹ֑שֶׁת וְ/כָ/אֵ֛לֶּה לַֽ/עַמּ֥וּד הַ/שֵּׁנִ֖י
    עַל הַ/שְּׂבָכָֽה׀׀־־׃
translation:
  text: The height of the one pillar was eighteen cubits, and a bronze capital was
    on it. The height of the capital was three cubits, with latticework and pomegranates
    all around on the capital, all of bronze. And the second pillar had the same,
    with the latticework.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'network' for 'latticework' (Hebrew שְׂבָכָה), referring to a net-like
      ornamental structure on the capital.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is elliptical in Hebrew: literally, ''and like these for
      the second pillar upon the latticework.'' The sense is that the second pillar
      had matching ornamentation.'
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹמַת
  chosen: height of
  alternatives:
  - was high
  - measured
  lexicon: HALOT
  rationale: Construct form from קוֹמָה denotes stature/height/measurement. 'Height
    of' is the most natural and formally accurate English in this architectural description.
- source_word: עַמּוּד
  chosen: pillar
  alternatives:
  - column
  lexicon: HALOT
  rationale: In temple architecture, עַמּוּד can be rendered 'pillar' or 'column.'
    'Pillar' is conventional and clear in English while fitting the monumental cultic
    setting.
- source_word: כֹתֶרֶת
  chosen: capital
  alternatives:
  - capital-top
  - crown
  lexicon: HALOT
  rationale: Here the term refers to the decorative top of a pillar, not a royal crown.
    'Capital' is the precise architectural term.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: In biblical material culture, נְחֹשֶׁת commonly refers to bronze/copper
    alloy objects. 'Bronze' is the standard rendering for temple furnishings; 'brass'
    is anachronistic.
- source_word: שְׂבָכָה
  chosen: latticework
  alternatives:
  - network
  - grating
  lexicon: HALOT
  rationale: The word denotes a net-like ornamental structure associated with the
    pillar capital. 'Latticework' communicates the decorative mesh clearly in modern
    English.
- source_word: רִמֹּנִים
  chosen: pomegranates
  lexicon: HALOT
  rationale: The term literally means 'pomegranates,' here referring to pomegranate-shaped
    ornaments on the capital. The literal rendering preserves the imagery.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - surrounding
  lexicon: HALOT
  rationale: This adverb indicates encircling placement. 'All around' is idiomatic
    modern English and preserves the spatial sense.
- source_word: הַכֹּל נְחֹשֶׁת
  chosen: all of bronze
  alternatives:
  - the whole was bronze
  - all was bronze
  lexicon: HALOT
  rationale: The phrase summarizes the material composition of the decorative elements.
    'All of bronze' is concise and natural.
- source_word: וְכָאֵלֶּה
  chosen: had the same
  alternatives:
  - and like these
  - and such were
  lexicon: HALOT
  rationale: The phrase points back to the previously described features of the first
    pillar. In English, 'had the same' makes the elliptical Hebrew explicit without
    adding new content.
- source_word: עַל הַשְּׂבָכָה
  chosen: with the latticework
  alternatives:
  - upon the latticework
  - on the network
  lexicon: HALOT
  rationale: The final phrase is somewhat elliptical. 'With the latticework' best
    captures that the second pillar likewise had the same features, including the
    latticework, in readable English.
