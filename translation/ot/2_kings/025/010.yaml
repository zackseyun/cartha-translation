id: 2KI.25.10
reference: 2 Kings 25:10
source:
  edition: WLC
  text: וְ/אֶת חוֹמֹ֥ת יְרוּשָׁלִַ֖ם סָבִ֑יב נָֽתְצוּ֙ כָּל חֵ֣יל כַּשְׂדִּ֔ים אֲשֶׁ֖ר
    רַב טַבָּחִֽים־־־׃
translation:
  text: And all the army of the Chaldeans who were with the captain of the guard tore
    down the walls of Jerusalem all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief of the executioners' or 'captain of the bodyguard' for the Hebrew
      title 'rab-tabbaḥim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמֹת
  chosen: walls
  alternatives:
  - wall fortifications
  lexicon: HALOT
  rationale: Plural construct of חוֹמָה refers to the city walls/fortifications. 'Walls'
    is the natural English rendering and fits the military context.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: Adverbial noun indicating surrounding extent. 'All around' clearly conveys
    that the walls encircling the city were torn down.
- source_word: נָתְצוּ
  chosen: tore down
  alternatives:
  - broke down
  - demolished
  lexicon: HALOT
  rationale: The verb נתץ commonly denotes pulling down or demolishing structures.
    'Tore down' is vivid, idiomatic, and faithful to the destructive action.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Quantifies the following collective noun; 'all' is the straightforward
    rendering.
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - troops
  lexicon: HALOT
  rationale: In this military context חֵיל denotes an armed force. 'Army' is the clearest
    idiomatic English equivalent for the collective sense.
- source_word: כַּשְׂדִּים
  chosen: Chaldeans
  alternatives:
  - Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although 'Babylonians' is contextually
    understandable, the source text specifically says כַּשְׂדִּים, so the more direct
    rendering is preferred.
- source_word: אֲשֶׁר
  chosen: who were with
  alternatives:
  - who belonged to
  - who were under
  lexicon: HALOT
  rationale: The relative particle links the army to the following title elliptically.
    In context, it refers to the Chaldean force associated with Nebuzaradan mentioned
    in the previous verse. 'Who were with' supplies the implied relationship in natural
    English without overinterpreting rank structure.
- source_word: רַב טַבָּחִים
  chosen: captain of the guard
  alternatives:
  - chief of the executioners
  - captain of the bodyguard
  lexicon: HALOT
  rationale: This established Hebrew title literally involves 'chief' plus 'slaughterers/butchers,'
    but in royal-military usage it denotes a high official over the guard, often with
    execution duties. 'Captain of the guard' is the most idiomatic contextual rendering;
    the more literal possibilities are worth preserving in a footnote.
