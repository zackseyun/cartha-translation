id: 2KI.25.4
reference: 2 Kings 25:4
source:
  edition: WLC
  text: וַ/תִּבָּקַ֣ע הָ/עִ֗יר וְ/כָל אַנְשֵׁ֨י הַ/מִּלְחָמָ֤ה הַ/לַּ֨יְלָה֙ דֶּ֜רֶךְ
    שַׁ֣עַר בֵּ֣ין הַ/חֹמֹתַ֗יִם אֲשֶׁר֙ עַל גַּ֣ן הַ/מֶּ֔לֶךְ וְ/כַשְׂדִּ֥ים עַל
    הָ/עִ֖יר סָבִ֑יב וַ/יֵּ֖לֶךְ דֶּ֥רֶךְ הָ/עֲרָבָֽה־׀׀־־׃
translation:
  text: Then the city was breached, and all the men of war fled by night by the way
    of the gate between the two walls, which was by the king’s garden, though the
    Chaldeans were around the city on every side; and the king went by the way of
    the Arabah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians' for 'the Chaldeans.' The Hebrew specifically reads
      'Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he went.' The Hebrew leaves the subject implicit; context indicates
      the king.
    reason: lexical_alternative
  - marker: c
    text: The Arabah is the Jordan rift region southward from the Jordan Valley; traditionally
      also rendered 'the plain.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּבָּקַע
  chosen: was breached
  alternatives:
  - was broken into
  - was split open
  lexicon: HALOT
  rationale: The Niphal form of בקע here describes the city wall/city defenses being
    broken through in siege context. 'Was breached' is idiomatic modern English for
    a city taken by force and fits the military setting better than the more literal
    but less natural 'was split open.'
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Standard rendering of עיר. In context it refers to Jerusalem under siege.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the fighting men
  - the soldiers
  lexicon: HALOT
  rationale: Literally 'men of the war.' 'Men of war' preserves the masculine and
    military sense of the Hebrew while remaining understandable. 'Soldiers' is possible
    but slightly flattens the idiom.
- source_word: הַלַּיְלָה
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: Used adverbially. 'By night' is concise and suitably narrative.
- source_word: דֶּרֶךְ שַׁעַר
  chosen: by the way of the gate
  alternatives:
  - through the gate
  - by way of the gate
  lexicon: HALOT
  rationale: The repeated דרך is retained with 'by the way of' to reflect the Hebrew
    phrasing and route emphasis. 'Through the gate' is smoother but less formally
    transparent.
- source_word: בֵּין הַחֹמֹתַיִם
  chosen: between the two walls
  alternatives:
  - between the walls
  lexicon: HALOT
  rationale: The dual form explicitly indicates two walls, so 'between the two walls'
    best represents the Hebrew.
- source_word: אֲשֶׁר עַל גַּן הַמֶּלֶךְ
  chosen: which was by the king’s garden
  alternatives:
  - which was beside the king’s garden
  - which was near the king’s garden
  lexicon: HALOT
  rationale: עַל can denote proximity here. 'By' is natural English and fits the topographical
    note.
- source_word: וְכַשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' While historically referring
    to the Babylonian forces, the translation keeps the source term in the main text.
- source_word: עַל הָעִיר סָבִיב
  chosen: were around the city on every side
  alternatives:
  - were around the city
  - were all around the city
  lexicon: HALOT
  rationale: This expresses encirclement. 'On every side' makes explicit the force
    of סביב without overparaphrasing.
- source_word: וַיֵּלֶךְ
  chosen: the king went
  alternatives:
  - he went
  lexicon: HALOT
  rationale: The Hebrew verb is singular with an implicit subject. In context the
    subject is the king, made explicit from the parallel account and immediate narrative
    flow. Supplying 'the king' avoids ambiguity in English.
- source_word: דֶּרֶךְ הָעֲרָבָה
  chosen: by the way of the Arabah
  alternatives:
  - toward the Arabah
  - by way of the plain
  lexicon: HALOT
  rationale: The Arabah is a geographic region, so retaining it as a proper place-name
    is preferable to the interpretive 'plain.' The repeated דרך is mirrored for consistency.
