id: 2KI.25.30
reference: 2 Kings 25:30
source:
  edition: WLC
  text: וַ/אֲרֻחָת֗/וֹ אֲרֻחַ֨ת תָּמִ֧יד נִתְּנָה לּ֛/וֹ מֵ/אֵ֥ת הַ/מֶּ֖לֶךְ דְּבַר
    י֣וֹם בְּ/יוֹמ֑/וֹ כֹּ֖ל יְמֵ֥י חַיָּֽ/ו־־׃
translation:
  text: And his allowance, a regular allowance, was given to him from the king, the
    matter of each day on its day, all the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ration,' 'portion,' or 'provision' for 'allowance.' The Hebrew term
      refers to an allotted provision supplied to him.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the matter of a day on its day,' an idiom meaning that the provision
      was supplied day by day, according to each day's allotment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֻחָה / אֲרֻחָתוֹ
  chosen: allowance
  alternatives:
  - portion
  - ration
  - provision
  lexicon: HALOT
  rationale: The noun here refers to the provision allotted to Jehoiachin by the Babylonian
    king. 'Allowance' fits the context of an ongoing royal provision better than the
    more military-sounding 'ration,' while preserving the sense of an assigned daily
    portion.
- source_word: תָּמִיד
  chosen: regular
  alternatives:
  - continual
  - continually
  lexicon: HALOT
  rationale: Used attributively with אֲרֻחַת, it describes the allowance as ongoing/constant.
    'Regular' is idiomatic modern English and conveys repeated continuity without
    sounding archaic.
- source_word: נִתְּנָה
  chosen: was given
  alternatives:
  - was granted
  - was provided
  lexicon: HALOT
  rationale: A straightforward passive of נתן. 'Was given' is the most direct and
    transparent rendering.
- source_word: מֵאֵת הַמֶּלֶךְ
  chosen: from the king
  alternatives:
  - by the king
  lexicon: HALOT
  rationale: The phrase marks source/origin. 'From the king' preserves that sense
    more directly than the more agentive 'by the king,' though the latter is possible
    in English.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: the matter of each day on its day
  alternatives:
  - day by day
  - the daily portion for each day
  - the requirement of each day in its day
  lexicon: HALOT
  rationale: Literally the phrase is more concrete than a simple adverbial 'daily.'
    Rendering it as 'the matter of each day on its day' preserves the Hebrew idiom's
    distributive force, while still being understandable. It indicates that the provision
    was supplied according to each day's need or allotment.
- source_word: כֹּל יְמֵי חַיָּו
  chosen: all the days of his life
  alternatives:
  - all his lifetime
  - throughout his life
  lexicon: HALOT
  rationale: This is the standard idiom for lifelong duration. 'All the days of his
    life' is both accurate and natural.
