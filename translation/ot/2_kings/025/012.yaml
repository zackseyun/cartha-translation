id: 2KI.25.12
reference: 2 Kings 25:12
source:
  edition: WLC
  text: וּ/מִ/דַּלַּ֣ת הָ/אָ֔רֶץ הִשְׁאִ֖יר רַב טַבָּחִ֑ים לְ/כֹֽרְמִ֖ים וּ/לְ/יֹגְבִֽים־׃
translation:
  text: But from the poorest of the land, the captain of the guard left some to be
    vinedressers and field workers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and plowmen' / 'and farmers' for 'field workers.' The Hebrew term likely
      refers broadly to agricultural laborers who worked the soil.
    reason: lexical_alternative
  - marker: b
    text: Literally 'chief/captain of the slaughterers.' In this context the title
      refers to the Babylonian captain of the guard.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/דַּלַּת
  chosen: But from the poorest
  alternatives:
  - And from the poor of
  - But from the lowly of
  lexicon: HALOT
  rationale: The conjunction with preposition and noun from דל/דלה conveys a partitive
    sense, 'from the poor/poorest.' 'But' fits the contrast with the preceding deportations,
    and 'the poorest' captures the superlative-like force in context better than a
    flat 'poor.'
- source_word: הָ/אָרֶץ
  chosen: of the land
  alternatives:
  - of the הארץ/earth
  - of the country
  lexicon: HALOT
  rationale: In this historical narrative, אֶרֶץ refers to the land/country of Judah
    rather than the whole earth. 'Land' is the most natural and sufficiently broad
    rendering.
- source_word: הִשְׁאִיר
  chosen: left
  alternatives:
  - allowed to remain
  - left behind
  lexicon: HALOT
  rationale: The Hiphil of שׁאר means to leave/remain. 'Left' is concise and idiomatic;
    the object 'some' is supplied in English because the Hebrew implies that some
    of the poor were left.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the commander of the bodyguard
  lexicon: HALOT
  rationale: This title refers to Nebuzaradan's office. Although literally related
    to 'chief of the slaughterers/butchers,' in royal-military context it denotes
    the captain/commander of the guard. This is the established contextual sense and
    avoids a misleadingly wooden rendering.
- source_word: לְכֹרְמִים
  chosen: to be vinedressers
  alternatives:
  - for vineyard workers
  - for vine-growers
  lexicon: HALOT
  rationale: The noun denotes workers in vineyards. 'Vinedressers' is a standard,
    precise English equivalent and fits the occupational list.
- source_word: וּ/לְ/יֹגְבִים
  chosen: and field workers
  alternatives:
  - and plowmen
  - and farmers
  - and tillers
  lexicon: HALOT
  rationale: The participial form from a root associated with agricultural labor likely
    denotes those who work the soil. 'Field workers' is clear modern English and broad
    enough to cover the agricultural sense without over-specifying a single task such
    as plowing.
