id: 2KI.25.14
reference: 2 Kings 25:14
source:
  edition: WLC
  text: וְ/אֶת הַ/סִּירֹ֨ת וְ/אֶת הַ/יָּעִ֜ים וְ/אֶת הַֽ/מְזַמְּר֣וֹת וְ/אֶת הַ/כַּפּ֗וֹת
    וְ/אֵ֨ת כָּל כְּלֵ֧י הַ/נְּחֹ֛שֶׁת אֲשֶׁ֥ר יְשָֽׁרְתוּ בָ֖/ם לָקָֽחוּ־־־־־־׃
translation:
  text: And the pots, the shovels, the snuffers, the dishes, and all the bronze vessels
    with which they ministered—they took away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'knives' or 'pruning knives' for 'snuffers'; the Hebrew term may denote
      a cutting implement, but in this temple-vessel context it is commonly understood
      as an instrument for trimming lamps.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּירֹת
  chosen: the pots
  alternatives:
  - the pails
  - the basins
  lexicon: HALOT
  rationale: סִירוֹת commonly denotes cooking pots or containers. In this temple-inventory
    context, 'pots' is the most natural and established English equivalent without
    over-specifying function.
- source_word: הַיָּעִים
  chosen: the shovels
  alternatives:
  - the scoops
  lexicon: HALOT
  rationale: יָעִים refers to implements for removing ashes or handling coals. 'Shovels'
    best fits the cultic furnishing context and standard English usage.
- source_word: הַמְזַמְּרוֹת
  chosen: the snuffers
  alternatives:
  - the knives
  - the pruning knives
  lexicon: HALOT
  rationale: Though the noun can be associated with cutting implements, in temple-vessel
    lists it is traditionally and contextually understood as lamp-trimming instruments.
    'Snuffers' fits the sanctuary-service setting better than generic cutting tools.
- source_word: הַכַּפּוֹת
  chosen: the dishes
  alternatives:
  - the bowls
  - the pans
  lexicon: HALOT
  rationale: כַּף can denote a small vessel, pan, or spoon-like container. Here 'dishes'
    gives a broad, readable rendering suitable for temple utensils without forcing
    a narrower shape.
- source_word: כָּל כְּלֵי הַנְּחֹשֶׁת
  chosen: all the bronze vessels
  alternatives:
  - all the bronze utensils
  - all the bronze articles
  lexicon: HALOT
  rationale: כְּלִים is a broad term for implements or vessels. 'Vessels' works well
    in a temple inventory, and נְחֹשֶׁת in this context is best rendered 'bronze'
    rather than the less precise older 'brass'.
- source_word: אֲשֶׁר יְשָׁרְתוּ בָם
  chosen: with which they ministered
  alternatives:
  - with which they served
  - which were used for ministering
  lexicon: HALOT
  rationale: שרת in cultic contexts often refers to priestly or liturgical service.
    'Ministered' preserves the formal temple-service nuance better than the flatter
    'served.' The plural verb is left with an indefinite English subject ('they')
    as in idiomatic translation.
- source_word: לָקָחוּ
  chosen: they took away
  alternatives:
  - they took
  - they carried off
  lexicon: HALOT
  rationale: The verb simply means 'took,' but in context of plundering temple items,
    'took away' makes the removal explicit in natural English.
