id: 2KI.25.5
reference: 2 Kings 25:5
source:
  edition: WLC
  text: וַ/יִּרְדְּפ֤וּ חֵיל כַּשְׂדִּים֙ אַחַ֣ר הַ/מֶּ֔לֶךְ וַ/יַּשִּׂ֥גוּ אֹת֖/וֹ
    בְּ/עַרְב֣וֹת יְרֵח֑וֹ וְ/כָל חֵיל֔/וֹ נָפֹ֖צוּ מֵ/עָלָֽי/ו־־׃
translation:
  text: But the army of the Chaldeans pursued the king and overtook him in the plains
    of Jericho, and all his army was scattered from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the army of the Babylonians.' The Hebrew reads 'Chaldeans,' the term
      used throughout this context for Babylonian forces.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the steppes of Jericho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל כַּשְׂדִּים
  chosen: the army of the Chaldeans
  alternatives:
  - the forces of the Chaldeans
  - the Chaldean army
  - the army of the Babylonians
  lexicon: HALOT
  rationale: חֵיל commonly denotes military force or army in narrative contexts. כַּשְׂדִּים
    is most directly 'Chaldeans,' the ethnic/political designation used in the Hebrew
    text; 'Babylonians' is understandable but less formally aligned to the source.
- source_word: וַיִּרְדְּפוּ
  chosen: pursued
  alternatives:
  - chased
  - went in pursuit of
  lexicon: HALOT
  rationale: רדף in military narrative is well rendered by 'pursued,' which is natural
    English and preserves the sense of active chase.
- source_word: אַחַר הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - after the king
  lexicon: HALOT
  rationale: In English, 'pursued the king' naturally incorporates the force of אַחַר
    after verbs of pursuit, avoiding wooden phrasing while preserving meaning.
- source_word: וַיַּשִּׂגוּ אֹתוֹ
  chosen: overtook him
  alternatives:
  - caught up with him
  - reached him
  lexicon: HALOT
  rationale: נשׂג in this context means to overtake or catch up with. 'Overtook him'
    fits the military pursuit context and is idiomatic.
- source_word: בְּעַרְבוֹת יְרֵחוֹ
  chosen: in the plains of Jericho
  alternatives:
  - in the desert plains of Jericho
  - in the steppes of Jericho
  lexicon: HALOT
  rationale: עֲרָבוֹת refers to steppe/plains region; 'plains' is the clearest natural
    rendering in modern English. 'Jericho' is transliterated as a place name.
- source_word: וְכָל חֵילוֹ
  chosen: all his army
  alternatives:
  - all his forces
  - his whole army
  lexicon: HALOT
  rationale: חֵיל again denotes military force. Singular collective 'army' works well
    in English, and 'all his army' closely reflects כָל + singular collective noun.
- source_word: נָפֹצוּ
  chosen: was scattered
  alternatives:
  - were scattered
  - broke up
  - was dispersed
  lexicon: HALOT
  rationale: The verb means to be scattered/dispersed. Because 'army' is a collective
    singular in English, 'was scattered' is the most natural agreement, though the
    Hebrew verb is plural agreeing with the collective sense.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - away from him
  - from around him
  lexicon: HALOT
  rationale: The phrase indicates separation from the king. 'From him' is concise
    and faithful; 'away from him' is possible but slightly more interpretive.
