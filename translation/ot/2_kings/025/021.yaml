id: 2KI.25.21
reference: 2 Kings 25:21
source:
  edition: WLC
  text: וַ/יַּ֣ךְ אֹתָ/ם֩ מֶ֨לֶךְ בָּבֶ֧ל וַ/יְמִיתֵ֛/ם בְּ/רִבְלָ֖ה בְּ/אֶ֣רֶץ חֲמָ֑ת
    וַ/יִּ֥גֶל יְהוּדָ֖ה מֵ/עַ֥ל אַדְמָתֽ/וֹ׃
translation:
  text: And the king of Babylon struck them down and put them to death at Riblah in
    the land of Hamath. So Judah was taken into exile from its land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''killed them.'' The Hebrew uses two verbs in sequence: ''struck them''
      and ''put them to death.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Judah went into exile from its land.' The Hebrew verb can be rendered
      actively or passively in context; the passive highlights the forced deportation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck them down
  alternatives:
  - struck them
  - smote them
  - killed them
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' Here it is followed by וַיְמִיתֵם
    ('and put them to death'), so rendering it simply as 'killed' would collapse the
    two verbs. 'Struck them down' preserves the violent action while leaving the explicit
    death statement to the next verb.
- source_word: וַיְמִיתֵם
  chosen: put them to death
  alternatives:
  - killed them
  - executed them
  lexicon: HALOT
  rationale: מות in the Hiphil means 'cause to die/put to death.' 'Put them to death'
    is clear and preserves the causative force. 'Executed them' is possible in context
    but slightly more interpretive than the Hebrew itself.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural in English.
- source_word: בְּרִבְלָה
  chosen: at Riblah
  alternatives:
  - in Riblah
  lexicon: HALOT
  rationale: For a place name, 'at Riblah' is idiomatic English and fits the setting
    of an event location.
- source_word: בְּאֶרֶץ חֲמָת
  chosen: in the land of Hamath
  alternatives:
  - in Hamath's land
  - in the territory of Hamath
  lexicon: HALOT
  rationale: A straightforward rendering of the geographic phrase; 'land of Hamath'
    is both formal enough and readable.
- source_word: וַיִּגֶל
  chosen: was taken into exile
  alternatives:
  - went into exile
  - was exiled
  - was carried away
  lexicon: HALOT
  rationale: גלה in exile contexts often denotes deportation. With Judah as the subject,
    the passive English 'was taken into exile' best conveys the implied forced removal
    without overparaphrase.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the people of Judah
  lexicon: HALOT
  rationale: The proper name can stand metonymically for the kingdom/people. 'Judah'
    preserves the Hebrew's compactness and ambiguity between land and people.
- source_word: מֵעַל אַדְמָתוֹ
  chosen: from its land
  alternatives:
  - from its soil
  - off its land
  - from upon its ground
  lexicon: HALOT
  rationale: אדמה can mean 'ground/soil/land.' Here the national-exilic context favors
    'land.' Because the referent is Judah, English uses 'its' rather than a wooden
    'his.' 'From its land' is natural and faithful.
