id: 2KI.25.29
reference: 2 Kings 25:29
source:
  edition: WLC
  text: וְ/שִׁנָּ֕א אֵ֖ת בִּגְדֵ֣י כִלְא֑/וֹ וְ/אָכַ֨ל לֶ֧חֶם תָּמִ֛יד לְ/פָנָ֖י/ו
    כָּל יְמֵ֥י חַיָּֽי/ו־׃
translation:
  text: And he changed his prison clothes, and he ate bread continually before him
    all the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his presence'; the phrase may also imply eating at the king's table.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁנָּא
  chosen: and he changed
  alternatives:
  - and he altered
  - and he replaced
  lexicon: HALOT
  rationale: The verb שׁנה in the piel commonly means 'change/alter.' In context,
    with 'garments of his confinement,' the sense is that Jehoiachin changed out of
    prison clothing. 'Changed' is idiomatic and sufficiently close to the Hebrew.
- source_word: בִּגְדֵי כִלְאוֹ
  chosen: his prison clothes
  alternatives:
  - the garments of his imprisonment
  - his prison garments
  lexicon: HALOT
  rationale: בִּגְדֵי is 'garments/clothes of,' and כלאו refers to confinement/imprisonment.
    'Prison clothes' is natural modern English while preserving the genitive sense.
- source_word: וְאָכַל לֶחֶם
  chosen: and he ate bread
  alternatives:
  - and he ate food
  - and he dined
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'ate bread,' often meaning to take meals.
    Because the phrase is common and understandable in English, the literal wording
    is retained rather than paraphrasing to 'dined' or broadening to 'food.'
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - always
  lexicon: HALOT
  rationale: תמיד denotes ongoing regularity/continuance. 'Continually' fits the court-provision
    context and pairs well with the following lifespan expression.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - at his table
  lexicon: HALOT
  rationale: Literally 'before him.' In context it likely implies royal presence/table
    fellowship, but the Hebrew wording itself is broader. 'Before him' preserves the
    source text without over-interpreting; the more specific implication is preserved
    in a footnote.
- source_word: כָּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - for the rest of his life
  - throughout his life
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for lifelong duration. The chosen
    rendering is formally close and idiomatic in English.
