id: 2KI.14.16
reference: 2 Kings 14:16
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יְהוֹאָשׁ֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵר֙ בְּ/שֹׁ֣מְר֔וֹן עִ֖ם
    מַלְכֵ֣י יִשְׂרָאֵ֑ל וַ/יִּמְלֹ֛ךְ יָרָבְעָ֥ם בְּנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Jehoash slept with his fathers and was buried in Samaria with the kings
    of Israel, and Jeroboam his son reigned in his place.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: In royal obituary formulae, שׁכב with 'with his fathers' is a conventional
    idiom for death. 'Slept' preserves the Hebrew wording and the formulaic character
    better than the more interpretive 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard burial/death formula in Kings. 'Fathers' is retained
    as the conventional and more literal rendering; 'ancestors' is possible but less
    formally tied to the recurring Hebrew expression.
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - and he was buried
  lexicon: HALOT
  rationale: Passive rendering matches the Niphal form and reads naturally in English.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The preposition ב here is most naturally locative. 'In Samaria' is standard
    and idiomatic for burial location.
- source_word: עִם מַלְכֵי יִשְׂרָאֵל
  chosen: with the kings of Israel
  alternatives:
  - among the kings of Israel
  lexicon: HALOT
  rationale: '''With'' closely reflects עִם and suits the burial context, indicating
    association in burial with prior Israelite kings.'
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: The verb מלך in succession notices is commonly rendered 'reigned.' 'Became
    king' would emphasize accession, but 'reigned' better matches the standard narrative
    formula.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: This idiom marks dynastic succession. 'In his place' is natural English
    and preserves the sense of replacement more precisely than merely temporal 'after
    him'.
