id: 2KI.14.23
reference: 2 Kings 14:23
source:
  edition: WLC
  text: בִּ/שְׁנַת֙ חֲמֵשׁ עֶשְׂרֵ֣ה שָׁנָ֔ה לַ/אֲמַצְיָ֥הוּ בֶן יוֹאָ֖שׁ מֶ֣לֶךְ
    יְהוּדָ֑ה מָ֠לַךְ יָרָבְעָ֨ם בֶּן יוֹאָ֤שׁ מֶֽלֶךְ יִשְׂרָאֵל֙ בְּ/שֹׁ֣מְר֔וֹן
    אַרְבָּעִ֥ים וְ/אַחַ֖ת שָׁנָֽה־־־־׃
translation:
  text: In the fifteenth year of Amaziah son of Joash, king of Judah, Jeroboam son
    of Joash, king of Israel, became king in Samaria, and he reigned forty-one years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year of
  alternatives:
  - In the year of
  lexicon: HALOT
  rationale: Temporal preposition ב plus construct of שָׁנָה introduces a regnal-year
    dating formula. English idiom naturally supplies the ordinal phrase 'In the fifteenth
    year of'.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  chosen: the fifteenth year
  alternatives:
  - fifteen years
  lexicon: HALOT
  rationale: In regnal formulas the cardinal construction functions ordinally with
    שָׁנָה, referring to the fifteenth year of Amaziah's reign, not a duration of
    fifteen years.
- source_word: לַ/אֲמַצְיָהוּ
  chosen: of Amaziah
  alternatives:
  - for Amaziah
  - belonging to Amaziah
  lexicon: HALOT
  rationale: The preposition ל in dating formulas marks reference to the reigning
    king's regnal year; idiomatic English is 'of Amaziah' rather than a wooden 'to/for
    Amaziah'.
- source_word: בֶן יוֹאָשׁ
  chosen: son of Joash
  lexicon: HALOT
  rationale: Standard patronymic construction; translated directly.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Construct chain identifying Amaziah's office and realm.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: Qal of מלך in enthronement notices commonly means accession to kingship.
    'Became king' distinguishes accession from the later duration statement.
- source_word: יָרָבְעָם
  chosen: Jeroboam
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Construct chain identifying Jeroboam's office and realm.
- source_word: בְּ/שֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative ב marks the place of reign/accession. 'In Samaria' is the natural
    English rendering for the capital city.
- source_word: אַרְבָּעִים וְאַחַת שָׁנָה
  chosen: forty-one years
  alternatives:
  - forty and one years
  lexicon: HALOT
  rationale: Standard cardinal number plus noun indicating the duration of Jeroboam's
    reign; rendered in contemporary English style.
