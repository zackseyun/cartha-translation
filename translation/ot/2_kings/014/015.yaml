id: 2KI.14.15
reference: 2 Kings 14:15
source:
  edition: WLC
  text: וְ/יֶתֶר֩ דִּבְרֵ֨י יְהוֹאָ֜שׁ אֲשֶׁ֤ר עָשָׂה֙ וּ/גְב֣וּרָת֔/וֹ וַ/אֲשֶׁ֣ר
    נִלְחַ֔ם עִ֖ם אֲמַצְיָ֣הוּ מֶֽלֶךְ יְהוּדָ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר
    דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Now the rest of the acts of Jehoash, and his might, and how he fought with
    Amaziah king of Judah—are they not written in the Book of the Chronicles of the
    Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fought against Amaziah king of Judah.' The Hebrew preposition is literally
      'with,' but in this military context it can be rendered more explicitly as hostile
      opposition.
    reason: lexical_alternative
  - marker: b
    text: Or 'the book of the annals of the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - The remainder of
  lexicon: HALOT
  rationale: Idiomatic formula in Kings introducing a regnal summary. 'Now the rest
    of' preserves the conventional narrative transition while remaining natural English.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the formula 'the rest of the words/matters of X' within Kings, the
    sense is the record of a king's deeds or acts, not merely his speech. 'Acts' is
    the most natural regnal-summary rendering.
- source_word: יְהוֹאָשׁ
  chosen: Jehoash
  alternatives:
  - Joash
  rationale: The Hebrew form here is יְהוֹאָשׁ, best represented by 'Jehoash.' This
    avoids conflating the form with the shortened English traditional spelling 'Joash'
    and reflects the source name more directly.
- source_word: אֲשֶׁר עָשָׂה
  chosen: of Jehoash
  alternatives:
  - that he did
  - which he did
  lexicon: HALOT
  rationale: The relative clause is semantically absorbed into the regnal-summary
    formula in English. The content is still represented by 'acts'; making it explicit
    as 'that he did' would be wooden and redundant in English.
- source_word: וּגְבוּרָתוֹ
  chosen: and his might
  alternatives:
  - and his power
  - and his mighty deeds
  - and his valor
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, might, valor, or mighty acts. Here it
    likely summarizes royal prowess, especially military strength. 'His might' is
    concise and broad enough to include both strength and notable exploits.
- source_word: וַאֲשֶׁר נִלְחַם עִם
  chosen: and how he fought with
  alternatives:
  - and how he fought against
  - and that he fought with
  lexicon: HALOT
  rationale: The preposition עִם literally means 'with,' though in battle contexts
    English often uses 'against.' 'Fought with' preserves the Hebrew wording while
    still clearly indicating conflict from context.
- source_word: אֲמַצְיָהוּ מֶלֶךְ יְהוּדָה
  chosen: Amaziah king of Judah
  alternatives:
  - Amaziah, the king of Judah
  rationale: Standard appositional rendering of the royal title; the comma is optional
    in English and omitted for smoother flow.
- source_word: הֲלֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: This is the standard rhetorical formula in Kings. 'Are they not written'
    preserves both the rhetorical question and the literary texture of the source.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the Book of the Chronicles
  alternatives:
  - on the scroll of the events of the days
  - in the book of the annals
  lexicon: HALOT
  rationale: Though literally 'on the book/scroll of the words of the days,' the established
    sense is an annalistic royal record. 'Book of the Chronicles' is clear, idiomatic,
    and faithful to the formula.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - belonging to the kings of Israel
  - for the kings of Israel
  lexicon: HALOT
  rationale: The לְ here is idiomatic in the title of the source document. 'Of the
    Kings of Israel' is the most natural English representation of the annal title.
