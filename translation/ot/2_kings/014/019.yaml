id: 2KI.14.19
reference: 2 Kings 14:19
source:
  edition: WLC
  text: וַ/יִּקְשְׁר֨וּ עָלָ֥י/ו קֶ֛שֶׁר בִּ/ירוּשָׁלִַ֖ם וַ/יָּ֣נָס לָכִ֑ישָׁ/ה וַ/יִּשְׁלְח֤וּ
    אַֽחֲרָי/ו֙ לָכִ֔ישָׁ/ה וַ/יְמִתֻ֖/הוּ שָֽׁם׃
translation:
  text: And they conspired against him in Jerusalem, and he fled to Lachish; but they
    sent after him to Lachish and put him to death there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they sent in pursuit of him to Lachish.' The Hebrew literally says 'they
      sent after him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ עָלָיו קֶשֶׁר
  chosen: they conspired against him
  alternatives:
  - they made a conspiracy against him
  - they formed a plot against him
  lexicon: HALOT
  rationale: The verb קשׁר with the cognate noun קֶשֶׁר forms an idiomatic expression
    for political conspiracy or plotting. 'Conspired against him' is natural English
    and preserves the hostile political sense without awkward redundancy.
- source_word: בִּירוּשָׁלִַם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב with the place name.
- source_word: וַיָּנָס
  chosen: he fled
  alternatives:
  - he escaped
  - he ran away
  lexicon: HALOT
  rationale: נוס commonly means 'flee.' 'He fled' is the most direct and idiomatic
    rendering in narrative context.
- source_word: לָכִישָׁה
  chosen: to Lachish
  alternatives:
  - toward Lachish
  lexicon: HALOT
  rationale: The directional he indicates motion toward the city. English normally
    renders this simply as 'to Lachish.' The standard transliteration 'Lachish' is
    used for the place name.
- source_word: וַיִּשְׁלְחוּ אַחֲרָיו
  chosen: they sent after him
  alternatives:
  - they sent men after him
  - they sent in pursuit of him
  lexicon: HALOT
  rationale: Literally 'they sent after him.' The object is unstated in Hebrew; English
    can preserve the terseness with 'they sent after him.' Supplying 'men' would be
    interpretive, though likely implied.
- source_word: וַיְמִתֻהוּ
  chosen: put him to death
  alternatives:
  - killed him
  - caused him to die
  lexicon: HALOT
  rationale: The causative form of מות means 'put to death/kill.' 'Put him to death'
    preserves the deliberate, execution-like force better than the flatter 'killed
    him.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple adverb of place referring back to Lachish.
