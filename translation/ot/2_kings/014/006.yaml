theological_decisions:
- issue: Individual versus familial liability in covenant law
  chosen_reading: The verse states the legal principle that punishment is not to be imposed on sons for fathers or fathers for sons; each person dies for his own sin.
  alternative_readings:
  - A broader denial of all corporate consequences of sin
  rationale: The wording concerns judicial execution and personal culpability, not a denial that sin can have communal effects elsewhere in Scripture. The translation preserves the legal focus without importing a wider theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
