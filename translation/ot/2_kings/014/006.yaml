id: 2KI.14.6
reference: 2 Kings 14:6
source:
  edition: WLC
  text: וְ/אֶת בְּנֵ֥י הַ/מַּכִּ֖ים לֹ֣א הֵמִ֑ית כַּ/כָּת֣וּב בְּ/סֵ֣פֶר תּֽוֹרַת מֹ֠שֶׁה אֲשֶׁר צִוָּ֨ה יְהוָ֜ה לֵ/אמֹ֗ר לֹא יוּמְת֨וּ אָב֤וֹת עַל בָּנִים֙ וּ/בָנִים֙ לֹא יוּמְת֣וּ עַל אָב֔וֹת כִּ֛י אִם אִ֥ישׁ בְּ/חֶטְא֖/וֹ ימות־־־־־־־־׃
translation:
  text: But he did not put the sons of the killers to death, according to what is written in the Book of the Law of Moses, which Yahweh commanded, saying, “Fathers shall not be put to death for sons, and sons shall not be put to death for fathers; rather, each man shall die for his own sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the children of the murderers.' The Hebrew literally says 'the sons of the killers.'
    reason: lexical_alternative
  - marker: b
    text: This quotation reflects Deuteronomy 24:16.
    reason: cross_reference
lexical_decisions:
- source_word: בְּנֵי הַמַּכִּים
  chosen: the sons of the killers
  alternatives:
  - the children of the murderers
  - the sons of those who struck down
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of,' and the doctrine prefers gender-accurate rendering over neutralizing when the source is masculine. הַמַּכִּים is the participial form of נכה, here referring to those who had struck/killed; in this judicial context 'killers' is the most natural concise English rendering.
- source_word: לֹא הֵמִית
  chosen: did not put ... to death
  alternatives:
  - did not kill
  - did not execute
  lexicon: HALOT
  rationale: The Hiphil of מות commonly means 'cause to die/put to death.' 'Put to death' preserves the formal judicial sense better than the simpler 'kill.'
- source_word: כַּכָּתוּב
  chosen: according to what is written
  alternatives:
  - as it is written
  - according to the written word
  lexicon: HALOT
  rationale: This idiom introduces conformity to written law. 'According to what is written' is clear modern English and preserves the appeal to textual authority.
- source_word: בְּסֵפֶר תּוֹרַת מֹשֶׁה
  chosen: in the Book of the Law of Moses
  alternatives:
  - in the book of Moses' law
  - in the scroll of the law of Moses
  lexicon: HALOT
  rationale: A standard legal formula. 'Book of the Law of Moses' is transparent and recognizable, while still reflecting סֵפֶר + תּוֹרָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא יוּמְתוּ
  chosen: shall not be put to death
  alternatives:
  - must not be put to death
  - shall not die
  lexicon: HALOT
  rationale: The passive/causative form in legal context is best rendered as a prohibition of execution, not merely a statement that they will not die.
- source_word: אָבוֹת ... בָּנִים
  chosen: Fathers ... sons
  alternatives:
  - Parents ... children
  lexicon: HALOT
  rationale: The Hebrew uses masculine plurals specifically. Following the gender-accurate principle, 'fathers' and 'sons' are retained rather than generalized.
- source_word: עַל
  chosen: for
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: 'In this legal formula, עַל marks the basis or account for punishment. ''For'' is idiomatic in English legal style: one is not executed ''for'' another''s offense.'
- source_word: כִּי אִם
  chosen: rather
  alternatives:
  - but
  - except that
  lexicon: HALOT
  rationale: Here the phrase introduces the contrasting principle after the prohibition. 'Rather' captures the adversative force smoothly in English.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each person
  - a man
  lexicon: HALOT
  rationale: The singular distributive sense is important. Because the Hebrew is grammatically masculine and representative, 'each man' best matches the source while remaining natural.
- source_word: בְּחֶטְאוֹ
  chosen: for his own sin
  alternatives:
  - in his own sin
  - because of his own offense
  lexicon: HALOT
  rationale: The preposition plus noun expresses the basis on which the person dies. Adding 'own' makes explicit the possessive suffix and the contrast with vicarious punishment.
- source_word: יָמוּת
  chosen: shall die
  alternatives:
  - shall be put to death
  lexicon: HALOT
  rationale: The final verb is Qal ('die'), not Hiphil/passive as in the preceding clauses. Rendering it 'shall die' preserves the shift in form while still fitting the legal context.
