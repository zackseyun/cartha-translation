id: 2KI.14.21
reference: 2 Kings 14:21
source:
  edition: WLC
  text: וַ/יִּקְח֞וּ כָּל עַ֤ם יְהוּדָה֙ אֶת עֲזַרְיָ֔ה וְ/ה֕וּא בֶּן שֵׁ֥שׁ עֶשְׂרֵ֖ה
    שָׁנָ֑ה וַ/יַּמְלִ֣כוּ אֹת֔/וֹ תַּ֖חַת אָבִ֥י/ו אֲמַצְיָֽהוּ־־־׃
translation:
  text: Then all the people of Judah took Azariah—he was sixteen years old—and made
    him king in place of his father Amaziah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azariah is also called Uzziah elsewhere; the Hebrew here reads Azariah.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - selected
  - took hold of
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In this enthronement context, 'took'
    naturally introduces the people's action in bringing forward Azariah for kingship.
    'Selected' is interpretive and less direct.
- source_word: כָּל עַם יְהוּדָה
  chosen: all the people of Judah
  alternatives:
  - all the people of Judah
  - all Judah
  lexicon: HALOT
  rationale: The phrase is explicitly 'all the people of Judah,' not merely the territory
    or tribe in abstraction. This preserves the corporate political action of the
    populace.
- source_word: עֲזַרְיָה
  chosen: Azariah
  alternatives:
  - Uzziah
  rationale: The Hebrew text here reads Azariah. Although this king is often called
    Uzziah elsewhere, the translation follows the form present in this verse and preserves
    the alternate name in a footnote.
- source_word: וְהוּא בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  chosen: he was sixteen years old
  alternatives:
  - being sixteen years old
  lexicon: HALOT
  rationale: This is a straightforward age notice. 'He was sixteen years old' is idiomatic
    modern English and preserves the parenthetical explanatory force.
- source_word: וַיַּמְלִכוּ אֹתוֹ
  chosen: made him king
  alternatives:
  - crowned him king
  - proclaimed him king
  lexicon: HALOT
  rationale: The hiphil of מלך means to cause someone to reign, i.e., to make him
    king. 'Crowned' adds ceremony not stated; 'proclaimed' narrows the action to announcement
    rather than installation.
- source_word: תַּחַת אָבִיו
  chosen: in place of his father
  alternatives:
  - instead of his father
  - after his father
  lexicon: HALOT
  rationale: תחת in succession contexts means 'in place of' or 'instead of.' 'After'
    is possible in English but can be merely temporal; 'in place of' better conveys
    royal succession.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  rationale: Standard English transliteration of the proper name in this verse.
