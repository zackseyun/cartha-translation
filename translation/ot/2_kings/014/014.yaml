id: 2KI.14.14
reference: 2 Kings 14:14
source:
  edition: WLC
  text: וְ/לָקַ֣ח אֶת כָּל הַ/זָּהָב וְ֠/הַ/כֶּסֶף וְ/אֵ֨ת כָּל הַ/כֵּלִ֜ים הַ/נִּמְצְאִ֣ים בֵּית יְהוָ֗ה וּ/בְ/אֹֽצְרוֹת֙ בֵּ֣ית הַ/מֶּ֔לֶךְ וְ/אֵ֖ת בְּנֵ֣י הַ/תַּֽעֲרֻב֑וֹת וַ/יָּ֖שָׁב שֹׁמְרֽוֹנָ/ה־־־־־׃
translation:
  text: He took all the gold and silver, and all the vessels found in the house of Yahweh and in the treasuries of the king’s house, and the hostages, and returned to Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of the pledges'' or ''the sons of the sureties,'' likely meaning persons taken as security—that is, hostages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: He took
  alternatives:
  - And he took
  lexicon: HALOT
  rationale: Qal wayyiqtol/converted perfect in narrative sequence; English idiom omits the initial conjunction and renders the action simply as past narrative.
- source_word: כָּל הַזָּהָב וְהַכֶּסֶף
  chosen: all the gold and the silver
  alternatives:
  - all the gold and silver
  lexicon: HALOT
  rationale: Retains the comprehensiveness of כָּל and the definiteness of both nouns. Slightly fuller phrasing preserves the Hebrew emphasis on the total seizure.
- source_word: כָּל הַכֵּלִים
  chosen: all the vessels
  alternatives:
  - all the articles
  - all the utensils
  - all the objects
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for implements/articles. 'Vessels' fits temple and palace inventory language in English Bible style without becoming archaic.
- source_word: הַנִּמְצְאִים
  chosen: found
  alternatives:
  - that were found
  - which were present
  lexicon: HALOT
  rationale: The participle functions attributively, describing the vessels as those located there. 'Found' is concise and natural in English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Per doctrine, יְהוָה is rendered 'the LORD.' 'House' preserves the Hebrew expression, though it refers to the temple.
- source_word: וּבְאֹצְרוֹת בֵּית הַמֶּלֶךְ
  chosen: and in the treasuries of the king’s house
  alternatives:
  - and in the treasuries of the royal palace
  - and in the storehouses of the king’s house
  lexicon: HALOT
  rationale: אֹצְרוֹת denotes treasuries/storehouses. 'Treasuries' best suits the context of seized valuables. 'King’s house' is kept rather than paraphrased fully as 'palace' to mirror the Hebrew.
- source_word: בְּנֵי הַתַּעֲרֻבוֹת
  chosen: the hostages
  alternatives:
  - the sons of the pledges
  - the sons of the sureties
  lexicon: HALOT
  rationale: This difficult phrase most naturally refers to persons held as security, i.e., hostages. A more literal rendering would be obscure in English, so the contextual sense is brought into the main text while preserving the literal alternative in a footnote.
- source_word: וַיָּשָׁב שֹׁמְרֹנָה
  chosen: and returned to Samaria
  alternatives:
  - and he went back to Samaria
  lexicon: HALOT
  rationale: Standard narrative use of שוב with directional ending on שֹׁמְרֹנָה. 'Returned to Samaria' is natural and accurate.
