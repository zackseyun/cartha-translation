id: 2KI.14.10
reference: 2 Kings 14:10
source:
  edition: WLC
  text: הַכֵּ֤ה הִכִּ֨יתָ֙ אֶת אֱד֔וֹם וּֽ/נְשָׂאֲ/ךָ֖ לִבֶּ֑/ךָ הִכָּבֵד֙ וְ/שֵׁ֣ב
    בְּ/בֵיתֶ֔/ךָ וְ/לָ֤/מָּה תִתְגָּרֶה֙ בְּ/רָעָ֔ה וְ/נָ֣פַלְתָּ֔ה אַתָּ֖ה וִ/יהוּדָ֥ה
    עִמָּֽ/ךְ־׃
translation:
  text: You have indeed struck Edom, and your heart has lifted you up. Glory in that,
    and stay at home. Why should you provoke disaster, so that you fall—you and Judah
    with you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your heart has become proud.' The Hebrew idiom is literally 'your heart
      has lifted you up.'
    reason: lexical_alternative
  - marker: b
    text: Or 'be honored' / 'boast.' The Hebrew likely means to take honor from your
      victory.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּה הִכִּיתָ
  chosen: You have indeed struck
  alternatives:
  - You have surely defeated
  - You have struck down
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'You have indeed struck' preserves the emphatic force without overinterpreting
    the military result. 'Defeated' is possible from context, but 'struck' stays closer
    to נכה while still making sense in context.
- source_word: אֶת אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Direct object marker plus the proper name straightforwardly indicates
    the nation/personified territory Edom as the object of Amaziah's military action.
- source_word: וּנְשָׂאֲךָ לִבֶּךָ
  chosen: your heart has lifted you up
  alternatives:
  - your heart has become proud
  - you have become proud
  lexicon: HALOT
  rationale: Literally the subject is 'your heart,' and the idiom expresses pride
    or self-exaltation. The chosen rendering preserves the Hebrew imagery while remaining
    natural English. The more interpretive 'you have become proud' is possible but
    less transparent to the source.
- source_word: הִכָּבֵד
  chosen: Glory in that
  alternatives:
  - be honored
  - enjoy your honor
  - boast
  lexicon: HALOT
  rationale: The Niphal imperative of כבד here likely means to enjoy or take honor
    from the victory just won. 'Glory in that' captures the reflexive/resultative
    sense in context better than the overly literal 'be honored.' 'Boast' is possible
    but slightly harsher than the immediate context requires.
- source_word: וְשֵׁב בְּבֵיתֶךָ
  chosen: and stay at home
  alternatives:
  - and sit in your house
  - and remain in your house
  lexicon: HALOT
  rationale: The imperative plus prepositional phrase is an idiom urging him to remain
    where he is rather than seek further conflict. 'Stay at home' is idiomatic modern
    English and fits optimal equivalence.
- source_word: וְלָמָּה
  chosen: Why should
  alternatives:
  - And why
  - Why
  lexicon: HALOT
  rationale: Introduces a rhetorical warning question. 'Why should' fits the admonitory
    tone in English.
- source_word: תִתְגָּרֶה
  chosen: you provoke
  alternatives:
  - you stir yourself up
  - you engage in strife
  - you meddle
  lexicon: HALOT
  rationale: From גרה in the hitpael, the sense is to stir oneself up against, provoke,
    or engage in conflict. 'Provoke' works well with the following בְרָעָה and the
    military-political context.
- source_word: בְּרָעָה
  chosen: disaster
  alternatives:
  - harm
  - trouble
  - evil
  lexicon: HALOT
  rationale: In this context רעה refers to calamity or harmful outcome rather than
    moral evil. 'Disaster' best conveys the threatened consequence of reckless war.
- source_word: וְנָפַלְתָּה
  chosen: so that you fall
  alternatives:
  - and fall
  - and you would fall
  lexicon: HALOT
  rationale: Following the rhetorical question, the perfect can express the expected
    result of the provocation. 'So that you fall' makes the consequence relation explicit
    in natural English.
- source_word: אַתָּה וִיהוּדָה עִמָּךְ
  chosen: you and Judah with you
  alternatives:
  - you and Judah along with you
  lexicon: HALOT
  rationale: The phrase emphasizes that the king's downfall would bring the nation
    down as well. The chosen wording is direct and preserves the Hebrew structure.
