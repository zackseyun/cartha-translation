id: 2KI.14.29
reference: 2 Kings 14:29
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב יָֽרָבְעָם֙ עִם אֲבֹתָ֔י/ו עִ֖ם מַלְכֵ֣י יִשְׂרָאֵ֑ל וַ/יִּמְלֹ֛ךְ
    זְכַרְיָ֥ה בְנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And Jeroboam slept with his fathers, with the kings of Israel, and Zechariah
    his son reigned in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lay down with his fathers'; the Hebrew idiom is a conventional formula
      for a king's death.
    reason: lexical_alternative
  - marker: b
    text: Or 'among the kings of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom שׁכב with 'with his fathers' is the standard royal death formula.
    'Slept' preserves the Hebrew wording and literary convention better than the interpretive
    gloss 'died,' while remaining natural in English.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the conventional idiom in the regnal summaries. 'Fathers' is
    more formally aligned with the Hebrew than 'ancestors' and preserves the stock
    formula.
- source_word: עִם מַלְכֵי יִשְׂרָאֵל
  chosen: with the kings of Israel
  alternatives:
  - among the kings of Israel
  lexicon: HALOT
  rationale: The repeated עִם is retained as 'with' to reflect the Hebrew structure.
    The phrase likely associates him with the line of Israelite kings in death/burial
    formula language; 'with' is the most direct rendering.
- source_word: וַיִּמְלֹךְ
  chosen: reigned
  alternatives:
  - became king
  - began to reign
  lexicon: HALOT
  rationale: In regnal notices, 'reigned' is the standard concise rendering. 'Became
    king' would undertranslate the verb, and 'began to reign' adds aspect not explicit
    here.
- source_word: זְכַרְיָה
  chosen: Zechariah
  alternatives:
  - Zekaryah
  rationale: Standard English transliteration of the personal name.
- source_word: בְנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; no reason to paraphrase.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: In succession contexts, 'in his place' is the most idiomatic English
    equivalent and clearly conveys royal succession.
