id: 2KI.14.9
reference: 2 Kings 14:9
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח יְהוֹאָ֣שׁ מֶֽלֶךְ יִשְׂרָאֵ֗ל אֶל אֲמַצְיָ֣הוּ מֶֽלֶךְ יְהוּדָה֮
    לֵ/אמֹר֒ הַ/ח֜וֹחַ אֲשֶׁ֣ר בַּ/לְּבָנ֗וֹן שָׁ֠לַח אֶל הָ/אֶ֜רֶז אֲשֶׁ֤ר בַּ/לְּבָנוֹן֙
    לֵ/אמֹ֔ר תְּנָֽ/ה אֶת בִּתְּ/ךָ֥ לִ/בְנִ֖/י לְ/אִשָּׁ֑ה וַֽ/תַּעֲבֹ֞ר חַיַּ֤ת
    הַ/שָּׂדֶה֙ אֲשֶׁ֣ר בַּ/לְּבָנ֔וֹן וַ/תִּרְמֹ֖ס אֶת הַ/חֽוֹחַ־־־־־־־׃
translation:
  text: Then Jehoash king of Israel sent to Amaziah king of Judah, saying, “The thornbush
    that was in Lebanon sent to the cedar that was in Lebanon, saying, ‘Give your
    daughter to my son as a wife.’ But a wild beast that was in Lebanon passed by
    and trampled the thornbush.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'thistle' or 'briar' for the thorny plant named here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a beast of the field,' that is, a wild animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard idiomatic rendering introducing direct speech.
- source_word: הַחוֹחַ
  chosen: the thornbush
  alternatives:
  - the thistle
  - the briar
  - the thorn
  lexicon: HALOT
  rationale: חוֹחַ denotes a thorny plant. 'Thornbush' best conveys a low, prickly
    shrub in contrast with the lofty cedar, preserving the fable's imagery without
    over-specifying a species.
- source_word: הָאֶרֶז
  chosen: the cedar
  lexicon: HALOT
  rationale: Straightforward rendering of אֶרֶז, important to the contrast between
    insignificance and majesty in the proverb.
- source_word: בַּלְּבָנוֹן
  chosen: in Lebanon
  alternatives:
  - on Lebanon
  lexicon: HALOT
  rationale: Idiomatic English for location; repeated to preserve the Hebrew's rhetorical
    repetition.
- source_word: תְּנָה
  chosen: Give
  alternatives:
  - Give over
  - Grant
  lexicon: HALOT
  rationale: Imperative of נתן in a marriage-alliance request is naturally rendered
    'Give.'
- source_word: בִּתְּךָ לִבְנִי לְאִשָּׁה
  chosen: your daughter to my son as a wife
  alternatives:
  - your daughter to my son for a wife
  lexicon: HALOT
  rationale: This preserves the familial and marital language clearly in contemporary
    English.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: a wild beast
  alternatives:
  - a beast of the field
  - a wild animal
  lexicon: HALOT
  rationale: The phrase refers generally to a wild animal. 'Wild beast' preserves
    the proverbial tone and menace better than the more clinical 'wild animal.'
- source_word: וַתַּעֲבֹר
  chosen: passed by
  alternatives:
  - passed through
  - went by
  lexicon: HALOT
  rationale: In context the animal moves past and incidentally crushes the thornbush;
    'passed by' captures that sense well.
- source_word: וַתִּרְמֹס
  chosen: trampled
  alternatives:
  - crushed underfoot
  - trampled down
  lexicon: HALOT
  rationale: רמס commonly conveys trampling underfoot. 'Trampled' is concise and vivid.
