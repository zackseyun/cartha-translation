id: 2KI.14.18
reference: 2 Kings 14:18
source:
  edition: WLC
  text: וְ/יֶ֖תֶר דִּבְרֵ֣י אֲמַצְיָ֑הוּ הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י
    הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־׃
translation:
  text: Now the rest of the acts of Amaziah, are they not written in the Book of the
    Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder' or 'rest.' With prefixed וְ in this recurring
    regnal-summary formula, English idiom is best served by 'Now the rest of,' which
    preserves the transitional force without sounding wooden.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the formula 'the rest of the words/matters of X,' the sense is not
    merely speech but the record of a king's deeds and affairs. 'Acts' is standard,
    natural English for this historiographic usage.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - were they not
  lexicon: HALOT
  rationale: This interrogative particle plus negation introduces a rhetorical question
    expecting a positive answer. 'Are they not' preserves the conventional formula
    and matches the present-result sense of the following passive participle.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - were they not written
  lexicon: HALOT
  rationale: כְּתוּבִים is a passive participle, literally 'written.' 'Are they not
    written' closely reflects the Hebrew and preserves the stock archival formula.
    'Recorded' is possible but less literal.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this archival idiom English naturally
    uses 'in the Book.' 'Book' is idiomatic for סֵפֶר here, while 'scroll' is possible
    but less conventional in this formula.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This phrase in royal-source citations refers to an annalistic record.
    'Chronicles' is the established and accurate rendering in this context; 'annals'
    is also viable but less aligned with the Hebrew expression's conventional English
    equivalent.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - for the kings of Judah
  lexicon: HALOT
  rationale: The לְ here functions idiomatically in the title of the source document.
    English 'of the Kings of Judah' best conveys the genitival relationship in this
    archival title.
