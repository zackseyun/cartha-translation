id: 2KI.14.28
reference: 2 Kings 14:28
source:
  edition: WLC
  text: וְ/יֶתֶר֩ דִּבְרֵ֨י יָרָבְעָ֜ם וְ/כָל אֲשֶׁ֤ר עָשָׂה֙ וּ/גְבוּרָת֣/וֹ אֲשֶׁר
    נִלְחָ֔ם וַ/אֲשֶׁ֨ר הֵשִׁ֜יב אֶת דַּמֶּ֧שֶׂק וְ/אֶת חֲמָ֛ת לִ/יהוּדָ֖ה בְּ/יִשְׂרָאֵ֑ל
    הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יִשְׂרָאֵֽל־־־־־־׃
translation:
  text: Now the rest of the acts of Jeroboam, and all that he did, and his might,
    how he fought, and how he restored Damascus and Hamath to Judah in Israel—are
    they not written in the Book of the Chronicles of the Kings of Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to Judah in Israel.'' The phrase is difficult. It may mean territory
      restored for Israel that had once belonged to Judah, or it may preserve an older
      geopolitical designation. The main text keeps the Hebrew wording as closely
      as possible without resolving the ambiguity.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיֶתֶר דִּבְרֵי
  chosen: Now the rest of the acts of
  alternatives:
  - Now the rest of the words/deeds of
  - As for the rest of the matters concerning
  lexicon: HALOT
  rationale: This is the standard regnal-summary formula in Kings. Although דִּבְרֵי
    is literally 'words/matters,' in this historiographic context 'acts' best captures
    the sense idiomatically in English without over-paraphrasing.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of the clause; 'did' preserves the broad
    scope of עשה.
- source_word: וּגְבוּרָתוֹ
  chosen: and his might
  alternatives:
  - and his strength
  - and his mighty deeds
  - and his valor
  lexicon: HALOT
  rationale: גְּבוּרָה can denote strength, valor, or mighty acts. Here, followed
    by 'how he fought,' it points to military prowess. 'Might' preserves the compactness
    of the Hebrew while allowing the following clause to specify its expression.
- source_word: אֲשֶׁר נִלְחָם
  chosen: how he fought
  alternatives:
  - with which he fought
  - that he waged war
  lexicon: HALOT
  rationale: English idiom prefers 'how he fought' in coordination with the preceding
    summary noun. This reflects the explanatory force of אֲשֶׁר here.
- source_word: וַאֲשֶׁר הֵשִׁיב
  chosen: and how he restored
  alternatives:
  - and how he recovered
  - and how he brought back
  lexicon: HALOT
  rationale: הֵשִׁיב commonly means 'restore/bring back.' In a territorial-political
    context, 'restored' is natural and concise.
- source_word: אֶת דַּמֶּשֶׂק וְאֶת חֲמָת
  chosen: Damascus and Hamath
  lexicon: HALOT
  rationale: These are place names and are transliterated by standard English conventions.
- source_word: לִיהוּדָה בְּיִשְׂרָאֵל
  chosen: to Judah in Israel
  alternatives:
  - for Judah in Israel
  - to Israel, which belonged to Judah
  - to Judah that was in Israel
  lexicon: HALOT
  rationale: The Hebrew is difficult and compressed. The most formally transparent
    rendering is 'to Judah in Israel,' preserving the wording without importing a
    harmonizing interpretation. This likely reflects a historical-geographical relationship
    or older claim, but the text itself is terse enough that the translation should
    remain restrained.
- source_word: הֲלֹא הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - behold, they are written
  lexicon: HALOT
  rationale: This is the conventional rhetorical closing formula in Kings. 'Written'
    preserves the passive participial form and the formulaic style.
- source_word: עַל סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: in the Book of the Chronicles
  alternatives:
  - on the scroll of the events of the days
  - in the book of the annals
  lexicon: HALOT
  rationale: Though literally 'on/upon the book of the matters of the days,' the established
    and accurate idiom in this archival formula is 'in the Book of the Chronicles.'
    'Annals' is possible, but 'Chronicles' better matches the Hebrew phrase while
    remaining readable.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  chosen: of the Kings of Israel
  alternatives:
  - for the kings of Israel
  lexicon: HALOT
  rationale: In this construct chain, לְ marks relation within the title of the source
    document; 'of the Kings of Israel' is the natural English rendering.
