id: 2KI.14.3
reference: 2 Kings 14:3
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ הַ/יָּשָׁר֙ בְּ/עֵינֵ֣י יְהוָ֔ה רַ֕ק לֹ֖א כְּ/דָוִ֣ד אָבִ֑י/ו
    כְּ/כֹ֧ל אֲשֶׁר עָשָׂ֛ה יוֹאָ֥שׁ אָבִ֖י/ו עָשָֽׂה־׃
translation:
  text: He did what was right in the eyes of the LORD, yet not like David his father;
    he did according to all that Joash his father had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''David his father'' uses ''father'' in the dynastic sense of ancestor,
      not necessarily immediate parentage.'
    reason: cultural_note
  - marker: b
    text: Or 'only, not like David his father.' The Hebrew רַק can be rendered 'only'
      to introduce the qualification.
    reason: lexical_alternative
  - marker: c
    text: Joash is also spelled Jehoash in English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of עשה introducing the king's conduct. English
    omits the conjunction for natural style while preserving the verbal action.
- source_word: הַיָּשָׁר
  chosen: what was right
  alternatives:
  - the right
  - what was upright
  lexicon: HALOT
  rationale: Idiomatic royal-evaluation formula in Kings. 'What was right' is standard,
    clear English for the substantivized adjective.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom of divine evaluation. YHWH is rendered 'the
    LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: רַק
  chosen: yet
  alternatives:
  - only
  - however
  - except that
  lexicon: HALOT
  rationale: Here רַק marks a qualification to the positive assessment. 'Yet' communicates
    the adversative nuance smoothly in English.
- source_word: לֹא כְּדָוִד אָבִיו
  chosen: not like David his father
  alternatives:
  - not as David his father was
  - not according to David his father
  lexicon: HALOT
  rationale: Expresses that Amaziah did not match David's standard. 'Father' is dynastic/ancestral
    rather than immediate biological father, but the Hebrew wording is retained.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  chosen: according to all that ... had done
  alternatives:
  - just as ... did
  - in all the way that ... did
  lexicon: HALOT
  rationale: כ + כל + אשר forms a comparison of comprehensive conformity. 'According
    to all that ... had done' preserves the breadth of imitation.
- source_word: יוֹאָשׁ אָבִיו
  chosen: Joash his father
  alternatives:
  - Jehoash his father
  lexicon: HALOT
  rationale: The Hebrew form here is יוֹאָשׁ, commonly represented in English as 'Joash.'
    'Father' refers to his immediate predecessor/father in context.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect clarifies the relative time of Joash's prior actions
    in comparison to Amaziah's reign.
