id: 2KI.14.20
reference: 2 Kings 14:20
source:
  edition: WLC
  text: וַ/יִּשְׂא֥וּ אֹת֖/וֹ עַל הַ/סּוּסִ֑ים וַ/יִּקָּבֵ֧ר בִּ/ירוּשָׁלִַ֛ם עִם
    אֲבֹתָ֖י/ו בְּ/עִ֥יר דָּוִֽד־־׃
translation:
  text: They carried him on the horses, and he was buried in Jerusalem with his fathers
    in the city of David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'upon horses.' The Hebrew wording is literal and may describe transport
      of the body by horse-borne conveyance.
    reason: lexical_alternative
  - marker: b
    text: '''With his fathers'' is a traditional burial formula, meaning he was buried
      with his royal ancestors.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  chosen: They carried
  alternatives:
  - They bore
  - They transported
  lexicon: HALOT
  rationale: From נשׂא, here a straightforward narrative wayyiqtol meaning 'carry/bear.'
    'They carried' is natural modern English and preserves the concrete action.
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct object pronoun referring to Amaziah; standard English object pronoun
    required.
- source_word: עַל הַסּוּסִים
  chosen: on the horses
  alternatives:
  - upon horses
  - by horse
  lexicon: HALOT
  rationale: The Hebrew preposition עַל with הסוסים is most directly 'on the horses.'
    This likely refers to transporting the body by mounted conveyance/horseback. The
    more literal rendering is retained rather than smoothing to 'by horse'.
- source_word: וַיִּקָּבֵר
  chosen: and he was buried
  alternatives:
  - and they buried him
  lexicon: HALOT
  rationale: The form is best taken as passive/Nifal, so 'he was buried' reflects
    the Hebrew voice more precisely than an active paraphrase.
- source_word: בִּירוּשָׁלַםִ
  chosen: in Jerusalem
  rationale: Standard locative rendering of the place name.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: A conventional burial formula. 'With his fathers' preserves the source
    wording and its dynastic/familial resonance; 'ancestors' is interpretive and less
    formal.
- source_word: בְּעִיר דָּוִד
  chosen: in the city of David
  rationale: Standard rendering of the toponym. Here it specifies the burial location
    within Jerusalem.
