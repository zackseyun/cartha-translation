id: 2KI.14.12
reference: 2 Kings 14:12
source:
  edition: WLC
  text: וַ/יִּנָּ֥גֶף יְהוּדָ֖ה לִ/פְנֵ֣י יִשְׂרָאֵ֑ל וַ/יָּנֻ֖סוּ אִ֥ישׁ ל/אהל/ו׃
translation:
  text: And Judah was defeated before Israel, and each man fled to his tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each one fled to his home.' The Hebrew reads literally, 'each man to
      his tent,' a common idiom for dispersing to one's dwelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנָּגֶף
  chosen: was defeated
  alternatives:
  - was struck down
  - was routed
  - was beaten
  lexicon: HALOT
  rationale: The Niphal of נָגַף here denotes being beaten/defeated in battle rather
    than merely being physically struck. 'Was defeated' is clear modern English and
    fits the military context.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper name for the southern kingdom; standard transliteration is appropriate.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - by
  lexicon: HALOT
  rationale: In battle contexts לִפְנֵי commonly expresses being overcome 'before'
    an opponent. 'Before Israel' is idiomatic and preserves the Hebrew construction.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name for the northern kingdom; standard transliteration is appropriate.
- source_word: וַיָּנֻסוּ
  chosen: fled
  alternatives:
  - ran away
  - took flight
  lexicon: HALOT
  rationale: The verb נוּס means to flee. 'Fled' is concise and suitably formal for
    narrative prose.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - every man
  - each one
  lexicon: HALOT
  rationale: The distributive singular אִישׁ indicates individual retreat. 'Each man'
    preserves the masculine singular form and the distributive sense, in keeping with
    the gender-accurate policy.
- source_word: לְאָהֳלוֹ
  chosen: to his tent
  alternatives:
  - to his home
  lexicon: HALOT
  rationale: Literally 'to his tent.' Although the idiom can function like 'to his
    home,' the Hebrew image is straightforward and traditional, so the more literal
    rendering is retained.
