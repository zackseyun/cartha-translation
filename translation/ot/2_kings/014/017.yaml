id: 2KI.14.17
reference: 2 Kings 14:17
source:
  edition: WLC
  text: וַ/יְחִ֨י אֲמַצְיָ֤הוּ בֶן יוֹאָשׁ֙ מֶ֣לֶךְ יְהוּדָ֔ה אַֽחֲרֵ֣י מ֔וֹת יְהוֹאָ֥שׁ
    בֶּן יְהֽוֹאָחָ֖ז מֶ֣לֶךְ יִשְׂרָאֵ֑ל חֲמֵ֥שׁ עֶשְׂרֵ֖ה שָׁנָֽה־־׃
translation:
  text: Amaziah son of Joash, king of Judah, lived fifteen years after the death of
    Jehoash son of Jehoahaz, king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The names 'Joash' and 'Jehoash' are variant English forms reflecting different
      Hebrew spellings in this verse; the translation keeps them distinct to avoid
      confusion between the king of Judah and the king of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  chosen: lived
  alternatives:
  - survived
  - remained alive
  lexicon: HALOT
  rationale: The wayyiqtol of חיה here reports continued life for a specified duration
    after another king's death. 'Lived' is the most natural English rendering in this
    chronological notice; 'survived' is possible but slightly more interpretive.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  rationale: Standard English transliteration of the personal name.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: The construct indicates direct filial relationship in royal identification
    formulas.
- source_word: יוֹאָשׁ
  chosen: Joash
  alternatives:
  - Jehoash
  rationale: Standard English form for the Judahite king's name in this patronymic.
    English tradition commonly distinguishes the Judahite king as 'Joash' and the
    Israelite king as 'Jehoash' in this context, reflecting the differing Hebrew spellings
    in the verse.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Amaziah's royal office and
    realm.
- source_word: אַחֲרֵי מוֹת
  chosen: after the death of
  alternatives:
  - after ... died
  lexicon: HALOT
  rationale: The preposition plus construct noun is most directly rendered 'after
    the death of.' This preserves the nominal expression of the Hebrew.
- source_word: יְהוֹאָשׁ
  chosen: Jehoash
  alternatives:
  - Joash
  rationale: Standard transliteration of the Israelite king's name as spelled here.
    Using 'Jehoash' helps distinguish him from Amaziah's father Joash in English.
- source_word: יְהוֹאָחָז
  chosen: Jehoahaz
  rationale: Standard English transliteration of the personal name.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain identifying the northern kingdom.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  chosen: fifteen years
  lexicon: HALOT
  rationale: Standard rendering of the cardinal number plus 'year' in a duration expression.
