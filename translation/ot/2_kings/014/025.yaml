id: 2KI.14.25
reference: 2 Kings 14:25
source:
  edition: WLC
  text: ה֗וּא הֵשִׁיב֙ אֶת גְּב֣וּל יִשְׂרָאֵ֔ל מִ/לְּב֥וֹא חֲמָ֖ת עַד יָ֣ם הָ/עֲרָבָ֑ה כִּ/דְבַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֣ר דִּבֶּ֗ר בְּ/יַד עַבְדּ֞/וֹ יוֹנָ֤ה בֶן אֲמִתַּי֙ הַ/נָּבִ֔יא אֲשֶׁ֖ר מִ/גַּ֥ת הַחֵֽפֶר־־־־׃
translation:
  text: He restored the border of Israel from Lebo-hamath as far as the Sea of the Arabah, according to the word of Yahweh, the God of Israel, which he had spoken by the hand of his servant Jonah son of Amittai, the prophet, who was from Gath-hepher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “from the entrance of Hamath.”
    reason: lexical_alternative
  - marker: b
    text: That is, likely the Dead Sea.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵשִׁיב
  chosen: restored
  alternatives:
  - brought back
  - recovered
  lexicon: HALOT
  rationale: The Hiphil of שוב here refers to reestablishing Israel's territorial boundary. 'Restored' fits the political-geographical sense better than the more wooden 'caused to return.'
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory
  lexicon: HALOT
  rationale: The noun denotes a territorial limit or boundary. 'Border' is natural modern English and preserves the geographic sense.
- source_word: מִלְּבוֹא חֲמָת
  chosen: from Lebo-hamath
  alternatives:
  - from the entrance of Hamath
  lexicon: HALOT
  rationale: This expression functions as a place-name or fixed geographical designation in biblical usage. Retaining 'Lebo-hamath' avoids overinterpreting while preserving the known toponym; the more literal alternative is preserved in a footnote.
- source_word: יָם הָעֲרָבָה
  chosen: the Sea of the Arabah
  alternatives:
  - the sea of the Arabah
  - the Dead Sea
  lexicon: HALOT
  rationale: Formally the Hebrew reads 'Sea of the Arabah.' This likely refers to the Dead Sea, but the translation keeps the Hebrew geographical expression in the main text and preserves the identification in a footnote.
- source_word: כִּדְבַר
  chosen: according to the word of
  alternatives:
  - in accordance with the word of
  lexicon: HALOT
  rationale: This idiom indicates conformity to a prior divine utterance. 'According to the word of' is both clear and close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: The Hebrew idiom marks agency or instrumentality. 'By the hand of' preserves the biblical idiom while remaining understandable in English.
- source_word: עַבְדּוֹ
  chosen: his servant
  alternatives:
  - his slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in prophetic commissioning contexts 'servant' is the most idiomatic and contextually appropriate English rendering without losing the relation of belonging to God.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: A straightforward appositional title identifying Jonah's role.
- source_word: מִגַּת הַחֵפֶר
  chosen: from Gath-hepher
  alternatives:
  - of Gath-hepher
  lexicon: HALOT
  rationale: The preposition מן indicates origin. 'From Gath-hepher' is the most natural rendering.
