id: 2KI.14.11
reference: 2 Kings 14:11
source:
  edition: WLC
  text: וְ/לֹא שָׁמַ֣ע אֲמַצְיָ֔הוּ וַ/יַּ֨עַל יְהוֹאָ֤שׁ מֶֽלֶךְ יִשְׂרָאֵל֙ וַ/יִּתְרָא֣וּ
    פָנִ֔ים ה֖וּא וַ/אֲמַצְיָ֣הוּ מֶֽלֶךְ יְהוּדָ֑ה בְּ/בֵ֥ית שֶׁ֖מֶשׁ אֲשֶׁ֥ר לִ/יהוּדָֽה־־־׃
translation:
  text: But Amaziah would not listen, so Jehoash king of Israel went up, and he and
    Amaziah king of Judah met face to face at Beth-shemesh, which belongs to Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not heed' / 'did not obey.' The Hebrew verb can denote listening
      with responsive action, not mere hearing.
    reason: lexical_alternative
  - marker: b
    text: Literally 'saw faces,' an idiom for a direct encounter.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: would not listen
  alternatives:
  - did not listen
  - did not obey
  lexicon: HALOT
  rationale: In this context of rejecting a warning/challenge, שׁמע carries the sense
    of heeding or listening. 'Would not listen' captures both the negation and Amaziah's
    refusal better than the flatter 'did not listen'; 'obey' is possible but too strong
    since the speech was not a command from a superior.
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - marched up
  - advanced
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up.' In military context it can imply marching
    up, but the basic wording should be preserved unless context requires expansion.
    'Went up' keeps the Hebrew idiom and leaves the military implication to context.
- source_word: וַיִּתְרָאוּ פָנִים
  chosen: met face to face
  alternatives:
  - looked one another in the face
  - appeared before one another
  lexicon: HALOT
  rationale: The idiom literally involves seeing faces. Here it refers to direct encounter
    between the two kings in battle context. 'Met face to face' is natural English
    and preserves the force of a personal confrontation.
- source_word: בֵּית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - Beth Shemesh
  - House of the Sun
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than translated. 'Beth-shemesh' is the standard English transliteration.
- source_word: אֲשֶׁר לִיהוּדָה
  chosen: which belongs to Judah
  alternatives:
  - which was Judah's
  - that is in Judah
  lexicon: HALOT
  rationale: The phrase marks territorial belonging. 'Which belongs to Judah' is slightly
    more precise than merely 'in Judah,' indicating jurisdiction or possession of
    the town.
- source_word: וְלֹא
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: HALOT
  rationale: Though waw can be simply conjunctive, English style benefits from signaling
    the contrast with the preceding warning that Amaziah ignored. 'But' reflects the
    discourse function without overtranslating.
