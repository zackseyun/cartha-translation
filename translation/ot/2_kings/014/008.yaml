id: 2KI.14.8
reference: 2 Kings 14:8
source:
  edition: WLC
  text: אָ֣ז שָׁלַ֤ח אֲמַצְיָה֙ מַלְאָכִ֔ים אֶל יְהוֹאָ֨שׁ בֶּן יְהוֹאָחָ֧ז בֶּן יֵה֛וּא
    מֶ֥לֶךְ יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר לְכָ֖/ה נִתְרָאֶ֥ה פָנִֽים־־־׃
translation:
  text: Then Amaziah sent messengers to Jehoash son of Jehoahaz, son of Jehu, king
    of Israel, saying, “Come, let us face one another in battle.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “Come, let us see faces.” The Hebrew idiom means to meet each
      other directly, here in the sense of military confrontation.
    reason: lexical_alternative
  - marker: b
    text: Jehoash is also commonly rendered “Joash” in English versions.
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Standard temporal/sequential discourse marker introducing the next event
    in the narrative.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Common verb for sending; 'sent' is the natural narrative rendering.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  lexicon: HALOT
  rationale: In historical narrative this refers to human agents carrying a message,
    not angels. 'Messengers' is the broad, accurate choice.
- source_word: יְהוֹאָשׁ
  chosen: Jehoash
  alternatives:
  - Joash
  rationale: The Hebrew form here is יְהוֹאָשׁ; 'Jehoash' more directly reflects the
    source form, while 'Joash' is a conventional English contraction.
- source_word: בֶּן ... בֶּן ...
  chosen: son of Jehoahaz, son of Jehu
  lexicon: HALOT
  rationale: The genealogical chain is retained formally to match the Hebrew and identify
    the northern king precisely.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Straightforward royal title; retained without expansion.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with this message
  lexicon: HALOT
  rationale: Standard quotative introducing the direct speech. 'Saying' preserves
    the Hebrew structure cleanly.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come now
  - Go
  lexicon: HALOT
  rationale: Idiomatic imperative inviting or challenging the addressee. 'Come' fits
    the confrontational summons better than a more literal but awkward 'go'.
- source_word: נִתְרָאֶה פָנִים
  chosen: let us face one another in battle
  alternatives:
  - let us look one another in the face
  - let us meet face to face
  lexicon: HALOT
  rationale: The idiom literally means 'let us see faces,' but in this royal challenge
    context it denotes direct military confrontation. The added 'in battle' makes
    the idiomatic force explicit without over-paraphrasing, matching the narrative
    setting.
