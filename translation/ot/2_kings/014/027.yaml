id: 2KI.14.27
reference: 2 Kings 14:27
source:
  edition: WLC
  text: וְ/לֹא דִבֶּ֣ר יְהוָ֔ה לִ/מְחוֹת֙ אֶת שֵׁ֣ם יִשְׂרָאֵ֔ל מִ/תַּ֖חַת הַ/שָּׁמָ֑יִם
    וַ/יּ֣וֹשִׁיעֵ֔/ם בְּ/יַ֖ד יָרָבְעָ֥ם בֶּן יוֹאָֽשׁ־־־׃
translation:
  text: But the LORD had not said that he would blot out the name of Israel from under
    heaven, so he saved them by the hand of Jeroboam son of Joash.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wipe out' or 'erase' the name of Israel.
    reason: lexical_alternative
  - marker: b
    text: '''By the hand of'' is a Hebrew idiom meaning ''through'' or ''by means
      of.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal form rather than transliteration.
- source_word: דִבֶּר
  chosen: had not said
  alternatives:
  - did not speak
  - had not declared
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak/say.' In this context with the infinitive
    לִמְחוֹת, English idiom is best served by 'had not said' to express prior divine
    intention relative to the following wayyiqtol narrative.
- source_word: לִמְחוֹת
  chosen: that he would blot out
  alternatives:
  - to wipe out
  - to erase
  lexicon: HALOT
  rationale: מחה in this construction conveys eradication/removal. 'Blot out' preserves
    the established biblical idiom and fits the object 'name' well, while still being
    understandable in modern English.
- source_word: שֵׁם יִשְׂרָאֵל
  chosen: the name of Israel
  alternatives:
  - Israel's name
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew idiom, where 'name' stands
    for continued existence/identity. This also keeps the rhetorical force of total
    removal.
- source_word: מִתַּחַת הַשָּׁמָיִם
  chosen: from under heaven
  alternatives:
  - from under the heavens
  - from the earth
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for removal from the world of human existence.
    'From under heaven' is both natural and sufficiently literal; 'from the earth'
    would interpret rather than translate.
- source_word: וַיּוֹשִׁיעֵם
  chosen: so he saved them
  alternatives:
  - and he delivered them
  - and he gave them victory
  lexicon: HALOT
  rationale: ישע in the Hifil means 'save/deliver.' 'Saved' preserves the lexical
    link and theological resonance without over-specifying the mode of rescue. 'So'
    makes the narrative-result relation clear in English.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: The Hebrew idiom denotes agency or instrumentality. 'By the hand of'
    keeps the biblical expression while remaining intelligible; it also preserves
    the sense that Jeroboam was the human agent of the LORD's saving act.
- source_word: יָרָבְעָם בֶּן יוֹאָשׁ
  chosen: Jeroboam son of Joash
  alternatives:
  - Jeroboam the son of Joash
  rationale: Standard English transliteration of the personal names, with concise
    filial identification matching normal biblical style.
