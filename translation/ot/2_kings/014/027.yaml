theological_decisions:
- issue: Divine intention and action in Israel's preservation
  chosen_reading: The verse states that the LORD had not decreed Israel's eradication
    and therefore acted to save them through Jeroboam as his instrument.
  alternative_readings:
  - The verse could be rendered more woodenly as two coordinate actions without making
    the causal relation explicit in English.
  rationale: The Hebrew presents the LORD's non-declaration to blot out Israel followed
    by his saving action through Jeroboam. Rendering the second clause with 'so' reflects
    the narrative logic without adding doctrine beyond the text. It also preserves
    the tension that God saves Israel through an otherwise flawed king, rather than
    resolving that tension evaluatively.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
