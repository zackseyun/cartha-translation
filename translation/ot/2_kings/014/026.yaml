theological_decisions:
- issue: Rendering the difficult idiom עָצוּר וְעָזוּב
  chosen_reading: there was neither bond nor free
  alternative_readings:
  - there was neither slave nor free
  - there was neither restrained nor released
  - there was no one left, either low or high
  rationale: The phrase is a recognized Hebrew idiom expressing total absence of people or support. 'Neither bond nor free' preserves the idiomatic force and echoes familiar English biblical style without importing a specific theological claim. Because the exact nuance of the pair is debated, alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering מֹרֶה מְאֹד
  chosen_reading: was very bitter
  alternative_readings:
  - was very grievous
  - was very severe
  rationale: The Hebrew form is lexically difficult in this verse. 'Very bitter' best reflects the likely sense of severe distress while staying close to the source. Since the exact nuance is uncertain, alternatives are preserved in a footnote rather than overstated in the main text.
  doctrine_reference: Translation philosophy §3
