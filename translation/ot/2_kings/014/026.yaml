id: 2KI.14.26
reference: 2 Kings 14:26
source:
  edition: WLC
  text: כִּי רָאָ֧ה יְהוָ֛ה אֶת עֳנִ֥י יִשְׂרָאֵ֖ל מֹרֶ֣ה מְאֹ֑ד וְ/אֶ֤פֶס עָצוּר֙ וְ/אֶ֣פֶס עָז֔וּב וְ/אֵ֥ין עֹזֵ֖ר לְ/יִשְׂרָאֵֽל־־׃
translation:
  text: For Yahweh saw that the affliction of Israel was very bitter, and there was neither bond nor free, and there was no helper for Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was very grievous' or 'was very severe.' The Hebrew expression is difficult, but it clearly intensifies Israel’s suffering.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''there was neither bond nor free.'' The expression likely means that no one at all remained to help, or that every class was exhausted.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project’s default rendering for the divine name, preserving covenantal reference while matching established English Bible convention.
- source_word: עֳנִי
  chosen: affliction
  alternatives:
  - misery
  - poverty
  - humiliation
  lexicon: HALOT
  rationale: Conveys Israel’s state of suffering/distress broadly, fitting the national context better than a narrower economic sense such as 'poverty'.
- source_word: מֹרֶה מְאֹד
  chosen: very bitter
  alternatives:
  - very grievous
  - very rebellious
  - very severe
  lexicon: HALOT
  rationale: In this context the phrase describes the extremity of Israel’s condition. 'Very bitter' preserves the likely sense of acute hardship. Because מֹרֶה is difficult and has been understood variously, an alternative is preserved in a footnote.
- source_word: אֶפֶס
  chosen: there was neither
  alternatives:
  - there was no
  - it had come to an end that there was
  lexicon: HALOT
  rationale: Used idiomatically with the following participles to express total absence. 'There was neither ... nor ...' gives natural English while preserving the emphatic negation.
- source_word: עָצוּר
  chosen: bond
  alternatives:
  - restrained
  - confined
  - slave
  lexicon: HALOT
  rationale: In the idiom עָצוּר וְעָזוּב, the term is traditionally understood as one who is bound or under restraint, paired with its opposite. 'Bond' preserves the compactness of the Hebrew idiom in English.
- source_word: עָזוּב
  chosen: free
  alternatives:
  - left
  - abandoned
  - released
  lexicon: HALOT
  rationale: Within the fixed expression עָצוּר וְעָזוּב, this is best rendered as the counterpart to 'bond,' yielding the idiomatic sense 'neither bond nor free'—that is, no one at all remained.
- source_word: עֹזֵר
  chosen: helper
  alternatives:
  - one helping
  - deliverer
  lexicon: HALOT
  rationale: A straightforward rendering of the participle that fits the immediate context of lacking anyone to come to Israel’s aid.
