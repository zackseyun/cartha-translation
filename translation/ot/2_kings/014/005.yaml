id: 2KI.14.5
reference: 2 Kings 14:5
source:
  edition: WLC
  text: וַ/יְהִ֕י כַּ/אֲשֶׁ֛ר חָזְקָ֥ה הַ/מַּמְלָכָ֖ה בְּ/יָד֑/וֹ וַ/יַּךְ֙ אֶת עֲבָדָ֔י/ו
    הַ/מַּכִּ֖ים אֶת הַ/מֶּ֥לֶךְ אָבִֽי/ו־־׃
translation:
  text: And it happened, as soon as the kingdom was firmly in his hand, that he struck
    down his servants who had struck down the king his father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when the kingdom was established in his hand.' The Hebrew idiom refers
      to his rule being securely consolidated.
    reason: lexical_alternative
  - marker: b
    text: 'The same Hebrew verb is used for both Amaziah''s action and the servants''
      action: he ''struck down'' those who had ''struck down'' his father.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing the next event in sequence. 'And
    it happened' preserves the Hebrew narrative flow without archaic diction.
- source_word: כַּאֲשֶׁר
  chosen: as soon as
  alternatives:
  - when
  - after
  lexicon: HALOT
  rationale: In this context the conjunction marks the time at which the following
    action occurred. 'As soon as' captures the immediate temporal sense suggested
    by the sequence.
- source_word: חָזְקָה
  chosen: was firmly
  alternatives:
  - became strong
  - was established
  - grew strong
  lexicon: HALOT
  rationale: From חזק, here with 'the kingdom' as subject. The sense is not physical
    strength but consolidation/secure establishment. Rendering with 'firmly' prepares
    the idiom 'in his hand' in natural English.
- source_word: הַמַּמְלָכָה בְּיָדוֹ
  chosen: the kingdom was firmly in his hand
  alternatives:
  - the kingdom was established in his hand
  - the royal power was secure in his hand
  - the kingdom was strengthened in his control
  lexicon: HALOT
  rationale: This is an idiom for royal control being secured. 'In his hand' is retained
    because it is transparent in English and preserves the Hebrew imagery of possession/control.
- source_word: וַיַּךְ
  chosen: he struck down
  alternatives:
  - he killed
  - he smote
  lexicon: HALOT
  rationale: נכה often means to strike, smite, or kill depending on context. Because
    the object is the assassins of his father, the result is clearly execution; 'struck
    down' preserves the verbal link with the participle הַמַּכִּים while remaining
    readable.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: Though these were likely royal officials, עבד is most directly 'servant.'
    In a court setting 'servants' can include officers in the king's service. This
    keeps closer to the Hebrew while remaining intelligible.
- source_word: הַמַּכִּים
  chosen: who had struck down
  alternatives:
  - who had killed
  - the ones who struck
  lexicon: HALOT
  rationale: The participle identifies the servants by their prior act. Using 'struck
    down' maintains lexical consistency with וַיַּךְ and reflects the Hebrew wordplay/repetition.
- source_word: אֶת הַמֶּלֶךְ אָבִיו
  chosen: the king his father
  alternatives:
  - the king, his father
  - his father the king
  lexicon: HALOT
  rationale: The Hebrew apposition is concise. 'The king his father' is slightly formal
    but natural enough and preserves the appositional force; English punctuation could
    also clarify the relation.
