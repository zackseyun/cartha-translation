id: 2KI.14.1
reference: 2 Kings 14:1
source:
  edition: WLC
  text: בִּ/שְׁנַ֣ת שְׁתַּ֔יִם לְ/יוֹאָ֥שׁ בֶּן יוֹאָחָ֖ז מֶ֣לֶךְ יִשְׂרָאֵ֑ל מָלַ֛ךְ
    אֲמַצְיָ֥הוּ בֶן יוֹאָ֖שׁ מֶ֥לֶךְ יְהוּדָֽה־־׃
translation:
  text: In the second year of Joash son of Jehoahaz, king of Israel, Amaziah son of
    Joash became king of Judah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת
  chosen: In the ... year of
  alternatives:
  - In the year of
  lexicon: HALOT
  rationale: The preposition ב plus שְׁנַת introduces a temporal setting, naturally
    rendered in English as 'In the ... year of.' This is standard regnal-year formula
    language.
- source_word: שְׁתַּיִם
  chosen: second
  alternatives:
  - two
  lexicon: HALOT
  rationale: 'Although formally the cardinal ''two,'' in dating formulas Hebrew commonly
    uses this construction idiomatically for an ordinal sense: ''the second year.''
    English requires the ordinal for natural regnal dating.'
- source_word: לְ/יוֹאָשׁ
  chosen: of Joash
  alternatives:
  - to Joash
  - belonging to Joash
  lexicon: HALOT
  rationale: The preposition ל in regnal formulas marks the king whose regnal year
    is being counted. English idiom is 'of Joash' rather than a more literal but awkward
    'to Joash.'
- source_word: בֶּן יוֹאָחָז
  chosen: son of Jehoahaz
  lexicon: HALOT
  rationale: Rendered straightforwardly as a patronymic. Personal names are transliterated
    by standard convention per project philosophy.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  lexicon: HALOT
  rationale: Standard construct chain indicating royal title and realm.
- source_word: מָלַךְ
  chosen: became king
  alternatives:
  - began to reign
  - reigned
  lexicon: HALOT
  rationale: In this context the qatal verb marks accession to the throne. 'Became
    king' communicates the event of enthronement clearly in modern English. 'Began
    to reign' is possible, but 'became king' is more concise and natural while preserving
    the sense.
- source_word: אֲמַצְיָהוּ
  chosen: Amaziah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶן יוֹאָשׁ
  chosen: son of Joash
  lexicon: HALOT
  rationale: Rendered as a patronymic identifying Amaziah.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - king over Judah
  lexicon: HALOT
  rationale: Here the final title identifies Amaziah's realm. In English, because
    'became king of Judah' is idiomatic, the title is integrated into the verbal clause
    rather than left as a separate apposition.
