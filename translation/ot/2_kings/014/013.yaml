id: 2KI.14.13
reference: 2 Kings 14:13
source:
  edition: WLC
  text: וְ/אֵת֩ אֲמַצְיָ֨הוּ מֶֽלֶךְ יְהוּדָ֜ה בֶּן יְהוֹאָ֣שׁ בֶּן אֲחַזְיָ֗הוּ תָּפַ֛שׂ
    יְהוֹאָ֥שׁ מֶֽלֶךְ יִשְׂרָאֵ֖ל בְּ/בֵ֣ית שָׁ֑מֶשׁ ו/יבאו יְר֣וּשָׁלִַ֔ם וַ/יִּפְרֹץ֩
    בְּ/חוֹמַ֨ת יְרוּשָׁלִַ֜ם בְּ/שַׁ֤עַר אֶפְרַ֨יִם֙ עַד שַׁ֣עַר הַ/פִּנָּ֔ה אַרְבַּ֥ע
    מֵא֖וֹת אַמָּֽה־־־־־׃
translation:
  text: And Jehoash king of Israel captured Amaziah king of Judah, the son of Jehoash,
    son of Ahaziah, at Beth-shemesh; then he came to Jerusalem and broke down the
    wall of Jerusalem from the Ephraim Gate to the Corner Gate, four hundred cubits.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew consonantal text reads 'and they came to Jerusalem,' but the
      context and the following singular verb support the sense 'and he came to Jerusalem,'
      referring to Jehoash.
    reason: textual_variant
lexical_decisions:
- source_word: תָּפַשׂ
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: The verb commonly means to seize or capture. In this military context,
    'captured' best conveys taking a king prisoner after battle without over-paraphrasing.
- source_word: בְּבֵית שָׁמֶשׁ
  chosen: at Beth-shemesh
  alternatives:
  - in Beth-shemesh
  lexicon: HALOT
  rationale: With a place name after ב, English 'at' is the most natural locative
    rendering here for the site of capture.
- source_word: ו/יבאו
  chosen: then he came
  alternatives:
  - and he came
  - and they came
  lexicon: HALOT
  rationale: The consonantal form is plural ('and they came'), but the immediate narrative
    focus and the following singular verb ('and he broke down') support the sense
    'he came,' referring to Jehoash. 'Then' smooths the sequence in readable English
    while preserving the narrative progression.
- source_word: וַיִּפְרֹץ
  chosen: broke down
  alternatives:
  - made a breach in
  - broke through
  lexicon: HALOT
  rationale: The verb means to break through or make a breach. With 'wall' as object,
    'broke down' is idiomatic modern English and accurately conveys demolition of
    a section of the wall.
- source_word: בְּחוֹמַת יְרוּשָׁלִַם
  chosen: the wall of Jerusalem
  alternatives:
  - in the wall of Jerusalem
  lexicon: HALOT
  rationale: Although the preposition is literally 'in,' English idiom with the verb
    favors 'broke down the wall of Jerusalem,' expressing the breached object naturally.
- source_word: בְּשַׁעַר אֶפְרַיִם עַד שַׁעַר הַפִּנָּה
  chosen: from the Ephraim Gate to the Corner Gate
  alternatives:
  - at the Ephraim Gate as far as the Corner Gate
  lexicon: HALOT
  rationale: This construction marks the extent of the breach. 'From ... to ...' is
    the clearest English expression of the span.
- source_word: הַפִּנָּה
  chosen: Corner
  alternatives:
  - corner
  - angle
  lexicon: HALOT
  rationale: As part of a gate name, capitalized 'Corner Gate' treats it as a proper
    designation rather than a generic description.
- source_word: אַרְבַּע מֵאוֹת אַמָּה
  chosen: four hundred cubits
  alternatives:
  - four hundred cubits long
  lexicon: HALOT
  rationale: The Hebrew gives the measurement directly. 'Cubits' preserves the ancient
    unit without interpretive conversion; adding 'long' is possible but not necessary.
- source_word: בֶּן ... בֶּן ...
  chosen: the son of Jehoash, son of Ahaziah
  alternatives:
  - son of Jehoash, grandson of Ahaziah
  lexicon: HALOT
  rationale: Retaining the repeated 'son of' follows the Hebrew genealogy more closely
    and avoids introducing an interpretive smoothing not present in the text.
