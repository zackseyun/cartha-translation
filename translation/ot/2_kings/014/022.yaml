id: 2KI.14.22
reference: 2 Kings 14:22
source:
  edition: WLC
  text: ה֚וּא בָּנָ֣ה אֶת אֵילַ֔ת וַ/יְשִׁבֶ֖/הָ לִֽ/יהוּדָ֑ה אַחֲרֵ֥י שְׁכַֽב הַ/מֶּ֖לֶךְ
    עִם אֲבֹתָֽי/ו־־־׃פ
translation:
  text: He rebuilt Elath and restored it to Judah after the king lay down with his
    fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'built Elath.' The Hebrew verb can be rendered simply 'built,' though
      the context may suggest rebuilding or fortifying an existing site.
    reason: lexical_alternative
  - marker: b
    text: '''Lay down with his fathers'' is a Hebrew idiom meaning that the king died.'
    reason: cultural_note
  - marker: c
    text: The Hebrew says simply 'the king'; the referent in context is Amaziah.
    reason: cross_reference
lexical_decisions:
- source_word: בָּנָה
  chosen: rebuilt
  alternatives:
  - built
  lexicon: HALOT
  rationale: The verb literally means 'built,' but in context Elath was an existing
    city/port being recovered for Judah, so 'rebuilt' communicates the likely sense
    of restoration without excessive paraphrase. The alternative 'built' remains possible
    and is preserved in a footnote.
- source_word: אֵילַת
  chosen: Elath
  alternatives:
  - Eilat
  lexicon: HALOT
  rationale: A place name; per philosophy, names are transliterated rather than translated.
    'Elath' follows common English biblical convention, while 'Eilat' reflects a more
    modern transliteration.
- source_word: וַיְשִׁבֶהָ
  chosen: restored it
  alternatives:
  - returned it
  - brought it back
  lexicon: HALOT
  rationale: From שוב, 'to return/bring back/restore.' With a city as object and Judah
    as indirect object, 'restored it to Judah' best captures political repossession
    in natural English.
- source_word: לִיהוּדָה
  chosen: to Judah
  alternatives:
  - for Judah
  lexicon: HALOT
  rationale: The preposition ל here is best rendered 'to,' indicating transfer or
    restoration to Judah's control.
- source_word: אַחֲרֵי שְׁכַב
  chosen: after ... lay down
  alternatives:
  - after ... slept
  - after the death of
  lexicon: HALOT
  rationale: שׁכב with 'with his fathers' is a standard idiom for death. 'Lay down
    with his fathers' preserves the Hebrew idiom more transparently than the interpretive
    'died,' while remaining understandable.
- source_word: הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - his father the king
  lexicon: HALOT
  rationale: The Hebrew text reads simply 'the king.' Although the referent is Amaziah,
    some English versions make the relationship explicit from context. The main text
    preserves the wording of the source more closely.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the conventional Hebrew burial/death idiom. 'Fathers' preserves
    the source expression; 'ancestors' is smoother but less formally transparent.
