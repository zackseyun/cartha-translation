id: 2KI.14.7
reference: 2 Kings 14:7
source:
  edition: WLC
  text: הוּא הִכָּ֨ה אֶת אֱד֤וֹם בְּ/גֵיא המלח עֲשֶׂ֣רֶת אֲלָפִ֔ים וְ/תָפַ֥שׂ אֶת
    הַ/סֶּ֖לַע בַּ/מִּלְחָמָ֑ה וַ/יִּקְרָ֤א אֶת שְׁמָ/הּ֙ יָקְתְאֵ֔ל עַ֖ד הַ/יּ֥וֹם
    הַ/זֶּֽה־־־־־׃פ
translation:
  text: He struck down ten thousand Edomites in the Valley of Salt, captured Sela
    in battle, and called its name Joktheel, to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sela can also be understood by its lexical sense, 'the rock' or 'the crag,'
      though here it is likely the place-name Sela.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - defeated
  - killed
  lexicon: HALOT
  rationale: The verb נכה commonly denotes striking, often with lethal or military
    force. In this battle context, 'struck down' preserves the martial sense without
    overcommitting beyond the text's wording.
- source_word: אֱדוֹם
  chosen: Edomites
  alternatives:
  - Edom
  lexicon: HALOT
  rationale: 'Although the text literally has ''Edom,'' English idiom with a casualty
    number naturally refers to the people: ''ten thousand Edomites.'' This makes explicit
    the implied human object of the military action.'
- source_word: בְּגֵיא הַמֶּלַח
  chosen: in the Valley of Salt
  alternatives:
  - in Salt Valley
  lexicon: HALOT
  rationale: A straightforward geographical rendering of the construct phrase; 'Valley
    of Salt' is the established and natural English equivalent.
- source_word: עֲשֶׂרֶת אֲלָפִים
  chosen: ten thousand
  lexicon: HALOT
  rationale: Standard cardinal number rendering.
- source_word: וְתָפַשׂ
  chosen: captured
  alternatives:
  - seized
  - took
  lexicon: HALOT
  rationale: In military context תפשׂ refers to taking possession of a place. 'Captured'
    best fits a fortified location in wartime.
- source_word: הַסֶּלַע
  chosen: Sela
  alternatives:
  - the crag
  - the rock
  lexicon: HALOT
  rationale: With the article and context, the term likely refers to the known place-name
    Sela rather than a generic rock. Since personal and place names are transliterated
    by project philosophy, 'Sela' is preferred; the lexical sense 'rock/crag' is preserved
    in a footnote.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in the war
  - in combat
  lexicon: HALOT
  rationale: This succinctly conveys the wartime circumstance of the capture in idiomatic
    English.
- source_word: וַיִּקְרָא אֶת שְׁמָהּ
  chosen: called its name
  alternatives:
  - named it
  - called it
  lexicon: HALOT
  rationale: This preserves the Hebrew naming formula more transparently than the
    smoother but less formal 'named it.'
- source_word: יָקְתְאֵל
  chosen: Joktheel
  lexicon: HALOT
  rationale: Place name transliterated by standard English convention.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew temporal formula indicating
    the name persisted to the writer's present.
