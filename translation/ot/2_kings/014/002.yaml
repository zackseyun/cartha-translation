id: 2KI.14.2
reference: 2 Kings 14:2
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/חָמֵ֤שׁ שָׁנָה֙ הָיָ֣ה בְ/מָלְכ֔/וֹ וְ/עֶשְׂרִ֤ים וָ/תֵ֨שַׁע֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ יהועדין מִן יְרוּשָׁלִָֽם־־׃
translation:
  text: He was twenty-five years old when he became king, and he reigned twenty-nine
    years in Jerusalem. His mother’s name was Jehoaddin, from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jehoaddin is traditionally rendered 'Jehoaddan' in many English translations.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  chosen: twenty-five years old
  alternatives:
  - a son of twenty-five years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A literal rendering ('son of twenty-five
    years') is unnatural in English; 'twenty-five years old' preserves the sense accurately.
- source_word: הָיָה בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - when he began to reign
  - at his becoming king
  lexicon: HALOT
  rationale: The phrase literally combines 'he was' with an infinitive/construct form
    of 'to reign/be king' plus suffix. In English regnal formulas are best rendered
    idiomatically as 'when he became king' or 'when he began to reign.' 'Became king'
    is clear, natural, and faithful to the accession formula.
- source_word: וְעֶשְׂרִים וָתֵשַׁע שָׁנָה
  chosen: twenty-nine years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus 'years' in a regnal-length formula.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: In regnal notices, מלך commonly denotes the exercise/duration of kingship.
    'He reigned' is the standard and most precise English equivalent here.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition with place name; simple geographic reference to
    the capital where he reigned.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This recurring formula in Kings is slightly formal in Hebrew. The chosen
    rendering preserves the content while using readable modern English.
- source_word: יהועדין
  chosen: Jehoaddin
  alternatives:
  - Jehoaddan
  lexicon: HALOT
  rationale: Personal names are transliterated. The consonantal form here supports
    'Jehoaddin'; however, English tradition often has 'Jehoaddan,' likely reflecting
    vocalization/traditional transmission. The main text follows the supplied Hebrew
    form, with the common traditional form preserved in a footnote.
- source_word: מִן יְרוּשָׁלָם
  chosen: from Jerusalem
  alternatives:
  - of Jerusalem
  lexicon: HALOT
  rationale: The preposition מן most basically means 'from.' In this maternal identification
    formula it likely indicates origin or association. 'From Jerusalem' is the most
    direct rendering; 'of Jerusalem' is possible but less precise to the preposition.
