theological_decisions:
- issue: Referent of אֲשֵׁרָה
  chosen_reading: Render as 'an Asherah' in the main text, preserving ambiguity between cult object and associated deity.
  alternative_readings:
  - an Asherah pole
  - Asherah (the goddess)
  rationale: The Hebrew term can denote either the goddess or her cult symbol. The context of making one suggests a cult object, but the text does not require the more specific 'pole.' Preserving ambiguity avoids over-interpretation.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Cultic verbs for idolatry
  chosen_reading: Differentiate 'bowed down' and 'served' rather than collapsing both into 'worshiped.'
  alternative_readings:
  - translate both with a single English worship term
  rationale: The Hebrew uses two distinct verbs describing posture and service. Preserving both maintains the text's rhetorical force and lexical transparency.
  doctrine_reference: Translation philosophy §1, §5
