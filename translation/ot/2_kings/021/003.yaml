id: 2KI.21.3
reference: 2 Kings 21:3
source:
  edition: WLC
  text: וַ/יָּ֗שָׁב וַ/יִּ֨בֶן֙ אֶת הַ/בָּמ֔וֹת אֲשֶׁ֥ר אִבַּ֖ד חִזְקִיָּ֣הוּ אָבִ֑י/ו וַ/יָּ֨קֶם מִזְבְּחֹ֜ת לַ/בַּ֗עַל וַ/יַּ֤עַשׂ אֲשֵׁרָה֙ כַּ/אֲשֶׁ֣ר עָשָׂ֗ה אַחְאָב֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל וַ/יִּשְׁתַּ֨חוּ֙ לְ/כָל צְבָ֣א הַ/שָּׁמַ֔יִם וַֽ/יַּעֲבֹ֖ד אֹתָֽ/ם־־׃
translation:
  text: And he rebuilt the high places that Hezekiah his father had destroyed, and he erected altars to Baal, and made an Asherah, as Ahab king of Israel had done, and he bowed down to all the host of heaven and served them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an Asherah pole'; the Hebrew אֲשֵׁרָה can refer to a cult object associated with Asherah, and in some contexts may also evoke the goddess herself.
    reason: lexical_alternative
  - marker: b
    text: '''The host of heaven'' refers to the sun, moon, stars, or heavenly powers regarded as objects of worship.'
    reason: cultural_note
  - marker: c
    text: Or 'as Ahab king of Israel had made'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּשָׁב וַיִּבֶן
  chosen: he rebuilt
  alternatives:
  - he returned and built
  - he built again
  lexicon: HALOT
  rationale: The sequence of שוב + בנה idiomatically conveys resumption/restoration of what had previously existed. 'Rebuilt' captures the combined sense in natural English without unnecessary paraphrase.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines on the high places
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for illicit or unauthorized worship sites, often elevated cultic locations. 'High places' is the established and accurate rendering.
- source_word: אִבַּד
  chosen: had destroyed
  alternatives:
  - had wiped out
  - had done away with
  lexicon: HALOT
  rationale: The verb here refers to Hezekiah's removal/destruction of cultic sites. 'Had destroyed' is clear, idiomatic, and fits the historical context.
- source_word: וַיָּקֶם מִזְבְּחֹת
  chosen: he erected altars
  alternatives:
  - he set up altars
  - he raised up altars
  lexicon: HALOT
  rationale: קום in the hiphil commonly means to set up or establish. 'Erected altars' is natural English and preserves the deliberate cultic action.
- source_word: לַבַּעַל
  chosen: to Baal
  alternatives:
  - for Baal
  lexicon: HALOT
  rationale: The preposition marks dedication. 'To Baal' is the most straightforward English rendering for altars dedicated to that deity.
- source_word: אֲשֵׁרָה
  chosen: an Asherah
  alternatives:
  - an Asherah pole
  - Asherah
  lexicon: HALOT
  rationale: The Hebrew term may denote either the goddess Asherah or a cultic object associated with her. Rendering it as 'an Asherah' preserves the ambiguity better than specifying 'pole' in the main text.
- source_word: כַּאֲשֶׁר עָשָׂה אַחְאָב
  chosen: as Ahab king of Israel had made
  alternatives:
  - as Ahab king of Israel had done
  lexicon: HALOT
  rationale: Because the immediate object is אֲשֵׁרָה, 'had made' keeps the verbal parallel with Manasseh's action and reflects the Hebrew more closely than the broader 'had done'.
- source_word: וַיִּשְׁתַּחוּ
  chosen: he bowed down
  alternatives:
  - he worshiped
  - he prostrated himself
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'He bowed down' preserves the physical act, while the following verb 'served' completes the cultic sense.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  chosen: to all the host of heaven
  alternatives:
  - to all the heavenly host
  - to all the army of heaven
  lexicon: HALOT
  rationale: This phrase refers to the celestial bodies or heavenly powers worshiped as divine beings. 'Host of heaven' is the standard biblical expression and preserves the idiom.
- source_word: וַיַּעֲבֹד אֹתָם
  chosen: and served them
  alternatives:
  - and worshiped them
  lexicon: HALOT
  rationale: עבד in cultic contexts means to serve in worship. 'Served them' preserves the lexical distinction from the preceding 'bowed down' while still conveying idolatrous devotion.
