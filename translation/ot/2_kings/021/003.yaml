  category: awkward_english
  tier: 1
  from: as Ahab king of Israel had made
  to: as Ahab king of Israel had done
  rationale: The current rendering uses 'had made' to parallel the Hebrew verb עָשָׂה with the earlier וַיַּעַשׂ ('made'). While this is a valid formal correspondence, in English it leaves the verb 'made' without an object, which can sound slightly incomplete ('had made [what]?'). Using 'had done' is more idiomatic for this type of comparative clause, referring to the entire preceding action. This is the rendering chosen by most major modern translations (e.g., ESV, NIV, NASB) and would improve the naturalness of the English without any loss of meaning.
