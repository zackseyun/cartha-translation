id: 2KI.21.24
reference: 2 Kings 21:24
source:
  edition: WLC
  text: וַ/יַּךְ֙ עַם הָ/אָ֔רֶץ אֵ֥ת כָּל הַ/קֹּשְׁרִ֖ים עַל הַ/מֶּ֣לֶךְ אָמ֑וֹן וַ/יַּמְלִ֧יכוּ
    עַם הָ/אָ֛רֶץ אֶת יֹאשִׁיָּ֥הוּ בְנ֖/וֹ תַּחְתָּֽי/ו־־־־־׃
translation:
  text: But the people of the land struck down all those who had conspired against
    King Amon, and the people of the land made Josiah his son king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all the conspirators against King Amon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: HALOT
  rationale: The verb נכה in this context refers to a lethal attack on the conspirators.
    'Struck down' is natural modern English and preserves the violent action without
    archaic tone; 'killed' is possible but slightly less vivid.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the country
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew expression, which can
    denote the populace or landed people as a socio-political group. Here the phrase
    is repeated and should remain consistent in English.
- source_word: כָּל הַקֹּשְׁרִים
  chosen: all those who had conspired
  alternatives:
  - all the conspirators
  - all those who plotted
  lexicon: HALOT
  rationale: The participle from קשר denotes persons engaged in conspiracy. 'Those
    who had conspired' makes explicit the verbal force and fits the narrative context
    of assassination and retaliation.
- source_word: עַל הַמֶּלֶךְ אָמוֹן
  chosen: against King Amon
  alternatives:
  - against the king, Amon
  - concerning King Amon
  lexicon: HALOT
  rationale: With קשר and עַל, the sense is hostile conspiracy against someone. 'Against
    King Amon' is the clearest idiomatic English rendering.
- source_word: וַיַּמְלִיכוּ
  chosen: made ... king
  alternatives:
  - crowned
  - caused ... to reign
  lexicon: HALOT
  rationale: The hiphil of מלך means to make someone king or cause him to reign. 'Made
    Josiah ... king' is both accurate and readable; 'crowned' would add a ceremonial
    nuance not explicit in the Hebrew.
- source_word: יֹאשִׁיָּהוּ בְנוֹ
  chosen: Josiah his son
  alternatives:
  - his son Josiah
  lexicon: HALOT
  rationale: Both English orders are possible. 'Josiah his son' follows the Hebrew
    sequence more closely while remaining natural.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - in place of him
  lexicon: HALOT
  rationale: This prepositional expression indicates succession after another. 'In
    his place' is idiomatic English for royal succession.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  - Then
  lexicon: Hebrew waw-consecutive usage
  rationale: Although waw often simply means 'and,' here 'But' appropriately marks
    the contrast with the previous verse, where Amon was assassinated by his servants.
    This is a discourse-level choice consistent with optimal equivalence.
