id: 2KI.21.23
reference: 2 Kings 21:23
source:
  edition: WLC
  text: וַ/יִּקְשְׁר֥וּ עַבְדֵֽי אָמ֖וֹן עָלָ֑י/ו וַ/יָּמִ֥יתוּ אֶת הַ/מֶּ֖לֶךְ בְּ/בֵיתֽ/וֹ־־׃
translation:
  text: And Amon’s servants conspired against him and put the king to death in his
    own house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “plotted against him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְשְׁרוּ
  chosen: conspired
  alternatives:
  - plotted
  - formed a conspiracy
  lexicon: HALOT
  rationale: קשר in this political context commonly means to conspire or form a conspiracy,
    not merely to bind. 'Conspired' is concise and idiomatic in English for a court
    plot.
- source_word: עַבְדֵי אָמוֹן
  chosen: Amon’s servants
  alternatives:
  - the servants of Amon
  - Amon’s officials
  lexicon: HALOT
  rationale: עבדים here refers to royal attendants/servants in the court. 'Amon’s
    servants' preserves the construct relationship and remains natural English; 'officials'
    is possible but slightly more interpretive.
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - against Amon
  lexicon: HALOT
  rationale: The preposition על with conspiracy language indicates hostile action
    directed against the king. 'Against him' is the natural English rendering, with
    the antecedent clearly Amon from context.
- source_word: וַיָּמִיתוּ
  chosen: put ... to death
  alternatives:
  - killed
  - caused to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Put to death' preserves that causative
    force more clearly than the simpler 'killed,' while still reading naturally.
- source_word: אֶת־הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - King Amon
  lexicon: HALOT
  rationale: The Hebrew uses the title with the object marker, not the personal name.
    'The king' preserves the formal designation used in the narrative.
- source_word: בְּבֵיתוֹ
  chosen: in his own house
  alternatives:
  - in his house
  - at his house
  lexicon: HALOT
  rationale: בית with pronominal suffix means 'his house.' Adding 'own' is a light
    English intensifier that reflects the personal suffix and the shocking intimacy
    of the assassination without overtranslating.
