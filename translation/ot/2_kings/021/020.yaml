id: 2KI.21.20
reference: 2 Kings 21:20
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כַּ/אֲשֶׁ֥ר עָשָׂ֖ה מְנַשֶּׁ֥ה אָבִֽי/ו׃
translation:
  text: He did what was evil in the sight of the LORD, just as Manasseh his father
    had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the eyes of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: The waw-consecutive with עשה advances the narrative. English normally
    omits the initial 'and' for natural style while preserving the simple past sense.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: The idiom עשה הרע is conventionally and accurately rendered 'do what
    is evil' or 'do evil.' 'What was evil' brings the Hebrew article into idiomatic
    English without sounding wooden.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom meaning according to Yahweh's
    assessment. 'In the sight of the LORD' is clear, natural, and preserves the metaphor.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the father's conduct. 'Just as' clearly conveys
    the comparative force in natural English.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect is appropriate because Manasseh's actions are prior
    to the son's present narrative action. This clarifies temporal sequence without
    adding content.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward possessive noun with 3ms suffix; no expansion beyond
    the Hebrew is needed.
