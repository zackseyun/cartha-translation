id: 2KI.21.11
reference: 2 Kings 21:11
source:
  edition: WLC
  text: יַעַן֩ אֲשֶׁ֨ר עָשָׂ֜ה מְנַשֶּׁ֤ה מֶֽלֶךְ יְהוּדָה֙ הַ/תֹּעֵב֣וֹת הָ/אֵ֔לֶּה
    הֵרַ֕ע מִ/כֹּ֛ל אֲשֶׁר עָשׂ֥וּ הָ/אֱמֹרִ֖י אֲשֶׁ֣ר לְ/פָנָ֑י/ו וַ/יַּחֲטִ֥א גַֽם
    אֶת יְהוּדָ֖ה בְּ/גִלּוּלָֽי/ו־־־־׃פ
translation:
  text: Because Manasseh king of Judah has done these abominations, doing more evil
    than all the Amorites who were before him did, and has also caused Judah to sin
    with his idols,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלּוּלִים is a contemptuous term for idols; alternatively, 'filthy
      idols' or more vividly 'dung-idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Because that
  lexicon: HALOT
  rationale: Introduces the ground or reason for the coming judgment statement in
    the next verse. 'Because' is natural modern English and preserves the causal force.
- source_word: עָשָׂה
  chosen: has done
  alternatives:
  - did
  - made
  lexicon: HALOT
  rationale: The qatal verb reports completed action with present relevance in the
    prophetic indictment. 'Has done' fits the English accusation style and links naturally
    with the following perfect-like clauses.
- source_word: מְנַשֶּׁה מֶלֶךְ יְהוּדָה
  chosen: Manasseh king of Judah
  alternatives:
  - Manasseh, the king of Judah
  rationale: Standard transliteration of the personal name; appositional royal title
    retained straightforwardly.
- source_word: הַתֹּעֵבוֹת הָאֵלֶּה
  chosen: these abominations
  alternatives:
  - these detestable things
  - these abhorrent acts
  lexicon: HALOT
  rationale: תּוֹעֵבָה commonly denotes something detestable, especially in idolatrous
    or morally abhorrent contexts. 'Abominations' preserves the covenantal and prophetic
    weight of the term.
- source_word: הֵרַע
  chosen: doing more evil
  alternatives:
  - has done worse
  - has acted more wickedly
  lexicon: HALOT
  rationale: The Hiphil here expresses acting wickedly or doing evil. Rendering it
    with a participial sense in English ('doing more evil') smooths the comparison
    with what follows while preserving the verbal force.
- source_word: מִכֹּל אֲשֶׁר עָשׂוּ
  chosen: than all ... did
  alternatives:
  - more than all that ... had done
  - worse than all ... did
  lexicon: HALOT
  rationale: The comparative מִן with כֹּל sets Manasseh's evil above that of all
    predecessors named here. English requires an explicit comparative construction.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Though morphologically singular in form, this ethnonym often functions
    collectively. 'The Amorites' is idiomatic English and matches the sense of a prior
    people group inhabiting the land.
- source_word: אֲשֶׁר לְפָנָיו
  chosen: who were before him
  alternatives:
  - who were before him in the land
  - who preceded him
  lexicon: HALOT
  rationale: Keeps the temporal-precedent sense without over-expanding. The referent
    is the earlier inhabitants/peoples before Manasseh.
- source_word: וַיַּחֲטִא גַם אֶת יְהוּדָה
  chosen: and has also caused Judah to sin
  alternatives:
  - and also led Judah into sin
  - and also made Judah sin
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: not merely that Judah sinned, but that
    Manasseh caused or led Judah to sin. ''Caused Judah to sin'' preserves that force
    most directly.'
- source_word: בְּגִלּוּלָיו
  chosen: with his idols
  alternatives:
  - by his idols
  - through his idols
  - with his filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols. 'Idols' is the clearest
    main-text rendering; the pejorative nuance can be preserved in a footnote as a
    lexical alternative. The preposition ב here is rendered instrumentally/associatively
    as 'with.'
