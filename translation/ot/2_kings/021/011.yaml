theological_decisions:
- issue: Pejorative force of גִּלּוּלִים
  chosen_reading: idols
  alternative_readings:
  - filthy idols
  - dung-idols
  rationale: The Hebrew term is contemptuous, but a highly colloquial or overly vivid
    English equivalent in the main text could sound interpretively inflated. 'Idols'
    is clear and readable, while the stronger derogatory nuance is preserved in a
    footnote.
  doctrine_reference: Translation philosophy §§5–6
