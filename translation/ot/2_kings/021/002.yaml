id: 2KI.21.2
reference: 2 Kings 21:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/תֽוֹעֲבֹת֙ הַ/גּוֹיִ֔ם אֲשֶׁר֙
    הוֹרִ֣ישׁ יְהוָ֔ה מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: He did what was evil in the sight of the LORD, according to the abominations
    of the nations whom the LORD had driven out before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the detestable practices of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; many English versions render this more idiomatically
      as 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה introduces the narrative action. English normally omits
    the initial conjunction in smooth narrative, so 'He did' best reflects the clause
    in readable modern English.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: The idiom עשה הרע commonly means 'do what is evil' rather than the more
    wooden 'do the evil.' This preserves the established Hebrew evaluative formula
    while remaining natural in English.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for divine evaluation. 'In the sight
    of the LORD' is clear, idiomatic English and preserves the metaphor of divine
    perception.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with the project's default treatment of the Tetragrammaton.
- source_word: כְּתוֹעֲבֹת
  chosen: according to the abominations
  alternatives:
  - like the abominations
  - in accordance with the detestable practices
  lexicon: HALOT
  rationale: תועבות denotes abominable or detestable practices, especially in covenantal
    and cultic contexts. 'Abominations' preserves the moral and theological weight
    of the Hebrew; 'according to' reflects כְ in a comparative/conforming sense.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: In this historical context גוים refers to the non-Israelite peoples of
    the land. 'The nations' is the most contextually appropriate and least misleading
    rendering.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: The relative pronoun refers to people, so 'whom' is the most precise
    English equivalent.
- source_word: הוֹרִישׁ
  chosen: had driven out
  alternatives:
  - dispossessed
  - expelled
  lexicon: HALOT
  rationale: The hiphil of ירש here means to cause to lose possession, i.e., to dispossess/drive
    out. 'Had driven out' is natural English and fits the historical context of the
    nations removed from before Israel.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: The phrase מִפְּנֵי often means 'from before' or 'from the presence of.'
    In English, 'before' after 'driven out' communicates the sense succinctly and
    idiomatically.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' In keeping with the project's
    gender-accurate principle, this is retained rather than flattened to 'Israelites,'
    though the latter is a viable idiomatic alternative.
