id: 2KI.21.1
reference: 2 Kings 21:1
source:
  edition: WLC
  text: בֶּן שְׁתֵּ֨ים עֶשְׂרֵ֤ה שָׁנָה֙ מְנַשֶּׁ֣ה בְ/מָלְכ֔/וֹ וַ/חֲמִשִּׁ֤ים וְ/חָמֵשׁ֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֥ם אִמּ֖/וֹ חֶפְצִי בָֽהּ־־׃
translation:
  text: Manasseh was twelve years old when he began to reign, and he reigned fifty-five
    years in Jerusalem. His mother’s name was Hephzibah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hephzibah means approximately, “My delight is in her.”
    reason: cultural_note
lexical_decisions:
- source_word: בֶּן שְׁתֵּים עֶשְׂרֵה שָׁנָה
  chosen: was twelve years old
  alternatives:
  - was a son of twelve years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A literal rendering ('son of twelve
    years') is unnatural in modern English; 'was twelve years old' preserves the sense
    accurately.
- source_word: בְמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  lexicon: HALOT
  rationale: The preposition ב plus infinitive/verb form here marks the time at which
    his reign began. 'When he began to reign' is idiomatic English and matches the
    regnal formula.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: וַחֲמִשִּׁים וְחָמֵשׁ שָׁנָה
  chosen: fifty-five years
  alternatives:
  - fifty and five years
  lexicon: HALOT
  rationale: Modern English combines the numerals as 'fifty-five.' The more literal
    coordinate form is preserved in sense but not in archaic English style.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb מלך in this regnal context is best rendered 'reigned,' the conventional
    and precise English equivalent.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  rationale: Straightforward locative use of the preposition ב with the place name.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This preserves the Hebrew notice formula while using natural modern English
    syntax.
- source_word: חֶפְצִי בָהּ
  chosen: Hephzibah
  alternatives:
  - Hepzibah
  rationale: The personal name is transliterated according to standard English biblical
    convention. The form reflects the Hebrew name meaning 'my delight is in her,'
    but names are transliterated rather than translated.
