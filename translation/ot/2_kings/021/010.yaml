id: 2KI.21.10
reference: 2 Kings 21:10
source:
  edition: WLC
  text: וַ/יְדַבֵּ֧ר יְהוָ֛ה בְּ/יַד עֲבָדָ֥י/ו הַ/נְּבִיאִ֖ים לֵ/אמֹֽר־׃
translation:
  text: And Yahweh spoke by the hand of his servants the prophets, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of,'' an idiom meaning ''through'' or ''by means of.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' 'Spoke' preserves the narrative verbal force and works naturally with the following infinitive 'saying.' 'Said' is possible but less directly reflects the Hebrew verb choice here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by
  lexicon: HALOT
  rationale: The idiom בְּיַד literally means 'by the hand of' and often denotes agency or instrumentality. Retaining the idiom in English is clear enough here and preserves the Hebrew texture better than flattening it to 'through,' while still communicating mediated speech.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in prophetic service to God the emphasis is on commissioned service rather than bonded-status salience. 'Servants' is therefore the best contextual rendering under the project's context-dependent policy.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: 'Straightforward rendering of the definite plural noun נביאים. Appositionally identifies which servants are in view: namely, the prophets.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct introducing direct discourse is idiomatically rendered 'saying' in English narrative. This preserves the formal transition into the following divine speech in the next verse.
