id: 2KI.21.9
reference: 2 Kings 21:9
source:
  edition: WLC
  text: וְ/לֹ֖א שָׁמֵ֑עוּ וַ/יַּתְעֵ֤/ם מְנַשֶּׁה֙ לַ/עֲשׂ֣וֹת אֶת הָ/רָ֔ע מִן הַ֨/גּוֹיִ֔ם
    אֲשֶׁר֙ הִשְׁמִ֣יד יְהוָ֔ה מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: But they did not listen, and Manasseh led them astray to do more evil than
    the nations that the LORD had destroyed before the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to do evil more than the nations.' The Hebrew comparison is expressed
      with 'from/than the nations.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמֵעוּ
  chosen: did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: HALOT
  rationale: שׁמע commonly covers hearing with responsive obedience. In this context
    of refusing prophetic/covenantal warning, 'listen' preserves both auditory and
    volitional force better than bare 'hear,' while avoiding over-specifying as 'obey'
    in the main text.
- source_word: וַיַּתְעֵם
  chosen: led them astray
  alternatives:
  - caused them to err
  - misled them
  lexicon: HALOT
  rationale: From תעה, the causative sense is that Manasseh caused the people to wander
    morally/spiritually. 'Led them astray' is idiomatic modern English and preserves
    the active causation.
- source_word: לַעֲשׂוֹת אֶת הָרָע
  chosen: to do more evil
  alternatives:
  - to do evil
  - to act wickedly
  lexicon: HALOT
  rationale: 'The phrase means ''to do the evil.'' Because it is followed by מִן with
    comparison to the nations, English needs the comparative sense made explicit:
    Manasseh led them to do evil beyond that of the nations. ''More evil'' brings
    out the syntax naturally.'
- source_word: מִן הַגּוֹיִם
  chosen: than the nations
  alternatives:
  - more than the nations
  - than the Gentiles
  lexicon: HALOT
  rationale: מִן here is comparative, not separative. גּוֹיִם in this historical context
    refers to the surrounding nations/peoples, not 'Gentiles' as a later Jewish-Christian
    contrast term.
- source_word: הִשְׁמִיד
  chosen: had destroyed
  alternatives:
  - destroyed
  - wiped out
  lexicon: HALOT
  rationale: The verb denotes destruction/extermination. English past perfect fits
    the relative clause referring to an action prior to Manasseh's reign. 'Destroyed'
    is strong without becoming colloquial.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - from the presence of
  lexicon: HALOT
  rationale: In this conquest context, the idiom means the nations were removed from
    before Israel, i.e., before them/in their presence. 'Before' is concise and idiomatic.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Following the gender-accurate
    principle, the main text preserves that form rather than flattening it to 'Israelites,'
    though the latter is a viable idiomatic alternative.
