theological_decisions:
- issue: Rendering of pejorative idol term גִּלֻּלִים
  chosen_reading: idols
  alternative_readings:
  - dung-idols
  - detestable idols
  rationale: The Hebrew term is contemptuous, but the verse's main point is Amon's
    continuation of his father's idolatry. 'Idols' communicates the referent clearly
    in readable modern English; the pejorative force can be noted in a footnote rather
    than overloading the main text.
  doctrine_reference: Translation philosophy §6; §5 consistency of key terms
