id: 2KI.21.21
reference: 2 Kings 21:21
source:
  edition: WLC
  text: וַ/יֵּ֕לֶךְ בְּ/כָל הַ/דֶּ֖רֶךְ אֲשֶׁר הָלַ֣ךְ אָבִ֑י/ו וַֽ/יַּעֲבֹ֗ד אֶת
    הַ/גִּלֻּלִים֙ אֲשֶׁ֣ר עָבַ֣ד אָבִ֔י/ו וַ/יִּשְׁתַּ֖חוּ לָ/הֶֽם־־־׃
translation:
  text: He walked in all the way that his father had walked, and he served the idols
    that his father had served, and bowed down to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלֻּלִים is a contemptuous term for idols; alternatively, 'dung-idols'
      or 'detestable idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: He walked
  alternatives:
  - He went
  - He followed
  lexicon: HALOT
  rationale: הלך literally means 'go/walk.' In the idiom with 'in all the way,' 'walked'
    preserves the metaphor of conduct and matches common biblical usage without flattening
    it to mere movement.
- source_word: בְּכָל הַדֶּרֶךְ אֲשֶׁר
  chosen: in all the way that
  alternatives:
  - in every way that
  - in the whole path that
  lexicon: HALOT
  rationale: The phrase is idiomatic for manner of life or conduct. 'In all the way
    that' keeps the singular 'way' of the Hebrew while remaining natural in English.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward filial reference; repeated for emphasis and retained
    both times as in the Hebrew.
- source_word: וַיַּעֲבֹד
  chosen: he served
  alternatives:
  - he worshiped
  lexicon: HALOT
  rationale: עבד is broadly 'serve.' Here it refers to cultic devotion, but 'served'
    preserves the lexical distinction from the following verb for prostration/bowing.
- source_word: הַגִּלֻּלִים
  chosen: the idols
  alternatives:
  - the images
  - the dung-idols
  lexicon: HALOT
  rationale: גִּלֻּלִים is a strongly pejorative term for idols. 'Idols' is the clearest
    standard English rendering; the more literal pejorative nuance is not easily carried
    in main text without awkwardness.
- source_word: וַיִּשְׁתַּחוּ לָהֶם
  chosen: and bowed down to them
  alternatives:
  - and worshiped them
  - and prostrated himself before them
  lexicon: HALOT
  rationale: The verb denotes bowing/prostration in reverence. 'Bowed down to them'
    preserves the physical act and avoids collapsing it into the previous 'served.'
