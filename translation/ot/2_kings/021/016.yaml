id: 2KI.21.16
reference: 2 Kings 21:16
source:
  edition: WLC
  text: וְ/גַם֩ דָּ֨ם נָקִ֜י שָׁפַ֤ךְ מְנַשֶּׁה֙ הַרְבֵּ֣ה מְאֹ֔ד עַ֛ד אֲשֶׁר מִלֵּ֥א אֶת יְרוּשָׁלִַ֖ם פֶּ֣ה לָ/פֶ֑ה לְ/בַ֤ד מֵֽ/חַטָּאת/וֹ֙ אֲשֶׁ֣ר הֶחֱטִ֣יא אֶת יְהוּדָ֔ה לַ/עֲשׂ֥וֹת הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה־־־׃
translation:
  text: Moreover, Manasseh shed very much innocent blood, until he had filled Jerusalem from one end to the other, besides his sin by which he caused Judah to sin, to do what was evil in the eyes of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'filled Jerusalem mouth to mouth,' an idiom meaning throughout the city, from one end to the other.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Moreover
  alternatives:
  - Also
  - And also
  - Furthermore
  lexicon: HALOT
  rationale: Introduces an additional charge beyond the preceding offenses. 'Moreover' preserves the additive and emphatic force in natural English.
- source_word: דָּם נָקִי
  chosen: innocent blood
  alternatives:
  - the blood of innocents
  - blood of the innocent
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for bloodshed involving those not guilty of a capital offense. 'Innocent blood' is concise and idiomatic in English and preserves the legal-moral force.
- source_word: שָׁפַךְ
  chosen: shed
  alternatives:
  - poured out
  - spilled
  lexicon: HALOT
  rationale: The common idiom for unlawful killing in connection with blood is 'shed blood.' This is both formally close and idiomatic.
- source_word: הַרְבֵּה מְאֹד
  chosen: very much
  alternatives:
  - in great abundance
  - exceedingly much
  - a great deal
  lexicon: HALOT
  rationale: The doubled intensification stresses the scale of the bloodshed. 'Very much' preserves the emphasis without sounding wooden.
- source_word: עַד אֲשֶׁר מִלֵּא אֶת יְרוּשָׁלִַם פֶּה לָפֶה
  chosen: until he had filled Jerusalem from one end to the other
  alternatives:
  - until he had filled Jerusalem from mouth to mouth
  - until he had filled Jerusalem from end to end
  lexicon: HALOT
  rationale: The idiom literally uses 'mouth to mouth' but means throughout the whole extent. 'From one end to the other' communicates the idiomatic sense clearly in modern English.
- source_word: לְבַד מֵחַטָּאתוֹ
  chosen: besides his sin
  alternatives:
  - apart from his sin
  - in addition to his sin
  lexicon: HALOT
  rationale: Marks that this bloodshed was in addition to the previously described offense. Singular 'sin' is retained because the Hebrew is singular and can summarize his culpable course.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יְהוּדָה
  chosen: by which he caused Judah to sin
  alternatives:
  - with which he led Judah into sin
  - whereby he made Judah sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative. 'Caused Judah to sin' preserves that force more directly than the softer 'led astray,' while remaining natural English.
- source_word: לַעֲשׂוֹת הָרַע
  chosen: doing what was evil
  alternatives:
  - to do evil
  - to do what was bad
  lexicon: HALOT
  rationale: This infinitive phrase expresses the content/result of Judah's sin. 'Doing what was evil' is idiomatic and preserves the moral evaluation.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the eyes of the LORD
  alternatives:
  - in the sight of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: A common Hebrew evaluative idiom. 'In the eyes of' is transparent and preserves the metaphor. The divine name follows project policy as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
