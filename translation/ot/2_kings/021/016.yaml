  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Strength of Manasseh's culpability in הֶחֱטִיא
  chosen_reading: caused Judah to sin
  alternative_readings:
  - led Judah into sin
  - made Judah sin
  rationale: The causative stem supports a strong rendering. This does not impose a doctrinal claim beyond the Hebrew syntax; it simply preserves the king's active role in Judah's wrongdoing.
