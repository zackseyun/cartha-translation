theological_decisions:
- issue: Nature of the judgment metaphor drawn from Samaria and Ahab
  chosen_reading: The verse depicts Jerusalem being judged by the same standard used
    in the destruction of Samaria and Ahab's house.
  alternative_readings:
  - The line and plumb line could be read as instruments of restoration rather than
    destruction in other contexts.
  rationale: In some biblical passages measuring imagery can signal rebuilding or
    restoration, but here the immediate context is condemnation, and the comparison
    to wiping and overturning a dish makes the destructive sense explicit.
