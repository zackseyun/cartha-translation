id: 2KI.21.13
reference: 2 Kings 21:13
source:
  edition: WLC
  text: וְ/נָטִ֣יתִי עַל יְרוּשָׁלִַ֗ם אֵ֚ת קָ֣ו שֹֽׁמְר֔וֹן וְ/אֶת מִשְׁקֹ֖לֶת בֵּ֣ית
    אַחְאָ֑ב וּ/מָחִ֨יתִי אֶת יְרוּשָׁלִַ֜ם כַּֽ/אֲשֶׁר יִמְחֶ֤ה אֶת הַ/צַּלַּ֨חַת֙
    מָחָ֔ה וְ/הָפַ֖ךְ עַל פָּנֶֽי/הָ־־־־־־׃
translation:
  text: And I will stretch over Jerusalem the measuring line of Samaria and the plumb
    line of the house of Ahab, and I will wipe Jerusalem as one wipes a dish—wiping
    it and turning it upside down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'builder’s line of Samaria' and 'plummet of the house of Ahab.' The imagery
      is of measuring Jerusalem for judgment by the same standard used against them.
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' instead of 'dish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָטִיתִי
  chosen: And I will stretch over
  alternatives:
  - And I will extend over
  - And I will apply to
  lexicon: HALOT
  rationale: The verb נָטָה literally means to stretch out/extend. With קָו ('measuring
    line') and עַל ('over/upon'), the image is of stretching a measuring line over
    Jerusalem for judgment. 'Stretch over' preserves the concrete metaphor better
    than a more interpretive 'apply to'.
- source_word: קָו
  chosen: measuring line
  alternatives:
  - line
  - builder's line
  lexicon: HALOT
  rationale: In this judgment context, קָו refers to a measuring line used in surveying/building
    or demolition assessment. 'Measuring line' makes the instrument clear in modern
    English while preserving the metaphor.
- source_word: מִשְׁקֹלֶת
  chosen: plumb line
  alternatives:
  - plummet
  - level
  lexicon: HALOT
  rationale: מִשְׁקֹלֶת denotes a weighted measuring implement, commonly rendered
    'plumb line.' This pairs naturally with 'measuring line' and preserves the construction/judgment
    imagery.
- source_word: בֵּית אַחְאָב
  chosen: the house of Ahab
  lexicon: HALOT
  rationale: Standard dynastic expression; 'house' here means Ahab's royal house or
    dynasty. The literal rendering is transparent and idiomatic enough in English.
- source_word: וּמָחִיתִי
  chosen: and I will wipe
  alternatives:
  - and I will wipe out
  - and I will blot out
  lexicon: HALOT
  rationale: The following simile with wiping a dish controls the sense. Although
    the verb can mean 'wipe out' or 'blot out' in judgment contexts, 'wipe' best preserves
    the wordplay and concrete image here.
- source_word: כַּאֲשֶׁר יִמְחֶה אֶת הַצַּלַּחַת
  chosen: as one wipes a dish
  alternatives:
  - as a man wipes a dish
  - as someone wipes a bowl
  lexicon: HALOT
  rationale: The Hebrew uses an indefinite 3ms verbal form for a general comparison.
    'As one wipes a dish' is natural English and avoids over-specifying the subject.
    צַלַּחַת is a dish/bowl/plate; 'dish' is broad and idiomatic.
- source_word: מָחָה
  chosen: wiping it
  alternatives:
  - after wiping it
  - when he has wiped it
  lexicon: HALOT
  rationale: The infinitive absolute/finite-verb-like repetition intensifies and specifies
    the action. 'Wiping it' preserves the emphatic repetition without awkwardness.
- source_word: וְהָפַךְ עַל פָּנֶיהָ
  chosen: and turning it upside down
  alternatives:
  - and overturning it on its face
  - and turning it over on its face
  lexicon: HALOT
  rationale: Literally 'and turning it upon its face.' For a dish, the idiomatic English
    equivalent is 'turning it upside down,' which conveys the image clearly while
    remaining faithful to the object.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
