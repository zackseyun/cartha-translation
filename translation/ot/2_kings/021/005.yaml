id: 2KI.21.5
reference: 2 Kings 21:5
source:
  edition: WLC
  text: וַ/יִּ֥בֶן מִזְבְּח֖וֹת לְ/כָל צְבָ֣א הַ/שָּׁמָ֑יִם בִּ/שְׁתֵּ֖י חַצְר֥וֹת
    בֵּית יְהוָֽה־־׃
translation:
  text: He built altars for all the host of heaven in the two courts of the house
    of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the whole heavenly host.' The Hebrew idiom 'host of heaven' refers
      to the celestial host and in this context likely to heavenly bodies or powers
      venerated in astral worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  - Then he built
  lexicon: HALOT
  rationale: Qal wayyiqtol of בנה, straightforward past narrative verb. English omits
    the conjunction for natural style while preserving the sequential narrative sense.
- source_word: מִזְבְּחוֹת
  chosen: altars
  lexicon: HALOT
  rationale: Common plural noun meaning 'altars'; no contextual reason to soften or
    expand.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  chosen: for all the host of heaven
  alternatives:
  - for the whole heavenly host
  - for all the stars of heaven
  lexicon: HALOT
  rationale: צָבָא with 'heaven' is a standard expression for the celestial host,
    often referring to astral or heavenly powers worshiped by idolaters. 'Host of
    heaven' preserves the idiom and its religious significance better than a reduction
    to merely 'stars'.
- source_word: בִּשְׁתֵּי
  chosen: in the two
  alternatives:
  - in both
  lexicon: HALOT
  rationale: The dual-related numeral explicitly indicates two courts. 'The two' is
    slightly more formal and keeps the concrete count visible.
- source_word: חַצְרוֹת
  chosen: courts
  alternatives:
  - courtyards
  lexicon: HALOT
  rationale: Refers to temple courts. 'Courts' is the standard concise rendering in
    temple contexts; 'courtyards' is possible but less idiomatic in English Bible
    style.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is a standard designation for the temple. 'The house of the
    LORD' preserves the Hebrew expression closely. Per doctrine, יְהוָה is rendered
    'the LORD'.
