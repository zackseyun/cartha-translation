id: 2KI.21.18
reference: 2 Kings 21:18
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֤ב מְנַשֶּׁה֙ עִם אֲבֹתָ֔י/ו וַ/יִּקָּבֵ֥ר בְּ/גַן בֵּית֖/וֹ בְּ/גַן
    עֻזָּ֑א וַ/יִּמְלֹ֛ךְ אָמ֥וֹן בְּנ֖/וֹ תַּחְתָּֽי/ו־־־׃פ
translation:
  text: And Manasseh lay down with his fathers and was buried in the garden of his
    house, in the garden of Uzza. And Amon his son became king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'slept with his fathers,' preserving the conventional Hebrew royal-death
      idiom more literally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: lay down
  alternatives:
  - slept
  - died
  lexicon: HALOT
  rationale: The verb שׁכב literally means 'lay down' and in royal death notices functions
    as a conventional idiom for death. Rendering it 'lay down' preserves the Hebrew
    idiom while allowing the context to communicate death, avoiding over-paraphrase
    to simply 'died.'
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the standard formula in the Kings narratives for a king's death.
    'With his fathers' preserves the idiomatic and genealogical force of the Hebrew
    more closely than the more interpretive 'with his ancestors.'
- source_word: וַיִּקָּבֵר
  chosen: was buried
  alternatives:
  - was interred
  lexicon: HALOT
  rationale: A straightforward passive rendering of קבר in the Niphal. 'Was buried'
    is natural modern English and sufficiently formal.
- source_word: בְּגַן בֵּיתוֹ
  chosen: in the garden of his house
  alternatives:
  - in his house garden
  - in the garden of his palace
  lexicon: HALOT
  rationale: גן is 'garden' and ביתו is literally 'his house.' 'Garden of his house'
    preserves the wording without importing the more specific 'palace,' which the
    Hebrew does not explicitly state, even if a royal residence is likely in context.
- source_word: בְּגַן עֻזָּא
  chosen: in the garden of Uzza
  alternatives:
  - in Uzza's garden
  lexicon: HALOT
  rationale: The repeated prepositional phrase is retained appositionally for clarity
    and fidelity. The proper name is transliterated, following the translation philosophy
    for names.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: מלך in this succession formula marks accession to kingship. 'Became king'
    communicates enthronement more precisely here than the broader 'reigned.'
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: תחת in succession contexts means taking the predecessor's place. 'In
    his place' is idiomatic English and accurately conveys dynastic succession.
