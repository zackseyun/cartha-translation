theological_decisions:
- issue: Covenantal nuance of 'my inheritance'
  chosen_reading: Retain 'my inheritance' as referring to the people/portion belonging
    to God without narrowing it further in translation.
  alternative_readings:
  - my heritage
  - my possession
  rationale: The verse speaks of the remnant of God's own allotted people/portion.
    The translation preserves this covenantal relationship but does not import additional
    theological claims beyond the Hebrew wording.
  doctrine_reference: Translation philosophy §§1, 3, 5
