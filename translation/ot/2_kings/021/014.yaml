id: 2KI.21.14
reference: 2 Kings 21:14
source:
  edition: WLC
  text: וְ/נָטַשְׁתִּ֗י אֵ֚ת שְׁאֵרִ֣ית נַחֲלָתִ֔/י וּ/נְתַתִּ֖י/ם בְּ/יַ֣ד אֹֽיְבֵי/הֶ֑ם
    וְ/הָי֥וּ לְ/בַ֛ז וְ/לִ/מְשִׁסָּ֖ה לְ/כָל אֹיְבֵי/הֶֽם־׃
translation:
  text: And I will forsake the remnant of my inheritance and give them into the hand
    of their enemies, and they will become plunder and spoil for all their enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abandon' for 'forsake.'
    reason: lexical_alternative
  - marker: b
    text: '''My inheritance'' can also be rendered ''my heritage,'' preserving covenant-possession
      language.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָטַשְׁתִּי
  chosen: I will forsake
  alternatives:
  - I will abandon
  - I will cast off
  lexicon: HALOT
  rationale: נטשׁ commonly conveys leaving, forsaking, or abandoning. 'Forsake' preserves
    the covenantal and judicial force without sounding overly colloquial. The prefixed
    conjunction is carried as 'And.'
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - the remainder
  - what is left
  lexicon: HALOT
  rationale: שְׁאֵרִית is a significant biblical term for what remains after judgment
    or catastrophe. 'Remnant' is the most natural and theologically resonant rendering
    here.
- source_word: נַחֲלָתִי
  chosen: of my inheritance
  alternatives:
  - of my heritage
  - of my possession
  lexicon: HALOT
  rationale: נחלה often denotes an inheritance or allotted possession, especially
    covenant land/people language. 'My inheritance' preserves the possessive covenantal
    nuance better than the flatter 'my possession.'
- source_word: וּנְתַתִּים
  chosen: and give them
  alternatives:
  - and hand them over
  - and deliver them
  lexicon: HALOT
  rationale: נתן literally means 'give.' In context it implies handing over to hostile
    power, but 'give them into the hand of' is a standard idiom that preserves the
    Hebrew imagery while remaining clear in English.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: The Hebrew idiom 'into the hand of' is common and understandable in English
    Bible style. It preserves the concrete metaphor of control and domination.
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  alternatives:
  - those hostile to them
  lexicon: HALOT
  rationale: Straightforward rendering of the participial noun אויבים. Repeated consistently
    in both occurrences.
- source_word: וְהָיוּ
  chosen: and they will become
  alternatives:
  - and they will be
  lexicon: HALOT
  rationale: היה can mean 'be' or 'become.' Here the future result after being handed
    over is in view, so 'become' better captures the consequential sense.
- source_word: לְבַז
  chosen: plunder
  alternatives:
  - prey
  - booty
  lexicon: HALOT
  rationale: בז denotes spoil taken by enemies. 'Plunder' is clear modern English
    and fits the context of conquest.
- source_word: וְלִמְשִׁסָּה
  chosen: and spoil
  alternatives:
  - and a prey
  - and something to be despoiled
  lexicon: HALOT
  rationale: משסה refers to spoil, plundering, or something exposed to pillage. Rendering
    it as 'spoil' preserves the paired near-synonyms without becoming archaic. The
    pair 'plunder and spoil' reflects the Hebrew rhetorical doubling.
- source_word: לְכָל אֹיְבֵיהֶם
  chosen: for all their enemies
  alternatives:
  - to all their enemies
  - by all their enemies
  lexicon: HALOT
  rationale: 'The lamed here marks relation/result: they become plunder/spoil with
    respect to all their enemies. ''For all their enemies'' is idiomatic and preserves
    the broad scope of hostile exploitation.'
