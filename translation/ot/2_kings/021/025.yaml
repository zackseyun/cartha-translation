id: 2KI.21.25
reference: 2 Kings 21:25
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י אָמ֖וֹן אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר
    דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־׃
translation:
  text: Now the rest of the acts of Amon, what he did—are they not written in the
    Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deeds' for 'acts'; Hebrew דִּבְרֵי literally means 'words' or 'matters,'
      but in this royal-summary formula it refers to the king's recorded acts.
    reason: lexical_alternative
  - marker: b
    text: '''Book'' refers to an ancient written record, likely a scroll; the phrase
      could also be rendered ''the annals of the Kings of Judah.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder' or 'rest.' With prefixed וְ in this recurring
    regnal-summary formula, English idiom is best served by 'Now the rest of' rather
    than a bare 'And the rest of,' while preserving the transitional force.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Though literally 'words/matters,' in the formula 'the rest of the דברי
    of a king ... what he did,' the sense is the record of his acts/deeds. 'Acts'
    is concise, idiomatic, and fits the historiographical context.
- source_word: אָמ֖וֹן
  chosen: Amon
  rationale: Personal name transliterated by standard English convention, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: אֲשֶׁר עָשָׂה
  chosen: what he did
  alternatives:
  - which he did
  - that he did
  lexicon: HALOT
  rationale: This relative clause specifies the content of Amon's recorded acts. 'What
    he did' is natural modern English and preserves the clause's explanatory force.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  - surely they are
  lexicon: HALOT
  rationale: The interrogative particle with negation introduces a rhetorical question
    expecting a positive answer. 'Are they not' preserves both the rhetorical form
    and the conventional regnal-summary style.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כְּתוּבִים is the passive participle 'written.' 'Written' is the most
    direct rendering; 'recorded' is possible but slightly more interpretive. The English
    order is adjusted for idiomatic rhetorical-question syntax.
- source_word: עַל־סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but in English reference to contents
    of a written record is idiomatically 'in the Book.' 'Book' is conventional and
    understandable, though the underlying object would have been a scroll.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This expression in royal-source citations refers to an annalistic chronicle.
    'Chronicles' is the established and accurate rendering here, especially in the
    title-like phrase 'Book of the Chronicles.'
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - concerning the Kings of Judah
  - for the Kings of Judah
  lexicon: HALOT
  rationale: In this source-title formula, לְ is best represented idiomatically as
    'of,' yielding the standard title 'the Book of the Chronicles of the Kings of
    Judah.' This reflects possession/association rather than purpose.
