id: 2KI.21.17
reference: 2 Kings 21:17
source:
  edition: WLC
  text: וְ/יֶ֨תֶר דִּבְרֵ֤י מְנַשֶּׁה֙ וְ/כָל אֲשֶׁ֣ר עָשָׂ֔ה וְ/חַטָּאת֖/וֹ אֲשֶׁ֣ר
    חָטָ֑א הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Manasseh, and all that he did, and his sin that
    he committed—are they not written in the Book of the Chronicles of the Kings of
    Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Judah.' The Hebrew expression refers to a
      royal record source.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  chosen: Now the rest of
  alternatives:
  - And the rest of
  - As for the rest of
  lexicon: HALOT
  rationale: יֶתֶר commonly introduces the remaining matters in a regnal summary.
    'The rest of' is the standard sense; 'Now' smoothly renders the prefixed conjunction
    in English narrative style without over-literal repetition of 'and'.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: In the formula 'the rest of the words/matters of X' within Kings, the
    idiom refers to the recorded acts or affairs of a king, not merely his spoken
    words. 'Acts' is idiomatic and contextually precise.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and everything that he did
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'All that he did'
    preserves the formal structure while remaining natural English.
- source_word: וְחַטָּאתוֹ אֲשֶׁר חָטָא
  chosen: and his sin that he committed
  alternatives:
  - and the sin that he committed
  - and his offense that he committed
  - and his sin which he sinned
  lexicon: HALOT
  rationale: The Hebrew uses a cognate construction ('his sin which he sinned') for
    emphasis. 'His sin that he committed' preserves both the possessive suffix and
    the verbal force in natural English. 'Offense' is possible but weakens the moral-religious
    force of חטאת/חטא.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not that they are
  - surely they are
  lexicon: HALOT
  rationale: This interrogative-negative formula expects an affirmative answer. 'Are
    they not' preserves the rhetorical question form better than flattening it into
    an assertion.
- source_word: הֵם כְּתוּבִים
  chosen: are they not written
  alternatives:
  - are they not recorded
  - are they not inscribed
  lexicon: HALOT
  rationale: כָּתוּב means 'written'; in this archival context 'recorded' is interpretive
    but possible. 'Written' keeps closer to the source while still fitting the annalistic
    formula.
- source_word: עַל סֵפֶר
  chosen: in the Book of
  alternatives:
  - on the scroll of
  - upon the book of
  lexicon: HALOT
  rationale: Although עַל is literally 'on/upon,' in this idiom with written records
    English naturally uses 'in.' 'Book' is conventional and understandable; 'scroll'
    is possible but not required by the context.
- source_word: דִּבְרֵי הַיָּמִים
  chosen: the Chronicles
  alternatives:
  - the events of the days
  - the annals
  lexicon: HALOT
  rationale: This expression is an established title-like designation for royal records.
    'Chronicles' is the most natural English equivalent here, though it refers to
    the archival source, not necessarily the canonical book of Chronicles.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - for the kings of Judah
  - belonging to the kings of Judah
  lexicon: HALOT
  rationale: In this source-title formula, the preposition לְ is best represented
    idiomatically as 'of,' indicating the chronicle pertaining to Judah's kings.
