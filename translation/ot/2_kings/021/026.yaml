id: 2KI.21.26
reference: 2 Kings 21:26
source:
  edition: WLC
  text: וַ/יִּקְבְֹּ֥ר אֹת֛/וֹ בִּ/קְבֻרָת֖/וֹ בְּ/גַן עֻזָּ֑א וַ/יִּמְלֹ֛ךְ יֹאשִׁיָּ֥הוּ
    בְנ֖/וֹ תַּחְתָּֽי/ו־׃פ
translation:
  text: And they buried him in his tomb in the garden of Uzza, and Josiah his son
    became king in his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and he buried him.' English uses the indefinite plural
      'they buried him' for natural style in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'his grave' or 'his burial place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּר
  chosen: they buried
  alternatives:
  - he buried
  lexicon: HALOT
  rationale: The verb is 3ms formally ('and he buried'), but in English the subject
    is naturally indefinite/impersonal from context after the report of Amon's death.
    'They buried' is idiomatic and reflects the likely collective agents without forcing
    a singular subject not expressed in English context.
- source_word: קְבֻרָתוֹ
  chosen: his tomb
  alternatives:
  - his burial place
  - his grave
  lexicon: HALOT
  rationale: The noun refers to the place of burial. 'His tomb' is concise and natural
    in context, while still conveying a specific burial site rather than the act of
    burial.
- source_word: גַן עֻזָּא
  chosen: the garden of Uzza
  alternatives:
  - Uzza's garden
  lexicon: HALOT
  rationale: Construct relationship is preserved straightforwardly. 'The garden of
    Uzza' is slightly more formal and matches the narrative style of Kings.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - began to reign
  lexicon: HALOT
  rationale: In succession formulae, the verb marks accession to kingship. 'Became
    king' communicates enthronement more precisely here than the broader 'reigned,'
    which can suggest the whole period of rule.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - after him
  lexicon: HALOT
  rationale: The idiom indicates succession. 'In his place' is natural modern English
    and preserves the sense of replacement/succession.
