id: 2KI.21.19
reference: 2 Kings 21:19
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וּ/שְׁתַּ֤יִם שָׁנָה֙ אָמ֣וֹן בְּ/מָלְכ֔/וֹ וּ/שְׁתַּ֣יִם
    שָׁנִ֔ים מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ מְשֻׁלֶּ֥מֶת בַּת חָר֖וּץ
    מִן יָטְבָֽה־־־׃
translation:
  text: Amon was twenty-two years old when he began to reign, and he reigned two years
    in Jerusalem. His mother’s name was Meshullemeth daughter of Haruz, from Jotbah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וּשְׁתַּיִם שָׁנָה
  chosen: was twenty-two years old
  alternatives:
  - was a son of twenty-two years
  lexicon: HALOT
  rationale: This is the standard Hebrew age formula. A natural English rendering
    communicates the idiom clearly without wooden literalism.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - in his reigning
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks the time of accession.
    'When he began to reign' is idiomatic English and matches the regnal formula.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely
    holding the title.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: Standard locative rendering.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - And the name of his mother was
  lexicon: HALOT
  rationale: This preserves the genealogical notice while using natural English word
    order.
- source_word: מְשֻׁלֶּמֶת
  chosen: Meshullemeth
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בַּת חָרוּץ
  chosen: daughter of Haruz
  rationale: Standard patronymic/genealogical expression.
- source_word: מִן יָטְבָה
  chosen: from Jotbah
  alternatives:
  - of Jotbah
  lexicon: HALOT
  rationale: The preposition מִן most directly indicates origin, so 'from Jotbah'
    best reflects the Hebrew.
