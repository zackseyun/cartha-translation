theological_decisions:
- issue: Corporate continuity of Israel's guilt from the exodus generation onward
  chosen_reading: Retain the text's corporate-historical framing without softening
    it to merely individual wrongdoing.
  alternative_readings:
  - Interpret as only a rhetorical summary of recent kings' sins
  rationale: The verse explicitly traces provocation from the exodus onward through
    'their fathers,' presenting covenantal continuity in rebellion. The translation
    preserves that historical-theological tension without adding explanatory doctrine.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Rendering of kinship term אֲבוֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The Hebrew is grammatically masculine and refers to prior generations.
    Following the gender-accurate principle, the main text keeps 'fathers,' while
    an alternative may be noted for readers who understand the broader referent as
    ancestors.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
