id: 2KI.21.15
reference: 2 Kings 21:15
source:
  edition: WLC
  text: יַ֗עַן אֲשֶׁ֨ר עָשׂ֤וּ אֶת הָ/רַע֙ בְּ/עֵינַ֔/י וַ/יִּהְי֥וּ מַכְעִסִ֖ים אֹתִ֑/י
    מִן הַ/יּ֗וֹם אֲשֶׁ֨ר יָצְא֤וּ אֲבוֹתָ/ם֙ מִ/מִּצְרַ֔יִם וְ/עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־׃
translation:
  text: because they have done what is evil in my eyes and have been provoking me
    from the day their fathers came out of Egypt to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors came out of Egypt.' The Hebrew reads 'their fathers,'
      a masculine kinship term used for prior generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - since
  - inasmuch as
  lexicon: HALOT
  rationale: The compound introduces the reason for the announced judgment in the
    previous verse. 'Because' is the most natural modern English causal connector.
- source_word: עָשׂוּ אֶת־הָרַע
  chosen: they have done what is evil
  alternatives:
  - they did evil
  - they have done the evil
  lexicon: HALOT
  rationale: The idiom עשה את־הרע commonly means 'do what is evil' rather than a wooden
    'do the evil.' The perfect is rendered with English present perfect to connect
    past action with continuing relevance in the causal clause.
- source_word: בְּעֵינַי
  chosen: in my eyes
  alternatives:
  - in my sight
  - before me
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In my eyes' preserves the
    metaphor and remains clear in English.
- source_word: וַיִּהְיוּ מַכְעִסִים אֹתִי
  chosen: and have been provoking me
  alternatives:
  - and they have been angering me
  - and became those who provoke me
  lexicon: HALOT
  rationale: The construction with היה + participle expresses ongoing or habitual
    action. 'Have been provoking me' captures the durative sense better than a simple
    past.
- source_word: מַכְעִסִים
  chosen: provoking
  alternatives:
  - making angry
  - provoking to anger
  lexicon: HALOT
  rationale: The Hiphil of כעס here means causing divine anger. 'Provoking' is idiomatic
    and concise; 'provoking to anger' is possible but unnecessarily expanded in the
    main text.
- source_word: מִן־הַיּוֹם אֲשֶׁר
  chosen: from the day
  alternatives:
  - since the day
  - from the time when
  lexicon: HALOT
  rationale: This temporal marker introduces the starting point of a continuing pattern.
    'From the day' is formally close and natural.
- source_word: יָצְאוּ אֲבוֹתָם מִמִּצְרַיִם
  chosen: their fathers came out of Egypt
  alternatives:
  - their fathers went out from Egypt
  - their ancestors came out of Egypt
  lexicon: HALOT
  rationale: יצא is the standard exodus verb 'go/come out.' 'Came out of Egypt' is
    idiomatic in English. 'Their fathers' preserves the Hebrew familial term; 'ancestors'
    is possible but less formally aligned.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: Per the translation philosophy, gender-accurate rendering is preferred
    where the source uses a masculine kinship term. Here it refers to forefathers/previous
    generations of Israel, so 'their fathers' is retained in the main text.
- source_word: וְעַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - even to this day
  lexicon: HALOT
  rationale: This is a common Hebrew temporal expression. 'To this day' is concise,
    idiomatic, and preserves the continuing force.
