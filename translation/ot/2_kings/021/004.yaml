id: 2KI.21.4
reference: 2 Kings 21:4
source:
  edition: WLC
  text: וּ/בָנָ֥ה מִזְבְּחֹ֖ת בְּ/בֵ֣ית יְהוָ֑ה אֲשֶׁר֙ אָמַ֣ר יְהוָ֔ה בִּ/ירוּשָׁלִַ֖ם אָשִׂ֥ים אֶת שְׁמִֽ/י־׃
translation:
  text: He built altars in the house of Yahweh, of which Yahweh had said, “In Jerusalem I will put my name.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple of the LORD.' Literally, 'in the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''I will put my name'' is temple covenant language for the place the LORD chooses to associate with his name and presence.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בָנָה
  chosen: He built
  alternatives:
  - And he built
  lexicon: HALOT
  rationale: Qal wayyiqtol 3ms of בנה narrates the next event in sequence. English narrative style normally omits the initial conjunction, so 'He built' best reflects the sense without unnecessary woodenness.
- source_word: מִזְבְּחֹת
  chosen: altars
  lexicon: HALOT
  rationale: Plural of מִזְבֵּחַ, the standard term for sacrificial altars. 'Altars' is the direct and natural rendering.
- source_word: בְּ/בֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה literally means 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear; 'temple' is possible but slightly less formally tied to the source wording.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר אָמַר יְהוָה
  chosen: of which the LORD had said
  alternatives:
  - where the LORD had said
  - about which the LORD had said
  lexicon: HALOT
  rationale: The relative clause modifies 'the house of the LORD.' 'Of which' best captures the referential link in idiomatic English, and the pluperfect 'had said' appropriately marks the prior divine statement relative to Manasseh's action.
- source_word: בִּ/ירוּשָׁלַם
  chosen: In Jerusalem
  lexicon: HALOT
  rationale: 'The preposition ב marks location: ''in Jerusalem.'' Fronting it in the quotation matches the Hebrew emphasis.'
- source_word: אָשִׂים אֶת שְׁמִי
  chosen: I will put my name
  alternatives:
  - I will place my name
  - I will set my name there
  lexicon: HALOT
  rationale: שׂים with 'my name' is covenant-temple language for God's chosen dwelling/ownership presence. 'Put my name' is a clear, fairly literal rendering. 'There' is not explicit in this verse and is therefore omitted from the main text.
