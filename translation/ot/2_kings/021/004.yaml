theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temple-name theology in 'I will put my name'
  chosen_reading: Retain the idiom 'put my name' without interpretive expansion
  alternative_readings:
  - I will establish my presence
  - I will cause my name to dwell there
  rationale: The phrase carries theological significance regarding God's chosen place, but the Hebrew here states the idiom plainly. To preserve theological tension and avoid importing a fuller interpretive paraphrase, the translation keeps the wording close to the source.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
