theological_decisions:
- issue: Rendering of the cult object associated with אֲשֵׁרָה
  chosen_reading: the carved image of Asherah
  alternative_readings:
  - the Asherah image
  - the carved image of the Asherah pole
  rationale: Because the text explicitly uses פֶּסֶל ('carved image') with הָאֲשֵׁרָה,
    the translation should reflect an image/idol associated with Asherah rather than
    flattening the phrase to simply 'Asherah pole.' This avoids importing a narrower
    cultic form than the Hebrew states in this verse.
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, with alternatives preserved only as needed. No special contextual reason
    requires deviation here.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
