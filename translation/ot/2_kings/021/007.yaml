id: 2KI.21.7
reference: 2 Kings 21:7
source:
  edition: WLC
  text: וַ/יָּ֕שֶׂם אֶת פֶּ֥סֶל הָ/אֲשֵׁרָ֖ה אֲשֶׁ֣ר עָשָׂ֑ה בַּ/בַּ֗יִת אֲשֶׁ֨ר אָמַ֤ר
    יְהוָה֙ אֶל דָּוִד֙ וְ/אֶל שְׁלֹמֹ֣ה בְנ֔/וֹ בַּ/בַּ֨יִת הַ/זֶּ֜ה וּ/בִ/ירוּשָׁלִַ֗ם
    אֲשֶׁ֤ר בָּחַ֨רְתִּי֙ מִ/כֹּל֙ שִׁבְטֵ֣י יִשְׂרָאֵ֔ל אָשִׂ֥ים אֶת שְׁמִ֖/י לְ/עוֹלָֽם־־־־׃
translation:
  text: And he set the carved image of Asherah that he had made in the house of which
    the LORD had said to David and to Solomon his son, “In this house and in Jerusalem,
    which I have chosen out of all the tribes of Israel, I will put my name forever.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the image of Asherah.” The Hebrew combines “carved image” with “Asherah,”
      indicating an idol/image associated with Asherah; some render more specifically
      “Asherah pole,” but that is less precise here because the text explicitly says
      “carved image.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: And he set
  alternatives:
  - And he placed
  - And he put
  lexicon: HALOT
  rationale: The waw-consecutive with שׂוּם narrates a past action. 'Set' is natural
    modern English and fits the placement of an object in a sacred space without overinterpreting
    the manner.
- source_word: פֶּסֶל
  chosen: the carved image
  alternatives:
  - the idol
  - the graven image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an image fashioned by carving. 'Carved image' preserves
    the concrete sense better than the more interpretive 'idol,' while avoiding the
    archaic feel of 'graven image.'
- source_word: הָאֲשֵׁרָה
  chosen: of Asherah
  alternatives:
  - the Asherah pole
  - the image of Asherah
  lexicon: HALOT
  rationale: Here אֲשֵׁרָה follows פֶּסֶל, indicating not merely a cultic pole but
    an image associated with or representing Asherah. 'Of Asherah' preserves the genitival
    relationship without forcing the more specific 'pole,' which does not fit as well
    with פֶּסֶל.
- source_word: אֲשֶׁר עָשָׂה
  chosen: that he had made
  alternatives:
  - which he made
  lexicon: HALOT
  rationale: English past perfect clarifies that the making preceded the setting up.
    This reflects the relative clause naturally in English narrative.
- source_word: בַּבַּיִת
  chosen: in the house
  alternatives:
  - in the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this context it refers to the temple,
    but 'house' preserves the wording of the divine quotation that follows and echoes
    the theological language of the house chosen by the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: בְנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: 'The pronominal suffix refers to David: ''Solomon his son.'' This is
    retained explicitly for clarity and fidelity.'
- source_word: בַּבַּיִת הַזֶּה
  chosen: In this house
  alternatives:
  - In this temple
  lexicon: HALOT
  rationale: The demonstrative phrase is rendered straightforwardly. 'House' is preferred
    over 'temple' to preserve the lexical repetition with the earlier בַּבַּיִת and
    the covenantal resonance of God's chosen house.
- source_word: וּבִירוּשָׁלִַם
  chosen: and in Jerusalem
  lexicon: HALOT
  rationale: The conjunction links the house and the city as the paired loci of divine
    choice. The preposition is retained.
- source_word: אֲשֶׁר בָּחַרְתִּי
  chosen: which I have chosen
  alternatives:
  - that I chose
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English because the
    choice of Jerusalem remains in force in the quoted divine speech.
- source_word: מִכֹּל שִׁבְטֵי יִשְׂרָאֵל
  chosen: out of all the tribes of Israel
  alternatives:
  - from all the tribes of Israel
  lexicon: HALOT
  rationale: '''Out of'' clearly conveys selection from among the tribes. This matches
    the force of מן with בחר.'
- source_word: אָשִׂים אֶת שְׁמִי
  chosen: I will put my name
  alternatives:
  - I will place my name
  - I will set my name
  lexicon: HALOT
  rationale: This is standard covenant-temple language for God's choosing a place
    for his name to dwell. 'Put my name' is both literal and idiomatic enough in English.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - permanently
  lexicon: HALOT
  rationale: '''Forever'' is the natural modern English rendering of לְעוֹלָם here,
    preserving the enduring force of the promise without archaic spelling.'
