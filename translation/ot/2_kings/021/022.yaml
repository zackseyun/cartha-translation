id: 2KI.21.22
reference: 2 Kings 21:22
source:
  edition: WLC
  text: וַ/יַּעֲזֹ֕ב אֶת יְהוָ֖ה אֱלֹהֵ֣י אֲבֹתָ֑י/ו וְ/לֹ֥א הָלַ֖ךְ בְּ/דֶ֥רֶךְ יְהוָֽה־׃
translation:
  text: He abandoned the LORD, the God of his fathers, and did not walk in the way
    of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forsook the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the God of his fathers'; alternatively, 'the God of his ancestors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲזֹב
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: The verb עזב commonly means to leave, forsake, or abandon. 'Abandoned'
    is clear modern English and conveys covenantal disloyalty without archaic tone.
    'Forsook' is traditional but less natural for contemporary readers.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention
    rooted in the LXX/NT pattern.
- source_word: אֱלֹהֵי אֲבֹתָיו
  chosen: the God of his fathers
  alternatives:
  - his ancestral God
  - the God of his ancestors
  lexicon: HALOT
  rationale: The construct phrase literally means 'God of his fathers.' This preserves
    the Hebrew familial/covenantal expression. 'Ancestors' is possible in English,
    but 'fathers' more closely matches the source and the translation philosophy's
    gender-accurate principle.
- source_word: וְלֹא הָלַךְ
  chosen: and did not walk
  alternatives:
  - and he did not follow
  - and he did not live
  lexicon: HALOT
  rationale: הלך in covenantal idiom often means to walk or conduct oneself. Retaining
    'walk' preserves the biblical metaphor and remains understandable in modern English.
- source_word: בְּדֶרֶךְ יְהוָה
  chosen: in the way of the LORD
  alternatives:
  - in the LORD's way
  - on the path of the LORD
  lexicon: HALOT
  rationale: דרך here is metaphorical for manner of life or covenantal path. 'In the
    way of the LORD' is a natural and transparent rendering that preserves the idiom
    without over-paraphrasing.
