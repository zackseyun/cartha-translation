theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the doctrinal standard
    for contested terms, it is rendered 'the LORD' in both instances rather than transliterating
    the name.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Gendered ancestral language in אֲבֹתָיו
  chosen_reading: his fathers
  alternative_readings:
  - his ancestors
  rationale: The Hebrew is explicitly masculine plural with a possessive suffix. In
    keeping with the gender-accurate principle, the translation preserves 'fathers'
    rather than neutralizing to 'ancestors.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 — Gender-accurate over
    gender-neutral'
