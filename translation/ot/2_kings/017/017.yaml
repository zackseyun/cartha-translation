id: 2KI.17.17
reference: 2 Kings 17:17
source:
  edition: WLC
  text: וַֽ֠/יַּעֲבִירוּ אֶת בְּנֵי/הֶ֤ם וְ/אֶת בְּנֽוֹתֵי/הֶם֙ בָּ/אֵ֔שׁ וַ/יִּקְסְמ֥וּ קְסָמִ֖ים וַ/יְנַחֵ֑שׁוּ וַ/יִּֽתְמַכְּר֗וּ לַ/עֲשׂ֥וֹת הָ/רַ֛ע בְּ/עֵינֵ֥י יְהוָ֖ה לְ/הַכְעִיסֽ/וֹ־־׃
translation:
  text: They made their sons and their daughters pass through the fire, practiced divination and interpreted omens, and sold themselves to do what was evil in the sight of Yahweh, provoking him to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'sacrificed their sons and daughters in the fire.' The Hebrew idiom is literally 'made ... pass through the fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִירוּ ... בָּאֵשׁ
  chosen: made ... pass through the fire
  alternatives:
  - caused ... to pass through the fire
  - burned ... in the fire
  - offered ... in the fire
  lexicon: HALOT
  rationale: The idiom literally means 'caused to pass through the fire' and is the standard expression for child sacrifice or a related fire rite. The more literal rendering preserves the Hebrew wording and its intertextual resonance, while avoiding over-specifying the exact ritual form in the main text.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  chosen: their sons and their daughters
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters. Rendering both preserves the emphasis and horror of the act better than the more generalized 'children'.
- source_word: וַיִּקְסְמוּ קְסָמִים
  chosen: practiced divination
  alternatives:
  - used divination
  - divined divinations
  lexicon: HALOT
  rationale: The verb-object cognate construction intensifies the action, but idiomatic English is best served by 'practiced divination.' This keeps the occult sense without awkward literalism.
- source_word: וַיְנַחֵשׁוּ
  chosen: interpreted omens
  alternatives:
  - practiced soothsaying
  - used enchantments
  - practiced augury
  lexicon: HALOT
  rationale: The verb refers to omen-reading or divinatory interpretation of signs. 'Interpreted omens' is clear modern English and distinguishes it from the previous term for divination while preserving the forbidden occult practice.
- source_word: וַיִּתְמַכְּרוּ
  chosen: sold themselves
  alternatives:
  - gave themselves over
  - devoted themselves
  lexicon: HALOT
  rationale: 'The hitpael of מכר is metaphorical: they ''sold themselves'' into evil. This vivid expression should be retained because it conveys self-enslavement and moral surrender more forcefully than a softened paraphrase.'
- source_word: לַעֲשׂוֹת הָרַע
  chosen: to do what was evil
  alternatives:
  - to do evil
  - to do the evil
  lexicon: HALOT
  rationale: '''To do what was evil'' is idiomatic English and reflects the Hebrew infinitive phrase with the article on ''evil'' functioning generically.'
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a common Hebrew evaluative idiom. 'In the sight of' is natural English while preserving the metaphor of divine evaluation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהַכְעִיסוֹ
  chosen: provoking him to anger
  alternatives:
  - to provoke him
  - to anger him
  lexicon: HALOT
  rationale: The hiphil of כעס here expresses causing divine anger. 'Provoking him to anger' preserves both the causative force and the relational offense implied by the Hebrew.
