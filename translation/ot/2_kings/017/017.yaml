theological_decisions:
- issue: Nature of the child-fire rite
  chosen_reading: Retain the idiom 'made their sons and their daughters pass through the fire' in the main text without narrowing it further.
  alternative_readings:
  - burned their sons and daughters in the fire
  - sacrificed their sons and daughters in the fire
  rationale: The broader context strongly suggests a condemned child-sacrifice practice, but the Hebrew idiom itself is best preserved in the main text. This avoids importing more specificity than the wording itself states while still allowing the likely sense to be noted.
  doctrine_reference: Translation philosophy 1 and 3
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton and preserves consistency across the translation.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
