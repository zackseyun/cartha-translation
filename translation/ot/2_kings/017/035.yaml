id: 2KI.17.35
reference: 2 Kings 17:35
source:
  edition: WLC
  text: וַ/יִּכְרֹ֨ת יְהוָ֤ה אִתָּ/ם֙ בְּרִ֔ית וַ/יְצַוֵּ֣/ם לֵ/אמֹ֔ר לֹ֥א תִֽירְא֖וּ אֱלֹהִ֣ים אֲחֵרִ֑ים וְ/לֹא תִשְׁתַּחֲו֣וּ לָ/הֶ֔ם וְ/לֹ֣א תַעַבְד֔וּ/ם וְ/לֹ֥א תִזְבְּח֖וּ לָ/הֶֽם־׃
translation:
  text: And Yahweh made a covenant with them and commanded them, saying, “You shall not fear other gods, and you shall not bow down to them, or serve them, or sacrifice to them.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּכְרֹת
  chosen: made
  alternatives:
  - cut
  lexicon: HALOT
  rationale: The idiom כרת ברית is conventionally and accurately rendered 'make a covenant' in English. 'Cut a covenant' is more formally literal but less natural; the covenant-making sense is primary here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִתָּם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward preposition plus pronoun indicating covenant relationship.
- source_word: בְּרִית
  chosen: a covenant
  alternatives:
  - covenant
  lexicon: HALOT
  rationale: Standard rendering for ברית. The English article is natural after 'made' in this construction.
- source_word: וַיְצַוֵּם
  chosen: commanded them
  alternatives:
  - gave them this command
  lexicon: HALOT
  rationale: The verb צוה denotes giving a command. 'Commanded them' preserves the directness of the Hebrew verbal form.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard narrative introducer for direct speech; 'saying' is both natural and formally close.
- source_word: לֹא תִירְאוּ
  chosen: You shall not fear
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: The imperfect with לא in covenantal command context is well represented by 'you shall not,' which preserves the legal-covenantal tone better than the simpler imperative 'do not.' 'Fear' is retained rather than 'worship' because the following verbs specify acts of worship separately.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: אחרים means 'other.' 'Other gods' is the standard and contextually precise rendering in covenant prohibition language.
- source_word: תִשְׁתַּחֲווּ
  chosen: bow down
  alternatives:
  - prostrate yourselves
  - worship
  lexicon: HALOT
  rationale: The verb denotes the physical act of prostration/bowing. 'Bow down' preserves the concrete action and avoids collapsing it into the broader category 'worship,' since additional worship verbs follow.
- source_word: תַעַבְדוּם
  chosen: serve them
  alternatives:
  - worship them
  lexicon: HALOT
  rationale: עבד in religious contexts can mean serve/worship, but 'serve' is preferable here to maintain distinction from the surrounding verbs and reflect the Hebrew lexeme consistently.
- source_word: תִזְבְּחוּ לָהֶם
  chosen: sacrifice to them
  alternatives:
  - offer sacrifices to them
  lexicon: HALOT
  rationale: זבח refers specifically to sacrificial offering. 'Sacrifice to them' is concise and accurate.
