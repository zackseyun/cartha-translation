theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the prohibitions in covenantal speech
  chosen_reading: You shall not ...
  alternative_readings:
  - Do not ...
  rationale: The Hebrew prohibitions occur within covenant-command language. 'You shall not' preserves the solemn covenantal/legal force without overstating modality beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense and theological weight'
