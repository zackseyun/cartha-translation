theological_decisions:
- issue: Whether to capitalize 'God' in the quoted phrase 'god of the land'
  chosen_reading: lowercase 'god' in the main text
  alternative_readings:
  - uppercase 'God of the land'
  rationale: The verse reports the understanding of relocated nations who interpret
    Israel's deity as a territorial god whose cultic customs they have not learned.
    Lowercase preserves the speakers' perspective and avoids importing a confessional
    capitalization into their speech. The referent is still the God of Israel in the
    narrative context, but the wording reflects pagan perception.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension rather than resolve it)
