id: 2KI.17.26
reference: 2 Kings 17:26
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ לְ/מֶ֣לֶךְ אַשּׁוּר֮ לֵ/אמֹר֒ הַ/גּוֹיִ֗ם אֲשֶׁ֤ר הִגְלִ֨יתָ֙
    וַ/תּ֨וֹשֶׁב֙ בְּ/עָרֵ֣י שֹׁמְר֔וֹן לֹ֣א יָֽדְע֔וּ אֶת מִשְׁפַּ֖ט אֱלֹהֵ֣י הָ/אָ֑רֶץ
    וַ/יְשַׁלַּח בָּ֣/ם אֶת הָ/אֲרָי֗וֹת וְ/הִנָּ/ם֙ מְמִיתִ֣ים אוֹתָ֔/ם כַּ/אֲשֶׁר֙
    אֵינָ֣/ם יֹדְעִ֔ים אֶת מִשְׁפַּ֖ט אֱלֹהֵ֥י הָ/אָֽרֶץ־־־־׃
translation:
  text: So they spoke to the king of Assyria, saying, “The nations that you have exiled
    and settled in the cities of Samaria do not know the custom of the god of the
    land, so he has sent lions among them; and look, they are killing them, because
    they do not know the custom of the god of the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the God of the land.” The Hebrew can refer to Israel’s God, but the
      lowercase rendering in the main text preserves the reported pagan perspective
      of the speakers.
    reason: alternative_reading
  - marker: b
    text: “Custom” may also be rendered “law,” “requirement,” or “prescribed practice,”
      referring here to the expected manner of worship for the deity of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: In this historical narrative context, the referent is multiple ethnic
    populations relocated by Assyria. 'Nations' best preserves the collective-political
    sense without importing NT-era 'Gentiles' associations.
- source_word: הִגְלִיתָ
  chosen: you have exiled
  alternatives:
  - you deported
  - you carried away
  lexicon: HALOT
  rationale: The Hiphil of גלה refers to forced removal into exile. 'Have exiled'
    is clear, accurate, and preserves the coercive sense better than the more traditional
    but less transparent 'carried away.'
- source_word: וַתּוֹשֶׁב
  chosen: and settled
  alternatives:
  - and caused to dwell
  - and resettled
  lexicon: HALOT
  rationale: The causative sense of ישׁב is preserved. 'Settled' is idiomatic modern
    English; 'resettled' is possible, but 'settled' is slightly less interpretive
    while still conveying placement in a new location.
- source_word: בְּעָרֵי שֹׁמְרוֹן
  chosen: in the cities of Samaria
  alternatives:
  - in Samaria's cities
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct phrase, preserving
    the regional reference to Samaria rather than only the capital city.
- source_word: מִשְׁפַּט
  chosen: custom
  alternatives:
  - law
  - requirement
  - judgment
  lexicon: HALOT
  rationale: Here מִשְׁפַּט refers not to a legal verdict but to the expected cultic
    norm or prescribed manner of worship associated with the local deity. 'Custom'
    communicates that sense naturally in English. 'Law' is possible but sounds overly
    codified; 'requirement' is interpretive.
- source_word: אֱלֹהֵי הָאָרֶץ
  chosen: the god of the land
  alternatives:
  - the God of the land
  lexicon: HALOT
  rationale: The speakers are pagan settlers (or their reporters) describing the deity
    in local-territorial terms. Lowercase 'god' best reflects their perspective and
    the narrative's reported speech, without denying that the referent is Israel's
    God. Capitalizing would import the narrator's theological stance into the quoted
    wording.
- source_word: וַיְשַׁלַּח בָּם אֶת הָאֲרָיוֹת
  chosen: so he has sent lions among them
  alternatives:
  - and he sent lions among them
  - therefore he sent lions against them
  lexicon: HALOT
  rationale: The verb is simple 'sent'; 'among them' reflects בם idiomatically. Rendering
    with 'so' captures the reported causal logic from the settlers' complaint. Present
    perfect in English fits the reported present consequence.
- source_word: וְהִנָּם
  chosen: and look
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention. 'And look' is readable modern English and
    preserves the deictic force better than archaic 'behold.'
- source_word: מְמִיתִים אוֹתָם
  chosen: they are killing them
  alternatives:
  - they are putting them to death
  - they kill them
  lexicon: HALOT
  rationale: The participle conveys ongoing action. 'They are killing them' preserves
    the progressive sense and the vividness of the report.
- source_word: כַּאֲשֶׁר אֵינָם יֹדְעִים
  chosen: because they do not know
  alternatives:
  - since they do not know
  - inasmuch as they do not know
  lexicon: HALOT
  rationale: In context the phrase gives the reason the lions are killing them. 'Because'
    is the clearest idiomatic rendering of the causal force.
