id: 2KI.17.40
reference: 2 Kings 17:40
source:
  edition: WLC
  text: וְ/לֹ֖א שָׁמֵ֑עוּ כִּ֛י אִֽם כְּ/מִשְׁפָּטָ֥/ם הָֽ/רִאשׁ֖וֹן הֵ֥ם עֹשִֽׂים־׃
translation:
  text: But they did not listen; instead, they kept acting according to their former
    custom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they kept doing according to their former ordinance/practice.' The Hebrew
      מִשְׁפָּט can denote ordinance, rule, or customary practice; here it refers
      to their established former way of worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... not
  alternatives:
  - And ... not
  - Yet ... not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative with mild contrast
    to the preceding command/warning. 'But' captures the adversative sense in smooth
    English better than a simple 'and not.'
- source_word: שָׁמֵעוּ
  chosen: did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the issue
    is refusal to heed prior commands, so 'listen' preserves both auditory and responsive
    force without over-interpreting as full 'obey.'
- source_word: כִּי אִם
  chosen: instead
  alternatives:
  - but rather
  - except that
  lexicon: HALOT
  rationale: 'The idiom introduces contrast: not X, but rather Y. ''Instead'' is concise
    modern English and accurately reflects the adversative force.'
- source_word: כְּמִשְׁפָּטָם
  chosen: according to their ... custom
  alternatives:
  - according to their judgment
  - according to their ordinance
  - according to their practice
  lexicon: HALOT
  rationale: מִשְׁפָּט often means judgment, ordinance, or legal custom. In this context
    of religious behavior, 'custom' best conveys established practice rather than
    a formal legal ruling.
- source_word: הָרִאשׁוֹן
  chosen: former
  alternatives:
  - first
  - earlier
  lexicon: HALOT
  rationale: With מִשְׁפָּט, the adjective points back to their previous manner of
    worship/practice. 'Former' is the most natural contextual rendering in English.
- source_word: הֵם עֹשִׂים
  chosen: they kept acting
  alternatives:
  - they do
  - they were doing
  - they kept doing
  lexicon: HALOT
  rationale: The Hebrew participial construction gives an ongoing/habitual sense.
    'Kept acting' communicates continued practice in idiomatic English and fits the
    context of persistent religious behavior.
