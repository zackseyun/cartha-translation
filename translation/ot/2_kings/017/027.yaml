theological_decisions:
- issue: Capitalization of אֱלֹהֵי הָאָרֶץ
  chosen_reading: the god of the land
  alternative_readings:
  - the God of the land
  rationale: The narrative reports the Assyrian king's command in terms reflecting
    pagan territorial-deity assumptions. Lower-case 'god' preserves that viewpoint
    without denying the true identity of Israel's God. Capitalizing would tilt the
    translation toward narrator-level theological identification rather than the speech's
    own perspective.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
- issue: Number mismatch in וְיֵלְכוּ / וְיֵשְׁבוּ with singular antecedent and singular
    וְיֹרֵם
  chosen_reading: singular sense in English ('let him go and live there')
  alternative_readings:
  - retain plural formally ('let them go and live there')
  rationale: The immediate antecedent is 'one of the priests,' and the final verb
    is singular with plural object suffix. Rendering the middle verbs as singular
    best reflects the intended sense in readable English while documenting the irregularity.
