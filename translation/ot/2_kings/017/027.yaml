id: 2KI.17.27
reference: 2 Kings 17:27
source:
  edition: WLC
  text: וַ/יְצַ֨ו מֶֽלֶךְ אַשּׁ֜וּר לֵ/אמֹ֗ר הֹלִ֤יכוּ שָׁ֨מָּ/ה֙ אֶחָ֤ד מֵ/הַ/כֹּֽהֲנִים֙
    אֲשֶׁ֣ר הִגְלִיתֶ֣ם מִ/שָּׁ֔ם וְ/יֵלְכ֖וּ וְ/יֵ֣שְׁבוּ שָׁ֑ם וְ/יֹרֵ֕/ם אֶת מִשְׁפַּ֖ט
    אֱלֹהֵ֥י הָ/אָֽרֶץ־־׃
translation:
  text: Then the king of Assyria commanded, saying, “Take there one of the priests
    whom you exiled from there, and let him go and live there, and let him teach them
    the custom of the god of the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bring there' or 'Send there' one of the priests.
    reason: lexical_alternative
  - marker: b
    text: Or 'whom you deported from there.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew has plural verbs here (''let them go'' / ''let them live''), though
      the sense is singular: ''one of the priests'' ... ''let him teach them.'''
    reason: textual_variant
  - marker: d
    text: Or 'teach them the law/requirement of the god of the land.'
    reason: lexical_alternative
  - marker: e
    text: Or 'the God of the land'; lower-case 'god' reflects the Assyrian speaker's
      perspective.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - gave orders
  - ordered
  lexicon: HALOT
  rationale: The verb צוה in the waw-consecutive narrative form is straightforwardly
    'commanded' or 'ordered.' 'Commanded' preserves the formal force and suits royal
    speech.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard construct rendering. 'The king of Assyria' is idiomatic English
    and preserves the political title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Formula introducing direct speech; 'saying' is conventional and sufficiently
    natural here.
- source_word: הֹלִיכוּ שָׁמָּה
  chosen: Take there
  alternatives:
  - Bring there
  - Send there
  lexicon: HALOT
  rationale: The Hiphil of הלך can mean 'cause to go,' hence 'bring/send/take.' Because
    the object is a priest being relocated by royal command, 'take there' fits the
    addressees' action without over-specifying direction from the speaker's perspective.
    An alternative is worth preserving because English idiom may prefer 'send there'
    or 'bring there.'
- source_word: אֶחָד מֵהַכֹּהֲנִים
  chosen: one of the priests
  alternatives:
  - a priest from among those priests
  lexicon: HALOT
  rationale: Simple partitive construction; 'one of the priests' is the natural English
    equivalent.
- source_word: אֲשֶׁר הִגְלִיתֶם מִשָּׁם
  chosen: whom you exiled from there
  alternatives:
  - whom you carried away from there
  - whom you deported from there
  lexicon: HALOT
  rationale: גלה in Hiphil commonly refers to exile/deportation. 'Exiled' is concise
    and accurate; 'deported' is a viable contextual alternative with stronger administrative
    nuance.
- source_word: וְיֵלְכוּ
  chosen: let him go
  alternatives:
  - and he shall go
  lexicon: HALOT
  rationale: Although the consonantal form is 3mp, the sense in context is singular,
    coordinated with 'one of the priests' and followed by singular וְיֹרֵם. English
    smooths this as singular. The plural likely reflects a textual or grammatical
    irregularity, so the translation follows contextual sense.
- source_word: וְיֵשְׁבוּ שָׁם
  chosen: and live there
  alternatives:
  - and dwell there
  - and stay there
  lexicon: HALOT
  rationale: ישב often means 'sit, dwell, live.' In this context of residence, 'live
    there' is natural modern English; 'dwell there' is more formal but less current.
- source_word: וְיֹרֵם
  chosen: and let him teach them
  alternatives:
  - and let him instruct them
  lexicon: HALOT
  rationale: ירה in Hiphil can mean 'teach/instruct,' especially in matters of law
    or proper practice. The suffix -ם indicates the people being taught. 'Teach' is
    clear and idiomatic.
- source_word: מִשְׁפַּט
  chosen: the custom
  alternatives:
  - the law
  - the requirement
  - the manner
  lexicon: HALOT
  rationale: In this setting, מִשְׁפַּט אֱלֹהֵי הָאָרֶץ refers to the prescribed practice
    or due observance associated with the local deity, not necessarily codified law
    in the narrow sense. 'Custom' captures the practical-religious sense well, while
    'law' remains a possible alternative.
- source_word: אֱלֹהֵי הָאָרֶץ
  chosen: the god of the land
  alternatives:
  - the God of the land
  lexicon: HALOT
  rationale: The Assyrian perspective in context is that of a territorial deity; the
    phrase is grammatically generic and does not require capitalization. Because the
    referent is in fact the God of Israel as perceived by foreigners, 'God of the
    land' is a possible interpretive-capitalized alternative worth noting, but the
    lower-case main text better reflects the speakers' viewpoint.
