id: 2KI.17.5
reference: 2 Kings 17:5
source:
  edition: WLC
  text: וַ/יַּ֥עַל מֶֽלֶךְ אַשּׁ֖וּר בְּ/כָל הָ/אָ֑רֶץ וַ/יַּ֨עַל֙ שֹׁמְר֔וֹן וַ/יָּ֥צַר
    עָלֶ֖י/הָ שָׁלֹ֥שׁ שָׁנִֽים־־׃
translation:
  text: Then the king of Assyria went up throughout all the land, and he went up against
    Samaria and besieged it for three years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he went up to Samaria'; the Hebrew idiom can denote simple ascent or
      military advance, but the following clause ('besieged it') supports the hostile
      sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - came up
  - marched up
  - invaded
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend' and is frequently used idiomatically
    for military advance. 'Went up' preserves the Hebrew idiom while remaining natural
    in English.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard construct rendering; definite in context because a specific
    known ruler is intended.
- source_word: בְּכָל הָאָרֶץ
  chosen: throughout all the land
  alternatives:
  - through all the land
  - against the whole land
  - throughout the whole country
  lexicon: HALOT
  rationale: The preposition ב with כל הארץ here most naturally indicates movement
    through or over the territory in the course of invasion. 'Throughout all the land'
    captures the scope without over-specifying the exact military action.
- source_word: וַיַּעַל שֹׁמְרוֹן
  chosen: he went up against Samaria
  alternatives:
  - he went up to Samaria
  - he attacked Samaria
  lexicon: HALOT
  rationale: With a city as the object in military narrative, עלה often implies advancing
    against it. 'Against Samaria' makes the hostile sense explicit in context, especially
    since the next verb is 'besieged.'
- source_word: וַיָּצַר עָלֶיהָ
  chosen: besieged it
  alternatives:
  - laid siege to it
  - pressed hard against it
  lexicon: HALOT
  rationale: צור in this stem denotes besieging a city. 'Besieged it' is concise,
    clear modern English.
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: for three years
  alternatives:
  - three years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration expression after
    'besieged.'
