theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Subject of עָשׂוּ in the relative clause
  chosen_reading: that Israel had made
  alternative_readings:
  - that they had made
  - which they practiced
  rationale: The Hebrew verb is plural, and the clause can be understood with Israel as a collective plural or with an indefinite plural sense. The context contrasts Judah with Israel, so making 'Israel' explicit in English best preserves clarity without adding doctrinal interpretation.
