id: 2KI.17.19
reference: 2 Kings 17:19
source:
  edition: WLC
  text: גַּם יְהוּדָ֕ה לֹ֣א שָׁמַ֔ר אֶת מִצְוֺ֖ת יְהוָ֣ה אֱלֹהֵי/הֶ֑ם וַ/יֵּ֣לְכ֔וּ בְּ/חֻקּ֥וֹת יִשְׂרָאֵ֖ל אֲשֶׁ֥ר עָשֽׂוּ־־׃
translation:
  text: Even Judah did not keep the commandments of Yahweh their God, but walked in the statutes that Israel had made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'also Judah'; the opening particle emphasizes that Judah, like Israel, was likewise guilty.
    reason: lexical_alternative
  - marker: b
    text: Or 'walked according to the statutes of Israel' or 'followed the customs that Israel had made.'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  lexicon: HALOT
  rationale: 'Fronted particle adds emphasis in context: Judah too, not only Israel, was guilty. ''Even'' captures the emphatic force better than a flat ''also.'''
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the southern kingdom; transliterated as a name per translation philosophy.
- source_word: שָׁמַר
  chosen: keep
  alternatives:
  - observe
  - guard
  lexicon: HALOT
  rationale: In covenantal/legal contexts, שׁמר commonly means to keep or observe commandments. 'Keep' is idiomatic and concise in modern English.
- source_word: מִצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: HALOT
  rationale: Plural construct with YHWH; 'commandments' preserves the formal covenantal sense better than the slightly looser 'commands.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - its God
  lexicon: HALOT
  rationale: The Hebrew has a 3mp suffix, literally 'their God.' Although Judah is grammatically singular as a collective entity, English naturally renders the people represented by Judah with 'their,' preserving the Hebrew suffix without awkwardness.
- source_word: וַיֵּלְכוּ
  chosen: but walked
  alternatives:
  - and they walked
  - followed
  lexicon: HALOT
  rationale: הלך with ב often expresses conduct according to a pattern. 'Walked in' preserves the Hebrew metaphor. 'But' brings out the adversative sense in English between failing to keep God's commandments and following Israel's statutes.
- source_word: בְּחֻקּוֹת
  chosen: in the statutes
  alternatives:
  - according to the statutes
  - in the customs
  lexicon: HALOT
  rationale: חֻקּוֹת can mean statutes, ordinances, or prescribed customs. Here 'statutes' maintains the legal-religious nuance and echoes the covenantal register of the verse.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Refers here to the northern kingdom in context; standard transliteration retained.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that Israel had made
  alternatives:
  - which they practiced
  - that they had established
  lexicon: HALOT
  rationale: עשה with statutes can mean to make, establish, or practice. Because the relative clause's nearest explicit antecedent is 'Israel,' rendering the implicit subject as 'Israel' makes the English clear while staying close to the Hebrew sense of instituting these statutes.
