id: 2KI.17.10
reference: 2 Kings 17:10
source:
  edition: WLC
  text: וַ/יַּצִּ֧בוּ לָ/הֶ֛ם מַצֵּב֖וֹת וַ/אֲשֵׁרִ֑ים עַ֚ל כָּל גִּבְעָ֣ה גְבֹהָ֔ה
    וְ/תַ֖חַת כָּל עֵ֥ץ רַעֲנָֽן־־׃
translation:
  text: They set up for themselves pillars and Asherah poles on every high hill and
    under every green tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Asherim'; the Hebrew term refers to cult objects associated with Asherah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצִּבוּ
  chosen: They set up
  alternatives:
  - They erected
  - They stationed
  lexicon: HALOT
  rationale: From נצב in the Hiphil, here meaning to set up or erect cultic objects.
    'Set up' is natural modern English and fits the idolatrous-installation context.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The dative pronoun indicates these objects were established for their
    own use/benefit. 'For themselves' brings out the reflexive sense in idiomatic
    English.
- source_word: מַצֵּבוֹת
  chosen: pillars
  alternatives:
  - sacred pillars
  - standing stones
  lexicon: HALOT
  rationale: Refers to erected cultic stone pillars. 'Pillars' is concise and readable;
    'sacred pillars' is interpretive but valid. The cultic sense is clear from context.
- source_word: וַאֲשֵׁרִים
  chosen: Asherah poles
  alternatives:
  - Asherim
  - Asherah images
  lexicon: HALOT
  rationale: The term can denote cult objects associated with Asherah rather than
    necessarily the goddess herself. 'Asherah poles' is a widely understood English
    rendering that communicates the likely referent while preserving the connection
    to Asherah.
- source_word: עַל כָּל גִּבְעָה גְבֹהָה
  chosen: on every high hill
  alternatives:
  - on every lofty hill
  - upon every high hill
  lexicon: HALOT
  rationale: A standard Hebrew idiom for illicit worship sites. 'High hill' preserves
    the physical imagery without archaic diction.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  chosen: and under every green tree
  alternatives:
  - and under every leafy tree
  - and under every luxuriant tree
  lexicon: HALOT
  rationale: רַעֲנָן denotes luxuriant, fresh, or green foliage. 'Green tree' preserves
    the familiar biblical idiom and the cultic-location formula found elsewhere in
    the Hebrew Bible.
