theological_decisions:
- issue: Rendering of אֲשֵׁרִים
  chosen_reading: Asherah poles
  alternative_readings:
  - Asherim
  - wooden images of Asherah
  rationale: The Hebrew plural most naturally refers to cultic objects associated
    with Asherah. Rendering it as 'Asherah poles' avoids flattening it into a generic
    idol term while remaining accessible to modern readers.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
