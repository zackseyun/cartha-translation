id: 2KI.17.1
reference: 2 Kings 17:1
source:
  edition: WLC
  text: בִּ/שְׁנַת֙ שְׁתֵּ֣ים עֶשְׂרֵ֔ה לְ/אָחָ֖ז מֶ֣לֶךְ יְהוּדָ֑ה מָ֠לַךְ הוֹשֵׁ֨עַ
    בֶּן אֵלָ֧ה בְ/שֹׁמְר֛וֹן עַל יִשְׂרָאֵ֖ל תֵּ֥שַׁע שָׁנִֽים־־׃
translation:
  text: In the twelfth year of Ahaz king of Judah, Hoshea son of Elah began to reign
    in Samaria over Israel, and he reigned nine years.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁתֵּים עֶשְׂרֵה
  chosen: In the twelfth year
  alternatives:
  - In year twelve
  - In the twelfth year of
  lexicon: HALOT
  rationale: 'The construct phrase with prefixed ב marks time: ''in the twelfth year.''
    English idiom prefers the ordinal form ''twelfth'' rather than the more literal
    ''twelve.'''
- source_word: לְ/אָחָז מֶלֶךְ יְהוּדָה
  chosen: of Ahaz king of Judah
  alternatives:
  - of Ahaz, the king of Judah
  lexicon: HALOT
  rationale: The ל marks the regnal reference point ('of Ahaz'). The appositional
    'king of Judah' is retained straightforwardly.
- source_word: מָלַךְ
  chosen: began to reign
  alternatives:
  - reigned
  - became king
  lexicon: HALOT
  rationale: In regnal formulas, the qatal of מלך commonly introduces accession ('became
    king/began to reign'), not merely the whole duration of rule. Since the verse
    later specifies the length of reign, 'began to reign' avoids redundancy and matches
    English regnal style.
- source_word: הוֹשֵׁעַ בֶּן אֵלָה
  chosen: Hoshea son of Elah
  alternatives:
  - Hoshea the son of Elah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Son of' is the natural English rendering of the patronymic.
- source_word: בְ/שֹׁמְרֹון
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: The prefixed ב indicates location. 'In Samaria' is the most natural English
    rendering for the capital city as the place from which he ruled.
- source_word: עַל יִשְׂרָאֵל
  chosen: over Israel
  alternatives:
  - over the kingdom of Israel
  - over the Israelites
  lexicon: HALOT
  rationale: עַל with מלך in regnal contexts means ruling over a people/kingdom. 'Over
    Israel' preserves the concise Hebrew wording without expanding beyond the text.
- source_word: תֵּשַׁע שָׁנִים
  chosen: nine years
  lexicon: HALOT
  rationale: Direct rendering of the duration phrase. Because English style often
    repeats the verb in such formulas, 'and he reigned nine years' is supplied in
    the full sentence to make the duration attach clearly to Hoshea's reign.
