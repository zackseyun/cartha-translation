id: 2KI.17.6
reference: 2 Kings 17:6
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת הַ/תְּשִׁיעִ֜ית לְ/הוֹשֵׁ֗עַ לָכַ֤ד מֶֽלֶךְ אַשּׁוּר֙ אֶת שֹׁ֣מְר֔וֹן
    וַ/יֶּ֥גֶל אֶת יִשְׂרָאֵ֖ל אַשּׁ֑וּרָ/ה וַ/יֹּ֨שֶׁב אֹתָ֜/ם בַּ/חְלַ֧ח וּ/בְ/חָב֛וֹר
    נְהַ֥ר גּוֹזָ֖ן וְ/עָרֵ֥י מָדָֽי־־־׃פ
translation:
  text: In the ninth year of Hoshea, the king of Assyria captured Samaria and carried
    Israel away into Assyria, and settled them in Halah, and on the Habor, the river
    of Gozan, and in the cities of Media.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exiled Israel to Assyria' or 'deported Israel to Assyria.' The Hebrew
      verb denotes forced removal into exile.
    reason: lexical_alternative
  - marker: b
    text: Or 'and by the Habor, the river of Gozan.' The Hebrew may describe settlement
      along the Habor River in the region of Gozan.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת הַ/תְּשִׁיעִית
  chosen: In the ninth year
  alternatives:
  - In year nine
  - In the ninth year
  lexicon: HALOT
  rationale: Standard temporal construction with ב + construct 'year' + ordinal, naturally
    rendered as an English temporal phrase.
- source_word: לְ/הוֹשֵׁעַ
  chosen: of Hoshea
  alternatives:
  - for Hoshea
  - belonging to Hoshea
  lexicon: HALOT
  rationale: 'The ל marks regnal reference here: the ninth year of Hoshea''s reign,
    not advantage or possession in a broader sense.'
- source_word: לָכַד
  chosen: captured
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: For a city, 'captured' is the most idiomatic military rendering in modern
    English and preserves the force of conquest.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly; the definite sense is natural
    in English historical narrative.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration for the city name.
- source_word: וַ/יֶּגֶל
  chosen: carried ... away
  alternatives:
  - exiled
  - deported
  lexicon: HALOT
  rationale: From גלה in the causative sense of removing into exile. 'Carried away'
    preserves the narrative idiom and the forced movement without overtechnical language.
    'Exiled' and 'deported' are viable but slightly more interpretive or modern-administrative.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - the Israelites
  lexicon: HALOT
  rationale: The text names the people/nation collectively as 'Israel.' Retaining
    the proper name preserves the corporate-national sense.
- source_word: אַשּׁוּרָה
  chosen: into Assyria
  alternatives:
  - to Assyria
  lexicon: HALOT
  rationale: The directional he indicates motion toward/into Assyria; 'into Assyria'
    best reflects relocation into the land.
- source_word: וַ/יֹּשֶׁב
  chosen: settled
  alternatives:
  - caused to dwell
  - placed
  - resettled
  lexicon: HALOT
  rationale: Hiphil of ישׁב here means causing them to dwell in specified locations.
    'Settled' is natural English and fits the deportation context. 'Resettled' is
    possible but slightly more explicit than the Hebrew.
- source_word: בַּ/חְלַח
  chosen: in Halah
  lexicon: HALOT
  rationale: Place name with prefixed preposition; standard transliteration.
- source_word: וּ/בְ/חָבֹור
  chosen: and on the Habor
  alternatives:
  - and in Habor
  - and by the Habor
  lexicon: HALOT
  rationale: Because the next phrase appositionally identifies Habor with a river,
    'on the Habor' is idiomatic for settlement along a river. This avoids obscuring
    that Habor is not merely a town here.
- source_word: נְהַר גּוֹזָן
  chosen: the river of Gozan
  alternatives:
  - the river Gozan
  - the Gozan River
  lexicon: HALOT
  rationale: Construct chain rendered transparently. This likely apposes/explains
    Habor as a river associated with Gozan.
- source_word: וְ/עָרֵי מָדָי
  chosen: and in the cities of Media
  alternatives:
  - and the cities of the Medes
  lexicon: HALOT
  rationale: מָדָי is the place/people name Media/Medes. 'Cities of Media' is a clear
    geographic rendering in this deportation list.
