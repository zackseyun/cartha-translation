id: 2KI.17.8
reference: 2 Kings 17:8
source:
  edition: WLC
  text: וַ/יֵּֽלְכוּ֙ בְּ/חֻקּ֣וֹת הַ/גּוֹיִ֔ם אֲשֶׁר֙ הוֹרִ֣ישׁ יְהוָ֔ה מִ/פְּנֵ֖י
    בְּנֵ֣י יִשְׂרָאֵ֑ל וּ/מַלְכֵ֥י יִשְׂרָאֵ֖ל אֲשֶׁ֥ר עָשֽׂוּ׃
translation:
  text: And they walked in the statutes of the nations whom the LORD had dispossessed
    before the sons of Israel, and in what the kings of Israel had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'walked according to the customs of the nations.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whom the LORD had driven out before the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Israel'; that is, the Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: they walked
  alternatives:
  - they followed
  - they lived
  lexicon: HALOT
  rationale: הלך literally means 'to walk,' and in covenantal/ethical contexts commonly
    denotes conduct or manner of life. 'Walked' preserves the Hebrew metaphor while
    remaining natural English.
- source_word: בְּחֻקּוֹת
  chosen: in the statutes
  alternatives:
  - according to the statutes
  - in the customs
  - in the ordinances
  lexicon: HALOT
  rationale: חֻקּוֹת often refers to prescribed statutes or fixed practices. Here
    it describes the patterned practices adopted from the nations. 'Statutes' preserves
    the formal sense better than the looser 'customs,' though the latter is a possible
    nuance.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם in this historical context refers to the non-Israelite nations
    of the land. 'Nations' is the most standard and least theologically loaded rendering
    here.
- source_word: אֲשֶׁר הוֹרִישׁ יְהוָה מִפְּנֵי
  chosen: whom the LORD had dispossessed before
  alternatives:
  - whom the LORD had driven out before
  - whom the LORD had cast out before
  lexicon: HALOT
  rationale: הוֹרִישׁ in Hiphil can mean to dispossess or drive out. 'Dispossessed'
    captures the transfer-of-land nuance, while 'before' reflects מִפְּנֵי in the
    sense of 'from before/in front of.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per the translation philosophy,
    gender-accurate rendering is preferred where it matches the source. The phrase
    is a standard ethnic designation, but retaining 'sons of Israel' keeps the formal
    texture of the Hebrew.
- source_word: וּמַלְכֵי יִשְׂרָאֵל אֲשֶׁר עָשׂוּ
  chosen: and in what the kings of Israel had done
  alternatives:
  - and in the practices that the kings of Israel had made
  - and in the deeds of the kings of Israel which they had done
  lexicon: HALOT
  rationale: 'The clause is elliptical in Hebrew: literally ''and [the] kings of Israel
    which they did/made.'' English requires smoothing. ''In what the kings of Israel
    had done'' best carries forward the sense that Israel followed both pagan statutes
    and royal innovations/practices.'
