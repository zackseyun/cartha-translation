theological_decisions:
- issue: Referent of the final singular suffix מִמֶּנָּה after plural 'sins'
  chosen_reading: Render idiomatically as 'from them,' referring to Jeroboam's sins
    collectively.
  alternative_readings:
  - from it, referring to the sinful way/pattern as a collective singular
  rationale: The Hebrew singular suffix after a plural antecedent can function collectively.
    English requires a clearer referent; 'from them' best matches the immediately
    preceding plural while preserving the sense that Israel persisted in Jeroboam's
    sinful practices.
  doctrine_reference: Translation philosophy §1, §5
