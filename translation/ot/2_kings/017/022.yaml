id: 2KI.17.22
reference: 2 Kings 17:22
source:
  edition: WLC
  text: וַ/יֵּֽלְכוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל בְּ/כָל חַטֹּ֥אות יָרָבְעָ֖ם אֲשֶׁ֣ר עָשָׂ֑ה
    לֹא סָ֖רוּ מִמֶּֽ/נָּה־־׃
translation:
  text: And the children of Israel walked in all the sins that Jeroboam had committed;
    they did not turn away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from it''; the singular likely refers collectively to the sinful
      way or pattern just mentioned.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: walked
  alternatives:
  - went
  - lived
  lexicon: HALOT
  rationale: הלך with ב can idiomatically mean to walk in or follow a course of conduct.
    'Walked' preserves the Hebrew metaphor and is natural English in a moral/religious
    context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the Israelites
  - the sons of Israel
  lexicon: HALOT
  rationale: A literal rendering preserves the covenantal-national expression. 'Israelites'
    is possible, but 'children of Israel' better reflects the Hebrew construct and
    remains readable.
- source_word: בְּכָל
  chosen: in all
  alternatives:
  - according to all
  - in every
  lexicon: HALOT
  rationale: 'The preposition with ''all'' is best carried over straightforwardly:
    they walked ''in all'' the sins, meaning in the full pattern of those sins.'
- source_word: חַטֹּאות
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: HALOT
  rationale: The plural noun refers to concrete sinful practices. 'Sins' is the most
    direct and standard rendering.
- source_word: עָשָׂה
  chosen: had committed
  alternatives:
  - had done
  - made
  lexicon: HALOT
  rationale: Although the verb is literally 'did/made,' in English 'committed' fits
    naturally with 'sins' and conveys the moral force without adding content beyond
    the context.
- source_word: לֹא סָרוּ
  chosen: did not turn away
  alternatives:
  - did not depart
  - did not turn aside
  lexicon: HALOT
  rationale: סור commonly means to turn aside or depart. 'Did not turn away' communicates
    continued persistence in the sinful pattern.
- source_word: מִמֶּנָּה
  chosen: from them
  alternatives:
  - from it
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, likely referring collectively
    to the sinful way/pattern just described, but English idiom naturally refers back
    to the plural 'sins' as 'them.' This is an optimal-equivalence adjustment for
    clarity.
