id: 2KI.17.38
reference: 2 Kings 17:38
source:
  edition: WLC
  text: וְ/הַ/בְּרִ֛ית אֲשֶׁר כָּרַ֥תִּי אִתְּ/כֶ֖ם לֹ֣א תִשְׁכָּ֑חוּ וְ/לֹ֥א תִֽירְא֖וּ
    אֱלֹהִ֥ים אֲחֵרִֽים־׃
translation:
  text: And the covenant that I made with you, you shall not forget, and you shall
    not fear other gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the covenant that I cut with you.' 'Made' renders the
      Hebrew covenant-making idiom in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'do not fear other gods.' The Hebrew form can be rendered with either
      'you shall not' or 'do not' in English.
    reason: alternative_reading
lexical_decisions:
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - the treaty
  - the agreement
  lexicon: HALOT
  rationale: בְּרִית in covenantal contexts is best rendered 'covenant,' preserving
    the formal and theological sense of a binding relationship established by God,
    rather than the flatter 'agreement.'
- source_word: אֲשֶׁר כָּרַתִּי אִתְּכֶם
  chosen: that I made with you
  alternatives:
  - that I cut with you
  - which I made with you
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'cut a covenant.' In natural English, 'made
    a covenant with you' communicates the sense accurately without obscuring meaning.
    'That' is smoother than 'which' in modern English.
- source_word: לֹא תִשְׁכָּחוּ
  chosen: you shall not forget
  alternatives:
  - do not forget
  - you must not forget
  lexicon: HALOT
  rationale: The imperfect with לֹא here functions as a prohibition/instruction. 'You
    shall not forget' preserves the covenantal, directive tone and fits the surrounding
    sequence of commands.
- source_word: וְלֹא תִירְאוּ
  chosen: and you shall not fear
  alternatives:
  - and do not fear
  - and you shall not revere
  lexicon: HALOT
  rationale: יָרֵא can mean fear or revere depending on context. Here, in parallel
    with prohibition against other gods, 'fear' is the standard covenantal expression
    for religious allegiance and is preferable to the more interpretive 'revere.'
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  - other deities
  lexicon: HALOT
  rationale: The phrase regularly denotes gods besides the God of Israel. 'Other gods'
    is the most direct and idiomatic rendering, preserving the biblical covenant formula.
