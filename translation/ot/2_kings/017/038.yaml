theological_decisions:
- issue: Covenantal idiom and tone of prohibition
  chosen_reading: 'Render the verse as covenantal instruction: ''the covenant that
    I made with you, you shall not forget, and you shall not fear other gods.'''
  alternative_readings:
  - 'Use imperative style: ''Do not forget... and do not fear...'''
  - Render ירא as 'revere' to emphasize worship
  rationale: The Hebrew presents covenant language followed by prohibitions addressed
    to the people. Retaining 'covenant' and 'fear other gods' preserves the theological
    texture of exclusive allegiance to the LORD without over-interpreting the nuance
    as merely emotional fear or generalized respect.
  doctrine_reference: 'Translation philosophy §§1, 3, 5; Contested terms: יְהוָה entry
    relevant to covenant context though not present in this verse'
