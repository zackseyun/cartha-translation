id: 2KI.17.7
reference: 2 Kings 17:7
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּֽי חָטְא֤וּ בְנֵֽי יִשְׂרָאֵל֙ לַ/יהוָ֣ה אֱלֹהֵי/הֶ֔ם הַ/מַּעֲלֶ֤ה
    אֹתָ/ם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם מִ/תַּ֕חַת יַ֖ד פַּרְעֹ֣ה מֶֽלֶךְ מִצְרָ֑יִם וַ/יִּֽירְא֖וּ
    אֱלֹהִ֥ים אֲחֵרִֽים־־־׃
translation:
  text: And this happened because the children of Israel had sinned against the LORD
    their God, who had brought them up from the land of Egypt, from under the hand
    of Pharaoh king of Egypt, and they feared other gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from under Pharaoh’s power.' The Hebrew idiom is literally 'from under
      the hand of Pharaoh.'
    reason: lexical_alternative
  - marker: b
    text: Or 'worshiped other gods.' The Hebrew says 'feared other gods,' using the
      common verb for fear/reverence that can include worshipful devotion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּי
  chosen: And this happened because
  alternatives:
  - And it came to pass, because
  - Now it was because
  lexicon: HALOT
  rationale: The idiom ויהי כי introduces an explanatory narrative development. 'And
    this happened because' preserves the causal force of כי and renders the clause
    in readable modern English without archaic 'it came to pass.'
- source_word: חָטְאוּ
  chosen: had sinned
  alternatives:
  - sinned
  - offended
  lexicon: HALOT
  rationale: The verb חטא means 'to sin' or 'miss the mark.' 'Had sinned' fits the
    explanatory, retrospective sense in context, grounding the following judgment.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the Israelites
  - the sons of Israel
  lexicon: HALOT
  rationale: The phrase literally means 'sons/children of Israel.' 'The children of
    Israel' preserves the traditional covenantal-national expression more closely
    than the more interpretive 'Israelites,' while remaining natural English.
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  lexicon: HALOT
  rationale: With חטא, the preposition here is idiomatically rendered 'sin against.'
    Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: 'Construct with pronominal suffix: ''their God.'' This preserves the
    covenant relationship emphasized in the verse.'
- source_word: הַמַּעֲלֶה אֹתָם
  chosen: who had brought them up
  alternatives:
  - who brought them up
  - the one bringing them up
  lexicon: HALOT
  rationale: The participle functions substantivally/appositionally describing the
    LORD by his redemptive act. English past perfect fits the retrospective explanation.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  lexicon: HALOT
  rationale: Standard geographic expression. 'From the land of Egypt' is clear and
    sufficiently formal.
- source_word: מִתַּחַת יַד פַּרְעֹה
  chosen: from under the hand of Pharaoh
  alternatives:
  - from under Pharaoh's power
  - from the power of Pharaoh
  lexicon: HALOT
  rationale: The idiom 'under the hand of' denotes domination or control. The more
    literal rendering is retained in the main text to preserve the Hebrew imagery;
    a smoother alternative is worth noting.
- source_word: וַיִּירְאוּ
  chosen: and they feared
  alternatives:
  - and they revered
  - and they worshiped
  lexicon: HALOT
  rationale: ' ירא with gods can denote fear/reverence expressed in worship. ''Feared''
    is the lexical core and preserves the Hebrew wording; ''worshiped'' would be interpretive.'
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly means 'other gods.' 'Foreign gods' is possible
    in some contexts, but 'other gods' better matches the Hebrew adjective and the
    covenantal prohibition language.
