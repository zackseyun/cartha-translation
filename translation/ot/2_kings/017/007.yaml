theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether וַיִּירְאוּ אֱלֹהִים אֲחֵרִים should be rendered more interpretively
    as worship
  chosen_reading: and they feared other gods
  alternative_readings:
  - and they worshiped other gods
  - and they revered other gods
  rationale: The Hebrew verb is ירא ('fear'). Although in context this fear entails
    idolatrous worship, the text itself uses the broader term. Preserving 'feared'
    avoids importing a narrower doctrinal or cultic claim beyond the wording, while
    still conveying the covenant violation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense; do not paraphrase beyond what the source warrants'
