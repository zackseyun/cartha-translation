id: 2KI.17.28
reference: 2 Kings 17:28
source:
  edition: WLC
  text: וַ/יָּבֹ֞א אֶחָ֣ד מֵ/הַ/כֹּהֲנִ֗ים אֲשֶׁ֤ר הִגְלוּ֙ מִ/שֹּׁ֣מְר֔וֹן וַ/יֵּ֖שֶׁב
    בְּ/בֵֽית אֵ֑ל וַֽ/יְהִי֙ מוֹרֶ֣ה אֹתָ֔/ם אֵ֖יךְ יִֽירְא֥וּ אֶת יְהוָֽה־־׃
translation:
  text: Then one of the priests whom they had exiled from Samaria came and lived in
    Bethel, and he taught them how they should fear the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD'';
      alternatively ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence better than a bare 'and.'
- source_word: אֶחָד מֵהַכֹּהֲנִים
  chosen: one of the priests
  alternatives:
  - a certain priest from among the priests
  lexicon: HALOT
  rationale: The idiom straightforwardly indicates one individual selected from a
    larger group of priests.
- source_word: אֲשֶׁר הִגְלוּ מִשֹּׁמְרוֹן
  chosen: whom they had exiled from Samaria
  alternatives:
  - whom they had carried away from Samaria
  - who had been exiled from Samaria
  lexicon: HALOT
  rationale: The Hiphil of גלה commonly means 'take into exile' or 'deport.' The plural
    verb has an unspecified subject ('they'), which English can preserve. 'Exiled'
    is more natural and precise than 'carried away.'
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - settled
  lexicon: HALOT
  rationale: ישב here denotes taking up residence. 'Lived' is idiomatic modern English;
    'settled' could imply a stronger sense of permanent establishment than the context
    requires.
- source_word: בְּבֵית אֵל
  chosen: in Bethel
  alternatives:
  - at Bethel
  lexicon: HALOT
  rationale: As a place name, בֵּית אֵל is transliterated 'Bethel' per translation
    philosophy. 'In Bethel' is the most natural locative rendering.
- source_word: וַיְהִי מוֹרֶה
  chosen: and he taught
  alternatives:
  - and he became a teacher to them
  - and he was teaching them
  lexicon: HALOT
  rationale: The construction with היה + participle can express ongoing or characteristic
    action. In context it introduces his role/function, and simple past 'he taught'
    communicates this clearly in English narrative style.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the people just discussed in context.
- source_word: אֵיךְ יִירְאוּ
  chosen: how they should fear
  alternatives:
  - how to fear
  - how they might fear
  lexicon: HALOT
  rationale: The clause expresses instruction in the proper manner of fearing the
    LORD. 'How they should fear' brings out the instructional/normative sense better
    than the more mechanical 'how to fear.'
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated.
