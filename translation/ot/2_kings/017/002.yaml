id: 2KI.17.2
reference: 2 Kings 17:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה רַ֗ק לֹ֚א כְּ/מַלְכֵ֣י יִשְׂרָאֵ֔ל
    אֲשֶׁ֥ר הָי֖וּ לְ/פָנָֽי/ו׃
translation:
  text: He did what was evil in the eyes of the LORD, yet not like the kings of Israel
    who were before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'only, not like the kings of Israel who were before him.' The Hebrew
      particle can be rendered more literally as 'only,' introducing a qualification
      to the judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה introduces the narrative action. English normally omits
    the initial conjunction in smooth narrative, so 'He did' best reflects the sense
    without unnecessary stiffness.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: 'The adjective with article functions substantivally: ''the evil'' =
    ''what was evil.'' This is a standard idiom in evaluative royal formulas and is
    more natural in English than the overly literal ''the evil.'''
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This idiom expresses evaluation from a person's perspective. 'In the
    eyes of' preserves the Hebrew image while remaining clear in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established convention and the stated translation policy for YHWH.
- source_word: רַק
  chosen: yet
  alternatives:
  - only
  - except that
  - nevertheless
  lexicon: HALOT
  rationale: 'Here רַק introduces a qualification to the negative evaluation: he was
    evil, but with a mitigating comparison. ''Yet'' communicates this adversative
    nuance more naturally than the more wooden ''only.'''
- source_word: לֹא כְּמַלְכֵי יִשְׂרָאֵל
  chosen: not like the kings of Israel
  alternatives:
  - not as the kings of Israel
  - not like Israel's kings
  lexicon: HALOT
  rationale: The comparative כ with negation is straightforward. 'Not like the kings
    of Israel' is clear and close to the Hebrew structure.
- source_word: אֲשֶׁר הָיוּ לְפָנָיו
  chosen: who were before him
  alternatives:
  - who came before him
  - who preceded him
  lexicon: HALOT
  rationale: Literally 'who were before him,' referring to prior kings. This wording
    preserves the Hebrew idiom while remaining intelligible; 'came before him' is
    possible but slightly more interpretive.
