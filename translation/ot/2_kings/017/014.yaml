id: 2KI.17.14
reference: 2 Kings 17:14
source:
  edition: WLC
  text: וְ/לֹ֖א שָׁמֵ֑עוּ וַ/יַּקְשׁ֤וּ אֶת עָרְפָּ/ם֙ כְּ/עֹ֣רֶף אֲבוֹתָ֔/ם אֲשֶׁר֙
    לֹ֣א הֶאֱמִ֔ינוּ בַּֽ/יהוָ֖ה אֱלֹהֵי/הֶֽם־׃
translation:
  text: But they would not listen; they stiffened their neck like the neck of their
    fathers, who did not believe in the LORD their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not trust the LORD their God.' The Hebrew verb can denote belief
      or trust in a covenantal sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמֵעוּ
  chosen: would not listen
  alternatives:
  - did not listen
  - obey
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear/listen,' and in covenant contexts can shade
    into 'obey.' Here the immediate contrast with stubbornness supports 'listen' while
    preserving the refusal implied by the negative. 'Would not listen' captures volitional
    resistance better than a bare past tense.
- source_word: וַיַּקְשׁוּ
  chosen: they stiffened
  alternatives:
  - hardened
  - made stubborn
  lexicon: HALOT
  rationale: From קשׁה in the causative sense, describing making something hard/stiff.
    With 'neck' as object, the idiom in English is best rendered 'stiffened their
    neck,' preserving the Hebrew metaphor rather than flattening it to 'became stubborn.'
- source_word: עָרְפָּם
  chosen: their neck
  alternatives:
  - their nape
  lexicon: HALOT
  rationale: עֹרֶף refers to the neck/nape. 'Neck' is the standard English equivalent
    and works naturally in the biblical idiom 'stiffen the neck.' Singular collective
    is retained, matching the Hebrew idiom.
- source_word: כְּעֹרֶף אֲבוֹתָם
  chosen: like the neck of their fathers
  alternatives:
  - like their fathers' neck
  - as their fathers did
  lexicon: HALOT
  rationale: The Hebrew comparison is explicitly with 'the neck of their fathers,'
    not merely with their fathers' behavior. Retaining the concrete image preserves
    the rhetorical force and parallelism.
- source_word: הֶאֱמִינוּ
  chosen: did not believe
  alternatives:
  - did not trust
  - were not faithful to
  lexicon: HALOT
  rationale: The Hiphil of אמן with ב marks placing trust/belief in someone. 'Believe
    in' is the most direct rendering here. 'Trust' is possible, but 'believe in' better
    reflects the established covenantal-religious sense without importing later doctrinal
    nuance.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition ב is retained with 'believe in.'
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: Construct with pronominal suffix identifies YHWH as 'their God.' This
    should be retained explicitly in English because it is covenantally significant.
- source_word: וְלֹא
  chosen: But
  alternatives:
  - And not
  - Yet
  lexicon: HALOT
  rationale: The conjunction plus negation introduces a contrast with the preceding
    divine warnings and calls to repentance. 'But' communicates the adversative force
    more naturally in English than a wooden 'and not.'
