theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. This
    verse contains no contextual reason to depart from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render אמן as 'believe' or 'trust'
  chosen_reading: did not believe in the LORD their God
  alternative_readings:
  - did not trust the LORD their God
  rationale: Both are lexically defensible, but 'believe in' more closely mirrors
    the Hebrew construction and preserves the covenantal accusation without interpretive
    expansion. No doctrinal controversy is being resolved beyond lexical precision.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
