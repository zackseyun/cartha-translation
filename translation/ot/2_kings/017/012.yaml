id: 2KI.17.12
reference: 2 Kings 17:12
source:
  edition: WLC
  text: וַ/יַּֽעַבְד֖וּ הַ/גִּלֻּלִ֑ים אֲשֶׁ֨ר אָמַ֤ר יְהוָה֙ לָ/הֶ֔ם לֹ֥א תַעֲשׂ֖וּ אֶת הַ/דָּבָ֥ר הַ/זֶּֽה־׃
translation:
  text: They served the idols, concerning which Yahweh had said to them, “You shall not do this thing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew גִּלֻּלִים is a contemptuous term for idols, carrying a derogatory nuance such as 'filthy idols' or 'dung-idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  chosen: They served
  alternatives:
  - They worshiped
  lexicon: HALOT
  rationale: The verb עבד commonly means 'serve' and is often used for religious service/worship. 'Served' preserves the lexical link to covenantal service language and avoids over-paraphrasing, while still clearly implying cultic devotion in context.
- source_word: הַגִּלֻּלִים
  chosen: the idols
  alternatives:
  - the dung-idols
  - the filthy idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols. 'Idols' is the clearest natural English rendering; the more vivid derogatory force is real but difficult to preserve idiomatically in the main text without sounding interpretive. The pejorative nuance is worth preserving in a footnote.
- source_word: אֲשֶׁר
  chosen: about which
  alternatives:
  - which
  - concerning which
  lexicon: HALOT
  rationale: The relative particle introduces the matter on which the LORD had spoken. 'About which' makes the English syntax natural with 'said to them' and clarifies that the following prohibition concerns the idols/idolatrous practice.
- source_word: אָמַר יְהוָה לָהֶם
  chosen: the LORD had said to them
  alternatives:
  - the LORD said to them
  lexicon: HALOT
  rationale: The qatal after the narrative wayyiqtol is well represented in English as pluperfect here, indicating prior divine command relative to their later action. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: לֹא תַעֲשׂוּ
  chosen: You shall not do
  alternatives:
  - Do not do
  - You must not do
  lexicon: HALOT
  rationale: The imperfect in direct prohibition is naturally rendered 'You shall not do' in biblical legal/covenantal style. This preserves the formal force of divine command without archaic excess.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this
  - this matter
  lexicon: HALOT
  rationale: דָּבָר here refers broadly to the prohibited act/practice. 'This thing' is a natural and sufficiently formal rendering that reflects the Hebrew expression without flattening it to a bare 'this'.
