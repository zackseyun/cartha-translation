id: 2KI.17.3
reference: 2 Kings 17:3
source:
  edition: WLC
  text: עָלָ֣י/ו עָלָ֔ה שַׁלְמַנְאֶ֖סֶר מֶ֣לֶךְ אַשּׁ֑וּר וַֽ/יְהִי ל֤/וֹ הוֹשֵׁ֨עַ֙
    עֶ֔בֶד וַ/יָּ֥שֶׁב ל֖/וֹ מִנְחָֽה־׃
translation:
  text: Shalmaneser king of Assyria came up against him, and Hoshea became his servant
    and paid him tribute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became his vassal.' The Hebrew literally says 'became his servant,'
      using political subordination language.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה עָלָיו
  chosen: came up against him
  alternatives:
  - came up against him
  - attacked him
  - marched against him
  lexicon: HALOT
  rationale: The idiom עָלָה עַל in military contexts commonly means to advance against
    or attack. 'Came up against him' preserves the Hebrew idiom while remaining natural
    English and avoids overstating the action as a full assault if the text only states
    the advance.
- source_word: שַׁלְמַנְאֶסֶר
  chosen: Shalmaneser
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: 'Construct phrase identifying Shalmaneser by title and realm. English
    apposition without the article is natural here: ''Shalmaneser king of Assyria.'''
- source_word: וַיְהִי לוֹ ... עֶבֶד
  chosen: became his servant
  alternatives:
  - was his servant
  - became his vassal
  - became his slave
  lexicon: HALOT
  rationale: 'The construction indicates a change of status: Hoshea came to be subject
    to Shalmaneser. ''Servant'' fits the political-vassal context better than ''slave,''
    since this is international subjection rather than personal chattel slavery. ''Vassal''
    is precise but more technical; ''servant'' is more readable while still faithful.'
- source_word: וַיָּשֶׁב לוֹ מִנְחָה
  chosen: paid him tribute
  alternatives:
  - brought him tribute
  - rendered him tribute
  - returned to him tribute
  lexicon: HALOT
  rationale: In this political context, מִנְחָה refers to tribute paid by a subordinate
    ruler, and שוב with ל conveys rendering or paying. 'Paid him tribute' is idiomatic
    modern English and captures the vassal relationship.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  lexicon: HALOT
  rationale: Although מִנְחָה can mean gift or offering in other contexts, here the
    geopolitical setting clearly indicates tribute from a subordinate king.
