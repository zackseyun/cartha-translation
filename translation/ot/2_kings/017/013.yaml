theological_decisions:
- issue: Referent of 'that I sent to you'
  chosen_reading: The clause refers to the covenantal instruction/law being sent through
    the prophets, not merely to the prophets themselves.
  alternative_readings:
  - The clause refers more loosely to the prophetic messages as a whole.
  - The clause resumes the command to turn and keep, rather than specifically 'the
    law'.
  rationale: Syntactically, the relative clause most naturally continues the description
    of the law/commanded instruction, while contextually affirming that the same covenant
    demands were mediated afresh through the prophets. The English wording preserves
    this linkage without over-explaining it.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
