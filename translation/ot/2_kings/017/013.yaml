id: 2KI.17.13
reference: 2 Kings 17:13
source:
  edition: WLC
  text: וַ/יָּ֣עַד יְהוָ֡ה בְּ/יִשְׂרָאֵ֣ל וּ/בִ/יהוּדָ֡ה בְּ/יַד֩ כָּל נביא/ו כָל
    חֹזֶ֜ה לֵ/אמֹ֗ר שֻׁ֝֠בוּ מִ/דַּרְכֵי/כֶ֤ם הָֽ/רָעִים֙ וְ/שִׁמְרוּ֙ מִצְוֺתַ֣/י
    חֻקּוֹתַ֔/י כְּ/כָ֨ל הַ/תּוֹרָ֔ה אֲשֶׁ֥ר צִוִּ֖יתִי אֶת אֲבֹֽתֵי/כֶ֑ם וַֽ/אֲשֶׁר֙
    שָׁלַ֣חְתִּי אֲלֵי/כֶ֔ם בְּ/יַ֖ד עֲבָדַ֥/י הַ/נְּבִיאִֽים־־־־׃
translation:
  text: Yet the LORD warned Israel and Judah by every one of his prophets and every
    seer, saying, “Turn from your evil ways and keep my commandments and my statutes,
    according to all the law that I commanded your fathers and that I sent to you
    by my servants the prophets.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'testified against Israel and Judah.' The Hebrew verb can carry the sense
      of solemn warning or testimony.
    reason: lexical_alternative
  - marker: b
    text: '''Your fathers'' may also be understood as ''your ancestors.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'through my servants the prophets.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַד
  chosen: warned
  alternatives:
  - testified against
  - admonished
  - solemnly warned
  lexicon: HALOT
  rationale: The verb עוּד in the Hiphil commonly carries the sense of giving solemn
    warning or testimony. In this context, with a direct exhortation following and
    judgment in the broader passage, 'warned' best captures the force in natural English.
    'Testified against' is more formal but less idiomatic here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding reverential convention and the LXX/English Bible pattern.
- source_word: בְּיִשְׂרָאֵל וּבִיהוּדָה
  chosen: Israel and Judah
  alternatives:
  - against Israel and Judah
  - to Israel and Judah
  lexicon: HALOT
  rationale: With עוּד and the preposition ב, the phrase can imply warning directed
    toward or against them. English 'warned Israel and Judah' communicates the object
    of warning clearly without over-specifying the prepositional nuance.
- source_word: בְּיַד כָּל־נְבִיאוֹ כָּל־חֹזֶה
  chosen: by every one of his prophets and every seer
  alternatives:
  - through every prophet of his, every seer
  - by the hand of every one of his prophets, every seer
  lexicon: HALOT
  rationale: ביד is an instrumental idiom meaning 'by means of' or 'through.' 'By
    every one of his prophets and every seer' preserves the distributive force of
    כָּל ... כָּל and reads naturally. 'Seer' is retained as a distinct prophetic
    term rather than flattened into 'prophet.'
- source_word: חֹזֶה
  chosen: seer
  alternatives:
  - visionary
  lexicon: HALOT
  rationale: The noun denotes one who sees visions; 'seer' is the established and
    accurate English equivalent in historical narrative contexts.
- source_word: שֻׁבוּ
  chosen: Turn
  alternatives:
  - Return
  - Repent
  lexicon: HALOT
  rationale: שׁוּב literally means 'turn/return.' Here it governs 'from your evil
    ways,' so 'Turn from' is both faithful and idiomatic. 'Repent' captures the theological
    sense but is less directly lexical.
- source_word: מִדַּרְכֵיכֶם הָרָעִים
  chosen: from your evil ways
  alternatives:
  - from your wicked ways
  - from your evil paths
  lexicon: HALOT
  rationale: '''Ways'' is the standard metaphorical rendering for דֶּרֶךְ in moral
    contexts. ''Evil'' closely matches רָעִים; ''wicked'' is possible but slightly
    more interpretive in tone.'
- source_word: וְשִׁמְרוּ
  chosen: and keep
  alternatives:
  - and observe
  - and guard
  lexicon: HALOT
  rationale: שׁמר in covenantal/legal contexts often means to keep or observe. 'Keep'
    is concise and standard in English for commandments.
- source_word: מִצְוֺתַי חֻקּוֹתַי
  chosen: my commandments and my statutes
  alternatives:
  - my commands and my statutes
  - my commandments and my decrees
  lexicon: HALOT
  rationale: The pair preserves two distinct legal terms. 'Commandments' for מִצְוֺת
    and 'statutes' for חֻקּוֹת maintains recognizable covenantal vocabulary without
    collapsing them.
- source_word: כְּכָל הַתּוֹרָה
  chosen: according to all the law
  alternatives:
  - according to the whole law
  - in accordance with all the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction or law. In this covenantal setting, with
    commandments and statutes, 'law' is the clearest fit. 'All the law' preserves
    כָּל.
- source_word: אֲשֶׁר צִוִּיתִי אֶת־אֲבֹתֵיכֶם
  chosen: that I commanded your fathers
  alternatives:
  - that I commanded your ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means 'fathers' and often refers to forefathers/ancestors.
    Per gender-accurate policy, 'fathers' is retained because the Hebrew term is masculine
    and covenant-historical.
- source_word: וַאֲשֶׁר שָׁלַחְתִּי אֲלֵיכֶם בְּיַד עֲבָדַי הַנְּבִיאִים
  chosen: and that I sent to you by my servants the prophets
  alternatives:
  - and that I sent to you through my servants the prophets
  lexicon: HALOT
  rationale: The relative clause most naturally refers back to 'the law' or covenant
    instruction as something sent through prophetic mediation. 'By my servants the
    prophets' preserves the instrumental idiom and the appositional phrase. 'Servants'
    is appropriate for עֲבָדַי here because bonded status is not the salient point.
