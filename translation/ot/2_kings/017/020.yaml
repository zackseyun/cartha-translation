id: 2KI.17.20
reference: 2 Kings 17:20
source:
  edition: WLC
  text: וַ/יִּמְאַ֨ס יְהוָ֜ה בְּ/כָל זֶ֤רַע יִשְׂרָאֵל֙ וַ/יְעַנֵּ֔/ם וַֽ/יִּתְּנֵ֖/ם
    בְּ/יַד שֹׁסִ֑ים עַ֛ד אֲשֶׁ֥ר הִשְׁלִיכָ֖/ם מִ/פָּנָֽי/ו־־׃
translation:
  text: So the LORD rejected all the offspring of Israel, and afflicted them and gave
    them into the hand of plunderers, until he had cast them out from his presence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the descendants of Israel'; Hebrew 'seed/offspring of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'delivered them into the hand of plunderers.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'from before him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְאַס
  chosen: rejected
  alternatives:
  - despised
  - spurned
  - rejected
  lexicon: HALOT
  rationale: מָאַס denotes rejecting or refusing, often in covenantal/judicial contexts.
    'Rejected' communicates decisive repudiation without overloading the term with
    emotional contempt implied by 'despised.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established English convention and the reverential pattern reflected
    in the LXX's κύριος.
- source_word: בְּכָל זֶרַע יִשְׂרָאֵל
  chosen: all the offspring of Israel
  alternatives:
  - all the seed of Israel
  - all the descendants of Israel
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' preserves
    the collective singular nuance while remaining natural English. 'All' reflects
    the comprehensiveness of the judgment on the northern kingdom's line/community
    in context.
- source_word: וַיְעַנֵּם
  chosen: afflicted them
  alternatives:
  - humbled them
  - oppressed them
  lexicon: HALOT
  rationale: ענה in the Piel commonly means to afflict, humble, or oppress. 'Afflicted'
    best fits the sequence of divine judgment here without narrowing the suffering
    to social oppression alone.
- source_word: וַיִּתְּנֵם בְּיַד
  chosen: gave them into the hand of
  alternatives:
  - delivered them into the hand of
  - gave them over to
  lexicon: HALOT
  rationale: The idiom נתן ביד means to hand over into another's power. 'Gave them
    into the hand of' preserves the Hebrew idiom while remaining understandable in
    English.
- source_word: שֹׁסִים
  chosen: plunderers
  alternatives:
  - raiders
  - spoilers
  lexicon: HALOT
  rationale: The participle from שסס refers to those who despoil or plunder. 'Plunderers'
    is clear modern English and preserves the violent, predatory sense.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - until such time as
  lexicon: HALOT
  rationale: This combination introduces the endpoint of the action. Simple 'until'
    is sufficient and idiomatic.
- source_word: הִשְׁלִיכָם
  chosen: he had cast them out
  alternatives:
  - he had thrown them away
  - he had cast them off
  lexicon: HALOT
  rationale: השליך literally means to throw/cast. In this judgment context, 'cast
    them out' captures expulsion more naturally than the more wooden 'thrown them
    away,' while avoiding the potentially interpretive covenantal nuance of 'cast
    them off.'
- source_word: מִפָּנָיו
  chosen: from his presence
  alternatives:
  - from before him
  - out of his sight
  lexicon: HALOT
  rationale: The idiom 'from before his face' commonly means removal from one's presence.
    'From his presence' is natural English and preserves the relational/judicial force
    of expulsion before God.
