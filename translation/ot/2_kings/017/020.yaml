theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the register of historical narrative and preserves continuity
    with the covenantal title tradition in English Bibles.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of 'all the offspring of Israel'
  chosen_reading: retain the comprehensive wording without narrowing it in translation
  alternative_readings:
  - interpret as only the northern kingdom
  - interpret as every ethnic descendant of Jacob in an absolute sense
  rationale: The Hebrew says 'all the offspring of Israel,' and the translation should
    preserve that wording. The historical context concerns the kingdom of Israel,
    but the translation should not resolve the scope beyond what the text itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
