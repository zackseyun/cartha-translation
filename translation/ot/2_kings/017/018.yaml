id: 2KI.17.18
reference: 2 Kings 17:18
source:
  edition: WLC
  text: וַ/יִּתְאַנַּ֨ף יְהוָ֤ה מְאֹד֙ בְּ/יִשְׂרָאֵ֔ל וַ/יְסִרֵ֖/ם מֵ/עַ֣ל פָּנָ֑י/ו לֹ֣א נִשְׁאַ֔ר רַ֛ק שֵׁ֥בֶט יְהוּדָ֖ה לְ/בַדּֽ/וֹ׃
translation:
  text: So Yahweh was very angry with Israel and removed them from before his face; none was left except the tribe of Judah alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his presence.' The Hebrew is more literally 'from before his face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְאַנַּף
  chosen: was very angry
  alternatives:
  - became furious
  - was enraged
  lexicon: HALOT
  rationale: The hitpael of אנף expresses anger becoming kindled. 'Was very angry' is natural English and preserves the strong divine wrath without over-paraphrase; the adverb מְאֹד is folded into the phrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard intensifier; 'very' is clear modern English and fits the clause smoothly.
- source_word: בְּיִשְׂרָאֵל
  chosen: with Israel
  alternatives:
  - against Israel
  - at Israel
  lexicon: HALOT
  rationale: With verbs of anger, the preposition ב can indicate the object toward whom anger is directed. 'With Israel' is idiomatic English; 'against Israel' is possible but slightly more interpretive.
- source_word: וַיְסִרֵם
  chosen: removed them
  alternatives:
  - took them away
  - banished them
  lexicon: HALOT
  rationale: From סור in the causative sense, 'removed' best matches the direct action of causing them to depart from God's presence, likely referring to exile, without importing that implication explicitly into the verb itself.
- source_word: מֵעַל פָּנָיו
  chosen: from before his face
  alternatives:
  - from his presence
  - from before him
  lexicon: HALOT
  rationale: Literally 'from upon/before his face.' The more literal 'from before his face' preserves the anthropomorphic covenantal language. A smoother alternative, 'from his presence,' is preserved in a footnote-worthy lexical alternative.
- source_word: לֹא נִשְׁאַר
  chosen: none was left
  alternatives:
  - not one remained
  - there was nothing left
  lexicon: HALOT
  rationale: The passive/niphal of שׁאר indicates remaining. 'None was left' communicates the collective sense clearly in English.
- source_word: רַק
  chosen: except
  alternatives:
  - only
  - nothing but
  lexicon: HALOT
  rationale: Marks exception after the negative clause; 'except' is the most natural English connector here.
- source_word: שֵׁבֶט יְהוּדָה
  chosen: the tribe of Judah
  alternatives:
  - the tribe Judah
  - Judah's tribe
  lexicon: HALOT
  rationale: Standard rendering of the construct phrase, referring to the southern kingdom's surviving tribal entity.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by itself
  - only
  lexicon: HALOT
  rationale: Adds emphasis to Judah's solitary survival. Retaining 'alone' after 'except' reflects the Hebrew emphasis, even if slightly redundant in English.
