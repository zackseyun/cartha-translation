theological_decisions:
- issue: Anthropomorphic expression of divine presence in מֵעַל פָּנָיו
  chosen_reading: from before his face
  alternative_readings:
  - from his presence
  - from before him
  rationale: The Hebrew uses concrete anthropomorphic language. Preserving it maintains the text's theological texture and covenantal immediacy rather than smoothing it into abstraction. Because the phrase can be rendered more idiomatically in English, the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3, #6'
- issue: Referent of 'Israel' in context
  chosen_reading: Israel refers to the northern kingdom/people as the object of judgment
  alternative_readings:
  - Israel as the whole covenant people in a broader representative sense
  rationale: In 2 Kings 17 the immediate context is the fall and exile of the northern kingdom. The translation keeps the historical referent plain without expanding it into a broader theological claim not explicit in the verse.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
