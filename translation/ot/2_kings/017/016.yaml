id: 2KI.17.16
reference: 2 Kings 17:16
source:
  edition: WLC
  text: וַ/יַּעַזְב֗וּ אֶת כָּל מִצְוֺת֙ יְהוָ֣ה אֱלֹהֵי/הֶ֔ם וַ/יַּעֲשׂ֥וּ לָ/הֶ֛ם מַסֵּכָ֖ה שנים עֲגָלִ֑ים וַ/יַּעֲשׂ֣וּ אֲשֵׁירָ֗ה וַ/יִּֽשְׁתַּחֲווּ֙ לְ/כָל צְבָ֣א הַ/שָּׁמַ֔יִם וַ/יַּעַבְד֖וּ אֶת הַ/בָּֽעַל־־־־׃
translation:
  text: And they abandoned all the commandments of Yahweh their God, and made for themselves cast images, two calves, and made an Asherah, and bowed down to all the host of heaven, and served Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an Asherah pole'; the Hebrew term Asherah can refer to the Canaanite goddess or to her cult object.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: עזב here denotes covenantal abandonment, stronger than merely 'left.' 'Abandoned' is natural modern English and preserves the force of apostasy.
- source_word: כָּל מִצְוֺת
  chosen: all the commandments
  alternatives:
  - all the commands
  lexicon: HALOT
  rationale: מִצְוֺת is best rendered 'commandments' in this covenantal context; 'all' should be retained explicitly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: 'The pronominal suffix is significant and should be preserved: this is the God to whom they belonged by covenant.'
- source_word: וַיַּעֲשׂוּ לָהֶם
  chosen: made for themselves
  alternatives:
  - made themselves
  lexicon: HALOT
  rationale: The dative pronoun indicates these objects were made for their own use or devotion; 'for themselves' makes that explicit.
- source_word: מַסֵּכָה
  chosen: a cast image
  alternatives:
  - a molten image
  - an idol
  lexicon: HALOT
  rationale: מַסֵּכָה specifically refers to an image made by casting metal. 'Cast image' preserves the concrete sense better than the broader 'idol.'
- source_word: שנים עֲגָלִים
  chosen: two calves
  alternatives:
  - two young bulls
  lexicon: HALOT
  rationale: עֲגָלִים commonly means calves; this also echoes the northern kingdom's calf cult. The appositional relation to מַסֵּכָה is represented with a dash in English.
- source_word: אֲשֵׁירָה
  chosen: an Asherah
  alternatives:
  - an Asherah pole
  - Asherah
  lexicon: HALOT
  rationale: The Hebrew term may denote either the goddess or her cult object; in this context the making of one suggests a cultic object. However, rendering it as 'an Asherah' preserves the Hebrew term without over-specifying 'pole' where the text itself does not say that explicitly.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: bowed down
  alternatives:
  - worshiped
  - prostrated themselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bowed down' preserves the physical act and avoids prematurely collapsing it into the broader category 'worshiped,' though worship is implied.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  chosen: to all the host of heaven
  alternatives:
  - to all the army of heaven
  - to all the heavenly host
  lexicon: HALOT
  rationale: This phrase refers to the celestial bodies conceived as the heavenly host. 'Host of heaven' is the standard and clear English equivalent.
- source_word: וַיַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  lexicon: HALOT
  rationale: עבד in idolatry contexts often carries the sense of cultic service/worship. 'Served' is more formally precise and preserves the distinction from the previous verb 'bowed down.'
- source_word: הַבָּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Although the Hebrew has the article, English idiom normally renders the deity's name simply as 'Baal.' Retaining the article would sound unnatural and is not necessary to convey the referent.
