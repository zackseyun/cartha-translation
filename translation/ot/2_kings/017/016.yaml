theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the project's stated default for the Tetragrammaton,
    aligning with Jewish reverence tradition and longstanding English Bible practice
    while remaining transparent about alternatives.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אֲשֵׁירָה
  chosen_reading: an Asherah
  alternative_readings:
  - an Asherah pole
  - the goddess Asherah
  rationale: The term is contextually ambiguous between the deity and her cult symbol.
    Because the text says they 'made' one, a cult object is likely, but the Hebrew
    term itself is preserved in translation to avoid over-resolving the ambiguity.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
