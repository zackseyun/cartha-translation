id: 2KI.17.21
reference: 2 Kings 17:21
source:
  edition: WLC
  text: כִּֽי קָרַ֣ע יִשְׂרָאֵ֗ל מֵ/עַל֙ בֵּ֣ית דָּוִ֔ד וַ/יַּמְלִ֖יכוּ אֶת יָרָבְעָ֣ם בֶּן נְבָ֑ט ו/ידא יָרָבְעָ֤ם אֶת יִשְׂרָאֵל֙ מֵ/אַחֲרֵ֣י יְהוָ֔ה וְ/הֶחֱטֵיאָ֖/ם חֲטָאָ֥ה גְדוֹלָֽה־־־־׃
translation:
  text: For Israel tore itself away from the house of David, and they made Jeroboam son of Nebat king; and Jeroboam drove Israel from following Yahweh and caused them to commit a great sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned Israel away from following the LORD.' The Hebrew verb can denote driving away or leading astray.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרַע
  chosen: tore itself away
  alternatives:
  - tore away
  - split from
  - rent away
  lexicon: HALOT
  rationale: The verb literally denotes tearing/rending. In this political context it describes schism or separation from Davidic rule. 'Tore itself away' preserves the vivid metaphor better than the flatter 'separated,' while making clear that Israel broke from the house of David.
- source_word: מֵעַל בֵּית דָּוִד
  chosen: from the house of David
  alternatives:
  - away from the house of David
  - from over the house of David
  lexicon: HALOT
  rationale: The preposition with 'house of David' marks separation from Davidic dynastic authority. English idiom is best served by 'from the house of David'; the sense of removal is already carried by 'tore itself away.'
- source_word: וַיַּמְלִיכוּ
  chosen: they made ... king
  alternatives:
  - they crowned
  - they set up as king
  - they made ... reign
  lexicon: HALOT
  rationale: Hiphil of מלך here means to cause someone to reign/install as king. 'Made ... king' is natural modern English and closely reflects the causative force.
- source_word: וַיַּמְלִיכוּ אֶת יָרָבְעָם בֶּן נְבָט
  chosen: they made Jeroboam son of Nebat king
  alternatives:
  - they made Jeroboam the son of Nebat king
  - they set Jeroboam son of Nebat up as king
  lexicon: HALOT
  rationale: This keeps the Hebrew word order and appositional identification while remaining readable.
- source_word: וַיַּדַּח
  chosen: drove ... away from following
  alternatives:
  - banished ... from following
  - turned ... away from following
  - impelled ... away from following
  lexicon: HALOT
  rationale: The verb נדח often carries the sense of driving away or leading astray. Here Jeroboam is the active agent causing apostasy. 'Drove ... away from following' preserves both force and the directional imagery of the Hebrew.
- source_word: מֵאַחֲרֵי יְהוָה
  chosen: from following the LORD
  alternatives:
  - from after the LORD
  - away from the LORD
  lexicon: HALOT
  rationale: The idiom 'from after YHWH' means ceasing to follow him. 'From following the LORD' is idiomatic English and preserves the covenantal discipleship sense. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהֶחֱטִיאָם
  chosen: caused them to commit
  alternatives:
  - made them sin
  - caused them to sin
  lexicon: HALOT
  rationale: 'The Hiphil of חטא is causative: Jeroboam caused Israel to sin. Because the next noun specifies the sin, ''caused them to commit'' avoids repetition while preserving causation.'
- source_word: חֲטָאָה גְדוֹלָה
  chosen: a great sin
  alternatives:
  - great sin
  - a grievous sin
  lexicon: HALOT
  rationale: A straightforward rendering of noun plus adjective. 'Great sin' preserves the Hebrew emphasis on the magnitude of the offense without importing interpretive language.
