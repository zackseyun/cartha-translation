id: 2KI.17.32
reference: 2 Kings 17:32
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ יְרֵאִ֖ים אֶת יְהוָ֑ה וַ/יַּעֲשׂ֨וּ לָ/הֶ֤ם מִ/קְצוֹתָ/ם֙ כֹּהֲנֵ֣י
    בָמ֔וֹת וַ/יִּהְי֛וּ עֹשִׂ֥ים לָ/הֶ֖ם בְּ/בֵ֥ית הַ/בָּמֽוֹת־׃
translation:
  text: They feared the LORD, yet they appointed from among themselves priests of
    the high places, and they were serving for them in the houses of the high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all classes of them'; the Hebrew expression is idiomatic and may
      suggest selection from the people at large without proper distinction.
    reason: lexical_alternative
  - marker: b
    text: That is, priests serving at local shrine sites rather than at the central
      sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: יְרֵאִים אֶת־יְהוָה
  chosen: feared the LORD
  alternatives:
  - were fearing the LORD
  - worshiped the LORD
  lexicon: HALOT
  rationale: The idiom ירא את־יהוה commonly denotes reverence/fear toward YHWH and
    often carries worshipful allegiance. 'Feared the LORD' preserves the Hebrew wording
    and the theological tension of outward reverence alongside idolatrous practice
    in context. 'Worshiped' is interpretive and less lexically transparent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD' rather than a transliteration.
- source_word: מִקְצוֹתָם
  chosen: from among themselves
  alternatives:
  - from all classes of them
  - from the lowest of them
  - from their extremities
  lexicon: HALOT
  rationale: The phrase literally involves 'from their ends/extremes,' but in this
    idiom it refers to selecting people out of the group without regard to proper
    qualification. 'From among themselves' is clear modern English and avoids importing
    the debated nuance 'from the lowest of them,' which is possible in some contexts
    but not demanded here.
- source_word: כֹּהֲנֵי בָמוֹת
  chosen: priests of the high places
  alternatives:
  - high-place priests
  lexicon: HALOT
  rationale: This preserves both the cultic office and the technical term בָּמוֹת.
    'High places' is the standard rendering for local illicit worship sites in Kings.
- source_word: וַיַּעֲשׂוּ לָהֶם
  chosen: they appointed for themselves
  alternatives:
  - they made for themselves
  - they set up for themselves
  lexicon: HALOT
  rationale: עשה with persons in office often means 'appoint/make.' 'Appointed' communicates
    the sense idiomatically in English while retaining the reflexive benefit expressed
    by לָהֶם.
- source_word: וַיִּהְיוּ עֹשִׂים לָהֶם
  chosen: they were serving for them
  alternatives:
  - they ministered for them
  - they were acting for them
  lexicon: HALOT
  rationale: The construction is somewhat periphrastic and denotes ongoing function.
    The subject is the priests just appointed, now carrying out service on behalf
    of the people. 'Serving' is broad enough to fit cultic activity without over-specifying
    ritual details not explicit in the verb עשה.
- source_word: בְּבֵית הַבָּמוֹת
  chosen: in the houses of the high places
  alternatives:
  - in the house-shrines of the high places
  - in the temples of the high places
  lexicon: HALOT
  rationale: The singular construct בֵּית with plural complement can function collectively.
    'Houses of the high places' is a fairly literal rendering that reflects shrine
    structures associated with the high places. 'Temples' would be too interpretive.
