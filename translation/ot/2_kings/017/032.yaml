theological_decisions:
- issue: Retention of the tension between fearing the LORD and engaging illegitimate
    worship
  chosen_reading: They feared the LORD, yet they appointed from among themselves priests
    of the high places...
  alternative_readings:
  - They worshiped the LORD and also made priests...
  - They claimed to fear the LORD while making priests...
  rationale: The verse intentionally juxtaposes reverence toward the LORD with syncretistic
    cultic practice. Adding 'yet' makes the contrast explicit in natural English without
    importing a doctrinal explanation beyond the narrative context. The translation
    avoids softening the contradiction or resolving it into mere pretense.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
