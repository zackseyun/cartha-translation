theological_decisions:
- issue: Rendering the coexistence of fear of the LORD with idolatrous practice
  chosen_reading: 'The verse is translated to preserve the tension: they ''feared
    the LORD, yet they were serving their carved images.'''
  alternative_readings:
  - they worshiped the LORD and served their idols
  - they pretended to fear the LORD while serving idols
  rationale: The Hebrew states both realities without resolving whether the fear was
    sincere, syncretistic, or merely external. The translation preserves that tension
    rather than importing a theological judgment beyond the text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
