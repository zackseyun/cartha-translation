id: 2KI.17.41
reference: 2 Kings 17:41
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ הַ/גּוֹיִ֣ם הָ/אֵ֗לֶּה יְרֵאִים֙ אֶת יְהוָ֔ה וְ/אֶת פְּסִֽילֵי/הֶ֖ם
    הָי֣וּ עֹֽבְדִ֑ים גַּם בְּנֵי/הֶ֣ם וּ/בְנֵ֣י בְנֵי/הֶ֗ם כַּ/אֲשֶׁ֨ר עָשׂ֤וּ אֲבֹתָ/ם֙
    הֵ֣ם עֹשִׂ֔ים עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה׀־־־׀׃פ
translation:
  text: So these nations feared the LORD, yet they were serving their carved images.
    Their children also, and their children's children—as their fathers did, so they
    are doing to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their idols' for 'their carved images.' The Hebrew specifically refers
      to images made by carving.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: So ... were
  alternatives:
  - And ... were
  - Thus ... were
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative/result. 'So' captures the
    summarizing force at the close of the section better than a bare 'and.'
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  - these Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign ethnic groups settled in Samaria,
    so 'nations' is the most natural and contextually specific rendering.
- source_word: יְרֵאִים אֶת־יְהוָה
  chosen: feared the LORD
  alternatives:
  - were fearing the LORD
  - revered the LORD
  lexicon: HALOT
  rationale: The idiom ירא את־יהוה commonly means to fear/revere Yahweh in a religious
    sense. 'Feared the LORD' preserves the standard covenantal idiom and matches the
    doctrine default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וְאֶת פְּסִילֵיהֶם
  chosen: yet ... their carved images
  alternatives:
  - and ... their idols
  - and ... their graven images
  lexicon: HALOT
  rationale: פְּסִילִים are carved cult-images. 'Carved images' is more transparent
    to the Hebrew than the more interpretive 'idols,' while remaining readable. 'Yet'
    in English brings out the adversative sense implied by the juxtaposition of fearing
    the LORD while also worshiping images.
- source_word: הָיוּ עֹבְדִים
  chosen: they were serving
  alternatives:
  - they served
  - they were worshiping
  lexicon: HALOT
  rationale: The periphrastic construction conveys ongoing/customary action. 'Were
    serving' preserves that aspect. 'Serving' is chosen over 'worshiping' because
    עבד can denote cultic service broadly; the object makes the idolatrous sense clear.
- source_word: גַּם בְּנֵיהֶם וּבְנֵי בְנֵיהֶם
  chosen: Their children also, and their children's children
  alternatives:
  - Also their sons and their grandsons
  - their children too, and their grandchildren
  lexicon: HALOT
  rationale: Though בנים is literally 'sons,' in this genealogical continuation formula
    it refers representatively to descendants. 'Children ... children's children'
    communicates the generational succession naturally in English.
- source_word: כַּאֲשֶׁר עָשׂוּ אֲבֹתָם
  chosen: as their fathers did
  alternatives:
  - just as their fathers had done
  - according to what their fathers did
  lexicon: HALOT
  rationale: A straightforward comparative clause; 'fathers' preserves the Hebrew
    term and ancestral emphasis.
- source_word: הֵם עֹשִׂים
  chosen: so they are doing
  alternatives:
  - they do likewise
  - they keep doing
  lexicon: HALOT
  rationale: The participial form indicates ongoing present practice. 'Are doing'
    keeps the durative sense and mirrors the Hebrew structure with the preceding comparison.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  - to the present day
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering in English for the Hebrew temporal
    formula.
