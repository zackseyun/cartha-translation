id: 2KI.17.37
reference: 2 Kings 17:37
source:
  edition: WLC
  text: וְ/אֶת הַ/חֻקִּ֨ים וְ/אֶת הַ/מִּשְׁפָּטִ֜ים וְ/הַ/תּוֹרָ֤ה וְ/הַ/מִּצְוָה֙
    אֲשֶׁ֣ר כָּתַ֣ב לָ/כֶ֔ם תִּשְׁמְר֥וּ/ן לַ/עֲשׂ֖וֹת כָּל הַ/יָּמִ֑ים וְ/לֹ֥א תִֽירְא֖וּ
    אֱלֹהִ֥ים אֲחֵרִֽים־־־׃
translation:
  text: And the statutes and the judgments and the law and the commandment that he
    wrote for you, you shall keep to do all the days, and you shall not fear other
    gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the decrees ... the ordinances ... the instruction ... the command.'
      The Hebrew uses a cluster of covenant-law terms with overlapping but distinct
      legal nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall be careful to do.' The Hebrew expression combines keeping/observing
      with doing.
    reason: lexical_alternative
  - marker: c
    text: '''Fear'' here carries the sense of reverential allegiance or worshipful
      dread toward deities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: חֻקִּים commonly refers to prescribed enactments or statutes. 'Statutes'
    preserves the formal legal sense and pairs well with the following legal terms.
- source_word: הַמִּשְׁפָּטִים
  chosen: the judgments
  alternatives:
  - the rules
  - the ordinances
  lexicon: HALOT
  rationale: מִשְׁפָּטִים often denotes legal judgments or judicial rulings. 'Judgments'
    keeps the legal register and reflects the distinct term rather than collapsing
    it into a generic 'laws'.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in this legal-covenantal list 'the
    law' is the most natural English rendering and preserves its recognized covenantal
    force.
- source_word: הַמִּצְוָה
  chosen: the commandment
  alternatives:
  - the command
  lexicon: HALOT
  rationale: מִצְוָה is singular here and is best rendered with a singular English
    term. 'Commandment' fits the elevated legal style of the verse.
- source_word: אֲשֶׁר כָּתַב לָכֶם
  chosen: that he wrote for you
  alternatives:
  - which he wrote for you
  - that he prescribed for you
  lexicon: HALOT
  rationale: The clause straightforwardly states that these covenantal requirements
    were written for the people. 'He' is retained from the Hebrew verbal form, with
    the antecedent understood from context as the LORD.
- source_word: תִּשְׁמְרוּן לַעֲשׂוֹת
  chosen: you shall keep to do
  alternatives:
  - you shall be careful to do
  - you shall keep and do
  lexicon: HALOT
  rationale: The Hebrew combines 'keep/observe' with an infinitive of doing. 'Keep
    to do' is somewhat formal but closely reflects the source structure; the sense
    is observance expressed in practice.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - always
  - all your days
  lexicon: HALOT
  rationale: Literally 'all the days.' This preserves the idiom's durative force without
    over-paraphrasing. 'All your days' adds a possessive not present in the Hebrew.
- source_word: תִירְאוּ
  chosen: fear
  alternatives:
  - revere
  - worship
  lexicon: HALOT
  rationale: יָרֵא fundamentally means 'fear' or 'revere.' Here, in the context of
    allegiance to other gods, 'fear' preserves the Hebrew wording and the covenantal
    warning against giving them reverential devotion.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase is the standard Hebrew expression for deities besides the
    LORD. 'Other gods' is the most direct and conventional rendering.
