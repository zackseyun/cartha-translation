theological_decisions:
- issue: Rendering the legal-covenantal cluster distinctly
  chosen_reading: 'Preserve four separate terms: statutes, judgments, law, commandment'
  alternative_readings:
  - Compress into a smoother phrase such as 'laws and commands'
  rationale: The Hebrew deliberately piles up covenantal legal terms. Preserving the
    distinctions maintains the rhetorical weight and avoids flattening the covenant
    obligations into a generic summary.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
- issue: Reference of the subject in 'that he wrote for you'
  chosen_reading: Retain the generic pronoun 'he' rather than substituting 'the LORD'
    in the main text
  alternative_readings:
  - that the LORD wrote for you
  rationale: Although context identifies the subject as the LORD, the Hebrew verb
    itself uses an implicit third masculine singular subject. Retaining 'he' avoids
    adding an explicit noun not present in this verse while remaining clear in context.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
