id: 2KI.17.33
reference: 2 Kings 17:33
source:
  edition: WLC
  text: אֶת יְהוָ֖ה הָי֣וּ יְרֵאִ֑ים וְ/אֶת אֱלֹֽהֵי/הֶם֙ הָי֣וּ עֹֽבְדִ֔ים כְּ/מִשְׁפַּט֙
    הַ/גּוֹיִ֔ם אֲשֶׁר הִגְל֥וּ אֹתָ֖/ם מִ/שָּֽׁם־־־׃
translation:
  text: They feared the LORD, but they served their own gods, according to the custom
    of the nations from which they had been exiled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They feared the LORD and served their gods'—the Hebrew conjunction is
      simply 'and'; the contrast is made explicit in English for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of יְהוָה as 'the LORD.'
- source_word: הָיוּ יְרֵאִים
  chosen: they feared
  alternatives:
  - they were fearing
  - they revered
  lexicon: HALOT
  rationale: The construction with היה + participle expresses ongoing/customary action.
    'They feared' is idiomatic English and preserves the sense of reverential fear
    toward the LORD.
- source_word: אֱלֹהֵיהֶם
  chosen: their own gods
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: The suffix marks possession. 'Their own gods' brings out the contrast
    with 'the LORD' and the persistence of their native worship without adding content
    beyond the possessive.
- source_word: הָיוּ עֹבְדִים
  chosen: they served
  alternatives:
  - they were serving
  - they worshiped
  lexicon: HALOT
  rationale: עבד with deity language often means religious service/worship. 'Served'
    is closer to the Hebrew and preserves the parallel with fearing the LORD.
- source_word: כְּמִשְׁפַּט
  chosen: according to the custom
  alternatives:
  - according to the manner
  - according to the rule
  - according to the practice
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to customary practice rather than a legal verdict.
    'According to the custom' is natural English in context.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentiles
  lexicon: HALOT
  rationale: In this historical context גּוֹיִם refers to the various nations/peoples
    from whom they came. 'Nations' is the most straightforward rendering.
- source_word: אֲשֶׁר הִגְלוּ אֹתָם מִשָּׁם
  chosen: from which they had been exiled
  alternatives:
  - from where they had been carried away
  - from which they had been deported
  lexicon: HALOT
  rationale: The Hebrew literally says 'which they exiled them from there,' with an
    indefinite/impersonal sense. English naturally renders this passively. 'Exiled'
    fits the historical context of forced relocation.
