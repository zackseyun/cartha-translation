theological_decisions:
- issue: Adversative force between fearing the LORD and serving other gods
  chosen_reading: Render the clauses with 'but' to highlight the inconsistency described
    in context.
  alternative_readings:
  - Render with simple 'and'
  rationale: The Hebrew conjunction is formally 'and,' but in context the verse describes
    syncretism and tension between professed fear of the LORD and idolatrous practice.
    'But' communicates the sense clearly without overstating theology.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    sense in readable modern English.'
