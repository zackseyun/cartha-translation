id: 2KI.17.36
reference: 2 Kings 17:36
source:
  edition: WLC
  text: כִּ֣י אִֽם אֶת יְהוָ֗ה אֲשֶׁר֩ הֶעֱלָ֨ה אֶתְ/כֶ֜ם מֵ/אֶ֧רֶץ מִצְרַ֛יִם בְּ/כֹ֧חַ גָּד֛וֹל וּ/בִ/זְר֥וֹעַ נְטוּיָ֖ה אֹת֣/וֹ תִירָ֑אוּ וְ/ל֥/וֹ תִֽשְׁתַּחֲו֖וּ וְ/ל֥/וֹ תִזְבָּֽחוּ־־׃
translation:
  text: But Yahweh, who brought you up from the land of Egypt with great power and with an outstretched arm—you shall fear him, and to him you shall bow down, and to him you shall sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rather, the LORD ... him you shall fear.' The Hebrew opening is contrastive, setting the LORD over against other gods.
    reason: alternative_reading
  - marker: b
    text: '''Fear'' here carries the sense of reverent awe and covenant loyalty, not merely terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Except that
  - Only
  lexicon: HALOT
  rationale: 'In this contrastive setting following prohibitions against fearing other gods, the idiom introduces the positive alternative: not those gods, but the LORD. ''But'' is natural modern English and preserves the adversative force better than a more wooden ''except''.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֶעֱלָה
  chosen: brought ... up
  alternatives:
  - brought out
  - caused to go up
  lexicon: HALOT
  rationale: The Hiphil of עלה literally means 'caused to go up.' In exodus contexts English commonly renders this idiom as 'brought up' or 'brought out.' 'Brought ... up' preserves the Hebrew verbal imagery while remaining idiomatic.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: This is a standard covenantal/exodus formula. 'From the land of Egypt' keeps the full phrase and its resonance.
- source_word: בְּכֹחַ גָּדוֹל
  chosen: with great power
  alternatives:
  - by great power
  - with mighty power
  lexicon: HALOT
  rationale: The beth preposition here is instrumental. 'With great power' is idiomatic and preserves the sense of divine might.
- source_word: וּבִזְרֹעַ נְטוּיָה
  chosen: and with an outstretched arm
  alternatives:
  - and by an outstretched arm
  - and with an extended arm
  lexicon: HALOT
  rationale: This is a conventional exodus expression for God's manifest saving power. 'Outstretched arm' is the standard and most recognizable equivalent.
- source_word: אֹתוֹ תִירָאוּ
  chosen: you shall fear him
  alternatives:
  - him you shall fear
  - you must fear him
  lexicon: HALOT
  rationale: The fronted object gives emphasis, but English can preserve this adequately with normal word order. 'Fear' here denotes reverent worshipful fear, not mere terror.
- source_word: וְלוֹ תִשְׁתַּחֲווּ
  chosen: and to him you shall bow down
  alternatives:
  - and him you shall worship
  - and to him you shall prostrate yourselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bow down' preserves the physical worship imagery better than the more interpretive 'worship,' while still fitting the context.
- source_word: וְלוֹ תִזְבָּחוּ
  chosen: and to him you shall sacrifice
  alternatives:
  - and to him you shall offer sacrifices
  lexicon: HALOT
  rationale: The verb זבח means to sacrifice/slaughter sacrificially. 'Sacrifice' is concise and accurate; the indirect object 'to him' preserves the Hebrew emphasis.
