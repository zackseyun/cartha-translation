theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of 'fear' in covenant worship context
  chosen_reading: fear him
  alternative_readings:
  - revere him
  - worship him
  rationale: The Hebrew verb ירא in this context includes reverence and covenant loyalty, but 'fear' should be retained in the main text to preserve the source wording and theological texture rather than flattening it to a single interpretive nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
