id: 2KI.17.9
reference: 2 Kings 17:9
source:
  edition: WLC
  text: וַ/יְחַפְּא֣וּ בְנֵֽי יִשְׂרָאֵ֗ל דְּבָרִים֙ אֲשֶׁ֣ר לֹא כֵ֔ן עַל יְהוָ֖ה
    אֱלֹהֵי/הֶ֑ם וַ/יִּבְנ֨וּ לָ/הֶ֤ם בָּמוֹת֙ בְּ/כָל עָ֣רֵי/הֶ֔ם מִ/מִּגְדַּ֥ל נוֹצְרִ֖ים
    עַד עִ֥יר מִבְצָֽר־־־־־׃
translation:
  text: And the sons of Israel secretly did things that were not right against the
    LORD their God, and they built for themselves high places in all their cities,
    from watchtower to fortified city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'covered up matters that were not right concerning the LORD their God.'
      The Hebrew verb is rare and may carry the sense of concealing or acting secretly.
    reason: lexical_alternative
  - marker: b
    text: '''High places'' were local worship sites, often associated with unauthorized
      worship.'
    reason: cultural_note
  - marker: c
    text: From 'watchtower' to 'fortified city' is a way of saying throughout the
      whole land, from the smallest outpost to the strongest city.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְחַפְּאוּ
  chosen: secretly did
  alternatives:
  - covered up
  - dealt secretly
  - did in secret
  lexicon: HALOT
  rationale: The verb from חפא is rare and contextually conveys acting covertly or
    concealing. In this verse it governs 'things' and is followed by a clause describing
    wrongdoing against the LORD, so 'secretly did' captures the sense more naturally
    in English than the more wooden 'covered up.'
- source_word: דְּבָרִים אֲשֶׁר לֹא כֵן
  chosen: things that were not right
  alternatives:
  - things that were not so
  - things that were not fitting
  - improper things
  lexicon: HALOT
  rationale: The phrase is idiomatic. A highly literal rendering ('things that were
    not so') is obscure in English. 'Things that were not right' preserves the moral
    evaluation without over-interpreting the exact nature of the acts.
- source_word: עַל יְהוָה אֱלֹהֵיהֶם
  chosen: against the LORD their God
  alternatives:
  - concerning the LORD their God
  - toward the LORD their God
  lexicon: HALOT
  rationale: With this context of illicit acts and apostasy, עַל is best rendered
    adversatively as 'against' rather than the more neutral 'concerning.' YHWH is
    rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: וַיִּבְנוּ לָהֶם בָּמוֹת
  chosen: they built for themselves high places
  alternatives:
  - they built high places for themselves
  - they built shrines for themselves
  lexicon: HALOT
  rationale: בָּמוֹת refers to illicit worship sites, traditionally 'high places.'
    This preserves the cultic term while remaining readable. 'For themselves' reflects
    לָהֶם and suggests self-authorized worship.
- source_word: בְּכָל עָרֵיהֶם
  chosen: in all their cities
  alternatives:
  - in every one of their cities
  - throughout all their towns
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'cities' is the standard rendering for
    עָרִים here.
- source_word: מִמִּגְדַּל נוֹצְרִים
  chosen: from watchtower
  alternatives:
  - from the tower of watchmen
  - from lookout tower
  lexicon: HALOT
  rationale: This is part of a merism indicating the full range of settlements. The
    participle נוֹצְרִים means 'watching/guarding,' so 'watchtower' communicates the
    sense idiomatically in English better than a hyper-literal phrase.
- source_word: עַד עִיר מִבְצָר
  chosen: to fortified city
  alternatives:
  - to fortress city
  - to walled city
  lexicon: HALOT
  rationale: Completes the merism from smallest/most exposed outpost to strongest
    urban center. 'Fortified city' is the most natural equivalent for עִיר מִבְצָר.
