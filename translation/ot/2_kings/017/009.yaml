theological_decisions:
- issue: Moral force of Israel's hidden actions
  chosen_reading: The verse describes covert acts of covenant unfaithfulness done
    against the LORD, not merely private or inward thoughts.
  alternative_readings:
  - The verse refers to speaking false things about the LORD
  - The verse emphasizes concealment more than rebellion
  rationale: The combination of the rare verb, the object 'things,' and the following
    description of building high places indicates concrete acts of illicit worship
    carried out covertly and in opposition to Israel's covenant God. The translation
    preserves both secrecy and wrongdoing without specifying more than the Hebrew
    states.
  doctrine_reference: Translation philosophy §§1, 3, 6
