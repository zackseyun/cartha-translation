theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrinal
    standard, it is rendered 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Reference of 'their statutes and their ordinances'
  chosen_reading: the standards belonging to the peoples described, contrasted with
    the LORD's law and commandment
  alternative_readings:
  - the statutes and ordinances of the LORD
  - a mixed reference left intentionally ambiguous
  rationale: The pronominal suffixes are third person plural ('their'), and the following
    phrase separately introduces 'the law and the commandment that the LORD commanded,'
    suggesting a contrast between the peoples' own religious norms and the LORD's
    covenant requirements.
