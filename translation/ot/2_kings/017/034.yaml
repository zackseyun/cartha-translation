id: 2KI.17.34
reference: 2 Kings 17:34
source:
  edition: WLC
  text: עַ֣ד הַ/יּ֤וֹם הַ/זֶּה֙ הֵ֣ם עֹשִׂ֔ים כַּ/מִּשְׁפָּטִ֖ים הָ/רִֽאשֹׁנִ֑ים אֵינָ֤/ם
    יְרֵאִים֙ אֶת יְהוָ֔ה וְ/אֵינָ֣/ם עֹשִׂ֗ים כְּ/חֻקֹּתָ/ם֙ וּ/כְ/מִשְׁפָּטָ֔/ם
    וְ/כַ/תּוֹרָ֣ה וְ/כַ/מִּצְוָ֗ה אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ אֶת בְּנֵ֣י יַעֲקֹ֔ב אֲשֶׁר
    שָׂ֥ם שְׁמ֖/וֹ יִשְׂרָאֵֽל־־־׃
translation:
  text: To this day they are doing according to the former customs. They do not fear
    the LORD, and they do not act according to their statutes and their ordinances,
    or according to the law and the commandment that the LORD commanded the sons of
    Jacob, whom he named Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the former ordinances' or 'according to the former practices.'
    reason: lexical_alternative
  - marker: b
    text: '''Fear the LORD'' can also be expressed ''revere the LORD''; the Hebrew
      idiom carries both dread and reverent covenant loyalty.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Jacob'; this refers corporately to the people descended
      from Jacob.
    reason: lexical_alternative
  - marker: d
    text: That is, Jacob; compare Genesis 32:28; 35:10.
    reason: cross_reference
lexical_decisions:
- source_word: כַּמִּשְׁפָּטִים הָרִאשֹׁנִים
  chosen: according to the former customs
  alternatives:
  - according to the former ordinances
  - according to the former judgments
  - according to the former practices
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, ordinance, custom, or prescribed practice
    depending on context. Here the reference is to the syncretistic practices previously
    described, so 'former customs' best conveys ongoing inherited religious practice
    rather than judicial rulings.
- source_word: יְרֵאִים אֶת־יְהוָה
  chosen: fear the LORD
  alternatives:
  - revere the LORD
  lexicon: HALOT
  rationale: The idiom ירא את־יהוה regularly denotes covenantal fear/reverence toward
    YHWH. 'Fear the LORD' preserves the established biblical idiom and its theological
    weight better than the softer 'revere,' while 'the LORD' follows the doctrinal
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' reflecting Jewish reverence tradition and the Septuagintal pattern.
- source_word: כְּחֻקֹּתָם
  chosen: according to their statutes
  alternatives:
  - according to their decrees
  - according to their prescriptions
  lexicon: HALOT
  rationale: חֻקּוֹת commonly refers to statutes or fixed prescriptions. 'Statutes'
    preserves the legal-covenantal register and pairs naturally with מִשְׁפָּטָם.
- source_word: וּכְמִשְׁפָּטָם
  chosen: and their ordinances
  alternatives:
  - and their judgments
  - and their customs
  lexicon: HALOT
  rationale: Here מִשְׁפָּט in parallel with חֻקּוֹת is best rendered 'ordinances'
    to preserve the legal pair without repeating 'customs' from the earlier clause,
    where the contextual sense differed.
- source_word: וְכַתּוֹרָה
  chosen: or according to the law
  alternatives:
  - and according to the law
  - or the instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean law or instruction. In this covenantal context, 'the
    law' is the most natural English rendering. The conjunction sequence after two
    negated clauses is rendered with 'or according to' to communicate the cumulative
    list of standards they fail to follow.
- source_word: וְכַמִּצְוָה
  chosen: and the commandment
  alternatives:
  - and the command
  - and the commandments
  lexicon: HALOT
  rationale: The singular מִצְוָה is retained as 'the commandment,' matching the Hebrew
    number and echoing covenantal summary language rather than generalizing to plural
    'commandments.'
- source_word: בְּנֵי יַעֲקֹב
  chosen: the sons of Jacob
  alternatives:
  - the children of Jacob
  - the descendants of Jacob
  lexicon: HALOT
  rationale: Gender-accurate translation policy favors preserving the masculine plural
    where present unless context clearly demands a generic rendering. 'Sons of Jacob'
    is formally closer and suitable here, though it refers corporately to Israel.
- source_word: אֲשֶׁר שָׂם שְׁמוֹ יִשְׂרָאֵל
  chosen: whom he named Israel
  alternatives:
  - whose name he made Israel
  - to whom he gave the name Israel
  lexicon: HALOT
  rationale: The clause refers back to Jacob and alludes to the renaming in Genesis.
    Idiomatic English is best achieved with 'whom he named Israel,' preserving the
    personal renaming sense of שׂוּם שֵׁם.
