id: 2KI.17.25
reference: 2 Kings 17:25
source:
  edition: WLC
  text: וַ/יְהִ֗י בִּ/תְחִלַּת֙ שִׁבְתָּ֣/ם שָׁ֔ם לֹ֥א יָרְא֖וּ אֶת יְהוָ֑ה וַ/יְשַׁלַּ֨ח
    יְהוָ֤ה בָּ/הֶם֙ אֶת הָ֣/אֲרָי֔וֹת וַ/יִּֽהְי֥וּ הֹרְגִ֖ים בָּ/הֶֽם־־׃
translation:
  text: And it happened, at the beginning of their dwelling there, that they did not
    fear the LORD; so the LORD sent lions among them, and they were killing some of
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not revere the LORD.' The Hebrew 'fear' includes reverence
      and covenantal regard, not merely terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּתְחִלַּת
  chosen: at the beginning of
  alternatives:
  - when they first began
  - at first
  lexicon: HALOT
  rationale: The construct phrase marks the initial stage of the settlement. 'At the
    beginning of' preserves the temporal nuance more formally than the smoother but
    less explicit 'at first'.
- source_word: שִׁבְתָּם
  chosen: their dwelling
  alternatives:
  - their living
  - their settling
  lexicon: HALOT
  rationale: From ישׁב, here referring to residing/settling in the land. 'Their dwelling'
    keeps the nominal force of the Hebrew while remaining natural in English.
- source_word: יָרְאוּ אֶת־יְהוָה
  chosen: did not fear the LORD
  alternatives:
  - did not revere the LORD
  - did not worship the LORD
  lexicon: HALOT
  rationale: ירא with God commonly denotes reverential fear expressed in covenantal
    regard. 'Fear the LORD' is the standard and most textually transparent rendering;
    'revere' is interpretive, and 'worship' is too narrow.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD' rather than a transliteration.
- source_word: וַיְשַׁלַּח ... בָּהֶם
  chosen: sent lions among them
  alternatives:
  - sent lions against them
  - let loose lions on them
  lexicon: HALOT
  rationale: 'The preposition ב here is best rendered idiomatically as ''among'' in
    context: the lions were sent into their midst. ''Against'' is possible but less
    natural with the following clause describing attacks.'
- source_word: הָאֲרָיוֹת
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward plural noun; no reason to vary from the ordinary gloss.
- source_word: וַיִּהְיוּ הֹרְגִים בָּהֶם
  chosen: and they were killing some of them
  alternatives:
  - and they killed them
  - and they kept killing among them
  lexicon: HALOT
  rationale: The construction with היה + participle expresses ongoing or repeated
    action. 'Were killing' preserves the aspect better than a simple preterite. Because
    בָּהֶם after 'killing' is partitive in effect, 'some of them' makes the English
    idiomatic without overstating total destruction.
