  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is literally masculine plural construct, but functions as
    a representative ethnic designation. In keeping with the project's gender-accurate
    principle, the draft preserves the literal form in the main text while noting
    the idiomatic ethnic alternatives.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
