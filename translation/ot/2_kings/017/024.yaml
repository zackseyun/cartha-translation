id: 2KI.17.24
reference: 2 Kings 17:24
source:
  edition: WLC
  text: וַ/יָּבֵ֣א מֶֽלֶךְ אַשּׁ֡וּר מִ/בָּבֶ֡ל וּ֠/מִ/כּוּ֠תָ/ה וּ/מֵ/עַוָּ֤א וּ/מֵֽ/חֲמָת֙
    וּ/סְפַרְוַ֔יִם וַ/יֹּ֨שֶׁב֙ בְּ/עָרֵ֣י שֹֽׁמְר֔וֹן תַּ֖חַת בְּנֵ֣י יִשְׂרָאֵ֑ל
    וַ/יִּֽרְשׁוּ֙ אֶת שֹׁ֣מְר֔וֹן וַ/יֵּֽשְׁב֖וּ בְּ/עָרֶֽי/הָ־־׃
translation:
  text: Then the king of Assyria brought people from Babylon, Cuthah, Avva, Hamath,
    and Sepharvaim, and settled them in the cities of Samaria in place of the sons
    of Israel. They took possession of Samaria and lived in its cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instead of the Israelites' or 'in place of the people of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Avva may also be spelled 'Awwa' in English transliteration.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: brought people
  alternatives:
  - brought
  - caused to come
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means 'bring' or 'cause to come.' English idiom
    requires an object; the context makes clear that the king brought settlers from
    the listed places, so 'people' is supplied for clarity without changing the sense.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural in English.
- source_word: מִבָּבֶל ... וּסְפַרְוַיִם
  chosen: from Babylon, Cuthah, Avva, Hamath, and Sepharvaim
  alternatives:
  - from Babylon, Cuthah, Awwa, Hamath, and Sepharvaim
  lexicon: HALOT
  rationale: These are place names, so they are transliterated rather than translated,
    following the stated philosophy. 'Avva' is a conventional English form for עַוָּא;
    a spelling variant is worth preserving as an alternative.
- source_word: וַיֹּשֶׁב
  chosen: settled them
  alternatives:
  - caused them to dwell
  - made them live
  lexicon: HALOT
  rationale: 'Hiphil of ישׁב is causative: the king caused the imported people to
    dwell there. ''Settled them'' is natural modern English and preserves the causative
    force.'
- source_word: בְּעָרֵי שֹׁמְרוֹן
  chosen: in the cities of Samaria
  alternatives:
  - in Samaria's cities
  lexicon: HALOT
  rationale: עָרֵי is plural, so 'cities' should be retained. שֹׁמְרוֹן here refers
    to the region/province rather than only the capital city, which fits the plural.
- source_word: תַּחַת בְּנֵי יִשְׂרָאֵל
  chosen: in place of the sons of Israel
  alternatives:
  - instead of the Israelites
  - in place of the people of Israel
  lexicon: HALOT
  rationale: תַּחַת here means 'in place of' or 'instead of.' בְּנֵי יִשְׂרָאֵל is
    literally 'sons of Israel'; because the phrase is ethnically representative rather
    than narrowly male, the main text keeps a fairly literal rendering while preserving
    a more idiomatic alternative in view.
- source_word: וַיִּרְשׁוּ אֶת שֹׁמְרוֹן
  chosen: They took possession of Samaria
  alternatives:
  - they possessed Samaria
  - they inherited Samaria
  lexicon: HALOT
  rationale: ירשׁ often means 'take possession of' in conquest/settlement contexts.
    'Inherited' would sound overly theological or legal in English here; 'took possession
    of' best fits the historical resettlement context.
- source_word: וַיֵּשְׁבוּ בְּעָרֶיהָ
  chosen: and lived in its cities
  alternatives:
  - and dwelt in its cities
  - and settled in its cities
  lexicon: HALOT
  rationale: Qal of ישׁב here is the simple intransitive 'live/dwell.' The feminine
    singular suffix on 'its cities' refers back to Samaria.
