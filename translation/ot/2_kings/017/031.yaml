theological_decisions:
- issue: Whether to make explicit that Nibhaz and Tartak were idols/images rather
    than simply named deities
  chosen_reading: Retain the more literal 'made Nibhaz and Tartak' without adding
    'idols' in the main text.
  alternative_readings:
  - made idols of Nibhaz and Tartak
  - made images of Nibhaz and Tartak
  rationale: The Hebrew says simply 'made' plus the names. In context this clearly
    refers to cultic manufacture, but adding 'idols' would interpret beyond the explicit
    wording. The plain sense is preserved while allowing readers to infer the cultic
    meaning from context.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
- issue: Whether בְּנֵיהֶם should be generalized as 'children' for readability
  chosen_reading: Translate specifically as 'sons.'
  alternative_readings:
  - children
  rationale: The Hebrew is gender-specific here. Per the doctrine's gender-accurate
    principle, the translation should preserve the masculine term unless context clearly
    demands a generic sense.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
