id: 2KI.17.31
reference: 2 Kings 17:31
source:
  edition: WLC
  text: וְ/הָ/עַוִּ֛ים עָשׂ֥וּ נִבְחַ֖ז וְ/אֶת תַּרְתָּ֑ק וְ/הַ/סְפַרְוִ֗ים שֹׂרְפִ֤ים
    אֶת בְּנֵי/הֶם֙ בָּ/אֵ֔שׁ לְ/אַדְרַמֶּ֥לֶךְ וַֽ/עֲנַמֶּ֖לֶךְ אלה ספרים־־׃
translation:
  text: The Avvites made Nibhaz and Tartak, and the Sepharvites were burning their
    sons in the fire to Adrammelek and Anammelek, the gods of Sepharvaim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Avvim.'
    reason: lexical_alternative
  - marker: b
    text: That is, they were offering child sacrifices by burning their sons to these
      gods.
    reason: cultural_note
lexical_decisions:
- source_word: הָעַוִּים
  chosen: The Avvites
  alternatives:
  - the Avvim
  lexicon: HALOT
  rationale: Gentilic/plural people-group name; transliterated by standard English
    convention rather than translated, since personal/ethnic names are normally transliterated.
- source_word: עָשׂוּ
  chosen: made
  alternatives:
  - fashioned
  - made for themselves
  lexicon: HALOT
  rationale: Common verb עשה here takes named cult objects/deities as objects; 'made'
    is the most direct and idiomatic rendering, likely implying making idols/images
    without over-specifying beyond the Hebrew.
- source_word: נִבְחַז
  chosen: Nibhaz
  lexicon: HALOT
  rationale: Proper name of a deity; transliterated.
- source_word: וְאֶת תַּרְתָּק
  chosen: and Tartak
  lexicon: HALOT
  rationale: Second proper name coordinated with Nibhaz; direct object marker is not
    represented in English.
- source_word: הַסְפַרְוִים
  chosen: the Sepharvites
  alternatives:
  - the people of Sepharvaim
  lexicon: HALOT
  rationale: Gentilic plural referring to inhabitants of Sepharvaim; 'Sepharvites'
    is concise and conventional.
- source_word: שֹׂרְפִים
  chosen: were burning
  alternatives:
  - burned
  - burnt
  lexicon: HALOT
  rationale: Participle conveys ongoing/customary action in this catalog of cultic
    practices; English progressive best reflects the descriptive force.
- source_word: אֶת בְּנֵיהֶם בָּאֵשׁ
  chosen: their sons in the fire
  alternatives:
  - their children in the fire
  - their sons with fire
  lexicon: HALOT
  rationale: בנים specifically means 'sons,' not the more general 'children'; בָאֵשׁ
    is idiomatically 'in the fire' in sacrificial-burning contexts.
- source_word: לְאַדְרַמֶּלֶךְ וַעֲנַמֶּלֶךְ
  chosen: to Adrammelek and Anammelek
  alternatives:
  - for Adrammelek and Anammelek
  lexicon: HALOT
  rationale: ל marks dedication/direction toward the deities receiving the sacrifice;
    'to' is the most natural English rendering.
- source_word: אלה ספרים
  chosen: the gods of Sepharvaim
  alternatives:
  - the gods of the Sepharvites
  lexicon: HALOT
  rationale: Construct phrase identifying Adrammelek and Anammelek as the gods associated
    with Sepharvaim. 'Of Sepharvaim' is preferable because the underlying proper name
    is geographic, and it matches the gentilic used earlier.
