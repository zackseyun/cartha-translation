id: 2KI.17.4
reference: 2 Kings 17:4
source:
  edition: WLC
  text: וַ/יִּמְצָא֩ מֶֽלֶךְ אַשּׁ֨וּר בְּ/הוֹשֵׁ֜עַ קֶ֗שֶׁר אֲשֶׁ֨ר שָׁלַ֤ח מַלְאָכִים֙
    אֶל ס֣וֹא מֶֽלֶךְ מִצְרַ֔יִם וְ/לֹא הֶעֱלָ֥ה מִנְחָ֛ה לְ/מֶ֥לֶךְ אַשּׁ֖וּר כְּ/שָׁנָ֣ה
    בְ/שָׁנָ֑ה וַֽ/יַּעַצְרֵ֨/הוּ֙ מֶ֣לֶךְ אַשּׁ֔וּר וַ/יַּאַסְרֵ֖/הוּ בֵּ֥ית כֶּֽלֶא־־־־׃
translation:
  text: Then the king of Assyria discovered a conspiracy in Hoshea, because he had
    sent messengers to So, king of Egypt, and had not sent up tribute to the king
    of Assyria, as he had done year by year. So the king of Assyria confined him and
    bound him in prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'found treason in Hoshea.' The Hebrew says literally 'found conspiracy
      in Hoshea,' an idiom for detecting disloyal plotting in him.
    reason: lexical_alternative
  - marker: b
    text: '''So'' is a transliteration of the Hebrew name. The historical identity
      of this Egyptian king is uncertain.'
    reason: cultural_note
  - marker: c
    text: Or 'had not brought up tribute' or more dynamically 'had not paid tribute.'
    reason: lexical_alternative
  - marker: d
    text: 'The Hebrew distinguishes two actions: the king of Assyria first detained
      or confined Hoshea, then bound him in prison.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא
  chosen: discovered
  alternatives:
  - found
  - detected
  lexicon: HALOT
  rationale: The verb literally means 'found,' but in English 'discovered' better
    conveys uncovering treachery or hidden action in context.
- source_word: קֶשֶׁר
  chosen: a conspiracy
  alternatives:
  - treason
  - plot
  lexicon: HALOT
  rationale: The noun denotes a conspiratorial plot. 'Conspiracy' is the most direct
    and contextually appropriate rendering for political rebellion.
- source_word: בְּהוֹשֵׁעַ
  chosen: in Hoshea
  alternatives:
  - against Hoshea
  - concerning Hoshea
  lexicon: HALOT
  rationale: The preposition with this verb idiomatically indicates something found
    'in' a person, that is, detected in his conduct or character. English preserves
    the sense naturally with 'in Hoshea.'
- source_word: שָׁלַח מַלְאָכִים
  chosen: had sent messengers
  alternatives:
  - sent envoys
  lexicon: HALOT
  rationale: מַלְאָכִים can mean messengers or envoys. 'Messengers' is the broader
    lexical equivalent, while the diplomatic context remains clear from the surrounding
    clause.
- source_word: סוֹא
  chosen: So
  alternatives:
  - Seve
  - an Egyptian ruler identified with Osorkon or Tefnakht
  lexicon: HALOT
  rationale: As a proper name, it is transliterated. The historical identification
    is uncertain, so the translation preserves the Hebrew form rather than importing
    a debated identification.
- source_word: מִנְחָה
  chosen: tribute
  alternatives:
  - gift
  - offering
  - present
  lexicon: HALOT
  rationale: Although the noun can broadly mean gift or offering, in an international-political
    context involving a vassal king and Assyria it refers to tribute.
- source_word: הֶעֱלָה
  chosen: had not sent up
  alternatives:
  - had not brought up
  - had not paid
  lexicon: HALOT
  rationale: The verb is literally 'caused to go up/brought up.' In tribute contexts,
    'sent up' preserves the Hebrew idiom while remaining understandable. 'Paid' would
    be smoother but less textually transparent.
- source_word: כְּשָׁנָה בְשָׁנָה
  chosen: year by year
  alternatives:
  - as every year
  - annually
  lexicon: HALOT
  rationale: This idiom denotes regular annual repetition. 'Year by year' is natural
    English and preserves the iterative force.
- source_word: וַיַּעַצְרֵהוּ
  chosen: confined him
  alternatives:
  - shut him up
  - restrained him
  - seized him
  lexicon: HALOT
  rationale: The verb can mean restrain, detain, or confine. Since the next verb explicitly
    states imprisonment, 'confined him' avoids redundancy while preserving the sequence
    of detention followed by incarceration.
- source_word: וַיַּאַסְרֵהוּ
  chosen: bound him
  alternatives:
  - imprisoned him
  - put him in bonds
  lexicon: HALOT
  rationale: The verb fundamentally means to bind. Rendering it as 'bound him' preserves
    the lexical distinction from the previous verb and allows the following phrase
    to specify the place of imprisonment.
- source_word: בֵּית כֶּלֶא
  chosen: in prison
  alternatives:
  - in the house of confinement
  - in jail
  lexicon: HALOT
  rationale: The phrase literally means 'house of confinement/prison.' 'In prison'
    is idiomatic modern English without undue paraphrase.
