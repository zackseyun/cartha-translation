id: 2KI.17.23
reference: 2 Kings 17:23
source:
  edition: WLC
  text: עַ֠ד אֲשֶׁר הֵסִ֨יר יְהוָ֤ה אֶת יִשְׂרָאֵל֙ מֵ/עַ֣ל פָּנָ֔י/ו כַּ/אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַ֖ד כָּל עֲבָדָ֣י/ו הַ/נְּבִיאִ֑ים וַ/יִּ֨גֶל יִשְׂרָאֵ֜ל מֵ/עַ֤ל אַדְמָת/וֹ֙ אַשּׁ֔וּרָ/ה עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־׃פ
translation:
  text: until Yahweh removed Israel from before him, just as he had spoken by the hand of all his servants the prophets. So Israel was exiled from its land to Assyria, to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his presence.' The Hebrew is literally 'from before his face,' an idiom for removal from before the LORD.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by the hand of,' that is, 'through' all his servants the prophets.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסִיר
  chosen: removed
  alternatives:
  - took away
  - banished
  lexicon: HALOT
  rationale: The Hiphil of סור here means to cause to depart/remove. 'Removed' is natural English and preserves the causative force without overinterpreting it as specifically 'banished' in this clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH.
- source_word: מֵעַל פָּנָיו
  chosen: from before his face
  alternatives:
  - from his presence
  - from before him
  lexicon: HALOT
  rationale: Literally 'from upon/before his face.' 'From before his face' preserves the concrete Hebrew idiom and its covenantal/judicial force. A smoother English alternative is preserved in a footnote.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as he had spoken
  alternatives:
  - as he had said
  - according to what he had spoken
  lexicon: HALOT
  rationale: Captures the comparative force of כַּאֲשֶׁר and the prophetic fulfillment sense of דִּבֶּר.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for agency/instrumentality. Retaining 'by the hand of' preserves the idiom while remaining intelligible; a smoother alternative is footnoted.
- source_word: עֲבָדָיו הַנְּבִיאִים
  chosen: his servants the prophets
  alternatives:
  - his servants, the prophets
  - his prophet-servants
  lexicon: HALOT
  rationale: A common biblical expression identifying the prophets as YHWH's servants. The appositional phrase is best represented directly.
- source_word: וַיִּגֶל
  chosen: was exiled
  alternatives:
  - went into exile
  - was carried away
  lexicon: HALOT
  rationale: The verb גלה in this context denotes deportation/exile. Passive English ('was exiled') fits the singular collective subject 'Israel' and the historical sense.
- source_word: אַדְמָתוֹ
  chosen: its land
  alternatives:
  - his land
  - its soil
  lexicon: HALOT
  rationale: With the collective/national subject 'Israel,' English idiom prefers 'its land.' 'Land' is more natural than the more physical 'soil' while preserving territorial sense.
- source_word: אַשּׁוּרָה
  chosen: to Assyria
  alternatives:
  - into Assyria
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Assyria. 'To Assyria' is concise and natural.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering in English for the Hebrew temporal formula.
