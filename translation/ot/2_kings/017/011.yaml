id: 2KI.17.11
reference: 2 Kings 17:11
source:
  edition: WLC
  text: וַ/יְקַטְּרוּ שָׁם֙ בְּ/כָל בָּמ֔וֹת כַּ/גּוֹיִ֕ם אֲשֶׁר הֶגְלָ֥ה יְהוָ֖ה מִ/פְּנֵי/הֶ֑ם וַֽ/יַּעֲשׂוּ֙ דְּבָרִ֣ים רָעִ֔ים לְ/הַכְעִ֖יס אֶת יְהוָֽה־־־־׃
translation:
  text: There they burned incense on all the high places, like the nations whom Yahweh had driven out before them; and they did evil things to provoke Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whom the LORD had exiled from before them.' The Hebrew verb can denote carrying away or removing; here it refers to the nations dispossessed from the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַטְּרוּ
  chosen: they burned incense
  alternatives:
  - they made offerings smoke
  - they offered sacrifices
  lexicon: HALOT
  rationale: The verb קטר in the piel commonly refers to making sacrificial smoke rise, often specifically burning incense or offerings. In this context of illicit worship at high places, 'burned incense' is the most natural and established English rendering without overgeneralizing to all sacrifice.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in those places
  lexicon: HALOT
  rationale: Adverbial 'there' straightforwardly reflects the Hebrew and points back to the high places just mentioned in context.
- source_word: בְּכָל בָּמוֹת
  chosen: on all the high places
  alternatives:
  - at every high place
  lexicon: HALOT
  rationale: בָּמוֹת refers to cultic high places. 'High places' preserves the technical religious sense familiar in Kings. 'On' reflects the Hebrew preposition naturally in English for elevated cult sites.
- source_word: כַּגּוֹיִם
  chosen: like the nations
  alternatives:
  - as the nations
  - like the Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the surrounding nations previously dispossessed from the land, not specifically 'Gentiles' as a later Jewish-Christian contrast term. 'Like the nations' is clear and contextually accurate.
- source_word: אֲשֶׁר הֶגְלָה יְהוָה מִפְּנֵיהֶם
  chosen: whom the LORD had driven out before them
  alternatives:
  - whom the LORD had exiled from before them
  - whom the LORD had removed before them
  lexicon: HALOT
  rationale: Although גלה often means 'go into exile' or 'carry away,' in conquest contexts it can denote removing or deporting peoples from the land. 'Driven out before them' communicates the dispossession idiomatically in English and fits the historical setting better than the more technical 'exiled.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעֲשׂוּ דְּבָרִים רָעִים
  chosen: they did evil things
  alternatives:
  - they did wicked things
  - they committed evil acts
  lexicon: HALOT
  rationale: A direct rendering of the Hebrew phrase. 'Evil things' is simple, readable, and preserves the broad moral indictment without narrowing it.
- source_word: לְהַכְעִיס
  chosen: to provoke
  alternatives:
  - to anger
  - to provoke to anger
  lexicon: HALOT
  rationale: The hiphil of כעס means to cause anger or provoke. 'To provoke' is concise and idiomatic; with 'the LORD' as object, the sense of provoking to anger is clear.
