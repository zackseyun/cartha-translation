theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of הֶגְלָה in this conquest context
  chosen_reading: driven out before them
  alternative_readings:
  - exiled from before them
  - removed from before them
  rationale: The verse recalls the nations dispossessed from the land before Israel. Rendering the verb in a way that reflects conquest/removal preserves the historical-theological point without importing later exile language too strongly.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
