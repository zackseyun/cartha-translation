id: 2KI.17.39
reference: 2 Kings 17:39
source:
  edition: WLC
  text: כִּ֛י אִֽם אֶת יְהוָ֥ה אֱלֹהֵי/כֶ֖ם תִּירָ֑אוּ וְ/הוּא֙ יַצִּ֣יל אֶתְ/כֶ֔ם מִ/יַּ֖ד כָּל אֹיְבֵי/כֶֽם־־־׃
translation:
  text: But Yahweh your God you shall fear, and he will deliver you from the hand of all your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the hand of all your enemies,'' an idiom meaning from their power or control.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Only
  - Except that
  lexicon: HALOT
  rationale: The collocation כִּי אִם here functions adversatively/exclusively in contrast to the preceding prohibition against fearing other gods (v. 38). 'But' gives natural English while preserving the contrast; 'rather' or 'only' are possible but less idiomatic in this sentence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though אֱלֹהִים can be morphologically plural, with the suffix and reference to YHWH it clearly means the singular 'your God' in covenantal address.
- source_word: תִּירָאוּ
  chosen: you shall fear
  alternatives:
  - you must fear
  - you are to fear
  - you shall revere
  lexicon: HALOT
  rationale: The verb ירא in this covenant context denotes reverential fear toward God. 'You shall fear' preserves the directness and imperative-like force of the imperfect in instruction. 'Revere' captures part of the sense but can soften the weight of fear too much.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - and he himself
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew for emphasis/clarity. 'And he' is sufficient in English; adding 'himself' would overstate the emphasis.
- source_word: יַצִּיל
  chosen: will deliver
  alternatives:
  - will rescue
  - will save
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to snatch away, deliver, or rescue from danger. 'Will deliver' fits standard covenantal language and pairs naturally with 'from the hand of.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from
  - out of the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is common biblical language for power or control. It is transparent enough in modern English and preserves the Hebrew imagery better than the flatter 'from' alone.
- source_word: כָּל אֹיְבֵיכֶם
  chosen: all your enemies
  alternatives:
  - every one of your enemies
  lexicon: HALOT
  rationale: A straightforward rendering of the quantifier plus plural noun; 'all your enemies' is idiomatic and complete.
