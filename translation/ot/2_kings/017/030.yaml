id: 2KI.17.30
reference: 2 Kings 17:30
source:
  edition: WLC
  text: וְ/אַנְשֵׁ֣י בָבֶ֗ל עָשׂוּ֙ אֶת סֻכּ֣וֹת בְּנ֔וֹת וְ/אַנְשֵׁי כ֔וּת עָשׂ֖וּ
    אֶת נֵֽרְגַ֑ל וְ/אַנְשֵׁ֥י חֲמָ֖ת עָשׂ֥וּ אֶת אֲשִׁימָֽא־־־־׃
translation:
  text: The men of Babylon made Succoth-benoth, the men of Cuth made Nergal, and the
    men of Hamath made Ashima.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Succoth-benoth is likely the name of a foreign deity or cult object; the
      meaning of the name is uncertain, so it is transliterated rather than translated.
    reason: cultural_note
  - marker: b
    text: Or 'the people of Babylon ... the people of Cuth ... the people of Hamath.'
      The Hebrew uses 'men of' in each case.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the people of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ here denotes the inhabitants/males associated
    with each place. 'The men of' is the most direct rendering and matches the repeated
    formula in the verse. 'The people of' is possible as a collective sense, but the
    Hebrew form is explicitly masculine plural.
- source_word: עָשׂוּ
  chosen: made
  alternatives:
  - fashioned
  - set up
  lexicon: HALOT
  rationale: The common verb עשה means 'make/do.' In this context of producing or
    establishing cult images/deities, 'made' is the plainest and most textually grounded
    choice. 'Set up' interprets the action more specifically than the Hebrew states.
- source_word: סֻכּוֹת בְּנוֹת
  chosen: Succoth-benoth
  alternatives:
  - Sukkoth-benoth
  - Succoth Benoth
  lexicon: HALOT
  rationale: This appears to be a proper name for a foreign deity or cult object,
    so transliteration is preferred under the project's principle to transliterate
    names. The exact etymology is uncertain, so translating the components ('booths
    of daughters') would overstate confidence.
- source_word: כּוּת
  chosen: Cuth
  alternatives:
  - Kuth
  lexicon: HALOT
  rationale: Place name; transliterated in standard English form. 'Cuth' is a conventional
    rendering of the Hebrew proper noun.
- source_word: נֵרְגַל
  chosen: Nergal
  lexicon: HALOT
  rationale: Proper name of a Mesopotamian deity; transliteration is appropriate rather
    than translation.
- source_word: חֲמָת
  chosen: Hamath
  lexicon: HALOT
  rationale: Place name; standard English transliteration.
- source_word: אֲשִׁימָא
  chosen: Ashima
  lexicon: HALOT
  rationale: Proper name of a foreign deity; transliteration best preserves the source
    text without speculative interpretation.
