theological_decisions:
- issue: Whether to translate the objects of עָשׂוּ as 'idols/gods' rather than preserve
    the proper names
  chosen_reading: Preserve the proper names in transliteration without adding 'idol'
    or 'god' in the main text.
  alternative_readings:
  - The men of Babylon made the idol Succoth-benoth ...
  - The Babylonians made Succoth-benoth their god ...
  rationale: The Hebrew simply says 'made' plus the direct object, which in this context
    are names of foreign deities/cult objects. Adding 'idol' or 'god' clarifies interpretation
    but goes beyond the explicit wording. Transliteration preserves the historical
    and religious referents while remaining textually restrained.
  doctrine_reference: Translation philosophy §§1, 2, 3
