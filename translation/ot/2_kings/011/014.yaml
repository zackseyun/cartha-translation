id: 2KI.11.14
reference: 2 Kings 11:14
source:
  edition: WLC
  text: וַ/תֵּ֡רֶא וְ/הִנֵּ֣ה הַ/מֶּלֶךְ֩ עֹמֵ֨ד עַֽל הָ/עַמּ֜וּד כַּ/מִּשְׁפָּ֗ט
    וְ/הַ/שָּׂרִ֤ים וְ/הַ/חֲצֹֽצְרוֹת֙ אֶל הַ/מֶּ֔לֶךְ וְ/כָל עַ֤ם הָ/אָ֨רֶץ֙ שָׂמֵ֔חַ
    וְ/תֹקֵ֖עַ בַּ/חֲצֹֽצְר֑וֹת וַ/תִּקְרַ֤ע עֲתַלְיָה֙ אֶת בְּגָדֶ֔י/הָ וַ/תִּקְרָ֖א
    קֶ֥שֶׁר קָֽשֶׁר־־־־׃ס
translation:
  text: And she looked, and behold, the king was standing by the pillar, according
    to the custom, with the officers and the trumpets beside the king, and all the
    people of the land were rejoicing and blowing trumpets. Then Athaliah tore her
    clothes and cried, “Conspiracy! Conspiracy!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the pillar.” The Hebrew preposition can be understood in more than
      one locative sense here.
    reason: lexical_alternative
  - marker: b
    text: Or “Treason! Treason!”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  chosen: And she looked
  alternatives:
  - And she saw
  lexicon: HALOT
  rationale: The verb ראה commonly means 'see,' but in narrative English 'looked'
    works well with the following הִנֵּה ('behold') to convey sudden visual recognition.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there was
  lexicon: HALOT
  rationale: Retained as 'behold' to preserve the abrupt, dramatic deictic force in
    the Hebrew narrative.
- source_word: הַמֶּלֶךְ עֹמֵד
  chosen: the king was standing
  alternatives:
  - the king stood
  lexicon: HALOT
  rationale: The participle עֹמֵד presents a durative scene; 'was standing' reflects
    the ongoing posture more naturally than a simple past.
- source_word: עַל הָעַמּוּד
  chosen: by the pillar
  alternatives:
  - on the pillar
  - at the pillar
  lexicon: HALOT
  rationale: Although עַל often means 'on,' in this architectural/court setting the
    sense is locative association with a known ceremonial pillar or standing place.
    'By the pillar' is idiomatic and fits the scene.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the custom
  alternatives:
  - as was the rule
  - according to the ordinance
  - as usual
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers not to legal judgment but to established procedure
    or customary practice in royal ceremony.
- source_word: וְהַשָּׂרִים
  chosen: the officers
  alternatives:
  - the captains
  - the princes
  - the commanders
  lexicon: HALOT
  rationale: שָׂרִים is a broad term for officials/leaders. 'Officers' fits the royal-military
    context without over-specifying rank.
- source_word: וְהַחֲצֹצְרוֹת
  chosen: the trumpets
  alternatives:
  - the trumpet players
  lexicon: HALOT
  rationale: The Hebrew names the instruments rather than the players. The phrase
    likely implies ceremonial trumpets present in association with the king.
- source_word: אֶל הַמֶּלֶךְ
  chosen: beside the king
  alternatives:
  - by the king
  - with the king
  - toward the king
  lexicon: HALOT
  rationale: The preposition אֶל can indicate proximity in context. Here it describes
    the officers and trumpets as positioned in attendance near the king.
- source_word: כָל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the country
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for the populace of the land; preserved
    fairly literally.
- source_word: שָׂמֵחַ
  chosen: were rejoicing
  alternatives:
  - were glad
  - were celebrating
  lexicon: HALOT
  rationale: The adjective conveys active joy in context; 'were rejoicing' matches
    the public celebratory scene.
- source_word: וְתֹקֵעַ בַּחֲצֹצְרוֹת
  chosen: and blowing trumpets
  alternatives:
  - and sounding the trumpets
  lexicon: HALOT
  rationale: תקע with trumpets means to blow/sound them. 'Blowing trumpets' is natural
    modern English.
- source_word: וַתִּקְרַע ... אֶת בְּגָדֶיהָ
  chosen: Athaliah tore her clothes
  alternatives:
  - Athaliah tore her garments
  lexicon: HALOT
  rationale: '''Clothes'' is more readable modern English than ''garments'' while
    preserving the mourning/alarm gesture.'
- source_word: קֶשֶׁר קָשֶׁר
  chosen: Conspiracy! Conspiracy!
  alternatives:
  - Treason! Treason!
  lexicon: HALOT
  rationale: The repeated noun means 'conspiracy' or 'plot.' 'Conspiracy' is the more
    direct lexical equivalent; 'treason' is interpretive and stronger than the Hebrew
    requires.
