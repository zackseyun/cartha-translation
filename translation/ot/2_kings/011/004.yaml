id: 2KI.11.4
reference: 2 Kings 11:4
source:
  edition: WLC
  text: וּ/בַ/שָּׁנָ֣ה הַ֠/שְּׁבִיעִית שָׁלַ֨ח יְהוֹיָדָ֜ע וַ/יִּקַּ֣ח אֶת שָׂרֵ֣י
    ה/מאיות לַ/כָּרִי֙ וְ/לָ֣/רָצִ֔ים וַ/יָּבֵ֥א אֹתָ֛/ם אֵלָ֖י/ו בֵּ֣ית יְהוָ֑ה וַ/יִּכְרֹת֩
    לָ/הֶ֨ם בְּרִ֜ית וַ/יַּשְׁבַּ֤ע אֹתָ/ם֙ בְּ/בֵ֣ית יְהוָ֔ה וַ/יַּ֥רְא אֹתָ֖/ם אֶת
    בֶּן הַ/מֶּֽלֶךְ׀־־־׃
translation:
  text: In the seventh year Jehoiada sent and took the commanders of hundreds, the
    Carites, and the runners, and brought them to himself in the house of the LORD.
    He made a covenant with them and put them under oath in the house of the LORD,
    and showed them the king’s son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Cherethites.' The Hebrew term likely names a royal guard unit; its
      precise identification is uncertain.
    reason: alternative_reading
  - marker: b
    text: '''The runners'' likely refers to royal guards or couriers.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבַשָּׁנָה הַשְּׁבִיעִית
  chosen: In the seventh year
  alternatives:
  - And in the seventh year
  lexicon: HALOT
  rationale: Temporal phrase introducing the narrative setting. English can omit the
    initial conjunction for smoother style without loss, but the sense is preserved
    by 'In the seventh year.'
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - sent word
  lexicon: HALOT
  rationale: The verb plainly means 'sent.' No object is expressed here; the following
    'and took' explains the action initiated by the sending.
- source_word: וַיִּקַּח אֶת שָׂרֵי הַמֵּאוֹת
  chosen: and took the commanders of hundreds
  alternatives:
  - and took the captains of hundreds
  - and summoned the centurions
  lexicon: HALOT
  rationale: שָׂרֵי הַמֵּאוֹת denotes military officers over groups of a hundred.
    'Commanders of hundreds' is transparent and avoids importing a specifically Roman
    term like 'centurions.'
- source_word: לַכָּרִי
  chosen: the Carites
  alternatives:
  - the Cherethites
  lexicon: HALOT
  rationale: The Hebrew points to a group designation כָּרִי. 'Carites' preserves
    the likely proper ethnicon/title without over-interpreting. Because some connect
    the term with the Cherethites, that alternative is preserved in a footnote.
- source_word: וְלָרָצִים
  chosen: and the runners
  alternatives:
  - and the guards
  lexicon: HALOT
  rationale: Literally 'the runners,' a known designation for royal couriers/bodyguards.
    The more literal rendering is retained in the main text, with the functional sense
    left implicit rather than paraphrased.
- source_word: וַיָּבֵא אֹתָם אֵלָיו
  chosen: and brought them to himself
  alternatives:
  - and brought them to him
  lexicon: HALOT
  rationale: The phrase indicates that Jehoiada brought them into his presence. 'To
    himself' makes the reflexive sense explicit in natural English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' Following doctrine, יְהוָה is
    rendered 'the LORD.' 'House' preserves the Hebrew expression more closely than
    'temple,' though both refer to the temple precincts.
- source_word: וַיִּכְרֹת לָהֶם בְּרִית
  chosen: He made a covenant with them
  alternatives:
  - He cut a covenant with them
  - He made an agreement with them
  lexicon: HALOT
  rationale: כרת ברית is the standard covenant-making idiom. 'Made a covenant' is
    idiomatic English while preserving the theological and political weight better
    than 'agreement.'
- source_word: וַיַּשְׁבַּע אֹתָם
  chosen: and put them under oath
  alternatives:
  - and made them swear
  - and bound them by oath
  lexicon: HALOT
  rationale: The causative sense is that Jehoiada caused them to swear. 'Put them
    under oath' is natural modern English and captures the formal solemnity.
- source_word: וַיַּרְא אֹתָם אֶת בֶּן הַמֶּלֶךְ
  chosen: and showed them the king’s son
  alternatives:
  - and let them see the king's son
  lexicon: HALOT
  rationale: The construction means Jehoiada revealed or presented the king's son
    to them. 'Showed them' is the most direct and idiomatic rendering.
