id: 2KI.11.1
reference: 2 Kings 11:1
source:
  edition: WLC
  text: וַֽ/עֲתַלְיָה֙ אֵ֣ם אֲחַזְיָ֔הוּ ו/ראתה כִּ֣י מֵ֣ת בְּנָ֑/הּ וַ/תָּ֨קָם֙ וַ/תְּאַבֵּ֔ד
    אֵ֖ת כָּל זֶ֥רַע הַ/מַּמְלָכָֽה־׃
translation:
  text: Now Athaliah, the mother of Ahaziah, saw that her son was dead, so she arose
    and destroyed all the royal offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''all the seed of the kingdom,'' that is, the royal line or royal
      descendants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲתַלְיָה
  chosen: Now Athaliah
  alternatives:
  - And Athaliah
  - Then Athaliah
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. The prefixed
    waw at the start of a new narrative unit is rendered 'Now' to signal transition
    naturally in English.
- source_word: אֵם אֲחַזְיָהוּ
  chosen: the mother of Ahaziah
  alternatives:
  - Ahaziah's mother
  lexicon: HALOT
  rationale: Construct chain identifies Athaliah by relationship. 'The mother of Ahaziah'
    preserves the appositional identification clearly and formally.
- source_word: וַתָּרְאֶה כִּי מֵת בְּנָהּ
  chosen: saw that her son was dead
  alternatives:
  - saw that her son had died
  lexicon: HALOT
  rationale: ראתה + כי introduces perception of a fact. 'Was dead' closely reflects
    the stative/resultative sense of מת while remaining idiomatic English. 'Her son'
    correctly renders the suffixed noun.
- source_word: וַתָּקָם
  chosen: so she arose
  alternatives:
  - and she arose
  - and she got up
  - then she rose
  lexicon: HALOT
  rationale: קום in narrative often marks decisive action. 'Arose' preserves the formal
    narrative force better than the flatter 'got up.' 'So' conveys consequential sequence
    from her seeing her son's death.
- source_word: וַתְּאַבֵּד
  chosen: destroyed
  alternatives:
  - killed
  - wiped out
  - annihilated
  lexicon: HALOT
  rationale: אבד in the piel here denotes causing destruction. 'Destroyed' is broad
    enough to match the Hebrew without over-specifying the manner, while context still
    implies lethal elimination.
- source_word: אֵת כָּל זֶרַע הַמַּמְלָכָה
  chosen: all the royal offspring
  alternatives:
  - all the seed of the kingdom
  - all the royal seed
  - all the descendants of the kingdom
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed,' but in this dynastic context it refers
    to descendants/offspring. 'Royal offspring' communicates the sense naturally in
    modern English while preserving the dynastic reference of הַמַּמְלָכָה.
