id: 2KI.11.8
reference: 2 Kings 11:8
source:
  edition: WLC
  text: וְ/הִקַּפְתֶּ֨ם עַל הַ/מֶּ֜לֶךְ סָבִ֗יב אִ֚ישׁ וְ/כֵלָ֣י/ו בְּ/יָד֔/וֹ וְ/הַ/בָּ֥א
    אֶל הַ/שְּׂדֵר֖וֹת יוּמָ֑ת וִ/הְי֥וּ אֶת הַ/מֶּ֖לֶךְ בְּ/צֵאת֥/וֹ וּ/בְ/בֹאֽ/וֹ־־־׃
translation:
  text: You shall surround the king on every side, each man with his weapons in his
    hand. Whoever comes within the ranks shall be put to death. Stay with the king
    when he goes out and when he comes in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever comes into the lines/rows.' The Hebrew term likely refers to
      the arranged ranks of the guard.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''in his going out and in his coming in,'' an idiom for accompanying
      and guarding him in all his movements.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִקַּפְתֶּם
  chosen: You shall surround
  alternatives:
  - You must encircle
  - You shall form a circle around
  lexicon: HALOT
  rationale: Hiphil of נקף/נקף-related form here conveys causing an encirclement around
    the king. 'Surround' is natural English and preserves the military-protective
    sense without overparaphrase.
- source_word: עַל הַמֶּלֶךְ סָבִיב
  chosen: the king on every side
  alternatives:
  - around the king
  - all around the king
  lexicon: HALOT
  rationale: The preposition plus סָבִיב expresses surrounding position relative to
    the king. 'On every side' captures the distributive protective arrangement.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - every man
  - each one
  lexicon: HALOT
  rationale: The singular distributive use indicates each individual guard. 'Each
    man' preserves the masculine singular form and military context, in line with
    gender-accurate policy.
- source_word: וְכֵלָיו בְּיָדוֹ
  chosen: with his weapons in his hand
  alternatives:
  - with his equipment in his hand
  - with his weapon in hand
  lexicon: HALOT
  rationale: כְּלִי can mean vessel, implement, or weapon; in this guard-command context
    'weapons' is the most contextually appropriate rendering. The singular 'his hand'
    is retained idiomatically in English as 'in his hand.'
- source_word: וְהַבָּא אֶל הַשְּׂדֵרוֹת
  chosen: Whoever comes within the ranks
  alternatives:
  - whoever enters the lines
  - the one who comes into the rows
  lexicon: HALOT
  rationale: The participle with article functions generically. שְׂדֵרוֹת denotes
    arranged rows/ranks, likely the guard lines. 'Within the ranks' communicates the
    military formation more clearly than a wooden 'into the rows.'
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall be killed
  - must die
  lexicon: HALOT
  rationale: The Hophal gives a passive/causative passive sense. 'Shall be put to
    death' reflects the formal force of an execution order better than the less specific
    'killed.'
- source_word: וִהְיוּ אֶת הַמֶּלֶךְ
  chosen: Stay with the king
  alternatives:
  - Be with the king
  - Remain beside the king
  lexicon: HALOT
  rationale: The imperative-like waw + qatal in context continues the command sequence.
    אֶת with היה conveys accompaniment. 'Stay with' is idiomatic and preserves the
    protective duty.
- source_word: בְּצֵאתוֹ וּבְבֹאוֹ
  chosen: in his going out and in his coming in
  alternatives:
  - when he goes out and when he comes in
  - at his going out and his coming in
  lexicon: HALOT
  rationale: This is a Hebrew idiom for accompanying someone in all movements, especially
    public movement. The more literal pair 'going out ... coming in' preserves the
    idiom while remaining understandable.
