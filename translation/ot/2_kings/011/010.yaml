id: 2KI.11.10
reference: 2 Kings 11:10
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן הַ/כֹּהֵ֜ן לְ/שָׂרֵ֣י ה/מאיות אֶֽת הַ/חֲנִית֙ וְ/אֶת הַ/שְּׁלָטִ֔ים אֲשֶׁ֖ר לַ/מֶּ֣לֶךְ דָּוִ֑ד אֲשֶׁ֖ר בְּ/בֵ֥ית יְהוָֽה־־׃
translation:
  text: Then the priest gave to the commanders of hundreds the spears and the shields that had belonged to King David, which were in the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the spear'; the singular may be used collectively, hence 'the spears.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the temple of the LORD.' Literally, 'in the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: Then ... gave
  alternatives:
  - and ... gave
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the singular noun with article.
- source_word: לְשָׂרֵי הַמֵּאוֹת
  chosen: to the commanders of hundreds
  alternatives:
  - to the captains of hundreds
  - to the officers of hundreds
  lexicon: HALOT
  rationale: The phrase denotes military leaders over units of one hundred. 'Commanders of hundreds' is clear modern English and stays close to the Hebrew structure.
- source_word: הַחֲנִית
  chosen: the spears
  alternatives:
  - the spear
  lexicon: HALOT
  rationale: Although morphologically singular, the noun can function collectively in context, especially paired with the plural 'shields' and distributed to multiple commanders. English plural best reflects the likely sense of weaponry being handed out.
- source_word: הַשְּׁלָטִים
  chosen: the shields
  alternatives:
  - the quivers
  - the weapons
  lexicon: HALOT
  rationale: The term most likely refers to shields or defensive gear in royal/temple armament contexts. 'Shields' is the standard and best-supported rendering here.
- source_word: אֲשֶׁר לַמֶּלֶךְ דָּוִד
  chosen: that had belonged to King David
  alternatives:
  - that were King David's
  - which belonged to King David
  lexicon: HALOT
  rationale: The relative clause marks possession. 'Had belonged to' reads naturally in English and fits the historical reference to David's weapons kept in the temple.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH is literally 'house of the LORD.' This preserves the Hebrew expression while remaining idiomatic. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
