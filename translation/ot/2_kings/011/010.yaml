theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of הַחֲנִית as singular or collective
  chosen_reading: the spears
  alternative_readings:
  - the spear
  rationale: The Hebrew form is singular, but the context of distributing royal weapons to multiple commanders and the pairing with plural 'shields' supports a collective sense in English. This is a lexical-contextual decision, not a doctrinal one, but it materially affects the translation.
