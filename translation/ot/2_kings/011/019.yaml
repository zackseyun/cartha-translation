id: 2KI.11.19
reference: 2 Kings 11:19
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אֶת שָׂרֵ֣י הַ֠/מֵּאוֹת וְ/אֶת הַ/כָּרִ֨י וְ/אֶת הָ/רָצִ֜ים וְ/אֵ֣ת כָּל עַ֣ם הָ/אָ֗רֶץ וַ/יֹּרִ֤ידוּ אֶת הַ/מֶּ֨לֶךְ֙ מִ/בֵּ֣ית יְהוָ֔ה וַ/יָּב֛וֹאוּ דֶּֽרֶך שַׁ֥עַר הָ/רָצִ֖ים בֵּ֣ית הַ/מֶּ֑לֶךְ וַ/יֵּ֖שֶׁב עַל כִּסֵּ֥א הַ/מְּלָכִֽים־־־׀־־־־׃
translation:
  text: Then he took the commanders of hundreds, the Carites, the runners, and all the people of the land, and they brought the king down from the house of Yahweh and came by way of the gate of the runners to the king’s house, and he sat on the throne of the kings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Cherethites' or 'the bodyguard' for 'the Carites.' The Hebrew term is uncertain.
    reason: alternative_reading
  - marker: b
    text: '''The runners'' likely refers to royal guards or couriers; also in ''the gate of the runners.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then he took
  alternatives:
  - Then he gathered
  - Then he took with him
  lexicon: HALOT
  rationale: The singular verb most naturally refers back to Jehoiada as the acting subject. 'Took' is formally close, while in context it carries the sense of assembling or taking along the listed groups.
- source_word: שָׂרֵי הַמֵּאוֹת
  chosen: the commanders of hundreds
  alternatives:
  - the captains of hundreds
  - the centurions
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the military structure without importing specifically Roman terminology such as 'centurions.' 'Commanders' is clearer in modern English than 'captains.'
- source_word: הַכָּרִי
  chosen: the Carites
  alternatives:
  - the Cherethites
  - the bodyguard
  lexicon: HALOT
  rationale: The term is uncertain. Rendering it as 'Carites' preserves the Hebrew form without over-interpreting ethnic identity or function. Because 'Cherethites' and 'bodyguard' are both plausible in context and translation tradition, they are preserved in a footnote.
- source_word: הָרָצִים
  chosen: the runners
  alternatives:
  - the guards
  - the couriers
  lexicon: HALOT
  rationale: Literally 'the runners.' In royal contexts this likely denotes a class of royal guards or messengers, but the concrete Hebrew image is retained in the main text. A functional alternative is preserved in a footnote.
- source_word: כָּל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the country
  - all the common people of the land
  lexicon: HALOT
  rationale: This phrase often refers to the populace of Judah/the land. 'People of the land' preserves the established biblical idiom and avoids narrowing it to either only commoners or the entire nation without qualification.
- source_word: וַיֹּרִידוּ אֶת הַמֶּלֶךְ
  chosen: they brought the king down
  alternatives:
  - they led the king down
  - they escorted the king down
  lexicon: HALOT
  rationale: The plural verb shifts to the assembled group as subject. 'Brought down' reflects the directional sense of ירד from the temple precincts to the palace area; 'led' or 'escorted' are possible but less literal.
- source_word: מִבֵּית יְהוָה
  chosen: from the house of the LORD
  alternatives:
  - from the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is a standard and transparent rendering of the Hebrew phrase. The divine name follows the doctrinal default ''the LORD'' for יְהוָה.'
- source_word: דֶּרֶךְ שַׁעַר הָרָצִים
  chosen: by way of the gate of the runners
  alternatives:
  - through the gate of the guards
  - by the runners' gate
  lexicon: HALOT
  rationale: The phrase is rendered fairly literally. Because הָרָצִים likely denotes an official corps, 'gate of the runners' preserves the wording while allowing a footnote to note the functional sense 'guards.'
- source_word: בֵּית הַמֶּלֶךְ
  chosen: to the king’s house
  alternatives:
  - to the royal palace
  - to the palace
  lexicon: HALOT
  rationale: A literal rendering keeps the Hebrew parallel with 'house of the LORD.' 'Palace' is idiomatic but less formally transparent.
- source_word: וַיֵּשֶׁב
  chosen: and he sat
  alternatives:
  - and he took his seat
  lexicon: HALOT
  rationale: The singular verb refers to the king. 'Sat' is direct and formal; the enthronement sense is clear from the following phrase.
- source_word: עַל כִּסֵּא הַמְּלָכִים
  chosen: on the throne of the kings
  alternatives:
  - on the royal throne
  - on the throne of the kingdom
  lexicon: HALOT
  rationale: The plural 'of the kings' is preserved rather than flattened to 'royal,' likely referring to the dynastic throne of Judah's kings. This keeps the Hebrew texture and the succession motif.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
