id: 2KI.11.18
reference: 2 Kings 11:18
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ כָל עַם֩ הָ/אָ֨רֶץ בֵּית הַ/בַּ֜עַל וַֽ/יִּתְּצֻ֗/הוּ אֶת מזבחת/ו
    וְ/אֶת צְלָמָי/ו֙ שִׁבְּר֣וּ הֵיטֵ֔ב וְ/אֵ֗ת מַתָּן֙ כֹּהֵ֣ן הַ/בַּ֔עַל הָרְג֖וּ
    לִ/פְנֵ֣י הַֽ/מִּזְבְּח֑וֹת וַ/יָּ֧שֶׂם הַ/כֹּהֵ֛ן פְּקֻדּ֖וֹת עַל בֵּ֥ית יְהוָֽה־־־־־׃
translation:
  text: Then all the people of the land went into the house of Baal and tore it down.
    They thoroughly smashed his altars and his images, and they killed Mattan the
    priest of Baal before the altars. Then the priest appointed overseers over the
    house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of Baal.' The Hebrew reads 'house of Baal.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his idols' or 'his statues' for 'his images.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: כָל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the country
  - all the common people of the land
  lexicon: HALOT
  rationale: A standard political-social expression in Kings. 'People of the land'
    preserves the Hebrew idiom without over-interpreting it as merely 'common people,'
    though that nuance may sometimes be present.
- source_word: בֵּית הַבַּעַל
  chosen: the house of Baal
  alternatives:
  - the temple of Baal
  lexicon: HALOT
  rationale: '''House'' is the literal term and is natural in English here. ''Temple''
    is possible, but ''house'' better preserves the Hebrew wording while still being
    understandable.'
- source_word: וַיִּתְּצֻהוּ
  chosen: tore it down
  alternatives:
  - broke it down
  - demolished it
  lexicon: HALOT
  rationale: The verb denotes pulling down or tearing down a structure. 'Tore it down'
    is vivid, idiomatic, and fits the destruction of a cultic building.
- source_word: מִזְבְּחֹתָיו
  chosen: his altars
  alternatives:
  - its altars
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, naturally referring to Baal/the
    Baal-house complex. 'His altars' reflects the Hebrew form more directly than the
    impersonal 'its altars.'
- source_word: צְלָמָיו
  chosen: his images
  alternatives:
  - his idols
  - his carved images
  - his statues
  lexicon: HALOT
  rationale: The noun refers broadly to images/statues. 'Images' is sufficiently literal
    and avoids importing the more interpretive term 'idols,' though the cultic context
    is clear.
- source_word: שִׁבְּרוּ הֵיטֵב
  chosen: thoroughly smashed
  alternatives:
  - completely broke in pieces
  - utterly shattered
  lexicon: HALOT
  rationale: The combination of the verb 'break' with the adverb intensifies the action.
    'Thoroughly smashed' captures both the violence and completeness in readable modern
    English.
- source_word: מַתָּן כֹּהֵן הַבַּעַל
  chosen: Mattan the priest of Baal
  alternatives:
  - Mattan, priest of Baal
  lexicon: HALOT
  rationale: Straightforward identification of the named individual and his office.
- source_word: לִפְנֵי הַמִּזְבְּחוֹת
  chosen: before the altars
  alternatives:
  - in front of the altars
  - at the altars
  lexicon: HALOT
  rationale: '''Before'' is the normal rendering of לִפְנֵי and preserves the spatial
    sense without over-specifying.'
- source_word: וַיָּשֶׂם הַכֹּהֵן
  chosen: Then the priest appointed
  alternatives:
  - Then the priest set
  - Then the priest stationed
  lexicon: HALOT
  rationale: The verb 'set/place' with פְּקֻדּוֹת in this administrative context means
    to establish or appoint personnel/oversight arrangements. 'Appointed' communicates
    the function clearly.
- source_word: פְּקֻדּוֹת
  chosen: overseers
  alternatives:
  - offices
  - guards
  - charges
  - supervisors
  lexicon: HALOT
  rationale: The noun can denote offices, oversight, or those assigned to supervision.
    In context of reorganizing temple order after the coup, 'overseers' best captures
    the likely personal-administrative sense.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The divine name is rendered according to doctrine as 'the LORD.' 'House'
    is retained for consistency with the Hebrew and with the earlier 'house of Baal,'
    highlighting the contrast between the two cultic sites.
