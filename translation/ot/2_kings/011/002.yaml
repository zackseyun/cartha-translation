theological_decisions:
- issue: Potential harmonization of familial relationship
  chosen_reading: Retain 'sister of Ahaziah' as the lexical sense of the Hebrew text
  alternative_readings:
  - Render more loosely as 'relative of Ahaziah' to ease harmonization with parallel
    genealogical data
  rationale: The verse itself uses the ordinary term for sister, and the translation
    should not import a harmonizing solution not demanded by the Hebrew. Any broader
    kinship explanation belongs to commentary, not the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Subject of 'hid him'
  chosen_reading: Translate the plural verb as 'they hid him'
  alternative_readings:
  - Singular 'she hid him' by contextual smoothing
  rationale: The Masoretic verbal form is plural and should be preserved unless the
    text plainly demands otherwise. This maintains transparency to the source text.
  doctrine_reference: Translation philosophy §1, §5
