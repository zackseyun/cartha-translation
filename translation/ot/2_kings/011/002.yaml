id: 2KI.11.2
reference: 2 Kings 11:2
source:
  edition: WLC
  text: וַ/תִּקַּ֣ח יְהוֹשֶׁ֣בַע בַּת הַ/מֶּֽלֶךְ י֠וֹרָם אֲח֨וֹת אֲחַזְיָ֜הוּ אֶת
    יוֹאָ֣שׁ בֶּן אֲחַזְיָ֗ה וַ/תִּגְנֹ֤ב אֹת/וֹ֙ מִ/תּ֤וֹךְ בְּנֵֽי הַ/מֶּ֨לֶךְ֙
    ה/ממותתים אֹת֥/וֹ וְ/אֶת מֵינִקְתּ֖/וֹ בַּ/חֲדַ֣ר הַ/מִּטּ֑וֹת וַ/יַּסְתִּ֧רוּ
    אֹת֛/וֹ מִ/פְּנֵ֥י עֲתַלְיָ֖הוּ וְ/לֹ֥א הוּמָֽת־־־־־־׃
translation:
  text: But Jehosheba, the daughter of King Joram, sister of Ahaziah, took Joash son
    of Ahaziah and stole him away from among the king’s sons who were being put to
    death, along with his nurse, into the bedroom; and they hid him from Athaliah,
    so that he was not put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the room of the beds'' or ''in the bedchamber.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'his wet nurse.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew verb is plural: ''they hid him.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקַּח
  chosen: took
  alternatives:
  - took hold of
  - received
  lexicon: HALOT
  rationale: Common narrative verb לקח in wayyiqtol; 'took' is the natural English
    narrative equivalent without overinterpreting the action.
- source_word: יְהוֹשֶׁבַע
  chosen: Jehosheba
  alternatives:
  - Jehoshabeath
  rationale: Personal name transliterated per project philosophy. The Kings form is
    preserved here; Chronicles has the variant Jehoshabeath.
- source_word: בַּת־הַמֶּלֶךְ יוֹרָם
  chosen: the daughter of King Joram
  alternatives:
  - daughter of the king, Joram
  lexicon: HALOT
  rationale: Construct chain identifies Jehosheba as daughter of King Joram. 'King
    Joram' is smoother modern English while preserving the royal title.
- source_word: אֲחוֹת אֲחַזְיָהוּ
  chosen: sister of Ahaziah
  alternatives:
  - relative of Ahaziah
  lexicon: HALOT
  rationale: אחות normally means literal sister. Although genealogical questions arise
    in harmonization with Chronicles, the lexical sense here is straightforward and
    should not be weakened in translation.
- source_word: וַתִּגְנֹב אֹתוֹ
  chosen: stole him away
  alternatives:
  - kidnapped him away
  - snatched him away
  - secreted him away
  lexicon: HALOT
  rationale: גנב literally means 'steal.' In context of rescuing a child from massacre,
    idiomatic English 'stole him away' preserves both secrecy and the underlying lexical
    force better than a flat 'took away'.
- source_word: מִתּוֹךְ בְּנֵי הַמֶּלֶךְ
  chosen: from among the king’s sons
  alternatives:
  - from among the royal princes
  - from the midst of the king's children
  lexicon: HALOT
  rationale: בני המלך literally 'sons of the king.' 'King’s sons' is more formally
    accurate than 'princes,' which is interpretive.
- source_word: הַמּוּמָתִים
  chosen: who were being put to death
  alternatives:
  - who were being killed
  - who were to be put to death
  lexicon: HALOT
  rationale: Hophal participle of מות indicates those being caused to die, i.e., being
    executed/killed. Progressive English best fits the massacre scene.
- source_word: מֵינִקְתּוֹ
  chosen: his nurse
  alternatives:
  - his wet nurse
  - his nursing woman
  lexicon: HALOT
  rationale: The noun denotes the woman nursing the child. 'His nurse' is readable
    modern English; the more specific 'wet nurse' is possible but not required in
    the main text.
- source_word: בַּחֲדַר הַמִּטּוֹת
  chosen: into the bedroom
  alternatives:
  - in the bedchamber
  - in the room of the beds
  lexicon: HALOT
  rationale: Literally 'in the room of the beds.' In context this is a sleeping chamber;
    'bedroom' gives the plain sense in contemporary English. The more formal alternative
    is preserved in a footnote because the Hebrew expression is somewhat concrete/plural.
- source_word: וַיַּסְתִּרוּ אֹתוֹ
  chosen: they hid him
  alternatives:
  - she hid him
  lexicon: HALOT
  rationale: The MT verb is 3mp, 'they hid him,' likely referring to Jehosheba together
    with the nurse or household attendants. This should be retained rather than harmonized
    to singular.
- source_word: מִפְּנֵי עֲתַלְיָהוּ
  chosen: from Athaliah
  alternatives:
  - from the presence of Athaliah
  - away from Athaliah
  lexicon: HALOT
  rationale: מִפְּנֵי can mean 'from before/from the presence of'; in this context
    'from Athaliah' communicates concealment from her threat.
- source_word: וְלֹא הוּמָת
  chosen: so that he was not put to death
  alternatives:
  - and he was not killed
  - thus he was not put to death
  lexicon: HALOT
  rationale: Passive of מות. The clause expresses the result of the hiding; 'so that
    he was not put to death' makes the logic explicit in natural English.
