id: 2KI.11.9
reference: 2 Kings 11:9
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֞וּ שָׂרֵ֣י ה/מאיות כְּ/כֹ֣ל אֲשֶׁר צִוָּה֮ יְהוֹיָדָ֣ע הַ/כֹּהֵן֒
    וַ/יִּקְחוּ֙ אִ֣ישׁ אֶת אֲנָשָׁ֔י/ו בָּאֵ֣י הַ/שַּׁבָּ֔ת עִ֖ם יֹצְאֵ֣י הַ/שַּׁבָּ֑ת
    וַ/יָּבֹ֖אוּ אֶל יְהוֹיָדָ֥ע הַ/כֹּהֵֽן־־־׃
translation:
  text: So the commanders of hundreds did according to all that Jehoiada the priest
    commanded. Each took his men, those coming on duty on the Sabbath together with
    those going off duty on the Sabbath, and they came to Jehoiada the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those entering on the Sabbath ... those leaving on the Sabbath.' The
      Hebrew may be rendered more literally, but the context suggests incoming and
      outgoing duty shifts.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַמֵּאוֹת
  chosen: the commanders of hundreds
  alternatives:
  - the captains of hundreds
  - the officers over hundreds
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials, and the construct with 'hundreds' denotes
    military commanders over units of one hundred. 'Commanders of hundreds' is clear
    modern English and preserves the military structure better than the archaic 'captains.'
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as
  - according to everything that
  lexicon: HALOT
  rationale: This idiom expresses full conformity to the command. 'According to all
    that' preserves the comprehensive force without sounding wooden.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The verb denotes authoritative command. 'Commanded' best reflects the
    force of Jehoiada's authority in the narrative.
- source_word: אִישׁ אֶת־אֲנָשָׁיו
  chosen: Each took his men
  alternatives:
  - every man took his men
  - each took the men under him
  lexicon: HALOT
  rationale: The distributive singular אִישׁ with plural verb indicates each commander
    individually. 'His men' naturally renders the subordinate troops belonging to
    each commander.
- source_word: בָּאֵי הַשַּׁבָּת
  chosen: those coming on duty on the Sabbath
  alternatives:
  - those entering on the Sabbath
  - those who came in on the Sabbath
  lexicon: HALOT
  rationale: In this military/temple-guard context, 'coming' refers to the incoming
    shift. 'Coming on duty' makes the functional sense explicit in idiomatic English
    without over-paraphrasing.
- source_word: יֹצְאֵי הַשַּׁבָּת
  chosen: those going off duty on the Sabbath
  alternatives:
  - those going out on the Sabbath
  - those leaving on the Sabbath
  lexicon: HALOT
  rationale: Paired with 'those coming on duty,' this clearly refers to the outgoing
    shift. 'Going off duty' captures the contrast and the likely institutional setting.
- source_word: עִם
  chosen: together with
  alternatives:
  - with
  lexicon: HALOT
  rationale: The preposition simply means 'with,' but 'together with' helps show that
    both incoming and outgoing groups were assembled.
- source_word: וַיָּבֹאוּ אֶל
  chosen: and they came to
  alternatives:
  - and they went to
  - and they presented themselves to
  lexicon: HALOT
  rationale: The standard narrative verb of motion is best rendered simply. 'Came
    to' is natural in English and fits the scene of reporting to Jehoiada.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward title identifying Jehoiada's office; no special contextual
    reason requires variation.
