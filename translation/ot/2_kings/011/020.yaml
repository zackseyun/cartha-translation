id: 2KI.11.20
reference: 2 Kings 11:20
source:
  edition: WLC
  text: וַ/יִּשְׂמַ֥ח כָּל עַם הָ/אָ֖רֶץ וְ/הָ/עִ֣יר שָׁקָ֑טָה וְ/אֶת עֲתַלְיָ֛הוּ
    הֵמִ֥יתוּ בַ/חֶ֖רֶב בֵּ֥ית מלך־־־׃ס
translation:
  text: And all the people of the land rejoiced, and the city was quiet. As for Athaliah,
    they put her to death with the sword at the king’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they killed her by the sword in the king’s house' / 'at the royal palace.'
      The Hebrew phrase is compact, and English may construe the final expression
      with slightly different nuance of location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמַח
  chosen: rejoiced
  alternatives:
  - was glad
  lexicon: HALOT
  rationale: From שׂמח, denoting joy/gladness. 'Rejoiced' fits the collective subject
    in natural English and preserves the celebratory force better than the flatter
    'was glad.'
- source_word: כָּל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the country
  - all the populace of the land
  lexicon: HALOT
  rationale: A standard Hebrew expression for the populace. 'People of the land' preserves
    the source wording and its likely socio-political sense better than smoothing
    to merely 'the people.'
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר.
- source_word: שָׁקָטָה
  chosen: was quiet
  alternatives:
  - was at rest
  - was peaceful
  - was calm
  lexicon: HALOT
  rationale: The verb conveys quietness, rest, or freedom from disturbance. 'Was quiet'
    is concise, natural, and preserves the narrative sense that turmoil ceased in
    the city.
- source_word: וְאֶת עֲתַלְיָהוּ
  chosen: As for Athaliah
  alternatives:
  - and Athaliah
  lexicon: HALOT
  rationale: The fronted direct-object marker with the name gives slight topical emphasis.
    'As for Athaliah' reflects that shift in focus more clearly than a simple coordinate
    'and Athaliah.'
- source_word: הֵמִיתוּ
  chosen: they put her to death
  alternatives:
  - they killed her
  - they executed her
  lexicon: HALOT
  rationale: Hiphil of מות means 'cause to die/put to death.' 'Put her to death' preserves
    the causative and judicial/narrative gravity without over-specifying formal legal
    execution.
- source_word: בַחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' 'Sword' is retained literally
    rather than generalized to 'weapon.'
- source_word: בֵּית מלך
  chosen: at the king’s house
  alternatives:
  - in the king's house
  - at the house of the king
  - at the royal palace
  lexicon: HALOT
  rationale: בֵּית מֶלֶךְ is literally 'house of the king.' Here 'at the king’s house'
    best fits the prepositionless construction following the prior phrase and avoids
    importing the more interpretive 'palace,' though that is a plausible contextual
    equivalent.
