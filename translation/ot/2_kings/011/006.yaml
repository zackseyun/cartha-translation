id: 2KI.11.6
reference: 2 Kings 11:6
source:
  edition: WLC
  text: וְ/הַ/שְּׁלִשִׁית֙ בְּ/שַׁ֣עַר ס֔וּר וְ/הַ/שְּׁלִשִׁ֥ית בַּ/שַּׁ֖עַר אַחַ֣ר
    הָ/רָצִ֑ים וּ/שְׁמַרְתֶּ֛ם אֶת מִשְׁמֶ֥רֶת הַ/בַּ֖יִת מַסָּֽח־׃
translation:
  text: and a third shall be at the Sur Gate, and a third at the gate behind the runners;
    and you shall keep watch over the house as a barricade.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the guards' or 'the royal guards'; Hebrew literally 'the runners.'
    reason: lexical_alternative
  - marker: b
    text: The meaning of the Hebrew term rendered 'as a barricade' is uncertain; it
      may mean 'for defense' or 'to prevent entry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשְּׁלִשִׁית
  chosen: and a third
  alternatives:
  - and the third part
  - and one third
  lexicon: HALOT
  rationale: The feminine singular ordinal with article functions distributively in
    context, referring to one of three divisions of the guard. English idiom prefers
    'a third' rather than the more wooden 'the third part.'
- source_word: בְּשַׁעַר סוּר
  chosen: at the Sur Gate
  alternatives:
  - at the gate of Sur
  - at the gate Sûr
  lexicon: HALOT
  rationale: שַׁעַר is 'gate.' סוּר is best taken as a proper place-name here, so
    it is transliterated as 'Sur' per the philosophy of transliterating names rather
    than translating them.
- source_word: בַּשַּׁעַר אַחַר הָרָצִים
  chosen: at the gate behind the runners
  alternatives:
  - at the gate after the runners
  - at the rear gate of the guards
  lexicon: HALOT
  rationale: אַחַר most naturally means 'behind/after.' הָרָצִים literally means 'the
    runners,' a known designation for royal couriers/guards. 'Behind the runners'
    preserves the Hebrew wording without over-interpreting the exact architectural
    relation.
- source_word: הָרָצִים
  chosen: the runners
  alternatives:
  - the guards
  - the royal guards
  - the couriers
  lexicon: HALOT
  rationale: The participial noun from רוץ literally means 'runners.' In royal contexts
    it can denote a guard corps, but the literal rendering is retained in the main
    text to avoid importing a more specific institutional meaning than the word itself
    states; the functional sense is preserved in a footnote.
- source_word: וּשְׁמַרְתֶּם אֶת מִשְׁמֶרֶת
  chosen: and you shall keep watch
  alternatives:
  - and you shall keep the watch
  - and you shall guard the guard-duty
  lexicon: HALOT
  rationale: The verb שמר with the cognate noun משמרת intensifies the idea of guarding/keeping
    watch. 'Keep watch' is natural English that preserves the force of the cognate
    construction without awkward redundancy.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the palace
  - the temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In this narrative context it may refer
    to the royal complex, but the immediate wording does not specify beyond 'the house.'
    The more literal rendering is retained, with context left to the reader.
- source_word: מַסָּח
  chosen: as a barricade
  alternatives:
  - for defense
  - to prevent entry
  - as a ward
  lexicon: HALOT
  rationale: 'This rare term is difficult. In context it appears to describe the manner
    or purpose of the watch: a protective exclusion or barrier. ''As a barricade''
    best captures the likely sense of preventing intrusion while remaining readable.
    Because of the uncertainty, alternatives are preserved in a footnote.'
