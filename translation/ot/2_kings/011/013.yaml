id: 2KI.11.13
reference: 2 Kings 11:13
source:
  edition: WLC
  text: וַ/תִּשְׁמַ֣ע עֲתַלְיָ֔ה אֶת ק֥וֹל הָֽ/רָצִ֖ין הָ/עָ֑ם וַ/תָּבֹ֥א אֶל הָ/עָ֖ם
    בֵּ֥ית יְהוָֽה־־׃
translation:
  text: When Athaliah heard the noise of the guards and the people, she came to the
    people in the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the runners,' likely referring to the royal guard or bodyguard corps.
    reason: lexical_alternative
  - marker: b
    text: Or 'the sound' or 'the voice' of the guards and the people.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the house of the LORD'; that is, the temple precincts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The verb שׁמע in the wayyiqtol narrative sequence here denotes simple
    auditory perception, not attentive listening. 'Heard' is the natural English equivalent.
- source_word: עֲתַלְיָה
  chosen: Athaliah
  rationale: Personal names are transliterated by standard English convention.
- source_word: קוֹל
  chosen: noise
  alternatives:
  - sound
  - voice
  lexicon: HALOT
  rationale: קוֹל can mean 'voice,' 'sound,' or 'noise.' Because it is followed by
    two collective groups ('the guards and the people') in a public acclamation scene,
    'noise' best captures the audible commotion rather than a single voice.
- source_word: הָרָצִין
  chosen: the guards
  alternatives:
  - the runners
  - the couriers
  lexicon: HALOT
  rationale: The participial/noun form from רוץ literally relates to 'runners,' but
    in royal contexts it commonly refers to the king's guard or bodyguard corps. 'Guards'
    communicates the functional sense in clear modern English; the more literal 'runners'
    is preserved as an alternative.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the crowd
  lexicon: HALOT
  rationale: עָם is the standard term for 'people.' Here it likely refers to the assembled
    populace. 'The people' preserves the lexical correspondence and avoids over-interpretation.
- source_word: וַתָּבֹא אֶל
  chosen: she came to
  alternatives:
  - she went to
  - she entered among
  lexicon: HALOT
  rationale: בוא with אֶל commonly means 'come/go to.' In English narrative from the
    observer's standpoint, 'came to' is idiomatic and fits the movement toward the
    assembled people.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of YHWH.' Following the doctrine
    guideline, יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew
    wording more closely than 'temple,' though 'temple' is a valid contextual alternative.
