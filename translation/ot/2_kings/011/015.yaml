id: 2KI.11.15
reference: 2 Kings 11:15
source:
  edition: WLC
  text: וַ/יְצַו֩ יְהוֹיָדָ֨ע הַ/כֹּהֵ֜ן אֶת שָׂרֵ֥י ה/מיאות פְּקֻדֵ֣י הַ/חַ֗יִל וַ/יֹּ֤אמֶר
    אֲלֵי/הֶם֙ הוֹצִ֤יאוּ אֹתָ/הּ֙ אֶל מִ/בֵּ֣ית לַ/שְּׂדֵרֹ֔ת וְ/הַ/בָּ֥א אַחֲרֶ֖י/הָ
    הָמֵ֣ת בֶּ/חָ֑רֶב כִּ֚י אָמַ֣ר הַ/כֹּהֵ֔ן אַל תּוּמַ֖ת בֵּ֥ית יְהוָֽה־׀־־׃
translation:
  text: Then Jehoiada the priest commanded the captains of hundreds who were appointed
    over the army, and said to them, “Bring her out between the ranks, and whoever
    follows after her, put to death with the sword.” For the priest had said, “She
    must not be put to death in the house of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “outside the rows” / “to the area between the lines”; the Hebrew phrase
      is difficult and likely refers to taking her out through the ordered ranks of
      guards.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַמֵּאוֹת
  chosen: captains of hundreds
  alternatives:
  - commanders of hundreds
  - centurions
  lexicon: HALOT
  rationale: A formal rendering of the military title is preferred. 'Centurions' is
    possible by function but imports Roman terminology into a Judahite context.
- source_word: פְּקֻדֵי הַחַיִל
  chosen: who were appointed over the army
  alternatives:
  - officers of the army
  - those mustered over the force
  lexicon: HALOT
  rationale: The passive participial construction from פקד with הַחַיִל indicates
    those assigned/appointed in relation to the military force. This rendering preserves
    the administrative nuance without becoming wooden.
- source_word: הוֹצִיאוּ אֹתָהּ
  chosen: Bring her out
  alternatives:
  - Take her out
  - Lead her out
  lexicon: HALOT
  rationale: The imperative of יצא in the causative means to bring/take out. 'Bring
    her out' is natural English and fits the command context.
- source_word: אֶל מִבֵּית לַשְּׂדֵרוֹת
  chosen: between the ranks
  alternatives:
  - outside the rows
  - to the area between the lines
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it refers to removing Athaliah
    from the temple precincts through/into the ordered lines of guards. 'Between the
    ranks' captures the military setting and avoids the awkwardly literal 'from the
    house to the rows.'
- source_word: וְהַבָּא אַחֲרֶיהָ
  chosen: whoever follows after her
  alternatives:
  - anyone coming after her
  - the one who follows her
  lexicon: HALOT
  rationale: 'The singular participle with article functions generically: any person
    who comes after or follows her.'
- source_word: הָמֵת בֶּחָרֶב
  chosen: put to death with the sword
  alternatives:
  - kill with the sword
  - strike down with the sword
  lexicon: HALOT
  rationale: The infinitive absolute/implied imperative force intensifies the command.
    'Put to death' is slightly more formal and judicial, fitting the context of ordered
    execution.
- source_word: אַל תּוּמַת
  chosen: She must not be put to death
  alternatives:
  - Do not let her be put to death
  - She is not to be killed
  lexicon: HALOT
  rationale: The jussive/passive construction expresses prohibition. The explicit
    subject 'she' is supplied from context for clear English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת is literally 'house'; in this context it denotes the temple. 'House
    of the LORD' preserves the Hebrew expression, and 'LORD' follows the doctrinal
    default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration
    of the divine name — rather than the traditional 'the LORD' substitution. This
    preserves the personal name God revealed to Israel rather than substituting a
    title.
