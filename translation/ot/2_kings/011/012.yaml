id: 2KI.11.12
reference: 2 Kings 11:12
source:
  edition: WLC
  text: וַ/יּוֹצִ֣א אֶת בֶּן הַ/מֶּ֗לֶךְ וַ/יִּתֵּ֤ן עָלָי/ו֙ אֶת הַ/נֵּ֨זֶר֙ וְ/אֶת
    הָ֣/עֵד֔וּת וַ/יַּמְלִ֥כוּ אֹת֖/וֹ וַ/יִּמְשָׁחֻ֑/הוּ וַ/יַּכּוּ כָ֔ף וַ/יֹּאמְר֖וּ
    יְחִ֥י הַ/מֶּֽלֶךְ־־־־־׃ס
translation:
  text: Then he brought out the king’s son and put the crown on him and gave him the
    testimony, and they made him king and anointed him; and they clapped their hands
    and said, “Long live the king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the covenant document' or 'the decree'; the Hebrew reads 'the testimony,'
      likely referring to a written witness associated with the king’s rule.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִא
  chosen: brought out
  alternatives:
  - led out
  lexicon: HALOT
  rationale: The Hiphil of יצא means to cause to go out or bring out. 'Brought out'
    is natural English and preserves the causative sense.
- source_word: בֶּן־הַמֶּלֶךְ
  chosen: the king’s son
  alternatives:
  - the son of the king
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The king’s son' is idiomatic modern
    English.
- source_word: הַנֵּזֶר
  chosen: the crown
  alternatives:
  - the diadem
  lexicon: HALOT
  rationale: נזר in royal context refers to the emblem of kingship. 'Crown' is the
    clearest contemporary rendering; 'diadem' is possible but less accessible.
- source_word: הָעֵדוּת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the decree
  lexicon: HALOT
  rationale: The noun commonly means 'testimony' or 'witness,' and in enthronement
    context likely refers to the written covenantal witness or stipulations given
    to the king. The traditional and textually restrained rendering 'the testimony'
    best preserves the Hebrew without over-interpreting.
- source_word: וַיַּמְלִכוּ אֹתוֹ
  chosen: they made him king
  alternatives:
  - they proclaimed him king
  - they crowned him king
  lexicon: HALOT
  rationale: The Hiphil of מלך means to make someone king or cause to reign. 'Made
    him king' is direct and avoids redundancy with the separate mention of the crown.
- source_word: וַיִּמְשָׁחֻהוּ
  chosen: anointed him
  lexicon: HALOT
  rationale: Standard rendering of משׁח in royal consecration contexts. It carries
    the formal act of installation without requiring expansion.
- source_word: וַיַּכּוּ כָף
  chosen: they clapped their hands
  alternatives:
  - they struck the palm
  - they applauded
  lexicon: HALOT
  rationale: The idiom literally involves striking the palm/hand and here expresses
    public acclamation. 'Clapped their hands' is the best idiomatic equivalent; 'applauded'
    is too interpretive.
- source_word: יְחִי הַמֶּלֶךְ
  chosen: Long live the king!
  alternatives:
  - May the king live!
  lexicon: HALOT
  rationale: A jussive acclamation formula. 'Long live the king!' is the standard
    natural English equivalent and preserves the force of public royal blessing.
