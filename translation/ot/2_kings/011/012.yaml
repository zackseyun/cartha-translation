theological_decisions:
- issue: Meaning of הָעֵדוּת in the coronation scene
  chosen_reading: Rendered as 'the testimony' in the main text
  alternative_readings:
  - the covenant document
  - the decree
  rationale: The term may denote a written witness to covenantal obligations, possibly
    the law given to the king, but the Hebrew itself does not specify beyond 'the
    testimony.' To avoid importing a more specific institutional interpretation than
    the text states, the main text keeps the broader rendering while preserving explanatory
    alternatives in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
