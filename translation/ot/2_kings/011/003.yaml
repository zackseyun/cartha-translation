id: 2KI.11.3
reference: 2 Kings 11:3
source:
  edition: WLC
  text: וַ/יְהִ֤י אִתָּ/הּ֙ בֵּ֣ית יְהוָ֔ה מִתְחַבֵּ֖א שֵׁ֣שׁ שָׁנִ֑ים וַ/עֲתַלְיָ֖ה
    מֹלֶ֥כֶת עַל הָ/אָֽרֶץ־׃פ
translation:
  text: And he was with her in the house of the LORD, hiding for six years, while
    Athaliah was reigning over the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple of the LORD.' The Hebrew reads literally 'in the house
      of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And he was
  alternatives:
  - And he remained
  - And he stayed
  lexicon: HALOT
  rationale: The wayyiqtol of היה here introduces the narrative state that follows.
    'Was' is the most direct rendering; 'remained' or 'stayed' are possible contextual
    expansions, but the Hebrew itself is simpler.
- source_word: אִתָּהּ
  chosen: with her
  lexicon: HALOT
  rationale: The preposition with 3fs suffix plainly indicates Joash was with Jehosheba.
    'With her' preserves the feminine singular referent without over-specifying the
    antecedent in the main text.
- source_word: בֵּית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following doctrine, יְהוָה
    is rendered 'the LORD.' 'House of the LORD' preserves the Hebrew expression; 'temple'
    is a valid contextual alternative but slightly less formal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, the default rendering of the divine
    name is 'the LORD.'
- source_word: מִתְחַבֵּא
  chosen: hiding
  alternatives:
  - being hidden
  - in hiding
  lexicon: HALOT
  rationale: The hitpael participle of חבא conveys the state/action of concealing
    oneself. 'Hiding' is natural modern English and preserves the active-reflexive
    sense better than the more passive 'being hidden.'
- source_word: שֵׁשׁ שָׁנִים
  chosen: for six years
  lexicon: HALOT
  rationale: A straightforward temporal accusative/duration phrase. 'For six years'
    is idiomatic and precise.
- source_word: וַעֲתַלְיָה
  chosen: while Athaliah
  alternatives:
  - and Athaliah
  lexicon: HALOT
  rationale: The conjunction links the concurrent circumstance with the previous clause.
    Rendering it as 'while' makes the temporal overlap explicit in natural English,
    though simple 'and' is formally possible.
- source_word: מֹלֶכֶת
  chosen: was reigning
  alternatives:
  - reigned
  - was queen
  lexicon: HALOT
  rationale: The feminine singular participle of מלך denotes ongoing rule. 'Was reigning'
    captures the durative sense in context better than the simple past 'reigned.'
    'Was queen' is too nominal and weakens the verbal force.
- source_word: עַל הָאָרֶץ
  chosen: over the land
  alternatives:
  - over the הארץ
  - over the country
  lexicon: HALOT
  rationale: הָאָרֶץ here refers to the realm/land under Athaliah's rule, not the
    whole earth. 'Land' is the most flexible and textually restrained rendering; 'country'
    is possible but more interpretive.
