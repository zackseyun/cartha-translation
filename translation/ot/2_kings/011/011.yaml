id: 2KI.11.11
reference: 2 Kings 11:11
source:
  edition: WLC
  text: וַ/יַּעַמְד֨וּ הָ/רָצִ֜ים אִ֣ישׁ וְ/כֵלָ֣י/ו בְּ/יָד֗/וֹ מִ/כֶּ֨תֶף הַ/בַּ֤יִת
    הַ/יְמָנִית֙ עַד כֶּ֤תֶף הַ/בַּ֨יִת֙ הַ/שְּׂמָאלִ֔ית לַ/מִּזְבֵּ֖חַ וְ/לַ/בָּ֑יִת
    עַל הַ/מֶּ֖לֶךְ סָבִֽיב׀־־׃
translation:
  text: And the guards stood, each man with his weapons in his hand, from the right
    side of the house to the left side of the house, by the altar and by the house,
    around the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the runners,' that is, the royal guard.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the right side of the house to the left side of the house';
      this may also be understood in temple orientation as 'from the south side ...
      to the north side.'
    reason: alternative_reading
  - marker: c
    text: '''The house'' here refers to the temple building/precinct.'
    reason: cultural_note
lexical_decisions:
- source_word: הָרָצִים
  chosen: the guards
  alternatives:
  - the runners
  - the royal guards
  lexicon: HALOT
  rationale: Although the participial form literally derives from 'run,' in this royal/military
    context it refers to the king's guard or couriers functioning as armed protectors.
    'Guards' gives the contextual sense in clear modern English; 'runners' is more
    literal but potentially misleading.
- source_word: אִישׁ וְכֵלָיו בְּיָדוֹ
  chosen: each man with his weapons in his hand
  alternatives:
  - each with his weapons in his hand
  - every man with his equipment in his hand
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man.' כְּלִי can mean vessel, implement,
    or weapon; in an armed guard setting 'weapons' is the most natural and specific
    rendering. Retaining 'in his hand' preserves the vivid readiness of the Hebrew.
- source_word: מִכֶּתֶף ... עַד כֶּתֶף
  chosen: from the right side ... to the left side
  alternatives:
  - from the right shoulder/flank ... to the left shoulder/flank
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in spatial descriptions of buildings
    it idiomatically means 'side' or 'flank.' 'Side' is the clearest English equivalent
    here.
- source_word: הַבַּיִת
  chosen: the house
  alternatives:
  - the temple
  lexicon: HALOT
  rationale: The Hebrew says 'the house.' In context this is the temple precinct/building,
    but the translation keeps the source term rather than importing the interpretive
    gloss 'temple.' The context makes the referent understandable.
- source_word: הַיְמָנִית / הַשְּׂמָאלִית
  chosen: right ... left
  alternatives:
  - south ... north
  lexicon: HALOT
  rationale: These adjectives literally denote right and left. Because orientation
    language in temple descriptions can sometimes imply south/north, that alternative
    is worth preserving, but the main text keeps the direct spatial wording of the
    Hebrew.
- source_word: לַמִּזְבֵּחַ וְלַבָּיִת
  chosen: by the altar and by the house
  alternatives:
  - toward the altar and toward the house
  - at the altar and at the house
  lexicon: HALOT
  rationale: The prefixed ל can mark position or direction in this compressed spatial
    description. 'By' best conveys placement in English without overcommitting to
    either strict direction or exact contact.
- source_word: עַל הַמֶּלֶךְ סָבִיב
  chosen: around the king
  alternatives:
  - about the king on every side
  - surrounding the king
  lexicon: HALOT
  rationale: The phrase indicates protective encirclement. 'Around the king' is concise
    and natural while preserving the sense of surrounding him on all sides.
