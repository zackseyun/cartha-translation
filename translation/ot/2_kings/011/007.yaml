id: 2KI.11.7
reference: 2 Kings 11:7
source:
  edition: WLC
  text: וּ/שְׁתֵּ֤י הַ/יָּדוֹת֙ בָּ/כֶ֔ם כֹּ֖ל יֹצְאֵ֣י הַ/שַּׁבָּ֑ת וְ/שָֽׁמְר֛וּ
    אֶת מִשְׁמֶ֥רֶת בֵּית יְהוָ֖ה אֶל הַ/מֶּֽלֶךְ־־־׃
translation:
  text: And the two divisions among you, all who go off duty on the Sabbath, shall
    keep watch over the house of the LORD for the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the two hands among you'; here likely meaning 'the two
      divisions' or 'the two companies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all who go out on the Sabbath'; in context this likely refers to those
      going off duty at the Sabbath shift change.
    reason: alternative_reading
  - marker: c
    text: Or 'shall keep the watch of the house of the LORD toward/for the king.'
      The Hebrew preposition is difficult; the sense is guarding the LORD's house
      in order to protect the king.
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁתֵּי הַיָּדוֹת
  chosen: the two divisions
  alternatives:
  - the two parts
  - the two companies
  - the two hands
  lexicon: HALOT
  rationale: Literally 'the two hands,' but in this military/organizational context
    יָד can denote a side, section, or division. 'Divisions' best conveys two groups
    of guards without preserving an opaque literalism.
- source_word: בָּכֶם
  chosen: among you
  alternatives:
  - of you
  - from you
  lexicon: HALOT
  rationale: The preposition with 2mp pronoun indicates these divisions are drawn
    from or located among the addressed guards. 'Among you' is natural English and
    fits the organizational sense.
- source_word: כֹּל יֹצְאֵי הַשַּׁבָּת
  chosen: all who go off duty on the Sabbath
  alternatives:
  - all who go out on the Sabbath
  - all those leaving on the Sabbath
  lexicon: HALOT
  rationale: The participle 'those going out' in this context refers to the shift
    ending on the Sabbath, contrasted with those coming on duty in the surrounding
    verses. 'Go off duty' makes the military watch context explicit without over-paraphrasing.
- source_word: וְשָׁמְרוּ
  chosen: shall keep watch
  alternatives:
  - shall guard
  - must keep guard
  lexicon: HALOT
  rationale: שׁמר here is guarding/keeping watch. 'Shall keep watch' preserves the
    command force and matches the watch-duty setting.
- source_word: אֶת מִשְׁמֶרֶת
  chosen: watch over
  alternatives:
  - the guard of
  - the duty of guarding
  lexicon: HALOT
  rationale: The noun מִשְׁמֶרֶת is cognate with שׁמר and denotes charge, guard, or
    watch. Rendering the verb-noun pair idiomatically as 'keep watch over' avoids
    awkward repetition while preserving the sense.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the
    LORD.' 'House' is retained rather than 'temple' to stay closer to the Hebrew while
    remaining clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֶל הַמֶּלֶךְ
  chosen: for the king
  alternatives:
  - toward the king
  - by the king
  - around the king
  lexicon: HALOT
  rationale: The preposition אֶל after 'keep watch over the house of the LORD' is
    difficult. In context the guarding of the temple is undertaken with reference
    to protecting the king. 'For the king' expresses purpose/benefit in idiomatic
    English and fits the surrounding narrative of protecting Joash.
