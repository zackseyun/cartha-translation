id: 2KI.11.5
reference: 2 Kings 11:5
source:
  edition: WLC
  text: וַ/יְצַוֵּ֣/ם לֵ/אמֹ֔ר זֶ֥ה הַ/דָּבָ֖ר אֲשֶׁ֣ר תַּעֲשׂ֑וּ/ן הַ/שְּׁלִשִׁ֤ית
    מִ/כֶּם֙ בָּאֵ֣י הַ/שַּׁבָּ֔ת וְ/שֹׁ֣מְרֵ֔י מִשְׁמֶ֖רֶת בֵּ֥ית הַ/מֶּֽלֶךְ׃
translation:
  text: 'And he commanded them, saying, “This is the thing that you shall do: one
    third of you who come on the Sabbath and keep watch over the king’s house,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the royal palace.” Hebrew literally reads “the king’s house.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוֵּם
  chosen: And he commanded them
  alternatives:
  - And he ordered them
  lexicon: HALOT
  rationale: Piel of צוה commonly means to command/order. 'Commanded' preserves the
    authoritative force and narrative style.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard speech-introduction formula; 'saying' keeps the formal narrative
    linkage.
- source_word: זֶה הַדָּבָר
  chosen: This is the thing
  alternatives:
  - This is what
  - This is the matter
  lexicon: HALOT
  rationale: A relatively formal rendering that reflects the Hebrew demonstrative
    plus noun construction without unnecessary paraphrase.
- source_word: אֲשֶׁר תַּעֲשׂוּן
  chosen: that you shall do
  alternatives:
  - that you are to do
  - which you must do
  lexicon: HALOT
  rationale: Future/imperfect in instructional context is well represented by 'shall
    do,' preserving directive force.
- source_word: הַשְּׁלִשִׁית מִכֶּם
  chosen: one third of you
  alternatives:
  - the third part of you
  lexicon: HALOT
  rationale: Idiomatic English for the fractional expression; singular collective
    sense is intended.
- source_word: בָּאֵי הַשַּׁבָּת
  chosen: who come on the Sabbath
  alternatives:
  - who enter on the Sabbath
  - who are coming in on the Sabbath
  lexicon: HALOT
  rationale: Refers to those coming on duty at the Sabbath changeover. 'Come on the
    Sabbath' is natural English while preserving the temporal sense.
- source_word: וְשֹׁמְרֵי מִשְׁמֶרֶת
  chosen: and keep watch
  alternatives:
  - and shall keep the guard
  - and are keepers of the watch
  lexicon: HALOT
  rationale: The participial construction denotes guard duty. 'Keep watch' is concise,
    idiomatic, and faithful.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the house of the king
  lexicon: HALOT
  rationale: Literally 'house of the king.' In context it likely denotes the palace
    complex, but the more literal 'king’s house' preserves the Hebrew wording without
    over-specifying.
