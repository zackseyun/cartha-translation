theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The translation follows the project's stated default for the Tetragrammaton,
    preserving covenantal resonance while aligning with established English Bible
    convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make explicit that the covenant formula means belonging to the
    LORD
  chosen_reading: a people for the LORD
  alternative_readings:
  - the LORD's people
  rationale: The Hebrew covenant formula is preserved with minimal interpretation.
    The possessive sense is real, but the more literal relational wording better maintains
    the source text's form and theological texture.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
