id: 2KI.11.17
reference: 2 Kings 11:17
source:
  edition: WLC
  text: וַ/יִּכְרֹ֨ת יְהוֹיָדָ֜ע אֶֽת הַ/בְּרִ֗ית בֵּ֤ין יְהוָה֙ וּ/בֵ֤ין הַ/מֶּ֨לֶךְ֙
    וּ/בֵ֣ין הָ/עָ֔ם לִ/הְי֥וֹת לְ/עָ֖ם לַֽ/יהוָ֑ה וּ/בֵ֥ין הַ/מֶּ֖לֶךְ וּ/בֵ֥ין הָ/עָֽם־׃
translation:
  text: Then Jehoiada made the covenant between the LORD and the king and the people,
    that they should be a people for the LORD, and also between the king and the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut the covenant,' a standard idiom meaning 'made the
      covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'to be the LORD's people.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֹת
  chosen: made
  alternatives:
  - cut
  - made a covenant
  lexicon: HALOT
  rationale: כרת ברית is the standard Hebrew idiom 'cut/make a covenant.' In English,
    'made the covenant' preserves the covenant-making sense without woodenly reproducing
    the idiom 'cut.'
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - a covenant
  - the agreement
  lexicon: HALOT
  rationale: The article is present, and in this royal-cultic context 'the covenant'
    is the most natural rendering. 'Agreement' is too weak for ברית, which carries
    formal covenantal weight.
- source_word: בֵּין יְהוָה וּבֵין הַמֶּלֶךְ וּבֵין הָעָם
  chosen: between the LORD and the king and the people
  alternatives:
  - between the LORD, the king, and the people
  lexicon: HALOT
  rationale: The repeated בין marks the covenant parties. The chosen wording is smooth
    modern English while preserving the triadic relationship among the LORD, the king,
    and the people.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לִהְיוֹת לְעָם לַיהוָה
  chosen: that they should be a people for the LORD
  alternatives:
  - to be a people to the LORD
  - to become the LORD's people
  lexicon: HALOT
  rationale: This infinitive clause expresses the covenant purpose/result. 'That they
    should be a people for the LORD' is idiomatic and preserves the covenantal formulation
    without over-paraphrasing to the possessive 'the LORD's people,' though that sense
    is implicit.
- source_word: וּבֵין הַמֶּלֶךְ וּבֵין הָעָם
  chosen: and also between the king and the people
  alternatives:
  - and between the king and the people
  lexicon: HALOT
  rationale: The verse states a second covenant relationship in addition to the first.
    'Also' helps English readers track the repeated structure without adding new content.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the covenant community as a collective body. 'The people'
    is the standard and most transparent rendering.
