id: 2KI.11.16
reference: 2 Kings 11:16
source:
  edition: WLC
  text: וַ/יָּשִׂ֤מוּ לָ/הּ֙ יָדַ֔יִם וַ/תָּב֛וֹא דֶּֽרֶךְ מְב֥וֹא הַ/סּוּסִ֖ים בֵּ֣ית
    הַ/מֶּ֑לֶךְ וַ/תּוּמַ֖ת שָֽׁם־׃ס
translation:
  text: So they laid hands on her, and she went by the way of the horses’ entrance
    to the king’s house, and there she was put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they seized her.' Some translations take the Hebrew idiom differently
      as 'they made room for her,' but the more direct sense is that they took hold
      of her.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the horses’ entrance.' This likely refers to the access route
      or gate by which horses entered the palace area.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשִׂימוּ לָהּ יָדַיִם
  chosen: they laid hands on her
  alternatives:
  - they seized her
  - they made room for her
  lexicon: HALOT
  rationale: The idiom literally involves 'placing hands' on someone. In context of
    arresting Athaliah for execution, 'laid hands on her' preserves the concrete Hebrew
    while communicating seizure. 'Made room for her' reflects a different contextual
    construal found in some translations, but the plain sense of the idiom here is
    apprehension.
- source_word: וַתָּבֹא
  chosen: she went
  alternatives:
  - she came
  - she was brought
  lexicon: HALOT
  rationale: בוא commonly means 'come/go' depending on viewpoint. English 'went' fits
    the narrative movement from the temple precincts toward the palace area. A passive
    sense ('was brought') is interpretive and not marked in the verb form.
- source_word: דֶּרֶךְ
  chosen: by the way of
  alternatives:
  - by way of
  - along the road of
  lexicon: HALOT
  rationale: דֶּרֶךְ denotes way/road/path. 'By the way of' is natural English and
    preserves the locative-path sense in relation to the following construct phrase.
- source_word: מְבוֹא הַסּוּסִים
  chosen: the horses’ entrance
  alternatives:
  - the horses' gate
  - the entry of the horses
  lexicon: HALOT
  rationale: מָבוֹא is entrance/entryway. 'Horses’ entrance' is a straightforward
    rendering of the construct chain and avoids importing the more specific 'gate'
    unless context requires it. The phrase likely denotes the access route used by
    horses into the palace complex.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the king's palace
  lexicon: HALOT
  rationale: Literally 'house of the king.' 'The king’s house' keeps the Hebrew wording;
    while it refers to the palace complex, 'house' is still intelligible and slightly
    more formal-correspondent.
- source_word: וַתּוּמַת
  chosen: she was put to death
  alternatives:
  - she was killed
  - she died
  lexicon: HALOT
  rationale: 'The Hophal of מות is passive/causative-passive: she was caused to die,
    i.e., executed. ''Was put to death'' best captures the judicial/executive force
    in context, stronger and more precise than merely ''died''.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb marking the place of execution.
