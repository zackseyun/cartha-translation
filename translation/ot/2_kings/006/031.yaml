id: 2KI.6.31
reference: 2 Kings 6:31
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר כֹּֽה יַעֲשֶׂה לִּ֥/י אֱלֹהִ֖ים וְ/כֹ֣ה יוֹסִ֑ף אִֽם יַעֲמֹ֞ד
    רֹ֣אשׁ אֱלִישָׁ֧ע בֶּן שָׁפָ֛ט עָלָ֖י/ו הַ/יּֽוֹם־־־־׃
translation:
  text: And he said, “May God do so to me, and more also, if the head of Elisha son
    of Shaphat remains on him today.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'if the head of Elisha son of Shaphat stands on him today'—that
      is, if Elisha's head remains on his body today.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה יַעֲשֶׂה לִּי אֱלֹהִים וְכֹה יוֹסִף
  chosen: May God do so to me, and more also
  alternatives:
  - May God do this to me, and even more
  - So may God do to me, and so may he add
  lexicon: HALOT
  rationale: This is a fixed Hebrew oath/curse formula. 'May God do so to me, and
    more also' is idiomatic English that preserves the imprecatory force without woodenly
    reproducing the elliptical Hebrew.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - gods
  lexicon: HALOT
  rationale: Although morphologically plural, in this oath formula the referent is
    singular and takes singular verbal sense in context. 'God' is the natural English
    rendering.
- source_word: אִם
  chosen: if
  alternatives:
  - surely not
  - indeed if
  lexicon: HALOT
  rationale: In oath contexts אִם can function as an elliptical negative oath ('surely
    not'), but English commonly preserves the form with 'if' after the curse formula.
    This keeps the Hebrew structure while allowing the implied threat to be understood.
- source_word: יַעֲמֹד
  chosen: remains
  alternatives:
  - stays
  - stands
  lexicon: HALOT
  rationale: The verb literally means 'stand,' but with 'head' as subject in this
    execution threat, the sense is that Elisha's head continues to be on his body.
    'Remains' communicates the idiom clearly in modern English.
- source_word: רֹאשׁ אֱלִישָׁע
  chosen: the head of Elisha
  alternatives:
  - Elisha's head
  lexicon: HALOT
  rationale: Both are possible in English. 'The head of Elisha' stays closer to the
    Hebrew construct chain and preserves the starkness of the threat.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  - on his body
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to Elisha. The phrase is intentionally
    vivid and somewhat elliptical in Hebrew; 'on him' preserves that terseness. 'On
    his body' is interpretive and therefore left to a footnote.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is clear, natural modern English and preserves the immediacy
    of the king''s oath.'
