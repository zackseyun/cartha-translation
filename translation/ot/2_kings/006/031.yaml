theological_decisions:
- issue: Referent and force of the oath formula
  chosen_reading: 'A self-imprecatory oath invoking God: the speaker calls down divine
    judgment on himself if Elisha is not executed that day.'
  alternative_readings:
  - A less formal exclamation without full oath force
  rationale: The formula 'May God do so to me, and more also' is a standard royal
    oath formula in the Hebrew Bible and should be rendered as such rather than flattened
    into mere anger.
