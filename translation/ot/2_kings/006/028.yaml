id: 2KI.6.28
reference: 2 Kings 6:28
source:
  edition: WLC
  text: וַ/יֹּֽאמֶר לָ֥/הּ הַ/מֶּ֖לֶךְ מַה לָּ֑/ךְ וַ/תֹּ֗אמֶר הָ/אִשָּׁ֨ה הַ/זֹּ֜את
    אָמְרָ֣ה אֵלַ֗/י תְּנִ֤י אֶת בְּנֵ/ךְ֙ וְ/נֹאכְלֶ֣/נּוּ הַ/יּ֔וֹם וְ/אֶת בְּנִ֖/י
    נֹאכַ֥ל מָחָֽר־־־־׃
translation:
  text: And the king said to her, “What is the matter with you?” And she said, “This
    woman said to me, ‘Give your son, so that we may eat him today, and tomorrow we
    will eat my son.’”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מַה לָּךְ
  chosen: What is the matter with you?
  alternatives:
  - What troubles you?
  - What is wrong with you?
  - What ails you?
  lexicon: HALOT
  rationale: The idiom literally reads 'What to you?' and asks what is troubling her.
    'What is the matter with you?' is natural modern English and preserves the king's
    inquiry without implying rebuke more strongly than the Hebrew does.
- source_word: הָאִשָּׁה הַזֹּאת
  chosen: This woman
  alternatives:
  - That woman
  lexicon: HALOT
  rationale: The demonstrative is proximal ('this'). In reported speech, 'this woman'
    best reflects the Hebrew form, even if English might sometimes prefer 'that woman'
    in narrative retelling.
- source_word: אָמְרָה אֵלַי
  chosen: said to me
  alternatives:
  - told me
  lexicon: HALOT
  rationale: A straightforward rendering of the verbal clause. 'Said to me' stays
    closer to the Hebrew than the slightly more interpretive 'told me.'
- source_word: תְּנִי אֶת בְּנֵךְ
  chosen: Give your son
  alternatives:
  - Hand over your son
  lexicon: HALOT
  rationale: נתן in the imperative commonly means 'give.' The directness is important
    in this shocking proposal; 'hand over' is possible but adds nuance not explicit
    in the Hebrew.
- source_word: וְנֹאכְלֶנּוּ
  chosen: so that we may eat him
  alternatives:
  - and let us eat him
  - and we will eat him
  lexicon: HALOT
  rationale: The cohortative-like first person plural imperfect after the imperative
    expresses proposed joint action/purpose. 'So that we may eat him' captures the
    sense smoothly in English while preserving the horrifying literal meaning.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern equivalent.'
- source_word: וְאֶת בְּנִי נֹאכַל מָחָר
  chosen: and tomorrow we will eat my son
  alternatives:
  - and we will eat my son tomorrow
  lexicon: HALOT
  rationale: English fronting of 'tomorrow' improves flow while preserving the temporal
    contrast with 'today.' The Hebrew states the second part of the bargain plainly,
    and the translation should not soften it.
- source_word: בֵּן / בְּנֵךְ / בְּנִי
  chosen: son
  alternatives:
  - child
  lexicon: HALOT
  rationale: The Hebrew specifically says 'son,' not the more general 'child.' Gender-accurate
    rendering is required by the translation philosophy.
