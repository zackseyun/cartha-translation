id: 2KI.6.4
reference: 2 Kings 6:4
source:
  edition: WLC
  text: וַ/יֵּ֖לֶךְ אִתָּ֑/ם וַ/יָּבֹ֨אוּ֙ הַ/יַּרְדֵּ֔נָ/ה וַֽ/יִּגְזְר֖וּ הָ/עֵצִֽים׃
translation:
  text: So he went with them, and they came to the Jordan and cut down the trees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and they cut the wood.' The Hebrew noun can refer broadly to trees or
      wood, but in this context of felling timber, 'trees' is more precise.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So he went
  alternatives:
  - And he went
  - Then he went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך advances the narrative. 'So he went' gives natural English
    narrative flow while preserving the sequential sense.
- source_word: אִתָּם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward accompaniment preposition with 3mp suffix; no reason
    to expand or paraphrase.
- source_word: וַיָּבֹאוּ
  chosen: and they came
  alternatives:
  - and they went
  - and they arrived
  lexicon: HALOT
  rationale: בוא commonly means 'come/enter/arrive.' 'Came' fits the movement toward
    the named location in standard English narrative.
- source_word: הַיַּרְדֵּנָה
  chosen: to the Jordan
  alternatives:
  - to the Jordan River
  - Jordanward
  lexicon: HALOT
  rationale: The directional he indicates motion toward the Jordan. English idiom
    is best expressed as 'to the Jordan.' 'Jordan River' is possible but slightly
    more expansive than the Hebrew.
- source_word: וַיִּגְזְרוּ
  chosen: cut down
  alternatives:
  - cut
  - chopped
  lexicon: HALOT
  rationale: In context of felling wood, גזר is best rendered with the more specific
    English expression 'cut down,' which makes explicit the action implied by the
    object and surrounding narrative.
- source_word: הָעֵצִים
  chosen: the trees
  alternatives:
  - the wood
  - the logs
  lexicon: HALOT
  rationale: עֵץ in the plural here refers to standing trees being felled, not processed
    wood. The article is retained as 'the trees,' referring to the trees at the location.
