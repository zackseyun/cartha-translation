id: 2KI.6.30
reference: 2 Kings 6:30
source:
  edition: WLC
  text: וַ/יְהִי֩ כִ/שְׁמֹ֨עַ הַ/מֶּ֜לֶךְ אֶת דִּבְרֵ֤י הָֽ/אִשָּׁה֙ וַ/יִּקְרַ֣ע
    אֶת בְּגָדָ֔י/ו וְ/ה֖וּא עֹבֵ֣ר עַל הַ/חֹמָ֑ה וַ/יַּ֣רְא הָ/עָ֔ם וְ/הִנֵּ֥ה הַ/שַּׂ֛ק
    עַל בְּשָׂר֖/וֹ מִ/בָּֽיִת־־־־׃
translation:
  text: And when the king heard the words of the woman, he tore his clothes while
    he was passing along on the wall, and the people looked, and behold, sackcloth
    was on his body underneath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from inside,' indicating that the sackcloth was worn
      beneath his outer clothing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִשְׁמֹעַ
  chosen: when ... heard
  alternatives:
  - as ... heard
  - upon hearing
  lexicon: HALOT
  rationale: The infinitive construct with כ introduces a temporal clause. 'When the
    king heard' is natural English and preserves the sequence without over-paraphrase.
- source_word: דִּבְרֵי
  chosen: the words
  alternatives:
  - the account
  - the matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'affair.' Here the woman's reported
    speech is in view, so 'the words of the woman' is the most direct rendering.
- source_word: וַיִּקְרַע אֶת־בְּגָדָיו
  chosen: he tore his clothes
  alternatives:
  - he tore his garments
  lexicon: HALOT
  rationale: A standard idiom of grief or horror. 'Clothes' is more readable modern
    English than 'garments' while preserving the action.
- source_word: וְהוּא עֹבֵר עַל־הַחֹמָה
  chosen: while he was passing along on the wall
  alternatives:
  - as he was passing by on the wall
  - while he was walking on the wall
  lexicon: HALOT
  rationale: The clause is circumstantial, explaining where/when the tearing occurred.
    עֹבֵר with עַל הַחֹמָה suggests movement along the top/edge of the city wall.
    'Passing along on the wall' keeps the narrative flow and spatial sense.
- source_word: וַיַּרְא הָעָם
  chosen: the people looked
  alternatives:
  - the people saw
  lexicon: HALOT
  rationale: Although ראה commonly means 'see,' English idiom after 'and behold' works
    well with 'looked,' signaling that the crowd noticed what became visible. This
    avoids a slightly abrupt 'the people saw, and behold.'
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה marks sudden attention to a surprising detail. 'Behold' preserves
    the discourse force better than a flatter connective.
- source_word: הַשַּׂק
  chosen: sackcloth
  alternatives:
  - a sackcloth garment
  lexicon: HALOT
  rationale: The noun refers to the coarse mourning garment/material. English conventionally
    renders this as 'sackcloth.'
- source_word: עַל־בְּשָׂרוֹ
  chosen: on his body
  alternatives:
  - on his flesh
  - against his skin
  lexicon: HALOT
  rationale: בשר literally means 'flesh,' but in this context it refers to his physical
    body beneath the outer clothes. 'On his body' is idiomatic and clear; 'on his
    flesh' is more literal but less natural in English.
- source_word: מִבָּיִת
  chosen: underneath
  alternatives:
  - under his clothes
  - inside
  lexicon: HALOT
  rationale: Literally 'from inside/within.' In context it indicates the sackcloth
    was worn underneath his outer garments, which became visible when he tore them.
    'Underneath' captures the sense concisely without adding too much interpretation.
