theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: LORD/the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in both direct address and narration.
    Following the doctrinal default, it is rendered as 'LORD' in address and 'the
    LORD' in narration, preserving English convention while reflecting the same Hebrew
    name.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Nature of the vision
  chosen_reading: The text presents a divinely enabled sight of heavenly protection
    without specifying whether the horses and chariots are literal, visionary, or
    angelic in ontological detail.
  alternative_readings:
  - literal angelic army visibly present
  - purely symbolic vision
  rationale: The Hebrew states that the young man’s eyes were opened and he saw the
    mountain full of horses and chariots of fire around Elisha. The translation preserves
    that claim without over-interpreting the metaphysics of the scene.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
