id: 2KI.6.17
reference: 2 Kings 6:17
source:
  edition: WLC
  text: וַ/יִּתְפַּלֵּ֤ל אֱלִישָׁע֙ וַ/יֹּאמַ֔ר יְהוָ֕ה פְּקַח נָ֥א אֶת עֵינָ֖י/ו
    וְ/יִרְאֶ֑ה וַ/יִּפְקַ֤ח יְהוָה֙ אֶת עֵינֵ֣י הַ/נַּ֔עַר וַ/יַּ֗רְא וְ/הִנֵּ֨ה
    הָ/הָ֜ר מָלֵ֨א סוּסִ֥ים וְ/רֶ֛כֶב אֵ֖שׁ סְבִיבֹ֥ת אֱלִישָֽׁע־־־׃
translation:
  text: Then Elisha prayed and said, “LORD, please open his eyes so that he may see.”
    So the LORD opened the young man’s eyes, and he saw; and behold, the mountain
    was full of horses and chariots of fire all around Elisha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the servant” for “the young man”; Hebrew naʿar can denote a youth or
      an attendant/servant depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “LORD” represents the divine name YHWH; alternatively transliterated
      “Yahweh.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - interceded
  lexicon: HALOT
  rationale: The hitpael of פלל here denotes prayer directed to God. 'Prayed' is the
    natural and sufficiently precise English rendering in narrative context.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    In direct address English idiom commonly omits the article, hence 'LORD' in the
    vocative and 'the LORD' in narration.
- source_word: פְּקַח נָא
  chosen: please open
  alternatives:
  - open, please
  - open now
  lexicon: HALOT
  rationale: פקח means 'open,' especially of eyes; נא adds politeness/entreaty rather
    than temporal 'now' in most such prayers. 'Please open' captures the request naturally.
- source_word: עֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Literal rendering; the singular referent is Elisha's servant/attendant
    from context.
- source_word: וְיִרְאֶה
  chosen: so that he may see
  alternatives:
  - that he may see
  - and let him see
  lexicon: HALOT
  rationale: The prefixed verb expresses purpose/result following the imperative request.
    'So that he may see' makes the relation explicit in clear English.
- source_word: הַנַּעַר
  chosen: the young man
  alternatives:
  - the servant
  - the boy
  lexicon: HALOT
  rationale: נער can mean boy, youth, attendant, or servant depending on context.
    Since the immediate context concerns Elisha's attendant, 'servant' is possible,
    but 'young man' preserves the lexical sense without importing a social role not
    explicit in this verse.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - suddenly
  lexicon: HALOT
  rationale: הנה is a discourse marker drawing attention to what is seen. 'Behold'
    preserves the vividness and surprise of the revelation.
- source_word: הָהָר
  chosen: the mountain
  alternatives:
  - the hill
  lexicon: HALOT
  rationale: The definite noun refers to the elevated terrain around Dothan. 'Mountain'
    is the standard rendering and fits the dramatic scene.
- source_word: מָלֵא
  chosen: was full of
  alternatives:
  - was filled with
  lexicon: HALOT
  rationale: Predicate adjective meaning 'full.' 'Was full of' is idiomatic and direct.
- source_word: סוּסִים וְרֶכֶב אֵשׁ
  chosen: horses and chariots of fire
  alternatives:
  - horses and fiery chariots
  - horses and chariotry of fire
  lexicon: HALOT
  rationale: The phrase is best taken as two coordinated nouns, with 'fire' qualifying
    the chariots at minimum; by idiomatic association in this context it characterizes
    the heavenly host. 'Horses and chariots of fire' is the most natural and traditional
    rendering, matching the imagery of divine protection.
- source_word: סְבִיבֹת אֱלִישָׁע
  chosen: all around Elisha
  alternatives:
  - around Elisha
  - surrounding Elisha
  lexicon: HALOT
  rationale: סביבות expresses encirclement. 'All around' conveys the comprehensive
    surrounding presence.
