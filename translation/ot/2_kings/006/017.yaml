theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh/Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the vision
  chosen_reading: The text presents a divinely enabled sight of heavenly protection without specifying whether the horses and chariots are literal, visionary, or angelic in ontological detail.
  alternative_readings:
  - literal angelic army visibly present
  - purely symbolic vision
  rationale: The Hebrew states that the young man’s eyes were opened and he saw the mountain full of horses and chariots of fire around Elisha. The translation preserves that claim without over-interpreting the metaphysics of the scene.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
