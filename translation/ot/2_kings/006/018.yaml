id: 2KI.6.18
reference: 2 Kings 6:18
source:
  edition: WLC
  text: וַ/יֵּרְדוּ֮ אֵלָי/ו֒ וַ/יִּתְפַּלֵּ֨ל אֱלִישָׁ֤ע אֶל יְהוָה֙ וַ/יֹּאמַ֔ר הַךְ נָ֥א אֶת הַ/גּוֹי הַ/זֶּ֖ה בַּ/סַּנְוֵרִ֑ים וַ/יַּכֵּ֥/ם בַּ/סַּנְוֵרִ֖ים כִּ/דְבַ֥ר אֱלִישָֽׁע־־־־׃
translation:
  text: When they came down against him, Elisha prayed to Yahweh and said, “Please strike this nation with blindness.” So he struck them with blindness, according to the word of Elisha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a blinding confusion.' The Hebrew term can denote a divinely caused visual impairment that leaves people unable to perceive rightly, not necessarily total or permanent blindness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ אֵלָיו
  chosen: When they came down against him
  alternatives:
  - And they came down to him
  - When they came down to him
  lexicon: HALOT
  rationale: The verb ירד means 'go down/come down.' With אֶל plus hostile context, English 'against him' best conveys the military movement toward Elisha rather than mere spatial approach. 'When' reflects the narrative waw sequence naturally in English.
- source_word: וַיִּתְפַּלֵּל אֱלִישָׁע אֶל יְהוָה
  chosen: Elisha prayed to the LORD
  alternatives:
  - Elisha interceded with the LORD
  lexicon: HALOT
  rationale: התפלל is the standard verb 'pray.' יְהוָה is rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: הַךְ נָא
  chosen: Please strike
  alternatives:
  - Strike, please
  - Please afflict
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Please strike' preserves both the imperative force and the particle נָא as a polite entreaty in prayer, while using readable modern English rather than archaic 'smite.'
- source_word: הַגּוֹי הַזֶּה
  chosen: this nation
  alternatives:
  - this people
  lexicon: HALOT
  rationale: גוי most basically means 'nation/people.' Here it refers to the Aramean force as a collective national entity; 'nation' is the more direct lexical equivalent.
- source_word: בַּסַּנְוֵרִים
  chosen: with blindness
  alternatives:
  - with blinding confusion
  - with dazzlement
  lexicon: HALOT
  rationale: סַנְוֵרִים occurs in contexts of divinely inflicted visual impairment (cf. Gen 19:11). 'Blindness' is the traditional and most transparent rendering, though the term may imply a disabling visual confusion rather than permanent loss of sight; that nuance is preserved in a footnote.
- source_word: וַיַּכֵּם
  chosen: So he struck them
  alternatives:
  - And he struck them
  lexicon: HALOT
  rationale: The subject is the LORD by context, responding to Elisha's prayer. English can retain the singular pronoun without restating the subject. 'So' captures the resultative narrative flow.
- source_word: כִּדְבַר אֱלִישָׁע
  chosen: according to the word of Elisha
  alternatives:
  - according to Elisha's word
  - as Elisha had said
  lexicon: HALOT
  rationale: דבר here means 'word' or 'utterance.' 'According to the word of Elisha' is slightly more formal but preserves the Hebrew idiom and the causal link between prophetic petition and divine action.
