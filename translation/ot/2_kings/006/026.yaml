id: 2KI.6.26
reference: 2 Kings 6:26
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מֶ֣לֶךְ יִשְׂרָאֵ֔ל עֹבֵ֖ר עַל הַ/חֹמָ֑ה וְ/אִשָּׁ֗ה צָעֲקָ֤ה אֵלָי/ו֙
    לֵ/אמֹ֔ר הוֹשִׁ֖יעָ/ה אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־׃
translation:
  text: And as the king of Israel was passing by on the wall, a woman cried out to
    him, saying, “Help, my lord the king!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Save me, my lord the king!” The Hebrew imperative is literally “save,”
      but here functions as an urgent plea for help.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And as it happened / And as
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces a narrative circumstance. In English,
    a simple temporal framing is more natural than the traditional 'it came to pass.'
    Because the clause is immediately followed by a participial construction, 'And
    as' best captures the scene-setting force.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Standard construct chain identifying the ruler. The definite sense is
    supplied naturally in English from the narrative context.
- source_word: עֹבֵר
  chosen: was passing by
  alternatives:
  - was passing
  - passed by
  lexicon: HALOT
  rationale: The participle with the preceding narrative verb gives ongoing action
    in past narrative. 'Was passing by' conveys the progressive sense and the king's
    movement through the scene.
- source_word: עַל הַחֹמָה
  chosen: on the wall
  alternatives:
  - along the wall
  - upon the wall
  lexicon: HALOT
  rationale: עַל commonly means 'on/upon.' In siege context, the king is moving on
    the city wall or rampart. 'On the wall' is the most direct rendering; 'along the
    wall' is possible interpretively but less literal.
- source_word: וְאִשָּׁה
  chosen: a woman
  lexicon: HALOT
  rationale: Indefinite introduction of a female speaker in the narrative.
- source_word: צָעֲקָה
  chosen: cried out
  alternatives:
  - called out
  - cried
  lexicon: HALOT
  rationale: The verb denotes a loud cry, often in distress or appeal. 'Cried out'
    preserves both volume and urgency.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Direct object of the woman's appeal, referring to the king.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' is
    concise and transparent.
- source_word: הוֹשִׁיעָה
  chosen: Help
  alternatives:
  - Save me
  - Deliver me
  lexicon: HALOT
  rationale: Imperative from ישׁע, literally 'save.' In this immediate appeal to the
    king for intervention, idiomatic English 'Help' best fits while preserving the
    urgent plea. 'Save me' is possible but sounds more absolute than the context requires.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: A respectful address to a superior. 'My lord' is the conventional and
    contextually appropriate rendering in royal address.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Appositional/vocative clarification after 'my lord.' Retained in English
    as 'my lord the king' to preserve the formal address.
