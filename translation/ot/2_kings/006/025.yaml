id: 2KI.6.25
reference: 2 Kings 6:25
source:
  edition: WLC
  text: וַ/יְהִ֨י רָעָ֤ב גָּדוֹל֙ בְּ/שֹׁ֣מְר֔וֹן וְ/הִנֵּ֖ה צָרִ֣ים עָלֶ֑י/הָ עַ֣ד
    הֱי֤וֹת רֹאשׁ חֲמוֹר֙ בִּ/שְׁמֹנִ֣ים כֶּ֔סֶף וְ/רֹ֛בַע הַ/קַּ֥ב חרי יונים בַּ/חֲמִשָּׁה
    כָֽסֶף־־׃
translation:
  text: And there was a great famine in Samaria; and behold, they were besieging it
    until a donkey’s head was worth eighty pieces of silver, and a fourth of a kab
    of dove’s dung was worth five pieces of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pigeon dung.' Some interpreters understand 'dove’s dung' as the literal
      substance; others take it as the name of a cheap food item or plant product
      sold during the famine.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And there was
  alternatives:
  - And it happened
  - Now there was
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new circumstance. 'And there
    was' is natural English and preserves the event-setting force without unnecessary
    stiffness.
- source_word: רָעָב גָּדוֹל
  chosen: a great famine
  alternatives:
  - a severe famine
  lexicon: HALOT
  rationale: The adjective גָּדוֹל literally means 'great,' but in English with famine
    it can also imply severity. 'Great famine' preserves the Hebrew wording while
    remaining idiomatic.
- source_word: בְּשֹׁמְרוֹן
  chosen: in Samaria
  alternatives:
  - at Samaria
  lexicon: HALOT
  rationale: Locative preposition ב with the city name indicates location within the
    city/region. 'In Samaria' is the standard and clearest rendering.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה draws attention to the shocking circumstance. 'Behold' preserves
    the discourse marker's force better than omitting it, and suits the gravity of
    the scene.
- source_word: צָרִים עָלֶיהָ
  chosen: they were besieging it
  alternatives:
  - they were hemming it in
  - they were laying siege to it
  lexicon: HALOT
  rationale: The participle from צור with על conveys ongoing siege action against
    the city. 'They were besieging it' is concise and captures the durative sense.
- source_word: עַד הֱיוֹת
  chosen: until ... was worth
  alternatives:
  - until there came to be
  - to the point that
  lexicon: HALOT
  rationale: 'The construction marks result/intensity: the siege continued to the
    point that prices became exorbitant. English idiom is best conveyed by ''until
    ... was worth'' in context.'
- source_word: רֹאשׁ חֲמוֹר
  chosen: a donkey’s head
  alternatives:
  - the head of a donkey
  lexicon: HALOT
  rationale: Construct chain naming an unclean and low-value food item in famine conditions.
    'A donkey’s head' is natural English and preserves the shocking image.
- source_word: בִּשְׁמֹנִים כֶּסֶף
  chosen: eighty pieces of silver
  alternatives:
  - eighty silver shekels
  - for eighty silver
  lexicon: HALOT
  rationale: The Hebrew literally says 'for eighty silver.' Since 'shekels' is not
    explicit, 'pieces of silver' avoids over-specification while still communicating
    monetary value in readable English.
- source_word: רֹבַע הַקַּב
  chosen: a fourth of a kab
  alternatives:
  - a quarter of a kab
  - a quarter-cab measure
  lexicon: HALOT
  rationale: רֹבַע means 'quarter/fourth,' and קַב is a dry measure. Retaining 'kab'
    preserves the ancient unit rather than replacing it with an uncertain modern equivalent.
- source_word: חרי יונים
  chosen: dove’s dung
  alternatives:
  - pigeon dung
  - wild onions
  - carob pods
  lexicon: HALOT
  rationale: The plain lexical sense is 'doves' dung.' Some interpreters propose a
    euphemism or name of a plant, but the Hebrew wording most directly denotes excrement,
    fitting the extremity of famine. The alternatives are worth preserving in a footnote
    because the phrase is debated.
- source_word: בַּחֲמִשָּׁה כָסֶף
  chosen: was worth five pieces of silver
  alternatives:
  - for five pieces of silver
  lexicon: HALOT
  rationale: As with the earlier price phrase, the Hebrew gives the amount in silver
    without explicitly stating the unit. Repeating 'was worth' makes the English sentence
    clear and balanced.
