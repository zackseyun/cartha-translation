id: 2KI.6.15
reference: 2 Kings 6:15
source:
  edition: WLC
  text: וַ֠/יַּשְׁכֵּם מְשָׁרֵ֨ת אִ֥ישׁ הָֽ/אֱלֹהִים֮ לָ/קוּם֒ וַ/יֵּצֵ֕א וְ/הִנֵּה
    חַ֛יִל סוֹבֵ֥ב אֶת הָ/עִ֖יר וְ/ס֣וּס וָ/רָ֑כֶב וַ/יֹּ֨אמֶר נַעֲר֥/וֹ אֵלָ֛י/ו
    אֲהָ֥הּ אֲדֹנִ֖/י אֵיכָ֥ה נַֽעֲשֶֽׂה־־׃
translation:
  text: When the servant of the man of God rose early and went out, behold, an army
    with horses and chariots was surrounding the city. And his servant said to him,
    “Alas, my master! What shall we do?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his servant said to him.' The Hebrew נַעַר can mean 'young man,' 'servant,'
      or 'attendant'; here 'young servant' preserves both the age-related and service-related
      nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the servant of the man of God'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  chosen: rose early
  alternatives:
  - got up early
  - arose early in the morning
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly conveys starting early or rising early. 'Rose
    early' is natural modern English and preserves the temporal nuance without unnecessary
    expansion.
- source_word: מְשָׁרֵת
  chosen: servant
  alternatives:
  - attendant
  - minister
  lexicon: HALOT
  rationale: The participle denotes one who serves in a personal or official capacity.
    'Servant' fits the narrative context better than 'minister' and is more idiomatic
    than 'attendant' here.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  lexicon: HALOT
  rationale: This is a standard prophetic title in the Hebrew Bible. It should be
    translated literally to preserve its established sense and intertextual resonance.
- source_word: לָקוּם
  chosen: rose
  alternatives:
  - to get up
  - to arise
  lexicon: HALOT
  rationale: Although formally an infinitive, in sequence with the preceding verb
    it contributes to the narrative action. Rendering it with the finite verb 'rose'
    gives clear English while preserving the sense.
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: '''Went out'' is the standard rendering of יצא in this context and matches
    the servant''s movement from inside to outside.'
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - there was
  lexicon: HALOT
  rationale: This discourse marker signals sudden sight or surprise. 'Behold' preserves
    the vividness and abruptness of the Hebrew better than flattening it to 'there
    was.'
- source_word: חַיִל
  chosen: an army
  alternatives:
  - a force
  - troops
  lexicon: HALOT
  rationale: In this military context, חַיִל refers to an armed force. 'Army' is the
    clearest and most natural rendering in English.
- source_word: סוֹבֵב
  chosen: was surrounding
  alternatives:
  - surrounded
  - encircling
  lexicon: HALOT
  rationale: The participle presents the scene as ongoing when discovered. 'Was surrounding'
    preserves that progressive aspect better than the simple past 'surrounded.'
- source_word: וְסוּס וָרָכֶב
  chosen: with horses and chariots
  alternatives:
  - and horses and chariots
  lexicon: HALOT
  rationale: The phrase apposes or specifies the army's military resources. English
    reads more naturally with 'with horses and chariots' rather than a bare nominal
    string.
- source_word: נַעֲרוֹ
  chosen: his young servant
  alternatives:
  - his servant
  - his attendant
  - his young man
  lexicon: HALOT
  rationale: נַעַר can mean youth, young man, or servant. Since מְשָׁרֵת already identified
    the figure as a servant, 'his young servant' preserves both the relational and
    age nuance without awkwardness.
- source_word: אֲהָהּ
  chosen: Alas
  alternatives:
  - Ah
  - Oh no
  lexicon: HALOT
  rationale: This interjection expresses alarm or distress. 'Alas' preserves the gravity
    of the moment better than colloquial alternatives.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  - sir
  lexicon: HALOT
  rationale: Here the term is a respectful address from a servant to his superior,
    not a divine title. 'My master' best fits the social relationship in context.
- source_word: אֵיכָה נַעֲשֶׂה
  chosen: What shall we do?
  alternatives:
  - How shall we act?
  - What are we to do?
  lexicon: HALOT
  rationale: The idiom asks what course of action remains. 'What shall we do?' is
    idiomatic, concise, and faithful to the Hebrew sense.
