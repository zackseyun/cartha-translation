id: 2KI.6.21
reference: 2 Kings 6:21
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֶֽלֶךְ יִשְׂרָאֵל֙ אֶל אֱלִישָׁ֔ע כִּ/רְאֹת֖/וֹ אוֹתָ֑/ם הַ/אַכֶּ֥ה
    אַכֶּ֖ה אָבִֽ/י־־׃
translation:
  text: Then the king of Israel said to Elisha when he saw them, “Shall I strike them
    down? Shall I strike them down, my father?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Should I strike them? Should I strike them?” The Hebrew repeats the
      verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: “My father” is a respectful form of address to Elisha.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force; 'and said' is possible but less
    idiomatic here.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; definite in context.
- source_word: אֶל אֱלִישָׁע
  chosen: to Elisha
  alternatives:
  - to Elisha the prophet
  lexicon: HALOT
  rationale: The preposition אֶל marks indirect address. 'The prophet' is not in the
    Hebrew and should not be added.
- source_word: כִּרְאֹתוֹ אֹתָם
  chosen: when he saw them
  alternatives:
  - as soon as he saw them
  - at his seeing them
  lexicon: HALOT
  rationale: The infinitive construct with prefixed כ and 3ms suffix is a temporal
    clause. The subject of 'saw' is the king in context. 'When he saw them' is idiomatic
    and sufficiently precise.
- source_word: הַאַכֶּה אַכֶּה
  chosen: Shall I strike them down? Shall I strike them down?
  alternatives:
  - Should I strike them? Should I strike them?
  - May I strike them? May I strike them?
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the question. Repeating
    the English clause preserves the emphatic duplication. 'Strike them down' makes
    explicit the lethal military sense in context better than bare 'strike them.'
- source_word: אָבִי
  chosen: my father
  alternatives:
  - father
  lexicon: HALOT
  rationale: A respectful form of address to Elisha, not a biological claim. Retaining
    'my father' preserves the relational and honorific nuance without paraphrase.
