theological_decisions:
- issue: Honorific address to Elisha
  chosen_reading: Render אָבִי literally as 'my father' while understanding it as
    respectful address to a prophetic superior.
  alternative_readings:
  - Render more interpretively as 'my master' or 'sir'
  rationale: The Hebrew literally says 'my father.' Although the sense is honorific,
    the text itself uses familial language, and preserving that wording best fits
    optimal equivalence while avoiding interpretive flattening.
  doctrine_reference: Translation philosophy §1, §5
