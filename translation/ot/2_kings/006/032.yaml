id: 2KI.6.32
reference: 2 Kings 6:32
source:
  edition: WLC
  text: וֶ/אֱלִישָׁע֙ יֹשֵׁ֣ב בְּ/בֵית֔/וֹ וְ/הַ/זְּקֵנִ֖ים יֹשְׁבִ֣ים אִתּ֑/וֹ וַ/יִּשְׁלַ֨ח
    אִ֜ישׁ מִ/לְּ/פָנָ֗י/ו בְּ/טֶ֣רֶם יָבֹא֩ הַ/מַּלְאָ֨ךְ אֵלָ֜י/ו וְ/ה֣וּא אָמַ֣ר
    אֶל הַ/זְּקֵנִ֗ים הַ/רְּאִיתֶם֙ כִּֽי שָׁלַ֞ח בֶּן הַֽ/מְרַצֵּ֤חַ הַ/זֶּה֙ לְ/הָסִ֣יר
    אֶת רֹאשִׁ֔/י רְא֣וּ כְּ/בֹ֣א הַ/מַּלְאָ֗ךְ סִגְר֤וּ הַ/דֶּ֨לֶת֙ וּ/לְחַצְתֶּ֤ם
    אֹת/וֹ֙ בַּ/דֶּ֔לֶת הֲ/ל֗וֹא ק֛וֹל רַגְלֵ֥י אֲדֹנָ֖י/ו אַחֲרָֽי/ו׀־־־־׀׃
translation:
  text: Now Elisha was sitting in his house, and the elders were sitting with him.
    And the king sent a man ahead of him, but before the messenger came to him, he
    said to the elders, “Do you see how this son of a murderer has sent to take away
    my head? Look, when the messenger comes, shut the door and hold him fast at the
    door. Is not the sound of his master’s feet behind him?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to cut off my head.” The Hebrew literally says “to take away my head,”
      an idiom for execution by beheading.
    reason: lexical_alternative
  - marker: b
    text: “Messenger” here refers to a human royal envoy, not an angel.
    reason: cultural_note
lexical_decisions:
- source_word: יֹשֵׁב / יֹשְׁבִים
  chosen: was sitting / were sitting
  alternatives:
  - sat / were seated
  lexicon: HALOT
  rationale: The participles depict an ongoing scene in progress, so English progressive
    forms best preserve the narrative setting.
- source_word: וַיִּשְׁלַח אִישׁ מִלְּפָנָיו
  chosen: the king sent a man ahead of him
  alternatives:
  - sent a man from his presence
  - sent a man before him
  lexicon: HALOT
  rationale: The subject is the king from the prior context. מִלְּפָנָיו idiomatically
    means from before him/ahead of him. 'Ahead of him' is natural English and preserves
    the temporal-spatial sense.
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the envoy
  - the angel
  lexicon: HALOT
  rationale: In this royal narrative context the referent is a human emissary, not
    an angelic being. 'Messenger' is the clearest contextual rendering.
- source_word: הֲרְאִיתֶם
  chosen: Do you see
  alternatives:
  - Have you seen
  - Do you perceive
  lexicon: HALOT
  rationale: The form can be understood as a rhetorical appeal to perception. 'Do
    you see' fits the immediate warning and natural English discourse.
- source_word: בֶּן הַמְרַצֵּחַ הַזֶּה
  chosen: this son of a murderer
  alternatives:
  - this murderer’s son
  - this son of the murderer
  lexicon: HALOT
  rationale: The phrase is an insulting designation of the king, likely alluding to
    Ahab's house and its bloodguilt. 'This son of a murderer' preserves both the idiom
    and the contempt.
- source_word: לְהָסִיר אֶת רֹאשִׁי
  chosen: to take away my head
  alternatives:
  - to remove my head
  - to cut off my head
  lexicon: HALOT
  rationale: The infinitive of סור/הסיר with 'head' is an idiom for beheading. 'Take
    away my head' stays close to the Hebrew while remaining intelligible.
- source_word: רְאוּ
  chosen: Look
  alternatives:
  - See
  - Take notice
  lexicon: HALOT
  rationale: An imperative drawing urgent attention; 'Look' is idiomatic and forceful
    in modern English.
- source_word: סִגְרוּ הַדֶּלֶת
  chosen: shut the door
  alternatives:
  - close the door
  lexicon: HALOT
  rationale: Either is possible; 'shut' better matches the urgent, defensive action.
- source_word: וּלְחַצְתֶּם אֹתוֹ בַּדֶּלֶת
  chosen: hold him fast at the door
  alternatives:
  - press him back at the door
  - restrain him at the door
  lexicon: HALOT
  rationale: לחץ here conveys pressing or constraining someone at the doorway so he
    cannot enter. 'Hold him fast at the door' communicates the intended action in
    clear English.
- source_word: הֲלוֹא קוֹל רַגְלֵי אֲדֹנָיו אַחֲרָיו
  chosen: Is not the sound of his master’s feet behind him?
  alternatives:
  - Do I not hear the sound of his lord's feet behind him?
  - Is not the noise of his master's footsteps after him?
  lexicon: HALOT
  rationale: The clause signals that the sender, the king as the messenger's master,
    is immediately following. 'Sound of his master’s feet behind him' is both literal
    and natural.
