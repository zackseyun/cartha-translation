theological_decisions:
- issue: Identification of the implicit subject of וַיִּשְׁלַח
  chosen_reading: the king sent a man
  alternative_readings:
  - he sent a man
  rationale: The immediate context identifies the subject as the king of Israel. Making
    the subject explicit in English avoids ambiguity without adding new content.
