id: 2KI.6.1
reference: 2 Kings 6:1
source:
  edition: WLC
  text: וַ/יֹּאמְר֥וּ בְנֵֽי הַ/נְּבִיאִ֖ים אֶל אֱלִישָׁ֑ע הִנֵּֽה נָ֣א הַ/מָּק֗וֹם
    אֲשֶׁ֨ר אֲנַ֜חְנוּ יֹשְׁבִ֥ים שָׁ֛ם לְ/פָנֶ֖י/ךָ צַ֥ר מִמֶּֽ/נּוּ־־־׃
translation:
  text: Now the sons of the prophets said to Elisha, “Please look, the place where
    we are living there before you is too cramped for us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the disciples/company of the prophets.' The Hebrew idiom 'sons of the
      prophets' likely refers to a prophetic community under instruction or oversight.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your presence.' The phrase 'before you' may indicate that they lived
      under Elisha's supervision rather than merely in front of him physically.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי הַנְּבִיאִים
  chosen: the sons of the prophets
  alternatives:
  - the company of the prophets
  - the disciples of the prophets
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the idiom and its likely reference
    to a prophetic guild or community. 'Sons of the prophets' is established English
    and avoids over-interpreting the relationship as strictly pedagogical, though
    that sense may be implied.
- source_word: הִנֵּה נָא
  chosen: Please look
  alternatives:
  - Behold, please
  - Please see
  - Look now
  lexicon: HALOT
  rationale: The combination draws attention and adds politeness/urgency. 'Please
    look' conveys both the deictic force of הִנֵּה and the softening/request nuance
    of נָא in readable modern English.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the place where we stay
  - the dwelling place
  lexicon: HALOT
  rationale: The noun is broad and contextually refers to their current lodging or
    meeting place. 'The place' keeps the source wording without prematurely specifying
    a building type.
- source_word: יֹשְׁבִים שָׁם לְפָנֶיךָ
  chosen: we are living there before you
  alternatives:
  - we sit there before you
  - we dwell there with you
  - we live there in your presence
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit, remain, dwell, live'; here a residential
    sense fits the complaint about limited space. לְפָנֶיךָ is rendered literally
    enough as 'before you,' likely meaning under Elisha's oversight/presence. 'There'
    is retained because it is present in the Hebrew, even if somewhat redundant in
    English.
- source_word: צַר מִמֶּנּוּ
  chosen: is too cramped for us
  alternatives:
  - is too small for us
  - is narrow for us
  lexicon: HALOT
  rationale: צַר literally means 'narrow, cramped.' In context of insufficient room,
    'too cramped for us' best captures the spatial complaint while remaining natural
    English.
- source_word: וַיֹּאמְרוּ
  chosen: Now ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Now' is a natural English
    discourse marker here, slightly smoother than repeated 'And' while preserving
    narrative progression.
