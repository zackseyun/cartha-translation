id: 2KI.6.13
reference: 2 Kings 6:13
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר לְכ֤וּ וּ/רְאוּ֙ אֵיכֹ֣ה ה֔וּא וְ/אֶשְׁלַ֖ח וְ/אֶקָּחֵ֑/הוּ וַ/יֻּגַּד
    ל֥/וֹ לֵ/אמֹ֖ר הִנֵּ֥ה בְ/דֹתָֽן־׃
translation:
  text: And he said, “Go and see where he is, so that I may send and seize him.” And
    it was reported to him, saying, “Look, he is in Dothan.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “and I will send and take him”; the Hebrew sequence can be rendered
      more formally, but here it likely expresses purpose: “so that I may send and
      seize him.”'
    reason: lexical_alternative
  - marker: b
    text: Dothan was a town north of Samaria; it is also associated with the Joseph
      narrative (Gen 37:17).
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'And he
    said' preserves Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Go on
  - Come, go
  lexicon: HALOT
  rationale: Imperative plural of הלך addressed to multiple agents; simple 'Go' is
    the most natural and sufficient English rendering.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  - and find out
  lexicon: HALOT
  rationale: Imperative plural of ראה. 'See' keeps the direct lexical sense; in context
    it implies investigation, but 'find out' would move too far toward paraphrase.
- source_word: אֵיכֹה הוּא
  chosen: where he is
  alternatives:
  - where he may be
  lexicon: HALOT
  rationale: Interrogative adverb with pronoun indicating location. 'Where he is'
    is idiomatic English and reflects the plain sense.
- source_word: וְאֶשְׁלַח
  chosen: so that I may send
  alternatives:
  - and I will send
  - then I will send
  lexicon: HALOT
  rationale: Though formally a first person imperfect with conjunction, in this purpose
    sequence after imperatives it expresses intended result/purpose. 'So that I may
    send' best captures the syntax in natural English.
- source_word: וְאֶקָּחֵהוּ
  chosen: and seize him
  alternatives:
  - and take him
  - and capture him
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in this hostile royal context the sense
    is apprehension. 'Seize him' communicates the force without unnecessary expansion;
    'capture him' is possible but slightly more interpretive.
- source_word: וַיֻּגַּד לוֹ
  chosen: And it was reported to him
  alternatives:
  - And he was told
  - And someone told him
  lexicon: HALOT
  rationale: 'Hophal of נגד is passive/causative passive: information was made known
    to him. ''It was reported to him'' preserves the passive and the formal court-report
    tone.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing reported speech; 'saying' is
    the most transparent rendering.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is readable modern English
    and preserves the discourse function better than archaic 'Behold.'
- source_word: בְדֹתָן
  chosen: in Dothan
  lexicon: HALOT
  rationale: Proper place name transliterated per translation philosophy; preposition
    ב is locative, hence 'in Dothan.'
