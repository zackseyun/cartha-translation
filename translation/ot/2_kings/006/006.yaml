theological_decisions:
- issue: Miraculous action in the narrative
  chosen_reading: 'Render the event straightforwardly as a miracle: ''the iron floated.'''
  alternative_readings:
  - Use a more interpretive phrasing such as 'the iron rose to the surface'
  rationale: The narrative presents a miraculous recovery without embarrassment or
    metaphor. The translation should neither naturalize nor embellish the event, but
    state plainly what the Hebrew says.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
