id: 2KI.6.6
reference: 2 Kings 6:6
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אִישׁ הָ/אֱלֹהִ֖ים אָ֣נָה נָפָ֑ל וַ/יַּרְאֵ֨/הוּ֙ אֶת הַ/מָּק֔וֹם
    וַ/יִּקְצָב עֵץ֙ וַ/יַּשְׁלֶךְ שָׁ֔מָּ/ה וַ/יָּ֖צֶף הַ/בַּרְזֶֽל־־־־׃
translation:
  text: Then the man of God said, “Where did it fall?” And when he showed him the
    place, he cut off a stick and threw it there, and the iron floated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “the iron.” In context, this refers to the iron axe head mentioned
      in the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: A standard Hebrew title for a prophet or holy man. 'Man of God' is the
    most direct and conventional rendering and preserves the idiom without interpretive
    expansion.
- source_word: אָ֣נָה
  chosen: Where
  alternatives:
  - To where
  - At what place
  lexicon: HALOT
  rationale: In context introducing a question about location, the adverb asks for
    the place where the axe head fell. Idiomatic English is 'Where did it fall?'.
- source_word: נָפָל
  chosen: did it fall
  alternatives:
  - has it fallen
  - fell
  lexicon: HALOT
  rationale: 'The perfect verb refers to the completed event just mentioned. English
    idiom in direct question favors simple past with auxiliary: ''Where did it fall?''.'
- source_word: וַיַּרְאֵהוּ
  chosen: when he showed him
  alternatives:
  - and he showed him
  - and he caused him to see
  lexicon: HALOT
  rationale: The Hiphil of ראה means 'cause to see,' hence 'show.' Given the narrative
    flow, 'when he showed him' captures the sequential sense naturally in English
    while preserving the causative idea.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - the spot
  lexicon: HALOT
  rationale: A straightforward rendering of מקום. 'Place' is natural and sufficiently
    concrete in context.
- source_word: וַיִּקְצָב עֵץ
  chosen: he cut off a stick
  alternatives:
  - he cut a piece of wood
  - he cut down wood
  lexicon: HALOT
  rationale: The verb קצב here denotes cutting off or shaping, and עץ can mean wood/tree/stick.
    In this context, a single cut piece thrown into the water is best rendered 'a
    stick,' which is concrete and readable without overstating the size.
- source_word: וַיַּשְׁלֶךְ שָׁמָּה
  chosen: threw it there
  alternatives:
  - cast it there
  - threw it into that place
  lexicon: HALOT
  rationale: The verb means 'throw/cast.' 'Threw it there' is idiomatic modern English
    and preserves the directional adverb.
- source_word: וַיָּצֶף
  chosen: floated
  alternatives:
  - rose to the surface
  - made float
  lexicon: HALOT
  rationale: The verb denotes floating or surfacing. Since the subject is 'the iron,'
    the intransitive 'floated' is the most direct rendering. 'Rose to the surface'
    is interpretive expansion.
- source_word: הַבַּרְזֶל
  chosen: the iron
  alternatives:
  - the iron axe head
  - the iron tool
  lexicon: HALOT
  rationale: Literally 'the iron.' In context it refers to the lost iron axe head
    from the previous verse, but the Hebrew itself says only 'the iron.' The main
    text preserves that wording; a clarifying alternative is suitable for a footnote.
