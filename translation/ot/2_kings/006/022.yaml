theological_decisions:
- issue: Force of Elisha's rhetorical question
  chosen_reading: 'The question is rhetorical: the king should not kill these prisoners,
    especially since he did not capture them by his own military action.'
  alternative_readings:
  - A flat statement rather than a rhetorical question
  - A narrower point limited only to prisoners personally captured in battle
  rationale: The Hebrew wording naturally supports a rhetorical question after the
    prohibition. This preserves the narrative logic without importing a broader legal
    principle beyond the verse.
