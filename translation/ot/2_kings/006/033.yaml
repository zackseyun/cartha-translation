id: 2KI.6.33
reference: 2 Kings 6:33
source:
  edition: WLC
  text: עוֹדֶ֨/נּוּ֙ מְדַבֵּ֣ר עִמָּ֔/ם וְ/הִנֵּ֥ה הַ/מַּלְאָ֖ךְ יֹרֵ֣ד אֵלָ֑י/ו וַ/יֹּ֗אמֶר
    הִנֵּֽה זֹ֤את הָֽ/רָעָה֙ מֵ/אֵ֣ת יְהוָ֔ה מָֽה אוֹחִ֥יל לַ/יהוָ֖ה עֽוֹד־־׃ס
translation:
  text: While he was still speaking with them, behold, the messenger came down to
    him and said, “Behold, this evil is from the LORD. Why should I wait for the LORD
    any longer?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What should I hope for from the LORD any longer?” The Hebrew verb can
      mean either “wait” or “hope.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹדֶנּוּ
  chosen: while he was still
  alternatives:
  - still
  - yet, while he was yet
  lexicon: HALOT
  rationale: The adverb with pronominal suffix idiomatically means 'while he was still'
    doing the following action. In English it naturally introduces the ongoing action
    of speaking.
- source_word: מְדַבֵּר
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: Participle of דבר denotes ongoing speech. 'Speaking' preserves the durative
    sense better than a finite past verb alone.
- source_word: עִמָּם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward preposition plus suffix; refers to the group present
    with Elisha.
- source_word: הַמַּלְאָךְ
  chosen: the messenger
  alternatives:
  - the angel
  lexicon: HALOT
  rationale: In this narrative context the referent is the king's emissary sent ahead,
    not a heavenly being. 'Messenger' best fits the immediate context and avoids misleading
    readers. The alternative 'angel' is lexically possible but contextually unlikely.
- source_word: יֹרֵד אֵלָיו
  chosen: came down to him
  alternatives:
  - was coming down to him
  - descended to him
  lexicon: HALOT
  rationale: The participle ירד marks motion downward/in approach. English idiom in
    narrative favors 'came down to him'; 'descended' is more formal but less natural.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retained to reflect the deictic/interjectional force both in the narrative
    and in the quoted speech. 'Behold' is slightly elevated but still transparent
    and preserves the rhetorical punch.
- source_word: זֹאת הָרָעָה
  chosen: this evil
  alternatives:
  - this disaster
  - this calamity
  lexicon: HALOT
  rationale: רָעָה here refers to the present calamity/distress. 'Evil' is formally
    closer and preserves the speaker's accusatory tone; 'disaster/calamity' are interpretive
    contextual glosses.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The phrase attributes the
    present calamity to the LORD as its source or agency in the speaker's complaint.
- source_word: מָה אוֹחִיל
  chosen: Why should I wait
  alternatives:
  - What should I hope for?
  - Why should I hope?
  lexicon: HALOT
  rationale: The Hiphil of יחל can mean 'wait/hope.' In context, the king's statement
    expresses exasperation about continuing to look to the LORD for deliverance. 'Why
    should I wait' best captures the practical force, while the hope nuance is preserved
    as an alternative.
- source_word: לַיהוָה עוֹד
  chosen: for the LORD any longer
  alternatives:
  - in the LORD any longer
  - for the LORD still
  lexicon: HALOT
  rationale: The preposition with יחל commonly marks the object of waiting/hoping.
    'For the LORD any longer' is idiomatic English and conveys the temporal force
    of עוֹד.
