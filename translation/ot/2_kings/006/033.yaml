theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Semantic force of יחל in the king's complaint
  chosen_reading: wait for the LORD
  alternative_readings:
  - hope in the LORD
  - look for the LORD's help
  rationale: The Hebrew verb can denote both waiting and hoping. Here the speaker
    rejects continued expectation of divine intervention; 'wait' communicates that
    stance clearly without excluding the hope nuance, which is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
