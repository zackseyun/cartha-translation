id: 2KI.6.20
reference: 2 Kings 6:20
source:
  edition: WLC
  text: וַ/יְהִי֮ כְּ/בֹאָ֣/ם שֹׁמְרוֹן֒ וַ/יֹּ֣אמֶר אֱלִישָׁ֔ע יְהוָ֕ה פְּקַ֥ח אֶת עֵינֵֽי אֵ֖לֶּה וְ/יִרְא֑וּ וַ/יִּפְקַ֤ח יְהוָה֙ אֶת עֵ֣ינֵי/הֶ֔ם וַ/יִּרְא֕וּ וְ/הִנֵּ֖ה בְּ/ת֥וֹךְ שֹׁמְרֽוֹן־־־׃
translation:
  text: And when they came into Samaria, Elisha said, “O Yahweh, open the eyes of these men so that they may see.” So Yahweh opened their eyes, and they saw; and behold, they were in the midst of Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''these''; ''men'' is supplied in English for clarity, referring to the Aramean soldiers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּבֹאָם
  chosen: And when they came
  alternatives:
  - And it happened, when they came
  - And as they entered
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol plus temporal infinitive construct introduces the next event in narrative sequence. 'And when they came' preserves the temporal force while using natural modern English; the more literal 'and it happened' is stylistically unnecessary in English.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration is 'Samaria.' In this context it refers to the city, not the broader region, but English normally uses the same form.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פְּקַח ... אֶת עֵינֵי
  chosen: open the eyes
  alternatives:
  - uncover the eyes
  - restore sight to
  lexicon: HALOT
  rationale: The idiom literally means 'open the eyes.' Here it refers to removal of divinely imposed blindness or lack of perception. 'Open the eyes' preserves the Hebrew idiom and its theological resonance.
- source_word: אֵלֶּה
  chosen: these men
  alternatives:
  - these
  - these people
  lexicon: HALOT
  rationale: The demonstrative alone is literally 'these,' referring to the Aramean soldiers. Supplying 'men' makes the English clear without materially expanding the sense.
- source_word: וְיִרְאוּ
  chosen: so that they may see
  alternatives:
  - that they may see
  - and let them see
  lexicon: HALOT
  rationale: The prefixed verb after the imperative expresses purpose/result in the prayer. 'So that they may see' communicates the intended force naturally in English.
- source_word: וַיִּפְקַח יְהוָה אֶת עֵינֵיהֶם
  chosen: So the LORD opened their eyes
  alternatives:
  - And the LORD opened their eyes
  lexicon: HALOT
  rationale: This is the narrative fulfillment of Elisha's prayer. 'So' appropriately marks the result in English while retaining the sequence.
- source_word: וַיִּרְאוּ
  chosen: and they saw
  alternatives:
  - then they saw
  lexicon: HALOT
  rationale: Straightforward narrative continuation; 'saw' should be retained rather than paraphrased as 'realized,' since the next clause specifies what they saw.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there they were
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to a sudden realization. 'Behold' is slightly elevated but still concise and preserves the force better than flatter alternatives.
- source_word: בְּתוֹךְ שֹׁמְרוֹן
  chosen: in the midst of Samaria
  alternatives:
  - inside Samaria
  - within Samaria
  - in the middle of Samaria
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst/middle of.' 'In the midst of Samaria' preserves the dramatic sense that they found themselves surrounded within the city.
