id: 2KI.6.7
reference: 2 Kings 6:7
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר הָ֣רֶם לָ֑/ךְ וַ/יִּשְׁלַ֥ח יָד֖/וֹ וַ/יִּקָּחֵֽ/הוּ׃פ
translation:
  text: And he said, “Pick it up for yourself.” So he reached out his hand and took
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Lift it up for yourself.” The Hebrew imperative can be rendered more
      literally as “lift up.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequence; 'And he said' preserves the Hebrew
    flow without overinterpreting discourse structure.
- source_word: הָרֶם
  chosen: Pick it up
  alternatives:
  - Lift it up
  - Take it up
  lexicon: HALOT
  rationale: Imperative of רוּם/הֵרִים, here idiomatically meaning to lift or pick
    up the recovered object from the water. English requires the object to be supplied
    from context; 'pick it up' is the most natural and contextually precise rendering.
- source_word: לָךְ
  chosen: for yourself
  alternatives:
  - for you
  - yourself
  lexicon: HALOT
  rationale: The preposition with 2ms suffix adds personal involvement or benefit.
    'For yourself' preserves the dative nuance better than a bare 'it up,' while remaining
    natural English.
- source_word: וַיִּשְׁלַח יָדוֹ
  chosen: he reached out his hand
  alternatives:
  - he stretched out his hand
  - he put out his hand
  lexicon: HALOT
  rationale: This Hebrew idiom commonly denotes extending the hand to grasp something.
    'Reached out his hand' is idiomatic modern English and fits the immediate action.
- source_word: וַיִּקָּחֵהוּ
  chosen: and took it
  alternatives:
  - and picked it up
  - and took hold of it
  lexicon: HALOT
  rationale: לקח normally means 'take.' Since 'pick it up' was already used for the
    imperative, 'took it' avoids unnecessary repetition while staying faithful to
    the verb's core sense.
