id: 2KI.6.8
reference: 2 Kings 6:8
source:
  edition: WLC
  text: וּ/מֶ֣לֶךְ אֲרָ֔ם הָיָ֥ה נִלְחָ֖ם בְּ/יִשְׂרָאֵ֑ל וַ/יִּוָּעַץ֙ אֶל עֲבָדָ֣י/ו
    לֵ/אמֹ֗ר אֶל מְק֛וֹם פְּלֹנִ֥י אַלְמֹנִ֖י תַּחֲנֹתִֽ/י־־׃
translation:
  text: Now the king of Aram was warring against Israel, and he consulted with his
    servants, saying, “At such-and-such a place shall be my camp.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “At such-and-such a place is my encampment.” The Hebrew
      uses an idiom for an unspecified location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֶלֶךְ אֲרָם
  chosen: Now the king of Aram
  alternatives:
  - And the king of Aram
  - the king of Syria
  lexicon: HALOT
  rationale: ו conjunction can be rendered simply 'and,' but 'now' fits the narrative
    transition smoothly in modern English without adding content. אֲרָם is transliterated
    as the place-name 'Aram' per the philosophy of transliterating names rather than
    substituting the traditional 'Syria'.
- source_word: הָיָה נִלְחָם
  chosen: was warring
  alternatives:
  - was fighting
  - made war
  lexicon: HALOT
  rationale: The periphrastic construction with היה + nifal participle conveys ongoing
    or repeated action in past time. 'Was warring' preserves that durative sense better
    than a simple past.
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  lexicon: HALOT
  rationale: With נלחם, the preposition ב commonly marks the opponent in conflict;
    idiomatic English requires 'against Israel' rather than the more literal but misleading
    'with Israel'.
- source_word: וַיִּוָּעַץ
  chosen: he consulted
  alternatives:
  - he took counsel
  - he deliberated
  lexicon: HALOT
  rationale: The verb denotes taking counsel or consulting. 'He consulted' is clear
    modern English and fits the following אֶל עֲבָדָיו construction.
- source_word: אֶל עֲבָדָיו
  chosen: with his servants
  alternatives:
  - to his servants
  - with his officers
  lexicon: HALOT
  rationale: Although אֶל is literally 'to,' English idiom with 'consult' normally
    takes 'with.' עֲבָדָיו can mean servants in a royal court context; 'officers'
    is possible contextually, but the Hebrew term itself is broader, so 'servants'
    is retained.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the content
    of the consultation.
- source_word: אֶל מְקוֹם פְּלֹנִי אַלְמֹנִי
  chosen: At such-and-such a place
  alternatives:
  - At a certain place
  - At this or that place
  lexicon: HALOT
  rationale: The paired expression פלני אלמני is an idiom for an unspecified or unnamed
    location. 'Such-and-such a place' preserves the idiomatic indefiniteness more
    precisely than the flatter 'a certain place.'
- source_word: תַּחֲנֹתִי
  chosen: shall be my camp
  alternatives:
  - is my camp
  - I will encamp
  - my encampment will be
  lexicon: HALOT
  rationale: 'The noun refers to encampment/camp. Since the king is planning military
    positioning, English naturally supplies a future-like sense: ''shall be my camp.''
    This best reflects the intended meaning of the terse Hebrew clause in context.'
