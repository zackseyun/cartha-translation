id: 2KI.6.12
reference: 2 Kings 6:12
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַחַ֣ד מֵֽ/עֲבָדָ֔י/ו ל֖וֹא אֲדֹנִ֣/י הַ/מֶּ֑לֶךְ כִּֽי אֱלִישָׁ֤ע
    הַ/נָּבִיא֙ אֲשֶׁ֣ר בְּ/יִשְׂרָאֵ֔ל יַגִּיד֙ לְ/מֶ֣לֶךְ יִשְׂרָאֵ֔ל אֶת הַ֨/דְּבָרִ֔ים
    אֲשֶׁ֥ר תְּדַבֵּ֖ר בַּ/חֲדַ֥ר מִשְׁכָּבֶֽ/ךָ־־׃
translation:
  text: But one of his servants said, “No, my lord the king. Rather, Elisha the prophet,
    who is in Israel, tells the king of Israel the words that you speak in your bedroom.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in your bedchamber.” The Hebrew is literally “in the chamber of your
      bed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    context because this statement counters the king's suspicion in the previous verse,
    while 'said' is the straightforward rendering of אמר.
- source_word: אַחַד מֵעֲבָדָיו
  chosen: one of his servants
  alternatives:
  - one of his attendants
  - one of his officials
  lexicon: HALOT
  rationale: עבד commonly means 'servant' here in a royal court setting. 'Servants'
    is more textually transparent than 'officials,' though the referent is likely
    a court servant or officer.
- source_word: לֹא אֲדֹנִי הַמֶּלֶךְ
  chosen: No, my lord the king
  alternatives:
  - Not so, my lord the king
  - No, my master the king
  lexicon: HALOT
  rationale: This is a respectful denial of the king's assumption. 'My lord the king'
    preserves the courtly address of אֲדֹנִי plus הַמֶּלֶךְ. 'No' is natural modern
    English for the initial negation.
- source_word: כִּי
  chosen: Rather
  alternatives:
  - for
  - but
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the corrective explanation after the denial. 'Rather'
    communicates the adversative-explanatory force more naturally than a wooden 'for.'
- source_word: אֱלִישָׁע
  chosen: Elisha
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Straightforward rendering of the title נביא.
- source_word: אֲשֶׁר בְּיִשְׂרָאֵל
  chosen: who is in Israel
  alternatives:
  - who is among Israel
  - who is in the land of Israel
  lexicon: HALOT
  rationale: The relative clause locates Elisha geographically. 'Who is in Israel'
    is the plain sense and idiomatic in English.
- source_word: יַגִּיד
  chosen: tells
  alternatives:
  - declares
  - reports
  - reveals
  lexicon: HALOT
  rationale: נגד in Hiphil means to make known or tell. 'Tells' is clear and natural
    here, matching the direct object 'the words.'
- source_word: לְמֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Standard construct rendering.
- source_word: אֶת־הַדְּבָרִים
  chosen: the words
  alternatives:
  - the things
  - what
  lexicon: HALOT
  rationale: דברים literally means 'words' here, and retaining it preserves the verbal
    parallel with 'you speak.'
- source_word: אֲשֶׁר תְּדַבֵּר
  chosen: that you speak
  alternatives:
  - that you say
  - which you are speaking
  lexicon: HALOT
  rationale: The imperfect here expresses what the king says in private. 'Speak' preserves
    the lexical connection with דבר.
- source_word: בַּחֲדַר מִשְׁכָּבֶךָ
  chosen: in your bedroom
  alternatives:
  - in your bedchamber
  - in the chamber of your bed
  lexicon: HALOT
  rationale: The phrase literally denotes the room of one's bed. 'Bedroom' is the
    most natural modern equivalent; 'bedchamber' is accurate but archaic.
