theological_decisions:
- issue: Identity of the larger force 'with us'
  chosen_reading: Kept implicit as in the Hebrew, without specifying angels or divine
    hosts in the main text.
  alternative_readings:
  - Understood contextually as the heavenly army later revealed in the narrative
  rationale: The verse itself does not name the unseen force, though the surrounding
    context clarifies it. To avoid importing explanatory material into the translation,
    the main text preserves the Hebrew's restraint.
  doctrine_reference: Translation philosophy §1, §3
