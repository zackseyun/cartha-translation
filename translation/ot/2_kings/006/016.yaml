id: 2KI.6.16
reference: 2 Kings 6:16
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר אַל תִּירָ֑א כִּ֤י רַבִּים֙ אֲשֶׁ֣ר אִתָּ֔/נוּ מֵ/אֲשֶׁ֖ר אוֹתָֽ/ם־׃
translation:
  text: He said, “Do not be afraid, for those who are with us are more than those
    who are with them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “for many are those who are with us, more than those
      who are with them.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: He said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive preterite normally advances the narrative with 'and
    he said,' but in smooth modern English the conjunction may be omitted without
    loss of meaning. 'He said' preserves the verbal sense and narrative function.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: אַל with the following jussive/imperfect expresses prohibition. 'Do not'
    is the standard concise English equivalent.
- source_word: תִּירָא
  chosen: be afraid
  alternatives:
  - fear
  lexicon: HALOT
  rationale: From ירא, here a 2ms verb in prohibitive construction. 'Be afraid' is
    idiomatic modern English and conveys the emotional force better than the more
    formal 'fear'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the prohibition. 'For' fits the explanatory
    sense in direct speech and reads naturally in English.
- source_word: רַבִּים
  chosen: are more
  alternatives:
  - are many
  - are numerous
  lexicon: HALOT
  rationale: The adjective 'many' is used comparatively in the construction with מִן/מֵאֲשֶׁר
    ('more than'). Rendering it as 'are more' makes the comparison explicit in natural
    English.
- source_word: אֲשֶׁר אִתָּנוּ
  chosen: those who are with us
  alternatives:
  - those with us
  - the ones who are with us
  lexicon: HALOT
  rationale: 'The relative particle plus prepositional phrase functions substantivally:
    ''those who are with us.'' This preserves the Hebrew structure while remaining
    readable.'
- source_word: מֵאֲשֶׁר
  chosen: than those who are
  alternatives:
  - more than
  - than
  lexicon: HALOT
  rationale: This comparative use of מן attached to אֲשֶׁר introduces the standard
    of comparison. In English, the full sense is best represented by 'than those who
    are' when carried into the next phrase.
- source_word: אוֹתָם
  chosen: with them
  alternatives:
  - them
  lexicon: HALOT
  rationale: Although אוֹתָם by itself is the object pronoun 'them,' the elliptical
    comparison in context contrasts 'those with us' and 'those with them.' Supplying
    'with' in English makes the implied parallelism explicit and avoids an awkward
    literal rendering such as 'more than them.'
