id: 2KI.6.19
reference: 2 Kings 6:19
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵ/הֶ֜ם אֱלִישָׁ֗ע לֹ֣א זֶ֣ה הַ/דֶּרֶךְ֮ וְ/לֹ֣א זֹ֣ה הָ/עִיר֒
    לְכ֣וּ אַחֲרַ֔/י וְ/אוֹלִ֣יכָה אֶתְ/כֶ֔ם אֶל הָ/אִ֖ישׁ אֲשֶׁ֣ר תְּבַקֵּשׁ֑וּ/ן
    וַ/יֹּ֥לֶךְ אוֹתָ֖/ם שֹׁמְרֽוֹנָ/ה־׃
translation:
  text: And Elisha said to them, “This is not the way, and this is not the city. Follow
    me, and I will lead you to the man whom you are seeking.” And he led them to Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'go after me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדֶּרֶךְ
  chosen: the way
  alternatives:
  - the road
  - the path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes a road, way, or path. 'The way' is natural English
    and preserves the definite, situational sense in Elisha's statement without over-specifying
    a physical road.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: עִיר is the standard term for a city. 'The city' preserves the definite
    article and the immediate deictic contrast ('this is not...').
- source_word: לְכוּ אַחֲרַי
  chosen: Follow me
  alternatives:
  - Go after me
  - Come after me
  lexicon: HALOT
  rationale: Literally 'go after me.' In idiomatic English, 'Follow me' best captures
    the imperative force and movement implied by the Hebrew.
- source_word: וְאוֹלִיכָה אֶתְכֶם
  chosen: and I will lead you
  alternatives:
  - and let me lead you
  - and I will bring you
  lexicon: HALOT
  rationale: The Hiphil of הלך here is causative, 'cause to go/lead.' 'I will lead
    you' is the clearest natural rendering in context.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the האיש
  - the person
  lexicon: HALOT
  rationale: אִישׁ ordinarily means 'man.' Here Elisha refers to himself indirectly.
    'The man' preserves the Hebrew wording and the narrative irony; 'person' would
    flatten the masculine singular reference.
- source_word: אֲשֶׁר תְּבַקֵּשׁוּן
  chosen: whom you are seeking
  alternatives:
  - whom you seek
  - for whom you are looking
  lexicon: HALOT
  rationale: בקשׁ means 'seek.' The participial-like English progressive fits the
    immediate action of the search party. 'Whom' reflects the personal object.
- source_word: וַיֹּלֶךְ אֹתָם
  chosen: And he led them
  alternatives:
  - And he brought them
  - And he guided them
  lexicon: HALOT
  rationale: The same causative verb from הלך is used narratively. 'Led' maintains
    lexical consistency with the prior clause and suits the context of guiding the
    blinded Arameans.
- source_word: שֹׁמְרֹנָה
  chosen: to Samaria
  alternatives:
  - Samariaward
  lexicon: HALOT
  rationale: The directional he indicates motion toward Samaria. Standard English
    expresses this as 'to Samaria.'
