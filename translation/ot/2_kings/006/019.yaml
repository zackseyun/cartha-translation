theological_decisions:
- issue: Elisha's deceptive statement to the Arameans
  chosen_reading: 'Render the statement straightforwardly without softening or moralizing:
    ''This is not the way, and this is not the city.'''
  alternative_readings:
  - Paraphrastic renderings that imply partial truth or explicit deception
  rationale: The verse presents Elisha's words as spoken within the narrative after
    the enemy force has been struck with blindness/confusion. The translation should
    preserve the plain wording and leave ethical/theological evaluation to interpretation
    rather than importing it into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
