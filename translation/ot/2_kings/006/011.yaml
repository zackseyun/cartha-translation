id: 2KI.6.11
reference: 2 Kings 6:11
source:
  edition: WLC
  text: וַ/יִּסָּעֵר֙ לֵ֣ב מֶֽלֶךְ אֲרָ֔ם עַל הַ/דָּבָ֖ר הַ/זֶּ֑ה וַ/יִּקְרָ֤א אֶל
    עֲבָדָי/ו֙ וַ/יֹּ֣אמֶר אֲלֵי/הֶ֔ם הֲ/לוֹא֙ תַּגִּ֣ידוּ לִ֔/י מִ֥י מִ/שֶּׁ/לָּ֖/נוּ
    אֶל מֶ֥לֶךְ יִשְׂרָאֵֽל־־־־׃
translation:
  text: The heart of the king of Aram was greatly troubled over this matter, and he
    called his servants and said to them, “Will you not tell me who among us is for
    the king of Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “is on the side of the king of Israel.” The Hebrew expression is terse
      and implies allegiance or collusion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּעֵר
  chosen: was greatly troubled
  alternatives:
  - was stirred up
  - was enraged
  - was agitated
  lexicon: HALOT
  rationale: The verb conveys inner turmoil or violent agitation. In context the king
    is disturbed and upset by repeated intelligence leaks. 'Was greatly troubled'
    captures the emotional disturbance in natural English without overcommitting to
    anger alone, though 'enraged' is a plausible contextual nuance.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes the inner self, including thought and
    emotion. Retaining 'heart' preserves the Hebrew idiom while remaining clear in
    English.
- source_word: עַל הַדָּבָר הַזֶּה
  chosen: over this matter
  alternatives:
  - because of this thing
  - about this matter
  lexicon: HALOT
  rationale: '''Matter'' is idiomatic English for דָּבָר in this context of a troubling
    situation or affair, more natural than the overly literal ''thing.'''
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his attendants
  lexicon: HALOT
  rationale: In a royal court context, עֶבֶד often refers to royal servants or officers.
    'Servants' preserves the lexical link without implying only domestic attendants;
    'officials' is possible but somewhat interpretive.
- source_word: הֲלוֹא תַּגִּידוּ לִי
  chosen: Will you not tell me
  alternatives:
  - Will you not declare to me
  - Surely you must tell me
  lexicon: HALOT
  rationale: The interrogative particle with negation introduces an urgent rhetorical
    question. 'Will you not tell me' reflects both the form and the king's demand
    in readable English.
- source_word: מִי מִשֶּׁלָּנוּ
  chosen: who among us
  alternatives:
  - which one of ours
  - who from our side
  lexicon: HALOT
  rationale: The phrase asks for the identity of an insider within the Aramean camp.
    'Who among us' is concise and idiomatic.
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  chosen: is for the king of Israel
  alternatives:
  - belongs to the king of Israel
  - is on the side of the king of Israel
  lexicon: HALOT
  rationale: With the implied sense of allegiance or collusion, 'is for the king of
    Israel' communicates suspected loyalty to Israel. A more literal 'to the king
    of Israel' is less clear in English, while 'on the side of' is slightly more expansive.
