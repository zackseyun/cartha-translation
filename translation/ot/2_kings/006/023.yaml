id: 2KI.6.23
reference: 2 Kings 6:23
source:
  edition: WLC
  text: וַ/יִּכְרֶ֨ה לָ/הֶ֜ם כֵּרָ֣ה גְדוֹלָ֗ה וַ/יֹּֽאכְלוּ֙ וַ/יִּשְׁתּ֔וּ וַֽ/יְשַׁלְּחֵ֔/ם
    וַ/יֵּלְכ֖וּ אֶל אֲדֹֽנֵי/הֶ֑ם וְ/לֹֽא יָ֤סְפוּ עוֹד֙ גְּדוּדֵ֣י אֲרָ֔ם לָ/ב֖וֹא
    בְּ/אֶ֥רֶץ יִשְׂרָאֵֽל־־׃פ
translation:
  text: So he prepared a great feast for them, and they ate and drank. Then he sent
    them away, and they went to their master. And the raiding bands of Aram did not
    come again into the land of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great banquet.' The Hebrew idiom uses a verb-noun pairing for preparing
      a substantial meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'to their lord.' The expression likely refers to the king of Aram.
    reason: lexical_alternative
  - marker: c
    text: '''Aram'' is the Hebrew name often rendered ''Syria'' in older English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֶה ... כֵּרָה גְדוֹלָה
  chosen: he prepared a great feast
  alternatives:
  - he made a great banquet
  - he set a great meal before them
  lexicon: HALOT
  rationale: The verb כרה with the cognate noun כֵּרָה forms an idiomatic expression
    for preparing a meal/feast. 'Prepared a great feast' captures the idiom in natural
    English while preserving the emphasis of גְדוֹלָה.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for those men
  lexicon: HALOT
  rationale: The pronominal object refers to the captured Arameans; simple 'for them'
    is sufficient and natural.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  chosen: they ate and drank
  alternatives:
  - they ate and they drank
  lexicon: HALOT
  rationale: A straightforward rendering of the paired verbs; English naturally omits
    repetition of the subject.
- source_word: וַיְשַׁלְּחֵם
  chosen: he sent them away
  alternatives:
  - he let them go
  - he dismissed them
  lexicon: HALOT
  rationale: '''Sent them away'' preserves the causative sense of שׁלח and fits the
    narrative context of release.'
- source_word: אֶל אֲדֹנֵיהֶם
  chosen: to their master
  alternatives:
  - to their lord
  - to their master(s)
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֲדֹנֵי here likely functions
    as a singular of rank referring to the king of Aram, as reflected by the narrative
    context. 'Master' avoids importing covenantal overtones that 'lord' might suggest
    here.
- source_word: וְלֹא יָסְפוּ עוֹד
  chosen: did not come again
  alternatives:
  - did not continue any longer
  - did not add again
  lexicon: HALOT
  rationale: The idiom with יסף plus עוד expresses cessation/repetition no longer
    occurring. Because it governs the infinitive 'to come,' English is best rendered
    as 'did not come again.'
- source_word: גְּדוּדֵי אֲרָם
  chosen: the raiding bands of Aram
  alternatives:
  - the marauding bands of Aram
  - the troops of Aram
  - the bands of Syria
  lexicon: HALOT
  rationale: גְּדוּד commonly denotes raiding parties rather than a formal army. 'Aram'
    is preferred over 'Syria' in keeping with original-language primacy and standard
    transliteration of names.
- source_word: לָבוֹא בְּאֶרֶץ יִשְׂרָאֵל
  chosen: into the land of Israel
  alternatives:
  - into Israel
  - in the land of Israel
  lexicon: HALOT
  rationale: With בוא plus ב, the sense is movement into a territory. 'Into the land
    of Israel' preserves both the motion and the territorial expression אֶרֶץ יִשְׂרָאֵל.
