  from: sent word to the place
  to: sent [men] to the place
  rationale: The phrase 'sent word to the place' is unidiomatic and misrepresents the likely action. In English, one sends 'word' to a person, but sends people or things 'to a place.' The military context implies the king dispatched personnel (scouts, soldiers). The lexical decision note reveals a misunderstanding, stating that 'sent word' conveys sending 'agents,' which it does not. A rendering like 'sent [men] to the place' accurately reflects the implied action and is common practice for supplying an obvious object in an optimal-equivalence translation.
