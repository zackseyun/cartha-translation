id: 2KI.6.10
reference: 2 Kings 6:10
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח מֶ֣לֶךְ יִשְׂרָאֵ֗ל אֶֽל הַ/מָּק֞וֹם אֲשֶׁ֨ר אָֽמַר ל֧/וֹ אִישׁ הָ/אֱלֹהִ֛ים ו/הזהיר/ה וְ/נִשְׁמַ֣ר שָׁ֑ם לֹ֥א אַחַ֖ת וְ/לֹ֥א שְׁתָּֽיִם־־־׃
translation:
  text: So the king of Israel sent [men] to the place about which the man of God had spoken to him and warned him, and he kept himself on guard there—not once or twice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'sent to the place'; the Hebrew verb is simply 'sent,' and the exact object is implicit in context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was on his guard there.' The Hebrew may emphasize either the king's guardedness or his taking precautions at that place.
    reason: lexical_alternative
  - marker: c
    text: Or 'sent word to the place'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb is literally 'sent,' but in context the object is the king's action directed 'to the place' in response to Elisha's warning. English idiom is clarified with 'sent word,' conveying that he sent instructions or agents regarding that location rather than physically sending the place itself.
- source_word: הַמָּקוֹם
  chosen: the place
  alternatives:
  - that place
  - the location
  lexicon: HALOT
  rationale: A straightforward rendering of מקום. 'The place' preserves the definite article and the narrative specificity.
- source_word: אֲשֶׁר אָמַר לוֹ
  chosen: about which ... had spoken to him
  alternatives:
  - which ... told him about
  - which ... mentioned to him
  lexicon: HALOT
  rationale: The clause links the place with the prophet's prior communication. 'About which ... had spoken to him' is natural English and preserves the relative construction and prior action.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet of God
  lexicon: HALOT
  rationale: This is a standard Hebrew title for a prophet. 'The man of God' preserves the source expression rather than interpreting it more narrowly as 'prophet.'
- source_word: וְהִזְהִירֹה
  chosen: and warned him
  alternatives:
  - and cautioned him
  - and forewarned him
  lexicon: HALOT
  rationale: The Hiphil of זהר here means to warn or caution. The pronominal suffix is best taken as referring to the king. 'Warned him' is the clearest modern English equivalent.
- source_word: וְנִשְׁמַר
  chosen: and he kept himself on guard
  alternatives:
  - and he was on his guard
  - and he guarded himself
  - and he took precautions
  lexicon: HALOT
  rationale: 'The Niphal of שמר here is reflexive/passive in sense: the king took care or guarded himself. ''Kept himself on guard'' preserves the reflexive nuance while remaining readable.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple adverbial rendering. 'There' naturally refers back to the warned-about location.
- source_word: לֹא אַחַת וְלֹא שְׁתָּיִם
  chosen: not once or twice
  alternatives:
  - more than once or twice
  - again and again
  lexicon: HALOT
  rationale: This Hebrew idiom means the event happened repeatedly, not merely one or two times. 'Not once or twice' is the standard concise English equivalent and preserves the idiomatic force without over-paraphrasing.
