id: 2KI.6.29
reference: 2 Kings 6:29
source:
  edition: WLC
  text: וַ/נְּבַשֵּׁ֥ל אֶת בְּנִ֖/י וַ/נֹּֽאכְלֵ֑/הוּ וָ/אֹמַ֨ר אֵלֶ֜י/הָ בַּ/יּ֣וֹם
    הָ/אַחֵ֗ר תְּנִ֤י אֶת בְּנֵ/ךְ֙ וְ/נֹ֣אכְלֶ֔/נּוּ וַ/תַּחְבִּ֖א אֶת בְּנָֽ/הּ־־־׃
translation:
  text: So we boiled my son and ate him. Then I said to her on the next day, ‘Give
    your son, so that we may eat him,’ but she hid her son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we cooked my son and ate him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and we will eat him'; the Hebrew form may be taken more simply as a
      future, though the context supports a purpose/result sense after 'Give your
      son.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנְּבַשֵּׁל
  chosen: we boiled
  alternatives:
  - we cooked
  lexicon: HALOT
  rationale: The verb בשׁל in this context specifically denotes boiling/cooking. 'Boiled'
    is the more concrete and shocking rendering, matching the plain sense and the
    horror of the siege account better than the broader 'cooked.'
- source_word: בְּנִי
  chosen: my son
  alternatives:
  - my child
  lexicon: HALOT
  rationale: בן here is literally 'son,' not the more general 'child.' Gender-accurate
    translation is required, and the possessive suffix makes the maternal claim explicit.
- source_word: וַנֹּאכְלֵהוּ
  chosen: and ate him
  alternatives:
  - and we ate him
  - and consumed him
  lexicon: HALOT
  rationale: The verb אכל simply means 'eat.' English can omit the repeated subject
    naturally after 'we boiled,' but the object suffix 'him' should be retained because
    it is explicit in Hebrew and heightens the brutality of the statement.
- source_word: וָאֹמַר אֵלֶיהָ
  chosen: Then I said to her
  alternatives:
  - And I said to her
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    sequence while preserving the progression of events.
- source_word: בַּיּוֹם הָאַחֵר
  chosen: on the next day
  alternatives:
  - the following day
  - on the other day
  lexicon: HALOT
  rationale: This idiom refers to the day after the first event. 'On the next day'
    is idiomatic modern English and preserves the temporal sequence.
- source_word: תְּנִי
  chosen: Give
  alternatives:
  - hand over
  - bring
  lexicon: HALOT
  rationale: נתן in the imperative is straightforwardly 'give.' 'Hand over' is possible
    but slightly interpretive; 'give' best matches the directness of the Hebrew.
- source_word: בְּנֵךְ
  chosen: your son
  alternatives:
  - your child
  lexicon: HALOT
  rationale: As with בְּנִי, the noun is specifically 'son' with a 2fs suffix. The
    translation should preserve the literal kinship term.
- source_word: וְנֹאכְלֶנּוּ
  chosen: so that we may eat him
  alternatives:
  - and we will eat him
  - that we may eat him
  lexicon: HALOT
  rationale: The form is an imperfect with prefixed conjunction following the imperative,
    expressing intended result/purpose. 'So that we may eat him' captures the sense
    more clearly in English than a simple future.
- source_word: וַתַּחְבִּא
  chosen: but she hid
  alternatives:
  - and she hid
  lexicon: HALOT
  rationale: 'The Hebrew waw can be rendered simply ''and,'' but in context the action
    is adversative: instead of complying, she concealed her son. ''But'' makes the
    contrast explicit without adding new content.'
- source_word: בְּנָהּ
  chosen: her son
  alternatives:
  - her child
  lexicon: HALOT
  rationale: בן with 3fs suffix is literally 'her son.' The concrete familial term
    should be preserved.
