id: 2KI.6.14
reference: 2 Kings 6:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַח שָׁ֛מָּ/ה סוּסִ֥ים וְ/רֶ֖כֶב וְ/חַ֣יִל כָּבֵ֑ד וַ/יָּבֹ֣אוּ לַ֔יְלָה
    וַ/יַּקִּ֖פוּ עַל הָ/עִֽיר־־׃
translation:
  text: So he sent horses and chariots there, and a large army; they came by night
    and surrounded the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great force.' The Hebrew expression is literally 'a heavy force,'
      an idiom for a substantial military contingent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol of שׁלח, narrating the king of Aram's action in sequence.
    'Sent' is the plain sense and reads naturally in English.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: Directional adverb indicating destination. 'There' is concise and idiomatic;
    the destination is supplied by context from the previous verse.
- source_word: סוּסִים
  chosen: horses
  alternatives:
  - horsemen
  lexicon: HALOT
  rationale: The noun is literally 'horses.' Although military context may imply mounted
    forces, the text itself names horses, so the more direct rendering is preferred.
- source_word: וְרֶכֶב
  chosen: and chariots
  alternatives:
  - and chariotry
  lexicon: HALOT
  rationale: רֶכֶב can denote chariot(s) or chariot force. Here, alongside 'horses'
    and 'army,' 'chariots' preserves the concrete military imagery without overtechnical
    wording.
- source_word: וְחַיִל כָּבֵד
  chosen: and a large army
  alternatives:
  - and a great force
  - and a heavy force
  lexicon: HALOT
  rationale: חַיִל in military context denotes force/army; כָּבֵד literally 'heavy'
    idiomatically means substantial or numerous. 'Large army' communicates the idiomatic
    sense in clear modern English.
- source_word: וַיָּבֹאוּ לַיְלָה
  chosen: they came by night
  alternatives:
  - they came at night
  - they arrived in the night
  lexicon: HALOT
  rationale: The phrase indicates nighttime arrival. 'By night' is natural English
    and preserves the narrative stealth implied by the timing.
- source_word: וַיַּקִּפוּ עַל הָעִיר
  chosen: and surrounded the city
  alternatives:
  - and encircled the city
  lexicon: HALOT
  rationale: The verb conveys surrounding or going around. 'Surrounded the city' is
    the clearest idiomatic military rendering in English.
