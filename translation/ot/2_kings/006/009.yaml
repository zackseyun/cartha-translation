id: 2KI.6.9
reference: 2 Kings 6:9
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח אִ֣ישׁ הָ/אֱלֹהִ֗ים אֶל מֶ֤לֶךְ יִשְׂרָאֵל֙ לֵ/אמֹ֔ר הִשָּׁ֕מֶר
    מֵ/עֲבֹ֖ר הַ/מָּק֣וֹם הַ/זֶּ֑ה כִּֽי שָׁ֖ם אֲרָ֥ם נְחִתִּֽים־־׃
translation:
  text: Then the man of God sent word to the king of Israel, saying, “Be careful not
    to pass by this place, because the Arameans are coming down there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Arameans are descending there.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb is literally 'sent,' but in English the object of the sending
    is implicit; the context shows Elisha is sending a message to the king. 'Sent
    word' makes the idiom natural without adding more than the Hebrew warrants.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - the prophet
  - the man of the true God
  lexicon: HALOT
  rationale: This is the standard Hebrew title and should be preserved rather than
    interpreted as 'the prophet.' It refers here to Elisha, but the title itself is
    what the text uses.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Straightforward formal rendering of the royal title and national name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing direct speech.
- source_word: הִשָּׁמֶר
  chosen: Be careful
  alternatives:
  - Take care
  - Beware
  - Guard yourself
  lexicon: HALOT
  rationale: The Niphal imperative of שמר here functions as a warning. 'Be careful'
    is natural modern English and preserves the cautionary force.
- source_word: מֵעֲבֹר
  chosen: not to pass by
  alternatives:
  - from passing over
  - from passing through
  lexicon: HALOT
  rationale: With הִשָּׁמֶר and the preposition מִן, the sense is to beware of going
    through or past the location. 'Pass by' fits the immediate military-travel context
    well.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - that place
  - this location
  lexicon: HALOT
  rationale: Direct rendering of the demonstrative phrase.
- source_word: כִּי שָׁם
  chosen: because ... there
  alternatives:
  - for there
  - since there
  lexicon: HALOT
  rationale: כִּי gives the reason for the warning, and שָׁם locates the Aramean movement.
    English idiom is smoother if the causal conjunction is rendered 'because.'
- source_word: אֲרָם
  chosen: the Arameans
  alternatives:
  - Aram
  - the Syrians
  lexicon: HALOT
  rationale: Although the Hebrew is the place/people name Aram, in this military context
    it refers to the people/army. 'The Arameans' is more precise to the Hebrew than
    the traditional but anachronistic 'the Syrians.'
- source_word: נְחִתִּים
  chosen: are coming down
  alternatives:
  - are descending
  - are going down
  - have come down
  lexicon: HALOT
  rationale: The participle from נחת denotes descending/going down. In context it
    likely describes the enemy movement into position. 'Are coming down' gives a natural
    English progressive sense appropriate to an imminent warning.
