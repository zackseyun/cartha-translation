id: 2KI.6.2
reference: 2 Kings 6:2
source:
  edition: WLC
  text: נֵֽלְכָה נָּ֣א עַד הַ/יַּרְדֵּ֗ן וְ/נִקְחָ֤ה מִ/שָּׁם֙ אִ֚ישׁ קוֹרָ֣ה אֶחָ֔ת
    וְ/נַעֲשֶׂה לָּ֥/נוּ שָׁ֛ם מָק֖וֹם לָ/שֶׁ֣בֶת שָׁ֑ם וַ/יֹּ֖אמֶר לֵֽכוּ־־־׃
translation:
  text: Please let us go to the Jordan, and let each man take from there one beam,
    and let us make a place for ourselves there to live there." And he said, "Go."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Come, let us go to the Jordan.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man one beam,' that is, each person would take a single timber.
    reason: lexical_alternative
  - marker: c
    text: Or 'to dwell there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵלְכָה נָּא
  chosen: Please let us go
  alternatives:
  - Let us go, please
  - Come, let us go
  lexicon: HALOT
  rationale: Cohortative first person plural with particle נָא expresses a polite
    request or appeal. 'Please let us go' captures both the volitional force and the
    politeness in natural English.
- source_word: עַד הַיַּרְדֵּן
  chosen: to the Jordan
  alternatives:
  - as far as the Jordan
  - to the Jordan River
  lexicon: HALOT
  rationale: עַד can mean 'as far as/to.' In this travel context, 'to the Jordan'
    is idiomatic and sufficient. 'Jordan' refers to the river, but English commonly
    omits 'River' unless needed for clarity.
- source_word: וְנִקְחָה מִשָּׁם
  chosen: and let ... take from there
  alternatives:
  - and let us take from there
  lexicon: HALOT
  rationale: The 1cp cohortative is followed by אִישׁ קוֹרָה אֶחָת, which distributively
    specifies each individual's action. English expresses this more clearly by shifting
    to 'let each man take from there' rather than a strictly literal 'let us take.'
- source_word: אִישׁ קוֹרָה אֶחָת
  chosen: each man ... one beam
  alternatives:
  - each one ... one log
  - a man one beam
  lexicon: HALOT
  rationale: 'אִישׁ with singular noun and numeral has a distributive sense: each
    person takes one item. קוֹרָה denotes a beam or timber used in construction; ''beam''
    fits the building context better than ''log.'' ''Man'' preserves the gender-accurate
    singular form while functioning representatively for the group.'
- source_word: וְנַעֲשֶׂה לָּנוּ שָׁם מָקוֹם
  chosen: and let us make a place for ourselves there
  alternatives:
  - and let us make ourselves a place there
  - and let us build a place for ourselves there
  lexicon: HALOT
  rationale: עשה is broad ('make/do'). 'Make a place for ourselves' is a natural rendering
    that does not over-specify construction beyond the Hebrew. The reflexive benefit
    is conveyed by 'for ourselves.'
- source_word: לָשֶׁבֶת שָׁם
  chosen: to live there
  alternatives:
  - to dwell there
  - to sit there
  lexicon: HALOT
  rationale: ישב commonly means 'dwell/live' in settlement contexts. 'To live there'
    is readable modern English; 'sit' would be overly literal and misleading.
- source_word: וַיֹּאמֶר לֵכוּ
  chosen: And he said, "Go."
  alternatives:
  - And he said, "Go ahead."
  lexicon: HALOT
  rationale: A simple narrative response granting permission. 'Go' is the most direct
    equivalent and preserves the brevity of the Hebrew.
