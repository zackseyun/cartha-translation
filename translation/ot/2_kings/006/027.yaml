id: 2KI.6.27
reference: 2 Kings 6:27
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ אַל יוֹשִׁעֵ֣/ךְ יְהוָ֔ה מֵ/אַ֖יִן אֽוֹשִׁיעֵ֑/ךְ הֲ/מִן הַ/גֹּ֖רֶן א֥וֹ מִן הַ/יָּֽקֶב־־־׃
translation:
  text: And he said, “If Yahweh does not help you, from where can I help you? From the threshing floor, or from the winepress?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If the LORD does not save you, from where can I save you?” The Hebrew verb in both clauses can mean help, save, or deliver.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: If ... does not
  alternatives:
  - No/not
  lexicon: HALOT
  rationale: 'Although אַל is often a negative particle used in prohibitions, in this idiom with the following verb it is best taken as introducing a conditional or rhetorical premise: ''If the LORD does not help/save you...'' This fits the king''s despairing response and the following question, ''from where can I help you?'''
- source_word: יוֹשִׁעֵךְ / אֹשִׁיעֵךְ
  chosen: help you / help you
  alternatives:
  - save you
  - deliver you
  lexicon: HALOT
  rationale: The verb ישׁע commonly means 'save, deliver, help.' In this famine context, the issue is practical relief rather than explicit spiritual salvation, so 'help' is the most natural English in both clauses while preserving the parallelism. 'Save' would also be possible but can sound overly theological in English here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵאַיִן
  chosen: from where
  alternatives:
  - whence
  - from what source
  lexicon: HALOT
  rationale: This interrogative asks about source or origin. 'From where' is clear modern English and preserves the rhetorical force.
- source_word: הֲמִן הַגֹּרֶן
  chosen: From the threshing floor
  alternatives:
  - Is it from the threshing floor?
  lexicon: HALOT
  rationale: The prefixed interrogative הֲ can be carried by English intonation and punctuation rather than a separate particle. 'Threshing floor' is the literal and contextually appropriate rendering, referring to the place from which grain would come.
- source_word: הַיָּקֶב
  chosen: the winepress
  alternatives:
  - the vat
  - the press
  lexicon: HALOT
  rationale: יֶקֶב denotes a winepress or wine vat. 'Winepress' is the standard, concrete rendering and pairs naturally with 'threshing floor' as sources of food supply.
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he said' is a straightforward rendering; 'Then he said' would also be acceptable, but 'And' better preserves Hebrew narrative flow.
