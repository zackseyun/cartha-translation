id: 2KI.6.24
reference: 2 Kings 6:24
source:
  edition: WLC
  text: וַֽ/יְהִי֙ אַחֲרֵי כֵ֔ן וַ/יִּקְבֹּ֛ץ בֶּן הֲדַ֥ד מֶֽלֶךְ אֲרָ֖ם אֶת כָּל
    מַחֲנֵ֑/הוּ וַ/יַּ֕עַל וַ/יָּ֖צַר עַל שֹׁמְרֽוֹן־־־־־־׃
translation:
  text: And it happened after this that Ben-hadad king of Aram gathered all his army,
    and he went up and besieged Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all his forces"; Hebrew "all his camp/army."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "king of Aram"; traditionally "king of Syria."
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  chosen: And it happened after this
  alternatives:
  - After this it happened
  - Now it happened after this
  - Sometime later
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a subsequent event. 'And it happened
    after this' preserves the sequential, narrative feel without excessive archaism.
    'Sometime later' is smoother but more dynamic than warranted.
- source_word: וַיִּקְבֹּץ
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: HALOT
  rationale: The verb means to gather or assemble. 'Gathered' is the most direct rendering;
    'mustered' could suggest a more technical military nuance than the Hebrew explicitly
    requires, though the context is military.
- source_word: בֶּן הֲדַד
  chosen: Ben-hadad
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: מֶלֶךְ אֲרָם
  chosen: king of Aram
  alternatives:
  - king of Syria
  lexicon: HALOT
  rationale: The Hebrew place name is Aram, so the translation follows original-language
    primacy rather than the traditional but interpretive 'Syria.'
- source_word: כָּל מַחֲנֵהוּ
  chosen: all his army
  alternatives:
  - all his camp
  - all his forces
  lexicon: HALOT
  rationale: מַחֲנֶה literally denotes camp, encampment, or army. In this military
    context, 'all his army' communicates the referent clearly in natural English.
    'Camp' is more formal-literal but less idiomatic here.
- source_word: וַיַּעַל
  chosen: he went up
  alternatives:
  - he marched up
  - he came up
  lexicon: HALOT
  rationale: The common Hebrew idiom for military movement toward a place, often with
    topographical or strategic sense. 'Went up' preserves the source wording; 'marched
    up' would make the military nuance more explicit but adds specificity.
- source_word: וַיָּצַר עַל
  chosen: besieged
  alternatives:
  - laid siege to
  lexicon: HALOT
  rationale: The verb with עַל denotes laying siege against a city. 'Besieged' is
    concise, accurate, and natural English; 'laid siege to' is equally valid but slightly
    more expanded.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  rationale: Standard English transliteration of the place name.
