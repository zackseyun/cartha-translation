id: 2KI.6.5
reference: 2 Kings 6:5
source:
  edition: WLC
  text: וַ/יְהִ֤י הָֽ/אֶחָד֙ מַפִּ֣יל הַ/קּוֹרָ֔ה וְ/אֶת הַ/בַּרְזֶ֖ל נָפַ֣ל אֶל הַ/מָּ֑יִם
    וַ/יִּצְעַ֥ק וַ/יֹּ֛אמֶר אֲהָ֥הּ אֲדֹנִ֖/י וְ/ה֥וּא שָׁאֽוּל־־׃
translation:
  text: But as one was felling a beam, the iron axe head fell into the water, and
    he cried out and said, “Alas, my master! It was borrowed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the iron fell into the water.' The phrase refers to the
      iron part of the tool, that is, the axe head.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַפִּיל
  chosen: was felling
  alternatives:
  - was causing to fall
  - was cutting down
  lexicon: HALOT
  rationale: Hiphil participle of נפל here idiomatically refers to causing the tree/beam
    to fall in the act of chopping. 'Was felling' is natural English and fits the
    woodcutting context better than a woodenly literal 'causing to fall.'
- source_word: הַקּוֹרָה
  chosen: a beam
  alternatives:
  - the beam
  - the log
  - the timber
  lexicon: HALOT
  rationale: קוֹרָה commonly denotes a beam or timber. In this context of cutting
    wood for building, 'beam' preserves the likely intended result/object. English
    uses the indefinite article naturally after 'one was felling,' even though Hebrew
    has the article.
- source_word: הַבַּרְזֶל
  chosen: the iron axe head
  alternatives:
  - the iron
  - the iron tool head
  - the axe head
  lexicon: HALOT
  rationale: Literally 'the iron' fell into the water, but in context this refers
    metonymically to the iron part of the tool, i.e., the axe head. Supplying 'axe
    head' makes the sense explicit in idiomatic English without adding unwarranted
    detail beyond the narrative context.
- source_word: וַיִּצְעַק
  chosen: he cried out
  alternatives:
  - he shouted
  - he cried
  lexicon: HALOT
  rationale: Conveys a sudden distressed exclamation appropriate to the loss of the
    borrowed tool.
- source_word: אֲהָהּ
  chosen: Alas
  alternatives:
  - Oh no
  - Ah
  lexicon: HALOT
  rationale: An interjection of distress or dismay. 'Alas' preserves the gravity and
    lament-like tone better than colloquial 'Oh no.'
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  - sir
  lexicon: HALOT
  rationale: Addressed to Elisha as a superior. 'My master' fits the disciple-teacher
    relationship in context better than 'my lord,' which could sound overly exalted
    in English, or 'sir,' which is too weak.
- source_word: שָׁאוּל
  chosen: borrowed
  alternatives:
  - asked for
  - lent
  lexicon: HALOT
  rationale: Passive/adj-like use from שאל in context means the item had been borrowed.
    'It was borrowed' captures the speaker's concern that the lost axe head did not
    belong to him.
