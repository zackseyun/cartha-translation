id: 2KI.24.8
reference: 2 Kings 24:8
source:
  edition: WLC
  text: בֶּן שְׁמֹנֶ֨ה עֶשְׂרֵ֤ה שָׁנָה֙ יְהוֹיָכִ֣ין בְּ/מָלְכ֔/וֹ וּ/שְׁלֹשָׁ֣ה
    חֳדָשִׁ֔ים מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ נְחֻשְׁתָּ֥א בַת אֶלְנָתָ֖ן
    מִ/ירוּשָׁלִָֽם־־׃
translation:
  text: Jehoiachin was eighteen years old when he began to reign, and he reigned three
    months in Jerusalem. His mother’s name was Nehushta daughter of Elnathan, from
    Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “of Jerusalem” at the end, reflecting a more idiomatic genealogical expression;
      the Hebrew more literally says “from Jerusalem.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  chosen: was eighteen years old
  alternatives:
  - was a son of eighteen years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A literal rendering would be awkward
    in English, so the idiomatic equivalent best reflects the sense without loss.
- source_word: בְּמָלְכוֹ
  chosen: when he began to reign
  alternatives:
  - at his becoming king
  - when he became king
  lexicon: HALOT
  rationale: The infinitive/verb construction with prefixed ב marks the time of accession.
    'When he began to reign' is a natural English rendering commonly used for this
    formula.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb means 'to reign, be king.' 'He reigned' preserves the verbal
    force and matches the regnal formula.
- source_word: וּשְׁלֹשָׁה חֳדָשִׁים
  chosen: three months
  alternatives:
  - for three months
  lexicon: HALOT
  rationale: The phrase gives the duration of his reign. English commonly expresses
    this as 'three months'; the duration sense is clear from context.
- source_word: בִּירוּשָׁלָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative preposition with the city name; straightforwardly rendered 'in
    Jerusalem.'
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is a common genealogical formula. The chosen rendering is natural
    modern English while preserving the informational structure.
- source_word: נְחֻשְׁתָּא
  chosen: Nehushta
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בַת אֶלְנָתָן
  chosen: daughter of Elnathan
  alternatives:
  - the daughter of Elnathan
  lexicon: HALOT
  rationale: The construct chain indicates filiation. 'Daughter of Elnathan' is the
    standard and clear rendering.
- source_word: מִירוּשָׁלָם
  chosen: from Jerusalem
  alternatives:
  - of Jerusalem
  lexicon: HALOT
  rationale: The preposition מִן normally indicates source or origin. 'From Jerusalem'
    most directly reflects the Hebrew, though 'of Jerusalem' is possible in English
    genealogical style.
