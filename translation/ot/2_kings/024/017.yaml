id: 2KI.24.17
reference: 2 Kings 24:17
source:
  edition: WLC
  text: וַ/יַּמְלֵ֧ךְ מֶֽלֶךְ בָּבֶ֛ל אֶת מַתַּנְיָ֥ה דֹד֖/וֹ תַּחְתָּ֑י/ו וַ/יַּסֵּ֥ב
    אֶת שְׁמ֖/וֹ צִדְקִיָּֽהוּ־־־׃פ
translation:
  text: And the king of Babylon made Mattaniah, his uncle, king in his place, and
    changed his name to Zedekiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''appointed Mattaniah ... as king.'' The Hebrew verb is causative: the
      Babylonian king installed him as ruler.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְלֵךְ
  chosen: made ... king
  alternatives:
  - caused to reign
  - appointed ... king
  lexicon: HALOT
  rationale: 'Hiphil of מלך here is causative: the Babylonian king installed Mattaniah
    as king rather than merely describing Mattaniah''s own accession. ''Made ... king''
    is natural English and preserves the causative sense.'
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Construct phrase straightforwardly identifies the subject. 'The king
    of Babylon' is the standard clear rendering in English.
- source_word: מַתַּנְיָה
  chosen: Mattaniah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: דֹדוֹ
  chosen: his uncle
  alternatives:
  - his father's brother
  - his relative
  lexicon: HALOT
  rationale: דּוֹד can denote uncle or more broadly beloved/relative depending on
    context. Here the historical relationship is specifically that Mattaniah was Jehoiachin's
    uncle, so 'his uncle' is the most accurate and idiomatic rendering.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - instead of him
  - under him
  lexicon: HALOT
  rationale: In enthronement context, תחת indicates succession/substitution. 'In his
    place' is idiomatic and precise.
- source_word: וַיַּסֵּב
  chosen: changed
  alternatives:
  - turned
  - altered
  lexicon: HALOT
  rationale: The verb סבב literally means turn around, but with 'his name' it idiomatically
    means to change or rename. 'Changed' communicates the sense clearly in modern
    English.
- source_word: שְׁמוֹ
  chosen: his name
  lexicon: HALOT
  rationale: Direct object of the renaming action; retained explicitly in English
    because the Hebrew states it.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  alternatives:
  - Ṣidqiyyahu
  rationale: Personal name transliterated by standard English convention. 'Zedekiah'
    is the established English form and remains a transliteration rather than a translation
    of the name's meaning.
