id: 2KI.24.12
reference: 2 Kings 24:12
source:
  edition: WLC
  text: וַ/יֵּצֵ֞א יְהוֹיָכִ֤ין מֶֽלֶךְ יְהוּדָה֙ עַל מֶ֣לֶךְ בָּבֶ֔ל ה֣וּא וְ/אִמּ֔/וֹ
    וַ/עֲבָדָ֖י/ו וְ/שָׂרָ֣י/ו וְ/סָֽרִיסָ֑י/ו וַ/יִּקַּ֤ח אֹת/וֹ֙ מֶ֣לֶךְ בָּבֶ֔ל
    בִּ/שְׁנַ֥ת שְׁמֹנֶ֖ה לְ/מָלְכֽ/וֹ־־׃
translation:
  text: Then Jehoiachin king of Judah went out to the king of Babylon, he and his
    mother and his servants and his officials and his palace officials; and the king
    of Babylon took him in the eighth year of his reign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his eunuchs'; the Hebrew term can refer either to literal eunuchs or
      more broadly to royal court officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - surrendered
  lexicon: HALOT
  rationale: The verb יצא literally means 'go out/come out.' In this siege context
    it implies presenting himself to the Babylonian king, but 'went out' preserves
    the Hebrew wording without over-interpreting it as 'surrendered.'
- source_word: עַל
  chosen: to
  alternatives:
  - against
  - up to
  - out to
  lexicon: HALOT
  rationale: Although על often means 'upon/against,' with יצא in this context it idiomatically
    indicates movement toward a person. English 'to' gives the sense naturally. The
    fuller nuance of 'went out to' is retained by the whole clause.
- source_word: עַל מֶלֶךְ בָּבֶל
  chosen: to the king of Babylon
  alternatives:
  - out to the king of Babylon
  lexicon: HALOT
  rationale: This prepositional phrase marks the destination of Jehoiachin's movement.
    'To the king of Babylon' is idiomatic English and keeps the relational direction
    clear.
- source_word: הוּא וְאִמּוֹ
  chosen: he and his mother
  lexicon: HALOT
  rationale: The pronoun explicitly resumes the subject and introduces the accompanying
    group. English preserves this with 'he and his mother.'
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his attendants
  - his courtiers
  lexicon: HALOT
  rationale: עבד can mean servant or official depending on context. Here, alongside
    other court personnel, 'servants' is broad and natural, without forcing a more
    technical bureaucratic sense.
- source_word: שָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his commanders
  - his leaders
  lexicon: HALOT
  rationale: שׂרים are high-ranking leaders or officials. 'Officials' fits the royal-court
    setting better than the archaic 'princes' and is broader than strictly military
    'commanders.'
- source_word: סָרִיסָיו
  chosen: his palace officials
  alternatives:
  - his eunuchs
  - his court officials
  lexicon: HALOT
  rationale: סָרִיס can denote either literal eunuchs or, more broadly, royal court
    officers. In many English contexts 'eunuchs' may over-specify if the functional
    court sense is intended. 'Palace officials' preserves the courtly role while a
    footnote records the lexical alternative.
- source_word: וַיִּקַּח אֹתוֹ
  chosen: took him
  alternatives:
  - captured him
  - received him
  lexicon: HALOT
  rationale: לקח is the common verb 'take.' In context it results in Jehoiachin's
    seizure/custody, but 'took him' stays close to the Hebrew and lets the narrative
    context convey the force.
- source_word: בִּשְׁנַת שְׁמֹנֶה לְמָלְכוֹ
  chosen: in the eighth year of his reign
  alternatives:
  - in the eighth year of his kingship
  lexicon: HALOT
  rationale: The suffix on 'his reign' most naturally refers to the king of Babylon,
    the nearest masculine singular subject and the standard chronological reference
    in Kings. 'Reign' is idiomatic English for מלך in this temporal construction.
