theological_decisions:
- issue: Referent of 'his reign' in the closing chronological note
  chosen_reading: the reign of the king of Babylon
  alternative_readings:
  - the reign of Jehoiachin
  rationale: The immediate syntactic antecedent is the king of Babylon, and the historical
    framework of the chapter aligns with dating by Nebuchadnezzar's regnal year here.
    This is a historical-grammatical decision, not a doctrinally loaded one, but it
    affects translation clarity.
