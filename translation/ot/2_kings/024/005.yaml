id: 2KI.24.5
reference: 2 Kings 24:5
source:
  edition: WLC
  text: וְ/יֶ֛תֶר דִּבְרֵ֥י יְהוֹיָקִ֖ים וְ/כָל אֲשֶׁ֣ר עָשָׂ֑ה הֲ/לֹא הֵ֣ם כְּתוּבִ֗ים
    עַל סֵ֛פֶר דִּבְרֵ֥י הַ/יָּמִ֖ים לְ/מַלְכֵ֥י יְהוּדָֽה־־־׃
translation:
  text: Now the rest of the acts of Jehoiakim, and all that he did, are they not written
    in the Book of the Chronicles of the Kings of Judah?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the annals of the kings of Judah.' The Hebrew title refers to a royal
      record source cited throughout Kings, not necessarily the canonical book of
      Chronicles.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  lexicon: HALOT
  rationale: יֶתֶר commonly denotes what remains or is left over. In royal-summary
    formulas, 'the rest of' is idiomatic and natural in English.
- source_word: דִּבְרֵי
  chosen: acts
  alternatives:
  - words
  - matters
  - deeds
  lexicon: HALOT
  rationale: Although דָּבָר literally means 'word' or 'matter,' in the regnal formula
    'the rest of the words/matters of X' it refers broadly to the king's recorded
    deeds or acts. 'Acts' best captures the idiomatic sense in this context.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  chosen: and all that he did
  alternatives:
  - and all that he accomplished
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause, preserving the broad
    scope of the Hebrew without overinterpreting the nature of his actions.
- source_word: הֲלֹא
  chosen: are they not
  alternatives:
  - is it not the case that
  lexicon: HALOT
  rationale: This introduces the standard rhetorical question used in the regnal notices.
    'Are they not' preserves both the interrogative force and the plural agreement
    with the implied records.
- source_word: כְּתוּבִים
  chosen: written
  alternatives:
  - recorded
  lexicon: HALOT
  rationale: The passive participle means 'written.' 'Recorded' is a possible contextual
    gloss, but 'written' stays closer to the Hebrew while remaining clear.
- source_word: עַל סֵפֶר
  chosen: in the Book
  alternatives:
  - on the scroll
  - in the scroll
  lexicon: HALOT
  rationale: Literally 'on the book/scroll,' but in English archival idiom 'written
    in the Book' is the natural equivalent for material contained in a written record.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  chosen: the Book of the Chronicles
  alternatives:
  - the book of the events of the days
  - the annals
  lexicon: HALOT
  rationale: This is the conventional designation for the royal record source cited
    in Kings. 'Chronicles' is the established and accurate rendering of דִּבְרֵי הַיָּמִים
    in this archival sense, though it refers here to a source document, not necessarily
    the canonical book 1–2 Chronicles.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: of the Kings of Judah
  alternatives:
  - belonging to the kings of Judah
  - for the kings of Judah
  lexicon: HALOT
  rationale: 'The לְ here is best rendered in an attributive/genitival sense within
    the title of the source record: the chronicle pertaining to the kings of Judah.'
