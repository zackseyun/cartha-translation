id: 2KI.24.11
reference: 2 Kings 24:11
source:
  edition: WLC
  text: וַ/יָּבֹ֛א נְבוּכַדְנֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל עַל הָ/עִ֑יר וַ/עֲבָדָ֖י/ו צָרִ֥ים
    עָלֶֽי/הָ־־׃
translation:
  text: And Nebuchadnezzar king of Babylon came against the city while his servants
    were besieging it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while his servants were laying siege to it.'
    reason: lexical_alternative
  - marker: b
    text: '''His servants'' can refer to the Babylonian king''s officials, agents,
      or forces in royal service.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - came up
  - arrived
  lexicon: HALOT
  rationale: The wayyiqtol of בוא is the simple narrative verb 'came.' In military
    context 'came against' is supplied with עַל to express hostile movement toward
    the city.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Personal names are transliterated by standard English convention. 'Nebuchadnezzar'
    is the familiar and acceptable transliteration for this Babylonian royal name.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: A straightforward construct chain identifying Nebuchadnezzar's royal
    office and realm.
- source_word: עַל הָעִיר
  chosen: against the city
  alternatives:
  - to the city
  - upon the city
  lexicon: HALOT
  rationale: With a verb of hostile approach in a siege context, עַל is best rendered
    'against' rather than the more neutral 'to' or overly literal 'upon.'
- source_word: וַעֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his troops
  lexicon: HALOT
  rationale: עבדים literally means 'servants.' In a royal context it can denote the
    king's agents or officers, but 'servants' preserves the lexical form without over-specifying
    their role. The military function is clarified by the following participle.
- source_word: צָרִים
  chosen: were besieging
  alternatives:
  - were pressing hard against
  - were laying siege to
  lexicon: HALOT
  rationale: The participle of צור in this context refers to siege activity. 'Were
    besieging' captures the ongoing action concurrent with Nebuchadnezzar's arrival.
- source_word: עָלֶיהָ
  chosen: it
  alternatives:
  - against it
  - upon it
  lexicon: HALOT
  rationale: The pronoun refers back to the feminine noun 'city.' English idiom after
    'besieging' naturally uses the direct object 'it,' though the underlying Hebrew
    repeats the preposition.
