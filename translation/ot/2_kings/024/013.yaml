id: 2KI.24.13
reference: 2 Kings 24:13
source:
  edition: WLC
  text: וַ/יּוֹצֵ֣א מִ/שָּׁ֗ם אֶת כָּל אוֹצְרוֹת֙ בֵּ֣ית יְהוָ֔ה וְ/אֽוֹצְר֖וֹת בֵּ֣ית
    הַ/מֶּ֑לֶךְ וַ/יְקַצֵּ֞ץ אֶת כָּל כְּלֵ֣י הַ/זָּהָ֗ב אֲשֶׁ֨ר עָשָׂ֜ה שְׁלֹמֹ֤ה
    מֶֽלֶךְ יִשְׂרָאֵל֙ בְּ/הֵיכַ֣ל יְהוָ֔ה כַּֽ/אֲשֶׁ֖ר דִּבֶּ֥ר יְהוָֽה־־־־־׃
translation:
  text: And he carried out from there all the treasures of the house of the LORD and
    the treasures of the king’s house, and he cut up all the gold vessels that Solomon
    king of Israel had made in the temple of the LORD, just as the LORD had spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brought out from there' or 'took out from there.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of the LORD' earlier in the verse; here 'temple of the LORD'
      renders a different Hebrew word, often referring more specifically to the temple
      structure or sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא מִשָּׁם
  chosen: he carried out from there
  alternatives:
  - he brought out from there
  - he took out from there
  lexicon: HALOT
  rationale: The hiphil of יצא here is causative, referring to removing items from
    a location. 'Carried out' is natural English for the removal of temple and palace
    treasures, while preserving the concrete sense better than a looser 'took away.'
- source_word: אוֹצְרוֹת
  chosen: treasures
  alternatives:
  - treasuries
  - storehouses
  lexicon: HALOT
  rationale: In this context the word refers to the valuable contents removed, not
    primarily the storage rooms themselves. 'Treasures' best fits the direct object
    of the verb and the narrative context of plunder.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: '''House of the LORD'' is a standard and transparent rendering of the
    Hebrew phrase. Since הֵיכַל appears later in the same verse, varying the English
    there as ''temple'' helps preserve the lexical distinction.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the royal palace
  - the king's palace
  lexicon: HALOT
  rationale: A formally closer rendering is preferred here. 'The king’s house' is
    clear in context and parallels 'the house of the LORD.'
- source_word: וַיְקַצֵּץ
  chosen: he cut up
  alternatives:
  - he cut in pieces
  - he broke up
  lexicon: HALOT
  rationale: The piel of קצץ conveys cutting down or cutting into pieces. 'Cut up'
    preserves the physical act more precisely than the more interpretive 'broke up.'
- source_word: כְּלֵי הַזָּהָב
  chosen: the gold vessels
  alternatives:
  - the gold articles
  - the gold utensils
  lexicon: HALOT
  rationale: כְּלִי is a broad term for objects or vessels. In temple context, 'vessels'
    is the most idiomatic and suitably specific English choice.
- source_word: עָשָׂה
  chosen: had made
  alternatives:
  - made
  - had fashioned
  lexicon: HALOT
  rationale: The pluperfect sense is appropriate in English because Solomon's making
    of the vessels precedes the later action of their destruction.
- source_word: בְּהֵיכַל יְהוָה
  chosen: in the temple of the LORD
  alternatives:
  - in the palace of the LORD
  - in the sanctuary of the LORD
  lexicon: HALOT
  rationale: הֵיכָל in this context refers to the temple structure/sanctuary. Rendering
    it as 'temple' distinguishes it from the earlier בֵּית phrase while remaining
    natural English.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  chosen: just as the LORD had spoken
  alternatives:
  - as the LORD had said
  - according to what the LORD had spoken
  lexicon: HALOT
  rationale: This formula points back to prior prophetic word and fulfillment. 'Just
    as the LORD had spoken' preserves that fulfillment nuance with clear modern English.
