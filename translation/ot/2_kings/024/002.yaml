theological_decisions:
- issue: Referent of the pronoun in לְהַאֲבִידוֹ
  chosen_reading: 'Judah is the intended object: ''to destroy it.'''
  alternative_readings:
  - 'Jehoiakim is the intended object: ''to destroy him.'''
  rationale: The nearest larger contextual target is Judah, explicitly named just before the infinitive phrase, and the surrounding passage emphasizes judgment on Judah according to prophetic word. The masculine singular suffix can refer to a kingdom/people conceived corporately. The alternative is grammatically possible and worth preserving in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it where ambiguity is genuine.
