id: 2KI.24.2
reference: 2 Kings 24:2
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֣ח יְהוָ֣ה בּ֡/וֹ אֶת גְּדוּדֵ֣י כַשְׂדִּים֩ וְ/אֶת גְּדוּדֵ֨י אֲרָ֜ם וְ/אֵ֣ת גְּדוּדֵ֣י מוֹאָ֗ב וְ/אֵת֙ גְּדוּדֵ֣י בְנֵֽי עַמּ֔וֹן וַ/יְשַׁלְּחֵ֥/ם בִּֽ/יהוּדָ֖ה לְ/הַֽאֲבִיד֑/וֹ כִּ/דְבַ֣ר יְהוָ֔ה אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַ֖ד עֲבָדָ֥י/ו הַ/נְּבִיאִֽים׀־־׀־׃
translation:
  text: And Yahweh sent against him bands of the Chaldeans, bands of Aram, bands of Moab, and bands of the Ammonites; he sent them against Judah to destroy it, according to the word of Yahweh that he had spoken by his servants the prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to destroy him,' referring to Jehoiakim rather than Judah.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'Aram'; traditionally 'Syria.'
    reason: lexical_alternative
  - marker: c
    text: Or 'raiding bands' for 'bands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative prose. 'Sent' is natural and preserves the causative action of the LORD without overinterpreting the means.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - upon him
  - at him
  lexicon: HALOT
  rationale: With שלח in this hostile context, the preposition indicates action directed against Jehoiakim. 'Against him' makes the adversative force explicit in idiomatic English.
- source_word: גְּדוּדֵי
  chosen: bands
  alternatives:
  - raiding bands
  - troops
  - companies
  lexicon: HALOT
  rationale: גדוד here refers to marauding military groups rather than full formal armies. 'Bands' preserves the likely sense of smaller raiding units and fits the repeated structure.
- source_word: כַשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' While historically associated with Babylon, retaining 'Chaldeans' stays closer to the source text.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than replaced with traditional exonyms where possible. 'Aram' is closer to the Hebrew than 'Syria.'
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard transliteration of the place/people name.
- source_word: בְנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  lexicon: HALOT
  rationale: Idiomatic ethnonym in English. The construct phrase denotes the people group descended from/identified with Ammon.
- source_word: וַיְשַׁלְּחֵם
  chosen: he sent them
  alternatives:
  - and he sent them
  lexicon: HALOT
  rationale: The repeated verb is retained rather than collapsed, since the Hebrew repeats it for emphasis and progression.
- source_word: בִּיהוּדָה
  chosen: against Judah
  alternatives:
  - into Judah
  - in Judah
  lexicon: HALOT
  rationale: Although the preposition is 'in/into,' the context is hostile military action with the purpose 'to destroy it.' 'Against Judah' best conveys the sense in English.
- source_word: לְהַאֲבִידוֹ
  chosen: to destroy it
  alternatives:
  - to destroy him
  lexicon: HALOT
  rationale: The suffix could grammatically point back to Jehoiakim or Judah, but the immediately following phrase 'against Judah' and the broader context favor Judah as the object of destruction. English 'it' reflects that reading while preserving the national entity sense.
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - according to the LORD's word
  lexicon: HALOT
  rationale: A clear, fairly formal rendering that preserves the covenantal-prophetic formula.
- source_word: דִּבֶּר בְּיַד
  chosen: had spoken by
  alternatives:
  - spoke through
  - had spoken through
  lexicon: HALOT
  rationale: The idiom 'spoke by the hand of' means mediated prophetic speech. 'Had spoken by' is concise and preserves the instrumental sense; English past perfect fits the prior prophetic word relative to the narrative event.
- source_word: עֲבָדָיו הַנְּבִיאִים
  chosen: his servants the prophets
  alternatives:
  - his servants, the prophets
  lexicon: HALOT
  rationale: Keeps both appositional nouns. 'Servants' is appropriate here for עבדים in a prophetic service context; the bonded nuance of 'slave' is not foregrounded in this usage.
