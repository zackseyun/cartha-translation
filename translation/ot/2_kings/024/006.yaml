theological_decisions:
- issue: Rendering the royal death formula without overstating burial details
  chosen_reading: Retain the idiom 'slept with his fathers' in the main text.
  alternative_readings:
  - Render interpretively as 'died' or 'died and was buried with his fathers'
  rationale: The Hebrew here uses the conventional death formula but does not itself
    specify burial. Retaining the idiom preserves the source wording and avoids importing
    details not explicitly stated in this verse, especially since the broader historical
    data around Jehoiakim's end is discussed elsewhere.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
