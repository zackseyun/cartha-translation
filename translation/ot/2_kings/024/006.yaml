id: 2KI.24.6
reference: 2 Kings 24:6
source:
  edition: WLC
  text: וַ/יִּשְׁכַּ֥ב יְהוֹיָקִ֖ים עִם אֲבֹתָ֑י/ו וַ/יִּמְלֹ֛ךְ יְהוֹיָכִ֥ין בְּנ֖/וֹ
    תַּחְתָּֽי/ו־׃
translation:
  text: And Jehoiakim slept with his fathers, and Jehoiachin his son became king in
    his place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'died.' The Hebrew literally says 'slept with his
      fathers,' a standard formula for a king's death.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  chosen: slept
  alternatives:
  - lay down
  - died
  lexicon: HALOT
  rationale: The idiom שׁכב with 'with his fathers' is a standard royal death formula.
    'Slept' preserves the Hebrew wording and conventional idiom better than the interpretive
    gloss 'died,' while remaining natural in English when paired with the following
    phrase.
- source_word: עִם אֲבֹתָיו
  chosen: with his fathers
  alternatives:
  - with his ancestors
  lexicon: HALOT
  rationale: This is the fixed idiomatic complement to 'slept' in royal notices. 'Fathers'
    is retained as the more literal and traditional rendering; 'ancestors' is possible
    but less closely reflects the Hebrew.
- source_word: וַיִּמְלֹךְ
  chosen: became king
  alternatives:
  - reigned
  - was king
  lexicon: HALOT
  rationale: The verb marks accession to the throne. 'Became king' communicates enthronement
    more precisely here than 'reigned,' which can suggest the duration of rule rather
    than the moment of succession.
- source_word: בְּנוֹ
  chosen: his son
  lexicon: HALOT
  rationale: Straightforward filial designation; no contextual reason to vary from
    the standard gloss.
- source_word: תַּחְתָּיו
  chosen: in his place
  alternatives:
  - after him
  - instead of him
  lexicon: HALOT
  rationale: In succession contexts, תַּחַת commonly means replacement or succession.
    'In his place' is idiomatic English and clearly expresses dynastic succession.
- source_word: יְהוֹיָקִים / יְהוֹיָכִין
  chosen: Jehoiakim / Jehoiachin
  rationale: Personal names are transliterated by standard English conventions in
    keeping with the translation philosophy.
