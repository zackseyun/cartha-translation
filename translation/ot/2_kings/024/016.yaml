id: 2KI.24.16
reference: 2 Kings 24:16
source:
  edition: WLC
  text: וְ/אֵת֩ כָּל אַנְשֵׁ֨י הַ/חַ֜יִל שִׁבְעַ֣ת אֲלָפִ֗ים וְ/הֶ/חָרָ֤שׁ וְ/הַ/מַּסְגֵּר֙
    אֶ֔לֶף הַ/כֹּ֕ל גִּבּוֹרִ֖ים עֹשֵׂ֣י מִלְחָמָ֑ה וַ/יְבִיאֵ֧/ם מֶֽלֶךְ בָּבֶ֛ל
    גּוֹלָ֖ה בָּבֶֽלָ/ה־־׃
translation:
  text: And all the men of valor, seven thousand, and the craftsmen and the smiths,
    one thousand—all of them mighty men fit for war—the king of Babylon brought into
    exile to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the artisans and the metalworkers.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'doers of war,' that is, men capable of military service.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי הַחַיִל
  chosen: men of valor
  alternatives:
  - fighting men
  - men of might
  - valiant men
  lexicon: HALOT
  rationale: The phrase denotes capable, strong, militarily useful men. 'Men of valor'
    preserves the idiomatic force and the masculine reference of the Hebrew while
    remaining natural English.
- source_word: שִׁבְעַת אֲלָפִים
  chosen: seven thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: הֶחָרָשׁ
  chosen: the craftsmen
  alternatives:
  - the artisans
  - the craftsmen class
  lexicon: HALOT
  rationale: חָרָשׁ is a skilled worker/artisan, often in wood, stone, or metal. 'Craftsmen'
    is broad enough to match the Hebrew without over-specifying one trade.
- source_word: הַמַּסְגֵּר
  chosen: the smiths
  alternatives:
  - the metalworkers
  - the locksmiths
  lexicon: HALOT
  rationale: The term likely refers to smiths or metalworkers. 'Smiths' is concise
    and traditional, while still intelligible. 'Locksmiths' is too narrow for this
    context.
- source_word: אֶלֶף
  chosen: one thousand
  lexicon: HALOT
  rationale: Numeric total for the craftsmen and smiths group.
- source_word: הַכֹּל
  chosen: all of them
  alternatives:
  - all
  - the whole number
  lexicon: HALOT
  rationale: Resumes and sums up the deported groups. 'All of them' makes the referent
    explicit in English.
- source_word: גִּבּוֹרִים
  chosen: mighty men
  alternatives:
  - warriors
  - strong men
  lexicon: HALOT
  rationale: The word often denotes strong or mighty men, frequently with martial
    connotations. 'Mighty men' preserves the lexical force and pairs naturally with
    the following participial phrase.
- source_word: עֹשֵׂי מִלְחָמָה
  chosen: fit for war
  alternatives:
  - trained for war
  - making war
  - experienced in war
  lexicon: HALOT
  rationale: Literally 'doers of war,' an idiom for those able to wage war. 'Fit for
    war' is idiomatic English that captures military capability without awkward literalism.
- source_word: וַיְבִיאֵם
  chosen: brought
  alternatives:
  - carried off
  - brought away
  lexicon: HALOT
  rationale: The verb is 'bring,' with the object suffix 'them.' In context of deportation,
    'brought' is sufficient when paired with 'into exile'.
- source_word: גּוֹלָה
  chosen: into exile
  alternatives:
  - as exiles
  - in exile
  lexicon: HALOT
  rationale: The noun functions adverbially, indicating the condition/result of deportation.
    'Into exile' is the most natural English rendering here.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  lexicon: HALOT
  rationale: Directional he indicates motion toward Babylon. Standard English expresses
    this simply as 'to Babylon'.
