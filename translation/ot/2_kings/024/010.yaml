id: 2KI.24.10
reference: 2 Kings 24:10
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֔יא עלה עַבְדֵ֛י נְבֻכַדְנֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל יְרוּשָׁלִָ֑ם
    וַ/תָּבֹ֥א הָ/עִ֖יר בַּ/מָּצֽוֹר־׃
translation:
  text: At that time the servants of Nebuchadnezzar king of Babylon came up against
    Jerusalem, and the city came under siege.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'went up to Jerusalem'; the Hebrew idiom 'went/came up'
      often reflects both elevation and military advance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the city was besieged.' The Hebrew more literally says 'the city came
      into siege,' which may emphasize the onset of the siege.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - At that season
  - At that moment
  lexicon: HALOT
  rationale: Temporal phrase marking the historical setting. 'At that time' is natural
    modern English and preserves the deictic force of the Hebrew.
- source_word: עָלָה
  chosen: came up against
  alternatives:
  - went up to
  - marched up against
  lexicon: HALOT
  rationale: The verb literally means 'went up/came up,' and in military movement
    toward Jerusalem often carries the sense of advancing against it. 'Came up against'
    preserves the Hebrew idiom while making the hostile movement explicit from context.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - officials
  - forces
  lexicon: HALOT
  rationale: The construct plural of עבד normally means 'servants' or 'servants of.'
    Here it refers to agents under Nebuchadnezzar's authority, likely military personnel,
    but the Hebrew does not explicitly say 'army' or 'officials.' 'Servants' best
    preserves the source wording without over-specification.
- source_word: נְבֻכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: standard transliteration
  rationale: Personal names are transliterated by standard English convention. 'Nebuchadnezzar'
    is the familiar and widely recognized English form for this spelling tradition.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Straightforward royal title in construct; translated directly.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: standard transliteration
  rationale: Place name transliterated by standard English convention.
- source_word: וַתָּבֹא הָעִיר בַּמָּצוֹר
  chosen: and the city came under siege
  alternatives:
  - and the city entered into siege
  - and the city was besieged
  lexicon: HALOT
  rationale: Literally, 'and the city came into the siege/siege-state.' The feminine
    verb agrees with 'the city.' 'Came under siege' is an idiomatic English rendering
    that preserves the ingressive nuance better than the flatter passive 'was besieged,'
    while remaining readable.
- source_word: מָצוֹר
  chosen: siege
  alternatives:
  - besiegement
  - blockade
  lexicon: HALOT
  rationale: Military term for siege or siege-state. 'Siege' is the standard and clearest
    English equivalent.
