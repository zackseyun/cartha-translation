id: 2KI.24.3
reference: 2 Kings 24:3
source:
  edition: WLC
  text: אַ֣ךְ עַל פִּ֣י יְהוָ֗ה הָֽיְתָה֙ בִּֽ/יהוּדָ֔ה לְ/הָסִ֖יר מֵ/עַ֣ל פָּנָ֑י/ו
    בְּ/חַטֹּ֣את מְנַשֶּׁ֔ה כְּ/כֹ֖ל אֲשֶׁ֥ר עָשָֽׂה׀־׃
translation:
  text: Surely this came upon Judah at the command of the LORD, to remove them from
    before his face because of the sins of Manasseh, according to all that he had
    done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from his presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - indeed
  - surely
  lexicon: HALOT
  rationale: Here אַךְ marks emphatic assertion rather than restriction; 'Surely'
    fits the explanatory force in context better than 'only.'
- source_word: עַל פִּי
  chosen: at the command of
  alternatives:
  - according to
  - by the mouth of
  lexicon: HALOT
  rationale: The idiom literally means 'upon the mouth of' and commonly conveys action
    in accordance with someone's command or word. 'At the command of' is natural English
    and preserves agency.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: הָיְתָה בִּיהוּדָה
  chosen: came upon Judah
  alternatives:
  - was in Judah
  - happened in Judah
  lexicon: HALOT
  rationale: The feminine verb with בִּיהוּדָה is elliptical in English; in context
    it refers to the judgment just described. 'Came upon Judah' makes the implied
    event explicit without over-paraphrasing.
- source_word: לְהָסִיר
  chosen: to remove
  alternatives:
  - to take away
  - to turn aside
  lexicon: HALOT
  rationale: The Hiphil infinitive of סור here expresses causative removal; 'to remove'
    is the clearest rendering.
- source_word: מֵעַל פָּנָיו
  chosen: from before his face
  alternatives:
  - from his presence
  - from before him
  lexicon: HALOT
  rationale: Literally 'from upon his face.' 'From before his face' preserves the
    Hebrew imagery of expulsion from the divine presence; a smoother alternative is
    preserved in a footnote.
- source_word: בְּחַטֹּאת
  chosen: because of the sins of
  alternatives:
  - for the sin of
  - on account of the sin of
  lexicon: HALOT
  rationale: Though the form can be understood collectively, the phrase points to
    Manasseh's culpable offenses as a body of sin. 'Because of the sins of' communicates
    the causal sense naturally in English.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  chosen: according to all that he had done
  alternatives:
  - for all that he had done
  - in keeping with all that he had done
  lexicon: HALOT
  rationale: כְּכֹל retains the sense of correspondence or measure. 'According to
    all that he had done' reflects the Hebrew structure and the proportionality of
    judgment.
