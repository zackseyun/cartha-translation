theological_decisions:
- issue: Implied subject/object of judgment in the elliptical clause
  chosen_reading: The verse refers to the judgment coming upon Judah and the people
    being removed from the LORD's presence.
  alternative_readings:
  - 'The clause could be rendered more abstractly: ''this was in Judah ... to remove
    from before his face'' without supplying ''them''.'
  rationale: The Hebrew leaves the direct object of 'to remove' implicit, but the
    surrounding context concerns Judah/Jerusalem being cast out. Supplying 'them'
    in English is necessary for readability and reflects the contextual referent without
    adding new theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of divine presence language
  chosen_reading: Retain the concrete expression 'from before his face' in the main
    text.
  alternative_readings:
  - from his presence
  rationale: The Hebrew anthropomorphic idiom should be preserved where intelligible,
    rather than flattened into a purely abstract phrase. This keeps the theological
    weight of expulsion from the LORD's presence while remaining understandable.
  doctrine_reference: Translation philosophy §1, §3
