id: 2KI.24.14
reference: 2 Kings 24:14
source:
  edition: WLC
  text: וְ/הִגְלָ֣ה אֶת כָּל יְ֠רוּשָׁלִַם וְֽ/אֶת כָּל הַ/שָּׂרִ֞ים וְ/אֵ֣ת כָּל
    גִּבּוֹרֵ֣י הַ/חַ֗יִל עשרה אֲלָפִים֙ גּוֹלֶ֔ה וְ/כָל הֶ/חָרָ֖שׁ וְ/הַ/מַּסְגֵּ֑ר
    לֹ֣א נִשְׁאַ֔ר זוּלַ֖ת דַּלַּ֥ת עַם הָ/אָֽרֶץ־־־־׀־־־׃
translation:
  text: And he carried away all Jerusalem, and all the officials, and all the mighty
    men of valor, ten thousand captives, and all the craftsmen and the smiths; none
    remained except the poorest of the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the metalworkers'; the Hebrew term traditionally rendered 'smiths' may
      refer more broadly to skilled workers in metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִגְלָה
  chosen: carried away
  alternatives:
  - took into exile
  - deported
  lexicon: HALOT
  rationale: The Hiphil of גלה here denotes causing people to go into exile. 'Carried
    away' is idiomatic and fits the historical narrative, while preserving the forced-removal
    sense. 'Took into exile' and 'deported' are viable alternatives.
- source_word: כָּל יְרוּשָׁלִַם
  chosen: all Jerusalem
  alternatives:
  - all the people of Jerusalem
  - the whole of Jerusalem
  lexicon: HALOT
  rationale: 'The phrase is metonymic: the inhabitants and leadership structure of
    Jerusalem are in view, not the physical city itself. Retaining ''all Jerusalem''
    preserves the Hebrew expression while remaining intelligible in English.'
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  lexicon: HALOT
  rationale: שָׂרִים can denote princes, officials, or rulers. In this deportation
    context, 'officials' best captures the governing elite without implying only royal
    sons.
- source_word: גִּבּוֹרֵי הַחַיִל
  chosen: the mighty men of valor
  alternatives:
  - the mighty warriors
  - the fighting men
  lexicon: HALOT
  rationale: This expression commonly refers to capable fighting men or valiant warriors.
    'Mighty men of valor' preserves the traditional force and the elevated register
    of the Hebrew.
- source_word: עשרה אֲלָפִים גּוֹלֶה
  chosen: ten thousand captives
  alternatives:
  - ten thousand exiles
  - ten thousand in exile
  lexicon: HALOT
  rationale: גּוֹלֶה here functions collectively for the deported population. 'Captives'
    communicates forced removal clearly in English; 'exiles' is also possible but
    can sound less immediate in this narrative context.
- source_word: הֶחָרָשׁ
  chosen: the craftsmen
  alternatives:
  - the artisans
  - the craftsmen class
  lexicon: HALOT
  rationale: חָרָשׁ refers broadly to a skilled worker or artisan. 'Craftsmen' is
    a natural collective rendering in English.
- source_word: הַמַּסְגֵּר
  chosen: the smiths
  alternatives:
  - the metalworkers
  - the locksmiths
  lexicon: HALOT
  rationale: The term likely refers to metalworkers, traditionally rendered 'smiths.'
    Because the exact specialization is debated, the broader sense is preserved in
    a footnote.
- source_word: לֹא נִשְׁאַר
  chosen: none remained
  alternatives:
  - no one was left
  lexicon: HALOT
  rationale: The Niphal expresses that no one remained behind. 'None remained' is
    concise and natural.
- source_word: זוּלַת דַּלַּת עַם הָאָרֶץ
  chosen: except the poorest of the people of the land
  alternatives:
  - except the lowly of the people of the land
  - except the poorest people of the land
  lexicon: HALOT
  rationale: דַּלַּת denotes the poor or weak segment of the population. 'The poorest
    of the people of the land' communicates socioeconomic vulnerability clearly while
    preserving the partitive sense.
