id: 2KI.24.1
reference: 2 Kings 24:1
source:
  edition: WLC
  text: בְּ/יָמָ֣י/ו עָלָ֔ה נְבֻכַדְנֶאצַּ֖ר מֶ֣לֶךְ בָּבֶ֑ל וַ/יְהִי ל֨/וֹ יְהוֹיָקִ֥ים
    עֶ֨בֶד֙ שָׁלֹ֣שׁ שָׁנִ֔ים וַ/יָּ֖שָׁב וַ/יִּמְרָד בּֽ/וֹ־־׃
translation:
  text: In his days Nebuchadnezzar king of Babylon came up, and Jehoiakim became his
    servant for three years. Then he turned and rebelled against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'became his vassal for three years.' The Hebrew says literally 'became
      to him a servant,' a political expression for subjection to an overlord.
    reason: lexical_alternative
  - marker: b
    text: Or 'turned back and rebelled against him.' The verb 'turned' likely marks
      Jehoiakim's reversal of allegiance before the rebellion.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - During his days
  - In his time
  lexicon: HALOT
  rationale: Temporal idiom meaning during the reign/lifetime of the previously mentioned
    king. 'In his days' preserves the Hebrew expression naturally in English.
- source_word: עָלָה
  chosen: came up
  alternatives:
  - went up
  - marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' In military and geopolitical contexts
    it can imply advancing against a land or city. 'Came up' is a standard and sufficiently
    literal rendering here without over-specifying military nuance.
- source_word: נְבֻכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration of the royal name. Although other transliterations
    exist, 'Nebuchadnezzar' is the conventional and recognizable English form.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  alternatives:
  - the king of Babylon
  lexicon: HALOT
  rationale: Construct phrase straightforwardly rendered. The anarthrous Hebrew does
    not require the English article here.
- source_word: וַיְהִי לוֹ ... עֶבֶד
  chosen: Jehoiakim became his servant
  alternatives:
  - Jehoiakim was his servant
  - Jehoiakim became subject to him
  - Jehoiakim became his vassal
  lexicon: HALOT
  rationale: The construction 'was/became to him a servant' indicates entering a state
    of subjection. 'Became his servant' captures the transition marked by the narrative
    sequence better than a simple stative 'was.' 'Vassal' is historically precise
    but more interpretive and less transparent than the Hebrew noun עבד.
- source_word: עֶבֶד
  chosen: servant
  alternatives:
  - slave
  - vassal
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here it refers to political
    subjection of a king to an overlord. 'Servant' is the most natural English rendering
    in this royal-political context; 'vassal' is possible but imports feudal terminology
    not present in the Hebrew.
- source_word: שָׁלֹשׁ שָׁנִים
  chosen: for three years
  alternatives:
  - three years
  lexicon: HALOT
  rationale: Duration accusative rendered idiomatically in English with 'for.'
- source_word: וַיָּשָׁב
  chosen: Then he turned
  alternatives:
  - Then he turned back
  - Then he changed course
  - Then he returned
  lexicon: HALOT
  rationale: שוב literally means 'turn/return.' In sequence with 'rebelled,' it signals
    reversal of allegiance. 'Turned' preserves the lexical sense while fitting the
    idiom 'turned and rebelled.'
- source_word: וַיִּמְרָד בּוֹ
  chosen: rebelled against him
  alternatives:
  - revolted against him
  lexicon: HALOT
  rationale: מרד with ב marks rebellion against a superior ruler. 'Rebelled against
    him' is the clearest natural rendering.
