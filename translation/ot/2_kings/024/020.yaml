id: 2KI.24.20
reference: 2 Kings 24:20
source:
  edition: WLC
  text: כִּ֣י עַל אַ֣ף יְהוָ֗ה הָיְתָ֤ה בִ/ירוּשָׁלִַ֨ם֙ וּ/בִ֣/יהוּדָ֔ה עַד הִשְׁלִכ֥/וֹ אֹתָ֖/ם מֵ/עַ֣ל פָּנָ֑י/ו וַ/יִּמְרֹ֥ד צִדְקִיָּ֖הוּ בְּ/מֶ֥לֶךְ בָּבֶֽל׀־־׃ס
translation:
  text: For because of the anger of Yahweh it happened in Jerusalem and in Judah until he cast them out from his presence. And Zedekiah rebelled against the king of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the anger of the LORD was against Jerusalem and Judah, until he cast them out from before him.' The Hebrew of the first clause is compressed and may be rendered more formally this way.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For because
  alternatives:
  - For
  - because
  lexicon: HALOT
  rationale: כִּי here introduces an explanatory/causal statement. In English, rendering both the explanatory linkage and the causal force is best captured by 'For because,' which preserves the verse's connection to the preceding context and the reason given.
- source_word: עַל אַף יְהוָה
  chosen: because of the anger of the LORD
  alternatives:
  - on account of the anger of the LORD
  - because of the wrath of the LORD
  lexicon: HALOT
  rationale: The idiom עַל אַף literally involves 'anger/nose' and denotes divine anger or wrath. 'Anger' is more natural modern English here, while still preserving the theological force. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: הָיְתָה
  chosen: it came to this
  alternatives:
  - it happened
  - it was
  lexicon: HALOT
  rationale: The feminine singular verb with no explicit subject is idiomatic in context. A wooden 'it was' is unclear in English. 'It came to this' captures the sense that the situation in Jerusalem and Judah had reached this outcome because of the LORD's anger.
- source_word: בִירוּשָׁלִַם וּבִיהוּדָה
  chosen: in Jerusalem and in Judah
  alternatives:
  - against Jerusalem and Judah
  - with Jerusalem and Judah
  lexicon: HALOT
  rationale: The preposition ב is locative here, indicating the sphere in which this state of affairs obtained. 'In Jerusalem and in Judah' is the most straightforward rendering.
- source_word: עַד הִשְׁלִכוֹ אֹתָם
  chosen: until he cast them out
  alternatives:
  - until he threw them out
  - until his casting them out
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix after עַד expresses the terminus of the situation. 'Cast them out' is idiomatic and suitably forceful for divine expulsion.
- source_word: מֵעַל פָּנָיו
  chosen: from his presence
  alternatives:
  - from before him
  - from his face
  lexicon: HALOT
  rationale: The idiom 'from upon his face' means removal from before God, i.e., from his presence. 'From his presence' is clear modern English and preserves the covenantal/theological sense.
- source_word: וַיִּמְרֹד
  chosen: And ... rebelled
  alternatives:
  - and ... revolted
  - and ... rebelled against
  lexicon: HALOT
  rationale: מרד means to rebel or revolt. In English, 'rebelled against' is the natural collocation with the following object.
- source_word: בְּמֶלֶךְ בָּבֶל
  chosen: against the king of Babylon
  alternatives:
  - with the king of Babylon
  - in the king of Babylon
  lexicon: HALOT
  rationale: 'Although the preposition is ב, with מרד the sense is adversative: rebellion against a ruler. Thus ''against the king of Babylon'' is the correct idiomatic rendering.'
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  lexicon: HALOT
  rationale: Standard English transliteration of the proper name.
