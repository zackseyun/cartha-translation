theological_decisions:
- issue: Rendering the cause-and-outcome relation in the first clause
  chosen_reading: The verse states that Jerusalem and Judah's fate culminated in expulsion because of Yahweh's anger.
  alternative_readings:
  - The LORD's anger was simply present in Jerusalem and Judah until the exile occurred
  rationale: The Hebrew syntax is compressed and somewhat idiomatic. Rendering הָיְתָה as 'it came to this' makes explicit the outcome-oriented sense without adding foreign theology. This preserves the text's emphasis on divine judgment leading to exile.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it'
- issue: Rendering יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
