id: 2KI.24.19
reference: 2 Kings 24:19
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה יְהוֹיָקִֽים־׃
translation:
  text: He did what was evil in the eyes of Yahweh, according to all that Jehoiakim had done.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: He did
  alternatives:
  - And he did
  lexicon: HALOT
  rationale: The waw-consecutive with עשה introduces the narrative action. English normally omits the initial 'and' for smoother style unless needed for discourse flow; 'He did' preserves the verbal sense without unnecessary woodenness.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: The idiom עשה הרע commonly means 'do what is evil' rather than the more wooden 'do the evil.' This is standard idiomatic English and preserves the moral evaluation.
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This Hebrew idiom expresses evaluation from someone's perspective. 'In the eyes of' is a clear, fairly formal rendering that preserves the metaphor better than the more interpretive 'before'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as
  - in accordance with everything that
  - like all that
  lexicon: HALOT
  rationale: The phrase marks full correspondence with Jehoiakim's behavior. 'According to all that' preserves the comprehensive force of כֹּל while remaining natural English.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect clarifies that Jehoiakim's actions precede the present subject's conduct in the narrative comparison. The Hebrew perfect itself does not require pluperfect, but English style benefits from it here.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per project philosophy.
