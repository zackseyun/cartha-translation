id: 2KI.24.9
reference: 2 Kings 24:9
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה אָבִֽי/ו־׃
translation:
  text: And he did what was evil in the eyes of Yahweh, according to all that his father had done.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he did
  alternatives:
  - He did
  - And he acted
  lexicon: HALOT
  rationale: Qal wayyiqtol of עשה advances the narrative with a simple past sense. 'And he did' preserves the Hebrew narrative sequence and the common idiom in Kings.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - evil
  - the evil
  lexicon: HALOT
  rationale: With the article, the adjective functions substantivally in the stock Deuteronomistic formula 'do the evil in the eyes of the LORD.' English idiom is best represented by 'did what was evil' rather than the less natural 'did the evil.'
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom meaning evaluation from someone's perspective. 'In the eyes of' is a transparent, fairly literal rendering that remains natural in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּכֹל
  chosen: according to all that
  alternatives:
  - just as everything that
  - like all that
  lexicon: HALOT
  rationale: כ plus כֹּל introduces comparison with the totality of the father's actions. 'According to all that' preserves the comprehensive force and fits the formal evaluative style of Kings.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - what
  lexicon: HALOT
  rationale: Relative particle linking 'all' to the following clause. 'That' is the most natural English connector here.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: The qatal refers to the prior actions of his father relative to the son's reign. English past perfect clarifies the anterior relationship naturally.
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Straightforward construct with 3ms suffix; 'his father' is the direct and natural rendering.
