id: 2KI.24.7
reference: 2 Kings 24:7
source:
  edition: WLC
  text: וְ/לֹֽא הֹסִ֥יף עוֹד֙ מֶ֣לֶךְ מִצְרַ֔יִם לָ/צֵ֖את מֵֽ/אַרְצ֑/וֹ כִּֽי לָקַ֞ח
    מֶ֣לֶךְ בָּבֶ֗ל מִ/נַּ֤חַל מִצְרַ֨יִם֙ עַד נְהַר פְּרָ֔ת כֹּ֛ל אֲשֶׁ֥ר הָיְתָ֖ה
    לְ/מֶ֥לֶךְ מִצְרָֽיִם־־־־׃פ
translation:
  text: And the king of Egypt did not go out again from his land, because the king
    of Babylon had taken everything that belonged to the king of Egypt, from the Brook
    of Egypt to the Euphrates River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “from the Wadi of Egypt.” The Hebrew term can refer to a seasonal watercourse
      or brook; “river” is less likely here and may be confused with the Nile.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹסִיף עוֹד
  chosen: did not go out again
  alternatives:
  - did not continue to go out anymore
  - did not add again to go out
  lexicon: HALOT
  rationale: 'The idiom הוסיף + infinitive means ''to continue/add to do'' and with
    לא plus עוד conveys cessation: he no longer went out. In natural English, ''did
    not go out again'' captures the sense without woodenly reproducing the Hebrew
    idiom.'
- source_word: לָצֵאת מֵאַרְצוֹ
  chosen: go out again from his land
  alternatives:
  - march out again from his land
  - go out from his country again
  lexicon: HALOT
  rationale: יצא 'go out' in royal/military context can imply campaigning or marching
    out. I kept the more literal 'go out' and allowed the military implication to
    arise from context, avoiding over-interpretation.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כי introduces the reason the Egyptian king no longer campaigned.
    'Because' is clearer in modern English than the more formal 'for'.
- source_word: לָקַח
  chosen: had taken
  alternatives:
  - took
  - seized
  lexicon: HALOT
  rationale: לקח is broadly 'take.' 'Had taken' fits the explanatory relationship
    in English, indicating prior action relative to Egypt's inability to go out. 'Seized'
    is possible but slightly more interpretive.
- source_word: מִנַּחַל מִצְרַיִם
  chosen: from the Brook of Egypt
  alternatives:
  - from the Wadi of Egypt
  - from the River of Egypt
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi, torrent-bed, or brook rather than a major
    perennial river. 'Brook of Egypt' is a familiar and defensible rendering; 'Wadi
    of Egypt' is more topographically precise but less natural for general readers.
    'River of Egypt' risks confusion with the Nile.
- source_word: עַד נְהַר פְּרָת
  chosen: to the Euphrates River
  alternatives:
  - to the river Euphrates
  - to the River Euphrates
  lexicon: HALOT
  rationale: נהר is the common term for river; פרת is the Euphrates. 'To the Euphrates
    River' is idiomatic modern English.
- source_word: כֹּל אֲשֶׁר הָיְתָה לְמֶלֶךְ מִצְרַיִם
  chosen: everything that belonged to the king of Egypt
  alternatives:
  - all that had belonged to the king of Egypt
  - all that was the king of Egypt's
  lexicon: HALOT
  rationale: The clause denotes the full extent of territory or holdings formerly
    under Egyptian control. 'Everything that belonged to the king of Egypt' is natural
    English and preserves the broad possessive sense without narrowing it only to
    land, though the geographic frame makes territorial control primary.
