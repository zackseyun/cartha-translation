id: 2KI.24.4
reference: 2 Kings 24:4
source:
  edition: WLC
  text: וְ/גַ֤ם דַּֽם הַ/נָּקִי֙ אֲשֶׁ֣ר שָׁפָ֔ךְ וַ/יְמַלֵּ֥א אֶת יְרוּשָׁלִַ֖ם דָּ֣ם
    נָקִ֑י וְ/לֹֽא אָבָ֥ה יְהוָ֖ה לִ/סְלֹֽחַ־־־׃
translation:
  text: and also for the innocent blood that he had shed, for he had filled Jerusalem
    with innocent blood, and the LORD was not willing to forgive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood of the innocent.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD would not forgive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - even also
  lexicon: HALOT
  rationale: Conjoins this verse to the prior grounds for judgment and adds an additional
    reason. 'And also' preserves both the connective and additive force.
- source_word: דַּם הַנָּקִי
  chosen: the innocent blood
  alternatives:
  - innocent blood
  - the blood of the innocent
  lexicon: HALOT
  rationale: The phrase refers to bloodguilt from unjust killing. 'The innocent blood'
    is a natural English rendering that preserves the definite article and the idiomatic
    sense.
- source_word: אֲשֶׁר שָׁפָךְ
  chosen: that he had shed
  alternatives:
  - which he shed
  - that he poured out
  lexicon: HALOT
  rationale: שׁפך with 'blood' is the standard idiom for shedding blood. The past
    perfect 'had shed' fits the retrospective explanation in context.
- source_word: וַיְמַלֵּא אֶת יְרוּשָׁלִַם דָּם נָקִי
  chosen: for he had filled Jerusalem with innocent blood
  alternatives:
  - and he filled Jerusalem with innocent blood
  - for he filled Jerusalem with innocent blood
  lexicon: HALOT
  rationale: The Hebrew says literally 'and he filled Jerusalem [with] innocent blood.'
    English requires 'with.' Rendering with past perfect maintains the explanatory
    relation to the prior verse and to the final clause.
- source_word: וְלֹא אָבָה
  chosen: and ... was not willing
  alternatives:
  - and ... would not
  - and ... was unwilling
  lexicon: HALOT
  rationale: אָבָה denotes willingness or consent. 'Was not willing' is slightly more
    transparent lexically than 'would not,' while still idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD.'
- source_word: לִסְלֹחַ
  chosen: to forgive
  alternatives:
  - to pardon
  lexicon: HALOT
  rationale: סלח commonly means 'forgive' in contexts of divine pardon. 'Forgive'
    is the clearest modern English equivalent.
