id: 2KI.24.18
reference: 2 Kings 24:18
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/אַחַ֤ת שָׁנָה֙ צִדְקִיָּ֣הוּ בְ/מָלְכ֔/וֹ וְ/אַחַ֤ת עֶשְׂרֵה֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ חמיטל בַּֽת יִרְמְיָ֖הוּ מִ/לִּבְנָֽה־־׃
translation:
  text: Zedekiah was twenty-one years old when he became king, and he reigned eleven
    years in Jerusalem. His mother’s name was Hamutal daughter of Jeremiah, from Libnah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hamutal is also spelled Hamital in some English renderings.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְאַחַת שָׁנָה
  chosen: was twenty-one years old
  alternatives:
  - was a son of twenty-one years
  lexicon: HALOT
  rationale: Hebrew idiom literally reads 'a son of twenty-one years'; standard English
    idiom is 'was twenty-one years old.' This preserves the age statement without
    wooden phrasing.
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - at his becoming king
  - when he began to reign
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks the time of accession.
    'When he became king' is natural English and accurately conveys the temporal sense.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes reigning as king, so 'he reigned' is the
    most direct and conventional rendering.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This is a common regnal formula. The chosen rendering is idiomatic modern
    English while preserving the formula's meaning.
- source_word: חמיטל
  chosen: Hamutal
  alternatives:
  - Hamital
  lexicon: HALOT
  rationale: The proper name is transliterated rather than translated, following the
    project policy for personal names. 'Hamutal' is a standard English transliteration;
    a spelling variant exists.
- source_word: בַּת יִרְמְיָהוּ
  chosen: daughter of Jeremiah
  lexicon: HALOT
  rationale: Standard genealogical expression indicating parentage.
- source_word: מִלִּבְנָה
  chosen: from Libnah
  alternatives:
  - of Libnah
  lexicon: HALOT
  rationale: The preposition מ marks origin or hometown. 'From Libnah' is the clearest
    English expression.
