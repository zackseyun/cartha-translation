id: ISA.60.11
reference: Isaiah 60:11
source:
  edition: WLC
  text: וּ/פִתְּח֨וּ שְׁעָרַ֧יִ/ךְ תָּמִ֛יד יוֹמָ֥ם וָ/לַ֖יְלָה לֹ֣א יִסָּגֵ֑רוּ לְ/הָבִ֤יא
    אֵלַ֨יִ/ךְ֙ חֵ֣יל גּוֹיִ֔ם וּ/מַלְכֵי/הֶ֖ם נְהוּגִֽים׃
translation:
  text: Your gates will be open continually; day and night they will not be shut,
    so that the wealth of the nations may be brought to you, with their kings led
    in procession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the riches of the nations'; Hebrew חֵיל can also mean 'strength' or
      'army,' but here likely refers to material wealth brought as tribute.
    reason: lexical_alternative
  - marker: b
    text: Or 'with their kings being led' or 'their kings led along.' The Hebrew participle
      can suggest escort, procession, or subjugated leading.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפִתְּחוּ
  chosen: will be open
  alternatives:
  - shall stand open
  - will remain open
  lexicon: HALOT
  rationale: Though formally a Qal perfect plural ('and they are opened/opened'),
    in context it functions predicatively with the following clause to describe the
    enduring state of Zion's gates. English idiom prefers a stative future/passive
    expression rather than a wooden 'and your gates have been opened.'
- source_word: שְׁעָרַיִךְ
  chosen: your gates
  lexicon: HALOT
  rationale: Direct, standard rendering of the plural construct with 2fs suffix, addressed
    to Zion/Jerusalem as feminine singular.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - continually
  - always
  lexicon: HALOT
  rationale: Conveys ongoing, uninterrupted openness; 'continually' fits the elevated
    prophetic style better than the flatter 'always.'
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: HALOT
  rationale: Standard merism indicating unceasing duration.
- source_word: לֹא יִסָּגֵרוּ
  chosen: they will not be shut
  alternatives:
  - they will not be closed
  lexicon: HALOT
  rationale: Niphal imperfect of סגר denotes being shut/closed. 'Shut' is slightly
    more idiomatic for gates in English.
- source_word: לְהָבִיא
  chosen: so that ... may be brought
  alternatives:
  - to bring
  - for bringing
  lexicon: HALOT
  rationale: 'The infinitive with ל expresses purpose: the gates remain open for the
    purpose of bringing in the nations'' wealth. English smooths this with ''so that
    ... may be brought.'''
- source_word: אֵלַיִךְ
  chosen: to you
  alternatives:
  - into you
  lexicon: HALOT
  rationale: The preposition marks movement toward Zion/Jerusalem; 'to you' is natural
    in direct address.
- source_word: חֵיל גּוֹיִם
  chosen: the wealth of the nations
  alternatives:
  - the riches of the nations
  - the army/host of the nations
  lexicon: HALOT
  rationale: חַיִל/חֵיל can denote strength, army, or wealth/resources. In this context
    of tribute entering Zion, 'wealth' best fits the semantic and literary context
    (cf. surrounding verses about nations bringing riches). The military sense is
    possible lexically but less likely here.
- source_word: וּמַלְכֵיהֶם
  chosen: with their kings
  alternatives:
  - and their kings
  lexicon: HALOT
  rationale: The conjunction joins an accompanying element to what is brought in.
    English 'with their kings' clarifies that the kings accompany the tribute rather
    than introducing a separate finite clause.
- source_word: נְהוּגִים
  chosen: led in procession
  alternatives:
  - being led
  - escorted
  - driven along
  lexicon: HALOT
  rationale: Passive participle from נהג, 'to lead/drive.' In context it likely depicts
    kings being led along in a ceremonial train as part of the nations' homage. 'Led
    in procession' preserves the passive sense while fitting the triumphal imagery;
    'driven' would sound overly harsh in English and may overstate subjugation.
