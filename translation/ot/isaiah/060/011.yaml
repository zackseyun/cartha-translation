theological_decisions:
- issue: Sense of חֵיל גּוֹיִם in Zion-tribute imagery
  chosen_reading: economic wealth/resources of the nations
  alternative_readings:
  - military force/army of the nations
  rationale: The immediate and broader context in Isaiah 60 emphasizes nations and
    kings bringing gold, incense, flocks, ships, and other riches to Zion. Rendering
    חֵיל here as 'wealth' preserves that thematic coherence without importing a militarized
    reading the verse does not require.
- issue: Nuance of נְהוּגִים regarding the kings
  chosen_reading: kings accompanying the tribute in a led ceremonial manner
  alternative_readings:
  - kings led as captives
  - kings simply being brought
  rationale: The participle is passive and indicates that the kings are led. The context
    of homage to restored Zion allows either ceremonial escort or subdued submission;
    the translation 'led in procession' preserves the passive movement without forcing
    a harsher captivity reading.
