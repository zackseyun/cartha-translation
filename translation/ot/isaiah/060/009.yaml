id: ISA.60.9
reference: Isaiah 60:9
source:
  edition: WLC
  text: כִּֽי לִ֣/י אִיִּ֣ים יְקַוּ֗וּ וָ/אֳנִיּ֤וֹת תַּרְשִׁישׁ֙ בָּ/רִ֣אשֹׁנָ֔ה לְ/הָבִ֤יא בָנַ֨יִ/ךְ֙ מֵֽ/רָח֔וֹק כַּסְפָּ֥/ם וּ/זְהָבָ֖/ם אִתָּ֑/ם לְ/שֵׁם֙ יְהוָ֣ה אֱלֹהַ֔יִ/ךְ וְ/לִ/קְד֥וֹשׁ יִשְׂרָאֵ֖ל כִּ֥י פֵאֲרָֽ/ךְ־׀׃
translation:
  text: Surely the coastlands wait for me, and the ships of Tarshish first, to bring your sons from far away, with their silver and their gold with them, for the name of Yahweh your God, and for the Holy One of Israel, because he has glorified you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands' or 'the distant shores'; the Hebrew term often refers broadly to maritime lands or coastlands.
    reason: lexical_alternative
  - marker: b
    text: Or 'because he has beautified you' or 'because he has honored you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Surely
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces an explanation/assurance flowing from the preceding context. 'Surely' captures the emphatic-explanatory force in natural English better than a bare 'for,' while remaining close to the Hebrew.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  - in me
  lexicon: HALOT
  rationale: With יְקַוּוּ, the preposition marks the object/goal of hopeful waiting. English idiom prefers 'wait for me.'
- source_word: אִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  - the distant shores
  lexicon: HALOT
  rationale: In Isaiah this term often denotes maritime lands or distant coastlands rather than literal islands only. 'The coastlands' preserves the prophetic geographic sense.
- source_word: יְקַוּוּ
  chosen: wait
  alternatives:
  - hope
  - wait expectantly
  lexicon: HALOT
  rationale: The verb conveys hopeful waiting/expectation. 'Wait' is concise and idiomatic here; the hopeful nuance is retained by context.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  chosen: the ships of Tarshish
  alternatives:
  - Tarshish ships
  - seagoing ships
  lexicon: HALOT
  rationale: The construct is traditionally and accurately rendered 'ships of Tarshish.' Whether Tarshish is a destination or a class of large trading vessels, the Hebrew expression is best preserved in translation.
- source_word: בָּרִאשֹׁנָה
  chosen: first
  alternatives:
  - in the lead
  - first of all
  lexicon: HALOT
  rationale: The adverb indicates priority or leading position. 'First' is the most direct rendering and fits the syntax smoothly.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to bring in
  - to carry
  lexicon: HALOT
  rationale: 'Infinitive of purpose after the mention of ships: they are coming ''to bring'' Zion''s children back.'
- source_word: בָנַיִךְ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural with 2fs suffix. Per translation philosophy, gender-accurate rendering is preferred; 'your sons' should be retained rather than neutralized.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from a distance
  lexicon: HALOT
  rationale: '''From far away'' is clear modern English and preserves the sense of great distance.'
- source_word: כַּסְפָּם וּזְהָבָם אִתָּם
  chosen: with their silver and their gold with them
  alternatives:
  - their silver and gold with them
  - bringing their silver and gold
  lexicon: HALOT
  rationale: The Hebrew explicitly repeats the possessive and adds אִתָּם. The translation preserves the emphasis and concreteness, even at the cost of slight redundancy.
- source_word: לְשֵׁם יְהוָה אֱלֹהַיִךְ
  chosen: for the name of the LORD your God
  alternatives:
  - to the name of the LORD your God
  - for the sake of the name of the LORD your God
  lexicon: HALOT
  rationale: Because YHWH is rendered 'the LORD' per doctrine. 'For the name of' expresses purpose/honor directed toward the LORD's revealed name and reputation.
- source_word: וְלִקְדוֹשׁ יִשְׂרָאֵל
  chosen: and for the Holy One of Israel
  alternatives:
  - and to the Holy One of Israel
  lexicon: HALOT
  rationale: Parallel to the previous לְ phrase; 'for' keeps the coordinated purpose sense. 'Holy One of Israel' is a fixed Isaianic divine title and should be preserved.
- source_word: כִּי פֵאֲרָךְ
  chosen: because he has glorified you
  alternatives:
  - because he has beautified you
  - because he has honored you
  lexicon: HALOT
  rationale: The verb פאר in the piel can denote adorning, beautifying, or glorifying/honoring. In this context of Zion's exaltation by God, 'has glorified you' best conveys bestowed splendor without reducing it to mere physical beauty.
