theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gender rendering of בָנַיִךְ
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The Hebrew is grammatically masculine plural and in this restoration context likely refers specifically to sons, with daughters mentioned in the surrounding passage. Per translation philosophy, gender-accurate rendering is preferred over neutralization.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
