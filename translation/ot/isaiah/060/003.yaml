id: ISA.60.3
reference: Isaiah 60:3
source:
  edition: WLC
  text: וְ/הָלְכ֥וּ גוֹיִ֖ם לְ/אוֹרֵ֑/ךְ וּ/מְלָכִ֖ים לְ/נֹ֥גַהּ זַרְחֵֽ/ךְ׃
translation:
  text: Nations will come to your light, and kings to the brightness of your rising.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will walk' or 'will go to your light.'
    reason: lexical_alternative
  - marker: b
    text: '''Nations'' can in some contexts be rendered ''Gentiles.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'to the radiance of your dawn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  chosen: will come
  alternatives:
  - will walk
  - will go
  lexicon: HALOT
  rationale: הלך literally means 'walk/go,' but with peoples moving toward a destination
    marked by לְ ('to/toward'), idiomatic English is 'come.' The future sense fits
    the prophetic context.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: גוים commonly denotes nations/peoples. 'Nations' is the broad, contextually
    appropriate rendering here; 'Gentiles' is possible in some contexts but is narrower
    and more interpretive.
- source_word: לְאוֹרֵךְ
  chosen: to your light
  alternatives:
  - toward your light
  lexicon: HALOT
  rationale: אוֹר is 'light'; the 2fs suffix indicates 'your light,' addressing Zion/Jerusalem
    personified as feminine in context. 'To' preserves the directional force of לְ
    naturally in English.
- source_word: וּמְלָכִים
  chosen: and kings
  alternatives:
  - and rulers
  lexicon: HALOT
  rationale: מלכים straightforwardly means 'kings.' 'Rulers' would be broader than
    the source warrants.
- source_word: לְנֹגַהּ
  chosen: to the brightness
  alternatives:
  - to the radiance
  - to the shining
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness, radiance, or shining splendor. 'Brightness'
    is clear modern English and pairs well with the following construct phrase.
- source_word: זַרְחֵךְ
  chosen: of your rising
  alternatives:
  - of your dawn
  - of your shining forth
  lexicon: HALOT
  rationale: From זרח, 'to rise/shine forth,' especially of dawn or light. 'Your rising'
    preserves the verbal imagery and leaves the metaphor broad; 'your dawn' is possible
    but slightly more interpretive.
