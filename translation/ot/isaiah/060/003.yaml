theological_decisions:
- issue: Referent of the second feminine singular suffixes
  chosen_reading: Addressed to Zion/Jerusalem personified as a woman
  alternative_readings:
  - Addressed more generally to the people of God
  rationale: The immediate context in Isaiah 60 addresses Zion in feminine singular
    imagery. The translation preserves the direct second-person feminine address simply
    as 'your' in English without importing a broader ecclesiological interpretation
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it
