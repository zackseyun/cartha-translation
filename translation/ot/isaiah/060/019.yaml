id: ISA.60.19
reference: Isaiah 60:19
source:
  edition: WLC
  text: לֹא יִֽהְיֶה לָּ֨/ךְ ע֤וֹד הַ/שֶּׁ֨מֶשׁ֙ לְ/א֣וֹר יוֹמָ֔ם וּ/לְ/נֹ֕גַהּ הַ/יָּרֵ֖חַ לֹא יָאִ֣יר לָ֑/ךְ וְ/הָיָה לָ֤/ךְ יְהוָה֙ לְ/א֣וֹר עוֹלָ֔ם וֵ/אלֹהַ֖יִ/ךְ לְ/תִפְאַרְתֵּֽ/ךְ־־־־׃
translation:
  text: The sun will no longer be for you a light by day, nor will the moon give light to you for brightness; but Yahweh will be for you an everlasting light, and your God your glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for radiance' instead of 'for brightness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
  - marker: c
    text: Or 'your splendor' or 'your beauty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִהְיֶה לָּךְ עוֹד
  chosen: will no longer be for you
  alternatives:
  - will not be to you anymore
  - will no more be yours
  lexicon: HALOT
  rationale: Combines negation, imperfect of היה, dative לָךְ, and עוֹד into natural English expressing cessation of a former condition.
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Standard rendering of the celestial body; no contextual reason for variation.
- source_word: לְאוֹר יוֹמָם
  chosen: the light by day
  alternatives:
  - for light by day
  - as light by day
  lexicon: HALOT
  rationale: לְ marks function/purpose, and אוֹר with יוֹמָם indicates the sun's role as daytime illumination. 'The light by day' is idiomatic while preserving the sense.
- source_word: וּלְנֹגַהּ
  chosen: for brightness
  alternatives:
  - for shining
  - for radiance
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness/radiance. 'For brightness' fits the parallel functional use with לְ and keeps the poetic balance with the previous clause.
- source_word: הַיָּרֵחַ
  chosen: the moon
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: לֹא יָאִיר לָךְ
  chosen: nor will the moon shine for you
  alternatives:
  - will not give light to you
  - will not illumine you
  lexicon: HALOT
  rationale: Hiphil of אור means 'give light, shine.' 'Shine for you' is natural English and preserves the dative relation.
- source_word: וְהָיָה לָךְ
  chosen: but ... will be for you
  alternatives:
  - and ... will be to you
  lexicon: HALOT
  rationale: The conjunction marks contrast in context, not mere sequence, since the LORD replaces sun and moon as light. 'But' best conveys the adversative force in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְאוֹר עוֹלָם
  chosen: an everlasting light
  alternatives:
  - for an eternal light
  - as everlasting light
  lexicon: HALOT
  rationale: Construct-like phrase expressing enduring, unending light. 'Everlasting light' is idiomatic and preserves the theological-poetic force of עוֹלָם.
- source_word: וֵאלֹהַיִךְ
  chosen: and your God
  alternatives:
  - and your God himself
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with 2fs suffix, preserving the direct address to Zion/Jerusalem.
- source_word: לְתִפְאַרְתֵּךְ
  chosen: your glory
  alternatives:
  - for your glory
  - your beauty
  - your splendor
  lexicon: HALOT
  rationale: תִפְאֶרֶת can denote beauty, splendor, or glory. In parallel with 'everlasting light' and in a theologically elevated context, 'your glory' best captures God as the source and object of Zion's honor and splendor.
