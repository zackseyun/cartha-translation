theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretive force of the imagery of sun and moon being unnecessary
  chosen_reading: Maintain the poetic-prophetic imagery without over-specifying whether it is literal, eschatological, or metaphorical
  alternative_readings:
  - Strictly literal cosmic transformation
  - purely metaphorical spiritual illumination
  rationale: The Hebrew presents exalted prophetic imagery in which the LORD supersedes created lights. The translation preserves this theological tension rather than resolving the mode of fulfillment.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
