theological_decisions:
- issue: Emotional force of Zion's response
  chosen_reading: A mixed response of overwhelmed joy and awe
  alternative_readings:
  - pure fear
  - pure joy
  rationale: The sequence 'see,' 'shine/be radiant,' 'tremble,' and 'heart grow wide'
    suggests not terror alone nor simple happiness alone, but astonished joy at God's
    restorative blessing. The translation preserves this tension rather than flattening
    it.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
