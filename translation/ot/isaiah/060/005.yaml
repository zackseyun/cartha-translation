id: ISA.60.5
reference: Isaiah 60:5
source:
  edition: WLC
  text: אָ֤ז תִּרְאִי֙ וְ/נָהַ֔רְתְּ וּ/פָחַ֥ד וְ/רָחַ֖ב לְבָבֵ֑/ךְ כִּֽי יֵהָפֵ֤ךְ
    עָלַ֨יִ/ךְ֙ הֲמ֣וֹן יָ֔ם חֵ֥יל גּוֹיִ֖ם יָבֹ֥אוּ לָֽ/ךְ־׃
translation:
  text: Then you will see and shine with joy, and your heart will tremble and grow
    wide, because the abundance of the sea will be turned to you; the wealth of the
    nations will come to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be radiant.' The Hebrew verb can carry the sense of shining or brightening
      in response to what is seen.
    reason: lexical_alternative
  - marker: b
    text: Or 'the wealth of the sea.' The phrase may refer specifically to maritime
      riches brought to Zion.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּרְאִי
  chosen: you will see
  alternatives:
  - you will look
  - you will behold
  lexicon: HALOT
  rationale: Qal imperfect 2fs of ראה, straightforward future/prophetic sense addressed
    to feminine singular Zion/Jerusalem.
- source_word: וְנָהַרְתְּ
  chosen: shine with joy
  alternatives:
  - be radiant
  - beam
  - flow together
  lexicon: HALOT
  rationale: From נהר. In this context the sense is best taken as becoming radiant/brightened
    rather than literal flowing. 'Shine with joy' makes the emotional-visual result
    clear in modern English while preserving the image. The alternative 'be radiant'
    is viable and worth preserving.
- source_word: וּפָחַד
  chosen: will tremble
  alternatives:
  - will fear
  - will be in awe
  lexicon: HALOT
  rationale: Though morphologically 3ms in the table, the sense is governed by the
    following subject 'your heart' and forms part of the reaction sequence. 'Tremble'
    captures the physical-emotional response without forcing purely negative fear;
    the context is overwhelmed astonishment at blessing.
- source_word: וְרָחַב לְבָבֵךְ
  chosen: your heart will grow wide
  alternatives:
  - your heart will swell
  - your heart will expand
  - your heart will rejoice
  lexicon: HALOT
  rationale: Literally 'your heart will be wide/broad.' The idiom conveys enlargement
    of heart—expansion with joy, courage, or amazement. 'Grow wide' preserves the
    Hebrew metaphor more transparently than interpretive renderings like 'rejoice.'
- source_word: יֵהָפֵךְ עָלַיִךְ
  chosen: will be turned to you
  alternatives:
  - will be turned over to you
  - will come over to you
  lexicon: HALOT
  rationale: Niphal of הפך here conveys a turning/transfer toward Zion. 'Be turned
    to you' is natural English and preserves the passive sense better than a more
    paraphrastic 'be brought to you.'
- source_word: הֲמוֹן יָם
  chosen: the abundance of the sea
  alternatives:
  - the wealth of the sea
  - the multitude of the sea
  lexicon: HALOT
  rationale: הֲמוֹן denotes abundance, multitude, or tumult. In parallel with 'the
    wealth of the nations,' the phrase likely refers to maritime riches/resources.
    'Abundance of the sea' keeps the Hebrew breadth while allowing the economic sense
    to emerge from the parallelism.
- source_word: חֵיל גּוֹיִם
  chosen: the wealth of the nations
  alternatives:
  - the riches of the nations
  - the strength of the nations
  - the army of the nations
  lexicon: HALOT
  rationale: חֵיל can mean strength, army, or wealth/resources. In this context of
    goods streaming to Zion, 'wealth' best fits the semantic field and parallelism
    with maritime abundance.
- source_word: יָבֹאוּ לָךְ
  chosen: will come to you
  alternatives:
  - will come to you for your benefit
  lexicon: HALOT
  rationale: Simple motion verb with dative/prepositional יעד. 'Will come to you'
    is the plain sense and suits the prophetic picture of nations' resources arriving
    at Zion.
