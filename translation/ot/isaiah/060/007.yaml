id: ISA.60.7
reference: Isaiah 60:7
source:
  edition: WLC
  text: כָּל צֹ֤אן קֵדָר֙ יִקָּ֣בְצוּ לָ֔/ךְ אֵילֵ֥י נְבָי֖וֹת יְשָׁרְת֑וּ/נֶךְ יַעֲל֤וּ
    עַל רָצוֹן֙ מִזְבְּחִ֔/י וּ/בֵ֥ית תִּפְאַרְתִּ֖/י אֲפָאֵֽר־־׃
translation:
  text: All the flocks of Kedar will be gathered to you; the rams of Nebaioth will
    minister to you. They will go up with acceptance on my altar, and I will beautify
    my glorious house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will ascend acceptably on my altar.' The Hebrew phrase combines
      'go up' with the idea of favorable acceptance.
    reason: lexical_alternative
  - marker: b
    text: '''My glorious house'' refers to the temple, literally ''the house of my
      beauty/glory.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹאן
  chosen: flocks
  alternatives:
  - sheep
  - small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, especially sheep and goats.
    'Flocks' preserves the collective sense better than the narrower 'sheep' in this
    context of tribute animals.
- source_word: קֵדָר
  chosen: Kedar
  lexicon: HALOT
  rationale: Proper name of an Arabian people/region; transliterated per translation
    philosophy for names.
- source_word: יִקָּבְצוּ לָךְ
  chosen: will be gathered to you
  alternatives:
  - will gather to you
  - will be assembled for you
  lexicon: HALOT
  rationale: Niphal imperfect of קבץ is naturally passive/reflexive. 'Will be gathered
    to you' preserves the passive nuance and the directional לָךְ.
- source_word: אֵילֵי
  chosen: rams
  alternatives:
  - male sheep
  - leaders
  lexicon: HALOT
  rationale: In parallel with sacrificial flocks and altar imagery, the animal sense
    'rams' is clearly intended, not the metaphorical 'leaders'.
- source_word: נְבָיוֹת
  chosen: Nebaioth
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: יְשָׁרְתוּנֶךְ
  chosen: will minister to you
  alternatives:
  - will serve you
  lexicon: HALOT
  rationale: שרת often denotes service, including cultic service. 'Minister to you'
    fits the elevated, worship-related context while still allowing the addressee
    Zion/Jerusalem to receive the service represented by these offerings.
- source_word: יַעֲלוּ
  chosen: will go up
  alternatives:
  - will ascend
  - will be offered
  lexicon: HALOT
  rationale: עלה literally means 'go up.' In sacrificial context it can imply being
    offered up, but the more literal 'go up' preserves the Hebrew imagery without
    over-paraphrasing.
- source_word: עַל רָצוֹן
  chosen: with acceptance
  alternatives:
  - acceptably
  - for favor
  - upon favor
  lexicon: HALOT
  rationale: The phrase conveys favorable acceptance. 'With acceptance' is idiomatic
    English and communicates that the offerings are received favorably.
- source_word: מִזְבְּחִי
  chosen: my altar
  lexicon: HALOT
  rationale: Standard rendering of מזבח with first-person suffix.
- source_word: בֵית תִּפְאַרְתִּי
  chosen: my glorious house
  alternatives:
  - the house of my beauty
  - my beautiful house
  - my splendid house
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of my beauty/glory.' 'My
    glorious house' is natural English and preserves the sense of splendor associated
    with God's temple.
- source_word: אֲפָאֵר
  chosen: I will beautify
  alternatives:
  - I will glorify
  - I will adorn
  lexicon: HALOT
  rationale: פאר in the Piel can mean beautify, adorn, glorify. Because the object
    is 'my glorious house,' 'beautify' preserves the concrete temple-restoration imagery
    without losing dignity.
