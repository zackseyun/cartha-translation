theological_decisions:
- issue: Referent of second-person feminine suffixes ('to you')
  chosen_reading: Addressed to Zion/Jerusalem personified, receiving the nations'
    wealth and sacrificial tribute
  alternative_readings:
  - Addressed more broadly to the people of God
  rationale: The immediate context of Isaiah 60 personifies Zion/Jerusalem as a woman
    to whom nations come. Rendering simply 'to you' preserves the text's direct address
    without importing a narrower theological identification into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Cultic sense of the animals and ascent to the altar
  chosen_reading: The verse depicts acceptable sacrificial offerings brought from
    foreign peoples
  alternative_readings:
  - A more general image of tribute and service without explicit sacrificial force
  rationale: The mention of flocks, rams, altar, and acceptance strongly supports
    sacrificial imagery. The translation keeps this imagery explicit while avoiding
    interpretive expansion beyond the text.
