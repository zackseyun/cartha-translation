theological_decisions:
- issue: Whether יְשׁוּעָה and תְּהִלָּה should be translated as common nouns or preserved
    as name-like titles for the walls and gates
  chosen_reading: 'Translate them as title-like proper designations: ''Salvation''
    and ''Praise'''
  alternative_readings:
  - '''salvation'' and ''praise'' as lower-case descriptive nouns'
  rationale: The syntax 'you will call your walls X, and your gates Y' presents these
    as bestowed names. Capitalization in English helps signal the naming function
    without overstating personification.
