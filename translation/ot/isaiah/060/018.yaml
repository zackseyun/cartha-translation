id: ISA.60.18
reference: Isaiah 60:18
source:
  edition: WLC
  text: לֹא יִשָּׁמַ֨ע ע֤וֹד חָמָס֙ בְּ/אַרְצֵ֔/ךְ שֹׁ֥ד וָ/שֶׁ֖בֶר בִּ/גְבוּלָ֑יִ/ךְ
    וְ/קָרָ֤את יְשׁוּעָה֙ חוֹמֹתַ֔יִ/ךְ וּ/שְׁעָרַ֖יִ/ךְ תְּהִלָּֽה־׃
translation:
  text: Violence will no longer be heard in your land, devastation or destruction
    within your borders; but you will call your walls Salvation, and your gates Praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plunder and ruin' for 'devastation or destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׁמַע
  chosen: will ... be heard
  alternatives:
  - will be heard of
  - will be heard about
  lexicon: HALOT
  rationale: 'Nifal imperfect of שׁמע here is passive/reflexive in sense: the sound/report
    of violence will no longer be present. ''Be heard'' is the most direct and natural
    English rendering.'
- source_word: חָמָס
  chosen: Violence
  alternatives:
  - wrongdoing
  - oppression
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence, brutality, or violent wrongdoing. 'Violence'
    best fits the parallel with ruin terms and preserves the social disorder in view.
- source_word: בְּאַרְצֵךְ
  chosen: in your land
  alternatives:
  - in your country
  lexicon: HALOT
  rationale: אֶרֶץ is broadly 'land.' 'Land' is the standard and suitably covenantal/geographic
    rendering in prophetic literature.
- source_word: שֹׁד
  chosen: devastation
  alternatives:
  - plunder
  - ruin
  - desolation
  lexicon: HALOT
  rationale: שֹׁד can denote violent spoil/plunder and by extension devastation. In
    parallel with שׁבר and in the context of what will cease within the borders, 'devastation'
    communicates the result of such violence in idiomatic English.
- source_word: שֶׁבֶר
  chosen: destruction
  alternatives:
  - breaking
  - ruin
  - collapse
  lexicon: HALOT
  rationale: שׁבר literally relates to breaking/breach, but in prophetic parallelism
    it often signifies ruin or destruction. 'Destruction' pairs naturally with 'devastation'
    without becoming overly wooden.
- source_word: בִּגְבוּלָיִךְ
  chosen: within your borders
  alternatives:
  - in your territory
  - within your boundaries
  lexicon: HALOT
  rationale: גְּבוּל denotes border, boundary, or territory. 'Within your borders'
    is idiomatic and preserves the spatial image.
- source_word: וְקָרָאת
  chosen: but you will call
  alternatives:
  - and you will call
  - and you will name
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction continues the future prophetic sequence.
    'Call' is the straightforward rendering; 'but' brings out the contrast between
    former violence and future honorific naming.
- source_word: יְשׁוּעָה
  chosen: Salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: As the name given to the walls, יְשׁוּעָה functions as an abstract noun
    personified/title-like. 'Salvation' is the most recognizable and theologically
    weighty rendering, preserving the prophetic motif of God's saving protection.
- source_word: חוֹמֹתַיִךְ
  chosen: your walls
  lexicon: HALOT
  rationale: Direct rendering of the city-fortification image.
- source_word: שְׁעָרַיִךְ
  chosen: your gates
  lexicon: HALOT
  rationale: Direct rendering; gates represent the city's entrances and public life.
- source_word: תְּהִלָּה
  chosen: Praise
  alternatives:
  - renown
  - glory
  lexicon: HALOT
  rationale: תְּהִלָּה usually means praise or song of praise. As a bestowed name
    parallel to 'Salvation,' 'Praise' best preserves the nominal force and the worshipful
    result of God's restoration.
