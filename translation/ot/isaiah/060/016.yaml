id: ISA.60.16
reference: Isaiah 60:16
source:
  edition: WLC
  text: וְ/יָנַקְתְּ֙ חֲלֵ֣ב גּוֹיִ֔ם וְ/שֹׁ֥ד מְלָכִ֖ים תִּינָ֑קִי וְ/יָדַ֗עַתְּ כִּ֣י אֲנִ֤י יְהוָה֙ מֽוֹשִׁיעֵ֔/ךְ וְ/גֹאֲלֵ֖/ךְ אֲבִ֥יר יַעֲקֹֽב׃
translation:
  text: You will nurse on the milk of nations, and you will suck the breast of kings; and you will know that I, Yahweh, am your Savior and your Redeemer, the Mighty One of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'You will suck the milk of nations, and you will suck the breast of kings.' The Hebrew preserves vivid nursing imagery for Zion's receiving sustenance and honor from the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָנַקְתְּ
  chosen: you will nurse on
  alternatives:
  - you will suck
  - you will suckle
  lexicon: HALOT
  rationale: From ינק, a verb of sucking/nursing. 'Nurse on' preserves the maternal nourishment imagery while sounding natural in English. The 2fs form addresses Zion/Jerusalem as a feminine singular figure.
- source_word: חֲלֵב
  chosen: milk
  alternatives:
  - riches
  - abundance
  lexicon: HALOT
  rationale: The plain lexical sense is 'milk.' Some translations interpret metaphorically as wealth or abundance because of the context of nations bringing resources, but the source text explicitly uses nursing imagery, so the concrete term is retained.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: '''Nations'' is the standard contextual rendering of גוים here, referring to the foreign peoples whose resources come to Zion. ''Gentiles'' is possible but more interpretive and less natural in this prophetic context.'
- source_word: וְשֹׁד
  chosen: the breast
  alternatives:
  - breast
  - bosom
  lexicon: HALOT
  rationale: שֹׁד denotes breast, especially in nursing imagery. The singular collective sense works idiomatically in English as 'the breast of kings,' preserving the metaphor rather than flattening it into abstract provision.
- source_word: מְלָכִים
  chosen: kings
  alternatives:
  - royal ones
  lexicon: HALOT
  rationale: Straightforward plural noun. 'Kings' preserves the social-political imagery of rulers nourishing Zion.
- source_word: תִּינָקִי
  chosen: you will suck
  alternatives:
  - you will nurse
  - you will suckle
  lexicon: HALOT
  rationale: A second occurrence of ינק. Here 'you will suck' gives a slightly more direct parallel to 'the breast of kings' and preserves the vividness of the Hebrew poetic repetition.
- source_word: וְיָדַעַתְּ
  chosen: and you will know
  alternatives:
  - then you will know
  lexicon: HALOT
  rationale: Simple sequential perfect with vav in prophetic discourse. 'And you will know' preserves the Hebrew coordination without over-interpreting the discourse relation, though the sense is consequential.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מוֹשִׁיעֵךְ
  chosen: your Savior
  alternatives:
  - the one who saves you
  - your deliverer
  lexicon: HALOT
  rationale: Hiphil participle of ישׁע with 2fs suffix. 'Your Savior' is concise, idiomatic, and preserves the ongoing/title-like force of the participle.
- source_word: וְגֹאֲלֵךְ
  chosen: your Redeemer
  alternatives:
  - the one who redeems you
  - your kinsman-redeemer
  lexicon: HALOT
  rationale: Participle of גאל with 2fs suffix. 'Redeemer' is theologically and lexically established in Isaiah and preserves covenantal rescue language. 'Kinsman-redeemer' would over-specify here.
- source_word: אֲבִיר יַעֲקֹב
  chosen: the Mighty One of Jacob
  alternatives:
  - the Mighty One of Israel
  lexicon: HALOT
  rationale: The Hebrew reads 'Jacob,' not 'Israel,' so the source-specific title should be preserved. אֲבִיר denotes mighty/strong one, functioning here as a divine epithet.
