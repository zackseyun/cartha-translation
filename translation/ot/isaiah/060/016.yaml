theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to literalize or interpret the nursing imagery as wealth/provision
  chosen_reading: Retain the maternal/nursing metaphor in the main text
  alternative_readings:
  - Interpret as 'you will enjoy the wealth of nations and kings'
  rationale: The Hebrew uses explicit body and nursing terms twice. While the metaphor points to the nations' resources sustaining Zion, the text itself communicates this through embodied imagery, which should be preserved rather than paraphrased away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source warrants'
