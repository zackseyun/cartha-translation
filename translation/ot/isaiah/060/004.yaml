theological_decisions:
- issue: Gendered restoration imagery
  chosen_reading: Preserve 'sons' and 'daughters' rather than neutralizing to 'children.'
  alternative_readings:
  - children
  rationale: The Hebrew intentionally uses a male/female pair to portray the full
    return of Zion's offspring. Following the translation philosophy, gender-accurate
    language is preferred where the source is specific.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Prophetic verbal aspect
  chosen_reading: Render the opening perfects with vivid present ('gather together;
    they come') and the later imperfects with future ('will come; will be carried').
  alternative_readings:
  - Render all verbs as future
  - Render all verbs as past/perfect
  rationale: This preserves the prophetic immediacy of the first scene while allowing
    the explicit forward-looking force of the imperfects in the second half. It reflects
    optimal equivalence rather than mechanically flattening all forms to one tense.
  doctrine_reference: DOCTRINE.md §Translation philosophy
