id: ISA.60.4
reference: Isaiah 60:4
source:
  edition: WLC
  text: שְׂאִֽי סָבִ֤יב עֵינַ֨יִ/ךְ֙ וּ/רְאִ֔י כֻּלָּ֖/ם נִקְבְּצ֣וּ בָֽאוּ לָ֑/ךְ
    בָּנַ֨יִ/ךְ֙ מֵ/רָח֣וֹק יָבֹ֔אוּ וּ/בְנֹתַ֖יִ/ךְ עַל צַ֥ד תֵּאָמַֽנָה־־־׃
translation:
  text: 'Lift up your eyes all around and see: all of them gather together; they come
    to you. Your sons will come from far away, and your daughters will be carried
    on the hip.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the side'; the Hebrew phrase may denote being carried at one's side,
      commonly understood as on the hip.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be nursed' or 'will be supported'; the verb can carry a nuance
      of being cared for, though 'will be carried' best fits the immediate image.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאִי
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative feminine singular of נשׂא addressed to Zion/Jerusalem personified
    as female. 'Lift up' is idiomatic in English and fits the collocation with 'your
    eyes'.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: Adverbial/noun usage indicating looking in every direction. 'All around'
    is natural modern English and preserves the distributive sense.
- source_word: עֵינַיִךְ
  chosen: your eyes
  lexicon: HALOT
  rationale: Literal rendering of the dual/plural form with 2fs suffix; the personified
    addressee is feminine singular.
- source_word: וּרְאִי
  chosen: and see
  alternatives:
  - look
  lexicon: HALOT
  rationale: Second imperative paired with 'lift up your eyes.' 'See' preserves the
    directness of the Hebrew better than smoothing to another 'look'.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: Explicit pronoun retained for emphasis before the following verbs.
- source_word: נִקְבְּצוּ
  chosen: gather together
  alternatives:
  - are gathered
  - assemble
  lexicon: HALOT
  rationale: Niphal perfect/plural of קבץ, here with a passive/reflexive nuance. Present
    English 'gather together' works well in the prophetic scene and pairs naturally
    with the next verb.
- source_word: בָּאוּ לָךְ
  chosen: they come to you
  alternatives:
  - have come to you
  - come to you
  lexicon: HALOT
  rationale: Qal perfect in prophetic description can be rendered with a vivid present
    in English. The lamed marks direction toward Zion.
- source_word: בָנַיִךְ
  chosen: Your sons
  alternatives:
  - your children (sons)
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' and the following parallel specifically
    says 'daughters,' so the gendered pair should be preserved.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from a distance
  lexicon: HALOT
  rationale: Readable modern English preserving the sense of distant return.
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - come
  lexicon: HALOT
  rationale: Imperfect here naturally points forward in the prophetic promise; 'will
    come' communicates expected future arrival.
- source_word: וּבְנֹתַיִךְ
  chosen: and your daughters
  lexicon: HALOT
  rationale: Literal feminine counterpart to 'your sons'; the parallelism should remain
    explicit.
- source_word: עַל צַד
  chosen: on the hip
  alternatives:
  - at the side
  - on the side
  lexicon: HALOT
  rationale: The phrase commonly refers to carrying a child at one's side/hip rather
    than merely standing beside someone. 'On the hip' conveys the concrete image in
    idiomatic English.
- source_word: תֵּאָמַנָה
  chosen: will be carried
  alternatives:
  - will be nursed
  - will be supported
  lexicon: HALOT
  rationale: Niphal of אמן in this context likely denotes being carried/cared for,
    especially with 'on the hip.' 'Will be carried' best fits the maternal/restorative
    imagery and common usage in Isaiah.
