id: ISA.60.12
reference: Isaiah 60:12
source:
  edition: WLC
  text: כִּֽי הַ/גּ֧וֹי וְ/הַ/מַּמְלָכָ֛ה אֲשֶׁ֥ר לֹא יַעַבְד֖וּ/ךְ יֹאבֵ֑דוּ וְ/הַ/גּוֹיִ֖ם
    חָרֹ֥ב יֶחֱרָֽבוּ־־׃
translation:
  text: For the nation and the kingdom that will not serve you will perish, and the
    nations will be utterly laid waste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the nation and the kingdom ... and the nations''; the verse moves
      from singular to plural for rhetorical effect.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will surely be ruined.' The Hebrew uses an infinitive absolute with
      a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanatory ground for the preceding promises/judgments.
    'For' preserves the connective force in natural English.
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - the people
  - the Gentile nation
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation/people.' Singular here is retained because
    the Hebrew pairs singular 'nation' with singular 'kingdom' before moving to plural
    'nations' in the second clause.
- source_word: הַמַּמְלָכָה
  chosen: the kingdom
  alternatives:
  - the realm
  - the royal dominion
  lexicon: HALOT
  rationale: Standard rendering of מַמְלָכָה. 'Kingdom' is both accurate and idiomatic
    in prophetic judgment language.
- source_word: אֲשֶׁר לֹא יַעַבְדוּךְ
  chosen: that will not serve you
  alternatives:
  - which do not serve you
  - that refuse to serve you
  lexicon: HALOT
  rationale: עבד in the qal commonly means 'serve/work for.' Future-like English ('will
    not serve') fits the yiqtol in this prophetic context. 'Refuse' would add volitional
    nuance not explicit in the verb.
- source_word: יֹאבֵדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: אבד often denotes perishing or coming to ruin. 'Will perish' preserves
    the broad sense without over-specifying the mechanism.
- source_word: וְהַגּוֹיִם
  chosen: and the nations
  alternatives:
  - yes, the nations
  - and those nations
  lexicon: HALOT
  rationale: The plural marks a shift from the representative singular to a broader
    plural statement. 'And the nations' keeps the Hebrew coordination straightforwardly.
- source_word: חָרֹב יֶחֱרָבוּ
  chosen: will be utterly laid waste
  alternatives:
  - will surely be ruined
  - will be completely devastated
  - will be desolated with desolation
  lexicon: HALOT
  rationale: This is an infinitive absolute plus finite verb of the same root (חרב),
    an intensifying construction. 'Will be utterly laid waste' communicates the emphatic
    total devastation in idiomatic English better than a wooden repetition.
