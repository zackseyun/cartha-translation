theological_decisions:
- issue: Referent of the second-person feminine singular suffix in 'serve you'
  chosen_reading: Retained as 'you' without interpretive expansion
  alternative_readings:
  - serve Zion
  - serve Jerusalem
  - serve the restored people of God represented by the city
  rationale: The immediate context addresses Zion/Jerusalem in the feminine singular.
    The translation preserves the direct address rather than resolving the imagery
    into a theological abstraction.
  doctrine_reference: Preserve theological tension rather than resolve it.
