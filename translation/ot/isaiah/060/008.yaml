id: ISA.60.8
reference: Isaiah 60:8
source:
  edition: WLC
  text: מִי אֵ֖לֶּה כָּ/עָ֣ב תְּעוּפֶ֑ינָה וְ/כַ/יּוֹנִ֖ים אֶל אֲרֻבֹּתֵי/הֶֽם־־׃
translation:
  text: Who are these that fly like a cloud, and like doves to their windows?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their dovecotes'—that is, the openings or windows of a dovehouse.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Who are
  lexicon: HALOT
  rationale: Interrogative pronoun introducing an exclamatory question. English requires
    the copula with the following demonstrative, but the lexical force begins with
    'Who'.
- source_word: אֵלֶּה
  chosen: are these
  alternatives:
  - these
  lexicon: HALOT
  rationale: Demonstrative plural, functioning with implied copula in Hebrew. Rendered
    'are these' for natural English while preserving the deictic sense.
- source_word: כָּעָב
  chosen: like a cloud
  alternatives:
  - as a cloud
  lexicon: HALOT
  rationale: Comparative כ plus עָב ('cloud'). Singular retained, likely evoking a
    massed formation rather than multiple discrete clouds.
- source_word: תְּעוּפֶינָה
  chosen: fly
  alternatives:
  - are flying
  - fly swiftly
  lexicon: HALOT
  rationale: Qal imperfect 3fp from עוּף, 'to fly.' Present English 'fly' fits the
    vivid prophetic question better than a future 'will fly' here.
- source_word: וְכַיּוֹנִים
  chosen: and like doves
  alternatives:
  - and as doves
  lexicon: HALOT
  rationale: Conjunction plus comparative כ and plural noun 'doves.' Kept the simile
    explicit and parallel to 'like a cloud.'
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  - into
  lexicon: HALOT
  rationale: Basic directional preposition. 'To' is the most natural with the image
    of doves homing in on their openings.
- source_word: אֲרֻבֹּתֵיהֶם
  chosen: their windows
  alternatives:
  - their dovecotes
  - their openings
  - their lattice windows
  lexicon: HALOT
  rationale: Plural of אֲרֻבָּה, literally window/opening/lattice. In this simile
    of doves returning home, many interpreters understand dovecote openings; however,
    the lexical base is 'windows/openings.' Main text uses 'windows' as the most direct
    lexical rendering, with the contextual alternative preserved in a footnote.
