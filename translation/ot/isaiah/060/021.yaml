theological_decisions:
- issue: Referent and person shift in 'the shoot of his planting, the work of my hands'
  chosen_reading: 'Retain the Masoretic person shift as translated: ''the shoot of
    his planting, the work of my hands.'''
  alternative_readings:
  - 'Harmonize to first person: ''the shoot of my planting'''
  - Treat the phrase more dynamically as a collective apposition without highlighting
    the shift
  rationale: The Hebrew as provided contains a 3ms suffix on מטעו followed by 1cs
    on ידי. Rather than emending or smoothing the text, the translation preserves
    the received wording. The shift does not create doctrinal difficulty and may reflect
    prophetic style or appositional compression. Transparency favors retaining it
    in the main text and noting the alternative.
  doctrine_reference: Translation philosophy §1, §3, §5
