id: ISA.60.21
reference: Isaiah 60:21
source:
  edition: WLC
  text: וְ/עַמֵּ/ךְ֙ כֻּלָּ֣/ם צַדִּיקִ֔ים לְ/עוֹלָ֖ם יִ֣ירְשׁוּ אָ֑רֶץ נֵ֧צֶר מטע/ו
    מַעֲשֵׂ֥ה יָדַ֖/י לְ/הִתְפָּאֵֽר׃
translation:
  text: And all your people will be righteous; forever they will possess the land,
    the shoot of his planting, the work of my hands, that I may be glorified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will inherit the land.' The Hebrew verb can mean 'inherit' or 'possess.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth.' The Hebrew אֶרֶץ can mean 'land' or 'earth'; 'land' fits
      the restoration context more specifically.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the shoot of his planting.'' Some interpreters or textual traditions
      smooth this to ''my planting'' because the next phrase reads ''the work of my
      hands,'' but the main text preserves the person shift of the Masoretic Text.'
    reason: textual_variant
lexical_decisions:
- source_word: וְעַמֵּךְ
  chosen: And all your people
  alternatives:
  - And your people
  lexicon: HALOT
  rationale: 'The conjunction וְ is carried as ''And.'' עַם with 2fs suffix addresses
    Zion/Jerusalem as feminine singular: ''your people.'' The following כֻּלָּם is
    brought forward in English as ''all your people'' for natural syntax while preserving
    totality.'
- source_word: כֻּלָּם
  chosen: all
  alternatives:
  - all of them
  - every one of them
  lexicon: HALOT
  rationale: Expresses the comprehensive scope of the people in view. 'All' is concise
    and idiomatic in English.
- source_word: צַדִּיקִים
  chosen: righteous
  alternatives:
  - in the right
  - just
  lexicon: HALOT
  rationale: The adjective denotes moral/right covenant standing. 'Righteous' is the
    standard biblical rendering and best preserves theological weight here.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: Conveys enduring permanence. 'Forever' is natural modern English and
    fits the eschatological promise.
- source_word: יִירְשׁוּ
  chosen: will possess
  alternatives:
  - will inherit
  - will take possession of
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess. Here, with אָרֶץ in a restoration promise,
    'possess' communicates settled possession clearly in English. 'Inherit' is possible
    and worth preserving in a footnote because of biblical resonance.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In Isaiah's restoration context, 'land' is the more immediate sense,
    likely the restored land of God's people. 'Earth' is lexically possible but less
    contextually specific; preserved in a footnote as an alternative nuance.
- source_word: נֵצֶר
  chosen: the shoot
  alternatives:
  - branch
  - sprout
  lexicon: HALOT
  rationale: נֵצֶר denotes a shoot/sprout from a plant. 'Shoot' is concrete and natural.
    'Branch' is possible, but in English it may evoke a larger limb rather than new
    growth.
- source_word: מטעו
  chosen: of his planting
  alternatives:
  - that he planted
  - his planted shoot
  lexicon: HALOT
  rationale: The suffix is 3ms in the provided morphology, so the phrase is rendered
    straightforwardly as 'of his planting.' This yields the sense that the people
    are the shoot resulting from his planting. Because the following phrase shifts
    to first person ('my hands'), the verse likely compresses appositional images
    rather than requiring strict uniformity of person.
- source_word: מַעֲשֵׂה יָדַי
  chosen: the work of my hands
  alternatives:
  - my handiwork
  - what my hands made
  lexicon: HALOT
  rationale: A common biblical expression for what God has made or fashioned. 'The
    work of my hands' preserves the concrete imagery and solemn tone.
- source_word: לְהִתְפָּאֵר
  chosen: that I may be glorified
  alternatives:
  - for glory
  - to display my beauty
  - to glorify myself
  lexicon: HALOT
  rationale: The hitpael of פאר here expresses the result/purpose of God's self-display
    in glory. 'That I may be glorified' is idiomatic and preserves the theological
    sense without awkward reflexive English.
