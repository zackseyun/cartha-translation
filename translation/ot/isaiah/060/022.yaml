theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preserving the tension between appointed timing and divine hastening
  chosen_reading: in its time I will hasten it
  alternative_readings:
  - when the time comes, I will quickly do it
  - at the right time I will bring it swiftly
  rationale: The Hebrew intentionally juxtaposes appointed timing with divine acceleration. The translation preserves that tension rather than resolving it into a smoother paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
