id: ISA.60.22
reference: Isaiah 60:22
source:
  edition: WLC
  text: הַ/קָּטֹן֙ יִֽהְיֶ֣ה לָ/אֶ֔לֶף וְ/הַ/צָּעִ֖יר לְ/ג֣וֹי עָצ֑וּם אֲנִ֥י יְהוָ֖ה בְּ/עִתָּ֥/הּ אֲחִישֶֽׁ/נָּה׃ס
translation:
  text: The smallest will become a thousand, and the least a mighty nation. I am Yahweh; in its time I will hasten it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the little one' / 'the least' for 'the smallest.'
    reason: lexical_alternative
  - marker: b
    text: '''A thousand'' may also be understood by some as ''a clan,'' but the numerical sense fits the growth parallelism best here.'
    reason: lexical_alternative
  - marker: c
    text: Or 'at its appointed time I will hasten it.' The Hebrew preserves a tension between fixed timing and swift fulfillment.
    reason: alternative_reading
lexical_decisions:
- source_word: הַקָּטֹן
  chosen: the smallest
  alternatives:
  - the little one
  - the least
  lexicon: HALOT
  rationale: The adjective קָטֹן denotes smallness or insignificance. In this parallel line it functions substantivally for the smallest member/group. 'The smallest' is natural English and preserves the comparative sense of insignificance.
- source_word: יִהְיֶה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: היה can mean 'be' or 'become.' Here, with resultative ל plus a numerical/social increase, 'will become' better conveys transformation from smallness to abundance.
- source_word: לָאֶלֶף
  chosen: a thousand
  alternatives:
  - a clan
  - a thousandfold
  lexicon: HALOT
  rationale: אֶלֶף most basically means 'thousand.' Although in some contexts it can denote a clan or military unit, the parallelism with 'mighty nation' and the growth motif favor the straightforward numerical sense here.
- source_word: הַצָּעִיר
  chosen: the least
  alternatives:
  - the small one
  - the youngest
  lexicon: HALOT
  rationale: צָעִיר can mean small, insignificant, or younger. In this context of comparative insignificance parallel to הַקָּטֹן, 'the least' best captures status rather than age.
- source_word: לְגוֹי עָצוּם
  chosen: a mighty nation
  alternatives:
  - a strong nation
  - a powerful people
  lexicon: HALOT
  rationale: גּוֹי is commonly 'nation,' and עָצוּם means mighty/strong. 'Mighty nation' is idiomatic and preserves the scale of promised expansion.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I, the LORD
  lexicon: HALOT
  rationale: This is the standard self-identification formula. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: בְּעִתָּהּ
  chosen: in its time
  alternatives:
  - in due time
  - at its appointed time
  lexicon: HALOT
  rationale: The phrase means 'in its time' or 'at its proper time.' The feminine suffix most naturally refers to the promised event/fulfillment. 'In its time' is concise and preserves the temporal nuance.
- source_word: אֲחִישֶׁנָּה
  chosen: I will hasten it
  alternatives:
  - I will do it quickly
  - I will speed it up
  lexicon: HALOT
  rationale: The Hiphil of חושׁ means to make haste or hasten. With the object suffix, 'I will hasten it' preserves both divine agency and the tension with 'in its time' without over-paraphrasing.
