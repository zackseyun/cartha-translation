theological_decisions:
- issue: Whether to make Zion/Jerusalem explicit as the addressee
  chosen_reading: Retain the second-person feminine 'you/your' without supplying 'Jerusalem'
    in the main text.
  alternative_readings:
  - Foreigners’ sons will rebuild your walls, Jerusalem...
  - '...Zion...'
  rationale: The Hebrew addresses the city personified as feminine, but the proper
    name is not present in this verse. Supplying it would clarify but also add words
    not in the source.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never paraphrase beyond what the source text warrants.'
- issue: How to render the restoration contrast between judgment and mercy
  chosen_reading: Use 'for in my wrath I struck you, but in my favor I have had compassion
    on you.'
  alternative_readings:
  - for in my wrath I struck you, but in my goodwill I showed you mercy
  rationale: This preserves the theological tension in the Hebrew between divine judgment
    and compassionate restoration without softening either side or importing a systematic
    explanation.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
