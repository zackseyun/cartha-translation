id: ISA.60.10
reference: Isaiah 60:10
source:
  edition: WLC
  text: וּ/בָנ֤וּ בְנֵֽי נֵכָר֙ חֹמֹתַ֔יִ/ךְ וּ/מַלְכֵי/הֶ֖ם יְשָׁרְת֑וּ/נֶךְ כִּ֤י
    בְ/קִצְפִּ/י֙ הִכִּיתִ֔י/ךְ וּ/בִ/רְצוֹנִ֖/י רִֽחַמְתִּֽי/ךְ־׃
translation:
  text: Foreigners’ sons will rebuild your walls, and their kings will minister to
    you; for in my wrath I struck you, but in my favor I have had compassion on you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sons of foreigners'; the Hebrew expression can function idiomatically
      for foreigners more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'will serve you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in my goodwill' / 'in my pleasure.'
    reason: lexical_alternative
  - marker: d
    text: Or 'I have shown you mercy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָנ֤וּ
  chosen: will rebuild
  alternatives:
  - will build
  lexicon: HALOT
  rationale: The verb means 'build,' but with 'your walls' in context, 'rebuild' naturally
    conveys restoration without adding substantial content beyond the prophetic setting.
- source_word: בְנֵֽי נֵכָר
  chosen: Foreigners’ sons
  alternatives:
  - sons of foreigners
  - foreigners
  lexicon: HALOT
  rationale: Formally this is 'sons of a foreigner/foreign land,' an idiom for foreigners
    or foreign peoples. 'Foreigners’ sons' preserves the Hebrew expression more closely
    while remaining intelligible.
- source_word: חֹמֹתַ֔יִךְ
  chosen: your walls
  lexicon: HALOT
  rationale: Straightforward plural noun with 2fs suffix, referring to Zion/Jerusalem
    personified as feminine.
- source_word: וּמַלְכֵיהֶם
  chosen: and their kings
  lexicon: HALOT
  rationale: Simple construct with 3mp suffix; retained directly.
- source_word: יְשָׁרְתוּנֶךְ
  chosen: will minister to you
  alternatives:
  - will serve you
  lexicon: HALOT
  rationale: The piel of שׁרת often denotes ministerial or attendant service, sometimes
    in elevated or official contexts. 'Minister to you' preserves that nuance better
    than the flatter 'serve you.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the restoration statement; 'for' fits English
    prophetic style well.
- source_word: בְקִצְפִּי
  chosen: in my wrath
  alternatives:
  - in my anger
  lexicon: HALOT
  rationale: קצף denotes wrath/anger. 'Wrath' better matches the solemn prophetic
    register.
- source_word: הִכִּיתִיךְ
  chosen: I struck you
  alternatives:
  - I smote you
  - I struck you down
  lexicon: HALOT
  rationale: The hiphil/perfect of נכה commonly means 'strike.' 'I struck you' is
    clear modern English without archaic diction.
- source_word: וּבִרְצוֹנִי
  chosen: but in my favor
  alternatives:
  - but in my goodwill
  - but in my pleasure
  lexicon: HALOT
  rationale: רָצוֹן here conveys favor/good pleasure rather than mere desire. 'In
    my favor' is idiomatic and contrasts well with 'in my wrath.'
- source_word: רִחַמְתִּיךְ
  chosen: I have had compassion on you
  alternatives:
  - I have shown you mercy
  - I have pitied you
  lexicon: HALOT
  rationale: רחם expresses compassionate mercy. 'Have had compassion on you' preserves
    the affective nuance more fully than the simpler 'shown mercy.'
