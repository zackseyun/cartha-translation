id: ISA.60.13
reference: Isaiah 60:13
source:
  edition: WLC
  text: כְּב֤וֹד הַ/לְּבָנוֹן֙ אֵלַ֣יִ/ךְ יָב֔וֹא בְּר֛וֹשׁ תִּדְהָ֥ר וּ/תְאַשּׁ֖וּר
    יַחְדָּ֑ו לְ/פָאֵר֙ מְק֣וֹם מִקְדָּשִׁ֔/י וּ/מְק֥וֹם רַגְלַ֖/י אֲכַבֵּֽד׃
translation:
  text: The glory of Lebanon will come to you—cypress, plane tree, and pine together—to
    beautify the place of my sanctuary, and I will honor the place of my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew names three kinds of trees: cypress, plane tree, and pine. The
      exact species for the second and third terms are uncertain; alternatives include
      ''elm'' and ''box tree.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my footstool.' The Hebrew reads more literally, 'the place of my feet.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּבוֹד
  chosen: glory
  alternatives:
  - splendor
  - wealth
  lexicon: HALOT
  rationale: '''Glory'' best captures the sense of magnificence/honor here, likely
    referring to Lebanon''s famed forest wealth as a mark of splendor brought to Zion.'
- source_word: הַלְּבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Proper place name; transliterated in standard English form.
- source_word: אֵלַיִךְ
  chosen: to you
  alternatives:
  - to you [feminine singular]
  lexicon: HALOT
  rationale: Direct address to Zion/Jerusalem, grammatically feminine singular. English
    normally does not mark the gender in the main text.
- source_word: יָבוֹא
  chosen: will come
  alternatives:
  - will be brought
  lexicon: HALOT
  rationale: Qal imperfect of בוא is straightforwardly 'come.' Passive-like nuance
    is possible contextually, but the active rendering is closer to the Hebrew form.
- source_word: בְּרוֹשׁ
  chosen: cypress
  alternatives:
  - juniper
  - fir
  lexicon: HALOT
  rationale: The exact species is uncertain; 'cypress' is a common modern rendering
    for בְּרוֹשׁ in temple/forest contexts and communicates a valuable timber tree.
- source_word: תִּדְהָר
  chosen: plane tree
  alternatives:
  - elm
  - cypress species
  lexicon: HALOT
  rationale: The species is uncertain. 'Plane tree' is a widely adopted rendering
    in modern translations and preserves the sense of a notable ornamental/forest
    tree without overclaiming certainty.
- source_word: תְאַשּׁוּר
  chosen: pine
  alternatives:
  - box tree
  - ash
  lexicon: HALOT
  rationale: The precise identification is debated. 'Pine' is a common contextual
    rendering among modern translations for a desirable timber tree listed with other
    conifers/hardwoods.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb indicating the trees come collectively.
- source_word: לְפָאֵר
  chosen: to beautify
  alternatives:
  - to adorn
  - to glorify
  lexicon: HALOT
  rationale: Piel infinitive of פאר here denotes making something beautiful/splendid.
    'Beautify' fits the sanctuary context naturally.
- source_word: מְקוֹם מִקְדָּשִׁי
  chosen: the place of my sanctuary
  alternatives:
  - my holy place
  - the site of my sanctuary
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the construct relationship and sacred
    setting. 'Sanctuary' is clearer in modern English than the more ambiguous 'holy
    place' here.
- source_word: וּמְקוֹם רַגְלַי
  chosen: the place of my feet
  alternatives:
  - my footstool
  - the place where my feet rest
  lexicon: HALOT
  rationale: Literally, the Hebrew says 'the place of my feet.' While 'footstool'
    is an interpretive equivalent in related passages, this verse does not use the
    standard noun for footstool, so the more transparent rendering is preferred.
- source_word: אֲכַבֵּד
  chosen: I will honor
  alternatives:
  - I will glorify
  - I will make glorious
  lexicon: HALOT
  rationale: Piel of כבד can mean honor/glorify. 'Honor' avoids awkward repetition
    with the opening 'glory' while still conveying bestowed dignity.
