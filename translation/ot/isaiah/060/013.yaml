theological_decisions:
- issue: Anthropomorphic expression for God's relation to the sanctuary
  chosen_reading: retain 'the place of my feet' in the main text
  alternative_readings:
  - my footstool
  rationale: The Hebrew is more literally 'the place of my feet,' an anthropomorphic
    expression for God's presence associated with the sanctuary. Preserving the literal
    image maintains the text's poetic force and avoids importing a more interpretive
    term not used here.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of the addressee 'you'
  chosen_reading: leave implicit in the main text
  alternative_readings:
  - Zion
  - Jerusalem
  rationale: The feminine singular addressee is clear from context as Zion/Jerusalem,
    but the verse itself does not name her. Leaving the referent implicit preserves
    the discourse flow without adding words not present in the Hebrew.
  doctrine_reference: Translation philosophy §1
