theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the elevated poetic register of Isaiah and preserves
    continuity with Jewish reverence tradition and LXX-influenced Christian usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of אֶרֶץ
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The verse contrasts darkness over the earth/peoples with the LORD's rising
    over Zion. A universal scope best fits the poetic parallelism and eschatological
    horizon, without importing more specificity than the Hebrew warrants.
