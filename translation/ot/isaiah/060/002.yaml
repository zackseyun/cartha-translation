id: ISA.60.2
reference: Isaiah 60:2
source:
  edition: WLC
  text: כִּֽי הִנֵּ֤ה הַ/חֹ֨שֶׁךְ֙ יְכַסֶּה אֶ֔רֶץ וַ/עֲרָפֶ֖ל לְאֻמִּ֑ים וְ/עָלַ֨יִ/ךְ֙
    יִזְרַ֣ח יְהוָ֔ה וּ/כְבוֹד֖/וֹ עָלַ֥יִ/ךְ יֵרָאֶֽה־־׃
translation:
  text: For look, darkness will cover the earth, and thick darkness the peoples; but
    the LORD will rise upon you, and his glory will appear over you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deep darkness' for 'thick darkness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the land' for 'the earth.'
    reason: alternative_reading
  - marker: c
    text: Or 'will be seen over you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding summons in context;
    'For' preserves the connective force better than an exclamatory rendering alone.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks vivid attention. 'Look' is readable modern English and preserves
    the deictic force without archaic tone; 'behold' is possible but less natural
    per translation philosophy.
- source_word: הַחֹשֶׁךְ
  chosen: darkness
  alternatives:
  - the darkness
  - gloom
  lexicon: HALOT
  rationale: The noun denotes darkness in a broad sense. English idiom prefers anarthrous
    'darkness' here, though the Hebrew has the article.
- source_word: יְכַסֶּה
  chosen: will cover
  alternatives:
  - will conceal
  - will overwhelm
  lexicon: HALOT
  rationale: The verb כסה commonly means 'cover.' This preserves the concrete image
    of darkness spreading over the earth without overinterpreting it as metaphorical
    oppression.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In parallel with 'the peoples,' the global sense fits best here. 'Land'
    could suggest a more local territory, but the verse contrasts worldwide darkness
    with Zion's illumination.
- source_word: עֲרָפֶל
  chosen: thick darkness
  alternatives:
  - deep darkness
  - gloom
  lexicon: HALOT
  rationale: The term denotes dense cloudlike darkness. 'Thick darkness' preserves
    the intensified parallel with חֹשֶׁךְ and is a standard, clear English equivalent.
- source_word: לְאֻמִּים
  chosen: the peoples
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: Refers to peoples/nations collectively. 'The peoples' better mirrors
    the plural ethnic groups in poetic parallelism, while 'nations' is possible but
    slightly more political.
- source_word: וְעָלַיִךְ
  chosen: upon you
  alternatives:
  - over you
  - on you
  lexicon: HALOT
  rationale: The preposition עַל here expresses movement/rest over Zion personified
    as feminine singular. 'Upon you' fits the elevated style and matches the imagery
    of divine light dawning over her.
- source_word: יִזְרַח
  chosen: will rise
  alternatives:
  - will dawn
  - will shine forth
  lexicon: HALOT
  rationale: The verb is used of the sun rising or light dawning. 'Will rise' preserves
    the solar metaphor and pairs naturally with 'upon you.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the project's stated policy.
- source_word: וּכְבוֹדוֹ
  chosen: his glory
  alternatives:
  - his splendor
  - his honor
  lexicon: HALOT
  rationale: כָּבוֹד in this context denotes the manifest divine glory, not merely
    abstract honor. 'His glory' preserves the theological weight and biblical resonance.
- source_word: יֵרָאֶה
  chosen: will appear
  alternatives:
  - will be seen
  - will become visible
  lexicon: HALOT
  rationale: Niphal of ראה can mean 'be seen/appear.' 'Will appear' is natural English
    and conveys manifestation, especially of divine glory, without implying merely
    human perception.
