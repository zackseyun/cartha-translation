id: ISA.60.6
reference: Isaiah 60:6
source:
  edition: WLC
  text: שִֽׁפְעַ֨ת גְּמַלִּ֜ים תְּכַסֵּ֗/ךְ בִּכְרֵ֤י מִדְיָן֙ וְ/עֵיפָ֔ה כֻּלָּ֖/ם מִ/שְּׁבָ֣א יָבֹ֑אוּ זָהָ֤ב וּ/לְבוֹנָה֙ יִשָּׂ֔אוּ וּ/תְהִלֹּ֥ת יְהוָ֖ה יְבַשֵּֽׂרוּ׃
translation:
  text: A multitude of camels will cover you, the young camels of Midian and Ephah; all of them will come from Sheba. They will carry gold and frankincense, and they will proclaim the praises of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dromedaries of Midian and Ephah.' The Hebrew term refers to young camels.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will announce good news of the praises of the LORD.' The verb can carry the sense of heralding good news.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁפְעַת
  chosen: A multitude of
  alternatives:
  - an abundance of
  - a flood of
  lexicon: HALOT
  rationale: The noun denotes abundance or profusion. 'A multitude of' is natural in English and fits the image of numerous camels filling the scene without over-literalizing the metaphor as 'flood.'
- source_word: גְּמַלִּים
  chosen: camels
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the plural noun.
- source_word: תְּכַסֵּךְ
  chosen: will cover you
  alternatives:
  - will overwhelm you
  - will fill you
  lexicon: HALOT
  rationale: Piel of כסה commonly means 'cover.' The 2fs suffix addresses Zion/Jerusalem as feminine singular. 'Cover you' preserves the vivid imagery better than a more interpretive gloss.
- source_word: בִּכְרֵי
  chosen: the young camels of
  alternatives:
  - the dromedaries of
  lexicon: HALOT
  rationale: The term refers to young camels. 'Dromedaries' is traditional in some versions, but 'young camels' is clearer modern English and better reflects the lexical sense without requiring zoological terminology.
- source_word: מִדְיָן וְעֵיפָה
  chosen: Midian and Ephah
  lexicon: HALOT
  rationale: These are place/people names and are transliterated per translation philosophy.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all
  lexicon: HALOT
  rationale: The pronominal suffix is explicit in Hebrew; 'all of them' preserves that emphasis.
- source_word: מִשְּׁבָא
  chosen: from Sheba
  lexicon: HALOT
  rationale: Proper name transliterated. The preposition is retained to show origin.
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - shall come
  lexicon: HALOT
  rationale: Simple future sense in context of prophetic vision.
- source_word: זָהָב וּלְבוֹנָה
  chosen: gold and frankincense
  alternatives:
  - gold and incense
  lexicon: HALOT
  rationale: לְבוֹנָה specifically denotes frankincense, not incense in general. The more precise term preserves the lexical detail and intertextual resonance.
- source_word: יִשָּׂאוּ
  chosen: will carry
  alternatives:
  - will bear
  - will bring
  lexicon: HALOT
  rationale: The verb literally means 'lift/carry/bear.' 'Will carry' is a clear, minimally interpretive rendering in context of transported tribute. 'Bring' is possible but slightly more dynamic.
- source_word: וּתְהִלֹּת יְהוָה
  chosen: the praises of the LORD
  alternatives:
  - praise to the LORD
  - the praiseworthy deeds of the LORD
  lexicon: HALOT
  rationale: The plural 'praises' is retained. The phrase can denote praises directed to the LORD or praises about the LORD; in context of proclamation, 'the praises of the LORD' preserves the Hebrew compactness and ambiguity.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְבַשֵּׂרוּ
  chosen: they will proclaim
  alternatives:
  - they will announce good news of
  - they will herald
  lexicon: HALOT
  rationale: The Piel of בשר is to announce good news. In this context, with 'the praises of the LORD' as object, 'proclaim' is idiomatic English while still reflecting public declaration. The more wooden 'announce good news of' is possible but awkward.
