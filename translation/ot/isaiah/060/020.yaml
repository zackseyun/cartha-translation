id: ISA.60.20
reference: Isaiah 60:20
source:
  edition: WLC
  text: לֹא יָב֥וֹא עוֹד֙ שִׁמְשֵׁ֔/ךְ וִ/ירֵחֵ֖/ךְ לֹ֣א יֵאָסֵ֑ף כִּ֣י יְהוָ֗ה יִֽהְיֶה לָּ/ךְ֙ לְ/א֣וֹר עוֹלָ֔ם וְ/שָׁלְמ֖וּ יְמֵ֥י אֶבְלֵֽ/ךְ־־׃
translation:
  text: Your sun will no longer go down, and your moon will not withdraw; for Yahweh will be your everlasting light, and the days of your mourning will be ended.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will no longer set.' The Hebrew literally says 'will no longer come,' an idiom here for the sun's going down.
    reason: lexical_alternative
  - marker: b
    text: Or 'your moon will not be gathered in,' that is, withdrawn or removed from shining.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָב֥וֹא עוֹד
  chosen: will no longer go down
  alternatives:
  - will no longer set
  - will no longer come
  lexicon: HALOT
  rationale: Although the verb is literally 'come,' with 'sun' as subject in context it idiomatically refers to the sun's setting/going down. 'Go down' is natural English and preserves the image without over-paraphrase; 'set' is possible but slightly more interpretive.
- source_word: שִׁמְשֵׁךְ
  chosen: your sun
  lexicon: HALOT
  rationale: Straightforward possessive construction addressed to feminine singular Zion/Jerusalem in context.
- source_word: וִירֵחֵךְ
  chosen: and your moon
  lexicon: HALOT
  rationale: Direct rendering of the coordinated noun with second feminine singular suffix.
- source_word: יֵאָסֵף
  chosen: will not withdraw
  alternatives:
  - will not be gathered in
  - will not wane
  - will not disappear
  lexicon: HALOT
  rationale: The Niphal of אסף is literally 'be gathered/removed.' In parallel with the sun not going down, the sense is that the moon will not be withdrawn from shining. 'Withdraw' preserves the metaphor and avoids flattening it to a purely astronomical term, while 'wane' is possible but less directly tied to the Hebrew root.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: '''For'' naturally introduces the ground or explanation for the preceding promise.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יִהְיֶה לָךְ לְאוֹר עוֹלָם
  chosen: will be your everlasting light
  alternatives:
  - will be for you an everlasting light
  - will be your eternal light
  lexicon: HALOT
  rationale: This compresses the Hebrew prepositional phrase into idiomatic English while preserving the predicate sense. 'Everlasting' fits עוֹלָם well in prophetic context and is stylistically natural.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - eternal
  - perpetual
  lexicon: HALOT
  rationale: In this context of enduring eschatological blessing, 'everlasting' communicates unending duration in accessible English.
- source_word: וְשָׁלְמוּ
  chosen: will be ended
  alternatives:
  - will be completed
  - will be finished
  - will be fulfilled
  lexicon: HALOT
  rationale: From שלם, the sense here is that the period of mourning will come to its full end. 'Will be ended' is idiomatic in English for 'the days ... are complete/finished' and best fits the context of grief ceasing.
- source_word: יְמֵי אֶבְלֵךְ
  chosen: the days of your mourning
  alternatives:
  - your days of mourning
  - the days of your grief
  lexicon: HALOT
  rationale: '''Mourning'' is the most direct rendering of אבל and preserves the lament context better than the broader ''grief.'''
