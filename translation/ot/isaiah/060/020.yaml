theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Eschatological imagery of sun and moon
  chosen_reading: Retain the cosmic imagery literally rather than reducing it to a mere metaphor of comfort
  alternative_readings:
  - Interpret as purely figurative prosperity language
  rationale: The verse presents prophetic imagery in which created lights are surpassed by the LORD's own everlasting light. The translation preserves the imagery and theological tension without forcing a narrower interpretive scheme.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
