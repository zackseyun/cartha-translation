theological_decisions:
- issue: Rendering the homage shown to Zion/Jerusalem
  chosen_reading: human enemies bow in submission before restored Zion, not offering divine worship to the city
  alternative_readings:
  - the verb could be overread as 'worship'
  rationale: Although השתחוה can denote worship in divine contexts, here the recipients are the people/city of God. The translation therefore uses 'bow down' to preserve the act of homage without implying idolatrous worship.
  doctrine_reference: Translation philosophy §3
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
