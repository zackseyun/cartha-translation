id: ISA.60.14
reference: Isaiah 60:14
source:
  edition: WLC
  text: וְ/הָלְכ֨וּ אֵלַ֤יִ/ךְ שְׁח֨וֹחַ֙ בְּנֵ֣י מְעַנַּ֔יִ/ךְ וְ/הִֽשְׁתַּחֲו֛וּ עַל כַּפּ֥וֹת רַגְלַ֖יִ/ךְ כָּל מְנַֽאֲצָ֑יִ/ךְ וְ/קָ֤רְאוּ לָ/ךְ֙ עִ֣יר יְהוָ֔ה צִיּ֖וֹן קְד֥וֹשׁ יִשְׂרָאֵֽל־־׃
translation:
  text: The sons of those who afflicted you will come to you bowed down, and all who despised you will bow down at the soles of your feet; and they will call you The City of Yahweh, Zion of the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The children of your oppressors will come to you bowed down.' The Hebrew is literally 'the sons of those who afflicted you.'
    reason: lexical_alternative
  - marker: b
    text: '''Bow down'' here expresses submission or homage to Zion, not divine worship of the city.'
    reason: cultural_note
  - marker: c
    text: 'Hebrew: ''Zion of the Holy One of Israel,'' a title identifying Zion as belonging to the Holy One of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁחֹחַ
  chosen: bowed down
  alternatives:
  - stooping
  - in humiliation
  lexicon: HALOT
  rationale: The participial form describes a physically lowered posture accompanying approach. 'Bowed down' is idiomatic modern English and preserves both the bodily image and the implied submission better than the less natural 'stooping.'
- source_word: בְּנֵי מְעַנַּיִךְ
  chosen: The sons of those who afflicted you
  alternatives:
  - The children of your oppressors
  - The sons of your oppressors
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of,' and the doctrine favors gender-accurate rendering where the source is masculine. מְעַנַּיִךְ comes from ענה in the sense of afflicting/oppressing. 'Afflicted' is chosen over 'oppressed' to stay close to the verbal sense while remaining natural.
- source_word: וְהִשְׁתַּחֲווּ
  chosen: will bow down
  alternatives:
  - will prostrate themselves
  - will worship
  lexicon: HALOT
  rationale: The verb often denotes prostration and can in some contexts imply worship, but here the object is Zion/Jerusalem, so the sense is homage/submission rather than divine worship. 'Bow down' preserves the physical and political sense without importing cultic worship.
- source_word: עַל כַּפּוֹת רַגְלַיִךְ
  chosen: at the soles of your feet
  alternatives:
  - at your footsoles
  - at your feet
  lexicon: HALOT
  rationale: כַּפּוֹת literally refers to the soles/palms; with 'feet' it means the soles of the feet. 'At the soles of your feet' preserves the vivid idiom of abasement more precisely than the flatter 'at your feet.'
- source_word: מְנַאֲצָיִךְ
  chosen: who despised you
  alternatives:
  - who spurned you
  - who treated you with contempt
  lexicon: HALOT
  rationale: From נאץ, expressing contempt or scorn. 'Despised' is concise, natural, and strong enough to reflect the hostility in context.
- source_word: עִיר יְהוָה
  chosen: The City of the LORD
  alternatives:
  - the city of the LORD
  lexicon: HALOT
  rationale: A titular designation is in view, so capitalization of 'City' is appropriate in English. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: צִיּוֹן קְדוֹשׁ יִשְׂרָאֵל
  chosen: Zion of the Holy One of Israel
  alternatives:
  - Zion, the Holy One of Israel
  - Zion belonging to the Holy One of Israel
  lexicon: HALOT
  rationale: The appositional sequence is compressed Hebrew. Rendering it as a genitival title in English best captures the sense that Zion belongs to or is identified with the Holy One of Israel. This avoids the misleading reading that Zion itself is 'the Holy One of Israel.'
- source_word: וְקָרְאוּ לָךְ
  chosen: they will call you
  alternatives:
  - they will name you
  - they will proclaim you
  lexicon: HALOT
  rationale: The idiom means to designate by a title. 'Call you' is the most straightforward and idiomatic English equivalent.
