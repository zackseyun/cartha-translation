theological_decisions:
- issue: Sense of גאון in a restoration oracle
  chosen_reading: Rendered as 'pride' in the sense of honored status or object of
    glory, not sinful arrogance.
  alternative_readings:
  - majesty
  - glory
  - exaltation
  rationale: The context is YHWH's restorative promise to Zion, so the term denotes
    elevated honor bestowed by God. The translation avoids importing a negative moral
    sense while preserving the lexical force.
  doctrine_reference: Translation philosophy §1, §5
