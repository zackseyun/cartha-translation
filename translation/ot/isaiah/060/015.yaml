id: ISA.60.15
reference: Isaiah 60:15
source:
  edition: WLC
  text: תַּ֧חַת הֱיוֹתֵ֛/ךְ עֲזוּבָ֥ה וּ/שְׂנוּאָ֖ה וְ/אֵ֣ין עוֹבֵ֑ר וְ/שַׂמְתִּי/ךְ֙
    לִ/גְא֣וֹן עוֹלָ֔ם מְשׂ֖וֹשׂ דּ֥וֹר וָ/דֽוֹר׃
translation:
  text: Instead of your being forsaken and hated, with no one passing through, I will
    make you an everlasting pride, a joy from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an everlasting majesty' or 'an everlasting glory.' The Hebrew term can
      denote exaltation, majesty, or pride in the sense of honored status.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: Instead of
  alternatives:
  - In place of
  - Rather than
  lexicon: HALOT
  rationale: 'Introduces a reversal or exchange: the former condition is replaced
    by the promised future state. ''Instead of'' is idiomatic and preserves the contrast.'
- source_word: הֱיוֹתֵךְ
  chosen: your being
  alternatives:
  - you being
  - your becoming
  lexicon: HALOT
  rationale: The infinitive construct with 2fs suffix functions substantivally, introducing
    the prior state of Zion/Jerusalem. 'Your being' is natural English and keeps the
    nominal force.
- source_word: עֲזוּבָה
  chosen: forsaken
  alternatives:
  - abandoned
  - deserted
  lexicon: HALOT
  rationale: '''Forsaken'' is a standard and weighty rendering for עזב in covenantal/restoration
    contexts, fitting Isaiah''s diction without sounding archaic.'
- source_word: שְׂנוּאָה
  chosen: hated
  alternatives:
  - despised
  - rejected
  lexicon: HALOT
  rationale: The passive participle straightforwardly denotes being hated. 'Despised'
    is possible but weaker and more interpretive than the lexical sense.
- source_word: וְאֵין עוֹבֵר
  chosen: with no one passing through
  alternatives:
  - and no one passing by
  - with none passing through
  lexicon: HALOT
  rationale: The phrase depicts desolation and abandonment, likely of a city with
    no traffic or visitors. 'Passing through' preserves the imagery better than a
    more abstract paraphrase.
- source_word: וְשַׂמְתִּיךְ
  chosen: I will make you
  alternatives:
  - I will set you
  - I will appoint you
  lexicon: HALOT
  rationale: In this context שׂים + ל expresses causing or making someone into something.
    'I will make you' is the clearest natural English equivalent.
- source_word: לִגְאוֹן
  chosen: an everlasting pride
  alternatives:
  - for everlasting majesty
  - for everlasting exaltation
  - for everlasting glory
  lexicon: HALOT
  rationale: גאון can denote exaltation, majesty, or pride. Here it refers to the
    city's elevated, honored status. 'Pride' works idiomatically in English for something
    that is a source of honor, though not in a sinful sense.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - forever
  - eternal
  lexicon: HALOT
  rationale: Modifies the transformed status as enduring into the indefinite future.
    'Everlasting' fits prophetic style and reads naturally.
- source_word: מְשׂוֹשׂ
  chosen: a joy
  alternatives:
  - rejoicing
  - a delight
  - gladness
  lexicon: HALOT
  rationale: The noun denotes joy or rejoicing. 'A joy' fits the predicative structure
    with 'I will make you' and parallels 'an everlasting pride.'
- source_word: דּוֹר וָדוֹר
  chosen: from generation to generation
  alternatives:
  - for generation after generation
  - to all generations
  lexicon: HALOT
  rationale: This Hebrew idiom expresses continuity across successive generations.
    'From generation to generation' is idiomatic English and preserves the repetitive
    force.
