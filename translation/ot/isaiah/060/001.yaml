id: ISA.60.1
reference: Isaiah 60:1
source:
  edition: WLC
  text: ק֥וּמִי א֖וֹרִי כִּ֣י בָ֣א אוֹרֵ֑/ךְ וּ/כְב֥וֹד יְהוָ֖ה עָלַ֥יִ/ךְ זָרָֽח׃
translation:
  text: Arise, shine, for your light has come, and the glory of the LORD has risen
    upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Rise, be radiant'; the Hebrew imperative can carry the sense of becoming
      bright or giving light.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' following the project's standard for
      the divine name.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֥וּמִי
  chosen: Arise
  alternatives:
  - Rise
  - Get up
  lexicon: HALOT
  rationale: Qal imperative 2fs from קום, a direct summons to stand up or rise. 'Arise'
    preserves the elevated prophetic tone better than the more colloquial 'get up,'
    while remaining natural English.
- source_word: א֖וֹרִי
  chosen: shine
  alternatives:
  - be radiant
  - give light
  lexicon: HALOT
  rationale: Qal imperative 2fs from אור. In this context addressed to Zion/Jerusalem
    as feminine singular, the imperative calls for visible radiance. 'Shine' is the
    most idiomatic and traditional rendering and fits the parallel with 'your light
    has come.'
- source_word: כִּ֣י
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the imperatives. 'For' best captures the causal
    force in concise English.
- source_word: בָ֣א
  chosen: has come
  alternatives:
  - comes
  - came
  lexicon: HALOT
  rationale: Perfect 3ms from בוא. In prophetic discourse the perfect can present
    a future reality as certain, but in English 'has come' preserves the completed
    aspect and rhetorical vividness without over-interpreting it as simple past.
- source_word: אוֹרֵ֑ךְ
  chosen: your light
  alternatives:
  - your illumination
  - your dawn
  lexicon: HALOT
  rationale: Noun אור with 2fs suffix. 'Your light' is the plain and contextually
    rich rendering, allowing both literal brightness imagery and metaphorical salvation/restoration
    resonance without narrowing the sense.
- source_word: וּכְב֥וֹד
  chosen: and the glory
  alternatives:
  - and glory
  - and the splendor
  lexicon: HALOT
  rationale: כבוד often denotes weighty honor, splendor, or manifest divine presence.
    'The glory' is the most established and theologically appropriate rendering here,
    especially in construct with the divine name.
- source_word: יְהוָ֖ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English Bible
    convention.
- source_word: עָלַ֥יִךְ
  chosen: upon you
  alternatives:
  - over you
  - on you
  lexicon: HALOT
  rationale: Preposition על with 2fs suffix. 'Upon you' fits the elevated style and
    works naturally with the imagery of rising light/glory.
- source_word: זָרָֽח
  chosen: has risen
  alternatives:
  - shines
  - has dawned
  - breaks forth
  lexicon: HALOT
  rationale: Perfect 3ms from זרח, used of shining forth or rising, especially of
    the sun. 'Has risen' preserves the dawn/sunrise imagery and pairs well with 'upon
    you.' 'Has dawned' is possible but less natural with 'upon you' in English.
