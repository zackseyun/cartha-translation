theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's God explicitly. Following the project's doctrine,
    the tetragrammaton is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temporal force of the Hebrew perfects בָא and זָרָח in prophetic discourse
  chosen_reading: English present-perfect forms ('has come,' 'has risen')
  alternative_readings:
  - simple present ('comes,' 'rises')
  - simple past ('came,' 'rose')
  - future ('will come,' 'will rise')
  rationale: The Hebrew perfects portray the promised restoration as certain and vividly
    realized. Present-perfect English best preserves that prophetic certitude without
    flattening the imagery into mere past narration or explicitly converting it into
    future prediction.
