id: ISA.39.2
reference: Isaiah 39:2
source:
  edition: WLC
  text: וַ/יִּשְׂמַ֣ח עֲלֵי/הֶם֮ חִזְקִיָּהוּ֒ וַ/יַּרְאֵ֣/ם אֶת בֵּ֣ית נכת/ה אֶת
    הַ/כֶּסֶף֩ וְ/אֶת הַ/זָּהָ֨ב וְ/אֶת הַ/בְּשָׂמִ֜ים וְ/אֵ֣ת הַ/שֶּׁ֣מֶן הַ/טּ֗וֹב
    וְ/אֵת֙ כָּל בֵּ֣ית כֵּלָ֔י/ו וְ/אֵ֛ת כָּל אֲשֶׁ֥ר נִמְצָ֖א בְּ/אֹֽצְרֹתָ֑י/ו
    לֹֽא הָיָ֣ה דָבָ֗ר אֲ֠שֶׁר לֹֽא הֶרְאָ֧/ם חִזְקִיָּ֛הוּ בְּ/בֵית֖/וֹ וּ/בְ/כָל
    מֶמְשַׁלְתּֽ/וֹ־־־־׀־־־־־׃
translation:
  text: And Hezekiah was glad because of them, and he showed them his treasure house—the
    silver, the gold, the spices, the fine oil, all his armory, and all that was found
    in his storehouses. There was nothing in his house or in all his dominion that
    Hezekiah did not show them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rejoiced over them' or 'was pleased with them.' The Hebrew idiom can
      be understood either as joy because of the envoys/gifts or joy directed toward
      them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of his precious things'; traditionally understood as his treasury
      or treasure house.
    reason: lexical_alternative
  - marker: c
    text: Or 'all his equipment house'; many understand this as 'all his armory' from
      the context and the parallel in 2 Kings 20:13.
    reason: alternative_reading
  - marker: d
    text: Or 'treasuries.'
    reason: lexical_alternative
  - marker: e
    text: Or 'realm' or 'kingdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמַח עֲלֵיהֶם
  chosen: was glad because of them
  alternatives:
  - rejoiced over them
  - was pleased with them
  lexicon: HALOT
  rationale: The idiom with שׂמח + עַל can mean rejoicing on account of or over someone/something.
    Here the sense is that the arrival/gifts of the Babylonian envoys pleased Hezekiah.
    'Because of them' preserves the causal nuance without overstating affection toward
    the men themselves.
- source_word: וַיַּרְאֵם
  chosen: he showed them
  alternatives:
  - he let them see
  - he displayed to them
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'cause to see,' hence 'show.' This is the
    natural English rendering in this context of displaying royal wealth.
- source_word: בֵּית נכתה
  chosen: his treasure house
  alternatives:
  - the house of his precious things
  - his storehouse
  lexicon: HALOT
  rationale: The ketiv points to a noun referring to valuable goods/treasure. 'Treasure
    house' best fits the context and parallels the list of precious items that follows.
    The possessive 'his' is supplied from the pronominal suffix on the noun.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - silver
  - the money
  lexicon: HALOT
  rationale: In a royal inventory context, 'silver' is the straightforward material
    sense, not generic money.
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: Literal precious metal in the treasury list.
- source_word: הַבְּשָׂמִים
  chosen: the spices
  alternatives:
  - the balsam
  - the perfumes
  lexicon: HALOT
  rationale: The term can denote aromatic substances broadly. 'Spices' is readable
    and fits the inventory of luxury goods, while preserving the material sense.
- source_word: הַשֶּׁמֶן הַטּוֹב
  chosen: the fine oil
  alternatives:
  - the precious oil
  - the good oil
  lexicon: HALOT
  rationale: Literally 'the good oil,' but in English 'fine oil' better conveys high-quality
    perfumed or valuable oil in a treasury context.
- source_word: כָּל בֵּית כֵּלָיו
  chosen: all his armory
  alternatives:
  - all the house of his vessels
  - all his equipment house
  - all his treasury of articles
  lexicon: HALOT
  rationale: In this context and in parallel accounts, the phrase refers to the place/collection
    of weapons or royal equipment. 'Armory' is idiomatic English and likely the intended
    sense of the inventory.
- source_word: כָּל אֲשֶׁר נִמְצָא בְּאֹצְרֹתָיו
  chosen: all that was found in his storehouses
  alternatives:
  - everything that was in his treasuries
  - all that was found in his treasuries
  lexicon: HALOT
  rationale: אֹצָר can mean treasury or storehouse. Since 'treasure house' has already
    been used for בית נכתה, 'storehouses' avoids awkward repetition while still conveying
    repositories of wealth and goods.
- source_word: לֹא הָיָה דָבָר אֲשֶׁר לֹא הֶרְאָם
  chosen: There was nothing ... that Hezekiah did not show them
  alternatives:
  - There was not a thing ... that he did not let them see
  lexicon: HALOT
  rationale: This double-negative construction is naturally rendered as an emphatic
    totality statement in English.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - in his palace
  lexicon: HALOT
  rationale: The Hebrew is literally 'his house.' In royal context it may imply palace,
    but 'house' preserves the source wording and remains understandable.
- source_word: וּבְכָל מֶמְשַׁלְתּוֹ
  chosen: or in all his dominion
  alternatives:
  - or in all his realm
  - or throughout all his kingdom
  lexicon: HALOT
  rationale: מֶמְשָׁלָה denotes rule, dominion, or realm. 'Dominion' preserves the
    breadth of what was under his authority without narrowing it only to political
    territory.
