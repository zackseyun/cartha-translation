theological_decisions:
- issue: How to represent Hezekiah's second statement introduced by ויאמר כי
  chosen_reading: 'Render it as explanatory inner reasoning: ''For he thought, “There will be peace and stability in my days.”'''
  alternative_readings:
  - 'Render literally as continued speech: ''And he said, “For there will be peace and stability in my days.”'''
  rationale: The Hebrew can be read as direct speech, but the clause functions as the reason Hezekiah called the word 'good.' Making the explanatory sense explicit in English clarifies the narrative without changing the substance. This also avoids implying that Hezekiah publicly articulated the self-interested rationale if the text may simply reveal his reasoning.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether אֱמֶת should be rendered with a more literal but less idiomatic 'truth'
  chosen_reading: Translate contextually as 'stability'
  alternative_readings:
  - truth
  - faithfulness
  - security
  rationale: The translation preserves the likely sense of the Hebrew collocation in context rather than defaulting to a wooden gloss. This is a lexical-contextual decision, not a doctrinal one, but it affects how Hezekiah's response is understood.
  doctrine_reference: Translation philosophy §1, §5, §6
