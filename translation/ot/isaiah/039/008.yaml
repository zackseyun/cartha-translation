id: ISA.39.8
reference: Isaiah 39:8
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר חִזְקִיָּ֨הוּ֙ אֶֽל יְשַׁעְיָ֔הוּ ט֥וֹב דְּבַר יְהוָ֖ה אֲשֶׁ֣ר דִּבַּ֑רְתָּ וַ/יֹּ֕אמֶר כִּ֥י יִהְיֶ֛ה שָׁל֥וֹם וֶ/אֱמֶ֖ת בְּ/יָמָֽ/י־־׃פ
translation:
  text: Then Hezekiah said to Isaiah, “The word of Yahweh that you have spoken is good.” And he said, “For there will be peace and truth in my days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'And he said, “For there will be peace and truth/faithfulness in my days.”' The Hebrew may present Hezekiah's words directly rather than summarizing his reasoning.
    reason: alternative_reading
  - marker: b
    text: '''Stability'' renders Hebrew אֱמֶת here in the sense of firmness, reliability, or security; traditionally, ''truth.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  chosen: good
  alternatives:
  - acceptable
  - favorable
  lexicon: HALOT
  rationale: The adjective plainly evaluates the announced word as 'good.' 'Acceptable' is possible in context, but 'good' is the most direct rendering and preserves the ambiguity of whether Hezekiah means morally right, fitting, or favorable.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'message.' 'Word' preserves the prophetic formula and is natural English. יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  chosen: that you have spoken
  alternatives:
  - which you have spoken
  - that you spoke
  lexicon: HALOT
  rationale: This relative clause refers to Isaiah's speaking of the LORD's word. Present perfect English ('have spoken') fits the immediate completed speech and reads naturally.
- source_word: כִּי
  chosen: For he thought
  alternatives:
  - And he said, 'Indeed, ...'
  - For he said, '...'
  - Because
  lexicon: HALOT
  rationale: The Hebrew has a second ויאמר followed by כי, which can be rendered woodenly as 'and he said, For...' But in context this clause explains Hezekiah's favorable response. Rendering the sense as 'For he thought' makes explicit the explanatory force recognized by many interpreters and avoids awkward English while staying within optimal equivalence.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: '''Peace'' is the core gloss and preserves both political calm and general well-being without over-specifying.'
- source_word: אֱמֶת
  chosen: stability
  alternatives:
  - truth
  - faithfulness
  - security
  lexicon: HALOT
  rationale: Although אֱמֶת often means 'truth' or 'faithfulness,' in this collocation with שָׁלוֹם and in a royal-national context it likely denotes reliability, firmness, or stability. 'Stability' communicates the likely sense in idiomatic English better than the less natural 'peace and truth,' while 'security' remains a viable alternative.
- source_word: בְּיָמָי
  chosen: in my days
  alternatives:
  - during my lifetime
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'In my days' preserves the Hebrew idiom and the self-regarding focus of Hezekiah's statement.
