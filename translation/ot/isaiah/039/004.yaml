id: ISA.39.4
reference: Isaiah 39:4
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר מָ֥ה רָא֖וּ בְּ/בֵיתֶ֑/ךָ וַ/יֹּ֣אמֶר חִזְקִיָּ֗הוּ אֵ֣ת כָּל
    אֲשֶׁ֤ר בְּ/בֵיתִ/י֙ רָא֔וּ לֹֽא הָיָ֥ה דָבָ֛ר אֲשֶׁ֥ר לֹֽא הִרְאִיתִ֖י/ם בְּ/אוֹצְרֹתָֽ/י־־־׃
translation:
  text: And he said, “What have they seen in your house?” And Hezekiah said, “They
    have seen everything that is in my house. There was nothing that I did not show
    them in my treasuries.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in your palace.” The Hebrew literally says “in your house,” which in
      a royal setting can refer to the palace.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: What
  alternatives:
  - What things
  lexicon: HALOT
  rationale: Direct interrogative pronoun introducing Isaiah's question; simple 'What'
    is natural and sufficiently formal.
- source_word: רָאוּ
  chosen: have they seen
  alternatives:
  - did they see
  lexicon: HALOT
  rationale: Rendered as present perfect in English to reflect a completed action
    with present relevance in the dialogue; simple past is possible but less natural
    in this exchange.
- source_word: בְּבֵיתֶךָ
  chosen: in your house
  alternatives:
  - in your palace
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In royal context it can imply palace,
    but the verse contrasts 'my house' with 'my treasuries,' and 'house' preserves
    the Hebrew wording without over-interpreting.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: אֵת כָּל אֲשֶׁר בְּבֵיתִי
  chosen: everything that is in my house
  alternatives:
  - all that is in my house
  - everything in my house
  lexicon: HALOT
  rationale: אֵת marks the object, כָּל אֲשֶׁר gives totality, and the clause is best
    rendered idiomatically as 'everything that is in my house.'
- source_word: לֹא הָיָה דָבָר
  chosen: There was nothing
  alternatives:
  - There was not a thing
  - Not a thing existed
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew existential negation; preserves
    the emphatic total denial.
- source_word: הִרְאִיתִים
  chosen: I did not show them
  alternatives:
  - I did not let them see
  - I did not display to them
  lexicon: HALOT
  rationale: Hiphil of ראה means 'cause to see,' hence 'show.' The 3mp suffix is represented
    by 'them.'
- source_word: בְּאוֹצְרֹתָי
  chosen: in my treasuries
  alternatives:
  - among my treasuries
  - in my storehouses
  lexicon: HALOT
  rationale: אוֹצָר denotes treasure/storehouse. 'Treasuries' fits the royal context
    and the narrative emphasis on displayed wealth better than the broader 'storehouses.'
