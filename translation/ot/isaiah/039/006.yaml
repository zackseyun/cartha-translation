id: ISA.39.6
reference: Isaiah 39:6
source:
  edition: WLC
  text: הִנֵּה֮ יָמִ֣ים בָּאִים֒ וְ/נִשָּׂ֣א כָּל אֲשֶׁ֣ר בְּ/בֵיתֶ֗/ךָ וַ/אֲשֶׁ֨ר
    אָצְר֧וּ אֲבֹתֶ֛י/ךָ עַד הַ/יּ֥וֹם הַ/זֶּ֖ה בָּבֶ֑ל לֹֽא יִוָּתֵ֥ר דָּבָ֖ר אָמַ֥ר
    יְהוָֽה׀־־־׃
translation:
  text: Look, days are coming when all that is in your house, and what your fathers
    have stored up until this day, will be carried to Babylon; not a thing will be
    left, says the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors have stored up.' The Hebrew reads literally 'your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces a solemn prophetic announcement. 'Look' preserves the deictic
    force in readable modern English better than the more archaic 'Behold.'
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days will come
  lexicon: HALOT
  rationale: A standard prophetic idiom announcing future judgment. 'Days are coming'
    is natural English and closely follows the Hebrew participial construction.
- source_word: וְנִשָּׂא
  chosen: will be carried
  alternatives:
  - will be taken away
  - will be lifted up
  lexicon: HALOT
  rationale: The Niphal of נשׂא here is passive and in context refers to removal of
    goods into exile/plunder. 'Will be carried' captures the passive sense and destination-oriented
    movement without overparaphrasing.
- source_word: כָּל אֲשֶׁר בְּבֵיתֶךָ
  chosen: all that is in your house
  alternatives:
  - everything in your house
  - all that belongs to your house
  lexicon: HALOT
  rationale: '''House'' is retained rather than generalized to ''palace'' or ''possessions''
    because the Hebrew says ''house,'' while the following clause clarifies that stored
    wealth is included.'
- source_word: וַאֲשֶׁר אָצְרוּ אֲבֹתֶיךָ
  chosen: and what your fathers have stored up
  alternatives:
  - and what your ancestors have treasured up
  - and what your fathers have accumulated
  lexicon: HALOT
  rationale: אָצְרוּ denotes storing up treasure or reserves. 'Stored up' is straightforward
    and preserves the economic sense without adding interpretive color.
- source_word: אֲבֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally masculine plural 'your fathers.' Per gender-accurate
    policy, the literal familial-historical term is retained here rather than neutralizing
    to 'ancestors,' though that is a viable interpretive alternative.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  - up to this day
  lexicon: HALOT
  rationale: This idiom marks accumulation continuing to the present moment. 'Until
    this day' is a close and natural rendering.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: לֹא יִוָּתֵר דָּבָר
  chosen: not a thing will be left
  alternatives:
  - nothing will remain
  - not anything will be left
  lexicon: HALOT
  rationale: The construction emphasizes totality of loss. 'Not a thing will be left'
    is idiomatic and forceful while preserving the absolute negation.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: Prophetic speech formulas are often rendered with present-tense English
    for immediacy. יְהוָה is rendered 'the LORD' per doctrine guidelines for the divine
    name.
