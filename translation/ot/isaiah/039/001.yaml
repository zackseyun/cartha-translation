id: ISA.39.1
reference: Isaiah 39:1
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֡וא שָׁלַ֡ח מְרֹדַ֣ךְ בַּ֠לְאֲדָן בֶּֽן בַּלְאֲדָ֧ן מֶֽלֶךְ
    בָּבֶ֛ל סְפָרִ֥ים וּ/מִנְחָ֖ה אֶל חִזְקִיָּ֑הוּ וַ/יִּשְׁמַ֕ע כִּ֥י חָלָ֖ה וַֽ/יֶּחֱזָֽק־־־׃
translation:
  text: At that time Merodach-baladan son of Baladan, king of Babylon, sent letters
    and a gift to Hezekiah, for he heard that he had been sick and had recovered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'had become strong.' The Hebrew expression refers to
      recovery after illness.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִוא
  chosen: At that time
  alternatives:
  - At that moment
  - In that time
  lexicon: HALOT
  rationale: A standard temporal frame introducing the narrative setting. 'At that
    time' is idiomatic and sufficiently formal without sounding wooden.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The common verb for sending. 'Sent' is the plain and natural English
    equivalent in this diplomatic context.
- source_word: מְרֹדַךְ בַּלְאֲדָן
  chosen: Merodach-baladan
  alternatives:
  - Marduk-baladan
  lexicon: HALOT
  rationale: Personal names are transliterated by standard conventions. 'Merodach-baladan'
    follows familiar English biblical usage while remaining recognizably tied to the
    Hebrew form.
- source_word: בֶּן בַּלְאֲדָן
  chosen: son of Baladan
  lexicon: HALOT
  rationale: The filial construction is straightforward and should be preserved formally.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: A simple genitive title; translated directly.
- source_word: סְפָרִים
  chosen: letters
  alternatives:
  - documents
  - writings
  lexicon: HALOT
  rationale: In a royal diplomatic setting, 'letters' best captures the likely sense
    of written correspondence rather than generic 'books' or 'documents'.
- source_word: וּמִנְחָה
  chosen: and a gift
  alternatives:
  - and a present
  - and an offering
  lexicon: HALOT
  rationale: Although מִנְחָה can mean 'offering' in cultic contexts, here it refers
    to a diplomatic present. 'Gift' is the clearest contextual rendering.
- source_word: אֶל חִזְקִיָּהוּ
  chosen: to Hezekiah
  lexicon: HALOT
  rationale: Direct object of the sending with אֶל indicating direction toward the
    recipient.
- source_word: וַיִּשְׁמַע
  chosen: for he heard
  alternatives:
  - because he heard
  - and he heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, but in English the causal
    relationship to the sending is best made explicit. 'For he heard' preserves the
    explanatory force naturally.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what was heard: he heard that Hezekiah
    had been sick and recovered.'
- source_word: חָלָה
  chosen: had been sick
  alternatives:
  - was sick
  - had become ill
  lexicon: HALOT
  rationale: The perfect refers to Hezekiah's prior illness. 'Had been sick' fits
    the sequence naturally in English.
- source_word: וַיֶּחֱזָק
  chosen: had recovered
  alternatives:
  - had become strong again
  - had regained strength
  lexicon: HALOT
  rationale: The verb literally denotes becoming strong, but in context after illness
    it idiomatically means recovery. 'Had recovered' communicates the sense clearly
    in modern English while reflecting the contextual force.
