id: ISA.39.3
reference: Isaiah 39:3
source:
  edition: WLC
  text: וַ/יָּבֹא֙ יְשַׁעְיָ֣הוּ הַ/נָּבִ֔יא אֶל הַ/מֶּ֖לֶךְ חִזְקִיָּ֑הוּ וַ/יֹּ֨אמֶר
    אֵלָ֜י/ו מָ֥ה אָמְר֣וּ הָ/אֲנָשִׁ֣ים הָ/אֵ֗לֶּה וּ/מֵ/אַ֨יִן֙ יָבֹ֣אוּ אֵלֶ֔י/ךָ
    וַ/יֹּ֨אמֶר֙ חִזְקִיָּ֔הוּ מֵ/אֶ֧רֶץ רְחוֹקָ֛ה בָּ֥אוּ אֵלַ֖/י מִ/בָּבֶֽל־׀׃
translation:
  text: Then Isaiah the prophet came to King Hezekiah and said to him, “What did these
    men say, and where did they come to you from?” And Hezekiah said, “They came to
    me from a distant land, from Babylon.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא in narrative sequence commonly means 'came.' With
    אֶל plus person, 'came to' is the natural English rendering.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name, following the
    policy to transliterate personal names.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title identifying Isaiah's role; straightforwardly rendered
    as 'the prophet.'
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: With the following proper name in English, 'King Hezekiah' is more idiomatic
    than 'the king Hezekiah' while preserving the definite sense.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the king's name.
- source_word: מָה אָמְרוּ
  chosen: What did ... say
  alternatives:
  - What have ... said
  - What were ... saying
  lexicon: HALOT
  rationale: The perfect after the introductory question particle is best rendered
    in simple past in English narrative dialogue.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  chosen: these men
  alternatives:
  - these people
  lexicon: HALOT
  rationale: אֲנָשִׁים is specifically masculine plural 'men,' and the context concerns
    male envoys; this follows the gender-accurate policy.
- source_word: וּמֵאַיִן
  chosen: and where ... from
  alternatives:
  - and from where
  lexicon: HALOT
  rationale: Interrogative of source. English idiom prefers 'where ... from' while
    preserving the sense of origin.
- source_word: יָבֹאוּ אֵלֶיךָ
  chosen: did they come to you
  alternatives:
  - have they come to you
  lexicon: HALOT
  rationale: Though formally imperfect, in this direct-question context it refers
    to completed arrival and is naturally rendered as simple past in English.
- source_word: מֵאֶרֶץ רְחוֹקָה
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/country; 'distant land' is clear modern English and
    preserves the geographic sense without archaic diction.
- source_word: בָּאוּ אֵלַי
  chosen: They came to me
  alternatives:
  - They have come to me
  lexicon: HALOT
  rationale: Simple past fits the narrative exchange in English.
- source_word: מִבָּבֶל
  chosen: from Babylon
  lexicon: HALOT
  rationale: Proper place name rendered by standard English form 'Babylon.'
