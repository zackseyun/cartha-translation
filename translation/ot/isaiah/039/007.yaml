theological_decisions:
- issue: Meaning of סָרִיסִים in a royal-court prophecy
  chosen_reading: literal 'eunuchs' in the main text
  alternative_readings:
  - court officials
  rationale: The Hebrew term can denote either literal eunuchs or, by extension, high
    court officials. Because the immediate context concerns sons taken into Babylonian
    royal service and the traditional historical understanding is literal emasculation
    or eunuch-status, the main text keeps 'eunuchs.' To preserve interpretive tension
    and avoid overstating certainty where the term can broaden semantically, the alternative
    'court officials' is retained in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
