id: ISA.39.7
reference: Isaiah 39:7
source:
  edition: WLC
  text: וּ/מִ/בָּנֶ֜י/ךָ אֲשֶׁ֨ר יֵצְא֧וּ מִמְּ/ךָ֛ אֲשֶׁ֥ר תּוֹלִ֖יד יִקָּ֑חוּ וְ/הָיוּ֙
    סָרִיסִ֔ים בְּ/הֵיכַ֖ל מֶ֥לֶךְ בָּבֶֽל׃
translation:
  text: And some of your sons who will come from you, whom you will father, will be
    taken, and they will become eunuchs in the palace of the king of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'court officials'; the Hebrew term can refer either to literal eunuchs
      or, in some contexts, to royal officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבָּנֶיךָ
  chosen: And some of your sons
  alternatives:
  - And from your sons
  - And some of your descendants
  lexicon: HALOT
  rationale: The partitive מן with 'your sons' naturally yields 'some of your sons.'
    'Descendants' is possible in a broader sense, but the immediate wording is specifically
    filial, so 'sons' best preserves the Hebrew while remaining natural English.
- source_word: אֲשֶׁר יֵצְאוּ מִמְּךָ
  chosen: who will come from you
  alternatives:
  - who will issue from you
  - who will be born from you
  lexicon: HALOT
  rationale: The idiom literally denotes those proceeding from Hezekiah himself. 'Come
    from you' is idiomatic modern English and preserves the genealogical sense without
    becoming wooden.
- source_word: אֲשֶׁר תּוֹלִיד
  chosen: whom you will father
  alternatives:
  - whom you will beget
  - whom you will have
  lexicon: HALOT
  rationale: The Hiphil of ילד with a male subject means 'beget/father.' 'Father'
    is clearer and more contemporary than 'beget,' while more precise than the weaker
    'have.'
- source_word: יִקָּחוּ
  chosen: will be taken
  alternatives:
  - they will take away
  - they will seize
  lexicon: HALOT
  rationale: 'The verb is active in form but indefinite in subject; English naturally
    renders this as a passive here: ''will be taken.'' This matches the prophetic
    sense of deportation/capture.'
- source_word: וְהָיוּ
  chosen: and they will become
  alternatives:
  - and they will be
  lexicon: HALOT
  rationale: With a predicate noun, היה can mean either 'be' or 'become.' In context,
    these sons are taken and then made to serve in a new status, so 'become' better
    reflects the transition implied.
- source_word: סָרִיסִים
  chosen: eunuchs
  alternatives:
  - court officials
  lexicon: HALOT
  rationale: The primary sense is 'eunuchs,' though in some contexts the term can
    extend to royal officials. Here, because the verse predicts the fate of Hezekiah's
    sons in a foreign royal court, 'eunuchs' is the more direct and historically recognized
    sense; the broader administrative sense is preserved in a footnote.
- source_word: בְּהֵיכַל
  chosen: in the palace
  alternatives:
  - in the temple
  - in the court
  lexicon: HALOT
  rationale: Though היכל can mean 'temple' in other contexts, with 'king of Babylon'
    it clearly refers to the royal palace complex, not a sanctuary.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: This is the straightforward construct relationship and standard English
    rendering.
