id: ISA.39.5
reference: Isaiah 39:5
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְשַׁעְיָ֖הוּ אֶל חִזְקִיָּ֑הוּ שְׁמַ֖ע דְּבַר יְהוָ֥ה צְבָאֽוֹת־־׃
translation:
  text: Then Isaiah said to Hezekiah, “Hear the word of Yahweh of Hosts.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD of Armies.” The Hebrew title refers to the LORD as ruler over heavenly and earthly hosts.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: YHWH; traditionally rendered “the LORD.”'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence better than a bare 'and said.'
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  lexicon: HALOT
  rationale: Standard English transliteration of the prophet's name, following the policy to transliterate personal names.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition; 'to' is the natural modern English equivalent.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  lexicon: HALOT
  rationale: Standard English transliteration of the king's name, following the policy to transliterate personal names.
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative singular from שׁמע. 'Hear' is direct and idiomatic in prophetic address, preserving the formal force of the command.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In prophetic formulae, דָּבָר commonly means a spoken divine message. 'The word' preserves the established prophetic idiom without obscuring meaning.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Hosts
  alternatives:
  - of Armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'Hosts' is the standard compact rendering that preserves the title's breadth, encompassing heavenly and earthly armies. 'Armies' is possible but narrower and less established in this divine title.
