theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Hosts
  alternative_readings:
  - the LORD of Armies
  - Yahweh of Hosts
  rationale: The main text follows the doctrinal default for יְהוָה as 'the LORD'
    and retains the traditional, theologically rich title 'of Hosts' for צְבָאוֹת.
    This preserves the covenant name convention while communicating the divine warrior-king
    title without over-narrowing it.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה → the LORD'
