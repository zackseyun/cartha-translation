id: ISA.55.10
reference: Isaiah 55:10
source:
  edition: WLC
  text: כִּ֡י כַּ/אֲשֶׁ֣ר יֵרֵד֩ הַ/גֶּ֨שֶׁם וְ/הַ/שֶּׁ֜לֶג מִן הַ/שָּׁמַ֗יִם וְ/שָׁ֨מָּ/ה֙
    לֹ֣א יָשׁ֔וּב כִּ֚י אִם הִרְוָ֣ה אֶת הָ/אָ֔רֶץ וְ/הוֹלִידָ֖/הּ וְ/הִצְמִיחָ֑/הּ
    וְ/נָ֤תַן זֶ֨רַע֙ לַ/זֹּרֵ֔עַ וְ/לֶ֖חֶם לָ/אֹכֵֽל־־־׃
translation:
  text: For just as the rain and the snow come down from heaven and do not return
    there unless they have watered the earth, made it bear, and made it sprout, and
    have given seed to the sower and bread to the eater,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the heavens.' The Hebrew שָׁמַיִם is formally plural and can denote
      'heaven,' 'the heavens,' or 'the sky' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'made it produce and made it grow.' The paired verbs emphasize the earth's
      fruitful response to the rain and snow.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי כַּאֲשֶׁר
  chosen: For just as
  alternatives:
  - For as
  - Indeed, as
  lexicon: HALOT
  rationale: Introduces the comparison that grounds the following statement in v.11.
    'For just as' preserves both the explanatory force of כִּי and the comparative
    force of כַּאֲשֶׁר in natural English.
- source_word: יֵרֵד
  chosen: come down
  alternatives:
  - descends
  - falls
  lexicon: HALOT
  rationale: The verb ירד means 'go/come down.' 'Come down' is idiomatic with rain
    and snow in English and preserves the directional sense better than the flatter
    'falls'.
- source_word: הַגֶּשֶׁם
  chosen: the rain
  lexicon: HALOT
  rationale: Standard rendering of גֶּשֶׁם.
- source_word: וְהַשֶּׁלֶג
  chosen: and the snow
  lexicon: HALOT
  rationale: Standard rendering of שֶׁלֶג.
- source_word: מִן הַשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - from the sky
  lexicon: HALOT
  rationale: שָׁמַיִם can mean 'heavens/sky.' 'From heaven' is the most natural singular
    collective in English here and matches the elevated style of the passage without
    sounding archaic.
- source_word: וְשָׁמָּה לֹא יָשׁוּב
  chosen: and do not return there
  alternatives:
  - and does not return there
  - and do not go back there
  lexicon: HALOT
  rationale: Although the Hebrew verb is singular, the compound subject 'the rain
    and the snow' is naturally plural in English. 'There' explicitly renders שָׁמָּה.
- source_word: כִּי אִם
  chosen: unless
  alternatives:
  - but only after
  - except that
  lexicon: HALOT
  rationale: 'In this construction כִּי אִם marks exception: they do not return until
    accomplishing the stated effects. ''Unless'' is concise and idiomatic.'
- source_word: הִרְוָה אֶת הָאָרֶץ
  chosen: they have watered the earth
  alternatives:
  - it has saturated the earth
  - they have drenched the land
  lexicon: HALOT
  rationale: רוה in the Hiphil means to water or saturate. 'Watered the earth' is
    clear, natural, and fits the agricultural imagery.
- source_word: וְהוֹלִידָהּ
  chosen: made it bear
  alternatives:
  - caused it to bring forth
  - made it produce
  lexicon: HALOT
  rationale: The Hiphil of ילד here refers to causing the earth to produce. 'Made
    it bear' is concise and preserves the causative sense without over-paraphrase.
- source_word: וְהִצְמִיחָהּ
  chosen: and made it sprout
  alternatives:
  - and made it bud
  - and caused it to grow
  lexicon: HALOT
  rationale: צמח in Hiphil means to cause to sprout/grow. 'Sprout' keeps the agricultural
    image vivid and distinct from the previous verb.
- source_word: וְנָתַן זֶרַע לַזֹּרֵעַ
  chosen: and have given seed to the sower
  alternatives:
  - and give seed to the one who sows
  lexicon: HALOT
  rationale: Retains the concrete agricultural image and the participial noun 'the
    sower' in idiomatic English.
- source_word: וְלֶחֶם לָאֹכֵל
  chosen: and bread to the eater
  alternatives:
  - and food to the eater
  - and bread for food
  lexicon: HALOT
  rationale: לֶחֶם is specifically 'bread' here, not generic food. 'To the eater'
    preserves the parallelism with 'to the sower.'
