id: ISA.55.1
reference: Isaiah 55:1
source:
  edition: WLC
  text: ה֤וֹי כָּל צָמֵא֙ לְכ֣וּ לַ/מַּ֔יִם וַ/אֲשֶׁ֥ר אֵֽין ל֖/וֹ כָּ֑סֶף לְכ֤וּ
    שִׁבְרוּ֙ וֶֽ/אֱכֹ֔לוּ וּ/לְכ֣וּ שִׁבְר֗וּ בְּ/לוֹא כֶ֛סֶף וּ/בְ/ל֥וֹא מְחִ֖יר
    יַ֥יִן וְ/חָלָֽב־־־׃
translation:
  text: Come, everyone who is thirsty, come to the waters; and he who has no money,
    come, buy and eat! Yes, come, buy wine and milk without money and without price.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Ho! All who thirst, come to the waters.'
    reason: lexical_alternative
  - marker: b
    text: Or 'whoever has no money'; the Hebrew is singular masculine with generic
      force.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Come
  alternatives:
  - Ho!
  - Ah!
  - Hey!
  lexicon: HALOT
  rationale: Although הוֹי often functions as an interjection such as 'ho!' or 'ah!',
    in this invitational context it introduces an urgent summons rather than a lament
    or woe. Rendering it with the imperative force folded into 'Come' produces natural
    English while preserving the call's urgency. The more formal 'Ho!' is preserved
    in a footnote as a lexical alternative.
- source_word: כָּל צָמֵא
  chosen: everyone who is thirsty
  alternatives:
  - all who thirst
  - everyone thirsty
  lexicon: HALOT
  rationale: כָּל plus the singular adjective functions collectively. 'Everyone who
    is thirsty' is clear modern English and preserves the universal scope. 'All who
    thirst' is slightly more formal/literary and is preserved as an alternative.
- source_word: לְכוּ
  chosen: come
  alternatives:
  - go
  - come on
  lexicon: HALOT
  rationale: הלך in the imperative can be rendered 'go,' but in direct invitation
    English idiom prefers 'come.' Repetition is retained to reflect the Hebrew's insistent
    summons.
- source_word: לַמַּיִם
  chosen: to the waters
  alternatives:
  - to water
  lexicon: HALOT
  rationale: The plural 'waters' reflects the Hebrew form and preserves the vivid,
    abundant imagery rather than flattening it to singular 'water'.
- source_word: וַאֲשֶׁר אֵין לוֹ כָּסֶף
  chosen: and he who has no money
  alternatives:
  - and whoever has no money
  lexicon: HALOT
  rationale: The Hebrew is singular masculine but representative/generic. Per the
    translation philosophy's gender-accurate principle, 'he who has no money' matches
    the source form while functioning generically. An inclusive alternative is preserved
    in a footnote because English readers may naturally hear the phrase generically.
- source_word: שִׁבְרוּ
  chosen: buy
  alternatives:
  - buy grain
  - procure
  lexicon: HALOT
  rationale: The verb commonly means 'buy' in food-purchase contexts. Although in
    some contexts it can imply buying grain specifically, no direct object is supplied
    here in the first instance, so the broader 'buy' is best.
- source_word: וֶאֱכֹלוּ
  chosen: and eat
  alternatives:
  - then eat
  lexicon: HALOT
  rationale: A straightforward imperative sequence is preserved. The conjunction is
    rendered simply as 'and' rather than made more interpretive.
- source_word: בְּלוֹא כֶסֶף
  chosen: without money
  alternatives:
  - for no money
  lexicon: HALOT
  rationale: This is the most direct and idiomatic rendering of the prepositional
    phrase, preserving the paradox of buying without payment.
- source_word: וּבְלוֹא מְחִיר
  chosen: and without price
  alternatives:
  - and without cost
  - and without payment
  lexicon: HALOT
  rationale: מְחִיר denotes price/cost. 'Without price' preserves the rhetorical parallelism
    with 'without money' and echoes the elevated style of the invitation. 'Without
    cost' is possible but slightly flattens the poetic cadence.
- source_word: יַיִן וְחָלָב
  chosen: wine and milk
  lexicon: HALOT
  rationale: The concrete nouns are retained literally, preserving the imagery of
    rich, abundant provision rather than spiritualizing them in translation.
