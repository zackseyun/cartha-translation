theological_decisions:
- issue: Generic masculine expression in invitation
  chosen_reading: Rendered the singular masculine generically as 'he who has no money'
    in the main text.
  alternative_readings:
  - whoever has no money
  rationale: The Hebrew uses a grammatically masculine singular form with representative
    force. Following the stated gender-accurate philosophy, the main text reflects
    the source form while the generic sense remains clear from context. An inclusive
    alternative is preserved in a footnote for readability.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Economic imagery versus spiritual paraphrase
  chosen_reading: Retained literal market and nourishment language ('buy,' 'wine,'
    'milk') without importing explicit theological interpretation into the verse text.
  alternative_readings:
  - Interpretive paraphrases emphasizing free salvation or spiritual blessing
  rationale: The verse certainly invites theological reflection, but the Hebrew presents
    that through concrete imagery. Optimal equivalence here requires preserving the
    literal imagery and allowing theology to arise from the text rather than from
    paraphrase.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 6
