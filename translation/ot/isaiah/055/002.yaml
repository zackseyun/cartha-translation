id: ISA.55.2
reference: Isaiah 55:2
source:
  edition: WLC
  text: לָ֤/מָּה תִשְׁקְלוּ כֶ֨סֶף֙ בְּֽ/לוֹא לֶ֔חֶם וִ/יגִיעֲ/כֶ֖ם בְּ/ל֣וֹא לְ/שָׂבְעָ֑ה
    שִׁמְע֨וּ שָׁמ֤וֹעַ אֵלַ/י֙ וְ/אִכְלוּ ט֔וֹב וְ/תִתְעַנַּ֥ג בַּ/דֶּ֖שֶׁן נַפְשְׁ/כֶֽם־־־׃
translation:
  text: Why do you weigh out silver for what is not bread, and your labor for what
    does not satisfy? Listen carefully to me, and eat what is good, and let your soul
    delight itself in richness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spend money'; Hebrew literally 'weigh out silver,' reflecting payment
      by weight.
    reason: lexical_alternative
  - marker: b
    text: Or 'Listen, listen to me'; the Hebrew intensifies the command by pairing
      an imperative with an infinitive absolute.
    reason: lexical_alternative
  - marker: c
    text: Or 'let your soul delight itself in fatness' or 'in abundance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁקְלוּ
  chosen: weigh out
  alternatives:
  - spend
  - pay
  lexicon: HALOT
  rationale: The verb שׁקל literally refers to weighing, especially money by weight.
    'Weigh out' preserves the concrete image behind commercial exchange better than
    the more idiomatic 'spend,' while remaining natural in English.
- source_word: כֶסֶף
  chosen: silver
  alternatives:
  - money
  lexicon: HALOT
  rationale: Hebrew כֶּסֶף is literally 'silver' and often metonymically 'money.'
    Here 'weigh out silver' preserves the ancient economic imagery and fits the literal
    sense of the preceding verb.
- source_word: בְּלוֹא לֶחֶם
  chosen: for what is not bread
  alternatives:
  - for that which is not bread
  - for no bread
  lexicon: HALOT
  rationale: This keeps the Hebrew negated nominal phrase close to the source while
    making clear that the expenditure is for something that is not true food.
- source_word: יְגִיעֲכֶם
  chosen: your labor
  alternatives:
  - your earnings
  - your toil
  lexicon: HALOT
  rationale: The noun denotes toil or the fruit of toil. 'Your labor' best preserves
    the ambiguity between effort and what that effort purchases, matching the parallel
    with 'weigh out silver.'
- source_word: לְשָׂבְעָה
  chosen: what does not satisfy
  alternatives:
  - for what does not fill
  - for what is not to fullness
  lexicon: HALOT
  rationale: 'The noun שָׂבְעָה refers to satiety/fullness. Rendering the phrase verbally
    in English communicates the sense naturally: the labor is spent on what fails
    to bring satisfaction.'
- source_word: שִׁמְעוּ שָׁמוֹעַ
  chosen: Listen carefully
  alternatives:
  - Listen, listen
  - Hear diligently
  - Surely listen
  lexicon: HALOT
  rationale: The infinitive absolute with imperative intensifies the command. 'Listen
    carefully' conveys the emphatic force in readable modern English without awkward
    repetition.
- source_word: וְאִכְלוּ טוֹב
  chosen: and eat what is good
  alternatives:
  - and eat good
  - and eat the good
  lexicon: HALOT
  rationale: Hebrew idiom allows the adjective to function substantivally. 'What is
    good' makes the sense explicit in natural English while preserving the moral and
    experiential breadth of טוֹב.
- source_word: וְתִתְעַנַּג
  chosen: let your soul delight itself
  alternatives:
  - and your soul shall delight itself
  - and delight yourself
  lexicon: HALOT
  rationale: Although the verb form is 3fs, the subject is the following feminine
    singular noun נֶפֶשׁ. English expresses this most naturally by making 'your soul'
    the subject. 'Delight itself' preserves the reflexive nuance of the Hitpael.
- source_word: בַּדֶּשֶׁן
  chosen: in richness
  alternatives:
  - in fatness
  - in abundance
  - in rich food
  lexicon: HALOT
  rationale: דֶּשֶׁן literally denotes fatness/richness and by extension abundance
    or rich fare. 'In richness' preserves the metaphor without the misleading modern
    connotations of 'fatness.'
- source_word: נַפְשְׁכֶם
  chosen: your soul
  alternatives:
  - yourselves
  - your life
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, self, or life depending on context. Here 'your
    soul' fits the poetic register and preserves the inner-person emphasis of the
    invitation.
