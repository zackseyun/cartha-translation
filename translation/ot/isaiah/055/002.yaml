theological_decisions:
- issue: Metaphorical nourishment language
  chosen_reading: Retain the food imagery ('bread,' 'eat,' 'satisfy') as metaphorical
    invitation rather than paraphrasing into explicitly spiritual categories.
  alternative_readings:
  - Why spend money on what does not truly nourish you spiritually?
  rationale: The verse uses concrete nourishment imagery to express divine provision
    and satisfaction. Explicitly spiritualizing the language in the main text would
    import interpretation beyond the Hebrew's wording and reduce the poetic force.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
