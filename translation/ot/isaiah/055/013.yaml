id: ISA.55.13
reference: Isaiah 55:13
source:
  edition: WLC
  text: תַּ֤חַת הַֽ/נַּעֲצוּץ֙ יַעֲלֶ֣ה בְר֔וֹשׁ תחת הַ/סִּרְפַּ֖ד יַעֲלֶ֣ה הֲדַ֑ס וְ/הָיָ֤ה לַֽ/יהוָה֙ לְ/שֵׁ֔ם לְ/א֥וֹת עוֹלָ֖ם לֹ֥א יִכָּרֵֽת׃ס
translation:
  text: Instead of the thornbush, the cypress will come up; instead of the brier, the myrtle will come up. And it will be for Yahweh a name, an everlasting sign that will not be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fir' for 'cypress'; the exact species denoted by Hebrew berosh is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'nettle' or 'bramble' for 'brier'; the exact plant denoted by Hebrew sirpad is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'for a name,' an idiom for renown or memorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  chosen: instead of
  alternatives:
  - in place of
  - under
  lexicon: HALOT
  rationale: In this poetic restoration context, the preposition marks replacement/substitution rather than spatial position. 'Instead of' best captures the parallel contrast between harmful growth and beneficial trees.
- source_word: נַּעֲצוּץ
  chosen: thornbush
  alternatives:
  - thorn
  - thorn tree
  - brier
  lexicon: HALOT
  rationale: The noun denotes a thorny plant; the exact species is uncertain. 'Thornbush' is natural English and preserves the image of undesirable, prickly growth without over-specifying the botany.
- source_word: בְרֹושׁ
  chosen: cypress
  alternatives:
  - fir
  - juniper
  lexicon: HALOT
  rationale: The precise species is debated, but 'cypress' is a common modern rendering for בְּרוֹשׁ and communicates a stately evergreen tree. 'Fir' reflects older tradition but is less likely botanically in this context.
- source_word: סִּרְפַּד
  chosen: brier
  alternatives:
  - nettle
  - thornbush
  - bramble
  lexicon: HALOT
  rationale: The plant identification is uncertain. 'Brier' conveys another noxious wild growth and preserves the poetic parallel with נַעֲצוּץ while avoiding false precision.
- source_word: הֲדַס
  chosen: myrtle
  lexicon: HALOT
  rationale: This is the standard identification and a well-established English equivalent.
- source_word: וְהָיָה
  chosen: And it will be
  alternatives:
  - and this will be
  - and it shall become
  lexicon: HALOT
  rationale: The singular verb likely summarizes the whole transformation just described. 'It' refers collectively to the restoration event/result.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: 'Following the project''s default rendering of YHWH as ''the LORD.'' The lamed here is best rendered ''for,'' indicating result/reference: the transformation serves as something for the LORD''s renown.'
- source_word: לְשֵׁם
  chosen: a name
  alternatives:
  - renown
  - for a name
  lexicon: HALOT
  rationale: The Hebrew is literally 'for a name.' Retaining 'a name' preserves the biblical idiom of reputation/memorial while remaining intelligible in English.
- source_word: לְאוֹת עוֹלָם
  chosen: an everlasting sign
  alternatives:
  - a perpetual sign
  - a sign forever
  lexicon: HALOT
  rationale: '''Everlasting sign'' is idiomatic modern English and preserves both the symbolic/public nature of אוֹת and the durative force of עוֹלָם.'
- source_word: לֹא יִכָּרֵת
  chosen: that will not be cut off
  alternatives:
  - that will never be removed
  - that will not be destroyed
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off.' Retaining the cutting imagery preserves the verbal link to permanence and covenantal/botanical resonance in the verse.
