id: ISA.55.5
reference: Isaiah 55:5
source:
  edition: WLC
  text: הֵ֣ן גּ֤וֹי לֹֽא תֵדַע֙ תִּקְרָ֔א וְ/ג֥וֹי לֹֽא יְדָע֖וּ/ךָ אֵלֶ֣י/ךָ יָר֑וּצוּ
    לְמַ֨עַן֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ וְ/לִ/קְד֥וֹשׁ יִשְׂרָאֵ֖ל כִּ֥י פֵאֲרָֽ/ךְ־־׃ס
translation:
  text: Behold, you will call a nation that you do not know, and a nation that did
    not know you will run to you, because of the LORD your God, and the Holy One of
    Israel, for he has glorified you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will hasten to you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for the sake of the LORD your God.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he has adorned you' or 'he has honored you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Look
  - Surely
  lexicon: HALOT
  rationale: Introduces an emphatic announcement. 'Behold' preserves the prophetic
    force more formally than 'look,' while remaining intelligible in modern English.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  - Gentile nation
  lexicon: HALOT
  rationale: The singular גּוֹי here denotes a people-group or nation. 'Nation' is
    the most natural and contextually broad rendering; 'Gentile nation' would over-specify
    what the Hebrew leaves general.
- source_word: לֹא תֵדַע
  chosen: you do not know
  alternatives:
  - you have not known
  - you did not know
  lexicon: HALOT
  rationale: 'The imperfect 2ms is best rendered as a present-relative idea in English
    within the future-oriented sentence: ''a nation that you do not know.'' This preserves
    the Hebrew sense without awkwardness.'
- source_word: תִּקְרָא
  chosen: you will call
  alternatives:
  - you shall call
  - you will summon
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'summon.' 'You will call' is straightforward
    and preserves the future sense without adding interpretive force.
- source_word: לֹא יְדָעוּךָ
  chosen: did not know you
  alternatives:
  - do not know you
  - have not known you
  lexicon: HALOT
  rationale: 'The perfect 3cp with suffix naturally describes prior non-acquaintance
    relative to the future action: ''a nation that did not know you.'' This reads
    more naturally in English than a present perfect here.'
- source_word: אֵלֶיךָ יָרוּצוּ
  chosen: will run to you
  alternatives:
  - will hasten to you
  - will come running to you
  lexicon: HALOT
  rationale: רוּץ conveys swift movement. 'Run to you' is vivid and direct; 'hasten'
    is possible but less concrete.
- source_word: לְמַעַן
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: HALOT
  rationale: Here לְמַעַן introduces the reason nations come. 'Because of' communicates
    causal force clearly in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: A standard construct with suffix; 'your God' is direct and idiomatic.
- source_word: וְלִקְדוֹשׁ יִשְׂרָאֵל
  chosen: and the Holy One of Israel
  alternatives:
  - even the Holy One of Israel
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition continue the causal phrase.
    'And the Holy One of Israel' preserves the appositional parallel to 'the LORD
    your God' without over-interpreting the syntax.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the nations' response. 'For' fits
    the elevated prophetic style and links naturally to the preceding clause.
- source_word: פֵאֲרָךְ
  chosen: he has glorified you
  alternatives:
  - he has adorned you
  - he has honored you
  - he has beautified you
  lexicon: HALOT
  rationale: From פאר in the piel, the sense is to beautify, adorn, honor, or glorify.
    In this context of divine exaltation drawing nations, 'he has glorified you' best
    captures both honor and public splendor.
