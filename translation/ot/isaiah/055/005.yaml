theological_decisions:
- issue: Referent of the second-person singular pronouns
  chosen_reading: Retain the direct second-person singular ('you') without specifying
    whether the addressee is Zion, Israel, or the Davidic figure.
  alternative_readings:
  - Interpret the addressee specifically as Zion/Jerusalem
  - Interpret the addressee specifically as the servant/Davidic ruler
  rationale: The immediate context allows discussion over the precise referent, but
    the Hebrew text itself addresses a singular 'you' and does not require the translator
    to resolve the interpretive question in the verse itself. Preserving the pronoun
    maintains the textual tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
