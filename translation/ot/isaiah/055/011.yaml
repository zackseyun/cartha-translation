  from: 'so my word that goes out from my mouth will be:'
  to: 'so will my word be that goes out from my mouth:'
  rationale: The current word order is grammatically correct but stylistically awkward, especially leading into a colon. Inverting the subject and verb to 'so will my word be...' creates a more natural and elevated tone. This change also better reflects the fronted position of the verb (יִֽהְיֶה) in the Hebrew, which serves to emphasize the comparison with the preceding verse.
