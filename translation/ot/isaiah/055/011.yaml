id: ISA.55.11
reference: Isaiah 55:11
source:
  edition: WLC
  text: כֵּ֣ן יִֽהְיֶ֤ה דְבָרִ/י֙ אֲשֶׁ֣ר יֵצֵ֣א מִ/פִּ֔/י לֹֽא יָשׁ֥וּב אֵלַ֖/י רֵיקָ֑ם כִּ֤י אִם עָשָׂה֙ אֶת אֲשֶׁ֣ר חָפַ֔צְתִּי וְ/הִצְלִ֖יחַ אֲשֶׁ֥ר שְׁלַחְתִּֽי/ו־־־׃
translation:
  text: 'so will my word be that goes out from my mouth: it will not return to me empty, but it will accomplish what I desire and succeed in the purpose for which I sent it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'void.' The Hebrew means 'empty, without result.'
    reason: lexical_alternative
  - marker: b
    text: Or 'prosper in that for which I sent it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'so my word that goes out from my mouth will be:'.
    reason: previous_rendering
lexical_decisions:
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Links this verse to the preceding comparison of rain and snow; 'so' is natural modern English and preserves the comparative force.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  lexicon: HALOT
  rationale: Simple future sense; 'will be' is readable modern English.
- source_word: דְבָרִי
  chosen: my word
  alternatives:
  - my message
  - my speech
  lexicon: HALOT
  rationale: '''Word'' best preserves the broad semantic range of דָּבָר and matches the theological and literary resonance of divine speech in context.'
- source_word: אֲשֶׁר יֵצֵא מִפִּי
  chosen: that goes out from my mouth
  alternatives:
  - that comes out of my mouth
  - that proceeds from my mouth
  lexicon: HALOT
  rationale: Retains the concrete imagery of divine utterance. 'Goes out' is a straightforward rendering of יצא without over-formalizing as 'proceeds.'
- source_word: לֹא יָשׁוּב אֵלַי רֵיקָם
  chosen: it will not return to me empty
  alternatives:
  - it will not return to me void
  - it will not come back to me empty-handed
  lexicon: HALOT
  rationale: '''Return ... empty'' is the plain sense. ''Void'' is traditional but less natural in contemporary English; ''empty-handed'' is too interpretive.'
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - unless
  - except that
  - rather
  lexicon: HALOT
  rationale: 'Here the idiom introduces a strong contrast after negation: not X, but Y. ''But'' communicates the sense clearly in English.'
- source_word: עָשָׂה
  chosen: it will accomplish
  alternatives:
  - it has done
  - it does
  - it will do
  lexicon: HALOT
  rationale: Although morphologically a perfect, in this construction after the negated return clause it expresses the effective result of the word's mission. 'Accomplish' captures successful completion better than the generic 'do.'
- source_word: אֵת אֲשֶׁר חָפַצְתִּי
  chosen: what I desire
  alternatives:
  - what I delight in
  - what I please
  - what I have purposed
  lexicon: HALOT
  rationale: חפץ denotes desire, delight, or pleasure. 'What I desire' is clear and preserves divine volition without importing a stronger technical term like 'decree' or 'purpose' here.
- source_word: וְהִצְלִיחַ
  chosen: and succeed
  alternatives:
  - and prosper
  - and make successful
  lexicon: HALOT
  rationale: The verb means to succeed/prosper. 'Succeed' reads naturally in English and fits the subject 'word' better than the potentially material-sounding 'prosper.'
- source_word: אֲשֶׁר שְׁלַחְתִּיו
  chosen: in the purpose for which I sent it
  alternatives:
  - for that for which I sent it
  - in what I sent it for
  - in the matter for which I sent it
  lexicon: HALOT
  rationale: The Hebrew relative construction is compressed in English by making the implied goal explicit as 'the purpose for which.' This preserves the sense of commissioned intent without awkward literalism.
