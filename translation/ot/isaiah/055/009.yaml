id: ISA.55.9
reference: Isaiah 55:9
source:
  edition: WLC
  text: כִּֽי גָבְה֥וּ שָׁמַ֖יִם מֵ/אָ֑רֶץ כֵּ֣ן גָּבְה֤וּ דְרָכַ/י֙ מִ/דַּרְכֵי/כֶ֔ם
    וּ/מַחְשְׁבֹתַ֖/י מִ/מַּחְשְׁבֹתֵי/כֶֽם־׃
translation:
  text: For as the heavens are higher than the earth, so my ways are higher than your
    ways, and my thoughts than your thoughts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the skies.' Hebrew שָׁמַיִם is plural in form and often rendered 'heavens.'
    reason: lexical_alternative
  - marker: b
    text: '''Thoughts'' can also mean ''plans'' or ''intentions'' in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the previous statement. 'For'
    preserves the explanatory force in natural English.
- source_word: גָבְהוּ
  chosen: are higher
  alternatives:
  - are high
  - have risen high
  lexicon: HALOT
  rationale: The qatal form here expresses a stative/comparative sense in context,
    not an event of becoming high. 'Are higher' brings out the implied comparison
    with the following מִן-phrases.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the skies
  lexicon: HALOT
  rationale: Hebrew plural 'heavens' is standard and fitting in elevated poetic discourse.
    'Skies' is possible but less weighty and less traditional in this theological-poetic
    context.
- source_word: מֵאָרֶץ
  chosen: than the earth
  alternatives:
  - above the earth
  - from the earth
  lexicon: HALOT
  rationale: The preposition מִן marks comparison here. 'Than the earth' is the clearest
    English comparative rendering.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Signals the analogy between the height of the heavens over the earth
    and the superiority of God's ways and thoughts. 'So' is concise and natural.
- source_word: דְרָכַי
  chosen: my ways
  alternatives:
  - my paths
  - my manner of acting
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way/path' and in figurative usage denotes conduct
    or manner of action. 'Ways' preserves the metaphor and matches common biblical
    idiom.
- source_word: מִדַּרְכֵיכֶם
  chosen: than your ways
  alternatives:
  - above your ways
  - than your paths
  lexicon: HALOT
  rationale: Again the preposition marks comparison. 'Than your ways' keeps the parallelism
    exact and readable.
- source_word: וּמַחְשְׁבֹתַי
  chosen: and my thoughts
  alternatives:
  - and my plans
  - and my intentions
  lexicon: HALOT
  rationale: מַחֲשָׁבוֹת can denote thoughts, plans, or intentions. 'Thoughts' is
    preferred because it preserves the lexical parallel with v. 8 and keeps the conceptual
    breadth without narrowing to planning alone.
- source_word: מִמַּחְשְׁבֹתֵיכֶם
  chosen: than your thoughts
  alternatives:
  - than your plans
  - than your intentions
  lexicon: HALOT
  rationale: Comparative use of מִן as above. 'Thoughts' maintains the poetic and
    lexical correspondence with God's 'thoughts' in the preceding phrase.
