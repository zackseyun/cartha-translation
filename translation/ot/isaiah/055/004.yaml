theological_decisions:
- issue: Referent of the masculine suffix 'him'
  chosen_reading: Retain the pronoun 'him' without specifying the referent in translation.
  alternative_readings:
  - David specifically
  - the Davidic king / Messiah
  - Israel personified
  rationale: The immediate context evokes the covenant promises to David (v. 3), and
    the masculine singular likely points to David or the Davidic representative. Because
    the Hebrew text itself leaves the referent at the level of pronoun here, the translation
    preserves that ambiguity rather than resolving it doctrinally or interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
