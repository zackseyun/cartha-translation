id: ISA.55.4
reference: Isaiah 55:4
source:
  edition: WLC
  text: הֵ֛ן עֵ֥ד לְאוּמִּ֖ים נְתַתִּ֑י/ו נָגִ֥יד וּ/מְצַוֵּ֖ה לְאֻמִּֽים׃
translation:
  text: Behold, I have made him a witness to the peoples, a leader and commander for
    the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have given him as a witness to the peoples.'
    reason: lexical_alternative
  - marker: b
    text: The 'him' likely refers to David or to the Davidic representative in context;
      some readers understand a messianic reference here.
    reason: alternative_reading
  - marker: c
    text: Or 'nations' instead of 'peoples' for לְאֻמִּים.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse particle marking attention and emphasis. 'Behold' preserves
    the prophetic force more clearly than the more casual 'look' or 'see'.
- source_word: עֵד
  chosen: witness
  alternatives:
  - testimony
  - attesting witness
  lexicon: HALOT
  rationale: The noun denotes a person who bears witness rather than the abstract
    concept 'testimony' in this construction. 'Witness' fits the personal object suffix
    on 'I have made him'.
- source_word: לְאוּמִּים
  chosen: to the peoples
  alternatives:
  - for the peoples
  - to the nations
  lexicon: HALOT
  rationale: ל marks relation/direction here with עֵד, and לְאֻמִּים refers to peoples/nations
    collectively. 'Peoples' preserves the plural ethnic sense of לְאֻמִּים and avoids
    flattening to a singular collective.
- source_word: נְתַתִּיו
  chosen: I have made him
  alternatives:
  - I have given him
  - I gave him
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given him,' English idiom with
    predicate nouns ('witness,' 'leader,' 'commander') is better expressed as 'I have
    made him.' The perfect is rendered with present relevance.
- source_word: נָגִיד
  chosen: leader
  alternatives:
  - prince
  - ruler
  lexicon: HALOT
  rationale: נָגִיד often denotes one set over others in leadership. 'Leader' is broad
    and natural English; 'prince' would sound overly monarchical and potentially misleading
    here, while 'ruler' may overstate coercive authority.
- source_word: וּמְצַוֶּה
  chosen: and commander
  alternatives:
  - and one who commands
  - and lawgiver
  lexicon: HALOT
  rationale: The participial form from צוה denotes one who gives commands. 'Commander'
    is concise and idiomatic in apposition with 'leader.' 'Lawgiver' is too specific
    for this context.
- source_word: לְאֻמִּים
  chosen: for the peoples
  alternatives:
  - to the peoples
  - over the peoples
  lexicon: HALOT
  rationale: With 'leader and commander,' English idiom favors 'for the peoples' to
    express role in relation to them. Repeating 'the peoples' preserves the Hebrew
    repetition and rhetorical balance.
