id: ISA.55.8
reference: Isaiah 55:8
source:
  edition: WLC
  text: כִּ֣י לֹ֤א מַחְשְׁבוֹתַ/י֙ מַחְשְׁב֣וֹתֵי/כֶ֔ם וְ/לֹ֥א דַרְכֵי/כֶ֖ם דְּרָכָ֑/י נְאֻ֖ם יְהוָֽה׃
translation:
  text: For my thoughts are not your thoughts, and your ways are not my ways, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because my plans are not your plans, and your ways are not my ways.' The Hebrew word for 'thoughts' can also carry the sense of 'plans' or 'intentions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation; 'For' is idiomatic and preserves the explanatory force without over-specifying causation.
- source_word: מַחְשְׁבוֹתַי / מַחְשְׁבוֹתֵיכֶם
  chosen: thoughts
  alternatives:
  - plans
  - intentions
  lexicon: HALOT
  rationale: The noun can denote thoughts, plans, or intentions. 'Thoughts' preserves the lexical repetition and matches the parallel with 'ways' while remaining broad enough to include purposes without narrowing the sense.
- source_word: דַרְכֵיכֶם / דְּרָכָי
  chosen: ways
  alternatives:
  - paths
  - conduct
  lexicon: HALOT
  rationale: '''Ways'' is the natural English equivalent in this poetic and theological context, preserving both literal-path and figurative-conduct resonance. ''Conduct'' would narrow the metaphor; ''paths'' would sound overly concrete.'
- source_word: לֹא ... וְלֹא
  chosen: are not ... and ... are not
  alternatives:
  - are not ... nor are ...
  lexicon: HALOT
  rationale: English verbal supply is required because Hebrew omits the copula in nominal clauses. Repeating 'are not' preserves the balanced parallelism and clarity.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic utterance formula. 'Declares the LORD' is clear modern English and preserves prophetic solemnity. 'Oracle of the LORD' is more formal but less natural in running translation; 'says the LORD' is possible but slightly flatter.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
