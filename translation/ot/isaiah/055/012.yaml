id: ISA.55.12
reference: Isaiah 55:12
source:
  edition: WLC
  text: כִּֽי בְ/שִׂמְחָ֣ה תֵצֵ֔אוּ וּ/בְ/שָׁל֖וֹם תּֽוּבָל֑וּ/ן הֶ/הָרִ֣ים וְ/הַ/גְּבָע֗וֹת
    יִפְצְח֤וּ לִ/פְנֵי/כֶם֙ רִנָּ֔ה וְ/כָל עֲצֵ֥י הַ/שָּׂדֶ֖ה יִמְחֲאוּ כָֽף־־־׃
translation:
  text: For you will go out with joy and be led out in peace; the mountains and the
    hills will break out in singing before you, and all the trees of the field will
    clap their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be led in peace.' The Hebrew verb means 'be led' or 'be conducted';
      'be led out' is chosen to reflect the parallel with 'you will go out.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will burst forth into song before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or result flowing from the preceding invitation
    and promise. 'For' preserves the connective force naturally in English.
- source_word: בְשִׂמְחָה
  chosen: with joy
  alternatives:
  - in joy
  - joyfully
  lexicon: HALOT
  rationale: The preposition ב plus שִׂמְחָה is most naturally rendered instrumentally
    or adverbially. 'With joy' is idiomatic and preserves the noun rather than converting
    it to an adverb.
- source_word: תֵצֵאוּ
  chosen: you will go out
  alternatives:
  - you will come out
  - you will depart
  lexicon: HALOT
  rationale: יָצָא commonly means 'go out/come out.' 'Go out' fits the exodus/restoration
    imagery and the future second person plural form.
- source_word: וּבְשָׁלוֹם
  chosen: in peace
  alternatives:
  - with peace
  - safely
  - in well-being
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, wholeness, and well-being. 'In peace' is the
    most natural concise rendering here and preserves the covenantal resonance without
    overexpanding.
- source_word: תּוּבָלוּן
  chosen: be led out
  alternatives:
  - be led
  - be escorted
  lexicon: HALOT
  rationale: The verb יבל in the Hophil denotes being led or conducted. Because the
    parallel with 'go out' is strong in context, 'be led out' makes explicit the movement
    implied by the restoration scene while remaining faithful to the sense.
- source_word: הֶהָרִים וְהַגְּבָעוֹת
  chosen: the mountains and the hills
  alternatives:
  - the mountains and the high places
  lexicon: HALOT
  rationale: A standard merism for the natural landscape. 'Hills' is the normal rendering
    of גְּבָעוֹת in this poetic context.
- source_word: יִפְצְחוּ ... רִנָּה
  chosen: will break out in singing
  alternatives:
  - will burst forth into song
  - will break forth with a ringing cry
  lexicon: HALOT
  rationale: The idiom פצח + רנה conveys an exuberant outburst of song or joyful cry.
    'Break out in singing' is vivid, idiomatic, and preserves the poetic energy.
- source_word: לִפְנֵיכֶם
  chosen: before you
  alternatives:
  - in your presence
  - ahead of you
  lexicon: HALOT
  rationale: The phrase marks the landscape as responding in front of the returning
    people. 'Before you' is both literal and natural.
- source_word: וְכָל עֲצֵי הַשָּׂדֶה
  chosen: and all the trees of the field
  alternatives:
  - and every tree of the countryside
  lexicon: HALOT
  rationale: Keeps the collective poetic image intact. 'Field' is the conventional
    and accurate rendering of שָּׂדֶה here.
- source_word: יִמְחֲאוּ כָף
  chosen: will clap their hands
  alternatives:
  - will strike the palm
  - will applaud
  lexicon: HALOT
  rationale: A Hebrew idiom for clapping. Because the subject is trees, the anthropomorphic
    image should be preserved rather than flattened to 'applaud.'
