theological_decisions:
- issue: Poetic personification of creation in restoration imagery
  chosen_reading: Retain the mountains, hills, and trees as personified participants
    in joy
  alternative_readings:
  - Flatten to a non-personified description of nature's beauty
  rationale: The Hebrew poetry intentionally depicts creation rejoicing alongside
    the redeemed community. Preserving the personification maintains the theological
    theme of cosmic restoration without importing additional doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
