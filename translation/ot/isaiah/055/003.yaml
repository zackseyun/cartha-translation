theological_decisions:
- issue: Meaning of 'the faithful חסדי David' in relation to the covenant
  chosen_reading: The phrase refers to God's reliable covenantal promises/love granted
    to David, now extended to the hearers in the everlasting covenant.
  alternative_readings:
  - The faithful acts of devotion performed by David
  - The mercies promised to David
  rationale: In context, God is the speaker promising to make an everlasting covenant
    with the audience. Therefore the phrase most plausibly identifies that covenant
    with the dependable Davidic covenant blessings/promises. This preserves the Davidic-covenant
    connection without importing later doctrinal conclusions into the wording itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
