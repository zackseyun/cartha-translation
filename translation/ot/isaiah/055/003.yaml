id: ISA.55.3
reference: Isaiah 55:3
source:
  edition: WLC
  text: הַטּ֤וּ אָזְנְ/כֶם֙ וּ/לְכ֣וּ אֵלַ֔/י שִׁמְע֖וּ וּ/תְחִ֣י נַפְשְׁ/כֶ֑ם וְ/אֶכְרְתָ֤ה
    לָ/כֶם֙ בְּרִ֣ית עוֹלָ֔ם חַֽסְדֵ֥י דָוִ֖ד הַ/נֶּאֱמָנִֽים׃
translation:
  text: Incline your ear and come to me; hear, so that your soul may live; and I will
    make with you an everlasting covenant—the faithful covenant love shown to David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the sure mercies of David' / 'the steadfast love promised to David.'
      The Hebrew phrase can be rendered in several ways because חֶסֶד carries senses
      such as covenant love, kindness, or mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַטּוּ
  chosen: Incline
  alternatives:
  - Turn
  - Bend
  lexicon: HALOT
  rationale: Imperative of נטה with 'ear' is an idiom meaning to bend or incline the
    ear in attentive listening. 'Incline' preserves the metaphor and solemn tone better
    than the flatter 'listen.'
- source_word: אָזְנְכֶם
  chosen: your ear
  alternatives:
  - your ears
  lexicon: HALOT
  rationale: Hebrew uses the singular noun with 2mp suffix in a collective idiom.
    English commonly renders the idiom with singular ('incline your ear'), preserving
    the source expression naturally.
- source_word: וּלְכוּ אֵלַי
  chosen: and come to me
  alternatives:
  - and go to me
  lexicon: HALOT
  rationale: הלך with אֶל in invitation contexts is idiomatically 'come to me' from
    the speaker's perspective, not woodenly 'go to me.'
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: '''Hear'' keeps the covenantal resonance of שמע, which often implies
    receptive obedience as well as auditory hearing, without over-translating to ''obey''
    here.'
- source_word: וּתְחִי נַפְשְׁכֶם
  chosen: so that your soul may live
  alternatives:
  - and your soul shall live
  - that you may live
  lexicon: HALOT
  rationale: The jussive/imperfect form after the imperative is purposive/resultative.
    'So that your soul may live' preserves both the syntax and the explicit noun נֶפֶשׁ
    rather than flattening it to merely 'you.'
- source_word: נַפְשְׁכֶם
  chosen: your soul
  alternatives:
  - your life
  - yourselves
  lexicon: HALOT
  rationale: נפש can denote life, self, or soul. Here 'your soul' preserves the Hebrew
    wording and the verse's elevated register, while still communicating the whole-person
    sense.
- source_word: וְאֶכְרְתָה לָכֶם בְּרִית
  chosen: and I will make with you a covenant
  alternatives:
  - and I will cut with you a covenant
  - and I will establish for you a covenant
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant.' 'Make with you
    a covenant' is natural English while retaining the covenantal force.
- source_word: בְּרִית עוֹלָם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  lexicon: HALOT
  rationale: עוֹלָם in covenant contexts is well rendered 'everlasting,' the established
    and natural English equivalent.
- source_word: חַסְדֵי דָוִד
  chosen: the covenant love shown to David
  alternatives:
  - the steadfast love for David
  - the mercies of David
  - the faithful kindnesses of David
  lexicon: HALOT
  rationale: 'חסד is difficult to capture with one English word. In this covenant
    context it denotes loyal, gracious covenant love. The genitive with David is most
    naturally objective/associative here: the covenantal promises shown to David,
    not David''s own acts of mercy.'
- source_word: הַנֶּאֱמָנִים
  chosen: faithful
  alternatives:
  - sure
  - trustworthy
  lexicon: HALOT
  rationale: Participle/adjectival form from אמן describes the Davidic חסדים as reliable
    and certain. 'Faithful' is clear modern English; 'sure mercies' reflects tradition
    but is less transparent to contemporary readers.
