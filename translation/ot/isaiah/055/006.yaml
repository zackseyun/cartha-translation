id: ISA.55.6
reference: Isaiah 55:6
source:
  edition: WLC
  text: דִּרְשׁ֥וּ יְהוָ֖ה בְּ/הִמָּצְא֑/וֹ קְרָאֻ֖/הוּ בִּֽ/הְיוֹת֥/וֹ קָרֽוֹב׃
translation:
  text: Seek Yahweh while he may be found; call on him while he is near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while he is to be found.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  chosen: Seek
  alternatives:
  - inquire of
  - seek after
  lexicon: HALOT
  rationale: דרש in the imperative commonly means to seek, especially in the sense of seeking God in repentance or worship. 'Seek' is idiomatic, concise, and preserves the exhortational force without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּהִמָּצְאוֹ
  chosen: while he may be found
  alternatives:
  - in his being found
  - when he is found
  - while he is to be found
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of מצא with pronominal suffix yields a temporal sense: ''while he is found'' or ''while he may be found.'' Adding ''may'' brings out the idiomatic English sense of present opportunity without implying uncertainty beyond the Hebrew''s temporal urgency.'
- source_word: קְרָאֻהוּ
  chosen: call on him
  alternatives:
  - call to him
  - invoke him
  lexicon: HALOT
  rationale: קרא with a personal object in this context means to call upon or invoke. 'Call on him' is natural modern English and preserves the religious sense of appeal/prayer better than the more wooden 'call to him.'
- source_word: בִּהְיוֹתוֹ
  chosen: while he is
  alternatives:
  - in his being
  - when he is
  lexicon: HALOT
  rationale: ב plus infinitive construct of היה functions temporally here. 'While he is' best matches the parallel structure with the first clause and preserves the urgent temporal frame.
- source_word: קָרוֹב
  chosen: near
  alternatives:
  - close at hand
  lexicon: HALOT
  rationale: קרוב means near, close, or accessible. 'Near' is the most direct and idiomatic rendering in this poetic summons, preserving both spatial and relational resonance.
