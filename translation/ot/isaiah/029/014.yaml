theological_decisions:
- issue: Gendered description of the wise/discerning group
  chosen_reading: wise men / discerning men
  alternative_readings:
  - wise ones / discerning ones
  - the wise / the discerning
  rationale: The Hebrew forms are masculine plural and refer to representative leaders
    or sages within the people. Per doctrine, gender-accurate rendering is preferred
    over flattening to gender-neutral language, while the collective suffix is rendered
    naturally as 'its.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering the פלא repetition
  chosen_reading: something astonishing and marvelous
  alternative_readings:
  - wonder upon wonder
  - marvelous wonder
  rationale: The verse emphasizes God's extraordinary act in judgment. The chosen
    wording preserves the rhetorical intensification without importing a specific
    theological interpretation beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
