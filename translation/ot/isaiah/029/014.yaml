id: ISA.29.14
reference: Isaiah 29:14
source:
  edition: WLC
  text: לָ/כֵ֗ן הִנְ/נִ֥י יוֹסִ֛ף לְ/הַפְלִ֥יא אֶת הָֽ/עָם הַ/זֶּ֖ה הַפְלֵ֣א וָ/פֶ֑לֶא
    וְ/אָֽבְדָה֙ חָכְמַ֣ת חֲכָמָ֔י/ו וּ/בִינַ֥ת נְבֹנָ֖י/ו תִּסְתַּתָּֽר־־׃ס
translation:
  text: Therefore, behold, I will again do something astonishing with this people—something
    astonishing and marvelous; and the wisdom of its wise men will perish, and the
    understanding of its discerning men will hide itself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will again deal wondrously with this people, with wonder upon wonder.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding
    indictment.
- source_word: הִנְנִי
  chosen: behold, I
  alternatives:
  - here I am
  - look, I am
  lexicon: HALOT
  rationale: Prophetic attention-getter plus first-person pronoun; 'behold' preserves
    the solemn deictic force in a readable way.
- source_word: יוֹסִף
  chosen: will again do
  alternatives:
  - will continue to
  - will add to
  lexicon: HALOT
  rationale: Hiphil of יסף with infinitive commonly means 'to continue/add to do';
    in English here 'will again do' best captures renewed divine action without awkward
    literalism.
- source_word: לְהַפְלִיא
  chosen: do something astonishing
  alternatives:
  - deal wondrously
  - cause to be wonderful
  - show wonder
  lexicon: HALOT
  rationale: Hiphil of פלא conveys doing something extraordinary or wondrous. 'Do
    something astonishing' is natural English and preserves the verbal force.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: Singular demonstrative phrase is best kept as 'this people,' a common
    prophetic expression, rather than pluralizing to 'these people.'
- source_word: הַפְלֵא וָפֶלֶא
  chosen: something astonishing and marvelous
  alternatives:
  - wonder upon wonder
  - utterly wonderful
  - wonderfully and wondrously
  lexicon: HALOT
  rationale: The construction intensifies the פלא word-group. The chosen rendering
    preserves the emphatic repetition in idiomatic English without becoming opaque.
- source_word: וְאָבְדָה
  chosen: will perish
  alternatives:
  - will vanish
  - will be lost
  lexicon: HALOT
  rationale: Qal perfect with vav in prophetic discourse has future/result sense.
    'Will perish' preserves the strong sense of coming to ruin/disappearance.
- source_word: חָכְמַת חֲכָמָיו
  chosen: the wisdom of its wise men
  alternatives:
  - the wisdom of its wise ones
  - the wisdom of his wise men
  lexicon: HALOT
  rationale: The suffix refers back to 'this people' as a collective singular. 'Its'
    is natural English agreement. 'Wise men' reflects the masculine plural source
    and the representative social class in view.
- source_word: וּבִינַת נְבֹנָיו
  chosen: the understanding of its discerning men
  alternatives:
  - the discernment of its prudent men
  - the insight of its intelligent men
  lexicon: HALOT
  rationale: בינה is 'understanding/discernment'; נבון denotes one who is discerning
    or prudent. The paired phrase should echo the previous colon while remaining readable.
- source_word: תִּסְתַּתָּר
  chosen: will hide itself
  alternatives:
  - will be hidden
  - will conceal itself
  lexicon: HALOT
  rationale: Reflexive/passive nuance from the stem is well represented by 'will hide
    itself,' matching the feminine singular subject 'understanding.'
