theological_decisions:
- issue: Referent of 'Ariel'
  chosen_reading: Retain 'Ariel' as a transliterated poetic place-name for Jerusalem
    rather than substituting 'Jerusalem' in the main text.
  alternative_readings:
  - Translate interpretively as 'Jerusalem'
  rationale: The Hebrew text names אֲרִיאֵל, and the translation philosophy prefers
    transliterating names while allowing interpretation to be preserved in notes if
    needed. This avoids importing an explanatory gloss into the main text.
  doctrine_reference: Translation philosophy §2 (Translate titles; transliterate names)
