id: ISA.29.7
reference: Isaiah 29:7
source:
  edition: WLC
  text: וְ/הָיָ֗ה כַּֽ/חֲלוֹם֙ חֲז֣וֹן לַ֔יְלָה הֲמוֹן֙ כָּל הַ/גּוֹיִ֔ם הַ/צֹּבְאִ֖ים
    עַל אֲרִיאֵ֑ל וְ/כָל צֹבֶ֨י/הָ֙ וּ/מְצֹ֣דָתָ֔/הּ וְ/הַ/מְּצִיקִ֖ים לָֽ/הּ־־־׃
translation:
  text: And the multitude of all the nations that wage war against Ariel, even all
    who wage war against her and her stronghold, and who distress her, will be like
    a dream, a vision of the night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ariel is Isaiah's poetic name for Jerusalem in this context.
    reason: cross_reference
  - marker: b
    text: Or 'a night vision.'
    reason: lexical_alternative
  - marker: c
    text: Or 'her fortress'; some understand this as 'the siegeworks against her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - and it shall be
  - and it will happen
  lexicon: HALOT
  rationale: The qatal with prefixed waw here introduces the ensuing comparison in
    prophetic discourse. English future 'will be' best captures the sense in context
    without archaic style.
- source_word: כַּחֲלוֹם
  chosen: like a dream
  alternatives:
  - as a dream
  lexicon: HALOT
  rationale: The prefixed כ marks comparison; 'like a dream' is natural modern English
    and preserves the simile.
- source_word: חֲזוֹן לַיְלָה
  chosen: a vision of the night
  alternatives:
  - a night vision
  - a vision in the night
  lexicon: HALOT
  rationale: The construct phrase literally means 'vision of night.' 'A vision of
    the night' preserves the poetic parallel with 'dream' while remaining readable.
    'Night vision' in modern English can suggest technology and is therefore avoided.
- source_word: הֲמוֹן כָּל הַגּוֹיִם
  chosen: the multitude of all the nations
  alternatives:
  - the throng of all the nations
  - the multitude of all the peoples
  lexicon: HALOT
  rationale: הֲמוֹן denotes a crowd, multitude, or tumultuous mass. 'Multitude' fits
    the military context and pairs well with 'all the nations.' גּוֹיִם is best rendered
    'nations' here, referring to foreign peoples arrayed in war.
- source_word: הַצֹּבְאִים עַל
  chosen: that wage war against
  alternatives:
  - that fight against
  - that assemble against
  lexicon: HALOT
  rationale: The participle from צבא in this context refers to military service or
    warfare. With עַל and the war setting, 'wage war against' makes the hostile military
    sense explicit.
- source_word: אֲרִיאֵל
  chosen: Ariel
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than interpreted
    in the main text. In Isaiah 29, Ariel is the poetic name for Jerusalem, but the
    source text uses the name itself.
- source_word: וְכָל צֹבֶיהָ
  chosen: even all who wage war against her
  alternatives:
  - and all her attackers
  - and all who serve in war against her
  lexicon: HALOT
  rationale: The suffix refers back to Ariel. Repeating 'wage war against' preserves
    the lexical connection with the previous participle and makes the military hostility
    clear.
- source_word: וּמְצֹדָתָהּ
  chosen: and her stronghold
  alternatives:
  - and her fortress
  - and her siegeworks
  lexicon: HALOT
  rationale: מְצוֹדָה commonly denotes a stronghold or fortress. Because the suffix
    is feminine singular, the phrase most naturally refers to Ariel's stronghold rather
    than the attackers' siegeworks. 'Stronghold' is broad enough to fit the poetic
    context.
- source_word: וְהַמְּצִיקִים לָהּ
  chosen: and who distress her
  alternatives:
  - and who oppress her
  - and who besiege her
  lexicon: HALOT
  rationale: The Hiphil participle of צוּק/ציק can denote causing distress, pressing
    hard, or oppressing. 'Distress' preserves the broader sense of hostile pressure
    without narrowing it to a specific military tactic.
