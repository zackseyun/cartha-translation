theological_decisions:
- issue: Referent of the singular pronouns ('he sees ... in his midst')
  chosen_reading: The singular refers to Jacob/Israel personified corporately, who
    sees his children within his midst.
  alternative_readings:
  - The singular refers more specifically to Abraham from the previous verse seeing
    his descendants.
  - The singular refers to Jacob as the patriarch rather than the nation personified.
  rationale: The immediate context mentions Jacob and Abraham (v.22), and the singular
    could echo either. The verse's corporate restoration imagery and the phrase 'the
    God of Israel' favor a personified-national reading in translation, while keeping
    the English broad enough not to over-resolve the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering of sanctification language
  chosen_reading: Use 'sanctify' for both קדש verbs.
  alternative_readings:
  - Use 'honor as holy' or 'acknowledge as holy' in one or both clauses.
  rationale: The repetition is rhetorically important in Hebrew and should remain
    visible in English. 'Sanctify' is understandable modern English here and preserves
    the theological emphasis on God's holiness.
  doctrine_reference: Consistency of key terms, or documented exception
