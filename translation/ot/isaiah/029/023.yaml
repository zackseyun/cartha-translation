id: ISA.29.23
reference: Isaiah 29:23
source:
  edition: WLC
  text: כִּ֣י בִ֠/רְאֹת/וֹ יְלָדָ֞י/ו מַעֲשֵׂ֥ה יָדַ֛/י בְּ/קִרְבּ֖/וֹ יַקְדִּ֣ישֽׁוּ
    שְׁמִ֑/י וְ/הִקְדִּ֨ישׁוּ֙ אֶת קְד֣וֹשׁ יַֽעֲקֹ֔ב וְ/אֶת אֱלֹהֵ֥י יִשְׂרָאֵ֖ל
    יַעֲרִֽיצוּ־־׃
translation:
  text: For when he sees his children, the work of my hands, in his midst, they will
    sanctify my name; they will sanctify the Holy One of Jacob, and they will stand
    in awe of the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when Abraham sees his children, the work of my hands, in his midst';
      the singular pronouns may echo the patriarchs named in the previous verse, especially
      Abraham or Jacob.
    reason: alternative_reading
  - marker: b
    text: Or 'they will fear' or 'they will revere.' The Hebrew verb includes the
      sense of reverential dread or awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding promise. 'For'
    fits the discourse flow while the following infinitive construct with ב marks
    the temporal sense 'when he sees.'
- source_word: בִרְאֹתוֹ
  chosen: when he sees
  alternatives:
  - in his seeing
  - as he sees
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct plus suffix commonly has
    temporal force. Smooth English requires 'when he sees' rather than a more wooden
    rendering.
- source_word: יְלָדָיו
  chosen: his children
  alternatives:
  - his sons
  - his offspring
  lexicon: HALOT
  rationale: ילד can denote children broadly, not only male sons. 'His children' is
    gender-accurate to the likely collective sense and fits the restoration context.
- source_word: מַעֲשֵׂה יָדַי
  chosen: the work of my hands
  alternatives:
  - my handiwork
  - what my hands have made
  lexicon: HALOT
  rationale: A common Hebrew expression for divine creation or formation. 'The work
    of my hands' preserves the concrete imagery and formal linkage to the Hebrew.
- source_word: בקרבו
  chosen: in his midst
  alternatives:
  - within him
  - among him
  lexicon: HALOT
  rationale: The singular suffix most naturally refers back to the singular antecedent,
    likely Jacob/Israel as a corporate figure. 'In his midst' preserves the singular
    while conveying that the children are present within the community/personified
    nation.
- source_word: יקדישו שמי
  chosen: they will sanctify my name
  alternatives:
  - they will hallow my name
  - they will treat my name as holy
  lexicon: HALOT
  rationale: קדש in the Hiphil means to regard or declare as holy. 'Sanctify my name'
    is a transparent and biblically resonant rendering in understandable English.
- source_word: והקדישו את קדוש יעקב
  chosen: they will sanctify the Holy One of Jacob
  alternatives:
  - they will acknowledge as holy the Holy One of Jacob
  - they will hallow the Holy One of Jacob
  lexicon: HALOT
  rationale: The repeated קדש should be reflected consistently. 'Holy One of Jacob'
    is a fixed Isaianic divine title and should be preserved literally.
- source_word: יעריצו
  chosen: they will stand in awe of
  alternatives:
  - they will fear
  - they will revere
  - they will dread
  lexicon: HALOT
  rationale: ערץ in the Hiphil conveys causing oneself to be in dread/awe before someone,
    often with reverential fear in relation to God. 'Stand in awe of' captures reverence
    without flattening it to mere terror.
- source_word: אלהי ישראל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: A standard divine title best rendered transparently and consistently.
