id: ISA.29.5
reference: Isaiah 29:5
source:
  edition: WLC
  text: וְ/הָיָ֛ה כְּ/אָבָ֥ק דַּ֖ק הֲמ֣וֹן זָרָ֑יִ/ךְ וּ/כְ/מֹ֤ץ עֹבֵר֙ הֲמ֣וֹן עָֽרִיצִ֔ים
    וְ/הָיָ֖ה לְ/פֶ֥תַע פִּתְאֹֽם׃
translation:
  text: But the multitude of your strangers shall become like fine dust, and the multitude
    of the ruthless like passing chaff; and it shall happen suddenly, in an instant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your foreigners.' The Hebrew term can denote strangers or foreign outsiders;
      in context they are hostile invaders.
    reason: lexical_alternative
  - marker: b
    text: Or 'like chaff that passes away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: shall become / it shall happen
  alternatives:
  - will be
  - shall be
  lexicon: HALOT
  rationale: The verb היה occurs twice with slightly different force in the verse.
    In the first clause, with comparative predicates ('like fine dust ... like passing
    chaff'), English reads more naturally as 'shall become.' In the final clause,
    the idiom points to the event's occurrence, so 'it shall happen' best conveys
    the sense.
- source_word: כְּאָבָק דַּק
  chosen: like fine dust
  alternatives:
  - like thin dust
  - like powdery dust
  lexicon: HALOT
  rationale: אָבָק is 'dust' and דַּק adds the sense of fineness/smallness. 'Fine
    dust' is idiomatic and preserves the image of something easily scattered.
- source_word: הֲמוֹן
  chosen: multitude
  alternatives:
  - crowd
  - horde
  - throng
  lexicon: HALOT
  rationale: הֲמוֹן denotes a mass or multitude. 'Multitude' fits the elevated prophetic
    register and works in both occurrences.
- source_word: זָרָיִךְ
  chosen: your strangers
  alternatives:
  - your foreigners
  - your enemies
  lexicon: HALOT
  rationale: The noun from זוּר fundamentally denotes strangers/foreigners. In context
    these are hostile outsiders, but 'strangers' stays closer to the Hebrew while
    allowing the adversarial sense to emerge from context. 'Enemies' would over-interpret.
- source_word: וּכְמֹץ עֹבֵר
  chosen: and ... like passing chaff
  alternatives:
  - and like flying chaff
  - and like chaff that passes away
  lexicon: HALOT
  rationale: מֹץ is chaff; עֹבֵר literally 'passing' or 'passing by.' 'Passing chaff'
    preserves the participial imagery of chaff blown along and disappearing quickly.
- source_word: עָרִיצִים
  chosen: the ruthless
  alternatives:
  - the tyrants
  - the violent ones
  - the terrible ones
  lexicon: HALOT
  rationale: עָרִיץ often refers to ruthless or violent oppressors. 'The ruthless'
    is clear modern English and preserves the moral force without sounding archaic.
- source_word: לְפֶתַע פִּתְאֹם
  chosen: suddenly, in an instant
  alternatives:
  - in a moment, suddenly
  - all at once, suddenly
  lexicon: HALOT
  rationale: The paired adverbs intensify abruptness. Rendering both terms avoids
    flattening the Hebrew emphasis; 'suddenly, in an instant' is natural and emphatic.
