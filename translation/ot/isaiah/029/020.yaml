id: ISA.29.20
reference: Isaiah 29:20
source:
  edition: WLC
  text: כִּֽי אָפֵ֥ס עָרִ֖יץ וְ/כָ֣לָה לֵ֑ץ וְ/נִכְרְת֖וּ כָּל שֹׁ֥קְדֵי אָֽוֶן־־׃
translation:
  text: For the ruthless one will come to nothing, the scoffer will be finished, and
    all who watch for wrongdoing will be cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tyrant' for 'the ruthless one.' The Hebrew עָרִיץ can denote an
      oppressive or violent person.
    reason: lexical_alternative
  - marker: b
    text: Or 'all who are intent on evil' or 'all who lie in wait for iniquity.' The
      Hebrew participle suggests vigilant, deliberate attention to wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding promise; 'For' fits
    the discourse flow naturally in English.
- source_word: אָפֵס
  chosen: will come to nothing
  alternatives:
  - will cease
  - is no more
  - will vanish
  lexicon: HALOT
  rationale: The verb conveys coming to an end or being brought to nonexistence. 'Will
    come to nothing' is idiomatic modern English and preserves the future/resultative
    sense in context.
- source_word: עָרִיץ
  chosen: the ruthless one
  alternatives:
  - the tyrant
  - the violent one
  - the ruthless
  lexicon: HALOT
  rationale: The noun denotes a ruthless, oppressive person. 'The ruthless one' preserves
    the singular individualizing force without over-specifying political tyranny.
- source_word: וְכָלָה
  chosen: will be finished
  alternatives:
  - will be ended
  - will perish
  - will be consumed
  lexicon: HALOT
  rationale: The verb means to be completed, ended, or brought to an end. 'Will be
    finished' is clear and parallels the first clause without implying destruction
    beyond what the Hebrew states.
- source_word: לֵץ
  chosen: the scoffer
  alternatives:
  - the mocker
  - the scorner
  lexicon: HALOT
  rationale: לֵץ commonly refers to one who mocks with arrogant contempt. 'Scoffer'
    is concise, natural, and preserves the moral tone of the Hebrew.
- source_word: וְנִכְרְתוּ
  chosen: will be cut off
  alternatives:
  - will be destroyed
  - will be eliminated
  lexicon: HALOT
  rationale: The Niphal of כרת often means to be cut off, whether by judgment or removal.
    'Will be cut off' preserves the covenantal/judicial resonance and avoids flattening
    the idiom.
- source_word: כָּל
  chosen: all
  alternatives:
  - every one of
  lexicon: HALOT
  rationale: Straightforward distributive/collective sense.
- source_word: שֹׁקְדֵי
  chosen: who watch for
  alternatives:
  - who are alert for
  - who lie in wait for
  - who are intent on
  lexicon: HALOT
  rationale: The participle from שׁקד conveys wakeful attentiveness or vigilant watching.
    Here it describes people actively on the lookout for opportunities related to
    evil; 'watch for' is both literal and idiomatic.
- source_word: אָוֶן
  chosen: wrongdoing
  alternatives:
  - evil
  - iniquity
  - trouble
  - wickedness
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or iniquity. In this context of
    morally corrupt actors, 'wrongdoing' communicates the ethical sense clearly in
    modern English.
