id: ISA.29.19
reference: Isaiah 29:19
source:
  edition: WLC
  text: וְ/יָסְפ֧וּ עֲנָוִ֛ים בַּֽ/יהוָ֖ה שִׂמְחָ֑ה וְ/אֶבְיוֹנֵ֣י אָדָ֔ם בִּ/קְד֥וֹשׁ יִשְׂרָאֵ֖ל יָגִֽילוּ׃
translation:
  text: The humble will again rejoice in Yahweh, and the poor among mankind will exult in the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The meek will again have joy in the LORD.' The Hebrew verb literally means 'will add/increase,' and the noun may be rendered 'joy' or 'gladness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the poor among humankind' or 'the poor of man.' The Hebrew אָדָם is generic here, referring to human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָסְפוּ
  chosen: will again increase
  alternatives:
  - will add
  - will increase
  - will once more have
  lexicon: HALOT
  rationale: The verb יסף in Hifil commonly means 'add, increase.' With שִׂמְחָה as its object, the sense is that joy is increased or added anew. 'Will again increase' captures both the iterative nuance and natural English syntax better than a wooden 'will add joy.'
- source_word: עֲנָוִים
  chosen: the humble
  alternatives:
  - the meek
  - the afflicted
  lexicon: HALOT
  rationale: עֲנָוִים can denote the humble/meek, often those lowly before God and socially oppressed. 'The humble' preserves the moral-spiritual nuance without excluding their low social status. 'Meek' is possible but less natural in contemporary English; 'afflicted' is too narrow here.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: 'Per doctrine, יְהוָה is rendered ''the LORD.'' The preposition ב marks the sphere/object of joy: their joy is in the LORD.'
- source_word: שִׂמְחָה
  chosen: their joy
  alternatives:
  - joy
  - gladness
  lexicon: HALOT
  rationale: Although the Hebrew lacks an explicit possessive pronoun, English idiom with 'increase' naturally supplies 'their joy' to express the object of the increase. This is an optimal-equivalence adjustment, not an addition of new content.
- source_word: וְאֶבְיוֹנֵי
  chosen: the poor
  alternatives:
  - the needy
  lexicon: HALOT
  rationale: אֶבְיוֹן denotes the poor/needy. 'The poor' is the most direct and idiomatic rendering in this poetic parallel with עֲנָוִים.
- source_word: אָדָם
  chosen: mankind
  alternatives:
  - man
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context as 'man' or 'humankind.' Here in construct with 'the poor,' it means poor human beings generally, not males specifically. 'Mankind' preserves the representative human sense while remaining gender-accurate to the source's generic usage.
- source_word: בִּקְדוֹשׁ יִשְׂרָאֵל
  chosen: in the Holy One of Israel
  alternatives:
  - because of the Holy One of Israel
  - over the Holy One of Israel
  lexicon: HALOT
  rationale: The preposition ב here most naturally marks the object/sphere of rejoicing, parallel to 'in the LORD' in the first colon. 'The Holy One of Israel' is a fixed Isaianic divine title and should be translated, not paraphrased.
- source_word: יָגִילוּ
  chosen: will rejoice
  alternatives:
  - will exult
  - will be glad
  lexicon: HALOT
  rationale: גיל conveys exuberant rejoicing or exultation. 'Will rejoice' is clear modern English and fits the poetic parallelism; 'exult' is slightly more precise but less common.
