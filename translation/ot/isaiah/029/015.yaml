id: ISA.29.15
reference: Isaiah 29:15
source:
  edition: WLC
  text: ה֛וֹי הַ/מַּעֲמִיקִ֥ים מֵֽ/יהוָ֖ה לַ/סְתִּ֣ר עֵצָ֑ה וְ/הָיָ֤ה בְ/מַחְשָׁךְ֙ מַֽעֲשֵׂי/הֶ֔ם וַ/יֹּ֣אמְר֔וּ מִ֥י רֹאֵ֖/נוּ וּ/מִ֥י יוֹדְעֵֽ/נוּ׃
translation:
  text: Woe to those who go deep to hide counsel from Yahweh, whose deeds are in darkness, and who say, “Who sees us, and who knows us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the LORD''; that is, they attempt to conceal their plans from him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who dig deep to conceal a plan from the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces an oracle of denunciation/judgment. 'Woe' best preserves the prophetic force in natural English.
- source_word: הַמַּעֲמִיקִים
  chosen: those who go deep
  alternatives:
  - those who dig deep
  - those who deeply hide
  lexicon: HALOT
  rationale: From עמק in the Hiphil/causative sense of making deep or going deep. Here it is metaphorical for carrying out something in great secrecy. 'Go deep' preserves the image without over-paraphrasing.
- source_word: מֵיהוָה
  chosen: from the LORD
  alternatives:
  - away from the LORD
  - from Yahweh
  lexicon: HALOT
  rationale: The preposition marks concealment from YHWH. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: לַסְתִּר
  chosen: to hide
  alternatives:
  - to conceal
  lexicon: HALOT
  rationale: 'Infinitive of סתר expressing purpose: they go deep in order to hide.'
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - plan
  - purpose
  lexicon: HALOT
  rationale: '''Counsel'' captures deliberate planning, whether advice or scheme. In context it refers to secret plans. ''Plan'' is possible but ''counsel'' better reflects the Hebrew noun.'
- source_word: וְהָיָה
  chosen: whose ... are
  alternatives:
  - and their ... are
  - and it comes to be
  lexicon: HALOT
  rationale: 'The clause is idiomatically rendered in English as a relative description of the same people: ''whose deeds are in darkness.'' A wooden ''and their deeds were'' is less natural and may suggest past time not intended here.'
- source_word: בְמַחְשָׁךְ
  chosen: in darkness
  alternatives:
  - in the dark
  - in secret
  lexicon: HALOT
  rationale: Retains the concrete metaphor of darkness, which also implies secrecy and moral obscurity. 'In secret' would explain rather than translate.
- source_word: מַעֲשֵׂיהֶם
  chosen: deeds
  alternatives:
  - works
  - actions
  lexicon: HALOT
  rationale: '''Deeds'' is idiomatic and preserves the moral weight of what they do.'
- source_word: מִי רֹאֵנוּ
  chosen: Who sees us
  alternatives:
  - Who can see us
  lexicon: HALOT
  rationale: Directly reflects the Hebrew participial construction with first person plural suffix.
- source_word: וּמִי יוֹדְעֵנוּ
  chosen: and who knows us
  alternatives:
  - and who knows what we are doing
  - and who takes notice of us
  lexicon: HALOT
  rationale: Keeps the concise Hebrew wording. 'Knows us' here implies awareness of their actions, but the text itself states it tersely.
