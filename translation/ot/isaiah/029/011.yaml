id: ISA.29.11
reference: Isaiah 29:11
source:
  edition: WLC
  text: וַ/תְּהִ֨י לָ/כֶ֜ם חָז֣וּת הַ/כֹּ֗ל כְּ/דִבְרֵי֮ הַ/סֵּ֣פֶר הֶֽ/חָתוּם֒ אֲשֶֽׁר
    יִתְּנ֣וּ אֹת֗/וֹ אֶל יוֹדֵ֥עַ ה/ספר לֵ/אמֹ֖ר קְרָ֣א נָא זֶ֑ה וְ/אָמַר֙ לֹ֣א אוּכַ֔ל
    כִּ֥י חָת֖וּם הֽוּא־־־׃
translation:
  text: And the vision of all this has become to you like the words of a sealed scroll,
    which they give to one who knows the scroll, saying, “Please read this,” and he
    says, “I cannot, because it is sealed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to one who can read'; literally, 'to one who knows the scroll.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזוּת
  chosen: vision
  alternatives:
  - revelation
  - prophetic vision
  lexicon: HALOT
  rationale: The noun denotes a vision or prophetic revelation. 'Vision' is the most
    direct and natural rendering here, preserving the prophetic context without over-expanding.
- source_word: הַכֹּל
  chosen: all this
  alternatives:
  - the whole
  - everything
  lexicon: HALOT
  rationale: With the article on כֹּל, the phrase likely refers to the totality of
    the preceding revelatory content. 'All this' reads naturally in English and points
    back to the whole prophetic message.
- source_word: כְּדִבְרֵי
  chosen: like the words of
  alternatives:
  - like the words in
  - like the matter of
  lexicon: HALOT
  rationale: דִּבְרֵי is the construct plural of 'words/matters.' 'Like the words
    of' preserves the comparison closely and fits the following genitive phrase.
- source_word: הַסֵּפֶר
  chosen: scroll
  alternatives:
  - book
  - document
  lexicon: HALOT
  rationale: In Isaiah's setting, סֵפֶר commonly refers to a written scroll rather
    than a modern codex-style 'book.' 'Scroll' is historically and culturally more
    accurate.
- source_word: הֶחָתוּם / חָתוּם
  chosen: sealed
  alternatives:
  - closed
  - shut up
  lexicon: HALOT
  rationale: The passive participle from חתם means 'sealed.' This is the standard
    and contextually precise rendering for a document inaccessible because of a seal.
- source_word: יוֹדֵעַ הַסֵּפֶר
  chosen: one who knows the scroll
  alternatives:
  - one who can read
  - one learned in the scroll
  - a literate man
  lexicon: HALOT
  rationale: Literally, the phrase is 'one knowing the scroll/book.' It refers to
    a literate person, but the Hebrew expression is tied to knowledge of the written
    document. 'One who knows the scroll' preserves the wording while remaining intelligible.
    The more idiomatic sense 'one who can read' is worth preserving in a footnote.
- source_word: קְרָא נָא
  chosen: Please read
  alternatives:
  - Read, please
  - Kindly read
  lexicon: HALOT
  rationale: The imperative with נָא expresses a polite request. 'Please read' is
    natural modern English and preserves the requestive force.
- source_word: לֹא אוּכַל
  chosen: I cannot
  alternatives:
  - I am not able
  - I cannot read it
  lexicon: HALOT
  rationale: The verb יכל means 'to be able.' 'I cannot' is the straightforward rendering.
    Adding 'read it' would make explicit what is implied, but the Hebrew itself simply
    says 'I cannot.'
- source_word: וַתְּהִי לָכֶם
  chosen: has become to you
  alternatives:
  - became to you
  - is to you
  lexicon: HALOT
  rationale: The wayyiqtol here carries the sense of resultant state in context. 'Has
    become to you' communicates the present effect of the prophetic judgment while
    staying close to the Hebrew.
