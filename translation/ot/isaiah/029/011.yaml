theological_decisions:
- issue: Metaphor of inaccessible revelation
  chosen_reading: Retain the image of a sealed scroll without interpretive expansion
  alternative_readings:
  - Paraphrase as inability to understand God's word
  - Render more dynamically as 'the whole revelation is unintelligible to you'
  rationale: The verse presents a simile of revelation becoming inaccessible, and
    the metaphor itself carries the theological force. Preserving the image avoids
    importing a fuller doctrinal explanation than the text states.
  doctrine_reference: Translation philosophy items 1 and 3
