id: ISA.29.8
reference: Isaiah 29:8
source:
  edition: WLC
  text: וְ/הָיָ֡ה כַּ/אֲשֶׁר֩ יַחֲלֹ֨ם הָ/רָעֵ֜ב וְ/הִנֵּ֣ה אוֹכֵ֗ל וְ/הֵקִיץ֮ וְ/רֵיקָ֣ה
    נַפְשׁ/וֹ֒ וְ/כַ/אֲשֶׁ֨ר יַחֲלֹ֤ם הַ/צָּמֵא֙ וְ/הִנֵּ֣ה שֹׁתֶ֔ה וְ/הֵקִיץ֙ וְ/הִנֵּ֣ה
    עָיֵ֔ף וְ/נַפְשׁ֖/וֹ שׁוֹקֵקָ֑ה כֵּ֣ן יִֽהְיֶ֗ה הֲמוֹן֙ כָּל הַ/גּוֹיִ֔ם הַ/צֹּבְאִ֖ים
    עַל הַ֥ר צִיּֽוֹן־־׃ס
translation:
  text: And it will be as when a hungry man dreams, and look, he is eating, but he
    wakes and his appetite is empty; and as when a thirsty man dreams, and look, he
    is drinking, but he wakes, and look, he is faint and his appetite still craves.
    So will be the multitude of all the nations that wage war against Mount Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his soul is empty.' Hebrew נֶפֶשׁ often means 'soul,' but here likely
      refers to the person's appetite or inner craving in the context of hunger and
      thirst.
    reason: lexical_alternative
  - marker: b
    text: Or 'his soul craves' / 'his throat is parched.' The Hebrew expression emphasizes
      continuing desire after waking, despite the dream of drinking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will be
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: Introduces the comparison with a future/resultative sense. 'And it will
    be' is natural modern English while preserving the Hebrew narrative-prophetic
    formula.
- source_word: כַּאֲשֶׁר
  chosen: as when
  alternatives:
  - like when
  - just as
  lexicon: HALOT
  rationale: Signals a simile. 'As when' fits the repeated comparative structure in
    both halves of the verse.
- source_word: יַחֲלֹם
  chosen: dreams
  alternatives:
  - dreameth
  - is dreaming
  lexicon: HALOT
  rationale: Imperfect verb in a generalizing comparison; English present tense best
    conveys the vivid, proverbial scenario.
- source_word: הָרָעֵב
  chosen: a hungry man
  alternatives:
  - the hungry one
  - the hungry man
  lexicon: HALOT
  rationale: The adjective with article functions substantivally. 'A hungry man' reads
    naturally in English and matches the representative singular. 'Man' preserves
    the masculine singular form per gender-accurate policy.
- source_word: וְהִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Retains the vivid deictic force of the Hebrew without archaic 'behold.'
    Repeated in the verse to preserve the dreamlike immediacy.
- source_word: אוֹכֵל
  chosen: he is eating
  alternatives:
  - he eats
  lexicon: HALOT
  rationale: Participle in dream scene; progressive English captures the ongoing action
    vividly.
- source_word: וְהֵקִיץ
  chosen: but he wakes
  alternatives:
  - and he awakes
  - then he wakes up
  lexicon: HALOT
  rationale: The conjunction here is rendered adversatively in context because waking
    reverses the dream satisfaction. 'Wakes' is concise and natural.
- source_word: וְרֵיקָה נַפְשׁוֹ
  chosen: his appetite is empty
  alternatives:
  - his soul is empty
  - he is empty within
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers not to the immaterial soul in a technical theological
    sense but to the life/self as the seat of desire or appetite. 'His appetite is
    empty' best fits the hunger imagery and avoids misleading anthropological overtones.
- source_word: הַצָּמֵא
  chosen: a thirsty man
  alternatives:
  - the thirsty one
  - the thirsty man
  lexicon: HALOT
  rationale: Substantival adjective parallel to 'a hungry man.' 'Man' preserves the
    masculine representative singular.
- source_word: שֹׁתֶה
  chosen: he is drinking
  alternatives:
  - he drinks
  lexicon: HALOT
  rationale: Participle rendered progressively for vividness and parallelism with
    'he is eating.'
- source_word: עָיֵף
  chosen: he is faint
  alternatives:
  - he is weary
  - he is exhausted
  lexicon: HALOT
  rationale: In the thirst context, 'faint' better conveys physical depletion than
    the broader 'weary.'
- source_word: וְנַפְשׁוֹ שׁוֹקֵקָה
  chosen: his appetite still craves
  alternatives:
  - his soul is craving
  - his throat is parched
  - his desire longs
  lexicon: HALOT
  rationale: שׁוֹקֵקָה conveys strong craving/longing. With נֶפֶשׁ in this bodily
    context, 'appetite' communicates ongoing thirst better than 'soul.' 'Still' is
    supplied to make explicit the contrast between dream satisfaction and waking lack.
- source_word: כֵּן יִהְיֶה
  chosen: So will be
  alternatives:
  - So it will be
  - Thus shall be
  lexicon: HALOT
  rationale: Marks the application of the simile to the nations. Inverted English
    keeps a slightly elevated prophetic cadence without sounding archaic.
- source_word: הֲמוֹן
  chosen: the multitude
  alternatives:
  - the throng
  - the uproar
  - the horde
  lexicon: HALOT
  rationale: Here the noun refers to the mass of peoples rather than merely noise.
    'Multitude' fits the following genitive 'of all the nations.'
- source_word: כָּל הַגּוֹיִם
  chosen: of all the nations
  alternatives:
  - of all the peoples
  - of all the Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם is the standard term for nations/peoples. 'Nations' is the most
    contextually appropriate and least interpretively loaded here.
- source_word: הַצֹּבְאִים
  chosen: that wage war against
  alternatives:
  - that assemble against
  - that fight against
  - that are massed against
  lexicon: HALOT
  rationale: From צבא in the sense of serving in warfare / mustering for battle. 'Wage
    war against' makes the hostile military sense explicit in idiomatic English.
- source_word: עַל הַר צִיּוֹן
  chosen: against Mount Zion
  alternatives:
  - upon Mount Zion
  - against the mountain of Zion
  lexicon: HALOT
  rationale: With hostile military context, עַל is best rendered 'against.' 'Mount
    Zion' is the standard English form for the place name.
