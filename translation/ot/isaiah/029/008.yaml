theological_decisions:
- issue: Rendering of נֶפֶשׁ in a bodily-desire context
  chosen_reading: appetite
  alternative_readings:
  - soul
  - self
  rationale: The verse uses dream imagery of hunger and thirst; נֶפֶשׁ here denotes
    the person's animating life/desire, especially appetite, not a technical statement
    about the immaterial soul. Rendering it as 'appetite' preserves the concrete sense
    and avoids importing later anthropological theology into the text.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Representative masculine singular in הָרָעֵב / הַצָּמֵא
  chosen_reading: a hungry man / a thirsty man
  alternative_readings:
  - the hungry person / the thirsty person
  rationale: The Hebrew is grammatically masculine singular and functions representatively.
    Per gender-accurate policy, 'man' is retained rather than neutralized, since the
    verse presents a generic human example rather than making a gender-specific theological
    claim.
  doctrine_reference: Translation philosophy §4
