id: ISA.29.21
reference: Isaiah 29:21
source:
  edition: WLC
  text: מַחֲטִיאֵ֤י אָדָם֙ בְּ/דָבָ֔ר וְ/לַ/מּוֹכִ֥יחַ בַּ/שַּׁ֖עַר יְקֹשׁ֑וּ/ן וַ/יַּטּ֥וּ
    בַ/תֹּ֖הוּ צַדִּֽיק׃ס
translation:
  text: those who make a man an offender by a word, and lay a snare for the one who
    reproves in the gate, and turn aside the righteous with emptiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who condemn a man for a word' or 'those who make a person sin
      by a word.' The Hebrew can carry either a judicial or causative nuance, though
      the legal setting favors the judicial sense here.
    reason: lexical_alternative
  - marker: b
    text: '''In the gate'' refers to the city gate as the place of public judgment
      and legal proceedings.'
    reason: cultural_note
  - marker: c
    text: Or 'turn aside the righteous for nothing' or 'deny justice to the righteous
      by what is empty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲטִיאֵי
  chosen: make ... an offender
  alternatives:
  - cause ... to sin
  - condemn
  lexicon: HALOT
  rationale: Hiphil participle of חטא can mean cause to sin or treat as guilty/offending.
    In this judicial context, paired with speech and legal corruption, 'make ... an
    offender' best captures declaring someone culpable by accusation rather than morally
    causing sin.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: The singular object is generic but individualizing. Per doctrine, gender-accurate
    over gender-neutral; 'a man' preserves the Hebrew singular generic usage better
    than the more abstract 'humankind.'
- source_word: בְּדָבָר
  chosen: by a word
  alternatives:
  - for a word
  - by testimony
  - on account of a matter
  lexicon: HALOT
  rationale: דבר can mean word, matter, or case. Here the phrase likely refers to
    incriminating someone on the basis of a mere word/charge. 'By a word' keeps the
    Hebrew compactness while allowing the judicial nuance.
- source_word: לַמּוֹכִיחַ
  chosen: the one who reproves
  alternatives:
  - the reprover
  - the one who argues a case
  - the one who corrects
  lexicon: HALOT
  rationale: The participle from יכח can denote reproving, deciding, or arguing a
    case. In context of the gate and legal injustice, this is likely the person who
    brings correction or legal challenge. 'The one who reproves' is broad enough to
    preserve both moral and judicial overtones.
- source_word: בַּשַּׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  lexicon: HALOT
  rationale: The city gate was the place of public judgment. 'In the gate' is a standard
    idiomatic rendering that preserves the Hebrew expression and its legal setting.
- source_word: יְקֹשׁוּן
  chosen: lay a snare
  alternatives:
  - ensnare
  - set a trap
  lexicon: HALOT
  rationale: From יקשׁ, to set a trap or snare. 'Lay a snare' is idiomatic English
    and preserves the metaphor of malicious entrapment.
- source_word: וַיַּטּוּ
  chosen: turn aside
  alternatives:
  - pervert
  - deny
  - bend away
  lexicon: HALOT
  rationale: From נטה in legal contexts, the sense is to bend or turn aside justice
    or a person’s cause. 'Turn aside' keeps the metaphor and allows the object 'the
    righteous' to stand naturally.
- source_word: בַּתֹּהוּ
  chosen: with emptiness
  alternatives:
  - for nothing
  - by falsehood
  - into chaos
  - with what is futile
  lexicon: HALOT
  rationale: תֹּהוּ often denotes emptiness, futility, or unreality. Here it likely
    means by empty/futile grounds, i.e., without valid basis. 'With emptiness' is
    somewhat formal but preserves the Hebrew image without over-interpreting as 'falsehood'
    or 'without cause.'
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the innocent
  - the just person
  lexicon: HALOT
  rationale: In legal context צדיק can mean righteous or innocent/vindicated. 'The
    righteous' preserves the broader ethical and judicial sense and matches common
    biblical usage.
