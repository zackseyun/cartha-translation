id: ISA.29.22
reference: Isaiah 29:22
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֤ר יְהוָה֙ אֶל בֵּ֣ית יַֽעֲקֹ֔ב אֲשֶׁ֥ר פָּדָ֖ה אֶת אַבְרָהָ֑ם
    לֹֽא עַתָּ֤ה יֵבוֹשׁ֙ יַֽעֲקֹ֔ב וְ/לֹ֥א עַתָּ֖ה פָּנָ֥י/ו יֶחֱוָֽרוּ־־־־׃
translation:
  text: 'Therefore thus says the LORD to the house of Jacob, he who redeemed Abraham:
    Jacob will no longer be ashamed, and his face will no longer grow pale.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be put to shame' for 'be ashamed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his face will no longer be pale.' The Hebrew verb literally refers to
      becoming pale or whitened, an image of shame or dismay.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential conjunction linking this statement to the preceding
    context; 'therefore' preserves the formal logical connection.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; concise and natural in English
    while remaining close to the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD'.
- source_word: אֶל בֵּית יַעֲקֹב
  chosen: to the house of Jacob
  alternatives:
  - concerning the house of Jacob
  - to Jacob's house
  lexicon: HALOT
  rationale: Retains the covenantal/corporate sense of 'house' rather than reducing
    it to individuals.
- source_word: אֲשֶׁר פָּדָה אֶת אַבְרָהָם
  chosen: he who redeemed Abraham
  alternatives:
  - who ransomed Abraham
  - who delivered Abraham
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the LORD and identifies
    him as the one who redeemed Abraham. 'Redeemed' preserves the covenantal and salvific
    resonance of פדה better than the more general 'delivered'.
- source_word: לֹא עַתָּה
  chosen: will no longer
  alternatives:
  - now ... not
  - not now
  lexicon: HALOT
  rationale: In context the phrase marks a reversal of present/future condition rather
    than a strictly temporal 'not now'; 'will no longer' communicates the idiomatic
    force in natural English.
- source_word: יֵבוֹשׁ
  chosen: be ashamed
  alternatives:
  - be put to shame
  - be disappointed
  lexicon: HALOT
  rationale: בוש commonly denotes shame/disgrace. 'Be ashamed' is clear and idiomatic;
    'be put to shame' is possible but slightly more interpretive regarding agency.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - the house of Jacob
  - Israel
  lexicon: HALOT
  rationale: The repeated singular proper name is retained as in the Hebrew, likely
    representing the people corporately through the patriarchal name.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his countenance
  lexicon: HALOT
  rationale: Literal rendering is natural English and preserves the embodied imagery.
- source_word: יֶחֱוָרוּ
  chosen: will ... grow pale
  alternatives:
  - be pale
  - blanch
  lexicon: HALOT
  rationale: The verb denotes becoming pale/whitened, here an image of shame or dismay.
    'Grow pale' is idiomatic modern English and preserves the metaphor.
