theological_decisions:
- issue: Referent of the relative clause 'who redeemed Abraham'
  chosen_reading: 'The clause identifies the LORD: ''thus says the LORD ... he who
    redeemed Abraham.'''
  alternative_readings:
  - The clause modifies 'house of Jacob' in apposition or as a more distant descriptor.
  rationale: Syntactically and contextually, the most natural reading is that the
    relative clause describes the LORD, highlighting his prior redemptive action as
    grounds for the promise to Jacob. This does not introduce extra doctrine but follows
    the Hebrew flow.
