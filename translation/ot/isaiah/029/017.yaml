id: ISA.29.17
reference: Isaiah 29:17
source:
  edition: WLC
  text: הֲ/לוֹא עוֹד֙ מְעַ֣ט מִזְעָ֔ר וְ/שָׁ֥ב לְבָנ֖וֹן לַ/כַּרְמֶ֑ל וְ/הַ/כַּרְמֶ֖ל
    לַ/יַּ֥עַר יֵחָשֵֽׁב־׃
translation:
  text: Is it not yet a very little while, and Lebanon will turn into an orchard,
    and the orchard will be regarded as a forest?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fruitful field' for 'orchard' (כַּרְמֶל). The Hebrew denotes fertile,
      cultivated land; 'orchard' is chosen to preserve the contrast with 'forest'
      in vivid modern English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Is it not
  alternatives:
  - Will it not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    it not' preserves the interrogative force more transparently than a bare asseveration
    like 'surely.'
- source_word: עוֹד מְעַט מִזְעָר
  chosen: yet a very little while
  alternatives:
  - in a very little while
  - only a little longer
  lexicon: HALOT
  rationale: 'The cluster intensifies brevity: עוֹד adds ''yet/still,'' מְעַט means
    ''little,'' and מִזְעָר further heightens smallness. ''Yet a very little while''
    preserves both the temporal sense and the emphatic shortness.'
- source_word: וְשָׁב
  chosen: will turn into
  alternatives:
  - will become
  - will return to
  lexicon: HALOT
  rationale: From שוב, here used idiomatically for a change of state. 'Will turn into'
    captures transformation more naturally in English than the more wooden 'will return,'
    which would mislead in this context.
- source_word: לְבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Proper geographic name, transliterated according to the translation philosophy.
    In context it likely evokes the forested region proverbially, but the name itself
    should remain 'Lebanon.'
- source_word: כַּרְמֶל
  chosen: orchard
  alternatives:
  - fruitful field
  - garden land
  lexicon: HALOT
  rationale: כַּרְמֶל denotes fertile, cultivated land rather than the proper name
    Carmel here. 'Orchard' conveys cultivated fruitfulness and creates a vivid contrast
    with 'forest.' 'Fruitful field' is possible, but 'orchard' better matches the
    transformation imagery in concise modern English.
- source_word: וְהַכַּרְמֶל
  chosen: and the orchard
  alternatives:
  - and the fruitful field
  lexicon: HALOT
  rationale: Repeats the same noun and should be rendered consistently. The article
    is represented naturally in English.
- source_word: לַיַּעַר
  chosen: as a forest
  alternatives:
  - for a forest
  - like a forest
  lexicon: HALOT
  rationale: 'יַעַר means ''forest/woodland.'' With יֵחָשֵׁב, the sense is classificatory
    or reputational: it will be considered/regarded as a forest.'
- source_word: יֵחָשֵׁב
  chosen: will be regarded
  alternatives:
  - will be considered
  - will be reckoned
  lexicon: HALOT
  rationale: The Niphal of חשב here expresses being accounted or considered. 'Will
    be regarded' is idiomatic modern English and preserves the passive evaluative
    sense.
