id: ISA.29.10
reference: Isaiah 29:10
source:
  edition: WLC
  text: כִּֽי נָסַ֨ךְ עֲלֵי/כֶ֤ם יְהוָה֙ ר֣וּחַ תַּרְדֵּמָ֔ה וַ/יְעַצֵּ֖ם אֶת עֵֽינֵי/כֶ֑ם
    אֶת הַ/נְּבִיאִ֛ים וְ/אֶת רָאשֵׁי/כֶ֥ם הַ/חֹזִ֖ים כִּסָּֽה־־־־׃
translation:
  text: For the LORD has poured out on you a spirit of deep sleep, and has shut your
    eyes—the prophets—and covered your heads—the seers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of stupor.' The Hebrew term can denote deep sleep or a stupefying
      torpor.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew syntax likely identifies ''the prophets'' with ''your eyes'' and
      ''the seers'' with ''your heads''; alternatively, some take them as separate
      objects: ''He has shut the prophets and covered your heads, the seers.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding condition/judgment. 'For' fits
    the explanatory force in context.
- source_word: נָסַךְ
  chosen: has poured out
  alternatives:
  - has poured
  - has cast
  lexicon: HALOT
  rationale: The verb commonly conveys pouring/libation imagery. 'Has poured out'
    preserves the metaphor of YHWH causing an overwhelming condition to come upon
    them.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md.
- source_word: רוּחַ תַּרְדֵּמָה
  chosen: a spirit of deep sleep
  alternatives:
  - a spirit of stupor
  - a wind/spirit of deep sleep
  lexicon: HALOT
  rationale: רוּחַ can mean spirit/wind/breath; here an imposed inner condition is
    in view, so 'spirit' is best. תַּרְדֵּמָה denotes deep sleep, trance-like sleep,
    or stupor. 'Deep sleep' is the most direct rendering, while preserving the metaphorical/judicial
    sense.
- source_word: וַיְעַצֵּם
  chosen: has shut
  alternatives:
  - has closed
  - has blinded
  lexicon: HALOT
  rationale: The verb means to shut/close, especially of eyes. 'Has shut' is concrete
    and lets the metaphor stand without over-interpreting it as 'blinded.'
- source_word: עֵינֵיכֶם
  chosen: your eyes
  lexicon: HALOT
  rationale: Direct object of the preceding verb; literal rendering preserves the
    imagery.
- source_word: אֶת הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: 'Appositional to ''your eyes'' in this difficult syntax: the prophets
    are identified as the people''s eyes, i.e., those who should provide spiritual
    sight.'
- source_word: רָאשֵׁיכֶם
  chosen: your heads
  alternatives:
  - your leaders
  lexicon: HALOT
  rationale: 'Although ''heads'' can metaphorically mean leaders/chiefs, here it stands
    in parallel with ''the seers'' and is best retained literally in apposition: ''your
    heads—the seers.'' This preserves the Hebrew imagery and structure.'
- source_word: הַחֹזִים
  chosen: the seers
  alternatives:
  - those who see
  - visionaries
  lexicon: HALOT
  rationale: Standard prophetic term distinct from נביאים. 'Seers' is concise, idiomatic,
    and preserves the prophetic nuance.
- source_word: כִּסָּה
  chosen: covered
  alternatives:
  - has covered
  - has concealed
  lexicon: HALOT
  rationale: The perfect verb concludes the parallel image. English coordinates naturally
    as 'and covered your heads—the seers.' The auxiliary is omitted for smoother style
    after the previous perfects while retaining the same aspectual sense.
