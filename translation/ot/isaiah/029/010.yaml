theological_decisions:
- issue: Judicial hardening imagery
  chosen_reading: 'Render the verse as describing the LORD''s active judicial act:
    he has poured out deep sleep and shut/covered the people''s prophetic faculties.'
  alternative_readings:
  - Soften to permissive language such as 'allowed a spirit of deep sleep to come
    upon you'
  rationale: The Hebrew verbs attribute the action directly to YHWH. The translation
    preserves that tension rather than softening divine agency. This reflects the
    source text without importing a broader doctrinal system.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Syntactic relation of 'the prophets' and 'the seers'
  chosen_reading: Treat 'the prophets' and 'the seers' as appositional clarifications
    to 'your eyes' and 'your heads.'
  alternative_readings:
  - 'Take them as separate direct objects: ''He has shut the prophets and covered
    your heads, the seers'''
  rationale: 'The appositional reading best explains the accusative markers and parallelism,
    and it yields coherent imagery: the people''s ''eyes'' are the prophets, and their
    ''heads'' are the seers. The alternative is possible but less natural in context.'
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
