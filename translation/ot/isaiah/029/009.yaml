id: ISA.29.9
reference: Isaiah 29:9
source:
  edition: WLC
  text: הִתְמַהְמְה֣וּ וּ/תְמָ֔הוּ הִשְׁתַּֽעַשְׁע֖וּ וָ/שֹׁ֑עוּ שָֽׁכְר֣וּ וְ/לֹא
    יַ֔יִן נָע֖וּ וְ/לֹ֥א שֵׁכָֽר־׃
translation:
  text: Be stunned and be astonished; blind yourselves and be blind. They are drunk,
    but not with wine; they stagger, but not from strong drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Linger and be amazed.' The first pair of imperatives can carry the sense
      of hesitating in bewilderment as well as being stunned.
    reason: lexical_alternative
  - marker: b
    text: Or 'Be blinded and blind yourselves.' The Hebrew verbs in this pair are
      rare and difficult; they convey stupefaction or blindness.
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְמַהְמְהוּ
  chosen: Be stunned
  alternatives:
  - Delay yourselves
  - Linger in bewilderment
  lexicon: HALOT
  rationale: Hitpael imperative plural from מהה/מהמה conveys a reflexive or intransitive
    sense of hesitating or being stupefied. In this poetic parallelism with 'be astonished,'
    the sense is not temporal delay alone but stunned bewilderment.
- source_word: וּתְמָהוּ
  chosen: and be astonished
  alternatives:
  - and wonder
  - and be amazed
  lexicon: HALOT
  rationale: Qal imperative plural from תמהה means to be appalled, astonished, or
    amazed. 'Be astonished' preserves the forceful parallel with the previous imperative.
- source_word: הִשְׁתַּעַשְׁעוּ
  chosen: blind yourselves
  alternatives:
  - delight yourselves
  - be blinded
  lexicon: HALOT
  rationale: The consonantal form from שעע in this context is traditionally understood
    in the sense 'blind yourselves' or 'be blinded/stupefied,' not 'delight yourselves.'
    The following parallel verb וָשֹׁעוּ supports a semantic field of blindness/stupefaction
    rather than pleasure.
- source_word: וָשֹׁעוּ
  chosen: and be blind
  alternatives:
  - and be stupefied
  - and be dazzled
  lexicon: HALOT
  rationale: Qal imperative plural from שעע/שעה in a rare usage meaning to be blinded
    or dazed. Rendering it with 'be blind' keeps the parallelism concise and intelligible
    in English.
- source_word: שָׁכְרוּ
  chosen: They are drunk
  alternatives:
  - Become drunk
  - They have become drunk
  lexicon: HALOT
  rationale: Qal perfect 3cp functions descriptively here after the imperatives, shifting
    from command to condition/result. English present 'They are drunk' best captures
    the vivid prophetic description.
- source_word: וְלֹא יַיִן
  chosen: but not with wine
  alternatives:
  - yet not from wine
  lexicon: HALOT
  rationale: 'The negated noun phrase qualifies the drunkenness metaphorically: their
    condition resembles intoxication but is not caused by literal wine.'
- source_word: נָעוּ
  chosen: they stagger
  alternatives:
  - they reel
  - they totter
  lexicon: HALOT
  rationale: Qal perfect 3cp from נוע denotes shaking, swaying, or staggering. 'Stagger'
    is idiomatic and fits the intoxication imagery.
- source_word: וְלֹא שֵׁכָר
  chosen: but not from strong drink
  alternatives:
  - but not with beer
  - but not from intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר refers broadly to intoxicating drink other than wine. 'Strong
    drink' is the standard clear English equivalent and preserves the distinction
    from wine.
