theological_decisions:
- issue: Nature of the drunkenness/blindness imagery
  chosen_reading: Metaphorical spiritual stupor and blindness are expressed without
    making the metaphor more explicit than the Hebrew does.
  alternative_readings:
  - Literal intoxication
  - Expanded interpretation such as 'judicial hardening' in the main text
  rationale: The verse itself uses intoxication and blindness imagery to describe
    a non-literal condition ('not with wine... not from strong drink'). The translation
    preserves the metaphor and lets the context explain its theological significance
    rather than importing an interpretive expansion into the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
