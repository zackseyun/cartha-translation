theological_decisions:
- issue: Nature of the divine visitation in פקד
  chosen_reading: Retain the idiom 'you will be visited' rather than making the judgment
    explicit in the verb itself.
  alternative_readings:
  - you will be punished
  - he will punish you
  rationale: The context unmistakably presents judgment, but the Hebrew verb itself
    is broader and often theologically rich, referring to divine visitation in either
    mercy or judgment. Preserving 'visited' maintains that biblical idiom while the
    surrounding imagery supplies the negative force.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and aligns with the
    reverential convention noted in the doctrine excerpt.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
