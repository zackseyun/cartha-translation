id: ISA.29.6
reference: Isaiah 29:6
source:
  edition: WLC
  text: מֵ/עִ֨ם יְהוָ֤ה צְבָאוֹת֙ תִּפָּקֵ֔ד בְּ/רַ֥עַם וּ/בְ/רַ֖עַשׁ וְ/ק֣וֹל גָּד֑וֹל
    סוּפָה֙ וּ/סְעָרָ֔ה וְ/לַ֖הַב אֵ֥שׁ אוֹכֵלָֽה׃
translation:
  text: From the LORD of hosts you will be visited with thunder and with earthquake
    and a great noise, with whirlwind and storm, and with the flame of a consuming
    fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be punished.' The Hebrew verb literally means 'you will be
      visited,' a biblical idiom that can refer to divine intervention for either
      blessing or judgment; here the context indicates judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'with shaking' for 'with earthquake.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a loud sound' for 'a great noise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעִם
  chosen: From
  alternatives:
  - by
  - from the presence of
  lexicon: HALOT
  rationale: 'With פקד in the Niphal and a following agent, the preposition marks
    source/origin: the visitation comes from the LORD. ''From'' is idiomatic and preserves
    the sense without overexpanding to ''from the presence of.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the fixed divine title יהוה צבאות, 'LORD of hosts' is the established
    and semantically adequate rendering, conveying heavenly armies/hosts without narrowing
    the referent.
- source_word: תִּפָּקֵד
  chosen: you will be visited
  alternatives:
  - you will be punished
  - you will be attended to
  lexicon: HALOT
  rationale: Niphal of פקד often means 'to be visited/attended to,' whether for blessing
    or judgment depending on context. Here the accompanying storm-theophany imagery
    makes the visitation clearly judicial, but 'visited' preserves the Hebrew idiom
    and theological texture better than the more interpretive 'punished.' The 2ms
    form addresses Ariel/Jerusalem as a singular entity.
- source_word: בְּרַעַם
  chosen: with thunder
  alternatives:
  - in thunder
  lexicon: HALOT
  rationale: The beth here is instrumental/associative in a list of phenomena accompanying
    divine visitation. 'With thunder' is natural English.
- source_word: וּבְרַעַשׁ
  chosen: and with earthquake
  alternatives:
  - and with shaking
  - and with quaking
  lexicon: HALOT
  rationale: רַעַשׁ can denote shaking, quaking, or earthquake. In this storm-theophany
    sequence, 'earthquake' best captures the concrete force of the term in idiomatic
    English.
- source_word: וְקוֹל גָּדוֹל
  chosen: and a great noise
  alternatives:
  - and a loud sound
  - and a great voice
  lexicon: HALOT
  rationale: קוֹל broadly means sound/noise/voice. Since no speaker is specified and
    the context lists natural-theophanic phenomena, 'a great noise' best fits the
    sense. 'Voice' would sound too personified here.
- source_word: סוּפָה
  chosen: with whirlwind
  alternatives:
  - tempest
  - storm wind
  lexicon: HALOT
  rationale: סוּפָה commonly denotes a whirlwind or tempest. 'Whirlwind' gives distinct
    imagery alongside the following סְעָרָה rather than collapsing both into 'storm.'
- source_word: וּסְעָרָה
  chosen: and storm
  alternatives:
  - and tempest
  lexicon: HALOT
  rationale: Paired with סוּפָה, this term is rendered distinctly as 'storm' to preserve
    the poetic accumulation of violent weather imagery.
- source_word: וְלַהַב אֵשׁ אוֹכֵלָה
  chosen: and with the flame of a consuming fire
  alternatives:
  - and a flame of devouring fire
  - and flaming consuming fire
  lexicon: HALOT
  rationale: לַהַב is 'flame/blaze'; אֵשׁ אוֹכֵלָה is literally 'fire consuming/devouring.'
    'The flame of a consuming fire' preserves the construct-like relationship and
    the vivid destructive imagery in readable English.
