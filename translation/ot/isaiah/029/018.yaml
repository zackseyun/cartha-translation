id: ISA.29.18
reference: Isaiah 29:18
source:
  edition: WLC
  text: וְ/שָׁמְע֧וּ בַ/יּוֹם הַ/ה֛וּא הַ/חֵרְשִׁ֖ים דִּבְרֵי סֵ֑פֶר וּ/מֵ/אֹ֣פֶל
    וּ/מֵ/חֹ֔שֶׁךְ עֵינֵ֥י עִוְרִ֖ים תִּרְאֶֽינָה־־׃
translation:
  text: And on that day the deaf will hear the words of a book, and out of gloom and
    out of darkness the eyes of the blind will see.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the words of the scroll' or 'the words of a document'; Hebrew sefer
      can refer broadly to a written text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְעוּ
  chosen: And ... will hear
  alternatives:
  - and ... shall hear
  - then ... will hear
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context functions
    futuristically; English future best conveys the promise in context.
- source_word: בַיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic literature; 'on that day' is natural
    modern English while preserving the eschatological/prophetic marker.
- source_word: הַחֵרְשִׁים
  chosen: the deaf
  alternatives:
  - the deaf ones
  lexicon: HALOT
  rationale: Substantival adjective referring to deaf persons. 'The deaf' is idiomatic
    and concise.
- source_word: דִּבְרֵי סֵפֶר
  chosen: the words of a book
  alternatives:
  - the words of the scroll
  - the words of a document
  lexicon: HALOT
  rationale: דִּבְרֵי is construct 'words of'; סֵפֶר can denote book, scroll, or written
    document. 'Book' is the broadest natural rendering in English, while still allowing
    the sense of written revelation/literary text in context.
- source_word: וּמֵאֹפֶל
  chosen: and out of gloom
  alternatives:
  - and from gloom
  - and out of obscurity
  lexicon: HALOT
  rationale: The preposition מִן marks emergence/source. 'Out of gloom' captures movement
    from impaired condition into sight and pairs well with the following phrase.
- source_word: וּמֵחֹשֶׁךְ
  chosen: and out of darkness
  alternatives:
  - and from darkness
  lexicon: HALOT
  rationale: Parallel with אֹפֶל intensifies the image. Retaining both terms avoids
    flattening the Hebrew poetic parallelism.
- source_word: עֵינֵי עִוְרִים
  chosen: the eyes of the blind
  alternatives:
  - blind eyes
  - the eyes of blind people
  lexicon: HALOT
  rationale: Construct phrase is preserved most transparently as 'the eyes of the
    blind.' This keeps the Hebrew imagery explicit.
- source_word: תִּרְאֶינָה
  chosen: will see
  alternatives:
  - shall see
  - will look
  lexicon: HALOT
  rationale: Qal imperfect 3fp agrees with 'eyes' and denotes restored sight. 'Will
    see' is the most direct and natural rendering.
