theological_decisions:
- issue: Whether the verse should be rendered as literal physical healing only or
    in a way that leaves room for spiritual restoration imagery
  chosen_reading: Use concrete sensory language ('the deaf,' 'the blind,' 'hear,'
    'see') without adding interpretive qualifiers.
  alternative_readings:
  - Render more explicitly metaphorically as spiritual understanding and perception
  rationale: The Hebrew uses literal sensory terms, yet in Isaiah such language can
    also carry metaphorical force in context. To preserve theological tension rather
    than resolve it, the translation keeps the concrete wording and does not force
    either a purely physical or purely spiritual interpretation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
