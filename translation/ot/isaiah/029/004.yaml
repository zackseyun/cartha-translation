theological_decisions:
- issue: Rendering אוֹב in a context associated with forbidden necromancy
  chosen_reading: medium
  alternative_readings:
  - ghost
  - necromancer
  rationale: The verse uses simile to describe the city's faint, subterranean voice;
    it does not endorse the practice. 'Medium' preserves the lexical reference to
    necromantic practice while avoiding the misleading implication that the speaker
    literally becomes a ghost. The ghostly nuance is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
