id: ISA.29.4
reference: Isaiah 29:4
source:
  edition: WLC
  text: וְ/שָׁפַלְתְּ֙ מֵ/אֶ֣רֶץ תְּדַבֵּ֔רִי וּ/מֵֽ/עָפָ֖ר תִּשַּׁ֣ח אִמְרָתֵ֑/ךְ
    וְֽ֠/הָיָה כְּ/א֤וֹב מֵ/אֶ֨רֶץ֙ קוֹלֵ֔/ךְ וּ/מֵ/עָפָ֖ר אִמְרָתֵ֥/ךְ תְּצַפְצֵֽף׃
translation:
  text: Then you will be brought low; from the earth you will speak, and from the
    dust your speech will come in a whisper. Your voice will be like that of a medium
    from the earth, and from the dust your speech will chirp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a ghostly voice' or 'like a necromancer'; the Hebrew אוֹב is associated
      with a medium and the faint voice linked to necromancy.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַלְתְּ
  chosen: Then you will be brought low
  alternatives:
  - And you will be humbled
  - And you will be laid low
  lexicon: HALOT
  rationale: From שׁפל, expressing being made low/humbled. The passive-like English
    'be brought low' fits the context of judgment and the following imagery of speaking
    from the ground. 'Then' gives the conjunctive force in natural English.
- source_word: מֵאֶרֶץ
  chosen: from the earth
  alternatives:
  - from the ground
  lexicon: HALOT
  rationale: אֶרֶץ can mean earth/land/ground. Here the image is of being prostrate
    or reduced to the ground, so 'from the earth' preserves the poetic parallel with
    'from the dust' while remaining natural.
- source_word: תְּדַבֵּרִי
  chosen: you will speak
  lexicon: HALOT
  rationale: Straightforward rendering of דבר in the Piel, second feminine singular,
    matching the addressed city/personified Zion/Ariel.
- source_word: וּמֵעָפָר
  chosen: and from the dust
  lexicon: HALOT
  rationale: עָפָר is 'dust.' The repetition is retained for poetic parallelism and
    to preserve the abasement imagery.
- source_word: תִּשַּׁח
  chosen: your speech will come in a whisper
  alternatives:
  - your speech will be low
  - your speech will be bowed down
  lexicon: HALOT
  rationale: The verb is difficult and likely conveys low, subdued utterance. Rather
    than a wooden but unclear 'be low,' 'will come in a whisper' captures the sense
    in context and matches the imagery of a faint voice from dust.
- source_word: אִמְרָתֵךְ
  chosen: your speech
  alternatives:
  - your utterance
  - your word
  lexicon: HALOT
  rationale: אִמְרָה here refers to spoken utterance. 'Speech' is idiomatic in English
    and works in both occurrences.
- source_word: וְהָיָה
  chosen: Your voice will be
  alternatives:
  - And it will be
  lexicon: HALOT
  rationale: The clause introduces the resulting comparison. English smooths the impersonal
    Hebrew by making explicit the subject 'your voice' from the following noun phrase.
- source_word: כְּאוֹב
  chosen: like that of a medium
  alternatives:
  - like a ghost
  - like a necromancer
  lexicon: HALOT
  rationale: אוֹב commonly refers to a medium/necromancer, and by extension the ghostly
    voice associated with such practice. 'Medium' best preserves the lexical sense
    without importing an interpretation that the voice itself is a ghost. Because
    readers may think of the ghostly whispering effect, that nuance is preserved in
    a footnote.
- source_word: קוֹלֵךְ
  chosen: Your voice
  lexicon: HALOT
  rationale: קוֹל is 'voice/sound.' 'Voice' fits the comparison with speech and whispering.
- source_word: תְּצַפְצֵף
  chosen: will chirp
  alternatives:
  - will peep
  - will squeak
  lexicon: HALOT
  rationale: The verb denotes a chirping/peeping sound, often used for faint uncanny
    noises. 'Chirp' is contemporary and vivid, while preserving the eerie, thin quality
    of the utterance.
