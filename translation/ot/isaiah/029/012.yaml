id: ISA.29.12
reference: Isaiah 29:12
source:
  edition: WLC
  text: וְ/נִתַּ֣ן הַ/סֵּ֗פֶר עַל֩ אֲשֶׁ֨ר לֹֽא יָדַ֥ע סֵ֛פֶר לֵ/אמֹ֖ר קְרָ֣א נָא
    זֶ֑ה וְ/אָמַ֕ר לֹ֥א יָדַ֖עְתִּי סֵֽפֶר־־׃ס
translation:
  text: And the book is given to one who does not know writing, saying, “Please read
    this,” and he says, “I do not know writing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “to one who cannot read” … “I cannot read.” The
      Hebrew repeats the expression “know writing/book,” emphasizing illiteracy by
      lexical repetition.
    reason: lexical_alternative
  - marker: b
    text: “Book” may also be rendered “scroll” or “document.”
    reason: cultural_note
lexical_decisions:
- source_word: וְנִתַּן
  chosen: is given
  alternatives:
  - is handed
  - is delivered
  lexicon: HALOT
  rationale: Nifal of נתן is passive here; present English passive fits the prophetic
    illustrative scenario and matches the parallel structure with the previous verse.
- source_word: הַסֵּפֶר
  chosen: the book
  alternatives:
  - the document
  - the scroll
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll, document, or book. 'Book' is the most natural
    modern English rendering and preserves the repeated term across the verse pair.
    'Scroll' is possible historically but would sound overly specific in the main
    text.
- source_word: עַל אֲשֶׁר לֹא יָדַע סֵפֶר
  chosen: to one who does not know writing
  alternatives:
  - to one who cannot read
  - to one who is unlearned
  lexicon: HALOT
  rationale: The idiom literally says 'upon/to one who does not know book/writing.'
    In context it refers to literacy rather than general education. Rendering with
    'does not know writing' keeps the lexical link to the repeated סֵפֶר while remaining
    intelligible. 'Cannot read' is a smoother dynamic option but loses the Hebrew
    wording's repetition.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the words
  - and they say
  lexicon: HALOT
  rationale: Standard infinitive construct introducing direct speech; 'saying' is
    the most transparent equivalent.
- source_word: קְרָא נָא זֶה
  chosen: Please read this
  alternatives:
  - Read this, please
  - Please call out this
  lexicon: HALOT
  rationale: קרא in this context means 'read,' not merely 'call.' נָא adds politeness
    or urgency; 'please' captures it naturally in English.
- source_word: וְאָמַר
  chosen: and he says
  alternatives:
  - but he says
  - and he will say
  lexicon: HALOT
  rationale: Simple narrative/consecutive sense in the illustrative scene. Present
    tense keeps the vividness and parallels 'is given'.
- source_word: לֹא יָדַעְתִּי סֵפֶר
  chosen: I do not know writing
  alternatives:
  - I cannot read
  - I am not literate
  lexicon: HALOT
  rationale: Literally 'I do not know writing/book.' This preserves the repeated Hebrew
    expression from earlier in the verse. 'I cannot read' is idiomatic and may be
    implied, but the chosen rendering better reflects the source wording and its rhetorical
    repetition.
