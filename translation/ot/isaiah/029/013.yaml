theological_decisions:
- issue: Nature of 'fear' in relation to God
  chosen_reading: their fear of me
  alternative_readings:
  - their reverence for me
  - their worship of me
  rationale: The Hebrew יִרְאָה can include reverence and worshipful piety, but the
    base term 'fear' should be preserved in the main text to retain the theological
    tension between true Godward fear and merely humanly taught religion. Broader
    interpretive nuances are documented as alternatives rather than resolved in translation.
  doctrine_reference: Translation philosophy §3; §6
- issue: Gender rendering in אֲנָשִׁים
  chosen_reading: men
  alternative_readings:
  - people
  - humans
  rationale: The source uses the masculine plural noun for human beings. Per the project's
    gender-accurate policy, 'men' is retained in the main text as a generic human
    reference rather than neutralizing it to 'people,' while the generic sense is
    explained in documentation.
  doctrine_reference: Translation philosophy §4
