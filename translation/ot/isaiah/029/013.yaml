id: ISA.29.13
reference: Isaiah 29:13
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲדֹנָ֗/י יַ֚עַן כִּ֤י נִגַּשׁ֙ הָ/עָ֣ם הַ/זֶּ֔ה בְּ/פִ֤י/ו וּ/בִ/שְׂפָתָי/ו֙
    כִּבְּד֔וּ/נִי וְ/לִבּ֖/וֹ רִחַ֣ק מִמֶּ֑/נִּי וַ/תְּהִ֤י יִרְאָתָ/ם֙ אֹתִ֔/י מִצְוַ֥ת
    אֲנָשִׁ֖ים מְלֻמָּדָֽה׃
translation:
  text: 'And the Lord said: Because this people draws near with its mouth and honors
    me with its lips, while its heart is far from me, and their fear of me has become
    a commandment of men that is taught,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their reverence for me' or 'their worship of me'; Hebrew 'their fear
      of me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a human commandment that is learned/taught.' The phrase criticizes devotion
      reduced to merely human instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: Rendered as the title 'the Lord.' Although the form here is אֲדֹנָי rather
    than the Tetragrammaton, English idiom normally includes the article in this prophetic
    formula ('And the Lord said'). This aligns with the project's default for κύριος/Lord-type
    divine titles without importing the covenant-name convention reserved for YHWH.
- source_word: יַעַן כִּי
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The combination introduces the reason for the divine statement. 'Because'
    is the most natural modern English causal rendering and preserves the explanatory
    force.
- source_word: נִגַּשׁ
  chosen: draws near
  alternatives:
  - comes near
  - approaches
  lexicon: HALOT
  rationale: The verb denotes coming near/approaching. 'Draws near' preserves the
    idiomatic and often worship-related nuance found in prophetic contexts.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people here
  - these people
  lexicon: HALOT
  rationale: Formally singular in Hebrew. 'This people' preserves the prophetic tone
    better than the more colloquial 'these people.'
- source_word: בְּפִיו וּבִשְׂפָתָיו
  chosen: with its mouth and with its lips
  alternatives:
  - with their mouth and with their lips
  - by its mouth and by its lips
  lexicon: HALOT
  rationale: The singular suffixes match the singular collective 'people.' In the
    running translation, the second 'with' is omitted for smoother English, but the
    sense is retained. 'Mouth' and 'lips' preserve the parallelism of outward speech.
- source_word: כִּבְּדוּנִי
  chosen: honors me
  alternatives:
  - glorifies me
  - treats me as weighty
  lexicon: HALOT
  rationale: From כבד in the honor/glorify sense. 'Honors me' is the clearest idiomatic
    English in this context of verbal reverence.
- source_word: לִבּוֹ רִחַק מִמֶּנִּי
  chosen: its heart is far from me
  alternatives:
  - its heart has gone far from me
  - its heart keeps far from me
  lexicon: HALOT
  rationale: Although the Hebrew verb is perfect ('has become far/has removed itself'),
    English idiom favors the stative expression 'is far from me.' This preserves the
    contrast between outward nearness and inward distance.
- source_word: וַתְּהִי
  chosen: has become
  alternatives:
  - is
  - became
  lexicon: HALOT
  rationale: The verb marks resulting state. 'Has become' captures the development
    into a corrupted condition better than a simple copula.
- source_word: יִרְאָתָם אֹתִי
  chosen: their fear of me
  alternatives:
  - their reverence for me
  - their worship of me
  lexicon: HALOT
  rationale: יִרְאָה can denote fear, reverence, or piety toward God. 'Fear of me'
    preserves the lexical core and the covenantal/theological weight, while remaining
    intelligible in English.
- source_word: מִצְוַת אֲנָשִׁים
  chosen: a commandment of men
  alternatives:
  - a human commandment
  - the command of men
  lexicon: HALOT
  rationale: Rendered formally to preserve the genitival construction and the prophetic
    critique that what should be God-directed fear has been reduced to merely human
    prescription. 'Men' follows the source's masculine plural and the project's gender-accurate
    policy; here it denotes human beings generically.
- source_word: מְלֻמָּדָה
  chosen: that is taught
  alternatives:
  - learned
  - taught by rote
  - being taught
  lexicon: HALOT
  rationale: Passive participle from למד. 'That is taught' best conveys that this
    human commandment is something inculcated/instructed. 'Taught by rote' is interpretive
    and better left to footnote if needed, not main text.
