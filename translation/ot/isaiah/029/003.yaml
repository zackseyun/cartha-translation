id: ISA.29.3
reference: Isaiah 29:3
source:
  edition: WLC
  text: וְ/חָנִ֥יתִי כַ/דּ֖וּר עָלָ֑יִ/ךְ וְ/צַרְתִּ֤י עָלַ֨יִ/ךְ֙ מֻצָּ֔ב וַ/הֲקִֽימֹתִ֥י
    עָלַ֖יִ/ךְ מְצֻרֹֽת׃
translation:
  text: And I will encamp against you all around, and I will besiege you with siegeworks,
    and I will raise up siege towers against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a circle' or 'as a ring' for 'all around.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a garrison' or 'a siege post' for 'siegeworks.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may refer more broadly to siege fortifications; alternatives
      include 'siege bulwarks' or 'siege ramps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָנִיתִי
  chosen: And I will encamp
  alternatives:
  - And I will camp
  - And I will pitch camp
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' 'Encamp' preserves the military sense and
    fits the first-person divine threat. The prefixed conjunction is carried as 'And.'
- source_word: כַדּוּר
  chosen: all around
  alternatives:
  - like a circle
  - as a ring
  lexicon: HALOT
  rationale: The noun דּוּר here conveys circular encirclement. In context of siege
    language, idiomatic English 'all around' best communicates the sense of surrounding
    on every side, while the more literal 'like a circle' is preserved as an alternative.
- source_word: עָלָיִךְ / עָלַיִךְ
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: The repeated עַל + 2fs suffix in a military judgment context is adversative.
    'Against you' communicates hostile action more clearly than the more spatially
    literal 'upon you.' The feminine singular refers to the addressed city.
- source_word: וְצַרְתִּי
  chosen: and I will besiege
  alternatives:
  - and I will press hard against
  - and I will lay siege to
  lexicon: HALOT
  rationale: From צור in the siege sense, 'to besiege.' This is the natural military
    rendering in context and pairs well with the following siege terminology.
- source_word: מֻצָּב
  chosen: with siegeworks
  alternatives:
  - a garrison
  - a siege post
  - a fixed position
  lexicon: HALOT
  rationale: The noun can denote something stationed or set in place. In this context
    of surrounding and raising military structures, 'siegeworks' best captures a stationed
    siege emplacement. 'Garrison' is possible but less fitting with the parallel term
    that follows.
- source_word: וַהֲקִימֹתִי
  chosen: and I will raise up
  alternatives:
  - and I will set up
  - and I will erect
  lexicon: HALOT
  rationale: From קום in the causative, 'to cause to stand, set up, erect.' 'Raise
    up' is natural English and suits military installations.
- source_word: מְצֻרוֹת
  chosen: siege towers
  alternatives:
  - siege bulwarks
  - fortifications
  - siege ramps
  lexicon: HALOT
  rationale: From a noun related to siege/fortification terminology. In this immediate
    context, 'siege towers' is a common and plausible rendering for offensive structures
    raised against a city. Because the exact military referent may be broader, alternatives
    are preserved in a footnote.
