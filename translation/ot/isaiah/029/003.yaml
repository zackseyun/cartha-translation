theological_decisions:
- issue: Speaker and agency in judgment
  chosen_reading: The first-person verbs are rendered straightforwardly with God as
    the direct agent of the siege.
  alternative_readings:
  - God permits or ordains human armies indirectly
  rationale: The Hebrew uses explicit first-person singular verbs throughout. The
    translation preserves the text's direct divine agency without softening it into
    mere permission, while not specifying the human instrument here.
  doctrine_reference: Preserve theological tension rather than resolve it.
