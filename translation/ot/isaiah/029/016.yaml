theological_decisions:
- issue: Metaphor of potter and clay
  chosen_reading: Retain the creator-creature metaphor explicitly with 'potter' and
    'clay' rather than flattening it into abstract language.
  alternative_readings:
  - Render more literally as 'former' and 'clay'
  - Render more dynamically as 'creator' and 'creation'
  rationale: The verse's theological force depends on the absurd inversion of creature
    over creator. 'Potter' and 'clay' preserve the prophetic image and its later biblical
    resonance without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Opening exclamation
  chosen_reading: Translate as a rebuking exclamation, 'You turn things upside down!'
  alternative_readings:
  - '''Your perversity!'''
  - '''O your turning of things upside down!'''
  rationale: The Hebrew is compressed and debated, but the context clearly condemns
    a reversal of proper order. This rendering preserves the rebuke and leads naturally
    into the potter-clay rhetorical question.
  doctrine_reference: Translation philosophy §§1, 6
