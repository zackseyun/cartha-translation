id: ISA.29.16
reference: Isaiah 29:16
source:
  edition: WLC
  text: הַ֨פְכְּ/כֶ֔ם אִם כְּ/חֹ֥מֶר הַ/יֹּצֵ֖ר יֵֽחָשֵׁ֑ב כִּֽי יֹאמַ֨ר מַעֲשֶׂ֤ה
    לְ/עֹשֵׂ֨/הוּ֙ לֹ֣א עָשָׂ֔/נִי וְ/יֵ֛צֶר אָמַ֥ר לְ/יוֹצְר֖/וֹ לֹ֥א הֵבִֽין־־׃
translation:
  text: You turn things upside down! Shall the potter be regarded as clay, that what
    is made should say of its maker, “He did not make me,” and what is formed say
    of the one who formed it, “He has no understanding”?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Your turning of things upside down!”; some understand
      the opening as “Your perversity!”
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְכְּכֶם
  chosen: You turn things upside down
  alternatives:
  - Your perversity!
  - O your turning of things upside down!
  lexicon: HALOT
  rationale: The noun from הפך with 2mp suffix is elliptical/exclamatory here. In
    context it rebukes the people's reversal of reality. Rendering it verbally as
    an exclamation in natural English captures the force better than a wooden nominal
    phrase while staying close to the sense.
- source_word: אִם
  chosen: Shall
  alternatives:
  - if
  - surely
  lexicon: HALOT
  rationale: Here אִם introduces a rhetorical question rather than a simple conditional.
    English 'Shall ...?' best reflects the argumentative force in context.
- source_word: כְּחֹמֶר
  chosen: as clay
  alternatives:
  - like clay
  lexicon: HALOT
  rationale: חֹמֶר is the material clay used by a potter. 'Clay' is the standard and
    clear rendering.
- source_word: הַיֹּצֵר
  chosen: the potter
  alternatives:
  - the former
  - the one who forms
  lexicon: HALOT
  rationale: Though from יצר 'to form,' in direct collocation with clay the concrete
    image is a potter. This preserves the metaphor naturally in English.
- source_word: יֵחָשֵׁב
  chosen: be regarded
  alternatives:
  - be considered
  - be reckoned
  lexicon: HALOT
  rationale: The Niphal of חשׁב here means 'be accounted/considered.' 'Be regarded'
    is idiomatic and fits the rhetorical question.
- source_word: מַעֲשֶׂה
  chosen: what is made
  alternatives:
  - the thing made
  - a deed/work
  lexicon: HALOT
  rationale: In this maker-made contrast, the passive-result sense is primary. 'What
    is made' communicates the created object rather than an abstract 'work'.
- source_word: לְעֹשֵׂהוּ
  chosen: of its maker
  alternatives:
  - to its maker
  - of the one who made it
  lexicon: HALOT
  rationale: The lamed after אמר marks the person spoken about/to. In English, 'say
    of its maker' is the most natural fit with the quoted speech.
- source_word: עָשָׂנִי
  chosen: make me
  alternatives:
  - made me
  - fashioned me
  lexicon: HALOT
  rationale: 'The perfect in the quotation is best rendered with simple past in English,
    but after ''did not'' the infinitive form appears: ''did not make me.'' This preserves
    the denial of creatorship.'
- source_word: יֵצֶר
  chosen: what is formed
  alternatives:
  - the thing formed
  - formation
  lexicon: HALOT
  rationale: Parallel to מַעֲשֶׂה, this denotes the formed product. 'What is formed'
    keeps the parallelism and reads naturally.
- source_word: לְיוֹצְרוֹ
  chosen: of the one who formed it
  alternatives:
  - to its former
  - of its potter
  lexicon: HALOT
  rationale: To preserve the parallel with the previous clause while avoiding awkward
    repetition, this is rendered as 'of the one who formed it.'
- source_word: הֵבִין
  chosen: has no understanding
  alternatives:
  - does not understand
  - has no insight
  lexicon: HALOT
  rationale: The Hiphil of בין means 'understand, have discernment.' 'Has no understanding'
    is idiomatic in the quoted accusation and suits the wisdom-related nuance.
