id: ISA.29.24
reference: Isaiah 29:24
source:
  edition: WLC
  text: וְ/יָדְע֥וּ תֹֽעֵי ר֖וּחַ בִּינָ֑ה וְ/רוֹגְנִ֖ים יִלְמְדוּ לֶֽקַח־־׃
translation:
  text: And those who go astray in spirit will come to understanding, and those who
    grumble will learn instruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who err in spirit.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who grumble will learn teaching.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  chosen: will come to
  alternatives:
  - will know
  - will understand
  lexicon: HALOT
  rationale: Though the verb is literally 'will know,' in collocation with בִּינָה
    ('understanding/discernment') the sense is effectively attaining understanding.
    Rendering 'will come to understanding' preserves the future/resultative force
    in natural English without flattening the Hebrew.
- source_word: תֹעֵי רוּחַ
  chosen: those who go astray in spirit
  alternatives:
  - those who err in spirit
  - the spiritually erring
  - those of wandering spirit
  lexicon: HALOT
  rationale: תֹעֵי is a participial form from תעה, 'to wander, stray, err.' רוּחַ
    here is best taken in the sense of inner disposition/mind rather than the Holy
    Spirit or mere wind. 'Go astray in spirit' preserves both the verbal imagery and
    the anthropological nuance.
- source_word: בִּינָה
  chosen: understanding
  alternatives:
  - discernment
  - insight
  lexicon: HALOT
  rationale: בִּינָה commonly denotes understanding or discernment. 'Understanding'
    is the most straightforward and idiomatic here, especially after 'come to.'
- source_word: וְרוֹגְנִים
  chosen: those who grumble
  alternatives:
  - murmurers
  - complainers
  - those who mutter
  lexicon: HALOT
  rationale: From רגן, the term denotes people who complain or murmur. 'Those who
    grumble' is readable modern English and preserves the negative, resistant posture
    implied by the Hebrew.
- source_word: יִלְמְדוּ
  chosen: will learn
  alternatives:
  - shall learn
  lexicon: HALOT
  rationale: Simple future of למד. 'Will learn' is direct and natural.
- source_word: לֶקַח
  chosen: instruction
  alternatives:
  - teaching
  - lesson
  - understanding
  lexicon: HALOT
  rationale: לֶקַח often means instruction or teaching received. 'Instruction' fits
    the wisdom context and pairs well with 'will learn' without becoming overly paraphrastic.
