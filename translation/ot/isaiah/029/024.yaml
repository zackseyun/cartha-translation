theological_decisions:
- issue: Sense of רוּחַ in the phrase תֹעֵי רוּחַ
  chosen_reading: human inner disposition/mind ('in spirit')
  alternative_readings:
  - by wind
  - with respect to the Spirit
  rationale: The context concerns moral and intellectual restoration among people
    who had been resistant or confused. Reading רוּחַ anthropologically preserves
    the Hebrew idiom and avoids importing a more specific pneumatological claim not
    demanded by the text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
