id: ISA.29.2
reference: Isaiah 29:2
source:
  edition: WLC
  text: וַ/הֲצִיק֖וֹתִי לַֽ/אֲרִיאֵ֑ל וְ/הָיְתָ֤ה תַֽאֲנִיָּה֙ וַֽ/אֲנִיָּ֔ה וְ/הָ֥יְתָה
    לִּ֖/י כַּ/אֲרִיאֵֽל׃
translation:
  text: And I will distress Ariel, and there will be mourning and lamentation, and
    she will be to me like an altar hearth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew אֲרִיאֵל (''Ariel'') is likely a wordplay: the city called Ariel
      will become like an ''altar hearth.'' Alternatively, the final phrase could
      be rendered more formally, ''and she will be to me like Ariel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲצִיקוֹתִי
  chosen: And I will distress
  alternatives:
  - And I will besiege
  - And I will bring hardship upon
  lexicon: HALOT
  rationale: From the root צוק/ציק in the Hiphil, conveying causing distress, pressure,
    or affliction. 'Distress' preserves the broad sense without over-specifying military
    siege, though siege is contextually nearby in v. 3.
- source_word: לַאֲרִיאֵל
  chosen: Ariel
  alternatives:
  - the altar hearth
  - Jerusalem
  lexicon: HALOT
  rationale: Here אֲרִיאֵל functions as a proper name/title for Jerusalem in context
    (cf. v. 1), so it is transliterated per the translation philosophy for names.
    Because the term also carries the sense 'altar hearth,' that semantic resonance
    is preserved later in the verse and noted in a footnote.
- source_word: וְהָיְתָה
  chosen: and there will be
  alternatives:
  - and she will become
  lexicon: HALOT
  rationale: Simple wayyiqtol/qatal sequence of היה marking resultant state. 'There
    will be' is idiomatic English before the abstract nouns that follow.
- source_word: תַאֲנִיָּה
  chosen: mourning
  alternatives:
  - moaning
  - lament
  lexicon: HALOT
  rationale: The noun denotes lamentive mourning or moaning. 'Mourning' fits natural
    English and pairs well with the following near-synonym.
- source_word: וַאֲנִיָּה
  chosen: and lamentation
  alternatives:
  - and sorrow
  - and moaning
  lexicon: HALOT
  rationale: A near-synonymous term intensifying grief. 'Lamentation' preserves the
    formal, audible sense and avoids flattening the poetic doubling.
- source_word: וְהָיְתָה לִּי
  chosen: and she will be to me
  alternatives:
  - and it will become for me
  - and she will be for me
  lexicon: HALOT
  rationale: The feminine singular likely refers back to Ariel/Jerusalem as a city.
    'She' preserves the feminine personification common for cities in Hebrew.
- source_word: כַּאֲרִיאֵל
  chosen: like an altar hearth
  alternatives:
  - like Ariel
  lexicon: HALOT
  rationale: 'The repeated term forms a wordplay: Ariel the city will become like
    an אֲרִיאֵל, likely ''altar hearth.'' Rendering the second occurrence by sense
    rather than transliteration preserves the poetic irony and sacrificial imagery.
    The alternative more formal rendering ''like Ariel'' is preserved in a footnote
    because the repetition is audible in Hebrew.'
