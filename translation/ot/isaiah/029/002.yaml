theological_decisions:
- issue: Rendering the repeated אֲרִיאֵל with wordplay preserved
  chosen_reading: Use 'Ariel' for the first occurrence as the city's name and 'altar
    hearth' for the second occurrence to reflect the lexical play and likely sacrificial
    image.
  alternative_readings:
  - Use 'Ariel' in both places
  - Use 'altar hearth' in both places
  rationale: The context in vv. 1–2 addresses Ariel as a designation for Jerusalem,
    but the final phrase appears to exploit the underlying lexical sense of the name.
    Preserving the pun communicates the prophetic force without importing extra theology.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    preserve ambiguity/tension where present.'
