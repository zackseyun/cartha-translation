id: ISA.29.1
reference: Isaiah 29:1
source:
  edition: WLC
  text: ה֚וֹי אֲרִיאֵ֣ל אֲרִיאֵ֔ל קִרְיַ֖ת חָנָ֣ה דָוִ֑ד סְפ֥וּ שָׁנָ֛ה עַל שָׁנָ֖ה
    חַגִּ֥ים יִנְקֹֽפוּ־׃
translation:
  text: Ah, Ariel, Ariel, the city where David encamped! Add year to year; let the
    feasts run their round.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ariel is a name for Jerusalem here; the Hebrew may also echo 'altar hearth'
      or 'lion of God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Ah
  alternatives:
  - Woe
  - Ha
  lexicon: HALOT
  rationale: The interjection can introduce lament, threat, or attention-getting address.
    Here it opens an oracle against Jerusalem/Ariel with a tone broader than pure
    denunciation, so 'Ah' preserves the exclamatory force without prematurely narrowing
    it to only 'Woe.'
- source_word: אֲרִיאֵל
  chosen: Ariel
  alternatives:
  - altar hearth
  - lion of God
  lexicon: HALOT
  rationale: Used here as a place designation for Jerusalem, reinforced by the apposition
    'the city where David encamped.' Because the Hebrew form carries wordplay and
    functions as a name, transliteration is best in the main text, with lexical possibilities
    preserved in a footnote.
- source_word: קִרְיַת
  chosen: the city
  alternatives:
  - city of
  lexicon: HALOT
  rationale: In construct with the following clause, it identifies Ariel as a city.
    English idiom is smoother with 'the city where...' rather than a more wooden 'city
    of where...'.
- source_word: חָנָה
  chosen: encamped
  alternatives:
  - dwelt
  - camped
  lexicon: HALOT
  rationale: The verb חנה commonly denotes pitching camp or encamping. 'Encamped'
    preserves the military/historical nuance associated with David's taking and establishing
    Jerusalem.
- source_word: סְפוּ
  chosen: Add
  alternatives:
  - continue
  - heap up
  lexicon: HALOT
  rationale: Imperative plural from יסף, here idiomatically calling for the passing/adding
    of more time. 'Add' keeps the Hebrew terseness and links naturally with 'year
    to year.'
- source_word: שָׁנָה עַל שָׁנָה
  chosen: year to year
  alternatives:
  - year upon year
  - one year to another
  lexicon: HALOT
  rationale: This is a standard iterative expression. 'Year to year' is concise, natural
    English and preserves the repetitive sense.
- source_word: חַגִּים
  chosen: the feasts
  alternatives:
  - festivals
  - pilgrimage feasts
  lexicon: HALOT
  rationale: Refers to Israel's festal observances. 'Feasts' is a familiar biblical
    term and fits the cultic context, while remaining readable.
- source_word: יִנְקֹפוּ
  chosen: run their round
  alternatives:
  - go around
  - complete their circuit
  - come round
  lexicon: HALOT
  rationale: The verb conveys going around/circling or completing a cycle. In context
    of recurring annual feasts, 'run their round' idiomatically expresses the cyclical
    repetition without overinterpreting the exact mechanics.
