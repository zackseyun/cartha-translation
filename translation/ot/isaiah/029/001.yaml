theological_decisions:
- issue: Whether to translate אֲרִיאֵל semantically or retain it as a name
  chosen_reading: Retain 'Ariel' in the main text as a place-name for Jerusalem, with
    semantic alternatives footnoted.
  alternative_readings:
  - Translate as 'altar hearth'
  - Translate as 'lion of God'
  rationale: The immediate apposition identifies the referent as Jerusalem, and the
    repeated form functions rhetorically as a vocative name. Transliteration preserves
    the prophetic wordplay and avoids collapsing the ambiguity into one interpretation.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    preserve theological tension rather than resolve it.'
