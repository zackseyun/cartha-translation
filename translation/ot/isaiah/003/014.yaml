theological_decisions:
- issue: Metaphorical force of 'the vineyard'
  chosen_reading: Retain 'the vineyard' as a metaphor without explicating it as 'my people' in the main text.
  alternative_readings:
  - interpretively render as 'my people' or 'the nation'
  rationale: The verse accuses leaders through an agricultural metaphor that echoes Isaiah's broader vineyard imagery. Preserving the metaphor avoids importing an interpretation into the text while allowing readers to hear the prophetic resonance.
  doctrine_reference: Translation philosophy §1, §3
- issue: Judicial stance of עִם in context
  chosen_reading: Render עִם literally as 'with' rather than interpretively as 'against.'
  alternative_readings:
  - against
  rationale: Although the context is accusatory, the Hebrew preposition is not the more explicit adversative form. Keeping 'with' preserves the source wording and lets the following accusation communicate the opposition.
  doctrine_reference: Translation philosophy §1, §3
