id: ISA.3.14
reference: Isaiah 3:14
source:
  edition: WLC
  text: יְהוָה֙ בְּ/מִשְׁפָּ֣ט יָב֔וֹא עִם זִקְנֵ֥י עַמּ֖/וֹ וְ/שָׂרָ֑י/ו וְ/אַתֶּם֙ בִּֽעַרְתֶּ֣ם הַ/כֶּ֔רֶם גְּזֵלַ֥ת הֶֽ/עָנִ֖י בְּ/בָתֵּי/כֶֽם־׃
translation:
  text: 'Yahweh enters into judgment with the elders of his people and its princes: “It is you who have devoured the vineyard; the plunder of the poor is in your houses.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comes in judgment' or 'comes to judgment.'
    reason: lexical_alternative
  - marker: b
    text: '''Have devoured the vineyard'' may also be rendered ''have burned up the vineyard'' or ''have consumed the vineyard''; the Hebrew verb conveys destructive consumption.'
    reason: lexical_alternative
  - marker: c
    text: '''The vineyard'' likely functions metaphorically for the people or community, echoing Isaiah''s vineyard imagery.'
    reason: cross_reference
  - marker: d
    text: Or 'the spoil of the poor' or 'what was stolen from the poor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּמִשְׁפָּט
  chosen: into judgment
  alternatives:
  - in judgment
  - for judgment
  - to judgment
  lexicon: HALOT
  rationale: The phrase with בוא commonly conveys entering into judicial proceedings. 'Into judgment' is idiomatic English that preserves the legal sense better than a flatter 'in judgment.'
- source_word: יָבֹוא
  chosen: enters
  alternatives:
  - comes
  - will enter
  - will come
  lexicon: HALOT
  rationale: A present-tense English rendering gives prophetic vividness while preserving the Hebrew imperfect's future/judicial force. 'Enters' fits the collocation 'into judgment.'
- source_word: עִם
  chosen: with
  alternatives:
  - against
  lexicon: HALOT
  rationale: The preposition is literally 'with.' In judicial contexts it can imply adversarial engagement, but 'with' preserves the Hebrew wording while the context makes the accusatory force clear.
- source_word: זִקְנֵי עַמּוֹ
  chosen: the elders of his people
  alternatives:
  - his people's elders
  lexicon: HALOT
  rationale: Standard rendering of the construct phrase; 'elders' here denotes leaders, not merely old men.
- source_word: וְשָׂרָיו
  chosen: and its princes
  alternatives:
  - and his princes
  - and its officials
  - and its rulers
  lexicon: HALOT
  rationale: Because the nearest antecedent is 'his people,' English can naturally refer back with 'its' to the collective noun 'people.' 'Princes' preserves the elevated register of שׂרים better than the more bureaucratic 'officials.'
- source_word: וְאַתֶּם
  chosen: It is you
  alternatives:
  - and you
  - you yourselves
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'It is you' brings out the accusation's force in natural English.
- source_word: בִּעַרְתֶּם
  chosen: have devoured
  alternatives:
  - have burned up
  - have consumed
  - have grazed away
  lexicon: HALOT
  rationale: בער can mean burn/consume/remove. In the metaphor of a vineyard ruined by leaders, 'have devoured' communicates destructive exploitation and matches the social-justice context better than a narrowly literal 'burned.' The vineyard image remains intact.
- source_word: הַכֶּרֶם
  chosen: the vineyard
  alternatives:
  - the vine-field
  lexicon: HALOT
  rationale: Standard rendering; in Isaiah this likely carries metaphorical resonance for the people/community, but the translation keeps the image rather than interpreting it.
- source_word: גְּזֵלַת
  chosen: the plunder
  alternatives:
  - the spoil
  - what was stolen from
  - the robbery of
  lexicon: HALOT
  rationale: The noun denotes what has been taken by robbery or seizure. 'The plunder of the poor' is concise and forceful English.
- source_word: הֶעָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: In this context the term refers to the socially/economically vulnerable. 'The poor' is the clearest natural rendering.
- source_word: בְּבָתֵּיכֶם
  chosen: is in your houses
  alternatives:
  - is in your house
  - is in your palaces
  lexicon: HALOT
  rationale: Plural 'houses' follows the Hebrew and points to the leaders' households/residences as repositories of unjust gain.
