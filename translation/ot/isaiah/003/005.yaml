id: ISA.3.5
reference: Isaiah 3:5
source:
  edition: WLC
  text: וְ/נִגַּ֣שׂ הָ/עָ֔ם אִ֥ישׁ בְּ/אִ֖ישׁ וְ/אִ֣ישׁ בְּ/רֵעֵ֑/הוּ יִרְהֲב֗וּ הַ/נַּ֨עַר֙ בַּ/זָּקֵ֔ן וְ/הַ/נִּקְלֶ֖ה בַּ/נִּכְבָּֽד׃
translation:
  text: And the people will oppress one another—man against man, and each against his neighbor; the youth will act arrogantly toward the elder, and the despised toward the honored.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'man against man, and each against his neighbor.' The Hebrew repeats distributive expressions to emphasize widespread mutual hostility.
    reason: lexical_alternative
  - marker: b
    text: '''The elder'' may also be rendered ''the old man'' or ''the aged''; the Hebrew term can denote both age and social seniority.'
    reason: lexical_alternative
  - marker: c
    text: Or 'one another, each man his fellow'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְנִגַּשׂ
  chosen: will oppress
  alternatives:
  - will be driven against
  - will press upon
  - will assault
  lexicon: HALOT
  rationale: The Niphal of נגשׂ here conveys hostile social pressure or oppression in context, not mere physical approach. 'Will oppress' best captures the reciprocal social breakdown described in the verse.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Collective singular referring to society as a whole; 'the people' is natural and sufficiently formal.
- source_word: אִישׁ בְּאִישׁ וְאִישׁ בְּרֵעֵהוּ
  chosen: one another, each man his fellow
  alternatives:
  - man against man, and each against his neighbor
  - each one against another
  lexicon: HALOT
  rationale: The Hebrew uses paired distributive expressions to stress mutual hostility. The translation preserves both reciprocity ('one another') and the individualizing force ('each man his fellow'). 'Man' is retained as gender-accurate representative language per translation philosophy.
- source_word: יִרְהֲבוּ
  chosen: will act arrogantly toward
  alternatives:
  - will behave insolently toward
  - will storm against
  - will be presumptuous toward
  lexicon: HALOT
  rationale: The verb רהב in this stem denotes acting proudly or insolently. 'Act arrogantly toward' communicates the social insolence in readable modern English.
- source_word: הַנַּעַר
  chosen: the youth
  alternatives:
  - the young man
  - the boy
  lexicon: HALOT
  rationale: The term can denote a boy or young person, but here contrasts socially with 'the elder.' 'The youth' best expresses the class contrast rather than a specific child.
- source_word: בַּזָּקֵן
  chosen: toward the elder
  alternatives:
  - against the old man
  - against the aged
  lexicon: HALOT
  rationale: זָקֵן can mean old person or elder. In this social-order context, 'elder' preserves both age and status dimensions better than merely 'old man'.
- source_word: הַנִּקְלֶה
  chosen: the despised
  alternatives:
  - the base person
  - the insignificant one
  - the contemptible
  lexicon: HALOT
  rationale: From קלל in the sense of being lightly esteemed. 'The despised' clearly conveys low social regard in contrast with the honored.
- source_word: בַּנִּכְבָּד
  chosen: toward the honored
  alternatives:
  - against the honorable
  - against the respected
  lexicon: HALOT
  rationale: From כבד in the passive/adjectival sense of being weighty, honored, or socially important. 'The honored' matches the social-status contrast and reads smoothly with the preceding phrase.
