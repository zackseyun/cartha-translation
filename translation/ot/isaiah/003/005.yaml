  from: one another, each man his fellow
  to: one another—man against man, and each against his neighbor
  rationale: 'The Hebrew uses two parallel phrases for emphasis: `אִישׁ בְּאִישׁ וְאִישׁ בְּרֵעֵהוּ` (''man against man, and man against his neighbor''). The current draft renders this as ''one another, each man his fellow''. The second part of this, ''each man his fellow'', is an awkward appositive that drops the preposition `בְּ` (''against''), thereby losing the explicit sense of conflict. The suggested rewrite, which incorporates the alternative from footnote ''a'', restores the clarity and parallelism of the source text without sacrificing readability.'
