id: ISA.3.8
reference: Isaiah 3:8
source:
  edition: WLC
  text: כִּ֤י כָשְׁלָה֙ יְר֣וּשָׁלִַ֔ם וִ/יהוּדָ֖ה נָפָ֑ל כִּֽי לְשׁוֹנָ֤/ם וּ/מַֽעַלְלֵי/הֶם֙ אֶל יְהוָ֔ה לַ/מְר֖וֹת עֵנֵ֥י כְבוֹדֽ/וֹ־־׃
translation:
  text: For Jerusalem has stumbled, and Judah has fallen, because their tongue and their deeds are against Yahweh, to rebel against the eyes of his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the sight of his glory.' The Hebrew is literally 'the eyes of his glory,' a vivid expression for open defiance before the LORD's glorious presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding judgment statement. 'For' preserves the explanatory force in natural English.
- source_word: כָשְׁלָה
  chosen: has stumbled
  alternatives:
  - has tottered
  - has collapsed
  lexicon: HALOT
  rationale: The verb denotes stumbling or faltering. 'Has stumbled' preserves the metaphor of collapse without overtranslating to total ruin.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name.
- source_word: וִיהוּדָה
  chosen: and Judah
  rationale: Standard transliteration of the regional name with conjunction preserved.
- source_word: נָפָל
  chosen: has fallen
  alternatives:
  - is fallen
  - has collapsed
  lexicon: HALOT
  rationale: Common verb for falling. 'Has fallen' is the most direct and idiomatic rendering here, pairing well with 'has stumbled' while preserving the poetic parallelism.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: The second כִּי introduces the reason for Jerusalem and Judah's downfall; 'because' makes the causal relation explicit in English.
- source_word: לְשׁוֹנָם
  chosen: their tongue
  alternatives:
  - their speech
  - what they say
  lexicon: HALOT
  rationale: Hebrew 'tongue' can metonymically refer to speech. Retaining 'tongue' preserves the concrete imagery and poetic force.
- source_word: וּמַעַלְלֵיהֶם
  chosen: and their deeds
  alternatives:
  - and their actions
  - and their practices
  lexicon: HALOT
  rationale: Refers to acts or doings. 'Deeds' is concise, natural, and morally weighty in context.
- source_word: אֶל יְהוָה
  chosen: are against the LORD
  alternatives:
  - are toward the LORD
  - are against Yahweh
  lexicon: HALOT
  rationale: Here אֶל with hostile context conveys opposition directed toward YHWH. 'Against the LORD' expresses the adversative sense clearly. 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַמְרוֹת
  chosen: rebelling
  alternatives:
  - to rebel
  - in rebellion
  - provoking
  lexicon: HALOT
  rationale: Infinitive from מרה, expressing rebellious defiance. 'Rebelling' fits smoothly with the clause and preserves the active sense of defiance.
- source_word: עֵנֵי כְבוֹדוֹ
  chosen: before the eyes of his glory
  alternatives:
  - in the sight of his glory
  - before his glorious eyes
  - before his glorious presence
  lexicon: HALOT
  rationale: 'The Hebrew is strikingly literal: ''the eyes of his glory.'' Rendering it closely preserves the vivid anthropomorphic expression and the weight of divine majesty. Smoother paraphrases are possible but would flatten the imagery.'
