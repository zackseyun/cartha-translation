id: ISA.3.13
reference: Isaiah 3:13
source:
  edition: WLC
  text: נִצָּ֥ב לָ/רִ֖יב יְהוָ֑ה וְ/עֹמֵ֖ד לָ/דִ֥ין עַמִּֽים׃
translation:
  text: Yahweh takes his stand to contend, and stands to judge the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bring a case' / 'to plead a case'; the Hebrew verb can carry legal-contest imagery.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nations'; Hebrew 'the peoples' is plural and may refer broadly to multiple peoples.
    reason: alternative_reading
lexical_decisions:
- source_word: נִצָּב
  chosen: takes his stand
  alternatives:
  - stands
  - is stationed
  lexicon: HALOT
  rationale: The Niphal participle of נצב conveys taking a firm position or standing in readiness. 'Takes his stand' captures the active, judicial posture more naturally in English than the bare 'stands,' while preserving the vivid courtroom imagery.
- source_word: לָרִיב
  chosen: to contend
  alternatives:
  - to plead
  - to bring a case
  - to dispute
  lexicon: HALOT
  rationale: ריב in legal contexts often denotes conducting a lawsuit or contention. 'To contend' preserves the adversarial/judicial sense without over-specifying courtroom procedure; 'to plead' could imply advocacy for one side, and 'bring a case' is interpretive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְעֹמֵד
  chosen: and stands
  alternatives:
  - and is standing
  - and remains standing
  lexicon: HALOT
  rationale: The participle of עמד parallels נצב and sustains the image of YHWH in a formal judicial stance. 'And stands' is concise and preserves the Hebrew parallelism.
- source_word: לָדִין
  chosen: to judge
  alternatives:
  - to execute judgment
  - to govern
  - to plead
  lexicon: HALOT
  rationale: דין here most naturally means to judge in a forensic sense. 'To judge' is the clearest and least interpretive rendering in this context.
- source_word: עַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - the people
  lexicon: HALOT
  rationale: The plural form indicates multiple peoples/groups, not a singular collective. 'The peoples' preserves the plural and leaves open whether the scope is Israel's tribes or the nations more broadly; 'the nations' is possible but more interpretive.
