id: ISA.3.1
reference: Isaiah 3:1
source:
  edition: WLC
  text: כִּי֩ הִנֵּ֨ה הָ/אָד֜וֹן יְהוָ֣ה צְבָא֗וֹת מֵסִ֤יר מִ/ירוּשָׁלִַ֨ם֙ וּ/מִ֣/יהוּדָ֔ה מַשְׁעֵ֖ן וּ/מַשְׁעֵנָ֑ה כֹּ֚ל מִשְׁעַן לֶ֔חֶם וְ/כֹ֖ל מִשְׁעַן מָֽיִם־־׃
translation:
  text: For behold, the Lord, Yahweh of Armies, is removing from Jerusalem and from Judah support and supply, all support of bread and all support of water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'staff and stay,' a traditional rendering of the paired Hebrew terms for forms of support or sustenance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all support of bread and all support of water,' that is, every supply of basic food and drink.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation flowing from the previous context; 'for' preserves the connective force better than a mere emphatic particle.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks attention and immediacy. 'Look' is readable modern English and preserves the deictic force without archaic tone.
- source_word: הָאָדוֹן
  chosen: the Lord
  alternatives:
  - the master
  - the sovereign
  lexicon: HALOT
  rationale: With the article, this title emphasizes God's sovereign authority. 'The Lord' is the most natural English title here and distinguishes it from the following divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: '''Armies'' translates the military/plural sense accessibly in modern English. ''Hosts'' is traditional but less transparent for contemporary readers.'
- source_word: מֵסִיר
  chosen: is removing
  alternatives:
  - takes away
  - is taking away
  lexicon: HALOT
  rationale: The participle presents imminent or ongoing action. 'Is removing' preserves the verbal aspect and the sense of active deprivation.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name with the prefixed preposition rendered directly.
- source_word: וּמִיהוּדָה
  chosen: and from Judah
  lexicon: HALOT
  rationale: Coordinates Judah with Jerusalem as the sphere of judgment.
- source_word: מַשְׁעֵן וּמַשְׁעֵנָה
  chosen: support and supply
  alternatives:
  - staff and stay
  - every support and every support
  - support and dependence
  lexicon: HALOT
  rationale: The masculine/feminine pair is a merism or rhetorical pairing for every kind of support. Traditional 'stay and staff' is opaque in modern English. Using two near-synonyms preserves the paired form while communicating the sense of sustaining resources.
- source_word: כֹּל מִשְׁעַן לֶחֶם
  chosen: all support of bread
  alternatives:
  - the whole supply of bread
  - every support of food
  lexicon: HALOT
  rationale: Keeps the concrete image of bread as staple provision while preserving the repeated 'support' language from the Hebrew.
- source_word: וְכֹל מִשְׁעַן מָיִם
  chosen: and all support of water
  alternatives:
  - and the whole supply of water
  lexicon: HALOT
  rationale: Parallels the previous clause closely, preserving the Hebrew repetition and emphasizing total deprivation of basic necessities.
