id: ISA.3.15
reference: Isaiah 3:15
source:
  edition: WLC
  text: מ/ל/כם תְּדַכְּא֣וּ עַמִּ֔/י וּ/פְנֵ֥י עֲנִיִּ֖ים תִּטְחָ֑נוּ נְאֻם אֲדֹנָ֥/י יְהוִ֖ה צְבָאֽוֹת־׃ס
translation:
  text: What do you mean by crushing my people and grinding the faces of the poor? declares the Lord GOD of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''What is it to you that...?'' An idiomatic rebuke, rendered here as ''What do you mean by...?'''
    reason: lexical_alternative
  - marker: b
    text: Or 'grinding down the face of the poor.' The Hebrew image is a vivid metaphor for ruthless oppression.
    reason: lexical_alternative
lexical_decisions:
- source_word: מ/ל/כם
  chosen: What do you mean by
  alternatives:
  - Why do you
  - What is it to you that
  lexicon: HALOT
  rationale: 'The prepositional idiom מָה־לָכֶם is elliptical and idiomatic, expressing rebuke: ''What is it to you?'' or ''What do you mean by...?'' In natural modern English, ''What do you mean by'' best captures the confrontational force without over-paraphrasing.'
- source_word: תְּדַכְּאוּ
  chosen: crushing
  alternatives:
  - oppressing
  - crushing to pieces
  lexicon: HALOT
  rationale: From דכא in the Piel, conveying crushing or crushing down. 'Crushing' preserves the concrete violence of the Hebrew better than the more abstract 'oppressing.'
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward possessive construction; retains covenantal force in YHWH's identification with the afflicted.
- source_word: וּפְנֵי
  chosen: and ... the faces of
  alternatives:
  - and ... the face of
  lexicon: HALOT
  rationale: פנים is formally plural in Hebrew and commonly rendered 'face' or 'faces' depending on idiom. Here 'the faces of the poor' is the most literal and idiomatic English rendering in this metaphorical expression.
- source_word: עֲנִיִּים
  chosen: the poor
  alternatives:
  - the afflicted
  - the needy
  lexicon: HALOT
  rationale: Though the term can denote afflicted or humble persons, in this social-justice context 'the poor' best fits the economic and social exploitation in view.
- source_word: תִּטְחָנוּ
  chosen: grinding
  alternatives:
  - crushing
  - pulverizing
  lexicon: HALOT
  rationale: From טחן, literally 'to grind.' Retaining 'grinding' preserves the vivid metaphor of brutal exploitation and echoes the Hebrew image distinctly from the previous verb.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Introduces a prophetic divine pronouncement. 'Declares' is clear modern English and preserves the authoritative speech formula.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD' in English to avoid 'Lord LORD.' This also aligns with the doctrine's default of rendering YHWH as 'the LORD'; in this compound, 'GOD' signals the underlying divine name.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: '''Hosts'' is the established and still intelligible rendering for the divine title, preserving its breadth (heavenly armies/cosmic forces) better than the narrower ''armies.'''
