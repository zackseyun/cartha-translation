id: ISA.3.17
reference: Isaiah 3:17
source:
  edition: WLC
  text: וְ/שִׂפַּ֣ח אֲדֹנָ֔/י קָדְקֹ֖ד בְּנ֣וֹת צִיּ֑וֹן וַ/יהוָ֖ה פָּתְ/הֵ֥ן יְעָרֶֽה׃ס
translation:
  text: therefore the Lord will strike the crown of the daughters of Zion with scabs, and Yahweh will lay bare their private parts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their nakedness'; the Hebrew term is difficult, and some take it more specifically as a euphemism for intimate parts, while others understand it differently.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׂפַּח
  chosen: will strike ... with scabs
  alternatives:
  - will make scabby
  - will afflict with sores
  lexicon: HALOT
  rationale: The verb from ספח/שׂפח here denotes inflicting a scabby or diseased condition. English needs an explicit verbal expression; 'strike ... with scabs' preserves the punitive force better than a flatter 'make scabby.' The prefixed conjunction is carried idiomatically by 'therefore' from the discourse flow.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This divine title is best rendered 'the Lord' in normal English prose. It refers to God as sovereign master, distinct in form from the following divine name YHWH.
- source_word: קָדְקֹד
  chosen: the crown
  alternatives:
  - the scalp
  - the top of the head
  lexicon: HALOT
  rationale: The noun denotes the crown/top of the head. 'Crown' is concise and idiomatic, while the following 'with scabs' makes clear that the physical head is meant, not a royal crown.
- source_word: בְּנוֹת צִיּוֹן
  chosen: the daughters of Zion
  alternatives:
  - the women of Zion
  lexicon: HALOT
  rationale: A literal rendering preserves the prophetic personification and covenantal-poetic register. 'Women of Zion' is interpretive and less textually transparent.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' This also preserves the distinction between אֲדֹנָי ('the Lord') and יהוה ('the LORD') in the verse.
- source_word: פָּתְהֵן
  chosen: their private parts
  alternatives:
  - their nakedness
  - their foreheads
  lexicon: HALOT
  rationale: The noun is difficult and has been understood either as a euphemism for genital exposure or, by some, as something like 'forehead.' In context of humiliation and exposure, 'their private parts' best captures the likely sense while remaining readable modern English. Because the term is contested, alternatives are preserved in a footnote.
- source_word: יְעָרֶה
  chosen: will lay bare
  alternatives:
  - will uncover
  - will expose
  lexicon: HALOT
  rationale: The verb means to uncover or make bare. 'Lay bare' is vivid, natural English and fits the shame-judgment context.
