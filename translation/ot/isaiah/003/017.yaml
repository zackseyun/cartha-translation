theological_decisions:
- issue: Rendering the divine names אֲדֹנָי and יהוה distinctly within the same verse
  chosen_reading: Render אֲדֹנָי as 'the Lord' and יהוה as 'Yahweh'
  alternative_readings:
  - Render both simply as 'the Lord'
  - Render יהוה as 'Yahweh'
  rationale: The Hebrew intentionally uses two divine designations in parallel. Distinguishing them in English preserves the source-text form and follows the doctrine's default for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of פָּתְהֵן in a judgment oracle of shame
  chosen_reading: A euphemistic reference to intimate parts exposed in humiliation
  alternative_readings:
  - foreheads
  - nakedness more generally
  rationale: The immediate context concerns the humiliation of the daughters of Zion, and the paired verb 'lay bare' strongly favors exposure language. Because the noun is lexically difficult and some translations take it differently, the alternative is preserved in a footnote rather than hidden.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
