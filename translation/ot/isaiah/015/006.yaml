id: ISA.15.6
reference: Isaiah 15:6
source:
  edition: WLC
  text: כִּֽי מֵ֥י נִמְרִ֖ים מְשַׁמּ֣וֹת יִֽהְי֑וּ כִּֽי יָבֵ֤שׁ חָצִיר֙ כָּ֣לָה דֶ֔שֶׁא
    יֶ֖רֶק לֹ֥א הָיָֽה־־׃
translation:
  text: For the waters of Nimrim will become desolations, for the grass is dried up,
    the vegetation is gone, and no green thing remains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be desolate' / 'will become a wasteland.' The Hebrew phrase is
      compact and may describe either the waters themselves as desolated or the area
      of the waters as becoming desolate.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Surely
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation for the lament/judgment context. 'For' fits
    the causal-explanatory force in English and works for both occurrences in the
    verse.
- source_word: מֵי נִמְרִים
  chosen: the waters of Nimrim
  alternatives:
  - the waters of Nimrim stream
  - the waters of Nimrim
  lexicon: HALOT
  rationale: מֵי is the construct plural 'waters of'; נִמְרִים is a place name and
    is therefore transliterated per project policy.
- source_word: מְשַׁמּוֹת
  chosen: desolations
  alternatives:
  - waste places
  - desolate places
  - desolation
  lexicon: HALOT
  rationale: The noun is plural feminine and denotes devastated/desolate conditions
    or places. 'Desolations' preserves the plural form and the starkness of the Hebrew
    better than smoothing to a singular abstract noun.
- source_word: יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: With a predicate noun, היה can mean either 'be' or 'become.' In context,
    the waters are undergoing a change into a ruined state, so 'will become' better
    captures the sense.
- source_word: יָבֵשׁ חָצִיר
  chosen: the grass is dried up
  alternatives:
  - the grass has withered
  - the grass is dry
  lexicon: HALOT
  rationale: The perfect verb describes the resulting condition. 'Is dried up' is
    natural English and preserves the image of parched vegetation.
- source_word: כָּלָה דֶשֶׁא
  chosen: the vegetation is gone
  alternatives:
  - the tender grass is finished
  - the herbage is consumed
  lexicon: HALOT
  rationale: דֶשֶׁא refers to fresh vegetation/sprouting growth. 'Vegetation' is readable
    modern English; 'is gone' conveys the completed loss expressed by כָּלָה.
- source_word: יֶרֶק
  chosen: green thing
  alternatives:
  - greenery
  - green plant
  - verdure
  lexicon: HALOT
  rationale: יֶרֶק denotes green growth/green vegetation. 'Green thing' is idiomatic
    enough in English and preserves the broad, concrete scope of the Hebrew.
- source_word: לֹא הָיָה
  chosen: no green thing remains
  alternatives:
  - there was no green thing
  - it is no more
  lexicon: HALOT
  rationale: Although formally past, the clause functions in the description of present
    devastation. 'Remains' communicates the existential negation in smooth English
    while matching the cumulative portrayal of total barrenness.
