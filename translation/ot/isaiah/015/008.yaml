id: ISA.15.8
reference: Isaiah 15:8
source:
  edition: WLC
  text: כִּֽי הִקִּ֥יפָה הַ/זְּעָקָ֖ה אֶת גְּב֣וּל מוֹאָ֑ב עַד אֶגְלַ֨יִם֙ יִלְלָתָ֔/הּ
    וּ/בְאֵ֥ר אֵילִ֖ים יִלְלָתָֽ/הּ־־־׃
translation:
  text: For the outcry has gone around the border of Moab; its wailing reaches as
    far as Eglaim, and its wailing to Beer-elim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has encircled the border of Moab.' The Hebrew verb preserves the image
      of the cry going all around Moab.
    reason: lexical_alternative
  - marker: b
    text: Beer-elim is a place name, possibly meaning 'Well of Elim' or 'Well of the
      mighty ones.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation for the preceding lament/oracle. 'For' fits
    the discourse flow naturally in English.
- source_word: הִקִּיפָה
  chosen: has gone around
  alternatives:
  - has encircled
  - has surrounded
  - has reached around
  lexicon: HALOT
  rationale: From נקף/נקף in the sense of going around or encircling. With 'the outcry'
    as subject and 'the border of Moab' as object, the image is that the cry has spread
    all around Moab's boundary. 'Has gone around' preserves the spatial imagery while
    remaining readable.
- source_word: הַזְּעָקָה
  chosen: the outcry
  alternatives:
  - the cry
  - the scream
  lexicon: HALOT
  rationale: זְעָקָה denotes a cry of distress. 'Outcry' conveys public, intense lament
    better than the more neutral 'cry'.
- source_word: אֶת גְּבוּל מוֹאָב
  chosen: the border of Moab
  alternatives:
  - the territory of Moab
  - the boundary of Moab
  lexicon: HALOT
  rationale: גְּבוּל commonly means border or boundary. 'Border of Moab' best matches
    the geographic sense in context.
- source_word: עַד
  chosen: as far as
  alternatives:
  - to
  - up to
  lexicon: HALOT
  rationale: Marks extent. 'As far as' makes the geographic reach of the wailing explicit
    in idiomatic English.
- source_word: אֶגְלַיִם
  chosen: Eglaim
  rationale: Place name; transliterated according to the translation philosophy for
    names.
- source_word: יִלְלָתָהּ
  chosen: its wailing
  alternatives:
  - its howl
  - its lamentation
  lexicon: HALOT
  rationale: From יללה, a howl/wail of grief. 'Its wailing' is natural English and
    preserves the feminine suffix referring back to the outcry/land's cry. Repeated
    consistently for both occurrences.
- source_word: וּבְאֵר אֵילִים
  chosen: to Beer-elim
  alternatives:
  - and to Beer-elim
  - at Beer-elim
  lexicon: HALOT
  rationale: 'The prefixed conjunction and place name likely continue the geographic
    extent of the cry. Rendering simply ''to Beer-elim'' after ''and'' in English
    yields smooth parallelism: ''as far as Eglaim, and ... to Beer-elim.'' The place
    name is transliterated.'
