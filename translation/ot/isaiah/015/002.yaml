id: ISA.15.2
reference: Isaiah 15:2
source:
  edition: WLC
  text: עָלָ֨ה הַ/בַּ֧יִת וְ/דִיבֹ֛ן הַ/בָּמ֖וֹת לְ/בֶ֑כִי עַל נְב֞וֹ וְ/עַ֤ל מֵֽידְבָא֙
    מוֹאָ֣ב יְיֵלִ֔יל בְּ/כָל רֹאשָׁ֣י/ו קָרְחָ֔ה כָּל זָקָ֖ן גְּרוּעָֽה־־־׃
translation:
  text: He has gone up to the temple, and Dibon to the high places, to weep. Over
    Nebo and over Medeba Moab wails; on every head is baldness, every beard is cut
    off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has gone up to the house, and Dibon to the high places, for weeping.'
      The Hebrew 'the house' may be understood more literally, but in this context
      likely refers to a cultic shrine or temple.
    reason: lexical_alternative
  - marker: b
    text: '''Baldness'' and the cutting off of the beard are signs of mourning.'
    reason: cultural_note
lexical_decisions:
- source_word: עָלָה
  chosen: has gone up
  alternatives:
  - went up
  - goes up
  lexicon: HALOT
  rationale: Qal perfect 3ms of עלה, here narrating a completed action with vivid
    immediacy. 'Has gone up' preserves the perfect aspect in natural English better
    than a simple present, while also fitting the lament context.
- source_word: הַבַּיִת
  chosen: the temple
  alternatives:
  - the house
  - the house of worship
  lexicon: HALOT
  rationale: Literally 'the house.' In this context, paired with 'high places' and
    followed by mourning at cultic sites, it most naturally refers to a shrine/temple
    rather than a generic house. 'Temple' communicates the cultic sense clearly in
    English.
- source_word: וְדִיבֹן
  chosen: and Dibon
  alternatives:
  - and to Dibon
  lexicon: HALOT
  rationale: Dibon is a place name and is transliterated per project policy. The Hebrew
    conjunction simply links it; the motion sense 'to Dibon' is possible by implication
    from the preceding verb, but the consonantal text does not repeat a preposition,
    so the more restrained rendering keeps 'and Dibon' in apposition-like sequence.
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the heights
  - the shrines
  lexicon: HALOT
  rationale: במות commonly denotes cultic high places. 'High places' is the standard
    and most transparent rendering, preserving the religious setting without overinterpreting
    the exact architecture.
- source_word: לְבֶכִי
  chosen: to weep
  alternatives:
  - for weeping
  - to weeping
  lexicon: HALOT
  rationale: The noun 'weeping' with ל expresses purpose/result. English idiom is
    best served by the infinitive 'to weep,' which preserves the sense without awkwardness.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard convention.
- source_word: מֵידְבָא
  chosen: Medeba
  lexicon: HALOT
  rationale: Proper place name; transliterated by standard convention.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Proper national/place name; transliterated by standard convention. Here
    it functions collectively for the people/land of Moab.
- source_word: יְיֵלִיל
  chosen: wails
  alternatives:
  - howls
  - laments
  lexicon: HALOT
  rationale: Hiphil of ילל denotes loud lamentation or howling. 'Wails' captures the
    audible grief in idiomatic English without sounding animalistic, while remaining
    stronger than the more general 'laments.'
- source_word: בְּכָל רֹאשָׁיו
  chosen: on every head
  alternatives:
  - on all its heads
  - on each of their heads
  lexicon: HALOT
  rationale: The singular collective subject 'Moab' is followed by a 3ms suffix, yielding
    a collective sense. English naturally renders this distributively as 'on every
    head,' referring to the people of Moab.
- source_word: קָרְחָה
  chosen: is baldness
  alternatives:
  - is bald
  - there is baldness
  lexicon: HALOT
  rationale: The noun denotes baldness, especially as a mourning sign. 'Is baldness'
    preserves the nominal construction and parallels the next clause. The sense is
    not natural hair loss but ritual/mourning shaving.
- source_word: כָּל זָקָן
  chosen: every beard
  alternatives:
  - every beard of it
  - each beard
  lexicon: HALOT
  rationale: A distributive expression matching 'on every head.' 'Beard' is retained
    literally because it is culturally and textually specific.
- source_word: גְּרוּעָה
  chosen: is cut off
  alternatives:
  - is shorn
  - is clipped
  lexicon: HALOT
  rationale: From גרע, 'diminished/removed.' In context of mourning signs with shaved
    heads, the beard is best understood as cut off or shorn. 'Cut off' is clear modern
    English and preserves the severity of the action.
