id: ISA.15.5
reference: Isaiah 15:5
source:
  edition: WLC
  text: לִבִּ/י֙ לְ/מוֹאָ֣ב יִזְעָ֔ק בְּרִיחֶ֕/הָ עַד צֹ֖עַר עֶגְלַ֣ת שְׁלִשִׁיָּ֑ה
    כִּ֣י מַעֲלֵ֣ה הַ/לּוּחִ֗ית בִּ/בְכִי֙ יַֽעֲלֶה בּ֔/וֹ כִּ֚י דֶּ֣רֶךְ חוֹרֹנַ֔יִם
    זַעֲקַת שֶׁ֖בֶר יְעֹעֵֽרוּ־׀־־׃
translation:
  text: My heart cries out for Moab; her fugitives flee as far as Zoar, as far as
    Eglath-shelishiyah. For they go up the ascent of Luhith with weeping; for on the
    road to Horonaim they raise a cry of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew בְּרִיחֶיהָ is difficult. It may mean 'her fugitives/refugees,' as
      rendered here, or more literally 'her bars,' which some take metaphorically
      or emend in light of the context.
    reason: lexical_alternative
  - marker: b
    text: Eglath-shelishiyah is likely a place name. The expression could also be
      understood literally as 'a three-year-old heifer.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verbs in this verse shift between singular and plural forms;
      the translation smooths them to reflect the collective movement of Moab's people.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  chosen: My heart
  alternatives:
  - Within me
  - My inner being
  lexicon: HALOT
  rationale: Literal 'my heart' is natural English and preserves the emotive center
    of the speaker's lament.
- source_word: לְמוֹאָב
  chosen: for Moab
  alternatives:
  - because of Moab
  - over Moab
  lexicon: HALOT
  rationale: 'The preposition ל with זעק here is best rendered as direction/object
    of the cry: the speaker cries out for Moab, expressing lament on Moab''s behalf.'
- source_word: יִזְעָק
  chosen: cries out
  alternatives:
  - shouts
  - cries
  lexicon: HALOT
  rationale: Conveys a loud anguished cry; present tense works idiomatically in English
    prophetic poetry.
- source_word: בְּרִיחֶיהָ
  chosen: her fugitives flee
  alternatives:
  - her bars
  - her nobles
  - her refugees
  lexicon: HALOT
  rationale: The form is difficult and has been understood variously. In context of
    flight from devastation, the sense 'fugitives/refugees' best fits the movement
    toward Zoar. Because the Hebrew term is contested, the more literal alternative
    is preserved in a footnote.
- source_word: עַד צֹעַר
  chosen: as far as Zoar
  alternatives:
  - to Zoar
  lexicon: HALOT
  rationale: עַד marks extent; 'as far as' captures the reach of the flight/cry.
- source_word: עֶגְלַת שְׁלִשִׁיָּה
  chosen: Eglath-shelishiyah
  alternatives:
  - a three-year-old heifer
  - Eglath the Third
  lexicon: HALOT
  rationale: Most likely a place name in parallel with Zoar and the route references
    that follow. Transliteration avoids forcing an uncertain etymological interpretation
    into the main text; lexical alternative preserved in footnote.
- source_word: מַעֲלֵה הַלּוּחִית
  chosen: the ascent of Luhith
  alternatives:
  - the slope of Luhith
  lexicon: HALOT
  rationale: A geographic ascent/roadway is in view; 'ascent' is a standard and clear
    rendering.
- source_word: בִּבְכִי יַעֲלֶה בּוֹ
  chosen: they go up ... with weeping
  alternatives:
  - one goes up it with weeping
  - he goes up it weeping
  lexicon: HALOT
  rationale: The Hebrew singular verb may function collectively in context. English
    plural smooths the sense with the fleeing population in view.
- source_word: דֶּרֶךְ חוֹרֹנַיִם
  chosen: on the road to Horonaim
  alternatives:
  - the way of Horonaim
  - the road of Horonaim
  lexicon: HALOT
  rationale: Idiomatic English for a route leading toward the named place.
- source_word: זַעֲקַת שֶׁבֶר
  chosen: a cry of destruction
  alternatives:
  - a cry of ruin
  - an outcry of breaking
  lexicon: HALOT
  rationale: שבר here denotes collapse/devastation rather than a literal fracture;
    'destruction' communicates the disaster clearly.
- source_word: יְעֹעֵרוּ
  chosen: they raise
  alternatives:
  - they awaken
  - they stir up
  - is aroused
  lexicon: HALOT
  rationale: The verb literally involves arousing/stirring up; with 'cry' as object,
    'they raise' is idiomatic English.
