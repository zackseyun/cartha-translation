id: ISA.15.1
reference: Isaiah 15:1
source:
  edition: WLC
  text: מַשָּׂ֖א מוֹאָ֑ב כִּ֠י בְּ/לֵ֞יל שֻׁדַּ֨ד עָ֤ר מוֹאָב֙ נִדְמָ֔ה כִּ֗י בְּ/לֵ֛יל
    שֻׁדַּ֥ד קִיר מוֹאָ֖ב נִדְמָֽה־׃
translation:
  text: 'An oracle concerning Moab: because in a night Ar of Moab is devastated, it
    is silenced; because in a night Kir of Moab is devastated, it is silenced.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burden' or 'pronouncement' concerning Moab for מַשָּׂא; here rendered
      'oracle' as a prophetic heading.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase literally says 'in a night,' emphasizing sudden destruction
      within a single night; 'overnight' is a possible idiomatic rendering.
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'it is silenced' can also be understood as 'it is cut
      off' or 'it is destroyed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic headings מַשָּׂא commonly introduces a prophetic utterance
    of judgment. 'Oracle' is clear modern English and avoids the misleadingly literal
    'burden' where the genre sense is primary.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard transliteration of the place/people name, following the policy
    to transliterate names.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the grounds/content of the oracle's judgment. 'Because'
    best conveys the explanatory force in English.
- source_word: בְּלֵיל
  chosen: in a night
  alternatives:
  - in the night
  - overnight
  lexicon: HALOT
  rationale: The phrase stresses suddenness within a single night. 'In a night' preserves
    the Hebrew's terse force better than the more idiomatic but slightly interpretive
    'overnight.'
- source_word: שֻׁדַּד
  chosen: is devastated
  alternatives:
  - is destroyed
  - is ravaged
  - is laid waste
  lexicon: HALOT
  rationale: The passive form denotes violent despoiling/devastation. 'Is devastated'
    is strong without overcommitting to total annihilation; 'destroyed' is possible
    but slightly more absolute.
- source_word: עָר מוֹאָב
  chosen: Ar of Moab
  alternatives:
  - Ar-Moab
  lexicon: HALOT
  rationale: Treated as the proper name of a Moabite city. 'Ar of Moab' is a transparent
    transliteration preserving the Hebrew construction.
- source_word: נִדְמָה
  chosen: it is silenced
  alternatives:
  - it is cut off
  - it is destroyed
  - it is brought to silence
  lexicon: HALOT
  rationale: The verb can denote being undone, destroyed, or brought to silence. In
    parallel with the city's devastation, 'it is silenced' preserves the likely nuance
    of being stilled/laid low while avoiding flattening the parallel into a mere repetition
    of שֻׁדַּד.
- source_word: קִיר מוֹאָב
  chosen: Kir of Moab
  alternatives:
  - Kir-Moab
  lexicon: HALOT
  rationale: Proper place name preserved by transliteration; the construct relation
    is naturally rendered 'Kir of Moab.'
