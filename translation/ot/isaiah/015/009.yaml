theological_decisions:
- issue: Nature of the 'lion' in the judgment oracle
  chosen_reading: Retain the concrete image 'a lion' without interpreting it in the
    main text.
  alternative_readings:
  - a literal lion sent in judgment
  - a metaphor for an invading power or further calamity
  rationale: The Hebrew gives the image but does not explicitly identify its referent.
    In keeping with the translation philosophy, the text preserves the prophetic ambiguity
    rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
