id: ISA.15.3
reference: Isaiah 15:3
source:
  edition: WLC
  text: בְּ/חוּצֹתָ֖י/ו חָ֣גְרוּ שָׂ֑ק עַ֣ל גַּגּוֹתֶ֧י/הָ וּ/בִ/רְחֹבֹתֶ֛י/הָ כֻּלֹּ֥/ה
    יְיֵלִ֖יל יֹרֵ֥ד בַּ/בֶּֽכִי׃
translation:
  text: In its streets they put on sackcloth; on its rooftops and in its squares everyone
    wails, going down in weeping.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone wails, descending in tears.' The Hebrew literally says 'going
      down in weeping,' an image that may suggest either physical descent or being
      overcome with grief.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחוּצֹתָיו
  chosen: in its streets
  alternatives:
  - in its outside places
  - in its open places
  lexicon: HALOT
  rationale: חוּץ refers to the outside/open area of a town, commonly its streets.
    'In its streets' is idiomatic modern English and fits the urban mourning scene.
- source_word: חָגְרוּ שָׂק
  chosen: they put on sackcloth
  alternatives:
  - they girded themselves with sackcloth
  - they wore sackcloth
  lexicon: HALOT
  rationale: The verb חגר literally means 'gird' or 'strap on.' With שַׂק it idiomatically
    denotes donning sackcloth as a sign of mourning. 'Put on sackcloth' preserves
    the sense without archaic phrasing.
- source_word: עַל גַּגּוֹתֶיהָ
  chosen: on its rooftops
  alternatives:
  - on her roofs
  - upon its housetops
  lexicon: HALOT
  rationale: גַּגּוֹת are flat roofs/rooftops. English 'rooftops' is natural and preserves
    the image of public lament from elevated house roofs. The feminine suffix refers
    to the city/land, rendered with English neuter 'its' for idiomatic city reference.
- source_word: וּבִרְחֹבֹתֶיהָ
  chosen: and in its squares
  alternatives:
  - and in its broad places
  - and in its plazas
  lexicon: HALOT
  rationale: רְחוֹבוֹת denotes broad public spaces within a city, often squares rather
    than narrow streets. Since חוּצוֹת has already been rendered 'streets,' 'squares'
    helps preserve the lexical distinction.
- source_word: כֻּלֹּה
  chosen: everyone
  alternatives:
  - all of it
  - the whole of it
  lexicon: HALOT
  rationale: Though formally singular, in context it refers distributively to the
    inhabitants of the city in the public places. 'Everyone' conveys the collective
    force naturally in English.
- source_word: יְיֵלִיל
  chosen: wails
  alternatives:
  - howls
  - laments
  lexicon: HALOT
  rationale: The verb ילל denotes loud lamentation or howling. 'Wails' best captures
    intense mourning in contemporary English without sounding animalistic or overly
    interpretive.
- source_word: יֹרֵד בַּבֶּכִי
  chosen: going down in weeping
  alternatives:
  - goes down in weeping
  - descending in tears
  - melting into weeping
  lexicon: HALOT
  rationale: The participle יֹרֵד literally means 'going down/descending.' In context
    it likely describes people sinking down in tears or moving downward while weeping.
    'Going down in weeping' preserves the Hebrew image with minimal interpretation;
    a more idiomatic alternative is preserved in a footnote.
