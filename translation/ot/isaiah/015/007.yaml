id: ISA.15.7
reference: Isaiah 15:7
source:
  edition: WLC
  text: עַל כֵּ֖ן יִתְרָ֣ה עָשָׂ֑ה וּ/פְקֻדָּתָ֔/ם עַ֛ל נַ֥חַל הָ/עֲרָבִ֖ים יִשָּׂאֽוּ/ם־׃
translation:
  text: Therefore the abundance they have gained and what they have stored up they
    carry away over the Brook of the Willows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over the wadi of the Arabah' / 'over the valley of the desert plains.'
      The Hebrew expression is uncertain; the traditional rendering is 'Brook of the
      Willows.'
    reason: alternative_reading
  - marker: b
    text: The phrase rendered 'what they have stored up' is difficult Hebrew and may
      also mean 'their possessions' or 'what was entrusted to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְרָה
  chosen: the abundance
  alternatives:
  - the surplus
  - what is left over
  - their wealth
  lexicon: HALOT
  rationale: The noun denotes excess, remainder, or abundance. In context of fleeing
    with possessions, 'the abundance' captures accumulated goods without over-specifying
    as only 'wealth.'
- source_word: עָשָׂה
  chosen: they have gained
  alternatives:
  - he made
  - they made
  - they acquired
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb functions idiomatically with the
    preceding noun in a collective sense. English smooths this as 'they have gained,'
    referring to the Moabites' accumulated abundance. 'Made' would be too wooden and
    unclear in context.
- source_word: וּפְקֻדָּתָם
  chosen: and what they have stored up
  alternatives:
  - and their store
  - and their possessions
  - and what was entrusted to them
  lexicon: HALOT
  rationale: The noun is difficult and contextually debated. Here it likely refers
    to stored goods, reserves, or possessions under one's keeping. 'What they have
    stored up' gives a natural English sense that fits the parallel with accumulated
    abundance.
- source_word: נַחַל
  chosen: Brook
  alternatives:
  - wadi
  - valley stream
  - torrent valley
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi or seasonal stream. 'Brook' is idiomatic
    and traditional enough in English, while still understandable. A more technical
    'wadi' is possible but less accessible in the main text.
- source_word: הָעֲרָבִים
  chosen: the Willows
  alternatives:
  - the Poplars
  - the Arabah
  - the desert plains
  lexicon: HALOT
  rationale: The form is traditionally understood as 'willows/poplar-like trees,'
    yielding the place-name sense 'Brook of the Willows.' Because the underlying term
    can also be connected with arid regions or the Arabah, the alternative is preserved
    in a footnote.
- source_word: יִשָּׂאֻם
  chosen: they carry away
  alternatives:
  - they bear them
  - they lift them up
  - they transport them
  lexicon: HALOT
  rationale: The verb נשׂא means to carry/bear. 'Carry away' fits the flight context
    and the object suffix referring to the goods mentioned earlier.
