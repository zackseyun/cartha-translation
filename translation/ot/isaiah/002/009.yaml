id: ISA.2.9
reference: Isaiah 2:9
source:
  edition: WLC
  text: וַ/יִּשַּׁ֥ח אָדָ֖ם וַ/יִּשְׁפַּל אִ֑ישׁ וְ/אַל תִּשָּׂ֖א לָ/הֶֽם־־׃
translation:
  text: So man is bowed down, and each person is brought low; do not forgive them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'do not lift them up.' The Hebrew verb can mean 'lift, carry, bear,'
      and in some contexts 'forgive.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשַּׁח
  chosen: is bowed down
  alternatives:
  - bows down
  - is humbled
  lexicon: HALOT
  rationale: From שׁחח/שׁח, denoting being bowed low or humbled. The passive-like
    English 'is bowed down' fits the stative/result sense in context and pairs well
    with the following verb.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered 'man' or 'humankind' by context. Here
    it is paired with אִישׁ in a poetic parallelism distinguishing generic man from
    individual person; 'man' preserves the masculine/generic force and the parallel
    structure.
- source_word: וַיִּשְׁפַּל
  chosen: is brought low
  alternatives:
  - is humbled
  - is made low
  lexicon: HALOT
  rationale: From שׁפל, 'to be low / be humbled / be brought low.' 'Is brought low'
    preserves the humiliation motif and gives a natural English parallel to 'is bowed
    down.'
- source_word: אִישׁ
  chosen: each person
  alternatives:
  - man
  - each man
  lexicon: HALOT
  rationale: Although literally 'man,' in this poetic pairing with אָדָם it points
    to the individual human. 'Each person' preserves the distributive sense and avoids
    an awkward repetition of 'man ... man' in English while still reflecting human
    individuals.
- source_word: וְאַל תִּשָּׂא לָהֶם
  chosen: do not forgive them
  alternatives:
  - do not lift them up
  - do not bear them away
  - do not show favor to them
  lexicon: HALOT
  rationale: 'נשא with a personal object can mean ''forgive'' in the sense of bearing
    away guilt, and this is the most common contextual understanding here: after human
    pride is humbled, the prophet asks that they not be pardoned. ''Lift them up''
    is lexically possible but less fitting in this judgment context.'
