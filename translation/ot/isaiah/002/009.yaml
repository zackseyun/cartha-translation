theological_decisions:
- issue: Sense of נשא in the final clause
  chosen_reading: A plea that God not forgive the people
  alternative_readings:
  - A plea that God not lift them up
  - A statement of non-exaltation rather than non-forgiveness
  rationale: The clause is ambiguous enough to allow either non-forgiveness or non-exaltation.
    In the immediate context of judgment on idolatry and pride, 'do not forgive them'
    best captures the force of the appeal while preserving the severity of the oracle.
    Because the alternative is viable, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
