id: ISA.2.16
reference: Isaiah 2:16
source:
  edition: WLC
  text: וְ/עַ֖ל כָּל אֳנִיּ֣וֹת תַּרְשִׁ֑ישׁ וְ/עַ֖ל כָּל שְׂכִיּ֥וֹת הַ/חֶמְדָּֽה־־׃
translation:
  text: and against all the ships of Tarshish, and against all the beautiful craft.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'all the beautiful images' or 'all the desirable works.' The
      Hebrew term translated 'craft' is rare, and its precise sense is uncertain;
      the maritime context favors a rendering related to ships or finely made vessels.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and upon
  - against
  lexicon: HALOT
  rationale: In the larger sentence of vv. 12–16, עַל introduces the objects of the
    LORD's coming judgment. 'Against' best conveys hostile direction in English, while
    retaining the repeated anaphoric structure with 'and.'
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Standard distributive/collective sense; 'all' preserves the poetic repetition
    and breadth of judgment.
- source_word: אֳנִיּוֹת תַּרְשִׁישׁ
  chosen: the ships of Tarshish
  alternatives:
  - Tarshish ships
  - seagoing ships
  lexicon: HALOT
  rationale: The construct phrase is conventionally and accurately rendered 'ships
    of Tarshish.' It may denote ships associated with Tarshish or large long-distance
    merchant vessels; the traditional phrasing preserves the Hebrew expression without
    over-interpreting.
- source_word: שְׂכִיּוֹת
  chosen: craft
  alternatives:
  - images
  - figures
  - ships
  - works
  lexicon: HALOT
  rationale: This rare noun is difficult. In this maritime parallelism after 'ships
    of Tarshish,' 'craft' best captures an object related to vessels or finely made
    works without forcing a narrower sense. It also fits the immediate poetic pairing
    better than 'images' or 'figures.'
- source_word: הַחֶמְדָּה
  chosen: beautiful
  alternatives:
  - desirable
  - pleasant
  - precious
  - delightful
  lexicon: HALOT
  rationale: The noun denotes desirability or delight. As an attributive genitive-like
    construction with שְׂכִיּוֹת, 'beautiful' gives natural English while preserving
    the sense of prized attractiveness.
