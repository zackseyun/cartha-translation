theological_decisions:
- issue: Nature of prophetic revelation in חָזָה
  chosen_reading: Retain the visionary language 'saw' rather than interpret it as
    merely 'spoke' or 'received.'
  alternative_readings:
  - received in a vision
  - prophesied
  rationale: The Hebrew explicitly uses the verb 'saw,' a conventional prophetic expression
    that preserves the mode of revelation without flattening it into a generic statement
    about prophecy.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope marker עַל in the superscription
  chosen_reading: Render as 'concerning Judah and Jerusalem.'
  alternative_readings:
  - against Judah and Jerusalem
  - about Judah and Jerusalem
  rationale: The preposition can bear several nuances, but this heading introduces
    the subject matter of the vision broadly, not exclusively judgment. 'Concerning'
    preserves theological tension because the following oracle includes both judgment
    and future hope.
  doctrine_reference: Translation philosophy §3
