id: ISA.2.1
reference: Isaiah 2:1
source:
  edition: WLC
  text: הַ/דָּבָר֙ אֲשֶׁ֣ר חָזָ֔ה יְשַֽׁעְיָ֖הוּ בֶּן אָמ֑וֹץ עַל יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם־־׃
translation:
  text: The word that Isaiah son of Amoz saw concerning Judah and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The message' or 'The matter.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'saw'; a standard prophetic expression for receiving revelation in
      vision.
    reason: cultural_note
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word,' 'matter,' or 'message.' In prophetic superscriptions,
    'the word' is a natural and established rendering that preserves the concrete
    Hebrew expression without over-paraphrasing.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: A simple relative pronoun is required. 'That' is idiomatic modern English
    and fits the restrictive clause smoothly.
- source_word: חָזָה
  chosen: saw
  alternatives:
  - envisioned
  - received in a vision
  lexicon: HALOT
  rationale: The verb literally means 'saw' and is a standard prophetic term for visionary
    perception. 'Saw' preserves the metaphor and formal link to prophetic vision;
    more interpretive options like 'received in a vision' add explanatory content
    not explicit in the Hebrew.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: The construct relationship is most naturally rendered 'son of' in English
    genealogical identification.
- source_word: אָמוֹץ
  chosen: Amoz
  rationale: Personal name transliterated by standard English convention.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  - over
  lexicon: HALOT
  rationale: In prophetic headings, עַל often introduces the subject matter of an
    oracle or vision. 'Concerning' is the most neutral and contextually fitting rendering
    here, avoiding the adversative force of 'against,' which the verse itself does
    not require.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard English transliteration of the place/name.
- source_word: וִירוּשָׁלִָם
  chosen: and Jerusalem
  rationale: The conjunction plus place name is straightforwardly rendered 'and Jerusalem.'
