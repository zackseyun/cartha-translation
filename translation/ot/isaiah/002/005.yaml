id: ISA.2.5
reference: Isaiah 2:5
source:
  edition: WLC
  text: בֵּ֖ית יַעֲקֹ֑ב לְכ֥וּ וְ/נֵלְכָ֖ה בְּ/א֥וֹר יְהוָֽה׃
translation:
  text: House of Jacob, come, and let us walk in the light of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O house of Jacob.' The Hebrew phrase is a direct address to Jacob's
      descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'go, let us walk.' The Hebrew idiom uses an imperative followed by a
      cohortative to urge shared action.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית יַעֲקֹב
  chosen: House of Jacob
  alternatives:
  - O house of Jacob
  - family of Jacob
  lexicon: HALOT
  rationale: Construct phrase used vocatively to address the covenant people descended
    from Jacob. 'House of Jacob' preserves the Hebrew idiom and prophetic register
    better than the more interpretive 'family of Jacob.' The vocative force is conveyed
    by punctuation rather than adding 'O' in the main text.
- source_word: לְכוּ
  chosen: come
  alternatives:
  - go
  - walk
  lexicon: HALOT
  rationale: Imperative plural from הלך. In exhortative idiom לְכוּ often functions
    as 'come!' inviting action, especially when followed by a cohortative ('and let
    us walk'). 'Go' is possible more formally, but 'come' is more natural in English
    and fits the summons.
- source_word: וְנֵלְכָה
  chosen: and let us walk
  alternatives:
  - that we may walk
  - and we will walk
  lexicon: HALOT
  rationale: First person common plural cohortative of הלך with prefixed conjunction.
    The cohortative expresses shared exhortation or resolve, best rendered 'let us
    walk.' 'Walk' is retained rather than a more interpretive 'live' because the metaphor
    is standard biblical language and remains clear in English.
- source_word: בְּאוֹר
  chosen: in the light
  alternatives:
  - by the light
  - in light
  lexicon: HALOT
  rationale: The preposition ב with אוֹר can denote sphere or means. 'In the light'
    preserves the common biblical metaphor of living within divine illumination and
    guidance. 'By the light' is possible but sounds more instrumental and less idiomatic
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    signaling the covenant name.
