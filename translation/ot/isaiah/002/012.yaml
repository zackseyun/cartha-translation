- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering יהוה צבאות
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  rationale: The title is translated rather than preserved in traditional form to maintain meaning for modern readers. 'Armies' communicates the martial and sovereign force of צבאות more clearly than 'Hosts' without adding doctrinal content.
