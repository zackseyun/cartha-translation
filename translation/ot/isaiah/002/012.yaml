id: ISA.2.12
reference: Isaiah 2:12
source:
  edition: WLC
  text: כִּ֣י י֞וֹם לַ/יהוָ֧ה צְבָא֛וֹת עַ֥ל כָּל גֵּאֶ֖ה וָ/רָ֑ם וְ/עַ֖ל כָּל נִשָּׂ֥א וְ/שָׁפֵֽל־־׃
translation:
  text: For Yahweh of Armies has a day against all that is proud and lofty, and against all that is lifted up—and it shall be brought low.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the LORD of Hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement; 'For' best preserves the connective force in context.
- source_word: יוֹם
  chosen: has a day
  alternatives:
  - a day is for
  - there is a day for
  lexicon: HALOT
  rationale: The Hebrew nominal clause literally reads 'for a day to/for YHWH of hosts.' In English, 'has a day' idiomatically conveys that a day of reckoning belongs to the LORD without overparaphrasing.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: The title denotes military/multitudinous forces under YHWH's command. 'Armies' is clearer in modern English while preserving the martial sense better than the traditional but less transparent 'Hosts'.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: In this judgment context, עַל carries hostile or adversative force; 'against' best communicates impending judgment.
- source_word: כָּל
  chosen: all that is
  alternatives:
  - every
  - all
  lexicon: HALOT
  rationale: Used distributively with following adjectives/participles. 'All that is' makes explicit the collective reference in natural English.
- source_word: גֵּאֶה
  chosen: proud
  alternatives:
  - arrogant
  - exalted
  lexicon: HALOT
  rationale: Conveys haughtiness or pride. 'Proud' is the most direct and idiomatic rendering in this judgment oracle.
- source_word: וָרָם
  chosen: and lofty
  alternatives:
  - and high
  - and exalted
  lexicon: HALOT
  rationale: Pairs with גֵּאֶה to intensify the image of haughtiness. 'Lofty' preserves both height imagery and metaphorical arrogance.
- source_word: נִשָּׂא
  chosen: lifted up
  alternatives:
  - exalted
  - raised high
  lexicon: HALOT
  rationale: Passive/participle-like form describing what is elevated. 'Lifted up' preserves the metaphor and echoes the Hebrew root.
- source_word: וְשָׁפֵל
  chosen: and it shall be brought low
  alternatives:
  - and low
  - and humbled
  - and it will be abased
  lexicon: HALOT
  rationale: Though formally a verbal form, in context it gives the result of divine judgment on all that is exalted. Rendering it verbally in English preserves the clause's force and matches the sense of humbling rather than merely describing a static quality.
