theological_decisions:
- issue: Representative force of הָאָדָם
  chosen_reading: generic singular 'man' referring to humanity representatively
  alternative_readings:
  - humankind
  - people
  rationale: The Hebrew uses singular אָדָם with generic force. Per doctrine, gender-accurate
    rendering is preferred over flattening to a plural unless context demands it.
    Here the representative singular is natural and preserves the source form.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy 4; Contested terms: אָדָם
    *adam*'
