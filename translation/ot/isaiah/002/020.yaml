id: ISA.2.20
reference: Isaiah 2:20
source:
  edition: WLC
  text: בַּ/יּ֤וֹם הַ/הוּא֙ יַשְׁלִ֣יךְ הָ/אָדָ֔ם אֵ֚ת אֱלִילֵ֣י כַסְפּ֔/וֹ וְ/אֵ֖ת
    אֱלִילֵ֣י זְהָב֑/וֹ אֲשֶׁ֤ר עָֽשׂוּ ל/וֹ֙ לְ/הִֽשְׁתַּחֲוֺ֔ת לַ/חְפֹּ֥ר פֵּר֖וֹת
    וְ/לָ/עֲטַלֵּפִֽים־׃
translation:
  text: In that day man will throw away his idols of silver and his idols of gold,
    which they made for him to bow down to, to the moles and to the bats.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On that day.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to bow down to'; that is, to worship them.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew expression likely refers to moles or other burrowing creatures;
      the exact animal is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'In that day' is idiomatic in English
    and preserves the eschatological/prophetic register.
- source_word: יַשְׁלִיךְ
  chosen: will throw away
  alternatives:
  - will cast away
  - will throw
  lexicon: HALOT
  rationale: Hiphil of שלך conveys casting/throwing. 'Throw away' makes explicit the
    repudiating force in context of abandoning idols.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle for אָדָם, the singular
    generic is best represented by 'man' here, referring representatively to humanity
    rather than one individual.
- source_word: אֱלִילֵי
  chosen: idols
  alternatives:
  - worthless idols
  lexicon: HALOT
  rationale: אֱלִילִים denotes idols, often with a pejorative nuance of worthlessness.
    'Idols' is the clear, natural rendering; the pejorative force is inherent in context
    and need not be expanded in the main text.
- source_word: כַסְפּוֹ ... זְהָבוֹ
  chosen: his idols of silver and his idols of gold
  alternatives:
  - his silver idols and his gold idols
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered either way. Repeating 'idols
    of' mirrors the Hebrew repetition and keeps the cadence of denunciation.
- source_word: אֲשֶׁר עָשׂוּ לוֹ
  chosen: which they made for him
  alternatives:
  - which were made for him
  - that they made for him
  lexicon: HALOT
  rationale: The plural verb 'they made' is retained, likely referring to craftsmen.
    'For him' preserves לוֹ straightforwardly rather than smoothing to a passive.
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to bow down to
  alternatives:
  - to worship
  lexicon: HALOT
  rationale: The verb literally denotes prostration/bowing down. 'Bow down to' preserves
    the physical act while still implying worship in context.
- source_word: לַחְפֹּר פֵּרוֹת
  chosen: to the moles
  alternatives:
  - to the burrowing creatures
  - to the shrews
  lexicon: HALOT
  rationale: The phrase is difficult, but the traditional and most likely sense is
    a burrowing animal, conventionally 'moles.' This fits the parallel with bats and
    the imagery of discarding idols to unclean/despised creatures.
- source_word: וְלָעֲטַלֵּפִים
  chosen: and to the bats
  lexicon: HALOT
  rationale: Straightforward lexical rendering. The pairing with moles/burrowing creatures
    underscores abandonment to dark places and creatures.
