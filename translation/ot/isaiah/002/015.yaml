id: ISA.2.15
reference: Isaiah 2:15
source:
  edition: WLC
  text: וְ/עַ֖ל כָּל מִגְדָּ֣ל גָּבֹ֑הַ וְ/עַ֖ל כָּל חוֹמָ֥ה בְצוּרָֽה־־׃
translation:
  text: and against every high tower, and against every fortified wall—
  philosophy: optimal-equivalence
  footnotes:
  - marker: —
    text: Or 'upon every high tower, and upon every fortified wall.' The Hebrew preposition
      can be rendered more literally as 'upon,' but here it carries the sense of coming
      in judgment against these objects.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and upon
  - even against
  lexicon: HALOT
  rationale: The repeated preposition עַל with conjunction ו introduces another item
    in the series of objects of the implied judgment from the surrounding context.
    In English, 'against' best conveys hostile direction in this list, more naturally
    than the more spatially literal 'upon'.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  - each
  lexicon: HALOT
  rationale: With singular nouns in distributive constructions, כָּל is well rendered
    'every,' emphasizing each instance within the category rather than a collective
    mass.
- source_word: מִגְדָּל
  chosen: tower
  alternatives:
  - watchtower
  lexicon: HALOT
  rationale: The noun denotes a tower or elevated structure. 'Tower' is the broad,
    natural English equivalent here; 'watchtower' is possible but too specific without
    contextual necessity.
- source_word: גָּבֹהַ
  chosen: high
  alternatives:
  - lofty
  - tall
  lexicon: HALOT
  rationale: The adjective means 'high' or 'lofty.' 'High' preserves the physical
    sense while also fitting the chapter's broader theme of human loftiness without
    over-interpreting the metaphor in the translation itself.
- source_word: חוֹמָה
  chosen: wall
  alternatives:
  - city wall
  - rampart
  lexicon: HALOT
  rationale: The noun refers to a wall, often defensive. 'Wall' is the most direct
    rendering; the defensive nuance is supplied by the following adjective.
- source_word: בְצוּרָה
  chosen: fortified
  alternatives:
  - strong
  - inaccessible
  - walled
  lexicon: HALOT
  rationale: The adjective from בצר describes something made secure or fortified.
    'Fortified' clearly communicates the military-defensive sense in contemporary
    English.
