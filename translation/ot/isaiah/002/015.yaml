theological_decisions:
- issue: Implied continuation of divine judgment from the surrounding context
  chosen_reading: Render the repeated עַל phrases as objects of judgment with 'against'
    rather than a neutral spatial 'upon.'
  alternative_readings:
  - Use 'upon' more formally and leave the hostile sense to context
  rationale: Isaiah 2:12–16 is a poetic list of what the day of the LORD comes against.
    Translating עַל as 'against' makes explicit the adversative force already present
    in context without adding new content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    sense in readable modern English.'
