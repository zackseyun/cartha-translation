id: ISA.2.18
reference: Isaiah 2:18
source:
  edition: WLC
  text: וְ/הָ/אֱלִילִ֖ים כָּלִ֥יל יַחֲלֹֽף׃
translation:
  text: And the idols will completely vanish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will pass away entirely.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֱלִילִים
  chosen: And the idols
  alternatives:
  - But the idols
  - And the worthless idols
  lexicon: HALOT
  rationale: וְ is rendered as simple conjunction 'And' in context. הָ marks definiteness,
    hence 'the idols.' אֱלִילִים refers to idols, with an etymological nuance of worthlessness
    or nothingness, but 'idols' is the clearest natural English equivalent; the pejorative
    nuance is implicit in the Hebrew term and broader context.
- source_word: כָּלִיל
  chosen: completely
  alternatives:
  - entirely
  - altogether
  lexicon: HALOT
  rationale: כָּלִיל functions adverbially here, intensifying the verb to mean totality
    or completeness. 'Completely' gives clear modern English and preserves the emphatic
    force.
- source_word: יַחֲלֹף
  chosen: will vanish
  alternatives:
  - will pass away
  - will disappear
  lexicon: HALOT
  rationale: From חלף, the verb can mean pass on, pass away, disappear, or vanish
    depending on context. Here, with idols as subject and כָּלִיל as intensifier,
    the sense is not mere transition but total disappearance. 'Will vanish' best captures
    the prophetic force in idiomatic English.
