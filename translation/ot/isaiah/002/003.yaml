theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering תּוֹרָה in a prophetic universal-worship context
  chosen_reading: instruction
  alternative_readings:
  - law
  - teaching
  rationale: To avoid narrowing the sense to legal code alone, 'instruction' preserves
    the broader semantic range of divine teaching flowing from Zion, without importing
    later doctrinal systems.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
