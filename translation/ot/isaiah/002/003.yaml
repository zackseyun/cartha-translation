id: ISA.2.3
reference: Isaiah 2:3
source:
  edition: WLC
  text: וְֽ/הָלְכ֞וּ עַמִּ֣ים רַבִּ֗ים וְ/אָמְרוּ֙ לְכ֣וּ וְ/נַעֲלֶ֣ה אֶל הַר יְהוָ֗ה
    אֶל בֵּית֙ אֱלֹהֵ֣י יַעֲקֹ֔ב וְ/יֹרֵ֨/נוּ֙ מִ/דְּרָכָ֔י/ו וְ/נֵלְכָ֖ה בְּ/אֹרְחֹתָ֑י/ו
    כִּ֤י מִ/צִּיּוֹן֙ תֵּצֵ֣א תוֹרָ֔ה וּ/דְבַר יְהוָ֖ה מִ/ירוּשָׁלִָֽם׀־־־־׃
translation:
  text: And many peoples will come and say, “Come, let us go up to the mountain of
    the LORD, to the house of the God of Jacob, that he may teach us from his ways
    and that we may walk in his paths.” For instruction will go out from Zion, and
    the word of the LORD from Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will go' or 'will walk'; the Hebrew verb is literally 'go/walk,' but
      here it describes peoples moving toward Zion.
    reason: lexical_alternative
  - marker: b
    text: '''Instruction'' translates Hebrew torah, which can also be rendered ''law''
      or ''teaching.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  chosen: will come
  alternatives:
  - will go
  - will walk
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but with peoples moving toward Zion in
    this context, idiomatic English prefers 'come' from the narrator's vantage toward
    the focal destination. This preserves the pilgrimage sense without woodenly saying
    'walk.'
- source_word: עַמִּים רַבִּים
  chosen: many peoples
  alternatives:
  - many nations
  - many peoples groups
  lexicon: HALOT
  rationale: עמים denotes peoples/nations; 'many peoples' preserves the plural ethnic-national
    sense better than the more politically loaded 'nations' in this poetic context.
- source_word: לְכוּ וְנַעֲלֶה
  chosen: Come, let us go up
  alternatives:
  - Come, let us ascend
  - Come, and let us go up
  lexicon: HALOT
  rationale: The pair forms an exhortation to pilgrimage. 'Go up' preserves the conventional
    biblical idiom of ascent to Jerusalem while remaining natural English.
- source_word: הַר יְהוָה
  chosen: the mountain of the LORD
  alternatives:
  - the hill of the LORD
  lexicon: HALOT
  rationale: הַר is 'mountain.' YHWH is rendered 'the LORD' per doctrine. The phrase
    is a standard Zion expression and should remain transparent.
- source_word: בֵּית אֱלֹהֵי יַעֲקֹב
  chosen: the house of the God of Jacob
  alternatives:
  - the temple of the God of Jacob
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Although it refers to the temple, 'house'
    preserves the Hebrew expression and its theological resonance.
- source_word: וְיֹרֵנוּ
  chosen: that he may teach us
  alternatives:
  - and he will teach us
  - that he will instruct us
  lexicon: HALOT
  rationale: 'Hiphil of ירה here means ''teach/instruct.'' The prefixed conjunction
    with the cohortative sequence is well represented in English purpose style: ''that
    he may teach us.'''
- source_word: מִדְּרָכָיו
  chosen: from his ways
  alternatives:
  - his ways
  - about his ways
  lexicon: HALOT
  rationale: The preposition מִן is present in the Hebrew and should be represented.
    'Teach us from his ways' is slightly unusual in English but reflects the source
    better than omitting the preposition entirely.
- source_word: וְנֵלְכָה בְּאֹרְחֹתָיו
  chosen: that we may walk in his paths
  alternatives:
  - and we will walk in his paths
  - that we may go in his paths
  lexicon: HALOT
  rationale: הלך plus 'in his paths' is a common metaphor for conduct. 'Walk' preserves
    the ethical metaphor better than 'go.' Purpose/result nuance fits the sequence.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: כִּי introduces the reason for the nations' invitation. 'For' is concise
    and natural in elevated English prose.
- source_word: תּוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: תּוֹרָה fundamentally denotes instruction/teaching, not merely statutory
    law. In this prophetic context, 'instruction' better conveys the broader sense
    of divine teaching issuing from Zion.
- source_word: תֵּצֵא
  chosen: will go out
  alternatives:
  - will come forth
  - shall proceed
  lexicon: HALOT
  rationale: יצא is 'go out/come out.' 'Will go out' is clear modern English and matches
    the outward movement from Zion.
- source_word: וּדְבַר יְהוָה
  chosen: and the word of the LORD
  alternatives:
  - and the message of the LORD
  lexicon: HALOT
  rationale: דבר is broadly 'word/matter/message.' 'Word of the LORD' is a well-established
    biblical phrase and accurately preserves the prophetic register.
- source_word: מִירוּשָׁלִָם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Straightforward source-to-target rendering; 'Jerusalem' is the standard
    English transliteration.
