id: ISA.2.11
reference: Isaiah 2:11
source:
  edition: WLC
  text: עֵינֵ֞י גַּבְה֤וּת אָדָם֙ שָׁפֵ֔ל וְ/שַׁ֖ח ר֣וּם אֲנָשִׁ֑ים וְ/נִשְׂגַּ֧ב
    יְהוָ֛ה לְ/בַדּ֖/וֹ בַּ/יּ֥וֹם הַ/הֽוּא׃ס
translation:
  text: The lofty eyes of man will be brought low, and the exalted height of men will
    be humbled; and the LORD alone will be exalted in that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The haughty eyes of man ... the loftiness of men.' The Hebrew imagery
      speaks of human pride expressed in elevated bearing.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי גַּבְהוּת אָדָם
  chosen: The lofty eyes of man
  alternatives:
  - The haughty eyes of man
  - The proud look of man
  lexicon: HALOT
  rationale: Literally 'eyes of the loftiness of man.' The idiom refers to proud or
    arrogant bearing expressed through the eyes. 'Lofty eyes' preserves the Hebrew
    imagery while remaining natural English. 'Man' is retained as gender-accurate
    singular/generic in line with the doctrine guidance for אָדָם.
- source_word: שָׁפֵל
  chosen: will be brought low
  alternatives:
  - will be humbled
  - shall be abased
  lexicon: HALOT
  rationale: The verb denotes being made low or humbled. 'Will be brought low' preserves
    the lowering imagery and fits the prophetic future sense in context.
- source_word: וְשַׁח
  chosen: will be humbled
  alternatives:
  - will be bowed down
  - will be brought low
  lexicon: HALOT
  rationale: This verb conveys being bowed down or humbled. Because the previous clause
    already uses 'brought low,' 'will be humbled' provides readable variation while
    preserving the semantic force.
- source_word: רוּם אֲנָשִׁים
  chosen: the exalted height of men
  alternatives:
  - the pride of men
  - the loftiness of men
  lexicon: HALOT
  rationale: רוּם here is a noun meaning height/exaltation/loftiness. 'Exalted height'
    keeps the elevated imagery and avoids collapsing the phrase too quickly into an
    abstract 'pride,' though that is the sense. 'Men' reflects the plural אֲנָשִׁים.
- source_word: וְנִשְׂגַּב
  chosen: will be exalted
  alternatives:
  - will be set on high
  - will be lifted up
  lexicon: HALOT
  rationale: The verb means to be high, inaccessible, exalted. 'Will be exalted' is
    the clearest idiomatic rendering and creates a deliberate contrast with humanity
    being brought low.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: 'The adverbial sense emphasizes exclusivity: the LORD, and no one else,
    will be exalted. ''Alone'' is concise and forceful.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic in English
    prophetic discourse and preserves the eschatological resonance.
