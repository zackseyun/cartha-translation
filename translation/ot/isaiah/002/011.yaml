theological_decisions:
- issue: Rendering of אָדָם / אֲנָשִׁים in a judgment oracle
  chosen_reading: man ... men
  alternative_readings:
  - humankind ... people
  rationale: The verse contrasts human pride in both singular/generic and plural forms
    with the exclusive exaltation of the LORD. Retaining 'man' and 'men' follows the
    gender-accurate policy and preserves the Hebrew rhetoric without implying only
    males are in view.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidance specifies 'the LORD' as the default rendering
    for YHWH, with alternatives not used in the main text unless context requires
    otherwise.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
