theological_decisions:
- issue: Rendering of אָדָם / אֲנָשִׁים in a judgment oracle
  chosen_reading: man ... men
  alternative_readings:
  - humankind ... people
  rationale: The verse contrasts human pride in both singular/generic and plural forms with the exclusive exaltation of the LORD. Retaining 'man' and 'men' follows the gender-accurate policy and preserves the Hebrew rhetoric without implying only males are in view.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
