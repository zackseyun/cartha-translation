id: ISA.2.13
reference: Isaiah 2:13
source:
  edition: WLC
  text: וְ/עַל֙ כָּל אַרְזֵ֣י הַ/לְּבָנ֔וֹן הָ/רָמִ֖ים וְ/הַ/נִּשָּׂאִ֑ים וְ/עַ֖ל
    כָּל אַלּוֹנֵ֥י הַ/בָּשָֽׁן־־׃
translation:
  text: and against all the cedars of Lebanon, lofty and lifted up, and against all
    the oaks of Bashan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'terebinths of Bashan.' The Hebrew term may refer to a large tree species
      identified either as oak or terebinth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and upon
  - even against
  lexicon: HALOT
  rationale: The repeated preposition עַל in this judgment list is best rendered 'against,'
    since the broader context (the day of the LORD coming upon the proud) indicates
    hostile visitation rather than mere spatial relation. The conjunction is retained
    as 'and' to preserve the list structure.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' fits the collective poetic catalog and is idiomatic with plural
    tree terms in English.'
- source_word: אַרְזֵי הַלְּבָנוֹן
  chosen: the cedars of Lebanon
  alternatives:
  - the cedars in Lebanon
  lexicon: HALOT
  rationale: Construct phrase naming the famous cedars associated with Lebanon. 'Of
    Lebanon' is the standard and natural English rendering for the geographic association.
- source_word: הָרָמִים
  chosen: lofty
  alternatives:
  - high
  - tall
  - exalted
  lexicon: HALOT
  rationale: From רום, describing height. 'Lofty' captures both physical elevation
    and the verse's symbolic resonance with human pride, without over-interpreting
    the metaphor.
- source_word: וְהַנִּשָּׂאִים
  chosen: lifted up
  alternatives:
  - raised high
  - exalted
  lexicon: HALOT
  rationale: From נשׂא in the passive/participle sense. 'Lifted up' preserves the
    Hebrew imagery and echoes the pride theme in the surrounding passage. 'Exalted'
    is possible, but 'lifted up' stays closer to the lexical image while avoiding
    importing a purely honorific sense.
- source_word: אַלּוֹנֵי הַבָּשָׁן
  chosen: the oaks of Bashan
  alternatives:
  - the terebinths of Bashan
  lexicon: HALOT
  rationale: אַלּוֹן can denote oak or terebinth in some contexts. 'Oaks' is the most
    common and contextually fitting rendering here, especially in parallel with the
    majestic cedars of Lebanon. The lexical alternative is worth preserving in a footnote
    because the species identification is not absolutely certain.
