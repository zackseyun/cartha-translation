theological_decisions:
- issue: Symbolic force of the trees in the judgment oracle
  chosen_reading: Retain the literal tree imagery while allowing its metaphorical
    association with the proud to emerge from context.
  alternative_readings:
  - Translate explicitly as symbols of proud rulers or nations
  rationale: The immediate literary context uses elevated natural and human objects
    to depict what the LORD will humble. Rendering the trees literally preserves the
    poetry and avoids importing an interpretive gloss into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
