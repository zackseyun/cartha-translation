id: ISA.2.17
reference: Isaiah 2:17
source:
  edition: WLC
  text: וְ/שַׁח֙ גַּבְה֣וּת הָ/אָדָ֔ם וְ/שָׁפֵ֖ל ר֣וּם אֲנָשִׁ֑ים וְ/נִשְׂגַּ֧ב יְהוָ֛ה לְ/בַדּ֖/וֹ בַּ/יּ֥וֹם הַ/הֽוּא׃
translation:
  text: The loftiness of man will be brought low, and the exaltation of men will be humbled; and Yahweh alone will be exalted in that day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The haughtiness of man will be bowed down, and the pride of men will be brought low.' The Hebrew uses height imagery for human arrogance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁח
  chosen: will be brought low
  alternatives:
  - will be bowed down
  - will be abased
  lexicon: HALOT
  rationale: Qal perfect used in prophetic discourse with future force; passive-like English best matches the state resulting from being humbled. 'Brought low' is idiomatic and preserves the reversal imagery.
- source_word: גַּבְהוּת
  chosen: loftiness
  alternatives:
  - haughtiness
  - height
  lexicon: HALOT
  rationale: The noun denotes height/elevation and in context human pride. 'Loftiness' preserves the metaphor and links with the parallel 'exaltation' without over-interpreting as purely inward attitude.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle, singular adam here is representative/generic but intentionally singular in parallel with plural 'men' later. 'Man' preserves the Hebrew form and rhetorical contrast.
- source_word: וְשָׁפֵל
  chosen: will be humbled
  alternatives:
  - will be made low
  - will be abased
  lexicon: HALOT
  rationale: This verb parallels the previous clause and expresses lowering from an elevated state. 'Will be humbled' is natural English and fits the pride/human exaltation theme.
- source_word: רוּם
  chosen: exaltation
  alternatives:
  - pride
  - height
  lexicon: HALOT
  rationale: The noun literally conveys height/exaltedness. 'Exaltation' keeps the vertical metaphor and sets up the contrast with the LORD being truly exalted in the final clause.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - mortals
  lexicon: HALOT
  rationale: Plural of איש here refers to human beings in parallel with 'man.' 'Men' preserves the gendered/source form and the human contrast with the LORD; 'people' would flatten the parallelism.
- source_word: וְנִשְׂגַּב
  chosen: will be exalted
  alternatives:
  - will be lifted high
  - will be set on high
  lexicon: HALOT
  rationale: The Niphal conveys being set high/exalted. 'Will be exalted' is the clearest English equivalent and intentionally echoes the human 'exaltation' that is overturned.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְבַדּוֹ
  chosen: alone
  alternatives:
  - by himself
  - only
  lexicon: HALOT
  rationale: 'The adverbial sense stresses exclusivity: only the LORD remains exalted. ''Alone'' is concise and idiomatic.'
- source_word: בַּיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal phrase. 'In that day' is conventional and natural in English prophetic style.
