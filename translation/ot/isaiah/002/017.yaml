- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Anthropological terms הָאָדָם / אֲנָשִׁים
  chosen_reading: man ... men
  alternative_readings:
  - humankind ... people
  - humanity ... mortals
  rationale: The Hebrew uses a singular generic followed by a plural human term for rhetorical parallelism. Per the gender-accurate principle, the translation preserves the source's masculine/generic forms rather than neutralizing them.
