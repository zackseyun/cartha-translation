theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default rendering
    for YHWH. This also aligns with the elevated prophetic style of the passage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of divine פחד
  chosen_reading: terror of the LORD
  alternative_readings:
  - dread of the LORD
  - fear of the LORD
  rationale: In this judgment context, the phrase refers to the terrifying manifestation
    of the LORD rather than the positive covenantal concept 'fear of the LORD' meaning
    reverence. The translation preserves the severity of the scene without importing
    a technical theological phrase from wisdom literature.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
