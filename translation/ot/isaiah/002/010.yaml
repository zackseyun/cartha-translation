id: ISA.2.10
reference: Isaiah 2:10
source:
  edition: WLC
  text: בּ֣וֹא בַ/צּ֔וּר וְ/הִטָּמֵ֖ן בֶּֽ/עָפָ֑ר מִ/פְּנֵי֙ פַּ֣חַד יְהוָ֔ה וּ/מֵ/הֲדַ֖ר
    גְּאֹנֽ/וֹ׃
translation:
  text: Enter the rock and hide yourself in the dust from before the terror of the
    LORD and from the splendor of his majesty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the dread of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from before,' expressing flight from the presence of the LORD.
    reason: lexical_alternative
  - marker: c
    text: Or 'and from the majesty of his splendor.' The Hebrew pairs two near-synonyms
      for overwhelming royal glory.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹא
  chosen: Enter
  alternatives:
  - Go in
  - Come
  - Come in
  lexicon: HALOT
  rationale: Imperative 2ms of בוא. In context with the following prepositional phrase
    'into the rock,' 'Enter' is idiomatic and preserves the force of a direct command
    better than the less natural 'Come into' in English.
- source_word: בַצּוּר
  chosen: the rock
  alternatives:
  - the crag
  - the cliff
  - the stone
  lexicon: HALOT
  rationale: צוּר commonly denotes a rock, cliff, or crag. 'The rock' is the most
    natural and sufficiently concrete rendering here, matching the imagery of seeking
    refuge in rocky shelter.
- source_word: וְהִטָּמֵן
  chosen: and hide yourself
  alternatives:
  - and conceal yourself
  - and be hidden
  lexicon: HALOT
  rationale: Niphal imperative/reflexive sense from טמן. 'Hide yourself' captures
    the middle/reflexive force in clear English better than the more wooden 'be hidden.'
- source_word: בֶּעָפָר
  chosen: in the dust
  alternatives:
  - in the dirt
  - in the soil
  lexicon: HALOT
  rationale: עָפָר is regularly 'dust,' a common biblical image of abasement, burial,
    and earthiness. 'Dust' preserves the literary and theological resonance.
- source_word: מִפְּנֵי
  chosen: from before
  alternatives:
  - from
  - because of
  - away from the presence of
  lexicon: HALOT
  rationale: Literally 'from before/from the face of.' Rendering 'from before' preserves
    the spatial and presence-oriented nuance, not merely causation. It also fits the
    repeated phrase in this context.
- source_word: פַּחַד יְהוָה
  chosen: the terror of the LORD
  alternatives:
  - the dread of the LORD
  - the fear of the LORD
  lexicon: HALOT
  rationale: פַּחַד here denotes dread/terror rather than reverential fear. 'The terror
    of the LORD' best conveys the context of divine judgment. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project's contested-terms policy specifies 'the LORD' as the default
    rendering for the divine name, following Jewish reverence tradition and the Septuagintal
    pattern.
- source_word: וּמֵהֲדַר
  chosen: and from the splendor of
  alternatives:
  - and from the majesty of
  - and from the glory of
  lexicon: HALOT
  rationale: הָדָר denotes splendor, majesty, or adornment. Because גְּאוֹנוֹ follows,
    rendering this term as 'splendor' helps preserve distinction between the two paired
    nouns rather than repeating 'majesty' twice.
- source_word: גְּאֹנוֹ
  chosen: his majesty
  alternatives:
  - his exaltation
  - his grandeur
  - his pride
  lexicon: HALOT
  rationale: גָּאוֹן can denote exaltation, majesty, or pride depending on context.
    Here, in reference to the LORD's overwhelming self-exaltation in judgment, 'his
    majesty' is the most fitting and reverent contextual rendering.
