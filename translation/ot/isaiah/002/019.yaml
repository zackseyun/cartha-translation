id: ISA.2.19
reference: Isaiah 2:19
source:
  edition: WLC
  text: וּ/בָ֨אוּ֙ בִּ/מְעָר֣וֹת צֻרִ֔ים וּ/בִ/מְחִלּ֖וֹת עָפָ֑ר מִ/פְּנֵ֞י פַּ֤חַד יְהוָה֙ וּ/מֵ/הֲדַ֣ר גְּאוֹנ֔/וֹ בְּ/קוּמ֖/וֹ לַ/עֲרֹ֥ץ הָ/אָֽרֶץ׃
translation:
  text: And they will enter the caves of the rocks and the holes of the dust from before the terror of Yahweh and from the splendor of his majesty, when he rises to terrify the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holes of the ground' or 'the burrows in the dust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: And they will enter
  alternatives:
  - and they will come
  - and they will go
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context functions futuristically/sequentially. 'Enter' fits the following בְּ phrases indicating movement into hiding places better than the more generic 'come' or 'go'.
- source_word: בִּמְעָרוֹת צֻרִים
  chosen: the caves of the rocks
  alternatives:
  - into rocky caves
  - the caves in the rocks
  lexicon: HALOT
  rationale: מְעָרוֹת are caves; צֻרִים is plural 'rocks/crags.' The construct-like sense is preserved with 'caves of the rocks,' while remaining natural English.
- source_word: וּבִמְחִלּוֹת עָפָר
  chosen: and the holes of the dust
  alternatives:
  - and the holes of the ground
  - and the burrows in the dust
  - and the caves of the dust
  lexicon: HALOT
  rationale: מְחִלּוֹת denotes holes, burrows, or subterranean hiding places. עָפָר is literally 'dust,' not the more general 'earth/ground.' 'Holes of the dust' keeps the concrete imagery and parallelism with the previous phrase, though an alternative is worth preserving in a footnote for readability.
- source_word: מִפְּנֵי
  chosen: from before
  alternatives:
  - from
  - because of
  - away from
  lexicon: HALOT
  rationale: Literally 'from before/from the presence of.' Here it expresses fleeing from the terrifying presence of the LORD. 'From before' preserves the Hebrew idiom more transparently than a flattened causal rendering.
- source_word: פַּחַד יְהוָה
  chosen: the terror of the LORD
  alternatives:
  - the dread of the LORD
  - the fear of the LORD
  lexicon: HALOT
  rationale: פַּחַד here refers to the terror inspired by YHWH's judgment, not reverential fear. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: וּמֵהֲדַר גְּאֹנוֹ
  chosen: and from the splendor of his majesty
  alternatives:
  - and from the majesty of his exaltation
  - and from the glory of his majesty
  lexicon: HALOT
  rationale: הָדָר conveys splendor/majesty; גָּאוֹן can denote exaltation, majesty, or pride depending on context. In reference to the LORD, 'his majesty' is appropriate and idiomatic. 'Splendor of his majesty' preserves the twofold grandeur language without redundancy collapse.
- source_word: בְּקוּמוֹ
  chosen: when he rises
  alternatives:
  - in his rising
  - when he stands up
  lexicon: HALOT
  rationale: 'Infinitive construct with preposition marks temporal circumstance: ''when he rises.'' This is smoother than the more wooden ''in his rising'' while preserving the temporal force.'
- source_word: לַעֲרֹץ
  chosen: to terrify
  alternatives:
  - to make tremble
  - to strike with terror
  - to shatter
  lexicon: HALOT
  rationale: The verb carries the sense of causing dread/terror. 'To terrify' best matches the immediate context of people hiding from divine judgment.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic judgment context, 'the earth' is preferable to the more localized 'land.'
