theological_decisions:
- issue: Whether the topographical terms should be rendered in a way that foregrounds
    metaphorical human pride or remain literal within the judgment catalogue
  chosen_reading: Retain literal landscape language ('high mountains' / 'lifted-up
    hills') while allowing the broader context to supply any symbolic resonance.
  alternative_readings:
  - Render more interpretively as 'lofty mountains' and 'exalted hills' to stress
    pride imagery
  rationale: Isaiah 2 uses elevated objects in a broader oracle against human loftiness,
    but this verse itself lists concrete high places alongside other prominent objects.
    A literal rendering preserves the text's imagery without importing an interpretive
    conclusion into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
