id: ISA.2.14
reference: Isaiah 2:14
source:
  edition: WLC
  text: וְ/עַ֖ל כָּל הֶ/הָרִ֣ים הָ/רָמִ֑ים וְ/עַ֖ל כָּל הַ/גְּבָע֥וֹת הַ/נִּשָּׂאֽוֹת־־׃
translation:
  text: and against all the high mountains, and against all the lifted-up hills.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lofty mountains' and 'exalted hills.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and upon
  - and on
  lexicon: HALOT
  rationale: In this judgment list, עַל with repeated parallel objects carries the
    sense of coming against or targeting, not merely spatial 'upon.' 'And against'
    best fits the sequence from the previous verse and preserves the prophetic force.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' is the natural distributive rendering in this poetic catalog
    and matches the repeated Hebrew construction.'
- source_word: הֶהָרִים
  chosen: mountains
  alternatives:
  - hills
  lexicon: HALOT
  rationale: הָרִים refers specifically to mountains; keeping 'mountains' preserves
    the distinction from the following גְּבָעוֹת, 'hills.'
- source_word: הָרָמִים
  chosen: high
  alternatives:
  - lofty
  - exalted
  lexicon: HALOT
  rationale: From רום, the participial adjective denotes height/elevation. 'High'
    is idiomatic with 'mountains' and avoids overloading the line with the more metaphorically
    charged 'exalted,' which is better reserved for contexts explicitly about pride.
- source_word: הַגְּבָעוֹת
  chosen: hills
  alternatives:
  - hill-country
  lexicon: HALOT
  rationale: גְּבָעוֹת contrasts naturally with mountains as smaller elevations; 'hills'
    is the standard and clear rendering.
- source_word: הַנִּשָּׂאוֹת
  chosen: lifted-up
  alternatives:
  - raised up
  - lofty
  - exalted
  lexicon: HALOT
  rationale: From נשׂא, the passive participial form means 'lifted up' or 'raised.'
    'Lifted-up' preserves the verbal imagery and the thematic connection in the chapter
    to what is elevated and brought low.
