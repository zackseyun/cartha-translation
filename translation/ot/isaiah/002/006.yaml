id: ISA.2.6
reference: Isaiah 2:6
source:
  edition: WLC
  text: כִּ֣י נָטַ֗שְׁתָּה עַמְּ/ךָ֙ בֵּ֣ית יַעֲקֹ֔ב כִּ֤י מָלְאוּ֙ מִ/קֶּ֔דֶם וְ/עֹֽנְנִ֖ים
    כַּ/פְּלִשְׁתִּ֑ים וּ/בְ/יַלְדֵ֥י נָכְרִ֖ים יַשְׂפִּֽיקוּ׃
translation:
  text: For you have forsaken your people, the house of Jacob, because they are full
    of eastern ways, and they practice divination like the Philistines, and they clasp
    hands with the children of foreigners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally 'from the east'; the phrase likely refers to eastern influences
      or practices rather than merely geographic origin.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are soothsayers like the Philistines.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb is rare and uncertain; it may mean 'they strike hands with,'
      'they make agreements with,' or more generally 'they join with' the children
      of foreigners.
    reason: alternative_reading
lexical_decisions:
- source_word: נָטַשְׁתָּה
  chosen: have forsaken
  alternatives:
  - have abandoned
  - have rejected
  lexicon: HALOT
  rationale: The verb נטשׁ commonly means to leave, forsake, or abandon. 'Have forsaken'
    is a natural English rendering that preserves the covenantal/judicial force of
    the accusation addressed to God.
- source_word: עַמְּךָ בֵּית יַעֲקֹב
  chosen: your people, the house of Jacob
  alternatives:
  - your people, the house of Israel
  lexicon: HALOT
  rationale: 'The appositional structure is preserved: ''your people'' is further
    identified as ''the house of Jacob.'' ''Jacob'' should be retained rather than
    replaced with ''Israel'' because the Hebrew text explicitly says יעקב.'
- source_word: מָלְאוּ
  chosen: they are full of
  alternatives:
  - they are filled with
  - they have become full of
  lexicon: HALOT
  rationale: Although formally a perfect plural, in English the stative/resultative
    sense is best conveyed by 'they are full of.' This reads naturally while preserving
    the idea of being characterized by what follows.
- source_word: מִקֶּדֶם
  chosen: eastern ways
  alternatives:
  - from the east
  - eastern influences
  lexicon: HALOT
  rationale: The phrase is elliptical. Literally it is 'from the east,' but in context
    it refers to imported eastern practices or influences. 'Eastern ways' makes the
    implied sense explicit without over-paraphrasing.
- source_word: עֹנְנִים
  chosen: practice divination
  alternatives:
  - are soothsayers
  - practice soothsaying
  lexicon: HALOT
  rationale: The participle from ענן refers to divination/soothsaying. Rendering it
    verbally in English avoids awkwardness and communicates the prohibited occult
    practice clearly.
- source_word: כַּפְּלִשְׁתִּים
  chosen: like the Philistines
  alternatives:
  - as the Philistines do
  lexicon: HALOT
  rationale: The comparative כ is straightforward. 'Like the Philistines' preserves
    the comparison and keeps the line concise.
- source_word: וּבְיַלְדֵי נָכְרִים
  chosen: with the children of foreigners
  alternatives:
  - with foreign children
  - with foreigners' children
  - with sons of foreigners
  lexicon: HALOT
  rationale: ילדי is literally 'children/sons of,' and נכרים means foreigners/strangers.
    'Children of foreigners' is formally close and avoids prematurely narrowing the
    phrase to males only, since the Hebrew plural can be broader in sense here.
- source_word: יַשְׂפִּיקוּ
  chosen: they clasp hands with
  alternatives:
  - they strike hands with
  - they make agreements with
  - they join with
  lexicon: HALOT
  rationale: This rare Hiphil likely carries the sense of striking/clasping hands
    in alliance or fellowship. 'Clasp hands with' is idiomatic modern English that
    preserves the image of joining or making common cause. Because the verb is difficult
    and debated, alternatives are preserved in a footnote.
