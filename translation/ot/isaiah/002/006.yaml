theological_decisions:
- issue: Interpretation of Judah's compromise with foreign peoples and practices
  chosen_reading: The verse indicts the people for adopting eastern divinatory practices
    and entering into compromising association/alliance with foreigners.
  alternative_readings:
  - The final clause may refer more specifically to making pacts/contracts with foreigners.
  - The phrase 'from the east' may denote people from the east rather than eastern
    customs.
  rationale: The verse is a prophetic denunciation of syncretism and foreign entanglement,
    not a blanket ethnic condemnation. The wording should reflect moral-religious
    compromise rather than import xenophobic claims not demanded by the text. The
    rare final verb and the elliptical 'from the east' both require interpretive restraint,
    so alternatives are preserved in footnotes.
  doctrine_reference: Translation philosophy §§1, 3, 6
