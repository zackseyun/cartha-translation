theological_decisions:
- issue: Eschatological phrasing of בְּאַחֲרִית הַיָּמִים
  chosen_reading: in the latter days
  alternative_readings:
  - in the last days
  - in days to come
  rationale: The Hebrew phrase is retained in a relatively formal way to preserve prophetic and potentially eschatological breadth without forcing a specific end-times schema. This aligns with the instruction to preserve theological tension rather than resolve it beyond what the text states.
  doctrine_reference: Translation philosophy §3
- issue: Sense of the mountain's exaltation
  chosen_reading: the mountain of the house of the LORD shall be established as the highest of the mountains
  alternative_readings:
  - shall be established on the top of the mountains
  rationale: The Hebrew can be read as spatially located 'on the top' or as preeminent 'as the highest/chief.' Given the parallel 'lifted up above the hills,' the translation favors prominence/exaltation while avoiding a speculative literal topographical claim. The spatially closer alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
