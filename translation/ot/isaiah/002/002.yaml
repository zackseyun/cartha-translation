id: ISA.2.2
reference: Isaiah 2:2
source:
  edition: WLC
  text: וְ/הָיָ֣ה בְּ/אַחֲרִ֣ית הַ/יָּמִ֗ים נָכ֨וֹן יִֽהְיֶ֜ה הַ֤ר בֵּית יְהוָה֙ בְּ/רֹ֣אשׁ הֶ/הָרִ֔ים וְ/נִשָּׂ֖א מִ/גְּבָע֑וֹת וְ/נָהֲר֥וּ אֵלָ֖י/ו כָּל הַ/גּוֹיִֽם׀־־׃
translation:
  text: And in the latter days the mountain of the house of Yahweh shall be established as the highest of the mountains, and shall be lifted up above the hills; and all the nations shall stream to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in the last days' or 'in days to come.'
    reason: alternative_reading
  - marker: b
    text: Or, 'the mountain of the house of the LORD shall be established on the top of the mountains.'
    reason: alternative_reading
  - marker: c
    text: The Hebrew verb pictures the nations 'flowing' like a river toward it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... shall be
  alternatives:
  - And it shall come to pass
  - And it will happen
  lexicon: HALOT
  rationale: Introduces a future prophetic scene. Rendered with simple future English rather than the more archaic 'it shall come to pass' to preserve readability while retaining the forward-looking force.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in the last days
  - in days to come
  lexicon: HALOT
  rationale: A standard prophetic temporal expression. 'Latter days' preserves the Hebrew idiom with minimal interpretation; 'last days' is possible but can import later eschatological associations more strongly than the Hebrew alone requires.
- source_word: נָכוֹן יִהְיֶה
  chosen: shall be established
  alternatives:
  - shall stand firm
  - shall be set firmly
  lexicon: HALOT
  rationale: The participial/adjectival form with היה conveys firmness, stability, and secure establishment. 'Established' is idiomatic and captures the sense of being firmly fixed.
- source_word: הַר בֵּית יְהוָה
  chosen: the mountain of the house of the LORD
  alternatives:
  - the mountain of the LORD's house
  lexicon: HALOT
  rationale: Represents the construct chain transparently. This wording preserves both 'mountain' and 'house' explicitly and keeps the covenant name rendered per doctrine as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּרֹאשׁ הֶהָרִים
  chosen: as the highest of the mountains
  alternatives:
  - at the head of the mountains
  - on the top of the mountains
  lexicon: HALOT
  rationale: The phrase can denote position or supremacy. In context, with the following parallel 'lifted up above the hills,' it conveys exalted prominence. 'As the highest of the mountains' communicates that sense in natural English.
- source_word: וְנִשָּׂא מִגְּבָעוֹת
  chosen: and shall be lifted up above the hills
  alternatives:
  - and shall be raised above the hills
  - and shall be exalted above the hills
  lexicon: HALOT
  rationale: The passive participial form expresses elevation/exaltation. 'Lifted up above' preserves the imagery and the comparative force of מן.
- source_word: גְּבָעוֹת
  chosen: hills
  alternatives:
  - high places
  lexicon: HALOT
  rationale: The ordinary topographical sense fits the mountain/hills parallelism.
- source_word: וְנָהֲרוּ
  chosen: shall stream
  alternatives:
  - shall flow
  - shall flock
  lexicon: HALOT
  rationale: The verb literally evokes flowing like a river, strikingly applied to peoples moving toward Zion. 'Stream' preserves the metaphor in idiomatic English better than the more literal but potentially awkward 'flow'.
- source_word: אֵלָיו
  chosen: to it
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The pronoun is grammatically masculine singular and refers back to the mountain/house complex, not a person. English 'it' makes the referent clear.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - all the Gentiles
  lexicon: HALOT
  rationale: גוים here denotes the nations broadly, especially in contrast to Israel/Zion in prophetic context. 'Nations' is the most natural and contextually appropriate rendering; 'Gentiles' would be too interpretive here.
