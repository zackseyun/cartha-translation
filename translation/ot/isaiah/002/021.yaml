id: ISA.2.21
reference: Isaiah 2:21
source:
  edition: WLC
  text: לָ/בוֹא֙ בְּ/נִקְר֣וֹת הַ/צֻּרִ֔ים וּ/בִ/סְעִפֵ֖י הַ/סְּלָעִ֑ים מִ/פְּנֵ֞י פַּ֤חַד יְהוָה֙ וּ/מֵ/הֲדַ֣ר גְּאוֹנ֔/וֹ בְּ/קוּמ֖/וֹ לַ/עֲרֹ֥ץ הָ/אָֽרֶץ׃
translation:
  text: to enter the caverns of the rocks and the clefts of the crags, from before the terror of Yahweh and from the splendor of his majesty, when he rises to terrify the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'holes of the rocks and fissures of the crags.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when he arises to make the earth tremble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָבוֹא
  chosen: to enter
  alternatives:
  - to go in
  - to come
  lexicon: HALOT
  rationale: 'Infinitive construct of בוא with prefixed ל, continuing the sense from the previous verse: people cast away idols in order to enter/hide in rocky places. ''Enter'' is idiomatic and fits the movement into hiding places better than the more wooden ''come.'''
- source_word: נִקְרוֹת
  chosen: caverns
  alternatives:
  - holes
  - cavities
  - clefts
  lexicon: HALOT
  rationale: Refers to hollowed-out places in rock. 'Caverns' conveys natural rocky hollows suitable for hiding, while avoiding the overly plain 'holes.'
- source_word: הַצֻּרִים
  chosen: the rocks
  alternatives:
  - the cliffs
  - the rocky crags
  lexicon: HALOT
  rationale: צוּר commonly denotes rock/rocky mass. 'Rocks' is the most direct rendering here and pairs naturally with 'caverns.'
- source_word: סְעִפֵי
  chosen: clefts
  alternatives:
  - fissures
  - branches
  - splits
  lexicon: HALOT
  rationale: In this geological context the noun denotes splits or clefts in rock formations. 'Clefts' is natural English and preserves the imagery of fractured stone refuges.
- source_word: הַסְּלָעִים
  chosen: the crags
  alternatives:
  - the cliffs
  - the rocks
  lexicon: HALOT
  rationale: סֶלַע often refers to craggy rock or cliff-like formations. 'Crags' gives a more specific nuance than simply repeating 'rocks,' preserving the parallelism with a slight distinction.
- source_word: מִפְּנֵי
  chosen: from before
  alternatives:
  - from
  - because of
  - away from
  lexicon: HALOT
  rationale: Literally 'from before the face/presence of.' Rendering 'from before' preserves the Hebrew sense of fleeing from the presence of the LORD, though in English it also communicates causal force.
- source_word: פַּחַד
  chosen: terror
  alternatives:
  - fear
  - dread
  lexicon: HALOT
  rationale: The noun denotes dread-inspiring terror rather than subjective fear alone. 'Terror' best matches the overwhelming divine judgment context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲדַר
  chosen: splendor
  alternatives:
  - majesty
  - glory
  lexicon: HALOT
  rationale: Denotes magnificence or splendor. 'Splendor' works well here, while 'majesty' is reserved for גְּאוֹנוֹ in the following phrase to preserve both terms.
- source_word: גְּאוֹנוֹ
  chosen: his majesty
  alternatives:
  - his exaltation
  - his grandeur
  - his pride
  lexicon: HALOT
  rationale: In reference to the LORD, the term carries the positive sense of exalted majesty or grandeur, not sinful pride. 'His majesty' is idiomatic and reverent.
- source_word: בְּקוּמוֹ
  chosen: when he rises
  alternatives:
  - in his rising
  - when he arises
  lexicon: HALOT
  rationale: 'Temporal use of the infinitive construct with preposition: ''when he rises/arises.'' This is smoother in English than a more literal nominal rendering.'
- source_word: לַעֲרֹץ
  chosen: to terrify
  alternatives:
  - to strike terror
  - to make tremble
  lexicon: HALOT
  rationale: The verb conveys causing dread or terror. 'To terrify' is concise and matches the repeated theme of divine dread in the verse.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic judgment context, 'the earth' is more likely than the narrower 'land.' It also matches the broader scope of Isaiah 2.
