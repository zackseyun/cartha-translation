id: ISA.2.7
reference: Isaiah 2:7
source:
  edition: WLC
  text: וַ/תִּמָּלֵ֤א אַרְצ/וֹ֙ כֶּ֣סֶף וְ/זָהָ֔ב וְ/אֵ֥ין קֵ֖צֶה לְ/אֹצְרֹתָ֑י/ו
    וַ/תִּמָּלֵ֤א אַרְצ/וֹ֙ סוּסִ֔ים וְ/אֵ֥ין קֵ֖צֶה לְ/מַרְכְּבֹתָֽי/ו׃
translation:
  text: His land is filled with silver and gold, and there is no end to his treasures;
    his land is filled with horses, and there is no end to his chariots.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew singular throughout: ''his land ... his treasures ... his chariots.''
      The singular likely refers collectively to the nation or people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'treasuries' or 'storehouses' for 'treasures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמָּלֵא
  chosen: is filled
  alternatives:
  - was filled
  - became full
  lexicon: HALOT
  rationale: 'From מלא, ''to be full/fill.'' Although the form is wayyiqtol, in this
    prophetic description English present works naturally in context with the surrounding
    denunciation: the land stands characterized as full. ''Is filled'' preserves the
    passive/resultative sense without awkwardness.'
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - their land
  - the land
  lexicon: HALOT
  rationale: Singular with 3ms suffix. In context Isaiah has shifted between collective
    singular and plural for the people/Jacob; here the Hebrew explicitly has singular
    suffix, so 'his land' is retained rather than smoothing to 'their land.'
- source_word: כֶּסֶף וְזָהָב
  chosen: silver and gold
  alternatives:
  - money and gold
  lexicon: HALOT
  rationale: Standard literal rendering of the paired terms for wealth/precious metals.
    'Money' would narrow כסף too much and lose the poetic parallel.
- source_word: וְאֵין קֵצֶה
  chosen: there is no end
  alternatives:
  - there is no limit
  - without end
  lexicon: HALOT
  rationale: Idiomatic rendering of the existential negative plus 'end/limit.' 'There
    is no end' is both natural English and close to the Hebrew expression.
- source_word: לְאֹצְרֹתָיו
  chosen: to his treasures
  alternatives:
  - to his storehouses
  - to his treasuries
  lexicon: HALOT
  rationale: אֹצָר can denote treasure, treasury, or storehouse. In this context,
    paired with silver and gold, the sense is accumulated wealth rather than buildings,
    so 'treasures' best conveys the meaning in readable English.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Direct rendering of the plural noun.
- source_word: לְמַרְכְּבֹתָיו
  chosen: to his chariots
  alternatives:
  - to his war chariots
  lexicon: HALOT
  rationale: Basic sense is 'chariots.' Since military force is implied by the horses/chariots
    pairing, some expansion is possible, but the Hebrew itself does not add a modifier,
    so the simpler 'chariots' is preferred.
