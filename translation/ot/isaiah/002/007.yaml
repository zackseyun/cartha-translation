theological_decisions:
- issue: Retention of singular possessive suffixes in a collective denunciation
  chosen_reading: his land ... his treasures ... his chariots
  alternative_readings:
  - their land ... their treasures ... their chariots
  rationale: The Hebrew repeatedly uses 3ms singular suffixes. This likely reflects
    a collective singular for the people/nation. Preserving the singular keeps closer
    to the source and avoids interpretive smoothing.
  doctrine_reference: Translation philosophy §1, §5
