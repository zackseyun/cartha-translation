theological_decisions:
- issue: Rendering of idolatrous action in השתחוה
  chosen_reading: they bow down
  alternative_readings:
  - they worship
  - they prostrate themselves
  rationale: The text condemns idolatry by describing the bodily act of obeisance
    before man-made objects. 'Bow down' preserves the concrete image and lets the
    theological indictment arise from the context, rather than importing a more abstract
    term where the Hebrew is more physical.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Collective singular versus plural smoothing
  chosen_reading: his land ... they bow down ... their hands ... their own fingers
  alternative_readings:
  - his land ... they bow down ... his hands ... his fingers
  - their land ... they bow down ... their hands ... their fingers
  rationale: The Hebrew uses a collective singular for the nation while also using
    a plural verb for the people's action. The translation preserves the singular
    in 'his land' to reflect the source, but uses plural possessives in the idol-making
    clause for intelligibility in modern English. This balances formal fidelity and
    readable English without changing the sense.
  doctrine_reference: Translation philosophy §5, §6
