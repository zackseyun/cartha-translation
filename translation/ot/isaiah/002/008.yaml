id: ISA.2.8
reference: Isaiah 2:8
source:
  edition: WLC
  text: וַ/תִּמָּלֵ֥א אַרְצ֖/וֹ אֱלִילִ֑ים לְ/מַעֲשֵׂ֤ה יָדָי/ו֙ יִֽשְׁתַּחֲו֔וּ לַ/אֲשֶׁ֥ר
    עָשׂ֖וּ אֶצְבְּעֹתָֽי/ו׃
translation:
  text: And his land is filled with idols; they bow down to the work of their hands,
    to what their own fingers have made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''his land''—a collective singular referring to the people/nation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּמָּלֵא
  chosen: is filled
  alternatives:
  - was filled
  - has been filled
  lexicon: HALOT
  rationale: From מלא in the Niphal, expressing a stative/passive sense. In this prophetic
    context, present English ('is filled') best conveys the vivid description of Judah's
    current condition in the oracle, rather than a simple past narrative.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - their land
  lexicon: HALOT
  rationale: Singular suffix 3ms is retained as 'his land.' In context this refers
    back to Jacob/Israel as a collective singular, so the formal singular should be
    preserved rather than smoothed to plural in the main text.
- source_word: אֱלִילִים
  chosen: idols
  alternatives:
  - worthless idols
  - images
  lexicon: HALOT
  rationale: אֱלִילִים commonly denotes idols, often with a pejorative nuance of worthlessness.
    'Idols' is the clear, standard English equivalent; the pejorative force is real
    but does not need expansion in the main text.
- source_word: לְמַעֲשֵׂה יָדָיו
  chosen: to the work of their hands
  alternatives:
  - before the work of their hands
  - to what their hands have made
  lexicon: HALOT
  rationale: The preposition with השתחוה marks the object of prostration. 'To the
    work of their hands' preserves the concrete Hebrew expression and the irony of
    worshiping human manufacture.
- source_word: יִשְׁתַּחֲווּ
  chosen: they bow down
  alternatives:
  - they prostrate themselves
  - they worship
  lexicon: HALOT
  rationale: The verb means to bow down/prostrate oneself, often in worship. 'Bow
    down' preserves the physical image while allowing the worship sense to remain
    implicit from context; 'worship' would be interpretive but possible.
- source_word: לַאֲשֶׁר עָשׂוּ אֶצְבְּעֹתָיו
  chosen: to what their own fingers have made
  alternatives:
  - to that which his fingers made
  - to what their fingers made
  lexicon: HALOT
  rationale: The Hebrew shifts from singular suffixes ('his land,' 'his hands,' 'his
    fingers') to plural verb ('they bow down'). In English, retaining singular body-part
    suffixes here would sound confusingly inconsistent. Rendering the collective sense
    as 'their own fingers' communicates the irony clearly while preserving the anthropogenic
    emphasis. 'Own' brings out the reflexive force implicit in the contrast.
- source_word: יָדָיו / אֶצְבְּעֹתָיו
  chosen: their hands ... their own fingers
  alternatives:
  - his hands ... his fingers
  lexicon: HALOT
  rationale: Although the suffixes are formally singular, they function with a collective
    singular antecedent. Because the clause has a plural verb ('they bow down'), idiomatic
    English benefits from shifting to plural possessives in the idol-making phrase
    to avoid awkwardness and to reflect the people collectively manufacturing their
    idols.
