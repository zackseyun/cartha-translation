theological_decisions:
- issue: Identity of the subject ('he will judge')
  chosen_reading: Retain the pronoun 'he' without specifying the referent in the verse
    itself.
  alternative_readings:
  - the LORD will judge
  - the mountain/teaching will judge indirectly
  rationale: The immediate context points back to the exalted Zion-centered vision
    in which the LORD is the ultimate acting subject, but the verse itself uses an
    unstated third masculine singular verb. The translation preserves the Hebrew's
    pronominal ambiguity rather than importing an explicit theological identification
    into the line.
  doctrine_reference: Preserve theological tension rather than resolve it.
