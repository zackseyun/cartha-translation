id: ISA.2.4
reference: Isaiah 2:4
source:
  edition: WLC
  text: וְ/שָׁפַט֙ בֵּ֣ין הַ/גּוֹיִ֔ם וְ/הוֹכִ֖יחַ לְ/עַמִּ֣ים רַבִּ֑ים וְ/כִתְּת֨וּ
    חַרְבוֹתָ֜/ם לְ/אִתִּ֗ים וַ/חֲנִיתֽוֹתֵי/הֶם֙ לְ/מַזְמֵר֔וֹת לֹא יִשָּׂ֨א ג֤וֹי
    אֶל גּוֹי֙ חֶ֔רֶב וְ/לֹא יִלְמְד֥וּ ע֖וֹד מִלְחָמָֽה־־־׃פ
translation:
  text: And he will judge between the nations and decide disputes for many peoples;
    and they will beat their swords into plowshares and their spears into pruning
    hooks. Nation will not lift up sword against nation, and they will not learn war
    anymore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rebuke many peoples' / 'arbitrate for many peoples.' The Hebrew verb
      can carry judicial or corrective force.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will no longer learn war.' The Hebrew is literally 'they will not
      learn war anymore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפַט
  chosen: he will judge
  alternatives:
  - he shall judge
  - he will govern
  lexicon: HALOT
  rationale: 'שׁפט commonly means to judge/govern. In this context with בֵּין (''between'')
    and parallel וְהוֹכִיחַ, the judicial sense is primary: he arbitrates among nations.'
- source_word: בֵּין הַגּוֹיִם
  chosen: between the nations
  alternatives:
  - among the nations
  lexicon: HALOT
  rationale: בֵּין naturally means 'between, among.' 'Between the nations' preserves
    the adjudicative setting and matches the parallelism.
- source_word: וְהוֹכִיחַ
  chosen: decide disputes
  alternatives:
  - rebuke
  - arbitrate
  - render decisions
  lexicon: HALOT
  rationale: יכח in the Hiphil can mean to decide, arbitrate, prove, or rebuke. Here,
    in parallel with judicial שׁפט and followed by international peace, 'decide disputes'
    best captures the forensic sense in idiomatic English.
- source_word: לְעַמִּים רַבִּים
  chosen: for many peoples
  alternatives:
  - for many nations
  - concerning many peoples
  lexicon: HALOT
  rationale: עַמִּים is 'peoples' rather than גּוֹיִם's 'nations'; preserving the
    distinction reflects the Hebrew parallelism. The preposition לְ here is well represented
    by 'for' in the sense of acting on behalf of / with respect to them.
- source_word: וְכִתְּתוּ
  chosen: they will beat
  alternatives:
  - they will hammer
  - they will forge
  lexicon: HALOT
  rationale: כתת means to crush/beat. In the context of refashioning weapons into
    tools, 'beat' is the established and accurate English equivalent.
- source_word: חַרְבוֹתָם
  chosen: their swords
  lexicon: HALOT
  rationale: חֶרֶב is literally 'sword'; no contextual reason to generalize to 'weapons.'
- source_word: לְאִתִּים
  chosen: into plowshares
  alternatives:
  - into plow blades
  lexicon: HALOT
  rationale: אִתִּים refers to agricultural implements, traditionally and accurately
    rendered 'plowshares.' The image is culturally recognizable and precise enough
    in English.
- source_word: וַחֲנִיתוֹתֵיהֶם
  chosen: and their spears
  lexicon: HALOT
  rationale: חֲנִיתוֹת are spears/lances; 'spears' is the natural modern rendering.
- source_word: לְמַזְמֵרוֹת
  chosen: into pruning hooks
  alternatives:
  - into pruning knives
  lexicon: HALOT
  rationale: מַזְמֵרוֹת denotes pruning implements. 'Pruning hooks' is the conventional
    rendering and fits the agricultural transformation image.
- source_word: לֹא יִשָּׂא גוֹי אֶל גּוֹי חֶרֶב
  chosen: Nation will not lift up sword against nation
  alternatives:
  - No nation will raise a sword against another nation
  lexicon: HALOT
  rationale: נשא חרב is an idiom for taking up or raising the sword in hostility.
    'Lift up sword against nation' preserves the Hebrew imagery while remaining clear.
- source_word: וְלֹא יִלְמְדוּ עוֹד מִלְחָמָה
  chosen: and they will not learn war anymore
  alternatives:
  - and they will no longer learn war
  - and they will not train for war anymore
  lexicon: HALOT
  rationale: למד מלחמה is literally 'learn war,' encompassing training for warfare.
    'Learn war anymore' keeps the Hebrew expression while sounding natural enough
    in modern English.
