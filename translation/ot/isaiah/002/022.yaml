id: ISA.2.22
reference: Isaiah 2:22
source:
  edition: WLC
  text: חִדְל֤וּ לָ/כֶם֙ מִן הָ֣/אָדָ֔ם אֲשֶׁ֥ר נְשָׁמָ֖ה בְּ/אַפּ֑/וֹ כִּֽי בַ/מֶּ֥ה
    נֶחְשָׁ֖ב הֽוּא־־׃פ
translation:
  text: Stop trusting in man, whose breath is in his nostrils; for what is he really
    worth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Stop trusting in humanity.' Hebrew 'man' (אָדָם) is a representative
      singular for human beings.
    reason: lexical_alternative
  - marker: b
    text: Literally 'whose breath is in his nose.' The expression emphasizes human
      frailty and dependence on God for life.
    reason: cultural_note
  - marker: c
    text: Or 'for of what account is he?'
    reason: alternative_reading
lexical_decisions:
- source_word: חִדְלוּ
  chosen: Stop
  alternatives:
  - Cease
  - Turn away
  lexicon: HALOT
  rationale: Imperative plural of חדל, calling for cessation. 'Stop' is concise modern
    English and fits the urgent prophetic command. The following prepositional phrase
    supplies the object of cessation.
- source_word: לָכֶם
  chosen: (implicit in 'Stop trusting')
  alternatives:
  - for yourselves
  - to yourselves
  lexicon: HALOT
  rationale: 'The dative pronoun is idiomatic with חדל and does not need a separate
    English word. Its force is absorbed into the imperative addressed to the audience:
    ''Stop ...'' rather than a wooden ''cease for yourselves.'''
- source_word: מִן הָאָדָם
  chosen: in man
  alternatives:
  - from man
  - from humankind
  - from humanity
  lexicon: HALOT
  rationale: With חדל, מן marks what one is to desist from. In English, the sense
    here is not merely spatial separation but ceasing reliance on human beings, so
    'stop trusting in man' best conveys the idiom. 'Man' follows the doctrine's gender-accurate
    guidance for אָדָם where representative humanity is in view.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  - the human being
  lexicon: HALOT
  rationale: אָ דָם here is collective/representative, contrasting frail humanity
    with God. 'Man' preserves the Hebrew's generic masculine force per translation
    policy, while still being understandable in modern English.
- source_word: אֲשֶׁר נְשָׁמָה בְּאַפּוֹ
  chosen: whose breath is in his nostrils
  alternatives:
  - who has breath in his nose
  - whose life-breath is in his nostrils
  lexicon: HALOT
  rationale: נשמה denotes breath/life-breath, and אף literally means nose/nostril(s),
    often in the dual but here with singular form plus suffix. 'Nostrils' is idiomatic
    English and preserves the image of fragile, contingent life.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the imperative. 'For' is natural in English
    prophetic discourse.
- source_word: בַּמֶּה
  chosen: what ... really worth
  alternatives:
  - in what
  - of what account
  lexicon: HALOT
  rationale: The interrogative with beth asks about value or status. Rendering it
    with 'what ... worth' communicates the evaluative sense clearly in modern English.
- source_word: נֶחְשָׁב
  chosen: is ... worth
  alternatives:
  - is accounted
  - is esteemed
  - is considered
  lexicon: HALOT
  rationale: 'Passive of חשב, ''to reckon/account.'' In this context the idiomatic
    English equivalent is valuation: ''what is he worth?'' rather than the stiffer
    ''in what is he accounted?''.'
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  - such a one
  lexicon: HALOT
  rationale: Retained as singular masculine to match the representative singular 'man'
    in the Hebrew.
