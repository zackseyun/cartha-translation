theological_decisions:
- issue: Sense of the command חִדְלוּ ... מִן הָאָדָם
  chosen_reading: A prohibition against relying on mere human beings
  alternative_readings:
  - A command simply to leave men alone
  - A call to cease from humanity in a more abstract sense
  rationale: The immediate context contrasts human pride and frailty with the Lord's
    exaltation. The idiom is best understood as ceasing dependence on man rather than
    mere social withdrawal. This preserves the prophetic theological point without
    over-paraphrasing.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Rendering of אָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew uses a grammatically masculine singular with representative
    force. Per the doctrine's gender-accurate policy, 'man' is preferred in the main
    text, while a footnote can clarify the collective sense for modern readers.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
