id: ISA.38.16
reference: Isaiah 38:16
source:
  edition: WLC
  text: אֲדֹנָ֖/י עֲלֵי/הֶ֣ם יִֽחְי֑וּ וּ/לְ/כָל בָּ/הֶן֙ חַיֵּ֣י רוּחִ֔/י וְ/תַחֲלִימֵ֖/נִי
    וְ/הַחֲיֵֽ/נִי־׃
translation:
  text: Lord, by these things men live, and in all these is the life of my spirit;
    so restore me to health and let me live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they live' or 'one lives'; the Hebrew verb has no explicit subject.
    reason: lexical_alternative
  - marker: b
    text: Or 'heal me.' The verb can denote making someone well or restoring health.
    reason: lexical_alternative
  - marker: c
    text: Or 'revive me' or 'preserve my life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - My Lord
  lexicon: HALOT
  rationale: Rendered as the divine title 'Lord.' Although the form can mean 'my Lord,'
    in prayer address to God English idiom normally uses 'Lord.' This also aligns
    with the project's default rendering of divine/covenantal lordship titles as 'Lord'
    rather than a more literal but less natural possessive form.
- source_word: עֲלֵיהֶם
  chosen: by these things
  alternatives:
  - because of them
  - on account of them
  - concerning them
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here is idiomatic and difficult.
    In context it points back to the realities just mentioned as the means or sphere
    by which life is sustained. 'By these things' best captures the instrumental/sustaining
    sense in readable English.
- source_word: יִחְיוּ
  chosen: men live
  alternatives:
  - they live
  - one lives
  lexicon: HALOT
  rationale: The Hebrew verb is 3mp with no explicit subject. English supplies a generic
    subject. 'Men live' preserves the masculine/generic force more closely than an
    abstract impersonal rendering, in keeping with the project's gender-accurate policy.
    The sense is general humanity, not a specific group.
- source_word: וּלְכָל בָּהֶן
  chosen: and in all these
  alternatives:
  - and wholly in them
  - and in all of them
  lexicon: HALOT
  rationale: Taken together as an idiomatic phrase referring comprehensively to the
    preceding 'these things.' 'In all these' is natural English and preserves the
    locative/sphere nuance.
- source_word: חַיֵּי רוּחִי
  chosen: the life of my spirit
  alternatives:
  - my spirit's life
  - the life of my breath
  lexicon: HALOT
  rationale: רוּחַ can mean 'spirit,' 'breath,' or 'wind.' Here, in a prayer about
    recovery and continued existence, 'spirit' best conveys the inner life/vitality
    of the speaker without reducing the phrase to mere respiration. The construct
    chain is preserved as 'the life of my spirit.'
- source_word: וְתַחֲלִימֵנִי
  chosen: so restore me to health
  alternatives:
  - and make me healthy
  - and heal me
  lexicon: HALOT
  rationale: From חלה in the Hiphil, here in context of recovery from illness. 'Restore
    me to health' expresses the causative nuance clearly and idiomatically. 'Heal
    me' is possible but slightly less explicit about the restoration sense.
- source_word: וְהַחֲיֵנִי
  chosen: and let me live
  alternatives:
  - and revive me
  - and preserve my life
  lexicon: HALOT
  rationale: Hiphil of חיה means to cause to live, keep alive, or revive. 'Let me
    live' fits the prayerful appeal and avoids over-specifying either resurrection-like
    revival or mere preservation, while still reflecting the causative sense in natural
    English.
