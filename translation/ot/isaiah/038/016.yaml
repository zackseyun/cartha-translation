theological_decisions:
- issue: Generic human subject implied by the 3mp verb יִחְיוּ
  chosen_reading: Rendered generically as 'men live'
  alternative_readings:
  - '''they live'''
  - '''one lives'''
  - '''people live'''
  rationale: The Hebrew leaves the subject implicit and masculine plural. 'Men live'
    preserves the source's grammatical form and generic force more directly than a
    neutral paraphrase, consistent with the project's gender-accurate policy, while
    not making a doctrinal claim beyond the text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
