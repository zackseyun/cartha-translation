id: ISA.38.13
reference: Isaiah 38:13
source:
  edition: WLC
  text: שִׁוִּ֤יתִי עַד בֹּ֨קֶר֙ כָּֽ/אֲרִ֔י כֵּ֥ן יְשַׁבֵּ֖ר כָּל עַצְמוֹתָ֑/י מִ/יּ֥וֹם
    עַד לַ֖יְלָה תַּשְׁלִימֵֽ/נִי־־־׃
translation:
  text: I waited until morning; like a lion, so he breaks all my bones. From day to
    night you bring me to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I composed myself until morning.' The opening verb is difficult, and
      some understand it as self-composure rather than waiting.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from 'he breaks' to 'you bring me to an end,' a poetic
      change in address preserved in the translation.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁוִּיתִי
  chosen: I waited
  alternatives:
  - I composed myself
  - I cried for help
  - I set before me
  lexicon: HALOT
  rationale: The form from שוה/שׁוה here is difficult and context-sensitive. In Hezekiah's
    lament, the sense is best taken as enduring or waiting through the night until
    morning. 'I waited' fits the temporal phrase עַד בֹּקֶר and the flow of distress
    better than more literal but less clear options such as 'I composed myself.'
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until dawn
  lexicon: HALOT
  rationale: Straightforward temporal expression; 'morning' is the most natural modern
    English rendering.
- source_word: כָּאֲרִי
  chosen: like a lion
  alternatives:
  - as a lion
  lexicon: HALOT
  rationale: The prefixed כ plus אֲרִי yields a simile. The lion imagery conveys violent
    crushing. This is retained directly rather than paraphrased.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'Marks the comparison''s result: ''like a lion, so he breaks...'' ''So''
    is concise and natural.'
- source_word: יְשַׁבֵּר
  chosen: he breaks
  alternatives:
  - he crushes
  - he shatters
  lexicon: HALOT
  rationale: Piel of שבר commonly conveys breaking or shattering. 'Breaks' is vivid
    and idiomatic with 'bones,' while preserving the concrete violence of the image.
- source_word: כָּל עַצְמוֹתַי
  chosen: all my bones
  lexicon: HALOT
  rationale: Literal rendering preserves the bodily imagery of extreme suffering.
- source_word: מִיּוֹם עַד לַיְלָה
  chosen: From day to night
  alternatives:
  - From morning to night
  - In a single day
  lexicon: HALOT
  rationale: The Hebrew is literally 'from day until night.' This likely expresses
    the span of a day rather than a technical contrast of daylight versus darkness.
    The literal phrasing is retained.
- source_word: תַּשְׁלִימֵנִי
  chosen: you bring me to an end
  alternatives:
  - you finish me off
  - you make an end of me
  - you restore me
  lexicon: HALOT
  rationale: 'Hiphil of שלם here does not mean ''make peace'' or ''restore'' in context,
    but ''complete'' in the sense of bringing to completion/end. Because the addressee
    is second masculine singular, the line shifts to direct address to God: ''you
    bring me to an end.'' This preserves the lament''s intensity without colloquial
    overstatement.'
