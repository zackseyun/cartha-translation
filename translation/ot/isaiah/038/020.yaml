id: ISA.38.20
reference: Isaiah 38:20
source:
  edition: WLC
  text: יְהוָ֖ה לְ/הוֹשִׁיעֵ֑/נִי וּ/נְגִנוֹתַ֧י נְנַגֵּ֛ן כָּל יְמֵ֥י חַיֵּ֖י/נוּ עַל בֵּ֥ית יְהוָֽה־־׃
translation:
  text: Yahweh is ready to save me; and we will play my songs on stringed instruments all the days of our lives at the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD will save me,' or more literally, 'The LORD to save me.' The Hebrew expression is elliptical.
    reason: lexical_alternative
  - marker: b
    text: Or, 'my music' or 'my string-music.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'in the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהוֹשִׁיעֵנִי
  chosen: is ready to save me
  alternatives:
  - to save me
  - for saving me
  - to deliver me
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל after the divine name is elliptical and idiomatic. In context of thanksgiving after healing, it expresses the LORD's saving action or readiness/purpose to save. 'Is ready to save me' gives natural English while preserving the sense of imminent/personal deliverance better than the bare infinitive 'to save me.'
- source_word: וּנְגִנוֹתַי
  chosen: my songs on stringed instruments
  alternatives:
  - my music
  - my string-music
  - my instrumental songs
  lexicon: HALOT
  rationale: From נְגִינָה/נְגִינוֹת, referring to music associated with stringed accompaniment. Because the following verb is 'we will play,' the phrase likely denotes songs/music performed instrumentally. 'My songs on stringed instruments' preserves both the possessive and the instrumental nuance.
- source_word: נְנַגֵּן
  chosen: we will play
  alternatives:
  - we will make music
  - we will sing
  - let us play
  lexicon: HALOT
  rationale: Piel imperfect 1cp of נגן commonly means to play an instrument or make music. 'We will play' fits the cohortative/volitional sense in context and matches the object referring to instrumental songs. 'Sing' would narrow the sense too much.
- source_word: כָּל יְמֵי חַיֵּינוּ
  chosen: all the days of our lives
  alternatives:
  - all our lifetime
  - all the days of our life
  lexicon: HALOT
  rationale: A standard Hebrew idiom for lifelong duration. The plural possessive in Hebrew is best represented by idiomatic English plural 'our lives.'
- source_word: עַל בֵּית יְהוָה
  chosen: at the house of the LORD
  alternatives:
  - in the house of the LORD
  - over the house of the LORD
  - by the house of the LORD
  lexicon: HALOT
  rationale: Although עַל often means 'upon/over,' in some contexts it functions idiomatically for location associated with worship. 'At the house of the LORD' is a natural rendering that preserves the locative sense without forcing a wooden 'upon.' 'In' is possible, but 'at' better reflects the preposition's broader spatial range.
