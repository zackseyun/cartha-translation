id: ISA.38.15
reference: Isaiah 38:15
source:
  edition: WLC
  text: מָֽה אֲדַבֵּ֥ר וְ/אָֽמַר לִ֖/י וְ/ה֣וּא עָשָׂ֑ה אֶדַּדֶּ֥ה כָל שְׁנוֹתַ֖/י
    עַל מַ֥ר נַפְשִֽׁ/י־־־־׃
translation:
  text: What can I say? He himself has spoken to me, and he himself has done it. I
    will walk slowly all my years because of the bitterness of my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will go softly all my years in the bitterness of my soul.' The rare
      verb may denote subdued or slow walking, and the phrase with 'bitterness' may
      be read as manner rather than cause.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֲדַבֵּר
  chosen: What can I say?
  alternatives:
  - What shall I say?
  - What am I to say?
  lexicon: HALOT
  rationale: Idiomatic rhetorical question expressing inability or astonishment. English
    'can' captures the sense naturally while preserving the interrogative force.
- source_word: וְאָמַר לִי
  chosen: He himself has spoken to me
  alternatives:
  - and he said to me
  - for he has spoken to me
  lexicon: HALOT
  rationale: Though the form is wayyiqtol/qatal-like in sequence, in this reflective
    context it functions well as a completed action in relation to the speaker's present
    reflection. 'Spoken to me' is smoother than the more punctiliar 'said to me' and
    fits the prayerful tone.
- source_word: וְהוּא עָשָׂה
  chosen: and he himself has done it
  alternatives:
  - and he has done it
  - and he acted
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis, so 'he himself' preserves that stress.
    'Done it' leaves the object implicit as in Hebrew and conveys that God both declared
    and effected the matter.
- source_word: אֶדַּדֶּה
  chosen: I will walk slowly
  alternatives:
  - I will go softly
  - I will wander
  - I will pace myself
  lexicon: HALOT
  rationale: The verb is rare and traditionally understood here as moving about softly
    or slowly, expressing subdued conduct after affliction. 'Walk slowly' is clear
    modern English and retains the metaphor of one's manner of life.
- source_word: כָּל שְׁנוֹתַי
  chosen: all my years
  alternatives:
  - all my years of life
  - all my years remaining
  lexicon: HALOT
  rationale: A straightforward rendering of the temporal phrase; no need to add 'remaining'
    though that may be implied by context.
- source_word: עַל מַר נַפְשִׁי
  chosen: because of the bitterness of my soul
  alternatives:
  - in the bitterness of my soul
  - over the bitterness of my soul
  - because of my soul's bitterness
  lexicon: HALOT
  rationale: The preposition עַל here is best taken causally or in relation to the
    bitter condition described. 'Soul' is retained rather than reduced to 'heart'
    or 'self' to preserve the anthropological language of the Hebrew text.
