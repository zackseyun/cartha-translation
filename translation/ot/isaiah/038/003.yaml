id: ISA.38.3
reference: Isaiah 38:3
source:
  edition: WLC
  text: וַ/יֹּאמַ֗ר אָנָּ֤ה יְהוָה֙ זְכָר נָ֞א אֵ֣ת אֲשֶׁ֧ר הִתְהַלַּ֣כְתִּי לְ/פָנֶ֗י/ךָ
    בֶּֽ/אֱמֶת֙ וּ/בְ/לֵ֣ב שָׁלֵ֔ם וְ/הַ/טּ֥וֹב בְּ/עֵינֶ֖י/ךָ עָשִׂ֑יתִי וַ/יֵּ֥בְךְּ
    חִזְקִיָּ֖הוּ בְּכִ֥י גָדֽוֹל־׃ס
translation:
  text: And he said, “Please, O LORD, remember how I have walked before you in faithfulness
    and with a whole heart, and have done what is good in your eyes.” And Hezekiah
    wept bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in truth.' The Hebrew term can denote truth, reliability, or faithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'with an undivided heart' or 'with a perfect heart.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'wept with great weeping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD' rather
    than a transliteration, following Jewish reverence tradition and the Septuagintal
    pattern.
- source_word: אָנָּה
  chosen: Please
  alternatives:
  - Ah
  - I pray
  lexicon: HALOT
  rationale: A polite particle of entreaty in prayer. 'Please' is natural modern English
    and preserves the supplicatory force without archaic diction.
- source_word: זְכָר נָא
  chosen: remember
  alternatives:
  - please remember
  - call to mind
  lexicon: HALOT
  rationale: Imperative plus entreaty particle expresses earnest petition. The force
    of נָא is carried by 'Please' earlier in the clause, avoiding redundancy while
    preserving the plea.
- source_word: הִתְהַלַּכְתִּי לְפָנֶיךָ
  chosen: I have walked before you
  alternatives:
  - I have lived before you
  - I have conducted myself before you
  lexicon: HALOT
  rationale: The idiom of 'walking' before God is important biblical covenant language
    and should be preserved rather than flattened to mere 'lived,' while still being
    understandable in English.
- source_word: בֶּאֱמֶת
  chosen: in faithfulness
  alternatives:
  - in truth
  - truly
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, reliability, or faithfulness. In the context
    of Hezekiah's conduct before God, 'faithfulness' best conveys covenantal integrity
    rather than mere factual truthfulness.
- source_word: וּבְלֵב שָׁלֵם
  chosen: with a whole heart
  alternatives:
  - with a perfect heart
  - with a blameless heart
  - with an undivided heart
  lexicon: HALOT
  rationale: שָׁלֵם here conveys completeness or wholeness of devotion. 'Whole heart'
    is idiomatic modern English and avoids the misleading implication of sinless perfection
    that 'perfect heart' may suggest.
- source_word: וְהַטּוֹב בְּעֵינֶיךָ עָשִׂיתִי
  chosen: have done what is good in your eyes
  alternatives:
  - have done the good in your sight
  - have done what was pleasing in your sight
  lexicon: HALOT
  rationale: This expression refers to conduct evaluated by God's standard. 'What
    is good in your eyes' is a clear and fairly literal rendering that preserves the
    evaluative idiom.
- source_word: וַיֵּבְךְּ ... בְּכִי גָדוֹל
  chosen: wept bitterly
  alternatives:
  - wept greatly
  - wept with great weeping
  lexicon: HALOT
  rationale: The Hebrew uses a cognate accusative for intensity ('wept a great weeping').
    'Wept bitterly' is a natural English equivalent that conveys strong emotional
    intensity without awkward literalism.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: וַיֹּאמַר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And he said' preserves the
    Hebrew narrative flow straightforwardly.
