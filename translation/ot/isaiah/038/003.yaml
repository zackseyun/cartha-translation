theological_decisions:
- issue: Rendering Hezekiah's self-description without implying sinless perfection
  chosen_reading: with a whole heart
  alternative_readings:
  - with a perfect heart
  - with an undivided heart
  rationale: The verse reports Hezekiah's appeal to covenantal sincerity before God,
    not a doctrinal claim of absolute sinlessness. 'Whole heart' preserves the Hebrew
    sense of complete devotion while avoiding overstatement in English.
  doctrine_reference: Translation philosophy §3, §6
