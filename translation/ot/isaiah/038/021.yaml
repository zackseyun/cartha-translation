id: ISA.38.21
reference: Isaiah 38:21
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְשַׁעְיָ֔הוּ יִשְׂא֖וּ דְּבֶ֣לֶת תְּאֵנִ֑ים וְ/יִמְרְח֥וּ עַֽל
    הַ/שְּׁחִ֖ין וְ/יֶֽחִי־׃
translation:
  text: Now Isaiah had said, “Let them take a cake of figs and spread it on the boil,
    so that he may recover.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “and he may live.” The Hebrew uses the verb “live,”
      here in the sense of recovering from illness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: had said
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although the form is a wayyiqtol ('and he said'), in context this verse
    functions as explanatory background to the preceding narrative, so English past
    perfect ('had said') best reflects the discourse relationship without distorting
    the Hebrew verb.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  rationale: Standard English transliteration of the prophet's name, following the
    translation policy to transliterate personal names.
- source_word: יִשְׂאוּ
  chosen: Let them take
  alternatives:
  - Let them lift
  - Let them carry
  lexicon: HALOT
  rationale: The verb נשׂא commonly means 'lift, carry, take.' In this medical-preparatory
    context, 'take' is the most natural English rendering for fetching the remedy.
- source_word: דְּבֶלֶת תְּאֵנִים
  chosen: a cake of figs
  alternatives:
  - a fig cake
  - a pressed mass of figs
  lexicon: HALOT
  rationale: The construct phrase denotes a pressed cake or lump made from figs. 'A
    cake of figs' is idiomatic, clear, and close to the Hebrew sense.
- source_word: וְיִמְרְחוּ
  chosen: and spread it
  alternatives:
  - and smear it
  - and apply it
  lexicon: HALOT
  rationale: The verb מרח means to smear/spread. 'Spread it' is readable modern English;
    the object is implied from the preceding fig cake and naturally supplied in English.
- source_word: עַל הַשְּׁחִין
  chosen: on the boil
  alternatives:
  - on the inflamed sore
  - on the ulcer
  lexicon: HALOT
  rationale: שְׁחִין refers to a boil or inflamed skin lesion. 'Boil' is the most
    direct and conventional rendering here.
- source_word: וְיֶחִי
  chosen: so that he may recover
  alternatives:
  - and he will live
  - that he may live
  lexicon: HALOT
  rationale: The verb חיה literally means 'live,' but in this healing context it refers
    to restoration from illness. 'Recover' communicates the intended sense in natural
    English while preserving the result clause.
