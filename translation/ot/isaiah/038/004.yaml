id: ISA.38.4
reference: Isaiah 38:4
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶֽל יְשַׁעְיָ֖הוּ לֵ/אמֹֽר־־׃
translation:
  text: Then the word of Yahweh came to Isaiah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: YHWH; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence. In English, 'Then ... came' captures the discourse function naturally without the archaic 'it came to pass.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'the word' is the standard and most transparent rendering, preserving the recognizable idiom of divine revelation better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word; 'to' is the natural English equivalent in this formula.
- source_word: יְשַׁעְיָהוּ
  chosen: Isaiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: HALOT
  rationale: The infinitive construct introduces the content of the speech in standard Hebrew narrative style. 'Saying' preserves the formal linkage to the following quotation in the next verse.
