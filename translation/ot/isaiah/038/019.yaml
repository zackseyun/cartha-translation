id: ISA.38.19
reference: Isaiah 38:19
source:
  edition: WLC
  text: חַ֥י חַ֛י ה֥וּא יוֹדֶ֖/ךָ כָּמ֣וֹ/נִי הַ/יּ֑וֹם אָ֣ב לְ/בָנִ֔ים יוֹדִ֖יעַ
    אֶל אֲמִתֶּֽ/ךָ־׃
translation:
  text: The living, the living—he gives thanks to you, as I do today; a father makes
    your faithfulness known to children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your truth.' The Hebrew אֱמֶת can denote truth, faithfulness, or reliability.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons'; here rendered 'children' because the context speaks of fathers
      making God's faithfulness known to the next generation generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי חַי
  chosen: The living, the living
  alternatives:
  - The one who lives, the one who lives
  - The living person, the living person
  lexicon: HALOT
  rationale: The repetition is emphatic and should be preserved in English. Using
    the substantival adjective 'the living' captures the Hebrew concise style better
    than expanding to a full clause.
- source_word: יוֹדֶךָ
  chosen: he gives thanks to you
  alternatives:
  - he praises you
  - he confesses/acknowledges you
  lexicon: HALOT
  rationale: Hiphil of ידה in this context commonly means giving thanks or praise
    to God. 'Gives thanks to you' fits the thanksgiving context of Hezekiah's song
    and is more specific than the broader 'praises you.'
- source_word: כָּמוֹנִי הַיּוֹם
  chosen: as I do today
  alternatives:
  - like me today
  - as I am today
  lexicon: HALOT
  rationale: 'The phrase compares the living person''s thanksgiving with the speaker''s
    present experience. Idiomatic English requires supplying the verbal sense from
    the previous clause: ''as I do today.'''
- source_word: אָב לְבָנִים
  chosen: a father ... to children
  alternatives:
  - a father to sons
  - father to children
  lexicon: HALOT
  rationale: בָּנִים is formally masculine plural ('sons'), but in this generational
    instruction context it can represent offspring generally. Per the translation
    philosophy, gender-accurate rendering favors 'children' here because the sense
    is filial descendants rather than male children specifically.
- source_word: יוֹדִיעַ
  chosen: makes known
  alternatives:
  - declares
  - causes to know
  - teaches
  lexicon: HALOT
  rationale: Hiphil of ידע means 'make known' or 'cause to know.' 'Makes known' is
    both accurate and natural, preserving the causative force without overinterpreting
    as formal teaching.
- source_word: אֶל אֲמִתֶּךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your reliability
  - your steadfastness
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, faithfulness, or reliability. In this context of
    God's character being proclaimed across generations, 'your faithfulness' best
    conveys covenant reliability rather than abstract propositional truth.
