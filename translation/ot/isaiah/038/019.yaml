theological_decisions:
- issue: Gender rendering of בָּנִים
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: Although the Hebrew noun is masculine plural, the context is a general
    statement about generational transmission of praise and knowledge of God. Rendering
    it 'children' reflects representative force without implying only male offspring
    are in view.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Semantic nuance of אֱמֶת when predicated of God
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  rationale: The verse emphasizes living worshipers and fathers passing on knowledge
    of God's dependable character. 'Faithfulness' better fits this relational and
    covenantal setting, while 'truth' remains a viable lexical alternative preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
