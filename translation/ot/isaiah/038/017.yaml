id: ISA.38.17
reference: Isaiah 38:17
source:
  edition: WLC
  text: הִנֵּ֥ה לְ/שָׁל֖וֹם מַר לִ֣/י מָ֑ר וְ/אַתָּ֞ה חָשַׁ֤קְתָּ נַפְשִׁ/י֙ מִ/שַּׁ֣חַת
    בְּלִ֔י כִּ֥י הִשְׁלַ֛כְתָּ אַחֲרֵ֥י גֵוְ/ךָ֖ כָּל חֲטָאָֽ/י־־׃
translation:
  text: Behold, it was for my peace that I had great bitterness; but you have held
    my soul back from the pit of destruction, for you have cast all my sins behind
    your back.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you have loved my soul out of the pit of destruction.' The Hebrew verb
      can carry the sense of deep attachment or love.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשָׁלוֹם
  chosen: for my peace
  alternatives:
  - for welfare
  - for well-being
  - into peace
  lexicon: HALOT
  rationale: שָׁלוֹם carries the broad sense of peace, well-being, wholeness. 'For
    my peace' preserves the Hebrew preposition לְ and the personal sense in context,
    while remaining natural English.
- source_word: מַר לִי מָר
  chosen: I had great bitterness
  alternatives:
  - it was bitter to me, bitterly
  - bitterness was bitter for me
  - I was embittered
  lexicon: HALOT
  rationale: The Hebrew is emphatic and somewhat idiomatic, repeating the bitter root.
    'I had great bitterness' captures the intensity without over-paraphrasing. The
    repetition is represented by 'great bitterness' rather than a wooden duplication.
- source_word: חָשַׁקְתָּ
  chosen: have held ... back
  alternatives:
  - have loved
  - have been attached to
  - have delighted in
  lexicon: HALOT
  rationale: The verb often means to be attached to, love, or set affection on. In
    this context, with מִשַּׁחַת בְּלִי, the sense is protective attachment resulting
    in rescue. 'Held my soul back' expresses the contextual force more clearly than
    'loved my soul from the pit,' while preserving divine personal concern.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - my life
  - me
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean soul, life, or self. Here 'my soul' preserves the Hebrew
    imagery and the personal depth of Hezekiah's thanksgiving, while still being intelligible
    in modern English.
- source_word: מִשַּׁחַת בְּלִי
  chosen: from the pit of destruction
  alternatives:
  - from the pit of corruption
  - from the pit of annihilation
  - from the grave
  lexicon: HALOT
  rationale: שַׁחַת can denote pit, destruction, or corruption. With בְּלִי, the phrase
    intensifies ruin/destruction. 'Pit of destruction' preserves the concrete image
    and the destructive sense without narrowing it merely to physical grave.
- source_word: הִשְׁלַכְתָּ אַחֲרֵי גֵוְךָ
  chosen: have cast ... behind your back
  alternatives:
  - have thrown ... behind you
  - have put ... out of your sight
  lexicon: HALOT
  rationale: The idiom vividly depicts removal from notice or regard. 'Behind your
    back' is the closest natural English equivalent and preserves the metaphor.
- source_word: חֲטָאַי
  chosen: my sins
  alternatives:
  - my offenses
  - my sins and guilt
  lexicon: HALOT
  rationale: חטא in the plural straightforwardly means sins. 'Sins' is the most direct
    and theologically transparent rendering.
