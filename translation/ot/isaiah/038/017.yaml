theological_decisions:
- issue: Whether to make the verse speak primarily of divine love or divine rescue
    in חָשַׁקְתָּ נַפְשִׁי מִשַּׁחַת בְּלִי
  chosen_reading: 'Rendered the clause as protective rescue: ''you have held my soul
    back from the pit of destruction.'''
  alternative_readings:
  - '''you have loved my soul out of the pit of destruction'''
  - '''you were attached to my soul, away from the pit'''
  rationale: The Hebrew verb can denote affection or attachment, but in this syntactic
    context the practical result is deliverance from death. The translation preserves
    that theological emphasis without importing a fuller doctrinal statement than
    the text itself makes. The alternative emphasizing divine love is preserved in
    a footnote because it is lexically plausible and spiritually significant.
  doctrine_reference: Preserve theological tension rather than resolve it
