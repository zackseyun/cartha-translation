id: ISA.38.9
reference: Isaiah 38:9
source:
  edition: WLC
  text: מִכְתָּ֖ב לְ/חִזְקִיָּ֣הוּ מֶֽלֶךְ יְהוּדָ֑ה בַּ/חֲלֹת֕/וֹ וַ/יְחִ֖י מֵ/חָלְיֽ/וֹ־׃
translation:
  text: 'A writing of Hezekiah king of Judah, when he had been sick and had recovered
    from his sickness:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A poem of Hezekiah' or 'A record of Hezekiah.' The Hebrew term denotes
      a written composition without specifying the exact genre.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and he lived from his sickness.' The expression means that he
      recovered.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְתָּב
  chosen: A writing
  alternatives:
  - A poem
  - A record
  - A psalm
  lexicon: HALOT
  rationale: The noun broadly denotes a written composition or document. Here it introduces
    the following first-person composition by Hezekiah, so 'A writing' is the most
    transparent and least interpretively loaded choice. 'Poem' or 'psalm' would over-specify
    genre beyond the lexical data.
- source_word: לְחִזְקִיָּהוּ
  chosen: of Hezekiah
  alternatives:
  - belonging to Hezekiah
  - for Hezekiah
  lexicon: HALOT
  rationale: The prefixed ל here marks authorship/association in a heading. In English
    headings, 'of Hezekiah' naturally conveys attribution better than the more wooden
    'to/for Hezekiah'.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Standard construct chain identifying Hezekiah's royal office and realm;
    a direct formal rendering is clear and natural.
- source_word: בַּחֲלֹתוֹ
  chosen: when he had been sick
  alternatives:
  - in his sickness
  - when he became sick
  - when he was sick
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance,
    'when/in his being sick.' 'When he had been sick' fits the retrospective heading
    style and prepares for the subsequent recovery clause. 'When he became sick' would
    overstate ingressive force not explicit in the form.
- source_word: וַיְחִי
  chosen: had recovered
  alternatives:
  - lived
  - revived
  - came to life
  lexicon: HALOT
  rationale: Although the verb is literally 'and he lived,' in context with 'from
    his sickness' it idiomatically means he recovered or returned to life/health from
    illness. 'Had recovered' communicates the sense in natural English without implying
    resurrection.
- source_word: מֵחָלְיוֹ
  chosen: from his sickness
  alternatives:
  - from his illness
  - out of his disease
  lexicon: HALOT
  rationale: 'The preposition מן marks source/separation: recovery from the state
    of illness. ''Sickness'' matches the preceding clause and keeps the heading concise
    and readable.'
