theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the death announcement כִּי מֵת אַתָּה וְלֹא תִחְיֶה
  chosen_reading: an announcement of impending death, rendered 'for you are about to die; you will not live'
  alternative_readings:
  - a more literal but misleading 'for you are dead, and you will not live'
  - a more interpretive 'for you are dying and will not recover'
  rationale: The Hebrew uses a participial form that, if translated hyper-literally, would imply present death, which is impossible in context. The chosen rendering preserves the prophetic certainty of death without importing the narrower idea of medical recovery.
