id: ISA.38.1
reference: Isaiah 38:1
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם חָלָ֥ה חִזְקִיָּ֖הוּ לָ/מ֑וּת וַ/יָּב֣וֹא אֵ֠לָי/ו יְשַׁעְיָ֨הוּ בֶן אָמ֜וֹץ הַ/נָּבִ֗יא וַ/יֹּ֨אמֶר אֵלָ֜י/ו כֹּֽה אָמַ֤ר יְהוָה֙ צַ֣ו לְ/בֵיתֶ֔/ךָ כִּ֛י מֵ֥ת אַתָּ֖ה וְ/לֹ֥א תִֽחְיֶֽה־־׃
translation:
  text: 'In those days Hezekiah became sick and was near death, and Isaiah the prophet, the son of Amoz, came to him and said to him, “Thus says Yahweh: Set your house in order, for you shall die; you shall not live.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for you are dying' or 'for you are dead'; the Hebrew expression announces certain impending death.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: A standard temporal idiom. 'In those days' preserves the Hebrew phrasing and its narrative linkage better than the more interpretive 'at that time.'
- source_word: חָלָה
  chosen: became sick
  alternatives:
  - was sick
  - fell ill
  lexicon: HALOT
  rationale: The verb denotes becoming ill. 'Became sick' reflects the verbal event more precisely than the stative 'was sick'; 'fell ill' is also possible but slightly more idiomatic than necessary.
- source_word: לָמוּת
  chosen: to the point of death
  alternatives:
  - unto death
  - to die
  lexicon: HALOT
  rationale: The infinitive with ל expresses result or extent here. 'To the point of death' communicates that his sickness had reached a mortal stage without sounding archaic like 'unto death.'
- source_word: יְשַׁעְיָהוּ בֶן אָמוֹץ הַנָּבִיא
  chosen: Isaiah the prophet, the son of Amoz
  alternatives:
  - Isaiah son of Amoz the prophet
  - Isaiah son of Amoz, the prophet
  lexicon: HALOT
  rationale: Names are transliterated per project philosophy. This ordering is natural English while preserving all appositional elements in the Hebrew.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says' preserves the formal prophetic tone. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering for YHWH.
- source_word: צַו לְבֵיתֶךָ
  chosen: Set your house in order
  alternatives:
  - Give orders to your house
  - Command your household
  lexicon: HALOT
  rationale: Literally the imperative is 'command your house/household,' but in context it is an idiom for putting one's affairs in order before death. 'Set your house in order' is the clearest optimal-equivalence rendering and can include household and estate matters.
- source_word: בַּיִת
  chosen: house
  alternatives:
  - household
  - family
  - affairs
  lexicon: HALOT
  rationale: The Hebrew term can denote house, household, or family establishment. In this idiom, 'house' is retained in English because the phrase 'set your house in order' naturally carries the broader sense.
- source_word: כִּי מֵת אַתָּה
  chosen: for you are about to die
  alternatives:
  - for you are dying
  - for you are dead
  lexicon: HALOT
  rationale: The predicate participle מֵת with pronoun can sound wooden if rendered 'you are dead,' since Hezekiah is still alive. In context it announces impending death. 'You are about to die' captures the force idiomatically and coheres with the following clause.
- source_word: וְלֹא תִחְיֶה
  chosen: you will not live
  alternatives:
  - and not recover
  - and you shall not live
  lexicon: HALOT
  rationale: The clause straightforwardly states that he will not continue living. 'You will not live' is direct and natural. 'Not recover' is interpretive and narrows the statement beyond the Hebrew.
