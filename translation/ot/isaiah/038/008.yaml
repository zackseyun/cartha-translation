id: ISA.38.8
reference: Isaiah 38:8
source:
  edition: WLC
  text: הִנְ/נִ֣י מֵשִׁ֣יב אֶת צֵ֣ל הַֽ/מַּעֲל֡וֹת אֲשֶׁ֣ר יָרְדָה֩ בְ/מַעֲל֨וֹת אָחָ֥ז
    בַּ/שֶּׁ֛מֶשׁ אֲחֹרַנִּ֖ית עֶ֣שֶׂר מַעֲל֑וֹת וַ/תָּ֤שָׁב הַ/שֶּׁ֨מֶשׁ֙ עֶ֣שֶׂר
    מַעֲל֔וֹת בַּֽ/מַּעֲל֖וֹת אֲשֶׁ֥ר יָרָֽדָה־׃ס
translation:
  text: Behold, I will make the shadow go back ten steps, the shadow that had gone
    down on the steps of Ahaz by the sun. And the sun went back ten steps on the steps
    on which it had gone down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ten degrees.' The Hebrew word literally means 'steps' or 'ascents';
      some understand the phrase to refer to a stairway-like sundial.
    reason: lexical_alternative
  - marker: b
    text: Or 'the dial of Ahaz.' The Hebrew says 'the steps of Ahaz,' which may refer
      to a structure used to mark the sun's shadow.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' preserves the elevated
    demonstrative force better than the more colloquial 'look' or 'see'.
- source_word: מֵשִׁיב
  chosen: I will make ... go back
  alternatives:
  - I am causing ... to return
  - I will turn back
  lexicon: HALOT
  rationale: Hiphil of שוב is causative. English expresses this naturally as 'make
    ... go back,' preserving the causative sense without awkwardness.
- source_word: צֵל
  chosen: the shadow
  lexicon: HALOT
  rationale: Literal reference to the shadow cast as part of the sign; no need to
    paraphrase.
- source_word: מַעֲלוֹת
  chosen: steps
  alternatives:
  - stairway
  - degrees
  lexicon: HALOT
  rationale: The noun literally denotes steps or ascents. 'Degrees' reflects older
    translation tradition tied to a sundial interpretation, but 'steps' better matches
    the Hebrew's plain sense while still allowing the astronomical-sign context.
- source_word: בְמַעֲלוֹת אָחָז
  chosen: on the steps of Ahaz
  alternatives:
  - on the stairway of Ahaz
  - on the dial of Ahaz
  lexicon: HALOT
  rationale: The phrase most naturally refers to a structure associated with Ahaz.
    'Dial of Ahaz' is interpretive; 'steps of Ahaz' preserves the Hebrew wording and
    leaves the exact mechanism implicit.
- source_word: בַּשֶּׁמֶשׁ
  chosen: by the sun
  alternatives:
  - in the sun
  - with the sun
  lexicon: HALOT
  rationale: Indicates the shadow's relation to the sun as the means by which it had
    descended. 'By the sun' is concise and natural in context.
- source_word: אֲחֹרַנִּית
  chosen: go back
  alternatives:
  - backward
  - back
  lexicon: HALOT
  rationale: This adverb modifies the reversal of the shadow. Rather than a separate
    awkward adverbial phrase, its sense is incorporated into 'go back,' which communicates
    the reversal clearly.
- source_word: עֶשֶׂר מַעֲלוֹת
  chosen: ten steps
  alternatives:
  - ten degrees
  lexicon: HALOT
  rationale: Retains the literal count plus the concrete noun. 'Ten degrees' is possible
    if the structure functioned as a time-measuring device, but the Hebrew itself
    says 'steps.'
- source_word: וַתָּשָׁב הַשֶּׁמֶשׁ
  chosen: And the sun went back
  alternatives:
  - And the sun returned
  - And the sunlight went back
  lexicon: HALOT
  rationale: The subject is explicitly 'the sun' in Hebrew. While phenomenological,
    the text states the sign in terms of the sun's movement, and 'went back' matches
    the narrative description.
- source_word: אֲשֶׁר יָרָדָה
  chosen: on which it had gone down
  alternatives:
  - where it had descended
  lexicon: HALOT
  rationale: Refers back to the prior descent of the shadow/sun on the steps. 'Had
    gone down' is idiomatic and preserves the directional imagery.
