theological_decisions:
- issue: Nature of the sign involving the sun and shadow
  chosen_reading: Translate the event phenomenologically as described, without naturalizing
    or explaining away the miracle.
  alternative_readings:
  - Render in terms of a sundial mechanism only
  - Paraphrase to avoid implying solar reversal
  rationale: 'The Hebrew narrates a miraculous sign in ordinary observational language:
    the shadow and the sun ''went back.'' The translation should preserve the text''s
    wording without importing a scientific explanation or diminishing the miraculous
    character.'
  doctrine_reference: Translation philosophy §1, §3
