theological_decisions:
- issue: Shift in grammatical subject from third person to second person
  chosen_reading: 'Retain the likely poetic shift: ''he cuts me off ... you bring
    me to an end'''
  alternative_readings:
  - Harmonize both clauses to God as 'you' throughout
  - Harmonize impersonally without explicit subject shift
  rationale: The Hebrew appears to move from a third-person cutting image within the
    weaving metaphor to direct second-person address to God. Preserving the shift
    respects the poetic texture and avoids smoothing out the lament’s emotional immediacy.
  doctrine_reference: Translation philosophy §1, §3
