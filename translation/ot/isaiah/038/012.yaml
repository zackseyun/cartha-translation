id: ISA.38.12
reference: Isaiah 38:12
source:
  edition: WLC
  text: דּוֹרִ֗/י נִסַּ֧ע וְ/נִגְלָ֛ה מִ/נִּ֖י כְּ/אֹ֣הֶל רֹעִ֑/י קִפַּ֨דְתִּי כָ/אֹרֵ֤ג
    חַיַּ/י֙ מִ/דַּלָּ֣ה יְבַצְּעֵ֔/נִי מִ/יּ֥וֹם עַד לַ֖יְלָה תַּשְׁלִימֵֽ/נִי־׃
translation:
  text: My dwelling is pulled up and carried away from me like a shepherd’s tent;
    I have rolled up my life like a weaver; from the loom he cuts me off. From day
    to night you bring me to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'My generation has departed and been removed from me like a shepherd’s
      tent.' The Hebrew word can mean 'generation' or, in this context, 'dwelling/habitation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have cut off my life like a weaver.' The Hebrew verb is difficult;
      the translation follows the weaving imagery by rendering it 'rolled up.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the thrum/warp he cuts me off.' The Hebrew term refers more specifically
      to the loom’s hanging threads.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹרִי
  chosen: my dwelling
  alternatives:
  - my generation
  - my lifetime
  - my habitation
  lexicon: HALOT
  rationale: Although דּוֹר often means 'generation,' in this poetic lament the surrounding
    tent imagery favors the sense of a dwelling-place or habitation, something that
    can be pulled up and removed. 'My dwelling' best fits the metaphorical parallel
    with 'like a shepherd’s tent.'
- source_word: נִסַּע וְנִגְלָה
  chosen: is pulled up and carried away
  alternatives:
  - has departed and been removed
  - is uprooted and taken away
  lexicon: HALOT
  rationale: The paired verbs intensify the image of a tent being struck and removed.
    'Pulled up and carried away' renders the concrete force in idiomatic English while
    preserving the passive sense.
- source_word: כְּאֹהֶל רֹעִי
  chosen: like a shepherd’s tent
  alternatives:
  - like the tent of a shepherd
  lexicon: HALOT
  rationale: The construct phrase evokes the temporary, movable shelter of a shepherd.
    'Shepherd’s tent' is natural English and preserves the pastoral image.
- source_word: קִפַּדְתִּי
  chosen: I have rolled up
  alternatives:
  - I have cut off
  - I have folded up
  lexicon: HALOT
  rationale: The verb is difficult, but in context with weaving imagery it likely
    refers to winding up or rolling up the finished web/thread. 'Rolled up' coheres
    with the following 'like a weaver' and avoids importing the next clause's cutting
    image too early.
- source_word: כָאֹרֵג חַיַּי
  chosen: my life like a weaver
  alternatives:
  - like a weaver, my life
  - my life as a weaver’s work
  lexicon: HALOT
  rationale: The Hebrew is compressed poetry. The translation preserves the comparison
    without over-expanding it. The sense is that his life is being handled as cloth/thread
    by a weaver.
- source_word: מִדַּלָּה
  chosen: from the loom
  alternatives:
  - from the thrum
  - from the warp
  lexicon: HALOT
  rationale: The noun refers to the hanging threads or loom-related apparatus. 'From
    the loom' is broader and more accessible in modern English while preserving the
    weaving metaphor.
- source_word: יְבַצְּעֵנִי
  chosen: he cuts me off
  alternatives:
  - he severs me
  - he cuts me down
  lexicon: HALOT
  rationale: The verb conveys cutting/breaking off. 'Cuts me off' is idiomatic and
    fits both the weaving image and the broader theme of life being terminated.
- source_word: מִיּוֹם עַד לַיְלָה
  chosen: From day to night
  alternatives:
  - From morning to evening
  - In a single day
  lexicon: HALOT
  rationale: The phrase marks the span of a day and emphasizes the rapidity of his
    demise. 'From day to night' stays close to the Hebrew wording.
- source_word: תַּשְׁלִימֵנִי
  chosen: you bring me to an end
  alternatives:
  - you finish me off
  - you make an end of me
  - you complete me
  lexicon: HALOT
  rationale: The Hiphil of שׁלם here means to complete or bring to an end. Because
    the addressee shifts to second person, the translation preserves that direct address.
    'Bring me to an end' is natural and solemn without sounding colloquial.
