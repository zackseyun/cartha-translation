id: ISA.38.2
reference: Isaiah 38:2
source:
  edition: WLC
  text: וַ/יַּסֵּ֧ב חִזְקִיָּ֛הוּ פָּנָ֖י/ו אֶל הַ/קִּ֑יר וַ/יִּתְפַּלֵּ֖ל אֶל יְהוָֽה־־׃
translation:
  text: Then Hezekiah turned his face to the wall and prayed to Yahweh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "toward the wall."
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: "YHWH"; traditionally rendered "the LORD."'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּסֵּב
  chosen: turned
  alternatives:
  - turned around
  - turned aside
  lexicon: HALOT
  rationale: From סבב in the Hiphil/wayyiqtol, indicating a physical turning or directing. 'Turned' is the most natural modern English rendering and fits the concrete action described.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name is transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his face away
  - his countenance
  lexicon: HALOT
  rationale: Literally 'his face.' Retained rather than reduced to 'himself' because the Hebrew specifies the bodily gesture, which contributes to the scene's emotional force.
- source_word: אֶל הַקִּיר
  chosen: to the wall
  alternatives:
  - toward the wall
  lexicon: HALOT
  rationale: Concrete directional phrase. 'To the wall' is idiomatic in English and preserves the physical orientation of Hezekiah in prayer.
- source_word: וַיִּתְפַּלֵּל
  chosen: and prayed
  alternatives:
  - and he prayed
  lexicon: HALOT
  rationale: Reflexive stem of פלל in standard prayer usage. 'Prayed' is the straightforward and contextually appropriate rendering.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל marks the addressee of prayer. Per doctrine guidelines, יְהוָה is rendered 'the LORD' in the main text rather than 'Yahweh.'
