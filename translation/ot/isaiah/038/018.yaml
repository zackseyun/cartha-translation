id: ISA.38.18
reference: Isaiah 38:18
source:
  edition: WLC
  text: כִּ֣י לֹ֥א שְׁא֛וֹל תּוֹדֶ֖/ךָּ מָ֣וֶת יְהַלְלֶ֑/ךָּ לֹֽא יְשַׂבְּר֥וּ יֽוֹרְדֵי
    ב֖וֹר אֶל אֲמִתֶּֽ/ךָ־־־׃
translation:
  text: For Sheol does not thank you; death does not praise you; those who go down
    to the pit do not hope for your faithfulness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not wait for your truth.' The Hebrew can also be rendered 'hope for
      your truth/faithfulness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retained as 'Sheol' rather than flattening to 'grave' because the Hebrew
    term denotes the underworld/the realm of the dead, not merely a burial place.
    Transliteration preserves the Hebrew concept while remaining readable.
- source_word: תּוֹדֶךָּ
  chosen: thank you
  alternatives:
  - praise you
  - give thanks to you
  lexicon: HALOT
  rationale: From ידה in the Hiphil, commonly 'give thanks' or 'praise/confess.' 'Thank
    you' fits the parallelism with 'praise you' in the next colon while preserving
    a meaningful distinction between the two verbs.
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Straightforward lexical rendering; personified in poetic parallel with
    Sheol.
- source_word: יְהַלְלֶךָּ
  chosen: praise you
  alternatives:
  - celebrate you
  - extol you
  lexicon: HALOT
  rationale: הלל in the Piel regularly means 'praise.' This is the most natural English
    equivalent and matches the poetic parallelism.
- source_word: יְשַׂבְּרוּ
  chosen: hope for
  alternatives:
  - wait for
  - look expectantly for
  lexicon: HALOT
  rationale: שׂבר in the Piel can mean to wait in hope or look expectantly. 'Hope
    for' is idiomatic modern English and suits the object 'your faithfulness.'
- source_word: יוֹרְדֵי בוֹר
  chosen: those who go down to the pit
  alternatives:
  - those descending to the pit
  - those who go down to the grave
  lexicon: HALOT
  rationale: A participial expression for the dead or dying. 'The pit' preserves the
    concrete Hebrew image and its poetic resonance better than the interpretive 'grave'.
- source_word: בּוֹר
  chosen: the pit
  alternatives:
  - the grave
  - the dungeon
  lexicon: HALOT
  rationale: In this context, 'pit' is the standard poetic image for the realm of
    death. It should be preserved rather than over-interpreted.
- source_word: אֲמִתֶּךָ
  chosen: your faithfulness
  alternatives:
  - your truth
  - your reliability
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, faithfulness, or reliability. Here, with the verb
    'hope for,' 'your faithfulness' best captures covenantal dependability rather
    than abstract propositional truth.
