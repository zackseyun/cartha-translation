theological_decisions:
- issue: Divine deliverance language in a historical military context
  chosen_reading: Use 'deliver' for God's rescue of Hezekiah and Jerusalem from Assyria
    without importing broader salvific theology.
  alternative_readings:
  - save
  - rescue
  rationale: The verse concerns historical preservation from an enemy king. 'Deliver'
    preserves biblical diction and the immediate context while avoiding unnecessary
    doctrinal overtones not explicit in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    doctrinal claims the text does not make.'
