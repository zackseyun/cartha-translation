id: ISA.38.6
reference: Isaiah 38:6
source:
  edition: WLC
  text: וּ/מִ/כַּ֤ף מֶֽלֶךְ אַשּׁוּר֙ אַצִּ֣ילְ/ךָ֔ וְ/אֵ֖ת הָ/עִ֣יר הַ/זֹּ֑את וְ/גַנּוֹתִ֖י
    עַל הָ/עִ֥יר הַ/זֹּֽאת־־׃
translation:
  text: And I will deliver you and this city from the hand of the king of Assyria,
    and I will defend this city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the grasp of the king of Assyria.' The Hebrew idiom is literally
      'from the hand of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכַּף
  chosen: from the hand of
  alternatives:
  - from the grasp of
  - out of the power of
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is a standard Hebrew expression for deliverance
    from someone's power or control. Retaining 'hand' preserves the concrete imagery
    while remaining natural in English.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: A straightforward genitive construction identifying the threatening ruler.
    'The king of Assyria' is the most natural and standard English rendering.
- source_word: אַצִּילְךָ
  chosen: I will deliver you
  alternatives:
  - I will rescue you
  - I will save you
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to snatch away, deliver, or rescue from
    danger. 'Deliver' fits both the military context and biblical register without
    overstating soteriological implications.
- source_word: וְאֵת הָעִיר הַזֹּאת
  chosen: and this city
  alternatives:
  - and this very city
  lexicon: HALOT
  rationale: The direct-object marker with the demonstrative points to Jerusalem specifically.
    'This city' is the natural English equivalent; adding 'very' would overemphasize
    beyond the Hebrew.
- source_word: וְגַנּוֹתִי
  chosen: and I will defend
  alternatives:
  - and I will protect
  - and I will shield
  lexicon: HALOT
  rationale: From גנן, 'to cover/protect/defend.' In this military setting, 'defend'
    best captures active protection of the city against attack.
- source_word: עַל הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - over this city
  - for this city
  lexicon: HALOT
  rationale: With גנן, the preposition עַל conveys protective action over or concerning
    the city. English idiom prefers 'defend this city' rather than the more wooden
    'defend over this city.'
