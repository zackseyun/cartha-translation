theological_decisions:
- issue: Rendering the divine address אֲדֹנָי
  chosen_reading: Lord
  alternative_readings:
  - my Lord
  rationale: This is a title for God in direct address, not the Tetragrammaton. 'Lord'
    follows the project's policy to translate titles and avoids confusion with the
    covenant name rendering 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for κύριος/Lord by analogy of title rendering'
- issue: Handling the uncertain bird identification in כְּסוּס עָגוּר
  chosen_reading: Like a swift or a crane
  alternative_readings:
  - Like a swallow or a crane
  rationale: The Hebrew zoological term is uncertain. Rather than falsely resolve
    the identification, the main text preserves uncertainty with 'swift or a crane,'
    and the traditional alternative is retained in a footnote. This follows the principle
    of preserving genuine ambiguity rather than overstating certainty.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it (applied here to lexical ambiguity)'
