id: ISA.38.14
reference: Isaiah 38:14
source:
  edition: WLC
  text: כְּ/ס֤וּס עָגוּר֙ כֵּ֣ן אֲצַפְצֵ֔ף אֶהְגֶּ֖ה כַּ/יּוֹנָ֑ה דַּלּ֤וּ עֵינַ/י֙
    לַ/מָּר֔וֹם אֲדֹנָ֖/י עָֽשְׁקָה לִּ֥/י עָרְבֵֽ/נִי־׃
translation:
  text: Like a swift or a crane, so I chirp; I moan like a dove. My eyes grow weak
    looking upward. Lord, I am oppressed; be my pledge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following a traditional identification, 'Like a swallow or a crane.'
      The first bird name is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּסוּס עָגוּר
  chosen: Like a swift or a crane
  alternatives:
  - Like a swallow or a crane
  lexicon: HALOT
  rationale: The paired bird names are difficult, especially סוּס in this context,
    which many take as a bird name parallel to עָגוּר. Traditional English often has
    'swallow' for the first term, while some modern treatments prefer 'swift.' Because
    the exact zoological identification is uncertain, 'swift or a crane' preserves
    the uncertainty without overclaiming. The simile introduces the sound of the speaker's
    weak cries.
- source_word: אֲצַפְצֵף
  chosen: I chirp
  alternatives:
  - I twitter
  - I peep
  lexicon: HALOT
  rationale: The verb denotes the high-pitched sound of birds. 'Chirp' is natural
    modern English and fits the avian comparison.
- source_word: אֶהְגֶּה
  chosen: I moan
  alternatives:
  - I murmur
  - I groan
  lexicon: HALOT
  rationale: The verb can denote low utterance, muttering, or moaning. In this lament
    context, 'I moan' best conveys audible distress and pairs well with the previous
    birdlike cry.
- source_word: כַּיּוֹנָה
  chosen: like a dove
  lexicon: HALOT
  rationale: Straightforward simile; the dove commonly evokes plaintive cooing in
    lament contexts.
- source_word: דַּלּוּ עֵינַי
  chosen: My eyes grow weak
  alternatives:
  - My eyes fail
  - My eyes are worn out
  lexicon: HALOT
  rationale: The idiom expresses eyes becoming exhausted or failing from strain. 'Grow
    weak' is readable modern English and preserves the metaphor without flattening
    it.
- source_word: לַמָּרוֹם
  chosen: looking upward
  alternatives:
  - to the height
  - to heaven
  lexicon: HALOT
  rationale: Literally 'to the height/on high.' In context it describes the direction
    of the speaker's strained gaze toward God above. 'Looking upward' is idiomatic
    and avoids importing 'heaven' where the Hebrew says only 'the height/on high.'
- source_word: אֲדֹנָי
  chosen: Lord
  alternatives:
  - my Lord
  lexicon: HALOT
  rationale: The divine title is best rendered 'Lord' in keeping with the translation
    philosophy of translating titles. Here it is a direct address.
- source_word: עָשְׁקָה לִּי
  chosen: I am oppressed
  alternatives:
  - violence is done to me
  - I am wronged
  lexicon: HALOT
  rationale: The clause is terse and difficult, built on the root עשׁק ('oppress,
    wrong'). Rendering it as a present complaint, 'I am oppressed,' captures the lament
    force in natural English.
- source_word: עָרְבֵנִי
  chosen: be my pledge
  alternatives:
  - undertake for me
  - be my surety
  lexicon: HALOT
  rationale: The verb means to give or become a pledge/guarantee for someone. 'Be
    my pledge' is relatively formal but still understandable and preserves the legal-relational
    imagery better than the vaguer 'help me.'
