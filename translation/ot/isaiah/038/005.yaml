id: ISA.38.5
reference: Isaiah 38:5
source:
  edition: WLC
  text: הָל֞וֹךְ וְ/אָמַרְתָּ֣ אֶל חִזְקִיָּ֗הוּ כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵי֙ דָּוִ֣ד
    אָבִ֔י/ךָ שָׁמַ֨עְתִּי֙ אֶת תְּפִלָּתֶ֔/ךָ רָאִ֖יתִי אֶת דִּמְעָתֶ֑/ךָ הִנְ/נִי֙
    יוֹסִ֣ף עַל יָמֶ֔י/ךָ חֲמֵ֥שׁ עֶשְׂרֵ֖ה שָׁנָֽה־־־־־׃
translation:
  text: 'Go and say to Hezekiah, ‘Thus says the LORD, the God of David your father:
    I have heard your prayer; I have seen your tears. Look, I will add fifteen years
    to your days.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the God of your father David.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'I will add fifteen years to your days,' an idiom meaning to extend
      his life by fifteen years.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ וְאָמַרְתָּ
  chosen: Go and say
  alternatives:
  - Go, and you shall say
  - Go and tell
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb construction intensifies or
    reinforces the command. In idiomatic English, 'Go and say' best captures the directive
    without woodenly reproducing the Hebrew form.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic register in clear modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering 'the LORD' for YHWH, following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֵי דָּוִד אָבִיךָ
  chosen: the God of David your father
  alternatives:
  - the God of your father David
  lexicon: HALOT
  rationale: The construct chain is naturally rendered either way in English. 'The
    God of David your father' stays close to the Hebrew order while clearly identifying
    David as Hezekiah's ancestor.
- source_word: שָׁמַעְתִּי אֶת תְּפִלָּתֶךָ
  chosen: I have heard your prayer
  alternatives:
  - I have listened to your prayer
  lexicon: HALOT
  rationale: Perfect verb in divine response context is well rendered by the English
    present perfect, indicating a completed action with present relevance.
- source_word: רָאִיתִי אֶת דִּמְעָתֶךָ
  chosen: I have seen your tears
  alternatives:
  - I have seen your weeping
  lexicon: HALOT
  rationale: The singular noun with second person suffix is a collective expression;
    English idiom prefers the plural 'tears.' Present perfect matches the preceding
    clause and the response context.
- source_word: הִנְנִי
  chosen: Look,
  alternatives:
  - Behold,
  - Here I am
  lexicon: HALOT
  rationale: In this context הִנְנִי introduces an imminent divine action rather than
    self-identification. 'Look,' is readable modern English; 'behold' would sound
    archaic. The force is deictic and emphatic.
- source_word: יוֹסִף עַל יָמֶיךָ
  chosen: I will add ... to your days
  alternatives:
  - I am adding ... to your days
  - I will increase your days by ...
  lexicon: HALOT
  rationale: Though the written form is 3ms Hiphil, the clause functions with God
    as the speaker and implies first-person sense in context; English makes the subject
    explicit as 'I will add.' 'To your days' preserves the Hebrew idiom rather than
    flattening it immediately to 'to your life.'
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  chosen: fifteen years
  lexicon: HALOT
  rationale: Straightforward cardinal number plus noun; standard English compaction
    is natural and accurate.
