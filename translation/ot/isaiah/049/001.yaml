id: ISA.49.1
reference: Isaiah 49:1
source:
  edition: WLC
  text: שִׁמְע֤וּ אִיִּים֙ אֵלַ֔/י וְ/הַקְשִׁ֥יבוּ לְאֻמִּ֖ים מֵ/רָח֑וֹק יְהוָה֙ מִ/בֶּ֣טֶן קְרָאָ֔/נִי מִ/מְּעֵ֥י אִמִּ֖/י הִזְכִּ֥יר שְׁמִֽ/י׃
translation:
  text: 'Listen to me, coastlands, and pay attention, peoples from far away: Yahweh called me from the womb; from my mother’s body he mentioned my name.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'islands.' The Hebrew term can refer more broadly to distant maritime lands or coastlands.
    reason: lexical_alternative
  - marker: b
    text: Or 'from my mother’s womb he mentioned my name.' The Hebrew idiom can denote naming, appointing, or calling someone by name.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Listen
  alternatives:
  - Hear
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Listen' is natural modern English and preserves the summons force better than the more archaic 'Hear.'
- source_word: אִיִּים
  chosen: coastlands
  alternatives:
  - islands
  lexicon: HALOT
  rationale: In Isaiah this term often denotes distant maritime lands/regions rather than literal islands only. 'Coastlands' best captures the prophetic address to far-off nations.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct object of attention/listening; standard modern rendering is 'to me.'
- source_word: וְהַקְשִׁיבוּ
  chosen: pay attention
  alternatives:
  - listen carefully
  - give heed
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב intensifies the call beyond simple hearing. 'Pay attention' is readable modern English and preserves the force.
- source_word: לְאֻמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: The plural can denote peoples/groups broadly. 'Peoples' fits the parallelism with 'coastlands' and avoids over-specifying political nation-states.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from a distance
  lexicon: HALOT
  rationale: Expresses geographical remoteness. 'From far away' is idiomatic contemporary English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִבֶּטֶן
  chosen: from the womb
  alternatives:
  - from the belly
  lexicon: HALOT
  rationale: Idiomatic reference to prenatal calling. 'Womb' is the natural English equivalent in this context.
- source_word: קְרָאַנִי
  chosen: called me
  alternatives:
  - summoned me
  lexicon: HALOT
  rationale: Qal perfect of קרא with 1cs suffix. 'Called me' preserves both lexical simplicity and possible vocational nuance.
- source_word: מִמְּעֵי אִמִּי
  chosen: from my mother’s body
  alternatives:
  - from my mother's womb
  lexicon: HALOT
  rationale: Literally 'from the inward parts of my mother.' Rendering it distinctly as 'my mother's body' preserves the poetic parallelism without collapsing it into the previous 'womb' phrase.
- source_word: הִזְכִּיר שְׁמִי
  chosen: he named my name
  alternatives:
  - he mentioned my name
  - he caused my name to be remembered
  - he called my name
  lexicon: HALOT
  rationale: The idiom literally involves causing the name to be remembered/mentioned. In this context of prenatal designation, it points to appointing or naming. 'He named my name' keeps the Hebrew flavor and the naming sense, though somewhat formal.
