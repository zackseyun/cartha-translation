theological_decisions:
- issue: Identity and role of the addressee as 'a covenant for the people'
  chosen_reading: Retain the direct, text-level formulation that the addressed servant is given 'as a covenant for the people' without reducing it to merely 'mediator of a covenant.'
  alternative_readings:
  - given as mediator of a covenant to the people
  - given to establish the covenant with the people
  rationale: The Hebrew construction לִבְרִית עָם most naturally presents the figure himself as covenantal in role or embodiment. The translation preserves that theological density without forcing a narrower doctrinal explanation into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Scope of יְשׁוּעָה
  chosen_reading: Render as 'salvation' in the main text.
  alternative_readings:
  - deliverance
  rationale: The Hebrew can denote rescue/deliverance, but 'salvation' preserves both immediate rescue and broader redemptive resonance, especially in this servant context. The alternative is preserved in a footnote as a lexical option.
