id: ISA.49.8
reference: Isaiah 49:8
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה בְּ/עֵ֤ת רָצוֹן֙ עֲנִיתִ֔י/ךָ וּ/בְ/י֥וֹם יְשׁוּעָ֖ה עֲזַרְתִּ֑י/ךָ וְ/אֶצָּרְ/ךָ֗ וְ/אֶתֶּנְ/ךָ֙ לִ/בְרִ֣ית עָ֔ם לְ/הָקִ֣ים אֶ֔רֶץ לְ/הַנְחִ֖יל נְחָל֥וֹת שֹׁמֵמֽוֹת׀׃
translation:
  text: 'Thus says Yahweh: “In a time of favor I answered you, and in a day of salvation I helped you; I will keep you and give you as a covenant for the people, to raise up the land, to apportion the desolate inheritances,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at an acceptable time.”
    reason: lexical_alternative
  - marker: b
    text: Or “in a day of deliverance.”
    reason: lexical_alternative
  - marker: c
    text: Or “I will guard you.”
    reason: lexical_alternative
  - marker: d
    text: Or “give you as a covenant to the people.”
    reason: lexical_alternative
  - marker: e
    text: Or “to establish the land” or “to restore the land.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English Bible convention.
- source_word: בְּעֵת רָצוֹן
  chosen: In a time of favor
  alternatives:
  - At an acceptable time
  - In the time of favor
  lexicon: HALOT
  rationale: רָצוֹן denotes favor, acceptance, goodwill. 'Time of favor' is natural English and preserves the sense of a divinely appointed favorable season without over-paraphrasing.
- source_word: עֲנִיתִיךָ
  chosen: I answered you
  alternatives:
  - I answered you favorably
  - I responded to you
  lexicon: HALOT
  rationale: ענה in this stem commonly means 'answer, respond.' 'Answered you' is the most direct rendering; the favorable context is already supplied by 'time of favor,' so it need not be imported into the verb itself.
- source_word: בְיוֹם יְשׁוּעָה
  chosen: in a day of salvation
  alternatives:
  - in the day of salvation
  - on a day of deliverance
  lexicon: HALOT
  rationale: יְשׁוּעָה can mean salvation or deliverance. 'Salvation' preserves the broader theological range and echoes later biblical usage, while 'a day' reflects the lack of article in Hebrew.
- source_word: עֲזַרְתִּיךָ
  chosen: I helped you
  alternatives:
  - I came to your aid
  - I assisted you
  lexicon: HALOT
  rationale: A straightforward rendering of עזר that is clear and idiomatic in modern English.
- source_word: וְאֶצָּרְךָ
  chosen: I will keep you
  alternatives:
  - I will guard you
  - I will preserve you
  lexicon: HALOT
  rationale: נצר conveys guarding, keeping, preserving. 'Keep you' is concise and idiomatic, and pairs well with the following 'give you' while retaining protective nuance.
- source_word: וְאֶתֶּנְךָ לִבְרִית עָם
  chosen: give you as a covenant for the people
  alternatives:
  - give you as a covenant to the people
  - appoint you as a covenant of the people
  lexicon: HALOT
  rationale: The servant is not merely given with a covenant but as a covenant. 'For the people' best captures the benefactive sense without implying possession. 'The people' is preferred over 'a people' because עָם here likely refers to the covenant people in context.
- source_word: לְהָקִים אֶרֶץ
  chosen: to raise up the land
  alternatives:
  - to establish the land
  - to restore the land
  lexicon: HALOT
  rationale: קום in the Hiphil can mean establish or raise up. 'Raise up the land' preserves the concrete verbal imagery and allows the following infinitive to explain the restorative result.
- source_word: לְהַנְחִיל נְחָלוֹת שֹׁמֵמוֹת
  chosen: to apportion the desolate inheritances
  alternatives:
  - to assign the desolate inheritances
  - to cause to inherit the desolate heritages
  lexicon: HALOT
  rationale: נחל in Hiphil means to give as an inheritance, apportion, assign. 'Apportion' is clear modern English. נְחָלוֹת refers to inherited portions/estates; 'inheritances' is the most transparent rendering. שֹׁמֵמוֹת describes them as devastated or desolate.
