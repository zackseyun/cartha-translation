id: ISA.49.13
reference: Isaiah 49:13
source:
  edition: WLC
  text: רָנּ֤וּ שָׁמַ֨יִם֙ וְ/גִ֣ילִי אָ֔רֶץ יפצחו הָרִ֖ים רִנָּ֑ה כִּֽי נִחַ֤ם יְהוָה֙ עַמּ֔/וֹ וַ/עֲנִיָּ֖/ו יְרַחֵֽם־׃ס
translation:
  text: Shout for joy, O heavens, and rejoice, O earth; let the mountains break out in singing, for Yahweh has comforted his people and will have compassion on his afflicted ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sing for joy, O heavens.' The Hebrew verb can also be rendered 'sing for joy' rather than 'shout for joy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his poor' or 'his humble.' The Hebrew term can denote those who are afflicted, poor, or humble.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָנּוּ
  chosen: Shout for joy
  alternatives:
  - Sing for joy
  - Cry out with joy
  lexicon: HALOT
  rationale: Imperative plural from רנן, denoting jubilant vocal rejoicing. 'Shout for joy' is vivid modern English and fits the cosmic summons.
- source_word: שָׁמַיִם
  chosen: heavens
  alternatives:
  - sky
  - heaven
  lexicon: HALOT
  rationale: Plural form commonly rendered 'heavens' in poetic and cosmic contexts; preserves the elevated register of the address.
- source_word: וְגִילִי
  chosen: rejoice
  alternatives:
  - be glad
  - exult
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to earth. 'Rejoice' pairs naturally with the preceding imperative and is idiomatic in English.
- source_word: אָרֶץ
  chosen: earth
  alternatives:
  - land
  lexicon: HALOT
  rationale: In parallel with 'heavens' and 'mountains,' the global/cosmic sense is intended rather than a specific land.
- source_word: יפצחו
  chosen: let ... break out
  alternatives:
  - burst forth
  - break forth
  lexicon: HALOT
  rationale: Jussive-like imperfect in poetic exhortation. 'Let the mountains break out' captures the volitional force in smooth English.
- source_word: הָרִים
  chosen: the mountains
  alternatives:
  - mountains
  lexicon: HALOT
  rationale: Definite plural in poetic personification; English naturally keeps the article here.
- source_word: רִנָּה
  chosen: in singing
  alternatives:
  - into singing
  - with ringing cries
  - with joyful song
  lexicon: HALOT
  rationale: Noun for ringing cry/song of joy. 'Break out in singing' is a natural English collocation that preserves the joyful vocal sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the cosmic rejoicing.
- source_word: נִחַם
  chosen: has comforted
  alternatives:
  - has consoled
  - has relented toward
  lexicon: HALOT
  rationale: In this context נחם takes the sense of comforting/bringing consolation to Zion and the people. Present perfect in English reflects completed divine action with present significance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: Covenantal collective sense is best conveyed by 'people' rather than the more political 'nation.'
- source_word: וַעֲנִיָּו
  chosen: his afflicted
  alternatives:
  - his poor
  - his humble
  - his needy
  lexicon: HALOT
  rationale: The adjective can denote the afflicted, poor, or humble. In this salvation-comfort context, 'his afflicted' best matches the parallel with divine comfort and avoids narrowing the term merely to economic poverty.
- source_word: יְרַחֵם
  chosen: will have compassion on
  alternatives:
  - will show mercy to
  - will pity
  lexicon: HALOT
  rationale: Piel imperfect of רחם expresses tender compassion/mercy. 'Will have compassion on' is clear, natural, and preserves the emotive force.
