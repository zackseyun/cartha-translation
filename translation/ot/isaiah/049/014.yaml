id: ISA.49.14
reference: Isaiah 49:14
source:
  edition: WLC
  text: וַ/תֹּ֥אמֶר צִיּ֖וֹן עֲזָבַ֣/נִי יְהוָ֑ה וַ/אדֹנָ֖/י שְׁכֵחָֽ/נִי׃
translation:
  text: But Zion said, “Yahweh has forsaken me; the Lord has forgotten me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Zion said' or 'Yet Zion said'; the Hebrew conjunction can be rendered in different ways depending on discourse flow.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew distinguishes the two divine designations: ''The LORD has forsaken me; my Lord has forgotten me.'' Some translations smooth both to ''the Lord.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: But Zion said
  alternatives:
  - And Zion said
  - Yet Zion said
  lexicon: HALOT
  rationale: The waw-consecutive introduces the next development in discourse. 'But' best captures the adversative turn from the preceding promises to Zion's complaint, while still remaining close to the Hebrew narrative conjunction.
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Proper name is transliterated per project philosophy. Here it functions as a personified designation for the covenant people/city, but the text names 'Zion,' not 'Jerusalem.'
- source_word: עֲזָבַנִי
  chosen: has forsaken me
  alternatives:
  - has abandoned me
  - left me
  lexicon: HALOT
  rationale: עזב commonly means 'forsake, abandon, leave.' 'Forsaken' preserves the covenantal and emotional weight of the complaint better than the flatter 'left me.' The perfect is rendered idiomatically in English as present perfect.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַאדֹנָי
  chosen: my Lord
  alternatives:
  - the Lord
  - the Sovereign LORD
  - my master
  lexicon: HALOT
  rationale: The form includes a first-person singular suffix on אֲדֹנָי/אדני as pointed in the provided text, yielding 'my Lord.' This should be distinguished from the preceding divine name rather than harmonized away. 'My master' is possible lexically but too low in register for this address to God.
- source_word: שְׁכֵחָנִי
  chosen: has forgotten me
  alternatives:
  - forgot me
  - has neglected me
  lexicon: HALOT
  rationale: שכח means 'forget.' 'Has forgotten me' matches the perfect form naturally in English and preserves the lament's force without interpretive expansion to 'neglected.'
