theological_decisions:
- issue: Rendering and distinction of the two divine designations יְהוָה and אֲדֹנָי/אדני
  chosen_reading: Render יְהוָה as 'Yahweh' and וַאדֹנָי as 'my Lord,' preserving the distinction in the Hebrew text.
  alternative_readings:
  - Render both as 'the Lord' for stylistic smoothness
  - Render the second as 'the Sovereign LORD' by assimilation to common prophetic collocation אֲדֹנָי יְהוִה
  rationale: 'The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered ''Yahweh'' rather than ''the LORD'', preserving the covenant name God revealed at Sinai.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
