id: ISA.49.4
reference: Isaiah 49:4
source:
  edition: WLC
  text: וַ/אֲנִ֤י אָמַ֨רְתִּי֙ לְ/רִ֣יק יָגַ֔עְתִּי לְ/תֹ֥הוּ וְ/הֶ֖בֶל כֹּחִ֣/י כִלֵּ֑יתִי אָכֵן֙ מִשְׁפָּטִ֣/י אֶת יְהוָ֔ה וּ/פְעֻלָּתִ֖/י אֶת אֱלֹהָֽ/י־־׃
translation:
  text: But I said, “I have labored in vain; I have spent my strength for emptiness and vanity. Yet surely my justice is with Yahweh, and my reward is with my God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my cause” or “my vindication” is with the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or “my recompense” or “my wages” is with my God.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְרִיק
  chosen: for nothing
  alternatives:
  - in vain
  - for emptiness
  lexicon: HALOT
  rationale: רִיק denotes emptiness or something without result. 'For nothing' is idiomatic modern English and fits the lament over apparently fruitless labor.
- source_word: יָגַעְתִּי
  chosen: I have labored
  alternatives:
  - I have toiled
  - I have wearied myself
  lexicon: HALOT
  rationale: יגע conveys strenuous labor to the point of weariness. 'Labored' preserves the exertion without sounding archaic.
- source_word: לְתֹהוּ וְהֶבֶל
  chosen: for emptiness and vanity
  alternatives:
  - in vain and for nothing
  - for chaos and breath
  - for desolation and emptiness
  lexicon: HALOT
  rationale: תֹהוּ often denotes emptiness, wasteness, or unreality; הֶבֶל denotes vapor/breath and by extension vanity or futility. Rendering both terms distinctly preserves the Hebrew pairing rather than collapsing them into one English idea.
- source_word: כֹּחִי כִלֵּיתִי
  chosen: I have spent my strength
  alternatives:
  - I have exhausted my strength
  - I have used up my power
  lexicon: HALOT
  rationale: כלה in the piel here means to complete/use up/consume. 'Spent my strength' is natural English and captures the sense of expended energy.
- source_word: אָכֵן
  chosen: Yet surely
  alternatives:
  - surely
  - nevertheless
  - indeed
  lexicon: HALOT
  rationale: אָכֵן marks a strong adversative or asseverative turn. 'Yet surely' preserves both the contrast with the preceding complaint and the confidence of the following affirmation.
- source_word: מִשְׁפָּטִי
  chosen: my justice
  alternatives:
  - my judgment
  - my cause
  - my vindication
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, legal case, justice, or vindication. Here the speaker entrusts his rightful case to God. 'My justice' keeps the noun's semantic link to what is just/right while avoiding over-interpretation; the legal-vindicatory nuance is preserved in a footnote alternative.
- source_word: אֶת יְהוָה
  chosen: with the LORD
  alternatives:
  - before the LORD
  - from the LORD
  lexicon: HALOT
  rationale: The preposition is not explicit; אֵת here functions in a sense akin to 'with' in possession or custody. 'With the LORD' best reflects that the speaker's just cause rests in God's hands. The divine name follows the project's default rendering 'the LORD' for יְהוָה.
- source_word: וּפְעֻלָּתִי
  chosen: and my reward
  alternatives:
  - and my recompense
  - and my wages
  - and my work
  lexicon: HALOT
  rationale: פְעֻלָּה can denote work, deed, wages, or recompense. In parallel with מִשְׁפָּטִי and in context of apparent fruitlessness, 'reward' best captures the expected outcome entrusted to God.
- source_word: אֶת אֱלֹהָי
  chosen: is with my God
  alternatives:
  - is before my God
  - comes from my God
  lexicon: HALOT
  rationale: As with אֶת יְהוָה, the sense is that the speaker's recompense is in God's keeping. 'With my God' preserves the parallelism and avoids adding a stronger directional nuance than the Hebrew requires.
