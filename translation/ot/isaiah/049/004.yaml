theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of מִשְׁפָּטִי in the servant's speech
  chosen_reading: my justice
  alternative_readings:
  - my cause
  - my vindication
  - my judgment
  rationale: The verse expresses confidence that the servant's right and just case rests with God. 'My justice' preserves the lexical breadth and theological tension without narrowing the phrase to either a purely forensic 'case' or a fully resolved 'vindication.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
