id: ISA.49.26
reference: Isaiah 49:26
source:
  edition: WLC
  text: וְ/הַאֲכַלְתִּ֤י אֶת מוֹנַ֨יִ/ךְ֙ אֶת בְּשָׂרָ֔/ם וְ/כֶ/עָסִ֖יס דָּמָ֣/ם יִשְׁכָּר֑וּ/ן וְ/יָדְע֣וּ כָל בָּשָׂ֗ר כִּ֣י אֲנִ֤י יְהוָה֙ מֽוֹשִׁיעֵ֔/ךְ וְ/גֹאֲלֵ֖/ךְ אֲבִ֥יר יַעֲקֹֽב־־־׃ס
translation:
  text: I will make those who oppress you eat their own flesh, and they will become drunk with their own blood as with sweet wine. Then all flesh will know that I, Yahweh, am your Savior and your Redeemer, the Mighty One of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "as with new wine." The Hebrew עָסִיס refers to sweet or freshly pressed wine/juice.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַאֲכַלְתִּי
  chosen: I will make ... eat
  alternatives:
  - I will feed
  - I will cause ... to eat
  lexicon: HALOT
  rationale: 'Hiphil of אכל is causative: not merely ''I will eat'' but ''I will cause/make [someone] eat.'' English ''make ... eat'' is natural and preserves the force.'
- source_word: מוֹנַיִךְ
  chosen: those who oppress you
  alternatives:
  - your oppressors
  - those who mistreat you
  lexicon: HALOT
  rationale: The noun refers to those who maltreat, oppress, or abuse Zion. 'Those who oppress you' is clear modern English and fits the judgment context.
- source_word: בְּשָׂרָם
  chosen: their own flesh
  alternatives:
  - their flesh
  lexicon: HALOT
  rationale: The suffix marks possession; 'their own flesh' makes the reflexive horror explicit in idiomatic English.
- source_word: וְכֶעָסִיס
  chosen: as with sweet wine
  alternatives:
  - as with new wine
  - as with fresh juice
  lexicon: HALOT
  rationale: עָסִיס denotes sweet/new wine or freshly pressed juice, often in poetic contexts. 'Sweet wine' best conveys an intoxicating drink here without sounding overly technical.
- source_word: דָּמָם
  chosen: their own blood
  alternatives:
  - their blood
  lexicon: HALOT
  rationale: As with 'their own flesh,' the possessive suffix is brought out for emphasis and parallelism.
- source_word: יִשְׁכָּרוּן
  chosen: they will become drunk
  alternatives:
  - they will be drunk
  - they will be intoxicated
  lexicon: HALOT
  rationale: The verb means to become drunk/intoxicated. 'Become drunk' is vivid and idiomatic in English.
- source_word: כָל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all people
  - all humanity
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'all flesh.' Because the phrase is common and theologically weighty in prophetic literature, the literal rendering is preserved rather than flattened to 'everyone.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מוֹשִׁיעֵךְ
  chosen: your Savior
  alternatives:
  - the one who saves you
  - your deliverer
  lexicon: HALOT
  rationale: The participial form denotes ongoing identity/function. 'Your Savior' is concise and natural, while preserving the personal covenantal sense.
- source_word: וְגֹאֲלֵךְ
  chosen: your Redeemer
  alternatives:
  - the one who redeems you
  - your kinsman-redeemer
  lexicon: HALOT
  rationale: גאל is a key covenantal term in Isaiah. 'Redeemer' preserves theological continuity better than a more paraphrastic option; 'kinsman-redeemer' would over-specify here.
- source_word: אֲבִיר יַעֲקֹב
  chosen: the Mighty One of Jacob
  alternatives:
  - the Mighty One of Israel
  lexicon: HALOT
  rationale: The Hebrew text here reads 'Jacob,' not 'Israel.' The title אֲבִיר conveys strength/might; 'Mighty One of Jacob' is the standard and accurate rendering.
