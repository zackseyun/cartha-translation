theological_decisions:
- issue: Rendering the violent judgment imagery literally or softening it
  chosen_reading: Retain the cannibalistic and blood-intoxication imagery in direct form
  alternative_readings:
  - Paraphrase as general self-destruction of enemies
  rationale: The Hebrew uses shocking judgment imagery intentionally. Softening it would undertranslate the prophetic rhetoric and obscure the reversal of oppression announced to Zion.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source warrants.'
- issue: Rendering כָל בָּשָׂר
  chosen_reading: all flesh
  alternative_readings:
  - all people
  - all humanity
  rationale: The literal idiom preserves the prophetic register and universal scope without narrowing the expression. It also maintains intertextual resonance within Isaiah and the wider Hebrew Bible.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it unnecessarily.'
