id: ISA.49.7
reference: Isaiah 49:7
source:
  edition: WLC
  text: כֹּ֣ה אָֽמַר יְהוָה֩ גֹּאֵ֨ל יִשְׂרָאֵ֜ל קְדוֹשׁ֗/וֹ לִ/בְזֹה נֶ֜פֶשׁ לִ/מְתָ֤עֵֽב גּוֹי֙ לְ/עֶ֣בֶד מֹשְׁלִ֔ים מְלָכִים֙ יִרְא֣וּ וָ/קָ֔מוּ שָׂרִ֖ים וְ/יִֽשְׁתַּחֲוּ֑וּ לְמַ֤עַן יְהוָה֙ אֲשֶׁ֣ר נֶאֱמָ֔ן קְדֹ֥שׁ יִשְׂרָאֵ֖ל וַ/יִּבְחָרֶֽ/ךָּ־־׃
translation:
  text: 'Thus says Yahweh, the Redeemer of Israel, his Holy One, to one despised in soul, abhorred by the nation, a servant of rulers: Kings will see and rise up, princes also, and they will bow down, because of Yahweh, who is faithful, the Holy One of Israel, who has chosen you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the one despised,' 'to one deeply despised,' or possibly 'despised by people'; the Hebrew expression is compressed and difficult.
    reason: lexical_alternative
  - marker: b
    text: Or 'abhorred by nations' or 'one whom the nation abhors.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a servant of rulers'; Hebrew עֶבֶד can mean either 'servant' or 'slave,' but here the context of humiliation favors 'slave.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew may imply that kings and princes honor the servant, with the LORD as the ultimate reason for that homage; the exact object of 'bow down' is not explicitly stated.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גֹּאֵל
  chosen: Redeemer
  alternatives:
  - kinsman-redeemer
  - rescuer
  lexicon: HALOT
  rationale: '''Redeemer'' preserves the covenantal and salvific force of the participial title while remaining idiomatic in English. ''Kinsman-redeemer'' would over-specify family-law nuance not explicit here.'
- source_word: קְדוֹשׁוֹ
  chosen: his Holy One
  alternatives:
  - his Holy One One
  - the Holy One belonging to him
  lexicon: HALOT
  rationale: The suffix is 3ms ('his'). In context, this is a title for the servant addressed, distinguished from 'the Holy One of Israel' later in the verse. Rendering the suffix explicitly preserves the Hebrew form without forcing a more interpretive paraphrase.
- source_word: לִבְזֹה נֶפֶשׁ
  chosen: to one despised in soul
  alternatives:
  - to the despised one
  - to one deeply despised
  - to one despised by people
  lexicon: HALOT
  rationale: The construction is difficult. 'Despised in soul' keeps the Hebrew noun נֶפֶשׁ visible and avoids over-interpreting whether the sense is 'utterly despised' or 'despised by persons.'
- source_word: לִמְתָעֵב גּוֹי
  chosen: abhorred by the nation
  alternatives:
  - abhorred by nations
  - one whom the nation abhors
  - abhorrent to the nation
  lexicon: HALOT
  rationale: The singular גּוֹי is best taken collectively or as a representative singular. 'Abhorred by the nation' is a natural English rendering that preserves the passive sense toward the servant.
- source_word: לְעֶבֶד מֹשְׁלִים
  chosen: a slave of rulers
  alternatives:
  - servant of rulers
  - bondman of rulers
  lexicon: HALOT
  rationale: Because עֶבֶד here denotes subjection under rulers, 'slave' better preserves the bonded and humiliated status than the softer 'servant,' in line with the project's guidance to use stronger bonded language where salient.
- source_word: מְלָכִים יִרְאוּ וָקָמוּ
  chosen: Kings will see and rise up
  alternatives:
  - Kings will see and stand up
  - Kings will see and arise
  lexicon: HALOT
  rationale: '''Rise up'' naturally conveys the gesture of honor in context. ''See'' is retained literally rather than paraphrased as ''see you'' since the object is implied from context.'
- source_word: שָׂרִים וְיִשְׁתַּחֲווּ
  chosen: princes also, and they will bow down
  alternatives:
  - princes, and they will prostrate themselves
  - officials, and they will bow
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes princes or rulers. 'Bow down' is the standard accessible rendering for השתחוה, preserving the act of homage without over-specifying whether worship is intended toward the servant or toward the LORD.
- source_word: לְמַעַן יְהוָה
  chosen: because of the LORD
  alternatives:
  - for the sake of the LORD
  - on account of the LORD
  lexicon: HALOT
  rationale: The phrase gives the reason for the homage. 'Because of' is idiomatic and clear in modern English while preserving causal force.
- source_word: אֲשֶׁר נֶאֱמָן
  chosen: who is faithful
  alternatives:
  - who is trustworthy
  - because he is faithful
  lexicon: HALOT
  rationale: The Niphal adjective conveys reliability/faithfulness. 'Who is faithful' best matches the relative clause structure and theological tone.
- source_word: קְדֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: This is a standard Isaianic divine title and should be rendered consistently.
- source_word: וַיִּבְחָרֶךָּ
  chosen: who has chosen you
  alternatives:
  - and he chose you
  - who chose you
  lexicon: HALOT
  rationale: In context the prefixed waw continues the relative description of the LORD. English smoothness favors 'who has chosen you,' linking the clause to the preceding divine titles and emphasizing completed divine election.
