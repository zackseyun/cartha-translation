theological_decisions:
- issue: Referent of 'his Holy One' (קְדוֹשׁוֹ)
  chosen_reading: The phrase refers to the servant addressed, not to the LORD himself.
  alternative_readings:
  - 'appositional to the LORD: ''the Holy One of Israel'' in advance'
  - textually or interpretively emended to avoid the unusual suffix
  rationale: 'The syntax most naturally reads: ''Thus says the LORD, the Redeemer of Israel, his Holy One, to...'' where ''his Holy One'' identifies the servant as belonging to Israel. This preserves the striking servant theology of the passage without importing later christological conclusions into the translation itself.'
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Object of the bowing in 'princes ... will bow down'
  chosen_reading: The text leaves the homage directed in relation to the servant because of the LORD, without specifying worship of the servant as divine worship.
  alternative_readings:
  - they bow to the servant
  - they bow to the LORD
  rationale: The Hebrew sequence allows the servant's exaltation to be the visible occasion, while לְמַעַן יְהוָה gives the ultimate reason. The English wording preserves this ambiguity rather than resolving it dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
