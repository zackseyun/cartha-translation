theological_decisions:
- issue: Whether the homage shown to Zion should be rendered with worship language
  chosen_reading: Rendered as political/social homage ('bow down to you') rather than divine worship.
  alternative_readings:
  - Rendered as 'worship you'
  rationale: Although השתחוה can denote worship, in this context the objects are kings and princesses honoring Zion/Jerusalem as restored by the LORD. Using 'bow down' preserves the concrete act without importing a claim that Zion receives worship due to God alone.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering for יְהוָה.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
