id: ISA.49.23
reference: Isaiah 49:23
source:
  edition: WLC
  text: וְ/הָי֨וּ מְלָכִ֜ים אֹֽמְנַ֗יִ/ךְ וְ/שָׂרֽוֹתֵי/הֶם֙ מֵינִ֣יקֹתַ֔יִ/ךְ אַפַּ֗יִם אֶ֚רֶץ יִשְׁתַּ֣חֲווּ לָ֔/ךְ וַ/עֲפַ֥ר רַגְלַ֖יִ/ךְ יְלַחֵ֑כוּ וְ/יָדַ֨עַתְּ֙ כִּֽי אֲנִ֣י יְהוָ֔ה אֲשֶׁ֥ר לֹֽא יֵבֹ֖שׁוּ קוָֹֽ/י־־׃ס
translation:
  text: Kings will be your foster fathers, and their princesses your nursing mothers. With faces to the ground they will bow down to you, and they will lick the dust of your feet. Then you will know that I am Yahweh; those who wait for me will not be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your foster fathers.' The Hebrew term can denote those who rear, support, or protect.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who hope in me.' The Hebrew verb includes both waiting and hopeful expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְנַיִךְ
  chosen: your guardians
  alternatives:
  - your foster fathers
  - your nurturers
  - your attendants
  lexicon: HALOT
  rationale: The noun from אמן in this context refers to those who support, rear, or protect. 'Guardians' captures the royal patron/protector sense in parallel with 'nursing mothers' better than the more wooden 'foster fathers,' while still preserving the caregiving image.
- source_word: שָׂרוֹתֵיהֶם
  chosen: their princesses
  alternatives:
  - their queens
  - their noblewomen
  lexicon: HALOT
  rationale: The feminine plural of שׂר denotes female rulers or noblewomen. 'Princesses' is a natural rendering paired with 'kings,' though 'queens' is possible in context. The possessive 'their' indicates the women associated with those kings.
- source_word: מֵינִיקֹתַיִךְ
  chosen: your nursing mothers
  alternatives:
  - your wet nurses
  - those who nurse you
  lexicon: HALOT
  rationale: '''Nursing mothers'' is idiomatic modern English and preserves the maternal image. ''Wet nurses'' is more specific but sounds overly clinical in contemporary English.'
- source_word: אַפַּיִם אֶרֶץ
  chosen: with faces to the ground
  alternatives:
  - face to the earth
  - with noses to the ground
  lexicon: HALOT
  rationale: Literally 'nostrils/face, earth,' an idiom for prostration. 'With faces to the ground' communicates the posture clearly in natural English without flattening the vividness.
- source_word: יִשְׁתַּחֲווּ לָךְ
  chosen: they will bow down to you
  alternatives:
  - they will prostrate themselves before you
  - they will worship you
  lexicon: HALOT
  rationale: The verb commonly denotes bowing/prostration. 'Bow down to you' preserves the act of homage without implying divine worship as the primary sense here.
- source_word: וַעֲפַר רַגְלַיִךְ יְלַחֵכוּ
  chosen: they will lick the dust of your feet
  alternatives:
  - they will lick the dust at your feet
  lexicon: HALOT
  rationale: The expression is intentionally vivid and humiliating, depicting total submission. The more literal 'of your feet' is retained to preserve the imagery, though English could smooth it to 'at your feet.'
- source_word: וְיָדַעַתְּ
  chosen: Then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction plus perfect in prophetic discourse often carries consequential force. 'Then' brings out the resultative sense in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא יֵבֹשׁוּ
  chosen: will not be put to shame
  alternatives:
  - will not be ashamed
  - will not be disappointed
  lexicon: HALOT
  rationale: The passive-like English 'be put to shame' best reflects the Hebrew sense of not ending in disgrace or public humiliation, stronger than mere inward embarrassment.
- source_word: קוָֹי
  chosen: those who wait for me
  alternatives:
  - those who hope in me
  - those who look eagerly for me
  lexicon: HALOT
  rationale: The participial form from קוה can mean wait or hope. 'Wait for me' preserves the temporal and trust dimensions and is a common, contextually fitting rendering; the hope nuance is preserved in a footnote.
