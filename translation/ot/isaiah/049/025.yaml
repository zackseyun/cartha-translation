id: ISA.49.25
reference: Isaiah 49:25
source:
  edition: WLC
  text: כִּי כֹ֣ה אָמַ֣ר יְהוָ֗ה גַּם שְׁבִ֤י גִבּוֹר֙ יֻקָּ֔ח וּ/מַלְק֥וֹחַ עָרִ֖יץ יִמָּלֵ֑ט וְ/אֶת יְרִיבֵ/ךְ֙ אָנֹכִ֣י אָרִ֔יב וְ/אֶת בָּנַ֖יִ/ךְ אָנֹכִ֥י אוֹשִֽׁיעַ־׀־־־׃
translation:
  text: 'For thus says Yahweh: Even the captives of the mighty will be taken away, and the prey of the ruthless will escape; and I myself will contend with the one who contends with you, and I myself will save your children.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the prey of the tyrant."
    reason: lexical_alternative
  - marker: b
    text: Literally "your sons."
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English substitute for the Tetragrammaton rather than transliterating it.
- source_word: שְׁבִי
  chosen: captives
  alternatives:
  - captivity
  - captive
  lexicon: HALOT
  rationale: In context with יֻקָּח ('will be taken'), the noun is best understood concretely as persons held captive rather than the abstract 'captivity.' English plural 'captives' brings out the collective sense naturally.
- source_word: גִבּוֹר
  chosen: the mighty
  alternatives:
  - warrior
  - strong man
  - hero
  lexicon: HALOT
  rationale: The term denotes a powerful warrior-like figure. 'The mighty' is idiomatic and broad enough for the oppressor in context, without over-specifying military imagery.
- source_word: יֻקָּח
  chosen: will be taken away
  alternatives:
  - will be taken
  - will be seized
  lexicon: HALOT
  rationale: The passive verb from לקח here describes removal from the captor's possession. 'Taken away' makes the reversal clearer in English than the bare 'taken'.
- source_word: מַלְקוֹחַ
  chosen: the prey
  alternatives:
  - booty
  - what was taken
  - captives
  lexicon: HALOT
  rationale: The noun refers to that which has been seized. 'Prey' fits the parallelism with 'captives' and preserves the image of victims or spoil held by an oppressor.
- source_word: עָרִיץ
  chosen: the ruthless
  alternatives:
  - the tyrant
  - the terrible one
  lexicon: HALOT
  rationale: The adjective/noun denotes a violent, ruthless oppressor. 'The ruthless' is clear modern English and avoids the archaic feel of 'terrible one.'
- source_word: יִמָּלֵט
  chosen: will escape
  alternatives:
  - will be delivered
  - will slip away
  lexicon: HALOT
  rationale: The Niphal of מלט often carries the sense of escaping or being delivered. 'Will escape' preserves the vividness of release while fitting the passive-reflexive nuance in context.
- source_word: יְרִיבֵךְ
  chosen: the one who contends with you
  alternatives:
  - your adversary
  - those who strive with you
  lexicon: HALOT
  rationale: The participial form from ריב is singular with 2fs suffix. Rendering it verbally as 'the one who contends with you' preserves the legal-dispute imagery and the singular form better than the more generic 'adversary.'
- source_word: אָרִיב
  chosen: will contend
  alternatives:
  - will plead
  - will fight
  - will take up the case against
  lexicon: HALOT
  rationale: The verb ריב can denote legal contention or active dispute. 'Will contend' preserves the lexical link with יְרִיבֵךְ and keeps the ambiguity between courtroom advocacy and active opposition.
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I indeed
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'I myself' reflects the emphasis in both clauses and highlights the LORD's personal intervention.
- source_word: בָּנַיִךְ
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Although literally 'your sons,' in prophetic Zion/Jerusalem imagery the term often functions collectively for descendants. 'Your children' communicates the collective familial sense in natural English without denying the underlying masculine plural; the alternative is preserved in a footnote.
- source_word: אוֹשִׁיעַ
  chosen: will save
  alternatives:
  - will deliver
  - will rescue
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means to save or deliver. 'Will save' is the most direct rendering and preserves the theological resonance of divine salvation.
