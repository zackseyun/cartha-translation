id: ISA.49.18
reference: Isaiah 49:18
source:
  edition: WLC
  text: שְׂאִֽי סָבִ֤יב עֵינַ֨יִ/ךְ֙ וּ/רְאִ֔י כֻּלָּ֖/ם נִקְבְּצ֣וּ בָֽאוּ לָ֑/ךְ חַי אָ֣נִי נְאֻם יְהוָ֗ה כִּ֤י כֻלָּ/ם֙ כָּ/עֲדִ֣י תִלְבָּ֔שִׁי וּֽ/תְקַשְּׁרִ֖י/ם כַּ/כַּלָּֽה־־־־׃
translation:
  text: 'Lift up your eyes all around and see: they all gather together; they come to you. As I live, declares Yahweh, you will surely put them all on like an ornament and bind them on like a bride.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "like an ornament"; the Hebrew term refers to adornment or jewelry.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאִי
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative feminine singular from נשׂא addressed to Zion/Jerusalem personified as a woman. 'Lift up' is idiomatic English for raising the eyes.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: Adverbial use indicating looking in every direction. 'All around' is natural modern English and preserves the comprehensive sense.
- source_word: עֵינַיִךְ
  chosen: your eyes
  lexicon: HALOT
  rationale: Dual/plural noun with 2fs suffix; straightforwardly rendered 'your eyes,' matching the feminine addressee.
- source_word: וּרְאִי
  chosen: and see
  alternatives:
  - look
  lexicon: HALOT
  rationale: Second imperative continues the summons. 'See' fits the Hebrew verb ראה and pairs well with 'Lift up your eyes.'
- source_word: כֻּלָּם
  chosen: they all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Collective pronoun referring to the returning children/people in context. 'They all' reads smoothly in English while preserving totality.
- source_word: נִקְבְּצוּ
  chosen: gather together
  alternatives:
  - are gathered
  - assemble
  lexicon: HALOT
  rationale: Nifal perfect/plural of קבץ, here with present vividness in prophetic discourse. 'Gather together' preserves the reflexive/passive nuance and collective movement.
- source_word: בָאוּ לָךְ
  chosen: they come to you
  alternatives:
  - have come to you
  - come to you
  lexicon: HALOT
  rationale: Sequential perfects in prophetic vision can be rendered with English present for vivid immediacy. 'They come to you' fits the scene of Zion beholding her children returning.
- source_word: חַי אָנִי
  chosen: As I live
  alternatives:
  - By my life
  lexicon: HALOT
  rationale: Standard divine oath formula. 'As I live' is the established and clear English equivalent.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Prophetic speech formula. 'Declares the LORD' is idiomatic and weighty without archaism. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: surely
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here introduces the content of the oath with emphatic force more than simple causation. 'Surely' conveys the asseverative sense in English.
- source_word: כָּעֲדִי
  chosen: like jewelry
  alternatives:
  - as an ornament
  - like adornment
  lexicon: HALOT
  rationale: עֲדִי denotes ornament/adornment/jewelry. 'Like jewelry' is accessible modern English and suits the bridal imagery.
- source_word: תִלְבָּשִׁי
  chosen: you will put ... on
  alternatives:
  - you will wear
  - you will clothe yourself with
  lexicon: HALOT
  rationale: לבשׁ with an object of adornment naturally means to wear/put on. 'Put them all on' works smoothly with 'like jewelry' and keeps the metaphor concrete.
- source_word: וּתְקַשְּׁרִים
  chosen: and bind them on
  alternatives:
  - and fasten them on
  - and gird yourself with them
  lexicon: HALOT
  rationale: From קשר, 'bind/tie.' With 3mp suffix it refers to fastening the returning children metaphorically as ornaments. 'Bind them on' preserves the physical imagery.
- source_word: כַּכַּלָּה
  chosen: like a bride
  alternatives:
  - as a bride
  lexicon: HALOT
  rationale: The simile compares Zion's adornment with bridal adornment. 'Like a bride' is natural and preserves the feminine imagery.
