id: ISA.49.22
reference: Isaiah 49:22
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר אֲדֹנָ֣/י יְהוִ֗ה הִנֵּ֨ה אֶשָּׂ֤א אֶל גּוֹיִם֙ יָדִ֔/י וְ/אֶל עַמִּ֖ים אָרִ֣ים נִסִּ֑/י וְ/הֵבִ֤יאוּ בָנַ֨יִ/ךְ֙ בְּ/חֹ֔צֶן וּ/בְנֹתַ֖יִ/ךְ עַל כָּתֵ֥ף תִּנָּשֶֽׂאנָה־־־־׃
translation:
  text: 'Thus says the Lord GOD: Behold, I will lift up my hand to the nations, and raise my banner to the peoples; and they will bring your sons in their bosom, and your daughters will be carried on the shoulder.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raise my signal' or 'raise my standard' for 'raise my banner.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the bosom' or 'in the fold [of the garment]'; the sense is that the children are carried close against the body.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title combination in the conventional English form 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD' by default; in the compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' and uses 'Lord GOD' to preserve distinction and readability.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Kept the deictic/interjection with elevated but still intelligible diction to preserve prophetic force. 'Behold' fits the solemn register better than 'Look' here.
- source_word: אֶשָּׂא ... יָדִי
  chosen: I will lift up my hand
  alternatives:
  - I will raise my hand
  lexicon: HALOT
  rationale: The idiom is transparent in English and likely signals a public gesture of summons or signal. 'Lift up' preserves the Hebrew verbal imagery.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  lexicon: HALOT
  rationale: In Isaiah this term commonly denotes peoples/nations broadly, not specifically 'Gentiles' in a later technical sense. 'Nations' is the most contextually appropriate and natural rendering.
- source_word: אָרִים נִסִּי
  chosen: raise my banner
  alternatives:
  - lift up my signal
  - raise my standard
  lexicon: HALOT
  rationale: נֵס can denote a signal pole, standard, or banner. 'Banner' communicates the image clearly in modern English while preserving the public rallying/summoning sense.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: Rendered distinctly from גּוֹיִם as 'peoples' to reflect the lexical variation and parallelism without forcing an artificial distinction stronger than the Hebrew requires.
- source_word: וְהֵבִיאוּ
  chosen: they will bring
  alternatives:
  - they shall bring
  lexicon: HALOT
  rationale: Simple future best fits the prophetic promise in contemporary English.
- source_word: בָנַיִךְ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: Gender-specific language is present in the Hebrew and is matched in English per the gender-accurate principle; the following 'your daughters' confirms the deliberate pairing.
- source_word: בְּחֹצֶן
  chosen: in their arms
  alternatives:
  - in the bosom
  - in the fold of the garment
  - on the hip
  lexicon: HALOT
  rationale: The noun refers literally to the bosom/lap/fold, often the place where a child is carried. 'In their arms' gives the natural English sense of being carried close to the chest without introducing awkward literalism.
- source_word: בְנֹתַיִךְ
  chosen: your daughters
  alternatives:
  - your female children
  lexicon: HALOT
  rationale: Direct, gender-accurate rendering of the Hebrew plural.
- source_word: עַל כָּתֵף תִּנָּשֶׂאנָה
  chosen: will be carried on the shoulder
  alternatives:
  - will be borne on shoulders
  lexicon: HALOT
  rationale: The passive sense is explicit in the Niphal. Singular 'shoulder' is retained as a natural collective/body-part singular in English, closely matching the Hebrew.
