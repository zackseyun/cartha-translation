theological_decisions:
- issue: Interpretation of וְיִשְׂרָאֵל לֹא יֵאָסֵף
  chosen_reading: Read in the main text as 'and that Israel might be gathered to him,' with the negative-text alternative preserved in a footnote.
  alternative_readings:
  - and Israel is not gathered
  - though Israel is not gathered
  - and Israel will not be gathered
  rationale: The MT consonants yield 'not be gathered,' but the immediate parallelism and servant-mission context strongly favor 'to him/be gathered to him,' likely reflecting an ancient reading tradition also seen in versions. To preserve theological and textual transparency, the more coherent reading is placed in the main text while the MT-negative sense is footnoted rather than erased.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
