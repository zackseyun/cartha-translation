id: ISA.49.5
reference: Isaiah 49:5
source:
  edition: WLC
  text: וְ/עַתָּ֣ה אָמַ֣ר יְהוָ֗ה יֹצְרִ֤/י מִ/בֶּ֨טֶן֙ לְ/עֶ֣בֶד ל֔/וֹ לְ/שׁוֹבֵ֤ב יַֽעֲקֹב֙ אֵלָ֔י/ו וְ/יִשְׂרָאֵ֖ל לא יֵאָסֵ֑ף וְ/אֶכָּבֵד֙ בְּ/עֵינֵ֣י יְהוָ֔ה וֵ/אלֹהַ֖/י הָיָ֥ה עֻזִּֽ/י׀׃
translation:
  text: And now Yahweh says—he who formed me from the womb to be his servant, to bring Jacob back to him, and that Israel might be gathered to him[a]—yet I am honored in the eyes of Yahweh, and my God has become my strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew consonantal text reads 'and Israel not will be gathered' (or 'though Israel is not gathered'). Many ancient interpreters and versions understand the sense as 'and Israel might be gathered to him,' which fits the parallel line 'to bring Jacob back to him.'
    reason: textual_variant
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English Bible convention.
- source_word: יֹצְרִי מִבֶּטֶן
  chosen: he who formed me from the womb
  alternatives:
  - my former from the womb
  - he who fashioned me from the womb
  lexicon: HALOT
  rationale: יֹצֵר denotes forming/fashioning, often with intentional craftsmanship. 'From the womb' preserves the prepositional phrase and the prophetic-servant calling from birth.
- source_word: לְעֶבֶד לוֹ
  chosen: to be his servant
  alternatives:
  - as a servant to him
  - to be his slave
  lexicon: HALOT
  rationale: עֶבֶד can mean servant or slave. Here the focus is vocational service in the servant-song context rather than bonded-status emphasis, so 'servant' best fits while remaining faithful.
- source_word: לְשׁוֹבֵב יַעֲקֹב אֵלָיו
  chosen: to bring Jacob back to him
  alternatives:
  - to restore Jacob to him
  - to turn Jacob back to him
  lexicon: HALOT
  rationale: 'The Hiphil/causative sense of שוב is restorative: causing Jacob to return. ''Bring back'' is natural English and preserves the movement toward God.'
- source_word: וְיִשְׂרָאֵל לֹא יֵאָסֵף
  chosen: and that Israel might be gathered to him
  alternatives:
  - though Israel is not gathered
  - and Israel will not be gathered
  - and Israel might be assembled
  lexicon: HALOT
  rationale: The consonantal text reads לֹא ('not'), yielding a difficult sense in context. Many understand/point it as לוֹ ('to him'), supported by parallelism with 'to bring Jacob back to him' and ancient versions. Because the alternative is significant, it is preserved in a footnote. The main text adopts the reading that best fits the immediate syntax and sense of the servant's mission.
- source_word: וְאֶכָּבֵד בְּעֵינֵי יְהוָה
  chosen: yet I am honored in the eyes of the LORD
  alternatives:
  - and I will be glorified in the eyes of the LORD
  - and I am weighty in the eyes of the LORD
  lexicon: HALOT
  rationale: כבד in the Niphal conveys being honored/glorified. 'Honored' is idiomatic and readable, while 'yet' brings out the contrast with the servant's apparent lack of success if the difficult reading is retained in the background.
- source_word: וֵאלֹהַי הָיָה עֻזִּי
  chosen: and my God has become my strength
  alternatives:
  - and my God was my strength
  - and my God has been my stronghold
  lexicon: HALOT
  rationale: 'עֹז denotes strength. The qatal of היה can be rendered as present-resultative in English here: God''s sustaining role is a present reality grounded in prior action. ''Has become my strength'' is natural and preserves the verbal force.'
