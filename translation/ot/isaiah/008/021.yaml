theological_decisions:
- issue: Representative masculine singular in a judgment context
  chosen_reading: Use singular 'he' throughout
  alternative_readings:
  - Use indefinite 'one'
  - Use plural 'they' for generic force
  rationale: The Hebrew consistently uses masculine singular verbal forms and suffixes.
    Per the translation philosophy's gender-accurate principle, the English should
    reflect that grammar rather than flatten it into a plural. The singular here is
    representative, not a claim about exclusively male sufferers.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Reference of 'his God'
  chosen_reading: Render singular as 'his God' without specifying whether the speaker
    is apostate, pagan, or covenant member
  alternative_readings:
  - Interpret as 'his gods'
  - Interpret specifically as the LORD
  rationale: The text says 'his God' and does not explicitly identify the deity by
    the divine name. The translation preserves the wording and theological tension
    rather than resolving the identity more narrowly than the Hebrew warrants.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
