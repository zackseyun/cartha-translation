id: ISA.8.21
reference: Isaiah 8:21
source:
  edition: WLC
  text: וְ/עָ֥בַר בָּ֖/הּ נִקְשֶׁ֣ה וְ/רָעֵ֑ב וְ/הָיָ֨ה כִֽי יִרְעַ֜ב וְ/הִתְקַצַּ֗ף
    וְ/קִלֵּ֧ל בְּ/מַלְכּ֛/וֹ וּ/בֵ/אלֹהָ֖י/ו וּ/פָנָ֥ה לְ/מָֽעְלָ/ה־׃
translation:
  text: And he will pass through it, hard-pressed and hungry; and when he is hungry,
    he will become enraged and curse his king and his God, and he will turn his face
    upward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'look upward.' The Hebrew literally says 'turn upward,' likely describing
      the sufferer lifting his face toward heaven.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר בָּהּ
  chosen: And he will pass through it
  alternatives:
  - And one will pass through it
  - And they will pass through it
  lexicon: HALOT
  rationale: The verb is 3ms singular with a feminine singular pronominal suffix on
    'in/through it.' The singular is retained in English as 'he' for gender-accurate
    representation of the Hebrew grammar, though the referent is representative rather
    than a named male individual. 'Through it' fits the preposition ב with עבר in
    context of traversing the land/distress.
- source_word: נִקְשֶׁה
  chosen: hard-pressed
  alternatives:
  - distressed
  - severely afflicted
  - hard driven
  lexicon: HALOT
  rationale: The participial/adjectival form conveys being in severe straits or under
    pressure. 'Hard-pressed' is idiomatic modern English and preserves the sense of
    affliction without overinterpreting the exact nature of the distress.
- source_word: וְרָעֵב
  chosen: and hungry
  alternatives:
  - and famished
  lexicon: HALOT
  rationale: The adjective straightforwardly denotes hunger. 'Hungry' is the most
    natural rendering; 'famished' would intensify beyond what the Hebrew explicitly
    states.
- source_word: וְהָיָה כִּי יִרְעַב
  chosen: and when he is hungry
  alternatives:
  - and it will happen that when he hungers
  - and when he becomes hungry
  lexicon: HALOT
  rationale: This Hebrew narrative construction introduces the circumstance that follows.
    'When he is hungry' gives clear English while preserving the temporal force of
    כִּי.
- source_word: וְהִתְקַצַּף
  chosen: he will become enraged
  alternatives:
  - he will be furious
  - he will be provoked to anger
  - he will rage
  lexicon: HALOT
  rationale: The hitpael form expresses entering a state of anger or agitation. 'Become
    enraged' captures the inceptive/reflexive nuance better than the flatter 'be angry.'
- source_word: וְקִלֵּל
  chosen: and curse
  alternatives:
  - and revile
  - and speak contemptuously of
  lexicon: HALOT
  rationale: The piel commonly means 'curse.' This is stronger and more direct than
    'revile,' and fits the context of desperate rebellion.
- source_word: בְּמַלְכּוֹ
  chosen: his king
  alternatives:
  - by his king
  lexicon: HALOT
  rationale: With קלל, the preposition marks the object against whom the cursing is
    directed. 'His king' is the natural English object. The possessive is retained.
- source_word: וּבֵאלֹהָיו
  chosen: and his God
  alternatives:
  - and his gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be morphologically plural, with the singular possessive
    and in this context it is best taken as singular, 'his God.' This preserves the
    likely sense that in his distress he curses both earthly and divine authority.
- source_word: וּפָנָה לְמָעְלָה
  chosen: and he will turn his face upward
  alternatives:
  - and he will look upward
  - and he will turn upward
  lexicon: HALOT
  rationale: The verb means 'turn' and the adverb means 'upward.' Supplying 'his face'
    makes the idiom natural in English while preserving the physical gesture implied
    by the Hebrew. 'Look upward' is possible, but 'turn his face upward' stays closer
    to the source and prepares for the following verse's downward look.
