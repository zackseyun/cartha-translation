id: ISA.8.3
reference: Isaiah 8:3
source:
  edition: WLC
  text: וָ/אֶקְרַב֙ אֶל הַ/נְּבִיאָ֔ה וַ/תַּ֖הַר וַ/תֵּ֣לֶד בֵּ֑ן וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י קְרָ֣א שְׁמ֔/וֹ מַהֵ֥ר שָׁלָ֖ל חָ֥שׁ בַּֽז־׃
translation:
  text: So I went near to the prophetess, and she conceived and bore a son. Then the LORD said to me, “Call his name Maher-shalal-hash-baz.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Maher-shalal-hash-baz likely means something like “quick to the plunder, swift to the spoil.”
    reason: lexical_alternative
  - marker: b
    text: Or 'Then I went near to the prophetess, and she conceived and bore a son. Then the LORD said to me, “Call his name Maher-shalal-hash-baz.”'.
    reason: previous_rendering
lexical_decisions:
- source_word: וָאֶקְרַב
  chosen: Then I went near
  alternatives:
  - And I drew near
  - Then I approached
  lexicon: HALOT
  rationale: The verb קרב literally means 'draw near/approach.' In this context it is a modest euphemism for marital relations, but the text itself does not state that explicitly. 'Went near' preserves the Hebrew wording while remaining natural English.
- source_word: הַנְּבִיאָה
  chosen: the prophetess
  alternatives:
  - the female prophet
  lexicon: HALOT
  rationale: The noun is the feminine form of 'prophet.' 'Prophetess' is standard, concise English and preserves the gender marking present in the Hebrew.
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: HALOT
  rationale: The verb הרה means 'conceive/become pregnant.' 'She conceived' is slightly more formal and fits the narrative sequence with 'bore a son.'
- source_word: וַתֵּלֶד בֵּן
  chosen: and bore a son
  alternatives:
  - and gave birth to a son
  lexicon: HALOT
  rationale: ילד plus 'son' is idiomatically 'bore a son.' This is both accurate and natural in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is 'the LORD,' following established reverential convention and the LXX/English Bible pattern.
- source_word: קְרָא שְׁמוֹ
  chosen: Call his name
  alternatives:
  - Name him
  - Call him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'call his name.' Retaining it gives a slightly more formal but still clear rendering and preserves the naming formula common in biblical narrative.
- source_word: מַהֵר שָׁלָל חָשׁ בַּז
  chosen: Maher-shalal-hash-baz
  alternatives:
  - Swift-spoil-speedy-plunder
  - Quick to the plunder, swift to the spoil
  lexicon: HALOT
  rationale: This is functioning as a symbolic personal name, so per translation philosophy personal names are transliterated in the main text rather than translated. Its sense is worth preserving in a footnote because the name is semantically significant.
