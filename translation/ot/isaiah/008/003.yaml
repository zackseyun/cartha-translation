  from: Then I went near to the prophetess, and she conceived and bore a son. Then the LORD said to me, “Call his name Maher-shalal-hash-baz.”
  to: So I went near to the prophetess, and she conceived and bore a son. Then the LORD said to me, “Call his name Maher-shalal-hash-baz.”
  rationale: The Hebrew uses a single, flowing narrative sequence with waw-consecutive verbs. The draft breaks this into two sentences, both beginning with 'Then.' This repetition is slightly clunky in English. Replacing the first 'Then' with 'So' (implying the action follows from the prior context of needing a sign) or simply removing it would create a more natural narrative flow without altering the meaning.
