theological_decisions:
- issue: Whether to make explicit the sexual sense of 'went near to the prophetess'
  chosen_reading: Retain the Hebrew euphemism without expanding it to an explicit paraphrase
  alternative_readings:
  - I had relations with the prophetess
  - I slept with the prophetess
  rationale: The context clearly implies conjugal relations, but the Hebrew uses a restrained expression. Optimal equivalence here preserves the text's own level of explicitness rather than importing a more direct modern paraphrase.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
