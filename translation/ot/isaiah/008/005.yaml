id: ISA.8.5
reference: Isaiah 8:5
source:
  edition: WLC
  text: וַ/יֹּ֣סֶף יְהוָ֔ה דַּבֵּ֥ר אֵלַ֛/י ע֖וֹד לֵ/אמֹֽר׃
translation:
  text: Yahweh spoke to me again, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the LORD added to speak to me again, saying''—an idiom meaning ''The LORD spoke to me again, saying.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: spoke ... again
  alternatives:
  - continued
  - added
  lexicon: HALOT
  rationale: The idiom יסף + infinitive/verb here introduces a renewed act of speaking rather than the wooden English 'added to speak.' Rendering the iterative sense with 'again' is natural English and preserves the discourse function.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דַּבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' In combination with the following לֵאמֹר, 'spoke ... saying' is a standard and transparent rendering.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - with me
  lexicon: HALOT
  rationale: 'The preposition אֶל with first person singular suffix straightforwardly indicates direction toward the prophet: ''to me.'''
- source_word: עוֹד
  chosen: again
  alternatives:
  - further
  - yet
  lexicon: HALOT
  rationale: In this context עוֹד marks repetition/continuation of divine speech. 'Again' is the clearest idiomatic English equivalent.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct of אמר after a speech verb conventionally introduces direct discourse. 'Saying' preserves the formal structure and prepares for the following quotation in the next verse.
