id: ISA.8.8
reference: Isaiah 8:8
source:
  edition: WLC
  text: וְ/חָלַ֤ף בִּֽ/יהוּדָה֙ שָׁטַ֣ף וְ/עָבַ֔ר עַד צַוָּ֖אר יַגִּ֑יעַ וְ/הָיָה֙
    מֻטּ֣וֹת כְּנָפָ֔י/ו מְלֹ֥א רֹֽחַב אַרְצְ/ךָ֖ עִמָּ֥נוּ אֵֽל־־׃ס
translation:
  text: It will sweep on into Judah; it will overflow and pass through; it will reach
    up to the neck. And the spread of its wings will fill the breadth of your land,
    O Immanuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Immanuel means 'God is with us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָלַף
  chosen: it will sweep on
  alternatives:
  - it will pass on
  - it will move through
  lexicon: HALOT
  rationale: In context of the flood/river metaphor from the preceding verse, a more
    vivid motion verb is appropriate than a bare 'pass on.' 'Sweep on' preserves the
    sense of onward movement with destructive force.
- source_word: בִּיהוּדָה
  chosen: into Judah
  alternatives:
  - through Judah
  - in Judah
  lexicon: HALOT
  rationale: With the motion verb, the preposition is best rendered directionally.
    'Into Judah' marks the invasion's advance into the territory, while the following
    verbs express continued movement through it.
- source_word: שָׁטַף
  chosen: it will overflow
  alternatives:
  - it will flood
  - it will inundate
  lexicon: HALOT
  rationale: The verb commonly denotes overflowing or flooding. 'Overflow' keeps the
    water imagery and pairs naturally with the next verb.
- source_word: וְעָבַר
  chosen: and pass through
  alternatives:
  - and overflow over
  - and sweep through
  lexicon: HALOT
  rationale: This continues the invasion/flood metaphor. 'Pass through' is a natural
    English rendering that preserves the sense of traversing the land.
- source_word: עַד צַוָּאר יַגִּיעַ
  chosen: it will reach up to the neck
  alternatives:
  - it will reach to the neck
  lexicon: HALOT
  rationale: This idiom depicts near-total submergence or extreme danger without complete
    destruction. 'Up to the neck' is idiomatic English and preserves the metaphor's
    force.
- source_word: מֻטּוֹת כְּנָפָיו
  chosen: the spread of its wings
  alternatives:
  - the outspread of its wings
  - the stretching out of its wings
  lexicon: HALOT
  rationale: The noun refers to something stretched out or spread. With 'wings' it
    evokes the expansive reach of the invading power. 'Its' refers back to the flood/kingdom
    image as a singular invading force.
- source_word: מְלֹא רֹחַב אַרְצְךָ
  chosen: will fill the breadth of your land
  alternatives:
  - will fill the width of your land
  - will cover your whole land
  lexicon: HALOT
  rationale: '''Breadth'' is a natural rendering of רֹחַב and preserves the image
    of full territorial extent without over-paraphrasing to ''whole land.'''
- source_word: עִמָּנוּ אֵל
  chosen: O Immanuel
  alternatives:
  - God is with us
  - Immanuel
  lexicon: HALOT
  rationale: The Hebrew form here functions as a proper name/address, echoing Isaiah
    7:14. Because the translation philosophy prefers transliterating personal names,
    the main text keeps 'Immanuel.' The vocative 'O' reflects direct address in context.
