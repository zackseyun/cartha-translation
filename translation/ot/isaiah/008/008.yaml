theological_decisions:
- issue: Whether עִמָּנוּ אֵל should be translated as a name or as the clause 'God
    is with us'
  chosen_reading: Render as the proper name/address 'O Immanuel' in the main text
  alternative_readings:
  - God is with us
  - O God-with-us
  rationale: In Isaiah this expression is already introduced as a child-name (7:14),
    so here it is best heard as direct address to that named figure/land-owner rather
    than newly translated as a full clause. This preserves the literary linkage and
    avoids flattening the name into a slogan, while still preserving the meaning in
    a footnote.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    preserve theological tension rather than resolve it.'
