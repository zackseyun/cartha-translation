id: ISA.8.4
reference: Isaiah 8:4
source:
  edition: WLC
  text: כִּ֗י בְּ/טֶ֨רֶם֙ יֵדַ֣ע הַ/נַּ֔עַר קְרֹ֖א אָבִ֣/י וְ/אִמִּ֑/י יִשָּׂ֣א אֶת
    חֵ֣יל דַּמֶּ֗שֶׂק וְ/אֵת֙ שְׁלַ֣ל שֹׁמְר֔וֹן לִ/פְנֵ֖י מֶ֥לֶךְ אַשּֽׁוּר׀־׃ס
translation:
  text: For before the boy knows how to cry, ‘My father’ and ‘My mother,’ the wealth
    of Damascus and the spoil of Samaria will be carried away before the king of Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to call, “My father” and “My mother.”'
    reason: lexical_alternative
  - marker: b
    text: Or 'the plunder of Samaria.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says simply 'the boy'; in context this likely refers to the child
      named in the surrounding passage.
    reason: cross_reference
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation of the preceding sign/oracle. 'For' fits the
    causal/explanatory force in context better than the more ambiguous 'because' or
    emphatic 'indeed'.
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - ere
  - not yet when
  lexicon: HALOT
  rationale: Temporal marker indicating that the following event will occur prior
    to the child's reaching a developmental milestone.
- source_word: יֵדַע
  chosen: knows how
  alternatives:
  - knows
  - learns
  lexicon: HALOT
  rationale: 'With the infinitive קְרֹא, the sense is practical ability or learned
    capacity: ''knows how to cry/call.'' This is idiomatic English and reflects the
    Hebrew construction without over-paraphrase.'
- source_word: הַנַּעַר
  chosen: the boy
  alternatives:
  - the child
  - the young boy
  lexicon: HALOT
  rationale: נַעַר can range from child to youth; here the immediate context is infancy,
    since the milestone is saying 'my father' and 'my mother.' 'Boy' preserves the
    masculine singular and remains natural English.
- source_word: קְרֹא
  chosen: to cry
  alternatives:
  - to call
  - to say
  lexicon: HALOT
  rationale: The verb literally means 'call,' but with direct speech of parental address
    from an infant, 'cry' best captures the act of uttering these words aloud. 'Say'
    is possible but less vivid; 'call' is more formal but slightly stiff in English.
- source_word: אָבִי וְאִמִּי
  chosen: ‘My father’ and ‘My mother,’
  alternatives:
  - ‘Father’ and ‘Mother,’
  - ‘Daddy’ and ‘Mama,’
  lexicon: HALOT
  rationale: The Hebrew forms are explicitly possessive ('my father,' 'my mother').
    This should be preserved. More colloquial renderings like 'Daddy'/'Mama' add interpretive
    color not demanded by the text.
- source_word: יִשָּׂא
  chosen: will be carried away
  alternatives:
  - will carry away
  - will be borne away
  lexicon: HALOT
  rationale: 'Although the form is active, the subject is indefinite/impersonal in
    context, and English naturally renders the sense passively: the goods will be
    taken off. This avoids supplying an explicit agent not stated in the clause, though
    the following phrase implies Assyria.'
- source_word: חֵיל
  chosen: the wealth
  alternatives:
  - the riches
  - the resources
  - the army
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, resources, or military force. Paired
    with 'spoil' and applied to Damascus, the sense here is material wealth/assets
    rather than army.
- source_word: דַּמֶּשֶׂק
  chosen: Damascus
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: שְׁלַל
  chosen: the spoil
  alternatives:
  - the plunder
  - the booty
  lexicon: HALOT
  rationale: A standard term for goods taken in war. 'Spoil' is concise and idiomatic
    in biblical-historical context; 'plunder' is a viable modern alternative.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard English transliteration of the place name, here representing
    the northern kingdom's capital and by extension its assets.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: In this context the phrase most naturally means 'before' in the sense
    of 'before/in front of' the Assyrian king, likely indicating presentation to him
    after conquest.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard construct rendering in clear modern English.
