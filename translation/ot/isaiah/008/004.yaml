theological_decisions:
- issue: Referent of 'the boy'
  chosen_reading: Rendered generically as 'the boy' without identifying him in the
    translation.
  alternative_readings:
  - Isaiah's son Maher-shalal-hash-baz
  - the child as a broader prophetic sign
  rationale: The verse itself says only 'the boy.' While the immediate context strongly
    points to Isaiah's son, the translation should not import that identification
    into the verse text. Interpretation is left to context and notes rather than embedded
    in the wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
