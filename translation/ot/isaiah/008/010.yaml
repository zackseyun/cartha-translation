id: ISA.8.10
reference: Isaiah 8:10
source:
  edition: WLC
  text: עֻ֥צוּ עֵצָ֖ה וְ/תֻפָ֑ר דַּבְּר֤וּ דָבָר֙ וְ/לֹ֣א יָק֔וּם כִּ֥י עִמָּ֖/נוּ
    אֵֽל׃ס
translation:
  text: Make a plan, and it will be thwarted; speak a word, and it will not stand,
    for God is with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for with us is God,'' echoing the name Immanuel (''God with us'')
      in Isaiah 7:14; 8:8.'
    reason: cross_reference
lexical_decisions:
- source_word: עֻצוּ
  chosen: Make a plan
  alternatives:
  - Devise a plan
  - Take counsel
  lexicon: HALOT
  rationale: Imperative plural from יעץ/עוץ in the sense of forming counsel or planning.
    'Make a plan' is natural modern English and preserves the taunting challenge addressed
    to the opponents.
- source_word: עֵצָה
  chosen: a plan
  alternatives:
  - counsel
  - advice
  lexicon: HALOT
  rationale: Object of the verb, denoting counsel/plan. 'Plan' fits the hostile plotting
    context better than 'advice' and reads idiomatically with the verb in English.
- source_word: וְתֻפָר
  chosen: and it will be thwarted
  alternatives:
  - and it will be broken
  - and it will be frustrated
  - and it will come to nothing
  lexicon: HALOT
  rationale: Nifal imperfect of פרר, 'to be broken, frustrated, annulled.' 'Be thwarted'
    captures the defeat of the plotted counsel in clear contemporary English.
- source_word: דַּבְּרוּ
  chosen: speak
  alternatives:
  - declare
  - say
  lexicon: HALOT
  rationale: Imperative plural of דבר. 'Speak' is the most direct equivalent and preserves
    the parallelism with the first colon.
- source_word: דָבָר
  chosen: a word
  alternatives:
  - a matter
  - a proposal
  - a decree
  lexicon: HALOT
  rationale: Although דָבָר can mean 'matter' or 'thing,' in this parallel with 'speak'
    the sense 'word' is primary and preserves the rhetorical force.
- source_word: וְלֹא יָקוּם
  chosen: and it will not stand
  alternatives:
  - and it will not happen
  - and it will not be established
  - and it will not arise
  lexicon: HALOT
  rationale: Qal imperfect of קום here means to stand/hold/be established. 'Will not
    stand' is both literal enough and idiomatic in English for a failed scheme or
    pronouncement.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason the enemies' plans fail. 'For' preserves the concise
    causal connection.
- source_word: עִמָּנוּ אֵל
  chosen: God is with us
  alternatives:
  - God with us
  - God is among us
  lexicon: HALOT
  rationale: Predicate clause formed from the phrase 'with us [is] God.' Rendering
    it as a full English clause communicates the sense clearly while preserving the
    theological weight and the echo of the name Immanuel in the surrounding context.
