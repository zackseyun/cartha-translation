theological_decisions:
- issue: Relation of עִמָּנוּ אֵל to the Immanuel theme in Isaiah 7–8
  chosen_reading: Render the phrase as the clause 'for God is with us' in the main
    text, while preserving its connection to 'Immanuel' in a footnote.
  alternative_readings:
  - for Immanuel
  - for with us is God
  rationale: In immediate context the phrase strongly echoes the name עִמָּנוּאֵל
    ('Immanuel') from Isaiah 7:14 and 8:8. The Hebrew here, however, is written as
    the phrase עִמָּנוּ אֵל rather than the single proper name form, so the main text
    should translate the sense as a clause rather than import the name directly. The
    intertextual connection is important enough to preserve in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
