id: ISA.8.19
reference: Isaiah 8:19
source:
  edition: WLC
  text: וְ/כִֽי יֹאמְר֣וּ אֲלֵי/כֶ֗ם דִּרְשׁ֤וּ אֶל הָ/אֹבוֹת֙ וְ/אֶל הַ/יִּדְּעֹנִ֔ים
    הַֽ/מְצַפְצְפִ֖ים וְ/הַ/מַּהְגִּ֑ים הֲ/לוֹא עַם֙ אֶל אֱלֹהָ֣י/ו יִדְרֹ֔שׁ בְּעַ֥ד
    הַ/חַיִּ֖ים אֶל הַ/מֵּתִֽים־־־־־־׃
translation:
  text: And when they say to you, “Consult the mediums and the spiritists who chirp
    and mutter,” should not a people consult its God? Should they consult the dead
    on behalf of the living?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the ghosts” / “those with familiar spirits” for “the mediums.” The Hebrew
      term אֹבוֹת is traditionally rendered with older occult terminology, but here
      likely refers to necromantic practitioners rather than the spirits themselves.
    reason: lexical_alternative
  - marker: b
    text: Or “who peep and mutter.” The Hebrew imitates eerie, birdlike and murmuring
      sounds associated with spirit consultation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And when
  alternatives:
  - And if
  - For when
  lexicon: HALOT
  rationale: Introduces a conditional or anticipated situation. 'And when' fits the
    discourse flow naturally in English while preserving the sense of an expected
    circumstance better than a bare 'if.'
- source_word: יֹאמְרוּ אֲלֵיכֶם
  chosen: they say to you
  alternatives:
  - they tell you
  - someone says to you
  lexicon: HALOT
  rationale: Straightforward rendering of the 3mp verb plus prepositional object.
    'They say to you' preserves the indefinite plural without over-specifying the
    speakers.
- source_word: דִּרְשׁוּ
  chosen: Consult
  alternatives:
  - Seek
  - Inquire of
  lexicon: HALOT
  rationale: The verb דרש in this context means to seek guidance or inquiry from a
    source. 'Consult' is idiomatic modern English and matches the divinatory context
    better than the more general 'seek.'
- source_word: הָאֹבוֹת
  chosen: the mediums
  alternatives:
  - the ghosts
  - the necromancers
  - those with familiar spirits
  lexicon: HALOT
  rationale: אֹבוֹת here refers to practitioners who mediate the dead, not merely
    the spirits themselves. 'Mediums' is clear, modern, and contextually accurate.
    The traditional 'those with familiar spirits' is less transparent to modern readers.
- source_word: הַיִּדְּעֹנִים
  chosen: the spiritists
  alternatives:
  - the wizards
  - the diviners
  - those who have familiar spirits
  lexicon: HALOT
  rationale: This term denotes occult practitioners associated with spirit consultation.
    'Spiritists' pairs naturally with 'mediums' and avoids the misleading modern fantasy
    connotations of 'wizards.'
- source_word: הַמְצַפְצְפִים
  chosen: who chirp
  alternatives:
  - who peep
  - who twitter
  lexicon: HALOT
  rationale: The participle evokes birdlike squeaking sounds associated with occult
    speech. 'Chirp' communicates the imagery in readable modern English; 'peep' is
    traditional but less natural today.
- source_word: וְהַמַּהְגִּים
  chosen: and mutter
  alternatives:
  - and moan
  - and murmur
  lexicon: HALOT
  rationale: The verb suggests low murmuring or muttering sounds. 'Mutter' is the
    most natural English equivalent in this context and pairs well with 'chirp.'
- source_word: הֲלוֹא עַם אֶל אֱלֹהָיו יִדְרֹשׁ
  chosen: should not a people consult its God?
  alternatives:
  - should not a people inquire of its God?
  - is it not that a people should seek its God?
  lexicon: HALOT
  rationale: Rendered as a rhetorical question. Repeating 'consult' preserves lexical
    consistency with דרש earlier in the verse. 'Its God' reflects the singular suffix
    on אֱלֹהָיו with collective עַם.
- source_word: בְּעַד הַחַיִּים
  chosen: on behalf of the living
  alternatives:
  - for the living
  - concerning the living
  lexicon: HALOT
  rationale: בְּעַד commonly means 'for' or 'on behalf of.' 'On behalf of the living'
    best captures the sense that the dead are being consulted for the sake of those
    still alive.
- source_word: אֶל הַמֵּתִים
  chosen: consult the dead
  alternatives:
  - go to the dead
  - inquire of the dead
  lexicon: HALOT
  rationale: The preposition plus object is elliptical after the prior verb and is
    best completed in English from the context. 'Consult the dead' makes the implied
    contrast explicit and readable.
