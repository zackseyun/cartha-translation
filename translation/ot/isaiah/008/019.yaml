theological_decisions:
- issue: Nature of the rhetorical contrast between seeking God and consulting the
    dead
  chosen_reading: The verse condemns seeking guidance from necromantic practitioners
    instead of from God, without elaborating a broader doctrine of the dead beyond
    the immediate polemic.
  alternative_readings:
  - The verse primarily mocks the irrationality of consulting the dead rather than
    directly forbidding necromancy
  - The verse implies a comprehensive anthropology of the dead's incapacity
  rationale: 'The Hebrew presents a rhetorical rebuke centered on proper source of
    guidance: a people should seek its God, not the dead. The translation preserves
    that contrast without importing additional doctrinal conclusions not explicit
    in the verse.'
  doctrine_reference: Translation philosophy §§1, 3
