theological_decisions:
- issue: Metaphorical judgment language in a stumbling-stone context
  chosen_reading: Retain the concrete sequence of stumbling, falling, being broken,
    being snared, and being captured as judgment imagery without allegorical expansion.
  alternative_readings:
  - Interpret the line more abstractly as general ruin or spiritual downfall
  rationale: The verse continues the immediate context's concrete metaphors of offense
    and judgment. The translation preserves the imagery and theological tension rather
    than resolving it into a single abstract category.
  doctrine_reference: Translation philosophy §3
