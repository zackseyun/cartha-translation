id: ISA.8.15
reference: Isaiah 8:15
source:
  edition: WLC
  text: וְ/כָ֥שְׁלוּ בָ֖/ם רַבִּ֑ים וְ/נָפְל֣וּ וְ/נִשְׁבָּ֔רוּ וְ/נוֹקְשׁ֖וּ וְ/נִלְכָּֽדוּ׃ס
translation:
  text: And many among them will stumble; they will fall and be broken; they will
    be snared and captured.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many will stumble in/by it,' taking the pronoun as referring back to
      the stone/trap imagery in the immediate context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכָשְׁלוּ
  chosen: will stumble
  alternatives:
  - shall stumble
  - will stagger
  lexicon: HALOT
  rationale: כשל commonly denotes stumbling or tottering. 'Will stumble' fits the
    metaphor established in the immediate context of a stone of stumbling and keeps
    the future/result sense natural in English.
- source_word: בָם
  chosen: among them
  alternatives:
  - on them
  - by them
  - in them
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix after 'stumble' is idiomatically
    rendered here as involvement with or among the referent. In context, the sense
    is that many within/among the people addressed will stumble. 'Among them' is clearer
    English than the more wooden 'in them' and avoids the less likely instrumental
    sense 'by them.'
- source_word: רַבִּים
  chosen: many
  alternatives:
  - many people
  - multitudes
  lexicon: HALOT
  rationale: The adjective/substantive means 'many.' The simple gloss preserves the
    Hebrew's brevity and leaves the implied people understood from context.
- source_word: וְנָפְלוּ
  chosen: they will fall
  alternatives:
  - and fall
  lexicon: HALOT
  rationale: נפל is the ordinary verb 'fall.' Repeating the subject in English clarifies
    the chain of consequences.
- source_word: וְנִשְׁבָּרוּ
  chosen: be broken
  alternatives:
  - be shattered
  - be crushed
  lexicon: HALOT
  rationale: The Niphal of שבר here is best rendered passively, 'be broken.' 'Shattered'
    is possible, but 'broken' is more direct and preserves the metaphor without over-intensifying
    it.
- source_word: וְנוֹקְשׁוּ
  chosen: be snared
  alternatives:
  - be trapped
  - be ensnared
  lexicon: HALOT
  rationale: יקשׁ in the Niphal conveys being caught in a snare or trap. 'Be snared'
    preserves the metaphor and pairs well with the following verb.
- source_word: וְנִלְכָּדוּ
  chosen: captured
  alternatives:
  - taken
  - caught
  lexicon: HALOT
  rationale: לכד means to capture or seize. 'Captured' gives a strong finality and
    distinguishes it from the preceding 'be snared,' preserving the progression of
    the Hebrew.
