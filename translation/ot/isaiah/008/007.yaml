id: ISA.8.7
reference: Isaiah 8:7
source:
  edition: WLC
  text: וְ/לָ/כֵ֡ן הִנֵּ֣ה אֲדֹנָ/י֩ מַעֲלֶ֨ה עֲלֵי/הֶ֜ם אֶת מֵ֣י הַ/נָּהָ֗ר הָ/עֲצוּמִים֙
    וְ/הָ֣/רַבִּ֔ים אֶת מֶ֥לֶךְ אַשּׁ֖וּר וְ/אֶת כָּל כְּבוֹד֑/וֹ וְ/עָלָה֙ עַל כָּל
    אֲפִיקָ֔י/ו וְ/הָלַ֖ךְ עַל כָּל גְּדוֹתָֽי/ו־־־־־־־־׃
translation:
  text: Therefore, look, the Lord is bringing up against them the waters of the River,
    mighty and many—the king of Assyria and all his glory. It will rise over all its
    channels and go over all its banks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''The River'' likely refers to the Euphrates, the great river associated
      with Assyria.'
    reason: cultural_note
  - marker: b
    text: Or 'strong and abundant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks consequence from the preceding refusal of the gentle waters of
    Shiloah; 'Therefore' preserves the inferential force in natural English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force without archaic tone.
    'Look' is readable modern English and preserves prophetic vividness.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is not YHWH but אֲדֹנָי, so 'the Lord' is the natural title rendering.
    It signals divine agency without importing the covenant-name convention reserved
    for YHWH.
- source_word: מַעֲלֶה עֲלֵיהֶם
  chosen: is bringing up against them
  alternatives:
  - brings up against them
  - is bringing against them
  lexicon: HALOT
  rationale: The participle gives an imminent or vivid present sense; 'is bringing
    up' preserves the imagery of waters rising/upcoming and the active causation by
    the Lord.
- source_word: מֵי הַנָּהָר
  chosen: the waters of the River
  alternatives:
  - the waters of the Euphrates
  - the river's waters
  lexicon: HALOT
  rationale: Hebrew has 'the River' with the article, which in context likely refers
    to the Euphrates, but the text itself does not name it. Main text preserves the
    source wording; the geographic identification is worth noting in a footnote.
- source_word: הָעֲצוּמִים וְהָרַבִּים
  chosen: mighty and many
  alternatives:
  - strong and abundant
  - powerful and great
  lexicon: HALOT
  rationale: 'Keeps both adjectives distinctly: one stressing force, the other abundance.
    ''Mighty and many'' is concise and preserves the flood metaphor.'
- source_word: אֶת מֶלֶךְ אַשּׁוּר וְאֶת כָּל כְּבוֹדוֹ
  chosen: the king of Assyria and all his glory
  alternatives:
  - the king of Assyria with all his splendor
  - the king of Assyria and all his pomp
  lexicon: HALOT
  rationale: 'Appositional to ''the waters of the River'': the flood symbolizes Assyria''s
    king and imperial might. ''Glory'' is the broadest rendering of כבוד here, encompassing
    splendor, power, and retinue.'
- source_word: וְעָלָה
  chosen: It will rise
  alternatives:
  - and it will rise
  - then it will come up
  lexicon: HALOT
  rationale: Singular verb resumes the flood image as a unified invading force. Capitalized
    sentence-initial 'It' refers back to the River/waters metaphor.
- source_word: אֲפִיקָיו
  chosen: its channels
  alternatives:
  - its streambeds
  - its channels
  lexicon: HALOT
  rationale: Refers to watercourses/channels. 'Channels' is natural English and fits
    the flood imagery better than the more technical 'streambeds' in this context.
- source_word: וְהָלַךְ עַל כָּל גְּדוֹתָיו
  chosen: go over all its banks
  alternatives:
  - overflow all its banks
  - pass along all its banks
  lexicon: HALOT
  rationale: The idiom describes floodwaters exceeding normal boundaries. 'Go over
    all its banks' is slightly more literal than 'overflow' while still clear in English.
