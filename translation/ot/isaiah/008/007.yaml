theological_decisions:
- issue: Identity of the invading waters
  chosen_reading: The 'waters of the River' metaphorically represent the king of Assyria
    and the full force of his imperial power as an instrument brought by the Lord
    in judgment.
  alternative_readings:
  - A more strictly literal river image without explicit metaphorical force in translation
  rationale: 'The Hebrew itself makes the apposition explicit: ''the waters of the
    River ... the king of Assyria and all his glory.'' The translation preserves both
    the metaphor and its interpretation without adding doctrinal content beyond the
    text.'
