id: ISA.8.12
reference: Isaiah 8:12
source:
  edition: WLC
  text: לֹא תֹאמְר֣וּ/ן קֶ֔שֶׁר לְ/כֹ֧ל אֲשֶׁר יֹאמַ֛ר הָ/עָ֥ם הַ/זֶּ֖ה קָ֑שֶׁר וְ/אֶת
    מוֹרָא֥/וֹ לֹֽא תִֽירְא֖וּ וְ/לֹ֥א תַעֲרִֽיצוּ־־־־׃
translation:
  text: Do not call a conspiracy everything that this people calls a conspiracy, and
    do not fear what they fear, nor be in dread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not say, “A conspiracy,” concerning everything that this people says
      is a conspiracy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'this people,' a collective expression; 'what they fear' renders
      the singular suffix in natural English.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁר / קָשֶׁר
  chosen: conspiracy
  alternatives:
  - plot
  - alliance
  - treason
  lexicon: HALOT
  rationale: The noun denotes a conspiratorial alliance or plot. In this context,
    the repeated use contrasts the people's alarmist labeling with the prophet's required
    response. 'Conspiracy' is the most natural modern English equivalent and preserves
    the political/social sense better than the vaguer 'plot' or the narrower 'treason'.
- source_word: תֹאמְרוּן
  chosen: call
  alternatives:
  - say
  - declare
  lexicon: HALOT
  rationale: 'Although the verb is literally ''say,'' English idiom with a predicate
    noun is better expressed as ''call'': ''Do not call X ...'' This preserves the
    force of assigning a label rather than merely uttering a word.'
- source_word: לְכֹל אֲשֶׁר יֹאמַר הָעָם הַזֶּה
  chosen: everything that this people calls
  alternatives:
  - all that this people says
  - everything of which this people says
  lexicon: HALOT
  rationale: The construction means 'with respect to everything that this people says.'
    Rendering it as 'everything that this people calls' makes explicit the implied
    object-complement relationship in idiomatic English while staying close to the
    Hebrew syntax.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  - this nation
  lexicon: HALOT
  rationale: '''This people'' is a marked biblical expression that can carry a tone
    of distance or rebuke. Retaining it is more faithful than smoothing to ''these
    people'' or broadening to ''this nation.'''
- source_word: מוֹרָאוֹ
  chosen: what they fear
  alternatives:
  - its fear
  - what it fears
  - their object of fear
  lexicon: HALOT
  rationale: The singular suffix likely refers collectively to 'this people.' In natural
    English, the collective is best represented as 'they/their.' The phrase can denote
    either the fear itself or the object feared; 'what they fear' communicates the
    practical sense in context and aligns with the parallel prohibition.
- source_word: תִּירְאוּ
  chosen: fear
  alternatives:
  - be afraid of
  lexicon: HALOT
  rationale: A direct rendering of ירא. 'Fear' preserves the lexical connection with
    מוֹרָא and keeps the parallelism concise.
- source_word: תַעֲרִיצוּ
  chosen: be in dread
  alternatives:
  - be terrified
  - be intimidated
  - tremble
  lexicon: HALOT
  rationale: The Hiphil of ערץ conveys being struck with dread or treating as terrifying.
    'Be in dread' preserves the elevated tone and avoids collapsing it into a mere
    synonym of 'fear,' thus maintaining the Hebrew poetic intensification.
