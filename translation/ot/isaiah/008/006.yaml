id: ISA.8.6
reference: Isaiah 8:6
source:
  edition: WLC
  text: יַ֗עַן כִּ֤י מָאַס֙ הָ/עָ֣ם הַ/זֶּ֔ה אֵ֚ת מֵ֣י הַ/שִּׁלֹ֔חַ הַ/הֹלְכִ֖ים לְ/אַ֑ט
    וּ/מְשׂ֥וֹשׂ אֶת רְצִ֖ין וּ/בֶן רְמַלְיָֽהוּ־־׃
translation:
  text: Because this people has rejected the waters of Shiloah that flow gently, and
    rejoices over Rezin and the son of Remaliah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shiloah is the Hebrew name; Greek tradition gives the form Siloam.
    reason: lexical_alternative
  - marker: b
    text: Or, in a difficult reading, 'and trembles before Rezin and the son of Remaliah.'
      The Hebrew text reads 'rejoices,' but some understand the sense differently
      from the context.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן כִּי
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: The compound conjunction introduces the reason for the coming judgment
    in the following verse. 'Because' is natural modern English and preserves the
    causal force without unnecessary formality.
- source_word: מָאַס
  chosen: has rejected
  alternatives:
  - has despised
  - has refused
  lexicon: HALOT
  rationale: The verb denotes rejection or spurning. 'Has rejected' communicates decisive
    refusal in clear English; 'despised' is possible but can overemphasize emotional
    contempt over covenantal refusal.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular Hebrew phrase is well represented by 'this people.' 'Nation'
    is possible, but 'people' better preserves the prophetic idiom and the relational/covenantal
    nuance.
- source_word: מֵי הַשִּׁלֹחַ
  chosen: the waters of Shiloah
  alternatives:
  - the waters of Siloam
  lexicon: HALOT
  rationale: The Hebrew place-name is שִׁלֹחַ, best transliterated directly as 'Shiloah'
    in keeping with the principle to transliterate names from the source text. 'Siloam'
    reflects the later/Greek form and is worth preserving in a footnote.
- source_word: הַהֹלְכִים לְאַט
  chosen: that flow gently
  alternatives:
  - that go softly
  - that move slowly
  lexicon: HALOT
  rationale: Literally 'that go softly/slowly,' describing the quiet movement of the
    waters. 'Flow gently' is idiomatic English for water while preserving the contrast
    with the overwhelming river imagery in the next verse.
- source_word: וּמְשׂוֹשׂ
  chosen: and rejoices over
  alternatives:
  - and rejoices in
  - and melts in fear before
  lexicon: HALOT
  rationale: The consonantal text naturally yields 'rejoicing/rejoices.' The phrase
    is difficult in context, and some interpreters emend or reinterpret it negatively,
    but the MT should be translated as it stands. 'Over' fits the object marker with
    named persons and keeps the sense broad enough to cover exulting in or aligning
    with them.
- source_word: אֶת רְצִין וּבֶן רְמַלְיָהוּ
  chosen: over Rezin and the son of Remaliah
  alternatives:
  - over Rezin and Remaliah's son
  lexicon: HALOT
  rationale: Personal names are transliterated. 'The son of Remaliah' preserves the
    Hebrew expression, which in Isaiah can carry a slightly distancing or contemptuous
    tone toward Pekah without adding interpretation to the translation.
