theological_decisions:
- issue: Interpretation of וּמְשׂוֹשׂ אֶת רְצִין וּבֶן רְמַלְיָהוּ in a difficult
    context
  chosen_reading: Translate the Masoretic Text straightforwardly as 'and rejoices
    over Rezin and the son of Remaliah'
  alternative_readings:
  - and trembles before Rezin and the son of Remaliah
  - and melts in fear before Rezin and the son of Remaliah
  rationale: The immediate context concerns Judah's rejection of the quiet provision
    symbolized by Shiloah and preference for foreign political realities. The MT reads
    from the root שׂושׂ ('rejoice/exult'), and the translation should not replace
    it with a conjectural negative sense merely to smooth the context. Because the
    clause is difficult and some understand it as fear or panic, the alternative is
    preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
