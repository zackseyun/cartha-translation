id: ISA.8.9
reference: Isaiah 8:9
source:
  edition: WLC
  text: רֹ֤עוּ עַמִּים֙ וָ/חֹ֔תּוּ וְ/הַֽאֲזִ֔ינוּ כֹּ֖ל מֶרְחַקֵּי אָ֑רֶץ הִתְאַזְּר֣וּ
    וָ/חֹ֔תּוּ הִֽתְאַזְּר֖וּ וָ/חֹֽתּוּ־׃
translation:
  text: Be shattered, O peoples, and be broken; listen, all distant parts of the earth.
    Strap yourselves on for battle, and be broken; strap yourselves on for battle,
    and be broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening Hebrew imperative is difficult. It may also be rendered 'Raise
      a war cry, O peoples' or 'Band yourselves together, O peoples.'
    reason: alternative_reading
  - marker: b
    text: Or 'gird yourselves'; the Hebrew refers to preparing oneself, likely for
      conflict.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעוּ
  chosen: Be shattered
  alternatives:
  - Raise a war cry
  - Associate yourselves
  - Be evil/do harm
  lexicon: HALOT
  rationale: 'The form and context are difficult. Traditional English often follows
    a sense like ''associate yourselves'' or, by emendation/alternate understanding,
    ''raise a war cry.'' In this immediate context, however, the parallel with repeated
    וָחֹתּוּ (''and be broken/dismayed'') and the taunting address to hostile nations
    favors an imperative announcing their ruin: ''Be shattered.'' This captures the
    prophetic irony and fits the judgment context of the surrounding verses.'
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  lexicon: HALOT
  rationale: Plural 'peoples' preserves the direct address to multiple foreign groups.
    'Nations' is possible, but 'peoples' more closely reflects עמים and keeps the
    poetic tone.
- source_word: וָחֹתּוּ
  chosen: and be broken
  alternatives:
  - and be shattered
  - and be dismayed
  lexicon: HALOT
  rationale: The verb from חתת can denote being shattered, broken, or dismayed. Because
    the verse repeats the form as the outcome of hostile preparation, 'be broken'
    communicates both defeat and collapse. Variation was minimized for consistency,
    while the first colon's 'Be shattered' already gives rhetorical force.
- source_word: וְהַאֲזִינוּ
  chosen: listen
  alternatives:
  - give ear
  - hear
  lexicon: HALOT
  rationale: A clear modern-English rendering of the Hiphil imperative 'give ear/listen
    attentively.' 'Listen' is readable and preserves the summons.
- source_word: כֹּל מֶרְחַקֵּי אָרֶץ
  chosen: all distant parts of the earth
  alternatives:
  - all far regions of the earth
  - all you remote places of the earth
  lexicon: HALOT
  rationale: This phrase addresses those far away geographically. 'Distant parts of
    the earth' is natural English and preserves the expansive scope of the summons.
- source_word: הִתְאַזְּרוּ
  chosen: Strap yourselves on for battle
  alternatives:
  - gird yourselves
  - arm yourselves
  lexicon: HALOT
  rationale: 'The Hitpael of אזר means to gird oneself, often for strength or battle.
    ''Strap yourselves on for battle'' makes the military/preparatory sense explicit
    in contemporary English without excessive paraphrase. The repeated imperative
    heightens irony: prepare yourselves, yet you will still be broken.'
