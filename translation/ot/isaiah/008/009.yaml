theological_decisions:
- issue: Interpretation of the opening imperative רֹעוּ
  chosen_reading: 'A taunting/judgment summons to the nations: ''Be shattered'''
  alternative_readings:
  - '''Raise a war cry'''
  - '''Associate yourselves'''
  rationale: The verse addresses hostile peoples and repeatedly declares their collapse.
    Rendering the opening as a judgment-laden imperative best preserves the poetic
    force and coherence with the repeated 'and be broken.' Because the Hebrew is debated,
    alternatives are preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §§1, 3, 5
