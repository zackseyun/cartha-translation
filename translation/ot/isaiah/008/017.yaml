id: ISA.8.17
reference: Isaiah 8:17
source:
  edition: WLC
  text: וְ/חִכִּ֨יתִי֙ לַ/יהוָ֔ה הַ/מַּסְתִּ֥יר פָּנָ֖י/ו מִ/בֵּ֣ית יַעֲקֹ֑ב וְ/קִוֵּ֖יתִֽי
    לֽ/וֹ־׃
translation:
  text: And I will wait for the LORD, who is hiding his face from the house of Jacob,
    and I will hope in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who hides his face' or 'who has hidden his face.' The Hebrew participle
      may be understood as ongoing or characteristic action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of Jacob,' a corporate designation for Jacob's descendants,
      that is, Israel.
    reason: cultural_note
lexical_decisions:
- source_word: וְחִכִּיתִי
  chosen: And I will wait
  alternatives:
  - And I will wait patiently
  - And I will tarry
  lexicon: HALOT
  rationale: From חכה, expressing waiting with expectation. 'Wait' is the most natural
    modern English equivalent and preserves the future-oriented trust implied by the
    verb without adding interpretive nuance such as 'patiently.'
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - for Yahweh
  lexicon: HALOT
  rationale: The preposition ל marks the object toward whom the waiting is directed.
    Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: הַמַּסְתִּיר פָּנָיו
  chosen: who is hiding his face
  alternatives:
  - who hides his face
  - who has hidden his face
  lexicon: HALOT
  rationale: The participle of סתר with 'his face' conveys an ongoing or characteristic
    action. 'Who is hiding his face' preserves the participial sense and the covenantal
    idiom of divine withdrawal without overinterpreting it.
- source_word: מִבֵּית יַעֲקֹב
  chosen: from the house of Jacob
  alternatives:
  - from Jacob's house
  - from the family of Jacob
  lexicon: HALOT
  rationale: A formal rendering best preserves the corporate covenantal reference.
    'House of Jacob' is a standard biblical expression and should be retained rather
    than flattened to merely 'family' or 'people'.
- source_word: וְקִוֵּיתִי
  chosen: and I will hope
  alternatives:
  - and I will wait expectantly
  - and I will look eagerly
  lexicon: HALOT
  rationale: From קוה, which overlaps semantically with waiting and hoping. Since
    the first clause already uses 'wait,' rendering this verb as 'hope' preserves
    the poetic parallelism while reflecting the distinct nuance of expectant trust.
- source_word: לוֹ
  chosen: in him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/for him,' idiomatic English
    with קוה commonly takes 'hope in.' This communicates reliance directed toward
    the LORD more naturally in English while staying within optimal equivalence.
