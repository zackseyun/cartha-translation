theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Divine hiding of the face
  chosen_reading: Retain the idiom 'hiding his face' without interpretive expansion
  alternative_readings:
  - turning away from the house of Jacob
  - withdrawing his favor from the house of Jacob
  rationale: The Hebrew idiom carries covenantal and theological weight. Expanding
    it to 'withdrawing favor' would interpret rather than translate. The text's tension
    should be preserved.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
