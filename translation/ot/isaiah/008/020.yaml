id: ISA.8.20
reference: Isaiah 8:20
source:
  edition: WLC
  text: לְ/תוֹרָ֖ה וְ/לִ/תְעוּדָ֑ה אִם לֹ֤א יֹֽאמְרוּ֙ כַּ/דָּבָ֣ר הַ/זֶּ֔ה אֲשֶׁ֥ר
    אֵֽין ל֖/וֹ שָֽׁחַר־־׃
translation:
  text: To the law and to the testimony! If they do not speak according to this word,
    there is no dawn for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'To the instruction and to the testimony.' The Hebrew torah can mean
      'instruction' as well as 'law.'
    reason: lexical_alternative
  - marker: b
    text: Or 'If they do not say according to this message, for whom there is no dawn.'
      The Hebrew of the final clause is compact and has been understood in more than
      one way.
    reason: alternative_reading
lexical_decisions:
- source_word: לְתוֹרָה
  chosen: to the law
  alternatives:
  - to the instruction
  - to the Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean instruction broadly or law more specifically. In this
    prophetic appeal to the authoritative standard of God, 'law' is concise and idiomatic,
    while still preserving the sense of divine norm. 'Instruction' is possible, and
    'Torah' is more transliterative, but 'law' best fits the parallel with 'testimony'
    in natural English.
- source_word: וְלִתְעוּדָה
  chosen: and to the testimony
  alternatives:
  - and to the witness
  - and to the attestation
  lexicon: HALOT
  rationale: תְּעוּדָה denotes testimony or attestation. 'Testimony' is the most established
    and semantically fitting rendering in parallel with 'law,' conveying an authoritative
    witness or covenantal record.
- source_word: אִם לֹא
  chosen: If ... not
  alternatives:
  - Surely if ... not
  - Indeed, if ... not
  lexicon: HALOT
  rationale: The phrase introduces a conditional statement. Some take אִם here with
    asseverative force, but the straightforward conditional sense works well in context
    and leads naturally into the consequence clause.
- source_word: יֹאמְרוּ
  chosen: they do not speak
  alternatives:
  - they do not say
  lexicon: HALOT
  rationale: אָמַר is commonly 'say,' but 'speak' better suits the broader sense of
    public teaching or pronouncement in context, especially regarding mediums and
    rival guidance in the preceding verses.
- source_word: כַּדָּבָר הַזֶּה
  chosen: according to this word
  alternatives:
  - according to this message
  - like this word
  lexicon: HALOT
  rationale: דָּבָר can mean word, matter, or message. 'According to this word' preserves
    the formal link to an authoritative utterance while remaining readable. 'Message'
    is possible but slightly more interpretive.
- source_word: אֲשֶׁר אֵין לוֹ שָׁחַר
  chosen: there is no dawn for them
  alternatives:
  - for whom there is no dawn
  - there is no light of dawn for him
  - he has no dawn
  lexicon: HALOT
  rationale: 'שַׁחַר is ''dawn.'' The singular pronominal form לוֹ after an indefinite/collective
    subject can be rendered idiomatically in English as ''for them.'' This avoids
    awkward singular-generic English while preserving the sense: those who reject
    this standard remain without light or hope. ''Dawn'' is preferable to the more
    interpretive ''light'' because it keeps the Hebrew image.'
