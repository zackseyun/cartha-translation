theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: The LORD of hosts
  alternative_readings:
  - Yahweh of hosts
  - the LORD of armies
  rationale: The main doctrinally relevant issue is the covenant name. Per DOCTRINE.md,
    YHWH is rendered 'the LORD.' 'Of hosts' is retained to preserve the title's traditional
    and lexical breadth rather than narrowing it to merely military imagery.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → the LORD'
- issue: Force of the command to sanctify YHWH
  chosen_reading: you shall regard him as holy
  alternative_readings:
  - you shall sanctify him
  - you shall treat him as holy
  rationale: This avoids implying that humans confer holiness on God while still preserving
    the command to acknowledge and honor his holiness. It maintains theological clarity
    without paraphrasing beyond the Hebrew sense.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #6 (readable modern English,
    not flattening theological weight)'
