id: ISA.8.13
reference: Isaiah 8:13
source:
  edition: WLC
  text: אֶת יְהוָ֥ה צְבָא֖וֹת אֹת֣/וֹ תַקְדִּ֑ישׁוּ וְ/ה֥וּא מוֹרַאֲ/כֶ֖ם וְ/ה֥וּא
    מַֽעֲרִֽצְ/כֶֽם־׃
translation:
  text: The LORD of hosts—you shall regard him as holy. Let him be your fear, and
    let him be your dread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'you shall sanctify him.' The Hebrew means to acknowledge
      or treat the LORD as holy, not to make him holy.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: The construct title יְהוָה צְבָאוֹת is conventionally and accurately
    rendered 'the LORD of hosts.' 'Hosts' preserves the breadth of the term, which
    can include heavenly and earthly armies, without over-specifying.
- source_word: אֹתוֹ תַקְדִּישׁוּ
  chosen: you shall regard him as holy
  alternatives:
  - you shall sanctify him
  - treat him as holy
  - set him apart as holy
  lexicon: HALOT
  rationale: The Hiphil of קדשׁ here calls for acknowledging or treating YHWH as holy.
    'Regard him as holy' communicates the imperative clearly in modern English while
    preserving the holiness emphasis. 'Sanctify him' is more formal but can sound
    misleading in English, as though humans make God holy rather than recognize him
    as such.
- source_word: מוֹרַאֲכֶם
  chosen: your fear
  alternatives:
  - the one you fear
  - the object of your fear
  lexicon: HALOT
  rationale: The noun מוֹרָא denotes fear, terror, or object of fear. 'Your fear'
    is a close rendering that preserves the Hebrew predicate structure ('he is your
    fear') and the rhetorical force of exclusive reverence toward YHWH.
- source_word: מַעֲרִצְכֶם
  chosen: your dread
  alternatives:
  - your terror
  - the one you dread
  lexicon: HALOT
  rationale: This form denotes that which is dreaded or feared intensely. 'Your dread'
    pairs naturally with 'your fear' and preserves the parallelism without flattening
    the heightened second term into a mere synonym.
- source_word: וְהוּא ... וְהוּא
  chosen: Let him be ... and let him be ...
  alternatives:
  - and he shall be ... and he shall be ...
  - and he is ... and he is ...
  lexicon: HALOT
  rationale: Although the Hebrew uses nominal clauses ('and he [is] your fear ...
    your dread'), English idiom in this exhortational context is best expressed as
    'Let him be ...' This preserves the imperative force flowing from 'you shall regard
    him as holy' and avoids a wooden rendering.
