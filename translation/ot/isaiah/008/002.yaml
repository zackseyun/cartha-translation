id: ISA.8.2
reference: Isaiah 8:2
source:
  edition: WLC
  text: וְ/אָעִ֣ידָה לִּ֔/י עֵדִ֖ים נֶאֱמָנִ֑ים אֵ֚ת אוּרִיָּ֣ה הַ/כֹּהֵ֔ן וְ/אֶת
    זְכַרְיָ֖הוּ בֶּ֥ן יְבֶרֶכְיָֽהוּ־׃
translation:
  text: 'And I will take for myself faithful witnesses: Uriah the priest and Zechariah
    son of Jeberekiah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trustworthy witnesses.' The Hebrew adjective conveys reliability as
      well as faithfulness.
    reason: lexical_alternative
  - marker: b
    text: The verb can also be understood as 'call' or 'appoint' witnesses, emphasizing
      formal legal attestation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָעִידָה
  chosen: And I will take ... witnesses
  alternatives:
  - And I will call witnesses
  - And I will cause witnesses to testify
  - And I will record
  lexicon: HALOT
  rationale: The Hiphil of עוד here carries the sense of formally appointing or securing
    witnesses for attestation. In context of documenting the prophetic sign, 'take
    ... witnesses' is idiomatic English that preserves the legal-attestational force
    without over-paraphrasing. The prefixed conjunction is rendered 'And.'
- source_word: לִּי
  chosen: for myself
  alternatives:
  - for me
  - to me
  lexicon: HALOT
  rationale: The preposition with 1cs suffix marks personal involvement or interest.
    'For myself' best reflects the dative nuance in natural English and preserves
    Isaiah's personal action in securing witnesses.
- source_word: עֵדִים
  chosen: witnesses
  alternatives:
  - testifiers
  lexicon: HALOT
  rationale: Standard legal term for persons who attest an event or document. 'Witnesses'
    is the natural and precise English equivalent.
- source_word: נֶאֱמָנִים
  chosen: faithful
  alternatives:
  - reliable
  - trustworthy
  lexicon: HALOT
  rationale: The adjective denotes reliability and dependability. 'Faithful' is a
    close formal rendering and works idiomatically with 'witnesses,' though the sense
    includes trustworthiness.
- source_word: אֵת
  chosen: ':'
  alternatives:
  - namely
  - —
  lexicon: Hebrew grammar
  rationale: The object marker introduces the named witnesses. In English it is not
    translated lexically; a colon naturally signals the specification of the witnesses
    who follow.
- source_word: אוּרִיָּה
  chosen: Uriah
  lexicon: Hebrew proper name
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Uriah's office. 'The priest' is the direct
    rendering.
- source_word: וְאֶת
  chosen: and
  lexicon: Hebrew grammar
  rationale: The conjunction plus object marker links the second named witness. English
    requires only 'and' before the second name.
- source_word: זְכַרְיָהוּ
  chosen: Zechariah
  alternatives:
  - Zekaryahu
  lexicon: Hebrew proper name
  rationale: Standard English transliteration of the Hebrew personal name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Common patronymic construction. 'Son of' is concise and natural in English.
- source_word: יְבֶרֶכְיָהוּ
  chosen: Jeberekiah
  alternatives:
  - Yeberekiah
  lexicon: Hebrew proper name
  rationale: Transliterated directly from the Hebrew consonantal form according to
    standard convention.
