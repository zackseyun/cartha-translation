id: ISA.8.14
reference: Isaiah 8:14
source:
  edition: WLC
  text: וְ/הָיָ֖ה לְ/מִקְדָּ֑שׁ וּ/לְ/אֶ֣בֶן נֶ֠גֶף וּ/לְ/צ֨וּר מִכְשׁ֜וֹל לִ/שְׁנֵ֨י
    בָתֵּ֤י יִשְׂרָאֵל֙ לְ/פַ֣ח וּ/לְ/מוֹקֵ֔שׁ לְ/יוֹשֵׁ֖ב יְרוּשָׁלִָֽם׃
translation:
  text: And he will become a sanctuary, but a stone to strike against and a rock to
    stumble over for both houses of Israel, a trap and a snare for the inhabitant
    of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a stone of stumbling'; the Hebrew phrase אֶבֶן נֶגֶף overlaps with later
      biblical 'stumbling stone' language, but here 'to strike against' helps distinguish
      it from the next phrase, which explicitly speaks of stumbling.
    reason: lexical_alternative
  - marker: b
    text: Or 'for those who dwell in Jerusalem.' The Hebrew uses a singular participle
      with collective force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And he will become
  alternatives:
  - And he will be
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in prophetic discourse commonly carries
    future sense. 'Become' brings out the predicative transition into the following
    roles more naturally in English, while still staying close to the Hebrew.
- source_word: לְמִקְדָּשׁ
  chosen: a sanctuary
  alternatives:
  - a holy place
  - a sacred place
  lexicon: HALOT
  rationale: מִקְדָּשׁ ordinarily denotes a holy/sanctuary place. 'Sanctuary' preserves
    both the cultic sense and the protective nuance in context, without over-interpreting
    it as merely 'refuge.'
- source_word: אֶבֶן נֶגֶף
  chosen: a stone to strike against
  alternatives:
  - a stone of stumbling
  - a stone of offense
  lexicon: HALOT
  rationale: נֶגֶף denotes a blow, striking, or stumbling-causing impact. Because
    the next phrase already uses explicit stumbling language (מִכְשׁוֹל), rendering
    this phrase as 'to strike against' preserves the distinction between the paired
    metaphors.
- source_word: צוּר מִכְשׁוֹל
  chosen: a rock to stumble over
  alternatives:
  - a rock of stumbling
  - a stumbling rock
  lexicon: HALOT
  rationale: צוּר is 'rock,' and מִכְשׁוֹל is a stumbling block/occasion of stumbling.
    'A rock to stumble over' is idiomatic English and keeps the concrete metaphor.
- source_word: לִשְׁנֵי בָתֵּי יִשְׂרָאֵל
  chosen: for both houses of Israel
  alternatives:
  - for the two houses of Israel
  lexicon: HALOT
  rationale: The phrase refers to the divided kingdoms/judicial entities within Israel.
    'Both houses of Israel' is natural English and preserves the historical-political
    duality.
- source_word: לְפַח
  chosen: a trap
  alternatives:
  - a net
  - a bird-trap
  lexicon: HALOT
  rationale: פַּח commonly denotes a trap, often for birds. 'Trap' is the clearest
    general rendering in modern English.
- source_word: וּלְמוֹקֵשׁ
  chosen: a snare
  alternatives:
  - a lure-trap
  - a noose
  lexicon: HALOT
  rationale: מוֹקֵשׁ is a snare or entangling trap. Keeping 'trap and snare' preserves
    the Hebrew pair rather than collapsing them into one English term.
- source_word: לְיוֹשֵׁב יְרוּשָׁלִָם
  chosen: for the inhabitant of Jerusalem
  alternatives:
  - for those who dwell in Jerusalem
  - for the residents of Jerusalem
  lexicon: HALOT
  rationale: The singular participle can function collectively. 'The inhabitant of
    Jerusalem' preserves the singular form while allowing representative force. A
    more explicit plural is possible but less formally aligned.
