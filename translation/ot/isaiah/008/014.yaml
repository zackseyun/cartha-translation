theological_decisions:
- issue: Referent of the pronoun in 'he will become'
  chosen_reading: The pronoun refers to the LORD, continuing the immediate context
    of Isaiah 8:13.
  alternative_readings:
  - An impersonal or abstract referent tied to the prophetic message
  rationale: The nearest antecedent in context is the LORD of hosts. The verse presents
    him as both sanctuary and stumbling stone, a tension later echoed in canonical
    usage. The translation keeps the pronoun 'he' rather than substituting 'the LORD'
    so as not to overstep the Hebrew wording while preserving the contextual referent.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Rendering the paradox of divine protection and judgment
  chosen_reading: Retain both 'sanctuary' and 'stone/rock... trap/snare' in the main
    text without smoothing the tension.
  alternative_readings:
  - Interpret 'sanctuary' as 'refuge' and the rest as merely human reaction
  rationale: The Hebrew intentionally juxtaposes refuge and offense/judgment in relation
    to the same referent. The translation preserves that paradox rather than narrowing
    it to one theological function.
  doctrine_reference: Preserve theological tension rather than resolve it
