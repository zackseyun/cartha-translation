id: ISA.8.1
reference: Isaiah 8:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י קַח לְ/ךָ֖ גִּלָּי֣וֹן גָּד֑וֹל וּ/כְתֹ֤ב עָלָי/ו֙ בְּ/חֶ֣רֶט אֱנ֔וֹשׁ לְ/מַהֵ֥ר שָׁלָ֖ל חָ֥שׁ בַּֽז־׃
translation:
  text: 'Then Yahweh said to me, “Take for yourself a large tablet and write on it with an ordinary stylus: ‘Maher-shalal-hash-baz.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Maher-shalal-hash-baz, likely meaning “Quick to the plunder, swift to the spoil.”
    reason: lexical_alternative
  - marker: b
    text: Or “with a man’s pen,” “with a common pen,” or “in ordinary script.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the reverential substitution traditional in English Bibles and matching the DOCTRINE.md guidance.
- source_word: גִּלָּיוֹן גָּדוֹל
  chosen: a large tablet
  alternatives:
  - a large scroll
  - a large sheet
  lexicon: HALOT
  rationale: גִּלָּיוֹן denotes a writing surface or tablet/scroll-like object; 'tablet' best fits the context of something written on publicly and legibly, while remaining natural English. גָּדוֹל is rendered straightforwardly as 'large'.
- source_word: וּכְתֹב עָלָיו
  chosen: and write on it
  alternatives:
  - and inscribe on it
  lexicon: HALOT
  rationale: A direct rendering of the imperative plus prepositional phrase. 'Write on it' is clear modern English; 'inscribe' is possible but slightly more formal than needed.
- source_word: בְּחֶרֶט אֱנוֹשׁ
  chosen: with an ordinary stylus
  alternatives:
  - with a man's pen
  - with a common pen
  - in ordinary script
  lexicon: HALOT
  rationale: חֶרֶט is a stylus/engraving tool or pen-like implement. אֱנוֹשׁ here likely conveys ordinary human/common usage rather than emphasizing maleness. 'With an ordinary stylus' captures the sense of writing in normal, publicly readable human script rather than esoteric signs. Because the phrase is somewhat ambiguous, alternatives are preserved in a footnote.
- source_word: לְמַהֵר שָׁלָל חָשׁ בַּז
  chosen: Maher-shalal-hash-baz
  alternatives:
  - Quick to the plunder, swift to the spoil
  lexicon: HALOT
  rationale: This is a symbolic proper name/title phrase that will function as the child's name in context (cf. following verses). Per project philosophy, personal names are transliterated by standard conventions rather than translated in the main text. The lexical sense is preserved in a footnote.
- source_word: קַח לְךָ
  chosen: Take for yourself
  alternatives:
  - Take
  - Get yourself
  lexicon: HALOT
  rationale: The dative לְךָ adds a reflexive/personal nuance. 'Take for yourself' preserves that nuance without awkwardness.
- source_word: וַיֹּאמֶר ... אֵלַי
  chosen: Then the LORD said to me
  alternatives:
  - And the LORD said to me
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
