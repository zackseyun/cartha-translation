theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to translate or transliterate לְמַהֵר שָׁלָל חָשׁ בַּז
  chosen_reading: Transliterate as a proper name in the main text
  alternative_readings:
  - Translate the phrase as 'Quick to the plunder, swift to the spoil'
  rationale: In context this phrase becomes a symbolic name. The project's philosophy says to transliterate names while translating titles. A footnote preserves the lexical meaning.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: ''Translate titles; transliterate names.'''
- issue: Sense of אֱנוֹשׁ in בְּחֶרֶט אֱנוֹשׁ
  chosen_reading: ordinary/common rather than explicitly male
  alternative_readings:
  - with a man's pen
  - in human script
  rationale: Although אֱנוֹשׁ is lexically 'man/human,' the phrase likely contrasts ordinary human writing with specialized or formal inscription. Rendering it as 'ordinary' best captures the idiom in context while avoiding an unnecessarily wooden phrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; gender-accurate over gender-neutral'
