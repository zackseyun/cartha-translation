theological_decisions:
- issue: Whether to render the final clause as future exaltation or continued judgment
  chosen_reading: 'future exaltation: ''he will make glorious'''
  alternative_readings:
  - 'continued judgment: ''he made burdensome'' or similar'
  rationale: The broader context moves from darkness to hope, and the contrast between
    former humiliation and latter honor is the most coherent reading. This also aligns
    with the New Testament's reception of the passage without importing that theology
    into the translation itself.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence guided by source-context.
