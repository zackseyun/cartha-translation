id: ISA.8.23
reference: Isaiah 8:23
source:
  edition: WLC
  text: כִּ֣י לֹ֣א מוּעָף֮ לַ/אֲשֶׁ֣ר מוּצָ֣ק לָ/הּ֒ כָּ/עֵ֣ת הָ/רִאשׁ֗וֹן הֵקַ֞ל
    אַ֤רְצָ/ה זְבֻלוּן֙ וְ/אַ֣רְצָ/ה נַפְתָּלִ֔י וְ/הָ/אַחֲר֖וֹן הִכְבִּ֑יד דֶּ֤רֶךְ
    הַ/יָּם֙ עֵ֣בֶר הַ/יַּרְדֵּ֔ן גְּלִ֖יל הַ/גּוֹיִֽם׃
translation:
  text: For there will be no gloom for her who was in anguish. In the former time
    he brought contempt on the land of Zebulun and the land of Naphtali, but in the
    latter time he will make glorious the way of the sea, beyond the Jordan, Galilee
    of the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Galilee of the Gentiles.' The Hebrew literally says 'Galilee of the
      nations.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew is difficult at the start of the verse; 'gloom' may also be understood
      as 'darkness' or 'dimness.'
    reason: lexical_alternative
  - marker: c
    text: Matthew 4:15-16 cites this region in connection with the beginning of Jesus'
      public ministry.
    reason: cross_reference
lexical_decisions:
- source_word: מוּעָף
  chosen: gloom
  alternatives:
  - weariness
  - darkness
  lexicon: HALOT
  rationale: The noun is rare and difficult, but in context contrasts with the anguish/distress
    of the region and leads naturally into the hope of the following chapter division.
    'Gloom' best captures the sense of oppressive darkness or dimness affecting the
    land/personified region.
- source_word: מוּצָק
  chosen: anguish
  alternatives:
  - distress
  - hardship
  lexicon: HALOT
  rationale: The term denotes being under pressure or distress. 'Anguish' fits the
    emotional and situational force and pairs well with 'gloom' without over-paraphrasing.
- source_word: הֵקַל
  chosen: brought contempt on
  alternatives:
  - made light of
  - treated lightly
  - humbled
  lexicon: HALOT
  rationale: The hiphil of קלל here is the opposite of the later הִכְבִּיד. In this
    geographic-judgment context, the sense is not merely 'lightened' but 'made insignificant'
    or 'brought into contempt.' This preserves the dishonoring force of the earlier
    affliction.
- source_word: הִכְבִּיד
  chosen: will make glorious
  alternatives:
  - will honor
  - will make weighty
  lexicon: HALOT
  rationale: Literally 'make heavy/weighty.' In antithesis to the earlier humiliation,
    the idiomatic sense is best rendered as restoration to honor. 'Will make glorious'
    communicates exaltation in natural English while preserving the reversal motif
    later echoed in Matthew 4:15-16.
- source_word: דֶּרֶךְ הַיָּם
  chosen: the way of the sea
  alternatives:
  - the road by the sea
  - the coastal road
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew expression and its likely
    geographic reference. A more interpretive gloss like 'coastal road' is possible
    but less transparent to the source wording.
- source_word: עֵבֶר הַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - the region across the Jordan
  lexicon: HALOT
  rationale: Standard geographic idiom. 'Beyond the Jordan' preserves the Hebrew compactness
    and leaves the directional standpoint implicit, as in the source.
- source_word: גְּלִיל הַגּוֹיִם
  chosen: Galilee of the nations
  alternatives:
  - Galilee of the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם can mean 'nations' or 'Gentiles.' In Isaiah's Hebrew setting,
    'nations' is the broader and more literal rendering; 'Gentiles' is preserved in
    a footnote because of its prominence in Matthew 4:15 and Christian reception history.
- source_word: כִּי לֹא
  chosen: For there will be no
  alternatives:
  - Surely not
  - Nevertheless there is no
  lexicon: HALOT
  rationale: This opening introduces a reversal from the preceding darkness. 'For
    there will be no' gives coherent forward-looking sense in English and matches
    the prophetic movement from judgment to hope.
- source_word: לַאֲשֶׁר מוּצָק לָהּ
  chosen: for her who was in anguish
  alternatives:
  - for the one who was distressed
  - for the land that was in distress
  lexicon: HALOT
  rationale: The feminine pronominal suffix likely personifies the afflicted region/land.
    'Her who was in anguish' preserves the feminine personification without forcing
    an explicit noun absent from the Hebrew.
