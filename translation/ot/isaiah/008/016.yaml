id: ISA.8.16
reference: Isaiah 8:16
source:
  edition: WLC
  text: צ֖וֹר תְּעוּדָ֑ה חֲת֥וֹם תּוֹרָ֖ה בְּ/לִמֻּדָֽ/י׃
translation:
  text: Bind up the testimony; seal the instruction among my disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the law' or 'the teaching.' The Hebrew torah can denote instruction
      broadly, not only legal code.
    reason: lexical_alternative
  - marker: b
    text: Or 'among my taught ones.' The Hebrew expression refers to those instructed
      by the speaker.
    reason: lexical_alternative
lexical_decisions:
- source_word: צ֖וֹר
  chosen: Bind up
  alternatives:
  - Wrap up
  - Secure
  lexicon: HALOT
  rationale: Imperative 2ms from צור in the sense of binding or wrapping up something
    for safekeeping. 'Bind up' is a natural English imperative that preserves the
    concrete image and the force of securing the document.
- source_word: תְּעוּדָה
  chosen: the testimony
  alternatives:
  - the attestation
  - the witness
  lexicon: HALOT
  rationale: Refers to a formal testimony/witness, likely the prophetic witness just
    given. 'Testimony' is the most idiomatic and contextually fitting rendering in
    prophetic literature.
- source_word: חֲת֥וֹם
  chosen: seal
  alternatives:
  - close up with a seal
  - authenticate with a seal
  lexicon: HALOT
  rationale: Imperative 2ms from חתם, denoting sealing a document. 'Seal' is concise
    and preserves both the literal action and the legal-documentary nuance.
- source_word: תּוֹרָ֖ה
  chosen: the instruction
  alternatives:
  - the law
  - the teaching
  lexicon: HALOT
  rationale: In Isaiah, תורה often denotes prophetic instruction/teaching rather than
    specifically Mosaic law code. 'Instruction' best captures the broader sense in
    readable modern English while preserving theological weight.
- source_word: בְּ/לִמֻּדָֽ/י
  chosen: among my disciples
  alternatives:
  - among my taught ones
  - in my disciples
  lexicon: HALOT
  rationale: From למד in the passive/nominal sense 'those who are taught,' with 1cs
    suffix. 'My disciples' is the most natural English rendering for taught followers/learners
    in this context. The preposition ב is rendered 'among' to express the sphere within
    which the sealing/preservation occurs.
