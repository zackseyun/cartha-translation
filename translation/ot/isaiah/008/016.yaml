theological_decisions:
- issue: Sense of תורה in prophetic context
  chosen_reading: the instruction
  alternative_readings:
  - the law
  - the teaching
  rationale: To avoid importing a narrower legal sense not demanded by the Hebrew,
    the verse is rendered in a way that fits Isaiah's prophetic context. This preserves
    the text's likely reference to prophetic teaching entrusted to Isaiah's followers.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; consistency of key terms, or documented exception.'
