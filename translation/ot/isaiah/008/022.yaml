id: ISA.8.22
reference: Isaiah 8:22
source:
  edition: WLC
  text: וְ/אֶל אֶ֖רֶץ יַבִּ֑יט וְ/הִנֵּ֨ה צָרָ֤ה וַ/חֲשֵׁכָה֙ מְע֣וּף צוּקָ֔ה וַ/אֲפֵלָ֖ה
    מְנֻדָּֽח־׃
translation:
  text: And he will look to the earth, and behold, distress and darkness, the gloom
    of anguish; and he will be driven into thick darkness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land' instead of 'the earth.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is compressed: ''distress and darkness, gloom of anguish, and thick
      darkness, driven away.'' The final phrase may also be understood more literally
      as ''and thick darkness, one driven away.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean either 'land' or 'earth.' Here, after the previous upward/downward
    contrast in context, 'look to the earth' best preserves the broad, cosmic sense
    of looking around for relief and finding none. 'Land' is possible and worth preserving
    as an alternative.
- source_word: יַבִּיט
  chosen: he will look
  alternatives:
  - he will gaze
  - he will look intently
  lexicon: HALOT
  rationale: The Hifil of נבט commonly means 'look' or 'regard.' 'Look' is the most
    natural modern English rendering and fits the sequence of desperate searching
    in context.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - but look
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention to what is seen. 'Behold'
    preserves the force and solemnity without adding interpretation.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - trouble
  - affliction
  lexicon: HALOT
  rationale: צָרָה denotes trouble, distress, or adversity. 'Distress' fits the compressed
    poetic list and pairs well with the following darkness imagery.
- source_word: חֲשֵׁכָה
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: The noun straightforwardly denotes darkness. Since later terms intensify
    the image, retaining the basic 'darkness' here preserves the progression.
- source_word: מְעוּף
  chosen: gloom of
  alternatives:
  - dimness of
  - darkness of
  lexicon: HALOT
  rationale: This rare noun is traditionally understood as 'gloom' or 'darkness,'
    often in construct with the following noun. Rendering it as 'gloom of' preserves
    the likely construct relationship and the poetic intensification.
- source_word: צוּקָה
  chosen: anguish
  alternatives:
  - distress
  - constraint
  lexicon: HALOT
  rationale: צוּקָה denotes anguish, distress, or straits. Because צָרָה already covers
    'distress,' 'anguish' avoids needless repetition while preserving semantic overlap.
- source_word: אֲפֵלָה
  chosen: thick darkness
  alternatives:
  - deep darkness
  - gloom
  lexicon: HALOT
  rationale: אֲפֵלָה refers to deep or thick darkness, stronger than ordinary darkness.
    'Thick darkness' captures the intensified, oppressive image.
- source_word: מְנֻדָּח
  chosen: he will be driven into
  alternatives:
  - driven away into
  - thrust into
  - banished into
  lexicon: HALOT
  rationale: From נדח, the passive participle can describe being driven away or thrust
    out. In context, supplying the implied subject in English ('he will be driven
    into') makes the verbless Hebrew conclusion intelligible while preserving the
    sense of forcible expulsion into darkness.
