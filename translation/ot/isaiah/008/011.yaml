id: ISA.8.11
reference: Isaiah 8:11
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֧ר יְהוָ֛ה אֵלַ֖/י כְּ/חֶזְקַ֣ת הַ/יָּ֑ד וְ/יִסְּרֵ֕/נִי מִ/לֶּ֛כֶת
    בְּ/דֶ֥רֶךְ הָֽ/עָם הַ/זֶּ֖ה לֵ/אמֹֽר־׃
translation:
  text: 'For thus the LORD said to me, with a strong hand upon me, warning me not
    to walk in the way of this people, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'while his hand was strong upon me.' The Hebrew idiom conveys forceful
      divine constraint or compulsion.
    reason: lexical_alternative
  - marker: b
    text: Or 'instructing me' or 'disciplining me.' The verb can carry the sense of
      correction, discipline, or warning; here it introduces a prohibition.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation of the preceding prophetic context. 'For' fits
    the discourse connection naturally in English.
- source_word: כֹה
  chosen: thus
  alternatives:
  - this is what
  - so
  lexicon: HALOT
  rationale: Standard prophetic deictic introducing divine speech; 'thus' preserves
    the formal prophetic register without becoming archaic in this context.
- source_word: אָמַר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Simple past reporting verb; 'said' is the most natural English equivalent
    here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct object of divine speech to Isaiah; straightforward prepositional
    rendering.
- source_word: כְּחֶזְקַת הַיָּד
  chosen: with a strong hand upon me
  alternatives:
  - with strength of hand
  - in the force of the hand
  - while his hand was strong on me
  lexicon: HALOT
  rationale: The idiom conveys overpowering divine constraint or compelling force.
    'With a strong hand upon me' preserves the hand imagery and communicates the forceful
    nature of the experience better than a flattened paraphrase.
- source_word: וְיִסְּרֵנִי
  chosen: warning me
  alternatives:
  - instructing me
  - disciplining me
  - admonishing me
  lexicon: HALOT
  rationale: From יסר, which can denote chasten, discipline, instruct, or warn. In
    this immediate context the content is a prohibition ('not to walk...'), so 'warning
    me' best captures the function of the divine action while remaining faithful to
    the semantic range.
- source_word: מִלֶּכֶת
  chosen: not to walk
  alternatives:
  - from walking
  - from going
  lexicon: HALOT
  rationale: The prefixed מן after יסר expresses prevention from a course of action.
    English idiom prefers 'warning me not to walk' over the more wooden 'warning me
    from walking.' 'Walk' preserves the metaphorical ethical sense.
- source_word: בְּדֶרֶךְ
  chosen: in the way
  alternatives:
  - on the path
  - in the path
  lexicon: HALOT
  rationale: '''Way'' is a common biblical metaphor for conduct or manner of life
    and should be preserved here.'
- source_word: הָעָם הַזֶּה
  chosen: of this people
  alternatives:
  - of these people
  - of this nation
  lexicon: HALOT
  rationale: Singular 'people' matches the Hebrew collective noun and preserves the
    prophetic tone. 'Nation' is possible but less direct.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'and said:'
  lexicon: HALOT
  rationale: Introduces the content of the warning, which continues in the next verse;
    retaining 'saying:' accurately signals that the sentence is incomplete at the
    verse boundary.
