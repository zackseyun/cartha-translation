theological_decisions:
- issue: Referent of the second-person singular pronouns
  chosen_reading: Retain singular 'you' throughout while allowing the corporate referent
    to remain implicit.
  alternative_readings:
  - Render plurally as 'you all' or 'your people' to make the collective sense explicit
  rationale: The Hebrew addresses the people corporately in the singular. Preserving
    singular 'you' follows the source text and maintains the prophetic style without
    importing an interpretive expansion into the main text.
  doctrine_reference: 'Translation philosophy #1, #3, #5'
