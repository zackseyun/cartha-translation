id: ISA.43.5
reference: Isaiah 43:5
source:
  edition: WLC
  text: אַל תִּירָ֖א כִּ֣י אִתְּ/ךָ אָ֑נִי מִ/מִּזְרָח֙ אָבִ֣יא זַרְעֶ֔/ךָ וּ/מִֽ/מַּעֲרָ֖ב
    אֲקַבְּצֶֽ/ךָּ־־׃
translation:
  text: Do not fear, for I am with you; from the east I will bring your offspring,
    and from the west I will gather you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your offspring' is a collective singular; alternatively, 'your descendants.'
    reason: lexical_alternative
  - marker: b
    text: The singular 'you' addresses Israel/Jacob corporately.
    reason: cultural_note
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not be
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive-like verb
    to express prohibition. English 'Do not' cleanly carries the force without adding
    unnecessary wording.
- source_word: תִּירָא
  chosen: fear
  alternatives:
  - be afraid
  lexicon: HALOT
  rationale: Qal imperfect 2ms of ירא in a prohibitive construction. 'Fear' is slightly
    more formal and concise, matching the Hebrew closely; 'be afraid' is possible
    but less direct.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the prohibition. 'For' fits natural English
    biblical style and preserves the explanatory connection.
- source_word: אִתְּךָ אֲנִי
  chosen: I am with you
  alternatives:
  - I am with you personally
  lexicon: HALOT
  rationale: Straightforward existential/presence statement. The pronoun order in
    Hebrew gives emphasis, but standard English word order best communicates it.
- source_word: מִמִּזְרָח
  chosen: from the east
  alternatives:
  - from the sunrise
  - from the eastland
  lexicon: HALOT
  rationale: מִזְרָח literally relates to the place of sunrise, but 'east' is the
    idiomatic and contextually correct geographic rendering.
- source_word: אָבִיא
  chosen: I will bring
  alternatives:
  - I will bring back
  - I will cause to come
  lexicon: HALOT
  rationale: Hiphil of בוא can mean 'bring' or 'cause to come.' In this restoration
    context, 'bring' is the most natural English equivalent. 'Bring back' is interpretive
    and adds a return nuance not explicit in the verb itself.
- source_word: זַרְעֶךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע can denote seed/offspring/descendants. 'Your offspring' preserves
    the collective singular sense in readable modern English better than the archaic-literal
    'seed'; 'descendants' is possible but slightly more interpretive.
- source_word: וּמִמַּעֲרָב
  chosen: and from the west
  alternatives:
  - and from the sunset
  lexicon: HALOT
  rationale: Geographic counterpart to 'from the east.' Though the noun is related
    to sunset/evening, 'west' is the idiomatic sense here.
- source_word: אֲקַבְּצֶךָּ
  chosen: I will gather you
  alternatives:
  - I will gather you in
  - I will assemble you
  lexicon: HALOT
  rationale: Piel of קבץ commonly means gather/collect. With 2ms suffix it addresses
    Zion/Jacob/Israel corporately in the singular. 'Gather you' preserves both the
    directness and the covenant-restoration imagery.
