id: ISA.43.21
reference: Isaiah 43:21
source:
  edition: WLC
  text: עַם זוּ֙ יָצַ֣רְתִּי לִ֔/י תְּהִלָּתִ֖/י יְסַפֵּֽרוּ־׃ס
translation:
  text: This people I formed for myself; they will declare my praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This people I fashioned for myself; they will recount my praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: עַם commonly denotes a people-group. 'People' is the most natural English
    rendering here and fits the covenantal sense without implying a modern nation-state.
- source_word: זוּ
  chosen: this
  alternatives:
  - that
  lexicon: HALOT
  rationale: זוּ is a demonstrative referring to the people just identified. 'This'
    best reflects the proximal force in context.
- source_word: יָצַרְתִּי
  chosen: I formed
  alternatives:
  - I fashioned
  - I created
  lexicon: HALOT
  rationale: יצר often conveys forming or shaping, especially with intentional craftsmanship.
    'Formed' preserves that nuance better than the broader 'created.'
- source_word: לִי
  chosen: for myself
  alternatives:
  - for me
  - as mine
  lexicon: HALOT
  rationale: The preposition ל with first person suffix can be rendered simply 'for
    me,' but 'for myself' brings out the personal and purposive force idiomatically
    in English.
- source_word: תְּהִלָּתִי
  chosen: my praise
  alternatives:
  - my renown
  - praise of me
  lexicon: HALOT
  rationale: תְּהִלָּה normally means praise. In context it is the praise belonging
    to or directed toward God. 'My praise' is the most direct rendering and allows
    the following verb to clarify the sense.
- source_word: יְסַפֵּרוּ
  chosen: they will declare
  alternatives:
  - they will recount
  - they will tell
  - they will proclaim
  lexicon: HALOT
  rationale: ספר in the piel commonly means to recount, tell, or declare. 'Declare'
    fits the elevated prophetic style and pairs naturally with 'my praise' in English.
