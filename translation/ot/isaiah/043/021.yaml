theological_decisions:
- issue: Purpose clause nuance in the verse's second half
  chosen_reading: 'Render the sequence as purpose/result: ''they will declare my praise'''
  alternative_readings:
  - '''that they might declare my praise'''
  - '''they shall recount my praise'''
  rationale: The Hebrew places God's forming of the people before their declaring
    his praise. English can express this naturally with a semicolon and future verb,
    preserving the purposive relationship without adding an explicit conjunction absent
    from the text.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without paraphrastic expansion.'
