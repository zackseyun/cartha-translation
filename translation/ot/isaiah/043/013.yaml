theological_decisions:
- issue: Temporal scope of מִיּוֹם
  chosen_reading: from that day on
  alternative_readings:
  - from today on
  - from ancient days
  - from eternity
  rationale: The Hebrew phrase is terse and contextually debated. This rendering preserves
    ongoing duration without making the stronger metaphysical claim of eternal preexistence
    from this phrase alone, though the broader Isaianic context strongly emphasizes
    God's uniqueness and enduring identity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Self-identification formula אֲנִי הוּא
  chosen_reading: I am he
  alternative_readings:
  - I am the one
  - I am
  rationale: The phrase carries significant theological weight in Isaiah as a declaration
    of God's unique identity. 'I am he' keeps the wording transparent and avoids either
    flattening the formula or overloading it with later doctrinal interpretation not
    explicit in the verse itself.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
