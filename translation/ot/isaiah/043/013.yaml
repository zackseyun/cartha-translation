id: ISA.43.13
reference: Isaiah 43:13
source:
  edition: WLC
  text: גַּם מִ/יּוֹם֙ אֲנִ֣י ה֔וּא וְ/אֵ֥ין מִ/יָּדִ֖/י מַצִּ֑יל אֶפְעַ֖ל וּ/מִ֥י
    יְשִׁיבֶֽ/נָּה־׃ס
translation:
  text: Indeed, from that day on I am he, and there is none who can deliver from my
    hand; I act, and who can turn it back?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from today on,' 'from ancient days,' or more interpretively 'from eternity.'
      The Hebrew phrase is concise and can be understood in more than one temporal
      sense.
    reason: alternative_reading
  - marker: b
    text: Or 'who can reverse it?' The Hebrew literally says 'who can turn it back?'
      referring to God's action.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Indeed
  alternatives:
  - Also
  - Even
  lexicon: HALOT
  rationale: Here גַּם functions as an emphatic particle introducing a strong assertion
    rather than simple addition. 'Indeed' captures the emphatic force in natural English.
- source_word: מִיּוֹם
  chosen: from that day on
  alternatives:
  - from the day
  - from today
  - even from eternity
  lexicon: HALOT
  rationale: The phrase literally means 'from day,' but in context it idiomatically
    marks continuing duration from a point onward. 'From that day on' best reflects
    the temporal force without overreading it as 'from eternity.' Some translations
    take it more absolutely ('from ancient days' or 'from today'), but the Hebrew
    here does not explicitly specify eternity.
- source_word: אֲנִי הוּא
  chosen: I am he
  alternatives:
  - I am the one
  - I am
  lexicon: HALOT
  rationale: This is a weighty self-identification formula in Isaiah. 'I am he' preserves
    the Hebrew expression closely and retains its theological resonance without importing
    later doctrinal phrasing beyond the text.
- source_word: וְאֵין
  chosen: and there is none
  alternatives:
  - and there is no one
  - and none exists
  lexicon: HALOT
  rationale: This introduces the negated existential clause. 'There is none' is concise
    and fits the elevated style of the verse.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  lexicon: HALOT
  rationale: The idiom denotes power, possession, and control. 'From my hand' is the
    most direct rendering and preserves the metaphor.
- source_word: מַצִּיל
  chosen: who can deliver
  alternatives:
  - who rescues
  - a deliverer
  lexicon: HALOT
  rationale: The participle means 'one delivering/rescuing.' In English, supplying
    'who can' yields a natural clause after 'there is none.' 'Deliver' preserves the
    strong salvific/judicial nuance common to נצל.
- source_word: אֶפְעַל
  chosen: I act
  alternatives:
  - I work
  - I do
  lexicon: HALOT
  rationale: The verb פעל is broad ('do, make, work'). 'I act' fits the context of
    decisive divine action and reads naturally with the following rhetorical question.
- source_word: יְשִׁיבֶנָּה
  chosen: turn it back
  alternatives:
  - reverse it
  - bring it back
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause something to return, i.e., to reverse
    or turn back God's action. 'Turn it back' preserves the concrete verbal imagery
    while remaining idiomatic. The feminine suffix is best taken as referring to the
    implied deed/action.
