theological_decisions:
- issue: Meaning of the exchange language involving Egypt, Cush, and Seba
  chosen_reading: The verse speaks of nations given over by God as the price or exchange for Israel's preservation, without specifying a later doctrinal theory of atonement.
  alternative_readings:
  - The language could be read more loosely as political compensation rather than ransom imagery.
  rationale: The immediate context is national deliverance and divine protection. Rendering כָפְרְךָ as 'your ransom' preserves the strong substitution/exchange imagery while avoiding importing later systematic-theological categories not explicit in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
