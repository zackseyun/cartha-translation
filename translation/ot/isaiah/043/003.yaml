id: ISA.43.3
reference: Isaiah 43:3
source:
  edition: WLC
  text: כִּ֗י אֲנִי֙ יְהוָ֣ה אֱלֹהֶ֔י/ךָ קְד֥וֹשׁ יִשְׂרָאֵ֖ל מוֹשִׁיעֶ֑/ךָ נָתַ֤תִּי כָפְרְ/ךָ֙ מִצְרַ֔יִם כּ֥וּשׁ וּ/סְבָ֖א תַּחְתֶּֽי/ךָ׃
translation:
  text: For I am Yahweh your God, the Holy One of Israel, your Savior; I have given Egypt as your ransom, Cush and Seba in exchange for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'instead of you.' The Hebrew phrase at the end of the verse expresses substitution or exchange.
    reason: lexical_alternative
  - marker: b
    text: Cush is the ancient region south of Egypt, often associated with Nubia/Ethiopia.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal force while matching established English convention.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with 2ms suffix; 'God' is the natural English equivalent in this covenant formula.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a recognized Isaianic title. 'The Holy One of Israel' preserves both the title-like force and familiar English idiom.
- source_word: מוֹשִׁיעֶךָ
  chosen: your Savior
  alternatives:
  - the one who saves you
  - your deliverer
  lexicon: HALOT
  rationale: The participle functions substantivally as a title or characterization. 'Your Savior' is concise, natural, and preserves the personal force of the suffix.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground for the reassurance in the surrounding context; 'For' best fits the explanatory connection.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I gave
  lexicon: HALOT
  rationale: The perfect can be rendered as simple past, but present perfect works well in English to express a completed divine act with present relevance in the prophetic context.
- source_word: כָפְרְךָ
  chosen: your ransom
  alternatives:
  - your price of atonement
  - your compensation
  - your redemption price
  lexicon: HALOT
  rationale: כפר here denotes a compensatory price given in place of another, not specifically cultic atonement. 'Ransom' best captures the exchange idea in accessible modern English.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: The project prefers transliterating names rather than translating them into potentially anachronistic modern geopolitical labels.
- source_word: סְבָא
  chosen: Seba
  lexicon: HALOT
  rationale: Standard transliteration of the place name; distinguishes it from Sheba.
- source_word: תַּחְתֶּיךָ
  chosen: in exchange for you
  alternatives:
  - instead of you
  - in your place
  lexicon: HALOT
  rationale: The preposition conveys substitution/exchange. 'In exchange for you' reads naturally with 'ransom' and makes the sense explicit without over-paraphrasing.
