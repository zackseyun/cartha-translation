theological_decisions:
- issue: Corporate singular in reference to Israel
  chosen_reading: Render בְחִירִי as singular ('my chosen one') while retaining עַמִּי
    as 'my people.'
  alternative_readings:
  - my chosen people
  - my chosen ones
  rationale: The Hebrew juxtaposes a plural/collective noun ('my people') with a singular
    adjective used corporately ('my chosen'). Preserving the singular in English reflects
    the source grammar and Isaiah's corporate-personal style without importing a different
    theological nuance.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
