id: ISA.43.20
reference: Isaiah 43:20
source:
  edition: WLC
  text: תְּכַבְּדֵ֨/נִי֙ חַיַּ֣ת הַ/שָּׂדֶ֔ה תַּנִּ֖ים וּ/בְנ֣וֹת יַֽעֲנָ֑ה כִּֽי
    נָתַ֨תִּי בַ/מִּדְבָּ֜ר מַ֗יִם נְהָרוֹת֙ בִּֽ/ישִׁימֹ֔ן לְ/הַשְׁק֖וֹת עַמִּ֥/י
    בְחִירִֽ/י־׃
translation:
  text: The beasts of the field will honor me, jackals and ostriches, because I give
    water in the wilderness, rivers in the wasteland, to give drink to my people,
    my chosen one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dragons' for תַּנִּים in older English tradition; the Hebrew here is
      more likely 'jackals.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'daughters of the ostrich,' an idiom for ostriches; older translations
      sometimes read 'owls.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my chosen'; the Hebrew is singular, likely a corporate reference to
      Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּכַבְּדֵנִי
  chosen: will honor me
  alternatives:
  - will glorify me
  - will give me honor
  lexicon: HALOT
  rationale: Piel of כבד commonly means to honor or glorify. 'Honor me' is natural
    modern English and preserves the sense of ascribing weight/value to God without
    sounding overly liturgical.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the beasts of the field
  alternatives:
  - the wild animals
  - the animals of the field
  lexicon: HALOT
  rationale: This construct phrase is a standard Hebrew expression for wild animals.
    'Beasts of the field' is idiomatic and suitably elevated, while still understandable.
- source_word: תַּנִּים
  chosen: jackals
  alternatives:
  - dragons
  - serpents
  - wild dogs
  lexicon: HALOT
  rationale: In prophetic and poetic contexts this plural is commonly understood as
    jackals rather than mythic dragons. 'Jackals' best fits the wilderness-fauna parallelism
    and modern zoological understanding; the traditional 'dragons' reflects older
    English usage rather than the likely Hebrew sense.
- source_word: בְנוֹת יַעֲנָה
  chosen: ostriches
  alternatives:
  - female ostriches
  - owls
  lexicon: HALOT
  rationale: The expression literally means 'daughters of the ostrich,' an idiom for
    ostriches. English normally omits the literal 'daughters of.' 'Owls' is an older
    traditional rendering but is less likely lexically.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason the animals honor God. 'Because' is clearer in
    contemporary English than 'for.'
- source_word: נָתַתִּי
  chosen: I give
  alternatives:
  - I have given
  - I will give
  lexicon: HALOT
  rationale: Although formally perfect, the verb sits in a prophetic context describing
    God's decisive action, and present English can express the vivid certainty well.
    'I give' keeps the line immediate and poetic.
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' better preserves the broader biblical resonance of uncultivated,
    desolate land and pairs well with Isaiah''s imagery.'
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward rendering.
- source_word: נְהָרוֹת
  chosen: rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: The noun normally denotes rivers. In parallel with 'water in the wilderness,'
    'rivers in the wasteland' heightens the abundance of provision.
- source_word: בִּישִׁימוֹן
  chosen: in the wasteland
  alternatives:
  - in the desert
  - in the desolation
  lexicon: HALOT
  rationale: This term denotes a desolate, barren place. 'Wasteland' is vivid and
    readable, and avoids flattening the parallelism by repeating 'wilderness'.
- source_word: לְהַשְׁקוֹת
  chosen: to give drink to
  alternatives:
  - to water
  - to provide drink for
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'To give drink to' works naturally
    with a human object ('my people') and preserves the concrete image.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; no reason to depart from the usual rendering.
- source_word: בְחִירִי
  chosen: my chosen one
  alternatives:
  - my chosen
  - my elect one
  lexicon: HALOT
  rationale: Singular adjective with first-person suffix is best preserved in English
    as singular, even though it refers corporately to Israel. 'My chosen one' keeps
    the grammar visible; 'my chosen' is possible but less explicit.
