id: ISA.43.4
reference: Isaiah 43:4
source:
  edition: WLC
  text: מֵ/אֲשֶׁ֨ר יָקַ֧רְתָּ בְ/עֵינַ֛/י נִכְבַּ֖דְתָּ וַ/אֲנִ֣י אֲהַבְתִּ֑י/ךָ וְ/אֶתֵּ֤ן
    אָדָם֙ תַּחְתֶּ֔י/ךָ וּ/לְאֻמִּ֖ים תַּ֥חַת נַפְשֶֽׁ/ךָ׃
translation:
  text: Because you are precious in my eyes, honored, and I love you, I give men in
    exchange for you, and peoples in place of your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Since you were precious in my eyes, honored, and I have loved you.'
      The Hebrew verbs can be understood with past or present force in context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will give men in exchange for you, and peoples in place of your life.'
      The Hebrew verb may be read with future force in this prophetic context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - From the time that
  lexicon: HALOT
  rationale: In this context the compound functions causally, introducing the reason
    for YHWH's saving action in the surrounding context. 'Because' is the clearest
    modern English rendering; a temporal sense ('from the time that') is possible
    but less fitting here.
- source_word: יָקַרְתָּ
  chosen: you are precious
  alternatives:
  - you were precious
  - you are valued
  lexicon: HALOT
  rationale: The qatal can be rendered with present force in context, expressing the
    addressee's standing in God's sight rather than merely a past event. 'Precious'
    preserves the lexical sense of being valuable or dear.
- source_word: בְעֵינַי
  chosen: in my eyes
  alternatives:
  - in my sight
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for evaluation or regard. 'In my eyes'
    is transparent and natural in English while preserving the imagery.
- source_word: נִכְבַּדְתָּ
  chosen: honored
  alternatives:
  - glorious
  - weighty
  - you have been honored
  lexicon: HALOT
  rationale: From כבד in the Niphal, the sense is being honored or esteemed. 'Honored'
    fits the relational context better than the more abstract 'glorious' and reads
    smoothly with 'precious.'
- source_word: וַאֲנִי אֲהַבְתִּיךָ
  chosen: and I love you
  alternatives:
  - and I have loved you
  - and I loved you
  lexicon: HALOT
  rationale: The verb expresses YHWH's covenantal love. In context, present English
    best conveys the ongoing reality rather than limiting it to a past act. This also
    preserves the lexical cognate with the doctrine's default rendering of love-language.
- source_word: וְאֶתֵּן
  chosen: I give
  alternatives:
  - I will give
  - I have given
  lexicon: HALOT
  rationale: The yiqtol here can be understood as present-future in a prophetic declaration.
    English present gives a vivid, gnomic-prophetic sense tied to the surrounding
    assurances; future is possible and worth preserving in a footnote.
- source_word: אָדָם
  chosen: men
  alternatives:
  - man
  - humankind
  - people
  lexicon: HALOT
  rationale: Here the singular collective refers to human beings given over in exchange
    for Israel, contrasted with 'peoples' in the next colon. Per doctrine, gender-accurate
    rendering is preferred; 'men' best reflects the Hebrew form and collective-human
    sense in this context better than the abstract 'humankind.'
- source_word: תַּחְתֶּיךָ
  chosen: in exchange for you
  alternatives:
  - instead of you
  - under you
  lexicon: HALOT
  rationale: תחת here carries the substitution/exchange sense, not spatial 'under.'
    'In exchange for you' makes the transactional nuance explicit and natural in English.
- source_word: וּלְאֻמִּים
  chosen: and peoples
  alternatives:
  - and nations
  lexicon: HALOT
  rationale: The term denotes peoples/nations. 'Peoples' avoids flattening the parallelism
    with אדם and preserves the plural ethnic-group sense.
- source_word: תַּחַת נַפְשֶׁךָ
  chosen: in place of your life
  alternatives:
  - instead of your soul
  - for your life
  lexicon: HALOT
  rationale: נפש here refers to life/person rather than an immaterial 'soul' in a
    later theological sense. 'In place of your life' communicates the substitution
    clearly and avoids importing dualistic assumptions.
