theological_decisions:
- issue: Rendering of אָדָם in a collective-human context
  chosen_reading: men
  alternative_readings:
  - humankind
  - people
  rationale: The doctrine excerpt specifies 'man / humankind (context)' and prefers
    gender-accurate renderings over gender-neutral ones. In this verse the word refers
    to human beings given in exchange for Israel, not humanity in the abstract; 'men'
    preserves the Hebrew form and rhetorical force while remaining idiomatic.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
- issue: Rendering of נֶפֶשׁ
  chosen_reading: life
  alternative_readings:
  - soul
  - self
  rationale: To avoid importing later theological anthropology, the phrase is rendered
    according to common Hebrew usage here as 'life.' This preserves the concrete sense
    of the person/life being spared at the cost of others.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Original-language primacy over translation tradition'
