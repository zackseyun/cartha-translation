theological_decisions:
- issue: Forensic language of צדק
  chosen_reading: Rendered in legal-vindication terms ('be proved right') rather than
    overtly doctrinal 'be justified.'
  alternative_readings:
  - you may be justified
  - you may be vindicated
  rationale: The verse is a divine courtroom challenge. The Hebrew supports a legal
    declaration of being in the right; using 'justified' in English could suggest
    Pauline doctrinal categories beyond Isaiah's immediate rhetoric. The chosen wording
    preserves the legal sense without importing later theological systematization.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
