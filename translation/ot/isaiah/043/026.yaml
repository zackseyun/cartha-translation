id: ISA.43.26
reference: Isaiah 43:26
source:
  edition: WLC
  text: הַזְכִּירֵ֕/נִי נִשָּׁפְטָ֖ה יָ֑חַד סַפֵּ֥ר אַתָּ֖ה לְמַ֥עַן תִּצְדָּֽק׃
translation:
  text: Remind me; let us argue the case together. State your case, you, so that you
    may be proved right.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let us enter into judgment together.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'so that you may be justified' or 'vindicated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזְכִּירֵנִי
  chosen: Remind me
  alternatives:
  - Put me in remembrance
  - Call me to mind
  lexicon: HALOT
  rationale: Hiphil imperative of זכר with 1cs suffix means 'cause me to remember/remind
    me.' In this disputation context, 'Remind me' is idiomatic modern English and
    preserves the courtroom challenge.
- source_word: נִשָּׁפְטָה
  chosen: let us argue the case
  alternatives:
  - let us enter into judgment
  - let us be judged
  - let us contend
  lexicon: HALOT
  rationale: 'Niphal cohortative/1cp of שפט in context is forensic and reciprocal:
    entering a legal proceeding together. ''Argue the case'' communicates the judicial
    setting in natural English better than the archaic ''enter into judgment,'' while
    avoiding the misleading passive sense ''be judged''.'
- source_word: יָחַד
  chosen: together
  alternatives:
  - together jointly
  lexicon: HALOT
  rationale: Adverb indicating mutual participation in the legal dispute; 'together'
    is the straightforward rendering.
- source_word: סַפֵּר
  chosen: State your case
  alternatives:
  - Declare
  - Recount
  - Tell it
  lexicon: HALOT
  rationale: Piel imperative of ספר can mean recount, declare, relate. In this legal
    context, 'State your case' makes explicit the forensic force already signaled
    by שפט, without adding content beyond the context.
- source_word: אַתָּה
  chosen: you
  alternatives:
  - you yourself
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis. English can preserve this with explicit
    'you'; retaining it after the imperative ('State your case, you') is awkward but
    reflects the emphasis. The main text keeps a lightly marked apposition for auditability.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Standard purposive conjunction introducing the intended result.
- source_word: תִּצְדָּק
  chosen: you may be proved right
  alternatives:
  - you may be justified
  - you may be in the right
  - you may be vindicated
  lexicon: HALOT
  rationale: Qal imperfect of צדק in a forensic setting means to be shown righteous/in
    the right. 'Be proved right' is clear modern English and fits the courtroom imagery.
    'Justified' is possible but can import later theological associations not required
    by this immediate context.
