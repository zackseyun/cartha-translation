theological_decisions:
- issue: Metaphorical and redemptive overtones of the 'new thing'
  chosen_reading: Retain the concrete imagery of new creation/exodus-like renewal
    without specifying a single doctrinal fulfillment in the translation.
  alternative_readings:
  - A primary reference to return from exile
  - A broader eschatological renewal
  - A typological anticipation of messianic salvation
  rationale: The verse's imagery supports multiple layers of fulfillment in Isaiah's
    theology. The translation should preserve that theological tension rather than
    narrow it to one interpretive scheme not explicit in the Hebrew.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
