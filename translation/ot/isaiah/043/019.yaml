id: ISA.43.19
reference: Isaiah 43:19
source:
  edition: WLC
  text: הִנְ/נִ֨י עֹשֶׂ֤ה חֲדָשָׁה֙ עַתָּ֣ה תִצְמָ֔ח הֲ/ל֖וֹא תֵֽדָע֑וּ/הָ אַ֣ף אָשִׂ֤ים
    בַּ/מִּדְבָּר֙ דֶּ֔רֶךְ בִּֽ/ישִׁמ֖וֹן נְהָרֽוֹת׃
translation:
  text: Look, I am doing a new thing; now it springs up—do you not perceive it? I
    will even make a way in the wilderness, rivers in the wasteland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'know it' or 'recognize it.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''in the desert.'' The Hebrew uses two related but distinct terms for
      barren land: ''wilderness'' and ''wasteland/desolation.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - Here I am
  lexicon: HALOT
  rationale: Introduces divine attention-getting announcement. 'Look' is readable
    modern English and preserves the deictic force better than archaic 'Behold'; 'Here
    I am' is possible but less idiomatic in this prophetic proclamation context.
- source_word: עֹשֶׂה
  chosen: I am doing
  alternatives:
  - I do
  - I am about to do
  - I make
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action. 'I am doing' captures
    present, active divine initiative without overcommitting to futurity.
- source_word: חֲדָשָׁה
  chosen: a new thing
  alternatives:
  - something new
  - a new thing
  lexicon: HALOT
  rationale: The feminine singular adjective functions substantivally with the implied
    act. 'A new thing' is idiomatic and preserves the sense of a fresh divine act.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  - already
  lexicon: HALOT
  rationale: Marks immediacy. 'Now' is the most natural and concise rendering.
- source_word: תִצְמָח
  chosen: it springs up
  alternatives:
  - it sprouts
  - it will spring forth
  - it grows
  lexicon: HALOT
  rationale: The verb literally evokes sprouting/germinating. 'Springs up' preserves
    the organic metaphor in natural English. Present English is used to match the
    vivid prophetic aspect.
- source_word: הֲלוֹא
  chosen: do you not
  alternatives:
  - will you not
  - surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting recognition. 'Do you not'
    fits the interrogative force cleanly.
- source_word: תֵדָעוּהָ
  chosen: perceive it
  alternatives:
  - know it
  - recognize it
  - understand it
  lexicon: HALOT
  rationale: While ידע often means 'know,' here the context is recognizing God's emerging
    act. 'Perceive it' best fits the rhetorical question about noticing what is springing
    up.
- source_word: אַף
  chosen: even
  alternatives:
  - indeed
  - also
  - 'yes'
  lexicon: HALOT
  rationale: Adds emphatic extension to the promise. 'Even' naturally introduces the
    surprising further action in the wilderness.
- source_word: אָשִׂים
  chosen: I will make
  alternatives:
  - I will set
  - I place
  lexicon: HALOT
  rationale: שׂים commonly means 'set/place,' but with 'way' and 'rivers' in this
    context English idiom prefers 'make.' Future rendering fits the promise sequence.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' preserves the broader biblical resonance of uncultivated,
    desolate land and matches common prophetic usage.'
- source_word: דֶּרֶךְ
  chosen: a way
  alternatives:
  - a road
  - a path
  lexicon: HALOT
  rationale: '''Way'' is both literal and thematically rich in Isaiah, allowing physical
    and redemptive overtones without forcing allegory.'
- source_word: בִּישִׁימוֹן
  chosen: in the wasteland
  alternatives:
  - in the desert
  - in the desolation
  lexicon: HALOT
  rationale: This term denotes a desolate, barren region. 'Wasteland' differentiates
    it from מִדְבָּר while preserving the parallelism.
- source_word: נְהָרוֹת
  chosen: rivers
  alternatives:
  - streams
  lexicon: HALOT
  rationale: The plural noun straightforwardly denotes rivers. 'Rivers' preserves
    the abundance and vividness of the promise.
