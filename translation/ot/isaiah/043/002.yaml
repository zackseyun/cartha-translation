id: ISA.43.2
reference: Isaiah 43:2
source:
  edition: WLC
  text: כִּֽי תַעֲבֹ֤ר בַּ/מַּ֨יִם֙ אִתְּ/ךָ אָ֔נִי וּ/בַ/נְּהָר֖וֹת לֹ֣א יִשְׁטְפ֑וּ/ךָ
    כִּֽי תֵלֵ֤ךְ בְּמוֹ אֵשׁ֙ לֹ֣א תִכָּוֶ֔ה וְ/לֶהָבָ֖ה לֹ֥א תִבְעַר בָּֽ/ךְ־־־־־׃
translation:
  text: When you pass through the waters, I am with you; and through the rivers, they
    will not sweep over you. When you walk through fire, you will not be scorched,
    and the flame will not burn you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will not overwhelm you.' The Hebrew verb can denote flooding over,
      washing away, or overwhelming.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will not be burned.' The Hebrew distinguishes this clause from the
      next, which more directly says 'the flame will not burn you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - If
  lexicon: HALOT
  rationale: Here כִּי introduces a temporal circumstance rather than a causal statement.
    'When' best fits the parallel clauses and avoids implying mere possibility ('if')
    or explanation ('for').
- source_word: תַעֲבֹר
  chosen: you pass through
  alternatives:
  - you cross
  - you go through
  lexicon: HALOT
  rationale: עבר commonly means 'pass/cross over.' 'Pass through' fits the imagery
    of moving through dangerous waters and matches the parallel with 'walk through
    fire.'
- source_word: בַּמַּיִם
  chosen: the waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The Hebrew plural is retained as 'the waters,' preserving the vivid,
    poetic image of threatening waters rather than a generic substance.
- source_word: אִתְּךָ אָ֔נִי
  chosen: I am with you
  alternatives:
  - I am with you indeed
  - with you am I
  lexicon: HALOT
  rationale: This is the natural English rendering of the emphatic Hebrew word order.
    It preserves the divine assurance without awkwardly mirroring Hebrew syntax.
- source_word: וּבַנְּהָרוֹת
  chosen: and through the rivers
  alternatives:
  - and in the rivers
  - and through the streams
  lexicon: HALOT
  rationale: Though the preposition is literally 'in,' English idiom with the governing
    verb favors 'through.' 'Rivers' is the standard sense of נְהָרוֹת and maintains
    the escalation from waters to rivers.
- source_word: לֹא יִשְׁטְפוּךָ
  chosen: they will not sweep over you
  alternatives:
  - they will not overflow you
  - they will not overwhelm you
  lexicon: HALOT
  rationale: שטף conveys flooding, washing away, or overwhelming. 'Sweep over you'
    preserves the concrete flood imagery while remaining natural English. 'Overwhelm'
    is possible but more interpretive.
- source_word: תֵלֵךְ
  chosen: you walk
  alternatives:
  - you go
  - you pass
  lexicon: HALOT
  rationale: הלך is broader than 'walk,' but 'walk through fire' is idiomatic English
    and preserves the poetic parallelism with 'pass through the waters.'
- source_word: בְּמוֹ אֵשׁ
  chosen: through fire
  alternatives:
  - in fire
  - amid fire
  lexicon: HALOT
  rationale: The phrase denotes movement within or through fire. 'Through fire' best
    matches the structure of the verse and the preceding clauses.
- source_word: לֹא תִכָּוֶה
  chosen: you will not be scorched
  alternatives:
  - you will not be burned
  - you will not be singed
  lexicon: HALOT
  rationale: The Niphal of כוה refers to being scorched or burned. 'Scorched' avoids
    redundancy with the next clause's explicit 'burn' and preserves the twofold expression.
- source_word: וְלֶהָבָה
  chosen: and the flame
  alternatives:
  - and flame
  lexicon: HALOT
  rationale: Adding the article in English is natural and reflects the definite, vivid
    poetic image.
- source_word: לֹא תִבְעַר בָּךְ
  chosen: will not burn you
  alternatives:
  - will not blaze against you
  - will not kindle upon you
  lexicon: HALOT
  rationale: בער with ב conveys burning upon/against someone. 'Burn you' is the clearest
    idiomatic English equivalent. More literal options are less natural and do not
    improve precision here.
