theological_decisions:
- issue: Covenantal/redemptive force of גאל
  chosen_reading: redeemed
  alternative_readings:
  - ransomed
  - reclaimed
  rationale: The verse speaks of the LORD's covenant claim over Israel/Jacob. 'Redeemed' preserves the theological resonance of divine deliverance and ownership without narrowing the mechanism beyond the Hebrew text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Possessive covenant claim in לִי אָתָּה
  chosen_reading: you are mine
  alternative_readings:
  - you belong to me
  rationale: The Hebrew expresses divine possession in a compact covenantal statement. 'You are mine' preserves the theological tension of belonging, election, and protection without over-explaining.
  doctrine_reference: Translation philosophy §§3, 6
