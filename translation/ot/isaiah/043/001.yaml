id: ISA.43.1
reference: Isaiah 43:1
source:
  edition: WLC
  text: וְ/עַתָּ֞ה כֹּֽה אָמַ֤ר יְהוָה֙ בֹּרַאֲ/ךָ֣ יַעֲקֹ֔ב וְ/יֹצֶרְ/ךָ֖ יִשְׂרָאֵ֑ל אַל תִּירָא֙ כִּ֣י גְאַלְתִּ֔י/ךָ קָרָ֥אתִי בְ/שִׁמְ/ךָ֖ לִ/י אָֽתָּה־־־׃
translation:
  text: 'But now, thus says Yahweh, he who created you, Jacob, and he who formed you, Israel: Do not fear, for I have redeemed you; I have called you by name; you are mine.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have called you by name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֹּרַאֲךָ
  chosen: created you
  alternatives:
  - your Creator
  - made you
  lexicon: HALOT
  rationale: 'The participle of ברא with 2ms suffix is rendered verbally in apposition to ''the LORD'': ''he who created you.'' ''Created'' preserves the distinct force of ברא, often used of divine creative activity, better than the more general ''made.'''
- source_word: וְיֹצֶרְךָ
  chosen: formed you
  alternatives:
  - fashioned you
  lexicon: HALOT
  rationale: יצר commonly conveys shaping or forming, often with artisan imagery. 'Formed you' preserves the parallel with 'created you' while distinguishing the verb from ברא.
- source_word: יַעֲקֹב / יִשְׂרָאֵל
  chosen: Jacob ... Israel
  rationale: Personal/covenant names are transliterated rather than translated, per translation philosophy. The paired names address the covenant people under both patriarchal and national designations.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: A direct prohibition with ירא is naturally rendered 'Do not fear.' This is concise, idiomatic, and preserves the solemn tone.
- source_word: גְאַלְתִּיךָ
  chosen: I have redeemed you
  alternatives:
  - I have ransomed you
  - I have reclaimed you
  lexicon: HALOT
  rationale: גאל carries covenantal-redemptive force, often involving kinship obligation and deliverance. 'Redeemed' best preserves that theological weight in accessible English.
- source_word: קָרָאתִי בְשִׁמְךָ
  chosen: I have called you by your name
  alternatives:
  - I have called you by name
  - I have summoned you by name
  lexicon: HALOT
  rationale: The Hebrew is literally 'I called by your name.' 'By your name' is slightly more formal and preserves the possessive suffix, emphasizing personal, particular calling.
- source_word: לִי אָתָּה
  chosen: you are mine
  alternatives:
  - you belong to me
  lexicon: HALOT
  rationale: The verbless clause is most naturally rendered 'you are mine.' This preserves the covenantal claim and the terseness of the Hebrew better than the more expansive 'you belong to me.'
- source_word: וְעַתָּה כֹּה אָמַר
  chosen: But now, this is what ... says
  alternatives:
  - And now, thus says ...
  - But now, thus says ...
  lexicon: HALOT
  rationale: '''But now'' captures the discourse turn marked by וְעַתָּה in context. ''This is what ... says'' renders כֹּה אָמַר idiomatically in modern English while retaining prophetic formula force.'
