- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Handling the difficult term בָרִיחִים
  chosen_reading: as fugitives
  alternative_readings:
  - bars
  - nobles
  rationale: The verse contains a well-known lexical difficulty. The chosen reading best fits the immediate context of Babylon's humiliation and the Chaldeans in ships, while preserving the major alternative in a footnote for transparency rather than overstating certainty.
