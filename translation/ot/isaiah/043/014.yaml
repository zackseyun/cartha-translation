id: ISA.43.14
reference: Isaiah 43:14
source:
  edition: WLC
  text: כֹּֽה אָמַ֧ר יְהוָ֛ה גֹּאַלְ/כֶ֖ם קְד֣וֹשׁ יִשְׂרָאֵ֑ל לְמַעַנְ/כֶ֞ם שִׁלַּ֣חְתִּי בָבֶ֗לָ/ה וְ/הוֹרַדְתִּ֤י בָֽ/רִיחִים֙ כֻּלָּ֔/ם וְ/כַשְׂדִּ֖ים בָּ/אֳנִיּ֥וֹת רִנָּתָֽ/ם־׃
translation:
  text: 'Thus says Yahweh, your Redeemer, the Holy One of Israel: For your sake I have sent to Babylon and brought them all down as fugitives, even the Chaldeans, in the ships of their rejoicing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and I will bring down all of them as bars'; the Hebrew word rendered 'fugitives' is difficult and has also been understood to refer to 'bars' or, less likely, 'nobles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I have sent against Babylon.' The Hebrew literally says 'I have sent to Babylon,' with the object left implicit.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH.
- source_word: גֹּאַלְכֶם
  chosen: your Redeemer
  alternatives:
  - your kinsman-redeemer
  - the one who redeems you
  lexicon: HALOT
  rationale: גאל in Isaiah often carries covenantal-deliverance force. 'Redeemer' is concise, idiomatic, and preserves the theological weight better than a more paraphrastic expression.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a recurring Isaianic title; the established literal rendering is clear and preserves the title's solemn force.
- source_word: לְמַעַנְכֶם
  chosen: For your sake
  alternatives:
  - because of you
  - on your behalf
  lexicon: HALOT
  rationale: This idiom expresses action undertaken for the benefit of Israel. 'For your sake' is natural English and preserves the benefactive sense.
- source_word: שִׁלַּחְתִּי בָבֶלָה
  chosen: I have sent to Babylon
  alternatives:
  - I sent to Babylon
  - I have sent against Babylon
  lexicon: HALOT
  rationale: The directional he on בבלה supports 'to Babylon.' The object of 'sent' is implicit in Hebrew; English can leave it implicit. 'Against Babylon' is interpretive and better preserved as an alternative.
- source_word: וְהוֹרַדְתִּי
  chosen: and brought ... down
  alternatives:
  - and caused ... to go down
  - and brought ... down in humiliation
  lexicon: HALOT
  rationale: The Hiphil of ירד means to cause to descend. 'Brought down' is idiomatic and fits both physical descent and defeat without overinterpreting.
- source_word: בָרִיחִים
  chosen: as fugitives
  alternatives:
  - bars
  - nobles
  - fleeing ones
  lexicon: HALOT
  rationale: This term is difficult and disputed. In context, a sense related to fleeing/descent best fits the parallel with Babylon's downfall and the following mention of Chaldeans. 'As fugitives' gives coherent sense in context while preserving the major lexical alternative in a footnote.
- source_word: כֻּלָּם
  chosen: them all
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Refers collectively to those brought down from Babylon; 'them all' is natural in English and preserves the totalizing force.
- source_word: וְכַשְׂדִּים
  chosen: even the Chaldeans
  alternatives:
  - and the Chaldeans
  lexicon: HALOT
  rationale: 'The conjunction can be rendered simply ''and,'' but ''even'' brings out the appositional/emphatic force in English: the Babylonians themselves, namely the Chaldeans, are included in the downfall.'
- source_word: בָּאֳנִיּוֹת
  chosen: in the ships
  alternatives:
  - into ships
  - on ships
  lexicon: HALOT
  rationale: The preposition ב commonly indicates location/instrument. 'In the ships' is the most straightforward rendering, though the exact nuance is somewhat flexible.
- source_word: רִנָּתָם
  chosen: of their rejoicing
  alternatives:
  - of their shouting
  - of their jubilant cry
  - their cry
  lexicon: HALOT
  rationale: רנה often denotes a ringing cry of joy. 'Of their rejoicing' preserves the noun form and the irony that the place of Babylonian celebration becomes bound up with their humiliation or flight.
