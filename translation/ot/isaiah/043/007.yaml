id: ISA.43.7
reference: Isaiah 43:7
source:
  edition: WLC
  text: כֹּ֚ל הַ/נִּקְרָ֣א בִ/שְׁמִ֔/י וְ/לִ/כְבוֹדִ֖/י בְּרָאתִ֑י/ו יְצַרְתִּ֖י/ו
    אַף עֲשִׂיתִֽי/ו־׃
translation:
  text: everyone who is called by my name, and whom I created for my glory, whom I
    formed, indeed whom I made.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'everyone who is called by my name, and for my glory I
      created him; I formed him, indeed I made him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: everyone
  alternatives:
  - all
  - everyone/everything
  lexicon: HALOT
  rationale: In context the referent is people being gathered by God (vv. 5–6), so
    an animate rendering is preferable. 'Everyone' communicates the distributive sense
    naturally in English better than bare 'all.'
- source_word: הַנִּקְרָא
  chosen: is called
  alternatives:
  - is named
  - is summoned
  lexicon: HALOT
  rationale: The Niphal of קרא here most naturally means 'be called/named.' 'Is called'
    preserves the passive verbal idea and works idiomatically with the following phrase
    'by my name.'
- source_word: בִשְׁמִי
  chosen: by my name
  alternatives:
  - in my name
  - with my name
  lexicon: HALOT
  rationale: The idiom נקרא בשם commonly means 'be called by the name of.' 'By my
    name' is the standard and clearest English equivalent for covenantal belonging/identification.
- source_word: וְלִכְבוֹדִי
  chosen: for my glory
  alternatives:
  - for my honor
  - for my splendor
  lexicon: HALOT
  rationale: כבוד often denotes glory, honor, or weightiness. 'For my glory' best
    preserves the theological force of God's self-manifested honor and is the most
    natural rendering in this context.
- source_word: בְּרָאתִיו
  chosen: I created
  alternatives:
  - I have created
  lexicon: HALOT
  rationale: The qatal form here is best rendered with simple past in English within
    the sequence of divine actions. The 3ms suffix is represented by the relative
    'whom' in the English restructuring.
- source_word: יְצַרְתִּיו
  chosen: I formed
  alternatives:
  - I fashioned
  lexicon: HALOT
  rationale: יצר commonly conveys shaping or forming, often with artisan imagery.
    'Formed' is concise, natural, and preserves the distinction from 'created' and
    'made.'
- source_word: אַף
  chosen: indeed
  alternatives:
  - even
  - 'yes'
  - also
  lexicon: HALOT
  rationale: אַף here intensifies the final clause rather than merely adding another
    item. 'Indeed' captures the emphatic force in smooth English.
- source_word: עֲשִׂיתִיו
  chosen: I made
  alternatives:
  - I have made
  - I accomplished him
  lexicon: HALOT
  rationale: עשה is a broad verb meaning 'make/do.' 'I made' preserves the climactic
    third verb in the sequence without collapsing it into the earlier verbs.
