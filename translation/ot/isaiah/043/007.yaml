theological_decisions:
- issue: Referent and syntactic restructuring of the singular suffixes
  chosen_reading: Render the verse with a plural-inclusive head term ('everyone')
    followed by relative clauses with singular English pronouns absorbed into 'whom.'
  alternative_readings:
  - Render more formally as 'everyone who is called by my name, and for my glory I
    created him, I formed him, indeed I made him'
  rationale: The Hebrew begins with a collective singular expression and then uses
    singular suffixes. In English, repeating 'him' after 'everyone' can sound unnecessarily
    gender-specific and wooden, while the Hebrew likely has representative singular
    force for the gathered people. Using 'whom' preserves the singular object relation
    without importing male-specific reference, in keeping with gender-accurate translation
    and readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, §6
- issue: Purpose clause relation
  chosen_reading: 'Attach ''for my glory'' to God''s act of creation: ''whom I created
    for my glory.'''
  alternative_readings:
  - 'Leave the phrase less tightly attached: ''and for my glory I created him; I formed
    him, indeed I made him'''
  rationale: The Hebrew word order allows either a more formal retention or an English
    restructuring. Attaching the phrase to 'created' best communicates the sense that
    God's people were created with his glory as their purpose, while preserving the
    semantic content of the clause.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
