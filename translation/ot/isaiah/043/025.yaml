theological_decisions:
- issue: Divine motivation in forgiveness
  chosen_reading: God forgives 'for my own sake,' grounding pardon in his own character
    and purpose.
  alternative_readings:
  - God forgives primarily because of the sinner's repentance or worthiness
  rationale: The Hebrew explicitly states לְמַעֲנִי, so the translation should preserve
    that divine self-grounding without softening it. This reflects the text's emphasis
    and avoids importing conditions not stated in the verse.
  doctrine_reference: Translation philosophy §1, §3
