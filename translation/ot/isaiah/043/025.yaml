id: ISA.43.25
reference: Isaiah 43:25
source:
  edition: WLC
  text: אָנֹכִ֨י אָנֹכִ֥י ה֛וּא מֹחֶ֥ה פְשָׁעֶ֖י/ךָ לְמַעֲנִ֑/י וְ/חַטֹּאתֶ֖י/ךָ לֹ֥א
    אֶזְכֹּֽר׃
translation:
  text: I, I am he who blots out your transgressions for my own sake, and your sins
    I will not remember.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I, even I, am he who blots out your transgressions.'
    reason: lexical_alternative
  - marker: b
    text: '''Blots out'' also may be rendered ''wipes away'' or ''erases.'''
    reason: lexical_alternative
  - marker: c
    text: '''I will not remember'' means God will no longer hold these sins in view
      against his people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי אָנֹכִי
  chosen: I, I
  alternatives:
  - I, even I
  - I—I
  lexicon: HALOT
  rationale: The doubled first-person pronoun is emphatic. Rendering it explicitly
    preserves the Hebrew repetition and divine self-emphasis without over-paraphrasing.
- source_word: הוּא
  chosen: am he
  alternatives:
  - am the one
  - it is I
  lexicon: HALOT
  rationale: With the repeated אָנֹכִי, הוּא functions as an emphatic self-identification
    formula. 'Am he' preserves the idiomatic force and echoes similar divine self-declarations
    in Isaiah.
- source_word: מֹחֶה
  chosen: blots out
  alternatives:
  - wipes away
  - erases
  lexicon: HALOT
  rationale: The participle from מחה commonly carries the sense of wiping out or blotting
    out, especially of sin or names. 'Blots out' is both idiomatic in English Bible
    usage and faithful to the metaphor of removal/erasure.
- source_word: פְשָׁעֶיךָ
  chosen: your transgressions
  alternatives:
  - your rebellions
  - your offenses
  lexicon: HALOT
  rationale: פשע often denotes rebellion or transgression, not merely generic wrongdoing.
    'Transgressions' is a clear, established rendering that preserves the moral and
    covenantal seriousness.
- source_word: לְמַעֲנִי
  chosen: for my own sake
  alternatives:
  - for my sake
  lexicon: HALOT
  rationale: The phrase indicates Yahweh's action is grounded in his own purposes
    and name. 'For my own sake' brings out the reflexive emphasis naturally in English.
- source_word: וְחַטֹּאתֶיךָ
  chosen: and your sins
  alternatives:
  - and your sin-offenses
  lexicon: HALOT
  rationale: חטאות is the common term for sins. 'Sins' is the most natural and accurate
    rendering here, distinct enough from 'transgressions' to preserve the Hebrew pairing
    of related but non-identical terms.
- source_word: לֹא אֶזְכֹּר
  chosen: I will not remember
  alternatives:
  - I will remember no more
  - I will not call to mind
  lexicon: HALOT
  rationale: The imperfect expresses future resolve. 'I will not remember' is a direct
    rendering that preserves the covenantal sense of no longer holding sins in view
    for judgment, without importing more than the text states.
