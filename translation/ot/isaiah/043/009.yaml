id: ISA.43.9
reference: Isaiah 43:9
source:
  edition: WLC
  text: כָּֽל הַ/גּוֹיִ֞ם נִקְבְּצ֣וּ יַחְדָּ֗ו וְ/יֵאָֽסְפוּ֙ לְאֻמִּ֔ים מִ֤י בָ/הֶם֙
    יַגִּ֣יד זֹ֔את וְ/רִֽאשֹׁנ֖וֹת יַשְׁמִיעֻ֑/נוּ יִתְּנ֤וּ עֵֽדֵי/הֶם֙ וְ/יִצְדָּ֔קוּ
    וְ/יִשְׁמְע֖וּ וְ/יֹאמְר֥וּ אֱמֶֽת־׃
translation:
  text: Let all the nations be gathered together, and let the peoples be assembled.
    Who among them can declare this and make the former things heard to us? Let them
    present their witnesses, that they may be proved right; and let them hear and
    say, “It is true.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the first things.” In Isaiah, “former things” often refers to earlier
      acts or prior declarations that demonstrate the Lord’s sovereignty.
    reason: lexical_alternative
  - marker: b
    text: Or “that they may be justified” / “that they may be in the right.” The Hebrew
      has a forensic sense in this courtroom setting.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם most naturally denotes nations/peoples in an international sense
    here, fitting the courtroom scene involving the world’s peoples rather than specifically
    non-Israelites as 'Gentiles'.
- source_word: נִקְבְּצוּ יַחְדָּו
  chosen: be gathered together
  alternatives:
  - assemble together
  - be gathered as one
  lexicon: HALOT
  rationale: The Niphal of קבץ is passive/reflexive ('be gathered'), and יַחְדָּו
    adds the sense 'together.' English keeps both ideas with a natural collocation.
- source_word: וְיֵאָסְפוּ לְאֻמִּים
  chosen: and let the peoples be assembled
  alternatives:
  - and let the tribes be gathered
  - and let the peoples be collected
  lexicon: HALOT
  rationale: לְאֻמִּים is best rendered 'peoples' to distinguish it slightly from
    גּוֹיִם ('nations') while preserving the parallelism. The verb אסף in Niphal again
    supports a passive/jussive sense.
- source_word: מִי בָהֶם
  chosen: Who among them
  alternatives:
  - Which of them
  lexicon: HALOT
  rationale: Idiomatic interrogative introducing the challenge to the nations in the
    divine courtroom.
- source_word: יַגִּיד זֹאת
  chosen: can declare this
  alternatives:
  - can tell this
  - can announce this
  lexicon: HALOT
  rationale: The Hiphil of נגד often means declare/announce. 'Can' is supplied in
    English to reflect the rhetorical challenge implied by the context.
- source_word: וְרִאשֹׁנוֹת
  chosen: the former things
  alternatives:
  - the earlier things
  - the first things
  lexicon: HALOT
  rationale: In Isaiah this expression commonly refers to former events or prior predictions
    that demonstrate YHWH's sovereignty. 'Former things' preserves that Isaianic resonance.
- source_word: יַשְׁמִיעֻנוּ
  chosen: make ... heard to us
  alternatives:
  - proclaim to us
  - cause us to hear
  lexicon: HALOT
  rationale: The Hiphil of שמע is causative, literally 'cause us to hear.' 'Make ...
    heard to us' preserves the causative force while remaining readable.
- source_word: יִתְּנוּ עֵדֵיהֶם
  chosen: Let them present their witnesses
  alternatives:
  - Let them give their witnesses
  - Let them bring their witnesses
  lexicon: HALOT
  rationale: נתן plus 'witnesses' in this forensic setting is idiomatically 'present'
    or 'bring forward' witnesses.
- source_word: וְיִצְדָּקוּ
  chosen: that they may be proved right
  alternatives:
  - that they may be justified
  - and be in the right
  lexicon: HALOT
  rationale: In this courtroom context צדק means to be shown right/vindicated. 'Be
    proved right' communicates the forensic sense clearly without importing later
    doctrinal terminology unnecessarily.
- source_word: וְיִשְׁמְעוּ וְיֹאמְרוּ אֱמֶת
  chosen: and let them hear and say, “It is true.”
  alternatives:
  - or let them hear and say, 'Truth'
  - and they will hear and say, 'It is true'
  lexicon: HALOT
  rationale: 'The sequence continues the legal challenge: after hearing the evidence,
    they must acknowledge its truth. Rendering אֱמֶת as ''It is true'' gives the predicative
    force natural English expression.'
