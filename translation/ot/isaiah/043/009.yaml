theological_decisions:
- issue: Forensic/judicial imagery in the challenge to the nations
  chosen_reading: Render the verse as a courtroom summons and evidentiary challenge
    without importing later technical justification language.
  alternative_readings:
  - Use more explicitly juridical wording such as 'be justified' for וְיִצְדָּקוּ
  rationale: The context in Isaiah 43 is a trial scene between YHWH and the nations/idols.
    The translation preserves that legal setting while avoiding theological over-specification
    beyond the Hebrew text.
  doctrine_reference: Translation philosophy §§1, 3, 6
