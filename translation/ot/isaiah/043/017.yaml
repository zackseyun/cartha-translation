theological_decisions:
- issue: Temporal/aspectual presentation of the LORD's action and the enemies' defeat
  chosen_reading: Use vivid present-style English ('who brings out... they lie down,
    they do not rise')
  alternative_readings:
  - Use simple past throughout to emphasize the historical exodus event
  rationale: The Hebrew participle and imperfect/perfect sequence can be rendered
    vividly in English to preserve the poetic, descriptive force while still alluding
    to God's past saving act. This avoids over-resolving whether the verse is purely
    retrospective or paradigmatic of the LORD's character.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Referent of the defeated forces
  chosen_reading: Render generically as military forces without explicitly naming
    Egypt
  alternative_readings:
  - Explicitly identify them as Pharaoh's army/Egyptians in the main text
  rationale: Although the context strongly evokes the exodus, the Hebrew text here
    names chariot, horse, army, and strong one rather than Egypt directly. The translation
    should preserve the allusive quality without importing a more specific identification
    into the verse itself.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition)
