id: ISA.43.17
reference: Isaiah 43:17
source:
  edition: WLC
  text: הַ/מּוֹצִ֥יא רֶֽכֶב וָ/ס֖וּס חַ֣יִל וְ/עִזּ֑וּז יַחְדָּ֤ו יִשְׁכְּבוּ֙ בַּל
    יָק֔וּמוּ דָּעֲכ֖וּ כַּ/פִּשְׁתָּ֥ה כָבֽוּ־־׃
translation:
  text: who brings out chariot and horse, army and mighty warrior together; they lie
    down, they do not rise; they are extinguished, quenched like flax.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a flax wick'; the Hebrew literally says 'like flax,' evoking something
      quickly snuffed out.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמּוֹצִיא
  chosen: who brings out
  alternatives:
  - who led out
  - who causes to go out
  lexicon: HALOT
  rationale: Hiphil participle of יצא functioning relative to the preceding description
    of the LORD in context ('who makes a way...'). Present participial English ('who
    brings out') preserves the descriptive force better than a simple past, while
    still allowing the historical allusion to the exodus/sea event.
- source_word: רֶכֶב
  chosen: chariot
  alternatives:
  - chariots
  - chariotry
  lexicon: HALOT
  rationale: Singular collective is common in Hebrew. 'Chariot' in English can function
    generically here and pairs naturally with singular 'horse.' 'Chariotry' is possible
    but less readable.
- source_word: וָסוּס
  chosen: horse
  alternatives:
  - horses
  lexicon: HALOT
  rationale: Kept singular to mirror the Hebrew collective singular and the tight
    pairing 'chariot and horse.'
- source_word: חַיִל
  chosen: army
  alternatives:
  - force
  - host
  - troops
  lexicon: HALOT
  rationale: חיל can denote military force/army. Here it expands the martial picture
    beyond vehicles to the fighting force. 'Army' is the clearest modern rendering.
- source_word: וְעִזּוּז
  chosen: mighty warrior
  alternatives:
  - strong one
  - powerful one
  - might
  lexicon: HALOT
  rationale: The adjective/substantival form denotes strength or a strong one. Rendering
    it personally as 'mighty warrior' fits the military context created by 'chariot
    and horse, army' and avoids an awkward abstract ('army and might').
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Straightforward adverb indicating the grouped downfall of the military
    forces.
- source_word: יִשְׁכְּבוּ
  chosen: they lie down
  alternatives:
  - they lay down
  - they fall down
  lexicon: HALOT
  rationale: The verb is literally 'lie down.' In context it depicts the defeated
    forces stretched out in death. The more literal rendering preserves the imagery;
    the death sense is clarified by the following clauses.
- source_word: בַּל יָקוּמוּ
  chosen: they do not rise
  alternatives:
  - they will not rise
  - never to rise
  lexicon: HALOT
  rationale: בל marks emphatic negation. Present 'do not rise' matches the vivid sequence
    of the verse; future 'will not rise' is possible, but the Hebrew here reads as
    a vivid portrayal of completed defeat.
- source_word: דָּעֲכוּ
  chosen: they are extinguished
  alternatives:
  - they are snuffed out
  - they fade
  lexicon: HALOT
  rationale: The verb is used of a flame going out or being extinguished. 'Extinguished'
    preserves the fire imagery that is then reinforced by 'quenched like flax.'
- source_word: כַּפִּשְׁתָּה
  chosen: like flax
  alternatives:
  - like a wick of flax
  - like tow
  lexicon: HALOT
  rationale: פשתה is flax. In context the comparison is to something fibrous and easily
    quenched. 'Like flax' is the most direct rendering; the wick nuance is interpretive
    and better preserved in a footnote.
- source_word: כָבוּ
  chosen: quenched
  alternatives:
  - they go out
  - they are put out
  lexicon: HALOT
  rationale: Another fire-extinguishing verb, parallel to דָּעֲכוּ. 'Quenched' gives
    good English style and preserves the metaphorical image of a flame being put out.
