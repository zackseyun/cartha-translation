id: ISA.43.12
reference: Isaiah 43:12
source:
  edition: WLC
  text: אָנֹכִ֞י הִגַּ֤דְתִּי וְ/הוֹשַׁ֨עְתִּי֙ וְ/הִשְׁמַ֔עְתִּי וְ/אֵ֥ין בָּ/כֶ֖ם
    זָ֑ר וְ/אַתֶּ֥ם עֵדַ֛/י נְאֻם יְהוָ֖ה וַֽ/אֲנִי אֵֽל־־׃
translation:
  text: I myself declared and saved and announced, and there was no foreign god among
    you; and you are my witnesses, declares the LORD, and I am God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'there was no stranger among you.' The Hebrew word can mean 'strange/foreign
      one,' but in this context it likely refers to a foreign god.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I alone
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. 'I myself' preserves the stress
    without overinterpreting exclusivity beyond what the pronoun itself marks.
- source_word: הִגַּדְתִּי
  chosen: declared
  alternatives:
  - told
  - announced
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to declare or make known. 'Declared' fits
    the solemn, juridical tone of the passage.
- source_word: וְהוֹשַׁעְתִּי
  chosen: saved
  alternatives:
  - delivered
  lexicon: HALOT
  rationale: From ישׁע in the Hiphil, the standard sense is 'save' or 'deliver.' 'Saved'
    is concise and preserves the theological resonance of divine salvation.
- source_word: וְהִשְׁמַעְתִּי
  chosen: announced
  alternatives:
  - proclaimed
  - caused to hear
  - made known
  lexicon: HALOT
  rationale: The Hiphil of שׁמע here likely means 'cause to hear,' hence 'announce'
    or 'proclaim.' 'Announced' differentiates it from the earlier 'declared' while
    preserving the sequence of divine self-disclosure.
- source_word: וְאֵין בָכֶם זָר
  chosen: there was no foreign god among you
  alternatives:
  - there was no stranger among you
  - no foreigner was among you
  lexicon: HALOT
  rationale: In context, זָר refers not to a generic stranger but to a foreign deity.
    The surrounding claims concern YHWH alone as savior and witness, so supplying
    'god' in English makes explicit the implied object required by the context.
- source_word: עֵדַי
  chosen: my witnesses
  alternatives:
  - witnesses for me
  lexicon: HALOT
  rationale: 'The construct with first-person suffix is straightforwardly possessive:
    Israel is addressed as YHWH''s witnesses.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD'
    in contemporary English. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    reverential convention and broad English readability.
- source_word: וַאֲנִי אֵל
  chosen: and I am God
  alternatives:
  - and I am El
  - and I am God alone
  lexicon: HALOT
  rationale: אֵל here functions as the common noun/title 'God,' not as a proper name
    to be transliterated. 'I am God' preserves the climactic assertion of deity without
    adding exclusivizing language not explicit in this clause.
