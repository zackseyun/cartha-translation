theological_decisions:
- issue: Interpretation of זָר in the clause וְאֵין בָכֶם זָר
  chosen_reading: foreign god
  alternative_readings:
  - stranger
  - foreigner
  rationale: The immediate context centers on YHWH's unique role in declaring, saving,
    and making known, contrasted with other deities. Rendering זָר as 'foreign god'
    best captures the polemical monotheistic force of the verse rather than a social
    reference to a foreign person.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    context sufficiently supports the deity sense, so no unresolved ambiguity remains
    in the main text.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default requires 'the LORD' for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
