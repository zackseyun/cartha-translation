id: ISA.43.22
reference: Isaiah 43:22
source:
  edition: WLC
  text: וְ/לֹא אֹתִ֥/י קָרָ֖אתָ יַֽעֲקֹ֑ב כִּֽי יָגַ֥עְתָּ בִּ֖/י יִשְׂרָאֵֽל־־׃
translation:
  text: Yet you have not called on me, Jacob, because you have grown weary of me,
    Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you have not called me'; the Hebrew verb can be rendered simply 'call,'
      but in contexts of prayer or worship it often means 'call on.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you have grown weary with me.' The Hebrew preposition allows a close
      alternative, though 'weary of me' is the more natural sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: Yet ... not
  alternatives:
  - And ... not
  - But ... not
  lexicon: HALOT
  rationale: The conjunction plus negation introduces a contrast with the preceding
    context. 'Yet' captures the adversative force in natural English better than a
    simple 'and not,' while preserving the rebuke.
- source_word: אֹתִי
  chosen: me
  alternatives:
  - upon me
  lexicon: HALOT
  rationale: Direct object marker with 1cs pronoun; English requires simply 'me.'
    The following verb 'call' can idiomatically be rendered 'call on me' in context.
- source_word: קָרָאתָ
  chosen: have not called on
  alternatives:
  - have not called
  - did not call upon
  lexicon: HALOT
  rationale: קרא commonly means 'call' and in relation to God often carries the sense
    'call on/upon' in prayer or invocation. 'Called on' makes the relational and worshipful
    sense clear without over-paraphrasing.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Proper name transliterated according to the translation philosophy. Here
    it functions vocatively for the covenant people.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: In this context כִּי gives the reason for the preceding charge. 'Because'
    is the clearest modern English rendering.
- source_word: יָגַעְתָּ
  chosen: have grown weary
  alternatives:
  - have wearied yourself
  - have become tired
  lexicon: HALOT
  rationale: יגע denotes weariness or exhaustion. 'Have grown weary' is idiomatic
    and fits the perfect aspect in English. It avoids the potentially misleading transitive
    sense of 'wearied' alone.
- source_word: בִּי
  chosen: of me
  alternatives:
  - with me
  - in me
  lexicon: HALOT
  rationale: The preposition ב with יגע can express weariness with respect to someone/something.
    'Weary of me' is the most natural English expression here and matches the sense
    of being tired of devotion to God or of God himself.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name transliterated. Parallel with 'Jacob' as a second vocative
    intensifies the address to the covenant nation.
