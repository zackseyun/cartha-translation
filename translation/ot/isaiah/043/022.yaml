theological_decisions:
- issue: Sense of Israel's failure toward God
  chosen_reading: The verse rebukes Israel for failing to invoke God and for becoming
    weary in relation to him.
  alternative_readings:
  - The verse means Israel did not call because God had become burdensome to them
  - The verse means Israel did not call, but instead wearied God
  rationale: 'The syntax favors taking Israel as the subject of both verbs: ''you
    have not called on me ... because you have grown weary of me.'' This preserves
    the direct accusation of covenant neglect without importing a broader theological
    explanation beyond the text.'
  doctrine_reference: Translation philosophy §1, §3
