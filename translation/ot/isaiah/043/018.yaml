id: ISA.43.18
reference: Isaiah 43:18
source:
  edition: WLC
  text: אַֽל תִּזְכְּר֖וּ רִֽאשֹׁנ֑וֹת וְ/קַדְמֹנִיּ֖וֹת אַל תִּתְבֹּנָֽנוּ־־׃
translation:
  text: Do not remember the former things, and do not consider the things of old.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not remember the first things, and do not ponder ancient things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not keep
  - Never
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive forms to
    express prohibition. 'Do not' is the natural English imperative equivalent.
- source_word: תִּזְכְּרוּ
  chosen: remember
  alternatives:
  - call to mind
  - recall
  lexicon: HALOT
  rationale: From זכר, 'remember.' A simple imperative-like prohibition fits the Hebrew
    and preserves the directness of the command.
- source_word: רִאשֹׁנוֹת
  chosen: the former things
  alternatives:
  - former events
  - earlier things
  - the first things
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning earlier or former things. 'The former
    things' is idiomatic English and preserves the likely contrast with the 'new thing'
    in the following verse.
- source_word: וְ
  chosen: and
  alternatives:
  - or
  lexicon: HALOT
  rationale: Simple conjunction linking the two prohibitions. 'And' best reflects
    the Hebrew coordination.
- source_word: קַדְמֹנִיּוֹת
  chosen: the things of old
  alternatives:
  - ancient things
  - things from long ago
  - what came before
  lexicon: HALOT
  rationale: Refers to earlier/ancient things. 'The things of old' gives a natural
    English parallel to 'the former things' while preserving the poetic distinction
    between the two near-synonyms.
- source_word: תִּתְבֹּנָנוּ
  chosen: consider
  alternatives:
  - ponder
  - pay attention to
  - fix your attention on
  lexicon: HALOT
  rationale: From בין in the hitpolel/hithbonen nuance, meaning to consider attentively
    or reflect upon. 'Consider' is concise, natural, and captures mental focus better
    than a more wooden rendering.
