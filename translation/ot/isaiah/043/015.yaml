  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Capitalization of divine titles
  chosen_reading: Capitalize 'Holy One,' 'Creator,' and 'King' as titles for God
  alternative_readings:
  - lowercase common nouns
  rationale: In this context the terms are not merely descriptive but appositional titles identifying the LORD. Capitalization helps English readers perceive the titular parallelism without adding content beyond the Hebrew.
