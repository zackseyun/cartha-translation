id: ISA.43.15
reference: Isaiah 43:15
source:
  edition: WLC
  text: אֲנִ֥י יְהוָ֖ה קְדֽוֹשְׁ/כֶ֑ם בּוֹרֵ֥א יִשְׂרָאֵ֖ל מַלְכְּ/כֶֽם׃ס
translation:
  text: I am Yahweh, your Holy One, the Creator of Israel, your King.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Yahweh'': Hebrew has the divine name יְהוָה.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. Rendering it as 'I am' in English conveys the verbless Hebrew clause naturally while preserving the self-identifying force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קְדוֹשְׁכֶם
  chosen: your Holy One
  alternatives:
  - the Holy One of you
  - your holy one
  lexicon: HALOT
  rationale: The noun/adjective with 2mp suffix functions as a divine title here. 'Your Holy One' is idiomatic English and preserves both covenantal relationship ('your') and the title-like force of 'Holy One.' Capitalization reflects its use for God in context.
- source_word: בּוֹרֵא
  chosen: the Creator of
  alternatives:
  - creator of
  - the one who created
  lexicon: HALOT
  rationale: The participle denotes an ongoing or characteristic role/title rather than merely a past act. 'The Creator of' best captures the titular force in smooth English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the proper name.
- source_word: מַלְכְּכֶם
  chosen: your King
  alternatives:
  - your king
  lexicon: HALOT
  rationale: The noun with 2mp suffix identifies the LORD as Israel's king. Capitalization is appropriate because it functions as a divine title in parallel with 'your Holy One' and 'the Creator of Israel.'
