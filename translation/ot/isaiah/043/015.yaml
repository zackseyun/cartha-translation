theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also fits the verse's covenantal self-identification formula.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Capitalization of divine titles
  chosen_reading: Capitalize 'Holy One,' 'Creator,' and 'King' as titles for God
  alternative_readings:
  - lowercase common nouns
  rationale: In this context the terms are not merely descriptive but appositional
    titles identifying the LORD. Capitalization helps English readers perceive the
    titular parallelism without adding content beyond the Hebrew.
