id: ISA.43.24
reference: Isaiah 43:24
source:
  edition: WLC
  text: לֹא קָנִ֨יתָ לִּ֤/י בַ/כֶּ֨סֶף֙ קָנֶ֔ה וְ/חֵ֥לֶב זְבָחֶ֖י/ךָ לֹ֣א הִרְוִיתָ֑/נִי
    אַ֗ךְ הֶעֱבַדְתַּ֨/נִי֙ בְּ/חַטֹּאותֶ֔י/ךָ הוֹגַעְתַּ֖/נִי בַּ/עֲוֺנֹתֶֽי/ךָ־׃ס
translation:
  text: You did not buy me sweet cane with silver, or satisfy me with the fat of your
    sacrifices; instead, you burdened me with your sins; you wearied me with your
    iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamus' or 'aromatic cane.' The Hebrew term refers to a costly fragrant
      cane.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'you made me serve with your sins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִיתָ
  chosen: did not buy
  alternatives:
  - did not acquire
  - did not purchase
  lexicon: HALOT
  rationale: Qal perfect 2ms of קנה commonly means 'buy/acquire.' In context with
    'with silver,' the commercial sense 'buy' is most natural and idiomatic in English.
- source_word: קָנֶה
  chosen: sweet cane
  alternatives:
  - calamus
  - aromatic cane
  - reed
  lexicon: HALOT
  rationale: In cultic/provision contexts קָנֶה refers to aromatic cane used as a
    costly imported spice or perfume ingredient. 'Sweet cane' is clear modern English
    and preserves the likely referent better than the less familiar 'calamus.'
- source_word: בַכֶּסֶף
  chosen: with silver
  alternatives:
  - for silver
  - with money
  lexicon: HALOT
  rationale: The preposition with the noun 'silver' here indicates means/payment.
    'With silver' is a natural rendering that preserves the concrete wording.
- source_word: חֵלֶב זְבָחֶיךָ
  chosen: the fat of your sacrifices
  alternatives:
  - the choicest part of your sacrifices
  lexicon: HALOT
  rationale: חֵלֶב literally means 'fat' and in sacrificial contexts refers to the
    fat portions offered to God. The literal rendering is both accurate and theologically
    important for sacrificial imagery.
- source_word: הִרְוִיתָנִי
  chosen: satisfy me
  alternatives:
  - fill me
  - give me abundance
  - refresh me
  lexicon: HALOT
  rationale: The Hiphil of רוה conveys causing to be saturated or filled. In this
    sacrificial context, 'satisfy me' communicates the figurative sense of giving
    God the due offering, without implying literal physical need.
- source_word: אַךְ
  chosen: instead
  alternatives:
  - but
  - surely
  - rather
  lexicon: HALOT
  rationale: Here אַךְ marks a sharp adversative contrast between what Israel failed
    to do and what it actually did. 'Instead' captures that contrast more pointedly
    than a simple 'but.'
- source_word: הֶעֱבַדְתַּנִי
  chosen: you burdened me
  alternatives:
  - you made me serve
  - you enslaved me
  - you made me work
  lexicon: HALOT
  rationale: The Hiphil of עבד is literally 'cause to serve/work.' In this context
    God speaks anthropomorphically of being imposed upon by Israel's sins. 'You burdened
    me' conveys the idiomatic force in English while preserving the shocking reversal
    that the worshiper has made God serve under sin's load.
- source_word: בְּחַטֹּאותֶיךָ
  chosen: with your sins
  alternatives:
  - by your sins
  - through your sins
  lexicon: HALOT
  rationale: The preposition marks means or instrument. 'With your sins' is concise
    and idiomatic.
- source_word: הוֹגַעְתַּנִי
  chosen: you wearied me
  alternatives:
  - you exhausted me
  - you tired me
  lexicon: HALOT
  rationale: The Hiphil of יגע means to cause weariness. 'Wearied' preserves the elevated
    prophetic tone and the anthropomorphic complaint.
- source_word: בַּעֲוֺנֹתֶיךָ
  chosen: with your iniquities
  alternatives:
  - with your guilt
  - with your wickedness
  lexicon: HALOT
  rationale: עָוֹן often denotes iniquity/guilt. 'Iniquities' preserves the moral
    and covenantal weight and maintains a distinction from the previous חטאות, rendered
    'sins.'
