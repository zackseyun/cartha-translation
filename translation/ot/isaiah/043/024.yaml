theological_decisions:
- issue: Anthropomorphic language about God being affected by sacrifices and sins
  chosen_reading: Retain the anthropomorphic expressions 'satisfy me,' 'burdened me,'
    and 'wearied me' without softening them into abstract paraphrase.
  alternative_readings:
  - Render more abstractly as 'you did not honor me... you offended me'
  rationale: The Hebrew intentionally portrays Israel's sin as an affront that places
    a burden on God, in contrast to proper sacrificial devotion. Preserving the anthropomorphic
    tension follows the source text and avoids doctrinally motivated flattening.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
