theological_decisions:
- issue: Identity of 'your first father'
  chosen_reading: Rendered generically as 'your first father' without identifying
    the referent.
  alternative_readings:
  - Adam
  - Abraham
  - Jacob
  rationale: The Hebrew text does not specify which ancestral figure is intended.
    Preserving the phrase avoids importing a doctrinally or interpretively narrowed
    identification not demanded by the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
