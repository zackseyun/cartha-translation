id: ISA.43.27
reference: Isaiah 43:27
source:
  edition: WLC
  text: אָבִ֥י/ךָ הָ/רִאשׁ֖וֹן חָטָ֑א וּ/מְלִיצֶ֖י/ךָ פָּ֥שְׁעוּ בִֽ/י׃
translation:
  text: Your first father sinned, and your spokesmen rebelled against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your earliest ancestor sinned.' The phrase 'your first father' may refer
      generally to Israel's ancestral head rather than naming a specific individual.
    reason: lexical_alternative
  - marker: b
    text: Or 'your interpreters' or 'your mediators.' The Hebrew term can refer to
      representative leaders who speak on behalf of the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיךָ
  chosen: your father
  alternatives:
  - your ancestor
  lexicon: HALOT
  rationale: The noun means 'father' with 2ms suffix, here likely collective/representative
    rather than immediate biological father. 'Father' preserves the Hebrew image and
    allows the following qualifier 'first' to define the sense.
- source_word: הָרִאשׁוֹן
  chosen: first
  alternatives:
  - former
  - earliest
  lexicon: HALOT
  rationale: The adjective denotes what is first or earliest. 'First' is the most
    direct rendering and preserves the ambiguity of whether this refers to Adam, Jacob,
    or the nation's earliest ancestor.
- source_word: חָטָא
  chosen: sinned
  alternatives:
  - missed the mark
  - offended
  lexicon: HALOT
  rationale: Standard rendering of חטא in moral/religious contexts. 'Sinned' is clear,
    idiomatic, and theologically appropriate without paraphrase.
- source_word: מְלִיצֶיךָ
  chosen: your spokesmen
  alternatives:
  - your interpreters
  - your mediators
  - your ambassadors
  lexicon: HALOT
  rationale: The noun from ליץ can denote interpreters, mediators, or representatives
    who speak on behalf of another. In this prophetic accusation, 'spokesmen' best
    captures representative leaders speaking for the people without over-specifying
    priestly mediation.
- source_word: פָּשְׁעוּ
  chosen: rebelled
  alternatives:
  - transgressed
  - revolted
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or willful transgression, stronger
    than ordinary sin. 'Rebelled' preserves that covenantal force.
- source_word: בִי
  chosen: against me
  alternatives:
  - in me
  lexicon: HALOT
  rationale: 'With פשע, the preposition is idiomatically rendered ''against'' in English:
    they rebelled against God. This conveys the relational and adversarial force of
    the Hebrew construction.'
