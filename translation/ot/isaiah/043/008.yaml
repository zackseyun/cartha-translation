id: ISA.43.8
reference: Isaiah 43:8
source:
  edition: WLC
  text: הוֹצִ֥יא עַם עִוֵּ֖ר וְ/עֵינַ֣יִם יֵ֑שׁ וְ/חֵרְשִׁ֖ים וְ/אָזְנַ֥יִם לָֽ/מוֹ־׃
translation:
  text: Bring out a blind people, though they have eyes, and the deaf, though they
    have ears.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Lead out the blind people, yet they have eyes; and the deaf, yet they
      have ears.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצִיא
  chosen: Bring out
  alternatives:
  - Lead out
  - Bring forth
  lexicon: HALOT
  rationale: Hiphil imperative masculine singular of יצא, functioning as a command
    to cause someone to come out or be brought forth. 'Bring out' is natural modern
    English and preserves the imperative force.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  - a people
  lexicon: HALOT
  rationale: עם can mean 'people' or 'nation.' Here it refers collectively to a group
    characterized by blindness and deafness; 'people' fits the immediate context better
    than the more political 'nation.'
- source_word: עִוֵּר
  chosen: blind
  lexicon: HALOT
  rationale: Straightforward adjectival use meaning physically or metaphorically blind.
    'Blind' preserves the prophetic irony in context.
- source_word: וְעֵינַיִם יֵשׁ
  chosen: though they have eyes
  alternatives:
  - yet they have eyes
  - and they have eyes
  lexicon: HALOT
  rationale: 'Literally ''and eyes there are.'' In English, the concessive sense is
    required by the rhetoric: they are called blind despite possessing eyes. ''Though
    they have eyes'' best captures the contrast idiomatically without over-paraphrase.'
- source_word: וְחֵרְשִׁים
  chosen: and the deaf
  alternatives:
  - and deaf ones
  lexicon: HALOT
  rationale: Plural adjective used substantivally. Rendering with the article in English
    reflects the parallel structure with 'the blind people.'
- source_word: וְאָזְנַיִם לָמוֹ
  chosen: though they have ears
  alternatives:
  - yet they have ears
  - and ears belong to them
  lexicon: HALOT
  rationale: Literally 'and ears are to them/they have.' As with the previous clause,
    English needs the concessive force to express the irony of being deaf despite
    having ears.
