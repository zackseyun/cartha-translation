theological_decisions:
- issue: Nature of blindness and deafness
  chosen_reading: Retain the literal sensory terms while allowing the prophetic context
    to imply spiritual insensitivity.
  alternative_readings:
  - Explicitly interpret as spiritually blind and deaf in the main text
  rationale: The Hebrew uses ordinary terms for blindness and deafness, and the broader
    context of Isaiah often uses them metaphorically for covenantal and spiritual
    unresponsiveness. To preserve theological tension and avoid importing interpretation
    into the translation, the main text keeps the literal wording and lets the context
    carry the metaphorical force.
  doctrine_reference: Translation philosophy §3
