id: ISA.43.6
reference: Isaiah 43:6
source:
  edition: WLC
  text: אֹמַ֤ר לַ/צָּפוֹן֙ תֵּ֔נִי וּ/לְ/תֵימָ֖ן אַל תִּכְלָ֑אִי הָבִ֤יאִי בָנַ/י֙
    מֵ/רָח֔וֹק וּ/בְנוֹתַ֖/י מִ/קְצֵ֥ה הָ/אָֽרֶץ־׃
translation:
  text: I will say to the north, ‘Give them up,’ and to the south, ‘Do not hold them
    back.’ Bring my sons from far away, and my daughters from the end of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Give' / 'Do not withhold'; the Hebrew leaves the object implicit, referring
      to God's scattered people.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the end of the earth'; English also commonly says 'from the
      ends of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמַר
  chosen: I will say
  alternatives:
  - I say
  lexicon: HALOT
  rationale: 'Qal imperfect 1cs here is naturally future in this prophetic declaration:
    God announces what he will command.'
- source_word: לַצָּפוֹן
  chosen: to the north
  alternatives:
  - to the northland
  lexicon: HALOT
  rationale: Directional noun with prefixed preposition and article; rendered as the
    cardinal direction addressed personified.
- source_word: תֵּנִי
  chosen: Give them up
  alternatives:
  - Give
  - Hand them over
  lexicon: HALOT
  rationale: Imperative feminine singular addressed to the personified north. English
    requires an object; the context supplies the scattered people being summoned back,
    so 'them up' makes the command idiomatic without adding new content.
- source_word: וּלְתֵימָן
  chosen: and to the south
  alternatives:
  - and to Teman
  lexicon: HALOT
  rationale: In parallel with 'north,' תימן here denotes the south/southland, not
    the Edomite place-name Teman. The directional sense fits the gathering-from-all-directions
    context.
- source_word: אַל תִּכְלָאִי
  chosen: Do not hold them back
  alternatives:
  - Do not withhold
  - Do not restrain
  lexicon: HALOT
  rationale: Negative jussive/imperfect feminine singular addressed to the personified
    south. As with 'Give them up,' the implied object is the exiles/children of Israel;
    'hold them back' is clear modern English.
- source_word: הָבִיאִי
  chosen: Bring
  alternatives:
  - Bring in
  lexicon: HALOT
  rationale: Hiphil imperative feminine singular, continuing the address to the personified
    regions. Simple 'Bring' best fits the direct command.
- source_word: בָנַי
  chosen: my sons
  alternatives:
  - my children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural with 1cs suffix. Per gender-accurate
    philosophy, retain 'sons' rather than neutralizing.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from far off
  lexicon: HALOT
  rationale: Adverbial expression of distant origin. 'From far away' is natural modern
    English while preserving the sense.
- source_word: וּבְנוֹתַי
  chosen: and my daughters
  alternatives:
  - and my children
  lexicon: HALOT
  rationale: Specifically feminine plural with 1cs suffix; paired with 'my sons' to
    preserve the Hebrew's explicit gendered parallelism.
- source_word: מִקְצֵה הָאָרֶץ
  chosen: from the end of the earth
  alternatives:
  - from the ends of the earth
  - from the extremity of the earth
  lexicon: HALOT
  rationale: Literally singular 'from the end/extremity of the earth/land.' Although
    English often uses the idiom 'ends of the earth,' the Hebrew here is singular,
    so 'the end of the earth' more closely reflects the source while remaining idiomatic.
