theological_decisions:
- issue: Referent of the commands to north and south
  chosen_reading: The north and south are personified regions commanded by God to
    release and return his dispersed covenant people.
  alternative_readings:
  - Purely metaphorical cosmic forces without specific exile/gathering reference
  rationale: The immediate context of Isaiah 43 concerns Israel's restoration and
    regathering. The imperatives are feminine singular, matching the personified directional
    nouns, and the explicit objects 'my sons' and 'my daughters' identify the people
    being gathered.
