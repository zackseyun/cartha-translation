id: ISA.43.11
reference: Isaiah 43:11
source:
  edition: WLC
  text: אָנֹכִ֥י אָנֹכִ֖י יְהוָ֑ה וְ/אֵ֥ין מִ/בַּלְעָדַ֖/י מוֹשִֽׁיעַ׃
translation:
  text: I, I am Yahweh, and besides me there is no savior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apart from me there is no savior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי אָנֹכִי
  chosen: I, I am
  alternatives:
  - I, even I, am
  - I myself am
  lexicon: HALOT
  rationale: The doubled independent pronoun is emphatic. Rendering it as 'I, I am' preserves the repetition and force without adding interpretive wording beyond the Hebrew. 'I, even I, am' is possible but slightly more expansive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאֵין
  chosen: and ... there is no
  alternatives:
  - and there is not
  lexicon: HALOT
  rationale: The particle אֵין expresses nonexistence. 'There is no' is idiomatic modern English and accurately conveys the existential negation.
- source_word: מִבַּלְעָדַי
  chosen: besides me
  alternatives:
  - apart from me
  - except for me
  lexicon: HALOT
  rationale: The prepositional form means 'besides me/apart from me.' 'Besides me' is concise, natural, and preserves the exclusivity claim. 'Apart from me' is a viable alternative and is preserved in a footnote.
- source_word: מוֹשִׁיעַ
  chosen: savior
  alternatives:
  - one who saves
  - deliverer
  lexicon: HALOT
  rationale: The Hiphil participle of ישׁע denotes one who saves/delivers. 'Savior' is the most natural singular substantive in English and fits the absolute exclusivity asserted here. 'Deliverer' is possible but slightly narrower in contemporary usage.
