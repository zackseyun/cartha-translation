theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets יְהוָה → 'the LORD' as the default
    rendering. This preserves continuity with the reverential substitution tradition
    without denying the underlying proper name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Exclusivity of salvation
  chosen_reading: and besides me there is no savior
  alternative_readings:
  - and apart from me there is no savior
  rationale: The Hebrew makes an exclusive claim about YHWH as the only savior. The
    translation preserves that theological force directly without softening or expanding
    it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
