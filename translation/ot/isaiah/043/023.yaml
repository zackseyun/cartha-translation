id: ISA.43.23
reference: Isaiah 43:23
source:
  edition: WLC
  text: לֹֽא הֵבֵ֤יאתָ לִּ/י֙ שֵׂ֣ה עֹלֹתֶ֔י/ךָ וּ/זְבָחֶ֖י/ךָ לֹ֣א כִבַּדְתָּ֑/נִי
    לֹ֤א הֶעֱבַדְתִּ֨י/ךָ֙ בְּ/מִנְחָ֔ה וְ/לֹ֥א הוֹגַעְתִּ֖י/ךָ בִּ/לְבוֹנָֽה־׃
translation:
  text: You have not brought me sheep for your burnt offerings, nor have you honored
    me with your sacrifices. I have not burdened you with grain offerings, nor wearied
    you with frankincense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have not made you serve with grain offerings.' The
      Hebrew idiom conveys imposing burdensome service.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׂה
  chosen: sheep
  alternatives:
  - lamb
  - small livestock
  lexicon: HALOT
  rationale: שֵׂה is a collective/singular term for small livestock, especially sheep
    or goats. In English, 'sheep' is natural and broad enough here; 'lamb' would be
    too specific, and 'small livestock' too technical.
- source_word: עֹלֹתֶיךָ
  chosen: your burnt offerings
  alternatives:
  - your ascending offerings
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for a whole burnt offering. 'Burnt
    offerings' is the established and accurate cultic rendering; 'ascending offerings'
    is more etymological but less idiomatic.
- source_word: זְבָחֶיךָ
  chosen: your sacrifices
  alternatives:
  - your slaughter offerings
  lexicon: HALOT
  rationale: זֶבַח broadly denotes sacrifice, often a slaughtered offering. 'Sacrifices'
    best fits readable modern English without losing the cultic sense.
- source_word: כִבַּדְתָּנִי
  chosen: have you honored me
  alternatives:
  - have you glorified me
  - have you treated me as weighty
  lexicon: HALOT
  rationale: כבד in the piel commonly means 'honor.' 'Honored me' is the clearest
    idiomatic rendering in context, where sacrificial neglect is framed as failure
    to give due honor to God.
- source_word: הֶעֱבַדְתִּיךָ
  chosen: I have not burdened you
  alternatives:
  - I have not made you serve
  - I have not enslaved you
  lexicon: HALOT
  rationale: The hiphil of עבד can mean 'make serve' or 'impose service/labor.' In
    this context, parallel with 'nor wearied you,' the sense is that God did not impose
    onerous cultic demands. 'Burdened you' captures the idiomatic force better than
    the more wooden 'made you serve.'
- source_word: מִנְחָה
  chosen: grain offerings
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In sacrificial context מִנְחָה commonly refers to a grain offering. 'Grain
    offerings' is more precise than the generic 'offering' and fits the cultic setting.
- source_word: הוֹגַעְתִּיךָ
  chosen: wearied you
  alternatives:
  - wearied you out
  - exhausted you
  lexicon: HALOT
  rationale: יגע in the hiphil means to cause weariness. 'Wearied you' is direct,
    natural, and preserves the parallelism with 'burdened you.'
- source_word: לְבוֹנָה
  chosen: frankincense
  alternatives:
  - incense
  lexicon: HALOT
  rationale: לְבוֹנָה specifically denotes frankincense, not incense in general. The
    more specific rendering preserves the lexical meaning and cultic detail.
- source_word: לִי
  chosen: me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition marks direction/benefaction. In English, 'brought me'
    is idiomatic and adequately conveys the sense without the stiffer 'brought for
    me.'
