theological_decisions:
- issue: Sense of God's statement about sacrificial service
  chosen_reading: God says he did not impose oppressive ritual demands on Israel
  alternative_readings:
  - God says he did not require offerings at all
  - God contrasts his light demands with Israel's failure to honor him
  rationale: 'The paired clauses ''I have not burdened you with grain offerings, nor
    wearied you with frankincense'' are best read rhetorically: God is rebuking Israel
    for neglect despite not having oppressed them with excessive cultic demands. The
    verse does not deny the legitimacy of offerings in the Mosaic system; it highlights
    Israel''s failure and God''s non-oppressive posture.'
  doctrine_reference: Preserve theological tension rather than resolve it
