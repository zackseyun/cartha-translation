id: ISA.43.28
reference: Isaiah 43:28
source:
  edition: WLC
  text: וַ/אֲחַלֵּ֖ל שָׂ֣רֵי קֹ֑דֶשׁ וְ/אֶתְּנָ֤ה לַ/חֵ֨רֶם֙ יַעֲקֹ֔ב וְ/יִשְׂרָאֵ֖ל
    לְ/גִדּוּפִֽים׃ס
translation:
  text: So I profaned the princes of the sanctuary, and I gave Jacob over to destruction,
    and Israel to revilings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the ban' / 'to being devoted to destruction.' The Hebrew חֵרֶם refers
      to something placed under a ban for destruction in divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲחַלֵּל
  chosen: I profaned
  alternatives:
  - I defiled
  - I dishonored
  lexicon: HALOT
  rationale: 'From חלל in the piel, meaning to treat as profane or desecrate. ''Profaned''
    preserves the cultic/religious force better than the more generic ''dishonored.''
    The prefixed waw with imperfect is rendered as a past narrative/resultative sense
    in context: ''So I profaned.'''
- source_word: שָׂרֵי קֹדֶשׁ
  chosen: the princes of the sanctuary
  alternatives:
  - the holy princes
  - the princes of holiness
  lexicon: HALOT
  rationale: שָׂרִים are rulers/princes/officials. The construct with קֹדֶשׁ most
    naturally points to the holy sphere, i.e., sanctuary/holy office, rather than
    describing the princes as morally holy. 'Princes of the sanctuary' communicates
    leaders associated with the sacred order, likely priestly or cultic leaders.
- source_word: וְאֶתְּנָה
  chosen: and I gave
  alternatives:
  - and I handed over
  - and I delivered
  lexicon: HALOT
  rationale: נתן is broadly 'give,' but in judgment contexts can mean 'give over.'
    The simple verb is retained here, with the complement clarifying the judicial
    sense.
- source_word: לַחֵרֶם
  chosen: over to destruction
  alternatives:
  - to the ban
  - to utter destruction
  - to being devoted to destruction
  lexicon: HALOT
  rationale: חֵרֶם in judgment contexts denotes something devoted to destruction or
    placed under the ban. 'Over to destruction' is readable modern English while preserving
    the severe judicial sense. Because 'the ban' is a significant lexical alternative
    with intertextual value, it is preserved in a footnote.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Proper name retained by standard transliteration. Here it stands metonymically
    for the covenant people.
- source_word: וְיִשְׂרָאֵל
  chosen: and Israel
  rationale: Proper name retained by standard transliteration, parallel to 'Jacob'
    as a poetic double designation for the nation.
- source_word: לְגִדּוּפִים
  chosen: to revilings
  alternatives:
  - to insults
  - to reproaches
  - to blasphemies
  lexicon: HALOT
  rationale: גדופים denotes abusive speech, taunts, or revilings. 'Revilings' preserves
    the plural and the public-shame dimension. 'Blasphemies' is possible etymologically
    but would sound too specifically God-directed in English here; the object is Israel
    becoming the target of scorn.
