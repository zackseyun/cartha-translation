theological_decisions:
- issue: Nature of divine judgment language in חֵרֶם
  chosen_reading: Rendered as 'gave Jacob over to destruction' rather than a softer
    idiom.
  alternative_readings:
  - gave Jacob over to the ban
  - devoted Jacob to destruction
  rationale: The verse speaks of covenant judgment in severe terms. The translation
    preserves that severity without importing later doctrinal categories. 'Over to
    destruction' communicates the judicial handing-over while remaining readable;
    the more formal 'the ban' is preserved in a footnote because of its biblical-theological
    significance.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referent of שָׂרֵי קֹדֶשׁ
  chosen_reading: Cultic/sacred leaders associated with the sanctuary.
  alternative_readings:
  - holy princes
  - priests
  rationale: The Hebrew does not explicitly say 'priests,' so that should not be imported.
    At the same time, the construct with 'holiness/sanctuary' points to leaders of
    the sacred sphere, not merely secular rulers who happen to be holy.
  doctrine_reference: Translation philosophy §§1, 5
