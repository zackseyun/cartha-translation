id: ISA.43.16
reference: Isaiah 43:16
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הַ/נּוֹתֵ֥ן בַּ/יָּ֖ם דָּ֑רֶךְ וּ/בְ/מַ֥יִם עַזִּ֖ים נְתִיבָֽה׃
translation:
  text: 'Thus says Yahweh, who makes a way in the sea and a path in the mighty waters:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through the sea' and 'through mighty waters.' The Hebrew preposition is literally 'in,' but English may express the sense as movement through the waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the elevated but still natural register of כֹּה אָמַר without unnecessary expansion.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: In the prophetic messenger formula כֹּה אָמַר, English idiom normally uses the present, 'Thus says,' even though the Hebrew form is qatal. This reflects conventional and contextually appropriate discourse function rather than simple past time.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַנּוֹתֵן
  chosen: who makes
  alternatives:
  - who gives
  - who sets
  - who provides
  lexicon: HALOT
  rationale: 'The participle functions attributively of the LORD: ''the one who makes/gives.'' ''Makes'' is the most natural English choice with ''way'' and ''path,'' especially in the exodus-allusive context of opening a route through the sea.'
- source_word: בַּיָּם
  chosen: in the sea
  alternatives:
  - through the sea
  lexicon: HALOT
  rationale: The preposition is literally 'in.' English 'in the sea' is sufficiently natural and preserves the imagery; 'through the sea' is interpretive and possible, but not necessary in the main text.
- source_word: דָּרֶךְ
  chosen: a way
  alternatives:
  - a road
  lexicon: HALOT
  rationale: '''Way'' is the standard rendering and fits both literal and metaphorical resonance, especially recalling the exodus.'
- source_word: וּבְמַיִם עַזִּים
  chosen: in the mighty waters
  alternatives:
  - in strong waters
  - in raging waters
  lexicon: HALOT
  rationale: עַזִּים means strong/mighty. 'Mighty waters' is idiomatic, vivid, and preserves the force of the Hebrew without overinterpreting it as 'raging.'
- source_word: נְתִיבָה
  chosen: a path
  alternatives:
  - a track
  - a pathway
  lexicon: HALOT
  rationale: A near-synonym to דָּרֶךְ, but distinct enough to preserve the poetic parallelism. 'Path' is concise and natural.
