id: ISA.43.10
reference: Isaiah 43:10
source:
  edition: WLC
  text: אַתֶּ֤ם עֵדַ/י֙ נְאֻם יְהוָ֔ה וְ/עַבְדִּ֖/י אֲשֶׁ֣ר בָּחָ֑רְתִּי לְמַ֣עַן
    תֵּ֠דְעוּ וְ/תַאֲמִ֨ינוּ לִ֤/י וְ/תָבִ֨ינוּ֙ כִּֽי אֲנִ֣י ה֔וּא לְ/פָנַ/י֙ לֹא
    נ֣וֹצַר אֵ֔ל וְ/אַחֲרַ֖/י לֹ֥א יִהְיֶֽה־־־׃ס
translation:
  text: You are my witnesses, declares the LORD, and my servant whom I have chosen,
    so that you may know and believe me and understand that I am he. Before me no
    god was formed, and after me there will be none.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and believe in me' or 'and trust me.' The Hebrew can express trusting
      or believing with God as the object; 'believe me' preserves the direct force
      here.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''that I am the one.'' Hebrew: ''that I am he,'' a compact formula of
      divine self-identification used in Isaiah.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew is elliptical: ''and after me there will not be.'' The implied sense
      is ''there will be no god'' or ''there will be none.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵדַי
  chosen: my witnesses
  alternatives:
  - my witness
  lexicon: HALOT
  rationale: Plural noun with 1cs suffix; addresses Israel collectively as multiple
    witnesses. English plural best matches the Hebrew form and discourse context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English
    and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad canonical continuity.
- source_word: וְעַבְדִּי
  chosen: and my servant
  alternatives:
  - and my slave
  lexicon: HALOT
  rationale: Hebrew עבד can denote servant/slave, but here it functions as an honorific
    covenantal designation for Israel/Jacob in Isaiah, not emphasizing bonded status.
    'Servant' is the most contextually fitting English rendering.
- source_word: אֲשֶׁר בָּחָרְתִּי
  chosen: whom I have chosen
  alternatives:
  - that I chose
  lexicon: HALOT
  rationale: Relative clause identifying the servant. Present perfect in English conveys
    the abiding result of God's prior choice.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the sake of
  lexicon: HALOT
  rationale: Introduces purpose. 'So that' is clear modern English and preserves the
    purposive force.
- source_word: תֵּדְעוּ
  chosen: you may know
  alternatives:
  - you will know
  lexicon: HALOT
  rationale: Imperfect after לְמַעַן expresses intended result/purpose rather than
    simple future.
- source_word: וְתַאֲמִינוּ לִי
  chosen: and believe me
  alternatives:
  - and believe in me
  - and trust me
  lexicon: HALOT
  rationale: With אמן in the Hiphil plus ל, the sense can be 'believe/trust' a person
    or statement. 'Believe me' best reflects the direct relational-object construction
    here and avoids importing a more developed theological idiom of 'believe in.'
- source_word: וְתָבִינוּ
  chosen: and understand
  alternatives:
  - and discern
  lexicon: HALOT
  rationale: Completes the triad know/believe/understand, preserving the cognitive
    progression in straightforward English.
- source_word: כִּי אֲנִי הוּא
  chosen: that I am he
  alternatives:
  - that I am the one
  - that I am
  lexicon: HALOT
  rationale: This Isaianic self-declaration is tersely expressed in Hebrew. 'I am
    he' preserves the idiom and its solemn self-identification better than the more
    interpretive 'I am the one.' 'I am' alone would risk over-reading the phrase beyond
    the Hebrew wording.
- source_word: לְפָנַי
  chosen: Before me
  alternatives:
  - prior to me
  lexicon: HALOT
  rationale: Temporal sense fits the following statement about no god being formed
    before YHWH.
- source_word: לֹא נוֹצַר אֵל
  chosen: no god was formed
  alternatives:
  - no god was fashioned
  - God was not formed
  lexicon: HALOT
  rationale: Passive of יצר with אֵל as subject complement indicates that no deity
    came into being before him. Lowercase 'god' reflects the common noun and the polemical
    contrast with the true God.
- source_word: וְאַחֲרַי לֹא יִהְיֶה
  chosen: and after me there will be none
  alternatives:
  - and after me there will be no god
  - and none will exist after me
  lexicon: HALOT
  rationale: The Hebrew omits an explicit noun after 'there will not be'; English
    can either supply 'god' or leave it elliptical. 'There will be none' preserves
    the terseness and naturally carries forward the implied category from the previous
    clause.
