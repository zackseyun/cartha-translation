theological_decisions:
- issue: Referent of 'my servant'
  chosen_reading: Collective reference to Israel/Jacob in this immediate context
  alternative_readings:
  - an individual servant figure
  - a prophetic representative
  rationale: In Isaiah 43 the addressees are explicitly plural ('you are my witnesses'),
    and 'my servant whom I have chosen' most naturally apposes the covenant people
    collectively. The translation keeps the singular 'servant' because that is the
    Hebrew form, without forcing a narrower messianic reading into the text.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Rendering of אֲנִי הוּא
  chosen_reading: Retain the idiomatic 'I am he'
  alternative_readings:
  - I am
  - I am the one
  rationale: The phrase is theologically weighty and echoes elsewhere in Isaiah, but
    the translation should preserve the Hebrew idiom without overstating later theological
    associations. 'I am he' is both faithful and appropriately restrained.
  doctrine_reference: Original-language primacy; preserve theological tension rather
    than resolve it.
