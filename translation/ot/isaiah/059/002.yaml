theological_decisions:
- issue: Anthropomorphic language for divine withdrawal
  chosen_reading: Retain 'his face' language rather than interpret it as mere favor
    or presence
  alternative_readings:
  - have turned away from you
  - have withdrawn his favor from you
  rationale: The Hebrew explicitly uses the anthropomorphic idiom of God's 'face.'
    Preserving the image maintains the theological and literary force of covenantal
    estrangement without reducing it to an abstract concept.
  doctrine_reference: Translation philosophy §1, §3
- issue: Moral causality of separation from God
  chosen_reading: State that the people's sins are what divide and hide, without implying
    divine inability or change in God's nature
  alternative_readings:
  - your sins have separated you from God
  rationale: The verse explains the relational breach as caused by human sin in contrast
    to v.1. The translation should preserve that causal claim while not importing
    broader doctrinal formulations beyond the text.
  doctrine_reference: Translation philosophy §1, §3
