id: ISA.59.2
reference: Isaiah 59:2
source:
  edition: WLC
  text: כִּ֤י אִם עֲוֺנֹֽתֵי/כֶם֙ הָי֣וּ מַבְדִּלִ֔ים בֵּינֵ/כֶ֕ם לְ/בֵ֖ין אֱלֹֽהֵי/כֶ֑ם
    וְ/חַטֹּֽאותֵי/כֶ֗ם הִסְתִּ֧ירוּ פָנִ֛ים מִ/כֶּ֖ם מִ/שְּׁמֽוֹעַ־׃
translation:
  text: But your iniquities have become those dividing between you and your God, and
    your sins have hidden his face from you, from hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'your iniquities have separated you from your God,
      and your sins have hidden his face from you so that he does not hear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Indeed, it is
  lexicon: HALOT
  rationale: In context this adversative combination contrasts v.1's denial of divine
    inability with the real cause in v.2. 'But' gives the natural English contrast
    without overcomplicating the clause.
- source_word: עֲוֺנֹתֵיכֶם
  chosen: your iniquities
  alternatives:
  - your guilt
  - your offenses
  lexicon: HALOT
  rationale: עָוֹן often carries the sense of crookedness/guilt/iniquity, distinct
    from the following חַטָּאוֹת ('sins'). 'Iniquities' preserves the lexical distinction
    better than flattening both to 'sins'.
- source_word: הָיוּ מַבְדִּלִים
  chosen: have become those dividing
  alternatives:
  - have separated
  - are separating
  lexicon: HALOT
  rationale: The construction combines היה with the participle of בדל. A smoother
    English rendering would be 'have separated,' but 'have become those dividing'
    more transparently reflects the Hebrew aspect and participial force while still
    being intelligible.
- source_word: בֵּינֵיכֶם לְבֵין אֱלֹהֵיכֶם
  chosen: between you and your God
  alternatives:
  - between yourselves and your God
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for separation between two parties.
    'Between you and your God' is idiomatic English and preserves the covenantal relational
    force.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with singular referent
    and possessive suffix here clearly denotes Israel's God. 'Your God' is the correct
    contextual rendering.
- source_word: וְחַטֹּאותֵיכֶם
  chosen: and your sins
  alternatives:
  - and your sin-offenses
  lexicon: HALOT
  rationale: חַטָּאת here denotes sins/misdeeds, distinct from עָוֹן but naturally
    rendered 'sins' in English. Keeping both terms distinct across the verse reflects
    the Hebrew parallelism.
- source_word: הִסְתִּירוּ פָנִים
  chosen: have hidden his face
  alternatives:
  - have made him hide his face
  - have concealed the face
  lexicon: HALOT
  rationale: Literally 'have hidden face.' In Hebrew this commonly implies the withdrawal
    of favorable presence. Supplying 'his' is required for natural English and is
    contextually implied by relation to 'your God.'
- source_word: מִכֶּם
  chosen: from you
  alternatives:
  - away from you
  lexicon: HALOT
  rationale: The preposition marks separation. 'From you' is the most direct rendering
    and fits the idiom 'hide one's face from'.
- source_word: מִשְּׁמוֹעַ
  chosen: from hearing
  alternatives:
  - so as not to hear
  - from listening
  lexicon: HALOT
  rationale: 'The prefixed מִן with infinitive construct expresses result or effect:
    his face is hidden with the consequence of not hearing. ''From hearing'' is formally
    close; the alternative ''so as not to hear'' is smoother but slightly more interpretive.'
