theological_decisions:
- issue: Metaphorical force of inadequate covering
  chosen_reading: Retain the concrete imagery of webs/clothing/covering while allowing
    the moral implication to emerge from context rather than making it explicit in
    translation.
  alternative_readings:
  - Paraphrase the sense as inability to hide themselves by their evil works
  rationale: The verse uses vivid material imagery to condemn moral evil. A more interpretive
    rendering would import explanation not stated directly in the Hebrew. Preserving
    the metaphor aligns with optimal equivalence and avoids over-resolving the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
