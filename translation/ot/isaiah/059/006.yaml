id: ISA.59.6
reference: Isaiah 59:6
source:
  edition: WLC
  text: קֽוּרֵי/הֶם֙ לֹא יִהְי֣וּ לְ/בֶ֔גֶד וְ/לֹ֥א יִתְכַּסּ֖וּ בְּ/מַֽעֲשֵׂי/הֶ֑ם
    מַֽעֲשֵׂי/הֶם֙ מַֽעֲשֵׂי אָ֔וֶן וּ/פֹ֥עַל חָמָ֖ס בְּ/כַפֵּי/הֶֽם־־׃
translation:
  text: Their webs will not become clothing, nor will they cover themselves with their
    deeds; their deeds are deeds of wickedness, and the work of violence is in their
    hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their spiderwebs.' The Hebrew term refers to what is woven/spun; 'webs'
      preserves the metaphor without over-specifying.
    reason: lexical_alternative
  - marker: b
    text: Or 'their deeds are deeds of iniquity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּרֵיהֶם
  chosen: their webs
  alternatives:
  - their spiderwebs
  - their weaving threads
  lexicon: HALOT
  rationale: The noun refers to something woven/spun; in the immediate context of
    v. 5 ('they hatch viper's eggs and weave the spider's web'), 'webs' best preserves
    the metaphor and links naturally to the clothing image. 'Spiderwebs' is possible
    but slightly more explicit than the Hebrew here.
- source_word: לְבֶגֶד
  chosen: clothing
  alternatives:
  - a garment
  - for clothing
  lexicon: HALOT
  rationale: בגד commonly means 'garment/clothing.' 'Clothing' reads naturally in
    English after 'will not become' and keeps the generic sense rather than suggesting
    a single item.
- source_word: יִתְכַּסּוּ
  chosen: will they cover themselves
  alternatives:
  - will they clothe themselves
  - will they be covered
  lexicon: HALOT
  rationale: The hitpael form is reflexive, so 'cover themselves' best reflects the
    grammar. It also maintains the metaphor of inadequate moral covering.
- source_word: בְּמַעֲשֵׂיהֶם
  chosen: with their deeds
  alternatives:
  - by their works
  - in their actions
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental: they cannot cover themselves
    by means of what they do. ''Deeds'' is clear modern English and fits the repeated
    noun.'
- source_word: מַעֲשֵׂיהֶם
  chosen: their deeds
  alternatives:
  - their works
  - their actions
  lexicon: HALOT
  rationale: Repeated for emphasis in Hebrew; retained as 'their deeds' for consistency
    and rhetorical force.
- source_word: מַעֲשֵׂי אָוֶן
  chosen: deeds of wickedness
  alternatives:
  - works of iniquity
  - deeds of trouble
  - deeds of evil
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, iniquity, or trouble/mischief. In this moral
    indictment context, 'wickedness' best captures the ethical force in accessible
    English.
- source_word: וּפֹעַל חָמָס
  chosen: the work of violence
  alternatives:
  - violent work
  - the deed of violence
  lexicon: HALOT
  rationale: פֹעַל denotes work/deed/result, and חָמָס is violence/wrongdoing. 'The
    work of violence' preserves the construct relationship and the concrete moral
    accusation.
- source_word: בְּכַפֵּיהֶם
  chosen: is in their hands
  alternatives:
  - is on their palms
  - is at their hands
  lexicon: HALOT
  rationale: כף literally refers to the palm/hand. The idiom 'in their hands' is natural
    English and conveys possession and culpability.
- source_word: לֹא יִהְיוּ
  chosen: will not become
  alternatives:
  - will not be
  - shall not serve as
  lexicon: HALOT
  rationale: 'With לְבֶגֶד, the sense is not simple existence but result/function:
    the webs will not turn into or serve as clothing. ''Will not become'' captures
    that well.'
