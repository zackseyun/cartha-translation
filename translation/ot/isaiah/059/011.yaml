id: ISA.59.11
reference: Isaiah 59:11
source:
  edition: WLC
  text: נֶהֱמֶ֤ה כַ/דֻּבִּים֙ כֻּלָּ֔/נוּ וְ/כַ/יּוֹנִ֖ים הָגֹ֣ה נֶהְגֶּ֑ה נְקַוֶּ֤ה
    לַ/מִּשְׁפָּט֙ וָ/אַ֔יִן לִֽ/ישׁוּעָ֖ה רָחֲקָ֥ה מִמֶּֽ/נּוּ׃
translation:
  text: We all growl like bears, and like doves we moan and moan; we hope for justice,
    but there is none; for salvation, but it is far from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we wait for justice' / 'we look for justice'; the Hebrew verb can express
      both waiting and hoping.
    reason: lexical_alternative
  - marker: b
    text: Or 'deliverance' for 'salvation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶהֱמֶה
  chosen: growl
  alternatives:
  - roar
  - moan
  lexicon: HALOT
  rationale: The verb המה denotes making a loud murmuring or growling sound. With
    the comparison 'like bears,' 'growl' best matches the animal image in natural
    English. 'Roar' is possible but stronger than the likely sound intended; 'moan'
    would blur the contrast with the dove clause.
- source_word: כַדֻּבִּים
  chosen: like bears
  lexicon: HALOT
  rationale: Straightforward simile introduced by כ. Plural retained for the collective
    image.
- source_word: כֻּלָּנוּ
  chosen: we all
  alternatives:
  - all of us
  lexicon: HALOT
  rationale: Placed early in English to reflect the collective lament and natural
    English word order.
- source_word: וְכַיּוֹנִים
  chosen: and like doves
  lexicon: HALOT
  rationale: Coordinates a second simile contrasting the harsher bear sound with the
    plaintive dove sound.
- source_word: הָגֹה נֶהְגֶּה
  chosen: we moan and moan
  alternatives:
  - we keep moaning
  - we coo mournfully
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Moan
    and moan' preserves the emphasis in idiomatic English. 'Coo' is too neutral or
    gentle in English and misses the lament context.
- source_word: נְקַוֶּה
  chosen: we hope for
  alternatives:
  - we wait for
  - we look for
  lexicon: HALOT
  rationale: קוה can mean wait/hope. In this lament context, expectation directed
    toward an absent outcome is best conveyed by 'hope for,' while still allowing
    the sense of waiting.
- source_word: לַמִּשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the just order or vindicating justice expected
    from God, not merely a judicial verdict. 'Justice' is clearer and more natural
    in modern English.
- source_word: וָאַיִן
  chosen: but there is none
  alternatives:
  - and there is none
  - but there is nothing
  lexicon: HALOT
  rationale: The clause expresses frustrated expectation. 'But there is none' brings
    out the adversative force in context more naturally than a simple 'and.'
- source_word: לִישׁוּעָה
  chosen: for salvation
  alternatives:
  - for deliverance
  lexicon: HALOT
  rationale: יְשׁוּעָה commonly denotes salvation/deliverance. 'Salvation' preserves
    the broader theological and covenantal resonance, while still fitting the immediate
    context of rescue.
- source_word: רָחֲקָה מִמֶּנּוּ
  chosen: it is far from us
  alternatives:
  - it remains far from us
  - it has gone far from us
  lexicon: HALOT
  rationale: The predicate states the remoteness of salvation from the speakers. Supplying
    'it is' is required in English and keeps the sense simple and direct.
