theological_decisions:
- issue: Rendering of יְשׁוּעָה in a prophetic lament
  chosen_reading: salvation
  alternative_readings:
  - deliverance
  rationale: The term can denote concrete rescue, but 'salvation' better preserves
    the theological breadth of Isaiah's usage without importing later doctrinal specifics.
    The immediate context still supports the sense of hoped-for rescue/vindication.
  doctrine_reference: Translation philosophy §5; Contested terms table does not override
    this term
