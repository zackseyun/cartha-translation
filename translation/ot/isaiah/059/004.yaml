id: ISA.59.4
reference: Isaiah 59:4
source:
  edition: WLC
  text: אֵין קֹרֵ֣א בְ/צֶ֔דֶק וְ/אֵ֥ין נִשְׁפָּ֖ט בֶּ/אֱמוּנָ֑ה בָּט֤וֹחַ עַל תֹּ֨הוּ֙
    וְ/דַבֶּר שָׁ֔וְא הָר֥וֹ עָמָ֖ל וְ/הוֹלֵ֥יד אָֽוֶן־־־׃
translation:
  text: No one calls for righteousness, and no one pleads with faithfulness; trusting
    in emptiness and speaking falsehood, they conceive trouble and give birth to wickedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calls for justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'enters judgment in truth' or 'pleads honestly.'
    reason: lexical_alternative
  - marker: c
    text: '''Emptiness'' may also be rendered ''futility'' or ''vanity.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'give birth to iniquity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵא בְצֶדֶק
  chosen: calls for righteousness
  alternatives:
  - calls in righteousness
  - calls for justice
  lexicon: HALOT
  rationale: קרא with ב can denote calling with reference to or on behalf of something.
    In this judicial context, 'calls for righteousness' best captures the sense of
    appealing for what is right. 'Justice' is a viable alternative for צֶדֶק, but
    'righteousness' preserves the broader moral-judicial sense and aligns with consistency
    concerns.
- source_word: נִשְׁפָּט בֶּאֱמוּנָה
  chosen: pleads with faithfulness
  alternatives:
  - enters judgment in truth
  - is judged faithfully
  - pleads honestly
  lexicon: HALOT
  rationale: The Niphal of שפט here is best taken in a forensic sense within the parallelism
    of public/legal corruption. 'Pleads' gives idiomatic English for engaging a legal
    case. אֱמוּנָה carries the sense of faithfulness, reliability, or integrity; 'with
    faithfulness' preserves that nuance better than the narrower 'truth' or the more
    interpretive 'honestly'.
- source_word: בָּטוֹחַ עַל תֹּהוּ
  chosen: trusting in emptiness
  alternatives:
  - relying on emptiness
  - trusting in what is futile
  - trusting in vanity
  lexicon: HALOT
  rationale: בטח means to trust/rely. תֹהוּ denotes emptiness, formlessness, unreality,
    or futility. 'Emptiness' is vivid and sufficiently broad, while avoiding archaic
    'vanity.' The participial force is carried forward in English as a descriptive
    participial phrase.
- source_word: וְדַבֶּר שָׁוְא
  chosen: and speaking falsehood
  alternatives:
  - and speaking emptiness
  - and speaking lies
  lexicon: HALOT
  rationale: שָׁוְא often denotes falsehood, worthlessness, or deceit. 'Falsehood'
    preserves both the moral and semantic breadth better than the more specific 'lies'
    or the overly literal 'emptiness.'
- source_word: הָרוֹ עָמָל
  chosen: they conceive trouble
  alternatives:
  - conceiving mischief
  - they are pregnant with trouble
  - they conceive toil
  lexicon: HALOT
  rationale: The verb הרה is a pregnancy/conception metaphor, here likely collective/singular
    used generically. English plural 'they conceive' smooths the syntax in context.
    עָמָל can mean trouble, mischief, or toil; here in parallel with אָוֶן it points
    to harmful wrongdoing, so 'trouble' is a natural rendering.
- source_word: וְהוֹלֵיד אָוֶן
  chosen: and give birth to wickedness
  alternatives:
  - and bring forth iniquity
  - and give birth to evil
  - and beget trouble
  lexicon: HALOT
  rationale: 'ילד in Hiphil continues the birth metaphor: ''give birth to'' is the
    most transparent English equivalent. אָוֶן can mean wickedness, iniquity, or trouble;
    ''wickedness'' best conveys moral evil in this prophetic denunciation.'
