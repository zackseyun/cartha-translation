theological_decisions:
- issue: Rendering of moral-judicial terms in a corruption oracle
  chosen_reading: Use 'righteousness' for צֶדֶק and 'faithfulness' for אֱמוּנָה without
    narrowing either to exclusively legal or doctrinal categories.
  alternative_readings:
  - Use 'justice' and 'truth' to foreground courtroom language
  rationale: The verse condemns social and legal corruption, but the Hebrew terms
    retain broader covenantal-moral force. The chosen rendering preserves that breadth
    while remaining intelligible in context.
  doctrine_reference: Translation philosophy §§1, 5
