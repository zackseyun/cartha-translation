theological_decisions:
- issue: Rendering of ethical-legal term מִשְׁפָּט
  chosen_reading: justice
  alternative_readings:
  - judgment
  rationale: The verse condemns social and moral disorder, not merely legal procedure.
    'Justice' best communicates the prophetic concern without importing a narrower
    courtroom sense.
  doctrine_reference: Translation philosophy §1, §6
- issue: Pronoun number in בָּהּ after plural antecedents
  chosen_reading: everyone who walks in them
  alternative_readings:
  - everyone who walks in it
  rationale: The Hebrew singular pronoun likely refers collectively to the path-system
    just mentioned. English plural smooths the sense and avoids awkwardness while
    preserving meaning.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
