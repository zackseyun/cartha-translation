id: ISA.59.8
reference: Isaiah 59:8
source:
  edition: WLC
  text: דֶּ֤רֶךְ שָׁלוֹם֙ לֹ֣א יָדָ֔עוּ וְ/אֵ֥ין מִשְׁפָּ֖ט בְּ/מַעְגְּלוֹתָ֑/ם נְתִיבֽוֹתֵי/הֶם֙
    עִקְּשׁ֣וּ לָ/הֶ֔ם כֹּ֚ל דֹּרֵ֣ךְ בָּ֔/הּ לֹ֥א יָדַ֖ע שָׁלֽוֹם׃
translation:
  text: They do not know the way of peace, and there is no justice in their tracks;
    they have made their paths crooked for themselves; everyone who walks in them
    does not know peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no judgment in their tracks.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in it'; the singular likely refers collectively to their course
      or path.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  - road
  lexicon: HALOT
  rationale: Common metaphor for manner or course of life. 'Way of peace' is idiomatic
    and natural in English, while preserving the Hebrew metaphor.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - wholeness
  - well-being
  lexicon: HALOT
  rationale: Standard rendering in this context. While shalom can include wholeness
    and well-being, 'peace' best fits both clauses and preserves the recognizable
    prophetic expression.
- source_word: יָדָעוּ
  chosen: do not know
  alternatives:
  - have not known
  - do not understand
  lexicon: HALOT
  rationale: ידע here denotes experiential or moral knowledge, not mere cognition.
    'Do not know' is sufficiently broad and idiomatic.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - right judgment
  lexicon: HALOT
  rationale: In this ethical-social context, 'justice' better communicates the sense
    than the more archaic or ambiguous 'judgment.'
- source_word: מַעְגְּלוֹתָם
  chosen: their tracks
  alternatives:
  - their paths
  - their courses
  lexicon: HALOT
  rationale: The noun can denote tracks or paths. Rendering it as 'tracks' preserves
    a distinction from the following 'paths' (נְתִיבוֹתֵיהֶם) and reflects the imagery
    of rutted courses of conduct.
- source_word: נְתִיבוֹתֵיהֶם
  chosen: their paths
  alternatives:
  - their ways
  - their roadways
  lexicon: HALOT
  rationale: A common term for paths or ways. 'Paths' is clear and keeps the poetic
    parallelism with 'way' and 'tracks' without flattening all three terms into one
    English gloss.
- source_word: עִקְּשׁוּ
  chosen: have made ... crooked
  alternatives:
  - have twisted
  - have made ... perverse
  lexicon: HALOT
  rationale: The verb conveys making something bent or twisted. 'Crooked' is vivid,
    idiomatic, and morally resonant in English.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  - to themselves
  lexicon: HALOT
  rationale: 'The dative is best taken as reflexive/advantageous here: they have fashioned
    these crooked paths for their own use or by their own agency. ''For themselves''
    makes the sense explicit in English.'
- source_word: כֹּל דֹּרֵךְ בָּהּ
  chosen: everyone who walks in them
  alternatives:
  - whoever treads on it
  - everyone who goes in them
  lexicon: HALOT
  rationale: The participle plus preposition denotes anyone traveling along these
    ways. Because the antecedent is the plural 'paths,' English plural 'them' is clearer
    than a formally singular 'it,' likely reflecting collective usage in Hebrew.
- source_word: לֹא יָדַע שָׁלוֹם
  chosen: does not know peace
  alternatives:
  - has not known peace
  - does not experience peace
  lexicon: HALOT
  rationale: Maintains the repetition with the opening clause and preserves the moral-experiential
    force of 'know.'
