theological_decisions:
- issue: Referent of the second person singular 'you' in the covenant promise
  chosen_reading: Retained as singular 'you' without interpretive expansion
  alternative_readings:
  - the prophet
  - Zion/Israel personified
  - the servant/redeemed community represented corporately
  rationale: The Hebrew text leaves the immediate referent implicit within the larger context. To preserve theological tension and avoid importing a specific interpretive tradition, the translation keeps the singular pronoun as given rather than specifying the addressee.
  doctrine_reference: Preserve theological tension rather than resolve it.
