id: ISA.59.21
reference: Isaiah 59:21
source:
  edition: WLC
  text: וַ/אֲנִ֗י זֹ֣את בְּרִיתִ֤/י אוֹתָ/ם֙ אָמַ֣ר יְהוָ֔ה רוּחִ/י֙ אֲשֶׁ֣ר עָלֶ֔י/ךָ וּ/דְבָרַ֖/י אֲשֶׁר שַׂ֣מְתִּי בְּ/פִ֑י/ךָ לֹֽא יָמ֡וּשׁוּ מִ/פִּי/ךָ֩ וּ/מִ/פִּ֨י זַרְעֲ/ךָ֜ וּ/מִ/פִּ֨י זֶ֤רַע זַרְעֲ/ךָ֙ אָמַ֣ר יְהוָ֔ה מֵ/עַתָּ֖ה וְ/עַד עוֹלָֽם־־־׃ס
translation:
  text: 'And as for me, this is my covenant with them, says Yahweh: my Spirit that is upon you, and my words that I have put in your mouth, shall not depart from your mouth, or from the mouth of your offspring, or from the mouth of your offspring’s offspring, says Yahweh, from now and forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your seed' and 'your seed’s seed.' The Hebrew uses the collective noun 'seed' for offspring/posterity.
    reason: lexical_alternative
  - marker: b
    text: Or 'from now on and forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And as for me
  alternatives:
  - And I
  - As for me
  lexicon: HALOT
  rationale: Fronted pronoun gives emphasis/contrast; 'And as for me' preserves the marked discourse shift better than a flat 'And I.'
- source_word: זֹאת בְּרִיתִי אוֹתָם
  chosen: this is my covenant with them
  alternatives:
  - this is my covenant for them
  - this is my covenant toward them
  lexicon: HALOT
  rationale: The idiom with בְּרִית plus object pronoun is naturally rendered relationally in English as 'covenant with them.' This is the clearest idiomatic equivalent.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: Prophetic formula is well represented by the present-tense quotative 'says.' YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested terms table for the divine name.
- source_word: רוּחִי אֲשֶׁר עָלֶיךָ
  chosen: my Spirit that is upon you
  alternatives:
  - my Spirit which is upon you
  - my breath/wind that is upon you
  lexicon: HALOT
  rationale: רוּחַ can mean spirit/wind/breath, but in covenantal-prophetic context with divine endowment, 'Spirit' is the most contextually fitting and traditional sense. 'Upon you' preserves the preposition עַל.
- source_word: וּדְבָרַי אֲשֶׁר שַׂמְתִּי בְּפִיךָ
  chosen: and my words that I have put in your mouth
  alternatives:
  - and my word that I have put in your mouth
  - and my words that I placed in your mouth
  lexicon: HALOT
  rationale: Plural דְבָרַי is retained as 'words.' Perfect שַׂמְתִּי is naturally rendered with English present perfect here to express abiding result.
- source_word: לֹא יָמוּשׁוּ
  chosen: shall not depart
  alternatives:
  - shall not move
  - shall not turn aside
  - shall not leave
  lexicon: HALOT
  rationale: מוּשׁ in this idiom means to depart/remove from a place. 'Shall not depart' is idiomatic and preserves the solemn covenantal force.
- source_word: מִפִּיךָ
  chosen: from your mouth
  alternatives:
  - out of your mouth
  lexicon: HALOT
  rationale: The preposition מִן is best rendered 'from' in this repeated formula.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: זֶרַע here denotes posterity. 'Offspring' preserves the collective singular sense better than 'descendants,' while avoiding the less natural 'seed' in modern English main text.
- source_word: זֶרַע זַרְעֲךָ
  chosen: your offspring’s offspring
  alternatives:
  - the offspring of your offspring
  - your descendants' descendants
  - your seed's seed
  lexicon: HALOT
  rationale: The construct chain expresses the next generation beyond 'your offspring.' 'Your offspring’s offspring' is concise and natural while preserving the generational progression.
- source_word: מֵעַתָּה וְעַד עוֹלָם
  chosen: from now and forever
  alternatives:
  - from now on and forever
  - from this time forth and forever
  - from now until eternity
  lexicon: HALOT
  rationale: This temporal idiom denotes unbroken duration beginning in the present. 'From now and forever' is readable modern English and preserves the force.
