theological_decisions:
- issue: Reference of the pronouns ('him/his')
  chosen_reading: All pronouns refer to the LORD, describing his self-initiated saving
    action because no human intercessor was found.
  alternative_readings:
  - The final clauses could be read more abstractly as divine power and righteousness
    acting without emphasizing reflexive force.
  rationale: The immediate context and Hebrew suffixes support reading the subject
    consistently as the LORD. The verse emphasizes that God himself acts when no human
    mediator is present. This preserves the text's theological tension without importing
    later doctrinal categories.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of צדקה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Per the contested-terms table, the default rendering is 'righteousness,'
    while 'justice' should be preserved where relevant. In Isaiah 59:16 the term can
    carry both moral rectitude and just action; the main text keeps 'righteousness'
    and the alternative is footnoted.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη / righteousness ~ justice'
