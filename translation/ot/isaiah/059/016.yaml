id: ISA.59.16
reference: Isaiah 59:16
source:
  edition: WLC
  text: וַ/יַּרְא֙ כִּֽי אֵ֣ין אִ֔ישׁ וַ/יִּשְׁתּוֹמֵ֖ם כִּ֣י אֵ֣ין מַפְגִּ֑יעַ וַ/תּ֤וֹשַֽׁע
    ל/וֹ֙ זְרֹע֔/וֹ וְ/צִדְקָת֖/וֹ הִ֥יא סְמָכָֽתְ/הוּ־׃
translation:
  text: He saw that there was no man, and he was appalled that there was no one to
    intercede; so his own arm brought him salvation, and his righteousness upheld
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no one to intervene' or 'no one to plead.' The Hebrew participle can
      denote one who steps in on behalf of another.
    reason: lexical_alternative
  - marker: b
    text: Or 'his justice upheld him.' The Hebrew term can denote both righteousness
      and justice.
    reason: lexical_alternative
  - marker: c
    text: '''Man'' translates a singular masculine Hebrew term. Here it refers to
      the absence of any human agent.'
    reason: cultural_note
lexical_decisions:
- source_word: אִישׁ
  chosen: man
  alternatives:
  - one
  - person
  lexicon: HALOT
  rationale: Rendered 'man' because the Hebrew is singular masculine and, per doctrine,
    gender-accurate forms are preferred where they match the source's intent. In context
    it denotes the absence of any human agent, but the masculine singular should be
    preserved rather than neutralized in the main text.
- source_word: וַיִּשְׁתּוֹמֵם
  chosen: he was appalled
  alternatives:
  - he was astonished
  - he was desolated
  lexicon: HALOT
  rationale: The verb conveys stunned astonishment or appalled amazement. 'Appalled'
    captures both the emotional shock and moral gravity better than the flatter 'astonished'
    in this context of societal failure.
- source_word: מַפְגִּיעַ
  chosen: to intercede
  alternatives:
  - to intervene
  - to plead
  lexicon: HALOT
  rationale: The Hiphil participle of פגע here refers to one who steps in on behalf
    of another. 'Intercede' best fits the context and the broader Isaianic usage of
    mediation before God, while 'intervene' is possible but less specifically relational.
- source_word: וַתּוֹשַׁע
  chosen: brought ... salvation
  alternatives:
  - saved
  - won victory
  lexicon: HALOT
  rationale: The feminine verb agrees with 'arm' and denotes effecting deliverance.
    'Brought him salvation' preserves the causative/resultative sense and keeps the
    noun 'salvation' audible, rather than reducing it to the simpler verbal 'saved
    him'.
- source_word: זְרֹעוֹ
  chosen: his own arm
  alternatives:
  - his arm
  lexicon: HALOT
  rationale: '''Arm'' is a common Hebrew metaphor for strength and decisive action.
    Adding ''own'' makes explicit the reflexive force implied by the context: since
    no human agent was available, he himself acted.'
- source_word: צִדְקָתוֹ
  chosen: his righteousness
  alternatives:
  - his justice
  lexicon: HALOT
  rationale: Although צדקה can in some contexts be rendered 'justice,' 'righteousness'
    is the default doctrinal rendering and fits the parallelism with God's saving
    action. It preserves the theological breadth of God's rightness and covenant faithfulness.
    'Justice' is worth preserving as a lexical alternative in a footnote.
- source_word: סְמָכָתְהוּ
  chosen: upheld him
  alternatives:
  - sustained him
  - supported him
  lexicon: HALOT
  rationale: The verb means to support or sustain. 'Upheld him' is idiomatic in English
    and matches the elevated register of the verse while preserving the image of divine
    righteousness as that which steadies and supports God's saving action.
