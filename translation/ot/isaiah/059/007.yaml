id: ISA.59.7
reference: Isaiah 59:7
source:
  edition: WLC
  text: רַגְלֵי/הֶם֙ לָ/רַ֣ע יָרֻ֔צוּ וִֽ/ימַהֲר֔וּ לִ/שְׁפֹּ֖ךְ דָּ֣ם נָקִ֑י מַחְשְׁבֽוֹתֵי/הֶם֙
    מַחְשְׁב֣וֹת אָ֔וֶן שֹׁ֥ד וָ/שֶׁ֖בֶר בִּ/מְסִלּוֹתָֽ/ם׃
translation:
  text: Their feet run to evil, and they hurry to shed innocent blood; their thoughts
    are thoughts of wickedness; devastation and destruction are in their highways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their plans are plans of iniquity"; the Hebrew word can denote thoughts,
      plans, or schemes.
    reason: lexical_alternative
  - marker: b
    text: Or "in their paths"; the Hebrew term refers literally to roads or highways
      and here also suggests the course of their conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַגְלֵיהֶם
  chosen: their feet
  alternatives:
  - the feet of them
  lexicon: HALOT
  rationale: Literal body-part imagery is retained; in Hebrew this metonymically introduces
    their conduct, but English can preserve the concrete image naturally.
- source_word: לָרַע
  chosen: to evil
  alternatives:
  - to do evil
  - toward evil
  - for evil
  lexicon: HALOT
  rationale: The preposition plus adjective/noun is rendered straightforwardly as
    direction toward moral evil. 'To do evil' is interpretive and slightly expands
    the text.
- source_word: יָרֻצוּ
  chosen: run
  alternatives:
  - rush
  - race
  lexicon: HALOT
  rationale: A direct rendering that preserves the vividness and speed implied by
    the verb without over-intensifying.
- source_word: וִימַהֲרוּ
  chosen: and they hurry
  alternatives:
  - and they hasten
  - and they are quick
  lexicon: HALOT
  rationale: Pairs well with 'run' while preserving the second verb's emphasis on
    eagerness/speed. 'Hasten' is accurate but less natural in modern English.
- source_word: לִשְׁפֹּךְ דָּם נָקִי
  chosen: to shed innocent blood
  alternatives:
  - to pour out innocent blood
  lexicon: HALOT
  rationale: This is a standard idiom for violent bloodshed; 'shed innocent blood'
    is both literal and idiomatic in English.
- source_word: מַחְשְׁבוֹתֵיהֶם
  chosen: their thoughts
  alternatives:
  - their plans
  - their schemes
  lexicon: HALOT
  rationale: The noun can denote thoughts, plans, or devices. Here the following apposition
    'thoughts of wickedness' supports the broader mental/moral sense, so 'thoughts'
    best preserves the repetition.
- source_word: מַחְשְׁבוֹת אָוֶן
  chosen: thoughts of wickedness
  alternatives:
  - plans of iniquity
  - schemes of trouble
  - thoughts of evil
  lexicon: HALOT
  rationale: The repeated noun is preserved for rhetorical force. אָוֶן often carries
    senses like wickedness, trouble, or iniquity; 'wickedness' fits the moral context
    and reads naturally.
- source_word: שֹׁד
  chosen: devastation
  alternatives:
  - violence
  - ruin
  - desolation
  lexicon: HALOT
  rationale: In parallel with שֶׁבֶר, the term points to destructive havoc. 'Devastation'
    captures the result of violent wrongdoing without collapsing the distinction with
    the next noun.
- source_word: וָשֶׁבֶר
  chosen: and destruction
  alternatives:
  - and ruin
  - and breaking
  lexicon: HALOT
  rationale: Rendered as a near-synonymous partner to שֹׁד, preserving the poetic
    piling up of destructive terms. 'Breaking' is too wooden in English here.
- source_word: בִּמְסִלּוֹתָם
  chosen: in their highways
  alternatives:
  - in their paths
  - on their roads
  - in their ways
  lexicon: HALOT
  rationale: מְסִלָּה often denotes a raised road/highway. 'Highways' preserves the
    concrete image, while also allowing the metaphorical sense of the course of life.
    'Ways' would lose the lexical specificity.
