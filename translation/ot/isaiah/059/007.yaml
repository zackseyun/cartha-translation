theological_decisions:
- issue: Moral characterization of אָוֶן
  chosen_reading: wickedness
  alternative_readings:
  - iniquity
  - trouble
  rationale: The verse is an indictment of sinful conduct and intent, so the moral
    sense is foregrounded rather than a more circumstantial sense like 'trouble.'
    This is a lexical-contextual decision, not a doctrinally disputed one.
