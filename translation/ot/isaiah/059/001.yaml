id: ISA.59.1
reference: Isaiah 59:1
source:
  edition: WLC
  text: הֵ֛ן לֹֽא קָצְרָ֥ה יַד יְהוָ֖ה מֵֽ/הוֹשִׁ֑יעַ וְ/לֹא כָבְדָ֥ה אָזְנ֖/וֹ מִ/שְּׁמֽוֹעַ־־־׃
translation:
  text: Look, Yahweh’s hand is not too short to save, nor is his ear too dull to hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Behold' or 'Surely' for the opening particle.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the LORD’s hand is not shortened from saving, and his ear is not heavy from hearing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Introduces an emphatic assertion and draws attention to what follows. 'Look' preserves the discourse force in readable modern English better than the more archaic 'Behold.'
- source_word: קָצְרָה
  chosen: is ... too short
  alternatives:
  - has become short
  - is shortened
  lexicon: HALOT
  rationale: With 'hand' as subject, the verb is idiomatic for insufficiency or inability. English expresses the sense naturally as 'is too short,' preserving the metaphor rather than flattening it to 'is unable.'
- source_word: יַד
  chosen: hand
  alternatives:
  - power
  lexicon: HALOT
  rationale: Retains the Hebrew anthropomorphic metaphor for power or capacity rather than interpreting it directly as 'power.' This preserves the imagery of the source text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and aligning with the stated doctrine guidance.
- source_word: מֵהוֹשִׁיעַ
  chosen: to save
  alternatives:
  - from saving
  - to deliver
  lexicon: HALOT
  rationale: 'The preposition with infinitive here marks limitation or incapacity: ''too short to save.'' ''Save'' is the most direct and theologically resonant rendering; ''deliver'' is possible but less standard in this context.'
- source_word: כָבְדָה
  chosen: is too heavy
  alternatives:
  - has become dull
  - is weighed down
  lexicon: HALOT
  rationale: The verb literally means 'to be heavy.' In context with 'ear,' it conveys impaired responsiveness. 'Too heavy' preserves the metaphor and parallelism with 'too short.'
- source_word: אָזְנוֹ
  chosen: his ear
  alternatives:
  - his hearing
  lexicon: HALOT
  rationale: Keeps the concrete bodily image of the Hebrew rather than abstracting it to 'hearing.'
- source_word: מִשְּׁמוֹעַ
  chosen: to hear
  alternatives:
  - from hearing
  - to listen
  lexicon: HALOT
  rationale: Completes the idiom 'nor is his ear too heavy to hear.' 'Hear' matches the Hebrew verb directly; 'listen' would add nuance not explicit in the source.
