id: ISA.59.13
reference: Isaiah 59:13
source:
  edition: WLC
  text: פָּשֹׁ֤עַ וְ/כַחֵשׁ֙ בַּֽ/יהוָ֔ה וְ/נָס֖וֹג מֵ/אַחַ֣ר אֱלֹהֵ֑י/נוּ דַּבֶּר
    עֹ֣שֶׁק וְ/סָרָ֔ה הֹר֧וֹ וְ/הֹג֛וֹ מִ/לֵּ֖ב דִּבְרֵי שָֽׁקֶר־־׃
translation:
  text: transgressing and denying the LORD, and turning back from following our God,
    speaking oppression and revolt, conceiving and uttering from the heart words of
    falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'speaking oppression and rebellion'; the Hebrew noun rendered 'revolt'
      can also be translated 'apostasy' or 'rebellion.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the heart,' expressing that the false words arise from inward
      intention, not merely outward speech.
    reason: cultural_note
lexical_decisions:
- source_word: פָּשֹׁעַ
  chosen: transgressing
  alternatives:
  - rebelling
  - transgression
  lexicon: HALOT
  rationale: The infinitive/verb form denotes active rebellion or transgression. 'Transgressing'
    preserves the verbal force and moral breach without over-specifying political
    rebellion.
- source_word: וְכַחֵשׁ בַּיהוָה
  chosen: and denying the LORD
  alternatives:
  - and lying against the LORD
  - and dealing falsely with the LORD
  lexicon: HALOT
  rationale: כחש can mean deny, lie, or act falsely. With ב plus the divine name,
    'denying the LORD' best captures covenantal repudiation in clear English. Per
    doctrine, יהוה is rendered 'the LORD'.
- source_word: בַּיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name יהוה follows the project's default rendering 'the LORD'
    per DOCTRINE.md contested terms table.
- source_word: וְנָסוֹג מֵאַחַר אֱלֹהֵינוּ
  chosen: and turning back from following our God
  alternatives:
  - and turning away from behind our God
  - and backsliding from our God
  lexicon: HALOT
  rationale: נסוג conveys turning back/withdrawing; מֵאַחַר literally 'from after'
    idiomatically means ceasing to follow. 'Turning back from following our God' preserves
    the Hebrew image while remaining natural English.
- source_word: דַּבֶּר
  chosen: speaking
  alternatives:
  - uttering
  lexicon: HALOT
  rationale: A verbal form introducing the next pair of objects; 'speaking' is the
    most straightforward rendering.
- source_word: עֹשֶׁק
  chosen: oppression
  alternatives:
  - extortion
  - fraud
  lexicon: HALOT
  rationale: עֹשֶׁק commonly denotes oppression or exploitative injustice. 'Oppression'
    is broad enough to include social and economic wrong without narrowing the sense.
- source_word: וְסָרָה
  chosen: and revolt
  alternatives:
  - and apostasy
  - and rebellion
  lexicon: HALOT
  rationale: סָרָה denotes deviation, rebellion, or apostasy. 'Revolt' pairs well
    with 'oppression' as spoken content and preserves the sense of defiant turning
    aside. 'Apostasy' is possible but more interpretive and ecclesiastical in tone.
- source_word: הֹרוֹ וְהֹגוֹ
  chosen: conceiving and uttering
  alternatives:
  - devising and speaking
  - hatching and muttering
  lexicon: HALOT
  rationale: These participial/verbal forms describe inward formation and outward
    expression. 'Conceiving and uttering' reflects the sequence from internal thought
    to spoken expression.
- source_word: מִלֵּב
  chosen: from the heart
  alternatives:
  - out of the heart
  lexicon: HALOT
  rationale: The phrase marks the inner source of the false speech. 'From the heart'
    is idiomatic and faithful.
- source_word: דִּבְרֵי שָׁקֶר
  chosen: words of falsehood
  alternatives:
  - lying words
  - words of lies
  - false words
  lexicon: HALOT
  rationale: A construct phrase meaning speech characterized by deceit. 'Words of
    falsehood' is formal enough to preserve the Hebrew texture while remaining readable.
