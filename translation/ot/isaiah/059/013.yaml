theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יהוה is 'the LORD,' following the doctrine file's
    contested terms guidance and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether וְסָרָה should be rendered in explicitly religious terms
  chosen_reading: revolt
  alternative_readings:
  - apostasy
  - rebellion
  rationale: The context includes covenant unfaithfulness toward God, but the noun
    itself can denote rebellion more broadly. 'Revolt' preserves the theological seriousness
    without importing a narrower doctrinal term not demanded by the Hebrew.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
