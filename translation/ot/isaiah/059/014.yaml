id: ISA.59.14
reference: Isaiah 59:14
source:
  edition: WLC
  text: וְ/הֻסַּ֤ג אָחוֹר֙ מִשְׁפָּ֔ט וּ/צְדָקָ֖ה מֵ/רָח֣וֹק תַּעֲמֹ֑ד כִּֽי כָשְׁלָ֤ה
    בָֽ/רְחוֹב֙ אֱמֶ֔ת וּ/נְכֹחָ֖ה לֹא תוּכַ֥ל לָ/בֽוֹא־־׃
translation:
  text: Justice is turned back, and righteousness stands far off; for truth has stumbled
    in the street, and uprightness cannot enter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truth has fallen in the public square.'
    reason: lexical_alternative
  - marker: b
    text: Or 'what is right cannot enter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֻסַּג
  chosen: is turned back
  alternatives:
  - is driven back
  - is pushed back
  - has been turned away
  lexicon: HALOT
  rationale: Hophal of סוג conveys being moved back or driven away. 'Is turned back'
    is idiomatic, preserves the passive sense, and fits the personified portrayal
    of justice.
- source_word: אָחוֹר
  chosen: back
  alternatives:
  - backward
  - to the rear
  lexicon: HALOT
  rationale: Adverbial accusative intensifying the reversal. 'Back' is the most natural
    English complement to 'is turned.'
- source_word: מִשְׁפָּט
  chosen: Justice
  alternatives:
  - judgment
  - justice
  lexicon: HALOT
  rationale: In this prophetic social context the term denotes public justice rather
    than merely a legal verdict. Capitalization is not theological but sentence-initial.
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - right order
  lexicon: HALOT
  rationale: The Hebrew often overlaps with justice, but here pairing it with מִשְׁפָּט
    suggests a complementary moral quality. 'Righteousness' preserves the lexical
    distinction while still fitting the social setting.
- source_word: מֵרָחוֹק תַּעֲמֹד
  chosen: stands far off
  alternatives:
  - stands at a distance
  - remains far away
  lexicon: HALOT
  rationale: The preposition plus adjective with עמד pictures righteousness as kept
    at a distance. 'Stands far off' is concise and vivid.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding condition. 'For' best links the
    clauses in English.
- source_word: כָשְׁלָה
  chosen: has stumbled
  alternatives:
  - has fallen
  - has tottered
  lexicon: HALOT
  rationale: The verb means to stumble or totter. 'Has stumbled' preserves the metaphor
    without overstating it as total collapse.
- source_word: בָרְחוֹב
  chosen: in the street
  alternatives:
  - in the public square
  - in the broad place
  lexicon: HALOT
  rationale: רחוב refers to an open public place or street. 'In the street' is natural
    modern English and retains the public, civic setting.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: While the Hebrew can include faithfulness, in this context of social
    corruption and failed justice, 'truth' best captures the public moral reality
    being personified.
- source_word: נְכֹחָה
  chosen: uprightness
  alternatives:
  - what is right
  - straightness
  - honesty
  lexicon: HALOT
  rationale: The noun/adjectival form denotes straightness or uprightness. 'Uprightness'
    matches the personified abstract nouns in the verse and pairs well with 'truth.'
- source_word: לֹא תוּכַל לָבוֹא
  chosen: cannot enter
  alternatives:
  - is unable to come in
  - cannot come
  lexicon: HALOT
  rationale: The clause depicts uprightness as barred from entry into the public sphere.
    'Cannot enter' is idiomatic and preserves the imagery of exclusion.
