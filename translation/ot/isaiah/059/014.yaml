theological_decisions:
- issue: Rendering the pair מִשְׁפָּט / צְדָקָה
  chosen_reading: Justice ... righteousness
  alternative_readings:
  - Justice ... justice
  - Judgment ... righteousness
  rationale: The verse personifies related but distinct covenantal-social virtues.
    Rendering them with differentiated English terms preserves the Hebrew parallelism
    without collapsing them into a single concept. No doctrinal controversy is resolved
    here, but lexical distinction matters for theological nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
