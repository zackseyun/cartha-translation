theological_decisions:
- issue: Divine warrior imagery for the LORD's intervention
  chosen_reading: Retain the martial clothing imagery literally, presenting God as
    arming himself with righteousness, salvation, vengeance, and zeal.
  alternative_readings:
  - More interpretive renderings that soften the imagery into abstract qualities
  rationale: The Hebrew depicts the LORD as a divine warrior. Preserving the concrete
    armor and garment imagery maintains the theological force of God's active, righteous
    intervention without allegorizing it away.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
