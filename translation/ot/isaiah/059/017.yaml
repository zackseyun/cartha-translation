id: ISA.59.17
reference: Isaiah 59:17
source:
  edition: WLC
  text: וַ/יִּלְבַּ֤שׁ צְדָקָה֙ כַּ/שִּׁרְיָ֔ן וְ/כ֥וֹבַע יְשׁוּעָ֖ה בְּ/רֹאשׁ֑/וֹ
    וַ/יִּלְבַּ֞שׁ בִּגְדֵ֤י נָקָם֙ תִּלְבֹּ֔שֶׁת וַ/יַּ֥עַט כַּ/מְעִ֖יל קִנְאָֽה׃
translation:
  text: He put on righteousness like body armor, and a helmet of salvation on his
    head; he put on garments of vengeance for clothing, and wrapped himself in zeal
    as in a cloak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'breastplate' for 'body armor.' The Hebrew term refers to torso armor.
    reason: lexical_alternative
  - marker: b
    text: Or 'victory' or 'deliverance' for 'salvation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'jealousy' for 'zeal,' in the sense of intense covenantal ardor.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The noun commonly denotes righteousness, though in some contexts it can
    shade toward justice. Here, in martial imagery describing God's moral rectitude
    in action, 'righteousness' best preserves the established lexical sense while
    fitting the armor metaphor.
- source_word: שִׁרְיָן
  chosen: body armor
  alternatives:
  - breastplate
  - coat of mail
  lexicon: HALOT
  rationale: The term denotes armor worn on the torso. 'Body armor' is clear modern
    English and avoids overly traditional or archaic phrasing, while still covering
    the semantic range. 'Breastplate' is possible and traditional, but may sound more
    specific than the Hebrew requires.
- source_word: כּוֹבַע
  chosen: helmet
  lexicon: HALOT
  rationale: Standard rendering for protective headgear; the context of battle imagery
    makes 'helmet' the natural equivalent.
- source_word: יְשׁוּעָה
  chosen: salvation
  alternatives:
  - victory
  - deliverance
  lexicon: HALOT
  rationale: The noun can denote salvation, deliverance, or victory. 'Salvation' is
    the most common and theologically resonant rendering, and it fits the broader
    Isaianic context of God's saving intervention. The martial context allows 'victory,'
    but that is better preserved as an alternative.
- source_word: בִּגְדֵי נָקָם
  chosen: garments of vengeance
  alternatives:
  - garments of avenging
  - clothes of vengeance
  lexicon: HALOT
  rationale: The construct phrase straightforwardly means clothing characterized by
    vengeance. 'Garments of vengeance' preserves the elevated tone and the force of
    divine retribution without softening it.
- source_word: תִּלְבֹּשֶׁת
  chosen: for clothing
  alternatives:
  - as clothing
  - as his clothing
  lexicon: HALOT
  rationale: This noun refers to attire/clothing and functions appositionally or adverbially
    with the preceding phrase. 'For clothing' is idiomatic in English and preserves
    the sense that vengeance is what he donned as his attire.
- source_word: וַיַּעַט
  chosen: wrapped himself in
  alternatives:
  - covered himself with
  - enveloped himself in
  lexicon: HALOT
  rationale: The verb conveys wrapping or enwrapping oneself. 'Wrapped himself in'
    is vivid, natural English and suits the image of putting on an outer garment.
- source_word: מְעִיל
  chosen: cloak
  alternatives:
  - robe
  - mantle
  lexicon: HALOT
  rationale: The term denotes an outer garment. 'Cloak' fits the simile well and sounds
    natural in contemporary English; 'robe' is possible but can suggest a different
    garment type.
- source_word: קִנְאָה
  chosen: zeal
  alternatives:
  - jealousy
  - ardor
  lexicon: HALOT
  rationale: In reference to God, the noun often denotes zealous, passionate commitment
    rather than petty jealousy. 'Zeal' best communicates the positive, covenantal
    intensity in this context of divine action.
