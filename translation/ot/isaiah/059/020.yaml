id: ISA.59.20
reference: Isaiah 59:20
source:
  edition: WLC
  text: וּ/בָ֤א לְ/צִיּוֹן֙ גּוֹאֵ֔ל וּ/לְ/שָׁבֵ֥י פֶ֖שַׁע בְּ/יַֽעֲקֹ֑ב נְאֻ֖ם יְהוָֽה׃
translation:
  text: And a Redeemer will come to Zion, and to those in Jacob who turn from transgression,
    declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Zion'; the Hebrew preposition can sometimes be rendered this way,
      though 'to Zion' fits the verb 'come' most naturally here.
    reason: lexical_alternative
  - marker: b
    text: '''Redeemer'' translates Hebrew go''el, a term used for one who acts to
      redeem or reclaim, often with covenantal or kinship overtones.'
    reason: cultural_note
  - marker: c
    text: Or 'to the repentant in Jacob' or 'to those in Jacob who turn back from
      rebellion.'
    reason: alternative_reading
  - marker: d
    text: Paul cites this verse in Romans 11:26, where the wording differs in part
      under the influence of the Greek tradition.
    reason: cross_reference
lexical_decisions:
- source_word: וּבָא
  chosen: And ... will come
  alternatives:
  - and he came
  - then he will come
  lexicon: HALOT
  rationale: Qal perfect 3ms of בוא with prefixed conjunction is used in prophetic
    discourse with future sense; English future best reflects the context and natural
    prophetic idiom.
- source_word: לְצִיּוֹן
  chosen: to Zion
  alternatives:
  - for Zion
  lexicon: HALOT
  rationale: 'The preposition ל here is most naturally directional with בוא, indicating
    destination: the Redeemer comes to Zion.'
- source_word: גּוֹאֵל
  chosen: a Redeemer
  alternatives:
  - a kinsman-redeemer
  - one who redeems
  lexicon: HALOT
  rationale: גאל denotes a redeemer/deliverer, often with kinship associations. 'Redeemer'
    preserves the theological and covenantal weight without over-specifying kinship
    in the main text where the noun stands without an explicit kinship modifier.
- source_word: וּלְשָׁבֵי
  chosen: and to those ... who turn
  alternatives:
  - and for the returnees
  - and to the repentant
  lexicon: HALOT
  rationale: The participial form from שוב can denote those who turn/return. In this
    construction with פשע, the sense is moral turning away from sin rather than merely
    physical return. 'Those who turn' preserves the verbal force without importing
    later theological terminology too strongly.
- source_word: פֶשַׁע
  chosen: transgression
  alternatives:
  - rebellion
  - sin
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion or transgression against rightful
    authority. 'Transgression' is a clear, weighty English equivalent that fits the
    moral context.
- source_word: בְּיַעֲקֹב
  chosen: in Jacob
  alternatives:
  - among Jacob
  - in Israel
  lexicon: HALOT
  rationale: 'The preposition ב is locative/sphere here: within Jacob, i.e., among
    the covenant people. ''In Jacob'' is retained to preserve the Hebrew expression
    and parallel covenantal identity language.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD'
    in contemporary English. Per doctrine, יְהוָה is rendered 'the LORD'.
