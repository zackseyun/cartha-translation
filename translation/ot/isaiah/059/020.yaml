theological_decisions:
- issue: Identity and scope of the Redeemer
  chosen_reading: Render גּוֹאֵל as 'a Redeemer' without explicitly identifying the
    figure in the main text.
  alternative_readings:
  - the Redeemer as a messianic figure
  - the LORD himself acting as redeemer
  rationale: The verse is theologically significant and later applied messianically
    in the New Testament, but the Hebrew text here does not explicitly name the figure
    beyond 'Redeemer.' The translation preserves that openness rather than resolving
    the referent in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of שָׁבֵי פֶשַׁע
  chosen_reading: those in Jacob who turn from transgression
  alternative_readings:
  - the repentant in Jacob
  - those who turn back from rebellion in Jacob
  rationale: The phrase indicates moral turning away from transgression. Rendering
    it verbally preserves the Hebrew participial nuance and avoids importing a more
    systematized theological term where the text itself uses ordinary repentance language.
  doctrine_reference: Optimal equivalence; do not import doctrinal claims the text
    does not make.
