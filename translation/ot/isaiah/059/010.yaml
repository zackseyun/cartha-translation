id: ISA.59.10
reference: Isaiah 59:10
source:
  edition: WLC
  text: נְגַֽשְׁשָׁ֤ה כַֽ/עִוְרִים֙ קִ֔יר וּ/כְ/אֵ֥ין עֵינַ֖יִם נְגַשֵּׁ֑שָׁה כָּשַׁ֤לְנוּ
    בַֽ/צָּהֳרַ֨יִם֙ כַּ/נֶּ֔שֶׁף בָּ/אַשְׁמַנִּ֖ים כַּ/מֵּתִֽים׃
translation:
  text: We grope for the wall like the blind; like those without eyes we grope. We
    stumble at noon as in the twilight; among the strong we are like the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'in fertile places' or 'among the robust'; the Hebrew term
      is rare and uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְגַשְׁשָׁה / נְגַשֵּׁשָׁה
  chosen: we grope
  alternatives:
  - we feel our way
  - we grope about
  lexicon: HALOT
  rationale: The Piel of גשש conveys feeling/searching by touch, especially as a blind
    person. 'Grope' is the most natural concise English equivalent and preserves the
    image of disoriented tactile searching. Repetition is retained to match the Hebrew
    parallelism.
- source_word: כַעִוְרִים
  chosen: like the blind
  alternatives:
  - like blind men
  - like blind people
  lexicon: HALOT
  rationale: The plural adjective means 'blind ones.' 'Like the blind' is idiomatic,
    preserves the simile, and avoids adding a gendered noun not explicit in English
    while still reflecting the Hebrew collective sense.
- source_word: קִיר
  chosen: the wall
  alternatives:
  - a wall
  lexicon: HALOT
  rationale: In context the image is of blind people feeling along a wall for guidance.
    English idiom prefers 'the wall' here, even without the Hebrew article, because
    it refers to the object being used for orientation.
- source_word: וּכְאֵין עֵינַיִם
  chosen: like those without eyes
  alternatives:
  - as if we had no eyes
  - like people with no eyes
  lexicon: HALOT
  rationale: The phrase intensifies the blindness image. 'Like those without eyes'
    keeps the comparative force and avoids over-interpreting it as merely figurative
    self-description, while remaining natural English.
- source_word: כָּשַׁלְנוּ
  chosen: we stumble
  alternatives:
  - we stagger
  - we totter
  lexicon: HALOT
  rationale: כשל commonly denotes stumbling or faltering. 'We stumble' fits the movement
    imagery and pairs well with the blindness motif.
- source_word: בַצָּהֳרַיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: The noun denotes the brightest part of the day. 'At noon' is simple,
    idiomatic modern English and sharpens the contrast with darkness.
- source_word: כַּנֶּשֶׁף
  chosen: as in the twilight
  alternatives:
  - as at dusk
  - as in deep dusk
  lexicon: HALOT
  rationale: נשף can denote twilight, often evening dusk. Here it contrasts with noon,
    so 'twilight' communicates dimness without over-specifying beyond the context.
- source_word: בָּאַשְׁמַנִּים
  chosen: among the strong
  alternatives:
  - among the robust
  - in fertile places
  lexicon: HALOT
  rationale: The term is difficult, but in this context the best sense is 'among the
    stout/strong/robust,' yielding the contrast that even in the midst of the vigorous
    living, the speakers are like dead men. This reading fits many modern translations
    and the parallelism better than a locative sense such as 'in desolate places'
    or 'in fertile places.' Because the term is uncertain, an alternative is preserved
    in a footnote.
- source_word: כַּמֵּתִים
  chosen: like the dead
  alternatives:
  - like dead men
  - as dead people
  lexicon: HALOT
  rationale: The comparison is stark and should remain so. 'Like the dead' is concise
    and preserves the collective force without unnecessary expansion.
