id: ISA.59.19
reference: Isaiah 59:19
source:
  edition: WLC
  text: וְ/יִֽירְא֤וּ מִֽ/מַּעֲרָב֙ אֶת שֵׁ֣ם יְהוָ֔ה וּ/מִ/מִּזְרַח שֶׁ֖מֶשׁ אֶת כְּבוֹד֑/וֹ כִּֽי יָב֤וֹא כַ/נָּהָר֙ צָ֔ר ר֥וּחַ יְהוָ֖ה נֹ֥סְסָה בֽ/וֹ־־־־׃
translation:
  text: So they will fear the name of Yahweh from the west, and his glory from the rising of the sun; for he will come like a rushing river, driven by the breath of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the east.' Literally, 'from the rising of the sun.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew of the final clause is difficult. Or, 'for it will come like a rushing river, driven by the Spirit of the LORD.'
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''when the enemy comes in like a flood, the Spirit of the LORD will raise a standard against him.'' This reflects a different construal of the Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיִירְאוּ
  chosen: So they will fear
  alternatives:
  - And they will fear
  - So they will revere
  lexicon: HALOT
  rationale: Qal imperfect 3mp of ירא commonly means 'fear' or 'revere.' 'Fear' preserves the stronger covenantal and awe-filled sense; 'So' reflects the discourse connection naturally in English.
- source_word: מִמַּעֲרָב
  chosen: from the west
  alternatives:
  - from the westlands
  - from the setting place
  lexicon: HALOT
  rationale: The noun denotes the west or place of sunset. 'From the west' is the most natural and geographically clear rendering.
- source_word: אֶת שֵׁם יְהוָה
  chosen: the name of the LORD
  alternatives:
  - the LORD's name
  lexicon: HALOT
  rationale: A standard Hebrew expression for YHWH's revealed identity and reputation. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמִמִּזְרַח שֶׁמֶשׁ
  chosen: from the rising of the sun
  alternatives:
  - from the east
  - from where the sun rises
  lexicon: HALOT
  rationale: Literally 'from the rising of the sun.' This fuller rendering preserves the poetic parallel with 'from the west' and avoids flattening the imagery to a mere compass point.
- source_word: אֶת כְּבוֹדוֹ
  chosen: his glory
  alternatives:
  - his honor
  - his splendor
  lexicon: HALOT
  rationale: כבוד often denotes glory, weight, or honor. 'Glory' best fits the theophanic and worship context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: Introduces the reason for the worldwide fear/reverence. 'For' is concise and fits the explanatory force.
- source_word: יָבֹא
  chosen: he will come
  alternatives:
  - it will come
  lexicon: HALOT
  rationale: The verb is 3ms singular and the subject is syntactically difficult in the following clause. Given the immediate mention of 'the breath/Spirit of the LORD' and the broader context of divine intervention, a personal subject in English is the clearest main-text rendering, while preserving the clause's ambiguity in a footnote.
- source_word: כַנָּהָר
  chosen: like a rushing river
  alternatives:
  - like a river
  - like the river
  - like a flood
  lexicon: HALOT
  rationale: נהר is 'river,' but in context of forceful advance English benefits from 'rushing river' to convey the vivid simile without overcommitting to the traditional but less literal 'flood.'
- source_word: צָר
  chosen: rushing
  alternatives:
  - distressed
  - narrow
  - adversary
  lexicon: HALOT
  rationale: This word is notoriously difficult here. In context with the river image and the following verb, it is commonly understood adverbially/adjectivally of a forceful, pressing movement. 'Rushing' best captures the sense in readable English while acknowledging uncertainty in a footnote.
- source_word: רוּחַ יְהוָה
  chosen: the breath of the LORD
  alternatives:
  - the Spirit of the LORD
  - the wind of the LORD
  lexicon: HALOT
  rationale: רוּחַ can mean breath, wind, or Spirit. In this poetic image of a river being impelled, 'breath' preserves the concrete metaphor while allowing theological resonance. Because 'Spirit of the LORD' is also plausible and traditional, it is preserved in a footnote.
- source_word: נֹסְסָה בוֹ
  chosen: driven by
  alternatives:
  - driven along by it
  - sets a standard against him
  - puts to flight
  lexicon: HALOT
  rationale: The form and phrase are textually and lexically difficult. In context, many understand the clause to describe the LORD's רוח as impelling the river-like advance. 'Driven by' yields coherent English and fits the imagery, while major alternatives are preserved in a footnote.
