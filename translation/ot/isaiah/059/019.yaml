theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of רוּחַ יְהוָה
  chosen_reading: the breath of Yahweh
  alternative_readings:
  - the Spirit of the LORD
  - the wind of the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Interpretation of the difficult final clause
  chosen_reading: a divine advance like a rushing river, driven by the breath of the LORD
  alternative_readings:
  - the enemy will come in like a flood; the Spirit of the LORD will raise a standard against him
  rationale: The Hebrew lacks an explicit word for 'enemy' and the traditional KJV-derived reading depends on a different construal of the syntax and rare verb. The main text follows the plainest source-based reading while preserving the traditional alternative in a footnote because of its prominence and the clause's acknowledged difficulty.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
