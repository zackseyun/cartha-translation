id: ISA.59.12
reference: Isaiah 59:12
source:
  edition: WLC
  text: כִּֽי רַבּ֤וּ פְשָׁעֵ֨י/נוּ֙ נֶגְדֶּ֔/ךָ וְ/חַטֹּאותֵ֖י/נוּ עָ֣נְתָה בָּ֑/נוּ
    כִּֽי פְשָׁעֵ֣י/נוּ אִתָּ֔/נוּ וַ/עֲוֺנֹתֵ֖י/נוּ יְדַֽעֲנֽוּ/ם־־׃
translation:
  text: For our transgressions are many before you, and our sins testify against us;
    for our transgressions are with us, and we know our iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear witness against us' or more literally 'answer against us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason/explanation for the preceding confession. 'For'
    preserves the explanatory force naturally in English.
- source_word: רַבּוּ
  chosen: are many
  alternatives:
  - have multiplied
  - are numerous
  lexicon: HALOT
  rationale: The verb from רבה denotes becoming many/increasing. 'Are many' is idiomatic
    and concise in English while preserving the stative/resultative sense in context.
- source_word: פְשָׁעֵינוּ
  chosen: our transgressions
  alternatives:
  - our rebellions
  - our offenses
  lexicon: HALOT
  rationale: פשע commonly carries the sense of rebellion/breach against authority.
    'Transgressions' is a standard, weighty English equivalent that fits confessional
    context without over-paraphrasing.
- source_word: נֶגְדֶּךָ
  chosen: before you
  alternatives:
  - against you
  - in front of you
  lexicon: HALOT
  rationale: נגד can mean 'before/in front of' and in moral contexts can imply being
    in God's sight. 'Before you' best preserves the spatial-forensic nuance; 'against
    you' would over-assimilate it to the next clause.
- source_word: וְחַטֹּאותֵינוּ
  chosen: and our sins
  alternatives:
  - and our sin-offenses
  lexicon: HALOT
  rationale: חטאות is the common term for sins. 'Sins' is the natural and accurate
    rendering here.
- source_word: עָנְתָה בָּנוּ
  chosen: testify against us
  alternatives:
  - answer against us
  - bear witness against us
  - testifies in us/within us
  lexicon: HALOT
  rationale: 'ענה in this construction can mean ''answer, testify.'' In context of
    guilt confession, the sense is forensic: sins bear witness against the people.
    ''Testify against us'' makes the idiom clear in modern English while preserving
    the legal nuance. Singular verb with plural subject likely treats ''sin'' collectively
    or agrees with a feminine singular notion; English need not reproduce that awkwardly.'
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: HALOT
  rationale: The second כִּי again gives explanatory emphasis, linking the acknowledgment
    of guilt with conscious awareness of it.
- source_word: פְשָׁעֵינוּ אִתָּנוּ
  chosen: our transgressions are with us
  alternatives:
  - our transgressions remain with us
  - our transgressions are present with us
  lexicon: HALOT
  rationale: The phrase expresses the continuing presence/reality of their rebellion.
    'Are with us' is formally close and sufficiently clear.
- source_word: וַעֲוֺנֹתֵינוּ
  chosen: and our iniquities
  alternatives:
  - and our guilty acts
  - and our crooked deeds
  lexicon: HALOT
  rationale: עון often emphasizes guilt, perversity, or iniquity. 'Iniquities' preserves
    the moral gravity and distinguishes it from the previous terms for sin.
- source_word: יְדַעֲנוּם
  chosen: we know
  alternatives:
  - we acknowledge
  - we are acquainted with
  lexicon: HALOT
  rationale: ידע is straightforwardly 'know.' The object suffix is carried by 'our
    iniquities.' 'Acknowledge' is interpretive; 'know' preserves the direct force
    of conscious awareness.
