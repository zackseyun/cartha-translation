theological_decisions:
- issue: Rendering of multiple Hebrew sin terms in one verse
  chosen_reading: 'Different English terms are preserved: ''transgressions,'' ''sins,''
    and ''iniquities.'''
  alternative_readings:
  - Flatten all three to 'sins'
  rationale: The verse intentionally piles up distinct but overlapping terms for guilt
    (פשע, חטא, עון). Preserving the distinctions reflects the rhetoric of confession
    and avoids erasing lexical texture.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
