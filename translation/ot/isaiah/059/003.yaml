id: ISA.59.3
reference: Isaiah 59:3
source:
  edition: WLC
  text: כִּ֤י כַפֵּי/כֶם֙ נְגֹאֲל֣וּ בַ/דָּ֔ם וְ/אֶצְבְּעוֹתֵי/כֶ֖ם בֶּֽ/עָוֺ֑ן שִׂפְתֽוֹתֵי/כֶם֙
    דִּבְּרוּ שֶׁ֔קֶר לְשׁוֹנְ/כֶ֖ם עַוְלָ֥ה תֶהְגֶּֽה־׃
translation:
  text: For your palms are defiled with blood, and your fingers with iniquity; your
    lips have spoken falsehood, your tongue mutters injustice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your hands' instead of 'your palms'; the Hebrew more specifically refers
      to the palms of the hands.
    reason: lexical_alternative
  - marker: b
    text: Or 'stained with blood.' The Hebrew verb conveys defilement or pollution,
      not merely physical discoloration.
    reason: lexical_alternative
  - marker: c
    text: Or 'utters injustice.' The Hebrew verb can mean 'mutter,' 'murmur,' or more
      generally 'utter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding accusation/explanation. 'For'
    fits the discourse flow in English and preserves the causal force without over-specifying.
- source_word: כַפֵּיכֶם
  chosen: your palms
  alternatives:
  - your hands
  lexicon: HALOT
  rationale: The noun specifically denotes the palms/hollows of the hands rather than
    the more general 'hands.' 'Palms' preserves the concrete imagery of blood on the
    hands, though 'hands' is a viable smoother alternative.
- source_word: נְגֹאֲלוּ
  chosen: are defiled
  alternatives:
  - are polluted
  - are stained
  lexicon: HALOT
  rationale: From גאל in the sense of being polluted/defiled. 'Are defiled' best captures
    moral and ritual contamination; 'stained' is vivid but can sound merely physical.
- source_word: בַדָּם
  chosen: with blood
  alternatives:
  - by blood
  - in blood
  lexicon: HALOT
  rationale: The preposition marks the substance/instrument of defilement. 'With blood'
    is idiomatic English and preserves the image of bloodguilt.
- source_word: וְאֶצְבְּעוֹתֵיכֶם
  chosen: and your fingers
  lexicon: HALOT
  rationale: Concrete parallel to 'your palms'; no need to generalize.
- source_word: בֶּעָוֹן
  chosen: with iniquity
  alternatives:
  - with guilt
  - with wickedness
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here it parallels
    blood and describes moral corruption attached to their deeds. 'Iniquity' preserves
    the ethical weight better than the more result-oriented 'guilt'.
- source_word: שִׂפְתוֹתֵיכֶם
  chosen: your lips
  lexicon: HALOT
  rationale: Literal body-part imagery should be retained, matching the poetic parallelism.
- source_word: דִּבְּרוּ
  chosen: have spoken
  alternatives:
  - speak
  lexicon: HALOT
  rationale: The perfect form is naturally rendered as a completed verbal action in
    English. 'Have spoken' preserves the aspect while fitting the accusation.
- source_word: שֶׁקֶר
  chosen: falsehood
  alternatives:
  - lies
  - deceit
  lexicon: HALOT
  rationale: '''Falsehood'' is slightly broader and more formal than ''lies,'' fitting
    prophetic indictment and allowing both deceitful speech and untruth generally.'
- source_word: לְשׁוֹנְכֶם
  chosen: your tongue
  lexicon: HALOT
  rationale: Literal rendering preserves the poetic personification of speech organs.
- source_word: עַוְלָה
  chosen: injustice
  alternatives:
  - wrong
  - unrighteousness
  - perversity
  lexicon: HALOT
  rationale: The term denotes injustice/wrongdoing. 'Injustice' fits the social-ethical
    context of Isaiah 59 and is clear modern English.
- source_word: תֶהְגֶּה
  chosen: mutters
  alternatives:
  - utters
  - meditates
  - murmurs
  lexicon: HALOT
  rationale: הגה often means mutter, murmur, or utter in a low voice. 'Mutters' preserves
    the concrete verbal image and avoids the misleadingly positive English sense of
    'meditates.'
