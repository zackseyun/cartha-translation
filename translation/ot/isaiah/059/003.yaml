theological_decisions:
- issue: Moral terminology in prophetic indictment
  chosen_reading: Render terms in a way that preserves both ethical and forensic force
    without importing later doctrinal categories.
  alternative_readings:
  - Use more generalized modern terms such as 'wrongdoing' throughout
  - Use more traditional diction such as 'iniquity' and 'unrighteousness' for every
    term
  rationale: 'The verse stacks related but distinct terms (blood, עָוֹן, שֶׁקֶר, עַוְלָה).
    The translation keeps these distinctions visible: ''defiled,'' ''iniquity,'' ''falsehood,''
    and ''injustice.'' This preserves the text''s layered accusation rather than flattening
    it into one semantic field.'
  doctrine_reference: Translation philosophy §§1, 5, 6
