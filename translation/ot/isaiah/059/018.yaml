id: ISA.59.18
reference: Isaiah 59:18
source:
  edition: WLC
  text: כְּ/עַ֤ל גְּמֻלוֹת֙ כְּ/עַ֣ל יְשַׁלֵּ֔ם חֵמָ֣ה לְ/צָרָ֔י/ו גְּמ֖וּל לְ/אֹֽיְבָ֑י/ו
    לָ/אִיִּ֖ים גְּמ֥וּל יְשַׁלֵּֽם׃
translation:
  text: 'According to their deeds, so he will repay: wrath to his adversaries, repayment
    to his enemies; to the coastlands he will repay what is due.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the islands.' The Hebrew term can denote islands or distant maritime
      coastlands; in Isaiah it often refers broadly to far-off coastal nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַל
  chosen: According to
  alternatives:
  - As for
  - In accordance with
  lexicon: HALOT
  rationale: The repeated preposition-plus-comparative construction introduces the
    standard or measure of repayment. 'According to' is idiomatic English and preserves
    the proportional sense.
- source_word: גְּמֻלוֹת
  chosen: their deeds
  alternatives:
  - their recompenses
  - their dealings
  lexicon: HALOT
  rationale: From the גמל word-group, here likely denoting acts that call for requital.
    'Their deeds' communicates the basis on which repayment is made more naturally
    than the less idiomatic 'recompenses,' while still fitting the parallelism.
- source_word: יְשַׁלֵּם
  chosen: he will repay
  alternatives:
  - he will requite
  - he will pay back
  lexicon: HALOT
  rationale: Piel of שלם here carries the sense of repaying or requiting. 'Repay'
    is clear modern English and suits the judicial context.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - fury
  - rage
  lexicon: HALOT
  rationale: '''Wrath'' best conveys intense judicial anger in elevated but still
    accessible English. ''Fury'' is possible but slightly more emotive and less judicial.'
- source_word: לְצָרָיו
  chosen: to his adversaries
  alternatives:
  - to his foes
  - to his oppressors
  lexicon: HALOT
  rationale: The noun denotes those hostile to him. 'Adversaries' preserves the formal,
    conflict-oriented sense without over-specifying oppression.
- source_word: גְּמוּל
  chosen: repayment
  alternatives:
  - recompense
  - requital
  lexicon: HALOT
  rationale: This noun is cognate with the repayment theme of the verse. 'Repayment'
    keeps the lexical connection with 'repay' and is more readable than 'requital.'
- source_word: לְאֹיְבָיו
  chosen: to his enemies
  alternatives:
  - to those who hate him
  lexicon: HALOT
  rationale: Standard rendering of אויב in a military/judicial context.
- source_word: לָאִיִּים
  chosen: to the coastlands
  alternatives:
  - to the islands
  - to the distant shores
  lexicon: HALOT
  rationale: אִיִּים in Isaiah often refers to maritime lands/coastlands, frequently
    distant nations. 'Coastlands' is the established and contextually apt rendering;
    'islands' is possible but narrower.
- source_word: גְּמוּל יְשַׁלֵּם
  chosen: he will repay what is due
  alternatives:
  - he will repay recompense
  - he will repay them
  lexicon: HALOT
  rationale: The Hebrew repeats the repayment noun plus verb for emphasis. In English,
    a fully literal 'repay repayment' is awkward; 'repay what is due' preserves the
    emphatic judicial sense in natural English.
