theological_decisions:
- issue: Subject reference of the third-person singular verbs
  chosen_reading: Render simply as 'he' without specifying 'the LORD' in the verse
    itself
  alternative_readings:
  - Explicitly supply 'the LORD' for clarity
  rationale: The immediate context identifies the divine warrior as the subject, but
    the Hebrew of this verse uses third-person singular verbs without restating the
    name. Retaining 'he' preserves the discourse flow and avoids adding a title not
    present in the verse.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the opening גמל word-group
  chosen_reading: Take it as the basis of judgment ('According to their deeds') rather
    than as an abstract noun repeated woodenly ('According to recompenses')
  alternative_readings:
  - According to their recompense
  rationale: The verse emphasizes proportionate divine retribution. Rendering the
    opening phrase as 'According to their deeds' makes clear that repayment corresponds
    to what has been done, while the later גמול terms preserve the recompense motif.
  doctrine_reference: Translation philosophy §6
