theological_decisions:
- issue: Rendering the unusual plural בְּמֹתָיו in a messianically significant servant-song
    context
  chosen_reading: Retain the formally plural expression 'in his deaths' in the main
    text, with singular idiomatic alternative footnoted.
  alternative_readings:
  - in his death
  - at his death
  rationale: Because the Hebrew form is plural, the translation preserves that textual
    feature rather than smoothing it away. This avoids importing a harmonized reading
    from later interpretation while still acknowledging that many translators take
    the plural idiomatically as singular in context.
  doctrine_reference: Translation philosophy items 1, 3, and 5
- issue: Subject of וַיִּתֵּן
  chosen_reading: Use impersonal English 'they assigned' rather than specifying God
    or the servant as subject.
  alternative_readings:
  - he assigned
  - his grave was assigned
  rationale: The Hebrew leaves the subject unexpressed and the clause is syntactically
    compressed. An impersonal English rendering preserves the ambiguity rather than
    resolving it theologically.
  doctrine_reference: Translation philosophy item 3
