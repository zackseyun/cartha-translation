id: ISA.53.9
reference: Isaiah 53:9
source:
  edition: WLC
  text: וַ/יִּתֵּ֤ן אֶת רְשָׁעִים֙ קִבְר֔/וֹ וְ/אֶת עָשִׁ֖יר בְּ/מֹתָ֑י/ו עַ֚ל לֹא
    חָמָ֣ס עָשָׂ֔ה וְ/לֹ֥א מִרְמָ֖ה בְּ/פִֽי/ו־־־׃
translation:
  text: And they assigned his grave with the wicked, and with a rich man in his deaths,
    although he had done no violence, and no deceit was in his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in his deaths''; many translations render idiomatically ''in
      his death'' or ''at his death.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'his grave was assigned with the wicked.' The Hebrew verb literally means
      'gave/set' and the subject is not explicit.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: they assigned
  alternatives:
  - he assigned
  - one assigned
  - his grave was assigned
  lexicon: HALOT
  rationale: The verb נתן literally means 'gave/put/set,' but in this context with
    objects 'his grave' and 'with the wicked' it idiomatically conveys assignment
    or appointment of burial. The 3ms form is syntactically difficult because no explicit
    subject is given; English 'they assigned' captures the impersonal/passive-like
    sense without overcommitting to a named subject.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evildoers
  lexicon: HALOT
  rationale: A standard rendering of the plural adjective/substantive meaning wicked
    persons. 'The wicked' is concise and preserves the moral category.
- source_word: קִבְרוֹ
  chosen: his grave
  alternatives:
  - his burial place
  - his tomb
  lexicon: HALOT
  rationale: קבר denotes grave/burial place. 'Grave' is the most direct and natural
    English equivalent here.
- source_word: עָשִׁיר
  chosen: a rich man
  alternatives:
  - the rich
  - a wealthy man
  lexicon: HALOT
  rationale: The singular adjective/substantive naturally refers to an individual
    rich person. 'A rich man' preserves the singular and the personal reference.
- source_word: בְּמֹתָיו
  chosen: in his deaths
  alternatives:
  - in his death
  - at his death
  lexicon: HALOT
  rationale: The Hebrew form is morphologically plural ('his deaths'), an unusual
    expression. To preserve the source-text form and its weight, the main text keeps
    the plural literally. Because this is awkward in English and many understand it
    idiomatically as singular, that alternative is preserved in a footnote.
- source_word: עַל
  chosen: although
  alternatives:
  - because
  - for
  - on account of
  - despite
  lexicon: HALOT
  rationale: 'In this clause עַל introduces the ground or circumstance relative to
    the burial statement. In English, ''although'' best captures the concessive force
    in context: despite the treatment he received, he had done no violence.'
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - injustice
  lexicon: HALOT
  rationale: חמס commonly denotes violence or violent wrongdoing. 'Violence' is the
    most direct and established rendering here.
- source_word: מִרְמָה
  chosen: deceit
  alternatives:
  - fraud
  - guile
  - treachery
  lexicon: HALOT
  rationale: מִרמה refers to deceit or deception. 'Deceit' is clear modern English
    and fits the parallel with 'violence.'
- source_word: בְּפִיו
  chosen: was in his mouth
  alternatives:
  - was found in his mouth
  - came from his mouth
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew idiom and the moral focus on
    speech. 'Was in his mouth' is natural enough in English and avoids adding 'found,'
    which is not explicit in the Hebrew.
