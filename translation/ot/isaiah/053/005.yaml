theological_decisions:
- issue: Nature of the servant's suffering in relation to others' sins
  chosen_reading: The verse is rendered with substitutionary/on-account-of language
    ('because of our transgressions ... because of our iniquities') without importing
    a more detailed atonement theory.
  alternative_readings:
  - A strictly exemplary reading that minimizes vicarious bearing
  - A more explicit penal formulation beyond the wording of the verse
  rationale: The Hebrew plainly presents the servant suffering in relation to the
    people's sins and for their peace/healing. The translation preserves that vicarious
    connection while avoiding doctrinal overstatement not explicit in the verse itself.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Scope of 'peace' and 'healed'
  chosen_reading: Retain 'peace' and 'healed' as broad covenantal-restorative terms
    rather than narrowing them to only physical healing or only spiritual forgiveness.
  alternative_readings:
  - physical healing only
  - spiritual healing only
  - prosperity
  rationale: The Hebrew terms שָׁלוֹם and רפא are semantically broad. Preserving their
    breadth maintains the theological tension and avoids reducing the servant's work
    to one dimension.
  doctrine_reference: Translation philosophy §3
