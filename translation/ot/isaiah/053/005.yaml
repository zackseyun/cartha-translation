id: ISA.53.5
reference: Isaiah 53:5
source:
  edition: WLC
  text: וְ/הוּא֙ מְחֹלָ֣ל מִ/פְּשָׁעֵ֔/נוּ מְדֻכָּ֖א מֵ/עֲוֺנֹתֵ֑י/נוּ מוּסַ֤ר שְׁלוֹמֵ֨/נוּ֙
    עָלָ֔י/ו וּ/בַ/חֲבֻרָת֖/וֹ נִרְפָּא לָֽ/נוּ־׃
translation:
  text: But he was pierced because of our transgressions; he was crushed because of
    our iniquities; the chastisement for our peace was upon him, and by his wound
    we are healed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wounded' for 'pierced.' The Hebrew term can denote being wounded or
      pierced; 'pierced' was chosen to preserve the concrete violence of the image.
    reason: lexical_alternative
  - marker: b
    text: '''Our peace'' can also mean ''our well-being'' or ''our wholeness.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'by his stripe' or 'by his bruise.' The Hebrew noun is singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחֹלָל
  chosen: pierced
  alternatives:
  - wounded
  - profaned
  - defiled
  lexicon: HALOT
  rationale: In Isaiah 53:5 the passive participle from חלל in context of bodily suffering
    and parallelism with 'crushed' most naturally denotes being pierced/wounded rather
    than profaned. 'Pierced' preserves the concrete violence and fits the atoning-suffering
    context better than the broader 'wounded'.
- source_word: מִפְּשָׁעֵינוּ
  chosen: because of our transgressions
  alternatives:
  - for our transgressions
  - from our transgressions
  lexicon: HALOT
  rationale: 'The preposition מִן here marks causal ground: his piercing occurred
    on account of our rebellions. ''Because of'' communicates the causal sense clearly
    in modern English while preserving the link to human guilt.'
- source_word: מְדֻכָּא
  chosen: crushed
  alternatives:
  - bruised
  - broken
  lexicon: HALOT
  rationale: '''Crushed'' best reflects the intensity of דכא in the passive. ''Bruised''
    is traditional but too weak in contemporary English; ''crushed'' conveys severe
    affliction without paraphrase.'
- source_word: מֵעֲוֺנֹתֵינוּ
  chosen: because of our iniquities
  alternatives:
  - for our iniquities
  - from our iniquities
  - because of our guilt
  lexicon: HALOT
  rationale: Again the preposition is best taken causally. 'Iniquities' preserves
    the moral weight and distinction from 'transgressions,' reflecting the Hebrew's
    use of a second guilt term rather than flattening both into one English word.
- source_word: מוּסַר
  chosen: chastisement
  alternatives:
  - discipline
  - punishment
  - correction
  lexicon: HALOT
  rationale: מוּסַר can denote discipline/correction, but here in a suffering-bearing
    context 'chastisement' best captures punitive affliction without over-specifying
    a later doctrinal theory. It preserves the gravity of what falls on him.
- source_word: שְׁלוֹמֵנוּ
  chosen: our peace
  alternatives:
  - our well-being
  - our wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, wholeness, and well-being. 'Peace' is the most
    direct and traditional rendering, while still allowing the fuller Hebrew sense
    to resonate. The broader sense is worth preserving in a footnote.
- source_word: עָלָיו
  chosen: was upon him
  alternatives:
  - fell on him
  - rested on him
  lexicon: HALOT
  rationale: The idiom is straightforwardly rendered 'was upon him,' preserving the
    Hebrew image of the burden or penalty resting on the servant.
- source_word: וּבַחֲבֻרָתוֹ
  chosen: by his wound
  alternatives:
  - by his stripe
  - by his wounds
  - by his bruise
  lexicon: HALOT
  rationale: The singular noun refers collectively to the injury inflicted on him.
    'Wound' is natural modern English and avoids the archaic-sounding singular 'stripe'
    while preserving the singular form better than 'wounds'.
- source_word: נִרְפָּא לָנוּ
  chosen: we are healed
  alternatives:
  - healing came to us
  - it was healed for us
  lexicon: HALOT
  rationale: Although the Hebrew form is morphologically 3ms, in context with לָנוּ
    and the established sense of the clause, the idiomatic meaning is that healing
    comes to us through his wound. 'We are healed' is the clearest and most faithful
    English rendering.
- source_word: וְהוּא
  chosen: But he
  alternatives:
  - And he
  - Yet he
  lexicon: HALOT
  rationale: The conjunction marks contrast with the preceding verse's mistaken estimation
    of the servant. 'But he' brings out that adversative force in context better than
    a simple 'and he'.
