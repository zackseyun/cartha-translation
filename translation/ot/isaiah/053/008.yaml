theological_decisions:
- issue: Referent and number of לָמוֹ in the final clause
  chosen_reading: 'Singular sense referring to the servant: ''stricken for the transgression
    of my people'''
  alternative_readings:
  - '''the stroke was upon him'''
  - '''the stroke was upon them'''
  rationale: Although לָמוֹ is morphologically plural, poetic Hebrew can use it for
    a singular referent. Given the singular servant throughout the surrounding lines
    and the logic of the verse, a singular sense is most coherent in the main text.
    Because the clause is textually and interpretively difficult, alternatives are
    preserved in footnotes rather than resolved dogmatically.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
- issue: Sense of דּוֹר in 'his generation'
  chosen_reading: Retain the broad term 'generation' without specifying descendants
    or contemporaries
  alternative_readings:
  - his contemporaries
  - his descendants
  - his fate/lifespan
  rationale: The Hebrew permits several interpretive possibilities. The main text
    keeps the lexical form 'generation' to avoid importing a narrower theological
    interpretation, while the footnote notes the alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
