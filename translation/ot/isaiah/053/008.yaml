id: ISA.53.8
reference: Isaiah 53:8
source:
  edition: WLC
  text: מֵ/עֹ֤צֶר וּ/מִ/מִּשְׁפָּט֙ לֻקָּ֔ח וְ/אֶת דּוֹר֖/וֹ מִ֣י יְשׂוֹחֵ֑חַ כִּ֤י
    נִגְזַר֙ מֵ/אֶ֣רֶץ חַיִּ֔ים מִ/פֶּ֥שַׁע עַמִּ֖/י נֶ֥גַע לָֽ/מוֹ־׃
translation:
  text: By oppression and judgment he was taken away; and as for his generation, who
    considered that he was cut off from the land of the living, stricken for the transgression
    of my people?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who spoke of,' 'who declared,' or 'who pondered' his generation; the
      Hebrew verb is rare and difficult.
    reason: lexical_alternative
  - marker: b
    text: '''His generation'' may refer to his contemporaries, his descendants, or
      more broadly his fate in his lifetime.'
    reason: alternative_reading
  - marker: c
    text: Or 'the stroke was upon him'; Hebrew לָמוֹ is formally plural but may function
      as a poetic singular here. Some take it as 'upon them.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעֹצֶר
  chosen: By oppression
  alternatives:
  - From detention
  - From oppression
  lexicon: HALOT
  rationale: עֹצֶר can denote restraint, detention, or oppressive confinement. In
    this context, paired with מִמִּשְׁפָּט and followed by 'he was taken away,' it
    most naturally conveys oppressive treatment rather than a neutral imprisonment.
    'By oppression' preserves the instrumental nuance of the prefixed מִן while remaining
    idiomatic in English.
- source_word: וּמִמִּשְׁפָּט
  chosen: and judgment
  alternatives:
  - and justice
  - and legal process
  lexicon: HALOT
  rationale: מִשְׁפָּט commonly means judgment, justice, or legal decision/process.
    Here 'judgment' best preserves the juridical sense without over-interpreting whether
    the process was just or unjust. The phrase 'by oppression and judgment' reflects
    the compressed Hebrew.
- source_word: לֻקָּח
  chosen: he was taken away
  alternatives:
  - he was taken
  - he was removed
  lexicon: HALOT
  rationale: The passive of לקח here indicates removal. 'Taken away' is idiomatic
    and fits the context of violent removal leading to death, while staying close
    to the Hebrew.
- source_word: וְאֶת־דּוֹרוֹ
  chosen: and as for his generation
  alternatives:
  - and his generation
  - and who of his generation
  lexicon: HALOT
  rationale: The marked object phrase with אֶת is difficult. Rendering it as a topical
    phrase, 'as for his generation,' reflects the Hebrew fronting and prepares for
    the following rhetorical question. 'Generation' is retained as the most direct
    gloss for דּוֹר, without deciding between contemporaries, descendants, or lifespan
    in the main text.
- source_word: מִי יְשׂוֹחֵחַ
  chosen: who considered
  alternatives:
  - who spoke of
  - who declared
  - who pondered
  lexicon: HALOT
  rationale: 'The verb is rare and contextually debated. In this rhetorical question,
    the sense ''consider/ponder'' fits well: who among his generation grasped the
    significance of what happened to him? This reading is common and coherent with
    the following כִּי-clause. Alternatives are preserved in a footnote because the
    lexical sense is not certain.'
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what was or was not considered:
    ''who considered that he was cut off...?'' Using ''that'' makes the syntax clear
    in English.'
- source_word: נִגְזַר
  chosen: he was cut off
  alternatives:
  - he was severed
  - he was cut down
  lexicon: HALOT
  rationale: נגזר in the Niphal conveys being cut off or severed. 'Cut off' is the
    standard and best contextual rendering, especially in relation to death and removal
    from the living.
- source_word: מֵאֶרֶץ חַיִּים
  chosen: from the land of the living
  alternatives:
  - out of the land of the living
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for the realm of the living, i.e.,
    life in this world. 'From the land of the living' preserves the imagery and is
    natural English.
- source_word: מִפֶּשַׁע עַמִּי
  chosen: for the transgression of my people
  alternatives:
  - because of the transgression of my people
  - from the transgression of my people
  lexicon: HALOT
  rationale: פֶּשַׁע is best rendered 'transgression' in this prophetic context. The
    prefixed מִן can be causal, but in English 'for' succinctly conveys the relation
    between the people's sin and the servant's suffering without overloading the line.
- source_word: נֶגַע
  chosen: stricken
  alternatives:
  - a stroke
  - a plague
  - a blow
  lexicon: HALOT
  rationale: נֶגַע is a noun meaning stroke, blow, plague, or affliction. In this
    compressed clause, an adjectival/passive rendering 'stricken' produces clear English
    and captures the sense of being smitten with affliction.
- source_word: לָמוֹ
  chosen: for
  alternatives:
  - upon him
  - upon them
  lexicon: HALOT
  rationale: 'לָמוֹ is formally plural but often functions as a poetic singular in
    Biblical Hebrew. In Isaiah 53, the servant is singular throughout this immediate
    context, so the clause is best understood singularly: ''stricken for the transgression
    of my people.'' The number ambiguity is preserved in a footnote.'
