theological_decisions:
- issue: Referent of 'before him' (לְפָנָיו)
  chosen_reading: Retain the literal 'before him' without identifying the referent
    in the main text.
  alternative_readings:
  - before the LORD
  - before us
  rationale: The suffix is masculine singular, and the immediate Hebrew does not explicitly
    restate the antecedent. Given the servant-song context, many take it as referring
    to the LORD; others have proposed different construals. To preserve the text's
    ambiguity rather than resolve it interpretively, the translation keeps 'before
    him.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Whether the verse describes lack of physical attractiveness only or broader
    social unimpressiveness
  chosen_reading: Use visible-language terms ('form,' 'majesty,' 'appearance') without
    expanding into social status language.
  alternative_readings:
  - lack of beauty
  - lack of royal bearing
  - lack of social prestige
  rationale: The Hebrew vocabulary centers on what is seen. While broader implications
    may be drawn theologically, the translation should not import them into the main
    text.
  doctrine_reference: Translation philosophy §1 and §3
