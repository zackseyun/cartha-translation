id: ISA.53.2
reference: Isaiah 53:2
source:
  edition: WLC
  text: וַ/יַּ֨עַל כַּ/יּוֹנֵ֜ק לְ/פָנָ֗י/ו וְ/כַ/שֹּׁ֨רֶשׁ֙ מֵ/אֶ֣רֶץ צִיָּ֔ה לֹא
    תֹ֥אַר ל֖/וֹ וְ/לֹ֣א הָדָ֑ר וְ/נִרְאֵ֥/הוּ וְ/לֹֽא מַרְאֶ֖ה וְ/נֶחְמְדֵֽ/הוּ־־׃
translation:
  text: For he grew up before him like a young plant, and like a root out of dry ground.
    He had no form or majesty that we should look at him, and no appearance that we
    should desire him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a tender shoot.' The Hebrew יוֹנֵק can denote a tender sprout/shoot
      in this plant image.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before him'; the referent may be understood as the LORD, but the
      text does not restate it explicitly.
    reason: alternative_reading
  - marker: c
    text: Or more literally, 'and we saw him, and there was no appearance that we
      should desire him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  chosen: grew up
  alternatives:
  - came up
  - sprang up
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/come up,' but in vegetative imagery
    it naturally refers to growth or sprouting. 'Grew up' fits the plant metaphor
    and also coheres with the servant's development in context.
- source_word: כַּיּוֹנֵק
  chosen: like a young plant
  alternatives:
  - like a tender shoot
  - like a suckling shoot
  lexicon: HALOT
  rationale: יוֹנֵק can denote a suckling or a tender shoot/sprout. In parallel with
    'root out of dry ground,' the botanical sense is primary here. 'Young plant' is
    readable modern English; the more traditional 'tender shoot' is preserved as an
    alternative.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - before him/His presence
  lexicon: HALOT
  rationale: The phrase literally means 'before him.' The 3ms suffix could be read
    straightforwardly as 'before him'; some interpreters understand the referent as
    God ('before him' = before the LORD), while others construe the sense more generally.
    The translation preserves the Hebrew wording without over-specifying the referent.
- source_word: וְכַשֹּׁרֶשׁ
  chosen: and like a root
  alternatives:
  - and like a root-shoot
  lexicon: HALOT
  rationale: שֹׁרֶשׁ is the ordinary word for 'root.' The simile continues the plant
    imagery and should remain concrete.
- source_word: מֵאֶרֶץ צִיָּה
  chosen: out of dry ground
  alternatives:
  - from a parched land
  - from dry soil
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/earth/ground; in this agricultural image 'ground'
    is most natural. צִיָּה denotes dryness, aridity, or parched conditions. 'Dry
    ground' is idiomatic and preserves the barrenness image.
- source_word: לֹא תֹאַר לוֹ
  chosen: He had no form
  alternatives:
  - He had no stately form
  - there was no form to him
  lexicon: HALOT
  rationale: תֹאַר refers to form, outline, or appearance. The clause is verbless
    in Hebrew, so English supplies 'had.' 'Form' keeps the physical/visible emphasis
    without importing attractiveness yet.
- source_word: וְלֹא הָדָר
  chosen: or majesty
  alternatives:
  - or splendor
  - or stateliness
  lexicon: HALOT
  rationale: הָדָר often denotes majesty, splendor, or honor. Here it describes outward
    impressiveness. 'Majesty' captures dignified grandeur and pairs well with 'form.'
- source_word: וְנִרְאֵהוּ
  chosen: that we should look at him
  alternatives:
  - when we saw him
  - and we saw him
  lexicon: HALOT
  rationale: 'The consonantal text can be understood as ''and we saw him,'' but in
    context with the following clause it functions well as part of a result/purpose-like
    description of visible attractiveness: there was nothing such that we should look
    at him. This yields coherent English while preserving the visual emphasis. The
    more formally literal alternative is preserved in a footnote.'
- source_word: וְלֹא מַרְאֶה
  chosen: and no appearance
  alternatives:
  - and no beauty
  - and no visible appearance
  lexicon: HALOT
  rationale: מַרְאֶה means appearance, sight, or visible form. Some English versions
    render 'beauty,' but that narrows the term interpretively. 'Appearance' better
    matches the Hebrew and keeps the focus on what is seen.
- source_word: וְנֶחְמְדֵהוּ
  chosen: that we should desire him
  alternatives:
  - that we should delight in him
  - that we should find him desirable
  lexicon: HALOT
  rationale: חמד conveys desire, delight, or taking pleasure in something attractive.
    'Desire' is the broadest and most direct rendering in this context of outward
    appeal.
