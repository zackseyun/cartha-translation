id: ISA.53.10
reference: Isaiah 53:10
source:
  edition: WLC
  text: וַ/יהוָ֞ה חָפֵ֤ץ דַּכְּא/וֹ֙ הֶֽחֱלִ֔י אִם תָּשִׂ֤ים אָשָׁם֙ נַפְשׁ֔/וֹ יִרְאֶ֥ה
    זֶ֖רַע יַאֲרִ֣יךְ יָמִ֑ים וְ/חֵ֥פֶץ יְהוָ֖ה בְּ/יָד֥/וֹ יִצְלָֽח־׃
translation:
  text: Yet it pleased the LORD to crush him; he made him sick. If his life makes
    a guilt offering, he will see offspring, he will prolong his days, and the pleasure
    of the LORD will prosper in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the LORD' or 'But the LORD'; the Hebrew conjunction can be rendered
      in several ways depending on discourse flow.
    reason: lexical_alternative
  - marker: b
    text: Or 'he afflicted him' or 'he caused grief.'
    reason: lexical_alternative
  - marker: c
    text: Or 'When his life is made a guilt offering,' or 'If you make his life a
      guilt offering.' The Hebrew of this clause is difficult, especially the subject
      of 'make.'
    reason: alternative_reading
  - marker: d
    text: '''Guilt offering'' refers to the sacrificial offering for guilt/reparation
      in the Torah.'
    reason: cultural_note
  - marker: e
    text: Or 'the will/purpose of the LORD will succeed by his hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: Yet the LORD
  alternatives:
  - And the LORD
  - But the LORD
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but in context it marks
    a strong contrast with the servant's suffering in the preceding verse, so 'Yet'
    brings out the discourse force without over-paraphrasing. יְהוָה follows the doctrinal
    default 'the LORD.'
- source_word: חָפֵץ
  chosen: it pleased
  alternatives:
  - willed
  - desired
  - was pleased
  lexicon: HALOT
  rationale: The verb denotes taking pleasure in, willing, or delighting in. 'It pleased'
    preserves the difficult force of the Hebrew while sounding natural in English.
    It does not imply sadistic delight, but divine purpose and willing acceptance.
- source_word: דַּכְּאוֹ
  chosen: to crush him
  alternatives:
  - to bruise him
  - to crush
  lexicon: HALOT
  rationale: The infinitive with 3ms suffix refers to the servant as object. 'Crush'
    better reflects the severity of the verb than traditional 'bruise.'
- source_word: הֶחֱלִי
  chosen: he made him sick
  alternatives:
  - he caused grief
  - he made him weak
  - he afflicted him
  lexicon: HALOT
  rationale: From חלה in the causative, the sense is to make sick or afflict. 'He
    made him sick' is concrete and close to the Hebrew; broader renderings like 'put
    him to grief' are interpretive expansions.
- source_word: אִם
  chosen: If
  alternatives:
  - When
  - Though
  lexicon: HALOT
  rationale: The particle most naturally introduces a condition here. Because the
    clause is syntactically difficult and some take it as more temporal or concessive,
    the alternative is preserved in a footnote.
- source_word: תָּשִׂים
  chosen: makes
  alternatives:
  - you make
  - he makes
  - is made
  lexicon: HALOT
  rationale: The 3fs form most naturally agrees with נַפְשׁוֹ ('his life/soul'), yielding
    'if his life makes/is made a guilt offering.' English idiom favors 'his life makes
    a guilt offering' less than 'his life makes a guilt offering' or 'is made,' but
    the active rendering best reflects the consonantal form while remaining understandable.
    The ambiguity is preserved in a footnote.
- source_word: אָשָׁם
  chosen: guilt offering
  alternatives:
  - reparation offering
  - offering for guilt
  lexicon: HALOT
  rationale: This is the established sacrificial term in Levitical usage. 'Guilt offering'
    is the clearest standard English equivalent and preserves cultic resonance.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - himself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the servant's life/person, not merely an immaterial
    soul. 'His life' is the most natural English rendering in sacrificial context.
- source_word: יִרְאֶה זֶרַע
  chosen: he will see offspring
  alternatives:
  - he will see seed
  - he will see descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' is idiomatic
    and preserves the familial/resultative sense without forcing a strictly biological
    reading.
- source_word: יַאֲרִיךְ יָמִים
  chosen: he will prolong his days
  alternatives:
  - he will lengthen days
  - he will live long
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for lengthened life. 'Prolong his days'
    keeps the idiom visible while remaining readable.
- source_word: וְחֵפֶץ יְהוָה
  chosen: and the pleasure of the LORD
  alternatives:
  - and the will of the LORD
  - and the purpose of the LORD
  lexicon: HALOT
  rationale: Cognate with חָפֵץ earlier in the verse, the noun denotes delight, pleasure,
    or purpose. 'Pleasure' preserves the lexical link; 'purpose' is interpretive but
    worth noting.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - by his hand
  - through him
  lexicon: HALOT
  rationale: The phrase is literally 'in/by his hand,' an idiom for agency or instrumentality.
    'In his hand' preserves the Hebrew image while still communicating agency.
- source_word: יִצְלָח
  chosen: will prosper
  alternatives:
  - will succeed
  - will advance
  lexicon: HALOT
  rationale: The verb means to prosper or succeed. 'Will prosper' fits the subject
    'the pleasure of the LORD' and preserves the theological sense of effective accomplishment.
