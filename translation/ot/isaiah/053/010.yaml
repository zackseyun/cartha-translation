theological_decisions:
- issue: Divine agency in the servant's suffering
  chosen_reading: 'The verse is rendered with direct divine agency: ''it pleased the
    LORD to crush him; he made him sick.'''
  alternative_readings:
  - The LORD permitted him to be crushed
  - The LORD allowed affliction to come upon him
  rationale: The Hebrew verbs assign agency to the LORD directly. Softening this to
    mere permission would import a theological mitigation not warranted by the text.
    At the same time, 'it pleased' is not explained as malicious delight but as divine
    will/purpose.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Subject and force of the guilt-offering clause
  chosen_reading: Main text uses 'If his life makes a guilt offering' while preserving
    alternatives in a footnote.
  alternative_readings:
  - If you make his life a guilt offering
  - When his life is made a guilt offering
  rationale: The Hebrew form is syntactically difficult and has been understood in
    more than one way. To preserve theological tension rather than over-resolve it,
    the main text adopts a defensible reading close to the form, and alternatives
    are footnoted.
  doctrine_reference: Translation philosophy §3
