theological_decisions:
- issue: Degree of messianic specificity in translation
  chosen_reading: Translate the verse according to its immediate Hebrew sense without
    importing explicit christological language.
  alternative_readings:
  - Render with more traditional phrasing shaped by New Testament citation patterns
  rationale: Within Christian orthodoxy this verse is understood as fulfilled in Christ,
    but the translation should not insert that identification into the wording itself.
    The Hebrew presents the servant's silent suffering through simile and repetition;
    the English preserves that tension and leaves theological identification to context
    and cross-reference rather than paraphrase.
  doctrine_reference: Translation philosophy §§1, 3
