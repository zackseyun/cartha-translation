id: ISA.53.7
reference: Isaiah 53:7
source:
  edition: WLC
  text: נִגַּ֨שׂ וְ/ה֣וּא נַעֲנֶה֮ וְ/לֹ֣א יִפְתַּח פִּי/ו֒ כַּ/שֶּׂה֙ לַ/טֶּ֣בַח
    יוּבָ֔ל וּ/כְ/רָחֵ֕ל לִ/פְנֵ֥י גֹזְזֶ֖י/הָ נֶאֱלָ֑מָה וְ/לֹ֥א יִפְתַּ֖ח פִּֽי/ו־׃
translation:
  text: He was oppressed, and he was afflicted, yet he did not open his mouth; like
    a lamb led to the slaughter, and like a ewe silent before her shearers, so he
    did not open his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He was oppressed, yet he humbled himself'; the Hebrew of the opening
      line is difficult, and some translations construe the second verb with the sense
      of self-humbling rather than passive affliction.
    reason: alternative_reading
lexical_decisions:
- source_word: נִגַּשׂ
  chosen: was oppressed
  alternatives:
  - was driven hard
  - was exacted upon
  lexicon: HALOT
  rationale: The Niphal of נגשׂ here conveys being subjected to harsh treatment or
    oppression. 'Was oppressed' is idiomatic modern English and fits the servant's
    unjust suffering better than a more wooden but obscure rendering such as 'it was
    exacted.'
- source_word: נַעֲנֶה
  chosen: was afflicted
  alternatives:
  - was humbled
  - answered
  lexicon: HALOT
  rationale: Given the passive/reflexive sense in context and the parallel with נִגַּשׂ,
    the sense is suffering affliction or humiliation, not verbal response. 'Was afflicted'
    preserves the suffering emphasis without overinterpreting.
- source_word: וְלֹא יִפְתַּח פִּיו
  chosen: yet he did not open his mouth
  alternatives:
  - and he did not open his mouth
  lexicon: HALOT
  rationale: The clause is repeated for emphasis. Rendering the first waw as 'yet'
    brings out the concessive force in English after the description of oppression
    and affliction, while the second occurrence is retained more straightforwardly.
    'Open his mouth' is kept literally because it is clear and rhetorically important.
- source_word: כַּשֶּׂה
  chosen: like a lamb
  alternatives:
  - like a sheep
  lexicon: HALOT
  rationale: שֶׂה can denote a small livestock animal generically, but 'lamb' is the
    established and contextually fitting image in sacrificial/slaughter language and
    preserves the verse's tenderness and vulnerability.
- source_word: לַטֶּבַח
  chosen: to the slaughter
  alternatives:
  - for slaughter
  lexicon: HALOT
  rationale: Both are possible, but 'to the slaughter' is the most natural English
    collocation with 'led' and reflects the directional sense of the preposition.
- source_word: יוּבָל
  chosen: led
  alternatives:
  - is brought
  - was brought
  lexicon: HALOT
  rationale: The passive/Hophal sense is movement under another's control. 'Led' is
    concise, idiomatic, and pairs naturally with 'like a lamb.'
- source_word: וּכְרָחֵל
  chosen: and like a ewe
  alternatives:
  - and like a sheep
  - and like a ewe lamb
  lexicon: HALOT
  rationale: רָחֵל specifically denotes a female sheep. 'Ewe' preserves the lexical
    specificity of the Hebrew better than the generic 'sheep.'
- source_word: לִפְנֵי גֹזְזֶיהָ
  chosen: before her shearers
  alternatives:
  - before those who shear her
  lexicon: HALOT
  rationale: This is a straightforward construct expression. 'Her shearers' is natural
    English and preserves the feminine suffix tied to 'ewe.'
- source_word: נֶאֱלָמָה
  chosen: silent
  alternatives:
  - mute
  - is silent
  - was silent
  lexicon: HALOT
  rationale: The predicate describes the ewe's quietness before shearers. 'Silent'
    is more natural contemporary English than 'mute' and works smoothly in the simile.
- source_word: וְלֹא יִפְתַּח פִּיו
  chosen: so he did not open his mouth
  alternatives:
  - and he did not open his mouth
  lexicon: HALOT
  rationale: The repeated line concludes the comparison. 'So' helps English readers
    hear the simile's force without adding content beyond the Hebrew parallelism.
