id: ISA.14.23
reference: Isaiah 14:23
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֛י/הָ לְ/מוֹרַ֥שׁ קִפֹּ֖ד וְ/אַגְמֵי מָ֑יִם וְ/טֵֽאטֵאתִ֨י/הָ֙
    בְּ/מַטְאֲטֵ֣א הַשְׁמֵ֔ד נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת־׃פ
translation:
  text: I will make her a possession of the hedgehog and pools of water, and I will
    sweep her with the broom of destruction, declares the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew קִפֹּד likely names a desert or ruin-dwelling creature; possible
      renderings include 'porcupine,' 'owl,' or the traditional 'bittern.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּיהָ
  chosen: I will make her
  alternatives:
  - and I will set her
  - and I will make it
  lexicon: HALOT
  rationale: From שׂוּם, common verb 'to put/set/make.' In this context with predicative
    complements, 'make her' is natural English. The 3fs suffix refers to Babylon as
    a city, hence 'her' rather than 'it.'
- source_word: לְמוֹרַשׁ
  chosen: a possession of
  alternatives:
  - for a possession
  - an inheritance
  - a place possessed by
  lexicon: HALOT
  rationale: מוֹרָשׁ denotes a possession or place taken as possession. 'A possession
    of' fits the construct relation with the following noun and preserves the image
    of the city becoming the domain of wild creatures.
- source_word: קִפֹּד
  chosen: hedgehog
  alternatives:
  - porcupine
  - owl
  - bittern
  lexicon: HALOT
  rationale: The animal identity is uncertain. 'Hedgehog' is a common modern lexical
    choice for קִפֹּד and avoids older tradition-driven renderings like 'bittern'
    that are less likely from the Hebrew. Because the referent is debated, alternatives
    are preserved in a footnote.
- source_word: וְאַגְמֵי מָיִם
  chosen: and pools of water
  alternatives:
  - and marshes of water
  - and swamps
  - and water-reeds/marshland
  lexicon: HALOT
  rationale: אַגַם refers to marshy pool or reed pool. 'Pools of water' is clear modern
    English and preserves the image of desolation and inundation without over-specifying
    wetland ecology.
- source_word: וְטֵאטֵאתִיהָ
  chosen: and I will sweep her
  alternatives:
  - and I will broom her away
  - and I will cleanse her out
  lexicon: HALOT
  rationale: From טָאָא/טאטא, 'to sweep.' 'Sweep her' keeps the vivid metaphor and
    works idiomatically in English.
- source_word: בְּמַטְאֲטֵא
  chosen: with the broom
  alternatives:
  - with a broom
  lexicon: HALOT
  rationale: Instrumental בְּ with noun 'broom.' The definite article in Hebrew supports
    'the broom,' giving the phrase a proverbial, emphatic feel.
- source_word: הַשְׁמֵד
  chosen: of destruction
  alternatives:
  - of annihilation
  - of extermination
  - that destroys
  lexicon: HALOT
  rationale: From שׁמד, destruction/devastation. 'Of destruction' is concise and preserves
    the genitival force in the metaphor 'broom of destruction.'
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is readable modern English and
    suitably weighty.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: צְבָאוֹת literally refers to armies/hosts. 'Of Armies' is more transparent
    modern English than the traditional 'of hosts' while preserving the martial-cosmic
    title.
