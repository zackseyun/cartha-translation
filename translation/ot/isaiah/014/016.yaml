id: ISA.14.16
reference: Isaiah 14:16
source:
  edition: WLC
  text: רֹאֶ֨י/ךָ֙ אֵלֶ֣י/ךָ יַשְׁגִּ֔יחוּ אֵלֶ֖י/ךָ יִתְבּוֹנָ֑נוּ הֲ/זֶ֤ה הָ/אִישׁ֙
    מַרְגִּ֣יז הָ/אָ֔רֶץ מַרְעִ֖ישׁ מַמְלָכֽוֹת׃
translation:
  text: 'Those who see you will stare at you; they will look closely at you: ‘Is this
    the man who made the earth tremble, who shook kingdoms,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will examine you' / 'they will consider you.' The Hebrew verb can
      include the sense of close scrutiny, not only physical looking.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאֶיךָ
  chosen: those who see you
  alternatives:
  - your watchers
  - those seeing you
  lexicon: HALOT
  rationale: 'Qal participle plural with 2ms suffix functions substantivally: ''those
    who see you.'' This is the natural English equivalent and preserves the direct
    address.'
- source_word: אֵלֶיךָ יַשְׁגִּיחוּ
  chosen: will stare at you
  alternatives:
  - will gaze at you
  - will look at you attentively
  lexicon: HALOT
  rationale: The Hiphil of שׁגח conveys directed, intent looking. 'Stare at' captures
    the fixed, astonished gaze in context more vividly than the flatter 'look at.'
- source_word: אֵלֶיךָ יִתְבּוֹנָנוּ
  chosen: they will look closely at you
  alternatives:
  - they will consider you
  - they will examine you
  lexicon: HALOT
  rationale: Hitpolel/reflective form of בין here suggests careful observation or
    scrutiny. 'Look closely at you' keeps the visual emphasis parallel to the previous
    clause while implying thoughtful inspection.
- source_word: הֲזֶה
  chosen: Is this
  alternatives:
  - Is this one
  lexicon: HALOT
  rationale: Interrogative ה plus demonstrative introduces the shocked question. 'Is
    this' is idiomatic and preserves the rhetorical force.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - this man
  lexicon: HALOT
  rationale: The noun is grammatically masculine singular and refers to the fallen
    tyrant as an individual male figure. Per doctrine, gender-accurate rendering is
    retained.
- source_word: מַרְגִּיז הָאָרֶץ
  chosen: who made the earth tremble
  alternatives:
  - who shook the earth
  - who agitated the earth
  lexicon: HALOT
  rationale: Hiphil participle of רגע/רגז here denotes causing the earth to quake
    or tremble. 'Made the earth tremble' is idiomatic and preserves causative force.
- source_word: מַרְעִישׁ מַמְלָכוֹת
  chosen: who shook kingdoms
  alternatives:
  - who made kingdoms quake
  - who caused kingdoms to tremble
  lexicon: HALOT
  rationale: Hiphil participle of רעשׁ means to cause shaking/quaking. 'Shook kingdoms'
    is concise, natural, and parallel to the previous participial clause.
