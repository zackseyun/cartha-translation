theological_decisions:
- issue: Referent of 'the man' in the taunt
  chosen_reading: Translate straightforwardly as a human ruler without importing later
    interpretive identifications into the text.
  alternative_readings:
  - Read as Satan/Lucifer in the main text
  - Read as both king of Babylon and cosmic rebel in the main text
  rationale: The Hebrew in this verse says 'the man' and the immediate literary context
    is a taunt over the king of Babylon. The translation should not import a later
    theological interpretation into the wording of the verse itself.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
