theological_decisions:
- issue: Rendering the reversal imagery of Israel possessing former captors as slaves
  chosen_reading: Translate the social-political reversal directly without softening the slavery language
  alternative_readings:
  - Use 'servants' to reduce harshness
  - Paraphrase as general subjugation
  rationale: The Hebrew explicitly names עבדים and שפחות and depicts a dramatic reversal of exile and oppression. The translation should not mute this by euphemism, while also avoiding importing later doctrinal or ethical justification beyond the text itself.
  doctrine_reference: Translation philosophy §1, §5; Contested terms table on δοῦλος/slave-servant principle applied analogically to bonded-status language
- issue: Rendering יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
