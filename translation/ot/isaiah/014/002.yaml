id: ISA.14.2
reference: Isaiah 14:2
source:
  edition: WLC
  text: וּ/לְקָח֣וּ/ם עַמִּים֮ וֶ/הֱבִיא֣וּ/ם אֶל מְקוֹמָ/ם֒ וְ/הִֽתְנַחֲל֣וּ/ם בֵּֽית יִשְׂרָאֵ֗ל עַ֚ל אַדְמַ֣ת יְהוָ֔ה לַ/עֲבָדִ֖ים וְ/לִ/שְׁפָח֑וֹת וְ/הָיוּ֙ שֹׁבִ֣ים לְ/שֹֽׁבֵי/הֶ֔ם וְ/רָד֖וּ בְּ/נֹגְשֵׂי/הֶֽם־־׃ס
translation:
  text: Peoples will take them and bring them to their place, and the house of Israel will possess them on the land of Yahweh as male slaves and female slaves. They will take captive those who took them captive, and they will rule over their oppressors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will inherit them' for 'will take possession of them'; the Hebrew verb can carry inheritance language.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'as male slaves and female slaves'; the text explicitly marks both genders.
    reason: lexical_alternative
  - marker: c
    text: Or 'They will take captive those who took them captive.' The Hebrew uses a wordplay on the same root for 'capture.'
    reason: lexical_alternative
  - marker: d
    text: '''the LORD'' renders the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְקָחוּם
  chosen: Peoples will take them
  alternatives:
  - Peoples shall take them
  - The peoples will receive them
  lexicon: HALOT
  rationale: לקח in the Qal commonly means 'take.' The subject is עמים ('peoples'), and the object suffix refers back to Jacob/Israel from the previous verse. Future sense is appropriate in prophetic discourse.
- source_word: עַמִּים
  chosen: Peoples
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: עמים denotes peoples/nations. 'Peoples' preserves the plural ethnic sense without over-specifying geopolitical nation-states.
- source_word: וֶהֱבִיאוּם אֶל מְקוֹמָם
  chosen: and bring them to their place
  alternatives:
  - and lead them to their place
  - and bring them to their own place
  lexicon: HALOT
  rationale: הביא means 'bring.' מקום with 3mp suffix is 'their place,' referring to Israel's place/homeland. 'Bring' fits the restoration context.
- source_word: וְהִתְנַחֲלוּם
  chosen: will take possession of them
  alternatives:
  - will inherit them
  - will possess them as an inheritance
  lexicon: HALOT
  rationale: The Hitpael of נחל here carries the sense of taking as a possession/inheritance. 'Take possession of them' communicates the object suffix explicitly and fits the following phrase about slaves.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is a standard collective designation. Retaining 'house of Israel' preserves the covenantal-national expression.
- source_word: עַל אַדְמַת יְהוָה
  chosen: on the land of the LORD
  alternatives:
  - in the land of the LORD
  - upon the LORD's land
  lexicon: HALOT
  rationale: אדמה is 'ground/land.' 'On the land of the LORD' is a natural rendering and preserves the theological claim that the land belongs to YHWH. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  chosen: as male slaves and female slaves
  alternatives:
  - for servants and female servants
  - as slaves and slave girls
  lexicon: HALOT
  rationale: 'The lamed marks result/status: they become such on Israel''s land. Because the bonded status is explicit and socially salient here, ''slaves'' is preferable to ''servants.'' Rendering both genders preserves the Hebrew distinction between עבדים and שפחות.'
- source_word: וְהָיוּ שֹׁבִים לְשֹׁבֵיהֶם
  chosen: They will become captors of their captors
  alternatives:
  - They will take captive those who took them captive
  - They will be captors to their captors
  lexicon: HALOT
  rationale: This is a wordplay on the root שבה ('take captive'). 'Captors of their captors' is concise, preserves the reversal, and reflects the participial construction.
- source_word: וְרָדוּ בְּנֹגְשֵׂיהֶם
  chosen: and they will rule over their oppressors
  alternatives:
  - and they will have dominion over their taskmasters
  - and they will subdue their oppressors
  lexicon: HALOT
  rationale: רדה means 'rule/have dominion.' נגשׂ can denote oppressors/taskmasters. 'Oppressors' is broader and fits the exile-restoration context better than the narrower 'taskmasters.'
