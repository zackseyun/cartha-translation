id: ISA.14.7
reference: Isaiah 14:7
source:
  edition: WLC
  text: נָ֥חָה שָׁקְטָ֖ה כָּל הָ/אָ֑רֶץ פָּצְח֖וּ רִנָּֽה־׃
translation:
  text: All the earth is at rest and quiet; they break out in singing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The whole earth has come to rest and is quiet; they burst forth into
      joyful song.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחָה
  chosen: is at rest
  alternatives:
  - has come to rest
  - rests
  lexicon: HALOT
  rationale: Qal perfect 3fs from נוח, with the feminine singular subject 'the earth.'
    Rendered as a present-state English expression ('is at rest') to convey the resultant
    state in context, rather than a simple past event.
- source_word: שָׁקְטָה
  chosen: quiet
  alternatives:
  - is quiet
  - undisturbed
  - tranquil
  lexicon: HALOT
  rationale: Qal perfect 3fs from שקט, paired with נָחָה for a hendiadys-like description
    of settled peace. 'Quiet' is concise and natural in English after 'is at rest.'
- source_word: כָּל הָאָרֶץ
  chosen: All the earth
  alternatives:
  - The whole earth
  - All the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'earth' or 'land.' In this taunt-song's cosmic scope,
    'earth' best fits the universalizing כָּל. 'All the earth' is idiomatic and preserves
    the breadth of the Hebrew.
- source_word: פָּצְחוּ
  chosen: they break out
  alternatives:
  - they burst forth
  - they break forth
  lexicon: HALOT
  rationale: Qal perfect 3cp from פצח, often used for bursting out into sound or song.
    English present 'break out' captures the vivid ingressive force in context.
- source_word: רִנָּה
  chosen: in singing
  alternatives:
  - into singing
  - with a ringing cry
  - with joyful song
  lexicon: HALOT
  rationale: The noun denotes a ringing cry, often joyful song. 'In singing' gives
    clear modern English and fits the collocation with פצח ('break out in singing').
    The joyful nuance is implicit in the noun and context.
