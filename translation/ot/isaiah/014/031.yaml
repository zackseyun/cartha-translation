id: ISA.14.31
reference: Isaiah 14:31
source:
  edition: WLC
  text: הֵילִ֤ילִֽי שַׁ֨עַר֙ זַֽעֲקִי עִ֔יר נָמ֖וֹג פְּלֶ֣שֶׁת כֻּלֵּ֑/ךְ כִּ֤י מִ/צָּפוֹן֙
    עָשָׁ֣ן בָּ֔א וְ/אֵ֥ין בּוֹדֵ֖ד בְּ/מוֹעָדָֽי/ו־׃
translation:
  text: Wail, O gate! Cry out, O city! Melt away, all of you, Philistia! For smoke
    comes from the north, and there is no straggler in his ranks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Howl, O gate!'; the Hebrew verb can also be rendered 'howl' or 'lament.'
    reason: lexical_alternative
  - marker: b
    text: Or 'faint' or 'dissolve in fear' for 'melt away.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and no one lags behind in his appointed places.' The Hebrew final clause
      may refer to the invader's troops being fully assembled and orderly.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵילִילִי
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative feminine singular from ילל, a cry of lament/distress. 'Wail'
    is natural modern English and preserves the force better than the somewhat harsher
    'howl'.
- source_word: שַׁעַר
  chosen: O gate
  alternatives:
  - gate
  lexicon: HALOT
  rationale: The city gate stands metonymically for the city's public life/defenses.
    Vocative sense is required by the imperative context; 'O gate' reflects the direct
    address.
- source_word: זַעֲקִי
  chosen: Cry out
  alternatives:
  - Shriek
  - Raise a cry
  lexicon: HALOT
  rationale: Imperative feminine singular from זעק. 'Cry out' is idiomatic and suitably
    urgent without overtranslating.
- source_word: עִיר
  chosen: O city
  alternatives:
  - city
  lexicon: HALOT
  rationale: Also vocative in parallel with 'gate.' The direct address is best represented
    in English with 'O city'.
- source_word: נָמֹוג
  chosen: Melt away
  alternatives:
  - Dissolve in fear
  - Faint
  lexicon: HALOT
  rationale: From מוג, conveying collapse, melting, or loss of courage. 'Melt away'
    preserves the metaphor and allows emotional and societal collapse to remain in
    view.
- source_word: פְּלֶשֶׁת כֻּלֵּךְ
  chosen: all of you, Philistia
  alternatives:
  - all Philistia
  - Philistia, all of you
  lexicon: HALOT
  rationale: Address to Philistia as a collective feminine entity. 'All of you, Philistia'
    preserves both the corporate address and the 2fs suffix nuance.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the lament. 'For' fits prophetic style and
    reads naturally.
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: Straightforward directional phrase. In context it signals the direction
    of the threatening invader.
- source_word: עָשָׁן
  chosen: smoke
  alternatives:
  - a cloud of smoke
  lexicon: HALOT
  rationale: Literal 'smoke,' likely imagery of an advancing army or devastation.
    The simple rendering preserves the metaphor without interpretive expansion.
- source_word: בָּא
  chosen: comes
  alternatives:
  - is coming
  - has come
  lexicon: HALOT
  rationale: Qal perfect in prophetic discourse can function with vivid present force.
    'Comes' gives clear English while preserving the immediacy of the threat.
- source_word: וְאֵין בּוֹדֵד
  chosen: and there is no straggler
  alternatives:
  - and none is isolated
  - and no one lags behind
  lexicon: HALOT
  rationale: בודד here is best understood as one separated from the group, i.e., a
    straggler. This fits the military image of a disciplined invading force.
- source_word: בְּמוֹעָדָיו
  chosen: in his ranks
  alternatives:
  - in his appointed places
  - at his appointed times
  lexicon: HALOT
  rationale: Though מועד often means 'appointed time/meeting,' in this context the
    suffix and military imagery favor the sense of assigned stations or formations.
    'In his ranks' communicates that no soldier is out of position. The singular suffix
    is retained conceptually as the invader/army viewed as a unit.
