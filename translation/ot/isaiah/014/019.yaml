id: ISA.14.19
reference: Isaiah 14:19
source:
  edition: WLC
  text: וְ/אַתָּ֞ה הָשְׁלַ֤כְתָּ מִֽ/קִּבְרְ/ךָ֙ כְּ/נֵ֣צֶר נִתְעָ֔ב לְב֥וּשׁ הֲרֻגִ֖ים
    מְטֹ֣עֲנֵי חָ֑רֶב יוֹרְדֵ֥י אֶל אַבְנֵי ב֖וֹר כְּ/פֶ֥גֶר מוּבָֽס־־׃
translation:
  text: But you are cast out away from your grave like a despised branch, clothed
    with the slain, those pierced by the sword, who go down to the stones of the pit,
    like a trampled corpse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an abhorred shoot/offshoot.” The Hebrew word can mean “shoot” or “branch”;
      here it refers to something rejected and thrown away.
    reason: lexical_alternative
  - marker: b
    text: Or “those thrust through with the sword.” The Hebrew expression is difficult;
      the sense is of the battle-slain.
    reason: lexical_alternative
  - marker: c
    text: “The pit” is a poetic term for the grave or realm of the dead; “stones of
      the pit” likely evokes a stone-lined burial place.
    reason: cultural_note
lexical_decisions:
- source_word: הָשְׁלַכְתָּ
  chosen: are cast out
  alternatives:
  - have been thrown out
  - are thrown away
  lexicon: HALOT
  rationale: 'The Hophal perfect conveys passive/resultative force: the addressee
    has been cast out. Present English ''are cast out'' fits the taunt''s vivid description
    better than a simple past while preserving the passive sense.'
- source_word: מִקִּבְרְךָ
  chosen: away from your grave
  alternatives:
  - from your grave
  - out of your tomb
  lexicon: HALOT
  rationale: 'קבר is the burial place/grave. ''Away from your grave'' makes explicit
    the force of מן with the passive verb: excluded from proper burial.'
- source_word: כְּנֵצֶר
  chosen: like a ... branch
  alternatives:
  - like a shoot
  - like an offshoot
  - like a sprout
  lexicon: HALOT
  rationale: נֵצֶר denotes a shoot/branch. In this context of something discarded
    and abhorred, 'branch' is natural English and avoids importing the messianic resonance
    of 'shoot' from Isa 11:1 into this taunt context.
- source_word: נִתְעָב
  chosen: despised
  alternatives:
  - abhorred
  - detested
  lexicon: HALOT
  rationale: The Niphal participle describes something loathed or abominated. 'Despised'
    is readable modern English; 'abhorred' is possible and preserved as an alternative
    nuance.
- source_word: לְבוּשׁ
  chosen: clothed with
  alternatives:
  - garbed in
  - covered with
  lexicon: HALOT
  rationale: Literally 'clothing/garment of.' In context it functions predicatively
    with the following phrase. 'Clothed with' preserves the imagery without over-literal
    awkwardness.
- source_word: הֲרֻגִים
  chosen: the slain
  alternatives:
  - the killed
  - the dead
  lexicon: HALOT
  rationale: Passive participle from הרג, specifically those killed violently. 'The
    slain' is the most idiomatic and precise English equivalent.
- source_word: מְטֹעֲנֵי חָרֶב
  chosen: those pierced by the sword
  alternatives:
  - those thrust through with the sword
  - those loaded with the sword
  lexicon: HALOT
  rationale: The participle from טען is difficult here; in context with corpses and
    descent to the pit it refers to those struck through by the sword rather than
    a literal 'loaded.' 'Pierced by the sword' captures the likely sense in idiomatic
    English while acknowledging lexical difficulty.
- source_word: יוֹרְדֵי אֶל אַבְנֵי בוֹר
  chosen: who go down to the stones of the pit
  alternatives:
  - who descend to the stones of the pit
  - going down to the pit's stones
  lexicon: HALOT
  rationale: The participle continues describing the slain. 'Stones of the pit' is
    retained rather literally because the phrase likely evokes the stone-lined grave/pit
    and should not be flattened to simply 'grave'.
- source_word: בּוֹר
  chosen: the pit
  alternatives:
  - the grave
  - the cistern
  lexicon: HALOT
  rationale: בּוֹר often means pit/cistern and in poetic death contexts can denote
    the grave realm. 'Pit' preserves the concrete image and the death connotation
    without over-interpreting.
- source_word: כְּפֶגֶר
  chosen: like a corpse
  alternatives:
  - like a carcass
  - like a dead body
  lexicon: HALOT
  rationale: פגר denotes a corpse/carcass. 'Corpse' is suitably grave and human in
    this royal taunt context.
- source_word: מוּבָס
  chosen: trampled
  alternatives:
  - trodden underfoot
  - trampled down
  lexicon: HALOT
  rationale: The passive participle conveys being trodden down. 'Trampled' is concise
    and vivid modern English.
