theological_decisions:
- issue: Potential messianic overtones of נֵצֶר
  chosen_reading: branch
  alternative_readings:
  - shoot
  rationale: Although נֵצֶר can elsewhere carry messianic resonance (notably Isa 11:1),
    here the immediate context is a taunt over a disgraced ruler cast from burial.
    Rendering it 'branch' avoids importing a theological association not demanded
    by this verse.
  doctrine_reference: Translation philosophy §1, §3
