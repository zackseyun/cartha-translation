id: ISA.14.17
reference: Isaiah 14:17
source:
  edition: WLC
  text: שָׂ֥ם תֵּבֵ֛ל כַּ/מִּדְבָּ֖ר וְ/עָרָ֣י/ו הָרָ֑ס אֲסִירָ֖י/ו לֹא פָ֥תַח בָּֽיְתָ/ה־׃
translation:
  text: who made the world like a wilderness and tore down its cities, who did not
    open the house for his prisoners?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who did not send his prisoners home' or 'who did not open the way home
      for his prisoners.' The Hebrew reads literally 'did not open the house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂם
  chosen: made
  alternatives:
  - set
  - turned
  lexicon: HALOT
  rationale: Qal perfect of שׂים here introduces the tyrant's action toward the world.
    'Made' is idiomatic in English with the predicate phrase 'like a wilderness' and
    captures the causative/resultative sense better than the more wooden 'set.'
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  - the earth
  lexicon: HALOT
  rationale: תבל commonly denotes the world in the sense of the inhabited earth. 'The
    world' is natural modern English and fits the cosmic scope of the taunt.
- source_word: כַּמִּדְבָּר
  chosen: like a wilderness
  alternatives:
  - like the wilderness
  - like a desert
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Wilderness' preserves the biblical
    register and avoids narrowing the image to sandy desert terrain alone.
- source_word: וְעָרָיו
  chosen: and its cities
  alternatives:
  - and his cities
  lexicon: HALOT
  rationale: The suffix is formally masculine singular ('his'), referring back to
    the world/realm as grammatically construed through the tyrant's dominion. In English,
    'its cities' more clearly links the cities to 'the world' just mentioned and avoids
    suggesting the king personally owned cities. This is a contextual smoothing within
    optimal equivalence.
- source_word: הָרָס
  chosen: tore down
  alternatives:
  - destroyed
  - demolished
  - overthrew
  lexicon: HALOT
  rationale: The verb denotes pulling down or ruining. 'Tore down' preserves the concrete
    destructive force and pairs well with 'cities.'
- source_word: אֲסִירָיו
  chosen: his prisoners
  alternatives:
  - his captives
  - his bound ones
  lexicon: HALOT
  rationale: From אסיר, those bound or imprisoned. 'Prisoners' is the clearest contemporary
    rendering in this context of refusing release.
- source_word: לֹא פָתַח
  chosen: did not open
  alternatives:
  - did not release
  - did not let go free
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'open.' Retaining 'open' preserves the imagery,
    while the object/complement clarifies the sense. More interpretive renderings
    like 'release' are possible but less textually transparent.
- source_word: בָּיְתָה
  chosen: the house
  alternatives:
  - home
  - to the house
  - to his house
  lexicon: HALOT
  rationale: The noun means 'house,' with directional he indicating motion toward/into
    the house. In context this likely means not opening the way home for prisoners.
    The main text keeps the concrete noun 'house' for auditability, while a footnote
    preserves the idiomatic alternative 'home.'
