id: ISA.14.24
reference: Isaiah 14:24
source:
  edition: WLC
  text: נִשְׁבַּ֛ע יְהוָ֥ה צְבָא֖וֹת לֵ/אמֹ֑ר אִם לֹ֞א כַּ/אֲשֶׁ֤ר דִּמִּ֨יתִי֙ כֵּ֣ן
    הָיָ֔תָה וְ/כַ/אֲשֶׁ֥ר יָעַ֖צְתִּי הִ֥יא תָקֽוּם־׃
translation:
  text: 'The LORD of Armies has sworn, saying: Surely, just as I have planned, so
    it has come to pass; and just as I have purposed, so it will stand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew oath idiom: literally ''if not,'' functioning here as a strong affirmation
      (''surely'' or ''indeed'').'
    reason: lexical_alternative
  - marker: c
    text: Or, 'just as I have thought/intended.'
    reason: lexical_alternative
  - marker: d
    text: Or, 'just as I have counseled/resolved, it will be established.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD.' Small-caps
    convention is represented here as 'The LORD' at sentence start.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: The noun literally denotes armies/hosts. 'Armies' is more transparent
    in modern English than the traditional 'hosts' while preserving the martial sense
    of the divine title.
- source_word: נִשְׁבַּע
  chosen: has sworn
  alternatives:
  - swore
  lexicon: HALOT
  rationale: The perfect verb reports a completed solemn oath. 'Has sworn' gives natural
    English with present relevance in prophetic discourse.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - declaring
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech; 'saying'
    is formally close and idiomatic.
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration
    rather than a literal conditional, so 'Surely' best conveys the force in English.
- source_word: דִּמִּיתִי
  chosen: have planned
  alternatives:
  - have thought
  - have intended
  - have imagined
  lexicon: HALOT
  rationale: The verb can denote thinking, intending, or planning. In parallel with
    'I have purposed' and in the context of divine decree, 'have planned' best captures
    deliberate intention without sounding merely mental.
- source_word: הָיָתָה
  chosen: it has come to pass
  alternatives:
  - so it was
  - so it has been
  lexicon: HALOT
  rationale: The feminine singular verb refers to the implied matter/event. 'Has come
    to pass' is idiomatic English for the fulfillment of what God planned and makes
    the eventive sense explicit.
- source_word: יָעַצְתִּי
  chosen: have purposed
  alternatives:
  - have counseled
  - have resolved
  - have planned
  lexicon: HALOT
  rationale: The verb often carries the sense of counsel, purpose, or resolve. 'Purposed'
    preserves the deliberative force and distinguishes it from the previous verb while
    keeping the parallelism.
- source_word: תָקוּם
  chosen: it will stand
  alternatives:
  - it will arise
  - it will be established
  lexicon: HALOT
  rationale: The verb literally means 'arise/stand up,' but in this context of divine
    purpose it conveys establishment or firm realization. 'Will stand' preserves the
    metaphor and the certainty of fulfillment.
- source_word: הִיא
  chosen: it
  lexicon: HALOT
  rationale: The feminine pronoun refers to the implied plan/purpose or matter, not
    a personal feminine subject, so English neuter 'it' is appropriate.
