theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: The LORD of Armies
  alternative_readings:
  - The LORD of hosts
  rationale: This translates both elements of the title rather than preserving the
    traditional but less transparent 'hosts.' It maintains the covenant name per doctrine
    and communicates the martial sovereignty emphasized in Isaiah.
  doctrine_reference: 'DOCTRINE.md: YHWH -> ''the LORD''; translate titles'
- issue: Force of the oath formula אִם לֹא
  chosen_reading: Surely
  alternative_readings:
  - If not
  rationale: A literal 'if not' would obscure the Hebrew oath idiom in English. 'Surely'
    preserves the solemn certainty of the divine oath without importing extra theological
    content.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy'
