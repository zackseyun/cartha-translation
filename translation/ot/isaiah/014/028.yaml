id: ISA.14.28
reference: Isaiah 14:28
source:
  edition: WLC
  text: בִּ/שְׁנַת מ֖וֹת הַ/מֶּ֣לֶךְ אָחָ֑ז הָיָ֖ה הַ/מַּשָּׂ֥א הַ/זֶּֽה־׃
translation:
  text: 'In the year of the death of King Ahaz, this oracle came:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this pronouncement was' or, more formally, 'this burden was.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  chosen: In the year of
  alternatives:
  - In the year when
  - During the year of
  lexicon: HALOT
  rationale: The preposition ב plus שְׁנַת forms a temporal expression introducing
    the date of the oracle. 'In the year of' is natural English and closely reflects
    the Hebrew construct.
- source_word: מוֹת
  chosen: the death of
  alternatives:
  - the dying of
  lexicon: HALOT
  rationale: The construct noun from מות denotes death here, not the process of dying.
    'The death of' is the standard and clearest rendering in this dating formula.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'Although the Hebrew has the article (''the king''), English idiom with
    a following proper name normally omits it: ''King Ahaz,'' not ''the King Ahaz.''
    This preserves sense while using natural English.'
- source_word: אָחָז
  chosen: Ahaz
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  - occurred
  lexicon: HALOT
  rationale: The Hebrew verb is simply 'was,' but in context with הַמַּשָּׂא הַזֶּה
    it introduces the occurrence or delivery of the prophetic message. 'Came' is a
    common and idiomatic English way to render this formula without excessive stiffness.
    A more formal 'this oracle was' is possible but less natural in English.
- source_word: הַמַּשָּׂא
  chosen: oracle
  alternatives:
  - burden
  - pronouncement
  lexicon: HALOT
  rationale: In prophetic superscriptions מַשָּׂא commonly denotes an utterance of
    judgment or solemn proclamation. 'Oracle' is the clearest modern English equivalent.
    'Burden' reflects older tradition but is less transparent to modern readers.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - the following
  lexicon: HALOT
  rationale: The demonstrative points to the specific prophecy that follows. 'This'
    preserves the deictic force directly.
