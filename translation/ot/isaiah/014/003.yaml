id: ISA.14.3
reference: Isaiah 14:3
source:
  edition: WLC
  text: וְ/הָיָ֗ה בְּ/י֨וֹם הָנִ֤יחַ יְהוָה֙ לְ/ךָ֔ מֵֽ/עָצְבְּ/ךָ֖ וּ/מֵ/רָגְזֶ֑/ךָ
    וּ/מִן הָ/עֲבֹדָ֥ה הַ/קָּשָׁ֖ה אֲשֶׁ֥ר עֻבַּד בָּֽ/ךְ־־׃
translation:
  text: And it shall be, in the day when the LORD gives you rest from your pain and
    your turmoil, and from the hard service with which you were made to serve,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from your sorrow' for 'from your pain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the harsh labor ... that was imposed on you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future circumstance with the common prophetic formula. 'And
    it shall be' preserves the formal discourse marker without sounding overly archaic
    like 'come to pass.'
- source_word: בְּיוֹם
  chosen: in the day when
  alternatives:
  - when
  - on the day when
  lexicon: HALOT
  rationale: The preposition plus 'day' functions idiomatically as a temporal clause.
    'In the day when' keeps the Hebrew structure while remaining natural English.
- source_word: הָנִיחַ
  chosen: gives you rest
  alternatives:
  - causes you to rest
  - gives you relief
  lexicon: HALOT
  rationale: The Hiphil of נוח here means to grant rest or relief. 'Gives you rest'
    is idiomatic and preserves the causative sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the doctrine guidelines.
- source_word: מֵעָצְבְּךָ
  chosen: from your pain
  alternatives:
  - from your sorrow
  - from your suffering
  lexicon: HALOT
  rationale: עצב can denote pain, hurt, or sorrow. In this context of oppression and
    forced labor, 'pain' best captures the broad affliction without narrowing it to
    emotional grief alone.
- source_word: וּמֵרָגְזֶךָ
  chosen: and your turmoil
  alternatives:
  - and your agitation
  - and your trembling
  - and your unrest
  lexicon: HALOT
  rationale: רגז denotes agitation, disturbance, or inner shaking. 'Turmoil' communicates
    both emotional and situational unrest in clear modern English.
- source_word: הָעֲבֹדָה הַקָּשָׁה
  chosen: the hard service
  alternatives:
  - the harsh labor
  - the hard bondage
  - the severe work
  lexicon: HALOT
  rationale: The phrase refers to oppressive labor imposed on the people. 'Hard service'
    is a balanced rendering that preserves the labor/service sense of עבודה and the
    severity of קשה without overinterpreting as chattel slavery.
- source_word: אֲשֶׁר עֻבַּד בָּךְ
  chosen: with which you were made to serve
  alternatives:
  - which was worked on you
  - with which you were enslaved
  - that was imposed on you
  lexicon: HALOT
  rationale: The passive of עבד with ב conveys labor/service imposed upon the addressee.
    'Were made to serve' brings out the coercive passive sense more clearly than a
    wooden literal rendering. 'Imposed on you' is possible but loses the verbal connection
    to service/labor.
