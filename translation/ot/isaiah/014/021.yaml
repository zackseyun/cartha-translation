theological_decisions:
- issue: Intergenerational judgment in 'because of the guilt of their fathers'
  chosen_reading: Retain the text's statement of judgment on sons in connection with
    their fathers' guilt without softening or resolving the tension.
  alternative_readings:
  - Interpret as punishment only for sons who continue their fathers' sins
  - Interpret עון primarily as punishment rather than guilt
  rationale: The verse explicitly links the sons' slaughter with the fathers' עון.
    The translation preserves that tension rather than harmonizing it with other passages.
    Rendering עון as 'guilt' keeps the moral dimension present while not excluding
    consequential punishment.
  doctrine_reference: Preserve theological tension rather than resolve it.
