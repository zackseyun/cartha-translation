id: ISA.14.21
reference: Isaiah 14:21
source:
  edition: WLC
  text: הָכִ֧ינוּ לְ/בָנָ֛י/ו מַטְבֵּ֖חַ בַּ/עֲוֺ֣ן אֲבוֹתָ֑/ם בַּל יָקֻ֨מוּ֙ וְ/יָ֣רְשׁוּ
    אָ֔רֶץ וּ/מָלְא֥וּ פְנֵֽי תֵבֵ֖ל עָרִֽים־־׃
translation:
  text: Prepare slaughter for his sons because of the guilt of their fathers, lest
    they rise up and possess the land, and fill the face of the world with cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the iniquity of their fathers'; עָוֹן can denote guilt, iniquity,
      or the punishment resulting from guilt.
    reason: lexical_alternative
  - marker: b
    text: Or 'and inherit the land'; the Hebrew verb can mean 'inherit,' 'take possession
      of,' or 'possess.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'fill the face of the world with cities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכִינוּ
  chosen: Prepare
  alternatives:
  - Set up
  - Make ready
  lexicon: HALOT
  rationale: Hiphil imperative plural of כון calls for a direct command to make something
    ready. 'Prepare' is natural modern English and preserves the imperative force.
- source_word: לְבָנָיו
  chosen: for his sons
  alternatives:
  - for his children
  - for his descendants
  lexicon: HALOT
  rationale: בנים with 3ms suffix is literally 'his sons.' The masculine plural is
    retained per gender-accurate policy; broader renderings like 'descendants' are
    possible contextually but less direct.
- source_word: מַטְבֵּחַ
  chosen: slaughter
  alternatives:
  - slaughter-place
  - massacre
  lexicon: HALOT
  rationale: The noun denotes slaughter, often in a violent/judgment context. In English,
    'prepare slaughter' is concise and idiomatic enough while preserving the severity.
    'Slaughter-place' is too spatially specific here.
- source_word: בַּעֲוֺן
  chosen: because of the guilt of
  alternatives:
  - for the iniquity of
  - for the punishment of the guilt of
  lexicon: HALOT
  rationale: עון can denote guilt, iniquity, or guilt-bearing consequence. Here the
    causal sense with ב is best captured by 'because of the guilt of,' avoiding over-interpretation
    while preserving moral culpability.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: Literal plural 'their fathers' fits the Hebrew and preserves the intergenerational
    frame. 'Ancestors' is possible but less immediate.
- source_word: בַּל
  chosen: lest
  alternatives:
  - so that not
  - that not
  lexicon: HALOT
  rationale: בַּל introduces a negative purpose/result clause. 'Lest' is the most
    compact and accurate English equivalent in this warning/judgment context.
- source_word: יָקֻמוּ
  chosen: they rise up
  alternatives:
  - they arise
  - they stand up
  lexicon: HALOT
  rationale: קום in this context likely means rising to power or action. 'Rise up'
    preserves both the literal and political nuance.
- source_word: וְיָרְשׁוּ אָרֶץ
  chosen: and possess the land
  alternatives:
  - and inherit the land
  - and take possession of the earth
  lexicon: HALOT
  rationale: ירש can mean inherit, dispossess, or possess. Here 'possess the land'
    best fits imperial expansion language without importing covenantal inheritance
    overtones. ארץ could be 'land' or 'earth'; 'land' works well alongside the following
    universal phrase.
- source_word: וּמָלְאוּ פְנֵי תֵבֵל
  chosen: and fill the face of the world
  alternatives:
  - and fill the surface of the world
  - and fill the world
  lexicon: HALOT
  rationale: The idiom literally refers to filling the face/surface of the world.
    Retaining 'face of the world' preserves the Hebrew imagery while remaining understandable.
- source_word: עָרִים
  chosen: with cities
  alternatives:
  - with towns
  lexicon: HALOT
  rationale: The plural noun means 'cities.' The phrase likely depicts widespread
    urban domination or repopulation by the tyrant's line.
