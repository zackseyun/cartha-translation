  adjudicator: gemini-gemini-3.1-pro-preview-revision-pass
  reviewer_model: gemini-3.1-pro-preview
  category: revision_pass
  from: Prepare slaughter for his sons because of the guilt of their fathers, lest
    they rise up and possess the land and fill the face of the world with cities.
  to: Prepare slaughter for his sons because of the guilt of their fathers, lest they
    rise up and possess the earth, and fill the face of the world with cities.
  rationale: Changed 'land' to 'earth' to better parallel 'world' (תֵבֵל) and reflect
