- timestamp: '2026-04-23T22:00:00Z'
  adjudicator: claude-sonnet-4-6-source-review
  category: source_correction
  from: Prepare slaughter for his sons because of the guilt of their fathers, lest
    they rise up and possess the earth, and fill the face of the world with cities.
  to: Prepare slaughter for his sons because of the guilt of their fathers, lest they
    rise up and possess the land, and fill the face of the world with cities.
  rationale: 'The verse uses two distinct Hebrew words: אָרֶץ (''land/earth'', specific
    territory) and תֵבֵל (''world'', the inhabited earth). Changing both to near-synonyms
    erases that distinction. ''Possess the land'' preserves the contrast with ''the
    world''.'
