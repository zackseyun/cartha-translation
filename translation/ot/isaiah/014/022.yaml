theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of Hosts
  rationale: The phrase denotes the LORD's command over heavenly and earthly forces.
    'Of Armies' translates the title's meaning more transparently for modern readers
    while preserving its martial/judicial force.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
