id: ISA.14.22
reference: Isaiah 14:22
source:
  edition: WLC
  text: וְ/קַמְתִּ֣י עֲלֵי/הֶ֔ם נְאֻ֖ם יְהוָ֣ה צְבָא֑וֹת וְ/הִכְרַתִּ֨י לְ/בָבֶ֜ל
    שֵׁ֥ם וּ/שְׁאָ֛ר וְ/נִ֥ין וָ/נֶ֖כֶד נְאֻם יְהוָֽה־׃
translation:
  text: And I will rise up against them, declares the LORD of Armies, and I will cut
    off from Babylon name and remnant, offspring and posterity, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: '''Name and remnant, offspring and posterity'' is a comprehensive expression
      for wiping out Babylon''s memory and surviving line.'
    reason: cultural_note
lexical_decisions:
- source_word: וְקַמְתִּי
  chosen: I will rise up
  alternatives:
  - I will arise
  - I will stand up
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally. 'Rise up' preserves the idiom of active intervention/judgment better
    than a flatter 'act against.'
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - upon them
  - over them
  lexicon: HALOT
  rationale: With קום in hostile/judicial context, עַל commonly carries adversative
    force. 'Against them' makes the judgment sense clear in natural English.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - oracle of the LORD of Hosts
  - declares the LORD of Hosts
  lexicon: HALOT
  rationale: נְאֻם is well rendered 'declares' in prophetic formulae. Per doctrine,
    יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated;
    'of Armies' is more transparent to modern readers than traditional 'of Hosts.'
- source_word: וְהִכְרַתִּי
  chosen: I will cut off
  alternatives:
  - I will wipe out
  - I will destroy
  lexicon: HALOT
  rationale: Hiphil of כרת in judgment contexts often means to cut off/exterminate.
    'Cut off' preserves the covenant-judgment idiom without over-paraphrasing.
- source_word: לְבָבֶל
  chosen: from Babylon
  alternatives:
  - for Babylon
  - to Babylon
  lexicon: HALOT
  rationale: 'Although marked with ל, after הִכְרִית the sense is privative: removing
    something from Babylon. ''From Babylon'' is the most idiomatic English representation
    of the effect.'
- source_word: שֵׁם
  chosen: name
  alternatives:
  - renown
  - reputation
  lexicon: HALOT
  rationale: The noun can imply reputation or memorial, but 'name' preserves the Hebrew
    terseness and allows the broader sense of eradication of identity/remembrance.
- source_word: שְׁאָר
  chosen: remnant
  alternatives:
  - survivor
  - remainder
  lexicon: HALOT
  rationale: '''Remnant'' is the standard rendering and fits the paired list of total
    eradication. Here it is not a positive theological remnant but simply what remains.'
- source_word: נִין
  chosen: offspring
  alternatives:
  - son
  - descendant
  - progeny
  lexicon: HALOT
  rationale: The term refers to descendant/issue. 'Offspring' is natural English and
    pairs well with the following term while preserving familial continuity.
- source_word: נֶכֶד
  chosen: posterity
  alternatives:
  - descendant
  - grandchild
  lexicon: HALOT
  rationale: In pairing with נִין, the expression is a merism for descendants across
    generations. 'Posterity' avoids over-specifying a single generation while conveying
    future lineage.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  lexicon: HALOT
  rationale: Repeated prophetic closure is retained in translation for emphasis and
    solemnity; יְהוָה follows doctrinal default as 'the LORD.'
