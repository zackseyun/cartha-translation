theological_decisions:
- issue: Rendering of שְׁאוֹל in a poetic judgment context
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse depicts descent to the underworld in poetic parallel with 'the
    depths of the pit.' Using 'Sheol' preserves the Hebrew imagery and avoids collapsing
    the term into either a purely physical grave or a later, more systematized doctrine
    of hell. This maintains theological tension rather than over-resolving the concept.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
