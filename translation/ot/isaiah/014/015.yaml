id: ISA.14.15
reference: Isaiah 14:15
source:
  edition: WLC
  text: אַ֧ךְ אֶל שְׁא֛וֹל תּוּרָ֖ד אֶל יַרְכְּתֵי בֽוֹר־־־׃
translation:
  text: But you will be brought down to Sheol, to the depths of the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead' for 'Sheol.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Surely
  - Nevertheless
  - Yet
  lexicon: HALOT
  rationale: Here the particle marks a sharp adversative contrast with the preceding
    boast of ascent (v. 13–14). 'But' captures the rhetorical reversal in natural
    English better than the more wooden 'surely' in this context, though an asseverative
    nuance is also possible.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retained as 'Sheol' rather than flattened to 'grave' because the Hebrew
    denotes the underworld/the realm of the dead, not merely an individual burial
    place. Transliteration preserves the Hebrew concept without importing later doctrinal
    precision the text itself does not specify.
- source_word: תּוּרָד
  chosen: you will be brought down
  alternatives:
  - you will be brought down low
  - you will be cast down
  - you will descend
  lexicon: HALOT
  rationale: 'The Hophal form of ירד is causative/passive: ''be brought down'' or
    ''be made to go down.'' ''You will be brought down'' preserves both the passive
    sense and the humiliation implied by divine reversal better than the simpler intransitive
    ''descend.'''
- source_word: יַרְכְּתֵי
  chosen: the depths of
  alternatives:
  - the recesses of
  - the remotest parts of
  - the farthest reaches of
  lexicon: HALOT
  rationale: The construct refers to the innermost or farthest parts. 'The depths
    of' is idiomatic modern English and fits the imagery of descending into the lowest
    regions.
- source_word: בּוֹר
  chosen: the pit
  alternatives:
  - the grave
  - the dungeon
  lexicon: HALOT
  rationale: '''Pit'' is the standard and contextually fitting rendering for בור here,
    evoking the abyss-like place of descent and humiliation. ''Grave'' would overlap
    too much with Sheol and reduce the poetic parallelism.'
