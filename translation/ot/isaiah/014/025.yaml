id: ISA.14.25
reference: Isaiah 14:25
source:
  edition: WLC
  text: לִ/שְׁבֹּ֤ר אַשּׁוּר֙ בְּ/אַרְצִ֔/י וְ/עַל הָרַ֖/י אֲבוּסֶ֑/נּוּ וְ/סָ֤ר מֵֽ/עֲלֵי/הֶם֙
    עֻלּ֔/וֹ וְ/סֻ֨בֳּל֔/וֹ מֵ/עַ֥ל שִׁכְמ֖/וֹ יָסֽוּר־׃
translation:
  text: to break Assyria in my land, and on my mountains I will trample him; then
    his yoke will depart from upon them, and his burden will depart from upon his
    shoulder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Assyrian' instead of 'Assyria'; the Hebrew noun can refer either
      to the nation or to its representative ruler/army.
    reason: alternative_reading
  - marker: b
    text: Hebrew shifts from 'upon them' to singular 'upon his shoulder.' The singular
      may personify the oppressed people or function distributively.
    reason: textual_variant
lexical_decisions:
- source_word: לִשְׁבֹּר
  chosen: to break
  alternatives:
  - to shatter
  - to crush
  lexicon: HALOT
  rationale: Infinitive construct of שבר expressing purpose/result in continuation
    of the preceding oath context. 'To break' is a clear, direct rendering that preserves
    the metaphor without overinterpreting it.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - the Assyrian
  lexicon: HALOT
  rationale: The form can denote Assyria or the Assyrian. In this context, with national
    oppression and parallel references to yoke and burden, the collective/political
    entity is in view. 'Assyria' reads naturally in English while still allowing the
    representative king/army sense.
- source_word: בְּאַרְצִי
  chosen: in my land
  alternatives:
  - in my country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering of אֶרֶץ and fits the covenantal-territorial
    sense better than the more modern-political ''country.'''
- source_word: הָרַי
  chosen: my mountains
  alternatives:
  - my hill country
  lexicon: HALOT
  rationale: Literal plural with first-person suffix. 'My mountains' preserves the
    topographical and theological force of the land belonging to God.
- source_word: אֲבוּסֶנּוּ
  chosen: I will trample him
  alternatives:
  - I will tread him down
  lexicon: HALOT
  rationale: From בוס, 'trample, tread down.' Singular object suffix likely refers
    to Assyria personified. 'Trample him' is vivid and idiomatic.
- source_word: וְסָר
  chosen: then ... will depart
  alternatives:
  - and ... will turn aside
  - and ... will be removed
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic sequence, functioning
    futurally in context. 'Then ... will depart' captures the result that follows
    Assyria's defeat.
- source_word: מֵעֲלֵיהֶם
  chosen: from upon them
  alternatives:
  - from them
  - off them
  lexicon: HALOT
  rationale: The Hebrew explicitly uses על with plural suffix. Retaining 'upon them'
    reflects the image of oppressive weight resting on a people, though slightly smoothed
    in English by the larger sentence.
- source_word: עֻלּוֹ
  chosen: his yoke
  lexicon: HALOT
  rationale: Standard metaphor for domination/oppression. 'His' refers to Assyria
    as oppressor.
- source_word: סֻבֳּלוֹ
  chosen: his burden
  alternatives:
  - his load
  lexicon: HALOT
  rationale: A load borne under compulsion; in parallel with 'yoke' it denotes oppressive
    exaction. 'Burden' is the most natural English equivalent.
- source_word: שִׁכְמוֹ
  chosen: his shoulder
  alternatives:
  - their shoulder
  lexicon: HALOT
  rationale: The consonantal text has singular suffix, creating a shift from plural
    'them' to singular 'his shoulder.' The singular may be distributive or personifying
    the oppressed people. The translation preserves the Masoretic singular rather
    than harmonizing it.
- source_word: יָסוּר
  chosen: will depart
  alternatives:
  - will be removed
  - will turn aside
  lexicon: HALOT
  rationale: From סור, parallel to וְסָר. Repeating 'will depart' preserves the Hebrew
    parallelism and the image of oppression lifting.
