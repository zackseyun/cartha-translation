theological_decisions:
- issue: Referent of אַשּׁוּר
  chosen_reading: Assyria as the imperial power, personified in the singular pronoun
  alternative_readings:
  - the Assyrian as the king or representative invader
  rationale: The verse speaks of national defeat in God's land and the removal of
    an oppressor's yoke. Rendering the noun as 'Assyria' best captures the corporate-political
    referent while allowing the following singular pronouns to function as personification.
- issue: Number shift in the oppressed party ('from upon them' / 'from upon his shoulder')
  chosen_reading: Preserve the Masoretic shift from plural to singular
  alternative_readings:
  - 'Normalize to plural in English: ''from their shoulders'''
  rationale: The Hebrew text intentionally or textually preserves a shift in number.
    Rather than smoothing it away, the draft keeps the singular in the second clause
    to remain transparent to the source, while still producing readable English.
  doctrine_reference: Translation philosophy §1, §5
