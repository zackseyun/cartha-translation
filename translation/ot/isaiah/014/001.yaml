id: ISA.14.1
reference: Isaiah 14:1
source:
  edition: WLC
  text: כִּי֩ יְרַחֵ֨ם יְהוָ֜ה אֶֽת יַעֲקֹ֗ב וּ/בָחַ֥ר עוֹד֙ בְּ/יִשְׂרָאֵ֔ל וְ/הִנִּיחָ֖/ם
    עַל אַדְמָתָ֑/ם וְ/נִלְוָ֤ה הַ/גֵּר֙ עֲלֵי/הֶ֔ם וְ/נִסְפְּח֖וּ עַל בֵּ֥ית יַעֲקֹֽב־־־׃
translation:
  text: For the LORD will have compassion on Jacob and will again choose Israel, and
    he will settle them on their own land. The foreigner will join himself to them,
    and they will attach themselves to the house of Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sojourner' or 'the resident alien.' The Hebrew גֵּר often refers
      to a non-native living among Israel, not merely a passing outsider.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be joined to the house of Jacob.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding oracle section; 'For'
    fits the discourse flow naturally in English.
- source_word: יְרַחֵם
  chosen: will have compassion
  alternatives:
  - will show mercy
  - will pity
  lexicon: HALOT
  rationale: Piel of רחם conveys tender compassion/mercy. 'Have compassion' is natural
    modern English and preserves the affective force without sounding archaic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while aligning with established English Bible convention.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Proper name transliterated in standard English form.
- source_word: וּבָחַר עוֹד בְּיִשְׂרָאֵל
  chosen: and will again choose Israel
  alternatives:
  - and will choose Israel again
  - and will once more choose Israel
  lexicon: HALOT
  rationale: עוד modifies the renewed act of choosing. 'Again choose Israel' preserves
    the repetition/restoration sense without implying a first-time election.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Retained as the covenant people/nation name; distinct from 'Jacob' though
    parallel.
- source_word: וְהִנִּיחָם
  chosen: and he will settle them
  alternatives:
  - and he will give them rest
  - and he will set them down
  - and he will place them
  lexicon: HALOT
  rationale: The Hiphil of נוח/ניח here in context of return to land carries the sense
    of causing to rest/settle. 'Settle them' best fits the land-restoration context
    in idiomatic English.
- source_word: עַל אַדְמָתָם
  chosen: on their own land
  alternatives:
  - on their land
  - upon their soil
  lexicon: HALOT
  rationale: אדמה is land/ground/soil. 'Their own land' brings out the possessive
    suffix and restoration emphasis naturally.
- source_word: וְנִלְוָה הַגֵּר עֲלֵיהֶם
  chosen: The foreigner will join himself to them
  alternatives:
  - The sojourner will join them
  - The resident alien will attach himself to them
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident/sojourner. 'Foreigner' is readable
    modern English; the reflexive nuance of נלוה is represented by 'join himself,'
    indicating voluntary association with Israel.
- source_word: הַגֵּר
  chosen: the foreigner
  alternatives:
  - the sojourner
  - the resident alien
  lexicon: HALOT
  rationale: '''Foreigner'' is accessible and contextually adequate, though more technical
    options are possible. A footnote preserves the lexical alternatives because גֵּר
    can imply resident status rather than mere outsider identity.'
- source_word: וְנִסְפְּחוּ
  chosen: and they will attach themselves
  alternatives:
  - and they will be joined
  - and they will be added
  lexicon: HALOT
  rationale: The Niphal of ספח conveys being joined/attached. 'Attach themselves'
    preserves the close associative sense and mirrors the reflexive/associative force
    in context.
- source_word: עַל בֵּית יַעֲקֹב
  chosen: to the house of Jacob
  alternatives:
  - to the household of Jacob
  - to the house of Israel
  lexicon: HALOT
  rationale: With verbs of joining, על can be rendered idiomatically as 'to.' 'House
    of Jacob' preserves the covenant-family imagery and the Hebrew expression.
