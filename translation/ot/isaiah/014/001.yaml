theological_decisions:
- issue: Meaning of Israel's renewed 'choosing'
  chosen_reading: 'Render as a renewed act of divine election/restoration: ''will
    again choose Israel.'''
  alternative_readings:
  - will choose Israel yet again in a purely national-political sense
  - will prefer Israel
  rationale: בחר in this restoration context refers to the LORD's renewed favor and
    covenantal commitment after judgment. The translation preserves the text's theological
    tension by not over-specifying whether the emphasis is exclusively national, eschatological,
    or typological.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Identity and status of הַגֵּר
  chosen_reading: Translate as 'the foreigner' who joins Israel.
  alternative_readings:
  - the sojourner
  - the resident alien
  rationale: The verse depicts non-Israelites associating themselves with Jacob/Israel.
    'Foreigner' is readable and broad enough not to force a later technical legal
    category, while a footnote preserves more specific alternatives.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
