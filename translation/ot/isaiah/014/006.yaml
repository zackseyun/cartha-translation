theological_decisions:
- issue: Referent and syntax of the final clause
  chosen_reading: The verse continues the description of the oppressive ruler, with
    the last phrase expressing relentless pursuit/oppression of nations.
  alternative_readings:
  - The final clause could be construed of the nations as 'being pursued' by the ruler.
  - Some translations emend or smooth the syntax toward 'with unrelenting persecution'
    or similar.
  rationale: The Hebrew is compressed and somewhat difficult, but the broader context
    is a taunt against the king of Babylon and his former tyranny. The translation
    preserves the Masoretic wording without importing a stronger interpretive paraphrase
    than necessary.
  doctrine_reference: Preserve theological tension rather than resolve it
