id: ISA.14.6
reference: Isaiah 14:6
source:
  edition: WLC
  text: מַכֶּ֤ה עַמִּים֙ בְּ/עֶבְרָ֔ה מַכַּ֖ת בִּלְתִּ֣י סָרָ֑ה רֹדֶ֤ה בָ/אַף֙ גּוֹיִ֔ם
    מֻרְדָּ֖ף בְּלִ֥י חָשָֽׂךְ׃
translation:
  text: striking peoples in fury with an unceasing blow, ruling nations in anger,
    pursued without restraint.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without sparing' for 'without restraint.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final clause is compressed and may also be understood
      as describing nations being relentlessly pursued.
    reason: alternative_reading
lexical_decisions:
- source_word: מַכֶּה
  chosen: striking
  alternatives:
  - he who struck
  - striking down
  lexicon: HALOT
  rationale: Hiphil participle of נכה functions adjectivally/verbally in parallel
    with רֹדֶה, describing the tyrant by ongoing characteristic action. English participle
    preserves the compressed poetic style better than an expanded relative clause.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples/groups
  lexicon: HALOT
  rationale: עמים commonly denotes peoples/populations rather than political entities
    as such. 'Peoples' also preserves the distinction from גוים later in the verse,
    where 'nations' is a natural rendering.
- source_word: בְּעֶבְרָה
  chosen: in fury
  alternatives:
  - with wrath
  - in rage
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing wrath/fury. 'In fury' is idiomatic and forceful
    without becoming archaic.
- source_word: מַכַּת
  chosen: blow
  alternatives:
  - stroke
  - beating
  lexicon: HALOT
  rationale: Construct noun from the same root as מַכֶּה. 'Blow' is concise and fits
    the violent imagery.
- source_word: בִּלְתִּי סָרָה
  chosen: unceasing
  alternatives:
  - without ceasing
  - without turning aside
  - without stopping
  lexicon: HALOT
  rationale: The phrase literally conveys 'not turning aside' or 'not ceasing.' In
    context of repeated oppression, 'unceasing' captures the sense smoothly in English
    while preserving the relentless force.
- source_word: רֹדֶה
  chosen: ruling
  alternatives:
  - subduing
  - trampling
  - having dominion over
  lexicon: HALOT
  rationale: Qal participle of רדה can mean rule, tread down, or dominate depending
    on context. Here, with nations as object and in parallel with violent oppression,
    'ruling' keeps the lexical core while allowing the harsh context to color it.
- source_word: בָאַף
  chosen: in anger
  alternatives:
  - with anger
  - in wrath
  lexicon: HALOT
  rationale: אַף literally 'nose' idiomatically means anger. 'In anger' matches the
    earlier prepositional phrase and preserves the poetic parallelism.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentile nations
  - peoples
  lexicon: HALOT
  rationale: גוים commonly denotes nations. 'Nations' distinguishes it from עמים rendered
    'peoples' earlier in the line.
- source_word: מֻרְדָּף
  chosen: pursued
  alternatives:
  - persecuted
  - driven on
  lexicon: HALOT
  rationale: Passive participial form from רדף is best taken as 'pursued' or 'hounded.'
    In context it likely describes the nations as relentlessly pursued/oppressed by
    the ruler; English keeps the passive force.
- source_word: בְּלִי חָשָׂךְ
  chosen: without restraint
  alternatives:
  - without sparing
  - without holding back
  - without ceasing
  lexicon: HALOT
  rationale: חשׂך in this idiom means withhold, spare, hold back. 'Without restraint'
    captures the sense of unchecked oppression in idiomatic English. Because 'without
    sparing' is also plausible, it is preserved in a footnote.
