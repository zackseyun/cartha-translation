id: ISA.14.5
reference: Isaiah 14:5
source:
  edition: WLC
  text: שָׁבַ֥ר יְהוָ֖ה מַטֵּ֣ה רְשָׁעִ֑ים שֵׁ֖בֶט מֹשְׁלִֽים׃
translation:
  text: Yahweh has broken the staff of the wicked, the scepter of rulers,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''rod of the wicked.'' The Hebrew uses two parallel terms for an instrument of authority: ''staff'' and ''scepter.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבַר
  chosen: has broken
  alternatives:
  - broke
  - shattered
  lexicon: HALOT
  rationale: Qal perfect 3ms of שבר, denoting breaking. English present perfect fits the prophetic taunt context as a completed act with present significance; 'shattered' is possible but slightly more vivid than the Hebrew requires.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַטֵּה
  chosen: staff
  alternatives:
  - rod
  lexicon: HALOT
  rationale: מַטֶּה can denote a staff/rod. Here paired with שֵׁבֶט, using 'staff' for מַטֵּה and 'scepter' for שֵׁבֶט preserves the poetic parallelism while distinguishing the two terms in natural English.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked men
  - evil ones
  lexicon: HALOT
  rationale: Plural adjective/substantive meaning wicked persons. 'The wicked' is idiomatic and preserves the collective force without adding unnecessary gender specification.
- source_word: שֵׁבֶט
  chosen: scepter
  alternatives:
  - rod
  - staff
  lexicon: HALOT
  rationale: Though שֵׁבֶט can mean rod, staff, tribe, or scepter, in parallel with 'rulers' it most naturally denotes the emblem/instrument of rule, hence 'scepter.'
- source_word: מֹשְׁלִים
  chosen: rulers
  alternatives:
  - those who rule
  - tyrants
  lexicon: HALOT
  rationale: Qal participle plural from משל, 'to rule.' 'Rulers' is the most direct nominal rendering. 'Tyrants' would over-interpret the moral quality, already conveyed by the context and by 'the wicked' in the prior phrase.
