id: ISA.14.13
reference: Isaiah 14:13
source:
  edition: WLC
  text: וְ/אַתָּ֞ה אָמַ֤רְתָּ בִֽ/לְבָבְ/ךָ֙ הַ/שָּׁמַ֣יִם אֶֽעֱלֶ֔ה מִ/מַּ֥עַל לְ/כֽוֹכְבֵי
    אֵ֖ל אָרִ֣ים כִּסְאִ֑/י וְ/אֵשֵׁ֥ב בְּ/הַר מוֹעֵ֖ד בְּ/יַרְכְּתֵ֥י צָפֽוֹן־־׃
translation:
  text: But you said in your heart, ‘I will ascend to the heavens; I will raise my
    throne above the stars of God, and I will sit on the mount of assembly in the
    far reaches of the north.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “on the heights of Zaphon,” if צָפוֹן alludes to the cosmic
      mountain known in ancient Near Eastern tradition.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַתָּה
  chosen: But you
  alternatives:
  - And you
  - Yet you
  lexicon: HALOT
  rationale: The conjunction with the pronoun marks contrast in context; 'But you'
    brings out the adversative force naturally in English.
- source_word: אָמַרְתָּ
  chosen: said
  alternatives:
  - have said
  lexicon: HALOT
  rationale: Simple past fits the prophetic taunt context and idiomatic English narration.
- source_word: בִלְבָבְךָ
  chosen: in your heart
  alternatives:
  - in your mind
  - to yourself
  lexicon: HALOT
  rationale: A standard Hebrew idiom for inward thought or self-talk; retained formally
    because it is clear in English and preserves biblical texture.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The plural form is best represented by 'the heavens' rather than singular
    'heaven'; 'sky' is too mundane for the exalted claim being voiced.
- source_word: אֶעֱלֶה
  chosen: I will ascend
  alternatives:
  - I will go up
  - I will rise
  lexicon: HALOT
  rationale: '''Ascend'' preserves the elevated, aspirational sense of עלה in this
    boastful context.'
- source_word: מִמַּעַל לְכוֹכְבֵי אֵל
  chosen: above the stars of God
  alternatives:
  - higher than the stars of God
  - above the divine stars
  lexicon: HALOT
  rationale: The prepositional phrase indicates position above. 'Stars of God' is
    kept rather than interpreting the phrase more dynamically, since the Hebrew wording
    is straightforward and may intentionally evoke heavenly beings without forcing
    that interpretation into the main text.
- source_word: אָרִים כִּסְאִי
  chosen: I will raise my throne
  alternatives:
  - I will exalt my throne
  - I will lift up my throne
  lexicon: HALOT
  rationale: The Hiphil of רום means to raise/exalt. 'Raise my throne' is natural
    English and preserves the image of self-exaltation.
- source_word: וְאֵשֵׁב
  chosen: and I will sit
  alternatives:
  - and I will dwell
  - and I will enthrone myself
  lexicon: HALOT
  rationale: ישב commonly means 'sit' or 'dwell'; here 'sit' best matches enthronement
    imagery without adding interpretive material.
- source_word: בְּהַר מוֹעֵד
  chosen: on the mount of assembly
  alternatives:
  - on the mountain of assembly
  - on the mount of meeting
  lexicon: HALOT
  rationale: מוֹעֵד here most likely denotes an appointed assembly rather than the
    tabernacle's 'tent of meeting.' 'Mount of assembly' preserves the likely mythic/cosmic
    setting while remaining transparent.
- source_word: בְּיַרְכְּתֵי צָפוֹן
  chosen: in the far reaches of the north
  alternatives:
  - in the remotest parts of the north
  - on the heights of Zaphon
  - in the recesses of the north
  lexicon: HALOT
  rationale: יַרְכְּתֵי denotes remote extremities or recesses. 'Far reaches of the
    north' is idiomatic and preserves the geographic/cosmic imagery. Because צָפוֹן
    may be read either as the direction 'north' or as an allusion to Mount Zaphon,
    the directional sense is kept in the main text and the possible proper-name allusion
    is preserved in a footnote.
