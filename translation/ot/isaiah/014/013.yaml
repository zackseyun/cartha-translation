theological_decisions:
- issue: Possible mythic allusion in צָפוֹן
  chosen_reading: Translate צָפוֹן as 'the north' in the main text.
  alternative_readings:
  - Translate as the proper name 'Zaphon'
  rationale: The Hebrew form ordinarily means 'north,' and that sense is immediately
    intelligible. However, in this taunt against the king of Babylon, the phrase may
    allude to the cosmic mountain known from ancient Near Eastern tradition as Zaphon.
    To preserve theological and literary tension without over-interpreting, the main
    text keeps the common lexical sense and the possible allusion is noted in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Interpretation of 'stars of God'
  chosen_reading: Retain the literal phrase 'stars of God' without specifying angels
    or rulers.
  alternative_readings:
  - heavenly beings
  - the stars
  rationale: The phrase may evoke literal stars, heavenly beings, or exalted celestial
    powers. The translation preserves the Hebrew image rather than resolving the symbolism
    in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
