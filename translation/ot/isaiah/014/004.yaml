theological_decisions:
- issue: Interpretation of the rare term מַדְהֵבָה
  chosen_reading: the golden city
  alternative_readings:
  - the onslaught
  - the place/act of oppression
  - the exacting tyranny
  rationale: This is primarily a lexical-textual issue rather than a doctrinal one,
    but it affects how the taunt is understood. The verse does not present a theological
    controversy requiring doctrinal resolution. The chosen reading follows longstanding
    translation tradition, while alternatives favored by many modern scholars are
    preserved in a footnote because the Hebrew term is rare and uncertain.
