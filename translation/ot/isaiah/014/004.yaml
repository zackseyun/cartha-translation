id: ISA.14.4
reference: Isaiah 14:4
source:
  edition: WLC
  text: וְ/נָשָׂ֜אתָ הַ/מָּשָׁ֥ל הַ/זֶּ֛ה עַל מֶ֥לֶךְ בָּבֶ֖ל וְ/אָמָ֑רְתָּ אֵ֚יךְ
    שָׁבַ֣ת נֹגֵ֔שׂ שָׁבְתָ֖ה מַדְהֵבָֽה־׃
translation:
  text: 'you will take up this taunt against the king of Babylon, and say: “How the
    oppressor has ceased, the golden city has ceased!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “How the oppressor has ceased, how the onslaught/exacting tyranny
      has ceased!” The Hebrew word translated “golden city” (מַדְהֵבָה) is rare and
      uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשָׂאתָ
  chosen: you will take up
  alternatives:
  - you will lift up
  - you will raise
  lexicon: HALOT
  rationale: נשא with משל idiomatically means to take up or utter a proverb/taunt.
    'Take up' preserves the Hebrew idiom while remaining natural English.
- source_word: הַמָּשָׁל הַזֶּה
  chosen: this taunt
  alternatives:
  - this proverb
  - this oracle
  - this song of mockery
  lexicon: HALOT
  rationale: מָשָׁל can mean proverb, parable, byword, or taunt-song depending on
    context. Here the following mockery of Babylon's king is derisive, so 'taunt'
    best fits the discourse function.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - over
  lexicon: HALOT
  rationale: With a hostile saying directed at the king of Babylon, 'against' captures
    the adversative force better than the more neutral 'concerning'.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct phrase; standard rendering retained.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and you will say
  lexicon: HALOT
  rationale: English can omit the repeated subject pronoun naturally; the imperative-like
    future sense in context is preserved.
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How indeed
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory lament/taunt. 'How' is the most direct and
    idiomatic English equivalent.
- source_word: שָׁבַת
  chosen: has ceased
  alternatives:
  - has come to an end
  - has stopped
  lexicon: HALOT
  rationale: The verb שבת denotes ceasing or stopping. 'Has ceased' is concise and
    preserves the rhetorical repetition with the following feminine form.
- source_word: נֹגֵשׂ
  chosen: the oppressor
  alternatives:
  - the taskmaster
  - the exactor
  lexicon: HALOT
  rationale: נגשׂ in this nominal form refers to one who drives, exacts, or oppresses.
    'Oppressor' best fits the political tyranny in context and is more accessible
    than 'exactor'.
- source_word: שָׁבְתָה
  chosen: has ceased
  alternatives:
  - has come to an end
  - has stopped
  lexicon: HALOT
  rationale: Repeats the same root as the previous clause; keeping 'has ceased' preserves
    the Hebrew parallelism.
- source_word: מַדְהֵבָה
  chosen: the golden city
  alternatives:
  - the insolence
  - the onslaught
  - the exacting tyranny
  lexicon: HALOT
  rationale: This rare word is difficult and has been understood in multiple ways.
    The traditional rendering 'golden city' likely reflects an ancient interpretive
    tradition, while many modern lexicons connect it with oppression/exaction. Because
    the form is genuinely uncertain, the main text preserves the familiar reading,
    and the lexical alternative is preserved in a footnote for transparency.
