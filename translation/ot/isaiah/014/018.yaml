id: ISA.14.18
reference: Isaiah 14:18
source:
  edition: WLC
  text: כָּל מַלְכֵ֥י גוֹיִ֖ם כֻּלָּ֑/ם שָׁכְב֥וּ בְ/כָב֖וֹד אִ֥ישׁ בְּ/בֵיתֽ/וֹ־׃
translation:
  text: All the kings of the nations, all of them, lie in glory, each in his own house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with honor.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in his house'; in context this may refer to his tomb or burial
      chamber.
    reason: cultural_note
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Introduces the totality of the group. 'All' is the most natural English
    rendering in this collective construction.
- source_word: מַלְכֵי גוֹיִם
  chosen: the kings of the nations
  alternatives:
  - the kings of the peoples
  - all the foreign kings
  lexicon: HALOT
  rationale: Construct chain meaning 'kings of nations.' 'Nations' is the standard
    rendering of גוֹיִם here and fits the taunt context contrasting many rulers with
    the fallen king.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - every one of them
  lexicon: HALOT
  rationale: The resumptive pronoun adds emphasis after 'all the kings of the nations.'
    Rendering it explicitly preserves the Hebrew intensification rather than smoothing
    it away.
- source_word: שָׁכְבוּ
  chosen: lie
  alternatives:
  - have lain
  - rest
  - sleep
  lexicon: HALOT
  rationale: In funerary context the verb means to lie down in death or burial. Present-tense
    'lie' works idiomatically in English for a general state, matching the contrast
    with the dishonored king in the surrounding context. 'Rest' is interpretive; 'sleep'
    could over-specify metaphor.
- source_word: בְּכָבוֹד
  chosen: in glory
  alternatives:
  - in honor
  - with honor
  lexicon: HALOT
  rationale: כָּבוֹד here refers to honorable burial status. 'In glory' is a fairly
    literal rendering, while still conveying dignity; the more interpretive 'with
    honor' is preserved as an alternative.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - a man
  - every man
  lexicon: HALOT
  rationale: Although literally 'man,' in distributive construction with the following
    phrase it functions idiomatically as 'each.' This preserves the sense without
    forcing awkward English. This is consistent with the gender-accurate principle
    because the referents are specifically kings, i.e., male rulers.
- source_word: בְּבֵיתוֹ
  chosen: in his own house
  alternatives:
  - in his house
  - in his tomb
  lexicon: HALOT
  rationale: Literally 'in his house.' In context this likely refers to a royal burial
    place/mausoleum, but the Hebrew says 'house,' so the main text keeps the literal
    image. 'In his tomb' is a contextual interpretation worth preserving as an alternative.
