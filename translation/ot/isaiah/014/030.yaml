theological_decisions:
- issue: Ambiguous subject of the final singular verb
  chosen_reading: Retain an unspecified masculine singular subject as 'he'
  alternative_readings:
  - 'make famine the subject: ''it will slay your remnant'''
  - 'understand God as the implied subject: ''I will slay your remnant'''
  rationale: The Hebrew shifts from first person ('I will kill your root') to third
    masculine singular ('he will slay your remnant'). Rather than smoothing the shift,
    the translation preserves the textual tension and ambiguity, in keeping with the
    project's principle of not resolving genuine ambiguity beyond what the source
    warrants.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
