id: ISA.14.30
reference: Isaiah 14:30
source:
  edition: WLC
  text: וְ/רָעוּ֙ בְּכוֹרֵ֣י דַלִּ֔ים וְ/אֶבְיוֹנִ֖ים לָ/בֶ֣טַח יִרְבָּ֑צוּ וְ/הֵמַתִּ֤י
    בָֽ/רָעָב֙ שָׁרְשֵׁ֔/ךְ וּ/שְׁאֵרִיתֵ֖/ךְ יַהֲרֹֽג׃
translation:
  text: The firstborn of the poor will graze, and the needy will lie down in safety;
    but I will kill your root with famine, and he will slay your remnant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poorest of the poor.' The Hebrew literally reads 'the firstborn
      of the poor,' which may function idiomatically as an intensification.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew has 'he will slay your remnant.' The subject may be left indefinite,
      or understood as famine/personified judgment, rather than being made explicit
      in translation.
    reason: alternative_reading
lexical_decisions:
- source_word: וְרָעוּ
  chosen: will graze
  alternatives:
  - will feed
  - will pasture
  lexicon: HALOT
  rationale: From רעה in the Qal, here most naturally 'graze/feed' of animals. Because
    the subject is metaphorical ('the firstborn of the poor'), English 'will graze'
    preserves the pastoral image better than the more abstract 'will feed.'
- source_word: בְּכוֹרֵי דַלִּים
  chosen: the firstborn of the poor
  alternatives:
  - the poorest of the poor
  - the firstborn sons of the poor
  lexicon: HALOT
  rationale: בכור literally means 'firstborn.' Some take the phrase idiomatically
    as a superlative ('the poorest'), but the literal rendering is preferable in the
    main text because the Hebrew wording supports it directly and the metaphor can
    stand in context. The idiomatic alternative is preserved in a footnote.
- source_word: דַלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: דל commonly denotes the poor or weak. 'The poor' is the most straightforward
    and idiomatic rendering here.
- source_word: וְאֶבְיוֹנִים
  chosen: and the needy
  alternatives:
  - and the poor
  lexicon: HALOT
  rationale: אביון overlaps with 'poor' but often emphasizes neediness or destitution.
    Rendering it as 'the needy' preserves the distinction from דלים.
- source_word: לָבֶטַח
  chosen: in safety
  alternatives:
  - securely
  - in security
  lexicon: HALOT
  rationale: לבטח expresses security/safety. 'In safety' fits natural English with
    'lie down' and preserves the sense of secure repose.
- source_word: יִרְבָּצוּ
  chosen: will lie down
  alternatives:
  - will rest
  - will stretch out
  lexicon: HALOT
  rationale: רבץ is commonly used of animals lying down. 'Will lie down' keeps the
    pastoral imagery established by 'will graze.'
- source_word: וְהֵמַתִּי
  chosen: I will kill
  alternatives:
  - I will cause to die
  - I will put to death
  lexicon: HALOT
  rationale: Hiphil of מות means 'cause to die/put to death.' 'I will kill' is concise,
    direct, and natural in English.
- source_word: בָרָעָב
  chosen: with famine
  alternatives:
  - by famine
  - through famine
  lexicon: HALOT
  rationale: The beth marks means/instrument. 'With famine' is idiomatic and clearly
    expresses the instrument of judgment.
- source_word: שָׁרְשֵׁךְ
  chosen: your root
  alternatives:
  - your stock
  - your descendants at the root
  lexicon: HALOT
  rationale: שורש is literally 'root.' In this judgment oracle it metaphorically denotes
    the source or foundation of the addressed nation. The literal metaphor should
    be preserved.
- source_word: וּשְׁאֵרִיתֵךְ
  chosen: your remnant
  alternatives:
  - your survivors
  - what is left of you
  lexicon: HALOT
  rationale: שארית means 'remnant, remainder, survivors.' 'Your remnant' preserves
    the lexical connection to prophetic remnant language while fitting the context
    of what remains after judgment.
- source_word: יַהֲרֹג
  chosen: he will slay
  alternatives:
  - it will slay
  - one will slay
  lexicon: HALOT
  rationale: The 3ms verb has an ambiguous subject in English. Retaining 'he' reflects
    the Hebrew masculine singular form most closely without overresolving whether
    the subject is famine, the LORD, or an implied agent. The ambiguity is preserved
    in a footnote.
