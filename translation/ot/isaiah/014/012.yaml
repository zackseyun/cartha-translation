id: ISA.14.12
reference: Isaiah 14:12
source:
  edition: WLC
  text: אֵ֛יךְ נָפַ֥לְתָּ מִ/שָּׁמַ֖יִם הֵילֵ֣ל בֶּן שָׁ֑חַר נִגְדַּ֣עְתָּ לָ/אָ֔רֶץ
    חוֹלֵ֖שׁ עַל גּוֹיִֽם־־׃
translation:
  text: How you have fallen from heaven, shining one, son of dawn! You have been cut
    down to the earth, you who laid low the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew הֵילֵל is traditionally rendered 'Lucifer' in some older translations;
      it more literally denotes a shining celestial figure, often understood as 'day
      star' or 'morning star.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How indeed
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory lament/question of astonishment. 'How' preserves
    the rhetorical force without adding interpretive material such as 'alas'.
- source_word: נָפַ֥לְתָּ
  chosen: you have fallen
  alternatives:
  - you fell
  lexicon: HALOT
  rationale: 'The perfect form in this taunt is naturally rendered with English present
    perfect for vividness in context: a completed downfall viewed with present force.'
- source_word: מִשָּׁמַיִם
  chosen: from heaven
  alternatives:
  - from the heavens
  - from the sky
  lexicon: HALOT
  rationale: '''Heaven'' fits the singular idiomatic English rendering and preserves
    the elevated poetic register better than ''sky.'''
- source_word: הֵילֵל
  chosen: shining one
  alternatives:
  - day star
  - morning star
  - bright one
  - Lucifer
  lexicon: HALOT
  rationale: The noun likely denotes a shining celestial figure, probably the morning
    star. 'Shining one' preserves the lexical sense without importing the later Latin
    traditional rendering 'Lucifer' as if it were a proper name. A more specific astronomical
    interpretation is preserved in a footnote.
- source_word: בֶּן־שָׁחַר
  chosen: son of dawn
  alternatives:
  - son of the dawn
  - child of dawn
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew poetic imagery and parallelism
    with the celestial language of the line.
- source_word: נִגְדַּעְתָּ
  chosen: you have been cut down
  alternatives:
  - you are cut down
  - you have been hewn down
  lexicon: HALOT
  rationale: The Niphal conveys passive/resultative force. 'Cut down' is idiomatic
    and matches the imagery of violent humiliation.
- source_word: לָאָרֶץ
  chosen: to the earth
  alternatives:
  - to the ground
  lexicon: HALOT
  rationale: '''Earth'' best preserves the heaven/earth contrast in the verse.'
- source_word: חוֹלֵשׁ
  chosen: you who laid low
  alternatives:
  - you who weakened
  - you who subdued
  - the one overpowering
  lexicon: HALOT
  rationale: The participle describes the figure's characteristic action toward nations.
    'Laid low' captures the causative sense in natural English and fits the taunt
    context better than the more wooden 'weakened.'
- source_word: עַל־גּוֹיִם
  chosen: the nations
  alternatives:
  - over nations
  - against nations
  - the peoples
  lexicon: HALOT
  rationale: With חוֹלֵשׁ, the phrase denotes action directed toward the nations.
    'The nations' is the standard rendering of גוים and suits the broader political
    scope.
