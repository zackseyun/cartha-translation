theological_decisions:
- issue: Whether הֵילֵל should be rendered as the traditional proper name 'Lucifer'
  chosen_reading: Render descriptively as 'shining one' in the main text
  alternative_readings:
  - Lucifer
  - day star
  - morning star
  rationale: The Hebrew term is a common noun/poetic designation, not clearly a personal
    proper name in the source text. Following original-language primacy, the main
    text should reflect the Hebrew imagery rather than later translation tradition.
    Because 'Lucifer' is historically influential and 'morning star/day star' are
    plausible lexical interpretations, these are preserved in a footnote rather than
    elevated into the main text.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition); §3 (Preserve theological tension rather than resolve it)
