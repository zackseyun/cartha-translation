theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Personification of Zion in the pronominal suffix
  chosen_reading: in her
  alternative_readings:
  - in it
  rationale: The feminine suffix naturally aligns with Zion as a personified city.
    Preserving 'her' retains the literary-theological imagery without adding doctrinal
    content.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
