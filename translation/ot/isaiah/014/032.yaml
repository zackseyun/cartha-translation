id: ISA.14.32
reference: Isaiah 14:32
source:
  edition: WLC
  text: וּ/מַֽה יַּעֲנֶ֖ה מַלְאֲכֵי ג֑וֹי כִּ֤י יְהוָה֙ יִסַּ֣ד צִיּ֔וֹן וּ/בָ֥/הּ
    יֶחֱס֖וּ עֲנִיֵּ֥י עַמּֽ/וֹ־־׃ס
translation:
  text: And what will one answer the messengers of the nation? That the LORD has founded
    Zion, and in her the afflicted of his people will find refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the envoys/ambassadors of the nation.' The Hebrew term can refer to
      diplomatic messengers.
    reason: lexical_alternative
  - marker: b
    text: Or 'the poor of his people' or 'the humble of his people.' The Hebrew can
      denote economic poverty, affliction, or lowliness/humility depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַה
  chosen: And what
  alternatives:
  - What
  - And how
  lexicon: HALOT
  rationale: Introduces the content of the expected reply with a conjunctive waw plus
    interrogative; 'And what' preserves the discourse connection from the prior context.
- source_word: יַעֲנֶה
  chosen: will one answer
  alternatives:
  - will he answer
  - shall be answered
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms of ענה here functions generically/indefinitely: ''what
    will one answer?'' This avoids forcing a specific subject not present in the Hebrew
    while yielding natural English.'
- source_word: מַלְאֲכֵי גוֹי
  chosen: the messengers of the nation
  alternatives:
  - the envoys of the nation
  - the ambassadors of the nation
  - the messengers of a nation
  lexicon: HALOT
  rationale: מלאכי can denote diplomatic messengers/envoys in context. 'Messengers'
    is broad and transparent; 'of the nation' reflects the singular גוי, likely referring
    to the foreign nation just addressed, without over-specifying 'ambassadors.'
- source_word: כִּי
  chosen: That
  alternatives:
  - For
  - Because
  lexicon: HALOT
  rationale: Introduces the substance of the answer rather than a causal clause in
    English. 'That' best captures the content of the reply.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: יִסַּד
  chosen: has founded
  alternatives:
  - has established
  - founded
  - laid the foundation of
  lexicon: HALOT
  rationale: The verb יסד denotes founding/establishing, often with architectural
    nuance. Present perfect in English fits the prophetic assertion of an accomplished
    divine act with ongoing significance.
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Tsion
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וּבָהּ
  chosen: and in her
  alternatives:
  - and in it
  - and within her
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, referring to Zion. 'Her'
    preserves the personified-city imagery common in prophetic literature.
- source_word: יֶחֱסוּ
  chosen: will find refuge
  alternatives:
  - will take refuge
  - will seek refuge
  lexicon: HALOT
  rationale: חסה means to seek/take refuge. 'Will find refuge' reads naturally in
    English and fits the resultative sense in context, while still conveying dependence
    on Zion as the place of safety.
- source_word: עֲנִיֵּי עַמּוֹ
  chosen: the afflicted of his people
  alternatives:
  - the poor of his people
  - the humble of his people
  - the needy of his people
  lexicon: HALOT
  rationale: עניים can denote the poor, afflicted, or humble depending on context.
    Here 'afflicted' best captures the vulnerable, oppressed condition of the LORD's
    people in need of refuge, without reducing the term to merely economic poverty.
