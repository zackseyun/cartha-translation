id: ISA.14.10
reference: Isaiah 14:10
source:
  edition: WLC
  text: כֻּלָּ֣/ם יַֽעֲנ֔וּ וְ/יֹאמְר֖וּ אֵלֶ֑י/ךָ גַּם אַתָּ֛ה חֻלֵּ֥יתָ כָמ֖וֹ/נוּ
    אֵלֵ֥י/נוּ נִמְשָֽׁלְתָּ־׃
translation:
  text: All of them will answer and say to you, ‘You too have become weak like us;
    you have become like us.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You too have been made weak like us.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'you have been likened to us' / 'you have become equal to us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - They all
  - All
  lexicon: HALOT
  rationale: The noun with 3mp suffix refers collectively to all the shades/kings
    addressed in the surrounding context. 'All of them' is natural English and preserves
    the totalizing force.
- source_word: יַעֲנוּ
  chosen: will answer
  alternatives:
  - will respond
  lexicon: HALOT
  rationale: ענה in this stem commonly means 'answer/respond.' 'Will answer' fits
    the parallel with 'and say' and preserves the formal dialogue flavor.
- source_word: וְיֹאמְרוּ
  chosen: and say
  alternatives:
  - and will say
  lexicon: HALOT
  rationale: Simple coordination with the previous verb. English can omit the repeated
    auxiliary for smoother style while retaining future sense from context.
- source_word: אֵלֶיךָ
  chosen: to you
  lexicon: HALOT
  rationale: Direct prepositional object of speech, straightforwardly rendered.
- source_word: גַּם אַתָּה
  chosen: You too
  alternatives:
  - Even you
  - You also
  lexicon: HALOT
  rationale: Marks the taunting inclusion of the fallen king among the dead. 'You
    too' is concise and idiomatic.
- source_word: חֻלֵּיתָ
  chosen: have become weak
  alternatives:
  - have been made weak
  - have become sick
  - are weakened
  lexicon: HALOT
  rationale: From חלה in the Pual, the sense here is being weakened/enfeebled, not
    specifically illness. In context of descent to Sheol, the mockers emphasize loss
    of strength. Present perfect in English captures the resultant state.
- source_word: כָמוֹנוּ
  chosen: like us
  alternatives:
  - as we are
  lexicon: HALOT
  rationale: Standard comparative phrase; concise rendering best fits the taunt.
- source_word: אֵלֵינוּ נִמְשָׁלְתָּ
  chosen: you have become like us
  alternatives:
  - you are likened to us
  - you have been made comparable to us
  - you have become equal to us
  lexicon: HALOT
  rationale: נמשל can mean 'be like, be compared with, resemble.' In this context
    the dead declare that the once-exalted ruler has been reduced to their level.
    'Have become like us' is idiomatic and captures the passive/reflexive result without
    awkwardness. Because this overlaps semantically with the previous clause, the
    repetition is preserved rather than collapsed.
