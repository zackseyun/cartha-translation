theological_decisions:
- issue: Nature of the taunt in Sheol
  chosen_reading: Render the speech as mockery about the king's loss of power and
    reduction to the common state of the dead, without importing later doctrinal claims
    about the afterlife.
  alternative_readings:
  - A more mythological reading emphasizing personified shades
  - A more literalistic reading that over-specifies conscious intermediate-state doctrine
  rationale: The verse depicts the dead speaking in poetic taunt. The translation
    should preserve the imagery and force of humiliation without using the verse to
    settle broader theological debates not explicit in the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
