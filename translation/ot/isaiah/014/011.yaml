theological_decisions:
- issue: Rendering שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: The verse depicts descent to the underworld of the dead. Translating
    as 'Sheol' avoids collapsing the Hebrew concept into either a purely physical
    grave or later developed notions of hell. This preserves the text's imagery without
    importing doctrinal claims it does not make.
  doctrine_reference: Translation philosophy §1, §3
