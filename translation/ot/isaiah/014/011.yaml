id: ISA.14.11
reference: Isaiah 14:11
source:
  edition: WLC
  text: הוּרַ֥ד שְׁא֛וֹל גְּאוֹנֶ֖/ךָ הֶמְיַ֣ת נְבָלֶ֑י/ךָ תַּחְתֶּ֨י/ךָ֙ יֻצַּ֣ע
    רִמָּ֔ה וּ/מְכַסֶּ֖י/ךָ תּוֹלֵעָֽה׃
translation:
  text: Your pride has been brought down to Sheol, the sound of your harps; maggots
    are spread out beneath you, and worms are your covering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your majesty' or 'your pomp' for 'your pride.' The Hebrew term can denote
      exalted splendor as well as arrogant pride.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the realm of the dead; alternatively, 'the grave' or 'the realm
      of the dead.'
    reason: lexical_alternative
  - marker: c
    text: Or 'lyres' or more generally 'stringed instruments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּרַד
  chosen: has been brought down
  alternatives:
  - is brought down
  - was brought down
  lexicon: HALOT
  rationale: Hophal of ירד expresses passive/causative descent. English perfect fits
    the taunt's vivid declaration of a completed humiliation.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Retained as 'Sheol' to preserve the Hebrew concept rather than flattening
    it to merely 'grave' or importing later doctrinal associations of 'hell.'
- source_word: גְּאוֹנֶךָ
  chosen: your pride
  alternatives:
  - your majesty
  - your pomp
  lexicon: HALOT
  rationale: גאון can denote exaltation, majesty, or pride. In this judgment context,
    'pride' best captures the moral dimension of the downfall, though regal splendor
    is also in view.
- source_word: הֶמְיַת
  chosen: the sound of
  alternatives:
  - the noise of
  - the roar of
  lexicon: HALOT
  rationale: The noun denotes sound/noise. 'The sound of' is natural English and suits
    the musical context.
- source_word: נְבָלֶיךָ
  chosen: your harps
  alternatives:
  - your stringed instruments
  - your lyres
  lexicon: HALOT
  rationale: נבל commonly refers to a harp/lyre-like stringed instrument. 'Harps'
    is idiomatic and traditional, while remaining understandable.
- source_word: תַּחְתֶּיךָ
  chosen: beneath you
  alternatives:
  - under you
  lexicon: HALOT
  rationale: Spatial term rendered idiomatically in English.
- source_word: יֻצַּע
  chosen: are spread out
  alternatives:
  - is spread
  - is laid out
  lexicon: HALOT
  rationale: Passive of יצע, used of spreading or laying out like a bed. Plural English
    verb agrees with the collective sense of the following noun in translation.
- source_word: רִמָּה
  chosen: maggots
  alternatives:
  - worms
  - maggot-worms
  lexicon: HALOT
  rationale: Refers specifically to maggots/decay-creatures associated with corpses.
    'Maggots' preserves the grotesque force of the image.
- source_word: וּמְכַסֶּיךָ
  chosen: and worms are your covering
  alternatives:
  - and your cover is worms
  - and what covers you is worms
  lexicon: HALOT
  rationale: The construct with suffix means 'your covering/cover.' English is smoothed
    by making the predicate explicit.
- source_word: תּוֹלֵעָה
  chosen: worms
  alternatives:
  - grubs
  - maggots
  lexicon: HALOT
  rationale: A worm associated with decay; 'worms' provides a natural contrast with
    'maggots' for רמה while preserving the parallelism.
