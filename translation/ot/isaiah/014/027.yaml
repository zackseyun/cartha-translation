id: ISA.14.27
reference: Isaiah 14:27
source:
  edition: WLC
  text: כִּֽי יְהוָ֧ה צְבָא֛וֹת יָעָ֖ץ וּ/מִ֣י יָפֵ֑ר וְ/יָד֥/וֹ הַ/נְּטוּיָ֖ה וּֽ/מִ֥י יְשִׁיבֶֽ/נָּה־׃פ
translation:
  text: For Yahweh of hosts has purposed, and who can annul it? His hand is stretched out, and who can turn it back?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who can thwart it?' The Hebrew verb can mean to break, nullify, or frustrate a plan.
    reason: lexical_alternative
  - marker: b
    text: Or 'His hand is outstretched.' The image commonly conveys active power, often in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding declaration. 'For' fits the argumentative flow and is idiomatic in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and semantically broad rendering, encompassing heavenly and earthly armies. 'Of armies' is possible but narrower.
- source_word: יָעָץ
  chosen: has purposed
  alternatives:
  - has planned
  - has counseled
  - has determined
  lexicon: HALOT
  rationale: The verb denotes forming a plan or purpose. 'Has purposed' preserves the deliberative force and pairs naturally with the following challenge about annulling that purpose.
- source_word: יָפֵר
  chosen: can annul it
  alternatives:
  - can thwart it
  - can break it
  - can frustrate it
  lexicon: HALOT
  rationale: The Hiphil of פרר means to break, nullify, or frustrate. 'Annul it' best matches the object implied from the prior clause—God's purpose or plan—without over-paraphrasing.
- source_word: יָדוֹ
  chosen: His hand
  lexicon: HALOT
  rationale: A straightforward rendering of the anthropomorphic expression, preserving the Hebrew image of active power.
- source_word: הַנְּטוּיָה
  chosen: is stretched out
  alternatives:
  - is extended
  - is outstretched
  lexicon: HALOT
  rationale: The passive participial form describes the hand as extended in action or judgment. 'Is stretched out' is natural English and preserves the image.
- source_word: יְשִׁיבֶנָּה
  chosen: can turn it back
  alternatives:
  - can turn it away
  - can reverse it
  - can make it return
  lexicon: HALOT
  rationale: The Hiphil of שוב with the feminine suffix refers back to the stretched-out hand and asks who can cause it to turn back. 'Turn it back' is the most direct and idiomatic rendering.
