id: ISA.14.9
reference: Isaiah 14:9
source:
  edition: WLC
  text: שְׁא֗וֹל מִ/תַּ֛חַת רָגְזָ֥ה לְ/ךָ֖ לִ/קְרַ֣את בּוֹאֶ֑/ךָ עוֹרֵ֨ר לְ/ךָ֤ רְפָאִים֙
    כָּל עַתּ֣וּדֵי אָ֔רֶץ הֵקִים֙ מִ/כִּסְאוֹתָ֔/ם כֹּ֖ל מַלְכֵ֥י גוֹיִֽם־׃
translation:
  text: Sheol beneath is stirred up for you, to meet your coming; it rouses the shades
    for you, all the leaders of the earth; it raises from their thrones all the kings
    of the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the dead'' or ''departed spirits'' for ''the shades'' (Hebrew: Rephaim).'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the male goats of the earth,' a metaphor for prominent rulers
      or leaders.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  - hell
  lexicon: HALOT
  rationale: Rendered by transliteration as 'Sheol' to preserve the Hebrew concept
    of the underworld/realm of the dead without importing later doctrinal associations
    of 'hell' or flattening it to merely 'grave'.
- source_word: מִתַּחַת
  chosen: beneath
  alternatives:
  - from below
  - underneath
  lexicon: HALOT
  rationale: The phrase modifies Sheol spatially; 'beneath' gives natural English
    while preserving the downward imagery.
- source_word: רָגְזָה
  chosen: is stirred up
  alternatives:
  - trembles
  - quakes
  - is agitated
  lexicon: HALOT
  rationale: The verb conveys agitation or trembling. 'Is stirred up' fits the personified
    picture of Sheol becoming active at the tyrant's arrival and reads idiomatically
    in English.
- source_word: לִקְרַאת בּוֹאֶךָ
  chosen: to meet your coming
  alternatives:
  - to meet you when you come
  - at your arrival
  lexicon: HALOT
  rationale: Keeps the infinitive construction and the vivid sense of Sheol preparing
    to receive the arriving king. 'Your coming' is slightly more formal and mirrors
    the Hebrew nominal feel.
- source_word: עוֹרֵר
  chosen: it rouses
  alternatives:
  - it awakens
  - it stirs up
  lexicon: HALOT
  rationale: The participial/finite verbal sense here depicts Sheol causing its inhabitants
    to rise in response. 'Rouses' is vivid and fits the mock-dramatic scene.
- source_word: רְפָאִים
  chosen: the shades
  alternatives:
  - the dead
  - departed spirits
  - Rephaim
  lexicon: HALOT
  rationale: In this context the term refers to the dead in Sheol, not the ethnic
    Rephaim. 'The shades' preserves the poetic, underworld sense better than the flatter
    'the dead.'
- source_word: עַתּוּדֵי אָרֶץ
  chosen: the leaders of the earth
  alternatives:
  - the goats of the earth
  - the chief ones of the earth
  - the he-goats of the earth
  lexicon: HALOT
  rationale: Literally 'male goats of the earth,' a metaphor for prominent rulers.
    'Leaders' communicates the metaphor's sense in clear English; the literal image
    is worth preserving in a footnote.
- source_word: הֵקִים
  chosen: it raises
  alternatives:
  - it makes rise
  - it sets up
  lexicon: HALOT
  rationale: The hiphil indicates causing to rise. 'It raises' is concise and suits
    the image of enthroned kings standing up to greet the newcomer.
- source_word: מִכִּסְאוֹתָם
  chosen: from their thrones
  alternatives:
  - out of their seats
  lexicon: HALOT
  rationale: '''Thrones'' is the natural rendering for royal seats and matches the
    following reference to kings.'
- source_word: כֹּל מַלְכֵי גוֹיִם
  chosen: all the kings of the nations
  alternatives:
  - all the kings of the peoples
  - every king of the nations
  lexicon: HALOT
  rationale: A straightforward rendering preserving the universal scope and political
    imagery of the taunt.
