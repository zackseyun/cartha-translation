theological_decisions:
- issue: Rendering שְׁאוֹל in a poetic taunt about the dead
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - hell
  - the realm of the dead
  rationale: The verse personifies the underworld as receiving the fallen king. Transliteration
    best preserves the Hebrew worldview and avoids importing later, more developed
    notions associated with 'hell.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
