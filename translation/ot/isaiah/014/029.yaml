id: ISA.14.29
reference: Isaiah 14:29
source:
  edition: WLC
  text: אַֽל תִּשְׂמְחִ֤י פְלֶ֨שֶׁת֙ כֻּלֵּ֔/ךְ כִּ֥י נִשְׁבַּ֖ר שֵׁ֣בֶט מַכֵּ֑/ךְ
    כִּֽי מִ/שֹּׁ֤רֶשׁ נָחָשׁ֙ יֵ֣צֵא צֶ֔פַע וּ/פִרְי֖/וֹ שָׂרָ֥ף מְעוֹפֵֽף־־׃
translation:
  text: Do not rejoice, all of you Philistia, because the rod that struck you is broken;
    for from the root of the serpent will come out a viper, and its fruit will be
    a flying fiery serpent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whole Philistia.' The Hebrew addresses Philistia as a feminine singular
      collective.
    reason: lexical_alternative
  - marker: b
    text: Or 'its offspring will be a fiery flying serpent.' Hebrew 'fruit' is kept
      in the main text to preserve the metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְלֶשֶׁת כֻּלֵּךְ
  chosen: all of you Philistia
  alternatives:
  - all Philistia
  - whole Philistia
  lexicon: HALOT
  rationale: פְלֶשֶׁת is the proper name Philistia; כֻּלֵּךְ is 2fs 'all of you/your
    whole'. Because the address is to the land/personified nation in feminine singular,
    'all of you Philistia' preserves both the direct address and collective force
    better than a flatter 'whole Philistia'.
- source_word: שֵׁבֶט מַכֵּךְ
  chosen: the rod that struck you
  alternatives:
  - the scepter of your striker
  - the staff of the one who struck you
  lexicon: HALOT
  rationale: שֵׁבֶט can mean rod, staff, or scepter. In context of hostile oppression,
    'rod' best conveys an instrument of striking/judgment. מַכֵּךְ is best taken as
    a participial form with 2fs suffix, 'the one striking you / that struck you.'
    English smooths this to 'the rod that struck you'.
- source_word: נִשְׁבַּר
  chosen: is broken
  alternatives:
  - has been broken
  lexicon: HALOT
  rationale: The Niphal perfect denotes a completed breaking with present relevance.
    'Is broken' is idiomatic English in prophetic discourse and keeps the focus on
    the current state.
- source_word: מִשֹּׁרֶשׁ נָחָשׁ
  chosen: from the root of the serpent
  alternatives:
  - from the serpent's root
  lexicon: HALOT
  rationale: The construct phrase is rendered transparently. 'Root' is likely metaphorical
    for source/lineage, but the image should be preserved rather than interpreted
    away.
- source_word: צֶפַע
  chosen: a viper
  alternatives:
  - an adder
  - a venomous snake
  lexicon: HALOT
  rationale: The term denotes a poisonous snake. 'Viper' is a natural modern English
    equivalent that preserves the danger and specificity better than the archaic 'adder'.
- source_word: וּפִרְיוֹ
  chosen: and its fruit
  alternatives:
  - and its offspring
  - and what it produces
  lexicon: HALOT
  rationale: The literal noun is 'fruit.' In this metaphorical lineage image it can
    imply offspring or product, but the main text preserves the Hebrew metaphor with
    'fruit' rather than resolving it interpretively.
- source_word: שָׂרָף מְעוֹפֵף
  chosen: a flying fiery serpent
  alternatives:
  - a flying serpent
  - a fiery flying serpent
  lexicon: HALOT
  rationale: שָׂרָף literally refers to a burning/fiery serpent, likely a venomous
    snake; מְעוֹפֵף means flying. The order 'flying fiery serpent' reads naturally
    in English while preserving both elements. Because the phrase is unusual and potentially
    symbolic, the vivid imagery should remain intact.
- source_word: כִּי
  chosen: because / for
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: The first כִּי introduces the reason for the prohibition ('because');
    the second introduces further explanation ('for'). English uses two slightly different
    connectors to reflect the discourse flow naturally.
