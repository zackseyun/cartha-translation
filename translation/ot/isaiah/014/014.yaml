id: ISA.14.14
reference: Isaiah 14:14
source:
  edition: WLC
  text: אֶעֱלֶ֖ה עַל בָּ֣מֳתֵי עָ֑ב אֶדַּמֶּ֖ה לְ/עֶלְיֽוֹן־׃
translation:
  text: I will ascend above the heights of the clouds; I will make myself like the
    Most High.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will be like the Most High.' The Hebrew verb can be rendered more
      simply, but 'make myself like' brings out the reflexive nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעֱלֶה
  chosen: I will ascend
  alternatives:
  - I will go up
  - I will rise
  lexicon: HALOT
  rationale: Qal imperfect 1cs of עלה denotes upward movement. 'Ascend' preserves
    the elevated, exaltation-oriented sense better than the more ordinary 'go up.'
- source_word: עַל
  chosen: above
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: With a verb of ascent and the following phrase 'heights of the clouds,'
    the preposition is most naturally rendered 'above,' expressing surpassing elevation
    rather than mere contact.
- source_word: בָּמֳתֵי עָב
  chosen: the heights of the clouds
  alternatives:
  - the high places of the clouds
  - the cloud heights
  lexicon: HALOT
  rationale: בָּמָה literally refers to a height/high place; in construct plural with
    עָב ('cloud, thick cloud'), the idiom points to the highest reaches of the clouds.
    'Heights of the clouds' is natural English while retaining the imagery.
- source_word: אֶדַּמֶּה
  chosen: I will make myself like
  alternatives:
  - I will be like
  - I will liken myself to
  lexicon: HALOT
  rationale: Hitpael/imperfect 1cs of דמה here conveys making oneself comparable to
    or becoming like. 'Make myself like' preserves the reflexive nuance more clearly
    than the flatter 'be like.'
- source_word: לְעֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Highest
  - Most High
  lexicon: HALOT
  rationale: עֶלְיוֹן is a divine title meaning 'Most High.' The article in English
    clarifies it as a title for God rather than a mere adjective.
