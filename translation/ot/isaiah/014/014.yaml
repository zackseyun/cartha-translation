theological_decisions:
- issue: Rendering עֶלְיוֹן as a divine title
  chosen_reading: the Most High
  alternative_readings:
  - the Highest
  rationale: The context is a boast of exalting oneself to divine status. Rendering
    the term as the established divine title 'the Most High' preserves the theological
    force without importing later doctrinal claims beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
