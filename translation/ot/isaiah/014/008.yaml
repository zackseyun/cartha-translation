id: ISA.14.8
reference: Isaiah 14:8
source:
  edition: WLC
  text: גַּם בְּרוֹשִׁ֛ים שָׂמְח֥וּ לְ/ךָ֖ אַרְזֵ֣י לְבָנ֑וֹן מֵ/אָ֣ז שָׁכַ֔בְתָּ
    לֹֽא יַעֲלֶ֥ה הַ/כֹּרֵ֖ת עָלֵֽי/נוּ־־׃
translation:
  text: 'Even the cypresses rejoice over you, the cedars of Lebanon: ‘Since you have
    lain down, no woodcutter comes up against us.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'junipers' or 'fir trees'; the exact species denoted by the Hebrew term
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  - Indeed
  lexicon: HALOT
  rationale: Introduces an additional, somewhat emphatic element in the taunt; 'Even'
    captures the sense that not only people but also trees rejoice.
- source_word: בְּרוֹשִׁים
  chosen: cypresses
  alternatives:
  - junipers
  - fir trees
  lexicon: HALOT
  rationale: בְּרוֹשׁ is a conifer term with debated species identification. 'Cypresses'
    is a common modern rendering that fits the Lebanon timber imagery; alternatives
    are preserved in a footnote because the exact botanical referent is uncertain.
- source_word: שָׂמְח֥וּ לְךָ
  chosen: rejoice over you
  alternatives:
  - rejoiced at you
  - are glad because of you
  lexicon: HALOT
  rationale: The verb שמח with ל can express rejoicing over or because of someone.
    'Rejoice over you' fits the taunt context and idiomatic English.
- source_word: אַרְזֵי לְבָנוֹן
  chosen: the cedars of Lebanon
  alternatives:
  - Lebanon's cedars
  lexicon: HALOT
  rationale: A well-established and transparent construct phrase referring to the
    famous cedars associated with Lebanon.
- source_word: מֵאָז
  chosen: Since
  alternatives:
  - From the time that
  - Ever since
  lexicon: HALOT
  rationale: Marks the time from the king's downfall onward. 'Since' is concise and
    natural in English.
- source_word: שָׁכַבְתָּ
  chosen: you have lain down
  alternatives:
  - you lie down
  - you have fallen asleep
  - you are laid low
  lexicon: HALOT
  rationale: Literally 'you have lain down.' In context it is a figurative reference
    to death/downfall, but the translation preserves the metaphor rather than resolving
    it into an interpretive paraphrase.
- source_word: לֹא יַעֲלֶה
  chosen: no ... comes up
  alternatives:
  - does not come up
  - will come up no more
  lexicon: HALOT
  rationale: The imperfect here expresses the resulting ongoing situation after the
    tyrant's fall. 'No ... comes up' gives a vivid present sense in English within
    the quoted speech.
- source_word: הַכֹּרֵת
  chosen: woodcutter
  alternatives:
  - cutter
  - logger
  - feller
  lexicon: HALOT
  rationale: The participle from כרת here refers to one who cuts trees. 'Woodcutter'
    is clear, natural, and contextually precise.
- source_word: עָלֵינוּ
  chosen: against us
  alternatives:
  - upon us
  - over us
  lexicon: HALOT
  rationale: With the tree-cutting imagery, the sense is hostile movement directed
    at the trees. 'Against us' communicates that force more idiomatically than the
    more literal 'upon us'.
