theological_decisions:
- issue: Figurative force of the trees rejoicing
  chosen_reading: The trees are personified within a taunt song against the fallen
    king of Babylon.
  alternative_readings:
  - A purely literal statement about reduced logging activity
  rationale: The immediate literary context is a taunt song full of poetic personification.
    The translation preserves the imagery without flattening it into explanatory prose.
- issue: Meaning of שָׁכַבְתָּ in context
  chosen_reading: Retain the metaphor 'you have lain down' rather than explicitly
    translating 'you died.'
  alternative_readings:
  - you have died
  - you have been brought low
  rationale: This preserves the Hebrew poetic expression and its taunt-like tone while
    allowing readers to infer the death/downfall reference from context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
