id: ISA.14.20
reference: Isaiah 14:20
source:
  edition: WLC
  text: לֹֽא תֵחַ֤ד אִתָּ/ם֙ בִּ/קְבוּרָ֔ה כִּֽי אַרְצְ/ךָ֥ שִׁחַ֖תָּ עַמְּ/ךָ֣ הָרָ֑גְתָּ
    לֹֽא יִקָּרֵ֥א לְ/עוֹלָ֖ם זֶ֥רַע מְרֵעִֽים־־־׃
translation:
  text: You will not be joined with them in burial, because you have destroyed your
    land, you have slain your people. The offspring of evildoers will never be named.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the seed of evildoers' or 'the descendants of the wicked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵחַד אִתָּם בִּקְבוּרָה
  chosen: you will not be joined with them in burial
  alternatives:
  - you will not be united with them in burial
  - you will not join them in burial
  lexicon: HALOT
  rationale: The verb יחד in the Qal here conveys being joined or united. Given the
    passive-like sense in English and the context of denied honorable burial, 'be
    joined with them in burial' is natural and preserves the relational force of אִתָּם
    ('with them').
- source_word: קְבוּרָה
  chosen: burial
  alternatives:
  - grave
  - sepulcher
  lexicon: HALOT
  rationale: '''Burial'' best reflects the abstract noun and avoids over-specifying
    the physical location. The point is exclusion from the honor of burial among kings
    or predecessors.'
- source_word: אַרְצְךָ
  chosen: your land
  alternatives:
  - your country
  - your earth
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the ruler's realm or country. 'Your land' is the
    most direct and idiomatic rendering, preserving the covenantal-political sense
    without unnecessary expansion.
- source_word: שִׁחַתָּ
  chosen: have destroyed
  alternatives:
  - have ruined
  - have corrupted
  lexicon: HALOT
  rationale: The Piel of שׁחת commonly means 'destroy' or 'ruin.' In this judgment
    context, 'have destroyed' best matches the severity and pairs well with the following
    accusation of killing the people.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: 'A straightforward possessive rendering that preserves the irony and
    indictment: the ruler has killed those under his own rule.'
- source_word: הָרָגְתָּ
  chosen: have slain
  alternatives:
  - have killed
  - have murdered
  lexicon: HALOT
  rationale: '''Have slain'' carries the elevated, judicial tone appropriate to prophetic
    taunt poetry. ''Murdered'' would add a legal nuance not explicit in the verb itself.'
- source_word: לֹא יִקָּרֵא לְעוֹלָם
  chosen: will never be named
  alternatives:
  - will not be called forever
  - will never be mentioned
  lexicon: HALOT
  rationale: The Niphal of קרא here means 'be named/called.' 'Will never be named'
    is idiomatic English and preserves the sense of enduring erasure from remembrance
    or honor.
- source_word: זֶרַע מְרֵעִים
  chosen: the offspring of evildoers
  alternatives:
  - the seed of evildoers
  - the descendants of the wicked
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' is natural
    modern English while retaining the collective singular force. מְרֵעִים is best
    rendered 'evildoers,' emphasizing moral corruption rather than merely misfortune.
