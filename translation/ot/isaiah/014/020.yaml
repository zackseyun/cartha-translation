theological_decisions:
- issue: Whether זֶרַע מְרֵעִים refers specifically to the tyrant's own dynasty or
    more generally to the line/class of evildoers
  chosen_reading: Rendered generically as 'the offspring of evildoers' while allowing
    the immediate referent to include the tyrant's line in context.
  alternative_readings:
  - the offspring of this evildoer
  - the descendants of the wicked one
  rationale: The Hebrew expression is grammatically generic/plural ('evildoers'),
    and the translation should not narrow it to a singular referent beyond what the
    text states. In context it naturally includes the condemned ruler's line, but
    the wording preserves the broader moral category.
  doctrine_reference: Preserve theological tension rather than resolve it.
