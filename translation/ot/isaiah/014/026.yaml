id: ISA.14.26
reference: Isaiah 14:26
source:
  edition: WLC
  text: זֹ֛את הָ/עֵצָ֥ה הַ/יְּעוּצָ֖ה עַל כָּל הָ/אָ֑רֶץ וְ/זֹ֛את הַ/יָּ֥ד הַ/נְּטוּיָ֖ה
    עַל כָּל הַ/גּוֹיִֽם־־־־׃
translation:
  text: This is the plan that is planned against all the earth, and this is the hand
    that is stretched out against all the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole land,' if the reference is taken more regionally rather than
      universally.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: The demonstrative introduces and identifies what follows. Rendering with
    the copula in English produces natural syntax while preserving the emphatic deictic
    force.
- source_word: הָעֵצָה
  chosen: the plan
  alternatives:
  - the counsel
  - the purpose
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel, plan, or purpose. In this context of
    divine intention against the earth, 'plan' is clear modern English and fits optimal
    equivalence without losing deliberative force.
- source_word: הַיְעוּצָה
  chosen: that is planned
  alternatives:
  - that is determined
  - that is purposed
  - that is counseled
  lexicon: HALOT
  rationale: The passive participial form from יעץ echoes the noun עֵצָה. 'That is
    planned' preserves the wordplay and the sense of a settled design. 'Determined'
    is possible but slightly interpretive; 'planned' keeps the lexical connection
    tighter.
- source_word: עַל
  chosen: against
  alternatives:
  - over
  - concerning
  lexicon: HALOT
  rationale: In this judgment context, עַל with the object of peoples/land is best
    rendered 'against,' conveying hostile direction rather than mere reference.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' Given the parallel with 'all the nations'
    and the broad scope of the oracle, 'earth' better reflects universal extent. 'All
    the earth' preserves the Hebrew structure.
- source_word: וְזֹאת
  chosen: and this is
  alternatives:
  - and this
  lexicon: HALOT
  rationale: The conjunction links a second parallel declaration. Supplying 'is' is
    required for idiomatic English and maintains the balanced structure.
- source_word: הַיָּד
  chosen: the hand
  alternatives:
  - the power
  lexicon: HALOT
  rationale: '''Hand'' should be retained literally here because it is a common biblical
    metaphor for active power in judgment. Rendering it as ''power'' would flatten
    the imagery.'
- source_word: הַנְּטוּיָה
  chosen: that is stretched out
  alternatives:
  - that is extended
  - that is outstretched
  lexicon: HALOT
  rationale: The passive participle from נטה describes the hand as extended in action.
    'Stretched out' is standard, vivid English and preserves the idiom of divine judgment.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to nations, not specifically Gentiles in
    contrast to Israel. 'Nations' is the most contextually accurate and conventional
    rendering.
