theological_decisions:
- issue: Scope of הָאָרֶץ in a judgment oracle
  chosen_reading: 'universal scope: ''all the earth'''
  alternative_readings:
  - 'regional scope: ''all the land'''
  rationale: The immediate parallel with 'all the nations' favors a worldwide horizon
    rather than a merely local territory. This preserves the text's expansive rhetoric
    without importing later theological claims.
