theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the redemption statement
  chosen_reading: economic metaphor retained without specifying mechanism
  alternative_readings:
  - literal financial redemption
  - purely metaphorical restoration
  rationale: The verse contrasts being 'sold for nothing' with being 'redeemed without money.' The translation preserves the metaphorical-economic language without importing a doctrinal mechanism beyond the text itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
