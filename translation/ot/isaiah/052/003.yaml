id: ISA.52.3
reference: Isaiah 52:3
source:
  edition: WLC
  text: כִּֽי כֹה֙ אָמַ֣ר יְהוָ֔ה חִנָּ֖ם נִמְכַּרְתֶּ֑ם וְ/לֹ֥א בְ/כֶ֖סֶף תִּגָּאֵֽלוּ־׃
translation:
  text: 'For thus says Yahweh: “You were sold for nothing, and you will be redeemed without money.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'not for silver.' The Hebrew word can refer specifically to silver, but here likely means money/payment more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine declaration with an explanatory/assertive force. 'For' fits the discourse flow into the LORD's speech better than a more causal 'because' here.
- source_word: כֹה אָמַר
  chosen: this is what ... says
  alternatives:
  - thus says
  - so says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'This is what ... says' is natural modern English while preserving the formal force of the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference and established English convention.
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - without payment
  - gratuitously
  - for no price
  lexicon: HALOT
  rationale: Conveys the sense that no payment was received in their being sold over. 'For nothing' is idiomatic and preserves the rhetorical contrast with 'without money' in the next clause.
- source_word: נִמְכַּרְתֶּם
  chosen: you were sold
  alternatives:
  - you sold yourselves
  - you were handed over
  lexicon: HALOT
  rationale: 'The Niphal form is best taken as passive here: the people are described as having been sold. ''You sold yourselves'' would overread reflexive nuance not required by the form.'
- source_word: בְכֶסֶף
  chosen: without money
  alternatives:
  - not for silver
  - not with money
  lexicon: HALOT
  rationale: Although כסף can specifically mean 'silver,' in this idiom it naturally denotes money/payment. 'Without money' communicates the economic image clearly in contemporary English.
- source_word: תִּגָּאֵלוּ
  chosen: you will be redeemed
  alternatives:
  - you will be ransomed
  - you will be bought back
  lexicon: HALOT
  rationale: From גאל, the language of redemption by a kinsman-redeemer or covenantal deliverer. 'Redeemed' preserves the theological resonance better than the more commercial 'bought back,' while remaining understandable.
