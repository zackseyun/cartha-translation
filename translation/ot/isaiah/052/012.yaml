id: ISA.52.12
reference: Isaiah 52:12
source:
  edition: WLC
  text: כִּ֣י לֹ֤א בְ/חִפָּזוֹן֙ תֵּצֵ֔אוּ וּ/בִ/מְנוּסָ֖ה לֹ֣א תֵלֵכ֑וּ/ן כִּֽי הֹלֵ֤ךְ
    לִ/פְנֵי/כֶם֙ יְהוָ֔ה וּ/מְאַסִּפְ/כֶ֖ם אֱלֹהֵ֥י יִשְׂרָאֵֽל־׃ס
translation:
  text: For you will not go out in haste, and you will not go in flight; for the LORD
    is going before you, and the God of Israel is your rear guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will not go in fleeing' / 'you will not go as fugitives.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the God of Israel is gathering you up from behind'; that is,
      he protects your rear.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְחִפָּזוֹן
  chosen: in haste
  alternatives:
  - hurriedly
  - in panic
  lexicon: HALOT
  rationale: חִפָּזוֹן denotes hurried movement or haste. 'In haste' is natural English
    and preserves the contrast with the exodus-like departure imagery without overstating
    emotional panic.
- source_word: תֵּצֵאוּ
  chosen: you will go out
  alternatives:
  - you will depart
  lexicon: HALOT
  rationale: From יצא, literally 'go out.' 'Go out' keeps the concrete movement imagery
    and echoes exodus language better than the more interpretive 'depart.'
- source_word: וּבִמְנוּסָה
  chosen: in flight
  alternatives:
  - in fleeing
  - in escape
  lexicon: HALOT
  rationale: מְנוּסָה refers to fleeing or flight. 'In flight' is concise, idiomatic,
    and preserves the contrast with a calm, divinely protected departure.
- source_word: תֵלֵכוּן
  chosen: you will go
  alternatives:
  - you will walk
  - you will proceed
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' Here 'go' fits the parallel with 'go out'
    and reads naturally in English.
- source_word: הֹלֵךְ לִפְנֵיכֶם
  chosen: is going before you
  alternatives:
  - goes before you
  - is walking before you
  lexicon: HALOT
  rationale: The participle plus prepositional phrase expresses ongoing or certain
    action. 'Is going before you' conveys active divine leadership in a vivid present-like
    form.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: וּמְאַסִּפְכֶם
  chosen: is your rear guard
  alternatives:
  - is gathering you up behind
  - is bringing up your rear
  lexicon: HALOT
  rationale: From אסף in a military/processional sense of bringing up the rear or
    gathering from behind. 'Is your rear guard' communicates the protective function
    clearly in modern English, even though it shifts from verbal to nominal expression.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct phrase. 'The God of Israel' preserves covenantal
    identity and balances the preceding 'the LORD.'
