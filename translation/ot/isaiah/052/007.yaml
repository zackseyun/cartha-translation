id: ISA.52.7
reference: Isaiah 52:7
source:
  edition: WLC
  text: מַה נָּאו֨וּ עַל הֶ/הָרִ֜ים רַגְלֵ֣י מְבַשֵּׂ֗ר מַשְׁמִ֧יעַ שָׁל֛וֹם מְבַשֵּׂ֥ר
    ט֖וֹב מַשְׁמִ֣יעַ יְשׁוּעָ֑ה אֹמֵ֥ר לְ/צִיּ֖וֹן מָלַ֥ךְ אֱלֹהָֽיִ/ךְ־־׃
translation:
  text: How beautiful on the mountains are the feet of the one who brings good news,
    who announces peace, who brings good news of good, who announces salvation, who
    says to Zion, “Your God reigns.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Your God has become king” or “Your God is king.” The Hebrew can emphasize
      enthronement or reigning rule.
    reason: alternative_reading
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How very
  - How exceedingly
  lexicon: HALOT
  rationale: Exclamatory particle introducing admiration rather than an interrogative
    'what.' 'How beautiful' is natural English and matches the Hebrew exclamation.
- source_word: נָּאווּ
  chosen: beautiful
  alternatives:
  - lovely
  - pleasant
  - comely
  lexicon: HALOT
  rationale: The verb denotes attractiveness or pleasantness. 'Beautiful' is the most
    idiomatic and established English equivalent here without sounding archaic.
- source_word: עַל הֶהָרִים
  chosen: on the mountains
  alternatives:
  - upon the mountains
  - over the mountains
  - on the hills
  lexicon: HALOT
  rationale: Retains the concrete geographic imagery of the herald approaching over
    elevated terrain. 'Mountains' better matches הָרִים than the softer 'hills.'
- source_word: רַגְלֵי
  chosen: the feet
  alternatives:
  - the footsteps
  lexicon: HALOT
  rationale: A literal rendering preserves the vivid poetic image; the beauty is attributed
    metonymically to the herald's arrival.
- source_word: מְבַשֵּׂר
  chosen: the one who brings good news
  alternatives:
  - the messenger of good news
  - the herald
  - the one who announces good news
  lexicon: HALOT
  rationale: The participle is substantival here. 'The one who brings good news' preserves
    the verbal force and avoids importing a technical office beyond the text.
- source_word: מַשְׁמִיעַ שָׁלוֹם
  chosen: who announces peace
  alternatives:
  - who proclaims peace
  - who causes peace to be heard
  lexicon: HALOT
  rationale: The Hiphil participle of שמע means to make heard, hence 'announce/proclaim.'
    'Announces peace' is clear modern English and preserves the heraldic sense.
- source_word: מְבַשֵּׂר טוֹב
  chosen: who brings good news of good
  alternatives:
  - who brings good news of prosperity
  - who announces good things
  - who brings good tidings of good
  lexicon: HALOT
  rationale: טוֹב is broader than material prosperity and should not be narrowed unnecessarily.
    'Good news of good' sounds slightly marked in English, but it preserves the Hebrew
    repetition and breadth better than flattening it to a single 'good news.'
- source_word: מַשְׁמִיעַ יְשׁוּעָה
  chosen: who announces salvation
  alternatives:
  - who proclaims deliverance
  - who announces victory
  lexicon: HALOT
  rationale: יְשׁוּעָה commonly denotes salvation/deliverance. 'Salvation' preserves
    the theological weight and canonical resonance without excluding deliverance.
- source_word: אֹמֵר לְצִיּוֹן
  chosen: who says to Zion
  alternatives:
  - saying to Zion
  - who tells Zion
  lexicon: HALOT
  rationale: Simple direct speech introduction is best. 'Zion' is retained as the
    conventional transliteration for the city/personified people.
- source_word: מָלַךְ אֱלֹהָיִךְ
  chosen: Your God reigns
  alternatives:
  - Your God has become king
  - Your God is king
  - Your God reigns as king
  lexicon: HALOT
  rationale: The qatal of מלך in this proclamation context can express enthronement
    or royal rule. 'Your God reigns' is idiomatic and preserves the heraldic announcement
    of divine kingship without over-specifying a punctiliar enthronement.
