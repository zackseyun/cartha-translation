theological_decisions:
- issue: Rendering the royal proclamation מָלַךְ אֱלֹהָיִךְ
  chosen_reading: Your God reigns
  alternative_readings:
  - Your God has become king
  - Your God is king
  rationale: The Hebrew perfect can be heard either as an enthronement announcement
    or as a declaration of reigning rule. To preserve theological tension rather than
    resolve it too narrowly, the main text uses the idiomatic English proclamation
    'reigns,' while alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
