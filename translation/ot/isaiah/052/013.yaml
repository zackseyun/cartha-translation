theological_decisions:
- issue: Possible messianic reading of the Servant
  chosen_reading: Translate neutrally as 'my servant' without importing explicit messianic
    identification into the wording.
  alternative_readings:
  - Interpret the servant explicitly as the Messiah/Christ in translation
  rationale: Historic Christian orthodoxy recognizes this passage as profoundly significant
    for Christology, but the Hebrew text here itself says only 'my servant.' The translation
    preserves the text's wording and leaves christological identification to interpretation,
    theology, and cross-reference rather than embedding it in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
