id: ISA.52.13
reference: Isaiah 52:13
source:
  edition: WLC
  text: הִנֵּ֥ה יַשְׂכִּ֖יל עַבְדִּ֑/י יָר֧וּם וְ/נִשָּׂ֛א וְ/גָבַ֖הּ מְאֹֽד׃
translation:
  text: Behold, my servant will act wisely; he will be raised and lifted up and highly
    exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will prosper.' The Hebrew verb can denote acting wisely and therefore
      succeeding.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces the statement with emphatic attention-getting force. 'Behold'
    preserves the prophetic solemnity better than the more colloquial 'Look' or 'See'.
- source_word: יַשְׂכִּיל
  chosen: will act wisely
  alternatives:
  - will prosper
  - will have success
  lexicon: HALOT
  rationale: Hiphil of שׂכל can denote acting with insight and, by extension, prospering
    through such wise action. 'Will act wisely' keeps the lexical core of prudence/intelligence
    while allowing the success nuance to remain implicit. Because 'will prosper' is
    a viable contextual rendering, it is preserved in a footnote.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, in this Isaianic servant context
    'servant' is the most natural and established sense in English and does not obscure
    a specifically bonded-status emphasis demanded by the immediate context.
- source_word: יָרוּם
  chosen: will be raised
  alternatives:
  - will be high
  - will rise
  lexicon: HALOT
  rationale: From רום, expressing elevation/exaltation. 'Will be raised' fits the
    sequence of exaltation terms in idiomatic English while preserving the upward
    movement imagery.
- source_word: וְנִשָּׂא
  chosen: and lifted up
  alternatives:
  - and borne up
  - and exalted
  lexicon: HALOT
  rationale: From נשׂא, here in a passive-like exaltation sense. 'Lifted up' is a
    natural English pairing with the surrounding elevation language and preserves
    the metaphor.
- source_word: וְגָבַהּ מְאֹד
  chosen: and highly exalted
  alternatives:
  - and very high
  - and exceedingly lofty
  lexicon: HALOT
  rationale: גבהּ with מְאֹד intensifies the climax of the three elevation verbs.
    'Highly exalted' communicates the superlative force in readable modern English
    better than the less idiomatic 'very high.'
