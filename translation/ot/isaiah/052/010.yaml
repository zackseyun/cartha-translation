id: ISA.52.10
reference: Isaiah 52:10
source:
  edition: WLC
  text: חָשַׂ֤ף יְהוָה֙ אֶת זְר֣וֹעַ קָדְשׁ֔/וֹ לְ/עֵינֵ֖י כָּל הַ/גּוֹיִ֑ם וְ/רָאוּ֙
    כָּל אַפְסֵי אָ֔רֶץ אֵ֖ת יְשׁוּעַ֥ת אֱלֹהֵֽי/נוּ־־־־׃ס
translation:
  text: The LORD has bared his holy arm before the eyes of all the nations, and all
    the ends of the earth will see the salvation of our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has uncovered' or 'has laid bare.' The Hebrew verb evokes the image
      of exposing the arm for decisive action.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the sight of all the nations.'
    reason: lexical_alternative
  - marker: c
    text: Or 'deliverance of our God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָשַׂף
  chosen: has bared
  alternatives:
  - has uncovered
  - has laid bare
  - has made bare
  lexicon: HALOT
  rationale: The verb means to uncover or lay bare. 'Has bared' is idiomatic modern
    English and preserves the vivid bodily metaphor of exposing the arm for action,
    without flattening it into a mere abstract statement of power.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated, following the project's default for YHWH.
- source_word: זְרֹעַ קָדְשׁוֹ
  chosen: his holy arm
  alternatives:
  - the arm of his holiness
  - his sacred arm
  lexicon: HALOT
  rationale: This is a common Hebrew anthropomorphic image for divine power in saving
    action. 'His holy arm' is the most natural English rendering while preserving
    both the metaphor and the holiness descriptor.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: The phrase literally means 'to/for the eyes of' and idiomatically 'in
    the sight of.' 'Before the eyes of' preserves the visual/public force of the Hebrew.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - every nation
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to the nations of the world, not specifically
    to Gentiles in contrast with Jews. 'All the nations' best fits the universal scope
    of the verse.
- source_word: וְרָאוּ
  chosen: will see
  alternatives:
  - shall see
  - have seen
  lexicon: HALOT
  rationale: Although morphologically a qatal form, in prophetic discourse it commonly
    carries future force in sequence with the preceding declaration. 'Will see' communicates
    the expected result of the LORD's revealed action in natural English.
- source_word: כָּל אַפְסֵי אָרֶץ
  chosen: all the ends of the earth
  alternatives:
  - all the remotest parts of the earth
  - the farthest reaches of the earth
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for the whole inhabited world in its
    extremities. 'All the ends of the earth' is both accurate and familiar without
    being archaic.
- source_word: יְשׁוּעַת
  chosen: the salvation
  alternatives:
  - the deliverance
  - the victory
  lexicon: HALOT
  rationale: The noun can denote salvation or deliverance. In this context of worldwide
    recognition of God's saving act, 'salvation' best preserves both the theological
    weight and the likely canonical resonance.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives:
  - our divine one
  lexicon: HALOT
  rationale: The construct phrase יְשׁוּעַת אֱלֹהֵינוּ is naturally rendered 'the
    salvation of our God.' This preserves the covenantal first-person plural perspective
    of Zion/Israel's proclamation.
