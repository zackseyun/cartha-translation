theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain the metaphor 'his holy arm' as a concrete image of the LORD's saving power.
  alternative_readings:
  - Interpretive rendering such as 'his holy power'
  rationale: The Hebrew explicitly uses bodily imagery. Preserving the metaphor maintains the text's poetic force and avoids over-interpreting the image into an abstract doctrinal statement.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve what the source text says without flattening theological weight.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
