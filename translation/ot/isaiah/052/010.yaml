theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain the metaphor 'his holy arm' as a concrete image of the LORD's
    saving power.
  alternative_readings:
  - Interpretive rendering such as 'his holy power'
  rationale: The Hebrew explicitly uses bodily imagery. Preserving the metaphor maintains
    the text's poetic force and avoids over-interpreting the image into an abstract
    doctrinal statement.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the source text says without flattening theological weight.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This follows the stated doctrinal
    and translation policy and aligns with longstanding reverential convention.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
