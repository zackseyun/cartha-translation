id: ISA.52.9
reference: Isaiah 52:9
source:
  edition: WLC
  text: פִּצְח֤וּ רַנְּנוּ֙ יַחְדָּ֔ו חָרְב֖וֹת יְרוּשָׁלִָ֑ם כִּֽי נִחַ֤ם יְהוָה֙
    עַמּ֔/וֹ גָּאַ֖ל יְרוּשָׁלִָֽם־׃
translation:
  text: Break forth, sing together, you ruins of Jerusalem, for the LORD has comforted
    his people; he has redeemed Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Burst out, shout for joy together, you waste places of Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּצְחוּ
  chosen: Break forth
  alternatives:
  - Burst out
  - Break out
  lexicon: HALOT
  rationale: Imperative plural from פצח, used idiomatically for suddenly breaking
    out into sound or song. 'Break forth' is a natural English equivalent that preserves
    the vivid metaphor and traditional poetic force without over-paraphrasing.
- source_word: רַנְּנוּ
  chosen: sing
  alternatives:
  - shout for joy
  - cry out joyfully
  lexicon: HALOT
  rationale: Imperative plural from רנן denotes jubilant vocal expression, often in
    song. 'Sing' fits the parallelism with 'Break forth' and reads smoothly in English;
    the joyful nuance is carried by the context.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - all together
  lexicon: HALOT
  rationale: Adverb meaning 'together.' It modifies the plural imperatives and underscores
    the collective rejoicing.
- source_word: חָרְבוֹת
  chosen: ruins
  alternatives:
  - waste places
  - desolate places
  lexicon: HALOT
  rationale: Plural noun referring to devastated places. 'Ruins' is concise, idiomatic,
    and accurately conveys the image of Jerusalem's desolation being summoned to rejoice.
- source_word: יְרוּשָׁלָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the command to rejoice. 'For' is idiomatic
    in elevated English and preserves the causal connection.
- source_word: נִחַם
  chosen: has comforted
  alternatives:
  - has consoled
  - has had compassion on
  lexicon: HALOT
  rationale: Perfect verb from נחם in the sense of bringing comfort/relief. 'Has comforted'
    matches the immediate context of restoration and aligns with common prophetic
    usage.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: עַמּוֹ
  chosen: his people
  lexicon: HALOT
  rationale: Construct noun with 3ms suffix. 'His people' is the direct and natural
    rendering.
- source_word: גָּאַל
  chosen: has redeemed
  alternatives:
  - has ransomed
  - has reclaimed
  lexicon: HALOT
  rationale: Verb of redemption/restoration, often with covenantal overtones. 'Has
    redeemed' preserves the theological and exodus-shaped resonance better than weaker
    alternatives.
- source_word: יְרוּשָׁלָם
  chosen: Jerusalem
  rationale: Repeated object retained explicitly in English to preserve the Hebrew
    emphasis and poetic closure.
