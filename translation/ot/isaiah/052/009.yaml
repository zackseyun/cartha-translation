theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God directly. Per DOCTRINE.md, the
    default rendering of יְהוָה is 'the LORD,' not a transliteration, unless context
    requires otherwise.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Redemption language in גָּאַל
  chosen_reading: has redeemed Jerusalem
  alternative_readings:
  - has ransomed Jerusalem
  - has reclaimed Jerusalem
  rationale: The Hebrew verb carries covenantal and restoration significance. 'Redeemed'
    preserves that theological weight without importing a narrower doctrinal mechanism
    not explicit in the verse.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
