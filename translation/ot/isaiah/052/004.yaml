id: ISA.52.4
reference: Isaiah 52:4
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה מִצְרַ֛יִם יָֽרַד עַמִּ֥/י בָ/רִֽאשֹׁנָ֖ה לָ/ג֣וּר שָׁ֑ם וְ/אַשּׁ֖וּר בְּ/אֶ֥פֶס עֲשָׁקֽ/וֹ־׃
translation:
  text: 'For thus says the Lord GOD: My people went down at first to Egypt to sojourn there, and Assyria oppressed them without cause.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for nothing,' 'gratuitously,' or 'without payment.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'oppressed him'; the singular likely refers to Israel as a people viewed corporately.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The combined divine title is conventionally rendered 'Lord GOD' in English to reflect אֲדֹנָי plus the divine name YHWH. Per doctrine, YHWH is rendered 'the LORD'; in this compound, 'GOD' signals the underlying divine name while avoiding 'Lord LORD.'
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: יָרַד
  chosen: went down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: Retains the common Hebrew idiom for travel to Egypt while remaining natural in English.
- source_word: עַמִּי
  chosen: My people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; capitalized 'My' follows divine speech.
- source_word: בָרִאשֹׁנָה
  chosen: at first
  alternatives:
  - formerly
  - in the beginning
  - at first
  lexicon: HALOT
  rationale: Here it marks the earlier historical episode of descent into Egypt in contrast with later Assyrian oppression. 'At first' is concise and preserves the temporal contrast.
- source_word: לָגוּר
  chosen: to sojourn
  alternatives:
  - to reside as a foreigner
  - to dwell temporarily
  - to live there
  lexicon: HALOT
  rationale: גור often denotes residing as an alien or temporary resident. 'Sojourn' preserves that nuance better than the flatter 'live.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb referring to Egypt.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: Rendered as the nation 'Assyria' in context, not the eponymous ancestor/place-name form 'Asshur.'
- source_word: בְּאֶפֶס
  chosen: without cause
  alternatives:
  - for nothing
  - gratuitously
  - without payment
  lexicon: HALOT
  rationale: The phrase likely means 'for no reason' or 'gratuitously' in the sense of unjust oppression. 'Without cause' communicates the moral point clearly in modern English.
- source_word: עֲשָׁקוֹ
  chosen: oppressed him
  alternatives:
  - oppressed them
  - wronged him
  - exploited him
  lexicon: HALOT
  rationale: עשק denotes oppression or extortion. The suffix is singular ('him'), likely a collective singular referring back to 'my people' as a corporate entity. 'Oppressed him' preserves the Hebrew number rather than smoothing to plural.
