theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to smooth the singular pronominal suffix in עֲשָׁקוֹ to an English plural
  chosen_reading: 'retain singular: ''oppressed him'''
  alternative_readings:
  - oppressed them
  rationale: The Hebrew has a 3ms suffix. Since 'my people' can function as a collective singular, retaining 'him' preserves the source form and the corporate-personified sense of Israel, even though English readers may expect a plural.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve source sense unless context demands smoothing'
