id: ISA.52.6
reference: Isaiah 52:6
source:
  edition: WLC
  text: לָ/כֵ֛ן יֵדַ֥ע עַמִּ֖/י שְׁמִ֑/י לָ/כֵן֙ בַּ/יּ֣וֹם הַ/ה֔וּא כִּֽי אֲנִי ה֥וּא
    הַֽ/מְדַבֵּ֖ר הִנֵּֽ/נִי־־׃
translation:
  text: 'Therefore my people will know my name; therefore on that day they will know
    that I am he who speaks: Here I am.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am the one who speaks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Discourse marker indicating consequence/result from the preceding context.
    'Therefore' preserves the formal linkage and suits prophetic rhetoric.
- source_word: יֵדַע
  chosen: will know
  alternatives:
  - shall know
  - knows
  lexicon: HALOT
  rationale: Imperfect verb with future sense in context. English future best reflects
    the prophetic promise.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; 'people' preserves collective singular
    sense without paraphrase.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: In Hebrew, 'name' often carries reputation, identity, and revealed character;
    the literal rendering should be preserved rather than expanded interpretively.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - so
  - for this reason
  lexicon: HALOT
  rationale: The repetition is retained in English to mirror the Hebrew emphasis and
    logical progression.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Idiomatic temporal expression in prophetic literature. 'On that day'
    is natural modern English while remaining close to the source.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here introduces the content of what will be known rather than a causal
    clause; 'that' best fits the syntax in English.
- source_word: אֲנִי הוּא
  chosen: I am he
  alternatives:
  - I am the one
  - it is I
  lexicon: HALOT
  rationale: The expression is emphatic self-identification. 'I am he' preserves the
    terseness and theological weight of the Hebrew better than a more expanded paraphrase.
- source_word: הַמְדַבֵּר
  chosen: who speaks
  alternatives:
  - the one speaking
  - who is speaking
  lexicon: HALOT
  rationale: Substantival participle modifying the emphatic self-identification. 'Who
    speaks' is idiomatic and preserves the ongoing verbal force.
- source_word: הִנֵּנִי
  chosen: Here I am
  alternatives:
  - Behold me
  - Here am I
  lexicon: HALOT
  rationale: Deictic self-presentation formula. 'Here I am' is clear modern English
    and preserves the immediacy of divine presence.
