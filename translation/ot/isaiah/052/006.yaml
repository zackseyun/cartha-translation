theological_decisions:
- issue: Rendering of the emphatic divine self-identification אֲנִי הוּא
  chosen_reading: I am he
  alternative_readings:
  - I am the one
  - it is I
  rationale: The Hebrew expression is a compact formula of divine self-identification.
    'I am he' preserves the wording's gravity and possible intertextual resonance
    without overreading it into a fuller theological claim not explicit in this verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
