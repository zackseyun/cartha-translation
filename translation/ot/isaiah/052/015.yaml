id: ISA.52.15
reference: Isaiah 52:15
source:
  edition: WLC
  text: כֵּ֤ן יַזֶּה֙ גּוֹיִ֣ם רַבִּ֔ים עָלָ֛י/ו יִקְפְּצ֥וּ מְלָכִ֖ים פִּי/הֶ֑ם כִּ֠י
    אֲשֶׁ֨ר לֹֽא סֻפַּ֤ר לָ/הֶם֙ רָא֔וּ וַ/אֲשֶׁ֥ר לֹֽא שָׁמְע֖וּ הִתְבּוֹנָֽנוּ־־׃
translation:
  text: So he will sprinkle many nations; kings will shut their mouths because of
    him. For they will see what had not been told to them, and they will understand
    what they had not heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he will startle many nations.' The Hebrew verb is commonly understood
      as 'sprinkle,' but some take it here in the sense of causing astonishment.
    reason: alternative_reading
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: Introduces the result/correspondence with the preceding description in
    v. 14. 'So' is concise and natural in English while preserving the comparative
    force.
- source_word: יַזֶּה
  chosen: he will sprinkle
  alternatives:
  - he will startle
  lexicon: HALOT
  rationale: The Hiphil of נזה normally means 'sprinkle,' especially in priestly/purification
    contexts. Although some modern versions adopt 'startle' to fit the reaction of
    nations, the Hebrew form and established lexical sense favor 'sprinkle.' The surprising
    effect is then expressed in the following clause about kings shutting their mouths.
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם refers broadly to nations/peoples. In Isaiah this often carries
    an international sense rather than specifically 'Gentiles' as a later Jewish-Christian
    contrast term.
- source_word: עָלָיו
  chosen: because of him
  alternatives:
  - at him
  - over him
  - concerning him
  lexicon: HALOT
  rationale: With the following idiom 'shut their mouths,' the preposition is best
    rendered idiomatically as the cause or occasion of their silence. 'Because of
    him' is clear modern English and fits the sense of astonishment.
- source_word: יִקְפְּצוּ מְלָכִים פִּיהֶם
  chosen: kings will shut their mouths
  alternatives:
  - kings will close their mouths
  - kings will be silenced
  lexicon: HALOT
  rationale: This is an idiom of stunned silence. 'Shut their mouths' preserves the
    concrete imagery without becoming wooden.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanation for the kings' silence.
- source_word: אֲשֶׁר לֹא סֻפַּר לָהֶם רָאוּ
  chosen: they will see what had not been told to them
  alternatives:
  - what was not recounted to them they saw
  lexicon: HALOT
  rationale: The clause contrasts prior lack of report with present perception. English
    past perfect ('had not been told') best conveys anteriority relative to 'will
    see.'
- source_word: סֻפַּר
  chosen: had not been told
  alternatives:
  - had not been recounted
  - had not been reported
  lexicon: HALOT
  rationale: The passive of ספר here refers to something not previously narrated or
    reported to them. 'Told' is the most readable modern equivalent.
- source_word: וַאֲשֶׁר לֹא שָׁמְעוּ הִתְבּוֹנָנוּ
  chosen: and they will understand what they had not heard
  alternatives:
  - and what they had not heard they understood
  - and they will consider what they had not heard
  lexicon: HALOT
  rationale: הִתְבּוֹנָנוּ conveys discerning understanding, not mere hearing. 'Understand'
    communicates the cognitive force naturally in English.
