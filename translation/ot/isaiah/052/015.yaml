theological_decisions:
- issue: Meaning of יַזֶּה in the Servant context
  chosen_reading: he will sprinkle many nations
  alternative_readings:
  - he will startle many nations
  rationale: The lexical default of נזה in Hiphil is 'sprinkle,' which also coheres
    with sacrificial/purificatory imagery in Isaiah's Servant passage. Because 'startle'
    is a significant interpretive alternative in modern translation tradition, it
    is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3, §5
