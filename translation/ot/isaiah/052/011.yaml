id: ISA.52.11
reference: Isaiah 52:11
source:
  edition: WLC
  text: ס֤וּרוּ ס֨וּרוּ֙ צְא֣וּ מִ/שָּׁ֔ם טָמֵ֖א אַל תִּגָּ֑עוּ צְא֣וּ מִ/תּוֹכָ֔/הּ הִבָּ֕רוּ נֹשְׂאֵ֖י כְּלֵ֥י יְהוָֽה־׃
translation:
  text: Turn away, turn away; go out from there. Touch no unclean thing. Go out from her midst; purify yourselves, you who carry the vessels of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Depart, depart.' The repeated imperative intensifies the call to separate.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from her midst,' likely referring to the city as feminine.
    reason: lexical_alternative
  - marker: c
    text: Or 'be clean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּרוּ
  chosen: Turn away
  alternatives:
  - Depart
  - Turn aside
  lexicon: HALOT
  rationale: Imperative plural from סור, repeated for urgency. 'Turn away' preserves the sense of separating oneself rather than merely spatial departure; the following צְאוּ then supplies the explicit 'go out' command.
- source_word: צְאוּ
  chosen: go out
  alternatives:
  - come out
  - depart
  lexicon: HALOT
  rationale: Imperative plural from יצא. 'Go out' is the plain contextual sense and distinguishes this verb from the preceding סוּרוּ.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - out of there
  lexicon: HALOT
  rationale: Simple adverbial phrase indicating the place to be left; 'from there' is natural and sufficiently formal.
- source_word: טָמֵא
  chosen: unclean thing
  alternatives:
  - what is unclean
  - anything unclean
  lexicon: HALOT
  rationale: The adjective functions substantivally after the prohibition 'do not touch.' English idiom requires a supplied noun; 'unclean thing' is concise and preserves ritual/moral impurity language without over-specifying.
- source_word: אַל תִּגָּעוּ
  chosen: Touch no
  alternatives:
  - Do not touch
  - Do not touch any
  lexicon: HALOT
  rationale: Negative jussive/prohibitive construction. 'Touch no unclean thing' is idiomatic, forceful, and close to the Hebrew.
- source_word: מִתּוֹכָהּ
  chosen: from her midst
  alternatives:
  - from the midst of her
  - out of the middle of her
  - from its midst
  lexicon: HALOT
  rationale: The 3fs suffix likely refers to the city just addressed/assumed in context (Babylon/Zion in discourse contrast). 'From her midst' preserves the feminine singular reference without flattening it to an impersonal 'it.'
- source_word: הִבָּרוּ
  chosen: purify yourselves
  alternatives:
  - be clean
  - cleanse yourselves
  lexicon: HALOT
  rationale: Niphal imperative plural from ברר/related purification sense in context. 'Purify yourselves' best fits the cultic setting and the following address to those carrying the LORD's vessels. 'Be clean' is possible but less explicit in English.
- source_word: נֹשְׂאֵי
  chosen: you who carry
  alternatives:
  - bearers of
  - you who bear
  lexicon: HALOT
  rationale: Participle used vocatively. 'You who carry' is readable modern English while preserving the ongoing role of the addressed group.
- source_word: כְּלֵי יְהוָה
  chosen: the vessels of the LORD
  alternatives:
  - the articles of the LORD
  - the utensils of the LORD
  lexicon: HALOT
  rationale: כְּלִי here refers to temple vessels/sacred articles. 'Vessels' is the most established and contextually appropriate cultic term. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
