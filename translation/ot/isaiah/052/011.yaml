theological_decisions:
- issue: Nature of impurity language
  chosen_reading: Retain 'unclean' and 'purify yourselves' as cultic-moral language without narrowing to either ceremonial or purely ethical impurity.
  alternative_readings:
  - Render more dynamically as 'defilement'/'clean yourselves'
  - Interpret exclusively as moral separation from Babylonian sin
  rationale: The verse's imagery is rooted in holiness and temple-vessel handling, but the broader context of leaving Babylon also carries moral force. The translation preserves the text's theological tension rather than resolving it into only ritual or only ethical categories.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
