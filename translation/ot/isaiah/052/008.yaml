theological_decisions:
- issue: Sense of עַיִן בְּעַיִן
  chosen_reading: eye to eye
  alternative_readings:
  - with their own eyes
  - plainly/directly
  rationale: The phrase can be taken idiomatically as direct, immediate sight rather
    than agreement between persons. The main text preserves the Hebrew imagery with
    'eye to eye,' while a footnote clarifies the likely sense of direct personal seeing.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Subject and force of בְּשׁוּב יְהוָה צִיּוֹן
  chosen_reading: when the LORD returns to Zion
  alternative_readings:
  - when the LORD restores Zion
  - when the LORD brings back Zion
  rationale: Given the wording and immediate context, reading YHWH as the subject
    of 'return' is the most straightforward. Because English readers may hear 'restore
    Zion' as an interpretive alternative, that option is preserved in a footnote rather
    than imported into the main text.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
