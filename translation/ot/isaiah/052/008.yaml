id: ISA.52.8
reference: Isaiah 52:8
source:
  edition: WLC
  text: ק֥וֹל צֹפַ֛יִ/ךְ נָ֥שְׂאוּ ק֖וֹל יַחְדָּ֣ו יְרַנֵּ֑נוּ כִּ֣י עַ֤יִן בְּ/עַ֨יִן֙
    יִרְא֔וּ בְּ/שׁ֥וּב יְהוָ֖ה צִיּֽוֹן׃
translation:
  text: The voice of your watchmen—they lift up their voice; together they shout for
    joy, for they will see eye to eye when the LORD returns to Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will see with their own eyes'; the Hebrew literally reads 'eye
      to eye.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when the LORD restores Zion.'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֥וֹל
  chosen: The voice of
  alternatives:
  - Listen to
  - A voice of
  lexicon: HALOT
  rationale: קול literally means 'voice' or 'sound.' Here it introduces the cry associated
    with the watchmen. Rendering it as 'The voice of' preserves the nominal opening
    without adding an imperative like 'Listen!' that is not explicit in the Hebrew.
- source_word: צֹפַיִךְ
  chosen: your watchmen
  alternatives:
  - your sentinels
  - your lookouts
  lexicon: HALOT
  rationale: From צפה, those who keep watch. 'Watchmen' is the most natural and established
    English equivalent and fits the Zion context. The 2fs suffix is retained as 'your,'
    addressing Zion/Jerusalem.
- source_word: נָשְׂאוּ קוֹל
  chosen: they lift up their voice
  alternatives:
  - they raise their voice
  - they lift up a voice
  lexicon: HALOT
  rationale: The idiom נשא קול means to raise or lift the voice. Singular 'voice'
    in English works idiomatically even though the phrase is collective.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Straightforward adverb meaning 'together'; it emphasizes unified rejoicing.
- source_word: יְרַנֵּנוּ
  chosen: they shout for joy
  alternatives:
  - they sing for joy
  - they cry out joyfully
  lexicon: HALOT
  rationale: רן in the piel commonly denotes jubilant crying out or singing. 'Shout
    for joy' best fits the elevated, public exultation of watchmen announcing good
    news.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the rejoicing. 'For' is concise and natural
    in English biblical style.
- source_word: עַיִן בְּעַיִן
  chosen: eye to eye
  alternatives:
  - with their own eyes
  - face to face
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'eye in/with eye.' In this context it
    most naturally conveys direct, immediate sight. 'Eye to eye' preserves the form
    and vividness of the Hebrew, while a footnote preserves the interpretive alternative
    'with their own eyes.'
- source_word: יִרְאוּ
  chosen: they will see
  alternatives:
  - they see
  lexicon: HALOT
  rationale: Imperfect verb here is best rendered as future in context, expressing
    what the watchmen will witness when the LORD acts.
- source_word: בְּשׁוּב
  chosen: when ... returns
  alternatives:
  - when ... restores
  - in the returning of
  lexicon: HALOT
  rationale: The infinitive construct of שוב with ב can denote 'when returning.' In
    context, the subject is the LORD and the sense is his return to Zion. Some interpret
    it as restoration of Zion, but the syntax naturally supports the LORD as the one
    returning.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: צִיּוֹן
  chosen: Zion
  alternatives:
  - Jerusalem
  lexicon: HALOT
  rationale: Proper name retained by transliteration, as required by the translation
    philosophy.
