theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following Jewish reverence
    tradition and longstanding English Bible practice while preserving covenantal
    force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of the dishonoring of God's name in מִנֹּאָץ
  chosen_reading: my name is despised
  alternative_readings:
  - my name is blasphemed
  rationale: The Hebrew verb can support either a broad sense of contempt or the more
    specific idea of blasphemy. The main text keeps the broader rendering to avoid
    over-specification, while the stronger alternative is preserved in a footnote
    to maintain theological tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
