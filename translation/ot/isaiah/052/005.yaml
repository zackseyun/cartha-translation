id: ISA.52.5
reference: Isaiah 52:5
source:
  edition: WLC
  text: וְ/עַתָּ֤ה מי ל/י פֹה֙ נְאֻם יְהוָ֔ה כִּֽי לֻקַּ֥ח עַמִּ֖/י חִנָּ֑ם משל/ו
    יְהֵילִ֨ילוּ֙ נְאֻם יְהוָ֔ה וְ/תָמִ֥יד כָּל הַ/יּ֖וֹם שְׁמִ֥/י מִנֹּאָֽץ־־־־־־׃
translation:
  text: And now, what do I have here? declares the LORD. For my people have been taken
    away for nothing; their rulers howl, declares the LORD, and continually, all day
    long, my name is despised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their oppressors howl.' The Hebrew term can denote those ruling over
      the people, and in context the rulers are oppressive.
    reason: lexical_alternative
  - marker: b
    text: Or 'my name is blasphemed continually all day long.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Standard discourse transition; 'And now' preserves the connective ו plus
    the temporal adverb עתה.
- source_word: מַה־לִּי פֹה
  chosen: what do I have here?
  alternatives:
  - what is this to me here?
  - what have I here?
  lexicon: HALOT
  rationale: Idiomatic rhetorical question. A too-literal rendering is awkward in
    English; 'what do I have here?' preserves the sense of divine protest and astonishment.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Conventional prophetic formula. 'Declares' is natural modern English
    and preserves prophetic authority.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the rhetorical question; 'For' fits the argumentative
    flow.
- source_word: לֻקַּח עַמִּי
  chosen: my people have been taken away
  alternatives:
  - my people were taken
  - my people have been seized
  lexicon: HALOT
  rationale: Passive perfect conveys completed action with present relevance. 'Taken
    away' is idiomatic and fits exile/oppression context.
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - without cause
  - gratuitously
  - for no price
  lexicon: HALOT
  rationale: The adverb can denote 'for nothing / without payment.' In this context
    it likely echoes the idea that Israel was taken without legitimate compensation
    or cause. 'For nothing' preserves the ambiguity better than narrowing to either
    'without cause' or 'for no price' alone.
- source_word: מֹשְׁלָיו
  chosen: their rulers
  alternatives:
  - his rulers
  - those who rule over them
  - their oppressors
  lexicon: HALOT
  rationale: The ketiv/qere-related form is commonly understood as 'his/its rulers,'
    referring to my people; in English 'their rulers' makes the referent clear. 'Oppressors'
    is interpretive and therefore avoided in the main text.
- source_word: יְהֵילִילוּ
  chosen: howl
  alternatives:
  - wail
  - shriek
  lexicon: HALOT
  rationale: The Hiphil of ילל denotes loud lamenting or howling. 'Howl' preserves
    the harsh, public sound better than the softer 'wail.' The subject is debated
    contextually, but the lexical sense itself is best represented by 'howl.'
- source_word: וְתָמִיד כָּל־הַיּוֹם
  chosen: and continually, all day long
  alternatives:
  - and constantly all day long
  - and continually the whole day
  lexicon: HALOT
  rationale: The pairing intensifies the duration. Rendering both terms preserves
    the emphatic sense rather than collapsing them into a single adverb.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Standard rendering; in context it signifies God's revealed reputation
    and honor among the nations, but 'name' should remain in the text.
- source_word: מִנֹּאָץ
  chosen: is despised
  alternatives:
  - is blasphemed
  - is treated with contempt
  lexicon: HALOT
  rationale: The verb נאץ can mean to spurn, despise, or blaspheme. 'Is despised'
    is broad and faithful; 'is blasphemed' is a strong contextual alternative preserved
    in a footnote because the verse concerns dishonor to God's name among the nations.
