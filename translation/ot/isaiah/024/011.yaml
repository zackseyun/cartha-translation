id: ISA.24.11
reference: Isaiah 24:11
source:
  edition: WLC
  text: צְוָחָ֥ה עַל הַ/יַּ֖יִן בַּֽ/חוּצ֑וֹת עָֽרְבָה֙ כָּל שִׂמְחָ֔ה גָּלָ֖ה מְשׂ֥וֹשׂ
    הָ/אָֽרֶץ־־׃
translation:
  text: There is an outcry over the wine in the streets; all joy has grown dark; the
    gladness of the earth has gone away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all joy has become evening,' preserving the Hebrew image of joy darkening
      like the onset of night.
    reason: lexical_alternative
  - marker: b
    text: Or 'the gladness of the land has departed.'
    reason: alternative_reading
lexical_decisions:
- source_word: צְוָחָה
  chosen: There is an outcry
  alternatives:
  - A cry
  - Crying
  lexicon: HALOT
  rationale: The noun denotes a cry of distress or outcry. Rendering it existentially
    in English ('There is an outcry') produces natural syntax while preserving the
    nominal force.
- source_word: עַל
  chosen: over
  alternatives:
  - because of
  - for
  lexicon: HALOT
  rationale: 'With ''wine'' the preposition likely marks the object/cause of lament:
    an outcry over the lack or loss of wine. ''Over'' preserves the ambiguity better
    than a more interpretive ''because of''.'
- source_word: הַיַּיִן
  chosen: the wine
  alternatives:
  - wine
  lexicon: HALOT
  rationale: The definite article is present in Hebrew. English can retain it naturally
    here, likely referring to wine as a representative source of festal abundance
    now lacking.
- source_word: בַּחוּצוֹת
  chosen: in the streets
  alternatives:
  - in the squares
  - in the public places
  lexicon: HALOT
  rationale: The plural noun refers to open places in a city, including streets or
    squares. 'In the streets' is idiomatic and fits the public setting of communal
    lament.
- source_word: עָרְבָה
  chosen: has grown dark
  alternatives:
  - has become evening
  - has been darkened
  lexicon: HALOT
  rationale: 'From ערב in the sense ''grow dark/become evening.'' In context, applied
    to joy, it is metaphorical: joy has dimmed or darkened. ''Has grown dark'' preserves
    the imagery better than flattening it to ''has vanished.'''
- source_word: כָּל שִׂמְחָה
  chosen: all joy
  alternatives:
  - every joy
  - all gladness
  lexicon: HALOT
  rationale: A comprehensive expression for rejoicing or joy. 'All joy' is concise
    and natural, while leaving the next noun to carry a distinct nuance.
- source_word: גָּלָה
  chosen: has gone away
  alternatives:
  - has departed
  - has been exiled
  lexicon: HALOT
  rationale: The verb commonly means uncover, remove, go into exile. Here with 'gladness'
    as subject, the sense is departure/removal. 'Has gone away' is readable modern
    English; 'has departed' is possible but slightly more formal. 'Exiled' would over-literalize
    the metaphor.
- source_word: מְשׂוֹשׂ
  chosen: the gladness
  alternatives:
  - the rejoicing
  - the mirth
  lexicon: HALOT
  rationale: This noun overlaps with שִׂמְחָה but can denote exultation or festive
    gladness. 'Gladness' provides a slight distinction from 'joy' in the previous
    clause.
- source_word: הָאָרֶץ
  chosen: of the earth
  alternatives:
  - of the land
  lexicon: HALOT
  rationale: In Isaiah 24 the scope is broadly cosmic/universal rather than merely
    local, so 'earth' better fits the context than 'land'.
