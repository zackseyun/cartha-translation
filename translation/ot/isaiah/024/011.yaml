theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The chapter's judgment language is expansive and universal, so rendering
    הָאָרֶץ as 'earth' best reflects the literary context without narrowing the oracle
    to one territory.
