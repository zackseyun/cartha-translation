id: ISA.24.4
reference: Isaiah 24:4
source:
  edition: WLC
  text: אָבְלָ֤ה נָֽבְלָה֙ הָ/אָ֔רֶץ אֻמְלְלָ֥ה נָבְלָ֖ה תֵּבֵ֑ל אֻמְלָ֖לוּ מְר֥וֹם
    עַם הָ/אָֽרֶץ־׃
translation:
  text: The earth mourns and withers; the world wastes away and withers; the exalted
    people of the earth waste away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nobles of the earth waste away.' The Hebrew literally speaks of
      the 'height' or 'exaltation' of the people of the earth.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבְלָה
  chosen: mourns
  alternatives:
  - dries up
  - withers
  - laments
  lexicon: HALOT
  rationale: From אבל, commonly 'mourn' or 'lament.' In parallel with the following
    decay terms, it personifies the earth as grieving under judgment. 'Mourns' preserves
    the emotional dimension without collapsing it into mere physical desiccation.
- source_word: נָבְלָה
  chosen: withers
  alternatives:
  - fades
  - decays
  lexicon: HALOT
  rationale: From נבל, used of fading or withering. 'Withers' is idiomatic and preserves
    the imagery of decline. Repeated in the verse, so kept consistently.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the pairing with תבל ('world') and the
    cosmic scope of the context favor 'the earth' here.
- source_word: אֻמְלְלָה
  chosen: wastes away
  alternatives:
  - languishes
  - withers
  lexicon: HALOT
  rationale: From אמל, denoting becoming weak, feeble, or dried up. 'Wastes away'
    differentiates it from נבל while still matching the poetic parallelism.
- source_word: תֵּבֵל
  chosen: the world
  alternatives:
  - the inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world in its inhabited or ordered sense. 'The world'
    is natural English and fits the parallel with 'the earth.'
- source_word: אֻמְלָלוּ
  chosen: waste away
  alternatives:
  - languish
  - grow weak
  lexicon: HALOT
  rationale: Plural form of the same root אמל. Rendered consistently with the earlier
    singular, adjusted for plural subject.
- source_word: מְרוֹם עַם הָאָרֶץ
  chosen: the exalted people of the earth
  alternatives:
  - the height of the people of the earth
  - the high ones of the people of the earth
  - the nobles of the earth
  lexicon: HALOT
  rationale: מְרוֹם literally means 'height' or 'exaltation.' In construct with 'people
    of the earth,' it likely refers to those elevated among humanity, socially or
    politically. 'The exalted people of the earth' preserves the metaphor without
    over-specifying 'nobles,' which is interpretive.
