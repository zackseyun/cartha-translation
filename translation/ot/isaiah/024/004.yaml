theological_decisions:
- issue: Scope of judgment language in הארץ / תבל
  chosen_reading: cosmic scope ('earth' / 'world') rather than merely local land
  alternative_readings:
  - local scope ('land')
  rationale: The verse pairs הארץ with תבל and speaks in broad, universal terms characteristic
    of Isaiah 24. Rendering with global scope best reflects the poetic and contextual
    horizon without importing later theology.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
