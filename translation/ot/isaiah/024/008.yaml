id: ISA.24.8
reference: Isaiah 24:8
source:
  edition: WLC
  text: שָׁבַת֙ מְשׂ֣וֹשׂ תֻּפִּ֔ים חָדַ֖ל שְׁא֣וֹן עַלִּיזִ֑ים שָׁבַ֖ת מְשׂ֥וֹשׂ
    כִּנּֽוֹר׃
translation:
  text: The joy of tambourines has ceased; the noise of the jubilant has stopped;
    the joy of the lyre has ceased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mirth' instead of 'joy' for מְשׂוֹשׂ; the Hebrew emphasizes festive
      gladness.
    reason: lexical_alternative
  - marker: b
    text: Or 'harp' for 'lyre'; traditional English versions often use 'harp,' but
      'lyre' is likely more precise for כִּנּוֹר.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבַת
  chosen: has ceased
  alternatives:
  - has stopped
  - has come to an end
  lexicon: HALOT
  rationale: Qal perfect of שׁבת commonly denotes ceasing or coming to an end. 'Has
    ceased' is natural English and preserves the stative/resultative sense in this
    lament context. Repeated the same gloss for consistency with both occurrences
    in the verse.
- source_word: מְשׂוֹשׂ
  chosen: joy
  alternatives:
  - mirth
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: The noun denotes joy or exultation. 'Joy' is the clearest modern English
    choice and fits both collocations ('joy of tambourines,' 'joy of the lyre') without
    sounding archaic like 'mirth.'
- source_word: תֻּפִּים
  chosen: tambourines
  alternatives:
  - tambourines/drums
  - hand drums
  lexicon: HALOT
  rationale: תֹּף refers to a hand-held percussion instrument often rendered 'tambourine'
    or 'timbrel.' 'Tambourines' is standard, readable modern English and better reflects
    the likely instrument than the broader 'drums.'
- source_word: חָדַל
  chosen: has stopped
  alternatives:
  - has ceased
  - has come to an end
  lexicon: HALOT
  rationale: חָדַל means to cease or stop. Here it governs שְׁאוֹן ('noise, din'),
    so 'has stopped' is slightly more idiomatic with 'noise' in English, while still
    matching the semantic field of cessation.
- source_word: שְׁאוֹן
  chosen: noise
  alternatives:
  - uproar
  - din
  lexicon: HALOT
  rationale: The noun can denote noise, roar, or tumult. In parallel with musical
    celebration, 'noise' communicates the audible commotion plainly. 'Uproar' could
    imply disorder more strongly than the context requires.
- source_word: עַלִּיזִים
  chosen: the jubilant
  alternatives:
  - the exultant
  - the merry
  - the revelers
  lexicon: HALOT
  rationale: The adjective/noun refers to those who rejoice or exult. 'The jubilant'
    preserves the celebratory sense without importing the possibly excessive connotation
    of drunken revelry that 'revelers' may suggest.
- source_word: כִּנּוֹר
  chosen: lyre
  alternatives:
  - harp
  lexicon: HALOT
  rationale: כִּנּוֹר is the ancient stringed instrument commonly identified as a
    lyre. 'Lyre' is more precise than the traditional but less exact 'harp.'
