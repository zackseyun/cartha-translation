theological_decisions:
- issue: Scope of אָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: In Isaiah 24 the judgment scene is cosmic and universal in scope, so
    'earth' best reflects the context. This is a contextual decision, not a doctrinally
    driven one.
- issue: Rendering אֲרֻבּוֹת מִמָּרוֹם
  chosen_reading: the windows from on high
  alternative_readings:
  - the floodgates of heaven
  rationale: A more literal rendering preserves the imagery without overinterpreting
    the mechanism of judgment. The alternative is traditional and evocative, so it
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3
