id: ISA.24.18
reference: Isaiah 24:18
source:
  edition: WLC
  text: וְֽ֠/הָיָה הַ/נָּ֞ס מִ/קּ֤וֹל הַ/פַּ֨חַד֙ יִפֹּ֣ל אֶל הַ/פַּ֔חַת וְ/הָֽ/עוֹלֶה֙
    מִ/תּ֣וֹךְ הַ/פַּ֔חַת יִלָּכֵ֖ד בַּ/פָּ֑ח כִּֽי אֲרֻבּ֤וֹת מִ/מָּרוֹם֙ נִפְתָּ֔חוּ
    וַֽ/יִּרְעֲשׁ֖וּ מ֥וֹסְדֵי אָֽרֶץ־־׃
translation:
  text: 'And it will happen: the one who flees from the sound of terror will fall
    into the pit, and the one who comes up from the midst of the pit will be caught
    in the trap; for the windows from on high are opened, and the foundations of the
    earth shake.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the floodgates of heaven are opened.' The Hebrew reads more literally,
      'the windows from on high are opened.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall be
  - And it will come to pass
  lexicon: HALOT
  rationale: Introduces the ensuing circumstance/result with idiomatic but still transparent
    English. 'It will happen' is modern and readable without losing the formulaic
    force.
- source_word: הַנָּס
  chosen: the one who flees
  alternatives:
  - he who flees
  - the fugitive
  lexicon: HALOT
  rationale: The participle functions substantivally. 'The one who flees' preserves
    the generic singular and ongoing verbal sense better than the more static 'fugitive'.
- source_word: מִקּוֹל הַפַּחַד
  chosen: from the sound of terror
  alternatives:
  - from the noise of dread
  - from the voice of terror
  lexicon: HALOT
  rationale: קוֹל commonly means 'sound/noise/voice.' Here an audible outbreak of
    panic or judgment is in view, so 'sound' is natural. פַּחַד is 'terror/dread';
    'terror' best fits the disaster context.
- source_word: יִפֹּל אֶל הַפַּחַת
  chosen: will fall into the pit
  alternatives:
  - will fall into the hole
  lexicon: HALOT
  rationale: פַּחַת denotes a pitfall/pit. 'Pit' is the standard concise rendering
    and preserves the wordplay with the surrounding trap imagery.
- source_word: וְהָעוֹלֶה מִתּוֹךְ הַפַּחַת
  chosen: and the one who comes up from the midst of the pit
  alternatives:
  - and whoever climbs out of the pit
  - and the one who rises from inside the pit
  lexicon: HALOT
  rationale: Retains the participial, generic-singular structure and the spatial phrase
    מִתּוֹךְ. 'Comes up' is a natural rendering of עלה in this context.
- source_word: יִלָּכֵד בַּפָּח
  chosen: will be caught in the trap
  alternatives:
  - will be captured in the snare
  - will be taken in the net
  lexicon: HALOT
  rationale: פַּח is a trap/snare. 'Trap' keeps the concrete image and distinguishes
    it from פַּחַת ('pit'), preserving the Hebrew's escalating wordplay.
- source_word: אֲרֻבּוֹת מִמָּרוֹם
  chosen: the windows from on high
  alternatives:
  - the floodgates of heaven
  - the sluices from above
  lexicon: HALOT
  rationale: Literally 'windows/openings from height.' 'Windows from on high' stays
    close to the Hebrew and echoes judgment imagery known from Genesis 7:11 without
    importing 'heaven' where the text says 'from on high.'
- source_word: נִפְתָּחוּ
  chosen: are opened
  alternatives:
  - have been opened
  - stand open
  lexicon: HALOT
  rationale: The passive perfect can be rendered with an English present perfect or
    stative present. 'Are opened' fits the vivid prophetic style and pairs well with
    the following clause.
- source_word: וַיִּרְעֲשׁוּ
  chosen: shake
  alternatives:
  - tremble
  - quake
  - are shaken
  lexicon: HALOT
  rationale: The verb denotes quaking/shaking. Present 'shake' gives vividness in
    English prophetic discourse and avoids overcomplicating the sequence.
- source_word: מוֹסְדֵי אָרֶץ
  chosen: the foundations of the earth
  alternatives:
  - the foundations of the land
  - the bases of the earth
  lexicon: HALOT
  rationale: מוֹסְדֵי are foundational supports. 'Earth' is preferable to 'land' here
    because the context is cosmic judgment, not merely local territory.
