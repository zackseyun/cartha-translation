id: ISA.24.13
reference: Isaiah 24:13
source:
  edition: WLC
  text: כִּ֣י כֹ֥ה יִהְיֶ֛ה בְּ/קֶ֥רֶב הָ/אָ֖רֶץ בְּ/ת֣וֹךְ הָֽ/עַמִּ֑ים כְּ/נֹ֣קֶף
    זַ֔יִת כְּ/עוֹלֵלֹ֖ת אִם כָּלָ֥ה בָצִֽיר־׃
translation:
  text: 'For so it will be in the midst of the earth, among the peoples: like the
    beating of an olive tree, like gleanings when the grape harvest is finished.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the shaking of an olive tree.' The Hebrew image is of striking
      or shaking the tree so that only a few olives remain.
    reason: lexical_alternative
  - marker: b
    text: Or 'like gleanings after the vintage is ended.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation or grounding for the preceding context; 'For'
    fits the discourse flow naturally in English.
- source_word: כֹה
  chosen: so
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: 'Adverb indicating manner: ''so it will be.'' ''So'' is concise and idiomatic
    in modern English.'
- source_word: יִהְיֶה
  chosen: it will be
  alternatives:
  - there will be
  - it shall be
  lexicon: HALOT
  rationale: Simple future of היה. 'It will be' preserves the Hebrew's straightforward
    predication without adding emphasis.
- source_word: בְּקֶרֶב הָאָרֶץ
  chosen: in the midst of the earth
  alternatives:
  - in the heart of the land
  - within the earth/land
  lexicon: HALOT
  rationale: קֶרֶב denotes interior/midst. הָאָרֶץ can mean 'earth' or 'land'; here,
    paired with 'among the peoples,' the broader sense 'earth' best fits the international
    scope of the oracle.
- source_word: בְּתוֹךְ הָעַמִּים
  chosen: among the peoples
  alternatives:
  - in the midst of the nations
  - among the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means peoples/nations. 'Peoples' preserves the plural
    ethnic sense without over-specifying political nation-states.
- source_word: כְּנֹקֶף זַיִת
  chosen: like the beating of an olive tree
  alternatives:
  - like the shaking of an olive tree
  - like an olive beating
  lexicon: HALOT
  rationale: נֹקֶף refers to the striking/beating process used to dislodge remaining
    olives. 'Beating' is more precise than the more generic 'shaking,' though the
    latter is a viable idiomatic alternative.
- source_word: כְּעוֹלֵלֹת
  chosen: like gleanings
  alternatives:
  - like leftover grapes
  - like gleaned fruit
  lexicon: HALOT
  rationale: עוֹלֵלֹת denotes what remains for gleaning after the main harvest. 'Gleanings'
    is the established and accurate agricultural term.
- source_word: אִם כָּלָה בָצִיר
  chosen: when the grape harvest is finished
  alternatives:
  - when the vintage is ended
  - if the harvest is complete
  lexicon: HALOT
  rationale: Here אִם functions temporally in context ('when/after'), not conditionally.
    בָצִיר is specifically grape harvest/vintage. 'Grape harvest is finished' is clear
    modern English and preserves the image of sparse leftovers after harvest.
