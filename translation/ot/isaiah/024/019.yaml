id: ISA.24.19
reference: Isaiah 24:19
source:
  edition: WLC
  text: רֹ֥עָה הִֽתְרֹעֲעָ֖ה הָ/אָ֑רֶץ פּ֤וֹר הִֽתְפּוֹרְרָה֙ אֶ֔רֶץ מ֥וֹט הִֽתְמוֹטְטָ֖ה
    אָֽרֶץ׃
translation:
  text: The earth is utterly shattered; the earth is completely broken apart; the
    earth is violently shaken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The land is utterly shattered … the land is completely broken apart
      … the land is violently shaken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעָה / הִתְרֹעֲעָה
  chosen: is utterly shattered
  alternatives:
  - is broken, broken
  - is utterly broken
  - is smashed to pieces
  lexicon: HALOT
  rationale: The infinitive absolute followed by the finite verb intensifies the verbal
    idea. The root רעע in this stem conveys being broken or shattered. 'Utterly shattered'
    preserves both the destructive force and the Hebrew intensification in idiomatic
    English.
- source_word: הָ/אָ֑רֶץ / אֶרֶץ / אָֽרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean either 'land' or 'earth,' the cosmic judgment
    context of Isaiah 24 favors the global sense 'earth.' Repetition is preserved
    each time to reflect the Hebrew's rhythmic emphasis.
- source_word: פּוֹר / הִתְפּוֹרְרָה
  chosen: is completely broken apart
  alternatives:
  - is split open
  - is crumbled
  - is utterly fragmented
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb again marks intensification.
    The root פרר/פור here suggests crumbling, breaking up, or being fragmented. 'Completely
    broken apart' communicates the disintegration clearly in modern English while
    distinguishing it from the first clause.
- source_word: מוֹט / הִתְמוֹטְטָה
  chosen: is violently shaken
  alternatives:
  - totters greatly
  - is utterly shaken
  - is violently tottering
  lexicon: HALOT
  rationale: The root מוט denotes shaking, tottering, or slipping. In this context
    of catastrophic upheaval, 'is violently shaken' is more natural English than 'totters
    greatly' while still reflecting the infinitive absolute intensification.
