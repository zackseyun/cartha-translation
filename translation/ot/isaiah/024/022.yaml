id: ISA.24.22
reference: Isaiah 24:22
source:
  edition: WLC
  text: וְ/אֻסְּפ֨וּ אֲסֵפָ֤ה אַסִּיר֙ עַל בּ֔וֹר וְ/סֻגְּר֖וּ עַל מַסְגֵּ֑ר וּ/מֵ/רֹ֥ב
    יָמִ֖ים יִפָּקֵֽדוּ־־׃
translation:
  text: And they will be gathered together like prisoners into a pit, and they will
    be shut up in a prison; and after many days they will be punished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they will be visited.' The Hebrew verb can denote being attended to
      or called to account; in this context of judgment, the sense 'punished' is most
      likely.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֻסְּפוּ
  chosen: they will be gathered together
  alternatives:
  - they will be collected
  - they will be assembled
  lexicon: HALOT
  rationale: Passive plural of אסף, indicating that the subjects are acted upon and
    brought together. 'Gathered together' preserves both the passive sense and the
    collective force.
- source_word: אֲסֵפָה
  chosen: together
  alternatives:
  - in a gathering
  - as a gathering
  lexicon: HALOT
  rationale: The cognate noun intensifies the verbal idea. In English, rendering it
    adverbially as 'together' or idiomatically within 'gathered together' best captures
    the Hebrew cognate construction without awkwardness.
- source_word: אַסִּיר
  chosen: like prisoners
  alternatives:
  - as prisoners
  - a prisoner
  lexicon: HALOT
  rationale: Although morphologically singular, the noun functions collectively in
    context after a plural verb. 'Like prisoners' reflects the comparative/assimilative
    force of the construction and reads naturally in English.
- source_word: עַל בּוֹר
  chosen: into a pit
  alternatives:
  - in a pit
  - upon a pit
  - to a pit
  lexicon: HALOT
  rationale: With verbs of movement or confinement, עַל can overlap with English 'into'
    or 'in.' 'Into a pit' best conveys being consigned to confinement rather than
    merely located near it.
- source_word: וְסֻגְּרוּ
  chosen: they will be shut up
  alternatives:
  - they will be confined
  - they will be closed in
  lexicon: HALOT
  rationale: Passive plural of סגר. 'Shut up' is a natural English idiom for forced
    confinement and matches the imprisonment imagery.
- source_word: עַל מַסְגֵּר
  chosen: in a prison
  alternatives:
  - in a dungeon
  - in confinement
  - in a cell
  lexicon: HALOT
  rationale: מַסְגֵּר denotes a place of confinement. 'Prison' is the clearest modern
    equivalent; 'dungeon' is possible but more interpretive and archaic in tone.
- source_word: וּמֵרֹב יָמִים
  chosen: after many days
  alternatives:
  - from many days
  - after a long time
  lexicon: HALOT
  rationale: The preposition with רֹב plus 'days' idiomatically indicates the passage
    of a long period. 'After many days' is both literal enough and idiomatic.
- source_word: יִפָּקֵדוּ
  chosen: they will be punished
  alternatives:
  - they will be visited
  - they will be attended to
  - they will be mustered
  lexicon: HALOT
  rationale: The Niphal of פקד can mean 'be visited' in either favorable or unfavorable
    senses depending on context. Here, in a judgment oracle and after imagery of imprisonment,
    the likely sense is punitive visitation. 'Punished' makes the contextual force
    explicit in natural English, while the broader lexical possibility is preserved
    in a footnote.
