theological_decisions:
- issue: Meaning of יִפָּקֵדוּ in a judgment context
  chosen_reading: they will be punished
  alternative_readings:
  - they will be visited
  rationale: The verse sits within an oracle of cosmic judgment, and the sequence
    of being gathered, confined, and then later acted upon strongly suggests punitive
    visitation rather than gracious attention. The Hebrew verb פקד is semantically
    broad, so the less specific alternative is preserved in a footnote rather than
    imported into the main text as if context were neutral.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternative in footnote where genuine.
