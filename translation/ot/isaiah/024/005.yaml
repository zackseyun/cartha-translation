id: ISA.24.5
reference: Isaiah 24:5
source:
  edition: WLC
  text: וְ/הָ/אָ֥רֶץ חָנְפָ֖ה תַּ֣חַת יֹשְׁבֶ֑י/הָ כִּֽי עָבְר֤וּ תוֹרֹת֙ חָ֣לְפוּ
    חֹ֔ק הֵפֵ֖רוּ בְּרִ֥ית עוֹלָֽם־׃
translation:
  text: The earth is defiled under its inhabitants, because they have transgressed
    laws, violated a statute, and broken the everlasting covenant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'changed a statute.' The Hebrew verb may carry the sense of altering
      or overstepping an established ordinance.
    reason: lexical_alternative
  - marker: b
    text: '''The everlasting covenant'' is not identified explicitly here; interpreters
      variously connect it to the Noahic covenant or to God''s enduring moral order
      for humanity.'
    reason: alternative_reading
lexical_decisions:
- source_word: חָנְפָה
  chosen: is defiled
  alternatives:
  - is polluted
  - is profaned
  - is godless
  lexicon: HALOT
  rationale: The verb can denote pollution/profanation in a moral-religious sense.
    'Is defiled' best captures the resultant state of the land in context, linking
    human sin to the earth's contamination without over-specifying ritual impurity
    alone.
- source_word: תַּחַת
  chosen: under
  alternatives:
  - because of
  - beneath
  lexicon: HALOT
  rationale: The preposition is literally 'under/beneath.' In this construction it
    conveys that the earth is defiled under or because of its inhabitants. 'Under'
    preserves the Hebrew image while remaining intelligible in English.
- source_word: יֹשְׁבֶיהָ
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its dwellers
  lexicon: HALOT
  rationale: A natural rendering of the participial noun with suffix. 'Its inhabitants'
    is idiomatic modern English and preserves the collective sense.
- source_word: עָבְרוּ
  chosen: have transgressed
  alternatives:
  - have crossed over
  - have violated
  - have gone beyond
  lexicon: HALOT
  rationale: In legal-moral context with 'laws,' the sense is violation/transgression
    rather than literal crossing. 'Have transgressed' fits the covenantal-legal register.
- source_word: תוֹרֹת
  chosen: laws
  alternatives:
  - instructions
  - teachings
  lexicon: HALOT
  rationale: Plural of תּוֹרָה. Here the context is universal moral order and legal
    breach, so 'laws' communicates binding norms more clearly than 'instructions,'
    while preserving the plural.
- source_word: חָלְפוּ
  chosen: violated
  alternatives:
  - changed
  - overstepped
  - passed over
  lexicon: HALOT
  rationale: The verb can mean to pass on/away, change, or overstep. In parallel with
    transgressing laws and breaking covenant, 'violated' best conveys breach of an
    established norm. An alternative nuance 'changed' is worth preserving in a footnote
    because some translations take the clause that way.
- source_word: חֹק
  chosen: a statute
  alternatives:
  - the statute
  - ordinance
  - decree
  lexicon: HALOT
  rationale: The singular likely functions collectively or generically for an established
    ordinance. 'A statute' is natural English after the plural 'laws' and avoids implying
    a specific previously identified statute.
- source_word: הֵפֵרוּ
  chosen: broken
  alternatives:
  - violated
  - nullified
  lexicon: HALOT
  rationale: 'Common covenant language: one breaks a covenant. ''Broken'' is the clearest
    and most idiomatic English equivalent.'
- source_word: בְּרִית עוֹלָם
  chosen: the everlasting covenant
  alternatives:
  - an everlasting covenant
  - the eternal covenant
  lexicon: HALOT
  rationale: The phrase denotes a covenant of enduring permanence. 'The everlasting
    covenant' is a standard, clear rendering. The article is supplied in English because
    the phrase is presented as a recognizable covenantal reality in context.
