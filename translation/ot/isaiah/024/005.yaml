theological_decisions:
- issue: Referent of 'the everlasting covenant'
  chosen_reading: Render generically as 'the everlasting covenant' without specifying
    Noahic, creation, or Mosaic covenant in the main text.
  alternative_readings:
  - the Noahic covenant
  - the created moral order expressed covenantally
  - a general everlasting covenant between God and humanity
  rationale: The Hebrew phrase is theologically weighty but not explicit enough here
    to justify importing one specific covenant identification into the translation.
    Preserving the broader wording maintains the text's tension and avoids doctrinal
    overreach.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
