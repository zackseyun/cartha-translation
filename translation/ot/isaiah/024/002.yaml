id: ISA.24.2
reference: Isaiah 24:2
source:
  edition: WLC
  text: וְ/הָיָ֤ה כָ/עָם֙ כַּ/כֹּהֵ֔ן כַּ/עֶ֨בֶד֙ כַּֽ/אדֹנָ֔י/ו כַּ/שִּׁפְחָ֖ה כַּ/גְּבִרְתָּ֑/הּ
    כַּ/קּוֹנֶה֙ כַּ/מּוֹכֵ֔ר כַּ/מַּלְוֶה֙ כַּ/לֹּוֶ֔ה כַּ/נֹּשֶׁ֕ה כַּ/אֲשֶׁ֖ר נֹשֶׁ֥א
    בֽ/וֹ׃
translation:
  text: 'And it shall be: as with the people, so with the priest; as with the slave,
    so with his master; as with the female slave, so with her mistress; as with the
    buyer, so with the seller; as with the lender, so with the borrower; as with the
    creditor, so with the one indebted to him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'as the creditor, so as the one who bears debt to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces the ensuing state of affairs with a simple future/existential
    formula. 'And it shall be' preserves the prophetic register without archaic excess.
- source_word: כָעָם
  chosen: as with the people
  alternatives:
  - like the people
  - as the people
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'The people' is collective and fits
    the social-pairing structure of the verse.
- source_word: ככהן
  chosen: so with the priest
  alternatives:
  - like the priest
  lexicon: HALOT
  rationale: Keeps the balanced comparison pattern. 'Priest' is the plain sense of
    כֹּהֵן.
- source_word: כעבד
  chosen: as with the slave
  alternatives:
  - as with the servant
  lexicon: HALOT
  rationale: עֶבֶד often denotes a bonded social status. In this social-status catalogue,
    'slave' better preserves the hierarchical force than the softer 'servant,' in
    line with the project's guidance to reflect bonded status where salient.
- source_word: כאדניו
  chosen: so with his master
  alternatives:
  - so with his lord
  lexicon: HALOT
  rationale: Refers to the slave's human superior, not the divine name or title. 'Master'
    best fits the household/social context.
- source_word: כשפחה
  chosen: as with the female slave
  alternatives:
  - as with the maidservant
  - as with the slave girl
  lexicon: HALOT
  rationale: שִׁפְחָה is specifically a female slave/maidservant. 'Female slave' is
    more transparent and socially parallel to 'slave' in the previous pair.
- source_word: כגברתה
  chosen: so with her mistress
  alternatives:
  - so with her lady
  lexicon: HALOT
  rationale: גְּבִרָה here is the female household superior. 'Mistress' is the most
    natural social counterpart to 'female slave' in this context.
- source_word: כקונה
  chosen: as with the buyer
  alternatives:
  - as with the purchaser
  lexicon: HALOT
  rationale: Qal participle used substantivally for a social/economic role. 'Buyer'
    is idiomatic and concise.
- source_word: כמכר
  chosen: so with the seller
  alternatives:
  - so with the merchant
  lexicon: HALOT
  rationale: Matches the participial role term and preserves the buyer/seller pairing.
- source_word: כמלוה
  chosen: as with the lender
  alternatives:
  - as with the one who lends
  lexicon: HALOT
  rationale: Hiphil participle of לוה in the causative sense, 'one who lends.' 'Lender'
    is the natural English equivalent.
- source_word: כלוה
  chosen: so with the borrower
  alternatives:
  - so with the one who borrows
  lexicon: HALOT
  rationale: Qal participle of לוה in the sense 'borrow.' 'Borrower' preserves the
    economic contrast with 'lender.'
- source_word: כנשה
  chosen: as with the creditor
  alternatives:
  - as with the one who exacts
  lexicon: HALOT
  rationale: נֹשֶׁה denotes a creditor, one to whom a debt is owed and who may press
    for payment. 'Creditor' is the clearest idiomatic rendering in this list.
- source_word: כאשר נשא בו
  chosen: so with the one indebted to him
  alternatives:
  - so with his debtor
  - so with the one who owes him
  lexicon: HALOT
  rationale: The relative clause literally describes the one bearing debt/obligation
    toward him. 'The one indebted to him' is slightly fuller than 'debtor' and reflects
    the clause's sense without over-literal awkwardness.
