id: ISA.24.16
reference: Isaiah 24:16
source:
  edition: WLC
  text: מִ/כְּנַ֨ף הָ/אָ֜רֶץ זְמִרֹ֤ת שָׁמַ֨עְנוּ֙ צְבִ֣י לַ/צַּדִּ֔יק וָ/אֹמַ֛ר רָזִי
    לִ֥/י רָֽזִי לִ֖/י א֣וֹי לִ֑/י בֹּגְדִ֣ים בָּגָ֔דוּ וּ/בֶ֥גֶד בּוֹגְדִ֖ים בָּגָֽדוּ־־׃
translation:
  text: 'From the edge of the earth we hear songs: “Glory to the righteous one.” But
    I say, “I waste away, I waste away. Woe is me!” The treacherous deal treacherously;
    with treachery the treacherous deal treacherously.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “From the wing of the earth” or “From the ends of the earth.”
    reason: lexical_alternative
  - marker: b
    text: Or “Beauty/Honor to the righteous,” taking the phrase collectively rather
      than as singular “the righteous one.”
    reason: alternative_reading
  - marker: c
    text: Hebrew רָזִי לִי is difficult. Traditionally understood as a cry of wasting
      away or emaciation; alternatively, some render it “My secret is mine” or “A
      mystery to me.”
    reason: alternative_reading
lexical_decisions:
- source_word: מִכְּנַף הָאָרֶץ
  chosen: From the edge of the earth
  alternatives:
  - From the wing of the earth
  - From the ends of the earth
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing,' but in geographic idiom it denotes an
    extremity or edge. 'Edge of the earth' preserves the metaphor while sounding natural
    in English. 'Ends of the earth' is possible but slightly more interpretive/pluralizing
    than the singular Hebrew construction.
- source_word: זְמִרֹת
  chosen: songs
  alternatives:
  - songs of praise
  - melodies
  lexicon: HALOT
  rationale: The noun denotes songs/music. 'Songs' is the most direct rendering; 'songs
    of praise' may reflect the context but adds specificity not explicit in the word
    itself.
- source_word: שָׁמַעְנוּ
  chosen: we hear
  alternatives:
  - we have heard
  - we heard
  lexicon: HALOT
  rationale: The Hebrew perfect can be rendered as a present perfect or simple present
    in vivid prophetic discourse. 'We hear' fits the immediacy of the scene in English
    while preserving the sense of received report.
- source_word: צְבִי לַצַּדִּיק
  chosen: Glory to the righteous one
  alternatives:
  - Beauty to the righteous one
  - Honor to the righteous
  - Majesty to the righteous one
  lexicon: HALOT
  rationale: צְבִי can mean beauty, glory, splendor, or honor. In this acclamatory
    context, 'Glory' best captures the laudatory force. לַצַּדִּיק is singular in
    form; 'the righteous one' preserves that form, though some take it collectively.
- source_word: וָאֹמַר
  chosen: But I say
  alternatives:
  - And I said
  - Then I said
  lexicon: HALOT
  rationale: The waw-consecutive advances the discourse. 'But I say' brings out the
    sharp contrast between the heard songs and the prophet's lament; the adversative
    sense is contextual rather than lexical, but it is warranted by the abrupt shift.
- source_word: רָזִי לִי רָזִי לִי
  chosen: I waste away, I waste away
  alternatives:
  - Leanness to me, leanness to me
  - I am undone, I am undone
  - My secret is mine, my secret is mine
  lexicon: HALOT
  rationale: The noun from רזה conveys leanness/emaciation, used idiomatically for
    wasting away. 'I waste away' communicates the lament naturally in English. The
    consonants also permit the reading 'my secret,' but in context of woe and ruin
    the traditional sense of wasting/emaciation is stronger.
- source_word: אוֹי לִי
  chosen: Woe is me!
  alternatives:
  - Woe to me!
  - Alas for me!
  lexicon: HALOT
  rationale: A standard lament/interjection. 'Woe is me!' is idiomatic and preserves
    the emotional force.
- source_word: בֹּגְדִים בָּגָדוּ
  chosen: The treacherous deal treacherously
  alternatives:
  - Traitors betray
  - The faithless act faithlessly
  lexicon: HALOT
  rationale: The root בגד denotes acting treacherously, faithlessly, or deceitfully.
    'The treacherous deal treacherously' preserves the cognate emphasis and rhetorical
    repetition better than the more interpretive 'traitors betray.'
- source_word: וּבֶגֶד בּוֹגְדִים בָּגָדוּ
  chosen: with treachery the treacherous deal treacherously
  alternatives:
  - indeed, the treacherous deal very treacherously
  - and in treachery the treacherous have dealt treacherously
  lexicon: HALOT
  rationale: The noun בֶּגֶד intensifies the repeated root בגד. Rendering it with
    the cognate noun 'treachery' preserves the emphatic piling up of the Hebrew. The
    phrase is intentionally heavy and repetitive in English to reflect the source.
