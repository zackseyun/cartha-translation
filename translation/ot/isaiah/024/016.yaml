theological_decisions:
- issue: Referent of לַצַּדִּיק
  chosen_reading: the righteous one
  alternative_readings:
  - the righteous
  - the just one
  rationale: The Hebrew adjective is singular with the article. The verse does not
    identify the referent explicitly, so the translation preserves the singular without
    importing a more specific theological identification. A collective sense remains
    possible and is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
