id: ISA.24.7
reference: Isaiah 24:7
source:
  edition: WLC
  text: אָבַ֥ל תִּיר֖וֹשׁ אֻמְלְלָה גָ֑פֶן נֶאֶנְח֖וּ כָּל שִׂמְחֵי לֵֽב־־־׃
translation:
  text: The new wine mourns, the vine withers; all the merry-hearted groan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all those glad of heart groan.' The Hebrew phrase is literally 'all
      the joyful of heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבַל
  chosen: mourns
  alternatives:
  - dries up
  - withers
  - laments
  lexicon: HALOT
  rationale: The verb commonly denotes mourning or lamenting. Here it is used poetically
    of agricultural produce, so 'mourns' preserves the personification and parallelism
    with the later human groaning better than flattening it to a purely physical process.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ typically refers to fresh or new wine rather than wine in the
    most general sense. 'New wine' is a standard, understandable rendering and preserves
    the lexical distinction.
- source_word: אֻמְלְלָה
  chosen: withers
  alternatives:
  - languishes
  - fades
  lexicon: HALOT
  rationale: The verb conveys wasting away or drooping. 'Withers' fits the agricultural
    image of the vine and reads naturally in English.
- source_word: גָּפֶן
  chosen: the vine
  alternatives:
  - the grapevine
  lexicon: HALOT
  rationale: '''Vine'' is the natural English equivalent in this poetic context and
    sufficiently conveys the grapevine intended.'
- source_word: נֶאֶנְחוּ
  chosen: groan
  alternatives:
  - sigh
  - lament
  lexicon: HALOT
  rationale: The Niphal form expresses audible grief or anguish. 'Groan' is stronger
    than 'sigh' and matches the verse's tone of devastation.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: The collective sense is best captured by 'all' with the following plural
    expression.
- source_word: שִׂמְחֵי לֵב
  chosen: the merry-hearted
  alternatives:
  - the joyful of heart
  - those glad of heart
  - the glad-hearted
  lexicon: HALOT
  rationale: This construct phrase literally means 'joyful of heart' or 'glad of heart.'
    'Merry-hearted' is concise, idiomatic, and preserves the inward disposition indicated
    by 'heart' without sounding wooden.
