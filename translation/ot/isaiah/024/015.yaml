theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of בָּאֻרִים
  chosen_reading: geographical sense ('in the east')
  alternative_readings:
  - in the regions of light
  - in the fires
  rationale: The Hebrew term is textually and lexically difficult. The immediate parallelism
    with maritime regions suggests a geographic counterpart rather than a literal
    reference to fires. To preserve the ambiguity rather than over-resolve it, the
    main text uses the likely geographic sense and a footnote preserves the lexical
    alternatives.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
