id: ISA.24.15
reference: Isaiah 24:15
source:
  edition: WLC
  text: עַל כֵּ֥ן בָּ/אֻרִ֖ים כַּבְּד֣וּ יְהוָ֑ה בְּ/אִיֵּ֣י הַ/יָּ֔ם שֵׁ֥ם יְהוָ֖ה
    אֱלֹהֵ֥י יִשְׂרָאֵֽל־׃ס
translation:
  text: Therefore in the east give glory to the LORD; in the coastlands of the sea,
    to the name of the LORD, the God of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the regions of light'; the Hebrew word is difficult and has also
      been understood as 'in the fires.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: Standard inferential conjunction phrase introducing the consequence of
    the preceding context.
- source_word: בָּאֻרִים
  chosen: in the east
  alternatives:
  - in the regions of light
  - in the fires
  lexicon: HALOT
  rationale: The form is difficult and debated. While the consonants can suggest 'fires/lights,'
    the parallel with 'in the coastlands of the sea' favors a geographical sense,
    commonly understood as 'east' or 'regions of light.' 'In the east' gives clear
    modern English while preserving the likely directional/geographical contrast.
    The lexical alternative is preserved in a footnote.
- source_word: כַּבְּדוּ
  chosen: give glory
  alternatives:
  - glorify
  - honor
  lexicon: HALOT
  rationale: Imperative plural from כבד in the sense of ascribing honor/glory to God.
    'Give glory' is idiomatic and preserves the verbal force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: בְּאִיֵּי הַיָּם
  chosen: in the coastlands of the sea
  alternatives:
  - in the islands of the sea
  - in the coastlands
  lexicon: HALOT
  rationale: אִיִּים often denotes coastlands or islands, especially distant maritime
    lands. 'Coastlands of the sea' preserves the Hebrew imagery and broad geographic
    sense.
- source_word: שֵׁם יְהוָה
  chosen: the name of the LORD
  lexicon: HALOT
  rationale: Retains the Hebrew expression of honoring God's revealed name, not merely
    God in abstraction.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct phrase identifying the LORD covenantally as Israel's
    God.
