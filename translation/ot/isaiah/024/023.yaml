id: ISA.24.23
reference: Isaiah 24:23
source:
  edition: WLC
  text: וְ/חָֽפְרָה֙ הַ/לְּבָנָ֔ה וּ/בוֹשָׁ֖ה הַֽ/חַמָּ֑ה כִּֽי מָלַ֞ךְ יְהוָ֣ה צְבָא֗וֹת
    בְּ/הַ֤ר צִיּוֹן֙ וּ/בִ/יר֣וּשָׁלִַ֔ם וְ/נֶ֥גֶד זְקֵנָ֖י/ו כָּבֽוֹד־׃פ
translation:
  text: Then the moon will be ashamed, and the sun disgraced, for the LORD of hosts
    reigns on Mount Zion and in Jerusalem, and before his elders there is glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before its elders, glory,' if the suffix is taken to refer to Zion/Jerusalem
      rather than to the LORD.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'glory' is a terse final noun; the clause may also be understood
      as 'and before his elders is his glory' or simply 'and before his elders, glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָפְרָה
  chosen: will be ashamed
  alternatives:
  - will be abashed
  - will be confounded
  lexicon: HALOT
  rationale: The verb חפר in this stem commonly conveys shame or humiliation rather
    than literal digging here. Future sense is natural in English within the prophetic
    context. 'Ashamed' is idiomatic and pairs well with the following verb.
- source_word: הַלְּבָנָה
  chosen: the moon
  alternatives:
  - the white one
  lexicon: HALOT
  rationale: The noun is the standard term for the moon. The literal etymological
    sense is not foregrounded in context.
- source_word: וּבוֹשָׁה
  chosen: disgraced
  alternatives:
  - ashamed
  - put to shame
  lexicon: HALOT
  rationale: בוש also denotes shame. I varied the English from the previous verb to
    avoid awkward repetition while preserving the semantic parallelism. 'Disgraced'
    keeps the poetic force without over-paraphrasing.
- source_word: הַחַמָּה
  chosen: the sun
  alternatives:
  - the heat
  - the sun's heat
  lexicon: HALOT
  rationale: Though the noun can be associated with heat, in this poetic pairing with
    'the moon' it clearly denotes the sun.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - when
  lexicon: HALOT
  rationale: 'Introduces the reason the moon and sun are shamed: the LORD''s kingship
    and glory outshine them. ''For'' is concise and natural.'
- source_word: מָלַךְ
  chosen: reigns
  alternatives:
  - has become king
  - will reign
  - is king
  lexicon: HALOT
  rationale: The qatal in prophetic discourse can express a future or vivid certainty.
    English present 'reigns' captures the enthronement/kingship idea in a timeless-prophetic
    way and fits the causal clause well.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - Almighty
  lexicon: HALOT
  rationale: '''Hosts'' preserves the traditional and semantically broad sense of
    heavenly and earthly armies without collapsing it into an interpretive title like
    ''Almighty.'''
- source_word: בְּהַר צִיּוֹן
  chosen: on Mount Zion
  alternatives:
  - in Mount Zion
  - at Mount Zion
  lexicon: HALOT
  rationale: Standard English idiom for בהר with a mountain is 'on Mount Zion.'
- source_word: וּבִירוּשָׁלִַם
  chosen: and in Jerusalem
  alternatives:
  - and at Jerusalem
  lexicon: HALOT
  rationale: The preposition ב is naturally rendered 'in' with a city.
- source_word: וְנֶגֶד
  chosen: and before
  alternatives:
  - and in the presence of
  - and opposite
  lexicon: HALOT
  rationale: נגד here indicates presence before someone. 'Before' is concise and preserves
    the relational sense.
- source_word: זְקֵנָיו
  chosen: his elders
  alternatives:
  - its elders
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to the LORD in context, yielding
    'his elders.' This also fits the image of the divine king honored before his council/representatives.
- source_word: כָּבוֹד
  chosen: there is glory
  alternatives:
  - glory
  - he is glorious
  - his glory
  lexicon: HALOT
  rationale: The Hebrew ends tersely with the noun 'glory.' English requires some
    expansion for readability. 'There is glory' preserves the verbless-clause force
    without over-specifying whose glory, though the context implies the LORD's manifested
    glory.
