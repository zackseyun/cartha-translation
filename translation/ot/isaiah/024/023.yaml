theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referent of the suffix in זְקֵנָיו
  chosen_reading: his elders, referring to the LORD
  alternative_readings:
  - its elders, referring to Zion/Jerusalem
  - the elders of his people
  rationale: The masculine singular suffix most naturally points to the immediately
    governing subject, the LORD of hosts. The phrase then depicts glory manifested
    before his elders. Because the Hebrew is terse and could be construed differently,
    the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
