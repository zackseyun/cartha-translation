id: ISA.24.10
reference: Isaiah 24:10
source:
  edition: WLC
  text: נִשְׁבְּרָ֖ה קִרְיַת תֹּ֑הוּ סֻגַּ֥ר כָּל בַּ֖יִת מִ/בּֽוֹא־־׃
translation:
  text: The city of chaos is broken down; every house is shut up so that none may
    enter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The city of emptiness/desolation is broken down.' The Hebrew תֹּהוּ
      can denote chaos, emptiness, or desolation.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'every house is shut up from entering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁבְּרָה
  chosen: is broken down
  alternatives:
  - is shattered
  - is broken
  lexicon: HALOT
  rationale: Niphal perfect of שׁבר conveys a passive/resultative sense of being broken
    or shattered. 'Broken down' fits an urban setting in English, suggesting collapse
    or ruin rather than merely a single fracture.
- source_word: קִרְיַת
  chosen: city of
  alternatives:
  - town of
  lexicon: HALOT
  rationale: Construct form of קִרְיָה means 'city/town.' 'City of' is the most natural
    construct rendering and suits the prophetic register.
- source_word: תֹּהוּ
  chosen: chaos
  alternatives:
  - emptiness
  - wasteland
  - desolation
  lexicon: HALOT
  rationale: תֹּהוּ often denotes formlessness, emptiness, or desolation. Here, as
    a genitive after 'city of,' 'chaos' preserves the abstract force and the prophetic
    image of societal collapse better than the more concrete 'wasteland.'
- source_word: סֻגַּר
  chosen: is shut up
  alternatives:
  - is shut
  - is closed
  lexicon: HALOT
  rationale: Pual/perfect of סגר gives a passive sense, 'is shut/closed.' 'Shut up'
    reflects the idiom of houses being barred or sealed off, matching the context
    of devastation and abandonment.
- source_word: כָּל בַּיִת
  chosen: every house
  alternatives:
  - each house
  - every home
  lexicon: HALOT
  rationale: The distributive sense of כָּל with singular noun is best rendered 'every
    house.' 'House' is preferable to 'home' because the verse emphasizes physical
    access being blocked.
- source_word: מִבּוֹא
  chosen: so that none may enter
  alternatives:
  - from entering
  - against entry
  - without entrance
  lexicon: HALOT
  rationale: 'The preposition מִן attached to the infinitive construct of בוא literally
    yields ''from entering.'' In idiomatic English after ''every house is shut up,''
    the sense is purpose/result: entry is prevented. ''So that none may enter'' makes
    the force clear without over-paraphrasing.'
