id: ISA.24.3
reference: Isaiah 24:3
source:
  edition: WLC
  text: הִבּ֧וֹק תִּבּ֛וֹק הָ/אָ֖רֶץ וְ/הִבּ֣וֹז תִּבּ֑וֹז כִּ֣י יְהוָ֔ה דִּבֶּ֖ר
    אֶת הַ/דָּבָ֥ר הַ/זֶּֽה׀׀־׃
translation:
  text: The earth will be utterly emptied and utterly plundered, for the LORD has
    spoken this word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The land will be utterly emptied and utterly plundered.' Hebrew אֶרֶץ
      can mean 'land' or 'earth'; the broader context here favors the global sense
      'earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִבּוֹק תִּבּוֹק
  chosen: will be utterly emptied
  alternatives:
  - will surely be emptied
  - will be completely laid waste
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    The Niphal of בקק conveys being emptied out or laid waste. 'Utterly emptied' preserves
    both the passive sense and the emphatic force in natural English.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Isaiah 24 the scope is cosmic and
    universal, so 'the earth' best fits the context.
- source_word: וְהִבּוֹז תִּבּוֹז
  chosen: and utterly plundered
  alternatives:
  - and utterly despoiled
  - and completely spoiled
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb again marks emphasis. The verb
    בזז denotes plundering or despoiling. 'Utterly plundered' keeps the passive/resultative
    sense and mirrors the emphatic structure of the Hebrew.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or ground for the announced judgment.
    'For' is concise and fits prophetic style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - has said
  - spoke
  lexicon: HALOT
  rationale: The perfect presents the declaration as established and certain. 'Has
    spoken' preserves the solemn prophetic force better than the more colloquial 'has
    said.'
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this matter
  - this thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In prophetic formulae,
    'word' best preserves the sense of a declared divine pronouncement.
