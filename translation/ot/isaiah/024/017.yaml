id: ISA.24.17
reference: Isaiah 24:17
source:
  edition: WLC
  text: פַּ֥חַד וָ/פַ֖חַת וָ/פָ֑ח עָלֶ֖י/ךָ יוֹשֵׁ֥ב הָ/אָֽרֶץ׃
translation:
  text: Terror and the pit and the snare are upon you, inhabitant of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fear and the pit and the snare are upon you, you who dwell on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּחַד
  chosen: Terror
  alternatives:
  - Fear
  - Dread
  lexicon: HALOT
  rationale: The noun denotes fear/dread, but in this triadic judgment formula paired
    with 'pit' and 'snare,' 'terror' best conveys an objective, impending horror rather
    than merely the subjective emotion 'fear.' It also preserves the alliterative
    force of the Hebrew sequence.
- source_word: פַחַת
  chosen: the pit
  alternatives:
  - pitfall
  - trap-pit
  lexicon: HALOT
  rationale: This noun refers to a pit used as a trap. 'The pit' is idiomatic, concise,
    and preserves the stock expression 'terror and pit and snare' known from this
    context. 'Pitfall' is possible but less direct and slightly more interpretive.
- source_word: פָח
  chosen: the snare
  alternatives:
  - trap
  - net
  lexicon: HALOT
  rationale: The noun denotes a snare/trap, often for catching animals. 'Snare' fits
    the poetic triad and distinguishes it from the preceding 'pit.' 'Trap' is possible
    but loses some of the literary resonance.
- source_word: עָלֶיךָ
  chosen: are upon you
  alternatives:
  - will be upon you
  - come upon you
  lexicon: HALOT
  rationale: The preposition with pronominal suffix literally means 'upon you.' Supplying
    'are' yields natural English while preserving the verbless Hebrew clause's immediacy.
    Future force is contextually possible, but the Hebrew here does not require an
    explicit future auxiliary.
- source_word: יוֹשֵׁב הָאָרֶץ
  chosen: inhabitant of the earth
  alternatives:
  - you who dwell on the earth
  - inhabitant of the land
  lexicon: HALOT
  rationale: 'The singular participle plus noun functions vocatively: ''O inhabitant
    of the earth/land.'' ''Inhabitant of the earth'' preserves the singular address
    and the broad, cosmic scope of the chapter. ''Land'' is lexically possible for
    אֶרֶץ, but ''earth'' better fits Isaiah 24''s universal judgment context.'
