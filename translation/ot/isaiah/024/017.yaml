theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: Isaiah 24 emphasizes worldwide judgment rather than a merely local calamity.
    Rendering אֶרֶץ as 'earth' preserves the chapter's universal scope without importing
    extra theological claims.
