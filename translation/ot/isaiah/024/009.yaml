id: ISA.24.9
reference: Isaiah 24:9
source:
  edition: WLC
  text: בַּ/שִּׁ֖יר לֹ֣א יִשְׁתּוּ יָ֑יִן יֵמַ֥ר שֵׁכָ֖ר לְ/שֹׁתָֽי/ו־׃
translation:
  text: They do not drink wine with a song; strong drink is bitter to those who drink
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will not drink wine with singing.' The Hebrew imperfect may be
      understood futurally, and בַּשִּׁיר may also be rendered 'in song' or 'while
      singing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשִּׁיר
  chosen: with a song
  alternatives:
  - in song
  - while singing
  lexicon: HALOT
  rationale: 'The preposition ב plus שִׁיר most naturally expresses accompaniment
    or manner here: drinking is no longer accompanied by song. ''With a song'' is
    idiomatic and preserves the poetic contrast with former festivity.'
- source_word: לֹא יִשְׁתּוּ
  chosen: they do not drink
  alternatives:
  - they will not drink
  lexicon: HALOT
  rationale: The imperfect can be rendered present or future in prophetic poetry.
    English present best conveys the vivid description of the devastated condition
    without over-specifying temporality.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for יַיִן.
- source_word: יֵמַר
  chosen: is bitter
  alternatives:
  - becomes bitter
  - tastes bitter
  lexicon: HALOT
  rationale: 'From מרר, ''to be bitter.'' The predicate sense fits the line: intoxicating
    drink, once pleasurable, is now bitter. ''Is bitter'' is concise and natural.'
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - beer
  - intoxicating drink
  lexicon: HALOT
  rationale: שֵׁכָר denotes an intoxicating beverage other than ordinary wine, often
    rendered 'strong drink.' This preserves lexical distinction from יַיִן.
- source_word: לְשֹׁתָיו
  chosen: to those who drink it
  alternatives:
  - to its drinkers
  - to those drinking
  lexicon: HALOT
  rationale: The form refers to drinkers of it; English requires an explicit object
    for clarity. 'Those who drink it' is natural and preserves the sense without unnecessary
    literalism.
