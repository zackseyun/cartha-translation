id: ISA.24.1
reference: Isaiah 24:1
source:
  edition: WLC
  text: הִנֵּ֧ה יְהוָ֛ה בּוֹקֵ֥ק הָ/אָ֖רֶץ וּ/בֽוֹלְקָ֑/הּ וְ/עִוָּ֣ה פָנֶ֔י/הָ וְ/הֵפִ֖יץ
    יֹשְׁבֶֽי/הָ׃
translation:
  text: Behold, the LORD is emptying the earth and laying it waste; he will twist
    its surface and scatter its inhabitants.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land' instead of 'the earth'; the Hebrew אֶרֶץ can mean either,
      but the broader context here favors a universal sense.
    reason: lexical_alternative
  - marker: b
    text: Literally 'its face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces the prophetic announcement with heightened attention. 'Behold'
    preserves the solemn, deictic force better than the more casual 'look' or 'see'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine default for the divine name YHWH: ''the LORD,'' following
    established reverential convention and the pattern reflected in the Septuagint.'
- source_word: בּוֹקֵק
  chosen: is emptying
  alternatives:
  - lays waste
  - devastates
  - makes empty
  lexicon: HALOT
  rationale: The participle conveys an ongoing/imminent action. The root sense is
    to empty out or lay bare; 'is emptying' preserves the lexical image, while the
    following verb supplies the devastation nuance.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In Isaiah 24 the scope is cosmic/universal rather than merely local,
    so 'the earth' best fits context, though 'land' is a possible lexical alternative
    in other settings.
- source_word: וּבֹלְקָהּ
  chosen: and laying it waste
  alternatives:
  - and devastating it
  - and stripping it bare
  lexicon: HALOT
  rationale: This rare verb is paired with בוקק in an alliterative wordplay intensifying
    desolation. 'Laying it waste' communicates the destructive result naturally in
    English while preserving the parallel force.
- source_word: וְעִוָּה
  chosen: he will twist
  alternatives:
  - he will distort
  - he will overturn
  lexicon: HALOT
  rationale: The verb means to bend, twist, or distort. 'Twist' preserves the concrete
    imagery without overinterpreting it as total overthrow.
- source_word: פָנֶיהָ
  chosen: its surface
  alternatives:
  - its face
  - its appearance
  lexicon: HALOT
  rationale: Literally 'its face,' but for the earth this idiom refers to its surface.
    'Surface' is clearer modern English while remaining faithful to the Hebrew sense.
- source_word: וְהֵפִיץ
  chosen: and scatter
  alternatives:
  - and disperse
  lexicon: HALOT
  rationale: Common verb for dispersing people. 'Scatter' is vivid and idiomatic in
    judgment contexts.
- source_word: יֹשְׁבֶיהָ
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its dwellers
  lexicon: HALOT
  rationale: A participial noun meaning those dwelling in the earth/land. 'Its inhabitants'
    is natural English and preserves the collective sense.
