id: ISA.24.6
reference: Isaiah 24:6
source:
  edition: WLC
  text: עַל כֵּ֗ן אָלָה֙ אָ֣כְלָה אֶ֔רֶץ וַֽ/יֶּאְשְׁמ֖וּ יֹ֣שְׁבֵי בָ֑/הּ עַל כֵּ֗ן
    חָרוּ֙ יֹ֣שְׁבֵי אֶ֔רֶץ וְ/נִשְׁאַ֥ר אֱנ֖וֹשׁ מִזְעָֽר־־׃
translation:
  text: Therefore a curse has devoured the earth, and those who dwell in it bear their
    guilt; therefore the inhabitants of the earth are scorched, and few men are left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an oath has consumed the earth'; the Hebrew word can mean 'oath' or
      'curse,' but in this context of violated covenant and resulting judgment, 'curse'
      best fits.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land' / 'the inhabitants of the land' if taken in a more localized
      sense; here it is rendered 'earth' because the chapter's scope appears universal.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'men' (collective), that is, human beings; the term emphasizes mortal
      humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks consequence from the preceding indictment; 'Therefore' is natural
    and preserves the causal force.
- source_word: אָלָה
  chosen: a curse
  alternatives:
  - an oath
  - a sworn curse
  lexicon: HALOT
  rationale: In prophetic judgment context, אָלָה commonly denotes a covenantal curse
    rather than a neutral oath. 'A curse' is the plainest English rendering here.
- source_word: אָכְלָה
  chosen: has devoured
  alternatives:
  - has consumed
  - has eaten up
  lexicon: HALOT
  rationale: The verb אכל is literally 'eat/devour.' 'Has devoured' preserves the
    vivid metaphor of destructive judgment better than the flatter 'consumed.'
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Isaiah 24 has a global/cosmic scope, so 'earth' fits better than the
    more localized 'land.' The repeated use in the verse is kept consistent.
- source_word: וַיֶּאְשְׁמוּ
  chosen: bear their guilt
  alternatives:
  - are held guilty
  - suffer punishment
  - are found guilty
  lexicon: HALOT
  rationale: From אשם, which can denote becoming guilty or bearing guilt/consequence.
    'Bear their guilt' preserves both culpability and its penal implication without
    over-interpreting.
- source_word: יֹשְׁבֵי בָהּ
  chosen: those who dwell in it
  alternatives:
  - its inhabitants
  - those who live in it
  lexicon: HALOT
  rationale: A clear rendering of the participial construction; slightly more explicit
    than 'its inhabitants' while preserving the ongoing sense.
- source_word: חָרוּ
  chosen: are scorched
  alternatives:
  - are burned
  - are parched
  lexicon: HALOT
  rationale: The verb חרר here conveys being burned up/scorched under judgment. 'Are
    scorched' is vivid and idiomatic without overstating total destruction.
- source_word: יֹשְׁבֵי אֶרֶץ
  chosen: the inhabitants of the earth
  alternatives:
  - those who dwell on the earth
  - the dwellers of the earth
  lexicon: HALOT
  rationale: Smooth English equivalent of the construct phrase, consistent with the
    earlier participial expression.
- source_word: וְנִשְׁאַר
  chosen: are left
  alternatives:
  - remain
  - survive
  lexicon: HALOT
  rationale: The Niphal of שׁאר denotes being left/remnant. With the following singular
    collective noun, English plural agreement is supplied by sense with 'few men are
    left.'
- source_word: אֱנוֹשׁ
  chosen: men
  alternatives:
  - mankind
  - humanity
  - people
  lexicon: HALOT
  rationale: אֱנוֹשׁ often emphasizes mortal human beings. Here, with מִזְעָר, it
    refers to a very small number of humans remaining. 'Men' follows the project's
    gender-accurate policy for representative humanity; alternatives are possible
    but less formally aligned.
- source_word: מִזְעָר
  chosen: few
  alternatives:
  - a small number
  - very few
  lexicon: HALOT
  rationale: Conveys smallness in number succinctly and idiomatically in English.
