theological_decisions:
- issue: Sense of אָלָה in a judgment context
  chosen_reading: covenantal/judicial 'curse'
  alternative_readings:
  - oath
  rationale: The immediate context concerns transgression of laws and broken covenant
    (v. 5), so rendering אָלָה as 'curse' best reflects the judicial consequence rather
    than a mere oath formula.
- issue: Scope of אֶרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The chapter's rhetoric is universal rather than merely national, so 'earth'
    preserves the broader scope of divine judgment.
- issue: Rendering of אֱנוֹשׁ
  chosen_reading: men
  alternative_readings:
  - humanity
  - people
  rationale: The Hebrew is grammatically masculine singular used collectively for
    human beings. Per the translation philosophy, a gender-accurate rendering is preferred
    where the source has representative force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
