id: ISA.24.12
reference: Isaiah 24:12
source:
  edition: WLC
  text: נִשְׁאַ֥ר בָּ/עִ֖יר שַׁמָּ֑ה וּ/שְׁאִיָּ֖ה יֻכַּת שָֽׁעַר־׃
translation:
  text: Desolation is left in the city, and the gate is battered into ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Waste remains in the city, and the gate is struck down to ruin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁאַר
  chosen: is left
  alternatives:
  - remains
  - is left behind
  lexicon: HALOT
  rationale: Niphal of שׁאר conveys what remains or is left over after devastation.
    'Is left' fits the impersonal Hebrew construction and reads naturally in English.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - in the town
  lexicon: HALOT
  rationale: עִיר normally means 'city.' The prefixed preposition and article are
    best rendered straightforwardly as 'in the city.'
- source_word: שַׁמָּה
  chosen: Desolation
  alternatives:
  - waste
  - ruin
  - horror
  lexicon: HALOT
  rationale: 'שַׁמָּה denotes devastation/desolation, often with the sense of a place
    laid waste. Capitalization is not required by the Hebrew, but the noun is rendered
    as the subject in English for clarity: ''Desolation is left in the city.'''
- source_word: וּשְׁאִיָּה
  chosen: into ruins
  alternatives:
  - to ruin
  - to desolation
  lexicon: HALOT
  rationale: 'שְׁאִיָּה is a near-synonym of devastation/ruin. In English it is most
    natural to express its relation to the following verb adverbially/resultatively:
    ''battered into ruins.'' This preserves the sense without wooden repetition.'
- source_word: יֻכַּת
  chosen: is battered
  alternatives:
  - is struck down
  - is beaten down
  - is shattered
  lexicon: HALOT
  rationale: Hophal of כתת conveys being beaten/crushed. 'Is battered' communicates
    the passive destructive force against the gate in idiomatic modern English.
- source_word: שָׁעַר
  chosen: the gate
  alternatives:
  - the city gate
  lexicon: HALOT
  rationale: שַׁעַר is 'gate,' often the city gate by implication. Since 'city' is
    already explicit earlier in the verse, 'the gate' is sufficient in the main text.
