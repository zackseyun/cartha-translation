id: ISA.24.14
reference: Isaiah 24:14
source:
  edition: WLC
  text: הֵ֛מָּה יִשְׂא֥וּ קוֹלָ֖/ם יָרֹ֑נּוּ בִּ/גְא֣וֹן יְהוָ֔ה צָהֲל֖וּ מִ/יָּֽם׃
translation:
  text: They lift up their voice; they shout for joy. Because of the majesty of the
    LORD, they cry aloud from the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the west' or 'from the coastlands'; Hebrew 'from the sea' can carry
      a geographic sense in prophetic poetry.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  chosen: They
  alternatives:
  - Those
  - They themselves
  lexicon: HALOT
  rationale: Third person masculine plural independent pronoun used for emphasis;
    English keeps simple subject 'They' without overtranslating the emphasis.
- source_word: יִשְׂאוּ קוֹלָם
  chosen: lift up their voice
  alternatives:
  - raise their voice
  - lift up their voices
  lexicon: HALOT
  rationale: The idiom נשׂא קול means to raise/lift the voice. Singular 'voice' follows
    the Hebrew collective singular קול with plural suffix and is natural in English.
- source_word: יָרֹנּוּ
  chosen: shout for joy
  alternatives:
  - sing out
  - cry out jubilantly
  lexicon: HALOT
  rationale: רנן commonly denotes jubilant crying or singing. 'Shout for joy' captures
    the exultant force without forcing specifically musical nuance.
- source_word: בִּגְאוֹן
  chosen: Because of the majesty of
  alternatives:
  - at the majesty of
  - in the majesty of
  - over the majesty of
  lexicon: HALOT
  rationale: גאון here denotes exalted majesty. The preposition ב can be rendered
    in several ways in poetic context; 'Because of' best fits the sense that the LORD's
    majesty is the cause of the rejoicing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: צָהֲלוּ
  chosen: cry aloud
  alternatives:
  - shout
  - ring out
  lexicon: HALOT
  rationale: The verb conveys loud, ringing exultation. 'Cry aloud' preserves the
    vocal intensity and avoids redundancy with the previous verb by varying the English
    while keeping the semantic field of loud rejoicing.
- source_word: מִיָּם
  chosen: from the sea
  alternatives:
  - from the west
  - from the coastlands
  lexicon: HALOT
  rationale: ים literally means 'sea.' In some prophetic contexts it can function
    geographically for the west or maritime regions, but the plain lexical sense should
    stand in the main text; geographic implications are preserved in a footnote.
