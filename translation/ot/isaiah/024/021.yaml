theological_decisions:
- issue: Identity of 'the host of the height'
  chosen_reading: Render the phrase literally without specifying whether it refers to angelic/heavenly powers or exalted rulers.
  alternative_readings:
  - heavenly host
  - host of heaven
  - exalted powers on high
  rationale: The Hebrew permits multiple closely related interpretations, and the verse's rhetoric may intentionally encompass cosmic and earthly powers together. A literal rendering preserves the theological tension rather than resolving it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
