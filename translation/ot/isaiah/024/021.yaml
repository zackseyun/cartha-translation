id: ISA.24.21
reference: Isaiah 24:21
source:
  edition: WLC
  text: וְ/הָיָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא יִפְקֹ֧ד יְהוָ֛ה עַל צְבָ֥א הַ/מָּר֖וֹם בַּ/מָּר֑וֹם וְ/עַל מַלְכֵ֥י הָ/אֲדָמָ֖ה עַל הָ/אֲדָמָֽה־־־׃
translation:
  text: And on that day Yahweh will punish the host of heaven in heaven, and the kings of the earth on the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will visit'; the Hebrew idiom can mean 'will punish,' 'will call to account,' or more literally 'will visit' in judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the host of heaven in heaven.' The Hebrew more literally reads 'the host of the height in the height,' which may refer to heavenly powers or to exalted powers above.
    reason: alternative_reading
  - marker: c
    text: Or 'the kings of the land on the land.' Here 'earth' best fits the cosmic contrast with 'the height.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ...
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: The clause functions as a discourse introducer to the prophetic time reference rather than needing a full English predicate. Rendering simply as 'And' with the following temporal phrase gives natural English while preserving the forward-looking force.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic literature. 'On that day' is idiomatic modern English and preserves the eschatological/time-of-judgment sense.
- source_word: יִפְקֹד
  chosen: will punish
  alternatives:
  - will visit
  - will attend to
  - will call to account
  lexicon: HALOT
  rationale: פקד with עַל in a judgment context commonly carries the sense of punitive visitation. 'Will punish' makes the judicial force explicit in clear English. The more literal 'visit' is preserved as an alternative because it reflects the Hebrew idiom but is less transparent in contemporary English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָא
  chosen: the host
  alternatives:
  - the army
  - the forces
  lexicon: HALOT
  rationale: The noun denotes an assembled host or army. 'Host' preserves the collective sense and leaves open whether the referent is heavenly powers or exalted earthly powers, which is important in this context.
- source_word: הַמָּרוֹם
  chosen: the height
  alternatives:
  - the high place
  - the exalted realm
  - heaven
  lexicon: HALOT
  rationale: מָרוֹם literally denotes height or high place. Rendering it as 'the height' preserves the Hebrew imagery and avoids prematurely resolving whether the reference is to heaven proper or to exalted powers.
- source_word: בַּמָּרוֹם
  chosen: in the height
  alternatives:
  - in the high place
  - in heaven
  - on high
  lexicon: HALOT
  rationale: 'The repeated noun with prefixed ב is retained distinctly: ''the host of the height in the height.'' This preserves the emphatic parallelism and avoids collapsing the phrase into an interpretive paraphrase such as ''the heavenly host in heaven.'''
- source_word: מַלְכֵי הָאֲדָמָה
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: HALOT
  rationale: In this cosmic judgment context, 'earth' is preferable to 'land,' matching the contrast with the exalted realm above and the final phrase 'on the earth.'
- source_word: עַל הָאֲדָמָה
  chosen: on the earth
  alternatives:
  - upon the ground
  - on the land
  lexicon: HALOT
  rationale: This final phrase mirrors the earlier 'in the height' and underscores the earthly sphere of the kings. 'On the earth' preserves the vertical contrast and the Hebrew repetition.
