id: ISA.65.1
reference: Isaiah 65:1
source:
  edition: WLC
  text: נִדְרַ֨שְׁתִּי֙ לְ/ל֣וֹא שָׁאָ֔לוּ נִמְצֵ֖אתִי לְ/לֹ֣א בִקְשֻׁ֑/נִי אָמַ֨רְתִּי֙
    הִנֵּ֣/נִי הִנֵּ֔/נִי אֶל גּ֖וֹי לֹֽא קֹרָ֥א בִ/שְׁמִֽ/י־־׃
translation:
  text: I let myself be sought by those who did not ask; I let myself be found by
    those who did not seek me. I said, ‘Here I am, here I am,’ to a nation that did
    not call on my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I was sought ... I was found.' The Hebrew Niphal forms
      can be read as simple passives, though the context suggests God's self-disclosure
      to those not seeking him.
    reason: lexical_alternative
  - marker: b
    text: Paul cites this verse in Romans 10:20 with reference to the Gentiles; therefore
      'nation' here may be understood in that broader canonical sense.
    reason: cross_reference
lexical_decisions:
- source_word: נִדְרַשְׁתִּי
  chosen: I let myself be sought
  alternatives:
  - I was sought
  - I was ready to be inquired of
  - I allowed myself to be consulted
  lexicon: HALOT
  rationale: דרשׁ in the Niphal can be rendered simply as a passive ('I was sought'),
    but in this context the sense is that God made himself available or accessible
    to people who had not been asking for him. 'I let myself be sought' preserves
    the passive/reflexive nuance while reading naturally in English and matching the
    parallel 'I let myself be found.'
- source_word: לְלֹא שָׁאָלוּ
  chosen: by those who did not ask
  alternatives:
  - to those who did not ask
  - for those who did not inquire
  lexicon: HALOT
  rationale: The preposition ל with negation and verb is idiomatic after the Niphal
    here. English 'by those who did not ask' best conveys the relation to the passive/reflexive
    verb. 'Ask' is preferred over 'inquire' for readability, while still fitting שאל.
- source_word: נִמְצֵאתִי
  chosen: I let myself be found
  alternatives:
  - I was found
  - I made myself found
  lexicon: HALOT
  rationale: Parallel to נדרשתי. The Niphal of מצא is naturally 'be found,' but the
    context stresses divine self-disclosure to those not seeking him. 'I let myself
    be found' preserves that nuance without over-paraphrasing.
- source_word: לְלֹא בִקְשֻׁנִי
  chosen: by those who did not seek me
  alternatives:
  - to those who did not seek me
  lexicon: HALOT
  rationale: בקשׁ is straightforwardly 'seek.' The object suffix requires 'me.' 'By
    those who did not seek me' matches the English syntax established in the previous
    clause.
- source_word: הִנֵּנִי הִנֵּנִי
  chosen: Here I am, here I am
  alternatives:
  - Behold me, behold me
  - Here am I, here am I
  lexicon: HALOT
  rationale: The doubled expression is emphatic and should be preserved. 'Here I am'
    is idiomatic modern English and communicates availability/presence better than
    the more wooden 'Behold me.' Repetition is retained for rhetorical force.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: Simple directional preposition. 'To' is the natural English equivalent
    in this speech context.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  - Gentile nation
  lexicon: HALOT
  rationale: גוי most basically means 'nation.' 'Nation' preserves the lexical value
    without importing the more interpretive 'Gentile' into the main text. Because
    Paul cites this verse with reference to Gentiles (Rom 10:20), that interpretive
    connection is worth preserving in a footnote rather than in the translation itself.
- source_word: לֹא קֹרָא בִשְׁמִי
  chosen: that did not call on my name
  alternatives:
  - that was not called by my name
  - that did not invoke my name
  lexicon: HALOT
  rationale: The active participle קרא with ב + שם here is best read as 'call on/invoke
    my name,' not the passive idea 'be called by my name.' The subject is the nation
    acting (or failing to act), not a label applied to it. 'Call on my name' is also
    a familiar biblical idiom in English.
