theological_decisions:
- issue: Whether the verse should imply divine self-disclosure to the Gentiles in
    the main text
  chosen_reading: Render גוי as 'nation' in the main text and preserve the Gentile-oriented
    interpretive connection in a footnote.
  alternative_readings:
  - Translate גוי directly as 'Gentiles'
  - Translate more generally as 'people'
  rationale: The Hebrew term itself is 'nation,' and the immediate verse does not
    explicitly require 'Gentiles' as the gloss. However, the broader canonical use
    in Romans 10:20 applies the verse to Gentiles. To preserve theological and intertextual
    tension without over-resolving the Hebrew, the main text keeps 'nation' and the
    footnote notes the New Testament application.
  doctrine_reference: Translation philosophy §1, §3, §5
