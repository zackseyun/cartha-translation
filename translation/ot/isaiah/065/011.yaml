theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether גַּד and מְנִי are translated by meaning or transliterated as names
  chosen_reading: Transliterate as Gad and Meni in the main text
  alternative_readings:
  - Fortune and Destiny
  rationale: These are best read as names of deities or personified powers. The project philosophy says to translate titles but transliterate names. Because their semantic associations are important for understanding the polemic, the alternatives are preserved in footnotes.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; §3
