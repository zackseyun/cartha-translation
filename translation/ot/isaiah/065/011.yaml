id: ISA.65.11
reference: Isaiah 65:11
source:
  edition: WLC
  text: וְ/אַתֶּם֙ עֹזְבֵ֣י יְהוָ֔ה הַ/שְּׁכֵחִ֖ים אֶת הַ֣ר קָדְשִׁ֑/י הַֽ/עֹרְכִ֤ים לַ/גַּד֙ שֻׁלְחָ֔ן וְ/הַֽ/מְמַלְאִ֖ים לַ/מְנִ֥י מִמְסָֽךְ־׃
translation:
  text: But you are those who forsake Yahweh, who forget my holy mountain, who set a table for Gad, and who fill mixed wine for Meni.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gad was likely the name of a deity associated with fortune; alternatively, 'for Fortune.'
    reason: alternative_reading
  - marker: b
    text: Meni was likely the name of a deity associated with destiny; alternatively, 'for Destiny.'
    reason: alternative_reading
  - marker: c
    text: Or 'mixed drink'; the phrase refers to a prepared libation beverage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  chosen: But you
  alternatives:
  - And you
  - But as for you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrast with the preceding context; 'But you' captures the adversative force naturally in English.
- source_word: עֹזְבֵי
  chosen: those who forsake
  alternatives:
  - those who abandon
  - forsakers of
  lexicon: HALOT
  rationale: The participle functions substantivally, describing the addressed group. 'Forsake' is a standard and weighty rendering for עזב in covenantal contexts.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַשְּׁכֵחִים
  chosen: who forget
  alternatives:
  - who are forgetting
  - who neglect
  lexicon: HALOT
  rationale: The participle continues the description of the same group. 'Forget' best matches the plain sense without softening it to mere neglect.
- source_word: אֶת הַר קָדְשִׁי
  chosen: my holy mountain
  alternatives:
  - the mountain of my holiness
  - my sacred mountain
  lexicon: HALOT
  rationale: This idiom refers to Zion as the LORD's consecrated mountain. 'My holy mountain' is both literal and idiomatic in English.
- source_word: הָעֹרְכִים
  chosen: who set
  alternatives:
  - who arrange
  - who prepare
  lexicon: HALOT
  rationale: With 'table' as object, ערך commonly means to set out or arrange. 'Set a table' is the most natural English collocation.
- source_word: לַגַּד
  chosen: for Gad
  alternatives:
  - for Fortune
  lexicon: HALOT
  rationale: גד here is best taken as the proper name of a deity associated with fortune. Following the philosophy to transliterate names, the main text keeps 'Gad'; the likely sense is preserved in a footnote.
- source_word: שֻׁלְחָן
  chosen: a table
  alternatives:
  - the table
  lexicon: HALOT
  rationale: English idiom prefers the indefinite expression 'set a table' in this cultic context, even though Hebrew lacks the article here.
- source_word: וְהַמְמַלְאִים
  chosen: and who fill
  alternatives:
  - and who pour out
  - and who mix and pour
  lexicon: HALOT
  rationale: The verb literally means 'fill'; in context it refers to filling a libation vessel. Retaining 'fill' stays close to the Hebrew while remaining intelligible.
- source_word: לַמְנִי
  chosen: for Meni
  alternatives:
  - for Destiny
  lexicon: HALOT
  rationale: מני is best understood as the proper name of a deity associated with destiny. Per translation philosophy, names are transliterated in the main text; the semantic alternative is preserved in a footnote.
- source_word: מִמְסָךְ
  chosen: mixed wine
  alternatives:
  - a drink offering
  - spiced wine
  - mixed drink
  lexicon: HALOT
  rationale: The noun denotes a mixed drink, often wine prepared for drinking or libation. 'Mixed wine' is specific enough to convey the cultic beverage without overinterpreting the ritual act.
