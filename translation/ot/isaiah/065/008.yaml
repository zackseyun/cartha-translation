id: ISA.65.8
reference: Isaiah 65:8
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה כַּ/אֲשֶׁ֨ר יִמָּצֵ֤א הַ/תִּירוֹשׁ֙ בָּֽ/אֶשְׁכּ֔וֹל
    וְ/אָמַר֙ אַל תַּשְׁחִיתֵ֔/הוּ כִּ֥י בְרָכָ֖ה בּ֑/וֹ כֵּ֤ן אֶֽעֱשֶׂה֙ לְמַ֣עַן
    עֲבָדַ֔/י לְ/בִלְתִּ֖י הַֽשְׁחִ֥ית הַ/כֹּֽל׀־׃
translation:
  text: 'Thus says the LORD: As when new wine is found in a cluster, and one says,
    ‘Do not destroy it, for there is a blessing in it,’ so I will act for the sake
    of my servants, so as not to destroy them all.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wine' or 'fresh wine'; Hebrew תִּירוֹשׁ refers specifically to new wine.
    reason: lexical_alternative
  - marker: b
    text: Literally 'not to destroy all'; the Hebrew leaves the object implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the LXX pattern.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic formula; 'Thus says' preserves the formal prophetic
    register without sounding archaic beyond normal biblical English.
- source_word: כַּאֲשֶׁר
  chosen: As when
  alternatives:
  - Just as
  - As
  lexicon: HALOT
  rationale: Introduces a comparison rather than a strict temporal clause alone; 'As
    when' naturally sets up the analogy completed by כֵּן.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  - grape juice
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly denotes fresh/new wine rather than generic wine. 'New
    wine' best preserves the lexical distinction and the agricultural imagery.
- source_word: אֶשְׁכּוֹל
  chosen: cluster
  alternatives:
  - grape cluster
  - bunch
  lexicon: HALOT
  rationale: The word denotes a cluster, here clearly of grapes from context. 'Cluster'
    is concise and idiomatic; 'grape cluster' is possible but slightly redundant with
    the wine imagery.
- source_word: וְאָמַר
  chosen: and one says
  alternatives:
  - and he says
  - and someone says
  lexicon: HALOT
  rationale: The Hebrew uses a singular verb with an indefinite subject. English commonly
    supplies an indefinite subject; 'one says' preserves the generic sense without
    over-specifying.
- source_word: אַל תַּשְׁחִיתֵהוּ
  chosen: Do not destroy it
  alternatives:
  - Do not ruin it
  - Do not spoil it
  lexicon: HALOT
  rationale: The verb שׁחת in this context means to destroy/ruin. 'Destroy' also anticipates
    the repeated הַשְׁחִית later in the verse, preserving lexical consistency.
- source_word: כִּי בְרָכָה בּוֹ
  chosen: for there is a blessing in it
  alternatives:
  - for blessing is in it
  - for it contains a blessing
  lexicon: HALOT
  rationale: This keeps the concrete theological language of 'blessing' while rendering
    the clause in natural English.
- source_word: כֵּן אֶעֱשֶׂה
  chosen: so I will act
  alternatives:
  - so I will do
  - thus I will do
  lexicon: HALOT
  rationale: The idiom marks the application of the analogy. 'Act' is slightly more
    idiomatic in English here while still faithful to עשה.
- source_word: לְמַעַן עֲבָדַי
  chosen: for the sake of my servants
  alternatives:
  - because of my servants
  - on account of my servants
  lexicon: HALOT
  rationale: לְמַעַן expresses purpose or regard; 'for the sake of' captures divine
    regard and motivation. עֲבָדַי is best rendered 'my servants' here, since bonded
    status is not the salient point in this prophetic context.
- source_word: לְבִלְתִּי הַשְׁחִית הַכֹּל
  chosen: so as not to destroy them all
  alternatives:
  - so as not to destroy everything
  - without destroying all of it
  lexicon: HALOT
  rationale: Although הַכֹּל literally means 'the whole/all,' the context is God's
    treatment of the people for the sake of his servants. English requires an explicit
    object; 'them all' best reflects the implied referent and the sense that God will
    not wipe out the entire group.
