theological_decisions:
- issue: Referent of 'all' in the final clause
  chosen_reading: 'The implied object is the people/group under judgment: ''not to
    destroy them all.'''
  alternative_readings:
  - not to destroy everything
  - not to destroy it all
  rationale: The vineyard/grape image is analogical, but the application concerns
    God's people, especially in relation to 'my servants.' Rendering the implied object
    as personal in English clarifies the sense without adding a new doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence with documented rationale.
