id: ISA.65.17
reference: Isaiah 65:17
source:
  edition: WLC
  text: כִּֽי הִנְ/נִ֥י בוֹרֵ֛א שָׁמַ֥יִם חֲדָשִׁ֖ים וָ/אָ֣רֶץ חֲדָשָׁ֑ה וְ/לֹ֤א תִזָּכַ֨רְנָה֙
    הָ/רִ֣אשֹׁנ֔וֹת וְ/לֹ֥א תַעֲלֶ֖ינָה עַל לֵֽב־־׃
translation:
  text: For look, I am creating new heavens and a new earth; and the former things
    will not be remembered, nor will they come to mind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the former things will not be recalled.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'nor will they come up upon the heart,' an idiom meaning 'nor
      will they come to mind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For behold
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding context. 'For'
    preserves the causal/explanatory force better than omitting it.
- source_word: הִנְנִי
  chosen: look, I am
  alternatives:
  - behold, I
  - here I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is deictic and attention-getting.
    'Look' gives readable modern English while preserving the force of 'behold'; 'I
    am' carries the present, emphatic self-reference.
- source_word: בוֹרֵא
  chosen: creating
  alternatives:
  - about to create
  - create
  lexicon: HALOT
  rationale: The participle presents YHWH as engaged in or certainly undertaking the
    action. 'I am creating' reflects the participial aspect in natural English better
    than a simple future, while still fitting the prophetic announcement.
- source_word: שָׁמַיִם חֲדָשִׁים
  chosen: new heavens
  alternatives:
  - new skies
  lexicon: HALOT
  rationale: '''Heavens'' is the standard rendering for שָׁמַיִם in cosmic-creation
    contexts and preserves the canonical resonance echoed in later Scripture. ''Skies''
    would be too narrow here.'
- source_word: וָאָרֶץ חֲדָשָׁה
  chosen: and a new earth
  alternatives:
  - and a new land
  lexicon: HALOT
  rationale: In parallel with 'new heavens,' אֶרֶץ here is cosmic rather than merely
    territorial, so 'earth' is the best rendering.
- source_word: הָרִאשֹׁנוֹת
  chosen: the former things
  alternatives:
  - the former ones
  - the earlier things
  lexicon: HALOT
  rationale: The feminine plural adjective functions substantivally. 'Former things'
    is idiomatic and broad enough to cover the prior order of things without over-specifying.
- source_word: תִזָּכַרְנָה
  chosen: will not be remembered
  alternatives:
  - will not be recalled
  - will not be brought to remembrance
  lexicon: HALOT
  rationale: The Niphal form is naturally rendered as passive/reflexive. 'Will not
    be remembered' is clear, idiomatic, and preserves the sense without unnecessary
    expansion.
- source_word: תַעֲלֶינָה עַל לֵב
  chosen: will they come to mind
  alternatives:
  - will they arise upon the heart
  - will they come up on the heart
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of coming up upon the heart. In English,
    'come to mind' best conveys the idiomatic sense while remaining faithful to the
    meaning.
