theological_decisions:
- issue: Cosmic scope of the promised renewal
  chosen_reading: The verse speaks of 'new heavens and a new earth' in full cosmic
    terms, without reducing it to merely political restoration.
  alternative_readings:
  - A primarily metaphorical description of post-exilic restoration
  rationale: The paired expression 'heavens and earth' is a creation formula in Hebrew
    Bible usage. The translation preserves that breadth and does not narrow the promise
    beyond what the text states, while also not forcing a detailed eschatological
    system onto the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
