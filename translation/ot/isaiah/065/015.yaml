id: ISA.65.15
reference: Isaiah 65:15
source:
  edition: WLC
  text: וְ/הִנַּחְתֶּ֨ם שִׁמְ/כֶ֤ם לִ/שְׁבוּעָה֙ לִ/בְחִירַ֔/י וֶ/הֱמִיתְ/ךָ֖ אֲדֹנָ֣/י
    יְהוִ֑ה וְ/לַ/עֲבָדָ֥י/ו יִקְרָ֖א שֵׁ֥ם אַחֵֽר׃
translation:
  text: You will leave your name as a curse for my chosen ones, and the Lord GOD will
    put you to death; but to his servants he will call another name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for an oath'—that is, your name will be used in a spoken curse-formula.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will give his servants another name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנַּחְתֶּם
  chosen: you will leave
  alternatives:
  - you will abandon
  - you will set down
  lexicon: HALOT
  rationale: From נוח/הניח in the Hiphil, here with 'name' as object, the sense is
    to leave behind or leave as something. 'You will leave' is idiomatic and fits
    the following predicate 'as a curse.'
- source_word: שִׁמְכֶם
  chosen: your name
  lexicon: HALOT
  rationale: Straightforward rendering of 'name,' which in context signifies reputation/designation
    left behind for later use.
- source_word: לִשְׁבוּעָה
  chosen: as a curse
  alternatives:
  - for an oath
  - as an oath-formula
  lexicon: HALOT
  rationale: Although שְׁבוּעָה often means 'oath,' in judgment contexts it can denote
    a curse-formula invoked in swearing ('may one become like X'). English 'as a curse'
    best conveys the idiomatic force here. The more literal 'for an oath' is preserved
    in a footnote.
- source_word: לִבְחִירַי
  chosen: for my chosen ones
  alternatives:
  - for my chosen
  lexicon: HALOT
  rationale: Plural with first-person singular suffix. 'Chosen ones' is natural English
    and preserves the substantive adjectival force.
- source_word: וֶהֱמִיתְךָ
  chosen: will put you to death
  alternatives:
  - will slay you
  - will kill you
  lexicon: HALOT
  rationale: Hiphil of מות is causative. 'Put you to death' carries the judicial-divine
    judgment sense better than the blunter 'kill.'
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Following project doctrine, יְהוָה is rendered 'the LORD.' In the compound
    אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering 'the
    Lord GOD,' which preserves both titles intelligibly.
- source_word: וְלַעֲבָדָיו
  chosen: but to his servants
  alternatives:
  - and to his servants
  - but for his servants
  lexicon: HALOT
  rationale: The conjunction marks contrast with the fate of the judged group. 'But
    to his servants' makes the adversative sense explicit in English. 'Servants' is
    preferred here over 'slaves' because bonded status is not the salient point in
    this immediate contrast; covenantal belonging and service are.
- source_word: יִקְרָא שֵׁם אַחֵר
  chosen: he will call another name
  alternatives:
  - he will give another name
  - he will call by another name
  lexicon: HALOT
  rationale: Literally 'he will call another name.' In English this is somewhat awkward,
    but retaining 'call' stays closer to the Hebrew while remaining understandable.
    The sense is best understood as assigning a new designation to his servants.
