id: ISA.65.23
reference: Isaiah 65:23
source:
  edition: WLC
  text: לֹ֤א יִֽיגְעוּ֙ לָ/רִ֔יק וְ/לֹ֥א יֵלְד֖וּ לַ/בֶּהָלָ֑ה כִּ֣י זֶ֜רַע בְּרוּכֵ֤י יְהוָה֙ הֵ֔מָּה וְ/צֶאֱצָאֵי/הֶ֖ם אִתָּֽ/ם׃
translation:
  text: They will not labor for emptiness, nor bear children for calamity, for they are the offspring of those blessed by Yahweh, and their descendants with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for terror' or 'for sudden disaster.' The Hebrew term can carry the sense of panic, terror, or calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִיגְעוּ
  chosen: will labor
  alternatives:
  - will toil
  - will work hard
  lexicon: HALOT
  rationale: יגע commonly denotes laboring or toiling with exertion. 'Labor' is natural modern English and preserves the sense of strenuous effort without overinterpreting the kind of work.
- source_word: לָרִיק
  chosen: for emptiness
  alternatives:
  - in vain
  - for nothing
  lexicon: HALOT
  rationale: רִיק denotes emptiness, vanity, or something coming to nothing. 'For emptiness' stays close to the Hebrew image; 'in vain' is idiomatic but slightly more interpretive. The phrase communicates futile, fruitless labor.
- source_word: יֵלְדוּ
  chosen: bear children
  alternatives:
  - give birth
  - beget
  lexicon: HALOT
  rationale: ילד here refers to producing offspring. 'Bear children' is idiomatic in English and fits the plural subject in a family/community promise context better than the more clinical 'give birth' or the male-skewed 'beget'.
- source_word: לַבֶּהָלָה
  chosen: for calamity
  alternatives:
  - for terror
  - for sudden disaster
  - for trouble
  lexicon: HALOT
  rationale: בֶּהָלָה can denote terror, panic, or sudden ruin/disaster. In this context of children not being born only to suffer abrupt destruction, 'for calamity' best captures the outcome-oriented sense in readable English. The nuance of terror/disaster is worth preserving in a footnote.
- source_word: זֶרַע
  chosen: the offspring
  alternatives:
  - seed
  - descendants
  lexicon: HALOT
  rationale: זֶרַע literally means 'seed' but often refers to offspring or descendants. Here, because a second offspring term follows, 'offspring' avoids wooden repetition while preserving the familial sense.
- source_word: בְּרוּכֵי יְהוָה
  chosen: those blessed by the LORD
  alternatives:
  - the blessed of the LORD
  - those blessed of the LORD
  lexicon: HALOT
  rationale: The passive participial construction identifies them as people blessed by YHWH. Per doctrine, יְהוָה is rendered 'the LORD.' 'Those blessed by the LORD' is clear modern English.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they themselves are
  lexicon: HALOT
  rationale: The pronoun is emphatic. English can reflect this adequately with explicit 'they are' without forcing extra emphasis unless needed for style.
- source_word: וְצֶאֱצָאֵיהֶם
  chosen: and their descendants
  alternatives:
  - and their offspring
  - and their children
  lexicon: HALOT
  rationale: צֶאֱצָאִים refers to descendants/issue. 'Descendants' distinguishes it from the earlier זֶרַע while keeping the generational promise.
- source_word: אִתָּם
  chosen: with them
  alternatives:
  - along with them
  lexicon: HALOT
  rationale: The phrase most naturally indicates the descendants' continued presence with them, underscoring enduring family continuity rather than loss.
