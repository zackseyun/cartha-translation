id: ISA.65.22
reference: Isaiah 65:22
source:
  edition: WLC
  text: לֹ֤א יִבְנוּ֙ וְ/אַחֵ֣ר יֵשֵׁ֔ב לֹ֥א יִטְּע֖וּ וְ/אַחֵ֣ר יֹאכֵ֑ל כִּֽי כִ/ימֵ֤י
    הָ/עֵץ֙ יְמֵ֣י עַמִּ֔/י וּ/מַעֲשֵׂ֥ה יְדֵי/הֶ֖ם יְבַלּ֥וּ בְחִירָֽ/י־׃
translation:
  text: They will not build and another inhabit; they will not plant and another eat.
    For the days of my people will be like the days of a tree, and my chosen ones
    will fully enjoy the work of their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'my chosen ones will wear out/use up the work of their
      hands,' that is, they will enjoy it for its full duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִבְנוּ
  chosen: they will build
  alternatives:
  - they build
  lexicon: HALOT
  rationale: Qal imperfect 3mp of בנה in a future/restorative context; rendered as
    simple future in English.
- source_word: וְאַחֵר יֵשֵׁב
  chosen: and another inhabit
  alternatives:
  - and another live in it
  - and another dwell
  lexicon: HALOT
  rationale: יָשַׁב commonly means sit, dwell, inhabit. Here with the implied house/object
    from 'build,' 'inhabit' is concise and idiomatic, preserving the injustice reversal
    motif.
- source_word: יִטְּעוּ
  chosen: they will plant
  alternatives:
  - they plant
  lexicon: HALOT
  rationale: Qal imperfect 3mp of נטע, straightforwardly 'plant' in the future sense.
- source_word: וְאַחֵר יֹאכֵל
  chosen: and another eat
  alternatives:
  - and another consume
  lexicon: HALOT
  rationale: אָכַל is the ordinary verb 'eat.' The object is implied from what is
    planted, likely produce/vineyard fruit.
- source_word: כִּי כִימֵי הָעֵץ
  chosen: For the days of a tree
  alternatives:
  - For like the days of the tree
  - For like tree-days
  lexicon: HALOT
  rationale: The comparative כ plus ימי yields 'like/as the days of.' The singular
    with article, 'the tree,' can function generically; English idiom prefers 'a tree'
    to express the class generically.
- source_word: יְמֵי עַמִּי
  chosen: the days of my people
  lexicon: HALOT
  rationale: Construct chain rendered directly; no need to paraphrase.
- source_word: וּמַעֲשֵׂה יְדֵיהֶם
  chosen: the work of their hands
  alternatives:
  - what their hands have made
  - the product of their hands
  lexicon: HALOT
  rationale: Common Hebrew idiom for one's labor or its product. Traditional and clear
    in English.
- source_word: יְבַלּוּ
  chosen: will fully enjoy
  alternatives:
  - will wear out
  - will use up
  - will long enjoy
  lexicon: HALOT
  rationale: Piel of בלה literally can mean wear out/use up. In this context of blessing,
    the sense is that the chosen ones will live long enough to enjoy to the full the
    fruit of their labor, not that the work itself decays. 'Fully enjoy' communicates
    the idiomatic force in context.
- source_word: בְּחִירָי
  chosen: my chosen ones
  alternatives:
  - my elect
  lexicon: HALOT
  rationale: Plural adjective/substantive from בחר, 'chosen ones.' 'Elect' is possible
    but more theologically loaded in English than the Hebrew here requires.
