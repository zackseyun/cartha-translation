theological_decisions:
- issue: Sense of יְבַלּוּ in an eschatological blessing context
  chosen_reading: Rendered idiomatically as 'will fully enjoy' rather than a more
    literal 'will wear out/use up.'
  alternative_readings:
  - will wear out
  - will use up
  rationale: The verse promises security and lasting enjoyment of one's own labor.
    A strictly literal rendering could mislead modern readers into thinking the labor
    itself is worn out rather than enjoyed over a long life. The chosen rendering
    preserves the blessing motif without importing extra doctrine.
  doctrine_reference: 'Translation philosophy #1, #5, #6'
