id: ISA.65.12
reference: Isaiah 65:12
source:
  edition: WLC
  text: וּ/מָנִ֨יתִי אֶתְ/כֶ֜ם לַ/חֶ֗רֶב וְ/כֻלְּ/כֶם֙ לַ/טֶּ֣בַח תִּכְרָ֔עוּ יַ֤עַן
    קָרָ֨אתִי֙ וְ/לֹ֣א עֲנִיתֶ֔ם דִּבַּ֖רְתִּי וְ/לֹ֣א שְׁמַעְתֶּ֑ם וַ/תַּעֲשׂ֤וּ
    הָ/רַע֙ בְּ/עֵינַ֔/י וּ/בַ/אֲשֶׁ֥ר לֹֽא חָפַ֖צְתִּי בְּחַרְתֶּֽם־׃פ
translation:
  text: And I will destine you for the sword, and all of you will bow down for the
    slaughter, because I called and you did not answer; I spoke and you did not listen.
    But you did what was evil in my eyes, and chose what I did not delight in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will appoint you' or 'I will number you.' The Hebrew verb also allows
      a wordplay with the 'god of Destiny' in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'will kneel' or 'will crouch.' The Hebrew verb literally refers to bending
      the knee; here it depicts collapse under judgment.
    reason: lexical_alternative
  - marker: c
    text: Or 'you did not hear' or, by implication, 'you did not obey.'
    reason: lexical_alternative
  - marker: d
    text: Or 'chose what I did not desire' / 'what I took no pleasure in.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָנִיתִי
  chosen: I will destine
  alternatives:
  - I will number
  - I will appoint
  lexicon: HALOT
  rationale: From מנה in a causative/appointing sense here, with wordplay against
    the immediately preceding context about 'Destiny/Fate' in Isa 65:11. 'Destine'
    preserves both the appointing sense and the ironic judgment nuance better than
    the more wooden 'number.' Future English fits the prophetic perfect in context.
- source_word: לַחֶרֶב
  chosen: for the sword
  alternatives:
  - to the sword
  lexicon: HALOT
  rationale: Standard idiom for being handed over to death by warfare/execution. 'For
    the sword' pairs naturally with 'destine' and preserves the Hebrew preposition
    without over-paraphrase.
- source_word: לַטֶּבַח
  chosen: for the slaughter
  alternatives:
  - to the slaughter
  - for slaughter
  lexicon: HALOT
  rationale: טבח denotes slaughter/slaying. The definite article is retained in English
    idiomatically as 'the slaughter,' giving the line a formal parallel with 'for
    the sword.'
- source_word: תִּכְרָעוּ
  chosen: will bow down
  alternatives:
  - will kneel
  - will crouch
  lexicon: HALOT
  rationale: כרע literally means bend the knee/bow down. In this judgment context
    it likely implies collapse before death, but 'bow down' keeps the concrete image
    without importing an interpretation.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of
  lexicon: HALOT
  rationale: Causal conjunction introducing the grounds for judgment.
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I summoned
  lexicon: HALOT
  rationale: Simple and direct; preserves the relational and covenantal force of divine
    appeal.
- source_word: עֲנִיתֶם
  chosen: you did not answer
  alternatives:
  - you did not respond
  lexicon: HALOT
  rationale: ענה here is response to a call. 'Answer' matches the call/answer pairing
    in English.
- source_word: דִּבַּרְתִּי
  chosen: I spoke
  alternatives:
  - I spoke to you
  lexicon: HALOT
  rationale: The object is implicit; concise English preserves the Hebrew rhythm.
- source_word: שְׁמַעְתֶּם
  chosen: you did not listen
  alternatives:
  - you did not hear
  - you did not obey
  lexicon: HALOT
  rationale: שמע can mean hear/obey, but in parallel with 'I spoke' the sense 'listen'
    best captures culpable refusal without over-specifying obedience.
- source_word: וַתַּעֲשׂוּ הָרַע בְּעֵינַי
  chosen: you did what was evil in my eyes
  alternatives:
  - you did evil in my sight
  - you did the evil in my eyes
  lexicon: HALOT
  rationale: Common Hebrew idiom for conduct judged evil by God. 'What was evil in
    my eyes' is readable modern English while preserving the evaluative metaphor.
- source_word: וּבַאֲשֶׁר לֹא חָפַצְתִּי בְּחַרְתֶּם
  chosen: and chose what I did not delight in
  alternatives:
  - and chose what I did not desire
  - and chose that in which I took no pleasure
  lexicon: HALOT
  rationale: חפץ conveys delight/desire/pleasure. 'Did not delight in' is natural
    English and preserves the personal, volitional dimension of God's disapproval.
    'What' renders the relative construction idiomatically.
