theological_decisions:
- issue: Rendering of divine judgment language without softening or over-interpreting
  chosen_reading: 'Direct judicial language: ''I will destine you for the sword ...
    all of you will bow down for the slaughter'''
  alternative_readings:
  - I will number you to the sword
  - all of you will kneel down to the slaughter
  rationale: The verse presents God's active judgment in response to persistent refusal.
    The translation preserves that force while avoiding paraphrastic expansions about
    predestination or military defeat that the Hebrew does not explicitly state.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sense of שמע in the clause 'I spoke and you did not listen'
  chosen_reading: '''listen'' rather than ''obey'''
  alternative_readings:
  - hear
  - obey
  rationale: Theologically, using 'obey' could be defensible, but the immediate parallel
    is auditory/receptive ('I called ... I spoke'). 'Listen' preserves the text's
    stated accusation and leaves the obedience implication implicit rather than resolved
    in translation.
  doctrine_reference: Translation philosophy §3
