id: ISA.65.13
reference: Isaiah 65:13
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהוִ֗ה הִנֵּ֨ה עֲבָדַ֤/י יֹאכֵ֨לוּ֙ וְ/אַתֶּ֣ם תִּרְעָ֔בוּ הִנֵּ֧ה עֲבָדַ֛/י יִשְׁתּ֖וּ וְ/אַתֶּ֣ם תִּצְמָ֑אוּ הִנֵּ֧ה עֲבָדַ֛/י יִשְׂמָ֖חוּ וְ/אַתֶּ֥ם תֵּבֹֽשׁוּ־׀׀׃
translation:
  text: 'Therefore this is what the Lord GOD says: Look, my servants will eat, but you will be hungry; look, my servants will drink, but you will be thirsty; look, my servants will rejoice, but you will be put to shame.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''my servants.'' The term can also be rendered ''my slaves,'' but here ''servants'' better fits the context of those who belong to and serve God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be ashamed.' The Hebrew can denote either experiencing shame or being put to shame/disgraced; the latter was chosen to fit the judgment context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding indictment to the announced contrast in judgment and blessing. 'Therefore' preserves the formal inferential force in natural English.
- source_word: כֹּה אָמַר
  chosen: this is what ... says
  alternatives:
  - thus says
  - so says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'This is what ... says' is slightly more natural in modern English than 'thus says' while preserving the formulaic force.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Renders the title-plus-divine-name combination in conventional English. Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' and uses 'Lord GOD' to represent the underlying Hebrew reverently and intelligibly.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to each contrast. 'Look' preserves the emphatic, attention-getting force in readable modern English better than archaic 'Behold.'
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here the emphasis is on belonging to and serving God rather than on bonded-status imagery. 'My servants' is the more natural and contextually fitting rendering in this prophetic contrast.
- source_word: יֹאכֵלוּ
  chosen: will eat
  alternatives:
  - shall eat
  lexicon: HALOT
  rationale: Simple imperfect indicating future consequence. 'Will eat' is straightforward modern English.
- source_word: תִּרְעָבוּ
  chosen: will be hungry
  alternatives:
  - will hunger
  - will go hungry
  lexicon: HALOT
  rationale: The verb denotes being hungry or suffering hunger. 'Will be hungry' is idiomatic and preserves the contrast with 'will eat.'
- source_word: יִשְׁתּוּ
  chosen: will drink
  alternatives:
  - shall drink
  lexicon: HALOT
  rationale: Simple future in parallel with 'will eat.'
- source_word: תִּצְמָאוּ
  chosen: will be thirsty
  alternatives:
  - will thirst
  lexicon: HALOT
  rationale: The verb means to thirst. 'Will be thirsty' is the most natural modern equivalent and matches the concrete contrast with 'will drink.'
- source_word: יִשְׂמָחוּ
  chosen: will rejoice
  alternatives:
  - will be glad
  - will be joyful
  lexicon: HALOT
  rationale: The verb denotes joy/gladness. 'Will rejoice' preserves the elevated prophetic tone and the active expression of joy.
- source_word: תֵּבֹשׁוּ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disgraced
  lexicon: HALOT
  rationale: בוש can mean feel shame or be shamed/disgraced. In this judgment context, 'will be put to shame' best captures the resultative/passive sense and the public reversal implied by the contrast.
- source_word: וְאַתֶּם
  chosen: but you
  alternatives:
  - and you
  lexicon: HALOT
  rationale: Though the conjunction is formally 'and,' the repeated structure is strongly adversative in context, contrasting the fate of God's servants with that of the addressed rebels. 'But you' makes the contrast explicit in idiomatic English.
