theological_decisions:
- issue: Personification of Jerusalem in the feminine pronoun
  chosen_reading: Retain 'in her' for Jerusalem
  alternative_readings:
  - in it
  rationale: The Hebrew feminine singular pronoun refers to Jerusalem and reflects
    the common personification of the city. Preserving this in English maintains the
    literary texture without importing additional theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering two near-synonymous joy verbs distinctly
  chosen_reading: Use 'rejoice' and 'delight'
  alternative_readings:
  - Use 'rejoice' for both verbs
  - Use 'exult' and 'rejoice'
  rationale: The verse uses two related but distinct Hebrew verbs for divine joy.
    Differentiating them in English preserves the poetic fullness of the line while
    remaining readable.
  doctrine_reference: Translation philosophy §5, §6
