id: ISA.65.19
reference: Isaiah 65:19
source:
  edition: WLC
  text: וְ/גַלְתִּ֥י בִ/ירוּשָׁלִַ֖ם וְ/שַׂשְׂתִּ֣י בְ/עַמִּ֑/י וְ/לֹֽא יִשָּׁמַ֥ע
    בָּ/הּ֙ ע֔וֹד ק֥וֹל בְּכִ֖י וְ/ק֥וֹל זְעָקָֽה־׃
translation:
  text: I will rejoice in Jerusalem and delight in my people; no longer will the sound
    of weeping be heard in her, or the sound of crying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over Jerusalem' and 'over my people.' The Hebrew preposition is literally
      'in,' but some translations take it in a more relational sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in her,' referring to Jerusalem as a feminine city.
    reason: lexical_alternative
  - marker: c
    text: Or 'the sound of an outcry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַלְתִּי
  chosen: I will rejoice
  alternatives:
  - I will exult
  - I will be glad
  lexicon: HALOT
  rationale: The verb גיל conveys rejoicing/exultation. 'Rejoice' is natural modern
    English and fits the divine first-person declaration without sounding overly elevated.
    Future sense is appropriate in context, despite the qatal form, because the surrounding
    new-creation promises are prospective.
- source_word: בִירוּשָׁלִַם
  chosen: in Jerusalem
  alternatives:
  - over Jerusalem
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in,' and the phrase is best rendered
    locatively here. While some English versions use 'over Jerusalem' to express the
    object of joy, the Hebrew preposition more directly supports 'in Jerusalem,' with
    the sense that God's rejoicing is centered there.
- source_word: וְשַׂשְׂתִּי
  chosen: and delight
  alternatives:
  - and be glad
  - and rejoice
  lexicon: HALOT
  rationale: 'שׂושׂ overlaps with גיל but is not identical; rendering it as ''delight''
    preserves some lexical distinction while remaining idiomatic. The first-person
    future sense is carried over from the prophetic context: ''I will ... and delight
    ...''.'
- source_word: בְעַמִּי
  chosen: in my people
  alternatives:
  - over my people
  lexicon: HALOT
  rationale: As with 'in Jerusalem,' the preposition ב is retained as 'in' rather
    than interpreted more freely as 'over.' In English, 'delight in my people' is
    idiomatic and communicates affectionate pleasure without over-paraphrasing.
- source_word: יִשָּׁמַע
  chosen: be heard
  alternatives:
  - be listened to
  lexicon: HALOT
  rationale: 'The Niphal of שׁמע here is naturally passive: ''be heard.'' This is
    the standard and clearest English equivalent in a statement about sounds no longer
    occurring.'
- source_word: בָּהּ
  chosen: in her
  alternatives:
  - in it
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring back to Jerusalem, which
    is grammatically feminine. 'In her' preserves the personified-city imagery better
    than the impersonal 'in it.'
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - anymore
  - again
  lexicon: HALOT
  rationale: With the negation, עוֹד expresses cessation from this point onward. 'No
    longer' is the most natural English rendering in elevated but readable style.
- source_word: קוֹל בְּכִי
  chosen: the sound of weeping
  alternatives:
  - the voice of weeping
  - the sound of crying
  lexicon: HALOT
  rationale: קוֹל is broadly 'sound/voice.' With בְּכִי ('weeping'), 'the sound of
    weeping' is idiomatic and preserves the auditory emphasis of the Hebrew.
- source_word: וְקוֹל זְעָקָה
  chosen: or the sound of crying
  alternatives:
  - or the sound of an outcry
  - or the sound of distress
  lexicon: HALOT
  rationale: זְעָקָה often denotes a cry, outcry, or distress call. 'Crying' works
    well in parallel with 'weeping' while still suggesting anguished lament. 'Outcry'
    is possible but sounds less natural in this context.
