theological_decisions:
- issue: Prophetic verbal aspect
  chosen_reading: Render the Hebrew perfects as future promises
  alternative_readings:
  - Render as simple pasts
  - Render with English present perfects
  rationale: In this restoration context, the sequence describes what God's people
    will experience in the renewed future, not past actions. English future communicates
    the prophetic force without obscuring the Hebrew verbal form.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
