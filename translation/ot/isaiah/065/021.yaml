id: ISA.65.21
reference: Isaiah 65:21
source:
  edition: WLC
  text: וּ/בָנ֥וּ בָתִּ֖ים וְ/יָשָׁ֑בוּ וְ/נָטְע֣וּ כְרָמִ֔ים וְ/אָכְל֖וּ פִּרְיָֽ/ם׃
translation:
  text: They will build houses and live in them; they will plant vineyards and eat
    their fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'inhabit them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their fruit,' referring to the vineyards.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  chosen: they will build
  alternatives:
  - and they built
  - they shall build
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futuristically in sequence; English future best reflects the promise context.
    'Build' is the plain sense of בנה.
- source_word: בָתִּים
  chosen: houses
  alternatives:
  - homes
  lexicon: HALOT
  rationale: Literal plural of בית. 'Houses' preserves the concrete image; 'homes'
    would add affective nuance not explicit in the Hebrew.
- source_word: וְיָשָׁבוּ
  chosen: live in them
  alternatives:
  - inhabit them
  - sit/dwell in them
  lexicon: HALOT
  rationale: ישב commonly means dwell/live. Because English normally requires an object
    here after 'houses,' 'live in them' is more natural than the more formal 'inhabit
    them,' while preserving the sense.
- source_word: וְנָטְעוּ
  chosen: they will plant
  alternatives:
  - and they planted
  - they shall plant
  lexicon: HALOT
  rationale: נטע means plant. As with the surrounding verbs, the prophetic perfect
    is best rendered as future in English.
- source_word: כְרָמִים
  chosen: vineyards
  alternatives:
  - vines
  lexicon: HALOT
  rationale: כרמים denotes vineyards, not merely individual vines. The plural is retained.
- source_word: וְאָכְלוּ
  chosen: eat
  alternatives:
  - enjoy
  - consume
  lexicon: HALOT
  rationale: אכל literally means eat. 'Enjoy' is interpretive and broader than the
    source; 'eat' keeps the concrete result of possessing the produce.
- source_word: פִּרְיָם
  chosen: their fruit
  alternatives:
  - their produce
  - the fruit of them
  lexicon: HALOT
  rationale: פרי is fruit/produce. 'Their fruit' is a natural rendering with the 3mp
    suffix referring to the vineyards. 'Produce' is possible but less vivid and less
    directly tied to vineyard imagery.
