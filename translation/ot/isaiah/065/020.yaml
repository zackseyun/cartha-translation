id: ISA.65.20
reference: Isaiah 65:20
source:
  edition: WLC
  text: לֹא יִֽהְיֶ֨ה מִ/שָּׁ֜ם ע֗וֹד ע֤וּל יָמִים֙ וְ/זָקֵ֔ן אֲשֶׁ֥ר לֹֽא יְמַלֵּ֖א
    אֶת יָמָ֑י/ו כִּ֣י הַ/נַּ֗עַר בֶּן מֵאָ֤ה שָׁנָה֙ יָמ֔וּת וְ/הַ֣/חוֹטֶ֔א בֶּן
    מֵאָ֥ה שָׁנָ֖ה יְקֻלָּֽל־־־־־׃
translation:
  text: No more shall there be from there an infant of days, or an old man who does
    not fill out his days; for the youth will die a hundred years old, and the sinner
    a hundred years old will be accursed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'an infant who lives only a few days.' The Hebrew literally says 'an
      infant of days.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'an old man who does not live out his days.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'the sinner a hundred years old will be cursed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - there
  lexicon: HALOT
  rationale: The preposition מִן is explicit in the Hebrew. Rendering it as 'from
    there' preserves the source form, though idiomatic English could simply say 'there.'
- source_word: עוּל יָמִים
  chosen: an infant of days
  alternatives:
  - an infant who lives only a few days
  - a child who dies young
  lexicon: HALOT
  rationale: The construct literally means 'an infant of days,' an idiom for a very
    young infant. I kept the literal phrase in the main text to preserve the Hebrew
    imagery, while smoother interpretive alternatives are preserved as alternatives.
- source_word: זָקֵן אֲשֶׁר לֹא יְמַלֵּא אֶת יָמָיו
  chosen: an old man who does not fill out his days
  alternatives:
  - an old man who does not live out his days
  - an old man who does not complete his days
  lexicon: HALOT
  rationale: The idiom 'fill out his days' closely reflects מלא + ימים while remaining
    understandable in English. It conveys not reaching a full lifespan.
- source_word: הַנַּעַר
  chosen: the youth
  alternatives:
  - the young man
  - the boy
  lexicon: HALOT
  rationale: נַעַר can range from boy to young man. 'Youth' best fits the contrast
    with advanced age and avoids over-specifying sex or age stage beyond the Hebrew's
    broad sense.
- source_word: בֶּן־מֵאָה שָׁנָה
  chosen: a hundred years old
  alternatives:
  - at a hundred years of age
  - being the son of a hundred years
  lexicon: HALOT
  rationale: This is the standard age expression in Hebrew. 'A hundred years old'
    is idiomatic English and accurately conveys the construction.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - dies
  lexicon: HALOT
  rationale: The imperfect here is naturally rendered as future in this prophetic
    context.
- source_word: הַחוֹטֵא
  chosen: the sinner
  alternatives:
  - the one who sins
  - the sinful person
  lexicon: HALOT
  rationale: The participle denotes one characterized by sinning. 'The sinner' is
    the most concise and natural rendering.
- source_word: יְקֻלָּל
  chosen: will be accursed
  alternatives:
  - will be cursed
  - will be considered accursed
  lexicon: HALOT
  rationale: The Pual form indicates being under a curse. 'Accursed' preserves the
    stronger covenantal and judicial sense better than the flatter 'cursed.'
