theological_decisions:
- issue: How to render the verse's difficult statements about death and curse in the
    context of Isaiah's new-creation prophecy
  chosen_reading: Translate the statements straightforwardly as describing extraordinary
    longevity and the continued disgrace of sin, without harmonizing them with later
    theological systems in the wording.
  alternative_readings:
  - Interpret the verse figuratively so that 'die' means something other than actual
    death
  - Translate in a way that removes the tension between this verse and other eschatological
    texts
  rationale: The Hebrew explicitly uses 'will die' and 'will be accursed.' Per the
    translation philosophy, theological tension should be preserved rather than resolved
    by paraphrase. The verse is therefore rendered in a way that leaves the interpretive
    tension visible to the reader.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
