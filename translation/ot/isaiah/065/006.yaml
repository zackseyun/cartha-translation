id: ISA.65.6
reference: Isaiah 65:6
source:
  edition: WLC
  text: הִנֵּ֥ה כְתוּבָ֖ה לְ/פָנָ֑/י לֹ֤א אֶחֱשֶׂה֙ כִּ֣י אִם שִׁלַּ֔מְתִּי וְ/שִׁלַּמְתִּ֖י
    עַל חֵיקָֽ/ם־־׃
translation:
  text: 'Look, it is written before me: I will not keep silent, but I will repay;
    indeed, I will repay into their lap.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it stands written before me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into their bosom.' The Hebrew image is of repayment returned directly
      to the person.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces a solemn declaration and draws attention. 'Look' preserves
    the deictic force in readable modern English better than the more archaic 'Behold.'
- source_word: כְתוּבָה לְפָנַי
  chosen: it is written before me
  alternatives:
  - it stands written before me
  - it is recorded before me
  lexicon: HALOT
  rationale: The passive participle with the prepositional phrase conveys something
    recorded and present before God. 'It is written before me' is natural English
    and preserves the image of an enduring written record.
- source_word: לֹא אֶחֱשֶׂה
  chosen: I will not keep silent
  alternatives:
  - I will not be silent
  - I will not remain quiet
  lexicon: HALOT
  rationale: The verb חשה means to be silent or keep quiet. 'Keep silent' fits the
    future resolve here and avoids implying merely inward restraint.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - unless
  - except that
  - rather
  lexicon: HALOT
  rationale: 'In this context the idiom introduces the positive counterpart to the
    negated clause: God will not remain silent, but will act in repayment. ''But''
    best captures the adversative force in idiomatic English.'
- source_word: שִׁלַּמְתִּי
  chosen: I will repay
  alternatives:
  - I have repaid
  - I will recompense
  - I will pay back
  lexicon: HALOT
  rationale: Though formally a perfect, in prophetic discourse it can express a determined
    future action. Given the sequence with the following verb and the context of announced
    judgment, 'I will repay' best reflects the sense.
- source_word: וְשִׁלַּמְתִּי
  chosen: indeed, I will repay
  alternatives:
  - yes, I will repay
  - and I will repay
  lexicon: HALOT
  rationale: The repetition intensifies certainty. Rendering with 'indeed' preserves
    the emphatic restatement rather than flattening it into a simple conjunction.
- source_word: עַל חֵיקָם
  chosen: into their lap
  alternatives:
  - into their bosom
  - upon their lap
  lexicon: HALOT
  rationale: חֵיק literally refers to the bosom/lap area and in judgment contexts
    conveys repayment placed back upon a person. 'Into their lap' is idiomatic modern
    English and preserves the metaphor of retribution returned directly to them.
