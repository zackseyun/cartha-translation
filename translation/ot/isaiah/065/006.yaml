theological_decisions:
- issue: Aspect and temporal force of the perfect verbs שִׁלַּמְתִּי / וְשִׁלַּמְתִּי
  chosen_reading: 'Future sense: ''I will repay ... indeed, I will repay'''
  alternative_readings:
  - 'Past/perfective sense: ''I have repaid'''
  - 'Present-resultative sense: ''I have paid back'''
  rationale: In prophetic judgment speech, Hebrew perfects often express a fixed and
    certain future action. The immediate context is a divine declaration of coming
    recompense, so a future rendering best preserves the force without importing extra
    theology.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Nature of the repayment
  chosen_reading: Judicial recompense without specifying more than the text states
  alternative_readings:
  - Punishment
  - vengeance
  rationale: The verb שׁלם here denotes repayment/recompense. 'Repay' preserves the
    judicial reciprocity of the Hebrew while avoiding interpretive narrowing beyond
    the text's wording.
  doctrine_reference: Translation philosophy §1, §3
