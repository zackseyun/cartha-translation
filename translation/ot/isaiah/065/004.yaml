theological_decisions:
- issue: Rendering of ritually offensive food language
  chosen_reading: Retain concrete impurity language without expanding it into later
    doctrinal categories.
  alternative_readings:
  - Render more generally as 'forbidden food' or 'abominations'
  rationale: The verse condemns practices associated with impurity and illicit worship.
    The translation preserves the text's concrete imagery—pig's flesh, broth, vessels,
    unclean things—without importing broader theological conclusions not explicit
    in the verse.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
