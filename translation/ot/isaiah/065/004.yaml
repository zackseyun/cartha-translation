id: ISA.65.4
reference: Isaiah 65:4
source:
  edition: WLC
  text: הַ/יֹּֽשְׁבִים֙ בַּ/קְּבָרִ֔ים וּ/בַ/נְּצוּרִ֖ים יָלִ֑ינוּ הָ/אֹֽכְלִים֙ בְּשַׂ֣ר
    הַ/חֲזִ֔יר ו/פרק פִּגֻּלִ֖ים כְּלֵי/הֶֽם׃
translation:
  text: who sit among the graves and spend the night in secret places, who eat pig's
    flesh, and broth of unclean things is in their vessels;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in hidden places'; the Hebrew term is difficult and has also been understood
      as 'in guarded places' or, less likely in context, 'in besieged places.'
    reason: lexical_alternative
  - marker: b
    text: Or 'soup' or 'stew' of unclean/abominable things.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיֹּשְׁבִים
  chosen: who sit
  alternatives:
  - who dwell
  - who remain
  lexicon: HALOT
  rationale: Qal participle of ישׁב, functioning substantivally in a relative-like
    sequence describing the people. 'Sit' is the most direct rendering, while in context
    it can imply dwelling or lingering. 'Who sit' preserves the concrete image and
    the participial force.
- source_word: בַּקְּבָרִים
  chosen: among the graves
  alternatives:
  - in the graves
  - among the tombs
  lexicon: HALOT
  rationale: קברים refers to graves/tombs. The preposition ב can be rendered 'in'
    or more idiomatically 'among' in this context of cultic association with the dead.
    'Graves' is chosen as the more common modern term; 'tombs' is a viable alternative.
- source_word: וּבַנְּצוּרִים
  chosen: in secret places
  alternatives:
  - in hidden places
  - in besieged places
  - in guarded places
  lexicon: HALOT
  rationale: נְצוּרִים is difficult and contextually debated. In parallel with graves
    and nocturnal illicit practice, many understand it as hidden/secret places rather
    than literally 'guarded' or 'besieged places.' 'Secret places' best fits the cultic/necromantic
    setting while remaining readable. The lexical uncertainty is preserved in a footnote.
- source_word: יָלִינוּ
  chosen: spend the night
  alternatives:
  - lodge
  - pass the night
  lexicon: HALOT
  rationale: From לין, to lodge or remain overnight. 'Spend the night' is natural
    modern English and clearly conveys the durative nocturnal action.
- source_word: הָאֹכְלִים
  chosen: who eat
  alternatives:
  - eating
  lexicon: HALOT
  rationale: Substantival participle continuing the description. 'Who eat' matches
    the relative-participial structure in English.
- source_word: בְּשַׂר הַחֲזִיר
  chosen: pig's flesh
  alternatives:
  - swine's flesh
  - pork
  lexicon: HALOT
  rationale: A literal rendering is preferable here. 'Pig's flesh' is clear, modern,
    and retains the concrete, ritually offensive force better than the culinary term
    'pork.'
- source_word: ופרק
  chosen: and broth
  alternatives:
  - and soup
  - and stew
  lexicon: HALOT
  rationale: The noun is rare and traditionally understood as a liquid dish or broth.
    'Broth' best fits the following genitive-like construction and the image of something
    contained in vessels. Because of lexical uncertainty, an alternative is preserved
    in a footnote.
- source_word: פִּגֻּלִים
  chosen: unclean things
  alternatives:
  - abominable things
  - tainted things
  - impure things
  lexicon: HALOT
  rationale: פִּגּוּל denotes something ritually defiled or abhorrent, especially
    in sacrificial/food contexts. 'Unclean things' communicates the ritual impurity
    clearly in contemporary English; 'abominable things' is possible but can sound
    more interpretive or archaic.
- source_word: כְּלֵיהֶם
  chosen: their vessels
  alternatives:
  - their pots
  - their containers
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel/container/implement. 'Vessels' preserves
    the generality and suits the ritual-food context. 'Pots' is more specific than
    the Hebrew requires.
