id: ISA.65.18
reference: Isaiah 65:18
source:
  edition: WLC
  text: כִּֽי אִם שִׂ֤ישׂוּ וְ/גִ֨ילוּ֙ עֲדֵי עַ֔ד אֲשֶׁ֖ר אֲנִ֣י בוֹרֵ֑א כִּי֩ הִנְ/נִ֨י
    בוֹרֵ֧א אֶת יְרוּשָׁלִַ֛ם גִּילָ֖ה וְ/עַמָּ֥/הּ מָשֽׂוֹשׂ־־־־׃
translation:
  text: But be glad and rejoice forever in what I am creating; for behold, I am creating
    Jerusalem as rejoicing, and her people as joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am creating Jerusalem for rejoicing, and her people for gladness.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Instead
  lexicon: HALOT
  rationale: In context this adversative combination contrasts with the preceding
    prohibition against remembering former things (v. 17). English 'But' captures
    the contrast naturally without overtranslating the particles separately.
- source_word: שִׂישׂוּ
  chosen: be glad
  alternatives:
  - rejoice
  - exult
  lexicon: HALOT
  rationale: The verb denotes joyful exultation. 'Be glad' pairs well with the following
    גילוּ as a near-synonymous doublet, allowing both verbs to be represented distinctly
    in natural English.
- source_word: וְגִילוּ
  chosen: and rejoice
  alternatives:
  - and exult
  lexicon: HALOT
  rationale: Rendered distinctly from שׂישׂוּ to preserve the Hebrew poetic intensification
    through paired joy verbs.
- source_word: עֲדֵי עַד
  chosen: forever
  alternatives:
  - for ever and ever
  - perpetually
  lexicon: HALOT
  rationale: This idiom expresses enduring duration. 'Forever' is idiomatic modern
    English and preserves the force without sounding archaic.
- source_word: אֲשֶׁר אֲנִי בוֹרֵא
  chosen: in what I am creating
  alternatives:
  - over what I create
  - because of what I am creating
  lexicon: HALOT
  rationale: The relative clause identifies the object or occasion of rejoicing. 'In
    what I am creating' best fits the prepositionless English idiom after 'rejoice'
    while preserving the participial sense of ongoing/divine creative action.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: This deictic particle marks emphatic divine announcement. 'Behold' retains
    the solemn prophetic tone better than more colloquial options.
- source_word: בוֹרֵא
  chosen: I am creating
  alternatives:
  - I create
  - I will create
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action in prophetic discourse.
    'I am creating' preserves the vivid present aspect and matches the earlier participle.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy
    to transliterate names.
- source_word: גִּילָה
  chosen: as rejoicing
  alternatives:
  - for rejoicing
  - a joy
  lexicon: HALOT
  rationale: The noun denotes exultation/rejoicing. With ברא plus object complement,
    'creating Jerusalem as rejoicing' preserves the predicative sense that Jerusalem
    is constituted as a source/embodiment of rejoicing. 'A joy' is possible but risks
    flattening the lexical connection to גיל/גילו in the verse.
- source_word: וְעַמָּהּ
  chosen: and her people
  alternatives:
  - and her folk
  lexicon: HALOT
  rationale: The suffix refers back to Jerusalem as feminine singular. 'Her people'
    is the natural English rendering and preserves the personification of the city.
- source_word: מָשׂוֹשׂ
  chosen: as joy
  alternatives:
  - gladness
  - delight
  lexicon: HALOT
  rationale: The noun denotes joy/gladness. 'As joy' mirrors the predicative structure
    used with Jerusalem and keeps the parallelism concise.
