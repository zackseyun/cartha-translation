theological_decisions:
- issue: Rendering the predicative nouns גִּילָה and מָשׂוֹשׂ after ברא
  chosen_reading: Jerusalem is created as rejoicing, and her people as joy
  alternative_readings:
  - Jerusalem is created for rejoicing, and her people for gladness
  - Jerusalem is created a joy, and her people a gladness
  rationale: The Hebrew can be understood as predicative/resultative ('create X as
    Y') or purposive ('for Y'). The chosen rendering preserves the poetic picture
    of transformed identity without adding doctrinal interpretation beyond the text.
    A more idiomatic alternative is preserved in a footnote because English readers
    may hear 'as rejoicing' as unusual.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather
    than resolve it'
