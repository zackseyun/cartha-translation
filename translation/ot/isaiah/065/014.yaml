id: ISA.65.14
reference: Isaiah 65:14
source:
  edition: WLC
  text: הִנֵּ֧ה עֲבָדַ֛/י יָרֹ֖נּוּ מִ/טּ֣וּב לֵ֑ב וְ/אַתֶּ֤ם תִּצְעֲקוּ֙ מִ/כְּאֵ֣ב
    לֵ֔ב וּ/מִ/שֵּׁ֥בֶר ר֖וּחַ תְּיֵלִֽילוּ׃
translation:
  text: Look, my servants will sing for gladness of heart, but you will cry out from
    pain of heart, and from a broken spirit you will wail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will shout for joy' for 'will sing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from a glad heart'; the Hebrew idiom is literally 'from the goodness/gladness
      of heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from anguish of heart.'
    reason: lexical_alternative
  - marker: d
    text: Or 'you will howl.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention. 'Look' preserves the deictic force in
    readable modern English better than the more archaic 'Behold.'
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my slaves
  lexicon: HALOT
  rationale: In Isaiah this designation commonly refers to those belonging to and
    serving God. While the noun can denote slaves/servants, the bonded-status nuance
    is not foregrounded here as in some NT doulos contexts; 'servants' is the most
    natural optimal-equivalence rendering.
- source_word: יָרֹנּוּ
  chosen: will sing
  alternatives:
  - will shout for joy
  - will cry out joyfully
  lexicon: HALOT
  rationale: רן in the Qal commonly denotes ringing out in song or joyful cry. Because
    the following phrase specifies positive inner condition, 'will sing' captures
    the celebratory sense without overexpansion.
- source_word: מִטּוּב לֵב
  chosen: for gladness of heart
  alternatives:
  - from goodness of heart
  - from a glad heart
  - because of the goodness of heart
  lexicon: HALOT
  rationale: טוּב לֵב is an idiom for inner well-being, cheer, or gladness rather
    than moral 'goodness' in this context. 'For gladness of heart' communicates the
    causal sense of מן and the idiomatic meaning.
- source_word: תִּצְעֲקוּ
  chosen: will cry out
  alternatives:
  - will cry
  - will shriek
  lexicon: HALOT
  rationale: צעק denotes a loud cry, often in distress. 'Cry out' preserves the intensity
    and contrasts well with the servants' singing.
- source_word: מִכְּאֵב לֵב
  chosen: from pain of heart
  alternatives:
  - because of heartache
  - from anguish of heart
  lexicon: HALOT
  rationale: כאב is pain, hurt, or sorrow. 'Pain of heart' keeps the Hebrew imagery
    and parallelism with 'gladness of heart' more closely than the more interpretive
    'heartache.'
- source_word: מִשֵּׁבֶר רוּחַ
  chosen: from a broken spirit
  alternatives:
  - from crushing of spirit
  - from a shattered spirit
  lexicon: HALOT
  rationale: שבר with רוח conveys brokenness/crushing in one's inner being. 'Broken
    spirit' is idiomatic English and preserves the metaphor.
- source_word: תְּיֵלִילוּ
  chosen: you will wail
  alternatives:
  - you will howl
  - you will lament loudly
  lexicon: HALOT
  rationale: ילל in the Hiphil denotes loud lamentation or howling. 'Wail' is strong,
    natural English and avoids the potentially animalistic overtones of 'howl' while
    retaining intensity.
