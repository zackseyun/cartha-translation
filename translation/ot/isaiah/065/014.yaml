theological_decisions:
- issue: Identity and contrast of 'my servants' versus 'you'
  chosen_reading: 'Retain the covenantal contrast without specifying beyond the verse:
    God''s servants rejoice, while the addressed opponents suffer.'
  alternative_readings:
  - Interpret 'my servants' specifically as the faithful remnant
  - Interpret 'you' specifically as apostate Israelites
  rationale: The verse itself establishes a sharp contrast but does not require the
    translation to identify the groups more narrowly than the immediate context does.
    The wording preserves the theological tension and leaves interpretation to context.
  doctrine_reference: Preserve theological tension rather than resolve it.
