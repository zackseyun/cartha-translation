id: ISA.65.2
reference: Isaiah 65:2
source:
  edition: WLC
  text: פֵּרַ֧שְׂתִּי יָדַ֛/י כָּל הַ/יּ֖וֹם אֶל עַ֣ם סוֹרֵ֑ר הַ/הֹלְכִים֙ הַ/דֶּ֣רֶךְ
    לֹא ט֔וֹב אַחַ֖ר מַחְשְׁבֹתֵי/הֶֽם־־־׃
translation:
  text: I spread out my hands all day long to a rebellious people, who walk in a way
    that is not good, following their own thoughts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I held out my hands all day long.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to a stubborn people.'
    reason: lexical_alternative
  - marker: c
    text: Or 'following their own plans' or 'schemes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֵּרַשְׂתִּי
  chosen: I spread out
  alternatives:
  - I have spread out
  - I held out
  - I stretched out
  lexicon: HALOT
  rationale: The verb פרשׂ in the piel commonly conveys spreading or stretching out.
    'I spread out' preserves the concrete gesture and fits prophetic discourse. 'Held
    out' is possible idiomatically in English, but 'spread out' stays closer to the
    Hebrew image.
- source_word: יָדַי
  chosen: my hands
  alternatives:
  - my hand
  lexicon: HALOT
  rationale: The noun is dual/plural with 1cs suffix, naturally rendered 'my hands.'
    The plural preserves the bodily gesture of appeal or entreaty.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - the whole day
  lexicon: HALOT
  rationale: This idiom expresses continual action throughout the day. 'All day long'
    is natural modern English and accurately reflects the durative force.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks direction toward the people. 'To' is the most natural
    English equivalent here.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: In this context the term refers to a collective group addressed by God,
    not primarily a geopolitical nation. 'People' is the best contextual rendering.
- source_word: סוֹרֵר
  chosen: rebellious
  alternatives:
  - stubborn
  - wayward
  - defiant
  lexicon: HALOT
  rationale: The participle denotes one who turns aside, is stubborn, or is rebellious.
    'Rebellious' best captures the covenantal and moral force in context without over-paraphrasing.
- source_word: הַהֹלְכִים
  chosen: who walk
  alternatives:
  - walking
  - who go
  lexicon: HALOT
  rationale: The participle describes the characteristic conduct of the people. 'Who
    walk' is idiomatic biblical English and preserves the metaphor of manner of life.
- source_word: הַדֶּרֶךְ
  chosen: in a way
  alternatives:
  - on the way
  - in the path
  - the road
  lexicon: HALOT
  rationale: Though literally 'the way,' English idiom prefers 'walk in a way' when
    the sense is moral conduct. This keeps the metaphor while reading naturally.
- source_word: לֹא טוֹב
  chosen: that is not good
  alternatives:
  - that is evil
  - that is not right
  lexicon: HALOT
  rationale: The Hebrew says 'not good,' and the translation preserves that wording
    rather than intensifying it to 'evil.' This avoids importing a stronger term than
    the source text uses.
- source_word: אַחַר
  chosen: following
  alternatives:
  - after
  - according to
  lexicon: HALOT
  rationale: With verbs of walking/conduct, אַחַר often conveys following after. 'Following'
    expresses the sense clearly in English.
- source_word: מַחְשְׁבֹתֵיהֶם
  chosen: their own thoughts
  alternatives:
  - their plans
  - their schemes
  - their devices
  lexicon: HALOT
  rationale: The noun can denote thoughts, plans, or devices. 'Thoughts' is the most
    direct rendering, and adding 'own' clarifies the possessive suffix in natural
    English while underscoring self-directed conduct.
