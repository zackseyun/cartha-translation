theological_decisions:
- issue: Divine posture toward a disobedient people
  chosen_reading: Retain the anthropomorphic image 'I spread out my hands' as a gesture
    of persistent appeal or openness.
  alternative_readings:
  - Interpret more dynamically as 'I kept reaching out'
  rationale: 'The Hebrew presents God''s action in embodied metaphor. Preserving the
    image maintains the text''s theological tension: divine patience and human rebellion
    are both vivid without interpretive flattening.'
  doctrine_reference: Translation philosophy §3, §6
- issue: Moral evaluation of the people's conduct
  chosen_reading: Translate לֹא טוֹב as 'not good' rather than a stronger interpretive
    gloss such as 'evil.'
  alternative_readings:
  - evil
  - wicked
  rationale: The source text itself uses the broader evaluative term 'good' negated.
    Retaining that wording avoids importing a more specific doctrinal or moral categorization
    than the Hebrew states explicitly.
  doctrine_reference: Translation philosophy §1, §3
