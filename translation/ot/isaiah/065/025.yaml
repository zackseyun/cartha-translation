theological_decisions:
- issue: Possible allusion to Genesis 3 in the serpent clause
  chosen_reading: Retain 'serpent' and 'dust will be the serpent’s food' to preserve
    the likely Edenic echo without making the allusion explicit in the main text.
  alternative_readings:
  - Use 'snake' with no literary resonance
  - Expand the line interpretively to mention the curse
  rationale: The verse likely evokes Genesis 3:14, but the text itself states only
    that dust is the serpent's food. The translation preserves the intertextual tension
    without importing commentary into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
