id: ISA.65.25
reference: Isaiah 65:25
source:
  edition: WLC
  text: זְאֵ֨ב וְ/טָלֶ֜ה יִרְע֣וּ כְ/אֶחָ֗ד וְ/אַרְיֵה֙ כַּ/בָּקָ֣ר יֹֽאכַל תֶּ֔בֶן
    וְ/נָחָ֖שׁ עָפָ֣ר לַחְמ֑/וֹ לֹֽא יָרֵ֧עוּ וְ/לֹֽא יַשְׁחִ֛יתוּ בְּ/כָל הַ֥ר קָדְשִׁ֖/י
    אָמַ֥ר יְהוָֽה־־־־׃ס
translation:
  text: The wolf and the lamb will graze together, and the lion will eat straw like
    the cattle; and dust will be the serpent’s food. They will not do evil or destroy
    on all my holy mountain," says the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'young goat' for 'lamb'; the Hebrew טָלֶה can refer more broadly to a
      young small livestock animal.
    reason: lexical_alternative
  - marker: b
    text: The serpent’s eating dust likely echoes Genesis 3:14.
    reason: cross_reference
  - marker: c
    text: Or 'will not harm or destroy'; the first verb can emphasize harmful action
      as well as evil-doing.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְאֵב
  chosen: wolf
  lexicon: HALOT
  rationale: Standard gloss for the animal named; no contextual pressure for variation.
- source_word: טָלֶה
  chosen: lamb
  alternatives:
  - young goat
  - young sheep
  lexicon: HALOT
  rationale: In this peace-oracle pairing with 'wolf,' 'lamb' is the most natural
    English rendering and matches the vulnerable-prey contrast. The Hebrew can denote
    a young small livestock animal more broadly, but 'lamb' best fits the imagery.
- source_word: יִרְעוּ
  chosen: will graze
  alternatives:
  - will pasture
  - will feed
  lexicon: HALOT
  rationale: The verb רעה in Qal commonly means to pasture/graze. 'Will graze' is
    idiomatic modern English for animals feeding peacefully.
- source_word: כְאֶחָד
  chosen: together
  alternatives:
  - as one
  - alike
  lexicon: HALOT
  rationale: The phrase means 'as one/together.' 'Together' is the clearest natural
    English expression of the shared peaceful action.
- source_word: אַרְיֵה
  chosen: lion
  lexicon: HALOT
  rationale: Standard animal term.
- source_word: כַּבָּקָר
  chosen: like the cattle
  alternatives:
  - like the ox
  - like the herd animal
  lexicon: HALOT
  rationale: בקר is a collective term for cattle. 'Like the cattle' preserves the
    comparison without forcing a singular 'ox' where the Hebrew is collective/generic.
- source_word: יֹאכַל תֶּבֶן
  chosen: will eat straw
  alternatives:
  - will eat fodder
  lexicon: HALOT
  rationale: A straightforward rendering of the lion's transformed diet. 'Straw' is
    the normal gloss for תבן and preserves the reversal of predatory behavior.
- source_word: נָחָשׁ
  chosen: serpent
  alternatives:
  - snake
  lexicon: HALOT
  rationale: '''Serpent'' preserves the elevated literary register and echoes Genesis
    3 imagery more readily than the more ordinary ''snake.'''
- source_word: עָפָר לַחְמוֹ
  chosen: dust will be the serpent’s food
  alternatives:
  - dust will be its bread
  - dust shall be the serpent's food
  lexicon: HALOT
  rationale: לחם often means 'bread' literally, but also 'food' more generally. Here
    'food' is more natural English while preserving the allusion to the serpent's
    cursed condition.
- source_word: לֹא יָרֵעוּ
  chosen: will not do evil
  alternatives:
  - will not harm
  - will not act wickedly
  lexicon: HALOT
  rationale: The Hiphil of רעע can mean do evil/harm. In this context, paired with
    'destroy,' the sense is harmful action. 'Do evil' preserves the broader moral
    force while still fitting the peace context.
- source_word: לֹא יַשְׁחִיתוּ
  chosen: or destroy
  alternatives:
  - or ruin
  - or act destructively
  lexicon: HALOT
  rationale: A standard rendering of שׁחת in this context; paired with the previous
    verb it expresses the absence of violence and devastation.
- source_word: בְּכָל הַר קָדְשִׁי
  chosen: on all my holy mountain
  alternatives:
  - in all my holy mountain
  - throughout my holy mountain
  lexicon: HALOT
  rationale: This reproduces the Hebrew closely and matches established prophetic
    idiom. 'On' is natural with 'mountain' in English, while 'all' preserves the total
    scope.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: Though the Hebrew form is qatal ('has said/said'), prophetic speech formulas
    are commonly rendered with present force in English. 'Says the LORD' is idiomatic
    and conveys the authoritative prophetic declaration.
