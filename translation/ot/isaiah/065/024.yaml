id: ISA.65.24
reference: Isaiah 65:24
source:
  edition: WLC
  text: וְ/הָיָ֥ה טֶֽרֶם יִקְרָ֖אוּ וַ/אֲנִ֣י אֶעֱנֶ֑ה ע֛וֹד הֵ֥ם מְדַבְּרִ֖ים וַ/אֲנִ֥י
    אֶשְׁמָֽע־׃
translation:
  text: And it will happen that before they call, I will answer; while they are still
    speaking, I will hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before they cry out, I will answer.' The verb can refer to calling out,
      including prayerful appeal.
    reason: lexical_alternative
  - marker: b
    text: Or 'while they are yet speaking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future state/result with idiomatic prophetic force. 'And
    it will happen' preserves the formula without archaic English like 'shall come
    to pass.'
- source_word: טֶרֶם
  chosen: before
  alternatives:
  - ere
  - not yet when
  lexicon: HALOT
  rationale: Temporal adverb marking prior action; 'before' is the clear modern equivalent.
- source_word: יִקְרָאוּ
  chosen: they call
  alternatives:
  - they cry out
  - they invoke
  lexicon: HALOT
  rationale: קרא in this context refers to calling out, likely in prayer. 'Call' is
    broad and natural, avoiding over-specification while fitting the context.
- source_word: אֶעֱנֶה
  chosen: I will answer
  alternatives:
  - I will respond
  lexicon: HALOT
  rationale: ענה commonly means to answer/respond. 'Answer' fits the likely prayer
    context and pairs naturally with 'call.'
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - while yet
  lexicon: HALOT
  rationale: Here it marks ongoing action not yet completed. 'Still' gives the sense
    smoothly in English in the clause 'while they are still speaking.'
- source_word: מְדַבְּרִים
  chosen: speaking
  alternatives:
  - talking
  lexicon: HALOT
  rationale: Participle expressing ongoing speech. 'Speaking' is more fitting than
    'talking' in this solemn context.
- source_word: אֶשְׁמָע
  chosen: I will hear
  alternatives:
  - I will listen
  - I will heed
  lexicon: HALOT
  rationale: שמע literally means 'hear.' In context it implies attentive hearing of
    prayer, but the more literal 'hear' preserves the Hebrew wording and theological
    openness.
