id: ISA.65.10
reference: Isaiah 65:10
source:
  edition: WLC
  text: וְ/הָיָ֤ה הַ/שָּׁרוֹן֙ לִ/נְוֵה צֹ֔אן וְ/עֵ֥מֶק עָכ֖וֹר לְ/רֵ֣בֶץ בָּקָ֑ר
    לְ/עַמִּ֖/י אֲשֶׁ֥ר דְּרָשֽׁוּ/נִי־׃
translation:
  text: Sharon will become a pasture for flocks, and the Valley of Achor a resting
    place for cattle, for my people who have sought me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a habitation of sheep' / 'a grazing place for sheep.'
    reason: lexical_alternative
  - marker: b
    text: The Valley of Achor is associated with earlier judgment (Josh 7:24–26);
      here it is portrayed as a place of restoration and safety.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיָה
  chosen: will become
  alternatives:
  - will be
  - shall become
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in prophetic discourse commonly has
    future/resultative force. 'Will become' brings out the sense of transformation
    into a condition, fitting the restoration context better than a simple stative
    'will be.'
- source_word: הַשָּׁרוֹן
  chosen: Sharon
  alternatives:
  - the Sharon
  - the plain of Sharon
  lexicon: HALOT
  rationale: A proper place name is best transliterated per project philosophy. The
    article is inherent in the Hebrew form but is not naturally carried over in English
    place-name usage.
- source_word: לִנְוֵה צֹאן
  chosen: a pasture for flocks
  alternatives:
  - a habitation of sheep
  - a grazing place for sheep
  - a fold for flocks
  lexicon: HALOT
  rationale: נוה denotes a pasture, abode, or grazing place. In parallel with 'resting
    place for cattle,' 'pasture for flocks' gives clear modern English while preserving
    the pastoral image. 'Flocks' is broader and more idiomatic than the narrower 'sheep,'
    though sheep are included.
- source_word: וְעֵמֶק עָכוֹר
  chosen: and the Valley of Achor
  alternatives:
  - and Achor Valley
  lexicon: HALOT
  rationale: עֵמֶק is naturally rendered 'Valley,' and עָכוֹר is a proper name retained
    by transliteration. The full phrase is a recognized toponym.
- source_word: לְרֵבֶץ בָּקָר
  chosen: a resting place for cattle
  alternatives:
  - a place for cattle to lie down
  - a pasture for cattle
  lexicon: HALOT
  rationale: רבץ refers to lying down or a resting place, not merely grazing. 'Resting
    place' preserves the nuance of secure repose; 'cattle' accurately renders בָּקָר.
- source_word: לְעַמִּי
  chosen: for my people
  alternatives:
  - for my people’s use
  - belonging to my people
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as advantage/benefit: these restored
    lands are for the benefit of God''s people. This yields natural English and fits
    the clause that follows.'
- source_word: אֲשֶׁר דְּרָשׁוּנִי
  chosen: who have sought me
  alternatives:
  - who sought me
  - who inquire of me
  lexicon: HALOT
  rationale: דרש in relation to God commonly means 'seek.' The perfect describes the
    identifying characteristic of the people in view; English present perfect ('have
    sought me') conveys that defining action with present relevance.
