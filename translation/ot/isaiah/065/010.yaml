theological_decisions:
- issue: Identity of 'my people who have sought me'
  chosen_reading: The phrase refers to the faithful people whom God acknowledges as
    his own, without specifying a narrower doctrinal subgroup beyond the text.
  alternative_readings:
  - a remnant within Israel
  - all restored Israel collectively
  rationale: The verse itself emphasizes divine restoration for those who seek God.
    The translation preserves that theological tension and does not import a more
    specific systematized reading not explicit in the Hebrew.
  doctrine_reference: Preserve theological tension rather than resolve it.
