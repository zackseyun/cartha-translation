theological_decisions:
- issue: Interpretation of כִּי קְדַשְׁתִּיךָ
  chosen_reading: for I am holier than you
  alternative_readings:
  - for I am too holy for you
  - for I have kept myself holy from you
  rationale: The clause is syntactically compressed and has been rendered in several
    ways. The chosen reading best reflects the arrogant self-separation condemned
    in context and matches the prophetic portrayal of hypocritical claims to superior
    holiness. It preserves the theological tension by presenting the speakers' boast
    without endorsing it.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
