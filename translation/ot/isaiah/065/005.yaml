id: ISA.65.5
reference: Isaiah 65:5
source:
  edition: WLC
  text: הָ/אֹֽמְרִים֙ קְרַ֣ב אֵלֶ֔י/ךָ אַל תִּגַּשׁ בִּ֖/י כִּ֣י קְדַשְׁתִּ֑י/ךָ אֵ֚לֶּה
    עָשָׁ֣ן בְּ/אַפִּ֔/י אֵ֥שׁ יֹקֶ֖דֶת כָּל הַ/יּֽוֹם־־־׃
translation:
  text: who say, ‘Keep to yourself; do not come near me, for I am holier than you.’
    These are smoke in my nostrils, a fire burning all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “for I am too holy for you,” or “for I have kept myself holy from you.”
      The Hebrew clause is difficult and expresses a claim of ritual or moral superiority.
    reason: alternative_reading
lexical_decisions:
- source_word: הָאֹמְרִים
  chosen: who say
  alternatives:
  - the ones saying
  lexicon: HALOT
  rationale: Participial form functioning substantivally, continuing the description
    of the rebellious people from the previous verse. English relative clause is the
    most natural equivalent.
- source_word: קְרַב אֵלֶיךָ
  chosen: Keep to yourself
  alternatives:
  - Come near yourself
  - Stay where you are
  lexicon: HALOT
  rationale: The imperative plus prepositional phrase is idiomatic in context as a
    dismissive command to keep one's distance or remain apart. 'Keep to yourself'
    captures the social-religious exclusion being expressed better than a wooden rendering.
- source_word: אַל תִּגַּשׁ בִּי
  chosen: do not come near me
  alternatives:
  - do not approach me
  - do not touch me
  lexicon: HALOT
  rationale: נגשׁ with ב conveys approaching a person. 'Come near me' is clear modern
    English and preserves the force of exclusion.
- source_word: כִּי קְדַשְׁתִּיךָ
  chosen: for I am holier than you
  alternatives:
  - for I have made myself holy from you
  - for I am too holy for you
  - for I have sanctified you
  lexicon: HALOT
  rationale: The form is difficult and idiomatic. In context it expresses the speaker's
    claim of superior holiness and separation. The traditional sense 'I am holier
    than you' best fits the immediate rhetoric and broader prophetic critique, even
    though the Hebrew form is compressed. A more literal rendering would be obscure
    in English.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - Such people
  - These ones
  lexicon: HALOT
  rationale: Demonstrative referring back to the people just described.
- source_word: עָשָׁן בְּאַפִּי
  chosen: are smoke in my nostrils
  alternatives:
  - are smoke in my nose
  - are smoke in my anger
  lexicon: HALOT
  rationale: אף literally means nose/nostril and by extension anger. Here the concrete
    image of irritating smoke in God's nostrils is vivid and should be preserved rather
    than flattened to an abstract statement about anger.
- source_word: אֵשׁ יֹקֶדֶת
  chosen: a fire burning
  alternatives:
  - a blazing fire
  - a fire that keeps burning
  lexicon: HALOT
  rationale: Straightforward metaphor intensifying divine offense and anger. 'Burning'
    preserves the participial sense.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: Natural modern English for the duration idiom, preserving the sense of
    ongoing provocation.
