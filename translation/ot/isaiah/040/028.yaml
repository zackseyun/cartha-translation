theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's God with the covenant name. Following the project's
    doctrinal guidance, the main text uses 'the LORD' rather than a transliteration,
    while preserving alternatives in a footnote.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
