id: ISA.40.28
reference: Isaiah 40:28
source:
  edition: WLC
  text: הֲ/ל֨וֹא יָדַ֜עְתָּ אִם לֹ֣א שָׁמַ֗עְתָּ אֱלֹהֵ֨י עוֹלָ֤ם יְהוָה֙ בּוֹרֵא֙
    קְצ֣וֹת הָ/אָ֔רֶץ לֹ֥א יִיעַ֖ף וְ/לֹ֣א יִיגָ֑ע אֵ֥ין חֵ֖קֶר לִ/תְבוּנָתֽ/וֹ־׀׃
translation:
  text: Have you not known? Have you not heard? The LORD is the everlasting God, the
    Creator of the ends of the earth. He does not grow faint or become weary; his
    understanding is unsearchable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; alternatively rendered 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Have you not
  alternatives:
  - Do you not
  - Surely you have not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. Rendered
    idiomatically in English as 'Have you not' to preserve the rebuking/reminding
    force.
- source_word: יָדַעְתָּ
  chosen: known
  alternatives:
  - understood
  lexicon: HALOT
  rationale: Basic sense is 'know.' Paired with 'heard' in a rhetorical appeal to
    what Israel should already recognize.
- source_word: אִם לֹא שָׁמַעְתָּ
  chosen: Have you not heard
  alternatives:
  - if you have not heard
  lexicon: HALOT
  rationale: In this idiom the sequence functions as a second rhetorical question
    parallel to 'Have you not known?' rather than a conditional clause in English.
- source_word: אֱלֹהֵי עוֹלָם
  chosen: the everlasting God
  alternatives:
  - the eternal God
  - God of eternity
  lexicon: HALOT
  rationale: Construct phrase literally 'God of eternity/everlastingness.' 'The everlasting
    God' is natural English and preserves the durative, timeless sense of עוֹלָם.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: בּוֹרֵא
  chosen: the Creator
  alternatives:
  - creating
  - creator
  lexicon: HALOT
  rationale: Qal participle used substantivally/appositionally with YHWH. 'The Creator'
    captures the ongoing identifying title in fluent English.
- source_word: קְצוֹת הָאָרֶץ
  chosen: the ends of the earth
  alternatives:
  - the extremities of the earth
  - the whole earth
  lexicon: HALOT
  rationale: A common idiom for the farthest reaches of the earth. 'Ends of the earth'
    preserves the imagery and established biblical idiom.
- source_word: לֹא יִיעַף
  chosen: does not grow faint
  alternatives:
  - does not faint
  - does not become tired
  lexicon: HALOT
  rationale: יעף often denotes becoming faint from exhaustion. 'Grow faint' is idiomatic
    and pairs well with the following verb.
- source_word: וְלֹא יִיגָע
  chosen: or become weary
  alternatives:
  - and does not tire
  - and does not grow weary
  lexicon: HALOT
  rationale: יגע denotes weariness/exhaustion from labor. 'Become weary' gives a natural
    English parallel to 'grow faint' while preserving the distinction between the
    two verbs.
- source_word: אֵין חֵקֶר
  chosen: is unsearchable
  alternatives:
  - there is no searching out
  - is beyond tracing out
  lexicon: HALOT
  rationale: Literally 'there is no searching out/investigation.' Predicate adjective
    'is unsearchable' is concise and natural while preserving the sense of incomprehensibility.
- source_word: לִתְבוּנָתוֹ
  chosen: his understanding
  alternatives:
  - his discernment
  - his insight
  lexicon: HALOT
  rationale: תבונה denotes understanding, intelligence, discernment. 'Understanding'
    is the broadest and most idiomatic fit in this context of God's incomprehensible
    wisdom.
