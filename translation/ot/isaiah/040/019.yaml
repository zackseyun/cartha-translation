id: ISA.40.19
reference: Isaiah 40:19
source:
  edition: WLC
  text: הַ/פֶּ֨סֶל֙ נָסַ֣ךְ חָרָ֔שׁ וְ/צֹרֵ֖ף בַּ/זָּהָ֣ב יְרַקְּעֶ֑/נּוּ וּ/רְתֻק֥וֹת
    כֶּ֖סֶף צוֹרֵֽף׃
translation:
  text: As for the idol, a craftsman casts it, and a goldsmith overlays it with gold
    and forges silver chains for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the carved image.' The Hebrew noun can refer more specifically to an
      image made by carving, though here the broader sense 'idol' fits the context
      of manufactured cult objects.
    reason: lexical_alternative
  - marker: b
    text: Or 'silver fittings' or 'silver fastenings.' The Hebrew term is rare, and
      its precise referent is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפֶּסֶל
  chosen: the idol
  alternatives:
  - the carved image
  - the image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an idol/image, often specifically a carved image, but
    here the following verb 'casts' shows the object is a manufactured cult image
    more generally. 'Idol' best conveys the polemical force in context.
- source_word: נָסַךְ
  chosen: casts
  alternatives:
  - cast
  - pours out
  - fashions
  lexicon: HALOT
  rationale: In this context of idol manufacture, the verb refers to casting molten
    metal. 'Casts' is the most natural English rendering for the artisan's action
    and fits the sequence of metalworking verbs.
- source_word: חָרָשׁ
  chosen: a craftsman
  alternatives:
  - an artisan
  - a workman
  lexicon: HALOT
  rationale: חָרָשׁ is a general term for a skilled worker/craftsman. 'Craftsman'
    is clear modern English and preserves the occupational sense without over-specifying
    the trade.
- source_word: וְצֹרֵף
  chosen: and a goldsmith
  alternatives:
  - and a metalworker
  - and a refiner
  lexicon: HALOT
  rationale: Though the root can denote a smelter/refiner, with 'gold' immediately
    following it refers to a worker in precious metals. 'Goldsmith' is the most idiomatic
    contextual rendering.
- source_word: בַּזָּהָב
  chosen: with gold
  alternatives:
  - in gold
  lexicon: HALOT
  rationale: The preposition marks the material used in overlaying the idol. 'With
    gold' is idiomatic in English for plating or overlaying.
- source_word: יְרַקְּעֶנּוּ
  chosen: overlays it
  alternatives:
  - plates it
  - beats it out over it
  - spreads it over it
  lexicon: HALOT
  rationale: From רקע, to beat out/spread metal. In context the sense is covering
    the idol with hammered gold. 'Overlays it' communicates the result in natural
    English while remaining close to the source.
- source_word: וּרְתֻקוֹת כֶּסֶף
  chosen: silver chains
  alternatives:
  - silver fittings
  - silver fastenings
  - silver bands
  lexicon: HALOT
  rationale: The noun is somewhat uncertain, but in this context likely refers to
    chains or fastenings associated with securing or adorning the idol. 'Silver chains'
    follows a common and plausible understanding while preserving the metalworking
    imagery.
- source_word: צוֹרֵף
  chosen: forges
  alternatives:
  - refines
  - smelts
  - works
  lexicon: HALOT
  rationale: The participle/verb form again comes from the root for smelting/refining
    metal. Since the object is 'silver chains,' 'forges' best captures the productive
    action in idiomatic English.
