theological_decisions:
- issue: Rendering of anti-idolatry terminology
  chosen_reading: the idol
  alternative_readings:
  - the carved image
  - the image
  rationale: The verse mocks the manufacture of a cult object in contrast to the incomparable
    God in the surrounding context. 'Idol' preserves the theological polemic without
    adding content beyond the Hebrew.
