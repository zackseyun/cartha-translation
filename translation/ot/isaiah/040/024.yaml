id: ISA.40.24
reference: Isaiah 40:24
source:
  edition: WLC
  text: אַ֣ף בַּל נִטָּ֗עוּ אַ֚ף בַּל זֹרָ֔עוּ אַ֛ף בַּל שֹׁרֵ֥שׁ בָּ/אָ֖רֶץ גִּזְעָ֑/ם
    וְ/גַם נָשַׁ֤ף בָּ/הֶם֙ וַ/יִּבָ֔שׁוּ וּ/סְעָרָ֖ה כַּ/קַּ֥שׁ תִּשָּׂאֵֽ/ם־־־־׃ס
translation:
  text: Scarcely are they planted, scarcely are they sown, scarcely has their stem
    taken root in the earth, when he merely blows on them and they wither, and a storm
    carries them away like stubble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hardly are they planted... hardly has their stem rooted in the earth.'
      The Hebrew repetition intensifies how quickly their rise is undone.
    reason: lexical_alternative
  - marker: b
    text: Or 'a whirlwind' instead of 'a storm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַף בַּל
  chosen: scarcely
  alternatives:
  - hardly
  - not even
  lexicon: HALOT
  rationale: The repeated particle combination introduces emphatic negation with the
    sense of something barely having happened before the next action overtakes it.
    In context, 'scarcely' captures the temporal-rhetorical force better than a flat
    'not' or 'not even.'
- source_word: נִטָּעוּ
  chosen: are planted
  alternatives:
  - have been planted
  lexicon: HALOT
  rationale: Passive of נטע, referring metaphorically to rulers as if newly set in
    place. Present English 'are planted' works idiomatically in the repeated poetic
    sequence.
- source_word: זֹרָעוּ
  chosen: are sown
  alternatives:
  - have been sown
  lexicon: HALOT
  rationale: Passive of זרע continues the agricultural metaphor. 'Are sown' preserves
    the parallelism with 'are planted.'
- source_word: שֹׁרֵשׁ
  chosen: has taken root
  alternatives:
  - roots
  - has rooted itself
  lexicon: HALOT
  rationale: Though the form is unusual in context, the sense is that the stock/stem
    has not yet become rooted. English idiom favors 'has taken root' to express the
    establishment imagery.
- source_word: גִּזְעָם
  chosen: their stem
  alternatives:
  - their stock
  - their trunk
  lexicon: HALOT
  rationale: גזע denotes trunk, stock, or stem. Here a singular collective with suffix
    fits the plant metaphor for rulers. 'Stem' is natural in English and avoids over-specifying
    a large tree trunk.
- source_word: נָשַׁף
  chosen: blows
  alternatives:
  - breathes
  - blows upon
  lexicon: HALOT
  rationale: The verb means to blow or breathe. 'Blows on them' preserves the image
    of God's effortless action. The adverb 'merely' is supplied to reflect the minimal
    action implied by the context, not as a separate lexical item.
- source_word: וַיִּבָשׁוּ
  chosen: they wither
  alternatives:
  - they dry up
  - they shrivel
  lexicon: HALOT
  rationale: יבש commonly means dry up or wither. 'Wither' fits the vegetation metaphor
    and reads naturally in English.
- source_word: סְעָרָה
  chosen: a storm
  alternatives:
  - a tempest
  - a whirlwind
  lexicon: HALOT
  rationale: The noun can denote storm, tempest, or whirlwind. 'Storm' is broad and
    accessible while preserving the destructive force.
- source_word: כַּקַּשׁ
  chosen: like stubble
  alternatives:
  - like chaff
  - like straw
  lexicon: HALOT
  rationale: קשׁ is stubble or straw left from harvest. 'Stubble' is more precise
    than 'chaff,' which would be a different agricultural image.
- source_word: תִּשָּׂאֵם
  chosen: carries them away
  alternatives:
  - lifts them up
  - sweeps them away
  lexicon: HALOT
  rationale: נשא here means to carry off or lift away. 'Carries them away' preserves
    the motion without over-interpreting the manner.
