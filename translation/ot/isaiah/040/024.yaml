theological_decisions:
- issue: Referent of the singular subject in 'he blows on them'
  chosen_reading: God is the implied subject
  alternative_readings:
  - an impersonal wind blows on them
  rationale: In the immediate context (Isa 40:23–24), the subject remains the one
    who reduces rulers to nothing. Retaining 'he' preserves the personal divine agency
    emphasized in the passage without adding the divine name where the Hebrew does
    not repeat it.
