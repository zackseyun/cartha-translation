theological_decisions:
- issue: Rendering of רוּחַ יְהוָה
  chosen_reading: the breath of the LORD
  alternative_readings:
  - the wind of the LORD
  - the Spirit of the LORD
  rationale: The phrase can denote divine breath/wind, and context favors an image
    of the LORD's life-removing blast upon frail flesh rather than an explicit reference
    to the Holy Spirit as a distinct theological subject. 'Breath' preserves the personal
    agency of YHWH and the poetic force. Alternatives are preserved in a footnote
    to maintain the semantic range without overresolving the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה
    default rendered 'the LORD'.
