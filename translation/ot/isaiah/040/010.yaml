id: ISA.40.10
reference: Isaiah 40:10
source:
  edition: WLC
  text: הִנֵּ֨ה אֲדֹנָ֤/י יְהוִה֙ בְּ/חָזָ֣ק יָב֔וֹא וּ/זְרֹע֖/וֹ מֹ֣שְׁלָה ל֑/וֹ הִנֵּ֤ה שְׂכָר/וֹ֙ אִתּ֔/וֹ וּ/פְעֻלָּת֖/וֹ לְ/פָנָֽי/ו׃
translation:
  text: Behold, the Lord GOD comes with strength, and his arm rules for him; behold, his reward is with him, and his recompense before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Lord YHWH.'' English ''the Lord GOD'' reflects the combined title אֲדֹנָי יְהוִה and avoids the awkward ''Lord LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'will come with might.' The Hebrew can be rendered with a more explicit future sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'his arm is ruling on his behalf.'
    reason: lexical_alternative
  - marker: d
    text: Or 'his wages ... and his compensation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic/interjection and solemn force at both occurrences. 'Behold' is slightly elevated but still natural in this context and preserves the rhetorical emphasis better than flatter alternatives.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the divine name YHWH. Per doctrine, יְהוָה is rendered 'the LORD'; in the fixed English convention for אֲדֹנָי יְהוִה, 'the Lord GOD' avoids 'Lord LORD' while signaling both elements of the Hebrew title.
- source_word: בְּחָזָק
  chosen: with strength
  alternatives:
  - in strength
  - as a mighty one
  - with might
  lexicon: HALOT
  rationale: The preposition ב plus חָזָק here expresses manner/accompaniment. 'With strength' is clear modern English and preserves the sense of powerful coming without over-interpreting it as an epithet ('mighty one').
- source_word: יָבֹוא
  chosen: comes
  alternatives:
  - will come
  - is coming
  lexicon: HALOT
  rationale: The imperfect can be rendered futurally, but in prophetic proclamation English present often conveys vivid certainty well. 'Comes' fits the immediate deictic 'Behold' and keeps the line forceful.
- source_word: וּזְרֹעוֹ
  chosen: and his arm
  lexicon: HALOT
  rationale: Maintains the common biblical metaphor of the arm as the instrument of power. No need to paraphrase to 'power' in the main text because the image is transparent and theologically resonant.
- source_word: מֹשְׁלָה לוֹ
  chosen: rules for him
  alternatives:
  - is ruling for him
  - rules on his behalf
  - has dominion for him
  lexicon: HALOT
  rationale: The participle from משל denotes exercising rule. The לֹו is best taken as advantage/reference ('for him,' i.e., on his behalf / as his own effective power). 'Rules for him' is concise and preserves the syntax without collapsing the metaphor into abstraction.
- source_word: שְׂכָרוֹ
  chosen: his reward
  alternatives:
  - his wages
  lexicon: HALOT
  rationale: שָׂכָר often denotes reward, wages, or compensation. 'Reward' fits the broader prophetic context and traditional biblical idiom better than the more commercial 'wages.'
- source_word: אִתּוֹ
  chosen: is with him
  lexicon: HALOT
  rationale: Simple accompaniment/presence; no expansion needed.
- source_word: וּפְעֻלָּתוֹ
  chosen: and his recompense
  alternatives:
  - his payment
  - his work-reward
  - his compensation
  lexicon: HALOT
  rationale: The noun can denote work, deed, or the result/payment for work. In parallel with 'his reward,' 'his recompense' best captures the compensatory sense in this context and preserves the poetic parallelism.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - ahead of him
  - in front of him
  lexicon: HALOT
  rationale: A straightforward spatial metaphor. 'Before him' preserves the formal parallelism and can imply what goes in front of a royal figure without unnecessary interpretation.
