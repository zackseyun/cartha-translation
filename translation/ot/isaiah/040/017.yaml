theological_decisions:
- issue: Degree of negation in the second colon
  chosen_reading: 'Render the paired expressions מֵאֶפֶס וָתֹהוּ as an intensified
    statement: ''less than nothing and emptiness.'''
  alternative_readings:
  - '''less than nothing and vanity'''
  - '''from nothingness and chaos'''
  rationale: The verse uses stacked terms of nullity to magnify God's incomparability
    over the nations. The translation preserves the rhetorical force without importing
    metaphysical claims beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
