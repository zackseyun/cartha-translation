id: ISA.40.17
reference: Isaiah 40:17
source:
  edition: WLC
  text: כָּל הַ/גּוֹיִ֖ם כְּ/אַ֣יִן נֶגְדּ֑/וֹ מֵ/אֶ֥פֶס וָ/תֹ֖הוּ נֶחְשְׁבוּ לֽ/וֹ־־׃
translation:
  text: All the nations are as nothing before him; they are regarded by him as less
    than nothing and emptiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are counted by him as less than nothing and chaos/emptiness.' The Hebrew
      תֹהוּ can also carry the sense of 'wasteness' or 'chaos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Distributive/collective quantifier introducing the totality of the nations.
    'All' is the most natural English rendering here.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the peoples
  - the Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations.' In Isaiah this often refers to the
    nations collectively in contrast to Israel, but 'the nations' is the broad, contextually
    appropriate rendering without over-specifying ethnicity.
- source_word: כְּאַיִן
  chosen: as nothing
  alternatives:
  - like nothing
  - as nonexistence
  lexicon: HALOT
  rationale: 'The prefixed כ marks comparison: the nations are compared to אַיִן,
    ''nothing'' or ''nonexistence.'' ''As nothing'' is idiomatic and preserves the
    simile.'
- source_word: נֶגְדּוֹ
  chosen: before him
  alternatives:
  - in his presence
  - in comparison with him
  lexicon: HALOT
  rationale: נֶגֶד with pronominal suffix denotes being before, in front of, or in
    relation to someone. 'Before him' preserves both spatial and evaluative force
    in context of divine comparison.
- source_word: מֵאֶפֶס
  chosen: less than nothing
  alternatives:
  - from nothingness
  - than nullity
  lexicon: HALOT
  rationale: 'With the following phrase and passive verb, מִן here is comparative/intensive:
    the nations are reckoned as even less than אפס, ''nothingness'' or ''zero.'' ''Less
    than nothing'' is clear modern English and reflects the rhetorical escalation.'
- source_word: וָתֹהוּ
  chosen: and emptiness
  alternatives:
  - and chaos
  - and formlessness
  - and vanity
  lexicon: HALOT
  rationale: תֹהוּ can denote emptiness, wasteness, or chaos. Here the emphasis is
    not on primordial creation imagery but on utter insubstantiality, so 'emptiness'
    best fits the parallelism with 'less than nothing.'
- source_word: נֶחְשְׁבוּ
  chosen: are regarded
  alternatives:
  - are counted
  - are considered
  - were reckoned
  lexicon: HALOT
  rationale: חשב in the Niphal means 'to be reckoned/considered.' Present tense in
    English suits the gnomic, timeless assertion of the Hebrew prophetic statement.
- source_word: לוֹ
  chosen: by him
  alternatives:
  - to him
  - in his estimation
  lexicon: HALOT
  rationale: The lamed with suffix marks the one in whose estimation the reckoning
    occurs. English idiom prefers 'by him' after 'are regarded,' though 'to him' is
    possible. This makes explicit that the valuation is from God's perspective.
