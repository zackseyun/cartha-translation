theological_decisions:
- issue: Referent of the pronouns
  chosen_reading: All third-person pronouns refer to the LORD/God from the surrounding
    context.
  alternative_readings:
  - An unspecified deity or abstract figure
  rationale: Although the divine name is not repeated in this verse, the immediate
    context (Isa 40:13–14) is a rhetorical description of the LORD's incomparable
    wisdom and independence. The translation keeps the pronouns rather than inserting
    'the LORD,' preserving the Hebrew while allowing the context to identify the referent.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
- issue: Rendering of מִשְׁפָּט
  chosen_reading: justice
  alternative_readings:
  - judgment
  rationale: The verse emphasizes God's need for no instructor in moral and judicial
    wisdom. 'Justice' communicates this clearly in modern English, while 'judgment'
    remains a viable lexical alternative preserved in a footnote.
  doctrine_reference: Translation philosophy §6
