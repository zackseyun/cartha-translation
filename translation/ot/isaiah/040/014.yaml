id: ISA.40.14
reference: Isaiah 40:14
source:
  edition: WLC
  text: אֶת מִ֤י נוֹעָץ֙ וַ/יְבִינֵ֔/הוּ וַֽ/יְלַמְּדֵ֖/הוּ בְּ/אֹ֣רַח מִשְׁפָּ֑ט
    וַ/יְלַמְּדֵ֣/הוּ דַ֔עַת וְ/דֶ֥רֶךְ תְּבוּנ֖וֹת יוֹדִיעֶֽ/נּוּ־׃
translation:
  text: Whom did he consult, and who gave him understanding? Who taught him the path
    of justice, taught him knowledge, and made known to him the way of understanding?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the path of judgment."
    reason: lexical_alternative
  - marker: b
    text: Or "the way of insight" or "the path of discernment."
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת מִי
  chosen: Whom
  alternatives:
  - With whom
  - Whom ... with
  lexicon: HALOT
  rationale: The particle אֶת here marks the object of the verb rather than the preposition
    'with.' English idiom compresses the object phrase into 'Whom did he consult?'
    rather than a more wooden 'Whom did he counsel?'.
- source_word: נוֹעָץ
  chosen: did he consult
  alternatives:
  - took counsel
  - consulted
  lexicon: HALOT
  rationale: From יעץ in the Niphal, here with the sense of seeking or taking counsel.
    'Did he consult' is natural modern English and fits the rhetorical question about
    God's independence.
- source_word: וַיְבִינֵהוּ
  chosen: who gave him understanding
  alternatives:
  - made him understand
  - instructed him
  lexicon: HALOT
  rationale: The Hiphil of בין commonly means 'cause to understand.' 'Gave him understanding'
    is idiomatic and preserves the causative sense.
- source_word: וַיְלַמְּדֵהוּ
  chosen: taught him
  alternatives:
  - instructed him
  lexicon: HALOT
  rationale: Standard rendering of למד in the Piel/Hiphil teaching domain. Repeated
    twice in the verse, so kept consistent.
- source_word: בְּאֹרַח מִשְׁפָּט
  chosen: the path of justice
  alternatives:
  - the path of judgment
  - the course of justice
  lexicon: HALOT
  rationale: אֹרַח is 'path/way.' מִשְׁפָּט can mean judgment, justice, or legal decision.
    In this wisdom-like collocation, 'path of justice' best conveys a normatively
    right course rather than merely courtroom procedure.
- source_word: דַעַת
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: דעת is straightforwardly 'knowledge.' Since the verse also uses בין and
    תבונות for understanding-related ideas, 'knowledge' preserves the lexical distinction.
- source_word: וְדֶרֶךְ תְּבוּנוֹת
  chosen: the way of understanding
  alternatives:
  - the way of insight
  - the path of discernment
  lexicon: HALOT
  rationale: דֶרֶךְ parallels אֹרַח as 'way/path.' תְּבוּנוֹת is a plural abstract/intensive
    form related to understanding/discernment. 'The way of understanding' is clear
    and preserves the parallelism.
- source_word: יוֹדִיעֶנּוּ
  chosen: made known to him
  alternatives:
  - informed him of
  - caused him to know
  lexicon: HALOT
  rationale: Hiphil of ידע, causative 'make known.' 'Made known to him' is natural
    and retains the causative force.
