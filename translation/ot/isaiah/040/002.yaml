id: ISA.40.2
reference: Isaiah 40:2
source:
  edition: WLC
  text: דַּבְּר֞וּ עַל לֵ֤ב יְרֽוּשָׁלִַ֨ם֙ וְ/קִרְא֣וּ אֵלֶ֔י/הָ כִּ֤י מָֽלְאָה֙
    צְבָאָ֔/הּ כִּ֥י נִרְצָ֖ה עֲוֺנָ֑/הּ כִּ֤י לָקְחָה֙ מִ/יַּ֣ד יְהוָ֔ה כִּפְלַ֖יִם
    בְּ/כָל חַטֹּאתֶֽי/הָ־־׃ס
translation:
  text: Speak tenderly to Jerusalem, and call out to her that her hard service is
    completed, that her iniquity is pardoned, that she has received from the hand
    of the LORD double for all her sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'her warfare is ended' or 'her term of service is fulfilled.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'her punishment is accepted/satisfied' or 'her guilt is accepted.'
    reason: lexical_alternative
  - marker: c
    text: '''Double'' may be an idiom for a full measure, not necessarily a precise
      mathematical doubling.'
    reason: cultural_note
lexical_decisions:
- source_word: דַּבְּרוּ עַל־לֵב
  chosen: Speak tenderly
  alternatives:
  - Speak to the heart of
  - Comfort
  lexicon: HALOT
  rationale: The idiom דִּבֵּר עַל־לֵב means to speak reassuringly or tenderly, not
    merely anatomically 'to the heart.' 'Speak tenderly' captures the idiomatic force
    in natural English while preserving the consoling tone.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: וְקִרְאוּ אֵלֶיהָ
  chosen: and call out to her
  alternatives:
  - and proclaim to her
  - and cry to her
  lexicon: HALOT
  rationale: קרא with אֶל can mean call out to or proclaim to. 'Call out to her' preserves
    the verbal vividness and direct address, fitting the prophetic heralding context.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the proclamation in a series. English
    'that' best signals reported content after 'call out to her,' though the causal
    nuance ('for') remains nearby semantically.
- source_word: מָלְאָה צְבָאָהּ
  chosen: her hard service is completed
  alternatives:
  - her warfare is ended
  - her term of service is fulfilled
  lexicon: HALOT
  rationale: צָבָא can denote warfare, military service, or a period of compulsory
    service. In this context of exile and restoration, the sense is a burdensome appointed
    service coming to an end. 'Hard service is completed' communicates the broader
    sense without restricting it to literal warfare; the traditional 'warfare is ended'
    is preserved in a footnote.
- source_word: נִרְצָה עֲוֺנָהּ
  chosen: her iniquity is pardoned
  alternatives:
  - her guilt is accepted
  - her punishment is accepted
  - her iniquity is paid for
  lexicon: HALOT
  rationale: The Niphal of רצה here conveys being accepted/favorably received, and
    in context with עָוֹן it indicates that the offense has been dealt with so that
    pardon is now announced. 'Her iniquity is pardoned' expresses the result in clear
    English. Because the Hebrew can also be understood in terms of penalty being accepted
    or satisfied, that nuance is preserved in a footnote.
- source_word: עֲוֺנָהּ
  chosen: her iniquity
  alternatives:
  - her guilt
  - her punishment for sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the punishment resulting from guilt.
    'Iniquity' keeps the moral dimension in the main text, while the broader semantic
    range informs the rendering of the clause and is noted via alternatives.
- source_word: לָקְחָה מִיַּד יְהוָה
  chosen: she has received from the hand of the LORD
  alternatives:
  - she has taken from the hand of the LORD
  lexicon: HALOT
  rationale: לקח commonly means take/receive. In this passive-result context, 'has
    received' is the natural English expression for what has come to Jerusalem from
    the LORD's hand.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: כִּפְלַיִם
  chosen: double
  alternatives:
  - twice as much
  - full measure
  lexicon: HALOT
  rationale: The noun means 'double' or 'twofold.' The phrase is retained straightforwardly
    in the main text. Because interpreters debate whether it means exact double punishment
    or an idiomatic full measure, the latter is preserved in a footnote.
- source_word: בְּכָל חַטֹּאתֶיהָ
  chosen: for all her sins
  alternatives:
  - for all her sin offerings?
  - because of all her sins
  lexicon: HALOT
  rationale: חַטֹּאות here clearly means sins, not sin offerings, in context. 'For
    all her sins' expresses the relation to the preceding 'received ... double' idiomatically
    in English.
