theological_decisions:
- issue: Meaning of Jerusalem's received 'double' from the LORD
  chosen_reading: A statement that Jerusalem has received a full measure corresponding
    to all her sins, without specifying a precise mathematical ratio.
  alternative_readings:
  - A strictly double punishment for each sin
  - An abundant measure of grace rather than punishment
  rationale: The immediate context speaks of completed service and pardoned iniquity
    after prior suffering. The clause most naturally refers to what Jerusalem has
    already received in judgment from the LORD's hand, with 'double' functioning idiomatically
    for full measure or more than enough. The translation keeps the literal 'double'
    in the text and avoids over-resolving the idiom.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of נִרְצָה עֲוֺנָהּ
  chosen_reading: An announcement of pardon/acceptance of Jerusalem's iniquity after
    judgment.
  alternative_readings:
  - Her punishment has been accepted as sufficient
  - Her guilt has been favorably received/appeased
  rationale: The clause announces restoration, so an English rendering that foregrounds
    pardon best communicates the result for modern readers. Because the Hebrew verb
    can suggest acceptance or satisfaction rather than a direct lexical equivalent
    'pardon,' the alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
