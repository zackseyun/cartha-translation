id: ISA.40.23
reference: Isaiah 40:23
source:
  edition: WLC
  text: הַ/נּוֹתֵ֥ן רוֹזְנִ֖ים לְ/אָ֑יִן שֹׁ֥פְטֵי אֶ֖רֶץ כַּ/תֹּ֥הוּ עָשָֽׂה׃
translation:
  text: who brings princes to nothing, and makes the judges of the earth like emptiness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like chaos,' 'like nothingness,' or 'as emptiness'; the Hebrew תֹהוּ
      denotes emptiness, wasteness, or unreality.
    reason: lexical_alternative
  - marker: b
    text: Or 'the judges of the land'; Hebrew אֶרֶץ can mean 'earth' or 'land,' but
      the broader context here favors the universal sense.
    reason: alternative_reading
lexical_decisions:
- source_word: הַנּוֹתֵן
  chosen: who brings
  alternatives:
  - who gives
  - the one who makes
  lexicon: HALOT
  rationale: The participle of נתן functions here in a relative/descriptive sense
    continuing the description of God from the previous verse. 'Who brings' fits the
    idiom with לְאַיִן ('to nothing') more naturally in English than the more wooden
    'who gives ... to nothing.'
- source_word: רוֹזְנִים
  chosen: princes
  alternatives:
  - rulers
  - dignitaries
  lexicon: HALOT
  rationale: רוֹזְנִים denotes high officials or nobles. 'Princes' preserves the elevated
    political sense and matches common prophetic usage, while remaining understandable
    in modern English.
- source_word: לְאָיִן
  chosen: to nothing
  alternatives:
  - to nonexistence
  - to naught
  lexicon: HALOT
  rationale: אָיִן expresses nonexistence or nothingness. 'To nothing' is idiomatic
    and preserves the force of reducing human rulers to insignificance.
- source_word: שֹׁפְטֵי אֶרֶץ
  chosen: the judges of the earth
  alternatives:
  - earth's judges
  - the rulers of the land
  lexicon: HALOT
  rationale: The construct phrase straightforwardly means 'judges of the earth/land.'
    'Earth' is preferable here because the context is cosmic and universal in Isaiah
    40, not merely local.
- source_word: כַּתֹּהוּ
  chosen: like emptiness
  alternatives:
  - like chaos
  - like nothingness
  - as formlessness
  lexicon: HALOT
  rationale: תֹהוּ often denotes emptiness, wasteness, or unreality. Here it describes
    the utter insubstantiality of earthly judges before God. 'Like emptiness' communicates
    that sense clearly without importing Genesis 1's more specialized 'formless' nuance.
- source_word: עָשָׂה
  chosen: makes
  alternatives:
  - has made
  - renders
  lexicon: HALOT
  rationale: Though morphologically perfect, the verb is used in parallel with the
    participle and in poetic discourse can express characteristic action. Present-tense
    'makes' best reflects the ongoing descriptive force in English.
