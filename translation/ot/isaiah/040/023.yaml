theological_decisions:
- issue: Scope of אֶרֶץ in שֹׁפְטֵי אֶרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: In Isaiah 40 the immediate context emphasizes God's sovereignty over
    the world and nations broadly. Rendering אֶרֶץ as 'earth' preserves that universal
    scope without narrowing the statement to one territory.
