id: ISA.40.1
reference: Isaiah 40:1
source:
  edition: WLC
  text: נַחֲמ֥וּ נַחֲמ֖וּ עַמִּ֑/י יֹאמַ֖ר אֱלֹהֵי/כֶֽם׃
translation:
  text: Comfort, comfort my people, says your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Console, console my people.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'will say'; rendered 'says' as a standard prophetic speech introduction
      in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲמוּ
  chosen: Comfort
  alternatives:
  - Console
  - Bring comfort to
  lexicon: HALOT
  rationale: Imperative plural of נחם in the Piel, here a direct summons to give comfort.
    'Comfort' is the most natural and established English equivalent and preserves
    the force of the repeated command without unnecessary expansion.
- source_word: נַחֲמוּ נַחֲמוּ
  chosen: Comfort, comfort
  alternatives:
  - Comfort, yes, comfort
  - Comfort them, comfort them
  lexicon: HALOT
  rationale: The repetition is retained in English to preserve the emphatic, urgent,
    and rhetorically solemn force of the Hebrew duplication. No object is supplied
    beyond what follows in apposition.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: עם commonly denotes a people in covenantal or communal sense. 'My people'
    preserves both the possessive relationship and the covenantal resonance better
    than 'my nation.'
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - will say
  - has said
  lexicon: HALOT
  rationale: Though morphologically imperfect ('will say'), Hebrew prophetic discourse
    often uses the imperfect for quotative introduction with present force in English.
    'Says' is idiomatic and fits the immediate divine speech formula.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with singular sense and
    singular verb context refers to the one God of Israel. 'Your God' accurately reflects
    the syntax and theology of the passage.
