theological_decisions:
- issue: Speaker identification and covenantal tone
  chosen_reading: 'The verse is rendered as a divine speech introduction: ''says your
    God,'' preserving the covenant relationship without specifying intermediaries.'
  alternative_readings:
  - '''will say your God'' with a more future nuance'
  rationale: The text identifies God as the speaker/source of the command and emphasizes
    restored covenant relationship through 'my people' / 'your God.' The translation
    preserves this theological tension and tenderness without adding interpretive
    detail about who is being addressed beyond the plural imperative.
  doctrine_reference: Translation philosophy §§1, 3, 6
