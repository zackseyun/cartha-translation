theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of מִשְׁפָּטִי in the complaint
  chosen_reading: my justice
  alternative_readings:
  - my right
  - my cause
  rationale: The Hebrew can refer to justice due to the speaker, a legal right, or
    a case/cause awaiting vindication. 'My justice' preserves the lexical force of
    משפט and the theological tension of perceived divine neglect, while alternatives
    are preserved in a footnote rather than resolved away.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it; §5 Consistency of key terms
