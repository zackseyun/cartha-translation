id: ISA.40.27
reference: Isaiah 40:27
source:
  edition: WLC
  text: לָ֤/מָּה תֹאמַר֙ יַֽעֲקֹ֔ב וּ/תְדַבֵּ֖ר יִשְׂרָאֵ֑ל נִסְתְּרָ֤ה דַרְכִּ/י֙
    מֵֽ/יְהוָ֔ה וּ/מֵ/אֱלֹהַ֖/י מִשְׁפָּטִ֥/י יַעֲבֽוֹר׃
translation:
  text: Why do you say, O Jacob, and speak, O Israel, “My way is hidden from the LORD,
    and my justice passes by my God”?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my right' or 'my cause.' The Hebrew mishpati can refer to one's justice,
      legal right, or case for vindication.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Introduces a rhetorical challenge. 'Why' is the natural modern English
    equivalent and preserves the interrogative force.
- source_word: תֹאמַר
  chosen: do you say
  alternatives:
  - you say
  lexicon: HALOT
  rationale: Rendered with English auxiliary for natural interrogative syntax while
    preserving the direct second-person address.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Standard transliteration of the personal/name-for-the-people designation.
- source_word: וּתְדַבֵּר
  chosen: and speak
  alternatives:
  - and say
  lexicon: HALOT
  rationale: Maintains the distinction between אמר and דבר rather than flattening
    both to 'say.' The parallelism is preserved with slightly varied English diction.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration; paired with 'Jacob' as covenant names for the
    people.
- source_word: נִסְתְּרָה
  chosen: is hidden
  alternatives:
  - has been hidden
  - is concealed
  lexicon: HALOT
  rationale: Passive sense is clear. Present English best fits the quoted complaint
    as a current condition.
- source_word: דַרְכִּי
  chosen: My way
  alternatives:
  - my path
  - my course
  lexicon: HALOT
  rationale: '''Way'' is the most direct rendering of דרך and can denote one''s course,
    condition, or life-circumstances. It preserves the metaphor without over-interpreting
    it.'
- source_word: מֵיְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition marks concealment
    from the LORD's notice or sight.
- source_word: וּמֵאֱלֹהַי
  chosen: from my God
  alternatives:
  - before my God
  lexicon: HALOT
  rationale: The repeated preposition links the second clause with the first. 'My
    God' preserves the first-person suffix and covenantal tone.
- source_word: מִשְׁפָּטִי
  chosen: my justice
  alternatives:
  - my right
  - my cause
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, legal right, or cause. 'My justice' keeps
    the lexical connection to משפט while allowing the sense that the speaker's rightful
    claim is being neglected. Alternatives are viable and worth preserving in a footnote.
- source_word: יַעֲבוֹר
  chosen: passes by
  alternatives:
  - passes over
  - is ignored
  - is overlooked
  lexicon: HALOT
  rationale: The verb literally means 'pass over/by.' 'Passes by' preserves the metaphor
    of something being bypassed or disregarded without making the interpretation too
    explicit.
