theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This also aligns with longstanding English Bible convention while preserving
    the covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret כָל בָּשָׂר dynamically as humanity or retain the literal
    idiom
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - everyone
  rationale: The phrase is universal in scope, but the Hebrew deliberately uses 'flesh.'
    Retaining the idiom preserves the text's embodied, creaturely emphasis without
    importing a narrower or flatter abstraction.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
