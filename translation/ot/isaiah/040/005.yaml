theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to interpret כָל בָּשָׂר dynamically as humanity or retain the literal idiom
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - everyone
  rationale: The phrase is universal in scope, but the Hebrew deliberately uses 'flesh.' Retaining the idiom preserves the text's embodied, creaturely emphasis without importing a narrower or flatter abstraction.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
