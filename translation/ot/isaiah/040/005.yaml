id: ISA.40.5
reference: Isaiah 40:5
source:
  edition: WLC
  text: וְ/נִגְלָ֖ה כְּב֣וֹד יְהוָ֑ה וְ/רָא֤וּ כָל בָּשָׂר֙ יַחְדָּ֔ו כִּ֛י פִּ֥י
    יְהוָ֖ה דִּבֵּֽר־׃ס
translation:
  text: And the glory of the LORD will be revealed, and all flesh together will see
    it, for the mouth of the LORD has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity'; Hebrew 'all flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִגְלָה
  chosen: will be revealed
  alternatives:
  - shall be revealed
  - will appear
  lexicon: HALOT
  rationale: Nifal of גלה is passive/reflexive, indicating disclosure or manifestation.
    'Will be revealed' preserves the passive sense and prophetic future force better
    than the less precise 'will appear.'
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד denotes glory, honor, weightiness; the construct phrase is naturally
    rendered 'the glory of the LORD.' This preserves the theological weight and the
    Hebrew syntax.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: וְרָאוּ
  chosen: will see
  alternatives:
  - shall see
  - will behold
  lexicon: HALOT
  rationale: Qal perfect with vav in prophetic sequence carries future sense here.
    'Will see' is clear modern English and sufficiently direct; 'behold' is more elevated
    but less natural.
- source_word: כָל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all humanity
  - everyone
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh' and in this idiom refers to all living
    humans. 'All flesh' preserves the Hebrew imagery and solemn universality better
    than the interpretive 'all humanity.'
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: The adverb emphasizes collective simultaneity or united scope. 'Together'
    is the most natural concise rendering in context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or assurance for the preceding promise.
    'For' preserves the explanatory connection in idiomatic English.
- source_word: פִּי יְהוָה
  chosen: the mouth of the LORD
  alternatives:
  - the LORD himself
  - the LORD's mouth
  lexicon: HALOT
  rationale: The Hebrew idiom is concrete and emphatic. 'The mouth of the LORD' preserves
    the anthropomorphic expression rather than flattening it into a paraphrase.
- source_word: דִּבֵּר
  chosen: has spoken
  alternatives:
  - has said
  - has declared
  lexicon: HALOT
  rationale: The perfect presents the statement as accomplished and therefore certain.
    'Has spoken' matches the Hebrew verb directly and fits the prophetic assurance
    formula.
