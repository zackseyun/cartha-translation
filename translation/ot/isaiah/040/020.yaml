theological_decisions:
- issue: Rendering פֶּסֶל in an anti-idolatry context
  chosen_reading: an idol
  alternative_readings:
  - a carved image
  rationale: The verse mocks the making of false gods. 'Idol' communicates the theological force of the prophetic critique more directly, while remaining lexically justified.
