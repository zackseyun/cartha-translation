id: ISA.40.20
reference: Isaiah 40:20
source:
  edition: WLC
  text: הַֽ/מְסֻכָּ֣ן תְּרוּמָ֔ה עֵ֥ץ לֹֽא יִרְקַ֖ב יִבְחָ֑ר חָרָ֤שׁ חָכָם֙ יְבַקֶּשׁ ל֔/וֹ לְ/הָכִ֥ין פֶּ֖סֶל לֹ֥א יִמּֽוֹט־־׃
translation:
  text: The one too poor for an offering chooses wood that will not rot; he seeks out for himself a skilled craftsman to prepare an idol that will not totter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The impoverished one chooses as an offering wood that does not decay.' The Hebrew opening is compact and may be construed slightly differently.
    reason: alternative_reading
  - marker: b
    text: Or 'a carved image' for 'an idol.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he seeks out a skilled craftsman for himself to prepare'.
    reason: previous_rendering
lexical_decisions:
- source_word: הַמְסֻכָּן
  chosen: the one too poor
  alternatives:
  - the impoverished one
  - the one impoverished
  lexicon: HALOT
  rationale: The passive/adj. form from סכן in this context is widely understood as referring to one reduced to poverty or too poor to afford a costly idol. Rendering it as a substantival phrase preserves the Hebrew sense without forcing an overly literal form.
- source_word: תְּרוּמָה
  chosen: for an offering
  alternatives:
  - as an offering
  - oblation
  - contribution
  lexicon: HALOT
  rationale: תְּרוּמָה commonly denotes a contribution or offering. Here it likely refers to what one can present or devote in idol manufacture/worship. 'For an offering' fits the syntax with הַמְסֻכָּן and communicates the cultic sense in natural English.
- source_word: עֵץ לֹא יִרְקַב
  chosen: wood that will not rot
  alternatives:
  - wood that does not decay
  - incorruptible wood
  lexicon: HALOT
  rationale: The phrase describes durable material selected for idol construction. 'Will not rot' is clear modern English and preserves the concrete image better than the more abstract 'incorruptible.'
- source_word: יִבְחָר
  chosen: chooses
  alternatives:
  - selects
  lexicon: HALOT
  rationale: Simple present English suits the prophetic description of customary action.
- source_word: חָרָשׁ חָכָם
  chosen: a skilled craftsman
  alternatives:
  - a wise craftsman
  - an expert artisan
  lexicon: HALOT
  rationale: חָרָשׁ is a craftsman/artisan; חָכָם here describes technical skill rather than moral wisdom. 'Skilled craftsman' conveys the idiomatic sense in English.
- source_word: יְבַקֶּשׁ לוֹ
  chosen: he seeks out ... for himself
  alternatives:
  - he looks for ... for himself
  - he searches for ... for himself
  lexicon: HALOT
  rationale: The idiom indicates intentional procurement. Including 'for himself' reflects לוֹ and the personal nature of the action.
- source_word: לְהָכִין
  chosen: to prepare
  alternatives:
  - to set up
  - to fashion
  lexicon: HALOT
  rationale: The verb means to make ready or prepare. Since the craftsman is the one who fashions the idol, 'prepare' preserves the Hebrew wording without over-specifying.
- source_word: פֶּסֶל
  chosen: an idol
  alternatives:
  - a carved image
  - an image
  lexicon: HALOT
  rationale: פֶּסֶל denotes an idol/image, often carved. 'Idol' best captures the polemical force of the context in Isaiah 40, while 'carved image' is a possible more formal alternative.
- source_word: לֹא יִמּוֹט
  chosen: that will not totter
  alternatives:
  - that will not be moved
  - that will not topple
  lexicon: HALOT
  rationale: 'The verb denotes slipping, shaking, or tottering. ''Totter'' preserves the irony: the worshiper wants a stable idol. ''Topple'' is possible but slightly stronger than the Hebrew.'
