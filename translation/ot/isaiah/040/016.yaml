id: ISA.40.16
reference: Isaiah 40:16
source:
  edition: WLC
  text: וּ/לְבָנ֕וֹן אֵ֥ין דֵּ֖י בָּעֵ֑ר וְ/חַיָּת֔/וֹ אֵ֥ין דֵּ֖י עוֹלָֽה׃ס
translation:
  text: Lebanon is not enough to burn, nor are its animals enough for a burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lebanon likely evokes its famous forests; the sense is that even all its
      wood would not suffice for the fire.
    reason: cultural_note
  - marker: b
    text: Or 'its beasts'; the Hebrew may specifically suggest the animals of Lebanon
      as sacrificial victims.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבָנוֹן
  chosen: Lebanon
  alternatives:
  - the forests of Lebanon
  lexicon: HALOT
  rationale: Proper place name retained by transliteration per translation philosophy.
    In context Lebanon stands metonymically for its famed cedar forests, but the Hebrew
    names the region directly, so the main text keeps 'Lebanon' and lets the implication
    be understood.
- source_word: אֵין דֵּי
  chosen: is not enough
  alternatives:
  - there is not sufficient
  - is insufficient
  lexicon: HALOT
  rationale: The combination expresses lack of sufficiency. 'Is not enough' is idiomatic
    modern English and preserves the quantitative force.
- source_word: בָּעֵר
  chosen: to burn
  alternatives:
  - for burning
  - to kindle
  lexicon: HALOT
  rationale: The infinitive of בער here refers to burning fuel. 'To burn' is concise
    and natural in English; the object implied is sacrificial firewood from Lebanon.
- source_word: וְחַיָּתוֹ
  chosen: its animals
  alternatives:
  - its beasts
  - its wild animals
  lexicon: HALOT
  rationale: חיה can denote animal/beast, often wild animal. Here the suffix refers
    back to Lebanon and the sense is the animals belonging to that region. 'Its animals'
    is broad, natural, and fits the sacrificial comparison without over-specifying
    'wild.'
- source_word: עוֹלָה
  chosen: a burnt offering
  alternatives:
  - burnt offerings
  - an ascending offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for a whole burnt offering. Singular
    in Hebrew is well represented by English singular with collective force in this
    comparison.
