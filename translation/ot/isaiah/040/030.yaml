id: ISA.40.30
reference: Isaiah 40:30
source:
  edition: WLC
  text: וְ/יִֽעֲפ֥וּ נְעָרִ֖ים וְ/יִגָ֑עוּ וּ/בַחוּרִ֖ים כָּשׁ֥וֹל יִכָּשֵֽׁלוּ׃
translation:
  text: Even young men grow faint and become weary, and chosen young men surely stumble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vigorous young men' or simply 'young men.' The Hebrew בַּחוּרִים refers
      to young men in the prime of strength; 'chosen' preserves the lexical distinction
      from the previous term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִעֲפוּ
  chosen: grow faint
  alternatives:
  - be faint
  - faint
  lexicon: HALOT
  rationale: From עוּף in the Qal imperfect plural, denoting becoming exhausted or
    faint. 'Grow faint' is natural modern English and preserves the inceptive sense
    better than the stative 'are faint.'
- source_word: נְעָרִים
  chosen: young men
  alternatives:
  - youths
  - boys
  lexicon: HALOT
  rationale: נְעָרִים can denote youths or young men. In parallel with בַחוּרִים,
    'young men' best fits the poetic emphasis on those in the prime of strength rather
    than children.
- source_word: וְיִגָעוּ
  chosen: become weary
  alternatives:
  - grow tired
  - are weary
  lexicon: HALOT
  rationale: From יגע, 'to be weary, tire.' 'Become weary' pairs well with 'grow faint'
    and reflects the verbal progression in English.
- source_word: וּבַחוּרִים
  chosen: chosen young men
  alternatives:
  - young men
  - vigorous young men
  - young warriors
  lexicon: HALOT
  rationale: בָּחוּר commonly refers to a young man in his prime, often with the nuance
    of selectness or vigor. Rendering it as 'chosen young men' preserves the lexical
    distinction from נְעָרִים and reflects the root sense, though the context also
    implies youthful strength.
- source_word: כָּשׁוֹל יִכָּשֵׁלוּ
  chosen: surely stumble
  alternatives:
  - stumble badly
  - utterly fall
  - stumble and fall
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Surely
    stumble' preserves the emphatic construction without overtranslating into a full
    collapse; the context stresses even the strongest failing.
