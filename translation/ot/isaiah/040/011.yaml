theological_decisions:
- issue: Divine shepherd imagery
  chosen_reading: Retain the pastoral metaphor straightforwardly without importing
    later messianic or christological interpretation into the translation.
  alternative_readings:
  - A more interpretive rendering that foregrounds messianic fulfillment
  rationale: The verse depicts YHWH's tender care in shepherd imagery. In keeping
    with optimal equivalence and doctrinal restraint, the translation preserves the
    OT image itself and does not embed later theological conclusions into the wording.
  doctrine_reference: Translation philosophy §§1, 3
