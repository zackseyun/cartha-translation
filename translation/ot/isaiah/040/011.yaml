id: ISA.40.11
reference: Isaiah 40:11
source:
  edition: WLC
  text: כְּ/רֹעֶה֙ עֶדְר֣/וֹ יִרְעֶ֔ה בִּ/זְרֹע/וֹ֙ יְקַבֵּ֣ץ טְלָאִ֔ים וּ/בְ/חֵיק֖/וֹ
    יִשָּׂ֑א עָל֖וֹת יְנַהֵֽל׃ס
translation:
  text: Like a shepherd he will pasture his flock; with his arm he will gather the
    lambs, and in his bosom he will carry them; he will gently lead the nursing ewes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "As a shepherd he will tend his flock."
    reason: lexical_alternative
  - marker: b
    text: Literally "in his bosom," an image of close, tender care.
    reason: cultural_note
  - marker: c
    text: Or "ewes with young."
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרֹעֶה
  chosen: Like a shepherd
  alternatives:
  - As a shepherd
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). 'Like a shepherd' is idiomatic
    and preserves the simile introducing YHWH's care.
- source_word: עֶדְרוֹ
  chosen: his flock
  alternatives:
  - his herd
  lexicon: HALOT
  rationale: In shepherding context, עֵדֶר refers specifically to a flock rather than
    a generic herd.
- source_word: יִרְעֶה
  chosen: he will pasture
  alternatives:
  - he will shepherd
  - he will tend
  lexicon: HALOT
  rationale: רעה in this stem means to pasture/tend as a shepherd. 'Pasture' keeps
    the concrete feeding/shepherding sense and avoids flattening the verbal link with
    'shepherd' in the opening phrase.
- source_word: בִּזְרֹעוֹ
  chosen: with his arm
  alternatives:
  - by his arm
  - in his arm
  lexicon: HALOT
  rationale: The preposition ב here is instrumental or associative. 'With his arm'
    is natural English and preserves the image of strength used for gathering.
- source_word: יְקַבֵּץ
  chosen: he will gather
  alternatives:
  - he will collect
  lexicon: HALOT
  rationale: קבץ commonly means gather together. 'Gather' is the standard, natural
    rendering in this pastoral image.
- source_word: טְלָאִים
  chosen: the lambs
  alternatives:
  - young lambs
  lexicon: HALOT
  rationale: The noun denotes lambs. The article is not explicit in Hebrew, but English
    idiom in this context naturally uses 'the lambs' for the class being gathered.
- source_word: וּבְחֵיקוֹ
  chosen: in his bosom
  alternatives:
  - in his arms
  - close to his chest
  lexicon: HALOT
  rationale: חֵיק is literally bosom/lap. 'In his bosom' preserves the intimate, tender
    imagery more precisely than the broader 'in his arms.'
- source_word: יִשָּׂא
  chosen: he will carry them
  alternatives:
  - he will bear them
  lexicon: HALOT
  rationale: נשא means lift/carry/bear. Because the direct object is implied from
    the prior 'lambs,' English supplies 'them' for clarity.
- source_word: עָלוֹת
  chosen: the nursing ewes
  alternatives:
  - ewes with young
  - those that are nursing
  lexicon: HALOT
  rationale: The participial form refers to females that are giving suck or have young
    at heel. 'Nursing ewes' is concise, accurate, and preserves the pastoral specificity.
- source_word: יְנַהֵל
  chosen: he will gently lead
  alternatives:
  - he will lead
  - he will guide
  lexicon: HALOT
  rationale: נהל can mean lead/guide, often with a nuance of careful, restful guidance
    in pastoral contexts. 'Gently lead' brings out the contextual tenderness toward
    vulnerable animals without over-paraphrasing.
