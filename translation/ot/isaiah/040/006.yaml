theological_decisions:
- issue: Speaker identification in וְאָמַר
  chosen_reading: 'first person: ''And I said'''
  alternative_readings:
  - 'third person: ''And one said'''
  - 'third person: ''And he said'''
  rationale: The Masoretic pointing supports first person, which is followed in the
    main text. Because the identity of the respondent affects how the prophetic dialogue
    is heard, the alternative traditional reading is preserved in a footnote rather
    than silently excluded.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
