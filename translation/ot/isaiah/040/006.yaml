id: ISA.40.6
reference: Isaiah 40:6
source:
  edition: WLC
  text: ק֚וֹל אֹמֵ֣ר קְרָ֔א וְ/אָמַ֖ר מָ֣ה אֶקְרָ֑א כָּל הַ/בָּשָׂ֣ר חָצִ֔יר וְ/כָל
    חַסְדּ֖/וֹ כְּ/צִ֥יץ הַ/שָּׂדֶֽה־־׃
translation:
  text: A voice says, “Cry out!” And I said, “What shall I cry?” All flesh is grass,
    and all its beauty is like the flower of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another traditional reading: “And one said” or “And he said.”'
    reason: alternative_reading
  - marker: b
    text: “All flesh” is a literal expression for all humanity or all people.
    reason: lexical_alternative
  - marker: c
    text: Or “all its glory.” The Hebrew word can denote what is lovely, splendid,
      or admirable here.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: A voice
  alternatives:
  - A sound
  - A voice
  lexicon: HALOT
  rationale: קוֹל commonly denotes a voice or sound. In this prophetic context, an
    unidentified speaking voice is most natural and idiomatic in English.
- source_word: אֹמֵר
  chosen: says
  alternatives:
  - is saying
  - said
  lexicon: HALOT
  rationale: 'The participle functions as a present/imperfective description: ''a
    voice says'' or ''is saying.'' ''Says'' is concise, natural English and preserves
    the vividness of the scene.'
- source_word: קְרָא
  chosen: Cry out
  alternatives:
  - Call
  - Proclaim
  lexicon: HALOT
  rationale: קרא can mean call, cry, proclaim. Here the imperative introduces a prophetic
    announcement. 'Cry out' preserves the forceful public sense without over-specifying
    formal proclamation.
- source_word: וְאָמַר
  chosen: And I said
  alternatives:
  - And one said
  - And he said
  lexicon: HALOT
  rationale: The consonantal text can be read as first person ('and I said') or, with
    an alternate vocalization/tradition, third person ('and one said'/'he said').
    Following the MT pointing, the main text uses first person, while the alternative
    is preserved in a footnote because it is a significant translational issue.
- source_word: מָה אֶקְרָא
  chosen: What shall I cry?
  alternatives:
  - What shall I proclaim?
  - What am I to cry?
  lexicon: HALOT
  rationale: This repeats the root קרא and naturally echoes the command. 'What shall
    I cry?' is slightly more formal but preserves the lexical link with 'Cry out!'.
- source_word: כָּל הַבָּשָׂר
  chosen: All flesh
  alternatives:
  - All humanity
  - All people
  lexicon: HALOT
  rationale: בשר literally means 'flesh.' Here it refers to mortal humanity, but the
    literal rendering 'all flesh' preserves the metaphorical contrast with grass and
    avoids flattening the imagery. A more interpretive alternative is worth preserving
    in a footnote.
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - herbage
  lexicon: HALOT
  rationale: Standard rendering in this mortality metaphor; clear and idiomatic.
- source_word: חַסְדּוֹ
  chosen: its beauty
  alternatives:
  - its steadfast love
  - its loyalty
  - its glory
  lexicon: HALOT
  rationale: Though חסד often means covenant loyalty/steadfast love, in this context
    referring to 'all flesh' it denotes what is fleetingly attractive or splendid
    about humanity. 'Its beauty' fits the parallel with a flower and avoids importing
    covenantal overtones that the immediate context does not require. 'Its glory'
    is a viable alternative reflected in some translations and preserved in a footnote.
- source_word: כְּצִיץ הַשָּׂדֶה
  chosen: like the flower of the field
  alternatives:
  - like a flower of the field
  - like the blossom of the field
  lexicon: HALOT
  rationale: ציץ denotes a blossom/flower. 'The flower of the field' is idiomatic
    and matches the generic image of wild, transient bloom.
