id: ISA.40.4
reference: Isaiah 40:4
source:
  edition: WLC
  text: כָּל גֶּיא֙ יִנָּשֵׂ֔א וְ/כָל הַ֥ר וְ/גִבְעָ֖ה יִשְׁפָּ֑לוּ וְ/הָיָ֤ה הֶֽ/עָקֹב֙
    לְ/מִישׁ֔וֹר וְ/הָ/רְכָסִ֖ים לְ/בִקְעָֽה־־׃
translation:
  text: Every valley will be lifted up, and every mountain and hill will be made low;
    the uneven ground will become level, and the ridges a plain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crooked place' for 'the uneven ground'; the Hebrew term can denote
      what is crooked or uneven.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rough places' for 'the ridges'; the Hebrew noun is rare and may
      refer more generally to rugged terrain.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֶּיא
  chosen: valley
  alternatives:
  - ravine
  lexicon: HALOT
  rationale: The noun denotes a valley or ravine. 'Valley' is the most natural broad
    English equivalent here and fits the paired topographical imagery with mountain
    and hill.
- source_word: יִנָּשֵׂא
  chosen: will be lifted up
  alternatives:
  - will be raised
  lexicon: HALOT
  rationale: 'Nifal of נשׂא here is passive/reflexive in sense: the valley is elevated.
    ''Lifted up'' preserves the vivid imagery and echoes common biblical diction without
    becoming archaic.'
- source_word: הַר
  chosen: mountain
  alternatives:
  - mount
  lexicon: HALOT
  rationale: Standard rendering for the common noun for mountain; paired with גבעה
    for a height contrast.
- source_word: גִבְעָה
  chosen: hill
  alternatives:
  - mound
  lexicon: HALOT
  rationale: The term denotes a smaller elevation than הַר. 'Hill' preserves the natural
    pairing 'mountain and hill.'
- source_word: יִשְׁפָּלוּ
  chosen: will be made low
  alternatives:
  - will be brought low
  - will be lowered
  lexicon: HALOT
  rationale: From שׁפל, to be low/be abased. In this landscape-transformation context,
    English idiom is best served by 'will be made low,' which clearly matches the
    passive sense implied by the parallelism with 'will be lifted up.'
- source_word: הֶעָקֹב
  chosen: the uneven ground
  alternatives:
  - the crooked place
  - the rough/crooked terrain
  lexicon: HALOT
  rationale: From עקב, something crooked, uneven, or tortuous. In a road-preparation
    context, the referent is terrain rather than moral crookedness. 'Uneven ground'
    communicates the physical sense clearly in modern English.
- source_word: לְמִישׁוֹר
  chosen: level
  alternatives:
  - level ground
  - a plain
  lexicon: HALOT
  rationale: מישור denotes level ground, a flat place, or plain. After 'the uneven
    ground,' the predicate adjective-like 'level' is concise and idiomatic, while
    preserving the contrast.
- source_word: הָרְכָסִים
  chosen: the ridges
  alternatives:
  - the rough places
  - the rugged heights
  lexicon: HALOT
  rationale: The noun is relatively rare and refers to rough or ridged terrain. 'Ridges'
    keeps the topographical concreteness of the Hebrew better than the traditional
    but more generalized 'rough places.'
- source_word: לְבִקְעָה
  chosen: a plain
  alternatives:
  - a valley plain
  - a broad valley
  lexicon: HALOT
  rationale: בִקְעָה denotes a broad valley or plain. 'A plain' works well as the
    destination state of the ridges in the poetic parallelism and avoids redundancy
    with the earlier 'valley' for גיא.
