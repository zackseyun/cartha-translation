theological_decisions:
- issue: Nature of the imagery
  chosen_reading: Render as physical/topographical transformation without importing
    later theological interpretation into the main text.
  alternative_readings:
  - Metaphorical humbling of the proud and exaltation of the lowly
  - Eschatological preparation for the LORD's coming
  rationale: The immediate Hebrew presents landscape imagery in the context of preparing
    a way. While the verse readily supports metaphorical and eschatological readings
    in context and later reception, the translation should preserve the concrete imagery
    and let interpretation arise from context rather than be embedded in the wording.
  doctrine_reference: Translation philosophy items 1 and 3
