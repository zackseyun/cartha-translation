theological_decisions:
- issue: Syntactical placement of 'in the wilderness'
  chosen_reading: 'Attach ''in the wilderness'' to the imperative: ''In the wilderness prepare the way of the LORD.'''
  alternative_readings:
  - 'Attach it to the herald: ''A voice cries in the wilderness: Prepare the way of the LORD.'''
  rationale: The Hebrew accentuation supports linking במדבר with the command that follows rather than with 'voice cries.' However, because the alternative reading is deeply embedded in New Testament citation and Christian tradition, it should be preserved in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
