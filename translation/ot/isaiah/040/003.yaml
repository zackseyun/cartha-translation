id: ISA.40.3
reference: Isaiah 40:3
source:
  edition: WLC
  text: ק֣וֹל קוֹרֵ֔א בַּ/מִּדְבָּ֕ר פַּנּ֖וּ דֶּ֣רֶךְ יְהוָ֑ה יַשְּׁרוּ֙ בָּ/עֲרָבָ֔ה מְסִלָּ֖ה לֵ/אלֹהֵֽי/נוּ׃
translation:
  text: 'A voice cries: “In the wilderness prepare the way of Yahweh; make straight in the desert a highway for our God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another punctuation: “A voice cries in the wilderness, ‘Prepare the way of the LORD; make straight in the desert a highway for our God.’”'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֣וֹל
  chosen: A voice
  alternatives:
  - The voice
  - A sound
  lexicon: HALOT
  rationale: קול commonly denotes 'voice' or 'sound.' Here, with the following participle קוֹרֵא, 'A voice' is the most natural English opening and preserves the prophetic announcement idiom.
- source_word: קוֹרֵא
  chosen: cries
  alternatives:
  - calling
  - calls out
  lexicon: HALOT
  rationale: The participle literally means 'calling.' English idiom is smoother with a finite verb after 'A voice'; 'cries' preserves the vivid heraldic force better than the flatter 'calling.'
- source_word: בַּמִּדְבָּר
  chosen: In the wilderness
  alternatives:
  - A voice cries in the wilderness
  - In the desert
  lexicon: HALOT
  rationale: 'The phrase is syntactically ambiguous: it can modify ''cries'' or the imperative ''prepare.'' The Masoretic accentuation favors taking it with the command that follows, so the main text reads ''In the wilderness prepare.'' Because the alternative punctuation is historically important, it is preserved in a footnote.'
- source_word: פַּנּוּ
  chosen: prepare
  alternatives:
  - clear
  - turn
  lexicon: HALOT
  rationale: In this context פנה in the imperative means to clear or prepare a route. 'Prepare' is idiomatic in English and fits the road-building imagery.
- source_word: דֶּרֶךְ
  chosen: the way
  alternatives:
  - a way
  - road
  lexicon: HALOT
  rationale: '''Way'' is the standard rendering in this prophetic formula and can denote a roadway or route. The definite sense is supplied by the construct with the divine name: ''the way of the LORD.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַשְּׁרוּ
  chosen: make straight
  alternatives:
  - level
  - straighten
  lexicon: HALOT
  rationale: The verb means to make straight or smooth. 'Make straight' preserves the metaphor and echoes the parallelism with 'prepare the way.'
- source_word: בָּעֲרָבָה
  chosen: in the desert
  alternatives:
  - in the steppe
  - in the wasteland
  lexicon: HALOT
  rationale: ערבה denotes arid plain/desert steppe. 'Desert' is the clearest modern English equivalent, while still matching the wilderness-road imagery.
- source_word: מְסִלָּה
  chosen: a highway
  alternatives:
  - a raised road
  - a road
  lexicon: HALOT
  rationale: מסלה refers to a built-up roadway or highway. 'Highway' best conveys an intentionally prepared route suitable for a royal procession.
- source_word: לֵאלֹהֵינוּ
  chosen: for our God
  alternatives:
  - for our gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אלהים with first-person plural suffix here is the standard singular reference to Israel's God. 'For our God' reflects normal biblical usage and the immediate context.
