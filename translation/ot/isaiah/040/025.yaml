theological_decisions:
- issue: Divine self-description and incomparability
  chosen_reading: Render the verse as a rhetorical assertion of God's uniqueness without
    expanding the title or importing later doctrinal language.
  alternative_readings:
  - Use 'the Holy One of Israel' for theological familiarity
  - Paraphrase as 'Who can be compared to me?'
  rationale: The verse emphasizes God's incomparability and holiness. The translation
    should preserve that force while staying with the exact title and syntax present
    in the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
