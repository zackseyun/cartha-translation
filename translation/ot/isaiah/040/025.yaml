id: ISA.40.25
reference: Isaiah 40:25
source:
  edition: WLC
  text: וְ/אֶל מִ֥י תְדַמְּי֖וּ/נִי וְ/אֶשְׁוֶ֑ה יֹאמַ֖ר קָדֽוֹשׁ־׃
translation:
  text: To whom then will you compare me, that I should be like him? says the Holy
    One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'To whom then will you liken me, that I should be equal?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  chosen: To
  alternatives:
  - And to
  - But to
  lexicon: HALOT
  rationale: Introduces the object of comparison with אֶל after an implied discourse
    transition. English idiom prefers 'To whom then' rather than a more wooden 'And
    to whom.'
- source_word: מִי
  chosen: whom
  alternatives:
  - who
  lexicon: HALOT
  rationale: Interrogative pronoun in object position; 'whom' fits the governed preposition
    and preserves the formal rhetorical question.
- source_word: תְדַמְּיוּנִי
  chosen: will you compare me
  alternatives:
  - will you liken me
  - will you make me comparable
  lexicon: HALOT
  rationale: From דמה in the piel, 'to liken, compare.' 'Compare me' is clear modern
    English; 'liken me' is more traditional but less natural.
- source_word: וְאֶשְׁוֶה
  chosen: that I should be like him
  alternatives:
  - and be equal
  - and be comparable
  - that I should be equated
  lexicon: HALOT
  rationale: 'From שוה, expressing equivalence or likeness. In this rhetorical context,
    the sense is the result of comparison: ''that I should be like him.'' Singular
    ''him'' reflects the singular implied comparator after the indefinite interrogative.'
- source_word: יֹאמַר
  chosen: says
  alternatives:
  - said
  - will say
  - declares
  lexicon: HALOT
  rationale: The Hebrew imperfect introducing direct speech is commonly rendered as
    a present speech formula in prophetic discourse. 'Says' is natural and concise.
- source_word: קָדוֹשׁ
  chosen: the Holy One
  alternatives:
  - the Holy
  - the Holy One of Israel
  lexicon: HALOT
  rationale: Used here as a divine title. The text has simply 'Holy One,' not the
    fuller recurring title 'Holy One of Israel,' so the shorter form should be preserved.
