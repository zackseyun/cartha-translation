id: ISA.40.9
reference: Isaiah 40:9
source:
  edition: WLC
  text: עַ֣ל הַר גָּבֹ֤הַ עֲלִי לָ/ךְ֙ מְבַשֶּׂ֣רֶת צִיּ֔וֹן הָרִ֤ימִי בַ/כֹּ֨חַ֙
    קוֹלֵ֔/ךְ מְבַשֶּׂ֖רֶת יְרוּשָׁלִָ֑ם הָרִ֨ימִי֙ אַל תִּירָ֔אִי אִמְרִי֙ לְ/עָרֵ֣י
    יְהוּדָ֔ה הִנֵּ֖ה אֱלֹהֵי/כֶֽם־־־׃
translation:
  text: Go up on a high mountain, bearer of good news to Zion; lift up your voice
    with strength, bearer of good news to Jerusalem; lift it up, do not fear; say
    to the cities of Judah, “Behold your God!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'O Zion, bearer of good news, go up on a high mountain ... O Jerusalem,
      bearer of good news, lift up your voice with strength.' The Hebrew can also
      be read with Zion and Jerusalem as the heralds addressed directly.
    reason: alternative_reading
  - marker: b
    text: Or, 'you who bring good news to Zion ... to Jerusalem.' The feminine participle
      may describe the messenger rather than the city personified.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבַשֶּׂרֶת
  chosen: bearer of good news
  alternatives:
  - herald of good news
  - you who bring good news
  lexicon: HALOT
  rationale: The participle is feminine singular and can describe either the messenger
    addressed as feminine or the city personified as a herald. 'Bearer of good news'
    preserves the participial force and avoids prematurely resolving whether Zion/Jerusalem
    is the messenger or the recipient.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place/personified city name; retained
    rather than interpreted.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the city name.
- source_word: עֲלִי
  chosen: Go up
  alternatives:
  - Ascend
  lexicon: HALOT
  rationale: Imperative of עלה. 'Go up' is natural modern English and preserves the
    directional sense.
- source_word: הַר גָּבֹהַ
  chosen: a high mountain
  alternatives:
  - the high mountain
  lexicon: HALOT
  rationale: The phrase denotes an elevated place for public proclamation. English
    idiom prefers the indefinite here, though the Hebrew article may be generic/classifying.
- source_word: הָרִימִי
  chosen: lift up
  alternatives:
  - raise
  lexicon: HALOT
  rationale: Imperative repeated for emphasis. 'Lift up' fits both voice and implied
    continuation 'lift it up' in the second occurrence.
- source_word: בַכֹּחַ
  chosen: with strength
  alternatives:
  - with power
  - strongly
  lexicon: HALOT
  rationale: Retains the noun כוח concretely rather than adverbial paraphrase; expresses
    forcefulness of proclamation.
- source_word: קוֹלֵךְ
  chosen: your voice
  alternatives:
  - your sound
  lexicon: HALOT
  rationale: In context of proclamation, 'voice' is the natural English equivalent.
- source_word: אַל תִּירָאִי
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: Direct imperative prohibition; concise and idiomatic.
- source_word: אִמְרִי
  chosen: say
  alternatives:
  - declare
  lexicon: HALOT
  rationale: Simple imperative of אמר. 'Say' is sufficiently direct; the public setting
    already conveys proclamation.
- source_word: לְעָרֵי יְהוּדָה
  chosen: to the cities of Judah
  alternatives:
  - to Judah's cities
  lexicon: HALOT
  rationale: Straightforward rendering of the prepositional phrase, preserving geographic
    specificity.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Marks an attention-command with elevated but still intelligible diction
    suitable to prophetic proclamation.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Covenantal address to the cities of Judah in the plural; English singular
    'your God' correctly reflects the plural possessive with singular noun.
