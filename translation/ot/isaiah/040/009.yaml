theological_decisions:
- issue: Syntactical identification of the feminine participles מְבַשֶּׂרֶת with Zion/Jerusalem
  chosen_reading: The verse addresses a feminine herald associated with Zion and Jerusalem,
    rendered appositionally as 'bearer of good news to Zion ... bearer of good news
    to Jerusalem' rather than identifying Zion/Jerusalem themselves as the herald
    in the main text.
  alternative_readings:
  - '''O Zion, bearer of good news ... O Jerusalem, bearer of good news'''
  - '''You who bring good news to Zion ... to Jerusalem'''
  rationale: The Hebrew permits either taking Zion/Jerusalem as vocatives ('O Zion/Jerusalem,
    herald of good news') or as objects of the good news ('herald to Zion/Jerusalem').
    To preserve the ambiguity/tension rather than over-resolve it, the main text uses
    an English construction that can be read as a herald associated with those cities,
    while footnotes preserve the major alternatives.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Rendering of אֱלֹהִים
  chosen_reading: God
  rationale: Here the common noun with pronominal suffix refers to Israel/Judah's
    God without the divine name YHWH appearing in this verse. Therefore 'God' is correct,
    not 'the LORD.'
  doctrine_reference: Contested terms table distinguishes יְהוָה as 'the LORD'
