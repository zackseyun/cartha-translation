theological_decisions:
- issue: Anthropomorphic imagery for God's measuring and weighing of creation
  chosen_reading: Retained the bodily and manual imagery literally ('hollow of his
    hand,' 'span')
  alternative_readings:
  - More abstract renderings such as 'by his power' or 'by exact measure'
  rationale: The verse intentionally uses anthropomorphic measurement imagery to emphasize
    God's incomparability and sovereignty over creation. There is no doctrinal need
    to soften the imagery; preserving it best reflects the Hebrew poetry.
  doctrine_reference: Translation philosophy §1, §6
