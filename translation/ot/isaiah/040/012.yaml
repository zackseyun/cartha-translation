id: ISA.40.12
reference: Isaiah 40:12
source:
  edition: WLC
  text: מִֽי מָדַ֨ד בְּ/שָׁעֳל֜/וֹ מַ֗יִם וְ/שָׁמַ֨יִם֙ בַּ/זֶּ֣רֶת תִּכֵּ֔ן וְ/כָ֥ל
    בַּ/שָּׁלִ֖שׁ עֲפַ֣ר הָ/אָ֑רֶץ וְ/שָׁקַ֤ל בַּ/פֶּ֨לֶס֙ הָרִ֔ים וּ/גְבָע֖וֹת בְּ/מֹאזְנָֽיִם־׃
translation:
  text: Who has measured the waters in the hollow of his hand, and marked off the
    heavens with a span, and measured the dust of the earth in a measure, and weighed
    the mountains on a scale and the hills in balances?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'measured the dust of the earth in a third-part measure.' The Hebrew
      term refers to an ancient unit or measuring vessel whose exact equivalent is
      uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'measured out' for 'marked off' the heavens.
    reason: lexical_alternative
  - marker: c
    text: Or 'with scales' for 'in balances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  chosen: Who
  lexicon: HALOT
  rationale: Introduces a rhetorical question. English 'Who' preserves the interrogative
    force naturally.
- source_word: מָדַד
  chosen: has measured
  alternatives:
  - measured
  lexicon: HALOT
  rationale: The qatal form in this rhetorical context is well represented by English
    present perfect, highlighting completed action with present significance.
- source_word: בְּשָׁעֳלוֹ
  chosen: in the hollow of his hand
  alternatives:
  - in his palm
  - in his hand's hollow
  lexicon: HALOT
  rationale: שָׁעֹל denotes the hollow/palm of the hand as a small measuring receptacle.
    'In the hollow of his hand' is idiomatic and preserves the anthropomorphic measuring
    image.
- source_word: מַיִם
  chosen: the waters
  alternatives:
  - waters
  - water
  lexicon: HALOT
  rationale: The plural 'waters' reflects the Hebrew plural and suits the cosmic scope
    of the verse.
- source_word: וְשָׁמַיִם
  chosen: and the heavens
  alternatives:
  - and heaven
  - and the sky
  lexicon: HALOT
  rationale: The Hebrew plural is best preserved by 'the heavens' in this elevated
    cosmic context.
- source_word: בַּזֶּרֶת
  chosen: with a span
  alternatives:
  - by the span
  - with his span
  lexicon: HALOT
  rationale: זֶרֶת is a handbreadth/span measure. 'With a span' is concise and natural
    while preserving the concrete measuring metaphor.
- source_word: תִּכֵּן
  chosen: marked off
  alternatives:
  - measured
  - apportioned
  - regulated
  lexicon: HALOT
  rationale: The verb can denote measuring out or determining dimensions. 'Marked
    off' avoids repeating 'measured' too mechanically while fitting the image of setting
    the heavens' extent.
- source_word: וְכָל
  chosen: and measured
  alternatives:
  - and contained
  - and calculated
  lexicon: HALOT
  rationale: Despite the morphology table's lemma display, the context and consonantal
    text point to כָּלַל/כּוּל in the sense of measuring/containing. 'Measured' best
    fits the sequence of quantitative acts.
- source_word: בַּשָּׁלִישׁ
  chosen: in a measure
  alternatives:
  - in a third-part measure
  - in a threefold measure
  lexicon: HALOT
  rationale: The noun refers to a measure vessel, likely a third-part measure. Since
    the exact ancient unit is obscure to most readers, 'in a measure' preserves the
    sense without false precision.
- source_word: עֲפַר הָאָרֶץ
  chosen: the dust of the earth
  alternatives:
  - the earth's dust
  lexicon: HALOT
  rationale: A straightforward construct chain; 'dust of the earth' is the standard
    and clear rendering.
- source_word: וְשָׁקַל
  chosen: and weighed
  alternatives:
  - and has weighed
  lexicon: HALOT
  rationale: Continues the chain of rhetorical perfects describing God's incomparable
    power through acts of measurement and weighing.
- source_word: בַּפֶּלֶס
  chosen: on a scale
  alternatives:
  - with a balance
  - by a steelyard
  lexicon: HALOT
  rationale: פֶּלֶס denotes a weighing instrument or scale. 'On a scale' is natural
    modern English.
- source_word: הָרִים
  chosen: the mountains
  lexicon: HALOT
  rationale: Literal rendering preserves the cosmic imagery.
- source_word: וּגְבָעוֹת
  chosen: and the hills
  alternatives:
  - and the hillsides
  lexicon: HALOT
  rationale: Literal and parallel to 'mountains'.
- source_word: בְּמֹאזְנָיִם
  chosen: in balances
  alternatives:
  - in a balance
  - with scales
  lexicon: HALOT
  rationale: The dual/plural form refers to scales/balances. 'In balances' preserves
    the parallelism with the previous weighing term and echoes traditional diction
    without becoming archaic.
