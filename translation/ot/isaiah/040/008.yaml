theological_decisions:
- issue: Rendering the adversative force between transient creation and enduring divine
    speech
  chosen_reading: Use 'but' in the main text
  alternative_readings:
  - Use a formally literal 'and'
  rationale: The Hebrew waw can be rendered simply as 'and,' but the poetic and theological
    contrast is central to the verse's meaning. 'But' makes explicit the contrast
    already present in the parallelism without importing new doctrine.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering דָּבָר as 'word' rather than a broader term like 'promise' or 'message'
  chosen_reading: word
  alternative_readings:
  - promise
  - message
  rationale: The Hebrew term is broad, but 'word' best preserves the source's lexical
    range and allows the theological weight of God's spoken declaration to remain
    without narrowing it to one subtype.
  doctrine_reference: Translation philosophy §1, §5
