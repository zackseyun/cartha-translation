id: ISA.40.8
reference: Isaiah 40:8
source:
  edition: WLC
  text: יָבֵ֥שׁ חָצִ֖יר נָ֣בֵֽל צִ֑יץ וּ/דְבַר אֱלֹהֵ֖י/נוּ יָק֥וּם לְ/עוֹלָֽם־׃ס
translation:
  text: The grass dries up, the flower withers, but the word of our God will stand
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The grass withers, the flower fades.' The Hebrew uses two related but
      distinct verbs for vegetation perishing.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָבֵשׁ
  chosen: dries up
  alternatives:
  - withers
  - is dried up
  lexicon: HALOT
  rationale: Qal perfect of יבש denotes becoming dry or withered. 'Dries up' gives
    natural English and preserves the image of transience without overformal stiffness.
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - herbage
  - hay
  lexicon: HALOT
  rationale: The common sense in this poetic context is 'grass.' 'Hay' would be too
    specific and processed; 'herbage' is unnatural in modern English.
- source_word: נָבֵל
  chosen: withers
  alternatives:
  - fades
  - wilts
  lexicon: HALOT
  rationale: The verb commonly means to wither or fade. 'Withers' pairs well with
    the floral imagery and distinguishes it from the drying of grass in the first
    clause.
- source_word: צִיץ
  chosen: flower
  alternatives:
  - blossom
  lexicon: HALOT
  rationale: In parallel with grass, צִיץ refers to a blossom/flower. 'Flower' is
    the most natural and broadly understandable rendering in English.
- source_word: וּדְבַר
  chosen: but the word
  alternatives:
  - and the word
  lexicon: HALOT
  rationale: Although waw is formally 'and,' the discourse contrast between fading
    vegetation and the enduring divine word is explicit in context. Rendering it as
    'but' communicates the adversative force in idiomatic English while remaining
    faithful to the poetic parallelism.
- source_word: אֱלֹהֵינוּ
  chosen: of our God
  alternatives:
  - of our gods
  lexicon: HALOT
  rationale: The plural form with first person plural suffix functions as the singular
    referent 'our God' in Israel's standard usage for the true God.
- source_word: יָקוּם
  chosen: will stand
  alternatives:
  - will endure
  - will arise
  - will remain established
  lexicon: HALOT
  rationale: קום literally means 'rise/stand.' In this context of permanence, 'will
    stand' preserves the concrete metaphor and communicates enduring validity. 'Will
    endure' is interpretive and less vivid.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: '''Forever'' is the natural modern English equivalent for the idiom ''for
    an age/everlasting duration'' in this context of divine permanence.'
