theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of קוה in a promise context
  chosen_reading: wait for the LORD
  alternative_readings:
  - hope in the LORD
  rationale: The Hebrew participle includes both waiting and hoping. 'Wait for' keeps the concrete verbal image while allowing the expectancy inherent in the term; the hope nuance is preserved in a footnote rather than collapsed into a purely internal attitude.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
