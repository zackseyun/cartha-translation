id: ISA.40.31
reference: Isaiah 40:31
source:
  edition: WLC
  text: וְ/קוֹיֵ֤ יְהוָה֙ יַחֲלִ֣יפוּ כֹ֔חַ יַעֲל֥וּ אֵ֖בֶר כַּ/נְּשָׁרִ֑ים יָר֨וּצוּ֙ וְ/לֹ֣א יִיגָ֔עוּ יֵלְכ֖וּ וְ/לֹ֥א יִיעָֽפוּ׃פ
translation:
  text: But those who wait for Yahweh will renew their strength; they will rise up with wings like eagles; they will run and not grow weary; they will walk and not faint.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who hope in the LORD.' The Hebrew verb includes the sense of waiting with expectant hope.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'like nesherim'; traditionally 'eagles,' though the term can also refer more broadly to large birds of prey, including vultures.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/קוֹיֵ
  chosen: But those who wait for
  alternatives:
  - and those who hope in
  - but those who hope in
  - those who wait on
  lexicon: HALOT
  rationale: Qal participle plural of קוה denotes waiting with expectant hope. 'Wait for' preserves the temporal/expectant sense without over-paraphrasing. The prefixed conjunction is rendered 'But' to mark the contrast with the preceding verse's exhaustion of youths.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יַחֲלִיפוּ כֹחַ
  chosen: will renew their strength
  alternatives:
  - will exchange strength
  - will gain new strength
  - will renew strength
  lexicon: HALOT
  rationale: חלף in Hiphil with כוח can mean to renew or replace strength. English idiom favors 'renew their strength,' which captures restoration of vigor. 'Gain new strength' is possible but slightly more interpretive; 'exchange strength' is too wooden here.
- source_word: יַעֲלוּ אֵבֶר
  chosen: they will rise up with wings
  alternatives:
  - they will mount up with wings
  - they will put forth wings
  lexicon: HALOT
  rationale: עלה means go up/rise. אבר means wing/pinion. 'Rise up with wings' is natural modern English and preserves the upward movement. 'Mount up' is traditional and possible, but less current.
- source_word: כַּ/נְּשָׁרִים
  chosen: like eagles
  alternatives:
  - like vultures
  lexicon: HALOT
  rationale: נשר can denote a large bird of prey, often eagle and sometimes vulture in zoological precision. In biblical poetic imagery, 'eagles' is the established and contextually fitting rendering for strength and soaring flight; the zoological alternative is preserved in a footnote.
- source_word: יָר֨וּצוּ
  chosen: they will run
  lexicon: HALOT
  rationale: Straightforward Qal imperfect of רוץ, 'run.' Future-like rendering fits the sequence of promises.
- source_word: וְ/לֹא יִיגָעוּ
  chosen: and not grow weary
  alternatives:
  - and not be weary
  - and not become exhausted
  lexicon: HALOT
  rationale: יגע denotes becoming weary or exhausted from exertion. 'Grow weary' is idiomatic and matches the progressive sense in context.
- source_word: יֵלְכוּ
  chosen: they will walk
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'walk/go.' 'Walk' preserves the poetic contrast with running.
- source_word: וְ/לֹא יִיעָפוּ
  chosen: and not faint
  alternatives:
  - and not become tired
  - and not be faint
  lexicon: HALOT
  rationale: יעף denotes being faint or exhausted. 'Faint' gives a stronger endpoint than mere tiredness and preserves the poetic escalation/parallelism.
