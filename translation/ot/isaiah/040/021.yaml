id: ISA.40.21
reference: Isaiah 40:21
source:
  edition: WLC
  text: הֲ/ל֤וֹא תֵֽדְעוּ֙ הֲ/ל֣וֹא תִשְׁמָ֔עוּ הֲ/ל֛וֹא הֻגַּ֥ד מֵ/רֹ֖אשׁ לָ/כֶ֑ם
    הֲ/לוֹא֙ הֲבִ֣ינֹתֶ֔ם מוֹסְד֖וֹת הָ/אָֽרֶץ׃
translation:
  text: Do you not know? Do you not hear? Has it not been told to you from the beginning?
    Have you not understood from the foundations of the earth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Have you not understood the foundations of the earth?'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Do you not / Has it not / Have you not
  alternatives:
  - Surely ... ?
  - Do you not indeed ... ?
  lexicon: HALOT
  rationale: The repeated interrogative particle with negation introduces rhetorical
    questions expecting an affirmative answer. English varies the auxiliary naturally
    by clause while preserving the repeated force.
- source_word: תֵדְעוּ
  chosen: know
  alternatives:
  - recognize
  lexicon: HALOT
  rationale: ידה here denotes knowing or being aware. 'Know' is the most direct and
    idiomatic rendering in the rhetorical sequence.
- source_word: תִשְׁמָעוּ
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear.' 'Listen' would add a nuance of attentiveness
    not required by the form alone.
- source_word: הֻגַּד
  chosen: been told
  alternatives:
  - been declared
  - been announced
  lexicon: HALOT
  rationale: The passive of נגד indicates information communicated to the audience.
    'Been told' is clear modern English and fits the parallel with 'know' and 'hear.'
- source_word: מֵרֹאשׁ
  chosen: from the beginning
  alternatives:
  - from the first
  - from the outset
  lexicon: HALOT
  rationale: ראשׁ with מן here refers to earliest time or first point. 'From the beginning'
    is idiomatic and preserves the temporal sense.
- source_word: הֲבִינֹתֶם
  chosen: understood
  alternatives:
  - considered
  - perceived
  lexicon: HALOT
  rationale: בין in the Hiphil often means to understand or discern. 'Understood'
    best matches the cognitive emphasis of the verse.
- source_word: מוֹסְדוֹת
  chosen: foundations
  alternatives:
  - founding
  - bases
  lexicon: HALOT
  rationale: The noun denotes foundations. The plural is retained in English because
    it is natural and reflects the Hebrew form.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic context, 'earth' is clearly intended rather than a particular
    land.
