theological_decisions:
- issue: Syntactical relation of the final clause
  chosen_reading: Have you not understood from the foundations of the earth?
  alternative_readings:
  - Have you not understood the foundations of the earth?
  rationale: 'The Hebrew lacks an explicit preposition before ''foundations of the
    earth,'' so the phrase can be taken either as the object of understanding or as
    an ablatival/source expression parallel to ''from the beginning.'' The broader
    sequence favors a temporal/source sense: revelation has been available since creation''s
    foundations. The alternative is preserved in a footnote because it is a viable
    literal construal.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
