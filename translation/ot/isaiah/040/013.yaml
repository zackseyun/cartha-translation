theological_decisions:
- issue: Rendering רוּחַ יְהוָה
  chosen_reading: the Spirit of the LORD
  alternative_readings:
  - the mind of the LORD
  rationale: The Hebrew permits a sense closer to 'mind' or 'disposition,' and the
    Septuagint/NT citation tradition reflects that interpretive direction. In Isaiah
    40 itself, however, 'Spirit of the LORD' is a direct and natural rendering of
    the Hebrew phrase and preserves the text's theological richness without collapsing
    it into a purely cognitive category.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
