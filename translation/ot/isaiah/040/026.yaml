id: ISA.40.26
reference: Isaiah 40:26
source:
  edition: WLC
  text: שְׂאוּ מָר֨וֹם עֵינֵי/כֶ֤ם וּ/רְאוּ֙ מִי בָרָ֣א אֵ֔לֶּה הַ/מּוֹצִ֥יא בְ/מִסְפָּ֖ר
    צְבָאָ֑/ם לְ/כֻלָּ/ם֙ בְּ/שֵׁ֣ם יִקְרָ֔א מֵ/רֹ֤ב אוֹנִים֙ וְ/אַמִּ֣יץ כֹּ֔חַ אִ֖ישׁ
    לֹ֥א נֶעְדָּֽר־־׃ס
translation:
  text: 'Lift up your eyes on high and see: who created these? He is the one who brings
    out their host by number; he calls all of them by name. Because of the greatness
    of his might and the strength of his power, not one is missing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he calls each of them by name.'
    reason: lexical_alternative
  - marker: b
    text: '''Their host'' refers to the ordered multitude of the heavenly bodies.'
    reason: cultural_note
  - marker: c
    text: Literally, 'not a man is lacking,' a Hebrew distributive expression meaning
      that none of them is missing.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative plural of נשׂא. 'Lift up' is idiomatic and preserves the physical
    upward motion of the command.
- source_word: מָרוֹם
  chosen: on high
  alternatives:
  - upward
  - to the height
  lexicon: HALOT
  rationale: Adverbial/locative sense fits the exhortation to look upward toward the
    heavens. 'On high' is natural English and keeps the elevated spatial sense.
- source_word: עֵינֵיכֶם
  chosen: your eyes
  lexicon: HALOT
  rationale: Direct object of the imperative; retained literally.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: Pairs naturally with 'lift up your eyes' and introduces the rhetorical
    question.
- source_word: מִי בָרָא אֵלֶּה
  chosen: who created these?
  alternatives:
  - who has created these?
  lexicon: HALOT
  rationale: Simple past in English best conveys the Hebrew perfect in this rhetorical
    question about the heavenly bodies.
- source_word: הַמּוֹצִיא
  chosen: He is the one who brings out
  alternatives:
  - the one bringing out
  - who brings forth
  lexicon: HALOT
  rationale: Substantival participle referring back to the Creator. Expanded with
    'He is the one who' for clear English linkage.
- source_word: בְמִסְפָּר
  chosen: by number
  alternatives:
  - in number
  - according to number
  lexicon: HALOT
  rationale: Conveys ordered enumeration rather than mere quantity.
- source_word: צְבָאָם
  chosen: their host
  alternatives:
  - their army
  - their array
  lexicon: HALOT
  rationale: In context this refers to the heavenly host, likely stars. 'Host' preserves
    the collective, ordered sense without over-specifying military imagery.
- source_word: לְכֻלָּם בְּשֵׁם יִקְרָא
  chosen: he calls all of them by name
  alternatives:
  - he calls each of them by name
  lexicon: HALOT
  rationale: Expresses divine knowledge and sovereignty over every member of the heavenly
    host. 'All of them' closely follows the Hebrew.
- source_word: מֵרֹב אוֹנִים
  chosen: Because of the greatness of his might
  alternatives:
  - From the abundance of vigor
  - Because of his great strength
  lexicon: HALOT
  rationale: The preposition מן here is causal in context. אוֹנִים denotes vigor/strength;
    'greatness of his might' is idiomatic and weighty.
- source_word: וְאַמִּיץ כֹּחַ
  chosen: and the strength of his power
  alternatives:
  - and because he is strong in power
  - and his mighty power
  lexicon: HALOT
  rationale: Construct-like pairing intensifies the statement. This rendering preserves
    the parallelism with the previous strength term while remaining readable.
- source_word: אִישׁ לֹא נֶעְדָּר
  chosen: not one is missing
  alternatives:
  - not a man is lacking
  - none is absent
  lexicon: HALOT
  rationale: Although אִישׁ is literally 'man,' here it has distributive force over
    the members of the heavenly host. 'Not one is missing' communicates the sense
    naturally in English while matching the source's representative usage.
