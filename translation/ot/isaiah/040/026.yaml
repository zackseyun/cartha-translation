theological_decisions:
- issue: Referent of 'these' and 'their host'
  chosen_reading: The verse refers to the heavenly bodies/stars as the created host
    brought out and named by God.
  alternative_readings:
  - A broader reference to all visible heavenly phenomena
  rationale: The immediate context of lifting the eyes upward and the language of
    numbered host and naming strongly point to the stars/heavenly host. The translation
    keeps 'these' and 'their host' rather than inserting 'stars' into the main text,
    preserving the Hebrew's rhetorical force without over-interpreting.
- issue: Rendering of אִישׁ in a generic/distributive expression
  chosen_reading: Translate idiomatically as 'not one is missing' rather than woodenly
    as 'not a man is lacking.'
  alternative_readings:
  - not a man is lacking
  - none is absent
  rationale: 'This follows the gender-accurate principle: the masculine singular here
    is representative/distributive, not specifically male. The idiomatic English rendering
    preserves meaning without introducing misleading gender specificity.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
