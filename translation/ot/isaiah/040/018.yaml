theological_decisions:
- issue: Rendering אֵל in an anti-idolatry rhetorical question
  chosen_reading: God
  alternative_readings:
  - a god
  rationale: The immediate context in Isaiah 40 is the incomparability of the one
    true God over against idols. Rendering אֵל as 'God' preserves that theological
    force without importing extra doctrinal language.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it'
