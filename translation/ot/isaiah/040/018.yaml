id: ISA.40.18
reference: Isaiah 40:18
source:
  edition: WLC
  text: וְ/אֶל מִ֖י תְּדַמְּי֣וּ/ן אֵ֑ל וּ/מַה דְּמ֖וּת תַּ֥עַרְכוּ לֽ/וֹ־־׃
translation:
  text: To whom, then, will you liken God, and what likeness will you compare to him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And to whom will you compare God, and what form will you set beside
      him?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל מִי
  chosen: To whom, then,
  alternatives:
  - And to whom
  - To whom
  lexicon: HALOT
  rationale: אֶל with מִי introduces the object of comparison, naturally rendered
    'to whom.' The prefixed conjunction וְ can be carried as simple 'and,' but in
    English discourse here it functions idiomatically as a transitional 'then,' matching
    the rhetorical flow of the surrounding argument without adding content.
- source_word: תְּדַמְּיוּן
  chosen: will you liken
  alternatives:
  - do you compare
  - will you compare
  lexicon: HALOT
  rationale: From דמה in the sense of likening or comparing. 'Liken' preserves the
    comparative force and fits the rhetorical challenge of the verse better than a
    flatter 'compare' in the first clause.
- source_word: אֵל
  chosen: God
  alternatives:
  - God Almighty
  - a god
  lexicon: HALOT
  rationale: In this context אֵל refers to the true God, not an indefinite deity.
    'God' is the natural English rendering in Isaiah's polemic against idols.
- source_word: וּ/מַה
  chosen: and what
  alternatives:
  - or what
  lexicon: HALOT
  rationale: The conjunction plus interrogative straightforwardly yields 'and what.'
    This preserves the parallel structure of the two rhetorical questions.
- source_word: דְּמוּת
  chosen: likeness
  alternatives:
  - form
  - image
  - semblance
  lexicon: HALOT
  rationale: דְּמוּת denotes likeness or resemblance. 'Likeness' is the most direct
    and idiomatic choice here, especially in a context contrasting God with crafted
    representations.
- source_word: תַּעַרְכוּ
  chosen: will you compare
  alternatives:
  - will you set forth
  - will you arrange
  - will you match
  lexicon: HALOT
  rationale: Though the root ערך can mean arrange or set in order, in this context
    with דְּמוּת and לּוֹ it carries the sense of setting something alongside for
    comparison. 'Compare' communicates the intended rhetorical force in clear English.
- source_word: לֽוֹ
  chosen: to him
  alternatives:
  - with him
  - before him
  lexicon: HALOT
  rationale: The preposition marks the relation of the proposed likeness to God. 'To
    him' is a literal and acceptable English rendering; 'with him' is possible idiomatically,
    but 'to him' better reflects the Hebrew construction.
