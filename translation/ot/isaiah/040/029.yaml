theological_decisions:
- issue: Implicit subject of the verse
  chosen_reading: He refers to God, continuing the description from the surrounding
    context.
  rationale: The Hebrew has no explicit subject in this verse, but the immediate context
    describes the LORD's character and actions. Supplying 'He' in English is necessary
    and does not import new theology beyond the discourse context.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s sense without paraphrase.'
