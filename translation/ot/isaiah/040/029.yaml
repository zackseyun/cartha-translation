id: ISA.40.29
reference: Isaiah 40:29
source:
  edition: WLC
  text: נֹתֵ֥ן לַ/יָּעֵ֖ף כֹּ֑חַ וּ/לְ/אֵ֥ין אוֹנִ֖ים עָצְמָ֥ה יַרְבֶּֽה׃
translation:
  text: He gives strength to the weary, and to the one without vigor he increases
    might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the powerless he multiplies strength.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹתֵן
  chosen: gives
  alternatives:
  - is giving
  - gives continually
  lexicon: HALOT
  rationale: Qal participle of נתן functions here as a present/generic description
    of God's characteristic action in context. English simple present best captures
    the gnomic force without overtranslating aspect.
- source_word: לַיָּעֵף
  chosen: to the weary
  alternatives:
  - to the faint
  - to the tired
  lexicon: HALOT
  rationale: The adjective denotes one who is exhausted or worn out. 'Weary' is natural
    modern English and fits the parallel with lack of vigor, while preserving the
    sense of fatigue better than the more archaic 'faint.'
- source_word: כֹּחַ
  chosen: strength
  alternatives:
  - power
  lexicon: HALOT
  rationale: In this poetic context the noun refers to personal strength or capacity
    rather than abstract power. 'Strength' matches the recipient's weariness and reads
    idiomatically in English.
- source_word: וּלְאֵין אוֹנִים
  chosen: to the one without vigor
  alternatives:
  - to him who has no might
  - to the powerless
  - to one lacking strength
  lexicon: HALOT
  rationale: אֵין marks nonexistence/lack, and אוֹנִים is a plural form expressing
    strength/vigor. The phrase is idiomatic for one lacking vitality or power. 'The
    one without vigor' preserves the singular sense implied by the construction while
    avoiding an overly wooden plural rendering.
- source_word: עָצְמָה
  chosen: might
  alternatives:
  - strength
  - power
  lexicon: HALOT
  rationale: The noun denotes force or might. Since כֹּחַ was rendered 'strength'
    earlier in the verse, 'might' preserves the poetic parallelism while avoiding
    unnecessary repetition in English.
- source_word: יַרְבֶּה
  chosen: he increases
  alternatives:
  - he multiplies
  - he makes abundant
  lexicon: HALOT
  rationale: Hiphil of רבה means to make much/increase. 'He increases' is the clearest
    idiomatic rendering and preserves the causative sense.
