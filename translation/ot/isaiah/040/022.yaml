id: ISA.40.22
reference: Isaiah 40:22
source:
  edition: WLC
  text: הַ/יֹּשֵׁב֙ עַל ח֣וּג הָ/אָ֔רֶץ וְ/יֹשְׁבֶ֖י/הָ כַּ/חֲגָבִ֑ים הַ/נּוֹטֶ֤ה
    כַ/דֹּק֙ שָׁמַ֔יִם וַ/יִּמְתָּחֵ֥/ם כָּ/אֹ֖הֶל לָ/שָֽׁבֶת־׃
translation:
  text: He is the one who sits above the circle of the earth, and its inhabitants
    are like grasshoppers; who stretches out the heavens like a thin curtain and spreads
    them out like a tent to dwell in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vault' or 'horizon' of the earth.' The Hebrew word can denote a circular
      expanse or dome-like boundary.
    reason: lexical_alternative
  - marker: b
    text: Or 'like gauze' or 'like a veil.' The Hebrew term refers to something thin
      or fine.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיֹּשֵׁב
  chosen: He is the one who sits
  alternatives:
  - the one sitting
  - who sits enthroned
  lexicon: HALOT
  rationale: The participle functions substantivally, describing God by ongoing action/state.
    'He is the one who sits' preserves the participial force in natural English without
    adding the stronger royal nuance 'enthroned,' which is possible contextually but
    not explicit in the verb itself.
- source_word: עַל
  chosen: above
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: While literally 'upon/on,' in this cosmological and exaltation context
    'above' best conveys transcendence over the earth's circle without implying physical
    contact in a crude spatial sense.
- source_word: חוּג
  chosen: circle
  alternatives:
  - vault
  - horizon
  - dome
  lexicon: HALOT
  rationale: '''Circle'' is the most direct lexical equivalent and traditional rendering.
    The term can denote a circular boundary or vault/horizon, but ''circle'' preserves
    the Hebrew image without over-specifying ancient cosmology.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic context, 'earth' is clearly intended rather than a particular
    land.
- source_word: וְיֹשְׁבֶיהָ
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its dwellers
  lexicon: HALOT
  rationale: A natural rendering of the participial noun with pronominal suffix; 'inhabitants'
    is idiomatic and preserves the sense of those living on the earth.
- source_word: כַּחֲגָבִים
  chosen: like grasshoppers
  alternatives:
  - like locusts
  lexicon: HALOT
  rationale: The noun commonly denotes grasshoppers/locust-like insects. 'Grasshoppers'
    fits the simile of smallness and is the standard, less plague-specific choice
    here.
- source_word: הַנּוֹטֶה
  chosen: who stretches out
  alternatives:
  - the one stretching out
  - who spreads out
  lexicon: HALOT
  rationale: Another substantival participle continuing the description of God. 'Stretches
    out' is the common and fitting English equivalent for the heavens imagery.
- source_word: כַדֹּק
  chosen: like a thin curtain
  alternatives:
  - like gauze
  - like a veil
  - like thin cloth
  lexicon: HALOT
  rationale: דֹק denotes something thin/fine. 'Thin curtain' communicates the image
    accessibly in modern English while preserving the simile of delicacy and ease.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  lexicon: HALOT
  rationale: '''The heavens'' better matches the elevated poetic register and broad
    cosmological scope than the narrower ''sky.'''
- source_word: וַיִּמְתָּחֵם
  chosen: and spreads them out
  alternatives:
  - and stretches them out
  - and pitches them out
  lexicon: HALOT
  rationale: The verb conveys extending/spreading. To avoid awkward repetition immediately
    after 'stretches out,' 'spreads them out' gives good English style while retaining
    the same basic image; the variation is documented here for consistency purposes.
- source_word: כָּאֹהֶל
  chosen: like a tent
  alternatives:
  - as a tent
  lexicon: HALOT
  rationale: Straightforward simile; 'tent' preserves the nomadic dwelling image.
- source_word: לָשָׁבֶת
  chosen: to dwell in
  alternatives:
  - to live in
  - for dwelling
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result. 'To dwell in' preserves the
    habitation nuance and fits the tent metaphor better than the more ordinary 'to
    live in'.
