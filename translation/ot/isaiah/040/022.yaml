theological_decisions:
- issue: Cosmological imagery in חוּג הָאָרֶץ
  chosen_reading: Rendered phenomenologically as 'the circle of the earth' without
    importing a modern scientific claim or flattening the poetic image.
  alternative_readings:
  - the vault of the earth
  - the horizon of the earth
  rationale: The verse is poetic and exaltational, emphasizing God's transcendence
    and creative power. The translation should preserve the imagery rather than use
    it to argue for a specific cosmological model.
  doctrine_reference: Translation philosophy §1, §3
