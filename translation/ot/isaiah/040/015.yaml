id: ISA.40.15
reference: Isaiah 40:15
source:
  edition: WLC
  text: הֵ֤ן גּוֹיִם֙ כְּ/מַ֣ר מִ/דְּלִ֔י וּ/כְ/שַׁ֥חַק מֹאזְנַ֖יִם נֶחְשָׁ֑בוּ הֵ֥ן
    אִיִּ֖ים כַּ/דַּ֥ק יִטּֽוֹל׃
translation:
  text: Look, the nations are like a drop from a bucket, and are regarded as dust
    on the scales; look, he lifts the coastlands like fine dust.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a drop in a bucket.' The Hebrew more literally says 'from a bucket.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the islands.' The Hebrew term can denote islands, coastlands, or distant
      maritime lands.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Deictic/interjective particle drawing attention. 'Look' is natural modern
    English and preserves the rhetorical force better than the more archaic 'Behold.'
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: Refers broadly to the nations/peoples of the world in contrast to God.
    The definite article is supplied idiomatically in English for generic reference.
- source_word: כְּמַר מִדְּלִי
  chosen: like a drop from a bucket
  alternatives:
  - like a drop in a bucket
  - like dripping from a bucket
  lexicon: HALOT
  rationale: מַר denotes a drop; מִן with דְּלִי indicates source, 'from a bucket.'
    'From a bucket' is closer to the Hebrew than the familiar idiom 'in a bucket,'
    though the latter is preserved as an alternative because of English tradition.
- source_word: וּכְשַׁחַק מֹאזְנַיִם
  chosen: and ... as dust on the scales
  alternatives:
  - and like fine dust on the scales
  - and like a speck on the balance
  lexicon: HALOT
  rationale: שַׁחַק can denote fine dust/powder; מֹאזְנַיִם are scales/balances. 'Dust
    on the scales' is vivid and idiomatic while preserving the image of negligible
    weight.
- source_word: נֶחְשָׁבוּ
  chosen: are regarded
  alternatives:
  - are counted
  - are considered
  - are reckoned
  lexicon: HALOT
  rationale: Passive of חשׁב, expressing estimation or accounting. 'Are regarded'
    communicates evaluative reckoning in clear modern English.
- source_word: אִיִּים
  chosen: the coastlands
  alternatives:
  - the islands
  - the distant shores
  lexicon: HALOT
  rationale: In Isaiah this term often refers not merely to islands but to distant
    maritime lands/coastlands. 'Coastlands' best captures the prophetic geographic
    sense.
- source_word: כַּדַּק
  chosen: like fine dust
  alternatives:
  - like dust
  - like something fine/thin
  lexicon: HALOT
  rationale: דַּק denotes what is fine, thin, or small. In context with the weighing/lifting
    imagery, 'fine dust' best conveys minuteness and insubstantiality.
- source_word: יִטּוֹל
  chosen: he lifts
  alternatives:
  - he takes up
  - he picks up
  - he carries away
  lexicon: HALOT
  rationale: נטל commonly means to lift, carry, or take up. With God as the implied
    subject from context, 'he lifts' fits the image of effortless handling of the
    coastlands.
