theological_decisions:
- issue: Implied subject of יִטּוֹל
  chosen_reading: The subject is left as the English pronoun 'he,' referring contextually
    to God without adding the divine name into the verse.
  alternative_readings:
  - An impersonal rendering such as 'one lifts'
  - An explicit rendering such as 'the Lord lifts'
  rationale: The Hebrew verb is 3ms with no explicit subject in this clause; the broader
    context clearly speaks of God, but optimal equivalence avoids importing an explicit
    subject not present in the text. 'He' preserves the syntax while remaining intelligible
    in context.
  doctrine_reference: Translation philosophy §1, §3
