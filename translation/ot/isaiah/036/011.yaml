id: ISA.36.11
reference: Isaiah 36:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶלְיָקִים֩ וְ/שֶׁבְנָ֨א וְ/יוֹאָ֜ח אֶל רַב שָׁקֵ֗ה דַּבֶּר נָ֤א
    אֶל עֲבָדֶ֨י/ךָ֙ אֲרָמִ֔ית כִּ֥י שֹׁמְעִ֖ים אֲנָ֑חְנוּ וְ/אַל תְּדַבֵּ֤ר אֵלֵ֨י/נוּ֙
    יְהוּדִ֔ית בְּ/אָזְנֵ֣י הָ/עָ֔ם אֲשֶׁ֖ר עַל הַ/חוֹמָֽה־־־־־־׃
translation:
  text: Then Eliakim, Shebna, and Joah said to the Rabshakeh, “Please speak to your
    servants in Aramaic, for we understand it. And do not speak to us in Judean within
    the hearing of the people who are on the wall.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in Hebrew.” The Hebrew term יְהוּדִית refers more specifically to the
      language of Judah/Judeans.
    reason: lexical_alternative
  - marker: b
    text: Rabshakeh is likely an Assyrian official title rather than a personal name.
    reason: cultural_note
lexical_decisions:
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: Although the Akkadian-derived title likely denotes an Assyrian official,
    English Bible tradition commonly treats it as a title/name. Retaining 'Rabshakeh'
    avoids overconfident specification of office while preserving recognizability.
    The article reflects the Hebrew title usage.
- source_word: דַּבֶּר נָא
  chosen: Please speak
  alternatives:
  - Speak, please
  - Kindly speak
  lexicon: HALOT
  rationale: Imperative plus particle נָא expresses a polite request. 'Please speak'
    is natural modern English and preserves the deferential tone.
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your servants/slaves
  - your officials
  lexicon: HALOT
  rationale: In courtly self-reference, 'servants' is the idiomatic sense. 'Slaves'
    would overstate the social relation in this diplomatic setting, and 'officials'
    would lose the humility encoded in the Hebrew.
- source_word: אֲרָמִית
  chosen: in Aramaic
  alternatives:
  - Aramaic
  lexicon: HALOT
  rationale: The feminine form denotes the Aramaic language. English idiom normally
    uses 'speak in Aramaic' rather than bare 'speak Aramaic' in a formal request.
- source_word: כִּי שֹׁמְעִים אֲנָחְנוּ
  chosen: for we understand it
  alternatives:
  - for we hear
  - for we are listening
  - for we can understand
  lexicon: HALOT
  rationale: Although שׁמע literally means 'hear,' in language contexts it commonly
    carries the sense 'understand.' This best fits the request to use Aramaic.
- source_word: יְהוּדִית
  chosen: in Judean
  alternatives:
  - in Hebrew
  - in the language of Judah
  - in Judaean
  lexicon: HALOT
  rationale: The term refers specifically to the language of Judah/Judeans, not to
    biblical Hebrew as a technical linguistic label. 'Judean' preserves the ethnolinguistic
    reference more precisely than the traditional 'Hebrew.'
- source_word: בְּאָזְנֵי
  chosen: within the hearing of
  alternatives:
  - in the ears of
  - so that ... can hear
  lexicon: HALOT
  rationale: This idiom means in someone's hearing or presence. 'Within the hearing
    of' is clear, natural, and suitably formal.
- source_word: הָעָם אֲשֶׁר עַל הַחוֹמָה
  chosen: the people who are on the wall
  alternatives:
  - the people on the wall
  - the troops on the wall
  lexicon: HALOT
  rationale: The phrase refers to the people stationed on the city wall who could
    overhear. 'People' is the plain sense of הָעָם; 'troops' would be too narrow.
