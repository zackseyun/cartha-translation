id: ISA.36.17
reference: Isaiah 36:17
source:
  edition: WLC
  text: עַד בֹּאִ֕/י וְ/לָקַחְתִּ֥י אֶתְ/כֶ֖ם אֶל אֶ֣רֶץ כְּ/אַרְצְ/כֶ֑ם אֶ֤רֶץ דָּגָן֙
    וְ/תִיר֔וֹשׁ אֶ֥רֶץ לֶ֖חֶם וּ/כְרָמִֽים־־׃
translation:
  text: until I come and take you away to a land like your own land—a land of grain
    and new wine, a land of bread and vineyards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and take you to a land like your own land.' The Hebrew verb simply means
      'take'; 'take you away' makes the relocation/deportation sense explicit in context.
    reason: lexical_alternative
  - marker: b
    text: '''New wine'' renders Hebrew תירוש, a term often distinguished from the
      more general word for wine.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  chosen: until
  alternatives:
  - before
  - while
  lexicon: HALOT
  rationale: Temporal preposition marking the limit of the commanded waiting in the
    larger sentence context; 'until' is the natural English equivalent.
- source_word: בֹּאִי
  chosen: I come
  alternatives:
  - I arrive
  lexicon: HALOT
  rationale: Qal 1cs of בוא, 'to come/enter.' 'I come' is the most direct rendering;
    'arrive' is possible but less literal.
- source_word: וְלָקַחְתִּי
  chosen: and take you away
  alternatives:
  - and take you
  - and carry you off
  lexicon: HALOT
  rationale: לקח means 'take.' In this deportation context, English idiom benefits
    from 'take you away' to make the forced relocation sense clear without overparaphrasing.
    The conjunction is retained.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker plus 2mp suffix; naturally rendered simply as 'you'
    in English.
- source_word: אֶל אֶרֶץ
  chosen: to a land
  alternatives:
  - into a land
  lexicon: HALOT
  rationale: אל plus ארץ indicates motion toward destination. 'To a land' is idiomatic
    and sufficiently precise.
- source_word: כְּאַרְצְכֶם
  chosen: like your own land
  alternatives:
  - like your land
  - as your land
  lexicon: HALOT
  rationale: כְ marks comparison, not identity. 'Like your own land' brings out the
    propagandistic reassurance of similarity and reads naturally in English.
- source_word: אֶרֶץ דָּגָן וְתִירוֹשׁ
  chosen: a land of grain and new wine
  alternatives:
  - a land of grain and wine
  - a land of corn and wine
  lexicon: HALOT
  rationale: דגן is grain/cereal produce broadly, not specifically 'corn' in modern
    English. תירוש commonly denotes fresh wine/new wine rather than the generic יין;
    'new wine' preserves the lexical distinction.
- source_word: אֶרֶץ לֶחֶם וּכְרָמִים
  chosen: a land of bread and vineyards
  alternatives:
  - a land of food and vineyards
  lexicon: HALOT
  rationale: לחם is literally 'bread' and should be retained rather than generalized
    to 'food.' כרמים means vineyards, preserving the agricultural abundance motif.
