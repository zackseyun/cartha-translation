id: ISA.36.7
reference: Isaiah 36:7
source:
  edition: WLC
  text: וְ/כִי תֹאמַ֣ר אֵלַ֔/י אֶל יְהוָ֥ה אֱלֹהֵ֖י/נוּ בָּטָ֑חְנוּ הֲ/לוֹא ה֗וּא
    אֲשֶׁ֨ר הֵסִ֤יר חִזְקִיָּ֨הוּ֙ אֶת בָּמֹתָ֣י/ו וְ/אֶת מִזְבְּחֹתָ֔י/ו וַ/יֹּ֤אמֶר
    לִֽ/יהוּדָה֙ וְ/לִ/יר֣וּשָׁלִַ֔ם לִ/פְנֵ֛י הַ/מִּזְבֵּ֥חַ הַ/זֶּ֖ה תִּֽשְׁתַּחֲוֽוּ־־־־־׃
translation:
  text: But if you say to me, ‘We trust in the LORD our God,’ is it not he whose high
    places and whose altars Hezekiah has removed, saying to Judah and to Jerusalem,
    ‘You shall bow down before this altar’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, “you shall worship before this altar.” The Hebrew
      verb specifically denotes bowing down/prostrating oneself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - But when
  lexicon: HALOT
  rationale: In this taunting speech, the conjunction introduces a conditional retort.
    'But if' captures both the connective and adversative force in context better
    than a simple 'and if.'
- source_word: תֹאמַר אֵלַי
  chosen: you say to me
  alternatives:
  - you tell me
  lexicon: HALOT
  rationale: A straightforward rendering of אמר with indirect object; 'say to me'
    preserves the directness of the challenge.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct with first person plural suffix; standard covenantal expression
    'the LORD our God' is the plain sense.
- source_word: בָּטָחְנוּ
  chosen: we trust
  alternatives:
  - we have trusted
  - we rely
  lexicon: HALOT
  rationale: Although morphologically perfect, in direct discourse after 'if you say'
    English idiom prefers present 'we trust' to express the claimed basis of confidence.
- source_word: הֲלוֹא
  chosen: is it not
  alternatives:
  - is it not the case that
  - surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement; 'is it not' preserves
    that force.
- source_word: הוּא אֲשֶׁר
  chosen: he whose
  alternatives:
  - he who
  - the one who
  lexicon: HALOT
  rationale: Because the following nouns carry a 3ms suffix ('his high places ...
    his altars'), English 'he whose' best reflects the possessive relationship.
- source_word: הֵסִיר
  chosen: has removed
  alternatives:
  - removed
  - took away
  lexicon: HALOT
  rationale: The perfect refers to Hezekiah's prior reform action with present relevance
    to the Assyrian spokesman's argument; English present perfect fits well.
- source_word: בָּמֹתָיו
  chosen: his high places
  alternatives:
  - his shrines on the heights
  lexicon: HALOT
  rationale: במה commonly denotes cultic high places. 'High places' is the established
    and accurate term, preserving the religious setting.
- source_word: מִזְבְּחֹתָיו
  chosen: his altars
  lexicon: HALOT
  rationale: Standard rendering of מזבח; paired with 'high places' in cultic reform
    language.
- source_word: וַיֹּאמֶר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: English participial 'saying' smoothly links Hezekiah's removal of the
    sites with his command, without losing the sequential sense.
- source_word: לִיהוּדָה וְלִירוּשָׁלַם
  chosen: to Judah and to Jerusalem
  alternatives:
  - to Judah and Jerusalem
  lexicon: HALOT
  rationale: Retaining both prepositions slightly preserves the Hebrew emphasis on
    the two audiences, though in natural English.
- source_word: לִפְנֵי הַמִּזְבֵּחַ הַזֶּה
  chosen: before this altar
  alternatives:
  - in front of this altar
  lexicon: HALOT
  rationale: לפני commonly means 'before/in the presence of.' 'Before this altar'
    is idiomatic and suits worship context.
- source_word: תִּשְׁתַּחֲווּ
  chosen: you shall bow down
  alternatives:
  - you shall worship
  - you must bow down
  lexicon: HALOT
  rationale: The verb denotes prostration/bowing in worship. 'Bow down' keeps the
    physical and cultic sense; 'worship' would be interpretive and less concrete.
