theological_decisions:
- issue: Representation of Hezekiah's reform in the Assyrian spokesman's accusation
  chosen_reading: Render the speech as the Rabshakeh's mistaken or polemical characterization
    that removing local high places and altars was an offense against the LORD.
  alternative_readings:
  - Phrase it in a way that implies the narrator agrees that the removed sites belonged
    properly to the LORD.
  rationale: The verse reports hostile speech, not divine evaluation. The possessive
    pronouns are retained ('his high places ... his altars') because they are in the
    Hebrew, but the quotation context makes clear this is the speaker's argument rather
    than the text's endorsement.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
