theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Degree of emphasis in הַצֵּל יַצִּילֵנוּ
  chosen_reading: The LORD will surely deliver us
  alternative_readings:
  - The LORD will certainly rescue us
  - The LORD will indeed save us
  rationale: The infinitive absolute plus imperfect intensifies the assertion. 'Surely deliver' preserves the rhetorical force of Hezekiah's reported claim without over-paraphrasing.
