id: ISA.36.15
reference: Isaiah 36:15
source:
  edition: WLC
  text: וְ/אַל יַבְטַ֨ח אֶתְ/כֶ֤ם חִזְקִיָּ֨הוּ֙ אֶל יְהוָ֣ה לֵ/אמֹ֔ר הַצֵּ֥ל יַצִּילֵ֖/נוּ יְהוָ֑ה לֹ֤א תִנָּתֵן֙ הָ/עִ֣יר הַ/זֹּ֔את בְּ/יַ֖ד מֶ֥לֶךְ אַשּֽׁוּר־־׃
translation:
  text: And do not let Hezekiah make you trust in Yahweh, saying, ‘Yahweh will surely deliver us; this city will not be given into the hand of the king of Assyria.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The LORD delivering will deliver us,'' an emphatic construction meaning ''will surely deliver us.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'will not be handed over into the power of the king of Assyria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל
  chosen: And do not
  alternatives:
  - and let not
  - but do not
  lexicon: HALOT
  rationale: Combines conjunction plus negative prohibition naturally in English. 'And do not' preserves the discourse flow of the Rabshakeh's speech without sounding archaic.
- source_word: יַבְטַח
  chosen: let ... make you trust
  alternatives:
  - cause you to trust
  - lead you to trust
  - deceive you into trusting
  lexicon: HALOT
  rationale: 'The Hiphil of בטח is causative: Hezekiah is not merely trusting himself but causing the hearers to place trust. ''Make you trust'' is concise and preserves the causative force better than a simple ''let ... trust.'' ''Deceive you'' is too interpretive for the Hebrew verb itself.'
- source_word: אֶתְ/כֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct object pronoun, naturally rendered 'you' in English.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל יְהוָה
  chosen: in the LORD
  alternatives:
  - on the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: With בטח, English idiom normally takes 'trust in.' The divine name is rendered 'the LORD' per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default rendering for the divine name, preserving covenantal reference while matching established reverential convention.
- source_word: לֵ/אמֹר
  chosen: saying
  alternatives:
  - by saying
  - when he says
  lexicon: HALOT
  rationale: Standard rendering of the infinitive construct introducing quoted speech.
- source_word: הַצֵּל יַצִּילֵ/נוּ
  chosen: will surely deliver us
  alternatives:
  - will certainly rescue us
  - will indeed save us
  lexicon: HALOT
  rationale: The construction uses infinitive absolute plus finite verb of נצל for emphasis. 'Will surely deliver us' preserves the emphatic force in idiomatic English. 'Deliver' fits the military-threat context well.
- source_word: לֹא תִנָּתֵן
  chosen: will not be given
  alternatives:
  - will not be handed over
  - will not be delivered
  lexicon: HALOT
  rationale: Niphal of נתן is passive. 'Will not be given' is formally close and clear; 'handed over' is a viable idiomatic alternative but slightly more interpretive.
- source_word: הָ/עִיר הַ/זֹּאת
  chosen: this city
  alternatives:
  - the city הזאת
  - this very city
  lexicon: HALOT
  rationale: Definite noun plus demonstrative is naturally rendered 'this city' in English.
- source_word: בְּ/יַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for being delivered into someone's power. Retaining 'hand' preserves the imagery and remains understandable in English.
- source_word: מֶ֥לֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: Standard English rendering of the construct chain, preserving the political title and nation name clearly.
