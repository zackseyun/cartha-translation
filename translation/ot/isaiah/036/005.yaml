theological_decisions:
- issue: Speaker-introduction wording at the start of the verse
  chosen_reading: 'Render the opening in sense as direct address: ''You say'''
  alternative_readings:
  - '''I said'''
  - '''I say'''
  rationale: This is primarily a contextual and syntactic decision rather than a doctrinal
    one. The Hebrew form is 1cs, but the surrounding speech and the parallel in 2
    Kings 18:20 support understanding it as introducing what Hezekiah/Judah says.
    To preserve transparency, the more literal alternative is retained in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension/ambiguity where genuine)
