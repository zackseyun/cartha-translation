id: ISA.36.5
reference: Isaiah 36:5
source:
  edition: WLC
  text: אָמַ֨רְתִּי֙ אַךְ דְּבַר שְׂפָתַ֔יִם עֵצָ֥ה וּ/גְבוּרָ֖ה לַ/מִּלְחָמָ֑ה עַתָּה֙
    עַל מִ֣י בָטַ֔חְתָּ כִּ֥י מָרַ֖דְתָּ בִּֽ/י־־־׃
translation:
  text: You say—but they are only words of the lips—‘There is counsel and strength
    for war.’ Now in whom have you trusted, that you have rebelled against me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'I said'; many understand the sense here as 'You say,'
      and the parallel in 2 Kings 18:20 supports that reading.
    reason: alternative_reading
lexical_decisions:
- source_word: אָמַרְתִּי
  chosen: You say
  alternatives:
  - I said
  - I say
  lexicon: HALOT
  rationale: 'Although morphologically first person singular perfect (''I said''),
    in context this is commonly understood as an idiomatic or textual form introducing
    the speaker''s quotation about Hezekiah: ''You say.'' This fits the immediate
    rhetorical address (''in whom have you trusted...?'') and parallels the account
    in 2 Kings 18:20. The alternative ''I say''/''I said'' is worth preserving because
    the consonantal text can be read that way.'
- source_word: אַךְ
  chosen: but
  alternatives:
  - surely
  - only
  - indeed
  lexicon: HALOT
  rationale: Here the particle marks contrast or correction in Rabshakeh's speech.
    'But' communicates the adversative force naturally in English, while the limiting
    nuance of 'only' is carried by the following phrase.
- source_word: דְּבַר שְׂפָתַיִם
  chosen: only words of the lips
  alternatives:
  - mere lip-service
  - a word of lips
  - empty words
  lexicon: HALOT
  rationale: The construct phrase literally refers to speech from the lips, idiomatically
    empty or merely verbal claims. 'Only words of the lips' preserves the Hebrew imagery
    while remaining intelligible.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - strategy
  - plan
  lexicon: HALOT
  rationale: The noun denotes counsel or strategic planning. 'Counsel' preserves the
    lexical sense and fits the military context.
- source_word: גְבוּרָה
  chosen: strength
  alternatives:
  - might
  - power
  - valor
  lexicon: HALOT
  rationale: In context of warfare, the term refers to effective military strength
    or might. 'Strength' is clear modern English and pairs naturally with 'counsel'.
- source_word: לַמִּלְחָמָה
  chosen: for war
  alternatives:
  - for battle
  - for warfare
  lexicon: HALOT
  rationale: The prepositional phrase indicates suitability or availability for military
    conflict. 'For war' is concise and natural.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - therefore now
  lexicon: HALOT
  rationale: This adverb marks the transition from dismissing Judah's claims to the
    direct challenge. 'Now' captures the discourse movement.
- source_word: עַל מִי בָטַחְתָּ
  chosen: in whom have you trusted
  alternatives:
  - on whom do you rely
  - upon whom have you relied
  lexicon: HALOT
  rationale: בטח with על expresses reliance or trust placed in someone. 'Trusted'
    is the most direct and idiomatic rendering.
- source_word: מָרַדְתָּ בִּי
  chosen: you have rebelled against me
  alternatives:
  - you have revolted against me
  lexicon: HALOT
  rationale: The verb מרד denotes rebellion against authority. 'Rebelled against me'
    is the standard and clearest English equivalent.
