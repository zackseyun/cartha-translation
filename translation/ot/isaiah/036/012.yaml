id: ISA.36.12
reference: Isaiah 36:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר רַב שָׁקֵ֗ה הַ/אֶ֨ל אֲדֹנֶ֤י/ךָ וְ/אֵלֶ֨י/ךָ֙ שְׁלָחַ֣/נִי אֲדֹנִ֔/י
    לְ/דַבֵּ֖ר אֶת הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה הֲ/לֹ֣א עַל הָ/אֲנָשִׁ֗ים הַ/יֹּֽשְׁבִים֙
    עַל הַ֣/חוֹמָ֔ה לֶ/אֱכֹ֣ל אֶת חראי/הם וְ/לִ/שְׁתּ֛וֹת אֶת שיני/הם עִמָּ/כֶֽם־־־־־־׃
translation:
  text: But the Rabshakeh said, “Has my master sent me to your master and to you to
    speak these words? Has he not sent me to the men sitting on the wall, who are
    doomed to eat their own dung and drink their own urine with you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew uses deliberately coarse siege language: literally, ''to eat their
      dung and drink their urine.'' The written form for ''urine'' reflects a scribal
      euphemism for a cruder expression.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - Rab-shakeh
  - chief cupbearer
  lexicon: HALOT
  rationale: Treated as the established Assyrian title/name in context. Transliteration
    preserves the historical designation better than translating the office title
    in running text.
- source_word: אֲדֹנֶיךָ
  chosen: your master
  alternatives:
  - your lord
  lexicon: HALOT
  rationale: In this political setting the term refers to Hezekiah as the addressee's
    superior, not to God. 'Master' communicates rank without importing divine overtones
    that 'Lord' could suggest.
- source_word: אֵלֶיךָ
  chosen: to you
  lexicon: HALOT
  rationale: Straightforward directional preposition with 2ms suffix.
- source_word: אֲדֹנִי
  chosen: my master
  alternatives:
  - my lord
  lexicon: HALOT
  rationale: Refers to the Assyrian king as Rabshakeh's superior. 'My master' best
    matches the political/master-servant relationship in context.
- source_word: לְדַבֵּר אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: to speak these words
  alternatives:
  - to say these things
  lexicon: HALOT
  rationale: Keeps the concrete 'words' of the Hebrew while remaining natural English.
- source_word: הֲלֹא
  chosen: Has he not
  alternatives:
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. English auxiliary
    inversion gives the force naturally.
- source_word: הָאֲנָשִׁים הַיֹּשְׁבִים עַל־הַחוֹמָה
  chosen: the men sitting on the wall
  alternatives:
  - the men who sit on the wall
  - the men seated on the wall
  lexicon: HALOT
  rationale: Gender-accurate rendering of masculine plural אֲנָשִׁים. The participle
    is rendered as a relative-like phrase in natural English.
- source_word: לֶאֱכֹל ... וְלִשְׁתּוֹת
  chosen: who are doomed to eat ... and drink ...
  alternatives:
  - to eat ... and to drink ...
  - so as to eat ... and drink ...
  lexicon: HALOT
  rationale: The infinitives express the grim consequence facing those on the wall
    under siege. 'Who are doomed to' makes explicit the implied result in idiomatic
    English without changing the sense.
- source_word: חראיהם
  chosen: their own dung
  alternatives:
  - their excrement
  - their own filth
  lexicon: HALOT
  rationale: The Hebrew is deliberately crude. 'Dung' is vivid and readable, preserving
    the offensiveness of the taunt.
- source_word: שיניהם
  chosen: their own urine
  alternatives:
  - their piss
  lexicon: HALOT
  rationale: This ketiv form is a euphemistic/orthographic substitute for a cruder
    term meaning urine. 'Urine' preserves the sense in readable modern English; the
    cruder alternative is worth noting in a footnote because the Hebrew points to
    intentionally coarse speech.
- source_word: עִמָּכֶם
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Simple comitative preposition with 2mp suffix, referring to shared suffering
    with the hearers.
