id: ISA.36.8
reference: Isaiah 36:8
source:
  edition: WLC
  text: וְ/עַתָּה֙ הִתְעָ֣רֶב נָ֔א אֶת אֲדֹנִ֖/י הַ/מֶּ֣לֶךְ אַשּׁ֑וּר וְ/אֶתְּנָ֤ה
    לְ/ךָ֙ אַלְפַּ֣יִם סוּסִ֔ים אִם תּוּכַ֕ל לָ֥/תֶת לְ/ךָ֖ רֹכְבִ֥ים עֲלֵי/הֶֽם־־׃
translation:
  text: Now then, please make a wager with my master, the king of Assyria, and I will
    give you two thousand horses, if you are able to provide riders for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make a pledge with' / 'strike a bargain with.' The Hebrew verb can carry
      the sense of entering a pledge or wager; here the context favors the taunting
      sense of a wager or challenge.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְעָרֶב
  chosen: make a wager
  alternatives:
  - pledge yourself
  - make an agreement
  - enter into a contest
  lexicon: HALOT
  rationale: In this hitpael form with אֶת and in this taunting diplomatic context,
    the verb conveys staking oneself in a challenge or wager rather than a simple
    social 'mix' or neutral agreement. 'Make a wager' captures the mocking force of
    the Rabshakeh's proposal in idiomatic modern English.
- source_word: נָא
  chosen: please
  alternatives:
  - now
  - I pray
  lexicon: HALOT
  rationale: Polite particle softening the imperative. 'Please' is natural modern
    English and preserves the rhetorical politeness of the taunt.
- source_word: אֶת אֲדֹנִי הַמֶּלֶךְ אַשּׁוּר
  chosen: with my master, the king of Assyria
  alternatives:
  - before my master, the king of Assyria
  - with my lord, the king of Assyria
  lexicon: HALOT
  rationale: The phrase identifies the party with whom the wager is made. 'My master'
    is preferable to 'my lord' here because אֲדֹנִי refers to the speaker's human
    superior, not a divine title, and reads naturally in English.
- source_word: וְאֶתְּנָה לְךָ
  chosen: and I will give you
  alternatives:
  - and let me give you
  - then I will give you
  lexicon: HALOT
  rationale: Straightforward first-person promise following the challenge. 'I will
    give you' best reflects the cohortative-like offer in context.
- source_word: אַלְפַּיִם סוּסִים
  chosen: two thousand horses
  lexicon: HALOT
  rationale: Direct numerical expression; no reason to paraphrase.
- source_word: אִם תּוּכַל
  chosen: if you are able
  alternatives:
  - if you can
  - provided that you can
  lexicon: HALOT
  rationale: Expresses conditional ability. 'If you are able' preserves the taunting
    nuance slightly better than the flatter 'if you can.'
- source_word: לָתֵת לְךָ רֹכְבִים עֲלֵיהֶם
  chosen: to provide riders for them
  alternatives:
  - to put riders on them
  - to supply horsemen for them
  lexicon: HALOT
  rationale: The idiom is not merely placing riders physically on horses but furnishing
    qualified mounted men. 'Provide riders for them' is clear, natural, and contextually
    apt.
