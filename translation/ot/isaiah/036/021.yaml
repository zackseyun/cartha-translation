id: ISA.36.21
reference: Isaiah 36:21
source:
  edition: WLC
  text: וַֽ/יַּחֲרִ֔ישׁוּ וְ/לֹֽא עָנ֥וּ אֹת֖/וֹ דָּבָ֑ר כִּֽי מִצְוַ֨ת הַ/מֶּ֥לֶךְ
    הִ֛יא לֵ/אמֹ֖ר לֹ֥א תַעֲנֻֽ/הוּ־־׃
translation:
  text: But they kept silent and did not answer him a word, for the king’s command
    was, saying, “Do not answer him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''did not answer him a word,'' an idiom meaning they gave no reply
      at all.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲרִישׁוּ
  chosen: they kept silent
  alternatives:
  - they were silent
  - they fell silent
  lexicon: HALOT
  rationale: From חרשׁ in the Hiphil/wayyiqtol, meaning to be silent or keep quiet.
    'Kept silent' captures the deliberate restraint in context better than a merely
    stative 'were silent.'
- source_word: וְלֹא עָנוּ אֹתוֹ דָּבָר
  chosen: and did not answer him a word
  alternatives:
  - and did not answer him at all
  - and did not reply to him a word
  lexicon: HALOT
  rationale: ענה with direct object plus דָּבָר is an idiomatic way of saying they
    gave no reply whatsoever. 'Did not answer him a word' preserves the Hebrew emphasis
    and remains natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for their silence. 'For' fits the explanatory relation
    and the narrative register.
- source_word: מִצְוַת הַמֶּלֶךְ
  chosen: the king’s command
  alternatives:
  - the command of the king
  - the king’s order
  lexicon: HALOT
  rationale: מִצְוָה here denotes an authoritative command. 'The king’s command' is
    both accurate and idiomatic.
- source_word: הִיא לֵאמֹר
  chosen: was, saying
  alternatives:
  - 'was this:'
  - 'was as follows:'
  lexicon: HALOT
  rationale: The Hebrew construction formally introduces the content of the command.
    'Was, saying' preserves the source structure more closely, though slightly wooden;
    this is acceptable here because it transparently introduces the quotation.
- source_word: לֹא תַעֲנֻהוּ
  chosen: Do not answer him
  alternatives:
  - You shall not answer him
  - Do not reply to him
  lexicon: HALOT
  rationale: Second masculine plural imperfect with negation gives the content of
    the king's instruction to the group. 'Do not answer him' is clear, direct, and
    fits the quoted command.
