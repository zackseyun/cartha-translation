id: ISA.36.3
reference: Isaiah 36:3
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א אֵלָ֛י/ו אֶלְיָקִ֥ים בֶּן חִלְקִיָּ֖הוּ אֲשֶׁ֣ר עַל הַ/בָּ֑יִת
    וְ/שֶׁבְנָא֙ הַ/סֹּפֵ֔ר וְ/יוֹאָ֥ח בֶּן אָסָ֖ף הַ/מַּזְכִּֽיר־־־׃
translation:
  text: Then Eliakim son of Hilkiah, who was over the household, came out to him,
    along with Shebna the scribe and Joah son of Asaph, the recorder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went out to him.'
    reason: lexical_alternative
  - marker: b
    text: '''Who was over the household'' refers to a high royal official in charge
      of the palace administration.'
    reason: cultural_note
  - marker: c
    text: Or 'the secretary' for 'the scribe.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the chronicler' for 'the recorder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: came out
  alternatives:
  - went out
  lexicon: HALOT
  rationale: The wayyiqtol of יצא commonly means 'went out/came out.' In English narrative,
    'came out' fits the perspective of approaching the Assyrian envoy and reads naturally.
    'Then' is supplied from the wayyiqtol narrative sequence.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - toward him
  lexicon: HALOT
  rationale: The preposition אֶל with 3ms suffix straightforwardly means 'to him.'
    The referent is the previously mentioned Assyrian representative.
- source_word: אֶלְיָקִים
  chosen: Eliakim
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן חִלְקִיָּהוּ
  chosen: son of Hilkiah
  rationale: Standard filial construction; retained formally for clarity and consistency
    with Hebrew narrative style.
- source_word: אֲשֶׁר עַל הַבָּיִת
  chosen: who was over the household
  alternatives:
  - who was over the palace
  - who was in charge of the house
  lexicon: HALOT
  rationale: This idiom denotes an official in charge of the royal household/palace
    administration. 'Over the household' preserves the Hebrew structure while communicating
    the office. 'Palace' is possible contextually, but 'household' better reflects
    בַּיִת and leaves the administrative nuance intact.
- source_word: וְשֶׁבְנָא
  chosen: along with Shebna
  alternatives:
  - and Shebna
  rationale: 'The conjunction simply means ''and,'' but ''along with'' smooths the
    English coordination after the singular verb without changing the sense: Eliakim
    came out, accompanied by the others.'
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary or scribe. 'Scribe' is the more direct
    lexical equivalent and remains understandable in modern English; the administrative
    nuance is clear from context.
- source_word: וְיוֹאָח בֶּן אָסָף
  chosen: and Joah son of Asaph
  rationale: Personal names are transliterated; filial construction retained.
- source_word: הַמַּזְכִּיר
  chosen: the recorder
  alternatives:
  - the chronicler
  - the remembrancer
  - the secretary
  lexicon: HALOT
  rationale: This title refers to an official who kept records and reported matters
    to the king. 'Recorder' is the standard concise rendering and fits the administrative
    context better than the archaic 'remembrancer.'
