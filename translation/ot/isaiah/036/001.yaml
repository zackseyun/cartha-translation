id: ISA.36.1
reference: Isaiah 36:1
source:
  edition: WLC
  text: וַ/יְהִ֡י בְּ/אַרְבַּע֩ עֶשְׂרֵ֨ה שָׁנָ֜ה לַ/מֶּ֣לֶךְ חִזְקִיָּ֗הוּ עָלָ֞ה
    סַנְחֵרִ֤יב מֶֽלֶךְ אַשּׁוּר֙ עַ֣ל כָּל עָרֵ֧י יְהוּדָ֛ה הַ/בְּצֻר֖וֹת וַֽ/יִּתְפְּשֵֽׂ/ם־־׃
translation:
  text: Now in the fourteenth year of King Hezekiah, Sennacherib king of Assyria came
    up against all the fortified cities of Judah and captured them.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative episode. 'Now'
    preserves the discourse-transition function in natural modern English better than
    the traditional but archaic 'and it came to pass.'
- source_word: בְּאַרְבַּע עֶשְׂרֵה שָׁנָה
  chosen: in the fourteenth year
  alternatives:
  - in year fourteen
  lexicon: HALOT
  rationale: This is the standard regnal-year dating formula. English idiom requires
    'in the fourteenth year.'
- source_word: לַמֶּלֶךְ חִזְקִיָּהוּ
  chosen: of King Hezekiah
  alternatives:
  - for King Hezekiah
  - belonging to King Hezekiah
  lexicon: HALOT
  rationale: 'The lamed marks relation within a dating formula: the year of the king''s
    reign. ''Of King Hezekiah'' is the natural English rendering.'
- source_word: עָלָה
  chosen: came up against
  alternatives:
  - went up against
  - marched up against
  lexicon: HALOT
  rationale: עלה with עַל in military context commonly means to advance against or
    attack. 'Came up against' is idiomatic and preserves the directional/military
    nuance without over-specifying.
- source_word: סַנְחֵרִיב
  chosen: Sennacherib
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: king of Assyria
  alternatives:
  - the king of Assyria
  lexicon: HALOT
  rationale: Construct chain identifying Sennacherib's royal office and realm. The
    anarthrous Hebrew is naturally rendered in English as 'king of Assyria.'
- source_word: עַל כָּל עָרֵי יְהוּדָה
  chosen: against all the ... cities of Judah
  alternatives:
  - against every city of Judah
  - against all Judah's cities
  lexicon: HALOT
  rationale: עַל after a military verb marks hostile movement against. כָּל with plural
    noun is best rendered 'all the ... cities of Judah' in smooth English.
- source_word: הַבְּצֻרוֹת
  chosen: fortified
  alternatives:
  - fortress
  - walled
  - defended
  lexicon: HALOT
  rationale: The adjective denotes cities made secure by fortification. 'Fortified'
    is the most precise and standard military term in English.
- source_word: וַיִּתְפְּשֵׂם
  chosen: and captured them
  alternatives:
  - and seized them
  - and took them
  lexicon: HALOT
  rationale: The verb תפשׂ means to seize/capture. In the context of cities under
    military assault, 'captured them' best conveys conquest of fortified cities.
