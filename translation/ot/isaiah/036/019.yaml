theological_decisions:
- issue: Reference of 'my hand' in the Rabshakeh's speech
  chosen_reading: Retain first-person boast without interpretive qualification
  alternative_readings:
  - Interpret as the hand of the Assyrian king
  - Interpret more dynamically as 'from my power'
  rationale: The Hebrew text presents the speaker's taunt in the first person. The
    translation preserves the rhetoric as spoken, without importing explanatory interpretation
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
