id: ISA.36.19
reference: Isaiah 36:19
source:
  edition: WLC
  text: אַיֵּ֞ה אֱלֹהֵ֤י חֲמָת֙ וְ/אַרְפָּ֔ד אַיֵּ֖ה אֱלֹהֵ֣י סְפַרְוָ֑יִם וְ/כִֽי
    הִצִּ֥ילוּ אֶת שֹׁמְר֖וֹן מִ/יָּדִֽ/י־־׃
translation:
  text: Where are the gods of Hamath and Arpad? Where are the gods of Sepharvaim?
    And have they delivered Samaria from my hand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rescued' or 'saved' for 'delivered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  chosen: Where are
  alternatives:
  - Where is
  lexicon: HALOT
  rationale: Interrogative of location. Rendered idiomatically as plural 'Where are'
    because the predicate complement is plural ('gods'), though the Hebrew form itself
    is invariant.
- source_word: אֱלֹהֵי
  chosen: the gods of
  alternatives:
  - gods of
  lexicon: HALOT
  rationale: Construct plural of אֱלֹהִים with place names following. The article
    is supplied naturally in English ('the gods of Hamath') to make the taunt idiomatic.
- source_word: חֲמָת וְאַרְפָּד
  chosen: Hamath and Arpad
  lexicon: HALOT
  rationale: Place names are transliterated per translation philosophy. The conjunction
    is rendered straightforwardly as 'and'.
- source_word: סְפַרְוָיִם
  chosen: Sepharvaim
  alternatives:
  - Sepharvayim
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וְכִי
  chosen: And have
  alternatives:
  - and indeed
  - for have
  - and that
  lexicon: HALOT
  rationale: In this taunting rhetorical question, וְכִי introduces the climactic
    challenge. Rendering it as 'And have' preserves the interrogative force in natural
    English better than a more wooden 'and indeed' or 'for'.
- source_word: הִצִּילוּ
  chosen: delivered
  alternatives:
  - rescued
  - saved
  lexicon: HALOT
  rationale: Hiphil perfect plural of נצל, 'to deliver/rescue.' 'Delivered' fits the
    military-polemical context and common biblical usage.
- source_word: אֶת שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated; the city name is transliterated
    in standard English form.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - from my power
  lexicon: HALOT
  rationale: Literal idiom retained because it is clear in modern English and preserves
    the boastful imagery of power and control.
