id: ISA.36.10
reference: Isaiah 36:10
source:
  edition: WLC
  text: וְ/עַתָּה֙ הֲ/מִ/בַּלְעֲדֵ֣י יְהוָ֔ה עָלִ֛יתִי עַל הָ/אָ֥רֶץ הַ/זֹּ֖את לְ/הַשְׁחִיתָ֑/הּ
    יְהוָה֙ אָמַ֣ר אֵלַ֔/י עֲלֵ֛ה אֶל הָ/אָ֥רֶץ הַ/זֹּ֖את וְ/הַשְׁחִיתָֽ/הּ־־׃
translation:
  text: And now, was it apart from the LORD that I came up against this land to destroy
    it? The LORD said to me, ‘Go up against this land and destroy it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without the LORD' or 'independently of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲמִבַּלְעֲדֵי
  chosen: was it apart from
  alternatives:
  - without
  - independently of
  lexicon: HALOT
  rationale: 'The interrogative הֲ with מִבַּלְעֲדֵי introduces a rhetorical question:
    ''was it apart from/without...?'' ''Apart from'' is idiomatic and preserves the
    sense of acting not independently of YHWH.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: עָלִיתִי
  chosen: I came up
  alternatives:
  - I went up
  - I marched up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' In military approach language, 'came
    up against' is natural English and preserves the directional verb.
- source_word: עַל הָאָרֶץ הַזֹּאת
  chosen: against this land
  alternatives:
  - upon this land
  - to this land
  lexicon: HALOT
  rationale: With על after עלה in a hostile military context, 'against this land'
    best conveys the adversarial movement rather than mere arrival.
- source_word: לְהַשְׁחִיתָהּ
  chosen: to destroy it
  alternatives:
  - to ruin it
  - to lay it waste
  lexicon: HALOT
  rationale: The Hiphil of שׁחת here denotes destructive action against the land.
    'Destroy it' is the most direct and standard rendering.
- source_word: אָמַר אֵלַי
  chosen: said to me
  alternatives:
  - spoke to me
  lexicon: HALOT
  rationale: Simple speech reporting is intended; 'said to me' is the plain English
    equivalent.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Come up
  - Advance
  lexicon: HALOT
  rationale: Imperative of עלה. 'Go up' is the standard rendering and fits reported
    divine command.
- source_word: וְהַשְׁחִיתָהּ
  chosen: and destroy it
  alternatives:
  - and ruin it
  - and lay it waste
  lexicon: HALOT
  rationale: The second command repeats the destructive purpose explicitly. 'And destroy
    it' preserves the repetition and force.
