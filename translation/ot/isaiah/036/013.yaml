id: ISA.36.13
reference: Isaiah 36:13
source:
  edition: WLC
  text: וַֽ/יַּעֲמֹד֙ רַב שָׁקֵ֔ה וַ/יִּקְרָ֥א בְ/קוֹל גָּד֖וֹל יְהוּדִ֑ית וַ/יֹּ֕אמֶר
    שִׁמְע֗וּ אֶת דִּבְרֵ֛י הַ/מֶּ֥לֶךְ הַ/גָּד֖וֹל מֶ֥לֶךְ אַשּֽׁוּר־־־׃
translation:
  text: Then the Rabshakeh stood and called out loudly in Judean, and said, “Hear
    the words of the great king, the king of Assyria.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in Hebrew.' The Hebrew term more specifically denotes the language of
      Judah/Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  - stood forth
  lexicon: HALOT
  rationale: The verb עמד in the wayyiqtol narrative sequence is straightforwardly
    rendered 'stood.' 'Took his stand' is possible but slightly more interpretive;
    'stood' preserves the simple narrative action.
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: This is best treated as the known Assyrian title/name-form used in biblical
    narrative, commonly transliterated 'Rabshakeh.' Translating the office is possible,
    but the transliterated form preserves the historical designation used in the text
    and in parallel passages.
- source_word: וַיִּקְרָא
  chosen: called out
  alternatives:
  - cried out
  - proclaimed
  lexicon: HALOT
  rationale: קרא with 'in a loud voice' naturally means 'called out' or 'cried out.'
    'Called out' is idiomatic modern English and avoids sounding overly dramatic while
    preserving the public, audible nature of the speech.
- source_word: בְקוֹל גָּדוֹל
  chosen: loudly
  alternatives:
  - with a loud voice
  - in a loud voice
  lexicon: HALOT
  rationale: The phrase literally means 'with a great/loud voice.' Rendering it adverbially
    as 'loudly' is natural English and preserves the sense without unnecessary stiffness.
- source_word: יְהוּדִית
  chosen: in Judean
  alternatives:
  - in Hebrew
  - in the language of Judah
  - in Judaean
  lexicon: HALOT
  rationale: The term refers specifically to the language of Judah/Jerusalem, not
    biblical Hebrew as a technical linguistic label. 'In Judean' best reflects the
    ethnolinguistic sense of the Hebrew term in context. 'In Hebrew' is traditional
    but less precise.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: The imperative is direct and forceful. 'Hear' preserves the formal summons
    of the speech; 'listen to' is possible but slightly more expansive.
- source_word: דִּבְרֵי
  chosen: the words
  alternatives:
  - the message
  - the speech
  lexicon: HALOT
  rationale: '''Words'' is the most direct rendering of דברים here. ''Message'' would
    be smoother but more interpretive; the plural ''words'' preserves the source wording.'
- source_word: הַמֶּלֶךְ הַגָּדוֹל
  chosen: the great king
  alternatives:
  - the mighty king
  lexicon: HALOT
  rationale: This reflects the royal Assyrian titulary and should be translated directly.
    'Great king' is the standard and most transparent rendering.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - Assyria's king
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the king of Assyria.'
    Repeating 'the great king, the king of Assyria' preserves the emphatic apposition
    of the Hebrew.
