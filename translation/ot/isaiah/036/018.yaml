id: ISA.36.18
reference: Isaiah 36:18
source:
  edition: WLC
  text: פֶּן יַסִּ֨ית אֶתְ/כֶ֤ם חִזְקִיָּ֨הוּ֙ לֵ/אמֹ֔ר יְהוָ֖ה יַצִּילֵ֑/נוּ הַ/הִצִּ֜ילוּ
    אֱלֹהֵ֤י הַ/גּוֹיִם֙ אִ֣ישׁ אֶת אַרְצ֔/וֹ מִ/יַּ֖ד מֶ֥לֶךְ אַשּֽׁוּר־־׃
translation:
  text: Do not let Hezekiah mislead you by saying, ‘The LORD will deliver us.’ Have
    any of the gods of the nations, each one, delivered his land from the hand of
    the king of Assyria?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''lest Hezekiah incite/mislead you, saying.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Have the gods of the nations, any one of them, delivered his land from
      the hand of the king of Assyria?'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: Do not let
  alternatives:
  - lest
  - otherwise
  lexicon: HALOT
  rationale: In this warning context, פֶּן introduces a negative precaution. English
    idiom is best captured by 'Do not let' rather than the more formal 'lest.'
- source_word: יַסִּית
  chosen: mislead
  alternatives:
  - persuade
  - entice
  - deceive
  lexicon: HALOT
  rationale: The Hiphil of סות carries the sense of inciting or misleading someone.
    'Mislead' fits the Rabshakeh's attempt to turn the people away from trust in Hezekiah
    without overstating to 'deceive' or flattening to 'persuade.'
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name transliterated by standard English convention per translation
    philosophy.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    in the main text.
- source_word: יַצִּילֵנוּ
  chosen: will deliver us
  alternatives:
  - will save us
  - will rescue us
  lexicon: HALOT
  rationale: The Hiphil of נצל commonly means to deliver or rescue. 'Deliver us' is
    natural here and matches the military-threat context.
- source_word: הַהִצִּילוּ
  chosen: Have any ... delivered
  alternatives:
  - Did ... rescue
  - Have ... saved
  lexicon: HALOT
  rationale: The interrogative particle with perfect verb forms a rhetorical question
    about whether any national gods have succeeded in delivering their lands.
- source_word: אֱלֹהֵי הַגּוֹיִם
  chosen: the gods of the nations
  alternatives:
  - the gods of the peoples
  - the national gods
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'Nations' preserves
    the political-ethnic sense of גוים.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - any one
  - a man
  lexicon: HALOT
  rationale: Here אִישׁ distributively modifies the preceding phrase, indicating each
    individual god among the nations' gods. 'Each one' conveys that distributive force
    more clearly than a wooden 'man.'
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - its land
  - his country
  lexicon: HALOT
  rationale: The singular suffix matches the distributive singular אִישׁ, yielding
    the idiomatic 'each one ... his land.' 'His land' preserves the Hebrew grammar,
    though the referent is each god.
- source_word: מִיַּד מֶלֶךְ אַשּׁוּר
  chosen: from the hand of the king of Assyria
  alternatives:
  - from the power of the king of Assyria
  lexicon: HALOT
  rationale: '''From the hand of'' is a standard Hebrew idiom for power or control.
    It is retained because it remains intelligible in modern English and preserves
    the source imagery.'
