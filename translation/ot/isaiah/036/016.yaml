id: ISA.36.16
reference: Isaiah 36:16
source:
  edition: WLC
  text: אַֽל תִּשְׁמְע֖וּ אֶל חִזְקִיָּ֑הוּ כִּי֩ כֹ֨ה אָמַ֜ר הַ/מֶּ֣לֶךְ אַשּׁ֗וּר
    עֲשֽׂוּ אִתִּ֤/י בְרָכָה֙ וּ/צְא֣וּ אֵלַ֔/י וְ/אִכְל֤וּ אִישׁ גַּפְנ/וֹ֙ וְ/אִ֣ישׁ
    תְּאֵנָת֔/וֹ וּ/שְׁת֖וּ אִ֥ישׁ מֵי בוֹרֽ/וֹ־־ס־־־׃
translation:
  text: 'Do not listen to Hezekiah, for this is what the king of Assyria says: Make
    peace with me and come out to me, and let each man eat from his own vine and each
    from his own fig tree, and let each man drink the water of his own cistern,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'Make with me a blessing.' The phrase is an idiom for making
      peace or coming to favorable terms.
    reason: lexical_alternative
  - marker: b
    text: '''Each man'' renders the repeated Hebrew אִישׁ, a masculine singular distributive
      expression meaning each individual in the group.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמְעוּ אֶל
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: The idiom שׁמע אל commonly means 'listen to' or 'heed.' In this context
    the Rabshakeh is urging the people not to pay attention to Hezekiah's counsel.
    'Listen to' is natural English and preserves the force without over-interpreting
    as full obedience.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: כִּי כֹה אָמַר
  chosen: for this is what ... says
  alternatives:
  - for thus says
  - because this is what ... has said
  lexicon: HALOT
  rationale: Introduces direct speech. 'For this is what ... says' is readable modern
    English while retaining the formal messenger formula sense of כֹה אָמַר.
- source_word: הַמֶּלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  alternatives:
  - the Assyrian king
  rationale: A straightforward genitival rendering that matches normal English biblical
    style and preserves the political title.
- source_word: עֲשׂוּ אִתִּי בְרָכָה
  chosen: Make peace with me
  alternatives:
  - Make a blessing with me
  - Come to terms with me
  - Make an agreement with me
  lexicon: HALOT
  rationale: The expression literally involves 'make ... blessing,' but in this diplomatic
    context it is an idiom for entering favorable terms or peace. 'Make peace with
    me' best conveys the intended sense in idiomatic English. Because the literal
    wording may be of interest, an alternative is preserved in a footnote.
- source_word: וּצְאוּ אֵלַי
  chosen: and come out to me
  alternatives:
  - and surrender to me
  - and come forth to me
  lexicon: HALOT
  rationale: יצא 'go/come out' is kept fairly literal. 'Surrender to me' captures
    the implication but is more interpretive than the Hebrew wording, so the main
    text retains 'come out to me' and the implication can be inferred from context.
- source_word: וְאִכְלוּ
  chosen: and let each man eat
  alternatives:
  - and eat
  lexicon: HALOT
  rationale: English supplies 'let' to smooth the sequence of imperatives into a promise-like
    invitation. This reflects the rhetorical force without changing the command form.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew uses the masculine singular distributive אִישׁ repeatedly.
    Per gender-accurate philosophy, 'each man' preserves the source form and distributive
    force better than a neutral paraphrase.
- source_word: גַּפְנוֹ
  chosen: his own vine
  alternatives:
  - his vine
  lexicon: HALOT
  rationale: The possessive suffix is explicit; 'his own vine' brings out the personal
    possession and echoes a common biblical image of settled peace and prosperity.
- source_word: תְּאֵנָתוֹ
  chosen: his own fig tree
  alternatives:
  - his fig tree
  lexicon: HALOT
  rationale: As with 'vine,' the possessive suffix is explicit and the phrase is a
    stock image of security and abundance.
- source_word: וּשְׁתוּ
  chosen: and let each man drink
  alternatives:
  - and drink
  lexicon: HALOT
  rationale: As with 'eat,' English smooths the imperative sequence with 'let each
    man' to preserve the distributive sense.
- source_word: מֵי בוֹרוֹ
  chosen: the water of his own cistern
  alternatives:
  - water from his own pit
  - water from his own well
  lexicon: HALOT
  rationale: בּוֹר here refers to a cistern or water-storage pit rather than a spring-fed
    well. 'Cistern' is the most precise English term, and 'his own' reflects the suffix.
