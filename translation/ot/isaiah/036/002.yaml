id: ISA.36.2
reference: Isaiah 36:2
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֣ח מֶֽלֶךְ אַשּׁ֣וּר אֶת רַב שָׁקֵ֨ה מִ/לָּכִ֧ישׁ יְרוּשָׁלְַ֛מָ/ה
    אֶל הַ/מֶּ֥לֶךְ חִזְקִיָּ֖הוּ בְּ/חֵ֣יל כָּבֵ֑ד וַֽ/יַּעֲמֹ֗ד בִּ/תְעָלַת֙ הַ/בְּרֵכָ֣ה
    הָ/עֶלְיוֹנָ֔ה בִּ/מְסִלַּ֖ת שְׂדֵ֥ה כוֹבֵֽס־׀־־־׃
translation:
  text: Then the king of Assyria sent the Rabshakeh from Lachish to Jerusalem, to
    King Hezekiah, with a heavy force. And he stood by the conduit of the upper pool,
    on the highway to the launderer’s field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabshakeh is likely an Assyrian official title; possible renderings include
      “chief cupbearer” or “field commander.”
    reason: lexical_alternative
  - marker: b
    text: Or “with a great army” / “with a large military force.”
    reason: lexical_alternative
  - marker: c
    text: Traditionally “the fuller’s field.”
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the field commander
  lexicon: HALOT
  rationale: Likely an Assyrian official title rather than a personal name. Kept as
    a conventional transliteration in the main text because the title's exact functional
    equivalent in English is uncertain, while preserving explanatory alternatives
    in a footnote-worthy form.
- source_word: בְּחֵיל כָּבֵד
  chosen: with a heavy force
  alternatives:
  - with a great army
  - with a large military force
  lexicon: HALOT
  rationale: חַיִל can denote military force/army; כָּבֵד adds the sense of weightiness
    or impressiveness. 'Heavy force' stays close to the Hebrew while remaining intelligible;
    smoother alternatives are possible but slightly more interpretive.
- source_word: תְעָלַת
  chosen: conduit
  alternatives:
  - channel
  - aqueduct
  lexicon: HALOT
  rationale: Refers to a watercourse or engineered channel. 'Conduit' is a natural
    English rendering in this topographical context and aligns with established usage
    without being overly technical.
- source_word: הַבְּרֵכָה הָעֶלְיוֹנָה
  chosen: the upper pool
  alternatives:
  - the upper reservoir
  lexicon: HALOT
  rationale: A pool or reservoir associated with Jerusalem's water system. 'Upper
    pool' is concise and idiomatic, and likely echoes a known location.
- source_word: מְסִלַּת
  chosen: highway
  alternatives:
  - road
  - causeway
  lexicon: HALOT
  rationale: Denotes a raised road or highway. 'Highway' best captures the established
    route sense in readable modern English.
- source_word: שְׂדֵה כוֹבֵס
  chosen: the launderer’s field
  alternatives:
  - the fuller's field
  - the washerman's field
  lexicon: HALOT
  rationale: כּוֹבֵס is one who washes or fulls cloth. 'Launderer' is more accessible
    modern English than 'fuller' while preserving the occupational sense.
- source_word: וַיַּעֲמֹד
  chosen: he stood
  alternatives:
  - he took his stand
  - he stopped
  lexicon: HALOT
  rationale: The verb straightforwardly means 'stood' or 'took a stand.' 'He stood'
    is sufficiently literal and fits the narrative sequence.
- source_word: יְרוּשָׁלַמָה
  chosen: to Jerusalem
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward Jerusalem; rendered
    idiomatically as 'to Jerusalem'.
