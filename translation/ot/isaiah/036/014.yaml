theological_decisions:
- issue: Referent of 'the king'
  chosen_reading: the phrase is rendered generically as 'the king' in the speech formula,
    referring contextually to the Assyrian king rather than specifying his name in
    translation
  alternative_readings:
  - Thus says Sennacherib
  - Thus says the great king
  rationale: The Hebrew text here has simply 'the king.' Expanding to a named referent
    would import context not stated in this verse. Retaining 'the king' preserves
    the source wording while allowing the narrative context to identify him.
  doctrine_reference: Translation philosophy §1, §5
