id: ISA.36.14
reference: Isaiah 36:14
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר הַ/מֶּ֔לֶךְ אַל יַשִּׁ֥א לָ/כֶ֖ם חִזְקִיָּ֑הוּ כִּ֥י לֹֽא יוּכַ֖ל
    לְ/הַצִּ֥יל אֶתְ/כֶֽם־־׃
translation:
  text: 'Thus says the king: Do not let Hezekiah deceive you, for he will not be able
    to deliver you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mislead you.' The Hebrew verb can mean to lead astray or deceive.
    reason: lexical_alternative
  - marker: b
    text: Or 'rescue you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces a formal royal proclamation. 'Thus' preserves the elevated,
    declarative tone of messenger formula language in readable English.
- source_word: אָמַר הַמֶּלֶךְ
  chosen: says the king
  alternatives:
  - said the king
  - the king says
  lexicon: HALOT
  rationale: Hebrew perfect in direct speech introduction is idiomatically rendered
    as present in English ('says') to introduce the quoted message. 'The king' refers
    to the Assyrian king as represented by his envoy.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Let not
  lexicon: HALOT
  rationale: Standard negative jussive/prohibitive rendering in contemporary English.
- source_word: יַשִּׁא
  chosen: let Hezekiah deceive you
  alternatives:
  - let Hezekiah mislead you
  - let Hezekiah beguile you
  lexicon: HALOT
  rationale: From נשׁא in the causative sense of leading astray/deceiving. 'Deceive'
    is the most natural and direct English equivalent here, fitting the Rabshakeh's
    warning against trusting Hezekiah.
- source_word: לָכֶם
  chosen: you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition is absorbed idiomatically into English with the verb
    phrase 'deceive you'; a more literal 'deceive for you' would be unnatural.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and fits
    the rhetorical flow.
- source_word: לֹא יוּכַל
  chosen: he will not be able
  alternatives:
  - he cannot
  - he is not able
  lexicon: HALOT
  rationale: Expresses inability. 'Will not be able' preserves the modal force and
    the forward-looking sense in context.
- source_word: לְהַצִּיל
  chosen: to deliver
  alternatives:
  - to rescue
  - to save
  lexicon: HALOT
  rationale: הציל commonly means rescue/deliver from danger. 'Deliver' fits the military-threat
    context and echoes common biblical diction without becoming archaic.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct object pronoun referring to the people of Jerusalem/Judah addressed
    by the Assyrian envoy.
