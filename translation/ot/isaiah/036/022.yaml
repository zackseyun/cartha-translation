id: ISA.36.22
reference: Isaiah 36:22
source:
  edition: WLC
  text: וַ/יָּבֹ֣א אֶלְיָקִ֣ים בֶּן חִלְקִיָּ֣הוּ אֲשֶׁר עַל הַ֠/בַּיִת וְ/שֶׁבְנָ֨א
    הַ/סּוֹפֵ֜ר וְ/יוֹאָ֨ח בֶּן אָסָ֧ף הַ/מַּזְכִּ֛יר אֶל חִזְקִיָּ֖הוּ קְרוּעֵ֣י
    בְגָדִ֑ים וַ/יַּגִּ֣ידוּ ל֔/וֹ אֵ֖ת דִּבְרֵ֥י רַב שָׁקֵֽה־־־־־־׃ס
translation:
  text: Then Eliakim son of Hilkiah, who was over the household, and Shebna the scribe,
    and Joah son of Asaph, the recorder, came to Hezekiah with their clothes torn
    and told him the words of the Rabshakeh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabshakeh is an Assyrian official title, often understood as something like
      'chief cupbearer' or another high-ranking court officer.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא introduces the next event in sequence. English 'Then
    ... came' captures the narrative progression more naturally than a bare 'and came,'
    while preserving the past narrative sense.
- source_word: אֲשֶׁר עַל הַבַּיִת
  chosen: who was over the household
  alternatives:
  - who was over the palace
  - who was in charge of the house
  lexicon: HALOT
  rationale: The idiom denotes an official in charge of the royal household. 'Over
    the household' is a close rendering that preserves the Hebrew administrative expression
    without over-paraphrasing.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary or scribe. 'Scribe' is the more direct
    lexical equivalent and remains understandable in context.
- source_word: הַמַּזְכִּיר
  chosen: the recorder
  alternatives:
  - the chronicler
  - the remembrancer
  lexicon: HALOT
  rationale: This title refers to an official recorder/remembrancer in the royal court.
    'Recorder' is standard, concise, and fits the administrative context.
- source_word: קְרוּעֵי בְגָדִים
  chosen: with their clothes torn
  alternatives:
  - with torn clothes
  - their garments torn
  lexicon: HALOT
  rationale: The passive participle plus noun literally means 'torn of clothes/garments,'
    describing their state on arrival. 'With their clothes torn' is natural English
    and preserves the sign of grief/distress.
- source_word: וַיַּגִּידוּ לוֹ
  chosen: and told him
  alternatives:
  - and reported to him
  - and declared to him
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means to tell, report, or declare. 'Told him'
    is idiomatic and sufficient here, since the object immediately specifies what
    they reported.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - the speech of
  lexicon: HALOT
  rationale: The construct form of דָּבָר here most directly means 'words.' 'Message'
    is possible, but 'words' better preserves the verbal content they relay from the
    prior speech.
- source_word: רַב שָׁקֵה
  chosen: the Rabshakeh
  alternatives:
  - the chief cupbearer
  - the Rab-shakeh
  lexicon: HALOT
  rationale: Although originally an Assyrian title, רַב־שָׁקֵה functions in this narrative
    almost as a fixed title/name for the official. Retaining 'Rabshakeh' preserves
    the historical designation without forcing a possibly misleading functional gloss
    into the main text.
