id: ISA.36.9
reference: Isaiah 36:9
source:
  edition: WLC
  text: וְ/אֵ֣יךְ תָּשִׁ֗יב אֵ֠ת פְּנֵ֨י פַחַ֥ת אַחַ֛ד עַבְדֵ֥י אֲדֹנִ֖/י הַ/קְטַנִּ֑ים
    וַ/תִּבְטַ֤ח לְ/ךָ֙ עַל מִצְרַ֔יִם לְ/רֶ֖כֶב וּ/לְ/פָרָשִֽׁים־׃
translation:
  text: How then can you repulse a single captain among the least of my master's servants,
    when you trust in Egypt for chariots and horsemen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back the face of,' an idiom meaning to resist or drive back.
    reason: lexical_alternative
  - marker: b
    text: '''Captain'' may also be rendered ''governor'' or ''official''; the Hebrew
      term refers to a subordinate ruler or officer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵיךְ
  chosen: How then
  alternatives:
  - And how
  - How
  lexicon: HALOT
  rationale: Introduces a rhetorical question with a connective force from the prior
    context. 'How then' captures both the conjunction and the argumentative progression.
- source_word: תָּשִׁיב אֵת פְּנֵי
  chosen: can you repulse
  alternatives:
  - can you turn back
  - can you face
  - can you turn away the face of
  lexicon: HALOT
  rationale: The idiom literally means 'turn back the face of' and in context refers
    to resisting or defeating an opponent. 'Repulse' preserves the military sense
    without over-paraphrasing.
- source_word: פַחַת
  chosen: captain
  alternatives:
  - governor
  - official
  - commander
  lexicon: HALOT
  rationale: In this military taunt, the term refers to a subordinate Assyrian ruler/official.
    'Captain' best fits the immediate martial context, though the broader term can
    denote a governor or provincial official.
- source_word: אַחַד
  chosen: a single
  alternatives:
  - one
  lexicon: HALOT
  rationale: '''A single'' brings out the force of the taunt: not even one minor officer
    can be resisted.'
- source_word: עַבְדֵי אֲדֹנִי
  chosen: my master's servants
  alternatives:
  - the servants of my lord
  - my lord's servants
  lexicon: HALOT
  rationale: The speaker refers to the Assyrian king as 'my master/lord.' 'My master's
    servants' is natural English and preserves the possessive relationship.
- source_word: הַקְטַנִּים
  chosen: the least
  alternatives:
  - the smallest
  - the lowliest
  - the lesser
  lexicon: HALOT
  rationale: Describes the lower rank of these servants. 'The least' idiomatically
    conveys inferior status rather than physical size.
- source_word: וַתִּבְטַח לְךָ עַל מִצְרַיִם
  chosen: when you trust in Egypt
  alternatives:
  - while you trust in Egypt
  - and you put your trust in Egypt for yourself
  lexicon: HALOT
  rationale: The clause explains Judah's misplaced reliance. 'Trust in Egypt' is the
    plain sense; 'when' fits the rhetorical flow in English.
- source_word: לְרֶכֶב
  chosen: for chariots
  alternatives:
  - for chariotry
  - for chariot forces
  lexicon: HALOT
  rationale: Refers collectively to military chariots supplied or expected from Egypt.
    'Chariots' is the standard and clear rendering.
- source_word: וּלְפָרָשִׁים
  chosen: and horsemen
  alternatives:
  - and cavalry
  - and riders
  lexicon: HALOT
  rationale: Denotes mounted troops. 'Horsemen' is a direct and traditional rendering
    that remains clear in modern English.
