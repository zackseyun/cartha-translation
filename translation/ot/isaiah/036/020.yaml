id: ISA.36.20
reference: Isaiah 36:20
source:
  edition: WLC
  text: מִ֗י בְּ/כָל אֱלֹהֵ֤י הָֽ/אֲרָצוֹת֙ הָ/אֵ֔לֶּה אֲשֶׁר הִצִּ֥ילוּ אֶת אַרְצָ֖/ם
    מִ/יָּדִ֑/י כִּֽי יַצִּ֧יל יְהוָ֛ה אֶת יְרוּשָׁלִַ֖ם מִ/יָּדִֽ/י־־־־־׃
translation:
  text: Who among all the gods of these lands has delivered their land from my hand,
    that the LORD should deliver Jerusalem from my hand?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִי
  chosen: Who
  alternatives:
  - Which one
  lexicon: HALOT
  rationale: 'Interrogative pronoun introducing a taunt: ''Who among...?'' is idiomatic
    and preserves the rhetorical force.'
- source_word: בְּכָל אֱלֹהֵי הָאֲרָצוֹת הָאֵלֶּה
  chosen: among all the gods of these lands
  alternatives:
  - among all the gods of these countries
  - of all the gods of these lands
  lexicon: HALOT
  rationale: The preposition with 'all the gods' is best rendered idiomatically as
    'among all the gods.' אֲרָצוֹת is literally 'lands/earths'; here it refers to
    the various conquered territories, so 'lands' is natural and slightly more concrete
    than 'countries.'
- source_word: אֲשֶׁר
  chosen: has
  alternatives:
  - that have
  lexicon: HALOT
  rationale: 'The relative particle links the clause describing these gods. In English
    the relative is naturally absorbed into the verbal clause: ''Who ... has delivered...?''
    rather than a more wooden ''who are those that have delivered...''.'
- source_word: הִצִּילוּ
  chosen: has delivered
  alternatives:
  - have rescued
  - has saved
  lexicon: HALOT
  rationale: From נצל, 'deliver/rescue.' 'Delivered' fits the military-political context
    and pairs well with the repeated verb later in the verse. Singular English agreement
    ('has') follows the distributive sense after 'Who among all the gods...'.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - its land
  lexicon: HALOT
  rationale: The Hebrew suffix is 3mp, referring back collectively to the gods of
    the lands. English commonly uses singular 'their land' for a distributive collective
    reference; 'its land' would sound awkward because the antecedent is plural.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - from my power
  lexicon: HALOT
  rationale: The idiom 'from my hand' should be preserved because it is transparent
    in English and retains the concrete metaphor of power/control.
- source_word: כִּי
  chosen: that
  alternatives:
  - indeed
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the result/content of the taunt: ''that the LORD
    should deliver...?'' This captures the rhetorical logic better than a causal ''for.'''
- source_word: יַצִּיל
  chosen: should deliver
  alternatives:
  - will deliver
  - might deliver
  lexicon: HALOT
  rationale: The imperfect in this rhetorical question expresses supposed possibility
    from the speaker's perspective. 'Should deliver' conveys the mocking challenge
    in idiomatic English without overstating simple futurity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: יְרוּשָׁלַםִ
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
