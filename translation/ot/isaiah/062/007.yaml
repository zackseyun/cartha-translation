theological_decisions:
- issue: Referent of 'him'
  chosen_reading: The pronoun refers to the LORD, whom the watchmen are urged to petition
    without ceasing.
  alternative_readings:
  - An unspecified divine/heavenly referent
  rationale: 'The immediate context (Isa 62:6) speaks of those who remind the LORD
    and urges them not to keep silent. Verse 7 continues that address naturally: they
    are to give him no rest until he acts for Jerusalem.'
