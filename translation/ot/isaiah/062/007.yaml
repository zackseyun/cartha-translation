id: ISA.62.7
reference: Isaiah 62:7
source:
  edition: WLC
  text: וְ/אַֽל תִּתְּנ֥וּ דֳמִ֖י ל֑/וֹ עַד יְכוֹנֵ֞ן וְ/עַד יָשִׂ֧ים אֶת יְרֽוּשָׁלִַ֛ם
    תְּהִלָּ֖ה בָּ/אָֽרֶץ־־־־׃
translation:
  text: and give him no rest until he establishes and until he makes Jerusalem a praise
    in the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'give him no silence'; the Hebrew noun can denote 'silence' or 'quiet,'
      and the expression pictures unceasing appeal to the LORD.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the land'; Hebrew אֶרֶץ can mean either 'earth' or 'land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַֽל
  chosen: and ... no
  alternatives:
  - and do not
  - and not
  lexicon: HALOT
  rationale: The conjunction plus negative particle continues the exhortation from
    the previous verse. In English, the negation is carried naturally in the idiom
    'give him no rest' rather than a more wooden 'and do not give.'
- source_word: תִּתְּנ֥וּ
  chosen: give
  alternatives:
  - grant
  - allow
  lexicon: HALOT
  rationale: נתן commonly means 'give.' Here it governs the object 'rest/silence'
    and yields the idiomatic sense 'give ... rest.' 'Give' preserves the Hebrew wording
    while remaining natural English.
- source_word: דֳמִ֖י
  chosen: rest
  alternatives:
  - silence
  - quiet
  lexicon: HALOT
  rationale: Though the noun can denote silence or quiet, in the collocation 'give
    no דמי to him' the sense is not to let him be at rest, i.e., to keep appealing
    to him. 'Rest' is the most idiomatic English rendering in this context; the lexical
    alternative 'silence' is preserved in a footnote because the Hebrew image may
    also suggest 'give him no silence.'
- source_word: ל֑/וֹ
  chosen: him
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, referring back to the LORD
    in the immediate context. English 'him' is the straightforward equivalent.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the point that
  lexicon: HALOT
  rationale: Standard temporal marker introducing the goal of the watchmen's persistence.
- source_word: יְכוֹנֵ֞ן
  chosen: he establishes
  alternatives:
  - he restores
  - he sets firm
  lexicon: HALOT
  rationale: כון in the polel/related stem carries the sense of establishing, making
    firm, setting in place. 'Establishes' fits Jerusalem as the object implied from
    context and matches the parallel clause.
- source_word: וְ/עַד
  chosen: and until
  alternatives:
  - until also
  lexicon: HALOT
  rationale: The repeated עד with conjunction marks a second parallel goal; 'and until'
    preserves the Hebrew structure.
- source_word: יָשִׂ֧ים
  chosen: he makes
  alternatives:
  - he sets
  - he appoints
  lexicon: HALOT
  rationale: שׂים broadly means 'put, set, make.' With Jerusalem and the predicate
    noun 'praise,' 'makes' is the clearest English expression.
- source_word: יְרֽוּשָׁלִַ֛ם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: תְּהִלָּ֖ה
  chosen: a praise
  alternatives:
  - praise
  - renown
  - an object of praise
  lexicon: HALOT
  rationale: The noun denotes praise or renown. The anarthrous predicate after 'make'
    is well represented by 'a praise,' preserving the metaphor that Jerusalem becomes
    something praised.
- source_word: בָּ/אָֽרֶץ
  chosen: in the earth
  alternatives:
  - in the land
  - on the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this universalizing prophetic context,
    'earth' better captures the broader scope of Jerusalem's renown among the nations.
    'In the earth' follows the Hebrew preposition closely, though idiomatic English
    could also say 'on the earth.'
