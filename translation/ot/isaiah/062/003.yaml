id: ISA.62.3
reference: Isaiah 62:3
source:
  edition: WLC
  text: וְ/הָיִ֛יתְ עֲטֶ֥רֶת תִּפְאֶ֖רֶת בְּ/יַד יְהוָ֑ה ו/צנוף מְלוּכָ֖ה בְּ/כַף אֱלֹהָֽיִ/ךְ־־׃
translation:
  text: You will be a crown of beauty in the hand of Yahweh, and a royal turban in the palm of your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a diadem of royalty' / 'a royal headdress.' The Hebrew noun refers to a wrapped headpiece or turban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתְ
  chosen: You will be
  alternatives:
  - and you will become
  - and you will be
  lexicon: HALOT
  rationale: Qal perfect 2fs with prefixed conjunction in prophetic discourse functions futurally. 'You will be' is idiomatic and preserves the direct address to Zion/Jerusalem as feminine singular.
- source_word: עֲטֶרֶת תִּפְאֶרֶת
  chosen: a crown of beauty
  alternatives:
  - a beautiful crown
  - a crown of splendor
  - a glorious crown
  lexicon: HALOT
  rationale: Construct chain best rendered literally as 'crown of beauty/splendor.' 'Beauty' is chosen for readable modern English while preserving the genitival image rather than collapsing it into a simple adjective.
- source_word: בְּיַד
  chosen: in the hand of
  alternatives:
  - in the power of
  - at the hand of
  lexicon: HALOT
  rationale: The phrase is spatial-metaphorical, depicting precious possession held by YHWH. 'In the hand of' preserves the concrete imagery better than abstract paraphrases.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְצָנִיף
  chosen: and a royal turban
  alternatives:
  - and a diadem of royalty
  - and a royal headdress
  lexicon: HALOT
  rationale: צָנִיף denotes a wrapped headdress or turban. 'Turban' keeps the concrete image; 'royal' renders מְלוּכָה. 'Diadem' is possible in context but is less directly tied to the Hebrew noun here and can blur the distinction from the previous 'crown.'
- source_word: מְלוּכָה
  chosen: royal
  alternatives:
  - of kingship
  - of royalty
  - kingly
  lexicon: HALOT
  rationale: Used attributively with the preceding noun, it describes regal status. 'Royal' is the most natural English equivalent.
- source_word: בְּכַף
  chosen: in the palm of
  alternatives:
  - in the hand of
  - on the palm of
  lexicon: HALOT
  rationale: כַּף specifically denotes the palm or hollow of the hand. Rendering it distinctly from יָד preserves the poetic parallelism's variation.
- source_word: אֱלֹהָיִךְ
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: With 2fs suffix and singular referent in context, the plural form functions as the standard singular title for Israel's God. 'Your God' fits the covenantal address to Zion.
