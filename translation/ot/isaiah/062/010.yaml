theological_decisions:
- issue: Referent of 'the people' versus 'the peoples'
  chosen_reading: '''the people'' refers to Zion/Israel, while ''the peoples'' refers
    to the nations'
  alternative_readings:
  - both phrases refer to Israel
  - both phrases refer broadly to all nations
  rationale: 'The verse intentionally shifts from singular collective עם to plural
    עמים. Preserving this distinction in English maintains the prophetic scope: a
    way is prepared for God''s people, and a banner is raised in view of the nations.'
