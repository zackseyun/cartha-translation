id: ISA.62.10
reference: Isaiah 62:10
source:
  edition: WLC
  text: עִבְר֤וּ עִבְרוּ֙ בַּ/שְּׁעָרִ֔ים פַּנּ֖וּ דֶּ֣רֶךְ הָ/עָ֑ם סֹ֣לּוּ סֹ֤לּוּ
    הַֽ/מְסִלָּה֙ סַקְּל֣וּ מֵ/אֶ֔בֶן הָרִ֥ימוּ נֵ֖ס עַל הָ/עַמִּֽים־׃
translation:
  text: Pass through, pass through the gates; clear the way for the people. Build
    up, build up the highway; clear it of stones. Raise up a banner over the peoples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prepare the way for the people.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'Cast up, cast up the highway.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Raise a standard over the peoples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרוּ עִבְרוּ
  chosen: Pass through, pass through
  alternatives:
  - Go through, go through
  - Cross through, cross through
  lexicon: HALOT
  rationale: The repeated imperative of עבר calls for a direct movement verb. 'Pass
    through' is idiomatic English and preserves both the imperative force and the
    rhetorical repetition.
- source_word: בַּשְּׁעָרִים
  chosen: the gates
  alternatives:
  - through the gates
  - at the gates
  lexicon: HALOT
  rationale: With the preceding verb, the phrase naturally yields 'pass through the
    gates.' 'Gates' likely refers to city gates, but 'city' is not explicit and should
    not be added.
- source_word: פַּנּוּ דֶּרֶךְ
  chosen: clear the way
  alternatives:
  - prepare the way
  - turn the way
  lexicon: HALOT
  rationale: פנה in the piel commonly means to clear away or make ready. 'Clear the
    way' fits the road-building imagery of the verse and avoids importing later intertextual
    associations too strongly, though 'prepare the way' is possible.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the people group
  - the nation
  lexicon: HALOT
  rationale: עם here is singular collective and best rendered 'the people.' In context
    it most naturally refers to Zion's people rather than humanity in general.
- source_word: סֹלּוּ סֹלּוּ
  chosen: Build up, build up
  alternatives:
  - Cast up, cast up
  - Raise up, raise up
  lexicon: HALOT
  rationale: The verb סלל in road imagery refers to heaping up or building a roadway.
    'Build up' is clear modern English; 'cast up' is traditional but archaic for many
    readers.
- source_word: הַמְסִלָּה
  chosen: the highway
  alternatives:
  - the road
  - the raised road
  lexicon: HALOT
  rationale: מסלה often denotes a built-up road or highway. 'Highway' captures the
    elevated, prepared-road sense in accessible English.
- source_word: סַקְּלוּ מֵאֶבֶן
  chosen: clear it of stones
  alternatives:
  - remove the stones
  - stone it clear
  lexicon: HALOT
  rationale: The piel of סקל here means to clear stones from a route. English requires
    an object; 'it' refers back to the highway and makes the command natural without
    changing the sense.
- source_word: הָרִימוּ נֵס
  chosen: Raise up a banner
  alternatives:
  - Lift up a signal
  - Raise a standard
  lexicon: HALOT
  rationale: נס denotes a signal pole, standard, or banner. 'Banner' is natural English
    and preserves the public, rallying function of the image.
- source_word: עַל הָעַמִּים
  chosen: over the peoples
  alternatives:
  - for the peoples
  - to the peoples
  - above the peoples
  lexicon: HALOT
  rationale: The preposition על most directly means 'over' or 'above.' The plural
    עמים is best kept as 'peoples,' indicating the nations collectively rather than
    a single people.
