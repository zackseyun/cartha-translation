id: ISA.62.9
reference: Isaiah 62:9
source:
  edition: WLC
  text: כִּ֤י מְאַסְפָי/ו֙ יֹאכְלֻ֔/הוּ וְ/הִֽלְל֖וּ אֶת יְהוָ֑ה וּֽ/מְקַבְּצָ֥י/ו
    יִשְׁתֻּ֖/הוּ בְּ/חַצְר֥וֹת קָדְשִֽׁ/י־׃ס
translation:
  text: But those who gather it will eat it and praise the LORD, and those who collect
    it will drink it in the courts of my sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For those who gather it will eat it.' The Hebrew כִּי can also be rendered
      'for' or 'indeed'; here it is taken adversatively in light of the contrast with
      the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the courtyards of my holy place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: But
  alternatives:
  - For
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces a contrast with the previous verse's threat that
    foreigners will not consume Israel's produce. In English, 'But' best captures
    the adversative force in context, though 'for' is possible more formally.
- source_word: מְאַסְפָיו
  chosen: those who gather it
  alternatives:
  - its gatherers
  - those who harvest it
  lexicon: HALOT
  rationale: The participle from אסף denotes those who gather in the produce. 'Those
    who gather it' is natural English while preserving the agentive sense. The 3ms
    suffix refers back to the grain/crop from the prior context.
- source_word: יֹאכְלֻהוּ
  chosen: will eat it
  alternatives:
  - shall eat it
  - will consume it
  lexicon: HALOT
  rationale: Straightforward future/imperfect sense. 'Eat it' is the plain sense and
    fits the agricultural context.
- source_word: וְהִלְלוּ אֶת־יְהוָה
  chosen: and praise the LORD
  alternatives:
  - and will praise the LORD
  lexicon: HALOT
  rationale: הלל in the piel commonly means 'praise.' Per doctrine, יְהוָה is rendered
    'the LORD.' The conjunction is retained.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    reverential convention and established English Bible practice.
- source_word: וּמְקַבְּצָיו
  chosen: those who collect it
  alternatives:
  - its gatherers
  - those who gather it in
  lexicon: HALOT
  rationale: From קבץ, parallel to אסף but with a slightly different gathering nuance.
    'Collect it' preserves the parallelism without awkward repetition, while the suffix
    again points to the produce, here especially the wine in context.
- source_word: יִשְׁתֻּהוּ
  chosen: will drink it
  alternatives:
  - shall drink it
  lexicon: HALOT
  rationale: From שתה, the ordinary verb 'drink.' The object suffix refers to the
    produce, contextually the wine mentioned in the previous verse.
- source_word: בְּחַצְרוֹת
  chosen: in the courts
  alternatives:
  - in the courtyards
  lexicon: HALOT
  rationale: חצרות denotes enclosed courts/courtyards. 'Courts' is idiomatic in sanctuary/temple
    settings and preserves the cultic setting.
- source_word: קָדְשִׁי
  chosen: my sanctuary
  alternatives:
  - my holiness
  - my holy place
  lexicon: HALOT
  rationale: With 'courts,' the noun קדש with 1cs suffix is best understood concretely
    as God's holy place/sanctuary rather than abstract 'holiness.' 'My sanctuary'
    gives clear English and fits temple imagery.
