theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic location in קָדְשִׁי
  chosen_reading: my sanctuary
  alternative_readings:
  - my holy place
  - my holiness
  rationale: The phrase 'in the courts of my sanctuary' preserves the temple-centered
    imagery without overinterpreting beyond the Hebrew. It indicates sacred space
    associated with the LORD, not an abstract attribute alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
