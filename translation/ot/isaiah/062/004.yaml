id: ISA.62.4
reference: Isaiah 62:4
source:
  edition: WLC
  text: לֹֽא יֵאָמֵר֩ לָ֨/ךְ ע֜וֹד עֲזוּבָ֗ה וּ/לְ/אַרְצֵ/ךְ֙ לֹא יֵאָמֵ֥ר עוֹד֙ שְׁמָמָ֔ה
    כִּ֣י לָ֗/ךְ יִקָּרֵא֙ חֶפְצִי בָ֔הּ וּ/לְ/אַרְצֵ֖/ךְ בְּעוּלָ֑ה כִּֽי חָפֵ֤ץ
    יְהוָה֙ בָּ֔/ךְ וְ/אַרְצֵ֖/ךְ תִּבָּעֵֽל־־־־׃
translation:
  text: No longer will you be called Forsaken, and your land will no longer be called
    Desolate; but you will be called My Delight Is in Her, and your land Married;
    for the LORD delights in you, and your land will be married.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: Hephzibah, meaning ''My Delight Is in Her.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: Beulah, meaning ''Married.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזוּבָה
  chosen: Forsaken
  alternatives:
  - Abandoned
  - Deserted
  lexicon: HALOT
  rationale: Used as a name/title in parallel with the other renamings in the verse,
    so capitalized in English. 'Forsaken' preserves the passive sense of being left
    behind without over-paraphrase.
- source_word: שְׁמָמָה
  chosen: Desolate
  alternatives:
  - Desolation
  - Wasteland
  lexicon: HALOT
  rationale: Chosen as a name/title matching the feminine singular predicate. 'Desolate'
    is idiomatic as a renaming and preserves the sense of devastation better than
    the more abstract 'Desolation' in this context.
- source_word: חֶפְצִי בָהּ
  chosen: My Delight Is in Her
  alternatives:
  - Hephzibah
  - My pleasure is in her
  lexicon: HALOT
  rationale: The Hebrew is a meaningful name phrase, not merely a sound to transliterate.
    Following the translation philosophy, titles/meaningful appellations are translated
    rather than transliterated. The traditional transliteration 'Hephzibah' is preserved
    in a footnote.
- source_word: בְּעוּלָה
  chosen: Married
  alternatives:
  - Espoused
  - Owned by a husband
  - Beulah
  lexicon: HALOT
  rationale: The term denotes being married/possessed by a husband. 'Married' is the
    clearest modern English rendering and fits the naming formula. The traditional
    form 'Beulah' is preserved in a footnote.
- source_word: חָפֵץ
  chosen: delights in
  alternatives:
  - takes pleasure in
  - desires
  lexicon: HALOT
  rationale: This verbal form explains the name 'My Delight Is in Her.' 'Delights
    in' preserves the semantic link with חֶפְצִי and reads naturally in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered according to the doctrinal default for the divine name.
- source_word: תִּבָּעֵל
  chosen: will be married
  alternatives:
  - will be espoused
  - will be possessed by a husband
  lexicon: HALOT
  rationale: Niphal of בעל here is best rendered as a marital passive, matching the
    preceding name בְּעוּלָה and the restoration metaphor. 'Will be married' is natural
    English and preserves the metaphor without importing sexualized wording.
- source_word: לָךְ / אַרצך
  chosen: you / your land
  lexicon: HALOT
  rationale: The verse distinguishes the womanified Zion ('you') from 'your land.'
    English preserves both referents to maintain the poetic parallelism and covenant-restoration
    imagery.
