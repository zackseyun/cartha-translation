theological_decisions:
- issue: Rendering the restoration names as translated meanings versus traditional
    transliterations
  chosen_reading: Translate the names as 'Forsaken,' 'Desolate,' 'My Delight Is in
    Her,' and 'Married' in the main text
  alternative_readings:
  - Use traditional transliterations such as Hephzibah and Beulah
  rationale: The names are semantically transparent in Hebrew and function rhetorically
    as declarative renamings. Per translation philosophy, meaningful titles are translated
    to preserve sense, while well-known traditional forms are preserved in footnotes.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names'
- issue: Marital metaphor for the land
  chosen_reading: Retain the marriage imagery directly
  alternative_readings:
  - Soften to a general statement of restoration or possession
  rationale: The Hebrew explicitly uses marital language for both the new name and
    the concluding verb. Preserving the metaphor maintains the theological tension
    and covenant-restoration imagery without flattening it into abstraction.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it'
