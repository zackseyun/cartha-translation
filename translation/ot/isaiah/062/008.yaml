theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Implicit negation in the oath formula אִם after נִשְׁבַּע
  chosen_reading: Explicitly render the oath as a strong negation ('I will never again give... nor will... drink')
  alternative_readings:
  - More literal 'If I give... if foreigners drink...' with the negation left implicit
  rationale: The Hebrew oath formula is idiomatic and would be misleading if translated woodenly. Making the negation explicit preserves the actual force of the oath without adding doctrinal content.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense over translation inertia'
