id: ISA.62.8
reference: Isaiah 62:8
source:
  edition: WLC
  text: נִשְׁבַּ֧ע יְהוָ֛ה בִּֽ/ימִינ֖/וֹ וּ/בִ/זְר֣וֹעַ עֻזּ֑/וֹ אִם אֶתֵּן֩ אֶת דְּגָנֵ֨/ךְ ע֤וֹד מַֽאֲכָל֙ לְ/אֹ֣יְבַ֔יִ/ךְ וְ/אִם יִשְׁתּ֤וּ בְנֵֽי נֵכָר֙ תִּֽירוֹשֵׁ֔/ךְ אֲשֶׁ֥ר יָגַ֖עַתְּ בּֽ/וֹ־־־־׃
translation:
  text: 'Yahweh has sworn by his right hand and by his strong arm: I will never again give your grain as food for your enemies, nor will foreigners drink your new wine for which you have labored.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''If I give your grain ... and if the sons of a foreign land drink your new wine ...''—an oath formula in which ''if'' expresses a strong negation: ''surely I will not.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty arm.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of a foreign land,' that is, foreigners.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving the covenantal title in line with the DOCTRINE.md contested terms table.
- source_word: נִשְׁבַּע
  chosen: has sworn
  alternatives:
  - swore
  - has taken an oath
  lexicon: HALOT
  rationale: The Niphal perfect denotes completed oath-taking; 'has sworn' is natural English and preserves the solemn covenantal force.
- source_word: בִּימִינוֹ
  chosen: by his right hand
  alternatives:
  - by his right hand side
  lexicon: HALOT
  rationale: A standard oath formula invoking one's own right hand as guarantee; 'by his right hand' is the plain and idiomatic rendering.
- source_word: וּבִזְרֹעַ עֻזּוֹ
  chosen: and by his strong arm
  alternatives:
  - and by the arm of his strength
  - and by his mighty arm
  lexicon: HALOT
  rationale: The phrase emphasizes power. 'Strong arm' is concise, idiomatic, and faithful to the Hebrew construct with עֹז ('strength'). 'Mighty arm' is possible, but 'strong' more directly reflects עֹז.
- source_word: אִם אֶתֵּן
  chosen: I will never again give
  alternatives:
  - surely I will not give again
  - if I give again
  lexicon: HALOT
  rationale: The oath particle אִם after a sworn statement functions elliptically as a strong negation ('surely not'). English requires the implied negation to be made explicit. 'Never again' also incorporates עוֹד.
- source_word: דְּגָנֵךְ
  chosen: your grain
  alternatives:
  - your corn
  - your cereal
  lexicon: HALOT
  rationale: '''Grain'' is the standard modern English equivalent for harvested cereal produce and avoids archaic or regionally misleading ''corn.'''
- source_word: עוֹד
  chosen: again
  alternatives:
  - any longer
  - still
  lexicon: HALOT
  rationale: In this oath context עוֹד marks cessation of a former condition; 'again' fits the promise that this will no longer recur. It is brought into English as part of 'never again.'
- source_word: מַאֲכָל
  chosen: as food
  alternatives:
  - for food
  - as something to eat
  lexicon: HALOT
  rationale: The noun denotes food/that which is eaten. 'As food' reads smoothly with 'give your grain' and preserves the predicative sense.
- source_word: לְאֹיְבַיִךְ
  chosen: for your enemies
  alternatives:
  - to your enemies
  lexicon: HALOT
  rationale: With נתן plus ל and מַאֲכָל, the sense is giving something over for the benefit/use of enemies; 'for your enemies' best fits the clause in English.
- source_word: וְאִם יִשְׁתּוּ
  chosen: nor will ... drink
  alternatives:
  - and if ... drink
  - surely ... will not drink
  lexicon: HALOT
  rationale: The second וְאִם continues the oath's negative force from the first clause. English idiom expresses this as 'nor will ...' rather than repeating a literal 'if.'
- source_word: בְנֵי נֵכָר
  chosen: foreigners
  alternatives:
  - sons of a foreign land
  - aliens
  - the children of foreigners
  lexicon: HALOT
  rationale: The expression refers to foreign people. 'Foreigners' is natural modern English and captures the collective sense without unnecessary literalism.
- source_word: תִּירוֹשֵׁךְ
  chosen: your new wine
  alternatives:
  - your wine
  - your fresh wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ specifically denotes fresh/new wine rather than wine generically; 'new wine' preserves the lexical distinction.
- source_word: אֲשֶׁר יָגַעַתְּ בּוֹ
  chosen: for which you have labored
  alternatives:
  - in which you have labored
  - which you worked for
  - for which you toiled
  lexicon: HALOT
  rationale: יגע ב conveys labor expended on or for something. 'For which you have labored' is idiomatic and clearly links the wine to Zion's own toil.
