theological_decisions:
- issue: Referent of the first-person speaker
  chosen_reading: Left implicit as in the Hebrew; no explicit identification inserted
    into the translation.
  alternative_readings:
  - The prophet speaks
  - The LORD speaks
  - A collective/watchman voice speaks
  rationale: The verse does not explicitly identify the speaker in its wording. To
    preserve theological tension and avoid importing an interpretive decision, the
    English keeps the first person without naming the speaker.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
