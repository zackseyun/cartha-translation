id: ISA.62.1
reference: Isaiah 62:1
source:
  edition: WLC
  text: לְמַ֤עַן צִיּוֹן֙ לֹ֣א אֶחֱשֶׁ֔ה וּ/לְמַ֥עַן יְרוּשָׁלִַ֖ם לֹ֣א אֶשְׁק֑וֹט
    עַד יֵצֵ֤א כַ/נֹּ֨גַהּ֙ צִדְקָ֔/הּ וִ/ישׁוּעָתָ֖/הּ כְּ/לַפִּ֥יד יִבְעָֽר־׃
translation:
  text: For Zion’s sake I will not keep silent, and for Jerusalem’s sake I will not
    be quiet, until her righteousness goes out like brightness and her salvation burns
    like a torch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not rest' for 'I will not be quiet.' The Hebrew verb can carry
      the sense of being quiet, still, or at rest.
    reason: lexical_alternative
  - marker: b
    text: Or 'her vindication' for 'her righteousness.' The Hebrew can denote righteousness
      in a moral/covenantal sense or public vindication.
    reason: lexical_alternative
  - marker: c
    text: The speaker is not explicitly identified in the verse; interpreters differ
      on whether this is the prophet, the LORD, or another representative voice.
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  chosen: for … sake
  alternatives:
  - for the sake of
  - because of
  lexicon: HALOT
  rationale: Introduces motivation/purpose. 'For Zion’s sake' is idiomatic modern
    English and preserves the rhetorical parallelism with Jerusalem.
- source_word: אֶחֱשֶׁה
  chosen: I will not keep silent
  alternatives:
  - I will not be silent
  - I will not hold my peace
  lexicon: HALOT
  rationale: From חשׁה, 'be silent/keep silent.' 'Keep silent' is natural English
    and preserves the volitional future sense.
- source_word: אֶשְׁק֑וֹט
  chosen: I will not be quiet
  alternatives:
  - I will not rest
  - I will not be still
  lexicon: HALOT
  rationale: From שׁקט, 'be quiet, be undisturbed, be at rest.' Here the parallel
    with 'keep silent' favors an expression of continued non-cessation in speech/action.
    'Be quiet' preserves the auditory/stative parallel better than 'rest,' which can
    suggest fatigue rather than public advocacy.
- source_word: עַד
  chosen: until
  lexicon: HALOT
  rationale: Standard temporal marker indicating persistence up to the stated outcome.
- source_word: יֵצֵא
  chosen: goes out
  alternatives:
  - comes forth
  - breaks forth
  lexicon: HALOT
  rationale: From יצא, 'go out/come out.' 'Goes out' is the most direct rendering;
    the simile 'like brightness' supplies the vividness without needing a more interpretive
    verb.
- source_word: כַנֹּגַהּ
  chosen: like brightness
  alternatives:
  - like dawn
  - like radiance
  - like shining light
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness/radiance. 'Brightness' is broad and faithful;
    'dawn' is possible in context but more specific than the Hebrew requires.
- source_word: צִדְקָהּ
  chosen: her righteousness
  alternatives:
  - her vindication
  - her justice
  lexicon: HALOT
  rationale: צדקה can denote righteousness or vindication in prophetic contexts. 'Righteousness'
    is the default and preserves the moral/covenantal sense, while the context of
    public manifestation allows the nuance of vindication to remain implicit.
- source_word: וִישׁוּעָתָהּ
  chosen: and her salvation
  alternatives:
  - and her deliverance
  - and her victory
  lexicon: HALOT
  rationale: ישועה commonly means salvation/deliverance. 'Salvation' best preserves
    the theological breadth of rescue and restoration.
- source_word: כְלַפִּיד
  chosen: like a torch
  alternatives:
  - like a flaming torch
  - like a lamp
  lexicon: HALOT
  rationale: לַפִּיד is a torch rather than a small lamp. 'Torch' keeps the image
    vivid and public.
- source_word: יִבְעָר
  chosen: burns
  alternatives:
  - blazes
  - burns brightly
  lexicon: HALOT
  rationale: From בער, 'burn.' 'Burns' is direct; 'blazes' is possible but slightly
    more interpretive in intensity.
