id: ISA.62.11
reference: Isaiah 62:11
source:
  edition: WLC
  text: הִנֵּ֣ה יְהוָ֗ה הִשְׁמִ֨יעַ֙ אֶל קְצֵ֣ה הָ/אָ֔רֶץ אִמְרוּ֙ לְ/בַת צִיּ֔וֹן
    הִנֵּ֥ה יִשְׁעֵ֖/ךְ בָּ֑א הִנֵּ֤ה שְׂכָר/וֹ֙ אִתּ֔/וֹ וּ/פְעֻלָּת֖/וֹ לְ/פָנָֽי/ו־־׃
translation:
  text: 'Behold, the LORD has proclaimed to the end of the earth: Say to Daughter
    Zion, “Behold, your salvation comes; behold, his reward is with him, and his recompense
    before him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your savior comes.” The Hebrew reads “your salvation,” but the following
      phrases use masculine pronouns (“his reward… his recompense”), which may personify
      salvation in the coming deliverer.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine default for the divine name YHWH: render as ''the LORD''
    rather than transliterating, following established reverential convention and
    the pattern reflected in ancient translation tradition.'
- source_word: הִשְׁמִיעַ
  chosen: has proclaimed
  alternatives:
  - has caused to be heard
  - has announced
  lexicon: HALOT
  rationale: The Hiphil of שׁמע means to cause something to be heard, hence 'announce/proclaim.'
    'Has proclaimed' gives natural English while preserving the public declarative
    force.
- source_word: אֶל קְצֵה הָאָרֶץ
  chosen: to the end of the earth
  alternatives:
  - to the ends of the earth
  - unto the end of the earth
  lexicon: HALOT
  rationale: The singular construct 'end of the earth' is retained rather than smoothing
    to the more idiomatic plural 'ends,' preserving the Hebrew form while remaining
    intelligible.
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Tell
  - Declare
  lexicon: HALOT
  rationale: A direct imperative introducing the quoted proclamation. 'Say' is the
    most straightforward equivalent.
- source_word: לְבַת צִיּוֹן
  chosen: to Daughter Zion
  alternatives:
  - to the daughter of Zion
  - to Zion's daughter
  lexicon: HALOT
  rationale: This preserves the personified city imagery in a recognizable biblical
    idiom. Capitalizing 'Daughter Zion' signals the poetic personification as a title-like
    expression.
- source_word: יִשְׁעֵךְ
  chosen: your salvation
  alternatives:
  - your deliverance
  - your savior
  lexicon: HALOT
  rationale: The noun from ישׁע can denote salvation/deliverance and in context may
    be personified by the following masculine suffixes ('his reward...his recompense').
    The main text keeps the lexical form 'salvation' while allowing the personified/messianic
    nuance to emerge from the context rather than importing 'savior' directly.
- source_word: בָּא
  chosen: comes
  alternatives:
  - is coming
  - has come
  lexicon: HALOT
  rationale: The perfect here functions in prophetic proclamation with present/future
    force. 'Comes' is concise, vivid, and natural in English prophetic style.
- source_word: שְׂכָרוֹ
  chosen: his reward
  alternatives:
  - his wages
  - his compensation
  lexicon: HALOT
  rationale: שָׂכָר commonly denotes reward or wages. 'Reward' fits the elevated prophetic
    context and matches the likely allusion echoed in later biblical texts.
- source_word: אִתּוֹ
  chosen: with him
  alternatives:
  - beside him
  lexicon: HALOT
  rationale: The preposition indicates accompaniment/association. 'With him' is the
    plain sense.
- source_word: וּפְעֻלָּתוֹ
  chosen: and his recompense
  alternatives:
  - and his work
  - and his payment
  - and his reward
  lexicon: HALOT
  rationale: In this context פְּעֻלָּה refers not merely to work done but to the resulting
    payment/recompense. 'Recompense' distinguishes it from the preceding 'reward'
    while preserving the semantic field of due return.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - ahead of him
  - in front of him
  lexicon: HALOT
  rationale: The phrase is spatially metaphorical and commonly rendered 'before him.'
    This preserves the formal parallelism with 'with him.'
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Repeated three times in the verse, הִנֵּה marks emphatic attention. 'Behold'
    preserves the prophetic and poetic force better than the more casual 'look' or
    'see.'
