theological_decisions:
- issue: Whether יִשְׁעֵךְ should be rendered impersonally ('your salvation') or personally
    ('your savior') in light of the following masculine pronouns
  chosen_reading: your salvation
  alternative_readings:
  - your savior
  rationale: The Hebrew form is a noun with second feminine singular suffix, literally
    'your salvation.' The following masculine suffixes likely personify salvation
    in the coming deliverer, and Christian readers may rightly hear messianic resonance.
    However, optimal equivalence and original-language primacy favor retaining the
    lexical noun in the main text and preserving the personal alternative in a footnote
    rather than resolving the ambiguity interpretively.
  doctrine_reference: Translation philosophy §1, §3
