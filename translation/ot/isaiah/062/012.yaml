id: ISA.62.12
reference: Isaiah 62:12
source:
  edition: WLC
  text: וְ/קָרְא֥וּ לָ/הֶ֛ם עַם הַ/קֹּ֖דֶשׁ גְּאוּלֵ֣י יְהוָ֑ה וְ/לָ/ךְ֙ יִקָּרֵ֣א דְרוּשָׁ֔ה עִ֖יר לֹ֥א נֶעֱזָֽבָה־׃ס
translation:
  text: And they will call them, “The holy people, the redeemed of Yahweh”; and you will be called, “Sought Out, a city not forsaken.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD’s redeemed” or “those redeemed by the LORD.”
    reason: lexical_alternative
  - marker: b
    text: “Sought Out” may also be rendered “Sought After” or “Inquired For.”
    reason: lexical_alternative
  - marker: c
    text: Or “a city not abandoned.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרְאוּ
  chosen: And they will call
  alternatives:
  - And they shall call
  - And one will call
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly carries future sense in English. An indefinite plural subject is best rendered simply as 'they' rather than forcing a passive.
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: The preposition ל with קרא in naming formulas marks the person named; idiomatic English uses direct object 'call them' rather than the more wooden 'call to them'.
- source_word: עַם הַקֹּדֶשׁ
  chosen: The holy people
  alternatives:
  - the holy nation
  - a holy people
  lexicon: HALOT
  rationale: 'עם is ''people'' here, not specifically ''nation.'' The article on both elements supports a definite title: ''the holy people.'''
- source_word: גְּאוּלֵי יְהוָה
  chosen: the redeemed of the LORD
  alternatives:
  - those redeemed by the LORD
  - the LORD's redeemed
  lexicon: HALOT
  rationale: The passive/resultative sense of the participial form is naturally conveyed by 'the redeemed.' The construct with the divine name is rendered possessively/genitively in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving reverential convention and broad English Bible recognizability.
- source_word: וְלָךְ
  chosen: and you
  alternatives:
  - and to you
  - but you
  lexicon: HALOT
  rationale: 'The preposition marks the addressee in the naming formula. English idiom brings this forward as the subject of the passive: ''you will be called.'' The feminine singular refers to Zion/Jerusalem personified.'
- source_word: יִקָּרֵא
  chosen: will be called
  alternatives:
  - will be named
  lexicon: HALOT
  rationale: Niphal imperfect is naturally passive here in a naming formula. 'Called' preserves the lexical link with the first clause.
- source_word: דְרוּשָׁה
  chosen: Sought Out
  alternatives:
  - Sought After
  - Inquired For
  lexicon: HALOT
  rationale: From דרשׁ, 'seek, inquire after.' As a new honorific name for the city, capitalization signals titular use. 'Sought Out' fits the restoration context and avoids over-interpretation.
- source_word: עִיר לֹא נֶעֱזָבָה
  chosen: a city not forsaken
  alternatives:
  - the city not forsaken
  - a city not abandoned
  lexicon: HALOT
  rationale: Appositional phrase further describing the renamed city. 'Forsaken' preserves the lexical and thematic contrast with Zion's former desolation language in Isaiah; 'a city' is smoother than repeating a proper name not present in the clause.
- source_word: נֶעֱזָבָה
  chosen: forsaken
  alternatives:
  - abandoned
  - deserted
  lexicon: HALOT
  rationale: '''Forsaken'' is the most contextually resonant rendering in Isaiah''s restoration-oracle vocabulary, echoing earlier naming reversals without becoming archaic in this context.'
