id: ISA.62.6
reference: Isaiah 62:6
source:
  edition: WLC
  text: עַל חוֹמֹתַ֣יִ/ךְ יְרוּשָׁלִַ֗ם הִפְקַ֨דְתִּי֙ שֹֽׁמְרִ֔ים כָּל הַ/יּ֧וֹם וְ/כָל הַ/לַּ֛יְלָה תָּמִ֖יד לֹ֣א יֶחֱשׁ֑וּ הַ/מַּזְכִּרִים֙ אֶת יְהוָ֔ה אַל דֳּמִ֖י לָ/כֶֽם־־־־־׃
translation:
  text: On your walls, Jerusalem, I have appointed watchmen; all day and all night, continually, they will never be silent. You who remind Yahweh, take no rest for yourselves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you who call on the LORD' or 'you who put the LORD in remembrance.' The Hebrew expression is unusually vivid, portraying persistent appeal to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: חוֹמֹתַיִךְ
  chosen: your walls
  alternatives:
  - your ramparts
  lexicon: HALOT
  rationale: חוֹמָה denotes a city wall/fortification. 'Walls' is the most natural English rendering and fits the direct address to Jerusalem.
- source_word: הִפְקַדְתִּי
  chosen: I have appointed
  alternatives:
  - I have set
  - I have posted
  lexicon: HALOT
  rationale: From פקד in the Hiphil, here meaning to appoint, assign, or station. 'I have appointed' captures deliberate commissioning; 'posted' is possible in context but narrower.
- source_word: שֹׁמְרִים
  chosen: watchmen
  alternatives:
  - guards
  - sentinels
  lexicon: HALOT
  rationale: From שמר, those who keep watch. 'Watchmen' preserves the traditional and contextually apt image of persons stationed on city walls.
- source_word: כָּל הַיּוֹם וְכָל הַלַּיְלָה תָּמִיד
  chosen: all day and all night, continually
  alternatives:
  - all day and all night, continually without cease
  lexicon: HALOT
  rationale: The sequence intensifies uninterrupted duration. Rendering all three elements preserves the Hebrew emphasis without over-paraphrase.
- source_word: יֶחֱשׁוּ
  chosen: they will never be silent
  alternatives:
  - they will not keep silent
  - they will never be quiet
  lexicon: HALOT
  rationale: From חשה, to be silent/quiet. 'Will never be silent' is idiomatic and reflects the negated imperfect's ongoing force in context.
- source_word: הַמַּזְכִּרִים אֶת־יְהוָה
  chosen: You who remind the LORD
  alternatives:
  - you who call on the LORD
  - you who put the LORD in remembrance
  lexicon: HALOT
  rationale: The participle from זכר in Hiphil literally refers to causing remembrance or making mention. In this context of intercessory persistence, 'remind the LORD' best preserves the striking Hebrew imagery while remaining intelligible. Alternatives are worth preserving because some English traditions soften the expression to 'call on' or 'make mention of'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַל דֳּמִי לָכֶם
  chosen: take no rest for yourselves
  alternatives:
  - give yourselves no rest
  - do not be silent
  lexicon: HALOT
  rationale: דֳּמִי denotes silence or stillness/rest. With אַל and לָכֶם, the sense is an exhortation that those addressing the LORD are not to become quiet or inactive. 'Take no rest for yourselves' communicates the idiom naturally in English while preserving the call to unceasing intercession.
