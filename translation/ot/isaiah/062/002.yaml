theological_decisions:
- issue: Rendering of Zion's public restoration term צִדְקֵךְ
  chosen_reading: your righteousness
  alternative_readings:
  - your vindication
  - your justice
  rationale: The verse speaks of the nations observing Zion's restored standing. 'Righteousness' keeps the Hebrew term's broader theological resonance and avoids narrowing the sense exclusively to forensic vindication or social justice, while still fitting the context of public restoration.
  doctrine_reference: Translation philosophy §5; Contested terms table notes righteousness/justice tension for δικαιοσύνη, supporting preservation of lexical-theological breadth where analogous.
- issue: Divine naming formula
  chosen_reading: you will be called by a new name that the mouth of the LORD will designate
  alternative_readings:
  - he will call you a new name which the mouth of the LORD will name
  rationale: The Hebrew combines a singular active verb with a relative clause identifying the LORD's mouth as the source of the name. The chosen English smooths the syntax without obscuring that the new identity is divinely bestowed.
  doctrine_reference: Translation philosophy §1 and §6
