id: ISA.62.2
reference: Isaiah 62:2
source:
  edition: WLC
  text: וְ/רָא֤וּ גוֹיִם֙ צִדְקֵ֔/ךְ וְ/כָל מְלָכִ֖ים כְּבוֹדֵ֑/ךְ וְ/קֹ֤רָא לָ/ךְ֙ שֵׁ֣ם חָדָ֔שׁ אֲשֶׁ֛ר פִּ֥י יְהוָ֖ה יִקֳּבֶֽ/נּוּ־׃
translation:
  text: Nations will see your righteousness, and all kings your glory; and you will be called by a new name that the mouth of Yahweh will designate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your vindication' or 'your justice' for 'your righteousness.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''that the mouth of the LORD will designate it,'' with ''it'' referring to the new name.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאוּ
  chosen: will see
  alternatives:
  - shall see
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse is naturally rendered as a future in English. 'Will see' is clear modern English and preserves the predictive force.
- source_word: גוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In Isaiah, גוים commonly refers to the nations broadly, not specifically 'Gentiles' in contrast to Jews. 'Nations' best fits the international scope of the verse.
- source_word: צִדְקֵךְ
  chosen: your righteousness
  alternatives:
  - your vindication
  - your justice
  lexicon: HALOT
  rationale: The noun צדק can denote righteousness, justice, or vindication depending on context. Here Zion's restored standing before the nations is in view, so 'vindication' is contextually possible; however, 'righteousness' preserves the lexical form and theological breadth while allowing the public-restoration sense to remain implicit.
- source_word: וְכָל מְלָכִים
  chosen: and all kings
  alternatives:
  - and every king
  lexicon: HALOT
  rationale: A straightforward rendering of the distributive collective phrase. 'All kings' is idiomatic and preserves the parallel with 'nations'.
- source_word: כְּבוֹדֵךְ
  chosen: your glory
  alternatives:
  - your honor
  - your splendor
  lexicon: HALOT
  rationale: כבוד often carries the sense of glory, honor, or splendor. 'Glory' best matches Isaiah's theological diction and the public manifestation of Zion's restored status.
- source_word: וְקֹרָא לָךְ
  chosen: and you will be called
  alternatives:
  - and one will call you
  - and he will call you
  lexicon: HALOT
  rationale: Although the verb is formally 3ms singular ('and he will call'), English idiom in this naming construction is best expressed with the passive, especially since the following relative clause identifies the ultimate namer as the LORD. This avoids an awkward shift while preserving the sense.
- source_word: שֵׁם חָדָשׁ
  chosen: a new name
  alternatives:
  - new name
  lexicon: HALOT
  rationale: Indefinite article is natural in English. The phrase signals a newly bestowed identity/status rather than merely a different label.
- source_word: אֲשֶׁר פִּי יְהוָה
  chosen: that the mouth of the LORD
  alternatives:
  - which the LORD's mouth
  - that the LORD himself
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the mouth of YHWH.' Retaining 'mouth' preserves the anthropomorphic expression and emphasizes divine speech as the source of the naming. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving reverential convention and consistency with the LXX-influenced English tradition.
- source_word: יִקֳּבֶנּוּ
  chosen: will designate
  alternatives:
  - will name it
  - will pronounce it
  - will specify it
  lexicon: HALOT
  rationale: From נקב in the sense of specifying or naming. Because the object suffix is masculine singular referring back to 'name,' a very literal rendering would be 'will name it,' but in English that sounds redundant after 'you will be called by a new name.' 'Will designate' preserves the act of divinely assigning the name while reading naturally.
