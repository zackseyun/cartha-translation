id: ISA.62.5
reference: Isaiah 62:5
source:
  edition: WLC
  text: כִּֽי יִבְעַ֤ל בָּחוּר֙ בְּתוּלָ֔ה יִבְעָל֖וּ/ךְ בָּנָ֑יִ/ךְ וּ/מְשׂ֤וֹשׂ
    חָתָן֙ עַל כַּלָּ֔ה יָשִׂ֥ישׂ עָלַ֖יִ/ךְ אֱלֹהָֽיִ/ךְ־־׃
translation:
  text: For as a young man marries a virgin, so your sons will marry you; and as a
    bridegroom rejoices over a bride, so your God will rejoice over you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following an alternate reading reflected by some ancient versions and
      many interpreters, 'so your builder(s) will marry you.' The Hebrew Masoretic
      Text reads 'your sons.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִבְעַל
  chosen: marries
  alternatives:
  - takes possession of
  - has marital relations with
  lexicon: HALOT
  rationale: The verb בעל literally relates to being lord/master over, but in this
    idiom with man and virgin it denotes entering marriage. 'Marries' communicates
    the plain sense in natural English without importing crude or misleading overtones.
- source_word: בָּחוּר
  chosen: young man
  alternatives:
  - young warrior
  - choice young man
  lexicon: HALOT
  rationale: In context the term refers to a marriageable young man, not specifically
    to military status. 'Young man' is the clearest contextual rendering.
- source_word: בְּתוּלָה
  chosen: virgin
  alternatives:
  - maiden
  - young woman
  lexicon: HALOT
  rationale: The noun commonly denotes a virgin/maiden; in a marriage simile, 'virgin'
    preserves the lexical specificity better than the broader 'young woman'.
- source_word: יִבְעָלוּךְ
  chosen: will marry you
  alternatives:
  - will possess you
  - will be your husband
  lexicon: HALOT
  rationale: The same verb as earlier in the verse is best rendered consistently as
    marriage language. The 2fs suffix addresses Zion/Jerusalem personified as a woman.
    'Will marry you' is idiomatic and preserves the metaphor.
- source_word: בָּנָיִךְ
  chosen: your sons
  alternatives:
  - your builders
  lexicon: HALOT
  rationale: The consonantal text can be read 'your sons,' while some ancient versions
    and many interpreters prefer 'your builder'/'your builders' to avoid the awkward
    image of sons marrying their mother-city. The MT points to 'your sons,' and the
    translation preserves the received Hebrew while noting the alternative in a footnote.
- source_word: מְשׂוֹשׂ
  chosen: rejoices
  alternatives:
  - joy
  - gladness
  lexicon: HALOT
  rationale: Though formally a noun ('joy/rejoicing') in construct with 'bridegroom,'
    the phrase functions adverbially/comparatively in the simile. Rendering the clause
    with the cognate verb 'rejoices' produces clear English while preserving the sense.
- source_word: חָתָן
  chosen: bridegroom
  alternatives:
  - groom
  lexicon: HALOT
  rationale: '''Bridegroom'' is slightly more formal but matches the elevated poetic
    register and pairs naturally with ''bride.'''
- source_word: כַּלָּה
  chosen: bride
  alternatives:
  - newly married woman
  lexicon: HALOT
  rationale: Standard and contextually exact marriage term.
- source_word: יָשִׂישׂ
  chosen: will rejoice
  alternatives:
  - will exult
  - will be glad
  lexicon: HALOT
  rationale: The verb denotes joyful exultation. 'Will rejoice' is natural, sufficiently
    strong, and aligns with the preceding simile.
- source_word: אֱלֹהָיִךְ
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים with singular reference
    is the standard designation for Israel's God. The singular sense is demanded by
    context and theology of Isaiah.
- source_word: כִּי
  chosen: For as ... so ...
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory comparison. 'For as ... so ...' captures
    the poetic logic better than a bare 'because'.
