theological_decisions:
- issue: Whether to render בָּנָיִךְ literally as 'your sons' or adopt the widely
    proposed emendation/alternate reading 'your builder(s)'
  chosen_reading: your sons
  alternative_readings:
  - your builder
  - your builders
  rationale: 'The Masoretic pointing reads ''your sons,'' and optimal equivalence
    gives priority to the received Hebrew text unless a variant is compelling. The
    metaphor is unusual but intelligible in prophetic personification: Zion''s inhabitants
    are so identified with her restoration that they are described as marrying her.
    Because the alternative has substantial interpretive history and removes the metaphorical
    difficulty, it is preserved in a footnote rather than adopted in the main text.'
  doctrine_reference: Translation philosophy §1, §3, §5
