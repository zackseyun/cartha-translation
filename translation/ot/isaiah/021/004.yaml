id: ISA.21.4
reference: Isaiah 21:4
source:
  edition: WLC
  text: תָּעָ֣ה לְבָבִ֔/י פַּלָּצ֖וּת בִּֽעֲתָ֑תְ/נִי אֵ֚ת נֶ֣שֶׁף חִשְׁקִ֔/י שָׂ֥ם
    לִ֖/י לַ/חֲרָדָֽה׃
translation:
  text: My heart reels; shuddering terrifies me. The twilight I longed for he has
    turned into terror for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The evening twilight I desired he has made into trembling/terror for
      me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּעָה
  chosen: reels
  alternatives:
  - wanders
  - staggers
  - goes astray
  lexicon: HALOT
  rationale: The verb literally denotes wandering/straying, but in this context with
    'my heart' it conveys inner disorientation or reeling. 'Reels' captures the disturbed,
    unstable state in idiomatic modern English without over-paraphrasing.
- source_word: לְבָבִי
  chosen: my heart
  alternatives:
  - my mind
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering for לֵבָב and preserves the Hebrew
    anthropology of the inner person rather than reducing it to mere intellect.'
- source_word: פַּלָּצוּת
  chosen: trembling
  alternatives:
  - shuddering
  - horror
  lexicon: HALOT
  rationale: The noun denotes a state of violent trembling or shuddering. 'Trembling'
    fits the parallelism with the following verb and keeps the physical-emotional
    force.
- source_word: בִּעֲתַתְנִי
  chosen: terrifies me
  alternatives:
  - has frightened me
  - has overwhelmed me with terror
  lexicon: HALOT
  rationale: From בעת, 'to terrify, startle.' Present English 'terrifies me' communicates
    the force well; the Hebrew perfect can describe the vivid present effect of the
    vision.
- source_word: נֶשֶׁף
  chosen: twilight
  alternatives:
  - dusk
  - evening
  lexicon: HALOT
  rationale: נֶשֶׁף refers to the dim light of twilight, often evening twilight. 'Twilight'
    is slightly broader and preserves the poetic atmosphere.
- source_word: חִשְׁקִי
  chosen: I longed for
  alternatives:
  - my desire
  - my pleasure
  lexicon: HALOT
  rationale: 'The noun with first-person suffix means ''my desire/longing.'' Rendering
    it verbally in English produces natural syntax: ''the twilight I longed for.'''
- source_word: שָׂם לִי
  chosen: he has made ... to me
  alternatives:
  - he set ... for me
  - it became to me
  lexicon: HALOT
  rationale: The subject is most naturally implicit and indefinite or understood from
    context; English requires an explicit subject, and 'he has made' reflects the
    active Hebrew verb while preserving the ambiguity of agency better than a passive.
- source_word: לַחֲרָדָה
  chosen: a horror
  alternatives:
  - terror
  - trembling
  lexicon: HALOT
  rationale: Though the noun can denote trembling or terror, here it expresses the
    dreadful reversal of the desired twilight. 'A horror' gives a strong, idiomatic
    resultative sense in English.
