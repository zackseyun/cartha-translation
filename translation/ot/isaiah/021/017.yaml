id: ISA.21.17
reference: Isaiah 21:17
source:
  edition: WLC
  text: וּ/שְׁאָ֧ר מִסְפַּר קֶ֛שֶׁת גִּבּוֹרֵ֥י בְנֵֽי קֵדָ֖ר יִמְעָ֑טוּ כִּ֛י יְהוָ֥ה אֱלֹהֵֽי יִשְׂרָאֵ֖ל דִּבֵּֽר־־־׃ס
translation:
  text: And the remainder of the number of the bowmen, the mighty men of the sons of Kedar, will be few, for Yahweh, the God of Israel, has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the archers'; literally 'the bow,' used metonymically for bowmen.
    reason: lexical_alternative
  - marker: b
    text: Or 'the remnant of the number of the mighty bowmen of the sons of Kedar will diminish.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁאָר
  chosen: And the remainder
  alternatives:
  - And the remnant
  - And what is left
  lexicon: HALOT
  rationale: שְׁאָר denotes what remains. 'Remainder' fits the quantitative sense in context, while 'remnant' can carry theological overtones not required here.
- source_word: מִסְפַּר
  chosen: of the number
  alternatives:
  - of the count
  - of the few in number
  lexicon: HALOT
  rationale: The construct with שְׁאָר is awkwardly literal in Hebrew; 'the remainder of the number' preserves the quantitative emphasis without over-paraphrasing.
- source_word: קֶשֶׁת
  chosen: the bowmen
  alternatives:
  - the archers
  - the bow
  lexicon: HALOT
  rationale: Literally 'bow,' but in context with warriors it functions metonymically for those who bear the bow. 'Bowmen' preserves the martial image and stays close to the Hebrew.
- source_word: גִּבּוֹרֵי
  chosen: the mighty men
  alternatives:
  - the warriors
  - the strong men
  lexicon: HALOT
  rationale: גִּבּוֹרִים commonly refers to mighty warriors. 'Mighty men' is a close rendering; the military sense is clarified by the surrounding phrase.
- source_word: בְנֵי קֵדָר
  chosen: of the sons of Kedar
  alternatives:
  - of the people of Kedar
  - of Kedar's sons
  lexicon: HALOT
  rationale: A formal rendering preserves the Hebrew kinship idiom and ethnic designation. 'Sons of Kedar' is natural enough in English biblical style and avoids flattening the expression.
- source_word: יִמְעָטוּ
  chosen: will be few
  alternatives:
  - will diminish
  - will become few
  lexicon: HALOT
  rationale: The verb means to become small or few. 'Will be few' is idiomatic English and captures the result rather than forcing a more wooden verbal form.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; it identifies YHWH covenantally without adding interpretation.
- source_word: דִּבֵּר
  chosen: has spoken
  alternatives:
  - has said
  - spoke
  lexicon: HALOT
  rationale: The perfect here grounds the certainty of the oracle. 'Has spoken' is a natural prophetic closure in English and preserves that force.
