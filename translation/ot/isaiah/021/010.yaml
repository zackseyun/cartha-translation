  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Degree of metaphor preservation in the threshing imagery
  chosen_reading: Preserve the agricultural metaphor in the main text
  alternative_readings:
  - Interpret the phrase as 'my oppressed people' or similar
  rationale: The Hebrew uses vivid threshing imagery. Optimal equivalence here favors retaining the metaphor rather than resolving it into an abstract interpretation, allowing readers to feel the prophetic force and preserving auditable lexical correspondence.
