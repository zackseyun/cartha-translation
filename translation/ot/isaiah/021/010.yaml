id: ISA.21.10
reference: Isaiah 21:10
source:
  edition: WLC
  text: מְדֻשָׁתִ֖/י וּ/בֶן גָּרְנִ֑/י אֲשֶׁ֣ר שָׁמַ֗עְתִּי מֵ/אֵ֨ת יְהוָ֧ה צְבָא֛וֹת אֱלֹהֵ֥י יִשְׂרָאֵ֖ל הִגַּ֥דְתִּי לָ/כֶֽם־׃ס
translation:
  text: O my threshed one, and son of my threshing floor, what I have heard from Yahweh of hosts, the God of Israel, I have declared to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my crushed one' or 'my trampled one'; the Hebrew keeps the image of threshing as a metaphor for severe affliction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'son of my threshing floor,' a metaphor linked to the threshing image and likely addressing a people who have been beaten down or processed like grain.
    reason: cultural_note
lexical_decisions:
- source_word: מְדֻשָׁתִי
  chosen: my threshed one
  alternatives:
  - my crushed one
  - my trampled one
  lexicon: HALOT
  rationale: Passive participial/noun form from the root דושׁ, referring to one who has been threshed. The metaphor likely addresses a people afflicted or beaten down. 'My threshed one' preserves the agricultural image more directly than interpretive renderings like 'my crushed one.'
- source_word: וּבֶן גָּרְנִי
  chosen: and son of my threshing floor
  alternatives:
  - and child of my threshing floor
  - even grain of my threshing floor
  lexicon: HALOT
  rationale: בֵּן literally means 'son,' and גֹּרֶן is 'threshing floor.' The phrase is metaphorical and closely linked to the threshing image. 'Son of my threshing floor' keeps the Hebrew imagery and parallelism, while avoiding over-interpretation.
- source_word: אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  lexicon: HALOT
  rationale: Introduces the content of what was heard. 'What' is idiomatic modern English and accurately conveys the relative pronoun's function here.
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect can be rendered as simple past or present perfect in English. 'I have heard' fits the prophetic reporting context, linking the hearing to the present declaration.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  lexicon: HALOT
  rationale: Standard source marker indicating the message's origin. 'From' is sufficient and natural in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and suitably broad rendering, encompassing heavenly armies without narrowing the sense unnecessarily.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's God; no expansion is warranted.
- source_word: הִגַּדְתִּי
  chosen: I have declared
  alternatives:
  - I declared
  - I have told
  lexicon: HALOT
  rationale: Hiphil of נגד conveys making known or declaring. 'Declared' preserves the prophetic, formal register better than 'told.'
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - to you all
  lexicon: HALOT
  rationale: Second person masculine plural. English 'you' can represent the plural naturally; the plural nuance is not critical enough to force a marked rendering in the main text.
