id: ISA.16.10
reference: Isaiah 16:10
source:
  edition: WLC
  text: וְ/נֶאֱסַ֨ף שִׂמְחָ֤ה וָ/גִיל֙ מִן הַ/כַּרְמֶ֔ל וּ/בַ/כְּרָמִ֥ים לֹֽא יְרֻנָּ֖ן
    לֹ֣א יְרֹעָ֑ע יַ֗יִן בַּ/יְקָבִ֛ים לֹֽא יִדְרֹ֥ךְ הַ/דֹּרֵ֖ךְ הֵידָ֥ד הִשְׁבַּֽתִּי־־־׃
translation:
  text: Joy and gladness are taken away from the fruitful field, and in the vineyards
    no one sings for joy, no one shouts; no treader treads out wine in the presses;
    I have put an end to the vintage shout.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Carmel,' taking כַּרְמֶל as the place name rather than 'the fruitful
      field.'
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the vintage shout' or 'harvest shout,' the cry associated with grape
      treading.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱסַף
  chosen: are taken away
  alternatives:
  - is gathered
  - is removed
  lexicon: HALOT
  rationale: Niphal of אסף here functions idiomatically for something being removed
    or withdrawn rather than literally gathered. Plural English verb matches the compound
    subject 'joy and gladness.'
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - mirth
  lexicon: HALOT
  rationale: Common term for joy/rejoicing; rendered distinctly from גיל to preserve
    the paired expression.
- source_word: גִיל
  chosen: gladness
  alternatives:
  - rejoicing
  - exultation
  lexicon: HALOT
  rationale: Chosen to differentiate from שִׂמְחָה while keeping the semantic overlap
    of the poetic pair.
- source_word: כַּרְמֶל
  chosen: the fruitful field
  alternatives:
  - the orchard land
  - the garden land
  - Carmel
  lexicon: HALOT
  rationale: In this context the common noun sense 'fertile land/fruitful field' fits
    the agricultural parallel with vineyards better than the proper name Carmel. This
    follows source-context rather than traditional capitalization.
- source_word: כְּרָמִים
  chosen: the vineyards
  alternatives:
  - vineyards
  lexicon: HALOT
  rationale: Straightforward agricultural term; article reflected naturally in English.
- source_word: יְרֻנָּן
  chosen: sings for joy
  alternatives:
  - gives a ringing cry
  - shouts jubilantly
  lexicon: HALOT
  rationale: Pual/Polel nuance from רנן conveys jubilant singing or ringing cries.
    'Sings for joy' is idiomatic and suits the vineyard-harvest setting.
- source_word: יְרֹעָע
  chosen: shouts
  alternatives:
  - raises a cry
  - gives a battle cry
  lexicon: HALOT
  rationale: From רועע/רוע, a loud cry or shout. In parallel with the previous verb,
    it denotes festive shouting rather than speech.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: יְקָבִים
  chosen: the presses
  alternatives:
  - winepresses
  - vats
  lexicon: HALOT
  rationale: Refers to wine vats/presses. 'Presses' is concise and clear in context
    with 'wine.'
- source_word: יִדְרֹךְ הַדֹּרֵךְ
  chosen: no treader treads out
  alternatives:
  - the one who treads will not tread
  - no one will tread
  lexicon: HALOT
  rationale: The finite verb plus participle intensifies the action. English preserves
    the emphatic repetition with 'treader treads out' while remaining readable.
- source_word: הֵידָד
  chosen: the vintage shout
  alternatives:
  - the harvest shout
  - the treading cry
  lexicon: HALOT
  rationale: Refers to the loud cry associated with grape harvest/treading. 'Vintage
    shout' captures the agricultural setting and avoids implying joy in every context.
- source_word: הִשְׁבַּתִּי
  chosen: I have put an end to
  alternatives:
  - I have stopped
  - I have silenced
  - I have made cease
  lexicon: HALOT
  rationale: Hiphil of שבת means to cause to cease. 'I have put an end to' is natural
    English and preserves the causative force, with the implied speaker being the
    LORD from context.
