id: ISA.16.4
reference: Isaiah 16:4
source:
  edition: WLC
  text: יָג֤וּרוּ בָ/ךְ֙ נִדָּחַ֔/י מוֹאָ֛ב הֱוִי סֵ֥תֶר לָ֖/מוֹ מִ/פְּנֵ֣י שׁוֹדֵ֑ד
    כִּֽי אָפֵ֤ס הַ/מֵּץ֙ כָּ֣לָה שֹׁ֔ד תַּ֥מּוּ רֹמֵ֖ס מִן הָ/אָֽרֶץ־־־׃
translation:
  text: Let the outcasts of Moab stay with you; be a shelter for them from the destroyer.
    For the oppressor has come to an end, destruction has ceased, those who trample
    have vanished from the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, following another common construal: ''Let my outcasts dwell with you,
      O Moab; be a shelter to him from the destroyer.'' This reflects a different
      vocalization/division of the opening words.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָגוּרוּ בָךְ
  chosen: stay with you
  alternatives:
  - sojourn in you
  - dwell with you
  - take refuge with you
  lexicon: HALOT
  rationale: גור commonly denotes residing as a sojourner or seeking temporary shelter.
    In this appeal context, 'stay with you' is natural modern English and preserves
    the sense of taking up protected residence without over-paraphrasing.
- source_word: נִדָּחַי מוֹאָב
  chosen: the outcasts of Moab
  alternatives:
  - Moab's fugitives
  - the dispersed of Moab
  lexicon: HALOT
  rationale: נדח conveys those driven away, banished, or scattered. 'Outcasts' fits
    the exile/refugee setting and keeps the passive sense better than the more active
    'fugitives,' though that remains a viable alternative.
- source_word: הֱוִי סֵתֶר
  chosen: be a shelter
  alternatives:
  - be a hiding place
  - be a refuge
  lexicon: HALOT
  rationale: סתר as a noun denotes hiding place, covering, or shelter. 'Shelter' is
    idiomatic and accessible while retaining the protective imagery. 'Refuge' is possible
    but slightly more interpretive and overlaps with broader theological diction not
    explicit here.
- source_word: מִפְּנֵי שׁוֹדֵד
  chosen: from the destroyer
  alternatives:
  - from the plunderer
  - from the devastator
  - from the spoiler
  lexicon: HALOT
  rationale: שׁודד is an active participle from the root for despoiling/devastating.
    'Destroyer' captures the violent threat in clear English; 'plunderer' is more
    narrowly economic, while the context suggests broader devastation.
- source_word: אָפֵס
  chosen: has come to an end
  alternatives:
  - is no more
  - has vanished
  - has ceased
  lexicon: HALOT
  rationale: אפס denotes coming to nothing or ceasing to exist. 'Has come to an end'
    is a natural English rendering that preserves the completed aspect.
- source_word: הַמֵּץ
  chosen: the oppressor
  alternatives:
  - the extortioner
  - the crusher
  lexicon: HALOT
  rationale: The noun is difficult and variously understood, often as oppressor/extortioner.
    In parallel with destroyer, destruction, and tramplers, 'oppressor' best fits
    the semantic field and major translation consensus without being overly narrow.
- source_word: כָּלָה שֹׁד
  chosen: destruction has ceased
  alternatives:
  - the devastation is finished
  - plundering is ended
  lexicon: HALOT
  rationale: שׁד/שֹׁד denotes violence, devastation, or plunder. Rendering the clause
    as 'destruction has ceased' gives a smooth English parallel to the surrounding
    perfects and matches the broader context of violent ruin.
- source_word: תַּמּוּ רֹמֵס
  chosen: those who trample have vanished
  alternatives:
  - the trampler has come to an end
  - those who tread down are gone
  lexicon: HALOT
  rationale: The verb is plural ('have come to an end'), while רמס can function collectively.
    Rendering with a plural subject in English reflects the Hebrew verbal number and
    avoids forcing a singular collective.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - from the earth
  lexicon: HALOT
  rationale: ארץ can mean land or earth. In an oracle concerning Moab and regional
    political threat, 'land' is the more contextually grounded choice.
