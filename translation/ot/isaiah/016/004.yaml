theological_decisions:
- issue: Addressee and syntax of the opening appeal
  chosen_reading: The verse addresses a feminine singular figure/location ('you')
    and petitions her to receive Moab's outcasts.
  alternative_readings:
  - 'Read the opening as an imperative/request: ''Let my outcasts dwell with you,
    O Moab'' based on a different vocalization/division'
  rationale: The Masoretic pointing here yields second feminine singular 'with you'
    and construct 'outcasts of Moab.' This is the most direct reading of the provided
    Hebrew text. A well-known alternative construes the line differently, but that
    depends on a different textual or vocalic understanding and should be preserved
    in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpreive
    tension in footnotes)
