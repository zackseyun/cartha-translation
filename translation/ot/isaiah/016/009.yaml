theological_decisions:
- issue: Interpretation of the final clause הֵידָד נָפָל
  chosen_reading: Rendered literally as 'the shout has fallen' rather than interpretively
    as the joyful harvest shout ceasing.
  alternative_readings:
  - the vintage shout has ceased
  - the battle cry has fallen
  rationale: The verse is poetic judgment language, and the Hebrew permits more than
    one nuance. To preserve interpretive tension, the main text keeps the literal
    image while footnoting the likely alternatives. This avoids importing a more specific
    scenario than the text explicitly states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
