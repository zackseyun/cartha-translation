id: ISA.16.9
reference: Isaiah 16:9
source:
  edition: WLC
  text: עַל כֵּ֡ן אֶבְכֶּ֞ה בִּ/בְכִ֤י יַעְזֵר֙ גֶּ֣פֶן שִׂבְמָ֔ה אֲרַיָּ֨וֶ/ךְ֙ דִּמְעָתִ֔/י
    חֶשְׁבּ֖וֹן וְ/אֶלְעָלֵ֑ה כִּ֧י עַל קֵיצֵ֛/ךְ וְ/עַל קְצִירֵ֖/ךְ הֵידָ֥ד נָפָֽל־־־׃
translation:
  text: Therefore I weep with the weeping of Jazer for the vine of Sibmah; I drench
    you with my tears, Heshbon and Elealeh, because over your summer fruit and over
    your harvest the shout has fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I water you with my tears.' The verb conveys saturating or drenching.
    reason: lexical_alternative
  - marker: b
    text: '''The shout has fallen'' may refer either to an invading battle cry falling
      upon the harvest or, by implication, to the joyful harvest shout having ceased.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶבְכֶּה
  chosen: I weep
  alternatives:
  - I will weep
  - let me weep
  lexicon: HALOT
  rationale: Qal imperfect 1cs of בכה can be future or modal, but in this lament context
    it functions naturally as a present/future of lament. 'I weep' gives idiomatic
    English while preserving the speaker's grief.
- source_word: בִּבְכִי יַעְזֵר
  chosen: with the weeping of Jazer
  alternatives:
  - for Jazer's weeping
  - as Jazer weeps
  lexicon: HALOT
  rationale: 'The prefixed ב plus noun בְּכִי is best taken instrumentally/associatively:
    ''with the weeping of Jazer.'' This preserves the Hebrew construction and the
    comparison/identification of mourning.'
- source_word: גֶּפֶן שִׂבְמָה
  chosen: the vine of Sibmah
  alternatives:
  - the vineyard of Sibmah
  - Sibmah's vine
  lexicon: HALOT
  rationale: גפן is singular 'vine,' often collective in poetic contexts. 'The vine
    of Sibmah' preserves the imagery and traditional geographic association without
    over-interpreting as a full vineyard.
- source_word: אֲרַיָּוֶךְ
  chosen: I drench you
  alternatives:
  - I water you
  - I soak you
  - I saturate you
  lexicon: HALOT
  rationale: From רוה in the Piel, 'to drench/saturate.' In context with 'my tears,'
    the sense is metaphorical flooding with tears. 'I drench you' is vivid and natural
    English.
- source_word: דִּמְעָתִי
  chosen: with my tears
  alternatives:
  - my tears
  lexicon: HALOT
  rationale: The noun 'my tear(s)' functions as the means by which the speaker drenches
    the addressed cities/vine. English idiom prefers plural 'tears' here.
- source_word: חֶשְׁבּוֹן וְאֶלְעָלֵה
  chosen: Heshbon and Elealeh
  alternatives:
  - O Heshbon and Elealeh
  lexicon: HALOT
  rationale: These are place names, transliterated per project policy. They are likely
    in apposition or direct address after 'I drench you'; the English keeps them as
    vocative-like apposition without adding 'O' in the main text.
- source_word: קֵיץ
  chosen: summer fruit
  alternatives:
  - summer produce
  - ripe fruit
  lexicon: HALOT
  rationale: קיץ commonly denotes summer fruit, especially harvested produce of the
    warm season. 'Summer fruit' is the most transparent and established rendering.
- source_word: קָצִיר
  chosen: harvest
  alternatives:
  - reaping
  lexicon: HALOT
  rationale: Standard rendering of the agricultural term; paired with קיץ it covers
    the produce and harvest season under judgment.
- source_word: הֵידָד
  chosen: the shout
  alternatives:
  - the battle cry
  - the vintage shout
  - the cheering
  lexicon: HALOT
  rationale: הידד can denote a loud shout, either joyful harvest cry or hostile battle
    cry depending on context. Here, because it 'has fallen' upon fruit and harvest
    in an oracle of devastation, a hostile or ominous shout is likely, but 'the shout'
    preserves the lexical breadth without over-resolving.
- source_word: נָפָל
  chosen: has fallen
  alternatives:
  - has ceased over
  - has descended upon
  lexicon: HALOT
  rationale: The verb is literally 'has fallen.' Some translations interpret the sense
    as the harvest shout ceasing, but the Hebrew wording more directly depicts a shout
    falling upon the harvest, likely an invading cry. The more literal rendering preserves
    the image and tension.
