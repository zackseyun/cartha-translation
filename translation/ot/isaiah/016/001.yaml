theological_decisions:
- issue: Whether to interpret the verse as a political instruction about tribute or
    to make the tributary sense explicit in the main text
  chosen_reading: Keep the concrete wording 'Send a lamb' and allow the tribute sense
    to remain implicit.
  alternative_readings:
  - Send tribute in lambs
  - Send a tribute-lamb
  rationale: The context strongly suggests tribute to a ruler, but the Hebrew text
    itself names the object concretely as 'a lamb.' Optimal equivalence favors preserving
    the image in the main text while noting the likely political sense in lexical
    rationale rather than importing an interpretation into the translation.
  doctrine_reference: Translation philosophy §1, §3
