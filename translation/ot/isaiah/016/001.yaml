id: ISA.16.1
reference: Isaiah 16:1
source:
  edition: WLC
  text: שִׁלְחוּ כַ֥ר מֹשֵֽׁל אֶ֖רֶץ מִ/סֶּ֣לַע מִדְבָּ֑רָ/ה אֶל הַ֖ר בַּת צִיּֽוֹן־־־־׃
translation:
  text: Send a lamb to the ruler of the land, from Sela through the wilderness, to
    the mountain of daughter Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the crag' or 'from the rock'; the Hebrew סלע can be read as a common
      noun, though it is likely the place-name Sela here.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'a lamb' likely refers to tribute sent to the ruler.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁלְחוּ
  chosen: Send
  alternatives:
  - send out
  - dispatch
  lexicon: HALOT
  rationale: Qal imperative masculine plural from שלח, a direct command to the addressed
    group. 'Send' is the most natural imperative in English without adding nuance
    not explicit in the Hebrew.
- source_word: כַר
  chosen: a lamb
  alternatives:
  - a ram
  - tribute lamb
  lexicon: HALOT
  rationale: The noun commonly denotes a lamb/pasture animal and in this context likely
    refers to tribute sent to a ruler. The bare lexical sense 'lamb' is kept in the
    main text; the tributary nuance is contextual rather than encoded in the noun
    itself.
- source_word: מֹשֵׁל אֶרֶץ
  chosen: the ruler of the land
  alternatives:
  - the ruler of the earth
  - the land's ruler
  lexicon: HALOT
  rationale: מֹשֵׁל is a participial substantive, 'one who rules'; אֶרֶץ can mean
    'land' or 'earth.' In this oracle's regional setting, 'land' is more contextually
    likely than the universal 'earth.' The construct-like relationship is represented
    idiomatically as 'the ruler of the land.'
- source_word: מִסֶּלַע
  chosen: from Sela
  alternatives:
  - from the crag
  - from the rock
  lexicon: HALOT
  rationale: Although סלע can be a common noun ('rock, crag'), here it is traditionally
    and plausibly understood as the place-name Sela in Edomite/Moabite territory.
    Per translation philosophy, names are transliterated when functioning as names.
    The lexical alternative is preserved in a footnote because the Hebrew form itself
    could be read as a common noun.
- source_word: מִדְבָּרָה
  chosen: through the wilderness
  alternatives:
  - to the wilderness
  - from the wilderness
  lexicon: HALOT
  rationale: With the directional/paragogic ending, the phrase is difficult, but in
    context it most naturally describes the route by which the tribute is sent. 'Through
    the wilderness' gives good English sense and reflects movement associated with
    the wilderness region without overcommitting to a more technical syntactic reconstruction.
- source_word: אֶל הַר בַּת צִיּוֹן
  chosen: to the mountain of daughter Zion
  alternatives:
  - to the mountain of the daughter of Zion
  - to Mount Daughter Zion
  - to the mountain of Zion's daughter
  lexicon: HALOT
  rationale: הַר is 'mountain'; בַּת צִיּוֹן is the poetic personification 'daughter
    Zion.' The translation preserves the Hebrew metaphor rather than flattening it
    to simply 'Jerusalem.' 'Mountain of daughter Zion' is slightly formal but transparent
    and keeps the poetic force.
