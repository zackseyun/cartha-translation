id: ISA.16.2
reference: Isaiah 16:2
source:
  edition: WLC
  text: וְ/הָיָ֥ה כְ/עוֹף נוֹדֵ֖ד קֵ֣ן מְשֻׁלָּ֑ח תִּֽהְיֶ֨ינָה֙ בְּנ֣וֹת מוֹאָ֔ב
    מַעְבָּרֹ֖ת לְ/אַרְנֽוֹן־׃
translation:
  text: And like a wandering bird, a scattered nest, so the daughters of Moab will
    be at the fords of the Arnon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a nest cast out' / 'a nest driven away.' The Hebrew image is compressed
      and may emphasize a nest disturbed and abandoned.
    reason: lexical_alternative
  - marker: b
    text: '''The daughters of Moab'' may refer literally to Moabite women or figuratively
      to the towns/settlements of Moab personified as daughters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it will happen
  - And it shall be
  lexicon: HALOT
  rationale: The Hebrew waw + qatal of היה introduces the ensuing comparison/result.
    In English, an explicit future copula is the most natural way to carry the sense
    into the clause that follows.
- source_word: כְעוֹף
  chosen: like a bird
  alternatives:
  - like a fleeing bird
  - like a bird in flight
  lexicon: HALOT
  rationale: עוֹף is the common noun for bird/flying creature. The following participle
    נודד supplies the idea of wandering/fleeing, so 'bird' alone here avoids redundancy.
- source_word: נוֹדֵד
  chosen: wandering
  alternatives:
  - fleeing
  - fluttering
  - homeless
  lexicon: HALOT
  rationale: From נדד, conveying restless movement, wandering, or flight. 'Wandering'
    preserves the image without over-specifying panic, though the context implies
    displacement.
- source_word: קֵן מְשֻׁלָּח
  chosen: a scattered nest
  alternatives:
  - a cast-out nest
  - a nest driven away
  - a forsaken nest
  lexicon: HALOT
  rationale: The phrase is compressed and image-heavy. קֵן is 'nest'; מְשֻׁלָּח, passive
    participle of שלח, literally 'sent away/cast out.' 'Scattered nest' communicates
    a nest disrupted and abandoned in idiomatic English while preserving the simile
    of vulnerability and displacement.
- source_word: תִּהְיֶינָה
  chosen: will be
  alternatives:
  - will become
  lexicon: HALOT
  rationale: Simple future of היה with feminine plural subject. 'Will be' is sufficient
    and keeps the comparison direct.
- source_word: בְּנוֹת מוֹאָב
  chosen: the daughters of Moab
  alternatives:
  - the women of Moab
  - the towns of Moab
  lexicon: HALOT
  rationale: Literally 'daughters of Moab.' This may denote Moabite women or, by personification,
    the dependent towns/communities of Moab. The literal rendering best preserves
    the Hebrew image and leaves the poetic ambiguity intact.
- source_word: מַעְבָּרוֹת
  chosen: at the fords
  alternatives:
  - at the crossings
  - at the crossing places
  lexicon: HALOT
  rationale: Plural noun from עבר, referring to crossing places, especially river
    fords. 'Fords' is the most precise geographic rendering in this context.
- source_word: לְאַרְנוֹן
  chosen: of the Arnon
  alternatives:
  - of Arnon
  - by the Arnon
  lexicon: HALOT
  rationale: Arnon is a proper place name, conventionally transliterated. In English,
    'the Arnon' is natural when referring to the river/gorge associated with the fords.
