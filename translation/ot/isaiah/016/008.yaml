id: ISA.16.8
reference: Isaiah 16:8
source:
  edition: WLC
  text: כִּ֣י שַׁדְמוֹת֩ חֶשְׁבּ֨וֹן אֻמְלָ֜ל גֶּ֣פֶן שִׂבְמָ֗ה בַּעֲלֵ֤י גוֹיִם֙
    הָלְמ֣וּ שְׂרוּקֶּ֔י/הָ עַד יַעְזֵ֥ר נָגָ֖עוּ תָּ֣עוּ מִדְבָּ֑ר שְׁלֻ֣חוֹתֶ֔י/הָ
    נִטְּשׁ֖וּ עָ֥בְרוּ יָֽם־׃
translation:
  text: For the fields of Heshbon languish, the vine of Sibmah as well. The lords
    of the nations have struck down its choice vines; they reached as far as Jazer,
    they wandered into the wilderness; its shoots spread out and crossed the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its tendrils' for 'its choice vines' (שְׂרוּקֶיהָ); the Hebrew term
      may emphasize either select vine stock or the vine's branches/shoots.
    reason: lexical_alternative
  - marker: b
    text: Or 'its branches spread out'; the Hebrew behind 'spread out' is difficult
      and may be understood in more than one way.
    reason: lexical_alternative
  - marker: c
    text: '''The sea'' may refer specifically to the Dead Sea in the regional geography.'
    reason: cultural_note
lexical_decisions:
- source_word: שַׁדְמוֹת
  chosen: fields
  alternatives:
  - cultivated fields
  - vine-fields
  lexicon: HALOT
  rationale: Refers to cultivated agricultural land. 'Fields' is natural English and
    fits the parallel with the vine of Sibmah. 'Vine-fields' is possible in context
    but too specific for the noun itself.
- source_word: אֻמְלָל
  chosen: languish
  alternatives:
  - wither
  - are weak
  lexicon: HALOT
  rationale: The verb conveys being dried up, weak, or languishing. 'Languish' preserves
    the poetic tone and allows the following vine imagery to remain vivid without
    over-specifying physical withering.
- source_word: גֶּפֶן שִׂבְמָה
  chosen: the vine of Sibmah
  alternatives:
  - the grapevine of Sibmah
  - the vineyards of Sibmah
  lexicon: HALOT
  rationale: Singular 'vine' likely functions collectively/poetically for Sibmah's
    famed vine-growing region. Retaining the singular preserves the Hebrew imagery
    better than flattening it to 'vineyards.'
- source_word: בַּעֲלֵי גוֹיִם
  chosen: the lords of the nations
  alternatives:
  - the rulers of the nations
  - the masters of the nations
  lexicon: HALOT
  rationale: בעלים here denotes possessors/masters/rulers. 'Lords of the nations'
    preserves the elevated poetic register and likely refers to foreign rulers/conquerors
    rather than vineyard owners.
- source_word: הָלְמוּ
  chosen: have struck down
  alternatives:
  - have beaten
  - have smitten
  lexicon: HALOT
  rationale: The verb denotes striking. In context of devastation, 'have struck down'
    communicates destructive force idiomatically in English.
- source_word: שְׂרוּקֶיהָ
  chosen: its choice vines
  alternatives:
  - its tendrils
  - its noble vines
  - its branches
  lexicon: HALOT
  rationale: From a term associated with select or choice vine stock. 'Choice vines'
    best captures the quality nuance; 'tendrils' or 'branches' miss the likely viticultural
    sense.
- source_word: עַד יַעְזֵר נָגָעוּ
  chosen: they reached as far as Jazer
  alternatives:
  - they extended to Jazer
  - they touched Jazer
  lexicon: HALOT
  rationale: The subject is the vine's growth/extent, not the nations' attack. 'Reached
    as far as Jazer' expresses geographical extension naturally.
- source_word: תָּעוּ מִדְבָּר
  chosen: they wandered into the wilderness
  alternatives:
  - they strayed in the wilderness
  - they spread through the desert
  lexicon: HALOT
  rationale: The verb literally means wander/stray. In poetic description of vine
    shoots extending widely, 'wandered into the wilderness' preserves the metaphorical
    personification.
- source_word: שְׁלֻחוֹתֶיהָ
  chosen: its shoots
  alternatives:
  - its branches
  - its tendrils
  - its offshoots
  lexicon: HALOT
  rationale: The noun denotes something sent out, hence shoots/offshoots. 'Shoots'
    is concise and fits vine imagery well.
- source_word: נִטְּשׁוּ
  chosen: spread out
  alternatives:
  - were spread out
  - were abandoned
  lexicon: HALOT
  rationale: Though the verb can bear senses related to being left loose or cast off,
    in this poetic agricultural context it describes the shoots extending outward.
    'Spread out' best fits the parallel with crossing the sea.
- source_word: עָבְרוּ יָם
  chosen: crossed the sea
  alternatives:
  - passed over the sea
  - crossed the Dead Sea
  lexicon: HALOT
  rationale: The phrase is straightforwardly 'crossed the sea.' Whether 'sea' refers
    specifically to the Dead Sea is interpretive; the main text keeps the broader
    Hebrew wording, with the geographical specificity left unstated.
