id: ISA.16.13
reference: Isaiah 16:13
source:
  edition: WLC
  text: זֶ֣ה הַ/דָּבָ֗ר אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה אֶל מוֹאָ֖ב מֵ/אָֽז־׃
translation:
  text: This is the word that the LORD spoke concerning Moab in time past.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the message that the LORD spoke concerning Moab formerly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This was
  lexicon: HALOT
  rationale: Demonstrative introducing a summary or conclusion. Present English ('This
    is') matches the Hebrew deictic force in context, even though the following verb
    refers to prior speech.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the message
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'message.' Here it introduces a prophetic
    pronouncement, and 'word' preserves the formal prophetic idiom without becoming
    obscure.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun; 'that' is the most natural modern English
    connector here.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  - declared
  lexicon: HALOT
  rationale: The verb דבר commonly means 'speak.' 'Spoke' is both accurate and suitably
    formal for divine speech; 'declared' would add emphasis not explicit in the verb
    itself.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding English convention and the stated policy for
    יְהוָה.
- source_word: אֶל מוֹאָב
  chosen: concerning Moab
  alternatives:
  - to Moab
  - against Moab
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with prophetic speech about a nation it
    can function in the sense of reference or concern. 'Concerning Moab' best fits
    the context of an oracle about Moab rather than direct address to Moab. 'Against
    Moab' would overinterpret the preposition.
- source_word: מֵאָז
  chosen: in time past
  alternatives:
  - formerly
  - from then
  - long ago
  lexicon: HALOT
  rationale: The adverb marks prior time relative to the present statement. 'In time
    past' preserves the temporal sense and fits the summarizing tone of the verse.
    'Long ago' is possible but slightly more interpretive in tone.
