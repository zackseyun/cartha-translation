theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of אֶל with Moab in an oracle heading
  chosen_reading: concerning Moab
  alternative_readings:
  - to Moab
  - against Moab
  rationale: The verse functions as a concluding summary of an oracle about Moab.
    Rendering אֶל as 'concerning' preserves the referential sense without importing
    hostility ('against') or direct address ('to') beyond what the preposition itself
    requires.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
