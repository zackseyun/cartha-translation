id: ISA.16.3
reference: Isaiah 16:3
source:
  edition: WLC
  text: הביאו עֵצָה֙ עֲשׂ֣וּ פְלִילָ֔ה שִׁ֧יתִי כַ/לַּ֛יִל צִלֵּ֖/ךְ בְּ/ת֣וֹךְ צָהֳרָ֑יִם
    סַתְּרִי֙ נִדָּחִ֔ים נֹדֵ֖ד אַל תְּגַלִּֽי־׃
translation:
  text: Bring counsel; make a decision. Make your shadow like the night in the middle
    of noon; hide the outcasts; do not betray the fugitive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make justice,' 'render judgment,' or 'give arbitration' for 'make a
      decision.' The Hebrew noun carries legal/judicial nuance.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'do not reveal' or 'do not expose' the fugitive.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'your shadow' may also be rendered 'your shade.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הביאו
  chosen: Bring
  alternatives:
  - Give
  - Offer
  lexicon: HALOT
  rationale: Hiphil imperative plural of בוא in the causative sense 'bring, present.'
    'Bring' fits the appeal to Moab to provide counsel.
- source_word: עֵצָה
  chosen: counsel
  alternatives:
  - advice
  - plan
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel or advice; 'counsel' preserves the formal
    tone of political deliberation in context.
- source_word: עֲשׂוּ
  chosen: make
  alternatives:
  - do
  - render
  lexicon: HALOT
  rationale: Simple imperative of עשה. 'Make' works idiomatically with the following
    noun.
- source_word: פְלִילָה
  chosen: a decision
  alternatives:
  - justice
  - judgment
  - arbitration
  lexicon: HALOT
  rationale: The noun can denote a judicial decision or arbitration. In this context
    of asylum and political appeal, 'a decision' is clear modern English while retaining
    the legal nuance. The more specific alternatives are preserved in a footnote.
- source_word: שִׁיתִי
  chosen: Make
  alternatives:
  - Set
  - Place
  lexicon: HALOT
  rationale: Qal imperative feminine singular of שׁית, addressed to the feminine personified
    entity (likely Moab/daughter of Zion's interlocutor). 'Make' is idiomatic with
    'your shadow like the night.'
- source_word: כַ/לַּיִל
  chosen: like the night
  alternatives:
  - as night
  lexicon: HALOT
  rationale: Comparative כ plus 'night'; the simile emphasizes deep concealment.
- source_word: צִלֵּךְ
  chosen: your shadow
  alternatives:
  - your shade
  lexicon: HALOT
  rationale: צל can be 'shadow' or 'shade.' 'Shadow' better matches the imagery of
    darkness 'like the night,' though 'shade' is a viable alternative.
- source_word: בְּתוֹךְ צָהֳרָיִם
  chosen: in the middle of noon
  alternatives:
  - at high noon
  - in the midst of midday
  lexicon: HALOT
  rationale: Literally 'in the midst of noon/midday.' 'In the middle of noon' preserves
    the Hebrew image, though slightly smoothed English alternatives are possible.
- source_word: סַתְּרִי
  chosen: hide
  alternatives:
  - conceal
  - shelter
  lexicon: HALOT
  rationale: Piel imperative feminine singular of סתר. 'Hide' is the most direct rendering;
    the context implies protective concealment.
- source_word: נִדָּחִים
  chosen: the outcasts
  alternatives:
  - the banished
  - the dispersed
  lexicon: HALOT
  rationale: Passive participial form from נדח, referring to those driven away or
    expelled. 'Outcasts' is concise and idiomatic in English.
- source_word: נֹדֵד
  chosen: the fugitive
  alternatives:
  - the wanderer
  - the refugee
  lexicon: HALOT
  rationale: Participle from נדד, one who flees or wanders. In parallel with 'outcasts'
    and the command not to expose him, 'fugitive' best captures the immediate sense.
- source_word: אַל תְּגַלִּי
  chosen: do not betray
  alternatives:
  - do not reveal
  - do not expose
  lexicon: HALOT
  rationale: The verb גלה literally means 'uncover, reveal.' In context—hiding refugees
    from pursuers—English 'betray' communicates the practical force of revealing their
    location, while the more literal alternatives are preserved in a footnote.
