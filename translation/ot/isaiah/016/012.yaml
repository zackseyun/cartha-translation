theological_decisions:
- issue: Referent of singular pronouns for Moab
  chosen_reading: Render Moab as a personified singular ('he comes ... he will not
    prevail')
  alternative_readings:
  - Render with plural reference to the people of Moab
  - Render impersonally ('it comes to pass ... there is no ability')
  rationale: The Hebrew uses singular verbal forms with the national name Moab, a
    common personification of a nation. Preserving the singular reflects the source
    text's rhetoric without adding doctrinal content.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
