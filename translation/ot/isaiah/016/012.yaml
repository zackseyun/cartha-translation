id: ISA.16.12
reference: Isaiah 16:12
source:
  edition: WLC
  text: וְ/הָיָ֧ה כִֽי נִרְאָ֛ה כִּֽי נִלְאָ֥ה מוֹאָ֖ב עַל הַ/בָּמָ֑ה וּ/בָ֧א אֶל
    מִקְדָּשׁ֛/וֹ לְ/הִתְפַּלֵּ֖ל וְ/לֹ֥א יוּכָֽל־־־־׃
translation:
  text: And when it is seen that Moab is worn out on the high place, and he comes
    to his sanctuary to pray, he will not prevail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he is seen' / 'it appears that Moab is weary on the high place.' The
      Hebrew allows a more personal or more impersonal sense in the opening clause.
    reason: lexical_alternative
  - marker: b
    text: '''High place'' refers to an elevated cult site used for worship.'
    reason: cultural_note
  - marker: c
    text: Or 'he will not be able.' The translation 'he will not prevail' makes explicit
      the likely sense of unsuccessful prayer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be when
  - And it will happen when
  lexicon: HALOT
  rationale: This narrative-transition formula introduces a future circumstance. 'And
    when' preserves the temporal sense in natural English without unnecessary stiffness.
- source_word: נִרְאָה
  chosen: it is seen
  alternatives:
  - it appears
  - he is seen
  lexicon: HALOT
  rationale: 'The Niphal of ראה is passive/reflexive. An impersonal passive, ''it
    is seen,'' best fits the clause and avoids over-specifying the subject. ''He is
    seen'' is possible, but the Hebrew can function more generally: when it becomes
    evident.'
- source_word: נִלְאָה
  chosen: is worn out
  alternatives:
  - is weary
  - has exhausted himself
  lexicon: HALOT
  rationale: The verb conveys weariness/exhaustion from futile effort. 'Is worn out'
    communicates the resultative sense clearly in modern English.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the nation/personified people name.
- source_word: עַל הַבָּמָה
  chosen: on the high place
  alternatives:
  - upon the high place
  - at the high place
  lexicon: HALOT
  rationale: במה refers to a cultic high place. Singular is retained as in the Hebrew.
    'On the high place' is the most direct rendering, likely referring to Moab's elevated
    worship site.
- source_word: וּבָא
  chosen: and he comes
  alternatives:
  - and he enters
  - and he goes
  lexicon: HALOT
  rationale: בוא commonly means 'come/go/enter' depending on viewpoint. 'Comes' works
    smoothly with the following destination phrase and preserves the personified singular
    for Moab.
- source_word: אֶל מִקְדָּשׁוֹ
  chosen: to his sanctuary
  alternatives:
  - to his shrine
  - to his temple
  lexicon: HALOT
  rationale: מקדש denotes a holy place/sanctuary. 'Sanctuary' is broad enough to fit
    a pagan cult site without importing the more specific institutional sense that
    'temple' may suggest. The 3ms suffix is retained as 'his,' matching personified
    Moab.
- source_word: לְהִתְפַּלֵּל
  chosen: to pray
  alternatives:
  - to intercede
  lexicon: HALOT
  rationale: The Hitpael of פלל here means to pray. 'Intercede' is too specific for
    the context.
- source_word: וְלֹא יוּכָל
  chosen: he will not prevail
  alternatives:
  - he will not be able
  - he cannot accomplish anything
  lexicon: HALOT
  rationale: 'יכל means ''be able,'' but in context of futile religious appeal, ''will
    not prevail'' brings out the idiomatic force: his prayer will not succeed. This
    remains within optimal equivalence and reflects the implied failure.'
