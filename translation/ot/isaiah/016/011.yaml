id: ISA.16.11
reference: Isaiah 16:11
source:
  edition: WLC
  text: עַל כֵּן֙ מֵעַ֣/י לְ/מוֹאָ֔ב כַּ/כִּנּ֖וֹר יֶֽהֱמ֑וּ וְ/קִרְבִּ֖/י לְ/קִ֥יר
    חָֽרֶשׂ־׃
translation:
  text: Therefore my inward parts moan like a harp for Moab, and my inner being for
    Kir-heres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a lyre'; the Hebrew kinnor denotes a stringed instrument.
    reason: lexical_alternative
  - marker: b
    text: Kir-heres is a Moabite city; traditionally, 'Kir-hareseth.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵעַי
  chosen: my inward parts
  alternatives:
  - my bowels
  - my heart
  - my inner being
  lexicon: HALOT
  rationale: מֵעֶה literally refers to the inward parts/entrails and is often used
    idiomatically for deep emotion or compassion. 'My inward parts' preserves the
    concrete Hebrew imagery better than the more interpretive 'my heart,' while remaining
    intelligible in modern English.
- source_word: לְמוֹאָב
  chosen: for Moab
  alternatives:
  - over Moab
  - because of Moab
  lexicon: HALOT
  rationale: The preposition ל here marks the object toward which the lament is directed.
    'For Moab' communicates sympathetic lament most naturally in English.
- source_word: כַּכִּנּוֹר
  chosen: like a harp
  alternatives:
  - like a lyre
  lexicon: HALOT
  rationale: כִּנּוֹר denotes a stringed instrument, often rendered 'harp' or 'lyre.'
    'Harp' is traditional and readily understood, while still fitting the mournful
    resonance of the simile.
- source_word: יֶהֱמוּ
  chosen: moan
  alternatives:
  - sound
  - murmur
  - resound
  lexicon: HALOT
  rationale: The verb המה conveys a low, resonant sound, often of tumult or groaning.
    In this lament context, 'moan' best captures the emotional, mournful resonance
    implied by the comparison to a harp.
- source_word: וְקִרְבִּי
  chosen: my inner being
  alternatives:
  - my inward parts
  - my heart
  - my inward self
  lexicon: HALOT
  rationale: קֶרֶב refers to the inner part or midst. Here, parallel to מֵעַי, it
    denotes the speaker's inner self. 'My inner being' gives clear English while preserving
    the anthropological depth of the Hebrew.
- source_word: לְקִיר חָרֶשׂ
  chosen: for Kir-heres
  alternatives:
  - for Kir-hareseth
  - for the wall of potsherd
  lexicon: HALOT
  rationale: This is a place name in Moab. Following the translation philosophy to
    transliterate names, 'Kir-heres' is preferred in the main text. The more expanded
    traditional form 'Kir-hareseth' and the possible etymological sense are worth
    preserving in a footnote.
