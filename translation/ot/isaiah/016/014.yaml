id: ISA.16.14
reference: Isaiah 16:14
source:
  edition: WLC
  text: וְ/עַתָּ֗ה דִּבֶּ֣ר יְהוָה֮ לֵ/אמֹר֒ בְּ/שָׁלֹ֤שׁ שָׁנִים֙ כִּ/שְׁנֵ֣י שָׂכִ֔יר וְ/נִקְלָה֙ כְּב֣וֹד מוֹאָ֔ב בְּ/כֹ֖ל הֶ/הָמ֣וֹן הָ/רָ֑ב וּ/שְׁאָ֥ר מְעַ֛ט מִזְעָ֖ר ל֥וֹא כַבִּֽיר׃ס
translation:
  text: But now Yahweh has spoken, saying, “Within three years, like the years of a hired worker, the glory of Moab will be brought low, with all its great multitude; and the remnant will be few, very small, not mighty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in three years, as the years of a hired worker,” emphasizing a fixed and exact term.
    reason: lexical_alternative
  - marker: b
    text: Or “the glory of Moab will be dishonored,” with the sense that Moab’s prestige will be humiliated.
    reason: lexical_alternative
  - marker: c
    text: Or “the remnant will be few, very small, not great/strong.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a transition from the prior oracle to a present divine declaration. 'But now' captures the contrastive force of waw plus temporal adverb in context.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD has spoken
  alternatives:
  - the LORD spoke
  - the LORD says
  lexicon: HALOT
  rationale: Perfect verb used for a solemn prophetic declaration. Present perfect in English conveys a completed but presently authoritative utterance. YHWH is rendered 'the LORD' per doctrine.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech.
- source_word: בְּשָׁלֹשׁ שָׁנִים
  chosen: Within three years
  alternatives:
  - In three years
  - After three years
  lexicon: HALOT
  rationale: The preposition ב plus time expression here indicates the time span within which the announced judgment will occur, not merely a point after three years.
- source_word: כִּשְׁנֵי שָׂכִיר
  chosen: like the years of a hired worker
  alternatives:
  - as the years of a hired laborer
  - according to the years of a hired man
  lexicon: HALOT
  rationale: The simile evokes a fixed, exact term that will not be extended, as in similar prophetic usage. 'Hired worker' is clear modern English for שָׂכִיר.
- source_word: וְנִקְלָה
  chosen: will be brought low
  alternatives:
  - will be dishonored
  - will be despised
  - will be humbled
  lexicon: HALOT
  rationale: The Niphal of קלה here denotes being reduced in honor/status. 'Brought low' fits the judgment context and pairs naturally with 'glory of Moab.'
- source_word: כְּבוֹד מוֹאָב
  chosen: the glory of Moab
  alternatives:
  - Moab's glory
  - the honor of Moab
  lexicon: HALOT
  rationale: כָּבוֹד here refers to Moab's splendor, prestige, and national prominence. 'Glory' preserves the weight of the Hebrew term.
- source_word: בְּכֹל הֶהָמוֹן הָרָב
  chosen: with all its great multitude
  alternatives:
  - despite all its great multitude
  - in all its great abundance
  - together with all its great throng
  lexicon: HALOT
  rationale: הָמוֹן denotes a mass, abundance, or multitude. In context it likely refers to Moab's populous wealth/pomp taken together with its glory. 'With all its great multitude' preserves the broad sense without over-specifying.
- source_word: וּשְׁאָר
  chosen: and the remnant
  alternatives:
  - and what remains
  - and the survivors
  lexicon: HALOT
  rationale: Refers to what is left after judgment. 'Remnant' is a standard and theologically resonant rendering, though here the emphasis is numerical smallness rather than a hopeful remnant theology.
- source_word: מְעַט מִזְעָר
  chosen: will be very small
  alternatives:
  - will be few, tiny
  - will be little, insignificant
  lexicon: HALOT
  rationale: The paired terms intensify the smallness of what remains. 'Very small' communicates the emphatic reduction in idiomatic English.
- source_word: לֹא כַבִּיר
  chosen: not mighty
  alternatives:
  - not strong
  - not great
  - of no account
  lexicon: HALOT
  rationale: כַבִּיר conveys greatness or might. 'Not mighty' best fits the national judgment context, indicating lack of strength or significance in the remnant.
