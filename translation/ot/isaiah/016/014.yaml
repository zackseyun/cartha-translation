theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Use of 'remnant' for שְׁאָר
  chosen_reading: and the remnant
  alternative_readings:
  - and what remains
  - and the survivors
  rationale: Although 'remnant' can carry theological overtones elsewhere in Isaiah, here it is retained because it is the natural lexical equivalent; the translation does not import a positive theological sense, and the following modifiers make clear that the point is severe reduction.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
