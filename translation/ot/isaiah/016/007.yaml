id: ISA.16.7
reference: Isaiah 16:7
source:
  edition: WLC
  text: לָ/כֵ֗ן יְיֵלִ֥יל מוֹאָ֛ב לְ/מוֹאָ֖ב כֻּלֹּ֣/ה יְיֵלִ֑יל לַ/אֲשִׁישֵׁ֧י קִיר
    חֲרֶ֛שֶׂת תֶּהְגּ֖וּ אַךְ נְכָאִֽים־־׃
translation:
  text: Therefore Moab will wail for Moab; all of it will wail. You will moan for
    the raisin-cakes of Kir-hareseth, utterly stricken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'for the foundations of Kir-hareseth'; the Hebrew אֲשִׁישֵׁי
      is difficult, but the Masoretic Text most naturally reads 'raisin-cakes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    judgment oracle.
- source_word: יְיֵלִיל
  chosen: will wail
  alternatives:
  - will howl
  - will lament
  lexicon: HALOT
  rationale: Hiphil of ילל commonly denotes loud lamentation or wailing in judgment
    contexts. 'Wail' is natural modern English and preserves the intensity better
    than the more animal-sounding 'howl' here.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Proper name of the nation/personified land; transliterated per translation
    philosophy.
- source_word: לְמוֹאָב
  chosen: for Moab
  alternatives:
  - over Moab
  - because of Moab
  lexicon: HALOT
  rationale: 'The preposition ל here is best taken as marking the object or occasion
    of lament: Moab laments for Moab, expressing self-lament by the nation.'
- source_word: כֻּלֹּה
  chosen: all of it
  alternatives:
  - every one of them
  - all of him
  lexicon: HALOT
  rationale: Refers collectively to Moab as a whole. 'All of it' fits the personified
    nation/land better than a masculine personal rendering in English.
- source_word: לַאֲשִׁישֵׁי
  chosen: for the raisin-cakes
  alternatives:
  - for the pressed-cakes
  - for the foundations
  lexicon: HALOT
  rationale: אֲשִׁישָׁה elsewhere denotes a raisin-cake or pressed cake, often associated
    with festive abundance. In this judgment context, mourning for such delicacies
    poignantly signals lost prosperity. Some interpreters emend or derive a different
    sense such as 'foundations,' but the MT most naturally yields 'raisin-cakes.'
- source_word: קִיר חֲרֶשֶׂת
  chosen: Kir-hareseth
  alternatives:
  - Kir Heres
  - the wall of potsherds
  lexicon: HALOT
  rationale: Place name; transliterated rather than translated. The paired elements
    function here as a proper noun for the Moabite city.
- source_word: תֶּהְגּוּ
  chosen: You will moan
  alternatives:
  - you will groan
  - you will mutter
  - you will meditate
  lexicon: HALOT
  rationale: From הגה, whose semantic range includes low utterance, groaning, or murmuring.
    In a lament setting, 'moan' best captures the audible grief. The 2mp form likely
    addresses the Moabites directly, creating a rhetorical shift.
- source_word: אַךְ
  chosen: utterly
  alternatives:
  - surely
  - only
  - indeed
  lexicon: HALOT
  rationale: Here it intensifies the following adjective/adverbial idea rather than
    restricting. 'Utterly' conveys emphatic force in idiomatic English.
- source_word: נְכָאִים
  chosen: stricken
  alternatives:
  - smitten
  - wounded
  - crushed
  lexicon: HALOT
  rationale: Adjective/participle conveying being beaten down or crushed by affliction.
    'Stricken' is idiomatic and suits the lament context.
