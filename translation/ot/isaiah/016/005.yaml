theological_decisions:
- issue: Messianic/Davidic referent
  chosen_reading: Retain the verse as a prophetic description of an ideal Davidic
    ruler without explicitly identifying the figure in the translation.
  alternative_readings:
  - A historical Davidic king
  - The Messiah / Christological fulfillment
  rationale: Within Christian orthodoxy the verse may be read messianically, but the
    Hebrew text itself describes a Davidic throne and ruler without naming the Messiah.
    The translation should preserve that textual restraint and allow theological fulfillment
    to be recognized by readers and interpreters rather than imported into the wording.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
