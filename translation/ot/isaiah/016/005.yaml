id: ISA.16.5
reference: Isaiah 16:5
source:
  edition: WLC
  text: וְ/הוּכַ֤ן בַּ/חֶ֨סֶד֙ כִּסֵּ֔א וְ/יָשַׁ֥ב עָלָ֛י/ו בֶּ/אֱמֶ֖ת בְּ/אֹ֣הֶל
    דָּוִ֑ד שֹׁפֵ֛ט וְ/דֹרֵ֥שׁ מִשְׁפָּ֖ט וּ/מְהִ֥ר צֶֽדֶק׃
translation:
  text: A throne will be established in steadfast love, and one will sit on it in
    faithfulness in the tent of David, judging and seeking justice and swift in righteousness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will sit on it'; the Hebrew leaves the subject implicit.
    reason: alternative_reading
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often denoting covenant loyalty
      or merciful love.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּכַן
  chosen: will be established
  alternatives:
  - will be made firm
  - will be prepared
  lexicon: HALOT
  rationale: Hophal of כון conveys being set up or made firm. 'Will be established'
    is natural English and preserves the passive/resultative sense.
- source_word: בַּחֶסֶד
  chosen: in steadfast love
  alternatives:
  - by steadfast love
  - in mercy
  - through covenant loyalty
  lexicon: HALOT
  rationale: חֶסֶד often denotes covenantal loyal love or mercy. 'Steadfast love'
    best preserves its rich covenantal sense in readable English. The prefixed ב can
    be rendered instrumentally or locatively; 'in steadfast love' keeps the Hebrew
    compactness and suits the poetic line.
- source_word: כִּסֵּא
  chosen: a throne
  alternatives:
  - the throne
  lexicon: HALOT
  rationale: The noun lacks the article in Hebrew. 'A throne' is the more formally
    transparent rendering, while still fitting the prophetic context.
- source_word: וְיָשַׁב עָלָיו
  chosen: and one will sit on it
  alternatives:
  - and he will sit on it
  - and someone will sit on it
  lexicon: HALOT
  rationale: The verb is 3ms with no explicit subject stated in this clause. English
    requires a subject; 'one' preserves the Hebrew's indefiniteness better than specifying
    'he,' while still allowing the Davidic ruler to be understood from context.
- source_word: בֶּאֱמֶת
  chosen: in faithfulness
  alternatives:
  - in truth
  - faithfully
  lexicon: HALOT
  rationale: אֱמֶת can mean truth, reliability, or faithfulness. In royal/judicial
    context, 'in faithfulness' best expresses trustworthy rule rather than mere factual
    truth.
- source_word: בְּאֹהֶל דָּוִד
  chosen: in the tent of David
  alternatives:
  - in David's tent
  - in the house of David
  lexicon: HALOT
  rationale: The Hebrew literally says 'in the tent of David.' This should be preserved
    rather than flattened to 'house,' since the prophetic image may intentionally
    evoke the Davidic dynasty in humble/restored form.
- source_word: שֹׁפֵט
  chosen: judging
  alternatives:
  - as judge
  - who judges
  lexicon: HALOT
  rationale: The participle describes the seated ruler's ongoing function. Rendering
    it as 'judging' keeps the participial flow with the following participles.
- source_word: וְדֹרֵשׁ מִשְׁפָּט
  chosen: and seeking justice
  alternatives:
  - and seeking judgment
  - and pursuing justice
  lexicon: HALOT
  rationale: דרשׁ with מִשְׁפָּט conveys actively pursuing or caring for just judgment.
    'Seeking justice' is idiomatic and preserves the ethical-judicial sense of מִשְׁפָּט
    here.
- source_word: וּמְהִר צֶדֶק
  chosen: and swift in righteousness
  alternatives:
  - and quick in righteousness
  - and prompt to do righteousness
  - and hastening righteousness
  lexicon: HALOT
  rationale: מְהִר denotes quickness or promptness. The phrase is compressed Hebrew
    poetry; 'swift in righteousness' preserves the terseness and links צֶדֶק with
    righteous action/order rather than merely abstract quality.
