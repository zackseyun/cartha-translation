id: ISA.16.6
reference: Isaiah 16:6
source:
  edition: WLC
  text: שָׁמַ֥עְנוּ גְאוֹן מוֹאָ֖ב גֵּ֣א מְאֹ֑ד גַּאֲוָת֧/וֹ וּ/גְאוֹנ֛/וֹ וְ/עֶבְרָת֖/וֹ
    לֹא כֵ֥ן בַּדָּֽי/ו־־׃ס
translation:
  text: We have heard of the pride of Moab—how very proud he is—of his arrogance,
    his pride, and his fury; his boasts are not so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his empty talk is not so,' or 'his lies are not so.' The Hebrew term
      can refer to boastful claims, empty talk, or falsehood.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  chosen: We have heard
  alternatives:
  - We heard
  lexicon: HALOT
  rationale: 'Qal perfect 1cp of שׁמע. English present perfect fits the reportive
    sense well: the speakers know by report the character of Moab. Simple past is
    possible, but present perfect better preserves the current relevance.'
- source_word: גְאוֹן
  chosen: pride
  alternatives:
  - majesty
  - exaltation
  lexicon: HALOT
  rationale: In this judgment context concerning Moab, the noun denotes haughty pride
    rather than neutral majesty. 'Pride' is the plain contextual sense.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/people name.
- source_word: גֵּא מְאֹד
  chosen: how very proud he is
  alternatives:
  - exceedingly proud
  - very haughty
  lexicon: HALOT
  rationale: The adjective גאה with מְאֹד intensifies the description. Rendering it
    as a clause after the dash gives natural English while preserving the emphatic
    repetition.
- source_word: גַּאֲוָתוֹ
  chosen: his arrogance
  alternatives:
  - his loftiness
  - his haughtiness
  lexicon: HALOT
  rationale: This near-synonym in a cluster of pride terms is given a differentiated
    English gloss to preserve the rhetorical piling up without flattening all terms
    into the same word.
- source_word: וּגְאוֹנוֹ
  chosen: his pride
  alternatives:
  - his majesty
  - his exaltation
  lexicon: HALOT
  rationale: Repeated cognate of גאון; here retained as 'pride' to reflect the semantic
    center of the accusation.
- source_word: וְעֶבְרָתוֹ
  chosen: his fury
  alternatives:
  - his wrath
  - his rage
  lexicon: HALOT
  rationale: עברה commonly denotes overflowing anger/wrath. 'Fury' is vivid, readable
    modern English and fits the denunciatory tone.
- source_word: לֹא כֵן
  chosen: are not so
  alternatives:
  - is not so
  - not so
  lexicon: HALOT
  rationale: The phrase denies the truth/correspondence of what follows or precedes.
    With the plural subject 'boasts,' 'are not so' is idiomatic and preserves the
    terse negation.
- source_word: בַּדָּיו
  chosen: his boasts
  alternatives:
  - his empty talk
  - his lies
  - his boastings
  lexicon: HALOT
  rationale: The noun can denote empty talk, falsehoods, or boastful claims. In this
    context of Moab's pride, 'boasts' best matches the rhetorical focus while implying
    their emptiness. The alternative nuance 'empty talk' is worth preserving in a
    footnote.
