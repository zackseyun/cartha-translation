id: ISA.28.16
reference: Isaiah 28:16
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה הִנְ/נִ֛י יִסַּ֥ד בְּ/צִיּ֖וֹן אָ֑בֶן
    אֶ֣בֶן בֹּ֜חַן פִּנַּ֤ת יִקְרַת֙ מוּסָ֣ד מוּסָּ֔ד הַֽ/מַּאֲמִ֖ין לֹ֥א יָחִֽישׁ׃
translation:
  text: 'Therefore, thus says the Lord GOD: Behold, I am laying in Zion a stone, a
    tested stone, a precious cornerstone, a sure foundation; the one who believes
    will not be in haste.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who trusts.' The Hebrew participle can carry the sense of trusting
      reliance as well as believing.
    reason: lexical_alternative
  - marker: b
    text: Or 'will not hurry'; some understand the sense more interpretively as 'will
      not panic.'
    reason: lexical_alternative
  - marker: c
    text: This 'stone' is later applied to the Messiah in Romans 9:33 and 1 Peter
      2:6.
    reason: cross_reference
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Rendered the title pair in the conventional English form 'the Lord GOD.'
    Per doctrine, יְהוָה is rendered 'the LORD'; in the compound אֲדֹנָי יְהוִה, English
    tradition commonly avoids 'Lord LORD' by using 'Lord GOD,' which preserves the
    sense of the divine title combination without awkward duplication.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: The particle-plus-pronominal form is emphatic and deictic. 'Behold' preserves
    the solemn prophetic force better than a flatter modern equivalent, while remaining
    understandable.
- source_word: יִסַּד
  chosen: I am laying
  alternatives:
  - I lay
  - I found
  - I establish
  lexicon: HALOT
  rationale: Though the form is morphologically pointed as a passive/derived stem
    in the table, in context with הִנְנִי and the first-person speaker it functions
    as a first-person declaration of placing/founding. 'I am laying' captures the
    imminent, performative force of the prophetic announcement.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - on Zion
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in,' and with Zion as the location
    of divine founding, 'in Zion' is the most natural and traditional rendering.
- source_word: אָבֶן אֶבֶן בֹּחַן
  chosen: a stone, a tested stone
  alternatives:
  - a stone, a proven stone
  - a stone, a tried stone
  lexicon: HALOT
  rationale: The repetition of אבן is retained for emphasis. בֹּחַן denotes something
    tested/proved. 'Tested stone' is clear modern English and preserves the evaluative
    nuance.
- source_word: פִּנַּת יִקְרַת
  chosen: a precious cornerstone
  alternatives:
  - a costly corner-stone
  - a precious corner stone
  lexicon: HALOT
  rationale: The construct chain indicates a corner/foundation stone characterized
    by preciousness or honor. 'Precious cornerstone' is idiomatic and preserves both
    architectural and value connotations.
- source_word: מוּסָד מוּסָּד
  chosen: a sure foundation
  alternatives:
  - a firmly founded foundation
  - a well-founded foundation
  - a founded foundation
  lexicon: HALOT
  rationale: The pairing intensifies the idea of firmness and secure establishment.
    Rather than a wooden repetition in English, 'a sure foundation' communicates the
    force naturally while preserving the architectural metaphor.
- source_word: הַמַּאֲמִין
  chosen: the one who believes
  alternatives:
  - the believer
  - the one who trusts
  lexicon: HALOT
  rationale: The participle denotes the person characterized by believing/trusting.
    'The one who believes' is gender-accurate and readable. 'Trusts' is possible,
    but 'believes' aligns well with the participial form and later biblical reception.
- source_word: לֹא יָחִישׁ
  chosen: will not be in haste
  alternatives:
  - will not hurry
  - will not panic
  lexicon: HALOT
  rationale: The verb means to hurry or act hastily. 'Will not be in haste' preserves
    the Hebrew idiom and leaves room for the theological implication of calm confidence
    without over-interpreting it as 'panic' in the main text.
