theological_decisions:
- issue: Messianic/theological interpretation of the foundation stone
  chosen_reading: Retain the architectural image in the main text without making the
    messianic referent explicit.
  alternative_readings:
  - Interpret the stone explicitly as the Messiah/Christ in translation
  rationale: The verse is later applied christologically in the New Testament, but
    the Hebrew text itself presents the image as YHWH's foundational stone in Zion.
    To avoid importing a doctrinal conclusion into the translation, the main text
    preserves the metaphor and lets canonical interpretation arise from cross-reference
    and footnote rather than explicit insertion.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of הַמַּאֲמִין
  chosen_reading: the one who believes
  alternative_readings:
  - the one who trusts
  rationale: The Hebrew root אמן here can denote trust/reliance as well as belief.
    Because the verse is later cited in contexts emphasizing faith, 'believes' is
    suitable in the main text, while the trust nuance is preserved as an alternative.
  doctrine_reference: Translation philosophy §3
