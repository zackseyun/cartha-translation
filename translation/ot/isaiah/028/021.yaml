id: ISA.28.21
reference: Isaiah 28:21
source:
  edition: WLC
  text: כִּ֤י כְ/הַר פְּרָצִים֙ יָק֣וּם יְהוָ֔ה כְּ/עֵ֖מֶק בְּ/גִבְע֣וֹן יִרְגָּ֑ז לַ/עֲשׂ֤וֹת מַעֲשֵׂ֨/הוּ֙ זָ֣ר מַעֲשֵׂ֔/הוּ וְ/לַֽ/עֲבֹד֙ עֲבֹ֣דָת֔/וֹ נָכְרִיָּ֖ה עֲבֹדָתֽ/וֹ־׃
translation:
  text: For Yahweh will rise up as at Mount Perazim; he will be stirred up as in the Valley of Gibeon, to do his work—his strange work—and to perform his task—his foreign task.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mount Perazim recalls the LORD's bursting out against David's enemies (2 Samuel 5:20; 1 Chronicles 14:11).
    reason: cross_reference
  - marker: b
    text: The Valley at Gibeon likely recalls the LORD's intervention in battle at Gibeon (Joshua 10:10–14).
    reason: cross_reference
  - marker: c
    text: Or 'his alien work ... his strange task.' The paired adjectives emphasize that this act of judgment is portrayed as unusual or foreign.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding warning; 'For' best preserves the causal connection in natural English.
- source_word: כְהַר פְּרָצִים
  chosen: as at Mount Perazim
  alternatives:
  - like Mount Perazim
  - as on Mount Perazim
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As at' idiomatically conveys an allusion to the historical event associated with the place (2 Sam 5:20; 1 Chr 14:11), not merely the mountain as a physical object.
- source_word: יָקוּם
  chosen: will rise up
  alternatives:
  - will arise
  - rises up
  lexicon: HALOT
  rationale: Qal imperfect of קום here depicts YHWH's decisive intervention. 'Will rise up' is vivid and idiomatic in prophetic discourse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְעֵמֶק בְּגִבְעוֹן
  chosen: as in the Valley at Gibeon
  alternatives:
  - as in the valley of Gibeon
  - like the valley at Gibeon
  lexicon: HALOT
  rationale: The phrase recalls the battle tradition at Gibeon (Josh 10). 'Valley at Gibeon' preserves the topographical reference without over-specifying a construct relation not explicit in the Hebrew.
- source_word: יִרְגָּז
  chosen: will be stirred up
  alternatives:
  - will be agitated
  - will rage
  - will tremble
  lexicon: HALOT
  rationale: The verb רגז can denote trembling, agitation, or being moved to action. In context of divine intervention, 'will be stirred up' best captures active arousal to judgment without implying loss of control.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to accomplish
  - to carry out
  lexicon: HALOT
  rationale: Simple infinitive of עשׂה. 'To do' keeps the repetition with 'work' compact and close to the Hebrew.
- source_word: מַעֲשֵׂהוּ
  chosen: his work
  alternatives:
  - his deed
  lexicon: HALOT
  rationale: Ma'aseh commonly means work/deed. 'Work' pairs naturally with the following apposition and preserves the rhetorical repetition.
- source_word: זָר
  chosen: strange
  alternatives:
  - alien
  - foreign
  lexicon: HALOT
  rationale: Describes the work as unusual or alien relative to what is expected. 'Strange' is the traditional and still clear rendering in English, fitting the rhetorical force.
- source_word: וְלַעֲבֹד
  chosen: and to perform
  alternatives:
  - and to work
  - and to serve
  lexicon: HALOT
  rationale: Though from עבד, the infinitive here parallels 'to do his work' and governs the cognate noun עֲבֹדָה. 'To perform' avoids awkward repetition ('to work his work/service') while preserving the sense of carrying out an action.
- source_word: עֲבֹדָתוֹ
  chosen: his task
  alternatives:
  - his labor
  - his service
  - his work
  lexicon: HALOT
  rationale: עֲבֹדָה can mean labor, service, or work. Here, in parallel with מַעֲשֵׂהוּ, 'task' gives a natural English equivalent that distinguishes the paired nouns while retaining the sense of assigned activity.
- source_word: נָכְרִיָּה
  chosen: foreign
  alternatives:
  - strange
  - alien
  lexicon: HALOT
  rationale: The adjective emphasizes something foreign or unfamiliar. Rendering it 'foreign' preserves the intensification and variation from זָר ('strange') in the previous colon.
