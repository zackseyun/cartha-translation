theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Characterization of God's 'strange/foreign' work
  chosen_reading: Retain the language of strangeness/foreignness without explaining it away
  alternative_readings:
  - Interpret as 'unusual judgment' in the main text
  - Paraphrase as 'his unexpected punishment'
  rationale: The Hebrew presents divine judgment as something alien or extraordinary relative to God's ordinary disposition toward his people. The translation preserves that theological tension rather than resolving it by paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
