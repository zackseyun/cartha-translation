theological_decisions:
- issue: Rendering the divine title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ
  chosen_reading: the whole land
  alternative_readings:
  - the whole earth
  rationale: The Hebrew can denote either the land or the earth. Given the local prophetic context centered on Jerusalem/Judah, 'land' is preferred in the main text, while the broader cosmic reading is preserved in a footnote because the phrase can also be heard more universally.
  doctrine_reference: 'Translation philosophy 3: Preserve theological tension rather than resolve it'
