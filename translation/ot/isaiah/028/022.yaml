id: ISA.28.22
reference: Isaiah 28:22
source:
  edition: WLC
  text: וְ/עַתָּה֙ אַל תִּתְלוֹצָ֔צוּ פֶּֽן יֶחְזְק֖וּ מֽוֹסְרֵי/כֶ֑ם כִּֽי כָלָ֨ה וְ/נֶחֱרָצָ֜ה שָׁמַ֗עְתִּי מֵ/אֵ֨ת אֲדֹנָ֧/י יְהוִ֛ה צְבָא֖וֹת עַל כָּל הָ/אָֽרֶץ־־־־־׃
translation:
  text: So now, do not scoff, lest your bonds be made stronger; for I have heard from the Lord GOD of Armies a complete destruction decreed against the whole land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the whole earth.' The Hebrew word can mean either 'land' or 'earth.'
    reason: alternative_reading
  - marker: b
    text: Or 'of Hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Introduces an urgent transition and inference from the preceding warning. 'So now' captures both the connective ו and the temporal-adverbial force of עתה in natural English.
- source_word: אַל
  chosen: do not
  alternatives:
  - must not
  lexicon: HALOT
  rationale: Standard negative particle for prohibition with the following imperfect/jussive-like verb.
- source_word: תִּתְלוֹצָצוּ
  chosen: scoff
  alternatives:
  - mock
  - be mockers
  lexicon: HALOT
  rationale: From לוץ, denoting derisive mocking. 'Scoff' fits the prophetic rebuke and matches the tone of arrogant contempt in context.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Best concise rendering for a warning of undesirable result.
- source_word: יֶחְזְקוּ
  chosen: be made stronger
  alternatives:
  - grow strong
  - be strengthened
  - be tightened
  lexicon: HALOT
  rationale: The verb חזק here takes מוסרים as subject; in context of restraints/bonds, the sense is that they become stronger or tighter. Passive English expresses the result naturally.
- source_word: מוֹסְרֵיכֶם
  chosen: your bonds
  alternatives:
  - your fetters
  - your restraints
  - your chastisements
  lexicon: HALOT
  rationale: מוֹסֵר can denote bonds/fetters or restraints. In this warning context, 'bonds' preserves the concrete metaphor of binding judgment without over-specifying physical shackles. 'Chastisements' is possible but less immediate in context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the warning.
- source_word: כָלָה
  chosen: a complete destruction
  alternatives:
  - an end
  - annihilation
  - full end
  lexicon: HALOT
  rationale: כלה often denotes completion/end, and in judgment contexts a full end or complete destruction. 'A complete destruction' communicates the severity and finality in idiomatic English.
- source_word: וְנֶחֱרָצָה
  chosen: decreed
  alternatives:
  - determined
  - decided
  lexicon: HALOT
  rationale: 'From חרץ in the Niphal, conveying something determined or decreed. Rendered adjectivally with ''destruction'' as a compact English expression: ''a complete destruction decreed.'''
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect reports a received prophetic message. English present perfect suitably conveys a heard-and-still-binding announcement.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - from with
  lexicon: HALOT
  rationale: Standard source marker; 'from' is sufficient in English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the project's doctrine, יְהוָה is rendered 'the LORD.' In the compound title אֲדֹנָי יְהוִה, standard English convention avoids 'Lord LORD' by rendering as 'Lord GOD.' This preserves both elements while remaining readable.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: The noun literally refers to armies/hosts. 'Of Armies' translates the title rather than preserving traditional ecclesiastical 'Hosts,' in keeping with source-language primacy and readable modern English.
- source_word: עַל כָּל הָאָרֶץ
  chosen: against the whole land
  alternatives:
  - upon all the earth
  - against the whole earth
  lexicon: HALOT
  rationale: אָרֶץ can mean land or earth. In Isaiah's immediate historical context, the judgment oracle is directed toward Judah/Jerusalem and its surrounding land, so 'the whole land' is the more contextually grounded rendering. 'Against' reflects the hostile force of the decree better than a bare 'upon' in English.
