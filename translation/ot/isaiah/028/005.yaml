id: ISA.28.5
reference: Isaiah 28:5
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִֽהְיֶה֙ יְהוָ֣ה צְבָא֔וֹת לַ/עֲטֶ֣רֶת צְבִ֔י וְ/לִ/צְפִירַ֖ת
    תִּפְאָרָ֑ה לִ/שְׁאָ֖ר עַמּֽ/וֹ׃
translation:
  text: In that day the LORD of Armies will be a crown of beauty and a diadem of splendor
    for the remnant of his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of Hosts.' The Hebrew title יְהוָה צְבָאוֹת is traditionally
      rendered 'LORD of Hosts'; 'of Armies' makes the underlying sense more transparent
      in modern English.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  - In that time
  lexicon: HALOT
  rationale: Standard temporal prophetic formula. 'In that day' is idiomatic, natural
    English and preserves the eschatological/prophetic cadence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for YHWH, following Jewish reverence tradition and
    longstanding English Bible convention.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: The noun denotes armies/hosts. 'Of Armies' translates the title rather
    than preserving traditional but less transparent 'Hosts,' in keeping with original-language
    primacy and readable modern English.
- source_word: יִהְיֶה
  chosen: will be
  alternatives:
  - shall be
  - becomes
  lexicon: HALOT
  rationale: Simple imperfect of היה expressing future state. 'Will be' is the clearest
    modern English rendering.
- source_word: לַעֲטֶרֶת צְבִי
  chosen: a crown of beauty
  alternatives:
  - a beautiful crown
  - a crown of glory
  lexicon: HALOT
  rationale: עֲטֶרֶת is 'crown'; צְבִי can denote beauty, splendor, or glory. 'Beauty'
    preserves the aesthetic sense and avoids collapsing it into the following תִּפְאָרָה,
    allowing the paired images to remain distinct.
- source_word: וְלִצְפִירַת תִּפְאָרָה
  chosen: and a diadem of splendor
  alternatives:
  - and a glorious wreath
  - and a crown of glory
  - and a diadem of beauty
  lexicon: HALOT
  rationale: צְפִירָה here refers to a circlet/diadem rather than repeating the exact
    same English term as עֲטֶרֶת; using 'diadem' preserves the poetic parallel with
    slight lexical distinction. תִּפְאָרָה is well rendered 'splendor' here, maintaining
    elevated but readable style.
- source_word: לִשְׁאָר עַמּוֹ
  chosen: for the remnant of his people
  alternatives:
  - for the remainder of his people
  - to the remnant of his people
  lexicon: HALOT
  rationale: שְׁאָר commonly carries the prophetic sense 'remnant,' not merely numerical
    remainder. 'For' fits the lamed of benefit/destination in context better than
    a more wooden 'to.'
