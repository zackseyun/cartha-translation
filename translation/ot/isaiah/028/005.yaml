theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of Hosts
  - Yahweh of Armies
  rationale: This preserves the covenant name per doctrine ('the LORD') while translating
    צְבָאוֹת transparently. It avoids obscuring the martial/royal imagery and keeps
    the title intelligible to modern readers.
  doctrine_reference: 'DOCTRINE.md: Contested terms (יְהוָה → the LORD); Translation
    philosophy §§1, 2, 6'
- issue: Interpretation of שְׁאָר
  chosen_reading: remnant
  alternative_readings:
  - remainder
  rationale: In Isaiah, 'remnant' is a theologically charged motif referring to the
    surviving people of God. The context of judgment and restoration in this section
    supports the prophetic-theological sense rather than a merely quantitative remainder.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
