id: ISA.28.25
reference: Isaiah 28:25
source:
  edition: WLC
  text: הֲ/לוֹא֙ אִם שִׁוָּ֣ה פָנֶ֔י/הָ וְ/הֵפִ֥יץ קֶ֖צַח וְ/כַמֹּ֣ן יִזְרֹ֑ק וְ/שָׂ֨ם
    חִטָּ֤ה שׂוֹרָה֙ וּ/שְׂעֹרָ֣ה נִסְמָ֔ן וְ/כֻסֶּ֖מֶת גְּבֻלָתֽ/וֹ־׃
translation:
  text: Does he not, when he has leveled its surface, scatter black cumin and sow
    cumin, and put wheat in rows, and barley in its appointed place, and spelt at
    its border?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'black caraway'; the exact identification of קֶצַח is uncertain. Older
      English versions often have 'fitches.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term שׂוֹרָה is difficult; it may mean 'in rows,' 'as the principal
      crop,' or 'in the best place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'emmer'; the exact grain denoted by כֻסֶּמֶת is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא אִם
  chosen: Does he not, when
  alternatives:
  - Is it not that, if
  - Surely, when
  lexicon: HALOT
  rationale: The combination introduces a rhetorical question with a conditional-temporal
    nuance. In English, 'Does he not, when...' best captures the flow of the farming
    illustration without woodenly preserving an awkward 'if'.
- source_word: שִׁוָּה פָנֶיהָ
  chosen: he has leveled its surface
  alternatives:
  - he has smoothed its face
  - he has made its surface even
  lexicon: HALOT
  rationale: שׁוה in this context refers to making level/even; פָּנִים with 3fs suffix
    refers to the surface of the ground. 'Leveled its surface' is idiomatic and agriculturally
    clear.
- source_word: הֵפִיץ
  chosen: scatter
  alternatives:
  - disperse
  - broadcast
  lexicon: HALOT
  rationale: The verb denotes scattering broadly. 'Scatter' is natural English and
    fits sowing imagery.
- source_word: קֶצַח
  chosen: black cumin
  alternatives:
  - dill
  - black caraway
  - fitches
  lexicon: HALOT
  rationale: The exact plant is debated, but 'black cumin' is a common modern identification
    and avoids archaic 'fitches.' Because the identification is not certain, an alternative
    is preserved in a footnote.
- source_word: כַמֹּן
  chosen: cumin
  alternatives:
  - cummin
  lexicon: HALOT
  rationale: This spice plant is well established as cumin. Modern spelling is preferred
    over archaic 'cummin.'
- source_word: יִזְרֹק
  chosen: sow
  alternatives:
  - scatter
  - throw
  lexicon: HALOT
  rationale: Literally 'throw/sprinkle,' but in this agricultural context the sense
    is sowing seed. Rendering it 'sow' communicates the intended action in natural
    English.
- source_word: שָׂם
  chosen: put
  alternatives:
  - place
  - set
  lexicon: HALOT
  rationale: A simple placement verb introducing the arrangement of crops. 'Put' is
    straightforward and readable.
- source_word: חִטָּה
  chosen: wheat
  lexicon: HALOT
  rationale: Standard rendering of the grain term.
- source_word: שׂוֹרָה
  chosen: in rows
  alternatives:
  - in the best place
  - as the principal crop
  lexicon: HALOT
  rationale: The noun is difficult and has been understood as a positional/agricultural
    term. 'In rows' fits the likely sense of ordered planting and coheres with the
    verse's emphasis on deliberate placement. Because the term is uncertain, alternatives
    are preserved in a footnote.
- source_word: שְׂעֹרָה
  chosen: barley
  lexicon: HALOT
  rationale: Standard rendering of the grain term.
- source_word: נִסְמָן
  chosen: in its appointed place
  alternatives:
  - in the marked place
  - as a designated portion
  lexicon: HALOT
  rationale: Likely from a root meaning to mark/designate. 'In its appointed place'
    conveys intentional allocation within the field.
- source_word: כֻסֶּמֶת
  chosen: spelt
  alternatives:
  - emmer
  - a kind of wheat
  lexicon: HALOT
  rationale: The grain is traditionally rendered 'spelt,' though exact botanical identification
    may overlap with emmer. 'Spelt' is familiar in English; the uncertainty is worth
    noting in a footnote.
- source_word: גְּבֻלָתוֹ
  chosen: at its border
  alternatives:
  - within its boundary
  - at the edge of his field
  lexicon: HALOT
  rationale: The noun means boundary/border. With the 3ms suffix, the sense is the
    field's border/edge. 'At its border' keeps the line concise and tied to the field
    imagery.
