id: ISA.28.10
reference: Isaiah 28:10
source:
  edition: WLC
  text: כִּ֣י צַ֤ו לָ/צָו֙ צַ֣ו לָ/צָ֔ו קַ֥ו לָ/קָ֖ו קַ֣ו לָ/קָ֑ו זְעֵ֥יר שָׁ֖ם זְעֵ֥יר
    שָֽׁם׃
translation:
  text: For it is, “Command on command, command on command, line on line, line on
    line, a little here, a little there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “command to command, command to command, line to line,
      line to line, a little there, a little there.” The Hebrew is highly repetitive
      and may imitate mocking, childish speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation of the preceding accusation/mockery. 'For'
    fits the discourse connection without overcommitting to a causal nuance stronger
    than the context requires.
- source_word: צַו
  chosen: command
  alternatives:
  - precept
  - order
  lexicon: HALOT
  rationale: The likely sense, if the word is taken from the root צוה, is an injunction
    or command. 'Command' is more natural modern English than the traditional 'precept'
    while preserving the repetitive, clipped sound. Because the phrase may also be
    intentionally mimetic or mocking, the rendering is kept simple and repetitive.
- source_word: לָ/צָו
  chosen: on command
  alternatives:
  - upon command
  - to command
  lexicon: HALOT
  rationale: 'The preposition ל in this repetitive construction is rendered idiomatically
    as ''on'' to produce natural English parallelism: ''command on command.'' ''Upon''
    is possible but less natural in contemporary English.'
- source_word: קַו
  chosen: line
  alternatives:
  - measuring line
  - rule
  lexicon: HALOT
  rationale: The noun commonly denotes a measuring line or cord. In this stylized
    repetition, 'line' is concise and preserves the cadence. 'Measuring line' would
    be more explicit but too heavy for the taunting rhythm of the verse.
- source_word: לָ/קָו
  chosen: on line
  alternatives:
  - upon line
  - to line
  lexicon: HALOT
  rationale: As with לָצָו, the preposition is rendered idiomatically in the repetitive
    formula as 'on line,' yielding the familiar and intelligible pattern 'line on
    line.'
- source_word: זְעֵיר
  chosen: a little
  alternatives:
  - a small amount
  - a bit
  lexicon: HALOT
  rationale: This Aramaizing/Hebrew form means 'little' or 'small.' 'A little' preserves
    both sense and rhythm.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: The adverb straightforwardly means 'there.' In the paired expression
    with the implied counterpart 'here,' English idiom naturally becomes 'a little
    here, a little there.'
- source_word: זְעֵיר שָׁם ... זְעֵיר שָׁם
  chosen: a little here, a little there
  alternatives:
  - a little there, a little there
  - a little here, a little there
  lexicon: HALOT
  rationale: Although the Hebrew repeats 'there ... there,' English idiom in a distributive
    expression is better represented as 'here ... there,' and the context suggests
    a mocking sing-song summary of fragmented instruction. This is a modest dynamic
    adjustment in service of intelligibility and rhetorical effect; the more formally
    literal alternative is preserved in a footnote.
