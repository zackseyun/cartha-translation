theological_decisions:
- issue: Whether the verse should be rendered as straightforward instruction or as
    mocking, sing-song speech
  chosen_reading: Rendered with quotation marks and repetitive cadence as mockingly
    reported speech
  alternative_readings:
  - A literal statement of pedagogical method without explicit mockery
  rationale: In context (Isa 28:9–13), the leaders appear to ridicule prophetic teaching
    as childish repetition. The translation preserves that rhetorical effect without
    adding interpretive wording such as 'blah blah' or other paraphrase beyond the
    text.
  doctrine_reference: Translation philosophy §1, §3, §6
