id: ISA.28.28
reference: Isaiah 28:28
source:
  edition: WLC
  text: לֶ֣חֶם יוּדָ֔ק כִּ֛י לֹ֥א לָ/נֶ֖צַח אָד֣וֹשׁ יְדוּשֶׁ֑/נּוּ וְ֠/הָמַם גִּלְגַּ֧ל
    עֶגְלָת֛/וֹ וּ/פָרָשָׁ֖י/ו לֹֽא יְדֻקֶּֽ/נּוּ־׃
translation:
  text: Bread grain is crushed, but not forever does one keep threshing it; though
    the wheel of his cart and his horses rumble over it, he does not crush it fine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grain for bread is crushed.' The Hebrew לֶחֶם ('bread') is used here
      for grain intended to become bread.
    reason: lexical_alternative
  - marker: b
    text: Or 'his horsemen.' The Hebrew term can denote riders in some contexts, but
      'horses' fits the farming image here.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  chosen: Bread grain
  alternatives:
  - bread
  - grain for bread
  lexicon: HALOT
  rationale: Although לֶחֶם often means 'bread,' in this agricultural context it refers
    metonymically to grain destined for bread-making. 'Bread grain' preserves the
    concrete farming image better than simply 'bread.'
- source_word: יוּדָק
  chosen: is crushed
  alternatives:
  - is ground
  - is beaten small
  lexicon: HALOT
  rationale: From דקק, denoting crushing or making fine. 'Is crushed' fits the threshing/milling
    context and pairs naturally with the later repetition of the same root.
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces an explanatory-contrastive statement: grain is
    indeed crushed, but not endlessly. ''But'' communicates the adversative force
    in idiomatic English.'
- source_word: לֹא לָנֶצַח
  chosen: not forever
  alternatives:
  - not continually
  - not endlessly
  lexicon: HALOT
  rationale: לָנֶצַח literally means 'to perpetuity/forever.' In context it means
    the threshing is not carried on without end. 'Not forever' is both literal and
    clear.
- source_word: אָדוֹשׁ יְדוּשֶׁנּוּ
  chosen: does one keep threshing it
  alternatives:
  - he threshes it
  - one threshes it continually
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of דושׁ intensifies the verbal
    idea. English expresses this well with 'keep threshing.' An indefinite 'one' avoids
    over-specifying the subject while preserving the generic sense.
- source_word: וְהָמַם
  chosen: though ... rumble over it
  alternatives:
  - and ... drives noisily over it
  - and ... crushes it with a tumult
  lexicon: HALOT
  rationale: The verb המם can denote making a noise, causing tumult, or throwing into
    commotion. In this farming image, the point is the noisy passage of the threshing
    apparatus over the grain rather than psychological panic. 'Rumble' captures the
    sound and motion.
- source_word: גִּלְגַּל עֶגְלָתוֹ
  chosen: the wheel of his cart
  alternatives:
  - the roller of his wagon
  - his cartwheel
  lexicon: HALOT
  rationale: גִּלְגַּל is 'wheel' or rolling thing; עגלה is a cart/wagon. 'The wheel
    of his cart' is straightforward and preserves the construct relationship.
- source_word: וּפָרָשָׁיו
  chosen: his horses
  alternatives:
  - his horsemen
  lexicon: HALOT
  rationale: Though פָרָשׁ can mean horseman/rider in some contexts, in this agricultural
    setting with cart and threshing imagery, 'horses' best fits the animals pulling
    or accompanying the cart. The suffix is retained as 'his.'
- source_word: לֹא יְדֻקֶּנּוּ
  chosen: he does not crush it fine
  alternatives:
  - he does not pulverize it
  - he does not crush it
  lexicon: HALOT
  rationale: 'The repeated root דקק resumes the opening verb and clarifies the limit
    of threshing: the grain is not reduced to powder. ''Crush it fine'' makes the
    implied degree explicit in natural English.'
