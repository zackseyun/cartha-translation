id: ISA.28.23
reference: Isaiah 28:23
source:
  edition: WLC
  text: הַאֲזִ֥ינוּ וְ/שִׁמְע֖וּ קוֹלִ֑/י הַקְשִׁ֥יבוּ וְ/שִׁמְע֖וּ אִמְרָתִֽ/י׃
translation:
  text: Give ear and hear my voice; pay attention and hear my word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Listen and hear my voice; attend and hear my speech.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינוּ
  chosen: Give ear
  alternatives:
  - Listen
  - Hear
  lexicon: HALOT
  rationale: Hiphil imperative plural of אזן, an idiom meaning to incline the ear
    attentively. 'Give ear' preserves the heightened summons better than the flatter
    'listen,' while remaining natural English.
- source_word: וְשִׁמְעוּ
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: Qal imperative plural of שמע. Rendered 'hear' to preserve the Hebrew
    pairing with הַאֲזִינוּ and to keep the rhetorical repetition rather than collapsing
    the verbs into a single English expression.
- source_word: קוֹלִי
  chosen: my voice
  alternatives:
  - the sound of my voice
  lexicon: HALOT
  rationale: קול commonly means 'voice' in direct speech contexts. 'My voice' is the
    plain sense and idiomatic in English.
- source_word: הַקְשִׁיבוּ
  chosen: pay attention
  alternatives:
  - listen carefully
  - attend
  lexicon: HALOT
  rationale: Hiphil imperative plural of קשב, calling for focused attention. 'Pay
    attention' communicates the force clearly in modern English while distinguishing
    it from the earlier 'give ear.'
- source_word: וְשִׁמְעוּ
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: Repeated שמע is likewise rendered 'hear' to preserve the deliberate repetition
    and parallelism of the Hebrew.
- source_word: אִמְרָתִי
  chosen: my word
  alternatives:
  - my speech
  - what I say
  lexicon: HALOT
  rationale: אמרה denotes utterance, word, or speech. 'My word' is concise, preserves
    the singular, and fits the poetic parallel with 'my voice' without unnecessary
    expansion.
