id: ISA.28.11
reference: Isaiah 28:11
source:
  edition: WLC
  text: כִּ֚י בְּ/לַעֲגֵ֣י שָׂפָ֔ה וּ/בְ/לָשׁ֖וֹן אַחֶ֑רֶת יְדַבֵּ֖ר אֶל הָ/עָ֥ם הַ/זֶּֽה־׃
translation:
  text: For with mocking lips and with another tongue he will speak to this people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with stammering lips'; some translations take the phrase to emphasize
      unintelligible speech rather than mocking speech.
    reason: lexical_alternative
  - marker: b
    text: '''Another tongue'' means a foreign language; the expression likely points
      to God speaking in judgment through foreign invaders.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or explanation for the preceding statement,
    so 'For' best preserves the logical connection in context.
- source_word: בְּלַעֲגֵי שָׂפָה
  chosen: with mocking lips
  alternatives:
  - with stammering lips
  - with lips of mockery
  lexicon: HALOT
  rationale: לַעַג denotes mocking, derision, or scorn. Although some English traditions
    render this phrase 'stammering lips,' the Hebrew noun more naturally points to
    derisive or foreign-sounding speech heard as mocking. 'Mocking lips' preserves
    the lexical sense while remaining idiomatic.
- source_word: וּבְלָשׁוֹן אַחֶרֶת
  chosen: and with another tongue
  alternatives:
  - and in another language
  - and with a foreign tongue
  lexicon: HALOT
  rationale: לָשׁוֹן can mean 'tongue' literally or 'language' by extension. 'Another
    tongue' keeps the metaphor of the Hebrew while clearly signaling foreign speech
    in context.
- source_word: יְדַבֵּר
  chosen: he will speak
  alternatives:
  - he speaks
  - one will speak
  lexicon: HALOT
  rationale: 'The imperfect verb is best rendered as future here in prophetic discourse:
    ''he will speak.'' The singular subject is left implicit in Hebrew; English retains
    the generic ''he'' rather than specifying an agent not named in the verse.'
- source_word: אֶל הָעָם הַזֶּה
  chosen: to this people
  alternatives:
  - to this nation
  lexicon: HALOT
  rationale: עָם commonly means 'people.' 'This people' preserves the demonstrative
    force and the prophetic tone of address better than the more political 'this nation'.
