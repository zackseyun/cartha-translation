theological_decisions:
- issue: Interpretation of the foreign/derisive speech
  chosen_reading: The verse refers to God addressing Judah through foreign-speaking
    invaders, expressed as 'with mocking lips and with another tongue.'
  alternative_readings:
  - The phrase refers primarily to unintelligible or stammering speech rather than
    mocking speech.
  rationale: The immediate context concerns judgment on a people who mocked prophetic
    instruction. The Hebrew לַעֲגֵי more directly supports 'mocking' or 'derisive'
    than 'stammering,' while 'another tongue' preserves the sense of foreign speech
    without over-interpreting. This keeps the prophetic judgment context without importing
    later theological usage into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
