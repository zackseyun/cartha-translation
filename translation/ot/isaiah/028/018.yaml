id: ISA.28.18
reference: Isaiah 28:18
source:
  edition: WLC
  text: וְ/כֻפַּ֤ר בְּרִֽיתְ/כֶם֙ אֶת מָ֔וֶת וְ/חָזוּתְ/כֶ֥ם אֶת שְׁא֖וֹל לֹ֣א תָק֑וּם
    שׁ֤וֹט שׁוֹטֵף֙ כִּ֣י יַֽעֲבֹ֔ר וִ/הְיִ֥יתֶם ל֖/וֹ לְ/מִרְמָֽס־־׃
translation:
  text: And your covenant with death will be annulled, and your agreement with Sheol
    will not stand; when the overwhelming scourge passes through, you will become
    a trampling place for it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the overflowing scourge.' The Hebrew image combines a scourge with sweeping,
      flood-like force.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the
      grave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻפַּר
  chosen: will be annulled
  alternatives:
  - will be covered
  - will be purged
  - will be expiated
  lexicon: HALOT
  rationale: Though the root כפר often means 'cover/make atonement,' in this covenantal-legal
    context with בְּרִית the sense is that the pact is canceled or invalidated. 'Annulled'
    best captures the passive legal force in idiomatic English without importing sacrificial
    theology into this line.
- source_word: בְּרִיתְכֶם
  chosen: your covenant
  alternatives:
  - your treaty
  - your pact
  lexicon: HALOT
  rationale: בְּרִית commonly denotes covenant, treaty, or pact. 'Covenant' preserves
    the formal relational term used in the Hebrew, even though here it is used ironically
    of an alliance with death.
- source_word: אֶת־מָוֶת
  chosen: with death
  alternatives:
  - death
  lexicon: HALOT
  rationale: The particle אֵת here marks the object/complement of the covenant expression;
    in English the idiomatic rendering is 'covenant with death,' not a wooden 'covenant
    death.' 'Death' is retained as the personified power in the verse.
- source_word: חָזוּתְכֶם
  chosen: your agreement
  alternatives:
  - your vision
  - your pact
  - your treaty
  lexicon: HALOT
  rationale: Although חזות can elsewhere mean 'vision,' in parallel with 'your covenant
    with death' and followed by 'with Sheol' it denotes an agreement/compact. 'Agreement'
    is clear modern English and preserves the parallelism.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Sheol is best transliterated here because it denotes more than a grave
    and functions in parallel with personified Death. Transliteration preserves the
    Hebrew conceptual world better than flattening it to 'grave.'
- source_word: לֹא תָקוּם
  chosen: will not stand
  alternatives:
  - will not arise
  - will not be established
  lexicon: HALOT
  rationale: קום in this context means to stand, hold, or remain in force. 'Will not
    stand' is idiomatic English for an agreement that fails to remain valid.
- source_word: שׁוֹט שׁוֹטֵף
  chosen: the overwhelming scourge
  alternatives:
  - the flooding whip
  - the sweeping scourge
  - the overflowing scourge
  lexicon: HALOT
  rationale: The collocation combines the image of a scourge/whip with an overflowing,
    sweeping force. 'Overwhelming scourge' communicates both destructive violence
    and inundating movement in natural English. 'Overflowing scourge' is more literal
    but less idiomatic; preserved in a footnote.
- source_word: יַעֲבֹר
  chosen: passes through
  alternatives:
  - passes over
  - goes through
  lexicon: HALOT
  rationale: עבר here describes the scourge moving through the land/people. 'Passes
    through' fits the judgment imagery better than 'passes over,' which in English
    may suggest sparing.
- source_word: וִהְיִיתֶם לוֹ
  chosen: you will become for it
  alternatives:
  - you will be to it
  - you will become its
  lexicon: HALOT
  rationale: 'The construction expresses resulting relation: they will become something
    with respect to the scourge. In polished English this is completed by the following
    noun phrase: ''you will become a trampling place for it.'''
- source_word: לְמִרְמָס
  chosen: a trampling place
  alternatives:
  - something to be trampled
  - a trampling
  - a place of trampling
  lexicon: HALOT
  rationale: מִרְמָס denotes trampling underfoot. 'A trampling place' preserves the
    noun imagery and the sense that the people become what the scourge treads down.
    'Something to be trampled' is possible but less concrete.
