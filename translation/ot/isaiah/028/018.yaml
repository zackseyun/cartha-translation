theological_decisions:
- issue: Personification of death and Sheol
  chosen_reading: Retain 'death' and 'Sheol' as personified powers in the main text.
  alternative_readings:
  - Render both more demythologized as 'death' and 'the grave'
  rationale: The verse mocks Judah's supposed security by describing a covenant with
    Death and an agreement with Sheol. Preserving the personified imagery reflects
    the Hebrew rhetoric without making additional doctrinal claims about these entities.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of שְׁאוֹל
  chosen_reading: Transliterate as 'Sheol' rather than translate as 'grave.'
  alternative_readings:
  - the grave
  - the realm of the dead
  rationale: This preserves theological tension and the Hebrew conceptual background.
    'Grave' would narrow the term and weaken the parallel with personified Death.
  doctrine_reference: Translation philosophy §1, §3
