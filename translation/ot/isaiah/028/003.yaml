theological_decisions:
- issue: Metaphorical genitive in עֲטֶרֶת גֵּאוּת
  chosen_reading: Rendered as 'the proud crown'
  alternative_readings:
  - the crown of pride
  rationale: This is a stylistic/lexical decision rather than a doctrinal one. The
    adjectival rendering is more natural in modern English while preserving the metaphor
    and negative moral force of the Hebrew.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency)
