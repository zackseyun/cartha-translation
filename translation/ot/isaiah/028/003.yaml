id: ISA.28.3
reference: Isaiah 28:3
source:
  edition: WLC
  text: בְּ/רַגְלַ֖יִם תֵּֽרָמַ֑סְנָה עֲטֶ֥רֶת גֵּא֖וּת שִׁכּוֹרֵ֥י אֶפְרָֽיִם׃
translation:
  text: The proud crown of the drunkards of Ephraim will be trampled underfoot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'The crown of pride of the drunkards of Ephraim will
      be trampled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַגְלַיִם
  chosen: underfoot
  alternatives:
  - by feet
  - with feet
  lexicon: HALOT
  rationale: The preposition ב plus dual 'feet' is an idiomatic instrumental/locative
    expression. 'Underfoot' gives natural English while preserving the image of trampling
    by feet.
- source_word: תֵּרָמַסְנָה
  chosen: will be trampled
  alternatives:
  - will be trodden down
  - will be crushed underfoot
  lexicon: HALOT
  rationale: Nifal imperfect 3fp from רמס conveys passive/resultative trampling. 'Will
    be trampled' is clear, direct, and matches the feminine singular subject treated
    collectively/poetically.
- source_word: עֲטֶרֶת
  chosen: crown
  alternatives:
  - wreath
  - garland
  lexicon: HALOT
  rationale: The noun denotes a crown or wreath. 'Crown' best fits the metaphor of
    Samaria's proud prominence in this context and aligns with the preceding verse's
    imagery.
- source_word: גֵּא֖וּת
  chosen: proud
  alternatives:
  - pride
  - majesty
  - arrogance
  lexicon: HALOT
  rationale: Although literally a noun ('pride'), in English 'the proud crown' is
    more idiomatic than 'the crown of pride' while preserving the genitival sense.
    The context is negative, so 'proud' carries the intended arrogance without overexpanding.
- source_word: שִׁכּוֹרֵי
  chosen: the drunkards of
  alternatives:
  - the drunk ones of
  - the drunken of
  lexicon: HALOT
  rationale: The masculine plural participial/adjectival form identifies the people
    characterized by drunkenness. 'Drunkards' is concise and idiomatic in English.
- source_word: אֶפְרָיִם
  chosen: Ephraim
  rationale: Proper name transliterated according to the translation philosophy. In
    context it stands for the northern kingdom, but the text names Ephraim directly,
    so the transliteration is retained.
