id: ISA.28.1
reference: Isaiah 28:1
source:
  edition: WLC
  text: ה֗וֹי עֲטֶ֤רֶת גֵּאוּת֙ שִׁכֹּרֵ֣י אֶפְרַ֔יִם וְ/צִ֥יץ נֹבֵ֖ל צְבִ֣י תִפְאַרְתּ֑/וֹ
    אֲשֶׁ֛ר עַל רֹ֥אשׁ גֵּֽיא שְׁמָנִ֖ים הֲל֥וּמֵי יָֽיִן־־׃
translation:
  text: Woe to the proud crown of the drunkards of Ephraim, and to the fading flower
    of his glorious beauty, which is on the head of the fertile valley, those struck
    down by wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crown of pride ... and the withering blossom of its glorious beauty.'
      The Hebrew poetry allows slightly different ways of expressing the metaphors
      while referring to the same object.
    reason: lexical_alternative
  - marker: b
    text: '''Fertile valley'' is literally ''valley of fatnesses,'' an idiom for rich,
      luxuriant land.'
    reason: cultural_note
  - marker: c
    text: Or 'those overcome by wine.' The Hebrew expression is more vivid, literally
      suggesting people beaten or struck down by wine.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces an oracle of lament/judgment. 'Woe' best preserves the prophetic
    denunciation force in natural English.
- source_word: עֲטֶרֶת גֵּאוּת
  chosen: the proud crown
  alternatives:
  - the crown of pride
  - the garland of pride
  lexicon: HALOT
  rationale: Construct chain literally 'crown of pride.' Rendered adjectivally as
    'proud crown' for smoother English while preserving the metaphor of a crowning
    object marked by arrogance.
- source_word: שִׁכֹּרֵי אֶפְרַיִם
  chosen: the drunkards of Ephraim
  alternatives:
  - the drunkards in Ephraim
  lexicon: HALOT
  rationale: Genitive most naturally identifies the people characterized by drunkenness
    as belonging to Ephraim. 'Drunkards' is more precise than 'drunken ones' in contemporary
    English.
- source_word: וְצִיץ נֹבֵל
  chosen: and to the fading flower
  alternatives:
  - and the withering blossom
  - even the fading flower
  lexicon: HALOT
  rationale: צִיץ denotes a blossom/flower; נֹבֵל is 'fading, withering.' Repeating
    'to' in English clarifies that the woe extends to this parallel image as well.
- source_word: צְבִי תִפְאַרְתּוֹ
  chosen: of his glorious beauty
  alternatives:
  - of his splendid beauty
  - of his beautiful glory
  lexicon: HALOT
  rationale: צְבִי conveys beauty/splendor and תִפְאֶרֶת glory/beauty. The suffix
    likely refers back to Ephraim/Samaria as a collective entity. 'Glorious beauty'
    preserves the elevated poetic pairing without over-literal awkwardness.
- source_word: אֲשֶׁר עַל רֹאשׁ גֵּיא שְׁמָנִים
  chosen: which is on the head of the fertile valley
  alternatives:
  - which is on the head of the valley of rich soil
  - which is at the head of the lush valley
  lexicon: HALOT
  rationale: רֹאשׁ here is spatial, 'top/head.' גֵּיא is valley. שְׁמָנִים literally
    'fat things/richnesses,' idiomatically indicating fertility or luxuriance. Singular
    'valley' is retained as in Hebrew.
- source_word: הֲלוּמֵי יָיִן
  chosen: those struck down by wine
  alternatives:
  - those overcome by wine
  - those beaten down by wine
  lexicon: HALOT
  rationale: Passive participle from הלם conveys being struck, beaten, or overwhelmed.
    'Struck down by wine' preserves the vividness better than the flatter 'drunk with
    wine,' while still making sense idiomatically.
