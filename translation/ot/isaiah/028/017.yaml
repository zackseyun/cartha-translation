id: ISA.28.17
reference: Isaiah 28:17
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֤י מִשְׁפָּט֙ לְ/קָ֔ו וּ/צְדָקָ֖ה לְ/מִשְׁקָ֑לֶת וְ/יָעָ֤ה בָרָד֙
    מַחְסֵ֣ה כָזָ֔ב וְ/סֵ֥תֶר מַ֖יִם יִשְׁטֹֽפוּ׃
translation:
  text: And I will make justice the measuring line, and righteousness the plumb line;
    hail will sweep away the refuge of lies, and waters will flood the shelter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment' for 'justice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'plummet.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the hiding place'; the Hebrew term denotes a place of concealment or
      protection.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will appoint
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'set, place, make.' In this construction
    with two predicate complements ('justice' to/for a line, 'righteousness' to/for
    a plumb line), 'make' is idiomatic in English and preserves the declarative force
    without awkwardness.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes just judgment/order as the standard by which God
    measures. 'Justice' is clearer and more natural in modern English than 'judgment'
    in this metaphorical construction.
- source_word: לְקָו
  chosen: the measuring line
  alternatives:
  - the line
  - the rule
  lexicon: HALOT
  rationale: קָו is a measuring cord/line used in construction. 'Measuring line' makes
    the architectural metaphor explicit for modern readers and pairs naturally with
    'plumb line.' The article is supplied in English because the noun functions as
    a defined standard in the parallelism.
- source_word: וּצְדָקָה
  chosen: and righteousness
  alternatives:
  - and justice
  lexicon: HALOT
  rationale: צְדָקָה is best rendered 'righteousness' here to preserve the moral-ethical
    dimension and the common biblical pairing with מִשְׁפָּט. Rendering both terms
    as 'justice' would flatten the parallelism.
- source_word: לְמִשְׁקָלֶת
  chosen: the plumb line
  alternatives:
  - the plummet
  - the level
  lexicon: HALOT
  rationale: מִשְׁקָלֶת refers to a weight used for vertical alignment in building,
    hence 'plumb line' or 'plummet.' 'Plumb line' is the clearest contemporary equivalent
    and preserves the construction metaphor.
- source_word: וְיָעָה
  chosen: will sweep away
  alternatives:
  - will shovel away
  - will clear away
  lexicon: HALOT
  rationale: The verb יעה has the sense of sweeping or clearing away. With hail as
    subject, 'will sweep away' is vivid and idiomatic, matching the destructive image.
- source_word: בָרָד
  chosen: hail
  lexicon: HALOT
  rationale: Straightforward weather term; no contextual reason to vary.
- source_word: מַחְסֵה כָזָב
  chosen: the refuge of lies
  alternatives:
  - the refuge of falsehood
  - the false refuge
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'refuge of lies/falsehood.'
    This preserves the genitive force and echoes the immediate context (v. 15) about
    false security built on deception.
- source_word: וְסֵתֶר
  chosen: and the shelter
  alternatives:
  - and the hiding place
  - and the secret place
  lexicon: HALOT
  rationale: סֵתֶר in this context denotes a place of concealment/protection. 'Shelter'
    fits the parallel with 'refuge' and the storm imagery better than the more literal
    but less natural 'hiding place.'
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  - floodwaters
  lexicon: HALOT
  rationale: The plural is retained as 'waters' to reflect the Hebrew and to match
    the poetic, destructive imagery. 'Floodwaters' is interpretive and therefore left
    as an alternative.
- source_word: יִשְׁטֹפוּ
  chosen: will flood
  alternatives:
  - will overflow
  - will wash over
  - will sweep through
  lexicon: HALOT
  rationale: The verb שׁטף means to overflow, inundate, or wash away. 'Will flood'
    is concise, natural, and fits the object 'the shelter' in English. It preserves
    the image of overwhelming judgment.
