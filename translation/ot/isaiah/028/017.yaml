theological_decisions:
- issue: Rendering the ethical pair מִשְׁפָּט / צְדָקָה
  chosen_reading: justice / righteousness
  alternative_readings:
  - judgment / justice
  - justice / justice
  rationale: The verse presents God's standards in architectural metaphor. Preserving
    distinct English renderings maintains the theological nuance between just order
    and moral rightness rather than collapsing the pair into near-synonyms.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented
    exception)
