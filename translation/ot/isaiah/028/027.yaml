id: ISA.28.27
reference: Isaiah 28:27
source:
  edition: WLC
  text: כִּ֣י לֹ֤א בֶֽ/חָרוּץ֙ י֣וּדַשׁ קֶ֔צַח וְ/אוֹפַ֣ן עֲגָלָ֔ה עַל כַּמֹּ֖ן יוּסָּ֑ב
    כִּ֧י בַ/מַּטֶּ֛ה יֵחָ֥בֶט קֶ֖צַח וְ/כַמֹּ֥ן בַּ/שָּֽׁבֶט־׃
translation:
  text: For black cumin is not threshed with a sledge, nor is a cart wheel rolled
    over cumin; rather, black cumin is beaten out with a staff, and cumin with a rod.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'dill' or archaic 'fitches' for black cumin (Hebrew qetsaḥ).
    reason: lexical_alternative
  - marker: b
    text: Or possibly 'caraway' for cumin (Hebrew kammon).
    reason: lexical_alternative
lexical_decisions:
- source_word: חָרוּץ
  chosen: sledge
  alternatives:
  - threshing sledge
  - threshing instrument
  lexicon: HALOT
  rationale: In this agricultural context the term denotes a sharp threshing implement,
    not simply something 'sharp.' 'Sledge' is concise modern English; 'threshing sledge'
    is a fuller alternative.
- source_word: יוּדַשׁ
  chosen: is threshed
  alternatives:
  - is crushed
  lexicon: HALOT
  rationale: The verb דוש in the Hophal refers to being threshed/trampled. 'Is threshed'
    best matches the farming imagery and the contrast with gentler beating.
- source_word: קֶצַח
  chosen: black cumin
  alternatives:
  - dill
  - fitches
  - nigella
  lexicon: HALOT
  rationale: The plant is commonly identified as Nigella sativa. 'Black cumin' is
    clearer for modern readers than archaic 'fitches'; 'dill' is less likely here.
    Because identification is not absolutely certain, alternatives are preserved in
    a footnote.
- source_word: אוֹפַן עֲגָלָה
  chosen: a cart wheel
  alternatives:
  - the wheel of a wagon
  - wagon wheel
  lexicon: HALOT
  rationale: The construct phrase literally means 'wheel of a cart/wagon.' 'Cart wheel'
    is natural English and preserves the concrete image.
- source_word: יוּסָּב
  chosen: is rolled over
  alternatives:
  - is turned over
  - is made to go around over
  lexicon: HALOT
  rationale: From סבב in the causative/passive sense, the wheel is caused to move
    around over the spice. 'Rolled over' communicates the agricultural action idiomatically.
- source_word: כַּמֹּן
  chosen: cumin
  alternatives:
  - caraway
  lexicon: HALOT
  rationale: The usual identification is cumin. 'Caraway' is a less likely botanical
    alternative and is preserved in a footnote.
- source_word: מַטֶּה
  chosen: staff
  alternatives:
  - stick
  lexicon: HALOT
  rationale: A staff is a wooden striking implement and fits the parallelism with
    'rod.' 'Stick' is possible but less literary and less precise.
- source_word: יֵחָבֶט
  chosen: is beaten out
  alternatives:
  - is beaten
  - is knocked out
  lexicon: HALOT
  rationale: The verb חבט refers to beating/shaking out produce. 'Beaten out' makes
    explicit the harvesting/threshing result without over-paraphrasing.
- source_word: שָּׁבֶט
  chosen: rod
  alternatives:
  - staff
  - switch
  lexicon: HALOT
  rationale: Here the word denotes a lighter striking implement. 'Rod' preserves the
    distinction from מַטֶּה while remaining natural English.
- source_word: כִּי ... כִּי
  chosen: For ... rather
  alternatives:
  - For ... for
  - Indeed ... for
  lexicon: HALOT
  rationale: The first כִּי introduces explanation ('for'). The second marks the contrasting
    proper method; rendering it 'rather' brings out the logic in idiomatic English.
