id: ISA.28.26
reference: Isaiah 28:26
source:
  edition: WLC
  text: וְ/יִסְּר֥/וֹ לַ/מִּשְׁפָּ֖ט אֱלֹהָ֥י/ו יוֹרֶֽ/נּוּ׃
translation:
  text: For his God instructs him in the right order; he teaches him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he is instructed properly; his God teaches him.' The Hebrew allows
      a more adverbial sense for לַמִּשְׁפָּט ('properly' / 'according to proper rule').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִסְּרוֹ
  chosen: instructs him
  alternatives:
  - disciplines him
  - corrects him
  - trains him
  lexicon: HALOT
  rationale: From יסר in the Piel with 3ms object suffix. In this agricultural context
    the sense is not punitive chastisement but guided instruction or training. 'Instructs
    him' best fits the following phrase about proper procedure and avoids implying
    rebuke where the context concerns skill in farming.
- source_word: לַמִּשְׁפָּט
  chosen: in the right order
  alternatives:
  - according to justice
  - for proper judgment
  - properly
  lexicon: HALOT
  rationale: מִשְׁפָּט often means 'judgment/justice,' but here in a practical wisdom
    context it refers to the proper rule, method, or procedure for cultivation. 'In
    the right order' captures the idea of correct practice more idiomatically in English
    while remaining close to the Hebrew sense.
- source_word: אֱלֹהָיו
  chosen: his God
  lexicon: HALOT
  rationale: 'Straightforward construct with 3ms suffix. The possessive should be
    retained: the farmer''s skill is attributed ultimately to God.'
- source_word: יוֹרֶנּוּ
  chosen: he teaches him
  alternatives:
  - he instructs him
  - he directs him
  lexicon: HALOT
  rationale: From ירה in the Hiphil, 'to teach/instruct/direct.' 'Teaches him' preserves
    the pedagogical sense and pairs naturally with the previous verb without unnecessary
    repetition in English.
